<div class="gz-container">

          <option value="all">All Styles</option>

      <div class="bz-inp">
        <label>Length</label>
        <select id="length">
          <option value="any">Any</option>
          <option value="short">Short (≤6)</option>
          <option value="medium">Medium (7-10)</option>
          <option value="long">Long (11+)</option>
        </select>
      </div>
      <div class="bz-inp">
        <label>Count</label>
        <select id="count">
          <option>12</option>

<script>
GZI18n.register({
  en: {
    toolTitle: 'Business Name Generator',
    toolDesc: 'Brainstorm hundreds of unique business and startup name ideas from your keywords. Mix portmanteaus, prefixes, suffixes and modern tech styles — all running in your browser.',
    copy: 'Copy', avail: 'Check .com', genMore: 'Generate more',
    step1: 'Enter 1-3 seed keywords that describe your product or service',
    step2: 'Pick a style (portmanteau, prefix, suffix, modern, latin)',
    step3: 'Click Generate Names to see fresh ideas',
    step4: 'Copy the names you like and verify domains on a registrar',
  },
  zh: {
    toolTitle: '公司名生成器',
    toolDesc: '从关键词快速生成数百个独特的公司和创业项目名称。混合造词、前缀、后缀和现代科技风格 — 完全浏览器本地运行。',
    copy: '复制', avail: '查看 .com', genMore: '生成更多',
    step1: '输入 1-3 个描述产品或服务的关键词',
    step2: '选择风格（造词、前缀、后缀、现代、拉丁词根）',
    step3: '点击「生成名称」查看新点子',
    step4: '复制喜欢的名称并在域名注册商验证',
  }
});

const PREFIXES = ['Nova','Lumi','Aero','Zen','Eco','Neo','Flux','Orbit','Peak','Pulse','Vista','Quantum','Nimbus','Apex','Vivid','Helio','Strato','Vertex','Solis','Aurora','Brio','Cipher','Quill','Tessera','Lumen','Onyx','Ember','Lyric','Reverie'];
const SUFFIXES = ['ly','ify','hub','lab','works','forge','craft','verse','wave','path','spark','mint','co','labs','io','ify','base','nest','line','core','works','forge','craft','verse','grid','sync','sphere','flow'];
const MODERN_SUFFIX = ['ly','ify','io','ai','hq','co','now','up','ly','verse'];
const LATIN_ROOTS = [
  ['aqua','water'],['terra','earth'],['ventus','wind'],['ignis','fire'],
  ['lux','light'],['nox','night'],['sol','sun'],['luna','moon'],
  ['veritas','truth'],['vita','life'],['fortis','strong'],['celer','swift'],
  ['novus','new'],['omnis','all'],['pax','peace'],['rex','king']
];
const SUFFIX_WORDS = ['works','lab','hub','co','studio','craft','forge','sphere','verse','path','grid','sync','flow','mind','line','wave','core','nest','mint','spark'];

const { $, t } = GZ;

function pick(arr) { return arr[Math.floor(Math.random()*arr.length)]; }
function cap(s) { return s.charAt(0).toUpperCase() + s.slice(1); }

function portmanteau(kws) {
  if (kws.length < 2) return [];
  const a = kws[0], b = kws[1];
  const cut = Math.max(1, Math.floor(a.length/2));
  return [cap(a.slice(0,cut) + b), cap(a + b.slice(0,Math.max(1, b.length-1))), cap(b.slice(0,2) + a)];
}

function genNames(kws, style, length, count) {
  const out = new Set();
  const safety = count * 10;
  let tries = 0;
  const filteredLengths = (n) => {
    if (length === 'any') return true;
    if (length === 'short') return n.length <= 6;
    if (length === 'medium') return n.length >= 7 && n.length <= 10;
    return n.length >= 11;
  };
  while (out.size < count && tries < safety) {
    tries++;
    const s = (style === 'all') ? pick(['portmanteau','prefix','suffix','modern','latin']) : style;
    let name = '';
    if (s === 'portmanteau') {
      const arr = portmanteau(kws);
      name = pick(arr);
    } else if (s === 'prefix') {
      const kw = pick(kws);
      const p = pick(PREFIXES);
      name = p + cap(kw);
    } else if (s === 'suffix') {
      const kw = pick(kws);
      name = cap(kw) + pick(SUFFIX_WORDS);
    } else if (s === 'modern') {
      const kw = pick(kws);
      const op = pick(['a','e','i','o','u','y','']);
      name = cap(kw) + op + pick(MODERN_SUFFIX);
    } else if (s === 'latin') {
      const [root, _] = pick(LATIN_ROOTS);
      const kw = pick(kws);
      name = cap(root) + cap(kw);
    }
    if (name && filteredLengths(name) && name.length > 2) out.add(name);
  }
  return [...out];
}

function render() {
  const rawKws = $('#keywords').value.split(',').map(s => s.trim().toLowerCase()).filter(s => /^[a-z]+$/.test(s));
  if (!rawKws.length) { $('#grid').innerHTML = '<div style="color:var(--gz-text2);grid-column:1/-1;text-align:center;padding:20px">Please enter at least one keyword.</div>'; return; }
  const style = $('#style').value;
  const length = $('#length').value;
  const count = +$('#count').value;
  const names = genNames(rawKws, style, length, count);
  const tlds = ['.com','.io','.co','.app','.ai','.net','.org'];
  $('#grid').innerHTML = names.map(n => {
    const tld = pick(tlds);
    return `<div class="bz-card">
      <button class="bz-copy" data-n="${n}">${t('copy')}</button>
      <div class="bz-name">${n}</div>
      <div class="bz-dom">${n.toLowerCase()}${tld}</div>
    </div>`;
  }).join('');
  $$('.bz-copy').forEach(b => b.addEventListener('click', () => GZ.copyText(b.dataset.n)));
}

$('#genBtn').addEventListener('click', render);
$('#keywords').addEventListener('input', () => { if ($('#keywords').value.length > 3) render(); });
['style','length','count'].forEach(id => $('#'+id).addEventListener('change', render));

render();

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🆔', href:'/text/username-generator.html', name:'Username Generator'},
    {icon:'✨', href:'/text/fancy-text.html', name:'Fancy Text'},
    {icon:'🔗', href:'/seo/utm-builder.html', name:'UTM Builder'},
  ]
});
</script>
