<script>
GZI18n.register({
  en:{toolTitle:'OpenAPI to Postman Converter',toolDesc:'Convert OpenAPI 3 JSON specs into importable Postman Collection v2.1 files with requests, variables and sample bodies.',groupTags:'group by tags',sampleBodies:'sample JSON bodies',baseUrl:'base URL override',inputLabel:'OpenAPI JSON input',outputLabel:'Postman Collection JSON',convert:'Convert',download:'Download collection',valid:'Converted',invalid:'Could not convert',step1:'Paste an OpenAPI 3.0 JSON specification into the input area.',step2:'Optionally override the base URL and choose tag grouping.',step3:'Click Convert to generate a Postman Collection v2.1 JSON file.',step4:'Download the collection and import it into Postman.'},
  zh:{toolTitle:'OpenAPI 转 Postman 转换器',toolDesc:'将 OpenAPI 3 JSON 规范转换为可导入的 Postman Collection v2.1，包含请求、变量和示例请求体。',groupTags:'按标签分组',sampleBodies:'生成示例 JSON 请求体',baseUrl:'覆盖 base URL',inputLabel:'OpenAPI JSON 输入',outputLabel:'Postman Collection JSON',convert:'转换',download:'下载集合',valid:'转换完成',invalid:'转换失败',step1:'在输入区粘贴 OpenAPI 3.0 JSON 规范。',step2:'可选择覆盖 base URL 并按 tag 分组。',step3:'点击「转换」生成 Postman Collection v2.1 JSON。',step4:'下载 collection 并导入 Postman。'}
});
const {$,copyText,t}=GZ; const methods=['get','post','put','patch','delete','head','options','trace'];
function sampleFromSchema(schema){
  if(!schema)return null; if(schema.example!==undefined)return schema.example; if(schema.default!==undefined)return schema.default;
  if(schema.$ref)return {}; if(schema.enum)return schema.enum[0];
  const type=schema.type||((schema.properties||schema.allOf)?'object':schema.items?'array':'string');
  if(type==='object'){const o={}; Object.entries(schema.properties||{}).forEach(([k,v])=>o[k]=sampleFromSchema(v)); return o}
  if(type==='array')return [sampleFromSchema(schema.items||{type:'string'})];
  if(type==='integer'||type==='number')return 0; if(type==='boolean')return true; return schema.format==='date-time'?'2026-07-07T00:00:00Z':'string';
}
function makeUrl(base,path,queryParams){
  const raw=(base||'{{baseUrl}}')+path; const clean=path.replace(/^\//,'').split('/').filter(Boolean);
  return {raw:raw+(queryParams.length?'?'+queryParams.map(p=>p.name+'='+encodeURIComponent('{{'+p.name+'}}')).join('&'):''),host:[base||'{{baseUrl}}'],path:clean,query:queryParams.map(p=>({key:p.name,value:'{{'+p.name+'}}',description:p.description||''}))};
}
function postmanItem(path,method,op,base){
  const params=[...(op.parameters||[])]; const query=params.filter(p=>p.in==='query'); const headers=params.filter(p=>p.in==='header').map(p=>({key:p.name,value:'{{'+p.name+'}}',description:p.description||''}));
  let body; const content=op.requestBody&&op.requestBody.content; const json=content&&(content['application/json']||content['application/*+json']);
  if($('#optBodies').checked&&json){body={mode:'raw',raw:JSON.stringify(sampleFromSchema(json.schema)||{},null,2),options:{raw:{language:'json'}}}; headers.push({key:'Content-Type',value:'application/json'});}
  return {name:op.summary||op.operationId||method.toUpperCase()+' '+path,request:{method:method.toUpperCase(),header:headers,url:makeUrl(base,path,query),description:op.description||'',...(body?{body}: {})},response:[]};
}
function convert(){
  const raw=$('#input').value.trim(); if(!raw){$('#output').textContent='';$('#status').textContent='';return}
  try{
    const spec=JSON.parse(raw); if(!spec.paths)throw new Error('Missing OpenAPI paths object');
    const base=$('#baseUrl').value.trim()||'{{baseUrl}}'; const collection={info:{name:(spec.info&&spec.info.title)||'OpenAPI Collection',description:(spec.info&&spec.info.description)||'',schema:'https://schema.getpostman.com/json/collection/v2.1.0/collection.json'},item:[],variable:[{key:'baseUrl',value:(spec.servers&&spec.servers[0]&&spec.servers[0].url)||'https://api.example.com'}]};
    const tagBuckets={}; let count=0;
    for(const [path,pathObj] of Object.entries(spec.paths||{})){
      for(const method of methods){ if(!pathObj[method])continue; const item=postmanItem(path,method,pathObj[method],base); count++; if($('#optTags').checked){const tag=(pathObj[method].tags&&pathObj[method].tags[0])||'Default'; (tagBuckets[tag]||(tagBuckets[tag]=[])).push(item)}else collection.item.push(item); }
    }
    if($('#optTags').checked) collection.item=Object.entries(tagBuckets).map(([name,item])=>({name,item}));
    $('#output').textContent=JSON.stringify(collection,null,2); $('#status').innerHTML=`<span style="color:var(--gz-success)">✓ ${t('valid')}: ${count} request(s), ${collection.item.length} folder(s)</span>`;
  }catch(e){$('#output').textContent=e.message; $('#status').innerHTML=`<span style="color:var(--gz-accent)">✗ ${t('invalid')}: ${e.message}</span>`}
}
function loadExample(){
  $('#input').value=JSON.stringify({openapi:'3.0.3',info:{title:'Store API',version:'1.0.0'},servers:[{url:'https://api.example.com'}],paths:{'/pets':{get:{tags:['Pets'],summary:'List pets',parameters:[{name:'limit',in:'query',schema:{type:'integer'},description:'Max results'}]},post:{tags:['Pets'],summary:'Create pet',requestBody:{content:{'application/json':{schema:{type:'object',properties:{name:{type:'string'},age:{type:'integer'},vaccinated:{type:'boolean'}}}}}}}},'/pets/{id}':{get:{tags:['Pets'],summary:'Get pet',parameters:[{name:'id',in:'path',required:true,schema:{type:'string'}}]}}}},null,2); convert();
}
function downloadCollection(){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([$('#output').textContent||'{}'],{type:'application/json'}));a.download='postman-collection.json';a.click();URL.revokeObjectURL(a.href)}
$('#input').addEventListener('input',convert);['tags','bodies','base'].forEach(k=>$('#lbl-'+k).textContent=t(k==='tags'?'groupTags':k==='bodies'?'sampleBodies':'baseUrl'));$('#lbl-in').textContent=t('inputLabel');$('#lbl-out').textContent=t('outputLabel');
$('#toolbar').innerHTML=`<button class="gz-btn" onclick="convert()">${t('convert')}</button><button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button><button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button><button class="gz-btn gz-btn-secondary" onclick="downloadCollection()">${t('download')}</button><button class="gz-btn gz-btn-secondary" onclick="$('#input').value='';convert()">${t('clear')}</button>`;
GZ.renderToolPage({category:'dev',titleKey:'toolTitle',descKey:'toolDesc',howToSteps:['step1','step2','step3','step4'],related:[{icon:'📡',href:'/dev/api-tester.html',name:'API Tester'},{icon:'◈',href:'/dev/graphql-explorer.html',name:'GraphQL Explorer'},{icon:'📘',href:'/dev/swagger-viewer.html',name:'Swagger Viewer'},{icon:'🔄',href:'/dev/curl-to-code.html',name:'cURL to Code'}]});
loadExample();
</script>
