let currentCategory = 'all';
let currentQuote = null;
let currentLang = 'en';

function pickFromCategory(cat) {
  const pool = cat === 'all' ? QUOTES : QUOTES.filter(q => q.c === cat);
  return pool[Math.floor(Math.random() * pool.length)];
}

function isFav(q) {
  const favs = JSON.parse(localStorage.getItem('motq_favs') || '[]');
  return favs.some(f => f.q === q.q && f.a === q.a);
}

function toggleFav() {
  const favs = JSON.parse(localStorage.getItem('motq_favs') || '[]');
  const idx = favs.findIndex(f => f.q === currentQuote.q && f.a === currentQuote.a);
  if (idx >= 0) favs.splice(idx, 1);
  else favs.push({q: currentQuote.q, a: currentQuote.a, c: currentQuote.c});
  localStorage.setItem('motq_favs', JSON.stringify(favs));
  render();
  renderFavs();
}

function newQuote() {
  currentQuote = pickFromCategory(currentCategory);
  render();
}

function share() {
  const text = `"${currentQuote.q}" — ${currentQuote.a}\n\nvia GameZipper Tools`;
  copyText(text);
}

function downloadImg() {
  const c = document.createElement('canvas');
  c.width = 1200; c.height = 630;
  const ctx = c.getContext('2d');
  const grd = ctx.createLinearGradient(0, 0, 1200, 630);
  grd.addColorStop(0, '#1a1a2e'); grd.addColorStop(1, '#16213e');
  ctx.fillStyle = grd; ctx.fillRect(0, 0, 1200, 630);
  ctx.fillStyle = 'rgba(233, 69, 96, 0.3)';
  ctx.font = 'bold 200px Georgia, serif';
  ctx.fillText('"', 100, 280);
  ctx.fillStyle = '#fff';
  ctx.font = 'italic 32px Georgia, serif';
  const words = currentQuote.q.split(' ');
  let line = '', y = 300;
  for (const word of words) {
    const test = line + word + ' ';
    if (ctx.measureText(test).width > 1000) { ctx.fillText(line, 100, y); line = word + ' '; y += 50; }
    else line = test;
  }
  ctx.fillText(line, 100, y);
  ctx.font = 'bold 24px sans-serif';
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  ctx.fillText(`— ${currentQuote.a}`, 100, 530);
  ctx.font = '16px sans-serif';
  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  ctx.fillText('GameZipper Tools', 100, 580);
  const url = c.toDataURL('image/png');
  const a = document.createElement('a');
  a.href = url; a.download = 'motivational-quote.png'; a.click();
}

function render() {
  $('#qText').textContent = currentQuote.q;
  $('#qAuthor').textContent = '— ' + currentQuote.a;
  const fav = isFav(currentQuote);
  $('#actions').innerHTML = `
    <button class="gz-btn" onclick="newQuote()">${t('newQuote')}</button>
    <button class="gz-btn gz-btn-secondary" onclick="toggleFav()">${fav ? t('unfav') : t('fav')}</button>
    <button class="gz-btn gz-btn-secondary" onclick="share()">${t('share')}</button>
    <button class="gz-btn gz-btn-secondary" onclick="downloadImg()">${t('download')}</button>`;
  const total = currentCategory === 'all' ? QUOTES.length : QUOTES.filter(q => q.c === currentCategory).length;
  $('#stats').textContent = `Showing 1 of ${total} quotes in this category`;
}

function renderCats() {
  const cats = ['all','success','perseverance','leadership','happiness','confidence','change','love','wisdom'];
  $('#cats').innerHTML = cats.map(c =>
    `<button class="q-cat${c === currentCategory ? ' active' : ''}" data-c="${c}">${t('cat' + c[0].toUpperCase() + c.slice(1))}</button>`
  ).join('');
  document.querySelectorAll('.q-cat').forEach(btn => {
    btn.onclick = () => { currentCategory = btn.dataset.c; renderCats(); newQuote(); };
  });
}

function renderFavs() {
  const favs = JSON.parse(localStorage.getItem('motq_favs') || '[]');
  if (!favs.length) { $('#favs').style.display = 'none'; return; }
  $('#favs').style.display = 'block';
  $('#lblFavs').textContent = t('saved') + ` (${favs.length})`;
  $('#favList').innerHTML = favs.map(f => `
    <div class="q-fav">
      <div class="q-fav-text">"${f.q}" <span style="opacity:.6">— ${f.a}</span></div>
      <button class="q-fav-del" data-q="${encodeURIComponent(f.q)}" data-a="${encodeURIComponent(f.a)}">✕</button>
    </div>`).join('');
  document.querySelectorAll('.q-fav-del').forEach(btn => {
    btn.onclick = () => {
      const q = decodeURIComponent(btn.dataset.q);
      const a = decodeURIComponent(btn.dataset.a);
      let favs = JSON.parse(localStorage.getItem('motq_favs') || '[]');
      favs = favs.filter(f => !(f.q === q && f.a === a));
      localStorage.setItem('motq_favs', JSON.stringify(favs));
      renderFavs(); render();
    };
  });
}

$('#toolbar').innerHTML = '';
renderCats();
newQuote();
renderFavs();
