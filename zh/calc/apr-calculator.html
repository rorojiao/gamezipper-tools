<script>
GZI18n.register({
  en: {
    toolTitle: 'APR Calculator',
    toolDesc: 'Calculate the true Annual Percentage Rate (APR) for any loan. See how fees affect your real borrowing cost.',

    rate: 'Nominal interest rate (% per year)',

    step4: 'See the true APR and monthly payment instantly',
  },
  zh: {
    toolTitle: 'APR 计算器（年化百分比利率）',
    toolDesc: '计算任意贷款的真实年化百分比利率（APR）。查看手续费如何影响实际借款成本。',
    loan: '贷款金额（美元）',
    rate: '名义年利率（%）',
    fees: '前期费用（美元）',
    term: '贷款期限（月）',
    calc: '计算 APR',
    aprLabel: '实际年化利率 APR',
    monthlyPayment: '每月还款额',
    totalPaid: '总还款金额',
    totalInterest: '总利息 + 费用',
    step1: '输入你想借款的金额',
    step2: '输入贷款机构报出的名义年利率',
    step3: '添加任何前期费用（手续费、过户费等）',
    step4: '即时查看真实 APR 和每月还款额',
  }
});

const { $, t } = GZ;

// Newton's method to solve for APR
function calcAPR(loanAmount, fees, monthlyRate, numMonths) {
  const netLoan = loanAmount - fees;
  if (netLoan <= 0) return 0;
  const monthlyPayment = loanAmount * monthlyRate / (1 - Math.pow(1 + monthlyRate, -numMonths));
  // Solve for rate where PMT(rate, n, -netLoan) = monthlyPayment
  let aprMonthly = monthlyRate;
  for (let iter = 0; iter < 100; iter++) {
    const f = netLoan * aprMonthly * Math.pow(1 + aprMonthly, numMonths) / (Math.pow(1 + aprMonthly, numMonths) - 1) - monthlyPayment;
    const deriv = netLoan * (Math.pow(1 + aprMonthly, numMonths) * (aprMonthly * numMonths / (1 + aprMonthly) - 1) + 1) / Math.pow(Math.pow(1 + aprMonthly, numMonths) - 1, 2);
    if (Math.abs(deriv) < 1e-12) break;
    const delta = f / deriv;
    aprMonthly -= delta;
    if (Math.abs(delta) < 1e-10) break;
  }
  return aprMonthly * 12;
}

function calc() {
  const loan = parseFloat($('#loan').value) || 0;
  const rate = (parseFloat($('#rate').value) || 0) / 100;
  const fees = parseFloat($('#fees').value) || 0;
  const months = parseInt($('#term').value) || 1;

  const monthlyRate = rate / 12;
  const monthlyPayment = loan * monthlyRate / (1 - Math.pow(1 + monthlyRate, -months));
  const totalPaid = monthlyPayment * months;
  const totalCost = totalPaid - loan + fees;
  const apr = calcAPR(loan, fees, monthlyRate, months);

  $('#result').innerHTML = `
    <div style="text-align:center;margin-bottom:12px">
      <div style="font-size:.8rem;color:var(--text2)">${t('aprLabel')}</div>
      <div class="gz-result-big">${(apr * 100).toFixed(3)}%</div>
    </div>
    <div class="gz-result-row"><span class="gz-result-label">${t('monthlyPayment')}</span><span class="gz-result-value">$${monthlyPayment.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})}</span></div>
    <div class="gz-result-row"><span class="gz-result-label">${t('totalPaid')}</span><span class="gz-result-value">$${totalPaid.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})}</span></div>
    <div class="gz-result-row"><span class="gz-result-label">${t('totalInterest')}</span><span class="gz-result-value" style="color:var(--gz-accent)">$${totalCost.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})}</span></div>
  `;
}

['loan','rate','fees','term'].forEach(id => $('#' + id).addEventListener('input', calc));

$('#toolbar').innerHTML = `<button class="gz-btn" onclick="calc()">${t('calc')}</button>`;

calc();

  descKey: 'toolDesc',

    {icon:'🚗', href:'/calc/car-loan-calculator.html', name:'Car Loan Calculator'},
  ]
});
</script>
