const { t, $ } = GZ;

function escHtml(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function getText(elem, tag) {
  const e = elem.getElementsByTagName(tag)[0];
  return e ? (e.textContent || '').trim() : '';
}

function validate(xmlText) {
  const out = $('#rv-output');
  if (!xmlText.trim()) {
    out.innerHTML = '';
    return;
  }
  const parser = new DOMParser();
  const doc = parser.parseFromString(xmlText, 'application/xml');
  const parserError = doc.querySelector('parsererror');
  if (parserError) {
    out.innerHTML = `<div class="rv-result err"><strong>✗ Invalid XML</strong><br>${escHtml(parserError.textContent.split('\n')[0] || 'Could not parse XML')}</div>`;
    return;
  }

  const root = doc.documentElement;
  if (!root) {
    out.innerHTML = `<div class="rv-result err"><strong>✗ Empty document</strong></div>`;
    return;
  }

  const tag = root.tagName.toLowerCase();
  let feedType = '', channelTitle = '', channelLink = '', channelDesc = '', items = [];

  if (tag === 'rss') {
    const ver = root.getAttribute('version') || '2.0';
    feedType = `RSS ${ver}`;
    const channel = root.getElementsByTagName('channel')[0];
    if (channel) {
      channelTitle = getText(channel, 'title');
      channelLink = getText(channel, 'link');
      channelDesc = getText(channel, 'description');
      const itemNodes = channel.getElementsByTagName('item');
      for (let i = 0; i < itemNodes.length; i++) {
        const it = itemNodes[i];
        items.push({
          title: getText(it, 'title'),
          link: getText(it, 'link'),
          desc: getText(it, 'description'),
          pubDate: getText(it, 'pubDate') || getText(it, 'date'),
          guid: getText(it, 'guid'),
        });
      }
    }
  } else if (tag === 'feed') {
    feedType = 'Atom 1.0';
    channelTitle = getText(root, 'title');
    // Atom: <link href="..."/>
    const linkNode = root.getElementsByTagName('link')[0];
    if (linkNode) channelLink = linkNode.getAttribute('href') || '';
    channelDesc = getText(root, 'subtitle');
    const entries = root.getElementsByTagName('entry');
    for (let i = 0; i < entries.length; i++) {
      const e = entries[i];
      const eLink = e.getElementsByTagName('link')[0];
      items.push({
        title: getText(e, 'title'),
        link: eLink ? (eLink.getAttribute('href') || '') : '',
        desc: getText(e, 'summary') || getText(e, 'content'),
        pubDate: getText(e, 'published') || getText(e, 'updated'),
        guid: getText(e, 'id'),
      });
    }
  } else if (tag === 'rdf') {
    feedType = 'RSS 1.0 (RDF)';
    channelTitle = getText(root, 'channel') || '';
    const items1 = root.getElementsByTagName('item');
    for (let i = 0; i < items1.length; i++) {
      const it = items1[i];
      const linkNode = it.getElementsByTagName('link')[0];
      items.push({
        title: getText(it, 'title'),
        link: linkNode ? linkNode.textContent.trim() : '',
        desc: getText(it, 'description'),
        pubDate: '',
        guid: '',
      });
    }
  } else {
    out.innerHTML = `<div class="rv-result err"><strong>✗ Unknown feed format</strong><br>Root element is <code>&lt;${escHtml(tag)}&gt;</code>. Expected <code>&lt;rss&gt;</code>, <code>&lt;feed&gt;</code> or <code>&lt;rdf&gt;</code>.</div>`;
    return;
  }

  // Validate required fields
  const issues = [];
  if (!channelTitle) issues.push('Missing channel/feed <title>');
  if (!channelLink) issues.push('Missing channel/feed <link>');
  if (!channelDesc) issues.push('Missing channel/feed <description>');

  let html = '';
  if (issues.length === 0) {
    html += `<div class="rv-result ok"><strong>✓ Valid ${feedType} feed</strong> — ${items.length} item${items.length !== 1 ? 's' : ''}</div>`;
  } else {
    html += `<div class="rv-result warn"><strong>⚠ Feed has issues</strong><ul style="margin:6px 0 0 18px;padding:0">`;
    issues.forEach(i => { html += `<li>${i}</li>`; });
    html += `</ul></div>`;
  }

  html += `<div class="rv-meta">
    <div><strong>Feed Type:</strong><br>${escHtml(feedType)}</div>
    <div><strong>Title:</strong><br>${escHtml(channelTitle || '(missing)')}</div>
    <div><strong>Link:</strong><br>${channelLink ? `<a href="${escHtml(channelLink)}" target="_blank" rel="noopener" style="color:var(--accent)">${escHtml(channelLink)}</a>` : '(missing)'}</div>
    <div><strong>Description:</strong><br>${escHtml((channelDesc || '').substring(0, 120))}${(channelDesc||'').length > 120 ? '...' : ''}</div>
    <div><strong>Items:</strong><br>${items.length}</div>
  </div>`;

  if (items.length > 0) {
    html += `<h3 style="margin:14px 0 8px;font-size:1em">Items (showing up to 10)</h3>`;
    const shown = items.slice(0, 10);
    shown.forEach((it, i) => {
      html += `<div class="rv-item">
        <h4>${i+1}. ${escHtml(it.title || '(no title)')}</h4>
        ${it.link ? `<a href="${escHtml(it.link)}" target="_blank" rel="noopener">${escHtml(it.link.length > 70 ? it.link.substring(0, 70) + '...' : it.link)}</a>` : '<em>(no link)</em>'}
        ${it.desc ? `<div style="margin-top:4px;color:var(--text2)">${escHtml(it.desc.substring(0, 200))}${it.desc.length > 200 ? '...' : ''}</div>` : ''}
        ${it.pubDate ? `<div class="pub">📅 ${escHtml(it.pubDate)}</div>` : ''}
      </div>`;
    });
    if (items.length > 10) {
      html += `<p style="color:var(--text3);font-size:.85em">... and ${items.length - 10} more items</p>`;
    }
  }

  out.innerHTML = html;
}

async function fetchFeed() {
  const url = $('#feed-url').value.trim();
  if (!url) return;
  const out = $('#rv-output');
  out.innerHTML = '<div class="rv-result warn">Fetching feed...</div>';
  try {
    const res = await fetch(url);
    if (!res.ok) {
      out.innerHTML = `<div class="rv-result err"><strong>✗ HTTP ${res.status}</strong> — Could not fetch feed from URL</div>`;
      return;
    }
    const text = await res.text();
    $('#feed-xml').value = text;
    validate(text);
  } catch (e) {
    out.innerHTML = `<div class="rv-result err"><strong>✗ Fetch error</strong> — ${escHtml(e.message || String(e))}<br><span style="font-size:.85em;color:var(--text3)">Note: CORS may block direct fetches from some sites. Try pasting the raw XML instead.</span></div>`;
  }
}

$('#feed-xml').addEventListener('input', () => validate($('#feed-xml').value));
$('#fetch-btn').addEventListener('click', fetchFeed);
$('#feed-url').addEventListener('keydown', e => { if (e.key === 'Enter') fetchFeed(); });

$('#lbl-url').textContent = t('url');
$('#lbl-input').textContent = t('input');
$('#fetch-btn').textContent = 'Fetch & Validate';

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="$('#feed-xml').value='';$('#feed-url').value='';$('#rv-output').innerHTML=''">${t('clear')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#feed-xml').value='<?xml version=\"1.0\" encoding=\"UTF-8\"?>\\n<rss version=\"2.0\">\\n<channel>\\n<title>Example Blog</title>\\n<link>https://example.com</link>\\n<description>A blog about technology</description>\\n<language>en-us</language>\\n<item>\\n<title>Hello World</title>\\n<link>https://example.com/hello</link>\\n<description>Our first post</description>\\n<pubDate>Mon, 14 Jul 2026 10:00:00 GMT</pubDate>\\n<guid>https://example.com/hello</guid>\\n</item>\\n<item>\\n<title>Second Post</title>\\n<link>https://example.com/second</link>\\n<description>Another update</description>\\n<pubDate>Tue, 15 Jul 2026 12:00:00 GMT</pubDate>\\n<guid>https://example.com/second</guid>\\n</item>\\n</channel>\\n</rss>';validate($('#feed-xml').value)">${t('example')}</button>`;

    {icon:'📋', href:'/dev/json.html', name: 'JSON Formatter'},
    {icon:'📄', href:'/dev/xml-formatter.html', name: 'XML Formatter'},
  ]
});
</script>
