<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is a Diceware passphrase?", "acceptedAnswer": {"@type": "Answer", "text": "Diceware is a method of creating strong passphrases by rolling dice to randomly pick words from a fixed list. The official EFF word list has 7,776 words; each word contributes about 12.9 bits of entropy, so a 6-word passphrase has roughly 77 bits of entropy — strong enough to resist brute-force for centuries."}}, {"@type": "Question", "name": "How many words do I need for a secure passphrase?", "acceptedAnswer": {"@type": "Answer", "text": "For most personal accounts 4 words (~52 bits) is reasonable, 5 words (~64 bits) is good, and 6 words (~77 bits) is excellent. Critical accounts (master password, encryption key) should use 7+ words or add extra entropy with random digits and symbols."}}, {"@type": "Question", "name": "Are passphrases better than random passwords?", "acceptedAnswer": {"@type": "Answer", "text": "For human-memorized passwords, yes. A 4-word passphrase is much easier to remember than an 8-character random string of mixed case + digits + symbols, and provides more entropy. For machine-stored passwords (a password manager) any random string works equally well."}}, {"@type": "Question", "name": "Is this generator safe to use for real passwords?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. The word list and all randomization happen in your browser. No data is uploaded, no network requests are made, and the page works fully offline once loaded. For maximum assurance, disconnect from the internet before generating your most critical passphrase."}}]}</script>

const $ = s => document.querySelector(s);
const { t, copyText, getLang } = GZ;

function pickWord() {
  // Use crypto.getRandomValues for unbiased choice
  const max = EFF_LIST.length;
  const arr = new Uint32Array(1);
  const limit = Math.floor(0xFFFFFFFF / max) * max;
  let r;
  do { crypto.getRandomValues(arr); r = arr[0]; } while (r >= limit);
  return EFF_LIST[r % max];
}

function randInt(n) {
  const arr = new Uint32Array(1);
  crypto.getRandomValues(arr);
  return arr[0] % n;
}
const DIGITS = '0123456789';
const SYMBOLS = '!@#$%^&*+=?/';

function applyCase(word, mode, capFirst) {
  if (mode === 'UPPER') return word.toUpperCase();
  if (mode === 'Title') return word.charAt(0).toUpperCase() + word.slice(1);
  if (mode === 'aLtEr') {
    let s = '';
    for (let i = 0; i < word.length; i++) s += i % 2 === 0 ? word[i].toLowerCase() : word[i].toUpperCase();
    return s;
  }
  return capFirst ? word.charAt(0).toUpperCase() + word.slice(1) : word;
}

function generate() {
  const n = Math.max(2, Math.min(12, parseInt($('#words').value) || 5));
  const sep = $('#sep').value;
  const mode = $('#casing').value;
  const addDigit = $('#addDigit').checked;
  const addSymbol = $('#addSymbol').checked;
  const capFirst = $('#capFirst').checked;
  const words = [];
  for (let i = 0; i < n; i++) words.push(applyCase(pickWord(), mode, capFirst));
  let phrase = words.join(sep);
  if (addDigit) phrase += sep + DIGITS[randInt(DIGITS.length)];
  if (addSymbol) phrase += sep + SYMBOLS[randInt(SYMBOLS.length)];
  return phrase;
}

function entropyBits(phrase, addDigit, addSymbol) {
  const base = EFF_LIST.length;
  const sepChoice = parseInt(document.getElementById('sep').selectedOptions[0]?.value?.length || '1') || 1;
  const words = parseInt($('#words').value) || 5;
  const log2 = (x) => Math.log(x) / Math.log(2);
  let bits = words * log2(base);
  if (addDigit) bits += log2(10);
  if (addSymbol) bits += log2(SYMBOLS.length);
  return Math.round(bits * 10) / 10;
}

function strengthLabel(bits) {
  if (bits < 40) return { lbl: t('weak'), pct: Math.min(100, bits * 2.5), color: '#e94560' };
  if (bits < 60) return { lbl: t('fair'), pct: Math.min(100, 50 + (bits - 40) * 2.5), color: '#ffd93d' };
  if (bits < 80) return { lbl: t('strong'), pct: Math.min(100, 70 + (bits - 60) * 1.5), color: '#4ecdc4' };
  return { lbl: t('veryStrong'), pct: 100, color: '#00d672' };
}

function crackTime(bits) {
  // Assume 10 billion guesses per second
  const guesses = Math.pow(2, bits);
  const seconds = guesses / 1e10;
  if (seconds < 1) return 'instant';
  if (seconds < 60) return `${Math.round(seconds)}s`;
  if (seconds < 3600) return `${Math.round(seconds / 60)} min`;
  if (seconds < 86400) return `${Math.round(seconds / 3600)} hrs`;
  if (seconds < 31536000) return `${Math.round(seconds / 86400)} days`;
  const years = seconds / 31536000;
  if (years < 1000) return `${Math.round(years)} years`;
  if (years < 1e6) return `${Math.round(years / 1000)}K years`;
  if (years < 1e9) return `${Math.round(years / 1e6)}M years`;
  if (years < 1e12) return `${Math.round(years / 1e9)}B years`;
  return 'heat death of universe';
}

function updateStats(phrase) {
  const bits = entropyBits(phrase, $('#addDigit').checked, $('#addSymbol').checked);
  const str = strengthLabel(bits);
  $('#stats').innerHTML = `
    <div class="stat-card"><div class="num">${bits}</div><div class="lbl">${t('entropy')} (bits)</div></div>
    <div class="stat-card"><div class="num">${phrase.length}</div><div class="lbl">${t('charCount')}</div></div>
    <div class="stat-card"><div class="num">${str.lbl}</div><div class="lbl">${t('strength')}</div><div class="strength-bar"><div style="width:${str.pct}%;background:${str.color}"></div></div></div>
    <div class="stat-card"><div class="num" style="font-size:.95em">${crackTime(bits)}</div><div class="lbl">${t('crack')}</div></div>`;
}

function doGenerate() {
  const p = generate();
  $('#passphrase').textContent = p;
  updateStats(p);
}

function doExamples() {
  const ex = [];
  for (let i = 0; i < 5; i++) ex.push(generate());
  $('#ex-list').innerHTML = ex.map(p => `<code>${p}</code>`).join('');
}

  <button class="gz-btn gz-btn-secondary" onclick="doExamples()">${t('examples')}</button>`;
