<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "How do I remove line breaks from text?", "acceptedAnswer": {"@type": "Answer", "text": "Paste your text into the input area, choose how you want to handle line breaks (remove all, replace with space, or custom separator), then click Convert."}}, {"@type": "Question", "name": "What is the difference between removing all breaks and replacing with space?", "acceptedAnswer": {"@type": "Answer", "text": "Removing all breaks joins all text into one continuous line. Replacing with space keeps words separated, preventing them from merging together."}}, {"@type": "Question", "name": "Can I preserve paragraph breaks?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. Use the 'Merge paragraphs' mode which removes single line breaks but keeps double line breaks (paragraph boundaries) intact."}}, {"@type": "Question", "name": "Why does my pasted text have weird line breaks?", "acceptedAnswer": {"@type": "Answer", "text": "Text copied from PDFs, emails or websites often contains formatting line breaks. This tool cleans them up for use in spreadsheets, code or forms."}}]}</script>

<script>
GZI18n.register({
  en: {
    toolTitle: 'Remove Line Breaks',
    toolDesc: 'Remove line breaks and unwanted newlines from text. Merge into a single line or replace with custom separators.',
    removeAll: 'Remove all breaks',
    replaceSpace: 'Replace with space',
    mergePara: 'Merge paragraphs',
    customSep: 'Custom separator',
    separator: 'Separator',
    removeCR: 'Remove carriage returns (\\r)',
    linesRemoved: 'line breaks removed',
    step1: 'Paste your text containing unwanted line breaks',
    step2: 'Choose how to handle line breaks',
    step3: 'Click Convert to process',
    step4: 'Copy the cleaned result',
  },
  zh: {
    toolTitle: '去除换行符',
    toolDesc: '去除文本中的换行符和不需要的换行。合并为单行或用自定义分隔符替换。',
    removeAll: '删除所有换行',
    replaceSpace: '替换为空格',
    mergePara: '合并段落',
    customSep: '自定义分隔符',
    separator: '分隔符',
    removeCR: '去除回车符（\\r）',
    linesRemoved: '个换行已删除',
    step1: '粘贴包含换行符的文本',
    step2: '选择换行处理方式',
    step3: '点击「转换」处理文本',
    step4: '复制处理后的结果',
  }
});

const { $, copyText, t } = GZ;
let mode = 'remove';

function renderOptions() {
  $('#options').innerHTML = `
    <label><input type="radio" name="mode" value="remove" ${mode==='remove'?'checked':''} onchange="mode=this.value;doConvert()"> ${t('removeAll')}</label>
    <label><input type="radio" name="mode" value="space" ${mode==='space'?'checked':''} onchange="mode=this.value;doConvert()"> ${t('replaceSpace')}</label>
    <label><input type="radio" name="mode" value="para" ${mode==='para'?'checked':''} onchange="mode=this.value;doConvert()"> ${t('mergePara')}</label>
    <label><input type="radio" name="mode" value="custom" ${mode==='custom'?'checked':''} onchange="mode=this.value;doConvert()"> ${t('customSep')}</label>
    <input type="text" id="custom-sep" value=" " style="width:80px;padding:4px 8px;background:var(--glass);border:1px solid var(--border);border-radius:6px;color:inherit;font-size:.9em" placeholder="${t('separator')}">`;
}

function doConvert() {
  const inp = $('#input').value;
  if (!inp) { $('#output').textContent = ''; $('#stat').textContent = ''; return; }

  let text = inp;
  // Normalize line endings
  text = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n');

  let result = '';
  let count = (text.match(/\n/g) || []).length;

  switch(mode) {
    case 'remove':
      result = text.replace(/\n/g, '');
      break;
    case 'space':
      result = text.replace(/\n/g, ' ').replace(/  +/g, ' ');
      break;
    case 'para':
      // Remove single line breaks but keep double (paragraph) breaks
      result = text.replace(/([^\n])\n([^\n])/g, '$1 $2').replace(/  +/g, ' ');
      break;
    case 'custom':
      const sep = $('#custom-sep').value;
      result = text.replace(/\n/g, sep);
      break;
  }

  $('#output').textContent = result;
  $('#stat').textContent = `${count} ${t('linesRemoved')}`;
}

function loadExample() {
  $('#input').value = `This is a paragraph that was copied\nfrom a PDF and has annoying\nline breaks in random places.\n\nThis is a second paragraph\nthat also has unwanted\nline breaks throughout the text.`;
  doConvert();
}

function doClear() { $('#input').value = ''; $('#output').textContent = ''; $('#stat').textContent = ''; }

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="doConvert()">${t('convert')||'Convert'}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

renderOptions();

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🧹', href:'/text/whitespace-remover.html', name:'Whitespace Remover'},
    {icon:'⬜', href:'/text/remove-empty-lines.html', name:'Remove Empty Lines'},
    {icon:'↕️', href:'/text/sort-lines.html', name:'Sort Lines'},
    {icon:'➕', href:'/text/add-prefix-suffix.html', name:'Add Prefix/Suffix'},
  ]
});
</script>
