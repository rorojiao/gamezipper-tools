<script>
GZI18n.register({
  en: {
    toolTitle: 'CSS Keyframe Animation Generator',
    toolDesc: 'Create custom CSS @keyframes animations visually. Set transforms, opacity and timing. Live preview, one-click copy. Free, browser-only.',
    duration: 'Duration (s)',
    timing: 'Timing Function',
    delay: 'Delay (s)',

    step2: 'Adjust duration, timing and other animation properties',
    step3: 'Add or edit keyframe breakpoints with transforms',
    step4: 'Copy the generated CSS into your project',
    presets: 'Presets',
    normal: 'Normal',
  },
  zh: {
    toolTitle: 'CSS 关键帧动画生成器',
    toolDesc: '可视化创建自定义 CSS @keyframes 动画。设置变换、透明度和时间。实时预览，一键复制。免费，浏览器本地运行。',
    duration: '持续时间（秒）',
    timing: '缓动函数',
    delay: '延迟（秒）',
    iteration: '循环次数',
    direction: '方向',
    fillMode: '填充模式',
    playState: '播放状态',
    keyframes: '关键帧',
    addKeyframe: '+ 添加关键帧',
    codeTitle: '生成的 CSS',
    copy: '复制 CSS',
    step1: '选择预设或从头开始',
    step2: '调整持续时间、缓动和其他动画属性',
    step3: '添加或编辑带变换的关键帧断点',
    step4: '将生成的 CSS 复制到你的项目中',
    presets: '预设',
    normal: '常规',
  }
});

const { $, copyText, t } = GZ;

let anim = {
  duration: 2,
  timing: 'ease-in-out',
  delay: 0,
  iteration: 'infinite',
  direction: 'alternate',
  fillMode: 'forwards',
  playState: 'running'
};

let keyframes = [
  { pct: 0, tx: 0, ty: 0, rotate: 0, scale: 1, skewX: 0, skewY: 0, opacity: 1, bg: '#4ecdc4' },
  { pct: 50, tx: 0, ty: -40, rotate: 0, scale: 1.1, skewX: 0, skewY: 0, opacity: 1, bg: '#4ecdc4' },
  { pct: 100, tx: 0, ty: 0, rotate: 0, scale: 1, skewX: 0, skewY: 0, opacity: 1, bg: '#4ecdc4' }
];

const presets = [
  { name: 'Bounce', icon: '⚽', kf: [
    {pct:0,tx:0,ty:0,rotate:0,scale:1,skewX:0,skewY:0,opacity:1,bg:'#4ecdc4'},
    {pct:50,tx:0,ty:-80,rotate:0,scale:1,skewX:0,skewY:0,opacity:1,bg:'#4ecdc4'},
    {pct:100,tx:0,ty:0,rotate:0,scale:1,skewX:0,skewY:0,opacity:1,bg:'#4ecdc4'}
  ], props: {duration:1,timing:'cubic-bezier(.5,0,.5,1)',direction:'alternate'}},
  { name: 'Fade In', icon: '🌅', kf: [
    {pct:0,tx:0,ty:0,rotate:0,scale:1,skewX:0,skewY:0,opacity:0,bg:'#4ecdc4'},
    {pct:100,tx:0,ty:0,rotate:0,scale:1,skewX:0,skewY:0,opacity:1,bg:'#4ecdc4'}
  ], props: {duration:1.5,timing:'ease-in',direction:'normal'}},
  { name: 'Rotate', icon: '🔄', kf: [
    {pct:0,tx:0,ty:0,rotate:0,scale:1,skewX:0,skewY:0,opacity:1,bg:'#4ecdc4'},
    {pct:100,tx:0,ty:0,rotate:360,scale:1,skewX:0,skewY:0,opacity:1,bg:'#4ecdc4'}
  ], props: {duration:2,timing:'linear',direction:'normal'}},
  { name: 'Pulse', icon: '💓', kf: [
    {pct:0,tx:0,ty:0,rotate:0,scale:1,skewX:0,skewY:0,opacity:1,bg:'#e94560'},
    {pct:50,tx:0,ty:0,rotate:0,scale:1.3,skewX:0,skewY:0,opacity:.7,bg:'#e94560'},
    {pct:100,tx:0,ty:0,rotate:0,scale:1,skewX:0,skewY:0,opacity:1,bg:'#e94560'}
  ], props: {duration:1,timing:'ease-in-out',direction:'normal'}},
  { name: 'Slide', icon: '➡️', kf: [
    {pct:0,tx:-200,ty:0,rotate:0,scale:1,skewX:0,skewY:0,opacity:0,bg:'#4ecdc4'},
    {pct:100,tx:0,ty:0,rotate:0,scale:1,skewX:0,skewY:0,opacity:1,bg:'#4ecdc4'}
  ], props: {duration:1,timing:'ease-out',fillMode:'forwards',direction:'normal',iteration:1}},
  { name: 'Shake', icon: '📳', kf: [
    {pct:0,tx:0,ty:0,rotate:0,scale:1,skewX:0,skewY:0,opacity:1,bg:'#4ecdc4'},
    {pct:25,tx:-10,ty:0,rotate:0,scale:1,skewX:0,skewY:0,opacity:1,bg:'#4ecdc4'},
    {pct:75,tx:10,ty:0,rotate:0,scale:1,skewX:0,skewY:0,opacity:1,bg:'#4ecdc4'},
    {pct:100,tx:0,ty:0,rotate:0,scale:1,skewX:0,skewY:0,opacity:1,bg:'#4ecdc4'}
  ], props: {duration:.5,timing:'ease-in-out',direction:'alternate'}},
  { name: 'Flip', icon: '🃏', kf: [
    {pct:0,tx:0,ty:0,rotate:0,scale:1,skewX:0,skewY:0,opacity:1,bg:'#4ecdc4'},
    {pct:50,tx:0,ty:0,rotate:180,scale:.8,skewX:0,skewY:0,opacity:.5,bg:'#4ecdc4'},
    {pct:100,tx:0,ty:0,rotate:360,scale:1,skewX:0,skewY:0,opacity:1,bg:'#4ecdc4'}
  ], props: {duration:1.5,timing:'ease-in-out',direction:'normal'}},
  { name: 'Wobble', icon: '🌊', kf: [
    {pct:0,tx:0,ty:0,rotate:-8,scale:1,skewX:0,skewY:0,opacity:1,bg:'#4ecdc4'},
    {pct:50,tx:0,ty:0,rotate:8,scale:1,skewX:0,skewY:0,opacity:1,bg:'#4ecdc4'},
    {pct:100,tx:0,ty:0,rotate:0,scale:1,skewX:0,skewY:0,opacity:1,bg:'#4ecdc4'}
  ], props: {duration:1,timing:'ease-in-out',direction:'alternate'}}
];

function renderPresets() {
  $('#presets').innerHTML = presets.map((p,i) =>
    `<button class="preset-btn" onclick="loadPreset(${i})">${p.icon} ${p.name}</button>`
  ).join('');
}

function loadPreset(i) {
  keyframes = JSON.parse(JSON.stringify(presets[i].kf));
  Object.assign(anim, presets[i].props);
  renderControls();
  renderKeyframes();
  updatePreview();
}

function renderControls() {
  const timingOpts = ['linear','ease','ease-in','ease-out','ease-in-out','cubic-bezier(.68,-.55,.265,1.55)','steps(8)'];
  $('#animControls').innerHTML = `
    <div><label>${t('duration')}</label><input type="number" step="0.1" min="0.1" value="${anim.duration}" oninput="anim.duration=+this.value;updatePreview()"></div>
    <div><label>${t('timing')}</label><select onchange="anim.timing=this.value;updatePreview()">${timingOpts.map(o=>`<option ${anim.timing===o?'selected':''}>${o}</option>`).join('')}</select></div>
    <div><label>${t('delay')}</label><input type="number" step="0.1" min="0" value="${anim.delay}" oninput="anim.delay=+this.value;updatePreview()"></div>
    <div><label>${t('iteration')}</label><select onchange="anim.iteration=this.value;updatePreview()"><option ${anim.iteration==='infinite'?'selected':''}>infinite</option>${[1,2,3,5,10].map(n=>`<option ${anim.iteration==n?'selected':''}>${n}</option>`).join('')}</select></div>
    <div><label>${t('direction')}</label><select onchange="anim.direction=this.value;updatePreview()">${['normal','reverse','alternate','alternate-reverse'].map(d=>`<option ${anim.direction===d?'selected':''}>${d}</option>`).join('')}</select></div>
    <div><label>${t('fillMode')}</label><select onchange="anim.fillMode=this.value;updatePreview()">${['none','forwards','backwards','both'].map(d=>`<option ${anim.fillMode===d?'selected':''}>${d}</option>`).join('')}</select></div>
    <div><label>${t('playState')}</label><select onchange="anim.playState=this.value;updatePreview()">${['running','paused'].map(d=>`<option ${anim.playState===d?'selected':''}>${d}</option>`).join('')}</select></div>
  `;
}

function renderKeyframes() {
  $('#keyframeList').innerHTML = `<h3>${t('keyframes')}</h3>` + keyframes.map((k,i) => `
    <div class="keypoint">
      <div class="keypoint-header">
        <strong>${k.pct}%</strong>
        ${keyframes.length>2?`<button class="kp-remove" onclick="removeKeyframe(${i})">✕</button>`:''}
      </div>
      <div class="keypoint-grid">
        <div><label>%</label><input type="number" value="${k.pct}" min="0" max="100" onchange="keyframes[${i}].pct=+this.value;updatePreview()"></div>
        <div><label>TranslateX</label><input type="number" value="${k.tx}" onchange="keyframes[${i}].tx=+this.value;updatePreview()"></div>
        <div><label>TranslateY</label><input type="number" value="${k.ty}" onchange="keyframes[${i}].ty=+this.value;updatePreview()"></div>
        <div><label>Rotate°</label><input type="number" value="${k.rotate}" onchange="keyframes[${i}].rotate=+this.value;updatePreview()"></div>
        <div><label>Scale</label><input type="number" step="0.1" value="${k.scale}" onchange="keyframes[${i}].scale=+this.value;updatePreview()"></div>
        <div><label>SkewX°</label><input type="number" value="${k.skewX}" onchange="keyframes[${i}].skewX=+this.value;updatePreview()"></div>
        <div><label>SkewY°</label><input type="number" value="${k.skewY}" onchange="keyframes[${i}].skewY=+this.value;updatePreview()"></div>
        <div><label>Opacity</label><input type="number" step="0.1" min="0" max="1" value="${k.opacity}" onchange="keyframes[${i}].opacity=+this.value;updatePreview()"></div>
        <div><label>Color</label><input type="color" value="${k.bg}" onchange="keyframes[${i}].bg=this.value;updatePreview()"></div>
      </div>
    </div>
  `).join('') + `<button class="gz-btn gz-btn-secondary" style="margin-top:8px" onclick="addKeyframe()">${t('addKeyframe')}</button>`;
}

function addKeyframe() {
  const lastKf = keyframes[keyframes.length-1];
  keyframes.push({ pct:100, tx:0, ty:0, rotate:0, scale:1, skewX:0, skewY:0, opacity:1, bg:'#4ecdc4' });
  keyframes.sort((a,b)=>a.pct-b.pct);
  renderKeyframes();
  updatePreview();
}

function removeKeyframe(i) {
  keyframes.splice(i,1);
  renderKeyframes();
  updatePreview();
}

function generateCSS() {
  const kfSorted = [...keyframes].sort((a,b)=>a.pct-b.pct);
  let kfStr = kfSorted.map(k => {
    let parts = [`  ${k.pct}% {`];
    parts.push(`    transform: translate(${k.tx}px, ${k.ty}px) rotate(${k.rotate}deg) scale(${k.scale}) skew(${k.skewX}deg, ${k.skewY}deg);`);
    parts.push(`    opacity: ${k.opacity};`);
    parts.push(`    background: linear-gradient(135deg, ${k.bg}, ${k.bg});`);
    parts.push(`  }`);
    return parts.join('\n');
  }).join('\n');

  return `@keyframes myAnimation {
${kfStr}
}

.animated-element {
  animation: myAnimation ${anim.duration}s ${anim.timing} ${anim.delay}s ${anim.iteration} ${anim.direction} ${anim.fillMode} ${anim.playState};
}`;
}

function updatePreview() {
  // Inject animation CSS
  let styleEl = document.getElementById('dynamicAnimStyle');
  if (!styleEl) { styleEl = document.createElement('style'); styleEl.id='dynamicAnimStyle'; document.head.appendChild(styleEl); }
  const css = generateCSS().replace(/myAnimation/g,'previewAnim').replace(/animated-element/g,'#animTarget');
  styleEl.textContent = css;
  // Output
  $('#cssOutput').textContent = generateCSS();
}

$('#toolbar').innerHTML = `<button class="gz-btn" onclick="copyText($('#cssOutput').textContent)">${t('copy')}</button>`;

renderPresets();
renderControls();
renderKeyframes();
updatePreview();

GZ.renderToolPage({
  category: 'css',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'✨', href:'/css-tools/animation.html', name:'CSS Animation'},
    {icon:'🎨', href:'/css-tools/gradient.html', name:'Gradient Gen'},
    {icon:'🔄', href:'/css-tools/transform.html', name:'CSS Transform'},
    {icon:'📐', href:'/css-tools/easing.html', name:'Easing'},
  ]
});
</script>
