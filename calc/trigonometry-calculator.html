<script>
GZI18n.register({
  en:{
    toolTitle:'Trigonometry Calculator',
    toolDesc:'Free online trigonometry calculator — find sin, cos, tan, cosec, sec, cot and inverse functions (arcsin, arccos, arctan) in degrees or radians, with step-by-step results.',
    modeBasic:'sin · cos · tan',
    modeInverse:'arcsin · arccos · arctan',
    unitDeg:'degrees (°)',
    unitRad:'radians (rad)',
    lblAngle:'Angle θ',

    calculate:'⚡ Calculate',copy:'Copy',clear:'Clear',
    sinL:'sin(θ)',cosL:'cos(θ)',tanL:'tan(θ)',
    cscL:'csc(θ) = 1/sin',secL:'sec(θ) = 1/cos',cotL:'cot(θ) = 1/tan',

    step3:'Type the angle (or ratio for inverse mode)',
    step4:'Read all six trig values plus the worked solution',
  },
  zh:{
    toolTitle:'三角函数计算器',
    toolDesc:'免费在线三角函数计算器 — 计算 sin、cos、tan、csc、sec、cot 及反三角函数（arcsin、arccos、arctan），支持角度和弧度，附逐步解析。',
    modeBasic:'sin · cos · tan',
    modeInverse:'arcsin · arccos · arctan',
    unitDeg:'角度（°）',
    unitRad:'弧度（rad）',
    lblAngle:'角度 θ',
    lblValue:'数值（比值）',
    calculate:'⚡ 计算',copy:'复制',clear:'清空',
    sinL:'sin(θ)',cosL:'cos(θ)',tanL:'tan(θ)',
    cscL:'csc(θ) = 1/sin',secL:'sec(θ) = 1/cos',cotL:'cot(θ) = 1/tan',
    asinL:'arcsin = θ',acosL:'arccos = θ',atanL:'arctan = θ',
    acscL:'arccsc = θ',asecL:'arcsec = θ',acotL:'arccot = θ',
    noteBasic:'提示：tan(90°) 和 cot(0°) 无定义（无穷大）。',
    noteInverse:'提示：arcsin 和 arccos 仅接受 [-1, 1] 范围内的值。',
    formulaDeg:'θ（弧度）= θ（角度）× π / 180',
    formulaRad:'θ（角度）= θ（弧度）× 180 / π',
    stepRad:'步骤 1 — 转换为弧度',
    stepEval:'步骤 2 — 求值',
    invalidRange:'arcsin 和 arccos 仅在 [-1, 1] 范围内有定义。',
    invalidAngle:'请输入有效数字。',
    step1:'选择模式：正向（sin/cos/tan）或反向',
    step2:'选择角度或弧度',
    step3:'输入角度（反向模式下输入比值）',
    step4:'查看全部六个三角函数值及推导过程',
  }
});

const { $, copyText, t } = GZ;
let mode='basic', unit='deg';

function fmt(n){
  if(!isFinite(n)) return n>0?'∞':'-∞';
  if(Math.abs(n)<1e-15) return '0';
  const r=Math.round(n*1e12)/1e12;
  return r.toLocaleString('en-US',{maximumFractionDigits:12});
}
function card(lbl,val){return `<div class="trig-card"><div class="lbl">${lbl}</div><div class="val">${val}</div></div>`;}

function calc(){
  const grid=$('#grid'),note=$('#note'),formula=$('#formula');
  const raw=parseFloat($('#angleInput').value);
  if(isNaN(raw)){grid.innerHTML='';note.textContent=t('invalidAngle');formula.textContent='';return;}
  if(mode==='basic'){
    let rad=unit==='deg'?raw*Math.PI/180:raw;
    const s=Math.sin(rad),c=Math.cos(rad),tn=Math.tan(rad);
    const csc=Math.abs(s)>1e-15?1/s:Infinity;
    const sec=Math.abs(c)>1e-15?1/c:Infinity;
    const cot=Math.abs(tn)>1e-15?1/tn:(Math.abs(tn)<1e-15?0:Infinity);
    grid.innerHTML=
      card(t('sinL'),fmt(s))+card(t('cosL'),fmt(c))+card(t('tanL'),fmt(tn))+
      card(t('cscL'),fmt(csc))+card(t('secL'),fmt(sec))+card(t('cotL'),fmt(cot));
    note.textContent=t('noteBasic');
    const degShow=unit==='deg'?fmt(raw):fmt(raw*180/Math.PI);
    const radShow=unit==='rad'?fmt(raw):fmt(raw*Math.PI/180);
    formula.innerHTML=
      `<div>${unit==='deg'?t('formulaDeg'):t('formulaRad')}</div>`+
      `<div style="margin-top:8px">${t('stepRad')}: θ = <b>${fmt(raw)}${unit==='deg'?'°':' rad'}</b> = <b>${fmt(radShow)} rad</b> (${degShow}°)</div>`+
      `<div>${t('stepEval')}: sin(${fmt(rad)}) = <b>${fmt(s)}</b>, cos(${fmt(rad)}) = <b>${fmt(c)}</b>, tan(${fmt(rad)}) = <b>${fmt(tn)}</b></div>`;
  } else {
    if(Math.abs(raw)>1){
      const aok=Math.abs(raw)<=1;
      const asin=aok?Math.asin(raw):NaN;
      const acos=aok?Math.acos(raw):NaN;
      const atan=Math.atan(raw);
      const acsc=Math.abs(raw)>=1?Math.asin(1/raw):NaN;
      const asec=Math.abs(raw)>=1?Math.acos(1/raw):NaN;
      const acot=Math.atan(1/raw);
      const toDeg=r=>isFinite(r)?r*180/Math.PI:NaN;
      grid.innerHTML=
        card(t('asinL'),isNaN(asin)?'—':fmt(toDeg(asin))+'°')+
        card(t('acosL'),isNaN(acos)?'—':fmt(toDeg(acos))+'°')+
        card(t('atanL'),fmt(toDeg(atan))+'°')+
        card(t('acscL'),isNaN(acsc)?'—':fmt(toDeg(acsc))+'°')+
        card(t('asecL'),isNaN(asec)?'—':fmt(toDeg(asec))+'°')+
        card(t('acotL'),fmt(toDeg(acot))+'°');
      note.textContent=t('noteInverse');
      formula.innerHTML=`<div>${t('invalidRange')}</div>`;
    } else {
      const asin=Math.asin(raw),acos=Math.acos(raw),atan=Math.atan(raw);
      const acsc=Math.abs(raw)>1e-15?Math.asin(1/raw):NaN;
      const asec=Math.abs(raw)>1e-15?Math.acos(1/raw):NaN;
      const acot=Math.atan(1/raw);
      const toDeg=r=>r*180/Math.PI;
      grid.innerHTML=
        card(t('asinL'),fmt(toDeg(asin))+'°')+
        card(t('acosL'),fmt(toDeg(acos))+'°')+
        card(t('atanL'),fmt(toDeg(atan))+'°')+
        card(t('acscL'),isNaN(acsc)?'—':fmt(toDeg(acsc))+'°')+
        card(t('asecL'),isNaN(asec)?'—':fmt(toDeg(asec))+'°')+
        card(t('acotL'),fmt(toDeg(acot))+'°');
      note.textContent=t('noteInverse');
      formula.innerHTML=
        `<div>${t('stepEval')}:</div>`+
        `<div style="margin-top:8px">arcsin(${fmt(raw)}) = <b>${fmt(toDeg(asin))}°</b> = ${fmt(asin)} rad</div>`+
        `<div>arccos(${fmt(raw)}) = <b>${fmt(toDeg(acos))}°</b> = ${fmt(acos)} rad</div>`+
        `<div>arctan(${fmt(raw)}) = <b>${fmt(toDeg(atan))}°</b> = ${fmt(atan)} rad</div>`;
    }
  }
}

document.querySelectorAll('#modeTabs .trig-tab').forEach(tab=>{
  tab.addEventListener('click',()=>{
    document.querySelectorAll('#modeTabs .trig-tab').forEach(x=>x.classList.remove('active'));
    tab.classList.add('active');
    mode=tab.dataset.mode;
    $('#lbl-in').textContent=mode==='basic'?t('lblAngle'):t('lblValue');
    $('#angleInput').value=mode==='basic'?(unit==='deg'?'45':'0.785'):'0.5';
    calc();
  });
});
document.querySelectorAll('#unitTabs .trig-tab').forEach(tab=>{
  tab.addEventListener('click',()=>{
    document.querySelectorAll('#unitTabs .trig-tab').forEach(x=>x.classList.remove('active'));
    tab.classList.add('active');
    unit=tab.dataset.unit;
    if(mode==='basic') $('#angleInput').value=unit==='deg'?'45':'0.785';
    calc();
  });
});
$('#calcBtn').addEventListener('click',calc);
$('#angleInput').addEventListener('input',calc);
$('#angleInput').addEventListener('keydown',e=>{if(e.key==='Enter')calc();});

$('#toolbar').innerHTML=`
  <button class="gz-btn" onclick="calc()">${t('calculate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="copyText($('#grid').innerText)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#angleInput').value='';calc()">${t('clear')}</button>`;
$('#lbl-in').textContent=t('lblAngle');

GZ.renderToolPage({
  category:'calc',
  titleKey:'toolTitle',
  descKey:'toolDesc',
  howToSteps:['step1','step2','step3','step4'],
  related:[
    {icon:'🪵',href:'/calc/logarithm-calculator.html',name:'Logarithm Calculator'},
    {icon:'📐',href:'/calc/pythagorean-theorem-calculator.html',name:'Pythagorean Theorem'},
    {icon:'🧮',href:'/calc/scientific-calculator.html',name:'Scientific Calculator'},
    {icon:'📉',href:'/calc/derivative-calculator.html',name:'Derivative Calculator'},
  ]
});
calc();
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
