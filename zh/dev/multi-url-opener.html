    opened: (n) => `正在打开 ${n} 个网址...`,
    step1: '把网址粘贴到文本框（每行一个，或用逗号/空格分隔）',
    step2: '勾选选项：去重、补加 https://、后台打开',
    step3: '点击「预览」查看识别到多少个有效网址',

const { $, copyText, t } = GZ;

function parseUrls() {
  const raw = $('#input').value.trim();
  if (!raw) return [];
  // Split on newlines, commas, and whitespace
  const tokens = raw.split(/[\n,\s]+/).map(s => s.trim()).filter(Boolean);
  const addHttps = $('#https').checked;
  const dedupe = $('#dedupe').checked;
  const seen = new Set();
  const valid = [];
  let skipped = 0;
  for (let tok of tokens) {
    // Strip surrounding <>, (), []
    tok = tok.replace(/^[<(\[]+|[>\)\]]+$/g, '');
    if (!tok) continue;
    let candidate = tok;
    if (addHttps && !/^[a-z]+:\/\//i.test(candidate) && !candidate.startsWith('//')) {
      candidate = 'https://' + candidate;
    } else if (candidate.startsWith('//')) {
      candidate = 'https:' + candidate;
    }
    // Validate URL
    let u;
    try { u = new URL(candidate); } catch (e) { skipped++; continue; }
    if (!['http:','https:'].includes(u.protocol)) { skipped++; continue; }
    if (dedupe) {
      const key = u.href.replace(/\/$/, '');
      if (seen.has(key)) { skipped++; continue; }
      seen.add(key);
    }
    valid.push(u.href);
  }
  $('#status').dataset.skipped = skipped;
  return valid;
}

function renderPreview(urls) {
  const list = $('#urllist');
  list.innerHTML = '';
  urls.forEach(u => {
    const item = document.createElement('div');
    item.className = 'url-item';
    let host = '';
    try { host = new URL(u).hostname.replace(/^www\./,''); } catch(e){}
    item.innerHTML = `<span class="ic">🔗</span><span class="url">${u.replace(/&/g,'&amp;').replace(/</g,'&lt;')}</span><span class="tag">${host}</span>`;
    list.appendChild(item);
  });
}

function doPreview() {
  const urls = parseUrls();
  renderPreview(urls);
  const skipped = parseInt($('#status').dataset.skipped || '0', 10);
  if (urls.length === 0) {
    $('#status').innerHTML = `<span style="color:var(--gz-accent)">${t('noValid')}</span>`;
  } else {
    $('#status').innerHTML = `<span style="color:var(--gz-success)">✓ ${t('found', urls.length, skipped)}</span><br><small>${t('popupHint')}</small>`;
  }
}

function doOpenAll() {
  const urls = parseUrls();
  if (!urls.length) { $('#status').innerHTML = `<span style="color:var(--gz-accent)">${t('noValid')}</span>`; return; }
  const lazy = $('#lazy').checked;
  urls.forEach(u => {
    const a = document.createElement('a');
    a.href = u;
    a.target = '_blank';
    a.rel = 'noopener noreferrer';
    // For "lazy/background" we just rely on browser default; noopener prevents focus in most browsers anyway
    document.body.appendChild(a);
    a.click();
    a.remove();
  });
  renderPreview(urls);
  $('#status').innerHTML = `<span style="color:var(--gz-success)">✓ ${t('opened', urls.length)}</span><br><small>${t('popupHint')}</small>`;
}

function loadExample() {
  $('#input').value = 'https://google.com\nhttps://github.com\nexample.org/page\ntools.gamezipper.com\nhttps://news.ycombinator.com';
  doPreview();
}

function doClear() {
  $('#input').value = '';
  $('#urllist').innerHTML = '';
  $('#status').innerHTML = '';
}

// Re-preview on option change
['lazy','dedupe','https'].forEach(id => $('#'+id).addEventListener('change', doPreview));
$('#input').addEventListener('input', () => { /* live preview only on demand to avoid flicker */ });

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="doOpenAll()">🚀 ${t('openAll')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doPreview()">${t('preview')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

$('#lbl-lazy').textContent = t('lblLazy');
$('#lbl-dedupe').textContent = t('lblDedupe');
