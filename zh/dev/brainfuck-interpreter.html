    lblStep: '单步',
    lblReset: '重置',
    lblExample: 'Hello World',
    lblInput: '输入：',
    lblCode: 'Brainfuck 代码',
    lblOutput: '输出',
    lblTape: '内存带',
    statusReady: '就绪',
    statusDone: (n) => `完成 — 执行了 ${n} 条指令`,
    statusHalted: '暂停（输入已耗尽）',
    statusLimit: '已停止：达到指令上限（可能是死循环）',
    statusErr: (m) => `错误：${m}`,
    step1: '输入或粘贴 Brainfuck 代码（仅 > < + - . , [ ] 为有效命令）',
    step2: '可选：为逗号 , 命令提供输入文本',
    step3: '点击「运行」执行，或「单步」逐条调试',
    step4: '实时查看内存带和输出的变化',
  }
});

const { $, t } = GZ;
const TAPE_SIZE = 30000, MAX_STEPS = 1000000;
let tape, ptr, pc, out, inputIdx, inputBytes, prog, jumps, steps, halted, done;

function bfReset(){
  tape = new Uint8Array(TAPE_SIZE);
  ptr = 0; pc = 0; out = ''; inputIdx = 0; steps = 0; halted = false; done = false;
  const raw = $('#code').value;
  prog = [];
  for(const ch of raw){ if('><+-.,[]'.includes(ch)) prog.push(ch); }
  // precompute bracket jumps
  jumps = {}; const stack = [];
  for(let i=0;i<prog.length;i++){
    if(prog[i]==='[') stack.push(i);
    else if(prog[i]===']'){ if(!stack.length){ $('#status').textContent=t('statusErr','unmatched ]'); return; } const o=stack.pop(); jumps[o]=i; jumps[i]=o; }
  }
  if(stack.length){ $('#status').textContent=t('statusErr','unmatched ['); return; }
  inputBytes = new TextEncoder().encode($('#bfInput').value);
  $('#output').textContent = '';
  $('#status').textContent = t('statusReady');
  renderTape();
}

function bfStep(){
  if(done) return;
  if(pc===0 && steps===0 && !jumps.hasOwnProperty('0') && !jumps.length){} // ensure init
  if(!tape) bfReset();
  if(prog.length===0) return;
  if(pc >= prog.length){ done = true; $('#status').textContent = t('statusDone', steps); return; }
  const cmd = prog[pc];
  switch(cmd){
    case '>': ptr = (ptr+1)%TAPE_SIZE; break;
    case '<': ptr = (ptr-1+TAPE_SIZE)%TAPE_SIZE; break;
    case '+': tape[ptr] = (tape[ptr]+1)&0xff; break;
    case '-': tape[ptr] = (tape[ptr]-1)&0xff; break;
    case '.': out += String.fromCharCode(tape[ptr]); $('#output').textContent = out; break;
    case ',': if(inputIdx < inputBytes.length){ tape[ptr]=inputBytes[inputIdx++]; } else { halted=true; } break;
    case '[': if(tape[ptr]===0) pc = jumps[pc]; break;
    case ']': if(tape[ptr]!==0) pc = jumps[pc]; break;
  }
  pc++; steps++;
  renderTape();
}

function bfRun(){
  bfReset();
  if(prog.length===0) return;
  while(pc < prog.length && steps < MAX_STEPS){
    const cmd = prog[pc];
    switch(cmd){
      case '>': ptr=(ptr+1)%TAPE_SIZE; break;
      case '<': ptr=(ptr-1+TAPE_SIZE)%TAPE_SIZE; break;
      case '+': tape[ptr]=(tape[ptr]+1)&0xff; break;
      case '-': tape[ptr]=(tape[ptr]-1)&0xff; break;
      case '.': out+=String.fromCharCode(tape[ptr]); break;
      case ',': if(inputIdx<inputBytes.length){ tape[ptr]=inputBytes[inputIdx++]; } else { halted=true; } break;
      case '[': if(tape[ptr]===0) pc=jumps[pc]; break;
      case ']': if(tape[ptr]!==0) pc=jumps[pc]; break;
    }
    if(halted) break;
    pc++; steps++;
  }
  $('#output').textContent = out;
  if(halted) $('#status').textContent = t('statusHalted');
  else if(steps >= MAX_STEPS) $('#status').textContent = t('statusLimit');
  else $('#status').textContent = t('statusDone', steps);
  renderTape();
}

function renderTape(){
  // show first 32 cells or up to max used
  let maxUsed = 0;
  for(let i=0;i<32;i++) if(tape[i]) maxUsed = i;
  const show = Math.max(32, maxUsed+4);
  let html = '';
  for(let i=0;i<show;i++){
    html += `<div class="bf-cell ${i===ptr?'ptr':''} ${tape[i]?'nonzero':''}">${tape[i]}</div>`;
  }
  $('#tape').innerHTML = html;
}

function loadExample(){
  $('#code').value = '++++++++[>++++[>++>+++>+++>+<<<<-]>+>+>->>+[<]<-]>>.>---.+++++++..+++.>>.<-.<.+++.------.--------.>>+.>++.';
  bfReset();
}
