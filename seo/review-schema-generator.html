@media(max-width:780px){.form-grid{grid-template-columns:1fr}}

.fg label{font-size:.74em;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.4px}
.fg input,.fg select,.fg textarea{padding:8px 11px;border:1px solid var(--border);border-radius:8px;background:var(--glass2);color:var(--text);font-size:.88rem;font-family:inherit}
.fg.full{grid-column:1 / -1}

.stars span{color:#444;transition:.1s}
.stars span.on{color:#ffd93d}

<script type="application/ld+json">{"@context":"https://schema.org","@type":"WebApplication","name":"Review & Rating Schema Generator","description":"Generate Review and AggregateRating JSON-LD schema markup for products, books, movies and businesses to enable star ratings in Google rich snippets. Free SEO tool.","url":"https://tools.gamezipper.com/seo/review-schema-generator.html","applicationCategory":"SEOApplication","operatingSystem":"Web Browser","offers":{"@type":"Offer","price":"0"}}</script>
<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"What is the difference between Review and AggregateRating?","acceptedAnswer":{"@type":"Answer","text":"A Review is a single review written by one person. An AggregateRating is the combined average rating across many reviews. Both can show stars in search results."}},{"@type":"Question","name":"Which item types can have reviews?","acceptedAnswer":{"@type":"Answer","text":"Reviews can be attached to Products, Books, Movies, TVSeries, MusicRecordings, LocalBusinesses, Restaurants, SoftwareApplications, Events and CreativeWorks."}},{"@type":"Question","name":"Are self-serving reviews allowed by Google?","acceptedAnswer":{"@type":"Answer","text":"Google discourages reviews you wrote about your own business. Use Review schema mainly for third-party reviews of products or creative works."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header"><h1 id="title"></h1><p class="desc" id="desc"></p></div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="gz-split">
      <div><div class="form-grid" id="form"></div></div>
      <div>
        <label id="lbl-out" style="display:block;font-size:.78em;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px">JSON-LD</label>
        <div class="gz-output" id="output"></div>
      </div>
    </div>
    <div id="status"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Review & Rating Schema Generator',
    toolDesc: 'Build Review and AggregateRating JSON-LD for products, books, movies and businesses to enable star ratings in Google rich snippets.',
    generate: 'Generate', example: 'Example', copy: 'Copy', clear: 'Clear',
    lblType: 'Schema type', lblItemType: 'Reviewed item type', lblItemName: 'Item name',
    lblAuthor: 'Reviewer / author name', lblRating: 'Rating value', lblBest: 'Best rating', lblWorst: 'Worst rating',
    lblBody: 'Review body (optional)', lblDate: 'Date published', lblCount: 'Review count (aggregate)', lblImg: 'Item image URL',
    step1: 'Choose a single Review or an AggregateRating.',
    step2: 'Set the reviewed item type (e.g. Product) and its name.',
    step3: 'Pick a rating value (click the stars).',
    step4: 'Copy the JSON-LD into your page <head>.',
  },
  zh: {
    toolTitle: '评价与评分 Schema 生成器',
    toolDesc: '为商品、图书、电影、商家生成 Review 和 AggregateRating JSON-LD，让评分星级出现在 Google 富结果中。',
    generate: '生成', example: '示例', copy: '复制', clear: '清空',
    lblType: 'Schema 类型', lblItemType: '被评价对象类型', lblItemName: '对象名称',
    lblAuthor: '评价人 / 作者', lblRating: '评分', lblBest: '最高分', lblWorst: '最低分',
    lblBody: '评价正文（可选）', lblDate: '发布日期', lblCount: '评价数量（综合）', lblImg: '对象图片 URL',
    step1: '选择单条 Review 或综合评分 AggregateRating。',
    step2: '设置被评价对象类型（如 Product）及名称。',
    step3: '选择评分值（点击星星）。',
    step4: '将 JSON-LD 复制到页面 <head> 中。',
  }
});
const { $, copyText, t } = GZ;
const SCHEMA_TYPES = ['Review','AggregateRating'];
const ITEM_TYPES = ['Product','Book','Movie','TVSeries','MusicRecording','SoftwareApplication','LocalBusiness','Restaurant','Hotel','Event','Game','CreativeWork','Organization'];

function field(id, labelKey, type='text', ph='', full=false, extra='') {
  return `<div class="fg ${full?'full':''}"><label>${t(labelKey)}</label><input id="f-${id}" type="${type}" placeholder="${ph}" ${extra}></div>`;
}
function selField(id, labelKey, opts) {
  return `<div class="fg"><label>${t(labelKey)}</label><select id="f-${id}">${opts.map(o=>`<option value="${o}">${o}</option>`).join('')}</select></div>`;
}

function buildForm() {
  $('#form').innerHTML =
    selField('type','lblType', SCHEMA_TYPES) +
    selField('itemType','lblItemType', ITEM_TYPES) +
    field('itemName','lblItemName','text','The Pragmatic Programmer', true) +
    field('author','lblAuthor','text','Jane Reviewer') +
    field('date','lblDate','date') +
    `<div class="fg full"><label>${t('lblRating')}</label><div class="stars" id="stars">${[1,2,3,4,5].map(n=>`<span data-n="${n}">★</span>`).join('')}</div></div>` +
    `<div class="fg"><label>${t('lblBest')}</label><input id="f-best" type="number" value="5"></div>` +
    `<div class="fg"><label>${t('lblWorst')}</label><input id="f-worst" type="number" value="1"></div>` +
    field('count','lblCount','number','42') +
    field('img','lblImg','text','https://example.com/item.jpg', true) +
    `<div class="fg full"><label>${t('lblBody')}</label><textarea id="f-body" rows="3" placeholder="A practical, timeless guide to writing better software..."></textarea></div>`;
  let rating = 5;
  const stars = $('#stars');
  const render = () => stars.querySelectorAll('span').forEach(s => s.classList.toggle('on', +s.dataset.n <= rating));
  render();
  stars.addEventListener('click', e => {
    if (e.target.dataset.n) { rating = +e.target.dataset.n; render(); gen(); }
  });
  stars.dataset.rating = rating;
  Object.defineProperty(stars, '_r', { get: () => rating });
  $('#f-type').addEventListener('change', gen);
}

function hl(json) {
  return json.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/("(\\u[\da-fA-F]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false)\b|-?\d+(\.\d+)?([eE][+-]?\d+)?)/g, m => {
      let c='gz-num'; if(/^"/.test(m)) c=/:$/.test(m)?'gz-key':'gz-str'; else if(/true|false/.test(m)) c='gz-bool';
      return `<span class="${c}">${m}</span>`;
    });
}

function gen() {
  const v = id => (document.getElementById('f-'+id)||{}).value || '';
  const rating = $('#stars')._r;
  const best = v('best') || '5';
  const worst = v('worst') || '1';
  const itemReviewed = { "@type": v('itemType') || 'Product', name: v('itemName') };
  if (v('img')) itemReviewed.image = v('img');
  const ctx = "https://schema.org";
  let data;
  if (v('type') === 'AggregateRating') {
    data = { "@context": ctx, "@type": "AggregateRating", itemReviewed, ratingValue: rating, bestRating: +best, worstRating: +worst };
    if (v('count')) data.reviewCount = parseInt(v('count'));
  } else {
    const review = { "@context": ctx, "@type": "Review", itemReviewed, reviewRating: { "@type":"Rating", ratingValue: rating, bestRating: +best, worstRating: +worst } };
    if (v('author')) review.author = { "@type":"Person", name: v('author') };
    if (v('date')) review.datePublished = v('date');
    if (v('body')) review.reviewBody = v('body');
    data = review;
  }
  $('#output').innerHTML = hl(JSON.stringify(data, null, 2));
  $('#status').innerHTML = `<span style="color:var(--gz-success);font-size:.85em">✓ ${data['@type']} · ${rating}/${best} ★</span>`;
}

function example() {
  const set = (id,val) => { const e=document.getElementById('f-'+id); if(e) e.value=val; };
  document.getElementById('f-type').value = 'Review';
  document.getElementById('f-itemType').value = 'Book';
  set('itemName','The Pragmatic Programmer');
  set('author','Marcus Lee');
  set('date','2026-05-14');
  set('img','https://example.com/pragmatic.jpg');
  set('body','A practical, timeless guide that changed how I think about software craftsmanship. Highly recommended for every developer.');
  // set stars to 5
  const stars = $('#stars'); stars.querySelectorAll('span').forEach(s=>s.classList.add('on'));
  stars.dataset.rating = 5;
  gen();
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="gen()">${t('generate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="example()">${t('example')}</button>
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="document.querySelectorAll('#form input,#form textarea').forEach(i=>i.value='');gen()">${t('clear')}</button>`;
$('#form').addEventListener('input', gen);

buildForm();
GZ.renderToolPage({
  category: 'seo',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🛍️', href:'/seo/product-schema-generator.html', name:'Product Schema Generator'},
    {icon:'❓', href:'/seo/faq-schema-generator.html', name:'FAQ Schema Generator'},
    {icon:'📋', href:'/seo/howto-schema-generator.html', name:'HowTo Schema Generator'},
    {icon:'📅', href:'/seo/event-schema-generator.html', name:'Event Schema Generator'},
  ]
});
example();
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
