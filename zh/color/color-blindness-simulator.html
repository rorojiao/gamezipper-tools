<script>
GZI18n.register({

  },
  zh: {

    toolDesc: '查看你的颜色在红色盲、绿色盲、蓝色盲和全色盲人群眼中的效果。选择颜色或上传图片 — 免费且私密。',
    colorLabel: '选择颜色',
    imageLabel: '或上传图片',
    normal: '正常视觉',
    normalDesc: '三色视觉，三种视锥细胞齐全',
    protanopia: '红色盲（第一型）',
    protanopiaDesc: '缺少红色视锥。约 1% 男性。红色显得暗淡。',
    deuteranopia: '绿色盲（第二型）',
    deuteranopiaDesc: '缺少绿色视锥。约 6% 男性。最常见的类型。',
    tritanopia: '蓝色盲（第三型）',
    tritanopiaDesc: '缺少蓝色视锥。罕见。蓝黄色混淆。',
    achromatopsia: '全色盲',
    achromatopsiaDesc: '完全色盲，只能感知明暗。',
    step1: '使用取色器选择颜色，或上传图片',
    step2: '查看该颜色在各种色盲类型下的表现',
    step3: '检查关键颜色区分（如红与绿）是否丢失',
    step4: '调整你的配色方案，使其对所有用户可访问',
  }
});

const { $, t } = GZ;

// Daltonization matrices (approximation, LMS color space)
// Source: standard simulation matrices widely used in accessibility tooling
const MATRICES = {
  normal: [[1,0,0],[0,1,0],[0,0,1]],
  protanopia: [[0.567,0.433,0],[0.558,0.442,0],[0,0.242,0.758]],
  deuteranopia: [[0.625,0.375,0],[0.7,0.3,0],[0,0.3,0.7]],
  tritanopia: [[0.95,0.05,0],[0,0.433,0.567],[0,0.475,0.525]],
  achromatopsia: [[0.299,0.587,0.114],[0.299,0.587,0.114],[0.299,0.587,0.114]],
};

function applyMatrix(rgb, m) {
  const [r, g, b] = [rgb[0]/255, rgb[1]/255, rgb[2]/255];
  const nr = m[0][0]*r + m[0][1]*g + m[0][2]*b;
  const ng = m[1][0]*r + m[1][1]*g + m[1][2]*b;
  const nb = m[2][0]*r + m[2][1]*g + m[2][2]*b;
  return [
    Math.max(0, Math.min(255, Math.round(nr*255))),
    Math.max(0, Math.min(255, Math.round(ng*255))),
    Math.max(0, Math.min(255, Math.round(nb*255)))
  ];
}

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  return [r, g, b];
}

function rgbToHex(rgb) {
  return '#' + rgb.map(v => v.toString(16).padStart(2,'0')).join('');
}

let imageCanvas = null;

function loadImage() {
  const file = $('#image').files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      const maxW = 400;
      const scale = Math.min(1, maxW / img.width);
      imageCanvas = document.createElement('canvas');
      imageCanvas.width = img.width * scale;
      imageCanvas.height = img.height * scale;
      const ctx = imageCanvas.getContext('2d');
      ctx.drawImage(img, 0, 0, imageCanvas.width, imageCanvas.height);
      render();
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function render() {
  const grid = $('#grid');
  grid.innerHTML = '';
  const color = $('#color').value;
  const rgb = hexToRgb(color);

  const types = [
    {key:'normal', mat:MATRICES.normal},
    {key:'protanopia', mat:MATRICES.protanopia},
    {key:'deuteranopia', mat:MATRICES.deuteranopia},
    {key:'tritanopia', mat:MATRICES.tritanopia},
    {key:'achromatopsia', mat:MATRICES.achromatopsia},
  ];

  types.forEach(tp => {
    const card = document.createElement('div');
    card.className = 'cbs-card';

    if (imageCanvas) {
      // Process image
      const procCanvas = document.createElement('canvas');
      procCanvas.width = imageCanvas.width;
      procCanvas.height = imageCanvas.height;
      const pctx = procCanvas.getContext('2d');
      pctx.drawImage(imageCanvas, 0, 0);
      const imgData = pctx.getImageData(0, 0, procCanvas.width, procCanvas.height);
      const data = imgData.data;
      for (let i = 0; i < data.length; i += 4) {
        const [nr, ng, nb] = applyMatrix([data[i], data[i+1], data[i+2]], tp.mat);
        data[i] = nr; data[i+1] = ng; data[i+2] = nb;
      }
      pctx.putImageData(imgData, 0, 0);
      const imgEl = document.createElement('img');
      imgEl.className = 'cbs-preview-img';
      imgEl.src = procCanvas.toDataURL();
      card.appendChild(imgEl);
    } else {
      const simRgb = applyMatrix(rgb, tp.mat);
      const simHex = rgbToHex(simRgb);
      const swatch = document.createElement('div');
      swatch.className = 'cbs-swatch';
      swatch.style.background = simHex;
      card.appendChild(swatch);
      const hexLabel = document.createElement('div');
      hexLabel.className = 'hex';
      hexLabel.textContent = simHex.toUpperCase();
      card.appendChild(hexLabel);
    }

    const name = document.createElement('div');
    name.className = 'name';
    name.textContent = t(tp.key);
    card.appendChild(name);

    const desc = document.createElement('div');
    desc.className = 'desc';
    desc.textContent = t(tp.key + 'Desc');
    card.appendChild(desc);

    grid.appendChild(card);
  });
}

$('#color').addEventListener('input', render);
render();

GZ.renderToolPage({
  category: 'color',

  ]
});
</script>
