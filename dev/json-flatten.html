<script>
GZI18n.register({
  en: {
    toolTitle: 'JSON Flatten & Unflatten',
    toolDesc: 'Flatten nested JSON objects into dot-notation key-value pairs and unflatten them back — perfect for form data, CSV export and config processing.',

    step2: 'Click Flatten to convert nested objects to dot-notation',
    step3: 'Click Unflatten to restore nested structure from flat keys',
    step4: 'Use Copy to copy the result to clipboard',
  },
  zh: {
    toolTitle: 'JSON 扁平化与还原',
    toolDesc: '将嵌套 JSON 对象扁平化为点号分隔的键值对，并支持反向还原 — 适用于表单数据、CSV 导出和配置处理。',
    flatten: '扁平化',
    unflatten: '还原',
    separator: '分隔符',
    example: '示例',
    copy: '复制',
    clear: '清除',
    inputLabel: '输入 JSON',
    outputLabel: '输出',
    validJson: '✓ JSON 有效',
    invalidJson: '✗ JSON 无效',
    step1: '在输入区粘贴或输入 JSON',
    step2: '点击「扁平化」将嵌套对象转为点号分隔格式',
    step3: '点击「还原」将扁平键值恢复为嵌套结构',
    step4: '点击「复制」将结果复制到剪贴板',
  }
});

let sep = '.';
const { $, copyText, t } = GZ;

function flatten(obj, prefix = '', result = {}) {
  for (const key in obj) {
    const val = obj[key];
    const newKey = prefix ? prefix + sep + key : key;
    if (val && typeof val === 'object' && !Array.isArray(val)) {
      flatten(val, newKey, result);
    } else {
      result[newKey] = val;
    }
  }
  return result;
}

function unflatten(obj) {
  const result = {};
  for (const flatKey in obj) {
    const parts = flatKey.split(sep);
    let current = result;
    for (let i = 0; i < parts.length - 1; i++) {
      const part = parts[i];
      if (!(part in current)) current[part] = {};
      current = current[part];
    }
    current[parts[parts.length - 1]] = obj[flatKey];
  }
  return result;
}

function syntaxHighlight(json) {
  return json.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/(\"(\\\\u[\da-fA-F]{4}|\\\\[^u]|[^\\\\\"])*\"(\s*:)?|\b(true|false|null)\b|-?\d+(\.\d+)?([eE][+-]?\d+)?)/g, m => {
      let c = 'json-number';
      if (/^"/.test(m)) c = /:$/.test(m) ? 'json-key' : 'json-string';
      else if (/true|false/.test(m)) c = 'json-bool';
      else if (/null/.test(m)) c = 'json-null';
      return `<span class="${c}">${m}</span>`;
    });
}

function doFlatten() {
  const inp = $('#input').value.trim();
  if (!inp) return;
  try {
    const obj = JSON.parse(inp);
    if (typeof obj !== 'object' || obj === null || Array.isArray(obj)) {
      $('#status').innerHTML = `<span style="color:var(--gz-accent)">${t('invalidJson')}: Input must be a JSON object, not an array or primitive</span>`;
      return;
    }
    const flat = flatten(obj);
    const formatted = JSON.stringify(flat, null, 2);
    $('#output').innerHTML = syntaxHighlight(formatted);
    $('#status').innerHTML = `<span style="color:var(--gz-success)">${t('validJson')} — ${Object.keys(flat).length} keys</span>`;
  } catch(e) {
    $('#status').innerHTML = `<span style="color:var(--gz-accent)">${t('invalidJson')}: ${e.message}</span>`;
    $('#output').textContent = e.message;
  }
}

function doUnflatten() {
  const inp = $('#input').value.trim();
  if (!inp) return;
  try {
    const obj = JSON.parse(inp);
    if (typeof obj !== 'object' || obj === null || Array.isArray(obj)) {
      $('#status').innerHTML = `<span style="color:var(--gz-accent)">${t('invalidJson')}: Input must be a flat JSON object</span>`;
      return;
    }
    const nested = unflatten(obj);
    const formatted = JSON.stringify(nested, null, 2);
    $('#output').innerHTML = syntaxHighlight(formatted);
    $('#status').innerHTML = `<span style="color:var(--gz-success)">${t('validJson')}</span>`;
  } catch(e) {
    $('#status').innerHTML = `<span style="color:var(--gz-accent)">${t('invalidJson')}: ${e.message}</span>`;
    $('#output').textContent = e.message;
  }
}

function loadExample() {
  $('#input').value = JSON.stringify({
    "user": {
      "name": "Alice",
      "age": 30,
      "address": {
        "city": "New York",
        "zip": "10001"
      }
    },
    "settings": {
      "theme": "dark",
      "notifications": {
        "email": true,
        "sms": false
      }
    },
    "active": true
  }, null, 2);
  doFlatten();
}

function doClear() {
  $('#input').value = '';
  $('#output').textContent = '';
  $('#status').innerHTML = '';
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="doFlatten()">${t('flatten')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doUnflatten()">${t('unflatten')}</button>
  <select class="gz-select" onchange="sep=this.value;doFlatten()">
    <option value=".">${t('separator')}: .</option>
    <option value="/">${t('separator')}: /</option>
    <option value="_">${t('separator')}: _</option>
  </select>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;
