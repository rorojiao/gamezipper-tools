  'Stars': {icon:'вӯҗ',chars:'вҳ…вҳҶвңҰвң§вң©вңӘвң«вң¬вңӯвң®вңҜвң°вңұвңІвңівңҙвңөвң¶вң·вңёвң№вңәвң»вңјвңҪвңҫвңҝвқҖвқҒвқӮвқғвқ„вқ…вқҶвқҮвқҲвқүвқҠвқӢвңЎрҹ”Ҝ'},
  'Hearts': {icon:'вқӨпёҸ',chars:'вқӨвҷҘвҷЎвқЈвқӨпёҸрҹ§Ўрҹ’ӣрҹ’ҡрҹ’ҷрҹ’ңрҹ–ӨрҹӨҚрҹӨҺрҹ’•рҹ’һрҹ’“рҹ’—рҹ’–рҹ’ҳрҹ’қрҹ’ҹрҹҺ”рҹ’қ'},
  'Box Drawing': {icon:'рҹ”І',chars:'в”Җв”Ғв”Ӯв”ғв”„в”…в”Ҷв”Үв”Ҳв”үв”Ҡв”Ӣв”Ңв”Қв”Һв”Ҹв”җв”‘в”’в”“в””в”•в”–в”—в”ҳв”ҷв”ҡв”ӣв”ңв”қв”һв”ҹв” в”Ўв”ўв”Јв”Өв”Ҙв”Ұв”§в”Ёв”©в”Әв”«в”¬в”ӯв”®в”Ҝв”°в”ұв”Ів”ів”ҙв”өв”¶в”·в”ёв”№в”әв”»в”јв”Ҫв”ҫв”ҝв•Җв•Ғв•Ӯв•ғв•„в•…в•Ҷв•Үв•Ҳв•үв•Ҡв•Ӣв•Ңв•Қв•Һв•Ҹв•җв•‘в•’в•“в•”в••в•–в•—в•ҳв•ҷв•ҡв•ӣв•ңв•қв•һв•ҹв• в•Ўв•ўв•Јв•Өв•Ҙв•Ұв•§в•Ёв•©в•Әв•«в•¬в•ӯв•®в•Ҝв•°в•ұв•Ів•і'},
  'Block': {icon:'рҹҹ«',chars:'в–Ҳв–“в–’в–‘в–„в–Җв–Ңв–җв–Ҷв–Үв–Ҳв–Ҳв–“в–’в–‘вЈҝвЈ·вЈҜвЈҹвЎҝвўҝвЈ»вЈҪвЈҫвЈҖвЈӨвЈҰвЈҙвЈ¶вЈ·вЈёвЈјвЈ№вЈәвўҖвў вў°вўёвЎҖвЎ вЎ°вЎ°вўҗвў’вЎҗвЎ’'},

  'Fractions': {icon:'ВҪ',chars:'ВҪв…“в…”ВјВҫв…•в…–в…—в…ҳв…ҷв…ҡв…җв…ӣв…ңв…қв…һв…‘в…’'},
  'Greek': {icon:'рҹ”Ө',chars:'ОұОІОіОҙОөО¶О·ОёО№ОәО»ОјОҪОҫОҝПҖПҒПғП„П…ПҶПҮПҲПүО‘О’О“О”О•О–О—ОҳОҷОҡОӣОңОқОһОҹО ОЎОЈОӨОҘОҰО§ОЁО©'},
  'Music': {icon:'рҹҺө',chars:'вҷ©вҷӘвҷ«вҷ¬вҷӯвҷ®вҷҜрқ„һрқ„Ўрқ„ўрқ„Әрқ„«рқ„Ҷрқ„ҮрҹҺјрҹҺӨрҹҺ§рҹҺёрҹҺ№рҹҺәрҹҺ»рҹҘҒ'},
  'Check': {icon:'вң…',chars:'вң“вң”вң—вңҳвң…вқҢвҳ‘вҳ’вҳ“вңӘвң«вң¬вңӯЩ Щ©istics'},
};

$('#searchInput').placeholder = t('searchPlaceholder');

const catNames = Object.keys(categories);
let currentCat = catNames[0];

function renderTabs() {
  $('#catTabs').innerHTML = catNames.map(name =>
    `<button class="${name===currentCat?'active':''}" onclick="setCat('${name}')">${categories[name].icon} ${name}</button>`
  ).join('');
}

function setCat(name) {
  currentCat = name;
  renderTabs();
  renderGrid(categories[name].chars);
}

function renderGrid(chars) {
  const grid = $('#charGrid');
  grid.innerHTML = '';
  [...chars].forEach(ch => {
    const cell = document.createElement('div');
    cell.className = 'char-cell';
    cell.innerHTML = `<span class="ch">${ch}</span><span class="code">U+${ch.codePointAt(0).toString(16).toUpperCase().padStart(4,'0')}</span>`;
    cell.onclick = () => selectChar(ch);
    grid.appendChild(cell);
  });
}

function selectChar(ch) {
  const code = ch.codePointAt(0);
  const hex = 'U+' + code.toString(16).toUpperCase().padStart(4, '0');
  const html = `&#${code};`;
  const css = `\\${code.toString(16)}`;
  $('#charDetail').style.display = 'flex';
  $('#detailChar').textContent = ch;
  $('#detailInfo').innerHTML = `<b>Character:</b> ${ch}<br><b>Unicode:</b> ${hex}<br><b>Decimal:</b> ${code}<br><b>HTML:</b> ${html}<br><b>CSS:</b> ${css}<br><button class="gz-btn" style="margin-top:6px" onclick="copyChar('${ch}')">${t('copy')}</button>`;
  copyText(ch);
  showToast(`${ch} copied!`);
}

function copyChar(ch) {
  copyText(ch);
  showToast(`${ch} copied!`);
}

function showToast(msg) {
  const toast = $('#toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 1500);
}

$('#searchInput').addEventListener('input', function() {
  const q = this.value.toLowerCase().trim();
  if (!q) { setCat(currentCat); return; }
  let results = '';
  for (const cat of catNames) {
    for (const ch of categories[cat].chars) {
      const name = ch.toLowerCase();
      if (name.includes(q) || cat.toLowerCase().includes(q)) results += ch;
    }
  }
  if (!results) results = 'No results found';
  renderGrid(results);
});

renderTabs();
setCat('Punctuation');
