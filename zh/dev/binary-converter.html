<script>

    step1: '在任意字段输入（文本、十进制、十六进制、八进制或二进制）',
    step2: '其他字段即时更新为等价值',
    step3: '切换「有符号」模式查看二进制补码解释',

});

const { $, copyText, t } = GZ;

function parseInput(value, base) {
  if (!value) return null;
  let s = value.trim().replace(/\s+/g, '').replace(/0x$/i, '').replace(/^0b/i, '').replace(/^0o/i, '');
  // Allow comma-separated binary
  if (base === 2 && s.includes(',')) s = s.replace(/,/g, '');
  if (!s) return null;
  if (!/^-?[0-9a-fA-F]+$/.test(s)) return { error: 'Invalid characters for base ' + base };
  try {
    const n = BigInt(s);
    return { value: n };
  } catch(e) {
    return { error: 'Number too large' };
  }
}

function bigIntToString(n, base, signed, bitWidth) {
  if (signed && base !== 10) {
    // For non-decimal bases, interpret as signed using bitWidth
    const max = (1n << BigInt(bitWidth)) - 1n;
    const signBit = 1n << BigInt(bitWidth - 1);
    if ((n & signBit) !== 0n) {
      // Negative
      return (n - (1n << BigInt(bitWidth))).toString(base);
    }
    return n.toString(base);
  }
  return n.toString(base);
}

function getTextCodes(text) {
  const codes = [];
  const encoder = new TextEncoder();
  const bytes = encoder.encode(text);
  for (const b of bytes) codes.push(BigInt(b));
  return { codes, bytes };
}

function updateFromText() {
  const text = $('#fText').value;
  if (!text) {
    $('#fDec').value = $('#fHex').value = $('#fOct').value = $('#fBin').value = '';
    $('#mText').textContent = '';
    return;
  }
  const { codes, bytes } = getTextCodes(text);
  $('#fDec').value = codes.join(' ');
  $('#fHex').value = codes.map(c => c.toString(16).toUpperCase().padStart(2, '0')).join(' ');
  $('#fOct').value = codes.map(c => c.toString(8).padStart(3, '0')).join(' ');
  $('#fBin').value = codes.map(c => c.toString(2).padStart(8, '0')).join(' ');
  $('#mText').textContent = `${text.length} ${t('chars')} → ${bytes.length} bytes`;
}

function updateFromNumber(source, base) {
  const raw = $(source).value;
  if (!raw) {
    ['#fDec','#fHex','#fOct','#fBin','#fText'].forEach(s => { if (s !== source) $(s).value = ''; });
    return;
  }
  const parsed = parseInput(raw, base);
  if (parsed && parsed.error) {
    $('#status').className = 'bc-status err';
    $('#status').textContent = '✗ ' + parsed.error;
    return;
  }
  if (!parsed) return;
  const n = parsed.value;
  const sep = $('#binSep').value;
  const bitWidth = +$('#bitWidth').value;
  const signed = $('#signedMode').checked;

  if (source !== '#fDec') $('#fDec').value = bigIntToString(n, 10, false, bitWidth);
  if (source !== '#fHex') $('#fHex').value = bigIntToString(n, 16, signed, bitWidth).toUpperCase();
  if (source !== '#fOct') $('#fOct').value = bigIntToString(n, 8, signed, bitWidth);
  if (source !== '#fBin') {
    const bin = bigIntToString(n, 2, signed, bitWidth);
    $('#fBin').value = bin.length > 8 && sep ? bin.match(/.{1,8}/g).join(sep) : bin;
  }

  // Try to decode text from bytes
  try {
    const dec = bigIntToString(n, 10, false, bitWidth);
    if (source !== '#fText') {
      // Single value → single byte → character
      const num = parseInt(dec);
      if (num >= 0 && num <= 0x10FFFF) {
        $('#fText').value = String.fromCodePoint(num);
      }
    }
  } catch(_) {}

  const bitLen = n.toString(2).replace(/^-/, '').length;
  $('#mDec').textContent = `${bitLen} ${t('bits')}`;
  $('#mHex').textContent = `${Math.ceil(bitLen / 4)} hex digits`;
  $('#mOct').textContent = `${Math.ceil(bitLen / 3)} octal digits`;
  $('#mBin').textContent = `${bitLen} ${t('bits')}`;

  $('#status').className = 'bc-status ok';
  $('#status').textContent = t('ok');
}

$('#fText').addEventListener('input', updateFromText);
['#fDec','#fHex','#fOct','#fBin'].forEach((sel, i) => {
  $(sel).addEventListener('input', () => updateFromNumber(sel, [10,16,8,2][i]));
});

$('#signedMode').addEventListener('change', () => {
  if ($('#fBin').value) updateFromNumber('#fBin', 2);
});
$('#binSep').addEventListener('change', () => {
  if ($('#fBin').value) updateFromNumber('#fBin', 2);
});

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="copyText($('#fDec').value+' | '+$('#fHex').value+' | '+$('#fOct').value+' | '+$('#fBin').value)">${t('copyAll')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#fText').value='Hello, World! 🌍';updateFromText()">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#fText').value='';$('#fDec').value='';$('#fHex').value='';$('#fOct').value='';$('#fBin').value=''">${t('clear')}</button>`;

});
