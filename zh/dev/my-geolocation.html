const { $, t, showToast } = GZ;
let lastPos = null;

function showErr(key){ const e=$('#error'); e.textContent=t(key); e.classList.add('show'); }
function hideErr(){ $('#error').classList.remove('show'); }

function fmtDMS(deg, isLat){
  const dir = isLat ? (deg >= 0 ? 'N' : 'S') : (deg >= 0 ? 'E' : 'W');
  const abs = Math.abs(deg);
  const d = Math.floor(abs);
  const minFloat = (abs - d) * 60;
  const m = Math.floor(minFloat);
  const s = ((minFloat - m) * 60).toFixed(1);
  return `${d}°${m}'${s}"${dir}`;
}

function plusCode(lat, lon){
  // Simplified Open Location Code (Plus Code) — full encoder inline
  const CODE = '23456789CFGHJMPQRVWX';
  const PAIR = Math.floor(lat * 8000) + '|' + Math.floor(lon * 8000); // not used directly
  // Proper OLC algorithm
  function olcEncode(lat, lon){
    const ADJ = { lat: lat + 90, lon: lon + 180 };
    let rv = '';
    let latV = ADJ.lat, lonV = ADJ.lon;
    let pairCount = 0;
    while(pairCount < 5){
      const ld = Math.floor(latV / 20); latV -= ld * 20;
      const lnd = Math.floor(lonV / 20); lonV -= lnd * 20;
      rv += CODE[ld] + CODE[lnd];
      latV *= 20; lonV *= 20;
      pairCount++;
      if(pairCount === 4) rv += '+';
    }
    // refine to 8 pairs for street-level precision
    for(let i = 0; i < 3; i++){
      const ld = Math.floor(latV / 20); latV -= ld * 20;
      const lnd = Math.floor(lonV / 20); lonV -= lnd * 20;
      rv += CODE[ld] + CODE[lnd];
      latV *= 20; lonV *= 20;
    }
    return rv;
  }
  return olcEncode(lat, lon);
}

function renderFormats(lat, lon){
  const dec = `${lat.toFixed(6)}, ${lon.toFixed(6)}`;
  const dms = `${fmtDMS(lat, true)} ${fmtDMS(lon, false)}`;
  const osm = `https://www.openstreetmap.org/?mlat=${lat}&mlon=${lon}#map=15/${lat}/${lon}`;
  const gmaps = `https://www.google.com/maps?q=${lat},${lon}`;
  const pc = plusCode(lat, lon);
  const fmts = [
    {label: t('fmtDec'), val: dec},
    {label: t('fmtDMS'), val: dms},
    {label: t('fmtPlus'), val: pc},
    {label: t('fmtOSM'), val: osm, link: true},
    {label: t('fmtGMaps'), val: gmaps, link: true},
  ];
  $('#formats').innerHTML = fmts.map(f =>
    `<div class="fmt"><div><div style="font-size:.7rem;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin-bottom:2px">${f.label}</div><b>${f.link ? `<a href="${f.val}" target="_blank" rel="noopener" style="color:var(--text);text-decoration:none">${f.val.length>40?f.val.slice(0,40)+'…':f.val}</a>` : f.val}</b></div><button onclick="copyFmt('${f.val.replace(/'/g,"\\'")}')">⧉</button></div>`
  ).join('');
}

window.copyFmt = function(s){ GZ.copyText(s); showToast(t('copied')); };

function detect(){
  hideErr();
  if(!('geolocation' in navigator)){ showErr('errUnavailable'); return; }
  $('#detect-btn').innerHTML = `<span class="geo-spin"></span>${t('detecting')}`;
  $('#detect-btn').disabled = true;
  navigator.geolocation.getCurrentPosition(pos => {
    const { latitude, longitude, accuracy, altitude, altitudeAccuracy, heading, speed } = pos.coords;
    lastPos = { latitude, longitude };
    $('#empty').style.display = 'none';
    $('#results').style.display = 'block';
    $('#lat-v').textContent = latitude.toFixed(6) + '°';
    $('#lon-v').textContent = longitude.toFixed(6) + '°';
    $('#s-acc').textContent = '~' + Math.round(accuracy) + ' m';
    $('#s-alt').textContent = (altitude == null) ? t('notAvailable') : altitude.toFixed(1) + ' m';
    $('#s-spd').textContent = (speed == null || isNaN(speed)) ? t('notAvailable') : (speed * 3.6).toFixed(1) + ' km/h';
    $('#s-head').textContent = (heading == null || isNaN(heading)) ? t('notAvailable') : Math.round(heading) + '°';
    // accuracy bar — smaller accuracy = better, map 5m => 100%, 5000m => 5%
    const pct = Math.max(5, Math.min(100, 100 - (Math.log10(Math.max(5, accuracy)) - 0.7) * 35));
    $('#acc-fill').style.width = pct + '%';
    renderFormats(latitude, longitude);
    // map embed (OpenStreetMap, no API key)
    $('#map').src = `https://www.openstreetmap.org/export/embed.html?bbox=${longitude-0.01}%2C${latitude-0.008}%2C${longitude+0.01}%2C${latitude+0.008}&layer=mapnik&marker=${latitude}%2C${longitude}`;
    $('#map-wrap').style.display = 'block';
    $('#copy-btn').style.display = '';
    $('#map-btn').style.display = '';
    $('#map-btn').onclick = () => window.open(`https://www.openstreetmap.org/?mlat=${latitude}&mlon=${longitude}#map=16/${latitude}/${longitude}`, '_blank', 'noopener');
    $('#detect-btn').innerHTML = '🔄 ' + t('detect');
    $('#detect-btn').disabled = false;
    $('#copy-btn').onclick = () => { GZ.copyText(`${latitude.toFixed(6)}, ${longitude.toFixed(6)}`); showToast(t('copied')); };
  }, err => {
    $('#detect-btn').innerHTML = t('detect');
    $('#detect-btn').disabled = false;
    if(err.code === 1) showErr('errDenied');
    else if(err.code === 2) showErr('errUnavailable');
    else if(err.code === 3) showErr('errTimeout');
    else showErr('errGeneric');
  }, { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 });
}

// labels
$('#detect-btn').textContent = t('detect');
$('#detect-btn').onclick = detect;
$('#lbl-coords').textContent = t('lblCoords');
$('#lat-l').textContent = 'Lat'; $('#lon-l').textContent = 'Lon';
