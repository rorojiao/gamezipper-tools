<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "How does the BPM detector find the tempo?", "acceptedAnswer": {"@type": "Answer", "text": "The microphone mode analyses the audio energy over time and detects onsets (sudden increases in loudness) that typically correspond to beats. The intervals between onsets are converted to beats per minute. Tap mode averages the time between your taps, which is often more accurate for complex rhythms."}}, {"@type": "Question", "name": "Which mode is more accurate?", "acceptedAnswer": {"@type": "Answer", "text": "Tap tempo is usually more reliable because it uses your own sense of the beat. Microphone detection works well for songs with a strong, steady drum beat but can struggle with complex polyrhythms, ambient music or noisy environments."}}, {"@type": "Question", "name": "What BPM ranges do different genres have?", "acceptedAnswer": {"@type": "Answer", "text": "Ballad ~60–80 BPM, hip-hop ~80–100, pop ~100–130, house ~120–130, techno ~120–135, drum and bass ~160–180, dubstep ~140, and gabber ~180–220. Slow paces feel relaxed; fast paces feel energetic."}}, {"@type": "Question", "name": "Is my audio uploaded anywhere?", "acceptedAnswer": {"@type": "Answer", "text": "No. All beat analysis happens entirely in your browser. The microphone stream is processed locally and never recorded or sent to any server."}}]}</script>

<script>
GZI18n.register({
  en: {
    toolTitle: 'BPM Detector (Tempo Finder)',
    toolDesc: 'Find the tempo of any song or rhythm with your microphone or by tapping. Real-time beat detection, tap tempo and genre reference — 100% in your browser.',
    detected: 'Detected Tempo (microphone)',
    tap: 'Tap Tempo',
    start: 'Start Listening',
    stop: 'Stop',
    reset: 'Reset',
    tapHint: 'Tap the button on every beat',
    clear: 'Clear Taps',
    statusReady: 'Click Start Listening or use Tap Tempo',
    statusListening: 'Listening… play music near the mic',
    statusError: 'Microphone access was blocked or unavailable',
    tempoGrave: 'Largo (very slow)',
    tempoLarghetto: 'Larghetto',
    tempoAndante: 'Andante (walking)',
    tempoModerato: 'Moderato',
    tempoAllegro: 'Allegro (fast)',
    tempoPresto: 'Presto (very fast)',
    tempoPrestissimo: 'Prestissimo',
    tapNone: 'Tap at least 2 times',
    tapCount: 'Taps',
    tip: 'Tip: For best mic results play music with a strong beat near the microphone. For complex rhythms, switch to Tap Tempo — your ears are usually more accurate than the algorithm.',
    step1: 'Click Start Listening (or use the Tap button)',
    step2: 'Play music near the microphone, or tap on every beat',
    step3: 'Watch the live BPM and tempo name update',
    step4: 'Click Reset to start a new measurement',
  },
  zh: {
    toolTitle: 'BPM 检测器（节拍查找器）',
    toolDesc: '通过麦克风或点击节拍查找任意歌曲或节奏的速度。实时节拍检测、点击测速和曲风参考 — 100% 浏览器本地运行。',
    detected: '检测到的速度（麦克风）',
    tap: '点击测速',
    start: '开始监听',
    stop: '停止',
    reset: '重置',
    tapHint: '在每一个节拍上点击按钮',
    clear: '清除点击',
    statusReady: '点击「开始监听」或使用「点击测速」',
    statusListening: '监听中… 请在麦克风附近播放音乐',
    statusError: '麦克风被拒绝或不可用',
    tempoGrave: '广板（非常缓慢）',
    tempoLarghetto: '小广板',
    tempoAndante: '行板（步行速度）',
    tempoModerato: '中板',
    tempoAllegro: '快板（快速）',
    tempoPresto: '急板（非常快）',
    tempoPrestissimo: '最急板',
    tapNone: '至少点击 2 次',
    tapCount: '点击次数',
    tip: '提示：麦克风模式请在靠近麦克风处播放节拍强烈的音乐。复杂节奏请改用「点击测速」— 你的耳朵通常比算法更准确。',
    step1: '点击「开始监听」（或使用点击测速按钮）',
    step2: '在麦克风附近播放音乐，或按节拍点击',
    step3: '观察实时 BPM 和速度名称',
    step4: '点击「重置」开始新的测量',
  }
});

const { $, t } = GZ;
let stream = null, audioCtx = null, analyser = null, source = null, rafId = null;
let energyHistory = [], lastBeatTime = 0, beatIntervals = [], energyChart = [];

const startBtn = $('#startBtn');
const stopBtn = $('#stopBtn');
const resetBtn = $('#resetBtn');
const statusEl = $('#status');
const statusTextEl = $('#statusText');
const pulseEl = $('#pulse');
const deviceSelect = $('#deviceSelect');
const chart = $('#chart');
const chartCtx = chart.getContext('2d');

startBtn.textContent = t('start');
stopBtn.textContent = t('stop');
resetBtn.textContent = t('reset');
$('#lblDetected').textContent = t('detected');
$('#lblTap').textContent = t('tap');
$('#tapHint').textContent = t('tapHint');
$('#tapClear').textContent = t('clear');
$('#tapInfo').textContent = t('tapNone');
$('#tip').innerHTML = '💡 ' + t('tip');
$('#tempoName').textContent = '—';

setStatus('statusReady', 'bp-warn');

function setStatus(key, cls) {
  statusEl.className = 'bp-status show ' + cls;
  statusEl.textContent = t(key);
  statusTextEl.textContent = t(key);
}

function tempoNameFor(bpm) {
  if (bpm <= 0) return '—';
  if (bpm < 60) return t('tempoGrave');
  if (bpm < 66) return t('tempoLarghetto');
  if (bpm < 90) return t('tempoAndante');
  if (bpm < 110) return t('tempoModerato');
  if (bpm < 140) return t('tempoAllegro');
  if (bpm < 180) return t('tempoPresto');
  return t('tempoPrestissimo');
}

function resizeChart() {
  const dpr = window.devicePixelRatio || 1;
  const r = chart.getBoundingClientRect();
  chart.width = r.width * dpr;
  chart.height = r.height * dpr;
  chartCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
window.addEventListener('resize', resizeChart);

async function listDevices() {
  try {
    const list = await navigator.mediaDevices.enumerateDevices();
    const mics = list.filter(d => d.kind === 'audioinput');
    deviceSelect.innerHTML = mics.map((d, i) => `<option value="${d.deviceId}">${d.label || ('Mic ' + (i + 1))}</option>`).join('');
  } catch (e) {}
}

async function start() {
  try {
    const constraints = {
      audio: {
        deviceId: deviceSelect.value ? { exact: deviceSelect.value } : undefined,
        echoCancellation: true, noiseSuppression: false, autoGainControl: false
      }
    };
    stream = await navigator.mediaDevices.getUserMedia(constraints);
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    source = audioCtx.createMediaStreamSource(stream);
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 1024;
    source.connect(analyser);

    energyHistory = []; beatIntervals = []; energyChart = []; lastBeatTime = 0;
    resizeChart();
    startBtn.disabled = true;
    stopBtn.disabled = false;
    setStatus('statusListening', 'bp-ok');
    listDevices();
    detectLoop();
  } catch (e) {
    setStatus('statusError', 'bp-err');
  }
}

function detectLoop() {
  if (!analyser) return;
  const freq = new Uint8Array(analyser.frequencyBinCount);
  analyser.getByteFrequencyData(freq);

  // Focus on bass/low-mid band where beats live
  let energy = 0, n = 0;
  const bandEnd = Math.min(freq.length, Math.floor(freq.length * 0.15));
  for (let i = 1; i < bandEnd; i++) { energy += freq[i]; n++; }
  energy /= (n || 1);
  const now = performance.now();

  energyHistory.push(energy);
  if (energyHistory.length > 43) energyHistory.shift(); // ~1s @ 25fps
  energyChart.push(energy);
  if (energyChart.length > 200) energyChart.shift();

  // Local average & variance
  const avg = energyHistory.reduce((a, b) => a + b, 0) / energyHistory.length;
  const variance = energyHistory.reduce((a, b) => a + (b - avg) * (b - avg), 0) / energyHistory.length;
  const threshold = avg + Math.sqrt(variance) * 1.4;

  // Beat = local max above threshold with min spacing
  if (energy > threshold && energy > avg * 1.3 && now - lastBeatTime > 250) {
    if (lastBeatTime > 0) {
      const interval = now - lastBeatTime;
      if (interval < 2000) beatIntervals.push(interval);
      if (beatIntervals.length > 12) beatIntervals.shift();
    }
    lastBeatTime = now;
    pulseEl.classList.remove('beat');
    void pulseEl.offsetWidth;
    pulseEl.classList.add('beat');
  }

  // BPM = average interval -> 60000/interval
  if (beatIntervals.length >= 2) {
    // Use median for stability
    const sorted = beatIntervals.slice().sort((a, b) => a - b);
    const med = sorted[Math.floor(sorted.length / 2)];
    let bpm = 60000 / med;
    // Fold into musical range (some beats are half/double time)
    while (bpm < 60) bpm *= 2;
    while (bpm > 200) bpm /= 2;
    $('#bpmVal').textContent = Math.round(bpm);
    $('#tempoName').textContent = tempoNameFor(bpm);
  }

  // draw energy chart
  const w = chart.width / (window.devicePixelRatio || 1);
  const h = chart.height / (window.devicePixelRatio || 1);
  chartCtx.fillStyle = '#0a0a1a';
  chartCtx.fillRect(0, 0, w, h);
  chartCtx.strokeStyle = '#4ecdc4';
  chartCtx.lineWidth = 1.5;
  chartCtx.beginPath();
  for (let i = 0; i < energyChart.length; i++) {
    const x = (i / Math.max(1, energyChart.length - 1)) * w;
    const y = h - (energyChart[i] / 255) * h;
    if (i === 0) chartCtx.moveTo(x, y); else chartCtx.lineTo(x, y);
  }
  chartCtx.stroke();

  rafId = requestAnimationFrame(detectLoop);
}

function stop() {
  if (stream) stream.getTracks().forEach(tr => tr.stop());
  stream = null;
  if (rafId) cancelAnimationFrame(rafId);
  if (audioCtx) { audioCtx.close(); audioCtx = null; }
  startBtn.disabled = false;
  stopBtn.disabled = true;
  setStatus('statusReady', 'bp-warn');
}

function reset() {
  energyHistory = []; beatIntervals = []; energyChart = []; lastBeatTime = 0;
  $('#bpmVal').textContent = '—';
  $('#tempoName').textContent = '—';
}

// Tap tempo
let tapTimes = [];
function doTap() {
  const now = performance.now();
  if (tapTimes.length > 0 && now - tapTimes[tapTimes.length - 1] > 2500) tapTimes = [];
  tapTimes.push(now);
  if (tapTimes.length > 8) tapTimes.shift();
  if (tapTimes.length >= 2) {
    const intervals = [];
    for (let i = 1; i < tapTimes.length; i++) intervals.push(tapTimes[i] - tapTimes[i - 1]);
    const avg = intervals.reduce((a, b) => a + b, 0) / intervals.length;
    let bpm = 60000 / avg;
    $('#bpmVal').textContent = Math.round(bpm);
    $('#tempoName').textContent = tempoNameFor(bpm);
    $('#tapInfo').textContent = t('tapCount') + ': ' + tapTimes.length + ' · ' + Math.round(bpm) + ' BPM';
  } else {
    $('#tapInfo').textContent = t('tapCount') + ': 1 · ' + t('tapNone');
  }
}

startBtn.addEventListener('click', start);
stopBtn.addEventListener('click', stop);
resetBtn.addEventListener('click', reset);
$('#tapBtn').addEventListener('click', doTap);
$('#tapClear').addEventListener('click', () => { tapTimes = []; $('#tapInfo').textContent = t('tapNone'); });
deviceSelect.addEventListener('change', () => { if (stream) { stop(); start(); } });
if (navigator.mediaDevices) listDevices();

GZ.renderToolPage({
  category: 'dev',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🎚️', href:'/dev/audio-tuner.html', name:'Audio Tuner'},
    {icon:'📊', href:'/dev/spectrogram.html', name:'Spectrogram'},
    {icon:'🔊', href:'/dev/decibel-meter.html', name:'Decibel Meter'},
    {icon:'🎵', href:'/fun/metronome.html', name:'Metronome'},
  ]
});
</script>
