<script>
GZI18n.register({
  en: {
    toolTitle: 'Reorder PDF Pages',
    toolDesc: 'Reorder, rearrange and organize PDF pages online for free. Drag any page to a new position, delete unwanted pages, reverse the order, and download a new PDF — 100% in your browser.',

    step4: 'Click Download New PDF to save the rearranged file',
    hint: '💡 Drag a page onto another page to swap. The numbered badge shows the new order.',

  },
  zh: {

    toolDesc: '免费在线重新排列、整理 PDF 页面顺序。拖动任意页面到新位置、删除多余页面、反转顺序并下载新 PDF — 完全浏览器本地处理，无需上传。',
    dropHere: '将 PDF 拖到这里或点击上传',
    pickFile: '选择 PDF 文件',
    loading: '正在加载页面…',
    pages: '页',
    reverse: '↕ 反转',
    reset: '恢复原序',
    download: '下载新 PDF',
    pageLabel: '第',
    moveLeft: '左移',
    moveRight: '右移',
    remove: '删除',
    step1: '拖入或选择一个 PDF 文件',
    step2: '将任意页面拖到另一页上即可交换位置',
    step3: '使用页面上的 ← → 按钮微调，或「反转」一键翻转顺序',
    step4: '点击「下载新 PDF」保存重排后的文件',
    hint: '💡 将页面拖到另一页上即可交换。数字徽标显示新的顺序。',
    downloadOk: '✓ 下载成功！',
  }
});

const { PDFDocument, degrees } = PDFLib;
const { $, t } = GZ;
let pdfBytes = null, pdfDoc = null;
let order = []; // order[newIdx] = originalPageIndex (0-based)
let removed = new Set(); // original page indices removed

function updateStatus() {
  const remaining = order.length - removed.size;
  $('#status').innerHTML = `<span class="tag-counter"><b>${remaining}</b> ${t('pages')}</span>`;
  const dl = $('#toolbar').querySelector('[data-act="download"]');
  if (dl) dl.disabled = remaining === 0;
}

function getActiveOrder() {
  return order.filter(idx => !removed.has(idx));
}

function renderToolbar() {
  $('#toolbar').style.display = 'flex';
  $('#toolbar').innerHTML = `
    <button class="gz-btn gz-btn-secondary" data-act="reverse">${t('reverse')}</button>
    <button class="gz-btn gz-btn-secondary" data-act="reset">↻ ${t('reset')}</button>
    <button class="gz-btn" data-act="download">⬇️ ${t('download')}</button>
    <button class="gz-btn gz-btn-secondary" data-act="newfile">↻ ${t('pickFile')}</button>
  `;
  $('#toolbar').querySelectorAll('button').forEach(b => {
    b.onclick = () => handleAction(b.dataset.act);
  });
  $('#hint').style.display = 'block';
  $('#hint').textContent = t('hint');
}

function handleAction(act) {
  if (act === 'reverse') {
    const active = getActiveOrder();
    removed.clear();
    order = active.reverse();
    renderPages(); updateStatus();
  }
  else if (act === 'reset') {
    removed.clear();
    order = order.map((_, i) => i); // identity
    renderPages(); updateStatus();
  }
  else if (act === 'download') downloadPdf();
  else if (act === 'newfile') resetAll();
}

function resetAll() {
  pdfBytes=null; pdfDoc=null; order=[]; removed.clear();
  $('#page-grid').innerHTML=''; $('#toolbar').style.display='none';
  $('#status').textContent=''; $('#hint').style.display='none';
  $('#drop-text').textContent = t('dropHere');
  $('#file-input').value='';
}

function renderPages() {
  const grid = $('#page-grid');
  grid.innerHTML = '';
  getActiveOrder().forEach((origIdx, newIdx) => {
    const card = document.createElement('div');
    card.className = 'page-card';
    card.draggable = true;
    card.dataset.origIdx = origIdx;
    card.innerHTML = `
      <div class="pg-order">${newIdx+1}</div>
      <div class="preview" style="height:130px"><span style="font-size:1.8rem;opacity:.4">📄</span></div>
      <div class="pg-num">${t('pageLabel')} ${origIdx+1}</div>
      <div class="actions">
        <button title="${t('moveLeft')}" data-act="left">←</button>
        <button title="${t('moveRight')}" data-act="right">→</button>
        <button title="${t('remove')}" data-act="del">✕</button>
      </div>
    `;
    card.querySelectorAll('button').forEach(b => {
      b.onclick = (e) => { e.stopPropagation(); pageAction(b.dataset.act, card); };
    });
    bindDrag(card);
    grid.appendChild(card);
  });
}

function pageAction(act, card) {
  const active = getActiveOrder();
  const curPos = active.indexOf(+card.dataset.origIdx);
  if (act === 'left' && curPos > 0) {
    [active[curPos-1], active[curPos]] = [active[curPos], active[curPos-1]];
    order = active; renderPages(); updateStatus();
  }
  else if (act === 'right' && curPos < active.length - 1) {
    [active[curPos+1], active[curPos]] = [active[curPos], active[curPos+1]];
    order = active; renderPages(); updateStatus();
  }
  else if (act === 'del') {
    removed.add(+card.dataset.origIdx);
    renderPages(); updateStatus();
  }
}

function bindDrag(card) {
  card.addEventListener('dragstart', e => {
    card.classList.add('dragging');
    e.dataTransfer.setData('text/plain', card.dataset.origIdx);
    e.dataTransfer.effectAllowed = 'move';
  });
  card.addEventListener('dragend', () => card.classList.remove('dragging'));
  card.addEventListener('dragover', e => {
    e.preventDefault();
    card.classList.add('drag-over');
  });
  card.addEventListener('dragleave', () => card.classList.remove('drag-over'));
  card.addEventListener('drop', e => {
    e.preventDefault();
    card.classList.remove('drag-over');
    const srcOrig = +e.dataTransfer.getData('text/plain');
    const dstOrig = +card.dataset.origIdx;
    if (srcOrig === dstOrig) return;
    const active = getActiveOrder();
    const srcPos = active.indexOf(srcOrig);
    const dstPos = active.indexOf(dstOrig);
    if (srcPos < 0 || dstPos < 0) return;
    // Swap positions
    [active[srcPos], active[dstPos]] = [active[dstPos], active[srcPos]];
    order = active; renderPages(); updateStatus();
  });
}

async function loadFile(file) {
  if (!file || file.type !== 'application/pdf') { $('#status').textContent = '⚠️ Please select a PDF file.'; return; }
  pdfBytes = new Uint8Array(await file.arrayBuffer());
  try {
    pdfDoc = await PDFDocument.load(pdfBytes);
  } catch (e) {
    $('#status').textContent = '⚠️ Could not read PDF: ' + e.message;
    return;
  }
  $('#drop-text').innerHTML = `<b>${file.name}</b> (${(file.size/1024).toFixed(0)} KB)`;
  order = pdfDoc.getPageIndices();
  removed.clear();
  renderToolbar();
  $('#status').textContent = t('loading');
  renderPages();
  updateStatus();
}

async function downloadPdf() {
  const active = getActiveOrder();
  if (active.length === 0) return;
  const newPdf = await PDFDocument.create();
  const pages = await newPdf.copyPages(pdfDoc, active);
  pages.forEach(p => newPdf.addPage(p));
  const out = await newPdf.save();
  const blob = new Blob([out], { type: 'application/pdf' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'pdf-reordered.pdf';
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 5000);
  $('#status').innerHTML = `<span style="color:var(--gz-success,#00d672)">${t('downloadOk')} ${active.length} ${t('pages')}.</span>`;
}

$('#drop-area').onclick = () => $('#file-input').click();
$('#file-input').onchange = e => { if (e.target.files[0]) loadFile(e.target.files[0]); };
$('#drop-area').ondragover = e => { e.preventDefault(); $('#drop-area').classList.add('drag'); };
$('#drop-area').ondragleave = () => $('#drop-area').classList.remove('drag');
$('#drop-area').ondrop = e => {
  e.preventDefault();
  $('#drop-area').classList.remove('drag');
  if (e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]);
};

$('#drop-text').textContent = t('dropHere');

GZ.renderToolPage({
  category: 'convert',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🗑️', href:'/convert/pdf-delete-pages.html', name:'Delete PDF Pages'},
    {icon:'✂️', href:'/convert/pdf-page-splitter.html', name:'PDF Split'},
    {icon:'🔄', href:'/convert/pdf-rotate.html', name:'PDF Rotate'},
    {icon:'📄', href:'/convert/pdf-merger.html', name:'PDF Merger'},
  ]
});
</script>
