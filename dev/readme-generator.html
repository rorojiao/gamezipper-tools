<div class="gz-container">
  <div class="gz-tool-header"><h1 id="title"></h1><p class="desc" id="desc"></p></div>
  <div class="gz-tool-area">

Clean, typed API
Local-first and privacy friendly
Export-ready output</textarea></label>

          <label class="rm-wide"><span id="lbl-repo"></span><input id="repo" value="https://github.com/username/my-awesome-app" oninput="generate()"></label>
        </div>

<script>
GZI18n.register({
  en:{toolTitle:'README Generator',toolDesc:'Create polished GitHub README.md files with badges, installation, usage, features, tech stack and license sections.',name:'Project name',tagline:'Short description',features:'Features (one per line)',install:'Install command',usage:'Usage command',stack:'Tech stack',repo:'Repository URL',license:'License',outputLabel:'Generated README.md',generate:'Generate',download:'Download README.md',step1:'Enter your project name, description, stack and repository URL.',step2:'Add features one per line and choose optional README sections.',step3:'Generate a Markdown README and edit it directly if needed.',step4:'Copy or download README.md and commit it to your project.'},
  zh:{toolTitle:'README 生成器',toolDesc:'创建精美的 GitHub README.md，包含徽章、安装、用法、功能、技术栈和许可证章节。',name:'项目名称',tagline:'简短描述',features:'功能（每行一个）',install:'安装命令',usage:'使用命令',stack:'技术栈',repo:'仓库 URL',license:'许可证',outputLabel:'生成的 README.md',generate:'生成',download:'下载 README.md',step1:'输入项目名称、描述、技术栈和仓库 URL。',step2:'逐行添加功能，并选择可选 README 章节。',step3:'生成 Markdown README，必要时可直接编辑。',step4:'复制或下载 README.md 并提交到项目。'}
});
const {$,copyText,t}=GZ;
function lines(id){return $('#'+id).value.split('\n').map(s=>s.trim()).filter(Boolean)}
function slug(s){return String(s||'').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'')}
function generate(){
  const name=$('#projectName').value.trim()||'Project Name'; const desc=$('#tagline').value.trim(); const repo=$('#repo').value.trim(); const lic=$('#license').value; const features=lines('features'); const stack=$('#stack').value.trim();
  const sections=[]; sections.push(`# ${name}`); if(desc)sections.push(desc);
  if($('#badges').checked){sections.push(`[![License](https://img.shields.io/badge/license-${encodeURIComponent(lic)}-blue.svg)](#license) ${repo?'[![GitHub stars](https://img.shields.io/github/stars/'+repo.replace(/^https:\/\/github.com\//,'')+'?style=social)]('+repo+')':''}`)}
  if($('#toc').checked)sections.push(`## Table of Contents\n\n- [Features](#features)\n- [Tech Stack](#tech-stack)\n- [Installation](#installation)\n- [Usage](#usage)${$('#env').checked?'\n- [Environment Variables](#environment-variables)':''}${$('#contrib').checked?'\n- [Contributing](#contributing)':''}\n- [License](#license)`);
  sections.push(`## Features\n\n${features.length?features.map(f=>`- ${f}`).join('\n'):'- Add your first feature here'}`);
  sections.push(`## Tech Stack\n\n${stack||'Add your technologies here.'}`);
  sections.push(`## Installation\n\n\`\`\`bash\n${$('#install').value.trim()||'npm install'}\n\`\`\``);
  sections.push(`## Usage\n\n\`\`\`bash\n${$('#usage').value.trim()||'npm run dev'}\n\`\`\``);
  if($('#env').checked)sections.push(`## Environment Variables\n\nCreate a \`.env\` file if your app needs configuration:\n\n\`\`\`env\nAPI_URL=https://api.example.com\nAPI_KEY=your-api-key\n\`\`\``);
  if($('#contrib').checked)sections.push(`## Contributing\n\n1. Fork the repository\n2. Create a feature branch: \`git checkout -b feature/amazing-feature\`\n3. Commit your changes: \`git commit -m 'feat: add amazing feature'\`\n4. Push to the branch and open a pull request`);
  if(repo)sections.push(`## Repository\n\n${repo}`);
  sections.push(`## License\n\nThis project is licensed under the ${lic} license.`);
  $('#output').textContent=sections.join('\n\n');
}
function downloadReadme(){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([$('#output').textContent||''],{type:'text/markdown'}));a.download='README.md';a.click();URL.revokeObjectURL(a.href)}
['name','tagline','features','install','usage','stack','repo','license'].forEach(k=>$('#lbl-'+k).textContent=t(k));$('#lbl-out').textContent=t('outputLabel');
$('#toolbar').innerHTML=`<button class="gz-btn" onclick="generate()">${t('generate')}</button><button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button><button class="gz-btn gz-btn-secondary" onclick="downloadReadme()">${t('download')}</button><button class="gz-btn gz-btn-secondary" onclick="document.querySelectorAll('input[type=text],textarea').forEach(el=>el.value='');generate()">${t('clear')}</button>`;
GZ.renderToolPage({category:'dev',titleKey:'toolTitle',descKey:'toolDesc',howToSteps:['step1','step2','step3','step4'],related:[{icon:'📜',href:'/dev/license-generator.html',name:'License Generator'},{icon:'🚫',href:'/dev/gitignore-generator.html',name:'.gitignore Generator'},{icon:'📋',href:'/dev/changelog-generator.html',name:'Changelog Generator'},{icon:'🌿',href:'/dev/git-branch-generator.html',name:'Git Branch Generator'}]});
generate();
</script>
