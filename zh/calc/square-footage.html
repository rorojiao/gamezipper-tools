<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "How do I calculate square footage?", "acceptedAnswer": {"@type": "Answer", "text": "For rectangles: multiply length × width. For triangles: ½ × base × height. For circles: π × radius². For complex rooms, break them into simple shapes, calculate each, and add them together. The calculator does this automatically."}}, {"@type": "Question", "name": "How many square feet is a 10x10 room?", "acceptedAnswer": {"@type": "Answer", "text": "A 10×10 room is 100 square feet. A 12×12 room is 144 sq ft (the standard '12x12 room' used in real estate listings). Bedrooms are typically 100-200 sq ft, living rooms 200-400 sq ft, and 2-car garages around 400-500 sq ft."}}, {"@type": "Question", "name": "How much paint do I need for a room?", "acceptedAnswer": {"@type": "Answer", "text": "A standard interior wall takes about 1 gallon of paint per 350-400 square feet. So a 12×12 room (4 walls × 12 ft × 8 ft = 384 sq ft) needs about 1 gallon. Add 10% for wastage and a second coat. The calculator gives a 10% waste-adjusted estimate."}}, {"@type": "Question", "name": "How do I convert square feet to square meters?", "acceptedAnswer": {"@type": "Answer", "text": "Multiply square feet by 0.0929 to get square meters. For example, 1000 sq ft ≈ 92.9 m². This calculator shows all common area units simultaneously so you never need to convert manually."}}]}</script>

<script>
GZI18n.register({
  en: {
    toolTitle: 'Square Footage Calculator',
    toolDesc: 'Calculate area of rectangles, triangles, circles and multi-room layouts. Get material estimates for flooring, paint, tile, wallpaper and turf.',
    rect: 'Rectangle',
    tri: 'Triangle',
    circ: 'Circle',
    room: 'Multi-Room',
    length: 'Length',
    width: 'Width',
    base: 'Base',
    height: 'Height',
    radius: 'Radius',
    diameter: 'Diameter',
    addRoom: '+ Add room',
    roomName: 'Room',
    sqft: 'square feet',
    sqm: 'square meters',
    sqin: 'square inches',
    acres: 'acres',
    hectares: 'hectares',
    materials: 'Material Estimates',
    paint: '🎨 Paint (1 gal covers 350 sq ft)',
    paintNote: '1-2 coats, +10% waste',
    flooring: '🪵 Flooring / Tile (12x12)',
    flooringNote: 'Planks / tiles needed',
    wallpaper: '🧻 Wallpaper rolls',
    wallpaperNote: 'Euro rolls (5 m² each)',
    turf: '🌱 Turf / Sod',
    turfNote: 'Pallets (450 sq ft each)',
    concrete: '🧱 Concrete (4" thick)',
    concreteNote: 'Cubic yards needed',
    step1: 'Pick a shape: rectangle, triangle, circle or multi-room layout',
    step2: 'Enter your measurements (in feet, inches, meters, yards or cm)',
    step3: 'See the area in 5+ units instantly',
    step4: 'Toggle material estimates for paint, flooring, wallpaper, turf, and concrete',
  },
  zh: {
    toolTitle: '面积（平方英尺）计算器',
    toolDesc: '计算矩形、三角形、圆形和多房间布局的面积，提供油漆、地板、瓷砖、墙纸和草皮的用料估算。',
    rect: '矩形',
    tri: '三角形',
    circ: '圆形',
    room: '多房间',
    length: '长',
    width: '宽',
    base: '底',
    height: '高',
    radius: '半径',
    diameter: '直径',
    addRoom: '+ 添加房间',
    roomName: '房间',
    sqft: '平方英尺',
    sqm: '平方米',
    sqin: '平方英寸',
    acres: '英亩',
    hectares: '公顷',
    materials: '材料用量估算',
    paint: '🎨 油漆 (1 加仑覆盖 350 平方英尺)',
    paintNote: '1-2 遍 + 10% 损耗',
    flooring: '🪵 地板/瓷砖 (12x12)',
    flooringNote: '所需板/砖数',
    wallpaper: '🧻 墙纸卷',
    wallpaperNote: '欧式卷 (5 平方米/卷)',
    turf: '🌱 草皮',
    turfNote: '托盘 (450 平方英尺/托)',
    concrete: '🧱 混凝土 (4 英寸厚)',
    concreteNote: '所需立方码',
    step1: '选择形状：矩形、三角形、圆形或多房间',
    step2: '输入尺寸（英尺、英寸、米、码或厘米）',
    step3: '即时查看 5+ 种单位的面积',
    step4: '切换材料估算：油漆、地板、墙纸、草皮和混凝土',
  }
});

const { $, t } = GZ;
let shape = 'rect';
let rooms = [{ name: 'Living Room', length: 12, width: 12 }, { name: 'Bedroom', length: 10, width: 10 }];

const materialSpecs = {
  paint: { per: 350, unit: 'gallons', icon: '🎨' },
  flooring: { per: 1, unit: 'tiles (12")', icon: '🪵' },
  wallpaper: { per: 5, unit: 'rolls', icon: '🧻' },
  turf: { per: 450, unit: 'pallets', icon: '🌱' },
  concrete: { per: 81, unit: 'cubic yards', icon: '🧱' } // 4" thick: 81 sqft per cubic yard
};

function renderShapeInputs() {
  let html = '';
  if (shape === 'rect') {
    html = `<div class="sq-inputs">
      <label><span>${t('length')}</span><input type="number" id="length" value="12" step="0.1" oninput="calc()"></label>
      <label><span>${t('width')}</span><input type="number" id="width" value="10" step="0.1" oninput="calc()"></label>
      <label><span>Unit</span><select id="unit" onchange="calc()">
        <option value="ft" selected>feet</option>
        <option value="in">inches</option>
        <option value="yd">yards</option>
        <option value="m">meters</option>
        <option value="cm">centimeters</option>
      </select></label>
    </div>`;
  } else if (shape === 'tri') {
    html = `<div class="sq-inputs">
      <label><span>${t('base')}</span><input type="number" id="base" value="10" step="0.1" oninput="calc()"></label>
      <label><span>${t('height')}</span><input type="number" id="height" value="8" step="0.1" oninput="calc()"></label>
      <label><span>Unit</span><select id="unit" onchange="calc()">
        <option value="ft" selected>feet</option>
        <option value="in">inches</option>
        <option value="yd">yards</option>
        <option value="m">meters</option>
        <option value="cm">centimeters</option>
      </select></label>
    </div>`;
  } else if (shape === 'circ') {
    html = `<div class="sq-inputs">
      <label><span>${t('radius')}</span><input type="number" id="radius" value="10" step="0.1" oninput="calc()"></label>
      <label><span>${t('diameter')}</span><input type="number" id="diameter" value="20" step="0.1" oninput="calc()"></label>
      <label><span>Unit</span><select id="unit" onchange="calc()">
        <option value="ft" selected>feet</option>
        <option value="in">inches</option>
        <option value="yd">yards</option>
        <option value="m">meters</option>
        <option value="cm">centimeters</option>
      </select></label>
    </div>`;
  } else {
    let roomsHtml = rooms.map((r, i) => `
      <div class="sq-room">
        <input type="text" value="${r.name}" onchange="rooms[${i}].name=this.value;calc()">
        <span class="label">${t('length')}</span>
        <input type="number" class="num" value="${r.length}" step="0.1" onchange="rooms[${i}].length=+this.value;calc()">
        <span class="label">${t('width')}</span>
        <input type="number" class="num" value="${r.width}" step="0.1" onchange="rooms[${i}].width=+this.value;calc()">
        <button class="del" onclick="removeRoom(${i})">✕</button>
      </div>`).join('');
    html = `<div class="sq-inputs">${roomsHtml}<button class="sq-add-btn" onclick="addRoom()">${t('addRoom')}</button></div>`;
  }
  $('#shape-area').innerHTML = html;
  if (shape === 'circ') {
    $('#diameter').addEventListener('input', e => { $('#radius').value = (parseFloat(e.target.value)/2).toFixed(2); calc(); });
    $('#radius').addEventListener('input', e => { $('#diameter').value = (parseFloat(e.target.value)*2).toFixed(2); calc(); });
  }
  calc();
}

function addRoom() {
  rooms.push({ name: 'Room ' + (rooms.length + 1), length: 10, width: 10 });
  renderShapeInputs();
  calc();
}
function removeRoom(i) {
  if (rooms.length > 1) { rooms.splice(i, 1); renderShapeInputs(); calc(); }
}

function getUnit() { return $('#unit') ? $('#unit').value : 'ft'; }

function calc() {
  let totalSqFt = 0;
  if (shape === 'rect') {
    const l = parseFloat($('#length').value) || 0;
    const w = parseFloat($('#width').value) || 0;
    const u = getUnit();
    let sq = l * w;
    if (u === 'in') sq = sq / 144;
    else if (u === 'yd') sq = sq * 9;
    else if (u === 'm') sq = sq * 10.7639;
    else if (u === 'cm') sq = sq / 929.0304;
    totalSqFt = sq;
  } else if (shape === 'tri') {
    const b = parseFloat($('#base').value) || 0;
    const h = parseFloat($('#height').value) || 0;
    const u = getUnit();
    let sq = 0.5 * b * h;
    if (u === 'in') sq = sq / 144;
    else if (u === 'yd') sq = sq * 9;
    else if (u === 'm') sq = sq * 10.7639;
    else if (u === 'cm') sq = sq / 929.0304;
    totalSqFt = sq;
  } else if (shape === 'circ') {
    const r = parseFloat($('#radius').value) || 0;
    const u = getUnit();
    let sq = Math.PI * r * r;
    if (u === 'in') sq = sq / 144;
    else if (u === 'yd') sq = sq * 9;
    else if (u === 'm') sq = sq * 10.7639;
    else if (u === 'cm') sq = sq / 929.0304;
    totalSqFt = sq;
  } else {
    totalSqFt = rooms.reduce((sum, r) => sum + r.length * r.width, 0);
  }

  if (totalSqFt <= 0) {
    $('#result').style.display = 'none';
    $('#materials').style.display = 'none';
    return;
  }
  $('#result').style.display = 'block';
  $('#main-val').textContent = totalSqFt.toLocaleString(undefined, { maximumFractionDigits: 2 });
  $('#main-lbl').textContent = t('sqft');
  $('#units').innerHTML = `
    <div class="sq-result-card"><div class="v">${totalSqFt.toLocaleString(undefined, { maximumFractionDigits: 1 })}</div><div class="l">${t('sqft')}</div></div>
    <div class="sq-result-card"><div class="v">${(totalSqFt * 0.092903).toLocaleString(undefined, { maximumFractionDigits: 2 })}</div><div class="l">${t('sqm')}</div></div>
    <div class="sq-result-card"><div class="v">${(totalSqFt * 144).toLocaleString(undefined, { maximumFractionDigits: 0 })}</div><div class="l">${t('sqin')}</div></div>
    <div class="sq-result-card"><div class="v">${(totalSqFt / 43560).toLocaleString(undefined, { maximumFractionDigits: 5 })}</div><div class="l">${t('acres')}</div></div>
    <div class="sq-result-card"><div class="v">${(totalSqFt / 107639).toLocaleString(undefined, { maximumFractionDigits: 5 })}</div><div class="l">${t('hectares')}</div></div>
  `;

  // Material estimates
  $('#materials').style.display = 'block';
  $('#mat-title').textContent = t('materials');
  const paintGal = Math.ceil((totalSqFt / materialSpecs.paint.per) * 1.1); // +10% waste
  const tiles = Math.ceil(totalSqFt * 1.1);
  const rolls = Math.ceil(totalSqFt / materialSpecs.wallpaper.per);
  const pallets = Math.ceil(totalSqFt / materialSpecs.turf.per);
  const concrete = (totalSqFt / 81).toFixed(2); // 4" thick

  $('#mat-grid').innerHTML = `
    <div class="sq-mat"><div class="name">🎨 ${t('paint').split(' (')[0]}</div><div class="val">${paintGal} gallons</div><div class="note">${t('paintNote')}</div></div>
    <div class="sq-mat"><div class="name">🪵 ${t('flooring').split(' (')[0]}</div><div class="val">${tiles} ${materialSpecs.flooring.unit}</div><div class="note">${t('flooringNote')}</div></div>
    <div class="sq-mat"><div class="name">🧻 ${t('wallpaper')}</div><div class="val">${rolls} rolls</div><div class="note">${t('wallpaperNote')}</div></div>
    <div class="sq-mat"><div class="name">🌱 ${t('turf')}</div><div class="val">${pallets} pallets</div><div class="note">${t('turfNote')}</div></div>
    <div class="sq-mat"><div class="name">🧱 ${t('concrete')}</div><div class="val">${concrete} yd³</div><div class="note">${t('concreteNote')}</div></div>
  `;
}

function setShape(s) {
  shape = s;
  document.querySelectorAll('.sq-tab').forEach(b => b.classList.remove('active'));
  document.querySelector(`.sq-tab[data-shape="${s}"]`).classList.add('active');
  renderShapeInputs();
}
document.querySelectorAll('.sq-tab').forEach(b => b.addEventListener('click', () => setShape(b.dataset.shape)));

renderShapeInputs();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🧱', href:'/calc/concrete.html', name:'Concrete Calculator'},
    {icon:'📐', href:'/calc/aspect-ratio.html', name:'Aspect Ratio'},
    {icon:'🏠', href:'/calc/rent-vs-buy.html', name:'Rent vs Buy'},
    {icon:'🏗️', href:'/calc/percentage-calculator.html', name:'Percentage'},
  ]
});
</script>
