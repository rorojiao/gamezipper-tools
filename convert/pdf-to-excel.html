<script>
GZI18n.register({
  en: {
    toolTitle: 'PDF to Excel Converter',
    toolDesc: 'Extract tables and tabular data from PDF files into editable XLSX spreadsheets. 100% browser-based — no upload, no signup.',

    step2: 'The tool extracts text and detects table rows automatically',
    step3: 'Preview the extracted data in the table view',
    step4: 'Click Download XLSX or CSV to save the spreadsheet',
  },
  zh: {
    toolTitle: 'PDF 转 Excel 转换器',
    toolDesc: '从 PDF 文件中提取表格和表格数据，转为可编辑的 XLSX 电子表格。100% 浏览器本地运行 — 无需上传、无需注册。',
    dropHere: '将 PDF 拖放到此处或点击浏览',
    processing: '处理中… 正在从 PDF 提取文本',
    done: '✓ 转换完成！',
    noText: '未找到可提取的文本。此 PDF 可能是扫描件（图片格式）。',
    downloadXLSX: '下载 XLSX',
    downloadCSV: '下载 CSV',
    rowsExtracted: '行已提取',
    pagesProcessed: '页已处理',
    step1: '将 PDF 文件拖放到上传区域',
    step2: '工具自动提取文本并检测表格行',
    step3: '在表格视图中预览提取的数据',
    step4: '点击下载 XLSX 或 CSV 保存电子表格',
  }
});

const { $, copyText, t } = GZ;
if (window.pdfjsLib) pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

let extractedData = [];

async function processPDF(file) {
  $('#status').innerHTML = `<span style="color:var(--gz-accent)">${t('processing')}…</span>`;
  $('#preview-area').innerHTML = '';
  try {
    const arrayBuffer = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
    extractedData = [];
    for (let i = 1; i <= pdf.numPages; i++) {
      const page = await pdf.getPage(i);
      const content = await page.getTextContent();
      // Group text items into rows by Y position
      const rows = {};
      content.items.forEach(item => {
        const y = Math.round(item.transform[5]);
        const x = item.transform[4];
        if (!rows[y]) rows[y] = [];
        rows[y].push({ x: x, text: item.str });
      });
      // Sort rows top-to-bottom (higher Y = higher on page)
      const sortedYs = Object.keys(rows).map(Number).sort((a, b) => b - a);
      for (const y of sortedYs) {
        const cells = rows[y].sort((a, b) => a.x - b.x).map(c => c.text);
        // Merge adjacent cells that are parts of the same word (pdf.js splits on spaces)
        const merged = [];
        let current = '';
        for (const cell of cells) {
          if (cell === '' || cell === ' ') {
            if (current) { merged.push(current); current = ''; }
          } else if (cell.endsWith(' ')) {
            current += cell;
            merged.push(current.trim());
            current = '';
          } else {
            current += cell;
          }
        }
        if (current.trim()) merged.push(current.trim());
        if (merged.length > 0) {
          merged.push(`[Page ${i}]`);
          extractedData.push(merged);
        }
      }
    }
    if (extractedData.length === 0) {
      $('#status').innerHTML = `<span style="color:var(--gz-accent)">${t('noText')}</span>`;
      return;
    }
    $('#status').innerHTML = `<span style="color:var(--gz-success)">${t('done')} ${extractedData.length} ${t('rowsExtracted')} · ${pdf.numPages} ${t('pagesProcessed')}</span>`;
    renderPreview();
  } catch (e) {
    $('#status').innerHTML = `<span style="color:var(--gz-accent)">Error: ${escapeHtml(e.message)}</span>`;
  }
}

function renderPreview() {
  const maxRows = Math.min(extractedData.length, 50);
  let html = '<table class="preview-table"><tbody>';
  for (let i = 0; i < maxRows; i++) {
    html += '<tr>';
    for (const cell of extractedData[i]) {
      html += `<td>${escapeHtml(cell)}</td>`;
    }
    html += '</tr>';
  }
  html += '</tbody></table>';
  if (extractedData.length > 50) {
    html += `<p style="font-size:.8em;color:var(--text2);margin-top:8px">Showing first 50 of ${extractedData.length} rows. Download for full data.</p>`;
  }
  $('#preview-area').innerHTML = html;
}

function escapeHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function downloadXLSX() {
  if (extractedData.length === 0) return;
  const ws = XLSX.utils.aoa_to_sheet(extractedData);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Extracted');
  XLSX.writeFile(wb, 'converted.xlsx');
}

function downloadCSV() {
  if (extractedData.length === 0) return;
  const ws = XLSX.utils.aoa_to_sheet(extractedData);
  const csv = XLSX.utils.sheet_to_csv(ws);
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'converted.csv';
  a.click();
  URL.revokeObjectURL(a.href);
}

// Drag & drop
const dz = $('#dropzone');
dz.addEventListener('click', () => $('#file-input').click());
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('dragover'); });
dz.addEventListener('dragleave', () => dz.classList.remove('dragover'));
dz.addEventListener('drop', e => {
  e.preventDefault();
  dz.classList.remove('dragover');
  const file = e.dataTransfer.files[0];
  if (file && file.type === 'application/pdf') processPDF(file);
});
$('#file-input').addEventListener('change', e => {
  const file = e.target.files[0];
  if (file) processPDF(file);
});

$('#dz-text').textContent = t('dropHere');

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="downloadXLSX()">${t('downloadXLSX')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="downloadCSV()">${t('downloadCSV')}</button>`;

    {icon:'📄', href:'/convert/pdf-to-html.html', name:'PDF to HTML'},
  ]
});
</script>
