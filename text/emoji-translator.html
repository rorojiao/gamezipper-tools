const REV = {};
for (const [w, e] of Object.entries(DICT)) { if (!REV[e]) REV[e] = w; }

function toEmoji(text) {
  return text.split(/(\s+)/).map(tok => {
    if (/^\s+$/.test(tok)) return tok;
    const clean = tok.toLowerCase().replace(/[^a-z']/g, '');
    const punct = tok.slice(clean.length ? tok.toLowerCase().indexOf(clean) + clean.length : tok.length);
    const emoji = DICT[clean];
    return emoji ? emoji + ' ' : tok;
  }).join('');
}

function toText(text) {
  let out = text;
  for (const [emoji, word] of Object.entries(REV)) {
    out = out.split(emoji).join(' ' + word + ' ');
  }
  return out.replace(/\s+/g, ' ').trim();
}

function bothMode(text) {
  return text.split(/(\s+)/).map(tok => {
    if (/^\s+$/.test(tok)) return tok;
    const clean = tok.toLowerCase().replace(/[^a-z']/g, '');
    const emoji = DICT[clean];
    return emoji ? tok + emoji : tok;
  }).join('');
}

function render() {
  const text = $('#input').value;
  let result = '';
  if (!text.trim()) { $('#output').textContent = ''; return; }
  if (mode === 'encode') result = toEmoji(text);
  else if (mode === 'decode') result = toText(text);
  else result = bothMode(text);
  $('#output').textContent = result;
}

function setMode(m) {
  mode = m;
  $$('.et-mode button').forEach(b => b.classList.toggle('active', b.dataset.m === m));

}
