.serp-title{color:#1a0dab;font-size:20px;line-height:1.3;cursor:pointer;margin-bottom:4px}

<script type="application/ld+json">{"@context":"https://schema.org","@type":"WebApplication","name":"Rich Snippet Preview Tool","description":"Preview rich snippets and structured data results in Google search. Test FAQ, Product, Recipe and more schema types with live SERP preview.","url": "https://tools.gamezipper.com/zh/seo/rich-snippet-preview.html","applicationCategory":"Utility","operatingSystem":"Web Browser","offers":{"@type":"Offer","price":"0"}}</script>
<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is a rich snippet?", "acceptedAnswer": {"@type": "Answer", "text": "A rich snippet is an enhanced Google search result that displays extra information like star ratings, images, FAQ dropdowns, recipe details, event dates and more, powered by structured data (JSON-LD)."}}, {"@type": "Question", "name": "How do I get rich snippets?", "acceptedAnswer": {"@type": "Answer", "text": "Add JSON-LD structured data to your HTML that follows schema.org specifications. Google reads this data to display enhanced results for FAQ, HowTo, Product, Recipe, Event and Review types."}}, {"@type": "Question", "name": "What schema types does this tool support?", "acceptedAnswer": {"@type": "Answer", "text": "This tool supports preview for FAQ, HowTo, Product, Recipe, Article, Event and Review schema types with corresponding JSON-LD code generation."}}, {"@type": "Question", "name": "Is this tool free?", "acceptedAnswer": {"@type": "Answer", "text": "Yes, this rich snippet preview tool is completely free and runs entirely in your browser. No data is sent to any server."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="gz-split">
      <div>
        <label id="lbl-in"></label>
        <div style="padding:8px">
          <div class="cfg-row"><label>Schema Type</label><select id="cfg-type"><option value="faq">FAQ Page</option><option value="product">Product</option><option value="recipe">Recipe</option><option value="article">Article</option><option value="event">Event</option><option value="review">Review</option><option value="howto">HowTo</option></select></div>
          <div class="cfg-row"><label>Page Title</label><input type="text" id="cfg-title" value="Best Chocolate Cake Recipe"></div>
          <div class="cfg-row"><label>URL</label><input type="url" id="cfg-url" value="https://example.com/chocolate-cake"></div>
          <div class="cfg-row"><label>Description</label><textarea id="cfg-desc">Learn how to make the best chocolate cake from scratch with this easy recipe.</textarea></div>
          <div id="dynamic-fields"></div>
        </div>
      </div>
      <div>
        <label id="lbl-out"></label>
        <div style="padding:8px">
          <div id="preview"></div>
          <div class="schema-output" id="schema-output"></div>
        </div>
      </div>
    </div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Rich Snippet Preview',
    toolDesc: 'Preview how structured data appears in Google search results. Test FAQ, Product, Recipe, Article, Event and Review rich snippets.',
    step1: 'Select the schema type you want to preview',
    step2: 'Fill in the fields — title, description, and type-specific data',
    step3: 'See the live Google SERP rich snippet preview',
    step4: 'Copy the generated JSON-LD schema and add it to your page',
  },
  zh: {
    toolTitle: '富媒体摘要预览工具',
    toolDesc: '预览结构化数据在 Google 搜索结果中的显示效果。测试 FAQ、产品、食谱、文章、活动和评论的富媒体摘要。',
    step1: '选择要预览的结构化数据类型',
    step2: '填写字段 — 标题、描述和类型特定数据',
    step3: '查看实时 Google SERP 富媒体摘要预览',
    step4: '复制生成的 JSON-LD 结构化数据并添加到页面中',
  }
});

const { $, copyText, t } = GZ;

function generate() {
  const type = $('#cfg-type').value;
  const title = $('#cfg-title').value.trim();
  const url = $('#cfg-url').value.trim();
  const desc = $('#cfg-desc').value.trim();
  let html = '';
  let schema = {};

  if (type === 'faq') {
    const q1 = $('#cfg-q1')?.value.trim() || 'What ingredients do I need?';
    const a1 = $('#cfg-a1')?.value.trim() || 'You need flour, sugar, cocoa powder, eggs, butter and milk.';
    const q2 = $('#cfg-q2')?.value.trim() || 'How long does it take to bake?';
    const a2 = $('#cfg-a2')?.value.trim() || 'About 30-35 minutes at 350°F (175°C).';
    html = `<div class="serp-preview"><div class="serp-title">${title}</div><div class="serp-url">${url}</div><div class="serp-desc">${desc}</div><div class="serp-faq"><div class="serp-faq-item"><div class="serp-faq-q">❓ ${q1}</div></div><div class="serp-faq-item"><div class="serp-faq-q">❓ ${q2}</div></div></div></div>`;
    schema = {"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":q1,"acceptedAnswer":{"@type":"Answer","text":a1}},{"@type":"Question","name":q2,"acceptedAnswer":{"@type":"Answer","text":a2}}]};
  } else if (type === 'product') {
    const price = $('#cfg-price')?.value.trim() || '29.99';
    const rating = parseFloat($('#cfg-rating')?.value) || 4.5;
    const reviews = $('#cfg-reviews')?.value.trim() || '128';
    const stars = '★'.repeat(Math.floor(rating)) + (rating % 1 >= 0.5 ? '½' : '');
    html = `<div class="serp-preview"><div class="serp-title">${title}</div><div class="serp-url">${url}</div><div class="serp-rating"><span class="serp-stars">${stars}</span><span class="serp-rating-text">Rating: ${rating}/5 (${reviews} reviews)</span></div><div class="serp-price">$${price}</div><div class="serp-instock">✓ In stock</div><div class="serp-desc">${desc}</div></div>`;
    schema = {"@context":"https://schema.org","@type":"Product","name":title,"description":desc,"offers":{"@type":"Offer","price":price,"priceCurrency":"USD","availability":"https://schema.org/InStock"},"aggregateRating":{"@type":"AggregateRating","ratingValue":rating,"reviewCount":reviews}};
  } else if (type === 'recipe') {
    const time = $('#cfg-preptime')?.value.trim() || '45 min';
    const cal = $('#cfg-calories')?.value.trim() || '350';
    const rating = parseFloat($('#cfg-rating')?.value) || 4.8;
    const stars = '★'.repeat(Math.floor(rating)) + (rating % 1 >= 0.5 ? '½' : '');
    html = `<div class="serp-preview"><div class="serp-title">${title}</div><div class="serp-url">${url}</div><div class="serp-rating"><span class="serp-stars">${stars}</span><span class="serp-rating-text">${rating}/5 (96 votes)</span></div><div class="serp-desc">${desc}</div><div style="margin-top:6px;color:#545454;font-size:13px">⏱ ${time} · 🔥 ${cal} cal</div></div>`;
    schema = {"@context":"https://schema.org","@type":"Recipe","name":title,"description":desc,"prepTime":"PT30M","cookTime":"PT35M","nutrition":{"@type":"NutritionInformation","calories":cal+" calories"},"aggregateRating":{"@type":"AggregateRating","ratingValue":rating,"ratingCount":"96"}};
  } else if (type === 'article') {
    const author = $('#cfg-author')?.value.trim() || 'John Doe';
    const date = $('#cfg-date')?.value.trim() || '2026-06-08';
    html = `<div class="serp-preview"><div class="serp-title">${title}</div><div class="serp-url">${url}</div><div class="serp-desc">${desc}</div><div style="margin-top:6px;color:#545454;font-size:12px">${author} · ${date}</div></div>`;
    schema = {"@context":"https://schema.org","@type":"Article","headline":title,"description":desc,"author":{"@type":"Person","name":author},"datePublished":date};
  } else if (type === 'event') {
    const evDate = $('#cfg-evdate')?.value.trim() || '2026-07-15';
    const loc = $('#cfg-location')?.value.trim() || 'San Francisco, CA';
    const price = $('#cfg-evprice')?.value.trim() || 'Free';
    html = `<div class="serp-preview"><div class="serp-title">${title}</div><div class="serp-url">${url}</div><div style="color:#545454;font-size:13px;margin:6px 0">📅 ${evDate} · 📍 ${loc}</div><div style="color:#006621;font-size:13px">Tickets: ${price}</div><div class="serp-desc">${desc}</div></div>`;
    schema = {"@context":"https://schema.org","@type":"Event","name":title,"description":desc,"startDate":evDate,"location":{"@type":"Place","name":loc},"offers":{"@type":"Offer","price":price==="Free"?"0":price,"priceCurrency":"USD"}};
  } else if (type === 'review') {
    const item = $('#cfg-item')?.value.trim() || 'Product Name';
    const rating = parseFloat($('#cfg-rating')?.value) || 4;
    const stars = '★'.repeat(rating) + '☆'.repeat(5-rating);
    html = `<div class="serp-preview"><div class="serp-title">${title}</div><div class="serp-url">${url}</div><div class="serp-rating"><span class="serp-stars">${stars}</span><span class="serp-rating-text">${rating}/5</span></div><div class="serp-desc">${desc}</div></div>`;
    schema = {"@context":"https://schema.org","@type":"Review","name":title,"description":desc,"itemReviewed":{"@type":"Thing","name":item},"reviewRating":{"@type":"Rating","ratingValue":rating,"bestRating":5}};
  } else if (type === 'howto') {
    const s1 = $('#cfg-step1')?.value.trim() || 'Preheat the oven to 350°F';
    const s2 = $('#cfg-step2')?.value.trim() || 'Mix all dry ingredients together';
    const s3 = $('#cfg-step3')?.value.trim() || 'Add wet ingredients and stir until smooth';
    html = `<div class="serp-preview"><div class="serp-title">${title}</div><div class="serp-url">${url}</div><div class="serp-desc">${desc}</div><div class="serp-htr"><div class="serp-htr-step"><b>Step 1:</b> ${s1}</div><div class="serp-htr-step"><b>Step 2:</b> ${s2}</div><div class="serp-htr-step"><b>Step 3:</b> ${s3}</div></div></div>`;
    schema = {"@context":"https://schema.org","@type":"HowTo","name":title,"description":desc,"step":[{"@type":"HowToStep","text":s1},{"@type":"HowToStep","text":s2},{"@type":"HowToStep","text":s3}]};
  }

  $('#preview').innerHTML = html;
  $('#schema-output').textContent = `<script type="application/ld+json">\n${JSON.stringify(schema, null, 2)}\n<\/script>`;
}

function updateFields() {
  const type = $('#cfg-type').value;
  let extra = '';
  if (type === 'faq') {
    extra = `<div class="cfg-row"><label>Question 1</label><input type="text" id="cfg-q1" value="What ingredients do I need?"></div>
    <div class="cfg-row"><label>Answer 1</label><input type="text" id="cfg-a1" value="You need flour, sugar, cocoa powder, eggs, butter and milk."></div>
    <div class="cfg-row"><label>Question 2</label><input type="text" id="cfg-q2" value="How long does it take to bake?"></div>
    <div class="cfg-row"><label>Answer 2</label><input type="text" id="cfg-a2" value="About 30-35 minutes at 350°F (175°C)."></div>`;
  } else if (type === 'product') {
    extra = `<div class="cfg-row"><label>Price ($)</label><input type="text" id="cfg-price" value="29.99"></div>
    <div class="cfg-row"><label>Rating (1-5)</label><input type="number" id="cfg-rating" value="4.5" min="1" max="5" step="0.1"></div>
    <div class="cfg-row"><label>Review Count</label><input type="text" id="cfg-reviews" value="128"></div>`;
  } else if (type === 'recipe') {
    extra = `<div class="cfg-row"><label>Prep Time</label><input type="text" id="cfg-preptime" value="45 min"></div>
    <div class="cfg-row"><label>Calories</label><input type="text" id="cfg-calories" value="350"></div>
    <div class="cfg-row"><label>Rating (1-5)</label><input type="number" id="cfg-rating" value="4.8" min="1" max="5" step="0.1"></div>`;
  } else if (type === 'article') {
    extra = `<div class="cfg-row"><label>Author</label><input type="text" id="cfg-author" value="John Doe"></div>
    <div class="cfg-row"><label>Publish Date</label><input type="date" id="cfg-date" value="2026-06-08"></div>`;
  } else if (type === 'event') {
    extra = `<div class="cfg-row"><label>Event Date</label><input type="date" id="cfg-evdate" value="2026-07-15"></div>
    <div class="cfg-row"><label>Location</label><input type="text" id="cfg-location" value="San Francisco, CA"></div>
    <div class="cfg-row"><label>Ticket Price</label><input type="text" id="cfg-evprice" value="Free"></div>`;
  } else if (type === 'review') {
    extra = `<div class="cfg-row"><label>Reviewed Item</label><input type="text" id="cfg-item" value="Product Name"></div>
    <div class="cfg-row"><label>Rating (1-5)</label><input type="number" id="cfg-rating" value="4" min="1" max="5" step="1"></div>`;
  } else if (type === 'howto') {
    extra = `<div class="cfg-row"><label>Step 1</label><input type="text" id="cfg-step1" value="Preheat the oven to 350°F"></div>
    <div class="cfg-row"><label>Step 2</label><input type="text" id="cfg-step2" value="Mix all dry ingredients together"></div>
    <div class="cfg-row"><label>Step 3</label><input type="text" id="cfg-step3" value="Add wet ingredients and stir until smooth"></div>`;
  }
  $('#dynamic-fields').innerHTML = extra;
  document.querySelectorAll('#dynamic-fields input, #dynamic-fields select').forEach(el => {
    el.addEventListener('input', generate);
  });
  generate();
}

$('#cfg-type').addEventListener('change', updateFields);
document.querySelectorAll('.cfg-row input, .cfg-row textarea').forEach(el => {
  el.addEventListener('input', generate);
});

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="generate()">${t('format')}</button>
  <button class="gz-btn" onclick="copyText($('#schema-output').textContent)">${t('copy')}</button>`;

updateFields();

GZ.renderToolPage({
  category: 'seo',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🧬', href:'/seo/schema-generator.html', name:'Schema Generator'},
    {icon:'👁️', href:'/seo/serp-preview.html', name:'Google SERP Preview'},
    {icon:'❓', href:'/seo/faq-schema-generator.html', name:'FAQ Schema'},
    {icon:'🖼️', href:'/seo/open-graph-preview.html', name:'OG Preview'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
