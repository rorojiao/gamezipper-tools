<script>
GZI18n.register({
  en: {
    toolTitle: 'Sentence & Paragraph Counter',
    toolDesc: 'Count sentences, paragraphs, words, characters, syllables and reading time — with readability stats and top word frequency.',
    step1: 'Paste or type your text in the box above',
    step2: 'See live counts of sentences, paragraphs, words and characters',
    step3: 'Check readability score and top word frequency',
    step4: 'Use Copy Stats to grab a summary report',
    sentences: 'Sentences', paragraphs: 'Paragraphs', words: 'Words',
    chars: 'Characters', charsNoSpace: 'Chars (no spaces)', syllables: 'Syllables',
    readingTime: 'Reading Time', uniqueWords: 'Unique Words',
    avgWords: 'Avg words/sentence', avgChars: 'Avg chars/word',
    readability: 'Readability',
    fleschScore: 'Flesch Reading Ease',
    fleschEasy: 'Very easy (90-100)', fleschStandard: 'Standard (60-70)',
    fleschDifficult: 'Difficult (30-50)', fleschVeryDifficult: 'Very difficult (<30)',
    topWords: 'Top 8 Words', copyStats: 'Copy Stats', clear: 'Clear',
    example: 'Load Example',
  },
  zh: {
    toolTitle: '句子与段落计数器',
    toolDesc: '统计句子、段落、单词、字符、音节和阅读时间 — 包含可读性评分和词频统计。',
    step1: '在上方粘贴或输入文本',
    step2: '实时查看句子、段落、单词和字符统计',
    step3: '查看可读性评分和高频词',
    step4: '使用「复制统计」获取摘要报告',
    sentences: '句子', paragraphs: '段落', words: '单词',
    chars: '字符', charsNoSpace: '字符（不含空格）', syllables: '音节',
    readingTime: '阅读时间', uniqueWords: '不重复单词',
    avgWords: '平均词数/句', avgChars: '平均字符/词',
    readability: '可读性',
    fleschScore: 'Flesch 阅读易度',
    fleschEasy: '非常容易 (90-100)', fleschStandard: '标准 (60-70)',
    fleschDifficult: '困难 (30-50)', fleschVeryDifficult: '非常困难 (<30)',
    topWords: '前 8 个高频词', copyStats: '复制统计', clear: '清空',
    example: '加载示例',
  }
});

const { $, copyText, t } = GZ;

const STOPWORDS = new Set(['the','a','an','and','or','but','if','then','else','for','on','in','at','to','of','by','with','as','is','are','was','were','be','been','being','have','has','had','do','does','did','will','would','could','should','may','might','must','shall','can','this','that','these','those','i','you','he','she','it','we','they','me','him','her','us','them','my','your','his','its','our','their','what','which','who','whom','when','where','why','how','not','no','yes','all','any','some','one','two','three']);

function countSyllables(word) {
  word = word.toLowerCase().replace(/[^a-z]/g, '');
  if (!word) return 0;
  if (word.length <= 3) return 1;
  word = word.replace(/(?:[^laeiouy]es|ed|[^laeiouy]e)$/, '');
  word = word.replace(/^y/, '');
  const m = word.match(/[aeiouy]{1,2}/g);
  return m ? m.length : 1;
}

function analyze() {
  const text = $('#input').value;
  if (!text) {
    $('#stats').innerHTML = '';
    $('#readability').innerHTML = '';
    $('#topWords').innerHTML = '';
    return;
  }

  // Counts
  const charCount = text.length;
  const charNoSpace = text.replace(/\s/g, '').length;

  // Words: split on whitespace + punctuation, filter empty
  const words = text.match(/\b[\w'-]+\b/g) || [];
  const wordCount = words.length;

  // Unique words
  const lowerWords = words.map(w => w.toLowerCase());
  const uniqueWords = new Set(lowerWords).size;

  // Sentences: split on terminal punctuation followed by whitespace/EOS
  const sentMatches = text.match(/[^.!?]+[.!?]+(?:["')\]]*)/g) || [];
  const sentenceCount = sentMatches.length || (text.trim() ? 1 : 0);

  // Paragraphs: split on 2+ newlines
  const paragraphs = text.split(/\n\s*\n+/).filter(p => p.trim()).length;

  // Syllables
  let syllableCount = 0;
  for (const w of words) syllableCount += countSyllables(w);

  // Reading time at 200 wpm
  const readingTime = (wordCount / 200).toFixed(1);
  const readingLabel = readingTime < 1 ? '< 1' : readingTime;

  $('#stats').innerHTML = `
    <div class="sc-stat"><div class="val">${sentenceCount}</div><div class="lbl">${t('sentences')}</div></div>
    <div class="sc-stat"><div class="val">${paragraphs}</div><div class="lbl">${t('paragraphs')}</div></div>
    <div class="sc-stat"><div class="val">${wordCount}</div><div class="lbl">${t('words')}</div></div>
    <div class="sc-stat"><div class="val">${charCount}</div><div class="lbl">${t('chars')}</div></div>
    <div class="sc-stat"><div class="val">${charNoSpace}</div><div class="lbl">${t('charsNoSpace')}</div></div>
    <div class="sc-stat"><div class="val">${syllableCount}</div><div class="lbl">${t('syllables')}</div></div>
    <div class="sc-stat"><div class="val">${uniqueWords}</div><div class="lbl">${t('uniqueWords')}</div></div>
    <div class="sc-stat"><div class="val">${readingLabel}m</div><div class="lbl">${t('readingTime')}</div></div>`;

  // Readability
  let flesch = '—', fleschLabel = '—';
  if (wordCount > 0 && sentenceCount > 0) {
    const f = 206.835 - 1.015 * (wordCount / sentenceCount) - 84.6 * (syllableCount / wordCount);
    flesch = f.toFixed(1);
    if (f >= 90) fleschLabel = t('fleschEasy');
    else if (f >= 60) fleschLabel = t('fleschStandard');
    else if (f >= 30) fleschLabel = t('fleschDifficult');
    else fleschLabel = t('fleschVeryDifficult');
  }
  const avgWords = sentenceCount > 0 ? (wordCount / sentenceCount).toFixed(1) : '0';
  const avgChars = wordCount > 0 ? (charNoSpace / wordCount).toFixed(1) : '0';

  $('#readability').innerHTML = `
    <div style="display:flex;align-items:baseline;gap:10px;margin-bottom:10px">
      <span style="font-size:2rem;font-weight:900;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent">${flesch}</span>
      <span style="font-size:.85rem;color:var(--text2)">${t('fleschScore')}</span>
    </div>
    <div style="font-size:.85rem;margin-bottom:8px"><strong>${fleschLabel}</strong></div>
    <div class="sc-avg">${t('avgWords')}: <strong>${avgWords}</strong></div>
    <div class="sc-avg">${t('avgChars')}: <strong>${avgChars}</strong></div>`;

  // Top words
  const freq = {};
  for (const w of lowerWords) {
    if (STOPWORDS.has(w) || w.length < 3) continue;
    freq[w] = (freq[w] || 0) + 1;
  }
  const sorted = Object.entries(freq).sort((a, b) => b[1] - a[1]).slice(0, 8);
  const max = sorted.length > 0 ? sorted[0][1] : 1;
  const colors = ['#4ecdc4','#ffd93d','#e94560','#7b68ee','#00d672','#ff8c42','#61afef','#c678dd'];
  let topHtml = '';
  sorted.forEach(([w, c], i) => {
    const pct = (c / max * 100).toFixed(0);
    topHtml += `<div class="sc-bar-row">
      <span class="name">${w}</span>
      <span class="bar"><span class="fill" style="width:${pct}%;background:${colors[i]}"></span></span>
      <span class="pct">${c}</span>
    </div>`;
  });
  $('#topWords').innerHTML = sorted.length ? topHtml : '<div style="opacity:.6;font-size:.85rem">—</div>';
}

function copyStats() {
  const text = $('#input').value;
  if (!text) return;
  const stats = $('#stats').textContent;
  const read = $('#readability').textContent;
  copyText(`Sentence Counter Report\n\n${stats}\n\nReadability:\n${read}\n\nSource length: ${text.length} characters`);
}

function loadExample() {
  $('#input').value = `The Art of Clear Writing

Writing is thinking made visible. When you write clearly, you think clearly. Most writers don't realize how much their work improves when they focus on shorter sentences, concrete nouns, and active verbs.

Good writing is rewriting. The first draft is just you telling yourself the story. The second draft is where you actually start writing for the reader. Cut every unnecessary word. Replace weak verbs with strong ones. Read every sentence aloud — if you stumble, the reader will too.

Why does this matter? Because in a world full of AI-generated content, clear human writing stands out. Readers can feel when an author has actually thought about each word. That feeling is what makes your work memorable.

Three habits that will transform your writing: write every day, even for ten minutes. Read widely, especially outside your field. And never publish anything you haven't read aloud at least once.`;
  analyze();
}

function doClear() { $('#input').value = ''; analyze(); }

$('#input').addEventListener('input', analyze);

$('#toolbar').innerHTML = `
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn" onclick="copyStats()">${t('copyStats')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

GZ.renderToolPage({

    {icon:'📖', href:'/text/readability-checker.html', name:'Readability Checker'},
    {icon:'📊', href:'/text/diff.html', name:'Text Diff'},
  ]
});
</script>
