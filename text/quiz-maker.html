.quiz-format code{background:var(--glass2);padding:2px 6px;border-radius:4px}
.quiz-area textarea{width:100%;min-height:250px;padding:12px;border:1px solid var(--border);border-radius:8px;background:var(--glass);color:var(--text);font-family:monospace;font-size:.85rem;resize:vertical;box-sizing:border-box}
.quiz-container{max-width:600px;margin:0 auto}
.question-card{background:var(--glass);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:16px}
.question-num{font-size:.8rem;opacity:.6;margin-bottom:8px}
.question-text{font-size:1.1rem;font-weight:600;margin-bottom:12px}
.option{display:flex;align-items:center;gap:10px;padding:10px 14px;margin:6px 0;border:1px solid var(--border);border-radius:8px;cursor:pointer;transition:all .2s}
.option:hover{border-color:var(--accent);background:var(--glass2)}
.option.selected{border-color:var(--accent);background:color-mix(in srgb,var(--accent) 15%,transparent)}
.option.correct{border-color:var(--gz-success);background:color-mix(in srgb,var(--gz-success) 15%,transparent)}
.option.wrong{border-color:var(--gz-accent);background:color-mix(in srgb,var(--gz-accent) 15%,transparent)}
.option input{accent-color:var(--accent)}
.option .letter{width:24px;height:24px;border-radius:50%;background:var(--glass2);display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:700;flex-shrink:0}
.score-display{text-align:center;padding:24px;background:var(--glass);border:1px solid var(--border);border-radius:16px;margin-top:20px}
.score-num{font-size:3rem;font-weight:900;color:var(--accent)}
.score-label{font-size:1.2rem;margin-top:4px}
.score-detail{font-size:.9rem;opacity:.7;margin-top:8px}
.mode-tabs{display:flex;gap:4px;margin-bottom:12px}
.mode-tabs button{padding:8px 16px;border:1px solid var(--border);border-radius:8px;background:var(--glass);color:var(--text);cursor:pointer}
.mode-tabs button.active{background:var(--accent);color:#fff;border-color:var(--accent)}
</style>

<div class="gz-container">

  </div>

<script>
GZI18n.register({
  en: {
    toolTitle: 'Quiz Maker',
    toolDesc: 'Create interactive multiple-choice quizzes and take them right in your browser. Build, share, and test knowledge — no signup needed.',
    edit: 'Create', take: 'Take Quiz',
    submit: 'Submit Answers', retry: 'Try Again',
    yourScore: 'Your Score', questions: 'questions',
    correctAnswers: 'Correct answers',
    loadExample: 'Load Example',
    export: 'Export',
    clear: 'Clear',
    noQuiz: 'Add some questions first!',
    step1: 'Write your quiz using Q: for questions and A-D for options',
    step2: 'Mark the correct answer with an asterisk (*)',
    step3: 'Switch to Take Quiz mode to answer the questions',
    step4: 'Submit to see your score and correct answers',
  },
  zh: {
    toolTitle: '测验制作工具',
    toolDesc: '创建互动选择题测验并在浏览器中直接答题。制作、分享和测试知识 — 无需注册。',
    edit: '创建', take: '开始测验',
    submit: '提交答案', retry: '重试',
    yourScore: '你的得分', questions: '题',
    correctAnswers: '正确答案',
    loadExample: '加载示例',
    export: '导出',
    clear: '清除',
    noQuiz: '请先添加题目！',
    step1: '使用 Q: 写题目，A-D 写选项',
    step2: '用星号 (*) 标记正确答案',
    step3: '切换到「开始测验」模式答题',
    step4: '提交后查看得分和正确答案',
  }
});

const { $, t } = GZ;
let questions = [], userAnswers = {}, submitted = false;

function parseQuiz(text) {
  const qs = [];
  const blocks = text.split(/\n\s*\n/);
  for (const block of blocks) {
    const lines = block.split('\n').map(l => l.trim()).filter(Boolean);
    if (!lines.length) continue;
    let q = null, opts = [], correct = -1;
    for (const line of lines) {
      const qm = line.match(/^Q[：:]\s*(.+)/);
      if (qm) { q = qm[1]; continue; }
      const om = line.match(/^([A-Da-d])[.、:：)]\s*(\*?)\s*(.+)/);
      if (om) {
        const idx = opts.length;
        opts.push(om[3]);
        if (om[2] === '*') correct = idx;
        continue;
      }
    }
    if (q && opts.length >= 2) {
      if (correct === -1) correct = 0;
      qs.push({ question: q, options: opts, correct });
    }
  }
  return qs;
}

function switchMode(mode) {
  if (mode === 'take') {
    questions = parseQuiz($('#quizInput').value);
    if (!questions.length) { alert(t('noQuiz')); return; }
    userAnswers = {}; submitted = false;
    renderQuiz();
    $('#submitQuiz').style.display = '';
    $('#retryQuiz').style.display = 'none';
    $('#scoreArea').style.display = 'none';
  }
  $$('#modeTabs button').forEach(b => b.classList.toggle('active', b.dataset.mode === mode));
  $('#editMode').style.display = mode === 'edit' ? '' : 'none';
  $('#takeMode').style.display = mode === 'take' ? '' : 'none';
}

function renderQuiz() {
  const letters = ['A','B','C','D'];
  let html = '';
  questions.forEach((q, qi) => {
    html += `<div class="question-card">
      <div class="question-num">${t('questions').replace('questions','').replace('题','')} ${qi+1}/${questions.length}</div>
      <div class="question-text">${q.question}</div>`;
    q.options.forEach((opt, oi) => {
      html += `<div class="option" id="q${qi}o${oi}" onclick="selectOption(${qi},${oi})">
        <span class="letter">${letters[oi]}</span><span>${opt}</span></div>`;
    });
    html += '</div>';
  });
  $('#quizContainer').innerHTML = html;
}

function selectOption(qi, oi) {
  if (submitted) return;
  userAnswers[qi] = oi;
  questions[qi].options.forEach((_, i) => {
    const el = $(`#q${qi}o${i}`);
    el.classList.toggle('selected', i === oi);
  });
}

function submitQuiz() {
  submitted = true;
  let correct = 0;
  questions.forEach((q, qi) => {
    const userAns = userAnswers[qi];
    q.options.forEach((_, oi) => {
      const el = $(`#q${qi}o${oi}`);
      el.classList.remove('selected');
      if (oi === q.correct) el.classList.add('correct');
      else if (oi === userAns && oi !== q.correct) el.classList.add('wrong');
    });
    if (userAns === q.correct) correct++;
  });
  const pct = Math.round((correct / questions.length) * 100);
  $('#scoreArea').innerHTML = `<div class="score-display">
    <div class="score-num">${pct}%</div>
    <div class="score-label">${t('yourScore')}</div>
    <div class="score-detail">${correct} / ${questions.length} ${t('correctAnswers')}</div></div>`;
  $('#scoreArea').style.display = '';
  $('#submitQuiz').style.display = 'none';
  $('#retryQuiz').style.display = '';
}

function retryQuiz() {
  userAnswers = {}; submitted = false;
  renderQuiz();
  $('#submitQuiz').style.display = '';
  $('#retryQuiz').style.display = 'none';
  $('#scoreArea').style.display = 'none';
}

function loadExample() {
  $('#quizInput').value = `Q: What is the capital of France?
A. London
B* Paris
C. Berlin
D. Madrid

Q: Which planet is closest to the Sun?
A. Venus
B. Earth
C* Mercury
D. Mars

Q: What does HTML stand for?
A* HyperText Markup Language
B. High Tech Modern Language
C. HyperTransfer Markup Language
D. Home Tool Markup Language

Q: What year was the World Wide Web invented?
A. 1985
B* 1989
C. 1993
D. 1995`;
}

function exportQuiz() {
  const text = $('#quizInput').value;
  const blob = new Blob([text], { type: 'text/plain' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'quiz.txt';
  a.click();
}

$('#formatHint').innerHTML = `Format: <code>Q: question</code> then <code>A. B. C. D.</code> options, <code>*</code> = correct answer. Blank line between questions.`;
$('#submitQuiz').textContent = t('submit');
$('#retryQuiz').textContent = t('retry');

$('#modeTabs').innerHTML = `<button data-mode="edit" class="active" onclick="switchMode('edit')">${t('edit')}</button><button data-mode="take" onclick="switchMode('take')">${t('take')}</button>`;

$('#toolbar').innerHTML = `
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('loadExample')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="exportQuiz()">${t('export')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#quizInput').value=''">${t('clear')}</button>`;

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📚', href:'/text/flashcard-maker.html', name:'Flashcard Maker'},
    {icon:'📝', href:'/text/notepad.html', name:'Notepad'},
    {icon:'📖', href:'/text/bionic.html', name:'Bionic Reading'},
    {icon:'🔤', href:'/text/word-counter.html', name:'Word Counter'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
