<body>
<div class="gz-container">

        <div>
          <label style="font-weight:600;display:block;margin-bottom:6px" id="lbl-sla"></label>
          <input id="slaInput" type="number" value="99.9" step="0.001" min="0" max="100" style="width:100%;padding:10px;border-radius:10px;border:1px solid var(--border);background:var(--glass);color:var(--text);font-size:1.2em;font-weight:700">

          <text class="gauge-text" x="100" y="85" id="gaugeText">99.9%</text>
          <text class="gauge-label" x="100" y="105" id="gaugeLabel">Uptime</text>

<script>
GZI18n.register({
  en: {
    toolTitle: 'Uptime & SLA Calculator',
    toolDesc: 'Calculate allowed downtime from any SLA percentage. See how 99.9%, 99.99%, 99.999% translate to minutes per month and year.',
    lblSla: 'Uptime / SLA %',
    lblDowntime: 'Or enter downtime (auto-calc %)',
    thPeriod: 'Period',
    thTotal: 'Total Time',
    thAllowed: 'Allowed Downtime',
    thFormat: 'Readable',
    step1: 'Enter your SLA uptime percentage (e.g. 99.9)',
    step2: 'Or enter a downtime amount to reverse-calculate uptime',
    step3: 'View allowed downtime per day, week, month, quarter and year',
    step4: 'Compare with common SLA tiers (9s reference cards)',
  },
  zh: {
    toolTitle: '可用率 & SLA 计算器',
    toolDesc: '根据 SLA 可用率百分比计算允许的停机时间。查看 99.9%、99.99%、99.999% 对应每月和每年的停机时长。',
    lblSla: '可用率 / SLA %',
    lblDowntime: '或输入停机时间（自动反算百分比）',
    thPeriod: '周期',
    thTotal: '总时长',
    thAllowed: '允许停机',
    thFormat: '可读格式',
    step1: '输入 SLA 可用率百分比（如 99.9）',
    step2: '或输入停机时间反算可用率',
    step3: '查看每天、每周、每月、每季度和每年允许的停机时间',
    step4: '对比常见 SLA 等级（9 的数量参考卡）',
  }
});

const { $, t } = GZ;

const periods = [
  { id: 'daily', seconds: 86400 },
  { id: 'weekly', seconds: 604800 },
  { id: 'monthly', seconds: 2592000 },
  { id: 'quarterly', seconds: 7776000 },
  { id: 'yearly', seconds: 31536000 },
];

const periodNames = {
  daily: { en: 'Daily', zh: '每天' },
  weekly: { en: 'Weekly', zh: '每周' },
  monthly: { en: 'Monthly (30d)', zh: '每月（30天）' },
  quarterly: { en: 'Quarterly (90d)', zh: '每季度（90天）' },
  yearly: { en: 'Yearly (365d)', zh: '每年（365天）' },
};

const lang = GZI18n.getLang();

function formatDuration(seconds) {
  if (seconds < 1) return (seconds * 1000).toFixed(1) + 'ms';
  if (seconds < 60) return seconds.toFixed(1) + 's';
  if (seconds < 3600) {
    const m = Math.floor(seconds / 60);
    const s = Math.floor(seconds % 60);
    return `${m}m ${s}s`;
  }
  if (seconds < 86400) {
    const h = Math.floor(seconds / 3600);
    const m = Math.floor((seconds % 3600) / 60);
    return `${h}h ${m}m`;
  }
  const d = Math.floor(seconds / 86400);
  const h = Math.floor((seconds % 86400) / 3600);
  return `${d}d ${h}h`;
}

function formatTotal(seconds) {
  if (seconds < 86400) return (seconds / 3600).toFixed(0) + 'h';
  return (seconds / 86400).toFixed(0) + 'd';
}

function calculate() {
  let slaPct = parseFloat($('#slaInput').value);
  const dtInput = $('#downtimeInput').value.trim();
  
  if (dtInput) {
    let dtSec = 0;
    const match = dtInput.match(/^([\d.]+)\s*(ms|s|m|h|d)?$/i);
    if (match) {
      const val = parseFloat(match[1]);
      const unit = (match[2] || 'm').toLowerCase();
      if (unit === 'ms') dtSec = val / 1000;
      else if (unit === 's') dtSec = val;
      else if (unit === 'm') dtSec = val * 60;
      else if (unit === 'h') dtSec = val * 3600;
      else if (unit === 'd') dtSec = val * 86400;
    }
    if (dtSec > 0) {
      slaPct = ((1 - dtSec / 2592000) * 100); // based on monthly
      if (slaPct < 0) slaPct = 0;
      if (slaPct > 100) slaPct = 100;
      $('#slaInput').value = slaPct.toFixed(6).replace(/\.?0+$/, '');
    }
  }
  
  if (isNaN(slaPct) || slaPct < 0 || slaPct > 100) return;
  
  const downtimeRatio = 1 - slaPct / 100;
  
  // Update gauge
  const arcLen = 251.3;
  const offset = arcLen * (1 - slaPct / 100);
  $('#gaugeFill').setAttribute('stroke-dashoffset', offset);
  
  let gaugeColor = '#4ecdc4';
  if (slaPct < 99) gaugeColor = '#ff6b6b';
  else if (slaPct < 99.9) gaugeColor = '#ffd93d';
  else if (slaPct >= 99.99) gaugeColor = '#00d672';
  $('#gaugeFill').setAttribute('stroke', gaugeColor);
  
  $('#gaugeText').textContent = slaPct >= 99.9 ? slaPct.toFixed(slaPct >= 99.99 ? 3 : 1) + '%' : slaPct.toFixed(2) + '%';
  
  // Update table
  const tbody = $('#tableBody');
  tbody.innerHTML = '';
  periods.forEach(p => {
    const dtSec = p.seconds * downtimeRatio;
    const tr = document.createElement('tr');
    const pName = lang === 'zh' ? periodNames[p.id].zh : periodNames[p.id].en;
    tr.innerHTML = `<td><strong>${pName}</strong></td><td>${formatTotal(p.seconds)}</td><td><code>${dtSec < 0.001 ? '< 1ms' : formatDuration(dtSec)}</code></td><td>${dtSec < 0.001 ? '< 1ms' : formatDuration(dtSec)}</td>`;
    tbody.appendChild(tr);
  });
}

function renderSlaCards() {
  const tiers = [99, 99.5, 99.9, 99.95, 99.99, 99.999];
  const cards = $('#slaCards');
  cards.innerHTML = tiers.map(tier => {
    const monthly = 2592000 * (1 - tier / 100);
    const yearly = 31536000 * (1 - tier / 100);
    const nines = tier.toString().split('').filter(c => c === '9').length;
    let label = tier >= 99.99 ? `(${nines} nines)` : '';
    return `<div class="sla-card" style="cursor:pointer" onclick="$('#slaInput').value='${tier}';calculate()">
      <h3>${tier}%</h3>
      <div class="value">${formatDuration(monthly)}</div>
      <div class="sub">/ month</div>
      <div class="sub" style="margin-top:8px">${formatDuration(yearly)} / year ${label}</div>
    </div>`;
  }).join('');
}

$('#slaInput').addEventListener('input', () => { $('#downtimeInput').value = ''; calculate(); });
$('#downtimeInput').addEventListener('input', calculate);

$('#toolbar').innerHTML = `
  <button class="gz-btn gz-btn-secondary" onclick="$('#slaInput').value='99.9';$('#downtimeInput').value='';calculate()">99.9%</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#slaInput').value='99.99';$('#downtimeInput').value='';calculate()">99.99%</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#slaInput').value='99.999';$('#downtimeInput').value='';calculate()">99.999%</button>`;

renderSlaCards();
calculate();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'⏰', href:'/calc/time-calculator.html', name:'Time Calculator'},
    {icon:'📊', href:'/calc/statistics-calculator.html', name:'Statistics'},
    {icon:'⚡', href:'/dev/speed-test.html', name:'Speed Test'},
    {icon:'📡', href:'/dev/http-headers.html', name:'HTTP Headers'},
  ]
});
</script>

</body>
