<script>
GZI18n.register({
  en: {
    toolTitle: 'Power Converter',
    toolDesc: 'Convert power units instantly — watts, kilowatts, megawatts, horsepower, BTU/hour, foot-pounds/second and calories/second.',
    step1: 'Enter the power value you want to convert',
    step2: 'Select the source unit from the dropdown',
    step3: 'All other units update live in the grid below',
    step4: 'Click any value card to copy it to clipboard',
  },
  zh: {
    toolTitle: '功率单位换算器',
    toolDesc: '即时换算功率单位 — 瓦特、千瓦、兆瓦、马力、英热单位/小时、英尺·磅/秒和卡路里/秒。',
    step1: '输入要换算的功率值',
    step2: '从下拉菜单选择原始单位',
    step3: '下方网格实时显示所有其他单位的结果',
    step4: '点击任意数值卡片即可复制到剪贴板',
  }
});
const { $, copyText, t } = GZ;
const UNITS = [
  {id:'W',  name:'Watt (W)',           zh:'瓦特 (W)',         f:1},
  {id:'kW', name:'Kilowatt (kW)',      zh:'千瓦 (kW)',        f:1e3},
  {id:'MW', name:'Megawatt (MW)',      zh:'兆瓦 (MW)',        f:1e6},
  {id:'GW', name:'Gigawatt (GW)',      zh:'吉瓦 (GW)',        f:1e9},
  {id:'mW', name:'Milliwatt (mW)',     zh:'毫瓦 (mW)',        f:1e-3},
  {id:'hp', name:'Horsepower (mech)',  zh:'马力 (机械)',       f:745.699872},
  {id:'hpM',name:'Metric horsepower',  zh:'公制马力 (PS)',     f:735.49875},
  {id:'BTUh',name:'BTU/hour (IT)',     zh:'BTU/小时',         f:0.29307107},
  {id:'ftlbs',name:'Foot-pound/sec',   zh:'英尺·磅/秒',        f:1.3558179483314},
  {id:'cals',name:'Calorie/sec',       zh:'卡路里/秒',         f:4.184},
  {id:'kcalmin',name:'Kilocalorie/min',zh:'千卡/分钟',         f:69.7333333},
];
function fmt(v){
  if(v===0) return '0';
  const a=Math.abs(v);
  if(a!==0&&(a<1e-6||a>=1e9)) return v.toExponential(6);
  if(a>=1) return +(v.toPrecision(8)).toLocaleString('en-US',{maximumFractionDigits:6});
  return v.toPrecision(6);
}
function convert(){
  const val=parseFloat($('#inp-val').value)||0;
  const unit=$('#inp-unit').value;
  const factor=UNITS.find(u=>u.id===unit).f;
  const watts=val*factor;
  const lang=GZI18n.getLang();
  $('#grid').innerHTML=UNITS.map(u=>{
    const result=watts/u.f;
    const label=lang==='zh'?u.zh:u.name;
    return `<div class="conv-card" onclick="copyText('${fmt(result)}')"><label>${label}</label><div class="val">${fmt(result)}</div></div>`;
  }).join('');
}
$('#inp-val').addEventListener('input',convert);
$('#inp-unit').addEventListener('change',convert);
$('#inp-unit').innerHTML=UNITS.map(u=>`<option value="${u.id}">${u.name}</option>`).join('');
$('#inp-unit').value='W';
$('#toolbar').innerHTML=`<button class="gz-btn" onclick="copyText($('#grid .conv-card:first-child .val').textContent)">${t('copy')}</button>`;
convert();
GZ.renderToolPage({
  category:'convert',
  titleKey:'toolTitle',
  descKey:'toolDesc',
  howToSteps:['step1','step2','step3','step4'],
  related:[
    {icon:'⚡',href:'/convert/energy-converter.html',name:'Energy Converter'},
    {icon:'🌡️',href:'/convert/temperature.html',name:'Temperature Converter'},
    {icon:'📐',href:'/convert/area-converter.html',name:'Area Converter'},
    {icon:'💪',href:'/convert/force-converter.html',name:'Force Converter'},
  ]
});
</script>
