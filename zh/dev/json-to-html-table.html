<script>
GZI18n.register({
  en: {
    toolTitle: 'JSON to HTML Table Converter',
    toolDesc: 'Convert JSON arrays into clean, responsive HTML tables with live preview and code export.',
    lblIn: 'Input JSON Array',

  },
  zh: {
    toolTitle: 'JSON 转 HTML 表格工具',
    toolDesc: '将 JSON 数组转换为干净、响应式的 HTML 表格，支持实时预览和代码导出。',
    lblIn: '输入 JSON 数组',
    lblOut: 'HTML 代码',
    includeStyles: '包含样式',
    step1: '在输入区粘贴 JSON 对象数组',
    step2: '表格预览自动渲染',
    step3: '在「预览」和「HTML 代码」视图之间切换',
    step4: '点击「复制」获取 HTML 表格代码',
  }
});

const { $, copyText, t } = GZ;
let currentTab = 'preview';

function switchTab(tab) {
  currentTab = tab;
  $('#tab-preview').classList.toggle('active', tab === 'preview');
  $('#tab-code').classList.toggle('active', tab === 'code');
  $('#preview-wrap').style.display = tab === 'preview' ? '' : 'none';
  $('#code-wrap').style.display = tab === 'code' ? '' : 'none';
}

function escapeHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function jsonToHtmlTable(data, includeStyles) {
  if (!Array.isArray(data) || data.length === 0) return '';
  const keys = [...new Set(data.flatMap(Object.keys))];
  let html = '';
  if (includeStyles) {
    html += `<style>\n.table-gz{border-collapse:collapse;width:100%;font-family:sans-serif}\n.table-gz th,.table-gz td{border:1px solid #ddd;padding:8px 12px;text-align:left}\n.table-gz th{background:#f5f5f5;font-weight:600}\n.table-gz tr:nth-child(even){background:#fafafa}\n</style>\n`;
  }
  const cls = includeStyles ? ' class="table-gz"' : '';
  html += `<table${cls}>\n  <thead>\n    <tr>\n`;
  keys.forEach(k => { html += `      <th>${escapeHtml(k)}</th>\n`; });
  html += `    </tr>\n  </thead>\n  <tbody>\n`;
  data.forEach(row => {
    html += `    <tr>\n`;
    keys.forEach(k => {
      let val = row[k];
      if (val === undefined || val === null) val = '';
      else if (typeof val === 'object') val = JSON.stringify(val);
      html += `      <td>${escapeHtml(val)}</td>\n`;
    });
    html += `    </tr>\n`;
  });
  html += `  </tbody>\n</table>`;
  return html;
}

function convert() {
  const inp = $('#input').value.trim();
  if (!inp) { $('#preview').innerHTML = ''; $('#output').textContent = ''; $('#status').innerHTML = ''; return; }
  try {
    let data = JSON.parse(inp);
    if (!Array.isArray(data)) {
      if (typeof data === 'object' && data !== null) {
        data = Object.entries(data).map(([k, v]) => ({ key: k, value: typeof v === 'object' ? JSON.stringify(v) : v }));
      } else {
        data = [{ value: data }];
      }
    }
    const includeStyles = $('#opt-styles').checked;
    const html = jsonToHtmlTable(data, includeStyles);
    $('#preview').innerHTML = html;
    $('#output').textContent = html;
    $('#status').innerHTML = `<span style="color:var(--gz-success)">✓ ${data.length} rows × ${[...new Set(data.flatMap(Object.keys))].length} columns</span>`;
  } catch(e) {
    $('#status').innerHTML = `<span style="color:var(--gz-accent)">✗ ${e.message}</span>`;
    $('#preview').innerHTML = `<span style="color:var(--gz-accent)">${e.message}</span>`;
    $('#output').textContent = '';
  }
}

function loadExample() {
  $('#input').value = JSON.stringify([
    {"name":"Alice","age":30,"role":"Engineer","department":"Engineering","salary":95000},
    {"name":"Bob","age":25,"role":"Designer","department":"Product","salary":85000},
    {"name":"Carol","age":35,"role":"Manager","department":"Engineering","salary":120000},
    {"name":"David","age":28,"role":"Data Analyst","department":"Analytics","salary":90000},
    {"name":"Eve","age":32,"role":"DevOps","department":"Infrastructure","salary":105000}
  ], null, 2);
  convert();
}

function doClear() { $('#input').value = ''; $('#preview').innerHTML = ''; $('#output').textContent = ''; $('#status').innerHTML = ''; }

$('#input').addEventListener('input', convert);
$('#opt-styles').addEventListener('change', convert);

$('#toolbar').innerHTML = `
  <label style="display:inline-flex;align-items:center;gap:4px;cursor:pointer;font-size:.85em"><input type="checkbox" id="opt-styles" checked> ${t('includeStyles')}</label>
  <button class="gz-btn" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

$('#lbl-in').textContent = t('lblIn');
$('#lbl-out').textContent = t('lblOut');

    {icon:'🔄', href:'/convert/csv-to-html.html', name:'CSV to HTML'},
  ]
});
