<script type="application/ld+json">{"@context":"https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is an HTML entity?", "acceptedAnswer": {"@type": "Answer", "text": "An HTML entity is a piece of text that begins with an ampersand (&) and ends with a semicolon (;). It is used to display reserved characters, invisible characters, and symbols that cannot be typed on a standard keyboard — for example &amp;amp; renders as & and &amp;copy; renders as ©."}}, {"@type": "Question", "name": "What's the difference between named, decimal and numeric entities?", "acceptedAnswer": {"@type": "Answer", "text": "Named entities use a friendly name like &amp;copy; or &amp;hearts;. Decimal entities use the Unicode code point in base 10 like &amp;#169;. Hex entities use base 16 like &amp;#xA9; — all three render identically. Named entities are easiest to read, numeric entities cover every Unicode character."}}, {"@type": "Question", "name": "Why would I encode HTML?", "acceptedAnswer": {"@type": "Answer", "text": "Encoding prevents the browser from interpreting characters as markup. It is essential when displaying code samples, embedding user input safely, or showing characters like &lt; &amp; &gt; that would otherwise be treated as HTML."}}, {"@type": "Question", "name": "Is my text sent to a server?", "acceptedAnswer": {"@type": "Answer", "text": "No. All encoding and decoding happens in your browser using JavaScript. Nothing is uploaded or stored."}}]}</script>

<script>
GZI18n.register({
  en:{
    toolTitle:'HTML Entity Encoder & Decoder',
    toolDesc:'Encode text to HTML entities or decode entities back to plain text. Supports named entities, decimal (&#169;) and hex (&#xA9;) formats. Live conversion as you type.',
    input:'Input',output:'Output',
    encode:'Encode',decode:'Decode',
    quickInsert:'Quick Insert:',
    example:'Load Example',swap:'Swap',copy:'Copy',clear:'Clear',
    charsIn:'Characters in',charsOut:'Characters out',entitiesFound:'Entities found',
    step1:'Choose Encode or Decode mode',
    step2:'Type or paste your text — output updates live as you type',
    step3:'Use the quick-insert chips to add common entities',
    step4:'Click Copy to copy the output to your clipboard',
  },
  zh:{
    toolTitle:'HTML 实体编码与解码',
    toolDesc:'将文本编码为 HTML 实体或解码实体回原始字符。支持命名实体、十进制（&#169;）和十六进制（&#xA9;）格式，实时转换。',
    input:'输入',output:'输出',
    encode:'编码',decode:'解码',
    quickInsert:'快速插入：',
    example:'加载示例',swap:'交换',copy:'复制',clear:'清空',
    charsIn:'输入字符数',charsOut:'输出字符数',entitiesFound:'识别实体数',
    step1:'选择「编码」或「解码」模式',
    step2:'输入或粘贴文本 — 输出会实时更新',
    step3:'使用快捷插入按钮可快速添加常用实体',
    step4:'点击「复制」可将输出复制到剪贴板',
  }
});

const { $, copyText, t } = GZ;

let mode = 'encode';
let debounce;

const presets = [
  { label:'&amp;',   val:'&amp;' },
  { label:'&lt;',    val:'&lt;' },
  { label:'&gt;',    val:'&gt;' },
  { label:'&quot;',  val:'&quot;' },
  { label:'&apos;',  val:'&apos;' },
  { label:'&copy;',  val:'&copy;' },
  { label:'&reg;',   val:'&reg;' },
  { label:'&trade;', val:'&trade;' },
  { label:'&hearts;',val:'&hearts;' },
  { label:'&mdash;', val:'&mdash;' },
  { label:'&ndash;', val:'&ndash;' },
  { label:'&hellip;',val:'&hellip;' },
  { label:'&nbsp;',  val:'&nbsp;' },
  { label:'&euro;',  val:'&euro;' },
  { label:'&pound;', val:'&pound;' },
  { label:'&yen;',   val:'&yen;' },
  { label:'&cent;',  val:'&cent;' },
  { label:'&sect;',  val:'&sect;' },
  { label:'&para;',  val:'&para;' },
  { label:'&bull;',  val:'&bull;' },
];

function encode(str) {
  // Named replacements for common chars (only the ones the browser also has named for)
  const named = {
    '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&apos;',
    ' ':'&nbsp;', '–':'&ndash;', '—':'&mdash;', '…':'&hellip;',
    '©':'&copy;', '®':'&reg;', '™':'&trade;', '€':'&euro;', '£':'&pound;', '¥':'&yen;',
    '¢':'&cent;', '·':'&middot;', '§':'&sect;', '¶':'&para;', '•':'&bull;', '±':'&plusmn;',
    '×':'&times;', '÷':'&divide;', '°':'&deg;', 'µ':'&micro;', '·':'&middot;',
    '←':'&larr;', '→':'&rarr;', '↑':'&uarr;', '↓':'&darr;', '↔':'&harr;',
    '♥':'&hearts;', '♦':'&diams;', '♣':'&clubs;', '♠':'&spades;',
    '½':'&frac12;', '¼':'&frac14;', '¾':'&frac34;',
  };
  let out = '';
  for (const ch of str) {
    if (named[ch] !== undefined) {
      out += named[ch];
    } else {
      const cp = ch.codePointAt(0);
      // Always escape <, >, &, ", ' (covered above); for other chars < 128 skip; for ≥128 use decimal
      if (cp < 128 && /[a-zA-Z0-9\s.,;:!?()\[\]{}\-_/\\@#$%^*+=`|~]/.test(ch)) {
        out += ch;
      } else {
        out += '&#' + cp + ';';
      }
    }
  }
  return out;
}

function decode(str) {
  // Use the browser's HTML parser to decode both named and numeric entities.
  const ta = document.createElement('textarea');
  ta.innerHTML = str;
  return ta.value;
}

function update() {
  const inp = $('#input').value;
  let out = '';
  let entityCount = 0;
  if (mode === 'encode') {
    out = encode(inp);
    entityCount = (out.match(/&[#a-zA-Z][a-zA-Z0-9]*;/g) || []).length;
  } else {
    out = decode(inp);
    entityCount = (inp.match(/&[#a-zA-Z][a-zA-Z0-9]*;/g) || []).length;
  }
  $('#output').value = out;
  $('#stats').innerHTML = `
    <span>${t('charsIn')}:</span> ${[...inp].length}
    &nbsp;·&nbsp;
    <span>${t('charsOut')}:</span> ${[...out].length}
    &nbsp;·&nbsp;
    <span>${t('entitiesFound')}:</span> ${entityCount}
  `;
}

function setMode(newMode) {
  mode = newMode;
  $$('.entity-tab').forEach(b => b.classList.toggle('active', b.dataset.mode === mode));
  $('#input').placeholder = mode === 'encode'
    ? 'Type text to encode — e.g. Tom & Jerry © 2026'
    : 'Type entities to decode — e.g. &lt;div&gt;Tom &amp;amp; Jerry&lt;/div&gt;';
  update();
}

function buildPresets() {
  $('#presets').innerHTML = `<span style="color:var(--text2);font-size:.82rem;font-weight:600">${t('quickInsert')}</span>` +
    presets.map(p => `<button class="preset-btn" data-val="${p.val}">${p.label}</button>`).join('');
  $$('.preset-btn').forEach(b => b.addEventListener('click', () => {
    const ta = $('#input');
    const start = ta.selectionStart, end = ta.selectionEnd;
    ta.value = ta.value.slice(0, start) + b.dataset.val + ta.value.slice(end);
    ta.focus();
    ta.selectionStart = ta.selectionEnd = start + b.dataset.val.length;
    update();
  }));
}

function $$ (s, p) { return [...(p || document).querySelectorAll(s)]; }

$('#input').addEventListener('input', () => {
  clearTimeout(debounce);
  debounce = setTimeout(update, 80);
});

$('#tabs').addEventListener('click', e => {
  if (e.target.classList.contains('entity-tab')) setMode(e.target.dataset.mode);
});

const EXAMPLE_EN = '<div class="welcome">Tom & Jerry © 2026 — "All rights reserved" ♥</div>';
const EXAMPLE_DECODE = '&lt;div class=&quot;welcome&quot;&gt;Tom &amp;amp; Jerry &copy; 2026&lt;/div&gt;';

$('#toolbar').innerHTML = `
  <button class="gz-btn gz-btn-secondary" id="exBtn">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" id="swapBtn">${t('swap')}</button>
  <button class="gz-btn" id="copyBtn">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" id="clrBtn">${t('clear')}</button>`;

$('#exBtn').addEventListener('click', () => {
  $('#input').value = mode === 'encode' ? EXAMPLE_EN : EXAMPLE_DECODE;
  update();
});
$('#swapBtn').addEventListener('click', () => {
  const v = $('#output').value;
  setMode(mode === 'encode' ? 'decode' : 'encode');
  $('#input').value = v;
  update();
});
$('#copyBtn').addEventListener('click', () => copyText($('#output').value));
$('#clrBtn').addEventListener('click', () => { $('#input').value = ''; $('#output').value = ''; $('#stats').innerHTML = ''; });

$('#lbl-in').textContent = t('input');
$('#lbl-out').textContent = t('output');
buildPresets();
setMode('encode');

GZ.renderToolPage({
  category:'dev',
  titleKey:'toolTitle',
  descKey:'toolDesc',
  howToSteps:['step1','step2','step3','step4'],
  related:[
    {icon:'🔐', href:'/dev/base64.html', name:'Base64'},
    {icon:'🔗', href:'/dev/url-encode.html', name:'URL Encoder'},
    {icon:'📊', href:'/dev/json.html', name:'JSON Formatter'},
    
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
