    clear: '清空',
    step1: '选择密钥格式（十六进制、Base64、字母数字、UUID 或自定义）',
    step2: '设置密钥长度和生成数量',
    step3: '点击「生成密钥」创建安全的随机密钥',
    step4: '复制单个密钥或一次性复制全部',
  }
});

const { $, copyText, t } = GZ;

function secureRandomBytes(len) {
  const arr = new Uint8Array(len);
  crypto.getRandomValues(arr);
  return arr;
}

function toHex(bytes) {
  return Array.from(bytes).map(b => b.toString(16).padStart(2, '0')).join('');
}

function toBase64(bytes) {
  let binary = '';
  for (let i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i]);
  return btoa(binary);
}

function toAlphanumeric(bytes) {
  const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
  let result = '';
  for (let i = 0; i < bytes.length; i++) result += chars[bytes[i] % chars.length];
  return result;
}

function generateUUID() {
  const bytes = secureRandomBytes(16);
  bytes[6] = (bytes[6] & 0x0f) | 0x40;
  bytes[8] = (bytes[8] & 0x3f) | 0x80;
  const hex = toHex(bytes);
  return `${hex.slice(0,8)}-${hex.slice(8,12)}-${hex.slice(12,16)}-${hex.slice(16,20)}-${hex.slice(20)}`;
}

function generateKey() {
  const format = $('#format').value;
  const len = Math.max(8, Math.min(256, parseInt($('#keyLength').value) || 32));
  const upper = $('#uppercase').checked;
  const prefix = $('#prefix').value || '';
  let key;
  switch (format) {
    case 'hex': key = toHex(secureRandomBytes(len)); break;
    case 'base64': key = toBase64(secureRandomBytes(len)); break;
    case 'alphanumeric': key = toAlphanumeric(secureRandomBytes(len)); break;
    case 'uuid': key = generateUUID(); break;
    case 'custom': key = prefix + toHex(secureRandomBytes(len)); break;
    default: key = toHex(secureRandomBytes(len));
  }
  return upper ? key.toUpperCase() : key;
}

function doGenerate() {
  const count = Math.max(1, Math.min(50, parseInt($('#count').value) || 5));
  const keys = [];
  for (let i = 0; i < count; i++) keys.push(generateKey());
  const out = $('#output');
  out.innerHTML = keys.map((k, i) =>
    `<div class="key-row"><span class="key-prefix">#${i + 1}</span><span class="key-value">${k}</span><button class="key-copy" onclick="copyText('${k}')">${t('copy')}</button></div>`
  ).join('');
}

function doCopyAll() {
  const rows = document.querySelectorAll('.key-value');
  if (!rows.length) return;
  const text = Array.from(rows).map(r => r.textContent).join('\n');
  copyText(text);
}

function doClear() { $('#output').innerHTML = ''; }

$('#format').addEventListener('change', function() {
  const pf = $('#prefix-field');
  pf.style.display = this.value === 'custom' ? '' : 'none';
  if (this.value === 'uuid') $('#keyLength').value = 16;
});

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="doGenerate()">${t('generate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doCopyAll()">${t('copyAll')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

$('#lbl-format').textContent = t('format');
$('#lbl-length').textContent = t('keyLength');
$('#lbl-prefix').textContent = t('prefix');
$('#lbl-count').textContent = t('count');
$('#lbl-uppercase').textContent = t('uppercase');

    {icon:'🎲', href:'/dev/random-string.html', name:'Random String'},
  ]
});
</script>
