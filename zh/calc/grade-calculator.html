<div class="gz-container">

<script>
GZI18n.register({
  en: {
    toolTitle: 'Grade Calculator',
    toolDesc: 'Calculate your GPA and weighted grades. Add courses, select letter grades or enter percentages, and see your results instantly.',
    course: 'Course',
    grade: 'Grade',
    credits: 'Credits',
    addRow: '+ Add Course',
    calculate: 'Calculate GPA',
    clear: 'Clear All',
    gpaLabel: 'Cumulative GPA',
    totalCredits: 'Total Credits',
    courses: 'Courses',
    avgGrade: 'Average',
    letterGrade: 'Letter Grade',
    resultLetter: 'Letter',
    step1: 'Add your courses by clicking "+ Add Course"',
    step2: 'Select a letter grade or enter a percentage for each course',
    step3: 'Enter the credit hours for each course',
    step4: 'Click "Calculate GPA" to see your results',
  },
  zh: {
    toolTitle: '成绩计算器',
    toolDesc: '计算 GPA 和加权成绩。添加课程，选择字母等级或输入百分比，即时查看结果。',
    course: '课程',
    grade: '成绩',
    credits: '学分',
    addRow: '+ 添加课程',
    calculate: '计算 GPA',
    clear: '清空',
    gpaLabel: '累计 GPA',
    totalCredits: '总学分',
    courses: '课程数',
    avgGrade: '平均分',
    letterGrade: '字母等级',
    resultLetter: '等级',
    step1: '点击「添加课程」添加您的课程',
    step2: '为每门课程选择字母等级或输入百分比',
    step3: '输入每门课程的学分',
    step4: '点击「计算 GPA」查看结果',
  }
});

const { $, copyText, t } = GZ;

const GRADES = [
  {l:'A',p:'4.0'},{l:'A-',p:'3.7'},{l:'B+',p:'3.3'},{l:'B',p:'3.0'},
  {l:'B-',p:'2.7'},{l:'C+',p:'2.3'},{l:'C',p:'2.0'},{l:'C-',p:'1.7'},
  {l:'D+',p:'1.3'},{l:'D',p:'1.0'},{l:'F',p:'0.0'}
];

function pctToGPA(pct) {
  if (pct >= 93) return 4.0;
  if (pct >= 90) return 3.7;
  if (pct >= 87) return 3.3;
  if (pct >= 83) return 3.0;
  if (pct >= 80) return 2.7;
  if (pct >= 77) return 2.3;
  if (pct >= 73) return 2.0;
  if (pct >= 70) return 1.7;
  if (pct >= 67) return 1.3;
  if (pct >= 60) return 1.0;
  return 0.0;
}

function gpaToLetter(gpa) {
  if (gpa >= 3.85) return 'A';
  if (gpa >= 3.5) return 'A-';
  if (gpa >= 3.15) return 'B+';
  if (gpa >= 2.85) return 'B';
  if (gpa >= 2.5) return 'B-';
  if (gpa >= 2.15) return 'C+';
  if (gpa >= 1.85) return 'C';
  if (gpa >= 1.5) return 'C-';
  if (gpa >= 1.15) return 'D+';
  if (gpa >= 0.5) return 'D';
  return 'F';
}

let rowId = 0;
function addRow(name='', grade='A', credits='3') {
  const id = rowId++;
  const tbody = $('#grade-rows');
  const tr = document.createElement('tr');
  tr.id = 'row-' + id;
  const gradeOpts = GRADES.map(g => `<option value="${g.p}"${g.l===grade?' selected':''}>${g.l} (${g.p})</option>`).join('');
  const pctOpt = `<option value="pct">%</option>`;
  tr.innerHTML = `
    <td><input type="text" class="course-name" value="${name}" placeholder="Course name"></td>
    <td>
      <select class="grade-type" onchange="toggleGrade(this)">
        <option value="letter">${t('letterGrade')}</option>
        <option value="pct">%</option>
      </select>
      <select class="grade-val">${gradeOpts}</select>
      <input type="number" class="grade-pct" min="0" max="100" placeholder="0-100" style="display:none">
    </td>
    <td><input type="number" class="credits" value="${credits}" min="0" step="0.5" style="width:70px"></td>
    <td><button class="del-btn" onclick="this.closest('tr').remove();doCalculate()">✕</button></td>`;
  tbody.appendChild(tr);
  const typeSelect = tr.querySelector('.grade-type');
  const valSelect = tr.querySelector('.grade-val');
  const pctInput = tr.querySelector('.grade-pct');
  typeSelect.addEventListener('change', () => {
    if (typeSelect.value === 'pct') {
      valSelect.style.display = 'none';
      pctInput.style.display = '';
    } else {
      valSelect.style.display = '';
      pctInput.style.display = 'none';
    }
    doCalculate();
  });
  valSelect.addEventListener('change', doCalculate);
  pctInput.addEventListener('input', doCalculate);
  tr.querySelector('.credits').addEventListener('input', doCalculate);
}

function doCalculate() {
  const rows = document.querySelectorAll('#grade-rows tr');
  let totalPoints = 0, totalCredits = 0, count = 0;
  rows.forEach(tr => {
    const type = tr.querySelector('.grade-type').value;
    let gpa;
    if (type === 'pct') {
      const pct = parseFloat(tr.querySelector('.grade-pct').value);
      if (isNaN(pct)) return;
      gpa = pctToGPA(pct);
    } else {
      gpa = parseFloat(tr.querySelector('.grade-val').value);
    }
    const credits = parseFloat(tr.querySelector('.credits').value) || 0;
    totalPoints += gpa * credits;
    totalCredits += credits;
    count++;
  });
  const gpa = totalCredits > 0 ? (totalPoints / totalCredits) : 0;
  const box = $('#result-box');
  if (count === 0) { box.style.display = 'none'; return; }
  box.style.display = '';
  box.innerHTML = `
    <div class="gpa">${gpa.toFixed(2)}</div>
    <div class="gpa-label">${t('gpaLabel')}</div>
    <div class="gz-result-details">
      <div class="gz-result-card"><div class="val">${gpaToLetter(gpa)}</div><div class="lbl">${t('resultLetter')}</div></div>
      <div class="gz-result-card"><div class="val">${totalCredits}</div><div class="lbl">${t('totalCredits')}</div></div>
      <div class="gz-result-card"><div class="val">${count}</div><div class="lbl">${t('courses')}</div></div>
    </div>`;
}

function doClear() {
  $('#grade-rows').innerHTML = '';
  $('#result-box').style.display = 'none';
  rowId = 0;
  addRow(); addRow(); addRow();
}

$('#th-course').textContent = t('course');
$('#th-grade').textContent = t('grade');
$('#th-credits').textContent = t('credits');

$('#toolbar').innerHTML = `
  <button class="gz-btn gz-btn-secondary" onclick="addRow()">${t('addRow')}</button>
  <button class="gz-btn" onclick="doCalculate()">${t('calculate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🔢', href:'/calc/percentage-calculator.html', name:'Percentage Calculator'},
    {icon:'⚖️', href:'/calc/bmi-calculator.html', name:'BMI Calculator'},
    {icon:'🏦', href:'/calc/loan-calculator.html', name:'Loan Calculator'},
    {icon:'📐', href:'/calc/aspect-ratio.html', name:'Aspect Ratio'},
  ]
});

addRow('Mathematics', 'A', '4');
addRow('English Literature', 'B+', '3');
addRow('Computer Science', 'A-', '3');
doCalculate();
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
