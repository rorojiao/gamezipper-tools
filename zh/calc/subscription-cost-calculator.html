<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="sc-grid">
      <div class="sc-card">
        <h3>🔄 <span id="lblSubs"></span></h3>

          <thead>
            <tr>

              <th id="thAnnual" class="num" style="width:90px"></th>

            </tr>
          </thead>
          <tbody id="subBody"></tbody>

        <div class="row"><span id="lblFive"></span><span class="v" id="totalFive">$0</span></div>
        <div class="row ten"><span id="lblTen"></span><span class="v" id="totalTen">$0</span></div>

</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Subscription Cost Calculator',
    toolDesc: 'Add every streaming service, app, gym and recurring bill to see your true monthly, yearly and 10-year spend — and spot subscriptions worth canceling.',
    subs: 'Subscriptions', totals: 'Totals',
    name: 'Subscription', cost: 'Cost', cycle: 'Cycle', annual: 'Annual',
    monthly: 'Monthly total', yearly: 'Per year', five: 'Over 5 years', ten: 'Over 10 years',
    monthlyOpt: 'Monthly', yearlyOpt: 'Yearly', weeklyOpt: 'Weekly',
    add: '+ Add subscription',
    saveNote: '💡 Tip: canceling one $15/month subscription saves $1,800 over 10 years.',
    example: '🧪 Example', reset: '🔄 Reset', copy: '📋 Copy',
    step1: 'Add each subscription you pay for with its price and billing cycle',
    step2: 'Use the preset chips for common services like Netflix or Spotify to save time',
    step3: 'Watch the monthly, yearly, 5-year and 10-year totals update instantly',
    step4: 'Spot your most expensive subscriptions and decide what to cancel',
  },
  zh: {
    toolTitle: '订阅费用计算器',
    toolDesc: '添加所有流媒体、App、健身和定期账单，查看你的真实每月、每年和 10 年总支出，并发现值得取消的订阅。',
    subs: '订阅项', totals: '总计',
    name: '订阅名称', cost: '费用', cycle: '周期', annual: '年化',
    monthly: '每月总计', yearly: '每年', five: '5 年合计', ten: '10 年合计',
    monthlyOpt: '每月', yearlyOpt: '每年', weeklyOpt: '每周',
    add: '+ 添加订阅',
    saveNote: '💡 小贴士：取消一个每月 15 元的订阅，10 年可省 1800 元。',
    example: '🧪 示例', reset: '🔄 重置', copy: '📋 复制',
    step1: '添加每个订阅及其价格和计费周期',
    step2: '使用常见服务（如 Netflix、Spotify）的预设按钮快速添加',
    step3: '即时查看每月、每年、5 年和 10 年总支出',
    step4: '找出最贵的订阅并决定取消哪些',
  }
});

const { $, copyText, t } = GZ;
const isZh = GZI18n.getLang() === 'zh';

$('#lblSubs').textContent = t('subs');
$('#lblTotals').textContent = t('totals');
$('#thName').textContent = t('name');
$('#thCost').textContent = t('cost');
$('#thCycle').textContent = t('cycle');
$('#thAnnual').textContent = t('annual');
$('#lblMonthly').textContent = t('monthly');
$('#lblYearly2').textContent = t('yearly');
$('#lblFive').textContent = t('five');
$('#lblTen').textContent = t('ten');
$('#addBtn').textContent = t('add');
$('#saveNote').textContent = t('saveNote');

let subs = [];

const PRESETS = isZh
  ? [['爱奇艺',15,'monthly'],['腾讯视频',25,'monthly'],['网易云音乐',15,'monthly'],['百度网盘',30,'monthly'],['健身房',200,'monthly'],['Office 365',398,'yearly']]
  : [['Netflix',15.49,'monthly'],['Spotify',10.99,'monthly'],['Disney+',10.99,'monthly'],['Amazon Prime',139,'yearly'],['iCloud',2.99,'monthly'],['ChatGPT Plus',20,'monthly'],['Gym',40,'monthly'],['Microsoft 365',99,'yearly']];

$('#presets').innerHTML = PRESETS.map((p, i) => `<button onclick="addPreset(${i})">${p[0]}</button>`).join('');

function monthlyAmount(s) {
  const cost = +s.cost || 0;
  if (s.cycle === 'yearly') return cost / 12;
  if (s.cycle === 'weekly') return cost * 4.345;
  return cost;
}

function addRow(d = { name: '', cost: '', cycle: 'monthly' }) {
  subs.push(d);
  renderRows();
  calc();
}
window.addRow = addRow;

function addPreset(i) {
  const p = PRESETS[i];
  subs.push({ name: p[0], cost: p[1], cycle: p[2] });
  renderRows();
  calc();
}
window.addPreset = addPreset;

function removeRow(i) {
  subs.splice(i, 1);
  renderRows();
  calc();
}
window.removeRow = removeRow;

function renderRows() {
  const cur = '￥$'; // placeholder, currency handled separately
  $('#subBody').innerHTML = subs.map((s, i) => `
    <tr>
      <td><input type="text" data-i="${i}" data-k="name" value="${(s.name||'').replace(/"/g,'&quot;')}" placeholder="Netflix"></td>
      <td class="num"><input type="number" data-i="${i}" data-k="cost" value="${s.cost}" min="0" step="0.01"></td>
      <td><select data-i="${i}" data-k="cycle">
        <option value="monthly" ${s.cycle==='monthly'?'selected':''}>${t('monthlyOpt')}</option>
        <option value="yearly" ${s.cycle==='yearly'?'selected':''}>${t('yearlyOpt')}</option>
        <option value="weekly" ${s.cycle==='weekly'?'selected':''}>${t('weeklyOpt')}</option>
      </select></td>
      <td class="annual-cell" data-i="${i}"></td>
      <td class="x"><button onclick="removeRow(${i})">×</button></td>
    </tr>`).join('');
  $('#subBody').querySelectorAll('input,select').forEach(inp => {
    inp.addEventListener('input', e => {
      const i = +e.target.dataset.i, k = e.target.dataset.k;
      subs[i][k] = k === 'name' ? e.target.value : (e.target.value === '' ? '' : (k === 'cost' ? +e.target.value : e.target.value));
      calc();
    });
  });
}

function fmt(n) {
  const sign = isZh ? '¥' : '$';
  return sign + (n || 0).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function calc() {
  let monthly = 0;
  const annCells = document.querySelectorAll('[data-i].annual-cell');
  subs.forEach((s, i) => {
    const m = monthlyAmount(s);
    monthly += m;
    const cell = document.querySelector(`td.annual-cell[data-i="${i}"]`);
    if (cell) cell.textContent = fmt(m * 12);
  });
  const yearly = monthly * 12;
  $('#totalMonthly').textContent = fmt(monthly);
  $('#totalYearly').textContent = fmt(yearly);
  $('#totalFive').textContent = fmt(yearly * 5);
  $('#totalTen').textContent = fmt(yearly * 10);
  window._summary = `${t('monthly')}: ${fmt(monthly)} | ${t('yearly')}: ${fmt(yearly)} | ${t('ten')}: ${fmt(yearly*10)}`;
}

function loadExample() {
  subs = isZh
    ? [{name:'爱奇艺',cost:25,cycle:'monthly'},{name:'腾讯视频',cost:25,cycle:'monthly'},{name:'网易云音乐',cost:15,cycle:'monthly'},{name:'百度网盘',cost:30,cycle:'monthly'},{name:'健身房',cost:200,cycle:'monthly'},{name:'Office 365',cost:398,cycle:'yearly'}]
    : [{name:'Netflix',cost:15.49,cycle:'monthly'},{name:'Spotify',cost:10.99,cycle:'monthly'},{name:'Disney+',cost:10.99,cycle:'monthly'},{name:'Amazon Prime',cost:139,cycle:'yearly'},{name:'ChatGPT Plus',cost:20,cycle:'monthly'},{name:'Gym',cost:40,cycle:'monthly'}];
  renderRows();
  calc();
}
window.loadExample = loadExample;

function doReset() {
  subs = [];
  addRow(); addRow();
  calc();
}
window.doReset = doReset;

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doReset()">${t('reset')}</button>
  <button class="gz-btn" onclick="copyText(window._summary)">${t('copy')}</button>`;

addRow(); addRow();
calc();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'💸', href:'/calc/budget-planner.html', name:'Budget Planner'},
    {icon:'📊', href:'/calc/expense-tracker.html', name:'Expense Tracker'},
    {icon:'💳', href:'/calc/credit-card-payoff-calculator.html', name:'Credit Card Payoff'},
    {icon:'💵', href:'/calc/paycheck-calculator.html', name:'Paycheck'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
