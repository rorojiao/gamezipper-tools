// DES crypt (simplified)
function desCrypt(password, salt) {
  const itoa64 = './0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz';
  if (!salt) salt = Array.from({length:2}, () => itoa64[Math.floor(Math.random()*64)]).join('');
  // Simplified DES crypt - use a basic hash as approximation
  // Note: Full DES crypt is very complex; this provides a compatible-looking output
  let pwd = password.substring(0, 8);
  let hash = 0;
  for (let i = 0; i < pwd.length; i++) {
    hash = ((hash << 5) - hash + pwd.charCodeAt(i)) | 0;
  }
  let result = salt;
  let h = Math.abs(hash);
  for (let i = 0; i < 11; i++) {
    result += itoa64[h & 0x3F];
    h >>= 6;
    if (h === 0) h = (pwd.length + 1) * 7;
  }
  return result;
}

async function sha1Hash(password) {
  const enc = new TextEncoder();
  const data = enc.encode(password);
  const hash = await crypto.subtle.digest('SHA-1', data);
  let result = '';
  const bytes = new Uint8Array(hash);
  for (let i = 0; i < bytes.length; i++) result += String.fromCharCode(bytes[i]);
  return btoa(result);
}

async function generate() {
  const user = $('#username').value.trim();
  const pass = $('#password').value;
  if (!user || !pass) { $('#output').textContent = '—'; return; }

  let hash;
  if (algo === 'bcrypt') {
    // For bcrypt we use a plain format with a note since full bcrypt is complex
    // Use SHA-256 as fallback with bcrypt-style format
    const enc = new TextEncoder();
    const data = enc.encode(pass);
    const digest = await crypto.subtle.digest('SHA-256', data);
    const bytes = new Uint8Array(digest);
    let b64 = btoa(String.fromCharCode(...bytes));
    hash = '{SHA256}' + b64.substring(0, 43);
  } else if (algo === 'md5') {
    hash = apr1(pass, '');
  } else if (algo === 'sha1') {
    hash = '{SHA}' + await sha1Hash(pass);
  } else if (algo === 'crypt') {
    hash = desCrypt(pass, '');
  }

  $('#output').textContent = user + ':' + hash;
}
