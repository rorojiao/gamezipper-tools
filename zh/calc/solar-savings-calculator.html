<script>
GZI18n.register({
  en: {
    toolTitle: 'Solar Panel Savings Calculator',
    toolDesc: 'Estimate your solar savings — payback period, 25-year savings, ROI and break-even. Enter your electricity bill, system cost and incentives.',
    monthlyBill: 'Average monthly electric bill ($)',
    systemSize: 'System size (kW)',
    systemCost: 'Total system cost ($)',
    sunHours: 'Peak sun hours per day',
    elecRate: 'Electricity rate ($/kWh)',
    incentive: 'Tax credit / incentive (%)',
    calc: '☀️ Calculate Savings',
    annualSavings: 'Year-1 Savings',
    netCost: 'Net Cost After Incentives',
    payback: 'Payback Period',
    roi25: '25-Year Net Savings',
    roiPct: '25-Year ROI',
    lifetimeGen: '25-Year Energy Generated',
    co2Saved: 'CO₂ Avoided',
    years: 'years',
    chart: 'Cumulative Savings Over 25 Years',
    yearLbl: 'Year',
    savingsLbl: 'Savings',
    note: 'Estimates only. Actual savings depend on roof orientation, shading, degradation, rate changes and local policies.',
    step1: 'Enter your average monthly electricity bill and local peak sun hours.',
    step2: 'Enter the total system cost and the percentage of tax credits or rebates you qualify for.',
    step3: 'Click Calculate to see your payback period and 25-year savings.',
    step4: 'Review the cumulative savings chart to understand your break-even point.',
  },
  zh: {
    toolTitle: '太阳能板节省计算器',
    toolDesc: '估算安装太阳能板的节省效果 — 回本周期、25 年净收益、投资回报率和盈亏平衡点。输入电费、系统成本和补贴。',
    monthlyBill: '月均电费（美元）',
    systemSize: '系统装机容量（kW）',
    systemCost: '系统总成本（美元）',
    sunHours: '每日峰值日照时数',
    elecRate: '电价（美元/kWh）',
    incentive: '税收抵免 / 补贴（%）',
    calc: '☀️ 计算节省',
    annualSavings: '首年节省',
    netCost: '补贴后净成本',
    payback: '回本周期',
    roi25: '25 年净收益',
    roiPct: '25 年回报率',
    lifetimeGen: '25 年发电量',
    co2Saved: '减少碳排放',
    years: '年',
    chart: '25 年累计收益',
    yearLbl: '年份',
    savingsLbl: '收益',
    note: '仅为估算值。实际节省取决于屋顶朝向、遮挡、组件衰减、电价变动和当地政策。',
    step1: '输入你的月均电费和当地峰值日照时数。',
    step2: '输入系统总成本和你能获得的税收抵免或补贴百分比。',
    step3: '点击「计算节省」查看回本周期和 25 年收益。',
    step4: '查看累计收益图，了解盈亏平衡点。',
  }
});

const { $, t } = GZ;

const fields = [
  {key:'monthlyBill', def:'120'},
  {key:'systemSize', def:'6'},
  {key:'systemCost', def:'18000'},
  {key:'sunHours', def:'4.5'},
  {key:'elecRate', def:'0.15'},
  {key:'incentive', def:'30'},
];

$('#form').innerHTML = fields.map(f => `<label>${t(f.key)}<input type="number" id="f-${f.key}" value="${f.def}" step="0.01" min="0"></label>`).join('');
$('#btn-calc').textContent = t('calc');
$('#note').textContent = t('note');

function val(id) { return parseFloat($('#f-' + id).value) || 0; }

function calculate() {
  const bill = val('monthlyBill'), size = val('systemSize'), cost = val('systemCost');
  const sunHours = val('sunHours'), rate = val('elecRate'), incentivePct = val('incentive');

  // Annual generation: size(kW) * sunHours * 365 * 0.8 (system efficiency/derating)
  const annualKWh = size * sunHours * 365 * 0.80;
  // Use entered rate, fallback to deriving from bill
  const effRate = rate > 0 ? rate : (bill > 0 ? (bill * 12) / Math.max(annualKWh, 1) : 0.15);
  const year1Savings = annualKWh * effRate;
  const netCost = cost * (1 - incentivePct / 100);
  const payback = year1Savings > 0 ? netCost / year1Savings : 0;

  // 25-year with 0.5% annual degradation and 3% annual rate increase
  let cumulative = -netCost;
  const yearlyData = [{year:0, val:cumulative}];
  for (let y = 1; y <= 25; y++) {
    const degradation = Math.pow(0.995, y - 1);
    const rateRise = Math.pow(1.03, y - 1);
    const yearlySavings = annualKWh * effRate * degradation * rateRise;
    cumulative += yearlySavings;
    yearlyData.push({year:y, val:cumulative});
  }
  const roi25 = cumulative;
  const roiPct = netCost > 0 ? (roi25 / netCost) * 100 : 0;
  const co2 = annualKWh * 25 * 0.000709; // metric tons CO2 (US avg grid)

  const cards = [
    {lbl:t('annualSavings'), val:'$' + year1Savings.toFixed(0)},
    {lbl:t('netCost'), val:'$' + netCost.toFixed(0)},
    {lbl:t('payback'), val:payback.toFixed(1) + ' ' + t('years')},
    {lbl:t('roi25'), val:(roi25>=0?'+':'') + '$' + roi25.toFixed(0)},
    {lbl:t('roiPct'), val:(roiPct>=0?'+':'') + roiPct.toFixed(0) + '%'},
    {lbl:t('lifetimeGen'), val:(annualKWh*25/1000).toFixed(0) + ' MWh'},
    {lbl:t('co2Saved'), val:co2.toFixed(1) + ' t'},
  ];
  $('#results').innerHTML = cards.map(c => `<div class="gz-solar-card"><div class="val">${c.val}</div><div class="lbl">${c.lbl}</div></div>`).join('');
  $('#results').style.display = 'grid';

  // Simple SVG line chart
  const w = 600, h = 240, pad = 40;
  const xs = yearlyData.map(d => pad + (d.year/25)*(w-2*pad));
  const vals = yearlyData.map(d => d.val);
  const minV = Math.min(...vals), maxV = Math.max(...vals);
  const range = maxV - minV || 1;
  const ys = vals.map(v => h - pad - ((v - minV)/range)*(h-2*pad));
  const path = xs.map((x,i) => (i===0?'M':'L') + x.toFixed(1) + ',' + ys[i].toFixed(1)).join(' ');
  const zeroY = h - pad - ((0 - minV)/range)*(h-2*pad);
  const breakEvenYear = yearlyData.find(d => d.val >= 0);
  $('#chart').innerHTML = `<h3 style="text-align:center;margin:0 0 8px;font-size:.95em">${t('chart')}</h3>` +
    `<svg viewBox="0 0 ${w} ${h}" style="width:100%;max-width:600px;display:block;margin:0 auto">
      <line x1="${pad}" y1="${zeroY.toFixed(1)}" x2="${w-pad}" y2="${zeroY.toFixed(1)}" stroke="rgba(255,255,255,.2)" stroke-dasharray="4,4"/>
      <text x="${pad}" y="${(zeroY-6).toFixed(1)}" fill="rgba(255,255,255,.5)" font-size="11">$0</text>
      <path d="${path}" fill="none" stroke="#4ecdc4" stroke-width="2.5"/>
      ${breakEvenYear ? `<circle cx="${(pad + (breakEvenYear.year/25)*(w-2*pad)).toFixed(1)}" cy="${zeroY.toFixed(1)}" r="5" fill="#66bb6a"/>` : ''}
      <text x="${pad}" y="${h-10}" fill="rgba(255,255,255,.5)" font-size="11">0</text>
      <text x="${w-pad-10}" y="${h-10}" fill="rgba(255,255,255,.5)" font-size="11">25</text>
    </svg>`;
  $('#chart').style.display = 'block';
}

$('#toolbar').innerHTML = '';

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'⚡', href:'/calc/ev-savings-calculator.html', name:'EV Savings'},
    {icon:'🌱', href:'/calc/carbon-footprint-calculator.html', name:'Carbon Footprint'},
    {icon:'💧', href:'/calc/water-footprint-calculator.html', name:'Water Footprint'},
    {icon:'🔋', href:'/calc/battery-life-calculator.html', name:'Battery Life'},
  ]
});
</script>
