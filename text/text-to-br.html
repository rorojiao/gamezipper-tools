<script>
GZI18n.register({
  en: {
    toolTitle: 'Text to BR Converter',
    toolDesc: 'Convert line breaks to HTML <br> tags, or convert <br> tags back to newlines. Includes entity escaping mode. Free and browser-based.',

    clear: 'Clear',
    example: 'Example',

    outputLabel: 'Output',
    modeTextToBr: 'Line break → <br>',
    modeBrToText: '<br> → Line break',
    modeEscape: 'Escape to &lt;br&gt;',
    infoTextToBr: 'Replaces every newline (\\n) with a <br> tag',
    infoBrToText: 'Replaces <br>, <br/>, <br /> tags with newlines',
    infoEscape: 'Escapes all < and > characters to HTML entities',
    step1: 'Paste or type your text in the input area',
    step2: 'Choose a conversion mode (text→BR, BR→text, or escape)',
    step3: 'The output updates automatically as you type',
    step4: 'Click Copy to copy the result to your clipboard',
  },
  zh: {
    toolTitle: '文本转 BR 标签工具',
    toolDesc: '将换行符转换为 HTML <br> 标签，或将 <br> 标签转回换行符。支持实体转义模式。免费浏览器本地运行。',
    convert: '转换',
    copy: '复制',
    clear: '清空',
    example: '示例',
    inputLabel: '输入文本',
    outputLabel: '输出结果',
    modeTextToBr: '换行 → <br>',
    modeBrToText: '<br> → 换行',
    modeEscape: '转义为 &lt;br&gt;',
    infoTextToBr: '将每个换行符（\\n）替换为 <br> 标签',
    infoBrToText: '将 <br>、<br/>、<br /> 标签替换为换行符',
    infoEscape: '将所有 < 和 > 字符转义为 HTML 实体',
    step1: '在输入区粘贴或输入文本',
    step2: '选择转换模式（文本转 BR、BR 转文本、或转义）',
    step3: '输出会随输入自动更新',
    step4: '点击「复制」将结果复制到剪贴板',
  }
});

const { $, copyText, t } = GZ;
let mode = 'text-to-br';

function convert() {
  let input = $('#input').value;
  let output = '';
  if (mode === 'text-to-br') {
    output = input.replace(/\r\n/g, '\n').replace(/\n/g, '<br>\n');
  } else if (mode === 'br-to-text') {
    output = input.replace(/<br\s*\/?>/gi, '\n');
  } else if (mode === 'escape') {
    output = input.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }
  $('#output').value = output;
}

function setMode(m) { mode = m; convert(); updateInfo(); }

function updateInfo() {
  const infoMap = { 'text-to-br': 'infoTextToBr', 'br-to-text': 'infoBrToText', 'escape': 'infoEscape' };
  $('#tbr-info').textContent = t(infoMap[mode]);
}

function loadExample() {
  $('#input').value = 'Hello World\nThis is line 2\nAnd line 3\n\nAfter blank line';
  convert();
}

function doClear() { $('#input').value = ''; $('#output').value = ''; }

$('#mode-area').innerHTML = `
  <label><input type="radio" name="mode" value="text-to-br" checked onchange="setMode('text-to-br')"> ${t('modeTextToBr')}</label>
  <label><input type="radio" name="mode" value="br-to-text" onchange="setMode('br-to-text')"> ${t('modeBrToText')}</label>
  <label><input type="radio" name="mode" value="escape" onchange="setMode('escape')"> ${t('modeEscape')}</label>
  <div class="tbr-info" id="tbr-info"></div>`;

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="convert()">${t('convert')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn" onclick="copyText($('#output').value)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

$('#input').addEventListener('input', convert);
updateInfo();

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'➕', href:'/text/add-prefix-suffix.html', name:'Add Prefix/Suffix'},

    {icon:'📄', href:'/dev/html-encode.html', name:'HTML Encode'},
    {icon:'🔁', href:'/text/reverse-lines.html', name:'Reverse Lines'},

});
