<script>
GZI18n.register({
  en: {
    toolTitle: 'Twitter Card Meta Tag Generator',
    toolDesc: 'Generate Twitter Card meta tags (summary, summary_large_image, app, player) for rich Twitter/X sharing previews with live preview.',
    cardType: 'Card Type',
    siteHandle: 'Twitter @username (site)',
    creatorHandle: 'Creator @username',
    title: 'Title',
    desc: 'Description',
    image: 'Image URL',
    imageAlt: 'Image Alt Text',
    url: 'Page URL',
    preview: 'Live Twitter Card Preview',
    output: 'Generated Twitter Card Tags',
    step1: 'Pick a card type — summary_large_image gives the best preview',
    step2: 'Fill in title, description, image URL and your @handle',
    step3: 'Watch the live preview update as you type',
    step4: 'Copy the generated meta tags into your page <head>',
  },
  zh: {
    toolTitle: 'Twitter 卡片元标签生成器',
    toolDesc: '为 Twitter/X 富媒体分享预览生成 Twitter 卡片元标签（summary、summary_large_image、app、player），带实时预览。',
    cardType: '卡片类型',
    siteHandle: 'Twitter @用户名（站点）',
    creatorHandle: '作者 @用户名',
    title: '标题',
    desc: '描述',
    image: '图片网址',
    imageAlt: '图片替代文本',
    url: '页面网址',
    preview: '实时 Twitter 卡片预览',
    output: '生成的 Twitter 卡片标签',
    step1: '选择卡片类型 — summary_large_image 预览效果最佳',
    step2: '填写标题、描述、图片网址和你的 @用户名',
    step3: '实时预览会随输入自动更新',
    step4: '将生成的 meta 标签复制到页面 <head>',
  }
});

const { t, $, copyText } = GZ;

function esc(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function updatePreview() {
  const title = $('#tw-title').value || 'Card title';
  const desc = $('#tw-desc').value || 'Card description text...';
  const url = $('#tw-url').value || '';
  const image = $('#tw-image').value || '';
  try {
    const host = url ? new URL(url).hostname.replace(/^www\./,'') : 'example.com';
    $('#pv-domain').textContent = host;
  } catch(e) { $('#pv-domain').textContent = 'example.com'; }
  $('#pv-title').textContent = title;
  $('#pv-desc').textContent = desc;
  const img = $('#pv-img-tag');
  const placeholder = $('#pv-img-placeholder');
  if (image) {
    img.src = image;
    img.style.display = 'block';
    placeholder.style.display = 'none';
    img.onerror = function() {
      this.style.display = 'none';
      placeholder.style.display = 'block';
      placeholder.textContent = 'Image failed to load';
    };
  } else {
    img.style.display = 'none';
    placeholder.style.display = 'block';
    placeholder.textContent = 'Card image preview (1200x675 recommended)';
  }
}

function build() {
  const card = $('#tw-card').value;
  const site = $('#tw-site').value.trim();
  const creator = $('#tw-creator').value.trim();
  const title = $('#tw-title').value.trim();
  const desc = $('#tw-desc').value.trim();
  const image = $('#tw-image').value.trim();
  const imageAlt = $('#tw-image-alt').value.trim();
  const url = $('#tw-url').value.trim();
  const lines = [];
  lines.push(`<meta name="twitter:card" content="${esc(card)}">`);
  if (site) lines.push(`<meta name="twitter:site" content="${esc(site)}">`);
  if (creator) lines.push(`<meta name="twitter:creator" content="${esc(creator)}">`);
  if (title) lines.push(`<meta name="twitter:title" content="Twitter 卡片元标签生成器">`);
  if (desc) lines.push(`<meta name="twitter:description" content="为 Twitter/X 富媒体分享预览生成 Twitter 卡片元标签（summary、summary_large_image、app、player），带实时预览。">`);
  if (image) lines.push(`<meta name="twitter:image" content="${esc(image)}">`);
  if (imageAlt) lines.push(`<meta name="twitter:image:alt" content="${esc(imageAlt)}">`);
  if (url && (card === 'app' || card === 'player')) lines.push(`<meta name="twitter:url" content="${esc(url)}">`);
  $('#twoutput').value = lines.join('\n');
}

['#tw-card','#tw-site','#tw-creator','#tw-title','#tw-desc','#tw-image','#tw-image-alt','#tw-url'].forEach(s => {
  const el = $(s);
  if (!el) return;
  const ev = el.tagName === 'SELECT' ? 'change' : 'input';
  el.addEventListener(ev, () => { updatePreview(); build(); });
});

$('#lbl-card').textContent = t('cardType');
$('#lbl-site').textContent = t('siteHandle');
$('#lbl-creator').textContent = t('creatorHandle');
$('#lbl-title').textContent = t('title');
$('#lbl-desc').textContent = t('desc');
$('#lbl-image').textContent = t('image');
$('#lbl-image-alt').textContent = t('imageAlt');
$('#lbl-url').textContent = t('url');
$('#lbl-preview').textContent = t('preview');

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="copyText($('#twoutput').value)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#tw-title').value='';$('#tw-desc').value='';$('#tw-image').value='';$('#tw-image-alt').value='';$('#tw-url').value='';updatePreview();build();">${t('clear')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#tw-card').value='summary_large_image';$('#tw-site').value='@gamezipper';$('#tw-title').value='10 Free Online Tools Every Developer Needs in 2026';$('#tw-desc').value='Discover the most useful browser-based tools for JSON, Base64, CSS, color and SEO — no signup, 100%% private.';$('#tw-image').value='https://placehold.co/1200x675/4ecdc4/ffffff?text=GameZipper';$('#tw-image-alt').value='GameZipper Tools hero image';updatePreview();build();">${t('example')}</button>`;

GZ.renderToolPage({

    {icon:'📊', href:'/seo/google-serp-preview.html', name: 'Google SERP Preview'},
  ]
});
</script>
