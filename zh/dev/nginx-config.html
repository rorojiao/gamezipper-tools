<script>
GZI18n.register({
  en: {
    toolTitle: 'Nginx Config Generator',
    toolDesc: 'Generate Nginx configuration files visually — reverse proxy, static site, SSL, caching, gzip, security headers and more.',
    serverType: 'Server Type',
    domain: 'Domain',
    rootDir: 'Root Directory',
    proxyPass: 'Proxy Pass URL',
    indexFile: 'Index File',
    staticSite: 'Static Site',
    reverseProxy: 'Reverse Proxy',
    ssl: 'SSL / HTTPS',
    httpRedirect: 'HTTP → HTTPS Redirect',
    gzip: 'Gzip Compression',
    caching: 'Browser Caching',
    security: 'Security Headers',
    errorPages: 'Custom Error Pages',
    accessLog: 'Access Logging',
    output: 'Generated Nginx Config',
    step1: 'Choose server type: static site or reverse proxy',
    step2: 'Enter your domain name and settings',
    step3: 'Toggle SSL, gzip, caching, security headers, etc.',
    step4: 'Copy the generated config to your Nginx server',
  },
  zh: {
    toolTitle: 'Nginx 配置生成器',
    toolDesc: '可视化生成 Nginx 配置文件 — 反向代理、静态站点、SSL、缓存、压缩、安全头等。',
    serverType: '服务器类型',
    domain: '域名',
    rootDir: '根目录',
    proxyPass: '代理目标 URL',
    indexFile: '首页文件',
    staticSite: '静态站点',
    reverseProxy: '反向代理',
    ssl: 'SSL / HTTPS',
    httpRedirect: 'HTTP → HTTPS 重定向',
    gzip: 'Gzip 压缩',
    caching: '浏览器缓存',
    security: '安全头',
    errorPages: '自定义错误页',
    accessLog: '访问日志',
    output: '生成的 Nginx 配置',
    step1: '选择服务器类型：静态站点或反向代理',
    step2: '输入域名和基本设置',
    step3: '开关 SSL、压缩、缓存、安全头等选项',
    step4: '复制生成的配置到 Nginx 服务器',
  }
});

const { $, copyText, t } = GZ;

// Basic form
$('#basic-form').innerHTML = `
  <div class="form-group"><label>${t('serverType')}</label><select id="f-type">
    <option value="static">${t('staticSite')}</option>
    <option value="proxy">${t('reverseProxy')}</option>
  </select></div>
  <div class="form-group"><label>${t('domain')}</label><input id="f-domain" value="example.com"></div>
  <div class="form-group" id="grp-root"><label>${t('rootDir')}</label><input id="f-root" value="/var/www/html"></div>
  <div class="form-group" id="grp-proxy" style="display:none"><label>${t('proxyPass')}</label><input id="f-proxy" value="http://127.0.0.1:3000"></div>
  <div class="form-group" id="grp-index"><label>${t('indexFile')}</label><input id="f-index" value="index.html"></div>`;

$('#f-type').addEventListener('change', e => {
  const isProxy = e.target.value === 'proxy';
  $('#grp-root').style.display = isProxy ? 'none' : '';
  $('#grp-index').style.display = isProxy ? 'none' : '';
  $('#grp-proxy').style.display = isProxy ? '' : 'none';
  generate();
});

// Toggles
const sections = ['ssl','httpRedirect','gzip','caching','security','errorPages','accessLog'];
$('#toggles').innerHTML = sections.map(s => `<label class="section-toggle">
  <input type="checkbox" id="f-${s}" ${s==='gzip'||s==='security'||s==='accessLog'?'checked':''}>
  <span>${t(s)}</span>
</label>`).join('');

// Generate
function generate() {
  const type = $('#f-type').value;
  const domain = $('#f-domain').value || 'example.com';
  const root = $('#f-root').value || '/var/www/html';
  const proxy = $('#f-proxy').value || 'http://127.0.0.1:3000';
  const indexFile = $('#f-index').value || 'index.html';
  const useSSL = $('#f-ssl').checked;
  const useRedirect = $('#f-httpRedirect').checked && useSSL;
  const useGzip = $('#f-gzip').checked;
  const useCache = $('#f-caching').checked;
  const useSec = $('#f-security').checked;
  const useErrors = $('#f-errorPages').checked;
  const useLog = $('#f-accessLog').checked;

  let cfg = '';

  // HTTP redirect block
  if (useRedirect) {
    cfg += `server {\n`;
    cfg += `    listen 80;\n`;
    cfg += `    server_name ${domain} www.${domain};\n`;
    cfg += `    return 301 https://${domain}$request_uri;\n`;
    cfg += `}\n\n`;
  }

  // Main server block
  cfg += `server {\n`;
  cfg += `    listen ${useSSL ? '443 ssl http2' : '80'};\n`;
  cfg += `    server_name ${domain} www.${domain};\n\n`;

  if (useSSL) {
    cfg += `    # SSL Configuration\n`;
    cfg += `    ssl_certificate     /etc/letsencrypt/live/${domain}/fullchain.pem;\n`;
    cfg += `    ssl_certificate_key /etc/letsencrypt/live/${domain}/privkey.pem;\n`;
    cfg += `    ssl_protocols       TLSv1.2 TLSv1.3;\n`;
    cfg += `    ssl_ciphers         HIGH:!aNULL:!MD5;\n`;
    cfg += `    ssl_prefer_server_ciphers on;\n\n`;
  }

  if (useLog) {
    cfg += `    # Logging\n`;
    cfg += `    access_log /var/log/nginx/${domain}.access.log;\n`;
    cfg += `    error_log  /var/log/nginx/${domain}.error.log;\n\n`;
  }

  if (type === 'static') {
    cfg += `    root ${root};\n`;
    cfg += `    index ${indexFile};\n\n`;
    cfg += `    location / {\n`;
    cfg += `        try_files $uri $uri/ =404;\n`;
    cfg += `    }\n\n`;
  } else {
    cfg += `    location / {\n`;
    cfg += `        proxy_pass ${proxy};\n`;
    cfg += `        proxy_http_version 1.1;\n`;
    cfg += `        proxy_set_header Upgrade $http_upgrade;\n`;
    cfg += `        proxy_set_header Connection 'upgrade';\n`;
    cfg += `        proxy_set_header Host $host;\n`;
    cfg += `        proxy_set_header X-Real-IP $remote_addr;\n`;
    cfg += `        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;\n`;
    cfg += `        proxy_set_header X-Forwarded-Proto $scheme;\n`;
    cfg += `        proxy_cache_bypass $http_upgrade;\n`;
    cfg += `    }\n\n`;
  }

  if (useGzip) {
    cfg += `    # Gzip Compression\n`;
    cfg += `    gzip on;\n`;
    cfg += `    gzip_vary on;\n`;
    cfg += `    gzip_min_length 1024;\n`;
    cfg += `    gzip_proxied any;\n`;
    cfg += `    gzip_comp_level 6;\n`;
    cfg += `    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;\n\n`;
  }

  if (useCache) {
    cfg += `    # Browser Caching\n`;
    cfg += `    location ~* \\.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {\n`;
    cfg += `        expires 30d;\n`;
    cfg += `        add_header Cache-Control "public, immutable";\n`;
    if (type === 'static') cfg += `        try_files $uri =404;\n`;
    cfg += `    }\n\n`;
  }

  if (useSec) {
    cfg += `    # Security Headers\n`;
    cfg += `    add_header X-Frame-Options "SAMEORIGIN" always;\n`;
    cfg += `    add_header X-Content-Type-Options "nosniff" always;\n`;
    cfg += `    add_header X-XSS-Protection "1; mode=block" always;\n`;
    cfg += `    add_header Referrer-Policy "strict-origin-when-cross-origin" always;\n`;
    cfg += `    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';" always;\n`;
    cfg += `    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;\n\n`;
  }

  if (useErrors) {
    cfg += `    # Custom Error Pages\n`;
    cfg += `    error_page 404 /404.html;\n`;
    cfg += `    error_page 500 502 503 504 /50x.html;\n`;
    cfg += `    location = /404.html { root ${type==='static'?root:'/var/www/html'}; internal; }\n`;
    cfg += `    location = /50x.html { root ${type==='static'?root:'/var/www/html'}; internal; }\n\n`;
  }

  cfg += `    # Deny access to hidden files\n`;
  cfg += `    location ~ /\\. {\n`;
  cfg += `        deny all;\n`;
  cfg += `    }\n`;

  cfg += `}\n`;

  $('#output').textContent = cfg;
}

// Event listeners
['f-domain','f-root','f-proxy','f-index'].forEach(id => {
  $('#'+id).addEventListener('input', generate);
});
sections.forEach(s => {
  $('#f-'+s).addEventListener('change', () => {
    if (s === 'ssl' && !$('#f-ssl').checked) $('#f-httpRedirect').checked = false;
    generate();
  });
});

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')} Config</button>
  <button class="gz-btn gz-btn-secondary" onclick="downloadConfig()">Download nginx.conf</button>`;

window.downloadConfig = () => {
  const blob = new Blob([$('#output').textContent], { type: 'text/plain' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'nginx.conf';
  a.click();
};

$('#lbl-out').textContent = t('output');
generate();

GZ.renderToolPage({
  category: 'dev',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🛠️', href:'/dev/htaccess.html', name:'.htaccess Generator'},
    {icon:'📱', href:'/dev/webmanifest.html', name:'PWA Manifest'},
    {icon:'📊', href:'/dev/http-status-codes.html', name:'HTTP Status Codes'},
    {icon:'📡', href:'/dev/http-headers.html', name:'HTTP Headers'},
  ]
});
</script>
