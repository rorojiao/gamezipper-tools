// Category index
const CATS = {
  'Leavening': ['baking soda','baking powder','cream of tartar','yeast'],
  'Dairy': ['milk','buttermilk','cream','sour cream','butter'],
  'Sweeteners': ['sugar','brown sugar','honey','powdered sugar','vanilla'],
  'Flours': ['flour','cornstarch'],
  'Binders/Fats': ['eggs','oil','chocolate'],
};

let currentCat = 'all';

function renderChips() {
  const chips = $('#chips');
  const cats = [['all', t('all')], ...Object.keys(CATS).map(c => [c, c])];
  chips.innerHTML = cats.map(([key, label]) =>
    `<button class="${key===currentCat?'active':''}" onclick="setCat('${key}')">${label}</button>`
  ).join('');
}

function setCat(c) { currentCat = c; renderChips(); search(); }

function search() {
  const q = $('#search').value.trim().toLowerCase();
  const results = $('#results');
  const noRes = $('#no-result');
  results.innerHTML = '';
  let keys = Object.keys(DB);
  if (currentCat !== 'all') keys = CATS[currentCat] || [];
  if (q) keys = keys.filter(k => k.includes(q) || (DB[k]||[]).some(s => s.sub.toLowerCase().includes(q)));
  if (!keys.length) { noRes.style.display = 'block'; noRes.textContent = t('noResult'); return; }
  noRes.style.display = 'none';
  for (const key of keys) {
    const subs = DB[key] || [];
    if (!subs.length) continue;
    const heading = `<h3 style="margin:14px 0 6px;text-transform:capitalize">${key}</h3>`;
    const cards = subs.map(s => {
      const tags = (s.tags||[]).map(tg => {
        let lbl = tg;
        if (tg==='vegan') lbl=t('vegan');
        else if (tg==='dairy-free') lbl=t('dairyFree');
        else if (tg==='gluten-free') lbl=t('glutenFree');
        else if (tg==='low-fat') lbl=t('lowFat');
        else if (tg==='best') lbl=t('best');
        return `<span class="tag">${lbl}</span>`;
      }).join('');
      return `<div class="sub-card">
        <div><span class="ratio">${t('ratio')}: ${s.ratio}</span><span class="name">${s.sub}</span></div>
        <div style="margin-top:4px">${tags}</div>
        <div class="note">${s.note}</div>
      </div>`;
    }).join('');
    results.insertAdjacentHTML('beforeend', heading + cards);
  }
}

$('#search').addEventListener('input', search);
$('#search').setAttribute('placeholder', t('searchPh'));

renderChips();
search();
