const CAT_LABELS = {
  animal: '🦁 Animals', space: '🚀 Space', history: '🏛️ History', science: '🔬 Science',
  body: '🫀 Human Body', food: '🍕 Food', geography: '🌍 Geography'
};

let allFacts = [];
Object.keys(FACTS).forEach(k => FACTS[k].forEach(f => allFacts.push({ cat: k, text: f })));

let history = [];
let sessionCount = 0;

function pickFact() {
  const cat = $('#cat').value;
  let pool;
  if (cat === 'all') pool = allFacts;
  else pool = FACTS[cat].map(text => ({ cat, text }));

  // Try not to repeat recent facts
  const recent = new Set(history.slice(0, 10).map(h => h.text));
  let candidates = pool.filter(f => !recent.has(f.text));
  if (candidates.length === 0) candidates = pool;
  return candidates[Math.floor(Math.random() * candidates.length)];
}

function showFact() {
  const fact = pickFact();
  sessionCount++;
  history.unshift(fact);
  if (history.length > 8) history = history.slice(0, 8);

  $('#factCard').innerHTML = `
    <div class="gz-fact-card">
      <span class="quote">&ldquo;</span>
      <span class="badge">${CAT_LABELS[fact.cat]}</span>
      <div class="text">${fact.text}</div>
      <div class="gz-fact-meta">
        <div class="actions">
          <button class="gz-mini-btn" id="copyBtn">${t('copy')}</button>
          <button class="gz-mini-btn" id="shareBtn">${t('share')}</button>
        </div>
      </div>
    </div>`;

  $('#copyBtn').addEventListener('click', () => {
    copyText(fact.text);
    $('#copyBtn').textContent = t('copied');
    setTimeout(() => $('#copyBtn').textContent = t('copy'), 1500);
  });
  $('#shareBtn').addEventListener('click', async () => {
    const url = location.href;
    if (navigator.share) {
      try { await navigator.share({ title: 'Fun Fact', text: fact.text, url }); } catch (e) {}
    } else {
      copyText(`${fact.text}\n\n${url}`);
      $('#shareBtn').textContent = t('shared');
      setTimeout(() => $('#shareBtn').textContent = t('share'), 1500);
    }
  });

  $('#counter').textContent = `${t('counterFact')} ${sessionCount} ${t('counterOf')} ${allFacts.length} — ${sessionCount} ${t('counterSeen')}`;

  // History list
  if (history.length > 1) {
    $('#history').style.display = 'block';
    $('#historyList').innerHTML = history.slice(1).map(h =>
      `<div class="gz-history-item"><span class="badge">${CAT_LABELS[h.cat]}</span>${h.text}</div>`).join('');
  } else {
    $('#history').style.display = 'none';
  }
}

$('#nextBtn').addEventListener('click', showFact);

showFact();
