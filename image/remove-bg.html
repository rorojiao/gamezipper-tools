<script>
GZI18n.register({
  en: {
    toolTitle: 'Image Background Remover',
    toolDesc: 'Remove image backgrounds online for free. Pick the background color, adjust tolerance, and download a transparent PNG.',
    dropText: 'Drag & drop an image here or click to upload',
    bgColor: 'BG Color',
    tolerance: 'Tolerance',
    apply: 'Remove BG',
    reset: 'Reset',
    step1: 'Upload an image by dragging or clicking the drop zone',
    step2: 'Pick the background color to remove using the color picker',
    step3: 'Adjust the tolerance slider to control removal range',
    step4: 'Click "Remove BG" and download the transparent PNG',
  },
  zh: {
    toolTitle: '图片背景移除工具',
    toolDesc: '免费在线移除图片背景。选择背景颜色、调整容差，下载透明 PNG。',
    dropText: '拖拽图片到此处或点击上传',
    bgColor: '背景色',
    tolerance: '容差',
    apply: '移除背景',
    reset: '重置',
    step1: '拖拽或点击上传区域上传图片',
    step2: '使用取色器选择要移除的背景颜色',
    step3: '调整容差滑块控制移除范围',
    step4: '点击「移除背景」并下载透明 PNG',
  }
});

const { $, copyText, t } = GZ;
let originalData = null;
const canvas = $('#canvas');
const ctx = canvas.getContext('2d');
const dropZone = $('#dropZone');
const fileInput = $('#fileInput');

$('#dropText').textContent = t('dropText');
$('#lbl-color').textContent = t('bgColor');
$('#lbl-tolerance').textContent = t('tolerance');
$('#btnApply').textContent = t('apply');
$('#btnReset').textContent = t('reset');
$('#tolerance').addEventListener('input', e => { $('#tolVal').textContent = e.target.value; });

dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('dragover'); if(e.dataTransfer.files.length) loadImage(e.dataTransfer.files[0]); });
fileInput.addEventListener('change', e => { if(e.target.files.length) loadImage(e.target.files[0]); });

function loadImage(file) {
  const img = new Image();
  img.onload = () => {
    canvas.width = img.width;
    canvas.height = img.height;
    ctx.drawImage(img, 0, 0);
    originalData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    dropZone.style.display = 'none';
    $('#controls').style.display = 'flex';
    $('#canvasWrap').style.display = 'block';
    // Auto-detect most common edge color as bg
    const edge = ctx.getImageData(0, 0, 1, 1).data;
    $('#bgColor').value = '#' + [edge[0],edge[1],edge[2]].map(v=>v.toString(16).padStart(2,'0')).join('');
  };
  img.src = URL.createObjectURL(file);
}

function applyRemoval() {
  if (!originalData) return;
  const data = new ImageData(new Uint8ClampedArray(originalData.data), originalData.width, originalData.height);
  const bg = hexToRgb($('#bgColor').value);
  const tol = parseInt($('#tolerance').value);
  for (let i = 0; i < data.data.length; i += 4) {
    const dr = data.data[i] - bg.r, dg = data.data[i+1] - bg.g, db = data.data[i+2] - bg.b;
    const dist = Math.sqrt(dr*dr + dg*dg + db*db);
    if (dist <= tol * 4.42) { // scale 0-100 to 0-442 (max color distance)
      data.data[i+3] = 0; // transparent
    }
  }
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.putImageData(data, 0, 0);
}

function resetImage() {
  if (!originalData) return;
  ctx.putImageData(originalData, 0, 0);
}

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return {r,g,b};
}

function download() {
  const a = document.createElement('a');
  a.href = canvas.toDataURL('image/png');
  a.download = 'removed-bg.png';
  a.click();
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="download()">⬇️ ${t('copy') ? 'Download PNG' : 'Download PNG'}</button>`;

GZ.renderToolPage({
  category: 'image',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🖼️', href:'/image/compressor.html', name:'Image Compressor'},
    {icon:'✂️', href:'/image/cropper.html', name:'Image Cropper'},
    {icon:'🔄', href:'/image/converter.html', name:'Image Converter'},
    {icon:'🔒', href:'/image/censor.html', name:'Image Censor'},
  ]
});
</script>
