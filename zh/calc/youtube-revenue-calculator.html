<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="field-row">
      <div>
        <label id="lbl-views"></label>
        <input type="number" id="views" class="gz-input" value="100000" min="0" step="1000">
      </div>
      <div>
        <label id="lbl-niche"></label>
        <select id="niche" class="gz-select">
          <option value="1">General Entertainment</option>
          <option value="2">Gaming</option>
          <option value="3">Music</option>

          <option value="6" selected>Finance / Business</option>
          <option value="8">Insurance / Legal</option>
          <option value="4">Health / Fitness</option>
          <option value="2.5">Lifestyle / Vlog</option>
          <option value="1.5">Kids / Family</option>
        </select>
      </div>
      <div>
        <label id="lbl-cpm"></label>
        <input type="number" id="cpm" class="gz-input" value="6" min="0.1" step="0.5">
      </div>
      <div>

        <input type="number" id="monetization" class="gz-input" value="55" min="1" max="100" step="1">

</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'YouTube Money Calculator',
    toolDesc: 'Estimate your YouTube channel revenue from monthly views, niche, CPM and engagement. Get per-day, monthly and yearly projections in USD.',
    lblViews: 'Monthly views', lblNiche: 'Niche (auto-fills CPM)',
    lblCpm: 'Custom CPM (USD per 1k)',
    lblMonetization: 'Creator share (% of ad revenue)',
    calc: 'Calculate',
    headline: 'Estimated monthly revenue',
    rpm: 'Effective RPM', per1k: 'Revenue per 1k views',
    daily: 'Daily', monthly: 'Monthly', yearly: 'Yearly',
    creator: 'You receive', adShare: 'YouTube keeps',
    note: 'Estimates are based on average CPM × 55% creator share. Actual revenue varies with ad fill rate, viewer location, niche, season, and Shorts vs long-form mix.',
    step1: 'Enter your monthly view count',
    step2: 'Pick your niche to auto-fill CPM, or set a custom CPM',
    step3: 'Adjust the creator share if you negotiate a higher cut (Premium, Shorts, etc.)',
    step4: 'Read the daily, monthly and yearly revenue breakdown',
  },
  zh: {
    toolTitle: 'YouTube 收入计算器',
    toolDesc: '根据每月观看次数、内容领域、CPM 和收入分成估算你的 YouTube 频道收入。提供每日、每月和每年预测。',
    lblViews: '每月观看次数', lblNiche: '内容领域（自动填充 CPM）',
    lblCpm: '自定义 CPM（美元/千次）',
    lblMonetization: '创作者分成（广告收入 %）',
    calc: '计算',
    headline: '预计每月收入',
    rpm: '有效 RPM', per1k: '千次播放收入',
    daily: '每日', monthly: '每月', yearly: '每年',
    creator: '你获得', adShare: 'YouTube 保留',
    note: '估算基于平均 CPM × 55% 创作者分成。实际收入因广告填充率、观众所在地、内容领域、季节以及 Shorts 与长视频比例而异。',
    step1: '输入每月观看次数',
    step2: '选择内容领域自动填充 CPM，或设置自定义 CPM',
    step3: '如果签订了更高分成协议可调整创作者比例',
    step4: '查看每日、每月和每年收入分解',
  }
});

const { $, t } = GZ;

const NICHE_CPM = {
  '1': 4, '2': 3, '3': 2, '4': 6, '5': 8,
  '6': 14, '8': 24, '4': 6, '2.5': 4, '1.5': 2.5
};

function doCalc() {
  const views = parseInt($('#views').value) || 0;
  const nicheKey = $('#niche').value;
  const cpm = parseFloat($('#cpm').value) || NICHE_CPM[nicheKey] || 6;
  const monetization = (parseFloat($('#monetization').value) || 55) / 100;

  const rpm = cpm * monetization;
  const monthlyUSD = (views / 1000) * rpm;
  const dailyUSD = monthlyUSD / 30;
  const yearlyUSD = monthlyUSD * 12;
  const per1k = rpm;
  const youtubeShare = (views / 1000) * cpm * (1 - monetization);

  $('#result').innerHTML = `<div>${t('headline')}</div><div class="big">$${monthlyUSD.toLocaleString(undefined,{maximumFractionDigits:2})}</div>`;
  $('#summary').innerHTML = `
    <div class="summary-cell"><div class="lbl">${t('daily')}</div><div class="val">$${dailyUSD.toFixed(2)}</div></div>
    <div class="summary-cell"><div class="lbl">${t('monthly')}</div><div class="val">$${monthlyUSD.toLocaleString(undefined,{maximumFractionDigits:2})}</div></div>
    <div class="summary-cell"><div class="lbl">${t('yearly')}</div><div class="val">$${yearlyUSD.toLocaleString(undefined,{maximumFractionDigits:0})}</div></div>
    <div class="summary-cell"><div class="lbl">${t('rpm')}</div><div class="val">$${rpm.toFixed(2)}</div></div>
    <div class="summary-cell"><div class="lbl">${t('per1k')}</div><div class="val">$${per1k.toFixed(2)}</div></div>
    <div class="summary-cell"><div class="lbl">${t('creator')}</div><div class="val">$${monthlyUSD.toLocaleString(undefined,{maximumFractionDigits:0})}</div></div>
  `;
  // bar
  const max = Math.max(monthlyUSD, youtubeShare, dailyUSD * 30, yearlyUSD / 12);
  const rows = [
    [t('monthly'), monthlyUSD],
    [t('yearly') + '/12', yearlyUSD / 12],
    [t('creator') + ' (yr)', yearlyUSD],
    [t('adShare') + ' (yr)', youtubeShare * 12],
  ];
  const maxYr = Math.max(...rows.map(r => r[1]));
  $('#bar').innerHTML = rows.map(([lbl, val]) => `
    <div class="bar-row">
      <div>${lbl}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${(val / maxYr * 100).toFixed(1)}%"></div></div>
      <div class="bar-val">$${val.toLocaleString(undefined,{maximumFractionDigits:0})}</div>
    </div>
  `).join('');
  $('#note').textContent = t('note');
}

$('#niche').addEventListener('change', () => {
  const cpm = NICHE_CPM[$('#niche').value];
  if (cpm) $('#cpm').value = cpm;
  doCalc();
});
$('#views').addEventListener('input', doCalc);
$('#cpm').addEventListener('input', doCalc);
$('#monetization').addEventListener('input', doCalc);
$('#btn-calc').addEventListener('click', doCalc);

doCalc();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle', descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🎬', href:'/social/youtube-thumb.html', name:'YT Thumbnail'},
    {icon:'🏷️', href:'/text/youtube-tag-generator.html', name:'YT Tags'},
    {icon:'📺', href:'/text/youtube-title-checker.html', name:'YT Title'},
    {icon:'💰', href:'/calc/roi.html', name:'ROI'},
  ]
});
</script>

</body>
