<script>
GZI18n.register({
  en: {
    toolTitle: 'Binary Clock',
    toolDesc: 'A live binary clock that displays the current time in binary format using LED-style dots. Learn to read binary numbers — free, no signup.',
    step1: 'Watch the binary dots update every second in real time',
    step2: 'Read each column from bottom to top (1, 2, 4, 8)',
    step3: 'Add up the lit dot values in each column to get the decimal number',
    step4: 'Compare with the decimal time shown above to practice',
    hint: 'Each column shows a time unit. Lit dots = 1, unlit = 0. Read bottom-to-top: 1→2→4→8',
    bcdMode: 'BCD (per-digit)',
    rawMode: 'Binary (whole)',
  },
  zh: {
    toolTitle: '二进制时钟',
    toolDesc: '实时二进制时钟，使用 LED 风格圆点以二进制格式显示当前时间。学习阅读二进制数字 — 免费、无需注册。',
    step1: '观察二进制圆点每秒实时更新',
    step2: '每列从下往上阅读（1、2、4、8）',
    step3: '将每列中亮起的圆点值相加得到十进制数字',
    step4: '与上方显示的十进制时间对比练习',
    hint: '每列代表一个时间单位。亮 = 1，灭 = 0。从下往上读：1→2→4→8',
    bcdMode: 'BCD（逐位）',
    rawMode: '二进制（整体）',
  }
});

let mode = 'bcd'; // bcd or raw
const { $, t } = GZ;

function toBinaryPadded(num, bits) {
  let bin = num.toString(2);
  while (bin.length < bits) bin = '0' + bin;
  return bin.split('');
}

function renderBCD() {
  const now = new Date();
  const h = now.getHours(), m = now.getMinutes(), s = now.getSeconds();
  const dec = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  $('#decTime').textContent = dec;

  // BCD mode: split each time unit into tens and ones
  const cols = [
    { label: 'H₁', bits: toBinaryPadded(Math.floor(h/10), 2) },
    { label: 'H₀', bits: toBinaryPadded(h%10, 4) },
    { label: 'M₁', bits: toBinaryPadded(Math.floor(m/10), 3) },
    { label: 'M₀', bits: toBinaryPadded(m%10, 4) },
    { label: 'S₁', bits: toBinaryPadded(Math.floor(s/10), 3) },
    { label: 'S₀', bits: toBinaryPadded(s%10, 4) },
  ];
  const maxBits = 4;
  let html = '';
  cols.forEach(col => {
    let dots = '';
    for (let i = 0; i < maxBits; i++) {
      const idx = maxBits - 1 - i; // render top-down but bits are MSB-first
      const active = col.bits[idx] === '1';
      const dim = i >= col.bits.length ? 'dim' : '';
      dots += `<div class="bin-dot ${active?'active':''} ${dim}"></div>`;
    }
    html += `<div class="bin-column">${dots}<div class="bin-col-label">${col.label}</div></div>`;
  });
  $('#binDisplay').innerHTML = html;
}

function renderRaw() {
  const now = new Date();
  const h = now.getHours(), m = now.getMinutes(), s = now.getSeconds();
  const dec = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  $('#decTime').textContent = dec;

  const cols = [
    { label: 'HRS', bits: toBinaryPadded(h, 5) },
    { label: 'MIN', bits: toBinaryPadded(m, 6) },
    { label: 'SEC', bits: toBinaryPadded(s, 6) },
  ];
  const maxBits = 6;
  let html = '';
  cols.forEach(col => {
    let dots = '';
    for (let i = maxBits - 1; i >= 0; i--) {
      const active = col.bits[i] === '1';
      dots += `<div class="bin-dot ${active?'active':''}"></div>`;
    }
    html += `<div class="bin-column">${dots}<div class="bin-col-label">${col.label}</div></div>`;
  });
  $('#binDisplay').innerHTML = html;
}

function tick() {
  if (mode === 'bcd') renderBCD(); else renderRaw();
}

$('#toolbar').innerHTML = `
  <button class="gz-btn ${mode==='bcd'?'':'gz-btn-secondary'}" onclick="mode='bcd';tick()">${t('bcdMode')}</button>
  <button class="gz-btn ${mode==='raw'?'':'gz-btn-secondary'}" onclick="mode='raw';tick()">${t('rawMode')}</button>`;

$('#hint') ? ($('#hint').textContent = t('hint')) : null;

GZ.renderToolPage({
  category: 'fun',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🔢', href:'/calc/binary-calculator.html', name:'Binary Calculator'},
    {icon:'🕐', href:'/fun/digital-clock.html', name:'Digital Clock'},
    {icon:'⏱️', href:'/fun/flip-clock.html', name:'Flip Clock'},
    {icon:'🔄', href:'/text/text-to-binary.html', name:'Text to Binary'},
  ]
});

tick();
setInterval(tick, 1000);
</script>
