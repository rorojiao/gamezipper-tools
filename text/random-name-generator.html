<script>

const { $, copyText, t } = GZ;

const POOLS = {
  classic: {
    first: ['James','John','Robert','Michael','William','David','Richard','Joseph','Thomas','Charles','Mary','Patricia','Jennifer','Linda','Elizabeth','Barbara','Susan','Jessica','Sarah','Karen','Nancy','Lisa','Daniel','Matthew','Anthony','Mark','Donald','Steven','Paul','Andrew','Christopher','Joshua','Kenneth','Kevin','Brian','Margaret','Sandra','Ashley','Kimberly','Emily','Donna','Michelle','Carol','Amanda','Melissa','Deborah','Stephanie','Rebecca','Sharon','Laura'],
    last: ['Smith','Johnson','Williams','Brown','Jones','Garcia','Miller','Davis','Rodriguez','Martinez','Hernandez','Lopez','Gonzalez','Wilson','Anderson','Thomas','Taylor','Moore','Jackson','Martin','Lee','Perez','Thompson','White','Harris','Sanchez','Clark','Ramirez','Lewis','Robinson','Walker','Young','Allen','King','Wright','Scott','Torres','Nguyen','Hill','Flores','Green','Adams','Nelson','Baker','Hall','Rivera','Campbell','Mitchell','Carter','Roberts']
  },
  intl: {
    first: ['Akira','Yuki','Hiro','Mei','Wei','Lin','Kenji','Sora','Ravi','Priya','Arjun','Anika','Kofi','Amara','Chidi','Zara','Omar','Layla','Hassan','Fatima','Mateo','Sofia','Diego','Camila','Lucas','Ana','Liam','Emma','Noah','Olivia','Ethan','Mia','Khalid','Aisha','Ivan','Nina','Pavel','Olga','Lars','Astrid','Mateus','Beatriz','Tariq','Yasmin','Sven','Ingrid','Idris','Maya','Ravi','Leila'],
    last: ['Tanaka','Suzuki','Wang','Chen','Patel','Khan','Ito','Kim','Park','Choi','Singh','Kumar','Müller','Schmidt','Rossi','Ferrari','Dubois','Martin','Costa','Silva','Andersen','Johansson','Novak','Kowalski','Petrov','Ivanov','Yamamoto','Nakamura','Oliveira','Santos','Lefevre','Moreau','Nguyen','Tran','Le','Kim','Hassan','Ali','Olsen','Nielsen','Haddad','Khoury','Bauer','Wagner','Fischer','Weber']

  },

    first: ['River','Sky','Dawn','Ash','Sage','Willow','Briar','Hazel','Cedar','Wren','Fawn','Indigo','Jade','Luna','Maple','Onyx','Plum','Quartz','Rose','Storm','Violet','Wolf','Aspen','Birch','Clover','Daisy','Echo','Fern','Glen','Hawk','Iris','Jasmine','Kite','Lark','Meadow','Nova','Orchid','Pebble','Rain','Skye','Terra','Valley','Wolf','Yarrow','Zephyr'],

  },
  pet: {
    first: ['Bella','Max','Luna','Charlie','Lucy','Cooper','Bailey','Daisy','Rocky','Milo','Sadie','Buddy','Lola','Molly','Bear','Duke','Stella','Tucker','Maggie','Coco','Oliver','Sophie','Jack','Zoe','Toby','Ruby','Leo','Chloe','Bentley','Lily','Gizmo','Shadow','Nala','Simba','Whiskers','Pumpkin','Mochi','Noodle','Pepper','Snickers','Tootsie','Waffles','Biscuit','Cinnamon','Marshmallow','Peanut'],
    last: []
  }
};

function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function genOne(style, fmt) {
  const pool = POOLS[style];
  if (style === 'pet') return pick(pool.first);
  if (fmt === 'first') return pick(pool.first);
  if (fmt === 'last') return pick(pool.last);
  return `${pick(pool.first)} ${pick(pool.last)}`;
}

function generate() {
  const style = $('#style').value;
  const fmt = $('#format').value;
  const n = Math.max(1, Math.min(100, parseInt($('#count').value) || 1));
  const names = [];
  const seen = new Set();
  let tries = 0;
  while (names.length < n && tries < n * 4) {
    const nm = genOne(style, fmt);
    if (!seen.has(nm)) { seen.add(nm); names.push(nm); }
    tries++;
  }
  $('#output').innerHTML = `<div class="name-grid">` +
    names.map((nm,i) => `<div class="name-card"><span class="nm">${nm}</span><button class="copy-mini" onclick="copyText('${nm.replace(/'/g,"\\'")}')">📋</button></div>`).join('') +
    `</div>`;
  $('#status').innerHTML = `<span style="color:var(--gz-success)">✓ ${names.length}</span>`;
}

function copyAll() {
  const text = $('#output').textContent.replace(/📋/g,'\n').replace(/\s+/g,' ').trim();
  // simpler: gather names directly
  const cards = document.querySelectorAll('.name-card .nm');
  if (!cards.length) return;
  const all = [...cards].map(c => c.textContent).join('\n');
  copyText(all);
}

    </select>
  </label>
  <label><b>${t('formatLabel')}:</b>

      <option value="full">${t('formatFull')}</option>
      <option value="first">${t('formatFirst')}</option>
      <option value="last">${t('formatLast')}</option>
    </select>
  </label>
  <label><b>${t('countLabel')}:</b>

</script>
