    step2: '点击「解析」解码 UA 各组件',
    step3: '查看浏览器、操作系统、设备类型和引擎信息',
    step4: '点击「复制」保存原始 UA 字符串',

const { $, copyText, t } = GZ;

function parseUA(ua) {
  const result = { browser: { name: '', version: '' }, os: { name: '', version: '' }, device: { type: '', brand: '' }, engine: { name: '', version: '' } };

  // Browser detection
  if (/Edg\/(\d[\d.]*)/.test(ua)) { result.browser.name = 'Microsoft Edge'; result.browser.version = ua.match(/Edg\/(\d[\d.]*)/)[1]; }
  else if (/OPR\/(\d[\d.]*)/.test(ua)) { result.browser.name = 'Opera'; result.browser.version = ua.match(/OPR\/(\d[\d.]*)/)[1]; }
  else if (/Firefox\/(\d[\d.]*)/.test(ua)) { result.browser.name = 'Firefox'; result.browser.version = ua.match(/Firefox\/(\d[\d.]*)/)[1]; }
  else if (/Chrome\/(\d[\d.]*)/.test(ua)) { result.browser.name = 'Chrome'; result.browser.version = ua.match(/Chrome\/(\d[\d.]*)/)[1]; }
  else if (/Safari\/(\d[\d.]*)/.test(ua) && /Version\/(\d[\d.]*)/.test(ua)) { result.browser.name = 'Safari'; result.browser.version = ua.match(/Version\/(\d[\d.]*)/)[1]; }
  else if (/MSIE (\d[\d.]*)/.test(ua)) { result.browser.name = 'Internet Explorer'; result.browser.version = ua.match(/MSIE (\d[\d.]*)/)[1]; }
  else if (/Trident\/.*rv:(\d[\d.]*)/.test(ua)) { result.browser.name = 'Internet Explorer'; result.browser.version = ua.match(/rv:(\d[\d.]*)/)[1]; }

  // OS detection
  if (/Windows NT (\d+\.\d+)/.test(ua)) {
    const v = ua.match(/Windows NT (\d+\.\d+)/)[1];
    const winMap = {'10.0':'10/11','6.3':'8.1','6.2':'8','6.1':'7','6.0':'Vista','5.1':'XP'};
    result.os.name = 'Windows'; result.os.version = winMap[v] || v;
  } else if (/Mac OS X (\d+[._]\d+[._]?\d*)/.test(ua)) {
    result.os.name = 'macOS'; result.os.version = ua.match(/Mac OS X (\d+[._]\d+[._]?\d*)/)[1].replace(/_/g,'.');
  } else if (/Android (\d[\d.]*)/.test(ua)) {
    result.os.name = 'Android'; result.os.version = ua.match(/Android (\d[\d.]*)/)[1];
  } else if (/iPhone OS (\d+_\d+)/.test(ua)) {
    result.os.name = 'iOS'; result.os.version = ua.match(/iPhone OS (\d+_\d+)/)[1].replace(/_/g,'.');
  } else if (/iPad.*OS (\d+_\d+)/.test(ua)) {
    result.os.name = 'iPadOS'; result.os.version = ua.match(/iPad.*OS (\d+_\d+)/)[1].replace(/_/g,'.');
  } else if (/Linux/.test(ua)) { result.os.name = 'Linux'; }
  else if (/CrOS/.test(ua)) { result.os.name = 'Chrome OS'; }

  // Engine
  if (/AppleWebKit\/(\d[\d.]*)/.test(ua)) {
    result.engine.name = 'WebKit/Blink'; result.engine.version = ua.match(/AppleWebKit\/(\d[\d.]*)/)[1];
  } else if (/Gecko\/(\d[\d.]*)/.test(ua)) {
    result.engine.name = 'Gecko'; result.engine.version = ua.match(/Gecko\/(\d[\d.]*)/)[1];
  } else if (/Trident\/(\d[\d.]*)/.test(ua)) {
    result.engine.name = 'Trident'; result.engine.version = ua.match(/Trident\/(\d[\d.]*)/)[1];
  }

  // Device type
  if (/Mobile|Android.*Mobile|iPhone/.test(ua)) result.device.type = 'mobile';
  else if (/iPad|Tablet/.test(ua)) result.device.type = 'tablet';
  else if (/bot|crawl|spider|curl|wget|python|java|httpclient/i.test(ua)) result.device.type = 'bot';
  else result.device.type = 'desktop';

  if (/iPhone/.test(ua)) result.device.brand = 'Apple';
  else if (/iPad/.test(ua)) result.device.brand = 'Apple';
  else if (/Samsung|SM-|Galaxy/.test(ua)) result.device.brand = 'Samsung';
  else if (/Pixel/.test(ua)) result.device.brand = 'Google';

  return result;
}

function getBrowserIcon(name) {
  if (name.includes('Chrome')) return '🌐';
  if (name.includes('Firefox')) return '🦊';
  if (name.includes('Safari')) return '🧭';
  if (name.includes('Edge')) return '🔷';
  if (name.includes('Opera')) return '🔴';
  if (name.includes('Explorer')) return '⚙️';
  return '💻';
}

function getOsIcon(name) {
  if (name.includes('Windows')) return '🪟';
  if (name.includes('macOS')) return '🍎';
  if (name.includes('Android')) return '🤖';
  if (name.includes('iOS') || name.includes('iPadOS')) return '📱';
  if (name.includes('Linux')) return '🐧';
  if (name.includes('Chrome OS')) return '💻';
  return '💻';
}

function getDeviceIcon(type) {
  if (type === 'mobile') return '📱';
  if (type === 'tablet') return '📟';
  if (type === 'bot') return '🤖';
  return '🖥️';
}

function doParse() {
  const ua = $('#input').value.trim();
  if (!ua) return;
  const r = parseUA(ua);
  const typeLabel = {mobile: t('mobile'), desktop: t('desktop'), tablet: t('tablet'), bot: t('bot')};
  const cards = [
    { icon: getBrowserIcon(r.browser.name), label: t('browser'), value: (r.browser.name || t('unknown')) + (r.browser.version ? ` ${r.browser.version}` : '') },
    { icon: getOsIcon(r.os.name), label: t('os'), value: (r.os.name || t('unknown')) + (r.os.version ? ` ${r.os.version}` : '') },
    { icon: getDeviceIcon(r.device.type), label: t('device'), value: (typeLabel[r.device.type] || t('unknown')) + (r.device.brand ? ` (${r.device.brand})` : '') },
    { icon: '⚙️', label: t('engine'), value: (r.engine.name || t('unknown')) + (r.engine.version ? ` ${r.engine.version}` : '') },
  ];
  let html = '<div class="ua-grid">';
  for (const c of cards) {
    html += `<div class="ua-card"><div class="icon">${c.icon}</div><div class="label">${c.label}</div><div class="value">${c.value}</div></div>`;
  }
  html += '</div>';
  html += `<div class="ua-raw"><div class="label">${t('rawString')}</div><pre>${ua.replace(/</g,'&lt;')}</pre></div>`;
  $('#result').innerHTML = html;
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="doParse()">${t('parse')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#input').value=navigator.userAgent;doParse()">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="copyText($('#input').value)">${t('copy')}</button>`;

$('#input').value = navigator.userAgent;
doParse();
