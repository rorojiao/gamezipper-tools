<script>
GZI18n.register({
  en: {
    toolTitle: 'Twitter / X Bio Generator',
    toolDesc: 'Create catchy Twitter / X bios with emojis and line breaks. Pick a style, personalize with your name, and copy.',
    lblStyle: 'Choose a Style',
    lblName: 'Your Name / Handle',
    styleFunny: '😂 Funny',
    styleProfessional: '💼 Professional',
    styleAesthetic: '✨ Aesthetic',
    styleMinimal: '🤍 Minimal',
    styleCreative: '🎨 Creative',
    styleMotivational: '💪 Motivational',
    charCount: 'chars',
    step1: 'Select a bio style template above',
    step2: 'Enter your name or handle for personalization',
    step3: 'Edit the bio text — keep it under 160 characters',
    step4: 'Copy the bio and paste it into your Twitter / X profile',
  },
  zh: {
    toolTitle: 'Twitter / X 简介生成器',
    toolDesc: '创建引人注目的 Twitter / X 个人简介，支持 Emoji 和换行。选择风格，输入名字个性化，一键复制。',
    lblStyle: '选择风格',
    lblName: '你的名字 / 用户名',
    styleFunny: '😂 搞笑',
    styleProfessional: '💼 专业',
    styleAesthetic: '✨ 唯美',
    styleMinimal: '🤍 极简',
    styleCreative: '🎨 创意',
    styleMotivational: '💪 励志',
    charCount: '字符',
    step1: '从上方选择一个简介风格模板',
    step2: '输入你的名字或用户名以个性化',
    step3: '编辑简介文本 — 保持在 160 字符以内',
    step4: '复制简介并粘贴到你的 Twitter / X 个人资料中',
  }
});

const { $, copyText, t } = GZ;

const templates = {
  funny: [
    '🥔 professional overthinker\n☕ fueled by caffeine & chaos\n📍 {name}\n💀 will tweet for snacks',
    '🧠 90% anxiety, 10% memes\n📺 binge-watcher & truth-teller\n🤪 {name}\n🌧️ emotionally compromised',
    '🍕 pizza enthusiast 🍕\n😴 napping champion\n😂 {name}\n👀 watching the world burn (slowly)',
  ],
  professional: [
    '💼 {name} | Founder & CEO\n📈 helping brands grow online\n🔗 link below 👇\n📩 DM for collabs',
    '🎯 {name} — Marketing & Growth\n✍️ writing about [your niche]\n🚀 building in public\n👇 latest project',
    '💡 {name} | [Your Role]\n📊 sharing insights on [topic]\n🌍 worldwide / remote\n📩 hello@{name}.com',
  ],
  aesthetic: [
    '🌙 soft soul, sharp mind\n📖 reader. writer. dreamer.\n✨ {name}\n🎧 currently: [song]',
    '🌸 romanticizing my life\n🦋 becoming, slowly\n💫 {name}\n📷 capturing moments',
    '🍃 calm, collected, creating\n🤍 {name}\n🎞 film & film\n🎧 on repeat',
  ],
  minimal: [
    '{name}\n📍 earth\n✨',
    '{name} | she/her\n🔗 link below',
    '{name}\n🤍\n🌐',
  ],
  creative: [
    '🎨 maker of things\n📝 {name} — storyteller\n🎬 in love with cinema\n🌈 spreading color',
    '✏️ words are my weapon\n🎭 {name}\n🎪 here for the chaos\n🌟 dreams > reality',
    '🪄 idea alchemist\n🎬 {name} | director of my own life\n🎶 sound on\n🌈 creating daily',
  ],
  motivational: [
    '💪 building my dreams daily\n🔥 {name}\n📈 progress > perfection\n⭐ the best is coming',
    '🌟 dream chaser. risk taker.\n🎯 {name}\n🚀 forward, always.\n💙 keep going.',
    '🏔️ climbing my own mountain\n💪 {name}\n✨ become unshakeable\n💡 mindset is everything',
  ],
};

const styles = [
  {key:'funny', icon:'styleFunny'},
  {key:'professional', icon:'styleProfessional'},
  {key:'aesthetic', icon:'styleAesthetic'},
  {key:'minimal', icon:'styleMinimal'},
  {key:'creative', icon:'styleCreative'},
  {key:'motivational', icon:'styleMotivational'},
];

let currentStyle = 'funny';

function buildTemplates() {
  const container = $('#templates');
  container.innerHTML = '';
  styles.forEach(s => {
    const btn = document.createElement('div');
    btn.className = 'bio-tpl' + (s.key === currentStyle ? ' active' : '');
    btn.textContent = t(s.icon);
    btn.onclick = () => { currentStyle = s.key; loadTemplate(); buildTemplates(); };
    container.appendChild(btn);
  });
}

function loadTemplate() {
  const list = templates[currentStyle] || templates.funny;
  const tpl = list[Math.floor(Math.random() * list.length)];
  const name = $('#nameInput').value || '{name}';
  $('#input').value = tpl.replace(/\{name\}/g, name);
  updatePreview();
}

function updatePreview() {
  const text = $('#input').value;
  $('#preview').textContent = text;
  // Twitter counts most emojis as 2 chars; approximate with code-point-aware length weighting surrogate pairs
  let count = 0;
  for (const ch of text) count += ch.codePointAt(0) > 0xFFFF ? 2 : 1;
  const el = $('#charCount');
  el.textContent = count + ' / 160 ' + t('charCount');
  el.classList.toggle('over', count > 160);
}

$('#input').addEventListener('input', updatePreview);
$('#nameInput').addEventListener('input', () => {
  const name = $('#nameInput').value || '{name}';
  const list = templates[currentStyle] || templates.funny;
  const tpl = list[Math.floor(Math.random() * list.length)];
  $('#input').value = tpl.replace(/\{name\}/g, name);
  updatePreview();
});

buildTemplates();
loadTemplate();

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="loadTemplate()">🔄 Generate New</button>
  <button class="gz-btn" onclick="copyText($('#input').value)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#input').value='';updatePreview()">${t('clear')}</button>`;

GZ.renderToolPage({
  category: 'social',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📸', href:'/social/instagram-bio.html', name:'Instagram Bio'},
    {icon:'💼', href:'/social/linkedin-bio.html', name:'LinkedIn Bio'},
    {icon:'🐦', href:'/text/twitter-counter.html', name:'Twitter Counter'},
    {icon:'😊', href:'/text/emoji-picker.html', name:'Emoji Picker'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
