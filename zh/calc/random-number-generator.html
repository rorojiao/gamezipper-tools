<style>
.rng-form{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:16px 0}
.rng-form label{display:flex;flex-direction:column;gap:4px;font-size:.85em;color:var(--text2,#aaa)}
.rng-form input,.rng-form select{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px;background:var(--glass2);color:var(--text);font-size:1em}
.rng-form .full{grid-column:1/-1}
.rng-toggle{display:flex;align-items:center;gap:8px;font-size:.9em;color:var(--text2);margin:4px 0}

.rng-die{font-size:5em;font-weight:900;color:var(--accent);font-variant-numeric:tabular-nums;letter-spacing:-.03em;line-height:1;min-height:1.2em;word-break:break-all}
.rng-list{background:var(--glass2);border:1px solid var(--border);border-radius:10px;padding:14px;margin:14px 0;max-height:260px;overflow:auto;font-family:monospace;line-height:1.8;word-break:break-all}
.rng-list .chip{display:inline-block;background:var(--glass);border:1px solid var(--border);border-radius:6px;padding:2px 10px;margin:2px;font-size:.95em}
.rng-history{font-size:.8em;color:var(--text2);margin-top:8px}
.rng-dice{display:grid;grid-template-columns:repeat(auto-fit,minmax(80px,1fr));gap:10px;margin:14px 0}
.rng-die-btn{background:var(--glass2);border:1px solid var(--border);border-radius:10px;padding:14px;cursor:pointer;transition:.2s;font-size:.9em}
.rng-die-btn:hover{background:var(--glass);transform:translateY(-2px)}
.rng-die-btn .d-icon{font-size:2em;display:block;margin-bottom:4px}
.rng-die-btn .d-val{font-size:1.4em;font-weight:700;color:var(--accent)}
@media(max-width:600px){.rng-form{grid-template-columns:1fr}.rng-die{font-size:3.5em}}
</style>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="rng-form">
      <label><span id="lblMin"></span><input type="number" id="min" value="1"></label>
      <label><span id="lblMax"></span><input type="number" id="max" value="100"></label>
      <label><span id="lblCount"></span><input type="number" id="count" value="1" min="1" max="1000"></label>
      <label><span id="lblSort"></span>
        <select id="sort">
          <option value="none"></option>
          <option value="asc" selected></option>
          <option value="desc"></option>
        </select>
      </label>
      <div class="rng-toggle full"><input type="checkbox" id="unique"> <span id="lblUnique"></span></div>
    </div>
    <div class="rng-main">
      <div class="rng-die" id="mainDisplay">—</div>
      <div class="rng-history" id="history"></div>
    </div>
    <div class="rng-list" id="list" style="display:none"></div>
    <h3 style="text-align:center;margin:24px 0 8px" id="diceTitle"></h3>
    <div class="rng-dice">
      <button class="rng-die-btn" onclick="rollDice(4)"><span class="d-icon">🎲</span><div class="d-val">d4</div></button>
      <button class="rng-die-btn" onclick="rollDice(6)"><span class="d-icon">🎲</span><div class="d-val">d6</div></button>
      <button class="rng-die-btn" onclick="rollDice(8)"><span class="d-icon">🎲</span><div class="d-val">d8</div></button>
      <button class="rng-die-btn" onclick="rollDice(10)"><span class="d-icon">🎲</span><div class="d-val">d10</div></button>
      <button class="rng-die-btn" onclick="rollDice(12)"><span class="d-icon">🎲</span><div class="d-val">d12</div></button>
      <button class="rng-die-btn" onclick="rollDice(20)"><span class="d-icon">🎲</span><div class="d-val">d20</div></button>
      <button class="rng-die-btn" onclick="rollDice(100)"><span class="d-icon">🎲</span><div class="d-val">d100</div></button>
      <button class="rng-die-btn" onclick="rollDice(2)"><span class="d-icon">🪙</span><div class="d-val" id="coinLbl">Coin</div></button>
    </div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Random Number Generator',
    toolDesc: 'Generate one or many random numbers in any range, with optional no-repeats, sorting and quick dice rolls.',
    lblMin: 'Minimum', lblMax: 'Maximum', lblCount: 'How many numbers',
    lblSort: 'Sort results',
    sortNone: 'No sorting',
    sortAsc: 'Ascending (low to high)',
    sortDesc: 'Descending (high to low)',
    lblUnique: 'No duplicates (each value appears once)',
    generate: 'Generate', copy: 'Copy', clear: 'Clear', copied: 'Copied!',
    diceTitle: 'Quick Dice Rolls',
    coinLbl: 'Coin Flip',
    coinHeads: 'HEADS',
    coinTails: 'TAILS',
    errRange: 'Min must be less than or equal to Max',
    errUnique: 'Cannot generate %d unique numbers in range of %d',
    step1: 'Set the minimum and maximum range for your numbers',
    step2: 'Choose how many numbers to generate (1 to 1000)',
    step3: 'Optionally enable no-duplicates and sorting',
    step4: 'Click Generate or roll a standard die',
  },
  zh: {
    toolTitle: '随机数生成器',
    toolDesc: '在任意范围内生成一个或多个随机数，可选不重复、排序和快速骰子投掷。',
    lblMin: '最小值', lblMax: '最大值', lblCount: '生成数量',
    lblSort: '排序方式',
    sortNone: '不排序',
    sortAsc: '升序（从小到大）',
    sortDesc: '降序（从大到小）',
    lblUnique: '不重复（每个值仅出现一次）',
    generate: '生成', copy: '复制', clear: '清空', copied: '已复制！',
    diceTitle: '快速骰子',
    coinLbl: '硬币',
    coinHeads: '正面',
    coinTails: '反面',
    errRange: '最小值必须小于或等于最大值',
    errUnique: '无法在 %d 的范围内生成 %d 个不重复的数',
    step1: '设置随机数的最小值和最大值',
    step2: '选择要生成的数量（1-1000）',
    step3: '可选择开启「不重复」和排序',
    step4: '点击「生成」或选择标准骰子投掷',
  }
});

const { $, t, showToast, copyText } = GZ;
let lastResults = [];

function secureRandInt(min, max) {
  // crypto-strong
  const range = max - min + 1;
  const maxUint = 0xFFFFFFFF;
  const limit = Math.floor(maxUint / range) * range;
  const buf = new Uint32Array(1);
  let n;
  do { crypto.getRandomValues(buf); n = buf[0]; } while (n >= limit);
  return min + (n % range);
}

function rollDice(sides) {
  if (sides === 2) {
    const v = secureRandInt(0,1);
    $('#mainDisplay').textContent = v ? t('coinHeads') : t('coinTails');
    $('#history').textContent = '🎲 d2 → ' + (v ? t('coinHeads') : t('coinTails'));
    return;
  }
  const v = secureRandInt(1, sides);
  $('#mainDisplay').textContent = v;
  $('#history').textContent = '🎲 d' + sides + ' → ' + v;
}

function generate() {
  const min = parseInt($('#min').value);
  const max = parseInt($('#max').value);
  const count = Math.max(1, Math.min(1000, parseInt($('#count').value) || 1));
  const unique = $('#unique').checked;
  const sort = $('#sort').value;
  if (isNaN(min) || isNaN(max)) { showToast(t('errRange')); return; }
  if (min > max) { showToast(t('errRange')); return; }
  if (unique && count > (max - min + 1)) {
    showToast(t('errUnique').replace('%d', count).replace('%d', max - min + 1));
    return;
  }
  const set = new Set();
  const results = [];
  let attempts = 0;
  while (results.length < count && attempts < count * 100) {
    if (unique) {
      let v;
      do { v = secureRandInt(min, max); } while (set.has(v));
      set.add(v); results.push(v);
    } else {
      results.push(secureRandInt(min, max));
    }
    attempts++;
  }
  if (sort === 'asc') results.sort((a,b)=>a-b);
  else if (sort === 'desc') results.sort((a,b)=>b-a);
  lastResults = results;
  if (count === 1) {
    $('#mainDisplay').textContent = results[0];
    $('#list').style.display = 'none';
  } else {
    $('#mainDisplay').textContent = count + ' ' + (count === 1 ? 'number' : 'numbers');
    $('#list').style.display = 'block';
    $('#list').innerHTML = results.map(v => `<span class="chip">${v}</span>`).join('');
  }
  $('#history').textContent = `[${min}, ${max}] × ${count}${unique ? ' (unique)' : ''}`;
}

$('#lblMin').textContent = t('lblMin');
$('#lblMax').textContent = t('lblMax');
$('#lblCount').textContent = t('lblCount');
$('#lblSort').textContent = t('lblSort');
$('#lblUnique').textContent = t('lblUnique');
$('#sort').innerHTML = `<option value="none">${t('sortNone')}</option><option value="asc" selected>${t('sortAsc')}</option><option value="desc">${t('sortDesc')}</option>`;
$('#diceTitle').textContent = t('diceTitle');
$('#coinLbl').textContent = t('coinLbl');

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="generate()">${t('generate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="copyText(lastResults.join(', '))">${t('copy')}</button>`;

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🎲', href:'/fun/reaction-time.html', name:'Reaction Time'},
    {icon:'🎰', href:'/convert/randomizer.html', name:'Random Picker'},
    {icon:'🎨', href:'/color/random-color.html', name:'Random Color'},
    {icon:'🪙', href:'/convert/number-base.html', name:'Number Base'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
