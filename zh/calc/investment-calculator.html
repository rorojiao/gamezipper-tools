<script>
GZI18n.register({
  en: {
    toolTitle: 'Investment Calculator',
    toolDesc: 'Calculate investment growth with compound interest, regular contributions and year-by-year breakdown.',
    initial: 'Initial Investment ($)',
    monthly: 'Monthly Contribution ($)',
    annualRate: 'Annual Return Rate (%)',
    years: 'Investment Period (Years)',
    compoundFreq: 'Compounding Frequency',
    calculate: 'Calculate',
    futureValue: 'Future Value',
    totalContrib: 'Total Contributions',
    totalInterest: 'Total Interest Earned',
    growthPct: 'Total Growth',
    year: 'Year',
    contributions: 'Contributions',
    interest: 'Interest Earned',
    balance: 'Balance',
    step1: 'Enter your initial investment amount',
    step2: 'Set monthly contribution and expected annual return',
    step3: 'Choose investment period and compounding frequency',
    step4: 'Click Calculate to see growth chart and year-by-year breakdown',
  },
  zh: {
    toolTitle: '投资计算器',
    toolDesc: '使用复利计算投资增长，支持定期投入和逐年明细分析。',
    initial: '初始投资金额（¥）',
    monthly: '每月定投金额（¥）',
    annualRate: '预期年化收益率（%）',
    years: '投资期限（年）',
    compoundFreq: '复利频率',
    calculate: '计算',
    futureValue: '未来价值',
    totalContrib: '总投入金额',
    totalInterest: '总收益',
    growthPct: '总增长率',
    year: '年份',
    contributions: '累计投入',
    interest: '累计收益',
    balance: '账户余额',
    step1: '输入初始投资金额',
    step2: '设置每月定投金额和预期年化收益率',
    step3: '选择投资期限和复利频率',
    step4: '点击「计算」查看增长图表和逐年明细',
  }
});

const { $, t } = GZ;
const fmt = (n) => {
  const lang = GZI18n.getLang();
  return new Intl.NumberFormat(lang === 'zh' ? 'zh-CN' : 'en-US', { style: 'currency', currency: lang === 'zh' ? 'CNY' : 'USD', minimumFractionDigits: 0, maximumFractionDigits: 0 }).format(n);
};
const fmtPct = (n) => n.toFixed(1) + '%';

function calculate() {
  const P = parseFloat($('#initial').value) || 0;
  const M = parseFloat($('#monthly').value) || 0;
  const r = (parseFloat($('#rate').value) || 0) / 100;
  const Y = parseInt($('#years').value) || 1;
  const n = parseInt($('#compound').value) || 12;
  
  const yearlyData = [];
  let balance = P;
  let totalContrib = P;
  
  for (let y = 1; y <= Y; y++) {
    const startBalance = balance;
    // Monthly contributions + compound growth
    for (let m = 1; m <= 12; m++) {
      balance += M;
      totalContrib += M;
      // Apply compound interest each compounding period
      const periodsPerMonth = n / 12;
      if (periodsPerMonth >= 1) {
        for (let p = 0; p < Math.floor(periodsPerMonth); p++) {
          balance *= (1 + r / n);
        }
      } else {
        // Less than once per month, apply proportionally
        balance *= (1 + r / n);
      }
    }
    const interest = balance - totalContrib;
    yearlyData.push({
      year: y,
      contributions: totalContrib,
      interest: Math.max(0, interest),
      balance: balance,
    });
  }
  
  // Display results
  $('#results').style.display = 'block';
  $('#r-future').textContent = fmt(balance);
  $('#r-future-lbl').textContent = t('futureValue');
  $('#r-contrib').textContent = fmt(totalContrib);
  $('#r-contrib-lbl').textContent = t('totalContrib');
  const interest = balance - totalContrib;
  $('#r-interest').textContent = fmt(interest);
  $('#r-interest-lbl').textContent = t('totalInterest');
  $('#r-growth').textContent = fmtPct(totalContrib > 0 ? (interest / totalContrib) * 100 : 0);
  $('#r-growth-lbl').textContent = t('growthPct');
  
  // Table headers
  $('#th-year').textContent = t('year');
  $('#th-contrib').textContent = t('contributions');
  $('#th-interest').textContent = t('interest');
  $('#th-balance').textContent = t('balance');
  
  // Table body
  let html = '';
  yearlyData.forEach(d => {
    html += `<tr><td>${d.year}</td><td>${fmt(d.contributions)}</td><td>${fmt(d.interest)}</td><td><strong>${fmt(d.balance)}</strong></td></tr>`;
  });
  $('#tbody').innerHTML = html;
  
  // Simple bar chart
  drawChart(yearlyData, totalContrib);
}

function drawChart(data, totalContrib) {
  const canvas = $('#chart');
  const ctx = canvas.getContext('2d');
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width * 2;
  canvas.height = rect.height * 2;
  ctx.scale(2, 2);
  const W = rect.width;
  const H = rect.height;
  
  ctx.clearRect(0, 0, W, H);
  
  if (data.length === 0) return;
  
  const maxVal = Math.max(...data.map(d => d.balance));
  const padL = 60, padR = 20, padT = 20, padB = 40;
  const chartW = W - padL - padR;
  const chartH = H - padT - padB;
  
  // Grid lines
  ctx.strokeStyle = 'rgba(255,255,255,.1)';
  ctx.lineWidth = 0.5;
  for (let i = 0; i <= 4; i++) {
    const y = padT + (chartH * i / 4);
    ctx.beginPath(); ctx.moveTo(padL, y); ctx.lineTo(W - padR, y); ctx.stroke();
    ctx.fillStyle = 'rgba(255,255,255,.4)';
    ctx.font = '10px sans-serif';
    ctx.textAlign = 'right';
    ctx.fillText(fmt(maxVal * (4 - i) / 4), padL - 6, y + 4);
  }
  
  const barW = Math.max(2, chartW / data.length - 2);
  
  data.forEach((d, i) => {
    const x = padL + (i / data.length) * chartW + 1;
    const contribH = (d.contributions / maxVal) * chartH;
    const totalH = (d.balance / maxVal) * chartH;
    
    // Contributions (bottom)
    ctx.fillStyle = 'rgba(78,205,196,.6)';
    ctx.fillRect(x, padT + chartH - contribH, barW, contribH);
    
    // Interest (top of contributions)
    ctx.fillStyle = 'rgba(233,69,96,.6)';
    ctx.fillRect(x, padT + chartH - totalH, barW, totalH - contribH);
    
    // Year label (every 5 years or last)
    if (d.year % 5 === 0 || d.year === data.length) {
      ctx.fillStyle = 'rgba(255,255,255,.5)';
      ctx.font = '10px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(d.year, x + barW / 2, H - padB + 16);
    }
  });
  
  // Legend
  ctx.fillStyle = 'rgba(78,205,196,.6)';
  ctx.fillRect(W - 140, 8, 10, 10);
  ctx.fillStyle = 'rgba(255,255,255,.5)';
  ctx.font = '10px sans-serif';
  ctx.fillText('Contributions', W - 125, 17);
  ctx.fillStyle = 'rgba(233,69,96,.6)';
  ctx.fillRect(W - 140, 22, 10, 10);
  ctx.fillStyle = 'rgba(255,255,255,.5)';
  ctx.fillText('Interest', W - 125, 31);
}

// Set labels
$('#lbl-initial').textContent = t('initial');
$('#lbl-monthly').textContent = t('monthly');
$('#lbl-rate').textContent = t('annualRate');
$('#lbl-years').textContent = t('years');
$('#lbl-compound').textContent = t('compoundFreq');

$('#toolbar').innerHTML = `<button class="gz-btn" onclick="calculate()">${t('calculate')}</button>`;

// Auto-calculate on input change
['initial','monthly','rate','years','compound'].forEach(id => {
  $('#' + id).addEventListener('input', calculate);
});

// Initial calc
calculate();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📈', href:'/calc/compound-interest.html', name:'Compound Interest'},
    {icon:'💰', href:'/calc/roi.html', name:'ROI Calculator'},
    {icon:'🏖️', href:'/calc/retirement-calculator.html', name:'Retirement'},
    {icon:'🏦', href:'/calc/loan-calculator.html', name:'Loan Calculator'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
