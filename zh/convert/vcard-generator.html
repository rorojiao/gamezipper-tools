    step3: '点击「生成」构建并预览 .vcf 文本',
    step4: '点击「下载 .vcf」并导入到通讯录应用',
  }
});

const { $, copyText, t } = GZ;

// Localize field labels
document.querySelectorAll('[data-fn]').forEach(e => e.textContent = t('fn'));
document.querySelectorAll('[data-gn]').forEach(e => e.textContent = t('gn'));
document.querySelectorAll('[data-fa]').forEach(e => e.textContent = t('fa'));
document.querySelectorAll('[data-org]').forEach(e => e.textContent = t('org'));
document.querySelectorAll('[data-title]').forEach(e => e.textContent = t('title'));
document.querySelectorAll('[data-tel]').forEach(e => e.textContent = t('tel'));
document.querySelectorAll('[data-mobile]').forEach(e => e.textContent = t('mobile'));
document.querySelectorAll('[data-email]').forEach(e => e.textContent = t('email'));
document.querySelectorAll('[data-url]').forEach(e => e.textContent = t('url'));
document.querySelectorAll('[data-version]').forEach(e => e.textContent = t('version'));
document.querySelectorAll('[data-addr]').forEach(e => e.textContent = t('addr'));
document.querySelectorAll('[data-note]').forEach(e => e.textContent = t('note'));

// vCard line folding (max 75 octets per line per spec)
function fold(line) {
  if (line.length <= 75) return line;
  const out = [line.slice(0, 75)];
  let rest = line.slice(75);
  while (rest.length) { out.push(' ' + rest.slice(0, 74)); rest = rest.slice(74); }
  return out.join('\r\n');
}

function escapeVcard(s) {
  return String(s).replace(/\\/g,'\\\\').replace(/\n/g,'\\n').replace(/,/g,'\\,').replace(/;/g,'\\;');
}

function buildVcard() {
  const v = $('#f-version').value;
  const fn = $('#f-fn').value.trim();
  const given = $('#f-given').value.trim();
  const family = $('#f-family').value.trim();
  if (!fn && !given && !family) return null;

  const lines = [];
  lines.push('BEGIN:VCARD');
  lines.push('VERSION:' + v);

  const dispName = fn || ((given || family) ? `${given} ${family}`.trim() : '');
  if (v === '4.0') lines.push(fold('FN:' + escapeVcard(dispName)));
  else lines.push(fold('FN:' + escapeVcard(dispName)));

  // N: family;given;additional;prefix;suffix
  const nVal = [family, given, '', '', ''].map(escapeVcard).join(';');
  lines.push(fold('N:' + nVal));

  if ($('#f-org').value.trim()) lines.push(fold('ORG:' + escapeVcard($('#f-org').value.trim())));
  if ($('#f-title').value.trim()) lines.push(fold('TITLE:' + escapeVcard($('#f-title').value.trim())));

  const telType = v === '4.0' ? 'TEL;TYPE=work,voice' : 'TEL;TYPE=WORK,VOICE';
  const mobileType = v === '4.0' ? 'TEL;TYPE=cell' : 'TEL;TYPE=CELL';
  if ($('#f-tel').value.trim()) lines.push(fold(telType + ':' + $('#f-tel').value.trim()));
  if ($('#f-mobile').value.trim()) lines.push(fold(mobileType + ':' + $('#f-mobile').value.trim()));

  const emailType = v === '4.0' ? 'EMAIL;TYPE=work' : 'EMAIL;TYPE=WORK';
  if ($('#f-email').value.trim()) lines.push(fold(emailType + ':' + $('#f-email').value.trim()));

  if ($('#f-url').value.trim()) lines.push(fold('URL:' + $('#f-url').value.trim()));

  const addr = $('#f-addr').value.trim();
  if (addr) {
    // Split into lines: po-box; extended; street; city; region; postal; country
    const a = addr.split(/\n/).map(s => s.trim());
    const padded = [];
    for (let i = 0; i < 7; i++) padded.push(escapeVcard(a[i] || ''));
    // Common interpretation: street, city, region, postal, country
    const adrFields = ['', '', padded[0] || '', padded[1] || '', padded[2] || '', padded[3] || '', padded[4] || ''];
    lines.push(fold('ADR;TYPE=work:' + adrFields.join(';')));
  }

  if ($('#f-note').value.trim()) lines.push(fold('NOTE:' + escapeVcard($('#f-note').value.trim())));

  lines.push(fold('REV:' + new Date().toISOString().replace(/[-:]/g,'').split('.')[0] + 'Z'));
  lines.push('END:VCARD');

  return lines.join('\r\n');
}

let lastVcf = '';

function doGenerate() {
  const vcf = buildVcard();
  if (!vcf) {
    $('#status').innerHTML = '<span style="color:var(--gz-accent)">' + t('empty') + '</span>';
    $('#output').textContent = '';
    lastVcf = '';
    return;
  }
  lastVcf = vcf;
  $('#output').textContent = vcf;
  $('#status').innerHTML = '<span style="color:var(--gz-success)">' + t('valid').replace('%1', vcf.length) + '</span>';
}

function downloadFile(filename, content, mime) {
  const blob = new Blob([content], { type: mime });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 100);
}

function doDownload() {
  if (!lastVcf) doGenerate();
  if (!lastVcf) return;
  const name = ($('#f-family').value.trim() || $('#f-fn').value.trim() || 'contact').replace(/[^a-z0-9_-]+/gi, '_');
  downloadFile(name + '.vcf', lastVcf, 'text/vcard;charset=utf-8');
}

function loadExample() {
  $('#f-fn').value = 'Alice Johnson';
  $('#f-given').value = 'Alice';
  $('#f-family').value = 'Johnson';
  $('#f-org').value = 'Acme Inc.';
  $('#f-title').value = 'Product Manager';
  $('#f-tel').value = '+1 555 123 4567';
  $('#f-mobile').value = '+1 555 987 6543';
  $('#f-email').value = 'alice@example.com';
  $('#f-url').value = 'https://example.com';
  $('#f-addr').value = '123 Main St\nSpringfield\nCA\n90210\nUSA';
  $('#f-note').value = 'Met at conference 2025.';
  doGenerate();
}

function doClear() {
  ['f-fn','f-given','f-family','f-org','f-title','f-tel','f-mobile','f-email','f-url','f-addr','f-note'].forEach(id => $('#' + id).value = '');
  $('#output').textContent = ''; $('#status').textContent = ''; lastVcf = '';
}

// Live update on input
document.querySelectorAll('input[id^="f-"], textarea[id^="f-"], #f-version').forEach(el => el.addEventListener('input', doGenerate));

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="doGenerate()">${t('generate')}</button>
  <button class="gz-btn" onclick="doDownload()">⬇ ${t('download')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn" onclick="copyText(lastVcf)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

    {icon:'📇', href:'/convert/qrcode.html', name:'QR Code Generator'},
    
  ]
});
</script>
