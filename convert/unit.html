<script type="application/ld+json">{"@context":"https://schema.org","@type":"WebApplication","name":"Unit Converter","description":"Convert length, weight, temperature, volume and more measurement units. Free online unit converter — accurate conversions across 50+ units.","url":"https://tools.gamezipper.com/convert/unit.html","applicationCategory":"Utility","operatingSystem":"Web Browser","offers":{"@type":"Offer","price":"0"}}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header"><h1 id="title"></h1><p class="desc" id="desc"></p></div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="cat-tabs" id="cats"></div>
    <div class="conv-row">
      <input type="number" id="valA" value="1" oninput="calc('a')">
      <select id="unitA" onchange="calc('a')"></select>
      <span style="color:var(--text2);font-size:1.2rem">⇄</span>
      <input type="number" id="valB" oninput="calc('b')">
      <select id="unitB" onchange="calc('a')"></select>
    </div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en:{toolTitle:'Unit Converter',toolDesc:'Convert between units of length, weight, temperature, area, volume and speed.',
    length:'Length',weight:'Weight',temperature:'Temperature',area:'Area',volume:'Volume',speed:'Speed',
    step1:'Select a category (length, weight, etc.)',step2:'Enter a value and choose units on both sides',step3:'Conversion happens instantly in real-time'},
  zh:{toolTitle:'单位换算',toolDesc:'长度、重量、温度、面积、体积和速度单位互转。',
    length:'长度',weight:'重量',temperature:'温度',area:'面积',volume:'体积',speed:'速度',
    step1:'选择类别（长度、重量等）',step2:'输入数值并选择两边的单位',step3:'实时自动换算'}
});
const {$,t}=GZ;
const units={
  length:{m:1,km:1000,cm:0.01,mm:0.001,mi:1609.344,yd:0.9144,ft:0.3048,in:0.0254},
  weight:{kg:1,g:0.001,mg:1e-6,lb:0.453592,oz:0.0283495,t:1000},
  temperature:{_special:true,units:['°C','°F','K']},
  area:{m2:1,km2:1e6,cm2:1e-4,ha:1e4,acre:4046.86,ft2:0.092903,in2:6.4516e-4},
  volume:{L:1,mL:0.001,m3:1000,gal:3.78541,qt:0.946353,cup:0.236588,fl_oz:0.0295735},
  speed:{mps:1,kph:0.277778,mph:0.44704,kn:0.514444,fps:0.3048},
};
let cat='length';
function setCategory(c){
  cat=c;
  document.querySelectorAll('.cat-tab').forEach(b=>b.classList.toggle('active',b.dataset.c===c));
  const u=units[c];
  const opts=u._special?u.units:Object.keys(u);
  const html=opts.map(k=>`<option value="${k}">${k}</option>`).join('');
  $('#unitA').innerHTML=html;$('#unitB').innerHTML=html;
  if(opts.length>1)$('#unitB').selectedIndex=1;
  calc('a');
}
function calc(from){
  const u=units[cat];
  if(u._special){// temperature
    const va=+$('#valA').value,vb=+$('#valB').value;
    const fa=$('#unitA').value,fb=$('#unitB').value;
    function toC(v,u){return u==='°C'?v:u==='°F'?(v-32)*5/9:v-273.15;}
    function fromC(v,u){return u==='°C'?v:u==='°F'?v*9/5+32:v+273.15;}
    if(from==='a'){$('#valB').value=+fromC(toC(va,fa),fb).toFixed(6);}
    else{$('#valA').value=+fromC(toC(vb,fb),fa).toFixed(6);}
  }else{
    const fa=$('#unitA').value,fb=$('#unitB').value;
    if(from==='a'){const base=+$('#valA').value*u[fa];$('#valB').value=+(base/u[fb]).toFixed(6);}
    else{const base=+$('#valB').value*u[fb];$('#valA').value=+(base/u[fa]).toFixed(6);}
  }
}
const cats=['length','weight','temperature','area','volume','speed'];
$('#cats').innerHTML=cats.map(c=>`<button class="cat-tab" data-c="${c}" onclick="setCategory('${c}')">${t(c)}</button>`).join('');
function loadExample(){setCategory('length');$('#valA').value=1;$('#unitA').value='mi';$('#unitB').value='km';calc('a');}
$('#toolbar').innerHTML=`<button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>`;
setCategory('length');
GZ.renderToolPage({category:'convert',titleKey:'toolTitle',descKey:'toolDesc',howToSteps:['step1','step2','step3'],related:[
  {icon:'🔢',href:'/convert/number-base.html',name:'Number Base'},
  {icon:'🎨',href:'/convert/color.html',name:'Color Converter'},
  {icon:'📱',href:'/convert/qrcode.html',name:'QR Code'},
]});
</script>

</body>
</html>
