<script>
GZI18n.register({
  en: {
    toolTitle: 'AI Cover Letter Generator',
    toolDesc: 'Generate a polished cover letter in seconds. Enter the job, company and your strengths — pick tone and length, then copy or download as PDF.',
    lblOutput: 'Your Cover Letter',
    yourName: 'Your name',
    jobTitle: 'Job title',
    company: 'Company name',
    skills: 'Your top skills / experience',
    experience: 'Years of experience',
    tone: 'Tone',
    length: 'Length',
    generate: '✨ Generate',
    copy: '📋 Copy',
    pdf: '📄 PDF',
    clear: '🗑 Clear',
    step1: 'Enter your name, the job title and the company',
    step2: 'Add your top skills and years of experience',
    step3: 'Choose a tone (professional, enthusiastic, concise, formal)',
    step4: 'Click Generate, then Copy or Download as PDF',
    tones: { professional:'Professional', enthusiastic:'Enthusiastic', concise:'Concise', formal:'Formal' },
    lengths: { short:'Short (1 ¶)', medium:'Medium (3 ¶)', long:'Detailed (4+ ¶)' },
    placeholders: {
      skills: 'e.g. React, TypeScript, 5 years building SaaS dashboards',
    },
    openers: {
      professional: ['I am writing to express my interest in the {job} position at {company}.', 'I would like to apply for the {job} role at {company}.'],
      enthusiastic: ['I was thrilled to see the {job} opening at {company} — it feels like a perfect match for my background.', 'The {job} role at {company} immediately caught my eye, and I am excited to apply.'],
      concise: ['I am applying for the {job} position at {company}.', 'Please accept my application for the {job} role at {company}.'],
      formal: ['Please accept this letter and the enclosed application as an expression of my interest in the {job} position at {company}.', 'I respectfully submit my application for the {job} vacancy at {company}.'],
    },
    bodyA: 'With {exp} years of experience and a strong background in {skills}, I have consistently delivered measurable results. In my recent work I focused on shipping reliable, user-facing features while collaborating closely with cross-functional teams.',
    bodyB: 'What draws me to {company} is your reputation for {rep}, and I am confident that my hands-on approach and attention to detail would let me contribute from day one.',
    bodyC: 'I thrive in environments that value ownership, clarity and continuous improvement, and I would welcome the chance to bring that mindset to the {job} role.',
    closer: 'Thank you for considering my application. I would welcome the opportunity to discuss how my experience aligns with {company}\'s goals. I look forward to hearing from you.',
    signoff: 'Sincerely,',
    reps: ['innovation and quality','craftsmanship and impact','thoughtful products and a strong team culture'],
  },
  zh: {
    toolTitle: 'AI 求职信生成器',
    toolDesc: '几秒内生成一封专业的求职信。输入职位、公司和个人优势 — 选择语气和长度，复制或下载 PDF。',
    lblOutput: '你的求职信',
    yourName: '你的姓名',
    jobTitle: '职位名称',
    company: '公司名称',
    skills: '你的核心技能 / 经验',
    experience: '工作年限',
    tone: '语气',
    length: '长度',
    generate: '✨ 生成',
    copy: '📋 复制',
    pdf: '📄 PDF',
    clear: '🗑 清空',
    step1: '输入姓名、职位和公司',
    step2: '添加核心技能和工作年限',
    step3: '选择语气（专业、热情、简洁、正式）',
    step4: '点击「生成」，然后复制或下载 PDF',
    tones: { professional:'专业', enthusiastic:'热情', concise:'简洁', formal:'正式' },
    lengths: { short:'短（1 段）', medium:'中（3 段）', long:'详细（4+ 段）' },
    placeholders: { skills: '例如：React、TypeScript，5 年 SaaS 仪表盘开发经验' },
    openers: {
      professional: ['我写信是想表达我对 {company} {job} 职位的兴趣。', '我希望申请 {company} 的 {job} 职位。'],
      enthusiastic: ['看到 {company} 招聘 {job}，我非常兴奋 — 这与我的背景非常契合。', '{company} 的 {job} 职位立刻吸引了我的注意，我非常期待能申请。'],
      concise: ['我申请 {company} 的 {job} 职位。', '请接受我对 {company} {job} 职位的申请。'],
      formal: ['请接受此信及所附申请材料，以表达我对 {company} {job} 职位的诚意。', '谨此提交我对 {company} {job} 职位的申请。'],
    },
    bodyA: '我拥有 {exp} 年工作经验，在 {skills} 等方面具备扎实背景，并持续交付可量化的成果。在近期工作中，我专注于交付可靠的面向用户的功能，并与跨职能团队紧密协作。',
    bodyB: '吸引我加入 {company} 的是贵公司在 {rep} 方面的声誉，我相信凭借我的实操经验和注重细节的态度，能够从第一天起就为公司创造价值。',
    bodyC: '我擅长在重视责任、清晰沟通和持续改进的环境中工作，希望有机会将这种心态带入 {job} 的角色中。',
    closer: '感谢您考虑我的申请。我期待有机会与您探讨我的经验如何契合 {company} 的目标。期待您的回复。',
    signoff: '此致，',
    reps: ['创新与品质','匠心与影响力','用心打造产品和优秀的团队文化'],
  }
});

const { $, copyText, t } = GZ;

$('#formGrid').innerHTML = `
  <label>${t('yourName')}<input id="f-name" type="text"></label>
  <label>${t('jobTitle')}<input id="f-job" type="text" placeholder="e.g. Senior Frontend Engineer"></label>
  <label>${t('company')}<input id="f-company" type="text" placeholder="e.g. Acme Corp"></label>
  <label>${t('experience')}<input id="f-exp" type="number" min="0" max="50" value="3"></label>
  <label class="full">${t('skills')}<textarea id="f-skills" placeholder="${t('placeholders').skills}"></textarea></label>
  <label>${t('tone')}<select id="f-tone">${Object.entries(t('tones')).map(([k,v])=>`<option value="${k}">${v}</option>`).join('')}</select></label>
  <label>${t('length')}<select id="f-length">${Object.entries(t('lengths')).map(([k,v])=>`<option value="${k}">${v}</option>`).join('')}</select></label>`;

function fill(tpl, vars){ return tpl.replace(/\{(\w+)\}/g, (_,k)=>vars[k]??''); }

function generate() {
  const name = $('#f-name').value.trim() || 'Your Name';
  const job = $('#f-job').value.trim() || 'the position';
  const company = $('#f-company').value.trim() || 'your company';
  const skills = $('#f-skills').value.trim() || 'relevant technologies and methodologies';
  const exp = $('#f-exp').value.trim() || 'several';
  const tone = $('#f-tone').value;
  const len = $('#f-length').value;
  const reps = t('reps');
  const vars = { name, job, company, skills, exp, rep: reps[Math.floor(Math.random()*reps.length)] };
  const openers = t('openers')[tone];
  const opener = openers[Math.floor(Math.random()*openers.length)];
  const today = new Date().toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'});

  let paras = [fill(opener, vars)];
  if (len === 'short') {
    paras.push(fill(t('bodyA'), vars) + ' ' + fill(t('closer'), vars));
  } else if (len === 'medium') {
    paras.push(fill(t('bodyA'), vars));
    paras.push(fill(t('bodyB'), vars) + ' ' + fill(t('closer'), vars));
  } else {
    paras.push(fill(t('bodyA'), vars));
    paras.push(fill(t('bodyB'), vars));
    paras.push(fill(t('bodyC'), vars));
    paras.push(fill(t('closer'), vars));
  }
  const letter = `${today}\n\n${paras.join('\n\n')}\n\n${t('signoff')}\n${name}`;
  $('#letterBox').textContent = letter;
}

function downloadPDF() {
  const text = $('#letterBox').textContent;
  if (!text) return;
  const w = window.open('', '_blank');
  w.document.write(`<pre style="font-family:Georgia,serif;font-size:12pt;line-height:1.75;padding:40px;white-space:pre-wrap;max-width:680px;margin:0 auto">${text.replace(/</g,'&lt;')}</pre>`);
  w.document.close();
  setTimeout(()=>{w.print();}, 300);
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="generate()">${t('generate')}</button>
  <button class="gz-btn" onclick="copyText($('#letterBox').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="downloadPDF()">${t('pdf')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#letterBox').textContent=''">${t('clear')}</button>`;

$('#lblOutput').textContent = t('lblOutput');

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'✉️', href:'/text/cover-letter-generator.html', name:'Cover Letter'},
    {icon:'✉️', href:'/text/resume-builder.html', name:'Resume Builder'},
    {icon:'✉️', href:'/text/email-writer.html', name:'Email Writer'},
    {icon:'✉️', href:'/text/reference-letter-generator.html', name:'Reference Letter'},
  ]
});
</script>
