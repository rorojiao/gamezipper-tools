<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "How is ideal body weight calculated?", "acceptedAnswer": {"@type": "Answer", "text": "This calculator uses four clinically recognized formulas: Devine (1974), Robinson (1983), Miller (1983) and Hamwi (1964). Each uses your height, sex, and a base weight per inch above 5 feet to estimate ideal body weight. The final result is the average of all four formulas."}}, {"@type": "Question", "name": "What is the most accurate ideal weight formula?", "acceptedAnswer": {"@type": "Answer", "text": "The Devine formula is the most widely used in clinical practice for drug dosing, but no single formula is universally accurate. We show all four formulas plus the average so you can compare. For medical decisions, consult your doctor."}}, {"@type": "Question", "name": "Does ideal weight account for body frame or muscle mass?", "acceptedAnswer": {"@type": "Answer", "text": "The classic Devine, Robinson, Miller and Hamwi formulas do not consider body frame size or muscle mass. They are general estimates based on height and sex. Athletes and muscular individuals may weigh more than the formula suggests while still being healthy."}}, {"@type": "Question", "name": "Is this ideal weight calculator free and private?", "acceptedAnswer": {"@type": "Answer", "text": "Yes — completely free, no signup, no data sent anywhere. All calculations run in your browser."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>

  </div>
  <div class="gz-tool-area iw-wrap">
    <div class="iw-card">
      <div class="iw-row">
        <div class="iw-field">
          <label id="lbl-sex">Sex</label>

            <option value="male">♂ Male</option>

        <div class="iw-field" id="heightCmField">
          <label id="lbl-hcm">Height (cm)</label>
          <input type="number" id="heightCm" min="100" max="250" step="0.5" value="175">
        </div>
        <div class="iw-field" id="heightFtField" style="display:none">
          <label id="lbl-hft">Height (ft)</label>
          <input type="number" id="heightFt" min="3" max="8" step="1" value="5">
        </div>
        <div class="iw-field" id="heightInField" style="display:none">
          <label id="lbl-hin">Height (in)</label>
          <input type="number" id="heightIn" min="0" max="11" step="1" value="9">
        </div>
        <div class="iw-field">
          <label id="lbl-unit">Units</label>
          <select id="unit" onchange="toggleUnits()">
            <option value="metric">Metric (kg, cm)</option>

</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Ideal Weight Calculator',
    toolDesc: 'Calculate your ideal body weight using 4 clinical formulas (Devine, Robinson, Miller, Hamwi). Supports metric and imperial units for men and women.',
    sex: 'Sex',
    male: '♂ Male',
    female: '♀ Female',
    hcm: 'Height (cm)',
    hft: 'Height (ft)',
    hin: 'Height (in)',
    units: 'Units',
    metric: 'Metric (kg, cm)',
    imperial: 'Imperial (lb, ft/in)',
    avgLbl: 'Average Ideal Weight',
    devine: 'Devine (1974)',
    robinson: 'Robinson (1983)',
    miller: 'Miller (1983)',
    hamwi: 'Hamwi (1964)',
    range: 'Range across all formulas',
    formula: 'Formula',
    weight: 'Weight',
    bmiIdeal: 'BMI 18.5–24.9 Range',
    frames: 'Frame-adjusted Range',
    smallFrame: 'Small Frame',
    mediumFrame: 'Medium Frame',
    largeFrame: 'Large Frame',
    step1: 'Select your sex and choose metric or imperial units',
    step2: 'Enter your height',
    step3: 'View your ideal weight calculated using 4 medical formulas',
    step4: 'Compare formulas and check the BMI-healthy and frame-adjusted ranges',
  },
  zh: {
    toolTitle: '理想体重计算器',
    toolDesc: '使用 4 种临床公式（Devine、Robinson、Miller、Hamwi）计算你的理想体重。支持公制和英制单位，男女皆可。',
    sex: '性别',
    male: '♂ 男',
    female: '♀ 女',
    hcm: '身高（厘米）',
    hft: '身高（英尺）',
    hin: '身高（英寸）',
    units: '单位',
    metric: '公制（公斤、厘米）',
    imperial: '英制（磅、英尺/英寸）',
    avgLbl: '平均理想体重',
    devine: 'Devine（1974）',
    robinson: 'Robinson（1983）',
    miller: 'Miller（1983）',
    hamwi: 'Hamwi（1964）',
    range: '各公式取值范围',
    formula: '公式',
    weight: '体重',
    bmiIdeal: 'BMI 18.5–24.9 范围',
    frames: '骨架调整后范围',
    smallFrame: '小骨架',
    mediumFrame: '中骨架',
    largeFrame: '大骨架',
    step1: '选择性别和单位制（公制/英制）',
    step2: '输入你的身高',
    step3: '查看 4 种医学公式计算出的理想体重',
    step4: '比较各公式差异，查看 BMI 健康范围和骨架调整后范围',
  }
});

const { $, t } = GZ;

let isMetric = true;

function toggleUnits() {
  isMetric = $('#unit').value === 'metric';
  $('#heightCmField').style.display = isMetric ? '' : 'none';
  $('#heightFtField').style.display = isMetric ? 'none' : '';
  $('#heightInField').style.display = isMetric ? 'none' : '';
  calc();
}

function getHeightInches() {
  if (isMetric) {
    return parseFloat($('#heightCm').value) / 2.54;
  }
  const ft = parseFloat($('#heightFt').value) || 0;
  const inc = parseFloat($('#heightIn').value) || 0;
  return ft * 12 + inc;
}

function devine(h, isMale) {
  if (h <= 60) return isMale ? 50 : 45.5;
  const over = h - 60;
  return isMale ? 50 + 2.3 * over : 45.5 + 2.3 * over;
}
function robinson(h, isMale) {
  if (h <= 60) return isMale ? 52 : 49;
  const over = h - 60;
  return isMale ? 52 + 1.9 * over : 49 + 1.7 * over;
}
function miller(h, isMale) {
  if (h <= 60) return isMale ? 56.2 : 53.1;
  const over = h - 60;
  return isMale ? 56.2 + 1.41 * over : 53.1 + 1.36 * over;
}
function hamwi(h, isMale) {
  if (h <= 60) return isMale ? 48 : 45.5;
  const over = h - 60;
  return isMale ? 48 + 2.7 * over : 45.5 + 2.2 * over;
}

function kgToLb(kg) { return kg * 2.20462; }
function lbToKg(lb) { return lb / 2.20462; }
function fmt(w) {
  return isMetric ? w.toFixed(1) + ' kg' : kgToLb(w).toFixed(1) + ' lb';
}

function calc() {
  const sex = $('#sex').value;
  const isMale = sex === 'male';
  const h = getHeightInches();
  if (!h || h < 48 || h > 96) {
    $('#avgVal').textContent = '—';
    $('#rangeText').textContent = '';
    $('#results').innerHTML = '';
    $('#sizeTable').innerHTML = '';
    $('#extra').textContent = '';
    return;
  }
  const d = devine(h, isMale);
  const r = robinson(h, isMale);
  const m = miller(h, isMale);
  const ha = hamwi(h, isMale);
  const vals = [d, r, m, ha];
  const avg = vals.reduce((a, b) => a + b, 0) / 4;
  const min = Math.min(...vals);
  const max = Math.max(...vals);

  // BMI range (kg stored)
  const hMeters = h * 0.0254;
  const bmiMin = 18.5 * hMeters * hMeters;
  const bmiMax = 24.9 * hMeters * hMeters;

  // Frame adjustments (approx ±10%)
  const fSmall = avg * 0.9;
  const fLarge = avg * 1.1;

  $('#avgVal').textContent = (isMetric ? avg.toFixed(1) : kgToLb(avg).toFixed(1));
  $('#avgUnit').textContent = isMetric ? 'kg' : 'lb';
  $('#rangeText').textContent = `${t('range')}: ${fmt(min)} – ${fmt(max)}`;

  $('#results').innerHTML = `
    <div class="iw-box"><div class="name">${t('devine')}</div><div class="val">${fmt(d)}</div></div>
    <div class="iw-box"><div class="name">${t('robinson')}</div><div class="val">${fmt(r)}</div></div>
    <div class="iw-box"><div class="name">${t('miller')}</div><div class="val">${fmt(m)}</div></div>
    <div class="iw-box"><div class="name">${t('hamwi')}</div><div class="val">${fmt(ha)}</div></div>
  `;

  $('#extra').innerHTML = `
    <strong>${t('bmiIdeal')}:</strong> ${fmt(bmiMin)} – ${fmt(bmiMax)} &nbsp;•&nbsp;
    <strong>${t('frames')}:</strong> ${fmt(fSmall)} – ${fmt(fLarge)}
  `;

  $('#sizeTable').innerHTML = `
    <tr><th>${t('formula')}</th><th>${t('weight')}</th></tr>
    <tr><td>${t('devine')}</td><td>${fmt(d)}</td></tr>
    <tr><td>${t('robinson')}</td><td>${fmt(r)}</td></tr>
    <tr><td>${t('miller')}</td><td>${fmt(m)}</td></tr>
    <tr><td>${t('hamwi')}</td><td>${fmt(ha)}</td></tr>
    <tr><td><strong>${t('smallFrame')}</strong></td><td>${fmt(fSmall)}</td></tr>
    <tr><td><strong>${t('mediumFrame')}</strong></td><td>${fmt(avg)}</td></tr>
    <tr><td><strong>${t('largeFrame')}</strong></td><td>${fmt(fLarge)}</td></tr>
  `;
}

$('#sex').addEventListener('change', calc);
['heightCm', 'heightFt', 'heightIn'].forEach(id => {
  const el = $('#' + id);
  if (el) el.addEventListener('input', calc);
});

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="calc()">${t('calculate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="toggleUnits()">${t('units')}</button>`;

calc();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'⚖️', href:'/calc/bmi-calculator.html', name:'BMI Calculator'},
    {icon:'🍳', href:'/calc/tdee-calculator.html', name:'TDEE'},
    {icon:'💪', href:'/calc/body-fat.html', name:'Body Fat'},
    {icon:'📅', href:'/calc/age-calculator.html', name:'Age Calculator'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
