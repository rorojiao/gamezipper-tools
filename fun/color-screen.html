<style>
.cs-stage{width:100%;aspect-ratio:16/9;background:#ff0000;border-radius:12px;border:1px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s;position:relative;overflow:hidden}
.cs-stage:fullscreen{width:100vw;height:100vh;aspect-ratio:unset;border-radius:0;border:none}
.cs-stage .cs-cta{background:rgba(0,0,0,.25);color:#fff;padding:10px 18px;border-radius:24px;font-size:.95rem;font-weight:600;pointer-events:none;text-shadow:0 1px 3px rgba(0,0,0,.4)}
.cs-stage:fullscreen .cs-cta{display:none}
.cs-exit{display:none;position:fixed;top:14px;right:14px;z-index:9999;background:rgba(0,0,0,.35);color:#fff;border:none;border-radius:8px;padding:8px 14px;cursor:pointer;font-size:.85rem}
.cs-controls{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-top:14px}
.cs-controls input[type=color]{width:54px;height:42px;border:1px solid var(--border);border-radius:8px;background:transparent;cursor:pointer;padding:2px}
.cs-controls input[type=text]{flex:1;min-width:120px;padding:10px 12px;border-radius:8px;border:1px solid var(--border);background:var(--glass);color:var(--text);font-family:monospace;font-size:.95rem}
.cs-presets{display:grid;grid-template-columns:repeat(auto-fill,minmax(58px,1fr));gap:8px;margin-top:12px}
.cs-preset{aspect-ratio:1;border-radius:8px;border:2px solid transparent;cursor:pointer;position:relative}
.cs-preset.active{border-color:var(--accent)}
.cs-preset span{position:absolute;bottom:2px;left:0;right:0;text-align:center;font-size:.6rem;color:#fff;text-shadow:0 1px 2px #000;font-weight:600}
.cs-note{margin-top:14px;padding:14px 16px;background:var(--glass);border:1px solid var(--border);border-radius:12px;font-size:.86rem;line-height:1.65;color:var(--text2)}
.cs-note b{color:var(--text)}
</style>

<script>
GZI18n.register({
  en: {
    toolTitle: 'Color Screen — Full Screen Solid Color',
    toolDesc: 'Display any solid color fullscreen — preset swatches, native color picker, or custom hex. Ideal for dead pixel tests, chroma-key backgrounds, mood lighting, photography backdrops and screen calibration. Free and browser-only.',
    btnFullscreen: '⛶ Fullscreen',
    btnExit: 'Exit',
    cta: 'Click to go fullscreen',
    note: '<b>How to use:</b> Pick a preset, drag the color picker, or type a hex code (e.g. <b>#00ff00</b> for chroma green). Click <b>Fullscreen</b> to fill your display. Great for <b>green-screen / blue-screen</b> video, soft <b>mood lighting</b>, a uniform <b>photo backdrop</b>, and cycling primary colors for a <b>dead pixel test</b>. Press <b>Esc</b> or the ✕ button to exit.',
    step1: 'Pick a preset swatch, use the color picker, or type a hex code.',
    step2: 'Click Fullscreen to fill your entire screen with that color.',
    step3: 'For chroma key, use pure green (#00ff00) or pure blue (#0000ff).',
    step4: 'Press Esc (or tap the ✕ button) to exit fullscreen.',
    presets: {red:'Red',green:'Green',blue:'Blue',white:'White',black:'Black',cyan:'Cyan',magenta:'Magenta',yellow:'Yellow',orange:'Orange',purple:'Purple',pink:'Pink',gray:'Gray'},
  },
  zh: {
    toolTitle: '彩屏 — 全屏纯色显示',
    toolDesc: '全屏显示任意纯色 — 预设色块、系统取色器或自定义十六进制。适合坏点检测、绿幕 / 蓝幕背景、氛围灯光、摄影背景和屏幕校准。免费、浏览器本地运行。',
    btnFullscreen: '⛶ 全屏',
    btnExit: '退出',
    cta: '点击进入全屏',
    note: '<b>使用方法：</b>选择预设色块、拖动取色器或输入十六进制代码（如 <b>#00ff00</b> 绿幕色）。点击「全屏」铺满整个屏幕。非常适合<b>绿幕 / 蓝幕</b>视频、柔和的<b>氛围灯</b>、均匀的<b>摄影背景</b>，以及循环三原色进行<b>坏点检测</b>。按 <b>Esc</b> 或 ✕ 按钮退出。',
    step1: '选择预设色块、使用取色器或输入十六进制代码。',
    step2: '点击「全屏」让所选颜色铺满整个屏幕。',
    step3: '用于绿幕时，请使用纯绿（#00ff00）或纯蓝（#0000ff）。',
    step4: '按 Esc（或点 ✕ 按钮）退出全屏。',
    presets: {red:'红',green:'绿',blue:'蓝',white:'白',black:'黑',cyan:'青',magenta:'品红',yellow:'黄',orange:'橙',purple:'紫',pink:'粉',gray:'灰'},
  }
});

const { $, t } = GZ;

const PRESET_COLORS = {
  red:'#ff0000', green:'#00ff00', blue:'#0000ff', white:'#ffffff', black:'#000000',
  cyan:'#00ffff', magenta:'#ff00ff', yellow:'#ffff00', orange:'#ff8800',
  purple:'#8800ff', pink:'#ff88cc', gray:'#808080'
};

let currentColor = '#ff0000';

function setColor(hex){
  if(!/^#[0-9a-fA-F]{6}$/.test(hex)) return;
  currentColor = hex.toLowerCase();
  $('#stage').style.background = currentColor;
  $('#color-pick').value = currentColor;
  $('#hex-input').value = currentColor;
  document.querySelectorAll('.cs-preset').forEach(p=>{
    p.classList.toggle('active', p.dataset.hex === currentColor);
  });
}

function buildPresets(){
  const labels = t('presets');
  $('#presets').innerHTML = Object.entries(PRESET_COLORS).map(([k,v])=>
    `<div class="cs-preset${v===currentColor?' active':''}" data-hex="${v}" style="background:${v}" onclick="setColor('${v}')"><span>${labels[k]||k}</span></div>`
  ).join('');
}

function goFullscreen(){
  const el = $('#stage');
  const req = el.requestFullscreen || el.webkitRequestFullscreen || el.msRequestFullscreen;
  if(req){ try{ req.call(el).catch(()=>{}); }catch(e){} }
}

$('#stage').addEventListener('click', goFullscreen);
$('#cta').textContent = t('cta');
$('#note').innerHTML = t('note');
$('#exit-lbl').textContent = t('btnExit');
$('#btn-fs').textContent = t('btnFullscreen');
$('#btn-fs').onclick = goFullscreen;

$('#color-pick').addEventListener('input', e=> setColor(e.target.value));
$('#hex-input').addEventListener('input', e=>{
  let v = e.target.value.trim();
  if(v && v[0] !== '#') v = '#'+v;
  if(/^#[0-9a-fA-F]{6}$/.test(v)) setColor(v);
});
$('#hex-input').addEventListener('blur', e=>{ e.target.value = currentColor; });

document.addEventListener('fullscreenchange', ()=>{
  $('#exit-fs').style.display = document.fullscreenElement ? 'flex' : 'none';
});

buildPresets();

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="goFullscreen()">${t('btnFullscreen')}</button>`;

GZ.renderToolPage({
  category: 'fun',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'⬜', href:'/fun/white-screen.html', name:'White Screen'},
    {icon:'⬛', href:'/fun/black-screen.html', name:'Black Screen'},
    {icon:'🖥️', href:'/dev/monitor-test.html', name:'Monitor Test'},
    {icon:'✨', href:'/fun/pixel-fixer.html', name:'Stuck Pixel Fixer'},
  ]
});
</script>
