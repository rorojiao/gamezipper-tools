</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'CSS Login Form Generator',
    toolDesc: 'Design beautiful login, signup and forgot-password forms with live preview. Customize colors, borders, shadows and copy production-ready code.',
    preset: 'Preset',
    presetLogin: 'Login',
    presetSignup: 'Sign Up',
    presetForgot: 'Forgot Password',
    bgColor: 'Background',
    cardBg: 'Card Background',
    accentColor: 'Accent Color',
    textColor: 'Text Color',
    borderRadius: 'Border Radius',
    showShadow: 'Shadow',
    showSocial: 'Social Login',
    showRemember: 'Remember Me',
    copyHtml: 'Copy HTML',
    copyCss: 'Copy CSS',
    step1: 'Choose a form preset (Login, Signup, or Forgot Password)',
    step2: 'Customize colors, border radius, shadow and features',
    step3: 'Preview the form live in real-time',
    step4: 'Copy the HTML and CSS code to your project',
  },
  zh: {
    toolTitle: 'CSS 登录表单生成器',
    toolDesc: '设计精美的登录、注册和忘记密码表单，实时预览。自定义颜色、边框、阴影，复制即用的 HTML 和 CSS 代码。',
    preset: '预设',
    presetLogin: '登录',
    presetSignup: '注册',
    presetForgot: '忘记密码',
    bgColor: '背景色',
    cardBg: '卡片背景',
    accentColor: '主题色',
    textColor: '文字色',
    borderRadius: '圆角',
    showShadow: '阴影',
    showSocial: '社交登录',
    showRemember: '记住我',
    copyHtml: '复制 HTML',
    copyCss: '复制 CSS',
    step1: '选择表单预设（登录、注册或忘记密码）',
    step2: '自定义颜色、圆角、阴影和功能',
    step3: '实时预览表单效果',
    step4: '复制 HTML 和 CSS 代码到你的项目',
  }
});

const { $, copyText, t } = GZ;

let cfg = {
  preset: 'login',
  bgColor: '#f0f2f5',
  cardBg: '#ffffff',
  accent: '#4ecdc4',
  textColor: '#333333',
  radius: 12,
  shadow: true,
  social: true,
  remember: true,
};

let currentTab = 'html';

function render() {
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark' || window.matchMedia('(prefers-color-scheme:dark)').matches;
  if (isDark && cfg.bgColor === '#f0f2f5') cfg.bgColor = '#1a1a2e';
  if (isDark && cfg.cardBg === '#ffffff') cfg.cardBg = '#16213e';
  if (isDark && cfg.textColor === '#333333') cfg.textColor = '#e0e0e0';

  let fields = '';
  let title = '';
  let subtitle = '';
  let btnText = '';
  let extra = '';

  if (cfg.preset === 'login') {
    title = 'Welcome Back';
    subtitle = 'Sign in to your account';
    fields = `
      <div class="lf-field">
        <label>Email</label>
        <input type="email" placeholder="you@example.com">
      </div>
      <div class="lf-field">
        <label>Password</label>
        <input type="password" placeholder="••••••••">
      </div>`;
    btnText = 'Sign In';
    if (cfg.remember) extra += `<div class="lf-remember"><label><input type="checkbox"> Remember me</label><a href="#" style="color:${cfg.accent}">Forgot password?</a></div>`;
  } else if (cfg.preset === 'signup') {
    title = 'Create Account';
    subtitle = 'Sign up to get started';
    fields = `
      <div class="lf-field">
        <label>Full Name</label>
        <input type="text" placeholder="John Doe">
      </div>
      <div class="lf-field">
        <label>Email</label>
        <input type="email" placeholder="you@example.com">
      </div>
      <div class="lf-field">
        <label>Password</label>
        <input type="password" placeholder="••••••••">
      </div>
      <div class="lf-field">
        <label>Confirm Password</label>
        <input type="password" placeholder="••••••••">
      </div>`;
    btnText = 'Sign Up';
  } else {
    title = 'Reset Password';
    subtitle = 'Enter your email to receive a reset link';
    fields = `
      <div class="lf-field">
        <label>Email</label>
        <input type="email" placeholder="you@example.com">
      </div>`;
    btnText = 'Send Reset Link';
  }

  let socialHtml = '';
  if (cfg.social && cfg.preset !== 'forgot') {
    socialHtml = `<div class="lf-divider"><span>or continue with</span></div><div class="lf-social"><button class="lf-social-btn" style="border:1px solid #ddd;background:#fff;color:#333">G</button><button class="lf-social-btn" style="border:1px solid #ddd;background:#1877f2;color:#fff">f</button><button class="lf-social-btn" style="border:1px solid #ddd;background:#000;color:#fff">X</button></div>`;
  }

  const shadowStyle = cfg.shadow ? `box-shadow:0 10px 40px rgba(0,0,0,0.12);` : '';

  const formHtml = `<form class="lf-card" style="background:${cfg.cardBg};color:${cfg.textColor};border-radius:${cfg.radius}px;${shadowStyle}">
  <h2 style="margin:0 0 .3rem;color:${cfg.textColor}">${title}</h2>
  <p style="margin:0 0 1.5rem;opacity:.7;font-size:.9em">${subtitle}</p>
  ${fields}
  ${extra}
  <button type="button" class="lf-btn" style="background:${cfg.accent};color:#fff;border-radius:${Math.max(4,cfg.radius-4)}px">${btnText}</button>
  ${socialHtml}
</form>`;

  $('#preview').innerHTML = `<div style="width:100%;max-width:400px;background:${cfg.bgColor};padding:2rem;border-radius:12px">${formHtml}</div>`;

  const cssCode = `.lf-card {
  max-width: 400px;
  margin: 0 auto;
  padding: 2rem;
}
.lf-field {
  margin-bottom: 1rem;
}
.lf-field label {
  display: block;
  margin-bottom: .3rem;
  font-weight: 600;
  font-size: .9em;
}
.lf-field input {
  width: 100%;
  padding: .7rem;
  border: 1px solid #ddd;
  border-radius: ${Math.max(4,cfg.radius-4)}px;
  font-size: 1rem;
  box-sizing: border-box;
  background: ${cfg.bgColor};
  color: ${cfg.textColor};
}
.lf-btn {
  width: 100%;
  padding: .8rem;
  border: none;
  font-size: 1rem;
  font-weight: 600;
  cursor: pointer;
  margin-top: .5rem;
}
.lf-remember {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: .85em;
  margin-bottom: .5rem;
}
.lf-divider {
  text-align: center;
  margin: 1.2rem 0;
  position: relative;
}
.lf-divider span {
  background: ${cfg.cardBg};
  padding: 0 10px;
  position: relative;
  font-size: .85em;
  opacity: .6;
}
.lf-divider::before {
  content: '';
  position: absolute;
  left: 0;
  right: 0;
  top: 50%;
  border-top: 1px solid #ddd;
}
.lf-social {
  display: flex;
  gap: .8rem;
  justify-content: center;
}
.lf-social-btn {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  font-size: 1.1rem;
  font-weight: 700;
  cursor: pointer;
}`;

  const htmlCode = `<!-- Login Form -->
<div style="background:${cfg.bgColor};min-height:100vh;display:flex;align-items:center;justify-content:center">
${formHtml}
</div>`;

  $('#code-output').textContent = currentTab === 'html' ? htmlCode : cssCode;
}

function showTab(tab) {
  currentTab = tab;
  document.getElementById('tab-html').classList.toggle('active', tab === 'html');
  document.getElementById('tab-css').classList.toggle('active', tab === 'css');
  render();
}

$('#controls').innerHTML = `
  <div><label>${t('preset')}</label><select id="cfg-preset" onchange="cfg.preset=this.value;render()">
    <option value="login">${t('presetLogin')}</option>
    <option value="signup">${t('presetSignup')}</option>
    <option value="forgot">${t('presetForgot')}</option>
  </select></div>
  <div><label>${t('bgColor')}</label><input type="color" id="cfg-bg" value="${cfg.bgColor}" onchange="cfg.bgColor=this.value;render()"></div>
  <div><label>${t('cardBg')}</label><input type="color" id="cfg-card" value="${cfg.cardBg}" onchange="cfg.cardBg=this.value;render()"></div>
  <div><label>${t('accentColor')}</label><input type="color" id="cfg-accent" value="${cfg.accent}" onchange="cfg.accent=this.value;render()"></div>
  <div><label>${t('textColor')}</label><input type="color" id="cfg-text" value="${cfg.textColor}" onchange="cfg.textColor=this.value;render()"></div>
  <div><label>${t('borderRadius')}</label><input type="number" id="cfg-radius" value="${cfg.radius}" min="0" max="30" onchange="cfg.radius=+this.value;render()"></div>
`;

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="copyText(currentTab==='html'?document.getElementById('code-output').textContent:'')">${t('copyHtml')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="copyText(currentTab==='css'?document.getElementById('code-output').textContent:'')">${t('copyCss')}</button>
`;

render();

GZ.renderToolPage({
  category: 'css',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📋', href:'/dev/html-form-builder.html', name:'HTML Form Builder'},
    {icon:'🔲', href:'/css-tools/shadow.html', name:'Box Shadow'},
    {icon:'🔘', href:'/css-tools/button.html', name:'CSS Button'},
    {icon:'🃏', href:'/css-tools/card.html', name:'CSS Card'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
