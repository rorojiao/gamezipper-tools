// Minimal ID3v2.3 writer (frames: TIT2, TPE1, TALB, TPE2, TYER, TCON, TRCK, TPOS, COMM, APIC)
// Refs: ID3v2.3 spec — http://id3.org/id3v2.3.0
function id3v23Encode(text) {
  const enc = new TextEncoder();
  return enc.encode(text);
}
function makeId3v23Frame(id, body) {
  // ID3v2.3 frame: <ID(4)><size(4)><flags(2)><data>
  const size = body.length;
  const out = new Uint8Array(10 + size);
  out.set(new TextEncoder().encode(id), 0);
  out[4] = (size >>> 24) & 0xff;
  out[5] = (size >>> 16) & 0xff;
  out[6] = (size >>> 8) & 0xff;
  out[7] = size & 0xff;
  out[8] = 0; out[9] = 0; // flags
  out.set(body, 10);
  return out;
}
function textFrame(id, text) {
  if (!text) return new Uint8Array(0);
  // Text encoding: 0x00 = ISO-8859-1 (works for ASCII/English), 0x01 = UTF-16 with BOM
  const useUtf16 = /[^\x00-\x7f]/.test(text);
  let body;
  if (useUtf16) {
    const utf16 = new Uint8Array(2 + text.length * 2);
    utf16[0] = 0xff; utf16[1] = 0xfe; // BOM
    const enc = new TextEncoder('utf-16le');
    utf16.set(enc.encode(text), 2);
    body = new Uint8Array(1 + utf16.length);
    body[0] = 0x01; // UTF-16 encoding flag
    body.set(utf16, 1);
  } else {
    const ascii = new TextEncoder().encode(text);
    body = new Uint8Array(1 + ascii.length);
    body[0] = 0x00; // ISO-8859-1
    body.set(ascii, 1);
  }
  return makeId3v23Frame(id, body);
}
function apicFrame(blob) {
  // Returns a Promise
  return new Promise((resolve) => {
    if (!blob) { resolve(new Uint8Array(0)); return; }
    const r = new FileReader();
    r.onload = () => {
      const data = new Uint8Array(r.result);
      // APIC body: <text encoding><mime\0><pic type><description\0><image data>
      const mime = blob.type || 'image/jpeg';
      const mimeBytes = new TextEncoder().encode(mime + '\0');
      const desc = new TextEncoder().encode('\0'); // empty description
      const body = new Uint8Array(1 + mimeBytes.length + 1 + desc.length + data.length);
      let off = 0;
      body[off++] = 0x00; // ISO-8859-1
      body.set(mimeBytes, off); off += mimeBytes.length;
      body[off++] = 0x03; // Cover (front)
      body.set(desc, off); off += desc.length;
      body.set(data, off);
      resolve(makeId3v23Frame('APIC', body));
    };
    r.readAsArrayBuffer(blob);
  });
}
function genreToInt(genre) {
  // ID3v1 mapping
  const map = {'Blues':0,'Classic Rock':1,'Country':2,'Dance':3,'Disco':4,'Funk':5,'Grunge':6,'Hip Hop':7,'Jazz':8,'Metal':9,'New Age':10,'Oldies':11,'Other':12,'Pop':13,'R&B':14,'Rap':15,'Reggae':16,'Rock':17,'Techno':18,'Industrial':19,'Alternative':20,'Ska':21,'Death Metal':22,'Pranks':23,'Soundtrack':24,'Euro-Techno':25,'Ambient':26,'Trip-Hop':27,'Vocal':28,'Jazz+Funk':29,'Fusion':30,'Trance':31,'Classical':32,'Instrumental':33,'Acid':34,'House':35,'Game':36,'Sound Clip':37,'Gospel':38,'Noise':39,'AlternRock':40,'Bass':41,'Soul':42,'Punk':43,'Space':44,'Meditative':45,'Instrumental Pop':46,'Instrumental Rock':47,'Ethnic':48,'Gothic':49,'Darkwave':50,'Techno-Industrial':51,'Electronic':52,'Pop-Folk':53,'Eurodance':54,'Dream':55,'Southern Rock':56,'Comedy':57,'Cult':58,'Gangsta':59,'Top 40':60,'Christian Rap':61,'Pop/Funk':62,'Jungle':63,'Native American':64,'Cabaret':65,'New Wave':66,'Psychedelic':67,'Rave':68,'Showtunes':69,'Trailer':70,'Lo-Fi':71,'Tribal':72,'Acid Punk':73,'Acid Jazz':74,'Polka':75,'Retro':76,'Musical':77,'Rock & Roll':78,'Hard Rock':79,'Folk':80,'Folk-Rock':81,'National Folk':82,'Swing':83,'Fast Fusion':84,'Bebop':85,'Latin':86,'Revival':87,'Celtic':88,'Bluegrass':89,'Avantgarde':90,'Gothic Rock':91,'Progressive Rock':92,'Psychedelic Rock':93,'Symphonic Rock':94,'Slow Rock':95,'Big Band':96,'Chorus':97,'Easy Listening':98,'Acoustic':99,'Humour':100,'Speech':101,'Chanson':102,'Opera':103,'Chamber Music':104,'Sonata':105,'Symphony':106,'Booty Bass':107,'Primus':108,'Porn Groove':109,'Satire':110,'Slow Jam':111,'Club':112,'Tango':113,'Samba':114,'Folklore':115,'Ballad':116,'Power Ballad':117,'Rhythmic Soul':118,'Freestyle':119,'Duet':120,'Punk Rock':121,'Drum Solo':122,'A Cappella':123,'Euro-House':124,'Dance Hall':125,'Goa':126,'Drum & Bass':127,'Club-House':128,'Hardcore':129,'Terror':130,'Indie':131,'BritPop':132,'Negerpunk':133,'Polsk Punk':134,'Beat':135,'Christian Gangsta Rap':136,'Heavy Metal':137,'Black Metal':138,'Crossover':139,'Contemporary Christian':140,'Christian Rock':141,'Merengue':142,'Salsa':143,'Thrash Metal':144,'Anime':145,'JPop':146,'Synthpop':147,'Rock/Pop':148};
  if (!genre) return '';
  if (map.hasOwnProperty(genre)) return '(' + map[genre] + ')';
  return genre.replace(/[\(\)]/g, ''); // Strip parens
}
function buildId3Tag(meta) {
  // meta: {title,artist,album,albumartist,year,genre,track,disc,comment,cover}
  const frames = [];
  frames.push(textFrame('TIT2', meta.title || ''));
  frames.push(textFrame('TPE1', meta.artist || ''));
  frames.push(textFrame('TALB', meta.album || ''));
  frames.push(textFrame('TPE2', meta.albumartist || ''));
  if (meta.year && /^\d{4}$/.test(meta.year)) frames.push(textFrame('TYER', meta.year));
  if (meta.genre) frames.push(textFrame('TCON', genreToInt(meta.genre)));
  if (meta.track) frames.push(textFrame('TRCK', String(meta.track)));
  if (meta.disc) frames.push(textFrame('TPOS', String(meta.disc)));
  if (meta.comment) frames.push(textFrame('COMM', meta.comment));
  return new Promise((resolve) => {
    if (meta.cover) {
      apicFrame(meta.cover).then((apic) => {
        frames.push(apic);
        resolve(frames);
      });
    } else {
      resolve(frames);
    }
  });
}
function buildMp3(frames, originalBuffer) {
  // Strip existing ID3v2 header (look for "ID3" at start) and any ID3v1 at end
  let start = 0;
  const orig = new Uint8Array(originalBuffer);
  if (orig[0] === 0x49 && orig[1] === 0x44 && orig[2] === 0x33) {
    // ID3v2 header size (synchsafe int at bytes 6-9)
    const tagSize = ((orig[6]&0x7f)<<21) | ((orig[7]&0x7f)<<14) | ((orig[8]&0x7f)<<7) | (orig[9]&0x7f);
    start = 10 + tagSize;
  }
  let end = orig.length;
  if (end - 128 >= 0 && orig[end-128] === 0x54 && orig[end-127] === 0x41 && orig[end-126] === 0x47) {
    // ID3v1 footer
    end -= 128;
  }
  // Filter empty frames
  const validFrames = frames.filter(f => f.length > 0);
  const totalFrames = validFrames.reduce((a,f) => a + f.length, 0);
  // ID3v2.3 header: "ID3" + version(2) + flags(1) + size(4 synchsafe)
  const header = new Uint8Array(10);
  header[0]=0x49;header[1]=0x44;header[2]=0x33; // ID3
  header[3]=3;header[4]=0; // v2.3
  header[5]=0; // flags
  const ss = totalFrames;
  header[6] = (ss >>> 21) & 0x7f;
  header[7] = (ss >>> 14) & 0x7f;
  header[8] = (ss >>> 7) & 0x7f;
  header[9] = ss & 0x7f;
  const out = new Uint8Array(header.length + totalFrames + (end - start));
  let off = 0;
  out.set(header, off); off += header.length;
  for (const f of validFrames) { out.set(f, off); off += f.length; }
  out.set(orig.subarray(start, end), off);
  return out;
}

function escapeHtml(s) {
  if (s == null) return '';
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function renderList() {
  const list = $('#list');
  if (!files.length) { list.innerHTML = ''; $('#editor').classList.remove('show'); return; }
  list.innerHTML = files.map(f => {
    const cover = f.cover ? `<img src="${URL.createObjectURL(f.cover)}">` : '🎵';
    return `<div class="mp3-card ${f.active?'active':''}" onclick="selectFile(${f.id})">
      <div class="mp3-cover">${cover}</div>
      <div class="mp3-info">
        <div class="title">${escapeHtml(f.tags.title || f.name)}</div>
        <div class="meta">${escapeHtml(f.tags.artist || 'Unknown artist')}${f.tags.album ? ' • ' + escapeHtml(f.tags.album) : ''}</div>
      </div>
    </div>`;
  }).join('');
}

function readId3v2Tags(buffer) {
  const buf = new Uint8Array(buffer);
  if (buf[0] !== 0x49 || buf[1] !== 0x44 || buf[2] !== 0x33) return {};
  const tagSize = ((buf[6]&0x7f)<<21) | ((buf[7]&0x7f)<<14) | ((buf[8]&0x7f)<<7) | (buf[9]&0x7f);
  const end = 10 + tagSize;
  const tags = {};
  let p = 10;
  while (p + 10 < end) {
    const id = String.fromCharCode(buf[p], buf[p+1], buf[p+2], buf[p+3]);
    if (id === '\u0000\u0000\u0000\u0000') break;
    const size = (buf[p+4]<<24) | (buf[p+5]<<16) | (buf[p+6]<<8) | buf[p+7];
    const data = buf.subarray(p+10, p+10+size);
    if (id.startsWith('T')) {
      const enc = data[0];
      let txt;
      if (enc === 0) txt = new TextDecoder('iso-8859-1').decode(data.subarray(1));
      else if (enc === 1) {
        const bom = (data[1]<<8)|data[2];
        if (bom === 0xfeff) txt = new TextDecoder('utf-16le').decode(data.subarray(3));
        else txt = new TextDecoder('utf-16be').decode(data.subarray(1));
      } else txt = new TextDecoder().decode(data.subarray(1));
      if (id === 'TIT2') tags.title = txt.replace(/\u0000+$/,'');
      else if (id === 'TPE1') tags.artist = txt.replace(/\u0000+$/,'');
      else if (id === 'TALB') tags.album = txt.replace(/\u0000+$/,'');
      else if (id === 'TPE2') tags.albumartist = txt.replace(/\u0000+$/,'');
      else if (id === 'TYER') tags.year = txt.replace(/\u0000+$/,'');
      else if (id === 'TCON') {
        const g = txt.replace(/\u0000+$/,'');
        const m = g.match(/\((\d+)\)/);
        if (m) {

function addFiles(fileList) {
  const mp3s = [...fileList].filter(f => /\.mp3$/i.test(f.name) || f.type === 'audio/mpeg' || f.type === 'audio/mp3');
  if (!mp3s.length) { showStatus(t('errNoFile'), 'err'); return; }
  let added = 0;
  mp3s.forEach(file => {
    const r = new FileReader();
    r.onload = () => {
      const tags = readId3v2Tags(r.result);
      const fObj = {
        id: ++fileIdCounter,
        name: file.name,
        buffer: r.result,
        tags: tags,
        cover: null,
        active: false,
      };
      if (!files.length) fObj.active = true;
      files.push(fObj);
      added++;
      if (added === mp3s.length) {
        showStatus(t('okLoaded').replace('{n}', added), 'ok');
        renderList();
        if (files.length === added) selectFile(files[0].id);
      }
    };
    r.onerror = () => showStatus(t('errRead') + ': ' + file.name, 'err');
    r.readAsArrayBuffer(file);
  });
}

function selectFile(id) {
  files.forEach(f => f.active = (f.id === id));
  const f = files.find(x => x.id === id);
  $('#editor').classList.add('show');
  $('#editing-name').textContent = f.name;
  $('#tag-title').value = f.tags.title || '';
  $('#tag-album').value = f.tags.album || '';
  $('#tag-artist').value = f.tags.artist || '';
  $('#tag-albumartist').value = f.tags.albumartist || '';
  $('#tag-year').value = f.tags.year || '';
  $('#tag-genre').value = f.tags.genre || '';
  $('#tag-track').value = f.tags.track || '';
  $('#tag-disc').value = f.tags.disc || '';
  $('#tag-comment').value = f.tags.comment || '';
  renderList();
}

async function downloadTagged() {
  const f = files.find(x => x.active);
  if (!f) return;
  // Save current edit form into f.tags
  f.tags.title = $('#tag-title').value;
  f.tags.artist = $('#tag-artist').value;
  f.tags.album = $('#tag-album').value;
  f.tags.albumartist = $('#tag-albumartist').value;
  f.tags.year = $('#tag-year').value;
  f.tags.genre = $('#tag-genre').value;
  f.tags.track = $('#tag-track').value;
  f.tags.disc = $('#tag-disc').value;
  f.tags.comment = $('#tag-comment').value;
  const frames = await buildId3Tag({...f.tags, cover: f.cover});
  const out = buildMp3(frames, f.buffer);
  const blob = new Blob([out], {type: 'audio/mpeg'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  const baseName = f.name.replace(/\.mp3$/i, '');
  a.download = baseName + '-tagged.mp3';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showStatus('✓ Downloaded: ' + a.download, 'ok');
  renderList();
}

function clearAll() {
  files = [];
  renderList();
  $('#editor').classList.remove('show');
  $('#status').className = '';
}

// Set up cover art upload via clicking cover
function attachCoverHandler() {
  document.addEventListener('click', function(e) {
    if (e.target.closest('.mp3-cover') && e.target.closest('.mp3-card')) {
      const card = e.target.closest('.mp3-card');
      const f = files.find(x => x.active);
      if (!f) return;
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = 'image/*';
      input.onchange = () => {
        if (input.files[0]) {
          f.cover = input.files[0];
          renderList();
        }
      };
      input.click();
    }
  });
}
