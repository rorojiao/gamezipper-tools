<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is a break-even point for refinancing?", "acceptedAnswer": {"@type": "Answer", "text": "Break-even is the number of months of monthly savings needed to recover the closing costs of refinancing. For example, if refinancing costs $3,000 in fees and saves $150 per month, break-even is 20 months ($3,000 / $150). If you plan to keep the loan past break-even, refinancing is worth it."}}, {"@type": "Question", "name": "When does refinancing make sense?", "acceptedAnswer": {"@type": "Answer", "text": "Refinancing usually makes sense when: (1) you can lower your APR by at least 0.5-1%, (2) you plan to stay in the loan past the break-even point, (3) you want to switch from an adjustable-rate to a fixed-rate loan, or (4) you want to change the term (e.g. shorten to pay off faster or lengthen to lower monthly payments)."}, {"@type": "Question", "name": "How do I calculate my monthly loan payment?", "acceptedAnswer": {"@type": "Answer", "text": "Monthly payment = P × [r(1+r)^n] / [(1+r)^n − 1], where P is the principal balance, r is the monthly interest rate (APR ÷ 12), and n is the remaining number of months. The calculator does this for both the current loan and the refinance offer so you can see the difference."}}, {"@type": "Question", "name": "Are refinance closing costs tax deductible?", "acceptedAnswer": {"@type": "Answer", "text": "For mortgages, most refinance closing costs are NOT tax deductible in 2026. They can sometimes be added to the loan balance and amortized over the loan term, but you do not get an immediate tax break. For student loans and other consumer loans, closing costs are generally not deductible. Always consult a tax professional for your specific situation."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">

  <div class="gz-tool-area">

<script>
GZI18n.register({
  en: {
    toolTitle: 'Loan Refinance Calculator',
    toolDesc: 'Compare your current loan with a refinance offer side by side. See monthly payment, lifetime interest, break-even months for closing costs, and total savings.',
    lblCurrent: 'Current Loan',
    lblNew: 'Refinance Offer',
    lblCurBal: 'Current Balance ($)',
    lblCurAPR: 'Current APR (%)',
    lblCurRem: 'Remaining Months',
    lblNewAPR: 'New APR (%)',
    lblNewTerm: 'New Term (months)',
    lblCosts: 'Closing Costs ($)',
    tileCurPay: 'Current Monthly',
    tileNewPay: 'New Monthly',
    tileSave: 'Monthly Savings',
    tileBreakeven: 'Break-Even (months)',
    tileLifeSave: 'Lifetime Savings',
    tileTotalCost: 'Total Cost Savings',
    verdictGood: '✅ Refinancing looks worthwhile. You will save money after break-even month',
    verdictBad: '❌ Refinancing may not be worth it. Lifetime savings is small or negative after closing costs',
    verdictNeutral: '⚠️ Refinancing is roughly break-even. Consider how long you plan to keep the loan',
    tip: 'A 0.5-1% rate drop typically saves more than the closing costs over a 5+ year horizon. If you plan to move or pay off the loan within 2-3 years, skip the refinance.',
    step1: 'Enter your current loan balance, APR and remaining months',
    step2: 'Enter the refinance offer: new APR, new term in months, and closing costs',
    step3: 'Review the monthly savings, break-even point, and lifetime savings',
    step4: 'Compare against how long you plan to keep the loan. If you will be there past break-even, refinancing pays off',
  },
  zh: {
    toolTitle: '贷款再融资计算器',
    toolDesc: '将当前贷款与再融资方案并排比较。查看月供变化、利息节省、回本月份和总节省金额。',
    lblCurrent: '当前贷款',
    lblNew: '再融资方案',
    lblCurBal: '当前余额（美元）',
    lblCurAPR: '当前年化利率（%）',
    lblCurRem: '剩余月数',
    lblNewAPR: '新利率（%）',
    lblNewTerm: '新贷款期（月）',
    lblCosts: '手续费（美元）',
    tileCurPay: '原月供',
    tileNewPay: '新月供',
    tileSave: '月供节省',
    tileBreakeven: '回本月数',
    tileLifeSave: '总节省',
    tileTotalCost: '净节省（扣手续费）',
    verdictGood: '✅ 再融资划算，过了回本月之后就开始省钱',
    verdictBad: '❌ 再融资可能不值得，扣除手续费后总节省很小或为负',
    verdictNeutral: '⚠️ 再融资基本打平，看你打算持有贷款多久',
    tip: '利率降 0.5-1% 在 5 年以上通常能省回手续费。如果 2-3 年内要搬家或还清，跳过再融资。',
    step1: '输入当前贷款的余额、年化利率和剩余月数',
    step2: '输入再融资方案：新利率、贷款期（月）和手续费',
    step3: '查看月供节省、回本月数、总利息节省',
    step4: '结合计划持有贷款的时间判断。超过回本月，再融资就开始盈利',
  }
});

const { $ } = GZ;

function pmt(P, aprPct, n) {
  if (P <= 0 || n <= 0) return 0;
  const r = (aprPct / 100) / 12;
  if (r === 0) return P / n;
  return P * (r * Math.pow(1 + r, n)) / (Math.pow(1 + r, n) - 1);
}

function totalInterest(P, aprPct, n) {
  return pmt(P, aprPct, n) * n - P;
}

function compute() {
  const curBal = parseFloat($('#curBal').value) || 0;
  const curAPR = parseFloat($('#curAPR').value) || 0;
  const curRem = parseInt($('#curRem').value) || 0;
  const newAPR = parseFloat($('#newAPR').value) || 0;
  const newTerm = parseInt($('#newTerm').value) || 0;
  const costs = parseFloat($('#costs').value) || 0;

  const curPay = pmt(curBal, curAPR, curRem);
  const newPay = pmt(curBal, newAPR, newTerm);
  const monthlySave = curPay - newPay;
  const breakeven = monthlySave > 0 ? costs / monthlySave : Infinity;
  const curInterest = totalInterest(curBal, curAPR, curRem);
  const newInterest = totalInterest(curBal, newAPR, newTerm);
  const lifeSave = curInterest - newInterest;
  const netSave = lifeSave - costs;

  const tiles = [
    {cls:'',     val:'$' + curPay.toFixed(2),          lbl:GZI18n.t('tileCurPay')},
    {cls:'',     val:'$' + newPay.toFixed(2),          lbl:GZI18n.t('tileNewPay')},
    {cls: monthlySave>0?'good':'bad', val:(monthlySave>=0?'+':'') + '$' + monthlySave.toFixed(2), lbl:GZI18n.t('tileSave')},
    {cls: isFinite(breakeven) && breakeven < 60 ? 'good':'bad', val:isFinite(breakeven)?breakeven.toFixed(0):'∞', lbl:GZI18n.t('tileBreakeven')},
    {cls: lifeSave>0?'good':'bad', val:(lifeSave>=0?'+':'') + '$' + lifeSave.toFixed(0), lbl:GZI18n.t('tileLifeSave')},
    {cls: netSave>0?'good':'bad', val:(netSave>=0?'+':'') + '$' + netSave.toFixed(0), lbl:GZI18n.t('tileTotalCost')},
  ];
  $('#tiles').innerHTML = tiles.map(x => `<div class="rf-tile ${x.cls}"><div class="num">${x.val}</div><div class="lbl">${x.lbl}</div></div>`).join('');

  // Verdict
  let verdictKey, verdictClass;
  if (netSave > 5000 && isFinite(breakeven) && breakeven < 60) {
    verdictKey = 'verdictGood';
    verdictClass = '';
  } else if (netSave < 0 || !isFinite(breakeven)) {
    verdictKey = 'verdictBad';
    verdictClass = 'bad';
  } else {
    verdictKey = 'verdictNeutral';
    verdictClass = 'neutral';
  }
  $('#verdict').className = 'rf-verdict ' + verdictClass;
  $('#verdict').textContent = GZI18n.t(verdictKey) + ' — break-even in ' + (isFinite(breakeven)?breakeven.toFixed(0):'—') + ' months, lifetime savings $' + lifeSave.toFixed(0) + ', net savings $' + netSave.toFixed(0) + '.';

  $('#tip').textContent = GZI18n.t('tip');
}

['#curBal','#curAPR','#curRem','#newAPR','#newTerm','#costs'].forEach(sel => $(sel).addEventListener('input', compute));

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'💵', href:'/calc/loan-calculator.html', name:'Loan Calculator'},
    {icon:'🏠', href:'/fortune/mortgage.html', name:'Mortgage Calculator'},
    {icon:'🚗', href:'/calc/car-loan-calculator.html', name:'Car Loan'},
    {icon:'📈', href:'/calc/apr-apy-calculator.html', name:'APR/APY'},
  ]
});
compute();
</script>
<script src="/tools-result-rec.js" defer></script>
