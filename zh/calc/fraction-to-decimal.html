<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"How do I convert a fraction to a decimal?","acceptedAnswer":{"@type":"Answer","text":"Divide the numerator (top) by the denominator (bottom). For example, 3/4 = 3 ÷ 4 = 0.75. This tool performs long division and shows the working."}},{"@type":"Question","name":"What is a repeating decimal?","acceptedAnswer":{"@type":"Answer","text":"A repeating decimal has a digit or group of digits that repeat forever, like 1/3 = 0.333... or 1/7 = 0.142857142857.... The repeating part is shown with an overline."}},{"@type":"Question","name":"How do I know if a fraction terminates?","acceptedAnswer":{"@type":"Answer","text":"After simplifying, if the denominator's only prime factors are 2 and 5, the decimal terminates. Otherwise it repeats. For example 1/8 = 0.125 (denominator 8 = 2³) terminates, but 1/3 repeats."}},{"@type":"Question","name":"Can this handle improper fractions and mixed numbers?","acceptedAnswer":{"@type":"Answer","text":"Yes. Enter any integers in the numerator and denominator fields, including values greater than the denominator (improper fractions). The decimal, percentage and remainder are all shown."}}]}</script>

<script>
GZI18n.register({
  en: {
    toolTitle: 'Fraction to Decimal Calculator',
    toolDesc: 'Convert any fraction to a decimal with full long-division working, percentage and remainder — detects terminating vs repeating.',
    convert: 'Convert',
    clear: 'Clear',
    example: 'Example',
    resultLabel: 'Decimal result',
    decimal: 'Decimal',
    percentage: 'Percentage',
    remainder: 'Remainder (num mod den)',
    type: 'Type',
    typeTerm: 'Terminating',
    typeRep: 'Repeating',
    longDiv: 'Long division working',
    errInput: 'Please enter a numerator and a non-zero denominator.',
    step1: 'Enter the numerator (top) in the first box',
    step2: 'Enter the denominator (bottom) in the second box',
    step3: 'Click Convert to see the decimal, percentage and remainder',
    step4: 'Read whether the result terminates or repeats forever',
  },
  zh: {
    toolTitle: '分数转小数计算器',
    toolDesc: '将任意分数转换为小数，显示完整竖式计算、百分比和余数 — 自动判断是有限还是循环小数。',
    convert: '转换',
    clear: '清除',
    example: '示例',
    resultLabel: '小数结果',
    decimal: '小数',
    percentage: '百分比',
    remainder: '余数（分子 mod 分母）',
    type: '类型',
    typeTerm: '有限小数',
    typeRep: '循环小数',
    longDiv: '竖式计算过程',
    errInput: '请输入分子和不为零的分母。',
    step1: '在第一个输入框中输入分子（上方）',
    step2: '在第二个输入框中输入分母（下方）',
    step3: '点击「转换」查看小数、百分比和余数',
    step4: '查看结果为有限小数还是无限循环小数',
  }
});

const { $, t } = GZ;

function gcd(a, b) { a = Math.abs(a); b = Math.abs(b); while (b) { [a, b] = [b, a % b]; } return a || 1; }

function convert() {
  const numV = $('#num').value.trim();
  const denV = $('#den').value.trim();
  const num = parseInt(numV, 10);
  const den = parseInt(denV, 10);
  if (numV === '' || denV === '' || isNaN(num) || isNaN(den) || den === 0) {
    $('#result').innerHTML = `<span style="color:var(--accent)">${t('errInput')}</span>`;
    $('#detail').style.display = 'none';
    return;
  }
  const sign = (num < 0) !== (den < 0) ? '-' : '';
  const a = Math.abs(num), b = Math.abs(den);

  // Long division with cycle detection (up to 5000 digits)
  const intPart = Math.floor(a / b);
  let rem = a % b;
  const fracDigits = [];
  const seenAt = new Map();
  let repeatStart = -1;
  while (rem !== 0 && fracDigits.length < 5000) {
    if (seenAt.has(rem)) { repeatStart = seenAt.get(rem); break; }
    seenAt.set(rem, fracDigits.length);
    rem *= 10;
    fracDigits.push(Math.floor(rem / b));
    rem = rem % b;
  }
  const repeats = rem !== 0 && repeatStart >= 0;
  let decStr;
  if (fracDigits.length === 0) {
    decStr = intPart.toString();
  } else if (repeats) {
    const nonRep = fracDigits.slice(0, repeatStart).join('');
    const rep = fracDigits.slice(repeatStart).join('');
    decStr = `${intPart}.${nonRep}[${rep}]`;
  } else {
    decStr = `${intPart}.${fracDigits.join('')}`;
  }
  // For display percentage, use the high-precision JS number
  const pct = (num / den * 100).toPrecision(6).replace(/\.?0+$/, '');

  $('#result').innerHTML = `
    <div style="color:var(--text2);font-size:.8em;margin-bottom:4px">${t('resultLabel')}</div>
    <div class="fd-result">${sign}${decStr}</div>
    <table class="fd-table">
      <tr><td>${t('decimal')}</td><td>${sign}${decStr}</td></tr>
      <tr><td>${t('percentage')}</td><td>${pct}%</td></tr>
      <tr><td>${t('remainder')}</td><td>${a % b}</td></tr>
      <tr><td>${t('type')}</td><td>${repeats ? '🔁 ' + t('typeRep') : '✓ ' + t('typeTerm')}</td></tr>
    </table>`;

  // Long-division trace
  const g = gcd(a, b);
  let lines = [];
  lines.push(`${num}/${den}  →  simplified ${sign}${a/g}/${b/g}`);
  lines.push(``);
  lines.push(`Long division of ${a} ÷ ${b}:`);
  lines.push(`${a} ÷ ${b} = ${intPart} remainder ${a - intPart * b}`);
  if (fracDigits.length > 0) {
    lines.push(`Decimal places:`);
    let traceRem = a - intPart * b;
    const shown = fracDigits.slice(0, Math.min(fracDigits.length, repeats ? repeatStart + 12 : 24));
    shown.forEach((d, i) => {
      lines.push(`  step ${i+1}: ${traceRem}×10=${traceRem*10}, ÷${b} → digit ${d}, remainder ${traceRem*10 - d*b}`);
      traceRem = traceRem * 10 - d * b;
    });
    if (fracDigits.length > shown.length) lines.push(`  …(${fracDigits.length - shown.length} more digits)`);
    if (repeats) lines.push(`\nCycle detected at position ${repeatStart}: digit pattern "${fracDigits.slice(repeatStart).join('')}" repeats forever.`);
  }
  $('#detail').style.display = 'block';
  $('#detail').innerHTML = `<div style="color:var(--text2);font-size:.85em;margin-bottom:6px">${t('longDiv')}</div><div class="fd-detail">${lines.join('\n')}</div>`;
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="convert()">${t('convert')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#num').value='1';$('#den').value='3';convert()">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#num').value='';$('#den').value='';$('#result').innerHTML='';$('#detail').style.display='none'">${t('clear')}</button>`;

$('#num').addEventListener('keydown', e => { if (e.key === 'Enter') convert(); });
$('#den').addEventListener('keydown', e => { if (e.key === 'Enter') convert(); });

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🔢', href:'/calc/decimal-to-fraction.html', name:'Decimal to Fraction'},
    {icon:'➗', href:'/calc/fraction-calculator.html', name:'Fraction Calculator'},
    {icon:'√', href:'/calc/fraction-simplifier.html', name:'Fraction Simplifier'},
    {icon:'🔢', href:'/calc/mixed-number-calculator.html', name:'Mixed Number'},
  ]
});
</script>
