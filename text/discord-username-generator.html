<script>
GZI18n.register({

  zh: {

    lblName: "你的名字或基础词", lblKeywords: "关键词 / 领域（可选）", lblStyle: "风格", lblCount: "生成数量",
    step1: "输入你的名字或基础词（如 Alex）",

    step3: "点击「生成」获取用户名 + 显示名组合",
    step4: "点击任一结果即可复制，然后在 Discord 设置中使用",
  }
});

const { $, copyText, t } = GZ;
let currentStyle = "aesthetic";

document.querySelectorAll(".du-pill").forEach(p => {
  p.addEventListener("click", () => {
    document.querySelectorAll(".du-pill").forEach(x => x.classList.remove("active"));
    p.classList.add("active");
    currentStyle = p.dataset.style;
  });
});

// Discord handle: 2-32 chars, [a-z0-9_.], no consecutive periods, no leading/trailing period
function cleanHandle(s){ return (s||"").toLowerCase().replace(/[^a-z0-9_.]/g,""); }
function validHandle(u){
  if (u.length < 2 || u.length > 32) return false;
  if (u.startsWith(".")||u.endsWith(".")) return false;
  if (u.includes("..")) return false;
  return /^[a-z0-9_.]+$/.test(u);
}

const PREFIXES = ["the","real","lil","big","mr","ms","its","sir","lady","dr"];
const SUFFIXES = ["tv","yt","hq","world","ox","zx","io","art","code","wave"];
const AESTHETIC = ["moon","lunar","velvet","daisy","peach","honey","ivory","azure","ember","willow"];
const GAMER = ["shadow","phantom","vortex","nexus","byte","rogue","blaze","apex","ghost","nova"];
const CUTE = ["bunny","mochi","cookie","bubble","panda","peachy","fluffy","sprout","cupcake","star"];
const EDGY = ["void","reaper","raven","sin","venom","onyx","wraith","inferno","malice","ash"];
const SYMBOLS = ["♡","✦","☾","★","❀","✧","𖤐","♡˙","ʚïɞ","☯"];
const NUMS = ["07","99","xoxo","01","_","23","00","69","21","_xd"];

function pick(a){ return a[Math.floor(Math.random()*a.length)]; }
function cap(s){ return s.charAt(0).toUpperCase()+s.slice(1); }
function randInt(n){ return Math.floor(Math.random()*n); }

function buildHandle(base, kw, style){
  base = cleanHandle(base) || "user";
  kw = cleanHandle(kw.split(",")[0]||"");
  const pool = style==="gamer"?GAMER : style==="cute"?CUTE : style==="edgy"?EDGY : AESTHETIC;
  const r = Math.random();
  let u = "";
  if (r < 0.2) u = pick(PREFIXES) + base;
  else if (r < 0.4) u = base + pick(SUFFIXES);
  else if (r < 0.6) u = base + "." + pick(pool);
  else if (r < 0.78) u = pick(pool) + "." + base;
  else if (r < 0.9) u = base + pick(NUMS).replace(/[^a-z0-9_]/g,"");
  else u = (kw||pick(pool)) + "." + base;
  u = cleanHandle(u).replace(/^[._]+/,"");
  while (u.includes("..")) u = u.replace("..",".");
  if (u.startsWith(".")||u.endsWith(".")) u = u.replace(/^\.+/,"").replace(/\.+$/,"");
  if (u.length < 2) u = (u + pick(SUFFIXES)).substring(0,32);
  return u.substring(0,32);
}

function buildDisplay(base, kw, style){
  base = base.trim() || "User";
  base = base.charAt(0).toUpperCase() + base.slice(1).toLowerCase();
  const pool = style==="gamer"?GAMER : style==="cute"?CUTE : style==="edgy"?EDGY : AESTHETIC;
  const r = Math.random();
  if (style === "cute"){
    return pick(SYMBOLS) + " " + base + " " + pick(SYMBOLS);
  }
  if (style === "gamer"){
    if (r < 0.5) return cap(pick(GAMER)) + base;
    return base + cap(pick(GAMER));
  }
  if (style === "edgy"){
    return "xX" + base + "Xx";
  }
  if (style === "clean"){
    return base;
  }
  // aesthetic
  if (r < 0.5) return base + " " + pick(SYMBOLS);
  return pick(SYMBOLS) + " " + base;
}

function generate(){
  const base = $("#base").value.trim();
  const kw = $("#kw").value.trim();
  const count = parseInt($("#count").value);
  const results = $("#results");
  results.innerHTML = "";
  const used = new Set();
  let attempts = 0;
  while (results.children.length < count && attempts < count*10){
    attempts++;
    const h = buildHandle(base, kw, currentStyle);
    if (!validHandle(h) || used.has(h)) continue;
    const disp = buildDisplay(base, kw, currentStyle);
    used.add(h);
    const card = document.createElement("div");
    card.className = "du-card";
    card.innerHTML = `<div><div class="du-display"></div><div class="du-handle">@</div></div><div style="display:flex;align-items:center;gap:8px"><span class="du-meta"></span><button class="gz-btn gz-btn-secondary">📋</button></div>`;
    card.querySelector(".du-display").textContent = disp;
    card.querySelector(".du-handle").textContent = "@" + h;
    card.querySelector(".du-meta").textContent = h.length + " chars";
    const copyVal = h;
    card.querySelector("button").onclick = (e)=>{e.stopPropagation();copyText(copyVal);};
    card.addEventListener("click", ()=>copyText(copyVal));
    results.appendChild(card);
  }
  if (results.children.length === 0){
    results.innerHTML = `<div style="opacity:.6;padding:20px;text-align:center">Try a different base word</div>`;
  }
}

$("#toolbar").innerHTML = `
  <button class="gz-btn" onclick="generate()">✨ Generate</button>
  <button class="gz-btn gz-btn-secondary" onclick="generate()">🔄 Regenerate</button>
  <button class="gz-btn gz-btn-secondary" onclick="document.getElementById('results').innerHTML=''">🗑️ Clear</button>`;

  ]
});
generate();
</script>
