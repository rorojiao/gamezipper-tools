// Convert a DOM node to a plain JS object (Fast XML Parser style)
function xmlNodeToObj(node) {
  const obj = {};
  // Attributes → @name
  if (node.attributes && node.attributes.length) {
    for (const attr of node.attributes) obj['@' + attr.name] = attr.value;
  }
  // Children grouped by tag name
  const childMap = {};
  let textContent = '';
  for (const child of node.childNodes) {
    if (child.nodeType === 1) { // element
      const key = child.nodeName;
      const val = xmlNodeToObj(child);
      if (key in childMap) {
        if (!Array.isArray(childMap[key])) childMap[key] = [childMap[key]];
        childMap[key].push(val);
      } else {
        childMap[key] = val;
      }
    } else if (child.nodeType === 3 || child.nodeType === 4) { // text or CDATA
      textContent += child.nodeValue;
    }
  }
  Object.assign(obj, childMap);
  const trimmed = textContent.trim();
  if (trimmed) {
    if (Object.keys(obj).length === 0) return trimmed; // leaf text node
    obj['#text'] = trimmed;
  }
  return obj;
}

function convert() {
  const inp = $('#input').value.trim();
  if (!inp) { $('#output').innerHTML = ''; $('#status').innerHTML = ''; return; }
  try {
    const parser = new DOMParser();
    const doc = parser.parseFromString(inp, 'application/xml');
    const parseErr = doc.querySelector('parsererror');
    if (parseErr) throw new Error(parseErr.textContent.split('\n')[0] || 'Invalid XML');
    const root = doc.documentElement;
    if (!root) throw new Error('No root element found');
    const obj = {};
    obj[root.nodeName] = xmlNodeToObj(root);
    const yaml = jsyaml.dump(obj, { indent: 2, lineWidth: 100, noRefs: true });
    $('#output').textContent = yaml;
    $('#status').innerHTML = `<span style="color:var(--gz-success)">${t('valid')}</span>`;
  } catch (e) {
    $('#status').innerHTML = `<span style="color:var(--gz-accent)">✗ ${e.message}</span>`;
    $('#output').innerHTML = `<span style="color:var(--gz-accent)">${e.message}</span>`;
  }
}

}
