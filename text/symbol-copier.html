CATS['All'] = Object.keys(CATS).filter(k => k !== 'All').flatMap(k => CATS[k].map(([ch,name]) => [ch, name]));

let currentCat = 'All';
let recent = [];

function buildTabs() {
  let html = '';
  Object.keys(CATS).forEach(cat => {
    html += `<span class="sc-tab${cat === currentCat ? ' active' : ''}" data-cat="${cat}" onclick="selectCat('${cat}')">${cat}</span>`;
  });
  $('#tabs').innerHTML = html;
}

function selectCat(cat) {
  currentCat = cat;
  document.querySelectorAll('.sc-tab').forEach(el => el.classList.toggle('active', el.dataset.cat === cat));
  renderGrid();
}

function renderGrid() {
  const q = $('#search').value.trim().toLowerCase();
  let list = CATS[currentCat];
  if (q) list = CATS['All'].filter(([ch,name]) => name.toLowerCase().includes(q) || ch.includes(q));
  if (!list.length) { $('#grid').innerHTML = '<div class="sc-empty">No matches</div>'; return; }
  let html = '';
  list.forEach(([ch, name]) => {
    const code = 'U+' + ch.codePointAt(0).toString(16).toUpperCase().padStart(4,'0');
    html += `<div class="sc-cell" title="${name} (${code})" onclick="copySymbol('${ch.replace(/'/g,"\\'")}','${name.replace(/'/g,"\\'")}')">${ch}<span class="code">${code.slice(2)}</span></div>`;
  });
  $('#grid').innerHTML = html;
}

function copySymbol(ch, name) {
  navigator.clipboard.writeText(ch).then(() => {
    showToast(`${t('copied')}  ${ch}`);
    // add to recent
    recent = recent.filter(x => x[0] !== ch);
    recent.unshift([ch, name]);
    recent = recent.slice(0, 16);
    renderRecent();
  }).catch(() => {
    // fallback
    const ta = document.createElement('textarea');
    ta.value = ch; document.body.appendChild(ta); ta.select();
    try { document.execCommand('copy'); showToast(`${t('copied')}  ${ch}`); } catch(e){}
    document.body.removeChild(ta);
  });
}

function renderRecent() {
  if (!recent.length) { $('#recent-wrap').style.display = 'none'; return; }
  $('#recent-wrap').style.display = 'block';
  $('#recent-title').textContent = t('recent');
  let html = '';
  recent.forEach(([ch,name]) => {
    html += `<div class="sc-cell" title="${name}" onclick="copySymbol('${ch.replace(/'/g,"\\'")}','${name.replace(/'/g,"\\'")}')">${ch}</div>`;
  });
  $('#recent').innerHTML = html;
}

let toastTimer;
function showToast(msg) {
  $('#toast').textContent = msg;
  $('#toast').classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => $('#toast').classList.remove('show'), 1500);
}

$('#search').addEventListener('input', () => { if ($('#search').value) { currentCat = 'All'; document.querySelectorAll('.sc-tab').forEach(el => el.classList.toggle('active', el.dataset.cat === 'All')); } renderGrid(); });

buildTabs();
renderGrid();
