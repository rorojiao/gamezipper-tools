const { $, copyText, t } = GZ;

function minifyJS(code) {
  let result = code;
  // Remove single-line comments (but not URLs like http://)
  result = result.replace(/([^:]|^)\/\/.*$/gm, '$1');
  // Remove multi-line comments
  result = result.replace(/\/\*[\s\S]*?\*\//g, '');
  // Remove leading/trailing whitespace on each line
  result = result.replace(/^\s+|\s+$/gm, '');
  // Collapse multiple spaces/newlines
  result = result.replace(/\s+/g, ' ');
  // Remove spaces around operators (careful not to break things)
  result = result.replace(/\s*([=+\-*/<>!&|?:;,{}()[\]])\s*/g, '$1');
  // Add back necessary spaces after keywords
  const keywords = ['var','let','const','function','return','if','else','for','while','do','switch','case','break','continue','new','typeof','instanceof','in','of','throw','try','catch','finally','class','extends','import','export','from','default','yield','async','await','void','delete'];
  keywords.forEach(kw => {
    const re = new RegExp('\\b' + kw + '(?=[a-zA-Z_$])', 'g');
    result = result.replace(re, kw + ' ');
  });
  // Fix return/typeof followed by keyword
  ['return','typeof','instanceof','in','of','void','delete','new','throw','yield','await'].forEach(kw => {
    const re = new RegExp('\\b' + kw + '([a-zA-Z_$])', 'g');
    result = result.replace(re, kw + ' $1');
  });
  return result.trim();
}

function beautifyJS(code) {
  // Simple beautifier
  let result = code;
  let indent = 0;
  const tab = '  ';
  let output = '';
  let i = 0;
  let inString = false;
  let stringChar = '';

  // First, add newlines around braces and semicolons
  result = result.replace(/;/g, ';\n');
  result = result.replace(/\{/g, '{\n');
  result = result.replace(/\}/g, '\n}\n');

  const lines = result.split('\n');
  for (const rawLine of lines) {
    const line = rawLine.trim();
    if (!line) continue;
    // Decrease indent for closing brace
    if (line.startsWith('}')) indent = Math.max(0, indent - 1);
    output += tab.repeat(indent) + line + '\n';
    // Increase indent after opening brace
    if (line.endsWith('{')) indent++;
  }
  return output.trim();
}

function formatBytes(bytes) {
  if (bytes < 1024) return bytes + ' B';
  return (bytes / 1024).toFixed(1) + ' KB';
}

function doMinify() {
  const inp = $('#input').value;
  if (!inp.trim()) return;
  const minified = minifyJS(inp);
  $('#output').textContent = minified;
  const origSize = new Blob([inp]).size;
  const minSize = new Blob([minified]).size;
  const saved = origSize > 0 ? ((1 - minSize / origSize) * 100).toFixed(1) : 0;
  $('#status').innerHTML = `<span style="color:var(--gz-success)">${t('original')}: ${formatBytes(origSize)} → ${t('result')}: ${formatBytes(minSize)} (${saved}% ${t('saved')})</span>`;
}

function doBeautify() {

  $('#status').innerHTML = `<span style="color:var(--gz-success)">✓ ${t('beautified')}</span>`;
}

  subtract(num) {
    this.result -= num;
    this.history.push(\`- \${num}\`);
    return this;
  }

  multiply(num) {
    this.result *= num;
    this.history.push(\`× \${num}\`);

    this.history.push(\`÷ \${num}\`);

  reset() {
    this.result = 0;
    this.history = [];
