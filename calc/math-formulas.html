let currentCat = 'all';

function buildCats() {
  const cats = ['all','algebra','geometry','trig','calculus','stats','finance','physics'];
  $('#cats').innerHTML = cats.map(k =>
    `<button class="${k===currentCat?'active':''}" onclick="setCat('${k}')">${t(k)}</button>`).join('');
}

function setCat(k) { currentCat = k; buildCats(); render(); }

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function render() {
  const lang = GZI18n.getLang();
  const matches = currentCat === 'all' ? F : F.filter(x => x[5] === currentCat);
  // Group by category
  const groups = {};
  matches.forEach(x => { (groups[x[5]] = groups[x[5]] || []).push(x); });
  const order = ['algebra','geometry','trig','calculus','stats','finance','physics'];
  let html = '';
  order.forEach(cat => {
    if (!groups[cat]) return;
    html += `<div class="section-h">${t(cat)}</div><div class="formula-list">`;
    html += groups[cat].map(f => {
      const expr = esc(f[2]);
      return `<div class="f-card" onclick="cp(this,'${f[2].replace(/'/g,"\\'")}')">
        <div class="name">${esc(lang==='zh'?f[1]:f[0])}</div>
        <div class="expr">${expr}</div>
        <div class="note">${esc(lang==='zh'?f[4]:f[3])}</div>
      </div>`;
    }).join('');
    html += '</div>';
  });
  $('#list').innerHTML = html;
}

function cp(el, txt) {
  copyText(txt);
  showToast(t('copied'));
  el.classList.add('copied');
  setTimeout(() => el.classList.remove('copied'), 900);
}

$('#hint').textContent = t('hint');
buildCats();
render();
