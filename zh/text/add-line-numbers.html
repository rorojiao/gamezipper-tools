<script>
GZI18n.register({
  en: {
    toolTitle: 'Add Line Numbers',
    toolDesc: 'Number every line of any text or code instantly. Choose separator, start value, padding and step — perfect for code reviews, documentation, references and printed listings.',
    sep: 'Separator',
    start: 'Start number',
    step: 'Increment step',
    pad: 'Zero padding',
    skipEmpty: 'Skip empty lines',
    stripEmpty: 'Remove blank lines',
    lines: 'lines',
    numbered: 'lines numbered',
    blanks: 'blank lines',
    step1: 'Paste your text or code into the input area',
    step2: 'Pick a separator, starting number and padding style',
    step3: 'Toggle skip/remove blank lines if needed',
    step4: 'Click Copy to copy the numbered result to clipboard',
  },
  zh: {
    toolTitle: '添加行号',
    toolDesc: '即时为任意文本或代码的每一行添加行号。可选择分隔符、起始值、补零和步长 — 完美适用于代码审查、文档、引用和打印清单。',
    sep: '分隔符',
    start: '起始数字',
    step: '递增步长',
    pad: '补零',
    skipEmpty: '跳过空行',
    stripEmpty: '删除空行',
    lines: '行',
    numbered: '已编号行',
    blanks: '空行',
    step1: '将文本或代码粘贴到输入区',
    step2: '选择分隔符、起始数字和补零样式',
    step3: '根据需要勾选跳过或删除空行',
    step4: '点击「复制」将带行号的结果复制到剪贴板',
  }
});

const {$, copyText, t} = GZ;
const escapeHtml = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

function pad(n, width) {
  const s = String(n);
  return width > 0 ? s.padStart(width, '0') : s;
}

function realSep(v) {
  return v.replace(/\\t/g, '\t').replace(/\\n/g, '\n');
}

function process() {
  const text = $('#input').value;
  if (!text) { $('#output').innerHTML = ''; $('#stats').innerHTML = ''; return; }
  const sep = realSep($('#sep').value);
  const start = parseInt($('#start').value) || 1;
  const step = parseInt($('#step').value) || 1;
  const padW = parseInt($('#pad').value);
  const skipEmpty = $('#skipEmpty').checked;
  const stripEmpty = $('#stripEmpty').checked;

  let lines = text.split('\n');
  const totalLines = lines.length;
  let blanks = 0;
  let num = start;
  const out = [];
  lines.forEach(line => {
    const isBlank = line.trim() === '';
    if (isBlank && stripEmpty) { blanks++; return; }
    if (isBlank && skipEmpty) { blanks++; out.push(escapeHtml(line)); return; }
    out.push(`<span style="color:var(--accent);font-weight:600">${escapeHtml(pad(num, padW))}</span><span style="opacity:.85">${escapeHtml(sep)}</span>${escapeHtml(line)}`);
    num += step;
  });
  const numbered = Math.floor((num - start) / step);
  $('#output').innerHTML = out.join('\n');
  $('#stats').innerHTML = `<span><b>${totalLines}</b> ${t('lines')}</span><span><b>${numbered}</b> ${t('numbered')}</span>${blanks?`<span><b>${blanks}</b> ${t('blanks')}</span>`:''}`;
}

['#sep','#start','#step','#pad','#skipEmpty','#stripEmpty'].forEach(s => $(s).addEventListener('input', process));
$('#input').addEventListener('input', process);

$('#toolbar').innerHTML = `
  <button class="gz-btn gz-btn-secondary" onclick="$('#input').value='';process()">${t('clear')}</button>
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" id="exBtn">${t('example')}</button>`;
$('#exBtn').addEventListener('click', () => {
  $('#input').value = "function greet(name) {\n  console.log(`Hello, ${name}!`);\n  return true;\n}\n\ngreet('World');";
  process();
});

// Set labels
$('#lblSep').textContent = t('sep');
$('#lblStart').textContent = t('start');
$('#lblStep').textContent = t('step');
$('#lblPad').textContent = t('pad');
$('#lblSkip').textContent = t('skipEmpty');
$('#lblStrip').textContent = t('stripEmpty');

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],

    {icon:'↔️', href:'/text/tabs-to-spaces.html', name:'Tabs to Spaces'},
    {icon:'🔢', href:'/text/number-sorter.html', name:'Number Sorter'},
    {icon:'📊', href:'/text/sort-lines.html', name:'Sort Lines'},
  ]
});
</script>
