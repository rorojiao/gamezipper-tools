<script>
GZI18n.register({
  en:{toolTitle:'AVIF to PNG Converter',toolDesc:'Convert AVIF images to PNG online with full transparency support. Batch convert — free, no upload, no signup.',
    s1:'Select or drag AVIF images',s2:'Click Convert All to PNG',
    s3:'Download each converted PNG file',s4:'Transparency is fully preserved',
    dropHint:'Drop AVIF images here or click to upload',
    files:'files',original:'Original:',converted:'Converted:',
    reset:'↩️ Reset',download:'⬇ Download PNG',
    rAvifConverter:'AVIF Converter',rImageConverter:'Image Converter',rPngCompressor:'PNG Compressor',rJpgConverter:'Image to JPG'},
  zh:{toolTitle:'AVIF 转 PNG 转换器',toolDesc:'将 AVIF 图片在线转为 PNG，完整保留透明通道。支持批量转换 — 免费，无需上传。',
    s1:'选择或拖放 AVIF 图片',s2:'点击「全部转换为 PNG」',
    s3:'下载每张转换后的 PNG 文件',s4:'透明度完整保留',
    dropHint:'拖放 AVIF 图片到此处或点击上传',
    files:'个文件',original:'原始：',converted:'转换后：',
    reset:'↩️ 重置',download:'⬇ 下载 PNG',
    rAvifConverter:'AVIF 转换器',rImageConverter:'图片格式转换',rPngCompressor:'PNG 压缩器',rJpgConverter:'图片转 JPG'}
});
const {t}=GZI18n;
let files=[];let convertedBlobs={};
document.getElementById('dropText').textContent=t('dropHint');
const dz=document.getElementById('dropzone'),fi=document.getElementById('fileIn');
dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('drag-over')});
dz.addEventListener('dragleave',()=>dz.classList.remove('drag-over'));
dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('drag-over');handleFiles(e.dataTransfer.files)});
fi.addEventListener('change',e=>{handleFiles(e.target.files)});
function handleFiles(fl){files=Array.from(fl).filter(f=>f.type.startsWith('image/'));if(!files.length)return;document.getElementById('controls').style.display='block';dz.style.display='none';renderList();updateSummary()}
function fmt(b){return b>1048576?(b/1048576).toFixed(1)+' MB':(b/1024).toFixed(1)+' KB'}
function renderList(){const r=document.getElementById('results');r.innerHTML='';files.forEach((f,i)=>{const card=document.createElement('div');card.className='result-card';const url=URL.createObjectURL(f);card.innerHTML=`<img src="${url}"><div class="meta"><div class="name">${f.name}</div><div class="size">${t('original')} ${fmt(f.size)} · AVIF</div></div><div id="result-info-${i}"></div>`;r.appendChild(card)})}
function updateSummary(){document.getElementById('summary').innerHTML=`<span class="num">${files.length}</span> ${t('files')}`}
function convertAll(){files.forEach((f,i)=>{const img=new Image();img.onload=()=>{const c=document.createElement('canvas');c.width=img.width;c.height=img.height;const ctx=c.getContext('2d');ctx.drawImage(img,0,0);c.toBlob(b=>{const el=document.getElementById('result-info-'+i);if(el){el.innerHTML=`<div class="size">${t('converted')} <span class="num">${fmt(b.size)}</span></div><button class="gz-btn" style="margin-top:.3rem;font-size:.8rem;padding:.3rem .8rem" onclick="downloadBlob(${i})">${t('download')}</button>`;convertedBlobs[i]=b}},'image/png')};img.onerror=()=>{const el=document.getElementById('result-info-'+i);if(el)el.innerHTML=`<span style="color:var(--gz-accent)">⚠ Cannot decode this AVIF in your browser</span>`};img.src=URL.createObjectURL(f)})}
function downloadBlob(i){const b=convertedBlobs[i];if(!b)return;const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=files[i].name.replace(/\.[^.]+$/,'')+'.png';a.click()}
function resetTool(){files=[];convertedBlobs={};document.getElementById('controls').style.display='none';dz.style.display='block';fi.value=''}
GZ.renderToolPage({category:'image',titleKey:'toolTitle',descKey:'toolDesc',
  howToSteps:['s1','s2','s3','s4'],
  related:[
    {href:'/image/avif-converter.html',icon:'🖼️',nameKey:'rAvifConverter'},
    {href:'/image/converter.html',icon:'🔄',nameKey:'rImageConverter'},
    {href:'/image/png-compressor.html',icon:'🖼️',nameKey:'rPngCompressor'},
    {href:'/image/image-to-jpg.html',icon:'🖼️',nameKey:'rJpgConverter'}
  ]
});
</script>
