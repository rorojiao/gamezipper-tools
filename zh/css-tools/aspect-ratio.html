<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>

  <div class="gz-tool-area">

    <div class="ar-controls">
      <div class="ar-control"><label id="lbl-width"></label><input type="number" id="ratioW" value="16" min="1" max="100" oninput="update()"></div>
      <div class="ar-control"><label id="lbl-height"></label><input type="number" id="ratioH" value="9" min="1" max="100" oninput="update()"></div>
      <div class="ar-control"><label id="lbl-boxw"></label><input type="range" id="boxWidth" value="400" min="100" max="500" oninput="update()"></div>
    </div>

</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'CSS Aspect Ratio Generator',
    toolDesc: 'Generate CSS aspect-ratio visually — preview dimensions, pick presets and copy code for images, videos and responsive containers.',
    ratioW: 'Ratio Width',
    ratioH: 'Ratio Height',
    boxWidth: 'Preview Width',
    presets: 'Presets',
    copy: 'Copy',
    copyCode: 'Copy CSS',
    ratio: 'Ratio',
    atWidth: 'At 400px width',
    heightPx: 'Height',
    step1: 'Choose a preset ratio or enter custom values',
    step2: 'Adjust the preview width with the slider',
    step3: 'See the calculated dimensions in real-time',
    step4: 'Copy the generated CSS code to your project',
  },
  zh: {
    toolTitle: 'CSS 宽高比生成器',
    toolDesc: '可视化生成 CSS aspect-ratio 属性 — 预览尺寸、选择预设并复制代码，适用于图片、视频和响应式容器。',
    ratioW: '比例宽度',
    ratioH: '比例高度',
    boxWidth: '预览宽度',
    presets: '预设',
    copy: '复制',
    copyCode: '复制 CSS',
    ratio: '比例',
    atWidth: '在 400px 宽度下',
    heightPx: '高度',
    step1: '选择预设比例或输入自定义数值',
    step2: '用滑块调整预览宽度',
    step3: '实时查看计算出的尺寸',
    step4: '复制生成的 CSS 代码到项目中',
  }
});

const { $, copyText, t } = GZ;

const presets = [
  { label: '1:1', w:1, h:1 },
  { label: '4:3', w:4, h:3 },
  { label: '16:9', w:16, h:9 },
  { label: '21:9', w:21, h:9 },
  { label: '3:2', w:3, h:2 },
  { label: '2:3', w:2, h:3 },
  { label: '9:16', w:9, h:16 },
  { label: '4:5', w:4, h:5 },
  { label: '2.39:1', w:2.39, h:1 },
  { label: 'Golden 1.618', w:1.618, h:1 },
];

$('#lbl-width').textContent = t('ratioW');
$('#lbl-height').textContent = t('ratioH');
$('#lbl-boxw').textContent = t('boxWidth');

// Render presets
let presetHtml = `<span style="color:var(--text2);font-size:.85rem;line-height:2.4">${t('presets')}:</span>`;
presets.forEach((p, i) => {
  presetHtml += `<button class="ar-preset${i===2?' active':''}" onclick="setPreset(${i},this)">${p.label}</button>`;
});
$('#presets').innerHTML = presetHtml;

function setPreset(i, btn) {
  const p = presets[i];
  $('#ratioW').value = p.w;
  $('#ratioH').value = p.h;
  document.querySelectorAll('.ar-preset').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  update();
}

function gcd(a, b) { a = Math.round(a*100); b = Math.round(b*100); while(b) { [a,b] = [b, a%b]; } return a/100; }

function update() {
  const w = parseFloat($('#ratioW').value) || 1;
  const h = parseFloat($('#ratioH').value) || 1;
  const boxW = parseInt($('#boxWidth').value) || 400;
  const boxH = Math.round(boxW * h / w);
  const maxH = 300;
  const scale = Math.min(boxW / 500, boxH / maxH, 1);
  const dispW = Math.round(boxW * scale);
  const dispH = Math.round(boxH * scale);

  $('#preview').style.width = dispW + 'px';
  $('#preview').style.height = dispH + 'px';
  $('#preview').textContent = `${w}:${h}`;

  const g = gcd(w, h);
  const simpleW = Math.round(w/g * 100) / 100;
  const simpleH = Math.round(h/g * 100) / 100;

  const cssCode = `.container {\n  aspect-ratio: ${w} / ${h};\n  width: 100%;\n  max-width: ${boxW}px;\n}`;
  $('#codeOutput').textContent = cssCode;

  // Dimensions
  const heightAt400 = Math.round(400 * h / w);
  const heightAt1920 = Math.round(1920 * h / w);
  $('#dims').innerHTML = `
    <div class="ar-dim-item"><div class="label">${t('ratio')}</div><div class="val">${w}:${h}</div></div>
    <div class="ar-dim-item"><div class="label">400px → ${t('heightPx')}</div><div class="val">${heightAt400}px</div></div>
    <div class="ar-dim-item"><div class="label">1920px → ${t('heightPx')}</div><div class="val">${heightAt1920}px</div></div>`;
}

function copyCode() {
  copyText($('#codeOutput').textContent);
}

update();

GZ.renderToolPage({
  category: 'css',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📐', href:'/css-tools/gradient.html', name:'CSS Gradient'},
    {icon:'🔲', href:'/css-tools/shadow.html', name:'Box Shadow'},
    {icon:'📐', href:'/calc/aspect-ratio.html', name:'Aspect Ratio Calc'},
    {icon:'🔘', href:'/css-tools/border-radius.html', name:'Border Radius'},
  ]
});
</script>
