const { $, copyText, t } = GZ;
let selectedFile = null;

const dz = $('#dropZone');
dz.addEventListener('click', () => $('#fileInput').click());
$('#fileInput').addEventListener('change', e => {
  if (e.target.files[0]) selectFile(e.target.files[0]);
  e.target.value = '';
});
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('dragover'); });
dz.addEventListener('dragleave', () => dz.classList.remove('dragover'));
dz.addEventListener('drop', e => {
  e.preventDefault();
  dz.classList.remove('dragover');
  if (e.dataTransfer.files[0]) selectFile(e.dataTransfer.files[0]);
});
$('#dropText').textContent = t('dropText');

function fmtSize(b) {
  if (b < 1024) return b + ' B';
  if (b < 1024 * 1024) return (b / 1024).toFixed(1) + ' KB';
  return (b / 1048576).toFixed(2) + ' MB';
}

function selectFile(f) {
  if (!f.name.toLowerCase().endsWith('.epub') && f.type !== 'application/epub+zip') {
    GZ.showToast(t('invalidEpub'));
    return;
  }
  selectedFile = f;
  $('#fileInfo').innerHTML = `<div class="eb-file"><span class="ic">📖</span><span class="nm">${f.name}</span><span class="sz">${fmtSize(f.size)}</span></div>`;
}

async function convertEpubToPdf() {
  if (!selectedFile) { GZ.showToast(t('noFile')); return; }
  const prog = $('#progress');
  const bar = $('#progressBar');
  prog.classList.add('show');
  bar.style.width = '5%';
  $('#status').textContent = t('loading');

  try {
    const buf = await selectedFile.arrayBuffer();
    const zip = await JSZip.loadAsync(buf);
    bar.style.width = '20%';

    // Find OPF (container.xml → rootfile)
    const containerXml = await zip.file('META-INF/container.xml')?.async('string');
    if (!containerXml) throw new Error(t('invalidEpub'));
    const opfPath = (containerXml.match(/full-path="([^"]+)"/) || [])[1];
    if (!opfPath) throw new Error(t('invalidEpub'));
    bar.style.width = '30%';

    const opfXml = await zip.file(opfPath)?.async('string');
    if (!opfXml) throw new Error(t('invalidEpub'));
    const opfDir = opfPath.includes('/') ? opfPath.replace(/[^/]+$/, '') : '';
    bar.style.width = '40%';

    // spine order + manifest map
    const manifest = {};
    const itemRe = /<item\b[^>]*\/>/g;
    let m;
    while ((m = itemRe.exec(opfXml)) !== null) {
      const tag = m[0];
      const id = (tag.match(/id="([^"]+)"/) || [])[1];
      const href = (tag.match(/href="([^"]+)"/) || [])[1];
      const mt = (tag.match(/media-type="([^"]+)"/) || [])[1];
      if (id && href) manifest[id] = { href: decodeURIComponent(href), mediaType: mt };
    }
    const spineIds = [];
    const spineRe = /<itemref\b[^>]*idref="([^"]+)"[^>]*\/?>/g;
    while ((m = spineRe.exec(opfXml)) !== null) spineIds.push(m[1]);
    if (!spineIds.length) Object.keys(manifest).forEach(k => { if (manifest[k].mediaType === 'application/xhtml+xml') spineIds.push(k); });

    bar.style.width = '50%';

    // PDF setup
    const { PDFDocument, PDFFont, StandardFonts, rgb } = PDFLib;
    const pdfDoc = await PDFDocument.create();
    const helv = await pdfDoc.embedFont(StandardFonts.Helvetica);
    const helvBold = await pdfDoc.embedFont(StandardFonts.HelveticaBold);
    const helvOblique = await pdfDoc.embedFont(StandardFonts.HelveticaOblique);
    const pageSize = $('#pageSize').value;
    const fontSize = parseInt($('#fontSize').value, 10) || 12;
    const margin = parseInt($('#margin').value, 10) || 50;
    const dims = { A4: [595.28, 841.89], Letter: [612, 792], A5: [419.53, 595.28], Legal: [612, 1008] }[pageSize];
    const pageW = dims[0], pageH = dims[1];
    const contentW = pageW - margin * 2;
    const lineH = fontSize * 1.5;

    // Decode HTML entities
    function decodeEntities(s) {
      const ent = { amp: '&', lt: '<', gt: '>', quot: '"', apos: "'", nbsp: ' ', copy: '©', reg: '®', mdash: '—', ndash: '–', hellip: '…', lsquo: '‘', rsquo: '’', ldquo: '“', rdquo: '”' };
      return s.replace(/&(#x?[0-9a-f]+|[a-z]+);/gi, (full, code) => {
        if (code[0] === '#') {
          const num = code[1] === 'x' || code[1] === 'X' ? parseInt(code.slice(2), 16) : parseInt(code.slice(1), 10);
          return String.fromCodePoint(num);
        }
        return ent[code.toLowerCase()] || full;
      });
    }

    // Strip HTML, collect inline styled text
    function htmlToRuns(html) {
      const runs = [];
      html = html.replace(/<img[^>]*>/gi, ' ');
      html = html.replace(/<\/(h[1-6]|p|div|li|tr|br|blockquote)>/gi, '\n');
      html = html.replace(/<br\s*\/?>/gi, '\n');
      const re = /<[^>]+>|([^<]+)/g;
      let bold = false, italic = false;
      let match;
      while ((match = re.exec(html)) !== null) {
        if (match[0][0] === '<') {
          const tag = match[0].toLowerCase();
          if (/^<b(\b|>)/.test(tag) || /^<strong(\b|>)/.test(tag) || /^<h[1-6](\b|>)/.test(tag)) bold = true;
          if (/^<\/b>/.test(tag) || /^<\/strong>/.test(tag) || /^<\/h[1-6]>/.test(tag)) bold = false;
          if (/^<i(\b|>)/.test(tag) || /^<em(\b|>)/.test(tag)) italic = true;
          if (/^<\/i>/.test(tag) || /^<\/em>/.test(tag)) italic = false;
        } else if (match[1]) {
          runs.push({ text: match[1], bold, italic });
        }
      }
      return runs;
    }

    function pickFont(r) {
      return r.bold && r.italic ? helvBold : r.bold ? helvBold : r.italic ? helvOblique : helv;
    }

    let page = null;
    let y = 0;
    const total = spineIds.length;

    function newPage() {
      page = pdfDoc.addPage([pageW, pageH]);
      y = pageH - margin;
    }

    function ensureSpace(needed) {
      if (!page || y - needed < margin) newPage();
    }

    function drawHeading(text) {
      const f = helvBold;
      const size = Math.max(fontSize + 4, 16);
      ensureSpace(size * 2.2);
      y -= size * 0.8;
      // Wrap heading
      const words = text.split(/\s+/);
      let line = '';
      for (const w of words) {
        const tryLine = line ? line + ' ' + w : w;
        if (f.widthOfTextAtSize(tryLine, size) > contentW) {
          page.drawText(line, { x: margin, y, size, font: f, color: rgb(0.1, 0.1, 0.15) });
          y -= size * 1.5;
          ensureSpace(size * 1.5);
          line = w;
        } else line = tryLine;
      }
      if (line) { page.drawText(line, { x: margin, y, size, font: f, color: rgb(0.1, 0.1, 0.15) }); y -= size * 1.5; }
      y -= fontSize * 0.6;
    }

    function drawParagraph(runs) {
      // flatten runs into words with style
      const words = [];
      for (const r of runs) {
        const parts = decodeEntities(r.text).split(/(\s+)/);
        for (const p of parts) if (p !== '') words.push({ text: p, bold: r.bold, italic: r.italic });
      }
      // split on explicit newlines
      let lineRuns = [];
      const flushLine = () => {
        if (!lineRuns.length) return;
        ensureSpace(lineH);
        let x = margin;
        for (const r of lineRuns) {
          const f = pickFont(r);
          page.drawText(r.text, { x, y, size: fontSize, font: f, color: rgb(0.12, 0.12, 0.12) });
          x += f.widthOfTextAtSize(r.text, fontSize);
        }
        y -= lineH;
        lineRuns = [];
      };
      for (const w of words) {
        if (/\n/.test(w.text)) {
          flushLine();
        } else {
          const f = pickFont(w);
          const testLine = lineRuns.concat([w]);
          const width = testLine.reduce((s, r) => s + pickFont(r).widthOfTextAtSize(r.text, fontSize), 0);
          if (width > contentW && lineRuns.length) {
            flushLine();
            lineRuns.push(w);
          } else {
            lineRuns.push(w);
          }
        }
      }
      flushLine();
      y -= lineH * 0.4; // paragraph gap
    }

    newPage();

    for (let i = 0; i < total; i++) {
      const item = manifest[spineIds[i]];
      if (!item || item.mediaType !== 'application/xhtml+xml') continue;
      const filePath = (opfDir + item.href).replace(/^\.\//, '');
      const html = await zip.file(filePath)?.async('string');
      if (!html) continue;
      bar.style.width = (50 + Math.round((i / total) * 45)) + '%';
      $('#status').textContent = `${t('rendering')} (${i + 1}/${total})`;

      // extract body
      const bodyMatch = html.match(/<body[^>]*>([\s\S]*?)<\/body>/i);
      const body = bodyMatch ? bodyMatch[1] : html;
      // chapters by headings
      const chunks = body.split(/(<h[1-6][^>]*>[\s\S]*?<\/h[1-6]>)/i);
      for (const chunk of chunks) {
        if (!chunk) continue;
        const hMatch = chunk.match(/^<h([1-6])[^>]*>([\s\S]*?)<\/h[1-6]>/i);
        if (hMatch) {
          // strip inner tags from heading text
          const hText = decodeEntities(hMatch[2].replace(/<[^>]+>/g, ' ').replace(/\s+/g, ' ').trim());
          if (hText) drawHeading(hText);
        } else {
          const runs = htmlToRuns(chunk);
          if (runs.some(r => r.text.trim())) drawParagraph(runs);
        }
      }
    }

    bar.style.width = '97%';
    const pdfBytes = await pdfDoc.save();
    const blob = new Blob([pdfBytes], { type: 'application/pdf' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = selectedFile.name.replace(/\.epub$/i, '') + '.pdf';
    a.click();
    URL.revokeObjectURL(url);
    bar.style.width = '100%';
    $('#status').innerHTML = `<span style="color:var(--gz-success)">${t('done')}</span>`;
    setTimeout(() => prog.classList.remove('show'), 1500);
  } catch (e) {
    $('#status').innerHTML = `<span style="color:var(--gz-accent)">${t('error')}${e.message}</span>`;
    prog.classList.remove('show');
  }
}

function clearAll() {
  selectedFile = null;
  $('#fileInfo').innerHTML = '';
  $('#status').textContent = '';
  $('#progress').classList.remove('show');
}

$('#toolbar').innerHTML = `<button class="gz-btn" onclick="convertEpubToPdf()">${t('convert')}</button><button class="gz-btn gz-btn-secondary" onclick="clearAll()">${t('clear')}</button>`;
$('#lbl-pagesize').textContent = t('lblPagesize');
$('#lbl-fontsize').textContent = t('lblFontsize');
$('#lbl-margin').textContent = t('lblMargin');

</script>
