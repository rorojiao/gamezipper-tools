<style>
.stage{width:100%;min-height:280px;display:flex;align-items:center;justify-content:center;flex-direction:column;border-radius:16px;background:var(--glass2);border:1px solid var(--border);padding:30px;text-align:center}
.word-display{font-size:3em;font-weight:900;color:var(--gz-accent);letter-spacing:.03em;line-height:1.2;word-break:break-word;text-align:center;max-width:90%}
.btn-row{display:flex;gap:16px;justify-content:center;margin-top:24px;flex-wrap:wrap}
.big-btn{font-size:1.3em;padding:14px 36px;border-radius:12px;border:none;font-weight:700;cursor:pointer;transition:transform .1s}
.big-btn:hover{transform:translateY(-2px)}
.btn-seen{background:#00d672;color:#000}
.btn-new{background:#4dabf7;color:#000}
.lvl-badge{display:inline-block;background:var(--accent);color:#000;padding:4px 16px;border-radius:20px;font-weight:700;font-size:.9em;margin-bottom:12px}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin:16px 0}
.stat{background:var(--glass2);border:1px solid var(--border);border-radius:10px;padding:12px;text-align:center}
.stat .num{font-size:1.6em;font-weight:700;color:var(--gz-accent)}
.stat .lbl{font-size:.78em;color:var(--text2);margin-top:4px}
.lives{font-size:1.4em;color:#e94560;letter-spacing:.1em}
.tip{background:rgba(78,205,196,.08);border-left:3px solid var(--accent);padding:10px 14px;border-radius:6px;font-size:.88em;margin-top:14px}
.stage.flash-correct{animation:flashg .3s}
.stage.flash-wrong{animation:flashr .3s}
@keyframes flashg{0%,100%{background:var(--glass2)}50%{background:rgba(0,214,114,.15)}}
@keyframes flashr{0%,100%{background:var(--glass2)}50%{background:rgba(233,69,96,.15)}}
</style>

<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"How does the verbal memory test work?","acceptedAnswer":{"@type":"Answer","text":"Words appear one at a time. For each word, decide whether you have seen it before in this session (click SEEN) or if it is new (click NEW). You have 3 lives — wrong answers cost a life."}},{"@type":"Question","name":"What is a good verbal memory score?","acceptedAnswer":{"@type":"Answer","text":"Recognizing 20+ words without error is average. Reaching 40-50 words is good. Over 80 words is exceptional. The world record on Human Benchmark exceeds 200 words."}},{"@type":"Question","name":"How can I improve my verbal memory?","acceptedAnswer":{"@type":"Answer","text":"Stay focused, avoid rushing, and try to mentally group words by category (animals, colors, actions). Regular practice and reading also expand your working memory capacity."}},{"@type":"Question","name":"Why only 3 lives?","acceptedAnswer":{"@type":"Answer","text":"Three lives balances difficulty — you can make a couple of mistakes but still need to be accurate. It prevents lucky guessing from inflating scores indefinitely."}}]}</script>

<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">

    <div class="stats" id="stats"></div>

  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Verbal Memory Test',
    toolDesc: 'Words flash one at a time. Have you seen this word before, or is it new? Test your verbal working memory. You have 3 lives — average is 20+ words.',
    start: 'Click to start', seen: 'SEEN', isNew: 'NEW',
    score: 'Score', lives: 'Lives', best: 'Best', restart: 'Restart',
    gameOver: 'Game Over', correct: '✓ Correct!', wrong: '✗ Wrong!',
    tip: 'Seen or New? You have 3 lives. Wrong answers cost a life.',
    step1: 'Click the stage to start. A word appears',
    step2: 'Decide: have you seen this word before in this round?',
    step3: 'Click SEEN if yes, NEW if this is the first time',
    step4: 'Three wrong answers end the game. Score = correct answers',
  },
  zh: {
    toolTitle: '词汇记忆测试',
    toolDesc: '词汇逐一闪现。你之前见过这个词吗，还是新词？测试你的词汇工作记忆。你有 3 条命 — 平均水平为 20+ 个词。',
    start: '点击开始', seen: '见过', isNew: '新的',
    score: '得分', lives: '生命', best: '最佳', restart: '重新开始',
    gameOver: '游戏结束', correct: '✓ 正确！', wrong: '✗ 错误！',
    tip: '见过还是新的？你有 3 条命。答错失去一条命。',
    step1: '点击区域开始。屏幕显示一个词',
    step2: '判断：这个词你在这轮中见过吗？',
    step3: '见过点"见过"，没见过点"新的"',
    step4: '答错 3 次游戏结束。得分 = 正确次数',
  }
});

const { $, t } = GZ;
const WORD_BANK = ['apple','river','cloud','dragon','sunset','forest','whisper','castle','thunder','mirror','velvet','candle','ocean','pencil','garden','silent','crystal','shadow','summer','window','bridge','flower','planet','rocket','tiger','silver','golden','puzzle','secret','vintage','circle','nature','breeze','frost','ember','jungle','meadow','nectar','orchid','pebble','quartz','ribbon','spider','ticket','umber','violet','walnut','yacht','zebra','amber','bottle','canyon','desert','eagle','feather','gravel','horizon','island','jacket','kingdom','lantern','marble','needle','orange','palace','quiver','record','sculpt','temple','urgent','valley','winter','xylophone','yellow','zigzag','autumn','breeze','copper','dancer','echo','falcon','glimpse','harbor','ignite','journey','kettle','ladder','magnet','novel','oxygen','painter','quartz','random','safari','tempest','unique','vortex','wander','xenon','yearly','zenith','blossom','cascade','dolphin','enigma','fragile','granite','hollow','ignite','jasmine','kingdom','lagoon','marble','nomad','obsidian','paradox','quicksand','rhythm','serene','tangible','ultimatum','velocity','willow','xerox','yonder','zephyr','blaze','circuit','dawn','effort','fringe','glimmer','haven','ivory','jewel','kindle','lunar','mystery','nest','oasis','petal','quench','radiant','sapphire','tranquil','umbra','vivid','whisper','xenith','yarrow','zodiac'];
let seenWords = new Set();
let currentWord = '';
let score = 0;
let lives = 3;
let best = 0;
let playing = false;

function pickWord() {
  // 40% chance to show a seen word (if any exist), 60% new
  if (seenWords.size > 2 && Math.random() < 0.4) {
    const arr = [...seenWords];
    return arr[Math.floor(Math.random() * arr.length)];
  }
  let w;
  let tries = 0;
  do { w = WORD_BANK[Math.floor(Math.random() * WORD_BANK.length)]; tries++; }
  while (seenWords.has(w) && tries < 50);
  return w;
}

function nextWord() {
  currentWord = pickWord();
  const stage = $('#stage');
  stage.className = 'stage';
  stage.innerHTML = `
    <span class="lvl-badge">${t('score')}: ${score}</span>
    <div class="word-display">${currentWord}</div>
    <div class="btn-row">
      <button class="big-btn btn-seen" onclick="answer(true)">${t('seen')}</button>
      <button class="big-btn btn-new" onclick="answer(false)">${t('isNew')}</button>
    </div>`;
}

function answer(userSaysSeen) {
  const wasSeen = seenWords.has(currentWord);
  const correct = (userSaysSeen === wasSeen);
  const stage = $('#stage');
  stage.className = 'stage ' + (correct ? 'flash-correct' : 'flash-wrong');
  if (correct) {
    score++;
    if (!wasSeen) seenWords.add(currentWord);
  } else {
    lives--;
    if (wasSeen) { /* they said new but it was seen */ }
    else { seenWords.add(currentWord); /* show answer then add */ }
  }
  if (score > best) best = score;
  renderStats();
  if (lives <= 0) { gameOver(); return; }
  setTimeout(nextWord, 250);
}

function gameOver() {
  playing = false;
  const stage = $('#stage');
  stage.className = 'stage';
  stage.innerHTML = `
    <div style="font-size:2em;font-weight:900;color:#e94560">${t('gameOver')}</div>
    <div style="font-size:1.4em;margin:12px 0">${t('score')}: <b style="color:var(--gz-accent)">${score}</b></div>
    <button class="gz-btn" onclick="restart()" style="font-size:1.2em;padding:12px 28px">🔄 ${t('restart')}</button>`;
}

function restart() {
  seenWords = new Set();
  score = 0; lives = 3;
  playing = true;
  renderStats();
  nextWord();
}

function renderStats() {
  $('#stats').innerHTML = `
    <div class="stat"><div class="num">${score}</div><div class="lbl">${t('score')}</div></div>
    <div class="stat"><div class="num" style="color:#e94560">${'❤'.repeat(Math.max(0,lives))}${'🖤'.repeat(3-Math.max(0,lives))}</div><div class="lbl">${t('lives')}</div></div>
    <div class="stat"><div class="num">${best}</div><div class="lbl">${t('best')}</div></div>`;
}

function init() {
  playing = false;
  $('#stage').className = 'stage';
  $('#stage').innerHTML = `<div style="font-size:1.6em;font-weight:700;color:var(--text2)">${t('start')}</div>`;
  renderStats();
}

$('#stage').addEventListener('click', (e) => {
  if (!playing && !e.target.closest('.big-btn') && !e.target.closest('.gz-btn')) init2start();
});
function init2start(){ if(!playing) restart(); }

$('#toolbar').innerHTML = `<button class="gz-btn" onclick="init()">🔄 ${t('restart')}</button>`;

GZ.renderToolPage({
  category: 'fun',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🔢', href:'/fun/number-memory-test.html', name:'Number Memory Test'},
    {icon:'🧠', href:'/fun/visual-memory-test.html', name:'Visual Memory Test'},
    {icon:'⚡', href:'/fun/reaction-time.html', name:'Reaction Time Test'},
    {icon:'🐵', href:'/fun/chimp-test.html', name:'Chimp Test'},
  ]
});
init();
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
