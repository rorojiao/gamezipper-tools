<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is modular arithmetic?", "acceptedAnswer": {"@type": "Answer", "text": "Modular arithmetic works with remainders after division. The expression a mod n (read 'a modulo n') is the remainder when a is divided by n. The result is always in the range 0 to n-1. Modular arithmetic underpins clocks, calendars and modern cryptography."}}, {"@type": "Question", "name": "What is a modular inverse?", "acceptedAnswer": {"@type": "Answer", "text": "The modular inverse of a modulo n is a number x such that (a * x) mod n = 1. An inverse exists only when a and n are coprime, that is gcd(a, n) = 1. This calculator uses the extended Euclidean algorithm to find it."}}, {"@type": "Question", "name": "How is modular exponentiation computed?", "acceptedAnswer": {"@type": "Answer", "text": "Computing a^b mod n directly would create astronomically large numbers, so we use the fast square-and-multiply algorithm. It processes the exponent bit by bit, squaring and reducing mod n at each step, which is how RSA encryption stays efficient."}}, {"@type": "Question", "name": "Can this handle very large numbers?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. The calculator uses JavaScript BigInt, so it works with integers of hundreds or thousands of digits. This makes it suitable for cryptography homework and RSA-style computations without losing precision."}}]}</script>

    result: 'Result',

    step3: 'For power, b is the exponent; for add/sub/mul, b is the second operand',
    step4: 'Read the reduced result and the step-by-step explanation',
  },
  zh: {
    toolTitle: '模运算计算器',
    toolDesc: '计算 a mod n、模加、模减、模乘、模幂、模逆元和最大公约数，使用 BigInt 精度。适合数论和密码学 — 免费、浏览器本地运行。',
    mod: 'a mod n',
    add: '(a + b) mod n',
    sub: '(a − b) mod n',
    mul: '(a · b) mod n',
    pow: 'a^b mod n',
    inv: 'a⁻¹ mod n',
    gcd: 'gcd(a, n)',
    needPositive: '模数 n 必须为正整数。',
    needInt: '请输入有效的整数。',
    noInverse: '不存在逆元：a 和 n 必须互质（gcd = 1）。当前 gcd(a, n) = ',
    coprime: 'a 和 n 互质，因此存在逆元。',
    result: '结果',
    steps: '步骤',
    euclid: '扩展欧几里得算法：',
    squareMul: '平方-乘法（快速幂）：',
    step1: '输入整数 a、b（双数运算）和正模数 n',
    step2: '选择运算 — 一元运算（取模、逆元、gcd）仅使用 a 和 n',
    step3: '幂运算时 b 为指数；加减乘时 b 为第二个操作数',
    step4: '查看约简后的结果和分步解释',
  }
});

const { $, copyText, t } = GZ;
let currentOp = 'mod';

function parse(s){ s = String(s).trim().replace(/[,\s]/g,''); if(s===''||!/^-?\d+$/.test(s)) return null; return BigInt(s); }
function modPos(x, n){ // always return non-negative
  let r = x % n;
  if(r < 0n) r += n;
  return r;
}

function gcd(a, b){
  a = a<0n?-a:a; b = b<0n?-b:b;
  while(b){ [a,b] = [b, a%b]; }
  return a;
}
// extended euclid: returns [g, x, y] with a*x + b*y = g
function egcd(a, b){
  if(b === 0n) return [a, 1n, 0n];
  const [g, x1, y1] = egcd(b, a%b);
  return [g, y1, x1 - (a/b)*y1];
}
function modInverse(a, n){
  const [g, x] = egcd(((a%n)+n)%n, n);
  if(g !== 1n) return null;
  return modPos(x, n);
}
function modPow(base, exp, n){
  base = modPos(base, n);
  let result = 1n;
  let b = base;
  let e = exp;
  while(e > 0n){
    if(e & 1n) result = (result*b) % n;
    e >>= 1n;
    b = (b*b) % n;
  }
  return result;
}

function render(value, expr, steps){
  $('#result').innerHTML = `<div class="res-box">
    <div style="font-size:.8em;color:var(--text2)">${expr}</div>
    <div class="big">${value}</div>
    ${steps ? `<div class="steplist"><strong>${t('steps')}:</strong><br>${steps}</div>` : ''}
  </div>`;
}

function compute(op){
  currentOp = op;
  document.querySelectorAll('#opgrid button').forEach(b=>b.classList.toggle('active', b.dataset.op===op));
  const a = parse($('#a').value); const b = parse($('#b').value); const n = parse($('#n').value);
  if(a===null||n===null){ $('#result').innerHTML=`<div class="err">${t('needInt')}</div>`; return; }
  if(n <= 0n){ $('#result').innerHTML=`<div class="err">${t('needPositive')}</div>`; return; }

  if(op==='mod'){
    const r = modPos(a,n);
    render(r.toString(), `a mod n`, `${a} ÷ ${n} = ${a/n} remainder ${a%n}<br>⇒ <strong>${a} mod ${n} = ${r}</strong>`);
  } else if(op==='add'){
    if(b===null){ $('#result').innerHTML=`<div class="err">${t('needInt')}</div>`; return; }
    const r = modPos(a+b, n);
    render(r.toString(), `(a + b) mod n`, `(${a} + ${b}) mod ${n} = ${a+b} mod ${n} = <strong>${r}</strong>`);
  } else if(op==='sub'){
    if(b===null){ $('#result').innerHTML=`<div class="err">${t('needInt')}</div>`; return; }
    const r = modPos(a-b, n);
    render(r.toString(), `(a − b) mod n`, `(${a} − ${b}) mod ${n} = ${a-b} mod ${n} = <strong>${r}</strong>`);
  } else if(op==='mul'){
    if(b===null){ $('#result').innerHTML=`<div class="err">${t('needInt')}</div>`; return; }
    const r = modPos(a*b, n);
    render(r.toString(), `(a · b) mod n`, `(${a} · ${b}) mod ${n} = ${a*b} mod ${n} = <strong>${r}</strong>`);
  } else if(op==='pow'){
    if(b===null||b<0n){ $('#result').innerHTML=`<div class="err">${t('needInt')}</div>`; return; }
    const r = modPow(a, b, n);
    render(r.toString(), `a^b mod n`, `${t('squareMul')}<br>${a}<sup>${b}</sup> mod ${n} = <strong>${r}</strong>`);
  } else if(op==='inv'){
    const g = gcd(((a%n)+n)%n, n);
    const inv = modInverse(a, n);
    if(inv===null){
      render('—', `a⁻¹ mod n`, `${t('noInverse')}${g}.<br>${t('euclid')} gcd(${a}, ${n}) = ${g} ≠ 1`);
    } else {
      // verify
      render(inv.toString(), `a⁻¹ mod n`, `${t('coprime')}<br>${t('euclid')} ${a} · ${inv} = ${a*inv}; ${a*inv} mod ${n} = <strong>${modPos(a*inv,n)}</strong> ✓`);
    }
  } else if(op==='gcd'){
    const g = gcd(a, n);
    const coprime = g===1n;
    render(g.toString(), `gcd(a, n)`, `${t('euclid')} gcd(${a}, ${n}) = <strong>${g}</strong>${coprime?' · '+t('coprime'):''}`);
  }
}

const ops = [['mod','a mod n'],['add','+'],['sub','−'],['mul','×'],['pow','a^b'],['inv','a⁻¹'],['gcd','gcd']];
$('#opgrid').innerHTML = ops.map(([k,_])=>`<button data-op="${k}" onclick="compute('${k}')">${t(k)}</button>`).join('');
['a','b','n'].forEach(id=>$('#'+id).addEventListener('input', ()=>compute(currentOp)));
compute('mod');
</script>
