<script>
GZI18n.register({
  en: {
    toolTitle: 'Venn Diagram Generator',
    toolDesc: 'Create 2 or 3 circle Venn diagrams with custom labels, colors and overlapping regions. Download as PNG — free, no signup.',
    circles: 'Circles', size: 'Canvas Size (px)',
    setA: 'Set A Label', setB: 'Set B Label', setC: 'Set C Label',
    overlapAB: 'A ∩ B', overlapAC: 'A ∩ C', overlapBC: 'B ∩ C', overlapABC: 'A ∩ B ∩ C',
    title: 'Title',
    colorA: 'Color A', colorB: 'Color B', colorC: 'Color C',
    step1: 'Choose 2 or 3 circles from the dropdown',
    step2: 'Enter labels for each set and overlapping regions',
    step3: 'Customize colors for each circle',
    step4: 'Click Download PNG to save your Venn diagram',
  },
  zh: {
    toolTitle: '维恩图生成器',
    toolDesc: '创建 2 圈或 3 圈维恩图，自定义标签、颜色和重叠区域，下载为 PNG — 免费无需注册。',
    circles: '圈数', size: '画布大小（像素）',
    setA: '集合 A 标签', setB: '集合 B 标签', setC: '集合 C 标签',
    overlapAB: 'A ∩ B', overlapAC: 'A ∩ C', overlapBC: 'B ∩ C', overlapABC: 'A ∩ B ∩ C',
    title: '标题',
    colorA: '颜色 A', colorB: '颜色 B', colorC: '颜色 C',
    step1: '从下拉菜单选择 2 或 3 个圈',
    step2: '输入每个集合和重叠区域的标签',
    step3: '自定义每个圈的颜色',
    step4: '点击「下载 PNG」保存维恩图',
  }
});

const { $, copyText, t } = GZ;
const canvas = $('#venn-canvas');
const ctx = canvas.getContext('2d');

$('#lbl-circles').textContent = t('circles');
$('#lbl-size').textContent = t('size');

function renderLabels() {
  const n = parseInt($('#num-circles').value);
  const area = $('#labels-area');
  const fields = [
    {id:'venn-title', lbl:'title', val:'Venn Diagram'},
    {id:'venn-a', lbl:'setA', val:'Set A'},
    {id:'venn-b', lbl:'setB', val:'Set B'},
  ];
  if (n === 3) fields.push({id:'venn-c', lbl:'setC', val:'Set C'});
  fields.push({id:'venn-ab', lbl:'overlapAB', val:''});
  if (n === 3) {
    fields.push({id:'venn-ac', lbl:'overlapAC', val:''});
    fields.push({id:'venn-bc', lbl:'overlapBC', val:''});
    fields.push({id:'venn-abc', lbl:'overlapABC', val:''});
  }

  area.innerHTML = '';
  fields.forEach(f => {
    const div = document.createElement('div');
    div.innerHTML = `<label>${t(f.lbl)}</label><input id="${f.id}" value="${f.val}" oninput="draw()">`;
    area.appendChild(div);
  });

  // Color picks
  const cp = $('#color-picks');
  const colors = [
    {id:'color-a', lbl:'colorA', val:'#4ecdc4'},
    {id:'color-b', lbl:'colorB', val:'#ff6b6b'},
  ];
  if (n === 3) colors.push({id:'color-c', lbl:'colorC', val:'#ffd93d'});
  cp.innerHTML = '';
  colors.forEach(c => {
    const div = document.createElement('div');
    div.innerHTML = `<label>${t(c.lbl)}</label><input type="color" id="${c.id}" value="${c.val}" onchange="draw()">`;
    cp.appendChild(div);
  });
}

function hexToRgba(hex, alpha) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${alpha})`;
}

function draw() {
  const n = parseInt($('#num-circles').value);
  const size = parseInt($('#venn-size').value) || 500;
  canvas.width = size;
  canvas.height = size;

  ctx.clearRect(0,0,size,size);
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0,0,size,size);

  const ca = $('#color-a')?.value || '#4ecdc4';
  const cb = $('#color-b')?.value || '#ff6b6b';
  const cc = $('#color-c')?.value || '#ffd93d';

  const cx = size/2, cy = size/2 + 20;
  const r = size * 0.25;
  const offset = r * 0.55;

  if (n === 2) {
    const ax = cx - offset, bx = cx + offset;
    // Circle A
    ctx.beginPath(); ctx.arc(ax, cy, r, 0, Math.PI*2);
    ctx.fillStyle = hexToRgba(ca, 0.35); ctx.fill();
    ctx.strokeStyle = ca; ctx.lineWidth = 2.5; ctx.stroke();
    // Circle B
    ctx.beginPath(); ctx.arc(bx, cy, r, 0, Math.PI*2);
    ctx.fillStyle = hexToRgba(cb, 0.35); ctx.fill();
    ctx.strokeStyle = cb; ctx.lineWidth = 2.5; ctx.stroke();

    // Labels
    ctx.font = 'bold 18px system-ui, sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillStyle = '#333';
    ctx.font = 'bold 16px system-ui, sans-serif';
    const la = $('#venn-a')?.value || '';
    const lb = $('#venn-b')?.value || '';
    const lab = $('#venn-ab')?.value || '';
    if (la) ctx.fillText(la, ax - offset*0.7, cy);
    if (lb) ctx.fillText(lb, bx + offset*0.7, cy);
    if (lab) { ctx.fillStyle = '#555'; ctx.font = '14px system-ui, sans-serif'; ctx.fillText(lab, cx, cy); }
  } else {
    const positions = [
      {x: cx, y: cy - offset*0.85},
      {x: cx - offset, y: cy + offset*0.5},
      {x: cx + offset, y: cy + offset*0.5},
    ];
    const colors = [ca, cb, cc];
    // Draw circles
    positions.forEach((p,i) => {
      ctx.beginPath(); ctx.arc(p.x, p.y, r, 0, Math.PI*2);
      ctx.fillStyle = hexToRgba(colors[i], 0.3); ctx.fill();
      ctx.strokeStyle = colors[i]; ctx.lineWidth = 2.5; ctx.stroke();
    });

    // Labels
    ctx.font = 'bold 15px system-ui, sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillStyle = '#333';
    const la = $('#venn-a')?.value || '';
    const lb = $('#venn-b')?.value || '';
    const lc = $('#venn-c')?.value || '';
    const lab = $('#venn-ab')?.value || '';
    const lac = $('#venn-ac')?.value || '';
    const lbc = $('#venn-bc')?.value || '';
    const labc = $('#venn-abc')?.value || '';

    if (la) ctx.fillText(la, positions[0].x, positions[0].y - r*0.45);
    if (lb) ctx.fillText(lb, positions[1].x - r*0.45, positions[1].y + r*0.25);
    if (lc) ctx.fillText(lc, positions[2].x + r*0.45, positions[2].y + r*0.25);

    ctx.font = '13px system-ui, sans-serif'; ctx.fillStyle = '#555';
    if (lab) ctx.fillText(lab, (positions[0].x+positions[1].x)/2 - 12, (positions[0].y+positions[1].y)/2 + 5);
    if (lac) ctx.fillText(lac, (positions[0].x+positions[2].x)/2 + 12, (positions[0].y+positions[2].y)/2 + 5);
    if (lbc) ctx.fillText(lbc, (positions[1].x+positions[2].x)/2, (positions[1].y+positions[2].y)/2 - 10);
    if (labc) { ctx.font = 'bold 13px system-ui, sans-serif'; ctx.fillStyle = '#333'; ctx.fillText(labc, cx, cy); }
  }

  // Title
  const title = $('#venn-title')?.value || '';
  if (title) {
    ctx.font = 'bold 22px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = '#222';
    ctx.fillText(title, size/2, 35);
  }
}

function downloadPNG() {
  const link = document.createElement('a');
  link.download = 'venn-diagram.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="downloadPNG()">${t('download')} PNG</button>
  <button class="gz-btn gz-btn-secondary" onclick="draw()">${t('generate')}</button>`;

renderLabels();
draw();

GZ.renderToolPage({
  category: 'image',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📊', href:'/image/chart-maker.html', name:'Chart Maker'},
    {icon:'🖼️', href:'/image/gradient-image.html', name:'Gradient Image'},
    {icon:'🎨', href:'/image/blob.html', name:'Blob Generator'},
    {icon:'📐', href:'/image/aspect-ratio-visualizer.html', name:'Aspect Ratio'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
