const { $, t, copyText, getLang } = GZ;

function hexToRgb(hex){
  const m = hex.replace('#','');
  return [parseInt(m.slice(0,2),16), parseInt(m.slice(2,4),16), parseInt(m.slice(4,6),16)];
}
function hexToHsl(hex){
  let [r,g,b] = hexToRgb(hex).map(x=>x/255);
  const max = Math.max(r,g,b), min = Math.min(r,g,b);
  let h,s,l = (max+min)/2;
  if(max===min){h=s=0;}
  else{
    const d = max-min;
    s = l>0.5 ? d/(2-max-min) : d/(max+min);
    switch(max){
      case r: h = (g-b)/d + (g<b?6:0); break;
      case g: h = (b-r)/d + 2; break;
      case b: h = (r-g)/d + 4; break;
    }
    h /= 6;
  }
  return [Math.round(h*360), Math.round(s*100), Math.round(l*100)];
}

function renderMoods(){
  $('#moods').innerHTML = MOODS.map(m =>
    `<div class="mood-btn ${m.id===currentMood?'active':''}" onclick="selectMood('${m.id}')"><span class="icon">${m.icon}</span>${m.name}</div>`
  ).join('');
}

function selectMood(id){
  currentMood = id;
  renderMoods();
  const m = MOODS.find(x=>x.id===id);
  $('#info').innerHTML = `<h3>${m.icon} ${m.name}</h3><p>${m.desc}</p>`;
  const pal = PALETTES[id];
  const lang = getLang();
  const nameKey = lang==='zh' ? ['背景','浅色','主色','强调','深色'] : ['Background','Light','Primary','Accent','Deep'];
  $('#palette').innerHTML = pal.map((hex,i) => {
    const [r,g,b] = hexToRgb(hex);
    const [h,s,l] = hexToHsl(hex);
    return `<div class="mood-swatch" style="background:${hex}" onclick="copyText('${hex}')" title="Click to copy">
      <div class="name">${nameKey[i]}</div>
      <div class="hex">${hex.toUpperCase()}</div>
      <div style="opacity:0.8;font-size:0.7em">rgb(${r},${g},${b})</div>
      <div style="opacity:0.8;font-size:0.7em">hsl(${h},${s}%,${l}%)</div>
    </div>`;
  }).join('');
  const tip = m.tips;
  $('#tips').innerHTML = `
    <div class="mood-tip"><strong>${tip.bg ? '🎨 ' + (lang==='zh'?'背景':'Background') : ''}</strong>${tip.bg||''}</div>
    <div class="mood-tip"><strong>🔘 ${lang==='zh'?'按钮':'CTA Button'}</strong>${tip.cta}</div>
    <div class="mood-tip"><strong>📝 ${lang==='zh'?'正文':'Body text'}</strong>${tip.text}</div>`;
}
