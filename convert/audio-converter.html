<script>
GZI18n.register({
  en: {
    toolTitle: 'Audio Converter',
    toolDesc: 'Convert audio files between WAV, OGG, WebM, AAC and more. Free, private — runs entirely in your browser.',
    dropLabel: 'Drop an audio file here or click to upload',
    format: 'Output Format',
    sampleRate: 'Sample Rate (Hz)',
    convert: 'Convert Audio',
    converting: 'Converting...',
    origSize: 'Original',
    newSize: 'Converted',
    download: 'Download Converted Audio',
    step1: 'Upload an audio file (MP3, WAV, OGG, FLAC, AAC)',
    step2: 'Choose the output format and sample rate',
    step3: 'Click "Convert Audio" to process',
    step4: 'Preview and download the converted audio',
  },
  zh: {
    toolTitle: '音频格式转换器',
    toolDesc: '在 WAV、OGG、WebM、AAC 等格式之间转换音频文件。免费、私密，完全浏览器本地处理。',
    dropLabel: '拖拽音频文件到此处或点击上传',
    format: '输出格式',
    sampleRate: '采样率 (Hz)',
    convert: '转换音频',
    converting: '转换中...',
    origSize: '原始大小',
    newSize: '转换后大小',
    download: '下载转换后的音频',
    step1: '上传音频文件（MP3、WAV、OGG、FLAC、AAC）',
    step2: '选择输出格式和采样率',
    step3: '点击「转换音频」开始处理',
    step4: '预览并下载转换后的音频',
  }
});

const { $, t } = GZ;

// UI setup
$('#dropLabel').textContent = t('dropLabel');
$('#lblFormat').textContent = t('format');
$('#lblSample').textContent = t('sampleRate');
$('#btnConvert').textContent = t('convert');

const drop = $('#drop');
const fileInput = $('#fileInput');
const audio = $('#audioPreview');

drop.addEventListener('click', () => fileInput.click());
drop.addEventListener('dragover', e => { e.preventDefault(); drop.classList.add('drag'); });
drop.addEventListener('dragleave', () => drop.classList.remove('drag'));
drop.addEventListener('drop', e => {
  e.preventDefault(); drop.classList.remove('drag');
  if (e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', e => { if (e.target.files[0]) loadFile(e.target.files[0]); });

$('#sampleRate').addEventListener('input', e => { $('#valSample').textContent = e.target.value; });

let originalFile = null;

function formatSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / 1048576).toFixed(2) + ' MB';
}

function getExt(mimeType) {
  if (mimeType.includes('wav')) return 'wav';
  if (mimeType.includes('webm')) return 'webm';
  if (mimeType.includes('mp4')) return 'm4a';
  if (mimeType.includes('ogg')) return 'ogg';
  return 'audio';
}

function loadFile(file) {
  originalFile = file;
  const url = URL.createObjectURL(file);
  audio.src = url;
  audio.onloadedmetadata = () => {
    $('#audioInfo').textContent = `${file.name} · ${formatSize(file.size)} · ${audio.duration.toFixed(1)}s`;
  };
  $('#drop').style.display = 'none';
  $('#editor').style.display = 'block';
  $('#result').style.display = 'none';
}

async function doConvert() {
  if (!originalFile) return;
  const btn = $('#btnConvert');
  btn.disabled = true;
  btn.textContent = t('converting');

  try {
    const format = $('#outputFormat').value;
    const sr = parseInt($('#sampleRate').value);

    // Check if format is supported
    if (!MediaRecorder.isTypeSupported(format)) {
      // Fallback to WAV
      alert('This format is not supported by your browser. Falling back to WAV.');
    }

    // Decode audio
    const arrayBuffer = await originalFile.arrayBuffer();
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: sr });
    const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);

    // Re-encode using offline context + MediaRecorder
    const offlineCtx = new OfflineAudioContext(
      audioBuffer.numberOfChannels,
      Math.ceil(audioBuffer.duration * sr),
      sr
    );
    const source = offlineCtx.createBufferSource();
    source.buffer = audioBuffer;
    source.connect(offlineCtx.destination);
    source.start();

    // Use MediaRecorder with destination stream
    const dest = audioCtx.createMediaStreamDestination();
    const liveSource = audioCtx.createBufferSource();
    liveSource.buffer = audioBuffer;
    liveSource.connect(dest);

    const useFormat = MediaRecorder.isTypeSupported(format) ? format : 'audio/wav';
    const recorder = new MediaRecorder(dest.stream, {
      mimeType: useFormat,
      audioBitsPerSecond: 128000
    });

    const chunks = [];
    recorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };

    const done = new Promise(resolve => {
      recorder.onstop = () => {
        const blob = new Blob(chunks, { type: useFormat });
        resolve(blob);
      };
    });

    recorder.start();
    liveSource.start();

    // Stop after duration
    setTimeout(() => {
      recorder.stop();
      liveSource.stop();
    }, (audioBuffer.duration * 1000) + 100);

    const blob = await done;
    const url = URL.createObjectURL(blob);

    $('#outputPreview').src = url;
    $('#statOrig').textContent = formatSize(originalFile.size);
    $('#statOrigL').textContent = t('origSize');
    $('#statNew').textContent = formatSize(blob.size);
    $('#statNewL').textContent = t('newSize');
    $('#downloadLink').href = url;
    $('#downloadLink').textContent = t('download');
    $('#downloadLink').download = 'converted.' + getExt(useFormat);
    $('#result').style.display = 'block';

    audioCtx.close();
  } catch (err) {
    alert('Error: ' + err.message);
  }

  btn.disabled = false;
  btn.textContent = t('convert');
}

});
</script>
