.bio-stage{display:grid;grid-template-columns:1fr;gap:16px;margin-top:1rem}
.bio-card{background:linear-gradient(135deg,var(--glass),var(--glass2));border:1px solid var(--border);border-radius:16px;padding:18px}
.bio-inputs{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:1rem}
@media(max-width:680px){.bio-inputs{grid-template-columns:1fr}}
.bio-inputs label{font-size:.7rem;text-transform:uppercase;letter-spacing:.5px;color:var(--text2);font-weight:700;display:block;margin-bottom:4px}
.bio-inputs input,.bio-inputs select{width:100%;padding:9px 12px;background:var(--glass);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:.95rem;font-family:inherit}
.bio-inputs input:focus,.bio-inputs select:focus{outline:none;border-color:var(--accent)}
.bio-canvas-wrap{background:#0a0a1a;border-radius:12px;padding:14px;display:flex;align-items:center;justify-content:center}
canvas.bio-canvas{max-width:100%;height:auto;border-radius:8px;background:#fff;display:block}
.bio-tiles{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;margin-top:1rem}
.bio-tile{background:linear-gradient(135deg,var(--glass),var(--glass2));border:1px solid var(--border);border-radius:12px;padding:14px;text-align:center;position:relative;overflow:hidden}
.bio-tile .emoji{font-size:1.5rem;margin-bottom:4px}
.bio-tile .label{font-size:.7rem;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;font-weight:700}
.bio-tile .value{font-size:1.4em;font-weight:800;font-family:monospace;margin:2px 0}
.bio-tile .phase{font-size:.75rem;color:var(--text2);font-weight:600}
.bio-tile.physical{border-left:4px solid #ef4444}
.bio-tile.emotional{border-left:4px solid #3b82f6}
.bio-tile.intellectual{border-left:4px solid #10b981}
.bio-tile.spiritual{border-left:4px solid #a855f7}
.bio-tile.intuitive{border-left:4px solid #f59e0b}
.bio-tile.aesthetic{border-left:4px solid #ec4899}
.bio-tile.physical .value{color:#ef4444}
.bio-tile.emotional .value{color:#3b82f6}
.bio-tile.intellectual .value{color:#10b981}
.bio-tile.spiritual .value{color:#a855f7}
.bio-tile.intuitive .value{color:#f59e0b}
.bio-tile.aesthetic .value{color:#ec4899}
.bio-day-navigator{display:flex;align-items:center;gap:8px;margin-top:1rem;flex-wrap:wrap}
.bio-day-navigator input[type=date]{flex:1;min-width:160px}
.bio-day-navigator button{padding:8px 12px;font-size:.85rem}
.bio-info{background:var(--glass2);border-left:3px solid var(--accent);padding:10px 14px;border-radius:6px;font-size:.85em;margin-top:1rem;color:var(--text2);line-height:1.7}
.bio-info b{color:var(--accent)}
.bio-summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px;margin-top:1rem}
.bio-summary-item{background:var(--glass2);border:1px solid var(--border);border-radius:10px;padding:10px;font-size:.82rem;color:var(--text2)}
.bio-summary-item b{color:var(--text);display:block;font-size:.95rem;margin-bottom:2px}
</style>

<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is a biorhythm?", "acceptedAnswer": {"@type": "Answer", "text": "Biorhythm theory proposes that human life is influenced by three (or more) rhythmic biological cycles starting at birth: a 23-day Physical cycle (strength, stamina, coordination), a 28-day Emotional cycle (mood, sensitivity, creativity), and a 33-day Intellectual cycle (alertness, memory, logic). Each cycle is modeled as a sine wave that swings between +100% (peak) and −100% (low), with critical days occurring when the wave crosses zero."}}, {"@type": "Question", "name": "What is a critical day?", "acceptedAnswer": {"@type": "Answer", "text": "A critical day happens when a biorhythm cycle crosses the zero line (its value is near 0%). The theory suggests these are unstable days — your body is adjusting between a high and low phase, so accidents, mood swings, or sudden mistakes are statistically more likely. Many users avoid scheduling surgery, big presentations, or risky sports on critical days."}}, {"@type": "Question", "name": "Are biorhythms scientifically proven?", "acceptedAnswer": {"@type": "Answer", "text": "Biorhythm theory is a pseudoscientific model — it has not been validated by peer-reviewed studies. That said, millions of people use it as a fun self-awareness tool, similar to horoscopes. The cycles are easy to compute and the chart is visually compelling, which is why this tool remains popular."}}, {"@type": "Question", "name": "Can I see cycles beyond the standard three?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. The calculator also visualizes three secondary cycles: Spiritual (53 days), Intuitive (38 days), and Aesthetic (43 days). You can toggle them in the settings to keep the chart focused on the classic trio, or expand it to see all six at once."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="bio-card">
      <div class="bio-inputs">
        <div>
          <label id="lblBirth">Birth date</label>
          <input type="date" id="birthDate" required>
        </div>
        <div>
          <label id="lblTarget">Target date</label>
          <input type="date" id="targetDate">
        </div>
        <div>
          <label id="lblDays">Days to plot</label>
          <select id="days">
            <option value="14">14 days</option>
            <option value="30" selected>30 days</option>

          </select>
        </div>
      </div>
      <div class="bio-tiles" id="tiles"></div>

        <canvas id="bioChart" class="bio-canvas" width="1200" height="420"></canvas>
      </div>

        <button class="gz-btn gz-btn-secondary" id="prevBtn">← <span id="lblPrev">Previous</span></button>

        <button class="gz-btn gz-btn-secondary" id="todayBtn">📅 <span id="lblToday">Today</span></button>
        <button class="gz-btn gz-btn-secondary" id="nextBtn"><span id="lblNext">Next</span> →</button>

<script>
GZI18n.register({
  en: {
    toolTitle: 'Biorhythm Calculator',
    toolDesc: 'Visualize your Physical, Emotional and Intellectual biorhythm cycles for any day. See critical days, high/low phases, and a 30-day forecast chart — fully browser-based.',
    birth: 'Birth date', target: 'Target date', days: 'Days to plot',
    physical: 'Physical', emotional: 'Emotional', intellectual: 'Intellectual',
    spiritual: 'Spiritual', intuitive: 'Intuitive', aesthetic: 'Aesthetic',
    prev: 'Previous', today: 'Today', next: 'Next',
    high: 'Peak', low: 'Low', critical: 'Critical day', rising: 'Rising', falling: 'Falling',
    tip1: 'Critical days happen when a cycle crosses zero. Schedule risky activities on peak days for best results.',
    tip2: 'The three primary cycles: Physical 23d, Emotional 28d, Intellectual 33d.',
    tip3: 'Secondary cycles (Spiritual 53d, Intuitive 38d, Aesthetic 43d) provide additional insight.',
    step1: 'Enter your birth date — the cycles start from day zero',
    step2: 'Pick a target date (defaults to today) and how many days to plot',
    step3: 'Read the cycle values: 100% is peak, 0% is critical, −100% is low',
    step4: 'Use the chart to plan — high energy days are great for big efforts',
  },
  zh: {
    toolTitle: '生物节律计算器',
    toolDesc: '可视化任意日期的体能、情绪和智力生物节律周期。查看临界日、高低相位和 30 天预测图表 — 完全浏览器本地运行。',
    birth: '出生日期', target: '目标日期', days: '显示天数',
    physical: '体能', emotional: '情绪', intellectual: '智力',
    spiritual: '精神', intuitive: '直觉', aesthetic: '审美',
    prev: '前一天', today: '今天', next: '后一天',
    high: '峰值', low: '低谷', critical: '临界日', rising: '上升', falling: '下降',
    tip1: '当周期穿过零线时为临界日。建议将重要活动安排在峰值日。',
    tip2: '三个主要周期：体能 23 天、情绪 28 天、智力 33 天。',
    tip3: '次要周期（精神 53 天、直觉 38 天、审美 43 天）提供额外洞察。',
    step1: '输入出生日期 — 周期从第零天开始计算',
    step2: '选择目标日期（默认为今天）和显示天数',
    step3: '查看周期数值：100% 为峰值，0% 为临界，−100% 为低谷',
    step4: '根据图表安排计划 — 高能量日适合重要活动',
  }
});

const { $, t } = GZ;
const CYCLES = [
  { key: 'physical', period: 23, color: '#ef4444', emoji: '💪' },
  { key: 'emotional', period: 28, color: '#3b82f6', emoji: '❤️' },
  { key: 'intellectual', period: 33, color: '#10b981', emoji: '🧠' },
  { key: 'spiritual', period: 53, color: '#a855f7', emoji: '🙏' },
  { key: 'intuitive', period: 38, color: '#f59e0b', emoji: '🔮' },
  { key: 'aesthetic', period: 43, color: '#ec4899', emoji: '🎨' },
];

const today = new Date();
$('#birthDate').valueAsDate = new Date(today.getFullYear() - 25, today.getMonth(), today.getDate());
$('#targetDate').valueAsDate = today;
$('#jumpDate').valueAsDate = today;

['birthDate','targetDate','days','jumpDate'].forEach(id => {
  document.getElementById(id).addEventListener('input', render);
  document.getElementById(id).addEventListener('change', render);
});

$('#todayBtn').addEventListener('click', () => {
  const t = new Date();
  $('#targetDate').valueAsDate = t;
  $('#jumpDate').valueAsDate = t;
  render();
});
$('#prevBtn').addEventListener('click', () => { shiftDay(-1); });
$('#nextBtn').addEventListener('click', () => { shiftDay(1); });

function shiftDay(delta) {
  const v = $('#targetDate').value;
  if (!v) return;
  const d = new Date(v);
  d.setDate(d.getDate() + delta);
  $('#targetDate').valueAsDate = d;
  $('#jumpDate').valueAsDate = d;
  render();
}

function daysBetween(a, b) {
  return Math.floor((b - a) / 86400000);
}

function cycleValue(days, period) {
  return Math.sin((2 * Math.PI * days) / period) * 100;
}

function getPhase(v) {
  if (Math.abs(v) < 5) return 'critical';
  if (v > 80) return 'high';
  if (v > 0) return 'rising';
  if (v < -80) return 'low';
  return 'falling';
}

function phaseLabel(phase) {
  return t({critical: 'critical', high: 'high', low: 'low', rising: 'rising', falling: 'falling'}[phase]);
}

function render() {
  const birth = new Date($('#birthDate').value);
  const target = new Date($('#targetDate').value);
  const days = +$('#days').value;
  if (isNaN(birth) || isNaN(target)) return;
  const dayNum = daysBetween(birth, target);

  // Tiles
  const tiles = $('#tiles');
  tiles.innerHTML = CYCLES.map(c => {
    const v = cycleValue(dayNum, c.period);
    const phase = getPhase(v);
    return `<div class="bio-tile ${c.key}">
      <div class="emoji">${c.emoji}</div>
      <div class="label">${t(c.key)}</div>
      <div class="value">${v.toFixed(0)}%</div>
      <div class="phase">${phaseLabel(phase)}</div>
    </div>`;
  }).join('');

  // Chart
  const canvas = document.getElementById('bioChart');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 0, W, H);

  // Grid
  ctx.strokeStyle = '#e5e7eb'; ctx.lineWidth = 1;
  ctx.font = '14px Inter, sans-serif';
  ctx.fillStyle = '#374151';
  for (let p = -100; p <= 100; p += 25) {
    const y = H/2 - (p / 100) * (H/2 - 60);
    ctx.beginPath(); ctx.moveTo(60, y); ctx.lineTo(W - 20, y); ctx.stroke();
    ctx.fillText(p + '%', 10, y + 5);
  }
  // Vertical grid (every week)
  const startDate = new Date(target);
  startDate.setDate(startDate.getDate() - Math.floor(days / 2));
  for (let i = 0; i <= days; i += 7) {
    const x = 60 + (i / days) * (W - 80);
    ctx.beginPath(); ctx.moveTo(x, 30); ctx.lineTo(x, H - 30); ctx.stroke();
    const d = new Date(startDate);
    d.setDate(d.getDate() + i);
    const lbl = (d.getMonth() + 1) + '/' + d.getDate();
    ctx.fillText(lbl, x - 12, H - 12);
  }
  // Today marker
  const todayIdx = daysBetween(startDate, target);
  const tx = 60 + (todayIdx / days) * (W - 80);
  ctx.strokeStyle = '#dc2626'; ctx.lineWidth = 2; ctx.setLineDash([5, 4]);
  ctx.beginPath(); ctx.moveTo(tx, 30); ctx.lineTo(tx, H - 30); ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle = '#dc2626'; ctx.font = 'bold 13px Inter';
  ctx.fillText('📍 Today', tx - 25, 18);

  // Curves
  CYCLES.forEach(c => {
    ctx.strokeStyle = c.color; ctx.lineWidth = 2.5;
    ctx.beginPath();
    for (let i = 0; i <= days; i++) {
      const dayAt = dayNum - Math.floor(days / 2) + i;
      const v = cycleValue(dayAt, c.period);
      const x = 60 + (i / days) * (W - 80);
      const y = H/2 - (v / 100) * (H/2 - 60);
      if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.stroke();
    // Legend dot
    const lx = 70, ly = 60 + CYCLES.indexOf(c) * 20;
    ctx.fillStyle = c.color;
    ctx.beginPath(); ctx.arc(lx, ly, 5, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#111'; ctx.font = '13px Inter, sans-serif';
    ctx.fillText(t(c.key), lx + 12, ly + 4);
  });

  // Summary
  const sumEl = $('#summary');
  const daysOld = dayNum;
  sumEl.innerHTML = `
    <div class="bio-summary-item"><b>${daysOld}</b>${daysOld === 1 ? 'day old' : 'days old'}</div>
    <div class="bio-summary-item"><b>${Math.floor(daysOld / 365.25)}</b>years of life</div>
    <div class="bio-summary-item"><b>${Math.floor(daysOld / 29.5)}</b>moons since birth</div>
    <div class="bio-summary-item"><b>${(daysOld / 365.25).toFixed(2)}</b>orbital years</div>
  `;
  $('#info').innerHTML =
    '<b>💡 ' + t('tip1') + '</b><br>' +
    '• ' + t('tip2') + '<br>' +
    '• ' + t('tip3');
}

$('#lblBirth').textContent = t('birth');
$('#lblTarget').textContent = t('target');
$('#lblDays').textContent = t('days');
$('#lblPrev').textContent = t('prev');
$('#lblToday').textContent = t('today');
$('#lblNext').textContent = t('next');

render();
GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🎂', href:'/calc/age-calculator.html', name:'Age Calculator'},
    {icon:'🆎', href:'/calc/age-difference.html', name:'Age Difference'},
    {icon:'😴', href:'/calc/sleep-calculator.html', name:'Sleep Cycle'},
    {icon:'🌙', href:'/fortune/daily.html', name:'Daily Fortune'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
