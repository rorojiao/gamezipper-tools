<script>
GZI18n.register({
  en: {
    toolTitle: 'Resistor Color Code Calculator',
    toolDesc: 'Decode 4, 5 and 6-band resistor color codes to resistance value with tolerance and temperature coefficient — or look up the bands from a value.',
    band1: '1st Band', band2: '2nd Band', band3: '3rd Band', multiplier: 'Multiplier', tolerance: 'Tolerance', tempco: 'Temp. Coeff. (ppm/°C)',
    toleranceVal: 'Tolerance', minVal: 'Min', maxVal: 'Max', tempcoVal: 'Temp. Coeff.',
    rev: 'Reverse Lookup', revHint: 'Enter a value (Ω) to find the nearest E12/E24 band combination',
    refTable: 'Standard Resistor Color Code Reference',
    step1: 'Pick the resistor type (4, 5 or 6 band)',
    step2: 'Select the color of each band from the dropdowns',
    step3: 'Read the resistance value, tolerance and temperature coefficient',
    step4: 'Use Reverse Lookup to find bands from a resistance value',
  },
  zh: {
    toolTitle: '电阻色环计算器',
    toolDesc: '解码 4、5、6 环电阻的色环，得到阻值、公差和温度系数 — 也支持从阻值反查色环组合。',
    band1: '第 1 环', band2: '第 2 环', band3: '第 3 环', multiplier: '乘数', tolerance: '公差', tempco: '温度系数 (ppm/°C)',
    toleranceVal: '公差', minVal: '最小', maxVal: '最大', tempcoVal: '温度系数',
    rev: '反查', revHint: '输入阻值（Ω）查找最接近的 E12/E24 色环组合',
    refTable: '标准电阻色码参考表',
    step1: '选择电阻类型（4、5 或 6 环）',
    step2: '从下拉框中选择每一环的颜色',
    step3: '读取阻值、公差和温度系数',
    step4: '使用「反查」从阻值查找色环组合',
  }
});

// IEC 60062 standard colors
const COLORS = {
  black:   { hex: '#000000', digit: 0, mult: 1,          tol: null, tc: 250 },
  brown:   { hex: '#5d3a1a', digit: 1, mult: 10,         tol: 1,   tc: 100 },
  red:     { hex: '#d12f2f', digit: 2, mult: 100,        tol: 2,   tc: 50 },
  orange:  { hex: '#ff7f00', digit: 3, mult: 1000,       tol: null, tc: 15 },
  yellow:  { hex: '#ffeb00', digit: 4, mult: 10000,      tol: null, tc: 25 },
  green:   { hex: '#2eaa3e', digit: 5, mult: 100000,     tol: 0.5, tc: null },
  blue:    { hex: '#2a6cd1', digit: 6, mult: 1000000,    tol: 0.25,tc: 10 },
  violet:  { hex: '#9437c2', digit: 7, mult: 10000000,   tol: 0.1, tc: 5 },
  gray:    { hex: '#888888', digit: 8, mult: 100000000,  tol: 0.05,tc: null },
  white:   { hex: '#f0f0f0', digit: 9, mult: 1000000000, tol: null, tc: null },
  gold:    { hex: '#d4af37', digit: null, mult: 0.1,     tol: 5,   tc: null },
  silver:  { hex: '#c0c0c0', digit: null, mult: 0.01,    tol: 10,  tc: null },
  none:    { hex: '#d4a574', digit: null, mult: null,    tol: 20,  tc: null }
};
const COLOR_NAMES = Object.keys(COLORS);
const BAND_COLOR_ORDER = ['black','brown','red','orange','yellow','green','blue','violet','gray','white','gold','silver'];
const { $, t } = GZ;

function fmt(v) {
  if (v === 0) return '0 Ω';
  const abs = Math.abs(v);
  if (abs < 1) return (v*1000).toPrecision(3) + ' mΩ';
  if (abs < 1000) return v + ' Ω';
  if (abs < 1e6) return (v/1000).toPrecision(4).replace(/\.?0+$/,'') + ' kΩ';
  if (abs < 1e9) return (v/1e6).toPrecision(4).replace(/\.?0+$/,'') + ' MΩ';
  return (v/1e9).toPrecision(4).replace(/\.?0+$/,'') + ' GΩ';
}

let mode = 4;
let bands = { b1: 'brown', b2: 'black', b3: 'brown', mult: 'red', tol: 'gold', tc: 'brown' };

function renderBands() {
  const html = [];
  // First N digit bands
  const digitCount = mode;
  for (let i = 1; i <= digitCount; i++) {
    const k = 'b' + i;
    bands[k] = bands[k] || 'black';
    html.push(`<div class="r-band-col"><label>${t('band' + Math.min(i, 3))}</label>
      <select id="sel_${k}">${BAND_COLOR_ORDER.map(c => `<option value="${c}" ${c===bands[k]?'selected':''}>${c}</option>`).join('')}</select></div>`);
  }
  // Multiplier
  html.push(`<div class="r-band-col"><label>${t('multiplier')}</label>
    <select id="sel_mult">${BAND_COLOR_ORDER.map(c => `<option value="${c}" ${c===bands.mult?'selected':''}>${c}</option>`).join('')}</select></div>`);
  // Tolerance
  html.push(`<div class="r-band-col"><label>${t('tolerance')}</label>
    <select id="sel_tol">${BAND_COLOR_ORDER.concat(['none']).map(c => `<option value="${c}" ${c===bands.tol?'selected':''}>${c}</option>`).join('')}</select></div>`);
  // TC for 6-band
  if (mode === 6) {
    html.push(`<div class="r-band-col"><label>${t('tempco')}</label>
      <select id="sel_tc">${BAND_COLOR_ORDER.map(c => `<option value="${c}" ${c===bands.tc?'selected':''}>${c}</option>`).join('')}</select></div>`);
  }
  $('#bands').innerHTML = html.join('');
  // Wire up listeners
  $$('#bands select').forEach(s => s.addEventListener('change', () => {
    const id = s.id.replace('sel_', '');
    bands[id] = s.value;
    update();
  }));
}

function update() {
  const digitCount = mode;
  let digits = '';
  for (let i = 1; i <= digitCount; i++) {
    const c = COLORS[bands['b'+i]];
    if (c.digit === null) { digits = '?'; break; }
    digits += c.digit;
  }
  const mult = COLORS[bands.mult].mult;
  const tol = COLORS[bands.tol].tol;
  const tc = mode === 6 ? COLORS[bands.tc].tc : null;
  const value = (parseInt(digits) || 0) * mult;

  // Visual resistor
  const body = $('#resistorBody');
  let bw = '';
  for (let i = 1; i <= digitCount; i++) {
    bw += `<div class="r-band-vis" style="background:${COLORS[bands['b'+i]].hex}"></div>`;
  }
  bw += `<div class="r-band-vis" style="background:${COLORS[bands.mult].hex}"></div>`;
  bw += `<div style="width:6px"></div>`;
  bw += `<div class="r-band-vis" style="background:${COLORS[bands.tol].hex}"></div>`;
  if (mode === 6) bw += `<div class="r-band-vis" style="background:${COLORS[bands.tc].hex}"></div>`;
  body.innerHTML = bw;

  // Result
  $('#result').textContent = fmt(value);
  const sub = [];
  if (tol !== null) sub.push('± ' + tol + '%');
  if (tc !== null && tc !== undefined) sub.push(tc + ' ppm/°C');
  $('#resultSub').textContent = sub.join(' · ');

  // Stats
  const stats = [];
  if (tol !== null) {
    const tolVal = value * tol / 100;
    stats.push({ lbl: t('toleranceVal'), val: '±' + fmt(tolVal) });
    stats.push({ lbl: t('minVal'), val: fmt(value - tolVal) });
    stats.push({ lbl: t('maxVal'), val: fmt(value + tolVal) });
  }
  if (tc !== null && tc !== undefined) stats.push({ lbl: t('tempcoVal'), val: tc + ' ppm/°C' });
  $('#stats').innerHTML = stats.map(s => `<div class="r-stat"><div class="lbl">${s.lbl}</div><div class="val">${s.val}</div></div>`).join('');
}

function renderRef() {
  const rows = BAND_COLOR_ORDER.map(c => {
    const cc = COLORS[c];
    return `<tr>
      <td><span class="r-swatch" style="background:${cc.hex}"></span><b>${c}</b></td>
      <td>${cc.digit !== null ? cc.digit : '—'}</td>
      <td>×${cc.mult}</td>
      <td>${cc.tol !== null ? '±' + cc.tol + '%' : '—'}</td>
      <td>${cc.tc !== null ? cc.tc + ' ppm/°C' : '—'}</td>
    </tr>`;
  }).join('');
  $('#refTable').innerHTML = `<thead><tr><th>Color</th><th>Digit</th><th>Multiplier</th><th>Tolerance</th><th>Temp. Coeff.</th></tr></thead><tbody>${rows}</tbody>`;
}

function reverseLookup() {
  const val = parseFloat($('#revInput').value);
  if (!val || val <= 0) { $('#revResult').textContent = '—'; return; }
  // Find best E24 match for 4-band
  const E24 = [10,11,12,13,15,16,18,20,22,24,27,30,33,36,39,43,47,51,56,62,68,75,82,91];
  let best = null;
  for (const m of [1,10,100,1000,10000,100000,1000000]) {
    for (const e of E24) {
      const v = e * m;
      if (!best || Math.abs(Math.log10(v/val)) < Math.log10(best.v/val || 1)) {
        const d1 = Math.floor(e/10), d2 = e%10;
        const mExp = Math.log10(m);
        let multKey = null;
        if (mExp === 0) multKey = 'black';
        else if (mExp === 1) multKey = 'brown';
        else if (mExp === 2) multKey = 'red';
        else if (mExp === 3) multKey = 'orange';
        else if (mExp === 4) multKey = 'yellow';
        else if (mExp === 5) multKey = 'green';
        const d1k = ['black','brown','red','orange','yellow','green','blue','violet','gray','white'][d1];
        const d2k = ['black','brown','red','orange','yellow','green','blue','violet','gray','white'][d2];
        if (d1k && d2k && multKey) {
          best = { v, d1: d1k, d2: d2k, mult: multKey, val: v };
        }
      }
    }
  }
  if (best) {
    const pct = ((best.v - val) / val * 100).toFixed(1);
    $('#revResult').textContent = `${best.d1} · ${best.d2} · ${best.mult} (${fmt(best.v)}, ${pct > 0 ? '+' : ''}${pct}%)`;
  } else {
    $('#revResult').textContent = 'No match';
  }
}

// Wire up modes
$$('#modes .r-mode').forEach(btn => btn.addEventListener('click', () => {
  $$('#modes .r-mode').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  mode = +btn.dataset.mode;
  renderBands();
  update();
}));

$('#revInput').addEventListener('input', reverseLookup);

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🧮', href:'/calc/scientific-calculator.html', name:'Scientific Calculator'},
    {icon:'🔢', href:'/calc/binary-calculator.html', name:'Binary Calculator'},
    {icon:'🔋', href:'/calc/compound-interest.html', name:'Compound Interest'},
  ]
});

renderBands();
update();
renderRef();
</script>
