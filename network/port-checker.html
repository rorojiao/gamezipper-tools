<script>
GZI18n.register({
  en: {
    toolTitle: 'Port Checker',
    toolDesc: 'Check if TCP ports are open or closed on any host. Test common ports like 80, 443, 22, 21, 3389 — free, instant, runs in your browser.',
    btnCheck: 'Check Ports',
    hostPlaceholder: 'example.com or 8.8.8.8',
    portsPlaceholder: '80, 443, 22',
    presetCommon: 'Common',
    presetWeb: 'Web',
    presetSecure: 'Secure',
    presetAll: 'Top 20',
    open: 'Open',
    closed: 'Closed / Filtered',
    checking: 'Checking...',
    service: 'Service',
    port: 'Port',
    status: 'Status',
    enterHost: 'Please enter a host name or IP address.',
    invalidPort: 'Invalid port number (must be 1-65535).',
    step1: 'Enter a hostname or IP address (e.g. example.com or 8.8.8.8)',
    step2: 'Enter ports to check (comma-separated) or pick a preset',
    step3: 'Click Check Ports to scan each port',
    step4: 'Review the open/closed status for each port',
  },
  zh: {
    toolTitle: '端口检测工具',
    toolDesc: '检测任意主机的 TCP 端口是否开放。测试 80、443、22、21、3389 等常用端口 — 免费、即时、浏览器本地运行。',
    btnCheck: '检测端口',
    hostPlaceholder: 'example.com 或 8.8.8.8',
    portsPlaceholder: '80, 443, 22',
    presetCommon: '常用',
    presetWeb: '网页',
    presetSecure: '安全',
    presetAll: '前 20',
    open: '开放',
    closed: '关闭 / 已过滤',
    checking: '检测中...',
    service: '服务',
    port: '端口',
    status: '状态',
    enterHost: '请输入主机名或 IP 地址。',
    invalidPort: '无效端口号（必须为 1-65535）。',
    step1: '输入主机名或 IP（如 example.com 或 8.8.8.8）',
    step2: '输入要检测的端口（逗号分隔）或选择预设',
    step3: '点击「检测端口」逐个扫描',
    step4: '查看每个端口的开放/关闭状态',
  }
});

const { $, t } = GZ;

const PORT_SERVICES = {
  20:'FTP Data',21:'FTP',22:'SSH',23:'Telnet',25:'SMTP',53:'DNS',80:'HTTP',110:'POP3',
  143:'IMAP',443:'HTTPS',445:'SMB',993:'IMAPS',995:'POP3S',1433:'SQL Server',
  1521:'Oracle',3306:'MySQL',3389:'RDP',5432:'PostgreSQL',5900:'VNC',6379:'Redis',
  8080:'HTTP Alt',8443:'HTTPS Alt',27017:'MongoDB',11211:'Memcached'
};
const PRESETS = {
  common: [80, 443, 22, 21, 3389],
  web: [80, 443, 8080, 8443],
  secure: [22, 443, 993, 995],
  all: [21, 22, 23, 25, 53, 80, 110, 143, 443, 445, 993, 995, 1433, 3306, 3389, 5432, 5900, 6379, 8080, 8443]
};

$('#presets').innerHTML = `
  <span class="pc-preset" onclick="setPreset('common')">${t('presetCommon')} (80,443,22,21,3389)</span>
  <span class="pc-preset" onclick="setPreset('web')">${t('presetWeb')} (80,443,8080,8443)</span>
  <span class="pc-preset" onclick="setPreset('secure')">${t('presetSecure')} (22,443,993,995)</span>
  <span class="pc-preset" onclick="setPreset('all')">${t('presetAll')}</span>
`;

window.setPreset = function(key) {
  $('#ports').value = PRESETS[key].join(', ');
};

async function checkPort(host, port, timeoutMs) {
  const proto = port === 443 || port === 8443 || port === 993 || port === 995 ? 'https' : 'http';
  const url = `${proto}://${host}:${port}/`;
  const ctrl = new AbortController();
  const timer = setTimeout(() => ctrl.abort(), timeoutMs);
  const start = performance.now();
  try {
    await fetch(url, { mode: 'no-cors', signal: ctrl.signal, cache: 'no-store' });
    clearTimeout(timer);
    return true;
  } catch (e) {
    clearTimeout(timer);
    const elapsed = performance.now() - start;
    // If aborted by timeout → closed; quick connection refused may also throw
    if (e.name === 'AbortError') return false;
    // no-cors fetch resolves even for CORS-blocked; a fast throw often means port closed
    return elapsed < 50 ? false : null; // null = unknown
  }
}

async function doCheck() {
  const host = $('#host').value.trim().replace(/^https?:\/\//, '').replace(/\/.*$/, '');
  if (!host) { $('#output').innerHTML = `<div class="pc-loading">${t('enterHost')}</div>`; return; }
  const portsRaw = $('#ports').value.trim();
  const ports = portsRaw ? portsRaw.split(/[,\s]+/).map(p => parseInt(p.trim())).filter(p => p >= 1 && p <= 65535) : PRESETS.common;
  if (ports.length === 0) { $('#output').innerHTML = `<div class="pc-loading">${t('invalidPort')}</div>`; return; }

  // Render initial checking state
  let html = '<div class="pc-results">';
  for (const p of ports) {
    const svc = PORT_SERVICES[p] || '—';
    html += `<div class="pc-port-row" id="row-${p}">
      <span class="num">${p}</span>
      <span class="svc">${svc}</span>
      <span class="pc-status pc-checking">${t('checking')}</span>
    </div>`;
  }
  html += '</div>';
  $('#output').innerHTML = html;

  // Check each port sequentially
  for (const p of ports) {
    const result = await checkPort(host, p, 5000);
    const row = $(`#row-${p}`);
    if (row) {
      const statusEl = row.querySelector('.pc-status');
      if (result === true) {
        statusEl.className = 'pc-status pc-open';
        statusEl.textContent = '✓ ' + t('open');
      } else if (result === false) {
        statusEl.className = 'pc-status pc-closed';
        statusEl.textContent = '✗ ' + t('closed');
      } else {
        // Unknown - treat as potentially filtered/closed
        statusEl.className = 'pc-status pc-closed';
        statusEl.textContent = '✗ ' + t('closed');
      }
    }
  }
}

$('#host').addEventListener('keydown', e => { if (e.key === 'Enter') doCheck(); });
$('#ports').addEventListener('keydown', e => { if (e.key === 'Enter') doCheck(); });

GZ.renderToolPage({

    {icon:'🔢', href:'/dev/port-numbers.html', name:'Port Numbers'},
    {icon:'🔒', href:'/dev/ssl-checker.html', name:'SSL Checker'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
