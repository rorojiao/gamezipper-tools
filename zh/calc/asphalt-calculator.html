<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "How do I calculate how much asphalt I need?", "acceptedAnswer": {"@type": "Answer", "text": "Multiply the area (length x width) by the compacted thickness to get the volume, then multiply by the asphalt density (about 145 lb/ft³ or 2,323 kg/m³ for compacted hot-mix) to get the weight. Divide pounds by 2,000 for US tons or kg by 1,000 for metric tonnes."}}, {"@type": "Question", "name": "How thick should an asphalt driveway be?", "acceptedAnswer": {"@type": "Answer", "text": "Residential driveways typically use 2-3 inches of compacted hot-mix asphalt over a 4-6 inch gravel base. Commercial parking lots usually need 3-4 inches. Always compact in 2-inch lifts for best results."}}, {"@type": "Question", "name": "How many square feet does 1 ton of asphalt cover?", "acceptedAnswer": {"@type": "Answer", "text": "At a compacted thickness of 2 inches, one US ton (2,000 lb) of hot-mix asphalt covers about 79 square feet. At 3 inches it covers roughly 53 sq ft, and at 4 inches about 40 sq ft."}}, {"@type": "Question", "name": "What is the density of compacted asphalt?", "acceptedAnswer": {"@type": "Answer", "text": "Compacted hot-mix asphalt (HMA) typically weighs 145 lb/ft³ (2,323 kg/m³). The default value in this calculator is 145 lb/ft³ — you can change it for different mix designs or millings (which run lighter)."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="ac-mode">
      <button class="active" id="modeRect"></button>
      <button id="modeArea"></button>
    </div>
    <div class="ac-form" id="rectForm">
      <div><label id="lbl-len"></label><input type="number" id="len" value="50" min="0" step="0.1"></div>
      <div><label id="lbl-wid"></label><input type="number" id="wid" value="18" min="0" step="0.1"></div>
      <div><label id="lbl-thick"></label><input type="number" id="thick" value="2" min="0" step="0.1"></div>
      <div><label id="lbl-ulu"></label>
        <select id="ulu"><option value="ft">ft</option><option value="m">m</option></select>
      </div>
      <div><label id="lbl-utu"></label>
        <select id="utu"><option value="in">in</option><option value="cm">cm</option></select>
      </div>
    </div>
    <div class="ac-form" id="areaForm" style="display:none">
      <div><label id="lbl-area"></label><input type="number" id="area" value="900" min="0" step="1"></div>
      <div><label id="lbl-aunit"></label>
        <select id="aunit"><option value="ft2">ft²</option><option value="m2">m²</option><option value="yd2">yd²</option></select>
      </div>
      <div><label id="lbl-thick2"></label><input type="number" id="thick2" value="2" min="0" step="0.1"></div>
      <div><label id="lbl-utu2"></label>
        <select id="utu2"><option value="in">in</option><option value="cm">cm</option></select>
      </div>
    </div>
    <div class="ac-form" style="grid-template-columns:1fr 1fr;max-width:420px">
      <div><label id="lbl-density"></label><input type="number" id="density" value="145" min="0" step="0.1"></div>
      <div><label id="lbl-dunit"></label>
        <select id="dunit"><option value="lbft3">lb/ft³</option><option value="kgm3">kg/m³</option></select>
      </div>
    </div>
    <div class="ac-presets" id="presets"></div>
    <div class="ac-result" id="result">
      <div class="ac-main">
        <div class="ac-big" id="bigResult">—</div>
        <div class="ac-sub" id="subResult"></div>
      </div>
      <div class="ac-grid" id="grid"></div>
      <div class="ac-cost">
        <div style="display:flex;flex-direction:column;gap:4px">
          <label id="lbl-price"></label>
          <div style="display:flex;gap:6px;align-items:center">
            <span>$</span>
            <input type="number" id="price" value="120" min="0" step="1">
            <span style="font-size:.82em;color:var(--text2)" id="lbl-perton"></span>
          </div>
        </div>
        <div class="out" id="costOut"></div>
      </div>
      <div class="ac-note" id="note"></div>
    </div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Asphalt Calculator',
    toolDesc: 'Estimate how many tons of hot-mix asphalt you need for any driveway, parking lot or path. Handles metric and imperial units, custom density and cost per ton.',
    modeRect: 'Length × Width',
    modeArea: 'Known Area',
    lblLen: 'Length',
    lblWid: 'Width',
    lblThick: 'Thickness',
    lblUlu: 'Length unit',
    lblUtu: 'Thickness unit',
    lblArea: 'Area',
    lblAunit: 'Area unit',
    lblThick2: 'Thickness',
    lblUtu2: 'Thickness unit',
    lblDensity: 'Compacted density',
    lblDunit: 'Density unit',
    lblPrice: 'Price per ton',
    lblPerton: '/ ton',
    bigTons: 'US tons',
    bigTonnes: 'metric tonnes',
    tileVol: 'Volume',
    tileLbs: 'Weight (lb)',
    tileKg: 'Weight (kg)',
    tileCubicYd: 'Cubic yards',
    tileSqft: 'Coverage',
    tileCost: 'Cost estimate',
    note: 'Based on compacted hot-mix asphalt at the density above. Order 5–10% extra for spillage, edges and uneven subgrade.',
    step1: 'Choose Length × Width mode, or switch to Known Area if you already measured it.',
    step2: 'Enter the asphalt thickness in inches (or cm) — 2–3 in for residential driveways.',
    step3: 'Adjust the compacted density if you have a specific mix design (default 145 lb/ft³).',
    step4: 'Enter the price per ton to get a quick material cost estimate.',
  },
  zh: {
    toolTitle: '沥青计算器',
    toolDesc: '估算车道、停车场或道路所需的压实热拌沥青吨数。支持公制与英制、自定义密度和每吨单价。',
    modeRect: '长 × 宽',
    modeArea: '已知面积',
    lblLen: '长度',
    lblWid: '宽度',
    lblThick: '厚度',
    lblUlu: '长度单位',
    lblUtu: '厚度单位',
    lblArea: '面积',
    lblAunit: '面积单位',
    lblThick2: '厚度',
    lblUtu2: '厚度单位',
    lblDensity: '压实密度',
    lblDunit: '密度单位',
    lblPrice: '每吨单价',
    lblPerton: '/ 吨',
    bigTons: '美吨',
    bigTonnes: '公吨',
    tileVol: '体积',
    tileLbs: '重量（磅）',
    tileKg: '重量（千克）',
    tileCubicYd: '立方码',
    tileSqft: '覆盖面积',
    tileCost: '成本估算',
    note: '基于上述密度的压实热拌沥青。建议多订购 5–10% 以备损耗、边缘和不平整基层。',
    step1: '选择「长 × 宽」模式；若已知面积可切换到「已知面积」模式。',
    step2: '输入沥青厚度（英寸或厘米）— 住宅车道通常 2–3 英寸。',
    step3: '如有特定配合比，可调整压实密度（默认 145 lb/ft³）。',
    step4: '输入每吨单价即可快速获得材料成本估算。',
  }
});

const { $, t } = GZ;

// Conversion factors to feet
const LEN_TO_FT = { ft: 1, m: 3.28084 };
const THICK_TO_FT = { in: 1/12, cm: 0.0328084 };
const AREA_TO_FT2 = { ft2: 1, m2: 10.7639, yd2: 9 };
// Density normalization to lb/ft³
const DENSITY_FACTOR = { lbft3: 1, kgm3: 0.062428 };

let currentMode = 'rect';

function calc(){
  let areaFt2 = 0;
  let thicknessFt = 0;
  if (currentMode === 'rect') {
    const len = parseFloat($('#len').value) || 0;
    const wid = parseFloat($('#wid').value) || 0;
    const thick = parseFloat($('#thick').value) || 0;
    areaFt2 = len * wid * Math.pow(LEN_TO_FT[$('#ulu').value], 2);
    thicknessFt = thick * THICK_TO_FT[$('#utu').value];
  } else {
    const area = parseFloat($('#area').value) || 0;
    const thick = parseFloat($('#thick2').value) || 0;
    areaFt2 = area * AREA_TO_FT2[$('#aunit').value];
    thicknessFt = thick * THICK_TO_FT[$('#utu2').value];
  }
  const densityLbFt3 = (parseFloat($('#density').value) || 0) * DENSITY_FACTOR[$('#dunit').value];
  const price = parseFloat($('#price').value) || 0;

  if (areaFt2 <= 0 || thicknessFt <= 0 || densityLbFt3 <= 0) {
    $('#bigResult').textContent = '—';
    $('#subResult').textContent = '';
    $('#grid').innerHTML = '';
    $('#costOut').textContent = '';
    return;
  }

  const volFt3 = areaFt2 * thicknessFt;
  const weightLb = volFt3 * densityLbFt3;
  const weightKg = weightLb * 0.453592;
  const usTons = weightLb / 2000;
  const metricTonnes = weightKg / 1000;
  const cubicYards = volFt3 / 27;
  const cost = usTons * price;

  const bigUnit = $('#dunit').value === 'kgm3' ? t('bigTonnes') : t('bigTons');
  const bigVal = $('#dunit').value === 'kgm3' ? metricTonnes : usTons;
  $('#bigResult').textContent = bigVal.toLocaleString(undefined,{maximumFractionDigits:2});
  $('#subResult').textContent = bigUnit;

  const tiles = [
    { num: volFt3.toLocaleString(undefined,{maximumFractionDigits:1}) + ' ft³', lbl: t('tileVol') },
    { num: Math.round(weightLb).toLocaleString(), lbl: t('tileLbs') },
    { num: Math.round(weightKg).toLocaleString(), lbl: t('tileKg') },
    { num: cubicYards.toLocaleString(undefined,{maximumFractionDigits:2}) + ' yd³', lbl: t('tileCubicYd') },
    { num: Math.round(areaFt2).toLocaleString() + ' ft²', lbl: t('tileSqft') },
    { num: '$' + cost.toLocaleString(undefined,{maximumFractionDigits:0}), lbl: t('tileCost') },
  ];
  $('#grid').innerHTML = tiles.map(x => `<div class="ac-tile"><div class="num">${x.num}</div><div class="lbl">${x.lbl}</div></div>`).join('');
  $('#costOut').textContent = '$' + cost.toLocaleString(undefined,{maximumFractionDigits:0});
}

const presets = [
  { lbl: '🚗 2-Car Driveway', mode: 'rect', vals: { len: 50, wid: 18, thick: 3, ulu: 'ft', utu: 'in' } },
  { lbl: '🛣️ Walkway', mode: 'rect', vals: { len: 30, wid: 4, thick: 2, ulu: 'ft', utu: 'in' } },
  { lbl: '🏢 Parking Lot 1000 ft²', mode: 'area', vals: { area: 1000, thick2: 4, aunit: 'ft2', utu2: 'in' } },
  { lbl: '🛵 Metric Driveway', mode: 'rect', vals: { len: 15, wid: 5, thick: 7.5, ulu: 'm', utu: 'cm' } },
];
function renderPresets(){
  $('#presets').innerHTML = presets.map((p,i) => `<div class="ac-preset" onclick="applyPreset(${i})">${p.lbl}</div>`).join('');
}
window.applyPreset = function(i){
  const p = presets[i];
  setMode(p.mode);
  Object.keys(p.vals).forEach(k => { $('#'+k).value = p.vals[k]; });
  calc();
};

function setMode(m){
  currentMode = m;
  $('#modeRect').classList.toggle('active', m === 'rect');
  $('#modeArea').classList.toggle('active', m === 'area');
  $('#rectForm').style.display = m === 'rect' ? '' : 'none';
  $('#areaForm').style.display = m === 'area' ? '' : 'none';
}
$('#modeRect').addEventListener('click', () => setMode('rect'));
$('#modeArea').addEventListener('click', () => setMode('area'));

['len','wid','thick','ulu','utu','area','aunit','thick2','utu2','density','dunit','price'].forEach(id => {
  $('#'+id).addEventListener('input', calc);
  $('#'+id).addEventListener('change', calc);
});

function init(){
  $('#modeRect').textContent = t('modeRect');
  $('#modeArea').textContent = t('modeArea');
  $('#lbl-len').textContent = t('lblLen');
  $('#lbl-wid').textContent = t('lblWid');
  $('#lbl-thick').textContent = t('lblThick');
  $('#lbl-ulu').textContent = t('lblUlu');
  $('#lbl-utu').textContent = t('lblUtu');
  $('#lbl-area').textContent = t('lblArea');
  $('#lbl-aunit').textContent = t('lblAunit');
  $('#lbl-thick2').textContent = t('lblThick2');
  $('#lbl-utu2').textContent = t('lblUtu2');
  $('#lbl-density').textContent = t('lblDensity');
  $('#lbl-dunit').textContent = t('lblDunit');
  $('#lbl-price').textContent = t('lblPrice');
  $('#lbl-perton').textContent = t('lblPerton');
  $('#note').textContent = t('note');
  renderPresets();
  calc();
}

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🧱', href:'/calc/concrete.html', name:'Concrete Calc'},
    {icon:'🪨', href:'/calc/gravel-calculator.html', name:'Gravel Calc'},
    {icon:'📐', href:'/calc/square-footage.html', name:'Square Footage'},
    {icon:'🧮', href:'/calc/fuel-cost-calculator.html', name:'Fuel Cost'},
  ]
});
init();
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
