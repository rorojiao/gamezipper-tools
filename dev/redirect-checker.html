const { $, copyText, t } = GZ;

let lastChain = null;

function getMethod() {
  return document.querySelector('input[name="method"]:checked')?.value || 'HEAD';
}

function shortCode(n) {
  const codes = {200:'200 OK',201:'201',204:'204',301:'301 Moved',302:'302 Found',303:'303 See Other',304:'304 Not Modified',307:'307 Temp',308:'308 Perm',308:'308 Perm',403:'403',404:'404',500:'500',502:'502',503:'503'};
  return codes[n] || String(n);
}

function classifyStatus(n) {
  if (n>=200 && n<300) return 's2';
  if (n>=300 && n<400) return 's3';
  if (n>=400 && n<500) return 's4';
  if (n>=500) return 's5';
  if (n===0) return 's0';
  return 's-other';
}

function escapeHtml(s) {
  return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function escapeAttr(s) {
  return String(s==null?'':s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');
}

async function traceSingle(url, hop, maxHops) {
  const controller = new AbortController();
  const timeout = setTimeout(() => controller.abort(), 15000);
  const t0 = performance.now();
  try {
    const res = await fetch(url, {
      method: getMethod(),
      redirect: 'manual',
      signal: controller.signal,
      cache: 'no-store',
      credentials: document.getElementById('chk-cookies')?.checked ? 'include' : 'omit',
      headers: { 'User-Agent': navigator.userAgent }
    });
    const dt = Math.round(performance.now() - t0);
    const headers = {};
    res.headers.forEach((v,k) => headers[k] = v);
    return {
      ok: true,
      url, hop, status: res.status, statusText: res.statusText,
      headers, timeMs: dt, type: res.type || 'basic'
    };
  } catch(e) {
    const dt = Math.round(performance.now() - t0);
    return { ok:false, url, hop, status:0, timeMs:dt, error: e.message };
  } finally {
    clearTimeout(timeout);
  }
}

async function doCheck() {
  const raw = $('#input').value.trim();
  if (!raw) { $('#output').innerHTML = `<p style="opacity:.7">${t('empty')}</p>`; return; }
  let url = raw;
  if (!/^https?:\/\//i.test(url)) url = 'https://' + url;

  $('#output').innerHTML = `<p style="opacity:.7">⏳ ${t('check')}…</p>`;

  const hops = [];
  const visited = new Set();
  let current = url;
  const MAX = 20;
  let totalStart = performance.now();

  for (let i=0; i<MAX; i++) {
    if (visited.has(current)) {
      hops.push({ ok:false, url:current, hop:i+1, status:0, error:'LOOP_DETECTED' });
      break;
    }
    visited.add(current);
    const r = await traceSingle(current, i+1, MAX);
    hops.push(r);
    if (!r.ok) break;
    if (r.status >= 300 && r.status < 400 && r.headers['location']) {
      try {
        current = new URL(r.headers['location'], current).toString();
      } catch(e) { break; }
    } else {
      break;
    }
  }
  const totalTime = Math.round(performance.now() - totalStart);
  lastChain = { hops, totalTime, startedUrl: url, timestamp: Date.now() };
  renderResult(lastChain);
}

function renderResult(chain) {
  const final = chain.hops[chain.hops.length - 1];
  const summary = `
    <div class="section-title-mini">📊 ${t('summary')}</div>
    <div class="summary">
      <div class="summary-card"><div class="lbl">${t('finalUrl')}</div><div class="val">${escapeHtml(final && final.ok ? final.url : '—')}</div></div>
      <div class="summary-card"><div class="lbl">${t('totalHops')}</div><div class="val">${chain.hops.length}</div></div>
      <div class="summary-card"><div class="lbl">${t('responseTime')}</div><div class="val">${chain.totalTime} ms</div></div>
      <div class="summary-card"><div class="lbl">${t('httpVersion')}</div><div class="val">HTTP/${final && final.headers && final.headers['alt-svc'] ? '2/3' : '1.1'}</div></div>
    </div>`;

  const chainHtml = chain.hops.map((h, idx) => {
    const isFinal = idx === chain.hops.length - 1;
    const cls = classifyStatus(h.status);
    const code = h.ok ? `${h.status} ${escapeHtml((h.statusText||'').slice(0,16))}` : 'ERR';
    return `<div class="hop ${isFinal?'hop-final':''}">
      <div class="hop-num">${idx===0?t('hop'):''} ${idx+1}</div>
      <div class="hop-status ${cls}">${escapeHtml(code)}</div>
      <div class="hop-url">${escapeHtml(h.url)}${isFinal?`<span class="tag">${t('final')}</span>`:''}</div>
    </div>`;
  }).join('');

  const headersHtml = final && final.ok && final.headers ? `
    <div class="section-title-mini">🧾 ${t('responseHeaders')}</div>
    <table class="headers-table">
      <thead><tr><th>Header</th><th>Value</th></tr></thead>
      <tbody>
        ${Object.entries(final.headers).map(([k,v]) => `<tr><td>${escapeHtml(k)}</td><td>${escapeHtml(v)}</td></tr>`).join('')}
      </tbody>
    </table>` : '';

  $('#output').innerHTML = summary + `
    <div class="section-title-mini">🔗 ${t('redirectChain')}</div>
    <div class="hop-list">${chainHtml}</div>
    ${headersHtml}
    <div class="warn" style="opacity:.7;background:rgba(78,205,196,.08);color:var(--text2)">ℹ️ ${t('corsHint')}</div>`;
}

function loadExample() {
  $('#input').value = 'https://bit.ly/3xRPxYQ';
  doCheck();
}

function doClear() { $('#input').value=''; $('#output').innerHTML=''; lastChain=null; }
