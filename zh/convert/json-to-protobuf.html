  },
  zh: {

    toolDesc: '将 JSON 数据转换为 Protocol Buffers（proto3）架构定义。自动检测嵌套消息、重复字段、映射和类型 — 100% 浏览器本地运行。',
    input: 'JSON 输入',
    output: 'Protobuf 架构 (.proto)',
    msgLabel: '根消息名',
    syntaxPrefix: 'syntax',
    packageLabel: '包名',
    convert: '转换',
    invalid: '✗ JSON 无效',
    valid: '✓ JSON 有效',
    step1: '将 JSON 粘贴到左侧输入框',
    step2: '可选地修改根消息名称',
    step3: 'proto3 架构会自动生成',
    step4: '点击「复制」获取 .proto 文件内容',
  }

const { $, copyText, t } = GZ;

$('#lbl-in').textContent = t('input');
$('#lbl-out').textContent = t('output');
$('#lbl-msg').textContent = t('msgLabel');

function toPascalCase(s) {
  if (!s) return 'Field';
  // Handle snake_case, kebab-case, spaces
  return s.replace(/(^|[_\-\s])([a-z])/g, (_, __, c) => c.toUpperCase())
          .replace(/[^a-zA-Z0-9]/g, '');
}

function toCamelCase(s) {
  const p = toPascalCase(s);
  return p.charAt(0).toLowerCase() + p.slice(1);
}

function protoType(value, fieldName, messages) {
  if (value === null || value === undefined) return null; // skip
  switch (typeof value) {
    case 'string':
      // Try detecting bool
      if (value === 'true' || value === 'false') return 'bool';
      // Try number?
      if (/^-?\d+$/.test(value)) return 'int64';
      if (/^-?\d*\.\d+$/.test(value)) return 'double';
      return 'string';
    case 'number':
      return Number.isInteger(value) ? 'int64' : 'double';
    case 'boolean':
      return 'bool';
    case 'object':
      if (Array.isArray(value)) {
        const inner = value.length > 0 ? protoType(value[0], fieldName, messages) : 'string';
        return `repeated ${inner}`;
      }
      // Object → create nested message
      const nestedName = toPascalCase(fieldName);
      const body = generateMessageBody(value, nestedName, messages);
      messages.push({ name: nestedName, body });
      return nestedName;
  }
  return 'string';
}

function generateMessageBody(obj, msgName, messages) {
  const lines = [];
  let fieldNumber = 1;
  for (const [k, v] of Object.entries(obj)) {
    if (v === null) continue; // skip nulls
    let typeStr;
    const repeated = Array.isArray(v);
    if (repeated) {
      const inner = v.length > 0 ? protoType(v[0], k, messages) : 'string';
      typeStr = `repeated ${inner}`;
    } else if (typeof v === 'object') {
      const nestedName = toPascalCase(k);
      const body = generateMessageBody(v, nestedName, messages);
      messages.push({ name: nestedName, body });
      typeStr = nestedName;
    } else {
      typeStr = protoType(v, k, messages);
    }
    const fieldName = toCamelCase(k);
    lines.push(`  ${typeStr} ${fieldName} = ${fieldNumber};`);
    fieldNumber++;
  }
  return lines.join('\n');
}

function convert() {
  const inp = $('#input').value.trim();
  if (!inp) { $('#output').textContent = ''; $('#status').innerHTML=''; return; }
  try {
    const obj = JSON.parse(inp);
    const rootName = toPascalCase($('#msg-name').value || 'MyMessage');
    const messages = [];
    let body;
    if (Array.isArray(obj)) {
      // Treat as repeated root
      const sample = obj[0] || {};
      const nestedName = rootName + 'Item';
      body = generateMessageBody(sample, nestedName, messages);
      messages.push({ name: nestedName, body });
      body = `  repeated ${nestedName} items = 1;`;
    } else if (typeof obj === 'object') {
      body = generateMessageBody(obj, rootName, messages);
    } else {
      throw new Error('Root JSON must be object or array');
    }
    let proto = `syntax = "proto3";\n\n`;
    proto += `package ${toCamelCase(rootName)};\n\n`;
    proto += `message ${rootName} {\n${body}\n}\n`;
    // nested messages (in order, but skip duplicate of root)
    for (const m of messages) {
      if (m.name === rootName) continue;
      proto += `\nmessage ${m.name} {\n${m.body}\n}\n`;
    }
    // Render with light syntax highlighting
    const html = proto
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/(\/\/[^\n]*)/g, '<span class="cm">$1</span>')
      .replace(/\b(syntax|package|message|repeated|map|optional)\b/g, '<span class="kw">$1</span>')
      .replace(/\b(string|int32|int64|uint32|uint64|sint32|sint64|fixed32|fixed64|sfixed32|sfixed64|float|double|bool|bytes)\b/g, '<span class="ty">$1</span>')
      .replace(/"([^"]*)"/g, '<span class="nm">"$1"</span>');
    $('#output').innerHTML = html;
    $('#status').innerHTML = `<span style="color:var(--gz-success)">${t('valid')}</span>`;
    // Store raw for copy
    $('#output').dataset.raw = proto;
  } catch(e) {
    $('#output').innerHTML = `<span style="color:var(--gz-accent)">${e.message}</span>`;
    $('#status').innerHTML = `<span style="color:var(--gz-accent)">${t('invalid')}: ${e.message}</span>`;
  }
}

$('#input').addEventListener('input', convert);
$('#msg-name').addEventListener('input', convert);

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="copyProto()">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>`;

window.copyProto = function() {
  const raw = $('#output').dataset.raw || $('#output').textContent;
  copyText(raw);
};
window.loadExample = function() {
  $('#input').value = JSON.stringify({
    id: 42,
    name: "GameZipper",
    email: "test@example.com",
    active: true,
    score: 98.6,
    tags: ["dev", "tools"],
    address: {
      street: "123 Main St",
      city: "San Francisco",
      zip: "94105",
      geo: { lat: 37.7749, lng: -122.4194 }
    },
    createdAt: "2026-01-01T00:00:00Z"
  }, null, 2);
  convert();
};
