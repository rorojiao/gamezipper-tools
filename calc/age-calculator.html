<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="age-input">
      <label><span id="lbl-dob"></span><input type="date" id="dob" onchange="calcAge()"></label>
      <label><span id="lbl-target"></span><input type="date" id="target" onchange="calcAge()"></label>
      <button class="gz-btn" id="btn-calc" onclick="calcAge()"></button>
    </div>
    <div id="result"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Age Calculator',
    toolDesc: 'Calculate your exact age in years, months, days, hours and minutes with birthday countdown.',
    dob: 'Date of Birth',
    target: 'Target Date',
    calcBtn: 'Calculate',
    years: 'Years',
    months: 'Months',
    days: 'Days',
    hours: 'Hours',
    minutes: 'Minutes',
    bornOn: 'You were born on a',
    nextBday: 'Next birthday in',
    totalDays: 'Total days lived',
    totalWeeks: 'Total weeks lived',
    totalMonths: 'Total months lived',
    step1: 'Enter your date of birth in the first field',
    step2: 'Optionally change the target date (defaults to today)',
    step3: 'Click Calculate to see your exact age',
    step4: 'View detailed breakdown including total days, weeks and months',
  },
  zh: {
    toolTitle: '年龄计算器',
    toolDesc: '精确计算你的年龄 — 年、月、日、小时和分钟，附生日倒计时。',
    dob: '出生日期',
    target: '目标日期',
    calcBtn: '计算',
    years: '岁',
    months: '月',
    days: '天',
    hours: '小时',
    minutes: '分钟',
    bornOn: '你出生在',
    nextBday: '距离下一个生日还有',
    totalDays: '已度过总天数',
    totalWeeks: '已度过总周数',
    totalMonths: '已度过总月数',
    step1: '在第一个输入框中输入出生日期',
    step2: '可选择修改目标日期（默认为今天）',
    step3: '点击「计算」查看精确年龄',
    step4: '查看详细统计，包括总天数、周数和月数',
  }
});

const { $, t } = GZ;

const daysEn = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const daysZh = ['星期日','星期一','星期二','星期三','星期四','星期五','星期六'];
const lang = GZI18n.getLang();
const dayNames = lang === 'zh' ? daysZh : daysEn;

$('#lbl-dob').textContent = t('dob');
$('#lbl-target').textContent = t('target');
$('#btn-calc').textContent = t('calcBtn');

const today = new Date();
$('#target').value = today.toISOString().split('T')[0];

function calcAge() {
  const dobVal = $('#dob').value;
  if (!dobVal) return;
  const birth = new Date(dobVal + 'T00:00:00');
  let targetVal = $('#target').value;
  if (!targetVal) targetVal = new Date().toISOString().split('T')[0];
  const target = new Date(targetVal + 'T00:00:00');

  if (target <= birth) { $('#result').innerHTML = ''; return; }

  let years = target.getFullYear() - birth.getFullYear();
  let months = target.getMonth() - birth.getMonth();
  let days = target.getDate() - birth.getDate();

  if (days < 0) {
    months--;
    const prev = new Date(target.getFullYear(), target.getMonth(), 0);
    days += prev.getDate();
  }
  if (months < 0) { years--; months += 12; }

  const diffMs = target - birth;
  const totalDays = Math.floor(diffMs / 86400000);
  const totalWeeks = Math.floor(totalDays / 7);
  const totalHours = Math.floor(diffMs / 3600000);
  const totalMinutes = Math.floor(diffMs / 60000);
  let totalMonths = years * 12 + months;

  const bornDay = dayNames[birth.getDay()];

  // Next birthday
  let nextBday = new Date(target.getFullYear(), birth.getMonth(), birth.getDate());
  if (nextBday <= target) nextBday = new Date(target.getFullYear() + 1, birth.getMonth(), birth.getDate());
  const bdayDiff = Math.ceil((nextBday - target) / 86400000);

  $('#result').innerHTML = `
    <div class="age-grid">
      <div class="age-card"><div class="value">${years}</div><div class="label">${t('years')}</div></div>
      <div class="age-card"><div class="value">${months}</div><div class="label">${t('months')}</div></div>
      <div class="age-card"><div class="value">${days}</div><div class="label">${t('days')}</div></div>
      <div class="age-card"><div class="value">${totalHours.toLocaleString()}</div><div class="label">${t('hours')}</div></div>
      <div class="age-card"><div class="value">${totalMinutes.toLocaleString()}</div><div class="label">${t('minutes')}</div></div>
    </div>
    <div class="age-detail">
      <p>🎂 ${t('bornOn')}: <span>${bornDay}</span></p>
      <p>🎉 ${t('nextBday')}: <span>${bdayDiff} ${t('days')}</span></p>
      <p>📅 ${t('totalDays')}: <span>${totalDays.toLocaleString()}</span></p>
      <p>📆 ${t('totalWeeks')}: <span>${totalWeeks.toLocaleString()}</span></p>
      <p>🗓️ ${t('totalMonths')}: <span>${totalMonths.toLocaleString()}</span></p>
    </div>`;
}

$('#toolbar').innerHTML = '';

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📅', href:'/calc/date-calculator.html', name:'Date Calculator'},
    {icon:'🔢', href:'/calc/percentage-calculator.html', name:'Percentage Calc'},
    {icon:'⚖️', href:'/calc/bmi-calculator.html', name:'BMI Calculator'},
    {icon:'⛽', href:'/calc/fuel-cost-calculator.html', name:'Fuel Cost'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
