const { $, copyText, t } = GZ;
let target = 'fetch';

/* ---- shared curl parser ---- */
function tokenizeCurl(input){
  const raw = input.replace(/^\s*curl\s+/i,'').replace(/\\\n/g,' ').replace(/\\\r\n/g,' ').trim();
  const tokens=[]; let cur=''; let q=null;
  for(let i=0;i<raw.length;i++){
    const c=raw[i];
    if(q){
      if(c===q){q=null;continue;}
      cur+=c;
    }else if(c==='"'||c==="'"){q=c;}
    else if(c===' '||c==='\t'||c==='\n'||c==='\r'){ if(cur){tokens.push(cur);cur='';} }
    else {cur+=c;}
  }
  if(cur)tokens.push(cur);
  return tokens;
}
function parseCurl(input){
  const r={url:'',method:null,headers:{},data:null,dataRaw:null,cookies:null,user:null,insecure:false,location:false,compressed:false};
  const toks=tokenizeCurl(input);
  for(let i=0;i<toks.length;i++){
    const a=toks[i];
    const next=()=>toks[++i];
    if(a==='-X'||a==='--request'){r.method=next();continue;}
    if(a==='-H'||a==='--header'){const h=next();const idx=h.indexOf(':');if(idx>-1){r.headers[h.slice(0,idx).trim().toLowerCase()]=h.slice(idx+1).trim();}continue;}
    if(a==='-d'||a==='--data'||a==='--data-raw'||a==='--data-binary'||a==='--data-ascii'){r.data=next();continue;}
    if(a==='--data-urlencode'){r.data=(r.data?r.data+'&':'')+next();continue;}
    if(a==='-b'||a==='--cookie'){r.cookies=next();continue;}
    if(a==='-u'||a==='--user'){r.user=next();continue;}
    if(a==='-A'||a==='--user-agent'){r.headers['user-agent']=next();continue;}
    if(a==='-e'||a==='--referer'){r.headers['referer']=next();continue;}
    if(a==='-L'||a==='--location'){r.location=true;continue;}
    if(a==='-k'||a==='--insecure'){r.insecure=true;continue;}
    if(a==='--compressed'){r.compressed=true;continue;}
    if(a==='-I'||a==='--head'){r.method='HEAD';continue;}
    if(a==='-F'||a==='--form'){r.dataRaw=(r.dataRaw||[]);r.dataRaw.push(['form',next()]);continue;}
    if(a==='--url'){r.url=next();continue;}
    if(a.startsWith('-')){ /* skip unknown flag, may consume value */ if(!a.startsWith('--')&&a.length>2){} continue; }
    if(!r.url && (a.startsWith('http://')||a.startsWith('https://')||a.startsWith('www.')||a.startsWith('$'))){r.url=a.replace(/^\$/,'');continue;}
    if(!r.url && /^[a-z0-9.-]+\.[a-z]{2,}/i.test(a)){r.url='https://'+a;continue;}
    if(!r.url){r.url=a;}
  }
  return r;
}
function isJson(str){str=str&&str.trim();if(!str)return false;return (str[0]==='{'&&str[str.length-1]==='}')||(str[0]==='['&&str[str.length-1]===']');}
function jsVal(s){try{return JSON.parse(s);}catch(e){return s;}}
function jsString(s){return JSON.stringify(s);}
function indent(n){return '  '.repeat(n);}

/* ---- generators ---- */
function genFetch(c){
  const headers={...c.headers};
  if(c.cookies&&!headers['cookie'])headers['cookie']=c.cookies;
  if(c.user&&!headers['authorization']){const [u,p]=c.user.split(':');try{headers['authorization']='Basic '+btoa(u+':'+(p||''));}catch(e){headers['authorization']='Basic '+u+':'+(p||'');}}
  let body;
  if(c.data!==null){ if(isJson(c.data)){try{body='JSON.stringify('+JSON.stringify(JSON.parse(c.data),null,2)+')';headers['content-type']=headers['content-type']||'application/json';}catch(e){body=jsString(c.data);}} else {body=jsString(c.data);} }
  const method=(c.method||(c.data!==null?'POST':'GET')).toUpperCase();
  const url=c.url||'https://api.example.com/endpoint';
  const lines=[];
  if(c.user){const [u,p]=c.user.split(':');lines.push("// Basic Auth credentials: "+u+(p?':'+p:''));}
  lines.push("const response = await fetch("+jsString(url)+", {");
  lines.push(indent(1)+"method: "+jsString(method)+",");
  const hk=Object.keys(headers);
  if(hk.length){
    lines.push(indent(1)+"headers: {");
    hk.forEach((k,i)=>{lines.push(indent(2)+jsString(k)+': '+jsString(headers[k])+(i<hk.length-1?',':''));});
    lines.push(indent(1)+"},");
  }
  if(body!==undefined)lines.push(indent(1)+"body: "+body+",");
  if(c.location)lines.push(indent(1)+'redirect: "follow",');
  lines.push("});");
  lines.push("const data = await response.json();");
  lines.push("console.log(data);");
  return lines.join("\n");
}

function genAxios(c){
  const headers={...c.headers};
  if(c.cookies&&!headers['cookie'])headers['cookie']=c.cookies;
  const method=(c.method||(c.data!==null?'post':'get')).toLowerCase();
  let dataPayload=null;
  if(c.data!==null){ if(isJson(c.data)){try{dataPayload=JSON.parse(c.data);}catch(e){dataPayload=c.data;}} else {dataPayload=c.data;} }
  let url=c.url||'https://api.example.com/endpoint';
  const lines=[];
  lines.push("const response = await axios."+method+"("+jsString(url)+(dataPayload!==null?", "+JSON.stringify(dataPayload):'')+", {");
  if(Object.keys(headers).length){lines.push(indent(1)+"headers: "+JSON.stringify(headers,null,2).split("\n").join("\n"+indent(1))+",");}
  if(c.user){const [u,p]=c.user.split(':');lines.push(indent(1)+"auth: { username: "+jsString(u||'')+", password: "+jsString(p||'')+" },");}
  if(c.location)lines.push(indent(1)+'maxRedirects: 5,');
  if(c.insecure)lines.push(indent(1)+'// httpsAgent: new https.Agent({ rejectUnauthorized: false }),');
  lines.push("});");
  lines.push("console.log(response.data);");
  return "import axios from 'axios';\n\n"+lines.join("\n");
}

function genXHR(c){
  const headers={...c.headers};
  if(c.cookies&&!headers['cookie'])headers['cookie']=c.cookies;
  const method=(c.method||(c.data!==null?'POST':'GET')).toUpperCase();
  let body=c.data!==null?(isJson(c.data)?c.data:c.data):null;
  let url=c.url||'https://api.example.com/endpoint';
  const lines=[];
  lines.push("const xhr = new XMLHttpRequest();");
  lines.push("xhr.open("+jsString(method)+", "+jsString(url)+");");
  Object.keys(headers).forEach(k=>{lines.push("xhr.setRequestHeader("+jsString(k)+", "+jsString(headers[k])+");");});
  if(c.user){const [u,p]=c.user.split(':');lines.push("xhr.setRequestHeader('Authorization', 'Basic ' + btoa("+jsString(u)+":"+jsString(p||'')+"));;");}
  lines.push("xhr.onreadystatechange = function () {");
  lines.push(indent(1)+"if (xhr.readyState === 4 && xhr.status === 200) {");
  lines.push(indent(2)+"console.log(xhr.responseText);");
  lines.push(indent(1)+"}");
  lines.push("};");
  lines.push("xhr.send("+(body!==null?jsString(body):'null')+");");
  return lines.join("\n");
}

function convert(){
  const inp=$('#input').value.trim();
  if(!inp){$('#output').textContent='';$('#status').innerHTML='';return;}
  let c;try{c=parseCurl(inp);}catch(e){$('#output').textContent='';$('#status').innerHTML='<span style="color:var(--gz-accent)">⚠ '+e.message+'</span>';return;}
  let code='';
  if(target==='fetch')code=genFetch(c);
  else if(target==='axios')code=genAxios(c);
  else code=genXHR(c);
  $('#output').textContent=code;
  const parts=[];
  if(c.method)parts.push(c.method);
  if(c.user)parts.push('🔐 Basic Auth');
  if(c.data!==null)parts.push('📦 body');
  if(Object.keys(c.headers).length)parts.push(Object.keys(c.headers).length+' header(s)');
  $('#status').innerHTML='<span style="color:var(--gz-success)">✓ '+t('lblOut')+(parts.length?' — '+parts.join(' · '):'')+'</span>';
}
window.convert=convert;

  -H 'Accept: application/json' \\

  convert();
}

$('#tabs').innerHTML=['fetch','axios','XHR'].map(x=>`<div class="cjs-tab${x==='fetch'?' active':''}" data-t="${x}" onclick="setTarget('${x}')">${t('target'+x.charAt(0).toUpperCase()+x.slice(1))}</div>`).join('');

  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>

$('#lbl-in').textContent=t('lblIn');
$('#lbl-out').textContent=t('lblOut');
