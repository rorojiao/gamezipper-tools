<style>
.img-drop{border:2px dashed var(--gz-border);border-radius:12px;padding:40px 20px;text-align:center;cursor:pointer;transition:all .3s;margin-bottom:1rem;background:var(--gz-surface)}
.img-drop:hover{border-color:var(--gz-accent);background:rgba(78,205,196,.05)}
.canvas-wrap{position:relative;display:inline-block;max-width:100%;cursor:crosshair;margin-bottom:1rem}
.canvas-wrap canvas{max-width:100%;border-radius:8px;border:1px solid var(--gz-border)}
.magnifier{position:absolute;width:100px;height:100px;border:3px solid var(--gz-accent);border-radius:50%;pointer-events:none;display:none;box-shadow:0 0 0 2px #fff,0 2px 10px rgba(0,0,0,.3);overflow:hidden}
.magnifier canvas{width:100px;height:100px;border-radius:50%}
.picked-colors{display:flex;flex-wrap:wrap;gap:8px;margin-top:1rem}
.color-chip{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--gz-surface);border:1px solid var(--gz-border);border-radius:8px;cursor:pointer;transition:transform .15s}
.color-chip:hover{transform:scale(1.05)}
.color-swatch{width:36px;height:36px;border-radius:6px;border:1px solid var(--gz-border)}
.color-info{font-size:.8em;line-height:1.4}
.color-info .hex{font-weight:600;font-size:.95em}
.color-info .rgb{color:var(--gz-text-muted)}
.color-info .hsl{color:var(--gz-text-muted)}
.current-pick{display:flex;align-items:center;gap:16px;padding:16px;background:var(--gz-surface);border:1px solid var(--gz-border);border-radius:12px;margin-top:1rem}
.current-swatch{width:80px;height:80px;border-radius:12px;border:2px solid var(--gz-border);flex-shrink:0}
.current-values{flex:1}
.current-values div{margin:4px 0;font-size:.9em}
.current-values .val-label{color:var(--gz-text-muted);display:inline-block;width:45px}
.current-values .val-text{font-weight:600;font-family:monospace}
</style>

<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"How do I pick a color from an image?","acceptedAnswer":{"@type":"Answer","text":"Upload or drag an image into the tool, then click anywhere on the image. The color at that point is instantly displayed in HEX, RGB and HSL formats."}},{"@type":"Question","name":"Can I pick multiple colors?","acceptedAnswer":{"@type":"Answer","text":"Yes. Each click adds the color to your palette below the image. You can click on as many colors as you need."}},{"@type":"Question","name":"What color formats are supported?","acceptedAnswer":{"@type":"Answer","text":"The tool shows HEX (#FF5733), RGB (rgb(255,87,51)), and HSL (hsl(11,100%,60%)) formats for every picked color."}},{"@type":"Question","name":"Is my image uploaded to a server?","acceptedAnswer":{"@type":"Answer","text":"No. The image is processed entirely in your browser using Canvas. Nothing is uploaded anywhere."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="img-drop" id="dropZone" style="display:block">
      <p style="font-size:1.1em;margin-bottom:8px">📷</p>
      <p id="dropText"></p>
    </div>
    <input type="file" id="fileInput" accept="image/*" hidden>
    <div id="canvasArea" style="display:none;text-align:center">
      <div class="canvas-wrap" id="canvasWrap">
        <canvas id="imgCanvas"></canvas>
        <div class="magnifier" id="magnifier"><canvas id="magCanvas" width="100" height="100"></canvas></div>
      </div>
    </div>
    <div class="current-pick" id="currentPick" style="display:none">
      <div class="current-swatch" id="currentSwatch"></div>
      <div class="current-values" id="currentValues"></div>
    </div>
    <div class="picked-colors" id="pickedColors"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en:{
    toolTitle:'Color Picker from Image',
    toolDesc:'Upload an image and click to pick any color. Get HEX, RGB and HSL values instantly with a magnifier preview.',
    dropText:'Drop an image here or click to upload',
    step1:'Upload or drag an image into the tool',
    step2:'Move your mouse to see a magnified preview',
    step3:'Click anywhere on the image to pick a color',
    step4:'Click on a picked color to copy its value',
    hex:'HEX',rgb:'RGB',hsl:'HSL',
  },
  zh:{
    toolTitle:'图片取色器',
    toolDesc:'上传图片并点击选取任意颜色。即时获取 HEX、RGB 和 HSL 值，带放大镜预览。',
    dropText:'拖拽图片到此处或点击上传',
    step1:'上传或拖拽图片到工具中',
    step2:'移动鼠标查看放大预览',
    step3:'点击图片任意位置选取颜色',
    step4:'点击已选颜色复制色值',
    hex:'HEX',rgb:'RGB',hsl:'HSL',
  }
});
const {$,copyText,t}=GZ;
const canvas=$('#imgCanvas');
const ctx=canvas.getContext('2d');
const mag=$('#magnifier');
const magCtx=$('#magCanvas').getContext('2d');
let img=null;
let pickedColors=[];
let scaleRatio=1;

function rgbToHex(r,g,b){return '#'+[r,g,b].map(x=>x.toString(16).padStart(2,'0')).join('');}
function rgbToHsl(r,g,b){r/=255;g/=255;b/=255;const mx=Math.max(r,g,b),mn=Math.min(r,g,b);let h,s,l=(mx+mn)/2;if(mx===mn){h=s=0;}else{const d=mx-mn;s=l>.5?d/(2-mx-mn):d/(mx+mn);switch(mx){case r:h=((g-b)/d+(g<b?6:0))/6;break;case g:h=((b-r)/d+2)/6;break;case b:h=((r-g)/d+4)/6;break;}}return `hsl(${Math.round(h*360)}, ${Math.round(s*100)}%, ${Math.round(l*100)}%)`;}

function loadImage(file){
  const reader=new FileReader();
  reader.onload=e=>{
    img=new Image();
    img.onload=()=>{
      const maxW=Math.min(800,window.innerWidth-60);
      scaleRatio=Math.min(1,maxW/img.width);
      canvas.width=img.width*scaleRatio;
      canvas.height=img.height*scaleRatio;
      ctx.drawImage(img,0,0,canvas.width,canvas.height);
      $('#dropZone').style.display='none';
      $('#canvasArea').style.display='block';
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}

function getPixelColor(e){
  const rect=canvas.getBoundingClientRect();
  const x=Math.floor((e.clientX-rect.left)*(canvas.width/rect.width));
  const y=Math.floor((e.clientY-rect.top)*(canvas.height/rect.height));
  if(x<0||y<0||x>=canvas.width||y>=canvas.height)return null;
  const pixel=ctx.getImageData(x,y,1,1).data;
  return{r:pixel[0],g:pixel[1],b:pixel[2]};
}

function showMagnifier(e){
  const rect=canvas.getBoundingClientRect();
  const cx=e.clientX-rect.left;
  const cy=e.clientY-rect.top;
  if(cx<0||cy<0||cx>rect.width||cy>rect.height){mag.style.display='none';return;}
  mag.style.display='block';
  mag.style.left=(cx-50)+'px';
  mag.style.top=(cy-50)+'px';
  // Draw magnified
  const sx=Math.floor((e.clientX-rect.left)*(canvas.width/rect.width))-5;
  const sy=Math.floor((e.clientY-rect.top)*(canvas.height/rect.height))-5;
  magCtx.imageSmoothingEnabled=false;
  magCtx.clearRect(0,0,100,100);
  magCtx.drawImage(canvas,sx,sy,10,10,0,0,100,100);
  // Crosshair
  magCtx.strokeStyle='#fff';magCtx.lineWidth=1;
  magCtx.strokeRect(44,44,12,12);
}

canvas.addEventListener('mousemove',e=>{
  showMagnifier(e);
  const c=getPixelColor(e);
  if(c)showCurrentPick(c);
});
canvas.addEventListener('mouseleave',()=>{mag.style.display='none';});
canvas.addEventListener('click',e=>{
  const c=getPixelColor(e);
  if(!c)return;
  const hex=rgbToHex(c.r,c.g,c.b);
  const hsl=rgbToHsl(c.r,c.g,c.b);
  const rgbStr=`rgb(${c.r}, ${c.g}, ${c.b})`;
  pickedColors.unshift({hex,rgb:rgbStr,hsl,r:c.r,g:c.g,b:c.b});
  if(pickedColors.length>20)pickedColors.pop();
  renderPicked();
});

function showCurrentPick(c){
  const hex=rgbToHex(c.r,c.g,c.b);
  const hsl=rgbToHsl(c.r,c.g,c.b);
  const rgbStr=`rgb(${c.r}, ${c.g}, ${c.b})`;
  $('#currentPick').style.display='flex';
  $('#currentSwatch').style.background=hex;
  $('#currentValues').innerHTML=`
    <div><span class="val-label">${t('hex')}:</span><span class="val-text">${hex}</span></div>
    <div><span class="val-label">${t('rgb')}:</span><span class="val-text">${rgbStr}</span></div>
    <div><span class="val-label">${t('hsl')}:</span><span class="val-text">${hsl}</span></div>`;
}

function renderPicked(){
  $('#pickedColors').innerHTML=pickedColors.map(c=>`
    <div class="color-chip" onclick="copyText('${c.hex}')" title="Click to copy ${c.hex}">
      <div class="color-swatch" style="background:${c.hex}"></div>
      <div class="color-info">
        <div class="hex">${c.hex}</div>
        <div class="rgb">${c.rgb}</div>
      </div>
    </div>`).join('');
}

function resetTool(){
  img=null;pickedColors=[];
  $('#canvasArea').style.display='none';
  $('#currentPick').style.display='none';
  $('#pickedColors').innerHTML='';
  $('#dropZone').style.display='block';
}

// Drop zone
const dz=$('#dropZone');
dz.addEventListener('click',()=>$('#fileInput').click());
$('#fileInput').addEventListener('change',e=>{if(e.target.files[0])loadImage(e.target.files[0]);});
dz.addEventListener('dragover',e=>{e.preventDefault();dz.style.borderColor='var(--gz-accent)';});
dz.addEventListener('dragleave',()=>{dz.style.borderColor='';});
dz.addEventListener('drop',e=>{e.preventDefault();dz.style.borderColor='';if(e.dataTransfer.files[0])loadImage(e.dataTransfer.files[0]);});
$('#dropText').textContent=t('dropText');

$('#toolbar').innerHTML=`<button class="gz-btn gz-btn-secondary" onclick="$('#fileInput').click()">Upload</button><button class="gz-btn gz-btn-secondary" onclick="resetTool()">${t('clear')}</button>`;

GZ.renderToolPage({category:'image',titleKey:'toolTitle',descKey:'toolDesc',howToSteps:['step1','step2','step3','step4'],related:[
  {icon:'🎨',href:'/color/picker.html',name:'Color Picker'},
  {icon:'💧',href:'/image/color-extractor.html',name:'Color Extractor'},
  {icon:'🔄',href:'/color/hex-rgb.html',name:'HEX ↔ RGB'},
]});
</script>
<script src="/tools-result-rec.js?v=20260707v520" defer></script>
</body>
</html>
