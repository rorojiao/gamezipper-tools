<script>
GZI18n.register({
  en: {
    toolTitle: 'Color Palette from Image',
    toolDesc: 'Extract the dominant color palette from any image. Get 5-10 swatches with HEX, RGB and HSL values and export as CSS variables, JSON or PNG swatch image.',
    step1: 'Drop or upload any image (JPG, PNG, WebP, GIF)',
    step2: 'Adjust the number of colors and minimum saturation',
    step3: 'Click any swatch to copy HEX, RGB or HSL to clipboard',
    step4: 'Export the palette as CSS variables, JSON or PNG',
  },
  zh: {
    toolTitle: '从图片提取调色板',
    toolDesc: '从任意图片中提取主色调色板。获取 5-10 个色板及其 HEX、RGB、HSL 值，支持导出为 CSS 变量、JSON 或 PNG 调色板图。',
    step1: '拖入或上传任意图片（JPG、PNG、WebP、GIF）',
    step2: '调整颜色数量和最小饱和度阈值',
    step3: '点击任意色板复制 HEX、RGB 或 HSL 到剪贴板',
    step4: '将调色板导出为 CSS 变量、JSON 或 PNG',
  }
});

const { $, t, showToast } = GZ;

let currentPalette = [];

function rgbToHex(r, g, b) {
  return '#' + [r, g, b].map(v => Math.round(v).toString(16).padStart(2, '0')).join('').toUpperCase();
}

function rgbToHsl(r, g, b) {
  r /= 255; g /= 255; b /= 255;
  const max = Math.max(r,g,b), min = Math.min(r,g,b);
  let h, s, l = (max + min) / 2;
  if (max === min) { h = s = 0; }
  else {
    const d = max - min;
    s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
    switch (max) {
      case r: h = (g - b) / d + (g < b ? 6 : 0); break;
      case g: h = (b - r) / d + 2; break;
      case b: h = (r - g) / d + 4; break;
    }
    h /= 6;
  }
  return `hsl(${Math.round(h*360)}, ${Math.round(s*100)}%, ${Math.round(l*100)}%)`;
}

function rgbToYCbCr(r, g, b) {
  return 0.299*r + 0.587*g + 0.114*b;
}

function isGrayish(r, g, b, minSat) {
  const max = Math.max(r, g, b);
  const min = Math.min(r, g, b);
  if (max === 0) return true;
  const sat = (max - min) / max;
  return sat < (minSat / 100);
}

// Median cut color quantization
function quantize(pixels, colorCount) {
  if (pixels.length === 0) return [];
  const buckets = [pixels];
  while (buckets.length < colorCount) {
    // Find bucket with largest range
    let bestIdx = -1, bestRange = -1;
    for (let i = 0; i < buckets.length; i++) {
      if (buckets[i].length < 2) continue;
      const r = findRange(buckets[i]);
      if (r > bestRange) { bestRange = r; bestIdx = i; }
    }
    if (bestIdx === -1) break;
    const bucket = buckets[bestIdx];
    const channel = findWidestChannel(bucket);
    bucket.sort((a, b) => a[channel] - b[channel]);
    const mid = Math.floor(bucket.length / 2);
    const left = bucket.slice(0, mid);
    const right = bucket.slice(mid);
    buckets.splice(bestIdx, 1, left, right);
  }
  // Average each bucket
  return buckets.map(b => {
    let r = 0, g = 0, bl = 0;
    for (const p of b) { r += p[0]; g += p[1]; bl += p[2]; }
    const n = b.length;
    return {r: r/n, g: g/n, b: bl/n, count: n};
  }).sort((a, b) => b.count - a.count);
}

function findRange(bucket) {
  let rMin=255, rMax=0, gMin=255, gMax=0, bMin=255, bMax=0;
  for (const p of bucket) {
    if (p[0] < rMin) rMin = p[0];
    if (p[0] > rMax) rMax = p[0];
    if (p[1] < gMin) gMin = p[1];
    if (p[1] > gMax) gMax = p[1];
    if (p[2] < bMin) bMin = p[2];
    if (p[2] > bMax) bMax = p[2];
  }
  return Math.max(rMax-rMin, gMax-gMin, bMax-bMin);
}

function findWidestChannel(bucket) {
  let rMin=255, rMax=0, gMin=255, gMax=0, bMin=255, bMax=0;
  for (const p of bucket) {
    if (p[0] < rMin) rMin = p[0]; if (p[0] > rMax) rMax = p[0];
    if (p[1] < gMin) gMin = p[1]; if (p[1] > gMax) gMax = p[1];
    if (p[2] < bMin) bMin = p[2]; if (p[2] > bMax) bMax = p[2];
  }
  const rR = rMax - rMin, gR = gMax - gMin, bR = bMax - bMin;
  if (rR >= gR && rR >= bR) return 0;
  if (gR >= bR) return 1;
  return 2;
}

async function handleFile(file) {
  if (!file) return;
  const url = URL.createObjectURL(file);
  const img = new Image();
  await new Promise((res, rej) => { img.onload = res; img.onerror = rej; img.src = url; });
  $('#preview').innerHTML = `<img src="${url}" alt="${file.name}">`;
  
  // Sample pixels
  const sampleSize = +$('#sampleSize').value;
  const canvas = document.createElement('canvas');
  const ratio = Math.min(1, sampleSize / Math.max(img.naturalWidth, img.naturalHeight));
  canvas.width = Math.max(1, Math.round(img.naturalWidth * ratio));
  canvas.height = Math.max(1, Math.round(img.naturalHeight * ratio));
  const ctx = canvas.getContext('2d', {willReadFrequently: true});
  ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
  const data = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
  const pixels = [];
  const minSat = +$('#minSat').value;
  for (let i = 0; i < data.length; i += 4) {
    const r = data[i], g = data[i+1], b = data[i+2], a = data[i+3];
    if (a < 128) continue;
    if (isGrayish(r, g, b, minSat)) continue;
    pixels.push([r, g, b]);
  }
  const colorCount = +$('#colorCount').value;
  const result = quantize(pixels, colorCount);
  currentPalette = result.map(c => ({r: Math.round(c.r), g: Math.round(c.g), b: Math.round(c.b), count: c.count}));
  renderPalette();
  URL.revokeObjectURL(url);
}

function renderPalette() {
  const grid = $('#palette');
  grid.innerHTML = currentPalette.map((c, i) => {
    const hex = rgbToHex(c.r, c.g, c.b);
    const rgb = `rgb(${c.r}, ${c.g}, ${c.b})`;
    const hsl = rgbToHsl(c.r, c.g, c.b);
    const lum = rgbToYCbCr(c.r, c.g, c.b);
    const txtCol = lum > 128 ? '#000' : '#fff';
    return `
      <div class="cp-swatch" data-idx="${i}">
        <div class="cp-color" style="background:${hex};color:${txtCol}">${c.count}</div>
        <div class="cp-info">
          <div class="h">${hex}</div>
          <div class="r">${rgb}</div>
          <div class="r">${hsl}</div>
        </div>
      </div>`;
  }).join('');
  $('#paletteSection').style.display = 'block';
  
  grid.querySelectorAll('.cp-swatch').forEach(el => {
    const idx = +el.dataset.idx;
    const c = currentPalette[idx];
    el.addEventListener('click', () => {
      navigator.clipboard.writeText(rgbToHex(c.r, c.g, c.b));
      showToast('Copied ' + rgbToHex(c.r, c.g, c.b));
    });
  });
}

$('#colorCount').addEventListener('input', e => {
  $('#colorCountVal').textContent = e.target.value;
});
$('#minSat').addEventListener('input', e => {
  $('#minSatVal').textContent = e.target.value + '%';
});

const drop = $('#drop');
const fileInput = $('#file');
drop.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', e => handleFile(e.target.files[0]));
drop.addEventListener('dragover', e => { e.preventDefault(); drop.classList.add('drag'); });
drop.addEventListener('dragleave', () => drop.classList.remove('drag'));
drop.addEventListener('drop', e => {
  e.preventDefault();
  drop.classList.remove('drag');
  if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
});

$('#exportCSS').addEventListener('click', () => {
  const code = ':root {\n' + currentPalette.map((c, i) => `  --color-${i+1}: ${rgbToHex(c.r, c.g, c.b)};`).join('\n') + '\n}';
  const codeOut = $('#codeOut');
  codeOut.style.display = 'block';
  codeOut.textContent = code;
  navigator.clipboard.writeText(code);
  showToast('CSS copied to clipboard');
});
$('#exportJSON').addEventListener('click', () => {
  const arr = currentPalette.map(c => ({
    hex: rgbToHex(c.r, c.g, c.b),
    rgb: `rgb(${c.r}, ${c.g}, ${c.b})`,
    hsl: rgbToHsl(c.r, c.g, c.b)
  }));
  const code = JSON.stringify(arr, null, 2);
  const codeOut = $('#codeOut');
  codeOut.style.display = 'block';
  codeOut.textContent = code;
  navigator.clipboard.writeText(code);
  showToast('JSON copied to clipboard');
});
$('#exportPNG').addEventListener('click', () => {
  if (currentPalette.length === 0) return;
  const w = 600, h = 100, sw = w / currentPalette.length;
  const canvas = document.createElement('canvas');
  canvas.width = w; canvas.height = h;
  const ctx = canvas.getContext('2d');
  currentPalette.forEach((c, i) => {
    ctx.fillStyle = rgbToHex(c.r, c.g, c.b);
    ctx.fillRect(i * sw, 0, sw, h);
  });
  canvas.toBlob(blob => {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'palette.png';
    a.click();
    URL.revokeObjectURL(url);
    showToast('Palette image downloaded');
  });
});

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="$('#file').click()">${t('upload')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#paletteSection').style.display='none';$('#preview').innerHTML='<p class=ph>📷 Image preview will appear here</p>';$('#file').value='';">${t('clear')}</button>`;

GZ.renderToolPage({
  category: 'image',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'💧', href:'/image/color-extractor.html', name:'Color Extractor'},
    {icon:'🎯', href:'/image/color-picker-image.html', name:'Color Picker'},
    {icon:'🎨', href:'/color/palette.html', name:'Palette Generator'},
    {icon:'🖼️', href:'/image/compressor.html', name:'Image Compressor'},
  ]
});
</script>
