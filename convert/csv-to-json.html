    semicolon: '分号',
    tab: '制表符',
    pipe: '竖线',
    firstRowHeader: '首行为表头',
    convert: '转换',

    clear: '清空',
    example: '示例',
    conversionSuccess: '✓ 转换成功',
    conversionError: '✗ 转换错误',
    step1: '在输入区粘贴或输入 CSV 数据',
    step2: '选择分隔符和表头选项',
    step3: '点击「转换」或自动转换处理数据',
    step4: '将格式化的 JSON 输出复制到剪贴板',
  }
});

let currentDelimiter = ',';
let useHeader = true;
const { $, copyText, t } = GZ;

function syntaxHighlight(json) {
  return json.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
  .replace(/("(\\u[\da-fA-F]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(\.\d+)?([eE][+-]?\d+)?)/g, m => {
    let c = 'json-number';
    if (/^"/.test(m)) c = /:$/.test(m) ? 'json-key' : 'json-string';
    else if (/true|false/.test(m)) c = 'json-bool';
    else if (/null/.test(m)) c = 'json-null';
    return `<span class="${c}">${m}</span>`;
  });
}

function parseCSV(text, delim) {
  const rows = [];
  let current = '';
  let inQuotes = false;
  let row = [];

  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    const next = text[i + 1];

    if (inQuotes) {
      if (ch === '"' && next === '"') {
        current += '"';
        i++;
      } else if (ch === '"') {
        inQuotes = false;
      } else {
        current += ch;
      }
    } else {
      if (ch === '"') {
        inQuotes = true;
      } else if (ch === delim) {
        row.push(current);
        current = '';
      } else if (ch === '\n' || (ch === '\r' && next === '\n')) {
        row.push(current);
        current = '';
        if (row.some(c => c.trim() !== '') || row.length > 1) rows.push(row);
        row = [];
        if (ch === '\r') i++;
      } else {
        current += ch;
      }
    }
  }
  row.push(current);
  if (row.some(c => c.trim() !== '') || row.length > 1) rows.push(row);

  return rows;
}

function csvToJson(rows, hasHeader) {
  if (!rows.length) return [];
  if (!hasHeader) return rows;

  const headers = rows[0];
  const result = [];
  for (let i = 1; i < rows.length; i++) {
    const obj = {};
    headers.forEach((h, j) => {
      let val = rows[i][j] !== undefined ? rows[i][j] : '';
      val = val.trim();
      if (val === '') { obj[h.trim()] = null; }
      else if (!isNaN(val) && val !== '') { obj[h.trim()] = Number(val); }
      else if (val === 'true') { obj[h.trim()] = true; }
      else if (val === 'false') { obj[h.trim()] = false; }
      else { obj[h.trim()] = val; }
    });
    result.push(obj);
  }
  return result;
}

function doConvert() {
  const inp = $('#input').value;
  if (!inp.trim()) { $('#output').innerHTML = ''; $('#status').innerHTML = ''; return; }
  try {
    const rows = parseCSV(inp, currentDelimiter);
    if (!rows.length) throw new Error('No data found');
    const json = csvToJson(rows, useHeader);
    const formatted = JSON.stringify(json, null, 2);
    $('#output').innerHTML = syntaxHighlight(formatted);
    $('#status').innerHTML = `<span style="color:var(--gz-success)">${t('conversionSuccess')}</span>`;
  } catch (e) {
    $('#status').innerHTML = `<span style="color:var(--gz-accent)">${t('conversionError')}: ${e.message}</span>`;
    $('#output').innerHTML = `<span style="color:var(--gz-accent)">${e.message}</span>`;
  }
}

function loadExample() {
  $('#input').value = 'name,age,city,active\nAlice,30,New York,true\nBob,25,London,false\nCharlie,35,Paris,true';
  doConvert();
}

function doClear() { $('#input').value = ''; $('#output').textContent = ''; $('#status').innerHTML = ''; }

$('#input').addEventListener('input', doConvert);

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="doConvert()">${t('convert')}</button>
  <select class="gz-select" onchange="currentDelimiter=this.value;doConvert()">
    <option value=",">${t('comma')} (,)</option>
    <option value=";">${t('semicolon')} (;)</option>
    <option value="\\t">${t('tab')}</option>
    <option value="|">${t('pipe')} (|)</option>
  </select>
  <label><input type="checkbox" id="hdrChk" checked onchange="useHeader=this.checked;doConvert()"> ${t('firstRowHeader')}</label>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;
