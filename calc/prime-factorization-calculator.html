const { $, t } = GZ;

function factorize(n){
  const factors=[];
  let d=2;
  while(n>1){
    if(d*d>n){ factors.push([n,1]); break; }
    if(n%d===0){
      let count=0;
      while(n%d===0){ n/=d; count++; }
      factors.push([d,count]);
    } else {
      d += (d===2)?1:2;
    }
  }
  return factors;
}

function getDivisors(n){
  const divs=[];
  for(let i=1;i*i<=n;i++){
    if(n%i===0){ divs.push(i); if(i!==n/i) divs.push(n/i); }
  }
  return divs.sort((a,b)=>a-b);
}

function isPrime(n){
  if(n<2) return false;
  if(n<4) return true;
  if(n%2===0) return false;
  for(let i=3;i*i<=n;i+=2) if(n%i===0) return false;
  return true;
}

function super2(e){ // superscript digits
  const map={'0':'⁰','1':'¹','2':'²','3':'³','4':'⁴','5':'⁵','6':'⁶','7':'⁷','8':'⁸','9':'⁹','-':'⁻'};
  return String(e).split('').map(c=>map[c]||c).join('');
}

function doFactor(){
  const raw=$('#num-input').value.trim();
  if(!raw){ $('#result').innerHTML=''; return; }
  if(!/^\d+$/.test(raw)){ $('#result').innerHTML=`<div class="err">${t('invalid')}</div>`; return; }
  const n=parseInt(raw,10);
  if(n===1){ $('#result').innerHTML=`<div class="fact-box">${t('one')}</div>`; return; }
  if(n<2){ $('#result').innerHTML=`<div class="err">${t('enterNum')}</div>`; return; }
  if(n>9007199254740991){ $('#result').innerHTML=`<div class="err">${t('tooBig')}</div>`; return; }

  const factors=factorize(n);
  const prime=isPrime(n);
  const divisors=getDivisors(n);
  const numDiv=divisors.length;
  const sumDiv=divisors.reduce((a,b)=>a+b,0);

  const expForm=factors.map(([b,e])=> e===1?`<span class="base">${b}</span>`:`<span class="base">${b}</span><sup>${e}</sup>`).join(' × ');
  const prodForm=factors.map(([b,e])=>Array(e).fill(b).join(' × ')).join(' × ');
  const plain=n+' = '+factors.map(([b,e])=>e===1?String(b):`${b}^${e}`).join(' × ');
  const divChips=divisors.map(d=>`<span class="chip">${d}</span>`).join('');

  $('#result').innerHTML=`<div class="fact-box">
    <div class="fact-display">${plain}</div>
    <div class="fact-row"><span>${t('isPrime')}</span><span>${prime?t('primeYes'):t('primeNo')}</span></div>
    <div class="fact-row"><span>${t('exponentForm')}</span><span>${expForm}</span></div>
    <div class="fact-row"><span>${t('productForm')}</span><span>${prodForm}</span></div>
    <div class="fact-row"><span>${t('numDivisors')}</span><span>${numDiv}</span></div>
    <div class="fact-row"><span>${t('sumDivisors')}</span><span>${sumDiv}</span></div>
    <div style="margin-top:10px"><div style="font-weight:600;margin-bottom:4px">${t('divisors')} (${numDiv})</div><div>${divChips}</div></div>
  </div>`;
}

function doClear(){ $('#num-input').value=''; $('#result').innerHTML=''; }
function loadExample(){ $('#num-input').value='360'; doFactor(); }

$('#num-input').addEventListener('input', doFactor);
