    toolDesc: '全面文本分析：字数统计、可读性、词汇密度、高频词和二元组。实时在浏览器中分析。',
    words: '词数', chars: '字符数', charsNoSpace: '字符(无空格)', sentences: '句子数', paragraphs: '段落数', syllables: '音节数', uniqueWords: '不重复词', avgWord: '平均词长', avgSent: '平均句长', longestWord: '最长词', readingTime: '阅读时间', speakingTime: '朗读时间',
    min: '分钟', sec: '秒',
    lblReadability: '可读性与复杂度',
    lblKeywords: '高频关键词',
    lblBigrams: '高频二元组 (2 词短语)',
    lblDensity: '词汇密度',
    flesch: 'Flesch 阅读易度',
    fleschStandard: '标准 (60-70)',
    fleschEasy: '容易 (90+)',
    fleschDifficult: '困难 (30-50)',
    grade: 'Flesch-Kincaid 年级',
    highLex: '高 (>60%)',
    midLex: '中 (40-60%)',
    lowLex: '低 (<40%)',
    example: '加载示例',
    clear: '清空',
    copyReport: '复制报告',
    step1: '在上方粘贴或输入文本',
    step2: '查看实时字数统计、可读性和高频词',
    step3: '查看高频二元组短语',
    step4: '使用「复制报告」保存完整分析',
  }
});

const { $, copyText, t } = GZ;

const STOPWORDS = new Set('the a an and or but if for on in at to of by with as is are was were be been being have has had do does did will would could should may might must shall can this that these those i you he she it we they me him her us them my your his its our their what which who whom when where why how not no yes all any some one two three from about into through during before after above below between under out up down off over'.split(' '));

function countSyllables(word) {
  word = word.toLowerCase().replace(/[^a-z]/g, '');
  if (!word) return 0;
  if (word.length <= 3) return 1;
  word = word.replace(/(?:[^laeiouy]es|ed|[^laeiouy]e)$/, '');
  word = word.replace(/^y/, '');
  const m = word.match(/[aeiouy]{1,2}/g);
  return m ? m.length : 1;
}

function analyze() {
  const text = $('#input').value;
  if (!text) {
    $('#stats').innerHTML = '';
    $('#readability').innerHTML = '';
    $('#keywords').innerHTML = '';
    $('#bigrams').innerHTML = '';
    $('#density').innerHTML = '';
    return;
  }

  const charCount = text.length;
  const charNoSpace = text.replace(/\s/g, '').length;
  const wordList = text.match(/\b[\w'-]+\b/g) || [];
  const wordCount = wordList.length;
  const lowerWords = wordList.map(w => w.toLowerCase());
  const uniqueWords = new Set(lowerWords).size;
  const sentList = text.match(/[^.!?。！？]+[.!?。！？]+(?:["')\]]*)/g) || [];
  const sentenceCount = sentList.length || (text.trim() ? 1 : 0);
  const paraCount = text.split(/\n\s*\n+/).filter(p => p.trim()).length;
  let sylCount = 0;
  let longestWord = '';
  let totalWordLen = 0;
  for (const w of wordList) {
    sylCount += countSyllables(w);
    if (w.length > longestWord.length) longestWord = w;
    totalWordLen += w.length;
  }
  const avgWordLen = wordCount > 0 ? (totalWordLen / wordCount).toFixed(1) : '0';
  const avgSentLen = sentenceCount > 0 ? (wordCount / sentenceCount).toFixed(1) : '0';
  const readingMin = (wordCount / 200);
  const readingLabel = readingMin < 1 ? '< 1 ' + t('min') : readingMin.toFixed(1) + ' ' + t('min');
  const speakMin = wordCount / 130;

  $('#stats').innerHTML = `
    <div class="ts-stat"><div class="v">${wordCount}</div><div class="l">${t('words')}</div></div>
    <div class="ts-stat"><div class="v">${charCount}</div><div class="l">${t('chars')}</div></div>
    <div class="ts-stat"><div class="v">${charNoSpace}</div><div class="l">${t('charsNoSpace')}</div></div>
    <div class="ts-stat"><div class="v">${sentenceCount}</div><div class="l">${t('sentences')}</div></div>
    <div class="ts-stat"><div class="v">${paraCount}</div><div class="l">${t('paragraphs')}</div></div>
    <div class="ts-stat"><div class="v">${sylCount}</div><div class="l">${t('syllables')}</div></div>
    <div class="ts-stat"><div class="v">${uniqueWords}</div><div class="l">${t('uniqueWords')}</div></div>
    <div class="ts-stat"><div class="v">${avgWordLen}</div><div class="l">${t('avgWord')}</div></div>
    <div class="ts-stat"><div class="v">${avgSentLen}</div><div class="l">${t('avgSent')}</div></div>
    <div class="ts-stat"><div class="v">${longestWord.length || '—'}</div><div class="l">${t('longestWord')}</div></div>
    <div class="ts-stat"><div class="v">${readingLabel}</div><div class="l">${t('readingTime')}</div></div>
    <div class="ts-stat"><div class="v">${(speakMin).toFixed(1)} ${t('min')}</div><div class="l">${t('speakingTime')}</div></div>
  `;

  // Readability
  let flesch = '—', fleschLbl = '—', grade = '—';
  if (wordCount > 0 && sentenceCount > 0) {
    const f = 206.835 - 1.015 * (wordCount / sentenceCount) - 84.6 * (sylCount / wordCount);
    flesch = f.toFixed(1);
    if (f >= 90) fleschLbl = t('fleschEasy');
    else if (f >= 60) fleschLbl = t('fleschStandard');
    else if (f >= 30) fleschLbl = t('fleschDifficult');
    else fleschLbl = 'Very difficult';
    const g = 0.39 * (wordCount / sentenceCount) + 11.8 * (sylCount / wordCount) - 15.59;
    grade = g.toFixed(1);
  }
  $('#readability').innerHTML = `
    <div style="display:flex;align-items:baseline;gap:12px;margin-bottom:8px">
      <span class="ts-read-big">${flesch}</span>
      <span class="ts-read-lbl">${t('flesch')}</span>
    </div>
    <div style="font-size:.9rem;margin-bottom:12px"><strong>${fleschLbl}</strong></div>
    <div class="ts-read-lbl" style="margin-top:8px">${t('grade')}: <strong style="color:var(--accent)">${grade}</strong></div>
  `;

  // Top keywords (skip stopwords, len>=3)
  const freq = {};
  for (const w of lowerWords) {
    if (STOPWORDS.has(w) || w.length < 3 || !/^[a-z]/.test(w)) continue;
    freq[w] = (freq[w] || 0) + 1;
  }
  const sortedK = Object.entries(freq).sort((a, b) => b[1] - a[1]).slice(0, 10);
  const maxK = sortedK.length > 0 ? sortedK[0][1] : 1;
  const colors = ['#4ecdc4','#ffd93d','#e94560','#7b68ee','#00d672','#ff8c42','#61afef','#c678dd','#56b6c2','#d19a66'];
  let kwHtml = '';
  sortedK.forEach(([w, c], i) => {
    const pct = (c / maxK * 100).toFixed(0);
    kwHtml += `<div class="ts-bar-row">
      <span class="name">${w}</span>
      <span class="bar"><span class="fill" style="width:${pct}%;background:${colors[i]}"></span></span>
      <span class="pct">${c}</span>
    </div>`;
  });
  $('#keywords').innerHTML = sortedK.length ? kwHtml : '<div style="opacity:.6;font-size:.85rem">—</div>';

  // Bigrams
  const bigrams = {};
  for (let i = 0; i < lowerWords.length - 1; i++) {
    const a = lowerWords[i], b = lowerWords[i + 1];
    if (STOPWORDS.has(a) || STOPWORDS.has(b) || a.length < 3 || b.length < 3) continue;
    if (!/^[a-z]/.test(a) || !/^[a-z]/.test(b)) continue;
    const key = a + ' ' + b;
    bigrams[key] = (bigrams[key] || 0) + 1;
  }
  const sortedBi = Object.entries(bigrams).sort((a, b) => b[1] - a[1]).slice(0, 15);
  $('#bigrams').innerHTML = sortedBi.length
    ? sortedBi.map(([w, c]) => `<span>${w} <strong style="color:var(--accent)">${c}</strong></span>`).join('')
    : '<div style="opacity:.6;font-size:.85rem">—</div>';

  // Lexical density
  const contentWords = lowerWords.filter(w => !STOPWORDS.has(w) && w.length >= 3 && /^[a-z]/.test(w)).length;
  const lexDensity = wordCount > 0 ? ((contentWords / wordCount) * 100).toFixed(1) : 0;
  const lexLbl = lexDensity > 60 ? t('highLex') : lexDensity > 40 ? t('midLex') : t('lowLex');
  $('#density').innerHTML = `
    <div style="display:flex;align-items:baseline;gap:10px;margin-bottom:10px">
      <span class="ts-read-big">${lexDensity}%</span>
      <span class="ts-read-lbl">${lexLbl}</span>
    </div>
    <div style="font-size:.85rem;margin-bottom:4px">Content words: <strong>${contentWords}</strong></div>
    <div style="font-size:.85rem">Function words: <strong>${wordCount - contentWords}</strong></div>
  `;
}

function copyReport() {
  const txt = $('#input').value;
  if (!txt) return;
  const stats = Array.from(document.querySelectorAll('.ts-stat')).map(s => s.textContent.trim()).join(' | ');
  const read = $('#readability').textContent.trim();
  copyText(`Text Statistics Report\n\n${stats}\n\nReadability:\n${read}\n\nText length: ${txt.length} chars`);
}

function loadExample() {
  $('#input').value = `The Surprising Power of Small Habits

Habits are the compound interest of self-improvement. A single daily improvement of one percent compounds to become 37 times better over a year. This is the same mathematics that makes savings accounts grow and investments multiply. Small changes, consistently applied, produce extraordinary results over time.

Why do most people fail to build good habits? They try to change too much at once. They overhaul their entire diet on Monday, hit the gym for two hours daily, and wake up at 5am — then wonder why they crash by Wednesday. The truth is that sustainable change happens one tiny habit at a time.

The best approach is habit stacking: attach a new habit to an existing routine. Want to read more? Read two pages after brushing your teeth. Want to exercise? Do five pushups after pouring your morning coffee. These tiny actions seem almost too small to matter, but they're the building blocks of lasting change.

Three rules for habit success: start absurdly small, make it obvious, and never miss twice. Missing once is human. Missing twice is the start of a new (bad) habit. Keep your standards low and your consistency high.`;
  analyze();
}

function doClear() { $('#input').value = ''; analyze(); }

$('#input').addEventListener('input', analyze);
$('#toolbar').innerHTML = `
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn" onclick="copyReport()">${t('copyReport')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

loadExample();

  ]

</script>
