<script>
GZI18n.register({
  en: {
    toolTitle: 'Old Norse Runes Translator',
    toolDesc: 'Convert any text into Elder Futhark or Younger Futhark Viking runes instantly. Type and watch the runes appear — copy real Unicode runic characters anywhere.',

    step4: 'Click Copy to paste real Unicode runes anywhere',
  },
  zh: {
    toolTitle: '古北欧符文翻译器',
    toolDesc: '将任意文本即时转换为古北欧符文（Elder Futhark 或 Younger Futhark）。输入即可看到符文结果 — 可复制真实 Unicode 符文字符。',
    elder: 'Elder Futhark（24 符文）',
    younger: 'Younger Futhark（16 符文）',
    lower: '保持小写',
    convert: '转换',
    copy: '复制符文',
    clear: '清除',
    example: '示例',
    tableTitle: '符文字母对照表',
    chars: '字符',
    runes: '符文',
    step1: '选择符文集 — Elder 或 Younger Futhark',
    step2: '在输入框中输入或粘贴文本',
    step3: '即时看到符文翻译结果',
    step4: '点击复制，将真实 Unicode 符文粘贴到任何地方',
  }
});

const { $, copyText, t } = GZ;

// Elder Futhark (24 runes) — standard transliteration
const ELDER = {
  a:'ᚠ', b:'ᛒ', c:'ᚲ', d:'ᚦ', e:'ᛖ', f:'ᚠ', g:'ᚷ', h:'ᚺ', i:'ᛁ', j:'ᛃ',
  k:'ᚲ', l:'ᛚ', m:'ᛗ', n:'ᚾ', o:'ᛟ', p:'ᛈ', q:'ᚲ', r:'ᚱ', s:'ᛋ', t:'ᛏ',
  u:'ᚢ', v:'ᚹ', w:'ᚹ', x:'ᚲᛋ', y:'ᛁ', z:'ᛋ', th:'ᚦ', ng:'ᛜ', ae:'ᚫ', oe:'ᚩ',
};
// Rebuild a clean letter→rune map (overrides for clean runes)
const ELDER_MAP = {
  a:'ᚨ', b:'ᛒ', c:'ᚲ', d:'ᛞ', e:'ᛖ', f:'ᚠ', g:'ᚷ', h:'ᚺ', i:'ᛁ', j:'ᛃ',
  k:'ᚲ', l:'ᛚ', m:'ᛗ', n:'ᚾ', o:'ᛟ', p:'ᛈ', q:'ᚲ', r:'ᚱ', s:'ᛋ', t:'ᛏ',
  u:'ᚢ', v:'ᚹ', w:'ᚹ', x:'ᚲᛋ', y:'ᛁ', z:'ᛉ',
  'th':'ᚦ', 'ng':'ᛜ', 'ae':'ᚫ', 'oe':'ᚩ', 'dh':'ᚦ',
};

// Younger Futhark (16 runes, long-branch) — Viking Age
const YOUNGER_MAP = {
  a:'ᛅ', b:'ᛒ', c:'ᚴ', d:'ᛏ', e:'ᛁ', f:'ᚠ', g:'ᚴ', h:'ᚼ', i:'ᛁ', j:'ᛁ',
  k:'ᚴ', l:'ᛚ', m:'ᛗ', n:'ᚾ', o:'ᚢ', p:'ᛒ', q:'ᚴ', r:'ᚱ', s:'ᛋ', t:'ᛏ',
  u:'ᚢ', v:'ᚢ', w:'ᚢ', x:'ᚴᛋ', y:'ᚢ', z:'ᛋ',
  'th':'ᚦ', 'ng':'ᛁᚴ', 'ae':'ᛅ', 'oe':'ᚢ',
};

// Reference tables for display
const ELDER_REF = [
  ['F','ᚠ','fehu','wealth'],   ['U','ᚢ','uruz','aurochs'],  ['TH','ᚦ','thurisaz','giant'],
  ['A','ᚨ','ansuz','god'],     ['R','ᚱ','raido','journey'], ['K','ᚲ','kenaz','torch'],
  ['G','ᚷ','gebo','gift'],     ['W','ᚹ','wunjo','joy'],     ['H','ᚺ','hagalaz','hail'],
  ['N','ᚾ','naudiz','need'],   ['I','ᛁ','isaz','ice'],      ['J','ᛃ','jera','year'],
  ['EI','ᛇ','eihwaz','yew'],   ['P','ᛈ','perthro','lot'],   ['Z','ᛉ','algiz','elk'],
  ['S','ᛋ','sowilo','sun'],    ['T','ᛏ','tiwaz','god'],     ['B','ᛒ','berkanan','birch'],
  ['E','ᛖ','ehwaz','horse'],   ['M','ᛗ','mannaz','man'],    ['L','ᛚ','laguz','water'],
  ['NG','ᛜ','ingwaz','god'],   ['O','ᛟ','othala','heritage'],['D','ᛞ','dagaz','day'],
];
const YOUNGER_REF = [
  ['F','ᚠ','fé','cattle'],     ['U','ᚢ','úr','rain'],       ['TH','ᚦ','þurs','giant'],
  ['AS','ᚬ','ąss','god'],      ['R','ᚱ','reið','riding'],   ['K','ᚴ','kaun','sore'],
  ['H','ᚼ','hagall','hail'],   ['N','ᚾ','nauð','need'],     ['IS','ᛁ','íss','ice'],
  ['A','ᛅ','ár','harvest'],    ['S','ᛋ','sól','sun'],       ['T','ᛏ','Týr','god'],
  ['B','ᛒ','bjarkan','birch'], ['M','ᛗ','maðr','man'],      ['L','ᛚ','löggr','water'],
];

function getMode() {
  return document.querySelector('input[name="mode"]:checked').value;
}

function convert(text) {
  const mode = getMode();
  const map = mode === 'elder' ? ELDER_MAP : YOUNGER_MAP;
  const lower = $('#lower').checked;
  let src = lower ? text : text.toLowerCase();
  let out = '';
  for (let i = 0; i < src.length; i++) {
    const ch = src[i];
    // Try digraph first (th, ng, ae, oe)
    const two = src.substr(i, 2).toLowerCase();
    if (map[two]) { out += map[two]; i++; continue; }
    if (map[ch]) { out += map[ch]; continue; }
    // Pass through spaces, punctuation, digits and other Unicode
    out += ch;
  }
  return out;
}

function autoConvert() {
  const inp = $('#input').value;
  $('#output').textContent = convert(inp);
  const chars = inp.length;
  const runes = (inp.match(/[a-zA-Z]/g) || []).length;
  $('#stats').textContent = `${chars} ${t('chars')} → ${runes} ${t('runes')}`;
  renderTable();
}

function renderTable() {
  const mode = getMode();
  const ref = mode === 'elder' ? ELDER_REF : YOUNGER_REF;
  $('#table').innerHTML = ref.map(r => `
    <div class="gz-rt-cell">
      <span class="rune">${r[1]}</span>
      <div class="ltr">${r[0]}</div>
      <div class="name">${r[2]}</div>
    </div>`).join('');
}

function loadExample() {
  $('#input').value = 'Strength and Honor';
  autoConvert();
}

function doClear() {
  $('#input').value = '';
  $('#output').textContent = '';
  $('#stats').textContent = '';
}

// Labels
$('#lbl-elder').textContent = t('elder');
$('#lbl-younger').textContent = t('younger');
$('#lbl-lower').textContent = t('lower');
$('#lbl-table').textContent = t('tableTitle');

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

autoConvert();

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🔐', href:'/convert/cipher.html', name:'ROT13 Cipher'},
    {icon:'📡', href:'/text/nato-phonetic.html', name:'NATO Phonetic'},
    {icon:'⠿', href:'/text/braille.html', name:'Braille'},
    {icon:'🎨', href:'/text/ascii-art.html', name:'ASCII Art'},
  ]
});
</script>
