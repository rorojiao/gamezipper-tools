    invalidJson: '✗ JSON 无效：',
    validOk: '✓ Schema 已生成',
    step1: '在左侧框中粘贴有效的 JSON',
    step2: '使用下方选项控制必填、enum 和 additionalProperties',

const { $, copyText, t } = GZ;
const opts = { required: true, enumArrays: false, noAdditional: false };

function typeOf(v) {
  if (v === null) return 'null';
  if (Array.isArray(v)) return 'array';
  return typeof v;
}

function mergeObjectSchemas(objs) {
  const keys = {};
  objs.forEach(o => { if (o && typeof o === 'object' && !Array.isArray(o)) Object.keys(o).forEach(k => keys[k] = true); });
  const props = {};
  Object.keys(keys).forEach(k => {
    const samples = objs.map(o => o[k]).filter(v => v !== undefined);
    const nonNull = samples.filter(v => v !== null);
    const inferred = nonNull.length ? toSchema(nonNull[0]) : { type: 'null' };
    // merge types if differing
    if (samples.length > 1) {
      const types = [...new Set(samples.map(typeOf))];
      if (types.length > 1) inferred.type = types;
    }
    props[k] = inferred;
  });
  return props;
}

function toSchema(value) {
  const t0 = typeOf(value);
  if (t0 === 'array') {
    const items = value.filter(v => v !== null);
    if (!items.length) return { type: 'array', items: {} };
    // detect uniform primitive
    const firstType = typeOf(items[0]);
    const allObj = items.every(v => typeOf(v) === 'object');
    if (allObj) {
      return { type: 'array', items: { type: 'object', properties: mergeObjectSchemas(items) } };
    }
    const uniform = items.every(v => typeOf(v) === firstType);
    if (uniform) {
      const sch = { type: 'array', items: toSchema(items[0]) };
      if (opts.enumArrays && items.length <= 20) sch.items = { type: firstType, enum: [...new Set(items)] };
      return sch;
    }
    // mixed types — union
    const types = [...new Set(items.map(typeOf))];
    return { type: 'array', items: { type: types.length === 1 ? types[0] : types } };
  }
  if (t0 === 'object') {
    const props = {};
    Object.keys(value).forEach(k => props[k] = toSchema(value[k]));
    const sch = { type: 'object', properties: props };
    if (opts.required) sch.required = Object.keys(value);
    if (opts.noAdditional) sch.additionalProperties = false;
    return sch;
  }
  if (t0 === 'null') return { type: 'null' };
  if (t0 === 'string') {
    const sch = { type: 'string' };
    return sch;
  }
  if (t0 === 'number') {
    return { type: Number.isInteger(value) ? 'integer' : 'number' };
  }
  return { type: t0 };
}

function generate() {
  const raw = $('#input').value.trim();
  if (!raw) return;
  let obj;
  try {
    obj = JSON.parse(raw);
  } catch (e) {
    $('#status').innerHTML = `<span style="color:var(--gz-accent)">${t('invalidJson')}${e.message}</span>`;
    $('#output').textContent = '';
    return;
  }
  const schema = toSchema(obj);
  schema.$schema = 'http://json-schema.org/draft-07/schema#';
  schema.title = 'Generated schema for Root';
  const pretty = JSON.stringify(schema, null, 2);
  $('#output').innerHTML = highlight(pretty);
  $('#status').innerHTML = `<span style="color:var(--gz-success)">${t('validOk')}</span>`;
}

function highlight(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/("(?:\\.|[^"\\])*")(\s*:)?/g, (m, str, colon) => {
      if (colon) {
        // key — but only color known type-like values differently
        return `<span class="schema-key">${str}</span>${colon}`;
      }
      // value string
      return `<span class="schema-str">${str}</span>`;
    })
    .replace(/\b(string|integer|number|boolean|null|object|array)\b/g, '<span class="schema-type">$1</span>');
}

function loadExample() {
  $('#input').value = JSON.stringify({
    "id": 42,
    "name": "GameZipper",
    "active": true,
    "tags": ["tool", "free", "online"],
    "meta": { "version": "2.0", "author": "team" },
    "price": null
  }, null, 2);
  generate();
}

function doClear() { $('#input').value=''; $('#output').textContent=''; $('#status').innerHTML=''; }

$('#opts').innerHTML = `
  <label><input type="checkbox" id="opt-req" checked> ${t('optRequired')}</label>
  <label><input type="checkbox" id="opt-enum"> ${t('optEnum')}</label>
  <label><input type="checkbox" id="opt-add"> ${t('optAdditional')}</label>`;
$('#opt-req').addEventListener('change', e => { opts.required = e.target.checked; generate(); });
$('#opt-enum').addEventListener('change', e => { opts.enumArrays = e.target.checked; generate(); });
$('#opt-add').addEventListener('change', e => { opts.noAdditional = e.target.checked; generate(); });

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="generate()">${t('generate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;
