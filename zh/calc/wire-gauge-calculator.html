<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is AWG?", "acceptedAnswer": {"@type": "Answer", "text": "AWG stands for American Wire Gauge. It is a logarithmic standard for wire diameters used primarily in North America. Lower AWG numbers mean thicker wire; AWG 0000 is the largest, AWG 40 is the smallest."}}, {"@type": "Question", "name": "How do I convert AWG to mm²?", "acceptedAnswer": {"@type": "Answer", "text": "Each AWG size maps to a specific cross-sectional area in circular mils. To convert to mm² multiply the CM value by 0.0005067. For example AWG 14 is 4107 CM ≈ 2.08 mm²."}}, {"@type": "Question", "name": "What ampacity should I use for a 14 AWG copper wire?", "acceptedAnswer": {"@type": "Answer", "text": "Per NEC Table 310.16, 14 AWG copper THHN in a 75°C rated circuit is rated for 20 amps. 12 AWG copper is rated for 25 amps and 10 AWG copper for 35 amps at the 75°C column."}}, {"@type": "Question", "name": "How is the recommended AWG chosen?", "acceptedAnswer": {"@type": "Answer", "text": "We look up your target current against the NEC 75°C ampacity column for the selected conductor material and pick the smallest AWG whose rating equals or exceeds your current. Always verify with local code."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>

  </div>
  <div class="gz-tool-area">
    <div class="gz-wg-grid">
      <div class="gz-wg-field"><label id="lbl-awg"></label><select id="awg"></select></div>
      <div class="gz-wg-field"><label id="lbl-material"></label><select id="material"><option value="cu">Copper</option><option value="al">Aluminum</option></select></div>
      <div class="gz-wg-field"><label id="lbl-target"></label><input type="number" id="target" min="0" step="any" placeholder="e.g. 20"></div>

      <div class="row"><span class="name" id="n-awg"></span><span class="val" id="out-awg"></span></div>
      <div class="row"><span class="name" id="n-mm2"></span><span class="val" id="out-mm2"></span></div>
      <div class="row"><span class="name" id="n-dia"></span><span class="val" id="out-dia"></span></div>
      <div class="row"><span class="name" id="n-cm"></span><span class="val" id="out-cm"></span></div>
      <div class="row"><span class="name" id="n-res"></span><span class="val" id="out-res"></span></div>
      <div class="row"><span class="name" id="n-amp"></span><span class="val" id="out-amp"></span></div>
    </div>
    <div class="gz-wg-suggest" id="suggest" style="display:none"></div>

</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Wire Gauge Calculator (AWG ↔ mm²)',
    toolDesc: 'Convert any AWG size (0000 to 40) to metric mm² cross-section and instantly look up diameter, circular-mil area, DC resistance per 1000 ft, and NEC 75°C ampacity for copper or aluminum. Optional target-current recommendation. Free, browser-based.',
    lblAwg: 'AWG size',
    lblMaterial: 'Conductor material',
    lblTarget: 'Target current (A, optional)',
    clear: 'Clear',
    nAwg: 'AWG size',
    nMm2: 'Cross-section',
    nDia: 'Diameter',
    nCm: 'Circular mils (CM)',
    nRes: 'Resistance (per 1000 ft)',
    nAmp: 'Ampacity (NEC 75°C)',
    suggest: 'Recommended AWG',
    formulas: 'mm² = CM × 0.0005067 · diameter (in) = √(CM) ÷ 1000 · resistance R = ρ·L÷A · AWG step ≈ 1.1229× area ratio',
    step1: 'Pick an AWG size (or use the lookup table)',
    step2: 'Choose copper or aluminum conductor',
    step3: 'Optionally enter a target current to get a recommended AWG',
    step4: 'Read off diameter, mm², resistance and ampacity',
  },
  zh: {
    toolTitle: '线径计算器 (AWG ↔ mm²)',
    toolDesc: '将任意 AWG 规格（0000 到 40）换算为公制 mm² 截面积，并即时查看直径、圆密耳面积、每 1000 英尺直流电阻，以及铜/铝导线的 NEC 75°C 载流量。可选目标电流推荐。免费、浏览器本地运行。',
    lblAwg: 'AWG 规格',
    lblMaterial: '导体材质',
    lblTarget: '目标电流 (A, 可选)',
    clear: '清空',
    nAwg: 'AWG 规格',
    nMm2: '截面积',
    nDia: '直径',
    nCm: '圆密耳 (CM)',
    nRes: '电阻 (每 1000 英尺)',
    nAmp: '载流量 (NEC 75°C)',
    suggest: '推荐 AWG',
    formulas: 'mm² = CM × 0.0005067 · 直径 (英寸) = √(CM) ÷ 1000 · 电阻 R = ρ·L÷A · AWG 每级面积比 ≈ 1.1229',
    step1: '选择 AWG 规格（或使用对照表）',
    step2: '选择铜或铝导体',
    step3: '可选：输入目标电流以获取推荐 AWG',
    step4: '查看直径、mm²、电阻和载流量',
  }
});

const { $, t } = GZ;

// [AWG, CM, cuRes Ω/1000ft@20°C, alRes Ω/1000ft, cuAmp75, alAmp75]
const WIRE = [
  ['0000', 211600, 0.04901, 0.0804, 230, 180],
  ['000',  167800, 0.06180, 0.101, 200, 155],
  ['00',   133100, 0.07793, 0.128, 175, 135],
  ['0',    105600, 0.09827, 0.161, 150, 120],
  ['1',     83690, 0.1239,  0.203, 130, 100],
  ['2',     66370, 0.1563,  0.256, 115, 90],
  ['3',     52620, 0.1970,  0.323, 100, 75],
  ['4',     41740, 0.2485,  0.408, 85,  65],
  ['5',     33100, 0.3133,  0.514, 0,   0],
  ['6',     26240, 0.3951,  0.648, 65,  50],
  ['7',     20820, 0.4982,  0.817, 0,   0],
  ['8',     16510, 0.6282,  1.030, 50,  40],
  ['10',    10380, 0.9989,  1.638, 35,  25],
  ['12',     6530, 1.588,   2.604, 20,  15],
  ['14',     4107, 2.525,   4.140, 15,  0],
  ['16',     2583, 4.016,   6.586, 0,   0],
  ['18',     1620, 6.385,   10.47, 0,   0],
  ['20',     1022, 10.15,   16.64, 0,   0],
  ['22',      642, 16.14,   26.45, 0,   0],
  ['24',      404, 25.67,   42.10, 0,   0],
  ['26',      254, 40.81,   66.90, 0,   0],
  ['28',      160, 64.90,  106.4,  0,   0],
  ['30',      100, 103.2,  169.3,  0,   0]
];

$('#awg').innerHTML = WIRE.map((w,i) => `<option value="${i}">AWG ${w[0]}</option>`).join('');
$('#awg').value = 13; // AWG 14

$('#lbl-awg').textContent = t('lblAwg');
$('#lbl-material').textContent = t('lblMaterial');
$('#lbl-target').textContent = t('lblTarget');
$('#formulas').textContent = t('formulas');
$('#n-awg').textContent = t('nAwg');
$('#n-mm2').textContent = t('nMm2');
$('#n-dia').textContent = t('nDia');
$('#n-cm').textContent = t('nCm');
$('#n-res').textContent = t('nRes');
$('#n-amp').textContent = t('nAmp');

function fmt(n, u) {
  if (!isFinite(n) || n === 0) return n === 0 ? '—' : (u ? '—' : '0');
  const abs = Math.abs(n);
  if (abs < 0.001 || abs >= 1e6) return n.toExponential(3) + (u ? ' ' + u : '');
  return n.toLocaleString(undefined, { maximumFractionDigits: 4 }) + (u ? ' ' + u : '');
}

function calc() {
  const idx = parseInt($('#awg').value);
  const w = WIRE[idx];
  const isAl = $('#material').value === 'al';
  const cm = w[1];
  const mm2 = cm * 0.0005067;
  const diaIn = Math.sqrt(cm) / 1000;
  const diaMm = diaIn * 25.4;
  const res = isAl ? w[3] : w[2];
  const amp = isAl ? w[5] : w[4];

  $('#out-awg').textContent = 'AWG ' + w[0];
  $('#out-mm2').textContent = fmt(mm2, 'mm²');
  $('#out-dia').textContent = fmt(diaMm, 'mm') + '  (' + fmt(diaIn, 'in') + ')';
  $('#out-cm').textContent = fmt(cm, 'CM');
  $('#out-res').textContent = fmt(res, 'Ω');
  $('#out-amp').textContent = amp > 0 ? fmt(amp, 'A') : '—';

  // Recommendation based on target current
  const target = parseFloat($('#target').value);
  const sugg = $('#suggest');
  if (isFinite(target) && target > 0) {
    let rec = null;
    // Search smallest AWG whose ampacity >= target
    for (let i = WIRE.length - 1; i >= 0; i--) {
      const a = isAl ? WIRE[i][5] : WIRE[i][4];
      if (a > 0 && a >= target) { rec = WIRE[i][0]; break; }
    }
    if (rec) {
      sugg.textContent = `✓ ${t('suggest')}: AWG ${rec}  (rated ${(isAl ? WIRE.find(w => w[0] === rec)[5] : WIRE.find(w => w[0] === rec)[4])} A)`;
    } else {
      sugg.textContent = '⚠ Target exceeds single-conductor NEC 75°C ratings — use parallel runs or larger bus.';
    }
    sugg.style.display = 'block';
  } else {
    sugg.style.display = 'none';
  }
}

$('#awg').addEventListener('change', calc);
$('#material').addEventListener('change', calc);
$('#target').addEventListener('input', calc);

$('#toolbar').innerHTML = `
  <button class="gz-btn gz-btn-secondary" onclick="document.getElementById('target').value='';calc()">${t('clear')}</button>`;

calc();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'⚡', href:'/calc/voltage-drop-calculator.html', name:'Voltage Drop'},
    {icon:'⚡', href:'/calc/ohms-law-calculator.html', name:"Ohm's Law"},
    {icon:'💡', href:'/calc/led-resistor-calculator.html', name:'LED Resistor'},
    {icon:'⚡', href:'/calc/wattage-calculator.html', name:'Wattage'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
