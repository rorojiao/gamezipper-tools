    rBadTip:'页面主要为 HTML/JS/CSS。建议将脚本移到外部文件、移除注释、压缩输出，并扩充实际文本内容。',
    step1:'选择 URL 或粘贴完整 HTML 源码', step2:'点击「检测比例」测量文本和 HTML 字节数', step3:'查看比例、HTML 大小、文本大小和词数', step4:'按建议优化比例' }
});
const { $, t } = GZ;
function fmtBytes(n){if(n<1024)return n+' B';if(n<1048576)return (n/1024).toFixed(1)+' KB';return (n/1048576).toFixed(2)+' MB';}

document.querySelectorAll('#tabs .tab').forEach(tab=>{
  tab.addEventListener('click', ()=>{
    document.querySelectorAll('#tabs .tab').forEach(t=>t.classList.remove('active'));
    tab.classList.add('active');
    const m=tab.dataset.mode;
    $('#urlBox').style.display = m==='url'?'flex':'none';
    $('#pasteBox').style.display = m==='paste'?'block':'none';
  });
});

const PROXIES = [
  (u)=>'https://api.allorigins.win/raw?url='+encodeURIComponent(u),
  (u)=>'https://corsproxy.io/?'+encodeURIComponent(u),
  (u)=>'https://api.codetabs.com/v1/proxy?quest='+encodeURIComponent(u),
];
async function fetchWithProxies(url){
  let lastErr=null;
  for(const p of PROXIES){
    try{const r=await fetch(p(url),{cache:'no-store'});if(r.ok){return await r.text();}lastErr='Proxy '+r.status;}catch(e){lastErr=String(e);}
  }
  throw new Error(lastErr||'All proxies failed');
}

function analyzeHtml(html){
  const htmlSize = new Blob([html]).size;
  const doc = new DOMParser().parseFromString(html,'text/html');
  // strip script/style/noscript/template/comments
  const remove=doc.querySelectorAll('script, style, noscript, template, link[rel="import"]');
  remove.forEach(n=>n.remove());
  const walker=doc.createTreeWalker(doc.body||doc,NodeFilter.SHOW_COMMENT,null);
  const comments=[]; let n; while((n=walker.nextNode())) comments.push(n);
  comments.forEach(c=>c.remove());
  // text
  const text = (doc.body||doc).textContent.replace(/\s+/g,' ').trim();
  const textSize = new Blob([text]).size;
  const words = text ? text.split(/\s+/).filter(Boolean).length : 0;
  // tag counts
  const tagCounts = {};
  doc.querySelectorAll('*').forEach(el=>{
    const t=el.tagName.toLowerCase(); tagCounts[t]=(tagCounts[t]||0)+1;
  });
  const topTags = Object.entries(tagCounts).sort((a,b)=>b[1]-a[1]).slice(0,12);
  const scriptsSize = new Blob([html]).size - htmlSize; // placeholder
  // scripts/styles originally in raw HTML
  const scriptMatches = [...html.matchAll(/<script\b[\s\S]*?<\/script>/gi)];
  const styleMatches = [...html.matchAll(/<style\b[\s\S]*?<\/style>/gi)];
  const commentMatches = [...html.matchAll(/<!--[\s\S]*?-->/g)];
  const ss = scriptMatches.reduce((s,m)=>s+m[0].length,0) + styleMatches.reduce((s,m)=>s+m[0].length,0);
  const cs = commentMatches.reduce((s,m)=>s+m[0].length,0);
  return {htmlSize, textSize, words, tagCounts, topTags, ss, cs, sample: text.slice(0, 800), text};
}

async function analyze(){
  const mode = document.querySelector('#tabs .tab.active').dataset.mode;
  let html=''; const status = $('#status');
  if(mode==='url'){
    const url = $('#urlInput').value.trim();
    if(!url){status.textContent='✗ Please enter a URL';return;}
    status.textContent = t('loading');
    try{html=await fetchWithProxies(url);}catch(e){status.innerHTML='<span style="color:var(--gz-accent)">'+t('err')+': '+e.message+'</span>';return;}
  } else {
    html = $('#htmlInput').value;
    if(!html.trim()){status.textContent='✗ Paste some HTML first';return;}
  }
  const r = analyzeHtml(html);
  const ratio = r.htmlSize? (r.textSize/r.htmlSize*100) : 0;
  $('#ratioNum').textContent = ratio.toFixed(1)+'%';
  $('#ratioNum').className = 'v ratio-big ' + (ratio>=25?'ratio-good':ratio>=10?'ratio-warn':'ratio-bad');
  $('#htmlSize').textContent = fmtBytes(r.htmlSize);
  $('#textSize').textContent = fmtBytes(r.textSize) + ' ('+r.textSize.toLocaleString()+' ch)';
  $('#words').textContent = r.words.toLocaleString();
  $('#tags').textContent = Object.values(r.tagCounts).reduce((a,b)=>a+b,0).toLocaleString();
  $('#scripts').textContent = fmtBytes(r.ss) + ' (+' + fmtBytes(r.cs) + ' comments)';
  $('#gaugeFill').style.width = Math.min(ratio, 100).toFixed(1)+'%';
  const tip = ratio>=25? t('rGood')+': '+t('rGoodTip') : ratio>=10? t('rWarn')+': '+t('rWarnTip') : t('rBad')+': '+t('rBadTip');
  $('#recommendation').innerHTML = tip;
  $('#tagList').innerHTML = r.topTags.map(([t,c])=>`<span class="tag">&lt;${t}&gt; × ${c}</span>`).join('');
  $('#sampleText').textContent = r.sample + (r.text && r.text.length>800?'…':'');
  $('#tagsTitle').textContent = t('tagsTitle');
  $('#sampleTitle').textContent = t('sampleTitle');
  $('#result').style.display='block';
  status.innerHTML = '<span style="color:var(--gz-success)">'+t('done')+'</span>';
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="analyze()">${t('verify')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#htmlInput').value=document.documentElement.outerHTML;document.querySelector('#tabs .tab[data-mode=\\'paste\\']').click();analyze()">${t('example')}</button>`;
