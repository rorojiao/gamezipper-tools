<script>

    copy: '复制',

    step1: '在顶部输入框输入或粘贴文字',
    step2: '从下方列表中选择一种美学样式',
    step3: '点击你喜欢的样式旁的复制按钮',
    step4: '粘贴到 Instagram 简介、TikTok 文案、Discord 状态等',

const { $, copyText, t } = GZ;
$('#lbl-in').textContent = t('input');

// --- Style converters ---

// Fullwidth / Vaporwave: U+FF01..U+FF5E (matches ASCII 0x21..0x7E), plus U+3000 for space
function toFullwidth(s) {
  let out = '';
  for (const ch of s) {
    const c = ch.charCodeAt(0);
    if (c === 0x20) out += '\u3000';
    else if (c >= 0x21 && c <= 0x7E) out += String.fromCharCode(c + 0xFEE0);
    else out += ch;
  }
  return out;
}

// Spaced letters (each char separated by a thin space)
function toSpaced(s) {
  return Array.from(s).join('\u2009'); // thin space
}

// Circled (a-z → ⓐ..ⓩ, A-Z → Ⓐ..Ⓩ)
function toCircled(s) {
  let out = '';
  for (const ch of s) {
    const c = ch.charCodeAt(0);
    if (c >= 0x61 && c <= 0x7A) out += String.fromCharCode(0x24D0 + (c - 0x61));
    else if (c >= 0x41 && c <= 0x5A) out += String.fromCharCode(0x24B6 + (c - 0x41));
    else if (c >= 0x30 && c <= 0x39) out += String.fromCharCode(0x2460 + (c - 0x30) - 1 < 0x2460 ? 0x2460 : 0x24EA + (c - 0x30)); // 0→⓪ 1→① simplified
    else out += ch;
  }
  return out;
}

// Negative circled (A-Z → 🅐..🅩 approx via U+1F150 emoji range, fallback Ⓐ filled)
function toNegCircled(s) {
  let out = '';
  for (const ch of s) {
    const c = ch.charCodeAt(0);
    if (c >= 0x41 && c <= 0x5A) out += String.fromCharCode(0x24B6 + (c - 0x41)); // Ⓐ..Ⓩ black
    else if (c >= 0x61 && c <= 0x7A) out += String.fromCharCode(0x24B6 + (c - 0x61));
    else out += ch;
  }
  return out;
}

// Squared (A-Z → 🄰..🅏 approx via U+1F130)
function toSquared(s) {
  let out = '';
  for (const ch of s) {
    const c = ch.charCodeAt(0);
    if (c >= 0x41 && c <= 0x5A) out += String.fromCodePoint(0x1F130 + (c - 0x41));
    else if (c >= 0x61 && c <= 0x7A) out += String.fromCodePoint(0x1F130 + (c - 0x61));
    else out += ch;
  }
  return out;
}

// Small caps (a-z → ᴀ-ᴢ, note no small-cap Q and X has special)
const SMALLCAPS = {a:'ᴀ',b:'ʙ',c:'ᴄ',d:'ᴅ',e:'ᴇ',f:'ꜰ',g:'ɢ',h:'ʜ',i:'ɪ',j:'ᴊ',k:'ᴋ',l:'ʟ',m:'ᴍ',n:'ɴ',o:'ᴏ',p:'ᴘ',q:'q',r:'ʀ',s:'s',t:'ᴛ',u:'ᴜ',v:'ᴠ',w:'ᴡ',x:'x',y:'ʏ',z:'ᴢ'};
function toSmallCaps(s) {
  let out = '';
  for (const ch of s) {
    if (SMALLCAPS[ch.toLowerCase()]) out += SMALLCAPS[ch.toLowerCase()];
    else out += ch;
  }
  return out;
}

// Strikethrough using U+0336 (combining long stroke overlay)
function toStruck(s) {
  return Array.from(s).map(ch => ch + '\u0336').join('');
}

// Underline using U+0332
function toUnderlined(s) {
  return Array.from(s).map(ch => ch + '\u0332').join('');
}

// Bubble text (each letter wrapped in a circle)
const BUBBLE_LOWER_START = 0x24D0; // ⓐ
const BUBBLE_UPPER_START = 0x24B6; // Ⓐ
function toBubble(s) {
  let out = '';
  for (const ch of s) {
    const c = ch.charCodeAt(0);
    if (c >= 0x61 && c <= 0x7A) out += String.fromCharCode(BUBBLE_LOWER_START + (c - 0x61));
    else if (c >= 0x41 && c <= 0x5A) out += String.fromCharCode(BUBBLE_UPPER_START + (c - 0x41));
    else out += ch;
  }
  return out;
}

// Wingdings-ish flower sprinkles ✿
function toFlowery(s) {
  return Array.from(s).map(ch => {
    if (ch === ' ') return ' ✿ ';
    return ch;
  }).join(' ');
}

// Fraktur (Gothic)
function toFraktur(s) {
  let out = '';
  for (const ch of s) {
    const c = ch.charCodeAt(0);
    if (c >= 0x41 && c <= 0x5A) out += String.fromCharCode(0x1D504 + (c - 0x41));
    else if (c >= 0x61 && c <= 0x7A) out += String.fromCharCode(0x1D51E + (c - 0x61));
    else out += ch;
  }
  return out;
}

// Double-struck (𝔸 𝕒)
function toDoubleStruck(s) {
  let out = '';
  for (const ch of s) {
    const c = ch.charCodeAt(0);
    if (c >= 0x41 && c <= 0x5A) out += String.fromCodePoint(0x1D538 + (c - 0x41));
    else if (c >= 0x61 && c <= 0x7A) out += String.fromCodePoint(0x1D552 + (c - 0x61));
    else if (c >= 0x30 && c <= 0x39) out += String.fromCodePoint(0x1D7D8 + (c - 0x30));
    else out += ch;
  }
  return out;
}

// Monospace (𝚊-𝚣)
function toMonospace(s) {
  let out = '';
  for (const ch of s) {
    const c = ch.charCodeAt(0);
    if (c >= 0x41 && c <= 0x5A) out += String.fromCodePoint(0x1D670 + (c - 0x41));
    else if (c >= 0x61 && c <= 0x7A) out += String.fromCodePoint(0x1D68A + (c - 0x61));
    else if (c >= 0x30 && c <= 0x39) out += String.fromCodePoint(0x1D7F6 + (c - 0x30));
    else out += ch;
  }
  return out;
}

const STYLES = [
  { id: 'vaporwave', name: 'Vaporwave / Fullwidth', fn: toFullwidth },
  { id: 'spaced', name: 'Spaced Soft', fn: toSpaced },
  { id: 'smallcaps', name: 'Small Caps', fn: toSmallCaps },
  { id: 'bubble', name: 'Bubble (Circled)', fn: toBubble },
  { id: 'negcirc', name: 'Black Circle', fn: toNegCircled },
  { id: 'squared', name: 'Squared', fn: toSquared },
  { id: 'struck', name: 'Strikethrough', fn: toStruck },
  { id: 'underlined', name: 'Underlined', fn: toUnderlined },
  { id: 'fraktur', name: 'Fraktur / Gothic', fn: toFraktur },
  { id: 'doublestruck', name: 'Double Struck', fn: toDoubleStruck },
  { id: 'monospace', name: 'Monospace', fn: toMonospace },
  { id: 'flowery', name: 'Flowery', fn: toFlowery },
];

function render() {
  const inp = $('#input').value || '';
  const html = STYLES.map(st => {
    const out = st.fn(inp);
    return `<div class="style-card">
      <div class="style-label">${st.name}</div>
      <div class="style-output">${out || '<span style="opacity:.4">(type above to see preview)</span>'}</div>
      <div class="style-actions">
        <button class="gz-btn gz-btn-secondary" onclick="copyStyle('${st.id}')">${t('copy')}</button>
      </div>
    </div>`;
  }).join('');
  $('#styles').innerHTML = html;
}

window.copyStyle = function(id) {
  const st = STYLES.find(s => s.id === id);
  if (!st) return;
  const out = st.fn($('#input').value || '');
  copyText(out);
  // Briefly flash "Copied!" feedback
  const btn = document.querySelector(`.style-card:nth-child(${STYLES.indexOf(st)+1}) .gz-btn`);
  if (btn) {
    const orig = btn.textContent;
    btn.textContent = t('copied');
    setTimeout(() => btn.textContent = orig, 1200);
  }
};

$('#input').addEventListener('input', render);
$('#input').value = 'aesthetic vibes';
render();

$('#toolbar').innerHTML = `
  <button class="gz-btn gz-btn-secondary" onclick="document.getElementById('input').value='';render();document.getElementById('input').focus()">${t('copy')==='Copy'?'Clear':'清空'}</button>`;

</script>
