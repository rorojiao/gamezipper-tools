<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="items-edit" id="itemsEdit"></div>
    <button class="gz-btn gz-btn-secondary" onclick="addItem()" style="margin-bottom:16px">+ Add Item</button>
    <div class="ctrl">
      <div><label>Trigger Text</label><input type="text" id="trigger" value="Menu ▾" onchange="render()" style="width:120px"></div>
      <div><label>Trigger Bg</label><input type="color" id="trgBg" value="#1e1e3f" onchange="render()"></div>
      <div><label>Trigger Text</label><input type="color" id="trgTxt" value="#ffffff" onchange="render()"></div>
      <div><label>Menu Bg</label><input type="color" id="menuBg" value="#2a2a4a" onchange="render()"></div>
      <div><label>Menu Text</label><input type="color" id="menuTxt" value="#e0e0e0" onchange="render()"></div>
      <div><label>Hover Bg</label><input type="color" id="hovBg" value="#4ecdc4" onchange="render()"></div>
      <div><label>Radius</label><input type="range" min="0" max="16" value="8" id="radius" onchange="render()"></div>
      <div><label>Trigger</label>
        <select id="mode" onchange="render()">
          <option value="hover" selected>Hover</option><option value="click">Click</option>
        </select></div>
    </div>
    <div class="preview-box" id="preview"></div>
    <div style="display:flex;gap:8px;margin-bottom:8px">
      <button class="gz-btn" onclick="GZ.copyText(genCode())">📋 Copy Code</button>
      <button class="gz-btn gz-btn-secondary" onclick="resetItems()">🔄 Reset</button>
    </div>
    <div class="code-box"><pre id="codeOut"></pre></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'CSS Dropdown Menu Generator',
    toolDesc: 'Design CSS dropdown menus with live preview. Customize trigger, hover effects and animation — copy production-ready code.',
    step1: 'Add menu items (use a dash for a divider)',
    step2: 'Customize trigger, background, hover color and radius',
    step3: 'Choose hover or click trigger mode',
    step4: 'Copy the generated HTML and CSS code',
  },
  zh: {
    toolTitle: 'CSS 下拉菜单生成器',
    toolDesc: '可视化设计 CSS 下拉菜单 — 自定义触发器、悬停效果和动画，复制生产可用代码。',
    step1: '添加菜单项（输入减号可生成分隔线）',
    step2: '自定义触发器、背景、悬停颜色和圆角',
    step3: '选择悬停或点击触发模式',
    step4: '复制生成的 HTML 和 CSS 代码',
  }
});

const { $, copyText, t } = GZ;

let items = ['Home', 'About', '-', 'Products', 'Pricing', 'Blog', '-', 'Contact'];

function buildItems() {
  const el = $('#itemsEdit');
  el.innerHTML = items.map((it, i) => `
    <div class="item-row">
      <input type="text" value="${it.replace(/"/g,'&quot;')}" oninput="items[${i}]=this.value;render()" placeholder="Menu item label">
      <button onclick="items.splice(${i},1);buildItems();render()">✕</button>
    </div>`).join('');
}

function addItem() {
  items.push('New Item');
  buildItems(); render();
}

function resetItems() {
  items = ['Home', 'About', '-', 'Contact'];
  buildItems(); render();
}

function render() {
  const trgBg = $('#trgBg').value;
  const trgTxt = $('#trgTxt').value;
  const menuBg = $('#menuBg').value;
  const menuTxt = $('#menuTxt').value;
  const hovBg = $('#hovBg').value;
  const rad = $('#radius').value + 'px';
  const trigger = $('#trigger').value;
  const mode = $('#mode').value;

  const itemHtml = items.map(it => {
    if (it === '-' || it === '—') return `<div style="height:1px;background:${menuTxt}33;margin:4px 0"></div>`;
    return `<a href="#" style="display:block;padding:10px 16px;color:${menuTxt};text-decoration:none;transition:background .2s" onmouseover="this.style.background='${hovBg}';this.style.color='#fff'" onmouseout="this.style.background='transparent';this.style.color='${menuTxt}'">${it}</a>`;
  }).join('');

  if (mode === 'hover') {
    $('#preview').innerHTML = `
      <div style="position:relative;display:inline-block" id="ddWrap">
        <button style="padding:10px 18px;background:${trgBg};color:${trgTxt};border:none;border-radius:${rad};cursor:pointer;font-weight:600">${trigger}</button>
        <div id="ddMenu" style="position:absolute;top:calc(100% + 4px);left:0;min-width:180px;background:${menuBg};border-radius:${rad};box-shadow:0 10px 30px rgba(0,0,0,.3);padding:4px 0;display:none;z-index:10">${itemHtml}</div>
      </div>`;
    const wrap = $('#ddWrap');
    wrap.addEventListener('mouseenter', () => $('#ddMenu').style.display='block');
    wrap.addEventListener('mouseleave', () => $('#ddMenu').style.display='none');
  } else {
    $('#preview').innerHTML = `
      <details style="position:relative;display:inline-block" id="ddWrap">
        <summary style="padding:10px 18px;background:${trgBg};color:${trgTxt};border-radius:${rad};cursor:pointer;font-weight:600;list-style:none;display:inline-block">${trigger}</summary>
        <div style="position:absolute;top:calc(100% + 4px);left:0;min-width:180px;background:${menuBg};border-radius:${rad};box-shadow:0 10px 30px rgba(0,0,0,.3);padding:4px 0;z-index:10">${itemHtml}</div>
      </details>`;
  }

  $('#codeOut').textContent = genCode();
}

function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function genCode() {
  const trgBg = $('#trgBg').value;
  const trgTxt = $('#trgTxt').value;
  const menuBg = $('#menuBg').value;
  const menuTxt = $('#menuTxt').value;
  const hovBg = $('#hovBg').value;
  const rad = $('#radius').value + 'px';
  const trigger = $('#trigger').value;
  const mode = $('#mode').value;

  const itemCode = items.map(it => {
    if (it === '-' || it === '—') return `      <hr class="dd-divider">`;
    return `      <a href="#" class="dd-item">${esc(it)}</a>`;
  }).join('\n');

  if (mode === 'hover') {
    return `<!-- HTML -->
<div class="dropdown">
  <button class="dd-trigger">${esc(trigger)}</button>
  <div class="dd-menu">
${itemCode}
  </div>
</div>

/* CSS */
.dropdown { position: relative; display: inline-block; }
.dd-trigger {
  padding: 10px 18px;
  background: ${trgBg};
  color: ${trgTxt};
  border: none;
  border-radius: ${rad};
  cursor: pointer;
  font-weight: 600;
}
.dd-menu {
  position: absolute;
  top: calc(100% + 4px);
  left: 0;
  min-width: 180px;
  background: ${menuBg};
  border-radius: ${rad};
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
  padding: 4px 0;
  opacity: 0;
  visibility: hidden;
  transform: translateY(-8px);
  transition: all 0.2s ease;
  z-index: 100;
}
.dropdown:hover .dd-menu {
  opacity: 1;
  visibility: visible;
  transform: translateY(0);
}
.dd-item {
  display: block;
  padding: 10px 16px;
  color: ${menuTxt};
  text-decoration: none;
  transition: background 0.2s;
}
.dd-item:hover { background: ${hovBg}; color: #fff; }
.dd-divider { border: none; height: 1px; background: ${menuTxt}33; margin: 4px 0; }`;
  } else {
    return `<!-- HTML -->
<details class="dropdown">
  <summary class="dd-trigger">${esc(trigger)}</summary>
  <div class="dd-menu">
${itemCode}
  </div>
</details>

/* CSS */
.dropdown { position: relative; display: inline-block; }
.dd-trigger {
  padding: 10px 18px;
  background: ${trgBg};
  color: ${trgTxt};
  border-radius: ${rad};
  cursor: pointer;
  font-weight: 600;
  list-style: none;
  display: inline-block;
}
.dd-trigger::-webkit-details-marker { display: none; }
.dd-menu {
  position: absolute;
  top: calc(100% + 4px);
  left: 0;
  min-width: 180px;
  background: ${menuBg};
  border-radius: ${rad};
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
  padding: 4px 0;
  z-index: 100;
}
.dd-item {
  display: block;
  padding: 10px 16px;
  color: ${menuTxt};
  text-decoration: none;
  transition: background 0.2s;
}
.dd-item:hover { background: ${hovBg}; color: #fff; }
.dd-divider { border: none; height: 1px; background: ${menuTxt}33; margin: 4px 0; }`;
  }
}

buildItems();
render();

GZ.renderToolPage({
  category: 'css',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🗂️', href:'/css-tools/tabs.html', name:'Tabs'},
    {icon:'🎚️', href:'/css-tools/accordion.html', name:'Accordion'},
    {icon:'🔘', href:'/css-tools/button.html', name:'Button'},
    {icon:'🧭', href:'/css-tools/breadcrumb.html', name:'Breadcrumb'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
