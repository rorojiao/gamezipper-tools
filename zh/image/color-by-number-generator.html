const { $, t } = GZ;
let sourceImg = null;
let mode = 'filled';
let lastPalette = [];
let lastGrid = [];

function setTabs() {
  $('#tabFilled').textContent = t('tabFilled');
  $('#tabOutline').textContent = t('tabOutline');
  $$('.gz-tab').forEach(el => {
    el.onclick = () => {
      mode = el.dataset.mode;
      $$('.gz-tab').forEach(x => x.classList.remove('active'));
      el.classList.add('active');
      render();
    };
  });
}

// Median-cut style color quantization via simple k-means-ish bucketing
function quantize(pixels, k) {
  if (pixels.length === 0) return [];
  // Initialize: pick k evenly spaced pixels by luminance sort
  const sorted = pixels.slice().sort((a, b) => (a[0]+a[1]+a[2]) - (b[0]+b[1]+b[2]));
  const centroids = [];
  for (let i = 0; i < k; i++) {
    const idx = Math.floor((i + 0.5) / k * sorted.length);
    centroids.push(sorted[idx].slice(0, 3));
  }
  // 6 iterations of k-means
  for (let iter = 0; iter < 6; iter++) {
    const buckets = centroids.map(() => ({ r: 0, g: 0, b: 0, n: 0 }));
    for (const p of pixels) {
      let best = 0, bestD = Infinity;
      for (let c = 0; c < centroids.length; c++) {
        const d = (p[0]-centroids[c][0])**2 + (p[1]-centroids[c][1])**2 + (p[2]-centroids[c][2])**2;
        if (d < bestD) { bestD = d; best = c; }
      }
      const b = buckets[best];
      b.r += p[0]; b.g += p[1]; b.b += p[2]; b.n++;
    }
    centroids.forEach((c, i) => {
      if (buckets[i].n > 0) {
        c[0] = Math.round(buckets[i].r / buckets[i].n);
        c[1] = Math.round(buckets[i].g / buckets[i].n);
        c[2] = Math.round(buckets[i].b / buckets[i].n);
      }
    });
  }
  return centroids.map(c => `#${[c[0],c[1],c[2]].map(v => v.toString(16).padStart(2,'0')).join('')}`);
}

function nearest(rgbHex, palette) {
  const r = parseInt(rgbHex.slice(1,3),16), g = parseInt(rgbHex.slice(3,5),16), b = parseInt(rgbHex.slice(5,7),16);
  let best = 0, bestD = Infinity;
  for (let i = 0; i < palette.length; i++) {
    const pr = parseInt(palette[i].slice(1,3),16), pg = parseInt(palette[i].slice(3,5),16), pb = parseInt(palette[i].slice(5,7),16);
    const d = (r-pr)**2 + (g-pg)**2 + (b-pb)**2;
    if (d < bestD) { bestD = d; best = i; }
  }
  return best;
}

function render() {
  if (!sourceImg) { $('#canvas').getContext('2d').clearRect(0,0,$('#canvas').width,$('#canvas').height); $('#palette').innerHTML = ''; return; }
  const grid = +$('#gridSize').value;
  const k = +$('#numColors').value;
  const fontSize = +$('#fontSize').value;

  // Sample source onto a small canvas
  const sample = document.createElement('canvas');
  sample.width = grid; sample.height = grid;
  const sctx = sample.getContext('2d');
  // Cover fit
  const ratio = sourceImg.width / sourceImg.height;
  let sx, sy, sw, sh;
  if (ratio > 1) { sh = sourceImg.height; sw = sh; sx = (sourceImg.width - sw) / 2; sy = 0; }
  else { sw = sourceImg.width; sh = sw; sx = 0; sy = (sourceImg.height - sh) / 2; }
  sctx.drawImage(sourceImg, sx, sy, sw, sh, 0, 0, grid, grid);
  const data = sctx.getImageData(0, 0, grid, grid).data;

  // Build pixels + quantize
  const pixels = [];
  for (let i = 0; i < data.length; i += 4) pixels.push([data[i], data[i+1], data[i+2]]);
  const palette = quantize(pixels, k);
  lastPalette = palette;

  // Build grid of palette indices
  const cells = new Array(grid * grid);
  for (let i = 0; i < pixels.length; i++) cells[i] = nearest(`#${[pixels[i][0],pixels[i][1],pixels[i][2]].map(v=>v.toString(16).padStart(2,'0')).join('')}`, palette);
  lastGrid = { cells, grid };

  // Render
  const out = $('#canvas');
  const cellSize = Math.max(20, Math.floor(900 / grid));
  out.width = grid * cellSize;
  out.height = grid * cellSize;
  const ctx = out.getContext('2d');
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, out.width, out.height);
  ctx.font = `700 ${fontSize}px system-ui, sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.lineWidth = 0.5;
  ctx.strokeStyle = '#aaa';

  for (let y = 0; y < grid; y++) {
    for (let x = 0; x < grid; x++) {
      const idx = cells[y * grid + x];
      const color = palette[idx];
      const cx = x * cellSize, cy = y * cellSize;
      if (mode === 'filled') { ctx.fillStyle = color; ctx.fillRect(cx, cy, cellSize, cellSize); }
      ctx.strokeRect(cx + 0.5, cy + 0.5, cellSize - 1, cellSize - 1);
      const lum = parseInt(color.slice(1,3),16)*0.299 + parseInt(color.slice(3,5),16)*0.587 + parseInt(color.slice(5,7),16)*0.114;
      ctx.fillStyle = mode === 'filled' ? (lum > 140 ? '#222' : '#fff') : '#222';
      ctx.fillText(idx + 1, cx + cellSize/2, cy + cellSize/2 + 0.5);
    }
  }

  // Palette legend
  $('#palette').innerHTML = palette.map((c, i) =>
    `<div class="swatch"><div class="chip" style="background:${c}">${i+1}</div><span>${c}</span></div>`).join('');
}

function downloadPNG() {
  const a = document.createElement('a');
  a.href = $('#canvas').toDataURL('image/png');
  a.download = 'color-by-number.png';
  a.click();
}
function loadSample() {
  // Generate a synthetic sample (gradient + circles)
  const c = document.createElement('canvas');
  c.width = 400; c.height = 400;
  const cx = c.getContext('2d');
  const g = cx.createLinearGradient(0, 0, 400, 400);
  g.addColorStop(0, '#fde68a'); g.addColorStop(1, '#7c3aed');
  cx.fillStyle = g; cx.fillRect(0, 0, 400, 400);
  cx.fillStyle = '#ef4444'; cx.beginPath(); cx.arc(120, 130, 70, 0, Math.PI * 2); cx.fill();
  cx.fillStyle = '#22d3ee'; cx.beginPath(); cx.arc(280, 280, 90, 0, Math.PI * 2); cx.fill();
  cx.fillStyle = '#16a34a'; cx.beginPath(); cx.arc(310, 110, 45, 0, Math.PI * 2); cx.fill();
  const img = new Image();
  img.onload = () => { sourceImg = img; render(); };
  img.src = c.toDataURL();
}

$('#photoInput').addEventListener('change', e => {
  const f = e.target.files[0]; if (!f) return;
  const r = new FileReader();
  r.onload = ev => { const img = new Image(); img.onload = () => { sourceImg = img; render(); }; img.src = ev.target.result; };
  r.readAsDataURL(f);
});
['#numColors','#gridSize','#fontSize'].forEach(s => $(s).addEventListener('input', () => sourceImg && render()));

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="downloadPNG()">⬇️ ${t('download')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadSample()">🎯 ${t('loadSample')}</button>

});
setTabs();
loadSample();
</script>
