const { $, copyText, t } = GZ;

let indentSize = 2;
let useExport = false;
let useSemi = true;

const PRIM = {'string':'string','number':'number','boolean':'boolean'};
function isObj(v){ return v !== null && typeof v === 'object' && !Array.isArray(v); }

function escKey(k){
  return /^[A-Za-z_$][\w$]*$/.test(k) ? k : `"${k.replace(/\\/g,'\\\\').replace(/"/g,'\\"')}"`;
}

function mergeObjects(arr){
  // merge keys across an array of objects; mark optional when not present everywhere
  const all = {};
  arr.forEach(o => { for (const k in o) if(!(k in all)) all[k] = []; });
  arr.forEach(o => { for (const k in all) all[k].push(k in o ? o[k] : undefined); });
  return all;
}

function unionTypes(types){
  // types: array of TS type strings, dedupe preserving order
  const seen = new Set(), out = [];
  for(const ty of types){ for(const x of ty.split('|').map(s=>s.trim())){ if(!seen.has(x)){ seen.add(x); out.push(x);} } }
  return out.join(' | ');
}

function typeOf(value){
  if(value === null || value === undefined) return 'null';
  if(typeof value === 'string') return 'string';
  if(typeof value === 'number') return Number.isInteger(value) ? 'number' : 'number';
  if(typeof value === 'boolean') return 'boolean';
  if(Array.isArray(value)) return arrayType(value);
  if(isObj(value)) return '[INTERFACE]';
  return 'any';
}

function arrayType(arr){
  if(!arr.length) return 'any[]';
  const itemTypes = arr.map(typeOf);
  // separate object interfaces vs primitives
  const objIdx = [];
  const primTypes = [];
  itemTypes.forEach((ty,i)=>{ if(ty==='[INTERFACE]') objIdx.push(i); else primTypes.push(ty); });
  if(objIdx.length){
    // merge all object items
    const merged = mergeObjects(objIdx.map(i=>arr[i]));
    const name = '[INTERFACE:' + JSON.stringify(merged) + ']';
    const objType = name;
    const all = primTypes.length ? [...primTypes, objType] : [objType];
    const inner = unionTypes(all);
    return inner.includes(' | ') ? '(' + inner + ')[]' : inner + '[]';
  }
  const inner = unionTypes(primTypes);
  return inner.includes(' | ') ? '(' + inner + ')[]' : inner + '[]';
}

function genInterfaces(obj, name, interfaces, opts){
  // returns TS type string for obj; registers interface if obj is an object
  if(!isObj(obj)) return typeOf(obj);
  const lines = [];
  const merged = mergeObjects([obj]);
  for(const k in merged){
    const vals = merged[k]; // array with one element (present) — we built from single object
    const present = vals[0];
    const optional = present === undefined;
    let ty;
    if(present === undefined){ ty = 'any'; }
    else if(isObj(present)){
      const childName = name + sanitizeKey(k);
      ty = genInterfaces(present, childName, interfaces, opts);
    } else if(Array.isArray(present)){
      ty = arrayTypeFor(present, name + sanitizeKey(k), interfaces, opts);
    } else {
      ty = typeOf(present);
    }
    lines.push(`${pad(opts.indent)}${opts.readonly?'readonly ':''}${escKey(k)}${optional?'?':''}: ${ty}${opts.semi?';':''}`);
  }
  const exp = opts.exportKw ? 'export ' : '';
  interfaces.push(`${exp}interface ${sanitizeName(name)} {\n${lines.join('\n')}\n}`);
  return sanitizeName(name);
}

function arrayTypeFor(arr, baseName, interfaces, opts){
  if(!arr.length) return 'any[]';
  const itemTypes = arr.map(typeOf);
  const objIdx = [];
  const primTypes = [];
  itemTypes.forEach((ty,i)=>{ if(ty==='[INTERFACE]') objIdx.push(i); else primTypes.push(ty); });
  let objType = null;
  if(objIdx.length){
    const merged = mergeObjects(objIdx.map(i=>arr[i]));
    objType = genInterfacesMerged(merged, baseName + 'Item', interfaces, opts);
  }
  const all = objType ? [...primTypes, objType] : primTypes;
  const inner = unionTypes(all);
  return inner.includes(' | ') ? '(' + inner + ')[]' : inner + '[]';
}

function genInterfacesMerged(merged, name, interfaces, opts){
  // merged: { key: [values...] } possibly with undefined (optional)
  const lines = [];
  let childIdx = 0;
  for(const k in merged){
    const vals = merged[k];
    const present = vals.filter(v=>v!==undefined);
    const optional = present.length < vals.length;
    if(!present.length){ lines.push(`${pad(opts.indent)}${opts.readonly?'readonly ':''}${escKey(k)}?: any${opts.semi?';':''}`); continue; }
    let ty;
    // if all present values are objects, merge them
    const allObj = present.every(isObj);
    const allArr = present.every(v=>Array.isArray(v));
    if(allObj){
      const sub = mergeObjects(present);
      ty = genInterfacesMerged(sub, name + sanitizeKey(k), interfaces, opts);
    } else if(allArr){
      // merge array items across arrays
      const items = present.flat();
      ty = arrayTypeFor(items, name + sanitizeKey(k), interfaces, opts);
    } else {
      ty = unionTypes(present.map(typeOf).map(x=> x==='[INTERFACE]'?'any':x));
    }
    lines.push(`${pad(opts.indent)}${opts.readonly?'readonly ':''}${escKey(k)}${optional?'?':''}: ${ty}${opts.semi?';':''}`);
  }
  const exp = opts.exportKw ? 'export ' : '';
  interfaces.push(`${exp}interface ${sanitizeName(name)} {\n${lines.join('\n')}\n}`);
  return sanitizeName(name);
}

function sanitizeName(n){ return n.replace(/[^A-Za-z0-9_]/g,'_').replace(/^(\d)/,'_$1').replace(/_+/g,'_'); }
function sanitizeKey(k){ return k.charAt(0).toUpperCase() + k.slice(1); }
function pad(n){ return ' '.repeat(n); }

function highlightTS(code){
  return code.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/(\/\/.*$)/gm,'<span class="ts-com">$1</span>')
    .replace(/\b(interface|export|readonly|null|undefined|any|number|string|boolean)\b/g,'<span class="ts-kw">$1</span>')
    .replace(/(\??:\s*)([A-Za-z_][\w\[\] |<>]*)/g,(m,col,ty)=> col + '<span class="ts-type">'+ty+'</span>');
}

function doConvert(){
  const raw = $('#input').value.trim();
  if(!raw){ $('#status').innerHTML = ''; $('#output').textContent=''; return; }
  let data;
  try{ data = JSON.parse(raw); }
  catch(e){ $('#status').innerHTML = `<span style="color:var(--gz-accent)">${t('invalid')}: ${e.message}</span>`; $('#output').textContent=''; return; }
  const rootName = ($('#rootName')||{}).value || 'Root';
  const interfaces = [];
  const opts = { indent: indentSize, exportKw: useExport, semi: useSemi, readonly: false };
  let rootType;
  if(Array.isArray(data)){
    const items = data;
    if(items.length && items.every(isObj)){
      const merged = mergeObjects(items);
      const itemType = genInterfacesMerged(merged, rootName + 'Item', interfaces, opts);
      const exp = useExport ? 'export ' : '';
      const semi = useSemi ? ';' : '';
      rootType = `${exp}type ${sanitizeName(rootName)} = ${itemType}[]${semi}`;
      interfaces.unshift(rootType);
    } else {
      const inner = items.length ? unionTypes(items.map(typeOf).map(x=>x==='[INTERFACE]'?'any':x)) : 'any';
      const exp = useExport ? 'export ' : '';
      const semi = useSemi ? ';' : '';
      rootType = `${exp}type ${sanitizeName(rootName)} = (${inner})[]${semi}`;
      interfaces.unshift(rootType);
    }
  } else if(isObj(data)){
    genInterfacesMerged(mergeObjects([data]), rootName, interfaces, opts);
  } else {
    const exp = useExport ? 'export ' : '';
    const semi = useSemi ? ';' : '';
    interfaces.unshift(`${exp}type ${sanitizeName(rootName)} = ${typeOf(data)}${semi}`);
  }
  const code = interfaces.join('\n\n');
  $('#output').innerHTML = highlightTS(code);
  $('#status').innerHTML = `<span style="color:var(--gz-success)">${t('done')} — ${interfaces.length} type(s)</span>`;
}

    ],
    "notes": null
  }, null, 2);
  doConvert();
}

function doDownload(){
  const code = $('#output').textContent;
  if(!code) return;
  const blob = new Blob([code], {type:'text/plain'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'types.ts';
  a.click();
  URL.revokeObjectURL(a.href);
}
