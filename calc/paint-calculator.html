</style>

<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "How much paint do I need per square foot?", "acceptedAnswer": {"@type": "Answer", "text": "One gallon of paint typically covers 350-400 square feet (32-37 m²) with one coat. For two coats, plan for about 175-200 sq ft per gallon."}}, {"@type": "Question", "name": "How many coats of paint should I apply?", "acceptedAnswer": {"@type": "Answer", "text": "Most projects need 2 coats for even coverage. You may need 3 coats when painting over dark colors with light paint or using low-opacity colors like reds and yellows."}}, {"@type": "Question", "name": "Should I subtract windows and doors?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. Subtract the area of windows and doors from the total wall area for a more accurate paint estimate. A standard door is about 20 sq ft and a standard window about 12 sq ft."}}, {"@type": "Question", "name": "Does ceiling paint work the same way?", "acceptedAnswer": {"@type": "Answer", "text": "Ceiling paint coverage is similar (350-400 sq ft per gallon). Calculate ceiling area as length × width of the room."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="form-grid">
      <div class="form-group"><label id="lbl-units"></label>
        <select id="units"><option value="ft">Feet (ft)</option><option value="m">Meters (m)</option></select>
      </div>
      <div class="form-group"><label id="lbl-coats"></label>
        <input type="number" id="coats" value="2" min="1" max="5">
      </div>
      <div class="form-group"><label id="lbl-coverage"></label>
        <input type="number" id="coverage" value="350" min="50" step="10">
      </div>
    </div>

    <h3 id="walls-title" style="margin-bottom:8px"></h3>
    <div id="wallsContainer"></div>
    <div class="btn-row">
      <button class="primary" id="btn-add-wall">+ Wall</button>
    </div>

    <div class="subtractions">
      <h4 id="subs-title" style="margin-top:0"></h4>
      <div id="subsContainer"></div>
      <div class="btn-row">
        <button id="btn-add-sub">+ Window / Door</button>
        <button class="primary" id="btn-calc"></button>
      </div>
    </div>

    <div class="result-box" id="resultBox"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Paint Calculator',
    toolDesc: 'Calculate exactly how much paint you need for any room. Enter wall dimensions, subtract windows and doors, and get precise paint quantities.',
    units: 'Units',
    coats: 'Number of Coats',
    coverage: 'Coverage per Gallon/Liter (sq units)',
    wallsTitle: 'Walls',
    subsTitle: 'Subtract (Windows & Doors)',
    width: 'Width',
    height: 'Height',
    addWall: '+ Wall',
    addSub: '+ Window / Door',
    calculate: 'Calculate Paint',
    wallArea: 'Total Wall Area',
    subtractArea: 'Windows & Doors',
    paintArea: 'Paintable Area',
    gallons: 'Gallons Needed',
    liters: 'Liters Needed',
    step1: 'Choose measurement units (feet or meters)',
    step2: 'Add each wall\'s width and height',
    step3: 'Subtract the area of windows and doors',
    step4: 'Get the exact amount of paint you need to buy',
  },
  zh: {
    toolTitle: '油漆计算器',
    toolDesc: '精确计算任何房间需要多少油漆。输入墙面尺寸，减去门窗面积，获取精确用量。',
    units: '单位',
    coats: '涂刷遍数',
    coverage: '每加仑/升覆盖面积',
    wallsTitle: '墙面',
    subsTitle: '扣除（门窗）',
    width: '宽度',
    height: '高度',
    addWall: '+ 墙面',
    addSub: '+ 窗户/门',
    calculate: '计算油漆用量',
    wallArea: '墙面总面积',
    subtractArea: '门窗面积',
    paintArea: '实际涂刷面积',
    gallons: '需用加仑数',
    liters: '需用升数',
    step1: '选择测量单位（英尺或米）',
    step2: '添加每面墙的宽度和高度',
    step3: '扣除窗户和门的面积',
    step4: '获取需要购买的精确油漆量',
  }
});

const { $, t } = GZ;
let wallCount = 0;
let subCount = 0;

$('#lbl-units').textContent = t('units');
$('#lbl-coats').textContent = t('coats');
$('#lbl-coverage').textContent = t('coverage');
$('#walls-title').textContent = t('wallsTitle');
$('#subs-title').textContent = t('subsTitle');
$('#btn-add-wall').textContent = t('addWall');
$('#btn-add-sub').textContent = t('addSub');
$('#btn-calc').textContent = t('calculate');

function addWall() {
  wallCount++;
  const c = $('#wallsContainer');
  const row = document.createElement('div');
  row.className = 'wall-row';
  row.innerHTML = `
    <input type="number" placeholder="${t('width')}" class="wall-w" min="0" step="0.1">
    <input type="number" placeholder="${t('height')}" class="wall-h" min="0" step="0.1">
    <span style="line-height:2.5">Wall ${wallCount}</span>
    <button onclick="this.parentElement.remove()">&times;</button>`;
  c.appendChild(row);
}

function addSub() {
  subCount++;
  const c = $('#subsContainer');
  const row = document.createElement('div');
  row.className = 'sub-row';
  row.innerHTML = `
    <input type="number" placeholder="${t('width')}" class="sub-w" min="0" step="0.1">
    <input type="number" placeholder="${t('height')}" class="sub-h" min="0" step="0.1">
    <span style="line-height:2.5;font-size:.9em">${subCount % 2 ? 'Window' : 'Door'}</span>
    <button onclick="this.parentElement.remove()">&times;</button>`;
  c.appendChild(row);
}

function calculate() {
  const coats = Math.max(1, parseInt($('#coats').value) || 2);
  const coveragePerUnit = Math.max(1, parseFloat($('#coverage').value) || 350);
  const units = $('#units').value;

  let wallArea = 0;
  document.querySelectorAll('#wallsContainer .wall-row').forEach(row => {
    const w = parseFloat(row.querySelector('.wall-w').value) || 0;
    const h = parseFloat(row.querySelector('.wall-h').value) || 0;
    wallArea += w * h;
  });

  let subArea = 0;
  document.querySelectorAll('#subsContainer .sub-row').forEach(row => {
    const w = parseFloat(row.querySelector('.sub-w').value) || 0;
    const h = parseFloat(row.querySelector('.sub-h').value) || 0;
    subArea += w * h;
  });

  const paintable = Math.max(0, wallArea - subArea);
  const totalArea = paintable * coats;
  const paintNeeded = totalArea / coveragePerUnit;

  const areaUnit = units === 'ft' ? 'ft²' : 'm²';
  
  let html = `
    <div class="result-item"><div class="label">${t('wallArea')}</div><div class="val">${wallArea.toFixed(1)} ${areaUnit}</div></div>
    <div class="result-item"><div class="label">${t('subtractArea')}</div><div class="val">${subArea.toFixed(1)} ${areaUnit}</div></div>
    <div class="result-item"><div class="label">${t('paintArea')}</div><div class="val">${totalArea.toFixed(1)} ${areaUnit}</div></div>`;
  
  if (units === 'ft') {
    html += `<div class="result-item"><div class="label">${t('gallons')}</div><div class="val">${paintNeeded.toFixed(2)} gal</div></div>`;
  } else {
    html += `<div class="result-item"><div class="label">${t('liters')}</div><div class="val">${paintNeeded.toFixed(2)} L</div></div>`;
  }
  
  $('#resultBox').innerHTML = html;
}

// Add 4 walls by default
for (let i = 0; i < 4; i++) addWall();
// Add 1 door and 1 window by default
addSub(); addSub();

$('#btn-add-wall').onclick = addWall;
$('#btn-add-sub').onclick = addSub;
$('#btn-calc').onclick = calculate;
$('#units').addEventListener('change', () => {
  if ($('#units').value === 'm') $('#coverage').value = 10;
  else $('#coverage').value = 350;
});

calculate();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🏠', href:'/calc/bmi-calculator.html', name:'BMI Calculator'},
    {icon:'📐', href:'/calc/area-calculator.html', name:'Area Calculator'},
    {icon:'📏', href:'/convert/unit.html', name:'Unit Converter'},
    {icon:'💡', href:'/calc/fuel-cost-calculator.html', name:'Fuel Cost'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
