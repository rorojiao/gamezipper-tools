const { $, copyText, t } = GZ;

function updateStats() {
  const v = $('#input').value;
  const chars = v.length;
  const lines = v ? v.split('\n').length : 0;
  const words = v.trim() ? v.trim().split(/\s+/).length : 0;
  const fontSize = +$('#font-size').value;
  const pageLines = Math.floor((($('#page-size').value === 'a4' ? 297 : 279) - 2 * (+$('#margins').value)) / (fontSize * 0.45));
  const pages = Math.max(1, Math.ceil(lines / pageLines));
  $('#stats').innerHTML = `<span>${chars} ${t('chars')}</span><span>${words} ${t('words')}</span><span>${lines} ${t('lines')}</span><span>~${pages} ${t('pages')}</span>`;
}

function updatePreview() {
  const v = $('#input').value;
  const wrap = $('#previewWrap');
  if (!v.trim()) { wrap.style.display = 'none'; return; }
  wrap.style.display = 'block';
  const font = $('#font-family').value;
  const size = +$('#font-size').value;
  const p = $('#preview');
  p.style.fontFamily = font;
  p.style.fontSize = size + 'pt';
  p.textContent = v;
}

function fontKey() {
  const f = $('#font-family').value;
  if (f.includes('Times')) return 'times';
  if (f.includes('Courier') || f.includes('monospace')) return 'courier';
  return 'helvetica';
}

function generatePDF() {
  const text = $('#input').value;
  if (!text.trim()) return;
  const { jsPDF } = window.jspdf;
  const orient = $('#orientation').value;
  const fmt = $('#page-size').value === 'a4' ? 'a4' : ($('#page-size').value === 'legal' ? 'legal' : 'letter');
  const margin = +$('#margins').value;
  const fontSize = +$('#font-size').value;
  const doc = new jsPDF({ orientation: orient, unit: 'mm', format: fmt });
  doc.setFont(fontKey(), 'normal');
  doc.setFontSize(fontSize);
  const pageW = doc.internal.pageSize.getWidth();
  const pageH = doc.internal.pageSize.getHeight();
  const lines = doc.splitTextToSize(text, pageW - 2 * margin);
  let y = margin;
  const lineH = fontSize * 0.45;
  lines.forEach(line => {
    if (y > pageH - margin) { doc.addPage(); y = margin; }
    doc.text(line, margin, y);
    y += lineH;
  });
  doc.save('text.pdf');
  $('#status').innerHTML = `<span style="color:var(--gz-success)">${t('ready')}</span>`;
}

function loadExample() {
  $('#input').value = "The quick brown fox jumps over the lazy dog.\n\nLorem ipsum dolor sit amet, consectetur adipiscing elit. Sed do eiusmod tempor incididunt ut labore et dolore magna aliqua.\n\nUt enim ad minim veniam, quis nostrud exercitation ullamco laboris nisi ut aliquip ex ea commodo consequat.";
  updateStats(); updatePreview();
}

function doClear() { $('#input').value = ''; updateStats(); updatePreview(); $('#status').innerHTML = ''; }

function togglePreview() {
  const wrap = $('#previewWrap');
  if (wrap.style.display === 'none') { updatePreview(); }
  else { wrap.style.display = 'none'; }
}

$('#input').addEventListener('input', () => { updateStats(); if ($('#previewWrap').style.display !== 'none') updatePreview(); });

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="generatePDF()">${t('generate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="togglePreview()">${t('preview')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('loadExample')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

$('#controls').innerHTML = `
  <label>${t('fontFamily')}<select id="font-family">
    <option value="Helvetica, Arial, sans-serif">Helvetica</option>
    <option value="'Times New Roman', Times, serif">Times</option>
    <option value="'Courier New', Courier, monospace">Courier</option>
    <option value="monospace">Monospace</option>
  </select></label>
  <label>${t('fontSize')}<input type="number" id="font-size" value="12" min="8" max="24" step="1"></label>
  <label>${t('pageSize')}<select id="page-size">
    <option value="a4">A4</option>
    <option value="letter">US Letter</option>
    <option value="legal">US Legal</option>
  </select></label>
  <label>${t('orientation')}<select id="orientation">
    <option value="portrait">${t('portrait')}</option>
    <option value="landscape">${t('landscape')}</option>
  </select></label>
  <label>${t('margins')}<input type="number" id="margins" value="20" min="5" max="40" step="1"></label>`;

['font-family','font-size','page-size','orientation','margins'].forEach(id => $('#' + id).addEventListener('change', () => { updateStats(); updatePreview(); }));
