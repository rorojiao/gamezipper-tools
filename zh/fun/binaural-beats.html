<script>
GZI18n.register({
  en: {
    toolTitle: 'Binaural Beats Generator',
    toolDesc: 'Generate pure binaural beats for focus, deep sleep, meditation and relaxation. Choose alpha, beta, theta, delta or gamma brainwave states. Use stereo headphones.',
    baseFreq: 'Carrier Frequency (Hz)',
    volume: 'Volume',
    timer: 'Sleep Timer',
    gamma: '⚡ Gamma 40 Hz',
    beta: '⚡ Beta 20 Hz',
    alpha: '🌿 Alpha 10 Hz',
    theta: '🌌 Theta 6 Hz',
    delta: '😴 Delta 2 Hz',
    descGamma: 'High-level cognition & insight',
    descBeta: 'Alert focus & problem solving',
    descAlpha: 'Relaxed focus & calm',
    descTheta: 'Deep meditation & creativity',
    descDelta: 'Deep dreamless sleep',
    phoneNote: '🎧 Stereo headphones required',
    playing: 'Playing...',
    step1: 'Put on stereo headphones (required for the binaural effect)',
    step2: 'Pick a brainwave state: gamma, beta, alpha, theta or delta',
    step3: 'Adjust the carrier frequency and volume to comfort',
    step4: 'Press play and optionally set a sleep timer to auto-stop',
  },
  zh: {
    toolTitle: '双耳节拍生成器',
    toolDesc: '生成纯净双耳节拍，用于专注、深度睡眠、冥想和放松。选择 Gamma、Beta、Alpha、Theta 或 Delta 脑波状态。请佩戴立体声耳机。',
    baseFreq: '载波频率 (Hz)',
    volume: '音量',
    timer: '睡眠定时',
    gamma: '⚡ Gamma 40 Hz',
    beta: '⚡ Beta 20 Hz',
    alpha: '🌿 Alpha 10 Hz',
    theta: '🌌 Theta 6 Hz',
    delta: '😴 Delta 2 Hz',
    descGamma: '高级认知与顿悟',
    descBeta: '警觉专注与解题',
    descAlpha: '放松专注与平静',
    descTheta: '深度冥想与创造力',
    descDelta: '深度无梦睡眠',
    phoneNote: '🎧 需佩戴立体声耳机',
    playing: '播放中…',
    step1: '戴上立体声耳机（双耳节拍效果必需）',
    step2: '选择脑波状态：Gamma、Beta、Alpha、Theta 或 Delta',
    step3: '调节载波频率和音量至舒适',
    step4: '按播放，可选设置定时器自动停止',
  }
});

const { $, t } = GZ;
let audioCtx, oscL, oscR, merger, gainNode, timerInterval, timerRemaining = 0;
let playing = false;

// waveKey -> beat Hz
const waves = [
  { key: 'gamma', beat: 40 },
  { key: 'beta',  beat: 20 },
  { key: 'alpha', beat: 10 },
  { key: 'theta', beat: 6 },
  { key: 'delta', beat: 2 },
];
let currentWave = waves[2]; // alpha default

const waveBtnContainer = $('#waveBtns');
waves.forEach(w => {
  const btn = document.createElement('button');
  btn.textContent = t(w.key);
  btn.className = w.key === currentWave.key ? 'active' : '';
  btn.onclick = () => {
    currentWave = w;
    waveBtnContainer.querySelectorAll('button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    updateDisplay();
    if (playing) { stopBeats(); startBeats(); }
  };
  waveBtnContainer.appendChild(btn);
});

function updateDisplay() {
  const base = +$('#baseFreq').value;
  $('#freqDisplay').textContent = `${base.toFixed(0)} Hz + ${currentWave.beat} Hz beat`;
  $('#waveDesc').textContent = t('desc' + currentWave.key.charAt(0).toUpperCase() + currentWave.key.slice(1));
}

$('#baseFreq').addEventListener('input', () => {
  updateDisplay();
  if (playing) { stopBeats(); startBeats(); }
});

$('#volSlider').addEventListener('input', e => {
  if (gainNode) gainNode.gain.value = +e.target.value / 100 * 0.4;
});

function toggleBeats() { playing ? stopBeats() : startBeats(); }

function startBeats() {
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const base = +$('#baseFreq').value;
  const beat = currentWave.beat;

  oscL = audioCtx.createOscillator();
  oscL.type = 'sine';
  oscL.frequency.value = base;

  oscR = audioCtx.createOscillator();
  oscR.type = 'sine';
  oscR.frequency.value = base + beat;

  const gainL = audioCtx.createGain();
  const gainR = audioCtx.createGain();
  gainL.gain.value = 1; gainR.gain.value = 1;
  const panL = audioCtx.createStereoPanner ? audioCtx.createStereoPanner() : null;
  const panR = audioCtx.createStereoPanner ? audioCtx.createStereoPanner() : null;

  // Hard pan each oscillator to one channel
  const splitterL = audioCtx.createChannelMerger ? audioCtx.createChannelMerger(2) : null;
  const splitterR = audioCtx.createChannelMerger ? audioCtx.createChannelMerger(2) : null;

  gainNode = audioCtx.createGain();
  gainNode.gain.value = +$('#volSlider').value / 100 * 0.4;

  if (audioCtx.createStereoPanner) {
    // modern path
    panL.pan.value = -1;
    panR.pan.value = 1;
    oscL.connect(gainL); gainL.connect(panL); panL.connect(gainNode);
    oscR.connect(gainR); gainR.connect(panR); panR.connect(gainNode);
  } else {
    // fallback: route to separate channels via channelMerger
    oscL.connect(gainL); gainL.connect(splitterL, 0, 0);
    oscR.connect(gainR); gainR.connect(splitterR, 0, 1);
    splitterL.connect(gainNode, 0, 0);
    splitterR.connect(gainNode, 0, 1);
  }

  gainNode.connect(audioCtx.destination);
  oscL.start(); oscR.start();
  playing = true;
  $('#playBtn').innerHTML = '&#9632;';
  $('#playBtn').classList.add('playing');
  startTimer();
}

function stopBeats() {
  try { if (oscL) oscL.stop(); if (oscR) oscR.stop(); } catch(e){}
  oscL = oscR = null;
  if (audioCtx) { audioCtx.close(); audioCtx = null; }
  playing = false;
  $('#playBtn').innerHTML = '&#9654;';
  $('#playBtn').classList.remove('playing');
  if (timerInterval) clearInterval(timerInterval);
  $('#timerDisplay').textContent = '';
}

function startTimer() {
  const dur = +$('#timerSel').value;
  if (!dur) { $('#timerDisplay').textContent = t('playing'); return; }
  timerRemaining = dur;
  updateTimerDisplay();
  if (timerInterval) clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    timerRemaining--;
    if (timerRemaining <= 0) { clearInterval(timerInterval); stopBeats(); return; }
    updateTimerDisplay();
  }, 1000);
}

function updateTimerDisplay() {
  const m = Math.floor(timerRemaining / 60);
  const s = timerRemaining % 60;
  $('#timerDisplay').textContent = `${m}:${s.toString().padStart(2,'0')}`;
}

$('#lbl-baseFreq').textContent = t('baseFreq');
$('#lbl-vol').textContent = t('volume');
$('#lbl-timer').textContent = t('timer');
$('#headphoneNote').textContent = t('phoneNote');
updateDisplay();

GZ.renderToolPage({
  category: 'fun',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'☁️', href:'/fun/white-noise.html', name:'White Noise Generator'},
    {icon:'🔊', href:'/fun/tone-generator.html', name:'Tone Generator'},
    {icon:'🎵', href:'/fun/metronome.html', name:'Metronome'},
    {icon:'🧘', href:'/fun/affirmation-generator.html', name:'Daily Affirmations'},
  ]
});
</script>
