<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is HEIC format?", "acceptedAnswer": {"@type": "Answer", "text": "HEIC (High Efficiency Image Container) is Apple's default photo format on iOS since iOS 11. It offers better compression than JPEG but is not universally supported."}}, {"@type": "Question", "name": "How do I convert HEIC to JPG?", "acceptedAnswer": {"@type": "Answer", "text": "Drop your HEIC files onto this page or click to browse. Select JPG or PNG output format, set quality, and click Convert. Download your converted images instantly."}}, {"@type": "Question", "name": "Are my photos uploaded to a server?", "acceptedAnswer": {"@type": "Answer", "text": "No. The conversion happens entirely in your browser using the heic2any library. Your photos never leave your device."}}, {"@type": "Question", "name": "Can I convert multiple HEIC files at once?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. You can select or drop multiple HEIC files for batch conversion. Each file is converted independently."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="drop-zone" id="dropZone">
      <div class="icon">📱</div>
      <div class="hint" id="dropHint"></div>
    </div>
    <input type="file" id="fileInput" accept=".heic,.heif,image/heic,image/heif" multiple hidden>
    <div id="status"></div>
    <div class="output-grid" id="output"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'HEIC to JPG Converter',
    toolDesc: 'Convert iPhone HEIC/HEIF photos to JPG or PNG instantly. Drag, drop, convert — all in your browser, no upload.',
    dropHint: 'Drop HEIC files here or click to browse',
    format: 'Output Format',
    quality: 'Quality',
    converting: 'Converting...',
    done: '✓ Converted',
    download: 'Download',
    downloadAll: 'Download All',
    clearAll: 'Clear All',
    noFiles: 'No HEIC files selected.',
    error: 'Conversion failed',
    step1: 'Drop HEIC files or click to browse',
    step2: 'Choose output format (JPG or PNG)',
    step3: 'Set quality if using JPG format',
    step4: 'Click Download to save converted images',
  },
  zh: {
    toolTitle: 'HEIC 转 JPG 转换器',
    toolDesc: '将 iPhone 的 HEIC/HEIF 照片即时转换为 JPG 或 PNG，拖放即转换，完全浏览器本地处理。',
    dropHint: '拖放 HEIC 文件到此处或点击选择',
    format: '输出格式',
    quality: '质量',
    converting: '转换中...',
    done: '✓ 已转换',
    download: '下载',
    downloadAll: '全部下载',
    clearAll: '清空',
    noFiles: '未选择 HEIC 文件。',
    error: '转换失败',
    step1: '拖放 HEIC 文件或点击浏览',
    step2: '选择输出格式（JPG 或 PNG）',
    step3: '若使用 JPG 格式可调整质量',
    step4: '点击下载保存转换后的图片',
  }
});

const { $, t } = GZ;
let outputFormat = 'image/jpeg';
let quality = 0.92;
let convertedFiles = [];

const dropZone = $('#dropZone');
const fileInput = $('#fileInput');
const output = $('#output');

dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('dragover');
  handleFiles(e.dataTransfer.files);
});
fileInput.addEventListener('change', e => handleFiles(e.target.files));
$('#dropHint').textContent = t('dropHint');

async function handleFiles(files) {
  const heicFiles = [...files].filter(f => /\.heic$/i.test(f.name) || /\.heif$/i.test(f.name) || f.type === 'image/heic');
  if (!heicFiles.length) { $('#status').innerHTML = t('noFiles'); return; }
  $('#status').textContent = t('converting');

  for (const file of heicFiles) {
    try {
      const blob = await heic2any({ blob: file, toType: outputFormat, quality: quality });
      const url = URL.createObjectURL(blob);
      const baseName = file.name.replace(/\.[^.]+$/, '');
      const ext = outputFormat === 'image/png' ? 'png' : 'jpg';

      const card = document.createElement('div');
      card.className = 'output-card';
      card.innerHTML = `
        <img src="${url}" alt="${baseName}">
        <div class="info">${baseName}.${ext} · ${formatSize(blob.size)}</div>
        <div class="info" style="color:var(--gz-success)">${t('done')}</div>
        <a class="dl-btn" href="${url}" download="${baseName}.${ext}">${t('download')}</a>`;
      output.appendChild(card);
      convertedFiles.push({ url, name: `${baseName}.${ext}` });
    } catch(e) {
      const card = document.createElement('div');
      card.className = 'output-card';
      card.innerHTML = `<div class="info" style="color:var(--gz-accent)">${t('error')}: ${esc(file.name)}</div>`;
      output.appendChild(card);
    }
  }
  $('#status').textContent = `${t('done')} (${convertedFiles.length} files)`;
}

function formatSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1048576) return (bytes/1024).toFixed(1) + ' KB';
  return (bytes/1048576).toFixed(1) + ' MB';
}

function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function doClear() {
  convertedFiles.forEach(f => URL.revokeObjectURL(f.url));
  convertedFiles = [];
  output.innerHTML = '';
  $('#status').textContent = '';
  fileInput.value = '';
}

$('#toolbar').innerHTML = `
  <select class="gz-select" onchange="outputFormat=this.value">
    <option value="image/jpeg">JPG</option>
    <option value="image/png">PNG</option>
  </select>
  <label style="display:flex;align-items:center;gap:6px;font-size:.85em;color:var(--text2)">${t('quality')}
    <input type="range" min="50" max="100" value="92" oninput="quality=this.value/100;this.nextElementSibling.textContent=this.value+'%'" style="width:100px">
    <span>92%</span>
  </label>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clearAll')}</button>`;

GZ.renderToolPage({
  category: 'convert',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🖼️', href:'/convert/webp-converter.html', name:'WebP Converter'},
    {icon:'🖼️', href:'/convert/png-to-jpg.html', name:'PNG to JPG'},
    {icon:'🔄', href:'/image/converter.html', name:'Image Converter'},
    {icon:'📦', href:'/image/compressor.html', name:'Image Compressor'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
