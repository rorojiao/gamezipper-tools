<script>
GZI18n.register({
  en: {
    toolTitle: 'Google Sheets Formula Builder',
    toolDesc: 'Build Google Sheets formulas visually — QUERY, IMPORTRANGE, ARRAYFORMULA, VLOOKUP, SUMIF, REGEXMATCH, SPLIT, JOIN and more. Free and browser-only.',
    fields: 'Formula Inputs',
    result: 'Generated Formula',
    copy: 'Copy Formula',
    clear: 'Clear',
    step1: 'Select a formula type from the buttons above',
    step2: 'Fill in the input fields with cell references or values',
    step3: 'The formula appears live in the result panel',
    step4: 'Click Copy and paste into Google Sheets',
    copied: '✓ Formula copied to clipboard!',
  },
  zh: {
    toolTitle: 'Google Sheets 公式构建器',
    toolDesc: '可视化构建 Google Sheets 公式 — QUERY、IMPORTRANGE、ARRAYFORMULA、VLOOKUP、SUMIF、REGEXMATCH、SPLIT、JOIN 等。免费，浏览器本地运行。',
    fields: '公式输入',
    result: '生成的公式',
    copy: '复制公式',
    clear: '清空',
    step1: '从上方按钮选择公式类型',
    step2: '在输入字段中填写单元格引用或值',
    step3: '公式实时显示在结果区域',
    step4: '点击「复制」并粘贴到 Google Sheets',
    copied: '✓ 公式已复制到剪贴板！',
  }
});

const { $, copyText, t } = GZ;
let currentCat = 'query';

const CATEGORIES = {
  query: { label: 'QUERY', fields: ['range', 'query', 'headers'], labels_en: ['Data range (e.g. A:D)', 'SQL-like query (e.g. "SELECT * WHERE A > 10")', 'Number of headers'], labels_zh: ['数据范围（如 A:D）','SQL 查询（如 "SELECT * WHERE A > 10"）','标题行数'] },
  importrange: { label: 'IMPORTRANGE', fields: ['url', 'range'], labels_en: ['Spreadsheet URL or ID', 'Range (e.g. "Sheet1!A:Z")'], labels_zh: ['表格 URL 或 ID','范围（如 "Sheet1!A:Z"）'] },
  arrayformula: { label: 'ARRAYFORMULA', fields: ['formula'], labels_en: ['Array formula (e.g. A1:A10*B1:B10)'], labels_zh: ['数组公式（如 A1:A10*B1:B10）'] },
  vlookup: { label: 'VLOOKUP', fields: ['lookup', 'table', 'col', 'sorted'], labels_en: ['Lookup value', 'Table range', 'Column index', 'Is sorted? (TRUE/FALSE)'], labels_zh: ['查找值','表格范围','列号','是否排序？（TRUE/FALSE）'] },
  sumif: { label: 'SUMIF', fields: ['range', 'criteria', 'sumRange'], labels_en: ['Criteria range', 'Criteria', 'Sum range (optional)'], labels_zh: ['条件范围','条件','求和范围（可选）'] },
  split: { label: 'SPLIT', fields: ['text', 'delimiter', 'each'], labels_en: ['Text/Cell', 'Delimiter', 'Split each? (TRUE/FALSE)'], labels_zh: ['文本/单元格','分隔符','逐个拆分？（TRUE/FALSE）'] },
  join: { label: 'JOIN', fields: ['delimiter', 'range'], labels_en: ['Delimiter', 'Range or array'], labels_zh: ['分隔符','范围或数组'] },
  regexmatch: { label: 'REGEXMATCH', fields: ['text', 'pattern'], labels_en: ['Text/Cell', 'Regex pattern'], labels_zh: ['文本/单元格','正则表达式'] },
  regexextract: { label: 'REGEXEXTRACT', fields: ['text', 'pattern'], labels_en: ['Text/Cell', 'Regex pattern'], labels_zh: ['文本/单元格','正则表达式'] },
  regexreplace: { label: 'REGEXREPLACE', fields: ['text', 'pattern', 'replacement'], labels_en: ['Text/Cell', 'Regex pattern', 'Replacement'], labels_zh: ['文本/单元格','正则表达式','替换文本'] },
  iferror: { label: 'IFERROR', fields: ['formula', 'fallback'], labels_en: ['Formula/value', 'Value if error'], labels_zh: ['公式/值','出错时的值'] },
  unique: { label: 'UNIQUE', fields: ['range'], labels_en: ['Range'], labels_zh: ['范围'] },
  filter: { label: 'FILTER', fields: ['range', 'condRange', 'condValues'], labels_en: ['Range to filter', 'Condition range', 'Condition values'], labels_zh: ['筛选范围','条件范围','条件值'] },
  sparkline: { label: 'SPARKLINE', fields: ['range', 'chartType'], labels_en: ['Data range', 'Chart type (line/bar/column/winloss)'], labels_zh: ['数据范围','图表类型（line/bar/column/winloss）'] },
};

function fmtVal(v) {
  if (v === undefined || v === '') return '';
  if (/^[A-Za-z]+[0-9]+(:[A-Za-z]+[0-9]+)?$/.test(v.trim())) return v.trim();
  if (/^[A-Za-z]+:[A-Za-z]+$/.test(v.trim())) return v.trim();
  if (/^(TRUE|FALSE)$/i.test(v.trim())) return v.trim().toUpperCase();
  if (/^-?\d+(\.\d+)?$/.test(v.trim())) return v.trim();
  return '"' + v.replace(/"/g, '""') + '"';
}

function generateFormula(cat, vals) {
  const v = vals;
  switch(cat) {
    case 'query': return `=QUERY(${v.range}, "${v.query.replace(/"/g,'\"')}"${v.headers ? ', '+v.headers : ''})`;
    case 'importrange': return `=IMPORTRANGE("${v.url}", "${v.range}")`;
    case 'arrayformula': return `=ARRAYFORMULA(${v.formula})`;
    case 'vlookup': return `=VLOOKUP(${fmtVal(v.lookup)}, ${v.table}, ${v.col}, ${v.sorted.toUpperCase()})`;
    case 'sumif': return v.sumRange ? `=SUMIF(${v.range}, ${fmtVal(v.criteria)}, ${v.sumRange})` : `=SUMIF(${v.range}, ${fmtVal(v.criteria)})`;
    case 'split': return `=SPLIT(${fmtVal(v.text)}, "${v.delimiter}", ${v.each.toUpperCase()})`;
    case 'join': return `=JOIN("${v.delimiter}", ${v.range})`;
    case 'regexmatch': return `=REGEXMATCH(${fmtVal(v.text)}, "${v.pattern}")`;
    case 'regexextract': return `=REGEXEXTRACT(${fmtVal(v.text)}, "${v.pattern}")`;
    case 'regexreplace': return `=REGEXREPLACE(${fmtVal(v.text)}, "${v.pattern}", "${v.replacement}")`;
    case 'iferror': return `=IFERROR(${v.formula}, ${fmtVal(v.fallback)})`;
    case 'unique': return `=UNIQUE(${v.range})`;
    case 'filter': return `=FILTER(${v.range}, ${v.condRange}=${fmtVal(v.condValues)})`;
    case 'sparkline': return `=SPARKLINE(${v.range}, {"charttype","${v.chartType}"})`;
    default: return '';
  }
}

function renderFields() {
  const cat = CATEGORIES[currentCat];
  const isZh = GZI18n.lang === 'zh';
  const labels = isZh ? cat.labels_zh : cat.labels_en;
  const html = cat.fields.map((f, i) =>
    `<div class="gz-form-row"><label>${labels[i]}</label><input type="text" id="f-${f}" oninput="updateFormula()" placeholder="${labels[i]}"></div>`
  ).join('');
  $('#formFields').innerHTML = html;
  updateFormula();
}

function updateFormula() {
  const cat = CATEGORIES[currentCat];
  const vals = {};
  cat.fields.forEach(f => { vals[f] = ($('#f-' + f) || {value:''}).value; });
  const formula = generateFormula(currentCat, vals);
  $('#output').textContent = formula;
}

function selectCat(cat) {
  currentCat = cat;
  document.querySelectorAll('.formula-cat button').forEach(b => b.classList.toggle('active', b.dataset.cat === cat));
  renderFields();
}

$('#catBtns').innerHTML = Object.entries(CATEGORIES).map(([k, v]) =>
  `<button data-cat="${k}" onclick="selectCat('${k}')">${v.label}</button>`
).join('');

$('#copyBtn').onclick = () => { copyText($('#output').textContent); $('#status').textContent = t('copied'); setTimeout(() => $('#status').textContent = '', 2000); };
$('#clearBtn').onclick = () => { document.querySelectorAll('#formFields input').forEach(i => i.value = ''); updateFormula(); };

selectCat('query');

GZ.renderToolPage({
  category: 'dev',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📊', href:'/dev/excel-formula-generator.html', name:'Excel Formula Gen'},
    {icon:'📋', href:'/dev/csv-formatter.html', name:'CSV Formatter'},
    {icon:'🔢', href:'/dev/json-to-csv.html', name:'JSON to CSV'},
    {icon:'🧮', href:'/dev/sql.html', name:'SQL Formatter'},
  ]
});
</script>

</body>
