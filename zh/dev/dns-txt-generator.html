<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"What is a DNS TXT record?","acceptedAnswer":{"@type":"Answer","text":"A DNS TXT record is a type of Domain Name System record that stores text data. It's commonly used for email authentication (SPF, DKIM, DMARC), domain verification, and various other purposes."}},{"@type":"Question","name":"What are common uses of TXT records?","acceptedAnswer":{"@type":"Answer","text":"Common uses include SPF records for email authorization, domain ownership verification for Google/Microsoft/SSL certificates, DKIM records for email signing, DMARC policies, and human-readable information about a domain."}},{"@type":"Question","name":"What is the maximum length of a TXT record?","acceptedAnswer":{"@type":"Answer","text":"A single TXT record string can be up to 255 characters. Longer values are split into multiple 255-character strings within the same TXT record. Total TXT record size is typically limited to about 4KB."}},{"@type":"Question","name":"How do I add a TXT record to my DNS?","acceptedAnswer":{"@type":"Answer","text":"Log in to your domain registrar or DNS hosting provider's control panel, find the DNS management section, add a new TXT record with the appropriate name/host and value, then save. Propagation may take up to 48 hours."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="gz-split">
      <div>
        <label style="font-weight:600;display:block;margin-bottom:8px" id="lbl-preset"></label>
        <div class="preset-grid">
          <button class="preset-btn active" data-type="custom">📝 Custom</button>
          <button class="preset-btn" data-type="spf">📧 SPF</button>
          <button class="preset-btn" data-type="dmarc">🛡️ DMARC</button>
          <button class="preset-btn" data-type="google">🔍 Google Verify</button>
          <button class="preset-btn" data-type="ms">🏢 Microsoft</button>
          <button class="preset-btn" data-type="spf-include">📧 SPF Include</button>
        </div>
        <div class="gz-field">
          <label id="lbl-host"></label>
          <input type="text" id="host" value="@" placeholder="@">
        </div>
        <div class="gz-field">
          <label id="lbl-ttl"></label>
          <select id="ttl">
            <option value="3600">1 Hour (3600)</option>
            <option value="1800">30 Minutes (1800)</option>
            <option value="7200" selected>2 Hours (7200)</option>
            <option value="14400">4 Hours (14400)</option>
            <option value="43200">12 Hours (43200)</option>
            <option value="86400">1 Day (86400)</option>
          </select>
        </div>
        <div class="gz-field" id="value-field">
          <label id="lbl-value"></label>
          <textarea id="txtValue" placeholder="Enter your TXT record value..."></textarea>
        </div>
        <div class="gz-field" id="domain-field">
          <label id="lbl-domain"></label>
          <input type="text" id="domain" placeholder="example.com">
        </div>
      </div>
      <div>
        <label id="lbl-out" style="font-weight:600;display:block;margin-bottom:8px"></label>
        <div class="gz-output" id="output-area"></div>
      </div>
    </div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'DNS TXT Record Generator',
    toolDesc: 'Generate DNS TXT records for SPF, DMARC, domain verification, and more. Build properly formatted TXT records for any purpose.',
    preset: 'Record Type',
    host: 'Host / Name',
    ttl: 'TTL (Time to Live)',
    value: 'TXT Record Value',
    domain: 'Domain Name',
    generate: 'Generate TXT Record',
    copy: 'Copy Record',
    clear: 'Clear',
    lblOut: 'Generated TXT Record',
    recordName: 'Record Name',
    recordType: 'Record Type',
    recordValue: 'Record Value',
    recordTTL: 'TTL',
    step1: 'Select a record type preset or choose Custom',
    step2: 'Enter the host/name and value for the TXT record',
    step3: 'Click "Generate" to build the formatted DNS TXT record',
    step4: 'Copy the record and add it to your DNS management console',
  },
  zh: {
    toolTitle: 'DNS TXT 记录生成器',
    toolDesc: '生成 SPF、DMARC、域名验证等各种用途的 DNS TXT 记录。构建正确格式的 TXT 记录。',
    preset: '记录类型',
    host: '主机/名称',
    ttl: 'TTL（生存时间）',
    value: 'TXT 记录值',
    domain: '域名',
    generate: '生成 TXT 记录',
    copy: '复制记录',
    clear: '清空',
    lblOut: '生成的 TXT 记录',
    recordName: '记录名称',
    recordType: '记录类型',
    recordValue: '记录值',
    recordTTL: 'TTL',
    step1: '选择记录类型预设或选择自定义',
    step2: '输入主机/名称和 TXT 记录值',
    step3: '点击「生成」构建格式化的 DNS TXT 记录',
    step4: '复制记录并添加到 DNS 管理控制台',
  }
});

const { $, copyText, t } = GZ;
let currentType = 'custom';

document.querySelectorAll('.preset-btn').forEach(btn => {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
    this.classList.add('active');
    currentType = this.dataset.type;
    updateFields();
  });
});

function updateFields() {
  const domainField = $('#domain-field');
  const valueField = $('#value-field');
  const hostInput = $('#host');

  switch (currentType) {
    case 'spf':
      hostInput.value = '@';
      valueField.style.display = '';
      domainField.style.display = '';
      $('#txtValue').placeholder = 'v=spf1 include:_spf.google.com ~all';
      break;
    case 'dmarc':
      hostInput.value = '_dmarc';
      valueField.style.display = '';
      domainField.style.display = '';
      $('#txtValue').placeholder = 'v=DMARC1; p=none; rua=mailto:dmarc@example.com';
      break;
    case 'google':
      hostInput.value = '@';
      valueField.style.display = '';
      domainField.style.display = 'none';
      $('#txtValue').placeholder = 'google-site-verification=XXXXXXXXXX';
      break;
    case 'ms':
      hostInput.value = '@';
      valueField.style.display = '';
      domainField.style.display = 'none';
      $('#txtValue').placeholder = 'v=verifydomain MS=XXXXXXXXXX';
      break;
    case 'spf-include':
      hostInput.value = '@';
      valueField.style.display = '';
      domainField.style.display = '';
      $('#txtValue').placeholder = 'v=spf1 include:spf.protection.outlook.com include:_spf.google.com ~all';
      break;
    default:
      valueField.style.display = '';
      domainField.style.display = '';
      $('#txtValue').placeholder = 'Enter your TXT record value...';
  }
}

function doGenerate() {
  const host = $('#host').value.trim() || '@';
  const ttl = $('#ttl').value;
  const value = $('#txtValue').value.trim();
  const domain = $('#domain').value.trim();

  if (!value) return;

  const fqdn = domain && host !== '@' ? `${host}.${domain}` : (host === '@' && domain ? domain : host);

  const out = $('#output-area');
  out.innerHTML = `
    <div class="output-section">
      <h3>${t('recordName')}</h3>
      <div class="output-val" id="rec-name">${fqdn}</div>
    </div>
    <div class="output-section">
      <h3>${t('recordType')}</h3>
      <div class="output-val">TXT</div>
    </div>
    <div class="output-section">
      <h3>${t('recordValue')}</h3>
      <div class="output-val" id="rec-value">"${value}"</div>
    </div>
    <div class="output-section">
      <h3>${t('recordTTL')}</h3>
      <div class="output-val">${ttl}</div>
    </div>
    ${value.length > 255 ? '<div style="background:#fff3cd;color:#856404;border:1px solid #ffc107;padding:8px 12px;border-radius:6px;font-size:.85rem;margin-top:8px">⚠️ Value exceeds 255 characters. Your DNS provider may split it into multiple strings automatically.</div>' : ''}`;
}

function doCopy() {
  const val = document.getElementById('rec-value');
  if (val) copyText(val.textContent);
}

function doClear() {
  $('#txtValue').value = '';
  $('#domain').value = '';
  $('#host').value = '@';
  $('#output-area').innerHTML = '';
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="doGenerate()">${t('generate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doCopy()">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

$('#lbl-preset').textContent = t('preset');
$('#lbl-host').textContent = t('host');
$('#lbl-ttl').textContent = t('ttl');
$('#lbl-value').textContent = t('value');
$('#lbl-domain').textContent = t('domain');
$('#lbl-out').textContent = t('lblOut');

GZ.renderToolPage({
  category: 'dev',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📧', href:'/dev/spf-generator.html', name:'SPF Generator'},
    {icon:'📧', href:'/dev/dkim-generator.html', name:'DKIM Generator'},
    {icon:'📋', href:'/dev/dns-lookup.html', name:'DNS Lookup'},
    {icon:'🌐', href:'/dev/dns-propagation.html', name:'DNS Propagation'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
