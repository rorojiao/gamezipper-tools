<style>
.re-form{display:grid;gap:14px;max-width:560px}
.re-form label{display:block;font-size:.85em;color:var(--text2);margin-bottom:4px;font-weight:600}
.re-form input,.re-form select{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:10px;background:var(--glass2);color:var(--text);font-size:1rem;box-sizing:border-box}
.re-form input:focus,.re-form select:focus{outline:none;border-color:var(--accent)}
.re-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.re-switch{display:flex;gap:8px;margin-top:4px}
.re-switch button{flex:1;padding:9px;border:1px solid var(--border);border-radius:10px;background:var(--glass2);color:var(--text);cursor:pointer;font-size:.9rem;font-weight:600;transition:all .15s}
.re-switch button.active{background:var(--accent);color:#000;border-color:var(--accent)}
.re-results{margin-top:1.2rem;display:grid;gap:12px}
.re-big{background:linear-gradient(135deg,rgba(78,205,196,.12),rgba(255,107,107,.12));border:1px solid var(--border);border-radius:16px;padding:20px;text-align:center}
.re-big .amt{font-size:2.2rem;font-weight:900;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1.1}
.re-big .cap{font-size:.85rem;color:var(--text2);margin-top:4px}
.re-split{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:480px){.re-split{grid-template-columns:1fr}}
.re-card{background:var(--glass);border:1px solid var(--border);border-radius:14px;padding:14px}
.re-card .lbl{font-size:.75rem;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;font-weight:600}
.re-card .val{font-size:1.4rem;font-weight:800;color:var(--accent)}
.re-list{background:var(--glass2);border:1px solid var(--border);border-radius:14px;padding:16px}
.re-list .item{display:flex;justify-content:space-between;padding:.45rem 0;border-bottom:1px solid var(--border);font-size:.92rem}
.re-list .item:last-child{border-bottom:none;font-weight:800;font-size:1.05rem;color:var(--accent)}
.re-list .item .lab{color:var(--text2)}
.re-help{font-size:.8rem;color:var(--text2);margin-top:10px;line-height:1.5}
</style>
<script type="application/ld+json">{"@context":"https://schema.org","@type":"WebApplication","name":"Real Estate Commission Calculator","description":"Calculate listing and buyer agent commission, total real estate fees, transfer tax and seller net proceeds for any home sale. Free, browser-only.","url":"https://tools.gamezipper.com/calc/real-estate-commission.html","applicationCategory":"Utility","operatingSystem":"Web Browser","offers":{"@type":"Offer","price":"0"}}</script>
<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is the average real estate commission rate?", "acceptedAnswer": {"@type": "Answer", "text": "The US average is about 5–6% of the sale price, traditionally split 50/50 between the seller's listing agent and the buyer's agent. After the 2024 NAR settlement, sellers can now negotiate and offer any amount (or none) to the buyer agent."}}, {"@type": "Question", "name": "Who pays the real estate commission?", "acceptedAnswer": {"@type": "Answer", "text": "In most US transactions the seller pays both the listing agent and the buyer agent commission out of the sale proceeds at closing. Starting August 2024, the buyer's agent commission must be negotiated in writing up front, but the seller still often pays."}}, {"@type": "Question", "name": "Are real estate commissions negotiable?", "acceptedAnswer": {"@type": "Answer", "text": "Yes — commissions were always negotiable, and since the 2024 NAR settlement they are no longer advertised in MLS listings. Sellers can negotiate a lower rate, a flat fee, or pay the buyer's agent directly."}}, {"@type": "Question", "name": "Does this calculator include transfer tax?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. Pick your US state from the dropdown and we apply its average transfer tax rate. Some counties and cities add extra taxes, so always confirm with your title company for an exact closing statement."}}]}</script>

<link rel="alternate" hreflang="x-default" href="https://tools.gamezipper.com/calc/real-estate-commission.html">

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="re-form">
      <div>
        <label id="lbl-price"></label>
        <input type="number" id="price" value="450000" min="0" step="1000">
      </div>
      <div class="re-row">
        <div>
          <label id="lbl-total-rate"></label>
          <input type="number" id="totalRate" value="6" min="0" step="0.1">
        </div>
        <div>
          <label id="lbl-state"></label>
          <select id="state"></select>
        </div>
      </div>
      <div>
        <label id="lbl-split"></label>
        <div class="re-switch">
          <button data-split="50" class="active" id="btn-50">50 / 50</button>
          <button data-split="40" id="btn-40">60 / 40</button>
          <button data-split="0" id="btn-0">Seller only</button>
        </div>
      </div>
      <div class="re-row">
        <div>
          <label id="lbl-mortgage"></label>
          <input type="number" id="mortgage" value="250000" min="0" step="1000">
        </div>
        <div>
          <label id="lbl-extras"></label>
          <input type="number" id="extras" value="0" min="0" step="100">
        </div>
      </div>
    </div>
    <div class="re-results" id="results"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Real Estate Commission Calculator',
    toolDesc: 'Calculate listing and buyer agent commission, total real estate fees, transfer tax and your seller net proceeds for any home sale.',
    lblPrice: 'Home sale price ($)',
    lblTotalRate: 'Total commission rate (%)',
    lblState: 'US state (for transfer tax)',
    lblSplit: 'How the total commission is split',
    lblMortgage: 'Remaining mortgage payoff ($)',
    lblExtras: 'Other closing costs ($)',
    step1: 'Enter your home sale price and the total commission rate (default 6%)',
    step2: 'Pick your US state to estimate transfer tax',
    step3: 'Choose how the commission is split between listing and buyer agents',
    step4: 'See total fees, per-agent amounts, and the net cash you take home at closing',
  },
  zh: {
    toolTitle: '房产中介佣金计算器',
    toolDesc: '计算卖房时的挂牌中介和买方中介佣金、总费用、过户税以及你最终能拿到手的净收益。',
    lblPrice: '房屋售价 ($)',
    lblTotalRate: '总佣金比例 (%)',
    lblState: '美国州（用于估算过户税）',
    lblSplit: '总佣金的分配方式',
    lblMortgage: '剩余贷款余额 ($)',
    lblExtras: '其他过户费用 ($)',
    step1: '输入房屋售价和总佣金比例（默认 6%）',
    step2: '选择所在州以估算过户税',
    step3: '选择佣金在挂牌和买方中介之间的分配方式',
    step4: '查看总费用、每位中介的金额以及你最终能拿到手的现金',
  }
});

const { t } = GZ;
const lang = GZI18n.getLang();

// Average state transfer tax rate (% of sale price). Approximations for tool purposes.
const STATES = [
  ['AL',0.15],['AK',0.00],['AZ',0.00],['AR',0.33],['CA',0.11],['CO',0.02],['CT',1.10],['DE',1.50],
  ['FL',0.70],['GA',0.10],['HI',0.10],['ID',0.00],['IL',0.10],['IN',0.10],['IA',0.16],['KS',0.26],
  ['KY',0.10],['LA',0.35],['ME',0.44],['MD',1.00],['MA',0.45],['MI',0.45],['MN',0.33],['MS',0.10],
  ['MO',0.50],['MT',0.13],['NE',0.21],['NV',0.50],['NH',1.50],['NJ',1.00],['NM',0.06],['NY',0.40],
  ['NC',0.20],['ND',0.11],['OH',0.10],['OK',0.13],['OR',0.00],['PA',1.00],['RI',1.80],['SC',0.18],
  ['SD',0.13],['TN',0.37],['TX',0.00],['UT',0.50],['VT',0.45],['VA',0.15],['WA',1.28],['WV',0.40],
  ['WI',0.30],['WY',0.00],['DC',1.10]
];

function fmt(n) {
  return '$' + Math.round(n).toLocaleString();
}

function fillStates() {
  document.getElementById('state').innerHTML = STATES.map(([s,r]) => `<option value="${s}|${r}">${s}${r>0?' · '+r+'%':''}</option>`).join('');
}

function render() {
  const price = parseFloat(document.getElementById('price').value) || 0;
  const rate = parseFloat(document.getElementById('totalRate').value) || 0;
  const [state, txRate] = document.getElementById('state').value.split('|');
  const splitPct = +document.querySelector('.re-switch button.active').dataset.split; // % to buyer agent
  const mortgage = parseFloat(document.getElementById('mortgage').value) || 0;
  const extras = parseFloat(document.getElementById('extras').value) || 0;

  const totalComm = price * rate / 100;
  const listingAgent = totalComm * (100 - splitPct) / 100;
  const buyerAgent = totalComm * splitPct / 100;
  const transferTax = price * txRate / 100;
  const totalFees = totalComm + transferTax + extras;
  const net = price - totalFees - mortgage;

  const html = `
  <div class="re-big">
    <div class="amt">${fmt(net)}</div>
    <div class="cap">${lang==='zh'?'卖家到手净收益 (估)':'Seller estimated net proceeds'}</div>
  </div>
  <div class="re-split">
    <div class="re-card"><div class="lbl">${lang==='zh'?'挂牌中介佣金':'Listing agent'}</div><div class="val">${fmt(listingAgent)}</div></div>
    <div class="re-card"><div class="lbl">${lang==='zh'?'买方中介佣金':'Buyer agent'}</div><div class="val">${fmt(buyerAgent)}</div></div>
  </div>
  <div class="re-list">
    <div class="item"><span class="lab">${lang==='zh'?'房屋售价':'Sale price'}</span><span>${fmt(price)}</span></div>
    <div class="item"><span class="lab">${lang==='zh'?`总佣金 (${rate}%)`:`Total commission (${rate}%)`}</span><span>– ${fmt(totalComm)}</span></div>
    <div class="item"><span class="lab">${lang==='zh'?`过户税 — ${state} (${txRate}%)`:`Transfer tax — ${state} (${txRate}%)`}</span><span>– ${fmt(transferTax)}</span></div>
    <div class="item"><span class="lab">${lang==='zh'?'其他过户费用':'Other closing costs'}</span><span>– ${fmt(extras)}</span></div>
    <div class="item"><span class="lab">${lang==='zh'?'剩余贷款余额':'Mortgage payoff'}</span><span>– ${fmt(mortgage)}</span></div>
    <div class="item"><span class="lab">${lang==='zh'?'卖家净收益':'Seller net'}</span><span>${fmt(net)}</span></div>
  </div>
  <div class="re-help">${lang==='zh'
    ? '说明：过户税为州平均费率，部分县市可能额外加征。中介佣金自 2024 NAR 和解后可自由协商，且不再于 MLS 列表中公开显示。请以产权公司出具的过户清单为准。'
    : 'Note: transfer tax uses the state average rate — some counties and cities add extra. After the 2024 NAR settlement, buyer-agent commissions are now negotiated up front and are no longer advertised in MLS. Always confirm with your title company for an exact closing statement.'}</div>`;
  document.getElementById('results').innerHTML = html;
}

function setupLabels() {
  document.getElementById('lbl-price').textContent = t('lblPrice');
  document.getElementById('lbl-total-rate').textContent = t('lblTotalRate');
  document.getElementById('lbl-state').textContent = t('lblState');
  document.getElementById('lbl-split').textContent = t('lblSplit');
  document.getElementById('lbl-mortgage').textContent = t('lblMortgage');
  document.getElementById('lbl-extras').textContent = t('lblExtras');
}

fillStates();
setupLabels();

['price','totalRate','state','mortgage','extras'].forEach(id => {
  const el = document.getElementById(id);
  el.addEventListener('input', render);
  el.addEventListener('change', render);
});

document.querySelectorAll('.re-switch button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.re-switch button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  });
});

render();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🏦', href:'/calc/mortgage-calculator.html', name:'Mortgage'},
    {icon:'🏛️', href:'/calc/stamp-duty-calculator.html', name:'Stamp Duty'},
    {icon:'💵', href:'/calc/early-mortgage-payoff.html', name:'Early Payoff'},
    {icon:'🏠', href:'/calc/rent-vs-buy.html', name:'Rent vs Buy'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
