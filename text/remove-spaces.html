<div class="gz-container">

    <div class="gz-split">

      <div><label id="lbl-out"></label><div class="gz-output" id="output"></div></div>

  </div>

</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Remove Spaces from Text',
    toolDesc: 'Remove extra spaces, double spaces, leading/trailing whitespace, tabs and line breaks from text. Clean up messy text instantly — free and private.',
    process: 'Process',
    optTrim: 'Trim each line',
    optCollapse: 'Collapse multiple spaces',
    optAll: 'Remove ALL spaces',
    optTabs: 'Remove tabs',
    optBreaks: 'Remove line breaks',
    optNonBreaking: 'Convert non-breaking spaces',
    step1: 'Paste your text into the input area',
    step2: 'Select which spaces to remove',
    step3: 'Click Process to clean your text',
    step4: 'Copy the cleaned result',
    removed: 'Removed {n} space character(s)',
  },
  zh: {
    toolTitle: '去除空格工具',
    toolDesc: '去除文本中的多余空格、双空格、首尾空白、制表符和换行符。即时清理杂乱文本 — 免费且私密。',
    process: '处理',
    optTrim: '修剪每行首尾',
    optCollapse: '合并多个空格',
    optAll: '删除所有空格',
    optTabs: '删除制表符',
    optBreaks: '删除换行符',
    optNonBreaking: '转换不间断空格',
    step1: '在输入区粘贴文本',
    step2: '选择要删除的空格类型',
    step3: '点击「处理」清理文本',
    step4: '复制清理后的结果',
    removed: '删除了 {n} 个空格字符',
  }
});

const { $, copyText, t } = GZ;

function process() {
  let text = $('#input').value;
  if (!text) return;
  const originalLen = text.length;

  if ($('#opt-nonbreaking').checked) {
    text = text.replace(/\u00A0/g, ' ');
  }
  if ($('#opt-breaks').checked) {
    text = text.replace(/[\r\n]+/g, ' ');
  }
  if ($('#opt-tabs').checked) {
    text = text.replace(/\t/g, ' ');
  }
  if ($('#opt-all').checked) {
    text = text.replace(/ /g, '');
  } else {
    if ($('#opt-collapse').checked) {
      text = text.replace(/  +/g, ' ');
    }
    if ($('#opt-trim').checked) {
      text = text.split('\n').map(l => l.trim()).join('\n');
      text = text.trim();
    }
  }
  // Collapse any leftover double spaces from replaced chars
  if ($('#opt-collapse').checked && !$('#opt-all').checked) {
    text = text.replace(/  +/g, ' ');
  }

  $('#output').textContent = text;
  const removed = originalLen - text.length;
  $('#status').innerHTML = `<span style="color:var(--gz-success)">${t('removed').replace('{n}', removed)}</span>`;
}

function loadExample() {
  $('#input').value = '  Hello    World   \n  This   has    extra    spaces  \n\t\tTabbed\t\ttext\t';
  process();
}

function doClear() { $('#input').value = ''; $('#output').textContent = ''; $('#status').innerHTML = ''; }

$('#input').addEventListener('input', process);

const optsHtml = `
  <div class="opt-row">
    <label><input type="checkbox" id="opt-trim" checked onchange="process()"> ${t('optTrim')}</label>
    <label><input type="checkbox" id="opt-collapse" checked onchange="process()"> ${t('optCollapse')}</label>
    <label><input type="checkbox" id="opt-all" onchange="process()"> ${t('optAll')}</label>
    <label><input type="checkbox" id="opt-tabs" onchange="process()"> ${t('optTabs')}</label>
    <label><input type="checkbox" id="opt-breaks" onchange="process()"> ${t('optBreaks')}</label>
    <label><input type="checkbox" id="opt-nonbreaking" onchange="process()"> ${t('optNonBreaking')}</label>
  </div>`;

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="process()">${t('process')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

// Insert options after toolbar
const optDiv = document.createElement('div');
optDiv.innerHTML = optsHtml;
$('#toolbar').after(optDiv);

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'⬜', href:'/text/remove-empty-lines.html', name:'Remove Empty Lines'},
    {icon:'🧹', href:'/text/whitespace-remover.html', name:'Whitespace Remover'},
    {icon:'📏', href:'/text/whitespace-normalizer.html', name:'Whitespace Normalizer'},
    {icon:'🔧', href:'/text/remove-punctuation.html', name:'Remove Punctuation'},
  ]
});
</script>
