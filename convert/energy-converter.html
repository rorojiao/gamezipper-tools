<div class="gz-container">

<script>
GZI18n.register({
  en: {
    toolTitle: 'Energy Converter',
    toolDesc: 'Convert energy units instantly — joules, kilojoules, calories, kilocalories, watt-hours, kWh, BTU, electronvolts and foot-pounds.',
    step1: 'Enter the energy value you want to convert',
    step2: 'Select the source unit from the dropdown',
    step3: 'All other units update live in the grid below',
    step4: 'Click any value card to copy it to clipboard',
  },
  zh: {
    toolTitle: '能量单位换算器',
    toolDesc: '即时换算能量单位 — 焦耳、千焦、卡路里、千卡、瓦时、千瓦时(kWh)、英热单位(BTU)、电子伏特和英尺·磅。',
    step1: '输入要换算的能量值',
    step2: '从下拉菜单选择原始单位',
    step3: '下方网格实时显示所有其他单位的结果',
    step4: '点击任意数值卡片即可复制到剪贴板',
  }
});
const { $, copyText, t } = GZ;
// All factors relative to 1 joule
const UNITS = [
  {id:'J',  name:'Joule (J)',          zh:'焦耳 (J)',         f:1},
  {id:'kJ', name:'Kilojoule (kJ)',     zh:'千焦 (kJ)',        f:1e3},
  {id:'cal',name:'Calorie (cal)',      zh:'卡路里 (cal)',     f:4.184},
  {id:'kcal',name:'Kilocalorie (kcal)',zh:'千卡 (kcal)',      f:4184},
  {id:'Wh', name:'Watt-hour (Wh)',     zh:'瓦时 (Wh)',        f:3600},
  {id:'kWh',name:'Kilowatt-hour (kWh)',zh:'千瓦时 (kWh)',     f:3.6e6},
  {id:'BTU',name:'BTU (IT)',           zh:'英热单位 (BTU)',    f:1055.05585},
  {id:'eV', name:'Electronvolt (eV)',  zh:'电子伏特 (eV)',     f:1.602176634e-19},
  {id:'ftlb',name:'Foot-pound (ft·lb)',zh:'英尺·磅 (ft·lb)',  f:1.3558179483314},
  {id:'erg',name:'Erg',                zh:'尔格 (erg)',        f:1e-7},
  {id:'therm',name:'Therm (US)',       zh:'色姆 (Therm)',      f:1.054804e8},
];
function fmt(v){
  if(v===0) return '0';
  const a=Math.abs(v);
  if(a!==0&&(a<1e-6||a>=1e9)) return v.toExponential(6);
  if(a>=1) return +(v.toPrecision(8)).toLocaleString('en-US',{maximumFractionDigits:6});
  return v.toPrecision(6);
}
function convert(){
  const val=parseFloat($('#inp-val').value)||0;
  const unit=$('#inp-unit').value;
  const factor=UNITS.find(u=>u.id===unit).f;
  const joules=val*factor;
  const lang=GZI18n.getLang();
  $('#grid').innerHTML=UNITS.map(u=>{
    const result=joules/u.f;
    const label=lang==='zh'?u.zh:u.name;
    return `<div class="conv-card" onclick="copyText('${fmt(result)}')"><label>${label}</label><div class="val">${fmt(result)}</div></div>`;
  }).join('');
}
$('#inp-val').addEventListener('input',convert);
$('#inp-unit').addEventListener('change',convert);
$('#inp-unit').innerHTML=UNITS.map(u=>`<option value="${u.id}">${u.name}</option>`).join('');
$('#inp-unit').value='J';
$('#toolbar').innerHTML=`<button class="gz-btn" onclick="copyText($('#grid .conv-card:first-child .val').textContent)">${t('copy')}</button>`;
convert();
GZ.renderToolPage({
  category:'convert',
  titleKey:'toolTitle',
  descKey:'toolDesc',
  howToSteps:['step1','step2','step3','step4'],
  related:[
    {icon:'⚡',href:'/convert/power-converter.html',name:'Power Converter'},
    {icon:'🌡️',href:'/convert/temperature.html',name:'Temperature Converter'},
    {icon:'📐',href:'/convert/area-converter.html',name:'Area Converter'},
    {icon:'💪',href:'/convert/force-converter.html',name:'Force Converter'},
  ]
});
</script>
