<script type="application/ld+json">{"@context":"https://schema.org","@type":"WebApplication","name":"Heat Index Calculator","description":"Free heat index calculator using the NWS Rothfusz formula. Enter temperature and humidity to get the feels-like temperature, risk level and safety advice. °F or °C.","url":"https://tools.gamezipper.com/calc/heat-index-calculator.html","applicationCategory":"Utility","operatingSystem":"Web Browser","offers":{"@type":"Offer","price":"0"}}</script>
<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is the heat index?", "acceptedAnswer": {"@type": "Answer", "text": "The heat index is the temperature the body feels when relative humidity is combined with the air temperature. When humidity is high, sweat evaporates more slowly, so the body cannot cool itself and the air feels hotter than the thermometer reads."}}, {"@type": "Question", "name": "What formula does this calculator use?", "acceptedAnswer": {"@type": "Answer", "text": "This tool uses the NWS Rothfusz regression: HI = -42.379 + 2.04901523·T + 10.14333127·RH − 0.22475541·T·RH − 0.00683783·T² − 0.05481717·RH² + 0.00122874·T²·RH + 0.00085282·T·RH² − 0.00000199·T²·RH², where T is in °F and RH is relative humidity in percent."}}, {"@type": "Question", "name": "When is heat index dangerous?", "acceptedAnswer": {"@type": "Answer", "text": "A heat index of 90°F (32°C) starts to cause fatigue; 103°F (39°C) brings possible sunstroke; 125°F (52°C) or higher is highly dangerous with heatstroke likely. The calculator shows the NWS risk category for your inputs."}}, {"@type": "Question", "name": "Below what temperature is heat index not defined?", "acceptedAnswer": {"@type": "Answer", "text": "The Rothfusz heat index is only meaningful for air temperatures at or above 80°F (26.7°C) and relative humidity of 40% or higher. Below those thresholds, the calculator reports the actual temperature because the body cools itself efficiently."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="hi-form">
      <label><span id="lbl-unit"></span>
        <select id="unit">
          <option value="F">°F</option>
          <option value="C">°C</option>
        </select>
      </label>
      <div class="hi-row">
        <label><span id="lbl-temp"></span><input type="number" id="temp" placeholder="90" step="any"></label>
        <label><span id="lbl-hum"></span><input type="number" id="hum" placeholder="60" step="any" min="0" max="100"></label>
      </div>
    </div>
    <div class="hi-warn" id="warn"></div>
    <div class="hi-result" id="result" style="display:none">
      <div class="hi-card main">
        <div class="value" id="hi-value">—</div>
        <div class="label" id="lbl-feels">Feels like</div>
      </div>
      <div class="hi-card">
        <div class="value" id="hi-risk">—</div>
        <div class="label" id="lbl-risk">Risk level</div>
      </div>
      <div class="hi-card">
        <div class="value" id="hi-diff">—</div>
        <div class="label" id="lbl-diff">Feels hotter by</div>
      </div>
    </div>
    <div class="hi-info">
      <h3 id="lbl-ref">NWS heat index risk categories</h3>
      <table>
        <thead><tr><th id="th-hi">Heat index</th><th id="th-cat">Category</th><th id="th-advice">Health effect</th></tr></thead>
        <tbody id="ref-body"></tbody>
      </table>
    </div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Heat Index Calculator',
    toolDesc: 'Calculate the feels-like temperature using the NWS Rothfusz heat index formula. Get the risk level and safety advice — works in °F or °C.',
    lblUnit: 'Units',
    lblTemp: 'Air Temperature',
    lblHum: 'Relative Humidity (%)',
    lblFeels: 'Feels like',
    lblRisk: 'Risk level',
    lblDiff: 'Feels hotter by',
    lblRef: 'NWS heat index risk categories',
    thHi: 'Heat index', thCat: 'Category', thAdvice: 'Health effect',
    btnExample: 'Example: 90°F, 60% humidity',
    btnClear: 'Clear',
    step1: 'Choose units (°F or °C) and enter the air temperature',
    step2: 'Enter the relative humidity in percent (0–100)',
    step3: 'Read the feels-like temperature and NWS risk category instantly',
    step4: 'Follow the safety advice when heat index reaches dangerous levels',
  },
  zh: {
    toolTitle: '炎热指数计算器（体感温度）',
    toolDesc: '使用 NWS Rothfusz 公式计算体感温度（炎热指数）。即时查看风险等级和安全建议 — 支持 °F 或 °C。',
    lblUnit: '单位',
    lblTemp: '空气温度',
    lblHum: '相对湿度 (%)',
    lblFeels: '体感温度',
    lblRisk: '风险等级',
    lblDiff: '比实际高',
    lblRef: 'NWS 炎热指数风险等级',
    thHi: '炎热指数', thCat: '等级', thAdvice: '健康影响',
    btnExample: '示例：90°F，60% 湿度',
    btnClear: '清空',
    step1: '选择单位（°F 或 °C），输入空气温度',
    step2: '输入相对湿度（0–100%）',
    step3: '即时读取体感温度和 NWS 风险等级',
    step4: '炎热指数达到危险等级时请遵守安全建议',
  }
});

const { $, t } = GZ;

const CATS = [
  { f: 125, cat: 'Extreme Danger',   catZh: '极危险',   advice: 'Heat stroke likely', adviceZh: '极易中暑' },
  { f: 103, cat: 'Danger',           catZh: '危险',     advice: 'Sunstroke, cramps likely', adviceZh: '易中暑/抽筋' },
  { f: 90,  cat: 'Extreme Caution',  catZh: '高度警惕', advice: 'Heat exhaustion possible', adviceZh: '可能热衰竭' },
  { f: 80,  cat: 'Caution',          catZh: '注意',     advice: 'Fatigue possible', adviceZh: '可能疲劳' },
];

function buildRefTable() {
  const en = GZI18n.getLang() === 'en';
  $('#ref-body').innerHTML = CATS.map(c => {
    const cC = Math.round((c.f-32)*5/9);
    return `<tr><td>${c.f}°F / ${cC}°C+</td><td>${en?c.cat:c.catZh}</td><td>${en?c.advice:c.adviceZh}</td></tr>`;
  }).join('');
}
buildRefTable();

function calc() {
  const unit = $('#unit').value;
  const T = parseFloat($('#temp').value);
  const RH = parseFloat($('#hum').value);
  if (isNaN(T) || isNaN(RH)) { $('#result').style.display='none'; return; }

  const warn = $('#warn');
  let T_F = unit === 'F' ? T : T * 9/5 + 32;
  const en = GZI18n.getLang() === 'en';

  // Only defined for T >= 80F and RH >= 40%; otherwise show actual
  if (T_F < 80 || RH < 40) {
    warn.className = 'hi-warn show';
    warn.style.background = 'rgba(100,180,255,.1)';
    warn.style.border = '1px solid rgba(100,180,255,.3)';
    warn.style.color = 'var(--text2)';
    warn.textContent = en
      ? 'Heat index is only defined for air temperature ≥ 80°F (26.7°C) and humidity ≥ 40%. Showing actual temperature.'
      : '炎热指数仅在空气温度 ≥ 80°F (26.7°C) 且湿度 ≥ 40% 时才有定义。显示实际温度。';
    const showT = unit === 'F' ? T_F.toFixed(1)+'°F' : ((T_F-32)*5/9).toFixed(1)+'°C';
    $('#hi-value').textContent = showT;
    $('#hi-risk').textContent = en ? 'Low' : '低';
    $('#hi-diff').textContent = '0°';
    $('#result').style.display = 'grid';
    return;
  } else {
    warn.className = 'hi-warn';
  }

  // Rothfusz regression (T in F, RH in %)
  let HI = -42.379 + 2.04901523*T_F + 10.14333127*RH
           - 0.22475541*T_F*RH - 0.00683783*T_F*T_F
           - 0.05481717*RH*RH + 0.00122874*T_F*T_F*RH
           + 0.00085282*T_F*RH*RH - 0.00000199*T_F*T_F*RH*RH;

  // Low-humidity adjustment
  if (RH < 13 && T_F >= 80 && T_F <= 112) {
    HI -= ((13-RH)/4) * Math.sqrt((17-Math.abs(T_F-95))/17);
  }
  // High-humidity adjustment
  if (RH > 85 && T_F >= 80 && T_F <= 87) {
    HI += ((RH-85)/10) * ((87-T_F)/5);
  }

  const HI_C = (HI - 32) * 5/9;
  const diff = HI - T_F;

  let cat = en ? 'Low' : '低', catLabel = en ? 'Low' : '低';
  for (const c of CATS) {
    if (HI >= c.f) { catLabel = en ? c.cat : c.catZh; break; }
  }
  if (HI < 90) catLabel = en ? 'Caution' : '注意';

  // colour the warn card based on risk
  const colors = {
    'Extreme Danger':'#b00020','Danger':'#d32f2f','Extreme Caution':'#fa0','Caution':'#fa0','Low':'#3a3'
  };
  $('#hi-value').textContent = unit === 'F' ? HI.toFixed(1)+'°F' : HI_C.toFixed(1)+'°C';
  $('#hi-value').style.color = colors[catLabel] || colors['Caution'];
  $('#hi-risk').textContent = catLabel;
  $('#hi-diff').textContent = (unit === 'F' ? '+' : '+') + (unit === 'F' ? diff.toFixed(1)+'°F' : (diff*5/9).toFixed(1)+'°C');
  $('#result').style.display = 'grid';
}

['unit','temp','hum'].forEach(id => {
  const el = $('#'+id);
  el.addEventListener('input', calc);
  el.addEventListener('change', calc);
});

function loadExample() {
  $('#unit').value = 'F'; $('#temp').value = 90; $('#hum').value = 60;
  calc();
}
function doClear() { $('#temp').value=''; $('#hum').value=''; $('#result').style.display='none'; $('#warn').className='hi-warn'; }

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="loadExample()">${t('btnExample')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('btnClear')}</button>`;

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🧊',href:'/calc/wind-chill.html',name:'Wind Chill'},
    {icon:'💧',href:'/calc/dew-point-calculator.html',name:'Dew Point'},
    {icon:'❄️',href:'/calc/btu-calculator.html',name:'BTU Calculator'},
    {icon:'☀️',href:'/calc/uv-index-calculator.html',name:'UV Index'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
