const { $, copyText, t } = GZ;

const ACTION_VERBS = ['led','managed','built','created','developed','designed','launched','improved','increased','reduced','achieved','delivered','optimized','implemented','drove','generated','streamlined','coordinated','analyzed','established','spearheaded','engineered','automated','negotiated','mentored','directed','executed','produced','transformed','accelerated','scaled','launched','shipped','researched','presented','collaborated','facilitated','maintained','supported','resolved','forecasted','trained','supervised','planned','operated','tested','deployed','migrated','architected'];
const SECTION_KEYWORDS = {
  experience: ['experience','employment','work history','professional experience','work experience','career'],
  education: ['education','academic','university','college','degree','school'],
  skills: ['skills','technical skills','core competencies','technologies','proficiencies'],
  projects: ['projects','portfolio','case studies','selected projects'],
  summary: ['summary','profile','objective','about','summary of qualifications'],
};
const COMMON_STOP = new Set(['the','and','for','with','that','this','from','your','you','are','was','were','have','has','had','will','would','can','all','any','but','not','our','their','his','her','she','they','them','who','what','when','where','which','how','into','over','than','then','also','more','most','some','such','only','very','just','like','get','got','use','used','using','able','about','above','after','again','against','below','between','during','each','here','other','out','own','same','should','these','those','through','under','until','upon','want','well','were','will','year','years','per','via','etc']);

function escapeHtml(s){return s.replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

function findContact(text){
  const email = /\b[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}\b/.test(text);
  const phone = /(\+?\d[\d\s().-]{7,}\d)/.test(text);
  const linkedin = /linkedin\.com\/in\//i.test(text);
  const url = /\bhttps?:\/\/\S+/i.test(text);
  return {email, phone, linkedin, url};
}

function findSections(text){
  const lower = text.toLowerCase();
  const found = {};
  for (const [name, kws] of Object.entries(SECTION_KEYWORDS)) {
    found[name] = kws.some(k => lower.includes(k));
  }
  return found;
}

function countQuantified(text){
  const m = text.match(/(\$?\d[\d,]*(?:\.\d+)?\s*%|\$?\d[\d,]*(?:\.\d+)?\s*(?:x|million|billion|k|m|hours|days|weeks|months|years|users|customers|clients|projects|people|reports|teams)|\$?\d[\d,]+)/gi);
  return m ? m.length : 0;
}

function extractKeywords(text, max){
  const words = text.toLowerCase().match(/[a-z+#.]{3,}/g) || [];
  const freq = {};
  for (const w of words){
    if (COMMON_STOP.has(w) || w.length < 3) continue;
    freq[w] = (freq[w]||0)+1;
  }
  return Object.entries(freq).sort((a,b)=>b[1]-a[1]).slice(0,max).map(e=>e[0]);
}

function detectBadPatterns(text){
  const issues = [];
  if (/https?:\/\/\S+\.(docx?|pdf)$/i.test(text)) issues.push('external-file-link');
  if (text.includes('\t') && (text.match(/\t/g)||[]).length > 20) issues.push('heavy-tab-columns');
  if ((text.match(/[|]/g)||[]).length > 15) issues.push('table-pipe-layout');
  if (/---\s*===|===|____/.test(text)) issues.push('decorative-divider-lines');
  return issues;
}

function analyze(){
  const raw = $('#resume-input').value;
  const text = raw.trim();
  const out = $('#output');
  if (!text){ out.innerHTML = `<p style="color:var(--text2)">${escapeHtml(t('noResume'))}</p>`; $('#score-wrap').style.display='none'; return; }
  const lower = text.toLowerCase();
  const words = (text.match(/\S+/g)||[]).length;
  const lines = text.split(/\r?\n/).filter(l=>l.trim()).length;

  const contact = findContact(text);
  const sections = findSections(text);
  const quant = countQuantified(text);
  const actionCount = ACTION_VERBS.filter(v => new RegExp('\\b'+v).test(lower)).length;
  const kws = extractKeywords(text, 12);
  const bad = detectBadPatterns(text);

  let score = 0; const checks = [];

  // Contact info (15)
  const contactScore = (contact.email?5:0)+(contact.phone?5:0)+(contact.linkedin?3:0)+(contact.url?2:0);
  score += contactScore;
  checks.push({ic:contact.email&&contact.phone?'✅':(contact.email||contact.phone?'⚠️':'❌'), nm:'Contact Information', ds:`Email: ${contact.email?'yes':'no'} · Phone: ${contact.phone?'yes':'no'} · LinkedIn: ${contact.linkedin?'yes':'no'}`, st: contactScore>=8?'pass':(contactScore>=3?'warn':'fail')});

  // Section headings (25)
  const sectionCount = Object.values(sections).filter(Boolean).length;
  score += Math.round((sectionCount/5)*25);
  const missingSec = Object.entries(sections).filter(([,v])=>!v).map(([k])=>k);
  checks.push({ic:sectionCount>=4?'✅':(sectionCount>=2?'⚠️':'❌'), nm:'Standard Section Headings', ds: sectionCount>=4?`Found ${sectionCount} of 5 key sections.`:`Missing: ${missingSec.join(', ')||'none'}`, st: sectionCount>=4?'pass':(sectionCount>=2?'warn':'fail')});

  // Action verbs (15)
  score += Math.min(15, actionCount*2);
  checks.push({ic:actionCount>=6?'✅':(actionCount>=3?'⚠️':'❌'), nm:'Action Verbs', ds:`${actionCount} strong action verbs found (aim for 6+).`, st: actionCount>=6?'pass':(actionCount>=3?'warn':'fail')});

  // Quantified achievements (15)
  score += Math.min(15, quant*2);
  checks.push({ic:quant>=5?'✅':(quant>=2?'⚠️':'❌'), nm:'Quantified Results', ds:`${quant} numbers/metrics found (aim for 5+).`, st: quant>=5?'pass':(quant>=2?'warn':'fail')});

  // Keywords (15)
  score += Math.min(15, kws.length);
  checks.push({ic:kws.length>=8?'✅':(kws.length>=4?'⚠️':'❌'), nm:'Keyword Density', ds:`${kws.length} distinct keywords detected.`, st: kws.length>=8?'pass':(kws.length>=4?'warn':'fail')});

  // Length (10)
  let lenOk = words>=200 && words<=1000;
  if (words<200) score += Math.round((words/200)*10);
  else if (words>1200) score += 4;
  else score += 10;
  checks.push({ic:lenOk?'✅':'⚠️', nm:'Resume Length', ds:`${words} words, ${lines} lines (sweet spot ~300-900 words).`, st: lenOk?'pass':'warn'});

  // ATS parse friendliness (5)
  if (bad.length===0) score += 5;
  checks.push({ic:bad.length===0?'✅':'❌', nm:'Parse-Friendly Formatting', ds: bad.length===0?'No problematic tables/tabs/dividers detected.':`Found: ${bad.join(', ')} — these can break ATS parsing.`, st: bad.length===0?'pass':'fail'});

  score = Math.max(0, Math.min(100, Math.round(score)));

  // Render
  $('#score-wrap').style.display='block';
  $('#score-ring').textContent = score;
  let label = t('scoreLow'), col='#e94560';
  if (score>=80){ label=t('scoreGood'); col='#00d672'; }
  else if (score>=60){ label=t('scoreMid'); col='#e9a428'; }
  const lbl = $('#score-label');
  lbl.textContent = `${score}/100 · ${label}`;
  lbl.style.color = col;

  const stClass = s => s==='pass'?'st-pass':(s==='warn'?'st-warn':'st-fail');
  let html = checks.map(c=>`<div class="check-row"><span class="ic">${c.ic}</span><span class="txt"><span class="nm">${c.nm}</span><br><span class="ds">${escapeHtml(c.ds)}</span></span><span class="st ${stClass(c.st)}">${c.st.toUpperCase()}</span></div>`).join('');
  html += `<div style="margin-top:14px"><strong style="font-size:.9rem">${escapeHtml(t('foundKw'))}:</strong><div id="keyword-box">${kws.length?kws.map(k=>`<span class="kw-chip">${escapeHtml(k)}</span>`).join(''):`<span style="color:var(--text2);font-size:.82rem">${escapeHtml(t('noKw'))}</span>`}</div></div>`;
  out.innerHTML = html;
}

- Improved retention by 22% through research-driven iteration

Figma, prototyping, user research, design systems, accessibility, HTML/CSS

B.A. Design, University of California — 2018`;
  analyze();
}

function doClear(){ $('#resume-input').value=''; $('#output').innerHTML=''; $('#score-wrap').style.display='none'; }

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="analyze()">${t('check')}</button>

</script>
