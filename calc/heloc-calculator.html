<script type="application/ld+json">{"@context":"https://schema.org","@type":"WebApplication","name":"HELOC Calculator","description":"Free HELOC calculator. Estimate your home equity line of credit limit and monthly payment during the interest-only draw period and the amortized repayment period. Instant, private, no signup.","url":"https://tools.gamezipper.com/calc/heloc-calculator.html","applicationCategory":"Utility","operatingSystem":"Web Browser","offers":{"@type":"Offer","price":"0"}}</script>
<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"How much can I borrow with a HELOC?","acceptedAnswer":{"@type":"Answer","text":"Most lenders let you borrow up to 80-85% of your home's appraised value minus your outstanding mortgage balance. For example, on a $500,000 home with a $300,000 mortgage at 80% LTV, your credit limit would be $500,000 × 0.80 − $300,000 = $100,000."}},{"@type":"Question","name":"What is the difference between the HELOC draw period and repayment period?","acceptedAnswer":{"@type":"Answer","text":"The draw period (typically 10 years) is when you can borrow and repay flexibly. Most HELOCs only require interest-only payments during this time. The repayment period (typically 10-20 years) follows, during which you can no longer borrow and must pay back principal plus interest in fixed monthly installments."}},{"@type":"Question","name":"How is the HELOC monthly payment calculated?","acceptedAnswer":{"@type":"Answer","text":"During the draw period the payment is usually interest-only: balance × rate / 12. During the repayment period the balance is amortized like a mortgage: payment = P × r × (1+r)^n / ((1+r)^n − 1), where r is the monthly rate and n is the number of months."}},{"@type":"Question","name":"Are HELOC rates fixed or variable?","acceptedAnswer":{"@type":"Answer","text":"Most HELOCs have variable rates tied to the prime rate, so your payment can rise or fall over time. Some lenders offer the option to fix the rate on part of your balance. This calculator uses the rate you enter as the average across both periods."}}]}</script>

<div class="gz-container">

<script>
GZI18n.register({
  en: {
    toolTitle: 'HELOC Calculator',
    toolDesc: 'Home Equity Line of Credit calculator. Estimate your credit limit, interest-only draw-period payment and amortized repayment-period payment — instant and private.',
    homeValue: 'Home value (appraised)',
    mortgageBalance: 'Current mortgage balance',
    maxLTV: 'Max loan-to-value (LTV) ratio (%)',
    drawBalance: 'Amount you plan to draw',
    drawRate: 'Interest rate during draw period (%)',
    drawYears: 'Draw period (years)',
    repayYears: 'Repayment period (years)',
    repayRate: 'Interest rate during repayment period (%)',
    step1: 'Enter your home value and current mortgage balance',
    step2: 'Set the max LTV ratio (typically 80-85%)',
    step3: 'Enter the amount you plan to draw and the rates',
    step4: 'Read your credit limit and payments for each phase',
    creditLimit: 'Estimated credit limit',
    equity: 'Available equity',
    drawPayment: 'Interest-only payment (draw)',
    repayPayment: 'Amortized payment (repayment)',
    totalInterest: 'Interest paid during draw',
    repayInterest: 'Total interest during repayment',
    repayTotal: 'Total paid during repayment',
    availableToDraw: 'Remaining credit after draw',
    cltv: 'Combined LTV after draw',
  },
  zh: {
    toolTitle: 'HELOC 房屋净值信贷额度计算器',
    toolDesc: '房屋净值信用额度（HELOC）计算器。估算可用额度、提款期只付利息月供和还款期摊销月供 — 即时私密。',
    homeValue: '房屋估值',
    mortgageBalance: '现有房贷余额',
    maxLTV: '最高贷款价值比 (LTV) (%)',
    drawBalance: '计划提款金额',
    drawRate: '提款期利率 (%)',
    drawYears: '提款期 (年)',
    repayYears: '还款期 (年)',
    repayRate: '还款期利率 (%)',
    step1: '输入房屋估值和现有房贷余额',
    step2: '设置最高 LTV 比例（通常 80-85%）',
    step3: '输入计划提款金额和利率',
    step4: '查看可用额度和各阶段月供',
    creditLimit: '估算可用额度',
    equity: '可用净值',
    drawPayment: '提款期月供（仅利息）',
    repayPayment: '还款期月供（摊销）',
    totalInterest: '提款期总利息',
    repayInterest: '还款期总利息',
    repayTotal: '还款期总支付',
    availableToDraw: '提款后剩余额度',
    cltv: '提款后综合 LTV',
  }
});

const { $, t } = GZ;
const money = n => '$' + Math.round(n).toLocaleString();

$('#inputs').innerHTML = `
  <div class="field"><label>${t('homeValue')}</label><input type="number" id="value" value="600000" min="0" step="5000"></div>
  <div class="field"><label>${t('mortgageBalance')}</label><input type="number" id="balance" value="280000" min="0" step="5000"></div>
  <div class="field"><label>${t('maxLTV')}</label><input type="number" id="ltv" value="80" min="50" max="95" step="1"></div>
  <div class="field"><label>${t('drawBalance')}</label><input type="number" id="draw" value="100000" min="0" step="5000"></div>
  <div class="field"><label>${t('drawRate')}</label><input type="number" id="drate" value="8.5" min="0" step="0.05"></div>
  <div class="field"><label>${t('drawYears')}</label><input type="number" id="dyrs" value="10" min="1" max="15" step="1"></div>
  <div class="field"><label>${t('repayRate')}</label><input type="number" id="rrate" value="8.5" min="0" step="0.05"></div>
  <div class="field"><label>${t('repayYears')}</label><input type="number" id="ryrs" value="20" min="5" max="30" step="1"></div>
`;
document.querySelectorAll('#inputs input').forEach(i => i.addEventListener('input', recalc));

function pmt(P, annualRate, months) {
  if (annualRate === 0) return P / months;
  const r = annualRate / 12;
  return P * r * Math.pow(1 + r, months) / (Math.pow(1 + r, months) - 1);
}

function recalc() {
  const value = +$('#value').value || 0;
  const balance = +$('#balance').value || 0;
  const ltv = (+$('#ltv').value || 80) / 100;
  let draw = +$('#draw').value || 0;
  const dr = (+$('#drate').value || 0) / 100;
  const dy = +$('#dyrs').value || 10;
  const rr = (+$('#rrate').value || 0) / 100;
  const ry = +$('#ryrs').value || 20;

  const creditLimit = Math.max(0, value * ltv - balance);
  const equity = Math.max(0, value - balance);
  if (draw > creditLimit) draw = creditLimit;
  const drawMo = draw * dr / 12;
  const drawInterest = drawMo * (dy * 12);
  const repayMo = pmt(draw, rr, ry * 12);
  const repayTotal = repayMo * ry * 12;
  const repayInterest = repayTotal - draw;
  const remaining = Math.max(0, creditLimit - draw);
  const cltv = value > 0 ? (balance + draw) / value * 100 : 0;

  $('#results').innerHTML = `
    <div class="result-big">${money(creditLimit)}</div>
    <div style="margin:6px 0 12px;font-size:.85em;opacity:.8">${t('creditLimit')}</div>
    <div class="result-row"><span>${t('equity')}</span><span class="v">${money(equity)}</span></div>
    <div class="result-row"><span>${t('availableToDraw')}</span><span class="v">${money(remaining)}</span></div>
    <div class="result-row"><span>${t('cltv')}</span><span class="v">${cltv.toFixed(1)}%</span></div>
    <div class="section-h">${t('drawPayment').replace(/ \(.*\)/, '')} — ${dy} ${dy === 1 ? 'yr' : 'yrs'}</div>
    <div class="result-row"><span>${t('drawPayment')}</span><span class="v">${money(drawMo)}</span></div>
    <div class="result-row"><span>${t('totalInterest')}</span><span class="v">${money(drawInterest)}</span></div>
    <div class="section-h">${t('repayPayment').replace(/ \(.*\)/, '')} — ${ry} ${ry === 1 ? 'yr' : 'yrs'}</div>
    <div class="result-row"><span>${t('repayPayment')}</span><span class="v">${money(repayMo)}</span></div>
    <div class="result-row"><span>${t('repayInterest')}</span><span class="v">${money(repayInterest)}</span></div>
    <div class="result-row"><span>${t('repayTotal')}</span><span class="v">${money(repayTotal)}</span></div>
  `;
}
recalc();

$('#toolbar').innerHTML = `<button class="gz-btn gz-btn-secondary" onclick="document.querySelectorAll('#inputs input').forEach(i=>i.value='');recalc()">Clear</button>`;

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🏠', href:'/calc/home-affordability-calculator.html', name:'Home Affordability'},
    {icon:'🔑', href:'/calc/fha-loan-calculator.html', name:'FHA Loan'},
    {icon:'🏦', href:'/calc/mortgage-calculator.html', name:'Mortgage'},
    {icon:'💸', href:'/calc/early-mortgage-payoff.html', name:'Early Payoff'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
