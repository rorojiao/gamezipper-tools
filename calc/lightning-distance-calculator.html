<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "How do you calculate lightning distance?", "acceptedAnswer": {"@type": "Answer", "text": "Count the seconds between seeing the lightning flash and hearing the thunder. Divide by 5 to get the distance in miles, or divide by 3 to get the distance in kilometers. This works because light travels almost instantly while sound takes about 3 seconds per kilometer."}}, {"@type": "Question", "name": "What is the 30/30 rule for lightning safety?", "acceptedAnswer": {"@type": "Answer", "text": "If the time between lightning and thunder is 30 seconds or less, the storm is close enough to be dangerous — seek shelter immediately. Wait at least 30 minutes after the last thunder before resuming outdoor activities."}}, {"@type": "Question", "name": "Why does temperature affect the calculation?", "acceptedAnswer": {"@type": "Answer", "text": "The speed of sound in air varies with temperature — approximately 331 m/s at 0°C increasing by about 0.6 m/s per degree. This calculator adjusts the speed of sound based on the air temperature you enter for greater accuracy."}}, {"@type": "Question", "name": "Is it safe to be outside during a lightning storm?", "acceptedAnswer": {"@type": "Answer", "text": "No. If you can hear thunder, you are within striking distance of lightning. Move indoors or into a hard-topped vehicle immediately and avoid open areas, tall objects, and water."}}]}</script>

<body>
<div class="gz-container">

        <label id="lbl-unit"></label>
        <select id="unit">
          <option value="metric" id="opt-metric">Metric (km, °C)</option>

</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Lightning Distance Calculator',
    toolDesc: 'Calculate how far away a lightning strike is by counting the seconds between the flash and thunder. Adjusts for air temperature using the real speed of sound.',
    seconds: 'Seconds between flash and thunder',
    temp: 'Air Temperature',
    unit: 'Units',
    startTimer: 'Start Timer (on flash)',
    stopTimer: 'Stop Timer (on thunder)',
    reset: 'Reset',
    distanceIs: 'The lightning is approximately',
    away: 'away',
    danger: '⚠️ DANGER: Seek shelter immediately!',
    safe: 'Storm appears distant, but stay alert',
    speedOfSound: 'Speed of sound at this temperature',
    step1: 'When you see lightning, click Start Timer immediately',
    step2: 'When you hear thunder, click Stop Timer',
    step3: 'Or manually enter the seconds you counted',
    step4: 'Read the distance and safety warning',
  },
  zh: {
    toolTitle: '闪电距离计算器',
    toolDesc: '通过计算看到闪电和听到雷声之间的秒数来计算闪电有多远。根据气温使用真实的声速进行计算。',
    seconds: '闪电与雷声之间的秒数',
    temp: '气温',
    unit: '单位',
    startTimer: '开始计时（看到闪光时）',
    stopTimer: '停止计时（听到雷声时）',
    reset: '重置',
    distanceIs: '闪电大约在',
    away: '之外',
    danger: '⚠️ 危险：请立即寻找避雷处！',
    safe: '暴风雨似乎较远，但仍需保持警惕',
    speedOfSound: '此温度下的声速',
    step1: '看到闪电时，立即点击「开始计时」',
    step2: '听到雷声时，点击「停止计时」',
    step3: '或手动输入你计数的秒数',
    step4: '查看距离和安全警告',
  }
});

const { $, t } = GZ;
let timerInterval = null;
let timerStart = 0;

function getSpeedOfSound() {
  const unit = $('#unit').value;
  const tempC = unit === 'imperial' ? (parseFloat($('#temp').value) - 32) * 5/9 : parseFloat($('#temp').value);
  return 331.3 + 0.606 * tempC; // m/s
}

function calc() {
  const seconds = parseFloat($('#seconds').value);
  if (isNaN(seconds) || seconds < 0) { $('#result').innerHTML = ''; return; }
  const unit = $('#unit').value;
  const speed = getSpeedOfSound();
  let distance, speedDisplay;
  if (unit === 'imperial') {
    const distM = speed * seconds;
    distance = (distM / 1609.344).toFixed(2) + ' miles';
    speedDisplay = (speed * 2.23694).toFixed(1) + ' mph';
  } else {
    const distM = speed * seconds;
    distance = (distM / 1000).toFixed(2) + ' km';
    speedDisplay = speed.toFixed(1) + ' m/s';
  }
  const isDanger = unit === 'imperial' ? seconds <= 5 : seconds <= 3;
  $('#result').innerHTML = `
    <span class="big">${distance}</span>
    <span class="sub">${t('distanceIs')} <strong>${distance}</strong> ${t('away')}</span>
    <div style="margin-top:16px;padding:10px;border-radius:8px;background:${isDanger ? 'rgba(255,80,80,0.15)' : 'rgba(78,205,196,0.1)'};color:${isDanger ? '#ff6b6b' : 'var(--accent)'}">
      ${isDanger ? t('danger') : t('safe')}
    </div>
    <div style="margin-top:10px;font-size:0.8rem;color:var(--text3)">${t('speedOfSound')}: ${speedDisplay}</div>
  `;
}

$('#btn-flash').addEventListener('click', () => {
  if (timerInterval) {
    clearInterval(timerInterval);
    timerInterval = null;
    $('#btn-flash-text').textContent = t('startTimer');
    calc();
  } else {
    timerStart = Date.now();
    $('#timer').style.display = 'block';
    $('#timer').textContent = '0.0 s';
    $('#btn-flash-text').textContent = t('stopTimer');
    timerInterval = setInterval(() => {
      const elapsed = (Date.now() - timerStart) / 1000;
      $('#timer').textContent = elapsed.toFixed(1) + ' s';
      $('#seconds').value = elapsed.toFixed(1);
    }, 100);
  }
});

$('#btn-reset').addEventListener('click', () => {
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
  $('#btn-flash-text').textContent = t('startTimer');
  $('#timer').style.display = 'none';
  $('#seconds').value = 0;
  calc();
});

['seconds','temp','unit'].forEach(id => $('#' + id).addEventListener('input', calc));

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🌡️', href:'/calc/heat-index-calculator.html', name:'Heat Index'},
    {icon:'❄️', href:'/calc/wind-chill.html', name:'Wind Chill'},
    {icon:'💧', href:'/calc/humidity-calculator.html', name:'Humidity'},
    {icon:'💨', href:'/calc/wind-chill.html', name:'Wind Chill'},
  ]
});
calc();
</script>
<script src="/tools-result-rec.js?v=20260707v520" defer></script>
</body>
