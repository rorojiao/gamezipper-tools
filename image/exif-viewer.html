    model: '型号',
    lensModel: '镜头型号',
    dateTime: '日期 / 时间',
    exposure: '曝光时间',

    iso: 'ISO',
    focalLength: '焦距',

    noExif: '此图片未包含 EXIF 数据。图片可能已被移除元数据，或使用了不支持 EXIF 的格式保存。',
    step1: '拖拽或点击上传图片',
    step2: '工具自动提取所有元数据和 EXIF 信息',
    step3: '浏览相机信息、GPS 坐标和技术参数',

const { $, t } = GZ;

const dz = $('#dropZone');
const fi = $('#fileInput');
dz.addEventListener('click', () => fi.click());
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('dragover'); });
dz.addEventListener('dragleave', () => dz.classList.remove('dragover'));
dz.addEventListener('drop', e => { e.preventDefault(); dz.classList.remove('dragover'); if(e.dataTransfer.files[0]) processFile(e.dataTransfer.files[0]); });
fi.addEventListener('change', () => { if(fi.files[0]) processFile(fi.files[0]); });
$('#dropText').textContent = t('dropHere');

function formatSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / 1048576).toFixed(2) + ' MB';
}

function toDeg(ref, d, m, s) {
  let dec = d + m / 60 + s / 3600;
  if (ref === 'S' || ref === 'W') dec = -dec;
  return dec.toFixed(6) + '°';
}

function getExifValue(tags, ...keys) {
  for (const k of keys) { if (tags[k] !== undefined) return tags[k]; }
  return null;
}

function processFile(file) {
  const result = $('#result');
  result.innerHTML = '';

  // Show preview
  const url = URL.createObjectURL(file);
  const img = document.createElement('img');
  img.src = url;
  img.className = 'preview-img';
  img.style.display = 'block';
  img.style.margin = '0 auto';
  result.appendChild(img);

  const imgEl = new Image();
  imgEl.onload = function() {
    // File properties section
    let html = `<div class="exif-section"><h3>📁 ${t('fileProperties')}</h3><table class="exif-table">`;
    html += `<tr><th>${t('fileName')}</th><td>${file.name}</td></tr>`;
    html += `<tr><th>${t('fileSize')}</th><td>${formatSize(file.size)}</td></tr>`;
    html += `<tr><th>${t('fileType')}</th><td>${file.type || 'unknown'}</td></tr>`;
    html += `<tr><th>${t('dimensions')}</th><td>${imgEl.naturalWidth} × ${imgEl.naturalHeight} px</td></tr>`;
    html += `</table></div>`;
    result.innerHTML = html;
    result.prepend(img);
  };
  imgEl.src = url;

  // Load EXIF using exif-js from CDN
  const exifScript = document.createElement('script');
  exifScript.src = 'https://cdn.jsdelivr.net/npm/exif-js@2.3.0/exif.min.js';
  exifScript.onload = function() {
    const imgForExif = document.createElement('img');
    imgForExif.src = url;
    imgForExif.onload = function() {
      try {
        EXIF.getData(imgForExif, function() {
          const allTags = EXIF.getAllTags(this);
          if (!allTags || Object.keys(allTags).length === 0) {
            $('#result').innerHTML += `<div class="no-exif"><p>ℹ️ ${t('noExif')}</p></div>`;
            return;
          }

          // Camera info
          const camFields = [
            ['Make', t('make')],
            ['Model', t('model')],
            ['LensModel', t('lensModel')],
            ['DateTime', t('dateTime')],
            ['DateTimeOriginal', t('dateTime')],
            ['ExposureTime', t('exposure')],
            ['FNumber', t('aperture')],
            ['ISO', t('iso')],
            ['ISOSpeedRatings', t('iso')],
            ['FocalLength', t('focalLength')],
            ['Flash', t('flash')],
            ['WhiteBalance', t('whiteBalance')],
          ];

          let camHtml = '';
          for (const [key, label] of camFields) {
            let val = getExifValue(allTags, key);
            if (val !== null) {
              if (key === 'ExposureTime') val = '1/' + Math.round(1 / val) + 's';
              else if (key === 'FNumber') val = 'f/' + val;
              else if (key === 'FocalLength') val = val + 'mm';
              else if (key === 'Flash') {
                const fv = typeof val === 'object' && val.val !== undefined ? val.val : val;
                val = (fv & 1) ? '⚡ Fired' : '❌ Not fired';
              }
              else if (key === 'WhiteBalance') val = val === 1 ? 'Auto' : 'Manual';
              else if (typeof val === 'object' && val instanceof Date) val = val.toLocaleString();
              camHtml += `<tr><th>${label}</th><td>${val}</td></tr>`;
            }
          }
          if (camHtml) {
            $('#result').innerHTML += `<div class="exif-section"><h3>📷 ${t('cameraInfo')}</h3><table class="exif-table">${camHtml}</table></div>`;
          }

          // GPS
          const gpsLat = getExifValue(allTags, 'GPSLatitude');
          const gpsLatRef = getExifValue(allTags, 'GPSLatitudeRef');
          const gpsLon = getExifValue(allTags, 'GPSLongitude');
          const gpsLonRef = getExifValue(allTags, 'GPSLongitudeRef');
          const gpsAlt = getExifValue(allTags, 'GPSAltitude');
          if (gpsLat && gpsLon) {
            const latStr = toDeg(gpsLatRef || 'N', gpsLat[0], gpsLat[1], gpsLat[2]);
            const lonStr = toDeg(gpsLonRef || 'E', gpsLon[0], gpsLon[1], gpsLon[2]);
            const latDec = parseFloat(latStr);
            const lonDec = parseFloat(lonStr);
            let gpsHtml = `<tr><th>${t('latitude')}</th><td>${latStr}</td></tr>`;
            gpsHtml += `<tr><th>${t('longitude')}</th><td>${lonStr}</td></tr>`;
            if (gpsAlt) gpsHtml += `<tr><th>${t('altitude')}</th><td>${gpsAlt.toFixed(1)} m</td></tr>`;
            gpsHtml += `<tr><th>📍</th><td><a href="https://www.google.com/maps?q=${latDec},${lonDec}" target="_blank" style="color:var(--accent)">${t('viewMap')} ↗</a></td></tr>`;
            $('#result').innerHTML += `<div class="exif-section"><h3>📍 ${t('gpsInfo')}</h3><table class="exif-table">${gpsHtml}</table></div>`;
          }

          // Advanced: show all tags
          const skip = new Set(['MakerNote','UserComment','thumbnail','EXIF','GPS','ImageWidth','ImageHeight','BitsPerSample','Compression','PhotometricInterpretation','Orientation','SamplesPerPixel','RowsPerStrip','StripByteCounts','XResolution','YResolution','ResolutionUnit','ColorSpace','ExifVersion','ComponentsConfiguration','SceneType','ExposureMode','SceneCaptureType','Contrast','Saturation','Sharpness','SubjectArea','SubjectDistanceRange','SensingMethod','FileSource','CustomRendered','GainControl']);
          const shownKeys = new Set();
          let advHtml = '';
          for (const [k, v] of Object.entries(allTags)) {
            if (skip.has(k) || shownKeys.has(k)) continue;
            let display = v;
            if (typeof v === 'object' && !(v instanceof Date) && !Array.isArray(v)) continue;
            if (v instanceof Date) display = v.toLocaleString();
            else if (Array.isArray(v)) display = v.join(', ');
            else if (typeof v === 'number') display = v;
            shownKeys.add(k);
            advHtml += `<tr><th>${k}</th><td>${display}</td></tr>`;
          }
          if (advHtml) {
            $('#result').innerHTML += `<div class="exif-section"><h3>📋 ${t('advancedData')}</h3><table class="exif-table">${advHtml}</table></div>`;
          }
        });
      } catch(e) {
        console.warn('EXIF parsing error:', e);
      }
    };
  };
  document.head.appendChild(exifScript);
}
