const CATS = [

  {key:'genz',label:'Gen Z'},
  {key:'gaming',label:'Gaming'},
  {key:'social',label:'Social Media'},
];

let activeFilter = 'all';

function renderFilters() {
  $('#filters').innerHTML = CATS.map(c =>
    `<button class="filter-btn ${c.key===activeFilter?'active':''}" onclick="setFilter('${c.key}')">${c.label}</button>`
  ).join('');
}

function setFilter(cat) {
  activeFilter = cat;
  renderFilters();
  search();
}

function search() {
  const q = $('#searchInput').value.toLowerCase().trim();
  let filtered = SLANG;
  if (activeFilter !== 'all') filtered = filtered.filter(s => s.cat === activeFilter);
  if (q) filtered = filtered.filter(s => s.term.toLowerCase().includes(q) || s.meaning.toLowerCase().includes(q));

  if (filtered.length === 0) {
    $('#results').innerHTML = `<div class="empty">${t('noResults')}</div>`;
    return;
  }

  $('#results').innerHTML = `<div class="slang-grid">${filtered.map(s =>
    `<div class="slang-card"><div class="term">${s.term}</div><div class="meaning">${s.meaning}</div>${s.example?`<div class="example">"${s.example}"</div>`:''}</div>`
  ).join('')}</div>`;
}

$('#searchInput').addEventListener('input', search);
