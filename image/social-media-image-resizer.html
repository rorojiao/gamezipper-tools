<script>
GZI18n.register({en:{toolTitle:'Social Media Image Resizer',toolDesc:'Resize and crop images to ready-made dimensions for Instagram, YouTube, Facebook, LinkedIn, X, TikTok and Pinterest. Everything stays on your device.',dropTitle:'Drop an image here or click to choose',dropSub:'PNG, JPG, WebP or GIF · processed locally',preset:'Platform & size',mode:'Resize mode',crop:'Fill & crop',fit:'Fit with background',format:'Output format',quality:'Quality',background:'Fit background',details:'Output details',source:'Source',output:'Output',ratio:'Aspect ratio',size:'Estimated file size',download:'Download image',reset:'Choose another',privacy:'🔒 Your image never leaves this browser.',step1:'Choose an image from your device or drag it into the drop area',step2:'Pick a social network preset and choose fill-and-crop or fit mode',step3:'Select PNG, JPG or WebP and adjust quality or background color',step4:'Preview the exact dimensions and download the resized image'},zh:{toolTitle:'社交媒体图片尺寸调整工具',toolDesc:'按 Instagram、YouTube、Facebook、LinkedIn、X、TikTok 和 Pinterest 的常用尺寸裁剪和调整图片。所有处理都在本机完成。',dropTitle:'拖入图片或点击选择',dropSub:'支持 PNG、JPG、WebP 或 GIF · 本地处理',preset:'平台与尺寸',mode:'调整模式',crop:'填充并裁剪',fit:'完整适配并填充背景',format:'输出格式',quality:'质量',background:'适配背景色',details:'输出详情',source:'原始尺寸',output:'输出尺寸',ratio:'宽高比',size:'预计文件大小',download:'下载图片',reset:'重新选择',privacy:'🔒 图片不会离开此浏览器。',step1:'从设备选择图片，或将图片拖入上传区域',step2:'选择社交平台尺寸，并设置填充裁剪或完整适配',step3:'选择 PNG、JPG 或 WebP，调整质量和背景颜色',step4:'预览准确尺寸并下载调整后的图片'}});
const {$,t}=GZ;
function safeText(value){return String(value).replace(/[&<>"']/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]))}
function safeLabel(value){return String(value).replace(/[&<>"']/g,'')}
const PRESETS=[['Instagram Post — 1:1',1080,1080],['Instagram Portrait — 4:5',1080,1350],['Instagram Story / Reel — 9:16',1080,1920],['YouTube Thumbnail — 16:9',1280,720],['YouTube Channel Banner',2560,1440],['Facebook Post',1200,630],['Facebook Cover',820,312],['LinkedIn Post',1200,627],['LinkedIn Banner',1584,396],['X / Twitter Post',1600,900],['X / Twitter Header',1500,500],['TikTok Video / Story',1080,1920],['Pinterest Pin — 2:3',1000,1500]];
let image=null,fileName='social-image';
function gcd(a,b){while(b)[a,b]=[b,a%b];return a}
function init(){
 $('#drop-title').textContent=t('dropTitle');$('#drop-sub').textContent=t('dropSub');$('#lb-preset').textContent=t('preset');$('#lb-mode').textContent=t('mode');$('#mode').options[0].text=t('crop');$('#mode').options[1].text=t('fit');$('#lb-format').textContent=t('format');$('#lb-quality').textContent=t('quality');$('#lb-bg').textContent=t('background');$('#details').textContent=t('details');$('#source-label').textContent=t('source');$('#output-label').textContent=t('output');$('#ratio-label').textContent=t('ratio');$('#size-label').textContent=t('size');$('#download').textContent='⬇️ '+t('download');$('#reset').textContent=t('reset');$('#privacy').textContent=t('privacy');
 $('#preset').innerHTML=PRESETS.map((p,i)=>`<option value="${i}">${safeText(p[0])} — ${p[1]}×${p[2]}</option>`).join('');draw();
}
function choose(file){if(!file||!file.type.startsWith('image/'))return;fileName=safeLabel(file.name.replace(/\.[^.]+$/,'')).slice(0,100)||'social-image';const url=URL.createObjectURL(file);const im=new Image();im.onload=()=>{image=im;$('#source').textContent=im.naturalWidth+' × '+im.naturalHeight;draw();URL.revokeObjectURL(url)};im.src=url}
function draw(){const p=PRESETS[+$('#preset').value||0],c=$('#canvas'),ctx=c.getContext('2d');c.width=p[1];c.height=p[2];ctx.fillStyle=$('#bg').value;ctx.fillRect(0,0,c.width,c.height);if(image){const scale=$('#mode').value==='cover'?Math.max(c.width/image.width,c.height/image.height):Math.min(c.width/image.width,c.height/image.height),w=image.width*scale,h=image.height*scale;ctx.drawImage(image,(c.width-w)/2,(c.height-h)/2,w,h)}else{ctx.fillStyle='#555';ctx.textAlign='center';ctx.font=Math.max(24,c.width/30)+'px sans-serif';ctx.fillText(p[0].split(' — ')[0],c.width/2,c.height/2)}const g=gcd(p[1],p[2]);$('#output').textContent=p[1]+' × '+p[2];$('#ratio').textContent=(p[1]/g)+':'+(p[2]/g);updateSize()}
function updateSize(){const type=$('#format').value,q=+$('#quality').value/100;$('#qv').textContent=Math.round(q*100)+'%';$('#canvas').toBlob(b=>{$('#size').textContent=b?formatBytes(b.size):'—'},type,q)}
function formatBytes(n){return n<1024?n+' B':n<1048576?(n/1024).toFixed(1)+' KB':(n/1048576).toFixed(2)+' MB'}
$('#drop').onclick=()=>$('#file').click();$('#file').onchange=e=>choose(e.target.files[0]);$('#drop').ondragover=e=>{e.preventDefault();$('#drop').classList.add('drag')};$('#drop').ondragleave=()=>$('#drop').classList.remove('drag');$('#drop').ondrop=e=>{e.preventDefault();$('#drop').classList.remove('drag');choose(e.dataTransfer.files[0])};['preset','mode','format','quality','bg'].forEach(id=>$('#'+id).addEventListener('input',draw));$('#download').onclick=()=>{if(!image)return $('#file').click();const type=$('#format').value,ext=type==='image/jpeg'?'jpg':type.split('/')[1],q=+$('#quality').value/100;$('#canvas').toBlob(b=>{const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=fileName+'-'+PRESETS[+$('#preset').value][1]+'x'+PRESETS[+$('#preset').value][2]+'.'+ext;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000)},type,q)};$('#reset').onclick=()=>{$('#file').value='';image=null;$('#source').textContent='—';draw()};init();
GZ.renderToolPage({category:'image',titleKey:'toolTitle',descKey:'toolDesc',howToSteps:['step1','step2','step3','step4'],related:[{icon:'📐',href:'/image/resizer.html',name:'Image Resizer'},{icon:'✂️',href:'/image/cropper.html',name:'Image Cropper'},{icon:'🗜️',href:'/image/compressor.html',name:'Image Compressor'},{icon:'🖼️',href:'/image/placeholder-image-generator.html',name:'Placeholder Generator'}]});
</script>
