<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="png-controls" id="controls"></div>
    <div class="png-grid" id="grid"></div>
    <div id="status"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Product Name Generator',
    toolDesc: 'Generate catchy product names for apps, gadgets, cosmetics, food, SaaS and more. Free, instant, no signup.',
    category: 'Category',
    keyword: 'Optional seed word',
    generate: 'Generate',
    copy: 'Copy',
    copyAll: 'Copy All',
    clear: 'Clear',
    copied: 'Copied!',
    emptyHint: 'Click Generate to see 12 fresh product name ideas.',
    step1: 'Pick a product category (app, gadget, beauty...)',
    step2: 'Optionally add a seed keyword',
    step3: 'Click Generate to get 12 brandable names',
    step4: 'Tap any name to copy, then check trademarks & domains',
  },
  zh: {
    toolTitle: '产品名称生成器',
    toolDesc: '为 App、数码产品、美妆、食品、SaaS 等生成朗朗上口的产品名称。免费、即时、无需注册。',
    category: '类别',
    keyword: '可选种子词',
    generate: '生成',
    copy: '复制',
    copyAll: '全部复制',
    clear: '清空',
    copied: '已复制！',
    emptyHint: '点击「生成」查看 12 个全新产品名称灵感。',
    step1: '选择产品类别（App、数码、美妆…）',
    step2: '可选：添加种子关键词',
    step3: '点击生成获取 12 个品牌化名称',
    step4: '点任意名称复制，然后查询商标和域名',
  }
});

const { $, copyText, t } = GZ;

const BANKS = {
  app:    { adj:['Swift','Snap','Quick','Bright','Smart','Daily','Pocket','Tiny','Bold','Vivid'], noun:['Flow','Mind','Sync','Mate','Hub','Deck','Loop','Pulse','Beam','Space'], suf:['ly','ify','.io','er','ster'] },
  gadget: { adj:['Quantum','Hyper','Nano','Cyber','Aero','Solar','Pixel','Turbo','Ultra','Prime'], noun:['Beam','Pulse','Core','Drive','Pod','Hub','Box','Wave','Edge','Forge'], suf:[' X',' Pro',' One',' Max',' Go'] },
  beauty: { adj:['Glow','Velvet','Pure','Silk','Petal','Aura','Lush','Bloom','Dewy','Honey'], noun:['Glow','Serum','Veil','Kiss','Mist','Bloom','Halo','Whip','Crush','Tint'], suf:['',' Beauty',' Skin',' Care',' Cosmetics'] },
  food:   { adj:['Crispy','Golden','Fresh','Savory','Zesty','Sweet','Smoky','Bold','Wild','Harvest'], noun:['Bite','Crunch','Crave','Munch','Nibble','Snap','Pop','Delight','Brew','Blend'], suf:['',' & Co',' Kitchen',' Co',' Originals'] },
  saas:   { adj:['Next','True','Bright','Live','Quantum','Hyper','Apex','Prime','Vivid','Swift'], noun:['Flow','Stack','Base','Sync','Grid','Mind','Ops','Desk','Board','Pulse'], suf:['',' for Teams','.ai',' Cloud',' Hub'] },
  fashion:{ adj:['Urban','Velvet','Crimson','Noir','Linen','Indigo','Sable','Ivory','Coral','Sage'], noun:['& Co',' Atelier',' Studio',' Threads',' Label',' Collective',' Maison',' Society',' Wear',' Lane'], suf:['','','','',''] },
  fitness:{ adj:['Power','Iron','Pulse','Apex','Forge','Beast','Titan','Vital','Prime','Surge'], noun:['Fit','Strong','Force','Forge','Pulse','Athletic','Movement','Lab','Performance','Edge'], suf:['',' X',' Elite',' Pro',' Athletics'] },
};

const CATS = ['app','gadget','beauty','food','saas','fashion','fitness'];

function pick(a){ return a[Math.floor(Math.random()*a.length)]; }
function cap(s){ return s.charAt(0).toUpperCase()+s.slice(1); }

let lastResults = [];

function generate(){
  const cat = $('#cat').value;
  const kw = $('#kw').value.trim();
  const bank = BANKS[cat] || BANKS.app;
  const names = new Set();
  let guard = 0;
  while(names.size < 12 && guard < 300){
    guard++;
    let n;
    const r = Math.random();
    if(kw && r < 0.35){
      n = cap(kw.toLowerCase().replace(/[^a-z0-9]/g,'')) + pick(bank.suf);
    } else if(r < 0.7){
      n = cap(pick(bank.adj)) + ' ' + cap(pick(bank.noun));
    } else {
      n = cap(pick(bank.adj)) + pick(bank.suf);
    }
    n = n.replace(/\s+/g,' ').trim();
    if(n && n.length >= 3 && n.length <= 28) names.add(n);
  }
  lastResults = [...names];
  render();
}

function render(){
  const grid = $('#grid');
  if(!lastResults.length){
    grid.innerHTML = `<div class="png-empty">${t('emptyHint')}</div>`;
    return;
  }
  grid.innerHTML = lastResults.map(n => `
    <div class="png-card">
      <span class="name" onclick="copyOne(this)" data-name="${n.replace(/"/g,'&quot;')}">${n}</span>
      <button onclick="copyOne(this)" data-name="${n.replace(/"/g,'&quot;')}">${t('copy')}</button>
    </div>`).join('');
}

function copyOne(el){
  copyText(el.dataset.name);
  const isBtn = el.tagName === 'BUTTON';
  const original = isBtn ? el.textContent : '';
  if(isBtn) el.textContent = t('copied');
  else el.style.opacity = '.5';
  setTimeout(() => { if(isBtn) el.textContent = original; else el.style.opacity=''; }, 1100);
}

function copyAll(){
  if(!lastResults.length) return;
  copyText(lastResults.join('\n'));
  $('#status').innerHTML = `<span style="color:var(--gz-success)">✓ ${lastResults.length} ${t('copied')}</span>`;
}

function doClear(){ lastResults = []; render(); $('#status').innerHTML=''; }

$('#controls').innerHTML = `
  <label>${t('category')} <select id="cat">
    ${CATS.map(c => `<option value="${c}">${({app:'App 📱',gadget:'Gadget 📷',beauty:'Beauty 💄',food:'Food 🍔',saas:'SaaS 💻',fashion:'Fashion 👗',fitness:'Fitness 💪'})[c]}</option>`).join('')}
  </select></label>
  <input type="text" id="kw" placeholder="${t('keyword')}">`;

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="generate()">${t('generate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="copyAll()">${t('copyAll')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

render();
generate();

GZ.renderToolPage({
  category: 'social',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🚀', href:'/social/startup-name-generator.html', name:'Startup Name'},
    {icon:'💡', href:'/text/brand-name-generator.html', name:'Brand Name'},
    {icon:'👥', href:'/social/team-name-generator.html', name:'Team Name'},
    {icon:'✍️', href:'/text/tagline-generator.html', name:'Tagline'},
  ]
});
</script>
<script src="/tools-result-rec.js?v=20260707v520" defer></script>
</body>
