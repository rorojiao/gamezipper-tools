    stopWords: '过滤停用词',

    stuffingWarn: '⚠ 检测到关键词堆砌！"%s" 出现了 %.1f%% — Google 可能会惩罚超过 4-5% 的密度。',
    safeDensity: '✓ 密度健康，未检测到关键词堆砌。',
    step1: '粘贴你的文章、博客或网页内容',
    step2: '选择单词、双词或三词短语模式',
    step3: '切换停用词过滤和大小写敏感',
    step4: '查看密度列 — 将目标关键词保持在 3-4% 以下',
  }
});

const { $, t } = GZ;

const STOP_WORDS = new Set('a about above after again against all am an and any are aren\'t as at be because been before being below between both but by can\'t cannot could couldn\'t did didn\'t do does doesn\'t doing don\'t down during each few for from further had hadn\'t has hasn\'t have haven\'t having he he\'d he\'ll he\'s her here here\'s hers herself him himself his how how\'s i i\'d i\'ll i\'m i\'ve if in into is isn\'t it it\'s its itself let\'s me more most mustn\'t my myself no nor not of off on once only or other ought our ours ourselves out over own same shan\'t she she\'d she\'ll she\'s should shouldn\'t so some such than that that\'s the their theirs them themselves then there there\'s these they they\'d they\'ll they\'re they\'ve this those through to too under until up very was wasn\'t we we\'d we\'ll we\'re we\'ve were weren\'t what what\'s when when\'s where where\'s which while who who\'s whom why why\'s with won\'t would wouldn\'t you you\'d you\'ll you\'re you\'ve your yours yourself yourselves'.split(' '));

let mode = 1; // 1, 2, or 3
let useStopWords = true;
let caseSensitive = false;

function tokenize(text) {
  const cleaned = caseSensitive ? text : text.toLowerCase();
  // Split on non-letter (preserve Chinese with \u4e00-\u9fff and apostrophes in contractions)
  const tokens = cleaned.match(/[\u4e00-\u9fff]|[a-z0-9']+/gi) || [];
  return tokens.filter(w => w.length > 0);
}

function getNgrams(tokens, n) {
  const grams = [];
  for (let i = 0; i <= tokens.length - n; i++) {
    let gram = tokens.slice(i, i + n).join(' ');
    grams.push(gram);
  }
  return grams;
}

function analyze() {
  const text = $('#input').value;
  const tokens = tokenize(text);
  // For multi-word mode, optionally filter stop words from final phrase
  // But for proper n-gram, we build n-grams from full token list, then optionally filter out phrases that start or end with a stop word
  const n = mode;
  let grams = getNgrams(tokens, n);

  // Stop-word handling:
  // For 1-word: filter out stop words
  // For 2-3 word: filter out phrases that are entirely stop words, OR optionally filter if any token is a stop word when filter is on
  let filtered = grams;
  if (useStopWords) {
    if (n === 1) {
      filtered = grams.filter(g => !STOP_WORDS.has(g.toLowerCase()) && g.length > 1);
    } else {
      filtered = grams.filter(g => {
        const words = g.split(' ');
        // Remove if first or last word is a stop word (typical SEO phrase extraction)
        if (STOP_WORDS.has(words[0].toLowerCase())) return false;
        if (STOP_WORDS.has(words[words.length - 1].toLowerCase())) return false;
        // Also remove if any middle word is a stop word? Keep it loose — only first/last.
        return true;
      });
    }
  }

  const counts = {};
  filtered.forEach(g => { counts[g] = (counts[g] || 0) + 1; });

  const total = filtered.length || 1;
  const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]);

  // Stats
  const totalWords = tokens.length;
  const uniqueWords = new Set(tokens).size;
  const avgLen = totalWords ? (tokens.reduce((s, w) => s + w.length, 0) / totalWords).toFixed(1) : '0';
  $('#stats').innerHTML = `
    <div class="kd-stat"><div class="num">${totalWords}</div><div class="lbl">${t('totalWords')}</div></div>
    <div class="kd-stat"><div class="num">${uniqueWords}</div><div class="lbl">${t('uniqueWords')}</div></div>
    <div class="kd-stat"><div class="num">${avgLen}</div><div class="lbl">${t('avgLength')}</div></div>
  `;

  // Table
  const maxCount = sorted[0] ? sorted[0][1] : 1;
  const top100 = sorted.slice(0, 100);
  const tbody = $('#table tbody');
  tbody.innerHTML = top100.map(([word, count], i) => {
    const pct = (count / total * 100);
    const barW = (count / maxCount * 100).toFixed(1);
    return `<tr>
      <td>${i + 1}</td>
      <td>${escapeHtml(word)}</td>
      <td>${count}</td>
      <td><span class="kd-bar" style="width:120px"><i style="width:${barW}%"></i></span> <span class="kd-pct">${pct.toFixed(2)}%</span></td>
    </tr>`;
  }).join('');

  // Warning: only meaningful for 1-word mode
  const warn = $('#warn');
  if (n === 1 && sorted.length && sorted[0]) {
    const topPct = sorted[0][1] / total * 100;
    if (topPct >= 5) {
      warn.className = 'kd-warn show';
      warn.innerHTML = t('stuffingWarn').replace('%s', escapeHtml(sorted[0][0])).replace('%.1f%%', topPct.toFixed(1) + '%');
    } else {
      warn.className = 'kd-warn show';
      warn.style.background = 'rgba(40,200,100,.12)';
      warn.style.borderColor = 'rgba(40,200,100,.4)';
      warn.style.color = '#28c864';
      warn.textContent = t('safeDensity');
    }
  } else {
    warn.className = 'kd-warn';
  }
}

function escapeHtml(s) {
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function renderTabs() {
  $('#tabs').innerHTML = [1, 2, 3].map(n => {
    const label = n === 1 ? t('oneWord') : n === 2 ? t('twoWord') : t('threeWord');
    return `<button class="kd-tab ${mode === n ? 'active' : ''}" data-n="${n}">${label}</button>`;
  }).join('');
  $$('.kd-tab').forEach(btn => btn.addEventListener('click', () => { mode = +btn.dataset.n; renderTabs(); analyze(); }));
}

function renderOpts() {
  $('#opts').innerHTML = `
    <label><input type="checkbox" id="opt-stop" ${useStopWords ? 'checked' : ''}> ${t('stopWords')}</label>
    <label><input type="checkbox" id="opt-case" ${caseSensitive ? 'checked' : ''}> ${t('caseSensitive')}</label>
  `;
  $('#opt-stop').addEventListener('change', e => { useStopWords = e.target.checked; analyze(); });
  $('#opt-case').addEventListener('change', e => { caseSensitive = e.target.checked; analyze(); });
}

const { $$ } = GZ;

$('#input').addEventListener('input', analyze);

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="doAnalyze()">${t('analyze')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

function doAnalyze() { analyze(); }
function loadExample() {
  $('#input').value = "Best coffee shops in Seattle. If you love coffee, Seattle is the coffee capital of the world. From artisan coffee roasters to cozy coffee shops, every corner has amazing coffee. Try the pour-over coffee at Blue Bottle Coffee, or visit the original Starbucks coffee shop. Coffee lovers will find endless coffee options, from espresso to cold brew coffee. Seattle coffee culture is unmatched - come taste the best coffee!";
  analyze();
}
function doClear() { $('#input').value = ''; analyze(); }

renderTabs();
renderOpts();
loadExample();

GZ.renderToolPage({
  category: 'text',

    {icon:'🔤', href:'/text/keyword-extractor.html', name:'Keyword Extractor'},
  ]
});
</script>
