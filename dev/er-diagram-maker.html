      <div class="er-side">

<script>
GZI18n.register({
  en: {
    toolTitle: 'ER Diagram Maker',
    toolDesc: 'Design entity-relationship (ER) diagrams in your browser. Add tables, columns, primary and foreign keys, drag to rearrange, and export as SVG, PNG or SQL — free, no signup.',
    entities: 'Entities', fields: 'Fields', addEntity: 'Add Entity', addField: 'Add Field',
    fieldName: 'Column name', fieldType: 'Data type', references: 'References',
    newEntity: 'Entity', sample: '🧪 Load Sample', clear: '🗑️ Clear', exportSvg: '⬇ SVG', exportPng: '⬇ PNG', exportSql: '⬇ SQL',
    hint: '💡 Click an entity to select it. Drag table headers to move. Add a field and tick FK to create a relationship arrow to another entity\'s primary key.',
    step1: 'Click Add Entity to create a new table',
    step2: 'Select an entity, then add columns with name and data type',
    step3: 'Tick PK for primary keys; tick FK and pick a referenced table to draw relationships',
    step4: 'Drag tables by their header to rearrange, then export SVG / PNG / SQL',
  },
  zh: {
    toolTitle: 'ER 图制作工具',
    toolDesc: '在浏览器中设计实体关系（ER）图。添加表、列、主键和外键，拖拽重排，导出 SVG、PNG 或 SQL — 免费、无需注册。',
    entities: '实体', fields: '字段', addEntity: '添加实体', addField: '添加字段',
    fieldName: '列名', fieldType: '数据类型', references: '引用',
    newEntity: '实体', sample: '🧪 加载示例', clear: '🗑️ 清空', exportSvg: '⬇ SVG', exportPng: '⬇ PNG', exportSql: '⬇ SQL',
    hint: '💡 点击实体以选中。拖动表头可移动。添加字段并勾选 FK 可创建指向其他实体主键的关系箭头。',
    step1: '点击「添加实体」创建新表',
    step2: '选中一个实体，添加带名称和数据类型的列',
    step3: '勾选 PK 标记主键；勾选 FK 并选择引用表以绘制关系',
    step4: '拖动表头重排，然后导出 SVG / PNG / SQL',
  }
});

const { $, t } = GZ;

let state = { entities: [], selected: null, nextId: 1, drag: null };

function E(name, x, y){ return { id: state.nextId++, name, x, y, fields: [] }; }
function F(name, type, pk, fk, ref){ return { id: state.nextId++, name, type, pk: !!pk, fk: !!fk, ref: ref||null }; }

function loadSample(){
  state = { entities: [], selected: null, nextId: 1, drag: null };
  const users = E('users', 40, 40); users.fields=[F('id','INT',1),F('email','VARCHAR(255)'),F('name','VARCHAR(255)'),F('created_at','DATETIME')];
  const posts = E('posts', 360, 40); posts.fields=[F('id','INT',1),F('user_id','INT',0,1,'users.id'),F('title','VARCHAR(255)'),F('body','TEXT'),F('published','BOOLEAN')];
  const comments = E('comments', 360, 340); comments.fields=[F('id','INT',1),F('post_id','INT',0,1,'posts.id'),F('user_id','INT',0,1,'users.id'),F('body','TEXT'),F('created_at','DATETIME')];
  state.entities = [users, posts, comments];
  state.selected = users.id;
  render();
}

function pkOf(ent){ return ent.fields.find(f=>f.pk); }

function render(){
  const svg = $('#svg');
  svg.innerHTML = '';
  const ns = 'http://www.w3.org/2000/svg';
  // relationships first (behind)
  state.entities.forEach(e => {
    e.fields.filter(f=>f.fk && f.ref).forEach(f => {
      const [refEnt] = (f.ref||'').split('.');
      const target = state.entities.find(x=>x.name===refEnt);
      if(!target) return;
      const tpk = pkOf(target);
      if(!tpk) return;
      const y1 = entY(e, f);
      const y2 = entY(target, tpk);
      const x1 = e.x + 150, x2 = target.x + 150;
      const line = document.createElementNS(ns,'path');
      const midX = (Math.min(e.x,target.x)+Math.max(e.x+150,target.x+150))/2;
      line.setAttribute('d',`M ${x1} ${y1} C ${midX} ${y1}, ${midX} ${y2}, ${x2} ${y2}`);
      line.setAttribute('class','er-rel');
      svg.appendChild(line);
      [['1',x1,y1],['∞',x2,y2]].forEach(([txt,cx,cy])=>{
        const tx=document.createElementNS(ns,'text');tx.setAttribute('x',cx+(txt==='1'?-12:8));tx.setAttribute('y',cy+4);tx.setAttribute('fill','#61afef');tx.setAttribute('font-size','12');tx.setAttribute('font-family','monospace');tx.textContent=txt;svg.appendChild(tx);
      });
    });
  });
  // entities
  state.entities.forEach(e => {
    const headerH = 28, rowH = 22;
    const h = headerH + e.fields.length*rowH + 6;
    const g = document.createElementNS(ns,'g');
    g.setAttribute('transform',`translate(${e.x},${e.y})`);
    g.style.cursor = 'move';
    // header
    const head = document.createElementNS(ns,'rect');
    head.setAttribute('width',150); head.setAttribute('height',headerH); head.setAttribute('rx',8);
    head.setAttribute('class','er-table-head');
    g.appendChild(head);
    const hn = document.createElementNS(ns,'text');
    hn.setAttribute('x',10); hn.setAttribute('y',19); hn.setAttribute('class','er-table-name');
    hn.textContent = e.name;
    g.appendChild(hn);
    // body bg
    const body = document.createElementNS(ns,'rect');
    body.setAttribute('y',headerH); body.setAttribute('width',150); body.setAttribute('height',e.fields.length*rowH+6);
    body.setAttribute('rx',0);
    g.appendChild(body);
    // rows
    e.fields.forEach((f,i)=>{
      const ry = headerH + i*rowH;
      const rb = document.createElementNS(ns,'rect');
      rb.setAttribute('x',0); rb.setAttribute('y',ry); rb.setAttribute('width',150); rb.setAttribute('height',rowH);
      rb.setAttribute('class', i%2 ? 'er-row-bg' : 'er-row-bg-alt');
      g.appendChild(rb);
      const badge = f.pk ? '🔑 ' : (f.fk ? '🔗 ' : '');
      const label = document.createElementNS(ns,'text');
      label.setAttribute('x',10); label.setAttribute('y',ry+15); label.setAttribute('class', f.pk?'er-field er-field-pk':(f.fk?'er-field er-field-fk':'er-field er-field-nm'));
      label.textContent = badge + f.name;
      g.appendChild(label);
      const type = document.createElementNS(ns,'text');
      type.setAttribute('x',142); type.setAttribute('y',ry+15); type.setAttribute('text-anchor','end'); type.setAttribute('class','er-field er-field-type');
      type.textContent = f.type;
      g.appendChild(type);
    });
    if(state.selected === e.id){
      const sel = document.createElementNS(ns,'rect');
      sel.setAttribute('x',-2); sel.setAttribute('y',-2); sel.setAttribute('width',154); sel.setAttribute('height',h+4); sel.setAttribute('rx',10);
      sel.setAttribute('fill','none'); sel.setAttribute('stroke','#00d672'); sel.setAttribute('stroke-width',2); sel.setAttribute('stroke-dasharray','4 3');
      g.appendChild(sel);
    }
    g.dataset.id = e.id;
    svg.appendChild(g);
  });
  renderSidebar();
}

function entY(e, f){
  const idx = e.fields.indexOf(f);
  return e.y + 28 + idx*22 + 11;
}

function renderSidebar(){
  const list = $('#entityList');
  list.innerHTML = state.entities.map(e=>`<div class="er-ent ${state.selected===e.id?'active':''}" data-id="${e.id}"><div class="nm">📋 ${e.name}</div><div class="ct">${e.fields.length} ${t('fields').toLowerCase()}</div></div>`).join('') || `<div style="opacity:.5;font-size:.8em;padding:6px">${t('hint').split('.')[0]}</div>`;
  list.querySelectorAll('.er-ent').forEach(el => el.onclick = () => { state.selected = +el.dataset.id; render(); });
  // field chips for selected
  const sel = state.entities.find(e=>e.id===state.selected);
  const chips = $('#fieldChips');
  if(!sel){ chips.innerHTML = `<span style="opacity:.5;font-size:.8em">—</span>`; $('#fldRef').innerHTML=''; return; }
  chips.innerHTML = sel.fields.map(f=>`<span class="er-chip" data-id="${f.id}"><span class="${f.pk?'pk':(f.fk?'fk':'')}">${f.pk?'🔑':(f.fk?'🔗':'')}</span>${f.name}<span class="x" data-del="${f.id}">✕</span></span>`).join('');
  chips.querySelectorAll('.er-chip').forEach(c => c.onclick = (ev) => { if(ev.target.dataset.del){ sel.fields = sel.fields.filter(f=>f.id!=ev.target.dataset.del); render(); } });
  // FK ref options
  const refs = [];
  state.entities.forEach(e => { if(e.id !== state.selected){ const pk=pkOf(e); if(pk) refs.push(`${e.name}.${pk.name}`); } });
  $('#fldRef').innerHTML = refs.map(r=>`<option>${r}</option>`).join('') || '<option value="">—</option>';
}

// dragging
const stage = $('#stage');
let dragInfo = null;
$('#svg').addEventListener('mousedown', (ev) => {
  const g = ev.target.closest('g[data-id]');
  if(g){
    const id = +g.dataset.id;
    const ent = state.entities.find(e=>e.id===id);
    const rect = $('#svg').getBoundingClientRect();
    const scrollX = stage.scrollLeft, scrollY = stage.scrollTop;
    dragInfo = { id, ent, startX: ev.clientX, startY: ev.clientY, origX: ent.x, origY: ent.y };
    state.selected = id;
    render();
    ev.preventDefault();
  }
});
window.addEventListener('mousemove', (ev) => {
  if(!dragInfo) return;
  dragInfo.ent.x = Math.max(0, dragInfo.origX + (ev.clientX - dragInfo.startX));
  dragInfo.ent.y = Math.max(0, dragInfo.origY + (ev.clientY - dragInfo.startY));
  render();
});
window.addEventListener('mouseup', () => { dragInfo = null; });

// add entity
$('#btnAddEntity').onclick = () => {
  const e = E(t('newEntity') + '_' + state.entities.length, 40 + (state.entities.length%4)*180, 40 + Math.floor(state.entities.length/4)*260);
  e.fields.push(F('id','INT',1));
  state.entities.push(e); state.selected = e.id; render();
};
// add field
$('#btnAddField').onclick = () => {
  const sel = state.entities.find(e=>e.id===state.selected);
  if(!sel) return;
  const name = $('#fldName').value.trim() || ('col_'+sel.fields.length);
  const type = $('#fldType').value;
  const pk = $('#fldPk').checked;
  const fk = $('#fldFk').checked;
  if(pk) sel.fields.forEach(f=>f.pk=false);
  const ref = fk ? $('#fldRef').value : null;
  sel.fields.push(F(name, type, pk, fk, ref));
  $('#fldName').value=''; $('#fldPk').checked=false; $('#fldFk').checked=false; $('#fkRefWrap').style.display='none';
  render();
};
$('#fldFk').onchange = (e) => { $('#fkRefWrap').style.display = e.target.checked ? 'block' : 'none'; };
$('#fldPk').onchange = (e) => { if(e.target.checked) $('#fldFk').checked=false; $('#fkRefWrap').style.display=$('#fldFk').checked?'block':'none'; };

function exportSvg(){
  const svg = $('#svg').cloneNode(true);
  svg.setAttribute('xmlns','http://www.w3.org/2000/svg');
  svg.setAttribute('width',2000); svg.setAttribute('height',1200);
  const blob = new Blob(['<?xml version="1.0"?>\n'+svg.outerHTML], {type:'image/svg+xml'});
  download(blob, 'er-diagram.svg');
}
function exportPng(){
  const svgEl = $('#svg');
  const data = new XMLSerializer().serializeToString(svgEl);
  const img = new Image();
  const svgBlob = new Blob([data], {type:'image/svg+xml;charset=utf-8'});
  const url = URL.createObjectURL(svgBlob);
  img.onload = () => {
    const canvas = document.createElement('canvas');
    canvas.width = 1600; canvas.height = 1080;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#0f1120'; ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.drawImage(img, 0, 0);
    URL.revokeObjectURL(url);
    canvas.toBlob(b => download(b,'er-diagram.png'), 'image/png');
  };
  img.src = url;
}
function exportSql(){
  let sql = '';
  state.entities.forEach(e => {
    const cols = e.fields.map(f => {
      let s = '  '+f.name+' '+f.type;
      if(f.pk) s += ' PRIMARY KEY';
      return s;
    }).join(',\n');
    sql += `CREATE TABLE ${e.name} (\n${cols}\n);\n\n`;
  });
  state.entities.forEach(e => {
    e.fields.filter(f=>f.fk&&f.ref).forEach(f => {
      const [refEnt,refCol] = (f.ref||'').split('.');
      sql += `ALTER TABLE ${e.name} ADD CONSTRAINT fk_${e.name}_${f.name} FOREIGN KEY (${f.name}) REFERENCES ${refEnt}(${refCol});\n`;
    });
  });
  download(new Blob([sql], {type:'text/plain'}), 'schema.sql');
}
function download(blob, name){
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = name; a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href), 2000);
}

// labels
$('#lblEntities').textContent = t('entities');
$('#lblFields').textContent = t('fields');
$('#lblAddEnt').textContent = t('addEntity');
$('#lblAddFld').textContent = t('addField');
$('#lblFldName').textContent = t('fieldName');
$('#lblFldType').textContent = t('fieldType');
$('#lblRef').textContent = t('references');
$('#hint').textContent = t('hint');

$('#toolbar').innerHTML = `
  <button class="gz-btn" id="btnSample">${t('sample')}</button>
  <button class="gz-btn gz-btn-secondary" id="btnSvg">${t('exportSvg')}</button>
  <button class="gz-btn gz-btn-secondary" id="btnPng">${t('exportPng')}</button>
  <button class="gz-btn gz-btn-secondary" id="btnSql">${t('exportSql')}</button>
  <button class="gz-btn gz-btn-secondary" id="btnClear">${t('clear')}</button>`;
$('#btnSample').onclick = loadSample;
$('#btnSvg').onclick = exportSvg;
$('#btnPng').onclick = exportPng;
$('#btnSql').onclick = exportSql;
$('#btnClear').onclick = () => { state = { entities: [], selected: null, nextId: 1, drag: null }; render(); };

loadSample();

GZ.renderToolPage({
  category: 'dev',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🔀', href:'/dev/flowchart-maker.html', name:'Flowchart Maker'},
    {icon:'📊', href:'/dev/mermaid-editor.html', name:'Mermaid Editor'},
    {icon:'🗃️', href:'/dev/sql.html', name:'SQL Formatter'},
    {icon:'🔀', href:'/dev/json-to-yaml.html', name:'JSON to YAML'},
  ]
});
</script>
