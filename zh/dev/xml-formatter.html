<div class="gz-container">

<script>
GZI18n.register({
  en:{
    toolTitle:'XML Formatter & Validator',
    toolDesc:'Format, beautify, validate and minify XML data with syntax highlighting.',
    indent:'spaces',
    xmlValid:'✓ Valid XML',
    xmlInvalid:'✗ Invalid XML',
    step1:'Paste or type your XML in the input area',
    step2:'Click Format to beautify with syntax highlighting',
    step3:'Click Minify to compress XML to one line',
    step4:'Use Copy to copy the result to clipboard',
  },
  zh:{
    toolTitle:'XML 格式化工具',
    toolDesc:'即时格式化、美化和验证 XML 数据，支持语法高亮和压缩。',
    indent:'空格',
    xmlValid:'✓ XML 有效',
    xmlInvalid:'✗ XML 无效',
    step1:'在输入区粘贴或输入 XML',
    step2:'点击「格式化」美化并高亮显示',
    step3:'点击「压缩」将 XML 压缩为一行',
    step4:'点击「复制」将结果复制到剪贴板',
  }
});

let indent = 2;
const { $, copyText, t } = GZ;

function escapeHtml(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function syntaxHighlight(xml) {
  return escapeHtml(xml)
    .replace(/(&lt;!--[\s\S]*?--&gt;)/g, '<span class="xml-comment">$1</span>')
    .replace(/(&lt;\?[\s\S]*?\?&gt;)/g, '<span class="xml-decl">$1</span>')
    .replace(/(&lt;\/?)([\w:.-]+)/g, '$1<span class="xml-tag">$2</span>')
    .replace(/([\w:.-]+)(=)(&quot;|&#39;|")(.*?)\3/g, '<span class="xml-attr">$1</span>$2$3<span class="xml-val">$4</span>$3');
}

function formatXML(xml, indentSize) {
  const PADDING = ' '.repeat(indentSize);
  let formatted = '';
  let pad = 0;
  xml = xml.replace(/(>)(<)(\/*)/g, '$1\n$2$3');
  xml.split('\n').forEach(node => {
    node = node.trim();
    if (!node) return;
    if (node.match(/^<\/\w/)) pad--;
    formatted += PADDING.repeat(Math.max(0, pad)) + node + '\n';
    if (node.match(/^<\w[^>]*[^/]>.*$/) && !node.match(/^<\w[^>]*>.*<\/\w/)) pad++;
  });
  return formatted.trim();
}

function minifyXML(xml) {
  return xml.replace(/>\s+</g, '><').replace(/\n/g, '').replace(/\s{2,}/g, ' ').trim();
}

function doFormat() {
  const inp = $('#input').value.trim();
  if (!inp) return;
  try {
    const parser = new DOMParser();
    const doc = parser.parseFromString(inp, 'text/xml');
    const err = doc.querySelector('parsererror');
    if (err) throw new Error(err.textContent.substring(0, 200));
    const formatted = formatXML(inp, indent);
    $('#output').innerHTML = syntaxHighlight(formatted);
    $('#status').innerHTML = `<span style="color:var(--gz-success)">${t('xmlValid')}</span>`;
  } catch(e) { showError(e); }
}

function doMinify() {
  const inp = $('#input').value.trim();
  if (!inp) return;
  try {
    const parser = new DOMParser();
    const doc = parser.parseFromString(inp, 'text/xml');
    const err = doc.querySelector('parsererror');
    if (err) throw new Error(err.textContent.substring(0, 200));
    const minified = minifyXML(inp);
    $('#output').textContent = minified;
    $('#status').innerHTML = `<span style="color:var(--gz-success)">${t('xmlValid')}</span>`;
  } catch(e) { showError(e); }
}

function showError(e) {
  $('#status').innerHTML = `<span style="color:var(--gz-accent)">${t('xmlInvalid')}: ${escapeHtml(e.message)}</span>`;
  $('#output').innerHTML = `<span style="color:var(--gz-accent)">${escapeHtml(e.message)}</span>`;
}

function loadExample() {
  $('#input').value = `<?xml version="1.0" encoding="UTF-8"?>
<catalog>
  <book id="1">
    <title>GameZipper Tools Guide</title>
    <author>Dev Team</author>
    <year>2026</year>
    <price currency="USD">29.99</price>
    <categories>
      <category>Web Development</category>
      <category>Utilities</category>
    </categories>
  </book>
  <book id="2">
    <title>JSON for Beginners</title>
    <author>Jane Doe</author>
    <year>2025</year>
    <price currency="USD">19.99</price>
  </book>
</catalog>`;
  doFormat();
}

function doClear() { $('#input').value=''; $('#output').textContent=''; $('#status').innerHTML=''; }

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="doFormat()">${t('format')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doMinify()">${t('minify')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <select class="gz-select" onchange="indent=+this.value;doFormat()">
    <option value="2">2 ${t('indent')}</option>
    <option value="4">4 ${t('indent')}</option>
  </select>
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

GZ.renderToolPage({
  category: 'dev',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',

    {icon:'🔗', href:'/convert/csv-to-json.html', name:'CSV to JSON'},
  ]
});
</script>
