<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is Base64 encoding?", "acceptedAnswer": {"@type": "Answer", "text": "Base64 is a binary-to-text encoding scheme that converts binary data into a string of ASCII characters. It's commonly used for data transmission, embedding images in HTML/CSS, and API authentication."}}, {"@type": "Question", "name": "How do I decode Base64?", "acceptedAnswer": {"@type": "Answer", "text": "Paste your Base64 string into the input area and click Decode. The tool will instantly convert it back to the original text or binary data."}}, {"@type": "Question", "name": "Is Base64 encryption?", "acceptedAnswer": {"@type": "Answer", "text": "No. Base64 is encoding, not encryption. It is easily reversible and should not be used for security purposes. Use proper encryption algorithms like AES for sensitive data."}}, {"@type": "Question", "name": "Is my data secure with this tool?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. All Base64 encoding and decoding happens in your browser. No data is sent to any server."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="gz-split">
      <div><label id="lbl-in"></label><textarea id="input" spellcheck="false"></textarea></div>
      <div><label id="lbl-out"></label><textarea id="output" spellcheck="false" readonly></textarea></div>
    </div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Base64 Encoder / Decoder',
    toolDesc: 'Encode text to Base64 or decode Base64 strings back to text. Supports UTF-8.',
    step1: 'Enter text or Base64 string in the input area',
    step2: 'Click Encode to convert text → Base64',
    step3: 'Click Decode to convert Base64 → text',
    step4: 'Copy the result with the Copy button',
  },
  zh: {
    toolTitle: 'Base64 编码 / 解码',
    toolDesc: '将文本编码为 Base64 或将 Base64 字符串解码为文本，支持 UTF-8。',
    step1: '在输入区输入文本或 Base64 字符串',
    step2: '点击「编码」将文本转换为 Base64',
    step3: '点击「解码」将 Base64 转换为文本',
    step4: '点击「复制」按钮复制结果',
  }
});

const { $, copyText, t } = GZ;

function doEncode() {
  try { $('#output').value = btoa(unescape(encodeURIComponent($('#input').value))); }
  catch(e) { $('#output').value = 'Error: ' + e.message; }
}
function doDecode() {
  try { $('#output').value = decodeURIComponent(escape(atob($('#input').value.trim()))); }
  catch(e) { $('#output').value = 'Error: ' + e.message; }
}
function loadExample() {
  $('#input').value = 'Hello, GameZipper Tools! Hello World 🎮';
  doEncode();
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="doEncode()">${t('encode')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doDecode()">${t('decode')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn" onclick="copyText($('#output').value)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#input').value='';$('#output').value=''">${t('clear')}</button>`;

GZ.renderToolPage({
  category: 'dev',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🔗', href:'/dev/url-encode.html', name:'URL Encode'},
    {icon:'📋', href:'/dev/json.html', name:'JSON Formatter'},
    {icon:'#️⃣', href:'/dev/hash.html', name:'Hash Generator'},
    {icon:'🔑', href:'/dev/jwt.html', name:'JWT Decoder'},
  ]
});
</script>
