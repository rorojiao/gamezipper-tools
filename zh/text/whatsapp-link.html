<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is a WhatsApp link?", "acceptedAnswer": {"@type": "Answer", "text": "A WhatsApp link (also called wa.me link or click-to-chat link) is a special URL that opens a chat with a specific phone number on WhatsApp. The format is https://wa.me/<phone_number> and you can optionally include a pre-filled message with the ?text= parameter."}}, {"@type": "Question", "name": "Does the link work internationally?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. WhatsApp links work worldwide. The phone number should be in international format without the leading + or 00 — for example, for a US number +1 555 123 4567 you would use 15551234567."}}, {"@type": "Question", "name": "Can I pre-fill the message?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. Use the message field below the phone number. When the user clicks your link, the message will be pre-filled in their WhatsApp composer. They can then edit it before sending — perfect for support forms, sales inquiries and contact pages."}}, {"@type": "Question", "name": "Where can I share the link?", "acceptedAnswer": {"@type": "Answer", "text": "You can use WhatsApp links anywhere: websites, email signatures, social media bios (Instagram, TikTok, X), business cards, QR codes and even printed flyers. Just copy the URL and use it as a regular link."}}]}</script>

<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>

      <button class="gz-btn" id="btnCopy">📋 Copy</button>
      <button class="gz-btn gz-btn-secondary" id="btnOpen" target="_blank">↗ Open in WhatsApp</button>

<script>
GZI18n.register({
  en: {
    toolTitle: 'WhatsApp Link Generator',
    toolDesc: 'Create click-to-chat WhatsApp links (wa.me) with a pre-filled message. Works on mobile, desktop, and WhatsApp Web.',
    lblPhone: 'Phone number (international format, no + or 00)',
    lblMsg: 'Pre-filled message (optional)',
    hintPhone: 'Example: 15551234567 (US), 8613800138000 (China), 447911123456 (UK)',
    hintMsg: 'Supports emoji 🎉 and line breaks. User can edit before sending.',
    lblUrl: '🔗 Your WhatsApp link',
    tplSupport: { icon: '🛎️', label: 'Support', msg: 'Hi! I have a question about your service.' },
    tplSales: { icon: '💼', label: 'Sales', msg: 'Hello! I am interested in your products. Could you share more details?' },
    tplAppt: { icon: '📅', label: 'Appointment', msg: 'Hi, I would like to book an appointment. When are you available?' },
    tplThanks: { icon: '🙏', label: 'Thank you', msg: 'Thank you for the great service! I really appreciate it.' },
    step1: 'Enter the phone number in international format (digits only, no + or 00)',
    step2: 'Optionally add a pre-filled message — supports emoji and line breaks',
    step3: 'Copy the generated link, share it, or show a QR code',
    step4: 'Click "Open in WhatsApp" to test the link directly',
  },
  zh: {
    toolTitle: 'WhatsApp 链接生成器',
    toolDesc: '创建可点击聊天的 WhatsApp 链接 (wa.me)，支持预填消息。在手机、桌面和 WhatsApp Web 上均可使用。',
    lblPhone: '手机号（国际格式，不含 + 或 00）',
    lblMsg: '预填消息（可选）',
    hintPhone: '示例：15551234567 (美国), 8613800138000 (中国), 447911123456 (英国)',
    hintMsg: '支持 emoji 🎉 和换行。用户可在发送前编辑。',
    lblUrl: '🔗 你的 WhatsApp 链接',
    tplSupport: { icon: '🛎️', label: '客服', msg: '您好！我对您的服务有一个问题想咨询。' },
    tplSales: { icon: '💼', label: '销售', msg: '您好！我对您的产品感兴趣，可以分享更多详情吗？' },
    tplAppt: { icon: '📅', label: '预约', msg: '您好，我想预约一个时间。请问您什么时候方便？' },
    tplThanks: { icon: '🙏', label: '致谢', msg: '感谢您的优质服务！非常感谢。' },
    step1: '输入国际格式手机号（仅数字，不含 + 或 00）',
    step2: '可选添加预填消息 — 支持 emoji 和换行',
    step3: '复制生成的链接、分享或显示二维码',
    step4: '点击"在 WhatsApp 中打开"直接测试链接',
  }
});

const { $, copyText, t } = GZ;

function buildLink() {
  const phone = $('#phone').value.replace(/[^0-9]/g, '');
  const msg = $('#message').value;
  let url = 'https://wa.me/' + (phone || '');
  if (msg) {
    url += '?text=' + encodeURIComponent(msg);
  }
  $('#urlOut').textContent = url;
  if (msg) {
    $('#preview').style.display = 'block';
    $('#preview').textContent = msg;
  } else {
    $('#preview').style.display = 'none';
  }
  return url;
}

function renderTemplates() {
  const ids = ['tplSupport', 'tplSales', 'tplAppt', 'tplThanks'];
  $('#templates').innerHTML = ids.map(id => {
    const d = t(id);
    return `<div class="wa-tpl" onclick="$('#message').value=decodeURIComponent(encodeURIComponent('${d.msg.replace(/'/g, "\\'")}'));buildLink()">
      <div class="icon">${d.icon}</div>
      <div>${d.label}</div>
    </div>`;
  }).join('');
}

$('#phone').addEventListener('input', buildLink);
$('#message').addEventListener('input', buildLink);

$('#btnCopy').onclick = () => copyText(buildLink());
$('#btnOpen').onclick = () => window.open(buildLink(), '_blank');
$('#btnQR').onclick = () => {
  const url = buildLink();
  const qrWrap = $('#qrWrap');
  qrWrap.innerHTML = '';
  if (qrWrap.style.display === 'none') {
    qrWrap.style.display = 'block';
    // Use Google Chart API QR generator (no need to add a JS lib)
    const img = document.createElement('img');
    img.src = 'https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=' + encodeURIComponent(url);
    img.alt = 'QR code';
    qrWrap.appendChild(img);
    $('#btnQR').textContent = '🔼 Hide QR';
  } else {
    qrWrap.style.display = 'none';
    $('#btnQR').textContent = '📱 Show QR';
  }
};
$('#btnShare').onclick = async () => {
  const url = buildLink();
  if (navigator.share) {
    try { await navigator.share({ title: 'WhatsApp Link', url }); } catch(e) {}
  } else {
    copyText(url);
  }
};

renderTemplates();
buildLink();

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📱', href:'/convert/qrcode.html', name:'QR Code Generator'},
    {icon:'📧', href:'/text/email-signature.html', name:'Email Signature'},
    {icon:'💬', href:'/social/whatsapp-chat.html', name:'WhatsApp Chat Maker'},
    {icon:'🔗', href:'/text/slug.html', name:'Slug Generator'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
