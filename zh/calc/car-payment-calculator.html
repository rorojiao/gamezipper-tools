<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "How is a car loan monthly payment calculated?", "acceptedAnswer": {"@type": "Answer", "text": "The standard amortization formula is M = P × r × (1+r)^n / ((1+r)^n − 1), where P is the loan amount (price minus down payment and trade-in, plus sales tax), r is the monthly interest rate (APR / 12 / 100), and n is the loan term in months. This calculator applies it automatically."}}, {"@type": "Question", "name": "Does trade-in value lower my monthly payment?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. Your trade-in reduces the amount you need to finance, which lowers both the loan principal and your monthly payment. Enter your trade-in value alongside the down payment."}}, {"@type": "Question", "name": "What is a good APR for a car loan?", "acceptedAnswer": {"@type": "Answer", "text": "For buyers with excellent credit, new-car APRs often range from about 4% to 6%, while used-car loans are typically 1–2 points higher. Rates vary by lender, credit score, loan term and whether the car is new or used."}}, {"@type": "Question", "name": "Is my financial information private?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. Every calculation runs entirely in your browser. No loan amount, income or payment data is ever sent to a server."}}]}</script>

<script>
GZI18n.register({
  en: {
    toolTitle: 'Car Payment Calculator',
    toolDesc: 'Estimate your monthly auto loan payment from vehicle price, down payment, trade-in, APR and term — with a full amortization schedule.',
    lblPrice: 'Vehicle Price ($)',
    lblDown: 'Down Payment ($)',
    lblTrade: 'Trade-in Value ($)',
    lblTax: 'Sales Tax (%)',
    lblApr: 'Loan APR (Interest Rate %)',
    lblTerm: 'Loan Term (months)',
    btnCalc: 'Calculate Monthly Payment',
    resultLabel: 'Estimated Monthly Payment',
    loanAmt: 'Loan Amount (Financed)',
    interest: 'Total Interest Paid',
    total: 'Total Cost of Car',
    monthlyTax: 'Sales Tax Financed',
    thMonth: 'Month', thPayment: 'Payment', thPrincipal: 'Principal', thInterest: 'Interest', thBalance: 'Balance',
    step1: 'Enter the vehicle price, your down payment and any trade-in value',
    step2: 'Add the sales tax rate and the APR (interest rate) you qualify for',
    step3: 'Pick the loan term in months (24 to 84)',
    step4: 'Click Calculate to see your monthly payment, total interest and amortization schedule',
  },
  zh: {
    toolTitle: '车贷月供计算器',
    toolDesc: '根据车价、首付、置换价、年利率和贷款期限估算每月车贷还款额 — 附完整还款计划表。',
    lblPrice: '车辆价格（美元）',
    lblDown: '首付金额（美元）',
    lblTrade: '置换抵扣（美元）',
    lblTax: '销售税（%）',
    lblApr: '贷款年利率（%）',
    lblTerm: '贷款期限（月）',
    btnCalc: '计算月供',
    resultLabel: '预估月供',
    loanAmt: '贷款金额',
    interest: '总利息支出',
    total: '购车总成本',
    monthlyTax: '计入贷款的销售税',
    thMonth: '期数', thPayment: '还款额', thPrincipal: '本金', thInterest: '利息', thBalance: '剩余本金',
    step1: '输入车辆价格、首付和置换抵扣金额',
    step2: '填写销售税率和你能拿到的年利率（APR）',
    step3: '选择贷款期限（24 到 84 个月）',
    step4: '点击「计算月供」查看月供、总利息和还款计划表',
  }
});

const { $, t } = GZ;
const cur = '$';
function money(v){ return cur + v.toLocaleString(undefined,{maximumFractionDigits:0}); }

function pmt(principal, annualRatePct, months){
  if (months <= 0) return principal;
  const r = annualRatePct / 100 / 12;
  if (r === 0) return principal / months;
  return principal * r * Math.pow(1+r, months) / (Math.pow(1+r, months) - 1);
}

function calculate(){
  const price = Math.max(0, parseFloat($('#price').value) || 0);
  const down  = Math.max(0, parseFloat($('#down').value)  || 0);
  const trade = Math.max(0, parseFloat($('#trade').value) || 0);
  const tax   = Math.max(0, parseFloat($('#tax').value)   || 0);
  const apr   = Math.max(0, parseFloat($('#apr').value)   || 0);
  const term  = parseInt($('#term').value, 10);

  // Taxable amount after trade-in (down payment reduces taxed basis in most states after trade)
  const taxable = Math.max(0, price - trade);
  const taxAmt = taxable * tax / 100;
  const financed = Math.max(0, price - down - trade + taxAmt);

  const monthly = pmt(financed, apr, term);
  const totalPaid = monthly * term;
  const totalInterest = totalPaid - financed;
  const totalCost = down + trade + totalPaid; // out-of-pocket across the life of loan (down + payments); trade returned as vehicle

  $('#result').style.display = '';
  $('#result-monthly').textContent = money(monthly);
  $('#result-label').textContent = t('resultLabel');
  $('#result-loan').textContent = money(financed);
  $('#result-loan-label').textContent = t('loanAmt');
  $('#result-interest').textContent = money(totalInterest);
  $('#result-interest-label').textContent = t('interest');
  $('#result-total').textContent = money(down + totalPaid);
  $('#result-total-label').textContent = t('total');
  $('#result-monthlytax').textContent = money(taxAmt);
  $('#result-monthlytax-label').textContent = t('monthlyTax');

  // Amortization schedule
  const r = apr/100/12;
  let balance = financed;
  let rows = '';
  for(let i=1;i<=term;i++){
    const intPart = balance * r;
    const prinPart = monthly - intPart;
    balance -= prinPart;
    rows += `<tr><td>${i}</td><td>${money(monthly)}</td><td>${money(prinPart)}</td><td>${money(intPart)}</td><td>${money(Math.max(0,balance))}</td></tr>`;
  }
  $('#sched-body').innerHTML = rows;
  $('#sched-wrap').style.display = '';
  document.getElementById('th-month').textContent = t('thMonth');
  document.getElementById('th-payment').textContent = t('thPayment');
  document.getElementById('th-principal').textContent = t('thPrincipal');
  document.getElementById('th-interest').textContent = t('thInterest');
  document.getElementById('th-balance').textContent = t('thBalance');
}

$('#btn-calc').textContent = t('btnCalc');
calculate();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [

    {icon:'🏦', href:'/calc/loan-calculator.html', name:'Loan Calc'},
    {icon:'⛽', href:'/calc/fuel-cost-calculator.html', name:'Fuel Cost'},
    {icon:'🏷️', href:'/calc/percent-off-calculator.html', name:'Percent Off'},
  ]
});
</script>
