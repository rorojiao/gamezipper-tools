    screamingSnake: '大写下划线（大蛇）',
    kebabCase: '短横线',
    screamingKebab: '大写短横线',
    dotCase: '点分隔',
    titleCase: '标题格式',
    step1: '在输入区粘贴或输入标识符',
    step2: '工具会自动检测当前命名格式',
    step3: '右侧显示所有常用命名格式',
    step4: '点击任意格式旁的"复制"按钮即可复制',
  }
});

const { $, t, copyText } = GZ;

function splitWords(str) {
  if (!str) return [];
  const trimmed = str.trim();
  // Detect and split based on delimiters and casing
  // Handle: snake_case, kebab-case, dot.case, PascalCase, camelCase, SCREAMING_SNAKE
  let words = trimmed
    .replace(/([a-z0-9])([A-Z])/g, '$1 $2')  // camelCase boundary
    .replace(/([A-Z]+)([A-Z][a-z])/g, '$1 $2')  // ACRONYMNext -> ACRONYM Next
    .replace(/[_\-./]/g, ' ')  // delimiters
    .trim()
    .split(/\s+/);
  return words.filter(w => w.length > 0);
}

function toCamel(words) {
  return words.map((w, i) =>
    i === 0 ? w.toLowerCase() : w.charAt(0).toUpperCase() + w.slice(1).toLowerCase()
  ).join('');
}

function toPascal(words) {
  return words.map(w => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase()).join('');
}

function toSnake(words) {
  return words.map(w => w.toLowerCase()).join('_');
}

function toScreamingSnake(words) {
  return words.map(w => w.toUpperCase()).join('_');
}

function toKebab(words) {
  return words.map(w => w.toLowerCase()).join('-');
}

function toScreamingKebab(words) {
  return words.map(w => w.toUpperCase()).join('-');
}

function toDot(words) {
  return words.map(w => w.toLowerCase()).join('.');
}

function toTitle(words) {
  return words.map(w => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase()).join(' ');
}

function doConvert() {
  const input = $('#input').value;
  const words = splitWords(input);
  const out = $('#output');

  if (!words.length) { out.innerHTML = ''; return; }

  const formats = [
    {key:'camelCase', fn: toCamel},
    {key:'pascalCase', fn: toPascal},
    {key:'snakeCase', fn: toSnake},
    {key:'screamingSnake', fn: toScreamingSnake},
    {key:'kebabCase', fn: toKebab},
    {key:'screamingKebab', fn: toScreamingKebab},
    {key:'dotCase', fn: toDot},
    {key:'titleCase', fn: toTitle},
  ];

  out.innerHTML = formats.map(f => {
    const val = f.fn(words);
    return `<div class="case-output">
      <span class="name">${t(f.key)}</span>
      <span class="val">${escapeHtml(val)}</span>
      <button class="gz-btn gz-btn-sm gz-btn-secondary copy-btn" onclick="copyVal('${val.replace(/'/g,"\\'")}')">${t('copy')}</button>
    </div>`;
  }).join('');
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function copyVal(val) {
  copyText(val);
}

function loadExample() {
  $('#input').value = 'myVariableName_formatConverter';
  doConvert();
}

function doClear() { $('#input').value = ''; $('#output').innerHTML = ''; }

$('#input').addEventListener('input', doConvert);

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;
