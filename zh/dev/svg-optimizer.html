    optimize: '优化',
    copy: '复制 SVG',
    download: '下载',
    clear: '清空',
    dropFile: '拖拽 SVG 文件到此处或粘贴 SVG 代码',
    originalSize: '原始大小',
    optimizedSize: '优化后',
    saved: '节省',
    savings: '节省比例',

    step1: '将 SVG 代码粘贴到输入区域，或拖拽 SVG 文件',
    step2: '在预览下方配置优化选项',
    step3: '点击「优化」按钮减少 SVG 文件大小',
    step4: '复制优化后的 SVG 或下载为文件',
  }
});
const { $, copyText, t } = GZ;
$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="optimizeSVG()">${t('optimize')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="copyOutput()">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="downloadSVG()">${t('download')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="clearAll()" style="margin-left:auto">${t('clear')}</button>`;
$('#input-label').textContent = t('inputLabel');
$('#output-label').textContent = t('outputLabel');
$('#preview-label').textContent = t('previewLabel');
$('#opts-label').textContent = t('optsLabel');
$('#opt-comments-lbl').textContent = t('optComments');
$('#opt-metadata-lbl').textContent = t('optMetadata');
$('#opt-defaults-lbl').textContent = t('optDefaults');
$('#opt-empty-lbl').textContent = t('optEmpty');
$('#opt-whitespace-lbl').textContent = t('optWhitespace');
$('#opt-ids-lbl').textContent = t('optIds');
function formatBytes(b) {
  if (b < 1024) return b + ' B';
  if (b < 1048576) return (b / 1024).toFixed(1) + ' KB';
  return (b / 1048576).toFixed(2) + ' MB';
}
function optimizeSVG() {
  const input = $('#input-svg').value.trim();
  if (!input) return;
  let svg = input;
  const removeComments = $('#opt-comments').checked;
  const removeMetadata = $('#opt-metadata').checked;
  const removeDefaults = $('#opt-defaults').checked;
  const removeEmpty = $('#opt-empty').checked;
  const minifyWS = $('#opt-whitespace').checked;
  const cleanIds = $('#opt-ids').checked;
  const origSize = new Blob([svg]).size;
  if (removeComments) {
    svg = svg.replace(/<!--[\s\S]*?-->/g, '');
  }
  if (removeMetadata) {
    svg = svg.replace(/<metadata[\s\S]*?<\/metadata>/gi, '');
    svg = svg.replace(/<sodipodi:[^>]*\/>/gi, '');
    svg = svg.replace(/<sodipodi:[^>]*>[\s\S]*?<\/sodipodi:[^>]*>/gi, '');
    svg = svg.replace(/<inkscape:[^>]*\/>/gi, '');
    svg = svg.replace(/<inkscape:[^>]*>[\s\S]*?<\/inkscape:[^>]*>/gi, '');
    svg = svg.replace(/\s+xmlns:(sodipodi|inkscape|dc|cc|rdf)="[^"]*"/gi, '');
    svg = svg.replace(/<dc:[^>]*\/>/gi, '');
    svg = svg.replace(/<dc:[^>]*>[\s\S]*?<\/dc:[^>]*>/gi, '');
    svg = svg.replace(/<cc:[^>]*\/>/gi, '');
    svg = svg.replace(/<cc:[^>]*>[\s\S]*?<\/cc:[^>]*>/gi, '');
    svg = svg.replace(/<rdf:RDF[\s\S]*?<\/rdf:RDF>/gi, '');
    svg = svg.replace(/<title>[\s\S]*?<\/title>/gi, '');
    svg = svg.replace(/<desc>[\s\S]*?<\/desc>/gi, '');
  }
  if (removeDefaults) {
    svg = svg.replace(/\s+fill="none"/g, (m, off, str) => {
      return /fill=/.test(str.substring(Math.max(0, off - 200), off)) ? m : '';
    });
    svg = svg.replace(/\s+stroke="none"/g, '');
    svg = svg.replace(/\s+stroke-width="1"/g, '');
    svg = svg.replace(/\s+stroke-dashoffset="0"/g, '');
    svg = svg.replace(/\s+stroke-opacity="1"/g, '');
    svg = svg.replace(/\s+fill-opacity="1"/g, '');
    svg = svg.replace(/\s+opacity="1"/g, '');
    svg = svg.replace(/\s+display="inline"/g, '');
    svg = svg.replace(/\s+overflow="visible"/g, '');
    svg = svg.replace(/\s+visibility="visible"/g, '');
    svg = svg.replace(/\s+font-style="normal"/g, '');
    svg = svg.replace(/\s+font-weight="normal"/g, '');
    svg = svg.replace(/\s+font-variant="normal"/g, '');
    svg = svg.replace(/\s+text-decoration="none"/g, '');
    svg = svg.replace(/\s+text-anchor="start"/g, '');
    svg = svg.replace(/\s+clip-rule="nonzero"/g, '');
    svg = svg.replace(/\s+fill-rule="nonzero"/g, '');
    svg = svg.replace(/\s+color-rendering="auto"/g, '');
    svg = svg.replace(/\s+image-rendering="auto"/g, '');
    svg = svg.replace(/\s+shape-rendering="auto"/g, '');
    svg = svg.replace(/\s+text-rendering="auto"/g, '');
  }
  if (removeEmpty) {
    let prev;
    do {
      prev = svg;
      svg = svg.replace(/<g[^>]*>\s*<\/g>/gi, '');
      svg = svg.replace(/<a[^>]*>\s*<\/a>/gi, '');
    } while (svg !== prev);
  }
  if (cleanIds) {
    const allIds = [];
    const idRe = /\bid="([^"]+)"/g;
    let m;
    while ((m = idRe.exec(svg)) !== null) allIds.push(m[1]);
    const usedIds = new Set();
    allIds.forEach(id => {
      const urlRe = new RegExp(`url\\(#${id}\\)`, 'g');
      if (urlRe.test(svg)) usedIds.add(id);
      const hrefRe = new RegExp(`href="#${id}"`, 'g');
      if (hrefRe.test(svg)) usedIds.add(id);
      const xhrefRe = new RegExp(`xlink:href="#${id}"`, 'g');
      if (xhrefRe.test(svg)) usedIds.add(id);
    });
    allIds.forEach(id => {
      if (!usedIds.has(id)) {
        svg = svg.replace(new RegExp(`\\bid="${id}"`, 'g'), '');
      }
    });
  }
  if (minifyWS) {
    svg = svg.replace(/\n/g, ' ');
    svg = svg.replace(/\t/g, '');
    svg = svg.replace(/\s{2,}/g, ' ');
    svg = svg.replace(/>\s+</g, '><');
    svg = svg.replace(/\s+>/g, '>');
    svg = svg.replace(/\s*\//g, '/');
  }
  svg = svg.trim();
  const newSize = new Blob([svg]).size;
  const saved = origSize - newSize;
  const pct = origSize > 0 ? ((saved / origSize) * 100).toFixed(1) : 0;
  $('#output-svg').value = svg;
  $('#stats').style.display = 'grid';
  $('#stats').innerHTML = `
    <div class="stat-card"><div class="val">${formatBytes(origSize)}</div><div class="lbl">${t('originalSize')}</div></div>
    <div class="stat-card"><div class="val">${formatBytes(newSize)}</div><div class="lbl">${t('optimizedSize')}</div></div>
    <div class="stat-card"><div class="val" style="color:${saved > 0 ? '#10b981' : 'var(--accent)'}">${formatBytes(saved)}</div><div class="lbl">${t('saved')}</div></div>
    <div class="stat-card"><div class="val" style="color:${pct > 0 ? '#10b981' : 'var(--accent)'}">${pct}%</div><div class="lbl">${t('savings')}</div></div>`;
  try {
    $('#preview').innerHTML = svg;
  } catch(e) {}
}
function copyOutput() {
  const v = $('#output-svg').value;
  if (v) { copyText(v); }
}
function downloadSVG() {
  const v = $('#output-svg').value;
  if (!v) return;
  const blob = new Blob([v], { type: 'image/svg+xml' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'optimized.svg'; a.click();
  URL.revokeObjectURL(url);
}
function clearAll() {
  $('#input-svg').value = '';
  $('#output-svg').value = '';
  $('#preview').innerHTML = '';
  $('#stats').style.display = 'none';
}
$('#input-svg').addEventListener('input', function() {
  const v = this.value.trim();
  if (v.startsWith('<svg') || v.startsWith('<?xml')) {
    try { $('#preview').innerHTML = v; } catch(e) {}
  }
});
document.addEventListener('dragover', e => e.preventDefault());
document.addEventListener('drop', e => {
  e.preventDefault();
  const file = e.dataTransfer?.files?.[0];
  if (file && (file.type === 'image/svg+xml' || file.name.endsWith('.svg'))) {
    const reader = new FileReader();
    reader.onload = ev => {
      $('#input-svg').value = ev.target.result;
      try { $('#preview').innerHTML = ev.target.result; } catch(e) {}
      optimizeSVG();
    };
    reader.readAsText(file);
  }
});

  ]

</script>
