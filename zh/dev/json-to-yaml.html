const { $, t } = GZ;

const SPECIAL_KEYS = new Set(['true','false','null','yes','no','on','off','~']);

function isPlainKey(k) {
  return typeof k === 'string' && /^[A-Za-z_][A-Za-z0-9_\-]*$/.test(k) && !SPECIAL_KEYS.has(k.toLowerCase());
}

function yamlScalar(v) {
  if (v === null) return 'null';
  if (typeof v === 'boolean') return v ? 'true' : 'false';
  if (typeof v === 'number') {
    if (!Number.isFinite(v)) return '.nan';
    if (v === Infinity) return '.inf';
    if (v === -Infinity) return '-.inf';
    return String(v);
  }
  if (typeof v === 'string') {
    if (v === '') return "''";
    const needsQuote = /[:\n\r\t#&*!|>'"%@`{}[\],]/.test(v)
      || /^\s|\s$/.test(v)
      || /^-?\d/.test(v)
      || /^(true|false|null|yes|no|on|off|~)$/i.test(v)
      || v.includes('...');
    if (needsQuote) {
      const esc = v.replace(/\\/g, '\\\\').replace(/"/g, '\\"').replace(/\n/g, '\\n').replace(/\r/g, '\\r').replace(/\t/g, '\\t');
      return '"' + esc + '"';
    }
    return v;
  }
  return String(v);
}

function isFlowableArray(arr) {
  if (arr.length === 0 || arr.length > 8) return false;
  return arr.every(x => x === null || typeof x !== 'object');
}

function toYaml(obj, indentSize, depth, opts) {
  // depth: indentation level (0 = root)
  const pad = ' '.repeat(indentSize * depth);
  const itemPad = ' '.repeat(indentSize * depth);
  
  if (obj === null || obj === undefined) return 'null';
  if (typeof obj !== 'object') return yamlScalar(obj);

  if (Array.isArray(obj)) {
    if (obj.length === 0) return '[]';
    if (isFlowableArray(obj)) {
      return '[' + obj.map(yamlScalar).join(', ') + ']';
    }
    return obj.map(v => {
      if (v === null) return itemPad + '- null';
      if (typeof v !== 'object') return itemPad + '- ' + yamlScalar(v);
      if (Array.isArray(v) && v.length === 0) return itemPad + '- []';
      if (!Array.isArray(v) && Object.keys(v).length === 0) return itemPad + '- {}';
      // Object/array inside array item: render at depth+1 (one level deeper for inner keys)
      const inner = toYaml(v, indentSize, depth + 1, opts);
      const lines = inner.split('\n');
      return itemPad + '- ' + lines[0].trimStart() + '\n' + lines.slice(1).join('\n');
    }).join('\n');
  }

  const keys = opts.sort ? Object.keys(obj).sort() : Object.keys(obj);
  if (keys.length === 0) return '{}';
  const lines = [];
  for (const k of keys) {
    const v = obj[k];
    const keyStr = isPlainKey(k) ? k : '"' + k.replace(/\\/g, '\\\\').replace(/"/g, '\\"') + '"';
    if (v === null || typeof v !== 'object') {
      lines.push(pad + keyStr + ': ' + yamlScalar(v));
    } else if (Array.isArray(v) && v.length === 0) {
      lines.push(pad + keyStr + ': []');
    } else if (!Array.isArray(v) && Object.keys(v).length === 0) {
      lines.push(pad + keyStr + ': {}');
    } else if (Array.isArray(v) && isFlowableArray(v)) {
      const arrStr = '[' + v.map(yamlScalar).join(', ') + ']';
      lines.push(pad + keyStr + ': ' + arrStr);
    } else {
      const inner = toYaml(v, indentSize, depth + 1, opts);
      lines.push(pad + keyStr + ':\n' + inner);
    }
  }
  return lines.join('\n');
}

function convert() {
  const inp = $('#input').value;
  const indent = Math.max(1, Math.min(8, +$('#indent').value || 2));
  const opts = { sort: $('#sortKeys').checked };
  if (!inp.trim()) {
    $('#output').value = '';
    $('#status').textContent = '';
    $('#status').className = 'jy-status';
    return;
  }
  try {
    const obj = JSON.parse(inp);
    const yaml = toYaml(obj, indent, 0, opts);
    $('#output').value = yaml;
    $('#status').textContent = t('ok');
    $('#status').className = 'jy-status ok';
  } catch (e) {
    $('#output').value = '';
    $('#status').textContent = t('err') + e.message;
    $('#status').className = 'jy-status err';
  }
}

  convert();
}

$('#input').addEventListener('input', convert);
$('#sortKeys').addEventListener('change', convert);
