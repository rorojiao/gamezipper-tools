GZI18n.register({
  en: {

    toolDesc: 'Create soft, extruded plastic-style neumorphic UI. Adjust size, blur, distance, intensity and color. Flat, pressed or convex modes. Copy CSS in one click.',

  },
  zh: {

    toolDesc: '创建柔和、凸起的塑料质感新拟态 UI。调整尺寸、模糊、距离、强度和颜色。支持扁平、凹陷和凸起模式。一键复制 CSS。',
    lblSize: '尺寸 (px)',
    lblRadius: '圆角 (px)',
    lblDistance: '偏移距离 (px)',
    lblBlur: '模糊 (px)',
    lblIntensity: '阴影强度',
    lblBg: '背景颜色',
    copyCss: '复制 CSS',
    clear: '重置',
    copied: '✓ CSS 已复制！',
    step1: '选择背景颜色 — 页面背景需要使用相同颜色',
    step2: '调整偏移、模糊和强度，直到柔光阴影看起来合适',
    step3: '在「扁平」「凹陷」和「凸起」模式间切换',
    step4: '点击「复制 CSS」并粘贴到你的项目中',
  }
});

const { $, copyText, t } = GZ;
let mode = 'flat';

// Compute light and dark shadow from a hex color
function hexToRgb(hex){
  const h = hex.replace('#','');
  return {r:parseInt(h.substr(0,2),16), g:parseInt(h.substr(2,2),16), b:parseInt(h.substr(4,2),16)};
}
function rgbToHex(r,g,b){
  const clamp = v => Math.max(0,Math.min(255,Math.round(v)));
  return '#' + [r,g,b].map(v=>clamp(v).toString(16).padStart(2,'0')).join('');
}
function lighten(hex, amt){ const {r,g,b}=hexToRgb(hex); return rgbToHex(r+amt,g+amt,b+amt); }
function darken(hex, amt){ return lighten(hex, -amt); }

function update(){
  const size = +$('#ctrl-size').value;
  const radius = +$('#ctrl-radius').value;
  const distance = +$('#ctrl-distance').value;
  const blur = +$('#ctrl-blur').value;
  const intensity = +$('#ctrl-intensity').value;
  const bg = $('#ctrl-bg').value;
  const light = lighten(bg, intensity);
  const dark = darken(bg, intensity);

  // Apply background to preview wrap and element
  $('#neu-preview-wrap').style.background = bg;
  const el = $('#neu-element');
  el.style.width = size + 'px';
  el.style.height = size + 'px';
  el.style.borderRadius = radius + 'px';

  let css = '';
  if(mode==='flat'){
    const shadow = `${-distance}px ${distance}px ${blur}px ${dark}, ${distance}px ${-distance}px ${blur}px ${light}`;
    el.style.boxShadow = shadow;
    el.style.background = bg;
    css = `background: ${bg};\nborder-radius: ${radius}px;\nbox-shadow: ${shadow};`;
  } else if(mode==='pressed'){
    const shadow = `inset ${-distance}px ${distance}px ${blur}px ${dark}, inset ${distance}px ${-distance}px ${blur}px ${light}`;
    el.style.boxShadow = shadow;
    el.style.background = bg;
    css = `background: ${bg};\nborder-radius: ${radius}px;\nbox-shadow: ${shadow};`;
  } else { // convex
    const shadow = `${-distance}px ${distance}px ${blur}px ${dark}, ${distance}px ${-distance}px ${blur}px ${light}`;
    const grad = `linear-gradient(145deg, ${lighten(bg, Math.round(intensity*0.6))}, ${darken(bg, Math.round(intensity*0.6))})`;
    el.style.boxShadow = shadow;
    el.style.background = grad;
    css = `background: ${grad};\nborder-radius: ${radius}px;\nbox-shadow: ${shadow};`;
  }
  $('#neu-out').textContent = css;
}

// Controls
['#ctrl-size','#ctrl-radius','#ctrl-distance','#ctrl-blur','#ctrl-intensity','#ctrl-bg'].forEach(sel=>{
  $(sel).addEventListener('input', update);
});

// Mode buttons
function setMode(m){
  mode = m;
  $('#mode-flat').classList.toggle('active', m==='flat');
  $('#mode-pressed').classList.toggle('active', m==='pressed');
  $('#mode-convex').classList.toggle('active', m==='convex');
  update();
}
$('#mode-flat').addEventListener('click', ()=>setMode('flat'));
$('#mode-pressed').addEventListener('click', ()=>setMode('pressed'));
$('#mode-convex').addEventListener('click', ()=>setMode('convex'));

// Toolbar: copy + reset
$('#toolbar').innerHTML = `<button class="gz-btn" id="btn-copy">${t('copyCss')}</button><button class="gz-btn" id="btn-reset">${t('clear')}</button>`;
$('#btn-copy').addEventListener('click', ()=>{
  copyText($('#neu-out').textContent);
  const b = $('#btn-copy'); const orig = b.textContent;
  b.textContent = t('copied');
  setTimeout(()=>{b.textContent = orig;}, 1200);
});
$('#btn-reset').addEventListener('click', ()=>{
  $('#ctrl-size').value=160; $('#ctrl-radius').value=32; $('#ctrl-distance').value=10;
  $('#ctrl-blur').value=20; $('#ctrl-intensity').value=14; $('#ctrl-bg').value='#e0e5ec';
  setMode('flat');
});

// Labels
$('#lbl-size').textContent = t('lblSize');
$('#lbl-radius').textContent = t('lblRadius');
$('#lbl-distance').textContent = t('lblDistance');
$('#lbl-blur').textContent = t('lblBlur');
$('#lbl-intensity').textContent = t('lblIntensity');
$('#lbl-bg').textContent = t('lblBg');

update();

  category: 'css',

    {icon:'🌈', href:'/css-tools/gradient.html', name:'CSS Gradient'},
  ]
});
