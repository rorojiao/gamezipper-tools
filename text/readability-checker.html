const { $, copyText, t } = GZ;

// ---- Syllable counting (vowel-group heuristic) ----
function countSyllables(word) {
  word = word.toLowerCase().replace(/[^a-z]/g, '');
  if (word.length <= 3) return word.length ? 1 : 0;
  word = word.replace(/(?:[^laeiouy]es|ed|[^laeiouy]e)$/, '');
  word = word.replace(/^y/, '');
  const m = word.match(/[aeiouy]{1,2}/g);
  let n = m ? m.length : 1;
  return n < 1 ? 1 : n;
}

function isComplexWord(word) {
  // 3+ syllables and not a proper noun / not ending in common suffixes
  return countSyllables(word) >= 3 && !/(es|ed|ing)$/i.test(word);
}

function readability(text) {
  const clean = (text || '').trim();
  if (!clean) return null;
  const words = clean.match(/[A-Za-z0-9']+/g) || [];
  const wordCount = words.length;
  if (wordCount === 0) return null;
  const sentences = (clean.match(/[.!?]+/g) || clean.match(/[。！？]/g) || []).length || 1;
  const syllables = words.reduce((a, w) => a + countSyllables(w), 0);
  const complexWords = words.filter(isComplexWord).length;
  const chars = words.reduce((a, w) => a + w.length, 0);
  const avgSentence = wordCount / sentences;
  const avgSyllWord = syllables / wordCount;
  const percentComplex = (complexWords / wordCount) * 100;

  // Flesch Reading Ease: 206.835 - 1.015*(w/s) - 84.6*(syl/w)
  const fres = 206.835 - 1.015 * avgSentence - 84.6 * avgSyllWord;
  // Flesch-Kincaid Grade Level: 0.39*(w/s) + 11.8*(syl/w) - 15.59
  const fkgl = 0.39 * avgSentence + 11.8 * avgSyllWord - 15.59;
  // Gunning Fog: 0.4 * [(w/s) + 100*(complex/w)]
  const fog = 0.4 * (avgSentence + percentComplex);
  // SMOG: 1.043 * sqrt(complex * 30/s) + 3.1291
  const smog = 1.043 * Math.sqrt(complexWords * (30 / sentences)) + 3.1291;
  // ARI: 4.71*(chars/w) + 0.5*(w/s) - 21.43
  const ari = 4.71 * (chars / wordCount) + 0.5 * avgSentence - 21.43;
  // Coleman-Liau: 0.0588*L - 0.296*S - 15.8  (L=letters/100w, S=sentences/100w)
  const L = (chars / wordCount) * 100;
  const S = (sentences / wordCount) * 100;
  const cli = 0.0588 * L - 0.296 * S - 15.8;

  return {
    wordCount, sentences, syllables, chars, complexWords,
    avgSentence, avgSyllWord,
    fres, fkgl, fog, smog, ari, cli,
    readingMin: wordCount / 200,
  };
}

function fresLabel(score) {
  if (score >= 90) return t('veryEasy');
  if (score >= 70) return t('easy');
  if (score >= 60) return t('fairlyEasy');
  if (score >= 50) return t('standard');
  if (score >= 30) return t('fairlyDifficult');
  if (score >= 10) return t('difficult');
  return t('veryConfusing');
}
function fresColor(score) {
  if (score >= 60) return '#4ecdc4';
  if (score >= 30) return '#ffb347';
  return '#ff6b6b';
}

function render() {
  const r = readability($('#input').value);

    $('#stats').innerHTML = '';
    return;

  $('#scores').innerHTML = `
    <div class="rd-score">
      <div><div class="name">${t('fres')}</div><div class="desc">${fresLabel(r.fres)}</div></div>
      <div style="text-align:right"><div class="val" style="color:${fresBadgeColor}">${r.fres.toFixed(1)}</div><span class="rd-badge" style="background:${fresBadgeColor}22;color:${fresBadgeColor}">${fresLabel(r.fres)}</span></div>
    </div>
    <div class="rd-score"><div class="name">${t('fkgl')}</div><div class="val">${Math.max(0,r.fkgl).toFixed(1)} <span style="font-size:.8rem;color:var(--text2)">${t('grade')}</span></div></div>
    <div class="rd-score"><div class="name">${t('fog')}</div><div class="val">${Math.max(0,r.fog).toFixed(1)} <span style="font-size:.8rem;color:var(--text2)">${t('grade')}</span></div></div>
    <div class="rd-score"><div class="name">${t('smog')}</div><div class="val">${Math.max(0,r.smog).toFixed(1)} <span style="font-size:.8rem;color:var(--text2)">${t('grade')}</span></div></div>
    <div class="rd-score"><div class="name">${t('ari')}</div><div class="val">${Math.max(0,r.ari).toFixed(1)} <span style="font-size:.8rem;color:var(--text2)">${t('grade')}</span></div></div>
    <div class="rd-score"><div class="name">${t('cli')}</div><div class="val">${Math.max(0,r.cli).toFixed(1)} <span style="font-size:.8rem;color:var(--text2)">${t('grade')}</span></div></div>`;

  $('#stats').innerHTML = `
    <div class="rd-stat"><div class="num">${r.wordCount}</div><div class="lbl">${t('words')}</div></div>
    <div class="rd-stat"><div class="num">${r.sentences}</div><div class="lbl">${t('sentences')}</div></div>
    <div class="rd-stat"><div class="num">${r.syllables}</div><div class="lbl">${t('syllables')}</div></div>
    <div class="rd-stat"><div class="num">${r.chars}</div><div class="lbl">${t('chars')}</div></div>
    <div class="rd-stat"><div class="num">${r.complexWords}</div><div class="lbl">${t('complexWords')}</div></div>
    <div class="rd-stat"><div class="num">${r.avgSentence.toFixed(1)}</div><div class="lbl">${t('avgSentence')}</div></div>
    <div class="rd-stat"><div class="num">${r.avgSyllWord.toFixed(2)}</div><div class="lbl">${t('avgSyllWord')}</div></div>
    <div class="rd-stat"><div class="num">${r.readingMin < 1 ? Math.round(r.readingMin*60)+'s' : Math.ceil(r.readingMin)}</div><div class="lbl">${t('readingTime')}</div></div>`;
}

  copyText(txt);
