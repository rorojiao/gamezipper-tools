<script>
GZI18n.register({
  en: {
    toolTitle: 'Payslip Generator',
    toolDesc: 'Generate professional payslips for free. Add employee info, earnings, deductions and download as PDF. All data stays in your browser.',
    lblCompany: 'Company Information',
    lblCname: 'Company Name',
    lblCaddr: 'Address',
    lblCemail: 'Email',
    lblCphone: 'Phone',
    lblEmp: 'Employee Information',
    lblEname: 'Full Name',
    lblEid: 'Employee ID',
    lblEpos: 'Position',
    lblEdep: 'Department',
    lblEssn: 'SSN / Tax ID (last 4)',
    lblEstart: 'Start Date',
    lblPeriod: 'Pay Period',
    lblPaydate: 'Pay Date',
    lblPayperiod: 'Pay Frequency',
    lblPeriodFrom: 'Period From',
    lblPeriodTo: 'Period To',
    lblCurr: 'Currency',
    lblEarnings: 'Earnings',
    lblDeductions: 'Deductions',
    lblAddEarning: 'Add Earning',
    lblAddDeduction: 'Add Deduction',
    lblItem: 'Description',
    lblAmount: 'Amount',
    step1: 'Fill in company and employee details',
    step2: 'Add earnings (salary, bonus, overtime, allowance)',
    step3: 'Add deductions (tax, insurance, loan repayment)',
    step4: 'Click Print to save as PDF',
  },
  zh: {
    toolTitle: '工资条生成器',
    toolDesc: '免费生成专业工资条。填写员工信息、收入、扣除项，下载为 PDF。所有数据保留在你的浏览器中。',
    lblCompany: '公司信息',
    lblCname: '公司名称',
    lblCaddr: '地址',
    lblCemail: '邮箱',
    lblCphone: '电话',
    lblEmp: '员工信息',
    lblEname: '姓名',
    lblEid: '员工编号',
    lblEpos: '职位',
    lblEdep: '部门',
    lblEssn: '身份证/税号（后4位）',
    lblEstart: '入职日期',
    lblPeriod: '工资周期',
    lblPaydate: '发放日期',
    lblPayperiod: '发放频率',
    lblPeriodFrom: '周期开始',
    lblPeriodTo: '周期结束',
    lblCurr: '货币',
    lblEarnings: '收入项',
    lblDeductions: '扣除项',
    lblAddEarning: '添加收入',
    lblAddDeduction: '添加扣除',
    lblItem: '项目',
    lblAmount: '金额',
    step1: '填写公司和员工信息',
    step2: '添加收入（工资、奖金、加班、补贴）',
    step3: '添加扣除（税、保险、贷款还款）',
    step4: '点击「打印」保存为 PDF',
  }
});

const { $, t, showToast } = GZ;

let earnings = [
  { label: 'Basic Salary', amount: 5000 },
  { label: 'Performance Bonus', amount: 500 },
  { label: 'Transport Allowance', amount: 200 }
];
let deductions = [
  { label: 'Federal Tax', amount: 950 },
  { label: 'Social Security', amount: 310 },
  { label: 'Health Insurance', amount: 150 }
];

const CURRENCY_SYM = {USD:'$',EUR:'€',GBP:'£',JPY:'¥',CNY:'¥',INR:'₹'};

function renderLineItems() {
  $('#earningsList').innerHTML = earnings.map((e, i) => `
    <div class="ps-line-row">
      <input type="text" value="${e.label}" oninput="earnings[${i}].label=this.value;render()">
      <input type="number" value="${e.amount}" step="any" oninput="earnings[${i}].amount=parseFloat(this.value)||0;render()">
      <button class="ps-remove" onclick="earnings.splice(${i},1);renderLineItems();render()">×</button>
    </div>
  `).join('');
  $('#deductionsList').innerHTML = deductions.map((d, i) => `
    <div class="ps-line-row">
      <input type="text" value="${d.label}" oninput="deductions[${i}].label=this.value;render()">
      <input type="number" value="${d.amount}" step="any" oninput="deductions[${i}].amount=parseFloat(this.value)||0;render()">
      <button class="ps-remove" onclick="deductions.splice(${i},1);renderLineItems();render()">×</button>
    </div>
  `).join('');
}

function addEarning() { earnings.push({ label: 'New Earning', amount: 0 }); renderLineItems(); render(); }
function addDeduction() { deductions.push({ label: 'New Deduction', amount: 0 }); renderLineItems(); render(); }

function fmtMoney(n, currency) {
  const sym = CURRENCY_SYM[currency] || '$';
  if (currency === 'JPY') return sym + Math.round(n).toLocaleString();
  return sym + n.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function render() {
  const curr = $('#currency').value;
  const sym = CURRENCY_SYM[curr] || '$';
  const totalEarn = earnings.reduce((s, e) => s + (e.amount || 0), 0);
  const totalDed = deductions.reduce((s, d) => s + (d.amount || 0), 0);
  const net = totalEarn - totalDed;

  const html = `
    <div class="ps-payslip">
      <div class="ps-ps-header">
        <div>
          <h2>${$('#cName').value || 'Company'}</h2>
          <div class="ps-sub">${$('#cAddr').value || ''}</div>
          <div class="ps-sub">${$('#cEmail').value || ''} · ${$('#cPhone').value || ''}</div>
        </div>
        <div style="text-align:right">
          <h2 style="font-size:1.4em">PAYSLIP</h2>
          <div class="ps-sub">${$('#payPeriod').value} · ${$('#payDate').value}</div>
          <div class="ps-sub">Period: ${$('#periodFrom').value} → ${$('#periodTo').value}</div>
        </div>
      </div>

      <div class="ps-ps-info">
        <div><b>Employee:</b> <span>${$('#eName').value || '—'}</span></div>
        <div><b>ID:</b> <span>${$('#eId').value || '—'}</span></div>
        <div><b>Position:</b> <span>${$('#ePos').value || '—'}</span></div>
        <div><b>Department:</b> <span>${$('#eDep').value || '—'}</span></div>
        <div><b>Tax ID:</b> <span>${$('#eSSN').value || '—'}</span></div>
        <div><b>Start Date:</b> <span>${$('#eStart').value || '—'}</span></div>
      </div>

      <table class="ps-table">
        <thead><tr><th>Earnings</th><th>Amount</th><th>Deductions</th><th>Amount</th></tr></thead>
        <tbody>
          ${(() => {
            const max = Math.max(earnings.length, deductions.length);
            const rows = [];
            for (let i = 0; i < max; i++) {
              const e = earnings[i] || { label: '', amount: '' };
              const d = deductions[i] || { label: '', amount: '' };
              rows.push(`<tr>
                <td>${e.label}</td><td>${e.amount !== '' ? fmtMoney(e.amount, curr) : ''}</td>
                <td>${d.label}</td><td>${d.amount !== '' ? fmtMoney(d.amount, curr) : ''}</td>
              </tr>`);
            }
            return rows.join('');
          })()}
          <tr class="ps-totrow">
            <td><b>Total Earnings</b></td><td><b>${fmtMoney(totalEarn, curr)}</b></td>
            <td><b>Total Deductions</b></td><td><b>${fmtMoney(totalDed, curr)}</b></td>
          </tr>
        </tbody>
        <tfoot>
          <tr class="ps-nettotal">
            <td colspan="3">NET PAY</td>
            <td>${fmtMoney(net, curr)}</td>
          </tr>
        </tfoot>
      </table>

      <div class="ps-ps-footer">
        This is a computer-generated payslip. No signature required. · Generated on ${new Date().toLocaleDateString()} · ${$('#cName').value}
      </div>
    </div>
  `;
  $('#previewWrap').innerHTML = html;
}

['cName','cAddr','cEmail','cPhone','eName','eId','ePos','eDep','eSSN','eStart','payDate','payPeriod','periodFrom','periodTo','currency'].forEach(id => {
  $('#'+id).addEventListener('input', render);
  $('#'+id).addEventListener('change', render);
});

$('#lbl-company').textContent = t('lblCompany');
$('#lbl-cname').textContent = t('lblCname');
$('#lbl-caddr').textContent = t('lblCaddr');
$('#lbl-cemail').textContent = t('lblCemail');
$('#lbl-cphone').textContent = t('lblCphone');
$('#lbl-emp').textContent = t('lblEmp');
$('#lbl-ename').textContent = t('lblEname');
$('#lbl-eid').textContent = t('lblEid');
$('#lbl-epos').textContent = t('lblEpos');
$('#lbl-edep').textContent = t('lblEdep');
$('#lbl-essn').textContent = t('lblEssn');
$('#lbl-estart').textContent = t('lblEstart');
$('#lbl-period').textContent = t('lblPeriod');
$('#lbl-paydate').textContent = t('lblPaydate');
$('#lbl-payperiod').textContent = t('lblPayperiod');
$('#lbl-periodFrom').textContent = t('lblPeriodFrom');
$('#lbl-periodTo').textContent = t('lblPeriodTo');
$('#lbl-curr').textContent = t('lblCurr');
$('#lbl-earnings').textContent = t('lblEarnings');
$('#lbl-deductions').textContent = t('lblDeductions');
$('#lbl-addEarning').textContent = t('lblAddEarning');
$('#lbl-addDeduction').textContent = t('lblAddDeduction');

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="window.print()">🖨️ ${t('generate') ? 'Print / Save PDF' : 'Print'}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#previewWrap').scrollIntoView({behavior:'smooth'})">👁️ View</button>
  <button class="gz-btn gz-btn-secondary" onclick="showToast('Use browser print to save as PDF')">ℹ️ PDF</button>`;

renderLineItems();
render();

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🧾', href:'/text/invoice-generator.html', name:'Invoice Generator'},
    {icon:'📄', href:'/text/resume-builder.html', name:'Resume Builder'},
    {icon:'💼', href:'/calc/salary-calculator.html', name:'Salary Calculator'},
    {icon:'💰', href:'/calc/tax-calculator.html', name:'Tax Calculator'},
  ]
});
</script>
