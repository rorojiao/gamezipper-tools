<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "How do I calculate my running pace?", "acceptedAnswer": {"@type": "Answer", "text": "Divide your total time by the distance. For example, if you ran 5 km in 25 minutes, your pace is 25 ÷ 5 = 5 minutes per kilometer. This tool does the math instantly and shows pace per km and per mile."}}, {"@type": "Question", "name": "What is a good running pace?", "acceptedAnswer": {"@type": "Answer", "text": "For recreational runners, a pace of 5:00-6:30 min/km (8:00-10:30 min/mi) is typical. Advanced club runners often run 4:00-5:00 min/km, while elite marathoners average under 3:00 min/km (sub-5 min/mi)."}}, {"@type": "Question", "name": "How do I convert pace to speed?", "acceptedAnswer": {"@type": "Answer", "text": "Speed in km/h equals 60 divided by your pace in min/km. For example, a 5:00 min/km pace equals 60 ÷ 5 = 12 km/h. This tool shows both pace and speed automatically."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="mode-tabs" id="mode-tabs"></div>
    <div id="fields-pace">
      <div class="field-row">
        <div><label id="lbl-dist"></label><input type="number" id="distance" class="gz-input" value="5" step="any" min="0"></div>
        <div><label id="lbl-unit"></label>
          <select id="dist-unit" class="gz-select">
            <option value="km" selected>km</option>
            <option value="mi">miles</option>
            <option value="m">meters</option>
            <option value="marathon">Marathon (42.195 km)</option>
            <option value="half">Half Marathon (21.0975 km)</option>
          </select>
        </div>
        <div><label id="lbl-hrs"></label><input type="number" id="hh" class="gz-input" value="0" min="0" step="any"></div>
        <div><label id="lbl-min"></label><input type="number" id="mm" class="gz-input" value="25" min="0" step="any"></div>
        <div><label id="lbl-sec"></label><input type="number" id="ss" class="gz-input" value="0" min="0" step="any"></div>
      </div>
      <div class="dist-presets" id="dist-presets"></div>
    </div>
    <div id="fields-time" style="display:none">
      <div class="field-row">
        <div><label id="lbl-dist2"></label><input type="number" id="distance2" class="gz-input" value="10" step="any" min="0"></div>
        <div><label id="lbl-unit2"></label>
          <select id="dist-unit2" class="gz-select">
            <option value="km" selected>km</option>
            <option value="mi">miles</option>
          </select>
        </div>
        <div><label id="lbl-pmin"></label><input type="number" id="pace-min" class="gz-input" value="5" min="0" step="any"></div>
        <div><label id="lbl-psec"></label><input type="number" id="pace-sec" class="gz-input" value="0" min="0" max="59" step="any"></div>
        <div><label id="lbl-punit"></label>
          <select id="pace-unit" class="gz-select">
            <option value="km" selected>per km</option>
            <option value="mi">per mile</option>
          </select>
        </div>
      </div>
    </div>
    <div class="result-card" id="result"></div>
    <div class="splits" id="splits"></div>
    <div id="status"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Running Pace Calculator',
    toolDesc: 'Calculate your running pace from distance and time, predict finish times, and convert between pace and speed. Free, browser-only.',
    modePace: 'Pace from Time',
    modeTime: 'Time from Pace',
    distance: 'Distance',
    unit: 'Unit',
    hours: 'Hours',
    mins: 'Minutes',
    secs: 'Seconds',
    paceMin: 'Pace (min)',
    paceSec: 'Pace (sec)',
    perUnit: 'Per',
    step1: 'Pick a mode: calculate pace, or predict finish time',
    step2: 'Enter the distance and your unit (km, miles, marathon)',
    step3: 'Enter the time or the pace you want to maintain',
    step4: 'Read pace, speed and predicted splits instantly',
    resPace: 'Your pace',
    resTime: 'Predicted finish time',
    splits: 'Predicted splits',
  },
  zh: {
    toolTitle: '跑步配速计算器',
    toolDesc: '根据距离和时间计算跑步配速，预测完赛时间，并在配速与速度之间转换。免费、浏览器本地运行。',
    modePace: '由时间算配速',
    modeTime: '由配速算时间',
    distance: '距离',
    unit: '单位',
    hours: '小时',
    mins: '分钟',
    secs: '秒',
    paceMin: '配速（分）',
    paceSec: '配速（秒）',
    perUnit: '每',
    step1: '选择模式：计算配速或预测完赛时间',
    step2: '输入距离和单位（公里、英里、马拉松）',
    step3: '输入时间或你想保持的配速',
    step4: '即时查看配速、速度和分段预测',
    resPace: '你的配速',
    resTime: '预测完赛时间',
    splits: '分段预测',
  }
});

const { $, t } = GZ;
let mode = 'pace';

const UNIT_KM = { km:1, mi:1.609344, m:0.001, marathon:42.195, half:21.0975 };

function distToKm(value, unit) {
  return value * (UNIT_KM[unit] || 1);
}

function formatTime(totalSec) {
  if (!isFinite(totalSec) || totalSec < 0) return '—';
  const h = Math.floor(totalSec / 3600);
  const m = Math.floor((totalSec % 3600) / 60);
  const s = Math.floor(totalSec % 60);
  if (h > 0) return `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  return `${m}:${String(s).padStart(2,'0')}`;
}

function formatPace(secPerKm) {
  if (!isFinite(secPerKm) || secPerKm <= 0) return '—';
  const m = Math.floor(secPerKm / 60);
  const s = Math.round(secPerKm % 60);
  if (s === 60) return `${m+1}:00`;
  return `${m}:${String(s).padStart(2,'0')}`;
}

function calcPace() {
  const dist = parseFloat($('#distance').value);
  const unit = $('#dist-unit').value;
  const h = parseFloat($('#hh').value) || 0;
  const m = parseFloat($('#mm').value) || 0;
  const s = parseFloat($('#ss').value) || 0;
  const totalSec = h * 3600 + m * 60 + s;
  if (!dist || dist <= 0 || totalSec <= 0) {
    $('#result').innerHTML = `<div class="big">—</div><div class="sub">${t('resPace')}</div>`;
    $('#splits').innerHTML = '';
    return;
  }
  const km = distToKm(dist, unit);
  const secPerKm = totalSec / km;
  const secPerMi = secPerKm * 1.609344;
  const kmh = 3600 / secPerKm;
  const mph = kmh / 1.609344;
  $('#result').innerHTML = `
    <div class="big">${formatPace(secPerKm)} /km · ${formatPace(secPerMi)} /mi</div>
    <div class="sub">${t('resPace')} · ${kmh.toFixed(2)} km/h · ${mph.toFixed(2)} mph · ${formatTime(totalSec)} over ${km.toFixed(2)} km</div>`;
  // splits
  const splits = [
    { k: '1 km', v: formatTime(secPerKm) },
    { k: '1 mile', v: formatTime(secPerMi) },
    { k: '5 km', v: formatTime(secPerKm * 5) },
    { k: '10 km', v: formatTime(secPerKm * 10) },
    { k: 'Half Marathon', v: formatTime(secPerKm * 21.0975) },
    { k: 'Marathon', v: formatTime(secPerKm * 42.195) },
  ];
  $('#splits').innerHTML = `<h3>${t('splits')}</h3>` + splits.map(s => `<div class="split-row"><span class="k">${s.k}</span><span class="v">${s.v}</span></div>`).join('');
}

function calcTime() {
  const dist = parseFloat($('#distance2').value);
  const unit = $('#dist-unit2').value;
  const pmin = parseFloat($('#pace-min').value) || 0;
  const psec = parseFloat($('#pace-sec').value) || 0;
  const pUnit = $('#pace-unit').value;
  const paceSec = pmin * 60 + psec;
  if (!dist || dist <= 0 || paceSec <= 0) {
    $('#result').innerHTML = `<div class="big">—</div><div class="sub">${t('resTime')}</div>`;
    $('#splits').innerHTML = '';
    return;
  }
  const km = distToKm(dist, unit);
  // pace per pUnit -> seconds per km
  const secPerKm = pUnit === 'mi' ? paceSec / 1.609344 : paceSec;
  const totalSec = secPerKm * km;
  const kmh = 3600 / secPerKm;
  $('#result').innerHTML = `
    <div class="big">${formatTime(totalSec)}</div>
    <div class="sub">${t('resTime')} · ${formatPace(secPerKm)} /km · ${kmh.toFixed(2)} km/h</div>`;
  const splits = [
    { k: '5 km', v: formatTime(secPerKm * 5) },
    { k: '10 km', v: formatTime(secPerKm * 10) },
    { k: '15 km', v: formatTime(secPerKm * 15) },
    { k: '20 km', v: formatTime(secPerKm * 20) },
    { k: 'Half Marathon', v: formatTime(secPerKm * 21.0975) },
    { k: 'Marathon', v: formatTime(secPerKm * 42.195) },
  ];
  $('#splits').innerHTML = `<h3>${t('splits')}</h3>` + splits.map(s => `<div class="split-row"><span class="k">${s.k}</span><span class="v">${s.v}</span></div>`).join('');
}

function recalc() { mode === 'pace' ? calcPace() : calcTime(); }

function setMode(m) {
  mode = m;
  document.querySelectorAll('.mode-tab').forEach(el => el.classList.toggle('active', el.dataset.mode === m));
  $('#fields-pace').style.display = m === 'pace' ? '' : 'none';
  $('#fields-time').style.display = m === 'time' ? '' : 'none';
  recalc();
}

$('#mode-tabs').innerHTML = `
  <div class="mode-tab active" data-mode="pace">${t('modePace')}</div>
  <div class="mode-tab" data-mode="time">${t('modeTime')}</div>`;
document.querySelectorAll('.mode-tab').forEach(el => el.onclick = () => setMode(el.dataset.mode));

const DIST_PRESETS = [
  { label: '5K', dist: 5, unit: 'km' },
  { label: '10K', dist: 10, unit: 'km' },
  { label: 'Half', dist: 21.0975, unit: 'km' },
  { label: 'Marathon', dist: 42.195, unit: 'km' },
  { label: '1 mi', dist: 1, unit: 'mi' },
];
const dpRow = $('#dist-presets');
DIST_PRESETS.forEach(p => {
  const btn = document.createElement('div');
  btn.className = 'dist-btn';
  btn.textContent = p.label;
  btn.onclick = () => { $('#distance').value = p.dist; $('#dist-unit').value = p.unit; recalc(); };
  dpRow.appendChild(btn);
});

['distance','dist-unit','hh','mm','ss','distance2','dist-unit2','pace-min','pace-sec','pace-unit'].forEach(id => {
  const el = $('#' + id);
  if (el) el.addEventListener('input', recalc);
});

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🏃', href:'/calc/race-time-predictor.html', name:'Race Time Predictor'},
    {icon:'🔢', href:'/calc/percentage-calculator.html', name:'Percentage'},
    {icon:'📏', href:'/convert/unit.html', name:'Unit Converter'},
    {icon:'⚖️', href:'/calc/bmi-calculator.html', name:'BMI Calculator'},
  ]
});

recalc();
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
