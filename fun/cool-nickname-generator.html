<script>
GZI18n.register({
  en: {
    toolTitle: 'Cool Nickname Generator',
    toolDesc: 'Generate cool nicknames, gamer tags and screen names instantly. Pick a style — cool, cute, edgy, fantasy, gaming or kawaii — add an optional keyword, and get 20 fresh ideas every click. Perfect for Discord, Xbox, PSN, Steam, Roblox and TikTok. Free, no signup.',
    styleCool: '😎 Cool',
    styleCute: '🥰 Cute',
    styleEdgy: '😈 Edgy',

    btnGen: 'Generate 20 names',
    btnClear: 'Clear',
    copied: 'Copied!',
    step1: 'Pick a style — Cool, Cute, Edgy, Fantasy, Gaming or Kawaii',
    step2: 'Optionally add a keyword to personalize the names',
    step3: 'Click Generate to get 20 fresh nickname ideas',
    step4: 'Click the copy icon next to any name to grab it',
  },
  zh: {
    toolTitle: '酷炫昵称生成器',
    toolDesc: '即时生成酷炫昵称、游戏 ID 和网名。选择风格 — 酷炫、可爱、暗黑、奇幻、游戏或卡哇伊 — 可添加关键词，每次点击获得 20 个全新创意。适合 Discord、Xbox、PSN、Steam、Roblox 和 TikTok。免费、无需注册。',
    styleCool: '😎 酷炫',
    styleCute: '🥰 可爱',
    styleEdgy: '😈 暗黑',
    styleFantasy: '🧙 奇幻',
    styleGaming: '🎮 游戏',
    styleKawaii: '🌸 卡哇伊',
    lblKeyword: '可选关键词（你的名字、爱好、动物…）',
    phKeyword: '例如：dragon',
    lblLength: '长度',
    optAny: '任意',
    optShort: '短（≤8）',
    optLong: '长（9+）',
    btnGen: '生成 20 个昵称',
    btnClear: '清空',
    copied: '已复制！',
    step1: '选择风格 — 酷炫、可爱、暗黑、奇幻、游戏或卡哇伊',
    step2: '可选添加关键词个性化你的昵称',
    step3: '点击「生成」获得 20 个全新昵称创意',
    step4: '点击任意昵称旁的复制按钮即可获取',
  }
});

const { $, t, showToast } = GZ;

// Word banks per style — {adj, noun, suffix}
const BANKS = {
  cool: {
    adj: ['Neon','Shadow','Silver','Crimson','Frost','Storm','Steel','Iron','Golden','Cosmic','Velvet','Silent','Wild','Electric','Midnight','Solar','Lunar','Toxic','Phantom','Diamond'],
    noun: ['Wolf','Viper','Falcon','Blade','Knight','Rider','Hawk','Tiger','Panther','Specter','Striker','Phoenix','Reaper','Raven','Hunter','Samurai','Nomad','Saber','Rogue','Spectre'],
    suffix: ['X','Z','99','007','Prime','Xx','_HD','','',''],
  },
  cute: {
    adj: ['Sweet','Sunny','Bubbly','Sparkly','Honey','Cupcake','Peachy','Fluffy','Berry','Butter','Cherry','Coco','Mochi','Toasty','Lucky','Daisy','Pixie','Minty','Honey','Sugar'],
    noun: ['Bear','Bunny','Kitten','Panda','Puppy','Muffin','Star','Cloud','Petal','Bee','Fox','Owl','Fish','Fawn','Koala','Otter','Bird','Peach','Cookie','Donut'],
    suffix: ['','-chan','pie','kins','ling','boo','-boo','let','',''],
  },
  edgy: {
    adj: ['Black','Cursed','Void','Bloody','Wicked','Crimson','Dark','Fallen','Broken','Rotten','Savage','Toxic','Vile','Grim','Hollow','Sinister','Vengeful','Nightmarish','Demonic','Venom'],
    noun: ['Reaper','Wraith','Shadow','Phantom','Demon','Specter','Outcast','Rogue','Sinner','Venom','Bane','Scythe','Tomb','Husk','Vortex','Abyss','Hex','Soul','Grave','Thorn'],
    suffix: ['666','X','Xx','_XX','_', '0', '','','',''],
  },
  fantasy: {
    adj: ['Eldrin','Aeris','Moon','Star','Sun','Frost','Ember','Storm','Silver','Crystal','Dragon','Elf','Rune','Thorn','Wolf','Raven','Iron','Mithril','Celestial','Ancient'],
    noun: ['blade','heart','weaver','caster','stride','song','born','walker','bane','soul','wing','shield','fall','watcher','caller','seer','warden','forge','heart','song'],
    suffix: ['','of Avalon','the Wise','the Brave','the Great','','','','',''],
  },
  gaming: {
    adj: ['Pro','Epic','OG','Elite','Turbo','Hyper','Mega','Cyber','Pixel','Loot','Sweat','NoScope','Sniper','Vortex','Critical','Combo','Ace','Pro','Rapid','Stealth'],
    noun: ['Gamer','Player','Hunter','Slayer','Sniper','Striker','Rusher','Carry','Boss','King','Queen','Lord','Legend','Ninja','Ghost','Ace','Pro','Warden','Hunter','Master'],
    suffix: ['TTV','YT','_YT','_TTV','TV','99','xX','','',''],
  },
  kawaii: {
    adj: ['Kawaii','Sakura','Mochi','Bento','Hoshi','Yuki','Suzu','Kiri','Hana','Usagi','Kitty','Bunny','Pastel','Bubble','Marshmallow','Strawberry','Creamy','Sparkle','Dreamy','Sweet'],
    noun: ['chan','san','tan','pyon','nyan','hime','kohai','senpai','usagi','neko','inu','kitsune','tsubaki','sakura','hana','hoshi','tsuki','ame','yume','uta'],
    suffix: ['-chan','-san','-tan','-hime','~','-nyan','~chan','♥','','',''],
  },
};

let style = 'cool';

// Build style tabs
const styles = [
  { id: 'cool', key: 'styleCool' },
  { id: 'cute', key: 'styleCute' },
  { id: 'edgy', key: 'styleEdgy' },
  { id: 'fantasy', key: 'styleFantasy' },
  { id: 'gaming', key: 'styleGaming' },
  { id: 'kawaii', key: 'styleKawaii' },
];
$('#style-tabs').innerHTML = styles.map(s => `<button data-id="${s.id}" class="${s.id===style?'active':''}">${t(s.key)}</button>`).join('');
document.querySelectorAll('#style-tabs button').forEach(b => {
  b.addEventListener('click', () => {
    document.querySelectorAll('#style-tabs button').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    style = b.dataset.id;
    generate();
  });
});

// Labels
$('#lbl-keyword').textContent = t('lblKeyword');
$('#keyword').placeholder = t('phKeyword');
$('#lbl-length').textContent = t('lblLength');
$('#opt-any').textContent = t('optAny');
$('#opt-short').textContent = t('optShort');
$('#opt-long').textContent = t('optLong');
$('#btn-gen').textContent = t('btnGen');
$('#btn-clear').textContent = t('btnClear');

function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function capitalize(s) { return s ? s.charAt(0).toUpperCase() + s.slice(1) : s; }

function makeName(bank, kw, lengthFilter) {
  // Try patterns until one matches the length filter
  for (let tries = 0; tries < 8; tries++) {
    let name;
    const pattern = Math.floor(Math.random() * 6);
    const kwClean = (kw || '').trim();
    if (pattern === 0 && kwClean) name = capitalize(kwClean) + pick(bank.noun);
    else if (pattern === 1 && kwClean) name = pick(bank.adj) + capitalize(kwClean);
    else if (pattern === 2) name = pick(bank.adj) + pick(bank.noun);
    else if (pattern === 3) name = pick(bank.noun) + pick(bank.suffix);
    else if (pattern === 4) name = pick(bank.adj) + pick(bank.noun) + pick(bank.suffix);
    else name = pick(bank.adj) + pick(bank.noun);

    // Strip non-alphanumerics for length test (keep visual letters only)
    const len = name.replace(/[^A-Za-z0-9]/g, '').length;
    if (lengthFilter === 'short' && len > 8) continue;
    if (lengthFilter === 'long' && len < 9) continue;
    return name;
  }
  return pick(bank.adj) + pick(bank.noun);
}

function generate() {
  const kw = $('#keyword').value;
  const lengthFilter = $('#length').value;
  const bank = BANKS[style];
  const seen = new Set();
  const names = [];
  let safety = 0;
  while (names.length < 20 && safety < 200) {
    const n = makeName(bank, kw, lengthFilter);
    if (!seen.has(n.toLowerCase())) { seen.add(n.toLowerCase()); names.push(n); }
    safety++;
  }
  const html = names.map(n => `
    <div class="nn-card">
      <span class="name">${n.replace(/</g,'&lt;')}</span>
      <button data-name="${n.replace(/"/g,'&quot;')}" title="copy">📋</button>
    </div>`).join('');
  $('#grid').innerHTML = html || `<div class="nn-empty">No names — try a different style or length.</div>`;
  document.querySelectorAll('#grid .nn-card button').forEach(b => {
    b.addEventListener('click', async () => {
      const v = b.dataset.name.replace(/&quot;/g,'"').replace(/&lt;/g,'<');
      try { await navigator.clipboard.writeText(v); showToast(t('copied')); }
      catch(e) { showToast(t('copied')); }
    });
  });
}

$('#btn-gen').addEventListener('click', generate);
$('#btn-clear').addEventListener('click', () => {
  $('#keyword').value = '';
  $('#length').value = 'any';
  generate();
});
$('#keyword').addEventListener('input', generate);
$('#length').addEventListener('change', generate);

generate();

GZ.renderToolPage(
    {icon:'🎯', href:'/fun/spin-the-wheel.html', name:'Spin the Wheel'},
    {icon:'👾', href:'/fun/wordle.html', name:'Wordle'},
    {icon:'🪙', href:'/fun/coin-flipper.html', name:'Coin Flipper'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
