<script>
GZI18n.register({
  en: {
    toolTitle: 'PNG to JPG Converter',
    toolDesc: 'Convert PNG images to JPG format. Reduces file size, supports batch conversion, custom transparency background, quality slider and resizing. Runs entirely in your browser — no upload.',
    dropText: 'Drop PNG images here, paste, or click to select',
    quality: 'JPG quality',
    background: 'Background for transparency',
    resize: 'Resize',
    convert: 'Convert to JPG',
    dlAll: 'Download All',
    files: 'Files',
    inputSize: 'Input size',
    outputSize: 'Output size',
    reduction: 'Reduction',
    statusReady: 'Ready to convert',
    statusConverting: 'Converting…',
    statusDone: 'All done!',
    empty: 'No files yet',
    step1: 'Drop or select one or more PNG (or WebP) images',
    step2: 'Pick a background color to replace transparency, adjust quality and resize',
    step3: 'Press Convert — the tool processes everything in your browser',
    step4: 'Click Download on each result, or Download All to save them',
  },
  zh: {
    toolTitle: 'PNG 转 JPG 转换器',
    toolDesc: '将 PNG 图片转换为 JPG 格式。支持批量转换、自定义透明背景色、质量调节和缩放。完全浏览器本地运行 — 无需上传。',
    dropText: '拖入 PNG 图片、粘贴或点击选择',
    quality: 'JPG 质量',
    background: '透明区域背景色',
    resize: '调整尺寸',
    convert: '转换为 JPG',
    dlAll: '全部下载',
    files: '文件',
    inputSize: '原始大小',
    outputSize: '输出大小',
    reduction: '减小',
    statusReady: '准备转换',
    statusConverting: '正在转换…',
    statusDone: '全部完成！',
    empty: '暂无文件',
    step1: '拖入或选择一个或多个 PNG（也支持 WebP）',
    step2: '选择透明区域的背景色，调整质量和尺寸',
    step3: '点击转换 — 工具在浏览器中处理所有图片',
    step4: '点击每张图片下载，或点击「全部下载」',
  }
});

const { $, t, showToast } = GZ;
const dropzone = $('#dropzone');
const fileIn = $('#fileIn');
const qualityIn = $('#quality');
const bgColorIn = $('#bgColor');
const bgHexIn = $('#bgHex');
const resizeIn = $('#resize');
const convertBtn = $('#convertBtn');
const dlAllBtn = $('#dlAllBtn');
const list = $('#list');
const tiles = $('#tiles');
const summary = $('#summary');

document.getElementById('lblQuality').textContent = t('quality');
document.getElementById('lblBg').textContent = t('background');
document.getElementById('lblResize').textContent = t('resize');
document.getElementById('lblConvert').textContent = t('convert');
document.getElementById('lblDlAll').textContent = t('dlAll');
document.getElementById('dropText').textContent = t('dropText');
document.getElementById('qualityVal').textContent = qualityIn.value + '%';

qualityIn.addEventListener('input', () => document.getElementById('qualityVal').textContent = qualityIn.value + '%');
bgColorIn.addEventListener('input', () => { bgHexIn.value = bgColorIn.value.toUpperCase(); });
bgHexIn.addEventListener('change', () => {
  let v = bgHexIn.value.trim();
  if (!v.startsWith('#')) v = '#' + v;
  if (/^#[0-9a-fA-F]{6}$/.test(v)) bgColorIn.value = v;
});
document.getElementById('whiteBtn').addEventListener('click', () => { bgColorIn.value = '#ffffff'; bgHexIn.value = '#FFFFFF'; });
document.getElementById('blackBtn').addEventListener('click', () => { bgColorIn.value = '#000000'; bgHexIn.value = '#000000'; });

['dragenter','dragover'].forEach(ev => dropzone.addEventListener(ev, e => { e.preventDefault(); dropzone.classList.add('dragover'); }));
['dragleave','drop'].forEach(ev => dropzone.addEventListener(ev, e => { e.preventDefault(); dropzone.classList.remove('dragover'); }));
dropzone.addEventListener('drop', e => { if (e.dataTransfer.files.length) addFiles(Array.from(e.dataTransfer.files)); });
fileIn.addEventListener('change', e => { if (e.target.files.length) addFiles(Array.from(e.target.files)); });
convertBtn.addEventListener('click', convertAll);
dlAllBtn.addEventListener('click', downloadAll);

let queue = []; // {file, blob, jpgBlob, thumb, inSize, outSize}

function addFiles(files) {
  for (const f of files) {
    if (!/^image\/(png|webp)$/i.test(f.type)) continue;
    queue.push({ file: f, blob: f, jpgBlob: null, thumb: null, inSize: f.size, outSize: 0 });
  }
  renderList();
  convertBtn.disabled = queue.length === 0;
  dlAllBtn.style.display = 'none';
  summary.textContent = queue.length + ' ' + t('files');
}

function renderList() {
  if (!queue.length) { list.innerHTML = '<p style="text-align:center;color:var(--text2);padding:20px">' + t('empty') + '</p>'; tiles.innerHTML = ''; return; }
  list.innerHTML = queue.map((q, i) => `
    <div class="pj-item" data-i="${i}">
      <img src="${q.thumb || URL.createObjectURL(q.blob)}" alt="">
      <div class="pj-name">${q.file.name}</div>
      <div class="pj-sizes">${formatBytes(q.inSize)} → ${q.outSize ? formatBytes(q.outSize) : '—'}</div>
      ${q.jpgBlob ? `<a class="pj-dl" download="${baseName(q.file.name)}.jpg" data-i="${i}">💾 JPG</a>` : '<span style="font-size:.7rem;color:var(--text2)">…</span>'}
    </div>
  `).join('');
  list.querySelectorAll('a.pj-dl').forEach(a => a.addEventListener('click', e => {
    e.preventDefault();
    const i = parseInt(a.dataset.i);
    const q = queue[i];
    if (!q.jpgBlob) return;
    const url = URL.createObjectURL(q.jpgBlob);
    const link = document.createElement('a');
    link.href = url; link.download = baseName(q.file.name) + '.jpg';
    document.body.appendChild(link); link.click(); link.remove();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  }));
}

function baseName(name) { return name.replace(/\.[^.]+$/, ''); }
function formatBytes(b) {
  if (b == null) return '—';
  if (b < 1024) return b + ' B';
  if (b < 1048576) return (b / 1024).toFixed(1) + ' KB';
  return (b / 1048576).toFixed(2) + ' MB';
}

function loadImage(blob) {
  return new Promise((res, rej) => {
    const url = URL.createObjectURL(blob);
    const img = new Image();
    img.onload = () => { res({img, url}); };
    img.onerror = () => { URL.revokeObjectURL(url); rej(new Error('Image load failed')); };
    img.src = url;
  });
}

function makeThumb(blob) {
  return new Promise(res => {
    loadImage(blob).then(({img, url}) => {
      const canvas = document.createElement('canvas');
      const max = 96;
      const scale = Math.min(1, max / Math.max(img.naturalWidth, img.naturalHeight));
      canvas.width = Math.round(img.naturalWidth * scale);
      canvas.height = Math.round(img.naturalHeight * scale);
      canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
      URL.revokeObjectURL(url);
      res(canvas.toDataURL('image/png'));
    }).catch(() => res(''));
  });
}

async function convertAll() {
  if (!queue.length) return;
  convertBtn.disabled = true;
  summary.textContent = t('statusConverting');
  const q = parseFloat(qualityIn.value) / 100;
  const bg = bgColorIn.value;
  const scale = parseFloat(resizeIn.value);

  // Generate thumbs first
  for (const item of queue) {
    if (!item.thumb) item.thumb = await makeThumb(item.blob);
  }
  renderList();

  let totalIn = 0, totalOut = 0;
  for (let i = 0; i < queue.length; i++) {
    const item = queue[i];
    try {
      const { img, url } = await loadImage(item.blob);
      URL.revokeObjectURL(url);
      const canvas = document.createElement('canvas');
      const w = Math.max(1, Math.round(img.naturalWidth * scale));
      const h = Math.max(1, Math.round(img.naturalHeight * scale));
      canvas.width = w; canvas.height = h;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = bg;
      ctx.fillRect(0, 0, w, h);
      ctx.drawImage(img, 0, 0, w, h);
      const blob = await new Promise((res) => canvas.toBlob(res, 'image/jpeg', q));
      item.jpgBlob = blob;
      item.outSize = blob.size;
      totalIn += item.inSize;
      totalOut += item.outSize;
      renderList();
    } catch (e) {
      console.error(e);
    }
  }

  const totalSaved = totalIn - totalOut;
  const pct = totalIn > 0 ? ((totalSaved / totalIn) * 100).toFixed(1) : '0';
  tiles.innerHTML = `
    <div class="pj-tile"><div class="num">${queue.length}</div><div class="lbl">${t('files')}</div></div>
    <div class="pj-tile"><div class="num">${formatBytes(totalIn)}</div><div class="lbl">${t('inputSize')}</div></div>
    <div class="pj-tile"><div class="num">${formatBytes(totalOut)}</div><div class="lbl">${t('outputSize')}</div></div>
    <div class="pj-tile"><div class="num">${pct}%</div><div class="lbl">${t('reduction')}</div></div>
  `;
  summary.textContent = t('statusDone') + ' — ' + formatBytes(totalSaved) + ' ' + t('reduction');
  dlAllBtn.style.display = queue.every(x => x.jpgBlob) ? 'inline-block' : 'none';
  convertBtn.disabled = false;
}

function downloadAll() {
  if (queue.length === 1) {
    const q = queue[0];
    if (!q.jpgBlob) return;
    const url = URL.createObjectURL(q.jpgBlob);
    const a = document.createElement('a');
    a.href = url; a.download = baseName(q.file.name) + '.jpg';
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
    return;
  }
  // Trigger downloads one by one (browsers may block)
  queue.forEach((q, i) => {
    setTimeout(() => {
      if (!q.jpgBlob) return;
      const url = URL.createObjectURL(q.jpgBlob);
      const a = document.createElement('a');
      a.href = url; a.download = baseName(q.file.name) + '.jpg';
      document.body.appendChild(a); a.click(); a.remove();
      setTimeout(() => URL.revokeObjectURL(url), 1000);
    }, i * 250);
  });
}

GZ.renderToolPage({
  category: 'convert',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🖼️', href:'/convert/webp-converter.html', name:'WebP Converter'},
    {icon:'🖼️', href:'/image/converter.html', name:'Image Converter'},
    {icon:'📦', href:'/image/jpg-compressor.html', name:'Compress JPG'},
    {icon:'🖼️', href:'/convert/base64-to-image.html', name:'Base64 to Image'},
  ]
});
</script>
