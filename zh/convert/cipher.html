<script>
GZI18n.register({
  en: {
    toolTitle: 'ROT13 & Caesar Cipher',
    toolDesc: 'Encode and decode text using ROT13, Caesar cipher, or any custom shift. Works for letters, digits and symbols.',
    step1: 'Enter or paste your text in the input field',
    step2: 'Set the shift value or click a preset like ROT13',

  zh: {
    toolTitle: 'ROT13 / 凯撒密码',
    toolDesc: '使用 ROT13、凯撒密码或自定义偏移量对文本进行编码和解码，支持字母、数字和符号。',
    step1: '在输入框中输入或粘贴文本',
    step2: '设置偏移量或点击 ROT13 等预设按钮',
    step3: '根据需要切换数字、符号和大小写保留选项',
    step4: '结果自动更新，点击「复制」按钮即可复制',
  }
});

const { $, copyText, t } = GZ;

function setShift(n) {
  $('#shift').value = n;
  doTransform();
}

function doTransform() {
  const text = $('#input').value;
  if (!text) { $('#output').value = ''; $('#shiftInfo').innerHTML = ''; return; }
  const shift = parseInt($('#shift').value) || 0;
  const shiftDigits = $('#shiftDigits').checked;
  const shiftSymbols = $('#shiftSymbols').checked;
  const preserveCase = $('#preserveCase').checked;

  const result = caesarTransform(text, shift, { shiftDigits, shiftSymbols, preserveCase });
  $('#output').value = result;

  const preview = caesarTransform('ABCXYZabcxyz', shift, { shiftDigits, shiftSymbols, preserveCase });
  $('#shiftInfo').innerHTML = `<b>Shift ${shift}:</b> A→${preview.charAt(0)}, Z→${preview.charAt(2)}, a→${preview.charAt(6)}, z→${preview.charAt(8)}` + (shift === 13 ? ' <i style="opacity:.7">(self-inverse — same operation decodes)</i>' : '');
}

function caesarTransform(text, shift, opts) {
  const { shiftDigits, shiftSymbols, preserveCase } = opts;
  return text.split('').map(ch => {
    const code = ch.charCodeAt(0);

    // A-Z
    if (code >= 65 && code <= 90) {
      const s = ((code - 65 + shift) % 26 + 26) % 26;
      const newCode = 65 + s;
      return preserveCase ? String.fromCharCode(newCode) : String.fromCharCode(newCode).toLowerCase();
    }
    // a-z
    if (code >= 97 && code <= 122) {
      const s = ((code - 97 + shift) % 26 + 26) % 26;
      const newCode = 97 + s;
      return preserveCase ? String.fromCharCode(newCode) : String.fromCharCode(newCode).toUpperCase();
    }
    // 0-9
    if (code >= 48 && code <= 57 && shiftDigits) {
      const s = ((code - 48 + shift) % 10 + 10) % 10;
      return String.fromCharCode(48 + s);
    }
    // printable symbols 33-47, 58-64, 91-96, 123-126
    if (shiftSymbols && (
      (code >= 33 && code <= 47) ||
      (code >= 58 && code <= 64) ||
      (code >= 91 && code <= 96) ||
      (code >= 123 && code <= 126)
    )) {
      // Build a contiguous pool of printable symbol ranges
      const pools = [[33,47],[58,64],[91,96],[123,126]];
      let flat = '';
      for (const [s, e] of pools) for (let i = s; i <= e; i++) flat += String.fromCharCode(i);
      const idx = flat.indexOf(ch);
      if (idx >= 0) {
        const newIdx = ((idx + shift) % flat.length + flat.length) % flat.length;
        return flat.charAt(newIdx);
      }
    }
    return ch;
  }).join('');
}

['#input','#shift','#shiftDigits','#shiftSymbols','#preserveCase'].forEach(sel => {
  document.querySelector(sel).addEventListener('input', doTransform);
  document.querySelector(sel).addEventListener('change', doTransform);
});

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="doTransform()">${t('convert')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#input').value='';$('#output').value=''">${t('clear')}</button>
  <button class="gz-btn" onclick="copyText($('#output').value)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="swapIO()">⇅ Swap</button>`;

function swapIO() { $('#input').value = $('#output').value; doTransform(); }

});
