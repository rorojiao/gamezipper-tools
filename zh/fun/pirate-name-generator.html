<script>
GZI18n.register({
  en: {
    toolTitle: 'Pirate Name Generator',
    toolDesc: 'Create swashbuckling pirate names — Captain, Blackbeard, One-Eyed, Old and more. Pick a style (Captain, Scallywag, Dread Pirate) and get 20 unique names every click. Free, private, no signup.',
    sCaptain: '🏴‍☠️ Captain', sScallywag: '🦜 Scallywag', sDread: '💀 Dread Pirate', sRandom: '🎲 Random',
    btnGen: 'Generate 20 names',
    btnCopy: 'Copy All',
    copied: 'Copied!',
    step1: 'Pick a style — Captain, Scallywag, Dread Pirate or Random',
    step2: 'Click Generate to spin up 20 unique pirate names',
    step3: 'Tap the copy icon on any name to grab it',
    step4: 'Click Copy All to grab the full list at once',
  },
  zh: {
    toolTitle: '海盗名字生成器',
    toolDesc: '生成惊险的海盗名字 — Captain、Blackbeard、One-Eyed、Old 等。选择风格（船长、小喽啰、恐怖海盗），每次点击获得 20 个独特的名字。免费、私密、无需注册。',
    sCaptain: '🏴‍☠️ 船长', sScallywag: '🦜 小喽啰', sDread: '💀 恐怖海盗', sRandom: '🎲 随机',
    btnGen: '生成 20 个名字',
    btnCopy: '全部复制',
    copied: '已复制！',
    step1: '选择风格 — 船长、小喽啰、恐怖海盗或随机',
    step2: '点击「生成」获得 20 个独特的海盗名字',
    step3: '点击任意名字旁的复制按钮即可获取',
    step4: '点击「全部复制」一次性获取整个列表',
  }
});

const { $, t, showToast } = GZ;
const pick = a => a[Math.floor(Math.random() * a.length)];

const FIRST = ['Jack','Anne','Calico','Edward','Mary','Henry','Long','Black','Old','One-Eyed','Mad','Crazy','Bloody','Rum','Peg-Leg','Iron','Crooked','Whiskers','Barnacle','Cutlass','Davy','Gully','Hatchet','Jolly','Kraken','Marooned','Ned','Patch','Quartermaster','Rusty','Salty','Toothless','Vane','Wicked','Yarr','Zeb'];
const LAST = ['Silver','Blackbeard','Hook','Sparrow','Flint','Morgan','Kidd','Roberts','Teach','Bonny','Read','Drake','Hornigold','Vane','Bellamy','LeVasseur','Calleja','Cornelius','Spain','Ironhand','Silverhook','Razorback','Stormbeard','Darkwater','Saltlick','Goldsail','Bloodtide','Crowley','Marrow','Driftwood'];
const EPITHET = ['the Black','the Cruel','the Mad','the Drowned','the feared','the bloodthirsty','the relentless','the cursed','the Scourge','the Plunderer','the Cutthroat','the Wretched','the Marooned','the Forgotten','the Dread','the Merciless'];
const SHIP = ['The Black Pearl','Queen Anne','The Jolly Roger','The Flying Dutchman','The Crimson Tide','The Sea Wolf','The Dead Reckoning','The Howling Gull','The Siren\'s Curse','The Devil\'s Anchor'];

function makeName(style) {
  const r = Math.random();
  if (style === 'captain' || (style === 'random' && r < 0.45)) {
    return 'Captain ' + pick(FIRST) + ' ' + pick(LAST);
  }
  if (style === 'scallywag' || (style === 'random' && r < 0.7)) {
    return pick(FIRST) + ' ' + pick(LAST);
  }
  // dread pirate
  return pick(FIRST) + ' ' + pick(LAST) + ', ' + pick(EPITHET);
}

let style = 'captain';
const STYLES = [
  {id:'captain',key:'sCaptain'},{id:'scallywag',key:'sScallywag'},{id:'dread',key:'sDread'},{id:'random',key:'sRandom'},
];
$('#style-tabs').innerHTML = STYLES.map(s => `<button data-id="${s.id}" class="${s.id===style?'active':''}">${t(s.key)}</button>`).join('');
document.querySelectorAll('#style-tabs button').forEach(b => {
  b.addEventListener('click', () => {
    document.querySelectorAll('#style-tabs button').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    style = b.dataset.id;
    generate();
  });
});

function generate() {
  const seen = new Set();
  const names = [];
  let safety = 0;
  while (names.length < 20 && safety < 400) {
    const n = makeName(style).replace(/\s+/g,' ').trim();
    if (!seen.has(n)) { seen.add(n); names.push(n); }
    safety++;
  }
  $('#grid').innerHTML = names.map(n => `
    <div class="pn-card">
      <span class="name">${n.replace(/</g,'&lt;')}<span class="role">⛵ ${style}</span></span>
      <button data-name="${n.replace(/"/g,'&quot;')}" title="copy">📋</button>
    </div>`).join('');
  document.querySelectorAll('#grid .pn-card button').forEach(b => {
    b.addEventListener('click', async () => {
      try { await navigator.clipboard.writeText(b.dataset.name.replace(/&quot;/g,'"')); showToast(t('copied')); }
      catch (e) { showToast(t('copied')); }
    });
  });
}

function copyAll() {
  const names = [...document.querySelectorAll('#grid .pn-card .name')].map(e => e.firstChild.textContent.trim());
  if (!names.length) return;
  navigator.clipboard.writeText(names.join('\n')).then(() => showToast(t('copied'))).catch(() => showToast(t('copied')));
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="generate()">🏴‍☠️ ${t('btnGen')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="copyAll()">📋 ${t('btnCopy')}</button>`;

generate();

GZ.renderToolPage({
  category: 'fun',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],

    {icon:'🐉', href:'/fun/fantasy-name-generator.html', name:'Fantasy Name Generator'},
    {icon:'😎', href:'/fun/cool-nickname-generator.html', name:'Cool Nickname Generator'},
  ]
});
</script>
