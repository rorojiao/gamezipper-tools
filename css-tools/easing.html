<script>
GZI18n.register({
  en: {
    toolTitle: 'CSS Easing Function Generator',
    toolDesc: 'Design CSS cubic-bezier() and steps() easing functions visually with a live animated preview. Drag the control points, copy the CSS, and apply it to transition or animation. 100% in your browser.',
    modeCubic: 'cubic-bezier()',
    modeSteps: 'steps()',
    copy: 'Copy CSS',
    play: '▶ Play',
    lblX1: 'P1 (x, y)',
    lblX2: 'P2 (x, y)',
    lblStepN: 'Step count',
    lblJump: 'Jump term',
    lblDur: 'Duration',
    cubic: 'cubic-bezier',
    outOfRange: 'x must be 0–1; y can be any value',
    step1: 'Pick cubic-bezier() or steps() mode at the top',
    step2: 'For cubic-bezier, drag the two control handles on the graph — or click a preset',
    step3: 'For steps, choose the count and the jump term',
    step4: 'Click Copy CSS to grab the value and paste into your transition or animation',
    notes: 'Tip: pull y1 or y2 above 1 or below 0 for overshoot/bounce. x stays in 0–1.',
  },
  zh: {
    toolTitle: 'CSS 缓动函数生成器',
    toolDesc: '可视化设计 CSS cubic-bezier() 和 steps() 缓动函数，带实时动画预览。拖动控制点，复制 CSS，应用到 transition 或 animation。100% 浏览器本地运行。',
    modeCubic: 'cubic-bezier()',
    modeSteps: 'steps()',
    copy: '复制 CSS',
    play: '▶ 播放',
    lblX1: 'P1 (x, y)',
    lblX2: 'P2 (x, y)',
    lblStepN: '步数',
    lblJump: '跳跃项',
    lblDur: '时长',
    cubic: 'cubic-bezier',
    outOfRange: 'x 必须在 0–1；y 可为任意值',
    step1: '在顶部选择 cubic-bezier() 或 steps() 模式',
    step2: 'cubic-bezier 模式：拖动图上的两个控制点，或点击预设',
    step3: 'steps 模式：选择步数和跳跃项',
    step4: '点击「复制 CSS」获取数值，粘贴到 transition 或 animation',
    notes: '提示：将 y1 或 y2 设为大于 1 或小于 0 可产生过冲/弹跳效果。x 必须在 0–1。',
  }
});

const { $, copyText, t } = GZ;
let mode = 'cubic';
// state: P1 = (x1, y1), P2 = (x2, y2)
let p = { x1:0.25, y1:0.1, x2:0.25, y2:1.0 };

const PRESETS = [
  {name:'linear', val:'linear'},
  {name:'ease', val:'cubic-bezier(.25,.1,.25,1)'},
  {name:'ease-in', val:'cubic-bezier(.42,0,1,1)'},
  {name:'ease-out', val:'cubic-bezier(0,0,.58,1)'},
  {name:'ease-in-out', val:'cubic-bezier(.42,0,.58,1)'},
  {name:'in-quad', val:'cubic-bezier(.55,.085,.68,.53)'},
  {name:'out-quad', val:'cubic-bezier(.25,.46,.45,.94)'},
  {name:'in-back', val:'cubic-bezier(.6,-.28,.735,.045)'},
  {name:'out-back', val:'cubic-bezier(.175,.885,.32,1.275)'},
  {name:'in-out-back', val:'cubic-bezier(.68,-.55,.265,1.55)'},
  {name:'in-elastic', val:'cubic-bezier(.6,.05,.2,1.5)'},
  {name:'out-elastic', val:'cubic-bezier(.2,-0.4,.4,1.4)'},
  {name:'sharp', val:'cubic-bezier(.9,.1,.1,.9)'},
  {name:'steps-4', val:'steps(4, jump-end)'},
  {name:'steps-8', val:'steps(8, jump-end)'},
];

const W = 320, PAD = 40;
const MAX_Y = 1.5; // visible y range -1.5..1.5

function dataToSvg(x, y){
  // x: 0..1 -> PAD .. W-PAD
  const sx = PAD + x * (W - 2*PAD);
  // y: map -MAX_Y..MAX_Y  (invert because SVG y grows down, output 0..1 at top)
  const sy = PAD + (1 - (y + MAX_Y)/(2*MAX_Y)) * (W - 2*PAD);
  return [sx, sy];
}
function svgToData(sx, sy){
  const x = (sx - PAD) / (W - 2*PAD);
  const y = (MAX_Y - (sy - PAD) / (W - 2*PAD) * 2*MAX_Y);
  return [x, y];
}

function draw(){
  const svg = $('#svg');
  const lines = [];
  // grid
  for(let i=0;i<=4;i++){
    const [, sy] = dataToSvg(0, -MAX_Y + i*MAX_Y); // y grid lines
    lines.push(`<line class="grid" x1="${PAD}" y1="${PAD + i*(W-2*PAD)/4}" x2="${W-PAD}" y2="${PAD + i*(W-2*PAD)/4}"/>`);
    lines.push(`<line class="grid" x1="${PAD + i*(W-2*PAD)/4}" y1="${PAD}" x2="${PAD + i*(W-2*PAD)/4}" y2="${W-PAD}"/>`);
  }
  // axes labels for 0/1
  // curve or steps
  let curvePath = '';
  if(mode === 'cubic'){
    // sample the bezier curve at the control points
    const [p0x,p0y] = dataToSvg(0,0);
    const [p1x,p1y] = dataToSvg(p.x1, p.y1);
    const [p2x,p2y] = dataToSvg(p.x2, p.y2);
    const [p3x,p3y] = dataToSvg(1,1);
    // build path using many samples for accuracy
    let d = '';
    const N = 80;
    for(let i=0;i<=N;i++){
      const u = i/N;
      const x = 3*(1-u)*(1-u)*u*p.x1 + 3*(1-u)*u*u*p.x2 + u*u*u;
      const y = 3*(1-u)*(1-u)*u*p.y1 + 3*(1-u)*u*u*p.y2 + u*u*u;
      const [sx, sy] = dataToSvg(x, y);
      d += (i===0?`M`:`L`) + sx.toFixed(1) + ' ' + sy.toFixed(1) + ' ';
    }
    curvePath = `<path class="curve" d="${d}"/>`;
    curvePath += `<line class="handle-line" x1="${p0x}" y1="${p0y}" x2="${p1x}" y2="${p1y}"/>`;
    curvePath += `<line class="handle-line" x1="${p2x}" y1="${p2y}" x2="${p3x}" y2="${p3y}"/>`;
    curvePath += `<circle class="handle" data-pt="1" cx="${p1x}" cy="${p1y}" r="8"/>`;
    curvePath += `<circle class="handle" data-pt="2" cx="${p2x}" cy="${p2y}" r="8"/>`;
    // anchor dots
    curvePath += `<circle cx="${p0x}" cy="${p0y}" r="3" fill="rgba(255,255,255,.4)"/>`;
    curvePath += `<circle cx="${p3x}" cy="${p3y}" r="3" fill="rgba(255,255,255,.4)"/>`;
  } else {
    // steps
    const n = Math.max(1, parseInt($('#stepN').value)||1);
    const jump = $('#stepJump').value;
    let startOffset=0, endOffset=0, count = n;
    if(jump==='jump-start'||jump==='start'){ startOffset = 1; }
    if(jump==='jump-end'||jump==='end'){ endOffset = 1; }
    if(jump==='jump-both'){ startOffset = 1; count = n+1; }
    if(jump==='jump-none'){ count = n-1; }
    // build step path
    let d = '';
    const stepX = 1/n;
    for(let i=0;i<=n;i++){
      const xStart = i*stepX;
      const xEnd = (i+1)*stepX;
      const yVal = Math.min(1.5, Math.max(-1.5, (i + startOffset)/n * (jump==='jump-none'? n/(n-1) : 1)));
      const [sx1, sy1] = dataToSvg(Math.min(1,xStart), yVal);
      d += (i===0?`M${sx1} ${sy1}`:`L${sx1} ${sy1}`) + ' ';
      const [sx2, sy2] = dataToSvg(Math.min(1,xEnd), yVal);
      d += `L${sx2} ${sy2} `;
    }
    curvePath = `<path class="curve" d="${d}"/>`;
  }
  // axis labels
  const [, yTop] = dataToSvg(0,1);
  const [, yBot] = dataToSvg(0,0);
  const [axR] = dataToSvg(1,0);
  const labels = `
    <text class="label" x="${PAD-6}" y="${yTop+3}" text-anchor="end">1</text>
    <text class="label" x="${PAD-6}" y="${yBot+3}" text-anchor="end">0</text>
    <text class="label" x="${PAD}" y="${W-PAD+14}" text-anchor="middle">0</text>
    <text class="label" x="${axR}" y="${W-PAD+14}" text-anchor="middle">1</text>
    <text class="label" x="${W/2}" y="${PAD-12}" text-anchor="middle">progress (output)</text>
    <text class="label" x="14" y="${W/2}" text-anchor="middle" transform="rotate(-90 14 ${W/2})">time (input)</text>
  `;
  svg.innerHTML = lines.join('') + labels + curvePath;
  // attach drag handlers
  svg.querySelectorAll('.handle').forEach(h=>{
    h.addEventListener('pointerdown', startDrag);
  });
}

let dragPt = null;
function startDrag(e){
  e.preventDefault();
  dragPt = +e.target.dataset.pt;
  e.target.setPointerCapture(e.pointerId);
  e.target.addEventListener('pointermove', onDrag);
  e.target.addEventListener('pointerup', endDrag);
}
function onDrag(e){
  if(!dragPt) return;
  const svg = $('#svg');
  const rect = svg.getBoundingClientRect();
  const sx = (e.clientX - rect.left) / rect.width * W;
  const sy = (e.clientY - rect.top) / rect.height * W;
  let [x, y] = svgToData(sx, sy);
  x = Math.max(0, Math.min(1, x));
  y = Math.max(-MAX_Y, Math.min(MAX_Y, y));
  if(dragPt === 1){ p.x1 = +x.toFixed(3); p.y1 = +y.toFixed(3); }
  else { p.x2 = +x.toFixed(3); p.y2 = +y.toFixed(3); }
  syncInputs();
  draw();
  updateOutput();
}
function endDrag(e){
  dragPt = null;
  e.target.removeEventListener('pointermove', onDrag);
  e.target.removeEventListener('pointerup', endDrag);
}

function syncInputs(){
  $('#x1').value = p.x1; $('#y1').value = p.y1;
  $('#x2').value = p.x2; $('#y2').value = p.y2;
}

function currentEasing(){
  if(mode === 'cubic'){
    return `cubic-bezier(${p.x1}, ${p.y1}, ${p.x2}, ${p.y2})`;
  } else {
    const n = Math.max(1, parseInt($('#stepN').value)||1);
    let j = $('#stepJump').value;
    // simplify: jump-end is the default in modern browsers
    if(j === 'jump-end') j = 'end';
    if(j === 'jump-start') j = 'start';
    return `steps(${n}, ${j})`;
  }
}

function updateOutput(){
  const e = currentEasing();
  $('#output').textContent = e;
  // restart animation
  const bar = $('#bar');
  const dur = (parseFloat($('#dur').value)||1.4);
  bar.style.animation = 'none';
  // reflow
  void bar.offsetWidth;
  bar.style.animation = `gzEaseMove ${dur}s ${e} infinite`;
}

// inject keyframes once
const kf = document.createElement('style');
kf.textContent = `@keyframes gzEaseMove { 0% { transform: translateX(0); } 100% { transform: translateX(calc(100% + 280px)); } }`;
// better: use percentage of track width. We compute via JS using container width.
document.head.appendChild(kf);

function buildModeTabs(){
  $('#modeTabs').innerHTML = `
    <button id="tab-c" class="${mode==='cubic'?'active':''}">${t('modeCubic')}</button>
    <button id="tab-s" class="${mode==='steps'?'active':''}">${t('modeSteps')}</button>`;
  $('#tab-c').onclick = ()=>{ mode='cubic'; document.body.className='mode-cubic'; buildModeTabs(); draw(); updateOutput(); };
  $('#tab-s').onclick = ()=>{ mode='steps'; document.body.className='mode-steps'; buildModeTabs(); draw(); updateOutput(); };
}

function buildPresets(){
  $('#presets').innerHTML = PRESETS.map(p2=>`<span class="preset" data-v="${p2.val}">${p2.name}</span>`).join('');
  $('#presets').querySelectorAll('.preset').forEach(btn=>{
    btn.onclick = ()=>{
      const v = btn.dataset.v;
      if(v === 'linear'){
        p = {x1:0,y1:0,x2:1,y2:1};
        if(mode!=='cubic'){ mode='cubic'; document.body.className='mode-cubic'; buildModeTabs(); }
        syncInputs(); draw(); updateOutput();
      } else if(v.startsWith('cubic-bezier')){
        const m = v.match(/cubic-bezier\(([^,]+),([^,]+),([^,]+),([^,)]+)\)/);
        if(m){ p = {x1:+m[1],y1:+m[2],x2:+m[3],y2:+m[4]}; if(mode!=='cubic'){ mode='cubic'; document.body.className='mode-cubic'; buildModeTabs(); } syncInputs(); draw(); updateOutput(); }
      } else if(v.startsWith('steps')){
        const m = v.match(/steps\((\d+),\s*([\w-]+)\)/);
        if(m){
          if(mode!=='steps'){ mode='steps'; document.body.className='mode-steps'; buildModeTabs(); }
          $('#stepN').value = m[1];
          const sel = $('#stepJump');
          const target = m[2]==='end'?'jump-end':m[2]==='start'?'jump-start':m[2];
          [...sel.options].forEach(o=>{ if(o.value===target) sel.value=target; });
          draw(); updateOutput();
        }
      }
    };
  });
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="updateOutput()">${t('play')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="copyText(currentEasing())">${t('copy')}</button>`;

// wire up number inputs
['x1','y1','x2','y2'].forEach(id=>{
  $('#'+id).addEventListener('input', ()=>{
    let xv = parseFloat($('#'+id).value);
    if(isNaN(xv)) return;
    p[id] = xv;
    draw(); updateOutput();
  });
});
$('#stepN').addEventListener('input', ()=>{ draw(); updateOutput(); });
$('#stepJump').addEventListener('change', ()=>{ draw(); updateOutput(); });
$('#dur').addEventListener('input', updateOutput);

// make keyframes track-aware
function fixKeyframes(){
  const track = document.querySelector('.preview-track');
  if(!track) return;
  const w = track.clientWidth - 38 - 28; // bar width + padding
  const st = document.createElement('style');
  st.textContent = `@keyframes gzEaseMove { 0% { transform: translateX(0); } 100% { transform: translateX(${w}px); } }`;
  st.id = 'gzEaseKf';
  const old = document.getElementById('gzEaseKf');
  if(old) old.remove();
  document.head.appendChild(st);
}
window.addEventListener('resize', ()=>{ fixKeyframes(); updateOutput(); });

GZ.renderToolPage({
  category: 'css',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
