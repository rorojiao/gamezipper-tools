<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>

  </div>
  <div class="gz-tool-area">

</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Hourly Paycheck Calculator',
    toolDesc: 'Estimate your take-home pay from an hourly wage. Enter your rate, weekly hours and tax info to see gross and net pay per paycheck, month and year — includes overtime calculation. Free and private.',
    hourlyRate: 'Hourly rate',
    weeklyHours: 'Regular hours per week',
    overtimeHours: 'Overtime hours per week',
    overtimeRate: 'Overtime multiplier',
    taxRate: 'Estimated tax rate',
    payFrequency: 'Pay frequency',
    weekly: 'Weekly', biweekly: 'Bi-weekly', semimonthly: 'Semi-monthly', monthly: 'Monthly',
    calculate: 'Calculate',
    grossPerPaycheck: 'Gross per paycheck',
    netPerPaycheck: 'Net (take-home) per paycheck',
    weeklyGross: 'Weekly gross',
    weeklyNet: 'Weekly net',
    monthlyGross: 'Monthly gross',
    monthlyNet: 'Monthly net',
    annualGross: 'Annual gross',
    annualNet: 'Annual net',
    overtimePay: 'Overtime pay (weekly)',
    regularPay: 'Regular pay (weekly)',
    step1: 'Enter your hourly wage',
    step2: 'Enter your regular hours per week',
    step3: 'Add overtime hours and your estimated tax rate',
    step4: 'See your gross and net pay per paycheck, month and year',
  },
  zh: {
    toolTitle: '时薪工资计算器',
    toolDesc: '根据时薪估算实发工资。输入时薪、每周工时和税率，查看每次发薪、每月和每年的毛收入和净收入 — 包含加班费计算。免费且私密。',
    hourlyRate: '时薪',
    weeklyHours: '每周常规工时',
    overtimeHours: '每周加班工时',
    overtimeRate: '加班倍率',
    taxRate: '预估税率',
    payFrequency: '发薪频率',
    weekly: '每周', biweekly: '双周', semimonthly: '半月', monthly: '每月',
    calculate: '计算',
    grossPerPaycheck: '每次毛收入',
    netPerPaycheck: '每次实发（到手）',
    weeklyGross: '每周毛收入',
    weeklyNet: '每周净收入',
    monthlyGross: '每月毛收入',
    monthlyNet: '每月净收入',
    annualGross: '年毛收入',
    annualNet: '年净收入',
    overtimePay: '加班费（每周）',
    regularPay: '常规工资（每周）',
    step1: '输入你的时薪',
    step2: '输入每周常规工时',
    step3: '添加加班工时和预估税率',
    step4: '查看每次发薪、每月和每年的毛收入和净收入',
  }
});

const { $, t } = GZ;

const cur = (n) => {
  const lang = GZI18n.getLang ? GZI18n.getLang() : 'en';
  try { return new Intl.NumberFormat(lang === 'zh' ? 'zh-CN' : 'en-US', {style:'currency', currency:'USD', maximumFractionDigits:2}).format(n); }
  catch(e) { return '$' + n.toFixed(2); }
};

$('#input-card').innerHTML = `
  <div class="hp-field">
    <label>${t('hourlyRate')}</label>
    <div class="input-wrap">
      <span class="prefix">$</span>
      <input type="number" id="rate" class="has-prefix" value="20" min="0" step="0.01">
    </div>
  </div>
  <div class="hp-field">
    <label>${t('weeklyHours')}</label>
    <input type="number" id="weeklyHours" value="40" min="0" max="168" step="0.5">
  </div>
  <div class="hp-field">
    <label>${t('overtimeHours')}</label>
    <input type="number" id="overtimeHours" value="0" min="0" max="128" step="0.5">
  </div>
  <div class="hp-field">
    <label>${t('overtimeRate')}</label>
    <div class="input-wrap">
      <input type="number" id="otMult" value="1.5" min="1" max="3" step="0.1">
      <span class="suffix">×</span>
    </div>
  </div>
  <div class="hp-field">
    <label>${t('taxRate')}</label>
    <div class="input-wrap">
      <input type="number" id="taxRate" value="22" min="0" max="80" step="0.1">
      <span class="suffix">%</span>
    </div>
  </div>
  <div class="hp-field">
    <label>${t('payFrequency')}</label>
    <select id="payFreq">
      <option value="weekly">${t('weekly')}</option>
      <option value="biweekly" selected>${t('biweekly')}</option>
      <option value="semimonthly">${t('semimonthly')}</option>
      <option value="monthly">${t('monthly')}</option>
    </select>
  </div>
  <button class="gz-btn" style="width:100%;padding:12px;margin-top:6px" onclick="calculate()">${t('calculate')}</button>
`;

$('#info-card').innerHTML = `
  <h3 style="margin:0 0 14px;font-size:1.05em">ℹ️ How it works</h3>
  <p style="font-size:.9em;line-height:1.6;opacity:.85">
    This calculator estimates your <strong>take-home pay</strong> from an hourly wage.
    It computes your weekly gross pay, applies overtime at <strong>1.5×</strong> the regular
    rate, then subtracts an estimated flat tax rate to approximate your net income.
  </p>
  <div style="margin-top:14px;padding:12px 14px;background:var(--glass2);border-radius:10px;font-size:.85em;line-height:1.55;opacity:.85">
    <strong>⚠️ Estimate only.</strong> Actual paychecks vary based on your W-4, state/local taxes,
    Social Security (6.2%), Medicare (1.45%), 401(k) and benefits. Consult a tax pro for exact figures.
  </div>
  <div style="margin-top:12px;font-size:.85em;line-height:1.6;opacity:.75">
    <strong>Formulas:</strong><br>
    • Regular pay = rate × regular hours<br>
    • Overtime pay = rate × 1.5 × overtime hours<br>
    • Weekly gross = regular + overtime<br>
    • Annual gross = weekly × 52<br>
    • Net = gross × (1 − tax%)
  </div>
`;

function calculate() {
  const rate = parseFloat($('#rate').value) || 0;
  const weeklyHours = parseFloat($('#weeklyHours').value) || 0;
  const otHours = parseFloat($('#overtimeHours').value) || 0;
  const otMult = parseFloat($('#otMult').value) || 1.5;
  const taxPct = (parseFloat($('#taxRate').value) || 0) / 100;
  const freq = $('#payFreq').value;

  const regPay = rate * weeklyHours;
  const otPay = rate * otMult * otHours;
  const weeklyGross = regPay + otPay;
  const weeklyNet = weeklyGross * (1 - taxPct);
  const annualGross = weeklyGross * 52;
  const annualNet = weeklyNet * 52;
  const monthlyGross = annualGross / 12;
  const monthlyNet = annualNet / 12;

  const paysPerYear = { weekly: 52, biweekly: 26, semimonthly: 24, monthly: 12 }[freq];
  const grossPerPay = annualGross / paysPerYear;
  const netPerPay = annualNet / paysPerYear;

  $('#results').innerHTML = `
    <div class="hp-section-title">${t('netPerPaycheck')} (${t(freq)})</div>
    <div class="hp-big"><span class="currency">$</span>${netPerPay.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',')}</div>
    <div class="hp-breakdown">
      <div class="hp-row"><span class="lbl">${t('grossPerPaycheck')}</span><span class="val">${cur(grossPerPay)}</span></div>
      <div class="hp-row highlight"><span>${t('netPerPaycheck')}</span><span>${cur(netPerPay)}</span></div>
    </div>
    <div class="hp-section-title">${t('regularPay')} & ${t('overtimePay')}</div>
    <div class="hp-breakdown">
      <div class="hp-row"><span class="lbl">${t('regularPay')}</span><span class="val">${cur(regPay)}</span></div>
      ${otHours > 0 ? `<div class="hp-row"><span class="lbl">${t('overtimePay')}</span><span class="val">${cur(otPay)}</span></div>` : ''}
    </div>
    <div class="hp-section-title">${t('weeklyGross')} / ${t('monthlyGross')} / ${t('annualGross')}</div>
    <div class="hp-breakdown">
      <div class="hp-row"><span class="lbl">${t('weeklyGross')} / ${t('weeklyNet')}</span><span class="val">${cur(weeklyGross)} / ${cur(weeklyNet)}</span></div>
      <div class="hp-row"><span class="lbl">${t('monthlyGross')} / ${t('monthlyNet')}</span><span class="val">${cur(monthlyGross)} / ${cur(monthlyNet)}</span></div>
      <div class="hp-row"><span class="lbl">${t('annualGross')} / ${t('annualNet')}</span><span class="val">${cur(annualGross)} / ${cur(annualNet)}</span></div>
    </div>`;
}

calculate();
$('#rate').addEventListener('input', calculate);
$('#weeklyHours').addEventListener('input', calculate);
$('#overtimeHours').addEventListener('input', calculate);
$('#otMult').addEventListener('input', calculate);
$('#taxRate').addEventListener('input', calculate);
$('#payFreq').addEventListener('change', calculate);

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1', 'step2', 'step3', 'step4'],
  related: [
    {icon: '💰', href: '/calc/salary-calculator.html', name: 'Salary Calculator'},
    {icon: '💵', href: '/calc/paycheck-calculator.html', name: 'Paycheck Calculator'},
    {icon: '📈', href: '/calc/compound-interest-calculator.html', name: 'Compound Interest'},
    {icon: '🏦', href: '/calc/loan-calculator.html', name: 'Loan Calculator'},
  ]
});
</script>
<script src="/tools-result-rec.js?v=20260707v520" defer></script>
</body></html>
