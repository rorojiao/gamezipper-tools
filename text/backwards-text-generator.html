<script>
GZI18n.register({
  en: {
    toolTitle: 'Backwards Text Generator',
    toolDesc: 'Reverse text backwards, flip words, mirror letters and create upside-down text. Copy reversed text for social media — free, private, no signup.',
    ph: 'Type or paste your text here…',
    step1: 'Type or paste text into the input box',
    step2: 'Pick a reversal mode — flip, reverse words, mirror or upside down',
    step3: 'Click Copy to grab the reversed text',
    step4: 'Paste on Instagram, TikTok, Discord, Twitter or anywhere',
    modeFlip: 'Flip Entire Text',
    modeWords: 'Reverse Each Word',
    modeWordsOrder: 'Reverse Word Order',
    modeMirror: 'Mirror (ןǝʌǝʇ uʍop)',
    modeUpside: 'Upside Down',
  },
  zh: {
    toolTitle: '反向文字生成器',
    toolDesc: '将文字翻转、反转单词、镜像文字和上下颠倒文字。复制翻转文字到社交媒体 — 免费、私密、无需注册。',
    ph: '在此输入或粘贴文字…',
    step1: '在输入框中输入或粘贴文字',
    step2: '选择反转模式 — 全翻转、逐词反转、镜像或上下颠倒',
    step3: '点击「复制」获取翻转文字',
    step4: '粘贴到 Instagram、TikTok、Discord、Twitter 等平台',
    modeFlip: '整段翻转',
    modeWords: '逐词反转',
    modeWordsOrder: '单词顺序反转',
    modeMirror: '镜像文字',
    modeUpside: '上下颠倒',
  }
});

const { $, copyText, t } = GZ;
let currentMode = 'flip';

const upsideMap = {
  'a':'ɐ','b':'q','c':'ɔ','d':'p','e':'ǝ','f':'ɟ','g':'ƃ','h':'ɥ','i':'ᴉ','j':'ɾ',
  'k':'ʞ','l':'l','m':'ɯ','n':'u','o':'o','p':'d','q':'b','r':'ɹ','s':'s','t':'ʇ',
  'u':'n','v':'ʌ','w':'ʍ','x':'x','y':'ʎ','z':'z',
  'A':'∀','B':'ᗺ','C':'Ɔ','D':'ᗡ','E':'Ǝ','F':'Ⅎ','G':'⅁','H':'H','I':'I','J':'ſ',
  'K':'ʞ','L':'˥','M':'W','N':'N','O':'O','P':'Ԁ','Q':'Ό','R':'ᴚ','S':'S','T':'┴',
  'U':'∩','V':'Λ','W':'M','X':'X','Y':'⅄','Z':'Z',
  '0':'0','1':'Ɩ','2':'ᄅ','3':'Ɛ','4':'ㄣ','5':'ϛ','6':'9','7':'ㄥ','8':'8','9':'6',
  '.':'˙',',':'\'','?':'¿','!':'¡','"':'„','\'':',','(':')',')':'(','[':']',']':'[','{':'}','}':'{','<':'>','>':'<','&':'⅋','_':'‾'
};

const mirrorMap = {
  'a':'ɒ','b':'d','c':'ɔ','d':'b','e':'ɘ','f':'Ꮈ','g':'ǫ','h':'ʜ','i':'i','j':'ꞁ',
  'k':'ʞ','l':'l','m':'m','n':'n','o':'o','p':'q','q':'p','r':'ɿ','s':'ꙅ','t':'ƚ',
  'u':'u','v':'v','w':'w','x':'x','y':'y','z':'z',
  'A':'A','B':'ꓭ','C':'Ɔ','D':'ꓷ','E':'Ǝ','F':'ꟻ','G':'Ꭾ','H':'H','I':'I','J':'Ⴑ',
  'K':'K','L':'˥','M':'M','N':'N','O':'O','P':'ꟼ','Q':'Ọ','R':'Я','S':'ꓢ','T':'T',
  'U':'U','V':'V','W':'W','X':'X','Y':'Y','Z':'Ƶ',
  '(':')',')':'(','[':']',']':'[','{':'}','}':'{','<':'>','>':'<'
};

function flipText(text) { return [...text].reverse().join(''); }
function reverseWords(text) { return text.split(/(\s+)/).map(w => /\s/.test(w) ? w : [...w].reverse().join('')).join(''); }
function reverseWordOrder(text) { return text.split(/(\s+)/).reverse().join(''); }
function mirrorText(text) { return [...text].map(c => mirrorMap[c] || c).reverse().join(''); }
function upsideDown(text) { return [...text].reverse().map(c => upsideMap[c] || c).join(''); }

function transform() {
  const text = $('#input').value;
  if (!text) { $('#output').textContent = ''; return; }
  let result = text;
  switch (currentMode) {
    case 'flip': result = flipText(text); break;
    case 'words': result = reverseWords(text); break;
    case 'wordOrder': result = reverseWordOrder(text); break;
    case 'mirror': result = mirrorText(text); break;
    case 'upside': result = upsideDown(text); break;
  }
  $('#output').textContent = result;
}

function setMode(mode) {
  currentMode = mode;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.toggle('active', b.dataset.mode === mode));
  transform();
}

$('#modes').innerHTML = `
  <div class="mode-btn active" data-mode="flip" onclick="setMode('flip')">${t('modeFlip')}</div>
  <div class="mode-btn" data-mode="words" onclick="setMode('words')">${t('modeWords')}</div>
  <div class="mode-btn" data-mode="wordOrder" onclick="setMode('wordOrder')">${t('modeWordsOrder')}</div>
  <div class="mode-btn" data-mode="mirror" onclick="setMode('mirror')">${t('modeMirror')}</div>
  <div class="mode-btn" data-mode="upside" onclick="setMode('upside')">${t('modeUpside')}</div>`;

$('#input').placeholder = t('ph');
$('#input').addEventListener('input', transform);

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#input').value='';transform()">${t('clear')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#input').value='Hello World — backwards text is fun!';transform()">${t('example')}</button>`;

transform();

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],

    {icon:' upside', href:'/text/upside-down-text.html', name:'Upside Down'},
    {icon:'🔮', href:'/text/zalgo-text.html', name:'Zalgo Text'},
  ]
});
</script>
