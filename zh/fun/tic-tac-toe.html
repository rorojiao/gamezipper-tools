<script>
GZI18n.register({
  en: {

  },
  zh: {
    toolTitle: '井字棋',
    toolDesc: '在浏览器中玩经典井字棋 — 双人模式或对战不可战胜的 AI。统计分数、连胜和历史记录。',
    pvp: '👥 双人', ai: '🤖 对战 AI', easy: '简单', hard: '困难', x: 'X', o: 'O',
    yourTurn: '轮到你', aiTurn: 'AI 思考中…', p1Turn: '玩家 1 (X) 回合', p2Turn: '玩家 2 (O) 回合',
    youWin: '🎉 你赢了！', aiWin: '🤖 AI 赢了！', p1Win: '🎉 玩家 1 获胜！', p2Win: '🎉 玩家 2 获胜！', draw: '🤝 平局 — 再来一局！',
    score: '分数', xScore: 'X 胜', oScore: 'O 胜', draws: '平局', streak: '连胜', newGame: '新游戏', resetScore: '重置分数', clearHistory: '清除历史',
    pickX: '选择', pickSymHelp: '选择你的棋子',
    you: '你', aiL: 'AI', p1: '玩家1', p2: '玩家2', round: '回合',
    lblHistory: '📜 对局历史',
    step1: '选择游戏模式（双人 / 对战 AI）',
    step2: '点击空格放置你的棋子',
    step3: '先连成三子即获胜',
    step4: '跨回合追踪分数和连胜',
  }
});

const { $, $$, t } = GZ;
let mode = 'pvp'; // 'pvp' or 'ai'
let difficulty = 'hard';
let human = 'X';
let board = Array(9).fill(null);
let turn = 'X';
let over = false;
let score = { X: 0, O: 0, D: 0 };
let streak = 0;
let streakType = null; // 'X', 'O', or 'D'
let roundNum = 1;
let history = [];

const wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];

function checkWin(b) {
  for (const w of wins) {
    if (b[w[0]] && b[w[0]] === b[w[1]] && b[w[1]] === b[w[2]]) return { winner: b[w[0]], line: w };
  }
  if (b.every(c => c)) return { winner: null, line: null, draw: true };
  return null;
}

function aiMove() {
  const avail = board.map((v,i) => v ? -1 : i).filter(i => i >= 0);
  if (difficulty === 'easy') {
    return avail[Math.floor(Math.random() * avail.length)];
  }
  // minimax
  const ai = human === 'X' ? 'O' : 'X';
  function minimax(b, isMax) {
    const r = checkWin(b);
    if (r) {
      if (r.winner === ai) return 10;
      if (r.winner === human) return -10;
      return 0;
    }
    const empty = b.map((v,i) => v ? -1 : i).filter(i => i >= 0);
    if (isMax) {
      let best = -Infinity;
      for (const i of empty) { b[i] = ai; best = Math.max(best, minimax(b, false)); b[i] = null; }
      return best;
    } else {
      let best = Infinity;
      for (const i of empty) { b[i] = human; best = Math.min(best, minimax(b, true)); b[i] = null; }
      return best;
    }
  }
  let bestScore = -Infinity, bestMove = avail[0];
  for (const i of avail) {
    board[i] = ai;
    const s = minimax(board, false);
    board[i] = null;
    if (s > bestScore) { bestScore = s; bestMove = i; }
  }
  return bestMove;
}

function place(i) {
  if (over || board[i]) return;
  if (mode === 'ai' && turn !== human) return;
  board[i] = turn;
  const r = checkWin(board);
  render();
  if (r) {
    over = true;
    let msg;
    if (r.draw) {
      msg = t('draw');
      score.D++;
      updateStreak('D');
    } else {
      if (mode === 'ai') {
        msg = r.winner === human ? t('youWin') : t('aiWin');
      } else {
        msg = r.winner === 'X' ? t('p1Win') : t('p2Win');
      }
      score[r.winner]++;
      updateStreak(r.winner);
      // Highlight winning cells
      setTimeout(() => {
        r.line.forEach(j => { const c = $$('.tt-cell')[j]; if (c) c.classList.add('win'); });
      }, 50);
    }
    $('#status').textContent = msg;
    addHistory(r);
    return;
  }
  turn = turn === 'X' ? 'O' : 'X';
  updateStatus();
  if (mode === 'ai' && turn !== human && !over) {
    $('#status').textContent = t('aiTurn');
    setTimeout(() => { const m = aiMove(); if (m != null) place(m); }, 350);
  }
}

function updateStreak(who) {
  if (streakType === who) { streak++; }
  else { streakType = who; streak = 1; }
}

function updateStatus() {
  if (over) return;
  if (mode === 'ai') {
    $('#status').textContent = turn === human ? t('yourTurn') : t('aiTurn');
  } else {
    $('#status').textContent = turn === 'X' ? t('p1Turn') : t('p2Turn');
  }
}

function render() {
  const cells = $$('.tt-cell');
  cells.forEach((c, i) => {
    c.textContent = board[i] || '';
    c.className = 'tt-cell' + (board[i] ? (' ' + board[i].toLowerCase()) : '');
  });
  renderScore();
  $('#streak').textContent = streak > 1 ? `🔥 ${t('streak')}: ${streak}` : '';
}

function renderScore() {
  const xLabel = mode === 'ai' ? t('you') : t('p1');
  const oLabel = mode === 'ai' ? t('aiL') : t('p2');
  $('#score').innerHTML = `
    <div class="stat-card"><div class="num" style="color:#ff6b6b">${score.X}</div><div class="label">${xLabel}</div></div>
    <div class="stat-card"><div class="num">${score.D}</div><div class="label">${t('draws')}</div></div>
    <div class="stat-card"><div class="num" style="color:#4ecdc4">${score.O}</div><div class="label">${oLabel}</div></div>`;
}

function resetBoard() {
  board = Array(9).fill(null);
  turn = 'X';
  over = false;
  roundNum++;
  render();
  updateStatus();
  if (mode === 'ai' && human === 'O') {
    setTimeout(() => { const m = aiMove(); if (m != null) place(m); }, 300);
  }
}

function resetAll() {
  score = { X: 0, O: 0, D: 0 };
  streak = 0; streakType = null; roundNum = 1; history = [];
  $('#history').style.display = 'none';
  resetBoard();
}

function addHistory(r) {
  history.unshift({
    n: roundNum,
    mode: mode,
    res: r.draw ? 'D' : r.winner,
    time: new Date().toLocaleTimeString()
  });
  if (history.length > 50) history.pop();
  renderHistory();
}

function renderHistory() {
  if (history.length === 0) { $('#history').style.display = 'none'; return; }
  $('#history').style.display = 'block';
  $('#historyList').innerHTML = history.map(h => {
    let result;
    if (h.res === 'D') result = `<span style="color:#aaa">${t('draws')}</span>`;
    else if (h.res === 'X') result = `<span style="color:#ff6b6b">X</span>`;
    else result = `<span style="color:#4ecdc4">O</span>`;
    return `<div class="tt-history-row">${t('round')} ${h.n} · ${h.time} · ${result}</div>`;
  }).join('');
}

function setMode(m) {
  mode = m;
  score = { X: 0, O: 0, D: 0 };
  streak = 0; streakType = null; roundNum = 1; history = [];
  $('#history').style.display = 'none';
  buildModeUI();
  resetBoard();
}

function buildModeUI() {
  $('#modeRow').innerHTML = `
    <button class="gz-btn ${mode==='pvp'?'':'gz-btn-secondary'}" onclick="setMode('pvp')">${t('pvp')}</button>
    <button class="gz-btn ${mode==='ai'?'':'gz-btn-secondary'}" onclick="setMode('ai')">${t('ai')}</button>
    ${mode==='ai' ? `
      <button class="gz-btn gz-btn-secondary ${difficulty==='easy'?'':''}" style="font-size:.8em" onclick="setDifficulty('easy')">${t('easy')}</button>
      <button class="gz-btn gz-btn-secondary ${difficulty==='hard'?'':''}" style="font-size:.8em" onclick="setDifficulty('hard')">${t('hard')}</button>
    ` : ''}`;
  $('#symRow').innerHTML = mode==='ai' ? `
    <span>${t('pickSymHelp')}:</span>
    <button class="gz-btn ${human==='X'?'':'gz-btn-secondary'} ${human==='X'?'active':''}" onclick="setHuman('X')">X</button>
    <button class="gz-btn ${human==='O'?'':'gz-btn-secondary'} ${human==='O'?'active':''}" onclick="setHuman('O')">O</button>
  ` : '';
}

function setDifficulty(d) { difficulty = d; buildModeUI(); }
function setHuman(s) { human = s; buildModeUI(); resetBoard(); }

function buildBoard() {
  const wrap = $('#board');
  wrap.innerHTML = '';
  for (let i = 0; i < 9; i++) {
    const c = document.createElement('div');
    c.className = 'tt-cell';
    c.onclick = () => place(i);
    wrap.appendChild(c);
  }
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="resetBoard()">${t('newGame')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="resetAll()">${t('resetScore')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#history').style.display=$('#history').style.display==='none'?'block':'none'">${t('lblHistory')}</button>`;

buildModeUI();
buildBoard();
render();
updateStatus();

GZ.renderToolPage({
  category: 'fun',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🎲', href:'/fun/dice-roller.html', name:'Dice Roller'},
    {icon:'🪙', href:'/fun/coin-flipper.html', name:'Coin Flipper'},
    {icon:'🎡', href:'/fun/decision-wheel.html', name:'Decision Wheel'},
    {icon:'⌨️', href:'/fun/typing-test.html', name:'Typing Test'},
  ]
});
</script>
