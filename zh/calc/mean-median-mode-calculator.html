<div class="gz-container">

  <div class="gz-tool-area">

      <label style="font-size:.85em;font-weight:500" id="lbl-input">Enter numbers (separated by commas, spaces, or new lines)</label>

    </div>

          <div class="mm-stat mm-stat-highlight"><div class="mm-stat-label">Median</div><div class="mm-stat-value" id="r-median">—</div></div>
          <div class="mm-stat mm-stat-highlight"><div class="mm-stat-label">Mode</div><div class="mm-stat-value" id="r-mode">—</div></div>
          <div class="mm-stat mm-stat-highlight"><div class="mm-stat-label">Range</div><div class="mm-stat-value" id="r-range">—</div></div>
          <div class="mm-stat"><div class="mm-stat-label">Count</div><div class="mm-stat-value" id="r-count">—</div></div>
          <div class="mm-stat"><div class="mm-stat-label">Sum</div><div class="mm-stat-value" id="r-sum">—</div></div>
          <div class="mm-stat"><div class="mm-stat-label">Min</div><div class="mm-stat-value" id="r-min">—</div></div>
          <div class="mm-stat"><div class="mm-stat-label">Max</div><div class="mm-stat-value" id="r-max">—</div></div>
        </div>
      </div>
      <div class="mm-card">
        <h3>📝 Step-by-Step</h3>
        <div class="mm-steps" id="steps">Enter numbers to see the breakdown.</div>
      </div>
    </div>

<script>
GZI18n.register({
  en: {
    toolTitle: 'Mean, Median, Mode Calculator',
    toolDesc: 'Calculate mean, median, mode, range, sum, min, max and count from any set of numbers. Step-by-step breakdown — free, private and browser-based.',
    step1: 'Type or paste your numbers separated by commas, spaces, or new lines',
    step2: 'The statistics update instantly as you type',
    step3: 'View the mean, median, mode and range in the results panel',
    step4: 'Use Copy to copy any value to your clipboard',
  },
  zh: {
    toolTitle: '平均数、中位数、众数计算器',
    toolDesc: '从任意数字集合中计算平均数、中位数、众数、极差、总和、最小值、最大值和个数。提供逐步分解 — 免费、私密、浏览器本地运行。',
    step1: '输入或粘贴数字，用逗号、空格或换行分隔',
    step2: '统计数据会随输入即时更新',
    step3: '在结果面板查看平均数、中位数、众数和极差',
    step4: '点击「复制」将任意值复制到剪贴板',
  }
});

const { $, copyText, t } = GZ;

function fmt(n) {
  if (!isFinite(n)) return '∞';
  return parseFloat(n.toFixed(8)).toString();
}

function parse() {
  const raw = $('#input').value.trim();
  if (!raw) return [];
  return raw.split(/[\s,;]+/).map(s => parseFloat(s)).filter(n => !isNaN(n));
}

function calculate() {
  const err = $('#err');
  err.textContent = '';
  const nums = parse();
  if (nums.length === 0) {
    ['mean','median','mode','range','count','sum','min','max'].forEach(k => $('#r-' + k).textContent = '—');
    $('#steps').textContent = 'Enter numbers to see the breakdown.';
    return;
  }
  const sorted = [...nums].sort((a, b) => a - b);
  const n = sorted.length;
  const sum = nums.reduce((a, b) => a + b, 0);
  const mean = sum / n;
  let median;
  if (n % 2 === 1) median = sorted[Math.floor(n / 2)];
  else median = (sorted[n / 2 - 1] + sorted[n / 2]) / 2;
  const min = sorted[0];
  const max = sorted[n - 1];
  const range = max - min;

  // Mode
  const freq = {};
  let maxFreq = 0;
  nums.forEach(v => { freq[v] = (freq[v] || 0) + 1; maxFreq = Math.max(maxFreq, freq[v]); });
  let modes = Object.keys(freq).filter(k => freq[k] === maxFreq).map(Number).sort((a,b) => a - b);
  if (maxFreq === 1) modes = []; // no mode if everything appears once
  const modeStr = modes.length === 0 ? 'No mode' : modes.length > 5 ? modes.slice(0, 5).map(fmt).join(', ') + ` (+${modes.length - 5} more)` : modes.map(fmt).join(', ');

  $('#r-mean').textContent = fmt(mean);
  $('#r-median').textContent = fmt(median);
  $('#r-mode').textContent = modeStr;
  $('#r-range').textContent = fmt(range);
  $('#r-count').textContent = n;
  $('#r-sum').textContent = fmt(sum);
  $('#r-min').textContent = fmt(min);
  $('#r-max').textContent = fmt(max);

  let steps = `Sorted: ${sorted.map(fmt).join(', ')}\n\n`;
  steps += `Mean = Sum ÷ Count\n      = ${fmt(sum)} ÷ ${n}\n      = ${fmt(mean)}\n\n`;
  if (n % 2 === 1) {
    const mid = Math.floor(n / 2);
    steps += `Median (odd count) = middle value\n         = sorted[${mid}] = ${fmt(median)}\n\n`;
  } else {
    steps += `Median (even count) = avg of two middle values\n          = (${fmt(sorted[n/2-1])} + ${fmt(sorted[n/2])}) ÷ 2\n          = ${fmt(median)}\n\n`;
  }
  steps += `Mode = most frequent value\n      = ${modeStr}\n\n`;
  steps += `Range = Max − Min\n      = ${fmt(max)} − ${fmt(min)}\n      = ${fmt(range)}\n`;

  $('#steps').textContent = steps;
}

function loadExample() {
  $('#input').value = '4, 8, 15, 16, 23, 42';
  calculate();
}

function doClear() { $('#input').value = ''; calculate(); }

$('#input').addEventListener('input', calculate);

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn" onclick="copyText($('#r-mean').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📈', href:'/calc/standard-deviation-calculator.html', name:'Standard Deviation'},
    {icon:'📊', href:'/calc/statistics-calculator.html', name:'Statistics Calculator'},
    {icon:'🧮', href:'/calc/percentage-calculator.html', name:'Percentage Calculator'},
    {icon:'🔢', href:'/calc/permutation.html', name:'Permutation / Combination'},
  ]
});

calculate();
</script>

</body>
