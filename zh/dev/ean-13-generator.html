<script>

    toolDesc: '生成 EAN-13 条形码，自动计算校验码。输入 12 位数字自动获得第 13 位校验位。可下载 SVG 或 PNG — 100% 浏览器本地运行。',

    checksum: '校验位（第 13 位）：',

    downloadSvg: '下载 SVG',
    downloadPng: '下载 PNG',
    step1: '在数据栏输入 12 或 13 位数字',
    step2: '第 13 位校验码将自动计算',
    step3: '根据需要调整缩放和高度',
    step4: '下载为 SVG（矢量）或 PNG（位图）',
  }
});

const { $, copyText, t } = GZ;

// EAN-13 encoding tables
// L-code (odd parity) for first digit system, G-code (even parity)
const L = ['0001101','0011001','0010011','0111101','0100011','0110001','0101111','0111011','0110111','0001011'];
const G = ['0100111','0110011','0011011','0100001','0011101','0111001','0000101','0010001','0001001','0010111'];
const R = ['1110010','1100110','1101100','1000010','1011100','1001110','1010000','1000100','1001000','1110100'];
// Parity pattern for first 6 digits based on first digit (0=LLLLLL, using L/G mix)
const PARITY = [
  ['L','L','L','L','L','L'], // 0
  ['L','L','G','L','L','G'], // 1
  ['L','L','G','G','L','L'], // 2
  ['L','L','G','L','G','L'], // 3
  ['L','G','L','L','G','L'], // 4
  ['L','G','G','L','L','L'], // 5
  ['L','G','L','G','L','L'], // 6
  ['L','G','G','G','L','L'], // 7
  ['L','G','L','L','L','G'], // 8
  ['L','G','G','L','G','L'], // 9
];

function ean13Checksum(twelve) {
  let sum = 0;
  for (let i = 0; i < 12; i++) {
    sum += parseInt(twelve[i]) * (i % 2 === 0 ? 1 : 3);
  }
  return (10 - (sum % 10)) % 10;
}

function encodeEAN13(fullDigits) {
  const first = parseInt(fullDigits[0]);
  const left = fullDigits.substring(1, 7);
  const right = fullDigits.substring(7, 13);
  const parity = PARITY[first];
  let bits = '101'; // start guard
  for (let i = 0; i < 6; i++) {
    const d = parseInt(left[i]);
    bits += (parity[i] === 'L' ? L[d] : G[d]);
  }
  bits += '01010'; // center guard
  for (let i = 0; i < 6; i++) {
    bits += R[parseInt(right[i])];
  }
  bits += '101'; // end guard
  return bits;
}

function generate() {
  const raw = $('#data').value.replace(/\D/g, '');
  const svg = $('#barcode-svg');
  const info = $('#checksum-info');

  if (raw.length < 12 || raw.length > 13 || !/^\d+$/.test(raw)) {
    svg.innerHTML = '';
    info.innerHTML = `<span style="color:var(--gz-accent)">${t('enterValid')}</span>`;
    return;
  }

  let digits = raw;
  let checkDigit;
  if (raw.length === 12) {
    checkDigit = ean13Checksum(raw);
    digits = raw + checkDigit;
    info.innerHTML = `<span style="color:var(--gz-success)">✓ ${t('checksum')}<strong>${checkDigit}</strong> — ${digits}</span>`;
  } else {
    const calc = ean13Checksum(raw.substring(0, 12));
    checkDigit = parseInt(raw[12]);
    if (calc === checkDigit) {
      info.innerHTML = `<span style="color:var(--gz-success)">✓ ${t('checksum')}<strong>${checkDigit}</strong> — ${digits} (valid)</span>`;
    } else {
      info.innerHTML = `<span style="color:var(--gz-accent)">⚠ Checksum mismatch: expected ${calc}, got ${checkDigit}. <a href="#" onclick="$('#data').value='${raw.substring(0,12)}';generate();return false" style="color:var(--accent)">Fix</a></span>`;
    }
  }

  const bits = encodeEAN13(digits);
  const scale = parseInt($('#scale').value);
  const barH = parseInt($('#height').value);
  const unitW = scale;
  const quietZone = 9 * scale; // 9 modules quiet zone each side
  const totalW = bits.length * unitW + quietZone * 2;
  const textH = $('#showtext').checked ? 18 : 0;
  const totalH = barH + textH;
  const textY = barH + 14;

  let rects = '';
  for (let i = 0; i < bits.length; i++) {
    if (bits[i] === '1') {
      rects += `<rect x="${quietZone + i * unitW}" y="0" width="${unitW}" height="${barH}" fill="#000"/>`;
    }
  }

  let textEl = '';
  if ($('#showtext').checked) {
    // Split: first digit, then left 6, then right 6
    textEl = `<text x="${quietZone - 12}" y="${textY}" font-family="monospace" font-size="14" fill="#000">${digits[0]}</text>`;
    textEl += `<text x="${quietZone + 7 * 7 * unitW / 7}" y="${textY}" font-family="monospace" font-size="14" fill="#000" text-anchor="middle">${digits.substring(1,7)}</text>`;
    textEl += `<text x="${quietZone + (7*6+5+7*6) * unitW / 1}" y="${textY}" font-family="monospace" font-size="14" fill="#000" text-anchor="middle">${digits.substring(7,13)}</text>`;
    // simpler: just put full number centered
    textEl = `<text x="${totalW/2}" y="${textY}" font-family="monospace" font-size="14" fill="#000" text-anchor="middle" letter-spacing="2">${digits}</text>`;
  }

  svg.setAttribute('width', totalW);
  svg.setAttribute('height', totalH);
  svg.setAttribute('viewBox', `0 0 ${totalW} ${totalH}`);
  svg.innerHTML = `<rect x="0" y="0" width="${totalW}" height="${totalH}" fill="#fff"/>${rects}${textEl}`;
}

$('#data').addEventListener('input', generate);
$('#scale').addEventListener('input', e => { $('#scale-val').textContent = e.target.value + 'x'; generate(); });
$('#height').addEventListener('input', e => { $('#height-val').textContent = e.target.value + 'px'; generate(); });
$('#showtext').addEventListener('change', generate);

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="downloadSvg()">${t('downloadSvg')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="downloadPng()">${t('downloadPng')}</button>`;

function downloadSvg() {
  const svg = $('#barcode-svg');
  const clone = svg.cloneNode(true);
  const data = new XMLSerializer().serializeToString(clone);
  const blob = new Blob([data], {type: 'image/svg+xml'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `ean13-${$('#data').value.replace(/\D/g,'')}.svg`;
  a.click();
  URL.revokeObjectURL(a.href);
}

function downloadPng() {
  const svg = $('#barcode-svg');
  const data = new XMLSerializer().serializeToString(svg);
  const img = new Image();
  const blob = new Blob([data], {type: 'image/svg+xml'});
  const url = URL.createObjectURL(blob);
  img.onload = function() {
    const canvas = document.createElement('canvas');
    canvas.width = img.width * 2;
    canvas.height = img.height * 2;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#fff';
    ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
    URL.revokeObjectURL(url);
    canvas.toBlob(function(b) {
      const a = document.createElement('a');
      a.href = URL.createObjectURL(b);
      a.download = `ean13-${$('#data').value.replace(/\D/g,'')}.png`;
      a.click();
      URL.revokeObjectURL(a.href);
    });
  };
  img.src = url;
}

$('#lbl-data').textContent = t('lblData');
$('#lbl-scale').textContent = t('lblScale');
$('#lbl-height').textContent = t('lblHeight');
$('#lbl-showtext').textContent = t('lblShowText');
$('#scale-val').textContent = '2x';
$('#height-val').textContent = '100px';

generate();

});
</script>
