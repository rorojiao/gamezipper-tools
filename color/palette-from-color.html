<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What color schemes can this tool generate?", "acceptedAnswer": {"@type": "Answer", "text": "From a single base color, this tool generates five scheme types: Complementary (opposite on the wheel), Analogous (adjacent hues), Triadic (evenly spaced three colors), Tetradic/Rectangle (two complementary pairs), and Monochrome (same hue at different lightness levels)."}}, {"@type": "Question", "name": "How do I use the generated palette?", "acceptedAnswer": {"@type": "Answer", "text": "Click any color swatch to copy its HEX code. You can then paste it into CSS variables, design tools like Figma or Sketch, or any application that accepts HEX color values. Each scheme gives you ready-to-use harmonious color combinations."}}, {"@type": "Question", "name": "What is the difference between triadic and tetradic schemes?", "acceptedAnswer": {"@type": "Answer", "text": "A triadic scheme uses three colors evenly spaced 120 degrees apart on the color wheel, giving vibrant but balanced contrast. A tetradic (rectangle) scheme uses four colors forming two complementary pairs, offering more variety but requiring careful balance in application."}}, {"@type": "Question", "name": "Is this color tool free and private?", "acceptedAnswer": {"@type": "Answer", "text": "Yes, completely free with no signup. All palette generation runs in your browser using HSL color math. No color data is ever sent to a server."}}]}</script>

<script>
GZI18n.register({
  en: {
    toolTitle: 'Palette From Color',
    toolDesc: 'Generate 5 complete color schemes (complementary, analogous, triadic, tetradic, monochrome) from one base color. Click to copy any HEX.',
    complementary: 'Complementary',
    analogous: 'Analogous',
    triadic: 'Triadic',
    tetradic: 'Tetradic (Rectangle)',
    monochrome: 'Monochrome',
    step1: 'Choose a base color with the picker or type a HEX',
    step2: 'Five harmonious schemes generate automatically below',
    step3: 'Click any swatch to copy its HEX value',
    step4: 'Use the schemes in your design or CSS',
  },
  zh: {
    toolTitle: '单色配色方案生成器',
    toolDesc: '从一个基础色生成 5 种完整配色方案（互补色、类似色、三角色、矩形色、单色），点击任意色块复制 HEX。',
    complementary: '互补色',
    analogous: '类似色',
    triadic: '三角色',
    tetradic: '矩形色',
    monochrome: '单色',
    step1: '使用取色器选择基础色或输入 HEX',
    step2: '下方自动生成 5 种和谐配色方案',
    step3: '点击任意色块复制其 HEX 值',
    step4: '将方案用于设计或 CSS',
  }
});
const { $, copyText, t } = GZ;

function hex2hsl(hex){
  hex = hex.replace('#','');
  if(hex.length===3) hex = hex.split('').map(c=>c+c).join('');
  if(!/^[0-9a-f]{6}$/i.test(hex)) return null;
  let r=parseInt(hex.slice(0,2),16)/255, g=parseInt(hex.slice(2,4),16)/255, b=parseInt(hex.slice(4,6),16)/255;
  const mx=Math.max(r,g,b),mn=Math.min(r,g,b),d=mx-mn;
  let h=0,s=0; const l=(mx+mn)/2;
  if(d!==0){ s=d/(1-Math.abs(2*l-1)); if(mx===r)h=((g-b)/d)%6; else if(mx===g)h=(b-r)/d+2; else h=(r-g)/d+4; h*=60; if(h<0)h+=360; }
  return [Math.round(h),Math.round(s*100),Math.round(l*100)];
}
function hsl2hex(h,s,l){
  h=((h%360)+360)%360; s=Math.max(0,Math.min(100,s)); l=Math.max(0,Math.min(100,l));
  s/=100;l/=100;
  const c=(1-Math.abs(2*l-1))*s, x=c*(1-Math.abs((h/60)%2-1)), m=l-c/2;
  let r=0,g=0,b=0;
  if(h<60){r=c;g=x;}else if(h<120){r=x;g=c;}else if(h<180){g=c;b=x;}else if(h<240){g=x;b=c;}else if(h<300){r=x;b=c;}else{r=c;b=x;}
  return '#'+[r,g,b].map(n=>Math.round((n+m)*255).toString(16).padStart(2,'0')).join('').toUpperCase();
}

function swatch(hx){
  return `<div class="sc" onclick="copyText('${hx}')" title="${hx}"><div class="sb" style="background:${hx}"></div><div class="si">${hx.slice(1)}</div></div>`;
}

function render(){
  const hex=$('#hex').value.trim();
  const hsl=hex2hsl(hex);
  if(!hsl){ $('#schemes').innerHTML='<span style="color:var(--gz-accent)">Invalid HEX</span>'; return; }
  const [H,S,L]=hsl;
  const schemes=[
    {key:'complementary',colors:[H,H+180]},
    {key:'analogous',colors:[H-30,H,H+30]},
    {key:'triadic',colors:[H,H+120,H+240]},
    {key:'tetradic',colors:[H,H+90,H+180,H+270]},
    {key:'monochrome',colors:null},
  ];
  let html='';
  schemes.forEach(sc=>{
    let colors;
    if(sc.key==='monochrome'){
      colors=[20,35,50,65,80].map(l=>hsl2hex(H,S,l));
    } else {
      colors=sc.colors.map(h=>hsl2hex(h,S,L));
    }
    html += `<div class="scheme"><h3>${t(sc.key)}</h3><div class="srow">${colors.map(swatch).join('')}</div></div>`;
  });
  $('#schemes').innerHTML=html;
}

$('#picker').addEventListener('input',e=>{ $('#hex').value=e.target.value.toUpperCase(); render(); });
$('#hex').addEventListener('input',e=>{ const v=e.target.value.toUpperCase(); if(/#[0-9A-F]{6}/.test(v)) $('#picker').value=v; render(); });

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="copyAll()">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadRandom()">${t('example')}</button>`;
function copyAll(){ const all=[...document.querySelectorAll('#schemes .si')].map(e=>'#'+e.textContent); copyText([...new Set(all)].join(', ')); }
function loadRandom(){ const h=Math.floor(Math.random()*360),s=55+Math.floor(Math.random()*35),l=45+Math.floor(Math.random()*15); const hx=hsl2hex(h,s,l); $('#hex').value=hx; $('#picker').value=hx; render(); }

render();

    {icon:'🔵', href:'/color/tints-shades.html', name:'Tints & Shades'},
  ]
});
</script>
