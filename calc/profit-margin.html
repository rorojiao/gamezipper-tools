<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is profit margin?", "acceptedAnswer": {"@type": "Answer", "text": "Profit margin is the percentage of revenue that remains as profit after all expenses are deducted. It measures how much profit a business makes for every dollar of revenue."}}, {"@type": "Question", "name": "What is the difference between margin and markup?", "acceptedAnswer": {"@type": "Answer", "text": "Margin is profit divided by selling price (profit/revenue). Markup is profit divided by cost (profit/cost). A 50% markup equals about a 33% margin."}}, {"@type": "Question", "name": "What is a good profit margin?", "acceptedAnswer": {"@type": "Answer", "text": "It varies by industry. A 10% net margin is average, 20% is good, and 30%+ is excellent. Software companies often have 70%+ margins while retail may be 2-5%."}}, {"@type": "Question", "name": "How do I calculate selling price from cost and margin?", "acceptedAnswer": {"@type": "Answer", "text": "Selling Price = Cost / (1 - Margin%). For example, if cost is $60 and you want a 40% margin: Price = $60 / (1 - 0.40) = $100."}}]}</script>

<script>
GZI18n.register({
  en: {
    toolTitle: 'Profit Margin Calculator',
    toolDesc: 'Calculate gross profit margin, markup percentage and selling price. Analyze profitability with instant results and formulas.',
    mode1: 'Cost & Revenue',
    mode2: 'Cost & Margin',
    mode3: 'Revenue & Margin',
    cost: 'Cost ($)',
    revenue: 'Revenue / Selling Price ($)',
    margin: 'Desired Margin (%)',
    profit: 'Profit ($)',
    calculate: 'Calculate',
    clear: 'Clear',
    resProfit: 'Profit',
    resMargin: 'Profit Margin',
    resMarkup: 'Markup',
    resRevenue: 'Selling Price',
    resCost: 'Cost',
    step1: 'Choose a calculation mode based on what you know',
    step2: 'Enter your cost and revenue (or margin) values',
    step3: 'Click Calculate to see profit, margin and markup',
    step4: 'Review the formula section to understand the math',
  },
  zh: {
    toolTitle: '利润率计算器',
    toolDesc: '计算毛利率、加价率和销售价格。即时分析盈利能力，附带公式说明。',
    mode1: '成本 & 收入',
    mode2: '成本 & 利润率',
    mode3: '收入 & 利润率',
    cost: '成本（元）',
    revenue: '收入 / 售价（元）',
    margin: '目标利润率（%）',
    profit: '利润（元）',
    calculate: '计算',
    clear: '清空',
    resProfit: '利润',
    resMargin: '利润率',
    resMarkup: '加价率',
    resRevenue: '售价',
    resCost: '成本',
    step1: '根据已知信息选择计算模式',
    step2: '输入成本和收入（或利润率）',
    step3: '点击计算查看利润、利润率和加价率',
    step4: '查看公式区域了解计算原理',
  }
});

const { $, t } = GZ;
let mode = 1;

function renderInputs() {
  const inputs = $('#inputs');
  if (mode === 1) {
    inputs.innerHTML = `<div><label>${t('cost')}</label><input type="number" id="inp1" value="60" min="0" step="1"></div>
      <div><label>${t('revenue')}</label><input type="number" id="inp2" value="100" min="0" step="1"></div>`;
  } else if (mode === 2) {
    inputs.innerHTML = `<div><label>${t('cost')}</label><input type="number" id="inp1" value="60" min="0" step="1"></div>
      <div><label>${t('margin')}</label><input type="number" id="inp2" value="40" min="0" max="99.99" step="1"></div>`;
  } else {
    inputs.innerHTML = `<div><label>${t('revenue')}</label><input type="number" id="inp1" value="100" min="0" step="1"></div>
      <div><label>${t('margin')}</label><input type="number" id="inp2" value="40" min="0" max="99.99" step="1"></div>`;
  }
}

function fmt(n) { return n.toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2}); }

function calculate() {
  const v1 = parseFloat($('#inp1').value) || 0;
  const v2 = parseFloat($('#inp2').value) || 0;
  let cost, revenue, profit, marginPct, markupPct;
  let formulaHtml = '';

  if (mode === 1) {
    cost = v1; revenue = v2;
    profit = revenue - cost;
    marginPct = revenue > 0 ? (profit / revenue * 100) : 0;
    markupPct = cost > 0 ? (profit / cost * 100) : 0;
    formulaHtml = `Profit = Revenue - Cost = $${fmt(revenue)} - $${fmt(cost)} = <b>$${fmt(profit)}</b><br>
Margin = Profit / Revenue × 100 = $${fmt(profit)} / $${fmt(revenue)} × 100 = <b>${marginPct.toFixed(2)}%</b><br>
Markup = Profit / Cost × 100 = $${fmt(profit)} / $${fmt(cost)} × 100 = <b>${markupPct.toFixed(2)}%</b>`;
  } else if (mode === 2) {
    cost = v1; marginPct = v2;
    revenue = cost / (1 - marginPct / 100);
    profit = revenue - cost;
    markupPct = cost > 0 ? (profit / cost * 100) : 0;
    formulaHtml = `Selling Price = Cost / (1 - Margin%) = $${fmt(cost)} / (1 - ${marginPct}%) = <b>$${fmt(revenue)}</b><br>
Profit = Revenue - Cost = $${fmt(revenue)} - $${fmt(cost)} = <b>$${fmt(profit)}</b><br>
Markup = Profit / Cost × 100 = <b>${markupPct.toFixed(2)}%</b>`;
  } else {
    revenue = v1; marginPct = v2;
    cost = revenue * (1 - marginPct / 100);
    profit = revenue - cost;
    markupPct = cost > 0 ? (profit / cost * 100) : 0;
    formulaHtml = `Cost = Revenue × (1 - Margin%) = $${fmt(revenue)} × (1 - ${marginPct}%) = <b>$${fmt(cost)}</b><br>
Profit = Revenue - Cost = $${fmt(revenue)} - $${fmt(cost)} = <b>$${fmt(profit)}</b><br>
Markup = Profit / Cost × 100 = <b>${markupPct.toFixed(2)}%</b>`;
  }

  const grid = $('#result-grid');
  grid.innerHTML = `
    <div class="gz-result-item"><div class="value">$${fmt(profit)}</div><div class="label">${t('resProfit')}</div></div>
    <div class="gz-result-item"><div class="value">${marginPct.toFixed(2)}%</div><div class="label">${t('resMargin')}</div></div>
    <div class="gz-result-item"><div class="value">${markupPct.toFixed(2)}%</div><div class="label">${t('resMarkup')}</div></div>
    <div class="gz-result-item"><div class="value">$${fmt(revenue)}</div><div class="label">${t('resRevenue')}</div></div>`;
  $('#formula').innerHTML = formulaHtml;
  $('#results').style.display = 'block';
}

$('#modes').innerHTML = [1,2,3].map(i =>
  `<button class="${i===1?'active':''}" onclick="mode=${i};document.querySelectorAll('.gz-mode-tabs button').forEach(b=>b.classList.remove('active'));this.classList.add('active');renderInputs();calculate()">${t('mode'+i)}</button>`
).join('');

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="calculate()">${t('calculate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="document.getElementById('results').style.display='none'">${t('clear')}</button>`;

renderInputs();
calculate();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🏦', href:'/calc/loan-calculator.html', name:'Loan Calculator'},
    {icon:'🏷️', href:'/calc/discount-calculator.html', name:'Discount Calculator'},
    {icon:'🔢', href:'/calc/percentage-calculator.html', name:'Percentage Calculator'},
    {icon:'💰', href:'/calc/tip-calculator.html', name:'Tip Calculator'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
