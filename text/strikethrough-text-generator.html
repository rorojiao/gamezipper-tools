    toolDesc: '为文字添加删除线 — 单线 ̶  或双线 ̳ 。一键复制粘贴到 Facebook、Twitter、Discord 和 Reddit，全平台通用。',

    clear: '清空',

    copied: '✓ 已复制！',
    sampleText: '删除线文字',
    singleLabel: '单删除线',

    slashLabel: '斜线',
    step1: '在输入框中输入或粘贴文字',
    step2: '在输出区浏览各种删除线样式',
    step3: '点击所需样式旁的「复制」按钮',
    step4: '粘贴到 Facebook、Twitter、Discord 或 Reddit',
  }

const { $, copyText, t } = GZ;

// Combining diacritical marks
const COMBINING_LONG_STROKE_OVERLAY = '\u0336'; // single strikethrough
const COMBINING_DOUBLE_LOW_LINE    = '\u0333'; // underline double
const COMBINING_LONG_SOLIDUS_OVERLAY = '\u0338'; // slash through
const COMBINING_SHORT_SOLIDUS_OVERLAY = '\u0337';

function applyMark(str, mark){
  let out='';
  for(const ch of str){
    out += ch + mark;
  }
  return out;
}

function render(){
  const input = $('#input').value || t('sampleText');
  const styles = [
    {label: t('singleLabel'), result: applyMark(input, COMBINING_LONG_STROKE_OVERLAY)},
    {label: t('doubleLabel'), result: applyMark(applyMark(input, COMBINING_LONG_STROKE_OVERLAY), COMBINING_LONG_STROKE_OVERLAY)},
    {label: t('slashLabel'),  result: applyMark(input, COMBINING_LONG_SOLIDUS_OVERLAY)},
  ];
  let html='';
  for(const s of styles){
    html += `<div class="strike-row"><span class="label">${escapeHtml(s.label)}</span><span class="out">${escapeHtml(s.result)}</span><button class="gz-btn gz-btn-tool copy-btn" data-text="${escapeAttr(s.result)}">${t('copy')}</button></div>`;
  }
  $('#output').innerHTML = html;
  $('#output').querySelectorAll('.copy-btn').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      copyText(btn.dataset.text);
      const orig = btn.textContent;
      btn.textContent = t('copied');
      setTimeout(()=>{btn.textContent = orig;}, 1200);
    });
  });
}

function escapeHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function escapeAttr(s){return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

$('#input').addEventListener('input', render);

$('#toolbar').innerHTML = `<button class="gz-btn" id="btn-clear">${t('clear')}</button>`;
$('#btn-clear').addEventListener('click', ()=>{$('#input').value='';render();$('#input').focus();});

render();
