    step4: '复制或下载转换后的字幕文件',

const { $, t, copyText } = GZ;
let mode = 'srt2vtt';

const TS = '(\\d{1,2}:\\d{2}:\\d{2}[.,]\\d{1,3}|\\d{1,2}:\\d{2}[.,]\\d{1,3})'; // timestamp
const tsRe = new RegExp(TS.replace(/[()]/g, '') + '\\s*-->\\s*' + TS.replace(/[()]/g, ''));

function normalizeTs(ts, useDot) {
  // pad to HH:MM:SS.mmm; comma -> dot or dot -> comma
  let h, m, rest;
  const parts = ts.split(/[.:,]/);
  if (parts.length === 4) { [h, m, rest, ] = parts; }
  let hh, mm, ss, ms;
  if (ts.includes(':')) {
    const segs = ts.split(/[:.,]/);
    if (segs.length === 4) { hh = segs[0]; mm = segs[1]; ss = segs[2]; ms = segs[3]; }
    else { hh = '0'; mm = segs[0]; ss = segs[1]; ms = segs[2]; } // MM:SS.mmm
  } else {
    hh = '0'; mm = '0'; ss = ts.split(/[.,]/)[0]; ms = ts.split(/[.,]/)[1] || '000';
  }
  hh = String(hh).padStart(2, '0');
  mm = String(mm).padStart(2, '0');
  ss = String(ss).padStart(2, '0');
  ms = String(ms).padEnd(3, '0').slice(0, 3);
  return `${hh}:${mm}:${ss}${useDot ? '.' : ','}${ms}`;
}

function srtToVtt(text) {
  text = text.replace(/\r/g, '');
  // Normalize blank-line separators: ensure cues separated by blank lines
  // Remove BOM
  text = text.replace(/^\uFEFF/, '');
  // Split into blocks by one or more blank lines
  const blocks = text.split(/\n\s*\n/).map(b => b.trim()).filter(Boolean);
  const out = ['WEBVTT', ''];
  let count = 0;
  for (const block of blocks) {
    const lines = block.split('\n');
    // Drop a leading numeric index line
    let i = 0;
    if (/^\d+$/.test(lines[0].trim())) i = 1;
    if (!lines[i]) continue;
    const m = lines[i].match(/(\d{1,2}:\d{2}:\d{2}[.,]\d{1,3}|\d{1,2}:\d{2}[.,]\d{1,3})\s*-->\s*(\d{1,2}:\d{2}:\d{2}[.,]\d{1,3}|\d{1,2}:\d{2}[.,]\d{1,3})/);
    if (!m) continue;
    const start = normalizeTs(m[1], true);
    const end = normalizeTs(m[2], true);
    const payload = lines.slice(i + 1).join('\n').trim();
    out.push(`${start} --> ${end}`);
    out.push(payload);
    out.push('');
    count++;
  }
  return { text: out.join('\n').replace(/\n{3,}/g, '\n\n').trim() + '\n', count };
}

function vttToSrt(text) {
  text = text.replace(/\r/g, '').replace(/^\uFEFF/, '');
  // Remove NOTE / STYLE / REGION blocks
  text = text.replace(/^NOTE\b[\s\S]*?\n\n/gim, '');
  text = text.replace(/^STYLE\b[\s\S]*?\n\n/gim, '');
  text = text.replace(/^REGION\b[\s\S]*?\n\n/gim, '');
  // Remove WEBVTT header line + optional metadata
  text = text.replace(/^WEBVTT.*(\n.*)*?\n\n/i, '');
  const blocks = text.split(/\n\s*\n/).map(b => b.trim()).filter(Boolean);
  const out = [];
  let count = 0;
  for (const block of blocks) {
    let lines = block.split('\n');
    // strip optional cue identifier (line before timestamp) and cue settings after end ts
    let tsLineIdx = lines.findIndex(l => /-->/.test(l));
    if (tsLineIdx === -1) continue;
    let tsLine = lines[tsLineIdx];
    // Remove cue settings (e.g. "align:start position:50%")
    tsLine = tsLine.replace(/(\d{1,2}:\d{2}:\d{2}[.,]\d{1,3}|\d{1,2}:\d{2}[.,]\d{1,3})\s*-->\s*(\d{1,2}:\d{2}:\d{2}[.,]\d{1,3}|\d{1,2}:\d{2}[.,]\d{1,3})(.*)/, (mm, a, b) => `${a} --> ${b}`);
    const m = tsLine.match(/(\d{1,2}:\d{2}:\d{2}[.,]\d{1,3}|\d{1,2}:\d{2}[.,]\d{1,3})\s*-->\s*(\d{1,2}:\d{2}:\d{2}[.,]\d{1,3}|\d{1,2}:\d{2}[.,]\d{1,3})/);
    if (!m) continue;
    const start = normalizeTs(m[1], false);
    const end = normalizeTs(m[2], false);
    const payload = lines.slice(tsLineIdx + 1).join('\n').trim();
    if (!payload) continue;
    count++;
    out.push(String(count));
    out.push(`${start} --> ${end}`);
    out.push(payload);
    out.push('');
  }
  return { text: out.join('\n').replace(/\n{3,}/g, '\n\n').trim() + '\n', count };
}

function doConvert() {
  const inp = $('#input').value;
  if (!inp.trim()) { $('#status').textContent = ''; $('#output').value = ''; return; }
  let res;
  try {
    res = mode === 'srt2vtt' ? srtToVtt(inp) : vttToSrt(inp);
    $('#output').value = res.text;
    $('#status').innerHTML = `<span style="color:var(--gz-success)">✓ ${res.count} cue${res.count===1?'':'s'} converted</span>`;
  } catch (e) {
    $('#status').textContent = 'Error: ' + e.message;
  }
}

function doDownload() {
  const text = $('#output').value;
  if (!text.trim()) return;
  const ext = mode === 'srt2vtt' ? 'vtt' : 'srt';
  const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'subtitles.' + ext;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 3000);
}

function doClear() { $('#input').value = ''; $('#output').value = ''; $('#status').textContent = ''; }

function setMode(m) {
  mode = m;
  document.querySelectorAll('#modeToggle button').forEach(b => b.classList.toggle('active', b.dataset.mode === m));
  $('#lbl-in').textContent = t('inputLabel').replace(/\.\w+/, '.' + (m === 'srt2vtt' ? 'srt' : 'vtt'));
  $('#lbl-out').textContent = t('outputLabel').replace(/\.\w+/, '.' + (m === 'srt2vtt' ? 'vtt' : 'srt'));
  // swap labels text directly based on mode
  $('#lbl-in').textContent = (m === 'srt2vtt' ? 'Input (.srt)' : 'Input (.vtt)');
  $('#lbl-out').textContent = (m === 'srt2vtt' ? 'Output (.vtt)' : 'Output (.srt)');
  doConvert();
}

document.querySelectorAll('#modeToggle button').forEach(b => b.addEventListener('click', () => setMode(b.dataset.mode)));
$('#input').addEventListener('input', doConvert);

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="doConvert()">${t('convert')}</button>
  <button class="gz-btn" onclick="copyText($('#output').value)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doDownload()">${t('download')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

setMode('srt2vtt');

});
</script>
