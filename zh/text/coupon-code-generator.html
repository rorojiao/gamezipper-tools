<script>
GZI18n.register({
  en: {
    toolTitle: 'Coupon Code Generator',
    toolDesc: 'Generate unique coupon codes, promo codes and discount codes for free. Custom prefix, length, character set and quantity — perfect for Shopify, WooCommerce and marketing campaigns. Browser-only, no upload.',
    generate: 'Generate Codes',
    download: 'Download CSV',
    copy: 'Copy All',
    clear: 'Clear',
    lblPrefix: 'Prefix',
    lblSuffix: 'Suffix',
    lblLength: 'Random Part Length',
    lblCount: 'Number of Codes',
    lblSep: 'Separator',
    lblCase: 'Code Casing',
    lblUpper: 'Uppercase (A–Z)',
    lblLower: 'Lowercase (a–z)',
    lblDigits: 'Digits (0–9)',
    lblAmbig: 'Exclude ambiguous (O 0 I 1 L)',
    statLine: '✓ Generated %1 unique codes',
    warnLimit: '⚠ Only %1 unique codes possible with current settings — generated all of them.',
    warnCharset: '⚠ Select at least one character set.',
    step1: 'Set a prefix (e.g. SUMMER) and the random part length',
    step2: 'Pick the number of codes and character set',
    step3: 'Click Generate Codes to produce unique codes',
    step4: 'Copy or download as CSV for Shopify / WooCommerce import',
  },
  zh: {
    toolTitle: '优惠券码生成器',
    toolDesc: '免费生成唯一的优惠券码、促销码和折扣码。自定义前缀、长度、字符集和数量 — 适用于 Shopify、WooCommerce 和营销活动。浏览器本地运行，无需上传。',
    generate: '生成优惠码',
    download: '下载 CSV',
    copy: '复制全部',
    clear: '清除',
    lblPrefix: '前缀',
    lblSuffix: '后缀',
    lblLength: '随机部分长度',
    lblCount: '数量',
    lblSep: '分隔符',
    lblCase: '大小写',
    lblUpper: '大写字母 (A–Z)',
    lblLower: '小写字母 (a–z)',
    lblDigits: '数字 (0–9)',
    lblAmbig: '排除易混淆字符 (O 0 I 1 L)',
    statLine: '✓ 生成 %1 个唯一码',
    warnLimit: '⚠ 当前设置最多只能生成 %1 个唯一码 — 已全部生成。',
    warnCharset: '⚠ 至少选择一个字符集。',
    step1: '设置前缀（如 SUMMER）和随机部分长度',
    step2: '选择数量和字符集',
    step3: '点击「生成优惠码」生成唯一码',
    step4: '复制或下载 CSV 导入 Shopify / WooCommerce',
  }
});

const { $, copyText, t } = GZ;
let lastCodes = [];

function buildAlphabet() {
  const upper = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
  const lower = 'abcdefghijklmnopqrstuvwxyz';
  const digits = '0123456789';
  const ambiguous = new Set(['O','0','I','1','L']);
  let alpha = '';
  if ($('#useUpper').checked) alpha += upper;
  if ($('#useLower').checked) alpha += lower;
  if ($('#useDigits').checked) alpha += digits;
  if (!$('#useAmbiguous').checked) {
    alpha = [...alpha].filter(c => !ambiguous.has(c)).join('');
  }
  return alpha;
}

function applyCase(s) {
  const c = $('#casing').value;
  if (c === 'upper') return s.toUpperCase();
  if (c === 'lower') return s.toLowerCase();
  return s;
}

function randomChar(alpha) {
  const idx = crypto.getRandomValues(new Uint32Array(1))[0] % alpha.length;
  return alpha[idx];
}

function randomPart(len, alpha) {
  let s = '';
  for (let i = 0; i < len; i++) s += randomChar(alpha);
  return s;
}

function doGenerate() {
  const alpha = buildAlphabet();
  if (!alpha) {
    $('#stats').innerHTML = '<span style="color:var(--gz-error)">' + t('warnCharset') + '</span>';
    $('#output').textContent = '';
    lastCodes = [];
    return;
  }
  const prefix = $('#prefix').value.trim();
  const suffix = $('#suffix').value.trim();
  const len = Math.max(1, Math.min(40, parseInt($('#length').value) || 6));
  const count = Math.max(1, Math.min(5000, parseInt($('#count').value) || 20));
  const sep = $('#separator').value;

  // Max unique codes
  const maxUnique = Math.min(5000, Math.pow(alpha.length, len));
  const realCount = Math.min(count, maxUnique);

  const codes = new Set();
  let attempts = 0;
  const maxAttempts = realCount * 30 + 1000;
  while (codes.size < realCount && attempts < maxAttempts) {
    const part = randomPart(len, alpha);
    const code = applyCase(prefix + sep + part + (suffix ? sep + suffix : ''));
    codes.add(code);
    attempts++;
  }
  lastCodes = [...codes];

  $('#output').textContent = lastCodes.join('\n');
  let stat = t('statLine').replace('%1', lastCodes.length);
  if (lastCodes.length < count) stat += ' — ' + t('warnLimit').replace('%1', maxUnique);
  $('#stats').innerHTML = '<span style="color:var(--gz-success)">' + stat + '</span>';
}

function doDownload() {
  if (!lastCodes.length) { doGenerate(); if (!lastCodes.length) return; }
  const csv = 'code\n' + lastCodes.map(c => '"' + c.replace(/"/g, '""') + '"').join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'coupon-codes.csv';
  document.body.appendChild(a); a.click();
  setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 100);
}

function doClear() { $('#output').textContent = ''; $('#stats').textContent = ''; lastCodes = []; }

// Patch labels
$('#lbl-prefix').textContent = t('lblPrefix');
$('#lbl-suffix').textContent = t('lblSuffix');
$('#lbl-length').textContent = t('lblLength');
$('#lbl-count').textContent = t('lblCount');
$('#lbl-sep').textContent = t('lblSep');
$('#lbl-case').textContent = t('lblCase');
$('#lbl-upper').textContent = t('lblUpper');
$('#lbl-lower').textContent = t('lblLower');
$('#lbl-digits').textContent = t('lblDigits');
$('#lbl-ambig').textContent = t('lblAmbig');

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="doGenerate()">${t('generate')}</button>
  <button class="gz-btn" onclick="doDownload()">⬇ ${t('download')}</button>
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

doGenerate();

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',

    {icon:'🔤', href:'/dev/random-string.html', name:'Random String Generator'},
    {icon:'🔑', href:'/dev/api-key-generator.html', name:'API Key Generator'},
  ]
});
</script>
