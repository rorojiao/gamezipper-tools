function generatePoem() {
  const word = $('#wordInput').value.trim().toUpperCase();
  if (!word) return;
  const theme = $('#themeSelect').value;
  const pool = themes[theme] || themes.nature;
  let html = '';
  for (const ch of word) {
    const options = pool[ch] || [`${ch} — a letter that speaks`];
    const line = options[Math.floor(Math.random() * options.length)];
    html += `<div class="poem-line"><span class="poem-letter">${ch}</span>${line.substring(1)}</div>`;
  }
  $('#output').innerHTML = html;
}

  <button class="gz-btn gz-btn-secondary" onclick="copyText(document.getElementById('output').innerText)">${t('copy')}</button>
`;

$('#wordInput').addEventListener('keydown', e => { if (e.key === 'Enter') generatePoem(); });
