<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"How does the plate calculator work?","acceptedAnswer":{"@type":"Answer","text":"You enter your target total weight and your barbell weight. The calculator subtracts the bar, divides the remainder by two (for each side), then uses a greedy algorithm to fit the largest available plates first until the per-side weight is reached."}},{"@type":"Question","name":"What is a standard Olympic barbell weight?","acceptedAnswer":{"@type":"Answer","text":"An Olympic barbell weighs 20 kg (44 lb) for men and 15 kg (33 lb) for women. Standard (1-inch) barbells typically weigh 10-15 kg (22-33 lb). Always check your specific bar — the weight is often printed on the end cap."}},{"@type":"Question","name":"What plate denominations are available?","acceptedAnswer":{"@type":"Answer","text":"For kilograms: 25, 20, 15, 10, 5, 2.5, 1.25, 0.5 kg. For pounds: 45, 35, 25, 10, 5, 2.5, 1.25 lb. These are the standard Olympic plate sizes found in most gyms."}},{"@type":"Question","name":"What if my exact weight cannot be reached?","acceptedAnswer":{"@type":"Answer","text":"The calculator shows the closest achievable weight and warns you of any difference. This happens when your target is not divisible by the smallest available plate increment (e.g. you cannot load 42.3 kg if your smallest plate is 0.5 kg)."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="pc-controls">
      <label><span id="lbl-unit"></span>
        <select id="unit" onchange="calc()">
          <option value="kg">kg</option>
          <option value="lb">lb</option>
        </select>
      </label>
      <label><span id="lbl-target"></span>
        <input id="target" type="number" value="100" min="0" step="0.5" oninput="calc()" style="width:100px" />
      </label>
      <label><span id="lbl-bar"></span>
        <input id="bar" type="number" value="20" min="0" step="0.5" oninput="calc()" style="width:80px" />
      </label>
    </div>
    <div class="pc-bar" id="visual"></div>
    <div class="pc-result" id="result"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Barbell Plate Calculator',
    toolDesc: 'Enter your target weight and barbell weight to instantly see which plates to load on each side. Supports kg and lb with standard Olympic plate sizes.',
    unitLabel: 'Unit',
    targetLabel: 'Target Weight',
    barLabel: 'Barbell Weight',
    eachSide: 'Per Side',
    plates: 'Plates to Load (each side)',
    totalLoaded: 'Total Loaded Weight',
    barWeight: 'Bar Weight',
    sideWeight: 'Per-Side Weight',
    closest: 'Closest achievable',
    warning: '⚠ Exact target not reachable with available plates. Loaded',
    instead: 'instead.',
    step1: 'Select your unit (kg or lb)',
    step2: 'Enter your target total weight',
    step3: 'Set your barbell weight (20 kg / 44 lb for Olympic)',
    step4: 'Read the plate breakdown and visual barbell layout',
  },
  zh: {
    toolTitle: '杠铃片计算器',
    toolDesc: '输入目标重量和杠铃重量，即时查看每侧需要加载哪些杠铃片。支持公斤和磅，标准奥运杠铃片规格。',
    unitLabel: '单位',
    targetLabel: '目标重量',
    barLabel: '杠铃重量',
    eachSide: '每侧',
    plates: '每侧需要加载的杠铃片',
    totalLoaded: '实际加载总重量',
    barWeight: '杠铃重量',
    sideWeight: '每侧重量',
    closest: '最接近可达重量',
    warning: '⚠ 现有杠铃片无法精确达到目标重量，已加载',
    instead: '。',
    step1: '选择单位（公斤或磅）',
    step2: '输入目标总重量',
    step3: '设置杠铃重量（奥运杠铃 20 公斤 / 44 磅）',
    step4: '查看杠铃片分配和可视化杠铃布局',
  }
});

const { $, t } = GZ;

const PLATES = {
  kg: [25, 20, 15, 10, 5, 2.5, 1.25, 0.5],
  lb: [45, 35, 25, 10, 5, 2.5, 1.25],
};

const PLATE_COLORS = {
  25: '#c0392b', 20: '#2c3e50', 15: '#2980b9', 10: '#27ae60',
  5: '#e67e22', 2.5: '#8e44ad', 1.25: '#16a085', 0.5: '#f39c12',
  45: '#c0392b', 35: '#2c3e50', 35: '#2980b9',
};

function calc() {
  const unit = $('#unit').value;
  const target = parseFloat($('#target').value) || 0;
  const barWeight = parseFloat($('#bar').value) || 0;
  const plates = PLATES[unit];

  if (target <= barWeight) {
    $('#visual').innerHTML = `<span style="color:var(--text2)">—</span>`;
    $('#result').innerHTML = `<p style="color:var(--text2)">Target must be greater than bar weight.</p>`;
    return;
  }

  let sideTarget = (target - barWeight) / 2;
  let sidePlates = [];
  let remaining = sideTarget;

  for (const p of plates) {
    while (remaining >= p - 0.001) {
      sidePlates.push(p);
      remaining -= p;
      remaining = Math.round(remaining * 1000) / 1000;
    }
  }

  const actualSide = sidePlates.reduce((a, b) => a + b, 0);
  const actualTotal = barWeight + actualSide * 2;
  const diff = Math.abs(target - actualTotal);

  // Visual barbell
  const visual = $('#visual');
  visual.innerHTML = '';
  const leftSide = document.createElement('div');
  leftSide.className = 'pc-side';
  leftSide.style.flexDirection = 'row-reverse';
  const barbellEl = document.createElement('div');
  barbellEl.className = 'pc-barbell';
  const rightSide = document.createElement('div');
  rightSide.className = 'pc-side';

  function makePlate(weight) {
    const el = document.createElement('div');
    el.className = 'pc-plate';
    const height = 30 + Math.min(30, weight * 1.5);
    const width = 8 + Math.min(12, weight * 0.6);
    el.style.height = height + 'px';
    el.style.width = width + 'px';
    el.style.background = PLATE_COLORS[weight] || '#555';
    el.textContent = weight;
    return el;
  }

  [...sidePlates].reverse().forEach(p => leftSide.appendChild(makePlate(p)));
  sidePlates.forEach(p => rightSide.appendChild(makePlate(p)));
  visual.appendChild(leftSide);
  visual.appendChild(barbellEl);
  visual.appendChild(rightSide);

  // Result text
  let html = `<h3>${t('plates')}</h3>`;
  if (sidePlates.length === 0) {
    html += `<p style="color:var(--text2)">Bar only — no plates needed.</p>`;
  } else {
    // Group plates
    const counts = {};
    sidePlates.forEach(p => counts[p] = (counts[p] || 0) + 1);
    html += '<div class="pc-plate-list">';
    Object.entries(counts).sort((a,b) => parseFloat(b[0]) - parseFloat(a[0])).forEach(([w, c]) => {
      html += `<span class="pc-plate-chip"><b>×${c}</b> × ${w} ${unit}</span>`;
    });
    html += '</div>';
  }

  html += `<div class="pc-summary">`;
  html += `${t('totalLoaded')}: <span>${actualTotal} ${unit}</span><br>`;
  html += `${t('barWeight')}: <span>${barWeight} ${unit}</span><br>`;
  html += `${t('sideWeight')}: <span>${actualSide} ${unit}</span>`;
  html += `</div>`;

  if (diff > 0.01) {
    html += `<p class="pc-warn">${t('warning')} <b>${actualTotal} ${unit}</b>${t('instead')}</p>`;
  }

  $('#result').innerHTML = html;
}

calc();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'💪', href:'/calc/one-rep-max.html', name:'One Rep Max Calculator'},
    {icon:'🔥', href:'/calc/bmr-calculator.html', name:'BMR Calculator'},
    {icon:'⚖️', href:'/calc/tdee-calculator.html', name:'TDEE Calculator'},
    {icon:'❤️', href:'/calc/heart-rate-zones.html', name:'Heart Rate Zones'},
  ]
});
</script>
<script src="/tools-result-rec.js?v=20260707v520" defer></script>
</body>
</html>
