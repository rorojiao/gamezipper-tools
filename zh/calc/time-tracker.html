.tt-tag{display:inline-block;background:rgba(0,214,114,.15);color:#00d672;padding:2px 8px;border-radius:6px;font-size:.72em;font-weight:700}
.tt-del{background:transparent;border:none;color:#ff6b81;cursor:pointer;font-size:1rem;padding:4px 8px;border-radius:6px}

.tt-empty{text-align:center;padding:30px 10px;color:var(--text3);font-size:.9em}

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>

  </div>
  <div class="gz-tool-area">

      <label><span id="lbl-rate"></span><input type="number" id="rate" min="0" step="0.01" value="50"></label>
      <label><span id="lbl-currency"></span><input type="text" id="currency" value="$" maxlength="3"></label>

    <div class="tt-row">
      <input type="text" id="task" placeholder="" autocomplete="off">
      <button class="gz-btn" id="btn-start"></button>
      <button class="gz-btn gz-btn-secondary" id="btn-stop" style="display:none"></button>
      <button class="gz-btn gz-btn-secondary" id="btn-export"></button>
      <button class="gz-btn gz-btn-secondary" id="btn-clear"></button>
    </div>
    <div class="tt-active" id="active-box" style="display:none">
      <div><div class="task" id="active-task"></div><div class="tt-tag" id="active-tag">●</div></div>
      <div class="tt-clock" id="active-clock">00:00:00</div>
    </div>
    <div id="entries-wrap">
      <table class="tt-table" id="entries-table" style="display:none">
        <thead><tr><th id="th-task"></th><th id="th-start"></th><th id="th-dur"></th><th id="th-earn"></th><th></th></tr></thead>
        <tbody id="entries-body"></tbody>
        <tfoot><tr class="tt-sum"><td colspan="2" id="sum-label"></td><td id="sum-dur"></td><td id="sum-earn"></td><td></td></tr></tfoot>
      </table>

  </div>

</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Time Tracker',
    toolDesc: 'Track time on tasks and projects with a start/stop timer, hourly rate and CSV export. Billable earnings are calculated automatically. Free, private and browser-only.',
    rate: 'Hourly rate',
    currency: 'Currency symbol',
    taskPlaceholder: 'Task or project name…',
    start: '▶ Start',
    stop: '⏹ Stop',
    exportCsv: '⬇ Export CSV',
    clearAll: '🗑 Clear',
    thTask: 'Task', thStart: 'Started', thDur: 'Duration', thEarn: 'Earnings',
    sumTotal: 'Total',
    empty: 'No entries yet. Start a timer above to log your first task.',
    running: 'Running',
    step1: 'Set your hourly rate and currency symbol',
    step2: 'Type a task name and press Start',
    step3: 'Press Stop when done — the entry is logged automatically',
    step4: 'Export your entries as CSV or Clear all when you no longer need them',
    confirmClear: 'Delete all time entries? This cannot be undone.',
    colTask: 'Task', colStarted: 'Started', ColDuration: 'Duration (h)', colEarnings: 'Earnings',
  },
  zh: {
    toolTitle: '时间追踪器',
    toolDesc: '为任务和项目记录工时 — 启动/停止计时器、设置时薪、自动计算应收金额并导出 CSV。免费、私密、浏览器本地运行。',
    rate: '时薪',
    currency: '货币符号',
    taskPlaceholder: '任务或项目名称…',
    start: '▶ 开始',
    stop: '⏹ 停止',
    exportCsv: '⬇ 导出 CSV',
    clearAll: '🗑 清空',
    thTask: '任务', thStart: '开始时间', thDur: '时长', thEarn: '收入',
    sumTotal: '合计',
    empty: '暂无记录。点击上方「开始」记录你的第一个任务。',
    running: '计时中',
    step1: '设置时薪和货币符号',
    step2: '输入任务名称并点击「开始」',
    step3: '完成后点击「停止」，记录将自动保存',
    step4: '可将记录导出为 CSV，或不再需要时清空全部',
    confirmClear: '确定要删除所有时间记录吗？此操作不可撤销。',
    colTask: '任务', colStarted: '开始时间', ColDuration: '时长（小时）', colEarnings: '收入',
  }
});

const { $, t, showToast } = GZ;
const LS_KEY = 'gz-timetracker-v1';

let state = { entries: [], active: null, rate: 50, currency: '$' };
try {
  const saved = JSON.parse(localStorage.getItem(LS_KEY) || '{}');
  if (saved && Array.isArray(saved.entries)) state = Object.assign(state, saved);
} catch(e) {}

function save() { localStorage.setItem(LS_KEY, JSON.stringify(state)); }

function fmtDuration(ms) {
  const s = Math.max(0, Math.floor(ms / 1000));
  const h = Math.floor(s / 3600);
  const m = Math.floor((s % 3600) / 60);
  const sec = s % 60;
  return [h, m, sec].map(n => String(n).padStart(2, '0')).join(':');
}

function fmtDate(ts) {
  const d = new Date(ts);
  return d.toLocaleString(undefined, { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
}

function syncControls() {
  $('#rate').value = state.rate;
  $('#currency').value = state.currency;
  $('#task').placeholder = t('taskPlaceholder');
  $('#btn-start').textContent = t('start');
  $('#btn-stop').textContent = t('stop');
  $('#btn-export').textContent = t('exportCsv');
  $('#btn-clear').textContent = t('clearAll');
  $('#th-task').textContent = t('thTask');
  $('#th-start').textContent = t('thStart');
  $('#th-dur').textContent = t('thDur');
  $('#th-earn').textContent = t('thEarn');
  $('#sum-label').textContent = t('sumTotal');
  $('#entries-empty').textContent = t('empty');
  $('#active-tag').textContent = t('running');
  $('#lbl-rate').textContent = t('rate');
  $('#lbl-currency').textContent = t('currency');
}

function renderActive() {
  const box = $('#active-box');
  if (state.active) {
    box.style.display = '';
    $('#active-task').textContent = state.active.task || '(untitled)';
    updateClock();
  } else {
    box.style.display = 'none';
    $('#btn-start').style.display = '';
    $('#btn-stop').style.display = 'none';
  }
  if (state.active) {
    $('#btn-start').style.display = 'none';
    $('#btn-stop').style.display = '';
  }
}

function updateClock() {
  if (!state.active) return;
  const elapsed = Date.now() - state.active.start;
  $('#active-clock').textContent = fmtDuration(elapsed);
}

function renderEntries() {
  const body = $('#entries-body');
  const table = $('#entries-table');
  const empty = $('#entries-empty');
  body.innerHTML = '';
  if (!state.entries.length) {
    table.style.display = 'none';
    empty.style.display = '';
    return;
  }
  empty.style.display = 'none';
  table.style.display = '';
  let totalMs = 0, totalEarn = 0;
  const cur = state.currency || '$';
  state.entries.slice().reverse().forEach((e, idx) => {
    const realIdx = state.entries.length - 1 - idx;
    const dur = e.end - e.start;
    const hours = dur / 3600000;
    const earn = hours * (e.rate || 0);
    totalMs += dur; totalEarn += earn;
    const tr = document.createElement('tr');
    tr.innerHTML = `<td>${escapeHtml(e.task || '(untitled)')}</td>` +
      `<td>${fmtDate(e.start)}</td>` +
      `<td>${fmtDuration(dur)}</td>` +
      `<td>${cur}${earn.toFixed(2)}</td>` +
      `<td><button class="tt-del" title="Delete" data-idx="${realIdx}">✕</button></td>`;
    body.appendChild(tr);
  });
  $('#sum-dur').textContent = fmtDuration(totalMs);
  $('#sum-earn').textContent = cur + totalEarn.toFixed(2);
  body.querySelectorAll('.tt-del').forEach(b => {
    b.addEventListener('click', () => {
      const i = +b.dataset.idx;
      state.entries.splice(i, 1);
      save(); renderEntries();
    });
  });
}

function escapeHtml(s) { return String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

function startTimer() {
  const task = $('#task').value.trim();
  if (state.active) { showToast(t('running')); return; }
  state.active = { task, start: Date.now(), rate: parseFloat(state.rate) || 0 };
  save();
  renderActive();
}

function stopTimer() {
  if (!state.active) return;
  const a = state.active;
  state.entries.push({ task: a.task, start: a.start, end: Date.now(), rate: a.rate });
  state.active = null;
  $('#task').value = '';
  save();
  renderActive();
  renderEntries();
}

function exportCsv() {
  if (!state.entries.length) { showToast('No entries'); return; }
  const cur = state.currency || '$';
  const rows = [[t('colTask'), t('colStarted'), t('ColDuration'), t('colEarnings')]];
  state.entries.forEach(e => {
    const hours = (e.end - e.start) / 3600000;
    rows.push([e.task || '', fmtDate(e.start), hours.toFixed(4), ((hours * (e.rate || 0)).toFixed(2))]);
  });
  const csv = rows.map(r => r.map(c => `"${String(c).replace(/"/g, '""')}"`).join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'time-tracker.csv';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function clearAll() {
  if (!confirm(t('confirmClear'))) return;
  state.entries = []; state.active = null;
  save(); renderActive(); renderEntries();
}

$('#btn-start').addEventListener('click', startTimer);
$('#btn-stop').addEventListener('click', stopTimer);
$('#btn-export').addEventListener('click', exportCsv);
$('#btn-clear').addEventListener('click', clearAll);
$('#task').addEventListener('keydown', e => { if (e.key === 'Enter') { if (state.active) stopTimer(); else startTimer(); } });
$('#rate').addEventListener('change', e => { state.rate = parseFloat(e.target.value) || 0; save(); });
$('#currency').addEventListener('change', e => { state.currency = e.target.value.slice(0, 3) || '$'; save(); renderEntries(); });

setInterval(updateClock, 1000);

syncControls();
renderActive();
renderEntries();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'💼', href:'/calc/freelance-rate-calculator.html', name:'Freelance Rate Calculator'},
    {icon:'🧾', href:'/calc/income-tax-calculator.html', name:'Income Tax'},
    {icon:'⏰', href:'/calc/pomodoro.html', name:'Pomodoro Timer'},
    {icon:'💰', href:'/calc/paycheck-calculator.html', name:'Paycheck Calculator'},
  ]
});
</script>
<script src="/tools-result-rec.js?v=20260707v520" defer></script>
</body>
