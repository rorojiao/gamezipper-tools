.pc-drop:hover{border-color:var(--accent);background:var(--glass)}

.pc-thumb .x{position:absolute;top:4px;right:4px;background:rgba(0,0,0,.6);color:#fff;border:none;border-radius:6px;width:22px;height:22px;cursor:pointer;font-size:.8rem;display:flex;align-items:center;justify-content:center}

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="pc-drop" id="drop">
      <strong>📁 <span id="dropTitle">Drop images here or click to upload</span></strong>
      <span id="dropSub">PNG, JPG, WebP, GIF — multiple images supported</span>
      <input type="file" id="fileInput" accept="image/*" multiple style="display:none">
    </div>

    <div class="pc-grid" id="thumbs"></div>

    <div class="pc-controls">
      <div class="pc-ctrl">
        <label id="lblCols">Columns</label>
        <input type="number" id="cols" min="1" max="10" value="3">
      </div>
      <div class="pc-ctrl">
        <label id="lblGap">Gap (px)</label>
        <input type="number" id="gap" min="0" max="50" value="6">
      </div>
      <div class="pc-ctrl">
        <label id="lblPad">Padding (px)</label>
        <input type="number" id="pad" min="0" max="60" value="12">
      </div>
      <div class="pc-ctrl">
        <label id="lblRadius">Corner radius (px)</label>
        <input type="number" id="radius" min="0" max="60" value="8">
      </div>
      <div class="pc-ctrl">
        <label id="lblBg">Background</label>
        <input type="color" id="bg" value="#1a1a2e">
      </div>
      <div class="pc-ctrl">
        <label id="lblFit">Image fit</label>
        <select id="fit">
          <option value="cover">Cover (fill)</option>
          <option value="contain">Contain (fit)</option>
        </select>
      </div>
      <div class="pc-ctrl">
        <label id="lblCell">Cell shape</label>
        <select id="cellShape">
          <option value="square">Square</option>
          <option value="portrait">Portrait</option>
          <option value="landscape">Landscape</option>
        </select>
      </div>
      <div class="pc-ctrl">
        <label id="lblMaxW">Max width (px)</label>
        <input type="number" id="maxW" min="400" max="4000" step="100" value="1600">
      </div>
    </div>

    <div class="pc-preview-wrap">
      <canvas id="canvas"></canvas>
    </div>

    <div class="pc-stat-row">
      <div><span class="label" id="lblImg">Images</span> <span class="value" id="imgCount">0</span></div>
      <div><span class="label" id="lblCellCount">Cells</span> <span class="value" id="cellCount">0</span></div>
      <div><span class="label" id="lblOut">Output</span> <span class="value" id="outSize">—</span></div>
    </div>

    <div class="gz-toolbar" id="toolbar"></div>
  </div>

<script>
GZI18n.register({
  en: {
    toolTitle: 'Photo Collage Maker',
    toolDesc: 'Combine multiple images into a clean, customizable grid collage. Choose columns, gap, padding, corner radius and background — preview live, download as PNG. All in your browser.',
    lblCols: 'Columns', lblGap: 'Gap (px)', lblPad: 'Padding (px)', lblRadius: 'Corner radius (px)',
    lblBg: 'Background', lblFit: 'Image fit', lblCell: 'Cell shape', lblMaxW: 'Max width (px)',
    lblImg: 'Images', lblCellCount: 'Cells', lblOut: 'Output',
    dropTitle: 'Drop images here or click to upload',
    dropSub: 'PNG, JPG, WebP, GIF — multiple images supported',
    step1: 'Drop or click to upload 2+ images (PNG, JPG, WebP, GIF)',
    step2: 'Customize columns, gap, padding, corner radius and background color',
    step3: 'Watch the preview update live as you tweak the controls',
    step4: 'Click Download PNG to save the final collage to your device',
  },
  zh: {
    toolTitle: '照片拼图生成器',
    toolDesc: '将多张图片合并为可自定义的网格拼图。选择列数、间距、内边距、圆角和背景 — 实时预览，下载为 PNG。完全浏览器本地处理。',
    lblCols: '列数', lblGap: '间距 (px)', lblPad: '内边距 (px)', lblRadius: '圆角 (px)',
    lblBg: '背景', lblFit: '图片填充', lblCell: '单元格形状', lblMaxW: '最大宽度 (px)',
    lblImg: '图片数', lblCellCount: '单元格', lblOut: '输出',
    dropTitle: '拖拽图片到此处或点击上传',
    dropSub: '支持 PNG、JPG、WebP、GIF — 可上传多张',
    step1: '拖拽或点击上传 2+ 张图片（PNG、JPG、WebP、GIF）',
    step2: '自定义列数、间距、内边距、圆角和背景色',
    step3: '调整控制项时实时预览',
    step4: '点击「下载 PNG」保存拼图到设备',
  }
});

const { $, copyText, t } = GZ;
const images = [];
let canvas;

function handleFiles(files) {
  Array.from(files).forEach(f => {
    if (!f.type.startsWith('image/')) return;
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => { images.push(img); render(); };
      img.src = e.target.result;
    };
    reader.readAsDataURL(f);
  });
}

function renderThumbs() {
  const wrap = $('#thumbs');
  wrap.innerHTML = '';
  images.forEach((img, i) => {
    const d = document.createElement('div');
    d.className = 'pc-thumb';
    d.innerHTML = `<img src="${img.src}"><button class="x" data-i="${i}">×</button>`;
    wrap.appendChild(d);
  });
  wrap.querySelectorAll('.x').forEach(b => {
    b.addEventListener('click', e => {
      e.stopPropagation();
      const i = parseInt(b.dataset.i);
      images.splice(i, 1);
      render();
    });
  });
}

function getCellRatio() {
  const s = $('#cellShape').value;
  if (s === 'portrait') return 3/4;
  if (s === 'landscape') return 4/3;
  return 1;
}

function render() {
  if (!canvas) canvas = $('#canvas');
  const ctx = canvas.getContext('2d');
  const cols = Math.max(1, parseInt($('#cols').value) || 3);
  const gap = Math.max(0, parseInt($('#gap').value) || 0);
  const pad = Math.max(0, parseInt($('#pad').value) || 0);
  const radius = Math.max(0, parseInt($('#radius').value) || 0);
  const bg = $('#bg').value;
  const fit = $('#fit').value;
  const cellRatio = getCellRatio();
  const maxW = Math.max(400, parseInt($('#maxW').value) || 1600);

  const total = images.length;
  const rows = Math.ceil(total / cols);
  // Compute cell pixel size based on max width
  const usableW = maxW - pad * 2;
  const cellW = Math.floor((usableW - gap * (cols - 1)) / cols);
  const cellH = Math.floor(cellW * cellRatio);
  const canvasW = pad * 2 + cols * cellW + gap * (cols - 1);
  const canvasH = pad * 2 + rows * cellH + gap * (rows - 1);

  // Cap output height for very large collages
  const dpr = Math.min(2, 4000 / Math.max(canvasW, canvasH));

  canvas.width = canvasW * dpr;
  canvas.height = canvasH * dpr;
  canvas.style.maxWidth = Math.min(800, canvasW) + 'px';
  canvas.style.width = Math.min(800, canvasW) + 'px';

  ctx.scale(dpr, dpr);
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, canvasW, canvasH);

  const drawOne = (i) => {
    if (i >= total) return;
    const r = Math.floor(i / cols);
    const c = i % cols;
    const x = pad + c * (cellW + gap);
    const y = pad + r * (cellH + gap);
    ctx.save();
    roundRect(ctx, x, y, cellW, cellH, radius);
    ctx.clip();
    const img = images[i];
    if (fit === 'cover') {
      const scale = Math.max(cellW / img.width, cellH / img.height);
      const w = img.width * scale, h = img.height * scale;
      ctx.drawImage(img, x + (cellW - w) / 2, y + (cellH - h) / 2, w, h);
    } else {
      const scale = Math.min(cellW / img.width, cellH / img.height);
      const w = img.width * scale, h = img.height * scale;
      ctx.fillStyle = '#000';
      ctx.fillRect(x, y, cellW, cellH);
      ctx.drawImage(img, x + (cellW - w) / 2, y + (cellH - h) / 2, w, h);
    }
    ctx.restore();
    drawOne(i + 1);
  };
  drawOne(0);

  $('#imgCount').textContent = total;
  $('#cellCount').textContent = rows * cols;
  $('#outSize').textContent = total ? `${canvasW}×${canvasH}` : '—';
  renderThumbs();
}

function roundRect(ctx, x, y, w, h, r) {
  r = Math.min(r, w / 2, h / 2);
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}

function downloadPNG() {
  if (!images.length) return;
  const link = document.createElement('a');
  link.download = `collage-${Date.now()}.png`;
  link.href = canvas.toDataURL('image/png');
  link.click();
}

document.querySelectorAll('.pc-controls input, .pc-controls select').forEach(el => {
  el.addEventListener('input', render);
});

$('#drop').addEventListener('click', () => $('#fileInput').click());
$('#fileInput').addEventListener('change', e => { handleFiles(e.target.files); e.target.value = ''; });
$('#drop').addEventListener('dragover', e => { e.preventDefault(); $('#drop').style.borderColor = 'var(--accent)'; });
$('#drop').addEventListener('dragleave', () => { $('#drop').style.borderColor = 'var(--border)'; });
$('#drop').addEventListener('drop', e => { e.preventDefault(); $('#drop').style.borderColor = 'var(--border)'; handleFiles(e.dataTransfer.files); });

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="downloadPNG()">⬇️ Download PNG</button>
  <button class="gz-btn gz-btn-secondary" onclick="images.length=0;render()">${t('clear')}</button>`;

GZ.renderToolPage({
  category: 'image',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'✂️', href:'/image/image-splitter.html', name:'Image Splitter'},
    {icon:'🧩', href:'/image/sprite-generator.html', name:'CSS Sprite'},
    {icon:'📦', href:'/image/compressor.html', name:'Image Compressor'},
    {icon:'📐', href:'/image/resizer.html', name:'Image Resizer'},
  ]
});
</script>

</body>
