<script type="application/ld+json">{"@context":"https://schema.org","@type":"WebApplication","name":"Nutrition Facts Label Generator","description":"Create FDA-style Nutrition Facts labels for food products, recipes and menus. Enter serving size, calories and daily values and download a print-ready PNG or SVG label.","url": "https://tools.gamezipper.com/zh/text/nutrition-facts-label.html","applicationCategory":"Utility","operatingSystem":"Web Browser","offers":{"@type":"Offer","price":"0"}}</script>
<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "How do I create a Nutrition Facts label?", "acceptedAnswer": {"@type": "Answer", "text": "Enter your serving size, calories and the daily value amounts for fats, cholesterol, sodium, carbohydrates and nutrients. The label updates live and you can download it as a PNG or SVG image for printing or packaging."}}, {"@type": "Question", "name": "Is this label FDA-compliant?", "acceptedAnswer": {"@type": "Answer", "text": "The label uses the standard 2016 FDA vertical layout (heading, calories, nutrients to limit, beneficial nutrients, footnote). Always verify against current FDA guidance before commercial packaging."}}, {"@type": "Question", "name": "Can I download the label as an image?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. The label can be downloaded as a high-resolution PNG (transparent background optional) or as a scalable SVG file. Both formats are suitable for print and digital use."}}, {"@type": "Question", "name": "Are my nutrition values stored anywhere?", "acceptedAnswer": {"@type": "Answer", "text": "No. All values stay in your browser. The label is rendered with HTML and Canvas entirely on your device — nothing is uploaded to any server."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="nutri-wrap">
      <div class="nutri-form" id="form"></div>
      <div>
        <div class="nf-label" id="label-preview"></div>
        <div class="nutri-actions">
          <button class="gz-btn" onclick="downloadPNG()" id="btn-png"></button>
          <button class="gz-btn gz-btn-secondary" onclick="downloadSVG()" id="btn-svg"></button>
          <button class="gz-btn gz-btn-secondary" onclick="loadExample()" id="btn-ex"></button>
        </div>
      </div>
    </div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Nutrition Facts Label Generator',
    toolDesc: 'Create FDA-style Nutrition Facts labels for food products, recipes and menus. Download as PNG or SVG — free, browser-based, no signup.',
    servingSize: 'Serving Size',
    servings: 'Servings Per Container',
    calories: 'Calories',
    totalFat: 'Total Fat (g)',
    satFat: 'Saturated Fat (g)',
    transFat: 'Trans Fat (g)',
    cholesterol: 'Cholesterol (mg)',
    sodium: 'Sodium (mg)',
    totalCarb: 'Total Carbohydrate (g)',
    dietaryFiber: 'Dietary Fiber (g)',
    totalSugars: 'Total Sugars (g)',
    addedSugars: 'Added Sugars (g)',
    protein: 'Protein (g)',
    vitD: 'Vitamin D (mcg)',
    calcium: 'Calcium (mg)',
    iron: 'Iron (mg)',
    potassium: 'Potassium (mg)',
    btnPNG: 'Download PNG',
    btnSVG: 'Download SVG',
    btnExample: 'Load Example',
    step1: 'Enter your serving size and servings per container',
    step2: 'Fill in calories and the daily-value amounts (g, mg or mcg)',
    step3: 'Watch the FDA-style label update live on the right',
    step4: 'Click Download PNG or SVG to save a print-ready label',
  },
  zh: {
    toolTitle: '营养成分标签生成器',
    toolDesc: '为食品、食谱和菜单创建 FDA 风格的营养成分标签。下载为 PNG 或 SVG — 免费浏览器本地运行，无需注册。',
    servingSize: '份量',
    servings: '每包装份数',
    calories: '热量（卡路里）',
    totalFat: '总脂肪（克）',
    satFat: '饱和脂肪（克）',
    transFat: '反式脂肪（克）',
    cholesterol: '胆固醇（毫克）',
    sodium: '钠（毫克）',
    totalCarb: '总碳水化合物（克）',
    dietaryFiber: '膳食纤维（克）',
    totalSugars: '总糖（克）',
    addedSugars: '添加糖（克）',
    protein: '蛋白质（克）',
    vitD: '维生素 D（微克）',
    calcium: '钙（毫克）',
    iron: '铁（毫克）',
    potassium: '钾（毫克）',
    btnPNG: '下载 PNG',
    btnSVG: '下载 SVG',
    btnExample: '加载示例',
    step1: '输入份量和每包装份数',
    step2: '填写热量和各项营养素的日均值（克、毫克或微克）',
    step3: '右侧的 FDA 风格标签会实时更新',
    step4: '点击「下载 PNG」或「SVG」保存可打印的标签',
  }
});

const { $, t } = GZ;

const FIELDS = [
  ['servingSize','text'], ['servings','number'], ['calories','number'],
  ['totalFat','number'], ['satFat','number'], ['transFat','number'],
  ['cholesterol','number'], ['sodium','number'],
  ['totalCarb','number'], ['dietaryFiber','number'], ['totalSugars','number'], ['addedSugars','number'],
  ['protein','number'],
  ['vitD','number'], ['calcium','number'], ['iron','number'], ['potassium','number'],
];

const DV = { totalFat:78, satFat:20, cholesterol:300, sodium:2300, totalCarb:275, dietaryFiber:28, totalSugars:50, addedSugars:50, protein:50, vitD:20, calcium:1300, iron:18, potassium:4700 };

function buildForm() {
  $('#form').innerHTML = FIELDS.map(([key,type]) => `
    <div>
      <label>${t(key)}</label>
      <input type="${type}" id="f-${key}" oninput="render()" ${type==='number'?'min="0" step="0.1"':''}>
    </div>`).join('');
}

function val(key){ return document.getElementById('f-'+key).value; }
function num(key){ return parseFloat(val(key))||0; }
function pct(key){ const p = num(key)/DV[key]*100; return p>=1?Math.round(p)+'%':(p>0?p.toFixed(1)+'%':'0%'); }
function dvRow(label, key, indent, unit){
  const v = num(key); if(!v && key!=='totalFat' && key!=='totalCarb' && key!=='sodium' && key!=='transFat') return '';
  const dv = DV[key] ? pct(key) : '';
  return `<div class="nf-row"><span class="${indent?'sub':''}">${label} ${v?('<b>'+v+(unit?' '+unit:'')+'g</b>'.replace('g</b>',unit?'</b>':'g</b>')):''}</span>${dv?('<span class="pct">'+dv+'</span>'):''}</div>`;
}

function render(){
  const serv = val('servingSize')||'';
  const servPer = val('servings')||'';
  const cal = num('calories');
  $('#label-preview').innerHTML = `
    <div class="nf-title">Nutrition Facts</div>
    <div class="nf-serv">${servPer?servPer+' servings per container':''}</div>
    <div style="font-weight:900;font-size:13px">Serving size</div>
    <div style="font-weight:900;font-size:13px;border-bottom:6px solid #000;padding-bottom:3px">${serv||'\u00A0'}</div>
    <div style="font-weight:900;font-size:11px;margin-top:6px">Amount per serving</div>
    <div class="nf-cal"><span>Calories</span><span>${cal}</span></div>
    <div class="nf-bar-thick"></div>
    <div style="font-size:9px;text-align:right;font-weight:900">% Daily Value*</div>
    ${dvRow('Total Fat','totalFat',false,'g')}
    ${dvRow('Saturated Fat','satFat',true,'g')}
    ${num('transFat')?`<div class="nf-row"><span class="sub">Trans Fat ${num('transFat')}g</span></div>`:''}
    ${dvRow('Cholesterol','cholesterol',false,'mg')}
    ${dvRow('Sodium','sodium',false,'mg')}
    ${dvRow('Total Carbohydrate','totalCarb',false,'g')}
    ${dvRow('Dietary Fiber','dietaryFiber',true,'g')}
    ${dvRow('Total Sugars','totalSugars',true,'g')}
    ${dvRow('Includes Added Sugars','addedSugars',true,'g')}
    ${dvRow('Protein','protein',false,'g')}
    <div class="nf-bar"></div>
    ${dvRow('Vitamin D','vitD',false,'mcg')}
    ${dvRow('Calcium','calcium',false,'mg')}
    ${dvRow('Iron','iron',false,'mg')}
    ${dvRow('Potassium','potassium',false,'mg')}
    <div class="nf-foot">* The % Daily Value (DV) tells you how much a nutrient in a serving of food contributes to a daily diet. 2,000 calories a day is used for general nutrition advice.</div>`;
}

function loadExample(){
  const ex = { servingSize:'1 cup (228g)', servings:'2', calories:'260', totalFat:'13', satFat:'5', transFat:'2', cholesterol:'30', sodium:'660', totalCarb:'31', dietaryFiber:'0', totalSugars:'5', addedSugars:'5', protein:'5', vitD:'3.2', calcium:'260', iron:'1.4', potassium:'240' };
  Object.entries(ex).forEach(([k,v])=>{ document.getElementById('f-'+k).value=v; });
  render();
}

function downloadPNG(){
  const node = $('#label-preview');
  const w=300,h=node.scrollHeight;
  const canvas=document.createElement('canvas');canvas.width=w*2;canvas.height=h*2;
  const ctx=canvas.getContext('2d');ctx.scale(2,2);
  const data=`<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}">
    <foreignObject width="100%" height="100%"><div xmlns="http://www.w3.org/1999/xhtml" style="width:${w}px">${node.outerHTML.replace('id="label-preview"','')}</div></foreignObject></svg>`;
  const img=new Image();const blob=new Blob([data],{type:'image/svg+xml;charset=utf-8'});const url=URL.createObjectURL(blob);
  img.onload=()=>{ctx.fillStyle='#fff';ctx.fillRect(0,0,w,h);ctx.drawImage(img,0,0);URL.revokeObjectURL(url);
    canvas.toBlob(b=>{const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='nutrition-facts.png';a.click();});};
  img.onerror=()=>alert('PNG export needs an SVG-capable browser. Try the SVG download.');img.src=url;
}
function downloadSVG(){
  const node=$('#label-preview');
  const svg=`<svg xmlns="http://www.w3.org/2000/svg" width="300" height="${node.scrollHeight}">
    <foreignObject width="100%" height="100%"><div xmlns="http://www.w3.org/1999/xhtml">${node.outerHTML.replace('id="label-preview"','')}</div></foreignObject></svg>`;
  const blob=new Blob([svg],{type:'image/svg+xml'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='nutrition-facts.svg';a.click();
}

document.getElementById('btn-png').textContent=t('btnPNG');
document.getElementById('btn-svg').textContent=t('btnSVG');
document.getElementById('btn-ex').textContent=t('btnExample');
buildForm();
loadExample();

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🔢', href:'/text/word-counter.html', name:'Word Counter'},
    
    {icon:'📋', href:'/text/citation-generator.html', name:'Citation Generator'},
    {icon:'🍔', href:'/calc/tdee-calculator.html', name:'TDEE Calculator'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
