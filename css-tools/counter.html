<script type="application/ld+json">{"@context":"https://schema.org","@type":"WebApplication","name":"CSS Counter & Numbering Generator","description":"Generate CSS counters for automatic numbering of headings, lists, sections and figures. Live preview, 6 presets and copy-ready code.","url":"https://tools.gamezipper.com/css-tools/counter.html","applicationCategory":"Utility","operatingSystem":"Web Browser","offers":{"@type":"Offer","price":"0"}}</script>
<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What are CSS counters?", "acceptedAnswer": {"@type": "Answer", "text": "CSS counters are variables maintained by CSS whose values can be incremented. They are used to automatically number elements like headings, sections, figures and list items without manual numbering in HTML."}}, {"@type": "Question", "name": "How do CSS counters work?", "acceptedAnswer": {"@type": "Answer", "text": "You create a counter with counter-reset, increment it with counter-increment, and display it with counter() or counters() in the content property of a pseudo-element."}}, {"@type": "Question", "name": "Can I create nested counters?", "acceptedAnswer": {"@type": "Answer", "text": "Yes! Use the counters() function (note the plural) with a separator string to create nested numbering like 1.1, 1.2, 2.1, etc."}}, {"@type": "Question", "name": "What numbering styles are available?", "acceptedAnswer": {"@type": "Answer", "text": "CSS supports many list-style-type values including decimal, decimal-leading-zero, lower-roman, upper-roman, lower-alpha, upper-alpha, lower-greek, and more."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px" id="presets"></div>
    <div class="controls">
      <div class="control-group">
        <label id="lbl-style"></label>
        <select id="ctl-style" onchange="generate()">
          <option value="decimal">1, 2, 3</option>
          <option value="decimal-leading-zero">01, 02, 03</option>
          <option value="lower-roman">i, ii, iii</option>
          <option value="upper-roman">I, II, III</option>
          <option value="lower-alpha">a, b, c</option>
          <option value="upper-alpha">A, B, C</option>
          <option value="lower-greek">α, β, γ</option>
          <option value="georgian">ა, ბ, გ</option>
          <option value="cjk-ideographic">一, 二, 三</option>
        </select>
      </div>
      <div class="control-group">
        <label id="lbl-prefix"></label>
        <input type="text" id="ctl-prefix" value="Section " oninput="generate()">
      </div>
      <div class="control-group">
        <label id="lbl-suffix"></label>
        <input type="text" id="ctl-suffix" value=": " oninput="generate()">
      </div>
      <div class="control-group">
        <label id="lbl-separator"></label>
        <input type="text" id="ctl-separator" value="." oninput="generate()">
      </div>
      <div class="control-group">
        <label id="lbl-depth"></label>
        <select id="ctl-depth" onchange="generate()">
          <option value="1">1 Level</option>
          <option value="2" selected>2 Levels (1.1)</option>
          <option value="3">3 Levels (1.1.1)</option>
        </select>
      </div>
      <div class="control-group">
        <label id="lbl-color"></label>
        <input type="color" id="ctl-color" value="#4ecdc4" oninput="generate()">
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
      <div>
        <div style="font-weight:600;margin-bottom:6px" id="lbl-preview"></div>
        <div class="preview" id="preview"></div>
      </div>
      <div>
        <div style="font-weight:600;margin-bottom:6px" id="lbl-code"></div>
        <div class="code-output" id="code-output"></div>
      </div>
    </div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'CSS Counter & Numbering Generator',
    toolDesc: 'Generate CSS counters for automatic numbering — headings, sections, figures and lists with live preview.',
    lblStyle: 'Numbering Style',
    lblPrefix: 'Prefix',
    lblSuffix: 'Suffix',
    lblSeparator: 'Separator (nested)',
    lblDepth: 'Nesting Depth',
    lblColor: 'Counter Color',
    lblPreview: 'Live Preview',
    lblCode: 'CSS Code',
    copy: 'Copy CSS',
    copyHtml: 'Copy HTML',
    presetSection: 'Sections',
    presetHeading: 'Headings',
    presetFigure: 'Figures',
    presetStep: 'Steps',
    presetFaq: 'FAQ',
    presetOl: 'Ordered List',
    step1: 'Choose a preset or customize numbering style, prefix and suffix',
    step2: 'Set nesting depth and separator for multi-level counters',
    step3: 'Preview the numbered content in real-time',
    step4: 'Copy the CSS and HTML code to your project',
  },
  zh: {
    toolTitle: 'CSS 计数器 & 自动编号生成器',
    toolDesc: '生成 CSS 计数器实现自动编号 — 标题、章节、图表和列表，实时预览。',
    lblStyle: '编号样式',
    lblPrefix: '前缀',
    lblSuffix: '后缀',
    lblSeparator: '分隔符（嵌套）',
    lblDepth: '嵌套层级',
    lblColor: '计数器颜色',
    lblPreview: '实时预览',
    lblCode: 'CSS 代码',
    copy: '复制 CSS',
    copyHtml: '复制 HTML',
    presetSection: '章节',
    presetHeading: '标题',
    presetFigure: '图表',
    presetStep: '步骤',
    presetFaq: 'FAQ',
    presetOl: '有序列表',
    step1: '选择预设或自定义编号样式、前缀和后缀',
    step2: '设置嵌套深度和分隔符以实现多级编号',
    step3: '实时预览编号效果',
    step4: '复制 CSS 和 HTML 代码到你的项目',
  }
});

const { $, copyText, t } = GZ;

let currentPreset = 'section';
let cssCode = '';
let htmlCode = '';

const presets = ['section','heading','figure','step','faq','ol'];
$('#presets').innerHTML = presets.map(p => `<button class="preset-btn${p==='section'?' active':''}" onclick="applyPreset('${p}',this)">${t('preset'+p.charAt(0).toUpperCase()+p.slice(1))}</button>`).join('');

function applyPreset(p, btn) {
  currentPreset = p;
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const settings = {
    section: { style:'decimal', prefix:'Section ', suffix:': ', separator:'.', depth:2, color:'#4ecdc4' },
    heading: { style:'decimal', prefix:'', suffix='. ', separator:'.', depth:3, color:'#ffd93d' },
    figure: { style:'decimal', prefix:'Figure ', suffix:': ', separator:'.', depth:1, color:'#ff6b6b' },
    step: { style:'decimal', prefix:'Step ', suffix:'', separator:'.', depth:1, color:'#00d672' },
    faq: { style:'decimal', prefix:'Q', suffix:'. ', separator:'.', depth:1, color:'#61afef' },
    ol: { style:'lower-roman', prefix:'', suffix:'. ', separator:'.', depth:2, color:'#c678dd' },
  };
  const s = settings[p];
  $('#ctl-style').value = s.style;
  $('#ctl-prefix').value = s.prefix;
  $('#ctl-suffix').value = s.suffix;
  $('#ctl-separator').value = s.separator;
  $('#ctl-depth').value = s.depth;
  $('#ctl-color').value = s.color;
  generate();
}

function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function generate() {
  const style = $('#ctl-style').value;
  const prefix = $('#ctl-prefix').value;
  const suffix = $('#ctl-suffix').value;
  const sep = $('#ctl-separator').value;
  const depth = +$('#ctl-depth').value;
  const color = $('#ctl-color').value;

  const counterName = 'gz-counter';
  
  let css = '';
  let previewHtml = '';

  if (depth >= 1) {
    css += `.counter-wrap {\n  counter-reset: ${counterName};\n}\n\n`;
    css += `.counter-item {\n  counter-increment: ${counterName};\n}\n\n`;
    css += `.counter-item::before {\n  content: "${escHtml(prefix)}" counter(${counterName}, ${style}) "${escHtml(suffix)}";\n  color: ${color};\n  font-weight: 700;\n}\n`;
  }

  if (depth >= 2) {
    css += `\n.counter-wrap .counter-wrap {\n  counter-reset: ${counterName}-sub;\n}\n\n`;
    css += `.counter-wrap .counter-wrap .counter-item {\n  counter-increment: ${counterName}-sub;\n}\n\n`;
    css += `.counter-wrap .counter-wrap .counter-item::before {\n  content: "${escHtml(prefix)}" counter(${counterName}, ${style}) "${escHtml(sep)}" counter(${counterName}-sub, ${style}) "${escHtml(suffix)}";\n  color: ${color};\n  font-weight: 700;\n}\n`;
  }

  if (depth >= 3) {
    css += `\n.counter-wrap .counter-wrap .counter-wrap {\n  counter-reset: ${counterName}-sub2;\n}\n\n`;
    css += `.counter-wrap .counter-wrap .counter-wrap .counter-item {\n  counter-increment: ${counterName}-sub2;\n}\n\n`;
    css += `.counter-wrap .counter-wrap .counter-wrap .counter-item::before {\n  content: "${escHtml(prefix)}" counter(${counterName}, ${style}) "${escHtml(sep)}" counter(${counterName}-sub, ${style}) "${escHtml(sep)}" counter(${counterName}-sub2, ${style}) "${escHtml(suffix)}";\n  color: ${color};\n  font-weight: 700;\n}\n`;
  }

  // Preview HTML
  const themes = {
    section: ['Introduction','Getting Started','Advanced Topics','Conclusion'],
    heading: ['Overview','Installation','Configuration','API Reference'],
    figure: ['System Architecture','Data Flow','User Interface','Performance'],
    step: ['Create Account','Set Up Profile','Connect Services','Start Building'],
    faq: ['What is this tool?','How does it work?','Is it free?','Do I need to sign up?'],
    ol: ['First Item','Second Item','Third Item','Fourth Item'],
  };
  const items = themes[currentPreset] || themes.section;

  previewHtml = `<div class="counter-wrap">`;
  items.forEach((item, i) => {
    previewHtml += `<div class="counter-item" style="padding:6px 0;font-size:.95em;border-bottom:1px solid var(--border)">${item}</div>`;
    if (depth >= 2 && (i === 0 || i === 2)) {
      previewHtml += `<div class="counter-wrap" style="padding-left:20px">`;
      previewHtml += `<div class="counter-item" style="padding:4px 0;font-size:.9em">${item} Sub-item A</div>`;
      previewHtml += `<div class="counter-item" style="padding:4px 0;font-size:.9em">${item} Sub-item B</div>`;
      if (depth >= 3 && i === 0) {
        previewHtml += `<div class="counter-wrap" style="padding-left:20px">`;
        previewHtml += `<div class="counter-item" style="padding:4px 0;font-size:.85em">Deep item I</div>`;
        previewHtml += `<div class="counter-item" style="padding:4px 0;font-size:.85em">Deep item II</div>`;
        previewHtml += `</div>`;
      }
      previewHtml += `</div>`;
    }
  });
  previewHtml += `</div>`;

  cssCode = css;
  htmlCode = `<div class="counter-wrap">\n${items.map((item, i) => {
    let s = `  <div class="counter-item">${item}</div>`;
    if (depth >= 2 && (i === 0 || i === 2)) {
      s += `\n  <div class="counter-wrap">\n    <div class="counter-item">${item} Sub A</div>\n    <div class="counter-item">${item} Sub B</div>\n  </div>`;
    }
    return s;
  }).join('\n')}\n</div>`;

  $('#preview').innerHTML = `<style>${css}</style>${previewHtml}`;
  $('#code-output').textContent = css;
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="copyText(cssCode)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="copyText(htmlCode)">${t('copyHtml')}</button>`;

generate();

GZ.renderToolPage({
  category: 'css',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📱', href:'/css-tools/media-query.html', name:'Media Query'},
    {icon:'📐', href:'/css-tools/flexbox.html', name:'Flexbox'},
    {icon:'🔲', href:'/css-tools/grid.html', name:'CSS Grid'},
    {icon:'🔘', href:'/css-tools/border-radius.html', name:'Border Radius'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
