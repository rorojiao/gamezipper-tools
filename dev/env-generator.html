.env-group{background:var(--glass2);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:12px}
.env-group h3{margin:0 0 10px;font-size:.95em;opacity:.8}
.var-row{display:flex;gap:8px;margin:6px 0;align-items:center;flex-wrap:wrap}
.var-row input{background:var(--glass);border:1px solid var(--border);color:var(--fg);border-radius:6px;padding:6px 10px;font-size:.88em}
.var-row input[type=text]:first-child{font-family:monospace;flex:1;min-width:140px}
.var-row input[type=text]:nth-child(2){flex:2;min-width:180px}
.var-row .comment{flex:1;min-width:120px;opacity:.7}
.var-row button{background:none;border:none;color:var(--gz-accent);cursor:pointer;font-size:1.1em;padding:2px 6px}

</style>

<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is a .env file?", "acceptedAnswer": {"@type": "Answer", "text": "A .env file stores environment variables for your application — API keys, database URLs, secrets and configuration values that should not be committed to version control."}}, {"@type": "Question", "name": "How do I generate a .env file?", "acceptedAnswer": {"@type": "Answer", "text": "Add variable names, values and optional comments using the form. Group related variables together, then click Copy or Download to get your .env file."}}, {"@type": "Question", "name": "Are my values sent to any server?", "acceptedAnswer": {"@type": "Answer", "text": "No. Everything runs in your browser. No data is sent anywhere. Your secrets stay private."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div id="groups"></div>
    <button class="add-btn" id="btn-add-group" onclick="addGroup()">+ Add Group</button>
    <h3 style="margin-top:20px" id="output-title"></h3>
    <div id="output"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: '.env File Generator',
    toolDesc: 'Generate .env files visually — organize variables into groups, add comments, and export clean dotenv files for any project.',
    outputTitle: '📄 .env output',
    addVar: '+ Variable',
    addGroup: '+ Add Group',
    step1: 'Add groups to organize related variables',
    step2: 'Fill in variable names, values and optional comments',
    step3: 'Load a preset template for common stacks',
    step4: 'Copy or download your .env file',
  },
  zh: {
    toolTitle: '.env 文件生成器',
    toolDesc: '可视化生成 .env 文件 — 按组管理变量、添加注释，为任意项目导出干净的 dotenv 配置文件。',
    outputTitle: '📄 .env 输出',
    addVar: '+ 变量',
    addGroup: '+ 添加分组',
    step1: '添加分组来组织相关变量',
    step2: '填写变量名、值和可选注释',
    step3: '加载常用技术栈的预设模板',
    step4: '复制或下载你的 .env 文件',
  }
});

const { $, copyText, t } = GZ;

function addGroup(title, vars) {
  const div = document.createElement('div');
  div.className = 'env-group';
  const groupTitle = title || 'General';
  div.innerHTML = `
    <h3>📂 <input type="text" class="group-title" value="${groupTitle}" style="background:transparent;border:none;color:var(--fg);font-weight:bold;width:200px;font-size:.95em"> <span style="float:right;cursor:pointer;opacity:.6" onclick="this.closest('.env-group').remove();generate()">✕</span></h3>
    <div class="vars-list"></div>
    <button class="add-btn" onclick="addVar(this)">${t('addVar')}</button>
  `;
  $('#groups').appendChild(div);
  div.querySelectorAll('input').forEach(el => el.addEventListener('input', generate));
  if (vars) vars.forEach(v => addVar(div.querySelector('.add-btn'), v.key, v.value, v.comment));
  else { addVar(div.querySelector('.add-btn')); addVar(div.querySelector('.add-btn')); }
  generate();
}

function addVar(btn, key, value, comment) {
  const row = document.createElement('div');
  row.className = 'var-row';
  row.innerHTML = `<input type="text" placeholder="KEY" value="${key||''}"><input type="text" placeholder="value" value="${value||''}"><input type="text" class="comment" placeholder="# comment" value="${comment||''}"><button onclick="this.parentElement.remove();generate()">✕</button>`;
  btn.parentElement.insertBefore(row, btn);
  row.querySelectorAll('input').forEach(el => el.addEventListener('input', generate));
}

function generate() {
  const groups = document.querySelectorAll('.env-group');
  if (!groups.length) { $('#output').textContent = '# Add variables above to generate .env'; return; }
  let out = '';
  groups.forEach(g => {
    const title = g.querySelector('.group-title').value.trim();
    out += `\n# ─── ${title} ───\n`;
    const vars = g.querySelectorAll('.var-row');
    vars.forEach(r => {
      const inputs = r.querySelectorAll('input[type=text]');
      const k = inputs[0].value.trim();
      const v = inputs[1].value;
      const c = inputs[2].value.trim();
      if (k) {
        if (c) out += `# ${c}\n`;
        out += `${k}=${v}\n`;
      }
    });
  });
  $('#output').textContent = out.trim();
}

function downloadEnv() {
  const blob = new Blob([$('#output').textContent], {type: 'text/plain'});
  const a = document.createElement('a');
  a.download = '.env';
  a.href = URL.createObjectURL(blob);
  a.click();
}

function loadPreset(name) {
  document.querySelectorAll('.env-group').forEach(g => g.remove());
  const presets = {
    node: [
      {title:'App',vars:[{key:'NODE_ENV',value:'development',comment:'Environment'},{key:'PORT',value:'3000',comment:'Server port'},{key:'HOST',value:'localhost'}]},
      {title:'Database',vars:[{key:'DATABASE_URL',value:'postgresql://user:pass@localhost:5432/mydb'},{key:'DB_HOST',value:'localhost'},{key:'DB_PORT',value:'5432'},{key:'DB_NAME',value:'mydb'}]},
    ],
    django: [
      {title:'Django',vars:[{key:'DEBUG',value:'True'},{key:'SECRET_KEY',value:'your-secret-key-here'},{key:'ALLOWED_HOSTS',value:'localhost,127.0.0.1'}]},
      {title:'Database',vars:[{key:'DATABASE_URL',value:'postgres://user:pass@localhost:5432/mydb'}]},
    ],
    react: [
      {title:'React',vars:[{key:'REACT_APP_API_URL',value:'http://localhost:3001'},{key:'REACT_APP_TITLE',value:'My App'},{key:'REACT_APP_ENV',value:'development'}]},
    ],
    laravel: [
      {title:'Laravel',vars:[{key:'APP_NAME',value:'Laravel'},{key:'APP_ENV',value:'local'},{key:'APP_KEY',value:'base64:...'},{key:'APP_DEBUG',value:'true'},{key:'APP_URL',value:'http://localhost'}]},
      {title:'Database',vars:[{key:'DB_CONNECTION',value:'mysql'},{key:'DB_HOST',value:'127.0.0.1'},{key:'DB_PORT',value:'3306'},{key:'DB_DATABASE',value:'laravel'},{key:'DB_USERNAME',value:'root'},{key:'DB_PASSWORD',value:''}]},
    ],
  };
  const p = presets[name] || [];
  p.forEach(g => addGroup(g.title, g.vars));
}

$('#output-title').textContent = t('outputTitle');
$('#btn-add-group').textContent = t('addGroup');

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="downloadEnv()">⬇ .env</button>
  <select class="gz-select" onchange="loadPreset(this.value);this.selectedIndex=0">
    <option value="">${t('example')}...</option>
    <option value="node">Node.js</option>
    <option value="django">Django</option>
    <option value="react">React</option>
    <option value="laravel">Laravel</option>
  </select>`;

addGroup('App', [{key:'NODE_ENV',value:'development',comment:'Environment'},{key:'PORT',value:'3000',comment:'Server port'}]);
addGroup('Database', [{key:'DATABASE_URL',value:'postgresql://user:pass@localhost:5432/mydb',comment:'Connection string'}]);

GZ.renderToolPage({
  category: 'dev',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🐳', href:'/dev/docker-compose.html', name:'Docker Compose'},
    {icon:'🚫', href:'/dev/gitignore-generator.html', name:'.gitignore'},
    {icon:'🔑', href:'/dev/passphrase-generator.html', name:'Passphrase'},
    {icon:'📄', href:'/dev/webmanifest.html', name:'PWA Manifest'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
