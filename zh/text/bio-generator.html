<script>
GZI18n.register({
  en: {
    toolTitle: 'Social Media Bio Generator',
    toolDesc: 'Generate creative social media bios for Instagram, Twitter, TikTok, LinkedIn and more. Pick a vibe, add a few details, and copy polished bios in seconds.',
    lblName: 'Your name', lblRole: 'Your role / niche', lblInterests: 'Interests (comma-separated)',
    lblPlatform: 'Platform', lblVibe: 'Vibe', lblCount: 'How many bios',
    step1: 'Enter your name, role, and a few interests (comma-separated)',
    step2: 'Pick a platform (it sets the character limit) and a vibe (pro, creative, witty…)',
    step3: 'Click Generate to get 6-20 unique bio variations',
    step4: 'Click any bio to copy, or use the buttons to copy / preview on a profile',
  },
  zh: {
    toolTitle: '社交媒体个人简介生成器',
    toolDesc: '为 Instagram、Twitter、TikTok、LinkedIn 等生成创意个人简介。选择风格、添加几个关键词，几秒内获得精美简介文案。',
    lblName: '你的名字', lblRole: '你的职业 / 领域', lblInterests: '兴趣爱好（用逗号分隔）',
    lblPlatform: '平台', lblVibe: '风格', lblCount: '生成数量',
    step1: '输入你的名字、职业和几个兴趣关键词（用逗号分隔）',
    step2: '选择平台（决定字符限制）和风格（专业、创意、幽默…）',
    step3: '点击「生成」获取 6-20 个不同的简介版本',
    step4: '点击任一简介即可复制，或使用按钮复制 / 在资料页预览',
  }
});

const { $, copyText, t } = GZ;
let currentVibe = 'creative';

document.querySelectorAll('.bg-pill').forEach(p => {
  p.addEventListener('click', () => {
    document.querySelectorAll('.bg-pill').forEach(x => x.classList.remove('active'));
    p.classList.add('active');
    currentVibe = p.dataset.vibe;
  });
});

const PARTS = {
  pro: {
    open: ['Building', 'Helping', 'Crafting', 'Driving', 'Scaling'],
    noun: ['products', 'teams', 'solutions', 'experiences', 'outcomes'],
    close: ['that matter.', 'people love.', 'the world needs.', 'at scale.', 'with empathy.'],
  },
  creative: {
    open: ['Making', 'Capturing', 'Painting', 'Shooting', 'Sculpting', 'Sketching'],
    noun: ['stories', 'moments', 'colors', 'dreams', 'worlds', 'pixels'],
    close: ['one frame at a time.', 'in my own way.', 'and loving it.', 'with reckless joy.', 'until the sun rises.'],
  },
  witty: {
    open: ['Probably', 'Officially', 'Definitely not', 'Still', 'Apparently'],
    noun: ['running on caffeine.', 'overthinking snacks.', 'making typos professionally.', 'avoiding group projects.', 'excelling at sleeping.'],
    close: ['📍Anywhere with WiFi', '🎯Send help (or pizza)', '⚠️ Mostly harmless', '🌮 Powered by tacos', '🤷 Proceed with snacks'],
  },
  minimal: {
    open: ['.', '—', '//', '·', '~'],
    noun: ['still figuring it out.', 'less, but better.', 'words are hard.', 'quietly curious.', 'just here.'],
    close: ['', '', '', '', ''],
  },
  bold: {
    open: ['I am', 'They said', 'Watch me', 'Unapologetically', 'Born to'],
    noun: ['unstoppable.', 'rewrite the rules.', 'break limits.', 'defy average.', 'make it happen.'],
    close: ['💯 no excuses.', '🔥 Catch me if you can.', '💪 Eat. Sleep. Win.', '👑 Stay hungry.', '🚀 The rest is history.'],
  },
  chill: {
    open: ['Just', 'Here for', 'Vibing with', 'Living for', 'Breathing in'],
    noun: ['good energy.', 'simple moments.', 'sunsets &amp; coffee.', 'slow mornings.', 'calm chaos.'],
    close: ['🌿 stay present.', '☕ slow living.', '🌊 go with the flow.', '🌅 take it easy.', '🍃 no rush.'],
  },
  nerdy: {
    open: ['Hello, World.', '01001000.', 'while(alive)', 'function', 'def'],
    noun: ['learn, code, repeat.', 'geek by day, gamer by night.', 'powered by curiosity.', 'compiling thoughts…', '// TODO: take over world'],
    close: ['🖥️ 99 little bugs in the code', '📚 Lifelong student', '🤖 Beep boop, human.', '🧪 Science &amp; snacks', '💾 Save early, save often'],
  },
  romantic: {
    open: ['In love with', 'Chasing', 'Holding onto', 'Falling for', 'Believing in'],
    noun: ['sunsets &amp; you.', 'the little things.', 'golden moments.', 'kindred spirits.', 'soft adventures.'],
    close: ['💕 forever hopeful.', '🌹 still dreaming.', '💫 love wins.', '✨ two hearts, one journey.', '🌷 madly, deeply, truly.'],
  },
};

const EMOJI = ['✨','🌟','💫','🌈','🔥','💯','🚀','🌊','🌿','☕','🍕','📷','🎨','🎧','💪','💕','🌅','🌙','⚡','🦋'];

function pick(a) { return a[Math.floor(Math.random() * a.length)]; }

function generateOne(name, role, interests, vibe, limit) {
  const p = PARTS[vibe];
  const e1 = pick(EMOJI);
  const e2 = pick(EMOJI);
  const interestStr = interests ? interests.split(',')[0].trim() : 'life';
  const roleStr = role || 'creator';
  const nameStr = name || '';
  let bio = '';
  if (vibe === 'minimal') {
    bio = `${pick(p.open)} ${pick(p.noun)}`;
  } else if (vibe === 'witty') {
    bio = `${pick(p.open)} ${pick(p.noun)}\n${pick(p.close)}`;
  } else if (vibe === 'nerdy') {
    bio = `${pick(p.open)} ${pick(p.noun)}\n${pick(p.close)}`;
  } else if (vibe === 'chill' || vibe === 'romantic' || vibe === 'bold') {
    bio = `${e1} ${pick(p.open)} ${pick(p.noun)} ${pick(p.close)} ${e2}`;
  } else {
    bio = `${e1} ${roleStr} ${pick(p.open)} ${pick(p.noun)} ${pick(p.close)}\n${interestStr} • ${nameStr}`;
  }
  if (bio.length > limit) bio = bio.substring(0, limit - 1) + '…';
  return bio;
}

function generate() {
  const name = $('#name').value.trim();
  const role = $('#role').value.trim();
  const interests = $('#interests').value.trim();
  const platform = $('#platform').value;
  const count = parseInt($('#count').value);
  const limits = {instagram:150, twitter:160, tiktok:80, linkedin:220, youtube:1000, threads:150};
  const limit = limits[platform];
  const results = $('#results');
  results.innerHTML = '';
  const used = new Set();
  let attempts = 0;
  while (results.children.length < count && attempts < count * 4) {
    attempts++;
    const bio = generateOne(name, role, interests, currentVibe, limit);
    if (!used.has(bio)) {
      used.add(bio);
      const card = document.createElement('div');
      card.className = 'bg-card';
      card.innerHTML = `
        <div class="bg-text"></div>
        <div class="bg-chips">
          <span class="bg-chip"></span>
          <span class="bg-chip"></span>
        </div>
        <div class="bg-actions">
          <button class="gz-btn gz-btn-secondary">📋 Copy</button>
          <button class="gz-btn gz-btn-secondary">👁️ Preview</button>
        </div>`;
      card.querySelector('.bg-text').textContent = bio;
      card.querySelector('.bg-chip:nth-child(1)').textContent = `${bio.length} chars`;
      card.querySelector('.bg-chip:nth-child(2)').textContent = `~${Math.ceil(bio.length / 4)} tokens`;
      card.querySelector('.bg-actions .gz-btn:nth-child(1)').onclick = (e) => { e.stopPropagation(); copyText(bio); };
      card.querySelector('.bg-actions .gz-btn:nth-child(2)').onclick = (e) => { e.stopPropagation(); showPreview(name, bio); };
      card.addEventListener('click', () => copyText(bio));
      results.appendChild(card);
    }
  }
}

function showPreview(name, bio) {
  $('#prevName').textContent = '@' + (name || 'username').toLowerCase();
  $('#prevBio').textContent = bio;
  $('#preview').classList.add('show');
  $('#preview').scrollIntoView({behavior:'smooth', block:'nearest'});
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="generate()">✨ Generate Bios</button>
  <button class="gz-btn gz-btn-secondary" onclick="document.getElementById('results').innerHTML='';document.getElementById('preview').classList.remove('show')">🗑️ Clear</button>
  <button class="gz-btn gz-btn-secondary" onclick="copyText(Array.from(document.querySelectorAll('.bg-text')).map(x=>x.textContent).join('\\n\\n---\\n\\n'))">📋 Copy All</button>`;

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📷', href:'/social/instagram-post.html', name:'Instagram Post'},
    {icon:'🐦', href:'/social/tweet-generator.html', name:'Tweet Generator'},
    {icon:'✍️', href:'/text/username-generator.html', name:'Username Generator'},
    {icon:'💬', href:'/text/quote-generator.html', name:'Quote Generator'},
  ]
});
generate();
</script>
