<script>
GZI18n.register({
  en: {
    toolTitle: 'Menstrual Cycle Tracker',
    toolDesc: 'Track your cycle and predict your next period, fertile window and ovulation date. Free, private — data never leaves your browser.',
    lblLmp: 'Last Period Start Date', lblCycle: 'Cycle Length (days)', lblPeriod: 'Period Duration (days)',
    track: 'Track / Update', clear: 'Clear All Data',
    nextPeriod: 'Next Period', ovulation: 'Ovulation Date', fertileStart: 'Fertile Window Starts', fertileEnd: 'Fertile Window Ends',
    daysUntil: 'days until next period', dayOfCycle: 'Day of Cycle', currentPhase: 'Current Phase',
    phasePeriod: 'Menstrual', phaseFollicular: 'Follicular', phaseOvulation: 'Ovulation', phaseLuteal: 'Luteal',
    historyTitle: 'Tracked Periods', addToday: 'Mark Today', predictionsTitle: 'Next 3 Predictions',
    noData: 'Enter your last period date above and click Track to start.',
    privacyNote: '🔒 100% private — data stored only in your browser',
    step1: 'Enter the first day of your last period',
    step2: 'Set your average cycle length (default 28 days)',
    step3: 'Click Track to see predictions for your next period, ovulation and fertile window',
    step4: 'Your data is saved locally — come back anytime to update',
    disclaimer: 'Note: Predictions are estimates for informational purposes only. Consult a healthcare professional for medical advice.',
  },
  zh: {
    toolTitle: '月经周期追踪器',
    toolDesc: '追踪你的月经周期，预测下次月经、排卵日和易孕期。免费、私密 — 数据仅保存在浏览器中。',
    lblLmp: '上次月经开始日期', lblCycle: '周期长度（天）', lblPeriod: '经期天数',
    track: '追踪 / 更新', clear: '清除所有数据',
    nextPeriod: '下次月经', ovulation: '排卵日', fertileStart: '易孕期开始', fertileEnd: '易孕期结束',
    daysUntil: '天后开始下次月经', dayOfCycle: '周期第几天', currentPhase: '当前阶段',
    phasePeriod: '月经期', phaseFollicular: '卵泡期', phaseOvulation: '排卵期', phaseLuteal: '黄体期',
    historyTitle: '已记录的月经', addToday: '标记今天', predictionsTitle: '未来 3 次预测',
    noData: '在上方输入上次月经日期并点击「追踪」开始记录。',
    privacyNote: '🔒 100% 隐私 — 数据仅保存在你的浏览器',
    step1: '输入上次月经的第一天日期',
    step2: '设置平均周期长度（默认 28 天）',
    step3: '点击「追踪」查看下次月经、排卵日和易孕期预测',
    step4: '数据保存在本地 — 随时回来更新',
    disclaimer: '注意：预测结果仅供参考。如有健康问题，请咨询专业医生。',
  }
});

const { $, t } = GZ;
const STORAGE_KEY = 'gz-menstrual-tracker';
const DAY = 86400000;

function fmt(date){
  return date.toLocaleDateString('en-CA');
}
function fmtNice(date){
  return date.toLocaleDateString(undefined, {weekday:'short', year:'numeric', month:'short', day:'numeric'});
}
function today(){
  return new Date(fmt(new Date()));
}

function loadData(){
  try{ return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {periods:[],cycle:28,duration:5}; }
  catch(e){ return {periods:[],cycle:28,duration:5}; }
}
function saveData(d){
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); }catch(e){}
}

function calc(){
  const data = loadData();
  const lmp = $('#lmp').value;
  if(!lmp) { renderEmpty(); return; }
  const cycle = parseInt($('#cycle').value);
  const duration = parseInt($('#period').value);

  // Update data
  data.cycle = cycle;
  data.duration = duration;

  // Add/update period
  const exists = data.periods.find(p => p.date === lmp);
  if(!exists){
    data.periods.push({date: lmp, ts: Date.now()});
    data.periods.sort((a,b)=> a.date.localeCompare(b.date));
  }
  // Keep last 12
  if(data.periods.length > 12) data.periods = data.periods.slice(-12);
  saveData(data);

  renderResults(lmp, cycle, duration, data.periods);
}

function renderResults(lmp, cycle, duration, periods){
  const lmpDate = new Date(lmp);
  const now = today();
  const ovulationOffset = cycle - 14;
  const ovulationDate = new Date(lmpDate.getTime() + ovulationOffset * DAY);
  const fertileStart = new Date(ovulationDate.getTime() - 5*DAY);
  const fertileEnd = new Date(ovulationDate.getTime() + 1*DAY);

  // Next 3 predicted periods
  const predictions = [];
  let baseDate = lmpDate;
  // If lmp is in the past, find the next upcoming period
  while(baseDate.getTime() < now.getTime()){
    baseDate = new Date(baseDate.getTime() + cycle*DAY);
  }
  for(let i=0; i<3; i++){
    const p = new Date(baseDate.getTime() + i*cycle*DAY);
    predictions.push(p);
  }

  const daysUntil = Math.round((predictions[0].getTime() - now.getTime())/DAY);
  const dayOfCycle = Math.floor((now.getTime() - lmpDate.getTime())/DAY) % cycle + 1;
  if(dayOfCycle < 1 || dayOfCycle > cycle) dayOfCycle === 0;

  // Current phase
  let phase, phaseColor;
  if(dayOfCycle <= duration){ phase = t('phasePeriod'); phaseColor='#e94560'; }
  else if(dayOfCycle < ovulationOffset){ phase = t('phaseFollicular'); phaseColor='#7c4dff'; }
  else if(dayOfCycle <= ovulationOffset+2){ phase = t('phaseOvulation'); phaseColor='#00d672'; }
  else { phase = t('phaseLuteal'); phaseColor='#ff9f43'; }

  const daysLabel = daysUntil > 0 ? `${daysUntil} ${t('daysUntil')}` : (daysUntil === 0 ? 'Today' : `${Math.abs(daysUntil)} days ago`);

  let html = `
    <div class="mc-results">
      <div class="mc-card highlight">
        <div class="val">${fmtNice(predictions[0])}</div>
        <div class="lbl">${t('nextPeriod')}</div>
        <div class="lbl" style="margin-top:6px;color:var(--accent);font-weight:700">${daysLabel}</div>
      </div>
      <div class="mc-card">
        <div class="val">${fmtNice(ovulationDate)}</div>
        <div class="lbl">${t('ovulation')}</div>
      </div>
      <div class="mc-card">
        <div class="val">${fmtNice(fertileStart)}</div>
        <div class="lbl">${t('fertileStart')}</div>
      </div>
      <div class="mc-card">
        <div class="val">${fmtNice(fertileEnd)}</div>
        <div class="lbl">${t('fertileEnd')}</div>
      </div>
      <div class="mc-card">
        <div class="val">Day ${dayOfCycle}</div>
        <div class="lbl">${t('dayOfCycle')}</div>
      </div>
      <div class="mc-card">
        <div class="val" style="color:${phaseColor}">${phase}</div>
        <div class="lbl">${t('currentPhase')}</div>
      </div>
    </div>

    <div class="mc-cycle-viz">
      <h3>${t('currentPhase')} — Day ${dayOfCycle} / ${cycle}</h3>
      <div class="mc-timeline">
        <div class="mc-phase mc-phase-1" style="flex:${duration}">${t('phasePeriod')}<span class="lbl">${duration}d</span></div>
        <div class="mc-phase mc-phase-2" style="flex:${ovulationOffset-duration-3}">${t('phaseFollicular')}<span class="lbl">${ovulationOffset-duration-3}d</span></div>
        <div class="mc-phase mc-phase-3" style="flex:5">${t('phaseOvulation')}<span class="lbl">5d</span></div>
        <div class="mc-phase mc-phase-4" style="flex:${cycle-ovulationOffset-2}">${t('phaseLuteal')}<span class="lbl">${cycle-ovulationOffset-2}d</span></div>
      </div>
      <div style="margin-top:30px;font-size:.78rem;color:var(--text2);display:flex;gap:14px;flex-wrap:wrap">
        <span><span style="display:inline-block;width:10px;height:10px;background:#e94560;border-radius:2px;margin-right:4px"></span>${t('phasePeriod')}</span>
        <span><span style="display:inline-block;width:10px;height:10px;background:#7c4dff;border-radius:2px;margin-right:4px"></span>${t('phaseFollicular')}</span>
        <span><span style="display:inline-block;width:10px;height:10px;background:#00d672;border-radius:2px;margin-right:4px"></span>${t('phaseOvulation')}</span>
        <span><span style="display:inline-block;width:10px;height:10px;background:#ff9f43;border-radius:2px;margin-right:4px"></span>${t('phaseLuteal')}</span>
      </div>
    </div>`;

  if(periods.length > 1){
    html += `
    <div class="mc-history">
      <h3>${t('historyTitle')}</h3>
      <div class="mc-period-list">`;
    const recent = periods.slice().reverse();
    recent.forEach((p, idx) => {
      const next = recent[idx-1];
      let cycleLen = '';
      if(next){
        const diff = Math.round((new Date(next.date) - new Date(p.date))/DAY);
        cycleLen = `${diff} ${t('dayOfCycle').includes('天') ? '天' : 'd'}`;
      }
      const d = new Date(p.date);
      html += `<div class="mc-period-row">
        <span><span class="dot" style="background:#e94560"></span>${fmtNice(d)}</span>
        ${cycleLen ? `<span style="color:var(--text2)">${cycleLen}</span>` : ''}
      </div>`;
    });
    html += `</div></div>`;
  }

  html += `<div style="margin-top:14px;padding:12px;background:var(--glass2);border-radius:8px;font-size:.82rem;color:var(--text2)">⚠️ ${t('disclaimer')}</div>`;
  $('#output').innerHTML = html;
}

function renderEmpty(){
  $('#output').innerHTML = `<div class="mc-empty">${t('noData')}<br><br>${t('privacyNote')}</div>`;
}

function clearAll(){
  if(confirm('Clear all tracked data?')){
    localStorage.removeItem(STORAGE_KEY);
    $('#lmp').value = '';
    $('#cycle').value = '28';
    $('#period').value = '5';
    renderEmpty();
  }
}

function loadFromStorage(){
  const data = loadData();
  if(data.cycle) $('#cycle').value = data.cycle;
  if(data.duration) $('#period').value = data.duration;
  if(data.periods && data.periods.length){
    const last = data.periods[data.periods.length-1];
    $('#lmp').value = last.date;
    calc();
  } else {
    renderEmpty();
  }
}

// Setup UI
$('#lbl-lmp').textContent = t('lblLmp');
$('#lbl-cycle').textContent = t('lblCycle');
$('#lbl-period').textContent = t('lblPeriod');
$('#btn-track').textContent = t('track');
$('#btn-clear').textContent = t('clear');
$('#btn-track').onclick = calc;
$('#btn-clear').onclick = clearAll;

// Default to today
$('#lmp').value = fmt(new Date(Date.now() - 14*DAY));
loadFromStorage();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🤰', href:'/calc/pregnancy-due-date.html', name:'Pregnancy Due Date'},
    {icon:'🤰', href:'/calc/pregnancy-weight-gain.html', name:'Pregnancy Weight Gain'},
    {icon:'⏱️', href:'/calc/timer-stopwatch.html', name:'Timer & Stopwatch'},
    {icon:'🍅', href:'/calc/pomodoro.html', name:'Pomodoro Timer'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
