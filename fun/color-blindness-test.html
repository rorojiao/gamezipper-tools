// Generate Ishihara-style plate procedurally on canvas
function generatePlate(number, palette) {
  const SIZE = 280, N = 1000;
  const canvas = document.createElement('canvas');
  canvas.width = SIZE; canvas.height = SIZE;
  const ctx = canvas.getContext('2d');
  // Background fill
  ctx.fillStyle = palette.bg;
  ctx.fillRect(0,0,SIZE,SIZE);
  // Helper to place "number" digits using vector text
  // First draw number pattern as a mask
  const mask = document.createElement('canvas');
  mask.width = SIZE; mask.height = SIZE;
  const mctx = mask.getContext('2d');
  mctx.fillStyle = '#000';
  mctx.fillRect(0,0,SIZE,SIZE);
  mctx.fillStyle = '#fff';
  mctx.font = 'bold 100px Arial';
  mctx.textAlign = 'center';
  mctx.textBaseline = 'middle';
  mctx.fillText(String(number), SIZE/2, SIZE/2);
  // Generate random circles, color based on mask
  for (let i=0; i<N; i++) {
    const x = Math.random()*SIZE;
    const y = Math.random()*SIZE;
    const r = 4 + Math.random()*7;
    const px = Math.floor(x), py = Math.floor(y);
    const inNumber = mctx.getImageData(px,py,1,1).data[0] > 128;
    const useFg = inNumber ? Math.random() < 0.85 : Math.random() < 0.85;
    if (useFg) {
      // Vary color slightly around the palette
      const c = inNumber ? palette.fg : palette.bg;
      ctx.fillStyle = varyColor(c, 30);
    } else {
      ctx.fillStyle = varyColor(palette.mid, 25);
    }
    ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2); ctx.fill();
  }
  return canvas.toDataURL();
}

function varyColor(hex, range) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  const dr = (Math.random()-.5)*range*2;
  const dg = (Math.random()-.5)*range*2;
  const db = (Math.random()-.5)*range*2;
  return `rgb(${Math.max(0,Math.min(255,r+dr))|0},${Math.max(0,Math.min(255,g+dg))|0},${Math.max(0,Math.min(255,b+db))|0})`;
}

let mode = 'normal';
let current = 0;
let answers = [];
let plates = [];

function setupPlates() {
  // Pick a random set of plates and shuffle, including "no number" plates
  const allPlates = PALETTES[mode];
  plates = allPlates.map(p => ({
    palette: p,
    answer: p.num || null
  }));
  // Shuffle
  for (let i=plates.length-1; i>0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [plates[i], plates[j]] = [plates[j], plates[i]];
  }
}

function renderCurrent() {
  const p = plates[current];
  if (!p) return;
  const dataUrl = generatePlate(p.answer || '0', p.palette);
  $('#plate').style.background = `url(${dataUrl}) center/cover no-repeat, #000`;
  $('#plateLabel').textContent = `${t('plateLabel')} ${current+1} / ${plates.length}`;
  $('#bar').style.width = ((current)/plates.length*100) + '%';
  $('#progressTxt').innerHTML = `<span>${current+1} / ${plates.length}</span><span>${t('score')}: ${answers.filter(a=>a.correct).length}</span>`;

  // Generate 4 options: correct + 3 random
  const correct = p.answer;
  const pool = ['1','2','3','4','5','6','7','8','9','0','12','15','29','42','74','97','8','6','5','3'];
  const opts = new Set();
  if (correct) opts.add(correct);
  while (opts.size < 4) {
    const r = pool[Math.floor(Math.random()*pool.length)];
    opts.add(r);
  }
  const optArr = [...opts].sort(()=>Math.random()-.5);
  $('#options').innerHTML = optArr.map(o => `<div class="cb-opt" data-val="${o}">${o}</div>`).join('') +
    `<div class="cb-opt" data-val="none" style="grid-column:span 4;background:var(--glass)">${t('noNumber')}</div>`;
  document.querySelectorAll('.cb-opt').forEach(el => {
    el.onclick = () => answer(el.dataset.val);
  });
  $('#legend').textContent = mode === 'normal' ? '✓ Should be visible to everyone' : (mode === 'tritan' ? '⚠ Hidden for blue-yellow deficiency' : '⚠ Hidden for red-green deficiency');
}

function answer(val) {
  const p = plates[current];
  const correct = p.answer;
  const userCorrect = (val !== 'none' && correct !== null && val === correct) || (val === 'none' && correct === null);
  // Visual feedback
  document.querySelectorAll('.cb-opt').forEach(el => {
    el.onclick = null;
    if (el.dataset.val === correct || (el.dataset.val !== 'none' && correct === null)) {
      el.classList.add('correct');
    } else if (el.classList.contains('correct') === false) {
      // mark wrong
    }
  });
  if (!userCorrect) {
    const wrong = document.querySelector(`.cb-opt[data-val="${val}"]`);
    if (wrong) wrong.classList.add('wrong');
  }
  answers.push({plate: current, answer: val, correct: userCorrect, expected: correct});
  setTimeout(() => {
    current++;
    if (current >= plates.length) {
      showResults();
    } else {
      renderCurrent();
    }
  }, 700);
}

function showResults() {
  const total = plates.length;
  const correct = answers.filter(a=>a.correct).length;
  const pct = Math.round(correct/total*100);
  let status = 'ok', label = 'Normal Color Vision', desc = 'Your answers suggest normal color vision. This is a screening, not a diagnosis.';
  if (pct < 50) { status = 'bad'; label = 'Possible Color Vision Deficiency'; desc = 'You may have a color vision deficiency. Please consult an optometrist for a full evaluation.'; }
  else if (pct < 75) { status = 'warn'; label = 'Borderline Results'; desc = 'Your results are mixed. You may have a mild color vision deficiency, or the test conditions may be affecting your score.'; }

  let html = `<div class="cb-result">
    <h2>${t('results')}</h2>
    <div class="cb-status ${status}">${label}</div>
    <div class="cb-result-card">
      <h4>📊 Score: ${correct} / ${total} (${pct}%)</h4>
      <p>${desc}</p>
    </div>
    <div class="cb-result-card">
      <h4>📋 Per-plate results</h4>
      ${answers.map((a,i) => {
        const ok = a.correct ? '✅' : '❌';
        return `<div style="font-size:.85em;padding:3px 0;display:flex;justify-content:space-between"><span>Plate ${i+1}</span><span>${ok} ${a.expected ? 'Saw: '+a.answer : 'Correctly saw none'}</span></div>`;
      }).join('')}
    </div>
    <button class="gz-btn" style="margin-top:14px" onclick="restart()">${t('startOver')}</button>
  </div>`;
  $('#resultsArea').innerHTML = html;
  $('#bar').style.width = '100%';
  $('#options').innerHTML = '';
  $('#question').textContent = `${t('score')}: ${correct} / ${total} (${pct}%)`;
}

function restart() {
  current = 0;
  answers = [];
  $('#resultsArea').innerHTML = '';
  setupPlates();
  renderCurrent();
}

    <span class="cb-mode${mode==='deutan'?' active':''}" onclick="setMode('deutan')">🟢 Green-blind (Deuteranopia)</span>
    <span class="cb-mode${mode==='tritan'?' active':''}" onclick="setMode('tritan')">🔵 Blue-blind (Tritanopia)</span>
  `;
}

function setMode(m) {
  mode = m;
  buildModes();
  restart();
}

`;
