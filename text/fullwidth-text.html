<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is fullwidth text?", "acceptedAnswer": {"@type": "Answer", "text": "Fullwidth text uses half-width Latin characters mapped to their fullwidth Unicode equivalents in the range U+FF01 to U+FF5E. These characters were originally designed for CJK (Chinese, Japanese, Korean) typography and appear twice as wide as normal letters, giving text an aesthetic look."}}, {"@type": "Question", "name": "How does the fullwidth converter work?", "acceptedAnswer": {"@type": "Answer", "text": "Each ASCII character from ! (U+0021) to ~ (U+007E) is shifted by +0xFEE0 to land in the fullwidth block. Regular spaces (U+0020) become the fullwidth space (U+3000). The conversion is instant and runs entirely in your browser."}}, {"@type": "Question", "name": "Can I use fullwidth text on social media?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. Fullwidth text works on Instagram, TikTok, Twitter/X, Facebook, Discord, YouTube, Reddit and any platform that supports Unicode. It is popular for aesthetic bios, usernames, captions, server names and vaporwave posts."}}, {"@type": "Question", "name": "Is fullwidth text a font?", "acceptedAnswer": {"@type": "Answer", "text": "No, it is not a font. Fullwidth text uses genuine Unicode code points that look wider than normal ASCII. Because they are real characters (not styling), they display on any device without installing fonts — though some apps may not count them correctly for character limits."}}]}</script>

<script>
GZI18n.register({
  en: {

      {name:'Fullwidth (Classic)',id:'fullwidth'},

  },
  zh: {
    toolTitle: '全角文字生成器',
    toolDesc: '将文字转换为 Ｆｕｌｌｗｉｄｔｈ 全角美学风格。每个字母变为更宽的 Unicode 字符 — 适合个人简介、用户名、蒸汽波和复古帖子。',
    input: '输入或粘贴您的文字',
    clickToCopy: '点击复制',
    step1: '输入或粘贴要全角化的文字',
    step2: '浏览下方生成的全角样式',
    step3: '点击任意样式复制到剪贴板',
    step4: '将全角文字粘贴到社交媒体或任何地方',
    styles: [
      {name:'全角（经典）',id:'fullwidth'},
      {name:'全角 + 删除线',id:'fullStrike'},
      {name:'全角粗衬线',id:'fullBold'},
      {name:'全角等宽',id:'fullMono'},
    ],
  }
});

const { $, copyText, t } = GZ;

$('#input').placeholder = t('input');

function toFullwidth(text) {
  return [...text].map(ch => {
    const code = ch.charCodeAt(0);
    if (code === 0x20) return '\u3000';
    if (code >= 0x21 && code <= 0x7E) return String.fromCodePoint(code + 0xFEE0);
    return ch;
  }).join('');
}

function toFullwidthStrike(text) {
  const full = toFullwidth(text);
  return [...full].map(ch => ch + '\u0336').join('');
}

function toFullwidthBoldSerif(text) {
  // Mathematical Bold Latin: U+1D400 (A) .. U+1D41A (a); fallback for non-letters
  return [...text].map(ch => {
    const code = ch.charCodeAt(0);
    if (code === 0x20) return '\u3000';
    if (code >= 65 && code <= 90) return String.fromCodePoint(0x1D400 + (code - 65));
    if (code >= 97 && code <= 122) return String.fromCodePoint(0x1D41A + (code - 97));
    if (code >= 48 && code <= 57) return String.fromCodePoint(0x1D7CE + (code - 48));
    if (code >= 0x21 && code <= 0x7E) return String.fromCodePoint(code + 0xFEE0);
    return ch;
  }).join('');
}

function toFullwidthMono(text) {
  // Mathematical Monospace: U+1D670 (A) .. U+1D68A (a)
  return [...text].map(ch => {
    const code = ch.charCodeAt(0);
    if (code === 0x20) return '\u3000';
    if (code >= 65 && code <= 90) return String.fromCodePoint(0x1D670 + (code - 65));
    if (code >= 97 && code <= 122) return String.fromCodePoint(0x1D68A + (code - 97));
    if (code >= 48 && code <= 57) return String.fromCodePoint(0x1D7F6 + (code - 48));
    if (code >= 0x21 && code <= 0x7E) return String.fromCodePoint(code + 0xFEE0);
    return ch;
  }).join('');
}

const converters = {
  fullwidth: toFullwidth,
  fullStrike: toFullwidthStrike,
  fullBold: toFullwidthBoldSerif,
  fullMono: toFullwidthMono,
};

function render() {
  const text = $('#input').value;
  const results = $('#results');
  const styles = t('styles');
  if (!text) {
    results.innerHTML = `<div style="color:var(--text2);text-align:center;padding:40px 0;opacity:.6">${t('input')}</div>`;
    return;
  }
  results.innerHTML = styles.map(s => {
    const converted = converters[s.id] ? converters[s.id](text) : text;
    return `<div class="result-box" onclick="copyText(this.querySelector('.style-text').textContent)">
      <div class="style-name">${s.name}</div>
      <div class="style-text">${converted.replace(/</g,'&lt;')}</div>
      <div class="copy-hint">${t('clickToCopy')} ⎘</div>
    </div>`;
  }).join('');
}

$('#input').addEventListener('input', render);

GZ.renderToolPage({

    {icon:'Ⓐ', href:'/text/circled-text.html', name:'Circled Text'},
  ]
});
render();
</script>
