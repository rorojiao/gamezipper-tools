    dzText: '将视频文件拖到此处或点击上传',
    processing: '⏳ 正在提取音频...',
    done: '✓ 音频提取成功！',
    error: '✗ 错误：{msg}',
    noAudio: '此视频文件中未找到音频轨道。',
    step1: '点击或拖拽上传视频文件（MP4、WebM、MOV 等）',
    step2: '工具使用 Web Audio API 解码音频轨道',
    step3: '在播放器中预览提取的音频',
    step4: '点击下载将音频保存为 WAV 文件',
    duration: '时长',
    sampleRate: '采样率',
    channels: '声道',
    fileSize: '文件大小',

const { $, t } = GZ;
let audioBlob = null;

// WAV encoder from AudioBuffer
function audioBufferToWav(buffer) {
  const numChannels = buffer.numberOfChannels;
  const sampleRate = buffer.sampleRate;
  const format = 1; // PCM
  const bitDepth = 16;
  const bytesPerSample = bitDepth / 8;
  const blockAlign = numChannels * bytesPerSample;
  const dataSize = buffer.length * blockAlign;
  const bufferSize = 44 + dataSize;
  const ab = new ArrayBuffer(bufferSize);
  const view = new DataView(ab);
  let offset = 0;
  function writeStr(s) { for (let i = 0; i < s.length; i++) view.setUint8(offset++, s.charCodeAt(i)); }
  function writeU32(v) { view.setUint32(offset, v, true); offset += 4; }
  function writeU16(v) { view.setUint16(offset, v, true); offset += 2; }
  writeStr('RIFF'); writeU32(bufferSize - 8); writeStr('WAVE');
  writeStr('fmt '); writeU32(16); writeU16(format); writeU16(numChannels);
  writeU32(sampleRate); writeU32(sampleRate * blockAlign); writeU16(blockAlign); writeU16(bitDepth);
  writeStr('data'); writeU32(dataSize);
  // Interleave channels
  const channels = [];
  for (let i = 0; i < numChannels; i++) channels.push(buffer.getChannelData(i));
  for (let i = 0; i < buffer.length; i++) {
    for (let ch = 0; ch < numChannels; ch++) {
      let s = Math.max(-1, Math.min(1, channels[ch][i]));
      s = s < 0 ? s * 0x8000 : s * 0x7FFF;
      view.setInt16(offset, s, true);
      offset += 2;
    }
  }
  return new Blob([ab], { type: 'audio/wav' });
}

function formatTime(seconds) {
  const m = Math.floor(seconds / 60);
  const s = Math.floor(seconds % 60);
  return m + ':' + (s < 10 ? '0' : '') + s;
}

function formatBytes(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / 1024 / 1024).toFixed(1) + ' MB';
}

async function handleFile(file) {
  if (!file || !file.type.startsWith('video/')) return;
  $('#status').innerHTML = t('processing');
  $('#result').style.display = 'none';
  try {
    const arrayBuffer = await file.arrayBuffer();
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
    if (!audioBuffer || audioBuffer.length === 0) {
      $('#status').innerHTML = '<span style="color:var(--gz-accent)">' + t('noAudio') + '</span>';
      return;
    }
    audioBlob = audioBufferToWav(audioBuffer);
    const url = URL.createObjectURL(audioBlob);
    const player = $('#audioPlayer');
    player.src = url;
    $('#infoBox').innerHTML =
      '<strong>' + t('duration') + ':</strong> ' + formatTime(audioBuffer.duration) + ' &nbsp;|&nbsp; ' +
      '<strong>' + t('sampleRate') + ':</strong> ' + audioBuffer.sampleRate + ' Hz &nbsp;|&nbsp; ' +
      '<strong>' + t('channels') + ':</strong> ' + (audioBuffer.numberOfChannels === 1 ? 'Mono' : 'Stereo') + ' &nbsp;|&nbsp; ' +
      '<strong>' + t('fileSize') + ':</strong> ' + formatBytes(audioBlob.size);
    $('#result').style.display = '';
    $('#status').innerHTML = '<span style="color:var(--gz-success)">' + t('done') + '</span>';
    audioCtx.close();
  } catch(e) {
    $('#status').innerHTML = '<span style="color:var(--gz-accent)">' + t('error').replace('{msg}', e.message) + '</span>';
  }
}

function dl() {
  if (!audioBlob) return;
  const a = document.createElement('a');
  a.download = 'extracted-audio.wav';
  a.href = URL.createObjectURL(audioBlob);
  a.click();
  URL.revokeObjectURL(a.href);
}

const dz = $('#dropZone');
dz.addEventListener('click', function() { $('#fileInput').click(); });
dz.addEventListener('dragover', function(e) { e.preventDefault(); dz.classList.add('dragover'); });
dz.addEventListener('dragleave', function() { dz.classList.remove('dragover'); });
dz.addEventListener('drop', function(e) {
  e.preventDefault();
  dz.classList.remove('dragover');
  if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
});
$('#fileInput').addEventListener('change', function() {
  if (this.files[0]) handleFile(this.files[0]);
});

$('#dzText').textContent = t('dzText');
$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="dl()">${t('download')} WAV</button>`;

});
