    step2: '设置阅读速度 WPM（默认 250）',
    step3: '或选择用途预设（学习、演讲等）',

const {$, t} = GZ;

const samples = {
  article: `The History of the Internet

The internet began as a research project in the late 1960s, developed by the U.S. Department of Defense. The original network, called ARPANET, was designed to allow communication between research institutions. Over time, additional networks were created, and in 1983 the protocol TCP/IP was standardized, allowing different networks to interconnect. This gave birth to the modern internet as we know it today.

By the 1990s, the World Wide Web was created by Tim Berners-Lee, making the internet accessible to non-technical users through web browsers. The introduction of graphical browsers like Mosaic in 1993 and Netscape Navigator in 1994 helped fuel explosive growth. Email, search engines and online forums became common, and by the end of the decade, the internet had transformed from an academic curiosity into a global phenomenon.

Today, the internet is a fundamental part of daily life. Over 5 billion people worldwide are online, using the web for everything from communication to commerce, education to entertainment. The next chapter of the internet is being written now, with the rise of artificial intelligence, decentralized networks and immersive virtual experiences.`,
  blog: `Why I Switched to a Standing Desk

I spent years hunched over my laptop, and my back was paying the price. After a particularly painful episode last spring, I decided to try a standing desk. Here's what I learned in the first six months.

Week one was rough. My feet hurt, my legs ached, and I found myself fidgeting constantly. But by week three, my body had adapted. I discovered that alternating between sitting and standing was the real key — pure standing for eight hours isn't healthy either.

The biggest surprise? My focus improved. I tend to get sleepy after lunch, and standing during that time keeps me more alert. I also noticed I pace during phone calls now, which probably looks strange to my colleagues but helps me think.

If you're considering the switch, my advice is to start with a converter that lets you raise your existing desk. The full electric standing desks are nice, but the converter is cheaper and gets the job done. Just remember to stand on a mat — your knees and feet will thank you.`,
  essay: `The Impact of Social Media on Modern Society

On the positive side, social media has democratized publishing. Anyone with a smartphone can share their ideas, art or story with a global audience. Movements like #MeToo and #BlackLivesMatter gained momentum largely through social platforms, demonstrating their power to amplify marginalized voices. Small businesses have found new ways to reach customers, and families separated by geography can stay connected in real time.

However, the costs are real. Studies have linked heavy social media use to increased anxiety, depression and loneliness, particularly among teenagers. The algorithmic curation of content creates echo chambers that reinforce existing beliefs, making political polarization worse. Misinformation spreads faster than corrections, with serious consequences for public health, democratic elections and social cohesion.

The path forward requires thoughtful design choices, transparent algorithms and digital literacy education. Social media is neither inherently good nor bad — it is a tool, and like all tools, its impact depends on how we choose to use it.`,
  speech: `Thank you all for being here tonight.

When I started this company fifteen years ago, I had nothing but an idea, a small team and a lot of uncertainty. We worked out of a garage. We survived on instant noodles. We weren't sure we would make it past the first year.

But we did. And ten years after that. And here we are today, celebrating a milestone that seemed impossible back then. None of this would have been possible without you — our customers, our partners and especially our employees who gave everything to make this vision real.

The road ahead is full of challenges. New competitors emerge every day. Technology keeps changing. Markets shift in ways we can't predict. But I'm not worried, because I've seen what this team can do. We've proven, time and again, that we're not just a company — we're a community.

So tonight, let's celebrate. Let's remember how far we've come. And let's look forward to the next chapter, which I believe will be the most exciting one yet.

Thank you, from the bottom of my heart.`
};

function countWords(text) {
  if (!text.trim()) return 0;
  return text.trim().split(/\s+/).length;
}

function countSentences(text) {
  if (!text.trim()) return 0;
  const m = text.match(/[^.!?]+[.!?]+/g);
  return m ? m.length : 1;
}

function countParagraphs(text) {
  if (!text.trim()) return 0;
  return text.split(/\n\s*\n/).filter(p => p.trim()).length;
}

function formatTime(seconds) {
  if (seconds < 60) return `${Math.round(seconds)}s`;
  if (seconds < 3600) {
    const m = Math.floor(seconds / 60);
    const s = Math.round(seconds % 60);
    return s > 0 ? `${m}m ${s}s` : `${m}m`;
  }
  const h = Math.floor(seconds / 3600);
  const m = Math.round((seconds % 3600) / 60);
  return m > 0 ? `${h}h ${m}m` : `${h}h`;
}

function render() {
  const text = $('#text').value;
  const wpm = parseInt($('#wpm').value) || 250;
  const words = countWords(text);
  const chars = text.length;
  const sentences = countSentences(text);
  const paragraphs = countParagraphs(text);
  const readSec = (words / wpm) * 60;
  const speakSec = (words / 130) * 60; // avg speaking rate

  $('#result').innerHTML = `
    <div class="rt-card"><div class="num">${words.toLocaleString()}</div><div class="lbl">${t('words')}</div></div>
    <div class="rt-card"><div class="num">${chars.toLocaleString()}</div><div class="lbl">${t('chars')}</div></div>
    <div class="rt-card"><div class="num">${sentences}</div><div class="lbl">${t('sentences')}</div></div>
    <div class="rt-card"><div class="num">${paragraphs}</div><div class="lbl">${t('paragraphs')}</div></div>
    <div class="rt-card" style="background:var(--glass);border:2px solid var(--accent)"><div class="num">${formatTime(readSec)}</div><div class="lbl">${t('readTime')} @ ${wpm} WPM</div></div>
    <div class="rt-card"><div class="num">${formatTime(speakSec)}</div><div class="lbl">${t('speakTime')} @ 130 WPM</div></div>
  `;
  // Progress: 100% = 30 min
  const pct = Math.min(100, (readSec / 1800) * 100);
  $('#bar').style.width = pct + '%';
  $('#meta').textContent = words > 0 ? `${words} words ÷ ${wpm} WPM = ${formatTime(readSec)}` : '';
}

$('#text').addEventListener('input', render);
$('#wpm').addEventListener('input', render);
$('#purpose').addEventListener('change', e => {
  const map = {general: 250, study: 150, leisure: 300, speed: 450, speech: 130};
  $('#wpm').value = map[e.target.value] || 250;
  render();
});

document.querySelectorAll('[data-sample]').forEach(b => {
  b.addEventListener('click', () => {
    $('#text').value = samples[b.dataset.sample];
    render();
  });
});

$('#toolbar').innerHTML = `
  <button class="gz-btn gz-btn-secondary" id="clearBtn">Clear</button>
`;
$('#clearBtn').addEventListener('click', () => { $('#text').value = ''; render(); });

render();

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📊', href:'/text/word-counter.html', name:'Word Counter'},
    {icon:'🔢', href:'/text/letter-counter.html', name:'Letter Counter'},

    {icon:'📖', href:'/text/readability-checker.html', name:'Readability Checker'},
  ]
});
</script>
