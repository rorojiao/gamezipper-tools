const { $, t } = GZ;
$('#privacyNote').textContent = t('privacyNote');

function isPrivateIP(ip) {
  if (!ip) return false;
  if (ip.endsWith('.local') || ip.includes('.local')) return true;
  if (/^10\./.test(ip)) return true;
  if (/^192\.168\./.test(ip)) return true;
  if (/^172\.(1[6-9]|2\d|3[01])\./.test(ip)) return true;
  if (/^169\.254\./.test(ip)) return true;
  if (/^127\./.test(ip)) return true;
  if (/^fc00:/i.test(ip) || /^fe80:/i.test(ip) || /^::1$/.test(ip)) return true;
  return false;
}

function parseCandidateIP(cand) {
  // candidate:842163049 1 udp 1677729535 1.2.3.4 64737 typ srflx raddr 192.168.1.5 ...
  const m = cand.candidate.match(/(\d{1,3}(?:\.\d{1,3}){3}|[a-f0-9:]+:[a-f0-9:]+|[a-z0-9.-]+\.local)\s+(\d+)\s+typ\s+(\S+)/i);
  if (m) return { ip: m[1], port: m[2], type: m[3] };
  return null;
}

async function runLeakTest() {
  $('#status').innerHTML = `<span class="badge warn"><span class="spinner"></span>${t('testing')}</span>`;
  $('#results').innerHTML = '';
  $('#rawCandidates').innerHTML = '';

  if (typeof RTCPeerConnection === 'undefined' && typeof webkitRTCPeerConnection === 'undefined') {
    $('#status').innerHTML = `<span class="badge err">${t('browserSupport')}</span>`;
    return;
  }

  const RTC = window.RTCPeerConnection || window.webkitRTCPeerConnection;
  const servers = { iceServers: [
    { urls: 'stun:stun.l.google.com:19302' },
    { urls: 'stun:stun1.l.google.com:19302' },
    { urls: 'stun:stun2.l.google.com:19302' },
    { urls: 'stun:stun3.l.google.com:19302' },
    { urls: 'stun:stun4.l.google.com:19302' },
  ]};
  const pc = new RTC(servers);
  const candidates = [];
  let rawCands = [];

  try { pc.createDataChannel('leaktest'); } catch(e) {}

  pc.onicecandidate = (e) => {
    if (e.candidate && e.candidate.candidate) {
      rawCands.push(e.candidate.candidate);
      const parsed = parseCandidateIP(e.candidate);
      if (parsed) candidates.push(parsed);
    }
  };

  try {
    const offer = await pc.createOffer({ offerToReceiveAudio: false, offerToReceiveVideo: false });
    await pc.setLocalDescription(offer);
  } catch(e) {
    $('#status').innerHTML = `<span class="badge err">${e.message}</span>`;
    pc.close();
    return;
  }

  // Wait until ICE gathering completes (or timeout)
  await new Promise(resolve => {
    const start = Date.now();
    const check = setInterval(() => {
      if (pc.iceGatheringState === 'complete' || Date.now() - start > 8000) {
        clearInterval(check);
        resolve();
      }
    }, 200);
  });
  pc.close();

  if (!candidates.length) {
    $('#status').innerHTML = `<span class="badge warn">${t('noCandidates')}</span>`;
    return;
  }

  // De-duplicate by ip+type
  const seen = new Set();
  const unique = [];
  candidates.forEach(c => {
    const k = c.ip + '|' + c.type;
    if (!seen.has(k)) { seen.add(k); unique.push(c); }
  });

  const publicIPs = unique.filter(c => c.type === 'srflx');
  const localIPs = unique.filter(c => c.type === 'host');

  let html = '';

  // Leak summary
  if (publicIPs.length) {
    html += `<div class="result-card"><h3>${t('leakSummary')}</h3><span class="badge err">${t('realIpLeak')}</span></div>`;
  } else {
    html += `<div class="result-card"><h3>${t('leakSummary')}</h3><span class="badge ok">${t('noLeak')}</span></div>`;
  }

  // Public IPs
  html += `<div class="result-card"><h3>${t('publicIPs')}</h3>`;
  if (publicIPs.length) {
    html += '<ul class="ip-list">';
    publicIPs.forEach(c => {
      html += `<li><span class="ip">${c.ip}</span><span class="ip-type">${t('typeSrflx')}</span></li>`;
    });
    html += '</ul>';
  } else {
    html += `<p style="margin:6px 0;opacity:.85">${t('noPublicFound')}</p>`;
  }
  html += '</div>';

  // Local IPs
  html += `<div class="result-card"><h3>${t('localIPs')}</h3>`;
  if (localIPs.length) {
    html += '<ul class="ip-list">';
    localIPs.forEach(c => {
      const priv = isPrivateIP(c.ip);
      html += `<li><span class="ip">${c.ip}</span><span class="ip-type">${priv ? '🔒 ' + t('typeLocal') : '⚠️ ' + t('typeHost')}</span></li>`;
    });
    html += '</ul>';
  } else {
    html += `<p style="margin:6px 0;opacity:.85">${t('noLocalFound')}</p>`;
  }
  html += '</div>';

  $('#results').innerHTML = html;
  $('#status').innerHTML = `<span class="badge ok">✓ ${t('testing').replace('…','')}done — ${unique.length} candidate(s)</span>`;

  // Raw candidates toggle
  $('#rawCandidates').innerHTML = `
    <button class="gz-btn gz-btn-secondary" id="rawToggle">${t('showRaw')}</button>
    <pre id="rawPre" style="display:none;background:rgba(0,0,0,.3);border:1px solid var(--border);border-radius:8px;padding:10px;margin-top:8px;font-size:.78em;overflow:auto;max-height:300px;white-space:pre-wrap;word-break:break-all">${rawCands.map(s => s.replace(/</g,'&lt;')).join('\n')}</pre>`;
  $('#rawToggle').addEventListener('click', () => {
    const pre = $('#rawPre');
    const btn = $('#rawToggle');
    if (pre.style.display === 'none') {
      pre.style.display = 'block';
      btn.textContent = t('hideRaw');
    } else {
      pre.style.display = 'none';
      btn.textContent = t('showRaw');
    }
  });
}

$('#toolbar').innerHTML = `
