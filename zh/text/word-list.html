<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="wl-stats" id="stats"></div>
    <div class="wl-layout">
      <div class="wl-panel">
        <h3>📝 Input</h3>
        <div class="wl-row"><label>Separator:</label>
          <select id="separator">
            <option value="newline" selected>New line</option>
            <option value="comma">Comma</option>
            <option value="semicolon">Semicolon</option>
            <option value="space">Space</option>
            <option value="tab">Tab</option>
            <option value="custom">Custom</option>
          </select>
        </div>
        <div class="wl-row"><label>Custom sep:</label><input type="text" id="customSep" placeholder="|" maxlength="5"></div>
        <div class="wl-row"><label>Sort:</label>
          <select id="sortBy">
            <option value="none" selected>None (original order)</option>
            <option value="az">A → Z</option>
            <option value="za">Z → A</option>
            <option value="lengthAsc">Length (short → long)</option>
            <option value="lengthDesc">Length (long → short)</option>
            <option value="random">Random shuffle</option>
          </select>
        </div>
        <div class="wl-row"><label>Min length:</label><input type="number" id="minLen" value="0" min="0" max="50"></div>
        <div class="wl-row"><label>Max length:</label><input type="number" id="maxLen" value="100" min="1" max="200"></div>
        <div class="wl-row"><label>Contains:</label><input type="text" id="contains" placeholder="optional substring"></div>
        <textarea id="input" spellcheck="false" placeholder="apple&#10;banana&#10;cherry&#10;date&#10;elderberry"></textarea>
      </div>
      <div class="wl-panel">
        <h3>📋 Word List (<span id="count">0</span> words)</h3>
        <div class="wl-list" id="output"></div>
      </div>
    </div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Word List Maker',
    toolDesc: 'Create custom word lists for vocabulary, study, games, or any project. Sort, filter, dedupe, and export. Free, browser-based word list builder.',
    copy: 'Copy as text',
    copyJson: 'Copy as JSON',
    copyCsv: 'Copy as CSV',
    step1: 'Paste words or text in the input area (one per line or any separator)',
    step2: 'Set sort, length filter, and contains filter options',
    step3: 'Review the cleaned, deduped word list on the right',
    step4: 'Copy as text, JSON, or CSV for your project',
  },
  zh: {
    toolTitle: '单词表生成器',
    toolDesc: '为词汇、学习、游戏或任何项目创建自定义单词表。排序、过滤、去重和导出。免费，浏览器本地运行。',
    copy: '复制为文本',
    copyJson: '复制为 JSON',
    copyCsv: '复制为 CSV',
    step1: '在输入区粘贴单词或文本（每行一个或任意分隔符）',
    step2: '设置排序、长度过滤和包含过滤选项',
    step3: '查看清理和去重后的单词表',
    step4: '复制为文本、JSON 或 CSV 用于你的项目',
  }
});

const { $, copyText, t } = GZ;

function parseInput() {
  const text = $('#input').value;
  let sep = $('#separator').value;
  if (sep === 'custom') sep = $('#customSep').value || '\n';
  if (sep === 'newline') sep = '\n';
  if (sep === 'comma') sep = ',';
  if (sep === 'semicolon') sep = ';';
  if (sep === 'space') sep = ' ';
  if (sep === 'tab') sep = '\t';

  let words = text.split(sep);
  words = words.map(w => w.trim().replace(/^["']|["']$/g, '')).filter(w => w.length > 0);
  return words;
}

function applyFilters(words) {
  const minLen = parseInt($('#minLen').value) || 0;
  const maxLen = parseInt($('#maxLen').value) || 100;
  const contains = $('#contains').value.trim().toLowerCase();
  const sortBy = $('#sortBy').value;
  let result = words.filter(w => {
    if (w.length < minLen) return false;
    if (w.length > maxLen) return false;
    if (contains && !w.toLowerCase().includes(contains)) return false;
    return true;
  });
  const set = new Set();
  result = result.filter(w => {
    if (set.has(w.toLowerCase())) return false;
    set.add(w.toLowerCase());
    return true;
  });
  if (sortBy === 'az') result.sort((a,b) => a.localeCompare(b));
  else if (sortBy === 'za') result.sort((a,b) => b.localeCompare(a));
  else if (sortBy === 'lengthAsc') result.sort((a,b) => a.length - b.length);
  else if (sortBy === 'lengthDesc') result.sort((a,b) => b.length - a.length);
  else if (sortBy === 'random') {
    for (let i = result.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [result[i], result[j]] = [result[j], result[i]];
    }
  }
  return result;
}

function update() {
  const raw = parseInput();
  const filtered = applyFilters(raw);
  $('#count').textContent = filtered.length;
  $('#output').innerHTML = filtered.map((w, i) =>
    `<div><span class="idx">${i+1}.</span><span>${w.replace(/</g,'&lt;')}</span><span class="del" data-i="${i}">✕</span></div>`
  ).join('') || '<div style="opacity:.6;text-align:center;padding:30px">No words. Add some in the input.</div>';
  $$('.del').forEach(el => {
    el.addEventListener('click', () => {
      const idx = parseInt(el.dataset.i);
      filtered.splice(idx, 1);
      $('#input').value = filtered.join('\n');
      update();
    });
  });
  const totalChars = filtered.reduce((sum, w) => sum + w.length, 0);
  const avg = filtered.length ? (totalChars / filtered.length).toFixed(1) : 0;
  const shortest = filtered.length ? Math.min(...filtered.map(w => w.length)) : 0;
  const longest = filtered.length ? Math.max(...filtered.map(w => w.length)) : 0;
  $('#stats').innerHTML = `
    <span><b>${raw.length}</b> raw words</span>
    <span><b>${filtered.length}</b> unique</span>
    <span><b>${avg}</b> avg length</span>
    <span><b>${shortest}</b> shortest</span>
    <span><b>${longest}</b> longest</span>
  `;
}

function $$(sel) { return Array.from(document.querySelectorAll(sel)); }

['input','separator','customSep','sortBy','minLen','maxLen','contains'].forEach(id => {
  $('#'+id).addEventListener('input', update);
  $('#'+id).addEventListener('change', update);
});

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="copyText(Array.from(document.querySelectorAll('.wl-list div span:nth-child(2)')).map(s=>s.textContent).join('\\n'))">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="copyText(JSON.stringify(Array.from(document.querySelectorAll('.wl-list div span:nth-child(2)')).map(s=>s.textContent)))">${t('copyJson')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="copyText(Array.from(document.querySelectorAll('.wl-list div span:nth-child(2)')).map(s=>s.textContent).join(','))">${t('copyCsv')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#input').value='';update()">Clear</button>`;

update();

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📊', href:'/text/word-frequency.html', name:'Word Frequency'},
    {icon:'🎲', href:'/text/random-word-generator.html', name:'Random Word Generator'},
    {icon:'📋', href:'/text/word-counter.html', name:'Word Counter'},
    {icon:'🔍', href:'/text/keyword-density.html', name:'Keyword Density'},
  ]
});
</script>
<script src="/tools-result-rec.js?v=20260707v520" defer></script>
</body>
