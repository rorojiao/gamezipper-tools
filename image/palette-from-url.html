<script>
GZI18n.register({
  en: {
    toolTitle: 'Color Palette from Image URL',
    toolDesc: 'Extract a dominant color palette from any image by URL. Get HEX, RGB and HSL values, export as CSS, JSON, SCSS or PNG.',
    lblCount: 'Number of colors', lblQuality: 'Sample quality', lblExport: 'Export format',

  zh: {

    toolDesc: '从任意图片 URL 提取主色调色板。获取 HEX、RGB、HSL 值，导出为 CSS、JSON、SCSS 或 PNG。',
    lblCount: '颜色数量', lblQuality: '采样质量', lblExport: '导出格式',
    copy: '📋 复制', download: '💾 下载',
    step1: '粘贴图片 URL 或选择预设',
    step2: '选择要提取的颜色数量',
    step3: '查看每种颜色的 HEX、RGB 和 HSL 值',
    step4: '将调色板导出为 CSS、JSON、SCSS 或 PNG',
    hex: 'HEX', rgb: 'RGB', hsl: 'HSL',
    loading: '加载图片中…', errCORS: '加载图片失败（CORS 或 URL 无效）。请尝试其他来源。',
    copied: '已复制到剪贴板',
    copyColor: '点击复制',
  }
});

const { $, copyText, t } = GZ;

const PRESETS = [
  { label: '🌄', url: 'https://picsum.photos/seed/1/800/600' },
  { label: '🌸', url: 'https://picsum.photos/seed/2/800/600' },
  { label: '🏞️', url: 'https://picsum.photos/seed/3/800/600' },
  { label: '🌅', url: 'https://picsum.photos/seed/4/800/600' },
  { label: '🍂', url: 'https://picsum.photos/seed/5/800/600' },
  { label: '🌊', url: 'https://picsum.photos/seed/6/800/600' },
  { label: '🌲', url: 'https://picsum.photos/seed/7/800/600' },
  { label: '🏔️', url: 'https://picsum.photos/seed/8/800/600' },
];

function rgbToHex(r,g,b) {
  return '#' + [r,g,b].map(v => v.toString(16).padStart(2,'0')).join('');
}
function rgbToHsl(r,g,b) {
  r/=255; g/=255; b/=255;
  const max=Math.max(r,g,b), min=Math.min(r,g,b);
  let h=0, s=0, l=(max+min)/2;
  if (max!==min) {
    const d=max-min;
    s=l>0.5?d/(2-max-min):d/(max+min);
    switch(max) {
      case r: h=(g-b)/d + (g<b?6:0); break;
      case g: h=(b-r)/d + 2; break;
      case b: h=(r-g)/d + 4; break;
    }
    h/=6;
  }
  return `hsl(${Math.round(h*360)}, ${Math.round(s*100)}%, ${Math.round(l*100)}%)`;
}

function quantize(pixels, k) {
  // Simple k-means on RGB
  let centroids = [];
  for (let i = 0; i < k; i++) {
    centroids.push([pixels[Math.floor(Math.random()*pixels.length)],
                    pixels[Math.floor(Math.random()*pixels.length)],
                    pixels[Math.floor(Math.random()*pixels.length)]]);
  }
  for (let iter = 0; iter < 8; iter++) {
    const sums = centroids.map(() => ({ r:0, g:0, b:0, n:0 }));
    for (let i = 0; i < pixels.length; i += 3) {
      let best=0, bd=Infinity;
      for (let j = 0; j < k; j++) {
        const dr = pixels[i]-centroids[j][0], dg = pixels[i+1]-centroids[j][1], db = pixels[i+2]-centroids[j][2];
        const d = dr*dr+dg*dg+db*db;
        if (d < bd) { bd = d; best = j; }
      }
      sums[best].r += pixels[i]; sums[best].g += pixels[i+1]; sums[best].b += pixels[i+2]; sums[best].n++;
    }
    for (let j = 0; j < k; j++) {
      if (sums[j].n) centroids[j] = [sums[j].r/sums[j].n, sums[j].g/sums[j].n, sums[j].b/sums[j].n];
    }
  }
  // Count for sorting
  const counts = centroids.map((c, j) => {
    let n = 0;
    for (let i = 0; i < pixels.length; i += 3) {
      const dr = pixels[i]-c[0], dg = pixels[i+1]-c[1], db = pixels[i+2]-c[2];
      if (dr*dr+dg*dg+db*db < 5000) n++;
    }
    return { c, n };
  });
  counts.sort((a, b) => b.n - a.n);
  return counts.map(o => o.c);
}

function extractPalette(img) {
  const w = img.naturalWidth, h = img.naturalHeight;
  const sampleStep = +$('#quality').value;
  const cw = Math.max(1, Math.floor(w / sampleStep));
  const ch = Math.max(1, Math.floor(h / sampleStep));
  const c = document.createElement('canvas');
  c.width = cw; c.height = ch;
  const ctx = c.getContext('2d');
  ctx.drawImage(img, 0, 0, cw, ch);
  const data = ctx.getImageData(0, 0, cw, ch).data;
  const pixels = [];
  for (let i = 0; i < data.length; i += 4) {
    pixels.push(data[i], data[i+1], data[i+2]);
  }
  const k = +$('#count').value;
  return quantize(pixels, k);
}

function renderPalette(colors) {
  const wrap = $('#palette');
  wrap.innerHTML = colors.map((c, i) => {
    const r = Math.round(c[0]), g = Math.round(c[1]), b = Math.round(c[2]);
    const hex = rgbToHex(r, g, b);
    const rgb = `rgb(${r}, ${g}, ${b})`;
    const hsl = rgbToHsl(r, g, b);
    return `<div class="pu-swatch" onclick="copyText('${hex}')" title="${t('copyColor')}">
      <div class="pu-color" style="background:${hex}"></div>
      <div class="pu-meta">
        <b>${hex}</b><br>
        <span>${rgb}</span><br>
        <span>${hsl}</span>
      </div>
    </div>`;
  }).join('');
  buildExport(colors);
}

function buildExport(colors) {
  const fmt = $('#exportFmt').value;
  const hexes = colors.map(c => {
    const r = Math.round(c[0]), g = Math.round(c[1]), b = Math.round(c[2]);
    return rgbToHex(r, g, b);
  });
  let out = '';
  if (fmt === 'css') {
    out = ':root {\n' + hexes.map((h, i) => `  --color-${i+1}: ${h};`).join('\n') + '\n}';
  } else if (fmt === 'json') {
    out = JSON.stringify(hexes.map((h, i) => {
      const r = parseInt(h.slice(1,3),16), g = parseInt(h.slice(3,5),16), b = parseInt(h.slice(5,7),16);
      return { name: `color-${i+1}`, hex: h, rgb: { r, g, b } };
    }), null, 2);
  } else if (fmt === 'hex') {
    out = hexes.join('\n');
  } else if (fmt === 'scss') {
    out = hexes.map((h, i) => `$color-${i+1}: ${h};`).join('\n');
  }
  $('#exportOut').value = out;
  $('#exportWrap').style.display = 'block';
}

function loadFromUrl() {
  const url = $('#urlInput').value.trim();
  if (!url) return;
  $('#status').textContent = t('loading');
  const img = $('#preview');
  img.crossOrigin = 'anonymous';
  img.onload = () => {
    try {
      const colors = extractPalette(img);
      renderPalette(colors);
      $('#status').textContent = `✓ ${colors.length} colors extracted`;
    } catch (e) {
      $('#status').textContent = t('errCORS');
    }
  };
  img.onerror = () => { $('#status').textContent = t('errCORS'); };
  img.src = url;
}

$('#count').addEventListener('change', () => { if ($('#preview').src) loadFromUrl(); });
$('#quality').addEventListener('change', () => { if ($('#preview').src) loadFromUrl(); });
$('#exportFmt').addEventListener('change', () => { if ($('#preview').src) loadFromUrl(); });

$('#exportToolbar').innerHTML = `
  <button class="gz-btn" onclick="copyText($('#exportOut').value)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="downloadPalette()">${t('download')}</button>`;

function downloadPalette() {
  const colors = [...$$('.pu-swatch .pu-color')].map(d => d.style.background);
  const c = document.createElement('canvas');
  c.width = 600; c.height = 100 * colors.length;
  const ctx = c.getContext('2d');
  ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, c.width, c.height);
  colors.forEach((col, i) => {
    ctx.fillStyle = col;
    ctx.fillRect(0, i*100, 200, 100);
    ctx.fillStyle = '#000';
    ctx.font = 'bold 16px sans-serif';
    ctx.fillText(col, 220, i*100 + 30);
    ctx.font = '14px monospace';
    const r = parseInt(col.slice(1,3),16), g = parseInt(col.slice(3,5),16), b = parseInt(col.slice(5,7),16);
    ctx.fillText(`rgb(${r}, ${g}, ${b})`, 220, i*100 + 55);
    ctx.fillText(rgbToHsl(r,g,b), 220, i*100 + 78);
  });
  c.toBlob(b => {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(b);
    a.download = 'palette.png';
    a.click();
  });
}

$('#presets').innerHTML = PRESETS.map(p => `<div class="pu-preset" onclick="$('#urlInput').value='${p.url}';loadFromUrl()" title="${p.url}"><img src="${p.url}" crossorigin="anonymous" loading="lazy"></div>`).join('');

// Auto-load first preset
$('#urlInput').value = PRESETS[0].url;
loadFromUrl();

GZ.renderToolPage({
  category: 'image',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🎨', href:'/image/palette-from-image.html', name:'Palette from Image'},
    {icon:'🎨', href:'/color/palette.html', name:'Palette Generator'},
    {icon:'💧', href:'/image/color-extractor.html', name:'Color Extractor'},
    {icon:'🖼️', href:'/image/color-picker-image.html', name:'Color Picker Image'},
  ]
});
</script>
