const sampleData = {
  "users": [
    {"name":"Alice","age":30,"email":"alice@example.com"},

// Simple jq-like evaluator
function evaluate(expr, data) {
  let tokens = tokenize(expr.trim());
  return evaluateTokens(tokens, data);
}

function tokenize(expr) {
  let tokens = [];
  let i = 0;
  while (i < expr.length) {
    if (expr[i] === '|') { tokens.push({type:'pipe'}); i++; continue; }
    if (expr[i] === '.') {
      if (i+1 < expr.length && expr[i+1] === '[') {
        i++;
        continue;
      }
      let j = i+1;
      if (j < expr.length && expr[j] === '.') { tokens.push({type:'recurse'}); i=j+1; continue; }
      while (j < expr.length && /[\w_]/.test(expr[j])) j++;
      let key = expr.substring(i+1, j);
      if (key) tokens.push({type:'field', key});
      else tokens.push({type:'identity'});
      i = j;
      continue;
    }
    if (expr[i] === '[') {
      let j = i+1;
      while (j < expr.length && expr[j] !== ']') j++;
      let inner = expr.substring(i+1, j).trim();
      tokens.push({type:'bracket', inner});
      i = j+1;
      continue;
    }
    if (expr.substring(i, i+7) === 'select(') {
      let depth = 1; let j = i+7;
      while (j < expr.length && depth > 0) { if(expr[j]==='(')depth++; if(expr[j]===')')depth--; j++; }
      tokens.push({type:'select', cond: expr.substring(i+7, j-1)});
      i = j;
      continue;
    }
    if (expr.substring(i, i+4) === 'map(') {
      let depth = 1; let j = i+4;
      while (j < expr.length && depth > 0) { if(expr[j]==='(')depth++; if(expr[j]===')')depth--; j++; }
      tokens.push({type:'map', inner: expr.substring(i+4, j-1)});
      i = j;
      continue;
    }
    if (expr.substring(i, i+6) === 'group_by') {
      let depth = 1; let j = i+9;
      while (j < expr.length && depth > 0) { if(expr[j]==='(')depth++; if(expr[j]===')')depth--; j++; }
      tokens.push({type:'group_by', inner: expr.substring(i+9, j-1)});
      i = j;
      continue;
    }
    // builtins: keys, values, length, sort, unique, reverse, min, max, add, flatten, type, first, last, to_entries, from_entries, ascii_downcase, ascii_upcase, not
    let builtinMatch = expr.substring(i).match(/^(keys|values|length|sort|unique|reverse|min|max|add|flatten|type|first|last|to_entries|from_entries|ascii_downcase|ascii_upcase|not|tonumber|tostring|arrays|objects|strings|numbers|booleans|nulls|empties)\b/);
    if (builtinMatch) {
      tokens.push({type:'builtin', name: builtinMatch[1]});
      i += builtinMatch[1].length;
      continue;
    }
    if (expr.substring(i, i+4) === 'has(') {
      let depth = 1; let j = i+4;
      while (j < expr.length && depth > 0) { if(expr[j]==='(')depth++; if(expr[j]===')')depth--; j++; }
      let arg = expr.substring(i+4, j-1).replace(/"/g,'');
      tokens.push({type:'has', key:arg});
      i = j;
      continue;
    }
    if (expr.substring(i, i+8) === 'contains') {
      let depth = 1; let j = i+9;
      while (j < expr.length && depth > 0) { if(expr[j]==='(')depth++; if(expr[j]===')')depth--; j++; }
      let arg = expr.substring(i+9, j-1).replace(/"/g,'');
      tokens.push({type:'contains', val:arg});
      i = j;
      continue;
    }
    if (expr.substring(i, i+6) === 'split(') {
      let depth = 1; let j = i+6;
      while (j < expr.length && depth > 0) { if(expr[j]==='(')depth++; if(expr[j]===')')depth--; j++; }
      let arg = expr.substring(i+6, j-1).replace(/"/g,'').replace(/'/g,'');
      tokens.push({type:'split', sep:arg});
      i = j;
      continue;
    }
    if (expr.substring(i, i+5) === 'join(') {
      let depth = 1; let j = i+5;
      while (j < expr.length && depth > 0) { if(expr[j]==='(')depth++; if(expr[j]===')')depth--; j++; }
      let arg = expr.substring(i+5, j-1).replace(/"/g,'').replace(/'/g,'');
      tokens.push({type:'join', sep:arg});
      i = j;
      continue;
    }
    if (expr[i] === ' ' || expr[i] === '\t' || expr[i] === '\n') { i++; continue; }
    i++;
  }
  return tokens;
}

function evaluateTokens(tokens, data) {
  let result = data;
  let segments = [];
  let current = [];
  for (let tok of tokens) {
    if (tok.type === 'pipe') {
      segments.push(current);
      current = [];
    } else {
      current.push(tok);
    }
  }
  segments.push(current);
  for (let seg of segments) {
    result = evalSegment(seg, result);
  }
  return result;
}

function evalSegment(tokens, data) {
  let result = data;
  for (let tok of tokens) {
    result = evalToken(tok, result);
  }
  return result;
}

function evalToken(tok, data) {
  switch(tok.type) {
    case 'identity': return data;
    case 'field': return data != null ? data[tok.key] : null;
    case 'bracket': return evalBracket(tok.inner, data);
    case 'builtin': return evalBuiltin(tok.name, data);
    case 'select': return evalSelect(tok.cond, data);
    case 'map': return evalMap(tok.inner, data);
    case 'group_by': return evalGroupBy(tok.inner, data);
    case 'has': return data != null && typeof data === 'object' ? tok.key in data : false;
    case 'contains': return String(data).includes(tok.val);
    case 'split': return String(data).split(tok.sep);
    case 'join': return Array.isArray(data) ? data.join(tok.sep) : String(data);
    case 'recurse': return data;
    default: return data;
  }
}

function evalBracket(inner, data) {
  if (inner === '') return data;
  if (inner.startsWith('.')) {
    let key = inner.substring(1);
    if (Array.isArray(data)) return data.map(item => item != null ? item[key] : null);
    return data != null ? data[key] : null;
  }
  if (/^-?\d+$/.test(inner)) {
    let idx = parseInt(inner);
    if (Array.isArray(data)) return data[idx < 0 ? data.length + idx : idx];
    return null;
  }
  if (inner.startsWith('select(')) {
    if (!Array.isArray(data)) return data;
    let cond = inner.slice(7, -1);
    return data.filter(item => evalCondition(cond, item));
  }
  return data;
}

function evalCondition(cond, item) {
  // Parse .key == value, .key > value, etc.
  let m = cond.match(/\.(\w+)\s*(==|!=|>=|<=|>|<)\s*(.+)/);
  if (!m) return true;
  let key = m[1], op = m[2], valStr = m[3].trim();
  let left = item != null ? item[key] : undefined;
  let right;
  try { right = JSON.parse(valStr); } catch { right = valStr.replace(/"/g,''); }
  switch(op) {
    case '==': return left == right;
    case '!=': return left != right;
    case '>': return left > right;
    case '<': return left < right;
    case '>=': return left >= right;
    case '<=': return left <= right;
  }
  return false;
}

function evalSelect(cond, data) {
  if (Array.isArray(data)) return data.filter(item => evalCondition(cond, item));
  return evalCondition(cond, data) ? data : null;
}

function evalMap(inner, data) {
  if (!Array.isArray(data)) return data;
  return data.map(item => {
    try { return evaluate(inner, item); } catch { return null; }
  });
}

function evalGroupBy(inner, data) {
  if (!Array.isArray(data)) return data;
  let key = inner.startsWith('.') ? inner.substring(1) : inner;
  let groups = {};
  data.forEach(item => {
    let v = item != null ? item[key] : '';
    if (!groups[v]) groups[v] = [];
    groups[v].push(item);
  });
  return Object.values(groups);
}

function evalBuiltin(name, data) {
  switch(name) {
    case 'keys': return data != null ? Object.keys(data) : [];
    case 'values': return data != null ? Object.values(data) : [];
    case 'length': return Array.isArray(data) ? data.length : typeof data === 'string' ? data.length : data != null ? Object.keys(data).length : 0;
    case 'sort': return Array.isArray(data) ? [...data].sort((a,b) => a > b ? 1 : -1) : data;
    case 'unique': return Array.isArray(data) ? [...new Set(data)] : data;
    case 'reverse': return Array.isArray(data) ? [...data].reverse() : data;
    case 'min': return Array.isArray(data) ? Math.min(...data) : data;
    case 'max': return Array.isArray(data) ? Math.max(...data) : data;
    case 'add': return Array.isArray(data) ? data.reduce((a,b) => a + b, 0) : data;
    case 'flatten': return Array.isArray(data) ? data.flat(Infinity) : data;
    case 'type': return Array.isArray(data) ? 'array' : data === null ? 'null' : typeof data;
    case 'first': return Array.isArray(data) ? data[0] : data;
    case 'last': return Array.isArray(data) ? data[data.length-1] : data;
    case 'to_entries': return data != null ? Object.entries(data).map(([k,v]) => ({key:k,value:v})) : [];
    case 'from_entries': return Array.isArray(data) ? Object.fromEntries(data.map(e => [e.key, e.value])) : data;
    case 'ascii_downcase': return typeof data === 'string' ? data.toLowerCase() : data;
    case 'ascii_upcase': return typeof data === 'string' ? data.toUpperCase() : data;
    case 'not': return !data;
    case 'tonumber': return Number(data);
    case 'tostring': return String(data);
    case 'arrays': return Array.isArray(data) ? data : [];
    case 'objects': return data != null && typeof data === 'object' && !Array.isArray(data) ? data : null;
    case 'strings': return typeof data === 'string' ? data : null;
    case 'numbers': return typeof data === 'number' ? data : null;
    case 'booleans': return typeof data === 'boolean' ? data : null;
    case 'nulls': return data === null ? data : null;
    default: return data;
  }
}

function syntaxHighlight(json) {
  return json.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/("(\\u[\da-fA-F]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(\.\d+)?([eE][+-]?\d+)?)/g, m => {
      let c = 'json-number';
      if (/^"/.test(m)) c = /:$/.test(m) ? 'json-key' : 'json-string';
      else if (/true|false/.test(m)) c = 'json-bool';
      else if (/null/.test(m)) c = 'json-null';
      return `<span class="${c}">${m}</span>`;
    });
}

function doRun() {
  const inp = $('#json-input').value.trim();
  const filter = $('#filter-input').value.trim();
  if (!inp) return;
  try {
    const data = JSON.parse(inp);
    let result;
    if (!filter || filter === '.') {
      result = data;
    } else {
      result = evaluate(filter, data);
    }
    const formatted = JSON.stringify(result, null, 2);
    $('#output').innerHTML = syntaxHighlight(formatted);
    $('#status').innerHTML = `<span style="color:var(--gz-success)">${t('jsonValid')}</span>`;
  } catch(e) {
    $('#status').innerHTML = `<span style="color:var(--gz-accent)">${t('jsonInvalid')}: ${e.message}</span>`;
    $('#output').innerHTML = `<span style="color:var(--gz-accent)">${e.message}</span>`;
  }
}

function loadExample(json, filter) {
  $('#json-input').value = JSON.stringify(json, null, 2);
  $('#filter-input').value = filter;
  doRun();
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="doRun()">${t('run')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#json-input').value='';$('#filter-input').value='';$('#output').innerHTML='';$('#status').innerHTML=''">${t('clear')}</button>`;

$('#examples').innerHTML = `
  <button onclick="loadExample(${JSON.stringify(sampleData)}, '.users[].name')">${t('exArray')}</button>
  <button onclick="loadExample(${JSON.stringify(sampleData)}, '.total')">${t('exBasic')}</button>
  <button onclick="loadExample(${JSON.stringify(sampleData)}, '.users[] | select(.age > 28)')">${t('exSelect')}</button>
  <button onclick="loadExample(${JSON.stringify(sampleData)}, '.users | map(.name)')">${t('exMap')}</button>
  <button onclick="loadExample(${JSON.stringify(sampleData)}, '.users[0] | keys')">${t('exKeys')}</button>
  <button onclick="loadExample(${JSON.stringify(sampleData)}, '.users | sort_by(.age)')">${t('exSort')}</button>`;

$('#filter-input').addEventListener('input', doRun);
