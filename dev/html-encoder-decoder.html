    modeDecimal: '编码 — 十进制实体',
    modeHex: '编码 — 十六进制实体',

    step1: '在输入区粘贴文本或 HTML',
    step2: '选择编码（命名 / 十进制 / 十六进制）或解码模式',

const { $, copyText, t } = GZ;

function encodeNamed(text) {
  return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function encodeDecimal(text) {
  return [...text].map(ch => {
    const code = ch.codePointAt(0);
    return code < 128 && /[a-zA-Z0-9\s]/.test(ch) ? ch : `&#${code};`;
  }).join('');
}

function encodeHex(text) {
  return [...text].map(ch => {
    const code = ch.codePointAt(0);
    return code < 128 && /[a-zA-Z0-9\s]/.test(ch) ? ch : `&#x${code.toString(16).toUpperCase()};`;
  }).join('');
}

function decode(text) {
  const ta = document.createElement('textarea');
  ta.innerHTML = text;
  return ta.value;
}

function convert() {
  const text = $('#input').value;
  if (!text) { $('#output').innerHTML = ''; $('#status').innerHTML = ''; return; }
  const mode = $('#opt-mode').value;
  let result;
  try {
    if (mode === 'named') result = encodeNamed(text);
    else if (mode === 'decimal') result = encodeDecimal(text);
    else if (mode === 'hex') result = encodeHex(text);
    else result = decode(text);
    $('#output').textContent = result;
    $('#status').innerHTML = `<span style="color:var(--gz-success)">✓ ${result.length} chars</span>`;
  } catch (e) {
    $('#output').innerHTML = '';
    $('#status').innerHTML = `<span style="color:var(--gz-danger)">✗ ${e.message}</span>`;
  }
}

function loadExample() {
  const mode = $('#opt-mode').value;
  $('#input').value = mode === 'decode'
    ? '&lt;div class=&quot;card&quot;&gt;Hello &amp; welcome&lt;/div&gt;'
    : '<div class="card">Hello & welcome</div>';
  convert();
}

function doClear() { $('#input').value = ''; $('#output').innerHTML = ''; $('#status').innerHTML = ''; }

$('#input').addEventListener('input', convert);

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

$('#opts').innerHTML = `
  <label>${t('mode')}: <select id="opt-mode">
    <option value="named">${t('modeNamed')}</option>
    <option value="decimal">${t('modeDecimal')}</option>
    <option value="hex">${t('modeHex')}</option>
    <option value="decode">${t('modeDecode')}</option>
  </select></label>`;

$('#opt-mode').addEventListener('change', convert);

$('#lbl-in').textContent = t('lblIn');
$('#lbl-out').textContent = t('lblOut');
