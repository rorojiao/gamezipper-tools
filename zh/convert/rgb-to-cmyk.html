<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is the difference between RGB and CMYK?", "acceptedAnswer": {"@type": "Answer", "text": "RGB is an additive color model used by screens (monitors, phones). It mixes red, green and blue light to produce every other color. CMYK is a subtractive model used by printers, mixing cyan, magenta, yellow and key (black) ink. RGB has a wider gamut than CMYK, so vivid neon colors often look duller when printed."}}, {"@type": "Question", "name": "How is RGB converted to CMYK?", "acceptedAnswer": {"@type": "Answer", "text": "First each RGB channel (0-255) is normalized to 0-1. The black key K = 1 - max(R, G, B). If K is 1 (pure black) then C, M and Y are all 0. Otherwise C = (1 - R - K) / (1 - K), M = (1 - G - K) / (1 - K), Y = (1 - B - K) / (1 - K). The results are multiplied by 100 to give percentages."}}, {"@type": "Question", "name": "Why does my printed color look different from the screen?", "acceptedAnswer": {"@type": "Answer", "text": "Three reasons. First, CMYK cannot reproduce every RGB color (gamut mismatch). Second, paper absorbs ink and reflects light differently than a backlit screen. Third, monitor calibration varies. For critical brand colors request a physical proof from your printer."}}, {"@type": "Question", "name": "Can I convert CMYK back to RGB?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. Switch the tool to CMYK -> RGB mode, enter your ink percentages, and the converter computes the equivalent screen color. The formula is R = 255 x (1 - C) x (1 - K), G = 255 x (1 - M) x (1 - K), B = 255 x (1 - Y) x (1 - K)."}}]}</script>

    toolDesc: '将 RGB 转为印刷用的 CMYK，或将 CMYK 转回屏幕用的 RGB。实时预览、HEX、HSL，一键复制。免费、私密、浏览器本地运行。',
    modeRgb: 'RGB → CMYK',
    modeCmyk: 'CMYK → RGB',
    lblR: '红 (0-255)',
    lblG: '绿 (0-255)',
    lblB: '蓝 (0-255)',
    lblC: '青色 %',
    lblM: '品红 %',
    lblY: '黄色 %',
    lblK: '黑色 (Key) %',
    lblPicker: '颜色选择器',
    copyHint: '点击数值即可复制',
    step1: '选择模式：RGB → CMYK（屏幕转印刷）或 CMYK → RGB（印刷转屏幕）',
    step2: '输入数值或使用颜色选择器',
    step3: '即时查看转换结果、HEX 和 HSL',
    step4: '点击任意数值即可复制到剪贴板',
  }
});

const { $, t, copyText } = GZ;
let mode = 'rgb';

function clamp(v, min, max) { return Math.min(max, Math.max(min, v)); }

function rgbToHex(r, g, b) {
  return '#' + [r,g,b].map(x => clamp(Math.round(x),0,255).toString(16).padStart(2,'0')).join('');
}

function hexToRgb(hex) {
  hex = hex.replace('#','');
  if (hex.length === 3) hex = hex.split('').map(c => c+c).join('');
  return { r: parseInt(hex.slice(0,2),16), g: parseInt(hex.slice(2,4),16), b: parseInt(hex.slice(4,6),16) };
}

function rgbToCmyk(r, g, b) {
  const rn = r/255, gn = g/255, bn = b/255;
  const k = 1 - Math.max(rn, gn, bn);
  if (k >= 1) return { c:0, m:0, y:0, k:100 };
  const c = (1 - rn - k) / (1 - k);
  const m = (1 - gn - k) / (1 - k);
  const y = (1 - bn - k) / (1 - k);
  return {
    c: Math.round(c*100),
    m: Math.round(m*100),
    y: Math.round(y*100),
    k: Math.round(k*100)
  };
}

function cmykToRgb(c, m, y, k) {
  const cn=c/100, mn=m/100, yn=y/100, kn=k/100;
  return {
    r: Math.round(255 * (1-cn) * (1-kn)),
    g: Math.round(255 * (1-mn) * (1-kn)),
    b: Math.round(255 * (1-yn) * (1-kn))
  };
}

function rgbToHsl(r, g, b) {
  r/=255; g/=255; b/=255;
  const max = Math.max(r,g,b), min = Math.min(r,g,b);
  let h, s, l = (max+min)/2;
  if (max === min) { h = s = 0; }
  else {
    const d = max - min;
    s = l > 0.5 ? d/(2-max-min) : d/(max+min);
    switch(max) {
      case r: h = (g-b)/d + (g<b?6:0); break;
      case g: h = (b-r)/d + 2; break;
      default: h = (r-g)/d + 4;
    }
    h /= 6;
  }
  return { h: Math.round(h*360), s: Math.round(s*100), l: Math.round(l*100) };
}

function render() {
  let r, g, b, cmyk;
  if (mode === 'rgb') {
    r = clamp(parseInt($('#r').value)||0, 0, 255);
    g = clamp(parseInt($('#g').value)||0, 0, 255);
    b = clamp(parseInt($('#b').value)||0, 0, 255);
    cmyk = rgbToCmyk(r, g, b);
    $('#picker').value = rgbToHex(r,g,b);
  } else {
    c = clamp(parseFloat($('#c').value)||0, 0, 100);
    m = clamp(parseFloat($('#m').value)||0, 0, 100);
    y = clamp(parseFloat($('#y').value)||0, 0, 100);
    k = clamp(parseFloat($('#k').value)||0, 0, 100);
    const rgb = cmykToRgb(c,m,y,k);
    r = rgb.r; g = rgb.g; b = rgb.b;
    cmyk = { c, m, y, k };
  }
  const hex = rgbToHex(r,g,b);
  const hsl = rgbToHsl(r,g,b);
  $('#preview').style.background = hex;

  const items = [
    { lbl: 'HEX', val: hex.toUpperCase() },
    { lbl: 'RGB', val: `rgb(${r}, ${g}, ${b})` },
    { lbl: 'CMYK', val: `cmyk(${cmyk.c}%, ${cmyk.m}%, ${cmyk.y}%, ${cmyk.k}%)` },
    { lbl: 'C / M / Y / K', val: `${cmyk.c} · ${cmyk.m} · ${cmyk.y} · ${cmyk.k}` },
    { lbl: 'HSL', val: `hsl(${hsl.h}, ${hsl.s}%, ${hsl.l}%)` },
    { lbl: 'CSS Variable', val: `--brand: ${hex};` },
  ];
  $('#result-grid').innerHTML = items.map(it =>
    `<div class="result-item copy-cell" onclick="GZ.copyText('${it.val.replace(/'/g,"\\'")}')"><div class="val">${it.val}</div><div class="lbl">${it.lbl}</div></div>`
  ).join('');
}

function setMode(m) {
  mode = m;
  const rgbBtn = $('#mode-rgb'), cmykBtn = $('#mode-cmyk');
  if (m === 'rgb') {
    $('#form-rgb').style.display = '';
    $('#form-cmyk').style.display = 'none';
    rgbBtn.classList.remove('gz-btn-secondary');
    cmykBtn.classList.add('gz-btn-secondary');
  } else {
    $('#form-rgb').style.display = 'none';
    $('#form-cmyk').style.display = '';
    cmykBtn.classList.remove('gz-btn-secondary');
    rgbBtn.classList.add('gz-btn-secondary');
  }
  render();
}

['r','g','b','c','m','y','k'].forEach(id => $('#'+id).addEventListener('input', render));
$('#picker').addEventListener('input', e => {
  const { r, g, b } = hexToRgb(e.target.value);
  $('#r').value = r; $('#g').value = g; $('#b').value = b;
  render();
});

// Initialize labels
$('#mode-rgb').textContent = t('modeRgb');
$('#mode-cmyk').textContent = t('modeCmyk');
$('#lbl-r').textContent = t('lblR');
$('#lbl-g').textContent = t('lblG');
$('#lbl-b').textContent = t('lblB');
$('#lbl-c').textContent = t('lblC');
$('#lbl-m').textContent = t('lblM');
$('#lbl-y').textContent = t('lblY');
$('#lbl-k').textContent = t('lblK');
$('#lbl-picker').textContent = t('lblPicker');

GZ.renderToolPage({
  category: 'convert',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🎨', href:'/color/color-wheel.html', name:'Color Wheel'},
    {icon:'🧪', href:'/color/mixer.html', name:'Color Mixer'},
    {icon:'👁️', href:'/color/contrast.html', name:'Contrast Checker'},
    {icon:'🎲', href:'/color/random-color.html', name:'Random Color'},
  ]
});

render();
</script>
