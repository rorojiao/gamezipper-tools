    step3: 'Click again or press Copy to add to clipboard',
    step4: 'Paste into your document, code or social media post',
  },
  zh: {
    toolTitle: '字符映射表 & Unicode 浏览器',
    toolDesc: '浏览、搜索和复制 Unicode 字符、符号和特殊字符 — 按分类组织，一键复制。',
    searchPlaceholder: '搜索字符（如 箭头、爱心、星星、加号、版权）...',
    step1: '输入关键词搜索或选择一个分类',
    step2: '点击任意字符查看详情',
    step3: '再次点击或按复制按钮复制到剪贴板',
    step4: '粘贴到你的文档、代码或社交媒体帖子',

const categories = {

  'Math': {icon:'🔢',chars:'±×÷=≠≈≡≤≥<>∝∞∑∏∫∂√∛∜∆∇∈∉∋∏∐⊕⊖⊗⊘⊙†‡°‰‱℅℃℉ℓ№ª°'},
  'Arrows': {icon:'➡️',chars:'←↑→↓↔↕↖↗↘↙⇐⇑⇒⇓⇔⇕➜➝➞➟➠➡➢➣➤➥➦➧➨➩➪➫➬➭➮➯➱↩↪↫↬↭↮↯↰↱↲↳↴↵↶↷↺↻⟵⟶⟷⟸⟹⟺⟻⟼'},
  'Currency': {icon:'💱',chars:'$¢£¤¥€₹₽₿₩₪₫₭₮₯₰₱₲₳₴₵₶₷₸₹₺₻₼₽₾₿﹩'},
  'Stars': {icon:'⭐',chars:'★☆✦✧✩✪✫✬✭✮✯✰✱✲✳✴✵✶✷✸✹✺✻✼✽✾✿❀❁❂❃❄❅❆❇❈❉❊❋✡🔯'},
  'Hearts': {icon:'❤️',chars:'❤♥♡❣❤️🧡💛💚💙💜🖤🤍🤎💕💞💓💗💖💘💝💟🎔💝'},
  'Box Drawing': {icon:'🔲',chars:'─━│┃┄┅┆┇┈┉┊┋┌┍┎┏┐┑┒┓└┕┖┗┘┙┚┛├┝┞┟┠┡┢┣┤┥┦┧┨┩┪┫┬┭┮┯┰┱┲┳┴┵┶┷┸┹┺┻┼┽┾┿╀╁╂╃╄╅╆╇╈╉╊╋╌╍╎╏═║╒╓╔╕╖╗╘╙╚╛╜╝╞╟╠╡╢╣╤╥╦╧╨╩╪╫╬╭╮╯╰╱╲╳'},
  'Block': {icon:'🟫',chars:'█▓▒░▄▀▌▐▆▇██▓▒░⣿⣷⣯⣟⡿⢿⣻⣽⣾⣀⣤⣦⣴⣶⣷⣸⣼⣹⣺⢀⢠⢰⢸⡀⡠⡰⡰⢐⢒⡐⡒'},
  'Dingbats': {icon:'✨',chars:'✁✂✃✄✆✇✈✉✌✍✎✏✐✑✒✓✔✕✖✗✘✙✚✛✜✝✞✟✠✡✢✣✤✥✦✧✨✩✪✫✬✭✮✯✰✱✲✳✴✵✶✷✸✹✺✻✼✽✾✿❁❂❃❄❅❆❇❈❉❊❋'},

  'Subscript': {icon:'ₓ',chars:'₀₁₂₃₄₅₆₇₈₉₊₋₌₍₎ₐₑₕᵢₒᵣₛₜᵤᵥₓ'},
  'Fractions': {icon:'½',chars:'½⅓⅔¼¾⅕⅖⅗⅘⅙⅚⅐⅛⅜⅝⅞⅑⅒'},
  'Greek': {icon:'🔤',chars:'αβγδεζηθικλμνξοπρστυφχψωΑΒΓΔΕΖΗΘΙΚΛΜΝΞΟΠΡΣΤΥΦΧΨΩ'},
  'Music': {icon:'🎵',chars:'♩♪♫♬♭♮♯𝄞𝄡𝄢𝄪𝄫𝄆𝄇🎼🎤🎧🎸🎹🎺🎻🥁'},
  'Check': {icon:'✅',chars:'✓✔✗✘✅❌☑☒☓✪✫✬✭٠٩istics'},

$('#searchInput').placeholder = t('searchPlaceholder');

const catNames = Object.keys(categories);
let currentCat = catNames[0];

function renderTabs() {
  $('#catTabs').innerHTML = catNames.map(name =>
    `<button class="${name===currentCat?'active':''}" onclick="setCat('${name}')">${categories[name].icon} ${name}</button>`
  ).join('');
}

function setCat(name) {
  currentCat = name;
  renderTabs();
  renderGrid(categories[name].chars);
}

function renderGrid(chars) {
  const grid = $('#charGrid');
  grid.innerHTML = '';
  [...chars].forEach(ch => {
    const cell = document.createElement('div');
    cell.className = 'char-cell';
    cell.innerHTML = `<span class="ch">${ch}</span><span class="code">U+${ch.codePointAt(0).toString(16).toUpperCase().padStart(4,'0')}</span>`;
    cell.onclick = () => selectChar(ch);
    grid.appendChild(cell);
  });
}

function selectChar(ch) {
  const code = ch.codePointAt(0);
  const hex = 'U+' + code.toString(16).toUpperCase().padStart(4, '0');
  const html = `&#${code};`;
  const css = `\\${code.toString(16)}`;
  $('#charDetail').style.display = 'flex';
  $('#detailChar').textContent = ch;
  $('#detailInfo').innerHTML = `<b>Character:</b> ${ch}<br><b>Unicode:</b> ${hex}<br><b>Decimal:</b> ${code}<br><b>HTML:</b> ${html}<br><b>CSS:</b> ${css}<br><button class="gz-btn" style="margin-top:6px" onclick="copyChar('${ch}')">${t('copy')}</button>`;
  copyText(ch);
  showToast(`${ch} copied!`);
}

function copyChar(ch) {
  copyText(ch);
  showToast(`${ch} copied!`);
}

function showToast(msg) {
  const toast = $('#toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 1500);
}

$('#searchInput').addEventListener('input', function() {
  const q = this.value.toLowerCase().trim();
  if (!q) { setCat(currentCat); return; }
  let results = '';
  for (const cat of catNames) {
    for (const ch of categories[cat].chars) {
      const name = ch.toLowerCase();
      if (name.includes(q) || cat.toLowerCase().includes(q)) results += ch;
    }
  }
  if (!results) results = 'No results found';
  renderGrid(results);
});

renderTabs();
setCat('Punctuation');

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🔤', href:'/text/unicode-search.html', name:'Unicode Search'},
    {icon:'🔤', href:'/dev/ascii-table.html', name:'ASCII Table'},
    {icon:'😊', href:'/text/emoji-picker.html', name:'Emoji Picker'},
    {icon:'🔣', href:'/dev/html-entities.html', name:'HTML Entities'},
  ]
});
</script>
