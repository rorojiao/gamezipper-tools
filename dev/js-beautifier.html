const { $, copyText, t } = GZ;

// Decide whether a '/' is the start of a regex literal (vs division), based on the
// previous significant token. After a value (identifier, number, ')', ']') it is division.
const REGEX_LEAD = new Set(['','(','[','{',',',';','=','+','-','*','/','%','<','>','!','&','|','?',':','~','^','%']);
const REGEX_KEYWORDS = new Set(['return','typeof','case','do','else','in','of','new','delete','void','throw','instanceof','await','yield','if','while','for','switch','and','or','not']);
function isRegexLead(prev, buf){
  if (buf === '') return true;
  if (REGEX_LEAD.has(prev)) return true;
  if (REGEX_KEYWORDS.has(prev)) return true;
  return false;
}

// --- Lightweight JS beautifier (token-walking, bracket-depth based) ---
function beautifyJS(src, opts){
  const indent = opts.indent;
  const out = [];
  let i = 0, n = src.length;
  let depth = 0;
  let atLineStart = true;
  let buf = '';
  let lastNonSpace = '';

  function pad(d){ return ' '.repeat(d * indent); }

  // We build line by line, tracking a buffer for the current line content.
  let pendingNewline = false;

  function newline(){
    if (buf.length){
      out.push(pad(depth) + buf.replace(/\s+$/,''));
      buf = '';
    }
    atLineStart = true;
  }

  function addSpace(){
    if (buf && !/\s$/.test(buf)) buf += ' ';
  }

  while (i < n){
    const c = src[i];
    const c2 = src[i+1];

    // Line comment
    if (c === '/' && c2 === '/'){
      let end = src.indexOf('\n', i);
      if (end === -1) end = n;
      const comment = src.slice(i, end);
      if (buf) addSpace();
      buf += comment;
      i = end;
      // newline after
      newline();
      if (src[i] === '\n') i++;
      continue;
    }
    // Block comment
    if (c === '/' && c2 === '*'){
      let end = src.indexOf('*/', i+2);
      if (end === -1) end = n; else end += 2;
      const comment = src.slice(i, end);
      if (buf){ addSpace(); buf += comment; }
      else { buf += comment; }
      i = end;
      if (opts.preserveLF) newline();
      continue;
    }
    // String literals
    if (c === '"' || c === "'" || c === '`'){
      const q = c;
      let j = i + 1;
      while (j < n){
        if (src[j] === '\\') { j += 2; continue; }
        if (src[j] === q){ j++; break; }
        // template literal can span newlines; others too but rare
        if (src[j] === '\n' && q !== '`'){ j++; continue; }
        j++;
      }
      if (buf && /[A-Za-z0-9_$]/.test(buf.slice(-1))) addSpace();
      buf += src.slice(i, j);
      i = j;
      lastNonSpace = 'str';
      atLineStart = false;
      continue;
    }
    // Regex literal — heuristic: treat '/' as regex when it follows an operator,
    // punctuation, a keyword, or appears at the start of a statement; otherwise division.
    if (c === '/' && isRegexLead(lastNonSpace, buf)){
      // attempt to consume regex
      let j = i + 1, inClass = false, ok = true;
      while (j < n){
        const cj = src[j];
        if (cj === '\\'){ j += 2; continue; }
        if (cj === '[') inClass = true;
        else if (cj === ']') inClass = false;
        else if (cj === '/' && !inClass){ j++; break; }
        else if (cj === '\n'){ ok = false; break; }
        j++;
      }
      if (ok){
        // consume flags
        while (j < n && /[gimsuyd]/.test(src[j])) j++;
        buf += src.slice(i, j);
        i = j;
        lastNonSpace = 'rx';
        atLineStart = false;
        continue;
      }
    }
    // Numbers
    if (/[0-9]/.test(c) || (c === '.' && /[0-9]/.test(c2))){
      let j = i;
      while (j < n && /[0-9a-fA-FxXoObBeE_+\-.]/.test(src[j])){
        // stop on double ++ or trailing + in non-number context
        if ((src[j] === '+' || src[j] === '-') && j > i && src[j-1] !== 'e' && src[j-1] !== 'E') break;
        j++;
      }
      if (buf && /[A-Za-z_$]/.test(buf.slice(-1))) addSpace();
      buf += src.slice(i, j);
      i = j;
      lastNonSpace = 'num';
      atLineStart = false;
      continue;
    }
    // Identifiers / keywords
    if (/[A-Za-z_$]/.test(c)){
      let j = i;
      while (j < n && /[A-Za-z0-9_$]/.test(src[j])) j++;
      const word = src.slice(i, j);
      // Insert a separating space only when the previous char was a value token
      // (identifier/number/closing bracket) — never after ., (, =, operators, etc.
      if (buf && /[A-Za-z0-9_$)\]]$/.test(buf)) addSpace();
      buf += word;
      i = j;
      lastNonSpace = word;
      atLineStart = false;
      continue;
    }
    // Braces
    if (c === '{'){
      if (opts.spaceBeforeBrace && buf && !/\s$/.test(buf)) buf += ' ';
      buf += '{';
      lastNonSpace = '{';
      i++;
      // newline after { unless followed by } or same-line object-ish
      // detect inline object: heuristic — if char before was '(' or ',' or '=' treat as block (still newline)
      newline();
      depth++;
      continue;
    }
    if (c === '}'){
      newline();
      if (depth > 0) depth--;
      buf += '}';
      lastNonSpace = '}';
      i++;
      // newline after } unless followed by ; , ) . or operator
      const nxt = src[i];
      if (nxt === undefined || /[,;)\].]/.test(nxt)){
        // attach punctuation
        if (nxt) { buf += nxt; i++; lastNonSpace = nxt; }
        newline();
      } else if (nxt === ')'){
        buf += ')'; i++; lastNonSpace = ')'; newline();
      } else if (/[a-zA-Z0-9_$]/.test(nxt)){
        // e.g. }else, }catch — add space
        addSpace();
      } else {
        newline();
      }
      continue;
    }
    if (c === ';'){
      buf += ';';
      lastNonSpace = ';';
      i++;
      newline();
      continue;
    }
    if (c === ','){
      buf += ',';
      lastNonSpace = ',';
      i++;
      // newline after comma in arrays/args? Keep on same line for readability of params; newline in arrays/objects
      // Default: add a space, newline only if inside [] or {}
      addSpace();
      continue;
    }
    if (c === '('){
      buf += '(';
      lastNonSpace = '(';
      atLineStart = false;
      i++;
      continue;
    }
    if (c === ')'){
      buf += ')';
      lastNonSpace = ')';
      i++;
      continue;
    }
    if (c === '['){
      buf += '[';
      lastNonSpace = '[';
      i++;
      continue;
    }
    if (c === ']'){
      buf += ']';
      lastNonSpace = ']';
      i++;
      continue;
    }
    if (c === ':'){
      buf += ':';
      lastNonSpace = ':';
      i++;
      addSpace();
      continue;
    }
    if (c === '?'){
      buf += '?';
      lastNonSpace = '?';
      i++;
      addSpace();
      continue;
    }
    // whitespace / newlines
    if (c === '\n' || c === '\r'){
      // collapse: produce newline if buffer has content
      if (opts.preserveLF && buf){
        newline();
      }
      i++;
      continue;
    }
    if (/\s/.test(c)){
      if (buf && !/\s$/.test(buf) && /[a-zA-Z0-9_$)]/.test(lastNonSpace)){
        // could be meaningful space between tokens; defer
      }
      i++;
      continue;
    }
    // operators / punctuation
    buf += c;
    lastNonSpace = c;
    atLineStart = false;
    i++;
  }
  newline();
  // tidy: collapse multiple blank lines
  return out.join('\n').replace(/\n{3,}/g, '\n\n').trim() + '\n';
}

function minifyJS(src){
  let out = '', i = 0, n = src.length, prev = '';
  while (i < n){
    const c = src[i], c2 = src[i+1];
    if (c === '/' && c2 === '/'){
      let e = src.indexOf('\n', i); if (e === -1) e = n; i = e; continue;
    }
    if (c === '/' && c2 === '*'){
      let e = src.indexOf('*/', i+2); if (e === -1) e = n; else e += 2; i = e; continue;
    }
    if (c === '"' || c === "'" || c === '`'){
      const q = c; let j = i+1;
      while (j < n){ if (src[j] === '\\'){ j+=2; continue; } if (src[j] === q){ j++; break; } j++; }
      out += src.slice(i, j); prev = src[j-1] || ''; i = j; continue;
    }
    if (/\s/.test(c)){
      // keep a space only if needed between word-ish tokens
      if (/[A-Za-z0-9_$]/.test(prev) && i+1 < n && /[A-Za-z0-9_$]/.test(src[i+1])){
        out += ' '; prev = ' ';
      }
      i++; continue;
    }
    out += c; prev = c; i++;
  }
  return out.trim();
}

const HIGHLIGHT_KW = new Set('function return if else for while do switch case break continue new var let const class extends super this typeof instanceof in of delete void throw try catch finally async await yield import export default from as static get set null undefined true false'.split(' '));

function highlight(js){
  // Single-pass tokenizer — never re-scans inserted spans, so no double-replacement corruption.
  let out = '';
  const n = js.length;
  let i = 0;
  const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const span = (cls, s) => '<span class="'+cls+'">'+esc(s)+'</span>';
  while (i < n){
    const c = js[i], c2 = js[i+1];
    if (c === '/' && c2 === '/'){ let e = js.indexOf('\n', i); if (e === -1) e = n; out += span('js-com', js.slice(i, e)); i = e; continue; }
    if (c === '/' && c2 === '*'){ let e = js.indexOf('*/', i+2); if (e === -1) e = n; else e += 2; out += span('js-com', js.slice(i, e)); i = e; continue; }
    if (c === '"' || c === "'" || c === '`'){ const q = c; let j = i+1; while (j < n){ if (js[j] === '\\'){ j += 2; continue; } if (js[j] === q){ j++; break; } j++; } out += span('js-str', js.slice(i, j)); i = j; continue; }
    if (/[0-9]/.test(c) || (c === '.' && /[0-9]/.test(c2))){ let j = i; while (j < n && /[0-9a-fA-FxXoObBeE._]/.test(js[j])) j++; out += span('js-num', js.slice(i, j)); i = j; continue; }
    if (/[A-Za-z_$]/.test(c)){ let j = i; while (j < n && /[A-Za-z0-9_$]/.test(js[j])) j++; const w = js.slice(i, j); out += HIGHLIGHT_KW.has(w) ? span('js-kw', w) : esc(w); i = j; continue; }
    out += esc(c); i++;
  }
  return out;
}

function doBeautify(){
  const inp = $('#input').value;
  if (!inp.trim()){ $('#status').innerHTML = `<span style="color:var(--gz-accent)">${t('empty')}</span>`; $('#output').innerHTML=''; return; }
  const out = beautifyJS(inp, getOpts());
  $('#output').innerHTML = highlight(out);
  window._jsOut = out;
  $('#status').innerHTML = `<span style="color:var(--gz-success)">${t('done')} · ${out.split('\n').length} lines</span>`;
}

function doMinify(){
  const inp = $('#input').value;
  if (!inp.trim()){ $('#status').innerHTML = `<span style="color:var(--gz-accent)">${t('empty')}</span>`; $('#output').innerHTML=''; return; }
  const out = minifyJS(inp);
  window._jsOut = out;
  $('#output').innerHTML = highlight(out);
  $('#status').innerHTML = `<span style="color:var(--gz-success)">${t('minified')} · ${out.length} chars</span>`;
}

function doCopy(){ if (window._jsOut != null) copyText(window._jsOut); }

function doDownload(){
  if (window._jsOut == null) return;
  const blob = new Blob([window._jsOut], {type:'text/javascript'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'beautified.js';
  a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href), 1000);
}
