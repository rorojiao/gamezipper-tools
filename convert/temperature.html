<script>
GZI18n.register({
  en: {
    toolTitle: 'Temperature Converter',
    toolDesc: 'Convert between Celsius, Fahrenheit, Kelvin, Rankine and Réaumur instantly with live results and formulas.',
    step1: 'Enter a temperature value in the input field',
    step2: 'Select the source unit (°C, °F, K, °R, °Ré)',
    step3: 'See all conversions update in real-time',
    step4: 'Click any result to copy it',
  },
  zh: {
    toolTitle: '温度转换器',
    toolDesc: '即时在摄氏度、华氏度、开尔文、兰氏度和列氏度之间转换，实时显示结果和公式。',
    step1: '在输入框输入温度值',
    step2: '选择原始单位（°C、°F、K、°R、°Ré）',
    step3: '查看所有转换结果实时更新',
    step4: '点击任意结果即可复制',
  }
});

const { $, copyText, t } = GZ;

const units = [
  { key: 'C', symbol: '°C', name: 'Celsius', formula: v => v, expr: '°C = °C' },
  { key: 'F', symbol: '°F', name: 'Fahrenheit', formula: v => v, expr: '°F = °C × 9/5 + 32' },
  { key: 'K', symbol: 'K', name: 'Kelvin', formula: v => v, expr: 'K = °C + 273.15' },
  { key: 'R', symbol: '°R', name: 'Rankine', formula: v => v, expr: '°R = (°C + 273.15) × 9/5' },
  { key: 'Re', symbol: '°Ré', name: 'Réaumur', formula: v => v, expr: '°Ré = °C × 4/5' },
];

function toCelsius(val, from) {
  switch(from) {
    case 'C': return val;
    case 'F': return (val - 32) * 5/9;
    case 'K': return val - 273.15;
    case 'R': return (val - 491.67) * 5/9;
    case 'Re': return val * 5/4;
  }
  return val;
}

function fromCelsius(c, to) {
  switch(to) {
    case 'C': return c;
    case 'F': return c * 9/5 + 32;
    case 'K': return c + 273.15;
    case 'R': return (c + 273.15) * 9/5;
    case 'Re': return c * 4/5;
  }
  return c;
}

const formulasFrom = {
  C: { F: '°F = °C × 9/5 + 32', K: 'K = °C + 273.15', R: '°R = (°C + 273.15) × 9/5', Re: '°Ré = °C × 4/5' },
  F: { C: '°C = (°F − 32) × 5/9', K: 'K = (°F − 32) × 5/9 + 273.15', R: '°R = °F + 459.67', Re: '°Ré = (°F − 32) × 4/9' },
  K: { C: '°C = K − 273.15', F: '°F = K × 9/5 − 459.67', R: '°R = K × 9/5', Re: '°Ré = (K − 273.15) × 4/5' },
  R: { C: '°C = (°R − 491.67) × 5/9', F: '°F = °R − 459.67', K: 'K = °R × 5/9', Re: '°Ré = (°R − 491.67) × 4/9' },
  Re: { C: '°C = °Ré × 5/4', F: '°F = °Ré × 9/4 + 32', K: 'K = °Ré × 5/4 + 273.15', R: '°R = (°Ré × 5/4 + 273.15) × 9/5' },
};

function convert() {
  const val = parseFloat($('#inp-temp').value);
  const from = $('#inp-unit').value;
  if (isNaN(val)) { $('#results').innerHTML = ''; return; }
  const c = toCelsius(val, from);
  const others = units.filter(u => u.key !== from);
  const formMap = formulasFrom[from] || {};
  $('#results').innerHTML = others.map(u => {
    const result = fromCelsius(c, u.key);
    const formatted = Number.isInteger(result) ? result : result.toFixed(4).replace(/\.?0+$/, '');
    const formula = formMap[u.key] || '';
    return `<div class="temp-card" onclick="copyText('${formatted} ${u.symbol}')" style="cursor:pointer" title="Click to copy">
      <label>${u.name} (${u.symbol})</label>
      <div class="val">${formatted}<span style="font-size:.5em;margin-left:4px">${u.symbol}</span></div>
      ${formula ? `<div class="formula">${formula}</div>` : ''}
    </div>`;
  }).join('');
}

$('#inp-temp').addEventListener('input', convert);
$('#inp-unit').addEventListener('change', convert);
convert();

GZ.renderToolPage({

    {icon:'🔧', href:'/convert/unit.html', name:'Unit Converter'},
    {icon:'📊', href:'/calc/percentage.html', name:'Percentage Calculator'},
  ]
});
</script>
