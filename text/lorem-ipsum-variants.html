<script>
GZI18n.register({
  en: {
    toolTitle: 'Lorem Ipsum Variants Generator',
    toolDesc: 'Generate placeholder text in 6 fun styles — classic Latin, Hipster, Bacon, Office, Tech and Pirate. Choose paragraphs, sentences or words. Free, private, no signup.',
    step1: 'Pick a text style from the buttons above',
    step2: 'Choose the unit — paragraphs, sentences or words',

    step4: 'Click Generate and copy your placeholder text',
    styleLatin: '🏛️ Classic Latin',

    startClassic: 'Start with "Lorem ipsum"',
    generate: 'Generate',
  },
  zh: {
    toolTitle: 'Lorem Ipsum 变体生成器',
    toolDesc: '生成 6 种趣味风格的占位文本 — 经典拉丁文、嬉皮士、培根、办公室、科技和海盗。可选段落、句子或词数。免费、私密、无需注册。',
    step1: '从上方按钮中选择文本风格',
    step2: '选择单位 — 段落、句子或词数',
    step3: '设置数量并切换 Lorem ipsum 开头',
    step4: '点击「生成」并复制占位文本',
    styleLatin: '🏛️ 经典拉丁文',
    styleHipster: '👓 嬉皮士',
    styleBacon: '🥓 培根',
    styleOffice: '💼 办公室',
    styleTech: '💻 科技',
    stylePirate: '🏴‍☠️ 海盗',
    unitParas: '段落',
    unitSentences: '句子',
    unitWords: '词数',
    startClassic: '以 "Lorem ipsum" 开头',
    generate: '生成',
  }
});

const { $, copyText, t } = GZ;

const WORDS = {
  latin: ['lorem','ipsum','dolor','sit','amet','consectetur','adipiscing','elit','sed','do','eiusmod','tempor','incididunt','ut','labore','et','dolore','magna','aliqua','enim','ad','minim','veniam','quis','nostrud','exercitation','ullamco','laboris','nisi','aliquip','ex','ea','commodo','consequat','duis','aute','irure','in','reprehenderit','voluptate','velit','esse','cillum','fugiat','nulla','pariatur','excepteur','sint','occaecat','cupidatat','non','proident','sunt','culpa','qui','officia','deserunt','mollit','anim','id','est','laborum'],
  hipster: ['artisanal','handcrafted','vintage','brooklyn','shoreditch','mason','jar','cold-pressed','kombucha','fixie','vinyl','beard','flannel','pour-over','single-origin','ethically','sourced','small-batch','curated','aesthetic','retro','mid-century','minimalist','indie','organic','gluten-free','quinoa','avocado','toast','cold-brew','sriracha','kale','smoothie','meditation','mindful','wellness','upcycled','thrifted','analog','polaroid'],
  bacon: ['bacon','pancetta','prosciutto','salami','pepperoni','ham','sausage','pork','belly','rashers','sizzling','crispy','smoked','cured','maple','glazed','hickory','applewood','canadian','back','streaky','thick-cut','chopped','fried','grilled','wrapped','stuffed','cheeseburger','brisket','ribs','pulled','porchetta','guanciale','lardons','chicharrones'],
  office: ['synergy','leverage','stakeholder','deliverable','milestone','KPI','ROI','pivot','agile','scrum','sprint','backlog','standup','sync','align','onboard','bandwidth','circle','back','touch','base','low-hanging','fruit','move','needle','boil','ocean','ducks','row','paradigm','shift','think','outside','box','deep','dive','level','setting','action','items','follow','up'],
  tech: ['javascript','python','react','node','docker','kubernetes','microservices','api','webhook','oauth','jwt','redis','postgres','mongodb','graphql','typescript','webpack','babel','eslint','prettier','ci','cd','pipeline','deploy','scalable','serverless','lambda','edge','cache','lazy','load','virtual','dom','state','reducer','hook','promise','async','await','closure','prototype','polyfill'],
  pirate: ['ahoy','matey','arrr','shiver','me','timbers','yo','ho','blimey','aye','captain','scurvy','dog','landlubber','parley','booty','doubloons','grog','rum','jolly','roger','plank','walk','bounty','horizon','compass','anchor','sail','mast','crow\'s','nest','buccaneer','privateer','corsair','galleon','treasure','map','x','marks','spot','dead','men','tell','tales'],
};

const OPENING = 'Lorem ipsum dolor sit amet, consectetur adipiscing elit.';
let currentStyle = 'latin';
let unit = 'paras';
let count = 3;
let startClassic = true;

const pick = (arr) => arr[Math.floor(Math.random() * arr.length)];
const cap = (s) => s.charAt(0).toUpperCase() + s.slice(1);

function genSentence() {
  const words = WORDS[currentStyle];
  const len = 8 + Math.floor(Math.random() * 12);
  let parts = [];
  for (let i = 0; i < len; i++) parts.push(pick(words));
  let s = parts.join(' ');
  s = cap(s) + (Math.random() > 0.3 ? '.' : Math.random() > 0.5 ? '!' : '?');
  return s;
}

function genParagraph() {
  const sentCount = 3 + Math.floor(Math.random() * 5);
  let sentences = [];
  for (let i = 0; i < sentCount; i++) sentences.push(genSentence());
  return sentences.join(' ');
}

function generate() {
  let result = '';
  if (unit === 'words') {
    const words = WORDS[currentStyle];
    let parts = [];
    for (let i = 0; i < count; i++) parts.push(pick(words));
    result = parts.join(' ');
    if (startClassic && currentStyle === 'latin' && count >= 5) {
      result = 'lorem ipsum dolor sit amet ' + result;
    }
    result = cap(result) + '.';
  } else if (unit === 'sentences') {
    let sentences = [];
    for (let i = 0; i < count; i++) sentences.push(genSentence());
    if (startClassic && currentStyle === 'latin' && i === 0) sentences[0] = OPENING;
    result = sentences.join(' ');
  } else {
    let paras = [];
    for (let i = 0; i < count; i++) {
      if (startClassic && currentStyle === 'latin' && i === 0) {
        let p = OPENING + ' ' + genSentence() + ' ' + genSentence();
        paras.push(p);
      } else {
        paras.push(genParagraph());
      }
    }
    result = paras.join('\n\n');
  }
  $('#output').textContent = result;
}

$('#styles').innerHTML = `
  <div class="style-btn active" data-style="latin" onclick="setStyle('latin')">${t('styleLatin')}</div>
  <div class="style-btn" data-style="hipster" onclick="setStyle('hipster')">${t('styleHipster')}</div>
  <div class="style-btn" data-style="bacon" onclick="setStyle('bacon')">${t('styleBacon')}</div>
  <div class="style-btn" data-style="office" onclick="setStyle('office')">${t('styleOffice')}</div>
  <div class="style-btn" data-style="tech" onclick="setStyle('tech')">${t('styleTech')}</div>
  <div class="style-btn" data-style="pirate" onclick="setStyle('pirate')">${t('stylePirate')}</div>`;

$('#controls').innerHTML = `
  <label><input type="radio" name="unit" value="paras" checked onchange="unit='paras'"> ${t('unitParas')}</label>
  <label><input type="radio" name="unit" value="sentences" onchange="unit='sentences'"> ${t('unitSentences')}</label>
  <label><input type="radio" name="unit" value="words" onchange="unit='words'"> ${t('unitWords')}</label>
  <label><input type="number" id="cnt" min="1" max="100" value="3" onchange="count=+this.value"> </label>
  <label><input type="checkbox" id="classic" checked onchange="startClassic=this.checked"> ${t('startClassic')}</label>`;

function setStyle(style) {
  currentStyle = style;
  document.querySelectorAll('.style-btn').forEach(b => b.classList.toggle('active', b.dataset.style === style));
  generate();
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="generate()">${t('generate')} 🎲</button>
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>`;

generate();

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',

    {icon:'📚', href:'/text/lorem-ipsum-generator.html', name:'Lorem Ipsum Gen'},
    {icon:'🔤', href:'/text/random-word-generator.html', name:'Random Words'},
    {icon:'💬', href:'/text/random-sentence-generator.html', name:'Random Sentences'},
  ]
});
</script>
