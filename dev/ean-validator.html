function lookupCountry(prefix3) {
  // GS1 prefixes are usually 3 digits but can be 2-digit ranges (like 30-37 = France)
  if (GS1_PREFIX[prefix3]) return GS1_PREFIX[prefix3];
  // Try 2-digit ranges
  const p2 = prefix3.substring(0, 2);
  const ranges = [
    ['00','13','GS1 US & Canada'],['30','37','GS1 France'],['38','38','GS1 Croatia'],
    ['40','44','GS1 Germany'],['46','46','GS1 Russia'],['49','49','GS1 Japan'],
    ['50','50','GS1 UK'],['52','52','GS1 Greece'],['54','54','GS1 Belgium'],['56','56','GS1 Portugal'],
    ['57','57','GS1 Denmark'],['590','599','GS1 Poland'],['640','649','GS1 Finland'],
    ['690','699','GS1 China'],['700','709','GS1 Norway'],['730','739','GS1 Sweden'],
    ['760','769','GS1 Switzerland'],['93','93','GS1 Australia'],
  ];
  for (const r of ranges) {
    const lo = parseInt(r[0]), hi = parseInt(r[1]);
    const pp = parseInt(p2);
    if (pp >= lo && pp <= hi) return r[2];
  }
  return null;
}

// GS1 mod-10 check digit
function calcCheckDigit(digits) {
  // digits is the data portion (without check digit)
  let sum = 0;
  let dbl = true; // last digit is doubled
  for (let i = digits.length - 1; i >= 0; i--) {
    let d = parseInt(digits[i]);
    if (dbl) {
      d *= 3;
    }
    sum += d;
    dbl = !dbl;
  }
  return (10 - (sum % 10)) % 10;
}

function row(key, val) {
  return `<div class="decode-row"><span class="key">${key}</span><span class="val">${val}</span></div>`;
}

function check() {
  let raw = $('#ean').value.trim();
  $('#result').innerHTML = '';
  if (!/^\d{8}$|^\d{12,14}$/.test(raw)) {
    $('#result').innerHTML = `<div style="color:#e74c3c;padding:12px;text-align:center;background:var(--glass);border-radius:12px">${t('invalid')}</div>`;
    return;
  }

  const data = raw.substring(0, raw.length - 1);
  const providedCheck = parseInt(raw.substring(raw.length - 1));
  const expectedCheck = calcCheckDigit(data);
  const valid = (providedCheck === expectedCheck);

  let typeLabel;
  switch (raw.length) {
    case 8: typeLabel = t('t8'); break;
    case 12: typeLabel = t('t12'); break;
    case 13:
      if (raw.startsWith('978') || raw.startsWith('979')) typeLabel = t('isbn');
      else if (raw.startsWith('45') || raw.startsWith('49')) typeLabel = t('jan');
      else typeLabel = t('t13');
      break;
    case 14: typeLabel = t('t14'); break;
  }

  // Determine prefix and country
  let prefixLen = raw.length === 8 ? 3 : 3;
  const prefix = raw.substring(0, prefixLen);
  const country = lookupCountry(prefix) || t('notFound');

  // colored display
  let colors = [];
  for (let i = 0; i < raw.length; i++) {
    let bg;
    if (i < prefixLen) bg = '#9b59b6';
    else if (i === raw.length - 1) bg = valid ? '#27ae60' : '#e74c3c';
    else bg = '#4ecdc4';
    colors.push(`<span style="color:#fff;background:${bg};border-radius:4px;padding:2px 2px">${raw[i]}</span>`);
  }

  const status = valid ? t('valid') : `${t('invalid2')} <span style="opacity:.7;font-size:.85em">(${t('expected')}: ${expectedCheck})</span>`;
  const statusClass = valid ? 'check-ok' : 'check-fail';

  // Item reference = digits between prefix and check digit
  const itemRef = raw.substring(prefixLen, raw.length - 1);

  // Build a simple visual "barcode" stripes
  let stripes = '';
  let seed = 0;
  for (let i = 0; i < raw.length; i++) seed = (seed * 31 + parseInt(raw[i])) & 0xfffff;
  for (let i = 0; i < 60; i++) {
    seed = (seed * 1103515245 + 12345) & 0x7fffffff;
    const w = (seed % 3) + 1;
    const dark = (seed % 2) === 0;
    stripes += `<span style="display:inline-block;width:${w}px;height:48px;background:${dark ? '#000' : '#fff'}"></span>`;
  }

  $('#result').innerHTML = `
