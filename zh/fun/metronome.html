.mt-stage{text-align:center;padding:30px 20px;background:linear-gradient(135deg,rgba(108,92,231,.08),rgba(78,205,196,.05));border-radius:16px;margin-bottom:18px;border:1px solid var(--border)}
.mt-pulse{width:140px;height:140px;border-radius:50%;background:radial-gradient(circle at 30% 30%,#6c5ce7,#0a0a1a);margin:0 auto 16px;display:flex;align-items:center;justify-content:center;font-size:2.4rem;font-weight:900;color:#fff;transition:transform .08s;box-shadow:0 8px 30px rgba(108,92,231,.4)}
.mt-pulse.beat{transform:scale(1.12);box-shadow:0 0 50px rgba(108,92,231,.8)}
.mt-pulse.accent{background:radial-gradient(circle at 30% 30%,#ff6b6b,#0a0a1a)}
.mt-bpm-display{font-size:4rem;font-weight:900;font-family:monospace;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1}
.mt-bpm-label{color:var(--text2);font-size:.85rem;letter-spacing:2px;margin-top:4px}
.mt-controls{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
@media(max-width:600px){.mt-controls{grid-template-columns:1fr}}
.mt-bpm-input{display:flex;align-items:center;gap:12px;background:var(--glass2);border:1px solid var(--border);border-radius:10px;padding:12px}
.mt-bpm-input input[type=range]{flex:1;height:6px;-webkit-appearance:none;background:linear-gradient(to right,var(--accent),var(--accent2));border-radius:3px;outline:none}
.mt-bpm-input input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:#fff;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.4)}
.mt-bpm-input input[type=number]{width:80px;padding:8px;background:rgba(0,0,0,.3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:1.1rem;font-weight:700;text-align:center;font-family:monospace}
.mt-presets{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-bottom:14px}
.mt-preset{background:var(--glass2);border:1px solid var(--border);border-radius:8px;padding:6px 12px;cursor:pointer;font-size:.85rem;color:var(--text);transition:all .15s}
.mt-preset:hover{border-color:var(--accent);background:rgba(108,92,231,.15)}
.mt-preset.active{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border-color:transparent}
.mt-actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:14px}
.mt-tap{background:var(--glass2);border:1px solid var(--border);border-radius:50%;width:90px;height:90px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-weight:800;color:var(--text);transition:all .1s;font-size:.85rem;user-select:none}
.mt-tap:hover{border-color:var(--accent)}
.mt-tap:active{transform:scale(.92);background:rgba(108,92,231,.3)}
.mt-beats{display:flex;gap:8px;justify-content:center;margin-top:14px}
.mt-beat-dot{width:14px;height:14px;border-radius:50%;background:rgba(255,255,255,.15);transition:all .1s}
.mt-beat-dot.on{background:var(--accent);transform:scale(1.4);box-shadow:0 0 12px var(--accent)}
.mt-beat-dot.accent.on{background:#ff6b6b;box-shadow:0 0 12px #ff6b6b}
.mt-row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;background:var(--glass2);border:1px solid var(--border);border-radius:10px;padding:10px 14px}
.mt-row label{font-size:.85rem;color:var(--text2);font-weight:600}
.mt-row select,.mt-row input[type=checkbox]+span{padding:6px 10px;background:rgba(0,0,0,.3);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:.85rem}
.mt-row select:focus{outline:none;border-color:var(--accent)}
</style>

<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "How accurate is this online metronome?", "acceptedAnswer": {"@type": "Answer", "text": "The metronome uses the Web Audio API's high-precision scheduler, which is accurate to within a few milliseconds. This is more accurate than mechanical metronomes and similar to dedicated digital metronome hardware."}}, {"@type": "Question", "name": "Can I use this metronome offline?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. Once the page is loaded, the metronome runs entirely in your browser using your device's audio system. You can disconnect from the internet and it will continue working."}}, {"@type": "Question", "name": "What time signatures are supported?", "acceptedAnswer": {"@type": "Answer", "text": "You can choose from 2/4, 3/4, 4/4, 5/4, 6/8 and 7/8. The first beat of each measure is accented with a different sound so you can keep track of where you are in the music."}}, {"@type": "Question", "name": "What is tap tempo?", "acceptedAnswer": {"@type": "Answer", "text": "Tap the Tap Tempo button to the rhythm of any song. After 2-3 taps, the metronome will automatically set its BPM to match your tapping speed. Useful for figuring out the tempo of a song you're learning."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="mt-stage">
      <div class="mt-pulse" id="pulse">♪</div>
      <div class="mt-bpm-display" id="bpmDisplay">120</div>
      <div class="mt-bpm-label" id="bpmLabel">BPM</div>
      <div class="mt-beats" id="beats"></div>
    </div>

    <div class="mt-controls">
      <div class="mt-bpm-input">
        <input type="range" id="bpmRange" min="30" max="300" value="120">
        <input type="number" id="bpmNum" min="30" max="300" value="120">
      </div>
      <div class="mt-bpm-input" style="justify-content:center;flex-direction:column;align-items:stretch;gap:8px">
        <div class="mt-tap" id="tapBtn">TAP<br><small style="opacity:.7">tempo</small></div>
        <div style="font-size:.75rem;color:var(--text2);text-align:center" id="tapHint">tap to detect BPM</div>
      </div>
    </div>

    <div class="mt-presets" id="presets"></div>

    <div class="mt-row" style="margin-bottom:10px">
      <label id="lbl-ts"></label>
      <select id="tsSelect">
        <option value="2">2/4</option>
        <option value="3">3/4</option>
        <option value="4" selected>4/4</option>
        <option value="5">5/4</option>
        <option value="6">6/8</option>
        <option value="7">7/8</option>
      </select>
      <label id="lbl-sound"></label>
      <select id="soundSelect">
        <option value="click" data-i18n="sndClick">Click</option>
        <option value="beep" data-i18n="sndBeep">Beep</option>
        <option value="wood" data-i18n="sndWood">Wood Block</option>
        <option value="cowbell" data-i18n="sndCowbell">Cowbell</option>
      </select>
    </div>

    <div class="mt-actions">
      <button class="gz-btn" id="playBtn">▶ Play</button>
      <button class="gz-btn gz-btn-secondary" id="stopBtn" disabled>⏹ Stop</button>
    </div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Online Metronome',
    toolDesc: 'Free metronome with adjustable BPM, time signatures, sound presets and tap tempo — practice music with a precise click track in your browser.',
    lblts: 'Time signature',
    lblsound: 'Sound',
    sndClick: 'Click', sndBeep: 'Beep', sndWood: 'Wood Block', sndCowbell: 'Cowbell',
    tapHint: 'tap to detect BPM',
    play: '▶ Play', stop: '⏹ Stop',
    step1: 'Set your BPM with the slider or number input, or use a preset',
    step2: 'Pick a time signature (2/4 to 7/8) and click sound',
    step3: 'Click Play to start the click track — the pulse shows beat 1',
    step4: 'Use Tap Tempo to detect BPM from any song by tapping along',
  },
  zh: {
    toolTitle: '在线节拍器',
    toolDesc: '免费在线节拍器，支持 BPM 调节、拍号、音色预设和点击测速 — 在浏览器中精准练习音乐节奏。',
    lblts: '拍号',
    lblsound: '音色',
    sndClick: '滴答', sndBeep: '蜂鸣', sndWood: '木鱼', sndCowbell: '牛铃',
    tapHint: '点击自动检测 BPM',
    play: '▶ 开始', stop: '⏹ 停止',
    step1: '使用滑块或数字输入设置 BPM，或选择预设',
    step2: '选择拍号（2/4 至 7/8）和音色',
    step3: '点击「开始」启动节拍 — 脉冲指示第 1 拍',
    step4: '使用「点击测速」跟随歌曲节拍敲击，自动识别 BPM',
  }
});

const { $, t } = GZ;
let bpm = 120;
let timeSig = 4;
let soundType = 'click';
let isPlaying = false;
let audioCtx = null;
let nextNoteTime = 0;
let timerId = null;
let currentBeat = 0;
let tapTimes = [];

const presets = [
  { name: 'Largo', bpm: 50 }, { name: 'Adagio', bpm: 70 },
  { name: 'Andante', bpm: 90 }, { name: 'Moderato', bpm: 110 },
  { name: 'Allegro', bpm: 130 }, { name: 'Vivace', bpm: 160 },
  { name: 'Presto', bpm: 180 }, { name: 'Prestissimo', bpm: 210 },
];

function initAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function playClick(time, isAccent) {
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  const freq = isAccent ? 1500 : (soundType === 'beep' ? 800 : (soundType === 'cowbell' ? 1000 : (soundType === 'wood' ? 600 : 1200)));
  const wave = soundType === 'beep' ? 'sine' : (soundType === 'cowbell' ? 'triangle' : 'square');
  osc.type = wave;
  osc.frequency.setValueAtTime(freq, time);
  gain.gain.setValueAtTime(0, time);
  gain.gain.linearRampToValueAtTime(isAccent ? 0.6 : 0.35, time + 0.001);
  gain.gain.exponentialRampToValueAtTime(0.001, time + (soundType === 'beep' ? 0.1 : 0.05));
  osc.connect(gain).connect(audioCtx.destination);
  osc.start(time);
  osc.stop(time + 0.15);
}

function scheduler() {
  const interval = 60 / bpm;
  while (nextNoteTime < audioCtx.currentTime + 0.1) {
    const isAccent = currentBeat % timeSig === 0;
    playClick(nextNoteTime, isAccent);
    const beatIdx = currentBeat % timeSig;
    const beatTime = nextNoteTime;
    setTimeout(() => {
      const pulse = $('#pulse');
      pulse.classList.add('beat');
      if (isAccent) pulse.classList.add('accent');
      setTimeout(() => {
        pulse.classList.remove('beat', 'accent');
      }, 80);
      updateBeatDots(beatIdx, isAccent);
    }, (beatTime - audioCtx.currentTime) * 1000);
    currentBeat++;
    nextNoteTime += interval;
  }
}

function start() {
  initAudio();
  isPlaying = true;
  currentBeat = 0;
  nextNoteTime = audioCtx.currentTime + 0.05;
  $('#playBtn').disabled = true;
  $('#stopBtn').disabled = false;
  scheduler();
  timerId = setInterval(scheduler, 25);
}

function stop() {
  isPlaying = false;
  if (timerId) { clearInterval(timerId); timerId = null; }
  $('#playBtn').disabled = false;
  $('#stopBtn').disabled = true;
  currentBeat = 0;
  renderBeats();
}

function updateBPM(val) {
  bpm = Math.max(30, Math.min(300, parseInt(val) || 120));
  $('#bpmDisplay').textContent = bpm;
  $('#bpmRange').value = bpm;
  $('#bpmNum').value = bpm;
  updatePresetActive();
}

function renderBeats() {
  const c = $('#beats');
  c.innerHTML = '';
  for (let i = 0; i < timeSig; i++) {
    const d = document.createElement('div');
    d.className = 'mt-beat-dot' + (i === 0 ? ' accent' : '');
    c.appendChild(d);
  }
}

function updateBeatDots(idx, isAccent) {
  const dots = $('#beats').children;
  for (let i = 0; i < dots.length; i++) {
    dots[i].classList.toggle('on', i === idx);
  }
}

function renderPresets() {
  const c = $('#presets');
  c.innerHTML = presets.map(p => `<div class="mt-preset" data-bpm="${p.bpm}">${p.name} (${p.bpm})</div>`).join('');
  c.querySelectorAll('.mt-preset').forEach(el => {
    el.addEventListener('click', () => {
      updateBPM(el.dataset.bpm);
    });
  });
  updatePresetActive();
}

function updatePresetActive() {
  document.querySelectorAll('.mt-preset').forEach(el => {
    el.classList.toggle('active', parseInt(el.dataset.bpm) === bpm);
  });
}

function handleTap() {
  const now = performance.now();
  tapTimes.push(now);
  tapTimes = tapTimes.filter(t => now - t < 3000);
  if (tapTimes.length >= 2) {
    const intervals = [];
    for (let i = 1; i < tapTimes.length; i++) intervals.push(tapTimes[i] - tapTimes[i-1]);
    const avg = intervals.reduce((a,b) => a+b, 0) / intervals.length;
    const detected = Math.round(60000 / avg);
    updateBPM(detected);
    $('#pulse').classList.add('beat');
    setTimeout(() => $('#pulse').classList.remove('beat'), 80);
  }
}

// Bind UI
$('#bpmRange').addEventListener('input', e => updateBPM(e.target.value));
$('#bpmNum').addEventListener('input', e => updateBPM(e.target.value));
$('#tsSelect').addEventListener('change', e => { timeSig = parseInt(e.target.value); renderBeats(); });
$('#soundSelect').addEventListener('change', e => soundType = e.target.value);
$('#playBtn').addEventListener('click', start);
$('#stopBtn').addEventListener('click', stop);
$('#tapBtn').addEventListener('click', handleTap);
document.addEventListener('keydown', e => {
  if (e.code === 'Space' && document.activeElement.tagName !== 'INPUT' && document.activeElement.tagName !== 'SELECT') {
    e.preventDefault();
    isPlaying ? stop() : start();
  }
  if (e.key === 'ArrowUp' || e.key === 'ArrowDown') {
    e.preventDefault();
    updateBPM(bpm + (e.key === 'ArrowUp' ? 1 : -1));
  }
});

$('#lbl-ts').textContent = t('lblts');
$('#lbl-sound').textContent = t('lblsound');
$('#playBtn').textContent = t('play');
$('#stopBtn').textContent = t('stop');
$('#tapHint').textContent = t('tapHint');
document.querySelectorAll('#soundSelect option').forEach(opt => {
  if (opt.dataset.i18n) opt.textContent = t(opt.dataset.i18n);
});

renderBeats();
renderPresets();

GZ.renderToolPage({
  category: 'fun',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🎲', href:'/fun/dice-roller.html', name:'Dice Roller'},
    {icon:'🎯', href:'/fun/random-user-agent.html', name:'Random UA'},
    {icon:'⌨️', href:'/fun/typing-test.html', name:'Typing Test'},
    {icon:'⚡', href:'/fun/reaction-time.html', name:'Reaction Time'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
