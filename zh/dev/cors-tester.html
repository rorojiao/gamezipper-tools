<script>
GZI18n.register({
  en: {
    toolTitle: 'CORS Tester & Checker',
    toolDesc: 'Test CORS (Cross-Origin Resource Sharing) headers on any URL. Verify Access-Control-Allow-Origin, methods, headers and credentials support.',
    test: 'Test CORS',
    testing: 'Testing...',
    corsEnabled: 'CORS Enabled ✓',
    corsDisabled: 'CORS Not Enabled ✗',
    corsPartial: 'CORS Partially Configured ⚠',
    responseHeaders: 'Response Headers',
    corsHeaders: 'CORS Headers Detected',
    corsAnalysis: 'CORS Analysis',
    statusCode: 'Status Code',
    error: 'Error',
    step1: 'Enter the URL you want to test for CORS support',
    step2: 'Select the HTTP method and configure options',
    step3: 'Click "Test CORS" to send a request',
    step4: 'Review the CORS headers and analysis results',
  },
  zh: {
    toolTitle: 'CORS 跨域测试工具',
    toolDesc: '测试任意 URL 的 CORS（跨域资源共享）头信息。验证 Access-Control-Allow-Origin、方法、头部和凭证支持。',
    test: '测试 CORS',
    testing: '测试中...',
    corsEnabled: 'CORS 已启用 ✓',
    corsDisabled: 'CORS 未启用 ✗',
    corsPartial: 'CORS 部分配置 ⚠',
    responseHeaders: '响应头',
    corsHeaders: '检测到的 CORS 头',
    corsAnalysis: 'CORS 分析',
    statusCode: '状态码',
    error: '错误',
    step1: '输入要测试 CORS 支持的 URL',
    step2: '选择 HTTP 方法并配置选项',
    step3: '点击「测试 CORS」发送请求',
    step4: '查看 CORS 头信息和分析结果',
  }
});

const { $, t } = GZ;

async function testCORS() {
  const url = $('#url').value.trim();
  if (!url) return;
  const method = $('#method').value;
  const cred = $('#cred').checked;
  const followRedirect = $('#redirect').checked;
  const origin = $('#origin').value.trim() || location.origin;

  $('#spinner').style.display = 'block';
  $('#results').innerHTML = '';

  try {
    const start = performance.now();
    const resp = await fetch(url, {
      method,
      mode: 'cors',
      credentials: cred ? 'include' : 'omit',
      redirect: followRedirect ? 'follow' : 'manual',
      headers: { 'Origin': origin }
    }).catch(e => e);

    const elapsed = ((performance.now() - start) / 1000).toFixed(2);

    if (resp instanceof Error) throw resp;

    const headers = {};
    resp.headers.forEach((v, k) => { headers[k] = v; });

    const acao = headers['access-control-allow-origin'] || '';
    const acam = headers['access-control-allow-methods'] || '';
    const acah = headers['access-control-allow-headers'] || '';
    const acac = headers['access-control-allow-credentials'] || '';
    const acae = headers['access-control-expose-headers'] || '';
    const acma = headers['access-control-max-age'] || '';

    const corsHeaders = [
      { name: 'Access-Control-Allow-Origin', value: acao },
      { name: 'Access-Control-Allow-Methods', value: acam },
      { name: 'Access-Control-Allow-Headers', value: acah },
      { name: 'Access-Control-Allow-Credentials', value: acac },
      { name: 'Access-Control-Expose-Headers', value: acae },
      { name: 'Access-Control-Max-Age', value: acma },
    ].filter(h => h.value);

    let status, statusClass;
    if (acao) {
      if (acao === '*' || acao === origin) { status = t('corsEnabled'); statusClass = 'cors-pass'; }
      else { status = t('corsPartial'); statusClass = 'cors-warn'; }
    } else {
      status = t('corsDisabled'); statusClass = 'cors-fail';
    }

    let html = `<div class="result-box">
      <h3 class="${statusClass}" style="font-size:1.2em">${status}</h3>
      <p style="font-size:.85em;opacity:.7">${t('statusCode')}: ${resp.status} ${resp.statusText} — ${elapsed}s</p>`;

    if (corsHeaders.length) {
      html += `<h3>${t('corsHeaders')}</h3><table class="header-table"><tr><th>Header</th><th>Value</th></tr>`;
      corsHeaders.forEach(h => {
        html += `<tr><td style="font-weight:600;color:var(--gz-accent)">${h.name}</td><td>${h.value}</td></tr>`;
      });
      html += '</table>';
    }

    html += `<details><summary>${t('responseHeaders')} (${Object.keys(headers).length})</summary>
      <table class="header-table"><tr><th>Header</th><th>Value</th></tr>`;
    Object.entries(headers).forEach(([k, v]) => {
      const isCors = k.startsWith('access-control');
      html += `<tr><td style="${isCors ? 'font-weight:600;color:var(--gz-accent)' : ''}">${k}</td><td>${v}</td></tr>`;
    });
    html += '</table></details>';

    // Analysis
    html += `<h3>${t('corsAnalysis')}</h3><ul style="font-size:.88em;line-height:1.8">`;
    if (acao === '*') html += `<li class="cors-warn">⚠ Allows any origin (*) — not recommended for production APIs</li>`;
    else if (acao) html += `<li class="cors-pass">✓ Restricted to: ${acao}</li>`;
    else html += `<li class="cors-fail">✗ No Access-Control-Allow-Origin header — browsers will block cross-origin requests</li>`;
    if (acac === 'true') html += `<li class="cors-warn">⚠ Credentials allowed — ensure origin is not wildcard</li>`;
    if (acam) html += `<li>Allowed methods: ${acam}</li>`;
    if (acah) html += `<li>Allowed headers: ${acah}</li>`;
    html += '</ul></div>';

    $('#results').innerHTML = html;

  } catch (e) {
    let msg = e.message || String(e);
    let hint = '';
    if (msg.includes('Failed to fetch') || msg.includes('NetworkError')) {
      hint = '<br><span style="opacity:.7">This usually means the server does not send CORS headers, or blocks the request entirely.</span>';
    }
    $('#results').innerHTML = `<div class="result-box"><h3 class="cors-fail">${t('error')}</h3><p style="font-size:.88em">${msg}${hint}</p>
      <p style="font-size:.82em;opacity:.7;margin-top:8px">Tip: Try using the <a href="/dev/http-headers.html" style="color:var(--gz-accent)">HTTP Headers Checker</a> for a no-CORS alternative.</p></div>`;
  } finally {
    $('#spinner').style.display = 'none';
  }
}

$('#toolbar').innerHTML = `<button class="gz-btn" onclick="testCORS()">${t('test')}</button>`;

$('#url').addEventListener('keydown', e => { if (e.key === 'Enter') testCORS(); });

GZ.renderToolPage({
  category: 'dev',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🔍', href:'/dev/http-headers.html', name:'HTTP Headers'},
    {icon:'🌐', href:'/dev/api-tester.html', name:'API Tester'},
    {icon:'🔒', href:'/dev/security-headers.html', name:'Security Headers'},
    {icon:'🛡️', href:'/dev/csp-generator.html', name:'CSP Generator'},
  ]
});
</script>
