<script>
GZI18n.register({
  en:{toolTitle:'Image to JPG Converter',toolDesc:'Convert PNG, WebP, BMP, GIF, AVIF and more to JPG online. Batch convert with adjustable quality — free, no upload.',
    s1:'Select or drag multiple images (PNG, WebP, BMP, GIF, AVIF)',s2:'Adjust the JPG quality slider if needed',
    s3:'Click Convert All to JPG',s4:'Download each converted JPG individually',
    dropHint:'Drop images here or click to upload',qLabel:'Quality:',
    files:'files',original:'Original:',converted:'Converted:',
    convertAll:'🔄 Convert All to JPG',reset:'↩️ Reset',download:'⬇ Download JPG',
    rCompressor:'Image Compressor',rResizer:'Image Resizer',rPngCompressor:'PNG Compressor',rWebpConverter:'Image to WebP'},
  zh:{toolTitle:'图片转 JPG 转换器',toolDesc:'将 PNG、WebP、BMP、GIF、AVIF 等图片在线转为 JPG。支持批量转换、可调质量 — 免费，无需上传。',
    s1:'选择或拖放多张图片（PNG、WebP、BMP、GIF、AVIF）',s2:'按需调整 JPG 质量滑块',
    s3:'点击「全部转换为 JPG」',s4:'单独下载每张转换后的 JPG',
    dropHint:'拖放图片到此处或点击上传',qLabel:'质量：',
    files:'个文件',original:'原始：',converted:'转换后：',
    convertAll:'🔄 全部转换为 JPG',reset:'↩️ 重置',download:'⬇ 下载 JPG',
    rCompressor:'图片压缩',rResizer:'图片缩放',rPngCompressor:'PNG 压缩器',rWebpConverter:'图片转 WebP'}
});
const {t}=GZI18n;
let files=[];
document.getElementById('dropText').textContent=t('dropHint');
document.getElementById('qLabel').textContent=t('qLabel');
const dz=document.getElementById('dropzone'),fi=document.getElementById('fileIn');
dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('drag-over')});
dz.addEventListener('dragleave',()=>dz.classList.remove('drag-over'));
dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('drag-over');handleFiles(e.dataTransfer.files)});
fi.addEventListener('change',e=>{handleFiles(e.target.files)});
const qSlider=document.getElementById('qSlider'),qVal=document.getElementById('qVal');
qSlider.addEventListener('input',()=>{qVal.textContent=qSlider.value+'%'});
function handleFiles(fl){files=Array.from(fl).filter(f=>f.type.startsWith('image/'));if(!files.length)return;document.getElementById('controls').style.display='block';dz.style.display='none';renderList();updateSummary()}
function fmt(b){return b>1048576?(b/1048576).toFixed(1)+' MB':(b/1024).toFixed(1)+' KB'}
function renderList(){const r=document.getElementById('results');r.innerHTML='';files.forEach((f,i)=>{const card=document.createElement('div');card.className='result-card';card.id='card-'+i;const url=URL.createObjectURL(f);card.innerHTML=`<img src="${url}"><div class="meta"><div class="name">${f.name}</div><div class="size">${t('original')} ${fmt(f.size)} · ${(f.type.split('/')[1]||'?').toUpperCase()}</div></div><div id="result-info-${i}"></div>`;r.appendChild(card)})}
function updateSummary(){document.getElementById('summary').innerHTML=`<span class="num">${files.length}</span> ${t('files')}`}
function convertAll(){const q=+qSlider.value/100;let done=0;files.forEach((f,i)=>{const img=new Image();img.onload=()=>{const c=document.createElement('canvas');c.width=img.width;c.height=img.height;const ctx=c.getContext('2d');if(f.type==='image/png'||f.type==='image/gif'){ctx.fillStyle='#fff';ctx.fillRect(0,0,c.width,c.height)}ctx.drawImage(img,0,0);c.toBlob(b=>{const el=document.getElementById('result-info-'+i);if(el){const save=f.size-b.size;const pct2=((save/f.size)*100);const saveTxt=save>0?`↓${pct2.toFixed(0)}%`:'';el.innerHTML=`<div class="size">${t('converted')} <span class="num">${fmt(b.size)}</span> <span class="save" style="color:${save>0?'var(--gz-success)':'var(--text2)'}">${saveTxt}</span></div><button class="gz-btn" style="margin-top:.3rem;font-size:.8rem;padding:.3rem .8rem" onclick="downloadBlob(${i})">${t('download')}</button>`;convertedBlobs[i]=b}done++;if(done===files.length){}},'image/jpeg',q)};img.src=URL.createObjectURL(f)})}
let convertedBlobs={};
function downloadBlob(i){const b=convertedBlobs[i];if(!b)return;const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=files[i].name.replace(/\.[^.]+$/,'')+'.jpg';a.click()}
function resetTool(){files=[];convertedBlobs={};document.getElementById('controls').style.display='none';dz.style.display='block';fi.value=''}
GZ.renderToolPage({category:'image',titleKey:'toolTitle',descKey:'toolDesc',
  howToSteps:['s1','s2','s3','s4'],
  related:[
    {href:'/image/compressor.html',icon:'📦',nameKey:'rCompressor'},
    {href:'/image/resizer.html',icon:'📐',nameKey:'rResizer'},
    {href:'/image/png-compressor.html',icon:'🖼️',nameKey:'rPngCompressor'},
    {href:'/image/image-to-webp.html',icon:'🌐',nameKey:'rWebpConverter'}
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
