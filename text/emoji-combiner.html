    toolDesc: 'х░Жф╕дф╕к Emoji ц╖╖цРнф╕║чЛмф╕АцЧаф║МчЪДхИЫцДПч╗ДхРИуАВцМСщАЙщЕНхп╣я╝МхИЫх╗║щАВчФиф║Очд╛ф║дхкТф╜УхТМц╢ИцБпчЪДш╢гхС│ц╖╖цРнуАВ',
    emoji1Label: 'Emoji 1',
    emoji2Label: 'Emoji 2',
    step1: 'ф╗Оч╜Сца╝цИЦхИЖч▒╗ф╕нщАЙцЛйчммф╕Аф╕к Emoji',
    step2: 'щАЙцЛйчммф║Мф╕к Emoji',
    step3: 'щАЙцЛйч╗ДхРИцЦ╣х╝Пя╝ИZWJуАБхПахКауАБх╣╢цОТуАБхаЖхПая╝Й',
    step4: 'хдНхИ╢ч╗УцЮЬцИЦф╕Лш╜╜ф╕║хЫ╛чЙЗ',

const { $, copyText, t } = GZ;

const categories = {
  'Smileys': ['ЁЯША','ЁЯШГ','ЁЯШД','ЁЯШБ','ЁЯШЖ','ЁЯШЕ','ЁЯдг','ЁЯШВ','ЁЯЩВ','ЁЯШК','ЁЯШЗ','ЁЯе░','ЁЯШН','ЁЯдй','ЁЯШШ','ЁЯШЧ','ЁЯШЪ','ЁЯШЛ','ЁЯШЫ','ЁЯШЬ','ЁЯдк','ЁЯШЭ','ЁЯдС','ЁЯдЧ','ЁЯдн','ЁЯдл','ЁЯдФ','ЁЯдР','ЁЯди','ЁЯШР','ЁЯШС','ЁЯШ╢','ЁЯШП','ЁЯШТ','ЁЯЩД','ЁЯШм','ЁЯШотАНЁЯТи','ЁЯде','ЁЯШМ','ЁЯШФ','ЁЯШк','ЁЯдд','ЁЯШ┤','ЁЯШ╖'],
  'Gestures': ['ЁЯСЛ','ЁЯдЪ','ЁЯЦРя╕П','тЬЛ','ЁЯЦЦ','ЁЯСМ','ЁЯдМ','ЁЯдП','тЬМя╕П','ЁЯдЮ','ЁЯл░','ЁЯдЯ','ЁЯдШ','ЁЯдЩ','ЁЯСИ','ЁЯСЙ','ЁЯСЖ','ЁЯЦХ','ЁЯСЗ','тШЭя╕П','ЁЯСН','ЁЯСО','тЬК','ЁЯСК','ЁЯдЫ','ЁЯдЬ','ЁЯСП','ЁЯЩМ','ЁЯл╢','ЁЯСР','ЁЯд▓','ЁЯдЭ','ЁЯЩП'],
  'Hearts': ['тЭдя╕П','ЁЯзб','ЁЯТЫ','ЁЯТЪ','ЁЯТЩ','ЁЯТЬ','ЁЯЦд','ЁЯдН','ЁЯдО','ЁЯТФ','тЭдя╕ПтАНЁЯФе','тЭдя╕ПтАНЁЯй╣','ЁЯТХ','ЁЯТЮ','ЁЯТУ','ЁЯТЧ','ЁЯТЦ','ЁЯТШ','ЁЯТЭ','ЁЯТЯ'],
  'Animals': ['ЁЯР╢','ЁЯР▒','ЁЯРн','ЁЯР╣','ЁЯР░','ЁЯжК','ЁЯР╗','ЁЯР╝','ЁЯРи','ЁЯРп','ЁЯжБ','ЁЯРо','ЁЯР╖','ЁЯР╕','ЁЯР╡','ЁЯРФ','ЁЯРз','ЁЯРж','ЁЯжЕ','ЁЯжЖ','ЁЯжЙ','ЁЯР║','ЁЯРЧ','ЁЯР┤','ЁЯжД','ЁЯРЭ','ЁЯРЫ','ЁЯжЛ','ЁЯРМ','ЁЯРЮ'],
  'Food': ['ЁЯНО','ЁЯНР','ЁЯНК','ЁЯНЛ','ЁЯНМ','ЁЯНЙ','ЁЯНЗ','ЁЯНУ','ЁЯлР','ЁЯНИ','ЁЯНТ','ЁЯНС','ЁЯен','ЁЯНН','ЁЯее','ЁЯеЭ','ЁЯНЕ','ЁЯеС','ЁЯНХ','ЁЯНФ','ЁЯНЯ','ЁЯМн','ЁЯН┐','ЁЯзБ','ЁЯН░','ЁЯОВ','ЁЯНй','ЁЯНк','ЁЯНл','тШХ'],
  'Objects': ['тнР','ЁЯМЯ','тЬи','ЁЯТл','ЁЯФе','ЁЯТе','ЁЯО╡','ЁЯО╢','ЁЯМИ','тШАя╕П','ЁЯМЩ','ЁЯТО','ЁЯФФ','ЁЯОБ','ЁЯПЖ','ЁЯеЗ','ЁЯОп','ЁЯТб','ЁЯУМ','ЁЯФо','ЁЯз▓','ЁЯОп','ЁЯО▓'],
  'Symbols': ['ЁЯТп','ЁЯТв','ЁЯТд','ЁЯТе','ЁЯТж','ЁЯТи','ЁЯТл','ЁЯФо','ЁЯПБ','ЁЯЪй','ЁЯОМ','тЫйя╕П','тШпя╕П','тЬбя╕П','тЩая╕П','тЩгя╕П','тЩея╕П','тЩжя╕П','ЁЯТн','ЁЯЧпя╕П'],
};

let emoji1 = 'ЁЯША', emoji2 = 'тЭдя╕П';
let activeMethod = 'zwj';
let activeTab = 'Smileys';

const methods = [
  { id:'zwj', name:'ZWJ Join' },
  { id:'overlay', name:'Overlay' },
  { id:'side', name:'Side-by-Side' },
  { id:'stack', name:'Stacked' },
];

function renderTabs(pickerId) {
  const tabsEl = $(pickerId === 'picker1' ? '#tabs1' : '#tabs2');
  tabsEl.innerHTML = Object.keys(categories).map(cat =>
    `<button class="tab-btn ${cat === activeTab ? 'active' : ''}" onclick="activeTab='${cat}';renderPicker('${pickerId}')">${cat}</button>`
  ).join('');
}

function renderPicker(pickerId) {
  const el = $(pickerId);
  el.innerHTML = categories[activeTab].map(e =>
    `<button class="emoji-btn" onclick="setEmoji('${pickerId}','${e}')">${e}</button>`
  ).join('');
  renderTabs(pickerId);
}

function setEmoji(pickerId, emoji) {
  if (pickerId === 'picker1') {
    emoji1 = emoji;
    $('#emoji1input').value = emoji;
  } else {
    emoji2 = emoji;
    $('#emoji2input').value = emoji;
  }
  renderCombo();
}

function renderMethods() {
  $('#methods').innerHTML = methods.map(m =>
    `<button class="method-btn ${m.id === activeMethod ? 'active' : ''}" onclick="activeMethod='${m.id}';renderMethods();renderCombo()">${m.name}</button>`
  ).join('');
}

function renderCombo() {
  $('#combo-e1').textContent = emoji1;
  $('#combo-e2').textContent = emoji2;
  const resultEl = $('#combo-result');
  const resultArea = $('#result-area');
  const output = $('#output');
  resultArea.innerHTML = '';

  if (activeMethod === 'zwj') {
    const combined = emoji1 + '\u200D' + emoji2;
    resultEl.innerHTML = '';
    resultEl.textContent = combined;
    output.textContent = combined;
  } else if (activeMethod === 'side') {
    const combined = emoji1 + emoji2;
    resultEl.textContent = combined;
    output.textContent = combined;
  } else if (activeMethod === 'stack') {
    const combined = emoji1 + '\n' + emoji2;
    resultEl.textContent = emoji1 + emoji2;
    output.textContent = combined;
  } else if (activeMethod === 'overlay') {
    resultEl.textContent = '';
    const canvas = document.createElement('canvas');
    canvas.width = 128;
    canvas.height = 128;
    canvas.style.borderRadius = '12px';
    const ctx = canvas.getContext('2d');
    ctx.font = '80px serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.globalAlpha = 0.7;
    ctx.fillText(emoji1, 64, 50);
    ctx.globalAlpha = 1;
    ctx.fillText(emoji2, 64, 78);
    resultEl.appendChild(canvas);
    output.textContent = emoji1 + ' + ' + emoji2 + ' (Overlay image)';
    // Download button
    const dl = document.createElement('button');
    dl.className = 'gz-btn';
    dl.textContent = 'Download PNG';
    dl.style.marginTop = '8px';
    dl.onclick = () => {
      const a = document.createElement('a');
      a.href = canvas.toDataURL('image/png');
      a.download = 'emoji-combo.png';
      a.click();
    };
    resultArea.appendChild(dl);
  }
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')||'Copy'}</button>
  <button class="gz-btn gz-btn-secondary" onclick="emoji1='ЁЯША';emoji2='тЭдя╕П';$('#emoji1input').value='ЁЯША';$('#emoji2input').value='тЭдя╕П';renderCombo()">${t('reset')||'Reset'}</button>`;

$('#emoji1input').value = emoji1;
$('#emoji2input').value = emoji2;

renderPicker('picker1');
renderPicker('picker2');
renderMethods();
renderCombo();

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],

    {icon:'ЁЯФН', href:'/text/emoji-search.html', name:'Emoji Search'},
    {icon:'ЁЯШО', href:'/text/emoji-art.html', name:'Emoji Art'},
    {icon:'тЬи', href:'/text/fancy-text.html', name:'Fancy Text'},

});
