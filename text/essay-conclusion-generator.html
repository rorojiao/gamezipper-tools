<div class="gz-container">

      <label><span id="lbl-thesis"></span><input type="text" id="thesis" placeholder="Sleep improves cognitive performance and long-term health"></label>
    </div>
    <div class="cn-fields">
      <label><span id="lbl-points"></span><textarea id="points" placeholder="1. Sleep consolidates memory\n2. Poor sleep increases disease risk\n3. Sleep boosts creativity"></textarea></label>

          <option value="neutral">Neutral / Academic</option>

<script>
GZI18n.register({
  en: {
    toolTitle: 'Essay Conclusion Generator',
    toolDesc: 'Generate strong closing paragraphs for essays, research papers and blog posts. Pick from 6 styles — summary, call to action, prediction, question, quote or reflection.',
    lblTopic: 'Topic', lblThesis: 'Thesis / main argument', lblPoints: 'Key points (one per line)', lblTone: 'Tone',
    style: 'Style',
    styles: {
      summary: ['Summary','Restate thesis in light of evidence'],
      cta: ['Call to Action','Urge the reader to do something'],
      predict: ['Prediction','Project future implications'],
      question: ['Question','End with a thought-provoking question'],
      quote: ['Quote','Close with a relevant quotation'],
      reflect: ['Reflection','Personal or broader reflection'],
    },
    step1: 'Enter your essay topic and main thesis',
    step2: 'List 2-4 key points you made in the body',
    step3: 'Pick a conclusion style that fits your essay',
    step4: 'Click Generate and refine if needed',
    noInput: 'Add a topic or thesis first to generate a conclusion.',
  },
  zh: {
    toolTitle: '论文/文章 结尾生成器',
    toolDesc: '为论文、研究报告和博客文章生成有力的结尾段落。从 6 种风格中选择 — 总结、行动号召、预测、问题、引用或反思。',
    lblTopic: '主题', lblThesis: '中心论点', lblPoints: '关键要点（每行一个）', lblTone: '语气',
    style: '风格',
    styles: {
      summary: ['总结','在证据基础上重申论点'],
      cta: ['行动号召','呼吁读者采取行动'],
      predict: ['预测','展望未来影响'],
      question: ['问题','以发人深省的问题结尾'],
      quote: ['引用','以相关引言结尾'],
      reflect: ['反思','个人或更广泛的反思'],
    },
    step1: '输入你的论文主题和中心论点',
    step2: '列出 2-4 个正文要点',
    step3: '选择适合你论文的结尾风格',
    step4: '点击「生成」并根据需要修改',
    noInput: '请先输入主题或论点再生成结尾。',
  }
});

const { $, copyText, t } = GZ;
let style = 'summary';
let version = 0;

// Quote pool by category keyword
const QUOTES = [
  '"The future belongs to those who believe in the beauty of their dreams." — Eleanor Roosevelt',
  '"In the middle of difficulty lies opportunity." — Albert Einstein',
  '"What we think, we become." — Buddha',
  '"Knowledge is power." — Francis Bacon',
  '"The only true wisdom is in knowing you know nothing." — Socrates',
  '"Life is what happens when you\'re busy making other plans." — John Lennon',
  '"An investment in knowledge pays the best interest." — Benjamin Franklin',
  '"Be the change you wish to see in the world." — Mahatma Gandhi',
];

const pick = (arr, n) => arr[(version + n) % arr.length];

function generate(){
  const topic = $('#topic').value.trim();
  const thesis = $('#thesis').value.trim();
  const pointsRaw = $('#points').value.trim();
  const tone = $('#tone').value;
  if (!topic && !thesis){ $('#out').textContent = t('noInput'); $('#meta').innerHTML=''; return; }
  const points = pointsRaw ? pointsRaw.split(/\n+/).map(s => s.replace(/^\d+[\.\)]\s*/, '').trim()).filter(Boolean) : [];
  const cap = (s) => s ? s.charAt(0).toUpperCase() + s.slice(1) : '';
  const lc = (s) => s ? s.toLowerCase() : '';

  let p = [];
  if (style === 'summary'){
    p.push(`In conclusion, ${thesis ? lc(thesis).replace(/^./, c => c.toUpperCase()) : 'the points made above demonstrate'} the significance of ${topic || 'this topic'} in today's world.`);
    if (points.length){
      p.push(`As explored throughout this essay, ${points[0].toLowerCase().replace(/\.$/,'')}, ${points[1] ? points[1].toLowerCase().replace(/\.$/,'') + ', ' : ''}and ${(points[points.length-1] || points[0]).toLowerCase().replace(/\.$/,'')} all point to a clear takeaway.`);
    }
    p.push(`Ultimately, understanding ${topic || 'this subject'} equips us to make better decisions and engage more meaningfully with the world around us.`);
  } else if (style === 'cta'){
    p.push(`The evidence is clear: ${thesis || 'change is necessary and within reach'}.`);
    p.push(`Now is the moment to act. Whether you start with one small step or commit to a complete shift, your choices today shape the outcomes of tomorrow.`);
    p.push(`Don't wait for someone else to lead — begin the conversation in your own community, share what you've learned, and ${topic ? 'help others discover the power of ' + topic : 'be the change'}.`);
  } else if (style === 'predict'){
    p.push(`Looking ahead, the trajectory is unmistakable. As ${topic || 'this field'} continues to evolve, those who engage thoughtfully today will be best positioned to thrive.`);
    p.push(`By 2030, we can expect ${topic ? lc(topic) : 'this space'} to become even more central to how we live, work, and connect. The decisions we make in the coming years will determine whether this future is one of widespread benefit or concentrated advantage.`);
    p.push(`The choice, ultimately, is ours.`);
  } else if (style === 'question'){
    p.push(`So where does that leave us?`);
    p.push(`If ${thesis ? lc(thesis) : 'the arguments above hold true'}, then the question is no longer whether to engage with ${topic || 'this issue'} — but how, and with whom.`);
    p.push(`What will you do with what you've learned? What kind of future do you want to help build?`);
  } else if (style === 'quote'){
    p.push(`As we close, the words of a wiser voice feel appropriate.`);
    p.push(QUOTES[(version) % QUOTES.length]);
    p.push(`${cap(topic || 'This subject')} may be complex, but it is not beyond our reach. With curiosity as our compass and ${thesis ? 'conviction in ' + lc(thesis).replace(/^./, c => c.toUpperCase()) : 'open minds'}, we move forward.`);
  } else if (style === 'reflect'){
    p.push(`Writing this piece has reinforced a simple truth: ${thesis || 'the questions we ask matter as much as the answers we find'}.`);
    p.push(`In researching ${topic || 'this subject'}, what struck me most was not the data or the headlines — it was the human stories underneath. Every statistic represents a person making a choice, and every choice ripples outward.`);
    p.push(`Whatever your starting point, I hope this essay has given you something to carry forward.`);
  }

  // Apply tone tweaks
  let result = p.join('\n\n');
  if (tone === 'persuasive'){
    result = result.replace(/\.$/m, '. The time to act is now.');
  } else if (tone === 'reflective'){
    result += '\n\nIn the end, the most valuable thing we can offer is honest reflection.';
  } else if (tone === 'inspiring'){
    result += '\n\nYour journey starts with a single step — and that step is yours to take today.';
  }
  $('#out').textContent = result;
  // meta
  const wc = result.split(/\s+/).filter(Boolean).length;
  const sc = result.split(/[.!?]+/).filter(s => s.trim()).length;
  $('#meta').innerHTML = `<span><b>${wc}</b> words</span><span><b>${sc}</b> sentences</span><span>style: <b>${style}</b></span>`;
  version++;
}

function renderStyles(){
  const html = Object.entries(t('styles')).map(([k, v]) => {
    return `<button class="${k===style?'active':''}" data-k="${k}">${v[0]}<small>${v[1]}</small></button>`;
  }).join('');
  $('#styles').innerHTML = html;
  $('#styles').querySelectorAll('button').forEach(b => {
    b.addEventListener('click', () => {
      style = b.getAttribute('data-k');
      version = 0;
      renderStyles();
      generate();
    });
  });
}

$('#btnGenerate').addEventListener('click', () => { version = 0; generate(); });
$('#btnCopy').addEventListener('click', () => copyText($('#out').textContent));
$('#btnSwap').addEventListener('click', generate);
$('#btnClear').addEventListener('click', () => { $('#topic').value=''; $('#thesis').value=''; $('#points').value=''; $('#out').textContent=''; $('#meta').innerHTML=''; });
$('#topic').addEventListener('input', () => { version = 0; generate(); });
$('#thesis').addEventListener('input', () => { version = 0; generate(); });
$('#points').addEventListener('input', () => { version = 0; generate(); });
$('#tone').addEventListener('change', generate);

renderStyles();
generate();

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🪝', href:'/text/essay-hook-generator.html', name:'Essay Hook Generator'},
    {icon:'📝', href:'/text/outline-generator.html', name:'Outline Generator'},
    {icon:'📰', href:'/text/blog-title-generator.html', name:'Blog Title Generator'},
    {icon:'✍️', href:'/text/markdown-editor.html', name:'Markdown Editor'},
  ]
});
</script>

</body>
