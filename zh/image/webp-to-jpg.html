<div class="gz-container">

<script>
GZI18n.register({
  en:{toolTitle:'WebP to JPG Converter',toolDesc:'Convert WebP images to JPG online. Batch convert with quality control and white background fill. Free, no upload, no signup.',
    s1:'Select or drag WebP images',s2:'Adjust the JPG quality slider',
    s3:'Click Convert All to JPG',s4:'Download each converted JPG file',
    dropHint:'Drop WebP images here or click to upload',qLabel:'Quality:',
    files:'files',original:'Original:',converted:'Converted:',
    reset:'↩️ Reset',download:'⬇ Download JPG',
    rWebpCompressor:'WebP Compressor',rJpgConverter:'Image to JPG',rWebpConverter:'Image to WebP',rImageConverter:'Image Converter'},
  zh:{toolTitle:'WebP 转 JPG 转换器',toolDesc:'将 WebP 图片在线转为 JPG。批量转换、可调质量、白色背景填充。免费，无需上传。',
    s1:'选择或拖放 WebP 图片',s2:'调整 JPG 质量滑块',
    s3:'点击「全部转换为 JPG」',s4:'下载每张转换后的 JPG 文件',
    dropHint:'拖放 WebP 图片到此处或点击上传',qLabel:'质量：',
    files:'个文件',original:'原始：',converted:'转换后：',
    reset:'↩️ 重置',download:'⬇ 下载 JPG',
    rWebpCompressor:'WebP 压缩器',rJpgConverter:'图片转 JPG',rWebpConverter:'图片转 WebP',rImageConverter:'图片格式转换'}
});
const {t}=GZI18n;
let files=[];let convertedBlobs={};
document.getElementById('dropText').textContent=t('dropHint');
document.getElementById('qLabel').textContent=t('qLabel');
const dz=document.getElementById('dropzone'),fi=document.getElementById('fileIn');
dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('drag-over')});
dz.addEventListener('dragleave',()=>dz.classList.remove('drag-over'));
dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('drag-over');handleFiles(e.dataTransfer.files)});
fi.addEventListener('change',e=>{handleFiles(e.target.files)});
const qSlider=document.getElementById('qSlider'),qVal=document.getElementById('qVal');
qSlider.addEventListener('input',()=>{qVal.textContent=qSlider.value+'%'});
function handleFiles(fl){files=Array.from(fl).filter(f=>f.type.startsWith('image/'));if(!files.length)return;document.getElementById('controls').style.display='block';dz.style.display='none';renderList();updateSummary()}
function fmt(b){return b>1048576?(b/1048576).toFixed(1)+' MB':(b/1024).toFixed(1)+' KB'}
function renderList(){const r=document.getElementById('results');r.innerHTML='';files.forEach((f,i)=>{const card=document.createElement('div');card.className='result-card';const url=URL.createObjectURL(f);card.innerHTML=`<img src="${url}"><div class="meta"><div class="name">${f.name}</div><div class="size">${t('original')} ${fmt(f.size)} · WEBP</div></div><div id="result-info-${i}"></div>`;r.appendChild(card)})}
function updateSummary(){document.getElementById('summary').innerHTML=`<span class="num">${files.length}</span> ${t('files')}`}
function convertAll(){const q=+qSlider.value/100;files.forEach((f,i)=>{const img=new Image();img.onload=()=>{const c=document.createElement('canvas');c.width=img.width;c.height=img.height;const ctx=c.getContext('2d');ctx.fillStyle='#fff';ctx.fillRect(0,0,c.width,c.height);ctx.drawImage(img,0,0);c.toBlob(b=>{const el=document.getElementById('result-info-'+i);if(el){const save=f.size-b.size;const pct2=((save/f.size)*100);const saveTxt=save>0?`↓${pct2.toFixed(0)}%`:'↑'+Math.abs(pct2).toFixed(0)+'%';el.innerHTML=`<div class="size">${t('converted')} <span class="num">${fmt(b.size)}</span> <span class="save" style="color:${save>0?'var(--gz-success)':'var(--gz-accent)'}">${saveTxt}</span></div><button class="gz-btn" style="margin-top:.3rem;font-size:.8rem;padding:.3rem .8rem" onclick="downloadBlob(${i})">${t('download')}</button>`;convertedBlobs[i]=b}},'image/jpeg',q)};img.src=URL.createObjectURL(f)})}
function downloadBlob(i){const b=convertedBlobs[i];if(!b)return;const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=files[i].name.replace(/\.[^.]+$/,'')+'.jpg';a.click()}
function resetTool(){files=[];convertedBlobs={};document.getElementById('controls').style.display='none';dz.style.display='block';fi.value=''}
GZ.renderToolPage({category:'image',titleKey:'toolTitle',descKey:'toolDesc',
  howToSteps:['s1','s2','s3','s4'],
  related:[
    {href:'/image/webp-compressor.html',icon:'🌐',nameKey:'rWebpCompressor'},
    {href:'/image/image-to-jpg.html',icon:'🖼️',nameKey:'rJpgConverter'},
    {href:'/image/image-to-webp.html',icon:'🌐',nameKey:'rWebpConverter'},
    {href:'/image/converter.html',icon:'🔄',nameKey:'rImageConverter'}
  ]
});
</script>
