<script type="application/ld+json">{"@context":"https://schema.org","@type":"WebApplication","name":"Case Study Generator","description":"Generate professional case study templates for business, marketing, or academic use. Fill in sections, preview live and export clean HTML.","url": "https://tools.gamezipper.com/zh/text/case-study-generator.html","applicationCategory":"Utility","operatingSystem":"Web Browser","offers":{"@type":"Offer","price":"0"}}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="editor-grid">
      <div id="editor">
        <div class="field-group">
          <label id="lbl-title"></label>
          <input id="f-title" value="How Acme Corp Increased Revenue by 45%" oninput="render()">
        </div>
        <div class="field-group">
          <label id="lbl-company"></label>
          <input id="f-company" value="Acme Corporation" oninput="render()">
        </div>
        <div class="field-group">
          <label id="lbl-industry"></label>
          <select id="f-industry" onchange="render()">
            <option value="Technology">Technology</option>
            <option value="Healthcare">Healthcare</option>
            <option value="Finance">Finance</option>
            <option value="Education">Education</option>
            <option value="Retail">Retail</option>
            <option value="Manufacturing">Manufacturing</option>
            <option value="Marketing">Marketing</option>
            <option value="SaaS">SaaS</option>
          </select>
        </div>
        <div class="field-group">
          <label id="lbl-summary"></label>
          <textarea id="f-summary" oninput="render()">Acme Corp leveraged our analytics platform to transform their decision-making process, resulting in 45% revenue growth within 6 months.</textarea>
        </div>
        <div class="field-group">
          <label id="lbl-challenge"></label>
          <textarea id="f-challenge" oninput="render()">Acme Corp struggled with fragmented data across 12 departments, leading to slow decision-making and missed market opportunities. Their existing tools couldn't provide real-time insights, causing a 30% delay in critical business decisions.</textarea>
        </div>
        <div class="field-group">
          <label id="lbl-solution"></label>
          <textarea id="f-solution" oninput="render()">We implemented our unified analytics dashboard with AI-powered predictions, integrating all 12 data sources into a single real-time view. The team received customized training and 24/7 support during the 4-week rollout.</textarea>
        </div>
        <div class="field-group">
          <label id="lbl-results"></label>
          <textarea id="f-results" oninput="render()">Within 6 months, Acme Corp achieved remarkable results: revenue grew by 45%, decision-making time was reduced by 60%, and team productivity increased by 35%.</textarea>
        </div>
        <div class="field-group">
          <label id="lbl-metrics"></label>
          <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px">
            <input id="f-m1v" value="45%" oninput="render()" placeholder="Metric 1 value">
            <input id="f-m1l" value="Revenue Growth" oninput="render()" placeholder="Metric 1 label">
            <input id="f-m1c" value="#4ecdc4" type="color" oninput="render()">
            <input id="f-m2v" value="60%" oninput="render()" placeholder="Metric 2 value">
            <input id="f-m2l" value="Faster Decisions" oninput="render()" placeholder="Metric 2 label">
            <input id="f-m2c" value="#ffd93d" type="color" oninput="render()">
            <input id="f-m3v" value="35%" oninput="render()" placeholder="Metric 3 value">
            <input id="f-m3l" value="Productivity Up" oninput="render()" placeholder="Metric 3 label">
            <input id="f-m3c" value="#ff6b6b" type="color" oninput="render()">
          </div>
        </div>
        <div class="field-group">
          <label id="lbl-quote"></label>
          <textarea id="f-quote" oninput="render()">"This platform completely transformed how we operate. We now make data-driven decisions in minutes instead of weeks."</textarea>
        </div>
        <div class="field-group">
          <label id="lbl-quoteauthor"></label>
          <input id="f-quoteauthor" value="Jane Smith, VP of Operations" oninput="render()">
        </div>
        <div class="field-group">
          <label id="lbl-takeaways"></label>
          <textarea id="f-takeaways" oninput="render()">• Unified data access is critical for fast decision-making
• AI-powered insights can identify opportunities humans miss
• Proper training and support are essential for successful adoption</textarea>
        </div>
      </div>
      <div>

</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Case Study Generator',
    toolDesc: 'Create professional case study templates — fill in sections, preview live and export clean HTML for your website or PDF.',
    lblTitle: 'Case Study Title',
    lblCompany: 'Company Name',
    lblIndustry: 'Industry',
    lblSummary: 'Executive Summary',
    lblChallenge: 'The Challenge',
    lblSolution: 'The Solution',
    lblResults: 'Results & Impact',
    lblMetrics: 'Key Metrics (3)',
    lblQuote: 'Client Testimonial',
    lblQuoteauthor: 'Quote Author',
    lblTakeaways: 'Key Takeaways (one per line)',
    lblPreview: 'Live Preview',
    copyHtml: 'Copy HTML',
    download: 'Download HTML',
    step1: 'Fill in each section of the case study on the left editor panel',
    step2: 'Customize the 3 key metrics with values, labels and colors',
    step3: 'Watch the live preview update on the right side in real-time',
    step4: 'Copy the generated HTML or download as a complete file',
  },
  zh: {
    toolTitle: '案例分析生成器',
    toolDesc: '创建专业的案例分析模板 — 填写各章节内容，实时预览并导出干净的 HTML。',
    lblTitle: '案例标题',
    lblCompany: '公司名称',
    lblIndustry: '行业',
    lblSummary: '概述摘要',
    lblChallenge: '面临的挑战',
    lblSolution: '解决方案',
    lblResults: '成果与影响',
    lblMetrics: '关键指标（3个）',
    lblQuote: '客户评价',
    lblQuoteauthor: '评价人',
    lblTakeaways: '核心要点（每行一个）',
    lblPreview: '实时预览',
    copyHtml: '复制 HTML',
    download: '下载 HTML',
    step1: '在左侧编辑面板填写案例的各个章节',
    step2: '自定义3个关键指标的数值、标签和颜色',
    step3: '实时查看右侧的预览效果',
    step4: '复制生成的 HTML 或下载为完整文件',
  }
});

const { $, copyText, t } = GZ;

function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function nl2br(s) { return esc(s).replace(/\n/g, '<br>'); }

function render() {
  const title = $('#f-title').value;
  const company = $('#f-company').value;
  const industry = $('#f-industry').value;
  const summary = $('#f-summary').value;
  const challenge = $('#f-challenge').value;
  const solution = $('#f-solution').value;
  const results = $('#f-results').value;
  const quote = $('#f-quote').value;
  const quoteAuthor = $('#f-quoteauthor').value;
  const takeaways = $('#f-takeaways').value;

  const m1v = $('#f-m1v').value, m1l = $('#f-m1l').value, m1c = $('#f-m1c').value;
  const m2v = $('#f-m2v').value, m2l = $('#f-m2l').value, m2c = $('#f-m2c').value;
  const m3v = $('#f-m3v').value, m3l = $('#f-m3l').value, m3c = $('#f-m3c').value;

  const takeawayList = takeaways.split('\n').filter(l => l.trim()).map(l => `<li>${esc(l.replace(/^[•\-\*]\s*/, ''))}</li>`).join('');

  const preview = `
    <h1>${esc(title)}</h1>
    <p><span class="badge" style="background:#4ecdc4">${esc(industry)}</span> <strong>${esc(company)}</strong></p>
    <h3>Executive Summary</h3>
    <p>${nl2br(summary)}</p>
    <h2>The Challenge</h2>
    <p>${nl2br(challenge)}</p>
    <h2>The Solution</h2>
    <p>${nl2br(solution)}</p>
    <h2>Results & Impact</h2>
    <div class="stat-grid">
      <div class="stat-card"><div class="number" style="color:${m1c}">${esc(m1v)}</div><div class="label">${esc(m1l)}</div></div>
      <div class="stat-card"><div class="number" style="color:${m2c}">${esc(m2v)}</div><div class="label">${esc(m2l)}</div></div>
      <div class="stat-card"><div class="number" style="color:${m3c}">${esc(m3v)}</div><div class="label">${esc(m3l)}</div></div>
    </div>
    <p>${nl2br(results)}</p>
    <blockquote>"${esc(quote)}"<br><strong>— ${esc(quoteAuthor)}</strong></blockquote>
    <h2>Key Takeaways</h2>
    <ul style="padding-left:20px">${takeawayList}</ul>
  `;
  $('#preview').innerHTML = preview;
}

function getFullHtml() {
  const styles = `.case-study{font-family:Georgia,serif;max-width:800px;margin:0 auto;padding:40px 20px;color:#222;line-height:1.7}
.case-study h1{font-size:1.6em;border-bottom:2px solid #4ecdc4;padding-bottom:.3em}
.case-study h2{font-size:1.2em;color:#2d3436;margin-top:1.5em}
.case-study h3{font-size:.85em;text-transform:uppercase;letter-spacing:.5px;color:#636e72}
.case-study .badge{display:inline-block;padding:3px 10px;border-radius:12px;font-size:.75em;font-weight:600;color:#fff;background:#4ecdc4}
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:16px 0}
.stat-card{text-align:center;padding:16px;border-radius:8px;background:#f8fffe}
.stat-card .number{font-size:2em;font-weight:700}
.stat-card .label{font-size:.8em;color:#636e72;text-transform:uppercase}
.case-study blockquote{border-left:3px solid #4ecdc4;padding:12px 20px;margin:16px 0;background:#f8fffe;font-style:italic}
.case-study ul{padding-left:20px}`;

  return `<!DOCTYPE html>
<html lang="zh">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>${esc($('#f-title').value)}</title>
<style>${styles}</style>
</head>
<body>
<div class="case-study">
${$('#preview').innerHTML}
</div>
</body>
</html>`;
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="copyText(getFullHtml())">${t('copyHtml')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="(()=>{const b=new Blob([getFullHtml()],{type:'text/html'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='case-study.html';a.click()})()">${t('download')}</button>`;

// Labels
$('#lbl-title').textContent = t('lblTitle');
$('#lbl-company').textContent = t('lblCompany');
$('#lbl-industry').textContent = t('lblIndustry');
$('#lbl-summary').textContent = t('lblSummary');
$('#lbl-challenge').textContent = t('lblChallenge');
$('#lbl-solution').textContent = t('lblSolution');
$('#lbl-results').textContent = t('lblResults');
$('#lbl-metrics').textContent = t('lblMetrics');
$('#lbl-quote').textContent = t('lblQuote');
$('#lbl-quoteauthor').textContent = t('lblQuoteauthor');
$('#lbl-takeaways').textContent = t('lblTakeaways');
$('#lbl-preview').textContent = t('lblPreview');

render();

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📄', href:'/text/blog-title-generator.html', name:'Blog Title Generator'},
    {icon:'✍️', href:'/text/cover-letter-generator.html', name:'Cover Letter Generator'},
    {icon:'📋', href:'/text/invoice-generator.html', name:'Invoice Generator'},
    {icon:'📝', href:'/text/resume-builder.html', name:'Resume Builder'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
