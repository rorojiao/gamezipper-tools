<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is Mermaid?", "acceptedAnswer": {"@type": "Answer", "text": "Mermaid is a JavaScript-based diagramming tool that renders text-based diagram definitions into visual diagrams. It supports flowcharts, sequence diagrams, class diagrams, Gantt charts, pie charts, and many more."}}, {"@type": "Question", "name": "Is my diagram data sent to a server?", "acceptedAnswer": {"@type": "Answer", "text": "No. All diagram rendering happens entirely in your browser using the Mermaid.js library. No data is ever sent to any server."}}, {"@type": "Question", "name": "Can I export the diagram as an image?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. Click the Export SVG button to download the rendered diagram as an SVG file. You can also copy the SVG code or take a screenshot."}}, {"@type": "Question", "name": "What diagram types are supported?", "acceptedAnswer": {"@type": "Answer", "text": "Flowchart, Sequence, Class, State, ER, Gantt, Pie, Mindmap, Timeline, Gitgraph, C4, Sankey, Block, and many more diagram types."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="gz-split">
      <div><label id="lbl-in"></label><textarea id="editor" spellcheck="false"></textarea></div>
      <div><label id="lbl-out"></label><div id="diagram-output"></div></div>
    </div>
    <div id="status"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Mermaid Diagram Editor',
    toolDesc: 'Create flowcharts, sequence diagrams, class diagrams and more — write text, get instant visual diagrams powered by Mermaid.js.',
    inputLabel: 'Mermaid Code',
    outputLabel: 'Diagram Preview',
    render: '▶ Render',
    exportSvg: '⬇ SVG',
    copyCode: '📋 Copy',
    clear: 'Clear',
    example: 'Example',
    templates: 'Templates:',
    tplFlow: 'Flowchart',
    tplSeq: 'Sequence',
    tplClass: 'Class',
    tplGantt: 'Gantt',
    tplPie: 'Pie',
    tplState: 'State',
    tplEr: 'ER',
    tplMind: 'Mindmap',
    renderOk: '✓ Diagram rendered',
    renderFail: '✗ Diagram error: ',
    step1: 'Choose a template or write your own Mermaid code',
    step2: 'Click Render to generate the visual diagram',
    step3: 'Edit the code to customize the diagram',
    step4: 'Export as SVG or copy the diagram code',
  },
  zh: {
    toolTitle: 'Mermaid 图表编辑器',
    toolDesc: '用文本快速创建流程图、时序图、类图等多种图表 — 基于 Mermaid.js 即时渲染可视化。',
    inputLabel: 'Mermaid 代码',
    outputLabel: '图表预览',
    render: '▶ 渲染',
    exportSvg: '⬇ SVG',
    copyCode: '📋 复制',
    clear: '清空',
    example: '示例',
    templates: '模板：',
    tplFlow: '流程图',
    tplSeq: '时序图',
    tplClass: '类图',
    tplGantt: '甘特图',
    tplPie: '饼图',
    tplState: '状态图',
    tplEr: 'ER 图',
    tplMind: '思维导图',
    renderOk: '✓ 图表渲染成功',
    renderFail: '✗ 图表错误：',
    step1: '选择模板或直接编写 Mermaid 代码',
    step2: '点击「渲染」生成可视化图表',
    step3: '编辑代码自定义图表内容',
    step4: '导出为 SVG 或复制图表代码',
  }
});

mermaid.initialize({startOnLoad:false,theme:'default',securityLevel:'loose'});
const { $, copyText, t } = GZ;
let renderCount=0;

const templates = {
  flow: `graph TD
    A[Start] --> B{Decision}
    B -->|Yes| C[Action 1]
    B -->|No| D[Action 2]
    C --> E[Result 1]
    D --> F[Result 2]
    E --> G[End]
    F --> G`,
  seq: `sequenceDiagram
    participant User
    participant Server
    participant DB
    User->>Server: Login Request
    Server->>DB: Query User
    DB-->>Server: User Data
    Server-->>User: Auth Token
    User->>Server: Get Data
    Server->>DB: SELECT
    DB-->>Server: Results
    Server-->>User: JSON Response`,
  cls: `classDiagram
    class Animal {
      +String name
      +int age
      +makeSound()
    }
    class Dog {
      +String breed
      +fetch()
    }
    class Cat {
      +String color
      +purr()
    }
    Animal <|-- Dog
    Animal <|-- Cat`,
  gantt: `gantt
    title Project Timeline
    dateFormat YYYY-MM-DD
    section Planning
      Research       :a1, 2025-01-01, 10d
      Design         :a2, after a1, 5d
    section Development
      Frontend       :b1, after a2, 15d
      Backend        :b2, after a2, 12d
    section Testing
      QA Testing     :c1, after b1, 5d`,
  pie: `pie title Market Share
    "Product A" : 35
    "Product B" : 25
    "Product C" : 20
    "Product D" : 15
    "Others" : 5`,
  state: `stateDiagram-v2
    [*] --> Idle
    Idle --> Loading : Start
    Loading --> Success : OK
    Loading --> Error : Fail
    Success --> Idle : Reset
    Error --> Idle : Retry
    Success --> [*]`,
  er: `erDiagram
    CUSTOMER ||--o{ ORDER : places
    ORDER ||--|{ LINE-ITEM : contains
    CUSTOMER {
      string name
      string email
    }
    ORDER {
      int id
      date created
    }
    LINE-ITEM {
      string product
      int quantity
      float price
    }`,
  mind: `mindmap
  root((Tools))
    Developer
      JSON Formatter
      Regex Tester
      API Tester
    Designer
      Color Picker
      Gradient
      Shadow
    Writer
      Word Counter
      Markdown
      Lorem Ipsum`
};

async function doRender(){
  const code=$('#editor').value.trim();
  if(!code) return;
  const el=$('#diagram-output');
  renderCount++;
  const id='mermaid-'+renderCount;
  try{
    const {svg}=await mermaid.render(id,code);
    el.innerHTML=svg;
    $('#status').innerHTML=`<span style="color:var(--gz-success)">${t('renderOk')}</span>`;
  }catch(e){
    el.innerHTML=`<span class="error-msg">${t('renderFail')}${e.message||e}</span>`;
    $('#status').innerHTML=`<span style="color:var(--gz-accent)">${t('renderFail')}${e.message||e}</span>`;
  }
}

function loadTemplate(name){
  $('#editor').value=templates[name]||'';
  doRender();
}

function doExportSvg(){
  const svg=$('#diagram-output').querySelector('svg');
  if(!svg) return;
  const data=new XMLSerializer().serializeToString(svg);
  const blob=new Blob([data],{type:'image/svg+xml'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='diagram.svg';
  a.click();
  URL.revokeObjectURL(a.href);
}

function doCopy(){
  const code=$('#editor').value;
  if(code) copyText(code);
}

function doClear(){ $('#editor').value=''; $('#diagram-output').innerHTML=''; $('#status').innerHTML=''; }

$('#toolbar').innerHTML=`
  <button class="gz-btn" onclick="doRender()">${t('render')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doExportSvg()">${t('exportSvg')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doCopy()">${t('copyCode')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>
  <span style="margin-left:8px;font-size:.8em;opacity:.7">${t('templates')}</span>
  <button class="gz-btn tpl-btn" onclick="loadTemplate('flow')">${t('tplFlow')}</button>
  <button class="gz-btn tpl-btn" onclick="loadTemplate('seq')">${t('tplSeq')}</button>
  <button class="gz-btn tpl-btn" onclick="loadTemplate('class')">${t('tplClass')}</button>
  <button class="gz-btn tpl-btn" onclick="loadTemplate('gantt')">${t('tplGantt')}</button>
  <button class="gz-btn tpl-btn" onclick="loadTemplate('pie')">${t('tplPie')}</button>
  <button class="gz-btn tpl-btn" onclick="loadTemplate('state')">${t('tplState')}</button>
  <button class="gz-btn tpl-btn" onclick="loadTemplate('er')">${t('tplEr')}</button>
  <button class="gz-btn tpl-btn" onclick="loadTemplate('mind')">${t('tplMind')}</button>`;

$('#lbl-in').textContent=t('inputLabel');
$('#lbl-out').textContent=t('outputLabel');

// Load default
loadTemplate('flow');

GZ.renderToolPage({
  category:'dev',
  titleKey:'toolTitle',
  descKey:'toolDesc',
  howToSteps:['step1','step2','step3','step4'],
  related:[
    {icon:'📊',href:'/dev/sql.html',name:'SQL Formatter'},
    {icon:'🎨',href:'/dev/svg-editor.html',name:'SVG Editor'},
    {icon:'📝',href:'/text/markdown.html',name:'Markdown Editor'},
    {icon:'🔐',href:'/dev/json.html',name:'JSON Formatter'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
