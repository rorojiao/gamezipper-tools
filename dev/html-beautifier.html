const { $, copyText, t } = GZ;

// Void elements that do not have closing tags
const VOID_TAGS = new Set(['area','base','br','col','embed','hr','img','input','link','meta','param','source','track','wbr']);
// Inline elements that should stay on the same line as their parent
const INLINE_TAGS = new Set(['a','span','b','i','strong','em','small','sub','sup','u','code','abbr','cite','q','label','mark','time','s','del','ins','kbd','var','samp','big','tt','font','wbr','bdi','bdo','dfn','ruby','rt','rp']);

function beautifyHTML(src, opts){
  const indent = opts.indent;
  const out = [];
  let depth = 0;
  let i = 0, n = src.length;
  const pad = d => ' '.repeat(d * indent);

  let buf = '';
  function flushLine(){
    const trimmed = buf.trim();
    if (trimmed) out.push(pad(depth) + trimmed);
    buf = '';
  }

  while (i < n){
    const c = src[i];
    // Comment
    if (src.startsWith('<!--', i)){
      let end = src.indexOf('-->', i+4);
      if (end === -1) end = n; else end += 3;
      flushLine();
      if (opts.keepComments) out.push(pad(depth) + src.slice(i, end).trim());
      i = end;
      continue;
    }
    // Doctype
    if (src.substr(i, 2).toLowerCase() === '<!'){
      let end = src.indexOf('>', i);
      if (end === -1) end = n; else end++;
      flushLine();
      out.push(pad(depth) + src.slice(i, end).trim());
      i = end;
      continue;
    }
    // Closing tag </tag>
    if (src.startsWith('</', i)){
      let end = src.indexOf('>', i);
      if (end === -1) end = n; else end++;
      const tagMatch = src.slice(i, end).match(/<\/\s*([a-zA-Z0-9-]+)/);
      const tagName = tagMatch ? tagMatch[1].toLowerCase() : '';
      flushLine();
      if (depth > 0) depth--;
      out.push(pad(depth) + src.slice(i, end).trim());
      i = end;
      continue;
    }
    // Opening tag <tag ...>
    if (c === '<' && /[a-zA-Z]/.test(src[i+1])){
      let end = src.indexOf('>', i);
      // Skip > inside attribute values
      let j = i + 1, inStr = false;
      while (j < n){
        if (src[j] === '"' || src[j] === "'") inStr = !inStr;
        if (src[j] === '>' && !inStr) { end = j; break; }
        j++;
      }
      if (end === -1) end = n; else end++;
      const tagMatch = src.slice(i, end).match(/<\s*([a-zA-Z0-9-]+)/);
      const tagName = tagMatch ? tagMatch[1].toLowerCase() : '';
      const isSelfClosing = src.slice(i, end).trim().endsWith('/>') || VOID_TAGS.has(tagName);
      flushLine();
      out.push(pad(depth) + src.slice(i, end).trim());
      if (!isSelfClosing) depth++;
      i = end;
      // Check text content after tag
      let textEnd = src.indexOf('<', i);
      if (textEnd === -1) textEnd = n;
      const text = src.slice(i, textEnd).trim();
      if (text){
        out.push(pad(depth) + text);
      }
      i = textEnd;
      continue;
    }
    // Text content
    if (c === '<'){ i++; continue; }
    // accumulate text
    buf += c;
    i++;
  }
  flushLine();
  return out.join('\n').replace(/\n{3,}/g, '\n\n').trim() + '\n';
}

function minifyHTML(src, keepComments){
  let out = '', i = 0, n = src.length;
  while (i < n){
    if (src.startsWith('<!--', i)){
      let end = src.indexOf('-->', i+4);
      if (end === -1) end = n; else end += 3;
      if (keepComments) out += src.slice(i, end);
      i = end;
      continue;
    }
    if (src.startsWith('<pre', i) || src.startsWith('<textarea', i) || src.startsWith('<script', i)){
      let end = src.indexOf('</', i+1);
      if (end === -1) end = n;
      out += src.slice(i, end);
      i = end;
      continue;
    }
    if (/\s/.test(src[i])){
      if (out && !/\s$/.test(out)) out += ' ';
      i++;
      continue;
    }
    out += src[i];
    i++;
  }
  return out.replace(/>\s+</g, '><').trim();
}

function highlight(html){
  const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  let out = '';
  const n = html.length;
  let i = 0;
  while (i < n){
    if (html.startsWith('<!--', i)){
      let e = html.indexOf('-->', i+4); if (e === -1) e = n; else e += 3;
      out += '<span class="com">'+esc(html.slice(i, e))+'</span>'; i = e; continue;
    }
    if (html[i] === '<'){
      let e = html.indexOf('>', i); if (e === -1) e = n; else e++;
      out += '<span class="tag">'+esc(html.slice(i, e))+'</span>'; i = e; continue;
    }
    let e = html.indexOf('<', i); if (e === -1) e = n;
    out += '<span class="txt">'+esc(html.slice(i, e))+'</span>'; i = e;
  }
  return out;
}

function getOpts(){
  return {
    indent: parseInt($('#ind').value, 10) || 2,
    keepComments: $('#kc').checked,
  };
}

function doBeautify(){
  const inp = $('#input').value;
  if (!inp.trim()){ $('#status').innerHTML = '<span style="color:var(--gz-accent)">'+t('empty')+'</span>'; $('#output').innerHTML=''; return; }
  const out = beautifyHTML(inp, getOpts());
  $('#output').innerHTML = highlight(out);
  window._htmlOut = out;
  $('#status').innerHTML = '<span style="color:var(--gz-success)">'+t('done')+' · '+out.split('\n').length+' lines</span>';
}

function doMinify(){
  const inp = $('#input').value;
  if (!inp.trim()){ $('#status').innerHTML = '<span style="color:var(--gz-accent)">'+t('empty')+'</span>'; $('#output').innerHTML=''; return; }
  const out = minifyHTML(inp, getOpts().keepComments);
  window._htmlOut = out;
  $('#output').innerHTML = highlight(out);
  $('#status').innerHTML = '<span style="color:var(--gz-success)">'+t('minified')+' · '+out.length+' chars</span>';
}

function doCopy(){ if (window._htmlOut != null) copyText(window._htmlOut); }

function doDownload(){
  if (window._htmlOut == null) return;
  const blob = new Blob([window._htmlOut], {type:'text/html'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'page.html';
  a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href), 1000);
}
