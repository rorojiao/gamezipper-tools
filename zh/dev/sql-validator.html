const { $, t } = GZ;

const KEYWORDS = ['SELECT','FROM','WHERE','INSERT','INTO','VALUES','UPDATE','SET','DELETE','CREATE','TABLE','ALTER','DROP','INDEX','VIEW','JOIN','LEFT','RIGHT','INNER','OUTER','FULL','ON','GROUP','BY','HAVING','ORDER','ASC','DESC','LIMIT','OFFSET','DISTINCT','UNION','ALL','AS','AND','OR','NOT','IN','EXISTS','BETWEEN','LIKE','IS','NULL','CASE','WHEN','THEN','ELSE','END','WITH','RECURSIVE','PRIMARY','KEY','FOREIGN','REFERENCES','DEFAULT','CONSTRAINT','UNIQUE','CHECK','COLLATE','BEGIN','COMMIT','ROLLBACK','TRANSACTION','TRUNCATE','GRANT','REVOKE'];

function validateSQL(sql) {
  const issues = [];
  const trimmed = sql.trim();
  if (!trimmed) return { issues: [], stats: {} };

  const upper = trimmed.toUpperCase();
  const lines = trimmed.split('\n');
  const firstWord = (upper.match(/^\s*(\w+)/) || [,''])[1];

  // Check statement type
  const validStmts = ['SELECT','INSERT','UPDATE','DELETE','CREATE','ALTER','DROP','WITH','TRUNCATE','GRANT','REVOKE','BEGIN','COMMIT','ROLLBACK','VACUUM'];
  let stmtType = firstWord;
  if (firstWord && !validStmts.includes(firstWord)) {
    issues.push({ type:'warn', line:1, msg:`Unrecognized statement "${firstWord}". Expected one of: ${validStmts.slice(0,8).join(', ')}...` });
  }

  // Balanced parentheses
  let parenDepth = 0;
  let parenLine = 1;
  for (let i = 0; i < sql.length; i++) {
    if (sql[i] === '\n') parenLine++;
    if (sql[i] === '(') { parenDepth++; }
    if (sql[i] === ')') { parenDepth--; if (parenDepth < 0) { issues.push({ type:'err', line:parenLine, msg:'Unexpected closing parenthesis ")" with no matching "("' }); parenDepth = 0; } }
  }
  if (parenDepth > 0) issues.push({ type:'err', line:lines.length, msg:`Missing ${parenDepth} closing parenthesis ")"` });

  // Unterminated string literals
  lines.forEach((line, idx) => {
    const sq = (line.match(/'/g) || []).length;
    if (sq % 2 !== 0) issues.push({ type:'err', line:idx+1, msg:'Unterminated single-quote string literal' });
    const dq = (line.match(/(?<!')"(?!')/g) || []).length;
    if (dq % 2 !== 0) issues.push({ type:'warn', line:idx+1, msg:'Unterminated double-quote identifier' });
  });

  // Trailing comma before FROM/WHERE/etc
  lines.forEach((line, idx) => {
    const m = line.match(/,\s*$/);
    if (m) {
      const next = (lines[idx+1]||'').trim().toUpperCase();
      if (['FROM','WHERE','GROUP','ORDER','HAVING','LIMIT',';'].some(k => next.startsWith(k)) || !next) {
        issues.push({ type:'warn', line:idx+1, msg:'Trailing comma at end of line before clause boundary' });
      }
    }
  });

  // SELECT without FROM (could be valid but flag)
  if (firstWord === 'SELECT' && !upper.includes('FROM') && !upper.match(/SELECT\s+\d+|\*|\s+\(/)) {
    issues.push({ type:'warn', line:1, msg:'SELECT statement without FROM clause' });
  }

  // Missing semicolon
  if (!trimmed.endsWith(';')) issues.push({ type:'warn', line:lines.length, msg:'Query does not end with semicolon ";" (recommended)' });

  // Check for SELECT *
  if (upper.includes('SELECT *')) issues.push({ type:'warn', line:1, msg:'Using SELECT * is not recommended in production — list columns explicitly' });

  // Double-check: empty statement
  if (firstWord === '') issues.push({ type:'err', line:1, msg:'Empty or whitespace-only query' });

  // Extract tables (basic)
  const tables = [];
  const tableMatches = upper.match(/(?:FROM|JOIN|INTO|TABLE|UPDATE)\s+([a-zA-Z_][\w.]*)/g) || [];
  tableMatches.forEach(m => { const tn = m.split(/\s+/)[1]; if (tn && !tables.includes(tn)) tables.push(tn); });

  // Count keywords
  const foundKw = KEYWORDS.filter(k => upper.includes(k));

  return {
    issues,
    stats: {
      stmtType: stmtType || '—',
      tables: tables.length ? tables.join(', ') : '—',
      keywords: foundKw.length,
      lines: lines.length
    }
  };
}

function doValidate() {
  const sql = $('#input').value;
  if (!sql.trim()) {
    $('#output').innerHTML = `<span style="opacity:.5">${t('noInput')}</span>`;
    $('#status').innerHTML = '';
    return;
  }
  const result = validateSQL(sql);
  const errors = result.issues.filter(i => i.type === 'err');
  const warns = result.issues.filter(i => i.type === 'warn');
  let html = '';

  // Stats
  if (result.stats.stmtType) {
    html += `<div style="margin-bottom:12px">`;
    html += `<span class="sv-stat">${t('stmtType')}: <b>${result.stats.stmtType}</b></span>`;
    html += `<span class="sv-stat">${t('tables')}: <b>${result.stats.tables}</b></span>`;
    html += `<span class="sv-stat">${t('keywords')}: <b>${result.stats.keywords}</b></span>`;
    html += `<span class="sv-stat">${t('line')}: <b>${result.stats.lines}</b></span>`;
    html += `</div>`;
  }

  if (errors.length === 0) {
    html += `<div class="sv-issue ok"><span class="sv-ok">${t('valid')}</span>${warns.length ? ` &middot; ${warns.length} warning(s)` : ''}</div>`;
  } else {
    html += `<div class="sv-issue"><span class="sv-err">✗ ${errors.length} error(s)${warns.length ? `, ${warns.length} warning(s)` : ''}</span></div>`;
  }

  result.issues.forEach(issue => {
    const cls = issue.type === 'err' ? '' : ' warn';
    const icon = issue.type === 'err' ? '✗' : '⚠';
    html += `<div class="sv-issue${cls}"><b>${icon} ${t('line')} ${issue.line}:</b> ${escapeHtml(issue.msg)}</div>`;
  });

  $('#output').innerHTML = html;
  $('#status').innerHTML = errors.length
    ? `<span class="sv-err">✗ ${errors.length} error(s)</span>`
    : `<span class="sv-ok">✓ ${t('valid')}</span>`;
}

function escapeHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function loadExample() {
  $('#input').value = `SELECT u.id, u.name, COUNT(o.id) AS order_count
FROM users u
LEFT JOIN orders o ON o.user_id = u.id
WHERE u.created_at > '2024-01-01'
  AND u.status = 'active'
GROUP BY u.id, u.name
HAVING COUNT(o.id) > 5
ORDER BY order_count DESC
LIMIT 20;`;
  doValidate();
}

function doClear() { $('#input').value = ''; $('#output').innerHTML = ''; $('#status').innerHTML = ''; }

$('#input').addEventListener('input', doValidate);

$('#toolbar').innerHTML = `

  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
