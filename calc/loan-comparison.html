<style>
.lc-toggle{display:flex;gap:6px;margin-bottom:14px}
.lc-toggle button{padding:6px 14px;border-radius:8px;border:1px solid var(--border);background:var(--glass2);color:var(--text);cursor:pointer;font-size:.85em}
.lc-toggle button.active{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border-color:transparent;font-weight:700}
.lc-cols{display:grid;gap:12px;margin-bottom:16px}
.lc-cols.cols-2{grid-template-columns:repeat(2,1fr)}
.lc-cols.cols-3{grid-template-columns:repeat(3,1fr)}
@media(max-width:720px){.lc-cols.cols-2,.lc-cols.cols-3{grid-template-columns:1fr}}
.lc-loan{background:var(--glass2);border:1px solid var(--border);border-radius:12px;padding:14px;display:flex;flex-direction:column;gap:8px;position:relative}
.lc-loan .lchead{display:flex;align-items:center;justify-content:space-between;margin-bottom:2px}
.lc-loan .lchead .name{font-weight:700;font-size:1em;display:flex;align-items:center;gap:6px}
.lc-loan .lchead input{background:transparent;border:none;color:var(--accent);font-weight:700;font-size:1em;width:120px;padding:2px 0}
.lc-loan .lchead input:focus{outline:none;border-bottom:1px solid var(--accent)}
.lc-loan label{font-size:.75em;color:var(--text2);font-weight:600;text-transform:uppercase;letter-spacing:.4px}
.lc-loan input[type=number]{padding:8px 10px;border-radius:8px;border:1px solid var(--border);background:var(--glass);color:var(--text);font-size:1em;font-family:inherit}
.lc-summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin:14px 0}
.lc-tile{background:linear-gradient(135deg,var(--glass),var(--glass2));border:1px solid var(--border);border-radius:12px;padding:14px;text-align:center}
.lc-tile .num{font-size:1.3em;font-weight:800;color:var(--accent);line-height:1.1}
.lc-tile .lbl{font-size:.7em;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-top:4px}
.lc-tile.winner{border-color:var(--success);background:linear-gradient(135deg,rgba(16,185,129,.15),rgba(5,150,105,.05))}
.lc-tile.winner .num{color:var(--success)}
.lc-tile.winner::after{content:"🏆";position:absolute;top:6px;right:8px;font-size:.9em}
.lc-table-wrap{overflow-x:auto;margin:14px 0;border:1px solid var(--border);border-radius:10px}
.lc-table{width:100%;border-collapse:collapse;font-size:.85em;font-family:monospace}
.lc-table th{text-align:right;padding:8px 10px;background:var(--glass2);color:var(--accent);font-weight:700;position:sticky;top:0;border-bottom:2px solid var(--accent)}
.lc-table th:first-child{text-align:left}
.lc-table td{padding:6px 10px;border-bottom:1px solid var(--border);text-align:right;white-space:nowrap}
.lc-table td:first-child{text-align:left;font-weight:700}
.lc-chart{width:100%;height:240px;background:var(--glass2);border:1px solid var(--border);border-radius:12px;margin:14px 0;padding:8px}
.lc-tip{background:var(--glass2);border-left:3px solid var(--accent);padding:10px 14px;border-radius:6px;font-size:.85em;margin:10px 0;color:var(--text2)}
</style>
<script type="application/ld+json">{"@context":"https://schema.org","@type":"WebApplication","name":"Loan Comparison Calculator","description":"Compare 2 or 3 loan offers side by side. See monthly payment, total interest, total cost and payoff date with an interactive chart.","url":"https://tools.gamezipper.com/calc/loan-comparison.html","applicationCategory":"Utility","operatingSystem":"Web Browser","offers":{"@type":"Offer","price":"0"}}</script>
<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "How do I compare two loans?", "acceptedAnswer": {"@type": "Answer", "text": "Enter each loan's principal amount, annual interest rate and term in years. The calculator computes monthly payment, total interest, total cost and payoff date for each, then highlights the cheaper option so you can compare at a glance."}}, {"@type": "Question", "name": "Which loan is the best?", "acceptedAnswer": {"@type": "Answer", "text": "The best loan is usually the one with the lowest total cost (principal + interest). Sometimes a shorter-term loan has a higher monthly payment but lower total interest — that's often the better deal long-term. The chart shows both the monthly payment and the running total cost so you can see which is best for your situation."}}, {"@type": "Question", "name": "Does this include fees and insurance?", "acceptedAnswer": {"@type": "Answer", "text": "This calculator focuses on the principal + interest comparison that depends on the loan's rate and term. For an apples-to-apples comparison that includes origination fees, points, insurance and taxes, use the dedicated Mortgage Calculator tool which supports those extras."}}, {"@type": "Question", "name": "Can I compare more than 2 loans?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. Toggle the '3 loans' button at the top to add a third loan scenario. You can edit each loan's name, amount, rate and term independently and see all three side by side with a comparison chart."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="lc-toggle">
      <span style="font-size:.85em;color:var(--text2);margin-right:6px;align-self:center" id="lbl-compare"></span>
      <button id="btn-2" class="active" onclick="setN(2)">2 loans</button>
      <button id="btn-3" onclick="setN(3)">3 loans</button>
    </div>
    <div class="lc-cols cols-2" id="loans"></div>
    <div class="lc-summary" id="summary"></div>
    <div class="lc-chart" id="chart"></div>
    <div class="lc-table-wrap" id="table-wrap"></div>
    <div class="lc-tip">💡 <span id="tip"></span></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Loan Comparison Calculator',
    toolDesc: 'Compare 2 or 3 loan offers side by side. See monthly payment, total interest, total cost, payoff date and an interactive chart.',
    lblCompare: 'Compare:',
    lblAmount: 'Loan amount ($)',
    lblRate: 'Annual interest rate (%)',
    lblYears: 'Term (years)',
    nameA: 'Loan A', nameB: 'Loan B', nameC: 'Loan C',
    monthlyPay: 'Monthly payment', totalInterest: 'Total interest', totalCost: 'Total cost', payoff: 'Payoff date',
    winner: 'Best', best: 'LOWEST TOTAL COST',
    tip: 'Tip: A loan with a lower rate but longer term can actually cost more than a higher-rate, shorter-term loan. Always compare the total dollar cost, not just the monthly payment.',
    step1: 'Click 2 loans or 3 loans to choose how many offers to compare',
    step2: 'Edit each loan\'s name, amount, interest rate and term in years',
    step3: 'Review the summary tiles showing which loan has the lowest total cost',
    step4: 'Inspect the chart and the breakdown table for full cost analysis',
  },
  zh: {
    toolTitle: '贷款对比计算器',
    toolDesc: '并排对比 2 或 3 笔贷款方案。查看月供、总利息、总成本、还清日期和对比图表。',
    lblCompare: '对比：',
    lblAmount: '贷款金额 ($)',
    lblRate: '年利率 (%)',
    lblYears: '贷款期限 (年)',
    nameA: '贷款 A', nameB: '贷款 B', nameC: '贷款 C',
    monthlyPay: '月供', totalInterest: '总利息', totalCost: '总成本', payoff: '还清日期',
    winner: '最优', best: '总成本最低',
    tip: '提示：利率较低但期限较长的贷款，总成本可能高于利率较高但期限较短的贷款。比较时一定要看总成本，而不是只比较月供。',
    step1: '点击「2 笔」或「3 笔」选择对比方案数量',
    step2: '编辑每笔贷款的名称、金额、年利率和期限',
    step3: '查看汇总瓷砖，找到总成本最低的方案',
    step4: '通过图表和明细表深入分析每种方案',
  }
});

const { $, t } = GZ;
let nLoans = 2;
let loans = [
  { name: 'nameA', amount: 250000, rate: 6.5, years: 30 },
  { name: 'nameB', amount: 250000, rate: 5.9, years: 15 },
  { name: 'nameC', amount: 250000, rate: 7.1, years: 20 },
];

function setN(n){
  nLoans = n;
  document.getElementById('btn-2').classList.toggle('active', n===2);
  document.getElementById('btn-3').classList.toggle('active', n===3);
  document.getElementById('loans').className = 'lc-cols ' + (n===2?'cols-2':'cols-3');
  render();
}

function fmt(n){
  return '$' + n.toLocaleString(undefined, {minimumFractionDigits:0, maximumFractionDigits:0});
}
function fmtPay(n){
  return '$' + n.toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2});
}
function calcEMI(P, rate, years){
  if (!P || !years) return 0;
  const r = (rate/100)/12;
  const n = years * 12;
  if (r === 0) return P / n;
  return P * (r * Math.pow(1+r, n)) / (Math.pow(1+r, n) - 1);
}

function render(){
  const visible = loans.slice(0, nLoans);
  const html = visible.map((L, i) => `
    <div class="lc-loan">
      <div class="lchead">
        <span class="name">${i===0?'🅰️':i===1?'🅱️':'🅲'} <input type="text" value="${t(L.name)}" data-i="${i}" data-k="name"></span>
      </div>
      <div>
        <label>${t('lblAmount')}</label>
        <input type="number" value="${L.amount}" data-i="${i}" data-k="amount" min="0" step="100">
      </div>
      <div>
        <label>${t('lblRate')}</label>
        <input type="number" value="${L.rate}" data-i="${i}" data-k="rate" min="0" step="0.01">
      </div>
      <div>
        <label>${t('lblYears')}</label>
        <input type="number" value="${L.years}" data-i="${i}" data-k="years" min="1" max="50" step="1">
      </div>
    </div>
  `).join('');
  $('#loans').innerHTML = html;

  const summaries = visible.map((L, i) => {
    const m = calcEMI(L.amount, L.rate, L.years);
    const totalPaid = m * L.years * 12;
    const totalInterest = totalPaid - L.amount;
    const now = new Date();
    const payoff = new Date(now.getFullYear() + L.years, now.getMonth(), now.getDate());
    return { i, name: t(L.name), m, totalPaid, totalInterest, payoff, L };
  });

  const minCost = Math.min(...summaries.map(s => s.totalPaid));
  const minMonthly = Math.min(...summaries.map(s => s.m));
  const summaryHtml = summaries.map(s => `
    <div class="lc-tile ${s.totalPaid === minCost ? 'winner' : ''}">
      <div style="font-size:.8em;color:var(--text2);margin-bottom:4px">${s.name}</div>
      <div class="num">${fmtPay(s.m)}</div>
      <div class="lbl">${t('monthlyPay')}</div>
      <div style="margin-top:8px;font-size:.95em;color:#f59e0b">${fmt(s.totalInterest)}</div>
      <div class="lbl">${t('totalInterest')}</div>
      <div style="margin-top:8px;font-size:.95em">${fmt(s.totalPaid)}</div>
      <div class="lbl">${t('totalCost')}</div>
      <div style="margin-top:8px;font-size:.75em;color:var(--text2)">${s.payoff.toLocaleDateString()}</div>
      <div class="lbl">${t('payoff')}</div>
    </div>
  `).join('');
  $('#summary').innerHTML = summaryHtml;

  // Chart: monthly payment + total cost bars
  const W = $('#chart').clientWidth - 16;
  const H = 220;
  const padX = 50, padY = 30;
  const innerW = W - padX - 12;
  const innerH = H - padY - 30;
  const colors = ['#4ecdc4', '#ffd93d', '#a78bfa'];
  const groupW = innerW / summaries.length;
  const barW = Math.min(40, (groupW - 12) / 2);
  const maxV = Math.max(...summaries.flatMap(s => [s.m, s.totalPaid / Math.max(1, s.L.years * 12)]));

  let svg = `<svg viewBox="0 0 ${W} ${H}" width="100%" height="100%" style="font-family:inherit">`;
  // Y axis
  svg += `<line x1="${padX}" y1="${padY}" x2="${padX}" y2="${H - 30}" stroke="rgba(255,255,255,.2)"/>`;
  svg += `<line x1="${padX}" y1="${H - 30}" x2="${W - 12}" y2="${H - 30}" stroke="rgba(255,255,255,.2)"/>`;
  for (let k = 0; k <= 4; k++){
    const yv = maxV * k / 4;
    const yp = H - 30 - (yv / maxV) * innerH;
    svg += `<line x1="${padX-3}" y1="${yp}" x2="${W-12}" y2="${yp}" stroke="rgba(255,255,255,.06)"/>`;
    svg += `<text x="${padX-6}" y="${yp+3}" fill="rgba(255,255,255,.55)" font-size="10" text-anchor="end">${fmt(yv)}</text>`;
  }
  summaries.forEach((s, i) => {
    const cx = padX + groupW * i + groupW/2;
    // Monthly bar
    const mH = (s.m / maxV) * innerH;
    svg += `<rect x="${cx - barW - 2}" y="${H - 30 - mH}" width="${barW}" height="${mH}" fill="${colors[i]}" rx="3" opacity=".9"/>`;
    svg += `<text x="${cx - barW/2 - 2}" y="${H - 30 - mH - 4}" fill="${colors[i]}" font-size="10" text-anchor="middle" font-weight="700">${fmtPay(s.m)}</text>`;
    // Avg annual cost (totalPaid / years) bar
    const avg = s.totalPaid / Math.max(1, s.L.years);
    const aH = (avg / maxV) * innerH;
    svg += `<rect x="${cx + 2}" y="${H - 30 - aH}" width="${barW}" height="${aH}" fill="${colors[i]}" rx="3" opacity=".4"/>`;
    svg += `<text x="${cx + barW/2 + 2}" y="${H - 30 - aH - 4}" fill="${colors[i]}" font-size="10" text-anchor="middle" font-weight="700" opacity=".7">${fmt(avg)}/yr</text>`;
    // X label
    svg += `<text x="${cx}" y="${H - 14}" fill="rgba(255,255,255,.8)" font-size="11" text-anchor="middle" font-weight="700">${s.name}</text>`;
  });
  // Legend
  svg += `<rect x="${padX}" y="6" width="10" height="10" fill="rgba(255,255,255,.6)" rx="2"/>`;
  svg += `<text x="${padX+14}" y="15" fill="rgba(255,255,255,.7)" font-size="11">Monthly payment</text>`;
  svg += `<rect x="${padX+125}" y="6" width="10" height="10" fill="rgba(255,255,255,.3)" rx="2"/>`;
  svg += `<text x="${padX+139}" y="15" fill="rgba(255,255,255,.7)" font-size="11">Avg cost / year</text>`;
  svg += `</svg>`;
  $('#chart').innerHTML = svg;

  // Comparison table
  const totalMin = Math.min(...summaries.map(s => s.totalPaid));
  const tableHtml = `<table class="lc-table">
    <thead><tr>
      <th></th>
      ${summaries.map(s => `<th>${s.name}${s.totalPaid === totalMin ? ' 🏆' : ''}</th>`).join('')}
    </tr></thead>
    <tbody>
      <tr><td>Principal</td>${summaries.map(s => `<td>${fmt(s.L.amount)}</td>`).join('')}</tr>
      <tr><td>Rate</td>${summaries.map(s => `<td>${s.L.rate.toFixed(2)}%</td>`).join('')}</tr>
      <tr><td>Term</td>${summaries.map(s => `<td>${s.L.years} yr</td>`).join('')}</tr>
      <tr><td>Monthly</td>${summaries.map(s => `<td>${fmtPay(s.m)}</td>`).join('')}</tr>
      <tr><td>Total interest</td>${summaries.map(s => `<td style="color:#f59e0b">${fmt(s.totalInterest)}</td>`).join('')}</tr>
      <tr><td>Total cost</td>${summaries.map(s => `<td style="font-weight:700">${fmt(s.totalPaid)}</td>`).join('')}</tr>
      <tr><td>Payoff</td>${summaries.map(s => `<td>${s.payoff.toLocaleDateString()}</td>`).join('')}</tr>
      <tr><td>vs. best</td>${summaries.map(s => `<td style="color:${s.totalPaid === totalMin ? 'var(--success)' : 'var(--text2)'}">${s.totalPaid === totalMin ? '—' : '+' + fmt(s.totalPaid - totalMin)}</td>`).join('')}</tr>
    </tbody>
  </table>`;
  $('#table-wrap').innerHTML = tableHtml;

  $('#tip').textContent = t('tip');
}

document.getElementById('loans').addEventListener('input', e => {
  const i = +e.target.dataset.i;
  const k = e.target.dataset.k;
  if (k === 'name') {
    const v = e.target.value.trim();
    if (i === 0) loans[0].name = v || 'nameA';
    else if (i === 1) loans[1].name = v || 'nameB';
    else loans[2].name = v || 'nameC';
  } else {
    loans[i][k] = +e.target.value;
  }
  renderSummaryOnly();
});

function renderSummaryOnly(){
  const visible = loans.slice(0, nLoans);
  const summaries = visible.map((L, i) => {
    const m = calcEMI(L.amount, L.rate, L.years);
    const totalPaid = m * L.years * 12;
    const totalInterest = totalPaid - L.amount;
    const now = new Date();
    const payoff = new Date(now.getFullYear() + L.years, now.getMonth(), now.getDate());
    return { i, name: i === 0 ? t('nameA') : i === 1 ? t('nameB') : t('nameC'), m, totalPaid, totalInterest, payoff, L };
  });
  const minCost = Math.min(...summaries.map(s => s.totalPaid));
  const summaryHtml = summaries.map(s => `
    <div class="lc-tile ${s.totalPaid === minCost ? 'winner' : ''}">
      <div style="font-size:.8em;color:var(--text2);margin-bottom:4px">${s.name}</div>
      <div class="num">${fmtPay(s.m)}</div>
      <div class="lbl">${t('monthlyPay')}</div>
      <div style="margin-top:8px;font-size:.95em;color:#f59e0b">${fmt(s.totalInterest)}</div>
      <div class="lbl">${t('totalInterest')}</div>
      <div style="margin-top:8px;font-size:.95em">${fmt(s.totalPaid)}</div>
      <div class="lbl">${t('totalCost')}</div>
      <div style="margin-top:8px;font-size:.75em;color:var(--text2)">${s.payoff.toLocaleDateString()}</div>
      <div class="lbl">${t('payoff')}</div>
    </div>
  `).join('');
  $('#summary').innerHTML = summaryHtml;
}

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🏦', href:'/calc/loan-calculator.html', name:'Loan Calculator'},
    {icon:'📋', href:'/calc/loan-amortization.html', name:'Loan Amortization'},
    {icon:'🏠', href:'/calc/retirement-calculator.html', name:'Retirement Calculator'},
    {icon:'💰', href:'/calc/roi.html', name:'ROI Calculator'},
  ]
});

render();
</script>
