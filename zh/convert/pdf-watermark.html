const { $, t } = GZ;
let pdfBytes = null;
let pdfName = 'document.pdf';
let mode = 'text';
let statusTimer;

function showStatus(msg, type) {
  const s = $('#status');
  s.textContent = msg;
  s.className = type;
  if (type === 'ok') {
    clearTimeout(statusTimer);
    statusTimer = setTimeout(() => s.className = '', 3000);
  }
}

function setMode(m) {
  mode = m;
  $('#tab-text').classList.toggle('active', m === 'text');
  $('#tab-image').classList.toggle('active', m === 'image');
  $('#textOpts').style.display = m === 'text' ? '' : 'none';
  $('#imageOpts').style.display = m === 'image' ? '' : 'none';
}

function loadPdf(file) {
  if (!file) { showStatus(t('errNoFile'), 'err'); return; }
  if (file.type !== 'application/pdf' && !/\.pdf$/i.test(file.name)) { showStatus(t('errNotPdf'), 'err'); return; }
  pdfName = file.name;
  const r = new FileReader();
  r.onload = () => {
    pdfBytes = r.result;
    $('#fileName').textContent = file.name;
    const sizeKB = (file.size / 1024).toFixed(1);
    $('#fileMeta').textContent = sizeKB + ' KB • PDF';
    $('#fileCard').style.display = '';
    $('#options').classList.add('show');
    showStatus(t('okReady'), 'ok');
  };
  r.onerror = () => showStatus(t('errRead'), 'err');
  r.readAsArrayBuffer(file);
}

function escapeHtml(s){if(s==null)return'';return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

function hexToRgb01(hex) {
  hex = hex.replace('#','');
  if (hex.length === 3) hex = hex.split('').map(c=>c+c).join('');
  const r = parseInt(hex.substr(0,2),16)/255;
  const g = parseInt(hex.substr(2,2),16)/255;
  const b = parseInt(hex.substr(4,2),16)/255;
  return [r,g,b];
}

function parseRange(str, total) {
  // "1,3,5-7" → set of 0-indexed pages
  const set = new Set();
  str.split(',').forEach(part => {
    part = part.trim();
    if (part.includes('-')) {
      const [a,b] = part.split('-').map(s=>parseInt(s));
      if (!isNaN(a) && !isNaN(b)) {
        for (let i=Math.max(1,a); i<=Math.min(total,b); i++) set.add(i-1);
      }
    } else {
      const n = parseInt(part);
      if (!isNaN(n) && n>=1 && n<=total) set.add(n-1);
    }
  });
  return set;
}

function getTargetPages(pdf, which, custom, total) {
  if (which === 'all') return pdf.getPages();
  if (which === 'first') return [pdf.getPages()[0]];
  if (which === 'last') return [pdf.getPages()[total-1]];
  if (which === 'custom') {
    const idx = parseRange(custom, total);
    return pdf.getPages().filter((_,i) => idx.has(i));
  }
  return pdf.getPages();
}

async function drawTextWatermark(pdf, pages, opts) {
  const font = await pdf.embedFont(StandardFonts.HelveticaBold);
  pages.forEach(page => {
    const { width, height } = page.getSize();
    const text = opts.text;
    const size = opts.size;
    const opacity = opts.opacity;
    const rotation = opts.rotation;
    const color = opts.color;
    const pos = opts.position;
    const pdfColor = rgb(color[0], color[1], color[2]);
    const textWidth = font.widthOfTextAtSize(text, size);
    let x, y;
    if (pos === 'tile') {
      // Draw tiled
      const stepX = Math.max(150, textWidth + 100);
      const stepY = Math.max(120, size * 3);
      for (let yy = stepY/2; yy < height; yy += stepY) {
        for (let xx = stepX/2; xx < width; xx += stepX) {
          page.drawText(text, {
            x: xx - textWidth/2, y: yy, size: size, font: font,
            color: pdfColor, opacity: opacity, rotate: degrees(rotation),
          });
        }
      }
    } else {
      // Determine anchor
      if (pos === 'center' || pos === 'top' || pos === 'bottom') {
        x = width/2 - textWidth/2;
        if (pos === 'center') y = height/2 - size/3;
        else if (pos === 'top') y = height - size - 20;
        else y = 20;
      } else if (pos === 'topleft') { x = 30; y = height - size - 20; }
      else if (pos === 'topright') { x = width - textWidth - 30; y = height - size - 20; }
      else if (pos === 'bottomleft') { x = 30; y = 20; }
      else if (pos === 'bottomright') { x = width - textWidth - 30; y = 20; }
      else { x = width/2 - textWidth/2; y = height/2 - size/3; }
      page.drawText(text, {
        x: x, y: y, size: size, font: font,
        color: pdfColor, opacity: opacity, rotate: degrees(rotation),
      });
    }
  });
}

async function drawImageWatermark(pdf, pages, opts) {
  const imgBytes = opts.imageBytes;
  const isPng = imgBytes[0] === 0x89 && imgBytes[1] === 0x50;
  const img = isPng ? await pdf.embedPng(imgBytes) : await pdf.embedJpg(imgBytes);
  const imgDims = img.scale(1);
  pages.forEach(page => {
    const { width, height } = page.getSize();
    const targetW = width * (opts.sizePct / 100);
    const aspect = imgDims.height / imgDims.width;
    const targetH = targetW * aspect;
    let x, y;
    const pos = opts.position;
    if (pos === 'tile') {
      const stepX = Math.max(targetW*1.5, 100);
      const stepY = Math.max(targetH*1.5, 80);
      for (let yy = 0; yy < height; yy += stepY) {
        for (let xx = 0; xx < width; xx += stepX) {
          page.drawImage(img, {
            x: xx, y: yy, width: targetW, height: targetH,
            opacity: opts.opacity, rotate: degrees(opts.rotation),
          });
        }
      }
    } else {
      if (pos === 'center' || pos === 'top' || pos === 'bottom') {
        x = (width - targetW) / 2;
        if (pos === 'center') y = (height - targetH) / 2;
        else if (pos === 'top') y = height - targetH - 20;
        else y = 20;
      } else if (pos === 'topleft') { x = 20; y = height - targetH - 20; }
      else if (pos === 'topright') { x = width - targetW - 20; y = height - targetH - 20; }
      else if (pos === 'bottomleft') { x = 20; y = 20; }
      else if (pos === 'bottomright') { x = width - targetW - 20; y = 20; }
      else { x = (width - targetW) / 2; y = (height - targetH) / 2; }
      page.drawImage(img, {
        x: x, y: y, width: targetW, height: targetH,
        opacity: opts.opacity, rotate: degrees(opts.rotation),
      });
    }
  });
}

async function applyWatermark() {
  if (!pdfBytes) { showStatus(t('errNoFile'), 'err'); return; }
  showStatus('⏳ Watermarking...', 'work');
  try {
    const pdfDoc = await PDFLib.PDFDocument.load(pdfBytes);
    const pages = pdfDoc.getPages();
    const total = pages.length;
    if (mode === 'text') {
      const text = $('#wmText').value.trim();
      if (!text) { showStatus(t('errNoText'), 'err'); return; }
      const color = hexToRgb01($('#wmColorHex').value);
      const pagesSel = getTargetPages(pdfDoc, $('#wmPages').value, $('#wmCustomPages').value, total);
      await drawTextWatermark(pdfDoc, pagesSel, {
        text: text, size: parseFloat($('#wmSize').value) || 60,
        opacity: parseFloat($('#wmOpacity').value) || 0.3,
        rotation: parseFloat($('#wmRotation').value) || 0,
        color: color, position: $('#wmPos').value,
      });
    } else {
      const imgFile = $('#wmImage').files[0];
      if (!imgFile) { showStatus(t('errNoImage'), 'err'); return; }
      const imgBytes = new Uint8Array(await imgFile.arrayBuffer());
      const pagesSel = getTargetPages(pdfDoc, $('#wmImgPages').value, $('#wmImgCustomPages').value, total);
      await drawImageWatermark(pdfDoc, pagesSel, {
        imageBytes: imgBytes,
        sizePct: parseFloat($('#wmImgSize').value) || 40,
        opacity: parseFloat($('#wmImgOpacity').value) || 0.3,
        rotation: parseFloat($('#wmImgRotation').value) || 0,
        position: $('#wmImgPos').value,
      });
    }
    const out = await pdfDoc.save();
    const blob = new Blob([out], {type: 'application/pdf'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = pdfName.replace(/\.pdf$/i, '') + '-watermarked.pdf';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showStatus(t('okDone'), 'ok');
  } catch (e) {
    showStatus('Error: ' + (e.message || e), 'err');
    console.error(e);
  }
}

function clearAll() {
  pdfBytes = null;
  pdfName = 'document.pdf';
  $('#file').value = '';
  $('#fileCard').style.display = 'none';
  $('#options').classList.remove('show');
  $('#status').className = '';
  $('#wmImage').value = '';
}

$('#btn-apply').innerHTML = '💧 ' + t('lblApply');

// Live value displays
$('#wmOpacity').addEventListener('input', e => $('#opVal').textContent = parseFloat(e.target.value).toFixed(2));
$('#wmRotation').addEventListener('input', e => $('#rotVal').textContent = e.target.value);
$('#wmImgOpacity').addEventListener('input', e => $('#imgOpVal').textContent = parseFloat(e.target.value).toFixed(2));
$('#wmImgRotation').addEventListener('input', e => $('#imgRotVal').textContent = e.target.value);
$('#wmColor').addEventListener('input', e => $('#wmColorHex').value = e.target.value);
$('#wmColorHex').addEventListener('input', e => { if (/^#[0-9a-fA-F]{6}$/.test(e.target.value)) $('#wmColor').value = e.target.value; });
$('#wmPages').addEventListener('change', e => $('#customPagesRow').style.display = e.target.value === 'custom' ? '' : 'none');
$('#wmImgPages').addEventListener('change', e => $('#customImgPagesRow').style.display = e.target.value === 'custom' ? '' : 'none');

const drop = $('#drop');
drop.addEventListener('click', (e) => { if (e.target.tagName !== 'SPAN') return; $('#file').click(); });
$('#file').addEventListener('change', (e) => loadPdf(e.target.files[0]));
['dragenter','dragover'].forEach(ev => drop.addEventListener(ev, e => { e.preventDefault(); drop.classList.add('over'); }));
['dragleave','drop'].forEach(ev => drop.addEventListener(ev, e => { e.preventDefault(); drop.classList.remove('over'); }));
drop.addEventListener('drop', e => { e.preventDefault(); loadPdf(e.dataTransfer.files[0]); });

// Expose pdf-lib globals
const { PDFDocument, rgb, degrees, StandardFonts } = PDFLib;
