    startDate: '委托开始日期', feeType: '费用结构', fee: '费用金额/费率',
    payTerms: '付款条款', lateFee: '滞纳金（可选）', scope: '服务范围（每行一项，最多 8 项）',
    conf: '保密条款', term: '终止通知（如 14 天书面通知）',
    feeHourly: '按小时', feeFixed: '固定费用', feeMilestone: '里程碑', feeRetainer: '月度顾问费',
    generate: '📄 生成委托函', copy: '📋 复制', download: '🖨 下载 PDF',

    step2: '选择费用结构并输入金额/费率',
    step3: '列出服务范围 — 每行一项交付物',
    step4: '点击「生成委托函」，然后下载为 PDF 发送给客户',
  }

const { $, copyText, t } = GZ;
const TYPES = ['hourly','fixed','milestone','retainer'];

function today() {
  const d = new Date();
  return d.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
}

function render() {
  const prov = $('#provName').value.trim() || '[Service Provider]';
  const provBiz = $('#provBiz').value.trim();
  const provEmail = $('#provEmail').value.trim();
  const client = $('#clientName').value.trim() || '[Client]';
  const clientBiz = $('#clientBiz').value.trim();
  const startDate = $('#startDate').value;
  const feeType = $('#feeType').value;
  const fee = $('#fee').value.trim() || '[TBD]';
  const payTerms = $('#payTerms').value.trim() || 'Net 14 days';
  const lateFee = $('#lateFee').value.trim();
  const scopeRaw = $('#scope').value.trim();
  const conf = $('#conf').value;
  const term = $('#term').value.trim() || '14 days written notice';

  const scopeItems = scopeRaw ? scopeRaw.split('\n').map(s => s.trim()).filter(Boolean).slice(0, 8) : [];
  const feeText = {
    hourly: `at an hourly rate of ${fee}`,
    fixed: `for a fixed fee of ${fee}`,
    milestone: `based on milestones totalling ${fee}`,
    retainer: `as a monthly retainer of ${fee}`,
  }[feeType];

  let html = `<h2>Engagement Letter</h2>`;
  html += `<p><em>Date: ${today()}</em></p>\n`;
  html += `<p><strong>${prov}${provBiz ? ` (${provBiz})` : ''}</strong>${provEmail ? ` · ${provEmail}` : ''}<br>\n`;
  html += `<strong>To:</strong> <strong>${client}${clientBiz ? ` (${clientBiz})` : ''}</strong></p>\n`;

  html += `<h3>1. Engagement</h3>`;
  html += `<p>This letter confirms the engagement between <strong>${prov}</strong> ("Provider") and <strong>${client}</strong> ("Client"), effective ${startDate ? new Date(startDate).toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' }) : '[start date]'}. The Provider agrees to perform the services described below for the Client ${feeText}.</p>\n`;

  html += `<h3>2. Scope of Work</h3>`;
  if (scopeItems.length) {
    html += `<p>The Provider will perform the following services:</p><ul>`;
    for (const s of scopeItems) html += `<li>${s.replace(/</g,'&lt;')}</li>`;
    html += `</ul>`;
  } else {
    html += `<p>[To be specified by mutual agreement.]</p>`;
  }

  html += `<h3>3. Fees and Payment</h3>`;
  html += `<p>Client agrees to pay the Provider ${feeText}. Payment terms: <strong>${payTerms}</strong>.`;
  if (lateFee) html += ` Late payments will incur a fee of ${lateFee}.`;
  html += `</p>\n`;

  html += `<h3>4. Confidentiality</h3>`;
  const confText = {
    mutual: 'Both parties agree to keep confidential all non-public information shared during this engagement and to use it solely for the purpose of performing these services.',
    provider: 'The Provider agrees to keep all Client information strictly confidential and to use it solely for the purpose of performing these services.',
    client: 'The Client agrees to keep all Provider information, methods and materials strictly confidential.',
    none: 'No specific confidentiality obligations apply under this engagement.',
  }[conf];
  html += `<p>${confText}</p>\n`;

  html += `<h3>5. Term and Termination</h3>`;
  html += `<p>This engagement begins on the date above and continues until the work is complete or until either party terminates it with ${term}. Upon termination, the Client will pay for all work performed up to the termination date.</p>\n`;

  html += `<h3>6. Intellectual Property</h3>`;
  html += `<p>Upon full payment, the Provider assigns to the Client all rights, title and interest in the final deliverables produced under this engagement. The Provider retains the right to reference the work in their portfolio unless otherwise agreed in writing.</p>\n`;

  html += `<h3>7. Limitation of Liability</h3>`;
  html += `<p>Neither party will be liable to the other for any indirect, incidental or consequential damages arising out of this engagement. The Provider's total liability shall not exceed the fees paid by the Client under this letter.</p>\n`;

  html += `<h3>8. Entire Agreement</h3>`;
  html += `<p>This letter represents the entire agreement between the parties and supersedes any prior discussions or agreements. Amendments must be in writing and signed by both parties.</p>\n`;

  html += `<h3>9. Acceptance</h3>`;
  html += `<p>By signing below, both parties agree to the terms of this engagement.</p>\n`;

  html += `<div class="signature-row">`;
  html += `<div><div class="sig-line">${prov} (Service Provider)<br>Date: ____________</div></div>`;
  html += `<div><div class="sig-line">${client} (Client)<br>Date: ____________</div></div>`;
  html += `</div>`;

  $('#output').innerHTML = html;
}

function copyLetter() {
  const text = $('#output').innerText;
  copyText(text);
}

function downloadPDF() {
  const out = $('#output');
  const w = window.open('', '_blank', 'width=820,height=900');
  w.document.write(`<!DOCTYPE html><html><head><title>Engagement Letter</title>
    <style>
    body{font-family:Georgia,serif;max-width:680px;margin:40px auto;padding:0 24px;line-height:1.6;color:#222;font-size:11pt}
    h2{text-align:center;margin-bottom:20px}
    h3{margin:18px 0 8px;text-decoration:underline}
    p{margin:0 0 10px}
    ul{padding-left:24px}
    .signature-row{display:grid;grid-template-columns:1fr 1fr;gap:30px;margin-top:30px}
    .sig-line{border-top:1px solid #000;margin-top:32px;padding-top:4px;font-size:.9em}
    </style></head><body>${out.innerHTML}</body></html>`);
  w.document.close();
  setTimeout(() => w.print(), 300);
}

function init() {
  $('#lblProv').textContent = t('provName');
  $('#lblProvBiz').textContent = t('provBiz');
  $('#lblProvEmail').textContent = t('provEmail');
  $('#lblClient').textContent = t('clientName');
  $('#lblClientBiz').textContent = t('clientBiz');
  $('#lblStart').textContent = t('startDate');
  $('#lblType').textContent = t('feeType');
  $('#lblFee').textContent = t('fee');
  $('#lblPay').textContent = t('payTerms');
  $('#lblLate').textContent = t('lateFee');
  $('#lblScope').textContent = t('scope');
  $('#lblConf').textContent = t('conf');
  $('#lblTerm').textContent = t('term');

  $('#provName').placeholder = 'Alex Johnson';
  $('#provBiz').placeholder = 'Alex Design Studio';
  $('#provEmail').placeholder = 'alex@example.com';
  $('#clientName').placeholder = 'Sarah Lee';
  $('#clientBiz').placeholder = 'Acme Co.';
  $('#fee').placeholder = '$120/hour or $5,000 fixed';
  $('#payTerms').placeholder = 'Net 14 days';
  $('#lateFee').placeholder = '1.5% per month';
  $('#term').placeholder = '14 days written notice';
  $('#scope').placeholder = 'Brand identity design\nLogo variations (3)\nStyle guide (PDF)\n2 rounds of revisions';

  $('#feeType').innerHTML = TYPES.map(ty => `<option value="${ty}"${ty === 'fixed' ? ' selected' : ''}>${t('fee' + ty[0].toUpperCase() + ty.slice(1))}</option>`).join('');

  // Default values for demo
  $('#provName').value = 'Alex Johnson';
  $('#provBiz').value = 'Alex Design Studio';
  $('#provEmail').value = 'alex@alexdesign.studio';
  $('#clientName').value = 'Sarah Lee';
  $('#clientBiz').value = 'Acme Co.';
  $('#startDate').value = new Date().toISOString().slice(0, 10);
  $('#fee').value = '$5,000 (USD)';
  $('#payTerms').value = 'Net 14 days, 50% deposit on signing';
  $('#scope').value = 'Brand identity package\nLogo design (primary, secondary, monogram)\nColor palette and typography system\nBrand guidelines (12-page PDF)\nSocial media kit (profile + cover)\n2 rounds of revisions';

  document.querySelectorAll('.el-config input, .el-config textarea, .el-config select').forEach(el => el.addEventListener('input', render));

  $('#toolbar').innerHTML = `
    <button class="gz-btn" onclick="render()">${t('generate')}</button>
    <button class="gz-btn gz-btn-secondary" onclick="copyLetter()">${t('copy')}</button>
    <button class="gz-btn gz-btn-secondary" onclick="downloadPDF()">${t('download')}</button>`;

  render();
}

init();

  ]

</script>
