<script>
GZI18n.register({
  en: {

    toolDesc: 'Convert git diffs and commit messages into beautiful changelogs. Supports Markdown, JSON and Keep a Changelog format.',

    step3: 'Click Generate to create the changelog',
    step4: 'Copy the changelog to your CHANGELOG.md',
    faq1q: 'What input formats are supported?',
    faq1a: 'You can paste git diff output, git log output, or plain text commit messages. The tool auto-detects and extracts changes.',
    faq2q: 'What output formats are available?',
    faq2a: 'Markdown, Keep a Changelog format, and JSON. Each optimized for its intended use.',
    faq3q: 'How are changes categorized?',
    faq3a: 'Changes are auto-categorized as Added, Changed, Fixed, Deprecated, Removed, or Security based on conventional commit prefixes and keywords.',
  },
  zh: {
    toolTitle: 'Git Diff 转更新日志生成器',
    toolDesc: '将 git diff 和提交信息转换为精美的更新日志。支持 Markdown、JSON 和 Keep a Changelog 格式。',
    btnGenerate: '生成更新日志',
    btnCopy: '复制',
    btnClear: '清空',
    lblIn: '粘贴 git diff / 提交信息',
    lblOut: '生成的更新日志',
    lblVersion: '版本：',
    lblDate: '日期：',
    lblFormat: '格式：',
    step1: '粘贴 git diff 输出或提交信息',
    step2: '设置版本号、日期和输出格式',
    step3: '点击「生成」创建更新日志',
    step4: '复制更新日志到你的 CHANGELOG.md',
    faq1q: '支持哪些输入格式？',
    faq1a: '可以粘贴 git diff 输出、git log 输出或纯文本提交信息。工具会自动检测并提取变更。',
    faq2q: '支持哪些输出格式？',
    faq2a: 'Markdown、Keep a Changelog 格式和 JSON，各格式针对其用途优化。',
    faq3q: '变更如何分类？',
    faq3a: '根据约定式提交前缀和关键词，自动分类为新增、变更、修复、弃用、移除或安全。',
  }
});

const { $, copyText, t } = GZ;

// Set today's date
$('#date-input').value = new Date().toISOString().split('T')[0];

function categorizeLine(line) {
  const l = line.toLowerCase().trim();
  if (!l) return null;

  // Conventional commit prefixes
  if (/^(feat|feature)(\(|:)/i.test(l)) return 'added';
  if (/^fix(\(|:)/i.test(l)) return 'fixed';
  if (/^(chore|build|ci)(\(|:)/i.test(l)) return 'changed';
  if (/^refactor(\(|:)/i.test(l)) return 'changed';
  if (/^docs(\(|:)/i.test(l)) return 'changed';
  if (/^style(\(|:)/i.test(l)) return 'changed';
  if (/^perf(\(|:)/i.test(l)) return 'changed';
  if (/^test(\(|:)/i.test(l)) return 'changed';
  if (/^deprecat/i.test(l)) return 'deprecated';
  if (/^remov/i.test(l) || /^delete/i.test(l)) return 'removed';
  if (/securi|vuln|cve|xss|csrf/i.test(l)) return 'security';

  // Keyword-based
  if (/\b(add|new|create|introduc|implement|support)\b/i.test(l)) return 'added';
  if (/\b(fix|resolv|repair|patch|correct)\b/i.test(l)) return 'fixed';
  if (/\b(chang|updat|upgrad|improv|modif|adjust|enhanc|optimiz|migrat)\b/i.test(l)) return 'changed';
  if (/\b(deprecat)\b/i.test(l)) return 'deprecated';
  if (/\b(remov|delet)\b/i.test(l)) return 'removed';
  if (/\b(securi|vuln|cve|xss)\b/i.test(l)) return 'security';
  if (/\bbreaking\b/i.test(l)) return 'removed';

  return 'changed';
}

function extractMessage(line) {
  // Remove conventional commit prefix
  let msg = line.replace(/^(feat|feature|fix|chore|refactor|docs|style|perf|test|build|ci|revert)(\([^)]*\))?\s*:\s*/i, '');
  // Remove bullet prefixes
  msg = msg.replace(/^[-*]\s*/, '');
  // Capitalize first letter
  if (msg.length > 0) msg = msg[0].toUpperCase() + msg.slice(1);
  // Ensure ends with period
  if (msg && !/[.!?\]]$/.test(msg)) msg += '.';
  return msg || line.trim();
}

function generate() {
  const input = $('#diff-input').value.trim();
  if (!input) return;

  const lines = input.split('\n').filter(l => l.trim() && !l.startsWith('diff --git') && !l.startsWith('index ') && !l.startsWith('+++') && !l.startsWith('---') && !l.startsWith('@@') && !l.startsWith('#'));
  const categories = { added: [], changed: [], deprecated: [], removed: [], fixed: [], security: [] };

  lines.forEach(line => {
    const cat = categorizeLine(line);
    if (cat && categories[cat]) {
      const msg = extractMessage(line);
      if (msg && !categories[cat].includes(msg)) {
        categories[cat].push(msg);
      }
    }
  });

  const version = $('#version-input').value || '1.0.0';
  const date = $('#date-input').value || new Date().toISOString().split('T')[0];
  const format = $('#format-select').value;

  let output = '';

  if (format === 'keepachangelog') {
    output = `## [${version}] - ${date}\n\n`;
    const labels = {
      added: '### Added', changed: '### Changed', deprecated: '### Deprecated',
      removed: '### Removed', fixed: '### Fixed', security: '### Security'
    };
    for (const [cat, items] of Object.entries(categories)) {
      if (items.length > 0) {
        output += labels[cat] + '\n\n';
        items.forEach(item => { output += `- ${item}\n`; });
        output += '\n';
      }
    }
  } else if (format === 'markdown') {
    output = `# Changelog\n\n## ${version} (${date})\n\n`;
    const labels = { added: '**New Features:**', changed: '**Changes:**', deprecated: '**Deprecated:**', removed: '**Breaking Changes:**', fixed: '**Bug Fixes:**', security: '**Security:**' };
    for (const [cat, items] of Object.entries(categories)) {
      if (items.length > 0) {
        output += labels[cat] + '\n\n';
        items.forEach(item => { output += `- ${item}\n`; });
        output += '\n';
      }
    }
  } else if (format === 'json') {
    const data = { version, date, changes: {} };
    for (const [cat, items] of Object.entries(categories)) {
      if (items.length > 0) data.changes[cat] = items;
    }
    output = JSON.stringify(data, null, 2);
  }

  $('#changelog-output').textContent = output;
}

GZ.renderToolPage({
  toolbar: [
    { label: t('btnGenerate'), action: generate },
    { label: t('btnCopy'), action: () => copyText($('#changelog-output').textContent) },

  ],
  howto: [t('step1'), t('step2'), t('step3'), t('step4')],
  faq: [
    { q: t('faq1q'), a: t('faq1a') },
    { q: t('faq2q'), a: t('faq2a') },
    { q: t('faq3q'), a: t('faq3a') },
  ],
  related: ['changelog-generator', 'git-commands', 'gitignore-generator', 'git-branch-generator', 'markdown-preview']
});

$('#lbl-in').textContent = t('lblIn');
$('#lbl-out').textContent = t('lblOut');

$('#lbl-date').textContent = t('lblDate');
$('#lbl-format').textContent = t('lblFormat');
</script>
