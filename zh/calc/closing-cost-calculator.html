<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "How much are closing costs?", "acceptedAnswer": {"@type": "Answer", "text": "Closing costs typically run 2% to 5% of the home's purchase price. On a $400,000 home that's $8,000 to $20,000. Buyers with excellent credit and low-tax states trend toward the low end; high-tax states like NY, NJ, and HI often reach 4-5%."}}, {"@type": "Question", "name": "What fees are included in closing costs?", "acceptedAnswer": {"@type": "Answer", "text": "Common closing costs include the loan origination fee, appraisal, credit report, title search and insurance, escrow or attorney fees, recording fees, transfer taxes, prepaid property taxes, homeowners insurance, and the first year of mortgage insurance if applicable."}}, {"@type": "Question", "name": "Who pays closing costs — buyer or seller?", "acceptedAnswer": {"@type": "Answer", "text": "Buyers pay most closing costs. Sellers usually pay the real-estate commission (5-6%) and, in some markets, offer concessions that cover part of the buyer's closing costs. You can negotiate seller concessions of 3-6% of the price in buyer-friendly markets."}}, {"@type": "Question", "name": "Is my data sent anywhere?", "acceptedAnswer": {"@type": "Answer", "text": "No. Every calculation happens locally in your browser. No inputs are uploaded, saved, or shared with any server."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="cc-form">
      <label><span data-i18n="lblPrice"></span><input type="number" id="price" min="0" step="1000" value="450000"></label>
      <label><span data-i18n="lblDown"></span><input type="number" id="down" min="0" step="1000" value="90000"></label>
      <label><span data-i18n="lblLoanType"></span>
        <select id="loanType">
          <option value="conv" selected>Conventional</option>
          <option value="fha">FHA</option>
          <option value="va">VA</option>
        </select>
      </label>
      <label><span data-i18n="lblTaxRate"></span><input type="number" id="taxRate" min="0" step="0.1" value="1.1"></label>
    </div>
    <div class="cc-tiles" id="tiles"></div>
    <div class="cc-breakdown" id="breakdown"></div>
    <div class="cc-tip">💡 <span id="tip"></span></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Closing Cost Calculator',
    toolDesc: 'Estimate the closing costs you\'ll pay as a home buyer — origination, appraisal, title, escrow, taxes, insurance and recording fees. See a full line-item breakdown and how it compares to your purchase price. 100% private, browser-only.',
    lblPrice: 'Home Purchase Price ($)',
    lblDown: 'Down Payment ($)',
    lblLoanType: 'Loan Type',
    lblTaxRate: 'Property Tax Rate (%/yr)',
    tileTotal: 'Total Closing Costs',
    tilePercent: 'Cost-to-Price %',
    tileCashNeeded: 'Cash to Close',
    tilePrepaid: 'Prepaids & Escrow',
    tileLender: 'Lender Fees',
    tip: 'Tip: Budget 2-5% of the price for closing costs and keep it separate from your down payment. In a buyer\'s market, ask the seller for a 3% concession — they\'d often rather credit closing costs than drop the price.',
    step1: 'Enter the home purchase price and your down payment',
    step2: 'Pick your loan type and local property-tax rate',
    step3: 'Review the line-item breakdown of every fee',
    step4: 'Use Cash-to-Close to know exactly what to bring on signing day',
  },
  zh: {
    toolTitle: '过户费用计算器',
    toolDesc: '估算购房时买家需支付的过户费用 — 贷款手续费、评估费、产权、托管、税费、保险和登记费。查看完整明细，了解费用与房价的比例。100% 私密，浏览器本地运行。',
    lblPrice: '房屋购买价 ($)',
    lblDown: '首付 ($)',
    lblLoanType: '贷款类型',
    lblTaxRate: '房产税年税率 (%)',
    tileTotal: '过户费用总计',
    tilePercent: '费用占房价 %',
    tileCashNeeded: '需带现金',
    tilePrepaid: '预付金 & 托管',
    tileLender: '贷款机构费用',
    tip: '提示：按房价的 2-5% 预留过户费用，并与首付分开存放。在买方市场中，可向卖家申请 3% 的费用补贴 — 他们通常更愿意补贴过户费而非直接降价。',
    step1: '输入房屋购买价和首付金额',
    step2: '选择贷款类型和当地房产税税率',
    step3: '查看每项费用的明细分解',
    step4: '用「需带现金」明确过户当天要带的金额',
  }
});

const { $, $$, t } = GZ;
$$('[data-i18n]').forEach(el => { el.textContent = t(el.dataset.i18n); });

function calc() {
  const price = Math.max(0, +$('#price').value || 0);
  const down = Math.max(0, +$('#down').value || 0);
  const loanType = $('#loanType').value;
  const taxRate = Math.max(0, +$('#taxRate').value || 0) / 100;
  const loan = Math.max(0, price - down);

  // Itemized closing-cost estimates (typical US ranges)
  const items = [];
  // Lender fees
  items.push({key:'origination', en:'Loan Origination Fee (1%)', zh:'贷款手续费 (1%)', val: loan * 0.01});
  items.push({key:'points', en:'Discount Points (0)', zh:'贴现点数 (0)', val: 0});
  items.push({key:'appraisal', en:'Appraisal Fee', zh:'评估费', val: 550});
  items.push({key:'credit', en:'Credit Report', zh:'信用报告费', val: 60});
  items.push({key:'underwriting', en:'Underwriting / Processing', zh:'审批处理费', val: 850});
  // Title & escrow
  items.push({key:'titleLender', en:'Lender Title Insurance', zh:'贷款方产权保险', val: loan * 0.0025});
  items.push({key:'titleOwner', en:'Owner Title Insurance', zh:'业主产权保险', val: price * 0.0035});
  items.push({key:'titleSearch', en:'Title Search & Exam', zh:'产权查询', val: 250});
  items.push({key:'escrow', en:'Escrow / Settlement Fee', zh:'托管/结算费', val: 550});
  items.push({key:'notary', en:'Notary Fee', zh:'公证费', val: 150});
  // Government
  items.push({key:'recording', en:'Recording Fees', zh:'登记费', val: 125});
  items.push({key:'transfer', en:'Transfer Tax (~0.4%)', zh:'交易税 (~0.4%)', val: price * 0.004});
  // Survey & inspections
  items.push({key:'survey', en:'Survey', zh:'勘测费', val: 400});
  items.push({key:'inspection', en:'Home Inspection', zh:'房屋检查', val: 450});
  // Prepaids & escrow
  items.push({key:'taxPrepaid', en:'Property Tax (6 mo escrow)', zh:'房产税 (6个月托管)', val: (price * taxRate) / 2});
  items.push({key:'insPrepaid', en:'Homeowners Insurance (1 yr)', zh:'房屋保险 (1年)', val: 1400});
  items.push({key:'interestPrepaid', en:'Prepaid Interest (~15 days)', zh:'预付利息 (~15天)', val: (loan * 0.068 / 365) * 15});
  // Upfront MI
  let upfrontMI = 0;
  if (loanType === 'fha') upfrontMI = loan * 0.0175;
  else if (loanType === 'va') upfrontMI = loan * 0.033;
  if (upfrontMI > 0) {
    items.push({key:'upfrontMI', en: loanType==='fha'?'Upfront FHA MIP':'VA Funding Fee', zh: loanType==='fha'?'FHA 预付保险':'VA 融资费', val: upfrontMI});
  }

  const lenderFees = ['origination','points','appraisal','credit','underwriting'].reduce((s,k)=>s+items.find(i=>i.key===k).val,0);
  const prepaid = ['taxPrepaid','insPrepaid','interestPrepaid'].reduce((s,k)=>s+items.find(i=>i.key===k).val,0);
  const total = items.reduce((s,i)=>s+i.val,0);
  const percent = price > 0 ? total / price * 100 : 0;
  const cashToClose = total + down;

  const cfmt = v => '$' + v.toFixed(0).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
  $('#tiles').innerHTML = `
    <div class="cc-tile"><div class="num">${cfmt(total)}</div><div class="lbl">${t('tileTotal')}</div></div>
    <div class="cc-tile"><div class="num">${percent.toFixed(1)}%</div><div class="lbl">${t('tilePercent')}</div></div>
    <div class="cc-tile"><div class="num">${cfmt(cashToClose)}</div><div class="lbl">${t('tileCashNeeded')}</div></div>
    <div class="cc-tile"><div class="num">${cfmt(prepaid)}</div><div class="lbl">${t('tilePrepaid')}</div></div>
    <div class="cc-tile"><div class="num">${cfmt(lenderFees)}</div><div class="lbl">${t('tileLender')}</div></div>`;

  const lang = (document.documentElement.lang === 'zh' || (window.GZI18n && GZI18n.lang === 'zh')) ? 'zh' : 'en';
  let html = '<table><thead><tr><th>' + (lang==='zh'?'费用项目':'Fee') + '</th><th>' + (lang==='zh'?'金额':'Amount') + '</th></tr></thead><tbody>';
  items.forEach(i => {
    html += `<tr><td>${i[lang]}</td><td>${cfmt(i.val)}</td></tr>`;
  });
  html += `<tr class="total"><td>${lang==='zh'?'过户费用总计':'Total Closing Costs'}</td><td>${cfmt(total)}</td></tr>`;
  html += `<tr class="total"><td>${lang==='zh'?'+ 首付':'+ Down Payment'}</td><td>${cfmt(down)}</td></tr>`;
  html += `<tr class="total"><td>${lang==='zh'?'= 需带现金':'= Cash to Close'}</td><td>${cfmt(cashToClose)}</td></tr>`;
  html += '</tbody></table>';
  $('#breakdown').innerHTML = html;
  $('#tip').textContent = t('tip');
}

$('#toolbar').innerHTML = '';
['price','down','loanType','taxRate'].forEach(id => {
  $('#' + id).addEventListener('input', calc);
  $('#' + id).addEventListener('change', calc);
});

calc();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🏠', href:'/calc/mortgage-calculator.html', name:'Mortgage Calculator'},
    {icon:'💵', href:'/calc/down-payment-calculator.html', name:'Down Payment'},
    {icon:'🔒', href:'/calc/pmi-calculator.html', name:'PMI Calculator'},
    {icon:'🏘️', href:'/calc/home-affordability-calculator.html', name:'Home Affordability'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
