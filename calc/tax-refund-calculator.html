<script>
GZI18n.register({
  en: {
    toolTitle: 'Tax Refund Estimator',
    toolDesc: 'Estimate your US federal tax refund or balance owed — enter income, filing status and withholding. Uses 2024 tax brackets. Free, private, browser-based.',
    income: 'Total Annual Income ($)',
    status: 'Filing Status',
    withheld: 'Total Tax Withheld ($)',
    deductionType: 'Deduction Type',
    customDeduction: 'Custom Deduction Amount ($)',

    oweResult: 'Estimated Tax Owed',
    taxLiability: 'Estimated Tax Liability',
    taxableIncome: 'Taxable Income',
    effectiveRate: 'Effective Tax Rate',
    marginalRate: 'Marginal Rate',
    refund: 'You will receive a refund 🎉',
    owe: 'You owe additional tax',
    bracketTitle: '2024 Federal Tax Brackets Used',
    disclaimer: '⚠️ This is a simplified estimate using 2024 US federal brackets only. It does NOT include state taxes, tax credits (child, education, earned income), self-employment tax, capital gains, or itemized deductions beyond what you enter. Always consult a tax professional or the IRS for your actual tax.',
    step1: 'Enter your total annual income from all sources',
    step2: 'Select your filing status (Single, Married, or Head of Household)',
    step3: 'Enter total federal tax withheld from your W-2(s)',
    step4: 'Read your estimated refund or amount owed',
  },
  zh: {
    toolTitle: '退税估算器',
    toolDesc: '估算美国联邦退税或应补税额 — 输入收入、申报身份和预扣税。使用 2024 税率表。免费、私密、浏览器本地运行。',
    income: '全年总收入 ($)',
    status: '申报身份',
    withheld: '已预扣联邦税 ($)',
    deductionType: '扣除方式',
    customDeduction: '自定义扣除额 ($)',
    calculate: '计算退税',
    refundResult: '预计退税',
    oweResult: '预计应补税',
    taxLiability: '预计应纳税额',
    taxableIncome: '应纳税收入',
    effectiveRate: '实际税率',
    marginalRate: '边际税率',
    refund: '你将获得退税 🎉',
    owe: '你需要补缴税款',
    bracketTitle: '使用的 2024 年联邦税率表',
    disclaimer: '⚠️ 这是使用 2024 年美国联邦税率表的简化估算。不包含州税、税收抵免（子女、教育、劳动所得）、自雇税、资本利得或超出你输入的逐项扣除。实际报税请咨询税务专业人士或 IRS。',
    step1: '输入所有来源的全年总收入',
    step2: '选择申报身份（单身、已婚联合或户主）',
    step3: '输入 W-2 表上的联邦预扣税总额',
    step4: '查看预计退税或应补税额',
  }
});

const { $, t } = GZ;

// 2024 US Federal Tax Brackets (taxes filed in 2025)
const BRACKETS = {
  single: [[0,0.10],[11600,0.12],[47150,0.22],[100525,0.24],[191950,0.32],[243725,0.35],[609350,0.37]],
  married: [[0,0.10],[23200,0.12],[94300,0.22],[201050,0.24],[383900,0.32],[487450,0.35],[731200,0.37]],
  hoh: [[0,0.10],[16550,0.12],[63100,0.22],[100500,0.24],[191950,0.32],[243700,0.35],[609350,0.37]],
};
const STD_DEDUCTION = { single: 14600, married: 29200, hoh: 21900 };

function fmt(n) { return '$' + Math.abs(n).toLocaleString('en-US', {minimumFractionDigits:0, maximumFractionDigits:0}); }

function calcTax(taxable, status) {
  const brackets = BRACKETS[status];
  let tax = 0;
  let marginal = 0;
  for (let i = 0; i < brackets.length; i++) {
    const [floor, rate] = brackets[i];
    const ceil = i < brackets.length - 1 ? brackets[i+1][0] : Infinity;
    if (taxable > floor) {
      const taxableInBracket = Math.min(taxable, ceil) - floor;
      tax += taxableInBracket * rate;
      marginal = rate;
    } else break;
  }
  return { tax, marginal };
}

function calculate() {
  const income = parseFloat($('#income').value) || 0;
  const status = $('#status').value;
  const withheld = parseFloat($('#withheld').value) || 0;
  const useCustom = $('#deduction-type').value === 'custom';
  const deduction = useCustom ? (parseFloat($('#custom-deduction').value) || 0) : STD_DEDUCTION[status];

  const taxable = Math.max(0, income - deduction);
  const { tax, marginal } = calcTax(taxable, status);
  const diff = withheld - tax;
  const isRefund = diff >= 0;
  const effective = income > 0 ? (tax / income) * 100 : 0;

  const cls = isRefund ? 'refund' : 'owe';
  const label = isRefund ? t('refundResult') : t('oweResult');
  const verdict = isRefund ? t('refund') : t('owe');

  $('#results').innerHTML = `
    <div class="result-banner ${cls}">
      <div class="label">${label}</div>
      <div class="value">${fmt(Math.abs(diff))}</div>
      <div style="font-size:.9em;font-weight:600">${verdict}</div>
    </div>
    <div class="summary-grid">
      <div class="summary-card"><div class="label">${t('taxableIncome')}</div><div class="value">${fmt(taxable)}</div></div>
      <div class="summary-card"><div class="label">${t('taxLiability')}</div><div class="value">${fmt(tax)}</div></div>
      <div class="summary-card"><div class="label">${t('effectiveRate')}</div><div class="value">${effective.toFixed(1)}%</div></div>
      <div class="summary-card"><div class="label">${t('marginalRate')}</div><div class="value">${(marginal*100).toFixed(0)}%</div></div>
    </div>`;

  $('#disclaimer').textContent = t('disclaimer');
}

// Labels
$('#lbl-income').textContent = t('income');
$('#lbl-status').textContent = t('status');
$('#lbl-withheld').textContent = t('withheld');
$('#lbl-deduction-type').textContent = t('deductionType');
$('#lbl-custom-deduction').textContent = t('customDeduction');
$('#btn-calc').textContent = t('calculate');

$('#deduction-type').addEventListener('change', e => {
  $('#custom-deduction-field').style.display = e.target.value === 'custom' ? 'flex' : 'none';
});

['income','status','withheld','custom-deduction'].forEach(id => {
  $('#' + id).addEventListener('input', calculate);
  $('#' + id).addEventListener('change', calculate);
});

$('#btn-calc').addEventListener('click', calculate);
$('#toolbar').innerHTML = '';

calculate();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],

    {icon:'📈', href:'/calc/pay-raise-calculator.html', name:'Pay Raise'},
    {icon:'🏦', href:'/calc/loan-calculator.html', name:'Loan'},
  ]
});
</script>
