<script>

    step1: '按 TeamID.BundleID 格式输入 App ID',
    step2: '添加 paths（如 /buy/*）和 components（如 /buy/、?sku=*）以放行',

const { $, copyText, t } = GZ;

let apps = [{appId:'', paths:[''], components:[{value:'', exclude:false}]}];

function renderApps(){
  const container = $('#apps');
  container.innerHTML = apps.map((app, i) => `
    <div class="app-block">
      <h3>App ${i+1} ${apps.length>1?`<button class="rm-btn" onclick="removeApp(${i})">${t('remove')}</button>`:''}</h3>
      <div class="field">
        <label>${t('appIdLabel')}</label>
        <input type="text" data-app="${i}" data-field="appId" value="${escapeAttr(app.appId)}" placeholder="${t('appIdPh')}">
      </div>
      <div class="field">
        <label>${t('pathsLabel')}</label>
        ${app.paths.map((p,pi) => `
          <div class="path-row">
            <input type="text" data-app="${i}" data-pkind="paths" data-pidx="${pi}" value="${escapeAttr(p)}" placeholder="/buy/*">
            <button class="rm-path" onclick="removePath(${i},'paths',${pi})">✕</button>
          </div>`).join('')}
        <button class="gz-btn gz-btn-secondary" style="font-size:.78rem;padding:3px 10px;margin-top:4px" onclick="addPath(${i},'paths')">${t('addPath')}</button>
      </div>
      <div class="field">
        <label>${t('componentsLabel')}</label>
        ${app.components.map((c,ci) => `
          <div class="path-row">
            <select data-app="${i}" data-pkind="components" data-pidx="${ci}" data-csel="exclude" style="max-width:90px">
              <option value="false" ${!c.exclude?'selected':''}>include</option>
              <option value="true" ${c.exclude?'selected':''}>${t('exclude')}</option>
            </select>
            <input type="text" data-app="${i}" data-pkind="components" data-pidx="${ci}" value="${escapeAttr(c.value)}" placeholder="/, /buy/, ?sku=*, #section">
            <button class="rm-path" onclick="removePath(${i},'components',${ci})">✕</button>
          </div>`).join('')}
        <button class="gz-btn gz-btn-secondary" style="font-size:.78rem;padding:3px 10px;margin-top:4px" onclick="addPath(${i},'components')">${t('addComponent')}</button>
      </div>
    </div>`).join('');

  // Show add-app button as floating toolbar
  const addAppBtn = `<button class="gz-btn" style="font-size:.85rem" onclick="addApp()">${t('addApp')}</button>`;
  if(!container.querySelector('.add-app-footer')){
    const f = document.createElement('div');
    f.className = 'add-app-footer';
    f.style.marginTop = '.4rem';
    f.innerHTML = addAppBtn;
    container.appendChild(f);
  } else {
    container.querySelector('.add-app-footer').innerHTML = addAppBtn;
  }
  bindInputs();
}

function escapeAttr(s){return (s||'').replace(/"/g,'&quot;').replace(/</g,'&lt;');}

function bindInputs(){
  document.querySelectorAll('#apps [data-app]').forEach(el => {
    const handler = () => {
      const ai = +el.dataset.app;
      const fk = el.dataset.field;
      const pk = el.dataset.pkind;
      const pi = el.dataset.pidx != null ? +el.dataset.pidx : null;
      if(fk){ apps[ai][fk] = el.value; }
      else if(pk === 'paths'){ apps[ai].paths[pi] = el.value; }
      else if(pk === 'components'){
        if(el.dataset.csel === 'exclude'){ apps[ai].components[pi].exclude = (el.value === 'true'); }
        else { apps[ai].components[pi].value = el.value; }
      }
      generate();
    };
    el.oninput = handler;
    el.onchange = handler;
  });
}

function addApp(){
  apps.push({appId:'', paths:[''], components:[{value:'', exclude:false}]});
  renderApps();
  generate();
}
function removeApp(i){
  apps.splice(i,1);
  renderApps();
  generate();
}
function addPath(ai,kind){
  if(kind === 'paths'){ apps[ai].paths.push(''); }
  else { apps[ai].components.push({value:'', exclude:false}); }
  renderApps();
  generate();
}
function removePath(ai,kind,pi){
  apps[ai][kind].splice(pi,1);
  if(kind === 'paths' && apps[ai].paths.length === 0) apps[ai].paths.push('');
  if(kind === 'components' && apps[ai].components.length === 0) apps[ai].components.push({value:'', exclude:false});
  renderApps();
  generate();
}

function generate(){
  const detail = apps.filter(a => a.appId.trim() || a.paths.some(p=>p.trim()) || a.components.some(c=>c.value.trim())).map(app => {
    const cleanedPaths = app.paths.map(p => p.trim()).filter(Boolean);
    const cleanedComps = app.components.filter(c => c.value.trim()).map(c => {
      const o = {};
      // Detect query/fragment/path prefix
      const v = c.value.trim();
      if(v.startsWith('?')) o['?'] = v.substring(1);
      else if(v.startsWith('#')) o['#'] = v.substring(1);
      else o['/'] = v;
      if(c.exclude) o.exclude = true;
      return o;
    });
    const entry = { appID: app.appId.trim() || 'TEAMID.com.example.app' };
    if(cleanedPaths.length) entry.paths = cleanedPaths;
    if(cleanedComps.length) entry.components = cleanedComps;
    return entry;
  });

  const aasa = {
    applinks: {
      details: detail.length ? detail : [{
        appIDs: ['TEAMID.com.example.app'],
        components: ['/']
      }]
    },
    webcredentials: { apps: detail.length ? detail.map(d => d.appID) : ['TEAMID.com.example.app'] }
  };

  $('#output').textContent = JSON.stringify(aasa, null, 2);
}

function downloadFile(){
  const blob = new Blob([$('#output').textContent], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'apple-app-site-association';
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
}

$('#output-label').textContent = t('outputLabel');
$('#note').textContent = t('note');

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="generate()">${t('copy').includes('JSON')?'Generate':'Generate'}</button>
  <button class="gz-btn gz-btn-secondary" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="downloadFile()">${t('download')}</button>`;

// Initial render with sample defaults
apps = [{
  appId: 'ABCDE12345.com.example.app',
  paths: ['/buy/*', 'NOT /buy/other/*'],
  components: [
    {value:'/buy/', exclude:false},
    {value:'/buy/other/', exclude:true},
    {value:'?sku=*', exclude:false}
  ]
}];
renderApps();
generate();

});
</script>
