<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is BMI Prime?", "acceptedAnswer": {"@type": "Answer", "text": "BMI Prime is the ratio of your actual BMI to the upper limit of normal BMI (25). A BMI Prime of 0.74 means you're at 74% of the overweight threshold; 1.0 means you're exactly at the threshold; 1.2 means you're 20% over it. It's a simpler, more intuitive way to express BMI."}}, {"@type": "Question", "name": "What's the difference between BMI and BMI Prime?", "acceptedAnswer": {"@type": "Answer", "text": "BMI is the raw number (e.g. 28.5 kg/m\u00b2). BMI Prime divides BMI by 25 to show how far above or below the 'normal' cutoff you are. BMI Prime makes it easier to compare across different heights and to track small changes over time."}}, {"@type": "Question", "name": "Is BMI Prime more accurate than BMI?", "acceptedAnswer": {"@type": "Answer", "text": "Not necessarily more accurate, but easier to interpret. Both BMI and BMI Prime are screening tools that don't directly measure body fat. Athletes and very muscular people can have high BMI without being unhealthy. Use BMI Prime alongside waist-to-height ratio for a fuller picture."}}, {"@type": "Question", "name": "What is the Ponderal Index?", "acceptedAnswer": {"@type": "Answer", "text": "The Ponderal Index (PI) is similar to BMI but uses height cubed instead of squared: weight / height\u00b3. It's preferred for very tall or very short people because it reduces the bias BMI has at the extremes of height."}}]}</script>

<script>
GZI18n.register({
  en: {
    toolTitle: 'BMI Prime Calculator',
    toolDesc: 'Calculate your BMI Prime — the simple ratio of BMI to the upper limit of normal BMI (25). Includes BMI, Ponderal Index and category, with metric and imperial units.',
    weightMetric: 'Weight (kg)',
    weightImp: 'Weight (lb)',
    heightMetric: 'Height (cm)',
    heightImp: 'Height (in)',
    bmiLbl: 'BMI',
    primeLbl: 'BMI Prime',
    ponderalLbl: 'Ponderal Index',
    idealLbl: 'BMI Prime interpretation',
    catUnder: 'Underweight',
    catNormal: 'Normal weight',
    catOver: 'Overweight',
    catObese1: 'Obese class I',
    catObese2: 'Obese class II',
    catObese3: 'Obese class III',
    primeExplained: 'BMI Prime 0.74 = 74% of upper normal BMI limit. 1.00 = exactly at the threshold.',
    step1: 'Choose metric or imperial units',
    step2: 'Enter your weight and height',
    step3: 'Read your BMI, BMI Prime, Ponderal Index and category',
    step4: 'Use the color-coded bar to see where you fall on the scale',
    note: 'BMI is a screening tool, not a diagnosis. It doesn\'t distinguish muscle from fat. Athletes and very muscular people often score "overweight" or "obese" while being perfectly healthy. Combine BMI Prime with waist-to-height ratio (WtHR) and a body-fat measurement for a fuller picture.'
  },
  zh: {
    toolTitle: 'BMI 比率计算器',
    toolDesc: '计算 BMI Prime — 实际 BMI 与正常 BMI 上限（25）的简单比值。包含 BMI、Ponderal 指数和分类，支持公制和英制单位。',
    weightMetric: '体重（公斤）',
    weightImp: '体重（磅）',
    heightMetric: '身高（厘米）',
    heightImp: '身高（英寸）',
    bmiLbl: 'BMI',
    primeLbl: 'BMI 比率',
    ponderalLbl: 'Ponderal 指数',
    idealLbl: 'BMI 比率解读',
    catUnder: '偏瘦',
    catNormal: '正常',
    catOver: '超重',
    catObese1: '肥胖 I 度',
    catObese2: '肥胖 II 度',
    catObese3: '肥胖 III 度',
    primeExplained: 'BMI 比率 0.74 = 正常上限的 74%。1.00 = 刚好达到阈值。',
    step1: '选择公制或英制单位',
    step2: '输入体重和身高',
    step3: '查看 BMI、BMI 比率、Ponderal 指数和分类',
    step4: '使用颜色编码的进度条查看你在量表上的位置',
    note: 'BMI 是一个筛查工具，不是诊断。它无法区分肌肉和脂肪。运动员和肌肉非常发达的人常常被评为"超重"或"肥胖"，但实际非常健康。请将 BMI 比率与腰高比 (WtHR) 和体脂测量结合使用，以获得更全面的评估。'
  }
});

const { $, t } = GZ;
let units = 'metric';

function setUnits(u) {
  units = u;
  $('#units').querySelectorAll('button').forEach(b => b.classList.toggle('active', b.dataset.u === u));
  $('#lbl-weight').textContent = t(u === 'metric' ? 'weightMetric' : 'weightImp');
  $('#lbl-height').textContent = t(u === 'metric' ? 'heightMetric' : 'heightImp');
  calc();
}

function getBmi() {
  const w = parseFloat($('#weight').value);
  const h = parseFloat($('#height').value);
  if (!w || !h || w <= 0 || h <= 0) return null;
  let wKg, hM;
  if (units === 'metric') {
    wKg = w; hM = h / 100;
  } else {
    wKg = w * 0.45359237;
    hM = (h * 2.54) / 100;
  }
  if (hM <= 0) return null;
  const bmi = wKg / (hM * hM);
  const prime = bmi / 25;
  const ponderal = wKg / Math.pow(hM, 3);
  return { bmi, prime, ponderal, wKg, hM };
}

function categoryFor(prime) {
  if (prime < 0.74) return { key: 'catUnder', color: '#61afef', pos: Math.max(0, (prime / 0.74) * 18.5) };
  if (prime < 1.0) return { key: 'catNormal', color: '#00d672', pos: 18.5 + ((prime - 0.74) / 0.26) * 6.5 };
  if (prime < 1.2) return { key: 'catOver', color: '#f0c419', pos: 25 + ((prime - 1.0) / 0.2) * 5 };
  if (prime < 1.4) return { key: 'catObese1', color: '#ff6b6b', pos: 30 + ((prime - 1.2) / 0.2) * 5 };
  if (prime < 1.6) return { key: 'catObese2', color: '#e94560', pos: 35 + ((prime - 1.4) / 0.2) * 5 };
  return { key: 'catObese3', color: '#8b0000', pos: Math.min(100, 40 + (prime - 1.6) * 10) };
}

function calc() {
  const r = getBmi();
  if (!r) { $('#result').innerHTML = ''; return; }
  const cat = categoryFor(r.prime);
  $('#result').innerHTML = `
    <div class="bp-result">
      <div class="bp-result-main">
        <div class="big" style="color:${cat.color}">${r.bmi.toFixed(1)}</div>
        <div class="lbl">${t('bmiLbl')} (kg/m\u00b2)</div>
        <div class="bp-cat" style="background:${cat.color};color:#fff">${t(cat.key)}</div>
      </div>
      <div class="bp-bar">
        <div class="bp-marker" style="left:${cat.pos}%"></div>
      </div>
      <div class="bp-scale"><span>15</span><span>18.5</span><span>25</span><span>30</span><span>40+</span></div>
      <div class="bp-grid2" style="margin-top:18px">
        <div class="bp-stat"><div class="v">${r.prime.toFixed(2)}</div><div class="l">${t('primeLbl')}</div></div>
        <div class="bp-stat"><div class="v">${r.ponderal.toFixed(1)}</div><div class="l">${t('ponderalLbl')} (kg/m\u00b3)</div></div>
      </div>
      <div class="bp-note">${t('note')}</div>
    </div>`;
}

$('#units').querySelectorAll('button').forEach(b => b.addEventListener('click', () => setUnits(b.dataset.u)));
['#weight','#height'].forEach(s => $(s).addEventListener('input', calc));

setUnits('metric');

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'\u2696\ufe0f', href:'/calc/bmi-calculator.html', name:'BMI Calculator'},
    {icon:'\ud83d\udcca', href:'/calc/body-fat.html', name:'Body Fat %'},
    {icon:'\ud83c\udf21', href:'/calc/ideal-weight.html', name:'Ideal Weight'},
    {icon:'\ud83d\udcaa', href:'/calc/bmr-calculator.html', name:'BMR Calculator'},
  ]
});
</script>
<script src="/tools-result-rec.js?v=20260707v520" defer></script>
</body>
