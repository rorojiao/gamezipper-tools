<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is a GTIN?", "acceptedAnswer": {"@type": "Answer", "text": "GTIN stands for Global Trade Item Number — the GS1 standard identifier for products. It comes in four lengths: GTIN-8, GTIN-12 (also called UPC-A), GTIN-13 (also called EAN-13) and GTIN-14. The last digit is always a check digit."}}, {"@type": "Question", "name": "What is the difference between UPC, EAN and GTIN?", "acceptedAnswer": {"@type": "Answer", "text": "UPC-A is the 12-digit barcode used mainly in North America. EAN-13 is the 13-digit global version. GTIN is the modern umbrella term — UPC-A is GTIN-12 and EAN-13 is GTIN-13. They all use the same GS1 check-digit math."}}, {"@type": "Question", "name": "How is the check digit calculated?", "acceptedAnswer": {"@type": "Answer", "text": "GS1 multiplies digits in odd and even positions by 3 and 1 alternately, sums them, and picks the check digit that rounds the total up to the next multiple of 10. This tool computes that for you and tells you what the correct digit should be."}}, {"@type": "Question", "name": "Does this tool look up real product information?", "acceptedAnswer": {"@type": "Answer", "text": "No. It only verifies whether the number is mathematically valid according to the GS1 algorithm. It does not connect to any product database and does not send your number anywhere."}}]}</script>

const { $, copyText, t } = GZ;

// GS1 / GTIN check digit (Modulo 10)
function gs1CheckDigit(digits){
  // digits: array of numbers (without check digit), most significant first
  // GS1 weights: position from the RIGHT (the check digit is rightmost = pos 1)
  // For the data digits, rightmost data digit gets weight 3, next gets 1, alternating.
  let sum = 0;
  const len = digits.length;
  for(let i=0;i<len;i++){
    // distance from right edge of full number (data + check) = len - i
    const fromRight = len - i; // 1-based from right of data section
    // In the FULL number, the check digit occupies fromRight=0.
    // The data digit at array index i sits at position (len-i) from right of data,
    // which is position (len-i) from right of full number too.
    // GS1: odd positions from right (1,3,5...) get weight 3; even get 1.
    // But position 1 (rightmost = check) is excluded. Data's rightmost is position 2 => weight 1? No.
    // Standard: multiply by 3 every second digit counting from the right, starting with weight 3 on the rightmost DATA digit.
    const weight = (fromRight % 2 === 1) ? 3 : 1;
    sum += digits[i] * weight;
  }
  return (10 - (sum % 10)) % 10;
}

function typeLabel(len){
  return {8:t('type8'),12:t('type12'),13:t('type13'),14:t('type14')}[len] || t('unsupported');
}

function validate(){
  const raw = $('#input').value.trim();
  $('#result').innerHTML = '';
  if(!raw){ $('#status').innerHTML = `<span style="opacity:.6">${t('enterNum')}</span>`; return; }
  const cleaned = raw.replace(/[\s-]/g,'');
  if(!/^\d+$/.test(cleaned)){
    $('#status').innerHTML = `<span style="color:var(--gz-accent2,#ff6b6b)">${t('digitsOnly')}</span>`;
    return;
  }
  if(![8,12,13,14].includes(cleaned.length)){
    $('#status').innerHTML = `<span style="color:var(--gz-accent2,#ff6b6b)">${t('unsupported')}</span>`;
    return;
  }
  const digits = cleaned.split('').map(Number);
  const provided = digits.pop();        // last = check digit
  const expected = gs1CheckDigit(digits);
  const ok = provided === expected;
  const cls = ok ? 'ok' : 'bad';
  const badge = ok ? t('valid') : t('invalid');
  $('#result').innerHTML =
    `<div class="gz-result ${cls}">
       <div><b>${t('detected')}:</b> ${typeLabel(cleaned.length)} <span class="badge">${badge}</span></div>
       <div class="gz-detail">
         ${t('checkDigit')}: <b>${provided}</b><br>
         ${t('expected')}: <b>${expected}</b>${ok?'':' ⚠️'}
       </div>
     </div>`;
  $('#status').innerHTML = ok
    ? `<span style="color:var(--gz-success,#00d672)">✓ ${cleaned} ${t('valid').toLowerCase()}</span>`
    : `<span style="color:var(--gz-accent2,#ff6b6b)">✗ ${cleaned} ${t('invalid').toLowerCase()} — ${t('expected')} ${expected}</span>`;
}

function loadExample(){
  // 4006381333931 = real EAN-13 (Nestlé) — known valid GS1 check digit
  $('#input').value = '4006381333931';
  validate();
}
function doClear(){ $('#input').value=''; $('#result').innerHTML=''; $('#status').innerHTML=''; }

$('#lbl-in').textContent = t('inputLbl');

});

$('#toolbar').innerHTML =
  `<button class="gz-btn" onclick="validate()">${t('validate')}</button>`+

  `<button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;
