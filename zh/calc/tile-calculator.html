<style>
.tile-form{display:grid;gap:14px;max-width:600px}
.tile-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.tile-form label{display:flex;flex-direction:column;gap:4px;font-size:.85em;color:var(--text2);font-weight:600}
.tile-form input,.tile-form select{padding:10px 12px;border:1px solid var(--border);border-radius:8px;background:var(--bg);color:var(--text);font-size:1em;box-sizing:border-box}
.tile-form input:focus{outline:none;border-color:var(--accent)}
.tile-presets{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px}
.tile-presets button{padding:6px 12px;border-radius:8px;border:1px solid var(--border);background:var(--glass);color:var(--text);cursor:pointer;font-size:.8em;transition:all .2s}
.tile-presets button.active{background:var(--accent);color:#000;border-color:var(--accent);font-weight:700}
.tile-results{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-top:20px}
.tile-card{background:var(--glass);border:1px solid var(--border);border-radius:12px;padding:16px;text-align:center}
.tile-card .value{font-size:1.7rem;font-weight:800;color:var(--accent)}
.tile-card .label{font-size:.8em;color:var(--text2);margin-top:4px}
.tile-card.primary{background:var(--accent);border-color:var(--accent)}
.tile-card.primary .value,.tile-card.primary .label{color:#000}
.tile-section{background:var(--glass);border:1px solid var(--border);border-radius:10px;padding:14px;margin-top:10px}
.tile-section h3{margin:0 0 8px;font-size:1em}
.tile-unit{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.tile-unit button{padding:8px 16px;border-radius:8px;border:1px solid var(--border);background:var(--glass);color:var(--text);cursor:pointer;font-size:.9em;transition:all .2s}
.tile-unit button.active{background:var(--accent);color:#000;border-color:var(--accent);font-weight:700}
@media(max-width:600px){.tile-row{grid-template-columns:1fr}}
</style>

<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "How do I calculate how many tiles I need?", "acceptedAnswer": {"@type": "Answer", "text": "Measure the length and width of the area to tile, then multiply to get the total area. Divide by the area of one tile (length × width). Add 10-15% extra for cuts, breakage, and future repairs. For diagonal patterns, add 20% waste."}}, {"@type": "Question", "name": "What is the standard waste percentage for tile?", "acceptedAnswer": {"@type": "Answer", "text": "For straight (grid) patterns, add 10% for waste. For diagonal patterns or rooms with many corners, add 15-20%. Always round up to the nearest full box — tiles are sold in fixed quantities per box."}}, {"@type": "Question", "name": "How do I account for grout joints?", "acceptedAnswer": {"@type": "Answer", "text": "Standard grout joints are 1/8\" to 3/16\" (3-5 mm) for floor tiles and 1/16\" to 1/8\" (1.5-3 mm) for wall tiles. This calculator uses the nominal tile size, so the actual coverage may be slightly higher. The waste percentage already accounts for typical grout spacing."}}, {"@type": "Question", "name": "Should I buy extra tiles?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. Always buy 10-15% extra to cover cuts, breakage, and future repairs. Tiles from the same dye lot can vary in color, so buy all at once. Keep a few leftover tiles for any future repairs that may be needed."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <label style="font-size:.85em;color:var(--text2);font-weight:600" id="lbl-unit"></label>
    <div class="tile-unit" id="unit">
      <button data-unit="imperial" class="active">Imperial (in, ft²)</button>
      <button data-unit="metric">Metric (cm, m²)</button>
    </div>
    <div class="tile-form">
      <div class="tile-section">
        <h3 id="lbl-area"></h3>
        <div class="tile-row">
          <label><span id="lbl-length"></span><input type="number" id="roomL" min="0" step="0.1" value="10" oninput="calc()"></label>
          <label><span id="lbl-width"></span><input type="number" id="roomW" min="0" step="0.1" value="8" oninput="calc()"></label>
        </div>
      </div>
      <div class="tile-section">
        <h3 id="lbl-tile"></h3>
        <div class="tile-row">
          <label><span id="lbl-tilew"></span><input type="number" id="tileW" min="0" step="0.1" value="12" oninput="calc()"></label>
          <label><span id="lbl-tileh"></span><input type="number" id="tileH" min="0" step="0.1" value="12" oninput="calc()"></label>
        </div>
        <div style="margin-top:8px">
          <span id="lbl-presets" style="font-size:.85em;color:var(--text2);font-weight:600"></span>
          <div class="tile-presets" id="presets"></div>
        </div>
      </div>
      <div class="tile-row">
        <label><span id="lbl-waste"></span><input type="number" id="waste" min="0" max="50" step="1" value="10" oninput="calc()"></label>
        <label><span id="lbl-cost"></span><input type="number" id="cost" min="0" step="0.5" value="2.5" oninput="calc()"></label>
      </div>
    </div>
    <div class="tile-results" id="results"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Tile Calculator',
    toolDesc: 'Estimate the exact number of tiles needed for any floor or wall. Enter room size, tile dimensions, and waste percentage — get an instant quote.',
    lblUnit: 'Units',
    lblArea: 'Room / Area Dimensions',
    lblTile: 'Tile Size',
    lblLength: 'Length',
    lblWidth: 'Width',
    lblTileW: 'Tile Width',
    lblTileH: 'Tile Height',
    lblPresets: 'Common tile sizes',
    lblWaste: 'Waste % (cuts & breakage)',
    lblCost: 'Cost per tile ($)',
    totalArea: 'Total Area',
    tilesNeeded: 'Tiles Needed',
    totalCost: 'Total Cost',
    areaOne: 'Area per tile',
    step1: 'Select your preferred unit system (Imperial or Metric)',
    step2: 'Enter the room length and width in the dimensions section',
    step3: 'Set your tile size (use a preset for common sizes like 12×12)',
    step4: 'Adjust the waste percentage (10% for straight, 15-20% for diagonal)',
  },
  zh: {
    toolTitle: '瓷砖计算器',
    toolDesc: '估算任意地面或墙面所需瓷砖数量。输入房间尺寸、瓷砖大小和损耗率 — 即时获得数量和总价。',
    lblUnit: '单位',
    lblArea: '房间 / 区域尺寸',
    lblTile: '瓷砖规格',
    lblLength: '长度',
    lblWidth: '宽度',
    lblTileW: '瓷砖宽度',
    lblTileH: '瓷砖高度',
    lblPresets: '常用规格',
    lblWaste: '损耗 % (裁切和破损)',
    lblCost: '单片价格 (元)',
    totalArea: '总面积',
    tilesNeeded: '所需瓷砖',
    totalCost: '总费用',
    areaOne: '单片面积',
    step1: '选择单位制(英制或公制)',
    step2: '在尺寸栏输入房间长度和宽度',
    step3: '设置瓷砖尺寸(可使用常用规格如 300×300)',
    step4: '调整损耗率(平铺 10%,斜铺 15-20%)',
  }
});

const { $, t } = GZ;
let unit = 'imperial';

const presets = {
  imperial: [
    {name:'12×12', w:12, h:12},
    {name:'18×18', w:18, h:18},
    {name:'6×6', w:6, h:6},
    {name:'6×24 plank', w:6, h:24},
    {name:'12×24', w:12, h:24},
    {name:'4×4', w:4, h:4},
  ],
  metric: [
    {name:'30×30', w:30, h:30},
    {name:'45×45', w:45, h:45},
    {name:'15×15', w:15, h:15},
    {name:'15×60 plank', w:15, h:60},
    {name:'30×60', w:30, h:60},
    {name:'10×10', w:10, h:10},
  ]
};

function renderPresets() {
  $('#presets').innerHTML = presets[unit].map((p, i) => `<button data-i="${i}">${p.name}</button>`).join('');
  document.querySelectorAll('#presets button').forEach(btn => {
    btn.addEventListener('click', () => {
      const p = presets[unit][+btn.dataset.i];
      $('#tileW').value = p.w; $('#tileH').value = p.h;
      calc();
    });
  });
}

function calc() {
  const roomL = parseFloat($('#roomL').value) || 0;
  const roomW = parseFloat($('#roomW').value) || 0;
  const tileW = parseFloat($('#tileW').value) || 1;
  const tileH = parseFloat($('#tileH').value) || 1;
  const waste = parseFloat($('#waste').value) || 0;
  const cost = parseFloat($('#cost').value) || 0;

  const totalArea = roomL * roomW;
  const tileArea = (tileW * tileH) / (unit === 'imperial' ? 144 : 10000);
  const tiles = totalArea / tileArea;
  const withWaste = tiles * (1 + waste/100);
  const totalCost = withWaste * cost;
  const u = unit === 'imperial' ? 'ft²' : 'm²';

  $('#results').innerHTML = `
    <div class="tile-card primary"><div class="value">${Math.ceil(withWaste)}</div><div class="label">${t('tilesNeeded')}</div></div>
    <div class="tile-card"><div class="value">${totalArea.toFixed(2)} ${u}</div><div class="label">${t('totalArea')}</div></div>
    <div class="tile-card"><div class="value">${tileArea.toFixed(4)} ${u}</div><div class="label">${t('areaOne')}</div></div>
    <div class="tile-card"><div class="value">$${totalCost.toFixed(2)}</div><div class="label">${t('totalCost')}</div></div>`;
}

function changeUnit(u, btn) {
  unit = u;
  document.querySelectorAll('#unit button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderPresets();
  calc();
}

document.querySelectorAll('#unit button').forEach(btn => {
  btn.addEventListener('click', () => changeUnit(btn.dataset.unit, btn));
});

$('#toolbar').innerHTML = `
  <button class="gz-btn gz-btn-secondary" onclick="$('#waste').value=10;calc()">10% Waste</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#waste').value=15;calc()">15% Waste</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#waste').value=20;calc()">20% Waste</button>`;

renderPresets();
calc();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🎨', href:'/calc/paint-calculator.html', name:'Paint Calculator'},
    {icon:'🧱', href:'/calc/concrete.html', name:'Concrete Calculator'},
    {icon:'📐', href:'/calc/area-calculator.html', name:'Area Calculator'},
    {icon:'🏠', href:'/calc/square-footage.html', name:'Square Footage'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
