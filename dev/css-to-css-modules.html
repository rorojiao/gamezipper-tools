<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"What are CSS Modules?","acceptedAnswer":{"@type":"Answer","text":"CSS Modules are CSS files where all class and animation names are scoped locally by default. This prevents naming collisions and makes styles component-scoped. The file is saved with a .module.css extension and imported as a JavaScript object."}},{"@type":"Question","name":"How does this converter work?","acceptedAnswer":{"@type":"Answer","text":"Paste your regular CSS and the tool outputs CSS Modules compatible code. It converts kebab-case class names to camelCase (optional), adds :global where needed for third-party selectors, and generates the import usage for your React/Vue component."}},{"@type":"Question","name":"Should I use camelCase class names?","acceptedAnswer":{"@type":"Answer","text":"Yes for CSS Modules in JavaScript — camelCase lets you access classes as styles.myButton instead of styles['my-button']. Toggle the camelCase option to convert kebab-case to camelCase automatically."}},{"@type":"Question","name":"Is my CSS safe?","acceptedAnswer":{"@type":"Answer","text":"Yes. All conversion happens entirely in your browser. No CSS is ever sent to any server."}}]}</script>

<script>
GZI18n.register({
  en: {
    toolTitle: 'CSS to CSS Modules Converter',
    toolDesc: 'Convert plain CSS to scoped CSS Modules format. Transform class names, generate import statements, and get ready-to-use .module.css code — free, private, browser-based.',
    convert: 'Convert',
    camel: 'camelCase classes',
    usage: 'Generate usage code',
    compose: 'Add composes helpers',
    step1: 'Paste your CSS into the left input area',
    step2: 'Toggle options: camelCase, usage example, composes',
    step3: 'Click Convert to generate CSS Modules code',
    step4: 'Save as .module.css and use the import in your component',
  },
  zh: {
    toolTitle: 'CSS 转 CSS Modules 转换器',
    toolDesc: '将普通 CSS 转换为作用域化的 CSS Modules 格式。转换类名、生成导入语句，获取即用的 .module.css 代码 — 免费、私密、浏览器本地运行。',
    convert: '转换',
    camel: '驼峰命名类',
    usage: '生成使用代码',
    compose: '添加 composes 辅助',
    step1: '在左侧输入区粘贴 CSS',
    step2: '切换选项：驼峰命名、使用示例、composes',
    step3: '点击转换生成 CSS Modules 代码',
    step4: '保存为 .module.css 并在组件中使用导入',
  }
});

const { $, copyText, t } = GZ;
let opts = { camel: true, usage: true, compose: false };

function toCamelCase(str) {
  return str.replace(/-([a-z])/g, (_, c) => c.toUpperCase());
}

function convertCSSModules(css) {
  let output = css;
  const classNames = new Set();

  // Convert class selectors
  output = output.replace(/\.([a-zA-Z_][\w-]*)/g, (m, name) => {
    if (opts.camel && name.includes('-')) {
      const camel = toCamelCase(name);
      classNames.add(camel);
      return '.' + camel;
    }
    classNames.add(name);
    return m;
  });

  // Keep :global() for known global patterns (html, body, [data-*], etc.)
  output = output.replace(/^(html|body|\*|:root)\s*\{/gm, ':global($1) {');

  // Generate usage code
  let usage = '';
  if (opts.usage && classNames.size > 0) {
    usage = '\n\n/* Usage in React:\n';
    usage += "import styles from './styles.module.css';\n\n";
    usage += 'function Component() {\n';
    usage += '  return (\n';
    const classes = [...classNames];
    if (classes.length === 1) {
      usage += `    <div className={styles.${classes[0]}}>\n`;
      usage += '      Content\n';
      usage += '    </div>\n';
    } else {
      usage += `    <div className={styles.${classes[0]}}>\n`;
      usage += `      <button className={styles.${classes[1] || classes[0]}}>Click</button>\n`;
      usage += '    </div>\n';
    }
    usage += '  );\n';
    usage += '}\n';
    usage += '*/';
  }

  // Add composes example
  if (opts.compose && classNames.size >= 2) {
    const classes = [...classNames];
    output = `/* Use composes to share styles */\n.${classes[0]} {\n  composes: ${classes[1]};\n  /* additional styles */\n}\n\n` + output;
  }

  return output + usage;
}

function doConvert() {
  const inp = $('#input').value.trim();
  if (!inp) { $('#output').textContent = ''; $('#status').innerHTML = ''; return; }
  try {
    const result = convertCSSModules(inp);
    const classCount = (result.match(/\.([a-zA-Z_]\w*)/g) || []).length;
    $('#output').textContent = result;
    $('#status').innerHTML = `<span style="color:var(--gz-success)">✓ Converted — ${classCount} scoped class${classCount!==1?'es':''}</span>`;
  } catch(e) {
    $('#output').textContent = '';
    $('#status').innerHTML = `<span style="color:var(--gz-accent)">Error: ${e.message}</span>`;
  }
}

function loadExample() {
  $('#input').value = `.container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 16px;
}

.card-title {
  font-size: 24px;
  font-weight: bold;
  color: #333;
}

.btn-primary {
  background: #007bff;
  color: white;
  padding: 12px 24px;
  border-radius: 8px;
  cursor: pointer;
}

.btn-primary:hover {
  background: #0056b3;
}`;
  doConvert();
}

function doClear() { $('#input').value = ''; $('#output').textContent = ''; $('#status').innerHTML = ''; }

$('#options').innerHTML = `
  <label><input type="checkbox" id="opt-camel" ${opts.camel?'checked':''}> ${t('camel')}</label>
  <label><input type="checkbox" id="opt-usage" ${opts.usage?'checked':''}> ${t('usage')}</label>
  <label><input type="checkbox" id="opt-compose" ${opts.compose?'checked':''}> ${t('compose')}</label>
`;
['opt-camel','opt-usage','opt-compose'].forEach(id => {
  $('#' + id).addEventListener('change', e => {
    const key = id === 'opt-camel' ? 'camel' : id === 'opt-usage' ? 'usage' : 'compose';
    opts[key] = e.target.checked;
    doConvert();
  });
});

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="doConvert()">⚡ ${t('convert')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">📋 ${t('example')}</button>
  <button class="gz-btn" onclick="copyText($('#output').textContent)">📋 ${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">🗑️ ${t('clear')}</button>`;

  ]
});
</script>
