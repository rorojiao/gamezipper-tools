const { $, t } = GZ;

// ── Token explanations ──
function escapeHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function explainRegex(pattern) {
  const rows = [];
  let i = 0;
  const len = pattern.length;

  function explainQuantifier() {
    // peek-back is handled inline; here we check the char AFTER current position
  }

  while (i < len) {
    const ch = pattern[i];
    const start = i;

    // Anchors
    if (ch === '^') { rows.push(['^', 'Start of string (or line, with /m flag)']); i++; continue; }
    if (ch === '$') { rows.push(['$', 'End of string (or line, with /m flag)']); i++; continue; }

    // Escapes
    if (ch === '\\' && i + 1 < len) {
      const next = pattern[i + 1];
      const escMap = {
        'd':'Digit [0-9]','D':'Non-digit [^0-9]','w':'Word char [A-Za-z0-9_]','W':'Non-word char',
        's':'Whitespace','S':'Non-whitespace','b':'Word boundary','B':'Non-word boundary',
        'n':'Newline','t':'Tab','r':'Carriage return','0':'NUL char',
        '.':'Literal dot','\\':'Literal backslash','(':'Literal (',')':'Literal )','[':'Literal [',']':'Literal ]',
        '{':'Literal {','}':'Literal }','*':'Literal *','+':'Literal +','?':'Literal ?','|':'Literal |','^':'Literal ^','$':'Literal $','/':'Literal /','"':'Literal "',
      };
      if (escMap[next]) {
        rows.push(['\\' + next, escMap[next]]);
        i += 2; continue;
      }
      if (next === 'x' && i + 3 < len) {
        const hex = pattern.substr(i+2, 2);
        rows.push(['\\x' + hex, `Hex escape — char U+00${hex.toUpperCase()}`]); i += 4; continue;
      }
      if ((next === 'u' || next === 'u{')) {
        let end;
        if (next === 'u{') { end = pattern.indexOf('}', i+2); if (end !== -1) { const cp = pattern.substring(i+2,end); rows.push(['\\u{'+cp+'}', `Unicode code point U+${cp.toUpperCase()}`]); i = end+1; continue; } }
        if (i + 5 < len) { const hex = pattern.substr(i+2, 4); rows.push(['\\u' + hex, `Unicode char U+${hex.toUpperCase()}`]); i += 6; continue; }
      }
      if (/[1-9]/.test(next)) {
        let num = next; let j = i + 2;
        while (j < len && /[0-9]/.test(pattern[j])) { num += pattern[j]; j++; }
        rows.push(['\\' + num, `Back-reference to group ${num}`]); i = j; continue;
      }
      if (next === 'k' && pattern[i+2] === '<') {
        const end = pattern.indexOf('>', i+3);
        if (end !== -1) { const name = pattern.substring(i+3, end); rows.push(['\\k<'+name+'>', `Back-reference to named group "${name}"`]); i = end + 1; continue; }
      }
      rows.push(['\\' + next, `Escaped character '${next}'`]); i += 2; continue;
    }

    // Character class [...]
    if (ch === '[') {
      let j = i + 1;
      let negated = false;
      if (pattern[j] === '^') { negated = true; j++; }
      let cls = '';
      while (j < len && pattern[j] !== ']') {
        if (pattern[j] === '\\' && j + 1 < len) { cls += pattern.substr(j, 2); j += 2; }
        else { cls += pattern[j]; j++; }
      }
      const display = '[' + (negated ? '^' : '') + cls + ']';
      rows.push([display, negated ? `Negated character class — match any char NOT in: ${cls}` : `Character class — match any one of: ${cls}`]);
      i = j + 1; continue;
    }

    // Groups: capturing (...)
    if (ch === '(') {
      if (pattern[i+1] === '?') {
        const special = pattern[i+2];
        if (special === ':') { rows.push(['(?:', 'Non-capturing group (group without back-reference)']); i += 3; continue; }
        if (special === '=' ) { rows.push(['(?=', 'Positive lookahead — assert what follows']); i += 3; continue; }
        if (special === '!') { rows.push(['(?!', 'Negative lookahead — assert what does NOT follow']); i += 3; continue; }
        if (special === '<' && pattern[i+3] === '=') { rows.push(['(?<=', 'Positive lookbehind — assert what precedes']); i += 4; continue; }
        if (special === '<' && pattern[i+3] === '!') { rows.push(['(?<!', 'Negative lookbehind — assert what does NOT precede']); i += 4; continue; }
        if (special === '<') {
          // named group (?<name>...)
          const end = pattern.indexOf('>', i+3);
          if (end !== -1) { const name = pattern.substring(i+3, end); rows.push(['(?<'+name+'>', `Named capturing group "${name}"`]); i = end + 1; continue; }
        }
      }
      rows.push(['(', 'Capturing group (group 1, 2, …) — contents can be back-referenced']); i++; continue;
    }
    if (ch === ')') { rows.push([')', 'End of group']); i++; continue; }

    // Alternation
    if (ch === '|') { rows.push(['|', 'Alternation (OR) — match the pattern on either side']); i++; continue; }

    // Quantifiers with braces {n,m}
    if (ch === '{') {
      const m = pattern.substr(i).match(/^\{(\d+)(?:,(\d*))?\}/);
      if (m) {
        const min = m[1], max = m[2];
        const display = m[0];
        if (max === undefined) rows.push([display, `Quantifier — exactly ${min} time(s)`]);
        else if (max === '') rows.push([display, `Quantifier — at least ${min} time(s)`]);
        else rows.push([display, `Quantifier — between ${min} and ${max} time(s)`]);
        i += display.length; continue;
      }
      rows.push(['{', 'Literal { character']); i++; continue;
    }
    if (ch === '*') { rows.push([pattern[i+1] === '?' ? '*?' : '*', pattern[i+1] === '?' ? 'Quantifier — 0 or more (lazy/non-greedy)' : 'Quantifier — 0 or more (greedy)']); if (pattern[i+1] === '?') i += 2; else i++; continue; }
    if (ch === '+') { rows.push([pattern[i+1] === '?' ? '+?' : '+', pattern[i+1] === '?' ? 'Quantifier — 1 or more (lazy/non-greedy)' : 'Quantifier — 1 or more (greedy)']); if (pattern[i+1] === '?') i += 2; else i++; continue; }
    if (ch === '?') { rows.push([pattern[i+1] === '?' ? '??' : '?', pattern[i+1] === '?' ? 'Quantifier — 0 or 1 (lazy)' : 'Quantifier — 0 or 1 (optional)']); if (pattern[i+1] === '?') i += 2; else i++; continue; }

    // Literal dot
    if (ch === '.') { rows.push(['.', 'Any character (except newline, unless /s flag)']); i++; continue; }

    // Plain literal char
    rows.push([escapeHtml(ch), `Literal character '${ch}'`]); i++; continue;
  }

  return rows;
}

function update() {
  const pattern = $('#pattern').value;
  const flags = $('#flags').value || '';

  if (!pattern) { $('#explain').innerHTML = `<div class="ex-error">${lang === 'zh' ? '请在上方输入一个正则表达式。' : 'Please enter a regex pattern above.'}</div>`; $('#testOutput').innerHTML=''; $('#matchInfo').textContent=''; return; }

  let rows;
  try { rows = explainRegex(pattern); } catch(e) { $('#explain').innerHTML = `<div class="ex-error">⚠ ${escapeHtml(e.message)}</div>`; return; }

  $('#explain').innerHTML = `<div style="font-size:.85em;opacity:.7;margin-bottom:8px">${t('explainLabel')} (${rows.length} ${lang==='zh'?'部分':'parts'}):</div>` +
    rows.map(r => `<div class="ex-row"><span class="ex-token">${escapeHtml(r[0])}</span><span class="ex-desc">${r[1]}</span></div>`).join('');

  // Test highlighting
  runTest(pattern, flags);
}

function runTest(pattern, flags) {
  const text = $('#testInput').value;
  if (!text) { $('#testOutput').innerHTML = ''; $('#matchInfo').textContent = ''; return; }
  try {
    let re;
    try { re = new RegExp(pattern, flags.includes('g') ? flags : flags + 'g'); }
    catch(e) { re = new RegExp(pattern, flags); }
    const matches = [...text.matchAll(re)];
    if (matches.length === 0) {
      $('#testOutput').innerHTML = escapeHtml(text);
      $('#matchInfo').textContent = t('matchCount')(0);
      return;
    }
    let html = '', last = 0;
    for (const m of matches) {
      html += escapeHtml(text.substring(last, m.index));
      html += `<span class="highlight">${escapeHtml(m[0])}</span>`;
      last = m.index + m[0].length;
    }
    html += escapeHtml(text.substring(last));
    $('#testOutput').innerHTML = html;
    $('#matchInfo').textContent = t('matchCount')(matches.length);
  } catch(e) {
    $('#testOutput').innerHTML = `<span style="color:var(--gz-accent)">⚠ ${escapeHtml(e.message)}</span>`;
    $('#matchInfo').textContent = '';
  }
}

const lang = (window.GZI18n && GZI18n.getLang) ? GZI18n.getLang() : 'en';

const presets = [
  {label:'Email', pat:'^[\\w.+-]+@([\\w-]+\\.)+[\\w-]{2,}$', flags:'i', text:'test@example.com  hello@world.org'},
  {label:'URL', pat:'https?://[\\w.-]+(?:/[\\w._~:/?#@!$&\'()*+,;=%-]*)?', flags:'g', text:'Visit https://tools.gamezipper.com or http://example.com/path?q=1'},
  {label:'IPv4', pat:'\\b(?:\\d{1,3}\\.){3}\\d{1,3}\\b', flags:'g', text:'IPs: 192.168.1.1 and 10.0.0.255 but not 999.999.999.999'},
  {label:'Date YYYY-MM-DD', pat:'(\\d{4})-(\\d{2})-(\\d{2})', flags:'g', text:'Dates: 2026-06-30 and 1999-12-31'},
  {label:'Phone (US)', pat:'\\+?1?[-.\\s]?\\(?\\d{3}\\)?[-.\\s]?\\d{3}[-.\\s]?\\d{4}', flags:'g', text:'Call (555) 123-4567 or 555-987-6543'},
];

$('#bar').innerHTML = `
  <input type="text" id="pattern" value="^\\w+([.-]?\\w+)*@\\w+([.-]?\\w+)*(\\.\\w{2,3})+$" placeholder="${t('patternLabel')}" spellcheck="false">
  <input type="text" id="flags" value="g" placeholder="${t('flagsLabel')}" spellcheck="false">
  <select id="presets">
    <option value="">${t('example')}…</option>
    ${presets.map((p,idx) => `<option value="${idx}">${p.label}</option>`).join('')}
  </select>`;

$('#testInput').placeholder = t('testPlaceholder');
document.getElementById('test-label').textContent = t('testLabel');

$('#pattern').addEventListener('input', update);
$('#flags').addEventListener('input', update);
$('#testInput').addEventListener('input', () => runTest($('#pattern').value, $('#flags').value));
$('#presets').addEventListener('change', function() {
  const p = presets[+this.value];
  if (!p) return;
  $('#pattern').value = p.pat;
  $('#flags').value = p.flags;
  $('#testInput').value = p.text;
  update();
});

update();
