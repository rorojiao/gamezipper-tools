<script>
GZI18n.register({
  en: {
    toolTitle: '.env Editor & Generator',
    toolDesc: 'Edit, generate and manage .env files visually. Add variables, mask secrets, validate keys, export to .env/JSON/YAML — free and private.',
    addVar: 'Add Variable',
    loadExample: 'Load Example',
    exportEnv: '.env',
    exportJson: 'JSON',
    exportYaml: 'YAML',
    copy: 'Copy',
    clear: 'Clear All',
    keyPlaceholder: 'VARIABLE_NAME',
    valuePlaceholder: 'value or secret',
    invalidKey: 'Invalid key name',
    step1: 'Click Add Variable to create a new entry',
    step2: 'Enter the variable name and value',
    step3: 'Toggle the eye icon to mask/unmask secrets',
    step4: 'Choose an export format and copy the result',
  },
  zh: {
    toolTitle: '.env 编辑器 / 生成器',
    toolDesc: '可视化编辑、生成和管理 .env 文件。添加变量、遮罩密钥、验证键名、导出 .env/JSON/YAML — 免费且私密。',
    addVar: '添加变量',
    loadExample: '加载示例',
    exportEnv: '.env',
    exportJson: 'JSON',
    exportYaml: 'YAML',
    copy: '复制',
    clear: '全部清除',
    keyPlaceholder: 'VARIABLE_NAME',
    valuePlaceholder: '值或密钥',
    invalidKey: '键名无效',
    step1: '点击「添加变量」创建新条目',
    step2: '输入变量名和值',
    step3: '点击眼睛图标遮罩/显示密钥',
    step4: '选择导出格式并复制结果',
  }
});

const { $, copyText, t } = GZ;
let vars = [];
let exportMode = 'env';

function validKey(k) { return /^[A-Z][A-Z0-9_]*$/i.test(k); }

function render() {
  const list = $('#env-list');
  list.innerHTML = '<div class="env-table">' + vars.map((v, i) => `
    <div class="env-row">
      <button class="env-toggle" onclick="toggleMask(${i})">${v.masked ? '👁️' : '🙈'}</button>
      <input type="text" value="${escapeAttr(v.key)}" oninput="updateKey(${i},this.value)" placeholder="${t('keyPlaceholder')}" style="${validKey(v.key) ? '' : 'border-color:var(--gz-accent)'}">
      <input type="${v.masked ? 'password' : 'text'}" value="${escapeAttr(v.value)}" oninput="updateVal(${i},this.value)" placeholder="${t('valuePlaceholder')}">
      <button class="del-btn" onclick="delVar(${i})">✕</button>
    </div>${validKey(v.key) || !v.key ? '' : `<div class="env-row" style="grid-template-columns:30px 200px 1fr 32px"><span></span><span class="env-warning">⚠ ${t('invalidKey')}</span></div>`}
  `).join('') + '</div>';
  doExport();
}

function escapeAttr(s) { return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function addVar() { vars.push({key:'', value:'', masked:false}); render(); }
function delVar(i) { vars.splice(i,1); render(); }
function toggleMask(i) { vars[i].masked = !vars[i].masked; render(); }
function updateKey(i, val) { vars[i].key = val; clearTimeout(window._deTimer); window._deTimer = setTimeout(render, 200); }
function updateVal(i, val) { vars[i].value = val; clearTimeout(window._deTimer2); window._deTimer2 = setTimeout(doExport, 200); }

function doExport() {
  if (vars.length === 0) { $('#output').innerHTML = '<span style="opacity:.5">No variables yet</span>'; return; }
  let result = '';
  if (exportMode === 'env') {
    result = vars.filter(v => v.key).map(v => {
      const val = v.value.includes(' ') || v.value.includes('#') ? `"${v.value}"` : v.value;
      return `${v.key}=${val}`;
    }).join('\n');
  } else if (exportMode === 'json') {
    const obj = {};
    vars.filter(v => v.key).forEach(v => { obj[v.key] = v.value; });
    result = JSON.stringify(obj, null, 2);
  } else if (exportMode === 'yaml') {
    result = vars.filter(v => v.key).map(v => {
      const val = v.value.includes(':') || v.value.includes('#') || v.value.includes(' ') ? `"${v.value.replace(/"/g,'\\"')}"` : v.value;
      return `${v.key}: ${val}`;
    }).join('\n');
  }
  $('#output').textContent = result;
}

function setExport(mode) {
  exportMode = mode;
  document.querySelectorAll('#export-tabs .gz-tab').forEach(el => el.classList.toggle('active', el.dataset.mode === mode));
  doExport();
}

function loadExample() {
  vars = [
    {key:'NODE_ENV', value:'production', masked:false},
    {key:'DATABASE_URL', value:'postgresql://user:pass@localhost:5432/mydb', masked:true},
    {key:'API_KEY', value:'sk-1234567890abcdef', masked:true},
    {key:'JWT_SECRET', value:'super-secret-key-here', masked:true},
    {key:'PORT', value:'3000', masked:false},
    {key:'REDIS_URL', value:'redis://localhost:6379', masked:false},
    {key:'FRONTEND_URL', value:'https://example.com', masked:false},
  ];
  render();
}

function clearAll() { vars = []; render(); }

$('#export-tabs').innerHTML = `
  <button class="gz-tab active" data-mode="env" onclick="setExport('env')">${t('exportEnv')}</button>
  <button class="gz-tab" data-mode="json" onclick="setExport('json')">${t('exportJson')}</button>
  <button class="gz-tab" data-mode="yaml" onclick="setExport('yaml')">${t('exportYaml')}</button>`;

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="addVar()">${t('addVar')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('loadExample')}</button>
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="clearAll()">${t('clear')}</button>`;

GZ.renderToolPage({
  category: 'dev',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🔑', href:'/dev/api-key-generator.html', name:'API Key Generator'},
    {icon:'🔐', href:'/dev/bcrypt-generator.html', name:'Bcrypt Generator'},
    {icon:'📋', href:'/dev/yaml-beautifier.html', name:'YAML Formatter'},
    {icon:'⚙️', href:'/dev/json.html', name:'JSON Formatter'},
  ]
});

// Start with example
loadExample();
</script>
