const { $, copyText, t } = GZ;

function parseCSV(text, delim){
  const rows = [];
  let row = [], field = '', inQuotes = false;
  for (let i = 0; i < text.length; i++){
    const ch = text[i], next = text[i+1];
    if (inQuotes){
      if (ch === '"' && next === '"'){ field += '"'; i++; }
      else if (ch === '"'){ inQuotes = false; }
      else field += ch;
    } else {
      if (ch === '"'){ inQuotes = true; }
      else if (ch === delim){ row.push(field); field = ''; }
      else if (ch === '\n'){ row.push(field); rows.push(row); row = []; field = ''; }
      else if (ch === '\r'){ /* ignore */ }
      else field += ch;
    }
  }
  if (field !== '' || row.length){ row.push(field); rows.push(row); }
  return rows.filter(r => r.some(c => c.trim() !== ''));
}

function isNumber(v){ return v !== '' && !isNaN(Number(v)) && isFinite(Number(v)); }
function isInt(v){ return isNumber(v) && /^-?\d+$/.test(v.trim()); }
const BOOL_TRUE = /^(true|yes|y|t)$/i, BOOL_FALSE = /^(false|no|n|f)$/i;
function isBool(v){ return BOOL_TRUE.test(v) || BOOL_FALSE.test(v); }

function inferColumn(values){
  const nonEmpty = values.filter(v => v !== '');
  if (!nonEmpty.length) return { type: 'string' };
  let allInt = true, allNum = true, allBool = true;
  for (const v of nonEmpty){
    if (!isInt(v)) allInt = false;
    if (!isNumber(v)) allNum = false;
    if (!isBool(v)) allBool = false;
  }
  if (allInt) return { type: 'int' };
  if (allNum) return { type: 'float64' };
  if (allBool) return { type: 'bool' };
  return { type: 'string' };
}

function zeroValue(type){ return ({ int: '0', float64: '0', bool: 'false', string: '""' })[type] || '""'; }

function cellLit(v, type){
  if (v === '') return zeroValue(type);
  if (type === 'int'){ const n = parseInt(v, 10); return Number.isFinite(n) ? String(n) : '0'; }
  if (type === 'float64'){ const n = parseFloat(v); return Number.isFinite(n) ? String(n) : '0'; }
  if (type === 'bool') return BOOL_TRUE.test(v) ? 'true' : 'false';
  return JSON.stringify(v);
}

function pascalCase(s){
  return String(s).replace(/[^a-zA-Z0-9]+/g, ' ').trim()
    .split(/\s+/).map(w => w.charAt(0).toUpperCase() + w.slice(1)).join('')
    .replace(/^([0-9])/, '_$1') || 'Field';
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function highlight(code){
  const tokenRe = /("(?:\\.|[^"\\])*")|(\/\/.*$)|(\b(?:package|import|func|type|struct|var|const|return|map|range|for|if|else|nil|make|append|fmt|true|false)\b)|(\b[A-Z][a-zA-Z0-9]*\b)|(\b\d+(?:\.\d+)?\b)|(\s+)|([^\s"\w/]+)/gm;
  let out = '', m;
  while ((m = tokenRe.exec(code)) !== null){
    const [full, str, com, kw, ty, num, ws, punct] = m;
    if (str) out += `<span class="go-str">${esc(str)}</span>`;
    else if (com) out += `<span class="go-com">${esc(com)}</span>`;
    else if (kw) out += `<span class="go-kw">${esc(kw)}</span>`;
    else if (ty) out += `<span class="go-type">${esc(ty)}</span>`;
    else if (num) out += `<span class="go-num">${esc(num)}</span>`;
    else out += esc(full);
  }
  return out;
}

function convert(){
  const raw = $('#input').value;
  if (!raw.trim()){ $('#output').textContent=''; $('#status').innerHTML=''; return; }
  const delimStr = $('#delim').value;
  const delim = delimStr === '\\t' ? '\t' : delimStr;
  const rows = parseCSV(raw, delim);
  if (rows.length < 1){
    $('#status').innerHTML = `<span style="color:var(--gz-accent)">${t('empty')}</span>`;
    $('#output').innerHTML = `<span style="color:var(--gz-accent)">${t('empty')}</span>`;
    return;
  }
  const headers = rows[0];
  if (!headers.some(h => h.trim() !== '')){
    $('#status').innerHTML = `<span style="color:var(--gz-accent)">${t('needHeader')}</span>`;
    $('#output').textContent = '';
    return;
  }
  const dataRows = rows.slice(1);
  const types = headers.map((_, i) => inferColumn(dataRows.map(r => r[i] ?? '')));
  const wantJson = $('#optJson').checked;
  const wantCsv = $('#optCsv').checked;
  let structName = pascalCase($('#structName').value || 'Row');
  if (!structName) structName = 'Row';

  let tags = '';
  const tagParts = [];
  if (wantJson) tagParts.push('json:"$h$"');
  if (wantCsv) tagParts.push('csv:"$h$"');

  let code = 'package main\n\n';
  if (dataRows.length) code += 'import "fmt"\n\n';
  code += '// ' + structName + ' is generated from your CSV headers.\n';
  code += 'type ' + structName + ' struct {\n';
  headers.forEach((h, i) => {
    const fieldName = pascalCase(h);
    const tp = types[i].type;
    let line = '\t' + fieldName + '\t' + tp;
    if (tagParts.length){
      const tag = tagParts.map(p => p.replace('$h$', h.replace(/"/g, '\\"'))).join(' ');
      line += '\t`' + tag + '`';
    }
    code += line + '\n';
  });
  code += '}\n\n';

  if (dataRows.length){
    code += 'var rows = []' + structName + '{\n';
    dataRows.forEach(r => {
      const vals = headers.map((h, i) => cellLit(r[i] ?? '', types[i].type));
      code += '\t{' + vals.join(', ') + '},\n';
    });
    code += '}\n\n';
    code += 'func main() {\n';
    code += '\tfor _, r := range rows {\n';
    code += '\t\tfmt.Printf("%+v\\n", r)\n';
    code += '\t}\n';
    code += '}\n';
  }

  $('#status').innerHTML = `<span style="color:var(--gz-success)">${t('ok')(dataRows.length)}</span>`;
  $('#output').innerHTML = highlight(code);
}

  convert();
}
