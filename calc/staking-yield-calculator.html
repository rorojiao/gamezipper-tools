<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"How are staking rewards calculated?","acceptedAnswer":{"@type":"Answer","text":"The calculator applies the entered annual percentage yield to your balance over the selected compounding periods, then subtracts the validator or platform fee from earned rewards."}},{"@type":"Question","name":"What is the difference between APR and APY?","acceptedAnswer":{"@type":"Answer","text":"APR is the simple annual reward rate without compounding. APY includes the effect of reinvesting rewards, so APY is normally higher when rewards compound more than once per year."}},{"@type":"Question","name":"Can I include regular staking contributions?","acceptedAnswer":{"@type":"Answer","text":"Yes. Enter a monthly contribution to model adding more tokens or fiat-equivalent value to your staking position throughout the selected term."}},{"@type":"Question","name":"Does this predict an actual token price?","acceptedAnswer":{"@type":"Answer","text":"No. It models staking yield in the same units you enter. Token price changes, slashing, lockups, inflation and protocol risks are not included."}}]}</script>

<script>
GZI18n.register({"en":{"toolTitle":"Crypto Staking Rewards Calculator","toolDesc":"Project staking rewards with compound yield, recurring contributions and validator fees — no account or API required.","principal":"Starting stake","apy":"Advertised APY (%)","years":"Staking term (years)","compound":"Compounding frequency","fee":"Validator/platform fee (%)","monthly":"Monthly contribution","daily":"Daily (365×)","monthlyFreq":"Monthly (12×)","quarterly":"Quarterly (4×)","yearly":"Yearly (1×)","endBalance":"Ending balance","rewards":"Net rewards","contributions":"Total contributed","netApy":"Effective net APY","monthlyReward":"Average monthly rewards","reset":"Reset","breakdown":"Year-by-year projection","year":"Year","start":"Starting balance","added":"Added","earned":"Rewards","end":"Ending balance","note":"Estimate only: token price volatility, inflation, slashing, taxes, lockup periods and changing protocol rates are not included.","step1":"Enter your starting stake and advertised staking APY","step2":"Choose the term, compounding schedule and validator fee","step3":"Optionally add a recurring monthly contribution","step4":"Review net rewards, effective APY and the yearly projection"},"zh":{"toolTitle":"加密货币质押奖励计算器","toolDesc":"计算复利质押收益、定期追加投入和验证者费用，无需账户或 API。","principal":"初始质押金额","apy":"标称 APY（%）","years":"质押期限（年）","compound":"复利频率","fee":"验证者/平台费用（%）","monthly":"每月追加金额","daily":"每日（365次）","monthlyFreq":"每月（12次）","quarterly":"每季度（4次）","yearly":"每年（1次）","endBalance":"期末余额","rewards":"净奖励","contributions":"总投入","netApy":"实际净 APY","monthlyReward":"月均奖励","reset":"重置","breakdown":"逐年预测","year":"年份","start":"期初余额","added":"追加投入","earned":"奖励","end":"期末余额","note":"仅供估算：未计入代币价格波动、通胀、罚没、税费、锁仓期限和协议利率变化。","step1":"输入初始质押金额和标称质押 APY","step2":"选择期限、复利频率和验证者费用","step3":"可选填写每月定期追加金额","step4":"查看净奖励、实际 APY 和逐年预测"}});
const { $, t } = GZ;
function text(id,key){const el=$(id);if(el)el.textContent=t(key)}
function num(id,fallback=0){const n=parseFloat($(id).value);return Number.isFinite(n)?n:fallback}
function money(n,currency){try{return new Intl.NumberFormat(undefined,{style:'currency',currency:currency||'USD',maximumFractionDigits:Math.abs(n)<1?8:2}).format(n)}catch(e){return (currency||'$')+' '+n.toLocaleString(undefined,{maximumFractionDigits:8})}}

[['#l-principal','principal'],['#l-apy','apy'],['#l-years','years'],['#l-compound','compound'],['#l-fee','fee'],['#l-monthly','monthly'],['#o-daily','daily'],['#o-monthly','monthlyFreq'],['#o-quarterly','quarterly'],['#o-yearly','yearly'],['#k-end','endBalance'],['#k-rewards','rewards'],['#k-contrib','contributions'],['#k-net','netApy'],['#k-month','monthlyReward'],['#reset','reset'],['#breakdown','breakdown'],['#th-year','year'],['#th-start','start'],['#th-added','added'],['#th-earned','earned'],['#th-end','end'],['#note','note']].forEach(x=>text(...x));
function calculate(){const principal=Math.max(0,num('#principal')),apy=Math.max(0,num('#apy'))/100,years=Math.max(.1,num('#years',1)),freq=Math.max(1,num('#compound',12)),fee=Math.min(1,Math.max(0,num('#fee')/100)),monthly=Math.max(0,num('#monthly'));const months=Math.max(1,Math.round(years*12)),periodRate=Math.pow(1+apy,1/freq)-1;let balance=principal,totalRewards=0,totalAdded=principal,rows=[],yearStart=principal,yearAdded=0,yearReward=0;for(let m=1;m<=months;m++){balance+=monthly;totalAdded+=monthly;yearAdded+=monthly;const gross=balance*(Math.pow(1+periodRate,freq/12)-1),reward=gross*(1-fee);balance+=reward;totalRewards+=reward;yearReward+=reward;if(m%12===0||m===months){rows.push([Math.ceil(m/12),yearStart,yearAdded,yearReward,balance]);yearStart=balance;yearAdded=0;yearReward=0}}const annualNet=Math.pow(1+periodRate*(1-fee),freq)-1;$('#v-end').textContent=balance.toLocaleString(undefined,{maximumFractionDigits:2});$('#v-rewards').textContent=totalRewards.toLocaleString(undefined,{maximumFractionDigits:2});$('#v-contrib').textContent=totalAdded.toLocaleString(undefined,{maximumFractionDigits:2});$('#v-net').textContent=(annualNet*100).toFixed(2)+'%';$('#v-month').textContent=(totalRewards/months).toLocaleString(undefined,{maximumFractionDigits:2});$('#rows').innerHTML=rows.map(r=>'<tr><td>'+r[0]+'</td>'+r.slice(1).map(v=>'<td>'+v.toLocaleString(undefined,{maximumFractionDigits:2})+'</td>').join('')+'</tr>').join('')}
['#principal','#apy','#years','#compound','#fee','#monthly'].forEach(id=>$(id).addEventListener('input',calculate));$('#reset').onclick=()=>{$('#principal').value=10000;$('#apy').value=8;$('#years').value=5;$('#compound').value=365;$('#fee').value=5;$('#monthly').value=100;calculate()};calculate();

GZ.renderToolPage({category:'calc',titleKey:'toolTitle',descKey:'toolDesc',howToSteps:['step1','step2','step3','step4'],related:[{"icon":"📈","href":"/calc/apy-calculator.html","name":"APY Calculator"},{"icon":"💹","href":"/calc/crypto-profit-calculator.html","name":"Crypto Profit Calculator"},{"icon":"🔁","href":"/calc/crypto-dca-calculator.html","name":"Crypto DCA Calculator"},{"icon":"⚖️","href":"/calc/impermanent-loss-calculator.html","name":"Impermanent Loss Calculator"}]});
</script>
