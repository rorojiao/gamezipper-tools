.api-bar input{flex:1;padding:8px 12px;border:1px solid var(--gz-border);border-radius:6px;background:var(--gz-bg);color:var(--gz-text);font-family:monospace}
.api-bar button{white-space:nowrap}

.tabs button.active{background:var(--gz-card);color:var(--gz-text);font-weight:600;border-bottom:1px solid var(--gz-card)}

.kv-row input{flex:1;padding:6px 10px;border:1px solid var(--gz-border);border-radius:4px;background:var(--gz-bg);color:var(--gz-text);font-family:monospace;font-size:.85em}
.kv-row button{padding:4px 8px;border:none;background:var(--gz-accent);color:#fff;border-radius:4px;cursor:pointer;font-size:.8em}
.response-box{border:1px solid var(--gz-border);border-radius:8px;overflow:hidden;margin-top:12px}
.response-header{display:flex;justify-content:space-between;padding:10px 16px;background:var(--gz-bg);border-bottom:1px solid var(--gz-border);font-size:.85em;font-weight:600}
.response-body{padding:16px;max-height:400px;overflow:auto;font-family:monospace;font-size:.8em;white-space:pre-wrap;word-break:break-all;line-height:1.5}
.status-ok{color:#00d672}
.status-err{color:#e94560}
.status-warn{color:#d19a66}
textarea.body-input{width:100%;min-height:100px;font-family:monospace;font-size:.85em;padding:10px;border:1px solid var(--gz-border);border-radius:4px;background:var(--gz-bg);color:var(--gz-text);resize:vertical}
</style>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="api-bar">
      <select id="method">
        <option value="GET">GET</option>
        <option value="POST">POST</option>
        <option value="PUT">PUT</option>
        <option value="PATCH">PATCH</option>
        <option value="DELETE">DELETE</option>
        <option value="HEAD">HEAD</option>
      </select>
      <input type="url" id="url" placeholder="https://jsonplaceholder.typicode.com/posts/1">
      <button class="gz-btn" onclick="sendRequest()" id="btn-send">Send</button>
    </div>
    <div class="tabs" id="req-tabs">
      <button class="active" onclick="switchTab('headers',this)">Headers</button>
      <button onclick="switchTab('params',this)">Params</button>
      <button onclick="switchTab('body',this)">Body</button>
    </div>
    <div class="tab-content">
      <div id="panel-headers" class="tab-panel active">
        <div id="headers-list"></div>
        <button class="gz-btn gz-btn-secondary" onclick="addKV('headers')" style="margin-top:6px;font-size:.8em">+ Header</button>
      </div>
      <div id="panel-params" class="tab-panel">
        <div id="params-list"></div>
        <button class="gz-btn gz-btn-secondary" onclick="addKV('params')" style="margin-top:6px;font-size:.8em">+ Param</button>
      </div>
      <div id="panel-body" class="tab-panel">
        <select id="body-type" style="margin-bottom:8px;padding:4px 8px;border:1px solid var(--gz-border);border-radius:4px;background:var(--gz-bg);color:var(--gz-text)">
          <option value="json">JSON</option>
          <option value="text">Plain Text</option>
          <option value="form">Form Data</option>
          <option value="none">None</option>
        </select>
        <textarea class="body-input" id="body-content" placeholder='{"key": "value"}'></textarea>
      </div>
    </div>
    <div class="response-box" id="response-box" style="display:none">
      <div class="response-header">
        <span id="resp-status"></span>
        <span id="resp-time"></span>
      </div>
      <div class="response-header" style="border-top:none">
        <span id="resp-size"></span>
        <button class="gz-btn gz-btn-secondary" onclick="copyResponse()" style="padding:2px 10px;font-size:.75em">Copy</button>
      </div>
      <div class="response-body" id="resp-body"></div>
    </div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'API Tester',
    toolDesc: 'Test REST APIs online — send GET, POST, PUT, DELETE requests with custom headers, body and view formatted JSON responses.',
    btnSend: 'Send',
    copied: 'Copied!',
    step1: 'Enter the API URL and select the HTTP method',
    step2: 'Add custom headers, query parameters or request body',
    step3: 'Click Send to make the request',
    step4: 'View the response status, headers and formatted body',
    faq1Q: 'How do I test an API endpoint?',
    faq1A: 'Enter the URL, select the HTTP method, add headers or body if needed, and click Send.',
    faq2Q: 'Can I send POST requests with JSON body?',
    faq2A: 'Yes. Select POST, go to Body tab, choose JSON, and enter your payload.',
    faq3Q: 'Does this work with CORS-protected APIs?',
    faq3A: 'Due to browser CORS restrictions, some APIs may not be accessible. Public APIs with CORS enabled will work.',
  },
  zh: {
    toolTitle: 'API 测试工具',
    toolDesc: '在线测试 REST API — 发送 GET、POST、PUT、DELETE 请求，自定义请求头和请求体，查看格式化 JSON 响应。',
    btnSend: '发送',
    copied: '已复制！',
    step1: '输入 API URL 并选择 HTTP 方法',
    step2: '添加自定义请求头、查询参数或请求体',
    step3: '点击「发送」发起请求',
    step4: '查看响应状态码、响应头和格式化内容',
    faq1Q: '如何测试 API 端点？',
    faq1A: '输入 URL，选择 HTTP 方法，按需添加请求头或请求体，然后点击发送。',
    faq2Q: '可以发送带 JSON 请求体的 POST 请求吗？',
    faq2A: '可以。选择 POST 方法，进入 Body 标签，选择 JSON 格式并输入数据。',
    faq3Q: '支持有 CORS 限制的 API 吗？',
    faq3A: '由于浏览器 CORS 限制，部分 API 可能无法直接访问。开启了 CORS 的公开 API 可以正常使用。',
  }
});

const { $, copyText, t } = GZ;

function switchTab(name, btn) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('#req-tabs button').forEach(b => b.classList.remove('active'));
  document.getElementById('panel-' + name).classList.add('active');
  btn.classList.add('active');
}

function addKV(type) {
  const list = document.getElementById(type + '-list');
  const row = document.createElement('div');
  row.className = 'kv-row';
  row.innerHTML = `<input placeholder="Key"><input placeholder="Value"><button onclick="this.parentElement.remove()">✕</button>`;
  list.appendChild(row);
}

async function sendRequest() {
  const method = $('#method').value;
  let url = $('#url').value.trim();
  if (!url) return;

  // Add query params
  const paramRows = document.querySelectorAll('#params-list .kv-row');
  if (paramRows.length) {
    const params = new URLSearchParams();
    paramRows.forEach(row => {
      const inputs = row.querySelectorAll('input');
      if (inputs[0].value) params.append(inputs[0].value, inputs[1].value);
    });
    const sep = url.includes('?') ? '&' : '?';
    url += sep + params.toString();
  }

  // Build headers
  const headers = {};
  const headerRows = document.querySelectorAll('#headers-list .kv-row');
  headerRows.forEach(row => {
    const inputs = row.querySelectorAll('input');
    if (inputs[0].value) headers[inputs[0].value] = inputs[1].value;
  });

  // Build body
  const bodyType = $('#body-type').value;
  let body = undefined;
  if (bodyType === 'json' && $('#body-content').value.trim()) {
    body = $('#body-content').value;
    if (!headers['Content-Type']) headers['Content-Type'] = 'application/json';
  } else if (bodyType === 'text' && $('#body-content').value.trim()) {
    body = $('#body-content').value;
    if (!headers['Content-Type']) headers['Content-Type'] = 'text/plain';
  } else if (bodyType === 'form' && $('#body-content').value.trim()) {
    body = $('#body-content').value;
    if (!headers['Content-Type']) headers['Content-Type'] = 'application/x-www-form-urlencoded';
  }

  const box = $('#response-box');
  box.style.display = 'block';
  $('#resp-status').innerHTML = '<em>Sending...</em>';
  $('#resp-time').textContent = '';
  $('#resp-size').textContent = '';
  $('#resp-body').textContent = '';

  const start = performance.now();
  try {
    const opts = {method, headers};
    if (body && method !== 'GET' && method !== 'HEAD') opts.body = body;
    const resp = await fetch(url, opts);
    const elapsed = Math.round(performance.now() - start);
    const text = await resp.text();
    const size = new Blob([text]).size;

    const statusClass = resp.status < 300 ? 'status-ok' : resp.status < 400 ? 'status-warn' : 'status-err';
    $('#resp-status').innerHTML = `<span class="${statusClass}">${resp.status} ${resp.statusText}</span>`;
    $('#resp-time').textContent = elapsed + 'ms';
    $('#resp-size').textContent = size > 1024 ? (size/1024).toFixed(1) + ' KB' : size + ' B';

    // Try to format JSON
    try {
      const json = JSON.parse(text);
      $('#resp-body').textContent = JSON.stringify(json, null, 2);
    } catch {
      $('#resp-body').textContent = text;
    }
  } catch(e) {
    $('#resp-status').innerHTML = `<span class="status-err">Error</span>`;
    $('#resp-body').textContent = e.message;
    $('#resp-time').textContent = Math.round(performance.now() - start) + 'ms';
  }
}

function copyResponse() {
  copyText($('#resp-body').textContent);
}

// Initialize with default header row
addKV('headers');

GZ.renderToolPage({
  category: 'dev',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📋', href:'/dev/json.html', name:'JSON Formatter'},
    {icon:'📡', href:'/dev/http-headers.html', name:'HTTP Headers'},
    {icon:'🔗', href:'/dev/url-parser.html', name:'URL Parser'},
    {icon:'🎫', href:'/dev/jwt.html', name:'JWT Decoder'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
