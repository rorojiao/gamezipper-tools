    jsonInvalid: '✗ JSON 无效',

    step1: '在输入区粘贴 JSON 数组或对象',
    step2: '选择分隔符（逗号、分号、制表符或竖线）',
    step3: '点击转换生成 CSV 输出',
    step4: '复制结果或下载为 .csv 文件'
  }

const { $, copyText, t } = GZ;
let csvResult = '';

function flatten(obj, prefix, result){
  prefix = prefix || '';
  for(const key in obj){
    if(!obj.hasOwnProperty(key)) continue;
    const val = obj[key];
    const newKey = prefix ? prefix + '.' + key : key;
    if(val !== null && typeof val === 'object' && !Array.isArray(val)){
      flatten(val, newKey, result);
    } else if(Array.isArray(val)){
      result[newKey] = val.map(v => typeof v === 'object' ? JSON.stringify(v) : String(v)).join('; ');
    } else {
      result[newKey] = val === null ? '' : String(val);
    }
  }
  return result;
}

function escapeCsvField(val, delim){
  const str = String(val);
  if(str.includes(delim) || str.includes('"') || str.includes('\n') || str.includes('\r')){
    return '"' + str.replace(/"/g, '""') + '"';
  }
  return str;
}

function convert(){
  const inp = $('#input').value.trim();
  if(!inp){ $('#output').textContent = ''; $('#status').innerHTML=''; return; }
  let data;
  try {
    data = JSON.parse(inp);
  } catch(e){
    $('#status').innerHTML = `<span style="color:var(--gz-accent)">${t('jsonInvalid')}: ${e.message}</span>`;
    $('#output').textContent = '';
    return;
  }
  const delim = $('#delim').value === '\\t' ? '\t' : $('#delim').value;
  const inclHeader = $('#header').checked;
  let arr = Array.isArray(data) ? data : [data];
  const flatArr = arr.map(item => flatten(item, '', {}));
  const keys = [...new Set(flatArr.flatMap(o => Object.keys(o)))];
  const lines = [];
  if(inclHeader && keys.length){
    lines.push(keys.map(k => escapeCsvField(k, delim)).join(delim));
  }
  flatArr.forEach(row => {
    lines.push(keys.map(k => escapeCsvField(row[k] !== undefined ? row[k] : '', delim)).join(delim));
  });
  csvResult = lines.join('\n');
  $('#output').textContent = csvResult;
  $('#status').innerHTML = `<span style="color:var(--gz-success)">${t('jsonValid')} (${flatArr.length} rows, ${keys.length} cols)</span>`;
}

function download(){
  if(!csvResult) return;
  const blob = new Blob([csvResult], {type:'text/csv'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'data.csv'; a.click();
  setTimeout(()=>URL.revokeObjectURL(url), 1000);
}

function loadExample(){
  $('#input').value = JSON.stringify([
    {"id":1,"name":"Alice","email":"alice@example.com","role":"admin","address":{"city":"NYC","zip":"10001"}},
    {"id":2,"name":"Bob","email":"bob@example.com","role":"user","address":{"city":"LA","zip":"90001"}},
    {"id":3,"name":"Carol","email":"carol@example.com","role":"editor","address":{"city":"SF","zip":"94101"}}
  ], null, 2);
  convert();
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="convert()">${t('convert')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="download()">${t('download')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="copyText(csvResult)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="()=>$I('input').value='';convert()">${t('clear')}</button>`;
$('#input').addEventListener('input', convert);
$('#delim').addEventListener('change', convert);
$('#header').addEventListener('change', convert);
