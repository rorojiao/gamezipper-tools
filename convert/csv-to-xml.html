    step3: 'Click "Convert" to generate XML',
    step4: 'Copy the XML output to your clipboard',
  },
  zh: {
    toolTitle: 'CSV 转 XML 转换器',
    toolDesc: '将 CSV 数据转换为整洁的 XML 格式，支持自定义根元素、行标签和自动检测分隔符。',
    rootElement: '根元素',
    rowTag: '行标签',
    delimiter: '分隔符',
    auto: '自动检测',
    comma: '逗号 (,)',
    semicolon: '分号 (;)',
    tab: 'Tab',
    pipe: '竖线 (|)',
    convert: '转换',
    example: '示例',
    copy: '复制',
    clear: '清空',
    inputLabel: 'CSV 输入',
    outputLabel: 'XML 输出',
    rowsConverted: '行已转换',
    step1: '在输入区粘贴 CSV 数据',
    step2: '自定义根元素名称、行标签和分隔符',
    step3: '点击「转换」生成 XML',
    step4: '将 XML 输出复制到剪贴板',
  }
});

const { $, copyText, t } = GZ;

$('#options').innerHTML = `
  <div class="opt"><label>${t('rootElement')}:</label><input type="text" id="root" value="data"></div>
  <div class="opt"><label>${t('rowTag')}:</label><input type="text" id="rowtag" value="row"></div>
  <div class="opt"><label>${t('delimiter')}:</label><select id="delim">
    <option value="auto">${t('auto')}</option>
    <option value=",">${t('comma')}</option>
    <option value=";">${t('semicolon')}</option>
    <option value="tab">${t('tab')}</option>
    <option value="|">${t('pipe')}</option>
  </select></div>`;

function detectDelimiter(text) {
  const first = text.split('\n')[0];
  const counts = {',':0,';':0,'\t':0,'|':0};
  for (const c of first) if (counts[c] !== undefined) counts[c]++;
  return Object.entries(counts).sort((a,b) => b[1]-a[1])[0][0];
}

function escapeXml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&apos;');
}

function csvToXml(csv, delim, root, rowTag) {
  const lines = csv.trim().split('\n');
  if (lines.length < 2) return null;
  const headers = parseLine(lines[0], delim);
  let xml = `<?xml version="1.0" encoding="UTF-8"?>\n<${root}>\n`;
  for (let i = 1; i < lines.length; i++) {
    if (!lines[i].trim()) continue;
    const vals = parseLine(lines[i], delim);
    xml += `  <${rowTag}>\n`;
    for (let j = 0; j < headers.length; j++) {
      const tag = headers[j].trim().replace(/[^a-zA-Z0-9_]/g, '_').replace(/^(\d)/, '_$1') || 'field_' + j;
      const val = (vals[j] || '').trim();
      xml += `    <${tag}>${escapeXml(val)}</${tag}>\n`;
    }
    xml += `  </${rowTag}>\n`;
  }
  xml += `</${root}>`;
  return { xml, count: lines.length - 1 };
}

function parseLine(line, delim) {
  const result = [];
  let current = '';
  let inQuotes = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (c === '"') {
      if (inQuotes && line[i+1] === '"') { current += '"'; i++; }
      else inQuotes = !inQuotes;
    } else if (c === delim && !inQuotes) { result.push(current); current = ''; }
    else current += c;
  }
  result.push(current);
  return result;
}

function syntaxHighlight(xml) {
  return xml.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/(&lt;\/?)([\w:]+)/g, '$1<span class="xml-tag">$2</span>')
    .replace(/(&lt;\?[^?]*\?&gt;)/g, '<span class="xml-decl">$1</span>');
}

function doConvert() {
  const csv = $('#input').value.trim();
  if (!csv) return;
  let delim = $('#delim').value;
  if (delim === 'auto') delim = detectDelimiter(csv);
  else if (delim === 'tab') delim = '\t';
  const root = $('#root').value.trim() || 'data';
  const rowTag = $('#rowtag').value.trim() || 'row';
  const result = csvToXml(csv, delim, root, rowTag);
  if (result) {
    $('#output').innerHTML = syntaxHighlight(result.xml);
    $('#status').innerHTML = `<span style="color:var(--gz-success)">✓ ${result.count} ${t('rowsConverted')}</span>`;
  }
}

function loadExample() {
  $('#input').value = `name,age,email,city
Alice,30,alice@example.com,New York
Bob,25,bob@example.com,London
Charlie,35,charlie@example.com,Tokyo
Diana,28,diana@example.com,Paris`;
  doConvert();
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="doConvert()">${t('convert')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#input').value='';$('#output').textContent='';$('#status').innerHTML=''">${t('clear')}</button>`;

$('#lbl-in').textContent = t('inputLabel');
$('#lbl-out').textContent = t('outputLabel');

    {icon:'📄', href:'/convert/xml-to-json.html', name:'XML to JSON'},
  ]
});
</script>
