const { $, t, showToast } = GZ;

function capitalize(s) { return s ? s.charAt(0).toUpperCase() + s.slice(1).toLowerCase() : s; }

// Vowel check for natural syllable splits
function isVowel(c) { return /[aeiouAEIOU]/.test(c); }

function combine(a, b) {
  a = (a || '').trim();
  b = (b || '').trim();
  if (!a || !b) return [];
  const A = capitalize(a), B = capitalize(b);
  const al = a.toLowerCase(), bl = b.toLowerCase();
  const results = [];
  const seen = new Set();
  function add(name, src) {
    const key = name.toLowerCase().replace(/[^a-z0-9]/g, '');
    if (!key || seen.has(key)) return;
    seen.add(key);
    results.push({ name, src });
  }

  // 1. Classic portmanteau: first half of A + second half of B
  const aMid = Math.ceil(a.length / 2);
  const bMid = Math.floor(b.length / 2);
  add(A.slice(0, aMid) + B.slice(bMid), `${a.slice(0,aMid)} + ${b.slice(bMid)}`);

  // 2. Reverse portmanteau: first half of B + second half of A
  add(B.slice(0, Math.ceil(b.length / 2)) + A.slice(Math.floor(a.length / 2)), `${b.slice(0,Math.ceil(b.length/2))} + ${a.slice(Math.floor(a.length/2))}`);

  // 3. A full + B suffix (last 2-3 letters)
  add(A + bl.slice(-2), `${A} + ${bl.slice(-2)}`);
  add(A + bl.slice(-3), `${A} + ${bl.slice(-3)}`);

  // 4. B full + A suffix
  add(B + al.slice(-2), `${B} + ${al.slice(-2)}`);
  add(B + al.slice(-3), `${B} + ${al.slice(-3)}`);

  // 5. A prefix (first 2-3) + B full
  add(al.slice(0, 2) + B, `${al.slice(0,2)} + ${B}`);
  add(al.slice(0, 3) + B, `${al.slice(0,3)} + ${B}`);

  // 6. Overlap: find common letter where A ends and B begins
  let joined = null;
  for (let i = Math.min(a.length, b.length); i >= 1; i--) {
    if (al.slice(-i) === bl.slice(0, i)) { joined = A + B.slice(i); break; }
  }
  if (joined) add(joined, 'overlapping merge');

  // 7. Syllable-aware split: split A before first vowel, B after first vowel
  let aSplit = a.length;
  for (let i = 0; i < a.length; i++) { if (isVowel(a[i])) { aSplit = i + 1; break; } }
  let bSplit = 0;
  for (let i = 0; i < b.length; i++) { if (isVowel(b[i])) { bSplit = i + 1; break; } }
  add(A.slice(0, aSplit) + B.slice(bSplit > 0 ? bSplit - 1 : 0), 'syllable blend');

  // 8. Alternating letters
  let alt = '';
  for (let i = 0; i < Math.max(a.length, b.length); i++) {
    if (i < a.length) alt += a[i];
    if (i < b.length) alt += b[i];
  }
  add(capitalize(alt), 'alternating letters');

  // 9. A + "n" + B (X and Y style -> XnY)
  add(A + 'n' + B, `${A} + n + ${B}`);

  // 10. First letter of A + whole B
  add(capitalize(al[0] + bl), `${al[0]} + ${B}`);
  add(capitalize(al[0] + bl + al.slice(-1)), `${al[0]} + ${B} + ${al.slice(-1)}`);

  // 11. A + B concatenated
  add(A + B, `${A} + ${B}`);

  // 12. Blended at vowel of A
  let aVowel = a.length;
  for (let i = 1; i < a.length; i++) { if (isVowel(a[i])) { aVowel = i; break; } }
  add(A.slice(0, aVowel) + B, `${a.slice(0,aVowel)} + ${B}`);

  return results;
}

function render(list) {
  if (!list.length) {
    $('#grid').innerHTML = `<div class="nc-empty">${t('empty')}</div>`;
    return;
  }
  $('#grid').innerHTML = list.map((r, i) => `
    <div class="nc-card${i === 0 ? ' nc-fav' : ''}">
      <div>
        <span class="name">${r.name.replace(/</g,'&lt;')}</span>
        ${i === 0 ? `<span class="src">⭐ ${t('fav')}</span>` : `<span class="src">${r.src.replace(/</g,'&lt;')}</span>`}
      </div>
      <button data-name="${r.name.replace(/"/g,'&quot;')}" title="copy">📋</button>
    </div>`).join('');
  document.querySelectorAll('#grid .nc-card button').forEach(b => {
    b.addEventListener('click', async () => {
      const v = b.dataset.name.replace(/&quot;/g,'"');
      try { await navigator.clipboard.writeText(v); showToast(t('copied')); }
      catch (e) { showToast(t('copied')); }
    });
  });
}

function generate() {
  render(combine($('#name1').value, $('#name2').value));
}

function swap() {
  const a = $('#name1').value, b = $('#name2').value;
  $('#name1').value = b; $('#name2').value = a;
  generate();
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="generate()">${t('btnGen')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="swap()">🔁 ${t('btnSwap')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="document.getElementById('name1').value='';document.getElementById('name2').value='';generate()">${t('btnClear')}</button>`;

$('#lbl-name1').textContent = t('lblName1');
$('#lbl-name2').textContent = t('lblName2');
$('#name1').addEventListener('input', generate);
$('#name2').addEventListener('input', generate);

generate();
