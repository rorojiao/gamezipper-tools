<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="gz-preview-box"><span class="gz-preview-text" id="preview">GameZipper</span></div>
    <div class="gz-color-stops" id="colorStops"></div>
    <div class="gz-controls">
      <div><label id="lbl-text"></label><input type="text" id="previewText" value="GameZipper" oninput="update()"></div>
      <div><label id="lbl-direction"></label>
        <select id="direction" onchange="update()">
          <option value="to right">→ Right</option>
          <option value="to left">← Left</option>
          <option value="to bottom">↓ Down</option>
          <option value="to top">↑ Up</option>
          <option value="to bottom right">↘ Diagonal</option>
          <option value="to top right">↗ Diagonal Up</option>
          <option value="custom">Custom Angle</option>
        </select>
      </div>
      <div id="angleBox" style="display:none"><label id="lbl-angle"></label><input type="number" id="angle" value="45" min="0" max="360" oninput="update()"></div>
      <div><label id="lbl-fontsize"></label><input type="number" id="fontSize" value="48" min="12" max="200" oninput="update()"></div>
    </div>
    <div class="gz-code-box" id="codeBox"></div>
    <div id="status"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'CSS Text Gradient Generator',
    toolDesc: 'Create beautiful CSS gradient text effects with multiple colors, directions, and angles. Preview and copy code instantly.',
    previewText: 'Preview Text',
    direction: 'Direction',
    angle: 'Angle (degrees)',
    fontSize: 'Font Size (px)',
    step1: 'Enter your preview text and choose gradient colors',
    step2: 'Select gradient direction or set a custom angle',
    step3: 'Adjust font size to see how it looks',
    step4: 'Copy the generated CSS code to your project',
  },
  zh: {
    toolTitle: 'CSS 文字渐变生成器',
    toolDesc: '创建精美的 CSS 渐变文字效果，支持多色、多方向和自定义角度。即时预览并复制代码。',
    previewText: '预览文字',
    direction: '方向',
    angle: '角度（度）',
    fontSize: '字号（像素）',
    step1: '输入预览文字并选择渐变颜色',
    step2: '选择渐变方向或设置自定义角度',
    step3: '调整字号查看效果',
    step4: '将生成的 CSS 代码复制到项目中',
  }
});

const { $, copyText, t } = GZ;
let stops = [
  { color: '#ff6b6b', pos: '0%' },
  { color: '#feca57', pos: '50%' },
  { color: '#48dbfb', pos: '100%' }
];

function renderStops() {
  const container = $('#colorStops');
  container.innerHTML = stops.map((s, i) => `
    <div class="gz-color-stop">
      <input type="color" value="${s.color}" onchange="stops[${i}].color=this.value;update()">
      <input type="text" value="${s.pos}" onchange="stops[${i}].pos=this.value;update()">
      ${stops.length > 2 ? `<span class="gz-remove-stop" onclick="stops.splice(${i},1);renderStops();update()">×</span>` : ''}
    </div>
  `).join('') + `<button class="gz-btn gz-btn-secondary" onclick="stops.push({color:'#'+Math.floor(Math.random()*16777215).toString(16).padStart(6,'0'),pos:'100%'});renderStops();update()" style="padding:6px 12px;font-size:.8em">+ Color</button>`;
}

function update() {
  const text = $('#previewText').value || 'GameZipper';
  const dir = $('#direction').value;
  const angleVal = $('#angle').value;
  const size = $('#fontSize').value || 48;
  const angleBox = $('#angleBox');

  angleBox.style.display = dir === 'custom' ? '' : 'none';

  let gradientDir = dir;
  if (dir === 'custom') gradientDir = angleVal + 'deg';

  const colorStops = stops.map(s => `${s.color} ${s.pos}`).join(', ');
  const gradient = `linear-gradient(${gradientDir}, ${colorStops})`;

  const preview = $('#preview');
  preview.textContent = text;
  preview.style.fontSize = size + 'px';
  preview.style.background = gradient;
  preview.style.webkitBackgroundClip = 'text';
  preview.style.backgroundClip = 'text';
  preview.style.webkitTextFillColor = 'transparent';
  preview.style.display = 'inline-block';

  const css = `.gradient-text {\n  background: ${gradient};\n  -webkit-background-clip: text;\n  background-clip: text;\n  -webkit-text-fill-color: transparent;\n  font-size: ${size}px;\n  font-weight: bold;\n}`;
  $('#codeBox').textContent = css;
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="copyText($('#codeBox').textContent)">${t('copy')} CSS</button>
  <button class="gz-btn gz-btn-secondary" onclick="stops=[{color:'#ff6b6b',pos:'0%'},{color:'#feca57',pos:'50%'},{color:'#48dbfb',pos:'100%'}];renderStops();update()">${t('clear')}</button>`;

renderStops();
update();

GZ.renderToolPage({
  category: 'css-tools',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🌈', href:'/css-tools/gradient.html', name:'CSS Gradient'},
    {icon:'✨', href:'/css-tools/neon-text.html', name:'Neon Text'},
    {icon:'🎨', href:'/text/3d-text.html', name:'3D Text'},
    {icon:'🔲', href:'/css-tools/text-shadow.html', name:'Text Shadow'},
  ]
});
</script>
