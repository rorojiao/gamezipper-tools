<script>
GZI18n.register({
  en: {
    toolTitle: 'Minesweeper',
    toolDesc: 'Classic Minesweeper puzzle game. Reveal all safe cells without hitting a mine. Adjustable difficulty from beginner to expert.',
    beginner: 'Beginner', intermediate: 'Intermediate', expert: 'Expert', custom: 'Custom',
    newGame: 'New Game', rows: 'Rows', cols: 'Cols', mines: 'Mines',
    gameOver: '💥 Game Over!', youWin: '🎉 You Win!',
    step1: 'Select difficulty level (Beginner, Intermediate, Expert, or Custom)',
    step2: 'Left-click a cell to reveal it; right-click (or long-press) to flag a mine',
    step3: 'Numbers show how many mines are in adjacent cells',
    step4: 'Reveal all non-mine cells to win the game',
  },
  zh: {
    toolTitle: '扫雷游戏',
    toolDesc: '经典扫雷益智游戏。揭开所有安全格子而不踩到地雷。支持从入门到专家的难度调节。',
    beginner: '入门', intermediate: '中级', expert: '专家', custom: '自定义',
    newGame: '新游戏', rows: '行', cols: '列', mines: '雷数',
    gameOver: '💥 游戏结束！', youWin: '🎉 你赢了！',
    step1: '选择难度等级（入门、中级、专家或自定义）',
    step2: '左键点击揭开格子，右键（或长按）标记地雷',
    step3: '数字表示周围8格中地雷的数量',
    step4: '揭开所有非雷格子即可获胜',
  }
});

const { $, t } = GZ;
let grid, rows, cols, totalMines, revealed, flagged, gameOver, gameWon, timerInterval, seconds;
const presets = { beginner:[9,9,10], intermediate:[16,16,40], expert:[30,16,99] };

function initGame(r, c, m) {
  clearInterval(timerInterval);
  rows = r; cols = c; totalMines = Math.min(m, r*c-9);
  revealed = 0; flagged = 0; gameOver = false; gameWon = false; seconds = 0;
  grid = Array.from({length:rows}, ()=>Array.from({length:cols}, ()=>({mine:false, open:false, flag:false, count:0})));
  $('#mineCount').textContent = totalMines;
  $('#timer').textContent = '0';
  $('#status').textContent = '';
  renderBoard();
}

function placeMines(sr, sc) {
  let placed = 0;
  while (placed < totalMines) {
    const r = Math.floor(Math.random()*rows), c = Math.floor(Math.random()*cols);
    if (grid[r][c].mine || (Math.abs(r-sr)<=1 && Math.abs(c-sc)<=1)) continue;
    grid[r][c].mine = true; placed++;
  }
  for (let r=0;r<rows;r++) for (let c=0;c<cols;c++) {
    if (grid[r][c].mine) continue;
    let cnt=0;
    for (let dr=-1;dr<=1;dr++) for (let dc=-1;dc<=1;dc++) {
      const nr=r+dr,nc=c+dc;
      if (nr>=0&&nr<rows&&nc>=0&&nc<cols&&grid[nr][nc].mine) cnt++;
    }
    grid[r][c].count=cnt;
  }
}

function renderBoard() {
  const board=$('#board');
  board.style.gridTemplateColumns=`repeat(${cols},32px)`;
  board.innerHTML='';
  for (let r=0;r<rows;r++) for (let c=0;c<cols;c++) {
    const cell=document.createElement('div');
    cell.className='cell';
    cell.dataset.r=r; cell.dataset.c=c;
    cell.addEventListener('click',()=>reveal(r,c));
    cell.addEventListener('contextmenu',e=>{e.preventDefault();toggleFlag(r,c)});
    let longT;
    cell.addEventListener('touchstart',e=>{longT=setTimeout(()=>{e.preventDefault();toggleFlag(r,c)},400)});
    cell.addEventListener('touchend',()=>clearTimeout(longT));
    board.appendChild(cell);
  }
}

function getCell(r,c) { return $(`[data-r="${r}"][data-c="${c}"]`); }

function reveal(r,c) {
  if (gameOver||gameWon||grid[r][c].open||grid[r][c].flag) return;
  if (revealed===0) { placeMines(r,c); startTimer(); }
  grid[r][c].open=true; revealed++;
  const cell=getCell(r,c); cell.classList.add('revealed');
  if (grid[r][c].mine) {
    cell.classList.add('mine'); cell.textContent='💣';
    gameOver=true; clearInterval(timerInterval);
    $('#status').textContent=t('gameOver');
    for (let rr=0;rr<rows;rr++) for (let cc=0;cc<cols;cc++) {
      if (grid[rr][cc].mine&&!grid[rr][cc].open) { const mc=getCell(rr,cc); mc.classList.add('revealed','mine'); mc.textContent='💣'; }
    }
    return;
  }
  if (grid[r][c].count>0) { cell.textContent=grid[r][c].count; cell.classList.add('c'+grid[r][c].count); }
  else { for (let dr=-1;dr<=1;dr++) for (let dc=-1;dc<=1;dc++) { const nr=r+dr,nc=c+dc; if (nr>=0&&nr<rows&&nc>=0&&nc<cols&&!grid[nr][nc].open) reveal(nr,nc); } }
  checkWin();
}

function toggleFlag(r,c) {
  if (gameOver||gameWon||grid[r][c].open) return;
  grid[r][c].flag=!grid[r][c].flag;
  const cell=getCell(r,c);
  if (grid[r][c].flag) { cell.textContent='🚩'; cell.classList.add('flagged'); flagged++; }
  else { cell.textContent=''; cell.classList.remove('flagged'); flagged--; }
  $('#mineCount').textContent=totalMines-flagged;
}

function checkWin() {
  if (revealed===rows*cols-totalMines) {
    gameWon=true; clearInterval(timerInterval);
    $('#status').textContent=t('youWin');
    for (let r=0;r<rows;r++) for (let c=0;c<cols;c++) {
      if (grid[r][c].mine) { const cell=getCell(r,c); cell.classList.add('revealed'); cell.textContent='🚩'; }
    }
  }
}

function startTimer() { timerInterval=setInterval(()=>{ seconds++; $('#timer').textContent=seconds; },1000); }

const tb=$('#toolbar');
tb.innerHTML=`
  <button class="gz-btn" onclick="initGame(9,9,10)">${t('beginner')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="initGame(16,16,40)">${t('intermediate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="initGame(30,16,99)">${t('expert')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="initGame(+prompt('${t('rows')}',16),+prompt('${t('cols')}',16),+prompt('${t('mines')}',40))">${t('custom')}</button>
  <button class="gz-btn" onclick="initGame(rows,cols,totalMines)">${t('newGame')}</button>`;

GZ.renderToolPage({
  category:'fun',
  titleKey:'toolTitle',
  descKey:'toolDesc',
  howToSteps:['step1','step2','step3','step4'],
  related:[
    {icon:'🔢',href:'/fun/wordle.html',name:'Wordle'},
    {icon:'🐍',href:'/fun/snake.html',name:'Snake'},
    {icon:'🎯',href:'/fun/sudoku.html',name:'Sudoku'},
    {icon:'⌨️',href:'/fun/typing-test.html',name:'Typing Test'},
  ]
});
initGame(9,9,10);
</script>
