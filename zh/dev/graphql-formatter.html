const { $, copyText, t } = GZ;

const KEYWORDS = new Set(['query','mutation','subscription','fragment','on','schema','type','input','interface','union','enum','scalar','extend','implements','directive','repeatable','true','false','null']);
const TYPE_KW = new Set(['type','input','interface','union','enum','scalar','implements','extend','schema','directive']);

function beautifyGraphQL(src, opts){
  const indent = opts.indent;
  const pad = d => ' '.repeat(d * indent);
  let out = '';
  let i = 0, n = src.length;
  let depth = 0;
  let lineStart = true;

  function nl(){ out += '\n'; lineStart = true; }
  function ensureIndent(){ if (lineStart){ out += pad(depth); lineStart = false; } }
  function ws(){ if (out.length && !/[\s({:]\s*$/.test(out) && !lineStart) out += ' '; }

  while (i < n){
    const c = src[i];
    // comments
    if (c === '#'){
      ensureIndent();
      let e = src.indexOf('\n', i); if (e === -1) e = n;
      out += src.substring(i, e);
      i = e;
      nl();
      continue;
    }
    // strings
    if (c === '"'){
      if (src[i+1] === '"' && src[i+2] === '"'){
        // block string
        let j = i + 3;
        while (j < n){
          if (src[j] === '"' && src[j+1] === '"' && src[j+2] === '"'){ j += 3; break; }
          j++;
        }
        ensureIndent();
        out += src.substring(i, j);
        i = j; continue;
      }
      let j = i+1;
      while (j < n && src[j] !== '"'){ if (src[j] === '\\') j++; j++; }
      ensureIndent();
      out += src.substring(i, Math.min(j+1, n));
      i = Math.min(j+1, n); continue;
    }
    if (/\s/.test(c)){
      // collapse whitespace
      if (out.length && !/[\s]$/.test(out)) out += ' ';
      i++;
      continue;
    }
    // braces
    if (c === '{'){
      // space before { if needed
      ensureIndent();
      out += ' {';
      i++;
      depth++;
      nl();
      continue;
    }
    if (c === '}'){
      if (depth > 0) depth--;
      out = out.replace(/\s+$/, '');
      nl();
      ensureIndent();
      out += '}';
      i++;
      // ensure a space or newline follows the closing brace before the next token
      const rest = src.substring(i);
      const ws = rest.search(/\S/);
      if (ws !== -1){
        const nextCh = rest[ws];
        if (nextCh && /[A-Za-z_$@]/.test(nextCh)){ out += '\n'; lineStart = true; }
      }
      continue;
    }
    if (c === '(' || c === '['){
      ensureIndent();
      out += c;
      i++;
      continue;
    }
    if (c === ')' || c === ']'){
      out += c;
      i++;
      continue;
    }
    if (c === ','){
      // usually optional in GraphQL; emit newline for lists
      i++;
      continue;
    }
    if (c === ':'){
      out += ': ';
      i++;
      continue;
    }
    if (c === '='){
      out += ' = ';
      i++;
      continue;
    }
    if (c === '@'){
      // directive
      ensureIndent();
      out += '@';
      i++;
      let j = i;
      while (j < n && /[A-Za-z0-9_]/.test(src[j])) j++;
      out += src.substring(i, j);
      i = j;
      continue;
    }
    if (c === '$' || c === '!'){
      ensureIndent();
      out += c;
      i++;
      continue;
    }
    // identifiers
    if (/[A-Za-z_]/.test(c)){
      let j = i;
      while (j < n && /[A-Za-z0-9_]/.test(src[j])) j++;
      const word = src.substring(i, j);
      ensureIndent();
      out += word;
      i = j;
      continue;
    }
    // numbers
    if (/[\d-]/.test(c)){
      let j = i;
      if (c === '-') j++;
      while (j < n && /[\d.eE+\-]/.test(src[j])) j++;
      ensureIndent();
      out += src.substring(i, j);
      i = j;
      continue;
    }
    ensureIndent();
    out += c;
    i++;
  }
  return out.replace(/\n{3,}/g, '\n\n').replace(/[ \t]+$/gm,'').trim() + '\n';
}

function minifyGraphQL(src){
  // remove comments, collapse whitespace
  let out = '';
  let i = 0, n = src.length;
  let inStr = false, strCh = '';
  let inBlock = false;
  while (i < n){
    const c = src[i];
    if (inStr){
      out += c;
      if (c === '\\' && i+1 < n){ out += src[i+1]; i += 2; continue; }
      if (c === strCh) inStr = false;
      i++; continue;
    }
    if (inBlock){
      out += c;
      if (c === '"' && src[i+1] === '"' && src[i+2] === '"'){ out += '""'; inBlock = false; i += 3; continue; }
      i++; continue;
    }
    if (c === '#'){
      let e = src.indexOf('\n', i); if (e === -1) e = n;
      i = e; continue;
    }
    if (c === '"'){
      if (src[i+1] === '"' && src[i+2] === '"'){ inBlock = true; out += '"""'; i += 3; continue; }
      inStr = true; strCh = '"'; out += c; i++; continue;
    }
    if (/\s/.test(c)){
      if (out.length && !/[\s{(,:[@$!]/.test(out[out.length-1])) out += ' ';
      i++; continue;
    }
    out += c; i++;
  }
  return out.trim();
}

const KEYWORDS_SET = KEYWORDS;
function highlight(code){
  let i = 0, n = code.length, out = '';
  function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  while (i < n){
    const c = code[i];
    if (c === '#'){
      let e = code.indexOf('\n', i); if (e === -1) e = n;
      out += `<span class="gql-com">${esc(code.substring(i, e))}</span>`;
      i = e; continue;
    }
    if (c === '"'){
      let j = i+1;
      while (j < n && code[j] !== '"'){ if (code[j] === '\\') j++; j++; }
      out += `<span class="gql-str">${esc(code.substring(i, Math.min(j+1,n)))}</span>`;
      i = Math.min(j+1, n); continue;
    }
    if (/[A-Za-z_]/.test(c)){
      let j = i; while (j < n && /[A-Za-z0-9_]/.test(code[j])) j++;
      const word = code.substring(i, j);
      if (KEYWORDS_SET.has(word)) out += `<span class="gql-kw">${esc(word)}</span>`;
      else out += esc(word);
      i = j; continue;
    }
    out += esc(c); i++;
  }
  return out;
}

function getOpts(){ return { indent: parseInt($('#ind').value) || 2 }; }

function doBeautify(){
  const inp = $('#input').value;
  if (!inp.trim()){ $('#status').innerHTML = `<span style="color:var(--gz-accent)">${t('empty')}</span>`; $('#output').innerHTML=''; return; }
  const out = beautifyGraphQL(inp, getOpts());
  $('#output').innerHTML = highlight(out);
  window._gqlOut = out;
  $('#status').innerHTML = `<span style="color:var(--gz-success)">${t('done')} · ${out.split('\n').length} lines</span>`;
}
function doMinify(){
  const inp = $('#input').value;
  if (!inp.trim()){ $('#status').innerHTML = `<span style="color:var(--gz-accent)">${t('empty')}</span>`; $('#output').innerHTML=''; return; }
  const out = minifyGraphQL(inp);
  window._gqlOut = out;
  $('#output').innerHTML = highlight(out);
  $('#status').innerHTML = `<span style="color:var(--gz-success)">${t('minified')} · ${out.length} chars</span>`;
}
function doCopy(){ if (window._gqlOut != null) copyText(window._gqlOut); }
function doDownload(){
  if (window._gqlOut == null) return;
  const blob = new Blob([window._gqlOut], {type:'application/graphql'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'query.graphql';
  a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href), 1000);
}
function loadExample(){
  $('#input').value =
`query GetUser($id:ID!){user(id:$id){id name email role posts(first:10){edges{node{title createdAt comments{totalCount}}}pageInfo{hasNextPage endCursor}}}followers{name}}}`;
  doBeautify();
}
function doClear(){ $('#input').value=''; $('#output').innerHTML=''; $('#status').innerHTML=''; window._gqlOut=null; }

$('#opts').innerHTML = `

    <select id="ind">
      <option value="2">2 ${t('spaces')}</option>

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="doBeautify()">${t('beautify')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doMinify()">${t('minify')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn" onclick="doCopy()">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doDownload()">⬇ .graphql</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

$('#input').addEventListener('input', ()=>{ window._gqlOut=null; });
