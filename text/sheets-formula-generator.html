const { $, t } = GZ;

const CATEGORIES = [
  { id:'all', icon:'⭐', en:'All', zh:'全部' },
  { id:'lookup', icon:'🔍', en:'Lookup & Reference', zh:'查找与引用' },
  { id:'math', icon:'➕', en:'Math & Stats', zh:'数学与统计' },
  { id:'text', icon:'📝', en:'Text & String', zh:'文本与字符串' },
  { id:'date', icon:'📅', en:'Date & Time', zh:'日期与时间' },
  { id:'conditional', icon:'🔀', en:'Conditional & Logic', zh:'条件与逻辑' },
  { id:'array', icon:'🔢', en:'Array & Dynamic', zh:'数组与动态' },
  { id:'lookup2', icon:'🧮', en:'Counting & SUM', zh:'计数与求和' },
  { id:'format', icon:'🎨', en:'Format & Conversion', zh:'格式与转换' },
];

const FORMULAS = [
  // Lookup
  { cat:'lookup', name:'VLOOKUP', desc:'Look up a value in the first column and return a value from another column', formula:'=VLOOKUP(search_key, range, index, [is_sorted])', expl:'Searches for <b>search_key</b> in the first column of <b>range</b>, and returns the value from column <b>index</b>. Set <b>is_sorted</b> to FALSE for exact match.' },
  { cat:'lookup', name:'INDEX / MATCH', desc:'Flexible lookup that can search in any column direction', formula:'=INDEX(return_range, MATCH(search_key, lookup_range, 0))', expl:'MATCH finds the row position of <b>search_key</b> in <b>lookup_range</b>. INDEX then returns the value at that position from <b>return_range</b>. Works for both left and right lookups.' },
  { cat:'lookup', name:'XLOOKUP', desc:'Modern replacement for VLOOKUP with default exact match', formula:'=XLOOKUP(search_key, lookup_range, return_range, [if_not_found])', expl:'Modern lookup function. Returns <b>if_not_found</b> if no match. Works in Excel 365 and Google Sheets. No column index required.' },
  { cat:'lookup', name:'HLOOKUP', desc:'Look up a value in the top row and return from a row below', formula:'=HLOOKUP(search_key, range, row_index, [is_sorted])', expl:'Horizontal version of VLOOKUP. Searches the first row of <b>range</b> and returns the value from <b>row_index</b>.' },
  { cat:'lookup', name:'INDIRECT', desc:'Convert a text string to a cell reference', formula:'=INDIRECT("A"&B1)', expl:'Returns the reference specified by a text string. Useful for dynamic ranges like <b>"A"&row_num</b>.' },
  // Math
  { cat:'math', name:'SUM', desc:'Add up a range of numbers', formula:'=SUM(A1:A10)', expl:'Sums all numeric values in the range. Ignores text and empty cells.' },
  { cat:'math', name:'AVERAGE', desc:'Calculate the arithmetic mean of a range', formula:'=AVERAGE(A1:A10)', expl:'Returns the arithmetic mean. Ignores text and empty cells.' },
  { cat:'math', name:'MEDIAN', desc:'Find the middle value in a range', formula:'=MEDIAN(A1:A10)', expl:'Returns the middle value when data is sorted. For even counts, returns the average of the two middle values.' },
  { cat:'math', name:'MAX / MIN', desc:'Find the largest or smallest value in a range', formula:'=MAX(A1:A10)', expl:'Returns the largest (MAX) or smallest (MIN) numeric value. Ignores text and empty cells.' },
  { cat:'math', name:'ROUND', desc:'Round a number to a specified number of decimal places', formula:'=ROUND(A1, 2)', expl:'Rounds <b>number</b> to <b>decimals</b> places. Use ROUNDUP or ROUNDDOWN for directional rounding.' },
  { cat:'math', name:'RAND / RANDBETWEEN', desc:'Generate a random number', formula:'=RANDBETWEEN(1, 100)', expl:'RAND() returns a decimal 0-1. RANDBETWEEN(min, max) returns an integer in the range. Recalculates on every sheet change.' },
  { cat:'math', name:'POWER / SQRT', desc:'Raise to a power or take the square root', formula:'=POWER(2, 10)', expl:'POWER(number, exponent). SQRT(number) takes the square root. Same as <b>number^exponent</b>.' },
  // Text
  { cat:'text', name:'CONCATENATE / CONCAT', desc:'Join two or more text strings', formula:'=CONCATENATE(A1, " ", B1)', expl:'Joins strings into one. In modern Sheets/Excel use <b>=A1&" "&B1</b> or CONCAT for ranges.' },
  { cat:'text', name:'TEXTJOIN', desc:'Join a range with a custom delimiter', formula:'=TEXTJOIN(", ", TRUE, A1:A10)', expl:'Joins all values in <b>range</b> with <b>delimiter</b>. Set <b>ignore_empty</b> to TRUE to skip blank cells.' },
  { cat:'text', name:'LEFT / RIGHT / MID', desc:'Extract a portion of text', formula:'=MID(A1, 2, 5)', expl:'LEFT(text, n) = first n chars. RIGHT(text, n) = last n chars. MID(text, start, length) = chars from <b>start</b> for <b>length</b>.' },
  { cat:'text', name:'LEN', desc:'Count the number of characters in a text string', formula:'=LEN(A1)', expl:'Returns the number of characters including spaces. Use LEN(TRIM(A1)) to exclude trailing whitespace.' },
  { cat:'text', name:'UPPER / LOWER / PROPER', desc:'Change the case of text', formula:'=PROPER(A1)', expl:'UPPER makes all caps, LOWER all lowercase, PROPER capitalizes the first letter of each word.' },
  { cat:'text', name:'TRIM', desc:'Remove extra spaces from text', formula:'=TRIM(A1)', expl:'Removes leading, trailing, and consecutive internal spaces, leaving single spaces between words.' },
  { cat:'text', name:'SUBSTITUTE / REPLACE', desc:'Replace text in a string', formula:'=SUBSTITUTE(A1, "old", "new")', expl:'SUBSTITUTE replaces specific text. REPLACE(text, start, length, new_text) replaces by position.' },
  { cat:'text', name:'SPLIT (Sheets)', desc:'Split a string into multiple cells using a delimiter', formula:'=SPLIT(A1, ",")', expl:'Google Sheets only. Splits <b>text</b> by <b>delimiter</b> into multiple cells. Use TEXTSPLIT in Excel 365.' },
  { cat:'text', name:'SEARCH / FIND', desc:'Find the position of a substring', formula:'=SEARCH("@", A1)', expl:'Returns the 1-based position of <b>find_text</b> within <b>within_text</b>. SEARCH is case-insensitive, FIND is case-sensitive.' },
  // Date
  { cat:'date', name:'TODAY / NOW', desc:'Get the current date or date+time', formula:'=TODAY()', expl:'TODAY returns the current date. NOW returns the current date and time. Both update on every recalculation.' },
  { cat:'date', name:'DATEDIF', desc:'Calculate the difference between two dates', formula:'=DATEDIF(A1, B1, "d")', expl:'Returns the difference in <b>unit</b>: "Y" years, "M" months, "D" days, "MD" days ignoring months, "YM" months ignoring years.' },
  { cat:'date', name:'YEAR / MONTH / DAY', desc:'Extract year, month or day from a date', formula:'=YEAR(A1)', expl:'Returns the year, month (1-12), or day (1-31) of a date. Combine with DATE to construct new dates.' },
  { cat:'date', name:'WEEKDAY', desc:'Return the day of the week (1-7)', formula:'=WEEKDAY(A1, 2)', expl:'Returns 1=Sunday to 7=Saturday by default. Use <b>type=2</b> for Monday=1, or TEXT(A1,"dddd") for the name.' },
  { cat:'date', name:'EOMONTH', desc:'Get the last day of a month, N months from a date', formula:'=EOMONTH(A1, 0)', expl:'Returns the last day of the month <b>months</b> away from <b>start_date</b>. Use 0 for current month, 1 for next month, -1 for previous.' },
  { cat:'date', name:'NETWORKDAYS', desc:'Count weekdays between two dates', formula:'=NETWORKDAYS(A1, B1)', expl:'Returns the number of whole working days (Mon-Fri) between two dates. Add a third argument for holidays.' },
  // Conditional
  { cat:'conditional', name:'IF', desc:'Return one value if a condition is true, another if false', formula:'=IF(A1>100, "Big", "Small")', expl:'The most common conditional. Nest multiple IFs for more branches, or use IFS() / SWITCH() for cleaner code.' },
  { cat:'conditional', name:'IFS', desc:'Chain multiple conditions without nesting', formula:'=IFS(A1>100, "Big", A1>50, "Medium", TRUE, "Small")', expl:'Evaluates conditions in order and returns the value for the first TRUE. End with <b>TRUE, default</b>.' },
  { cat:'conditional', name:'AND / OR / NOT', desc:'Combine multiple conditions', formula:'=AND(A1>0, A1<100)', expl:'AND returns TRUE only if all args are TRUE. OR returns TRUE if any is TRUE. NOT negates a logical value.' },
  { cat:'conditional', name:'IFERROR', desc:'Return a custom value if a formula produces an error', formula:'=IFERROR(A1/B1, 0)', expl:'If <b>value</b> is an error (#DIV/0!, #N/A, etc.), returns <b>value_if_error</b>. Otherwise returns <b>value</b>.' },
  { cat:'conditional', name:'SWITCH', desc:'Match a value against many options', formula:'=SWITCH(A1, 1, "Mon", 2, "Tue", "Other")', expl:'Returns the value matching <b>expression</b> from the list of cases. Default returned when no match.' },
  { cat:'conditional', name:'ISBLANK / ISNUMBER / ISTEXT', desc:'Check the type of a cell', formula:'=ISBLANK(A1)', expl:'Returns TRUE if the value matches the type. Other useful: ISERROR, ISLOGICAL, ISFORMULA, ISEMAIL (Sheets).' },
  // Count/Sum
  { cat:'lookup2', name:'COUNTIF', desc:'Count cells that meet a single condition', formula:'=COUNTIF(A:A, "Apple")', expl:'Counts cells in <b>range</b> matching <b>criteria</b>. Use wildcards: "*apple*" for contains, "?" for any single char.' },
  { cat:'lookup2', name:'COUNTIFS', desc:'Count cells that meet multiple conditions', formula:'=COUNTIFS(A:A, "Apple", B:B, ">10")', expl:'Each pair is (range, criteria). All conditions must be TRUE for a cell to be counted.' },
  { cat:'lookup2', name:'SUMIF', desc:'Sum cells that meet a single condition', formula:'=SUMIF(A:A, "Apple", B:B)', expl:'Sums values in <b>sum_range</b> where <b>range</b> matches <b>criteria</b>. If sum_range omitted, sums range itself.' },
  { cat:'lookup2', name:'SUMIFS', desc:'Sum cells that meet multiple conditions', formula:'=SUMIFS(B:B, A:A, "Apple", C:C, ">5")', expl:'Sums <b>sum_range</b> for cells where all (range, criteria) pairs are TRUE. Up to 127 condition pairs.' },
  { cat:'lookup2', name:'AVERAGEIF', desc:'Average cells that meet a condition', formula:'=AVERAGEIF(A:A, ">0", B:B)', expl:'Averages <b>average_range</b> for cells in <b>range</b> matching <b>criteria</b>.' },
  { cat:'lookup2', name:'COUNTA', desc:'Count non-empty cells', formula:'=COUNTA(A1:A100)', expl:'Counts cells that are not empty, including text. Use COUNT() to count only numeric cells.' },
  // Array
  { cat:'array', name:'FILTER', desc:'Return only rows that match a condition', formula:'=FILTER(A1:C10, B1:B10>50)', expl:'Returns rows from <b>array</b> where <b>include</b> is TRUE. Can chain multiple conditions with * (AND) and + (OR).' },
  { cat:'array', name:'SORT', desc:'Sort a range by one or more columns', formula:'=SORT(A1:C10, 2, -1)', expl:'Sorts <b>range</b> by column <b>sort_index</b> ascending (1) or descending (-1). Can sort by multiple columns.' },
  { cat:'array', name:'UNIQUE', desc:'Return distinct values from a range', formula:'=UNIQUE(A1:A100)', expl:'Returns unique rows. Set <b>by_column</b> to TRUE for column-based deduplication. Set <b>exactly_once</b> to TRUE for values that appear only once.' },
  { cat:'array', name:'TRANSPOSE', desc:'Flip rows and columns', formula:'=TRANSPOSE(A1:C3)', expl:'Transposes a 2D range — rows become columns. Useful for converting horizontal lists to vertical.' },
  { cat:'array', name:'SEQUENCE', desc:'Generate a sequence of numbers', formula:'=SEQUENCE(10, 1, 1, 1)', expl:'Returns <b>rows</b> x <b>columns</b> array of numbers starting at <b>start</b>, stepping by <b>step</b>.' },
  { cat:'array', name:'SPLIT (array)', desc:'Split a single column into multiple columns', formula:'=SPLIT(A1:A10, ",")', expl:'Google Sheets specific. Splits each value in the array by delimiter. For Excel use TEXTSPLIT in 365.' },
  // Format
  { cat:'format', name:'TEXT', desc:'Format a number or date as text', formula:'=TEXT(A1, "yyyy-mm-dd")', expl:'Formats <b>value</b> using <b>format_text</b>. Common codes: "0.00" (2 decimals), "yyyy-mm-dd" (date), "$#,##0" (currency).' },
  { cat:'format', name:'DOLLAR / FIXED', desc:'Format a number as currency or fixed-decimal text', formula:'=TEXT(A1, "$#,##0.00")', expl:'DOLLAR adds currency symbol. FIXED rounds to <b>decimals</b> and returns text. TEXT is more flexible.' },
  { cat:'format', name:'VALUE', desc:'Convert a text string to a number', formula:'=VALUE("123.45")', expl:'Converts a numeric text string to a number. Useful after importing data that arrived as text.' },
  { cat:'format', name:'UPPER (format)', desc:'Convert text to upper case', formula:'=UPPER(A1)', expl:'Returns text in all uppercase. Pairs with LOWER and PROPER for case formatting.' },
];

let activeCat = 'all';
let activeFormula = null;

function getLang() {
  return document.documentElement.lang === 'zh' ? 'zh' : 'en';
}

function renderCats() {
  const lang = getLang();
  $('#cats').innerHTML = CATEGORIES.map(c =>
    `<div class="gs-cat ${activeCat===c.id?'active':''}" data-cat="${c.id}">${c.icon} ${lang==='zh'?c.zh:c.en}</div>`
  ).join('');
  $('#cats').querySelectorAll('.gs-cat').forEach(el => el.addEventListener('click', e => {
    activeCat = e.currentTarget.dataset.cat;
    renderCats();
    renderFormulas();
  }));
}

function renderFormulas() {
  const q = $('#search').value.toLowerCase();
  const list = FORMULAS.filter(f => {
    if (activeCat !== 'all' && f.cat !== activeCat) return false;
    if (q && !(f.name.toLowerCase().includes(q) || f.desc.toLowerCase().includes(q) || f.formula.toLowerCase().includes(q))) return false;
    return true;
  });
  $('#templates').innerHTML = list.length === 0
    ? '<p style="color:var(--text2);font-size:.85rem;padding:20px;text-align:center">No formulas match your search.</p>'
    : list.map((f, i) => `<div class="gs-tpl" data-idx="${FORMULAS.indexOf(f)}">
        <div class="name">${f.name}</div>
        <div class="desc">${f.desc}</div>
      </div>`).join('');
  $('#templates').querySelectorAll('.gs-tpl').forEach(el => el.addEventListener('click', e => {
    const idx = +e.currentTarget.dataset.idx;
    selectFormula(FORMULAS[idx]);
  }));
}

function selectFormula(f) {
  activeFormula = f;
  $('#outputText').textContent = f.formula;
  $('#expl').innerHTML = '<b>What it does:</b> ' + f.expl;
  $('#actions').innerHTML = '<div class="gs-chip">=' + f.name + '</div>' + (f.formula.length < 40 ? '<div class="gs-chip">' + f.formula.length + ' chars</div>' : '');
}

function copyFormula() {
  if (!activeFormula) return;
  GZ.copyText(activeFormula.formula);
  GZ.showToast(t('copied'));
}

function trySimulate() {
  if (!activeFormula) { GZ.showToast('Pick a formula first'); return; }
  const raw = $('#testRange').value;
  if (!raw.trim()) { GZ.showToast('Enter a sample range'); return; }
  // Simple parser: A1:B5 = cell1,cell2|cell1,cell2
  const cells = raw.split('|').map(r => r.split(',').map(c => c.trim()));
  const out = $('#testOut');
  out.style.display = '';
  out.innerHTML = '<b>Sample range:</b><br>' + cells.map((r, i) => 'Row ' + (i+1) + ': ' + r.join(' | ')).join('<br>') +
    '<br><br><b>Note:</b> This is a quick preview of the input data. Paste the actual formula into Sheets/Excel for full evaluation, since most formulas require live cell references that the browser cannot fully simulate.';
}

$('#search').addEventListener('input', renderFormulas);
$('#testBtn').addEventListener('click', trySimulate);
window.copyFormula = copyFormula;

renderCats();
renderFormulas();

GZ.renderToolPage({
  category: 'text',

  descKey: 'toolDesc',

    {icon:'📝', href:'/text/markdown-to-html.html', name:'Markdown to HTML'},
    {icon:'🔢', href:'/convert/number-base.html', name:'Number Base'},
  ]
});
</script>
