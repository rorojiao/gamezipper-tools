const { $, copyText, t } = GZ;

const WORDS = [
  {word:'Serendipity',pron:'/ˌsɛrənˈdɪpɪti/',type:'noun',def:'The occurrence and development of events by chance in a happy or beneficial way.',ety:'Coined by Horace Walpole in 1754, from the Persian fairy tale "The Three Princes of Serendip".',ex:'Finding that rare book at the garage sale was pure serendipity.'},
  {word:'Ephemeral',pron:'/ɪˈfɛm(ə)rəl/',type:'adjective',def:'Lasting for a very short time; transitory.',ety:'From Greek "ephēmeros" — lasting only a day.',ex:'The ephemeral beauty of cherry blossoms reminds us to appreciate the moment.'},
  {word:'Petrichor',pron:'/ˈpɛtrɪkɔː/',type:'noun',def:'The pleasant, earthy smell produced when rain falls on dry soil.',ety:'Coined in 1964 from Greek "petra" (stone) + "ichor" (the fluid of the gods).',ex:'After the long drought, the petrichor filled the air with the first rain.'},
  {word:'Mellifluous',pron:'/məˈlɪfluəs/',type:'adjective',def:'Sweet or musical; pleasant to hear (of a voice or words).',ety:'From Latin "mel" (honey) + "fluere" (to flow).',ex:'Her mellifluous voice captivated everyone in the auditorium.'},
  {word:'Quintessential',pron:'/ˌkwɪntɪˈsɛnʃəl/',type:'adjective',def:'Representing the most perfect or typical example of a quality or class.',ety:'From medieval Latin "quinta essentia" — the fifth essence (beyond earth, air, fire, water).',ex:'The cottage by the lake was the quintessential English countryside scene.'},
  {word:'Ineffable',pron:'/ɪnˈɛfəbəl/',type:'adjective',def:'Too great or extreme to be expressed in words.',ety:'From Latin "ineffabilis", from "in-" (not) + "effari" (to speak out).',ex:'The view from the mountain top filled her with an ineffable sense of wonder.'},
  {word:'Lugubrious',pron:'/luːˈɡuːbriəs/',type:'adjective',def:'Looking or sounding sad and dismal.',ety:'From Latin "lugere" (to mourn).',ex:'His lugubrious expression told us the news was not good.'},
  {word:'Ebullient',pron:'/ɪˈbʌliənt/',type:'adjective',def:'Cheerful and full of energy; enthusiastically happy.',ety:'From Latin "ebullire" (to bubble up).',ex:'Her ebullient personality lit up every room she entered.'},
  {word:'Sycophant',pron:'/ˈsɪkəfant/',type:'noun',def:'A person who flatters powerful people to gain advantage; a yes-man.',ety:'From Greek "sykophantēs" — literally "fig-shower", an informer.',ex:'The CEO was surrounded by sycophants who never disagreed with him.'},
  {word:'Pellucid',pron:'/pəˈluːsɪd/',type:'adjective',def:'Transparently clear in meaning or expression; crystal clear.',ety:'From Latin "perlucere" (to shine through).',ex:'Her pellucid prose made complex topics easy to understand.'},
  {word:'Defenestration',pron:'/diːˌfɛnɪˈstreɪʃən/',type:'noun',def:'The act of throwing someone out of a window.',ety:'From Latin "de-" (out) + "fenestra" (window).',ex:'The defenestration of Prague in 1618 sparked the Thirty Years War.'},
  {word:'Halcyon',pron:'/ˈhalsiən/',type:'adjective',def:'Denoting a period of time in the past that was idyllically happy and peaceful.',ety:'From Greek mythology — the halcyon bird (kingfisher) calms the sea.',ex:'Those halcyon days of childhood seem like a dream now.'},
  {word:'Sonder',pron:'/ˈsɒndə/',type:'noun',def:'The realization that each passerby has a life as vivid and complex as your own.',ety:'A modern neologism from the Dictionary of Obscure Sorrows.',ex:'A wave of sonder hit her as she watched the busy city street below.'},
  {word:'Eloquent',pron:'/ˈɛləkwənt/',type:'adjective',def:'Fluent and persuasive in speaking or writing; articulate.',ety:'From Latin "eloqui" (to speak out).',ex:'His eloquent speech moved the entire audience to tears.'},
  {word:'Nefarious',pron:'/nɪˈfɛəriəs/',type:'adjective',def:'Wicked, villainous, or criminal in nature.',ety:'From Latin "nefas" (wrong, impious).',ex:'The villain hatched a nefarious plan to steal the crown jewels.'},
  {word:'Verisimilitude',pron:'/ˌvɛrɪsɪˈmɪlɪtjuːd/',type:'noun',def:'The appearance of being true, real, or plausible.',ety:'From Latin "verisimilitudo", from "veri" (truth) + "similis" (like).',ex:'The novel had a remarkable verisimilitude that made it feel like a memoir.'},
  {word:'Juxtaposition',pron:'/ˌdʒʌkstəpəˈzɪʃən/',type:'noun',def:'The fact of two things being seen or placed close together with contrasting effect.',ety:'From Latin "juxta" (next to) + "ponere" (to place).',ex:'The juxtaposition of ancient ruins and modern skyscrapers was striking.'},
  {word:'Cacophony',pron:'/kəˈkɒfəni/',type:'noun',def:'A harsh, discordant mixture of sounds.',ety:'From Greek "kakos" (bad) + "phone" (sound).',ex:'The cacophony of car horns and construction noise filled the street.'},

  {word:' ubiquitous',pron:'/juːˈbɪkwɪtəs/',type:'adjective',def:'Present, appearing, or found everywhere.',ety:'From Latin "ubique" (everywhere).',ex:'Smartphones have become ubiquitous in modern society.'},
  {word:'Loquacious',pron:'/ləˈkweɪʃəs/',type:'adjective',def:'Tending to talk a great deal; talkative.',ety:'From Latin "loqui" (to speak).',ex:'The loquacious parrot entertained guests with endless chatter.'},
  {word:'Magnanimous',pron:'/maɡˈnanɪməs/',type:'adjective',def:'Generous or forgiving, especially toward a rival or less powerful person.',ety:'From Latin "magnus" (great) + "animus" (soul).',ex:'In a magnanimous gesture, she congratulated her opponent on the win.'},
  {word:'Sagacious',pron:'/səˈɡeɪʃəs/',type:'adjective',def:'Having or showing keen mental discernment and good judgment; wise.',ety:'From Latin "sagax" (wise, shrewd).',ex:'The sagacious old professor always gave the best advice.'},
  {word:'Truculent',pron:'/ˈtrʌkjʊlənt/',type:'adjective',def:'Eager or quick to argue or fight; aggressively defiant.',ety:'From Latin "truculentus" (fierce, savage).',ex:'His truculent attitude made him difficult to work with.'},
  {word:'Voracious',pron:'/vəˈreɪʃəs/',type:'adjective',def:'Wanting or devouring great quantities of food; having a very eager approach to an activity.',ety:'From Latin "vorax" (greedy, ravenous).',ex:'She was a voracious reader, finishing three books a week.'},
  {word:'Winsome',pron:'/ˈwɪnsəm/',type:'adjective',def:'Attractive or appealing in appearance or character.',ety:'From Old English "wynn" (joy, pleasure).',ex:'Her winsome smile won over everyone she met.'},
  {word:'Zealous',pron:'/ˈzɛləs/',type:'adjective',def:'Having or showing great energy or enthusiasm for a cause or objective.',ety:'From Greek "zelos" (jealousy, emulation).',ex:'He was a zealous defender of environmental causes.'},
  {word:'Ambivalent',pron:'/æmˈbɪvələnt/',type:'adjective',def:'Having mixed feelings or contradictory ideas about something or someone.',ety:'From Latin "ambi-" (both) + "valere" (to be strong).',ex:'She felt ambivalent about the job offer — great salary but long commute.'},
  {word:'Bucolic',pron:'/bjuːˈkɒlɪk/',type:'adjective',def:'Relating to the pleasant aspects of the countryside and country life.',ety:'From Greek "boukolos" (cowherd).',ex:'The bucolic village was a perfect escape from city life.'},
  {word:'Capricious',pron:'/kəˈprɪʃəs/',type:'adjective',def:'Given to sudden and unaccountable changes of mood or behavior.',ety:'From Italian "capriccio" — related to "capra" (goat, for leaping about).',ex:'The capricious weather changed from sunshine to storm in minutes.'},
];

function getDayIndex(offset = 0) {
  const now = new Date();
  now.setDate(now.getDate() - offset);
  const epoch = new Date(2024, 0, 1);
  return Math.floor((now - epoch) / 86400000);
}

function renderWord(entry, dateLabel) {
  return `
    <div class="wotd-card">
      <div class="wotd-date">${dateLabel}</div>
      <div class="wotd-word">${entry.word}</div>
      <div class="wotd-pron">${entry.pron}</div>
      <div class="wotd-type">${entry.type}</div>
      <div class="wotd-def">${entry.def}</div>
      <div class="wotd-ex">${t('example')}: "${entry.ex}"</div>
      <div class="wotd-ety"><strong>${t('etymology')}:</strong> ${entry.ety}</div>
      <div class="wotd-actions">
        <button class="gz-btn" onclick="copyText('${entry.word} — ${entry.def}')">${t('copyWord')}</button>
        <button class="gz-btn" onclick="copyWordAndDef(${JSON.stringify(entry).replace(/"/g,'&quot;')})">${t('shareWord')}</button>
      </div>
    </div>`;
}

function copyWordAndDef(entry) {
  const e = typeof entry === 'string' ? JSON.parse(entry.replace(/&quot;/g,'"')) : entry;
  copyText(`📖 ${e.word} (${e.type})\n${e.def}\n\nExample: "${e.ex}"`);
}

function renderAll() {
  const todayIdx = getDayIndex(0) % WORDS.length;
  const today = WORDS[todayIdx];
  const dateStr = new Date().toLocaleDateString('en-US', {weekday:'long', year:'numeric', month:'long', day:'numeric'});
  let html = renderWord(today, dateStr);

  html += `<h3 style="font-size:1em;margin:16px 0 8px">${t('pastWords')}</h3><div class="wotd-history">`;
  for (let i = 1; i <= 7; i++) {
    const idx = getDayIndex(i) % WORDS.length;
    const w = WORDS[idx];
    const d = new Date();
    d.setDate(d.getDate() - i);
    const label = d.toLocaleDateString('en-US', {month:'short', day:'numeric'});
    html += `<div class="wotd-hist-item" onclick="copyText('${w.word}')"><div class="hw">${w.word}</div><div class="hd">${label} — ${w.def.substring(0,50)}…</div></div>`;
  }
  html += '</div>';
  $('#content').innerHTML = html;
}

function getRandomWord() {
  const idx = Math.floor(Math.random() * WORDS.length);
  const w = WORDS[idx];
  $('#content').innerHTML = renderWord(w, '✨ Random Word') +
    `<div style="text-align:center;margin-top:12px"><button class="gz-btn gz-btn-secondary" onclick="renderAll()">← ${t('todayWord')}</button></div>`;
}

$('#toolbar').innerHTML = `<button class="gz-btn" onclick="getRandomWord()">🎲 ${t('newWord')}</button>`;
renderAll();

});
