<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is take-home pay?", "acceptedAnswer": {"@type": "Answer", "text": "Take-home pay (also called net pay) is the money you actually receive in your paycheck after all taxes and deductions are withheld. It equals gross salary minus federal income tax, state income tax, FICA (Social Security and Medicare), health insurance, retirement contributions, and other withholdings."}}, {"@type": "Question", "name": "What is FICA tax?", "acceptedAnswer": {"@type": "Answer", "text": "FICA stands for Federal Insurance Contributions Act. It includes Social Security tax (6.2% of wages up to an annual cap) and Medicare tax (1.45% of all wages). Together they total 7.65% of your gross pay. Your employer matches this amount."}}, {"@type": "Question", "name": "How accurate is this calculator?", "acceptedAnswer": {"@type": "Answer", "text": "This calculator provides a close estimate using simplified tax brackets and your input rates. Actual take-home pay depends on filing status, dependents, pre-tax deductions, 401(k) contributions, HSA, and local taxes. For exact figures use the IRS withholding calculator or consult a tax professional."}}, {"@type": "Question", "name": "How do pre-tax deductions affect take-home pay?", "acceptedAnswer": {"@type": "Answer", "text": "Pre-tax deductions like 401(k) contributions, health insurance premiums, and HSA contributions reduce your taxable income, lowering your federal and state income tax. They still reduce your take-home pay but by less than their face value because of the tax savings."}}]}</script>

    <div class="th-grid">

            <option value="annual" id="optAnnual"></option>
            <option value="monthly" id="optMonthly"></option>

          </select>
        </div>
        <div class="th-row2">
          <div class="th-field"><label id="lblFedRate"></label><input type="number" id="fedRate" value="14" min="0" max="50" step="0.5"></div>
          <div class="th-field"><label id="lblStateRate"></label><input type="number" id="stateRate" value="5" min="0" max="15" step="0.5"></div>
        </div>
        <div class="th-row2">
          <div class="th-field"><label id="lblFica"></label><input type="number" id="fica" value="7.65" min="0" max="20" step="0.01"></div>
          <div class="th-field"><label id="lblDeduct"></label><input type="number" id="deduct" value="0" min="0" step="50"></div>
        </div>

      </div>

          <div class="result-cell"><div class="l" id="lMonthly"></div><div class="v" id="netMonthly">$0</div></div>
          <div class="result-cell"><div class="l" id="lBiweekly"></div><div class="v" id="netBiweekly">$0</div></div>
          <div class="result-cell"><div class="l" id="lWeekly"></div><div class="v" id="netWeekly">$0</div></div>
          <div class="result-cell"><div class="l" id="lDaily"></div><div class="v" id="netDaily">$0</div></div>
          <div class="result-cell"><div class="l" id="lHourly"></div><div class="v" id="netHourly">$0</div></div>
        </div>

<script>
GZI18n.register({
  en: {
    toolTitle: 'Take-Home Pay Calculator',
    toolDesc: 'Estimate your net paycheck after federal tax, state tax, FICA, and deductions. See your real take-home pay by hour, day, week, month, and year.',
    inputs: 'Pay & Tax Info',
    gross: 'Gross pay amount', freq: 'Pay frequency',
    annual: 'Annual', monthly: 'Monthly', biweekly: 'Biweekly', hourly: 'Hourly',
    fedRate: 'Federal tax rate (%)', stateRate: 'State tax rate (%)', fica: 'FICA / Social Security (%)', deduct: 'Other deductions ($/mo)',
    stateName: 'State (optional — for reference)',
    heroLbl: 'Annual Take-Home Pay',
    monthly: 'Monthly', biweeklyPay: 'Biweekly', weekly: 'Weekly', daily: 'Daily', hourlyNet: 'Hourly',
    copy: '📋 Copy Summary', reset: '🔄 Reset', example: '🧪 Load Example',
    step1: 'Enter your gross salary or wage amount',
    step2: 'Select whether the amount is annual, monthly, biweekly, or hourly',
    step3: 'Set federal, state, and FICA tax rates — adjust for your bracket',
    step4: 'View take-home pay across all periods and the full tax breakdown',
  },
  zh: {
    toolTitle: '到手工资计算器',
    toolDesc: '估算扣除联邦税、州税、社保和其他扣款后的净工资。查看按小时、日、周、月和年计算的到手收入。',
    inputs: '薪资与税务',
    gross: '税前工资金额', freq: '工资周期',
    annual: '年薪', monthly: '月薪', biweekly: '双周薪', hourly: '时薪',
    fedRate: '联邦税率 (%)', stateRate: '州税率 (%)', fica: '社保 / 医疗保险 (%)', deduct: '其他扣款 ($/月)',
    stateName: '所在州 (可选 — 仅供参考)',
    heroLbl: '年到手工资',
    monthly: '月到手', biweeklyPay: '双周到手', weekly: '周到手', daily: '日到手', hourlyNet: '时到手',
    copy: '📋 复制摘要', reset: '🔄 重置', example: '🧪 加载示例',
    step1: '输入税前工资或薪资金额',
    step2: '选择该金额为年薪、月薪、双周薪或时薪',
    step3: '设置联邦、州和社保税率 — 根据您的税级调整',
    step4: '查看各周期到手收入和完整税务明细',
  }
});

const { $, copyText, t } = GZ;
const isZh = GZI18n.getLang() === 'zh';

$('#lblInputs').textContent = t('inputs');
$('#lblGross').textContent = t('gross');
$('#lblFreq').textContent = t('freq');
$('#optAnnual').textContent = t('annual');
$('#optMonthly').textContent = t('monthly');
$('#optBiweekly').textContent = t('biweekly');
$('#optHourly').textContent = t('hourly');
$('#lblFedRate').textContent = t('fedRate');
$('#lblStateRate').textContent = t('stateRate');
$('#lblFica').textContent = t('fica');
$('#lblDeduct').textContent = t('deduct');
$('#lblStateNone').textContent = t('stateName');
$('#heroLbl').textContent = t('heroLbl');
$('#lMonthly').textContent = t('monthly');
$('#lBiweekly').textContent = t('biweeklyPay');
$('#lWeekly').textContent = t('weekly');
$('#lDaily').textContent = t('daily');
$('#lHourly').textContent = t('hourlyNet');

function fmt(n, dec=0) { return '$' + (n||0).toLocaleString(undefined, { minimumFractionDigits: dec, maximumFractionDigits: dec }); }

function calc() {
  let amount = +$('#gross').value || 0;
  const freq = $('#freq').value;
  let annualGross;
  switch (freq) {
    case 'monthly': annualGross = amount * 12; break;
    case 'biweekly': annualGross = amount * 26; break;
    case 'hourly': annualGross = amount * 2080; break;
    default: annualGross = amount;
  }

  const monthlyDeduct = +$('#deduct').value || 0;
  const annualDeduct = monthlyDeduct * 12;
  const taxableGross = Math.max(0, annualGross - annualDeduct);

  const fedRate = (+$('#fedRate').value || 0) / 100;
  const stateRate = (+$('#stateRate').value || 0) / 100;
  const ficaRate = (+$('#fica').value || 0) / 100;

  const fedTax = taxableGross * fedRate;
  const stateTax = taxableGross * stateRate;
  const ficaTax = annualGross * ficaRate; // FICA on gross not reduced by pre-tax in simplified model
  const totalTax = fedTax + stateTax + ficaTax;
  const netAnnual = annualGross - totalTax - annualDeduct;

  const hoursYear = 2080, daysYear = 260, weeksYear = 52;
  const monthsYear = 12;

  $('#netAnnual').textContent = fmt(netAnnual);
  $('#netMonthly').textContent = fmt(netAnnual / monthsYear);
  $('#netBiweekly').textContent = fmt(netAnnual / 26);
  $('#netWeekly').textContent = fmt(netAnnual / weeksYear);
  $('#netDaily').textContent = fmt(netAnnual / daysYear);
  $('#netHourly').textContent = fmt(netAnnual / hoursYear, 2);

  const effRate = annualGross > 0 ? (totalTax / annualGross * 100) : 0;
  $('#breakdown').innerHTML = `
    <div class="row"><span>${isZh?'年税前工资':'Annual Gross Pay'}</span><span>${fmt(annualGross)}</span></div>
    <div class="row neg"><span>${isZh?'联邦所得税':'Federal Income Tax'} (${(fedRate*100).toFixed(1)}%)</span><span>−${fmt(fedTax)}</span></div>
    <div class="row neg"><span>${isZh?'州所得税':'State Income Tax'} (${(stateRate*100).toFixed(1)}%)</span><span>−${fmt(stateTax)}</span></div>
    <div class="row neg"><span>${isZh?'社保 / 医疗':'FICA / Medicare'} (${(ficaRate*100).toFixed(2)}%)</span><span>−${fmt(ficaTax)}</span></div>
    ${annualDeduct > 0 ? `<div class="row neg"><span>${isZh?'其他扣款':'Other Deductions'}</span><span>−${fmt(annualDeduct)}</span></div>` : ''}
    <div class="row"><span>${isZh?'年到手工资':'Annual Take-Home Pay'}</span><span>${fmt(netAnnual)}</span></div>
    <div class="row" style="font-weight:400;font-size:.85em;color:var(--text2);border:none"><span>${isZh?'有效税率':'Effective Tax Rate'}</span><span>${effRate.toFixed(1)}%</span></div>
  `;

  $('#note').textContent = isZh
    ? '此为估算值。实际到手工资取决于报税身份、受抚养人、税前扣款及当地税率。详情请咨询税务专业人士。'
    : 'Estimate only. Actual take-home pay depends on filing status, dependents, pre-tax deductions, and local taxes. Consult a tax professional for exact figures.';
}

['gross','fedRate','stateRate','fica','deduct','stateName'].forEach(id => $('#' + id).addEventListener('input', calc));
$('#freq').addEventListener('change', calc);

$('#toolbar').innerHTML = `
  <button class="gz-btn gz-btn-secondary" id="btnCopy">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" id="btnExample">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" id="btnReset">${t('reset')}</button>`;

$('#btnCopy').onclick = () => copyText(`${t('toolTitle')}\n${t('annual')}: ${fmt(+$('#netAnnual').textContent.replace(/[^0-9.-]/g,'')||0)}\n${t('monthly')}: ${$('#netMonthly').textContent}\n${t('biweeklyPay')}: ${$('#netBiweekly').textContent}\n${t('weekly')}: ${$('#netWeekly').textContent}\n${t('hourlyNet')}: ${$('#netHourly').textContent}`);
$('#btnExample').onclick = () => { $('#gross').value = 85000; $('#freq').value = 'annual'; $('#fedRate').value = 16; $('#stateRate').value = 6; $('#fica').value = 7.65; $('#deduct').value = 200; calc(); };
$('#btnReset').onclick = () => { $('#gross').value = 0; $('#deduct').value = 0; calc(); };

calc();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'💰', href:'/calc/salary-calculator.html', name:'Salary Calculator'},
    {icon:'🏷️', href:'/calc/tax-calculator.html', name:'Tax Calculator'},
    {icon:'⏰', href:'/calc/timesheet-calculator.html', name:'Timesheet Calculator'},
    {icon:'📈', href:'/calc/compound-interest.html', name:'Compound Interest'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
