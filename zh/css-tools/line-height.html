<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <textarea id="sampleText" class="gz-textarea" spellcheck="false"></textarea>
    <div class="gz-controls">
      <div class="gz-control-group">
        <label>Line Height <span class="value" id="lh-val">1.6</span></label>
        <input type="range" id="lineHeight" min="0.5" max="3" step="0.05" value="1.6" oninput="updatePreview()">
      </div>
      <div class="gz-control-group">
        <label>Letter Spacing <span class="value" id="ls-val">0em</span></label>
        <input type="range" id="letterSpacing" min="-0.1" max="0.5" step="0.005" value="0" oninput="updatePreview()">
      </div>
      <div class="gz-control-group">
        <label>Word Spacing <span class="value" id="ws-val">0em</span></label>
        <input type="range" id="wordSpacing" min="-0.1" max="1" step="0.01" value="0" oninput="updatePreview()">
      </div>
      <div class="gz-control-group">
        <label>Font Size <span class="value" id="fs-val">18px</span></label>
        <input type="range" id="fontSize" min="10" max="48" step="1" value="18" oninput="updatePreview()">
      </div>
    </div>
    <div class="gz-preview-box" id="preview"></div>
    <div class="gz-code-box" id="code-output"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Line Height & Letter Spacing',
    toolDesc: 'Adjust CSS line-height, letter-spacing and word-spacing visually with live preview and code output.',
    sampleText: 'The quick brown fox jumps over the lazy dog. Typography is the art and technique of arranging type to make written language legible, readable, and appealing when displayed.',
    step1: 'Paste your sample text in the textarea',
    step2: 'Adjust line-height, letter-spacing, word-spacing and font-size with sliders',
    step3: 'Copy the generated CSS code for your project',
  },
  zh: {
    toolTitle: '行高 & 字间距生成器',
    toolDesc: '可视化调整 CSS 行高、字间距和词间距，实时预览效果并生成代码。',
    sampleText: '人生若只如初见，何事秋风悲画扇。等闲变却故人心，却道故人心易变。骊山语罢清宵半，泪雨霖铃终不怨。',
    step1: '在文本框中粘贴示例文字',
    step2: '拖动滑块调整行高、字间距、词间距和字号',
    step3: '复制生成的 CSS 代码用于你的项目',
  }
});

const { $, copyText, t } = GZ;

$('#sampleText').value = t('sampleText');

function updatePreview() {
  const lh = $('#lineHeight').value;
  const ls = $('#letterSpacing').value;
  const ws = $('#wordSpacing').value;
  const fs = $('#fontSize').value;
  const text = $('#sampleText').value || t('sampleText');

  $('#lh-val').textContent = lh;
  $('#ls-val').textContent = ls + 'em';
  $('#ws-val').textContent = ws + 'em';
  $('#fs-val').textContent = fs + 'px';

  const preview = $('#preview');
  preview.textContent = text;
  preview.style.lineHeight = lh;
  preview.style.letterSpacing = ls + 'em';
  preview.style.wordSpacing = ws + 'em';
  preview.style.fontSize = fs + 'px';

  const cssCode = `line-height: ${lh};\nletter-spacing: ${ls}em;\nword-spacing: ${ws}em;\nfont-size: ${fs}px;`;
  $('#code-output').textContent = cssCode;
}

$('#sampleText').addEventListener('input', updatePreview);

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="copyText($('#code-output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="resetDefaults()">${t('clear')}</button>`;

function resetDefaults() {
  $('#lineHeight').value = 1.6;
  $('#letterSpacing').value = 0;
  $('#wordSpacing').value = 0;
  $('#fontSize').value = 18;
  updatePreview();
}

updatePreview();

GZ.renderToolPage({
  category: 'css',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3'],
  related: [
    {icon:'📏', href:'/dev/rem-px.html', name:'REM ↔ PX'},
    {icon:'🔘', href:'/css-tools/border-radius.html', name:'Border Radius'},
    {icon:'✏️', href:'/css-tools/text-shadow.html', name:'Text Shadow'},
    {icon:'✂️', href:'/css-tools/clip-path.html', name:'Clip-Path'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
