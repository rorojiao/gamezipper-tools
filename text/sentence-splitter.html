<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "How does the sentence splitter handle abbreviations?", "acceptedAnswer": {"@type": "Answer", "text": "The splitter recognizes common abbreviations like Mr., Mrs., Dr., e.g., i.e., vs. and Inc. so their periods are not mistaken for sentence boundaries. You can add your own abbreviation list in the options."}}, {"@type": "Question", "name": "What output formats are available?", "acceptedAnswer": {"@type": "Answer", "text": "You can export the split sentences as a plain list, numbered lines, a JavaScript array, or JSON. Choose the format in the options and the output updates instantly."}}, {"@type": "Question", "name": "Does it handle decimals like 3.14?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. Periods between digits (like 3.14 or 1.000) are treated as decimals, not sentence endings, so the sentence stays intact."}}, {"@type": "Question", "name": "Is my text uploaded to a server?", "acceptedAnswer": {"@type": "Answer", "text": "No. All splitting happens entirely in your browser. Your text never leaves your device."}}]}</script>

<script>
GZI18n.register({
  en: {
    toolTitle: 'Sentence Splitter',
    toolDesc: 'Break any text into individual sentences. Smart handling of abbreviations, decimals and quotes. Export as list, numbered lines, array or JSON. Free, browser-only.',
    format: 'Output format',
    fmtList: 'List (one per line)',
    fmtNumbered: 'Numbered',
    fmtArray: 'JS Array',
    fmtJSON: 'JSON',
    trimSentences: 'Trim whitespace',
    step1: 'Paste your text into the input area',
    step2: 'Choose an output format (list, numbered, array or JSON)',
    step3: 'Sentences appear on the right, split smartly at sentence boundaries',
    step4: 'Click Copy to copy the result to your clipboard',
    sentenceCount: (n) => `${n} sentence(s)`,
  },
  zh: {
    toolTitle: '句子分割工具',
    toolDesc: '将任意文本拆分为独立句子。智能处理缩写、小数和引号。可导出为列表、编号行、数组或 JSON。免费、浏览器本地运行。',
    format: '输出格式',
    fmtList: '列表（每行一句）',
    fmtNumbered: '编号',
    fmtArray: 'JS 数组',
    fmtJSON: 'JSON',
    trimSentences: '去除空白',
    step1: '在输入区粘贴你的文本',
    step2: '选择输出格式（列表、编号、数组或 JSON）',
    step3: '句子在右侧显示，按句末标点智能分割',
    step4: '点击「复制」将结果复制到剪贴板',
    sentenceCount: (n) => `${n} 个句子`,
  }
});

const { $, copyText, t } = GZ;

const ABBR = ['Mr','Mrs','Ms','Dr','Prof','Sr','Jr','St','Mt','Rev','Hon','Capt','Lt','Sgt','Col','Gen','vs','etc','e.g','i.e','Inc','Ltd','Co','Corp','No','Apr','Aug','Dec','Feb','Jan','Jul','Jun','Mar','May','Nov','Oct','Sep','Sept','Mon','Tue','Wed','Thu','Fri','Sat','Sun'];

function splitSentences(text) {
  if (!text.trim()) return [];
  // Protect decimals: 3.14 -> placeholder
  let work = text.replace(/(\d)\.(\d)/g, '$1\u0001$2');
  // Protect abbreviations: Mr. -> Mr\u0002
  const abbrPattern = new RegExp('\\b(' + ABBR.join('|') + ')\\.', 'gi');
  work = work.replace(abbrPattern, '$1\u0002');
  // Protect ellipsis
  work = work.replace(/\.\.\./g, '\u0003');
  work = work.replace(/…/g, '\u0003');

  // Split on . ! ? followed by space + capital, or end of string
  // Also split on newline boundaries
  const parts = work.split(/(?<=[.!?])\s+(?=[A-Z""'\u4e00-\u9fff])|(?<=[.!?])\s*$|\n+/);

  let sentences = parts.map(s => s.trim())
    .map(s => s.replace(/\u0001/g, '.').replace(/\u0002/g, '.').replace(/\u0003/g, '…'))
    .filter(Boolean);

  return sentences;
}

function render() {
  const text = $('#input').value;
  const fmt = $('#fmt').value;
  const trim = $('#trim').checked;
  const out = $('#output');
  const stats = $('#stats');

  if (!text.trim()) { out.textContent = ''; stats.innerHTML = ''; return; }

  let sentences = splitSentences(text);
  if (trim) sentences = sentences.map(s => s.replace(/\s+/g, ' ').trim());

  let result = '';
  switch (fmt) {
    case 'list':
      result = sentences.join('\n');
      break;
    case 'numbered':
      result = sentences.map((s, i) => `${i + 1}. ${s}`).join('\n');
      break;
    case 'array':
      result = '[\n' + sentences.map(s => '  ' + JSON.stringify(s)).join(',\n') + '\n]';
      break;
    case 'json':
      result = JSON.stringify({ count: sentences.length, sentences }, null, 2);
      break;
  }
  out.textContent = result;
  stats.innerHTML = `<span class="stat">${t('sentenceCount', sentences.length)}</span>
    <span class="stat">${text.split(/\s+/).filter(Boolean).length} words</span>
    <span class="stat">${text.length} chars</span>`;
}

function loadExample() {
  $('#input').value = `Dr. Smith went to the store at 3.14 PM. He bought apples, oranges and a 2.5L bottle of water. "These look fresh," he said to the cashier. The total came to $12.99. What a great deal! He walked home happy.`;
  render();
}

function doClear() { $('#input').value = ''; $('#output').textContent = ''; $('#stats').innerHTML = ''; }

$('#input').addEventListener('input', render);
$('#fmt').addEventListener('change', render);
$('#trim').addEventListener('change', render);

$('#opts').innerHTML = `
  <label>${t('format')}:
    <select id="fmt" class="gz-select">
      <option value="list">${t('fmtList')}</option>
      <option value="numbered">${t('fmtNumbered')}</option>
      <option value="array">${t('fmtArray')}</option>
      <option value="json">${t('fmtJSON')}</option>
    </select>
  </label>
  <label><input type="checkbox" id="trim" checked> ${t('trimSentences')}</label>`;

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

GZ.renderToolPage({

  titleKey: 'toolTitle',

    {icon:'✂️', href:'/text/text-splitter.html', name:'Text Splitter'},
  ]
});
</script>
