.cd-display{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem 1rem;background:var(--glass);border:1px solid var(--border);border-radius:var(--radius);position:relative;margin-bottom:1.5rem}
.cd-ring{position:relative;width:280px;height:280px;display:flex;align-items:center;justify-content:center}
.cd-ring svg{position:absolute;top:0;left:0;transform:rotate(-90deg)}
.cd-ring circle{fill:none;stroke-width:10;stroke-linecap:round}
.cd-ring .bg{stroke:var(--border)}
.cd-ring .fg{stroke:url(#cdGrad);transition:stroke-dashoffset 1s linear}
.cd-time{font-size:3.4rem;font-weight:800;font-variant-numeric:tabular-nums;background:linear-gradient(135deg,#fff,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:2px;z-index:1}
.cd-label{color:var(--text2);font-size:.95rem;margin-top:6px;z-index:1}

.cd-state.done{color:var(--gz-accent,#ff5577);font-size:1.4rem;animation:cd-pulse 1s ease-in-out infinite}
@keyframes cd-pulse{0%,100%{opacity:1}50%{opacity:.5}}
.cd-inputs{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:1rem}
.cd-input{display:flex;flex-direction:column;align-items:center;gap:4px}
.cd-input input{width:80px;background:var(--glass2);border:1px solid var(--border);color:var(--text);padding:10px;border-radius:var(--radius-sm);font-size:1.4rem;font-weight:700;text-align:center;font-variant-numeric:tabular-nums}
.cd-input input:focus{outline:none;border-color:var(--accent)}
.cd-input label{font-size:.75rem;color:var(--text2);text-transform:uppercase;letter-spacing:.5px}
.cd-presets{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-bottom:1.5rem}
.cd-preset{padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:var(--glass2);color:var(--text);cursor:pointer;font-size:.82rem;font-weight:600;transition:all .15s}
.cd-preset:hover{border-color:var(--accent);color:var(--accent)}
.cd-actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.cd-secondary{font-size:.8rem;color:var(--text2);text-align:center;margin-top:1rem}
</style>

      <div class="cd-ring">
        <svg width="280" height="280">

            <linearGradient id="cdGrad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#4ecdc4"/>
              <stop offset="100%" stop-color="#9b59ff"/>
            </linearGradient>
          </defs>
          <circle class="bg" cx="140" cy="140" r="125"></circle>
          <circle class="fg" id="cdRingFg" cx="140" cy="140" r="125" stroke-dasharray="785.4" stroke-dashoffset="0"></circle>
        </svg>
        <div style="display:flex;flex-direction:column;align-items:center">
          <div class="cd-time" id="cdTime">00:05:00</div>
          <div class="cd-label" id="cdLabel">ready</div>
          <div class="cd-state" id="cdState"></div>
        </div>
      </div>
    </div>

    <div class="cd-inputs" id="cdInputs">
      <div class="cd-input"><label id="lblH">Hours</label><input type="number" id="inH" min="0" max="99" value="0"></div>
      <div class="cd-input"><label id="lblM">Minutes</label><input type="number" id="inM" min="0" max="59" value="5"></div>
      <div class="cd-input"><label id="lblS">Seconds</label><input type="number" id="inS" min="0" max="59" value="0"></div>
    </div>

    <div class="cd-actions">
      <button class="gz-btn gz-btn-primary" id="startBtn">▶ Start</button>

      <button class="gz-btn gz-btn-secondary" id="muteBtn">🔊 Sound</button>
      <button class="gz-btn gz-btn-secondary" id="fsBtn">⛶ Fullscreen</button>
    </div>
    <p class="cd-secondary" id="cdHint">Shortcut: Space = start/pause · R = reset · F = fullscreen</p>
  </div>

<script>
GZI18n.register({
  en:{
    toolTitle:'Countdown Timer',
    toolDesc:'A beautiful fullscreen-ready countdown timer with progress ring, sound alert, presets and keyboard shortcuts. Perfect for cooking, workouts, study sessions and events.',
    hours:'Hours',minutes:'Minutes',seconds:'Seconds',
    ready:'ready',running:'running',paused:'paused',done:"⏰ Time's up!",
    p1m:'1 min',p3m:'3 min',p5m:'5 min',p10m:'10 min',p15m:'15 min',p25m:'25 min (Pomodoro)',p30m:'30 min',p45m:'45 min',p1h:'1 hour',p2h:'2 hours',
    start:'▶ Start',pause:'⏸ Pause',reset:'↺ Reset',muteOn:'🔊 Sound',muteOff:'🔇 Muted',fs:'⛶ Fullscreen',
    shortcut:'Shortcut: Space = start/pause · R = reset · F = fullscreen',
    step1:'Set hours, minutes and seconds in the input fields',
    step2:'Or click a preset to load a common duration',
    step3:'Press Start — the ring and digits count down in real time',
    step4:'When the time hits 0, a chime plays and the page flashes',
  },
  zh:{
    toolTitle:'在线倒计时器',
    toolDesc:'精美的全屏就绪倒计时器，带进度环、声音提醒、预设时间和键盘快捷键。适合烹饪、运动、学习和活动计时。',
    hours:'小时',minutes:'分钟',seconds:'秒',
    ready:'就绪',running:'进行中',paused:'已暂停',done:'⏰ 时间到！',
    p1m:'1 分钟',p3m:'3 分钟',p5m:'5 分钟',p10m:'10 分钟',p15m:'15 分钟',p25m:'25 分钟（番茄钟）',p30m:'30 分钟',p45m:'45 分钟',p1h:'1 小时',p2h:'2 小时',
    start:'▶ 开始',pause:'⏸ 暂停',reset:'↺ 重置',muteOn:'🔊 声音',muteOff:'🔇 已静音',fs:'⛶ 全屏',
    shortcut:'快捷键：空格 = 开始/暂停 · R = 重置 · F = 全屏',
    step1:'在输入框设置小时、分钟和秒',
    step2:'或点击预设按钮快速选择常用时长',
    step3:'按「开始」— 圆环和数字会实时倒计时',
    step4:'归零时会播放提示音并闪烁',
  }
});

const { $, t, showToast } = GZ;
const CIRC = 2 * Math.PI * 125; // ~785.4

let totalMs = 5 * 60 * 1000;
let remainingMs = totalMs;
let endAt = 0;
let raf = 0;
let running = false;
let muted = false;
let finished = false;

const PRESETS = [
  { key:'p1m',  ms: 60_000 },
  { key:'p3m',  ms: 180_000 },
  { key:'p5m',  ms: 300_000 },
  { key:'p10m', ms: 600_000 },
  { key:'p15m', ms: 900_000 },
  { key:'p25m', ms: 1_500_000 },
  { key:'p30m', ms: 1_800_000 },
  { key:'p45m', ms: 2_700_000 },
  { key:'p1h',  ms: 3_600_000 },
  { key:'p2h',  ms: 7_200_000 },
];

function fmt(ms) {
  if (ms < 0) ms = 0;
  const total = Math.ceil(ms / 1000);
  const h = Math.floor(total / 3600);
  const m = Math.floor((total % 3600) / 60);
  const s = total % 60;
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

function setRing(pct) {
  // pct 0 → 1
  $('#cdRingFg').setAttribute('stroke-dashoffset', CIRC * pct);
}

function render() {
  $('#cdTime').textContent = fmt(remainingMs);
  const pct = totalMs > 0 ? remainingMs / totalMs : 0;
  setRing(pct);
  $('#cdState').textContent = running ? t('running') : (finished ? t('done') : (remainingMs < totalMs ? t('paused') : t('ready')));
  $('#cdState').classList.toggle('done', finished);
}

function readInputs() {
  const h = Math.max(0, parseInt($('#inH').value) || 0);
  const m = Math.max(0, Math.min(59, parseInt($('#inM').value) || 0));
  const s = Math.max(0, Math.min(59, parseInt($('#inS').value) || 0));
  totalMs = (h * 3600 + m * 60 + s) * 1000;
  remainingMs = totalMs;
  finished = false;
  render();
}

function tick() {
  if (!running) return;
  remainingMs = endAt - Date.now();
  if (remainingMs <= 0) {
    remainingMs = 0;
    running = false;
    finished = true;
    $('#startBtn').disabled = false;
    $('#pauseBtn').disabled = true;
    render();
    chime();
    if (document.fullscreenElement) document.exitFullscreen().catch(()=>{});
    cancelAnimationFrame(raf);
    return;
  }
  render();
  raf = requestAnimationFrame(tick);
}

function start() {
  if (finished || totalMs <= 0) readInputs();
  if (totalMs <= 0) { showToast('Set a time first'); return; }
  if (!running) {
    running = true;
    endAt = Date.now() + remainingMs;
    $('#startBtn').textContent = t('start');
    $('#pauseBtn').disabled = false;
    tick();
  }
}

function pause() {
  if (!running) return;
  running = false;
  cancelAnimationFrame(raf);
  render();
}

function reset() {
  running = false;
  cancelAnimationFrame(raf);
  finished = false;
  readInputs();
  $('#pauseBtn').disabled = true;
}

function chime() {
  if (muted) return;
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    [0, 0.4, 0.8].forEach((delay, i) => {
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.frequency.value = 880 + i * 110;
      o.connect(g); g.connect(ctx.destination);
      const t0 = ctx.currentTime + delay;
      g.gain.setValueAtTime(0, t0);
      g.gain.linearRampToValueAtTime(0.3, t0 + 0.02);
      g.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.3);
      o.start(t0);
      o.stop(t0 + 0.32);
    });
  } catch(e) { /* no audio */ }
}

function toggleMute() {
  muted = !muted;
  $('#muteBtn').textContent = muted ? t('muteOff') : t('muteOn');
}

function toggleFs() {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen?.().catch(()=>{});
  } else {
    document.exitFullscreen?.();
  }
}

function buildPresets() {
  $('#cdPresets').innerHTML = PRESETS.map(p => `<button class="cd-preset" data-ms="${p.ms}">${t(p.key)}</button>`).join('');
  $$('.cd-preset').forEach(b => b.addEventListener('click', () => {
    const ms = parseInt(b.dataset.ms);
    const h = Math.floor(ms / 3_600_000);
    const m = Math.floor((ms % 3_600_000) / 60_000);
    const s = Math.floor((ms % 60_000) / 1000);
    $('#inH').value = h; $('#inM').value = m; $('#inS').value = s;
    readInputs();
  }));
}

function $$ (s, p) { return [...(p || document).querySelectorAll(s)]; }

$('#startBtn').addEventListener('click', start);
$('#pauseBtn').addEventListener('click', pause);
$('#resetBtn').addEventListener('click', reset);
$('#muteBtn').addEventListener('click', toggleMute);
$('#fsBtn').addEventListener('click', toggleFs);
['inH','inM','inS'].forEach(id => $('#'+id).addEventListener('change', readInputs));

document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (e.code === 'Space') { e.preventDefault(); running ? pause() : start(); }
  else if (e.key === 'r' || e.key === 'R') reset();
  else if (e.key === 'f' || e.key === 'F') toggleFs();
});

$('#lblH').textContent = t('hours');
$('#lblM').textContent = t('minutes');
$('#lblS').textContent = t('seconds');
$('#startBtn').textContent = t('start');
$('#pauseBtn').textContent = t('pause');
$('#resetBtn').textContent = t('reset');
$('#muteBtn').textContent = t('muteOn');
$('#fsBtn').textContent = t('fs');
$('#cdHint').textContent = t('shortcut');

buildPresets();
readInputs();
render();

GZ.renderToolPage({
  category:'fun',
  titleKey:'toolTitle',
  descKey:'toolDesc',
  howToSteps:['step1','step2','step3','step4'],
  related:[
    {icon:'⏱️', href:'/fun/stopwatch.html', name:'Stopwatch'},
    {icon:'🍅', href:'/calc/pomodoro.html', name:'Pomodoro Timer'},
    {icon:'⌨️', href:'/fun/keyboard-tester.html', name:'Keyboard Tester'},
    {icon:'⚡', href:'/fun/reaction-time.html', name:'Reaction Time'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
