<script>
GZI18n.register({
  en: {
    toolTitle: 'Password Generator',
    toolDesc: 'Generate secure, customizable passwords with adjustable length and character options.',
    length: 'Length',
    uppercase: 'Uppercase (A-Z)',
    lowercase: 'Lowercase (a-z)',
    numbers: 'Numbers (0-9)',
    specialChars: 'Special (!@#$...)',
    generate: 'Generate Password',
    copy: 'Copy',
    copied: 'Copied!',
    strength: 'Strength',
    weak: 'Weak',
    medium: 'Medium',
    strong: 'Strong',
    veryStrong: 'Very Strong',
    step1: 'Set your desired password length using the slider (8–128 characters)',
    step2: 'Choose which character types to include: uppercase, lowercase, numbers, special',
    step3: 'Click "Generate Password" to create a random secure password',
    step4: 'Click "Copy" to copy the password to your clipboard',
  },
  zh: {
    toolTitle: '密码生成器',
    toolDesc: '生成安全、可自定义的密码，支持调整长度和字符选项。',
    length: '长度',
    uppercase: '大写字母 (A-Z)',
    lowercase: '小写字母 (a-z)',
    numbers: '数字 (0-9)',
    specialChars: '特殊字符 (!@#$...)',
    generate: '生成密码',
    copy: '复制',
    copied: '已复制！',
    strength: '强度',
    weak: '弱',
    medium: '中等',
    strong: '强',
    veryStrong: '非常强',
    step1: '使用滑块设置所需密码长度（8–128 个字符）',
    step2: '选择要包含的字符类型：大写、小写、数字、特殊字符',
    step3: '点击「生成密码」创建随机安全密码',
    step4: '点击「复制」将密码复制到剪贴板',
  }
});

const { $, copyText, t } = GZ;
const CHARS = {
  upper: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ',
  lower: 'abcdefghijklmnopqrstuvwxyz',
  number: '0123456789',
  special: '!@#$%^&*()_+-=[]{}|;:,.<>?'
};

const opts = [
  { id: 'opt-upper', key: 'upper', labelKey: 'uppercase', checked: true },
  { id: 'opt-lower', key: 'lower', labelKey: 'lowercase', checked: true },
  { id: 'opt-number', key: 'number', labelKey: 'numbers', checked: true },
  { id: 'opt-special', key: 'special', labelKey: 'specialChars', checked: true },
];

$('#lbl-length').textContent = t('length');
$('#btn-generate').textContent = t('generate');
$('#btn-copy').textContent = t('copy');

// Build option checkboxes
$('#pw-options').innerHTML = opts.map(o =>
  `<label><input type="checkbox" id="${o.id}" ${o.checked ? 'checked' : ''}> ${t(o.labelKey)}</label>`
).join('');

// Slider value display
$('#pw-length').addEventListener('input', function() {
  $('#pw-length-val').textContent = this.value;
});

function getEnabledSets() {
  return opts.filter(o => $(`#${o.id}`).checked);
}

function generatePassword() {
  const length = parseInt($('#pw-length').value);
  const enabled = getEnabledSets();
  if (enabled.length === 0) {
    $('#password-text').textContent = '—';
    $('#strength-fill').style.width = '0%';
    $('#strength-label').textContent = '';
    return;
  }
  let pool = '';
  const required = [];
  enabled.forEach(o => {
    pool += CHARS[o.key];
    // Pick one from each set to guarantee inclusion
    required.push(CHARS[o.key][secureRandom(CHARS[o.key].length)]);
  });
  const arr = new Uint32Array(length);
  crypto.getRandomValues(arr);
  let pw = '';
  for (let i = 0; i < length; i++) pw += pool[arr[i] % pool.length];
  // Inject required chars at random positions
  const pwArr = pw.split('');
  required.forEach((ch, idx) => {
    const pos = secureRandom(length - idx) + idx;
    pwArr[pos] = ch;
  });
  const password = pwArr.join('');
  $('#password-text').textContent = password;
  updateStrength(password, enabled.length);
}

function secureRandom(max) {
  const arr = new Uint32Array(1);
  crypto.getRandomValues(arr);
  return arr[0] % max;
}

function updateStrength(pw, charSets) {
  const len = pw.length;
  let score = 0;
  if (len >= 8) score++;
  if (len >= 12) score++;
  if (len >= 16) score++;
  if (len >= 24) score++;
  if (charSets >= 2) score++;
  if (charSets >= 3) score++;
  if (charSets >= 4) score++;

  let level, color, width;
  if (score <= 2) { level = t('weak'); color = '#e94560'; width = '25%'; }
  else if (score <= 4) { level = t('medium'); color = '#f5a623'; width = '50%'; }
  else if (score <= 5) { level = t('strong'); color = '#4caf50'; width = '75%'; }
  else { level = t('veryStrong'); color = '#00d672'; width = '100%'; }

  $('#strength-fill').style.width = width;
  $('#strength-fill').style.background = color;
  $('#strength-label').innerHTML = `${t('strength')}: <span style="color:${color}">${level}</span>`;
}

$('#btn-generate').addEventListener('click', generatePassword);
$('#pw-length').addEventListener('input', generatePassword);
opts.forEach(o => {
  $(`#${o.id}`).addEventListener('change', generatePassword);
});

$('#btn-copy').addEventListener('click', function() {
  const pw = $('#password-text').textContent;
  if (!pw || pw === '—') return;
  navigator.clipboard.writeText(pw).then(() => {
    const btn = $('#btn-copy');
    btn.textContent = t('copied');
    setTimeout(() => { btn.textContent = t('copy'); }, 1500);
  });
});

// Generate on load
generatePassword();

GZ.renderToolPage({
  category: 'dev',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],

    {icon:'🔐', href:'/dev/base64.html', name:'Base64'},
    {icon:'#️⃣', href:'/dev/hash.html', name:'Hash Generator'},
    {icon:'🆔', href:'/dev/uuid.html', name:'UUID Generator'},
  ]
});
</script>
