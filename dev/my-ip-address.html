const { $, copyText, t } = GZ;
let currentIp = '';

function detectBrowser(ua) {
  if (/Edg\//.test(ua)) return 'Microsoft Edge';
  if (/OPR\//.test(ua) || /Opera/.test(ua)) return 'Opera';
  if (/Chrome\//.test(ua) && !/Chromium/.test(ua)) return 'Google Chrome';
  if (/Chromium/.test(ua)) return 'Chromium';
  if (/Firefox\//.test(ua)) return 'Mozilla Firefox';
  if (/Safari\//.test(ua) && !/Chrome/.test(ua)) return 'Safari';
  return t('unknown');
}
function detectOS(ua) {
  if (/Windows NT 10/.test(ua)) return 'Windows 10/11';
  if (/Windows NT 6\.3/.test(ua)) return 'Windows 8.1';
  if (/Windows NT 6\.2/.test(ua)) return 'Windows 8';
  if (/Windows NT 6\.1/.test(ua)) return 'Windows 7';
  if (/Windows/.test(ua)) return 'Windows';
  if (/Android/.test(ua)) return 'Android ' + (ua.match(/Android ([\d.]+)/) || [,''])[1];
  if (/iPhone|iPad|iPod/.test(ua)) return 'iOS';
  if (/Mac OS X/.test(ua)) return 'macOS ' + (ua.match(/Mac OS X ([\d_]+)/) || [,''])[1].replace(/_/g,'.');
  if (/Linux/.test(ua)) return 'Linux';
  if (/CrOS/.test(ua)) return 'Chrome OS';
  return t('unknown');
}
function detectEngine(ua) {
  if (/Gecko\/|Firefox\//.test(ua)) return 'Gecko';
  if (/AppleWebKit/.test(ua)) return /Blink/.test(ua) ? 'Blink' : 'WebKit';
  if (/Trident/.test(ua)) return 'Trident';
  return t('unknown');
}

async function fetchIp() {
  $('#hero').innerHTML = `<div class="lbl">${t('yourIp')}</div><div class="ip loading">${t('loading')}</div>`;
  let ipv4 = null, ipv6 = null;
  try {
    const r4 = await fetch('https://api.ipify.org?format=json');
    const j4 = await r4.json();
    ipv4 = j4.ip;
  } catch(e) { /* maybe blocked */ }
  try {
    const r6 = await fetch('https://api6.ipify.org?format=json');
    const j6 = await r6.json();
    ipv6 = j6.ip;
  } catch(e) { /* no ipv6 or blocked */ }

  const primary = ipv4 || ipv6;
  currentIp = primary || '';
  let ipHtml;
  if (!primary) {
    ipHtml = `<div class="ip" style="font-size:1.2rem">${t('ipHidden')}</div>`;
  } else {
    const lines = [];
    if (ipv4) lines.push(`<div style="margin-top:6px"><span style="opacity:.8;font-size:.8rem">${t('ipv4')}:</span><br><span class="ip" style="font-size:${ipv4.length > 20 ? '1.4rem' : '2.2rem'}">${ipv4}</span></div>`);
    if (ipv6 && ipv6 !== ipv4) lines.push(`<div style="margin-top:14px"><span style="opacity:.8;font-size:.8rem">${t('ipv6')}:</span><br><span class="ip" style="font-size:1.2rem">${ipv6}</span></div>`);
    ipHtml = lines.join('');
  }
  $('#hero').innerHTML = `
    <div class="lbl">${t('yourIp')}</div>
    ${ipHtml}
    <button onclick="copyText(currentIp)">${t('copy')}</button>`;
  renderNet(ipv4, ipv6);
}

function renderNet(ipv4, ipv6) {
  const nav = navigator;
  const conn = nav.connection || nav.mozConnection || nav.webkitConnection || {};
  $('#net-info').innerHTML = [
    { l: t('ipv4'), v: ipv4 || '—' },
    { l: t('ipv6'), v: ipv6 || '—' },
  ].map(i => `<div class="info-item"><div class="lbl">${i.l}</div><div class="val">${i.v || '—'}</div></div>`).join('');

  const ua = nav.userAgent || '';
  const cores = nav.hardwareConcurrency || t('unknown');
  const mem = nav.deviceMemory ? nav.deviceMemory + ' GB' : t('unknown');
  $('#sys-info').innerHTML = [
    { l: t('browser'), v: detectBrowser(ua) },
    { l: t('engine'), v: detectEngine(ua) },
    { l: t('os'), v: detectOS(ua) },
    { l: t('platform'), v: nav.platform || t('unknown') },
    { l: t('cpuCores'), v: cores },
    { l: t('deviceMemory'), v: mem },
    { l: t('language'), v: nav.language || t('unknown') },
    { l: t('languages'), v: (nav.languages || []).join(', ') || t('unknown') },
    { l: t('screenRes'), v: `${screen.width} × ${screen.height}` },
    { l: t('viewport'), v: `${window.innerWidth} × ${window.innerHeight}` },
    { l: t('pixelRatio'), v: (window.devicePixelRatio || 1) + 'x' },
    { l: t('colorDepth'), v: (screen.colorDepth || 24) + '-bit' },
  ].map(i => `<div class="info-item"><div class="lbl">${i.l}</div><div class="val">${i.v}</div></div>`).join('');

  const tz = Intl.DateTimeFormat().resolvedOptions().timeZone || t('unknown');
  const offsetMin = -new Date().getTimezoneOffset();
  const off = (offsetMin === 0 ? 'UTC' : (offsetMin > 0 ? '+' : '') + (offsetMin / 60).toFixed(offsetMin % 60 === 0 ? 0 : 1) + 'h');
  const connType = conn.effectiveType || conn.type || t('unknown');
  const downlink = conn.downlink ? conn.downlink + ' Mbps' : t('unknown');
  const rtt = conn.rtt != null ? conn.rtt + ' ms' : t('unknown');
  $('#conn-info').innerHTML = [
    { l: t('timezone'), v: tz },
    { l: t('offset'), v: off },
    { l: t('online'), v: nav.onLine ? t('onlineYes') : t('onlineNo') },
    { l: 'Connection', v: connType.toUpperCase() },
    { l: 'Downlink', v: downlink },
    { l: 'RTT', v: rtt },
    { l: t('cookieEnabled'), v: nav.cookieEnabled ? t('yes') : t('no') },
    { l: t('doNotTrack'), v: (nav.doNotTrack === '1' || window.doNotTrack === '1') ? t('yes') : t('no') },
    { l: t('userAgent'), v: ua, wide: true },
  ].map(i => `<div class="info-item"${i.wide ? ' style="grid-column:1/-1"' : ''}><div class="lbl">${i.l}</div><div class="val">${i.v}</div></div>`).join('');
}

function refresh() { fetchIp(); }

$('#sec-net').innerHTML = `<span class="dot"></span>${t('sectionNet')}`;
$('#sec-sys').innerHTML = `<span class="dot"></span>${t('sectionSys')}`;
$('#sec-conn').innerHTML = `<span class="dot"></span>${t('sectionConn')}`;

  <button class="gz-btn" onclick="refresh()">${t('refresh')}</button>`;

    {icon:'⚡', href:'/dev/speed-test.html', name:'Speed Test'},
  ]
});

fetchIp();
</script>
