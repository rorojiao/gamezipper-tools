<script>
GZI18n.register({
  en: {
    toolTitle: 'Income Tax Calculator',
    toolDesc: 'Estimate your US federal income tax, take-home pay, effective and marginal tax rates. Uses 2024 federal brackets and standard deductions for single, married filing jointly, and head of household.',
    income: 'Gross Annual Income ($)',
    status: 'Filing Status',
    deduction: 'Extra Deductions ($)',
    single: 'Single',
    mfj: 'Married Filing Jointly',
    hoh: 'Head of Household',
    calculate: 'Calculate',
    clear: 'Clear',
    tax: 'Federal Tax',
    takehome: 'Take-Home Pay',
    effective: 'Effective Rate',
    marginal: 'Marginal Rate',
    thBracket: 'Bracket',
    thRate: 'Rate',
    thTaxable: 'Taxable in Bracket',
    thPaid: 'Tax',
    note: 'Estimate only — uses 2024 federal brackets and standard deduction. Excludes state tax, FICA (Social Security + Medicare), credits, and other adjustments. Not tax advice.',
    step1: 'Enter your gross annual income',
    step2: 'Choose your filing status',
    step3: 'Optionally add extra deductions above the standard deduction',
    step4: 'Click Calculate to see your tax and take-home pay',
  },
  zh: {
    toolTitle: '所得税计算器',
    toolDesc: '估算美国联邦所得税、税后收入、平均税率和边际税率。基于 2024 年联邦税率表和标准扣除额，支持单身、夫妻联合申报和户主申报。',
    income: '年总收入（美元）',
    status: '申报身份',
    deduction: '额外扣除额（美元）',
    single: '单身',
    mfj: '夫妻联合申报',
    hoh: '户主',
    calculate: '计算',
    clear: '清空',
    tax: '联邦税',
    takehome: '税后收入',
    effective: '平均税率',
    marginal: '边际税率',
    thBracket: '税档',
    thRate: '税率',
    thTaxable: '应税金额',
    thPaid: '应缴税',
    note: '仅供参考 — 基于 2024 年联邦税率表和标准扣除额。未包含州税、FICA（社保+医保）、抵免和其他调整。非税务建议。',
    step1: '输入年总收入',
    step2: '选择申报身份',
    step3: '可选添加超出标准扣除额的额外扣除',
    step4: '点击计算查看应缴税和税后收入',
  }
});

const { $, t } = GZ;

// 2024 federal brackets: [upperLimit, rate]  — upperLimit = Infinity for top
const BRACKETS = {
  single:  [[11600,0.10],[47150,0.12],[100525,0.22],[191950,0.24],[243725,0.32],[609350,0.35],[Infinity,0.37]],
  mfj:     [[23200,0.10],[94300,0.12],[201050,0.22],[383900,0.24],[487450,0.32],[731200,0.35],[Infinity,0.37]],
  hoh:     [[16550,0.10],[63100,0.12],[100500,0.22],[191950,0.24],[243700,0.32],[609350,0.35],[Infinity,0.37]],
};
const STD_DEDUCTION = { single: 14600, mfj: 29200, hoh: 21900 };

$('#lbl-income').textContent = t('income');
$('#lbl-status').textContent = t('status');
$('#lbl-deduction').textContent = t('deduction');
$('#opt-single').textContent = t('single');
$('#opt-mfj').textContent = t('mfj');
$('#opt-hoh').textContent = t('hoh');
$('#res-tax-label').textContent = t('tax');
$('#res-takehome-label').textContent = t('takehome');
$('#res-effective-label').textContent = t('effective');
$('#res-marginal-label').textContent = t('marginal');
$('#th-bracket').textContent = t('thBracket');
$('#th-rate').textContent = t('thRate');
$('#th-taxable').textContent = t('thTaxable');
$('#th-paid').textContent = t('thPaid');
$('#note').textContent = t('note');

function fmt(n) { return n.toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2}); }

function calculate() {
  const income = Math.max(0, parseFloat($('#income').value) || 0);
  const status = $('#status').value;
  const extra = Math.max(0, parseFloat($('#deduction').value) || 0);
  const deduction = STD_DEDUCTION[status] + extra;
  const taxable = Math.max(0, income - deduction);
  const brackets = BRACKETS[status];

  let tax = 0, marginalRate = 0;
  let prevLimit = 0;
  const rows = [];
  brackets.forEach(([limit, rate], idx) => {
    const lower = prevLimit;
    const upper = limit;
    let taxableInBracket = 0;
    let applied = false;
    if (taxable > lower) {
      const topInBracket = Math.min(taxable, upper);
      taxableInBracket = topInBracket - lower;
      const taxInBracket = taxableInBracket * rate;
      tax += taxInBracket;
      marginalRate = rate;
      applied = true;
    }
    rows.push({
      bracket: idx + 1,
      rate,
      lower,
      upper: limit === Infinity ? Infinity : limit,
      taxableInBracket,
      taxInBracket: taxableInBracket * rate,
      applied,
    });
    prevLimit = limit;
  });

  const takeHome = income - tax;
  const effective = income > 0 ? (tax / income) * 100 : 0;

  $('#res-tax').textContent = '$' + fmt(tax);
  $('#res-takehome').textContent = '$' + fmt(takeHome);
  $('#res-effective').textContent = fmt(effective) + '%';
  $('#res-marginal').textContent = fmt(marginalRate * 100) + '%';
  $('#results').style.display = 'block';

  $('#tbody').innerHTML = rows.map(r => {
    const range = r.upper === Infinity
      ? '$' + fmt(r.lower) + '+'
      : '$' + fmt(r.lower) + ' – $' + fmt(r.upper);
    return `<tr class="${r.applied ? 'applied' : ''}">
      <td>${t('thBracket')} ${r.bracket} (${range})</td>
      <td>${fmt(r.rate * 100)}%</td>
      <td>$${fmt(r.taxableInBracket)}</td>
      <td>$${fmt(r.taxInBracket)}</td>
    </tr>`;
  }).join('');
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="calculate()">${t('calculate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="document.getElementById('results').style.display='none'">${t('clear')}</button>`;

calculate();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'💵', href:'/calc/paycheck-calculator.html', name:'Paycheck'},
    {icon:'💰', href:'/calc/salary-hike-calculator.html', name:'Salary Hike'},
    {icon:'💸', href:'/calc/roi-calculator.html', name:'ROI Calculator'},
    {icon:'📈', href:'/calc/sip-calculator.html', name:'SIP Calculator'},
  ]
});
</script>

</body>
