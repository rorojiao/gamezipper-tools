<script>
GZI18n.register({
  en: {
    toolTitle: 'Ninja Name Generator',
    toolDesc: 'Create stealthy shinobi names with Japanese-flavored phonetics, clan titles and shadow epithets. Pick a style (Shinobi, Assassin, Clan) and get 20 unique names every click. Free, private, no signup.',
    sShinobi: '🥷 Shinobi', sAssassin: '🗡️ Assassin', sClan: '🏯 Clan', sRandom: '🎲 Random',
    btnGen: 'Generate 20 names',
    btnCopy: 'Copy All',
    copied: 'Copied!',
    step1: 'Pick a style — Shinobi, Assassin, Clan or Random',
    step2: 'Click Generate to spin up 20 unique ninja names',
    step3: 'Tap the copy icon on any name to grab it',
    step4: 'Click Copy All to grab the full list at once',
  },
  zh: {
    toolTitle: '忍者名字生成器',
    toolDesc: '生成隐秘的忍者名字 — 日语音节、氏族称号和暗影称号。选择风格（忍者、刺客、氏族），每次点击获得 20 个独特的名字。免费、私密、无需注册。',
    sShinobi: '🥷 忍者', sAssassin: '🗡️ 刺客', sClan: '🏯 氏族', sRandom: '🎲 随机',
    btnGen: '生成 20 个名字',
    btnCopy: '全部复制',
    copied: '已复制！',
    step1: '选择风格 — 忍者、刺客、氏族或随机',
    step2: '点击「生成」获得 20 个独特的忍者名字',
    step3: '点击任意名字旁的复制按钮即可获取',
    step4: '点击「全部复制」一次性获取整个列表',
  }
});

const { $, t, showToast } = GZ;
const pick = a => a[Math.floor(Math.random() * a.length)];

// Japanese-flavored phonetic banks
const PRE = ['Ha','Ka','Ryu','Shin','Ta','Yuki','Kaze','Kuro','Shi','Aki','Jin','Ren','Sora','Hana','Gin','Kage','Ishi','Mizu','Taka','Yami','Rai','Ken','Fuu','Do','Jin','Suzu','Nobu','Hiro','Kyo','Mori'];
const MID = ['ka','shi','ma','ru','to','ko','sa','ne','ya','me','ri','su','ta','ha'];
const SUF = ['to','maru','shi','ko','ke','ne','ta','ya','ru','mi','hime','suke','emon','ji','shi','ichi'];
const CLAN = ['Shadow Lotus','Iron Mist','Silent Fang','Crimson Leaf','Night Heron','Frost Viper','Hidden Stone','Raven Claw','Black Orchid','Storm Crow','Ash Wolf','Pale Tiger','Thousand Eyes','Twilight Blade','Drowned Star','Ember Moth'];
const EPITHET = ['of the Shadows','the Silent','the Unseen','Ghost Walker','Nightblade','Swift as Wind','the Faceless','Whispering Death','the Vanishing','Dusk Runner','Who Walks Unseen','the Empty-Handed','Shadowstep','the Duskborn'];
const ELEMENT = ['Fire','Water','Earth','Wind','Lightning','Shadow','Frost','Void','Iron','Mist'];

function makeBase() {
  const useMid = Math.random() < 0.5;
  let n = pick(PRE) + (useMid ? pick(MID) : '') + pick(SUF);
  return n;
}

function makeName(style) {
  const r = Math.random();
  if (style === 'shinobi' || (style === 'random' && r < 0.5)) {
    return makeBase();
  }
  if (style === 'assassin' || (style === 'random' && r < 0.75)) {
    return makeBase() + ', ' + pick(EPITHET);
  }
  // clan
  return makeBase() + ' of the ' + pick(CLAN);
}

let style = 'shinobi';
const STYLES = [
  {id:'shinobi',key:'sShinobi'},{id:'assassin',key:'sAssassin'},{id:'clan',key:'sClan'},{id:'random',key:'sRandom'},
];
$('#style-tabs').innerHTML = STYLES.map(s => `<button data-id="${s.id}" class="${s.id===style?'active':''}">${t(s.key)}</button>`).join('');
document.querySelectorAll('#style-tabs button').forEach(b => {
  b.addEventListener('click', () => {
    document.querySelectorAll('#style-tabs button').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    style = b.dataset.id;
    generate();
  });
});

function generate() {
  const seen = new Set();
  const names = [];
  let safety = 0;
  while (names.length < 20 && safety < 400) {
    const n = makeName(style).replace(/\s+/g,' ').trim();
    if (!seen.has(n)) { seen.add(n); names.push(n); }
    safety++;
  }
  $('#grid').innerHTML = names.map(n => `
    <div class="nn-card">
      <span class="name">${n.replace(/</g,'&lt;')}<span class="clan">🥷 ${pick(ELEMENT)}</span></span>
      <button data-name="${n.replace(/"/g,'&quot;')}" title="copy">📋</button>
    </div>`).join('');
  document.querySelectorAll('#grid .nn-card button').forEach(b => {
    b.addEventListener('click', async () => {
      try { await navigator.clipboard.writeText(b.dataset.name.replace(/&quot;/g,'"')); showToast(t('copied')); }
      catch (e) { showToast(t('copied')); }
    });
  });
}

function copyAll() {
  const names = [...document.querySelectorAll('#grid .nn-card .name')].map(e => e.firstChild.textContent.trim());
  if (!names.length) return;
  navigator.clipboard.writeText(names.join('\n')).then(() => showToast(t('copied'))).catch(() => showToast(t('copied')));
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="generate()">🥷 ${t('btnGen')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="copyAll()">📋 ${t('btnCopy')}</button>`;

generate();

    {icon:'🦸', href:'/fun/superhero-name-generator.html', name:'Superhero Name Generator'},
  ]
});
</script>
