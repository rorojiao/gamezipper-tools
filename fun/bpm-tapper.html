<script>
GZI18n.register({
  en: {
    toolTitle: 'BPM Tapper — Tap Tempo Detector',
    toolDesc: 'Find the BPM of any song by simply tapping in rhythm. Instantly calculates beats per minute with tempo marking.',
    taps: 'Taps',
    avgInterval: 'Avg Interval',
    tempoMarking: 'Tempo',
    reset: 'Reset',
    tipTitle: '💡 Tip',
    tip: 'Tap the button or press any key in rhythm with the music. The more you tap, the more accurate the BPM reading becomes. Tap at least 5 times for best results.',
    step1: 'Play a song or think of a rhythm',
    step2: 'Tap the button in time with the beat',
    step3: 'Keep tapping — the BPM gets more accurate',
    step4: 'Press Reset to start over with a new song',
  },
  zh: {
    toolTitle: 'BPM 节拍检测器',
    toolDesc: '通过敲击节奏来检测歌曲的 BPM（每分钟节拍数）。即时计算并显示速度术语。',
    taps: '敲击次数',
    avgInterval: '平均间隔',
    tempoMarking: '速度术语',
    reset: '重置',
    tipTitle: '💡 提示',
    tip: '跟随音乐节奏敲击按钮或按任意键。敲击次数越多，BPM 读数越准确。建议至少敲击 5 次以获得最佳结果。',
    step1: '播放一首歌或想象一个节奏',
    step2: '跟随节拍敲击按钮',
    step3: '持续敲击 — BPM 越来越精确',
    step4: '点击重置开始检测新歌曲',
  }
});

const { $, t } = GZ;

const taps = [];
const MAX_TAPS = 32;
const MAX_BAR_COUNT = 40;

$('#bpmLabel').textContent = 'BPM';
$('#lbl-taps').textContent = t('taps');
$('#lbl-interval').textContent = t('avgInterval');
$('#lbl-marking').textContent = t('tempoMarking');
$('#resetBtn').textContent = t('reset');
$('#lbl-tip-title').textContent = t('tipTitle');
$('#lbl-tip').textContent = t('tip');

// Initialize timing bars
const timingVis = $('#timingVis');
for (let i = 0; i < MAX_BAR_COUNT; i++) {
  const bar = document.createElement('div');
  bar.className = 'timing-bar';
  bar.style.height = '4px';
  timingVis.appendChild(bar);
}

function getTempoMarking(bpm) {
  if (bpm < 40) return 'Grave';
  if (bpm < 60) return 'Largo';
  if (bpm < 66) return 'Larghetto';
  if (bpm < 76) return 'Adagio';
  if (bpm < 108) return 'Andante';
  if (bpm < 120) return 'Moderato';
  if (bpm < 156) return 'Allegro';
  if (bpm < 176) return 'Vivace';
  if (bpm < 200) return 'Presto';
  return 'Prestissimo';
}

function doTap() {
  const now = performance.now();
  if (taps.length > 0 && now - taps[taps.length - 1] > 3000) {
    taps.length = 0;
  }
  taps.push(now);
  if (taps.length > MAX_TAPS) taps.shift();

  // Animate button
  const btn = $('#tapBtn');
  btn.classList.remove('pulsing');
  void btn.offsetWidth;
  btn.classList.add('pulsing');

  updateDisplay();
}

function updateDisplay() {
  if (taps.length < 2) {
    $('#bpmValue').textContent = '—';
    $('#tapCount').textContent = taps.length;
    $('#avgInterval').textContent = '—';
    $('#tempoMarking').textContent = '—';
    return;
  }

  const intervals = [];
  for (let i = 1; i < taps.length; i++) {
    intervals.push(taps[i] - taps[i - 1]);
  }
  const avgMs = intervals.reduce((a, b) => a + b, 0) / intervals.length;
  const bpm = Math.round(60000 / avgMs);

  $('#bpmValue').textContent = bpm;
  $('#tapCount').textContent = taps.length;
  $('#avgInterval').textContent = Math.round(avgMs) + 'ms';
  $('#tempoMarking').textContent = getTempoMarking(bpm);

  // Update timing visualization
  const bars = timingVis.children;
  const maxInterval = Math.max(...intervals);
  const start = Math.max(0, intervals.length - MAX_BAR_COUNT);
  for (let i = 0; i < MAX_BAR_COUNT; i++) {
    const idx = start + i;
    if (idx < intervals.length) {
      const h = Math.max(4, (intervals[idx] / maxInterval) * 55);
      bars[i].style.height = h + 'px';
      bars[i].style.opacity = '1';
    } else {
      bars[i].style.height = '4px';
      bars[i].style.opacity = '0.2';
    }
  }
}

function resetTapper() {
  taps.length = 0;
  $('#bpmValue').textContent = '0';
  $('#tapCount').textContent = '0';
  $('#avgInterval').textContent = '0ms';
  $('#tempoMarking').textContent = '—';
  const bars = timingVis.children;
  for (let i = 0; i < bars.length; i++) {
    bars[i].style.height = '4px';
    bars[i].style.opacity = '0.2';
  }
}

$('#tapBtn').addEventListener('click', doTap);
$('#resetBtn').addEventListener('click', resetTapper);

document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') return;
  e.preventDefault();
  doTap();
});

GZ.renderToolPage({
  category: 'fun',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🔊', href:'/fun/tone-generator.html', name:'Tone Generator'},
    {icon:'🎵', href:'/fun/metronome.html', name:'Metronome'},
    {icon:'🎸', href:'/fun/guitar-tuner.html', name:'Guitar Tuner'},
    {icon:'🥁', href:'/fun/drum-machine.html', name:'Drum Machine'},
  ]
});
</script>
