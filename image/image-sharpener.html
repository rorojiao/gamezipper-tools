    dropLabel: '拖拽图片到此处或点击上传',
    amount: '强度',
    radius: '半径',
    threshold: '阈值',
    original: '原图',

    step2: '选择预设或手动调整强度、半径和阈值',

const { $, t } = GZ;
let originalData = null;
const canvas = $('#canvas');
const ctx = canvas.getContext('2d', { willReadFrequently: true });

function loadImage(file) {
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      const maxW = 900;
      let w = img.width, h = img.height;
      if (w > maxW) { h = Math.round(h * maxW / w); w = maxW; }
      canvas.width = w; canvas.height = h;
      ctx.drawImage(img, 0, 0, w, h);
      originalData = ctx.getImageData(0, 0, w, h);
      $('#controls').style.display = 'block';
      $('#dropZone').style.display = 'none';
      applySharpen();
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

// Box blur used as the "blur" stage of unsharp mask
function boxBlur(src, w, h, r) {
  const out = new Uint8ClampedArray(src);
  const tmp = new Uint8ClampedArray(src);
  // Horizontal pass
  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      let rs = 0, gs = 0, bs = 0, cnt = 0;
      for (let k = -r; k <= r; k++) {
        const xx = Math.min(w - 1, Math.max(0, x + k));
        const i = (y * w + xx) * 4;
        rs += src[i]; gs += src[i+1]; bs += src[i+2]; cnt++;
      }
      const i = (y * w + x) * 4;
      tmp[i]   = rs / cnt;
      tmp[i+1] = gs / cnt;
      tmp[i+2] = bs / cnt;
      tmp[i+3] = src[i+3];
    }
  }
  // Vertical pass
  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      let rs = 0, gs = 0, bs = 0, cnt = 0;
      for (let k = -r; k <= r; k++) {
        const yy = Math.min(h - 1, Math.max(0, y + k));
        const i = (yy * w + x) * 4;
        rs += tmp[i]; gs += tmp[i+1]; bs += tmp[i+2]; cnt++;
      }
      const i = (y * w + x) * 4;
      out[i]   = rs / cnt;
      out[i+1] = gs / cnt;
      out[i+2] = bs / cnt;
      out[i+3] = src[i+3];
    }
  }
  return out;
}

function applySharpen() {
  if (!originalData) return;
  const amount = +$('#amountRange').value / 100;   // 0..3
  const radius = Math.max(1, Math.round(+$('#radiusRange').value / 10)); // px 1..5
  const threshold = +$('#thresholdRange').value;
  const w = canvas.width, h = canvas.height;
  const src = originalData.data;

  if (amount === 0) {
    ctx.putImageData(originalData, 0, 0);
    return;
  }

  const blurred = boxBlur(src, w, h, radius);
  const out = new Uint8ClampedArray(src.length);
  for (let i = 0; i < src.length; i += 4) {
    for (let c = 0; c < 3; c++) {
      const orig = src[i + c];
      const diff = orig - blurred[i + c];
      // Threshold on luminance diff to avoid sharpening flat noise
      if (Math.abs(diff) * 3 < threshold) {
        out[i + c] = orig;
      } else {
        out[i + c] = Math.max(0, Math.min(255, orig + amount * diff));
      }
    }
    out[i + 3] = src[i + 3];
  }
  ctx.putImageData(new ImageData(out, w, h), 0, 0);
}

function download() {
  if (!originalData) return;
  const a = document.createElement('a');
  a.href = canvas.toDataURL('image/png');
  a.download = 'sharpened-image.png';
  a.click();
}

function setPreset(a, r, th) {
  $('#amountRange').value = a;
  $('#radiusRange').value = r;
  $('#thresholdRange').value = th;
  $('#amountVal').textContent = a;
  $('#radiusVal').textContent = (r / 10).toFixed(1);
  $('#thresholdVal').textContent = th;
  applySharpen();
}

['amountRange','radiusRange','thresholdRange'].forEach(id => {
  $('#' + id).addEventListener('input', e => {
    if (id === 'amountRange') $('#amountVal').textContent = e.target.value;
    else if (id === 'radiusRange') $('#radiusVal').textContent = (e.target.value / 10).toFixed(1);
    else $('#thresholdVal').textContent = e.target.value;
    applySharpen();
  });
});

$('#dropZone').addEventListener('click', () => $('#fileInput').click());
$('#fileInput').addEventListener('change', e => { if (e.target.files[0]) loadImage(e.target.files[0]); });
$('#dropZone').addEventListener('dragover', e => { e.preventDefault(); e.currentTarget.classList.add('dragover'); });
$('#dropZone').addEventListener('dragleave', e => { e.currentTarget.classList.remove('dragover'); });
$('#dropZone').addEventListener('drop', e => { e.preventDefault(); e.currentTarget.classList.remove('dragover'); if (e.dataTransfer.files[0]) loadImage(e.dataTransfer.files[0]); });

$('#dropLabel').textContent = t('dropLabel');
$('#lblAmount').textContent = t('amount');
$('#lblRadius').textContent = t('radius');
$('#lblThreshold').textContent = t('threshold');
$('#lblOriginal').textContent = t('original');
$('#lblSharpened').textContent = t('sharpened');

$('#presets').innerHTML = `
  <button onclick="setPreset(50,10,0)">${t('presetSoft')}</button>
  <button onclick="setPreset(80,10,4)">${t('presetPortrait')}</button>
  <button onclick="setPreset(150,5,0)">${t('presetText')}</button>
  <button onclick="setPreset(220,15,0)">${t('presetStrong')}</button>`;

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="download()">${t('download')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="document.getElementById('controls').style.display='none';document.getElementById('dropZone').style.display='block';originalData=null">${t('clear')}</button>`;

  ]
});
</script>
