<script>
GZI18n.register({
  en: {
    toolTitle: 'Internet Speed Test',
    toolDesc: 'Test your internet download speed, latency and connection quality instantly in your browser.',
    start: 'Start Test',
    testing: 'Testing...',
    ready: 'Ready',
    download: 'Download',
    ping: 'Latency',
    jitter: 'Jitter',
    connType: 'Connection',
    testingLatency: 'Testing latency...',
    testingSpeed: 'Testing download speed...',
    done: 'Test complete!',
    step1: 'Close other tabs and apps using bandwidth for best results',
    step2: 'Click "Start Test" to begin the speed test',
    step3: 'Wait for the download speed and latency measurements',
    step4: 'Review your results — download speed, ping, and jitter',
  },
  zh: {
    toolTitle: '网速测试工具',
    toolDesc: '在浏览器中即时测试下载速度、延迟和网络连接质量。',
    start: '开始测试',
    testing: '测试中...',
    ready: '就绪',
    download: '下载',
    ping: '延迟',
    jitter: '抖动',
    connType: '连接类型',
    testingLatency: '正在测试延迟...',
    testingSpeed: '正在测试下载速度...',
    done: '测试完成！',
    step1: '关闭其他占用带宽的标签页和应用以获得最佳结果',
    step2: '点击「开始测试」启动网速测试',
    step3: '等待下载速度和延迟测量完成',
    step4: '查看结果 — 下载速度、延迟和抖动',
  }
});

const { $, t } = GZ;

$('#startBtn').textContent = t('start');
$('#gaugeLabel').textContent = t('ready');
$('#rlDown').textContent = t('download');
$('#rlPing').textContent = t('ping');
$('#rlJitter').textContent = t('jitter');
$('#rlType').textContent = t('connType');

let isRunning = false;

async function measureLatency(url, samples = 5) {
  const pings = [];
  for (let i = 0; i < samples; i++) {
    try {
      const start = performance.now();
      await fetch(url + '?_=' + Date.now() + '_' + Math.random(), { cache: 'no-store', mode: 'no-cors' });
      pings.push(performance.now() - start);
    } catch(e) { /* skip */ }
  }
  if (pings.length === 0) return { ping: -1, jitter: -1 };
  const avg = pings.reduce((a, b) => a + b, 0) / pings.length;
  const diffs = [];
  for (let i = 1; i < pings.length; i++) diffs.push(Math.abs(pings[i] - pings[i - 1]));
  const jitter = diffs.length ? diffs.reduce((a, b) => a + b, 0) / diffs.length : 0;
  return { ping: avg, jitter };
}

async function measureDownload() {
  // Use Cloudflare's public speed test endpoint
  const testUrl = 'https://speed.cloudflare.com/__down?bytes=';
  const sizes = [100000, 500000, 1000000, 5000000, 10000000];
  let totalBytes = 0;
  let totalTime = 0;

  for (const size of sizes) {
    try {
      const start = performance.now();
      const resp = await fetch(testUrl + size + '&_=' + Date.now() + '_' + Math.random(), { cache: 'no-store' });
      const buf = await resp.arrayBuffer();
      const elapsed = performance.now() - start;
      totalBytes += buf.byteLength;
      totalTime += elapsed;
      // Update gauge in real-time
      const currentMbps = (totalBytes * 8) / (totalTime / 1000) / 1000000;
      $('#gaugeValue').textContent = currentMbps.toFixed(1);
      const progress = Math.min(100, (totalBytes / 15000000) * 100);
      $('#progress').style.width = progress + '%';
    } catch(e) {
      // If Cloudflare fails, try alternative
      break;
    }
  }

  if (totalTime === 0) {
    // Fallback: use a different public resource
    try {
      const start = performance.now();
      const resp = await fetch('https://cdn.jsdelivr.net/npm/jquery@3/dist/jquery.min.js?_=' + Date.now(), { cache: 'no-store' });
      const buf = await resp.arrayBuffer();
      totalTime = performance.now() - start;
      totalBytes = buf.byteLength;
    } catch(e) {
      return -1;
    }
  }

  return (totalBytes * 8) / (totalTime / 1000) / 1000000; // Mbps
}

async function startTest() {
  if (isRunning) return;
  isRunning = true;
  const btn = $('#startBtn');
  btn.disabled = true;
  btn.textContent = t('testing');
  const gauge = $('#gauge');
  gauge.classList.add('testing');
  $('#results').style.display = 'none';
  $('#progress').style.width = '0%';
  $('#gaugeValue').textContent = '0';

  // Step 1: Latency
  $('#log').textContent = t('testingLatency');
  $('#gaugeLabel').textContent = t('ping') + '...';
  const { ping, jitter } = await measureLatency('https://speed.cloudflare.com/__down?bytes=0', 6);

  // Step 2: Download
  $('#log').textContent = t('testingSpeed');
  $('#gaugeLabel').textContent = t('download') + '...';
  const downloadMbps = await measureDownload();

  // Done
  $('#progress').style.width = '100%';
  gauge.classList.remove('testing');
  btn.disabled = false;
  btn.textContent = t('start');
  $('#log').textContent = t('done');
  $('#gaugeLabel').textContent = t('download');

  if (downloadMbps > 0) {
    $('#gaugeValue').textContent = downloadMbps.toFixed(1);
  }

  // Show results
  $('#results').style.display = '';
  $('#rvDown').textContent = downloadMbps > 0 ? downloadMbps.toFixed(1) : '—';
  $('#rvPing').textContent = ping > 0 ? ping.toFixed(0) : '—';
  $('#rvJitter').textContent = jitter >= 0 ? jitter.toFixed(1) : '—';

  const conn = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
  $('#rvType').textContent = conn ? (conn.effectiveType || '—').toUpperCase() : '—';

  isRunning = false;
}

GZ.renderToolPage({
  category: 'dev',
  titleKey: 'toolTitle',

    {icon:'📊', href:'/dev/json.html', name:'JSON Formatter'},
  ]
});
</script>
