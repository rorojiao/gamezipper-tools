.noibreak input{width:100%;padding:4px 8px;border:1px solid var(--gz-border);border-radius:4px;background:var(--gz-bg);color:var(--gz-fg);font-size:.9em;box-sizing:border-box}

.tab.active{background:var(--gz-accent);color:#000;border-color:var(--gz-accent)}
.gauge{margin:20px auto;text-align:center}
.gauge-val{font-size:2em;font-weight:700}
.gauge-lbl{font-size:.85em;opacity:.7}
.bar-container{margin:16px 0;position:relative;height:24px;border-radius:12px;overflow:hidden;background:linear-gradient(to right,#ff6b6b,#ffd93d,#6bcb77)}
.bar-marker{position:absolute;top:0;bottom:0;width:4px;background:#fff;border-radius:2px}
.bar-labels{display:flex;justify-content:space-between;font-size:.75em;opacity:.6;margin-top:4px}
</style>

<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"What is cap rate?","acceptedAnswer":{"@type":"Answer","text":"Cap rate (capitalization rate) is a metric used to evaluate the potential return on a real estate investment. It is calculated as Net Operating Income divided by the property value, expressed as a percentage."}},{"@type":"Question","name":"What is a good cap rate?","acceptedAnswer":{"@type":"Answer","text":"A good cap rate depends on the market. Generally, 4-10% is typical. Higher cap rates indicate higher potential returns but may also indicate higher risk. Urban areas tend to have lower cap rates (3-5%) while rural areas may see 8-12%."}},{"@type":"Question","name":"How is NOI calculated?","acceptedAnswer":{"@type":"Answer","text":"NOI (Net Operating Income) = Gross Rental Income - Operating Expenses. Operating expenses include property taxes, insurance, maintenance, property management, and vacancy allowance, but NOT mortgage payments."}},{"@type":"Question","name":"Is this tool free?","acceptedAnswer":{"@type":"Answer","text":"Yes, this calculator is 100% free and runs entirely in your browser. No data is sent to any server."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="tabs">
      <button class="tab active" onclick="switchTab('simple',this)" id="tab-simple"></button>
      <button class="tab" onclick="switchTab('detailed',this)" id="tab-detailed"></button>
    </div>

    <div id="panel-simple">
      <div class="gz-input-group">
        <div class="gz-field"><label id="lbl-noi"></label><input type="number" id="noi" value="36000" min="0" step="100"></div>
        <div class="gz-field"><label id="lbl-value"></label><input type="number" id="prop-value" value="500000" min="0" step="1000"></div>
      </div>
    </div>

    <div id="panel-detailed" style="display:none">
      <div class="gz-input-group">
        <div class="gz-field"><label id="lbl-rent"></label><input type="number" id="rent" value="36000" min="0" step="100"></div>
        <div class="gz-field"><label id="lbl-vacancy"></label><input type="number" id="vacancy" value="5" min="0" max="100" step="1"></div>
        <div class="gz-field"><label id="lbl-taxes"></label><input type="number" id="taxes" value="6000" min="0" step="100"></div>
        <div class="gz-field"><label id="lbl-insurance"></label><input type="number" id="insurance" value="1800" min="0" step="100"></div>
        <div class="gz-field"><label id="lbl-maint"></label><input type="number" id="maint" value="3000" min="0" step="100"></div>
        <div class="gz-field"><label id="lbl-mgmt"></label><input type="number" id="mgmt" value="3600" min="0" step="100"></div>
        <div class="gz-field"><label id="lbl-prop-value2"></label><input type="number" id="prop-value2" value="500000" min="0" step="1000"></div>
      </div>
    </div>

    <button class="gz-btn" onclick="calc()"></button>
    <button class="gz-btn gz-btn-secondary" onclick="resetForm()"></button>

    <div id="summary" class="summary"></div>
    <div id="gauge-area"></div>
    <div id="noibreak-area"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Cap Rate Calculator',
    toolDesc: 'Calculate the capitalization rate for real estate investments. Evaluate rental property returns and compare investments.',
    tabSimple: 'Simple',
    tabDetailed: 'Detailed NOI',
    lblNoi: 'Net Operating Income (NOI) — Annual ($)',
    lblValue: 'Property Value ($)',
    lblRent: 'Gross Annual Rental Income ($)',
    lblVacancy: 'Vacancy Rate (%)',
    lblTaxes: 'Property Taxes ($/year)',
    lblInsurance: 'Insurance ($/year)',
    lblMaint: 'Maintenance & Repairs ($/year)',
    lblMgmt: 'Property Management ($/year)',
    lblPropValue2: 'Property Value ($)',
    btnCalc: 'Calculate Cap Rate',
    btnReset: 'Reset',
    capRate: 'Cap Rate',
    monthlyNOI: 'Monthly NOI',
    annualNOI: 'Annual NOI',
    paybackYears: 'Payback Period',
    grossIncome: 'Gross Income',
    vacancyLoss: 'Vacancy Loss',
    effectiveIncome: 'Effective Income',
    totalExpenses: 'Total Expenses',
    netOperatingIncome: 'Net Operating Income',
    poor: 'Below Average',
    fair: 'Fair',
    good: 'Good',
    excellent: 'Excellent',
    step1: 'Enter property value and net operating income (or use detailed mode)',
    step2: 'Click Calculate to see the cap rate',
    step3: 'Review the cap rate gauge for investment quality',
    step4: 'Compare with other properties to find the best investment',
  },
  zh: {
    toolTitle: '资本化率计算器',
    toolDesc: '计算房地产投资的资本化率（Cap Rate），评估租赁物业回报率。',
    tabSimple: '简单模式',
    tabDetailed: '详细 NOI',
    lblNoi: '净营业收入（NOI）— 年度（美元）',
    lblValue: '物业价值（美元）',
    lblRent: '年租金总收入（美元）',
    lblVacancy: '空置率（%）',
    lblTaxes: '房产税（美元/年）',
    lblInsurance: '保险费（美元/年）',
    lblMaint: '维修保养费（美元/年）',
    lblMgmt: '物业管理费（美元/年）',
    lblPropValue2: '物业价值（美元）',
    btnCalc: '计算 Cap Rate',
    btnReset: '重置',
    capRate: '资本化率',
    monthlyNOI: '月度 NOI',
    annualNOI: '年度 NOI',
    paybackYears: '回本年限',
    grossIncome: '毛收入',
    vacancyLoss: '空置损失',
    effectiveIncome: '有效收入',
    totalExpenses: '总支出',
    netOperatingIncome: '净营业收入',
    poor: '低于平均',
    fair: '一般',
    good: '良好',
    excellent: '优秀',
    step1: '输入物业价值和净营业收入（或使用详细模式）',
    step2: '点击计算查看资本化率',
    step3: '查看资本化率仪表盘评估投资质量',
    step4: '对比其他物业找到最佳投资机会',
  }
});

const { $, t } = GZ;

$('#tab-simple').textContent = t('tabSimple');
$('#tab-detailed').textContent = t('tabDetailed');
$('#lbl-noi').textContent = t('lblNoi');
$('#lbl-value').textContent = t('lblValue');
$('#lbl-rent').textContent = t('lblRent');
$('#lbl-vacancy').textContent = t('lblVacancy');
$('#lbl-taxes').textContent = t('lblTaxes');
$('#lbl-insurance').textContent = t('lblInsurance');
$('#lbl-maint').textContent = t('lblMaint');
$('#lbl-mgmt').textContent = t('lblMgmt');
$('#lbl-prop-value2').textContent = t('lblPropValue2');

let currentTab = 'simple';

function switchTab(tab, btn) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  $('#panel-simple').style.display = tab === 'simple' ? '' : 'none';
  $('#panel-detailed').style.display = tab === 'detailed' ? '' : 'none';
}

function fmt(n) { return '$' + n.toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2}); }

function calc() {
  let noi, propVal;

  if (currentTab === 'detailed') {
    const rent = parseFloat($('#rent').value) || 0;
    const vacancy = parseFloat($('#vacancy').value) || 0;
    const taxes = parseFloat($('#taxes').value) || 0;
    const insurance = parseFloat($('#insurance').value) || 0;
    const maint = parseFloat($('#maint').value) || 0;
    const mgmt = parseFloat($('#mgmt').value) || 0;
    propVal = parseFloat($('#prop-value2').value) || 0;

    const vacancyLoss = rent * vacancy / 100;
    const effective = rent - vacancyLoss;
    const expenses = taxes + insurance + maint + mgmt;
    noi = effective - expenses;

    // Show NOI breakdown
    $('#noibreak-area').innerHTML = `<div class="noibreak"><h3>NOI Breakdown</h3><table>
      <tr><td>${t('grossIncome')}</td><td style="text-align:right">${fmt(rent)}</td></tr>
      <tr><td>${t('vacancyLoss')} (${vacancy}%)</td><td style="text-align:right;color:#ff6b6b">-${fmt(vacancyLoss)}</td></tr>
      <tr><td><strong>${t('effectiveIncome')}</strong></td><td style="text-align:right"><strong>${fmt(effective)}</strong></td></tr>
      <tr><td colspan="2" style="padding-top:8px;opacity:.6">Operating Expenses</td></tr>
      <tr><td>Property Taxes</td><td style="text-align:right">-${fmt(taxes)}</td></tr>
      <tr><td>Insurance</td><td style="text-align:right">-${fmt(insurance)}</td></tr>
      <tr><td>Maintenance</td><td style="text-align:right">-${fmt(maint)}</td></tr>
      <tr><td>Management</td><td style="text-align:right">-${fmt(mgmt)}</td></tr>
      <tr><td><strong>${t('totalExpenses')}</strong></td><td style="text-align:right;color:#ff6b6b"><strong>-${fmt(expenses)}</strong></td></tr>
      <tr><td><strong>${t('netOperatingIncome')}</strong></td><td style="text-align:right;color:#00d672"><strong>${fmt(noi)}</strong></td></tr>
    </table></div>`;
  } else {
    noi = parseFloat($('#noi').value) || 0;
    propVal = parseFloat($('#prop-value').value) || 0;
    $('#noibreak-area').innerHTML = '';
  }

  if (propVal <= 0 || noi <= 0) return;

  const capRate = noi / propVal * 100;
  const payback = propVal / noi;

  $('#summary').innerHTML = `
    <div class="s-card"><div class="val">${capRate.toFixed(2)}%</div><div class="lbl">${t('capRate')}</div></div>
    <div class="s-card"><div class="val">${fmt(noi/12)}</div><div class="lbl">${t('monthlyNOI')}</div></div>
    <div class="s-card"><div class="val">${fmt(noi)}</div><div class="lbl">${t('annualNOI')}</div></div>
    <div class="s-card"><div class="val">${payback.toFixed(1)} yr</div><div class="lbl">${t('paybackYears')}</div></div>
  `;

  // Cap rate gauge
  let label, color;
  if (capRate < 4) { label = t('poor'); color = '#ff6b6b'; }
  else if (capRate < 6) { label = t('fair'); color = '#ffd93d'; }
  else if (capRate < 8) { label = t('good'); color = '#6bcb77'; }
  else { label = t('excellent'); color = '#00d672'; }

  const markerPct = Math.min(Math.max(capRate / 12 * 100, 0), 100);

  $('#gauge-area').innerHTML = `
    <div class="gauge"><div class="gauge-val" style="color:${color}">${capRate.toFixed(2)}%</div><div class="gauge-lbl">${label}</div></div>
    <div class="bar-container"><div class="bar-marker" style="left:${markerPct}%"></div></div>
    <div class="bar-labels"><span>0%</span><span>4%</span><span>8%</span><span>12%+</span></div>
  `;
}

function resetForm() {
  $('#noi').value = 36000;
  $('#prop-value').value = 500000;
  $('#rent').value = 36000;
  $('#vacancy').value = 5;
  $('#taxes').value = 6000;
  $('#insurance').value = 1800;
  $('#maint').value = 3000;
  $('#mgmt').value = 3600;
  $('#prop-value2').value = 500000;
  calc();
}

calc();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🏠', href:'/calc/mortgage.html', name:'Mortgage Calculator'},
    {icon:'🏘️', href:'/calc/rent-vs-buy.html', name:'Rent vs Buy'},
    {icon:'💰', href:'/calc/roi.html', name:'ROI Calculator'},
    {icon:'📈', href:'/calc/investment-calculator.html', name:'Investment Calculator'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
