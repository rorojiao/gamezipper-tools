  zh: {
    toolTitle: '数字转文字转换器',
    toolDesc: '将数字转换为英文单词、中文大写和货币文字格式。',
    englishWords: '英文单词',
    chineseWords: '中文大写',
    usd: '美元格式',
    eur: '欧元格式',
    cny: '人民币格式',
    clear: '清除',
    copy: '复制',
    step1: '在输入框中输入或粘贴数字',
    step2: '结果即时以多种格式显示',
    step3: '查看英文单词、中文大写和货币格式',
    step4: '点击任一结果的「复制」按钮即可使用',
  }
});

const { $, copyText, t } = GZ;

function numberToEnglish(n) {
  if (n === 0) return 'zero';
  if (n < 0) return 'minus ' + numberToEnglish(-n);
  const ones = ['','one','two','three','four','five','six','seven','eight','nine','ten',
    'eleven','twelve','thirteen','fourteen','fifteen','sixteen','seventeen','eighteen','nineteen'];
  const tens = ['','','twenty','thirty','forty','fifty','sixty','seventy','eighty','ninety'];

  if (n < 20) return ones[n];
  if (n < 100) return tens[Math.floor(n/10)] + (n%10 ? '-' + ones[n%10] : '');
  if (n < 1000) return ones[Math.floor(n/100)] + ' hundred' + (n%100 ? ' and ' + numberToEnglish(n%100) : '');
  if (n < 1e6) return numberToEnglish(Math.floor(n/1000)) + ' thousand' + (n%1000 ? ' ' + numberToEnglish(n%1000) : '');
  if (n < 1e9) return numberToEnglish(Math.floor(n/1e6)) + ' million' + (n%1e6 ? ' ' + numberToEnglish(n%1e6) : '');
  if (n < 1e12) return numberToEnglish(Math.floor(n/1e9)) + ' billion' + (n%1e9 ? ' ' + numberToEnglish(n%1e9) : '');
  return numberToEnglish(Math.floor(n/1e12)) + ' trillion' + (n%1e12 ? ' ' + numberToEnglish(n%1e12) : '');
}

function numberToChinese(n) {
  if (n === 0) return '零';
  if (n < 0) return '负' + numberToChinese(-n);
  const digits = ['零','壹','贰','叁','肆','伍','陆','柒','捌','玖'];
  const units = ['','拾','佰','仟'];
  const big = ['','万','亿','万亿'];

  let s = String(Math.floor(n));
  let result = '';
  let groupIdx = 0;

  while (s.length > 0) {
    let group = s.length > 4 ? s.slice(s.length - 4) : s;
    s = s.length > 4 ? s.slice(0, s.length - 4) : '';
    let groupStr = '';
    let zeroFlag = false;
    for (let i = 0; i < group.length; i++) {
      const d = parseInt(group[i]);
      const unitIdx = group.length - 1 - i;
      if (d === 0) { zeroFlag = true; }
      else {
        if (zeroFlag) { groupStr += '零'; zeroFlag = false; }
        groupStr += digits[d] + units[unitIdx];
      }
    }
    if (groupStr) result = groupStr + big[groupIdx] + result;
    else if (result) result = '零' + result;
    groupIdx++;
  }
  return result + '元整';
}

function currencyFormat(n, symbol, mainUnit, centUnit) {
  const isNeg = n < 0;
  const abs = Math.abs(n);
  const main = Math.floor(abs);
  const cents = Math.round((abs - main) * 100);
  let text = (isNeg ? 'minus ' : '') + numberToEnglish(main) + ' ' + mainUnit;
  if (cents > 0) {
    text += ' and ' + numberToEnglish(cents) + ' ' + centUnit;
  }
  return symbol + text;
}

function convert() {
  const raw = $('#input').value.trim().replace(/,/g, '');
  const n = parseFloat(raw);
  if (!raw || isNaN(n)) { $('#results').innerHTML = ''; return; }

  const intPart = Math.floor(Math.abs(n));
  const results = [];

  // English
  const eng = (n < 0 ? 'minus ' : '') + numberToEnglish(intPart);
  results.push({label: t('englishWords'), value: eng});

  // Chinese
  results.push({label: t('chineseWords'), value: numberToChinese(n)});

  // USD
  results.push({label: t('usd'), value: currencyFormat(n, '$', 'dollars', 'cents')});

  // EUR
  results.push({label: t('eur'), value: currencyFormat(n, '€', 'euros', 'cents')});

  // CNY
  results.push({label: t('cny'), value: currencyFormat(n, '¥', 'yuan', 'fen')});

  $('#results').innerHTML = results.map((r, i) =>
    `<div class="n2w-result"><span class="label">${r.label}</span><span class="value" id="res-${i}">${r.value}</span><button onclick="copyText(document.getElementById('res-${i}').textContent)">${t('copy')}</button></div>`
  ).join('');
}

$('#toolbar').innerHTML = `<button class="gz-btn gz-btn-secondary" onclick="$('#input').value='';$('#results').innerHTML=''">${t('clear')}</button>`;

});
