<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is a balloon loan?", "acceptedAnswer": {"@type": "Answer", "text": "A balloon loan has lower regular monthly payments that are calculated as if the loan were spread over a long term, but a large lump sum (the balloon payment) is due at a set date to pay off the remaining balance. They are common in commercial real estate, some auto loans, and short-term mortgages."}}, {"@type": "Question", "name": "How is the balloon payment calculated?", "acceptedAnswer": {"@type": "Answer", "text": "The monthly payment is computed using the full amortization term, but the loan ends early at the balloon month. The balloon equals the remaining principal at that point: original balance grown by monthly interest minus all payments made so far. This calculator does the full amortization math for you."}}, {"@type": "Question", "name": "What happens if I can't pay the balloon?", "acceptedAnswer": {"@type": "Answer", "text": "If you cannot pay the balloon in cash, you typically must refinance the remaining balance into a new loan, sell the asset to cover it, or in some cases extend the loan (if the lender allows). Refinancing depends on interest rates and your credit at that time, which adds risk — plan your exit strategy before taking a balloon loan."}}, {"@type": "Question", "name": "Why do people use balloon loans?", "acceptedAnswer": {"@type": "Answer", "text": "Balloon loans keep monthly payments low, which helps cash flow for investors, businesses, and borrowers who expect to sell the property or refinance before the balloon is due. The trade-off is the large payment at the end and the risk that rates or circumstances change before then."}}]}</script>

<script>
GZI18n.register({
  en: {
    toolTitle: 'Balloon Loan Calculator',
    toolDesc: 'Calculate the monthly payment and the large balloon balance due at the end of a balloon mortgage or auto loan. See total interest, how much of the loan is still owed at the balloon date, and a yearly breakdown. Free and private.',
    lblAmount: 'Loan amount',
    lblRate: 'Annual interest rate',
    lblAmort: 'Amortization term (years)',
    lblBalloon: 'Balloon due after (years)',
    lMonthly: 'Monthly payment',
    lBalloon: 'Balloon payment due',
    lIntpaid: 'Interest paid by balloon',
    lTotalpaid: 'Total paid by balloon',
    lPctdue: 'Balance still owed',
    thYear: 'Year', thBal: 'End balance', thPrin: 'Principal paid', thInt: 'Interest paid',
    step1: 'Enter the loan amount and annual interest rate.',
    step2: 'Set the amortization term the payments are based on.',
    step3: 'Set how many years until the balloon payment is due.',
    step4: 'Read your monthly payment, the balloon amount and plan your refinance or payoff.',
  },
  zh: {
    toolTitle: '气球贷（尾款贷）计算器',
    toolDesc: '计算气球贷（房贷或车贷）的月供及到期需一次性偿还的大额尾款。查看总利息、到期时剩余本金占比和逐年明细。免费、私密。',
    lblAmount: '贷款金额',
    lblRate: '年利率',
    lblAmort: '摊销年限（年）',
    lblBalloon: '气球款到期（年）',
    lMonthly: '月供',
    lBalloon: '到期尾款金额',
    lIntpaid: '到期前已付利息',
    lTotalpaid: '到期前累计还款',
    lPctdue: '到期剩余本金占比',
    thYear: '年份', thBal: '年末余额', thPrin: '已还本金', thInt: '已付利息',
    step1: '输入贷款金额和年利率。',
    step2: '设置月供所依据的摊销年限。',
    step3: '设置多少年后到期需偿还气球尾款。',
    step4: '查看月供、气球尾款金额，规划再融资或一次性还清方案。',
  }
});

const { $, t } = GZ;
const money = n => '$' + Math.round(n).toLocaleString('en-US');
const lang = () => GZI18n.getLang();

function amortPayment(P, rM, n) {
  if (n <= 0) return P;
  if (rM === 0) return P / n;
  return P * rM / (1 - Math.pow(1 + rM, -n));
}

function calc() {
  const P = +$('#amount').value || 0;
  const rate = (+$('#rate').value || 0) / 100;
  const amortYears = +$('#amort').value || 1;
  const balloonYears = Math.min(+$('#balloon').value || 1, amortYears);
  const rM = rate / 12;
  const nAmort = amortYears * 12;
  const nBalloon = balloonYears * 12;

  const pmt = amortPayment(P, rM, nAmort);

  // remaining balance after nBalloon payments
  let bal = P, totalInt = 0, totalPaid = 0;
  const yearly = [];
  for (let m = 1; m <= nBalloon; m++) {
    const int = bal * rM;
    const prin = pmt - int;
    bal -= prin;
    totalInt += int; totalPaid += pmt;
    if (m % 12 === 0) {
      yearly.push({ y: m/12, bal: Math.max(0,bal), int: totalInt, prin: P - bal });
    }
  }
  // balloon = remaining balance (final balloon pays it off)
  const balloon = Math.max(0, bal);

  $('#v-monthly').textContent = money(pmt);
  $('#v-balloon').textContent = money(balloon);
  $('#v-intpaid').textContent = money(totalInt);
  $('#v-totalpaid').textContent = money(totalPaid);
  $('#v-pctdue').textContent = P > 0 ? (balloon / P * 100).toFixed(0) + '%' : '—';

  // table
  const tbody = $('#tbody'); tbody.innerHTML = '';
  yearly.forEach(yr => {
    tbody.insertAdjacentHTML('beforeend', `<tr><td>${yr.y}</td><td>${money(yr.bal)}</td><td>${money(yr.prin)}</td><td>${money(yr.int)}</td></tr>`);
  });

  $('#note').innerHTML = (lang()==='zh'
    ? '<b>⚠ 提醒：</b>' + balloonYears + ' 年后你仍欠约 <b>' + money(balloon) + '</b>（占原贷款 ' + (P>0?(balloon/P*100).toFixed(0):0) + '%），需一次性还清或再融资。请确保届时有再融资或变现计划。'
    : '<b>⚠ Heads up:</b> After ' + balloonYears + ' years you still owe about <b>' + money(balloon) + '</b> (' + (P>0?(balloon/P*100).toFixed(0):0) + '% of the loan). That lump sum must be paid or refinanced — make sure you have a plan.');
}

['amount','rate','amort','balloon'].forEach(id => $('#'+id).addEventListener('input', calc));
calc();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🏠', href:'/calc/mortgage-calculator.html', name:'Mortgage Calculator'},
    {icon:'📅', href:'/calc/loan-amortization.html', name:'Loan Amortization'},
    {icon:'🔄', href:'/calc/refinance-calculator.html', name:'Refinance Calculator'},
    {icon:'⚡', href:'/calc/early-mortgage-payoff.html', name:'Early Mortgage Payoff'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
