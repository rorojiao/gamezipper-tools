<style>
.dj-wrap{max-width:680px;margin:0 auto}
.dj-editor{background:var(--glass);border:1px solid var(--border);border-radius:16px;padding:20px;margin-bottom:20px}
.dj-date-row{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.dj-date-row input[type="date"]{background:var(--glass2);border:1px solid var(--border);color:var(--text);padding:8px 12px;border-radius:8px;font-size:.9em}
.dj-mood{display:flex;gap:6px}
.dj-mood button{background:var(--glass2);border:1px solid var(--border);padding:6px 10px;border-radius:20px;cursor:pointer;font-size:1.2em;transition:.2s;filter:grayscale(.6);opacity:.6}
.dj-mood button.active{filter:none;opacity:1;border-color:var(--accent);background:var(--accent)22}
.dj-textarea{width:100%;min-height:180px;background:var(--glass2);border:1px solid var(--border);color:var(--text);padding:14px;border-radius:10px;font-size:.95em;line-height:1.6;resize:vertical;font-family:inherit}
.dj-textarea:focus{outline:none;border-color:var(--accent)}
.dj-tags-row{display:flex;gap:8px;align-items:center;margin-top:12px}
.dj-tags-row input{flex:1;background:var(--glass2);border:1px solid var(--border);color:var(--text);padding:8px 12px;border-radius:8px;font-size:.85em}
.dj-save-row{display:flex;justify-content:space-between;align-items:center;margin-top:14px}
.dj-word-count{font-size:.78em;opacity:.6}
.dj-controls{display:flex;gap:8px;justify-content:center;margin-bottom:20px;flex-wrap:wrap}
.dj-search-row{display:flex;gap:8px;margin-bottom:16px}
.dj-search-row input{flex:1;background:var(--glass2);border:1px solid var(--border);color:var(--text);padding:10px 14px;border-radius:10px;font-size:.9em}
.dj-entries{text-align:left}
.dj-entry{background:var(--glass2);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:12px}
.dj-entry-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.dj-entry-date{font-weight:700;font-size:.95em}
.dj-entry-mood{font-size:1.3em}
.dj-entry-body{font-size:.88em;line-height:1.6;opacity:.9;white-space:pre-wrap;word-break:break-word;max-height:200px;overflow:hidden;position:relative}
.dj-entry-body.expanded{max-height:none}
.dj-entry-tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:8px}
.dj-entry-tags span{background:var(--accent)22;color:var(--accent);padding:2px 8px;border-radius:10px;font-size:.72em}
.dj-entry-actions{display:flex;gap:8px;margin-top:10px;font-size:.8em}
.dj-entry-actions button{background:none;border:none;color:var(--text2);cursor:pointer;text-decoration:underline;padding:0}
.dj-entry-actions button:hover{color:var(--accent)}
.dj-empty{text-align:center;padding:40px 20px;opacity:.5;font-size:.9em}
.dj-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
.dj-stat{background:var(--glass2);border:1px solid var(--border);border-radius:12px;padding:12px;text-align:center}
.dj-stat .v{font-size:1.5em;font-weight:700;color:var(--accent)}
.dj-stat .k{font-size:.72em;opacity:.7;margin-top:4px}
</style>

<body>
<div class="gz-container">
  <div class="gz-tool-header"><h1 id="title"></h1><p class="desc" id="desc"></p></div>
  <div class="gz-tool-area">
    <div class="dj-wrap">
      <div class="dj-stats" id="stats"></div>
      <div class="dj-editor">
        <div class="dj-date-row">
          <input type="date" id="entryDate">
          <div class="dj-mood" id="moodPicker"></div>
        </div>
        <textarea class="dj-textarea" id="entryText" placeholder=""></textarea>
        <div class="dj-tags-row">
          <input type="text" id="entryTags" placeholder="">
        </div>
        <div class="dj-save-row">
          <span class="dj-word-count" id="wordCount"></span>
          <button class="gz-btn" id="saveBtn"></button>
        </div>
      </div>
      <div class="dj-search-row">
        <input type="text" id="searchInput" placeholder="">
      </div>
      <div class="dj-controls">
        <button class="gz-btn gz-btn-secondary" id="exportBtn"></button>
        <button class="gz-btn gz-btn-secondary" id="clearAllBtn"></button>
      </div>
      <div class="dj-entries" id="entries"></div>
    </div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Daily Journal',
    toolDesc: 'Free private online journal and diary. Write entries, track your mood, add tags and search your history. All data stays in your browser — no signup, no cloud.',
    save: 'Save Entry',
    export: 'Export JSON',
    clearAll: 'Clear All',
    search: 'Search entries...',
    textPlaceholder: 'Write about your day, thoughts, gratitude or goals...',
    tagsPlaceholder: 'Tags (comma-separated): work, family, gratitude',
    words: 'words',
    entries: 'entries',
    streak: 'day streak',
    edit: 'Edit',
    delete: 'Delete',
    expand: 'Show more',
    collapse: 'Show less',
    noEntries: 'No journal entries yet. Write your first entry above!',
    confirmClear: 'Delete ALL journal entries? This cannot be undone.',
    entrySaved: 'Entry saved!',
    step1: 'Pick today\'s date and select your mood',
    step2: 'Write freely in the text area',
    step3: 'Add tags like "work", "gratitude" to organize entries',
    step4: 'Search and review past entries anytime — all stored privately',
  },
  zh: {
    toolTitle: '每日日记',
    toolDesc: '免费私密在线日记和手账。撰写日记、记录心情、添加标签并搜索历史。所有数据仅保存在浏览器中 — 无需注册、无云端。',
    save: '保存日记',
    export: '导出 JSON',
    clearAll: '清空全部',
    search: '搜索日记...',
    textPlaceholder: '记录你的一天、想法、感恩或目标...',
    tagsPlaceholder: '标签（逗号分隔）：工作、家庭、感恩',
    words: '字',
    entries: '篇日记',
    streak: '天连续',
    edit: '编辑',
    delete: '删除',
    expand: '展开',
    collapse: '收起',
    noEntries: '还没有日记。在上方写下你的第一篇吧！',
    confirmClear: '确认删除所有日记？此操作不可撤销。',
    entrySaved: '日记已保存！',
    step1: '选择今天的日期和你的心情',
    step2: '在文本框中自由书写',
    step3: '添加标签如"工作"、"感恩"来组织日记',
    step4: '随时搜索和回顾过去的日记 — 全部私密存储',
  }
});

const { $, copyText, showToast, t } = GZ;
const moods = ['😀','🙂','😐','😔','😢','😠','😴','🤔'];
let currentMood = '🙂';
let entries = JSON.parse(localStorage.getItem('gz-journal-entries') || '[]');
let editingId = null;

function todayStr() { return new Date().toISOString().slice(0,10); }

function save() {
  const date = $('#entryDate').value || todayStr();
  const text = $('#entryText').value.trim();
  const tags = $('#entryTags').value.split(',').map(s => s.trim()).filter(Boolean);
  if (!text) return;
  if (editingId) {
    const idx = entries.findIndex(e => e.id === editingId);
    if (idx >= 0) {
      entries[idx] = { ...entries[idx], date, text, mood: currentMood, tags, updated: Date.now() };
    }
    editingId = null;
  } else {
    entries.unshift({ id: Date.now(), date, text, mood: currentMood, tags, created: Date.now() });
  }
  localStorage.setItem('gz-journal-entries', JSON.stringify(entries));
  $('#entryText').value = '';
  $('#entryTags').value = '';
  $('#saveBtn').textContent = t('save');
  showToast(t('entrySaved'));
  wordCount();
  renderEntries();
  updateStats();
}

function editEntry(id) {
  const e = entries.find(x => x.id === id);
  if (!e) return;
  editingId = id;
  $('#entryDate').value = e.date;
  $('#entryText').value = e.text;
  $('#entryTags').value = (e.tags||[]).join(', ');
  currentMood = e.mood;
  renderMoodPicker();
  $('#saveBtn').textContent = t('edit') + ' → ' + t('save');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function deleteEntry(id) {
  entries = entries.filter(e => e.id !== id);
  localStorage.setItem('gz-journal-entries', JSON.stringify(entries));
  renderEntries();
  updateStats();
}

function clearAll() {
  if (!confirm(t('confirmClear'))) return;
  entries = [];
  localStorage.removeItem('gz-journal-entries');
  renderEntries();
  updateStats();
}

function exportData() {
  const blob = new Blob([JSON.stringify(entries, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `journal-export-${todayStr()}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function calcStreak() {
  if (entries.length === 0) return 0;
  const dates = [...new Set(entries.map(e => e.date))].sort().reverse();
  let streak = 0;
  let check = new Date();
  for (let i = 0; i < 365; i++) {
    const ds = check.toISOString().slice(0,10);
    if (dates.includes(ds)) {
      streak++;
      check.setDate(check.getDate() - 1);
    } else if (i === 0) {
      // today not written yet — check yesterday
      check.setDate(check.getDate() - 1);
    } else {
      break;
    }
  }
  return streak;
}

function updateStats() {
  const streak = calcStreak();
  $('#stats').innerHTML = `
    <div class="dj-stat"><div class="v">${entries.length}</div><div class="k">${t('entries')}</div></div>
    <div class="dj-stat"><div class="v">${streak}</div><div class="k">${t('streak')}</div></div>
    <div class="dj-stat"><div class="v">${new Set(entries.map(e=>e.date)).size}</div><div class="k">${t('entries').replace('entries','days')}</div></div>`;
}

function wordCount() {
  const text = $('#entryText').value.trim();
  const count = text ? text.split(/\s+/).length : 0;
  $('#wordCount').textContent = `${count} ${t('words')}`;
}

function renderMoodPicker() {
  $('#moodPicker').innerHTML = moods.map(m =>
    `<button onclick="currentMood='${m}';renderMoodPicker()" class="${m===currentMood?'active':''}">${m}</button>`).join('');
}

function renderEntries() {
  const query = $('#searchInput').value.toLowerCase().trim();
  const filtered = query
    ? entries.filter(e => e.text.toLowerCase().includes(query) || (e.tags||[]).some(tag => tag.toLowerCase().includes(query)) || e.date.includes(query))
    : entries;

  if (filtered.length === 0) {
    $('#entries').innerHTML = `<div class="dj-empty">${query ? '🔍' : '📝'} ${t('noEntries')}</div>`;
    return;
  }

  $('#entries').innerHTML = filtered.map(e => {
    const d = new Date(e.date);
    const dateStr = d.toLocaleDateString(undefined, { weekday: 'short', year: 'numeric', month: 'short', day: 'numeric' });
    const preview = e.text.length > 400;
    return `<div class="dj-entry">
      <div class="dj-entry-head">
        <span class="dj-entry-date">${dateStr}</span>
        <span class="dj-entry-mood">${e.mood}</span>
      </div>
      <div class="dj-entry-body" id="body-${e.id}">${escapeHtml(e.text)}</div>
      ${preview ? `<div class="dj-entry-actions"><button onclick="document.getElementById('body-${e.id}').classList.toggle('expanded');this.textContent=this.textContent==='${t('expand')}'?'${t('collapse')}':'${t('expand')}'">${t('expand')}</button></div>` : ''}
      ${(e.tags||[]).length > 0 ? `<div class="dj-entry-tags">${e.tags.map(tag => `<span>#${escapeHtml(tag)}</span>`).join('')}</div>` : ''}
      <div class="dj-entry-actions">
        <button onclick="editEntry(${e.id})">✏️ ${t('edit')}</button>
        <button onclick="deleteEntry(${e.id})">🗑️ ${t('delete')}</button>
      </div>
    </div>`;
  }).join('');
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// init
$('#entryDate').value = todayStr();
$('#entryText').placeholder = t('textPlaceholder');
$('#entryTags').placeholder = t('tagsPlaceholder');
$('#searchInput').placeholder = t('search');
$('#saveBtn').textContent = t('save');
$('#exportBtn').textContent = '📥 ' + t('export');
$('#clearAllBtn').textContent = '🗑️ ' + t('clearAll');
$('#saveBtn').onclick = save;
$('#exportBtn').onclick = exportData;
$('#clearAllBtn').onclick = clearAll;
$('#entryText').oninput = wordCount;
$('#searchInput').oninput = renderEntries;
renderMoodPicker();
renderEntries();
updateStats();
wordCount();

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🙏', href:'/text/gratitude-journal.html', name:'Gratitude Journal'},
    {icon:'📝', href:'/text/cornell-notes.html', name:'Cornell Notes'},
    {icon:'📋', href:'/text/todo-list-maker.html', name:'To-Do List'},
    {icon:'📅', href:'/text/daily-planner.html', name:'Daily Planner'},
  ]
});
</script>
<script src="/tools-result-rec.js?v=20260707v520" defer></script>
</body>
</html>
