<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"How do I calculate an exponent (power)?","acceptedAnswer":{"@type":"Answer","text":"To calculate base to the power of exponent, multiply the base by itself exponent times. For example 2^5 = 2 × 2 × 2 × 2 × 2 = 32. For non-integer exponents the calculator uses the rule a^b = exp(b × ln(a))."}},{"@type":"Question","name":"What does a negative exponent mean?","acceptedAnswer":{"@type":"Answer","text":"A negative exponent means take the reciprocal. So a^(-n) = 1 / a^n. For example 2^(-3) = 1 / (2×2×2) = 1/8 = 0.125. Any base to the power 0 equals 1 (except 0^0 which is undefined)."}},{"@type":"Question","name":"How do fractional exponents work?","acceptedAnswer":{"@type":"Answer","text":"A fractional exponent is a root. a^(1/n) is the nth root of a, and a^(m/n) = (nth root of a)^m. For example 8^(1/3) = 2 (cube root of 8), and 9^(3/2) = (sqrt 9)^3 = 27. Enter fractions as decimals, e.g. 0.5 for square root."}},{"@type":"Question","name":"Why is my result shown in scientific notation?","acceptedAnswer":{"@type":"Answer","text":"When the result is very large or very small, scientific notation (e.g. 1.0e+20) keeps it readable. The calculator also shows the full precision value and the number of digits where available."}}]}</script>

<script>
GZI18n.register({
  en:{
    toolTitle:'Exponent Calculator',
    toolDesc:'Compute any base raised to a power, including negative, fractional and decimal exponents. See the exact value, scientific notation and a step-by-step breakdown of the math.',
    lblBase:'Base',
    lblExp:'Exponent (power)',
    calculate:'⚡ Calculate',copy:'Copy',clear:'Clear',
    resultLabel:'Result',
    cellSci:'Scientific',
    cellDigits:'Digits',
    cellRoot:'As a root',
    cellRecip:'As reciprocal',
    formulaPos:'base^exponent = base multiplied by itself exponent times',
    formulaNeg:'Negative exponent: a^(-n) = 1 / a^n',
    formulaFrac:'Fractional exponent: a^(1/n) = nth root of a',
    formulaGen:'General: a^b = e^(b × ln a)',
    step:'Step',
    enterBoth:'Enter a base and an exponent, then press Calculate.',
    undefResult:'Undefined (e.g. 0 to the power of 0 or a negative base with a fractional exponent).',
    step1:'Enter the base number',
    step2:'Enter the exponent (can be negative, decimal or a fraction as a decimal)',
    step3:'Press Calculate to get the result instantly',
    step4:'Check the scientific notation and formula breakdown',
  },
  zh:{
    toolTitle:'指数（幂）计算器',
    toolDesc:'计算任意底数的幂，支持负指数、分数指数和小数指数。显示精确值、科学计数法和逐步计算过程。',
    lblBase:'底数',
    lblExp:'指数（幂）',
    calculate:'⚡ 计算',copy:'复制',clear:'清空',
    resultLabel:'结果',
    cellSci:'科学计数',
    cellDigits:'位数',
    cellRoot:'作为根',
    cellRecip:'作为倒数',
    formulaPos:'底数^指数 = 底数自乘指数次',
    formulaNeg:'负指数：a^(-n) = 1 / a^n',
    formulaFrac:'分数指数：a^(1/n) = a 的 n 次方根',
    formulaGen:'通式：a^b = e^(b × ln a)',
    step:'步骤',
    enterBoth:'输入底数和指数后点击计算。',
    undefResult:'未定义（例如 0 的 0 次方，或负底数配分数指数）。',
    step1:'输入底数',
    step2:'输入指数（可为负数、小数或分数化小数）',
    step3:'点击「计算」立即得到结果',
    step4:'查看科学计数法和公式分解',
  }
});

const { $, copyText, t } = GZ;

function fmtFull(n){
  if(!isFinite(n)) return String(n);
  // Try to show full integer for large/small results
  if(Number.isInteger(n) && Math.abs(n) < 1e21){
    return n.toLocaleString('fullwide',{useGrouping:false}) || String(n);
  }
  if(Number.isInteger(n)) return n.toExponential();
  return String(n);
}
function fmtSci(n){ if(!isFinite(n)) return String(n); return n.toExponential(6); }
function fmt(n){ if(!isFinite(n)) return String(n); const r=Math.round(n*1e10)/1e10; return r.toLocaleString('en-US',{maximumFractionDigits:10}); }

function calc(){
  const b=parseFloat($('#base').value);
  const e=parseFloat($('#exp').value);
  if(isNaN(b)||isNaN(e)){ $('#resultBig').textContent='—'; $('#resultMeta').textContent=t('enterBoth'); $('#grid').innerHTML=''; $('#formula').textContent=t('formulaGen'); return; }
  // detect undefined cases
  const isUndef=(b===0 && e<=0) || (b<0 && !Number.isInteger(e));
  if(isUndef){
    $('#resultBig').textContent='—';
    $('#resultMeta').textContent=t('undefResult');
    $('#grid').innerHTML='';
    $('#formula').textContent=t('formulaGen');
    return;
  }
  const result=Math.pow(b,e);
  $('#resultBig').textContent=fmtFull(result);
  $('#resultMeta').textContent=t('resultLabel');
  const cells=[];
  if(Math.abs(result)>=1e6||Math.abs(result)<1e-3&&result!==0){
    cells.push(`<div class="ex-cell"><div class="lbl">${t('cellSci')}</div><div class="val">${fmtSci(result)}</div></div>`);
  }
  if(Number.isInteger(result) && Math.abs(result)>=1000){
    cells.push(`<div class="ex-cell"><div class="lbl">${t('cellDigits')}</div><div class="val">${String(Math.abs(result)).length}</div></div>`);
  }
  if(e<0){
    cells.push(`<div class="ex-cell"><div class="lbl">${t('cellRecip')}</div><div class="val">1/${fmtFull(Math.pow(b,-e))}</div></div>`);
  }
  if(!Number.isInteger(e) && b>=0){
    // show as root when fractional
    const inv=1/e;
    cells.push(`<div class="ex-cell"><div class="lbl">${t('cellRoot')}</div><div class="val">${fmt(b)}^(1/${fmt(1/e)})</div></div>`);
  }
  $('#grid').innerHTML=cells.join('');

  let steps='';
  if(Number.isInteger(e)&&e>=0){
    const arr=Array(e).fill(fmt(b)).join(' × ');
    steps=`<div>${t('formulaPos')}</div><div style="margin-top:8px">${t('step')} 1 — ${fmt(b)}^${fmt(e)} = ${e===0?'1 (any non-zero base to the power 0 is 1)':(arr||fmt(b))}</div><div>${t('step')} 2 — = <b>${fmtFull(result)}</b></div>`;
  } else if(Number.isInteger(e)&&e<0){
    const n=-e;
    const arr=Array(n).fill(fmt(b)).join(' × ');
    steps=`<div>${t('formulaNeg')}</div><div style="margin-top:8px">${t('step')} 1 — ${fmt(b)}^(${fmt(e)}) = 1 / ${fmt(b)}^${n}</div><div>${t('step')} 2 — = 1 / (${arr||fmt(b)})</div><div>${t('step')} 3 — = <b>${fmtFull(result)}</b></div>`;
  } else if(b>=0){
    steps=`<div>${t('formulaGen')}</div><div style="margin-top:8px">${t('step')} 1 — ${fmt(b)}^${fmt(e)} = e^(${fmt(e)} × ln ${fmt(b)})</div><div>${t('step')} 2 — ln ${fmt(b)} = <b>${fmt(Math.log(b))}</b></div><div>${t('step')} 3 — e^${fmt(e*Math.log(b))} = <b>${fmtFull(result)}</b></div>`;
  } else {
    steps=`<div>${t('formulaPos')}</div><div style="margin-top:8px">${fmt(b)}^${fmt(e)} = <b>${fmtFull(result)}</b></div>`;
  }
  $('#formula').innerHTML=steps;
}

$('#calcBtn').addEventListener('click',calc);
['base','exp'].forEach(id=>{ const el=$('#'+id); el.addEventListener('input',calc); el.addEventListener('keydown',e=>{if(e.key==='Enter')calc();}); });

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="calc()">${t('calculate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="copyText($('#resultBig').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#base').value='';$('#exp').value='';calc()">${t('clear')}</button>`;

$('#lbl-base').textContent=t('lblBase');
$('#lbl-exp').textContent=t('lblExp');

GZ.renderToolPage({
  category:'calc',
  titleKey:'toolTitle',
  descKey:'toolDesc',
  howToSteps:['step1','step2','step3','step4'],
  related:[
    {icon:'√',href:'/calc/cube-root-calculator.html',name:'Cube Root Calculator'},
    {icon:'🔢',href:'/calc/logarithm-calculator.html',name:'Logarithm Calculator'},
    {icon:'📊',href:'/calc/percent-error-calculator.html',name:'Percent Error Calculator'},
    {icon:'🧮',href:'/calc/scientific-calculator.html',name:'Scientific Calculator'},
  ]
});
calc();
</script>
<script src="/tools-result-rec.js?v=20260707v520" defer></script>
