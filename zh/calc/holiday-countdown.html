    add: '添加自定义节日',
    featured: '下一个节日',
    days: '天', hours: '小时', minutes: '分', seconds: '秒',
    past: '今年已过 — 正在倒计时明年！',
    today: '🎉 就是今天！',
    step1: '浏览热门节日的实时倒计时',
    step2: '顶部精选卡片显示即将到来的最近节日',
    step3: '在底部添加自定义节日（生日、纪念日、假期）',
    step4: '实时观看每秒倒计时 — 页面每秒刷新',
  }
});

const { $, t } = GZ;

const HOLIDAYS = [
  { name: "New Year's Day", emoji: '🎊', m: 0, d: 1 },
  { name: 'Valentine\'s Day', emoji: '💝', m: 1, d: 14 },
  { name: 'Easter', emoji: '🐣', m: 3, d: 1, dynamic: 'easter' },
  { name: 'April Fools\' Day', emoji: '🤡', m: 3, d: 1 },
  { name: 'Mother\'s Day', emoji: '🌷', m: 4, d: 1, dynamic: 'motherday' },
  { name: 'Memorial Day', emoji: '🇺🇸', m: 4, d: 25, dynamic: 'lastmon-may' },
  { name: 'Father\'s Day', emoji: '👔', m: 5, d: 1, dynamic: 'fatherday' },
  { name: 'Independence Day', emoji: '🎆', m: 6, d: 4 },
  { name: 'Labor Day', emoji: '👷', m: 8, d: 1, dynamic: 'firstmon-sep' },
  { name: 'Halloween', emoji: '🎃', m: 9, d: 31 },
  { name: 'Thanksgiving', emoji: '🦃', m: 10, d: 1, dynamic: 'fourththu-nov' },
  { name: 'Black Friday', emoji: '🛍️', m: 10, d: 1, dynamic: 'fridayafter-thanks' },
  { name: 'Cyber Monday', emoji: '💻', m: 10, d: 1, dynamic: 'cybermonday' },
  { name: 'Christmas Eve', emoji: '🎄', m: 11, d: 24 },
  { name: 'Christmas Day', emoji: '🎁', m: 11, d: 25 },
  { name: 'New Year\'s Eve', emoji: '🥂', m: 11, d: 31 },
];

let customHolidays = JSON.parse(localStorage.getItem('gz-custom-holidays') || '[]');

function easter(y) {
  // Gauss's algorithm
  const a = y % 19, b = Math.floor(y / 100), c = y % 100;
  const d = Math.floor(b / 4), e = b % 4;
  const f = Math.floor((b + 8) / 25), g = Math.floor((b - f + 1) / 3);
  const h = (19 * a + b - d - g + 15) % 30;
  const i = Math.floor(c / 4), k = c % 4;
  const L = (32 + 2 * e + 2 * i - h - k) % 7;
  const m = Math.floor((a + 11 * h + 22 * L) / 451);
  return new Date(y, 2, 1).getTime() + ((h + L - 7 * m + 114) % 31 ? 0 : 0) + ((h + L - 7 * m + 114) % 31) * 86400000 - 86400000;
}

function nthWeekdayOfMonth(y, m, dow, n) {
  // dow: 0=Sun, 1=Mon, ..., 6=Sat
  const first = new Date(y, m, 1);
  let day = ((dow - first.getDay() + 7) % 7) + 1;
  day += (n - 1) * 7;
  return new Date(y, m, day);
}

function lastWeekdayOfMonth(y, m, dow) {
  const last = new Date(y, m + 1, 0);
  let day = last.getDate();
  while (new Date(y, m, day).getDay() !== dow) day--;
  return new Date(y, m, day);
}

function getNextDate(holiday, fromDate) {
  const y = fromDate.getFullYear();
  const ms = (d) => new Date(d).getTime();
  const today0 = new Date(fromDate.getFullYear(), fromDate.getMonth(), fromDate.getDate());
  let d;
  if (holiday.dynamic === 'easter') {
    const ey = y;
    const a = ey % 19, b = Math.floor(ey / 100), c = ey % 100;
    const dd = Math.floor(b / 4), e = b % 4;
    const f = Math.floor((b + 8) / 25), g = Math.floor((b - f + 1) / 3);
    const h = (19 * a + b - dd - g + 15) % 30;
    const ii = Math.floor(c / 4), k = c % 4;
    const L = (32 + 2 * e + 2 * ii - h - k) % 7;
    const m = Math.floor((a + 11 * h + 22 * L) / 451);
    const month = 2 + Math.floor((h + L - 7 * m + 114) / 31) - 1;
    const day = ((h + L - 7 * m + 114) % 31) + 1;
    d = new Date(y, month, day);
  } else if (holiday.dynamic === 'motherday') {
    d = nthWeekdayOfMonth(y, 4, 0, 2);
  } else if (holiday.dynamic === 'fatherday') {
    d = nthWeekdayOfMonth(y, 5, 0, 3);
  } else if (holiday.dynamic === 'lastmon-may') {
    d = lastWeekdayOfMonth(y, 4, 1);
  } else if (holiday.dynamic === 'firstmon-sep') {
    d = nthWeekdayOfMonth(y, 8, 1, 1);
  } else if (holiday.dynamic === 'fourththu-nov') {
    d = nthWeekdayOfMonth(y, 10, 4, 4);
  } else if (holiday.dynamic === 'fridayafter-thanks') {
    const tg = nthWeekdayOfMonth(y, 10, 4, 4);
    d = new Date(tg.getTime() + 86400000);
  } else if (holiday.dynamic === 'cybermonday') {
    const tg = nthWeekdayOfMonth(y, 10, 4, 4);
    d = new Date(tg.getTime() + 4 * 86400000);
  } else {
    d = new Date(y, holiday.m, holiday.d);
  }
  if (ms(d) < ms(today0)) {
    return getNextDate(holiday, new Date(y + 1, 0, 1));
  }
  return d;
}

function fmtCountdown(ms) {
  if (ms <= 0) return { d: 0, h: 0, m: 0, s: 0 };
  const sec = Math.floor(ms / 1000);
  const d = Math.floor(sec / 86400);
  const h = Math.floor((sec % 86400) / 3600);
  const m = Math.floor((sec % 3600) / 60);
  const s = sec % 60;
  return { d, h, m, s };
}

function render() {
  const now = new Date();
  const today0 = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  // Compute next dates for all holidays
  const items = [...HOLIDAYS, ...customHolidays.map(h => ({...h, custom: true}))].map(h => {
    const d = h.custom ? new Date(h.date) : getNextDate(h, now);
    const diff = d.getTime() - now.getTime();
    return { h, d, diff };
  }).sort((a, b) => a.diff - b.diff);

  // Featured = nearest upcoming
  const top = items[0];
  const topIsToday = top && top.diff <= 0;
  const cd = fmtCountdown(top.diff);
  $('#featured').innerHTML = `
    <div class="emoji-big">${top.h.emoji}</div>
    <div style="font-size:1.3em;font-weight:700">${top.h.name}</div>
    <div class="big">${topIsToday ? t('today') : `${cd.d} ${t('days')} ${cd.h} ${t('hours')} ${cd.m} ${t('minutes')}`}</div>
    <div class="date">${top.d.toDateString()}</div>
  `;

  // Grid (skip top to avoid dup)
  const grid = items.slice(1, 16);
  const totalSpan = 365 * 86400000; // ~ year
  $('#grid').innerHTML = grid.map(item => {
    const isToday = item.diff <= 0;
    const cd2 = fmtCountdown(item.diff);
    const pct = Math.max(2, Math.min(100, (1 - item.diff / totalSpan) * 100));
    return `
      <div class="holiday-card">
        ${item.h.custom ? '<div class="weekend-badge" style="background:var(--accent2)">Custom</div>' : ''}
        <div class="emoji">${item.h.emoji}</div>
        <div class="name">${item.h.name}</div>
        <div class="date">${item.d.toDateString()}</div>
        <div class="countdown">${isToday ? t('today') : `${cd2.d}d ${cd2.h}h ${cd2.m}m`}</div>
        <div class="progress"><div class="progress-fill" style="width:${pct.toFixed(1)}%"></div></div>
        ${item.h.custom ? `<div style="margin-top:8px"><button class="gz-btn" data-del="${item.d.toISOString().slice(0,10)}" style="font-size:.7em;padding:4px 10px">Remove</button></div>` : ''}
      </div>
    `;
  }).join('');

  // Wire delete buttons
  $('#grid').querySelectorAll('[data-del]').forEach(btn => {
    btn.addEventListener('click', () => {
      const date = btn.dataset.del;
      customHolidays = customHolidays.filter(c => c.date !== date);
      localStorage.setItem('gz-custom-holidays', JSON.stringify(customHolidays));
      render();
    });
  });
}

$('#addBtn').addEventListener('click', () => {
  const name = $('#customName').value.trim();
  const emoji = $('#customEmoji').value.trim() || '🎉';
  const date = $('#customDate').value;
  if (!name || !date) return;
  const d = new Date(date);
  customHolidays.push({ name, emoji, m: d.getMonth(), d: d.getDate(), date });
  localStorage.setItem('gz-custom-holidays', JSON.stringify(customHolidays));
  $('#customName').value = '';
  $('#customEmoji').value = '';
  $('#customDate').value = '';
  render();
});

render();
setInterval(render, 1000);

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle', descKey: 'toolDesc',

    {icon:'⏳', href:'/calc/days-until.html', name:'Days Until'},
    {icon:'⏰', href:'/calc/alarm-clock.html', name:'Alarm Clock'},
    {icon:'📅', href:'/calc/date-calculator.html', name:'Date Calculator'},
  ]
});
</script>
