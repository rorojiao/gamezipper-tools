<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What DPI do I need for printing?", "acceptedAnswer": {"@type": "Answer", "text": "For most photo prints, 300 DPI (dots per inch) is the standard for sharp, professional quality. Large posters viewed from a distance can use 150-200 DPI. Newspapers use 150-200 DPI, while fine art prints may use 300+ DPI."}}, {"@type": "Question", "name": "How do I calculate the maximum print size of my image?", "acceptedAnswer": {"@type": "Answer", "text": "Divide your image's pixel dimensions by the DPI. For example, a 3000×2400 pixel image at 300 DPI prints at 10×8 inches (3000÷300=10, 2400÷300=8). The Print Size Calculator does this instantly for any resolution and DPI."}}, {"@type": "Question", "name": "What is the difference between PPI and DPI?", "acceptedAnswer": {"@type": "Answer", "text": "PPI (pixels per inch) refers to digital image resolution, while DPI (dots per inch) refers to printer output. For print size calculations they are used interchangeably — a 300 PPI image typically prints at 300 DPI."}}, {"@type": "Question", "name": "Can I print a low-resolution photo larger?", "acceptedAnswer": {"@type": "Answer", "text": "Yes, but quality drops. At 150 DPI a photo still looks acceptable for posters viewed from a few feet away. Below 100 DPI, images appear pixelated and blurry when viewed up close. Use the calculator to find the sweet spot for your print size."}}]}</script>

<script>
GZI18n.register({
  en: {
    toolTitle: 'Print Size Calculator',
    toolDesc: 'Calculate print size, DPI and resolution for any image. Find the max print size at a given DPI, the DPI needed for a target size, or required pixels. Free, instant, browser-only.',
    modeSize: 'Max print size',
    modeDpi: 'Required DPI',
    modePx: 'Required pixels',
    lblW: 'Width (px)', lblH: 'Height (px)', lblDpi: 'DPI', lblUnit: 'Unit',
    optIn: 'Inches', optCm: 'Centimeters', optMm: 'Millimeters',
    lblResult: 'Result',
    lblPrintw: 'Print Width', lblPrinth: 'Print Height',
    lblMp: 'Megapixels', lblAspect: 'Aspect Ratio', lblQual: 'Quality', lblFilesize: 'Est. File Size',
    pwDesc: 'Physical print width', phDesc: 'Physical print height',
    mpDesc: 'Total resolution', arDesc: 'Width : Height',
    qDesc: 'Print quality rating', fsDesc: 'Uncompressed 8-bit RGB',
    thDpi: 'DPI', thSize: 'Print Size', thType: 'Use Case',
    qExcellent: 'Excellent', qGood: 'Good', qFair: 'Fair', qPoor: 'Poor',
    usePhoto: 'Photo / Magazine', usePoster: 'Poster', useLarge: 'Large Format', useScreen: 'Screen Only',
    step1: 'Enter your image dimensions in pixels (width × height)',
    step2: 'Set the target DPI (300 for photos, 150 for posters)',
    step3: 'Switch modes to solve for print size, DPI or pixels',
    step4: 'Read quality rating and file size estimate instantly',
  },
  zh: {
    toolTitle: '打印尺寸计算器',
    toolDesc: '计算任意图片的打印尺寸、DPI 和分辨率。查找给定 DPI 下的最大打印尺寸、目标尺寸所需 DPI 或所需像素。免费、即时、浏览器本地运行。',
    modeSize: '最大打印尺寸',
    modeDpi: '所需 DPI',
    modePx: '所需像素',
    lblW: '宽度（像素）', lblH: '高度（像素）', lblDpi: 'DPI', lblUnit: '单位',
    optIn: '英寸', optCm: '厘米', optMm: '毫米',
    lblResult: '结果',
    lblPrintw: '打印宽度', lblPrinth: '打印高度',
    lblMp: '百万像素', lblAspect: '宽高比', lblQual: '质量', lblFilesize: '估算文件大小',
    pwDesc: '物理打印宽度', phDesc: '物理打印高度',
    mpDesc: '总分辨率', arDesc: '宽 : 高',
    qDesc: '打印质量评级', fsDesc: '未压缩 8 位 RGB',
    thDpi: 'DPI', thSize: '打印尺寸', thType: '用途',
    qExcellent: '优秀', qGood: '良好', qFair: '一般', qPoor: '较差',
    usePhoto: '照片 / 杂志', usePoster: '海报', useLarge: '大幅面', useScreen: '仅屏幕',
    step1: '输入图片像素尺寸（宽 × 高）',
    step2: '设置目标 DPI（照片 300，海报 150）',
    step3: '切换模式以求解打印尺寸、DPI 或像素',
    step4: '即时查看质量评级和文件大小估算',
  }
});

let mode = 'size';
const { $, t } = GZ;

function gcd(a, b) { return b === 0 ? a : gcd(b, a % b); }

function qualityRating(dpi) {
  if (dpi >= 300) return { l: t('qExcellent'), cls: 'background:#00d672;color:#fff' };
  if (dpi >= 200) return { l: t('qGood'), cls: 'background:#61afef;color:#fff' };
  if (dpi >= 100) return { l: t('qFair'), cls: 'background:#d19a66;color:#fff' };
  return { l: t('qPoor'), cls: 'background:#e94560;color:#fff' };
}

function useCase(dpi) {
  if (dpi >= 300) return t('usePhoto');
  if (dpi >= 200) return t('usePhoto');
  if (dpi >= 150) return t('usePoster');
  if (dpi >= 100) return t('useLarge');
  return t('useScreen');
}

function unitToInch(val, unit) {
  if (unit === 'cm') return val / 2.54;
  if (unit === 'mm') return val / 25.4;
  return val;
}
function inchToUnit(val, unit) {
  if (unit === 'cm') return val * 2.54;
  if (unit === 'mm') return val * 25.4;
  return val;
}
function unitLabel(unit) { return unit === 'cm' ? 'cm' : unit === 'mm' ? 'mm' : 'in'; }

function compute() {
  const w = +$('#w').value || 0, h = +$('#h').value || 0;
  const dpiInput = +$('#dpi').value || 0;
  const unit = $('#unit').value;
  const ul = unitLabel(unit);

  let printW, printH, dpi, pxW, pxH;

  if (mode === 'size') {
    // Given px + dpi → print size
    pxW = w; pxH = h; dpi = dpiInput;
    if (dpi <= 0 || w <= 0 || h <= 0) return clearResults();
    printW = w / dpi; printH = h / dpi;
    $('#resultVal').textContent = `${inchToUnit(printW, unit).toFixed(2)} × ${inchToUnit(printH, unit).toFixed(2)} ${ul}`;
    $('#resultSub').textContent = `${dpi} DPI`;
  } else if (mode === 'dpi') {
    // Given px + target print size → required dpi
    // w/h inputs are pixels; dpi input repurposed? No — in dpi mode, w/h = print size in unit
    pxW = w; pxH = h;
    if (w <= 0 || h <= 0 || dpiInput <= 0) return clearResults();
    // treat dpiInput as the desired print width in unit
    const targetW = unitToInch(dpiInput, unit);
    dpi = pxW / targetW;
    printW = inchToUnit(targetW, unit);
    printH = inchToUnit(pxH / dpi, unit);
    $('#resultVal').textContent = `${dpi.toFixed(0)} DPI`;
    $('#resultSub').textContent = `${printW.toFixed(2)} × ${printH.toFixed(2)} ${ul}`;
  } else {
    // px mode: given print size + dpi → required pixels
    if (w <= 0 || h <= 0 || dpiInput <= 0) return clearResults();
    printW = unitToInch(w, unit); printH = unitToInch(h, unit);
    dpi = dpiInput;
    pxW = Math.round(printW * dpi); pxH = Math.round(printH * dpi);
    $('#resultVal').textContent = `${pxW} × ${pxH} px`;
    $('#resultSub').textContent = `${dpi} DPI`;
    printW = w; printH = h;
  }

  const mp = (pxW * pxH) / 1000000;
  const g = gcd(pxW, pxH);
  const aw = (pxW / g), ah = (pxH / g);
  const fileSizeMB = (pxW * pxH * 3) / (1024 * 1024); // 8-bit RGB
  const q = qualityRating(dpi);

  $('#printW').textContent = `${inchToUnit(pxW / dpi, unit).toFixed(2)} ${ul}`;
  $('#printH').textContent = `${inchToUnit(pxH / dpi, unit).toFixed(2)} ${ul}`;
  $('#megapixels').textContent = `${mp.toFixed(1)} MP`;
  $('#aspect').textContent = `${aw} : ${ah}`;
  $('#quality').textContent = q.l;
  $('#quality').style.cssText = q.cls;
  $('#fileSize').textContent = fileSizeMB < 1 ? `${(fileSizeMB * 1024).toFixed(0)} KB` : `${fileSizeMB.toFixed(1)} MB`;

  // Comparison table
  const dpis = [600, 300, 200, 150, 100, 72];
  $('#tbody').innerHTML = dpis.map(d => {
    const sw = inchToUnit(pxW / d, unit).toFixed(1);
    const sh = inchToUnit(pxH / d, unit).toFixed(1);
    return `<tr><td>${d}</td><td>${sw} × ${sh} ${ul}</td><td>${useCase(d)}</td></tr>`;
  }).join('');
}

function clearResults() {
  $('#resultVal').textContent = '—';
  $('#resultSub').textContent = '';
  $('#printW').textContent = '—';
  $('#printH').textContent = '—';
  $('#megapixels').textContent = '—';
  $('#aspect').textContent = '—';
  $('#quality').textContent = '—';
  $('#fileSize').textContent = '—';
  $('#tbody').innerHTML = '';
}

function setMode(m) {
  mode = m;
  document.querySelectorAll('#modeTabs button').forEach(b => b.classList.toggle('active', b.dataset.mode === m));
  if (m === 'size') {
    $('#lbl-w').textContent = t('lblW'); $('#lbl-h').textContent = t('lblH'); $('#lbl-dpi').textContent = t('lblDpi');
    $('#w').value = 3000; $('#h').value = 2400; $('#dpi').value = 300;
  } else if (m === 'dpi') {
    $('#lbl-w').textContent = t('lblW'); $('#lbl-h').textContent = t('lblH'); $('#lbl-dpi').textContent = 'Print width (' + unitLabel($('#unit').value) + ')';
    $('#w').value = 3000; $('#h').value = 2400; $('#dpi').value = 10;
  } else {
    $('#lbl-w').textContent = 'Print width (' + unitLabel($('#unit').value) + ')'; $('#lbl-h').textContent = 'Print height (' + unitLabel($('#unit').value) + ')'; $('#lbl-dpi').textContent = t('lblDpi');
    $('#w').value = 10; $('#h').value = 8; $('#dpi').value = 300;
  }
  compute();
}

$('#w').addEventListener('input', compute);
$('#h').addEventListener('input', compute);
$('#dpi').addEventListener('input', compute);
$('#unit').addEventListener('change', () => { setMode(mode); });

document.querySelectorAll('#modeTabs button').forEach(b => b.addEventListener('click', () => setMode(b.dataset.mode)));
document.querySelectorAll('#presets button').forEach(b => b.addEventListener('click', () => {
  $('#dpi').value = b.dataset.dpi; compute();
}));

$('#btn-size').textContent = t('modeSize');
$('#btn-dpi').textContent = t('modeDpi');
$('#btn-px').textContent = t('modePx');
$('#lbl-w').textContent = t('lblW');
$('#lbl-h').textContent = t('lblH');
$('#lbl-dpi').textContent = t('lblDpi');
$('#lbl-unit').textContent = t('lblUnit');
$('#opt-in').textContent = t('optIn');
$('#opt-cm').textContent = t('optCm');
$('#opt-mm').textContent = t('optMm');
$('#lbl-result').textContent = t('lblResult');
$('#lbl-printw').textContent = t('lblPrintw');
$('#lbl-printh').textContent = t('lblPrinth');
$('#lbl-mp').textContent = t('lblMp');
$('#lbl-aspect').textContent = t('lblAspect');
$('#lbl-qual').textContent = t('lblQual');
$('#lbl-filesize').textContent = t('lblFilesize');
$('#pwDesc').textContent = t('pwDesc');
$('#phDesc').textContent = t('phDesc');
$('#mpDesc').textContent = t('mpDesc');
$('#arDesc').textContent = t('arDesc');
$('#qDesc').textContent = t('qDesc');
$('#fsDesc').textContent = t('fsDesc');
$('#th-dpi').textContent = t('thDpi');
$('#th-size').textContent = t('thSize');
$('#th-type').textContent = t('thType');

$('#toolbar').innerHTML = `<button class="gz-btn gz-btn-secondary" onclick="setMode('size');compute()">${t('modeSize')}</button>`;

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon: '📐', href: '/calc/dpi-calculator.html', name: 'DPI / PPI Calculator'},
    {icon: '🖼️', href: '/image/image-resizer.html', name: 'Image Resizer'},
    {icon: '📐', href: '/calc/aspect-ratio.html', name: 'Aspect Ratio Calculator'},
    {icon: '🗜️', href: '/image/image-compressor.html', name: 'Image Compressor'},
  ]
});
compute();
</script>
