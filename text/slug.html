<body>
<div class="gz-container">
  <div class="gz-tool-header"><h1 id="title"></h1><p class="desc" id="desc"></p></div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="opts"><label id="lbl-sep">Separator:</label><select id="sep"><option value="-">hyphen (-)</option><option value="_">underscore (_)</option><option value=".">dot (.)</option></select></div>
    <div class="gz-split">
      <div><label>Input</label><textarea id="input" spellcheck="false" rows="6"></textarea></div>
      <div><label>Slug</label><textarea id="output" readonly rows="6"></textarea></div>
    </div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en:{toolTitle:'Slug Generator',toolDesc:'Convert any text to a clean, URL-friendly slug. Remove special characters and choose your separator.',
    separator:'Separator',
    step1:'Enter your text (title, heading, etc.)',step2:'Choose a separator style (hyphen, underscore, dot)',step3:'Copy the generated slug for your URL'},
  zh:{toolTitle:'Slug 生成器',toolDesc:'将任意文本转换为干净的 URL 友好 slug，去除特殊字符并选择分隔符。',
    separator:'分隔符',
    step1:'输入文本（标题、标题等）',step2:'选择分隔符样式（短横线、下划线、点）',step3:'复制生成的 slug 用于 URL'}
});
const {$,copyText,t}=GZ;
function slugify(){
  const sep=$('#sep').value;
  const v=$('#input').value.toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .replace(/[^a-z0-9\s-]/g,'')
    .replace(/[\s-]+/g,sep)
    .replace(new RegExp(`^\\${sep}|\\${sep}$`,'g'),'');
  $('#output').value=v;
}
function loadExample(){$('#input').value='Hello World! This is a Blog Post Title — (2024 Edition)';slugify();}
$('#toolbar').innerHTML=`<button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button><button class="gz-btn" onclick="copyText($('#output').value)">${t('copy')}</button><button class="gz-btn gz-btn-secondary" onclick="$('#input').value='';$('#output').value=''">${t('clear')}</button>`;
$('#input').addEventListener('input',slugify);
$('#sep').addEventListener('change',slugify);
GZ.renderToolPage({category:'text',titleKey:'toolTitle',descKey:'toolDesc',howToSteps:['step1','step2','step3'],related:[
  {icon:'🔠',href:'/text/case-converter.html',name:'Case Converter'},
  {icon:'🔗',href:'/dev/url-encode.html',name:'URL Encode'},
  {icon:'🔢',href:'/text/letter-counter.html',name:'Letter Counter'},
]});
</script>
