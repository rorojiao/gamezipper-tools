const { $, t } = GZ;

function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function getNames() {
  return $('#names').value.split('\n').map(s => s.trim()).filter(Boolean);
}

function generate() {
  const names = getNames();
  if (names.length < 2) {
    $('#result').innerHTML = '<div class="tg-empty">Need at least 2 names</div>';
    $('#stats').textContent = '';
    return;
  }
  const mode = $('#mode').value;
  const value = parseInt($('#groupValue').value) || 2;
  let nTeams;
  if (mode === 'count') {
    nTeams = Math.min(value, names.length);
  } else {
    nTeams = Math.ceil(names.length / value);
  }
  const shuffled = shuffle(names);
  const teams = Array.from({length: nTeams}, () => []);
  shuffled.forEach((name, i) => teams[i % nTeams].push(name));

  const lang = GZI18n.getLang();
  $('#result').innerHTML = teams.map((team, i) => {
    const label = lang === 'zh' ? `Á¨¨ ${i+1} ÁĽĄ` : `Team ${i+1}`;
    return `<div class="tg-team"><h4>${label} <span class="badge">${team.length}</span></h4><ul>${team.map(n => `<li>${n}</li>`).join('')}</ul></div>`;
  }).join('');
  $('#stats').textContent = t('stats')(teams.length, names.length);
}

function copyAll() {
  const teams = $('#result').querySelectorAll('.tg-team');
  if (!teams.length) return;
  const text = Array.from(teams).map(t => {
    return t.querySelector('h4').textContent.trim() + '\n' + Array.from(t.querySelectorAll('li')).map(li => '  - ' + li.textContent).join('\n');
  }).join('\n\n');
  GZ.copyText(text);
}

function loadExample() {
  $('#names').value = ['Alice','Bob','Charlie','Diana','Ethan','Fiona','George','Hannah','Ian','Julia','Kevin','Luna','Mike','Nina','Oscar'].join('\n');
  generate();
}

function clearAll() {
  $('#names').value = '';
  $('#result').innerHTML = '<div class="tg-empty">Enter names and click "Generate Teams"</div>';
  $('#stats').textContent = '';
}

$('#mode').addEventListener('change', () => {
  const mode = $('#mode').value;
  $('#valueLabel').innerHTML = mode === 'count'
    ? `${t('teamsLabel')} <input type="number" id="groupValue" min="2" max="50" value="2">`
    : `${t('sizeLabel')} <input type="number" id="groupValue" min="2" max="50" value="3">`;
  $('#groupValue').addEventListener('input', generate);
});

$('#groupValue').addEventListener('input', generate);
$('#names').addEventListener('input', generate);

$('#toolbar').innerHTML = `

  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="copyAll()">${t('copy')}</button>
