<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "How do I convert Mbps to MB/s?", "acceptedAnswer": {"@type": "Answer", "text": "Divide the Mbps value by 8 to get megabytes per second (MB/s), because 1 byte = 8 bits. For example, 100 Mbps = 100 / 8 = 12.5 MB/s."}}, {"@type": "Question", "name": "What is the difference between a bit and a byte?", "acceptedAnswer": {"@type": "Answer", "text": "A byte contains 8 bits. Network speeds are usually measured in bits per second (Mbps, Gbps), while file sizes and downloads are measured in bytes per second (MB/s, GB/s). Always divide by 8 when moving between them."}}, {"@type": "Question", "name": "Is 1 Mbps the same as 1000 Kbps?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. Data rates use decimal SI prefixes: 1 Kbps = 1000 bps, 1 Mbps = 1000 Kbps = 1,000,000 bps, and 1 Gbps = 1000 Mbps."}}, {"@type": "Question", "name": "Why does my 100 Mbps download not give 100 MB/s?", "acceptedAnswer": {"@type": "Answer", "text": "Internet plans quote speed in megabits per second (Mbps), but browsers show downloads in megabytes per second (MB/s). 100 Mbps equals about 12.5 MB/s after dividing by 8."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="gz-converter-grid" id="converter"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Data Transfer Rate Converter',
    toolDesc: 'Convert between bits/s (bps), Kbps, Mbps, Gbps, Tbps, bytes/s, KB/s, MB/s and GB/s — instantly, free and private.',
    swap: 'Swap',
    clear: 'Clear',
    copy: 'Copy',
    step1: 'Enter a data rate value',
    step2: 'Pick the source unit (From)',
    step3: 'Pick the target unit (To)',
    step4: 'The result and conversion factor update instantly',
  },
  zh: {
    toolTitle: '数据传输速率转换器',
    toolDesc: '在比特/秒 (bps)、Kbps、Mbps、Gbps、Tbps、字节/秒、KB/s、MB/s 和 GB/s 之间转换 — 即时、免费且私密。',
    swap: '交换',
    clear: '清除',
    copy: '复制',
    step1: '输入一个传输速率值',
    step2: '选择源单位（从）',
    step3: '选择目标单位（到）',
    step4: '结果和换算系数即时更新',
  }
});

const { $, copyText, t } = GZ;

// Base unit: bits per second. Decimal SI prefixes (1 KB = 1000 B).
const UNITS = [
  { id: 'bps',  label: 'Bit / second (bps)',  zh: '比特每秒 (bps)',  factor: 1 },
  { id: 'kbps', label: 'Kilobit / s (Kbps)',  zh: '千比特每秒 (Kbps)',factor: 1e3 },
  { id: 'mbps', label: 'Megabit / s (Mbps)',  zh: '兆比特每秒 (Mbps)',factor: 1e6 },
  { id: 'gbps', label: 'Gigabit / s (Gbps)',  zh: '吉比特每秒 (Gbps)',factor: 1e9 },
  { id: 'tbps', label: 'Terabit / s (Tbps)',  zh: '太比特每秒 (Tbps)',factor: 1e12 },
  { id: 'Bs',   label: 'Byte / second (B/s)', zh: '字节每秒 (B/s)',  factor: 8 },
  { id: 'KBs',  label: 'Kilobyte / s (KB/s)', zh: '千字节每秒 (KB/s)',factor: 8e3 },
  { id: 'MBs',  label: 'Megabyte / s (MB/s)', zh: '兆字节每秒 (MB/s)',factor: 8e6 },
  { id: 'GBs',  label: 'Gigabyte / s (GB/s)', zh: '吉字节每秒 (GB/s)',factor: 8e9 },
  { id: 'TBs',  label: 'Terabyte / s (TB/s)', zh: '太字节每秒 (TB/s)',factor: 8e12 },
];

const lang = GZI18n.getLang();
const opts = UNITS.map(u => `<option value="${u.id}">${lang === 'zh' ? u.zh : u.label}</option>`).join('');

$('#converter').innerHTML = `
  <div class="gz-converter-row">
    <input type="number" id="inputVal" placeholder="0" step="any" oninput="convert()">
    <select id="fromUnit" onchange="convert()">${opts}</select>
  </div>
  <div class="gz-converter-row" style="justify-content:center">
    <button class="gz-btn gz-btn-secondary" onclick="swapUnits()">⇅ ${t('swap')}</button>
  </div>
  <div class="gz-converter-row">
    <input type="text" id="outputVal" readonly>
    <select id="toUnit" onchange="convert()">${opts}</select>
  </div>
  <div id="formulaDisplay" style="margin-top:8px;font-size:.85em;opacity:.7"></div>
`;

$('#fromUnit').value = 'mbps';
$('#toUnit').value = 'MBs';

function fmt(n) {
  if (!isFinite(n)) return '';
  return parseFloat(n.toPrecision(12)).toString();
}

function convert() {
  const val = parseFloat($('#inputVal').value);
  if (isNaN(val)) { $('#outputVal').value = ''; $('#formulaDisplay').textContent = ''; return; }
  const from = UNITS.find(u => u.id === $('#fromUnit').value);
  const to = UNITS.find(u => u.id === $('#toUnit').value);
  const inBps = val * from.factor;
  const result = inBps / to.factor;
  $('#outputVal').value = fmt(result);
  const ratio = from.factor / to.factor;
  $('#formulaDisplay').textContent = `1 ${from.id} = ${fmt(ratio)} ${to.id}`;
}

function swapUnits() {
  const f = $('#fromUnit').value;
  $('#fromUnit').value = $('#toUnit').value;
  $('#toUnit').value = f;
  convert();
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="copyText($('#outputVal').value)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#inputVal').value='';$('#outputVal').value='';$('#formulaDisplay').textContent=''">${t('clear')}</button>
`;

convert();

GZ.renderToolPage({
  category: 'convert',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'💾', href:'/convert/data-size.html', name:'Data Size'},
    {icon:'📏', href:'/convert/length-converter.html', name:'Length'},
    {icon:'🎵', href:'/convert/frequency-converter.html', name:'Frequency'},
    {icon:'🔋', href:'/calc/battery-life-calculator.html', name:'Battery Life'},
  ]
});
</script>
