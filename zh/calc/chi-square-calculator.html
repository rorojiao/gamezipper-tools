    obsLabel: '观测值',
    expLabel: '期望值',
    dfLabel: '自由度：',
    calcBtn: '计算',
    chiVal: '卡方值 (χ²)',
    pValue: 'P 值',
    significant: '✓ 统计显著',
    notSignificant: '✗ 不显著',
    mismatch: '观测值和期望值的数量必须相同',
    needData: '请输入观测值和期望值',
    step1: '输入观测频数（逗号或空格分隔）',
    step2: '输入期望频数（数量与观测值相同）',
    step3: '设置自由度和显著性水平',
    step4: '点击计算获取卡方值和 p 值',

});

const { $, t } = GZ;

function parseNums(str) {
  return str.trim().split(/[\s,;\t\n]+/).map(Number).filter(n => !isNaN(n));
}

function logGamma(x) {
  const g = 7;
  const c = [0.99999999999980993, 676.5203681218851, -1259.1392167224028, 771.32342877765313, -176.61502916214059, 12.507343278686905, -0.13857109526572012, 9.9843695780195716e-6, 1.5056327351493116e-7];
  if (x < 0.5) return Math.log(Math.PI / Math.sin(Math.PI * x)) - logGamma(1 - x);
  x -= 1;
  let a = c[0];
  const tt = x + g + 0.5;
  for (let i = 1; i < g + 2; i++) a += c[i] / (x + i);
  return 0.5 * Math.log(2 * Math.PI) + (x + 0.5) * Math.log(tt) - tt + Math.log(a);
}

function lowerGammaSeries(s, x) {
  let sum = 1 / s;
  let term = sum;
  for (let n = 1; n < 300; n++) {
    term *= x / (s + n);
    sum += term;
    if (Math.abs(term) < 1e-15) break;
  }
  return sum * Math.exp(-x) * Math.pow(x, s);
}

function chiSquareCDF(x, df) {
  // P(df/2, x/2) regularized lower incomplete gamma
  const s = df / 2;
  if (x <= 0) return 0;
  if (x > 1000 || df > 500) return x > df ? 1 : 0;
  // Use series for small x, continued fraction for large x
  const gammaLog = logGamma(s);
  if (x < s + 1) {
    const series = lowerGammaSeries(s, x);
    return Math.max(0, Math.min(1, series * Math.exp(s * Math.log(x) - x - gammaLog)));
  } else {
    // Continued fraction (upper incomplete gamma)
    let b = x + 1 - s;
    let c = 1e30;
    let d = 1 / b;
    let h = d;
    for (let i = 1; i <= 300; i++) {
      const an = -i * (i - s);
      b += 2;
      d = an * d + b;
      if (Math.abs(d) < 1e-30) d = 1e-30;
      c = b + an / c;
      if (Math.abs(c) < 1e-30) c = 1e-30;
      d = 1 / d;
      const del = d * c;
      h *= del;
      if (Math.abs(del - 1) < 1e-15) break;
    }
    const upper = Math.exp(s * Math.log(x) - x - gammaLog + Math.log(h));
    return Math.max(0, Math.min(1, 1 - upper));
  }
}

function calc() {
  const obs = parseNums($('#observed').value);
  const exp = parseNums($('#expected').value);
  if (obs.length === 0 || exp.length === 0) {
    $('#result').innerHTML = `<div class="result-banner notsig">${t('needData')}</div>`;
    return;
  }
  if (obs.length !== exp.length) {
    $('#result').innerHTML = `<div class="result-banner notsig">${t('mismatch')}</div>`;
    return;
  }
  let chiSq = 0;
  for (let i = 0; i < obs.length; i++) {
    if (exp[i] !== 0) chiSq += (obs[i] - exp[i]) ** 2 / exp[i];
  }
  const df = parseInt($('#df').value) || (obs.length - 1);
  const p = 1 - chiSquareCDF(chiSq, df);
  const alpha = parseFloat($('#alphaLevel').value);
  const isSig = p <= alpha;
  const fmt = v => Math.abs(v) < 0.0001 ? v.toExponential(3) : v.toFixed(4);
  $('#result').innerHTML = `
    <div class="stat-row">
      <div class="stat-box"><div class="val">${fmt(chiSq)}</div><div class="lbl">${t('chiVal')}</div></div>
      <div class="stat-box"><div class="val">${df}</div><div class="lbl">DF</div></div>
      <div class="stat-box"><div class="val">${p < 0.0001 ? '< 0.0001' : p.toFixed(4)}</div><div class="lbl">${t('pValue')}</div></div>
    </div>
    <div class="result-banner ${isSig ? 'sig' : 'notsig'}">${isSig ? t('significant') : t('notSignificant')} (α = ${alpha})</div>`;
}

$('#lbl-obs').textContent = t('obsLabel');
$('#lbl-exp').textContent = t('expLabel');
$('#lbl-df').textContent = t('dfLabel');
$('#calcBtn').textContent = t('calcBtn');
$('#calcBtn').addEventListener('click', calc);
