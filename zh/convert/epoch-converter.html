<script type="application/ld+json">{"@context":"https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is an epoch timestamp?", "acceptedAnswer": {"@type": "Answer", "text": "An epoch timestamp (also called Unix time or POSIX time) is the number of seconds that have elapsed since January 1, 1970 00:00:00 UTC, excluding leap seconds. It is widely used in computing, programming, databases, and APIs to represent a specific point in time as a single integer."}}, {"@type": "Question", "name": "What's the difference between seconds and milliseconds?", "acceptedAnswer": {"@type": "Answer", "text": "Unix timestamps in seconds are 10 digits long (e.g. 1700000000). JavaScript and some systems use milliseconds (13 digits, e.g. 1700000000000). The tool auto-detects the format: if the value is 10 digits, it's treated as seconds; if 13 digits, as milliseconds."}}, {"@type": "Question", "name": "What timezones are supported?", "acceptedAnswer": {"@type": "Answer", "text": "All IANA timezone identifiers are supported, including UTC, America/New_York, Europe/London, Asia/Shanghai, Asia/Tokyo, Australia/Sydney and hundreds more. The tool uses your browser's built-in Intl API to handle daylight saving time and historical zone changes correctly."}}, {"@type": "Question", "name": "Can I convert a date back to an epoch timestamp?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. Use the date-to-epoch panel: pick a date and time, choose a timezone, and the tool instantly shows the corresponding Unix timestamp in seconds and milliseconds."}}]}</script>

<script>
GZI18n.register({
  en: {
    toolTitle: 'Epoch & Timezone Converter',
    toolDesc: 'Convert Unix timestamps to dates in any timezone and back. Supports all IANA timezones, seconds and milliseconds — fully in your browser.',
    now: 'Now',
    copyTs: 'Copy',
    presets: ['Today','Yesterday','Tomorrow','Last Week','Next Week','Start of Year','End of Year'],
    steps: ['Copy an epoch timestamp or type one above','Pick the timezone to view it in','See the formatted date and time instantly','Or pick a date to convert back to an epoch','Use presets for quick shortcuts'],
    step1: 'Enter an epoch value in the Epoch → Date panel',
    step2: 'Choose the timezone you want to view the result in',
    step3: 'See the date in ISO, UTC, local and your selected timezone',
    step4: 'Or pick a date+time+timezone in the Date → Epoch panel',
    step5: 'Click copy buttons to copy any value to clipboard',
  },
  zh: {
    toolTitle: 'Epoch 与时区转换器',
    toolDesc: '在 Unix 时间戳和日期之间转换，支持所有 IANA 时区，秒和毫秒 — 完全在浏览器中运行。',
    now: '现在',
    copyTs: '复制',
    presets: ['今天','昨天','明天','上周','下周','年初','年末'],
    steps: ['复制或输入一个 epoch 时间戳','选择要查看的时区','即时查看格式化的日期和时间','或选择日期转换回 epoch','使用预设快速跳转到常用时间'],
    step1: '在「Epoch → 日期」面板输入一个时间戳',
    step2: '选择要查看结果的时区',
    step3: '查看 ISO、UTC、本地和你选择的时区的日期',
    step4: '或在「日期 → Epoch」面板选择日期+时间+时区',
    step5: '点击复制按钮复制任意值到剪贴板',
  }
});

const {$, copyText, t} = GZ;

// Curated list of common timezones
const commonTzs = [
  'UTC','Africa/Cairo','Africa/Johannesburg','Africa/Lagos','America/Anchorage','America/Argentina/Buenos_Aires','America/Bogota','America/Chicago','America/Denver','America/Halifax','America/Los_Angeles','America/Mexico_City','America/New_York','America/Phoenix','America/Sao_Paulo','America/Toronto','America/Vancouver','Asia/Bangkok','Asia/Dubai','Asia/Hong_Kong','Asia/Jakarta','Asia/Karachi','Asia/Kolkata','Asia/Manila','Asia/Seoul','Asia/Shanghai','Asia/Singapore','Asia/Taipei','Asia/Tehran','Asia/Tokyo','Atlantic/Azores','Australia/Adelaide','Australia/Brisbane','Australia/Melbourne','Australia/Perth','Australia/Sydney','Europe/Amsterdam','Europe/Athens','Europe/Berlin','Europe/Dublin','Europe/Istanbul','Europe/Kyiv','Europe/Lisbon','Europe/London','Europe/Madrid','Europe/Moscow','Europe/Paris','Europe/Rome','Europe/Stockholm','Europe/Warsaw','Europe/Zurich','Pacific/Auckland','Pacific/Honolulu','Pacific/Tahiti'
];

function populateTz(sel) {
  sel.innerHTML = commonTzs.map(z => `<option value="${z}">${z}</option>`).join('');
  // Try to detect user timezone
  try {
    const userTz = Intl.DateTimeFormat().resolvedOptions().timeZone;
    if (commonTzs.includes(userTz)) sel.value = userTz;
  } catch(e) {}
}

function getOffsetStr(date, tz) {
  try {
    const fmt = new Intl.DateTimeFormat('en-US', { timeZone: tz, timeZoneName: 'shortOffset' });
    const parts = fmt.formatToParts(date);
    const off = parts.find(p => p.type === 'timeZoneName');
    return off ? off.value : '';
  } catch(e) { return ''; }
}

function fmtInTz(date, tz) {
  try {
    return new Intl.DateTimeFormat('en-CA', { timeZone: tz, year:'numeric', month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:false }).format(date);
  } catch(e) { return date.toISOString(); }
}

function convertEpoch() {
  const v = $('#epIn').value.trim();
  if (!v) { $('#epOut').innerHTML = 'Enter an epoch value'; return; }
  let n = parseInt(v, 10);
  if (isNaN(n)) { $('#epOut').innerHTML = '<span style="color:var(--accent)">Not a valid number</span>'; return; }
  const unitSel = $('#epUnit').value;
  // Auto-detect: 10-digit values are seconds, 13-digit are milliseconds
  const isSeconds = unitSel === 's' || (unitSel === 'auto' && Math.abs(n) < 1e12);
  const date = new Date(isSeconds ? n * 1000 : n);
  if (isNaN(date.getTime())) { $('#epOut').innerHTML = '<span style="color:var(--accent)">Invalid timestamp</span>'; return; }
  const tz = $('#epTz').value;
  const off = getOffsetStr(date, tz);
  $('#epOut').innerHTML = `
    <div><b>${tz}</b> <span style="opacity:.7">(${off})</span></div>
    <div>ISO: <b>${date.toISOString()}</b></div>
    <div>UTC: ${fmtInTz(date, 'UTC')}</div>
    <div>Local: ${fmtInTz(date, Intl.DateTimeFormat().resolvedOptions().timeZone)}</div>
    <div>${fmtInTz(date, tz)}</div>
    <div style="margin-top:6px">Seconds: <b>${Math.floor(date.getTime()/1000)}</b>  ·  Milliseconds: <b>${date.getTime()}</b></div>
  `;
}

function convertDate() {
  const d = $('#dDate').value, ti = $('#dTime').value;
  if (!d) { $('#dOut').innerHTML = 'Pick a date and time'; return; }
  const tz = $('#dTz').value;
  // Build ISO-like string in the target timezone by offset
  const [Y,M,D] = d.split('-').map(Number);
  const [h,m,s] = (ti || '00:00:00').split(':').map(Number);
  // Compute the UTC time for the given local-in-tz moment
  // We use a trial approach: assume UTC first, then adjust by tz offset
  const guess = new Date(Date.UTC(Y, M-1, D, h, m, s || 0));
  // Get offset of target TZ at that moment
  const fmt = new Intl.DateTimeFormat('en-US', { timeZone: tz, timeZoneName: 'longOffset' });
  const parts = fmt.formatToParts(guess);
  const offPart = parts.find(p => p.type === 'timeZoneName');
  let offsetMin = 0;
  if (offPart) {
    const m2 = offPart.value.match(/GMT([+-])(\d{1,2})(?::(\d{2}))?/);
    if (m2) {
      const sign = m2[1] === '+' ? 1 : -1;
      offsetMin = sign * (parseInt(m2[2])*60 + parseInt(m2[3]||0));
    }
  }
  const utc = new Date(guess.getTime() - offsetMin * 60000);
  $('#dOut').innerHTML = `
    <div>Input: <b>${Y}-${String(M).padStart(2,'0')}-${String(D).padStart(2,'0')} ${ti||'00:00:00'} ${tz}</b></div>
    <div>Seconds: <b>${Math.floor(utc.getTime()/1000)}</b> <button class="gz-btn" style="padding:2px 8px;font-size:.85em" onclick="GZ.copyText('${Math.floor(utc.getTime()/1000)}')">${t('copyTs')}</button></div>
    <div>Milliseconds: <b>${utc.getTime()}</b> <button class="gz-btn" style="padding:2px 8px;font-size:.85em" onclick="GZ.copyText('${utc.getTime()}')">${t('copyTs')}</button></div>
    <div>ISO (UTC): ${utc.toISOString()}</div>
  `;
}

// Live clock
function updateLive() {
  const now = new Date();
  const sec = Math.floor(now.getTime()/1000);
  $('#liveTs').textContent = sec;
  $('#liveDate').textContent = now.toUTCString() + '  ·  ' + now.toString().split(' GMT')[0];
}
setInterval(updateLive, 1000);
updateLive();

// Presets
function renderPresets() {
  const presets = t('presets');
  $('#presets').innerHTML = presets.map((label, i) => `<button class="gz-btn gz-btn-secondary" data-i="${i}">${label}</button>`).join('');
  $('#presets').querySelectorAll('button').forEach(btn => {
    btn.addEventListener('click', () => {
      const i = parseInt(btn.dataset.i);
      const now = new Date();
      let d = new Date(now);
      if (i === 0) {} // today
      else if (i === 1) d.setDate(d.getDate() - 1);
      else if (i === 2) d.setDate(d.getDate() + 1);
      else if (i === 3) d.setDate(d.getDate() - 7);
      else if (i === 4) d.setDate(d.getDate() + 7);
      else if (i === 5) d = new Date(d.getFullYear(), 0, 1);
      else if (i === 6) d = new Date(d.getFullYear(), 11, 31, 23, 59, 59);
      // Set date inputs
      const pad = n => String(n).padStart(2,'0');
      $('#dDate').value = `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
      $('#dTime').value = `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
      convertDate();
    });
  });
}

populateTz($('#epTz'));
populateTz($('#dTz'));

// Set default date to now
const now = new Date();
const pad = n => String(n).padStart(2,'0');
$('#dDate').value = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}`;
$('#dTime').value = `${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;

$('#epIn').addEventListener('input', convertEpoch);
$('#epUnit').addEventListener('change', convertEpoch);
$('#epTz').addEventListener('change', convertEpoch);
$('#dDate').addEventListener('input', convertDate);
$('#dTime').addEventListener('input', convertDate);
$('#dTz').addEventListener('change', convertDate);

$('#toolbar').innerHTML = `
  <button class="gz-btn" id="nowBtn">${t('now')}</button>
`;
$('#nowBtn').addEventListener('click', () => {
  const n = new Date();
  $('#epIn').value = Math.floor(n.getTime()/1000);
  $('#epUnit').value = 's';
  convertEpoch();
  const pad = n => String(n).padStart(2,'0');
  $('#dDate').value = `${n.getFullYear()}-${pad(n.getMonth()+1)}-${pad(n.getDate())}`;
  $('#dTime').value = `${pad(n.getHours())}:${pad(n.getMinutes())}:${pad(n.getSeconds())}`;
  convertDate();
});

renderPresets();

GZ.renderToolPage({
  category: 'convert',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4','step5'],
  related: [
    {icon:'⏰', href:'/dev/timestamp.html', name:'Timestamp Converter'},
    {icon:'📅', href:'/convert/date-format.html', name:'Date Format'},
    {icon:'🌐', href:'/convert/timezone.html', name:'Timezone Converter'},
    {icon:'🗓️', href:'/calc/date-calculator.html', name:'Date Calculator'},
  ]
});
</script>
