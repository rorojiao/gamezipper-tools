<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"What is ROT47?","acceptedAnswer":{"@type":"Answer","text":"ROT47 is a character cipher that rotates every printable ASCII character (codes 33 to 126) by 47 positions. Because it covers numbers, symbols and punctuation (not just letters), it is handy for lightly obscuring URLs, passwords and data."}},{"@type":"Question","name":"What is the difference between ROT13 and ROT47?","acceptedAnswer":{"@type":"Answer","text":"ROT13 only shifts the 26 letters A-Z by 13 places and leaves digits, punctuation and symbols untouched. ROT47 shifts all 94 printable ASCII characters (33-126) by 47 positions, so it also scrambles numbers, spaces-relative symbols and punctuation."}},{"@type":"Question","name":"How do I decode ROT47?","acceptedAnswer":{"@type":"Answer","text":"ROT47 is its own inverse: applying ROT47 to ROT47-encoded text returns the original. Just paste the encoded text into the tool and the decoded version appears instantly."}},{"@type":"Question","name":"Is ROT47 secure?","acceptedAnswer":{"@type":"Answer","text":"No. ROT47 is a trivial obfuscation, not encryption. Anyone can reverse it instantly. Use it only for light hiding, puzzles or legacy systems — never for protecting sensitive data."}}]}</script>

const { $, copyText, t } = GZ;

function rot47(str){
  let out = '';
  for(const ch of str){
    const c = ch.charCodeAt(0);
    if(c >= 33 && c <= 126){
      out += String.fromCharCode(((c - 33 + 47) % 94) + 33);
    } else {
      out += ch; // non-printable-ASCII (incl. CJK, emoji) left unchanged
    }
  }
  return out;
}

function run(){
  const v = $('#r47-in').value;
  $('#r47-out').textContent = rot47(v);
}

$('#r47-in').addEventListener('input', run);

function loadExample(txt){ $('#r47-in').value = txt; run(); }
