<script>
GZI18n.register({
  en: {
    toolTitle: 'Image Resizer',
    toolDesc: 'Resize PNG, JPG, WebP and more images online for free. Set exact pixels or percentage, keep aspect ratio, batch resize. 100% browser-only — no upload, no signup.',

    resize: '⬇ Resize & Download',
    clear: 'Clear',
    lblW: 'Width (px)',
    lblH: 'Height (px)',
    lblPct: 'Scale (%)',
    lblFormat: 'Output Format',
    lblQuality: 'Quality (JPG/WebP)',
    lblLock: 'Lock aspect ratio',
    lblNoUpscale: 'Don\'t enlarge',
    optOrig: 'Original',
    loaded: 'images loaded',
    original: 'Original',
    resized: 'Resized',
    step1: 'Click the drop zone or drag one or more images onto it',
    step2: 'Set target width/height in pixels, or use a percentage scale',
    step3: 'Choose output format (keep original, or convert to PNG/JPG/WebP)',
    step4: 'Click Resize & Download — each image downloads instantly',
    faq1q: 'Will resizing reduce image quality?',
    faq1a: 'Downscaling always reduces detail. For best results use the JPG quality slider at 90+ or output as PNG (lossless). When enlarging, the image will appear softer — there is no way to add detail that was not in the original.',
    faq2q: 'How is this different from an image compressor?',
    faq2a: 'A resizer changes the pixel dimensions (width × height). A compressor keeps the same dimensions but reduces file size through compression. You can do both here by choosing JPG or WebP output with a lower quality setting.',
    faq3q: 'What size should I resize images to for a website?',
    faq3a: 'For full-width hero images use 1920px wide. For content images use 1200px. For thumbnails use 400–600px. Always output as WebP or JPG at 80–85% quality for the best file size.'
  },
  zh: {

    toolDesc: '在线免费缩放 PNG、JPG、WebP 等图片。设置精确像素或百分比，保持比例，批量缩放。100% 浏览器本地运行 — 无需上传。',
    dropText: '点击或拖放图片到此处（PNG、JPG、WebP、GIF）',
    resize: '⬇ 缩放并下载',
    clear: '清空',
    lblW: '宽度 (px)',
    lblH: '高度 (px)',
    lblPct: '缩放 (%)',
    lblFormat: '输出格式',
    lblQuality: '质量 (JPG/WebP)',
    lblLock: '锁定比例',
    lblNoUpscale: '不放大',
    optOrig: '原格式',
    loaded: '张图片已加载',
    original: '原图',
    resized: '缩放后',
    step1: '点击拖放区，或将一张或多张图片拖放到上面',
    step2: '以像素设置目标宽/高，或使用百分比缩放',
    step3: '选择输出格式（保持原格式，或转为 PNG/JPG/WebP）',
    step4: '点击「缩放并下载」— 每张图片即时下载',
    faq1q: '缩放会降低图片质量吗？',
    faq1a: '缩小总会减少细节。为获得最佳效果，请将 JPG 质量滑块设为 90+ 或输出为 PNG（无损）。放大时图片会变模糊 — 无法添加原图中不存在的细节。',
    faq2q: '这与图片压缩器有什么区别？',
    faq2a: '缩放器改变像素尺寸（宽×高）。压缩器保持尺寸不变，通过压缩减小文件大小。你可以在此同时实现两者：选择 JPG 或 WebP 输出并降低质量。',
    faq3q: '网站图片应该缩放到什么尺寸？',
    faq3a: '全宽横幅图片用 1920px 宽。内容图片用 1200px。缩略图用 400–600px。输出为 WebP 或 JPG 80–85% 质量可获得最佳文件大小。'
  }
});

const { $, t } = GZ;
let images = []; // {name, img, w, h, type}

$('#drop-text').textContent = t('dropText');
$('#resizeBtn').textContent = t('resize');
$('#lbl-w').textContent = t('lblW');
$('#lbl-h').textContent = t('lblH');
$('#lbl-pct').textContent = t('lblPct');
$('#lbl-format').textContent = t('lblFormat');
$('#lbl-quality').textContent = t('lblQuality');
$('#lbl-lock').textContent = t('lblLock');
$('#lbl-noupscale').textContent = t('lblNoUpscale');
$('#opt-orig').textContent = t('optOrig');

// Presets
const presets = [
  { label: 'Instagram Square', w: 1080, h: 1080 },
  { label: 'Instagram Story', w: 1080, h: 1920 },
  { label: 'Twitter Post', w: 1200, h: 675 },
  { label: 'Facebook Cover', w: 1640, h: 856 },
  { label: 'YouTube Thumb', w: 1280, h: 720 },
  { label: 'Favicon 256', w: 256, h: 256 },
  { label: 'HD 1920', w: 1920, h: 1080 },
  { label: '50%', pct: 50 },
];
$('#presets').innerHTML = presets.map((p, i) =>
  `<button class="preset-btn" onclick="applyPreset(${i})">${p.label}</button>`
).join('');

function applyPreset(i) {
  const p = presets[i];
  if (p.pct) {
    $('#pct').value = p.pct;
    applyPercent();
  } else {
    $('#width').value = p.w;
    $('#height').value = p.h;
    if ($('#lockAspect').checked && images[0]) {
      // adjust height to match aspect
      const ar = images[0].w / images[0].h;
      $('#height').value = Math.round(p.w / ar);
    }
  }
}

const dz = $('#drop'), fi = $('#file');
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag'); });
dz.addEventListener('dragleave', () => dz.classList.remove('drag'));
dz.addEventListener('drop', e => {
  e.preventDefault(); dz.classList.remove('drag');
  handleFiles(e.dataTransfer.files);
});
fi.addEventListener('change', e => handleFiles(e.target.files));

function handleFiles(files) {
  images = [];
  const arr = Array.from(files).filter(f => f.type.startsWith('image/'));
  if (!arr.length) return;
  let loaded = 0;
  arr.forEach(f => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        images.push({ name: f.name.replace(/\.[^.]+$/, ''), img, w: img.width, h: img.height, type: f.type });
        loaded++;
        if (loaded === arr.length) finishLoad();
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(f);
  });
}

function finishLoad() {
  $('#controls').style.display = 'block';
  dz.style.display = 'none';
  const first = images[0];
  $('#width').value = first.w;
  $('#height').value = first.h;
  $('#stats').innerHTML = `<span>${images.length} ${t('loaded')}</span> <span>${first.w}×${first.h}px</span> <span>${first.type.split('/')[1].toUpperCase()}</span>`;
  renderPreviews();
}

function renderPreviews() {
  if (!images.length) return;
  $('#preview').innerHTML = images.slice(0, 4).map(im => `
    <div class="preview-card">
      <img src="${im.img.src}" alt="${im.name}">
      <div class="label">${t('original')}: ${im.w}×${im.h}</div>
    </div>
  `).join('');
}

// Width/height linking
$('#width').addEventListener('input', () => {
  if ($('#lockAspect').checked && images[0]) {
    const ar = images[0].w / images[0].h;
    $('#height').value = Math.round(+$('#width').value / ar);
  }
});
$('#height').addEventListener('input', () => {
  if ($('#lockAspect').checked && images[0]) {
    const ar = images[0].w / images[0].h;
    $('#width').value = Math.round(+$('#height').value * ar);
  }
});

function applyPercent() {
  if (!images[0]) return;
  const pct = +$('#pct').value;
  $('#width').value = Math.round(images[0].w * pct / 100);
  $('#height').value = Math.round(images[0].h * pct / 100);
}
$('#pct').addEventListener('input', applyPercent);

// Show/hide quality slider based on format
$('#format').addEventListener('change', () => {
  const f = $('#format').value;
  $('#quality-row').style.display = (f === 'image/jpeg' || f === 'image/webp') ? 'flex' : 'none';
});

function doResize() {
  if (!images.length) return;
  const targetW = +$('#width').value;
  const targetH = +$('#height').value;
  const fmt = $('#format').value;
  const quality = +$('#quality').value / 100;
  const noUpscale = $('#noUpscale').checked;

  if (!targetW || !targetH || targetW < 1 || targetH < 1) return;

  images.forEach(im => {
    let w = targetW, h = targetH;
    // If percentage mode was used, scale proportionally per image
    if ($('#lockAspect').checked) {
      const ar = im.w / im.h;
      // Use width as primary
      w = targetW;
      h = Math.round(w / ar);
    }
    if (noUpscale) {
      w = Math.min(w, im.w);
      h = Math.min(h, im.h);
    }

    const canvas = document.createElement('canvas');
    canvas.width = w;
    canvas.height = h;
    const ctx = canvas.getContext('2d');
    ctx.imageSmoothingEnabled = true;
    ctx.imageSmoothingQuality = 'high';
    ctx.drawImage(im.img, 0, 0, w, h);

    const outType = fmt === 'original' ? im.type : fmt;
    const ext = outType === 'image/png' ? 'png' : outType === 'image/webp' ? 'webp' : 'jpg';

    canvas.toBlob(blob => {
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `${im.name}_${w}x${h}.${ext}`;
      a.click();
      URL.revokeObjectURL(a.href);
    }, outType === 'image/png' ? 'image/png' : outType, outType === 'image/png' ? undefined : quality);
  });
}

function doClear() {
  images = [];
  $('#controls').style.display = 'none';
  $('#preview').innerHTML = '';
  $('#file').value = '';
  dz.style.display = 'block';
}

$('#toolbar').innerHTML = `<button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

GZ.renderToolPage({
  category: 'image',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1', 'step2', 'step3', 'step4'],
  faqs: ['faq1q:faq1a', 'faq2q:faq2a', 'faq3q:faq3a'],
  related: [
    { icon: '📦', href: '/image/compressor.html', name: 'Image Compressor' },
    { icon: '✂️', href: '/image/cropper.html', name: 'Image Cropper' },
    { icon: '🖼️', href: '/image/jpg-to-png.html', name: 'JPG to PNG' },
    { icon: '🏷️', href: '/image/barcode-label-maker.html', name: 'Barcode Label Maker' },
  ]
});
</script>
