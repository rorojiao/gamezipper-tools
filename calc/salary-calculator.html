<style>
.sal-grid{display:grid;grid-template-columns:1.2fr 1fr;gap:20px}
@media(max-width:880px){.sal-grid{grid-template-columns:1fr}}
.sal-card{background:var(--glass2);border:1px solid var(--border);border-radius:14px;padding:18px}
.sal-card h3{margin:0 0 12px;font-size:1rem;display:flex;align-items:center;gap:8px}
.sal-row{display:grid;grid-template-columns:140px 1fr 110px;gap:10px;align-items:center;margin-bottom:8px}
.sal-row label{font-size:.9em;opacity:.9}
.sal-row input{width:100%;padding:8px 10px;background:var(--glass);border:1px solid var(--border);border-radius:8px;color:inherit;font-size:.95em;font-family:inherit;text-align:right}
.sal-row .unit{padding:8px 10px;background:var(--glass);border:1px solid var(--border);border-radius:8px;font-size:.85em;text-align:center;color:var(--text2)}
.summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-top:14px}
.sum-card{background:var(--glass);border:1px solid var(--border);border-radius:10px;padding:12px;text-align:center}
.sum-card .lbl{font-size:.78em;opacity:.7;margin-bottom:4px}
.sum-card .val{font-size:1.3em;font-weight:700;color:var(--accent)}
.sum-card .val.net{color:#00d672}
.tax-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;flex-wrap:wrap}
.tax-row label{font-size:.85em;display:flex;align-items:center;gap:6px;cursor:pointer}
.tax-row input[type=number]{width:90px;padding:7px 10px;background:var(--glass);border:1px solid var(--border);border-radius:8px;color:inherit;font-size:.9em;font-family:inherit;text-align:right}
.preset-row{display:flex;gap:6px;flex-wrap:wrap;margin:8px 0 14px}
.preset-btn{padding:6px 12px;background:var(--glass);border:1px solid var(--border);border-radius:16px;cursor:pointer;font-size:.82em;color:inherit}
.preset-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
.breakdown{background:var(--glass);border:1px solid var(--border);border-radius:10px;padding:14px;margin-top:14px;font-size:.9em;line-height:1.6}
.breakdown .row{display:flex;justify-content:space-between;padding:3px 0}
.breakdown .row.total{border-top:1px solid var(--border);margin-top:6px;padding-top:8px;font-weight:700;color:var(--accent)}
</style>
<script type="application/ld+json">{"@context":"https://schema.org","@type":"WebApplication","name":"Salary Calculator","description":"Free online salary calculator. Convert between annual, monthly, weekly, daily and hourly pay. Estimate take-home pay with tax rate. Perfect for job offers, raises and negotiations.","url":"https://tools.gamezipper.com/calc/salary-calculator.html","applicationCategory":"Utility","operatingSystem":"Web Browser","offers":{"@type":"Offer","price":"0"}}</script>
<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "How is annual salary calculated from hourly?", "acceptedAnswer": {"@type": "Answer", "text": "Multiply your hourly rate by the number of hours you work per year. The default is 40 hours/week x 52 weeks = 2,080 hours/year. So $30/hour x 2,080 = $62,400 annual."}}, {"@type": "Question", "name": "What is the difference between gross and net salary?", "acceptedAnswer": {"@type": "Answer", "text": "Gross salary is your total pay before any deductions. Net salary (or take-home pay) is what reaches your bank account after income tax, Social Security, Medicare, health insurance, retirement contributions and other withholdings."}}, {"@type": "Question", "name": "What is a typical work week used for conversions?", "acceptedAnswer": {"@type": "Answer", "text": "The standard full-time assumption is 40 hours per week, 52 weeks per year, which equals 2,080 working hours. You can adjust this in the calculator for part-time, overtime, or unpaid time off."}}, {"@type": "Question", "name": "How do I estimate my tax rate?", "acceptedAnswer": {"@type": "Answer", "text": "Use the effective tax rate from your last pay stub (total tax divided by gross). For US 2025, a rough estimate is 22% federal + 5% state + 7.65% FICA for a middle-income single filer. For exact numbers, consult a tax professional."}}]}</script>
<link rel="alternate" hreflang="en" href="https://tools.gamezipper.com/calc/salary-calculator.html">
<link rel="alternate" hreflang="zh" href="https://tools.gamezipper.com/zh/calc/salary-calculator.html">
<link rel="alternate" hreflang="x-default" href="https://tools.gamezipper.com/calc/salary-calculator.html">

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="sal-grid">
      <div class="sal-card">
        <h3>💰 <span id="lblConvert"></span></h3>
        <div class="sal-row">
          <label id="lblAnnual">Annual</label>
          <input type="number" id="annual" min="0" step="1000">
          <span class="unit" id="uAnnual">/ year</span>
        </div>
        <div class="sal-row">
          <label id="lblMonthly">Monthly</label>
          <input type="number" id="monthly" min="0" step="100">
          <span class="unit" id="uMonthly">/ month</span>
        </div>
        <div class="sal-row">
          <label id="lblBiweekly">Biweekly</label>
          <input type="number" id="biweekly" min="0" step="50">
          <span class="unit" id="uBiweekly">/ 2 weeks</span>
        </div>
        <div class="sal-row">
          <label id="lblWeekly">Weekly</label>
          <input type="number" id="weekly" min="0" step="50">
          <span class="unit" id="uWeekly">/ week</span>
        </div>
        <div class="sal-row">
          <label id="lblDaily">Daily</label>
          <input type="number" id="daily" min="0" step="10">
          <span class="unit" id="uDaily">/ day</span>
        </div>
        <div class="sal-row">
          <label id="lblHourly">Hourly</label>
          <input type="number" id="hourly" min="0" step="0.5">
          <span class="unit" id="uHourly">/ hour</span>
        </div>
        <div class="preset-row" id="presets"></div>
        <h3 style="margin-top:18px">⚙️ <span id="lblAssumptions"></span></h3>
        <div class="tax-row">
          <label><span id="lblHours"></span> <input type="number" id="hoursPerWeek" value="40" min="1" max="80"> </label>
          <label><span id="lblWeeks"></span> <input type="number" id="weeksPerYear" value="52" min="1" max="52"> </label>
          <label><span id="lblDays"></span> <input type="number" id="daysPerWeek" value="5" min="1" max="7"> </label>
        </div>
      </div>
      <div class="sal-card">
        <h3>📊 <span id="lblTakeHome"></span></h3>
        <div class="tax-row">
          <label><span id="lblTaxRate"></span> <input type="number" id="taxRate" value="25" min="0" max="60" step="0.5">%</label>
        </div>
        <div class="summary">
          <div class="sum-card"><div class="lbl" id="sumAnnualLbl">Annual Gross</div><div class="val" id="sumAnnual">$0</div></div>
          <div class="sum-card"><div class="lbl" id="sumTaxLbl">Annual Tax</div><div class="val" id="sumTax">$0</div></div>
          <div class="sum-card"><div class="lbl" id="sumNetLbl">Annual Net</div><div class="val net" id="sumNet">$0</div></div>
          <div class="sum-card"><div class="lbl" id="sumMonthlyLbl">Monthly Net</div><div class="val net" id="sumMonthly">$0</div></div>
        </div>
        <div class="breakdown" id="breakdown"></div>
      </div>
    </div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Salary Calculator',
    toolDesc: 'Convert between annual, monthly, biweekly, weekly, daily and hourly pay. Adjust tax rate to see take-home pay. Perfect for evaluating job offers and raises.',
    convert: 'Pay Conversion', assumptions: 'Work Assumptions', takeHome: 'Take-Home Estimate',
    hours: 'Hours / week', weeks: 'Weeks / year', days: 'Days / week',
    taxRate: 'Tax rate',
    sumAnnualLbl: 'Annual Gross', sumTaxLbl: 'Annual Tax', sumNetLbl: 'Annual Net', sumMonthlyLbl: 'Monthly Net',
    presets: ['$30k', '$50k', '$75k', '$100k', '$150k', '$200k', '$300k'],
    copy: '📋 Copy Summary', reset: '🔄 Reset', example: '🧪 Load Example',
    step1: 'Type a number in any pay field — all others auto-convert',
    step2: 'Adjust hours/week, weeks/year and days/week to match your schedule',
    step3: 'Set the tax rate to estimate take-home pay',
    step4: 'Try the preset buttons for typical salaries',
  },
  zh: {
    toolTitle: '薪资计算器',
    toolDesc: '在年/月/双周/周/日/时薪之间互转。调整税率查看税后收入。评估工作机会和涨薪时非常实用。',
    convert: '薪资换算', assumptions: '工作设置', takeHome: '税后估算',
    hours: '小时 / 周', weeks: '周数 / 年', days: '天数 / 周',
    taxRate: '税率',
    sumAnnualLbl: '年总税前', sumTaxLbl: '年税额', sumNetLbl: '年税后', sumMonthlyLbl: '月税后',
    presets: ['3万', '5万', '7.5万', '10万', '15万', '20万', '30万'],
    copy: '📋 复制摘要', reset: '🔄 重置', example: '🧪 加载示例',
    step1: '在任意薪资栏输入数字，其他栏目自动换算',
    step2: '根据您的实际情况调整小时/周、周数/年和天数/周',
    step3: '设置税率估算税后收入',
    step4: '点击预设按钮查看典型薪资',
  }
});

const { $, copyText, t } = GZ;
$('#lblConvert').textContent = t('convert');
$('#lblAssumptions').textContent = t('assumptions');
$('#lblTakeHome').textContent = t('takeHome');
$('#lblTaxRate').textContent = t('taxRate');
$('#lblHours').textContent = t('hours');
$('#lblWeeks').textContent = t('weeks');
$('#lblDays').textContent = t('days');
['sumAnnualLbl','sumTaxLbl','sumNetLbl','sumMonthlyLbl'].forEach(id => $('#'+id).textContent = t(id));

const PRESETS = [30000, 50000, 75000, 100000, 150000, 200000, 300000];
function fmt(n, dec=0) { return '$' + (n||0).toLocaleString(undefined, { minimumFractionDigits: dec, maximumFractionDigits: dec }); }

function getHours() { return (+$('#hoursPerWeek').value || 40); }
function getWeeks() { return (+$('#weeksPerYear').value || 52); }
function getDays()  { return (+$('#daysPerWeek').value || 5); }

function updatePresets() {
  $('#presets').innerHTML = t('presets').map((p,i) => `<button class="preset-btn" data-v="${PRESETS[i]}">${p}</button>`).join('');
  document.querySelectorAll('.preset-btn').forEach(b => b.addEventListener('click', () => { $('#annual').value = +b.dataset.v; update('annual'); }));
}

function update(source) {
  const hpw = getHours(), wpy = getWeeks(), dpw = getDays();
  const hoursYear = hpw * wpy;
  const daysYear = dpw * wpy;
  const weeksYear = wpy;
  const monthsYear = 12;

  // Read the changed value
  const v = +$('#'+source).value || 0;
  let annual = 0;
  if (source === 'annual') annual = v;
  else if (source === 'monthly') annual = v * monthsYear;
  else if (source === 'biweekly') annual = v * 26;
  else if (source === 'weekly') annual = v * weeksYear;
  else if (source === 'daily') annual = v * daysYear;
  else if (source === 'hourly') annual = v * hoursYear;

  // Write back to other fields
  if (source !== 'annual')    $('#annual').value    = Math.round(annual);
  if (source !== 'monthly')   $('#monthly').value   = Math.round(annual / monthsYear);
  if (source !== 'biweekly')  $('#biweekly').value  = Math.round(annual / 26);
  if (source !== 'weekly')    $('#weekly').value    = Math.round(annual / weeksYear);
  if (source !== 'daily')     $('#daily').value     = Math.round(annual / daysYear);
  if (source !== 'hourly')    $('#hourly').value    = (annual / hoursYear).toFixed(2);

  // Take-home
  const rate = (+$('#taxRate').value || 0) / 100;
  const tax = annual * rate;
  const net = annual - tax;
  $('#sumAnnual').textContent = fmt(annual);
  $('#sumTax').textContent = fmt(tax);
  $('#sumNet').textContent = fmt(net);
  $('#sumMonthly').textContent = fmt(net / 12);

  // Breakdown
  $('#breakdown').innerHTML = `
    <div class="row"><span>Annual Gross</span><span>${fmt(annual)}</span></div>
    <div class="row"><span>Federal Tax (est. ${(rate*100).toFixed(1)}%)</span><span style="color:var(--accent)">−${fmt(tax)}</span></div>
    <div class="row total"><span>Annual Take-Home</span><span>${fmt(net)}</span></div>
    <div class="row"><span>Monthly Take-Home</span><span>${fmt(net/12)}</span></div>
    <div class="row"><span>Biweekly Take-Home</span><span>${fmt(net/26)}</span></div>
    <div class="row"><span>Weekly Take-Home</span><span>${fmt(net/wpy)}</span></div>
    <div class="row"><span>Daily Take-Home</span><span>${fmt(net/daysYear)}</span></div>
    <div class="row"><span>Hourly Take-Home</span><span>${fmt(net/hoursYear, 2)}</span></div>
  `;
}

['annual','monthly','biweekly','weekly','daily','hourly'].forEach(id => $('#'+id).addEventListener('input', () => update(id)));
['hoursPerWeek','weeksPerYear','daysPerWeek','taxRate'].forEach(id => $('#'+id).addEventListener('input', () => update('annual')));

$('#toolbar').innerHTML = `
  <button class="gz-btn gz-btn-secondary" id="btnCopy">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" id="btnExample">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" id="btnReset">${t('reset')}</button>`;

$('#btnCopy').onclick = () => copyText($('#breakdown').innerText);
$('#btnExample').onclick = () => { $('#annual').value = 75000; update('annual'); };
$('#btnReset').onclick = () => {
  ['annual','monthly','biweekly','weekly','daily','hourly'].forEach(id => $('#'+id).value = '');
  $('#hoursPerWeek').value = 40; $('#weeksPerYear').value = 52; $('#daysPerWeek').value = 5; $('#taxRate').value = 25;
  update('annual');
};

updatePresets();
$('#annual').value = 75000;
update('annual');

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'💰', href:'/calc/tip-calculator.html', name:'Tip Calculator'},
    {icon:'🏷️', href:'/calc/discount-calculator.html', name:'Discount Calculator'},
    {icon:'📈', href:'/calc/compound-interest.html', name:'Compound Interest'},
    {icon:'💼', href:'/calc/profit-margin.html', name:'Profit Margin'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
