<script>
GZI18n.register({
  en: {
    toolTitle: 'YAML to JSON Converter',
    toolDesc: 'Convert YAML to JSON instantly with validation and syntax highlighting.',

    lblOut: 'Output JSON',

    step2: 'The tool automatically converts YAML to JSON',
    step3: 'Use the Copy button to copy the JSON result',

  zh: {
    toolTitle: 'YAML 转 JSON 转换器',
    toolDesc: '即时将 YAML 转换为 JSON，支持验证和语法高亮。',
    lblIn: '输入 YAML',
    lblOut: '输出 JSON',
    step1: '在输入区粘贴或输入 YAML',
    step2: '工具自动将 YAML 转换为 JSON',
    step3: '点击「复制」将 JSON 结果复制到剪贴板',
    step4: '点击「示例」加载示例 YAML 数据',
  }
});

const { $, copyText, t } = GZ;

function syntaxHighlight(json) {
  return json.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/("(\\u[\da-fA-F]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(\.\d+)?([eE][+-]?\d+)?)/g, m => {
      let c = 'json-number';
      if (/^"/.test(m)) c = /:$/.test(m) ? 'json-key' : 'json-string';
      else if (/true|false/.test(m)) c = 'json-bool';
      else if (/null/.test(m)) c = 'json-null';
      return `<span class="${c}">${m}</span>`;
    });
}

function convert() {
  const inp = $('#input').value.trim();
  if (!inp) { $('#output').innerHTML = ''; $('#status').innerHTML = ''; return; }
  try {
    const obj = jsyaml.load(inp);
    const json = JSON.stringify(obj, null, 2);
    $('#output').innerHTML = syntaxHighlight(json);
    $('#status').innerHTML = `<span style="color:var(--gz-success)">✓ ${t('jsonValid') || 'Valid conversion'}</span>`;
  } catch(e) {
    $('#status').innerHTML = `<span style="color:var(--gz-accent)">✗ ${e.message}</span>`;
    $('#output').innerHTML = `<span style="color:var(--gz-accent)">${e.message}</span>`;
  }
}

function loadExample() {
  $('#input').value = `# Server configuration
server:
  host: localhost
  port: 8080
  debug: true

database:
  engine: postgresql
  host: db.example.com
  port: 5432
  name: myapp_production
  pool_size: 10

features:
  - authentication
  - caching
  - logging

metadata:
  version: "2.1.0"
  description: |
    This is a sample
    YAML configuration file
  tags:
    web: true
    api: true
    mobile: false`;
  convert();
}

function doClear() { $('#input').value = ''; $('#output').innerHTML = ''; $('#status').innerHTML = ''; }

$('#input').addEventListener('input', convert);

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

$('#lbl-in').textContent = t('lblIn');
$('#lbl-out').textContent = t('lblOut');
