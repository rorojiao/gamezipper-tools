<script>
GZI18n.register({
  en: {
    toolTitle: 'Cookie & Storage Inspector',
    toolDesc: 'View all cookies, localStorage and sessionStorage for the current site in one place. Perfect for debugging web apps — 100% in your browser.',
    refresh: 'Refresh',
    filterPlaceholder: 'Filter by key or value...',
    note: 'Note: Browsers restrict access to the current site only (Same-Origin Policy). To inspect another domain, open this page there.',
    cookiesCount: 'Cookies',
    localCount: 'localStorage items',
    sessionCount: 'sessionStorage items',
    empty: 'No data found for this tab.',
    noMatch: 'No items match your filter.',
    cookieName: 'Name',
    cookieValue: 'Value',
    cookieDomain: 'Domain',
    cookiePath: 'Path',
    cookieExpires: 'Expires/Max-Age',
    cookieSecure: 'Secure',
    cookieHttpOnly: 'HttpOnly',

    yes: 'Yes',
    no: 'No',
    notVisible: 'not visible to JS',
    copy: 'Copy',
    step1: 'Pick a tab: Cookies, localStorage or sessionStorage',
    step2: 'Use the filter box to search keys or values',
    step3: 'Click Copy next to any value to copy it',
    step4: 'Click Refresh after navigating or logging in to update',
  },
  zh: {
    toolTitle: 'Cookie 与存储检查器',
    toolDesc: '一站式查看当前网站的所有 Cookie、localStorage 和 sessionStorage。非常适合调试 Web 应用 — 100% 浏览器本地运行。',
    refresh: '刷新',
    filterPlaceholder: '按键名或值筛选...',
    note: '注意：浏览器仅允许访问当前网站（同源策略）。要检查其他域名，请在该域名下打开本页面。',
    cookiesCount: 'Cookie',
    localCount: 'localStorage 项',
    sessionCount: 'sessionStorage 项',
    empty: '此标签页暂无数据。',
    noMatch: '没有匹配筛选条件的项。',
    cookieName: '名称',
    cookieValue: '值',
    cookieDomain: '域名',
    cookiePath: '路径',
    cookieExpires: '过期/有效期',
    cookieSecure: '安全',
    cookieHttpOnly: 'HttpOnly',
    cookieSameSite: 'SameSite',
    yes: '是',
    no: '否',
    notVisible: 'JS 不可见',
    copy: '复制',
    step1: '选择标签页：Cookie、localStorage 或 sessionStorage',
    step2: '使用筛选框搜索键名或值',
    step3: '点击任意值旁边的复制按钮',
    step4: '导航或登录后点击刷新以更新数据',
  }
});

const { $, copyText, t } = GZ;
let currentTab = 'cookies';
let filterQ = '';

function parseCookies() {
  const cookies = [];
  const raw = document.cookie;
  if (!raw) return cookies;
  raw.split(';').forEach(pair => {
    const idx = pair.indexOf('=');
    const name = (idx >= 0 ? pair.slice(0, idx) : pair).trim();
    const value = idx >= 0 ? pair.slice(idx + 1).trim() : '';
    if (name) cookies.push({ name, value });
  });
  return cookies;
}

function renderStats() {
  const cookies = parseCookies();
  const local = Object.keys(localStorage);
  const session = Object.keys(sessionStorage);
  $('#stats').innerHTML = `
    <div class="stat-card"><div class="num">${cookies.length}</div><div class="lbl">${t('cookiesCount')}</div></div>
    <div class="stat-card"><div class="num">${local.length}</div><div class="lbl">${t('localCount')}</div></div>
    <div class="stat-card"><div class="num">${session.length}</div><div class="lbl">${t('sessionCount')}</div></div>`;
}

function setTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-row button').forEach(b => {
    b.classList.toggle('active', b.dataset.tab === tab);
  });
  renderList();
}

function renderList() {
  let items = [];
  if (currentTab === 'cookies') {
    items = parseCookies().map(c => ({ key: c.name, val: c.value }));
  } else if (currentTab === 'local') {
    items = Object.keys(localStorage).map(k => ({ key: k, val: localStorage.getItem(k) }));
  } else {
    items = Object.keys(sessionStorage).map(k => ({ key: k, val: sessionStorage.getItem(k) }));
  }
  const q = filterQ.toLowerCase();
  if (q) items = items.filter(it => it.key.toLowerCase().includes(q) || (it.val || '').toLowerCase().includes(q));
  if (items.length === 0) {
    $('#data-list').innerHTML = `<div class="empty-state">${q ? t('noMatch') : t('empty')}</div>`;
    return;
  }
  $('#data-list').innerHTML = items.map((it, i) =>
    `<div class="data-row">
      <div class="key">${escapeHtml(it.key)}</div>
      <div class="val">${escapeHtml(it.val || '(empty)')}</div>
      <button class="copy-mini" onclick="copyItem(${i})">${t('copy')}</button>
    </div>`
  ).join('');
  window._items = items;
}

function escapeHtml(s) {
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function copyItem(i) {
  const it = window._items[i];
  copyText(it.val);
}

$('#filter').addEventListener('input', e => { filterQ = e.target.value; renderList(); });
$('#filter').placeholder = t('filterPlaceholder');
$('#note').textContent = t('note');

$('#toolbar').innerHTML = `<button class="gz-btn gz-btn-secondary" onclick="refreshAll()">${t('refresh')}</button>`;
function refreshAll() { renderStats(); renderList(); }

renderStats();
renderList();

GZ.renderToolPage({
  category: 'dev',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🌐', href:'/dev/browser-info.html', name:'Browser Info'},
    {icon:'🎫', href:'/dev/jwt-debugger.html', name:'JWT Debugger'},
    {icon:'📡', href:'/dev/http-headers.html', name:'HTTP Headers'},
    {icon:'🖥️', href:'/dev/screen-resolution.html', name:'Screen Resolution'},
  ]
});
</script>
