    info: 'X 将 Emoji 和中日韩字符计为 2，并把每个链接缩短为 23 个字符。本计数器遵循相同规则以获得准确结果。',
    step1: '在文本框中输入或粘贴推文',
    step2: '实时查看圆环和统计更新',
    step3: '若计数变红超过 280 请精简文字',

const { $, t } = GZ;
const LIMIT = 280;
const URL_RE = /(https?:\/\/[^\s<>"']+)/gi;
const HASHTAG_RE = /(^|\s)(#[\p{L}\p{N}_]+)/gu;
// Emoji detection via Unicode property escape
const EMOJI_RE = /\p{Extended_Pictographic}/u;

function countWeighted(text) {
  // Replace URLs first with 23-char placeholders for weighting
  let urlCount = 0;
  const deurl = text.replace(URL_RE, m => { urlCount++; return '\u0000'; });
  // Count weighted: iterate code points
  let weighted = 0, emoji = 0;
  for (const ch of deurl) {
    if (ch === '\u0000') { weighted += 23; continue; }
    const cp = ch.codePointAt(0);
    const isEmoji = EMOJI_RE.test(ch);
    if (isEmoji) { weighted += 2; emoji++; }
    else if (isWide(cp)) { weighted += 2; }
    else { weighted += 1; }
  }
  // hashtags
  let hashtags = 0;
  const hm = deurl.matchAll(HASHTAG_RE);
  for (const m of hm) hashtags++;
  // words (split on whitespace, ignoring url placeholder)
  const words = deurl.replace(/\u0000/g,' ').trim().split(/\s+/).filter(Boolean).length + urlCount;
  const lines = text === '' ? 1 : text.split(/\n/).length;
  return { weighted, emoji, urlCount, hashtags, words, lines };
}

// Approximate X weighting: CJK ranges count as 2, others as 1.
function isWide(cp) {
  return (
    (cp >= 0x1100 && cp <= 0x115F) ||  // Hangul Jamo
    (cp >= 0x2E80 && cp <= 0x303E) ||  // CJK rad, Kangxi
    (cp >= 0x3041 && cp <= 0x33FF) ||  // Hiragana/Katakana/CJK sym
    (cp >= 0x3400 && cp <= 0x4DBF) ||  // CJK ext A
    (cp >= 0x4E00 && cp <= 0x9FFF) ||  // CJK unified
    (cp >= 0xA000 && cp <= 0xA4CF) ||  // Yi
    (cp >= 0xAC00 && cp <= 0xD7A3) ||  // Hangul syllables
    (cp >= 0xF900 && cp <= 0xFAFF) ||  // CJK compat
    (cp >= 0xFE30 && cp <= 0xFE4F) ||  // CJK compat forms
    (cp >= 0xFF00 && cp <= 0xFFEF) ||  // Fullwidth forms
    (cp >= 0x20000 && cp <= 0x2FFFD) ||// CJK ext B-F
    (cp >= 0x30000 && cp <= 0x3FFFD)   // CJK ext G+
  );
}

function update() {
  const text = $('#input').value;
  const r = countWeighted(text);
  const left = LIMIT - r.weighted;
  const over = left < 0;

  $('#statChars').textContent = r.weighted;
  $('#statWords').textContent = r.words;
  $('#statLines').textContent = r.lines;
  $('#statEmoji').textContent = r.emoji;
  $('#statUrls').textContent = r.urlCount;
  $('#statHashtags').textContent = r.hashtags;

  const ring = $('#ringFill');
  const circ = 389.56;
  const pct = Math.min(r.weighted / LIMIT, 1);
  ring.style.strokeDashoffset = circ * (1 - pct);

  const big = $('#ringBig');
  const small = $('#ringSmall');
  big.classList.toggle('over-limit', over);
  if (over) {
    big.textContent = Math.abs(left);
    small.textContent = t('overMsg').split('{n}')[0].replace('⚠️ ','').trim() || 'Over';
    small.textContent = 'OVER';
    ring.style.stroke = 'var(--gz-danger,#e94560)';
    $('#verdict').innerHTML = t('overMsg').replace('{n}', '<b>' + Math.abs(left) + '</b>');
    $('#verdict').style.color = 'var(--gz-danger,#e94560)';
  } else {
    big.textContent = left;
    small.textContent = t('ringLeft');
    ring.style.stroke = left === 0 ? '#f5a623' : 'var(--gz-accent,#e94560)';
    if (left === 0) { $('#verdict').textContent = t('exactlyMsg'); $('#verdict').style.color = '#f5a623'; }
    else { $('#verdict').textContent = t('okMsg'); $('#verdict').style.color = 'var(--gz-success,#2ecc71)'; }
  }
}

function shareX() {
  const text = $('#input').value.trim();
  const url = 'https://x.com/intent/post' + (text ? ('?text=' + encodeURIComponent(text)) : '');
  window.open(url, '_blank', 'noopener');
}

// i18n labels
function relabel() {
  $('#lbl-in').textContent = t('lblIn');
  $('#input').placeholder = t('placeholder');
  $('#lblChars').textContent = t('lblChars');
  $('#lblWords').textContent = t('lblWords');
  $('#lblLines').textContent = t('lblLines');
  $('#lblEmoji').textContent = t('lblEmoji');
  $('#lblUrls').textContent = t('lblUrls');
  $('#lblHashtags').textContent = t('lblHashtags');
  $('#btnShare').textContent = t('btnShare');
  $('#btnCopy').textContent = t('btnCopy');
  $('#btnClear').textContent = t('btnClear');
  $('#info').textContent = t('info');
}
relabel();
update();

</script>
