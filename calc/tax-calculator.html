<script>
GZI18n.register({
  en: {
    toolTitle: 'US Tax Calculator 2026',
    toolDesc: 'Calculate US federal income tax, FICA, and net take-home pay. Supports all filing statuses with optional state tax.',
    lblIncome: 'Annual Gross Income ($)',
    lblFiling: 'Filing Status',
    lblState: 'State Income Tax',
    lblRetire: '401(k) / Pre-tax Contributions ($)',
    calc: 'Calculate',
    reset: 'Reset',
    takeHome: 'Net Take-Home Pay',
    federal: 'Federal Tax',
    fica: 'FICA (SS + Medicare)',
    state: 'State Tax',
    effective: 'Effective Rate',
    marginal: 'Marginal Rate',
    monthly: 'Monthly',

    breakdown: 'Tax Bracket Breakdown',

    rate: 'Rate',
    tax: 'Tax',
    note: 'Note: This calculator uses 2026 tax brackets and standard deductions. It is an estimate only and does not include credits, deductions other than standard, or capital gains. Consult a tax professional for filing.',
    step1: 'Enter your annual gross income',
    step2: 'Select your filing status and optional state tax rate',
    step3: 'Add any pre-tax 401(k) or HSA contributions',
    step4: 'See your net take-home pay and effective tax rate',
  },
  zh: {
    toolTitle: '美国联邦税计算器 2026',
    toolDesc: '计算美国联邦所得税、FICA 和税后净收入。支持所有申报身份及可选州税。',
    lblIncome: '年度总收入 (美元)',
    lblFiling: '申报身份',
    lblState: '州所得税',
    lblRetire: '401(k) / 税前扣除 (美元)',
    calc: '计算',
    reset: '重置',
    takeHome: '税后净收入',
    federal: '联邦税',
    fica: 'FICA (社保+医保)',
    state: '州税',
    effective: '有效税率',
    marginal: '边际税率',
    monthly: '每月',
    biweekly: '每两周',
    weekly: '每周',
    daily: '每日',
    breakdown: '税率分档',
    bracket: '税档',
    rate: '税率',
    tax: '税额',
    note: '注：本计算器使用 2026 年税档和标准扣除额，仅为估算，不含税收抵免、特殊扣除或资本利得。报税请咨询税务专业人士。',
    step1: '输入您的年度总收入',
    step2: '选择申报身份和州税率（可选）',
    step3: '添加 401(k) 或 HSA 税前扣除',
    step4: '查看税后净收入和有效税率',
  }
});

const { $, t } = GZ;
const fmt = n => '$' + n.toLocaleString('en-US', {maximumFractionDigits: 0});

// 2026 US Federal tax brackets (estimated based on 2025 + 2.5% inflation adjustment)
// Single
const BRACKETS = {
  single: [
    [0, 12100, 0.10],
    [12100, 49250, 0.12],
    [49250, 105050, 0.22],
    [105050, 200600, 0.24],
    [200600, 254700, 0.32],
    [254700, 637000, 0.35],
    [637000, Infinity, 0.37]
  ],
  mfj: [
    [0, 24200, 0.10],
    [24200, 98500, 0.12],
    [98500, 210100, 0.22],
    [210100, 401200, 0.24],
    [401200, 509400, 0.32],
    [509400, 764400, 0.35],
    [764400, Infinity, 0.37]
  ],
  mfs: [
    [0, 12100, 0.10],
    [12100, 49250, 0.12],
    [49250, 105050, 0.22],
    [105050, 200600, 0.24],
    [200600, 382200, 0.32],
    [382200, 637000, 0.35],
    [637000, Infinity, 0.37]
  ],
  hoh: [
    [0, 17300, 0.10],
    [17300, 66300, 0.12],
    [66300, 105050, 0.22],
    [105050, 200600, 0.24],
    [200600, 254700, 0.32],
    [254700, 637000, 0.35],
    [637000, Infinity, 0.37]
  ]
};

// 2026 Standard Deductions (estimated)
const STD_DEDUCTION = {
  single: 15750,
  mfj: 31500,
  mfs: 15750,
  hoh: 23625
};

const FILING_LABELS = {
  single: 'Single',
  mfj: 'Married Filing Jointly',
  mfs: 'Married Filing Separately',
  hoh: 'Head of Household'
};

function calcFederalTax(taxable, filing) {
  const brackets = BRACKETS[filing];
  let tax = 0;
  let marginalRate = 0;
  for (const [lo, hi, rate] of brackets) {
    if (taxable > lo) {
      const inBracket = Math.min(taxable, hi) - lo;
      tax += inBracket * rate;
      marginalRate = rate;
    } else {
      break;
    }
  }
  return { tax, marginalRate };
}

function calc() {
  const income = +$('#income').value || 0;
  const filing = $('#filing').value;
  const stateRate = +$('#state').value;
  const retire = +$('#retire').value || 0;
  const deduction = STD_DEDUCTION[filing];
  const taxable = Math.max(0, income - deduction - retire);
  const fed = calcFederalTax(taxable, filing);
  const ficaRate = 0.062 + 0.0145; // 7.65%
  const ficaSSWageBase = 168600; // 2024 base, ~$176k for 2026
  const ssTax = Math.min(income, ficaSSWageBase) * 0.062;
  const mediTax = income * 0.0145;
  // Additional Medicare 0.9% on wages over $200k single / $250k MFJ
  const addlMediThresh = (filing === 'mfj') ? 250000 : (filing === 'mfs' ? 125000 : 200000);
  const addlMedi = income > addlMediThresh ? (income - addlMediThresh) * 0.009 : 0;
  const fica = ssTax + mediTax + addlMedi;
  const state = income * stateRate;
  const totalTax = fed.tax + fica + state;
  const takeHome = income - totalTax - retire;
  const effRate = income > 0 ? (totalTax / income) * 100 : 0;

  // Build bracket breakdown
  const brackets = BRACKETS[filing];
  let bracketHtml = `<div class="gz-brackets">
    <h3>📊 ${t('breakdown')} — ${FILING_LABELS[filing]}</h3>
    <table><thead><tr><th>${t('bracket')}</th><th>${t('rate')}</th><th>${t('tax')}</th></tr></thead><tbody>`;
  let cumulLo = 0;
  for (const [lo, hi, rate] of brackets) {
    if (taxable > lo) {
      const inBracket = Math.min(taxable, hi) - lo;
      const taxInBracket = inBracket * rate;
      const range = hi === Infinity ? `$${(lo/1000).toFixed(0)}k+` : `$${(lo/1000).toFixed(0)}k – $${(hi/1000).toFixed(0)}k`;
      bracketHtml += `<tr><td>${range}</td><td>${(rate*100).toFixed(0)}%</td><td>${fmt(taxInBracket)}</td></tr>`;
    }
  }
  bracketHtml += `</tbody></table></div>`;

  $('#result').innerHTML = `
    <div class="gz-result-grid">
      <div class="gz-result-card primary"><div class="label">${t('takeHome')} (Annual)</div><div class="value">${fmt(takeHome)}</div></div>
      <div class="gz-result-card"><div class="label">${t('monthly')}</div><div class="value">${fmt(takeHome/12)}</div></div>
      <div class="gz-result-card"><div class="label">${t('biweekly')}</div><div class="value">${fmt(takeHome/26)}</div></div>
      <div class="gz-result-card"><div class="label">${t('weekly')}</div><div class="value">${fmt(takeHome/52)}</div></div>
      <div class="gz-result-card"><div class="label">${t('federal')}</div><div class="value">${fmt(fed.tax)}</div></div>
      <div class="gz-result-card"><div class="label">${t('fica')}</div><div class="value">${fmt(fica)}</div></div>
      <div class="gz-result-card"><div class="label">${t('state')}</div><div class="value">${fmt(state)}</div></div>
      <div class="gz-result-card"><div class="label">${t('effective')}</div><div class="value">${effRate.toFixed(1)}%</div></div>
    </div>
    <div class="gz-brackets" style="margin-top:14px">
      <h3>Summary</h3>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:.9em">
        <div>Gross Income:</div><div style="text-align:right;font-weight:600">${fmt(income)}</div>
        <div>Standard Deduction:</div><div style="text-align:right;font-weight:600;color:var(--gz-success)">−${fmt(deduction)}</div>
        <div>Pre-tax (401k):</div><div style="text-align:right;font-weight:600;color:var(--gz-success)">−${fmt(retire)}</div>
        <div>Taxable Income:</div><div style="text-align:right;font-weight:600">${fmt(taxable)}</div>
        <div>Total Tax:</div><div style="text-align:right;font-weight:700;color:var(--gz-accent)">−${fmt(totalTax)}</div>
        <div style="border-top:1px solid var(--gz-border);padding-top:6px;font-weight:700">Take-Home:</div>
        <div style="border-top:1px solid var(--gz-border);padding-top:6px;text-align:right;font-weight:700;color:var(--gz-success);font-size:1.1em">${fmt(takeHome)}</div>
      </div>
    </div>
    ${bracketHtml}
    <div class="tax-note">💡 ${t('note')}</div>
  `;
}

function reset() {
  $('#income').value = 75000;
  $('#filing').value = 'single';
  $('#state').value = '0';
  $('#retire').value = 0;
  calc();
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="calc()">${t('calc')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="reset()">${t('reset')}</button>`;

calc();

  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',

    {icon:'🏦', href:'/calc/loan-calculator.html', name:'Loan Calculator'},
  ]
});
</script>
