function inlineXml(node,fmt={}){if(node.nodeType===3)return wrun(node.nodeValue,fmt);if(node.nodeType!==1)return'';const tag=node.tagName.toLowerCase(),f={...fmt};if(tag==='b'||tag==='strong')f.bold=true;if(tag==='i'||tag==='em')f.italic=true;if(tag==='u')f.underline=true;if(tag==='code')f.code=true;if(tag==='a')f.link=true;if(tag==='br')return'<w:br/>';if(tag==='img')return wrun('[Image: '+(node.getAttribute('alt')||'image')+']',fmt);let out=[...node.childNodes].map(n=>inlineXml(n,f)).join('');if(tag==='a'&&node.getAttribute('href'))out+=wrun(' ('+node.getAttribute('href')+')',{link:true});return out}
