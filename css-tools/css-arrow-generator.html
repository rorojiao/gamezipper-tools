<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "How do you make an arrow in CSS?", "acceptedAnswer": {"@type": "Answer", "text": "CSS arrows are made with two parts: a rectangle (the shaft) and a triangle (the head). This generator combines both in a single container and lets you customize size, thickness, color and direction."}}, {"@type": "Question", "name": "Can I make arrows in any direction?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. The generator supports 8 directions: up, down, left, right, and the four diagonals (top-left, top-right, bottom-left, bottom-right)."}}, {"@type": "Question", "name": "What styles are available?", "acceptedAnswer": {"@type": "Answer", "text": "You can choose from solid, thick, thin, and chevron styles. Solid is a clean filled arrow, thick is a bold version, thin is a minimal line arrow, and chevron is a simple V-shaped arrow."}}, {"@type": "Question", "name": "Are these arrows scalable and pixel-perfect?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. The arrows are made entirely with CSS using borders and divs. They scale perfectly on all screen sizes and look sharp at any zoom level — no images or SVGs required."}}]}</script>

<script>
GZI18n.register({
  en: {
    toolTitle: 'CSS Arrow Generator',
    toolDesc: 'Create clean CSS arrows in 8 directions. Customize size, color and style. Perfect for sliders, navigation, CTAs and back-to-top buttons — copy HTML and CSS in one click.',
    directionLabel: 'Direction',
    styleLabel: 'Style',
    size: 'Size (px)',
    color: 'Color',
    cssCode: 'Generated Code',
    copy: 'Copy',
    step1: 'Pick a direction (8 options including diagonals)',
    step2: 'Choose a style (solid, thick, thin, chevron)',
    step3: 'Adjust size and color',
    step4: 'Copy the HTML or CSS and paste into your project'
  },
  zh: {
    toolTitle: 'CSS 箭头生成器',
    toolDesc: '创建 8 个方向的干净 CSS 箭头。自定义尺寸、颜色和样式 — 非常适合轮播、导航、行动号召按钮和返回顶部按钮，一键复制 HTML 和 CSS。',
    directionLabel: '方向',
    styleLabel: '样式',
    size: '尺寸 (px)',
    color: '颜色',
    cssCode: '生成代码',
    copy: '复制',
    step1: '选择方向（包含 8 个方向以及对角线）',
    step2: '选择样式（实心、粗、细、人字形）',
    step3: '调整尺寸和颜色',
    step4: '复制 HTML 或 CSS 并粘贴到项目中'
  }
});

const { $, t, copyText } = GZ;
let currentDir = 'right';
let currentStyle = 'solid';
let currentTab = 'html';

const ROT = {
  'right': 0, 'down-right': 45, 'down': 90, 'down-left': 135,
  'left': 180, 'up-left': 225, 'up': 270, 'up-right': 315
};

function buildArrow() {
  const size = Math.max(20, Math.min(300, parseInt($('#size').value) || 120));
  const color = $('#color').value;
  const container = $('#arrow-container');
  container.style.color = color;
  container.innerHTML = '';
  const thickness = currentStyle === 'thick' ? Math.max(8, size * 0.25) :
                    currentStyle === 'thin' ? Math.max(3, size * 0.08) :
                    currentStyle === 'chevron' ? Math.max(6, size * 0.12) :
                    Math.max(6, size * 0.18);
  const length = size;
  if (currentStyle === 'chevron') {
    const armLen = size * 0.5;
    const w = Math.max(4, size * 0.18);
    const arm1 = document.createElement('div');
    const arm2 = document.createElement('div');
    arm1.style.cssText = `position:absolute;width:${armLen}px;height:${w}px;background:currentColor;top:50%;left:50%;transform-origin:left center;border-radius:${w/2}px;`;
    arm2.style.cssText = `position:absolute;width:${armLen}px;height:${w}px;background:currentColor;top:50%;left:50%;transform-origin:left center;border-radius:${w/2}px;`;
    const baseRot = ROT[currentDir] - 45;
    arm1.style.transform = `translate(0,-${w/2}px) rotate(${baseRot}deg)`;
    arm2.style.transform = `translate(0,${w/2}px) rotate(${baseRot + 90}deg)`;
    container.appendChild(arm1);
    container.appendChild(arm2);
  } else {
    const shaft = document.createElement('div');
    shaft.className = 'arrow-shaft';
    const headSize = currentStyle === 'thick' ? size * 0.5 : size * 0.45;
    const shaftLen = length - headSize * 0.7;
    shaft.style.cssText = `width:${shaftLen}px;height:${thickness}px;top:50%;left:50%;transform:translate(0,-${thickness/2}px) rotate(${ROT[currentDir]}deg);transform-origin:left center;border-radius:${thickness/2}px;`;
    container.appendChild(shaft);
    const head = document.createElement('div');
    head.className = 'arrow-head';
    const side1 = currentStyle === 'thick' ? headSize : headSize * 0.85;
    const side2 = currentStyle === 'thick' ? headSize : headSize * 0.85;
    const tri = getTriangle(currentDir, color, headSize);
    head.style.cssText = tri;
    head.style.transform = `rotate(${ROT[currentDir]}deg)`;
    const offset = currentStyle === 'thick' ? shaftLen - 4 : shaftLen - 2;
    if (currentDir === 'right') head.style.cssText += `top:50%;left:${offset}px;transform:translate(0,-${side1/2}px);`;
    else if (currentDir === 'left') head.style.cssText += `top:50%;right:${offset}px;transform:translate(0,-${side1/2}px) rotate(180deg);`;
    else if (currentDir === 'up') head.style.cssText += `bottom:${offset}px;left:50%;transform:translate(-${side1/2}px,0) rotate(270deg);`;
    else if (currentDir === 'down') head.style.cssText += `top:${offset}px;left:50%;transform:translate(-${side1/2}px,0) rotate(90deg);`;
    else head.style.cssText += `top:50%;left:50%;transform:translate(-50%,-50%) rotate(${ROT[currentDir]}deg);`;
    container.appendChild(head);
  }
  updateCode();
}

function getTriangle(dir, color, headSize) {
  if (dir === 'right') return `width:0;height:0;border-top:${headSize/2}px solid transparent;border-bottom:${headSize/2}px solid transparent;border-left:${headSize}px solid ${color};`;
  if (dir === 'left')  return `width:0;height:0;border-top:${headSize/2}px solid transparent;border-bottom:${headSize/2}px solid transparent;border-right:${headSize}px solid ${color};`;
  if (dir === 'up')    return `width:0;height:0;border-left:${headSize/2}px solid transparent;border-right:${headSize/2}px solid transparent;border-bottom:${headSize}px solid ${color};`;
  if (dir === 'down')  return `width:0;height:0;border-left:${headSize/2}px solid transparent;border-right:${headSize/2}px solid transparent;border-top:${headSize}px solid ${color};`;
  return `width:0;height:0;border-top:${headSize/2}px solid transparent;border-bottom:${headSize/2}px solid transparent;border-left:${headSize}px solid ${color};`;
}

function updateCode() {
  const color = $('#color').value;
  const size = $('#size').value;
  const dir = currentDir;
  const style = currentStyle;
  const thickness = style === 'thick' ? Math.max(8, size * 0.25) :
                    style === 'thin' ? Math.max(3, size * 0.08) :
                    style === 'chevron' ? Math.max(6, size * 0.12) :
                    Math.max(6, size * 0.18);
  const headSize = style === 'thick' ? size * 0.5 : size * 0.45;
  let css, html;
  if (style === 'chevron') {
    const armLen = size * 0.5;
    const w = Math.max(4, size * 0.18);
    const baseRot = ROT[dir] - 45;
    css = `.arrow-chevron {
  position: relative;
  width: ${size}px;
  height: ${size}px;
  color: ${color};
}
.arrow-chevron::before,
.arrow-chevron::after {
  content: '';
  position: absolute;
  top: 50%;
  left: 50%;
  width: ${armLen}px;
  height: ${w}px;
  background: currentColor;
  border-radius: ${w/2}px;
  transform-origin: left center;
}
.arrow-chevron::before {
  transform: translate(0, -${w/2}px) rotate(${baseRot}deg);
}
.arrow-chevron::after {
  transform: translate(0, ${w/2}px) rotate(${baseRot + 90}deg);
}`;
    html = `<div class="arrow-chevron" data-dir="${dir}"></div>`;
  } else {
    css = `.arrow {
  position: relative;
  width: ${size}px;
  height: ${thickness}px;
  background: ${color};
  border-radius: ${thickness/2}px;
  transform: rotate(${ROT[dir]}deg);
}
.arrow::after {
  content: '';
  position: absolute;
  right: -${headSize - 4}px;
  top: 50%;
  width: 0;
  height: 0;
  border-top: ${headSize/2}px solid transparent;
  border-bottom: ${headSize/2}px solid transparent;
  border-left: ${headSize}px solid ${color};
  transform: translateY(-${headSize/2}px);
}`;
    html = `<div class="arrow" data-dir="${dir}"></div>`;
  }
  $('#code-block').textContent = currentTab === 'html' ? html : css;
}

document.querySelectorAll('.direction-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.direction-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentDir = btn.dataset.dir;
    buildArrow();
  });
});

document.querySelectorAll('.style-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.style-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentStyle = btn.dataset.style;
    buildArrow();
  });
});

document.querySelectorAll('.code-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.code-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentTab = tab.dataset.tab;
    updateCode();
  });
});

$('#size').addEventListener('input', buildArrow);
$('#color').addEventListener('input', buildArrow);

$('#toolbar').innerHTML = `<button class="gz-btn" onclick="copyArrow()">${t('copy')}</button>`;
function copyArrow() {
  const code = $('#code-block').textContent;
  copyText(code);
}

buildArrow();

GZ.renderToolPage({
  category: 'css',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🔺', href:'/css-tools/css-triangle-generator.html', name:'CSS Triangle'},
    {icon:'⭐', href:'/css-tools/box-shadow.html', name:'Box Shadow'},
    {icon:'🎨', href:'/css-tools/gradient.html', name:'CSS Gradient'},
    {icon:'✨', href:'/css-tools/neumorphism-generator.html', name:'Neumorphism'},
  ]
});
</script>
