    step4: '再次应用 Atbash 即可还原为原文',
  }
});

const { $, copyText, t } = GZ;

function atbash(str) {
  return [...str].map(ch => {
    const code = ch.charCodeAt(0);
    if (code >= 65 && code <= 90) return String.fromCharCode(90 - (code - 65));
    if (code >= 97 && code <= 122) return String.fromCharCode(122 - (code - 97));
    return ch;
  }).join('');
}

function update() {
  $('#output').textContent = atbash($('#input').value);
}

function loadExample() {
  $('#input').value = 'The quick brown fox jumps over the lazy dog';
  update();
}

function doClear() { $('#input').value = ''; $('#output').textContent = ''; }

$('#input').addEventListener('input', update);

$('#toolbar').innerHTML = `
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;
