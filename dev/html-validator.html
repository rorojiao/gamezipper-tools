const { $, $$, copyText, t } = GZ;

// void elements that should not have closing tags
const VOID = new Set(['area','base','br','col','embed','hr','img','input','link','meta','param','source','track','wbr']);
// deprecated HTML4 / presentational attributes
const DEPRECATED = {
  align: 'Use CSS text-align instead',
  bgcolor: 'Use CSS background-color instead',
  border: 'Use CSS border instead',
  cellpadding: 'Use CSS padding on cells',
  cellspacing: 'Use CSS border-spacing',
  color: 'Use CSS color instead',
  face: 'Use CSS font-family instead',
  height: 'Use CSS height instead',
  hspace: 'Use CSS margin instead',
  marginheight: 'Use CSS margin instead',
  marginwidth: 'Use CSS margin instead',
  nowrap: 'Use CSS white-space: nowrap',
  size: 'Use CSS font-size instead',
  vspace: 'Use CSS margin instead',
  width: 'Use CSS width instead',
  text: 'Use CSS color instead',
  link: 'Use CSS color instead on <body>',
  alink: 'Use CSS :active on a',
  vlink: 'Use CSS :visited on a',
};

function lineOf(text, idx) {
  return text.substring(0, idx).split('\n').length;
}

function validate(html) {
  const issues = [];
  if (!html.trim()) return issues;

  // strip comments and script/style content to keep tag matching simple
  const cleaned = html.replace(/<!--[\s\S]*?-->/g, m => ' '.repeat(m.length));

  // stack-based tag balance check
  const tagRe = /<\s*(\/?)\s*([a-zA-Z][a-zA-Z0-9-]*)([^>]*?)\s*(\/?)\s*>/g;
  const stack = [];
  let m;
  while ((m = tagRe.exec(cleaned)) !== null) {
    const closing = m[1] === '/';
    const tag = m[2].toLowerCase();
    const attrs = m[3];
    const selfClose = m[4] === '/' || VOID.has(tag);
    const idx = m.index;
    if (closing) {
      if (stack.length === 0) {
        issues.push({ type: 'error', msg: `Unexpected closing tag </${tag}> with no matching opening tag`, line: lineOf(html, idx) });
      } else {
        const top = stack[stack.length - 1];
        if (top.tag === tag) {
          stack.pop();
        } else {
          issues.push({ type: 'error', msg: `Mismatched tags: expected </${top.tag}> (opened at line ${top.line}) but found </${tag}>`, line: lineOf(html, idx) });
          // try to recover by popping until we find a match
          let recovered = false;
          for (let i = stack.length - 1; i >= 0; i--) {
            if (stack[i].tag === tag) { stack.length = i; recovered = true; break; }
          }
          if (!recovered) { /* leave stack as is */ }
        }
      }
    } else if (!selfClose) {
      stack.push({ tag, line: lineOf(html, idx) });
    }

    // attribute checks on opening tags
    if (!closing) {
      // duplicate IDs
      const ids = [...attrs.matchAll(/\bid\s*=\s*["']([^"']+)["']/gi)];
      for (const idm of ids) {
        const idVal = idm[1];
        const allIdCount = (cleaned.match(new RegExp(`\\bid\\s*=\\s*["']${idVal.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')}["']`, 'g')) || []).length;
        if (allIdCount > 1) {
          issues.push({ type: 'warn', msg: `Duplicate id="${idVal}" found ${allIdCount} times. Each id must be unique.`, line: lineOf(html, idx) });
        }
      }
      // missing alt on img
      if (tag === 'img' && !/\balt\s*=/i.test(attrs)) {
        issues.push({ type: 'warn', msg: `<img> is missing alt attribute. Add alt="" for decorative or alt="description" for meaningful images.`, line: lineOf(html, idx) });
      }
      // missing href on a
      if (tag === 'a' && !/\bhref\s*=/i.test(attrs) && !/\bname\s*=/i.test(attrs)) {
        issues.push({ type: 'warn', msg: `<a> tag is missing href attribute.`, line: lineOf(html, idx) });
      }
      // missing lang on html
      if (tag === 'html' && !/\blang\s*=/i.test(attrs)) {
        issues.push({ type: 'warn', msg: `<html> is missing lang attribute. Add lang="en" for accessibility.`, line: lineOf(html, idx) });
      }
      // deprecated attributes
      const depRe = /\b([a-zA-Z-]+)\s*=\s*["'][^"']*["']/g;
      let dm;
      while ((dm = depRe.exec(attrs)) !== null) {
        const attr = dm[1].toLowerCase();
        if (DEPRECATED[attr]) {
          issues.push({ type: 'info', msg: `Deprecated attribute "${attr}" on <${tag}>. ${DEPRECATED[attr]}.`, line: lineOf(html, idx) });
        }
      }
    }
  }
  // unclosed tags
  for (const s of stack) {
    issues.push({ type: 'error', msg: `Unclosed tag <${s.tag}> opened at line ${s.line}`, line: s.line });
  }

  // inline scripts and event handler warnings
  const evRe = /\son[a-z]+\s*=\s*["'][^"']*["']/gi;
  while ((m = evRe.exec(html)) !== null) {
    issues.push({ type: 'info', msg: `Inline event handler "${m[0].split('=')[0].trim()}" found. Consider using addEventListener in a separate script for better CSP and maintainability.`, line: lineOf(html, m.index) });
  }

  // javascript: href
  const jsHrefRe = /\bhref\s*=\s*["']javascript:[^"']*["']/gi;
  while ((m = jsHrefRe.exec(html)) !== null) {
    issues.push({ type: 'warn', msg: `Potentially unsafe javascript: URL in href. Use addEventListener instead.`, line: lineOf(html, m.index) });
  }

  return issues;
}

function render() {
  const html = $('#html-in').value;
  const out = $('#output');
  if (!html.trim()) {
    out.innerHTML = `<div class="v-msg">${t('example') || ''}</div>`;
    return;
  }
  const issues = validate(html);
  const errCount = issues.filter(i => i.type === 'error').length;
  const warnCount = issues.filter(i => i.type === 'warn').length;
  const infoCount = issues.filter(i => i.type === 'info').length;
  const score = Math.max(0, 100 - errCount * 15 - warnCount * 5 - infoCount * 1);
  const scoreClass = errCount === 0 && warnCount === 0 ? 'ok' : 'err';

  let html2 = `<div class="v-stats">
    <div class="v-stat err"><div class="num">${errCount}</div><div class="lbl">${t('errors')}</div></div>
    <div class="v-stat warn"><div class="num">${warnCount}</div><div class="lbl">${t('warnings')}</div></div>
    <div class="v-stat info"><div class="num">${infoCount}</div><div class="lbl">${t('info')}</div></div>
    <div class="v-stat ${scoreClass}"><div class="num">${score}</div><div class="lbl">${t('score')}</div></div>
  </div>`;

  if (issues.length === 0) {
    html2 += `<div class="v-summary ok">${t('noIssues')}</div>`;
  } else {
    html2 += '<ul class="v-issues">';
    for (const i of issues) {
      html2 += `<li class="v-issue ${i.type}"><span class="lbl">${i.type}</span>${escapeHtml(i.msg)}<div class="loc">Line ${i.line}</div></li>`;
    }
    html2 += '</ul>';
  }
  out.innerHTML = html2;
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
