<script>
GZI18n.register({
  en: {
    toolTitle: 'JSON to Markdown Converter',
    toolDesc: 'Convert JSON data to clean Markdown tables, nested headings or bulleted lists. Paste JSON and get formatted Markdown instantly — 100% browser-based.',
    modeTable: 'Table (arrays)',
    modeHeadings: 'Headings (nested)',
    modeList: 'List (simple)',
    convert: 'Convert',
    jsonInvalid: '✗ Invalid JSON',
    jsonValid: '✓ Converted',
    step1: 'Paste or type your JSON data in the input area',
    step2: 'Choose an output mode: table, headings or list',
    step3: 'Click Convert to generate Markdown',
    step4: 'Copy the result and paste it into your README or docs',
  },
  zh: {
    toolTitle: 'JSON 转 Markdown 转换器',
    toolDesc: '将 JSON 数据转换为干净的 Markdown 表格、嵌套标题或项目符号列表。粘贴 JSON，即时获得格式化 Markdown — 100% 浏览器本地运行。',
    modeTable: '表格（数组）',
    modeHeadings: '标题（嵌套）',
    modeList: '列表（简单）',
    convert: '转换',
    jsonInvalid: '✗ JSON 无效',
    jsonValid: '✓ 转换成功',
    step1: '在输入区粘贴或输入 JSON 数据',
    step2: '选择输出模式：表格、标题或列表',
    step3: '点击「转换」生成 Markdown',
    step4: '复制结果并粘贴到 README 或文档中',
  }
});

let mode = 'table';
const { $, copyText, t } = GZ;

function escMd(s) {
  if (s === null || s === undefined) return '';
  if (typeof s === 'object') return '`' + JSON.stringify(s) + '`';
  return String(s).replace(/\|/g, '\\|').replace(/\n/g, ' ');
}

function isArrayObj(data) {
  return Array.isArray(data) && data.length > 0 && data.every(o => o && typeof o === 'object' && !Array.isArray(o));
}

function toTable(data) {
  const keys = [...new Set(data.flatMap(o => Object.keys(o)))];
  if (!keys.length) return '';
  let md = '| ' + keys.join(' | ') + ' |\n';
  md += '|' + keys.map(() => '---').join('|') + '|\n';
  for (const row of data) {
    md += '| ' + keys.map(k => escMd(row[k])).join(' | ') + ' |\n';
  }
  return md;
}

function toHeadings(data, level) {
  level = level || 1;
  let md = '';
  if (Array.isArray(data)) {
    data.forEach((item, i) => {
      md += `${'#'.repeat(Math.min(level, 6))} [${i}]\n\n`;
      md += toHeadings(item, level + 1);
    });
  } else if (data && typeof data === 'object') {
    for (const [k, v] of Object.entries(data)) {
      if (v !== null && typeof v === 'object') {
        md += `${'#'.repeat(Math.min(level, 6))} ${k}\n\n`;
        md += toHeadings(v, level + 1);
      } else {
        md += `- **${k}:** ${escMd(v)}\n`;
      }
    }
    md += '\n';
  } else {
    md += `${escMd(data)}\n\n`;
  }
  return md;
}

function toList(data, indent) {
  indent = indent || '';
  let md = '';
  if (Array.isArray(data)) {
    data.forEach(item => {
      if (item !== null && typeof item === 'object') {
        md += toList(item, indent + '  ');
      } else {
        md += `${indent}- ${escMd(item)}\n`;
      }
    });
  } else if (data && typeof data === 'object') {
    for (const [k, v] of Object.entries(data)) {
      if (v !== null && typeof v === 'object') {
        md += `${indent}- **${k}:**\n`;
        md += toList(v, indent + '  ');
      } else {
        md += `${indent}- **${k}:** ${escMd(v)}\n`;
      }
    }
  } else {
    md += `${indent}- ${escMd(data)}\n`;
  }
  return md;
}

function doConvert() {
  const inp = $('#input').value.trim();
  if (!inp) { $('#output').value = ''; $('#status').innerHTML = ''; return; }
  let data;
  try {
    data = JSON.parse(inp);
  } catch(e) {
    $('#status').innerHTML = `<span style="color:var(--gz-accent)">${t('jsonInvalid')}: ${e.message}</span>`;
    $('#output').value = '';
    return;
  }
  let md = '';
  if (mode === 'table' && isArrayObj(data)) {
    md = toTable(data);
  } else if (mode === 'table' && data && typeof data === 'object' && !Array.isArray(data)) {
    md = toTable([data]);
  } else if (mode === 'headings') {
    md = toHeadings(data);
  } else {
    md = toList(data);
  }
  $('#output').value = md.trim() + '\n';
  $('#status').innerHTML = `<span style="color:var(--gz-success)">${t('jsonValid')}</span>`;
}

function loadExample() {
  $('#input').value = JSON.stringify([
    {name: 'GameZipper', version: '1.0', license: 'MIT'},
    {name: 'JSON Tool', version: '2.3', license: 'Apache-2.0'},
    {name: 'MD Writer', version: '0.9', license: 'GPL-3.0'}
  ], null, 2);
  doConvert();
}

function doClear() { $('#input').value = ''; $('#output').value = ''; $('#status').innerHTML = ''; }

$('#input').addEventListener('input', doConvert);

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="doConvert()">${t('convert')}</button>
  <select class="gz-select" onchange="mode=this.value;doConvert()">
    <option value="table">${t('modeTable')}</option>
    <option value="headings">${t('modeHeadings')}</option>
    <option value="list">${t('modeList')}</option>
  </select>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn" onclick="copyText($('#output').value)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

GZ.renderToolPage({
  category: 'dev',
  titleKey: 'toolTitle',

    {icon:'📋', href:'/convert/json-to-yaml.html', name:'JSON to YAML'},
  ]
});
</script>
