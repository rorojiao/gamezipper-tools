<script>
GZI18n.register({
  en: {
    toolTitle: 'Pixelate Image',
    toolDesc: 'Pixelate any image to censor faces, hide details or create pixel art effects. Adjust block size — free and browser-based.',
    dropImage: 'Drop an image here or click to upload',
    blockSize: 'Block size',
    step1: 'Upload an image by dragging or clicking',
    step2: 'Adjust the pixel block size slider',
    step3: 'Preview the pixelation effect in real-time',
    step4: 'Download the pixelated image as PNG',
  },
  zh: {
    toolTitle: '图片像素化工具',
    toolDesc: '将图片像素化以遮挡面部、隐藏细节或创建像素风格效果。可调整块大小 — 免费且完全浏览器本地处理。',
    dropImage: '拖拽图片到此处或点击上传',
    blockSize: '块大小',
    step1: '拖拽或点击上传图片',
    step2: '调整像素块大小滑块',
    step3: '实时预览像素化效果',
    step4: '下载像素化后的 PNG 图片',
  }
});

const { $, t } = GZ;
let srcImg = null;
let blockSize = 10;

const drop = $('#drop');
const fileInput = $('#file-input');
$('#drop-label').textContent = t('dropImage');

drop.addEventListener('click', () => fileInput.click());
drop.addEventListener('dragover', e => { e.preventDefault(); drop.style.borderColor = 'var(--gz-accent)'; });
drop.addEventListener('dragleave', () => { drop.style.borderColor = ''; });
drop.addEventListener('drop', e => { e.preventDefault(); drop.style.borderColor = ''; loadFile(e.dataTransfer.files[0]); });
fileInput.addEventListener('change', e => loadFile(e.target.files[0]));

function loadFile(file) {
  if (!file || !file.type.startsWith('image/')) return;
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => { srcImg = img; applyPixelate(); };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function applyPixelate() {
  if (!srcImg) return;
  const canvas = $('#output');
  const maxW = 800;
  const scale = Math.min(1, maxW / srcImg.width);
  const w = Math.round(srcImg.width * scale);
  const h = Math.round(srcImg.height * scale);
  canvas.width = w; canvas.height = h;
  const ctx = canvas.getContext('2d');

  // Draw original at reduced size
  const sw = Math.max(1, Math.round(w / blockSize));
  const sh = Math.max(1, Math.round(h / blockSize));

  // Use offscreen canvas for downscaling
  const tmp = document.createElement('canvas');
  tmp.width = sw; tmp.height = sh;
  const tCtx = tmp.getContext('2d');
  tCtx.drawImage(srcImg, 0, 0, sw, sh);

  // Draw back at full size with image-smoothing disabled
  ctx.imageSmoothingEnabled = false;
  ctx.drawImage(tmp, 0, 0, sw, sh, 0, 0, w, h);
}

function download() {
  const canvas = $('#output');
  if (!canvas.width) return;
  const a = document.createElement('a');
  a.download = 'pixelated-image.png';
  a.href = canvas.toDataURL('image/png');
  a.click();
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="download()">${t('download')} PNG</button>`;

$('#controls').innerHTML = `
  <label>${t('blockSize')}: <input type="range" min="2" max="50" value="${blockSize}" oninput="blockSize=+this.value;$('#bsVal').textContent=this.value;applyPixelate()"><span id="bsVal">${blockSize}</span>px</label>`;

GZ.renderToolPage({
  category: 'image',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],

    {icon:'✏️', href:'/image/pencil-sketch.html', name:'Pencil Sketch'},
    {icon:'🔒', href:'/image/censor.html', name:'Censor Image'},
  ]
});
</script>
