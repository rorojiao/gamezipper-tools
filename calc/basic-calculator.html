<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"Is this online calculator free?","acceptedAnswer":{"@type":"Answer","text":"Yes. The basic calculator is completely free, has no ads inside the calculator itself, and never asks for signup. It runs 100% in your browser."}},{"@type":"Question","name":"Does the calculator support percentages?","acceptedAnswer":{"@type":"Answer","text":"Yes. Use the % button to calculate percentages. For example 200 × 10 % gives you 20. You can also chain operations like 100 + 5%."}},{"@type":"Question","name":"Can I use keyboard input?","acceptedAnswer":{"@type":"Answer","text":"Yes. You can type numbers, +, -, *, /, Enter or = to calculate, Escape or c to clear, and Backspace to delete the last digit."}},{"@type":"Question","name":"Does the calculator store my calculations?","acceptedAnswer":{"@type":"Answer","text":"No. Everything happens in your browser memory and is cleared the moment you close or refresh the tab. Nothing is sent to any server."}}]}</script>

<script>
GZI18n.register({
  en: {
    toolTitle: 'Basic Calculator',
    toolDesc: 'A free online pocket calculator — add, subtract, multiply, divide and compute percentages instantly. Keyboard friendly, runs in your browser, no signup.',
    ac: 'AC', del: '⌫', pct: '%', div: '÷', mul: '×', sub: '−', add: '+', eq: '=', dot: '.', zero: '0',
    hint: 'Tip: use your keyboard — <kbd>0-9</kbd> <kbd>+ - * /</kbd> <kbd>Enter</kbd> or <kbd>=</kbd> to calculate, <kbd>Esc</kbd> to clear, <kbd>Backspace</kbd> to delete.',
    step1: 'Click number buttons or type digits on your keyboard',
    step2: 'Pick an operator (+, −, ×, ÷) and enter the next number',
    step3: 'Press = or Enter to see the result',
    step4: 'Use AC to clear everything or ⌫ to delete the last digit',
    errDiv: 'Cannot divide by zero',
  },
  zh: {
    toolTitle: '基础计算器',
    toolDesc: '免费在线口袋计算器 — 加减乘除、百分比一键计算。支持键盘输入，浏览器本地运行，无需注册。',
    ac: '清空', del: '⌫', pct: '%', div: '÷', mul: '×', sub: '−', add: '+', eq: '=', dot: '.', zero: '0',
    hint: '提示：可使用键盘 — <kbd>0-9</kbd> <kbd>+ - * /</kbd> <kbd>Enter</kbd> 或 <kbd>=</kbd> 计算，<kbd>Esc</kbd> 清空，<kbd>Backspace</kbd> 删除。',
    step1: '点击数字按钮，或直接在键盘上输入数字',
    step2: '选择运算符（+ − × ÷），然后输入下一个数字',
    step3: '按 = 或 Enter 查看结果',
    step4: '按 AC 全部清空，或 ⌫ 删除最后一位数字',
    errDiv: '不能除以零',
  }
});

const { $, t } = GZ;

// Calculator state machine: standard pocket-calculator behavior
let cur = '0';      // current entry being typed
let prev = null;    // previous operand (number) when an operator is pending
let op = null;      // pending operator: + - * /
let justEvaluated = false;

const exprEl = $('#bc-expr'), resEl = $('#bc-result');

function render() {
  resEl.textContent = formatNum(cur);
  let e = '';
  if (prev !== null && op) e = formatNum(prev) + ' ' + opSym(op) + (justEvaluated ? ' ' + formatNum(cur) + ' =' : '');
  else if (justEvaluated) e = formatNum(cur) + ' =';
  exprEl.textContent = e;
}

function opSym(o) { return o === '*' ? '×' : o === '/' ? '÷' : o === '-' ? '−' : '+'; }
function formatNum(s) {
  if (s === 'Error') return s;
  if (s === '' || s === '-' || s === '.') return s;
  // Handle trailing dot / trailing zero after dot
  const n = Number(s);
  if (!isFinite(n)) return s;
  // Preserve the user-typed string form (so 0.50 doesn't become 0.5 while typing)
  if (s.endsWith('.') || /\.0+$/.test(s)) return s;
  return String(n);
}

function inputDigit(d) {
  if (justEvaluated) { cur = '0'; prev = null; op = null; justEvaluated = false; }
  if (cur === '0') cur = d; else cur += d;
  render();
}

function inputDot() {
  if (justEvaluated) { cur = '0'; prev = null; op = null; justEvaluated = false; }
  if (!cur.includes('.')) cur = (cur === '' || cur === '-') ? (cur + '0.') : (cur + '.');
  render();
}

function compute(a, b, o) {
  switch (o) {
    case '+': return a + b;
    case '-': return a - b;
    case '*': return a * b;
    case '/': return b === 0 ? NaN : a / b;
  }
  return b;
}

function setOp(nextOp) {
  if (op && !justEvaluated && cur !== '') {
    // chain: evaluate pending op first
    const a = parseFloat(prev); const b = parseFloat(cur);
    const r = compute(a, b, op);
    if (!isFinite(r)) { cur = 'Error'; prev = null; op = null; justEvaluated = true; render(); return; }
    prev = r; cur = '0';
  } else if (cur !== '' && cur !== 'Error') {
    prev = parseFloat(cur);
    cur = '0';
  }
  op = nextOp;
  justEvaluated = false;
  render();
}

function equals() {
  if (op === null || prev === null) { justEvaluated = true; render(); return; }
  const b = parseFloat(cur);
  const a = typeof prev === 'number' ? prev : parseFloat(prev);
  const r = compute(a, b, op);
  if (!isFinite(r)) {
    cur = 'Error';
  } else {
    cur = String(r);
    justEvaluated = true;
  }
  prev = a; // keep for display
  render();
  if (cur === 'Error') { prev = null; op = null; }
}

function clearAll() { cur = '0'; prev = null; op = null; justEvaluated = false; render(); }
function delLast() {
  if (justEvaluated || cur === 'Error') { clearAll(); return; }
  if (cur.length <= 1 || (cur.length === 2 && cur.startsWith('-'))) cur = '0';
  else cur = cur.slice(0, -1);
  render();
}
function percent() {
  if (cur === 'Error') return;
  if (prev !== null && op) {
    // X op Y% → for + and - means X * (Y/100) of X; for * and / use Y/100 directly
    const y = parseFloat(cur);
    let val;
    if (op === '+' || op === '-') val = (typeof prev === 'number' ? prev : parseFloat(prev)) * y / 100;
    else val = y / 100;
    cur = String(val);
  } else {
    cur = String(parseFloat(cur) / 100);
  }
  render();
}
function negate() {
  if (cur === 'Error' || cur === '0') return;
  cur = cur.startsWith('-') ? cur.slice(1) : '-' + cur;
  render();
}

const buttons = [
  { label: () => t('ac'), cls: 'bc-fn', act: clearAll },
  { label: () => t('del'), cls: 'bc-fn', act: delLast },
  { label: () => t('pct'), cls: 'bc-fn', act: percent },
  { label: () => t('div'), cls: 'bc-op', act: () => setOp('/') },
  { label: () => '7', cls: '', act: () => inputDigit('7') },
  { label: () => '8', cls: '', act: () => inputDigit('8') },
  { label: () => '9', cls: '', act: () => inputDigit('9') },
  { label: () => t('mul'), cls: 'bc-op', act: () => setOp('*') },
  { label: () => '4', cls: '', act: () => inputDigit('4') },
  { label: () => '5', cls: '', act: () => inputDigit('5') },
  { label: () => '6', cls: '', act: () => inputDigit('6') },
  { label: () => t('sub'), cls: 'bc-op', act: () => setOp('-') },
  { label: () => '1', cls: '', act: () => inputDigit('1') },
  { label: () => '2', cls: '', act: () => inputDigit('2') },
  { label: () => '3', cls: '', act: () => inputDigit('3') },
  { label: () => t('add'), cls: 'bc-op', act: () => setOp('+') },
  { label: () => '±', cls: 'bc-fn', act: negate },
  { label: () => t('zero'), cls: 'bc-zero', act: () => inputDigit('0') },
  { label: () => t('dot'), cls: '', act: inputDot },
  { label: () => t('eq'), cls: 'bc-eq', act: equals },
];

const grid = $('#bc-grid');
buttons.forEach(b => {
  const btn = document.createElement('button');
  btn.className = 'bc-btn ' + b.cls;
  btn.textContent = b.label();
  btn.addEventListener('click', b.act);
  btn.dataset.role = b.cls || 'num';
  grid.appendChild(btn);
});

// keyboard support
document.addEventListener('keydown', e => {
  const k = e.key;
  if (/^[0-9]$/.test(k)) { inputDigit(k); e.preventDefault(); }
  else if (k === '.' || k === ',') { inputDot(); e.preventDefault(); }
  else if (k === '+') { setOp('+'); e.preventDefault(); }
  else if (k === '-') { setOp('-'); e.preventDefault(); }
  else if (k === '*') { setOp('*'); e.preventDefault(); }
  else if (k === '/') { setOp('/'); e.preventDefault(); }
  else if (k === 'Enter' || k === '=') { equals(); e.preventDefault(); }
  else if (k === 'Escape' || k === 'c' || k === 'C') { clearAll(); e.preventDefault(); }
  else if (k === 'Backspace') { delLast(); e.preventDefault(); }
  else if (k === '%') { percent(); e.preventDefault(); }
});

$('#bc-hint').innerHTML = t('hint');
render();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🧮', href:'/calc/scientific-calculator.html', name:'Scientific Calculator'},
    {icon:'%', href:'/calc/percentage-calculator.html', name:'Percentage Calculator'},
    {icon:'🔢', href:'/calc/binary-calculator.html', name:'Binary Calculator'},
    {icon:'💰', href:'/calc/tip-calculator.html', name:'Tip Calculator'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
