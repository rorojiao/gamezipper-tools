const { $, t, copyText, showToast } = GZ;

const CHEATSHEET = [
  { expr: '$', desc: 'root' },
  { expr: '$.key', desc: 'child key' },
  { expr: '$..key', desc: 'recursive descent' },
  { expr: '$.*', desc: 'all children' },
  { expr: '$.arr[0]', desc: 'first array element' },
  { expr: '$.arr[-1]', desc: 'last array element' },
  { expr: '$.arr[0,2]', desc: 'multi-index' },
  { expr: '$.arr[0:3]', desc: 'slice 0..3' },
  { expr: '$.*.*', desc: 'all grandchildren' },
  { expr: '$..[?(@.price<10)]', desc: 'filter: price < 10' },
  { expr: '$..[?(@.type=="book")]', desc: 'filter: type == book' },
  { expr: '$..[?(@.name)]', desc: 'filter: has name' },
];

function tokenize(path) {
  // Simple recursive-descent JSONPath tokenizer
  let i = 0;
  function peek() { return path[i]; }
  function next() { return path[i++]; }
  function eat(str) { if (path.slice(i, i+str.length) === str) { i += str.length; return true; } return false; }
  function readIdent() { let s = ''; while (i < path.length && /[A-Za-z0-9_]/.test(path[i])) s += path[i++]; return s; }
  function readNumber() { let s = ''; if (path[i] === '-') s += path[i++]; while (i < path.length && /[0-9]/.test(path[i])) s += path[i++]; return parseInt(s, 10); }
  function readQuoted(quote) { let s = ''; i++; while (i < path.length && path[i] !== quote) { if (path[i] === '\\') { i++; s += path[i++]; } else s += path[i++]; } i++; return s; }
  function skipWs() { while (i < path.length && path[i] === ' ') i++; }
  function readUntil(closer) { let s = ''; let depth = 0; while (i < path.length) { const c = path[i]; if (c === '(') depth++; else if (c === ')') { if (depth === 0) break; depth--; } s += c; i++; } return s; }
  return { path, get pos() { return i; }, peek, next, eat, readIdent, readNumber, readQuoted, skipWs, readUntil };
}

function evalPath(path, data) {
  if (!path.startsWith('$')) throw new Error('Path must start with $');
  const tok = tokenize(path);
  tok.next(); // consume $
  function parseExpr(stopAt) {
    const results = [data];
    while (tok.pos < path.length) {
      tok.skipWs();
      const c = tok.peek();
      if (!c || c === stopAt) break;
      if (c === '.') {
        tok.next();
        if (tok.peek() === '.') {
          tok.next();
          // recursive descent: after .. expect either [ or .key or *
          tok.skipWs();
          if (tok.peek() === '*') { tok.next(); applyWildcard(results, true); continue; }
          if (tok.peek() === '[') continue; // handled below as bracket
          const key = tok.readIdent();
          if (!key) throw new Error('Expected key after ..');
          applyKey(results, key, true);
        } else if (tok.peek() === '*') {
          tok.next();
          applyWildcard(results, false);
        } else {
          const key = tok.readIdent();
          if (!key) break;
          applyKey(results, key, false);
        }
      } else if (c === '[') {
        tok.next();
        tok.skipWs();
        const nc = tok.peek();
        if (nc === '?') {
          tok.next();
          if (tok.peek() !== '(') throw new Error('Expected ( after ?');
          tok.next();
          const filter = tok.readUntil(')');
          tok.next(); // consume )
          tok.skipWs();
          if (tok.peek() === ']') tok.next();
          applyFilter(results, filter);
        } else if (nc === '*') {
          tok.next();
          tok.skipWs();
          if (tok.peek() === ']') tok.next();
          applyWildcard(results, false);
        } else if (nc === ',' || /\d|-/.test(nc)) {
          // union / indices / slice
          let indices = [];
          let slice = null;
          while (tok.pos < path.length) {
            tok.skipWs();
            if (tok.peek() === ']') { tok.next(); break; }
            if (tok.peek() === ',') { tok.next(); continue; }
            if (tok.peek() === ':') {
              tok.next();
              const b = tok.peek() === ']' ? null : tok.readNumber();
              slice = slice || [null, null];
              slice[1] = b;
              tok.skipWs();
              if (tok.peek() === ']') { tok.next(); break; }
            } else {
              const start = tok.readNumber();
              tok.skipWs();
              if (tok.peek() === ':') {
                tok.next();
                const end = tok.peek() === ']' ? null : tok.readNumber();
                slice = [start, end];
                tok.skipWs();
                if (tok.peek() === ']') { tok.next(); break; }
              } else {
                indices.push(start);
              }
            }
          }
          if (slice) applySlice(results, slice);
          if (indices.length) applyIndex(results, indices);
        } else if (nc === '\'') {
          const key = tok.readQuoted("'");
          tok.skipWs();
          if (tok.peek() === ']') tok.next();
          applyKey(results, key, false);
        } else {
          throw new Error('Unexpected [ content: ' + nc);
        }
      } else {
        break;
      }
    }
    return results;
  }
  function applyKey(arr, key, recursive) {
    const out = [];
    for (const item of arr) {
      if (recursive) collectAll(item, key, out);
      else if (item && typeof item === 'object' && key in item) out.push(item[key]);
    }
    arr.length = 0; arr.push(...out);
  }
  function applyWildcard(arr, recursive) {
    const out = [];
    for (const item of arr) {
      if (recursive) collectAllChildren(item, out);
      else if (Array.isArray(item)) out.push(...item);
      else if (item && typeof item === 'object') out.push(...Object.values(item));
    }
    arr.length = 0; arr.push(...out);
  }
  function applyIndex(arr, indices) {
    const out = [];
    for (const item of arr) {
      if (Array.isArray(item)) for (const idx of indices) {
        if (idx < 0) { if (item.length + idx >= 0) out.push(item[item.length + idx]); }
        else if (idx < item.length) out.push(item[idx]);
      }
    }
    arr.length = 0; arr.push(...out);
  }
  function applySlice(arr, [a, b]) {
    const out = [];
    for (const item of arr) {
      if (Array.isArray(item)) {
        const len = item.length;
        const start = a === null ? 0 : (a < 0 ? Math.max(0, len + a) : a);
        const end = b === null ? len : (b < 0 ? Math.max(0, len + b) : b);
        out.push(...item.slice(start, end));
      }
    }
    arr.length = 0; arr.push(...out);
  }
  function applyFilter(arr, expr) {
    const out = [];
    for (const item of arr) {
      if (Array.isArray(item)) {
        for (const el of item) {
          if (matchFilter(el, expr)) out.push(el);
        }
      } else if (matchFilter(item, expr)) {
        out.push(item);
      }
    }
    arr.length = 0; arr.push(...out);
  }
  function matchFilter(node, expr) {
    // Very small filter parser: @.key op value  or  @ op value
    const m = expr.match(/^\s*@(?:\.([A-Za-z_][A-Za-z0-9_]*))?\s*(==|!=|>=|<=|>|<)\s*(.+?)\s*$/);
    if (!m) {
      // Existence filter: @.key
      const ex = expr.match(/^\s*@(?:\.([A-Za-z_][A-Za-z0-9_]*))?\s*$/);
      if (ex) {
        const key = ex[1];
        if (key) return node && typeof node === 'object' && key in node;
        return node !== undefined && node !== null;
      }
      return false;
    }
    const key = m[1], op = m[2], raw = m[3].trim();
    let val = node && key ? node[key] : node;
    let cmp;
    if (raw === 'true' || raw === 'false') cmp = raw === 'true';
    else if (raw === 'null') cmp = null;
    else if (/^-?\d+(\.\d+)?$/.test(raw)) cmp = parseFloat(raw);
    else if ((raw.startsWith('\'') && raw.endsWith('\'')) || (raw.startsWith('"') && raw.endsWith('"'))) cmp = raw.slice(1, -1);
    else return false;
    if (op === '==') return val == cmp;
    if (op === '!=') return val != cmp;
    if (op === '>') return val > cmp;
    if (op === '<') return val < cmp;
    if (op === '>=') return val >= cmp;
    if (op === '<=') return val <= cmp;
    return false;
  }
  function collectAll(node, key, out) {
    if (!node) return;
    if (Array.isArray(node)) { for (const n of node) collectAll(n, key, out); return; }
    if (typeof node === 'object') {
      if (key in node) out.push(node[key]);
      for (const v of Object.values(node)) collectAll(v, key, out);
    }
  }
  function collectAllChildren(node, out) {
    if (!node) return;
    if (Array.isArray(node)) { for (const n of node) collectAllChildren(n, out); return; }
    if (typeof node === 'object') {
      for (const v of Object.values(node)) { out.push(v); collectAllChildren(v, out); }
    }
  }
  return parseExpr(null);
}

function runQuery() {
  const status = $('#status');
  status.innerHTML = '';
  const jsonRaw = $('#json').value.trim();
  const path = $('#path').value.trim();
  let data;
  try {
    if (!jsonRaw) { $('#output').textContent = ''; $('#count').textContent = ''; return; }
    data = JSON.parse(jsonRaw);
  } catch (e) {
    status.innerHTML = `<div class="jp-err">${t('errParse')}${e.message}</div>`;
    $('#output').textContent = ''; $('#count').textContent = '';
    return;
  }
  if (!path) { $('#output').textContent = JSON.stringify(data, null, 2); $('#count').innerHTML = ''; return; }
  try {
    const result = evalPath(path, data);
    const formatted = JSON.stringify(result, null, 2);
    $('#output').innerHTML = formatted;
    $('#count').innerHTML = `<b>${result.length}</b> ${t('hits')}`;
    status.innerHTML = `<div class="jp-ok">${result.length} ${t('hits')}</div>`;
  } catch (e) {
    status.innerHTML = `<div class="jp-err">${e.message}</div>`;
    $('#output').textContent = ''; $('#count').textContent = '';
  }
}
