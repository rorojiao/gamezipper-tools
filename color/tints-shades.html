<script>
GZI18n.register({
  en: {
    toolTitle: 'Tints & Shades Generator',
    toolDesc: 'Generate 10 lighter tints and 10 darker shades from any HEX color. Perfect for building UI palettes, design systems and CSS variables.',
    tints: 'Tints (lighter)',
    shades: 'Shades (darker)',
    step1: 'Enter a 6-digit HEX color code (without #) in the input box',
    step2: '10 tints (toward white) and 10 shades (toward black) generate automatically',
    step3: 'Click any color swatch to copy its HEX value',
    step4: 'Paste the copied HEX into CSS, Figma, or your design tool',
  },
  zh: {
    toolTitle: '颜色明暗渐变生成器',
    toolDesc: '从任意 HEX 颜色生成 10 个更浅的色调和 10 个更深的暗色，适合构建 UI 调色板、设计系统和 CSS 变量。',
    tints: '浅色（Tints）',
    shades: '深色（Shades）',
    step1: '在输入框中输入 6 位 HEX 颜色码（不含 #）',
    step2: '自动生成 10 个浅色（趋近白色）和 10 个深色（趋近黑色）',
    step3: '点击任意色块即可复制其 HEX 值',
    step4: '将复制的 HEX 粘贴到 CSS、Figma 或设计工具中',
  }
});
const { $, copyText, t } = GZ;

function hex2rgb(hex){
  hex = hex.replace('#','').trim();
  if(hex.length===3) hex = hex.split('').map(c=>c+c).join('');
  if(!/^[0-9a-f]{6}$/i.test(hex)) return null;
  return [parseInt(hex.slice(0,2),16),parseInt(hex.slice(2,4),16),parseInt(hex.slice(4,6),16)];
}
function rgb2hex(r,g,b){ return '#'+[r,g,b].map(n=>Math.max(0,Math.min(255,Math.round(n))).toString(16).padStart(2,'0')).join('').toUpperCase(); }

function mix(rgb, target, amt){
  return rgb.map((c,i)=> c*(1-amt) + target[i]*amt);
}

function render(){
  const inp = $('#hex-in').value.trim();
  const rgb = hex2rgb(inp);
  if(!rgb){ $('#status').innerHTML = `<span style="color:var(--gz-accent)">Invalid HEX</span>`; return; }
  $('#status').innerHTML='';
  const baseHex = rgb2hex(...rgb);
  $('#base-box').style.background = baseHex;
  $('#base-hex').textContent = baseHex;
  const white=[255,255,255], black=[0,0,0];
  const N=10;
  let tintsHtml='', shadesHtml='';
  for(let i=N;i>=1;i--){
    const amt = i/(N+1);
    const tc = mix(rgb, white, amt);
    const th = rgb2hex(...tc);
    tintsHtml += `<div class="sw" title="${th}" onclick="copyText('${th}')"><div class="box" style="background:${th}"></div><div class="code">${th.slice(1)}</div></div>`;
  }
  for(let i=1;i<=N;i++){
    const amt = i/(N+1);
    const sc = mix(rgb, black, amt);
    const sh = rgb2hex(...sc);
    shadesHtml += `<div class="sw" title="${sh}" onclick="copyText('${sh}')"><div class="box" style="background:${sh}"></div><div class="code">${sh.slice(1)}</div></div>`;
  }
  $('#tints').innerHTML = tintsHtml;
  $('#shades').innerHTML = shadesHtml;
}

$('#hex-in').addEventListener('input', render);
$('#lbl-tints').textContent = t('tints');
$('#lbl-shades').textContent = t('shades');

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="copyPalette()">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadRandom()">${t('example')}</button>`;

function copyPalette(){
  const all = [...document.querySelectorAll('#tints .code, #shades .code')].map(e=>'#'+e.textContent);
  copyText(all.join(', '));
}
function loadRandom(){
  const r=Math.floor(Math.random()*256),g=Math.floor(Math.random()*256),b=Math.floor(Math.random()*256);
  $('#hex-in').value = rgb2hex(r,g,b).slice(1); render();
}

render();

GZ.renderToolPage({
  category: 'color',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🎨', href:'/color/picker.html', name:'Color Picker'},
    {icon:'🌈', href:'/color/palette.html', name:'Palette Generator'},
    {icon:'🔵', href:'/color/shades.html', name:'Color Shades'},
    {icon:'👁️', href:'/color/contrast.html', name:'Contrast Checker'},
  ]
});
</script>
