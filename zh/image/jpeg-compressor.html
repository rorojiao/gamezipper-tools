<div class="gz-container">
  <div class="gz-tool-header"><h1 id="title"></h1><p class="desc" id="desc"></p></div>
  <div class="gz-tool-area">
    <div class="gz-dropzone" id="dropzone" onclick="document.getElementById('fileIn').click()">
      <span class="icon">🖼️</span>
      <p id="dropText"></p>
      <input type="file" id="fileIn" accept="image/jpeg,image/jpg,.jpg,.jpeg" multiple hidden>
    </div>
    <div class="quality-row">
      <span id="qLabel"></span>
      <input type="range" id="quality" min="10" max="100" value="75" oninput="compressAll()">
      <span class="val" id="qVal">75%</span>

  </div>

</div>
<script>
GZI18n.register({
  en:{toolTitle:'JPEG / JPG Compressor',toolDesc:'Compress JPG and JPEG images with adjustable quality. Batch compress, 100% in your browser — no upload.',
    s1:'Drop JPG/JPEG images or click to upload (multiple allowed)',s2:'Adjust the quality slider to control compression',s3:'Preview each result and the space saved',s4:'Click Download on any image to save the compressed version',
    dropHint:'Drop JPG/JPEG images here or click to upload',quality:'Quality:',
    original:'Original:',compressed:'Compressed:',saved:'Saved:',
    download:'⬇️ Download',rPng:'PNG Compressor',rWebp:'WebP Compressor',rConverter:'Image Converter',rResizer:'Image Resizer'},
  zh:{toolTitle:'JPEG / JPG 压缩器',toolDesc:'可调质量压缩 JPG/JPEG 图片。支持批量压缩，100% 浏览器本地处理，无需上传。',
    s1:'拖放 JPG/JPEG 图片或点击上传（支持多选）',s2:'调整质量滑块控制压缩程度',s3:'预览每张图片及节省的空间',s4:'点击图片上的「下载」保存压缩结果',
    dropHint:'拖放 JPG/JPEG 图片到此处或点击上传',quality:'质量：',
    original:'原始：',compressed:'压缩后：',saved:'节省：',
    download:'⬇️ 下载',rPng:'PNG 压缩器',rWebp:'WebP 压缩器',rConverter:'图片转换器',rResizer:'图片缩放'}
});

const {t}=GZI18n;
let files=[];

document.getElementById('dropText').textContent=t('dropHint');
document.getElementById('qLabel').textContent=t('quality');

const dz=document.getElementById('dropzone'),fi=document.getElementById('fileIn');
dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('drag-over')});
dz.addEventListener('dragleave',()=>dz.classList.remove('drag-over'));
dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('drag-over');files=[...e.dataTransfer.files];compressAll()});
fi.addEventListener('change',e=>{if(e.target.files.length){files=[...e.target.files];compressAll()}});

function compressAll(){
  const q=document.getElementById('quality').value;
  document.getElementById('qVal').textContent=q+'%';
  const out=document.getElementById('results');out.innerHTML='';
  if(!files.length)return;
  files.forEach((f,idx)=>{
    const img=new Image();
    img.onload=()=>{
      const c=document.createElement('canvas');c.width=img.width;c.height=img.height;
      c.getContext('2d').drawImage(img,0,0);
      c.toBlob(b=>{
        const url=URL.createObjectURL(b);
        const pct=((1-b.size/f.size)*100).toFixed(1);
        const card=document.createElement('div');
        card.className='result-card';
        card.innerHTML=`<img src="${url}"><div class="info">${f.name}</div>
          <div class="info">${t('original')} ${fmt(f.size)} → ${t('compressed')} <b>${fmt(b.size)}</b></div>
          <div class="saved">${t('saved')} ${pct}%</div>
          <button class="gz-btn" onclick="dl(${idx})">${t('download')}</button>`;
        out.appendChild(card);
      },'image/jpeg',q/100);
    };
    img.src=URL.createObjectURL(f);
  });
}

function dl(idx){
  const q=document.getElementById('quality').value;
  const img=new Image();
  img.onload=()=>{
    const c=document.createElement('canvas');c.width=img.width;c.height=img.height;
    c.getContext('2d').drawImage(img,0,0);
    c.toBlob(b=>{
      const a=document.createElement('a');a.href=URL.createObjectURL(b);
      a.download='compressed_'+files[idx].name;a.click();
    },'image/jpeg',q/100);
  };
  img.src=URL.createObjectURL(files[idx]);
}

function fmt(b){return b>1048576?(b/1048576).toFixed(1)+' MB':(b/1024).toFixed(1)+' KB'}

GZ.renderToolPage({category:'image',titleKey:'toolTitle',descKey:'toolDesc',
  howToSteps:['s1','s2','s3','s4'],
  related:[
    {href:'/image/png-compressor.html',icon:'🖼️',nameKey:'rPng'},
    {href:'/image/webp-compressor.html',icon:'🖼️',nameKey:'rWebp'},
    {href:'/image/converter.html',icon:'🔄',nameKey:'rConverter'},
    {href:'/image/resizer.html',icon:'📐',nameKey:'rResizer'}
  ]
});
</script>
