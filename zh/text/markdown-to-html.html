const { $, copyText, t } = GZ;

function mdToHtml(md) {
  let html = md;
  // Escape HTML entities first (but preserve markdown)
  html = html.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  // Fenced code blocks
  html = html.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) => `<pre><code class="language-${lang}">${code.trim()}</code></pre>`);
  // Inline code
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
  // Headings
  html = html.replace(/^######\s+(.+)$/gm, '<h6>$1</h6>');
  html = html.replace(/^#####\s+(.+)$/gm, '<h5>$1</h5>');
  html = html.replace(/^####\s+(.+)$/gm, '<h4>$1</h4>');
  html = html.replace(/^###\s+(.+)$/gm, '<h3>$1</h3>');
  html = html.replace(/^##\s+(.+)$/gm, '<h2>$1</h2>');
  html = html.replace(/^#\s+(.+)$/gm, '<h1>$1</h1>');
  // Horizontal rule
  html = html.replace(/^(-{3,}|\*{3,}|_{3,})$/gm, '<hr>');
  // Bold + Italic
  html = html.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
  html = html.replace(/___(.+?)___/g, '<strong><em>$1</em></strong>');
  html = html.replace(/__(.+?)__/g, '<strong>$1</strong>');
  html = html.replace(/_(.+?)_/g, '<em>$1</em>');
  // Strikethrough
  html = html.replace(/~~(.+?)~~/g, '<del>$1</del>');
  // Images
  html = html.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1">');
  // Links
  html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
  // Blockquote
  html = html.replace(/^&gt;\s+(.+)$/gm, '<blockquote>$1</blockquote>');
  // Unordered list
  html = html.replace(/^[-*+]\s+(.+)$/gm, '<li>$1</li>');
  html = html.replace(/((<li>.*<\/li>\n?)+)/g, '<ul>$1</ul>');
  // Ordered list
  html = html.replace(/^\d+\.\s+(.+)$/gm, '<li>$1</li>');
  // Table support
  html = html.replace(/^\|(.+)\|$/gm, (match, content) => {
    if (/^\|[\s-:|]+\|$/.test(match)) return '';
    const cells = content.split('|').map(c => c.trim());
    if (!match.match(/^\|[\s-:|]+\|$/)) {
      return '<tr>' + cells.map(c => `<td>${c}</td>`).join('') + '</tr>';
    }
    return '';
  });
  // Wrap table rows
  html = html.replace(/((<tr>.*<\/tr>\n?)+)/g, '<table>$1</table>');
  // Paragraphs (lines not already wrapped in tags)
  html = html.replace(/^(?!<[a-z/])(.+)$/gm, (_, line) => {
    if (line.trim()) return `<p>${line}</p>`;
    return '';
  });
  // Clean up empty paragraphs
  html = html.replace(/<p>\s*<\/p>/g, '');
  return html;
}

let currentTab = 'html';
function showTab(tab) {
  currentTab = tab;
  $('#panel-html').style.display = tab === 'html' ? '' : 'none';
  $('#panel-preview').style.display = tab === 'preview' ? '' : 'none';
  $('#tab-html').className = 'gz-btn gz-btn-sm' + (tab === 'html' ? '' : ' gz-btn-secondary');
  $('#tab-preview').className = 'gz-btn gz-btn-sm' + (tab === 'preview' ? '' : ' gz-btn-secondary');
}

function convert() {
  const md = $('#input').value;
  const html = mdToHtml(md);
  $('#panel-html').textContent = html;
  $('#preview').innerHTML = html;
}

$('#input').addEventListener('input', convert);
