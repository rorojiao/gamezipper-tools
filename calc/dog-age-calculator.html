<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"How do I calculate my dog's age in human years?","acceptedAnswer":{"@type":"Answer","text":"Enter your dog's actual age in years and select its size (small under 9kg, medium 9-22kg, large over 22kg). The calculator uses the AVMA-aligned method: the first year equals about 15 human years, the second about 9, and each additional year is 4-5 human years depending on breed size."}},{"@type":"Question","name":"Is the 1 dog year = 7 human years rule accurate?","acceptedAnswer":{"@type":"Answer","text":"No. The 7:1 rule is a myth. Dogs mature much faster than humans in their first two years — a 1-year-old dog is roughly 15 in human years, and a 2-year-old is about 24. After that, each dog year equals about 4-5 human years, with smaller breeds generally living longer."}},{"@type":"Question","name":"Why does dog size matter for age calculation?","acceptedAnswer":{"@type":"Answer","text":"Small dogs (under 9kg / 20lbs) age more slowly and live longer — often 15+ years. Large and giant breeds age faster and have shorter lifespans. A 10-year-old small dog is about 56 human years, while a 10-year-old large dog is closer to 66."}},{"@type":"Question","name":"What is a dog year?","acceptedAnswer":{"@type":"Answer","text":"A dog year is one calendar year of a dog's life. Because dogs age faster than humans, especially in their first two years, converting dog years to human years requires a size-aware formula rather than simple multiplication."}}]}</script>

<script>
GZI18n.register({
  en: {
    toolTitle: 'Dog Age Calculator',
    toolDesc: 'Convert dog years to human years accurately. Pick your dog\'s size to get a precise human-equivalent age and life stage.',
    calculate: 'Calculate',
    clear: 'Clear',
    ageLabel: 'Dog Age (years)',
    sizeLabel: 'Dog Size',
    small: 'Small (under 9 kg / 20 lb)',
    medium: 'Medium (9–22 kg / 20–50 lb)',
    large: 'Large (over 22 kg / 50 lb)',
    humanYears: 'Human Years',
    lifeStage: 'Life Stage',
    puppy: ' Puppy — rapid growth & socialization',
    adolescent: 'Adolescent — testing boundaries',
    adult: 'Adult — prime of life',
    senior: 'Senior — slowing down',
    geriatric: 'Geriatric — needs extra care',
    equivalentAge: 'Human-Equivalent Age',
    dogAge: 'Dog Age',
    chartTitle: 'Dog Age → Human Years Chart',
    step1: 'Enter your dog\'s age in years (use decimals like 0.5 for puppies)',
    step2: 'Select your dog\'s size: small, medium or large',
    step3: 'See the human-equivalent age update instantly',
    step4: 'Check the chart below for age milestones by size',
  },
  zh: {
    toolTitle: '狗狗年龄计算器',
    toolDesc: '准确将狗狗年龄换算为人类年龄。选择体型即可获得精确的人类等效年龄和生命阶段。',
    calculate: '计算',
    clear: '清除',
    ageLabel: '狗狗年龄（岁）',
    sizeLabel: '狗狗体型',
    small: '小型（9 公斤 / 20 磅以下）',
    medium: '中型（9–22 公斤 / 20–50 磅）',
    large: '大型（22 公斤 / 50 磅以上）',
    humanYears: '人类岁数',
    lifeStage: '生命阶段',
    puppy: '幼犬期 — 快速成长与社交期',
    adolescent: '青少年期 — 开始试探边界',
    adult: '成年期 — 黄金年龄',
    senior: '老年期 — 开始放缓',
    geriatric: '高龄期 — 需要额外照护',
    equivalentAge: '人类等效年龄',
    dogAge: '狗狗年龄',
    chartTitle: '狗狗年龄 → 人类岁数对照表',
    step1: '输入狗狗的年龄（幼犬可用 0.5 这样的数字）',
    step2: '选择狗狗体型：小型、中型或大型',
    step3: '即时查看人类等效年龄',
    step4: '查看下方对照表中各体型的年龄里程碑',
  }
});

const { $, copyText, t } = GZ;

// AVMA-aligned dog-to-human age formula by size
// Year 1 ≈ 15, Year 2 ≈ +9 (24 total), then +4 (small), +5 (medium), +6 (large) per year
function dogToHuman(age, size) {
  if (age <= 0) return 0;
  let human;
  if (age <= 1) {
    human = age * 15;
  } else if (age <= 2) {
    human = 15 + (age - 1) * 9;
  } else {
    const perYear = size === 'small' ? 4 : size === 'medium' ? 5 : 6;
    human = 24 + (age - 2) * perYear;
  }
  return Math.round(human * 10) / 10;
}

function getStage(age) {
  if (age < 1) return t('puppy');
  if (age < 2) return t('adolescent');
  if (age < 7) return t('adult');
  if (age < 12) return t('senior');
  return t('geriatric');
}

function getEmoji(size) {
  return size === 'small' ? '🐶' : size === 'large' ? '🐕‍🦺' : '🐕';
}

function autoCalc() {
  const age = parseFloat($('#dogAge')?.value);
  const size = $('#dogSize').value;
  $('#opt-small').textContent = t('small');
  $('#opt-medium').textContent = t('medium');
  $('#opt-large').textContent = t('large');
  if (!age || age <= 0) { $('#result').style.display = 'none'; $('#dogInfo').innerHTML = ''; return; }
  const human = dogToHuman(age, size);
  $('#dogEmoji').textContent = getEmoji(size);
  $('#humanAge').textContent = human;
  $('#lifeStage').textContent = getStage(age);
  $('#result').style.display = 'block';
  // info cards
  const mythAge = Math.round(age * 7 * 10) / 10;
  $('#dogInfo').innerHTML = `
    <div class="gz-dog-info-item"><strong>${t('dogAge')}</strong>${age} ${age >= 2 ? 'yrs' : 'yr'}</div>
    <div class="gz-dog-info-item"><strong>${t('equivalentAge')}</strong>~${human}</div>
    <div class="gz-dog-info-item"><strong>7× myth</strong>~${mythAge}</div>
  `;
  renderChart(age, size);
}

function renderChart(highlightAge, size) {
  $('#chartTitle').textContent = t('chartTitle');
  let rows = `<tr><th>${t('dogAge')}</th><th>🐶 ${t('small')}</th><th>🐕 ${t('medium')}</th><th>🐕‍🦺 ${t('large')}</th></tr>`;
  for (let a = 1; a <= 16; a++) {
    const hl = Math.round(highlightAge) === a ? ' class="highlight"' : '';
    rows += `<tr${hl}><td>${a}</td><td>${dogToHuman(a,'small')}</td><td>${dogToHuman(a,'medium')}</td><td>${dogToHuman(a,'large')}</td></tr>`;
  }
  $('#chartTable').innerHTML = rows;
}

function doClear() {
  $('#dogAge').value = '';
  $('#result').style.display = 'none';
  $('#dogInfo').innerHTML = '';
  renderChart(0, 'medium');
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="autoCalc()">${t('calculate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

renderChart(0, 'medium');

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🐱', href:'/calc/cat-age-calculator.html', name:'Cat Age'},
    {icon:'🎂', href:'/calc/age-calculator.html', name:'Age Calculator'},
    {icon:'⚖️', href:'/calc/bmi-calculator.html', name:'BMI'},
    {icon:'🏃', href:'/calc/race-time-predictor.html', name:'Race Predictor'},
  ]
});
</script>
