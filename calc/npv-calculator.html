<script>

    toolDesc: '计算任意投资的净现值 (NPV) 和内部收益率 (IRR)。输入初始投资、折现率和现金流 — 即时计算，100% 浏览器本地运行。',
    initialInvestment: '初始投资',
    discountRate: '折现率 (%)',
    cashFlows: '各年度现金流',
    addYear: '+ 添加年份',
    calculate: '计算',
    clear: '清除',
    year: '年份',
    cashFlow: '现金流',
    discountFactor: '折现系数',
    presentValue: '现值',
    result: '结果',
    npvLabel: 'NPV（净现值）',
    irrLabel: 'IRR（内部收益率）',
    profitability: '结论',
    profitable: '✓ 可盈利 — 接受该项目',
    notProfitable: '✗ 不可盈利 — 拒绝该项目',
    breakEven: '≈ 盈亏平衡',
    totalPV: '现金流总现值',
    step1: '输入初始投资金额（正数）',
    step2: '设置折现率（你的要求回报率或资本成本）',
    step3: '添加各年份预期现金流（流入为正）',
    step4: '点击「计算」查看 NPV、IRR 和逐年明细',
  }
});

const { $, t } = GZ;
let cashFlows = [-10000, 3000, 4000, 4000, 5000]; // index 0 = initial investment (Year 0)

function buildInputs() {
  $('#inputs').innerHTML = `
    <div class="npv-row">
      <span class="npv-label">${t('initialInvestment')}</span>
      <input type="number" id="inv" class="gz-input" value="10000" step="any" oninput="recalc()">
    </div>
    <div class="npv-row">
      <span class="npv-label">${t('discountRate')}</span>
      <input type="number" id="rate" class="gz-input" value="10" step="0.1" oninput="recalc()">
    </div>`;
  rebuildCashFlows();
}

function rebuildCashFlows() {
  const initInv = parseFloat($('#inv').value) || 0;
  // Ensure cashFlows[0] matches the input
  cashFlows[0] = -Math.abs(initInv);
  // If we have fewer than 5 inflow years, pad
  while (cashFlows.length < 5) cashFlows.push(0);

  let html = `<h3 style="margin:16px 0 6px;font-size:.95em">${t('cashFlows')}</h3>`;
  for (let i = 1; i < cashFlows.length; i++) {
    html += `<div class="npv-row">
      <span class="npv-label">${t('year')} ${i}</span>
      <input type="number" class="gz-input cf-input" data-idx="${i}" value="${cashFlows[i] || ''}" step="any" placeholder="0.00" oninput="recalc()">
    </div>`;
  }
  html += `<button class="gz-btn gz-btn-secondary" style="margin-top:6px" onclick="addYear()">${t('addYear')}</button>`;
  $('#cashflows').innerHTML = html;
}

function addYear() {
  const initInv = parseFloat($('#inv').value) || 0;
  cashFlows[0] = -Math.abs(initInv);
  // Read current values
  document.querySelectorAll('.cf-input').forEach(inp => {
    cashFlows[parseInt(inp.dataset.idx)] = parseFloat(inp.value) || 0;
  });
  cashFlows.push(0);
  rebuildCashFlows();
  recalc();
}

function recalc() {
  // Sync cashFlows from inputs
  const initInv = parseFloat($('#inv').value) || 0;
  cashFlows[0] = -Math.abs(initInv);
  document.querySelectorAll('.cf-input').forEach(inp => {
    cashFlows[parseInt(inp.dataset.idx)] = parseFloat(inp.value) || 0;
  });
  const rate = (parseFloat($('#rate').value) || 0) / 100;

  // Calculate PV for each year and NPV
  let npv = 0;
  const rows = [];
  for (let y = 0; y < cashFlows.length; y++) {
    const cf = cashFlows[y];
    const df = 1 / Math.pow(1 + rate, y);
    const pv = cf * df;
    npv += pv;
    rows.push({ year: y, cf, df, pv });
  }

  // Total PV of inflows only (years 1+)
  const totalPVinflows = rows.slice(1).reduce((s, r) => s + r.pv, 0);

  // IRR via bisection
  const irr = calcIRR(cashFlows);

  const verdict = npv > 0.01 ? `<span class="npv-pos">${t('profitable')}</span>`
    : npv < -0.01 ? `<span class="npv-neg">${t('notProfitable')}</span>`
    : t('breakEven');

  let tableHtml = `<table class="npv-table"><thead><tr>
    <th>${t('year')}</th><th>${t('cashFlow')}</th><th>${t('discountFactor')}</th><th>${t('presentValue')}</th>
  </tr></thead><tbody>`;
  rows.forEach(r => {
    const cls = r.pv >= 0 ? 'npv-pos' : 'npv-neg';
    tableHtml += `<tr>
      <td>${r.year === 0 ? '0 (initial)' : r.year}</td>
      <td>${formatMoney(r.cf)}</td>
      <td>${r.df.toFixed(4)}</td>
      <td class="${cls}">${formatMoney(r.pv)}</td>
    </tr>`;
  });
  tableHtml += `</tbody></table>`;

  $('#result').innerHTML = `
    ${tableHtml}
    <div class="npv-result ${npv >= 0 ? 'npv-pos' : 'npv-neg'}">${t('npvLabel')}: ${formatMoney(npv)}</div>
    <div class="npv-result" style="font-size:1.1em">${t('irrLabel')}: ${irr === null ? 'N/A' : (irr * 100).toFixed(2) + '%'}</div>
    <div style="margin-top:6px"><strong>${t('totalPV')}:</strong> ${formatMoney(totalPVinflows)}</div>
    <div style="margin-top:10px">${t('profitability')}: ${verdict}</div>`;
}

function calcIRR(cfs) {
  // Newton-Raphson then bisection fallback
  const npvAt = r => cfs.reduce((s, cf, i) => s + cf / Math.pow(1 + r, i), 0);
  // Check sign change
  let lo = -0.99, hi = 10;
  let nLo = npvAt(lo), nHi = npvAt(hi);
  if (isNaN(nLo) || isNaN(nHi)) return null;
  // Try expanding range
  if (nLo * nHi > 0) {
    // no sign change — check if all same sign
    if (Math.abs(nLo) < 1e-6) return lo;
    return null;
  }
  for (let i = 0; i < 200; i++) {
    const mid = (lo + hi) / 2;
    const nMid = npvAt(mid);
    if (Math.abs(nMid) < 1e-7) return mid;
    if (nLo * nMid < 0) { hi = mid; nHi = nMid; } else { lo = mid; nLo = nMid; }
  }
  return (lo + hi) / 2;
}

function formatMoney(v) {
  if (isNaN(v)) return '$0.00';
  const sign = v < 0 ? '-' : '';
  return sign + '$' + Math.abs(v).toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2});
}

function doClear() {
  $('#inv').value = '';
  $('#rate').value = '';
  document.querySelectorAll('.cf-input').forEach(inp => inp.value = '');
  $('#result').innerHTML = '';
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="recalc()">${t('calculate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

buildInputs();
recalc();

    {icon:'💵', href:'/calc/break-even-calculator.html', name:'Break-Even'},
  ]
});
</script>
