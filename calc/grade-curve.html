<script>
GZI18n.register({
  en: {
    toolTitle: 'Grade Curve Calculator',

      curvedAvg: 'Curved Avg',

    },

  },
  zh: {

    toolDesc: '使用线性、平方根、加分或缩放到目标平均分来调整班级成绩。输入原始分数，选择方法，查看调整后的成绩、字母等级、GPA 和分布直方图。',
    lblMax: '满分',
    lblMethod: '曲线方法',
    lblTarget: '目标平均/加分',
    lblBump: '加分幅度',
    lblScores: '分数（每行一个，或用逗号分隔）',
    rank: '#',
    raw: '原始',
    curved: '调整后',
    pct: '百分比',
    letter: '字母',
    gpa: 'GPA',
    calculate: '计算',
    example: '示例',
    clear: '清空',
    empty: '👈 在左侧输入分数，查看调整后的成绩、班级平均分和分布直方图。',
    summary: { count: '学生数', rawAvg: '原始平均', curvedAvg: '调整后平均', rawHigh: '原始最高', curvedHigh: '调整后最高', passing: '通过率' },
    step1: '设置满分（如 100）并选择曲线方法',
    step2: '在输入框中粘贴或输入学生分数',
    step3: '点击「计算」查看调整后的成绩和统计',
    step4: '通过直方图查看调整后的成绩分布',
  }
});

const { $, t } = GZ;
['#lbl-max','#lbl-method','#lbl-target','#lbl-bump','#lbl-scores','#th-raw','#th-curved','#th-pct','#th-letter','#th-gpa','#empty'].forEach(s => {});
$('#lbl-max').textContent = t('lblMax');
$('#lbl-method').textContent = t('lblMethod');
$('#lbl-target').textContent = t('lblTarget');
$('#lbl-bump').textContent = t('lblBump');
$('#lbl-scores').textContent = t('lblScores');
$('#th-raw').textContent = t('raw');
$('#th-curved').textContent = t('curved');
$('#th-pct').textContent = t('pct');
$('#th-letter').textContent = t('letter');
$('#th-gpa').textContent = t('gpa');
$('#empty').textContent = t('empty');

function letterFor(pct) {
  if (pct >= 93) return { l: 'A', g: 4.0, c: '#7fff7f' };
  if (pct >= 90) return { l: 'A-', g: 3.7, c: '#9fff9f' };
  if (pct >= 87) return { l: 'B+', g: 3.3, c: '#bfef7f' };
  if (pct >= 83) return { l: 'B', g: 3.0, c: '#dfdf7f' };
  if (pct >= 80) return { l: 'B-', g: 2.7, c: '#ffdf7f' };
  if (pct >= 77) return { l: 'C+', g: 2.3, c: '#ffbf7f' };
  if (pct >= 73) return { l: 'C', g: 2.0, c: '#ffbf7f' };
  if (pct >= 70) return { l: 'C-', g: 1.7, c: '#ff9f7f' };
  if (pct >= 67) return { l: 'D+', g: 1.3, c: '#ff7f7f' };
  if (pct >= 63) return { l: 'D', g: 1.0, c: '#ff7f9f' };
  if (pct >= 60) return { l: 'D-', g: 0.7, c: '#ff7fbf' };
  return { l: 'F', g: 0, c: '#bf7fff' };
}

function curve(scores, method, max, target, bump) {
  if (scores.length === 0) return [];
  const rawAvg = scores.reduce((a,b)=>a+b,0) / scores.length;
  const high = Math.max(...scores);

  return scores.map(s => {
    let curved = s;
    if (method === 'linear') {
      // Scale highest to 100
      curved = high > 0 ? s * (max / high) : 0;
    } else if (method === 'flatadd') {
      // Add bump points
      curved = Math.min(max, s + bump);
    } else if (method === 'sqrt') {
      // 10 * sqrt(score) — assumes 100-pt scale
      curved = 10 * Math.sqrt(s);
    } else if (method === 'scale-target') {
      // Multiply by target / rawAvg
      curved = rawAvg > 0 ? s * (target / rawAvg) : 0;
    }
    curved = Math.max(0, Math.min(max, curved));
    return { raw: s, curved, pct: (curved / max) * 100, letter: letterFor((curved / max) * 100) };
  });
}

function calc() {
  const txt = $('#scores').value;
  const scores = txt.split(/[\s,;\n]+/).map(s => parseFloat(s)).filter(s => !isNaN(s) && s >= 0);
  const max = parseFloat($('#maxScore').value) || 100;
  const method = $('#method').value;
  const target = parseFloat($('#targetAvg').value) || 75;
  const bump = parseFloat($('#bump').value) || 5;
  if (scores.length === 0) { $('#result-area').style.display = 'none'; $('#empty').style.display = 'block'; return; }
  $('#empty').style.display = 'none';
  $('#result-area').style.display = 'block';
  const rows = curve(scores, method, max, target, bump);
  const rawAvg = scores.reduce((a,b)=>a+b,0) / scores.length;
  const curvedAvg = rows.reduce((a,b)=>a+b.curved,0) / rows.length;
  const rawHigh = Math.max(...scores);
  const curvedHigh = Math.max(...rows.map(r => r.curved));
  const passing = (rows.filter(r => r.curved / max >= 0.6).length / rows.length * 100).toFixed(0);
  const S = t('summary');
  $('#summary').innerHTML = `
    <div class="summary-card"><div class="k">${S.count}</div><div class="v">${scores.length}</div></div>
    <div class="summary-card"><div class="k">${S.rawAvg}</div><div class="v">${rawAvg.toFixed(1)}</div></div>
    <div class="summary-card"><div class="k">${S.curvedAvg}</div><div class="v">${curvedAvg.toFixed(1)}</div></div>
    <div class="summary-card"><div class="k">${S.rawHigh}</div><div class="v">${rawHigh.toFixed(1)}</div></div>
    <div class="summary-card"><div class="k">${S.curvedHigh}</div><div class="v">${curvedHigh.toFixed(1)}</div></div>
    <div class="summary-card"><div class="k">${S.passing}</div><div class="v">${passing}%</div></div>
  `;
  // Histogram of curved grades (0-100 bins, 10 each)
  const bins = Array(10).fill(0);
  rows.forEach(r => { const b = Math.min(9, Math.floor(r.pct / 10)); bins[b]++; });
  const maxBin = Math.max(...bins, 1);
  $('#histogram').innerHTML = bins.map((c, i) => {
    const h = (c / maxBin * 100).toFixed(1);
    return `<div class="hist-bar" style="height:${h}%" title="${i*10}-${i*10+9}%: ${c}"><span class="lbl">${i*10}</span></div>`;
  }).join('');
  // Table
  $('#tbody').innerHTML = rows.map((r, i) => {
    const passClass = r.pct >= 60 ? '' : ' style="opacity:.65"';
    return `<tr${passClass}><td>${i+1}</td><td>${r.raw.toFixed(1)}</td><td>${r.curved.toFixed(1)}</td><td>${r.pct.toFixed(1)}%</td><td><span class="letter" style="background:${r.letter.c}">${r.letter.l}</span></td><td>${r.letter.g.toFixed(1)}</td></tr>`;
  }).join('');
}

$('#btn-calc').onclick = calc;
$('#btn-example').onclick = () => { $('#scores').value = '72\n85\n91\n67\n78\n84\n59\n88\n93\n76\n81\n70\n65\n90\n82'; calc(); };
$('#btn-clear').onclick = () => { $('#scores').value = ''; $('#result-area').style.display = 'none'; $('#empty').style.display = 'block'; };
$('#method').addEventListener('change', () => {
  const m = $('#method').value;
  $('#targetAvg').parentElement.style.display = (m === 'scale-target' || m === 'flatadd') ? '' : 'none';
  $('#bump').parentElement.style.display = (m === 'flatadd') ? '' : 'none';
});
$('#method').dispatchEvent(new Event('change'));

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {href:'/calc/gpa-calculator.html',icon:'🎓',name:'GPA Calculator'},
    {href:'/calc/grade-calculator.html',icon:'📊',name:'Grade Calculator'},
    {href:'/calc/final-grade-calculator.html',icon:'📝',name:'Final Grade Calculator'},
    {href:'/calc/percentage-calculator.html',icon:'%',name:'Percentage Calculator'},
  ]
});
</script>
