<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"How do I convert REM to PX?","acceptedAnswer":{"@type":"Answer","text":"Multiply the REM value by the base font size (default 16px). For example, 2rem × 16 = 32px."}},{"@type":"Question","name":"What is the default base font size?","acceptedAnswer":{"@type":"Answer","text":"The default base font size in most browsers is 16px. This tool uses 16px as the default but you can change it."}},{"@type":"Question","name":"Why use REM instead of PX?","acceptedAnswer":{"@type":"Answer","text":"REM units are relative to the root font size, making your design more accessible and scalable. Users who change their browser's default font size will see your layout scale proportionally."}},{"@type":"Question","name":"Can I batch convert multiple values?","acceptedAnswer":{"@type":"Answer","text":"Yes. Use the reference table below the converter to see common REM to PX conversions at a glance."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div style="max-width:600px;margin:0 auto">
      <div class="conv-row">
        <label id="lbl-base"></label>
        <input type="number" id="base-size" value="16" min="1" max="200" class="gz-input" style="max-width:100px">
        <span>px</span>
      </div>
      <div class="conv-row">
        <label>REM</label>
        <input type="number" id="rem-input" class="gz-input" step="0.001" placeholder="e.g. 1.5">
      </div>
      <div class="conv-row">
        <label>PX</label>
        <input type="number" id="px-input" class="gz-input" step="0.01" placeholder="e.g. 24">
      </div>
      <div id="formula" style="margin-top:12px;padding:12px;background:var(--glass);border-radius:10px;font-size:.88em;color:var(--text2)"></div>
      <table id="conversion-table">
        <thead><tr><th>REM</th><th>PX</th></tr></thead>

</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'REM ↔ PX Converter',
    toolDesc: 'Convert between REM and PX CSS units instantly with customizable base font size.',
    baseFontSize: 'Base Font Size',
    formulaText: 'Formula: PX = REM × Base Size | REM = PX ÷ Base Size',
    step1: 'Set the base font size (default is 16px)',
    step2: 'Enter a REM value to get PX, or enter a PX value to get REM',
    step3: 'Use the reference table for common conversions',
    step4: 'Click Copy to copy any converted value',
  },
  zh: {
    toolTitle: 'REM ↔ PX 单位转换器',
    toolDesc: '即时在 REM 和 PX CSS 单位之间转换，支持自定义基准字号。',
    baseFontSize: '基准字号',
    formulaText: '公式：PX = REM × 基准字号 | REM = PX ÷ 基准字号',
    step1: '设置基准字号（默认 16px）',
    step2: '输入 REM 值得到 PX，或输入 PX 值得到 REM',
    step3: '使用参考表查看常用转换',
    step4: '点击「复制」复制转换结果',
  }
});

const { $, copyText, t } = GZ;

function updateTable() {
  const base = parseFloat($('#base-size').value) || 16;
  const vals = [0.25, 0.5, 0.75, 1, 1.25, 1.5, 1.75, 2, 2.5, 3, 4, 5, 6, 8, 10];
  const tbody = $('#table-body');
  tbody.innerHTML = vals.map(r => {
    const px = (r * base).toFixed(2).replace(/\.?0+$/, '');
    return `<tr><td class="highlight-val">${r}rem</td><td>${px}px</td></tr>`;
  }).join('');
}

$('#rem-input').addEventListener('input', function() {
  const base = parseFloat($('#base-size').value) || 16;
  const rem = parseFloat(this.value);
  if (!isNaN(rem)) {
    const px = (rem * base).toFixed(4).replace(/\.?0+$/, '');
    $('#px-input').value = px;
    $('#formula').textContent = `${rem}rem × ${base}px = ${px}px`;
  }
});

$('#px-input').addEventListener('input', function() {
  const base = parseFloat($('#base-size').value) || 16;
  const px = parseFloat(this.value);
  if (!isNaN(px)) {
    const rem = (px / base).toFixed(4).replace(/\.?0+$/, '');
    $('#rem-input').value = rem;
    $('#formula').textContent = `${px}px ÷ ${base}px = ${rem}rem`;
  }
});

$('#base-size').addEventListener('input', function() {
  const rem = parseFloat($('#rem-input').value);
  const px = parseFloat($('#px-input').value);
  if (!isNaN(rem) && rem > 0) {
    $('#px-input').value = (rem * parseFloat(this.value || 16)).toFixed(4).replace(/\.?0+$/, '');
  } else if (!isNaN(px) && px > 0) {
    $('#rem-input').value = (px / parseFloat(this.value || 16)).toFixed(4).replace(/\.?0+$/, '');
  }
  updateTable();
});

$('#toolbar').innerHTML = `
  <button class="gz-btn gz-btn-secondary" onclick="$('#rem-input').value='';$('#px-input').value='';$('#formula').textContent='';">${t('clear')}</button>
  <button class="gz-btn" onclick="copyText($('#px-input').value||$('#rem-input').value)">${t('copy')}</button>`;

updateTable();

GZ.renderToolPage({
  category: 'dev',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🎨', href:'/css-tools/gradient.html', name:'CSS Gradient'},
    {icon:'📐', href:'/css-tools/flexbox.html', name:'Flexbox'},
    {icon:'🔢', href:'/convert/unit.html', name:'Unit Converter'},
    {icon:'📋', href:'/dev/json.html', name:'JSON Formatter'},
  ]
});
</script>
