<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is a Nonogram?", "acceptedAnswer": {"@type": "Answer", "text": "A Nonogram (also called Picross, Griddler or Hanjie) is a logic puzzle. Numbers next to each row and column tell you the lengths of consecutive filled blocks in that line. By combining the row and column clues you deduce which cells to fill to reveal a hidden picture."}}, {"@type": "Question", "name": "How do I read the clues?", "acceptedAnswer": {"@type": "Answer", "text": "A row clue of 3 1 means there is a block of 3 filled cells, then at least one empty gap, then a block of 1 filled cell, in that order. Each number is a run of consecutive filled cells; runs must be separated by at least one blank cell."}}, {"@type": "Question", "name": "Can I mark cells I know are empty?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. Switch to Cross mode (or right-click a cell) to mark a cell with an X, meaning you are certain it is blank. This helps you keep track of your deductions without accidentally filling wrong cells."}}, {"@type": "Question", "name": "Do the puzzles have a unique solution?", "acceptedAnswer": {"@type": "Answer", "text": "Every generated puzzle is designed to be solvable by pure logic — no guessing required. The hidden picture is revealed exactly when all correctly-filled cells match the solution."}}]}</script>

<script>
GZI18n.register({
  en: {
    toolTitle: 'Nonogram (Picross) Puzzle',
    toolDesc: 'Solve logic Nonogram puzzles. Use row and column number clues to fill the grid and reveal a hidden picture.',
    lblSize: 'Size',
    lblFill: 'Fill',
    lblCross: 'Cross',
    lblNew: 'New',
    msgPlay: 'Click cells to fill. Right-click to cross out.',
    msgWin: '🎉 Solved! Picture revealed!',
    step1: 'Pick a grid size: 5×5 (easy), 10×10 or 15×15 (hard)',
    step2: 'Left-click to fill a cell, right-click to mark it blank with ×',
    step3: 'Use row and column number clues — each number is a run of filled cells',
    step4: 'Fill all correct cells to reveal the hidden picture and win',
  },
  zh: {
    toolTitle: '数织 / Picross 逻辑拼图',
    toolDesc: '解开数织逻辑谜题。根据行和列的数字提示填充格子，揭示隐藏图案。',
    lblSize: '尺寸',
    lblFill: '填充',
    lblCross: '叉除',
    lblNew: '新题',
    msgPlay: '点击格子填充，右键标记为空白。',
    msgWin: '🎉 解开了！隐藏图案已显现！',
    step1: '选择网格尺寸：5×5（简单）、10×10 或 15×15（困难）',
    step2: '左键填充格子，右键用 × 标记确定为空',
    step3: '参考行和列的数字提示 — 每个数字代表一段连续填充的长度',
    step4: '填充所有正确格子即可揭示隐藏图案并获胜',
  }
});

const { $, t } = GZ;
let N = 10, solution = [], grid = [], mode = 'fill', solved = false;

function rnd(n){ const a=new Uint32Array(1); (window.crypto&&crypto.getRandomValues?crypto.getRandomValues(a):a[0]=Math.random()*4294967296); return a[0]%n; }

function genSolution(n){
  // generate a symmetric-ish random picture with ~55% density, ensure non-empty rows
  const s = [];
  for(let i=0;i<n;i++){ s.push(new Array(n).fill(0)); }
  const density = n<=5?0.6:n<=10?0.55:0.5;
  for(let r=0;r<n;r++) for(let c=0;c<n;c++) s[r][c] = Math.random()<density?1:0;
  // ensure not all empty
  let any = s.some(row=>row.some(v=>v));
  if(!any) s[0][0]=1;
  return s;
}

function lineClues(line){
  const clues = []; let run = 0;
  for(const v of line){ if(v) run++; else { if(run) clues.push(run); run=0; } }
  if(run) clues.push(run);
  return clues.length ? clues : [0];
}

function newPuzzle(){
  N = +$('#sizeSel').value;
  solution = genSolution(N);
  grid = []; for(let r=0;r<N;r++) grid.push(new Array(N).fill(0));
  solved = false;
  renderBoard();
  $('#msg').textContent = t('msgPlay'); $('#msg').className='ng-msg';
  updateProgress();
}

function setMode(m){
  mode = m;
  $('#modeFill').classList.toggle('active', m==='fill');
  $('#modeCross').classList.toggle('active', m==='cross');
}

function toggleCell(r,c,isRight){
  if(solved) return;
  const cur = grid[r][c]; // 0 empty, 1 filled, 2 crossed
  const useCross = isRight || mode==='cross';
  if(useCross){ grid[r][c] = cur===2?0:2; }
  else { grid[r][c] = cur===1?0:1; }
  renderCells(r,c);
  checkWin();
  updateProgress();
}

function renderCells(){
  // full re-render of cell states
  const cells = document.querySelectorAll('.ng-cell');
  cells.forEach(cell=>{
    const r=+cell.dataset.r, c=+cell.dataset.c, v=grid[r][c];
    cell.classList.toggle('filled', v===1);
    cell.classList.toggle('crossed', v===2);
  });
}

function checkWin(){
  for(let r=0;r<N;r++) for(let c=0;c<N;c++){
    const filled = grid[r][c]===1;
    if(filled !== (solution[r][c]===1)) return;
  }
  solved = true;
  $('#msg').textContent = t('msgWin'); $('#msg').className='ng-msg win';
}

function updateProgress(){
  let filled=0, target=0;
  for(let r=0;r<N;r++) for(let c=0;c<N;c++){ if(grid[r][c]===1) filled++; if(solution[r][c]) target++; }
  $('#progress').textContent = (GZI18n.getLang()==='zh'?'已填充':'Filled')+`: ${filled} / ${target}`;
}

function renderBoard(){
  const rowClues = [], colClues = [];
  for(let r=0;r<N;r++) rowClues.push(lineClues(solution[r]));
  for(let c=0;c<N;c++){ const col=[]; for(let r=0;r<N;r++) col.push(solution[r][c]); colClues.push(lineClues(col)); }
  const maxRow = Math.max(...rowClues.map(c=>c.length));
  const maxCol = Math.max(...colClues.map(c=>c.length));
  const gap = 0;
  const thick = (i)=> (N>=10 && (i+1)%5===0 && i+1!==N);
  let html = `<div style="display:inline-grid;grid-template-columns:auto repeat(${N},26px)">`;
  // top-left corner + column clues
  html += '<div></div>';
  for(let c=0;c<N;c++){
    html += `<div class="ng-clue" style="flex-direction:column;align-items:center;height:${maxCol*16}px;justify-content:flex-end">${colClues[c].map(n=>`<span>${n}</span>`).join('')}</div>`;
  }
  // rows
  for(let r=0;r<N;r++){
    html += `<div class="ng-clue" style="min-width:${maxRow*14}px;justify-content:flex-end">${rowClues[r].map(n=>`<span>${n}</span>`).join(' ')}</div>`;
    for(let c=0;c<N;c++){
      const cls = ['ng-cell'];
      if(thick(c)) cls.push('thick-r');
      if(thick(r)) cls.push('thick-b');
      html += `<div class="${cls.join(' ')}" data-r="${r}" data-c="${c}" onclick="toggleCell(${r},${c},false)" oncontextmenu="toggleCell(${r},${c},true);return false"></div>`;
    }
  }
  html += '</div>';
  $('#boardArea').innerHTML = html;
  renderCells();
}

$('#toolbar').innerHTML = '';
$('#lblSize').textContent = t('lblSize');
$('#lblFill').textContent = t('lblFill');
$('#lblCross').textContent = t('lblCross');
$('#lblNew').textContent = t('lblNew');

GZ.renderToolPage({
  category: 'fun',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🧠', href:'/fun/mastermind.html', name:'Mastermind'},
    {icon:'🔢', href:'/fun/guess-the-number.html', name:'Guess the Number'},
    {icon:'🟦', href:'/fun/sudoku.html', name:'Sudoku'},
    {icon:'🧩', href:'/fun/maze-generator.html', name:'Maze'},
  ]
});
newPuzzle();
</script>
