<script type="application/ld+json">{"@context":"https://***@type":"FAQPage","mainEntity":[{"@type":"Question","name":"What are mortgage points?","acceptedAnswer":{"@type":"Answer","text":"Mortgage points (also called discount points) are fees you pay upfront to your lender to lower your interest rate. One point costs 1% of your loan amount and typically reduces your rate by 0.25 percentage points (varies by lender and market)."}},{"@type":"Question","name":"When is the break-even point?","acceptedAnswer":{"@type":"Answer","text":"The break-even point is when the upfront cost of buying points equals the total monthly savings. If you sell the home or refinance before the break-even month, you lose money. If you stay past it, you save money every month thereafter."}},{"@type":"Question","name":"Are mortgage points tax-deductible?","acceptedAnswer":{"@type":"Answer","text":"Often yes. On a primary mortgage used to buy or build a primary residence, points are usually deductible in the year paid if you itemize. For refinances and second homes, points are typically deducted over the life of the loan. Always confirm with a tax professional."}},{"@type":"Question","name":"Should I buy points if I plan to move soon?","acceptedAnswer":{"@type":"Answer","text":"Generally no. If you expect to sell or refinance before the break-even point, paying points usually costs you more than you save. Use this calculator to compare your specific numbers — the verdict box will tell you whether buying makes sense given your expected time in the home."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>

  </div>
  <div class="gz-tool-area">

    <div class="mp-input">
      <label><span id="lbl-loan"></span><input type="number" id="loan" min="0" step="1000" value="400000" oninput="calc()"></label>
      <label><span id="lbl-rate"></span><input type="number" id="rate" min="0" step="0.01" value="7.0" oninput="calc()"></label>
      <label><span id="lbl-term"></span><select id="term" onchange="calc()">
        <option value="15">15 years</option>
        <option value="30" selected>30 years</option>
      </select></label>
      <label><span id="lbl-points"></span><input type="number" id="points" min="0" step="0.125" value="2" oninput="calc()"></label>
      <label><span id="lbl-perpoint"></span><input type="number" id="perpoint" min="0" step="0.01" value="0.25" oninput="calc()"></label>
      <label><span id="lbl-stay"></span><input type="number" id="stay" min="0" step="1" value="10" oninput="calc()"></label>
    </div>
    <div id="result"></div>
  </div>

</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Mortgage Points Calculator',
    toolDesc: 'Should you buy discount points? Compare upfront cost vs monthly savings, find the break-even month, and total savings over the loan.',
    loan: 'Loan Amount ($)',
    rate: 'Interest Rate (%)',
    term: 'Loan Term',
    points: 'Points to Buy',
    perpoint: 'Rate Cut per Point (%)',
    stay: 'Years in Home',
    calcBtn: 'Calculate',
    clear: 'Clear',
    verdictBuy: '✓ BUY the points',
    verdictSkip: '✗ SKIP the points',
    verdictTie: '≈ Break-even — either choice is fine',
    monthlyOld: 'Monthly Payment (no points)',
    monthlyNew: 'Monthly Payment (with points)',
    monthlySave: 'Monthly Savings',
    upfront: 'Upfront Cost of Points',
    breakeven: 'Break-even Month',
    breakevenYears: 'Break-even (years)',
    totalSaved: 'Total Saved Over Stay',
    roi: 'Return on Points',
    loseMoney: 'You would lose money over your planned stay.',
    saveMoney: 'You come out ahead over your planned stay.',
    step1: 'Enter your loan amount and current interest rate',
    step2: 'Set the points to buy and rate cut per point',
    step3: 'Enter how many years you plan to stay in the home',
    step4: 'Read the verdict — buy or skip — and the break-even analysis',
  },
  zh: {
    toolTitle: '房贷点数计算器',
    toolDesc: '该不该购买贴现点数？比较首付成本与月供节省，找出盈亏平衡点和整个贷款期内的总节省。',
    loan: '贷款金额（美元）',
    rate: '利率 (%)',
    term: '贷款年限',
    points: '购买点数',
    perpoint: '每点降息 (%)',
    stay: '居住年限',
    calcBtn: '计算',
    clear: '清空',
    verdictBuy: '✓ 建议购买点数',
    verdictSkip: '✗ 不建议购买',
    verdictTie: '≈ 刚好盈亏平衡 — 两种选择都行',
    monthlyOld: '月供（不买点数）',
    monthlyNew: '月供（购买点数）',
    monthlySave: '每月节省',
    upfront: '点数首付成本',
    breakeven: '盈亏平衡月',
    breakevenYears: '盈亏平衡（年）',
    totalSaved: '居住期内总节省',
    roi: '点数回报率',
    loseMoney: '按你的居住计划，购买点数会亏钱。',
    saveMoney: '按你的居住计划，购买点数更划算。',
    step1: '输入贷款金额和当前利率',
    step2: '设置购买的点数和每点降息',
    step3: '输入计划居住的年限',
    step4: '查看建议（买或不买）和盈亏平衡分析',
  }
});

const { $, t } = GZ;

['loan','rate','points','perpoint','stay'].forEach(id => $('#lbl-' + id).textContent = t(id === 'loan' ? 'loan' : id));
$('#lbl-term').textContent = t('term');

function monthlyPmt(P, annualRate, years) {
  const r = annualRate / 100 / 12;
  const n = years * 12;
  if (r === 0) return P / n;
  return P * r * Math.pow(1 + r, n) / (Math.pow(1 + r, n) - 1);
}

function fmt(n) {
  return '$' + (Math.abs(n) < 0.005 ? '0' : n.toLocaleString(undefined, { minimumFractionDigits: 0, maximumFractionDigits: 0 }));
}

function calc() {
  const loan   = parseFloat($('#loan').value)   || 0;
  const rate   = parseFloat($('#rate').value)   || 0;
  const term   = parseInt($('#term').value, 10) || 30;
  const pts    = parseFloat($('#points').value) || 0;
  const cut    = parseFloat($('#perpoint').value) || 0.25;
  const stayY  = parseFloat($('#stay').value)   || 0;
  if (loan <= 0 || rate <= 0) { $('#result').innerHTML = ''; return; }

  const newRate = Math.max(0, rate - pts * cut);
  const mOld = monthlyPmt(loan, rate, term);
  const mNew = monthlyPmt(loan, newRate, term);
  const save = mOld - mNew;
  const cost = loan * pts / 100;
  const beMonths = save > 0 ? cost / save : Infinity;
  const stayMonths = stayY * 12;
  const totalSave = save * stayMonths - cost;
  const roi = cost > 0 ? (totalSave / cost * 100) : 0;

  let verdict, cls, msg;
  if (!isFinite(beMonths) || beMonths <= 0) {
    verdict = t('verdictSkip'); cls = 'skip'; msg = t('loseMoney');
  } else if (stayMonths >= beMonths) {
    verdict = t('verdictBuy'); cls = 'buy'; msg = t('saveMoney');
  } else {
    verdict = t('verdictSkip'); cls = 'skip'; msg = t('loseMoney');
  }
  if (Math.abs(stayMonths - beMonths) <= 1) { verdict = t('verdictTie'); cls = 'neutral'; }

  $('#result').innerHTML = `
    <div class="mp-verdict ${cls}">${verdict} — ${msg}</div>
    <div class="mp-grid">
      <div class="mp-card"><div class="v">${fmt(mOld)}</div><div class="l">${t('monthlyOld')}</div></div>
      <div class="mp-card"><div class="v">${fmt(mNew)}</div><div class="l">${t('monthlyNew')}</div></div>
      <div class="mp-card"><div class="v">${fmt(save)}</div><div class="l">${t('monthlySave')}</div></div>
      <div class="mp-card"><div class="v">${fmt(cost)}</div><div class="l">${t('upfront')}</div></div>
      <div class="mp-card"><div class="v">${isFinite(beMonths) ? Math.ceil(beMonths) : '∞'}</div><div class="l">${t('breakeven')}</div></div>
      <div class="mp-card"><div class="v" style="color:${totalSave >= 0 ? '#66bb6a' : '#ef5350'}">${fmt(totalSave)}</div><div class="l">${t('totalSaved')}</div></div>
    </div>
    <div class="mp-row">
      <div class="mp-col">
        <h4>${t('monthlyOld')} → ${t('monthlyNew')}</h4>
        <div class="row"><span>${rate.toFixed(2)}%</span><b>${fmt(mOld)}</b></div>
        <div class="row"><span>${newRate.toFixed(2)}%</span><b>${fmt(mNew)}</b></div>
        <div class="row"><span>${t('monthlySave')}</span><b>${fmt(save)}</b></div>
      </div>
      <div class="mp-col">
        <h4>${t('breakeven')}</h4>
        <div class="row"><span>${t('breakeven')}</span><b>${isFinite(beMonths) ? Math.ceil(beMonths) + ' mo' : '∞'}</b></div>
        <div class="row"><span>${t('breakevenYears')}</span><b>${isFinite(beMonths) ? (beMonths/12).toFixed(1) + ' yr' : '∞'}</b></div>
        <div class="row"><span>${t('roi')}</span><b>${roi.toFixed(0)}%</b></div>
      </div>
    </div>`;
}

function doClear() {
  ['loan','rate','points','perpoint','stay'].forEach(id => $('#' + id).value = '');
  $('#result').innerHTML = '';
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="calc()">${t('calcBtn')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

calc(); // initial render with defaults

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🏠', href:'/calc/mortgage-payoff-calculator.html', name:'Mortgage Payoff'},
    {icon:'💰', href:'/calc/amortization-schedule-calculator.html', name:'Amortization'},
    {icon:'🏦', href:'/calc/pmi-calculator.html', name:'PMI'},
    {icon:'📈', href:'/calc/compound-interest-calculator.html', name:'Compound Interest'},
  ]
});
</script>

</body>
