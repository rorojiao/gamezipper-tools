// Jargon → plain English. Phrases first (longest match), then single words.

const PHRASES = Object.keys(JARGON).filter(k=>k.includes(' ')).sort((a,b)=>b.length-a.length);
const WORDS = Object.keys(JARGON).filter(k=>!k.includes(' '));

function escapeHtml(s){return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

function escapeRe(s){return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');}

function analyze(autoRewrite){
  const text = $('#input').value;
  const out = $('#output');
  if (!text.trim()){ out.innerHTML=`<p style="color:var(--text2)">${escapeHtml(t('empty'))}</p>`; $('#stats').innerHTML=''; return; }

  let html = escapeHtml(text);
  const found = [];
  const seen = new Set();

  // Replace phrases first (longest first), then single words. Case-insensitive.
  const allTerms = [...PHRASES, ...WORDS];
  for (const term of allTerms){
    const plain = JARGON[term];
    const re = new RegExp('\\b'+escapeRe(term)+'\\b','gi');
    if (!re.test(html)) continue;
    // reset lastIndex
    re.lastIndex = 0;
    if (!seen.has(term.toLowerCase())){ found.push({term, plain}); seen.add(term.toLowerCase()); }
    if (autoRewrite){
      html = html.replace(re, `<span class="rewrite">${plain}</span>`);
    } else {
      html = html.replace(re, m=>`<span class="jargon" title="${escapeHtml(plain)}">${m}</span>`);
    }
  }

  const totalWords = (text.match(/\b\w+\b/g)||[]).length;
  const jargonCount = found.length;
  // Clarity: each buzzword costs 4 points. Clean text scores 100.
  let clarity = Math.max(0, Math.round(100 - jargonCount * 4));

  $('#stats').innerHTML = `
    <span class="stat">📊 <strong>${clarity}/100</strong> ${escapeHtml(t('clarity'))}</span>
    <span class="stat">⚠️ <strong>${jargonCount}</strong> ${escapeHtml(t('found'))}</span>
    <span class="stat">📝 <strong>${totalWords}</strong> ${escapeHtml(t('words'))}</span>
    <div class="clarity-bar"><div class="clarity-fill" style="width:${clarity}%"></div></div>`;

  out.innerHTML = html;

  if (jargonCount>0){
    const list = found.map(f=>`<div class="j-item"><b>${escapeHtml(f.term)}</b><span class="arrow">→</span><span class="plain">${escapeHtml(f.plain)}</span></div>`).join('');
    out.innerHTML += `<div class="j-list"><div style="font-size:.85rem;font-weight:700;margin-bottom:4px">${escapeHtml(t('suggestions'))}:</div>${list}</div>`;
  } else if (!autoRewrite){
    out.innerHTML += `<p style="color:#00d672;font-size:.85rem;margin-top:8px">${escapeHtml(t('noJargon'))}</p>`;
  }
}

function loadExample(){
  $('#input').value = `Hi team — I wanted to circle back on our Q3 deliverables. We need to leverage our cross-functional synergies and take this offline for a deep dive. Let's identify the low-hanging fruit, move the needle on our key metrics, and think outside the box. The goal is a win-win that creates real value-add for our stakeholders. Can we touch base Monday to ideate actionable next steps and align on the go-to-market strategy?`;
  analyze(false);
}
