<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "How do I calculate my gas mileage?", "acceptedAnswer": {"@type": "Answer", "text": "Fill your tank completely, reset your trip odometer, drive normally, then fill up again. Divide the miles driven by gallons used to get your MPG."}}, {"@type": "Question", "name": "What is good gas mileage?", "acceptedAnswer": {"@type": "Answer", "text": "For a gas car, 25-30 MPG is average, 30-40 MPG is good, and 40+ MPG is excellent. Hybrid vehicles can achieve 50+ MPG."}}, {"@type": "Question", "name": "How do I convert MPG to L/100km?", "acceptedAnswer": {"@type": "Answer", "text": "Divide 235.215 by your MPG value. For example, 30 MPG = 235.215 / 30 = 7.84 L/100km."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-input-group">
      <div><label id="lbl-distance"></label><input type="number" id="distance" min="0" step="any" value="400"></div>
      <div><label id="lbl-fuel"></label><input type="number" id="fuel" min="0" step="any" value="12"></div>
      <div><label id="lbl-price"></label><input type="number" id="price" min="0" step="0.01" value="3.50"></div>
      <div><label id="lbl-annual"></label><input type="number" id="annual" min="0" step="100" value="12000"></div>
    </div>
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="gz-result-card" id="results"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Gas Mileage Calculator',
    toolDesc: 'Calculate your fuel efficiency (MPG or L/100km), cost per mile and annual fuel expenses.',
    distance: 'Distance driven',
    fuel: 'Fuel used (gallons)',
    price: 'Gas price ($/gallon)',
    annual: 'Annual miles driven',
    miles: 'miles',
    gallons: 'gallons',
    calculate: 'Calculate',
    mpg: 'MPG',
    costPerMile: 'Cost per mile',
    annualCost: 'Annual fuel cost',
    annualFuel: 'Annual fuel used',
    perGallon: '/gallon',
    lper100: 'L/100km',
    kml: 'km/L',
    step1: 'Enter the distance you drove since your last fill-up',
    step2: 'Enter how many gallons of fuel you used',
    step3: 'Optionally enter gas price for cost calculations',
    step4: 'Click Calculate to see your fuel efficiency stats',
  },
  zh: {
    toolTitle: '油耗计算器',
    toolDesc: '计算你的燃油效率（MPG 或 L/100km）、每英里成本和年度燃油支出。',
    distance: '行驶距离',
    fuel: '燃油消耗量（加仑）',
    price: '油价（$/加仑）',
    annual: '年行驶里程',
    miles: '英里',
    gallons: '加仑',
    calculate: '计算',
    mpg: 'MPG',
    costPerMile: '每英里成本',
    annualCost: '年度燃油费',
    annualFuel: '年度燃油用量',
    perGallon: '/加仑',
    lper100: 'L/100km',
    kml: 'km/L',
    step1: '输入上次加油后的行驶距离',
    step2: '输入加油量（加仑）',
    step3: '可选输入油价用于费用计算',
    step4: '点击「计算」查看燃油效率统计',
  }
});

const { $, t } = GZ;

$('#lbl-distance').textContent = t('distance') + ' (' + t('miles') + ')';
$('#lbl-fuel').textContent = t('fuel');
$('#lbl-price').textContent = t('price');
$('#lbl-annual').textContent = t('annual');

function calc() {
  const dist = parseFloat($('#distance').value) || 0;
  const fuel = parseFloat($('#fuel').value) || 0;
  const price = parseFloat($('#price').value) || 0;
  const annual = parseFloat($('#annual').value) || 0;

  if (dist <= 0 || fuel <= 0) {
    $('#results').innerHTML = '<p style="text-align:center;color:var(--text2)">Enter distance and fuel to calculate.</p>';
    return;
  }

  const mpg = dist / fuel;
  const l100 = 235.215 / mpg;
  const kml = mpg * 0.425144;
  const costMile = price > 0 ? (price * fuel / dist) : 0;
  const annualFuel = annual > 0 ? (annual / mpg) : 0;
  const annualCost = annual > 0 ? (annualFuel * price) : 0;

  let html = '<div class="gz-result-grid">';
  html += `<div class="gz-result-item"><div class="val">${mpg.toFixed(1)}</div><div class="unit">${t('mpg')}</div></div>`;
  html += `<div class="gz-result-item"><div class="val">${l100.toFixed(1)}</div><div class="unit">${t('lper100')}</div></div>`;
  html += `<div class="gz-result-item"><div class="val">${kml.toFixed(1)}</div><div class="unit">${t('kml')}</div></div>`;
  if (price > 0) {
    html += `<div class="gz-result-item"><div class="val">$${costMile.toFixed(3)}</div><div class="unit">${t('costPerMile')}</div></div>`;
  }
  if (annual > 0) {
    html += `<div class="gz-result-item"><div class="val">${annualFuel.toFixed(1)}</div><div class="unit">${t('annualFuel')} ${t('gallons')}</div></div>`;
    if (price > 0) {
      html += `<div class="gz-result-item"><div class="val">$${annualCost.toFixed(0)}</div><div class="unit">${t('annualCost')}</div></div>`;
    }
  }
  html += '</div>';
  $('#results').innerHTML = html;
}

$('#toolbar').innerHTML = `<button class="gz-btn" onclick="calc()">${t('calculate')}</button>`;
calc();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'⛽', href:'/calc/fuel-cost-calculator.html', name:'Fuel Cost'},
    {icon:'🚗', href:'/calc/speed-distance-time.html', name:'Speed Calc'},
    {icon:'💰', href:'/calc/expense-tracker.html', name:'Expense Tracker'},
    {icon:'⚡', href:'/calc/electricity-cost.html', name:'Electricity Cost'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
