const CATS = [
  {id:'all', icon:'🎲'},
  {id:'dad', icon:'👨'},
  {id:'prog', icon:'💻'},
  {id:'one', icon:'💬'},
];
const EMOJI = {dad:'👨', prog:'💻', one:'💬'};
let cat = 'all';
let lastIdx = -1;
let shown = 0;

function pool() {
  const lang = GZI18n.getLang() === 'zh' ? 'zh' : 'en';
  const src = JOKES[lang];
  if (cat === 'all') {
    return Object.keys(src).flatMap(k => src[k].map(j => ({...j, tag:k})));
  }
  return src[cat].map(j => ({...j, tag:cat}));
}

function pick() {
  const arr = pool();
  if (!arr.length) return null;
  let i;
  do { i = Math.floor(Math.random() * arr.length); } while (arr.length > 1 && i === lastIdx);
  lastIdx = i;
  return arr[i];
}

function render() {
  const j = pick();
  if (!j) return;
  $('#emoji').textContent = EMOJI[j.tag] || '😂';
  $('#tag').textContent = t(j.tag);
  $('#setup').textContent = j.s || '';
  $('#punch').textContent = j.p;
  shown++;
  $('#counter').textContent = (GZI18n.getLang()==='zh' ? `已为你讲了 ${shown} 个笑话 🎉` : `${shown} jokes told so far 🎉`);
}

function buildCats() {
  $('#cats').innerHTML = CATS.map(c =>
    `<button class="cat-btn${c.id===cat?' active':''}" data-c="${c.id}">${c.icon} ${t(c.id)}</button>`).join('');
  GZ.$$('#cats .cat-btn').forEach(b => b.onclick = () => { cat = b.dataset.c; lastIdx=-1; buildCats(); render(); });
}

function shareJoke() {
  const txt = ($('#setup').textContent ? $('#setup').textContent + ' ' : '') + $('#punch').textContent;
  if (navigator.share) {
    navigator.share({title: 'GameZipper Joke', text: txt}).catch(()=>{});
  } else {
    copyText(txt);
  }
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="render()">🎲 ${t('generate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="copyText(($('#setup').textContent?$('#setup').textContent+' ':'')+$('#punch').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="shareJoke()">↗ ${t('generate')==='生成'?'分享':'Share'}</button>`;

buildCats();
render();
