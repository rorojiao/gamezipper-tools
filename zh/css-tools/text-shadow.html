<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <input type="text" class="gz-text-input" id="previewTextInput" value="Text Shadow">
    <div class="gz-preview-box">
      <div class="gz-preview-text" id="preview">Text Shadow</div>
    </div>
    <div class="gz-controls" id="controls"></div>
    <div class="gz-layers" id="layers"></div>
    <div class="gz-code-output" id="codeOutput"></div>
  </div>

  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'CSS Text Shadow Generator',
    toolDesc: 'Create beautiful text shadow effects visually. Adjust offsets, blur and color with live preview.',
    addLayer: '+ Add Layer',
    copyCode: 'Copy CSS',
    reset: 'Reset',
    previewText: 'Preview Text',
    hOffset: 'Horizontal Offset',
    vOffset: 'Vertical Offset',
    blur: 'Blur Radius',
    color: 'Shadow Color',
    opacity: 'Opacity',
    remove: 'Remove',
    shadowLayer: 'Shadow Layer',
    copied: 'Copied!',
    step1: 'Adjust shadow offset, blur and color using the controls',
    step2: 'Click "Add Layer" to stack multiple shadows for complex effects',
    step3: 'Edit the preview text to see how shadows look on your content',
    step4: 'Copy the generated CSS code and paste it into your project',
  },
  zh: {
    toolTitle: 'CSS 文字阴影生成器',
    toolDesc: '可视化创建精美的文字阴影效果。调整偏移、模糊和颜色，实时预览效果。',
    addLayer: '+ 添加图层',
    copyCode: '复制 CSS',
    reset: '重置',
    previewText: '预览文字',
    hOffset: '水平偏移',
    vOffset: '垂直偏移',
    blur: '模糊半径',
    color: '阴影颜色',
    opacity: '不透明度',
    remove: '删除',
    shadowLayer: '阴影图层',
    copied: '已复制！',
    step1: '通过控件调整阴影偏移、模糊和颜色',
    step2: '点击「添加图层」叠加多个阴影实现复杂效果',
    step3: '编辑预览文字，查看阴影在你的内容上的效果',
    step4: '复制生成的 CSS 代码并粘贴到你的项目中',
  }
});

const { $, copyText, t } = GZ;

let layers = [
  { x: 2, y: 2, blur: 4, color: '#000000', opacity: 0.7 }
];

function renderControls() {
  const c = $('#controls');
  if (layers.length === 0) {
    c.innerHTML = '<p style="opacity:.6;grid-column:1/-1;text-align:center">No layers. Click "+ Add Layer" to add one.</p>';
    return;
  }
  const l = layers[0];
  c.innerHTML = `
    <label>${t('hOffset')}<input type="range" min="-50" max="50" value="${l.x}" oninput="layers[0].x=+this.value;update()"><span id="xVal">${l.x}px</span></label>
    <label>${t('vOffset')}<input type="range" min="-50" max="50" value="${l.y}" oninput="layers[0].y=+this.value;update()"><span id="yVal">${l.y}px</span></label>
    <label>${t('blur')}<input type="range" min="0" max="100" value="${l.blur}" oninput="layers[0].blur=+this.value;update()"><span id="bVal">${l.blur}px</span></label>
    <label>${t('color')}<input type="color" value="${l.color}" oninput="layers[0].color=this.value;update()"></label>
    <label>${t('opacity')}<input type="range" min="0" max="100" value="${Math.round(l.opacity*100)}" oninput="layers[0].opacity=+this.value/100;update()"><span id="oVal">${Math.round(l.opacity*100)}%</span></label>
  `;
}

function renderLayers() {
  const el = $('#layers');
  el.innerHTML = layers.map((l, i) => {
    if (i === 0) return '';
    return `<div class="gz-layer-item">
      <span>${t('shadowLayer')} ${i + 1}</span>
      <input type="color" class="gz-layer-color" value="${l.color}" oninput="layers[${i}].color=this.value;update()">
      <span>X:${l.x} Y:${l.y} B:${l.blur}</span>
      <button onclick="layers.splice(${i},1);renderLayers();update()">${t('remove')}</button>
    </div>`;
  }).join('');
}

function hexToRgba(hex, opacity) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${opacity})`;
}

function getShadowCSS() {
  return layers.map(l => `${l.x}px ${l.y}px ${l.blur}px ${hexToRgba(l.color, l.opacity)}`).join(',\n    ');
}

function update() {
  const shadow = getShadowCSS();
  const preview = $('#preview');
  preview.style.textShadow = shadow;
  const css = `text-shadow:\n    ${shadow};`;
  $('#codeOutput').textContent = css;
  // Update value displays for first layer
  const xVal = document.getElementById('xVal');
  const yVal = document.getElementById('yVal');
  const bVal = document.getElementById('bVal');
  const oVal = document.getElementById('oVal');
  if (xVal && layers[0]) { xVal.textContent = layers[0].x + 'px'; }
  if (yVal && layers[0]) { yVal.textContent = layers[0].y + 'px'; }
  if (bVal && layers[0]) { bVal.textContent = layers[0].blur + 'px'; }
  if (oVal && layers[0]) { oVal.textContent = Math.round(layers[0].opacity * 100) + '%'; }
  renderLayers();
}

$('#previewTextInput').addEventListener('input', function() {
  $('#preview').textContent = this.value || 'Text Shadow';
});

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="layers.push({x:2,y:2,blur:4,color:'#000000',opacity:0.5});update()">${t('addLayer')}</button>
  <button class="gz-btn" onclick="copyText($('#codeOutput').textContent)">${t('copyCode')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="layers=[{x:2,y:2,blur:4,color:'#000000',opacity:0.7}];renderControls();update()">${t('reset')}</button>`;

renderControls();
update();

GZ.renderToolPage({
  category: 'css',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🔲', href:'/css-tools/shadow.html', name:'Box Shadow'},
    {icon:'🌈', href:'/css-tools/gradient.html', name:'Gradient'},
    {icon:'📐', href:'/css-tools/flexbox.html', name:'Flexbox'},
    {icon:'✂️', href:'/css-tools/clip-path.html', name:'Clip-Path'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
