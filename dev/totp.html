const {$,t,copyText}=GZ;

const B32='ABCDEFGHIJKLMNOPQRSTUVWXYZ234567';
function b32Decode(str){
  let clean=str.toUpperCase().replace(/\s/g,'').replace(/=+$/,'').replace(/-/g,'');
  if(!clean) throw new Error('empty');
  // pad to multiple of 8
  while(clean.length%8!==0) clean+='=';
  if(!/^[A-Z2-7]*=*$/.test(clean.replace(/=+$/,'')+('='.repeat((8-clean.length%8)%8)))) {}
  let bits='',bytes=[];
  for(const ch of clean){if(ch==='=')break;const idx=B32.indexOf(ch);if(idx<0)throw new Error('bad');bits+=idx.toString(2).padStart(5,'0');}
  for(let i=0;i+8<=bits.length;i+=8) bytes.push(parseInt(bits.slice(i,i+8),2));
  return new Uint8Array(bytes);
}

async function hmacSha1(key,msg){
  const ck=await crypto.subtle.importKey('raw',key,{name:'HMAC',hash:'SHA-1'},false,['sign']);
  return new Uint8Array(await crypto.subtle.sign('HMAC',ck,msg));
}
function intToBytes(n){
  const b=new Uint8Array(8);
  for(let i=7;i>=0;i--){b[i]=n&0xff;n=Math.floor(n/256);}
  return b;
}
async function totp(secretBytes, period=30, digits=6){
  const counter=Math.floor(Date.now()/1000/period);
  const msg=intToBytes(counter);
  const hash=await hmacSha1(secretBytes,msg);
  const offset=hash[hash.length-1]&0xf;
  const bin=((hash[offset]&0x7f)<<24)|((hash[offset+1]&0xff)<<16)|((hash[offset+2]&0xff)<<8)|(hash[offset+3]&0xff);
  return (bin%Math.pow(10,digits)).toString().padStart(digits,'0');
}

const STORAGE_KEY='gz_totp_accounts_v1';
let accounts=[];
try{accounts=JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]');}catch(e){accounts=[];}
function save(){localStorage.setItem(STORAGE_KEY,JSON.stringify(accounts));}

function parseSecretInput(raw){
  raw=raw.trim();
  if(raw.toLowerCase().startsWith('otpauth://')){
    // otpauth://totp/Issuer:account?secret=XXX&issuer=YYY
    try{
      const u=new URL(raw);
      const path=decodeURIComponent(u.pathname.replace(/^\//,''));
      const params=u.searchParams;
      const secret=params.get('secret');
      const issuer=params.get('issuer')||path.split(':')[0]||'Account';
      const label=path.includes(':')?path.split(':')[1]:path||issuer;
      return {name:`${issuer} (${label})`, secret: secret||''};
    }catch(e){throw new Error(t('invalidOtpauth'));}
  }
  return {name:'', secret: raw};
}

async function addAccount(){
  let name=$('#accName').value.trim();
  const rawSecret=$('#accSecret').value.trim();
  if(!rawSecret){alert(t('badSecret'));return;}
  let parsed;
  try{parsed=parseSecretInput(rawSecret);}catch(e){alert(e.message);return;}
  if(!name) name=parsed.name||'Account';
  if(!parsed.secret){alert(t('badSecret'));return;}
  // validate by trying to decode
  try{b32Decode(parsed.secret);}catch(e){alert(t('badSecret'));return;}
  accounts.push({id:Date.now()+'-'+Math.random().toString(36).slice(2,6),name,secret:parsed.secret.toUpperCase()});
  save();
  $('#accName').value='';$('#accSecret').value='';
  renderAccounts();
}

function removeAccount(id){
  accounts=accounts.filter(a=>a.id!==id);
  save();
  renderAccounts();
}
function clearAllAccounts(){
  if(!accounts.length)return;
  if(confirm(t('confirmClear'))){accounts=[];save();renderAccounts();}
}
function exportAccounts(){
  if(!accounts.length)return;
  const blob=new Blob([JSON.stringify(accounts,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='totp-backup.json';a.click();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
}
function importAccounts(ev){
  const f=ev.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=()=>{
    try{
      const arr=JSON.parse(r.result);
      if(Array.isArray(arr)){
        // dedupe by secret+name
        arr.forEach(a=>{if(a.secret&&!accounts.find(x=>x.secret===a.secret&&x.name===a.name)){
          accounts.push({id:Date.now()+'-'+Math.random().toString(36).slice(2,6),name:a.name||'Account',secret:a.secret.toUpperCase()});
        }});
        save();renderAccounts();
        GZ.showToast('✓ '+(arr.length)+' imported');
      }
    }catch(e){alert('Invalid JSON backup');}
  };
  r.readAsText(f);ev.target.value='';
}

const RING_R=24, RING_C=2*Math.PI*RING_R;

async function renderAccounts(){
  const wrap=$('#accounts');
  if(!accounts.length){
    wrap.innerHTML=`<div class="gz-empty">${t('noAccounts')}</div>`;
    return;
  }
  // Build DOM
  wrap.innerHTML='';
  for(const a of accounts){
    const card=document.createElement('div');
    card.className='code-card';
    card.dataset.id=a.id;
    card.innerHTML=`
      <div class="label">${escapeHtml(a.name)}</div>
      <div class="code" data-masked="${$('#hideCodes').checked?'1':'0'}">${$('#hideCodes').checked?'••••••':''}</div>
      <div class="countdown">
        <svg class="progress-ring" width="54" height="54"><circle class="bg" cx="27" cy="27" r="${RING_R}"></circle><circle class="fg" cx="27" cy="27" r="${RING_R}" stroke-dasharray="${RING_C}" stroke-dashoffset="0"></circle></svg>
        <div class="lbl"><span class="num">30</span> <span>${t('seconds')}</span></div>
      </div>
      <button class="remove" title="remove">✕</button>`;
    card.querySelector('.remove').onclick=()=>removeAccount(a.id);
    card.querySelector('.code').onclick=(e)=>{
      const codeEl=e.currentTarget;
      if(codeEl.dataset.masked==='1'){codeEl.dataset.masked='0';codeEl.textContent=codeEl.dataset.code||'';setTimeout(()=>{codeEl.dataset.masked='1';codeEl.textContent='••••••';},3000);return;}
      if(codeEl.textContent&&codeEl.dataset.code){copyText(codeEl.dataset.code);GZ.showToast('✓ '+t('copied'));}
    };
    wrap.appendChild(card);
  }
  await tickAll();
}

function escapeHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

async function tickAll(){
  const now=Math.floor(Date.now()/1000);
  const secondsIntoStep=now%30;
  const remaining=30-secondsIntoStep;
  const cards=$('#accounts').querySelectorAll('.code-card');
  for(const card of cards){
    const id=card.dataset.id;
    const acc=accounts.find(a=>a.id===id);
    if(!acc)continue;
    let secretBytes;
    try{secretBytes=b32Decode(acc.secret);}catch(e){card.querySelector('.code').textContent='——';continue;}
    const code=await totp(secretBytes);
    const codeEl=card.querySelector('.code');
    codeEl.dataset.code=code;
    if(codeEl.dataset.masked!=='1') codeEl.textContent=code;
    const numEl=card.querySelector('.countdown .num');
    numEl.textContent=remaining;
    const ring=card.querySelector('.progress-ring .fg');
    const pct=remaining/30;
    ring.style.strokeDashoffset=RING_C*(1-pct);
    card.classList.toggle('expiring', remaining<=5);
  }
}

let timer=null;
function startTimer(){
  if(timer) clearInterval(timer);
  timer=setInterval(tickAll,1000);
}

$('#lblName').textContent=t('lblName');
$('#lblSecret').textContent=t('lblSecret');
