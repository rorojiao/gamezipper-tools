const { $, t } = GZ;
let frames = [];
let gifBlob = null;

// Simple GIF Encoder (minimal LZW-based GIF89a writer)
class GIFEncoder {
  constructor(w, h) {
    this.w = w; this.h = h;
    this.frames = [];
    this.delay = 100;
    this.repeat = 0;
  }
  setDelay(ms) { this.delay = Math.round(ms / 10); }
  setRepeat(n) { this.repeat = n; }
  addFrame(ctx) {
    const imgData = ctx.getImageData(0, 0, this.w, this.h);
    const pixels = imgData.data;
    // Quantize to 256 colors using median cut (simplified)
    const palette = this._quantize(pixels);
    const indexed = this._mapPixels(pixels, palette);
    this.frames.push({ palette, indexed });
  }
  _quantize(pixels) {
    const colorMap = {};
    for (let i = 0; i < pixels.length; i += 4) {
      const r = pixels[i] >> 4, g = pixels[i+1] >> 4, b = pixels[i+2] >> 4;
      const key = (r << 8) | (g << 4) | b;
      if (!colorMap[key]) colorMap[key] = [pixels[i], pixels[i+1], pixels[i+2], 0];
      colorMap[key][3]++;
    }
    const sorted = Object.values(colorMap).sort((a,b) => b[3] - a[3]);
    const palette = [];
    for (let i = 0; i < 256 && i < sorted.length; i++) {
      palette.push([sorted[i][0], sorted[i][1], sorted[i][2]]);
    }
    while (palette.length < 256) palette.push([0,0,0]);
    return palette;
  }
  _mapPixels(pixels, palette) {
    const indexed = new Uint8Array(this.w * this.h);
    for (let i = 0; i < pixels.length; i += 4) {
      const r = pixels[i], g = pixels[i+1], b = pixels[i+2];
      let best = 0, bestDist = Infinity;
      for (let j = 0; j < 256; j++) {
        const dr = r - palette[j][0], dg = g - palette[j][1], db = b - palette[j][2];
        const d = dr*dr + dg*dg + db*db;
        if (d < bestDist) { bestDist = d; best = j; }
      }
      indexed[i/4] = best;
    }
    return indexed;
  }
  finish() {
    const buf = [];
    const write = (b) => buf.push(b);
    const writeS = (s) => { for (let i = 0; i < s.length; i++) write(s.charCodeAt(i)); };
    const write16 = (v) => { write(v & 0xff); write((v >> 8) & 0xff); };
    // Header
    writeS('GIF89a');
    write16(this.w); write16(this.h);
    write(0xf7); // GCT flag, 8 bits color resolution, 256 colors
    write(0); // bg color
    write(0); // aspect ratio
    // Global Color Table (first frame palette)
    const gpal = this.frames[0]?.palette || Array(256).fill([0,0,0]);
    for (const c of gpal) { write(c[0]); write(c[1]); write(c[2]); }
    // Netscape extension for looping
    write(0x21); write(0xff);
    write(11); writeS('NETSCAPE2.0');
    write(3); write(1);
    write16(this.repeat < 0 ? 0 : this.repeat);
    write(0);
    // Frames
    for (let fi = 0; fi < this.frames.length; fi++) {
      const frame = this.frames[fi];
      write(0x21); write(0xf9); // Graphics Control Extension
      write(4);
      write(0x08); // dispose: restore to bg
      write16(this.delay);
      write(0); // transparent color index
      write(0);
      // Image Descriptor
      write(0x2c);
      write16(0); write16(0); write16(this.w); write16(this.h);
      write(0); // no local color table, use global
      // LZW Minimum Code Size
      const minCodeSize = 8;
      write(minCodeSize);
      // LZW compressed data
      const lzwData = this._lzwEncode(frame.indexed, minCodeSize);
      let pos = 0;
      while (pos < lzwData.length) {
        const chunk = lzwData.slice(pos, pos + 255);
        write(chunk.length);
        for (const b of chunk) write(b);
        pos += 255;
      }
      write(0); // block terminator
    }
    write(0x3b); // Trailer
    return new Uint8Array(buf);
  }
  _lzwEncode(indexed, minCodeSize) {
    const clearCode = 1 << minCodeSize;
    const eoiCode = clearCode + 1;
    let codeSize = minCodeSize + 1;
    let nextCode = eoiCode + 1;
    const dict = new Map();
    const output = [];
    let bitBuf = 0, bitCount = 0;
    const writeBits = (code, size) => {
      bitBuf |= (code << bitCount);
      bitCount += size;
      while (bitCount >= 8) { output.push(bitBuf & 0xff); bitBuf >>= 8; bitCount -= 8; }
    };
    // Init dict
    const resetDict = () => {
      dict.clear();
      for (let i = 0; i < clearCode; i++) dict.set(String(i), i);
      nextCode = eoiCode + 1;
      codeSize = minCodeSize + 1;
    };
    resetDict();
    writeBits(clearCode, codeSize);
    let prev = '';
    for (let i = 0; i < indexed.length; i++) {
      const cur = String(indexed[i]);
      const combined = prev ? prev + ',' + cur : cur;
      if (dict.has(combined)) {
        prev = combined;
      } else {
        writeBits(dict.get(prev), codeSize);
        if (nextCode < 4096) {
          dict.set(combined, nextCode++);
          if (nextCode > (1 << codeSize) && codeSize < 12) codeSize++;
        } else {
          writeBits(clearCode, codeSize);
          resetDict();
        }
        prev = cur;
      }
    }
    if (prev) writeBits(dict.get(prev), codeSize);
    writeBits(eoiCode, codeSize);
    if (bitCount > 0) output.push(bitBuf & 0xff);
    return output;
  }
}

const canvas = $('#canvas');
const ctx = canvas.getContext('2d');
const fileInput = $('#fileInput');
const framesEl = $('#frames');

function renderFrames() {
  framesEl.innerHTML = '';
  if (frames.length === 0) {
    framesEl.innerHTML = `<p style="color:var(--text2);text-align:center;width:100%;padding:20px">${t('dropHere')}</p>`;
    return;
  }
  frames.forEach((f, i) => {
    const div = document.createElement('div');
    div.className = 'frame';
    div.draggable = true;
    div.dataset.index = i;
    div.innerHTML = `<img src="${f.url}" alt="Frame ${i+1}"><button class="rm" title="Remove">×</button><span class="idx">${i+1}</span>`;
    div.querySelector('.rm').onclick = (e) => { e.stopPropagation(); URL.revokeObjectURL(f.url); frames.splice(i, 1); renderFrames(); };
    div.ondragstart = (e) => { e.dataTransfer.setData('text/plain', i); div.style.opacity = '0.4'; };
    div.ondragend = () => { div.style.opacity = '1'; };
    div.ondragover = (e) => { e.preventDefault(); };
    div.ondrop = (e) => { e.preventDefault(); e.stopPropagation(); const from = parseInt(e.dataTransfer.getData('text/plain')); const to = i; if (from !== to) { const item = frames.splice(from, 1)[0]; frames.splice(to, 0, item); renderFrames(); } };
    framesEl.appendChild(div);
  });
}

fileInput.onchange = (e) => {
  for (const file of e.target.files) {
    if (!file.type.startsWith('image/')) continue;
    frames.push({ url: URL.createObjectURL(file), img: null });
    const img = new Image();
    img.onload = () => { frames[frames.length - 1].img = img; };
    img.src = frames[frames.length - 1].url;
  }
  fileInput.value = '';
  renderFrames();
};

// Drag and drop on frames area
framesEl.ondragover = (e) => { e.preventDefault(); framesEl.classList.add('dragover'); };
framesEl.ondragleave = () => framesEl.classList.remove('dragover');
framesEl.ondrop = (e) => {
  e.preventDefault();
  framesEl.classList.remove('dragover');
  for (const file of e.dataTransfer.files) {
    if (!file.type.startsWith('image/')) continue;
    const url = URL.createObjectURL(file);
    frames.push({ url, img: null });
    const img = new Image();
    img.onload = () => { const last = frames.find(f => f.url === url); if (last) last.img = img; };
    img.src = url;
  }
  renderFrames();
};

async function generateGIF() {
  if (frames.length < 2) { alert(t('noFrames')); return; }
  $('#status').textContent = t('generating');
  await new Promise(r => setTimeout(r, 50));

  const delayVal = parseInt(document.getElementById('delaySlider').value) || 200;
  const widthVal = parseInt(document.getElementById('widthInput').value) || 400;
  const loopVal = parseInt(document.getElementById('loopInput').value) || 0;

  // Wait for all images to load
  for (const f of frames) {
    if (!f.img) {
      f.img = await new Promise(resolve => { const img = new Image(); img.onload = () => resolve(img); img.src = f.url; });
    }
  }

  // Calculate uniform dimensions
  const maxW = widthVal;
  let maxH = 0;
  for (const f of frames) {
    const scale = maxW / f.img.naturalWidth;
    const h = Math.round(f.img.naturalHeight * scale);
    if (h > maxH) maxH = h;
  }

  canvas.width = maxW;
  canvas.height = maxH;
  const encoder = new GIFEncoder(maxW, maxH);
  encoder.setDelay(delayVal);
  encoder.setRepeat(loopVal === 0 ? 0 : loopVal);

  for (const f of frames) {
    ctx.clearRect(0, 0, maxW, maxH);
    const scale = maxW / f.img.naturalWidth;
    const h = Math.round(f.img.naturalHeight * scale);
    const y = Math.round((maxH - h) / 2);
    ctx.drawImage(f.img, 0, y, maxW, h);
    encoder.addFrame(ctx);
  }

  const data = encoder.finish();
  gifBlob = new Blob([data], { type: 'image/gif' });
  const url = URL.createObjectURL(gifBlob);
  const preview = $('#preview');
  preview.src = url;
  preview.hidden = false;
  const sizeKB = (gifBlob.size / 1024).toFixed(1);
  $('#status').innerHTML = `<span style="color:var(--gz-success)">${t('done')}${sizeKB} KB</span>`;
}

function downloadGIF() {
  if (!gifBlob) return;
  const a = document.createElement('a');
  a.href = URL.createObjectURL(gifBlob);
  a.download = 'animation.gif';
  a.click();
}

function clearAll() {
  frames.forEach(f => URL.revokeObjectURL(f.url));
  frames = [];
  gifBlob = null;
  $('#preview').hidden = true;
  $('#status').textContent = '';
  renderFrames();
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="$('#fileInput').click()">${t('addImages')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="clearAll()">${t('clearAll')}</button>`;

$('#controls').innerHTML = `
  <label>${t('frameDelay')}: <input type="range" id="delaySlider" min="50" max="2000" value="200" step="50" oninput="document.getElementById('delayVal').textContent=this.value"> <span id="delayVal">200</span>${t('ms')}</label>
  <label>${t('width')}: <input type="number" id="widthInput" value="400" min="50" max="2000" step="50">${t('px')}</label>
  <label>${t('loop')}: <input type="number" id="loopInput" value="0" min="0" max="100" step="1" title="0 = ${t('infinite')}"> <small>(0=${t('infinite')})</small></label>
  <button class="gz-btn" onclick="generateGIF()">${t('generateGIF')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="downloadGIF()">${t('downloadGIF')}</button>`;

renderFrames();
