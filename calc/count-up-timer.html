<div class="gz-container">

  <div class="gz-tool-area">

<script>
GZI18n.register({
  en: {
    toolTitle: 'Count Up Timer',
    toolDesc: 'Free online count up timer and stopwatch with millisecond precision. Record lap times, label events and track elapsed duration — all in your browser.',
    start: 'Start',
    pause: 'Pause',
    lap: 'Lap',
    reset: 'Reset',
    laps: 'Lap Times',
    noLaps: 'No laps recorded yet.',
    eventPlaceholder: 'Label this timer (optional)...',
    running: 'Running',
    paused: 'Paused',
    ready: 'Ready',
    step1: 'Optionally type a label for what you are timing',
    step2: 'Press Start to begin counting up from zero',
    step3: 'Press Lap to record split times while running',
    step4: 'Press Reset to clear the timer and all laps',
  },
  zh: {
    toolTitle: '正向计时器',
    toolDesc: '免费在线正向计时器和秒表，毫秒级精度。记录圈数、标记事件并跟踪经过的时间 — 全部在浏览器中完成。',
    start: '开始',
    pause: '暂停',
    lap: '计圈',
    reset: '重置',
    laps: '圈数记录',
    noLaps: '还没有记录。',
    eventPlaceholder: '为计时添加标签（可选）...',
    running: '运行中',
    paused: '已暂停',
    ready: '就绪',
    step1: '可选：输入你要计时的事项标签',
    step2: '点击「开始」从零开始正向计时',
    step3: '运行中点击「计圈」记录分段时间',
    step4: '点击「重置」清除计时器和所有圈数',
  }
});

const { $, copyText, t } = GZ;
let running = false;
let startTime = 0;
let pausedElapsed = 0;
let rafId = null;
let laps = [];
let lastLapTime = 0;

function fmt(ms) {
  const totalSec = ms / 1000;
  const h = Math.floor(totalSec / 3600);
  const m = Math.floor((totalSec % 3600) / 60);
  const s = Math.floor(totalSec % 60);
  const cs = Math.floor((ms % 1000) / 10);
  const main = h > 0 ? `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}` : `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  return { main, ms: String(cs).padStart(2,'0') };
}

function getElapsed() {
  if (running) return performance.now() - startTime + pausedElapsed;
  return pausedElapsed;
}

function update() {
  const elapsed = getElapsed();
  const f = fmt(elapsed);
  $('#time').innerHTML = `${f.main}<span class="cu-ms">.${f.ms}</span>`;
  if (running) rafId = requestAnimationFrame(update);
}

function start() {
  if (running) return;
  running = true;
  startTime = performance.now();
  $('#label').textContent = t('running');
  update();
  renderControls();
}

function pause() {
  if (!running) return;
  running = false;
  pausedElapsed = getElapsed();
  if (rafId) cancelAnimationFrame(rafId);
  $('#label').textContent = t('paused');
  renderControls();
}

function reset() {
  running = false;
  pausedElapsed = 0;
  laps = [];
  lastLapTime = 0;
  if (rafId) cancelAnimationFrame(rafId);
  $('#time').innerHTML = `00:00<span class="cu-ms">.00</span>`;
  $('#label').textContent = t('ready');
  renderLaps();
  renderControls();
}

function lap() {
  if (!running) return;
  const now = getElapsed();
  const diff = now - lastLapTime;
  laps.unshift({ num: laps.length + 1, total: now, diff });
  lastLapTime = now;
  renderLaps();
}

function renderLaps() {
  if (laps.length === 0) {
    $('#laps').innerHTML = `<p style="opacity:.5;font-size:.85em">${t('noLaps')}</p>`;
    return;
  }
  // find best/worst diff
  let best = -1, worst = -1;
  if (laps.length > 1) {
    laps.forEach((l, i) => {
      if (best === -1 || l.diff < laps[best].diff) best = i;
      if (worst === -1 || l.diff > laps[worst].diff) worst = i;
    });
  }
  $('#laps').innerHTML = laps.map((l, i) => {
    const ft = fmt(l.total), fd = fmt(l.diff);
    let badge = '';
    if (laps.length > 1 && i === best) badge = ' 🏆';
    if (laps.length > 1 && i === worst) badge = ' 🔴';
    return `<div class="cu-lap-item">
      <span class="cu-lap-num">${t('lap').charAt(0)}${l.num}${badge}</span>
      <span style="font-weight:600">${ft.main}.${ft.ms}</span>
      <span class="cu-lap-diff">+${fd.main}.${fd.ms}</span>
    </div>`;
  }).join('');
}

function renderControls() {
  if (running) {
    $('#controls').innerHTML = `<button class="cu-btn" onclick="lap()">${t('lap')}</button><button class="cu-btn secondary" onclick="pause()">${t('pause')}</button><button class="cu-btn secondary" onclick="reset()">${t('reset')}</button>`;
  } else {
    $('#controls').innerHTML = `<button class="cu-btn" onclick="start()">${t('start')}</button><button class="cu-btn secondary" onclick="reset()">${t('reset')}</button>`;
  }
}

// init
$('#eventName').placeholder = t('eventPlaceholder');
$('#lapTitle').textContent = t('laps');
$('#label').textContent = t('ready');
renderControls();
renderLaps();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'⏰', href:'/calc/countdown-timer.html', name:'Countdown Timer'},
    {icon:'📚', href:'/calc/study-timer.html', name:'Study Timer'},
    {icon:'🧘', href:'/calc/meditation-timer.html', name:'Meditation Timer'},
    {icon:'⏱️', href:'/calc/timer-stopwatch.html', name:'Stopwatch'},
  ]
});
</script>
