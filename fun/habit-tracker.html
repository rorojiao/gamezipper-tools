<style>
.ht-add{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.ht-add input{padding:8px 12px;border:1px solid var(--border);border-radius:8px;background:var(--bg);color:var(--text);font-size:.95em;flex:1;min-width:180px}
.ht-add button{padding:8px 14px;border:none;border-radius:8px;background:var(--accent);color:#000;font-weight:700;cursor:pointer}
.ht-list{display:grid;gap:10px;margin-bottom:14px}
.ht-habit{background:var(--glass2);border:1px solid var(--border);border-radius:10px;padding:12px;display:grid;grid-template-columns:auto 1fr auto;gap:10px;align-items:center}
.ht-habit .ht-emoji{font-size:1.6em;width:36px;text-align:center;cursor:pointer}
.ht-habit .ht-info h4{margin:0;font-size:1em}
.ht-habit .ht-info .ht-streak{font-size:.8em;opacity:.75;margin-top:2px}
.ht-habit .ht-check{width:32px;height:32px;border-radius:8px;border:2px solid var(--border);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1.1em}
.ht-habit.checked-today .ht-check{background:var(--accent);border-color:var(--accent);color:#000}

.ht-cal{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-top:10px}
.ht-cal .day{aspect-ratio:1;border-radius:4px;background:var(--glass);display:flex;align-items:center;justify-content:center;font-size:.7em;position:relative}
.ht-cal .day.done{background:var(--accent);color:#000}
.ht-cal .day.missed{background:rgba(255,107,107,.15);color:var(--accent)}
.ht-cal .day.today{outline:2px solid var(--accent)}
.ht-cal-header{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;font-size:.7em;opacity:.6;text-align:center;margin-bottom:3px}
.ht-progress{height:6px;background:var(--glass);border-radius:3px;overflow:hidden;margin-top:6px}
.ht-progress .bar{height:100%;background:var(--accent);transition:width .3s}
.ht-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px;margin-bottom:14px}
.ht-stat{background:var(--glass2);border:1px solid var(--border);border-radius:8px;padding:10px;text-align:center}
.ht-stat .num{font-size:1.4em;font-weight:700;color:var(--accent)}
.ht-stat .lbl{font-size:.75em;opacity:.7}
</style>

<script type="application/ld+json">{"@context":"https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "How does the habit tracker work?", "acceptedAnswer": {"@type": "Answer", "text": "Add habits you want to build (exercise, reading, meditation, etc.) and mark them complete each day. The tool tracks your streaks, shows your progress on a calendar heatmap, and stores everything in your browser's local storage."}}, {"@type": "Question", "name": "Is my data private?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. All habit data is stored in your browser's local storage and never leaves your device. There is no account, no signup and no server. To backup your data, use the Export button to download a JSON file you can save anywhere."}}, {"@type": "Question", "name": "What is a streak?", "acceptedAnswer": {"@type": "Answer", "text": "A streak is the number of consecutive days you've completed a habit. The longest streak shows your personal best, while the current streak shows how many days in a row you're on right now. Missing a day resets the current streak."}}, {"@type": "Question", "name": "Can I edit a habit after creating it?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. Click the emoji next to a habit to cycle through different icons. Click the habit name to rename it. Use the X button to delete a habit and all its history."}}]}</script>

<div class="gz-container">
  <div class="gz-tool-header"><h1 id="title"></h1><p class="desc" id="desc"></p></div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="ht-add">
      <input type="text" id="newName" placeholder="+ New habit (e.g. Read 30 min)">
      <button id="addBtn">Add</button>
    </div>
    <div class="ht-stats" id="stats"></div>
    <div class="ht-list" id="list"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Habit Tracker',
    toolDesc: 'Build good habits and break bad ones. Track daily streaks, visualize progress on a calendar heatmap, and stay consistent. Data is stored locally in your browser.',
    add: 'Add',
    today: 'Today',
    streak: 'streak',
    best: 'Best',
    total: 'Total',
    day: 'day',
    days: 'days',
    completedToday: 'Completed today',
    longestStreak: 'Longest streak',
    habitsTracked: 'Habits tracked',
    export: 'Export',
    import: 'Import',
    exportFilename: 'habits.json',
    step1: 'Type a habit name and press Add',
    step2: 'Click the circle next to a habit each day you complete it',
    step3: 'Watch your streak grow day by day',
    step4: 'Use the calendar view to see your full history',
  },
  zh: {
    toolTitle: '习惯追踪器',
    toolDesc: '养成好习惯，戒掉坏习惯。追踪每日连续打卡，日历热力图可视化进度 — 数据完全存储在本地浏览器中。',
    add: '添加',
    today: '今天',
    streak: '连续',
    best: '最佳',
    total: '累计',
    day: '天',
    days: '天',
    completedToday: '今日已完成',
    longestStreak: '最长连续',
    habitsTracked: '追踪习惯',
    export: '导出',
    import: '导入',
    exportFilename: 'habits.json',
    step1: '输入习惯名称后点击添加',
    step2: '每天完成时点击习惯旁边的圆圈',
    step3: '看着你的连续天数一天天增长',
    step4: '使用日历视图查看完整历史',
  }
});

const {$, t} = GZ;
const EMOJIS = ['💪','📚','🏃','🧘','💧','🍎','😴','✍️','🎯','🧠','🎨','🎵','🧹','💻','🚴','🧗','🏊','⚽','🧶','🌱'];
const STORAGE_KEY = 'gz_habit_tracker_v1';

function todayKey() { return new Date().toISOString().slice(0,10); }
function load() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {habits:[]}; }
  catch(e) { return {habits:[]}; }
}
function save(d) { localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); }

function currentStreak(h) {
  const done = new Set(h.done || []);
  let s = 0;
  const d = new Date();
  while (true) {
    const k = d.toISOString().slice(0,10);
    if (done.has(k)) { s++; d.setDate(d.getDate()-1); }
    else break;
  }
  return s;
}
function longestStreak(h) {
  const dates = (h.done || []).slice().sort();
  if (!dates.length) return 0;
  let best = 1, cur = 1;
  for (let i = 1; i < dates.length; i++) {
    const prev = new Date(dates[i-1]);
    const curr = new Date(dates[i]);
    if ((curr - prev) / 86400000 === 1) { cur++; best = Math.max(best, cur); }
    else cur = 1;
  }
  return best;
}

function render() {
  const data = load();
  const list = $('#list');
  const today = todayKey();
  if (!data.habits.length) {
    list.innerHTML = '<div style="text-align:center;padding:30px;color:var(--text2);background:var(--glass2);border-radius:10px">No habits yet. Add your first one above ↑</div>';
  } else {
    list.innerHTML = data.habits.map((h, i) => {
      const checked = (h.done||[]).includes(today);
      const cs = currentStreak(h);
      const ls = longestStreak(h);
      return `
        <div class="ht-habit ${checked?'checked-today':''}">
          <div class="ht-emoji" data-i="${i}" title="Click to change emoji">${h.emoji||'💪'}</div>
          <div class="ht-info">
            <h4 data-i="${i}" class="ht-name" style="cursor:pointer" title="Click to rename">${h.name}</h4>
            <div class="ht-streak">🔥 ${cs} ${t('day')}  ·  🏆 ${ls} ${t('best')}  ·  ${(h.done||[]).length} ${t('total')}</div>
            <div class="ht-cal-header">
              ${['S','M','T','W','T','F','S'].map(d => `<div>${d}</div>`).join('')}
            </div>
            <div class="ht-cal">
              ${renderCal(h)}
            </div>
          </div>
          <div style="display:flex;flex-direction:column;gap:6px;align-items:center">
            <button class="ht-check" data-i="${i}" title="${checked ? 'Uncheck' : 'Check today'}">${checked ? '✓' : ''}</button>
            <button class="ht-del" data-i="${i}" title="Delete">✕</button>
          </div>
        </div>`;
    }).join('');
  }
  renderStats();
  bind();
}

function renderCal(h) {
  const done = new Set(h.done || []);
  const today = new Date();
  const cells = [];
  // 35 days back (5 weeks)
  for (let i = 34; i >= 0; i--) {
    const d = new Date(today);
    d.setDate(d.getDate() - i);
    const k = d.toISOString().slice(0,10);
    const isToday = k === todayKey();
    const isFuture = d > today;
    let cls = 'day';
    if (done.has(k)) cls += ' done';
    if (isToday) cls += ' today';
    cells.push(`<div class="${cls}" title="${k}">${d.getDate()}</div>`);
  }
  return cells.join('');
}

function renderStats() {
  const data = load();
  const today = todayKey();
  const totalDone = data.habits.filter(h => (h.done||[]).includes(today)).length;
  const maxStreak = data.habits.reduce((m, h) => Math.max(m, longestStreak(h)), 0);
  $('#stats').innerHTML = `
    <div class="ht-stat"><div class="num">${totalDone}/${data.habits.length}</div><div class="lbl">${t('completedToday')}</div></div>
    <div class="ht-stat"><div class="num">${maxStreak}</div><div class="lbl">${t('longestStreak')}</div></div>
    <div class="ht-stat"><div class="num">${data.habits.length}</div><div class="lbl">${t('habitsTracked')}</div></div>
  `;
}

function bind() {
  document.querySelectorAll('.ht-check').forEach(b => {
    b.addEventListener('click', () => {
      const i = parseInt(b.dataset.i);
      const data = load();
      const h = data.habits[i];
      h.done = h.done || [];
      const today = todayKey();
      const idx = h.done.indexOf(today);
      if (idx >= 0) h.done.splice(idx, 1);
      else h.done.push(today);
      save(data);
      render();
    });
  });
  document.querySelectorAll('.ht-del').forEach(b => {
    b.addEventListener('click', () => {
      if (!confirm('Delete this habit and all its history?')) return;
      const i = parseInt(b.dataset.i);
      const data = load();
      data.habits.splice(i, 1);
      save(data);
      render();
    });
  });
  document.querySelectorAll('.ht-emoji').forEach(b => {
    b.addEventListener('click', () => {
      const i = parseInt(b.dataset.i);
      const data = load();
      const cur = EMOJIS.indexOf(data.habits[i].emoji);
      data.habits[i].emoji = EMOJIS[(cur+1) % EMOJIS.length];
      save(data);
      render();
    });
  });
  document.querySelectorAll('.ht-name').forEach(b => {
    b.addEventListener('click', () => {
      const i = parseInt(b.dataset.i);
      const data = load();
      const nv = prompt('Rename habit:', data.habits[i].name);
      if (nv && nv.trim()) {
        data.habits[i].name = nv.trim();
        save(data);
        render();
      }
    });
  });
}

$('#addBtn').addEventListener('click', () => {
  const v = $('#newName').value.trim();
  if (!v) return;
  const data = load();
  data.habits.push({name: v, emoji: EMOJIS[data.habits.length % EMOJIS.length], done: []});
  save(data);
  $('#newName').value = '';
  render();
});
$('#newName').addEventListener('keydown', e => { if (e.key === 'Enter') $('#addBtn').click(); });

$('#toolbar').innerHTML = `
  <button class="gz-btn gz-btn-secondary" id="exportBtn">${t('export')}</button>
  <label class="gz-btn gz-btn-secondary" style="cursor:pointer">
    ${t('import')}
    <input type="file" accept="application/json" hidden id="importIn">
  </label>
`;

$('#exportBtn').addEventListener('click', () => {
  const data = load();
  const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = t('exportFilename');
  a.click();
});
$('#importIn').addEventListener('change', e => {
  const f = e.target.files[0];
  if (!f) return;
  const r = new FileReader();
  r.onload = ev => {
    try {
      const d = JSON.parse(ev.target.result);
      if (d.habits && Array.isArray(d.habits)) {
        save(d);
        render();
      } else alert('Invalid file');
    } catch(e) { alert('Invalid JSON'); }
  };
  r.readAsText(f);
});

render();

GZ.renderToolPage({
  category: 'fun',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'⏱️', href:'/fun/pomodoro.html', name:'Pomodoro'},
    {icon:'⏲️', href:'/fun/stopwatch.html', name:'Stopwatch'},
    {icon:'⏰', href:'/fun/timer-stopwatch.html', name:'Timer'},
    {icon:'💪', href:'/calc/tdee-calculator.html', name:'TDEE Calculator'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
