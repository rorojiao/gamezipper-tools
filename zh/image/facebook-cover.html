<script>
GZI18n.register({
  en: {
    toolTitle: 'Free Facebook Cover Photo Maker',
    toolDesc: 'Design a stunning Facebook cover photo online for free. Choose 820×312 or HD 1640×856, upload your photo, pick a gradient theme, add text and download a print-ready PNG. No signup, no watermark — runs entirely in your browser.',
    download: 'Download PNG',
    upload: 'Upload Photo',
    lblText: 'Cover Headline', lblSub: 'Subtitle (optional)', lblSize: 'Cover Size',
    lblColor1: 'Gradient Color 1', lblColor2: 'Gradient Color 2',
    lblTextColor: 'Text Color', lblAlign: 'Text Alignment',
    lblOverlay: 'Photo Overlay', lblPhoto: 'Background Photo (optional)', lblTheme: 'Quick Themes',
    step1: 'Pick a cover size — HD 1640×856 stays sharpest on Retina screens',
    step2: 'Type your headline and an optional subtitle',
    step3: 'Choose a gradient theme or upload your own photo',
    step4: 'Click Download PNG and upload it to your Facebook page',
  },
  zh: {
    toolTitle: 'Facebook 封面图制作工具',
    toolDesc: '免费在线设计精美的 Facebook 封面图。选择 820×312 或高清 1640×856 尺寸，上传照片，挑选渐变主题，添加文字并下载可打印的 PNG。无注册、无水印 — 完全在浏览器本地运行。',
    download: '下载 PNG',
    upload: '上传照片',
    lblText: '封面主标题', lblSub: '副标题（可选）', lblSize: '封面尺寸',
    lblColor1: '渐变颜色 1', lblColor2: '渐变颜色 2',
    lblTextColor: '文字颜色', lblAlign: '文字对齐',
    lblOverlay: '照片遮罩', lblPhoto: '背景照片（可选）', lblTheme: '快速主题',
    step1: '选择封面尺寸 — 高清 1640×856 在 Retina 屏最清晰',
    step2: '输入主标题和可选副标题',
    step3: '选择渐变主题或上传你的照片',
    step4: '点击「下载 PNG」并上传到你的 Facebook 主页',
  }
});

const { $, t } = GZ;

const THEMES = [
  ['#4ecdc4','#44a08d'],['#667eea','#764ba2'],['#f093fb','#f5576c'],
  ['#fa709a','#fee140'],['#30cfd0','#330867'],['#0f2027','#2c5364'],
  ['#ff6a00','#ee0979'],['#06beb0','#48b1bf'],['#000000','#434343'],
  ['#ee9ca7','#ffdde1'],['#2193b0','#6dd5ed'],['#ff512f','#dd2476'],
];

let photoImg = null;

function wrapLines(ctx,text,maxW){
  const words=text.split(' ');let line='';const lines=[];
  for(const w of words){const test=line?line+' '+w:w;if(ctx.measureText(test).width>maxW&&line){lines.push(line);line=w}else line=test}
  if(line)lines.push(line);
  return lines;
}

function render(){
  const c=$('#canvas'),ctx=c.getContext('2d');
  const [w,h]=$('#size').value.split('x').map(Number);
  c.width=w;c.height=h;
  const W=c.width,H=c.height;
  const c1=$('#color1').value,c2=$('#color2').value;
  const text=$('#coverText').value||'Cover';
  const sub=$('#subText').value;
  const tc=$('#textColor').value;
  const align=$('#align').value;
  const overlay=parseFloat($('#overlay').value);

  // Background
  if(photoImg){
    // cover-fit the photo
    const ir=photoImg.width/photoImg.height, cr=W/H;
    let dw,dh,dx,dy;
    if(ir>cr){ dh=H; dw=H*ir; dx=(W-dw)/2; dy=0; }
    else { dw=W; dh=W/ir; dx=0; dy=(H-dh)/2; }
    ctx.drawImage(photoImg,dx,dy,dw,dh);
    if(overlay>0){ ctx.fillStyle=`rgba(0,0,0,${overlay})`; ctx.fillRect(0,0,W,H); }
  } else {
    const grad=ctx.createLinearGradient(0,0,W,H);
    grad.addColorStop(0,c1);grad.addColorStop(1,c2);
    ctx.fillStyle=grad; ctx.fillRect(0,0,W,H);
    // soft pattern
    ctx.fillStyle='rgba(255,255,255,0.05)';
    for(let i=0;i<W+H;i+=80){ ctx.beginPath();ctx.arc((i*1.3)%W,(i*0.7)%H,2,0,Math.PI*2);ctx.fill(); }
  }

  ctx.textAlign=align;
  const tx=align==='left'?W*0.06:align==='right'?W*0.94:W/2;
  ctx.textBaseline='middle';
  ctx.fillStyle=tc;
  // title shadow
  ctx.shadowColor='rgba(0,0,0,0.45)'; ctx.shadowBlur=20; ctx.shadowOffsetY=4;
  let fs=Math.min(H*0.2,150);
  ctx.font=`900 ${fs}px Arial Black, sans-serif`;
  const maxW=W*0.88;
  while(ctx.measureText(text).width>maxW&&fs>20){fs-=4;ctx.font=`900 ${fs}px Arial Black, sans-serif`}
  const titleLines=wrapLines(ctx,text,maxW);
  const cy=sub?H/2-H*0.05:H/2;
  titleLines.forEach((ln,i)=>{
    ctx.fillText(ln,tx,cy-(titleLines.length-1)*fs*0.55+i*fs*1.1);
  });
  ctx.shadowColor='transparent'; ctx.shadowBlur=0; ctx.shadowOffsetY=0;

  if(sub){
    ctx.font=`400 ${Math.min(H*0.08,52)}px Verdana, sans-serif`;
    ctx.globalAlpha=0.92;
    const subLines=wrapLines(ctx,sub,maxW);
    subLines.forEach((ln,i)=>{
      ctx.fillText(ln,tx,H/2+fs*0.7+i*H*0.09);
    });
    ctx.globalAlpha=1;
  }
}

function downloadPNG(){
  const link=document.createElement('a');
  const name=($('#coverText').value||'facebook-cover').replace(/[^a-zA-Z0-9]/g,'_').toLowerCase()||'facebook-cover';
  link.download=name+'-cover.png';
  link.href=$('#canvas').toDataURL('image/png');
  link.click();
}

function handlePhoto(e){
  const file=e.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=ev=>{
    const img=new Image();
    img.onload=()=>{ photoImg=img; render(); };
    img.src=ev.target.result;
  };
  reader.readAsDataURL(file);
}

// Build theme swatches
$('#themes').innerHTML=THEMES.map((p,i)=>`<button data-i="${i}" style="background:linear-gradient(135deg,${p[0]},${p[1]})" title="${p[0]} → ${p[1]}"></button>`).join('');
$('#themes').addEventListener('click',e=>{
  const b=e.target.closest('button'); if(!b) return;
  const p=THEMES[+b.dataset.i];
  $('#color1').value=p[0]; $('#color2').value=p[1];
  photoImg=null; $('#photo').value='';
  $('#themes').querySelectorAll('button').forEach(x=>x.classList.remove('active'));
  b.classList.add('active');
  render();
});

$('#lbl-text').textContent=t('lblText');
$('#lbl-sub').textContent=t('lblSub');
$('#lbl-size').textContent=t('lblSize');
$('#lbl-color1').textContent=t('lblColor1');
$('#lbl-color2').textContent=t('lblColor2');
$('#lbl-text-color').textContent=t('lblTextColor');
$('#lbl-align').textContent=t('lblAlign');
$('#lbl-overlay').textContent=t('lblOverlay');
$('#lbl-photo').textContent=t('lblPhoto');
$('#lbl-theme').textContent=t('lblTheme');

['coverText','subText','color1','color2','textColor'].forEach(id=>$('#'+id).addEventListener('input',render));
['size','align','overlay'].forEach(id=>$('#'+id).addEventListener('change',render));
$('#photo').addEventListener('change',handlePhoto);

render();

$('#toolbar').innerHTML=`
  <button class="gz-btn" onclick="downloadPNG()">⬇️ ${t('download')}</button>`;

GZ.renderToolPage({
  category: 'image',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📢', href:'/image/banner-maker.html', name:'Banner Maker'},
    {icon:'🖼️', href:'/image/poster-maker.html', name:'Poster Maker'},
    {icon:'🎂', href:'/image/birthday-card.html', name:'Birthday Card Maker'},
    {icon:'💬', href:'/image/quote-image-maker.html', name:'Quote Image Maker'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
