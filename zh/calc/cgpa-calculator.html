<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is CGPA?", "acceptedAnswer": {"@type": "Answer", "text": "CGPA (Cumulative Grade Point Average) is the overall average of your grade points across all semesters. It is weighted by the credit hours of each course."}}, {"@type": "Question", "name": "What CGPA scales are supported?", "acceptedAnswer": {"@type": "Answer", "text": "This tool supports the 4.0 scale (common in North America), the 10.0 scale (used in India and some Asian countries), and the 5.0 scale. You can also define a custom grading system."}}, {"@type": "Question", "name": "How is CGPA calculated?", "acceptedAnswer": {"@type": "Answer", "text": "CGPA = Sum of (Grade Point × Credit Hours) for all courses ÷ Total Credit Hours. Each course contributes proportionally to its credit weight."}}, {"@type": "Question", "name": "What is a good CGPA?", "acceptedAnswer": {"@type": "Answer", "text": "On a 4.0 scale, a CGPA of 3.5+ is considered very good, and 3.7+ is excellent. On a 10.0 scale, 7.5+ is good and 8.5+ is excellent. Requirements vary by institution and program."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="opt-row">
      <div class="opt-group">
        <label id="lbl-scale"></label>
        <select id="scale">
          <option value="4.0">4.0 Scale (US/Canada)</option>
          <option value="10.0">10.0 Scale (India)</option>
          <option value="5.0">5.0 Scale</option>
        </select>
      </div>
      <div class="opt-group">
        <label>&nbsp;</label>
        <button class="gz-btn" id="btn-add-sem"></button>
      </div>
      <div class="opt-group">
        <label>&nbsp;</label>
        <button class="gz-btn gz-btn-secondary" id="btn-reset"></button>
      </div>
    </div>
    <div id="semesters"></div>
    <div id="result-display" style="display:none">
      <div class="cgpa-value" id="cgpa-val">—</div>
      <div class="cgpa-label" id="cgpa-label"></div>
      <div class="classification" id="cgpa-class"></div>
    </div>
    <div id="status" style="margin-top:8px;font-size:.85em"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'CGPA Calculator',
    toolDesc: 'Calculate your Cumulative Grade Point Average across multiple semesters. Supports 4.0, 10.0, and 5.0 scales with credit-weighted courses. Free, browser-based.',
    lblScale: 'Grading Scale',
    addSemester: '➕ Add Semester',
    reset: '🗑️ Reset All',
    addCourse: '+ Course',
    courseName: 'Course Name',
    grade: 'Grade',
    credits: 'Credits',
    gp: 'GP',
    semester: 'Semester',
    semGPA: 'Semester GPA',
    resultLabel: 'Your CGPA',
    step1: 'Select your grading scale (4.0, 10.0, or 5.0)',
    step2: 'Add semesters and enter courses with grades and credits',
    step3: 'Your CGPA updates automatically as you type',
    step4: 'Review your semester GPAs and overall classification',
    classification: {
      '4.0': {3.7:'First Class Honors',3.3:'Second Class Upper',3.0:'Second Class Lower',2.0:'Third Class',0:'Fail'},
      '10.0':{8.5:'Distinction',7.0:'First Class',6.0:'Second Class',5.0:'Pass',0:'Fail'},
      '5.0': {4.5:'First Class',3.5:'Second Class Upper',2.4:'Second Class Lower',1.0:'Pass',0:'Fail'},
    },
    totalCredits: 'Total Credits',
    courses: 'courses',
  },
  zh: {
    toolTitle: 'CGPA 累计绩点计算器',
    toolDesc: '计算多个学期的累计平均绩点（CGPA）。支持 4.0、10.0 和 5.0 制，按学分加权。免费、浏览器本地运行。',
    lblScale: '评分制度',
    addSemester: '➕ 添加学期',
    reset: '🗑️ 全部重置',
    addCourse: '+ 课程',
    courseName: '课程名称',
    grade: '成绩',
    credits: '学分',
    gp: '绩点',
    semester: '学期',
    semGPA: '学期 GPA',
    resultLabel: '你的 CGPA',
    step1: '选择评分制度（4.0、10.0 或 5.0）',
    step2: '添加学期并输入课程、成绩和学分',
    step3: 'CGPA 会随输入自动更新',
    step4: '查看各学期 GPA 和总体等级',
    classification: {
      '4.0': {3.7:'一等荣誉',3.3:'二等上级',3.0:'二等下级',2.0:'三等',0:'未通过'},
      '10.0':{8.5:'优异',7.0:'一等',6.0:'二等',5.0:'及格',0:'不及格'},
      '5.0': {4.5:'一等',3.5:'二等上级',2.4:'二等下级',1.0:'及格',0:'不及格'},
    },
    totalCredits: '总学分',
    courses: '门课程',
  }
});

const { $, t } = GZ;

$('#lbl-scale').textContent = t('lblScale');
$('#btn-add-sem').textContent = t('addSemester');
$('#btn-reset').textContent = t('reset');

let semCount = 0;

const GRADE_SCALES = {
  '4.0': {'A+':4.0,'A':4.0,'A-':3.7,'B+':3.3,'B':3.0,'B-':2.7,'C+':2.3,'C':2.0,'C-':1.7,'D+':1.3,'D':1.0,'F':0},
  '10.0':{'O':10,'A+':9,'A':8,'B+':7,'B':6,'C':5,'P':4,'F':0},
  '5.0': {'A':5.0,'B':4.0,'C':3.0,'D':2.0,'E':1.0,'F':0},
};

function gradeOptions() {
  const scale = $('#scale').value;
  const grades = GRADE_SCALES[scale];
  return Object.keys(grades).map(g => `<option value="${g}">${g} (${grades[g]})</option>`).join('');
}

function addSemester() {
  semCount++;
  const semDiv = document.createElement('div');
  semDiv.className = 'semester-block';
  semDiv.dataset.sem = semCount;
  semDiv.innerHTML = `
    <div class="sem-header">
      <span class="sem-title">${t('semester')} ${semCount}</span>
      <button class="gz-btn gz-btn-secondary del-sem" style="font-size:.8em;padding:4px 10px">✕</button>
    </div>
    <div class="course-list">
      <div class="course-row">
        <input type="text" placeholder="${t('courseName')}" class="c-name">
        <select class="c-grade">${gradeOptions()}</select>
        <input type="number" class="c-credits" value="3" min="0" max="20" step="0.5">
        <span class="c-gp" style="text-align:center;font-size:.85em">—</span>
        <button class="del-btn">✕</button>
      </div>
    </div>
    <button class="gz-btn gz-btn-secondary add-course" style="font-size:.8em;padding:4px 12px;margin-top:6px">${t('addCourse')}</button>
    <div class="sem-gpa">${t('semGPA')}: <strong>—</strong></div>
  `;

  // Wire up
  semDiv.querySelector('.del-sem').onclick = () => { semDiv.remove(); recompute(); };
  semDiv.querySelector('.add-course').onclick = () => addCourseRow(semDiv);
  semDiv.querySelector('.course-row .del-btn').onclick = () => { semDiv.querySelector('.course-list').removeChild(semDiv.querySelector('.course-row')); recompute(); };
  semDiv.querySelectorAll('input,select').forEach(el => { el.oninput = recompute; el.onchange = recompute; });

  $('#semesters').appendChild(semDiv);
  recompute();
}

function addCourseRow(semDiv) {
  const row = document.createElement('div');
  row.className = 'course-row';
  row.innerHTML = `
    <input type="text" placeholder="${t('courseName')}" class="c-name">
    <select class="c-grade">${gradeOptions()}</select>
    <input type="number" class="c-credits" value="3" min="0" max="20" step="0.5">
    <span class="c-gp" style="text-align:center;font-size:.85em">—</span>
    <button class="del-btn">✕</button>
  `;
  row.querySelector('.del-btn').onclick = () => { row.remove(); recompute(); };
  row.querySelectorAll('input,select').forEach(el => { el.oninput = recompute; el.onchange = recompute; });
  semDiv.querySelector('.course-list').appendChild(row);
  recompute();
}

function recompute() {
  const scale = $('#scale').value;
  const gradeMap = GRADE_SCALES[scale];
  const maxScale = parseFloat(scale);

  let totalPoints = 0, totalCredits = 0;

  document.querySelectorAll('.semester-block').forEach(sem => {
    let semPoints = 0, semCredits = 0;
    sem.querySelectorAll('.course-row').forEach(row => {
      const grade = row.querySelector('.c-grade').value;
      const credits = parseFloat(row.querySelector('.c-credits').value) || 0;
      const gp = gradeMap[grade] || 0;
      row.querySelector('.c-gp').textContent = gp.toFixed(1);
      semPoints += gp * credits;
      semCredits += credits;
    });
    const semGPA = semCredits > 0 ? (semPoints / semCredits) : 0;
    sem.querySelector('.sem-gpa').innerHTML = `${t('semGPA')}: <strong style="color:var(--accent)">${semGPA.toFixed(2)}</strong> <span style="opacity:.6">(${semCredits} ${t('credits')})</span>`;
    totalPoints += semPoints;
    totalCredits += semCredits;
  });

  if (totalCredits > 0) {
    const cgpa = totalPoints / totalCredits;
    $('#result-display').style.display = 'block';
    $('#cgpa-val').textContent = cgpa.toFixed(2);

    // Classification
    const classes = t('classification')[scale];
    let classification = '';
    for (const threshold of Object.keys(classes).sort((a,b) => b-a)) {
      if (cgpa >= parseFloat(threshold)) { classification = classes[threshold]; break; }
    }
    $('#cgpa-label').textContent = `${t('resultLabel')} / ${maxScale.toFixed(1)} (${t('totalCredits')}: ${totalCredits})`;
    $('#cgpa-class').textContent = classification;
    $('#cgpa-class').style.color = cgpa >= maxScale * 0.75 ? 'var(--gz-success,#00d672)' : cgpa >= maxScale * 0.5 ? 'var(--accent)' : 'var(--gz-accent)';
  } else {
    $('#result-display').style.display = 'none';
  }
}

$('#btn-add-sem').onclick = addSemester;
$('#btn-reset').onclick = () => { $('#semesters').innerHTML = ''; semCount = 0; addSemester(); };
$('#scale').onchange = () => {
  document.querySelectorAll('.c-grade').forEach(sel => {
    const prev = sel.value;
    sel.innerHTML = gradeOptions();
    sel.value = prev;
  });
  recompute();
};

// Initialize with one semester
addSemester();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🎓', href:'/calc/gpa-calculator.html', name:'GPA Calculator'},
    {icon:'📊', href:'/calc/final-grade-calculator.html', name:'Final Grade Calculator'},
    {icon:'🎓', href:'/calc/final-exam-grade-calculator.html', name:'Final Exam Grade'},
    {icon:'🔢', href:'/calc/standard-deviation-calculator.html', name:'Standard Deviation'},
  ]
});
</script>
<script src="/tools-result-rec.js?v=20260707v520" defer></script>
</body>
</html>
