const { $, copyText, t } = GZ;

const A = 'A'.charCodeAt(0), Z = 'Z'.charCodeAt(0);
const a = 'a'.charCodeAt(0), z = 'z'.charCodeAt(0);
const ZERO = '0'.charCodeAt(0), NINE = '9'.charCodeAt(0);

function mapRange(s, lo, hi, off) {
  let out = '';
  for (const ch of s) {
    const c = ch.codePointAt(0);
    if (c >= lo && c <= hi) out += String.fromCodePoint(c + off);
    else out += ch;
  }
  return out;
}

// Mathematical Bold Serif A-Z U+1D400, a-z U+1D41A, 0-9 U+1D7CE
function toBold(s) {
  let r = mapRange(s, A, Z, 0x1D400 - A);
  r = mapRange(r, a, z, 0x1D41A - a);
  return mapRange(r, ZERO, NINE, 0x1D7CE - ZERO);
}
// Mathematical Italic A-Z U+1D434, a-z U+1D44E, h is U+210E
function toItalic(s) {
  let r = '';
  for (const ch of s) {
    const c = ch.codePointAt(0);
    if (c >= A && c <= Z) {
      if (c === 0x48) r += '\u210E';
      else r += String.fromCodePoint(c - A + 0x1D434);
    } else if (c >= a && c <= z) {
      r += String.fromCodePoint(c - a + 0x1D44E);
    } else {
      r += ch;
    }
  }
  return r;
}
// Bold Italic A-Z U+1D468, a-z U+1D482
function toBoldItalic(s) {
  let r = '';
  for (const ch of s) {
    const c = ch.codePointAt(0);
    if (c >= A && c <= Z) r += String.fromCodePoint(c - A + 0x1D468);
    else if (c >= a && c <= z) r += String.fromCodePoint(c - a + 0x1D482);
    else r += ch;
  }
  return r;
}
// Monospace A-Z U+1D670, a-z U+1D68A, 0-9 U+1D7F6
function toMono(s) {
  let r = mapRange(s, A, Z, 0x1D670 - A);
  r = mapRange(r, a, z, 0x1D68A - a);
  return mapRange(r, ZERO, NINE, 0x1D7F6 - ZERO);
}
// Gothic (Fraktur) A-Z U+1D504, a-z U+1D51E (some letters use Letterlike)
function toGothic(s) {
  let r = '';
  for (const ch of s) {
    const c = ch.codePointAt(0);
    if (c >= A && c <= Z) {
      const exc = { 0x43:0x212D, 0x48:0x210C, 0x49:0x2111, 0x52:0x211C, 0x5A:0x2128 };
      r += exc[c] ? String.fromCodePoint(exc[c]) : String.fromCodePoint(c - A + 0x1D504);
    } else if (c >= a && c <= z) {
      r += String.fromCodePoint(c - a + 0x1D51E);
    } else r += ch;
  }
  return r;
}
// Double-Struck A-Z U+1D538, a-z U+1D552, 0-9 U+1D7D8
function toDoubleStruck(s) {
  let r = mapRange(s, A, Z, 0x1D538 - A);
  r = mapRange(r, a, z, 0x1D552 - a);
  return mapRange(r, ZERO, NINE, 0x1D7D8 - ZERO);
}
// Circled A-Z U+24B6, a-z U+24D0, 0 U+24EA, 1-9 U+2460+1
function toCircle(s) {
  let r = '';
  for (const ch of s) {
    const c = ch.codePointAt(0);
    if (c >= A && c <= Z) r += String.fromCodePoint(c - A + 0x24B6);
    else if (c >= a && c <= z) r += String.fromCodePoint(c - a + 0x24D0);
    else if (c === 0x30) r += '\u24EA';
    else if (c >= 0x31 && c <= 0x39) r += String.fromCodePoint(c - 0x31 + 0x2460);
    else r += ch;
  }
  return r;
}
// Squared A-Z U+1F130 block letters
function toSquare(s) {
  let r = '';
  for (const ch of s) {
    const c = ch.codePointAt(0);
    if (c >= A && c <= Z) r += String.fromCodePoint(c - A + 0x1F130);
    else r += ch;
  }
  return r;
}
// Small caps: lowercase -> small-cap U+1D00 block; uppercase kept
function toSmallCaps(s) {
  let r = '';
  for (const ch of s) {
    const c = ch.codePointAt(0);
    if (c >= a && c <= z) r += String.fromCodePoint(c - a + 0x1D00);
    else r += ch;
  }
  return r;
}
const FLIP_MAP = {

  '0':'0','1':'Æ','2':'á','3':'Æ','4':'ã£','5':'Ï','6':'9','7':'ãċ','8':'8','9':'6',
  '.':'Ë',',':'\'','\'':',','"':',,','!':'ÂḂ','?':'Âṡ','(':')',')':'(','[':']',']':'[','{':'}','}':'{','<':'>','>':'<','_':'âẅ'

function toUpsideDown(s) {
  let r = '';
  for (const ch of s) r += FLIP_MAP[ch] || ch;
  return r.split('').reverse().join('');
}
function toStrike(s) {
  let r = '';
  for (const ch of s) r += ch + '\u0336';
  return r;
}
function toUnderline(s) {
  let r = '';
  for (const ch of s) r += ch + '\u0332';
  return r;
}

const STYLES = [
  { key: 'bold',        fn: toBold },
  { key: 'italic',      fn: toItalic },
  { key: 'boldItalic',  fn: toBoldItalic },
  { key: 'mono',        fn: toMono },
  { key: 'gothic',      fn: toGothic },
  { key: 'doubleStruck',fn: toDoubleStruck },
  { key: 'circle',      fn: toCircle },

function render() {
  const src = $('#input').value;
  const grid = $('#grid');
  if (!src) { grid.innerHTML = ''; $('#status').textContent = ''; return; }
  let html = '';
  for (const s of STYLES) {
    html += `<div class="font-row"><span class="lbl">${t(s.key)}</span><span class="val" data-val="${s.key}"></span><button class="copy" data-key="${s.key}">ŵ ${t('copy')}</button></div>`;
  }
  grid.innerHTML = html;
  for (const s of STYLES) {
    const el = grid.querySelector(`[data-val="${s.key}"]`);
    if (el) el.textContent = s.fn(src);
  }
  $('#status').textContent = `${STYLES.length} styles generated â ${src.length} char${src.length===1?'':'s'}`;
  grid.querySelectorAll('.copy').forEach(btn => {
    btn.addEventListener('click', () => {
      const k = btn.getAttribute('data-key');
      const s = STYLES.find(x => x.key === k);
      if (s) copyText(s.fn($('#input').value));
    });
  });
}
