<script>
GZI18n.register({
  en: {
    toolTitle: 'Markdown Beautifier & Formatter',
    toolDesc: 'Beautify and format messy Markdown. Normalize headings, lists, code blocks, links and spacing. Free, browser-based with live preview.',
    beautify: 'Beautify',
    step1: 'Paste your Markdown content in the input area',

  },
  zh: {
    toolTitle: 'Markdown 美化与格式化工具',
    toolDesc: '美化和格式化杂乱的 Markdown。规范化标题、列表、代码块、链接和间距。免费，浏览器本地运行，实时预览。',
    beautify: '美化',
    step1: '在输入区粘贴 Markdown 内容',
    step2: '选择格式化选项：列表样式、标题、链接',
    step3: '点击「美化」格式化输出',
    step4: '复制清理后的 Markdown 到你的项目',
  }
});

const { $, copyText, t } = GZ;

function beautifyMarkdown(md) {
  let text = md;
  const listStyle = $('#listStyle').value;
  const normalizeHeadings = $('#normalizeHeadings').checked;
  const trimTrailing = $('#trimTrailing').checked;
  const ensureBlankLine = $('#ensureBlankLine').checked;
  const normalizeLinks = $('#normalizeLinks').checked;
  const collapseBlankLines = $('#collapseBlankLines').checked;

  // Normalize line endings
  text = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n');

  // Trim trailing whitespace
  if (trimTrailing) {
    text = text.split('\n').map(line => line.replace(/[ \t]+$/, '')).join('\n');
  }

  // Normalize list markers
  text = text.replace(/^([ \t]*)([*+])([ \t]+)/gm, (m, indent, marker, space) => {
    return `${indent}${listStyle}${space}`;
  });

  // Normalize ATX headings - ensure single space after #
  if (normalizeHeadings) {
    text = text.replace(/^(#{1,6})([ \t]*)(.*)$/gm, (m, hashes, space, content) => {
      return `${hashes} ${content.trim()}`;
    });
  }

  // Normalize links - [text] (url) -> [text](url)
  if (normalizeLinks) {
    text = text.replace(/\[([^\]]+)\][ \t]+\(([^)]+)\)/g, '[$1]($2)');
    // [text] :(url) style
    text = text.replace(/\[([^\]]+)\][ \t]*:[ \t]*\(([^)]+)\)/g, '[$1]($2)');
  }

  // Normalize images
  if (normalizeLinks) {
    text = text.replace(/!\[([^\]]*)\][ \t]+\(([^)]+)\)/g, '![$1]($2)');
  }

  // Ensure single space after blockquote marker
  text = text.replace(/^(>)([ \t]*)/gm, '> ');

  // Ensure blank line before headings and code blocks
  if (ensureBlankLine) {
    text = text.replace(/([^\n])\n(#{1,6} )/g, '$1\n\n$2');
    text = text.replace(/([^\n])\n(```)/g, '$1\n\n$2');
  }

  // Collapse multiple blank lines
  if (collapseBlankLines) {
    text = text.replace(/\n{3,}/g, '\n\n');
  }

  // Ensure file ends with single newline
  text = text.replace(/\n*$/, '\n');

  return text;
}

function getStats(md) {
  const lines = md.split('\n');
  const words = (md.match(/\b\w+\b/g) || []).length;
  const chars = md.length;
  const headings = (md.match(/^#{1,6} /gm) || []).length;
  const lists = (md.match(/^[*\-+] /gm) || []).length;
  const code = (md.match(/```/g) || []).length / 2;
  const links = (md.match(/\[[^\]]+\]\([^)]+\)/g) || []).length;
  return {lines: lines.length, words, chars, headings, lists, code: Math.floor(code), links};
}

function doBeautify() {
  const inp = $('#input').value;
  if (!inp.trim()) {
    $('#output').textContent = '';
    $('#stats').innerHTML = '';
    $('#status').textContent = '';
    return;
  }
  const result = beautifyMarkdown(inp);
  $('#output').textContent = result;
  const stats = getStats(result);
  $('#stats').innerHTML = `
    <span><b>${stats.lines}</b> lines</span>
    <span><b>${stats.words}</b> words</span>
    <span><b>${stats.chars}</b> chars</span>
    <span><b>${stats.headings}</b> headings</span>
    <span><b>${stats.lists}</b> list items</span>
    <span><b>${stats.code}</b> code blocks</span>
    <span><b>${stats.links}</b> links</span>
  `;
  $('#status').innerHTML = `<span style="color:var(--gz-success)">✓ Beautified successfully</span>`;
}

function loadExample() {
  $('#input').value = `#  Markdown Example
This is a **messy** markdown document.

##Features
* Item 1
+  Item 2
-   Item 3

[GitHub]( https://github.com )
[Google]( https://google.com )
Some text.
More text.


\`\`\`js
console.log("hello")
\`\`\`
> Blockquote without space
>Another line`;
  doBeautify();
}

function doClear() {
  $('#input').value = '';
  $('#output').textContent = '';
  $('#stats').innerHTML = '';
  $('#status').textContent = '';
}

$('#input').addEventListener('input', doBeautify);
['listStyle','normalizeHeadings','trimTrailing','ensureBlankLine','normalizeLinks','collapseBlankLines'].forEach(id => {
  $('#'+id).addEventListener('change', doBeautify);
});

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="doBeautify()">${t('beautify')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

</script>
