.amort-wrap{max-height:400px;overflow:auto;border:1px solid var(--border);border-radius:12px;margin-top:8px}
</style>
<script type="application/ld+json">{"@context":"https://schema.org","@type":"WebApplication","name":"Mortgage Calculator","description":"Free online mortgage calculator. Estimate monthly home loan payments, total interest, and amortization schedule. Adjust loan amount, interest rate, term and down payment.","url": "https://tools.gamezipper.com/zh/calc/mortgage-calculator.html","applicationCategory":"FinanceApplication","operatingSystem":"Web Browser","offers":{"@type":"Offer","price":"0"}}</script>
<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "How is the monthly mortgage payment calculated?", "acceptedAnswer": {"@type": "Answer", "text": "The standard amortization formula: M = P * r * (1+r)^n / ((1+r)^n - 1), where P is the loan principal, r is the monthly interest rate, and n is the total number of payments."}}, {"@type": "Question", "name": "Does this calculator include property tax and insurance?", "acceptedAnswer": {"@type": "Answer", "text": "The base calculation covers principal and interest (PI). For a full PITI estimate, add your annual property tax and insurance divided by 12 to the monthly result."}}, {"@type": "Question", "name": "What is a good mortgage interest rate?", "acceptedAnswer": {"@type": "Answer", "text": "Rates vary by country, lender, credit score and loan type. Check current rates from multiple lenders and use this calculator to compare scenarios side by side."}}, {"@type": "Question", "name": "How does the loan term affect my payment?", "acceptedAnswer": {"@type": "Answer", "text": "A shorter term (e.g. 15 years) means higher monthly payments but much less total interest. A longer term (30 years) lowers monthly cost but increases lifetime interest paid."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-form" id="form">
      <div>
        <label id="lbl-price"></label>
        <input type="number" id="price" value="400000" min="0" step="1000">
      </div>
      <div>
        <label id="lbl-down"></label>
        <input type="number" id="down" value="20" min="0" max="100" step="0.5">
      </div>
      <div>
        <label id="lbl-rate"></label>
        <input type="number" id="rate" value="6.5" min="0" max="30" step="0.01">
      </div>
      <div>
        <label id="lbl-term"></label>
        <select id="term">
          <option value="10">10</option>
          <option value="15">15</option>
          <option value="20">20</option>
          <option value="30" selected>30</option>
          <option value="40">40</option>
        </select>
      </div>
      <button class="gz-btn" onclick="calculate()" id="btn-calc"></button>
    </div>
    <div class="result-card" id="result" style="display:none">
      <div class="big" id="result-monthly"></div>
      <div class="label" id="result-monthly-label"></div>
      <div class="result-grid">
        <div class="result-item"><div class="val" id="result-loan"></div><div class="lbl" id="result-loan-label"></div></div>
        <div class="result-item"><div class="val" id="result-total"></div><div class="lbl" id="result-total-label"></div></div>
        <div class="result-item"><div class="val" id="result-interest"></div><div class="lbl" id="result-interest-label"></div></div>
        <div class="result-item"><div class="val" id="result-paid"></div><div class="lbl" id="result-paid-label"></div></div>
      </div>
      <div class="amort-toggle">
        <button class="gz-btn gz-btn-secondary" id="btn-amort" onclick="toggleAmort()"></button>
      </div>
      <div id="amort-wrap" class="amort-wrap" style="display:none"></div>
    </div>
    <div id="status"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Mortgage Calculator',
    toolDesc: 'Estimate your monthly mortgage payment, total interest, and full amortization schedule. Free, accurate, no signup.',
    homePrice: 'Home Price',
    downPayment: 'Down Payment (%)',
    interestRate: 'Interest Rate (% APR)',
    term: 'Loan Term (years)',
    calculate: 'Calculate',
    monthlyPayment: 'Monthly Payment',
    loanAmount: 'Loan Amount',
    totalPaid: 'Total Paid',
    totalInterest: 'Total Interest',
    payoffDate: 'Payoff Date',
    showAmort: 'Show Amortization Schedule',
    hideAmort: 'Hide Amortization Schedule',
    month: 'Month',
    principal: 'Principal',
    interest: 'Interest',
    balance: 'Balance',
    step1: 'Enter the home price',
    step2: 'Set your down payment percentage',
    step3: 'Input the annual interest rate (APR)',
    step4: 'Choose loan term and click Calculate',
  },
  zh: {
    toolTitle: '房贷计算器',
    toolDesc: '计算每月还款金额、总利息和完整还款计划。免费、准确、无需注册。',
    homePrice: '房屋总价',
    downPayment: '首付比例 (%)',
    interestRate: '年利率 (% APR)',
    term: '贷款年限',
    calculate: '计算',
    monthlyPayment: '每月还款',
    loanAmount: '贷款金额',
    totalPaid: '总还款额',
    totalInterest: '总利息',
    payoffDate: '还清日期',
    showAmort: '显示还款计划',
    hideAmort: '隐藏还款计划',
    month: '期数',
    principal: '本金',
    interest: '利息',
    balance: '剩余本金',
    step1: '输入房屋总价',
    step2: '设置首付比例',
    step3: '输入年利率（APR）',
    step4: '选择贷款年限并点击「计算」',
  }
});

const { $, t } = GZ;
var amortVisible = false;

$('#lbl-price').textContent = t('homePrice');
$('#lbl-down').textContent = t('downPayment');
$('#lbl-rate').textContent = t('interestRate');
$('#lbl-term').textContent = t('term');
$('#btn-calc').textContent = t('calculate');
$('#btn-amort').textContent = t('showAmort');

function fmt(n) {
  return n.toLocaleString(GZ.lang === 'zh' ? 'zh-CN' : 'en-US', { maximumFractionDigits: 0 });
}

function calculate() {
  var price = parseFloat($('#price').value) || 0;
  var downPct = parseFloat($('#down').value) || 0;
  var rate = parseFloat($('#rate').value) || 0;
  var years = parseInt($('#term').value) || 30;

  if (price <= 0) { $('#status').innerHTML = '<span style="color:var(--accent)">' + (GZ.lang === 'zh' ? '请输入有效的房屋总价' : 'Please enter a valid home price') + '</span>'; return; }

  var downAmount = price * (downPct / 100);
  var principal = price - downAmount;
  var monthlyRate = rate / 100 / 12;
  var n = years * 12;

  var monthly;
  if (monthlyRate === 0) {
    monthly = principal / n;
  } else {
    monthly = principal * monthlyRate * Math.pow(1 + monthlyRate, n) / (Math.pow(1 + monthlyRate, n) - 1);
  }
  var totalPaid = monthly * n;
  var totalInterest = totalPaid - principal;

  $('#result-monthly').textContent = fmt(monthly);
  $('#result-monthly-label').textContent = t('monthlyPayment');
  $('#result-loan').textContent = fmt(principal);
  $('#result-loan-label').textContent = t('loanAmount');
  $('#result-total').textContent = fmt(totalPaid);
  $('#result-total-label').textContent = t('totalPaid');
  $('#result-interest').textContent = fmt(totalInterest);
  $('#result-interest-label').textContent = t('totalInterest');

  // Payoff date
  var d = new Date();
  d.setMonth(d.getMonth() + n);
  $('#result-paid').textContent = d.toLocaleDateString(GZ.lang === 'zh' ? 'zh-CN' : 'en-US', { year: 'numeric', month: 'short' });
  $('#result-paid-label').textContent = t('payoffDate');

  $('#result').style.display = 'block';
  $('#status').innerHTML = '';

  // Build amortization schedule
  window._amort = buildAmort(principal, monthlyRate, monthly, n);
  if (amortVisible) renderAmort();
}

function buildAmort(principal, monthlyRate, monthly, n) {
  var rows = [];
  var balance = principal;
  for (var i = 1; i <= n; i++) {
    var interest = balance * monthlyRate;
    var principalPaid = monthly - interest;
    if (i === n) principalPaid = balance; // final payment
    balance -= principalPaid;
    if (balance < 0) balance = 0;
    rows.push({ month: i, principal: principalPaid, interest: interest, balance: balance });
  }
  return rows;
}

function renderAmort() {
  var rows = window._amort || [];
  var html = '<table class="amort-table"><thead><tr>';
  html += '<th>' + t('month') + '</th>';
  html += '<th>' + t('principal') + '</th>';
  html += '<th>' + t('interest') + '</th>';
  html += '<th>' + t('balance') + '</th>';
  html += '</tr></thead><tbody>';
  for (var i = 0; i < rows.length; i++) {
    var r = rows[i];
    html += '<tr><td>' + r.month + '</td><td>' + fmt(r.principal) + '</td><td>' + fmt(r.interest) + '</td><td>' + fmt(r.balance) + '</td></tr>';
  }
  html += '</tbody></table>';
  $('#amort-wrap').innerHTML = html;
}

function toggleAmort() {
  amortVisible = !amortVisible;
  $('#amort-wrap').style.display = amortVisible ? 'block' : 'none';
  $('#btn-amort').textContent = amortVisible ? t('hideAmort') : t('showAmort');
  if (amortVisible) renderAmort();
}

['price','down','rate','term'].forEach(function(id) {
  $('#' + id).addEventListener('input', calculate);
  $('#' + id).addEventListener('change', calculate);
});

calculate();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'💰', href:'/calc/compound-interest-calculator.html', name:'Compound Interest'},
    {icon:'⛽', href:'/calc/fuel-cost-calculator.html', name:'Fuel Cost'},
    {icon:'📅', href:'/calc/date-calculator.html', name:'Date Calculator'},
    {icon:'🎂', href:'/calc/age-calculator.html', name:'Age Calculator'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
