<script>
GZI18n.register({
  en: {
    toolTitle: 'HTML Iframe Generator',
    toolDesc: 'Generate iframe embed codes visually — set URL, dimensions, sandbox, allow attributes and copy production-ready HTML.',
    step1: 'Enter the URL you want to embed in the src field',
    step2: 'Configure width, height, sandbox and other attributes',
    step3: 'Click Generate to create the iframe code',
    step4: 'Copy the code and paste it into your HTML',
  },
  zh: {
    toolTitle: 'HTML Iframe 生成器',
    toolDesc: '可视化生成 iframe 嵌入代码 — 设置 URL、尺寸、沙盒、允许属性等，复制即用的 HTML 代码。',
    step1: '在 src 字段中输入要嵌入的 URL',
    step2: '配置宽度、高度、沙盒和其他属性',
    step3: '点击「生成」创建 iframe 代码',
    step4: '复制代码并粘贴到你的 HTML 中',
  }
});

const { $, copyText, t } = GZ;

function generate() {
  const src = $('#cfg-src').value.trim();
  const width = $('#cfg-width').value.trim();
  const height = $('#cfg-height').value.trim();
  const title = $('#cfg-title').value.trim();
  const name = $('#cfg-name').value.trim();
  const loading = $('#cfg-loading').value;
  const referrer = $('#cfg-referrer').value;
  const sandbox = $('#cfg-sandbox').value;
  const allow = $('#cfg-allow').value.trim();
  const border = $('#cfg-border').value;
  const style = $('#cfg-style').value.trim();
  const fullscreen = $('#cfg-fullscreen').value;

  let attrs = [];
  if (src) attrs.push(`src="${src}"`);
  if (width) attrs.push(`width="${width}"`);
  if (height) attrs.push(`height="${height}"`);
  if (title) attrs.push(`title="${title}"`);
  if (name) attrs.push(`name="${name}"`);
  if (loading) attrs.push(`loading="${loading}"`);
  if (referrer) attrs.push(`referrerPolicy="${referrer}"`);
  if (sandbox) attrs.push(`sandbox="${sandbox}"`);
  if (allow) attrs.push(`allow="${allow}"`);
  if (fullscreen) attrs.push('allowfullscreen');
  if (style) attrs.push(`style="${style}"`);
  attrs.push(`frameborder="${border}"`);

  const code = `<iframe ${attrs.join(' ')}></iframe>`;
  $('#output').textContent = code;
}

// Auto-generate on any change
document.querySelectorAll('.cfg-row input, .cfg-row select').forEach(el => {
  el.addEventListener('input', generate);
  el.addEventListener('change', generate);
});

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="generate()">${t('format')}</button>
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>`;

generate();

GZ.renderToolPage({
  category: 'dev',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],

    {icon:'📱', href:'/dev/webmanifest.html', name:'PWA Manifest'},
    {icon:'🔧', href:'/dev/htaccess.html', name:'.htaccess Generator'},
  ]
});
</script>
