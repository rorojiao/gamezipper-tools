<div class="gz-container">

    <div id="controls" style="display:none">
      <h3 id="lbl-mode" style="margin:14px 0 6px">Split Mode</h3>
      <div class="ps-modes">
        <div class="ps-mode active" data-mode="all" onclick="setMode('all')">

        <div class="ps-mode" data-mode="range" onclick="setMode('range')">

        </div>
        <div class="ps-mode" data-mode="everyn" onclick="setMode('everyn')">

      <div id="everynInput" style="display:none">

<script>
GZI18n.register({
  en: {
    toolTitle: 'PDF Page Splitter',
    toolDesc: 'Split any PDF into individual pages, custom ranges or chunks of N pages. Extract, save and download — all in your browser, no upload needed.',
    dzText: 'Drop PDF here or click to upload',
    lblMode: 'Split Mode',
    mAll: '📄 Every Page', mAllD: 'Each page becomes a separate PDF',
    mRange: '🔢 Custom Ranges', mRangeD: 'Extract specific pages like 1-3, 5, 7-9',
    mEveryn: '📚 Every N Pages', mEverynD: 'Split into chunks of N pages',
    lblRanges: 'Page ranges (1-based, comma-separated):',
    lblEveryn: 'Pages per chunk:',
    ok: '✓ Split into {n} file(s)',
    err: '✗ Error: ',
    noPages: 'No pages selected',
    change: 'Change',
    step1: 'Upload your PDF by dropping it or clicking the area above',
    step2: 'Choose a split mode: every page, custom ranges, or every N pages',
    step3: 'For custom ranges, enter values like 1-3, 5, 7-9',
    step4: 'Click "Split PDF" — each output downloads as a separate file',
  },
  zh: {
    toolTitle: 'PDF 页面分割工具',
    toolDesc: '将任意 PDF 分割为单页、自定义范围或每 N 页分块。在浏览器中完成提取、保存和下载，无需上传。',
    dzText: '拖拽 PDF 到此处或点击上传',
    lblMode: '分割模式',
    mAll: '📄 每一页', mAllD: '每页生成一个独立的 PDF',
    mRange: '🔢 自定义范围', mRangeD: '提取指定页，如 1-3, 5, 7-9',
    mEveryn: '📚 每 N 页', mEverynD: '按 N 页为一组分割',
    lblRanges: '页码范围（从 1 开始，逗号分隔）：',
    lblEveryn: '每组页数：',
    ok: '✓ 已分割为 {n} 个文件',
    err: '✗ 错误：',
    noPages: '未选择页面',
    change: '更换',
    step1: '拖拽或点击上方区域上传 PDF',
    step2: '选择分割模式：每页、自定义范围或每 N 页',
    step3: '自定义范围时，输入如 1-3, 5, 7-9 的值',
    step4: '点击「分割 PDF」— 每个输出将作为单独文件下载',
  }
});

const { $, t } = GZ;

let currentPdf = null;
let currentBytes = null;
let currentFileName = '';
let mode = 'all';
let { PDFDocument } = PDFLib;

async function loadPdfFromFile(file) {
  currentFileName = file.name.replace(/\.pdf$/i, '');
  const buf = await file.arrayBuffer();
  currentBytes = buf;
  try {
    currentPdf = await PDFDocument.load(buf, { ignoreEncryption: true });
  } catch (e) {
    $('#status').textContent = t('err') + e.message;
    $('#status').className = 'ps-status err';
    return;
  }
  $('#fileName').textContent = file.name;
  $('#fileMeta').textContent = `${(file.size / 1024).toFixed(1)} KB · ${currentPdf.getPageCount()} pages`;
  $('#fileInfo').style.display = 'flex';
  $('#dropzone').style.display = 'none';
  $('#controls').style.display = 'block';
  $('#results').innerHTML = '';
  $('#status').textContent = '';
  $('#status').className = 'ps-status';
}

function setMode(m) {
  mode = m;
  document.querySelectorAll('.ps-mode').forEach(el => el.classList.toggle('active', el.dataset.mode === m));
  $('#rangeInput').style.display = m === 'range' ? 'block' : 'none';
  $('#everynInput').style.display = m === 'everyn' ? 'block' : 'none';
}

function parseRanges(str, maxPage) {
  // Parse "1-3, 5, 7-9" into array of arrays of page numbers (1-based)
  const result = [];
  const parts = str.split(',').map(s => s.trim()).filter(Boolean);
  for (const part of parts) {
    if (/^\d+$/.test(part)) {
      const n = +part;
      if (n >= 1 && n <= maxPage) result.push([n]);
    } else {
      const m = part.match(/^(\d+)\s*-\s*(\d+)$/);
      if (m) {
        const a = +m[1], b = +m[2];
        if (a >= 1 && b <= maxPage && a <= b) {
          const pages = [];
          for (let i = a; i <= b; i++) pages.push(i);
          result.push(pages);
        }
      }
    }
  }
  return result;
}

async function split() {
  if (!currentPdf) return;
  const totalPages = currentPdf.getPageCount();
  let groups = [];

  if (mode === 'all') {
    for (let i = 1; i <= totalPages; i++) groups.push([i]);
  } else if (mode === 'range') {
    const ranges = $('#ranges').value;
    groups = parseRanges(ranges, totalPages);
    if (groups.length === 0) {
      $('#status').textContent = t('noPages');
      $('#status').className = 'ps-status err';
      return;
    }
  } else if (mode === 'everyn') {
    const n = Math.max(2, Math.min(1000, +$('#n').value || 2));
    for (let i = 1; i <= totalPages; i += n) {
      const chunk = [];
      for (let j = i; j < Math.min(i + n, totalPages + 1); j++) chunk.push(j);
      groups.push(chunk);
    }
  }

  if (groups.length === 0) {
    $('#status').textContent = t('noPages');
    $('#status').className = 'ps-status err';
    return;
  }

  $('#progress').style.display = 'block';
  $('#status').textContent = '';
  $('#status').className = 'ps-status';
  $('#results').innerHTML = '';

  // Load fresh copy of original PDF bytes
  const srcPdf = await PDFDocument.load(currentBytes, { ignoreEncryption: true });

  for (let gi = 0; gi < groups.length; gi++) {
    const group = groups[gi];
    const newPdf = await PDFDocument.create();
    const indices = group.map(p => p - 1); // 0-based for pdf-lib
    const copied = await newPdf.copyPages(srcPdf, indices);
    copied.forEach(p => newPdf.addPage(p));
    const bytes = await newPdf.save();
    const blob = new Blob([bytes], { type: 'application/pdf' });
    const url = URL.createObjectURL(blob);
    
    const rangeStr = group.length === 1 ? `page-${group[0]}` : `pages-${group[0]}-to-${group[group.length-1]}`;
    const filename = `${currentFileName}-${rangeStr}.pdf`;

    const div = document.createElement('div');
    div.className = 'ps-result';
    const safeName = filename.replace(/[<>&"']/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;',"'":'&#39;'}[c]));
    div.innerHTML = `
      <span>📄</span>
      <span class="name">${safeName}</span>
      <span style="color:var(--text2);font-size:.8em">${(blob.size / 1024).toFixed(1)} KB</span>
      <a class="gz-btn" href="${url}" download="${filename}">${t('download')}</a>
    `;
    $('#results').appendChild(div);

    $('#progressBar').style.width = ((gi + 1) / groups.length * 100) + '%';
  }

  $('#progress').style.display = 'none';
  $('#status').textContent = t('ok').replace('{n}', groups.length);
  $('#status').className = 'ps-status ok';
}

// Event handlers
const dz = $('#dropzone');
const fi = $('#fileInput');
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag'); });
dz.addEventListener('dragleave', e => { dz.classList.remove('drag'); });
dz.addEventListener('drop', e => {
  e.preventDefault();
  dz.classList.remove('drag');
  if (e.dataTransfer.files[0]) loadPdfFromFile(e.dataTransfer.files[0]);
});
fi.addEventListener('change', e => { if (e.target.files[0]) loadPdfFromFile(e.target.files[0]); });
$('#changeFile').addEventListener('click', () => {
  $('#dropzone').style.display = 'flex';
  $('#fileInfo').style.display = 'none';
  $('#controls').style.display = 'none';
  fi.value = '';
  currentPdf = null;
  currentBytes = null;
});

$('#toolbar').innerHTML = `<button class="gz-btn" onclick="split()">${t('convert')}</button><button class="gz-btn gz-btn-secondary" onclick="$('#results').innerHTML='';$('#status').textContent=''">${t('clear')}</button>`;

GZ.renderToolPage({
  category: 'convert',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1', 'step2', 'step3', 'step4'],
  related: [
    {icon: '📄', href: '/convert/pdf-merger.html', name: 'PDF Merger'},
    {icon: '🖼️', href: '/convert/pdf-to-image.html', name: 'PDF to Image'},
    {icon: '📄', href: '/convert/image-to-pdf.html', name: 'Image to PDF'},
    {icon: '🗜️', href: '/convert/pdf-compressor.html', name: 'PDF Compressor'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
