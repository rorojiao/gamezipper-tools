<script type="application/ld+json">{"@context":"https://schema.org","@type":"WebApplication","name":"Pay Raise Calculator","description":"Calculate raise percentage, new annual salary, new hourly rate and total yearly increase from your current pay and raise amount.","url":"https://tools.gamezipper.com/calc/pay-raise-calculator.html","applicationCategory":"Utility","operatingSystem":"Web Browser","offers":{"@type":"Offer","price":"0"}}</script>
<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "How do I calculate a pay raise percentage?", "acceptedAnswer": {"@type": "Answer", "text": "Divide the raise amount by your current salary and multiply by 100. For example, a $5,000 raise on a $50,000 salary is 5,000 ÷ 50,000 × 100 = 10%."}}, {"@type": "Question", "name": "Is a 5% raise good?", "acceptedAnswer": {"@type": "Answer", "text": "A 5% raise is typically considered solid — it is above average US merit-increase budgets (usually 3-4%). Whether it beats inflation depends on the current CPI; if inflation is higher than your raise, your real purchasing power is shrinking."}}, {"@type": "Question", "name": "How does a raise affect my hourly rate?", "acceptedAnswer": {"@type": "Answer", "text": "For salaried workers paid biweekly, divide your new annual salary by 2,080 (full-time hours per year) to get the new hourly equivalent, or by 26 to get the new per-paycheck gross."}}, {"@type": "Question", "name": "Is my salary information stored?", "acceptedAnswer": {"@type": "Answer", "text": "No. All calculations happen entirely in your browser. No salary, raise or hourly data is sent to any server."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-form" id="form">
      <div class="tab-row" id="mode-tabs">
        <button id="tab-pct" class="active" onclick="setMode('pct')"></button>
        <button id="tab-amt" onclick="setMode('amt')"></button>
      </div>
      <div>
        <label id="lbl-current"></label>
        <input type="number" id="current" value="50000" min="0" step="1000">
      </div>
      <div id="field-pct">
        <label id="lbl-raise-pct"></label>
        <input type="number" id="raisePct" value="5" min="0" step="0.1">
      </div>
      <div id="field-amt" style="display:none">
        <label id="lbl-raise-amt"></label>
        <input type="number" id="raiseAmt" value="2500" min="0" step="100">
      </div>
      <div>
        <label id="lbl-hours"></label>
        <input type="number" id="hours" value="2080" min="1" step="40">
      </div>
      <button class="gz-btn" onclick="calculate()" id="btn-calc"></button>
    </div>
    <div class="result-card" id="result" style="display:none">
      <div class="big" id="result-new"></div>
      <div class="label" id="result-label"></div>
      <div class="result-grid">
        <div class="result-item"><div class="val" id="result-pct"></div><div class="lbl" id="result-pct-label"></div></div>
        <div class="result-item"><div class="val" id="result-increase"></div><div class="lbl" id="result-increase-label"></div></div>
        <div class="result-item"><div class="val" id="result-hourly"></div><div class="lbl" id="result-hourly-label"></div></div>
        <div class="result-item"><div class="val" id="result-monthly"></div><div class="lbl" id="result-monthly-label"></div></div>
      </div>
    </div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Pay Raise Calculator',
    toolDesc: 'Calculate your raise percentage, new salary, new hourly rate and yearly increase from your current pay.',
    tabPct: 'By Percentage',
    tabAmt: 'By Amount',
    lblCurrent: 'Current Annual Salary ($)',
    lblRaisePct: 'Raise Percentage (%)',
    lblRaiseAmt: 'Raise Amount ($)',
    lblHours: 'Work Hours per Year',
    btnCalc: 'Calculate New Salary',
    resultLabel: 'New Annual Salary',
    pctLabel: 'Raise %',
    increaseLabel: 'Yearly Increase',
    hourlyLabel: 'New Hourly Rate',
    monthlyLabel: 'New Monthly Pay',
    step1: 'Choose whether to enter the raise as a percentage or as a dollar amount',
    step2: 'Enter your current annual salary',
    step3: 'Set your work hours per year (2080 = full-time)',
    step4: 'Click Calculate to see your new salary, raise %, hourly rate and monthly pay',
  },
  zh: {
    toolTitle: '加薪计算器',
    toolDesc: '根据当前薪资计算加薪比例、新薪资、新时薪和年增薪金额。',
    tabPct: '按比例',
    tabAmt: '按金额',
    lblCurrent: '当前年薪（美元）',
    lblRaisePct: '加薪比例（%）',
    lblRaiseAmt: '加薪金额（美元）',
    lblHours: '每年工作时长',
    btnCalc: '计算新薪资',
    resultLabel: '新年薪',
    pctLabel: '加薪比例',
    increaseLabel: '年增薪金额',
    hourlyLabel: '新时薪',
    monthlyLabel: '新月薪',
    step1: '选择按比例或按金额输入加薪',
    step2: '输入当前年薪',
    step3: '设置每年工作时长（2080 = 全职）',
    step4: '点击「计算新薪资」查看新薪资、加薪比例、时薪和月薪',
  }
});

const { $, t } = GZ;
let mode = 'pct';

function setMode(m) {
  mode = m;
  $('#tab-pct').classList.toggle('active', m === 'pct');
  $('#tab-amt').classList.toggle('active', m === 'amt');
  $('#field-pct').style.display = m === 'pct' ? '' : 'none';
  $('#field-amt').style.display = m === 'amt' ? '' : 'none';
  calculate();
}

function calculate() {
  const current = Math.max(0, parseFloat($('#current').value) || 0);
  const hours = Math.max(1, parseFloat($('#hours').value) || 2080);

  let raisePct, raiseAmt;
  if (mode === 'pct') {
    raisePct = parseFloat($('#raisePct').value) || 0;
    raiseAmt = current * raisePct / 100;
  } else {
    raiseAmt = parseFloat($('#raiseAmt').value) || 0;
    raisePct = current > 0 ? raiseAmt / current * 100 : 0;
  }
  const newSalary = current + raiseAmt;
  const hourly = newSalary / hours;
  const monthly = newSalary / 12;

  const currency = '$';
  $('#result').style.display = '';
  $('#result-new').textContent = currency + newSalary.toLocaleString(undefined, {maximumFractionDigits: 0});
  $('#result-label').textContent = t('resultLabel');
  $('#result-pct').textContent = raisePct.toFixed(2) + '%';
  $('#result-pct-label').textContent = t('pctLabel');
  $('#result-increase').textContent = currency + raiseAmt.toLocaleString(undefined, {maximumFractionDigits: 0});
  $('#result-increase-label').textContent = t('increaseLabel');
  $('#result-hourly').textContent = currency + hourly.toFixed(2);
  $('#result-hourly-label').textContent = t('hourlyLabel');
  $('#result-monthly').textContent = currency + monthly.toLocaleString(undefined, {maximumFractionDigits: 0});
  $('#result-monthly-label').textContent = t('monthlyLabel');
}

$('#btn-calc').textContent = t('btnCalc');
$('#tab-pct').textContent = t('tabPct');
$('#tab-amt').textContent = t('tabAmt');
calculate();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'💼', href:'/calc/salary-calculator.html', name:'Salary Calc'},
    {icon:'🏦', href:'/calc/loan-calculator.html', name:'Loan Calc'},
    {icon:'📊', href:'/calc/percentage-calculator.html', name:'Percentage'},
    {icon:'💰', href:'/calc/tax-calculator.html', name:'Tax Calc'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
