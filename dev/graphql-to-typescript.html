<script>
GZI18n.register({
  en: {

    convert: 'Convert to TS',
    export: 'Export types',

    step3: 'Click Convert to generate TypeScript types',

  },
  zh: {
    toolTitle: 'GraphQL Schema 转 TypeScript 转换器',
    toolDesc: '将 GraphQL SDL schema 转换为 TypeScript 类型、接口和枚举。处理可空、列表、自定义标量和输入类型 — 免费、私密、浏览器本地运行。',
    convert: '转换为 TS',
    export: '导出类型',
    readonly: '只读字段',
    scalars: '自定义标量作为 string',
    step1: '在左侧输入区粘贴 GraphQL SDL schema',
    step2: '切换选项：导出、只读、自定义标量处理',
    step3: '点击转换生成 TypeScript 类型',
    step4: '复制结果到你的 .ts 文件',
  }
});

const { $, copyText, t } = GZ;
let opts = { export: true, readonly: false, scalars: true };

const scalarMap = {
  'String': 'string',
  'ID': 'string',
  'Int': 'number',
  'Float': 'number',
  'Boolean': 'boolean',
  'DateTime': 'string',
  'Date': 'string',
  'JSON': 'Record<string, any>',
  'Long': 'number',
  'BigInt': 'bigint',
  'UUID': 'string',
  'URL': 'string',
  'Email': 'string',
};

function parseGraphQL(schema) {
  const result = { types: [], inputs: [], enums: [], interfaces: [], unions: [], scalars: [] };

  // Custom scalars
  const scalarRegex = /scalar\s+(\w+)/g;
  let m;
  while ((m = scalarRegex.exec(schema)) !== null) {
    result.scalars.push(m[1]);
  }

  // Enums
  const enumRegex = /enum\s+(\w+)\s*\{([^}]*)\}/g;
  while ((m = enumRegex.exec(schema)) !== null) {
    const [, name, body] = m;
    const values = body.split('\n').map(s => s.trim()).filter(Boolean);
    result.enums.push({ name, values });
  }

  // Types and Inputs
  const typeRegex = /(type|input|interface)\s+(\w+)(?:\s+implements\s+\w+)?\s*\{([^}]*)\}/g;
  while ((m = typeRegex.exec(schema)) !== null) {
    const [, kind, name, body] = m;
    const fields = parseFields(body);
    if (kind === 'type') result.types.push({ name, fields });
    else if (kind === 'input') result.inputs.push({ name, fields });
    else if (kind === 'interface') result.interfaces.push({ name, fields });
  }

  // Unions
  const unionRegex = /union\s+(\w+)\s*=\s*(.+)/g;
  while ((m = unionRegex.exec(schema)) !== null) {
    const [, name, members] = m;
    result.unions.push({ name, members: members.split('|').map(s => s.trim()) });
  }

  return result;
}

function parseFields(body) {
  const fields = [];
  const lines = body.split('\n').map(s => s.trim()).filter(Boolean);
  for (const line of lines) {
    // Skip directives-only lines
    if (line.startsWith('#') || line.startsWith('"')) continue;

    // Field: name: Type (with optional args)
    const fm = line.match(/^(\w+)\s*(?:\([^)]*\))?\s*:\s*(.+?)(?:\s*@.*)?$/);
    if (fm) {
      const [, fieldName, typeStr] = fm;
      fields.push({ name: fieldName, type: typeStr.trim() });
    }
  }
  return fields;
}

function convertGQLType(gqlType) {
  let isNonNull = false;
  let isList = false;
  let innerType = gqlType;

  // Non-null
  if (innerType.endsWith('!')) {
    isNonNull = true;
    innerType = innerType.slice(0, -1);
  }
  // List
  if (innerType.startsWith('[') && innerType.endsWith(']')) {
    isList = true;
    innerType = innerType.slice(1, -1);
    if (innerType.endsWith('!')) innerType = innerType.slice(0, -1);
  }
  // Inner non-null (already stripped)
  if (innerType.endsWith('!')) innerType = innerType.slice(0, -1);

  // Map scalar or reference
  let tsType;
  if (scalarMap[innerType]) {
    tsType = scalarMap[innerType];
  } else if (opts.scalars && !['String', 'ID', 'Int', 'Float', 'Boolean'].includes(innerType)) {
    tsType = 'string';
  } else {
    tsType = innerType;
  }

  if (isList) tsType = `${tsType}[]`;
  // Nullable → optional (handled in field generation)

  return { tsType, nullable: !isNonNull };
}

function convertGraphQLToTS(schema) {
  const parsed = parseGraphQL(schema);
  const stats = { types: 0, inputs: 0, enums: 0, unions: 0, fields: 0 };
  let output = '// TypeScript types generated from GraphQL schema\n\n';
  const prefix = opts.export ? 'export ' : '';

  // Enums
  parsed.enums.forEach(en => {
    stats.enums++;
    output += `${prefix}enum ${en.name} {\n`;
    en.values.forEach(v => {
      // Keep as-is or sanitize
      const val = v.replace(/[^A-Za-z0-9_]/g, '_');
      output += `  ${val} = "${val}",\n`;
    });
    output += `}\n\n`;
  });

  // Types
  parsed.types.forEach(tp => {
    stats.types++;
    output += `${prefix}interface ${tp.name} {\n`;
    tp.fields.forEach(f => {
      stats.fields++;
      const { tsType, nullable } = convertGQLType(f.type);
      const ro = opts.readonly ? 'readonly ' : '';
      const opt = nullable ? '?' : '';
      output += `  ${ro}${f.name}${opt}: ${tsType};\n`;
    });
    output += `}\n\n`;
  });

  // Inputs
  parsed.inputs.forEach(inp => {
    stats.inputs++;
    output += `${prefix}interface ${inp.name} {\n`;
    inp.fields.forEach(f => {
      stats.fields++;
      const { tsType, nullable } = convertGQLType(f.type);
      const ro = opts.readonly ? 'readonly ' : '';
      const opt = nullable ? '?' : '';
      output += `  ${ro}${f.name}${opt}: ${tsType};\n`;
    });
    output += `}\n\n`;
  });

  // Interfaces
  parsed.interfaces.forEach(iface => {
    stats.types++;
    output += `${prefix}interface ${iface.name} {\n`;
    iface.fields.forEach(f => {
      stats.fields++;
      const { tsType, nullable } = convertGQLType(f.type);
      const ro = opts.readonly ? 'readonly ' : '';
      const opt = nullable ? '?' : '';
      output += `  ${ro}${f.name}${opt}: ${tsType};\n`;
    });
    output += `}\n\n`;
  });

  // Unions
  parsed.unions.forEach(u => {
    stats.unions++;
    output += `${prefix}type ${u.name} = ${u.members.join(' | ')};\n\n`;
  });

  return { code: output.trim(), stats };
}

function doConvert() {
  const inp = $('#input').value.trim();
  if (!inp) { $('#output').textContent = ''; $('#status').innerHTML = ''; return; }
  try {
    const { code, stats } = convertGraphQLToTS(inp);
    $('#output').textContent = code;
    const badges = [
      stats.types ? `<span class="stat-badge">📦 ${stats.types} types</span>` : '',
      stats.inputs ? `<span class="stat-badge">📥 ${stats.inputs} inputs</span>` : '',
      stats.enums ? `<span class="stat-badge">🔢 ${stats.enums} enums</span>` : '',
      stats.unions ? `<span class="stat-badge">🔗 ${stats.unions} unions</span>` : '',
      `<span class="stat-badge">📝 ${stats.fields} fields</span>`,
    ].join('');
    $('#status').innerHTML = `<span style="color:var(--gz-success)">✓ Converted</span> ${badges}`;
  } catch(e) {
    $('#output').textContent = '';
    $('#status').innerHTML = `<span style="color:var(--gz-accent)">Error: ${e.message}</span>`;
  }
}

function loadExample() {
  $('#input').value = `type User {
  id: ID!
  name: String!
  email: String
  age: Int
  isActive: Boolean!
  role: UserRole!
  posts: [Post!]!
  profile: Profile
}

type Post {
  id: ID!
  title: String!
  content: String
  published: Boolean!
  author: User!
  tags: [String!]!
  createdAt: DateTime
}

type Profile {
  bio: String
  avatarUrl: URL
  website: String
}

input CreateUserInput {
  name: String!
  email: String!
  age: Int
  role: UserRole = MEMBER
}

enum UserRole {
  ADMIN
  MEMBER
  GUEST
}

union SearchResult = User | Post`;
  doConvert();
}

function doClear() { $('#input').value = ''; $('#output').textContent = ''; $('#status').innerHTML = ''; }

$('#options').innerHTML = `

  <label><input type="checkbox" id="opt-ro" ${opts.readonly?'checked':''}> ${t('readonly')}</label>
  <label><input type="checkbox" id="opt-sc" ${opts.scalars?'checked':''}> ${t('scalars')}</label>
`;
['opt-exp','opt-ro','opt-sc'].forEach(id => {
  $('#' + id).addEventListener('change', e => {
    const key = id === 'opt-exp' ? 'export' : id === 'opt-ro' ? 'readonly' : 'scalars';
    opts[key] = e.target.checked;
    doConvert();
  });
});

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="doConvert()">⚡ ${t('convert')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">📋 ${t('example')}</button>
  <button class="gz-btn" onclick="copyText($('#output').textContent)">📋 ${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">🗑️ ${t('clear')}</button>`;

</script>
