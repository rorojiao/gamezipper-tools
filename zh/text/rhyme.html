const { $, copyText, t } = GZ;

function getEndings(word) {
  const w = word.toLowerCase();
  const results = { perfect: [], near: [], slant: [] };

  // Find all rhyme groups that match this word's ending
  for (const [ending, words] of Object.entries(RHYMES)) {
    const idx = words.findIndex(rw => rw.toLowerCase() === w);
    if (idx !== -1) {
      // Perfect rhymes = same group, exclude the word itself
      results.perfect = words.filter(rw => rw.toLowerCase() !== w);
    }
  }

  // Near rhymes: match last 2-3 chars against other groups
  if (w.length >= 3) {
    const suffix3 = w.slice(-3);
    const suffix2 = w.slice(-2);
    for (const [ending, words] of Object.entries(RHYMES)) {
      const hasWord = words.some(rw => rw.toLowerCase() === w);
      if (!hasWord) {
        if (ending.endsWith(suffix3) || ending.endsWith(suffix2) ||
            suffix3.endsWith(ending.slice(-2))) {
          results.near.push(...words.slice(0, 15));
        }
      }
    }
  }

  // Slant rhymes: match vowel pattern
  const vowels = w.replace(/[^aeiou]/g, '');
  if (vowels.length >= 1) {
    const lastVowel = vowels[vowels.length - 1];
    for (const [ending, words] of Object.entries(RHYMES)) {
      const hasWord = words.some(rw => rw.toLowerCase() === w);
      const inPerfect = results.perfect.includes(words[0]);
      const inNear = results.near.includes(words[0]);
      if (!hasWord && !inPerfect && !inNear) {
        const endingVowels = ending.replace(/[^aeiou]/g, '');
        if (endingVowels.includes(lastVowel)) {
          results.slant.push(...words.slice(0, 8));
        }
      }
    }
  }

  // Remove duplicates and limit
  results.perfect = [...new Set(results.perfect)].slice(0, 30);
  results.near = [...new Set(results.near)].filter(w2 => !results.perfect.includes(w2)).slice(0, 20);
  results.slant = [...new Set(results.slant)].filter(w2 => !results.perfect.includes(w2) && !results.near.includes(w2)).slice(0, 15);

  return results;
}

function findRhymes(word) {
  if (!word) word = $('#word').value.trim().toLowerCase();
  if (!word) return;
  $('#word').value = word;

  const data = getEndings(word);
  const hasResults = data.perfect.length || data.near.length || data.slant.length;

  if (!hasResults) {
    $('#results').innerHTML = `<div class="rh-empty"><p>${t('notFound')} "<strong>${word}</strong>"</p><p style="font-size:.85rem;margin-top:4px">${t('notFoundHint')}</p></div>`;
    return;
  }

  let html = '';

  if (data.perfect.length) {
    html += `<div class="rh-section"><div class="rh-section-title">${t('perfectRhymes')} (${data.perfect.length})</div><div class="rh-tags">`;
    html += data.perfect.map(s => `<span class="rh-tag perfect" onclick="findRhymes('${s}')">${s}</span>`).join('');
    html += '</div></div>';
  }
  if (data.near.length) {
    html += `<div class="rh-section"><div class="rh-section-title">${t('nearRhymes')} (${data.near.length})</div><div class="rh-tags">`;
    html += data.near.map(s => `<span class="rh-tag near" onclick="findRhymes('${s}')">${s}</span>`).join('');
    html += '</div></div>';
  }
  if (data.slant.length) {
    html += `<div class="rh-section"><div class="rh-section-title">${t('slantRhymes')} (${data.slant.length})</div><div class="rh-tags">`;
    html += data.slant.map(s => `<span class="rh-tag slant" onclick="findRhymes('${s}')">${s}</span>`).join('');
    html += '</div></div>';
  }

  $('#results').innerHTML = html;
}

$('#word').addEventListener('keydown', e => { if (e.key === 'Enter') findRhymes(); });
