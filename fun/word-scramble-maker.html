<script>
GZI18n.register({
  en: {
    toolTitle: 'Word Scramble Maker',
    toolDesc: 'Turn any word list into a printable scrambled-word puzzle with answer key. Add hints, choose difficulty and case — perfect for classrooms, parties and worksheets. Free, no signup.',
    lblPuzzleTitle: 'Puzzle Title', lblDifficulty: 'Difficulty',
    lblShowKey: 'Output', lblCase: 'Letter Case',
    generate: 'Generate Puzzle', print: 'Print / PDF', sample: 'Load Sample',
    answerKey: 'Answer Key', puzzleHeader: 'Unscramble each word:',
    step1: 'Enter your words — one per line. Add a hint after a dash (optional).',
    step2: 'Set the puzzle title, difficulty and output mode',
    step3: 'Click Generate to scramble the words',
    step4: 'Print the worksheet or copy the answer key',
  },
  zh: {
    toolTitle: '单词打乱谜题生成器',
    toolDesc: '将任意单词列表转换为可打印的打乱字母谜题并附答案。可添加提示、选择难度和大小写 — 适合课堂、派对和练习纸。免费、无需注册。',
    lblPuzzleTitle: '谜题标题', lblDifficulty: '难度',
    lblShowKey: '输出', lblCase: '字母大小写',
    generate: '生成谜题', print: '打印 / PDF', sample: '加载示例',
    answerKey: '答案', puzzleHeader: '请还原下列打乱的单词：',
    step1: '输入单词 — 每行一个。可在破折号后添加提示（可选）',
    step2: '设置谜题标题、难度和输出模式',
    step3: '点击「生成谜题」打乱单词',
    step4: '打印练习纸或复制答案',
  }
});

const { $, copyText, t } = GZ;
let lastPuzzle = [];

function parseInput() {
  const raw = $('#puzzleInput').value.trim();
  if (!raw) return [];
  return raw.split(/\n|,/).map(line => {
    const parts = line.split(/\s*[-—–]\s*(.+)/); // split on first dash
    const word = (parts[0] || '').trim().replace(/[^A-Za-z0-9\u4e00-\u9fa5 ]/g, '');
    const hint = (parts[1] || '').trim();
    return { word, hint };
  }).filter(o => o.word && o.word.length > 1 && o.word.length < 24);
}

function scramble(word, difficulty) {
  const letters = word.split('');
  if (word.length < 2) return word;
  let result, tries = 0;
  do {
    // Fisher-Yates
    for (let i = letters.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [letters[i], letters[j]] = [letters[j], letters[i]];
    }
    result = letters.join('');
    tries++;
    if (difficulty === 'easy' && tries < 30) {
      // require 2+ adjacent original pairs to remain
      let kept = 0;
      for (let i = 0; i < word.length - 1; i++) if (result[i] === word[i]) kept++;
      if (kept >= 2 && result !== word) break;
    } else if (difficulty === 'medium' && tries < 30) {
      if (result[0] !== word[0] && result !== word) break;
    } else {
      if (result !== word) break;
    }
  } while (tries < 50);
  return result === word ? word.split('').reverse().join('') : result;
}

function applyCase(s, style) {
  if (style === 'upper') return s.toUpperCase();
  if (style === 'lower') return s.toLowerCase();
  return s.replace(/\w\S*/g, w => w[0].toUpperCase() + w.slice(1).toLowerCase());
}

function generate() {
  const items = parseInput();
  if (!items.length) { $('#output').innerHTML = `<p style="opacity:.6">⚠️ ${t('step1')}</p>`; return; }
  const diff = $('#difficulty').value;
  const cs = $('#caseStyle').value;
  lastPuzzle = items.map((it, i) => ({
    num: i + 1,
    original: applyCase(it.word, cs),
    scrambled: applyCase(scramble(it.word, diff), cs),
    hint: it.hint,
  }));

  const showPuzzle = $('#showKey').value !== 'key';
  const showKey = $('#showKey').value !== 'puzzle';
  let html = `<h3>${escapeHtml($('#puzzleTitle').value || 'Word Scramble')}</h3>`;

  if (showPuzzle) {
    html += `<p style="margin:0 0 14px 0;font-weight:600">${t('puzzleHeader')}</p>`;
    html += `<div class="scramble-grid">`;
    lastPuzzle.forEach(p => {
      html += `<div class="scramble-item">
        <span class="scramble-num">${p.num}.</span>
        <span class="scramble-word">${escapeHtml(p.scrambled)}</span>
        <span class="scramble-blank"></span>
        ${p.hint ? `<span class="scramble-hint">(${escapeHtml(p.hint)})</span>` : ''}
      </div>`;
    });
    html += `</div>`;
  }
  if (showKey) {
    html += `<h3 style="margin-top:24px">${t('answerKey')}</h3><div class="scramble-grid">`;
    lastPuzzle.forEach(p => {
      html += `<div class="scramble-item"><span class="scramble-num">${p.num}.</span>
        <span class="scramble-word" style="color:var(--gz-success)">${escapeHtml(p.original)}</span></div>`;
    });
    html += `</div>`;
  }
  $('#output').innerHTML = html;
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function loadSample() {
  $('#puzzleInput').value = `planet - it orbits the sun\ncomet - has a tail of ice\nasteroid - rocky body in space\ngalaxy - billions of stars\nmeteor - shooting star\norbit - path around a star\nrocket - vehicle that flies to space\nmoon - earth's natural satellite`;
  generate();
}
function printPuzzle() { window.print(); }

['#puzzleTitle','#difficulty','#showKey','#caseStyle'].forEach(s => $(s).addEventListener('input', generate));
$('#puzzleInput').addEventListener('input', generate);

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="generate()">🎲 ${t('generate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadSample()">${t('sample')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="printPuzzle()">🖨️ ${t('print')}</button>`;

GZ.renderToolPage({
  category: 'fun',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🔤', href:'/fun/word-search.html', name:'Word Search'},
    {icon:'🧩', href:'/fun/crossword-maker.html', name:'Crossword Maker'},
    {icon:'🅰️', href:'/fun/hangman.html', name:'Hangman'},
    {icon:'🟩', href:'/fun/wordle.html', name:'Wordle'},
  ]
});
generate();
</script>
