    inputLabel: 'JSON 输入', outputLabel: 'Rust 输出',
    btnConvert: '转换', btnExample: '示例', btnCopy: '复制', btnClear: '清空',
    jsonValid: '✓ JSON 有效', jsonInvalid: '✗ JSON 无效',
    errTopLevel: '顶层 JSON 必须是对象才能生成结构体。请先用 { "items": [...] } 包裹。',
    step1: '将 JSON 对象粘贴到输入框。顶层数组不支持 — 请先用对象包裹。',
    step2: '设置根结构体名称、字段命名风格，以及 Option、rename_all 和 derive 等开关。',
    step3: '嵌套对象会自动生成各自的结构体，按依赖顺序输出在根结构体下方。',

const { $, copyText, t } = GZ;

const RUST_KEYWORDS = new Set(['as','break','const','continue','crate','else','enum','extern','false','fn','for','if','impl','in','let','loop','match','mod','move','mut','pub','ref','return','self','Self','static','struct','super','trait','true','type','unsafe','use','where','while','async','await','dyn','abstract','become','box','do','final','macro','override','priv','typeof','unsized','virtual','yield','try']);

function escapeHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function sanitizeIdent(name) {
  let s = String(name).replace(/[^A-Za-z0-9_]/g, '_');
  if (/^[0-9]/.test(s)) s = '_' + s;
  if (RUST_KEYWORDS.has(s)) s = s + '_';
  return s;
}

function toPascal(name) {
  return name.split(/[^A-Za-z0-9]+/).filter(Boolean).map(w => w.charAt(0).toUpperCase() + w.slice(1)).join('') || 'Field';
}
function toCamel(name) {
  const p = toPascal(name);
  return p.charAt(0).toLowerCase() + p.slice(1);
}
function toSnake(name) {
  return name.replace(/([a-z])([A-Z])/g, '$1_$2').replace(/[^A-Za-z0-9]+/g, '_').toLowerCase().replace(/^_+|_+$/g, '') || 'field';
}

function renameField(name) {
  const style = $('#caseStyle').value;
  if (style === 'snake') return toSnake(name);
  if (style === 'camel') return toCamel(name);
  if (style === 'pascal') return toPascal(name);
  return sanitizeIdent(name);
}

function rustType(value, hint, structs) {
  if (value === null || value === undefined) return 'Option<serde_json::Value>';
  if (typeof value === 'boolean') return 'bool';
  if (typeof value === 'number') {
    if (Number.isInteger(value)) {
      if (Math.abs(value) > 2147483647) return 'i64';
      return 'i32';
    }
    return 'f64';
  }
  if (typeof value === 'string') return 'String';
  if (Array.isArray(value)) {
    if (value.length === 0) return 'Vec<serde_json::Value>';
    const inner = rustType(value[0], null, structs);
    return `Vec<${inner}>`;
  }
  // object
  if (hint) return hint;
  const structName = toPascal(hint && hint !== 'object' ? hint : 'Item');
  // We'll register structs separately; for inline anonymous objects we use HashMap
  return 'HashMap<String, serde_json::Value>';
}

// Walk JSON and produce a list of struct definitions
function extractStructs(obj, name, structs) {
  if (obj === null || typeof obj !== 'object') return;
  const isArray = Array.isArray(obj);
  const src = isArray ? (obj[0] && typeof obj[0] === 'object' ? obj[0] : null) : obj;
  if (!src || typeof src !== 'object') return;

  const pascalName = toPascal(name);
  const fields = [];
  const keys = Object.keys(src);

  // Collect field types considering all elements in array
  keys.forEach(k => {
    const samples = isArray ? obj.map(o => o[k]).filter(v => v !== undefined) : [src[k]];
    const present = samples.length;
    let rustT = null;
    let isOptional = false;
    // For each sample compute type; pick the most general
    const types = new Set();
    samples.forEach(s => {
      if (s === null) { isOptional = true; return; }
      if (Array.isArray(s)) {
        if (s.length === 0) types.add('Vec<serde_json::Value>');
        else if (typeof s[0] === 'object' && s[0] !== null) {
          // Array of objects → recurse and use a named struct
          const subName = pascalName + toPascal(k);
          extractStructs(s[0], subName, structs);
          types.add('Vec<' + subName + '>');
        } else {
          types.add('Vec<' + rustType(s[0], null, structs) + '>');
        }
        return;
      }
      if (typeof s === 'object') {
        const subName = pascalName + toPascal(k);
        // Recurse
        extractStructs(s, subName, structs);
        types.add(subName);
        return;
      }
      types.add(rustType(s, null, structs));
    });
    if (types.size === 0) {
      // all nulls
      rustT = 'serde_json::Value';
      isOptional = true;
    } else if (types.size === 1) {
      rustT = [...types][0];
    } else {
      // multiple primitive types — use serde_json::Value
      rustT = 'serde_json::Value';
    }
    if ($('#optOption').checked && (isOptional || present < (isArray ? obj.length : 1))) {
      // Mark as optional if missing in any object
      if (!rustT.startsWith('Option<')) rustT = `Option<${rustT}>`;
    }
    fields.push({ origKey: k, rustName: renameField(k), type: rustT });
  });

  structs.push({ name: pascalName, fields });
}

function emitStructs(structs) {
  const useOption = $('#optOption').checked;
  const wantRename = $('#renameAll').checked;
  const wantDerive = $('#derive').checked;
  const deriveLine = wantDerive ? `<span class="tok-attr">#[derive(Serialize, Deserialize)]</span>\n` : '';
  const renameLine = wantRename ? `<span class="tok-attr">#[serde(rename_all = "${$('#caseStyle').value === 'original' ? 'snake_case' : $('#caseStyle').value}_case")]</span>\n` : '';
  // emit top struct first then nested
  let out = '';
  // emit in reverse so dependents come first? Actually parent depends on child, so emit child first.
  // We pushed parent first then children; reverse so children appear before parent.
  const ordered = structs.slice().reverse();
  ordered.forEach((s, i) => {
    if (i === 0 && wantDerive) {
      out += `<span class="tok-com">use serde::{Serialize, Deserialize};</span>\n<span class="tok-com">use std::collections::HashMap;</span>\n\n`;
    }
    out += deriveLine + renameLine;
    out += `<span class="tok-key">pub struct</span> <span class="tok-type">${escapeHtml(s.name)}</span> <span class="tok-sym">{</span>\n`;
    s.fields.forEach(f => {
      // rename attribute if field name differs
      let renameAttr = '';
      if (wantRename && f.origKey !== f.rustName && $('#caseStyle').value !== 'original') {
        // rename_all handles snake/camel so per-field skip
      }
      out += `    <span class="tok-key">pub</span> <span class="tok-key">${escapeHtml(f.rustName)}</span>: <span class="tok-type">${escapeHtml(f.type)}</span>,\n`;
    });
    out += `<span class="tok-sym">}</span>\n\n`;
  });
  return out.replace(/\n$/, '');
}

function convert() {
  const inp = $('#input').value.trim();
  if (!inp) { $('#output').innerHTML = ''; $('#status').innerHTML = ''; return; }
  try {
    const obj = JSON.parse(inp);
    if (obj === null || typeof obj !== 'object' || Array.isArray(obj)) {
      $('#status').innerHTML = `<span style="color:var(--gz-accent)">${t('errTopLevel')}</span>`;
      $('#output').innerHTML = `<span style="color:var(--gz-accent)">${t('errTopLevel')}</span>`;
      return;
    }
    const rootName = $('#rootName').value.trim() || 'Root';
    const structs = [];
    extractStructs(obj, rootName, structs);
    const html = emitStructs(structs);
    $('#output').innerHTML = html;
    $('#status').innerHTML = `<span style="color:var(--gz-success)">${t('jsonValid')} — ${structs.length} struct${structs.length === 1 ? '' : 's'}</span>`;
  } catch (e) {
    $('#status').innerHTML = `<span style="color:var(--gz-accent)">${t('jsonInvalid')}: ${e.message}</span>`;
    $('#output').innerHTML = `<span style="color:var(--gz-accent)">${escapeHtml(e.message)}</span>`;
  }
}

function loadExample() {
  $('#input').value = JSON.stringify({
    id: 42,
    name: 'GameZipper Tools',
    active: true,
    description: null,
    score: 4.8,
    tags: ['rust', 'serde', 'json'],
    owner: { id: 1, username: 'admin', verified: true },
    versions: [{ major: 1, minor: 0 }, { major: 2, minor: 6 }]
  }, null, 2);
  convert();
}

function doClear() { $('#input').value = ''; $('#output').innerHTML = ''; $('#status').innerHTML = ''; }

['input', 'rootName', 'caseStyle', 'optOption', 'renameAll', 'derive'].forEach(id => {
  $('#' + id).addEventListener('input', convert);
  $('#' + id).addEventListener('change', convert);

  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('btnExample')}</button>
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('btnCopy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('btnClear')}</button>`;

$('#lbl-root').textContent = t('rootLabel');
$('#lbl-case').textContent = t('caseLabel');

</script>
