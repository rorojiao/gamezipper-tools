    loading: '⏳ 正在获取字幕...',
    noCaption: '此视频没有可用字幕。视频作者可能未添加字幕。',
    error: '无法获取字幕。请检查链接后重试。',
    step1: '从地址栏复制 YouTube 视频链接',
    step2: '将链接粘贴到上方输入框',

    invalidUrl: '请输入有效的 YouTube 链接',

const { $, t, copyText } = GZ;
let state = { videoId:'', segments:[], plainText:'' };
function extractVideoId(url){
  if(!url)return null;
  const patterns = [
    /(?:youtube\.com\/watch\?v=)([a-zA-Z0-9_-]{11})/,
    /(?:youtu\.be\/)([a-zA-Z0-9_-]{11})/,
    /(?:youtube\.com\/embed\/)([a-zA-Z0-9_-]{11})/,
    /(?:youtube\.com\/shorts\/)([a-zA-Z0-9_-]{11})/,
    /^([a-zA-Z0-9_-]{11})$/,
  ];
  for(const p of patterns){
    const m = url.match(p);
    if(m)return m[1];
  }
  return null;
}
async function fetchTranscript(){
  const url = $('#urlInput').value.trim();
  if(!url){$('#status').innerHTML='<span style="color:var(--gz-accent)">'+t('invalidUrl')+'</span>';return;}
  const videoId = extractVideoId(url);
  if(!videoId){$('#status').innerHTML='<span style="color:var(--gz-accent)">'+t('invalidUrl')+'</span>';return;}
  state.videoId = videoId;
  $('#placeholder').textContent = t('loading');
  $('#status').innerHTML = '';
  try {
    // Fetch the video page to get caption tracks
    const response = await fetch('https://www.youtube.com/watch?v='+videoId);
    const html = await response.text();
    // Extract caption tracks from ytInitialPlayerResponse
    const captionMatch = html.match(/"captionTracks":(\[.*?\])/);
    if(!captionMatch){
      // Check if captions exist in a different format
      if(html.includes('"captions":{}') || !html.includes('captionTracks')){
        $('#result').innerHTML = '<div class="yt-placeholder">'+t('noCaption')+'</div>';
        $('#status').innerHTML = '<span style="color:var(--gz-accent)">'+t('noCaption')+'</span>';
        return;
      }
    }
    let captionTracks;
    try{
      captionTracks = JSON.parse(captionMatch[1]);
    }catch(e){
      $('#result').innerHTML = '<div class="yt-placeholder">'+t('noCaption')+'</div>';
      return;
    }
    if(!captionTracks || captionTracks.length===0){
      $('#result').innerHTML = '<div class="yt-placeholder">'+t('noCaption')+'</div>';
      return;
    }
    // Prefer English, then first available
    const enTrack = captionTracks.find(c=>c.languageCode==='en') || captionTracks[0];
    const captionUrl = enTrack.baseUrl;
    // Fetch the caption data (XML format from YouTube)
    const capResp = await fetch(captionUrl+'&fmt=json3');
    const capText = await capResp.text();
    parseCaptions(capText);
  } catch(e){
    // CORS fallback - try alternative approach
    try{
      const response = await fetch('https://video.google.com/timedtext?lang=en&v='+videoId);
      const xml = await response.text();
      if(xml){
        parseXmlCaptions(xml);
      } else {
        $('#result').innerHTML = '<div class="yt-placeholder">'+t('error')+'</div>';
        $('#status').innerHTML = '<span style="color:var(--gz-accent)">'+t('error')+'</span>';
      }
    } catch(e2){
      $('#result').innerHTML = '<div class="yt-placeholder">'+t('error')+'</div>';
      $('#status').innerHTML = '<span style="color:var(--gz-accent)">'+t('error')+' ('+e2.message+')</span>';
    }
  }
}
function parseCaptions(json){
  try{
    const data = JSON.parse(json);
    state.segments = [];
    if(data.events){
      data.events.forEach(ev=>{
        if(ev.segs){
          let text = ev.segs.map(s=>s.utf8||'').join('').trim();
          if(text){
            state.segments.push({
              start: (ev.tStartMs||0)/1000,
              duration: (ev.dDurationMs||0)/1000,
              text: text,
            });
          }
        }
      });
    }
    renderResult();
  }catch(e){
    $('#result').innerHTML = '<div class="yt-placeholder">'+t('error')+'</div>';
  }
}
function parseXmlCaptions(xml){
  const parser = new DOMParser();
  const doc = parser.parseFromString(xml,'text/xml');
  const texts = doc.querySelectorAll('text');
  state.segments = [];
  texts.forEach(el=>{
    const start = parseFloat(el.getAttribute('start'))||0;
    const duration = parseFloat(el.getAttribute('dur'))||0;
    const text = decodeHtml(el.textContent);
    if(text.trim()){
      state.segments.push({start,duration,text});
    }
  });
  renderResult();
}
function decodeHtml(s){const d=document.createElement('div');d.innerHTML=s;return d.textContent||d.innerText||'';}
function formatTime(seconds){
  const h = Math.floor(seconds/3600);
  const m = Math.floor((seconds%3600)/60);
  const s = Math.floor(seconds%60);
  const ms = Math.floor((seconds%1)*1000);
  const pad = n=>String(n).padStart(2,'0');
  const padMs = n=>String(n).padStart(3,'0');
  return (h>0?pad(h)+':':'')+pad(m)+':'+pad(s)+'.'+padMs(ms);
}
function formatTimeSrt(seconds){
  const h = Math.floor(seconds/3600);
  const m = Math.floor((seconds%3600)/60);
  const s = Math.floor(seconds%60);
  const ms = Math.floor((seconds%1)*1000);
  const pad = n=>String(n).padStart(2,'0');
  const padMs = n=>String(n).padStart(3,'0');
  return pad(h)+':'+pad(m)+':'+pad(s)+'.'+padMs(ms);
}
function renderResult(){
  if(state.segments.length===0){
    $('#result').innerHTML = '<div class="yt-placeholder">'+t('noCaption')+'</div>';
    return;
  }
  state.plainText = state.segments.map(s=>s.text).join(' ');
  let html = '';
  state.segments.forEach(seg=>{
    html += '<div class="yt-segment"><span class="ts">'+formatTime(seg.start)+'</span>'+seg.text+'</div>';
  });
  $('#result').innerHTML = html;
  $('#status').innerHTML = '<span style="color:var(--gz-success)">✓ '+state.segments.length+' segments • '+state.plainText.split(' ').length+' words</span>';
}
function downloadText(){
  if(!state.plainText)return;
  downloadFile(state.plainText, 'transcript-'+state.videoId+'.txt', 'text/plain');
}
function downloadSrt(){
  if(state.segments.length===0)return;
  let srt = '';
  state.segments.forEach((seg,i)=>{
    srt += (i+1)+'\n';
    srt += formatTimeSrt(seg.start)+' --> '+formatTimeSrt(seg.start+seg.duration)+'\n';
    srt += seg.text+'\n\n';
  });
  downloadFile(srt, 'transcript-'+state.videoId+'.srt', 'text/plain');
}
function downloadVtt(){
  if(state.segments.length===0)return;
  let vtt = 'WEBVTT\n\n';
  state.segments.forEach(seg=>{
    vtt += formatTimeSrt(seg.start).replace(',','.')+' --> '+formatTimeSrt(seg.start+seg.duration).replace(',','.')+'\n';
    vtt += seg.text+'\n\n';
  });
  downloadFile(vtt, 'transcript-'+state.videoId+'.vtt', 'text/vtt');
}
function downloadFile(content, filename, mime){
  const blob = new Blob([content],{type:mime});
  const link = document.createElement('a');
  link.download = filename;
  link.href = URL.createObjectURL(blob);
  link.click();
  URL.revokeObjectURL(link.href);
}
function doCopy(){
  if(!state.plainText)return;
  copyText(state.plainText);
  $('#status').innerHTML = '<span style="color:var(--gz-success)">✓ Copied to clipboard</span>';
}
function doClear(){
  $('#urlInput').value='';
  state = {videoId:'',segments:[],plainText:''};
  $('#result').innerHTML = '<div class="yt-placeholder">'+t('placeholder')+'</div>';
  $('#status').innerHTML = '';
}
$('#fetchBtn').textContent = t('fetch');
$('#placeholder').textContent = t('placeholder');
$('#toolbar').innerHTML = `
  <button class="gz-btn gz-btn-secondary" onclick="downloadText()">${t('downloadText')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="downloadSrt()">${t('downloadSrt')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="downloadVtt()">${t('downloadVtt')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doCopy()">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>
`;
$('#fetchBtn').onclick = fetchTranscript;
$('#urlInput').addEventListener('keydown', e=>{if(e.key==='Enter')fetchTranscript();});

    {icon:'🏷️', href:'/text/youtube-tag-generator.html', name:'YT Tags'},
    {icon:'📺', href:'/text/youtube-title-checker.html', name:'YT Title'},
    {icon:'🔊', href:'/text/text-to-speech.html', name:'TTS'},
  ]
});
</script>
