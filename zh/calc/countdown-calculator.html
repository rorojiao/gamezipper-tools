<script>
GZI18n.register({
  en: {
    toolTitle: 'Countdown Calculator',
    toolDesc: 'Live countdown to any future date — or count up from any past date. Shows days, hours, minutes and seconds. Plan events, deadlines and milestones — free, browser-only.',
    target: 'Target date & time',
    name: 'Event name (optional)',
    days: 'days',
    hours: 'hours',
    minutes: 'minutes',
    seconds: 'seconds',
    remaining: 'remaining',
    ago: 'ago',
    until: 'until',
    since: 'since',
    arrived: '🎉 The moment has arrived!',
    step1: 'Enter a target date and time in the future (or past)',
    step2: 'Optionally give the event a name like "Birthday"',
    step3: 'Watch the live countdown update every second',
    step4: 'Use presets for quick common countdowns like New Year',
  },
  zh: {
    toolTitle: '倒计时计算器',
    toolDesc: '实时倒计时至任意未来日期 — 或从任意过去日期开始正向计时。显示天、时、分、秒。规划活动、截止日期和纪念日 — 免费、浏览器本地运行。',
    target: '目标日期和时间',
    name: '事件名称（可选）',
    days: '天',
    hours: '时',
    minutes: '分',
    seconds: '秒',
    remaining: '剩余',
    ago: '前',
    until: '距',
    since: '自',
    arrived: '🎉 时刻已到！',
    step1: '输入未来（或过去）的目标日期和时间',
    step2: '可选填事件名称，如「生日」',
    step3: '查看每秒更新的实时倒计时',
    step4: '使用预设快速倒计时到新年等常见日期',
  }
});

const { $, t } = GZ;

function nextNewYear() {
  const now = new Date();
  return new Date(now.getFullYear() + 1, 0, 1, 0, 0, 0);
}
function nextChristmas() {
  const now = new Date();
  let y = now.getFullYear();
  const c = new Date(y, 11, 25, 0, 0, 0);
  if (c < now) c.setFullYear(y + 1);
  return c;
}
function nextHalloween() {
  const now = new Date();
  let y = now.getFullYear();
  const c = new Date(y, 9, 31, 0, 0, 0);
  if (c < now) c.setFullYear(y + 1);
  return c;
}
function inDays(n) {
  const d = new Date();
  d.setDate(d.getDate() + n);
  d.setHours(0,0,0,0);
  return d;
}

const presets = [
  { name: 'New Year', date: () => nextNewYear() },
  { name: 'Christmas', date: () => nextChristmas() },
  { name: 'Halloween', date: () => nextHalloween() },
  { name: '+7 days', date: () => inDays(7) },
  { name: '+30 days', date: () => inDays(30) },
  { name: '+100 days', date: () => inDays(100) },
];

function toLocalInputValue(d) {
  const pad = n => String(n).padStart(2,'0');
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

function buildPresets() {
  let html = '';
  presets.forEach((p,i) => {
    html += `<span class="cd-preset" onclick="applyPreset(${i})">${p.name}</span>`;
  });
  $('#presets').innerHTML = html;
}

function applyPreset(i) {
  $('#target').value = toLocalInputValue(presets[i].date());
  $('#name').value = presets[i].name;
  update();
}

let timer;
function update() {
  const val = $('#target').value;
  if (!val) { $('#big').textContent = '—'; $('#sub').textContent = ''; $('#target-line').textContent = ''; ['days','hours','mins','secs'].forEach(k => $('#n-'+k).textContent = '0'); return; }
  const target = new Date(val);
  const now = new Date();
  const isPast = target < now;
  const diff = Math.abs(target - now);
  const totalSec = Math.floor(diff / 1000);
  const days = Math.floor(totalSec / 86400);
  const hours = Math.floor((totalSec % 86400) / 3600);
  const mins = Math.floor((totalSec % 3600) / 60);
  const secs = totalSec % 60;

  $('#n-days').textContent = days;
  $('#n-hours').textContent = hours;
  $('#n-mins').textContent = mins;
  $('#n-secs').textContent = secs;

  const name = $('#name').value.trim();
  const disp = $('#display');
  disp.classList.toggle('cd-past', isPast);

  if (diff < 1500) {
    $('#big').textContent = '🎉';
    $('#sub').textContent = t('arrived');
  } else {
    $('#big').textContent = days;
    $('#sub').textContent = `${isPast ? t('ago') : t('remaining')} · ${hours}${t('hours')[0]} ${mins}${t('minutes')[0]} ${secs}${t('seconds')[0]}`;
  }

  const fmtDate = new Intl.DateTimeFormat('en-GB',{dateStyle:'full',timeStyle:'short'}).format(target);
  $('#target-line').textContent = `${name ? name + ' · ' : ''}${fmtDate}`;
}

// labels
$('#lbl-target').textContent = t('target');
$('#lbl-name').textContent = t('name');
$('#l-days').textContent = t('days');
$('#l-hours').textContent = t('hours');
$('#l-mins').textContent = t('minutes');
$('#l-secs').textContent = t('seconds');

buildPresets();
applyPreset(0);
$('#target').addEventListener('input', update);
$('#name').addEventListener('input', update);
clearInterval(timer);
timer = setInterval(update, 1000);

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="applyPreset(0)">${GZ.t('example')}</button>`;

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'⏳', href:'/calc/days-since-calculator.html', name:'Days Since'},
    {icon:'📅', href:'/calc/date-difference.html', name:'Date Difference'},
    {icon:'⏱️', href:'/calc/countdown-timer.html', name:'Countdown Timer'},
    {icon:'🌐', href:'/calc/timezone-converter.html', name:'Time Zone Converter'},
  ]
});
</script>
