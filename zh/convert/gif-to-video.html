<script type="module">
import { parseGIF, decompressFrames } from 'https://cdn.jsdelivr.net/npm/gifuct-js@2.1.2/+esm';
window.__parseGIF = parseGIF;
window.__decompressFrames = decompressFrames;
window.__gifLibReady = true;
window.dispatchEvent(new Event('giflib'));
</script>
<script>
GZI18n.register({
  en: {
    toolTitle: 'GIF to Video Converter',
    toolDesc: 'Convert animated GIF to a real MP4 or WebM video file — pick background, speed and loops. Runs 100% in your browser, no upload, no watermark.',
    dropTxt: 'Click or drop an animated GIF here',
    lblBg: 'Background', lblSpeed: 'Speed', lblLoop: 'Loops',
    convertBtn: 'Convert to Video',
    step1: 'Click the drop area (or drag a GIF) to load an animated GIF file',
    step2: 'Choose a background color for transparent areas, playback speed and loop count',
    step3: 'Click Convert to Video — frames are decoded and recorded in your browser',
    step4: 'Preview the result and download the WebM or MP4 file',
  },
  zh: {
    toolTitle: 'GIF 转视频转换器',
    toolDesc: '将动画 GIF 转换为真正的 MP4 或 WebM 视频文件 — 可选背景色、播放速度和循环次数。100% 浏览器本地运行，无需上传，无水印。',
    dropTxt: '点击或拖入动画 GIF 文件',
    lblBg: '背景色', lblSpeed: '速度', lblLoop: '循环',
    convertBtn: '转换为视频',
    step1: '点击上传区（或拖入）一个动画 GIF 文件',
    step2: '选择透明区域的背景色、播放速度和循环次数',
    step3: '点击「转换为视频」— 在浏览器中解码并录制每一帧',
    step4: '预览结果并下载 WebM 或 MP4 文件',
  }
});

const { $, t } = GZ;
const drop = $('#drop'), fileInput = $('#file');
let frames = [], gifW = 0, gifH = 0, fileName = 'gif';

function setStat(msg){ $('#status').textContent = msg || ''; }
function setBar(p){ $('#bar').style.width = Math.round(p*100) + '%'; }

$('#dropTxt').textContent = t('dropTxt');
drop.addEventListener('click', () => fileInput.click());
['dragover','dragenter'].forEach(e => drop.addEventListener(e, ev => { ev.preventDefault(); drop.classList.add('drag'); }));
['dragleave','drop'].forEach(e => drop.addEventListener(e, ev => { ev.preventDefault(); drop.classList.remove('drag'); }));
drop.addEventListener('drop', ev => { if(ev.dataTransfer.files[0]) loadFile(ev.dataTransfer.files[0]); });
fileInput.addEventListener('change', () => { if(fileInput.files[0]) loadFile(fileInput.files[0]); });

async function loadFile(file){
  if(!/gif$/i.test(file.type) && !/\.gif$/i.test(file.name)){ setStat('⚠ Please choose a .gif file'); return; }
  fileName = file.name.replace(/\.gif$/i,'') || 'gif';
  setStat('⏳ ' + (GZI18n.getLang && GZI18n.getLang()==='zh' ? '解码中…' : 'Decoding…'));
  try {
    const buf = await file.arrayBuffer();
    const parseGIF = window.__parseGIF, decompressFrames = window.__decompressFrames;
    if(!parseGIF){ setStat('⏳ ' + (GZI18n.getLang && GZI18n.getLang()==='zh' ? '正在加载解码库…' : 'Loading decoder…')); await new Promise(res => { if(window.__gifLibReady) res(); else window.addEventListener('giflib', res, {once:true}); }); }
    const gif = window.__parseGIF(buf);
    frames = window.__decompressFrames(gif, true);
    if(!frames.length){ setStat('⚠ No frames found in this GIF'); return; }
    gifW = gif.lsd.width; gifH = gif.lsd.height;
    const cv = $('#cv'); cv.width = gifW; cv.height = gifH;
    renderStatic(0);
    const ms = frames.reduce((a,f)=>a+(f.delay||100),0);
    const loops = $('#info');
    loops.innerHTML = `${gifW}×${gifH} · ${frames.length} frames · ${(ms/1000).toFixed(2)}s / loop`;
    $('#stage').style.display = '';
    $('#opts').style.display = '';
    setStat('');
  } catch(err){
    console.error(err);
    setStat('✗ ' + err.message);
  }
}

// offscreen compositing canvas (transparent), main canvas (bg filled)
const comp = document.createElement('canvas');
const cctx = comp.getContext('2d');
const disposal = { snapshot:null, frame:null };

function drawFrame(i){
  const cv = $('#cv'), mctx = cv.getContext('2d');
  comp.width = gifW; comp.height = gifH;
  // 1. apply disposal of previous frame
  if(disposal.frame){
    const pf = disposal.frame, pd = pf.dims, dt = pf.disposalType;
    if(dt === 2){ cctx.clearRect(pd.left, pd.top, pd.width, pd.height); }
    else if(dt === 3 && disposal.snapshot){ cctx.putImageData(disposal.snapshot, 0, 0); }
  }
  // 2. snapshot before drawing if this frame is "restore to previous"
  let snap = null;
  if(frames[i].disposalType === 3){ snap = cctx.getImageData(0,0,gifW,gifH); }
  // 3. draw patch
  const d = frames[i].dims;
  const id = cctx.createImageData(d.width, d.height);
  id.data.set(frames[i].patch);
  cctx.putImageData(id, d.left, d.top);
  disposal.snapshot = snap; disposal.frame = frames[i];
  // 4. composite onto visible/recording canvas with bg
  mctx.fillStyle = $('#bg').value; mctx.fillRect(0,0,gifW,gifH);
  mctx.drawImage(comp, 0, 0);
}

function renderStatic(i){
  disposal.snapshot = null; disposal.frame = null;
  drawFrame(i);
}

function pickMime(){
  const cands = ['video/webm;codecs=vp9','video/webm;codecs=vp8','video/webm','video/mp4'];
  for(const c of cands){ if(window.MediaRecorder && MediaRecorder.isTypeSupported(c)) return c; }
  return '';
}

let busy = false;
async function convert(){
  if(!frames.length || busy) return;
  busy = true;
  const mime = pickMime();
  if(!mime){ busy=false; setStat('✗ Your browser does not support video recording (MediaRecorder). Try Chrome, Edge or Firefox.'); return; }
  const speed = parseFloat($('#speed').value);
  const loops = parseInt($('#loop').value, 10);
  const cv = $('#cv');
  const stream = cv.captureStream(30);
  let rec;
  try { rec = new MediaRecorder(stream, { mimeType: mime, videoBitsPerSecond: 6_000_000 }); }
  catch(e){ rec = new MediaRecorder(stream); }
  const chunks = [];
  rec.ondataavailable = e => { if(e.data && e.data.size) chunks.push(e.data); };
  rec.onstop = () => {
    const blob = new Blob(chunks, { type: mime });
    const url = URL.createObjectURL(blob);
    const ext = mime.includes('mp4') ? 'mp4' : 'webm';
    const fmt = mime.includes('mp4') ? 'MP4' : 'WebM';
    $('#result').style.display = '';
    $('#result').innerHTML = `<video src="${url}" controls loop playsinline></video>
      <div style="margin-top:12px"><a class="gz-btn" href="${url}" download="${fileName}.${ext}" style="text-decoration:none;display:inline-block">⬇ ${t('download')} .${ext}</a>
      <span style="display:inline-block;margin-left:10px;font-size:.85em;color:var(--text2)">(${fmt} · ${(blob.size/1024).toFixed(1)} KB)</span></div>`;
    setBar(1); setStat('✓ Done');
    busy = false;
  };

  $('#barWrap').style.display = '';
  setBar(0);
  setStat('🎬 ' + (GZI18n.getLang && GZI18n.getLang()==='zh' ? '录制中…' : 'Recording…'));
  // prime first frame
  disposal.snapshot = null; disposal.frame = null;
  drawFrame(0);
  rec.start();

  const total = frames.length * loops;
  let idx = 0;
  function step(){
    if(idx >= total){ try{ rec.stop(); }catch(e){} return; }
    const local = idx % frames.length;
    if(local === 0){ disposal.snapshot = null; disposal.frame = null; } // reset composite at loop start
    drawFrame(local);
    idx++;
    setBar(idx / total);
    const delay = (frames[local].delay && frames[local].delay >= 20) ? frames[local].delay : 100;
    setTimeout(step, delay / speed);
  }
  setTimeout(step, 30);
}
window.convert = convert;

GZ.renderToolPage({
  category: 'convert',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🎞️', href:'/convert/video-to-gif.html', name:'Video to GIF'},
    {icon:'🔧', href:'/convert/video-compressor.html', name:'Video Compressor'},
    {icon:'✂️', href:'/convert/video-trimmer.html', name:'Video Trimmer'},
    
  ]
});
</script>
