<script>
GZI18n.register({
  en: {
    toolTitle: 'Random Password Generator',
    toolDesc: 'Generate strong, cryptographically secure random passwords. Customize length and character sets, see live strength rating — free, private, browser-only.',
    uppercase: 'Uppercase (A-Z)',
    lowercase: 'Lowercase (a-z)',
    numbers: 'Numbers (0-9)',
    symbols: 'Symbols (!@#$)',
    length: 'Password length',
    excludeChars: 'Exclude characters',
    step1: 'Set the desired password length with the slider',
    step2: 'Check the character types to include',
    step3: 'Optionally exclude ambiguous characters like 0/O/1/l',
    step4: 'Click Generate and copy your secure password',
    history: 'History (click to copy)',
    generated: '✓ Password generated',
    veryWeak: 'Very Weak',
    weak: 'Weak',
    fair: 'Fair',
    good: 'Good',
    strong: 'Strong',
    veryStrong: 'Very Strong',
    noSelection: 'Please select at least one character type',
  },
  zh: {
    toolTitle: '随机密码生成器',
    toolDesc: '生成强健、加密安全的随机密码。自定义长度和字符集，实时查看强度评级 — 免费、私密、浏览器本地运行。',
    uppercase: '大写字母 (A-Z)',
    lowercase: '小写字母 (a-z)',
    numbers: '数字 (0-9)',
    symbols: '特殊符号 (!@#$)',
    length: '密码长度',
    excludeChars: '排除字符',
    step1: '用滑块设置所需的密码长度',
    step2: '勾选要包含的字符类型',
    step3: '可选排除易混淆字符如 0/O/1/l',
    step4: '点击「生成」并复制你的安全密码',
    history: '历史记录（点击复制）',
    generated: '✓ 密码已生成',
    veryWeak: '非常弱',
    weak: '弱',
    fair: '一般',
    good: '良好',
    strong: '强',
    veryStrong: '非常强',
    noSelection: '请至少选择一种字符类型',
  }
});

const { $, copyText, t } = GZ;

const SETS = {
  upper: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ',
  lower: 'abcdefghijklmnopqrstuvwxyz',
  number: '0123456789',
  symbol: '!@#$%^&*()_+-=[]{}|;:,.<>?~',
};

const opts = [
  { id: 'upper', label: 'uppercase', checked: true },
  { id: 'lower', label: 'lowercase', checked: true },
  { id: 'number', label: 'numbers', checked: true },
  { id: 'symbol', label: 'symbols', checked: false },
];

$('#options').innerHTML = opts.map(o => `
  <label class="pw-option"><input type="checkbox" id="opt-${o.id}" ${o.checked?'checked':''}> ${t(o.label)}</label>`).join('');

$('#lbl-length').textContent = t('length');
$('#lbl-exclude').textContent = t('excludeChars');

$('#length').addEventListener('input', (e) => { $('#lenval').textContent = e.target.value; });

const history = [];

function secureRandom(max) {
  if (window.crypto && window.crypto.getRandomValues) {
    const arr = new Uint32Array(1);
    const limit = 0xFFFFFFFF - (0xFFFFFFFF % max);
    let val;
    do { window.crypto.getRandomValues(arr); val = arr[0]; } while (val >= limit);
    return val % max;
  }
  return Math.floor(Math.random() * max);
}

function generate() {
  let pool = '';
  const enabled = [];
  opts.forEach(o => { if ($('#opt-'+o.id).checked) { pool += SETS[o.id]; enabled.push(o.id); } });
  if (enabled.length === 0) {
    $('#pwdisplay').textContent = '';
    $('#status').innerHTML = `<span style="color:var(--gz-accent)">${t('noSelection')}</span>`;
    return;
  }
  const exclude = $('#exclude').value;
  let chars = pool.split('').filter(c => !exclude.includes(c));
  if (chars.length === 0) chars = pool.split('');
  const len = parseInt($('#length').value);
  let pw = '';
  // Ensure at least one char from each enabled set
  enabled.forEach(id => {
    const setChars = SETS[id].split('').filter(c => !exclude.includes(c));
    if (setChars.length > 0) pw += setChars[secureRandom(setChars.length)];
  });
  while (pw.length < len) pw += chars[secureRandom(chars.length)];
  // Shuffle
  pw = pw.split('').sort(() => Math.random() - 0.5).join('').slice(0, len);

  $('#pwdisplay').textContent = pw;
  updateStrength(pw, enabled);
  $('#status').innerHTML = `<span style="color:var(--gz-success)">${t('generated')}</span>`;

  history.unshift(pw);
  if (history.length > 10) history.pop();
  renderHistory();
}

function updateStrength(pw, enabled) {
  let score = 0;
  // Length score
  if (pw.length >= 8) score += 1;
  if (pw.length >= 12) score += 1;
  if (pw.length >= 16) score += 1;
  if (pw.length >= 24) score += 1;
  // Variety
  score += enabled.length;
  // Entropy estimate
  let charsetSize = 0;
  if (enabled.includes('upper')) charsetSize += 26;
  if (enabled.includes('lower')) charsetSize += 26;
  if (enabled.includes('number')) charsetSize += 10;
  if (enabled.includes('symbol')) charsetSize += 26;
  const entropy = pw.length * Math.log2(charsetSize || 1);
  if (entropy >= 100) score += 2;
  else if (entropy >= 60) score += 1;

  const max = 8;
  const pct = Math.min(100, (score / max) * 100);
  let label, color;
  if (entropy < 28) { label = t('veryWeak'); color = '#e94560'; }
  else if (entropy < 36) { label = t('weak'); color = '#e94560'; }
  else if (entropy < 60) { label = t('fair'); color = '#d19a66'; }
  else if (entropy < 80) { label = t('good'); color = '#61afef'; }
  else if (entropy < 120) { label = t('strong'); color = '#00d672'; }
  else { label = t('veryStrong'); color = '#00d672'; }

  $('#strengthfill').style.width = pct + '%';
  $('#strengthfill').style.background = color;
  $('#strengthlabel').textContent = label + ` (${Math.round(entropy)} bits)`;
  $('#strengthlabel').style.color = color;
}

function renderHistory() {
  if (history.length === 0) { $('#history').innerHTML = ''; return; }
  $('#history').innerHTML = `<h3 style="font-size:.95em;margin:10px 0 4px">${t('history')}</h3>` +
    history.map(pw => `<div class="pw-history-item" onclick="copyText('${pw.replace(/'/g,"\\'")}');this.style.background='var(--glass2)'">${pw}</div>`).join('');
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="generate()">🎲 ${t('generate')||'Generate'}</button>
  <button class="gz-btn" onclick="copyText($('#pwdisplay').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="if($('#opt-upper').checked=true,$('#opt-lower').checked=true,$('#opt-number').checked=true,$('#opt-symbol').checked=true,$('#length').value=20,$('#lenval').textContent=20,generate())">${t('example')}</button>`;

generate();

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🔑', href:'/dev/password-generator.html', name:'Password Generator'},
    {icon:'🛡️', href:'/dev/password-audit.html', name:'Password Audit'},
    {icon:'🔑', href:'/dev/passphrase-generator.html', name:'Passphrase Gen'},
    {icon:'📶', href:'/text/wifi-password-generator.html', name:'WiFi Password'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
