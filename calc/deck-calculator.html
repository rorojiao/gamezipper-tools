<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "How do I calculate how many deck boards I need?", "acceptedAnswer": {"@type": "Answer", "text": "Divide the deck width (perpendicular to joists) by the actual board face width including the gap. For 5.5 inch boards with a 1/4 inch gap, use 5.75 inches. Multiply by the deck length to get total linear feet."}}, {"@type": "Question", "name": "How far apart should deck joists be?", "acceptedAnswer": {"@type": "Answer", "text": "Standard deck joist spacing is 16 inches on center for residential decks. Use 12 inches on center for diagonal board layouts or heavy loads, and 24 inches on center only for thick 2x6 boards on light-duty decks."}}, {"@type": "Question", "name": "How many deck screws do I need per board?", "acceptedAnswer": {"@type": "Answer", "text": "Use 2 screws per joist per board. For a 12 foot board on 16 inch joist spacing with 10 joists, that's 20 screws per board. Always buy 10% extra for stripped or broken screws."}}, {"@type": "Question", "name": "How deep should deck footings be?", "acceptedAnswer": {"@type": "Answer", "text": "Deck footings should extend below the frost line in cold climates — typically 36-48 inches deep. In frost-free areas, 12-24 inches is common. A typical footing is 8-12 inches in diameter."}}]}</script>

<script>
GZI18n.register({
  en: {
    toolTitle: 'Deck Calculator',
    toolDesc: 'Plan your deck project — get deck board count, joist count, screw count, footing count and total cost. Free, instant and browser-based.',
    deckTitle: 'Deck Size',
    boardTitle: 'Boards & Joists',
    units: 'Units',
    length: 'Deck Length (along joists)',
    width: 'Deck Width (across joists)',
    boardWidth: 'Board Face Width (inches)',
    boardLen: 'Board Length Sold (feet)',
    gap: 'Gap Between Boards (inches)',
    joist: 'Joist Spacing',
    boardPrice: 'Price per Board ($)',
    boardsNeeded: 'Deck Boards',
    boardPackages: 'Board Packages',
    joistsNeeded: 'Joists',
    screwsNeeded: 'Screws (~10% extra)',
    deckArea: 'Deck Area',
    totalCost: 'Estimated Cost',
    note: 'Tip: Board face width is the actual exposed width — 5.5 in for 2x6, 3.5 in for 2x4, 5.25 in for 5/4x6. Use 2 screws per board per joist. Joists are assumed to span the deck length.',
    step1: 'Enter deck length and width in feet or meters',
    step2: 'Set the board face width and sold length in inches/feet',
    step3: 'Pick joist spacing (16 in on center is standard)',
    step4: 'Get board count, joists, screws and total cost',
  },
  zh: {
    toolTitle: '露台甲板计算器',
    toolDesc: '规划你的露台项目 — 即时获取甲板板数、龙骨数、螺丝数、地基数和总费用。免费、即时、浏览器本地运行。',
    deckTitle: '甲板尺寸',
    boardTitle: '板材与龙骨',
    units: '单位',
    length: '甲板长（沿龙骨方向）',
    width: '甲板宽（垂直龙骨方向）',
    boardWidth: '板面宽（英寸）',
    boardLen: '单板长度（英尺）',
    gap: '板间隙（英寸）',
    joist: '龙骨间距',
    boardPrice: '每块板材价格（$）',
    boardsNeeded: '所需甲板板',
    boardPackages: '板材包数',
    joistsNeeded: '所需龙骨',
    screwsNeeded: '螺丝数（含 10% 余量）',
    deckArea: '甲板面积',
    totalCost: '预估费用',
    note: '提示：板面宽为实际可见宽度 — 2x6 为 5.5 英寸，2x4 为 3.5 英寸，5/4x6 为 5.25 英寸。每块板在每个龙骨上需 2 颗螺丝。龙骨默认沿甲板长度方向铺设。',
    step1: '输入甲板长度和宽度（英尺或米）',
    step2: '设置板材面宽和单板长度（英寸/英尺）',
    step3: '选择龙骨间距（标准为 16 英寸中心距）',
    step4: '获取板材数、龙骨、螺丝和总费用',
  }
});

const { $, t } = GZ;

$('#deck-title').textContent = t('deckTitle');
$('#board-title').textContent = t('boardTitle');
$('#lbl-units').textContent = t('units');
$('#lbl-length').textContent = t('length');
$('#lbl-width').textContent = t('width');
$('#lbl-boardWidth').textContent = t('boardWidth');
$('#lbl-boardLen').textContent = t('boardLen');
$('#lbl-gap').textContent = t('gap');
$('#lbl-joist').textContent = t('joist');
$('#lbl-boardPrice').textContent = t('boardPrice');

['units','deckLength','deckWidth','boardWidth','boardLen','gap','joist','boardPrice'].forEach(id => {
  $('#' + id).addEventListener('input', calculate);
});

function calculate() {
  const units = $('#units').value;
  let length = parseFloat($('#deckLength').value) || 0;
  let width = parseFloat($('#deckWidth').value) || 0;
  const boardWidth = parseFloat($('#boardWidth').value) || 0;
  const boardLenFt = parseFloat($('#boardLen').value) || 0;
  const gap = parseFloat($('#gap').value) || 0;
  const joistIn = parseFloat($('#joist').value) || 16;
  const boardPrice = parseFloat($('#boardPrice').value) || 0;

  // Convert deck to feet for US-style board calc
  let lengthFt = length, widthFt = width;
  if (units === 'm') { lengthFt = length * 3.28084; widthFt = width * 3.28084; }

  const areaUnit = units === 'ft' ? 'ft²' : 'm²';
  const deckAreaOrig = length * width;

  // Boards run across the width (perpendicular to joists which run along length)
  // Effective board+gap pitch in inches
  const pitchIn = boardWidth + gap;
  // Number of board rows across the deck width (in inches)
  const rows = pitchIn > 0 ? Math.ceil((widthFt * 12) / pitchIn) : 0;
  // Linear feet of board per row equals the deck length
  const linearFtTotal = rows * lengthFt;
  // Number of physical boards sold at boardLenFt each
  const boardsNeeded = boardLenFt > 0 ? Math.ceil(linearFtTotal / boardLenFt) : 0;

  // Joists run along the deck length, spaced joistIn inches on center
  const joistCount = joistIn > 0 ? Math.ceil((widthFt * 12) / joistIn) + 1 : 0;

  // Screws: 2 per board per joist intersection. Approximate as rows * joists * 2
  // Better: linear feet * 1.5 screws per foot (covers typical 16in spacing, 2 screws/joist)
  const screwsNeeded = Math.ceil(linearFtTotal * 1.5 * 1.1);

  // Footings: assume posts every 8 ft along joist line — heuristic
  const footings = Math.max(4, Math.ceil((lengthFt / 8) + 1) * Math.max(2, Math.ceil(widthFt / 8)));

  const cost = boardsNeeded * boardPrice;

  $('#resultBox').innerHTML = `
    <div class="result-item"><div class="label">${t('deckArea')}</div><div class="val">${deckAreaOrig.toFixed(1)} ${areaUnit}</div></div>
    <div class="result-item"><div class="label">${t('boardsNeeded')}</div><div class="val" style="font-size:2.2em">${boardsNeeded}</div></div>
    <div class="result-item"><div class="label">${t('joistsNeeded')}</div><div class="val">${joistCount}</div></div>
    <div class="result-item"><div class="label">${t('screwsNeeded')}</div><div class="val">${screwsNeeded}</div></div>
    <div class="result-item"><div class="label">${t('totalCost')}</div><div class="val">$${cost.toFixed(2)}</div></div>`;
  $('#note').textContent = t('note');
}

calculate();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],

    {icon:'📐', href:'/calc/square-footage.html', name:'Square Footage'},
  ]
});
</script>
