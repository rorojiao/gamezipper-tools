<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is underline text?", "acceptedAnswer": {"@type": "Answer", "text": "Underline text adds a combining underline character (U+0332) after every letter, producing U̲n̲d̲e̲r̲l̲i̲n̲e̲d̲ that renders as if each letter is drawn with an underline. Because it uses Unicode combining marks it works in any text box without installing fonts."}}, {"@type": "Question", "name": "Does underlined text work on Instagram, Discord and Twitter?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. The combining underline mark is a standard Unicode character supported by almost all modern devices, browsers and apps, so the decorated text pastes correctly into Instagram bios, Discord messages, tweets and most other text fields."}}, {"@type": "Question", "name": "What is the difference between underline and double underline?", "acceptedAnswer": {"@type": "Answer", "text": "Single underline uses U+0332 (low line below the letter). Double underline (sometimes called double-underline or equals underline) stacks two combining marks (U+0332 + U+0347 or U+0333) so a second line appears beneath the first, producing a heavier accounting-style underline."}}, {"@type": "Question", "name": "Why do some letters show a blank box?", "acceptedAnswer": {"@type": "Answer", "text": "Combining marks are drawn relative to the previous character. A few rare system fonts render them as empty boxes or as detached glyphs. Switching to a mainstream font (system default, Arial, Noto) almost always fixes it; the underlying text is still correct."}}]}</script>

  zh: {
    toolTitle: '下划线文字生成器',
    toolDesc: '为任意文字添加 U̲n̲d̲e̲r̲l̲i̲n̲e̲ 下划线、D͟o͟u͟b͟l͟e͟ 双下划线、S̶t̶r̶i̶k̶e̶ 删除线或 O̅v̅e̅r̅l̅i̅n̅e̅ 上划线（基于 Unicode 组合字符）。复制粘贴到 Instagram、Twitter、Discord、用户名和简介。',
    inputLabel: '输入文本',
    outputLabel: '装饰后文字',
    underline: '下划线',
    doubleUnderline: '双下划线',
    strikethrough: '删除线',
    overline: '上划线',
    step1: '输入或粘贴要装饰的文字',
    step2: '选择样式：下划线、双下划线、删除线或上划线',
    step3: '点击复制，粘贴到帖子、文案或用户名',
  }
});

const { $, copyText, t } = GZ;

// Combining marks (Unicode Diacritical Marks block)
const MARKS = {
  underline:       '\u0332',
  doubleUnderline: '\u0347',
  strikethrough:   '\u0336',
  overline:        '\u0305',
};

function decorate(text, key) {
  const mark = MARKS[key];
  if (!mark) return text;
  // Insert the combining mark after each visible character (skip existing marks)
  let out = '';
  for (const ch of text) {
    out += ch;
    const code = ch.codePointAt(0);
    // Skip existing combining marks (0x0300–0x036F) and surrogates/half
    if (code < 0x0300 || code > 0x036F) {
      out += mark;
      if (key === 'doubleUnderline') out += '\u0347';
    }
  }
  return out;
}

let currentStyle = 'underline';

function processText() {
  const text = $('#input').value;
  if (!text) { $('#output').textContent = ''; return; }
  $('#output').textContent = decorate(text, currentStyle);
}

$('#input').addEventListener('input', processText);

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="setStyle('underline',this)">${t('underline')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="setStyle('doubleUnderline',this)">${t('doubleUnderline')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="setStyle('strikethrough',this)">${t('strikethrough')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="setStyle('overline',this)">${t('overline')}</button>
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#input').value='';$('#output').textContent=''">${t('clear')}</button>`;

function setStyle(key, btn) {
  currentStyle = key;
  processText();
  btn.parentElement.querySelectorAll('.gz-btn').forEach(b => {
    b.classList.remove('gz-btn-active');
    b.classList.add('gz-btn-secondary');
  });
  btn.classList.add('gz-btn-active');
  btn.classList.remove('gz-btn-secondary');
}

$('#input').value = 'Underlined text';
processText();

GZ.renderToolPage({

});
