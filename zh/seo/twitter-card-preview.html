<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="gz-split">
      <div>
        <label id="lbl-in"></label>
        <div style="padding:8px">
          <div class="cfg-row"><label>Card Type</label><select id="cfg-type"><option value="summary_large_image">summary_large_image</option><option value="summary">summary</option></select></div>
          <div class="cfg-row"><label>Site (@handle)</label><input type="text" id="cfg-site" value="" placeholder="@youraccount"></div>
          <div class="cfg-row"><label>Title</label><input type="text" id="cfg-title" value="My Awesome Page"></div>
          <div class="cfg-row"><label>Description</label><textarea id="cfg-desc">Check out this amazing page with useful content and great design.</textarea></div>
          <div class="cfg-row"><label>Image URL</label><input type="url" id="cfg-img" value="https://tools.gamezipper.com/shared/og-image.png"></div>
          <div class="cfg-row"><label>Domain</label><input type="text" id="cfg-domain" value="example.com"></div>
        </div>
      </div>
      <div>
        <label id="lbl-out"></label>
        <div style="padding:8px">
          <div id="preview"></div>
          <div class="meta-output" id="meta-output"></div>
        </div>
      </div>
    </div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Twitter Card Preview',
    toolDesc: 'Preview how your page looks when shared on Twitter/X. Test and generate Twitter Card meta tags with real-time visual preview.',
    step1: 'Choose the card type (summary or summary_large_image)',
    step2: 'Fill in your page title, description and image URL',
    step3: 'See the live preview of how Twitter will display your link',
    step4: 'Copy the generated meta tags and paste them into your HTML <head>',
  },
  zh: {
    toolTitle: 'Twitter Card 预览工具',
    toolDesc: '预览网页在 Twitter/X 上分享时的显示效果。实时测试和生成 Twitter Card 元标签。',
    step1: '选择卡片类型（summary 或 summary_large_image）',
    step2: '填写页面标题、描述和图片 URL',
    step3: '实时预览 Twitter 如何显示你的链接',
    step4: '复制生成的元标签并粘贴到 HTML <head> 中',
  }
});

const { $, copyText, t } = GZ;

function generate() {
  const type = $('#cfg-type').value;
  const site = $('#cfg-site').value.trim();
  const title = $('#cfg-title').value.trim();
  const desc = $('#cfg-desc').value.trim();
  const img = $('#cfg-img').value.trim();
  const domain = $('#cfg-domain').value.trim();

  // Build preview
  const isLarge = type === 'summary_large_image';
  const cls = isLarge ? 'large' : 'small';
  const imgHtml = img ? `<div class="tc-img">🖼️</div>` : `<div class="tc-img">🖼️</div>`;
  const bodyHtml = `<div class="tc-body"><div class="tc-domain">${domain}</div><div class="tc-title">${title || 'Page Title'}</div>${desc ? `<div class="tc-desc">${desc}</div>` : ''}</div>`;
  
  if (isLarge) {
    $('#preview').innerHTML = `<div class="twitter-card large">${imgHtml}${bodyHtml}</div>`;
  } else {
    $('#preview').innerHTML = `<div class="twitter-card small">${imgHtml}${bodyHtml}</div>`;
  }

  // Build meta tags
  let meta = `<meta name="twitter:card" content="${type}">\n`;
  if (site) meta += `<meta name="twitter:site" content="${site}">\n`;
  meta += `<meta name="twitter:title" content="Twitter Card 预览工具">\n`;
  if (desc) meta += `<meta name="twitter:description" content="预览网页在 Twitter/X 上分享时的显示效果。实时测试和生成 Twitter Card 元标签。">\n`;
  if (img) meta += `<meta name="twitter:image" content="${img}">\n`;
  
  $('#meta-output').textContent = meta;
}

document.querySelectorAll('.cfg-row input, .cfg-row select, .cfg-row textarea').forEach(el => {
  el.addEventListener('input', generate);
  el.addEventListener('change', generate);
});

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="generate()">${t('format')}</button>
  <button class="gz-btn" onclick="copyText($('#meta-output').textContent)">${t('copy')}</button>`;

generate();

GZ.renderToolPage({
  category: 'seo',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🖼️', href:'/seo/open-graph-preview.html', name:'Open Graph Preview'},
    {icon:'👁️', href:'/seo/serp-preview.html', name:'Google SERP Preview'},
    {icon:'🏷️', href:'/seo/meta-tag-generator.html', name:'Meta Tag Generator'},
    {icon:'🖼️', href:'/seo/open-graph-generator.html', name:'OG Generator'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
