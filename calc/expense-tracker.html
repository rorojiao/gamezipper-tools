<style>
.et-wrap{max-width:920px;margin:0 auto}
.et-summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:18px}
.et-card{background:var(--glass2);border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center}
.et-card .num{font-size:1.6em;font-weight:700}
.et-card .label{font-size:.78em;color:var(--text2);margin-top:4px;text-transform:uppercase;letter-spacing:.5px}
.et-card.income .num{color:#50c878}
.et-card.expense .num{color:#ff6b6b}
.et-card.balance .num{color:var(--gz-accent)}
.et-input-row{display:grid;grid-template-columns:1.5fr 1fr 1fr 1fr 1fr auto;gap:8px;margin-bottom:14px}
.et-input-row input,.et-input-row select{padding:10px;border-radius:8px;border:1px solid var(--border);background:var(--glass2);color:var(--text);font-size:.9rem}
@media(max-width:700px){.et-input-row{grid-template-columns:1fr 1fr}}
.et-input-row button{padding:10px 14px}
.et-filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;align-items:center}
.et-filters button{padding:6px 12px;border-radius:18px;border:1px solid var(--border);background:var(--glass2);color:var(--text);cursor:pointer;font-size:.85rem}
.et-filters button.active{background:var(--gz-accent);color:#fff;border-color:var(--gz-accent)}
.et-cat-summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:8px;margin-bottom:16px}
.cat-bar{background:var(--glass2);border:1px solid var(--border);border-radius:8px;padding:10px}
.cat-bar .cat-name{font-size:.85em;font-weight:600;margin-bottom:4px;display:flex;justify-content:space-between}
.cat-bar .progress{height:8px;background:var(--glass);border-radius:4px;overflow:hidden}
.cat-bar .progress-fill{height:100%;border-radius:4px;transition:width .3s}
.et-list{display:flex;flex-direction:column;gap:6px;min-height:60px}
.et-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--glass2);border:1px solid var(--border);border-radius:8px;font-size:.92rem}
.et-item .icon{font-size:1.3em}
.et-item .desc{flex:1}
.et-item .cat-tag{font-size:.7em;padding:2px 8px;border-radius:10px;background:rgba(100,150,255,.15);color:#6496ff}
.et-item .amount{font-weight:700;min-width:80px;text-align:right}
.et-item.income .amount{color:#50c878}
.et-item.expense .amount{color:#ff6b6b}
.et-item .actions button{background:transparent;border:none;cursor:pointer;padding:4px 6px;font-size:.95rem;opacity:.6}
.et-item .actions button:hover{opacity:1}
.et-empty{text-align:center;padding:30px 20px;color:var(--text2);font-size:.9rem}
</style>

<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "Is my financial data sent to any server?", "acceptedAnswer": {"@type": "Answer", "text": "No. All transactions and budgets are stored locally in your browser. Nothing is ever uploaded or shared with any server."}}, {"@type": "Question", "name": "Can I track both income and expenses?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. Add entries as either income or expense. The balance, monthly summaries and category breakdown are calculated automatically."}}, {"@type": "Question", "name": "How are categories organized?", "acceptedAnswer": {"@type": "Answer", "text": "Each entry can be assigned a category (food, transport, rent, salary, etc.). The tool provides a visual breakdown of spending by category with percentage bars."}}, {"@type": "Question", "name": "Can I export or import my data?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. The tool provides a JSON export and import option in the toolbar so you can back up your data or move it between devices."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="et-wrap">
      <div class="et-summary" id="summary"></div>
      <div class="et-input-row">
        <input type="text" id="et-desc" placeholder="">
        <input type="number" id="amount" placeholder="0.00" step="0.01" min="0">
        <select id="type">
          <option value="expense">💸</option>
          <option value="income">💰</option>
        </select>
        <select id="cat">
          <option value="food">🍔</option>
          <option value="transport">🚗</option>
          <option value="shopping">🛍️</option>
          <option value="rent">🏠</option>
          <option value="bills">💡</option>
          <option value="health">💊</option>
          <option value="entertain">🎬</option>
          <option value="salary">💼</option>
          <option value="gift">🎁</option>
          <option value="other">📦</option>
        </select>
        <input type="date" id="date">
        <button class="gz-btn" id="addBtn">+</button>
      </div>
      <div class="et-filters" id="filters">
        <button class="active" data-filter="all">All</button>
        <button data-filter="income">Income</button>
        <button data-filter="expense">Expense</button>
        <button data-filter="month">This Month</button>
        <span style="flex:1"></span>
        <button id="exportBtn" style="background:transparent;border:1px solid var(--border)">⬇️ Export</button>
        <button id="importBtn" style="background:transparent;border:1px solid var(--border)">⬆️ Import</button>
        <button id="clearBtn" style="background:transparent;border:1px solid var(--border);color:var(--gz-accent)">🗑️ Clear</button>
      </div>
      <div class="et-cat-summary" id="catSummary"></div>
      <div class="et-list" id="list"></div>
    </div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Expense Tracker',
    toolDesc: 'Track income and expenses with category breakdown, monthly summaries and balance — saved locally in your browser.',
    descPh: 'Description (e.g. Groceries)',
    income: 'Income', expense: 'Expense', balance: 'Balance',
    all: 'All', thisMonth: 'This Month',
    catFood: 'Food', catTransport: 'Transport', catShopping: 'Shopping', catRent: 'Rent',
    catBills: 'Bills', catHealth: 'Health', catEntertain: 'Entertainment', catSalary: 'Salary', catGift: 'Gift', catOther: 'Other',
    empty: '📊 No transactions yet. Add one above!',
    add: 'Add',
    step1: 'Type a description and amount, pick Income or Expense',
    step2: 'Choose a category and date (today is selected by default)',
    step3: 'Click Add to record the transaction',
    step4: 'Use filters, Export / Import for backup, or Clear to reset',
  },
  zh: {
    toolTitle: '记账工具',
    toolDesc: '记录收入和支出，提供分类汇总、月度统计和余额显示 — 自动保存到本地。',
    descPh: '描述（如：买菜）',
    income: '收入', expense: '支出', balance: '结余',
    all: '全部', thisMonth: '本月',
    catFood: '餐饮', catTransport: '交通', catShopping: '购物', catRent: '房租',
    catBills: '账单', catHealth: '医疗', catEntertain: '娱乐', catSalary: '工资', catGift: '礼物', catOther: '其他',
    empty: '📊 还没有记录。在上方添加一笔吧！',
    add: '添加',
    step1: '输入描述和金额，选择「收入」或「支出」',
    step2: '选择分类和日期（默认今天）',
    step3: '点击「添加」记录这笔交易',
    step4: '使用筛选、导入/导出或清空按钮',
  }
});

const { $, t, copyText, showToast } = GZ;
const STORAGE_KEY = 'gz-expense-v1';
let items = [];
let currentFilter = 'all';

function load() { try { items = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); } catch(e) { items = []; } }
function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(items)); }

const CAT_COLORS = {
  food: '#ff8a65', transport: '#64b5f6', shopping: '#ba68c8', rent: '#4db6ac',
  bills: '#ffd54f', health: '#e57373', entertain: '#f06292', salary: '#81c784',
  gift: '#ffb74d', other: '#90a4ae'
};

function catName(c) { return t('cat' + c.charAt(0).toUpperCase() + c.slice(1)) || c; }

function todayStr() { return new Date().toISOString().slice(0, 10); }

function add() {
  const desc = $('#et-desc').value.trim();
  const amt = parseFloat($('#amount').value);
  if (!desc || !amt || amt <= 0) { showToast('Enter description and amount'); return; }
  items.push({
    id: Date.now().toString(36) + Math.random().toString(36).slice(2, 5),
    desc, amount: amt,
    type: $('#type').value,
    cat: $('#cat').value,
    date: $('#date').value || todayStr()
  });
  $('#et-desc').value = ''; $('#amount').value = '';
  save(); render();
}

function del(id) { items = items.filter(x => x.id !== id); save(); render(); }

function filterList() {
  let l = items.slice();
  if (currentFilter === 'income') l = l.filter(x => x.type === 'income');
  else if (currentFilter === 'expense') l = l.filter(x => x.type === 'expense');
  else if (currentFilter === 'month') {
    const m = todayStr().slice(0, 7);
    l = l.filter(x => x.date && x.date.startsWith(m));
  }
  l.sort((a, b) => b.date.localeCompare(a.date));
  return l;
}

function renderSummary() {
  const list = filterList();
  const inc = list.filter(x => x.type === 'income').reduce((s, x) => s + x.amount, 0);
  const exp = list.filter(x => x.type === 'expense').reduce((s, x) => s + x.amount, 0);
  const bal = inc - exp;
  $('#summary').innerHTML = `
    <div class="et-card income"><div class="num">+${inc.toFixed(2)}</div><div class="label">${t('income')}</div></div>
    <div class="et-card expense"><div class="num">-${exp.toFixed(2)}</div><div class="label">${t('expense')}</div></div>
    <div class="et-card balance"><div class="num">${bal >= 0 ? '+' : ''}${bal.toFixed(2)}</div><div class="label">${t('balance')}</div></div>`;
}

function renderCats() {
  const list = filterList().filter(x => x.type === 'expense');
  const byCat = {};
  list.forEach(x => { byCat[x.cat] = (byCat[x.cat] || 0) + x.amount; });
  const total = Object.values(byCat).reduce((s, v) => s + v, 0);
  const entries = Object.entries(byCat).sort((a, b) => b[1] - a[1]);
  if (entries.length === 0) { $('#catSummary').innerHTML = ''; return; }
  $('#catSummary').innerHTML = entries.map(([c, amt]) => {
    const pct = total > 0 ? (amt / total * 100) : 0;
    return `<div class="cat-bar">
      <div class="cat-name"><span>${catName(c)}</span><span>${amt.toFixed(2)} (${pct.toFixed(0)}%)</span></div>
      <div class="progress"><div class="progress-fill" style="width:${pct}%;background:${CAT_COLORS[c] || '#888'}"></div></div>
    </div>`;
  }).join('');
}

function renderList() {
  const list = filterList();
  if (list.length === 0) { $('#list').innerHTML = `<div class="et-empty">${t('empty')}</div>`; return; }
  $('#list').innerHTML = list.map(x => {
    const sign = x.type === 'income' ? '+' : '-';
    return `<div class="et-item ${x.type}">
      <span class="icon">${x.cat === 'food' ? '🍔' : x.cat === 'transport' ? '🚗' : x.cat === 'shopping' ? '🛍️' : x.cat === 'rent' ? '🏠' : x.cat === 'bills' ? '💡' : x.cat === 'health' ? '💊' : x.cat === 'entertain' ? '🎬' : x.cat === 'salary' ? '💼' : x.cat === 'gift' ? '🎁' : '📦'}</span>
      <div class="desc">${escapeHtml(x.desc)}<div style="font-size:.75em;opacity:.6">${x.date}</div></div>
      <span class="cat-tag">${catName(x.cat)}</span>
      <span class="amount">${sign}${x.amount.toFixed(2)}</span>
      <div class="actions"><button onclick="del('${x.id}')" title="Delete">🗑️</button></div>
    </div>`;
  }).join('');
}

function render() { renderSummary(); renderCats(); renderList(); }

function exportData() {
  const blob = new Blob([JSON.stringify(items, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'expense-tracker-' + todayStr() + '.json';
  a.click(); URL.revokeObjectURL(url);
}
function importData() {
  const inp = document.createElement('input');
  inp.type = 'file'; inp.accept = '.json,application/json';
  inp.onchange = e => {
    const f = e.target.files[0]; if (!f) return;
    const r = new FileReader();
    r.onload = () => {
      try {
        const d = JSON.parse(r.result);
        if (Array.isArray(d)) { items = d; save(); render(); showToast('Imported ' + d.length + ' entries'); }
      } catch(err) { showToast('Invalid file'); }
    };
    r.readAsText(f);
  };
  inp.click();
}
function clearAll() { if (!confirm('Delete all transactions?')) return; items = []; save(); render(); }

function escapeHtml(s) { return s.replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c])); }

$('#addBtn').addEventListener('click', add);
$('#et-desc').addEventListener('keydown', e => { if (e.key === 'Enter') add(); });
$('#amount').addEventListener('keydown', e => { if (e.key === 'Enter') add(); });
$('#filters').addEventListener('click', e => {
  const f = e.target.dataset.filter;
  if (f) {
    currentFilter = f;
    document.querySelectorAll('#filters button[data-filter]').forEach(b => b.classList.toggle('active', b === e.target));
    render();
  }
});
$('#exportBtn').addEventListener('click', exportData);
$('#importBtn').addEventListener('click', importData);
$('#clearBtn').addEventListener('click', clearAll);

$('#et-desc').placeholder = t('descPh');
$('#addBtn').textContent = '+ ' + t('add');
$('#date').value = todayStr();
document.querySelectorAll('#type option').forEach(o => o.textContent = t(o.value));
document.querySelectorAll('#cat option').forEach(o => o.textContent = catName(o.value));
const FILTER_LABELS = { all: 'all', income: 'income', expense: 'expense', month: 'thisMonth' };
document.querySelectorAll('#filters button[data-filter]').forEach(b => { b.textContent = t(FILTER_LABELS[b.dataset.filter]); });

load(); render();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'💰', href:'/calc/tip-calculator.html', name:'Tip Calculator'},
    {icon:'💸', href:'/calc/sales-tax-calculator.html', name:'Sales Tax'},
    {icon:'💼', href:'/calc/salary-calculator.html', name:'Salary Calculator'},
    {icon:'💱', href:'/calc/percentage-calculator.html', name:'Percentage Calculator'},
  ]
});
</script>
<script src="/tools-result-rec.js?v=20260707v520" defer></script>
</body>
</html>
