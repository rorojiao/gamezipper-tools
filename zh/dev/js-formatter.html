let indentSize = 2;

function formatJS(code, indent) {
  const tab = ' '.repeat(indent);
  let result = '';
  let level = 0;
  let inString = false;
  let stringChar = '';
  let inTemplate = false;
  let inLineComment = false;
  let inBlockComment = false;
  let inRegex = false;
  let i = 0;
  let lastNonWS = '';
  let lineStarted = false;

  function addLine(text) {
    if (text.trim()) {
      result += tab.repeat(level) + text.trim() + '\n';
    } else {
      result += '\n';
    }
  }

  let currentLine = '';

  while (i < code.length) {
    const ch = code[i];
    const next = code[i + 1] || '';

    // Handle string literals
    if (inString) {
      currentLine += ch;
      if (ch === '\\') { currentLine += next; i += 2; continue; }
      if (ch === stringChar) inString = false;
      i++; continue;
    }

    // Handle template literals
    if (inTemplate) {
      currentLine += ch;
      if (ch === '\\') { currentLine += next; i += 2; continue; }
      if (ch === '`') inTemplate = false;
      i++; continue;
    }

    // Handle line comments
    if (inLineComment) {
      currentLine += ch;
      if (ch === '\n') {
        addLine(currentLine);
        currentLine = '';
        inLineComment = false;
      }
      i++; continue;
    }

    // Handle block comments
    if (inBlockComment) {
      currentLine += ch;
      if (ch === '*' && next === '/') {
        currentLine += '/';
        i += 2;
        inBlockComment = false;
        continue;
      }
      if (ch === '\n') {
        addLine(currentLine);
        currentLine = '';
      }
      i++; continue;
    }

    // Check for comment starts
    if (ch === '/' && next === '/') {
      inLineComment = true;
      currentLine += '//';
      i += 2; continue;
    }
    if (ch === '/' && next === '*') {
      inBlockComment = true;
      currentLine += '/*';
      i += 2; continue;
    }

    // Check for string/template starts
    if (ch === '"' || ch === "'") {
      inString = true;
      stringChar = ch;
      currentLine += ch;
      i++; continue;
    }
    if (ch === '`') {
      inTemplate = true;
      currentLine += ch;
      i++; continue;
    }

    // Handle newlines
    if (ch === '\n' || ch === '\r') {
      if (currentLine.trim()) {
        // Check if line ends with opening bracket
        const trimmed = currentLine.trimEnd();
        const lastChar = trimmed[trimmed.length - 1];

        if (lastChar === '{' || lastChar === '[' || lastChar === '(') {
          addLine(currentLine);
          currentLine = '';
          level++;
        } else {
          addLine(currentLine);
          currentLine = '';
        }
      }
      i++; continue;
    }

    // Handle opening brackets
    if (ch === '{' || ch === '[' || ch === '(') {
      currentLine += ch;
      if (currentLine.trim()) {
        addLine(currentLine);
        currentLine = '';
      }
      level++;
      i++; continue;
    }

    // Handle closing brackets
    if (ch === '}' || ch === ']' || ch === ')') {
      if (currentLine.trim()) {
        addLine(currentLine);
        currentLine = '';
      }
      if (level > 0) level--;
      currentLine += ch;
      // Check if next char suggests continuing (e.g., "} else {", "});")
      let j = i + 1;
      while (j < code.length && code[j] === ' ') j++;
      const ahead2 = code.substring(j, j + 4);
      if (ahead2.startsWith('else') || ahead2.startsWith('catch') || ahead2.startsWith('finally') || ch === ')') {
        // Keep on same line - add space
        // For else/catch/finally, continue on same line
        if (ahead2.startsWith('else') || ahead2.startsWith('catch') || ahead2.startsWith('finally')) {
          currentLine += ' ';
        }
      } else {
        addLine(currentLine);
        currentLine = '';
      }
      i++; continue;
    }

    // Handle semicolons
    if (ch === ';') {
      currentLine += ch;
      // Check for 'for' statement - don't break
      let j = i + 1;
      while (j < code.length && code[j] === ' ') j++;
      if (currentLine.trim().startsWith('for')) {
        currentLine += ' ';
      } else {
        addLine(currentLine);
        currentLine = '';
      }
      i++; continue;
    }

    // Handle commas in certain contexts
    if (ch === ',') {
      currentLine += ch;
      // Add space after comma if not in object/array context that should break
      const nextNonWS = code.substring(i + 1).trimStart()[0];
      if (nextNonWS === '\n' || nextNonWS === undefined) {
        // Will be handled by newline
      } else {
        currentLine += ' ';
      }
      i++; continue;
    }

    currentLine += ch;
    i++;
  }

  // Flush remaining
  if (currentLine.trim()) {
    addLine(currentLine);
  }

  // Clean up multiple blank lines
  result = result.replace(/\n{3,}/g, '\n\n').trim();
  return result;
}

function syntaxHighlightJS(code) {
  const keywords = ['const','let','var','function','return','if','else','for','while','do','switch','case','break','continue','new','this','class','extends','super','import','export','default','from','async','await','try','catch','finally','throw','typeof','instanceof','in','of','void','delete','yield','static','get','set'];
  return code
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/(\/\/[^\n]*)/g, '<span class="js-comment">$1</span>')
    .replace(/(\/\*[\s\S]*?\*\/)/g, '<span class="js-comment">$1</span>')
    .replace(/(&quot;|"|')(.*?)(\1)/g, '<span class="js-string">$1$2$3</span>')
    .replace(/\b(\d+\.?\d*)\b/g, '<span class="js-number">$1</span>')
    .replace(new RegExp('\\b(' + keywords.join('|') + ')\\b', 'g'), '<span class="js-keyword">$1</span>')
    .replace(/\b([a-zA-Z_$][\w$]*)\s*\(/g, '<span class="js-func">$1</span>(');
}

function doFormat() {
  const inp = $('#input').value.trim();
  if (!inp) return;
  try {
    const formatted = formatJS(inp, indentSize);
    $('#output').innerHTML = syntaxHighlightJS(formatted);
    $('#toolbar').querySelector('.gz-status')?.remove();
    const s = document.createElement('span');
    s.className = 'gz-status';
    s.style.cssText = 'margin-left:8px;font-size:.85em;color:var(--gz-success)';
    s.textContent = t('formatted');
    $('#toolbar').appendChild(s);
  } catch(e) {
    $('#output').textContent = 'Error: ' + e.message;
  }
}
