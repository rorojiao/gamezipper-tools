.ci-viz-range{height:4px;background:linear-gradient(90deg,var(--gz-accent),var(--gz-accent2));border-radius:2px;position:absolute;top:0}

.ci-steps .step-title{color:var(--gz-accent);font-weight:700;margin-bottom:6px}

.ci-steps .step-highlight{color:var(--gz-accent);font-weight:700}
.ci-error{color:var(--gz-accent);font-size:.9em;text-align:center;padding:10px}

<script type="application/ld+json">{"@context":"https://schema.org","@type":"WebApplication","name":"Confidence Interval Calculator","description":"Calculate confidence intervals for population mean and proportion with step-by-step explanation. Supports 90%, 95%, and 99% confidence levels.","url": "https://tools.gamezipper.com/zh/calc/confidence-interval-calculator.html","applicationCategory":"Utility","operatingSystem":"Web Browser","offers":{"@type":"Offer","price":"0"}}</script>
<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is a confidence interval?", "acceptedAnswer": {"@type": "Answer", "text": "A confidence interval is a range of values that likely contains the true population parameter. A 95% CI means if you repeated the sampling 100 times, about 95 of those intervals would contain the true value."}}, {"@type": "Question", "name": "What is the formula for a confidence interval?", "acceptedAnswer": {"@type": "Answer", "text": "For a mean: CI = x̄ ± Z × (σ/√n). For a proportion: CI = p̂ ± Z × √(p̂(1-p̂)/n). Where Z is the z-score for your confidence level, σ is the standard deviation, and n is the sample size."}}, {"@type": "Question", "name": "When should I use z-distribution vs t-distribution?", "acceptedAnswer": {"@type": "Answer", "text": "Use the z-distribution when the sample size is large (n ≥ 30) or the population standard deviation is known. Use the t-distribution for small samples (n < 30) with unknown population standard deviation."}}, {"@type": "Question", "name": "How do I interpret a 95% confidence interval?", "acceptedAnswer": {"@type": "Answer", "text": "A 95% confidence interval means you are 95% confident that the true population parameter falls within the calculated range. It does NOT mean there is a 95% probability the true value is in the range."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="ci-wrap">
      <div class="ci-tabs">
        <button class="ci-tab active" id="tab-mean" onclick="switchTab('mean')"></button>
        <button class="ci-tab" id="tab-prop" onclick="switchTab('prop')"></button>
      </div>
      <!-- Mean fields -->
      <div class="ci-fields" id="fields-mean">
        <div class="ci-field"><label id="lbl-mean-xbar"></label><input type="number" id="xbar" value="50" step="any"></div>
        <div class="ci-field"><label id="lbl-mean-sd"></label><input type="number" id="sd" value="10" step="any" min="0.001"></div>
        <div class="ci-field"><label id="lbl-mean-n"></label><input type="number" id="mn" value="100" step="1" min="2"></div>
        <div class="ci-field"><label id="lbl-confidence"></label>
          <select id="conf-mean">
            <option value="0.90">90%</option>
            <option value="0.95" selected>95%</option>
            <option value="0.99">99%</option>
          </select>
        </div>
      </div>
      <!-- Proportion fields -->
      <div class="ci-fields" id="fields-prop" style="display:none">
        <div class="ci-field"><label id="lbl-prop-p"></label><input type="number" id="phat" value="0.45" step="0.01" min="0" max="1"></div>
        <div class="ci-field"><label id="lbl-prop-n"></label><input type="number" id="pn" value="200" step="1" min="2"></div>
        <div class="ci-field"><label id="lbl-confidence2"></label>
          <select id="conf-prop">
            <option value="0.90">90%</option>
            <option value="0.95" selected>95%</option>
            <option value="0.99">99%</option>
          </select>
        </div>
      </div>
      <div class="gz-toolbar" id="toolbar"></div>
      <div id="error" class="ci-error" style="display:none"></div>
      <div id="results" style="display:none">
        <div class="ci-result-box">
          <div class="ci-result-label" id="res-label"></div>
          <div class="ci-result-ci"><span class="lo" id="res-lo"></span><span class="sep">—</span><span class="hi" id="res-hi"></span></div>
          <div class="ci-result-desc" id="res-desc"></div>
        </div>
        <div class="ci-visual" id="viz"></div>
        <div class="ci-details" id="details"></div>
      </div>
      <div class="ci-steps" id="steps" style="display:none"></div>
    </div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Confidence Interval Calculator',
    toolDesc: 'Calculate confidence intervals for population mean and proportion with step-by-step explanation and visual representation.',
    tabMean: 'Mean',
    tabProp: 'Proportion',
    lblMeanXbar: 'Sample Mean (x̄)',
    lblMeanSD: 'Standard Deviation (σ or s)',
    lblMeanN: 'Sample Size (n)',
    lblPropP: 'Sample Proportion (p̂)',
    lblPropN: 'Sample Size (n)',
    lblConfidence: 'Confidence Level',
    calculate: 'Calculate',
    resLabel: 'Confidence Interval',
    resDesc: 'is the range that likely contains the true population parameter',
    detailSE: 'Standard Error',
    detailMargin: 'Margin of Error',
    detailZScore: 'Z-Score',
    detailLevel: 'Confidence Level',
    detailWidth: 'Interval Width',
    stepsTitle: 'Step-by-step Calculation',
    errPositive: 'Standard deviation must be positive.',
    errSample: 'Sample size must be at least 2.',
    errProp: 'Proportion must be between 0 and 1.',
    step1: 'Choose "Mean" or "Proportion" tab',
    step2: 'Enter your sample statistics',
    step3: 'Select a confidence level',
    step4: 'Click Calculate to see the interval and explanation',
  },
  zh: {
    toolTitle: '置信区间计算器',
    toolDesc: '计算总体均值和比例的置信区间，附带逐步解释和可视化。',
    tabMean: '均值',
    tabProp: '比例',
    lblMeanXbar: '样本均值 (x̄)',
    lblMeanSD: '标准差 (σ 或 s)',
    lblMeanN: '样本量 (n)',
    lblPropP: '样本比例 (p̂)',
    lblPropN: '样本量 (n)',
    lblConfidence: '置信水平',
    calculate: '计算',
    resLabel: '置信区间',
    resDesc: '是可能包含真实总体参数的范围',
    detailSE: '标准误',
    detailMargin: '误差范围',
    detailZScore: 'Z 分数',
    detailLevel: '置信水平',
    detailWidth: '区间宽度',
    stepsTitle: '逐步计算过程',
    errPositive: '标准差必须为正数。',
    errSample: '样本量至少为 2。',
    errProp: '比例必须在 0 到 1 之间。',
    step1: '选择"均值"或"比例"标签',
    step2: '输入样本统计量',
    step3: '选择置信水平',
    step4: '点击计算查看区间和解释',
  }
});

const { $, copyText, t } = GZ;
let currentTab = 'mean';
const Z = { 0.90: 1.645, 0.95: 1.96, 0.99: 2.576 };

function switchTab(tab) {
  currentTab = tab;
  $('#tab-mean').classList.toggle('active', tab === 'mean');
  $('#tab-prop').classList.toggle('active', tab === 'prop');
  $('#fields-mean').style.display = tab === 'mean' ? 'grid' : 'none';
  $('#fields-prop').style.display = tab === 'prop' ? 'grid' : 'none';
  $('#results').style.display = 'none';
  $('#steps').style.display = 'none';
  hideError();
}

function fmt(n) { return parseFloat(n.toFixed(6)).toString(); }

function calculate() {
  hideError();
  if (currentTab === 'mean') {
    calcMean();
  } else {
    calcProp();
  }
}

function calcMean() {
  const xbar = parseFloat($('#xbar').value);
  const s = parseFloat($('#sd').value);
  const n = parseInt($('#mn').value);
  const conf = parseFloat($('#conf-mean').value);

  if (isNaN(s) || s <= 0) { showError(t('errPositive')); return; }
  if (isNaN(n) || n < 2) { showError(t('errSample')); return; }

  const z = Z[conf];
  const se = s / Math.sqrt(n);
  const me = z * se;
  const lo = xbar - me;
  const hi = xbar + me;

  showResult(lo, hi, xbar, me, se, z, conf);
}

function calcProp() {
  const phat = parseFloat($('#phat').value);
  const n = parseInt($('#pn').value);
  const conf = parseFloat($('#conf-prop').value);

  if (isNaN(phat) || phat < 0 || phat > 1) { showError(t('errProp')); return; }
  if (isNaN(n) || n < 2) { showError(t('errSample')); return; }

  const z = Z[conf];
  const se = Math.sqrt(phat * (1 - phat) / n);
  const me = z * se;
  const lo = Math.max(0, phat - me);
  const hi = Math.min(1, phat + me);

  showResult(lo, hi, phat, me, se, z, conf);
}

function showResult(lo, hi, point, me, se, z, conf) {
  const isProp = currentTab === 'prop';
  const pct = (conf * 100).toFixed(0);

  $('#res-lo').textContent = isProp ? (lo * 100).toFixed(2) + '%' : fmt(lo);
  $('#res-hi').textContent = isProp ? (hi * 100).toFixed(2) + '%' : fmt(hi);
  $('#results').style.display = 'block';

  // Details
  $('#details').innerHTML = `
    <div class="ci-detail"><div class="lbl">${t('detailZScore')}</div><div class="val">${z}</div></div>
    <div class="ci-detail"><div class="lbl">${t('detailSE')}</div><div class="val">${fmt(se)}</div></div>
    <div class="ci-detail"><div class="lbl">${t('detailMargin')}</div><div class="val">±${fmt(me)}</div></div>
    <div class="ci-detail"><div class="lbl">${t('detailLevel')}</div><div class="val">${pct}%</div></div>
    <div class="ci-detail"><div class="lbl">${t('detailWidth')}</div><div class="val">${fmt(hi - lo)}</div></div>`;

  // Visual
  const range = (hi - lo);
  const padding = range * 0.4;
  const totalRange = range + padding * 2;
  const loPct = (padding / totalRange) * 100;
  const rangePct = (range / totalRange) * 100;
  const pointPct = ((point - lo + padding) / totalRange) * 100;

  $('#viz').innerHTML = `
    <div style="width:100%;position:relative;height:30px">
      <div style="position:absolute;left:${loPct}%;width:${rangePct}%;top:13px;height:4px;background:linear-gradient(90deg,var(--gz-accent),var(--gz-accent2));border-radius:2px"></div>
      <div style="position:absolute;left:${pointPct}%;top:8px;width:14px;height:14px;border-radius:50%;background:var(--gz-accent);transform:translateX(-7px)"></div>
      <div style="position:absolute;left:${loPct}%;bottom:0;font-size:.7em;color:var(--gz-text2);transform:translateX(-50%)">${isProp ? (lo*100).toFixed(1)+'%' : fmt(lo)}</div>
      <div style="position:absolute;left:${loPct+rangePct}%;bottom:0;font-size:.7em;color:var(--gz-text2);transform:translateX(-50%)">${isProp ? (hi*100).toFixed(1)+'%' : fmt(hi)}</div>
    </div>`;

  // Steps
  let html = `<div class="step-title">${t('stepsTitle')}</div>`;
  if (isProp) {
    html += `<div class="step-line">p̂ = ${phat}, n = ${n}</div>`;
    html += `<div class="step-line">SE = √(p̂(1−p̂)/n) = √(${phat}×${(1-phat).toFixed(4)}/${n}) = <span class="step-highlight">${fmt(se)}</span></div>`;
  } else {
    html += `<div class="step-line">x̄ = ${point}, s = ${$('#sd').value}, n = ${$('#mn').value}</div>`;
    html += `<div class="step-line">SE = s/√n = ${$('#sd').value}/√${$('#mn').value} = <span class="step-highlight">${fmt(se)}</span></div>`;
  }
  html += `<div class="step-line" style="margin-top:6px">Z = ${z} (for ${pct}% confidence)</div>`;
  html += `<div class="step-line">Margin of Error = Z × SE = ${z} × ${fmt(se)} = <span class="step-highlight">±${fmt(me)}</span></div>`;
  html += `<div class="step-line" style="margin-top:6px">${pct}% CI = ${isProp ? (point*100).toFixed(2)+'%' : point} ± ${fmt(me)}</div>`;
  html += `<div class="step-line">${pct}% CI = [<span class="step-highlight">${isProp ? (lo*100).toFixed(2)+'%' : fmt(lo)}, ${isProp ? (hi*100).toFixed(2)+'%' : fmt(hi)}</span>]</div>`;
  $('#steps').innerHTML = html;
  $('#steps').style.display = 'block';
}

function showError(msg) { $('#error').textContent = msg; $('#error').style.display = 'block'; $('#results').style.display='none'; $('#steps').style.display='none'; }
function hideError() { $('#error').style.display = 'none'; }

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="calculate()">${t('calculate')}</button>`;

$('#tab-mean').textContent = t('tabMean');
$('#tab-prop').textContent = t('tabProp');
$('#lbl-mean-xbar').textContent = t('lblMeanXbar');
$('#lbl-mean-sd').textContent = t('lblMeanSD');
$('#lbl-mean-n').textContent = t('lblMeanN');
$('#lbl-confidence').textContent = t('lblConfidence');
$('#lbl-prop-p').textContent = t('lblPropP');
$('#lbl-prop-n').textContent = t('lblPropN');
$('#lbl-confidence2').textContent = t('lblConfidence');
$('#res-label').textContent = t('resLabel');
$('#res-desc').textContent = t('resDesc');

calculate();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📊', href:'/calc/statistics-calculator.html', name:'Statistics'},
    {icon:'🔬', href:'/calc/sample-size-calculator.html', name:'Sample Size'},
    {icon:'📈', href:'/calc/profit-margin.html', name:'Profit Margin'},
    {icon:'🧮', href:'/calc/percentage-calculator.html', name:'Percentage'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
