<script type="application/ld+json">{"@context":"https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is the CSS border-image property?", "acceptedAnswer": {"@type": "Answer", "text": "border-image lets you use an image (typically an SVG or gradient) as the border of an element. The property has five parts: border-image-source (the image), border-image-slice (how to cut it), border-image-width (border thickness), border-image-outset (how far it extends past the box) and border-image-repeat (how the slices fill the corners and edges). It is supported in all modern browsers."}}, {"@type": "Question", "name": "Why are my corners missing in the preview?", "acceptedAnswer": {"@type": "Answer", "text": "By default border-image overrides border-radius. If you want rounded corners on top of a border-image, use the wrapper-element technique shown in the Code tab — outer div has overflow:hidden + border-radius, inner div has the border-image applied."}}, {"@type": "Question", "name": "Can I upload my own SVG?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. Click 'Upload SVG' in the patterns panel to use your own file. The SVG is converted to a data URL and used as border-image-source. For best results use a small square SVG (60-120 px) with transparent areas so the slice settings work correctly."}}, {"@type": "Question", "name": "What is the difference between 'stretch', 'repeat' and 'round'?", "acceptedAnswer": {"@type": "Answer", "text": "stretch (default) distorts the image to fill each edge. repeat tiles it from the start and clips overflow. round tiles it like repeat but rescales so a whole number of tiles fits — usually the smoothest option. pick the one that looks best for your pattern."}}]}</script>

<script>
GZI18n.register({
  en: {
    toolTitle: 'CSS Border Image Generator',
    toolDesc: 'Build production-ready CSS border-image with a live preview. Pick from 8 patterns or upload your own SVG, then fine-tune slice, width, outset and repeat. Copy the CSS instantly.',
    patterns: 'Pattern',

    fill: 'Fill center',

  },
  zh: {
    toolTitle: 'CSS Border Image 生成器',
    toolDesc: '可视化构建生产可用的 CSS border-image。选择 8 种内置图案或上传自己的 SVG，调整 slice、width、outset 和 repeat — 一键复制 CSS。',
    patterns: '图案',
    slice: '切片',
    fill: '填充中心',
    width: '宽度',
    outset: '外延',
    repeat: '重复',
    bg: '背景色',
    fg: '前景色',
    upload: '上传 SVG',
    copy: '复制 CSS',
    step1: '选择内置图案或上传自己的 SVG',
    step2: '调整 Slice（切割方式）、Width、Outset 和 Repeat',
    step3: '实时预览自动更新',
    step4: '复制 CSS 或 HTML（含圆角包装）用于生产',
  }
});

const { $, copyText, t } = GZ;

// SVG pattern library — each entry returns an inline SVG string at runtime based on fg/bg colors
function makeSVG(kind, fg, bg) {
  const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const stroke = `stroke="${fg}" stroke-width="2"`;
  const fill = `fill="${fg}"`;
  const fillBg = `fill="${bg}"`;
  let body = '';
  switch (kind) {
    case 'stripes-diag':
      body = `<pattern id="p" width="14" height="14" patternUnits="userSpaceOnUse" patternTransform="rotate(45)"><rect width="7" height="14" fill="${bg}"/><rect x="7" width="7" height="14" fill="${fg}"/></pattern>`;
      break;
    case 'stripes-h':
      body = `<pattern id="p" width="20" height="14" patternUnits="userSpaceOnUse"><rect width="10" height="14" fill="${bg}"/><rect x="10" width="10" height="14" fill="${fg}"/></pattern>`;
      break;
    case 'stripes-v':
      body = `<pattern id="p" width="14" height="20" patternUnits="userSpaceOnUse"><rect width="14" height="10" fill="${bg}"/><rect y="10" width="14" height="10" fill="${fg}"/></pattern>`;
      break;
    case 'dots':
      body = `<pattern id="p" width="14" height="14" patternUnits="userSpaceOnUse"><rect width="14" height="14" fill="${bg}"/><circle cx="7" cy="7" r="3" fill="${fg}"/></pattern>`;
      break;
    case 'checker':
      body = `<pattern id="p" width="20" height="20" patternUnits="userSpaceOnUse"><rect width="20" height="20" fill="${bg}"/><rect width="10" height="10" fill="${fg}"/><rect x="10" y="10" width="10" height="10" fill="${fg}"/></pattern>`;
      break;
    case 'diamonds':
      body = `<pattern id="p" width="20" height="20" patternUnits="userSpaceOnUse"><rect width="20" height="20" fill="${bg}"/><path d="M10 0 L20 10 L10 20 L0 10 Z" fill="${fg}"/></pattern>`;
      break;
    case 'zigzag':
      body = `<pattern id="p" width="20" height="14" patternUnits="userSpaceOnUse"><path d="M0 7 L5 0 L10 7 L15 0 L20 7 L15 14 L10 7 L5 14 L0 7 Z" fill="${fg}"/></pattern>`;
      break;
    case 'frame':
      body = `<rect width="60" height="60" fill="${bg}"/><rect x="10" y="10" width="40" height="40" fill="none" stroke="${fg}" stroke-width="6"/><rect x="22" y="22" width="16" height="16" fill="${fg}"/>`;
      break;
    case 'gradient':
      body = `<defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="${bg}"/><stop offset="100%" stop-color="${fg}"/></linearGradient></defs><rect width="60" height="60" fill="url(#g)"/>`;
      break;
  }
  if (body.startsWith('<pattern')) {
    return `<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 60 60'><defs>${body}</defs><rect width='60' height='60' fill='url(#p)'/></svg>`;
  }
  return `<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 60 60'>${body}</svg>`;
}

const PATTERNS = [
  { id: 'stripes-diag', icon: '↗', name: 'Diagonal Stripes' },
  { id: 'stripes-h',   icon: '▤', name: 'Horizontal Stripes' },
  { id: 'stripes-v',   icon: '▥', name: 'Vertical Stripes' },
  { id: 'dots',        icon: '⋯', name: 'Dots' },
  { id: 'checker',     icon: '▦', name: 'Checkerboard' },
  { id: 'diamonds',    icon: '◆', name: 'Diamonds' },
  { id: 'zigzag',      icon: '⚡', name: 'Zigzag' },
  { id: 'frame',       icon: '▢', name: 'Frame' },
  { id: 'gradient',    icon: '🌈', name: 'Gradient' },
];

let currentPattern = 'stripes-diag';
let customSVG = null; // string when uploaded

function svgToDataUrl(svg) {
  return 'data:image/svg+xml;utf8,' + encodeURIComponent(svg);
}

function update() {
  const slice = parseInt($('#slice').value, 10);
  const width = parseInt($('#width').value, 10);
  const outset = parseInt($('#outset').value, 10);
  const fill = $('#fill').checked ? 'fill' : '';
  const repeatH = $('#repeatH').value;
  const repeatV = $('#repeatV').value;
  const fg = $('#fgCol').value;
  const bg = $('#bgCol').value;

  $('#sliceVal').textContent = slice + '%';
  $('#widthVal').textContent = width;
  $('#outsetVal').textContent = outset;

  const svg = customSVG || makeSVG(currentPattern, fg, bg);
  const src = svgToDataUrl(svg);
  const preview = $('#preview');
  // Set border-style/width/color individually first (border shorthand resets border-image!)
  preview.style.background = 'none';
  preview.style.padding = `${Math.max(width, 4)}px`;
  preview.style.borderStyle = 'solid';
  preview.style.borderWidth = `${Math.max(width,1)}px`;
  preview.style.borderColor = 'transparent';
  // borderImage must be set AFTER the other border properties
  preview.style.borderImage = `${src} ${slice} / ${width}px / ${outset}px ${repeatH} ${repeatV} ${fill}`.trim().replace(/\s+/g,' ');

  renderCode(slice, width, outset, fill, repeatH, repeatV, src);
}

function renderCode(slice, width, outset, fill, repeatH, repeatV, src) {
  const repeatFull = (repeatH === repeatV) ? repeatH : `${repeatH} ${repeatV}`;
  const css = `.border-image {
  border-style: solid;
  border-width: ${width}px;
  border-color: transparent;
  border-image: url("${src}") ${slice}% / ${width}px / ${outset}px ${repeatFull}${fill ? ' ' + fill : ''};
  padding: 20px;
}`;
  const html = `<!-- For border-radius + border-image, wrap with overflow:hidden + radius -->
<div style="border-radius:12px;overflow:hidden;display:inline-block">
  <div class="border-image">Your content here</div>
</div>`;

  const tab = document.querySelector('.tabs button.active').dataset.tab;
  const code = (tab === 'css') ? css : html;
  $('#codeBox').textContent = code;
}

function renderPatterns() {
  const fg = $('#fgCol').value;
  const bg = $('#bgCol').value;
  $('#patterns').innerHTML = PATTERNS.map(p => {
    const svg = makeSVG(p.id, fg, bg);
    return `<button data-p="${p.id}" class="${currentPattern === p.id ? 'active' : ''}" title="${p.name}">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60">${svg.replace(/<\/?svg[^>]*>/g,'')}</svg>
    </button>`;
  }).join('');
}

function selectPattern(id) {
  currentPattern = id;
  customSVG = null;
  $('#uploadStatus').textContent = '';
  renderPatterns();
  update();
}

$('#patterns').addEventListener('click', e => {
  const b = e.target.closest('button[data-p]');
  if (b) selectPattern(b.dataset.p);
});

['#slice','#width','#outset','#fill','#repeatH','#repeatV','#bgCol','#fgCol'].forEach(s => $(s).addEventListener('input', update));

document.querySelectorAll('.tabs button').forEach(b => b.addEventListener('click', () => {
  document.querySelectorAll('.tabs button').forEach(x => x.classList.remove('active'));
  b.classList.add('active');
  update();
}));

$('#svgUpload').addEventListener('change', e => {
  const f = e.target.files[0];
  if (!f) return;
  const reader = new FileReader();
  reader.onload = ev => {
    customSVG = ev.target.result;
    $('#uploadStatus').textContent = `Loaded: ${f.name}`;
    update();
  };
  reader.readAsText(f);
});

$('#toolbar').innerHTML = `<button class="gz-btn" onclick="copyText($('#codeBox').textContent)">📋 ${t('copy')}</button>`;

renderPatterns();
update();

GZ.renderToolPage({
  category: 'css',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🌈', href:'/css-tools/gradient-border.html', name:'Gradient Border'},
    {icon:'🔘', href:'/css-tools/border-radius.html', name:'Border Radius'},
    {icon:'📦', href:'/css-tools/box-shadow.html', name:'Box Shadow'},
    {icon:'✂️', href:'/css-tools/clip-path.html', name:'Clip Path'},
  ]
});
</script>
