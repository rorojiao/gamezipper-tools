    step2: '点击「生成」创建数学字体样式',
    step3: '从结果中选择你喜欢的样式',
    step4: '点击「复制」将文本复制到剪贴板',

});

const {$, copyText, t} = GZ;

function toDoubleStruck(text) {
  const map = {
    'A':'𝔸','B':'𝔹','C':'ℂ','D':'𝔻','E':'𝔼','F':'𝔽','G':'𝔾','H':'ℍ','I':'𝕀','J':'𝕁',
    'K':'𝕂','L':'𝕃','M':'𝕄','N':'ℕ','O':'𝕆','P':'ℙ','Q':'ℚ','R':'ℝ','S':'𝕊','T':'𝕋',
    'U':'𝕌','V':'𝕍','W':'𝕎','X':'𝕏','Y':'𝕐','Z':'ℤ',
    'a':'𝕒','b':'𝕓','c':'𝕔','d':'𝕕','e':'𝕖','f':'𝕗','g':'𝕘','h':'𝕙','i':'𝕚','j':'𝕛',
    'k':'𝕜','l':'𝕝','m':'𝕞','n':'𝕟','o':'𝕠','p':'𝕡','q':'𝕢','r':'𝕣','s':'𝕤','t':'𝕥',
    'u':'𝕦','v':'𝕧','w':'𝕨','x':'𝕩','y':'𝕪','z':'𝕫',
    '0':'𝟘','1':'𝟙','2':'𝟚','3':'𝟛','4':'𝟜','5':'𝟝','6':'𝟞','7':'𝟟','8':'𝟠','9':'𝟡'
  };
  return [...text].map(ch => map[ch] || ch).join('');
}

function toBoldDoubleStruck(text) {
  return [...text].map(ch => {
    const code = ch.charCodeAt(0);
    if (code >= 65 && code <= 90) return String.fromCharCode(code + 120171);
    if (code >= 97 && code <= 122) return String.fromCharCode(code - 97 + 120197);
    if (ch >= '0' && ch <= '9') {
      const nMap = {'0':'𝟬','1':'𝟭','2':'𝟮','3':'𝟯','4':'𝟰','5':'𝟱','6':'𝟲','7':'𝟳','8':'𝟴','9':'𝟵'};
      return nMap[ch];
    }
    return ch;
  }).join('');
}

function toFraktur(text) {
  const map = {
    'A':'𝔄','B':'𝔅','C':'ℭ','D':'𝔇','E':'𝔈','F':'𝔉','G':'𝔊','H':'ℌ','I':'ℑ','J':'𝔍',
    'K':'𝔎','L':'𝔏','M':'𝔐','N':'𝔑','O':'𝔒','P':'𝔓','Q':'𝔔','R':'ℜ','S':'𝔖','T':'𝔗',
    'U':'𝔘','V':'𝔙','W':'𝔚','X':'𝔛','Y':'𝔜','Z':'ℨ',
    'a':'𝔞','b':'𝔟','c':'𝔠','d':'𝔡','e':'𝔢','f':'𝔣','g':'𝔤','h':'𝔥','i':'𝔦','j':'𝔧',
    'k':'𝔨','l':'𝔩','m':'𝔪','n':'𝔫','o':'𝔬','p':'𝔭','q':'𝔮','r':'𝔯','s':'𝔰','t':'𝔱',
    'u':'𝔲','v':'𝔳','w':'𝔴','x':'𝔵','y':'𝔶','z':'𝔷'
  };
  return [...text].map(ch => map[ch] || ch).join('');
}

function toBoldFraktur(text) {
  return [...text].map(ch => {
    const code = ch.charCodeAt(0);
    if (code >= 65 && code <= 90) return String.fromCharCode(code + 120107);
    if (code >= 97 && code <= 122) return String.fromCharCode(code - 97 + 120133);
    return ch;
  }).join('');
}

function doGenerate() {
  const text = $('#input').value;
  if (!text.trim()) { $('#output').innerHTML = ''; return; }
  const styles = [
    {label: t('doubleStruck'), fn: toDoubleStruck},
    {label: t('boldDoubleStruck'), fn: toBoldDoubleStruck},
    {label: t('fraktur'), fn: toFraktur},
    {label: t('boldFraktur'), fn: toBoldFraktur},
  ];
  $('#output').innerHTML = styles.map(s => {
    const result = s.fn(text);
    return `<div class="style-box">
      <span class="style-label">${s.label}</span>
      <span class="style-result">${result.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</span>
      <button class="gz-btn" onclick="copyText(this.parentElement.querySelector('.style-result').textContent)">${t('copy')}</button>
    </div>`;
  }).join('');
}

function doClear() { $('#input').value = ''; $('#output').innerHTML = ''; }

function loadExample() {
  $('#input').value = 'Math & Code R2D2';
  doGenerate();
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="doGenerate()">${t('generate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

$('#input').addEventListener('input', doGenerate);

});
