<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="ps-wrap">
      <div class="ps-card">
        <h3>📝 Employee & Pay Info</h3>

        <div class="ps-field"><label id="lbl-co-name">Company name</label><input type="text" id="coName" value="Acme Corp"></div>
        <div class="ps-field"><label id="lbl-period">Pay period</label>
          <select id="period">
            <option value="weekly">Weekly</option>
            <option value="biweekly" selected>Bi-weekly</option>
            <option value="semimonthly">Semi-monthly</option>
            <option value="monthly">Monthly</option>
          </select>
        </div>
        <div class="ps-field"><label id="lbl-pay-type">Pay type</label>
          <select id="payType">
            <option value="hourly" selected>Hourly</option>
            <option value="salary">Salary</option>
          </select>
        </div>
        <div class="ps-field" id="hourlyFields"><label id="lbl-hours">Hours worked</label><input type="number" id="hours" value="80" min="0" step="0.5"></div>
        <div class="ps-field" id="rateField"><label id="lbl-rate">Hourly rate ($)</label><input type="number" id="rate" value="25" min="0" step="0.01"></div>
        <div class="ps-field" id="salaryField" style="display:none"><label id="lbl-salary">Salary per period ($)</label><input type="number" id="salary" value="2500" min="0" step="0.01"></div>
        <div class="ps-field"><label id="lbl-ot-hours">Overtime hours</label><input type="number" id="otHours" value="0" min="0" step="0.5"></div>
      </div>
      <div class="ps-card">
        <h3>💸 Deductions</h3>
        <div class="ps-field"><label id="lbl-fed">Federal tax rate (%)</label><input type="number" id="fedRate" value="12" min="0" max="100" step="0.1"></div>
        <div class="ps-field"><label id="lbl-state">State tax rate (%)</label><input type="number" id="stateRate" value="5" min="0" max="100" step="0.1"></div>
        <div class="ps-field"><label id="lbl-ss">Social Security (%) — default 6.2%</label><input type="number" id="ssRate" value="6.2" min="0" max="100" step="0.1"></div>
        <div class="ps-field"><label id="lbl-medicare">Medicare (%) — default 1.45%</label><input type="number" id="medicareRate" value="1.45" min="0" max="100" step="0.1"></div>
        <div class="ps-field"><label id="lbl-other">Other deductions ($)</label><input type="number" id="otherDed" value="50" min="0" step="0.01"></div>
      </div>
    </div>
    <div id="stubPreview"></div>
    <div class="ps-actions">

<script>
GZI18n.register({
  en: {
    toolTitle: 'Paystub Generator',
    toolDesc: 'Create free pay stubs online. Enter hours, pay rate, and deductions to generate a professional pay stub with gross pay, taxes, and net pay. No signup, browser-only.',
    empName: 'Employee name', coName: 'Company name', period: 'Pay period',
    payType: 'Pay type', hours: 'Hours worked', rate: 'Hourly rate ($)',
    salary: 'Salary per period ($)', otHours: 'Overtime hours',
    fed: 'Federal tax rate (%)', state: 'State tax rate (%)',
    ss: 'Social Security (%) — default 6.2%', medicare: 'Medicare (%) — default 1.45%',
    other: 'Other deductions ($)',
    step1: 'Enter employee name, company name, and pay period (weekly, bi-weekly, etc.)',
    step2: 'Choose Hourly or Salary pay type and fill in hours, rate, or period amount',
    step3: 'Adjust tax rates and deductions (federal, state, Social Security, Medicare, other)',
    step4: 'Preview the pay stub and click Print to save as PDF',
  },
  zh: {
    toolTitle: '工资单生成器',
    toolDesc: '在线免费生成工资单。输入工时、时薪和扣除项，生成包含毛收入、税款和净收入的专业工资单。无需注册，浏览器本地运行。',
    empName: '员工姓名', coName: '公司名称', period: '发薪周期',
    payType: '薪资类型', hours: '工作小时数', rate: '时薪（$）',
    salary: '每期薪资（$）', otHours: '加班小时数',
    fed: '联邦税率（%）', state: '州税率（%）',
    ss: '社会保险（%）— 默认 6.2%', medicare: '医疗保险（%）— 默认 1.45%',
    other: '其他扣除（$）',
    step1: '输入员工姓名、公司名称和发薪周期（每周、双周等）',
    step2: '选择时薪或月薪类型，填写工时/时薪或每期金额',
    step3: '调整税率和扣除项（联邦税、州税、社保、医保、其他）',
    step4: '预览工资单，点击打印可保存为 PDF',
  }
});

const { $, t } = GZ;
const today = new Date().toISOString().slice(0,10);

function fmt(n){ return '$' + (n).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}); }

function calc(){
  const pt = $('#payType').value;
  $('#hourlyFields').style.display = pt==='hourly'?'block':'none';
  $('#rateField').style.display = pt==='hourly'?'block':'none';
  $('#salaryField').style.display = pt==='salary'?'block':'none';

  const hours = parseFloat($('#hours').value)||0;
  const rate = parseFloat($('#rate').value)||0;
  const otHours = parseFloat($('#otHours').value)||0;
  const salary = parseFloat($('#salary').value)||0;

  let gross;
  if(pt==='hourly'){
    const otRate = rate*1.5;
    gross = hours*rate + otHours*otRate;
  } else {
    gross = salary;
  }

  const fed = gross*(parseFloat($('#fedRate').value)||0)/100;
  const state = gross*(parseFloat($('#stateRate').value)||0)/100;
  const ss = gross*(parseFloat($('#ssRate').value)||0)/100;
  const medicare = gross*(parseFloat($('#medicareRate').value)||0)/100;
  const other = parseFloat($('#otherDed').value)||0;
  const totalDed = fed+state+ss+medicare+other;
  const net = gross-totalDed;

  $('#stubPreview').innerHTML = `
  <div class="ps-stub" id="psDoc">
    <h2>${$('#coName').value||'Company'}</h2>
    <div class="sub">PAY STUB — ${$('#period').value.toUpperCase()} — ${today}</div>
    <div class="ps-grid">
      <div><b>Employee:</b> ${$('#empName').value||'—'}</div>
      <div><b>Pay Date:</b> ${today}</div>
      <div><b>Company:</b> ${$('#coName').value||'—'}</div>
      <div><b>Period:</b> ${$('#period').value}</div>
    </div>
    <table class="ps-table">
      <thead><tr><th>Earnings</th><th>Hours</th><th>Rate</th><th>Amount</th></tr></thead>
      <tbody>
        <tr><td>${pt==='hourly'?'Regular':'Salary'}</td><td>${pt==='hourly'?hours.toFixed(1):'—'}</td><td>${pt==='hourly'?fmt(rate):'—'}</td><td>${fmt(pt==='hourly'?hours*rate:salary)}</td></tr>
        ${pt==='hourly'&&otHours>0?`<tr><td>Overtime (1.5x)</td><td>${otHours.toFixed(1)}</td><td>${fmt(rate*1.5)}</td><td>${fmt(otHours*rate*1.5)}</td></tr>`:''}
      </tbody>
      <tfoot><tr><td colspan="3">Gross Pay</td><td>${fmt(gross)}</td></tr></tfoot>
    </table>
    <table class="ps-table">
      <thead><tr><th>Deductions</th><th>Amount</th></tr></thead>
      <tbody>
        <tr><td>Federal Tax</td><td>-${fmt(fed)}</td></tr>
        <tr><td>State Tax</td><td>-${fmt(state)}</td></tr>
        <tr><td>Social Security</td><td>-${fmt(ss)}</td></tr>
        <tr><td>Medicare</td><td>-${fmt(medicare)}</td></tr>
        ${other>0?`<tr><td>Other</td><td>-${fmt(other)}</td></tr>`:''}
      </tbody>
      <tfoot><tr><td>Total Deductions</td><td>-${fmt(totalDed)}</td></tr></tfoot>
    </table>
    <div class="ps-net"><span>NET PAY</span><span class="val">${fmt(net)}</span></div>
  </div>`;
}

$('#empName').addEventListener('input',calc);
$('#coName').addEventListener('input',calc);
$('#period').addEventListener('change',calc);
$('#payType').addEventListener('change',calc);
$('#hours').addEventListener('input',calc);
$('#rate').addEventListener('input',calc);
$('#salary').addEventListener('input',calc);
$('#otHours').addEventListener('input',calc);
$('#fedRate').addEventListener('input',calc);
$('#stateRate').addEventListener('input',calc);
$('#ssRate').addEventListener('input',calc);
$('#medicareRate').addEventListener('input',calc);
$('#otherDed').addEventListener('input',calc);
$('#printBtn').addEventListener('click',()=>{
  const w = window.open('','_blank');
  w.document.write('<html><head><title>工资单生成器 - 免费在线工资条制作 | GameZipper 工具箱</title></head><body>'+$('#psDoc').outerHTML+'</body></html>');
  w.document.close();
  w.print();
});
$('#resetBtn').addEventListener('click',()=>{
  ['empName','coName','hours','rate','salary','otHours','fedRate','stateRate','ssRate','medicareRate','otherDed']
    .forEach(id=>{ const el=$('#'+id); el.value = el.defaultValue; });
  calc();
});

calc();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'💰', href:'/calc/salary-calculator.html', name:'Salary Calculator'},
    {icon:'💸', href:'/calc/hourly-paycheck-calculator.html', name:'Hourly Paycheck'},
    {icon:'🧾', href:'/text/invoice-template-generator.html', name:'Invoice Generator'},
    {icon:'💵', href:'/calc/tax-refund-estimator.html', name:'Tax Estimator'},
  ]
});
</script>
<script src="/tools-result-rec.js?v=20260707v520" defer></script>
</body>
</html>
