const { $, t } = GZ;

const RAD = Math.PI / 180;

// NOAA solar calculation. Returns event times in solar local time (decimal hours, may be NaN).
// elevation in degrees (sun center): sunrise/sunset = -0.833, civil = -6, nautical = -12, astro = -18, golden = -4..6
function sunEventTime(date, lat, lng, elevDeg) {
  const dayOfYear = Math.floor((date - new Date(date.getFullYear(), 0, 0)) / 86400000);
  const N = dayOfYear;
  // Approximate solar declination and equation of time (Spencer/NOAA simplified)
  const gamma = (2 * Math.PI / 365) * (N - 1);
  const eqTime = 229.18 * (0.000075 + 0.001868 * Math.cos(gamma) - 0.032077 * Math.sin(gamma) - 0.014615 * Math.cos(2 * gamma) - 0.040849 * Math.sin(2 * gamma)); // minutes
  const decl = 0.006918 - 0.399912 * Math.cos(gamma) + 0.070257 * Math.sin(gamma) - 0.006758 * Math.cos(2 * gamma) + 0.000907 * Math.sin(2 * gamma) - 0.002697 * Math.cos(3 * gamma) + 0.00148 * Math.sin(3 * gamma); // radians
  const cosH = (Math.sin(elevDeg * RAD) - Math.sin(lat * RAD) * Math.sin(decl)) / (Math.cos(lat * RAD) * Math.cos(decl));
  if (cosH > 1) return { rise: NaN, set: NaN, noon: NaN, polar: 'night' };
  if (cosH < -1) return { rise: NaN, set: NaN, noon: NaN, polar: 'day' };
  const H = Math.acos(cosH) / RAD; // degrees
  const noonMin = 720 - 4 * lng - eqTime; // solar noon in minutes from local solar midnight
  const riseMin = noonMin - 4 * H;
  const setMin = noonMin + 4 * H;
  return { rise: riseMin / 60, set: setMin / 60, noon: noonMin / 60, polar: null };
}

// The NOAA event times (rise/set/noon) are already expressed in decimal hours
// measured from UTC midnight (the 720 - 4*longitude term bakes longitude in).
// So we only add the hour offset to UTC midnight — no extra longitude adjustment.
function hourToUTC(date, utcHour) {
  const base = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
  const ms = base.getTime() + utcHour * 3600000;
  return new Date(ms);
}

function fmtClock(date) {
  if (!date || isNaN(date.getTime())) return '—';
  return date.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit', timeZone: 'UTC' }) + ' UTC';
}

function fmtDuration(hours) {
  if (isNaN(hours) || hours < 0) return '—';
  const h = Math.floor(hours);
  const m = Math.round((hours - h) * 60);
  return `${h} ${t('hrs')} ${m} ${t('min')}`;
}

function render() {
  const lat = parseFloat($('#lat').value);
  const lng = parseFloat($('#lng').value);
  const raw = $('#date').value;
  if (isNaN(lat) || lat < -90 || lat > 90 || isNaN(lng) || lng < -180 || lng > 180) {
    $('#output').innerHTML = `<span style="color:var(--gz-accent)">${t('errCoords')}</span>`;
    return;
  }
  if (!raw) return;
  const parts = raw.split('-');
  const date = new Date(+parts[0], +parts[1] - 1, +parts[2]);

  const rs = sunEventTime(date, lat, lng, -0.833);
  const civil = sunEventTime(date, lat, lng, -6);
  const nautical = sunEventTime(date, lat, lng, -12);
  const astro = sunEventTime(date, lat, lng, -18);
  // golden hour: sun between -4 and +6 degrees
  const goldenLow = sunEventTime(date, lat, lng, 6);   // golden starts when sun crosses +6
  // Use civil (-6) boundary as golden start; +6 boundary as golden end
  const goldenUp = sunEventTime(date, lat, lng, 6);

  if (rs.polar === 'day') {
    $('#output').innerHTML = `<div class="summary-bar"><div>☀️ ${t('polarDay')}</div></div>`;
    return;
  }
  if (rs.polar === 'night') {
    $('#output').innerHTML = `<div class="summary-bar"><div>🌙 ${t('polarNight')}</div></div>`;
    return;
  }

  const sunriseD = hourToUTC(date, rs.rise, lng);
  const sunsetD = hourToUTC(date, rs.set, lng);
  const noonD = hourToUTC(date, rs.noon, lng);
  const daylight = rs.set - rs.rise;

  // golden: morning = between sunrise(-0.833) and sun at +6 ; evening = between sun at +6 and sunset
  // morning golden: from sunrise to goldenUp.rise
  // evening golden: from goldenUp.set to sunset
  const goldenAMstart = sunriseD;
  const goldenAMend = isNaN(goldenUp.rise) ? sunriseD : hourToUTC(date, goldenUp.rise, lng);
  const goldenPMstart = isNaN(goldenUp.set) ? sunsetD : hourToUTC(date, goldenUp.set, lng);
  const goldenPMend = sunsetD;
  // blue hour: civil to sunrise (morning), sunset to civil (evening)
  const blueAMstart = hourToUTC(date, civil.rise, lng);
  const blueAMend = sunriseD;
  const bluePMstart = sunsetD;
  const bluePMend = hourToUTC(date, civil.set, lng);

  function card(time, lbl, cls) {
    return `<div class="result-card ${cls||''}"><div class="time">${fmtClock(time)}</div><div class="lbl">${lbl}</div></div>`;
  }
  function rangeCard(s, e, lbl, cls) {
    return `<div class="result-card ${cls||''}"><div class="time" style="font-size:1.1em">${fmtClock(s)} – ${fmtClock(e)}</div><div class="lbl">${lbl}</div></div>`;
  }

  $('#output').innerHTML = `
    <div class="summary-bar">
      <div>☀️</div>
      <div><div class="big">${fmtDuration(daylight)}</div><div class="cap">${t('daylight')}</div></div>
      <div style="margin-left:auto;text-align:right"><div class="cap">${t('solarNoon')}</div><div class="big" style="font-size:1.3rem">${fmtClock(noonD)}</div></div>
    </div>
    <div class="result-grid">
      ${card(sunriseD, '🌅 ' + t('sunrise'), 'noon')}
      ${card(sunsetD, '🌇 ' + t('sunset'), 'noon')}
      ${rangeCard(goldenAMstart, goldenAMend, '🌅 ' + t('goldenAM'), 'gold')}
      ${rangeCard(goldenPMstart, goldenPMend, '🌇 ' + t('goldenPM'), 'gold')}
      ${rangeCard(blueAMstart, blueAMend, '🔵 ' + t('blueAM'), 'blue')}
      ${rangeCard(bluePMstart, bluePMend, '🔵 ' + t('bluePM'), 'blue')}
      ${rangeCard(hourToUTC(date, astro.rise, lng), hourToUTC(date, civil.rise, lng), '✨ ' + t('astroTwilight') + ' / ' + t('nauticalTwilight'))}
      ${rangeCard(hourToUTC(date, civil.set, lng), hourToUTC(date, astro.set, lng), '✨ ' + t('nauticalTwilight') + ' / ' + t('astroTwilight'))}
    </div>
    <div class="note">📍 ${lat.toFixed(3)}°, ${lng.toFixed(3)}° · times shown in UTC solar time</div>`;
}

window.useLocation = function() {
  if (!navigator.geolocation) { $('#status').innerHTML = t('locFail'); return; }
  $('#status').innerHTML = '⏳ ...';
  navigator.geolocation.getCurrentPosition(
    pos => {
      $('#lat').value = pos.coords.latitude.toFixed(4);
      $('#lng').value = pos.coords.longitude.toFixed(4);
      $('#status').innerHTML = '';
      render();
    },
    () => { $('#status').innerHTML = `<span style="color:var(--gz-accent)">${t('locFail')}</span>`; },
    { timeout: 8000 }
  );
};

const now = new Date();
$('#inputs').innerHTML = `

    <label>${t('longitude')}</label><input id="lng" type="number" step="0.0001" min="-180" max="180" value="-74.0060">
    <label>${t('pickDate')}</label><input id="date" type="date" value="${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}">
    <button class="gz-btn" onclick="render()">${t('calculate')}</button>
    <button class="gz-btn gz-btn-secondary" onclick="useLocation()">📍 ${t('useLocation')}</button>
  </div>`;

['lat','lng','date'].forEach(id => $('#'+id).addEventListener('input', render));

$('#toolbar').innerHTML = `<button class="gz-btn" onclick="render()">${t('calculate')}</button>`;

    {icon:'☀️', href:'/calc/solar-calculator.html', name:'Solar Calculator'},
  ]
});

render();
</script>
