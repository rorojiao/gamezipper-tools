<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is a CSS divider?", "acceptedAnswer": {"@type": "Answer", "text": "A CSS divider is a horizontal (or vertical) separator used to break content into sections on a web page. It can be a simple line, a dashed border, a gradient, or a decorative element with an icon or text in the middle."}}, {"@type": "Question", "name": "How do I make a divider with an icon in the middle?", "acceptedAnswer": {"@type": "Answer", "text": "Pick the With-Icon style in this generator, set the icon emoji or character, choose colors and width, then copy the HTML and CSS. The layout uses flexbox so the icon stays perfectly centered between two lines that scale to any container width."}}, {"@type": "Question", "name": "Can I create a gradient divider with CSS?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. The Gradient style uses a linear-gradient background that fades from transparent to your color and back, producing a smooth fade-in / fade-out line. Adjust the two colors and the thickness to fine-tune the effect."}}, {"@type": "Question", "name": "Is the CSS Divider Generator free to use?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. The tool is completely free, runs entirely in your browser and never uploads your data. Copy the generated HTML and CSS into any project, commercial or personal."}}]}</script>

<div class="gz-container">
  <div class="gz-tool-header"><h1 id="title"></h1><p class="desc" id="desc"></p></div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <p style="color:var(--text2);font-size:.85rem;margin-bottom:6px" id="styleLabel"></p>
    <div class="style-grid" id="styles"></div>

</div>
<script>
GZI18n.register({
  en:{toolTitle:'CSS Divider Generator',toolDesc:'Create beautiful CSS section dividers and separators — solid, dashed, dotted, gradient, double, wave and with-icon styles. Live preview, copy HTML + CSS.',
    style:'Style',solid:'Solid',dashed:'Dashed',dotted:'Dotted',gradient:'Gradient',doubleLine:'Double',wave:'Wave',withIcon:'With Icon',
    thickness:'Thickness',width:'Width',color:'Color',color2:'Color 2',icon:'Icon',
    step1:'Pick a divider style',step2:'Adjust thickness, width and colors',step3:'For With-Icon, choose an emoji or character',step4:'Copy the HTML + CSS into your page'},
  zh:{toolTitle:'CSS 分割线生成器',toolDesc:'创建精美的 CSS 分割线和分隔符 — 实线、虚线、点线、渐变、双线、波浪和带图标样式。实时预览，复制 HTML + CSS。',
    style:'样式',solid:'实线',dashed:'虚线',dotted:'点线',gradient:'渐变',doubleLine:'双线',wave:'波浪',withIcon:'带图标',
    thickness:'粗细',width:'宽度',color:'颜色',color2:'颜色 2',icon:'图标',
    step1:'选择分割线样式',step2:'调整粗细、宽度和颜色',step3:'带图标样式可选择 emoji 或字符',step4:'复制 HTML + CSS 到页面'}
});
const {$,copyText,t}=GZ;
let style='gradient',thickness=2,width=60,color='#4ecdc4',color2='#6c5ce7',icon='✨';

function renderStyles(){
  $('#styles').innerHTML=[
    ['solid','solid'],['dashed','dashed'],['dotted','dotted'],['gradient','gradient'],
    ['doubleLine','doubleLine'],['wave','wave'],['withIcon','withIcon']
  ].map(s=>`<button class="${s[0]===style?'active':''}" onclick="style='${s[0]}';renderStyles();update()">${t(s[1])}</button>`).join('');
}

function buildPreview(){
  const el=$('#preview');
  const w=width+'%';
  if(style==='solid'||style==='dashed'||style==='dotted'){
    el.innerHTML=`<hr style="border:none;border-top:${thickness}px ${style==='dashed'?'dashed':style==='dotted'?'dotted':'solid'} ${color};width:${w};margin:0 auto">`;
  } else if(style==='gradient'){
    el.innerHTML=`<hr style="border:none;height:${thickness}px;width:${w};margin:0 auto;border-radius:${thickness}px;background:linear-gradient(90deg,transparent,${color},${color2},${color},transparent)">`;
  } else if(style==='doubleLine'){
    el.innerHTML=`<hr style="border:none;border-top:${thickness}px solid ${color};border-bottom:${thickness}px solid ${color2};height:${thickness*4}px;width:${w};margin:0 auto">`;
  } else if(style==='wave'){
    const svgW=400,svgH=thickness*4+10;
    el.innerHTML=`<svg viewBox="0 0 ${svgW} ${svgH}" width="${w}" height="${svgH}" style="display:block;margin:0 auto" preserveAspectRatio="none"><path d="M0,${svgH/2} Q${svgW/8},${0} ${svgW/4},${svgH/2} T${svgW/2},${svgH/2} T${svgW*3/4},${svgH/2} T${svgW},${svgH/2}" fill="none" stroke="${color}" stroke-width="${thickness}" stroke-linecap="round"/></svg>`;
  } else { // withIcon
    el.innerHTML=`<div style="display:flex;align-items:center;gap:14px;width:${w};margin:0 auto;color:${color}">
      <span style="flex:1;height:${thickness}px;background:${color};border-radius:${thickness}px"></span>
      <span style="font-size:${thickness*14}px">${icon}</span>
      <span style="flex:1;height:${thickness}px;background:${color};border-radius:${thickness}px"></span>
    </div>`;
  }
}

function buildCode(){
  const w=width+'%';
  let html='',css='';
  if(style==='solid'||style==='dashed'||style==='dotted'){
    const bs=style==='dashed'?'dashed':style==='dotted'?'dotted':'solid';
    html=`<hr class="gz-divider">`;
    css=`.gz-divider {\n  border: none;\n  border-top: ${thickness}px ${bs} ${color};\n  width: ${w};\n  margin: 24px auto;\n}`;
  } else if(style==='gradient'){
    html=`<hr class="gz-divider">`;
    css=`.gz-divider {\n  border: none;\n  height: ${thickness}px;\n  width: ${w};\n  margin: 24px auto;\n  border-radius: ${thickness}px;\n  background: linear-gradient(90deg, transparent, ${color}, ${color2}, ${color}, transparent);\n}`;
  } else if(style==='doubleLine'){
    html=`<hr class="gz-divider">`;
    css=`.gz-divider {\n  border: none;\n  border-top: ${thickness}px solid ${color};\n  border-bottom: ${thickness}px solid ${color2};\n  height: ${thickness*4}px;\n  width: ${w};\n  margin: 24px auto;\n}`;
  } else if(style==='wave'){
    html=`<svg class="gz-divider" viewBox="0 0 400 ${thickness*4+10}" preserveAspectRatio="none">\n  <path d="M0,${(thickness*4+10)/2} Q50,0 100,${(thickness*4+10)/2} T200,${(thickness*4+10)/2} T300,${(thickness*4+10)/2} T400,${(thickness*4+10)/2}" fill="none" stroke="${color}" stroke-width="${thickness}" stroke-linecap="round"/>\n</svg>`;
    css=`.gz-divider {\n  display: block;\n  width: ${w};\n  height: ${thickness*4+10}px;\n  margin: 24px auto;\n}`;
  } else { // withIcon
    html=`<div class="gz-divider">\n  <span class="gz-divider-line"></span>\n  <span class="gz-divider-icon">${icon}</span>\n  <span class="gz-divider-line"></span>\n</div>`;
    css=`.gz-divider {\n  display: flex;\n  align-items: center;\n  gap: 14px;\n  width: ${w};\n  margin: 24px auto;\n  color: ${color};\n}\n.gz-divider-line {\n  flex: 1;\n  height: ${thickness}px;\n  background: ${color};\n  border-radius: ${thickness}px;\n}\n.gz-divider-icon {\n  font-size: ${thickness*14}px;\n  line-height: 1;\n}`;
  }
  $('#code').textContent=`<!-- HTML -->\n${html}\n\n<!-- CSS -->\n${css}`;
}

function update(){buildPreview();buildCode();}

$('#styleLabel').textContent=t('style');
$('#controls').innerHTML=`
  <label>${t('thickness')}: <input type="range" min="1" max="8" value="${thickness}" oninput="thickness=+this.value;$('#tv').textContent=this.value;update()"><span id="tv">${thickness}</span>px</label>
  <label>${t('width')}: <input type="range" min="20" max="100" value="${width}" oninput="width=+this.value;$('#wv').textContent=this.value;update()"><span id="wv">${width}</span>%</label>
  <label>${t('color')}: <input type="color" value="${color}" oninput="color=this.value;update()"></label>
  <label>${t('color2')}: <input type="color" value="${color2}" oninput="color2=this.value;update()"></label>
  <label>${t('icon')}: <input type="text" id="iconI" value="${icon}" maxlength="2" style="width:50px;text-align:center" oninput="icon=this.value||'✨';update()"></label>`;
$('#toolbar').innerHTML=`<button class="gz-btn gz-btn-secondary" onclick="style='gradient';thickness=2;width=60;color='#4ecdc4';color2='#6c5ce7';icon='✨';\$('#tv').textContent='2';\$('#wv').textContent='60';\$('input[type=color]')[0]?null:null;renderStyles();update()">${t('example')}</button><button class="gz-btn" onclick="copyText($('#code').textContent)">${t('copy')}</button>`;
renderStyles();update();
GZ.renderToolPage({category:'css',titleKey:'toolTitle',descKey:'toolDesc',howToSteps:['step1','step2','step3','step4'],related:[
  {icon:'🔺',href:'/css-tools/triangle.html',name:'Triangle'},
  {icon:'🌈',href:'/css-tools/gradient.html',name:'Gradient'},
  {icon:'🔘',href:'/css-tools/border-radius.html',name:'Border Radius'},
]});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
