<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "How do I calculate invoice total with tax and discount?", "acceptedAnswer": {"@type": "Answer", "text": "First sum all line item totals to get the subtotal. Apply any discount (percentage or fixed amount) to the subtotal. Then apply the tax rate to the discounted subtotal. The final total is: Subtotal − Discount + Tax. This calculator handles all steps automatically."}}, {"@type": "Question", "name": "Should discount be applied before or after tax?", "acceptedAnswer": {"@type": "Answer", "text": "In most regions, discounts are applied before tax — the tax is calculated on the net (discounted) amount. This is the standard method used by most invoicing software and retail. This calculator applies discount first, then calculates tax on the reduced subtotal."}}, {"@type": "Question", "name": "Can I use this for quotes and estimates?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. The invoice calculator works for any pricing document — invoices, quotes, estimates, purchase orders, or receipts. Simply add line items, set the tax rate, and optionally a discount to see the final total instantly."}}, {"@type": "Question", "name": "Is my invoice data private?", "acceptedAnswer": {"@type": "Answer", "text": "Absolutely. All calculations happen in your browser. No line items, prices, or business data are ever sent to any server. The tool works completely offline after loading."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="ic-wrap">
      <table class="ic-table" id="itemTable">
        <thead><tr>
          <th>#</th><th id="th-desc"></th><th id="th-qty"></th><th id="th-price"></th><th id="th-line"></th><th></th>
        </tr></thead>
        <tbody id="itemBody"></tbody>
      </table>
      <button class="gz-btn gz-btn-secondary ic-add" id="btn-add"></button>
      <div class="ic-controls">
        <div><label id="lbl-tax"></label><input type="number" id="taxRate" value="0" min="0" step="0.5"></div>
        <div><label id="lbl-disc"></label><input type="number" id="discRate" value="0" min="0" step="1"></div>
        <div><label id="lbl-currency"></label><input type="text" id="currency" value="$" maxlength="3"></div>
      </div>
      <div class="ic-summary">
        <div class="ic-row"><span id="lbl-subtotal"></span><span class="val" id="val-subtotal">—</span></div>
        <div class="ic-row"><span id="lbl-discount2"></span><span class="val" id="val-discount">—</span></div>
        <div class="ic-row"><span id="lbl-tax2"></span><span class="val" id="val-tax">—</span></div>
        <div class="ic-row total"><span id="lbl-grand"></span><span class="val" id="val-grand">—</span></div>
      </div>
    </div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Invoice Calculator',
    toolDesc: 'Calculate invoice totals with line items, discount, and tax. Add descriptions, quantities, and prices — get subtotal, tax, and grand total instantly. Free, instant, private.',
    thDesc: 'Description', thQty: 'Qty', thPrice: 'Unit price', thLine: 'Line total',
    lblTax: 'Tax rate (%)', lblDisc: 'Discount (%)', lblCurrency: 'Currency',
    lblSubtotal: 'Subtotal', lblDiscount2: 'Discount', lblTax2: 'Tax', lblGrand: 'Grand total',
    addItem: '+ Add line item',
    step1: 'Add line items with description, quantity, and unit price',
    step2: 'Enter tax rate (%) and discount (%) if applicable',
    step3: 'Set your currency symbol (default $)',
    step4: 'See subtotal, discount, tax, and grand total calculated instantly',
  },
  zh: {
    toolTitle: '发票计算器',
    toolDesc: '计算含明细项、折扣和税的发票总额。添加描述、数量和单价 — 立即获得小计、税额和总计。免费、即时、隐私安全。',
    thDesc: '描述', thQty: '数量', thPrice: '单价', thLine: '行小计',
    lblTax: '税率 (%)', lblDisc: '折扣 (%)', lblCurrency: '货币符号',
    lblSubtotal: '小计', lblDiscount2: '折扣', lblTax2: '税额', lblGrand: '总计',
    addItem: '+ 添加明细行',
    step1: '添加明细项（描述、数量、单价）',
    step2: '如有需要，输入税率 (%) 和折扣 (%)',
    step3: '设置货币符号（默认 $）',
    step4: '立即查看小计、折扣、税额和总计',
  }
});

const { $, t } = GZ;
let items = [
  {desc: 'Service / Product 1', qty: 1, price: 100},
  {desc: 'Service / Product 2', qty: 2, price: 50},
];

function money(n, cur) { return cur + (isFinite(n) ? n.toLocaleString(undefined,{minimumFractionDigits:2, maximumFractionDigits:2}) : '0.00'); }

function renderItems() {
  const cur = $('#currency').value || '$';
  $('#itemBody').innerHTML = items.map((it, i) => `<tr>
    <td>${i+1}</td>
    <td><input type="text" value="${it.desc.replace(/"/g,'&quot;')}" data-idx="${i}" data-field="desc"></td>
    <td><input type="number" value="${it.qty}" min="0" step="1" data-idx="${i}" data-field="qty"></td>
    <td><input type="number" value="${it.price}" min="0" step="0.01" data-idx="${i}" data-field="price"></td>
    <td class="ic-total">${money(it.qty * it.price, cur)}</td>
    <td><button class="ic-del" data-del="${i}" title="Remove">×</button></td>
  </tr>`).join('');

  $('#itemBody').querySelectorAll('input').forEach(inp => {
    inp.addEventListener('input', e => {
      const idx = +e.target.dataset.idx;
      const f = e.target.dataset.field;
      items[idx][f] = f === 'desc' ? e.target.value : (+e.target.value || 0);
      calc();
    });
  });
  $('#itemBody').querySelectorAll('[data-del]').forEach(btn => {
    btn.onclick = e => { items.splice(+e.target.dataset.del, 1); renderItems(); calc(); };
  });
}

function calc() {
  const cur = $('#currency').value || '$';
  const taxRate = (+$('#taxRate').value || 0) / 100;
  const discRate = (+$('#discRate').value || 0) / 100;
  const subtotal = items.reduce((s, it) => s + it.qty * it.price, 0);
  const discount = subtotal * discRate;
  const taxable = subtotal - discount;
  const tax = taxable * taxRate;
  const grand = taxable + tax;

  $('#val-subtotal').textContent = money(subtotal, cur);
  $('#val-discount').textContent = '−' + money(discount, cur);
  $('#val-tax').textContent = money(tax, cur);
  $('#val-grand').textContent = money(grand, cur);

  // Update line totals without full re-render
  const rows = $('#itemBody').querySelectorAll('tr');
  rows.forEach((row, i) => {
    if (items[i]) row.querySelector('.ic-total').textContent = money(items[i].qty * items[i].price, cur);
  });
}

// Labels
$('#th-desc').textContent = t('thDesc');
$('#th-qty').textContent = t('thQty');
$('#th-price').textContent = t('thPrice');
$('#th-line').textContent = t('thLine');
$('#lbl-tax').textContent = t('lblTax');
$('#lbl-disc').textContent = t('lblDisc');
$('#lbl-currency').textContent = t('lblCurrency');
$('#lbl-subtotal').textContent = t('lblSubtotal');
$('#lbl-discount2').textContent = t('lblDiscount2');
$('#lbl-tax2').textContent = t('lblTax2');
$('#lbl-grand').textContent = t('lblGrand');
$('#btn-add').textContent = t('addItem');

$('#btn-add').onclick = () => { items.push({desc:'New item', qty:1, price:0}); renderItems(); calc(); };
['taxRate','discRate','currency'].forEach(id => $('#'+id).addEventListener('input', calc));

renderItems();
calc();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🧾', href:'/calc/tax-bracket-calculator.html', name:'Tax Bracket'},
    {icon:'🧮', href:'/calc/sales-tax-calculator.html', name:'Sales Tax'},
    {icon:'📉', href:'/calc/discount-calculator.html', name:'Discount'},
    {icon:'💵', href:'/calc/profit-margin-calculator.html', name:'Profit Margin'},
  ]
});
</script>
<script src="/tools-result-rec.js?v=20260707v520" defer></script>
</body>
