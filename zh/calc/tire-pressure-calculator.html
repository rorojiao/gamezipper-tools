<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "How do I convert PSI to bar?", "acceptedAnswer": {"@type": "Answer", "text": "1 PSI equals 0.0689476 bar. To convert PSI to bar, multiply by 0.0689476. For example, 32 PSI equals about 2.2 bar. This tool converts automatically between PSI, bar, kPa and atm."}}, {"@type": "Question", "name": "What PSI should my tires be?", "acceptedAnswer": {"@type": "Answer", "text": "Most passenger cars recommend 30-35 PSI (2.0-2.4 bar) cold. Check the sticker inside the driver door jamb or your owner manual for the exact figure. Never use the max pressure printed on the tire sidewall as your target."}}, {"@type": "Question", "name": "Should I increase tire pressure for heavy loads?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. When carrying heavy loads or towing, increase pressure by 2-4 PSI as specified in your vehicle manual. This calculator lets you apply a load adjustment factor."}}, {"@type": "Question", "name": "Is my data sent to any server?", "acceptedAnswer": {"@type": "Answer", "text": "No. All calculations happen entirely in your browser. No data is ever sent to any server."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-form" id="form">
      <div>
        <label id="lbl-pressure"></label>
        <input type="number" id="pressure" value="32" min="0" step="0.1">
      </div>
      <div>
        <label id="lbl-from-unit"></label>
        <select id="fromUnit">
          <option value="psi">PSI</option>
          <option value="bar">bar</option>
          <option value="kpa">kPa</option>
          <option value="atm">atm</option>
        </select>
      </div>
      <div>
        <label id="lbl-load"></label>
        <select id="load">
          <option value="0">Normal load (0%)</option>
          <option value="2">Light towing (+2 PSI)</option>
          <option value="4">Heavy load / towing (+4 PSI)</option>
        </select>
      </div>
      <button class="gz-btn" onclick="calculate()" id="btn-calc"></button>
    </div>
    <div class="result-card" id="result" style="display:none">
      <div class="big" id="result-psi"></div>
      <div class="label" id="result-label"></div>
      <div class="result-grid">
        <div class="result-item"><div class="val" id="result-bar"></div><div class="lbl">bar</div></div>
        <div class="result-item"><div class="val" id="result-kpa"></div><div class="lbl">kPa</div></div>
        <div class="result-item"><div class="val" id="result-atm"></div><div class="lbl">atm</div></div>
        <div class="result-item"><div class="val" id="result-psi2"></div><div class="lbl">PSI (adjusted)</div></div>
      </div>
    </div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Tire Pressure Calculator & Converter',
    toolDesc: 'Convert tire pressure between PSI, bar, kPa and atm. Apply load adjustments and find the right cold pressure for your vehicle.',
    lblPressure: 'Tire Pressure',
    lblFromUnit: 'Input Unit',
    lblLoad: 'Load Condition',
    btnCalc: 'Convert & Calculate',
    resultLabel: 'Adjusted Pressure',
    step1: 'Enter your current or recommended tire pressure',
    step2: 'Select the unit your value is in (PSI, bar, kPa or atm)',
    step3: 'Choose a load adjustment if carrying heavy cargo or towing',
    step4: 'Click Convert to see the pressure in all four units',
  },
  zh: {
    toolTitle: '轮胎压力计算器与转换器',
    toolDesc: '在 PSI、bar、kPa 和 atm 之间转换轮胎压力。支持负载调整，找到适合您车辆的冷态胎压。',
    lblPressure: '轮胎压力',
    lblFromUnit: '输入单位',
    lblLoad: '负载状况',
    btnCalc: '转换并计算',
    resultLabel: '调整后压力',
    step1: '输入当前或建议的轮胎压力',
    step2: '选择数值对应的单位（PSI、bar、kPa 或 atm）',
    step3: '如承载重物或拖车，选择负载调整',
    step4: '点击转换查看四种单位下的压力值',
  }
});

const { $, copyText, t } = GZ;
const lang = GZI18n.getLang();

// Conversion factors to PSI
const TO_PSI = { psi: 1, bar: 14.5038, kpa: 0.145038, atm: 14.6959 };

function calculate() {
  const val = parseFloat($('#pressure').value) || 0;
  const fromUnit = $('#fromUnit').value;
  const loadAdj = parseFloat($('#load').value) || 0;

  // Convert input to PSI
  const basePSI = val * TO_PSI[fromUnit];
  const adjustedPSI = basePSI + loadAdj;

  const bar = adjustedPSI / 14.5038;
  const kpa = adjustedPSI / 0.145038;
  const atm = adjustedPSI / 14.6959;

  $('#result').style.display = '';
  $('#result-psi').textContent = adjustedPSI.toFixed(1) + ' PSI';
  $('#result-label').textContent = t('resultLabel');
  $('#result-bar').textContent = bar.toFixed(2);
  $('#result-kpa').textContent = Math.round(kpa);
  $('#result-atm').textContent = atm.toFixed(2);
  $('#result-psi2').textContent = adjustedPSI.toFixed(1);
}

$('#btn-calc').textContent = t('btnCalc');
calculate();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'⛽', href:'/calc/fuel-cost-calculator.html', name:'Fuel Cost'},
    {icon:'🚗', href:'/calc/car-payment-calculator.html', name:'Car Payment'},
    {icon:'📏', href:'/convert/pressure-converter.html', name:'Pressure Converter'},
    {icon:'🔢', href:'/convert/unit.html', name:'Unit Converter'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
