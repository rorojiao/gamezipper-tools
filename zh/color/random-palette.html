<script>
GZI18n.register({
  en: {
    toolTitle: 'Random Color Palette Generator',
    toolDesc: 'Generate beautiful random color palettes for design. Pick from 7 harmony types, lock colors you like, and export in CSS, JSON, SCSS or Tailwind format. Free, browser-based.',
    generate: 'Generate',
    copyAll: 'Copy CSS',
    copyJson: 'Copy JSON',
    step1: 'Choose a color harmony (random, analogous, complementary, etc.)',
    'step2': 'Set the number of colors (3-8) and click Generate',
    step3: 'Click any swatch to copy its HEX value',
    step4: 'Use the export section to copy as CSS, JSON, SCSS, or Tailwind config',
  },
  zh: {
    toolTitle: '随机配色方案生成器',
    toolDesc: '为设计项目生成漂亮的随机配色方案。从 7 种和谐类型中选择，锁定喜欢的颜色，导出为 CSS、JSON、SCSS 或 Tailwind 格式。免费，浏览器本地运行。',
    generate: '生成',
    copyAll: '复制 CSS',
    copyJson: '复制 JSON',
    step1: '选择色彩和谐方式（随机、类似色、互补色等）',
    step2: '设置颜色数量（3-8）并点击生成',
    step3: '点击任意色板复制其 HEX 值',
    step4: '使用导出区域复制为 CSS、JSON、SCSS 或 Tailwind 配置',
  }
});

const { $, copyText, t } = GZ;
let currentPalette = [];
let locked = new Set();

function hslToHex(h, s, l) {
  s /= 100; l /= 100;
  const k = n => (n + h / 30) % 12;
  const a = s * Math.min(l, 1 - l);
  const f = n => l - a * Math.max(-1, Math.min(k(n) - 3, Math.min(9 - k(n), 1)));
  const toHex = x => Math.round(x * 255).toString(16).padStart(2, '0');
  return `#${toHex(f(0))}${toHex(f(8))}${toHex(f(4))}`.toUpperCase();
}

function hexToHsl(hex) {
  const r = parseInt(hex.slice(1, 3), 16) / 255;
  const g = parseInt(hex.slice(3, 5), 16) / 255;
  const b = parseInt(hex.slice(5, 7), 16) / 255;
  const max = Math.max(r, g, b), min = Math.min(r, g, b);
  let h, s, l = (max + min) / 2;
  if (max === min) { h = s = 0; }
  else {
    const d = max - min;
    s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
    switch (max) {
      case r: h = (g - b) / d + (g < b ? 6 : 0); break;
      case g: h = (b - r) / d + 2; break;
      case b: h = (r - g) / d + 4; break;
    }
    h /= 6;
  }
  return { h: Math.round(h * 360), s: Math.round(s * 100), l: Math.round(l * 100) };
}

function hexToRgb(hex) {
  return { r: parseInt(hex.slice(1, 3), 16), g: parseInt(hex.slice(3, 5), 16), b: parseInt(hex.slice(5, 7), 16) };
}

function getLuminance(hex) {
  const { r, g, b } = hexToRgb(hex);
  const lum = (0.299 * r + 0.587 * g + 0.114 * b) / 255;
  return lum > 0.5 ? '#000' : '#fff';
}

function generatePalette() {
  const harmony = $('#harmony').value;
  const count = parseInt($('#count').value);
  const baseHue = Math.floor(Math.random() * 360);
  const baseSat = 50 + Math.floor(Math.random() * 40);
  const baseLight = 40 + Math.floor(Math.random() * 30);
  const colors = [];

  if (harmony === 'random') {
    for (let i = 0; i < count; i++) {
      colors.push({
        h: Math.floor(Math.random() * 360),
        s: 40 + Math.floor(Math.random() * 50),
        l: 30 + Math.floor(Math.random() * 50)
      });
    }
  } else if (harmony === 'analogous') {
    const range = 30;
    for (let i = 0; i < count; i++) {
      const h = (baseHue - range / 2 + (i * range) / (count - 1) + 360) % 360;
      colors.push({ h, s: baseSat, l: baseLight });
    }
  } else if (harmony === 'complementary') {
    for (let i = 0; i < count; i++) {
      const h = i % 2 === 0 ? baseHue : (baseHue + 180) % 360;
      const l = baseLight + (Math.floor(i / 2) - Math.floor(count / 4)) * 12;
      colors.push({ h, s: baseSat, l: Math.max(20, Math.min(80, l)) });
    }
  } else if (harmony === 'triadic') {
    for (let i = 0; i < count; i++) {
      const group = i % 3;
      const tier = Math.floor(i / 3);
      const h = (baseHue + group * 120) % 360;
      const l = baseLight + (tier - 1) * 15;
      colors.push({ h, s: baseSat, l: Math.max(20, Math.min(80, l)) });
    }
  } else if (harmony === 'tetradic') {
    for (let i = 0; i < count; i++) {
      const group = i % 4;
      const tier = Math.floor(i / 4);
      const h = (baseHue + group * 90) % 360;
      const l = baseLight + (tier - 0.5) * 12;
      colors.push({ h, s: baseSat, l: Math.max(20, Math.min(80, l)) });
    }
  } else if (harmony === 'monochromatic') {
    for (let i = 0; i < count; i++) {
      const l = 20 + (i * 50 / (count - 1));
      colors.push({ h: baseHue, s: baseSat, l: Math.max(15, Math.min(85, l)) });
    }
  } else if (harmony === 'split-complementary') {
    for (let i = 0; i < count; i++) {
      let h;
      if (i % 3 === 0) h = baseHue;
      else if (i % 3 === 1) h = (baseHue + 150) % 360;
      else h = (baseHue + 210) % 360;
      const l = baseLight + (Math.floor(i / 3) - 1) * 12;
      colors.push({ h, s: baseSat, l: Math.max(20, Math.min(80, l)) });
    }
  }

  currentPalette = colors.map((c, i) => {
    if (locked.has(i) && currentPalette[i]) return currentPalette[i];
    return hslToHex(c.h, c.s, c.l);
  });
  render();
}

function render() {
  $('#palette').innerHTML = currentPalette.map((hex, i) => `
    <div class="rp-swatch" style="background:${hex}">
      <span class="hex" style="color:${getLuminance(hex)}">${hex}</span>
      <button class="copy-btn" style="color:${getLuminance(hex)}" data-i="${i}">${locked.has(i) ? '🔒' : '📋'}</button>
    </div>
  `).join('');
  $$('.rp-swatch').forEach((el, i) => {
    el.addEventListener('click', (e) => {
      if (e.target.classList.contains('copy-btn')) {
        if (locked.has(i)) { locked.delete(i); }
        else { locked.add(i); }
        render();
      } else {
        copyText(currentPalette[i]);
      }
    });
  });
  $('#details').innerHTML = currentPalette.map(hex => {
    const { r, g, b } = hexToRgb(hex);
    const { h, s, l } = hexToHsl(hex);
    return `<tr>
      <td><div class="swatch-cell" style="background:${hex}"></div></td>
      <td>${hex}</td>
      <td>rgb(${r}, ${g}, ${b})</td>
      <td>hsl(${h}, ${s}%, ${l}%)</td>
    </tr>`;
  }).join('');

  const css = ':root {\n' + currentPalette.map((hex, i) => `  --color-${i+1}: ${hex};`).join('\n') + '\n}';
  const json = JSON.stringify({colors: currentPalette}, null, 2);
  const scss = currentPalette.map((hex, i) => `$color-${i+1}: ${hex};`).join('\n');
  const tailwind = 'colors: {\n' + currentPalette.map((hex, i) => `  'brand-${i+1}': '${hex}',`).join('\n') + '\n}';
  $('#export').textContent = `/* CSS */\n${css}\n\n/* JSON */\n${json}\n\n/* SCSS */\n${scss}\n\n/* Tailwind */\n${tailwind}`;
}

function $$(sel) { return Array.from(document.querySelectorAll(sel)); }

['harmony','count'].forEach(id => {
  $('#'+id).addEventListener('change', () => { locked.clear(); generatePalette(); });
});

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="generatePalette()">${t('generate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="copyText($('#export').textContent)">${t('copyAll')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="copyText(JSON.stringify({colors: currentPalette}, null, 2))">${t('copyJson')}</button>`;

generatePalette();

GZ.renderToolPage({
  category: 'color',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🎨', href:'/color/palette-from-image.html', name:'Palette from Image'},
    {icon:'🌈', href:'/color/color-scheme-generator.html', name:'Color Scheme Generator'},
    {icon:'🎲', href:'/color/random-color.html', name:'Random Color'},
    {icon:'🔄', href:'/color/hex-rgb.html', name:'HEX ↔ RGB'},
  ]
});
</script>
