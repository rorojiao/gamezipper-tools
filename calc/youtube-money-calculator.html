<script>
GZI18n.register({en:{toolTitle:'YouTube Money Calculator',toolDesc:'Estimate creator earnings from views and RPM. Compare low, expected and high revenue scenarios for any video, month or year.',views:'Total video views',rpm:'Expected RPM (revenue per 1,000 views)',currency:'Currency',range:'Estimate range (± %)',low:'Low estimate',expected:'Expected earnings',high:'High estimate',perView:'Estimated revenue per view',thousand:'Per 1,000 views',million:'Per 1 million views',formula:'Formula',disclaimer:'Planning estimate only. Actual YouTube revenue varies by niche, audience country, season, ad formats, video length, monetized playback rate and other factors. This tool is not affiliated with YouTube.',faqTitle:'YouTube Earnings FAQ',q1:'What RPM should I use?',a1:'Use the RPM shown in YouTube Studio for your channel. If you are planning a new channel, test several scenarios rather than relying on one generic number.',q2:'Is RPM the same as CPM?',a2:'No. CPM is what advertisers pay per 1,000 ad impressions before YouTube’s share. RPM is creator revenue per 1,000 total video views and is better for revenue estimates.',q3:'Can Shorts use the same RPM?',a3:'Shorts revenue economics differ from long-form videos and RPM is often lower. Use your own Shorts RPM from YouTube Studio when possible.',step1:'Enter the total views for a video, month or projected period.',step2:'Enter a realistic RPM from your YouTube Studio analytics.',step3:'Choose a range to model uncertainty.',step4:'Compare the low, expected and high revenue estimates.'},zh:{toolTitle:'YouTube 收益计算器',toolDesc:'根据播放量和 RPM 估算创作者收益，对比任意视频、月份或年份的低、中、高三种收入情景。',views:'总播放量',rpm:'预期 RPM（每千次播放收益）',currency:'货币',range:'估算波动范围（± %）',low:'低位估算',expected:'预期收益',high:'高位估算',perView:'每次播放估算收益',thousand:'每 1,000 次播放',million:'每 100 万次播放',formula:'计算公式',disclaimer:'仅供规划估算。实际 YouTube 收益会因内容领域、受众国家、季节、广告格式、视频时长、可变现播放率等因素而变化。本工具与 YouTube 无隶属关系。',faqTitle:'YouTube 收益常见问题',q1:'应该使用什么 RPM？',a1:'请优先使用 YouTube Studio 中你频道的 RPM。规划新频道时，应测试多个情景，不要依赖单一通用数值。',q2:'RPM 和 CPM 一样吗？',a2:'不一样。CPM 是广告商按每千次广告展示支付的金额，未扣除 YouTube 分成；RPM 是创作者每千次总播放的实际收益，更适合估算收入。',q3:'Shorts 能使用相同 RPM 吗？',a3:'Shorts 与长视频的收益机制不同，RPM 往往更低。尽可能使用 YouTube Studio 中你自己的 Shorts RPM。',step1:'输入某个视频、月份或预测周期的总播放量。',step2:'输入 YouTube Studio 分析中的合理 RPM。',step3:'选择波动范围以模拟不确定性。',step4:'对比低位、预期和高位收益估算。'}});
const{$,t}=GZ;const symbols={USD:'$',EUR:'€',GBP:'£',CNY:'¥',JPY:'¥',INR:'₹',CAD:'C$',AUD:'A$'};
$('#app').innerHTML=`<div class="yt-form"><div class="yt-field"><label>${t('views')}</label><input id="views" type="number" min="0" step="1000" value="100000"></div><div class="yt-field"><label>${t('rpm')}</label><input id="rpm" type="number" min="0" step="0.1" value="4.00"></div><div class="yt-field"><label>${t('currency')}</label><select id="currency">${Object.keys(symbols).map(x=>`<option>${x}</option>`).join('')}</select></div><div class="yt-field"><label>${t('range')}</label><input id="spread" type="number" min="0" max="100" step="5" value="40"></div></div><div class="yt-results"><div class="yt-result"><span>${t('low')}</span><b id="low">--</b></div><div class="yt-result primary"><span>${t('expected')}</span><b id="mid">--</b></div><div class="yt-result"><span>${t('high')}</span><b id="high">--</b></div></div><div class="yt-detail" id="detail"></div><p class="yt-disclaimer">${t('disclaimer')}</p><div class="yt-faq"><h3>${t('faqTitle')}</h3>${[1,2,3].map(n=>`<details><summary>${t('q'+n)}</summary><p>${t('a'+n)}</p></details>`).join('')}</div>`;
$('#toolbar').innerHTML=`<button class="gz-btn gz-btn-secondary" onclick="setExample(10000,2)">10K</button><button class="gz-btn gz-btn-secondary" onclick="setExample(100000,4)">100K</button><button class="gz-btn gz-btn-secondary" onclick="setExample(1000000,6)">1M</button>`;
function money(v){const c=$('#currency').value,s=symbols[c];return s+Number(v).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})+' '+c}
function calc(){const views=Math.max(0,+$('#views').value||0),rpm=Math.max(0,+$('#rpm').value||0),spread=Math.min(100,Math.max(0,+$('#spread').value||0))/100,mid=views/1000*rpm;$('#low').textContent=money(mid*(1-spread));$('#mid').textContent=money(mid);$('#high').textContent=money(mid*(1+spread));$('#detail').innerHTML=`<b>${t('formula')}:</b> ${views.toLocaleString()} ÷ 1,000 × ${money(rpm)} = <b>${money(mid)}</b><br>${t('perView')}: ${money(rpm/1000)} · ${t('thousand')}: ${money(rpm)} · ${t('million')}: ${money(rpm*1000)}`}
function setExample(v,r){$('#views').value=v;$('#rpm').value=r;calc()}document.querySelectorAll('input,select').forEach(e=>e.addEventListener('input',calc));calc();
GZ.renderToolPage({category:'calc',titleKey:'toolTitle',descKey:'toolDesc',howToSteps:['step1','step2','step3','step4'],related:[{icon:'📊',href:'/social/engagement-rate-calculator.html',name:'Engagement Rate Calculator'},{icon:'🎬',href:'/text/youtube-title-generator.html',name:'YouTube Title Generator'},{icon:'🏷️',href:'/text/youtube-tag-generator.html',name:'YouTube Tag Generator'},{icon:'📝',href:'/text/youtube-description-generator.html',name:'YouTube Description Generator'}]});
</script><script src="/tools-result-rec.js?v=20260707v520" defer></script></body></html>
