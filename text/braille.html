    lblGrade2: 'цЦЗхнЧ тЖТ Grade 2я╝Их╕жч╝йхЖЩя╝Й',
    btnExample: 'хКаш╜╜чд║ф╛Л',
    btnClear: 'ц╕Ечй║',
    step1: 'хЬих╖жф╛зш╛УхЕецИЦч▓Шш┤┤ф╗╗цДПцЦЗхнЧ',
    step2: 'хП│ф╛зхН│цЧ╢цЫ┤цЦ░ф╕║ Unicode чЫ▓цЦЗчВ╣чмж',
    step3: 'хИЗцНв Grade 2 хРпчФих╕╕шзБч╝йхЖЩ',
    step4: 'хдНхИ╢ч╗УцЮЬх╣╢ч▓Шш┤┤хИ░ф╗╗ф╜ХцФпцМБ Unicode чЪДх║ФчФи',
  }

// English Braille Grade 1 mapping (a-z, 0-9, common punct)
const T2B = {
  'a':'таБ','b':'таГ','c':'таЙ','d':'таЩ','e':'таС','f':'таЛ','g':'таЫ','h':'таУ','i':'таК','j':'таЪ',
  'k':'таЕ','l':'таЗ','m':'таН','n':'таЭ','o':'таХ','p':'таП','q':'таЯ','r':'таЧ','s':'таО','t':'таЮ',
  'u':'тае','v':'таз','w':'та║','x':'тан','y':'та╜','z':'та╡',
  '1':'таВ','2':'таЖ','3':'таТ','4':'та▓','5':'тав','6':'таЦ','7':'та╢','8':'таж','9':'таФ','0':'та┤',
  ',':'таВ',';':'таЖ',':':'таТ','.':'та▓','!':'таж','?':'таж','\'':'таД','"':'таР','-':'тад','(':'та╖',')':'та╛',
  ' ':' ','\n':'\n','\t':'\t'
};

// Number sign + letters a-j (lowercase) for digits
const NUM_PREFIX = 'та╝';
const NUM_MAP = { '1':'таБ','2':'таГ','3':'таЙ','4':'таЩ','5':'таС','6':'таЛ','7':'таЫ','8':'таУ','9':'таК','0':'таЪ' };
const NUM_MAP_BACK = { 'таБ':'1','таГ':'2','таЙ':'3','таЩ':'4','таС':'5','таЛ':'6','таЫ':'7','таУ':'8','таК':'9','таЪ':'0' };

// Capital sign + letter
const CAP_PREFIX = 'таа';

// Grade 2 common contractions (whole-word or part-word)
const GRADE2 = {
  // whole-word
  'and':'тап','for':'та┐','of':'та╖','the':'тао','with':'та╛',
  'but':'та╣','can':'та▒','do':'таЩ','every':'та║','from':'тал','go':'таЫ','have':'таз','just':'та╡',
  'knowledge':'табта║','like':'таЗ','more':'таН','not':'таЭ','people':'таП','quite':'таЯ','rather':'таЧ','so':'таО',
  'that':'та╣','us':'тае','very':'таз','it':'тан','you':'та╜','as':'таБ','this':'та╣','which':'та▒','will':'та║','his':'таУ','in':'таФ',
  // part-word (apply within word)
  'ch':'таб','gh':'таг','sh':'тай','th':'та╣','wh':'та▒','ed':'тал','er':'таЧ','ou':'та│','ow':'та║','st':'таО'
};

// Reverse map Braille -> letter
const B2T = {};
for (const [k,v] of Object.entries(T2B)) B2T[v] = k;

const { $, copyText, t } = GZ;

function textToBraille(text, useGrade2) {
  let out = '';
  let i = 0;
  while (i < text.length) {
    const ch = text[i];
    const lower = ch.toLowerCase();
    // Check for uppercase
    if (ch >= 'A' && ch <= 'Z') {
      out += CAP_PREFIX + T2B[lower];
      i++;
      continue;
    }
    // Check for digit
    if (ch >= '0' && ch <= '9') {
      out += NUM_PREFIX + NUM_MAP[ch];
      i++;
      continue;
    }
    // Check for grade 2 contraction (whole-word)
    if (useGrade2 && /[a-z]/.test(lower)) {
      // try whole-word match
      let matched = false;
      for (const word of Object.keys(GRADE2).filter(k => k.length > 2)) {
        if (lower.startsWith(word) && (i + word.length === text.length || !/[a-z]/.test(text[i + word.length].toLowerCase()))) {
          out += GRADE2[word];
          i += word.length;
          matched = true;
          break;
        }
      }
      if (matched) continue;
      // try part-word within token
      let token = '';
      let j = i;
      while (j < text.length && /[a-zA-Z]/.test(text[j])) { token += text[j].toLowerCase(); j++; }
      let t2 = '';
      let k = 0;
      while (k < token.length) {
        let found = false;
        for (const pw of Object.keys(GRADE2).filter(k => k.length <= 2)) {
          if (token.substr(k, pw.length) === pw) {
            t2 += GRADE2[pw];
            k += pw.length;
            found = true;
            break;
          }
        }
        if (!found) { t2 += T2B[token[k]] || token[k]; k++; }
      }
      out += t2;
      i = j;
      continue;
    }
    out += T2B[ch] !== undefined ? T2B[ch] : ch;
    i++;
  }
  return out;
}

function brailleToText(text) {
  let out = '';
  let mode = 'letter'; // 'letter' | 'number' | 'capital'
  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    if (ch === ' ' || ch === '\n' || ch === '\t') { out += ch; mode='letter'; continue; }
    if (ch === NUM_PREFIX) { mode = 'number'; continue; }
    if (ch === CAP_PREFIX) { mode = 'capital'; continue; }
    if (mode === 'number' && NUM_MAP_BACK[ch]) { out += NUM_MAP_BACK[ch]; continue; }
    if (B2T[ch]) {
      let l = B2T[ch];
      if (mode === 'capital') l = l.toUpperCase();
      out += l;
    } else {
      out += ch;
    }
    mode = 'letter';
  }
  return out;
}

function update() {
  const mode = document.querySelector('input[name=mode]:checked').value;
  const inp = $('#input').value;
  if (!inp) { $('#output').textContent = ''; return; }
  if (mode === 't2b') $('#output').textContent = textToBraille(inp, false);
  else if (mode === 'grade2') $('#output').textContent = textToBraille(inp, true);
  else $('#output').textContent = brailleToText(inp);
}

function loadExample() {
  $('#input').value = 'Hello, World! 2026';
  document.querySelector('input[name=mode][value=t2b]').checked = true;
  update();
}

function doClear() { $('#input').value = ''; $('#output').textContent = ''; }
