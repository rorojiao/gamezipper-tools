<style>
.preview-tabs{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.preview-tab{background:var(--glass2);border:1px solid var(--border);color:var(--text2);padding:6px 14px;border-radius:8px;cursor:pointer;font-size:.85rem;font-weight:600;transition:all .15s}
.preview-tab.active{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border-color:transparent}

.yt-thumb{aspect-ratio:16/9;background:linear-gradient(135deg,#1a1a1a,#2a2a2a);position:relative;display:flex;align-items:center;justify-content:center;color:#666;font-size:.9rem}
.yt-thumb::after{content:'▶';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:3rem;color:rgba(255,255,255,.8);text-shadow:0 0 20px rgba(0,0,0,.5)}
.yt-info{padding:12px;display:flex;gap:12px}
.yt-avatar{width:36px;height:36px;background:linear-gradient(135deg,#ff0000,#cc0000);border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:.8rem}
.yt-meta{flex:1;min-width:0}
.yt-title{color:#fff;font-size:.95rem;font-weight:600;line-height:1.3;margin-bottom:4px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;word-break:break-word}
.yt-channel{color:#aaa;font-size:.8rem;margin-bottom:2px}
.yt-stats{color:#aaa;font-size:.78rem}
.yt-desc-preview{background:#181818;border:1px solid var(--border);border-radius:0 0 12px 12px;padding:12px;display:flex;gap:8px;border-top:1px solid rgba(255,255,255,.05)}
.yt-desc-thumb{width:168px;height:94px;background:linear-gradient(135deg,#1a1a1a,#2a2a2a);border-radius:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#666;font-size:.7rem}
.yt-desc-body{flex:1;min-width:0;font-size:.85rem;line-height:1.45;color:#fff}
.yt-desc-body strong{color:#fff}
.yt-desc-body .desc-preview-text{white-space:pre-wrap;word-break:break-word}
.yt-desc-body .more{color:#aaa;font-weight:600;margin-left:4px}
.yt-mobile{background:#0f0f0f;border:1px solid var(--border);border-radius:24px;padding:0;overflow:hidden;margin:0 auto;max-width:340px}
.yt-mobile-thumb{aspect-ratio:16/9;background:linear-gradient(135deg,#1a1a1a,#2a2a2a);position:relative}
.yt-mobile-thumb::after{content:'▶';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:2.4rem;color:rgba(255,255,255,.8);text-shadow:0 0 12px rgba(0,0,0,.5)}
.yt-mobile-info{padding:10px 12px}
.yt-mobile-title{color:#fff;font-size:.85rem;font-weight:600;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;word-break:break-word;margin-bottom:4px}
.yt-mobile-channel{color:#aaa;font-size:.72rem}

.yt-mobile-desc{color:#fff;font-size:.72rem;line-height:1.4;margin-top:6px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;word-break:break-word}
.yt-mobile-card{padding:8px}
.stat-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:14px}
.stat-card{background:var(--glass2);border:1px solid var(--border);border-radius:10px;padding:10px 12px;text-align:center}
.stat-card .num{font-size:1.3rem;font-weight:700;color:var(--accent);font-variant-numeric:tabular-nums}
.stat-card .lbl{font-size:.7rem;color:var(--text2);margin-top:2px}
.stat-card.warn .num{color:#ffd93d}
.stat-card.bad .num{color:#e94560}
.stat-card.good .num{color:#00d672}
label{display:block;font-size:.75rem;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;font-weight:600;margin-bottom:6px}
input[type=text],textarea{width:100%;background:rgba(0,0,0,.3);border:1px solid var(--border);border-radius:8px;padding:10px;color:var(--text);font-family:inherit;font-size:.9rem;line-height:1.5;resize:vertical}
input[type=text]:focus,textarea:focus{outline:none;border-color:var(--accent)}
input[type=text]{margin-bottom:12px}
#descField{min-height:140px}
</style>

<body>
<div class="gz-container">
<div class="gz-tool-header">
<h1 id="title"></h1>

<textarea id="descField" maxlength="5000">🎬 In this tutorial, learn professional YouTube video editing techniques used by top creators.

<script>
GZI18n.register({
en:{
toolTitle:'YouTube Title & Description Length Checker',
toolDesc:'Preview your YouTube video title and description in search, suggested videos and mobile — with character counts and SEO scoring.',
lblTitle:'Video Title', lblChannel:'Channel Name', lblDesc:'Video Description',
tabDesktop:'🖥️ Desktop', tabMobile:'📱 Mobile',
copyTitle:'Copy Title', copyDesc:'Copy Description',
statTitleLen:'Title Length', statTitlePx:'Title Width (est)', statDescLen:'Description Length', statDescPx:'Description Above Fold',
step1:'Type or paste your YouTube video title in the Title field',
step2:'Add your channel name and a full description',
step3:'See live character counts, width estimates and previews',
step4:'Switch between desktop and mobile to check truncation',
},
zh:{
toolTitle:'YouTube 标题/描述长度检查器',
toolDesc:'预览 YouTube 视频标题和描述在搜索、推荐视频和移动端的显示效果，含字符计数和 SEO 评分。',
lblTitle:'视频标题', lblChannel:'频道名称', lblDesc:'视频描述',
tabDesktop:'🖥️ 桌面', tabMobile:'📱 移动',
copyTitle:'复制标题', copyDesc:'复制描述',
statTitleLen:'标题长度', statTitlePx:'标题宽度（估）', statDescLen:'描述长度', statDescPx:'折叠上方描述',
step1:'在标题栏输入或粘贴你的 YouTube 视频标题',
step2:'填写频道名称和完整描述',
step3:'查看实时字符数、宽度估计和预览',
step4:'切换桌面和移动端检查截断情况',
}
});

const { $, copyText, t } = GZ;
let previewMode = 'desktop';

function estimateWidth(str) {
// Rough: 0.6 em per char for Latin, 1.2 em for CJK
let w = 0;
for (const c of str) {
const code = c.codePointAt(0);
if (code >= 0x3000 && code <= 0x9fff) w += 1.2;
else if (code >= 0xff00 && code <= 0xffef) w += 0.85;
else w += 0.55;
}
return Math.round(w * 14 * 10) / 10; // px at 14px font
}

function update() {
const title = $('#titleField').value;
const channel = $('#channelField').value;
const desc = $('#descField').value;
const titleLen = [...title].length;
const descLen = [...desc].length;
const titleWidth = estimateWidth(title);
const descWidth = estimateWidth(desc);

let titleClass = 'good', titleMsg = 'Optimal';
if (titleLen > 70) { titleClass = 'bad'; titleMsg = 'Too long (truncated)'; }
else if (titleLen < 30) { titleClass = 'warn'; titleMsg = 'Too short (low SEO)'; }
else if (titleLen > 60) { titleClass = 'warn'; titleMsg = 'Slightly long'; }

let descClass = 'good';
if (descLen < 100) { descClass = 'warn'; descMsg = 'Add more keywords'; }
else if (descLen < 200) { descClass = 'warn'; descMsg = 'Add details'; }
else { descClass = 'good'; descMsg = 'Good length'; }

$('#stats').innerHTML = `
<div class="stat-card ${titleClass}"><div class="num">${titleLen}/100</div><div class="lbl">${t('statTitleLen')} · ${titleMsg}</div></div>
<div class="stat-card ${titleLen > 70 ? 'bad' : 'good'}"><div class="num">~${titleWidth}px</div><div class="lbl">${t('statTitlePx')}</div></div>
<div class="stat-card ${descClass}"><div class="num">${descLen}/5000</div><div class="lbl">${t('statDescLen')} · ${descMsg}</div></div>
<div class="stat-card ${descLen < 150 ? 'warn' : 'good'}"><div class="num">~${Math.min(160, descWidth)}px</div><div class="lbl">${t('statDescPx')}</div></div>`;

if (previewMode === 'desktop') {
$('#previewArea').innerHTML = `
<div class="yt-preview">
<div class="yt-thumb">16:9 Thumbnail</div>
<div class="yt-info">
<div class="yt-avatar">${(channel[0] || 'G').toUpperCase()}</div>
<div class="yt-meta">
<div class="yt-title">${escapeHtml(title)}</div>
<div class="yt-channel">${escapeHtml(channel)}</div>
<div class="yt-stats">12K views · 2 days ago</div>
</div>
</div>
</div>
<div class="yt-desc-preview">
<div class="yt-desc-thumb">Thumbnail</div>
<div class="yt-desc-body">
<strong>${escapeHtml(channel)}</strong>
<span class="desc-preview-text">${escapeHtml(desc.slice(0, 200))}${desc.length > 200 ? '<span class="more">...more</span>' : ''}</span>
</div>
</div>`;
} else {
$('#previewArea').innerHTML = `
<div class="yt-mobile">
<div class="yt-mobile-thumb"></div>
<div class="yt-mobile-card">
<div class="yt-mobile-title">${escapeHtml(title)}</div>
<div class="yt-mobile-channel">${escapeHtml(channel)}</div>
<div class="yt-mobile-stats">12K views · 2 days ago</div>
<div class="yt-mobile-desc">${escapeHtml(desc)}</div>
</div>
</div>`;
}
}

function escapeHtml(s) {
return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

$('#previewTabs').innerHTML = `
<button class="preview-tab ${previewMode === 'desktop' ? 'active' : ''}" data-mode="desktop">${t('tabDesktop')}</button>
<button class="preview-tab ${previewMode === 'mobile' ? 'active' : ''}" data-mode="mobile">${t('tabMobile')}</button>`;
$('#previewTabs').querySelectorAll('.preview-tab').forEach(btn => {
btn.addEventListener('click', () => {
previewMode = btn.dataset.mode;
$('#previewTabs').querySelectorAll('.preview-tab').forEach(b => b.classList.remove('active'));
btn.classList.add('active');
update();
});
});

$('#toolbar').innerHTML = `
<button class="gz-btn" onclick="copyText($('#titleField').value)">${t('copyTitle')}</button>
<button class="gz-btn gz-btn-secondary" onclick="copyText($('#descField').value)">${t('copyDesc')}</button>`;

['titleField','channelField','descField'].forEach(id => $('#' + id).addEventListener('input', update));
update();

GZ.renderToolPage({
category: 'text',
titleKey: 'toolTitle',
descKey: 'toolDesc',
howToSteps: ['step1','step2','step3','step4'],
related: [
{icon:'🏷️', href:'/text/youtube-tag-generator.html', name:'YouTube Tags'},
{icon:'📏', href:'/seo/title-meta-length-checker.html', name:'Meta Length'},
{icon:'👁️', href:'/seo/serp-preview.html', name:'SERP Preview'},
{icon:'🔍', href:'/seo/keyword-density.html', name:'Keyword Density'},
]
});
</script>
<script>new Image().src="https://site-analytics.gamezipper.com/hit?s=tools.gamezipper.com&p="+encodeURIComponent(location.pathname);</script>
<script src="/tools-result-rec.js" defer></script>
</body>
