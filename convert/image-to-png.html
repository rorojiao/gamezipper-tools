<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>

  </div>

      <input type="file" accept="image/*" id="fileInput" multiple style="display:none">
    </div>
    <div style="margin:10px 0;display:flex;gap:8px" id="actions" style="display:none">
      <button class="gz-btn" id="downloadAll" style="display:none" onclick="downloadAllFiles()"></button>

<script>
GZI18n.register({
  en: {
    toolTitle: 'Image to PNG Converter',
    toolDesc: 'Convert JPG, WebP, BMP, GIF, SVG and more to PNG format instantly. Drag, drop and download — free, private, all in your browser.',
    step1: 'Drag and drop image files onto the page',
    step2: 'Images are automatically converted to PNG format',
    step3: 'Preview the converted images',
    step4: 'Click Download on each image or Download All',
    dropHere: 'Drop images here or click to browse',
    downloadAll: 'Download All',
    clearAll: 'Clear All',
    download: 'Download',
    convertedSize: 'PNG size',
  },
  zh: {
    toolTitle: '图片转 PNG 转换器',
    toolDesc: '将 JPG、WebP、BMP、GIF、SVG 等格式即时转换为 PNG。拖放上传、一键下载 — 免费、私密、完全浏览器本地处理。',
    step1: '拖放图片文件到页面上',
    step2: '图片会自动转换为 PNG 格式',
    step3: '预览转换后的图片',
    step4: '点击每张图片的「下载」或「下载全部」',
    dropHere: '拖放图片到这里，或点击选择文件',
    downloadAll: '下载全部',
    clearAll: '清除全部',
    download: '下载',
    convertedSize: 'PNG 大小',
  }
});

const { $, t } = GZ;
let convertedFiles = [];

const dz = $('#dropZone');
const fi = $('#fileInput');
dz.addEventListener('click', () => fi.click());
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('dragover'); });
dz.addEventListener('dragleave', () => dz.classList.remove('dragover'));
dz.addEventListener('drop', e => { e.preventDefault(); dz.classList.remove('dragover'); handleFiles(e.dataTransfer.files); });
fi.addEventListener('change', () => handleFiles(fi.files));

$('#dropText').textContent = t('dropHere');
$('#downloadAll').textContent = t('downloadAll');
$('#clearAll').textContent = t('clearAll');

function handleFiles(files) {
  Array.from(files).forEach(file => {
    if (!file.type.startsWith('image/')) return;
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      const canvas = document.createElement('canvas');
      canvas.width = img.naturalWidth;
      canvas.height = img.naturalHeight;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0);
      canvas.toBlob(blob => {
        const pngUrl = URL.createObjectURL(blob);
        const sizeKB = (blob.size / 1024).toFixed(1);
        const name = file.name.replace(/\.[^.]+$/, '') + '.png';
        convertedFiles.push({ name, url: pngUrl, blob });
        renderCard(name, pngUrl, sizeKB, convertedFiles.length - 1);
        updateButtons();
        URL.revokeObjectURL(url);
      }, 'image/png');
    };
    img.src = url;
  });
}

function renderCard(name, url, sizeKB, index) {
  const card = document.createElement('div');
  card.className = 'preview-card';
  card.innerHTML = `<img src="${url}" alt="${name}"><div class="name">${name}</div><div class="size">${t('convertedSize')}: ${sizeKB} KB</div><button class="gz-btn" style="margin-top:6px;font-size:.85em" onclick="downloadFile(${index})">${t('download')}</button>`;
  $('#previewGrid').appendChild(card);
}

function downloadFile(i) {
  const a = document.createElement('a');
  a.href = convertedFiles[i].url;
  a.download = convertedFiles[i].name;
  a.click();
}

function downloadAllFiles() {
  convertedFiles.forEach((f, i) => setTimeout(() => downloadFile(i), i * 300));
}

function clearFiles() {
  convertedFiles.forEach(f => URL.revokeObjectURL(f.url));
  convertedFiles = [];
  $('#previewGrid').innerHTML = '';
  fi.value = '';
  updateButtons();
}

function updateButtons() {
  const show = convertedFiles.length > 0;
  $('#downloadAll').style.display = show ? 'inline-block' : 'none';
  $('#clearAll').style.display = show ? 'inline-block' : 'none';
}

GZ.renderToolPage({
  category: 'convert',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🖼️', href:'/convert/png-to-jpg.html', name:'PNG to JPG'},
    {icon:'🖼️', href:'/convert/webp-converter.html', name:'WebP Converter'},
    {icon:'🔄', href:'/image/converter.html', name:'Image Converter'},
    {icon:'📦', href:'/image/compressor.html', name:'Image Compressor'},
  ]
});
</script>
