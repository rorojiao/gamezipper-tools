<script>
GZI18n.register({
  en: {
    toolTitle: 'Markdown Table Generator',
    toolDesc: 'Create Markdown tables visually with a spreadsheet-like editor. Set alignment, add or remove rows and columns, and copy the result.',

  },
  zh: {
    toolTitle: 'Markdown 表格生成器',
    toolDesc: '使用类似电子表格的可视化编辑器创建 Markdown 表格。设置对齐方式、增删行列，一键复制。',
    rows: '行数',
    cols: '列数',
    markdown: 'Markdown 输出',
    addRow: '+ 行',
    addCol: '+ 列',
    delRow: '- 行',
    delCol: '- 列',
    copy: '复制 Markdown',
    clear: '清空',
    import: '导入',
    importLabel: '粘贴 Markdown 表格以导入',
    step1: '设置表格的行数和列数',
    step2: '点击每个单元格输入数据',
    step3: '使用对齐按钮设置列对齐方式',
    step4: '点击「复制 Markdown」将结果复制到剪贴板',
  }
});

const { $, copyText, t } = GZ;
let data = [];
let aligns = [];
let numRows = 4, numCols = 3;

function initData(r, c) {
  const oldData = data;
  const oldAligns = aligns;
  data = [];
  aligns = [];
  for (let j = 0; j < c; j++) {
    aligns.push(oldAligns[j] || 'left');
  }
  for (let i = 0; i < r; i++) {
    const row = [];
    for (let j = 0; j < c; j++) {
      row.push((oldData[i] && oldData[i][j]) || '');
    }
    data.push(row);
  }
  numRows = r;
  numCols = c;
}

function renderTable() {
  const c = $('#tableContainer');
  let html = '<table class="table-editor"><thead><tr><th style="width:30px"></th>';
  // Header row (first data row)
  for (let j = 0; j < numCols; j++) {
    html += `<th><input data-r="0" data-c="${j}" value="${esc(data[0]?data[0][j]:'')}" oninput="updateCell(this)"></th>`;
  }
  html += '</tr><tr><th></th>';
  // Alignment row
  for (let j = 0; j < numCols; j++) {
    const a = aligns[j] || 'left';
    html += `<th><div class="align-btns">
      <button class="${a==='left'?'active':''}" onclick="setAlign(${j},'left',this)">◀</button>
      <button class="${a==='center'?'active':''}" onclick="setAlign(${j},'center',this)">◆</button>
      <button class="${a==='right'?'active':''}" onclick="setAlign(${j},'right',this)">▶</button>
    </div></th>`;
  }
  html += '</tr></thead><tbody>';
  for (let i = 1; i < numRows; i++) {
    html += `<tr><td style="text-align:center;font-size:.75em;color:var(--text3)">${i+1}</td>`;
    for (let j = 0; j < numCols; j++) {
      html += `<td><input data-r="${i}" data-c="${j}" value="${esc(data[i]?data[i][j]:'')}" oninput="updateCell(this)"></td>`;
    }
    html += '</tr>';
  }
  html += '</tbody></table>';
  c.innerHTML = html;
  generateMarkdown();
}

function esc(s) { return String(s).replace(/"/g, '&quot;').replace(/</g, '&lt;'); }

function updateCell(el) {
  const r = +el.dataset.r, c = +el.dataset.c;
  if (!data[r]) data[r] = [];
  data[r][c] = el.value;
  generateMarkdown();
}

function setAlign(col, alignment, btn) {
  aligns[col] = alignment;
  renderTable();
}

function generateMarkdown() {
  if (!data.length) { $('#output').textContent = ''; return; }
  const colWidths = [];
  for (let j = 0; j < numCols; j++) {
    let maxW = 3;
    for (let i = 0; i < numRows; i++) {
      const val = (data[i] && data[i][j]) || '';
      maxW = Math.max(maxW, val.length);
    }
    colWidths.push(maxW + 2);
  }

  function pad(val, align, width) {
    val = val || '';
    const pad = width - val.length;
    if (align === 'center') {
      const left = Math.floor(pad / 2), right = pad - left;
      return ' '.repeat(left) + val + ' '.repeat(right);
    } else if (align === 'right') {
      return ' '.repeat(pad) + val;
    }
    return val + ' '.repeat(pad);
  }

  function sep(col, width) {
    if (aligns[col] === 'center') return ':' + '-'.repeat(width - 2) + ':';
    if (aligns[col] === 'right') return '-'.repeat(width - 1) + ':';
    return '-'.repeat(width);
  }

  let md = '';
  // Header
  md += '| ' + data[0].map((v,j) => pad(v, 'left', colWidths[j])).join(' | ') + ' |\n';
  // Separator
  md += '| ' + colWidths.map((w,j) => sep(j, w)).join(' | ') + ' |\n';
  // Body
  for (let i = 1; i < numRows; i++) {
    md += '| ' + (data[i]||[]).map((v,j) => pad(v, 'left', colWidths[j])).join(' | ') + ' |\n';
  }
  $('#output').textContent = md.trim();
}

function rebuild() {
  const r = Math.max(1, Math.min(50, +$('#rows').value || 1));
  const c = Math.max(1, Math.min(20, +$('#cols').value || 1));
  initData(r, c);
  renderTable();
}

function addRow() {
  numRows++;
  data.push(new Array(numCols).fill(''));
  $('#rows').value = numRows;
  renderTable();
}

function delRow() {
  if (numRows <= 1) return;
  numRows--;
  data.pop();
  $('#rows').value = numRows;
  renderTable();
}

function addCol() {
  numCols++;
  aligns.push('left');
  data.forEach(row => row.push(''));
  $('#cols').value = numCols;
  renderTable();
}

function delCol() {
  if (numCols <= 1) return;
  numCols--;
  aligns.pop();
  data.forEach(row => row.pop());
  $('#cols').value = numCols;
  renderTable();
}

function doClear() {
  data = [];
  aligns = [];
  initData(4, 3);
  $('#rows').value = 4;
  $('#cols').value = 3;
  renderTable();
}

initData(4, 3);
// Pre-fill with example data
data[0] = ['Name','Type','Description'];
data[1] = ['GameZipper','Platform','Free online tools'];
data[2] = ['JSON Formatter','Dev Tool','Format JSON data'];
data[3] = ['Color Picker','Design','Pick any color'];

renderTable();

$('#rows').addEventListener('change', rebuild);
$('#cols').addEventListener('change', rebuild);

$('#toolbar').innerHTML = `
  <button class="gz-btn gz-btn-secondary" onclick="addRow()">${t('addRow')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="delRow()">${t('delRow')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="addCol()">${t('addCol')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="delCol()">${t('delCol')}</button>
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

$('#lbl-rows').textContent = t('rows');
$('#lbl-cols').textContent = t('cols');
$('#lbl-out').textContent = t('markdown');

    {icon:'📄', href:'/text/markdown-to-html.html', name:'Markdown to HTML'},
    {icon:'📑', href:'/text/html-to-markdown.html', name:'HTML to Markdown'},
    {icon:'📊', href:'/css-tools/table-generator.html', name:'HTML Table'},
  ]
});
</script>
