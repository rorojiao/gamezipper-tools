<script>

  zh: {

    toolDesc: '在英文单词的单数和复数之间转换。支持规则变化、不规则名词、不可数名词和拉丁/希腊词尾。',
    toPlural: '转复数',
    toSingular: '转单数',
    ph: '每行输入一个单词（例如 cat、city、box、child）',
    step1: '选择方向 — 转复数 或 转单数',
    step2: '每行输入一个单词（或粘贴词表）',
    step3: '转换结果会即时显示在下方',
    step4: '点击「复制」复制全部结果',
    noChange: '（无变化 — 可能是不可数名词或已是正确形式）',
    example: '加载示例',
  }
});

const { $, copyText, t } = GZ;

const IRREGULAR = {
  // singular -> plural
  child:'children', person:'people', man:'men', woman:'women', mouse:'mice', goose:'geese',
  foot:'feet', tooth:'teeth', ox:'oxen', fungus:'fungi', cactus:'cacti', nucleus:'nuclei',
  syllabus:'syllabi', radius:'radii', octopus:'octopuses', hippopotamus:'hippopotamuses',
  phenomenon:'phenomena', criterion:'criteria', datum:'data', medium:'media', bacterium:'bacteria',
  analysis:'analyses', crisis:'crises', thesis:'theses', diagnosis:'diagnoses', basis:'bases',
  matrix:'matrices', index:'indices', appendix:'appendices', vertex:'vertices', axis:'axes',
  life:'lives', wife:'wives', knife:'knives', leaf:'leaves', thief:'thieves', wolf:'wolves',
  calf:'calves', half:'halves', loaf:'loaves', shelf:'shelves', elf:'elves', self:'selves',
  potato:'potatoes', tomato:'tomatoes', hero:'heroes', echo:'echoes', veto:'vetoes', buffalo:'buffaloes',
  volcano:'volcanoes', torpedo:'torpedoes', mosquito:'mosquitoes',
  sheep:'sheep', deer:'deer', fish:'fish', species:'species', series:'series', aircraft:'aircraft',
  moose:'moose', salmon:'salmon', trout:'trout', swine:'swine', offspring:'offspring',
  ox:'oxen', die:'dice', penny:'pence', louse:'lice',
};
const UNCOUNTABLE = new Set(['water','information','advice','news','furniture','luggage','baggage','equipment','rice','money','music','weather','knowledge','research','traffic','homework','housework','bread','milk','tea','sugar','salt','sand','hair','fruit','mathematics','physics','economics','politics','athletics','measles','news','chaos','software','hardware','garbage','cash','mail','scenery','electricity','coal','grass','justice','honesty','bravery','courage','laughter','poetry','prose','vocabulary','grammar','slang','vocabulary','evidence','proof']);

let mode = 'plural';

// Reverse map for plural -> singular
const REVERSE = {};
for (const [s, p] of Object.entries(IRREGULAR)) REVERSE[p.toLowerCase()] = s;

function toPlural(word) {
  const lower = word.toLowerCase();
  if (UNCOUNTABLE.has(lower)) return word;
  if (IRREGULAR[lower]) return matchCase(word, IRREGULAR[lower]);
  if (lower.endsWith('y') && !/[aeiou]y$/.test(lower)) return word.slice(0, -1) + 'ies';
  if (/(s|x|z|ch|sh)$/.test(lower)) return word + 'es';
  if (/[^aeiou]is$/.test(lower)) return word.slice(0, -2) + 'es';
  if (lower.endsWith('us') && /^(alumn|cac|fung|nucle|rac|syllab|corpus|genus|status|apparatus|hiatus|octopus|platypus|campus|virus)$/.test(lower.slice(0,-2))) {
    // keep simple: only a few classic ones -> 'i'
    if (/^(alumn|cac|fung|nucle|rac|syllab)$/.test(lower.slice(0,-2))) return word.slice(0, -2) + 'i';
  }
  if (lower.endsWith('um') && /^(bacteri|medi|dat|curricul|memorand|millenni|symposi)$/.test(lower.slice(0,-2))) return word.slice(0, -2) + 'a';
  if (lower.endsWith('on') && /^(criteri|phenomen)$/.test(lower.slice(0,-2))) return word.slice(0, -2) + 'a';
  if (/[^aeiou]fe?$/.test(lower) && !/(ss|ff|chief|belief|proof|safe|caffeine|chef)$/.test(lower)) {
    // f/fe -> ves (rough heuristic)
    if (lower.endsWith('fe')) return word.slice(0, -2) + 'ves';
    if (lower.endsWith('f') && !/(roof|belief|chief|brief|proof|gulf|chief)$/.test(lower)) return word.slice(0, -1) + 'ves';
  }
  if (lower.endsWith('o') && /^(potato|tomato|hero|echo|veto|torpedo|mosquito|buffalo|volcano)$/.test(lower)) return word + 'es';
  return word + 's';
}

function toSingular(word) {
  const lower = word.toLowerCase();
  if (UNCOUNTABLE.has(lower)) return word;
  if (REVERSE[lower]) return matchCase(word, REVERSE[lower]);
  if (lower.endsWith('ies') && lower.length > 4) return word.slice(0, -3) + 'y';
  if (lower.endsWith('es') && /(ses|xes|zes|ches|shes|oes)$/.test(lower)) return word.slice(0, -2);
  if (lower.endsWith('ves')) {
    // try f or fe
    if (lower.length > 4) return word.slice(0, -3) + 'f';
  }
  if (lower.endsWith('i') && /^(alumn|fung|nucle|radi|syllab|cact|nuclei)$/.test(lower.slice(0,-1))) return word.slice(0, -1) + 'us';
  if (lower.endsWith('a') && /^(bacteri|medi|dat|curricul|criteri|phenomen)$/.test(lower.slice(0,-1))) return word.slice(0, -1) + 'um';
  if (lower.endsWith('ae') && /^(antenn|formul|nebula|vertebr|alumna)$/.test(lower.slice(0,-2))) return word.slice(0, -1);
  if (lower.endsWith('s') && lower.length > 1 && !lower.endsWith('ss')) return word.slice(0, -1);
  return word;
}

function matchCase(src, dst) {
  if (src === src.toUpperCase()) return dst.toUpperCase();
  if (src[0] === src[0].toUpperCase()) return dst[0].toUpperCase() + dst.slice(1);
  return dst;
}

function recalc() {
  const text = $('#input').value;
  if (!text.trim()) { $('#output').textContent = ''; $('#status').textContent = ''; return; }
  const lines = text.split(/\n/).filter(l => l.trim() !== '' || true);
  const out = text.split(/\n/).map(line => {
    const w = line.trim();
    if (!w) return '';
    const conv = mode === 'plural' ? toPlural(w) : toSingular(w);
    return conv;
  }).join('\n');
  $('#output').textContent = out;
  $('#status').textContent = '';
}

function setMode(m) {
  mode = m;
  $('#mode-plural').className = 'gz-btn' + (m === 'plural' ? '' : ' gz-btn-secondary');
  $('#mode-singular').className = 'gz-btn' + (m === 'singular' ? '' : ' gz-btn-secondary');
  recalc();
}

function loadExample() {
  $('#input').value = 'cat\ncity\nbox\nchild\nleaf\nanalysis\npotato\nwoman\ntooth\nbus';
  recalc();
}

$('#input').placeholder = t('ph');
$('#input').addEventListener('input', recalc);
$('#mode-plural').textContent = t('toPlural');
$('#mode-singular').textContent = t('toSingular');

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="GZ.copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#input').value='';recalc()">${t('clear')}</button>`;

$('#lbl-out').textContent = t('output');

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',

    {icon:'🔁', href:'/text/text-repeater.html', name:'Text Repeater'},
  ]
});
recalc();
</script>
