GZI18n.register({

    step4: '使用渐变条预览两种颜色之间的完整过渡',
  }
});

const { $, copyText, t } = GZ;

// HEX parsing/formatting
function normalizeHex(v) {
  if (!v) return '#000000';
  v = v.trim();
  if (!v.startsWith('#')) v = '#' + v;
  if (/^#[0-9a-fA-F]{3}$/.test(v)) {
    v = '#' + v[1] + v[1] + v[2] + v[2] + v[3] + v[3];
  }
  if (!/^#[0-9a-fA-F]{6}$/.test(v)) return null;
  return v.toUpperCase();
}
function hexToRgb(hex) {
  hex = hex.replace('#', '');
  return { r: parseInt(hex.slice(0,2),16), g: parseInt(hex.slice(2,4),16), b: parseInt(hex.slice(4,6),16) };
}
function rgbToHex({r,g,b}) {
  const h = n => Math.round(n).toString(16).padStart(2,'0');
  return '#' + (h(r) + h(g) + h(b)).toUpperCase();
}
// sRGB → linear → sRGB (gamma 2.2 approx)
function srgbToLinear(c) { const v = c/255; return v <= 0.04045 ? v/12.92 : Math.pow((v+0.055)/1.055, 2.4); }
function linearToSrgb(v) { const c = v <= 0.0031308 ? v*12.92 : 1.055*Math.pow(v, 1/2.4) - 0.055; return Math.max(0, Math.min(255, Math.round(c*255))); }
function mixLinear(a, b, w) {
  // w=0 → pure A, w=1 → pure B
  const la = srgbToLinear(a.r), lb = srgbToLinear(b.r);
  const lg = srgbToLinear(a.g), lgg = srgbToLinear(b.g);
  const lb2 = srgbToLinear(a.b), lbb = srgbToLinear(b.b);
  return { r: linearToSrgb(la*(1-w) + lb*w), g: linearToSrgb(lg*(1-w) + lgg*w), b: linearToSrgb(lb2*(1-w) + lbb*w) };
}
function rgbToHsl({r,g,b}) {
  r/=255; g/=255; b/=255;
  const max = Math.max(r,g,b), min = Math.min(r,g,b);
  let h, s, l = (max+min)/2;
  if (max===min) { h=s=0; }
  else {
    const d = max-min;
    s = l > 0.5 ? d/(2-max-min) : d/(max+min);
    switch(max) {
      case r: h = (g-b)/d + (g<b?6:0); break;
      case g: h = (b-r)/d + 2; break;
      case b: h = (r-g)/d + 4; break;
    }
    h /= 6;
  }
  return { h: Math.round(h*360), s: Math.round(s*100), l: Math.round(l*100) };
}
function formatRgb({r,g,b}) { return `rgb(${r},${g},${b})`; }
function formatHsl({h,s,l}) { return `hsl(${h},${s}%,${l}%)`; }

function update() {
  const h1 = normalizeHex($('#c1-hex').value) || '#000000';
  const h2 = normalizeHex($('#c2-hex').value) || '#FFFFFF';
  $('#c1').value = h1;
  $('#c2').value = h2;
  const w = parseInt($('#weight').value)/100;
  $('#weight-val').textContent = Math.round(w*100) + '%';
  const a = hexToRgb(h1), b = hexToRgb(h2);
  const m = mixLinear(a, b, w);
  const mixedHex = rgbToHex(m);
  $('#r-swatch').style.background = mixedHex;
  $('#r-hex').textContent = mixedHex;
  $('#r-meta').textContent = formatRgb(m) + ' · ' + formatHsl(rgbToHsl(m));
  // strip
  const strip = $('#strip');
  strip.innerHTML = '';
  for (let i=0;i<=10;i++) {
    const sw = mixLinear(a, b, i/10);
    const d = document.createElement('div');
    d.style.background = rgbToHex(sw);
    d.title = rgbToHex(sw);
    strip.appendChild(d);
  }
}

$('#c1').addEventListener('input', e => { $('#c1-hex').value = e.target.value.toUpperCase(); update(); });
$('#c2').addEventListener('input', e => { $('#c2-hex').value = e.target.value.toUpperCase(); update(); });
$('#c1-hex').addEventListener('input', update);
$('#c2-hex').addEventListener('input', update);
$('#weight').addEventListener('input', update);
$('#btn-swap').onclick = () => {
  const a = $('#c1-hex').value, b = $('#c2-hex').value;
  $('#c1-hex').value = b; $('#c2-hex').value = a;
  update();
};
$('#btn-copy-hex').onclick = () => copyText($('#r-hex').textContent);
$('#btn-copy-rgb').onclick = () => copyText(formatRgb(hexToRgb($('#r-hex').textContent)));
$('#btn-copy-hsl').onclick = () => copyText(formatHsl(rgbToHsl(hexToRgb($('#r-hex').textContent))));

update();
