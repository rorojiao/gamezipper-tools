function lerpLMS(table, age) {
  // age in months, clamped
  if (age <= table[0][0]) return [table[0][1], table[0][2], table[0][3]];
  if (age >= table[table.length-1][0]) return [table[table.length-1][1], table[table.length-1][2], table[table.length-1][3]];
  for (let i = 0; i < table.length-1; i++) {
    const a0 = table[i][0], a1 = table[i+1][0];
    if (age >= a0 && age <= a1) {
      const f = (age - a0) / (a1 - a0);
      return [
        table[i][1] + (table[i+1][1]-table[i][1])*f,
        table[i][2] + (table[i+1][2]-table[i][2])*f,
        table[i][3] + (table[i+1][3]-table[i][3])*f,
      ];
    }
  }
  return [table[0][1], table[0][2], table[0][3]];
}

function zScore(value, L, M, S) {
  if (value <= 0 || M <= 0) return 0;
  if (L === 0) return Math.log(value / M) / S;
  return (Math.pow(value / M, L) - 1) / (L * S);
}

// Standard normal CDF (Abramowitz & Stegun approximation)
function normCDF(z) {
  const t = 1 / (1 + 0.2316419 * Math.abs(z));
  const d = 0.3989423 * Math.exp(-z * z / 2);
  let p = d * t * (0.3193815 + t * (-0.3565638 + t * (1.781478 + t * (-1.821256 + t * 1.330274))));
  if (z > 0) p = 1 - p;
  return p;
}

function pickTable(metric, sex) {
  if (metric === 'weight') return sex === 'boys' ? WFA_BOYS : WFA_GIRLS;
  if (metric === 'length') return sex === 'boys' ? LFA_BOYS : LFA_GIRLS;
  return sex === 'boys' ? HCA_BOYS : HCA_GIRLS;
}

function pctLabel(p) {
  if (p < 0.03) return '< 3rd';
  if (p < 0.05) return '3rd';
  if (p < 0.10) return '5th';
  if (p < 0.25) return '10th';
  if (p < 0.50) return '25th';
  if (p < 0.75) return '50th';
  if (p < 0.90) return '75th';
  if (p < 0.95) return '90th';
  if (p < 0.97) return '95th';
  return '97th';
}

function computePercentile(metric, sex, ageMonths, value) {
  const table = pickTable(metric, sex);
  const [L, M, S] = lerpLMS(table, ageMonths);
  const z = zScore(value, L, M, S);
  const pct = normCDF(z);
  return { z, pct, M, L, S };
}

function calculate() {
  const sex = $('#sex').value;
  let age = parseFloat($('#age').value) || 0;
  const ageunit = $('#ageunit').value;
  if (ageunit === 'years') age = age * 12;
  age = Math.max(0, Math.min(60, age));

  const weight = parseFloat($('#weight').value) || 0;
  const length = parseFloat($('#length').value) || 0;
  const head = parseFloat($('#head').value) || 0;

  const cards = [];
  if (weight > 0) {
    const r = computePercentile('weight', sex, age, weight);
    cards.push({ title: t('weightCard'), pct: r.pct, z: r.z });
  }
  if (length > 0) {
    const r = computePercentile('length', sex, age, length);
    cards.push({ title: t('lengthCard'), pct: r.pct, z: r.z });
  }
  if (head > 0 && age <= 60) {
    const r = computePercentile('head', sex, age, head);
    cards.push({ title: t('headCard'), pct: r.pct, z: r.z });
  }

  if (cards.length === 0) {
    $('#results').innerHTML = '<div class="pcard"><p>Enter at least one measurement.</p></div>';
    return;
  }

  $('#results').innerHTML = cards.map(c => {
    const pctPct = (c.pct * 100);
    const zStr = (c.z >= 0 ? '+' : '') + c.z.toFixed(2);
    return `<div class="pcard">
      <div class="pcard-head"><h3>${c.title}</h3><div class="pcard-pct">${pctLabel(c.pct)}</div></div>
      <div class="pcard-z">${pctPct.toFixed(1)}th percentile · Z = ${zStr}</div>
      <div class="pcard-bar"><div class="pcard-fill" style="width:${Math.max(1, Math.min(100, pctPct))}%"></div></div>
      <div class="pcard-scale"><span>3rd</span><span>15th</span><span>50th</span><span>85th</span><span>97th</span></div>
    </div>`;
  }).join('');
}
