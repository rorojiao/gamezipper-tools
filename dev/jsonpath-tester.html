const { $, copyText, t } = GZ;

const EXAMPLE = {
  "store": {
    "book": [
      { "category": "reference", "author": "Nigel Rees", "title": "Sayings of the Century", "price": 8.95 },
      { "category": "fiction", "author": "Evelyn Waugh", "title": "Sword of Honour", "price": 12.99 },
      { "category": "fiction", "author": "Herman Melville", "title": "Moby Dick", "isbn": "0-553-21311-3", "price": 8.99 },
      { "category": "fiction", "author": "J. R. R. Tolkien", "title": "The Lord of the Rings", "isbn": "0-395-19395-8", "price": 22.99 }
    ],
    "bicycle": { "color": "red", "price": 19.95 }
  }
};

const PRESETS = [
  '$.store.book[*].author',
  '$..author',
  '$.store.*',
  '$.store..price',
  '$..book[2]',
  '$..book[-1]',
  '$..book[0,1]',
  '$..book[:2]',
  '$..book[?(@.isbn)]',
  '$..book[?(@.price<10)]',
  '$..book[?(@.category=="fiction")].title',
  '$..*',
];

// ============================================================
// JSONPath engine (RFC 9535 subset, pure JS)
// ============================================================
function tokenize(expr){
  // strip leading $
  if(expr[0] === '$') expr = expr.slice(1);
  const tokens = [];
  let i = 0;
  const n = expr.length;
  while(i < n){
    const c = expr[i];
    if(c === '.'){
      // could be . or .. (recursive)
      if(expr[i+1] === '.'){ tokens.push({t:'recursive'}); i += 2; }
      else { tokens.push({t:'dot'}); i += 1; }
    } else if(c === '['){
      // parse bracket segment until matching ]
      let depth = 1, j = i+1, str=false, qchar='';
      while(j < n && depth > 0){
        const cj = expr[j];
        if(str){
          if(cj === '\\') { j += 2; continue; }
          if(cj === qchar) str = false;
        } else {
          if(cj === '"' || cj === "'"){ str = true; qchar = cj; }
          else if(cj === '[') depth++;
          else if(cj === ']') depth--;
        }
        if(depth > 0) j++;
      }
      if(depth !== 0) throw new Error('unmatched [');
      const inner = expr.slice(i+1, j);
      tokens.push({ t:'bracket', v: inner });
      i = j+1;
    } else if(c === '*'){
      tokens.push({ t:'wildcard' }); i++;
    } else if(c === ' ' || c === '\t'){
      i++;
    } else {
      // bare name (dot-style without dot, after $) — e.g. $foo
      let j = i;
      while(j < n && !'.[*'.includes(expr[j])) j++;
      tokens.push({ t:'name', v: expr.slice(i, j) });
      i = j;
    }
  }
  return tokens;
}

// parse bracket inner content into a segment descriptor
function parseBracket(inner){
  inner = inner.trim();
  // wildcard
  if(inner === '*') return { kind:'wildcard' };
  // string key: "..." or '...'
  if((inner.startsWith('"') && inner.endsWith('"')) || (inner.startsWith("'") && inner.endsWith("'"))){
    return { kind:'key', v: inner.slice(1,-1).replace(/\\"/g,'"').replace(/\\'/g,"'") };
  }
  // filter: ?(...)
  if(inner.startsWith('?')){
    return { kind:'filter', v: inner.slice(1).trim() };
  }
  // union / list: comma separated
  if(inner.includes(',')){
    const parts = splitTop(inner, ',').map(s => parseSegment(s.trim())).filter(Boolean);
    return { kind:'union', parts };
  }
  // slice: a:b or a:b:c
  if(inner.includes(':')){
    const bits = inner.split(':');
    const nums = bits.map(b => b.trim()===''? null : parseInt(b.trim(),10));
    if(bits.length === 2) return { kind:'slice', start:nums[0], end:nums[1], step:1 };
    if(bits.length === 3) return { kind:'slice', start:nums[0], end:nums[1], step:nums[2]==null?1:nums[2] };
  }
  // numeric index
  if(/^-?\d+$/.test(inner)){
    return { kind:'index', v: parseInt(inner, 10) };
  }
  // bare name
  return { kind:'key', v: inner };
}

function parseSegment(s){
  s = s.trim();
  if(!s) return null;
  if(s === '*') return { kind:'wildcard' };
  if((s.startsWith('"') && s.endsWith('"')) || (s.startsWith("'") && s.endsWith("'")))
    return { kind:'key', v: s.slice(1,-1) };
  if(/^-?\d+$/.test(s)) return { kind:'index', v: parseInt(s,10) };
  return { kind:'key', v: s };
}

function splitTop(s, sep){
  const out=[]; let depth=0, str=false, q='', cur='';
  for(let i=0;i<s.length;i++){
    const c=s[i];
    if(str){ cur+=c; if(c==='\\'){cur+=s[++i]||'';continue;} if(c===q) str=false; }
    else if(c==='"'||c==="'"){ str=true; q=c; cur+=c; }
    else if(c==='('||c==='['){ depth++; cur+=c; }
    else if(c===')'||c===']'){ depth--; cur+=c; }
    else if(c===sep && depth===0){ out.push(cur); cur=''; }
    else cur+=c;
  }
  out.push(cur);
  return out;
}

// segments: compiled list of {type, ...}
function compile(expr){
  const tokens = tokenize(expr);
  const segs = [];
  for(const tok of tokens){
    if(tok.t === 'dot') continue; // separator, next name follows
    if(tok.t === 'recursive') segs.push({ kind:'recursive' });
    else if(tok.t === 'wildcard') segs.push({ kind:'wildcard' });
    else if(tok.t === 'name') segs.push({ kind:'key', v: tok.v });
    else if(tok.t === 'bracket'){
      const b = parseBracket(tok.v);
      if(b.kind === 'recursive') segs.push({ kind:'recursive' });
      else segs.push(b);
    }
  }
  return segs;
}

// apply one segment to a list of [value, path] nodes -> new list
function applySeg(seg, nodes){
  const out = [];
  const push = (val, path) => out.push({ val, path });
  switch(seg.kind){
    case 'key':
      for(const {val,path} of nodes){
        if(val && Object.prototype.hasOwnProperty.call(val, seg.v)) push(val[seg.v], path + '/' + jsonPointerEscape(seg.v));
      }
      break;
    case 'index':
      for(const {val,path} of nodes){
        if(Array.isArray(val)){
          let idx = seg.v;
          if(idx < 0) idx += val.length;
          if(idx >= 0 && idx < val.length) push(val[idx], path + '/' + idx);
        }
      }
      break;
    case 'wildcard':
      for(const {val,path} of nodes){
        if(Array.isArray(val)){ for(let i=0;i<val.length;i++) push(val[i], path+'/'+i); }
        else if(val && typeof val === 'object'){ for(const k of Object.keys(val)) push(val[k], path+'/'+jsonPointerEscape(k)); }
      }
      break;
    case 'recursive':
      // first include current nodes (so that ..key matches nested), then recurse
      for(const {val,path} of nodes){
        push(val, path);
        walkRecursive(val, path, push);
      }
      break;
    case 'slice':
      for(const {val,path} of nodes){
        if(Array.isArray(val)){
          const len = val.length;
          let {start,end,step} = seg;
          if(step == null) step = 1;
          if(step === 0) throw new Error('slice step cannot be 0');
          if(step > 0){
            if(start == null) start = 0;
            if(end == null) end = len;
            if(start < 0) start += len;
            if(end < 0) end += len;
            start = Math.max(0, start); end = Math.min(len, end);
            for(let i=start;i<end;i+=step) push(val[i], path+'/'+i);
          } else {
            if(start == null) start = len-1;
            if(end == null) end = -1;
            if(start < 0) start += len;
            if(end < 0) end += len;
            start = Math.min(len-1, start); end = Math.max(-1, end);
            for(let i=start;i>end;i+=step) push(val[i], path+'/'+i);
          }
        }
      }
      break;
    case 'union':
      for(const part of seg.parts){
        const sub = applySeg(part, nodes);
        for(const s of sub) out.push(s);
      }
      break;
    case 'filter':
      for(const {val,path} of nodes){
        if(Array.isArray(val)){
          for(let i=0;i<val.length;i++){
            if(evalFilter(seg.v, val[i])) push(val[i], path+'/'+i);
          }
        } else if(val && typeof val === 'object'){
          // filter on object values (RFC: applies to arrays; we also allow object values)
          for(const k of Object.keys(val)){
            if(evalFilter(seg.v, val[k])) push(val[k], path+'/'+jsonPointerEscape(k));
          }
        }
      }
      break;
  }
  return out;
}

function walkRecursive(val, path, push){
  if(Array.isArray(val)){
    for(let i=0;i<val.length;i++){ push(val[i], path+'/'+i); walkRecursive(val[i], path+'/'+i, push); }
  } else if(val && typeof val === 'object'){
    for(const k of Object.keys(val)){ push(val[k], path+'/'+jsonPointerEscape(k)); walkRecursive(val[k], path+'/'+jsonPointerEscape(k), push); }
  }
}

function jsonPointerEscape(s){ return String(s).replace(/~/g,'~0').replace(/\//g,'~1'); }

// Evaluate a filter expression against a node value.
// Supports: @.field, @[index], @.field op literal, && ||, nested with ( )
function evalFilter(expr, node){
  try{
    // tokenize into comparison/logical units preserving parens
    const fn = buildFilter(expr);
    return fn(node);
  }catch(e){ return false; }
}

// build a function (node)=>bool from a filter string
function buildFilter(src){
  src = src.trim();
  // split on top-level && and ||
  const orParts = splitTop(src, '||');
  return (node) => orParts.some(orPart => {
    const andParts = splitTop(orPart, '&&');
    return andParts.every(andPart => evalAtom(andPart.trim(), node));
  });
}

function evalAtom(atom, node){
  atom = atom.trim();
  if(!atom) return true;
  // strip outer parens that wrap the whole atom
  while(atom.startsWith('(') && matchingParen(atom) === atom.length-1){
    atom = atom.slice(1,-1).trim();
  }
  if(atom.startsWith('(')){
    return buildFilter(atom)(node);
  }
  // existence test: @.field  (no operator) -> truthy
  // comparison operators
  const ops = ['===','!==','==','!=','<=','>=','<','>','=~'];
  for(const op of ops){
    const idx = findTopOp(atom, op);
    if(idx > 0){
      const left = atom.slice(0, idx).trim();
      const right = atom.slice(idx + op.length).trim();
      const lv = resolveRef(left, node);
      const rv = resolveLiteral(right, node);
      return compare(lv, op, rv);
    }
  }
  // bare ref = truthy/existence
  const v = resolveRef(atom, node);
  return v !== undefined && v !== null && v !== false;
}

function findTopOp(s, op){
  // find op not inside quotes or brackets
  let depth=0, str=false, q='';
  for(let i=0;i<=s.length-op.length;i++){
    const c = s[i];
    if(str){ if(c==='\\') {i++; continue;} if(c===q) str=false; continue; }
    if(c==='"'||c==="'"){ str=true; q=c; continue; }
    if(c==='('||c==='[') depth++;
    else if(c===')'||c===']') depth--;
    if(depth===0 && s.substr(i, op.length) === op){
      // avoid matching '=' inside '==' etc. check ordering by op length handled in ops array order
      // ensure not part of a longer op already consumed
      return i;
    }
  }
  return -1;
}

function matchingParen(s){
  let depth=0;
  for(let i=0;i<s.length;i++){
    if(s[i]==='(') depth++;
    else if(s[i]===')'){ depth--; if(depth===0) return i; }
  }
  return -1;
}

function resolveRef(ref, node){
  ref = ref.trim();
  if(ref === '@' || ref==='$') return node;
  if(!ref.startsWith('@') && !ref.startsWith('$')) return resolveLiteral(ref, node);
  // strip @ or $ prefix
  let cur = node;
  const path = ref.slice(1);
  // parse .field, [n], ['key']
  const re = /\.(?:\.)?|(\[\d+\]|\[['"][^'"]+['"]\])/g;
  let m; let last=0;
  // simpler: split on . and []
  const tokens = path.match(/\.?[^.\[\]]+|\[\d+\]|\[['"][^'"]*['"]\]/g) || [];
  for(const tk of tokens){
    let key = tk;
    if(key.startsWith('.')) key = key.slice(1);
    if(key.startsWith('[')){
      key = key.slice(1,-1);
      if(key.startsWith("'")||key.startsWith('"')) key = key.slice(1,-1);
      else key = parseInt(key,10);
    }
    if(cur == null) return undefined;
    if(typeof key === 'number') cur = Array.isArray(cur) ? cur[key] : undefined;
    else cur = (cur && typeof cur === 'object') ? cur[key] : undefined;
  }
  return cur;
}

function resolveLiteral(lit, node){
  lit = lit.trim();
  if(lit.startsWith('@') || lit.startsWith('$.')) return resolveRef(lit, node);
  if((lit.startsWith('"') && lit.endsWith('"')) || (lit.startsWith("'") && lit.endsWith("'")))
    return lit.slice(1,-1);
  if(lit === 'true') return true;
  if(lit === 'false') return false;
  if(lit === 'null') return null;
  if(/^-?\d+(\.\d+)?$/.test(lit)) return parseFloat(lit);
  return lit; // bare token fallback
}

function compare(lv, op, rv){
  switch(op){
    case '==': case '===': return lv == rv;
    case '!=': case '!==': return lv != rv;
    case '<':  return lv < rv;
    case '<=': return lv <= rv;
    case '>':  return lv > rv;
    case '>=': return lv >= rv;
    case '=~': {
      try{
        const m = String(rv).match(/^\/(.+)\/([gimsuy]*)$/);
        const re = m ? new RegExp(m[1], m[2]) : new RegExp(rv);
        return re.test(String(lv));
      }catch(e){ return false; }
    }
  }
  return false;
}

function runJsonPath(expr, root){
  if(!expr.startsWith('$')) expr = '$' + expr;
  const segs = compile(expr);
  let nodes = [{ val: root, path: '' }];
  for(const seg of segs){
    nodes = applySeg(seg, nodes);
  }
  // dedupe by path (recursive + key can double-count)
  const seen = new Set();
  const dedup = [];
  for(const n of nodes){
    if(!seen.has(n.path)){ seen.add(n.path); dedup.push(n); }
  }
  return dedup;
}

// ============================================================
// UI
// ============================================================
function run(){
  const jsonStr = $('#json').value.trim();
  const exprStr = $('#expr').value.trim();
  if(!jsonStr){ $('#status').textContent = t('needJson'); $('#output').innerHTML=''; return; }
  let root;
  try{ root = JSON.parse(jsonStr); }
  catch(e){ $('#status').innerHTML = `<span class="match-err">${t('badJson')}${esc(e.message)}</span>`; $('#output').innerHTML=''; return; }
  if(!exprStr){ $('#status').textContent=''; $('#output').textContent=''; return; }
  let results;
  try{ results = runJsonPath(exprStr, root); }
  catch(e){ $('#status').innerHTML = `<span class="match-err">✗ ${esc(e.message)}</span>`; $('#output').innerHTML=''; return; }
  if(!results.length){
    $('#status').innerHTML = `<span class="match-info">${t('noMatch')}</span>`;
    $('#output').textContent = '';
    return;
  }
  $('#status').innerHTML = `<span class="match-ok">${t('matches')(results.length)}</span>`;
  const html = results.map((r,i) => {
    const pretty = (typeof r.val === 'string') ? JSON.stringify(r.val) : JSON.stringify(r.val, null, 2);
    return `<div class="out-card">
      <span class="copy-mini" data-i="${i}">copy</span>
      <div class="path">$${r.path}</div>
      <div>${esc(pretty)}</div>
    </div>`;
  }).join('');
  $('#output').innerHTML = html;
  $('#output').querySelectorAll('.copy-mini').forEach(b=>{
    b.onclick = ()=>{
      const i = +b.dataset.i;
      copyText(JSON.stringify(results[i].val, null, 2));
    };
  });
  // stash full array on element for Copy All
  $('#output').dataset.results = JSON.stringify(results.map(r=>r.val));
}

function esc(s){ return String(s).replace(/[&<>]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }

function loadExample(){
  $('#json').value = JSON.stringify(EXAMPLE, null, 2);
  $('#expr').value = '$..book[?(@.price<10)].title';
  run();
}
function doClear(){ $('#json').value=''; $('#expr').value=''; $('#output').innerHTML=''; $('#status').textContent=''; }

function buildPresets(){
  $('#presets').innerHTML = PRESETS.map(p=>`<span class="preset">${esc(p)}</span>`).join('');
  $('#presets').querySelectorAll('.preset').forEach(el=>{
    el.onclick = ()=>{ $('#expr').value = el.textContent; run(); };
  });
}

$('#json').addEventListener('input', run);
$('#expr').addEventListener('input', run);
$('#copyBtn').onclick = ()=>{
  const r = $('#output').dataset.results;
  if(r) copyText(r);
};

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="run()">${t('run')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;
$('#copyBtn').textContent = t('copyAll');
$('#cheat').innerHTML = t('cheat');
