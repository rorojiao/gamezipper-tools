const { $, copyText, t } = GZ;

function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function inlineMd(text, accent) {
  let s = esc(text);
  // inline code first
  s = s.replace(/`([^`]+)`/g, '<code style="background:#f0f0f0;padding:2px 5px;border-radius:3px;font-family:monospace;font-size:.9em">$1</code>');
  // bold
  s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  s = s.replace(/__([^_]+)__/g, '<strong>$1</strong>');
  // italic
  s = s.replace(/\*([^*]+)\*/g, '<em>$1</em>');
  s = s.replace(/_([^_]+)_/g, '<em>$1</em>');
  // links [text](url)
  s = s.replace(/\[([^\]]+)\]\(([^)\s]+)\)/g, `<a href="$2" style="color:${accent};text-decoration:underline">$1</a>`);
  return s;
}

function mdToEmailHtml(md, accent, bg, fg, maxW) {
  const lines = md.replace(/\r/g, '').split('\n');
  const body = [];
  let i = 0;
  let listType = null;
  const closeList = () => { if (listType) { body.push(listType === 'ul' ? '</ul>' : '</ol>'); listType = null; } };

  while (i < lines.length) {
    let line = lines[i];
    // code fence
    if (/^```/.test(line)) {
      closeList();
      const code = [];
      i++;
      while (i < lines.length && !/^```/.test(lines[i])) { code.push(lines[i]); i++; }
      body.push(`<pre style="background:#f4f4f4;color:#333;padding:14px;border-radius:6px;overflow:auto;font-family:monospace;font-size:13px;line-height:1.5;margin:0 0 16px">${esc(code.join('\n'))}</pre>`);
      i++; continue;
    }
    // blank
    if (/^\s*$/.test(line)) { closeList(); i++; continue; }
    // horizontal rule
    if (/^(\s*[-*_]){3,}\s*$/.test(line)) { closeList(); body.push('<hr style="border:none;border-top:1px solid #ddd;margin:20px 0">'); i++; continue; }
    // heading
    const h = line.match(/^(#{1,6})\s+(.*)$/);
    if (h) {
      closeList();
      const lvl = h[1].length;
      const sizes = [28,24,20,18,16,14];
      body.push(`<h${lvl} style="margin:0 0 12px;font-size:${sizes[lvl-1]}px;line-height:1.3;color:${fg};font-family:Arial,Helvetica,sans-serif;font-weight:bold">${inlineMd(h[2], accent)}</h${lvl}>`);
      i++; continue;
    }
    // blockquote
    if (/^>\s?/.test(line)) {
      closeList();
      const quote = [];
      while (i < lines.length && /^>\s?/.test(lines[i])) { quote.push(lines[i].replace(/^>\s?/, '')); i++; }
      body.push(`<blockquote style="border-left:4px solid ${accent};margin:0 0 16px;padding:8px 16px;color:#666;font-style:italic;font-family:Arial,Helvetica,sans-serif">${inlineMd(quote.join(' '), accent)}</blockquote>`);
      continue;
    }
    // unordered list
    if (/^\s*[-*+]\s+/.test(line)) {
      if (listType !== 'ul') { closeList(); body.push('<ul style="margin:0 0 16px;padding-left:24px;font-family:Arial,Helvetica,sans-serif;color:'+fg+'">'); listType = 'ul'; }
      body.push(`<li style="margin-bottom:6px;line-height:1.6">${inlineMd(line.replace(/^\s*[-*+]\s+/, ''), accent)}</li>`);
      i++; continue;
    }
    // ordered list
    if (/^\s*\d+\.\s+/.test(line)) {
      if (listType !== 'ol') { closeList(); body.push('<ol style="margin:0 0 16px;padding-left:24px;font-family:Arial,Helvetica,sans-serif;color:'+fg+'">'); listType = 'ol'; }
      body.push(`<li style="margin-bottom:6px;line-height:1.6">${inlineMd(line.replace(/^\s*\d+\.\s+/, ''), accent)}</li>`);
      i++; continue;
    }
    // paragraph
    closeList();
    const para = [line];
    i++;
    while (i < lines.length && !/^\s*$/.test(lines[i]) && !/^(#{1,6}\s|>|```|[-*+]\s|\d+\.\s)/.test(lines[i])) { para.push(lines[i]); i++; }
    body.push(`<p style="margin:0 0 16px;line-height:1.6;font-family:Arial,Helvetica,sans-serif;color:${fg};font-size:15px">${inlineMd(para.join(' '), accent)}</p>`);
  }
  closeList();

  const content = body.join('\n');
  return `<table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="background:${bg};padding:24px 0"><tr><td align="center">
<table role="presentation" width="${maxW}" cellpadding="0" cellspacing="0" border="0" style="width:${maxW}px;max-width:${maxW}px;background:${bg === '#1a1a1a' ? '#262626' : '#ffffff'};border-radius:8px;border:1px solid #ddd;margin:0 auto">
<tr><td style="padding:32px 28px">${content}</td></tr>
</table>
</td></tr></table>`;
}

function convert() {
  const md = $('#input').value;
  if (!md.trim()) { $('#output').textContent = ''; $('#preview').srcdoc = ''; $('#status').innerHTML = ''; return; }
  const dark = $('#opt-theme').value === 'dark';
  const accent = $('#opt-accent').value;
  const bg = dark ? '#1a1a1a' : '#f4f4f5';
  const fg = dark ? '#e8e8e8' : '#1a1a1a';
  const maxW = parseInt($('#opt-width').value) || 600;
  const html = mdToEmailHtml(md, accent, bg, fg, maxW);
  $('#output').textContent = html;
  $('#preview').srcdoc = html;
  $('#status').innerHTML = `<span style="color:var(--gz-success)">✓ Email HTML generated (${html.length} bytes)</span>`;
}

  $('#code-wrap').style.display = tab === 'code' ? '' : 'none';
  $('#prev-wrap').style.display = tab === 'prev' ? '' : 'none';
}
