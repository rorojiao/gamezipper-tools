<style>
.preview-area{display:flex;align-items:center;justify-content:center;flex-direction:column;gap:18px;width:100%;min-height:200px;padding:30px;border-radius:var(--radius);border:1px solid var(--border);background:var(--glass);margin-bottom:1rem}
.controls{display:flex;flex-wrap:wrap;gap:14px;align-items:center;margin-bottom:1rem}
.controls label{color:var(--text2);font-size:.85rem;display:flex;align-items:center;gap:6px}
.controls select,.controls input{background:var(--glass2);border:1px solid var(--border);color:var(--text);padding:6px 10px;border-radius:var(--radius-sm);font-size:.85rem}
.controls input[type=range]{width:120px}

.style-grid button{padding:10px 6px;font-size:.82rem;background:var(--glass);border:1px solid var(--border);color:var(--text);border-radius:var(--radius-sm);cursor:pointer;transition:all .2s}
.style-grid button.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.code-out{background:rgba(0,0,0,.4);padding:1rem;border-radius:var(--radius-sm);font-family:monospace;font-size:.82rem;color:var(--text);word-break:break-all;white-space:pre-wrap;max-height:340px;overflow:auto}

.gz-stars-unicode{position:relative;display:inline-block;font-size:48px;line-height:1;letter-spacing:2px;font-family:Arial,sans-serif}
.gz-stars-clip{display:inline-block;font-size:48px;line-height:1;letter-spacing:4px;position:relative;font-family:Arial,sans-serif}
</style>
<script type="application/ld+json">{"@context":"https://schema.org","@type":"WebApplication","name":"CSS Star Rating Generator","description":"Generate beautiful CSS star ratings for reviews and testimonials. Pure CSS star rating generator — adjustable stars, half stars, colors, size and 3 output styles. Free, browser-only.","url": "https://tools.gamezipper.com/zh/css-tools/star-rating.html","applicationCategory":"Utility","operatingSystem":"Web Browser","offers":{"@type":"Offer","price":"0"}}</script>
<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "How do I add a star rating to my website?", "acceptedAnswer": {"@type": "Answer", "text": "Use this generator to create a pure-CSS star rating. Pick a style (Unicode stars, CSS clip, or SVG), set the rating value, colors and size, then copy the HTML and CSS into your page — no JavaScript or images required."}}, {"@type": "Question", "name": "Can I show half stars with CSS?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. The CSS clip and SVG styles support fractional ratings like 4.5 out of 5. Unicode stars round to the nearest whole star, while clip and SVG modes render precise half-star and partial fills."}}, {"@type": "Question", "name": "Do these star ratings work without images?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. All three output styles use only text characters and CSS — no PNG, SVG file or icon font is needed. The stars render instantly and scale cleanly at any size."}}, {"@type": "Question", "name": "Is the CSS Star Rating Generator free?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. The tool is completely free, runs entirely in your browser and never uploads your data. Copy the generated HTML and CSS into any project, commercial or personal."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header"><h1 id="title"></h1><p class="desc" id="desc"></p></div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <p style="color:var(--text2);font-size:.85rem;margin-bottom:6px" id="styleLabel"></p>
    <div class="style-grid" id="styles"></div>
    <div class="controls" id="controls"></div>
    <div class="preview-area"><div id="preview"></div><div id="valueLabel" style="color:var(--text2);font-size:.9rem"></div></div>
    <div class="code-out" id="code"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en:{toolTitle:'CSS Star Rating Generator',toolDesc:'Create beautiful pure-CSS star ratings for reviews, testimonials and product cards — supports half stars, custom colors and 3 output styles.',
    style:'Output style',unicode:'Unicode ★',clip:'CSS Clip',svg:'SVG',rating:'Rating',size:'Star size',activeColor:'Filled color',inactiveColor:'Empty color',
    step1:'Choose an output style (Unicode, CSS clip, or SVG)',step2:'Set the rating value (0–5, supports halves)',step3:'Pick star size and filled / empty colors',step4:'Copy the HTML + CSS into your project'},
  zh:{toolTitle:'CSS 星级评分生成器',toolDesc:'为评论、评价和产品卡片创建纯 CSS 星级评分 — 支持半星、自定义颜色和 3 种输出样式。',
    style:'输出样式',unicode:'Unicode ★',clip:'CSS 裁剪',svg:'SVG',rating:'评分',size:'星星大小',activeColor:'填充颜色',inactiveColor:'空星颜色',
    step1:'选择输出样式（Unicode、CSS 裁剪或 SVG）',step2:'设置评分（0–5，支持半星）',step3:'调整星星大小和填充/空星颜色',step4:'复制 HTML + CSS 到你的项目'}
});
const {$,copyText,t}=GZ;
let style='clip',rating=4.5,size=32,activeColor='#ffc107',inactiveColor='#e0e0e0';

function renderStyles(){
  $('#styles').innerHTML=[['unicode','unicode'],['clip','clip'],['svg','svg']].map(s=>`<button class="${s[0]===style?'active':''}" onclick="style='${s[0]}';renderStyles();update()">${t(s[1])}</button>`).join('');
}

function buildPreview(){
  const el=$('#preview');
  const full=Math.floor(rating);
  const frac=rating-full;
  if(style==='unicode'){
    let stars='';
    for(let i=0;i<5;i++){stars+= i<full?'★':(i===full&&frac>=0.5?'★':'☆');}
    el.innerHTML=`<div class="gz-stars-display" style="color:${activeColor};font-size:${size}px">${stars}</div>`;
  } else if(style==='clip'){
    // background of inactive, foreground overlay of active clipped to rating%
    el.innerHTML=`<div style="position:relative;display:inline-block;font-family:Arial,sans-serif;font-size:${size}px;line-height:1;letter-spacing:4px">
      <div style="color:${inactiveColor}">★★★★★</div>
      <div style="color:${activeColor};position:absolute;top:0;left:0;overflow:hidden;white-space:nowrap;width:${(rating/5*100).toFixed(2)}%">★★★★★</div>
    </div>`;
  } else { // svg
    const w=size,h=size,gap=Math.max(2,size*0.12);
    let svg=`<svg width="${(w+gap)*5-gap}" height="${h}" viewBox="0 0 ${(w+gap)*5-gap} ${h}" xmlns="http://www.w3.org/2000/svg">`;
    for(let i=0;i<5;i++){
      const filled=Math.max(0,Math.min(1,rating-i));
      const x=i*(w+gap);
      // empty star
      svg+=`<path d="${starPath(x,h/2,w/2)}" fill="${inactiveColor}"/>`;
      if(filled>0){
        const fw=filled*w;
        svg+=`<clipPath id="c${i}"><rect x="${x}" y="0" width="${fw.toFixed(2)}" height="${h}"/></clipPath>`;
        svg+=`<path d="${starPath(x,h/2,w/2)}" fill="${activeColor}" clip-path="url(#c${i})"/>`;
      }
    }
    svg+=`</svg>`;
    el.innerHTML=svg;
  }
  $('#valueLabel').textContent=`${rating.toFixed(1)} / 5.0`;
}

function starPath(cx,cy,r){
  // 5-point star path
  let pts=[];
  for(let i=0;i<10;i++){
    const radius=i%2===0?r:r*0.4;
    const angle=Math.PI/5*i-Math.PI/2;
    pts.push(`${(cx+radius*Math.cos(angle)).toFixed(2)},${(cy+radius*Math.sin(angle)).toFixed(2)}`);
  }
  return 'M'+pts.join(' L')+' Z';
}

function buildCode(){
  const full=Math.floor(rating),frac=rating-full;
  let html='',css='';
  if(style==='unicode'){
    let stars='';
    for(let i=0;i<5;i++){stars+= i<full?'★':(i===full&&frac>=0.5?'★':'☆');}
    html=`<span class="star-rating">${stars}</span>`;
    css=`.star-rating {\n  color: ${activeColor};\n  font-size: ${size}px;\n  letter-spacing: 2px;\n  line-height: 1;\n}`;
  } else if(style==='clip'){
    html=`<div class="star-rating" style="--rating: ${rating};">\n  <span class="star-bg">★★★★★</span>\n  <span class="star-fg">★★★★★</span>\n</div>`;
    css=`.star-rating {\n  position: relative;\n  display: inline-block;\n  font-family: Arial, sans-serif;\n  font-size: ${size}px;\n  line-height: 1;\n  letter-spacing: 4px;\n}\n.star-rating .star-bg { color: ${inactiveColor}; }\n.star-rating .star-fg {\n  color: ${activeColor};\n  position: absolute;\n  top: 0;\n  left: 0;\n  overflow: hidden;\n  white-space: nowrap;\n  /* calc(): rating/5 * 100% */\n  width: calc(var(--rating) * 20%);\n}`;
  } else { // svg
    const w=size,h=size,gap=Math.max(2,size*0.12),total=(w+gap)*5-gap;
    let paths='';
    for(let i=0;i<5;i++){
      const filled=Math.max(0,Math.min(1,rating-i));
      const x=i*(w+gap);
      paths+=`  <path d="${starPath(x,h/2,w/2)}" fill="${inactiveColor}"/>\n`;
      if(filled>0){
        paths+=`  <rect x="${x}" y="0" width="${(filled*w).toFixed(2)}" height="${h}" fill="${activeColor}" mask="url(#m${i})"/>\n`;
      }
    }
    let masks='';
    for(let i=0;i<5;i++){
      const x=i*(w+gap);
      masks+=`  <mask id="m${i}">\n    <rect x="${x}" y="0" width="${w}" height="${h}" fill="black"/>\n    <path d="${starPath(x,h/2,w/2)}" fill="white"/>\n  </mask>\n`;
    }
    html=`<svg class="star-rating" width="${total}" height="${h}" viewBox="0 0 ${total} ${h}" xmlns="http://www.w3.org/2000/svg">\n  <defs>\n${masks}  </defs>\n${paths}</svg>`;
    css=`/* Pure inline SVG — no extra CSS required.\n   Edit fill colors directly in the SVG markup above. */`;
  }
  $('#code').textContent=`<!-- HTML -->\n${html}\n\n<!-- CSS -->\n${css}`;
}

function update(){buildPreview();buildCode();}

$('#styleLabel').textContent=t('style');
$('#controls').innerHTML=`
  <label>${t('rating')}: <input type="range" id="rating" min="0" max="5" step="0.5" value="${rating}" oninput="rating=+this.value;$('#ratingVal').textContent=this.value;update()"><span id="ratingVal">${rating}</span>/5</label>
  <label>${t('size')}: <input type="range" id="size" min="16" max="80" value="${size}" oninput="size=+this.value;$('#sizeVal').textContent=this.value;update()"><span id="sizeVal">${size}</span>px</label>
  <label>${t('activeColor')}: <input type="color" id="activeColor" value="${activeColor}" oninput="activeColor=this.value;update()"></label>
  <label>${t('inactiveColor')}: <input type="color" id="inactiveColor" value="${inactiveColor}" oninput="inactiveColor=this.value;update()"></label>`;
$('#toolbar').innerHTML=`<button class="gz-btn gz-btn-secondary" onclick="rating=4.5;size=32;activeColor='#ffc107';inactiveColor='#e0e0e0';\$('#rating').value=4.5;\$('#size').value=32;\$('#activeColor').value='#ffc107';\$('#inactiveColor').value='#e0e0e0';\$('#ratingVal').textContent='4.5';\$('#sizeVal').textContent='32';renderStyles();update()">${t('example')}</button><button class="gz-btn" onclick="copyText($('#code').textContent)">${t('copy')}</button>`;
renderStyles();update();
GZ.renderToolPage({category:'css',titleKey:'toolTitle',descKey:'toolDesc',howToSteps:['step1','step2','step3','step4'],related:[
  {icon:'🔘',href:'/css-tools/button.html',name:'Button'},
  {icon:'🃏',href:'/css-tools/card.html',name:'Card'},
  {icon:'📊',href:'/css-tools/progress-bar.html',name:'Progress Bar'},
]});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
