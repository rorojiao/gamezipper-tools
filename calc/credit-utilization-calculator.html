<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is credit utilization?", "acceptedAnswer": {"@type": "Answer", "text": "Credit utilization is the percentage of your available credit that you are currently using. It is calculated as (total balances / total credit limits) x 100. For example, if you have $5,000 in limits and $1,500 in balances, your utilization is 30%. It is the second most important factor in your credit score after payment history."}}, {"@type": "Question", "name": "What is a good credit utilization ratio?", "acceptedAnswer": {"@type": "Answer", "text": "Most experts recommend keeping total credit utilization under 30%. Below 10% is considered excellent and can maximize your credit score. Between 30-50% is fair, between 50-75% is poor, and above 75% is very poor and will significantly hurt your score."}}, {"@type": "Question", "name": "Does utilization affect my credit score immediately?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. Credit utilization is updated whenever your card issuer reports your balance to the credit bureaus (usually once per billing cycle, on your statement closing date). Paying down balances before the statement closes can lower reported utilization and boost your score within weeks."}}, {"@type": "Question", "name": "Should I close unused credit cards?", "acceptedAnswer": {"@type": "Answer", "text": "Closing an unused card reduces your total available credit, which can raise your utilization ratio and lower your score. Keeping low- or zero-balance cards open generally helps your credit, unless they carry high annual fees."}}]}</script>

<script>
GZI18n.register({
  en: {
    toolTitle: 'Credit Utilization Calculator',
    toolDesc: 'Calculate your credit utilization ratio across all cards and see how it ranks. Add limits and balances, get instant feedback on the second-biggest factor in your credit score.',
    addCard: '+ Add Card',
    limit: 'Limit',
    balance: 'Balance',
    cardN: 'Card',
    totalLimit: 'Total Credit Limit',
    totalBal: 'Total Balance',
    available: 'Available Credit',
    utilization: 'Credit Utilization',
    excellent: 'Excellent — keep it up!',
    good: 'Good — well within healthy range',
    fair: 'Fair — try to bring it under 30%',
    poor: 'Poor — pay down balances to help your score',
    veryPoor: 'Very poor — this is hurting your score',
    legendExcellent: '< 10% Excellent',
    legendGood: '10-30% Good',
    legendFair: '30-50% Fair',
    legendPoor: '50%+ Poor',
    step1: 'Enter the credit limit and current balance for each card',
    step2: 'Click Add Card if you have more accounts',
    step3: 'View your total utilization ratio and status',
    step4: 'Aim to keep utilization below 30% to protect your score',
  },
  zh: {
    toolTitle: '信用卡额度使用率计算器',
    toolDesc: '计算所有信用卡的综合额度使用率并查看评级。输入额度与当前欠款，即时反馈这个对信用分影响第二大的关键指标。',
    addCard: '+ 添加卡片',
    limit: '额度',
    balance: '当前欠款',
    cardN: '卡片',
    totalLimit: '总授信额度',
    totalBal: '总欠款',
    available: '可用额度',
    utilization: '额度使用率',
    excellent: '优秀 — 继续保持！',
    good: '良好 — 在健康范围内',
    fair: '一般 — 尽量降到 30% 以下',
    poor: '较差 — 还款以帮助信用分',
    veryPoor: '很差 — 这正在损害你的信用',
    legendExcellent: '< 10% 优秀',
    legendGood: '10-30% 良好',
    legendFair: '30-50% 一般',
    legendPoor: '50%+ 较差',
    step1: '为每张卡片输入信用额度和当前欠款',
    step2: '若有多张卡片，点击"添加卡片"',
    step3: '查看总额度使用率和评级',
    step4: '将使用率控制在 30% 以下以保护信用分',
  }
});

const { $, t } = GZ;
let cardCount = 2;

function fmt(n) {
  return '$' + n.toLocaleString('en-US', { maximumFractionDigits: 2 });
}

function renderCards() {
  let html = '';
  for (let i = 1; i <= cardCount; i++) {
    html += `<div class="cu-row" data-card="${i}">
      <label>${t('cardN')} ${i}</label>
      <input type="number" class="cu-limit" placeholder="${t('limit')}" min="0" step="any">
      <input type="number" class="cu-bal" placeholder="${t('balance')}" min="0" step="any">
      ${cardCount > 1 ? `<button class="del" onclick="removeCard(${i})">×</button>` : ''}
    </div>`;
  }
  $('#cards').innerHTML = html;
}

function removeCard(idx) {
  if (cardCount <= 1) return;
  const rows = $('#cards').querySelectorAll('.cu-row');
  if (rows[idx - 1]) {
    const limitInp = rows[idx - 1].querySelector('.cu-limit');
    const balInp = rows[idx - 1].querySelector('.cu-bal');
    if (limitInp) limitInp.value = '';
    if (balInp) balInp.value = '';
    rows[idx - 1].remove();
  }
  // re-number
  const remaining = $('#cards').querySelectorAll('.cu-row');
  remaining.forEach((r, i) => {
    r.querySelector('label').textContent = `${t('cardN')} ${i + 1}`;
    const delBtn = r.querySelector('.del');
    if (delBtn) delBtn.setAttribute('onclick', `removeCard(${i + 1})`);
    r.dataset.card = i + 1;
  });
  cardCount = remaining.length;
  update();
}

function addCard() {
  cardCount++;
  renderCards();
}

function statusInfo(pct) {
  if (pct < 10) return { text: t('excellent'), color: '#00d672', cls: 'excellent' };
  if (pct < 30) return { text: t('good'), color: '#61afef', cls: 'good' };
  if (pct < 50) return { text: t('fair'), color: '#f9a826', cls: 'fair' };
  if (pct < 75) return { text: t('poor'), color: '#e67e22', cls: 'poor' };
  return { text: t('veryPoor'), color: '#e94560', cls: 'veryPoor' };
}

function update() {
  let totalLimit = 0, totalBal = 0;
  $('#cards').querySelectorAll('.cu-row').forEach(r => {
    const lim = parseFloat(r.querySelector('.cu-limit').value) || 0;
    const bal = parseFloat(r.querySelector('.cu-bal').value) || 0;
    totalLimit += lim;
    totalBal += bal;
  });

  if (totalLimit === 0) {
    $('#output').innerHTML = '';
    return;
  }

  const pct = (totalBal / totalLimit) * 100;
  const status = statusInfo(pct);
  const available = totalLimit - totalBal;
  const barPct = Math.min(100, pct);
  const barColor = pct < 30 ? '#00d672' : pct < 50 ? '#f9a826' : '#e94560';

  $('#output').innerHTML = `
    <div class="cu-card">
      <div class="cu-pct">${t('utilization')}</div>
      <div class="cu-big" style="color:${status.color}">${pct.toFixed(1)}%</div>
      <div class="cu-bar"><div class="cu-fill" style="width:${barPct}%;background:${barColor}"></div></div>
      <div class="cu-status" style="color:${status.color}">${status.text}</div>
      <div class="cu-row" style="margin-top:14px;justify-content:space-between">
        <span><small style="opacity:.7">${t('totalLimit')}:</small> <b>${fmt(totalLimit)}</b></span>
        <span><small style="opacity:.7">${t('totalBal')}:</small> <b>${fmt(totalBal)}</b></span>
      </div>
      <div class="cu-row" style="justify-content:space-between">
        <span><small style="opacity:.7">${t('available')}:</small> <b style="color:#00d672">${fmt(available)}</b></span>
      </div>
    </div>`;
}

function buildLegend() {
  $('#legend').innerHTML = `
    <div class="cu-tier" style="border-color:#00d672">${t('legendExcellent')}</div>
    <div class="cu-tier" style="border-color:#61afef">${t('legendGood')}</div>
    <div class="cu-tier" style="border-color:#f9a826">${t('legendFair')}</div>
    <div class="cu-tier" style="border-color:#e94560">${t('legendPoor')}</div>`;
}

$('#toolbar').innerHTML = `<button class="gz-btn gz-btn-secondary" onclick="addCard()">${t('addCard')}</button>`;
$('#cards').addEventListener('input', update);
renderCards();
buildLegend();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'💳', href:'/calc/credit-card-payoff-calculator.html', name:'Credit Card Payoff'},
    {icon:'💰', href:'/calc/debt-payoff-calculator.html', name:'Debt Payoff'},
    {icon:'📉', href:'/calc/debt-to-income-calculator.html', name:'Debt-to-Income'},
    {icon:'🏦', href:'/calc/debt-avalanche-calculator.html', name:'Debt Avalanche'},
  ]
});
</script>
