<style>
.tr-layout{display:grid;grid-template-columns:1fr 1fr;gap:14px}

<script type="application/ld+json">{"@context":"https://schema.org","@type":"WebApplication","name":"CSS Transition Generator","description":"Generate CSS transitions visually with cubic-bezier, steps and named timing functions. Preview hover effects, set duration, delay and properties. Copy production-ready transition CSS instantly. Free, browser-based.","url": "https://tools.gamezipper.com/zh/css-tools/transition.html","applicationCategory":"Utility","operatingSystem":"Web Browser","offers":{"@type":"Offer","price":"0"}}</script>
<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is a CSS transition?", "acceptedAnswer": {"@type": "Answer", "text": "A CSS transition smoothly animates a property change between two values over a duration. The shorthand is: transition: property duration timing-function delay;. For example transition: transform 0.3s ease fades a transform change over 300 milliseconds."}}, {"@type": "Question", "name": "What is the difference between transition and animation?", "acceptedAnswer": {"@type": "Answer", "text": "Transitions animate between two states triggered by a change like :hover or a class toggle. They run once. Animations use @keyframes to define multiple steps and can loop, reverse and start automatically without a trigger. Use transitions for simple state changes and animations for complex multi-step motion."}}, {"@type": "Question", "name": "Which CSS properties can be transitioned?", "acceptedAnswer": {"@type": "Answer", "text": "Only properties with discrete or numeric values can be transitioned: color, background, opacity, transform, width, height, margin, padding and more. Use the all keyword to transition every animatable property, though this can hurt performance. For best performance animate transform and opacity only."}}, {"@type": "Question", "name": "What is a cubic-bezier easing function?", "acceptedAnswer": {"@type": "Answer", "text": "cubic-bezier(x1, y1, x2, y2) defines a custom acceleration curve with two control points. Common values include ease (0.25,0.1,0.25,1), ease-in (0.42,0,1,1) and ease-out (0,0,0.58,1). Custom beziers like cubic-bezier(0.68,-0.55,0.27,1.55) create bouncy or overshooting effects."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="tr-layout">
      <div>
        <div class="tr-card">
          <h3>🎛️ <span id="lblControls"></span></h3>
          <div class="tr-field">
            <label><span id="lblProp"></span></label>
            <select id="property">
              <option value="all">all</option>
              <option value="transform" selected>transform</option>
              <option value="opacity">opacity</option>
              <option value="background-color">background-color</option>
              <option value="color">color</option>
              <option value="box-shadow">box-shadow</option>
              <option value="width">width</option>
              <option value="height">height</option>
              <option value="border-radius">border-radius</option>
              <option value="filter">filter</option>
            </select>
          </div>
          <div class="tr-field">
            <label><span id="lblDur"></span><span class="val"><span id="durV">0.30</span>s</span></label>
            <input type="range" id="duration" min="0.05" max="3" step="0.05" value="0.3">
          </div>
          <div class="tr-field">
            <label><span id="lblDelay"></span><span class="val"><span id="delayV">0.00</span>s</span></label>
            <input type="range" id="delay" min="0" max="2" step="0.05" value="0">
          </div>
          <div class="tr-field">
            <label><span id="lblTiming"></span></label>
            <select id="timing">
              <optgroup label="Named">
                <option value="ease">ease</option>
                <option value="linear">linear</option>
                <option value="ease-in">ease-in</option>
                <option value="ease-out" selected>ease-out</option>
                <option value="ease-in-out">ease-in-out</option>
              </optgroup>
              <optgroup label="Cubic-bezier">
                <option value="cubic-bezier(0.68,-0.55,0.27,1.55)">back / bounce</option>
                <option value="cubic-bezier(0.25,1.5,0.5,1)">overshoot</option>
                <option value="cubic-bezier(0.34,1.56,0.64,1)">material</option>
                <option value="cubic-bezier(0.87,0,0.13,1)">snappy</option>
              </optgroup>
              <optgroup label="Steps">
                <option value="steps(4,end)">steps(4)</option>
                <option value="steps(8)">steps(8)</option>
                <option value="steps(10,jump-none)">steps(10,jump-none)</option>
              </optgroup>
            </select>
          </div>
          <div class="tr-presets" id="presets"></div>
        </div>
      </div>
      <div>
        <div class="tr-card">
          <h3>👁 <span id="lblPreview"></span> <span style="font-size:.7em;opacity:.6;font-weight:400">— <span id="lblHoverHint"></span></span></h3>
          <div class="tr-stage"><div class="tr-track"><div class="tr-ball" id="ball"></div></div></div>
          <svg class="tr-bezier" id="curve" viewBox="0 0 300 200" preserveAspectRatio="none"></svg>
        </div>
        <div class="tr-card" style="margin-top:12px">
          <h3>📋 <span id="lblOutput"></span></h3>
          <div class="tr-output" id="output"></div>
        </div>
      </div>
    </div>
    <div class="gz-toolbar" id="toolbar"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'CSS Transition Generator',
    toolDesc: 'Generate CSS transitions visually with cubic-bezier, steps and named timing functions. Preview hover effects, set duration and delay. Copy production-ready CSS instantly.',
    lblControls: 'Controls',
    lblProp: 'Property',
    lblDur: 'Duration',
    lblDelay: 'Delay',
    lblTiming: 'Timing function',
    lblPreview: 'Live preview',
    lblHoverHint: 'hover the ball',
    lblOutput: 'Generated CSS',
    copy: 'Copy CSS',
    reset: 'Reset',
    step1: 'Pick the property you want to animate (transform is best for performance)',
    step2: 'Set duration and delay in seconds',
    step3: 'Choose a timing function — named, cubic-bezier or steps',
    step4: 'Hover the preview ball and copy the generated CSS',
  },
  zh: {
    toolTitle: 'CSS Transition 生成器',
    toolDesc: '可视化生成 CSS transition，支持 cubic-bezier、steps 和命名缓动函数。预览悬停效果，设置时长和延迟。一键复制生产可用 CSS。',
    lblControls: '控件',
    lblProp: '属性',
    lblDur: '时长',
    lblDelay: '延迟',
    lblTiming: '缓动函数',
    lblPreview: '实时预览',
    lblHoverHint: '悬停小球',
    lblOutput: '生成的 CSS',
    copy: '复制 CSS',
    reset: '重置',
    step1: '选择要动画的属性（transform 性能最佳）',
    step2: '设置时长和延迟（秒）',
    step3: '选择缓动函数 — 命名、cubic-bezier 或 steps',
    step4: '悬停预览小球并复制生成的 CSS',
  }
});

const { $, copyText, t } = GZ;
['property','duration','delay','timing'].forEach(id => $('#'+id).addEventListener('input', update));

const NAMED = {ease:[0.25,0.1,0.25,1],linear:[0,0,1,1],'ease-in':[0.42,0,1,1],'ease-out':[0,0,0.58,1],'ease-in-out':[0.42,0,0.58,1]};

function parseBezier(str) {
  if (NAMED[str]) return NAMED[str];
  const m = str.match(/cubic-bezier\(([^)]+)\)/);
  if (m) return m[1].split(',').map(Number);
  return null;
}

function update() {
  const prop = $('#property').value;
  const dur = parseFloat($('#duration').value).toFixed(2);
  const delay = parseFloat($('#delay').value).toFixed(2);
  const timing = $('#timing').value;
  $('#durV').textContent = dur;
  $('#delayV').textContent = delay;
  const tf = `transition: ${prop} ${dur}s ${timing} ${delay}s;`;
  $('#ball').style.cssText = 'transition:'+prop+' '+dur+'s '+timing+' '+delay+'s;';
  // output
  let out = `<span class="sel">.element</span> {\n`;
  out += `  <span class="prop">transition</span>: <span class="val">${prop} ${dur}s ${timing} ${delay}s</span>;\n`;
  out += `}\n\n<span class="sel">.element:hover</span> {\n`;
  out += `  <span class="com">/* your animated property change */</span>\n`;
  if (prop==='transform') out += `  <span class="prop">transform</span>: <span class="val">scale(1.1)</span>;`;
  else if (prop==='opacity') out += `  <span class="prop">opacity</span>: <span class="val">0.5</span>;`;
  else if (prop==='background-color') out += `  <span class="prop">background-color</span>: <span class="val">#4ecdc4</span>;`;
  else if (prop==='color') out += `  <span class="prop">color</span>: <span class="val">#4ecdc4</span>;`;
  else if (prop==='box-shadow') out += `  <span class="prop">box-shadow</span>: <span class="val">0 8px 24px rgba(0,0,0,.3)</span>;`;
  else if (prop==='width') out += `  <span class="prop">width</span>: <span class="val">200px</span>;`;
  else if (prop==='height') out += `  <span class="prop">height</span>: <span class="val">200px</span>;`;
  else if (prop==='border-radius') out += `  <span class="prop">border-radius</span>: <span class="val">50%</span>;`;
  else if (prop==='filter') out += `  <span class="prop">filter</span>: <span class="val">blur(4px)</span>;`;
  else out += `  <span class="com">/* change the property value here */</span>`;
  out += `\n}`;
  $('#output').innerHTML = out;
  drawCurve(timing);
}

function drawCurve(timing) {
  const svg = $('#curve');
  const b = parseBezier(timing);
  if (!b) {
    svg.innerHTML = '<text x="150" y="100" text-anchor="middle" fill="var(--text2)" font-size="11">steps() — no bezier curve</text>';
    return;
  }
  const [x1,y1,x2,y2] = b;
  const W=300,H=200,P=24;
  const sx = (x)=> P + x*(W-2*P);
  const sy = (y)=> H-P - y*(H-2*P); // invert y (0 bottom, 1 top)
  // grid
  let g = `<rect x="0" y="0" width="${W}" height="${H}" fill="none"/>`;
  // diagonal reference
  g += `<line x1="${P}" y1="${H-P}" x2="${W-P}" y2="${P}" stroke="var(--border)" stroke-dasharray="3,3"/>`;
  // control lines
  g += `<line x1="${P}" y1="${H-P}" x2="${sx(x1)}" y2="${sy(y1)}" stroke="#8a5cc4" opacity=".5"/>`;
  g += `<line x1="${W-P}" y1="${P}" x2="${sx(x2)}" y2="${sy(y2)}" stroke="#8a5cc4" opacity=".5"/>`;
  // bezier path
  g += `<path d="M${P},${H-P} C${sx(x1)},${sy(y1)} ${sx(x2)},${sy(y2)} ${W-P},${P}" stroke="#4ecdc4" stroke-width="2.5" fill="none"/>`;
  // control points
  g += `<circle cx="${sx(x1)}" cy="${sy(y1)}" r="5" fill="#8a5cc4"/>`;
  g += `<circle cx="${sx(x2)}" cy="${sy(y2)}" r="5" fill="#8a5cc4"/>`;
  // endpoints
  g += `<circle cx="${P}" cy="${H-P}" r="4" fill="#4ecdc4"/>`;
  g += `<circle cx="${W-P}" cy="${P}" r="4" fill="#4ecdc4"/>`;
  // labels
  g += `<text x="${P}" y="${H-6}" font-size="10" fill="var(--text2)">0</text>`;
  g += `<text x="${W-P-10}" y="${P-6}" font-size="10" fill="var(--text2)">1</text>`;
  svg.innerHTML = g;
}

const PRESETS = [
  {n:'Fast snappy', t:'0.15s', tm:'cubic-bezier(0.87,0,0.13,1)', p:'transform'},
  {n:'Smooth ease', t:'0.3s', tm:'ease-out', p:'transform'},
  {n:'Bouncy', t:'0.5s', tm:'cubic-bezier(0.68,-0.55,0.27,1.55)', p:'transform'},
  {n:'Overshoot', t:'0.4s', tm:'cubic-bezier(0.34,1.56,0.64,1)', p:'transform'},
  {n:'Button hover', t:'0.2s', tm:'ease', p:'background-color'},
  {n:'Slow fade', t:'0.6s', tm:'ease-in-out', p:'opacity'},
];
$('#presets').innerHTML = PRESETS.map(p =>
  `<button class="gz-btn gz-btn-secondary" onclick="applyPreset('${p.n}')">${p.n}</button>`).join('');

window.applyPreset = function(n) {
  const p = PRESETS.find(x=>x.n===n);
  if(!p) return;
  $('#property').value=p.p; $('#duration').value=parseFloat(p.t); $('#timing').value=p.tm; $('#delay').value=0;
  update();
};

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="applyPreset('Smooth ease')">${t('reset')}</button>`;

['lblControls','lblProp','lblDur','lblDelay','lblTiming','lblPreview','lblHoverHint','lblOutput'].forEach(k => { const el=$('#'+k); if(el) el.textContent=t(k); });

update();

GZ.renderToolPage({
  category: 'css',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🎬', href:'/css-tools/animation.html', name:'CSS Animation'},
    {icon:'〰️', href:'/css-tools/bezier.html', name:'Bezier Curve'},
    {icon:'🖱️', href:'/css-tools/hover.html', name:'Hover Effects'},
    {icon:'🎛️', href:'/css-tools/transform.html', name:'Transform'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
