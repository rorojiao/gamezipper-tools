<script type="application/ld+json">{"@context":"https://schema.org","@type":"WebApplication","name":"Permutations & Combinations Calculator","description":"Free online permutations and combinations calculator. Instantly compute nPr, nCr, factorials, Pascal's triangle and more for probability and combinatorics.","url": "https://tools.gamezipper.com/zh/calc/permutations-combinations.html","applicationCategory":"Utility","operatingSystem":"Web Browser","offers":{"@type":"Offer","price":"0"}}</script>
<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"What is the difference between permutations and combinations?","acceptedAnswer":{"@type":"Answer","text":"A permutation counts ordered arrangements (order matters), written nPr = n!/(n-r)!. A combination counts unordered selections (order does not matter), written nCr = n!/(r!(n-r)!). For example, picking 3 letters from ABCDE gives 60 permutations but only 10 combinations."}},{"@type":"Question","name":"How do I calculate nPr and nCr?","acceptedAnswer":{"@type":"Answer","text":"Enter the total number n of items and the chosen number r, then the tool computes both. nPr = n! / (n-r)! and nCr = n! / (r! * (n-r)!). The tool also handles repetition variants: with repetition, nPr-with-rep = n^r and nCr-with-rep = C(n+r-1, r)."}},{"@type":"Question","name":"What is a factorial?","acceptedAnswer":{"@type":"Answer","text":"A factorial, written n!, is the product of all positive integers from 1 to n. For example 5! = 5*4*3*2*1 = 120. By definition 0! = 1. This calculator computes factorials exactly up to n=170 (above which the result overflows a JavaScript number)."}},{"@type":"Question","name":"Can this calculate Pascal's triangle?","acceptedAnswer":{"@type":"Answer","text":"Yes. The Pascal's Triangle tab builds rows of binomial coefficients up to the row you specify. Each entry equals nCr for that position and is widely used in binomial expansion and probability."}}]}</script>

<div class="gz-container">

</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Permutations & Combinations Calculator',
    toolDesc: 'Instantly compute nPr, nCr, factorials, repetition variants and Pascal\'s triangle for probability and combinatorics.',
    tabCalc: 'nPr / nCr',
    tabPascal: "Pascal's Triangle",
    lblN: 'Total items (n)',
    lblR: 'Chosen (r)',
    lblRows: 'Number of rows',
    step1: 'Enter the total number of items n',
    step2: 'Enter the number to choose r',
    step3: 'Read the results — nPr, nCr, with/without repetition and the factorial of n',
    step4: 'Switch to the Pascal tab to build rows of binomial coefficients',
  },
  zh: {
    toolTitle: '排列组合计算器',
    toolDesc: '即时计算排列 nPr、组合 nCr、阶乘、可重复变体和杨辉三角，适用于概率论与组合数学。',
    tabCalc: '排列 / 组合',
    tabPascal: '杨辉三角',
    lblN: '总数 (n)',
    lblR: '选取数 (r)',
    lblRows: '行数',
    step1: '输入物品总数 n',
    step2: '输入要选取的数量 r',
    step3: '读取结果 — nPr、nCr、可重复变体及 n 的阶乘',
    step4: '切换到“杨辉三角”选项卡可生成二项式系数行',
  }
});

const { $, t } = GZ;
let mode = 'calc';

// BigInt factorial for exact results
function factBig(n){ if(n<0) return 1n; let r=1n; for(let i=2n;i<=BigInt(n);i++) r*=i; return r; }
function nPrBig(n,r){ if(r<0||r>n) return 0n; return factBig(n)/factBig(n-r); }
function nCrBig(n,r){ if(r<0||r>n) return 0n; return factBig(n)/(factBig(r)*factBig(n-r)); }
function nPrRepBig(n,r){ if(n<0||r<0) return 0n; return BigInt(n)**BigInt(r); }
function nCrRepBig(n,r){ if(n<0||r<0) return 0n; return nCrBig(n+r-1,r); }
function fmt(big){ if(typeof big!=='bigint') big=BigInt(big); let s=big.toString(); if(s.length<=24) return big.toLocaleString ? big.toString() : s; return s.slice(0,12)+'…('+s.length+' digits)'; }
function fmtFull(big){ return big.toString(); }

function compute(){
  const n=Math.floor(+$('#n').value||0), r=Math.floor(+$('#r').value||0);
  const rows=[
    {lbl:`P(n,r) = nPr`, sub:`n! / (n-r)! = ${n}! / ${n-r>=0?(n-r):0}!`, val: nPrBig(n,r)},
    {lbl:`C(n,r) = nCr`, sub:`n! / (r!(n-r)!) = ${n}! / (${r}!·${n-r>=0?(n-r):0}!)`, val: nCrBig(n,r)},
    {lbl:`P(n,r) with repetition`, sub:`n^r = ${n}^${r}`, val: nPrRepBig(n,r)},
    {lbl:`C(n,r) with repetition`, sub:`C(n+r-1, r) = C(${n+r-1}, ${r})`, val: nCrRepBig(n,r)},
    {lbl:`n! (factorial of ${n})`, sub:`${n}!`, val: factBig(n)},
  ];
  $('#results').innerHTML = rows.map(row=>`
    <div class="pc-result">
      <div>
        <div class="lbl">${row.lbl}</div>
        <span class="pc-formula">${row.sub}</span>
      </div>
      <div class="val" title="${fmtFull(row.val)}">${fmt(row.val)}</div>
    </div>`).join('');
}

function buildPascal(){
  const rows=Math.max(1,Math.min(30,Math.floor(+$('#pRows').value||10)));
  let html='';
  // Iterative building using BigInt for safety
  let tri=[];
  for(let i=0;i<rows;i++){
    let row=[];
    for(let j=0;j<=i;j++){
      if(j===0||j===i) row.push(1n);
      else row.push(tri[i-1][j-1]+tri[i-1][j]);
    }
    tri.push(row);
    html += `<div class="pc-tri-row">${row.map(v=>`<div class="pc-tri-cell">${v.toString()}</div>`).join('')}</div>`;
  }
  $('#pascal').innerHTML = html;
}

function setMode(m){
  mode=m;
  document.querySelectorAll('.pc-tab').forEach(b=>b.classList.toggle('active', b.dataset.mode===m));
  $('#calcPanel').style.display = m==='calc'?'block':'none';
  $('#pascalPanel').style.display = m==='pascal'?'block':'none';
  if(m==='pascal') buildPascal();
}

document.querySelectorAll('.pc-tab').forEach(b=>b.addEventListener('click',()=>setMode(b.dataset.mode)));
['n','r'].forEach(id=>$('#'+id).addEventListener('input',compute));
$('#pRows').addEventListener('input',buildPascal);

$('#tabCalc').textContent=t('tabCalc');
$('#tabPascal').textContent=t('tabPascal');
$('#lblN').textContent=t('lblN');
$('#lblR').textContent=t('lblR');
$('#lblRows').textContent=t('lblRows');

compute();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🎲', href:'/calc/probability-calculator.html', name:'Probability Calculator'},
    {icon:'🧮', href:'/calc/fraction-calculator.html', name:'Fraction Calculator'},
    {icon:'🔢', href:'/calc/statistics-calculator.html', name:'Statistics Calculator'},
    {icon:'🧠', href:'/calc/binary-calculator.html', name:'Binary Calculator'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
