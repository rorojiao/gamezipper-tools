<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"What is a JSON Pointer?","acceptedAnswer":{"@type":"Answer","text":"A JSON Pointer (RFC 6901) is a string that identifies a single value inside a JSON document, similar to a file path. It is built from a sequence of reference tokens separated by '/', e.g. '/foo/0/bar' points to doc.foo[0].bar. The empty string '' refers to the whole document, and JSON Patch (RFC 6902) builds on JSON Pointer."}},{"@type":"Question","name":"How does escaping work in JSON Pointers?","acceptedAnswer":{"@type":"Answer","text":"Because '/' separates tokens, a literal '/' inside a key is encoded as '~1', and a literal '~' is encoded as '~0'. When evaluating, the tool first replaces every '~1' with '/', then every '~0' with '~'. For the URI fragment form, the pointer starts with '#' and is percent-decoded first (e.g. '#/a%20b')."}},{"@type":"Question","name":"How are array indices handled?","acceptedAnswer":{"@type":"Answer","text":"When the current value is an array, the reference token must be a non-negative integer (or '-' which refers to the next, non-existent index and produces an error when resolved). Leading zeros like '01' are invalid and rejected per the RFC."}},{"@type":"Question","name":"Is my JSON sent to a server?","acceptedAnswer":{"@type":"Answer","text":"No. Pointer resolution happens entirely in your browser using JavaScript. Nothing is uploaded, stored, or transmitted. The tool works offline after the page loads."}}]}</script>

const { $, copyText, t } = GZ;

function unescapeToken(seg) {
  return seg.replace(/~1/g, '/').replace(/~0/g, '~');
}

function evaluate(doc, pointer, uriForm) {
  if (uriForm) {
    if (pointer[0] !== '#') throw new Error('URI fragment pointer must start with #');
    pointer = decodeURIComponent(pointer.slice(1));
  }
  if (pointer === '') return { value: doc, root: true };
  if (pointer[0] !== '/') throw new Error('pointer must start with / (or be empty)');
  const segs = pointer.split('/').slice(1);
  let cur = doc;
  for (const raw of segs) {
    const seg = unescapeToken(raw);
    if (Array.isArray(cur)) {
      if (seg === '-') throw new Error("'-' refers to a non-existent array element");
      if (!/^(0|[1-9]\d*)$/.test(seg)) throw new Error('invalid array index "' + seg + '"');
      const idx = Number(seg);
      if (idx >= cur.length) throw new Error('array index ' + idx + ' out of bounds');
      cur = cur[idx];
    } else if (cur !== null && typeof cur === 'object') {
      if (!Object.prototype.hasOwnProperty.call(cur, seg)) throw new Error('member "' + seg + '" not found');
      cur = cur[seg];
    } else {
      throw new Error('cannot resolve "' + seg + '" on a ' + (cur === null ? 'null' : typeof cur) + ' value');
    }
  }
  return { value: cur, root: false };
}

function run() {
  const jRaw = $('#json').value.trim();
  const status = $('#status');
  const results = $('#results');
  results.innerHTML = '';
  if (!jRaw) { status.textContent = ''; status.className = 'jp-status'; return; }
  let doc;
  try { doc = JSON.parse(jRaw); }
  catch (e) {
    status.textContent = t('err') + e.message; status.className = 'jp-status err'; return;
  }
  const uriForm = $('#uriForm').checked;
  const batch = $('#batch').checked;
  const raw = $('#pointers').value;
  let ptrs;
  if (batch) {
    ptrs = raw.split('\n').map(s => s.trim()).filter(Boolean);
  } else {
    // single mode: the whole field is one pointer (empty string = root document)
    ptrs = [raw.trim()];
  }
  if (batch && !ptrs.length) {
    status.textContent = t('errEmpty'); status.className = 'jp-status err'; return;
  }
  let ok = 0;
  for (const p of ptrs) {
    const box = document.createElement('div');
    box.className = 'jp-res';
    try {
      const { value, root } = evaluate(doc, p, uriForm);
      box.innerHTML = '<span class="jp-ptr"></span><span class="jp-val"></span>';
      box.querySelector('.jp-ptr').textContent = p;
      box.querySelector('.jp-val').textContent = root ? t('resRoot') + '\n' + JSON.stringify(value, null, 2) : JSON.stringify(value, null, 2);
      ok++;
    } catch (e) {
      box.className = 'jp-res err';
      box.innerHTML = '<span class="jp-ptr"></span><span class="jp-val"></span>';
      box.querySelector('.jp-ptr').textContent = p;
      box.querySelector('.jp-val').textContent = '✗ ' + e.message;
    }
    results.appendChild(box);
  }
  status.textContent = (batch ? t('okN') : t('ok1')).replace('N', ok);
  status.className = 'jp-status ' + (ok > 0 ? 'ok' : 'err');
}

function loadExample() {
  $('#json').value = JSON.stringify({
    store: { book: [
      { category: 'reference', author: 'Nigel Rees', title: 'Sayings', price: 8.95 },
      { category: 'fiction', author: 'Evelyn Waugh', title: 'Sword', price: 12.99, isbn: '0-553-21311-3' }
    ], bicycle: { color: 'red', price: 19.95 } },
    'a/b': 'escaped slash key'
  }, null, 2);
  $('#pointers').value = [
    '/store/book/0/author',
    '/store/book/1/isbn',
    '/store/bicycle/color',
    '/a~1b',
    '/store/book/5/author'
  ].join('\n');
  run();
}
function doClear() { $('#json').value=''; $('#pointers').value=''; $('#results').innerHTML=''; $('#status').textContent=''; }

$('#json').addEventListener('input', run);
$('#pointers').addEventListener('input', run);
