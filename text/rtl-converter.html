<script>
GZI18n.register({
  en: {
    toolTitle: 'RTL Text Converter',
    toolDesc: 'Convert text direction to right-to-left. Add Unicode bidi markers, reverse text, and format RTL scripts like Arabic and Hebrew.',
    reverse: 'Reverse Text',
    addRLM: 'Add RLM Marker',
    wrapRLE: 'Wrap RLE+PDF',
    addRTLOverride: 'RTL Override (RLO+PDF)',
    removeBidi: 'Remove Bidi Controls',
    step1: 'Type or paste your text in the input area',
    step2: 'Choose a conversion mode (Reverse, RLM Marker, RLE Wrap, etc.)',
    step3: 'Click the conversion button to apply',
    step4: 'Copy the result to use in your document or webpage',
  },
  zh: {
    toolTitle: 'RTL 文本转换器',
    toolDesc: '将文本方向转换为从右到左。添加 Unicode 双向标记、反转文本，适用于阿拉伯语和希伯来语等 RTL 脚本。',
    reverse: '反转文本',
    addRLM: '添加 RLM 标记',
    wrapRLE: '包裹 RLE+PDF',
    addRTLOverride: 'RTL 覆盖 (RLO+PDF)',
    removeBidi: '移除双向控制符',
    step1: '在输入区输入或粘贴文本',
    step2: '选择转换模式（反转、RLM 标记、RLE 包裹等）',
    step3: '点击转换按钮应用',
    step4: '复制结果到文档或网页中使用',
  }
});

const { $, copyText, t } = GZ;

const RLM = '\u200F';
const RLE = '\u202B';
const PDF = '\u202C';
const LRM = '\u200E';
const LRE = '\u202A';
const RLO = '\u202E';

function reverseText(text) {
  return text.split('').reverse().join('');
}

function addRLMMarker(text) {
  return text.split('\n').map(line => RLM + line).join('\n');
}

function wrapRLE(text) {
  return text.split('\n').map(line => RLE + line + PDF).join('\n');
}

function addRTLOverride(text) {
  return text.split('\n').map(line => RLO + line + PDF).join('\n');
}

function removeBidiControls(text) {
  return text.replace(/[\u200E\u200F\u202A\u202B\u202C\u202D\u202E\u2066\u2067\u2068\u2069]/g, '');
}

function doConvert(mode) {
  const inp = $('#input').value;
  if (!inp) return;
  let result = '';
  switch(mode) {
    case 'reverse': result = reverseText(inp); break;
    case 'rlm': result = addRLMMarker(inp); break;
    case 'rle': result = wrapRLE(inp); break;
    case 'rlo': result = addRTLOverride(inp); break;
    case 'clean': result = removeBidiControls(inp); break;
  }
  $('#output').textContent = result;
}

function doClear() { $('#input').value = ''; $('#output').textContent = ''; }

function loadExample() {
  $('#input').value = 'Hello World\nمرحبا بالعالم\nשלום עולם\nThis is a test line';
  doConvert('reverse');
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="doConvert('reverse')">${t('reverse')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doConvert('rlm')">${t('addRLM')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doConvert('rle')">${t('wrapRLE')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doConvert('rlo')">${t('addRTLOverride')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doConvert('clean')">${t('removeBidi')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],

});
