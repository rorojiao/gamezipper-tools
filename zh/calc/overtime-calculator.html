<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "How is overtime calculated?", "acceptedAnswer": {"@type": "Answer", "text": "Overtime is usually paid at 1.5x your regular hourly rate (time-and-a-half) for hours worked beyond the weekly threshold (commonly 40 hours). Multiply overtime hours by 1.5 x hourly rate. Some employers pay double-time (2x) on holidays or over 12 hours/day."}}, {"@type": "Question", "name": "What is time-and-a-half?", "acceptedAnswer": {"@type": "Answer", "text": "Time-and-a-half means you earn 1.5 times your normal hourly wage for each overtime hour. At $20/hour, your overtime rate is $20 x 1.5 = $30/hour."}}, {"@type": "Question", "name": "Is overtime over 40 hours mandatory in the US?", "acceptedAnswer": {"@type": "Answer", "text": "Under the federal Fair Labor Standards Act (FLSA), most non-exempt employees must receive overtime pay at 1.5x for hours worked over 40 in a workweek. Some states like California also require daily overtime. Exempt employees (certain salaried roles) are not covered."}}, {"@type": "Question", "name": "Is my wage information private?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. All calculations run entirely in your browser. No hourly rate, hours or pay data is ever sent to any server."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-form" id="form">
      <div>
        <label id="lbl-rate"></label>
        <input type="number" id="rate" value="20" min="0" step="0.5">
      </div>
      <div class="row2">
        <div>
          <label id="lbl-hours"></label>
          <input type="number" id="hours" value="48" min="0" step="0.5">
        </div>
        <div>
          <label id="lbl-threshold"></label>
          <input type="number" id="threshold" value="40" min="0" step="1">
        </div>
      </div>
      <div class="row2">
        <div>
          <label id="lbl-ot-mult"></label>
          <select id="otMult">
            <option value="1.5">1.5x (time-and-a-half)</option>
            <option value="2">2x (double-time)</option>
            <option value="1.75">1.75x</option>
            <option value="1">1x (no extra)</option>
          </select>
        </div>
        <div>
          <label id="lbl-double-after"></label>
          <input type="number" id="doubleAfter" value="0" min="0" step="1">
        </div>
      </div>
      <div>
        <label id="lbl-currency"></label>
        <select id="currency">
          <option value="$">USD ($)</option>
          <option value="€">EUR (€)</option>
          <option value="£">GBP (£)</option>
          <option value="¥">CNY (¥)</option>
          <option value="₹">INR (₹)</option>
          <option value="A$">AUD (A$)</option>
          <option value="C$">CAD (C$)</option>
        </select>
      </div>
      <button class="gz-btn" id="calc-btn" onclick="calculate()"></button>
    </div>
    <div id="result"></div>
    <p class="note" id="note"></p>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Overtime Calculator',
    toolDesc: 'Calculate overtime pay, regular vs overtime hours, time-and-a-half and double-time, plus your weekly gross wages from hourly rate and hours worked.',
    lblRate: 'Hourly rate',
    lblHours: 'Total hours worked (week)',
    lblThreshold: 'Overtime starts after (hours)',
    lblOtMult: 'Overtime multiplier',
    lblDoubleAfter: 'Double-time after (hours, 0=off)',
    lblCurrency: 'Currency',
    calc: 'Calculate',
    regPay: 'Regular pay',
    otPay: 'Overtime pay',
    dtPay: 'Double-time pay',
    regHrs: 'Regular hours',
    otHrs: 'Overtime hours',
    dtHrs: 'Double-time hours',
    totalLine: 'Estimated weekly gross pay',
    otRate: 'OT rate',
    note: 'Estimates only — not legal or payroll advice. Actual pay depends on your contract and local labor laws (e.g. FLSA in the US, EU Working Time Directive). Exempt/salaried roles may differ.',
    step1: 'Enter your regular hourly rate and the total hours you worked this week.',
    step2: 'Set the overtime threshold (usually 40 hours) and the overtime multiplier.',
    step3: 'Optionally enable double-time after a daily/weekly hour limit.',
    step4: 'Click Calculate to see regular pay, overtime pay and total weekly wages.',
  },
  zh: {
    toolTitle: '加班费计算器',
    toolDesc: '根据时薪和工作时长，计算加班费、常规工时与加班工时、1.5 倍和双倍工资，以及每周应发工资。',
    lblRate: '时薪',
    lblHours: '本周总工作时长',
    lblThreshold: '加班起点（小时）',
    lblOtMult: '加班倍数',
    lblDoubleAfter: '双倍工资起点（小时，0=关闭）',
    lblCurrency: '货币',
    calc: '计算',
    regPay: '常规工资',
    otPay: '加班工资',
    dtPay: '双倍工资',
    regHrs: '常规工时',
    otHrs: '加班工时',
    dtHrs: '双倍工时',
    totalLine: '预计每周应发工资',
    otRate: '加班时薪',
    note: '仅为估算，不构成法律或薪酬建议。实际薪酬以合同和当地劳动法为准（如美国 FLSA、欧盟工时指令），豁免/固定薪资岗位可能不同。',
    step1: '输入常规时薪和本周总工作时长。',
    step2: '设置加班起点（通常为 40 小时）和加班倍数。',
    step3: '可选：设置超过多少小时后按双倍工资计算。',
    step4: '点击「计算」查看常规工资、加班工资和每周总工资。',
  }
});

const { $, t } = GZ;

function money(v, cur) {
  return cur + (Math.round(v * 100) / 100).toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
}

function calculate() {
  const rate = parseFloat($('#rate').value);
  const totalHrs = parseFloat($('#hours').value);
  const threshold = parseFloat($('#threshold').value);
  const otMult = parseFloat($('#otMult').value);
  const dtAfter = parseFloat($('#doubleAfter').value);
  const cur = $('#currency').value;
  if (isNaN(rate) || isNaN(totalHrs) || isNaN(threshold)) { $('#result').innerHTML = ''; return; }

  let regHrs = Math.min(totalHrs, threshold);
  let otHrs = 0, dtHrs = 0;
  const overTime = Math.max(0, totalHrs - threshold);

  if (dtAfter > 0 && totalHrs > dtAfter) {
    // double-time kicks in after dtAfter hours within the overtime region
    if (dtAfter >= threshold) {
      dtHrs = Math.max(0, totalHrs - Math.max(dtAfter, threshold));
      otHrs = Math.max(0, Math.min(totalHrs, dtAfter) - threshold);
    } else {
      otHrs = 0; dtHrs = overTime;
    }
  } else {
    otHrs = overTime;
  }
  // safety clamp
  otHrs = Math.max(0, otHrs);
  dtHrs = Math.max(0, dtHrs);
  if (otHrs + dtHrs !== overTime) { otHrs = overTime - dtHrs; }

  const dtMult = 2;
  const regPay = rate * regHrs;
  const otPay = rate * otMult * otHrs;
  const dtPay = rate * dtMult * dtHrs;
  const total = regPay + otPay + dtPay;

  let grid = `
    <div class="result-item"><div class="val">${regHrs}</div><div class="lbl">${t('regHrs')} · ${money(regPay,cur)}</div></div>
    <div class="result-item"><div class="val">${otHrs}</div><div class="lbl">${t('otHrs')} · ${money(otPay,cur)} (${otMult}x)</div></div>`;
  if (dtHrs > 0) grid += `<div class="result-item"><div class="val">${dtHrs}</div><div class="lbl">${t('dtHrs')} · ${money(dtPay,cur)} (2x)</div></div>`;
  grid += `<div class="result-item"><div class="val">${money(rate*otMult,cur)}</div><div class="lbl">${t('otRate')}</div></div>`;

  $('#result').innerHTML = `<div class="result-card"><div class="big">${money(total,cur)}</div><div class="label">${t('totalLine')}</div><div class="result-grid">${grid}</div></div>`;
}

['rate','hours','threshold','otMult','currency','doubleAfter'].forEach(id => {
  const el = $('#' + id);
  el.addEventListener('input', calculate);
  el.addEventListener('change', calculate);
});
$('#lbl-rate').textContent = t('lblRate');
$('#lbl-hours').textContent = t('lblHours');
$('#lbl-threshold').textContent = t('lblThreshold');
$('#lbl-ot-mult').textContent = t('lblOtMult');
$('#lbl-double-after').textContent = t('lblDoubleAfter');
$('#lbl-currency').textContent = t('lblCurrency');
$('#calc-btn').textContent = t('calc');
$('#note').textContent = t('note');
calculate();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'⏰', href:'/calc/hours-calculator.html', name:'Hours'},
    {icon:'🕒', href:'/calc/timesheet-calculator.html', name:'Timesheet'},
    {icon:'💰', href:'/calc/salary-calculator.html', name:'Salary'},
    {icon:'📈', href:'/calc/pay-raise-calculator.html', name:'Pay Raise'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
