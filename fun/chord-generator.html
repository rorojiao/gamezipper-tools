<script>

    step2: '选择和弦类型（大、小、七、sus、减等）',
    step3: '使用顶部标签切换钢琴与吉他图示',
    step4: '点击「播放」试听和弦（柱式或琶音）',
  }
});

const { $, t } = GZ;

const NOTES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const NOTE_FREQ = {}; // midi 60 = C4 = 261.63
(function(){
  for(let i=0;i<12;i++){
    NOTE_FREQ[NOTES[i]] = 440 * Math.pow(2, (i-9)/12); // octave 4 baseline-ish
  }
})();

// Interval patterns (semitones from root)
const CHORD_TYPES = {
  'major':       {en:'Major',           zh:'大',     sym:'',    iv:[0,4,7],       label:'maj'},
  'minor':       {en:'Minor',           zh:'小',     sym:'m',   iv:[0,3,7],       label:'min'},
  'diminished':  {en:'Diminished',      zh:'减',     sym:'°',   iv:[0,3,6],       label:'dim'},
  'augmented':   {en:'Augmented',       zh:'增',     sym:'+',   iv:[0,4,8],       label:'aug'},
  'sus2':        {en:'Suspended 2',     zh:'sus2',   sym:'sus2',iv:[0,2,7],       label:'sus2'},
  'sus4':        {en:'Suspended 4',     zh:'sus4',   sym:'sus4',iv:[0,5,7],       label:'sus4'},
  'dom7':        {en:'Dominant 7th',    zh:'大小七', sym:'7',   iv:[0,4,7,10],    label:'7'},
  'maj7':        {en:'Major 7th',       zh:'大七',   sym:'maj7',iv:[0,4,7,11],    label:'maj7'},
  'min7':        {en:'Minor 7th',       zh:'小七',   sym:'m7',  iv:[0,3,7,10],    label:'m7'},
  'dim7':        {en:'Diminished 7th',  zh:'减七',   sym:'°7',  iv:[0,3,6,9],     label:'dim7'},
  'm7b5':        {en:'Half-Diminished', zh:'半减',   sym:'ø7',  iv:[0,3,6,10],    label:'m7b5'},
  '6':           {en:'Major 6th',       zh:'大六',   sym:'6',   iv:[0,4,7,9],     label:'6'},
  'm6':          {en:'Minor 6th',       zh:'小六',   sym:'m6',  iv:[0,3,7,9],     label:'m6'},
  '9':           {en:'Dominant 9th',    zh:'九',     sym:'9',   iv:[0,4,7,10,14], label:'9'},
  'maj9':        {en:'Major 9th',       zh:'大九',   sym:'maj9',iv:[0,4,7,11,14], label:'maj9'},
  'm9':          {en:'Minor 9th',       zh:'小九',   sym:'m9',  iv:[0,3,7,10,14], label:'m9'},
  'add9':        {en:'Add 9',           zh:'加九',   sym:'add9',iv:[0,4,7,14],    label:'add9'},
  '11':          {en:'Dominant 11th',   zh:'十一',   sym:'11',  iv:[0,4,7,10,14,17], label:'11'},
  '13':          {en:'Dominant 13th',   zh:'十三',   sym:'13',  iv:[0,4,7,10,14,17,21], label:'13'},
  '5':           {en:'Power Chord',     zh:'五',     sym:'5',   iv:[0,7],         label:'5'},
};

const INTERVAL_NAMES = {0:'R',1:'♭2',2:'2',3:'♭3',4:'3',5:'4',6:'♭5',7:'5',8:'♯5',9:'6',10:'♭7',11:'7',13:'9',14:'9',17:'11',21:'13'};

// Guitar chord shape library (open-position friendly shapes for common keys).
// Fret per string: -1 = mute, 0 = open. Strings: low E A D G B e
const GUITAR_SHAPES = {
  'C-major':    [-1,3,2,0,1,0],
  'C-minor':    [-1,3,5,5,4,3],
  'C-7':        [-1,3,2,3,1,0],
  'C-maj7':     [-1,3,2,0,0,0],
  'C-min7':     [-1,3,5,3,4,3],
  'C-sus4':     [-1,3,3,0,1,1],
  'C-sus2':     [-1,3,5,5,3,3],
  'C-9':        [-1,3,2,3,3,3],
  'D-major':    [-1,-1,0,2,3,2],
  'D-minor':    [-1,-1,0,2,3,1],
  'D-7':        [-1,-1,0,2,1,2],
  'D-maj7':     [-1,-1,0,2,2,2],
  'D-min7':     [-1,-1,0,2,1,1],
  'D-sus4':     [-1,-1,0,2,3,3],
  'D-sus2':     [-1,-1,0,2,3,0],
  'E-major':    [0,2,2,1,0,0],
  'E-minor':    [0,2,2,0,0,0],
  'E-7':        [0,2,0,1,0,0],
  'E-maj7':     [0,2,1,1,0,0],
  'E-min7':     [0,2,0,0,0,0],
  'E-sus4':     [0,2,2,2,0,0],
  'G-major':    [3,2,0,0,0,3],
  'G-minor':    [3,5,5,3,3,3],
  'G-7':        [3,2,0,0,0,1],
  'G-maj7':     [3,2,0,0,0,2],
  'G-min7':     [3,5,3,3,3,3],
  'A-major':    [-1,0,2,2,2,0],
  'A-minor':    [-1,0,2,2,1,0],
  'A-7':        [-1,0,2,0,2,0],
  'A-maj7':     [-1,0,2,1,2,0],
  'A-min7':     [-1,0,2,0,1,0],
  'A-sus4':     [-1,0,2,2,3,0],
  'F-major':    [1,3,3,2,1,1],
  'F-minor':    [1,3,3,1,1,1],
  'F-7':        [1,3,1,2,1,1],
  'F-maj7':     [-1,-1,3,2,1,0],
  'F-min7':     [1,3,1,1,1,1],
  'B-major':    [-1,2,4,4,4,2],
  'B-minor':    [-1,2,4,4,3,2],
  'B-7':        [-1,2,1,2,0,2],
  'B-maj7':     [-1,2,4,3,4,2],
  'B-min7':     [-1,2,0,2,0,2],
};

let mode='piano'; // 'piano' | 'guitar'
let curRoot='C', curType='major';
let audioCtx=null;

function buildTabs(){
  $('#tabs').innerHTML=`
    <div class="cg-tab ${mode==='piano'?'active':''}" data-m="piano">${t('piano')}</div>
    <div class="cg-tab ${mode==='guitar'?'active':''}" data-m="guitar">${t('guitar')}</div>
  `;
  document.querySelectorAll('.cg-tab').forEach(el=>{
    el.onclick=()=>{ mode=el.dataset.m; buildTabs(); render(); };
  });
}

function buildRow(){
  const lang=GZI18n.getLang();
  const typeOpts=Object.keys(CHORD_TYPES).map(k=>{
    const c=CHORD_TYPES[k];
    return `<option value="${k}">${lang==='zh'?c.zh+' '+(c.sym||''):c.en+(c.sym?' ('+c.sym+')':'')}</option>`;
  }).join('');
  const rootOpts=NOTES.map(n=>`<option value="${n}">${n}</option>`).join('');
  $('#row').innerHTML=`
    <label>${t('root')}
      <select class="cg-select" id="root">${rootOpts}</select>
    </label>
    <label>${t('type')}
      <select class="cg-select" id="type">${typeOpts}</select>
    </label>
  `;
  $('#root').value=curRoot; $('#type').value=curType;
  $('#root').onchange=e=>{ curRoot=e.target.value; render(); };
  $('#type').onchange=e=>{ curType=e.target.value; render(); };
}

function buildActions(){
  $('#actions').innerHTML=`
    <button class="gz-btn" id="play-chord">${t('play')}</button>
    <button class="gz-btn gz-btn-secondary" id="play-arp">${t('arpeggio')}</button>
  `;
  $('#play-chord').onclick=()=>playChord(false);
  $('#play-arp').onclick=()=>playChord(true);
}

function chordNotes(){
  const baseIdx=NOTES.indexOf(curRoot);
  const iv=CHORD_TYPES[curType].iv;
  return iv.map(i=>NOTES[(baseIdx+i)%12]);
}

function render(){
  const lang=GZI18n.getLang();
  const ct=CHORD_TYPES[curType];
  const notes=chordNotes();
  const ivs=ct.iv;
  const intervalsStr=ivs.map(i=>INTERVAL_NAMES[i]||i).join(' · ');
  const chordName = curRoot + (ct.sym||'');
  $('#info').innerHTML=`
    <div style="font-size:1.6em;font-weight:800;color:var(--gz-accent)">${chordName}</div>
    <div class="notes">${t('notes')}: ${notes.join(' – ')}</div>
    <div class="interval">${t('intervals')}: ${intervalsStr}</div>
  `;
  if(mode==='piano') renderPiano(notes);
  else renderGuitar();
  renderSuggestions();
}

function renderPiano(notes){
  // 2 octaves of keys, mark chord notes
  const white=['C','D','E','F','G','A','B'];
  const black={0:'C#',1:'D#',3:'F#',4:'G#',5:'A#'};
  let html='<div class="cg-diagram"><svg width="380" height="180" viewBox="0 0 380 180" style="max-width:100%">';
  // White keys
  const wWidth=40, wHeight=160;
  white.forEach((n,i)=>{
    const x=i*wWidth;
    const isOn=notes.includes(n);
    html+=`<rect x="${x}" y="10" width="${wWidth}" height="${wHeight}" fill="${isOn?'#4ecdc4':'#fff'}" stroke="#222" stroke-width="1.5"/>`;
    if(isOn) html+=`<circle cx="${x+wWidth/2}" cy="${wHeight-15}" r="7" fill="#ff6b6b"/>`;
    html+=`<text x="${x+wWidth/2}" y="${wHeight-2}" text-anchor="middle" font-size="11" fill="#333" font-weight="700">${n}</text>`;
  });
  // Black keys (positioned between whites)
  const blackPos=[0,1,3,4,5]; // index in white[] after which a black key sits
  blackPos.forEach(bi=>{
    const bn=black[bi];
    if(!bn) return;
    const x=bi*wWidth+wWidth*0.65;
    const isOn=notes.includes(bn);
    html+=`<rect x="${x}" y="10" width="${wWidth*0.6}" height="${wHeight*0.62}" fill="${isOn?'#4ecdc4':'#111'}" stroke="#000" stroke-width="1"/>`;
    if(isOn) html+=`<circle cx="${x+wWidth*0.3}" cy="${wHeight*0.5}" r="6" fill="#ff6b6b"/>`;
  });
  // second octave
  white.forEach((n,i)=>{
    const x=(i+7)*wWidth;
    const isOn=notes.includes(n);
    html+=`<rect x="${x}" y="10" width="${wWidth}" height="${wHeight}" fill="${isOn?'#4ecdc4':'#fff'}" stroke="#222" stroke-width="1.5"/>`;
    if(isOn) html+=`<circle cx="${x+wWidth/2}" cy="${wHeight-15}" r="7" fill="#ff6b6b"/>`;
    html+=`<text x="${x+wWidth/2}" y="${wHeight-2}" text-anchor="middle" font-size="11" fill="#333" font-weight="700">${n}</text>`;
  });
  blackPos.forEach(bi=>{
    const bn=black[bi];
    if(!bn) return;
    const x=(bi+7)*wWidth+wWidth*0.65;
    const isOn=notes.includes(bn);
    html+=`<rect x="${x}" y="10" width="${wWidth*0.6}" height="${wHeight*0.62}" fill="${isOn?'#4ecdc4':'#111'}" stroke="#000" stroke-width="1"/>`;
    if(isOn) html+=`<circle cx="${x+wWidth*0.3}" cy="${wHeight*0.5}" r="6" fill="#ff6b6b"/>`;
  });
  html+='</svg></div>';
  $('#display').innerHTML=html;
}

function renderGuitar(){
  const key=`${curRoot}-${curType}`;
  const shape=GUITAR_SHAPES[key];
  const lang=GZI18n.getLang();
  const ct=CHORD_TYPES[curType];
  const chordName = curRoot + (ct.sym||'');
  if(!shape){
    $('#display').innerHTML=`<div class="cg-diagram" style="padding:30px;text-align:center"><div style="font-size:1.2em;font-weight:700;margin-bottom:8px">${chordName}</div><div style="opacity:.7">🤷 ${lang==='zh'?'暂无内置该和弦的吉他指法图，请使用钢琴模式查看音符构成。':'No built-in guitar shape for this chord — switch to Piano mode to see the chord notes.'}</div></div>`;
    return;
  }
  // Render fretboard diagram. Strings order: low E A D G B e (6 down to 1)
  const strings=['E','A','D','G','B','e'];
  const numStrings=6, numFrets=5;
  const startX=40, startY=20, cellW=44, cellH=44;
  let html='<div class="cg-diagram"><svg width="290" height="260" viewBox="0 0 290 260" style="max-width:100%">';
  // title
  html+=`<text x="145" y="16" text-anchor="middle" font-size="16" font-weight="800" fill="#4ecdc4">${chordName}</text>`;
  // nut (thick top line) and frets
  html+=`<rect x="${startX}" y="${startY}" width="${cellW*numStrings}" height="6" fill="#fff"/>`;
  for(let f=1;f<=numFrets;f++){
    html+=`<line x1="${startX}" y1="${startY+f*cellH}" x2="${startX+cellW*numStrings}" y2="${startY+f*cellH}" stroke="#888" stroke-width="1"/>`;
  }
  // strings
  for(let s=0;s<numStrings;s++){
    html+=`<line x1="${startX+s*cellW}" y1="${startY}" x2="${startX+s*cellW}" y2="${startY+numFrets*cellH}" stroke="#888" stroke-width="1"/>`;
  }
  // string names
  for(let s=0;s<numStrings;s++){
    html+=`<text x="${startX+s*cellW+cellW/2}" y="${startY-6}" text-anchor="middle" font-size="11" fill="#bbb">${strings[s]}</text>`;
  }
  // open/mute markers above nut
  for(let s=0;s<numStrings;s++){
    const fret=shape[s];
    const x=startX+s*cellW+cellW/2;
    if(fret===0){
      html+=`<circle cx="${x}" cy="${startY-0}" r="7" fill="none" stroke="#4ecdc4" stroke-width="2"/>`;
    }else if(fret===-1){
      html+=`<text x="${x}" y="${startY+3}" text-anchor="middle" font-size="14" fill="#ff6b6b">×</text>`;
    }
  }
  // finger dots
  for(let s=0;s<numStrings;s++){
    const fret=shape[s];
    if(fret>0){
      const cy=startY+(fret-0.5)*cellH;
      const cx=startX+s*cellW+cellW/2;
      html+=`<circle cx="${cx}" cy="${cy}" r="13" fill="#4ecdc4"/>`;
      html+=`<text x="${cx}" y="${cy+5}" text-anchor="middle" font-size="13" font-weight="800" fill="#000">${fret}</text>`;
    }
  }
  html+='</svg></div>';
  $('#display').innerHTML=html;
}

function renderSuggestions(){
  // suggest related diatonic chords in the major key of curRoot
  const baseIdx=NOTES.indexOf(curRoot);
  const majorScale=[0,2,4,5,7,9,11];
  const diatonicQualities=['major','minor','minor','major','major','minor','diminished'];
  const lang=GZI18n.getLang();
  const items=[];
  for(let i=0;i<7;i++){
    const n=NOTES[(baseIdx+majorScale[i])%12];
    const q=diatonicQualities[i];
    const sym=CHORD_TYPES[q].sym||'';
    items.push({root:n, type:q, label:n+sym});
  }
  $('#suggestions').innerHTML=`<div style="grid-column:1/-1;text-align:center;font-weight:700;margin-bottom:4px;color:var(--gz-accent)">${t('relatedChords')} (${curRoot} ${lang==='zh'?'大调':'major'})</div>` +
    items.map(it=>`<div class="cg-sugg" data-root="${it.root}" data-type="${it.type}">${it.label}</div>`).join('');
  document.querySelectorAll('.cg-sugg').forEach(el=>{
    el.onclick=()=>{ curRoot=el.dataset.root; curType=el.dataset.type; buildRow(); render(); };
  });
}

function playChord(arpeggio){
  if(!audioCtx) audioCtx=new (window.AudioContext||window.webkitAudioContext)();
  const baseFreq=NOTE_FREQ[curRoot]/2; // use octave 3 (lower) for warmth
  const ct=CHORD_TYPES[curType];
  const freqs=ct.iv.map(i=> baseFreq * Math.pow(2, i/12) );
  const now=audioCtx.currentTime;
  freqs.forEach((f,i)=>{
    const o=audioCtx.createOscillator();
    const g=audioCtx.createGain();
    o.type='triangle';
    o.frequency.value=f;
    const start=now + (arpeggio? i*0.18 : 0);
    const dur=arpeggio? 0.55 : 1.4;
    g.gain.setValueAtTime(0, start);
    g.gain.linearRampToValueAtTime(0.22, start+0.02);
    g.gain.exponentialRampToValueAtTime(0.001, start+dur);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(start); o.stop(start+dur+0.05);
  });
}
