<script>
GZI18n.register({
  en: {
    toolTitle: 'Glitch Text Generator',
    toolDesc: 'Create creepy glitch and Zalgo text online for free. Add combining marks above and below your letters to make spooky, corrupted, glitchy text for usernames, bios, Discord, Twitter and memes. Copy instantly, runs in your browser.',
    phInput: 'Type your text here…',
    lblUp: 'Marks on top',
    lblMid: 'Marks in middle',
    lblDown: 'Marks below',
    btnCopy: 'Copy glitch text',
    btnClear: 'Clear',
    copied: 'Copied!',
    hint: 'Tip: 1–3 marks reads cleanly; 8+ looks cursed/unreadable.',
    preMild: 'Mild',
    preMedium: 'Medium',
    preCursed: 'Cursed',
    preMax: 'Max chaos',
    step1: 'Type or paste any text into the input box',
    step2: 'Adjust the top, middle and bottom mark sliders',
    step3: 'Use a preset (Mild, Medium, Cursed, Max) for instant styles',
    step4: 'Click Copy and paste into Discord, Twitter, TikTok or anywhere',
  },
  zh: {
    toolTitle: '故障文字生成器（Zalgo）',
    toolDesc: '免费在线生成故障风、Zalgo 诅咒文字。在每个字母上下叠加 Unicode 组合符号，制造诡异、损坏、故障感的文字，适合用户名、简介、Discord、Twitter 和表情包。一键复制，浏览器本地运行。',
    phInput: '在此输入文字…',
    lblUp: '上方符号数',
    lblMid: '中间符号数',
    lblDown: '下方符号数',
    btnCopy: '复制故障文字',
    btnClear: '清空',
    copied: '已复制！',
    hint: '小贴士：1–3 个符号清晰易读，8 个以上变得"被诅咒"般难以辨认。',
    preMild: '轻度',
    preMedium: '中度',
    preCursed: '诅咒',
    preMax: '极限混乱',
    step1: '在输入框中输入或粘贴任意文字',
    step2: '调整上方、中间和下方符号数量的滑块',
    step3: '使用预设（轻度、中度、诅咒、极限）一键切换风格',
    step4: '点击「复制」粘贴到 Discord、Twitter、TikTok 或任何地方',
  }
});

const { $, t, showToast } = GZ;

$('#input').placeholder = t('phInput');
$('#lbl-up').textContent = t('lblUp');
$('#lbl-mid').textContent = t('lblMid');
$('#lbl-down').textContent = t('lblDown');
$('#btn-copy').textContent = t('btnCopy');
$('#btn-clear').textContent = t('btnClear');
$('#hint').textContent = t('hint');

// Combining diacritical mark ranges — classic Zalgo set
const marksUp   = '\u030d\u030e\u0304\u0305\u033f\u0311\u0306\u0310\u0352\u0357\u0351\u0307\u0308\u030a\u0342\u0343\u0344\u034a\u034b\u034c\u0303\u0302\u030c\u0350\u0356\u0313\u0314\u033d\u0309\u0363\u0364\u0365\u0366\u0367\u0368\u0369\u036a\u036b\u036c\u036d\u036e\u036f\u033e\u0353\u0354\u0355\u0358\u0345';
const marksMid  = '\u0315\u031b\u0340\u0341\u0359\u035a\u0320\u0321\u0322\u0323\u0324\u0325\u0326\u0329\u032a\u032b\u032c\u032d\u032e\u032f\u0330\u0331\u0332\u0333\u0339\u033a\u033b\u033c\u0347\u0348\u0349\u034d\u034e\u035b';
const marksDown = '\u0316\u0317\u0318\u0319\u031a\u031c\u031d\u031e\u031f\u0327\u0328\u0334\u0335\u0336\u0337\u0338\u0346\u034f\u035c\u035d\u035e\u035f\u0360\u0361\u0362\u033c\u1d67\u1d68\u1d69\u1d6a\u1d78';

function rand(str) { return str[Math.floor(Math.random() * str.length)]; }

function generate() {
  const text = $('#input').value || '';
  const upN = +$('#up').value;
  const midN = +$('#mid').value;
  const downN = +$('#down').value;
  $('#v-up').textContent = upN;
  $('#v-mid').textContent = midN;
  $('#v-down').textContent = downN;

  let out = '';
  for (const ch of text) {
    if (ch === ' ' || ch === '\n') { out += ch; continue; }
    out += ch;
    for (let i = 0; i < upN; i++) out += rand(marksUp);
    for (let i = 0; i < midN; i++) out += rand(marksMid);
    for (let i = 0; i < downN; i++) out += rand(marksDown);
  }
  $('#output').textContent = out || ' ';
}

// Presets
const presets = [
  { id: 'mild',   label: 'preMild',   up: 1, mid: 0, down: 1 },
  { id: 'medium', label: 'preMedium', up: 3, mid: 1, down: 3 },
  { id: 'cursed', label: 'preCursed', up: 6, mid: 2, down: 6 },
  { id: 'max',    label: 'preMax',    up: 12, mid: 5, down: 12 },
];
const presetHtml = presets.map(p => `<button data-up="${p.up}" data-mid="${p.mid}" data-down="${p.down}">${t(p.label)}</button>`).join('');
$('#presets').innerHTML = presetHtml;
document.querySelectorAll('#presets button').forEach(b => {
  b.addEventListener('click', () => {
    $('#up').value = b.dataset.up;
    $('#mid').value = b.dataset.mid;
    $('#down').value = b.dataset.down;
    generate();
  });
});

['input','up','mid','down'].forEach(id => {
  $('#' + id).addEventListener('input', generate);
  $('#' + id).addEventListener('change', generate);
});

$('#btn-copy').addEventListener('click', async () => {
  const out = $('#output').textContent.trim();
  if (!out) return;
  try {
    await navigator.clipboard.writeText(out);
    showToast(t('copied'));
  } catch (e) {
    const ta = document.createElement('textarea');
    ta.value = out; document.body.appendChild(ta);
    ta.select(); document.execCommand('copy');
    document.body.removeChild(ta);
    showToast(t('copied'));
  }
});

$('#btn-clear').addEventListener('click', () => {
  $('#input').value = '';
  generate();
  $('#input').focus();
});

$('#input').value = 'glitch';
generate();

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🌀', href:'/text/circled-text.html', name:'Circled Text'},
    {icon:'Ⓐ', href:'/text/ascii-art.html', name:'ASCII Art'},
    {icon:'ʇ', href:'/text/upside-down-text.html', name:'Upside-Down Text'},
    {icon:'☔', href:'/text/cursive-text-generator.html', name:'Cursive Text'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
