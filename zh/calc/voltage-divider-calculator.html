<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is a voltage divider?", "acceptedAnswer": {"@type": "Answer", "text": "A voltage divider is a simple circuit made of two resistors in series that produces an output voltage that is a fraction of its input voltage. The output is taken across one of the resistors."}}, {"@type": "Question", "name": "What is the voltage divider formula?", "acceptedAnswer": {"@type": "Answer", "text": "Vout = Vin x R2 / (R1 + R2), where Vin is the input voltage, R1 is the top resistor (connected to Vin), and R2 is the bottom resistor (connected to ground). Vout is measured across R2."}}, {"@type": "Question", "name": "Can this calculator find R1 or R2?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. Leave any one value (Vin, Vout, R1 or R2) blank and fill in the other three. The calculator solves for the missing value automatically."}}, {"@type": "Question", "name": "Why is the actual output voltage lower than calculated?", "acceptedAnswer": {"@type": "Answer", "text": "The formula assumes no load. When you connect a real circuit to Vout, it draws current and pulls the voltage down. To minimize this effect, choose resistor values so the divider current is at least 10x the load current."}}]}</script>

<script>
GZI18n.register({
  en: {
    toolTitle: 'Voltage Divider Calculator',
    toolDesc: 'Solve the voltage divider Vout = Vin × R2/(R1+R2) for any unknown value — supports ohm, kilohm and megohm units with live current and power output.',
    calculate: 'Calculate',
    clear: 'Clear',
    example: 'Example',
    errFill: 'Please fill in exactly 3 of the 4 values to solve for the missing one.',
    errZero: 'Resistances must be greater than zero.',
    errNum: 'Please enter valid numbers.',
    solved: 'Solved',
    current: 'Divider current',
    powerR1: 'Power dissipated by R1',
    powerR2: 'Power dissipated by R2',
    powerTotal: 'Total power',
    ratio: 'Voltage ratio',
    solvedVin: 'To find V',
    step1: 'Enter any 3 of the 4 values: Vin, R1, R2, Vout',
    step2: 'Select the correct unit (Ω, kΩ, MΩ) for each resistor',
    step3: 'Click Calculate to solve for the missing value',
    step4: 'Check the divider current and power to ensure safe operation',
  },
  zh: {
    toolTitle: '分压电阻计算器',
    toolDesc: '解算分压电路 Vout = Vin × R2/(R1+R2)，可求任意未知值 — 支持欧姆、千欧和兆欧单位，并显示电流和功率。',
    calculate: '计算',
    clear: '清空',
    example: '示例',
    errFill: '请在 4 个值中填入恰好 3 个，以求解缺失的那个值。',
    errZero: '电阻必须大于零。',
    errNum: '请输入有效的数字。',
    solved: '已求解',
    current: '分压电流',
    powerR1: 'R1 消耗功率',
    powerR2: 'R2 消耗功率',
    powerTotal: '总功率',
    ratio: '分压比',
    solvedVin: '求解',
    step1: '在 4 个值中填入任意 3 个：Vin、R1、R2、Vout',
    step2: '为每个电阻选择正确的单位（Ω、kΩ、MΩ）',
    step3: '点击「计算」求解缺失值',
    step4: '查看分压电流和功率，确保安全工作',
  }
});

const { $, t } = GZ;

// Read a numeric field; returns null if empty, NaN if invalid.
function readNum(id){
  const v=$('#'+id).value.trim();
  if(v==='') return null;
  const n=parseFloat(v);
  return isNaN(n)?NaN:n;
}
function isBad(x){ return x===NaN; } // detect NaN parse (NaN!==NaN, but strict NaN check below)

function doCalc(){
  $('#result').innerHTML='';
  const r1u=parseFloat($('#r1u').value);
  const r2u=parseFloat($('#r2u').value);
  const Vin=readNum('vin');
  const R1raw=readNum('r1'), R1=(R1raw===null)?null:R1raw*r1u;
  const R2raw=readNum('r2'), R2=(R2raw===null)?null:R2raw*r2u;
  const Vout=readNum('vout');
  const vals=[Vin,R1,R2,Vout];

  if(vals.some(x=>typeof x==='number' && isNaN(x))){ $('#result').innerHTML=`<div class="err">${t('errNum')}</div>`; return; }
  const filled=vals.filter(x=>x!==null).length;
  if(filled!==3){ $('#result').innerHTML=`<div class="err">${t('errFill')}</div>`; return; }
  const idx=vals.findIndex(x=>x===null);

  let _vin=Vin,_r1=R1,_r2=R2,_vout=Vout;
  if(idx===0) _vin=_vout*(_r1+_r2)/_r2;
  else if(idx===1) _r1=_r2*(_vin-_vout)/_vout;
  else if(idx===2) _r2=_r1*_vout/(_vin-_vout);
  else _vout=_vin*_r2/(_r1+_r2);

  if(!isFinite(_r1)||_r1<=0||!isFinite(_r2)||_r2<=0||!isFinite(_vin)){
    $('#result').innerHTML=`<div class="err">${t('errZero')}</div>`; return;
  }

  const current=_vin/(_r1+_r2);
  const pr1=current*current*_r1;
  const pr2=current*current*_r2;
  const ratio=_vout/_vin;

  function fmtVal(r){
    if(r>=1000000) return (r/1000000).toPrecision(4)+' MΩ';
    if(r>=1000) return (r/1000).toPrecision(4)+' kΩ';
    return r.toPrecision(4)+' Ω';
  }
  const fmtP = p => (p>=1?p.toPrecision(4):(p*1000).toPrecision(4)+' m')+' W';
  const missingLabel=['Vin','R1','R2','Vout'][idx];
  const solvedStr = idx===0?_vin.toPrecision(5)+' V' : idx===3?_vout.toPrecision(5)+' V' : fmtVal(idx===1?_r1:_r2);

  $('#result').innerHTML=`<div class="result-box">
    <div class="result-line">${t('solved')} ${missingLabel}:</div>
    <div class="result-big">${solvedStr}</div>
    <div class="result-line">${t('ratio')}: ${(ratio*100).toFixed(2)}%  (${ratio.toPrecision(4)})</div>
    <div class="result-line">${t('current')}: ${(current*1000).toPrecision(4)} mA</div>
    <div class="result-line">${t('powerR1')}: ${fmtP(pr1)}</div>
    <div class="result-line">${t('powerR2')}: ${fmtP(pr2)}</div>
    <div class="result-line">${t('powerTotal')}: ${fmtP(pr1+pr2)}</div>
  </div>`;
}

function doClear(){ ['vin','r1','r2','vout'].forEach(id=>$('#'+id).value=''); $('#result').innerHTML=''; }
function loadExample(){ $('#vin').value='5'; $('#r1').value='1'; $('#r1u').value='1000'; $('#r2').value='2'; $('#r2u').value='1000'; $('#vout').value=''; doCalc(); }

$('#toolbar').innerHTML=`
  <button class="gz-btn" onclick="doCalc()">${t('calculate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'⚡', href:'/calc/wattage-calculator.html', name:'Wattage Calculator'},
    {icon:'🔌', href:'/calc/resistor.html', name:'Resistor Color Code'},
    {icon:'🧮', href:'/calc/matrix-calculator.html', name:'Matrix Calculator'},
    {icon:'🔢', href:'/calc/prime-factorization-calculator.html', name:'Prime Factorization'},
  ]
});
</script>
