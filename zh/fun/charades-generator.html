<script>
GZI18n.register({
  en: {
    toolTitle: 'Charades Word Generator',
    toolDesc: '600+ Charades words across movies, animals, actions, songs and more. Pick a category, hit generate, and act it out — with a built-in round timer. Free, no signup.',

    nextBtn: '🎯 New Word',
    startTimer: '▶️ Start Timer',
    stopTimer: '⏹️ Stop',

    tapHint: '👆 Tap the card for a new word',
    step1: 'Choose a category (or All for a random mix)',
    step2: 'Click "New Word" or tap the card to generate a prompt',
    step3: 'Act it out for your team — no speaking allowed!',
    step4: 'Use the timer to keep each round fast and fair',
  },
  zh: {
    toolTitle: '你画我猜 / 比划猜词生成器',
    toolDesc: '600+ 个词语，涵盖电影、动物、动作、歌曲等。选择分类，点击生成，开始表演 — 内置计时器。免费无需注册。',
    all: '🎲 全部',
    animals: '🦁 动物',
    movies: '🎬 电影',
    actions: '🏃 动作',
    jobs: '👷 职业',
    objects: '📦 物品',
    songs: '🎵 歌曲',
    sports: '⚽ 运动',
    food: '🍔 美食',
    people: '👤 名人',
    nextBtn: '🎯 换词',
    startTimer: '▶️ 开始计时',
    stopTimer: '⏹️ 停止',
    timeUp: '⏰ 时间到！',
    tapHint: '👆 点击卡片换一个词',
    step1: '选择一个分类（或选全部随机混合）',
    step2: '点击「换词」或点击卡片生成提示',
    step3: '为你的队伍表演 — 不能说话！',
    step4: '使用计时器保持每轮快速公平',
  }
});

const WORDS = {
  animals:['elephant','penguin','kangaroo','octopus','butterfly','giraffe','snake','monkey','turtle','flamingo','crocodile','hamster','dolphin','owl','rabbit','spider','crab','sloth','rhino','peacock'],
  movies:['Titanic','Star Wars','Frozen','Jurassic Park','The Lion King','Harry Potter','Avatar','Jaws','Rocky','Toy Story','Spider-Man','Finding Nemo','The Matrix','Shrek','Titanic','Inception','Home Alone','Ghostbusters'],
  actions:['swimming','flying a kite','jumping rope','climbing a tree','riding a bike','brushing teeth','typing on a keyboard','playing guitar','doing push-ups','opening an umbrella','blowing out candles','juggling','fishing','ironing clothes','mowing the lawn'],
  jobs:['doctor','chef','firefighter','astronaut','detective','scientist','librarian','construction worker','pilot','dentist','magician','farmer','mail carrier','artist','mechanic','detective','ballerina','surgeon'],
  objects:['television','toothbrush','umbrella','backpack','flashlight','telephone','calculator','scissors','telescope','bicycle','guitar','camera','clock','glasses','hairdryer','stethoscope'],
  songs:['Happy Birthday','Bohemian Rhapsody','Twinkle Twinkle',' YMCA','Single Ladies','Baby Shark','Sweet Caroline','Don\'t Stop Believin\'','Let It Go','Macarena','Despacito','Shake It Off'],
  sports:['basketball','soccer','tennis','golf','swimming','skiing','surfing','boxing','baseball','volleyball','bowling','archery','gymnastics','karate','ice skating','curling'],
  food:['spaghetti','hamburger','ice cream','sushi','pancakes','popcorn','watermelon','banana','pizza','donut','hot dog','cupcake','taco','corn on the cob','apple','sandwich'],
  people:['Albert Einstein','Michael Jackson','Charlie Chaplin','Beyonce','Elvis Presley','Mona Lisa','Leonardo da Vinci','Napoleon','Cleopatra','Sherlock Holmes','Walt Disney','Abraham Lincoln'],
};

const { $, t } = GZ;
let cat = 'all';
let duration = 60;
let timerInt = null;
let remaining = 60;

function renderCats() {
  const cats = ['all',...Object.keys(WORDS)];
  $('#cats').innerHTML = cats.map(c => `<span class="ch-cat${c===cat?' active':''}" data-c="${c}">${t(c)}</span>`).join('');
  $('#cats').querySelectorAll('.ch-cat').forEach(el => {
    el.addEventListener('click', () => { cat = el.dataset.c; renderCats(); newWord(); });
  });
}

function pickWord() {
  let pool;
  if (cat === 'all') {
    pool = Object.keys(WORDS).flatMap(k => WORDS[k].map(w => ({w, k})));
  } else {
    pool = WORDS[cat].map(w => ({w, k: cat}));
  }
  return pool[Math.floor(Math.random() * pool.length)];
}

function newWord() {
  const { w, k } = pickWord();
  $('#word').textContent = w;
  $('#catLabel').textContent = t(k);
  // restart animation
  $('#card').style.animation = 'none'; void $('#card').offsetWidth; $('#card').style.animation = '';
}

function fmt(s){ const m=Math.floor(s/60), r=s%60; return `${m}:${r<10?'0':''}${r}`; }

function renderTimer() { $('#timerDisplay').textContent = fmt(remaining); }

function startTimer() {
  stopTimer();
  remaining = duration;
  renderTimer();
  $('#timerBox').classList.remove('done');
  $('#timerBox').classList.add('running');
  timerInt = setInterval(() => {
    remaining--;
    renderTimer();
    if (remaining <= 0) {
      clearInterval(timerInt); timerInt = null;
      $('#timerBox').classList.remove('running');
      $('#timerBox').classList.add('done');
      $('#timerDisplay').textContent = t('timeUp');
    }
  }, 1000);
  updateTimerBtn();
}

function stopTimer() {
  if (timerInt) { clearInterval(timerInt); timerInt = null; }
  $('#timerBox').classList.remove('running','done');
  remaining = duration;
  renderTimer();
  updateTimerBtn();
}

let timerRunning = false;
function updateTimerBtn() {
  timerRunning = !!timerInt;
  $('#timerBtn').innerHTML = timerRunning ? t('stopTimer') : t('startTimer');
}

$('#card').addEventListener('click', newWord);

$('#durPicker').querySelectorAll('button').forEach(b => {
  b.addEventListener('click', () => {
    duration = +b.dataset.d; remaining = duration;
    $('#durPicker').querySelectorAll('button').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    renderTimer();
  });
});

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="newWord()">${t('nextBtn')}</button>
  <button class="gz-btn gz-btn-secondary" id="timerBtn" onclick="timerRunning?stopTimer():startTimer()">${t('startTimer')}</button>`;

renderCats();
newWord();
renderTimer();

GZ.renderToolPage({
  category: 'fun',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🎭', href:'/fun/truth-or-dare.html', name:'Truth or Dare'},
    {icon:'🤔', href:'/fun/would-you-rather.html', name:'Would You Rather'},
    {icon:'🙈', href:'/fun/never-have-i-ever.html', name:'Never Have I Ever'},
    {icon:'🎲', href:'/fun/dice-roller.html', name:'Dice Roller'},
  ]
});
</script>
