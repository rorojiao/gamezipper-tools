<script>
GZI18n.register({
  en: {
    toolTitle: 'JSON to Zod Schema Converter',
    toolDesc: 'Convert any JSON into clean, ready-to-use Zod validation schemas with named types, arrays, unions and optional fields.',
    rootName: 'root name',
    useOptional: 'mark nullable as optional',
    useExport: 'export schemas',
    inferEmail: 'infer email() for email fields',
    valid: '✓ Valid JSON',
    invalid: '✗ Invalid JSON',
    step1: 'Paste valid JSON into the left input area',
    step2: 'Set the root schema name and toggle options',
    step3: 'Copy the generated Zod schema into your TypeScript project',
    step4: 'Validate at runtime with schema.parse(data) or schema.safeParse(data)',
  },
  zh: {
    toolTitle: 'JSON 转 Zod Schema 转换器',
    toolDesc: '将任意 JSON 转换为整洁、可直接使用的 Zod 校验 schema，自动生成命名类型、数组、联合类型和可选字段。',
    rootName: '根 schema 名',
    useOptional: '将可空字段标记为 optional',
    useExport: '导出 schema',
    inferEmail: '为邮箱字段推断 email()',
    valid: '✓ JSON 有效',
    invalid: '✗ JSON 无效',
    step1: '在左侧输入区粘贴有效的 JSON',
    step2: '设置根 schema 名称并切换选项',
    step3: '将生成的 Zod schema 复制到你的 TypeScript 项目',
    step4: '运行时用 schema.parse(data) 或 schema.safeParse(data) 校验',
  }
});

const { $, copyText, t } = GZ;
let schemaCounter = 0;
const namedSchemas = new Map();
const referenced = new Set();

function isEmail(v){ return typeof v==='string' && /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v); }
function indent(s, n){ return s.split('\n').map(l => l ? '  '.repeat(n)+l : l).join('\n'); }

function typeNameFor(key){
  const base = key ? key.replace(/[^a-zA-Z0-9_$]/g,'') : '';
  return (base.charAt(0).toUpperCase()+base.slice(1)) || 'Item';
}

function inferType(value, nameHint, path){
  if (value === null) return { code: 'z.null()', inline: true };
  if (Array.isArray(value)) {
    if (value.length === 0) return { code: 'z.array(z.any())', inline: true };
    const elemTypes = new Set();
    let inlineCodes = [];
    let inlineOnly = true;
    for (const el of value) {
      const r = inferType(el, nameHint, path);
      if (r.ref) referenced.add(r.ref);
      if (r.inline) inlineCodes.push(r.code);
      else { elemTypes.add(r.ref); inlineOnly = false; }
    }
    // unique inline codes
    inlineCodes = [...new Set(inlineCodes)];
    if (inlineCodes.length > 1) {
      return { code: `z.array(z.union([${inlineCodes.join(', ')}]))`, inline: true };
    } else if (inlineCodes.length === 1) {
      return { code: `z.array(${inlineCodes[0]})`, inline: true };
    }
    // only named refs
    const refs = [...new Set([...elemTypes, ...inlineCodes])];
    if (refs.length > 1) return { code: `z.array(z.union([${refs.join(', ')}]))`, inline: true };
    return { code: `z.array(${refs[0]})`, inline: true };
  }
  const t2 = typeof value;
  if (t2 === 'string') {
    if ($('#optEmail').checked && isEmail(value)) return { code: 'z.string().email()', inline: true };
    return { code: 'z.string()', inline: true };
  }
  if (t2 === 'number') {
    return { code: Number.isInteger(value) ? 'z.number().int()' : 'z.number()', inline: true };
  }
  if (t2 === 'boolean') return { code: 'z.boolean()', inline: true };
  // object -> named schema
  const tn = typeNameFor(nameHint) || ('Nested'+(++schemaCounter));
  if (!namedSchemas.has(tn)) {
    namedSchemas.set(tn, null); // mark in progress to avoid infinite recursion
    const lines = Object.entries(value).map(([k,v]) => {
      const r = inferType(v, k, path+'.'+k);
      if (r.ref) referenced.add(r.ref);
      let code = r.inline ? r.code : r.ref;
      if ($('#optOptional').checked && (v === null || v === undefined)) code += '.optional()';
      const safeKey = /^[a-zA-Z_$][a-zA-Z0-9_$]*$/.test(k) ? k : `"${k}"`;
      return `${safeKey}: ${code}`;
    });
    namedSchemas.set(tn, lines.join(',\n'));
  }
  return { ref: tn, inline: false };
}

function highlight(code){
  return code.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\b(z\.\w+|true|false|null)\b/g, '<span class="zs-fn">$1</span>')
    .replace(/("[.*?]")/g, m => m); // keep simple
}

function convert(){
  const inp = $('#input').value.trim();
  if (!inp){ $('#output').innerHTML=''; $('#status').innerHTML=''; return; }
  let parsed;
  try {
    parsed = JSON.parse(inp);
    $('#status').innerHTML = `<span style="color:var(--gz-success)">${t('valid')}</span>`;
  } catch(e){
    $('#status').innerHTML = `<span style="color:var(--gz-accent)">${t('invalid')}: ${e.message}</span>`;
    $('#output').innerHTML = `<span style="color:var(--gz-accent)">${e.message}</span>`;
    return;
  }
  schemaCounter = 0;
  namedSchemas.clear();
  referenced.clear();
  const rootName = ($('#rootName').value.trim() || 'Schema').replace(/[^a-zA-Z0-9_$]/g,'') || 'Schema';
  const result = inferType(parsed, rootName, 'root');
  if (result.ref) referenced.add(result.ref);

  const exportKw = $('#optExport').checked ? 'export ' : '';
  let out = '';
  // nested named schemas (in insertion order, excluding root)
  for (const [name, body] of namedSchemas.entries()) {
    if (name === rootName) continue;
    out += `${exportKw}const ${name} = z.object({\n${indent(body,1)}\n});\n\n`;
  }
  // root
  if (result.inline) {
    out += `${exportKw}const ${rootName} = ${result.code};\n`;
  } else {
    // root is a named object; rename its schema block to rootName
    const body = namedSchemas.get(result.ref);
    out += `${exportKw}const ${rootName} = z.object({\n${indent(body,1)}\n});\n`;
  }
  $('#output').textContent = out;
}

function loadExample(){
  $('#input').value = JSON.stringify({
    user: { id: 42, name: "Alice", email: "alice@example.com", bio: null, verified: true },
    items: [ { sku: "A1", qty: 3 }, { sku: "B2", qty: 1 } ],
    tags: ["dev","tool","free"],
    score: 98.6
  }, null, 2);
  convert();
}

function doClear(){ $('#input').value=''; $('#output').textContent=''; $('#status').innerHTML=''; }

$('#input').addEventListener('input', convert);

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="convert()">${t('convert')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

});
</script>
