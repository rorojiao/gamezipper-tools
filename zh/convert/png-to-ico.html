<script>

  zh: {

    toolDesc: '将 PNG 图片转换为多尺寸 ICO 网站图标文件。从一张 PNG 生成 16×16 到 256×256 的图标 — 完全浏览器本地运行，无需上传。',
    dropHere: '拖拽 PNG 文件到此处或点击上传',

    download: '下载 .ico',
    sizesLabel: '包含的尺寸：',
    step1: '拖拽或上传一张 PNG 图片（方形，建议 256×256 或更大）',
    step2: '勾选你想要在 ICO 文件中包含的图标尺寸',

const { $, t } = GZ;
let pngImg = null;
let pngName = 'favicon';

const ALL_SIZES = [16, 24, 32, 48, 64, 128, 256];
const DEFAULT_SIZES = new Set([16, 32, 48, 64, 128, 256]);

const dropZone = $('#dropZone');
const fileInput = $('#fileInput');
dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('dragover'); if (e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]); });
fileInput.addEventListener('change', e => { if (e.target.files[0]) loadFile(e.target.files[0]); });

function loadFile(file) {
  if (!file.type.startsWith('image/')) { $('#status').textContent = 'Please upload an image file'; return; }
  pngName = (file.name.replace(/\.[^.]+$/, '') || 'favicon');
  const url = URL.createObjectURL(file);
  pngImg = new Image();
  pngImg.onload = () => {
    $('#preview').innerHTML = `<img src="${url}" alt="PNG preview">`;
    $('#status').textContent = `Loaded: ${pngImg.naturalWidth}×${pngImg.naturalHeight} (${(file.size/1024).toFixed(1)} KB)`;
    $('#sizeGrid').style.display = 'none';
  };
  pngImg.onerror = () => { $('#status').textContent = 'Failed to load image'; pngImg = null; };
  pngImg.src = url;
}

// Render size picker
$('#sizePick').innerHTML = `<span style="width:100%;text-align:center;margin-bottom:4px;font-size:.85em;color:var(--text2)">${t('sizesLabel')}</span>` +
  ALL_SIZES.map(s => `<label><input type="checkbox" value="${s}" ${DEFAULT_SIZES.has(s)?'checked':''}> ${s}×${s}</label>`).join('');

// Resize source to target size, return PNG blob bytes
async function resizeToPngBytes(size) {
  const c = document.createElement('canvas');
  c.width = size; c.height = size;
  const ctx = c.getContext('2d');
  ctx.imageSmoothingEnabled = true;
  ctx.imageSmoothingQuality = 'high';
  // Cover-fit (square) the source into the target square
  const sw = pngImg.naturalWidth, sh = pngImg.naturalHeight;
  const scale = Math.max(size / sw, size / sh);
  const dw = sw * scale, dh = sh * scale;
  ctx.drawImage(pngImg, (size - dw) / 2, (size - dh) / 2, dw, dh);
  const blob = await new Promise(res => c.toBlob(res, 'image/png'));
  return new Uint8Array(await blob.arrayBuffer());
}

// Build ICO file bytes from array of {size, pngBytes}
function buildIco(images) {
  const count = images.length;
  const headerSize = 6;
  const dirSize = 16 * count;
  let offset = headerSize + dirSize;
  const parts = [];
  // ICONDIR
  const header = new Uint8Array(headerSize);
  const hdv = new DataView(header.buffer);
  hdv.setUint16(0, 0, true);   // reserved
  hdv.setUint16(2, 1, true);   // type = 1 (icon)
  hdv.setUint16(4, count, true);
  parts.push(header);
  // ICONDIRENTRYs
  const dir = new Uint8Array(dirSize);
  const dv = new DataView(dir.buffer);
  images.forEach((img, i) => {
    const b = i * 16;
    const dim = img.size >= 256 ? 0 : img.size;
    dv.setUint8(b + 0, dim);            // width
    dv.setUint8(b + 1, dim);            // height
    dv.setUint8(b + 2, 0);              // color count (0 = no palette)
    dv.setUint8(b + 3, 0);              // reserved
    dv.setUint16(b + 4, 1, true);       // planes
    dv.setUint16(b + 6, 32, true);      // bit count
    dv.setUint32(b + 8, img.bytes.length, true); // bytes in res
    dv.setUint32(b + 12, offset, true); // image offset
    offset += img.bytes.length;
  });
  parts.push(dir);
  images.forEach(img => parts.push(img.bytes));
  // Concatenate
  const total = parts.reduce((s, p) => s + p.length, 0);
  const out = new Uint8Array(total);
  let p = 0;
  for (const part of parts) { out.set(part, p); p += part.length; }
  return out;
}

async function convertToICO() {
  if (!pngImg) { $('#status').textContent = 'Please upload a PNG first'; return; }
  const checked = [...document.querySelectorAll('#sizePick input:checked')].map(c => +c.value).sort((a,b)=>a-b);
  if (!checked.length) { $('#status').textContent = 'Select at least one size'; return; }
  $('#status').textContent = 'Converting…';
  try {
    const images = [];
    const grid = $('#sizeGrid');
    grid.innerHTML = '';
    for (const size of checked) {
      const bytes = await resizeToPngBytes(size);
      images.push({ size, bytes });
      // preview
      const cell = document.createElement('div');
      const c = document.createElement('canvas');
      c.width = c.height = size;
      const ctx = c.getContext('2d');
      const tmp = document.createElement('canvas');
      tmp.width = tmp.height = size;
      const blob = new Blob([bytes], {type:'image/png'});
      const img2 = new Image();
      img2.src = URL.createObjectURL(blob);
      await new Promise(r => { img2.onload = r; img2.onerror = r; });
      ctx.drawImage(img2, 0, 0);
      const disp = document.createElement('canvas');
      const d = Math.min(size, 96);
      disp.width = disp.height = d;
      disp.getContext('2d').drawImage(c, 0, 0, d, d);
      cell.appendChild(disp);
      const lbl = document.createElement('span');
      lbl.textContent = `${size}×${size}`;
      cell.appendChild(lbl);
      grid.appendChild(cell);
    }
    grid.style.display = 'flex';
    const ico = buildIco(images);
    const blob = new Blob([ico], { type: 'image/x-icon' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = pngName + '.ico';
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 4000);
    $('#status').innerHTML = `✓ Generated <b>${pngName}.ico</b> with ${images.length} size${images.length>1?'s':''} (${checked.map(s=>s+'×'+s).join(', ')}) — ${(blob.size/1024).toFixed(1)} KB`;
  } catch (e) {
    $('#status').textContent = 'Error: ' + e.message;
  }
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="convertToICO()">${t('convert')}</button>`;
