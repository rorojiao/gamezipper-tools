const { $, t } = GZ;

// Tokenizer: converts expression into JS-evaluable form
function tokenize(expr) {
  // Normalize: uppercase words -> symbols, then strip ALL whitespace
  let s = expr.toUpperCase();
  s = s.replace(/\bAND\b/g, '&').replace(/\bOR\b/g, '|').replace(/\bNOT\b/g, '!')
       .replace(/\bXOR\b/g, '^').replace(/\bNAND\b/g, '@').replace(/\bNOR\b/g, '#')
       .replace(/\./g, '&').replace(/×/g, '&').replace(/\+/g, '|').replace(/¬/g,'!')
       .replace(/⊕/g, '^').replace(/~/g, '!').replace(/'/g, '!')
       .replace(/\s+/g, '');
  return s;
}

function extractVars(s) {
  const set = new Set();
  for (const ch of s) {
    if (ch >= 'A' && ch <= 'Z') set.add(ch);
  }
  return [...set].sort();
}

// Recursive descent parser for boolean expressions
function parse(expr) {
  let i = 0;
  const s = expr;
  function peek() { return s[i]; }
  function parseExpr() { return parseXor(); }
  function parseXor() {
    let left = parseNor();
    while (peek() === '^') { i++; left = left ^ parseNor(); }
    return left;
  }
  // handle NAND(@) and NOR(#) at OR level (lowest after XOR for simplicity treat as binary then NOT)
  function parseNor() {
    let left = parseOr();
    while (peek() === '#' || peek() === '@') {
      const op = s[i++]; const right = parseOr();
      if (op === '@') left = !(left & right) ? 1 : 0; // NAND
      else left = !(left | right) ? 1 : 0;            // NOR
    }
    return left;
  }
  function parseOr() {
    let left = parseAnd();
    while (peek() === '|') { i++; left = left | parseAnd(); }
    return left;
  }
  function parseAnd() {
    let left = parseNot();
    while (peek() === '&') { i++; left = left & parseNot(); }
    return left;
  }
  function parseNot() {
    if (peek() === '!') { i++; return parseNot() ? 0 : 1; }
    return parseAtom();
  }
  function parseAtom() {
    const ch = peek();
    if (ch === '(') { i++; const v = parseExpr(); if (peek() === ')') i++; else throw new Error('Missing ")"'); return v; }
    if (ch >= 'A' && ch <= 'Z') { i++; return ctx[ch]; }
    if (ch === '0') { i++; return 0; }
    if (ch === '1') { i++; return 1; }
    throw new Error('Unexpected character "'+(ch||'')+'"');
  }
  let ctx = {};
  const v = parseExpr();
  if (i < s.length) throw new Error('Unexpected "'+s[i]+'" at position '+i);
  return { eval: function(c) { ctx = c; i = 0; return parseExpr(); } };
}

let cachedAst = null;
let cachedVars = [];

function evaluate() {
  const raw = $('#input').value.trim();
  $('#err').textContent = '';
  if (!raw) { $('#result').style.display='none'; $('#tt-wrap').style.display='none'; return; }
  try {
    const norm = tokenize(raw);
    cachedVars = extractVars(norm);
    // validate: only allowed chars
    if (!/^[A-Z0-9()!&|^@#]*$/.test(norm)) {
      throw new Error('Invalid character. Use A-Z, AND, OR, NOT, XOR, NAND, NOR, ( )');
    }
    cachedAst = parse(norm);
    // quick test eval
    const testCtx = {}; cachedVars.forEach(v => testCtx[v] = 1);
    cachedAst.eval(testCtx);

    $('#result').style.display = 'block';
    $('#result').innerHTML = `<div class="vars">${t('varsFound')} <b>${cachedVars.join(', ')||'—'}</b></div>`;

    renderTable();
    $('#tt-wrap').style.display = 'block';
  } catch (e) {
    $('#err').textContent = '✗ ' + e.message;
    $('#result').style.display='none';
    $('#tt-wrap').style.display='none';
  }
}

function renderTable() {
  const vars = cachedVars;
  const n = vars.length;
  const headers = vars.concat(['Y']);
  const rows = n === 0 ? 1 : (1 << n);
  let body = '';
  for (let r = 0; r < rows; r++) {
    const ctx = {};
    vars.forEach((v, idx) => { ctx[v] = (r >> (n - 1 - idx)) & 1; });
    let y;
    try { y = cachedAst.eval({ ...ctx }); } catch(e) { y = '?'; }
    const cells = vars.map(v => `<td>${ctx[v]}</td>`).join('');
    body += `<tr>${cells}<td class="out-${y}">${y}</td></tr>`;
  }
  $('#table').innerHTML = `<thead><tr>${headers.map(h=>`<th>${h}</th>`).join('')}</tr></thead><tbody>${body}</tbody>`;
}

const chips = ['AND','OR','NOT','XOR','NAND','NOR','(',')','A','B','C'];
$('#chips').innerHTML = chips.map(c => `<span class="chip" onclick="insert('${c}')">${c}</span>`).join('');

function insert(c) {
  const ta = $('#input');
  const op = (c === '(' || c === ')') ? c : ' ' + c + ' ';
  const start = ta.selectionStart, end = ta.selectionEnd;
  ta.value = ta.value.slice(0,start) + op + ta.value.slice(end);
  ta.focus();
  ta.selectionEnd = start + op.length;
  evaluate();
}
function loadExample() { $('#input').value = '(A AND B) OR (NOT C AND D)'; evaluate(); }
function doClear() { $('#input').value=''; evaluate(); }

$('#input').addEventListener('input', evaluate);
$('#toolbar').innerHTML = `

  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;
