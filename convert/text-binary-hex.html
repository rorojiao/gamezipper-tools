lblBase2:'(二进制)',
lblBase16:'(十六进制)',
lblBase10:'(十进制)',
lblBase8:'(八进制)',
btnSwapBin:'粘贴二进制 → 解码',
btnSwapHex:'粘贴十六进制 → 解码',
btnSwapBase64:'粘贴 Base64 → 解码',

step4:'点击任意输出的复制按钮复制到剪贴板',

const { $, copyText, t } = GZ;

function textToBin(text) {
return Array.from(text).map(c => c.charCodeAt(0).toString(2).padStart(8, '0')).join(' ');
}
function textToHex(text) {
return Array.from(text).map(c => c.charCodeAt(0).toString(16).toUpperCase().padStart(2,'0')).join(' ');
}
function textToDec(text) {
return Array.from(text).map(c => c.charCodeAt(0).toString(10)).join(' ');
}
function textToOct(text) {
return Array.from(text).map(c => c.charCodeAt(0).toString(8).padStart(3,'0')).join(' ');
}
function textToBase64(text) {
try { return btoa(unescape(encodeURIComponent(text))); } catch(e) { return ''; }
}

function binToText(bin) {
return bin.trim().split(/\s+/).map(b => String.fromCharCode(parseInt(b, 2))).join('');
}
function hexToText(hex) {
return hex.trim().split(/\s+/).map(h => String.fromCharCode(parseInt(h, 16))).join('');
}
function base64ToText(b64) {
try { return decodeURIComponent(escape(atob(b64.trim()))); } catch(e) { return ''; }
}

function doConvert() {
const text = $('#input').value;
if (!text) {
$('#out-bin').textContent = '';
$('#out-hex').textContent = '';
$('#out-dec').textContent = '';
$('#out-oct').textContent = '';
$('#out-base64').textContent = '';
return;
}
$('#out-bin').textContent = textToBin(text);
$('#out-hex').textContent = textToHex(text);
$('#out-dec').textContent = textToDec(text);
$('#out-oct').textContent = textToOct(text);
$('#out-base64').textContent = textToBase64(text);
}

$('#input').addEventListener('input', doConvert);

function swapBin() { const text = binToText($('#out-bin').textContent); if(text) { $('#input').value = text; doConvert(); } }
function swapHex() { const text = hexToText($('#out-hex').textContent); if(text) { $('#input').value = text; doConvert(); } }
function swapBase64() { const text = base64ToText($('#out-base64').textContent); if(text) { $('#input').value = text; doConvert(); } }

function loadExample() {
$('#input').value = 'Hello World! 🌍';
doConvert();
}

function doClear() { $('#input').value=''; doConvert(); }

$('#lbl-base2').textContent = t('lblBase2');
$('#lbl-base16').textContent = t('lblBase16');
$('#lbl-base10').textContent = t('lblBase10');
$('#lbl-base8').textContent = t('lblBase8');

$('#toolbar').innerHTML = `
<button class="gz-btn gz-btn-secondary" onclick="swapBin()">${t('btnSwapBin')}</button>
<button class="gz-btn gz-btn-secondary" onclick="swapHex()">${t('btnSwapHex')}</button>
<button class="gz-btn gz-btn-secondary" onclick="swapBase64()">${t('btnSwapBase64')}</button>
<button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('btnExample')}</button>
<button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('btnClear')}</button>`;
