<script>

  zh:{

    toolDesc:'对带分数和分数进行加、减、乘、除运算。结果会自动约分，并显示为带分数、假分数和小数三种形式，附带详细步骤。',

    lblB:'第二个数',
    calculate:'⚡ 计算',copy:'复制',clear:'清空',
    mixedLabel:'带分数',
    improperLabel:'假分数',
    decimalLabel:'小数',
    invalid:'无法解析数字。请使用 2 1/3、7/3、0.5 或 5 这样的格式。',
    enterBoth:'输入两个数后点击计算。',
    steps:'步骤',
    stepTo:'→ 假分数',
    stepResult:'= 结果',
    stepA1:'步骤 1：转换为假分数',
    step2:'步骤 2：计算结果',
    step3:'步骤 3：约分',
    divideZero:'除数不能为零。',
    step1:'输入第一个数（整数、分数或带分数）',
    step2:'选择运算：+、−、× 或 ÷',
    step3:'输入第二个数并点击「计算」',
    step4:'查看约分后的带分数、假分数和小数',
  }
});

const { $, copyText, t } = GZ;
let op='+';

function gcd(a,b){ a=Math.abs(a);b=Math.abs(b); while(b){[a,b]=[b,a%b];} return a||1; }

// returns {num, den} improper fraction, or null on failure
function parseFrac(str){
  str=String(str).trim();
  if(!str) return null;
  if(/^[-+]?\d+(\.\d+)?$/.test(str)){
    const dec=parseFloat(str);
    // convert decimal to fraction
    const neg=dec<0; const a=Math.abs(dec);
    let den=1; while(Math.round(a*den)!==a*den && den<1e9) den*=10;
    let num=Math.round(a*den);
    if(neg) num=-num;
    return simplify({num,den});
  }
  const neg=str.startsWith('-');
  if(str.startsWith('+')||str.startsWith('-')) str=str.slice(1).trim();
  // mixed: "2 1/3"
  const m=str.match(/^(\d+)\s+(\d+)\/(\d+)$/);
  if(m){
    let whole=+m[1], n=+m[2], d=+m[3];
    if(d===0) return null;
    return simplify({num:(neg?-1:1)*(whole*d+n),den:d});
  }
  // fraction "7/3"
  const f=str.match(/^(\d+)\/(\d+)$/);
  if(f){ const n=+f[1],d=+f[2]; if(d===0) return null; return simplify({num:(neg?-1:1)*n,den:d}); }
  return null;
}
function simplify(fr){ const g=gcd(fr.num,fr.den); return {num:fr.num/g, den:fr.den/g}; }

function toMixed(fr){
  let {num,den}=fr;
  if(den===1) return num+'';
  const whole=Math.trunc(num/den);
  const rem=Math.abs(num%den);
  if(whole===0) return `${num}/${den}`;
  const sign = num<0 && whole===0 ? '-' : (num<0?'-':'');
  if(rem===0) return whole+'';
  return `${sign}${Math.abs(whole)} ${rem}/${den}`;
}
function toImproper(fr){ return `${fr.num}/${fr.den}`; }

function calc(){
  const a=parseFrac($('#inA').value), b=parseFrac($('#inB').value);
  const el=$('#resultBig'),meta=$('#resultMeta');
  if(!a||!b){ el.textContent='—'; meta.innerHTML=t('enterBoth'); return; }
  let r;
  const steps=[`${t('stepA1')}: ${toImproper(a)} ${op} ${toImproper(b)}`];
  if(op==='+'){ r={num:a.num*b.den+b.num*a.den, den:a.den*b.den}; }
  else if(op==='-'){ r={num:a.num*b.den-b.num*a.den, den:a.den*b.den}; }
  else if(op==='*'){ r={num:a.num*b.num, den:a.den*b.den}; }
  else if(op==='/'){ if(b.num===0){ el.textContent='—'; meta.innerHTML=t('divideZero'); return; } r={num:a.num*b.den, den:a.den*b.num}; }
  r=simplify(r);
  steps.push(`${t('stepResult')}: ${toImproper(r)} ${t('step3')} → ${toMixed(r)}`);
  el.textContent = toMixed(r);
  meta.innerHTML =
    `<div class="mn-equiv">`+
    `<span>${t('mixedLabel')}: <b>${toMixed(r)}</b></span>`+
    `<span>${t('improperLabel')}: <b>${toImproper(r)}</b></span>`+
    `<span>${t('decimalLabel')}: <b>${(r.num/r.den).toFixed(6).replace(/\.?0+$/,'')}</b></span>`+
    `</div>`+
    `<div style="margin-top:8px">${steps.map(s=>`<div>${s}</div>`).join('')}</div>`;
}

document.querySelectorAll('.mn-op').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.mn-op').forEach(x=>x.classList.remove('active'));
    btn.classList.add('active');
    op=btn.dataset.op;
    calc();
  });
});
$('#calcBtn').addEventListener('click',calc);
$('#inA').addEventListener('input',calc);
$('#inB').addEventListener('input',calc);
$('#inA').addEventListener('keydown',e=>{if(e.key==='Enter')calc();});
$('#inB').addEventListener('keydown',e=>{if(e.key==='Enter')calc();});

$('#toolbar').innerHTML=`
  <button class="gz-btn" onclick="calc()">${t('calculate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="copyText($('#resultBig').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#inA').value='';$('#inB').value='';calc()">${t('clear')}</button>`;
$('#lbl-a').textContent=t('lblA');
$('#lbl-b').textContent=t('lblB');

GZ.renderToolPage({
  category:'calc',
  titleKey:'toolTitle',
  descKey:'toolDesc',
  howToSteps:['step1','step2','step3','step4'],
  related:[

    {icon:'%',href:'/calc/percent-error-calculator.html',name:'Percent Error'},
    {icon:'🔢',href:'/calc/gcd-lcm-calculator.html',name:'GCD & LCM'},
  ]
});
calc();
</script>
