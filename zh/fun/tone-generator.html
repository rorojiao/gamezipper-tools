<script>
GZI18n.register({
  en: {
    toolTitle: 'Online Tone Generator',
    toolDesc: 'Generate sine, square, sawtooth and triangle wave tones at any frequency. Play live or download as WAV.',
    frequency: 'Frequency (Hz)',
    volume: 'Volume (%)',
    waveform: 'Waveform',
    freqInput: 'Exact Frequency (Hz)',
    play: '▶ Play',
    stop: '■ Stop',
    downloadWav: 'Download WAV',
    duration: 'Duration (s)',
    sine: 'Sine',
    square: 'Square',
    sawtooth: 'Sawtooth',
    triangle: 'Triangle',
    step1: 'Select a waveform type (sine, square, sawtooth, or triangle)',
    step2: 'Adjust the frequency using the slider or type an exact value',
    step3: 'Click the play button to hear the tone in real time',
    step4: 'Set duration and click Download WAV to save the audio file',
  },
  zh: {
    toolTitle: '在线音频发生器',
    toolDesc: '在线生成正弦波、方波、锯齿波和三角波音频信号，支持实时播放和 WAV 下载。',
    frequency: '频率 (Hz)',
    volume: '音量 (%)',
    waveform: '波形',
    freqInput: '精确频率 (Hz)',
    play: '▶ 播放',
    stop: '■ 停止',
    downloadWav: '下载 WAV',
    duration: '时长（秒）',
    sine: '正弦波',
    square: '方波',
    sawtooth: '锯齿波',
    triangle: '三角波',
    step1: '选择波形类型（正弦波、方波、锯齿波或三角波）',
    step2: '通过滑块或输入框调节频率',
    step3: '点击播放按钮实时试听音调',
    step4: '设置时长后点击下载 WAV 保存音频文件',
  }
});

const { $, t } = GZ;
let audioCtx, oscillator, gainNode, analyser, animId;
let playing = false;
let waveType = 'sine';

const waves = ['sine','square','sawtooth','triangle'];
const waveBtnContainer = $('#waveBtns');
waves.forEach(w => {
  const btn = document.createElement('button');
  btn.textContent = t(w);
  btn.className = w === waveType ? 'active' : '';
  btn.onclick = () => {
    waveType = w;
    waveBtnContainer.querySelectorAll('button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    if (oscillator) oscillator.type = w;
  };
  waveBtnContainer.appendChild(btn);
});

$('#freqSlider').addEventListener('input', e => {
  const v = +e.target.value;
  $('#freqInput').value = v;
  updateFreq(v);
});
$('#freqInput').addEventListener('input', e => {
  let v = Math.max(20, Math.min(20000, +e.target.value || 20));
  $('#freqSlider').value = v;
  updateFreq(v);
});
$('#volSlider').addEventListener('input', e => {
  if (gainNode) gainNode.gain.value = +e.target.value / 100;
});

function updateFreq(f) {
  $('#freqDisplay').innerHTML = f + ' <span>Hz</span>';
  if (oscillator) oscillator.frequency.setValueAtTime(f, audioCtx.currentTime);
}

function togglePlay() {
  if (playing) stopTone(); else startTone();
}

function startTone() {
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 2048;
  gainNode = audioCtx.createGain();
  gainNode.gain.value = +$('#volSlider').value / 100;
  oscillator = audioCtx.createOscillator();
  oscillator.type = waveType;
  oscillator.frequency.value = +$('#freqSlider').value;
  oscillator.connect(gainNode);
  gainNode.connect(analyser);
  analyser.connect(audioCtx.destination);
  oscillator.start();
  playing = true;
  $('#playBtn').innerHTML = '&#9632;';
  $('#playBtn').classList.add('playing');
  drawWave();
}

function stopTone() {
  if (oscillator) { oscillator.stop(); oscillator = null; }
  if (audioCtx) { audioCtx.close(); audioCtx = null; }
  playing = false;
  $('#playBtn').innerHTML = '&#9654;';
  $('#playBtn').classList.remove('playing');
  if (animId) cancelAnimationFrame(animId);
  clearCanvas();
}

function drawWave() {
  if (!analyser) return;
  const canvas = $('#visualizer');
  const ctx = canvas.getContext('2d');
  const bufLen = analyser.frequencyBinCount;
  const data = new Uint8Array(bufLen);
  canvas.width = canvas.offsetWidth * (window.devicePixelRatio || 1);
  canvas.height = 120 * (window.devicePixelRatio || 1);

  function draw() {
    animId = requestAnimationFrame(draw);
    analyser.getByteTimeDomainData(data);
    ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--gz-bg-alt') || '#1a1a2e';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.lineWidth = 2;
    ctx.strokeStyle = getComputedStyle(document.documentElement).getPropertyValue('--gz-accent') || '#e94560';
    ctx.beginPath();
    const sliceW = canvas.width / bufLen;
    let x = 0;
    for (let i = 0; i < bufLen; i++) {
      const v = data[i] / 128.0;
      const y = v * canvas.height / 2;
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      x += sliceW;
    }
    ctx.lineTo(canvas.width, canvas.height / 2);
    ctx.stroke();
  }
  draw();
}

function clearCanvas() {
  const canvas = $('#visualizer');
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);
}

function downloadWav() {
  const freq = +$('#freqSlider').value;
  const dur = Math.max(0.1, Math.min(60, 3));
  const sr = 44100;
  const numSamples = Math.floor(sr * dur);
  const buf = new ArrayBuffer(44 + numSamples * 2);
  const v = new DataView(buf);
  function ws(o, s) { for (let i = 0; i < s.length; i++) v.setUint8(o + i, s.charCodeAt(i)); }
  ws(0,'RIFF'); v.setUint32(4, 36 + numSamples * 2, true); ws(8,'WAVE');
  ws(12,'fmt '); v.setUint32(16,16,true); v.setUint16(20,1,true); v.setUint16(22,1,true);
  v.setUint32(24,sr,true); v.setUint32(28,sr*2,true); v.setUint16(32,2,true); v.setUint16(34,16,true);
  ws(36,'data'); v.setUint32(40,numSamples*2,true);
  const amp = +$('#volSlider').value / 100 * 32767;
  for (let i = 0; i < numSamples; i++) {
    const t = i / sr;
    let s;
    switch(waveType) {
      case 'sine': s = Math.sin(2*Math.PI*freq*t); break;
      case 'square': s = Math.sin(2*Math.PI*freq*t) >= 0 ? 1 : -1; break;
      case 'sawtooth': s = 2*(freq*t - Math.floor(freq*t+0.5)); break;
      case 'triangle': s = 2*Math.abs(2*(freq*t - Math.floor(freq*t+0.5)))-1; break;
      default: s = Math.sin(2*Math.PI*freq*t);
    }
    v.setInt16(44+i*2, s*amp, true);
  }
  const blob = new Blob([buf], {type:'audio/wav'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `tone_${freq}hz_${waveType}.wav`;
  a.click();
  URL.revokeObjectURL(a.href);
}

$('#btnRow').innerHTML = `
  <div class="dur-row" style="justify-content:center">
    <label>${t('duration')}</label>
    <input type="number" id="wavDur" value="3" min="0.1" max="60" step="0.1">
  </div>
  <button class="gz-btn" onclick="downloadWav()" style="margin-top:8px">${t('downloadWav')}</button>`;

$('#lbl-freq').textContent = t('frequency');
$('#lbl-vol').textContent = t('volume');
$('#lbl-wave').textContent = t('waveform');
$('#lbl-freq-input').textContent = t('freqInput');

GZ.renderToolPage({
  category: 'fun',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🎵', href:'/fun/white-noise.html', name:'White Noise'},
    {icon:'🥁', href:'/fun/drum-machine.html', name:'Drum Machine'},
    {icon:'🎸', href:'/fun/guitar-tuner.html', name:'Guitar Tuner'},
    {icon:'🎹', href:'/fun/piano.html', name:'Piano'},
  ]
});
</script>
