const { $, copyText, t } = GZ;

function parseINI(text) {
  const lines = text.split('\n');
  const result = []; // [{type:'comment'|'section'|'kv', ...}]
  const errors = [];
  let currentSection = null;

  lines.forEach((rawLine, idx) => {
    const line = rawLine.trim();
    if (!line) { result.push({type:'blank'}); return; }
    if (line.startsWith(';') || line.startsWith('#')) {
      result.push({type:'comment', text: line}); return;
    }
    const secMatch = line.match(/^\[(.+)\]$/);
    if (secMatch) {
      currentSection = secMatch[1].trim();
      result.push({type:'section', name: currentSection}); return;
    }
    const kvMatch = line.match(/^([^=]+)=(.*)$/);
    if (kvMatch) {
      result.push({type:'kv', key: kvMatch[1].trim(), value: kvMatch[2].trim(), section: currentSection}); return;
    }
    errors.push(`Line ${idx+1}: invalid syntax`);
  });
  return { result, errors };
}

function formatINI(text) {
  const { result, errors } = parseINI(text);
  if (errors.length) throw new Error(errors[0]);

  let entries = result;

  if ($('#sortSecChk')?.checked) {
    // Group by section preserving leading comments/blanks structure minimally
    const ordered = [];
    const globalEntries = entries.filter(e => e.type === 'comment' || e.type === 'blank' || (e.type === 'kv' && !e.section));
    const sections = {};
    let curSec = null;
    entries.forEach(e => {
      if (e.type === 'section') { curSec = e.name; sections[curSec] = sections[curSec] || []; sections[curSec].push(e); }
      else if (e.type === 'kv' && e.section && curSec) { sections[curSec].push(e); }
    });
    // Output global entries first (no section), then sorted sections
    ordered.push(...globalEntries);
    Object.keys(sections).sort((a,b) => a.localeCompare(b)).forEach(name => {
      let items = sections[name];
      if ($('#sortKeyChk')?.checked) {
        const header = items.find(e => e.type === 'section');
        const kvs = items.filter(e => e.type === 'kv').sort((a,b) => a.key.localeCompare(b.key));
        const comments = items.filter(e => e.type === 'comment' || e.type === 'blank');
        items = [header, ...kvs];
      }
      ordered.push(...items);
    });
    entries = ordered.filter(e => e.type !== 'blank' || true); // keep blanks
  } else if ($('#sortKeyChk')?.checked) {
    // Sort keys within each section without moving sections
    const grouped = [];
    let currentGroup = [];
    entries.forEach(e => {
      if (e.type === 'section') {
        if (currentGroup.length) { grouped.push(currentGroup); }
        currentGroup = [e];
      } else {
        currentGroup.push(e);
      }
    });
    if (currentGroup.length) grouped.push(currentGroup);
    grouped.forEach(g => {
      const header = g.find(e => e.type === 'section');
      const kvs = g.filter(e => e.type === 'kv').sort((a,b) => a.key.localeCompare(b.key));
      const others = g.filter(e => e.type !== 'kv' && e.type !== ('section'));
      // Reconstruct: comments before first section stay, then header, then sorted kvs
      const beforeHeader = header ? g.slice(0, g.indexOf(header)) : [];
      const newGroup = header ? [...beforeHeader, header, ...kvs] : [...kvs];
      // Replace in place
      const startIdx = grouped.indexOf(g);
      grouped[startIdx] = newGroup;
    });
    entries = grouped.flat();
  }

  // Calculate alignment width
  let maxKeyLen = 0;
  if ($('#alignChk')?.checked) {
    entries.forEach(e => { if (e.type === 'kv') maxKeyLen = Math.max(maxKeyLen, e.key.length); });
  }

  const output = entries.map(e => {
    if (e.type === 'blank') return '';
    if (e.type === 'comment') return e.text;
    if (e.type === 'section') return `[${e.name}]`;
    if (e.type === 'kv') {
      const key = $('#alignChk')?.checked ? e.key.padEnd(maxKeyLen) : e.key;
      return `${key} = ${e.value}`;
    }
    return '';
  }).join('\n');

  const stats = { sections: entries.filter(e => e.type === 'section').length, keys: entries.filter(e => e.type === 'kv').length };
  return { output, stats };
}

function highlightINI(text) {
  return escHtml(text).split('\n').map(line => {
    if (/^\s*[;#]/.test(line)) return `<span class="ini-comment">${line}</span>`;
    if (/^\s*\[.+\]/.test(line)) return `<span class="ini-section">${line}</span>`;
    return line.replace(/^(\s*)([^=\s]+)(\s*=\s*)(.*)$/, (m, sp, key, eq, val) =>
      `${sp}<span class="ini-key">${key}</span>${eq}<span class="ini-value">${val}</span>`);
  }).join('\n');
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function doFormat() {
  const inp = $('#input').value.trim();
  if (!inp) return;
  try {
    const { output, stats } = formatINI(inp);
    $('#output').innerHTML = highlightINI(output);
    $('#status').innerHTML = `<span style="color:var(--gz-success)">${t('validIni')}: ${stats.sections} ${t('sections')}, ${stats.keys} ${t('keys')}</span>`;
  } catch (e) {
    $('#status').innerHTML = `<span style="color:var(--gz-accent)">${t('invalidIni')}: ${e.message}</span>`;
    $('#output').innerHTML = `<span style="color:var(--gz-accent)">${escHtml(e.message)}</span>`;
  }
}

function loadExample() {
  $('#input').value = '; Database configuration\n[database]\nhost=localhost\nport=5432\ndbname=myapp\n\n[server]\nhost=0.0.0.0\nport=3000\n# Enable debug mode\ndebug=true';
  doFormat();
}

function doClear() { $('#input').value=''; $('#output').textContent=''; $('#status').innerHTML=''; }

  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
