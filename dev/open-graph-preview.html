<style>
.og-card{background:#fff;border-radius:12px;overflow:hidden;border:1px solid #e0e0e0;max-width:500px;margin:8px 0}
.og-card img{width:100%;height:auto;display:block;aspect-ratio:1.91/1;object-fit:cover;background:#f0f0f0;min-height:120px}
.og-card-body{padding:12px 16px}
.og-card-domain{font-size:12px;color:#65676b;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.og-card-title{font-size:16px;font-weight:600;color:#050505;line-height:1.3;margin-bottom:4px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.og-card-desc{font-size:14px;color:#65676b;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.twitter-card{background:#fff;border-radius:12px;overflow:hidden;border:1px solid #e1e8ed;max-width:500px;margin:8px 0}
.twitter-card img{width:100%;height:auto;display:block;aspect-ratio:2/1;object-fit:cover;background:#f0f0f0;min-height:120px}
.twitter-card-body{padding:12px}
.twitter-card-title{font-size:15px;font-weight:700;color:#0f1419;line-height:1.3;margin-bottom:2px}
.twitter-card-desc{font-size:14px;color:#536471;line-height:1.4}
.twitter-card-domain{font-size:14px;color:#536471;margin-top:4px}
.linkedin-card{background:#fff;border-radius:4px;overflow:hidden;border:1px solid #e0e0e0;max-width:500px;margin:8px 0}
.linkedin-card img{width:100%;height:auto;display:block;aspect-ratio:1.91/1;object-fit:cover;background:#f0f0f0;min-height:120px}
.linkedin-card-body{padding:12px}
.linkedin-card-title{font-size:14px;font-weight:600;color:#000;line-height:1.3;margin-bottom:4px}
.linkedin-card-domain{font-size:12px;color:#666}
.preview-label{font-size:.8em;font-weight:600;margin-top:16px;margin-bottom:4px;display:flex;align-items:center;gap:6px}
.preview-label svg{width:16px;height:16px}
.tag-output{background:var(--gz-card-bg);padding:12px;border-radius:8px;font-family:monospace;font-size:.8em;white-space:pre-wrap;word-break:break-all;margin-top:8px;display:none}
.input-group{margin-bottom:12px}
.input-group label{display:block;font-size:.85em;font-weight:600;margin-bottom:4px}
.input-group input,.input-group textarea,.input-group select{width:100%;box-sizing:border-box}
.img-placeholder{width:100%;aspect-ratio:1.91/1;background:linear-gradient(135deg,#667eea,#764ba2);display:flex;align-items:center;justify-content:center;color:#fff;font-size:.9em}
</style>

<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What are Open Graph meta tags?", "acceptedAnswer": {"@type": "Answer", "text": "Open Graph (OG) meta tags are HTML tags that control how your web page appears when shared on social media platforms like Facebook, LinkedIn, and Twitter."}}, {"@type": "Question", "name": "What OG tags are most important?", "acceptedAnswer": {"@type": "Answer", "text": "The most important tags are og:title, og:description, og:image, og:url, and og:type. These control the title, description, image, URL, and content type shown in social shares."}}, {"@type": "Question", "name": "What is the ideal OG image size?", "acceptedAnswer": {"@type": "Answer", "text": "The recommended OG image size is 1200x630 pixels (1.91:1 ratio). Facebook, LinkedIn and Twitter all support this ratio for link previews."}}, {"@type": "Question", "name": "Does this tool generate the meta tags?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. As you fill in the fields, the tool generates ready-to-use OG and Twitter Card meta tags that you can copy directly into your HTML head section."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px">
      <div>
        <div class="input-group">
          <label id="lblTitle">og:title</label>
          <input type="text" id="ogTitle" class="gz-input" placeholder="My Awesome Page Title">
        </div>
        <div class="input-group">
          <label id="lblDesc">og:description</label>
          <textarea id="ogDesc" class="gz-input" rows="3" placeholder="A brief description of your page content for social sharing."></textarea>
        </div>
        <div class="input-group">
          <label id="lblImg">og:image URL</label>
          <input type="text" id="ogImg" class="gz-input" placeholder="https://example.com/image.jpg">
        </div>
        <div class="input-group">
          <label id="lblUrl">og:url</label>
          <input type="text" id="ogUrl" class="gz-input" placeholder="https://example.com/page">
        </div>
        <div class="input-group">
          <label id="lblType">og:type</label>
          <select id="ogType" class="gz-select">
            <option value="website">website</option>
            <option value="article">article</option>
            <option value="product">product</option>
            <option value="profile">profile</option>
            <option value="video.other">video</option>
            <option value="music.song">music</option>
          </select>
        </div>
        <div class="input-group">
          <label id="lblSite">og:site_name</label>
          <input type="text" id="ogSite" class="gz-input" placeholder="My Website">
        </div>
      </div>
      <div>
        <div class="preview-label" id="fbLabel">📘 Facebook / LinkedIn Preview</div>
        <div class="og-card" id="fbPreview">
          <div id="fbImgWrap"><div class="img-placeholder">1200 × 630</div></div>
          <div class="og-card-body">
            <div class="og-card-domain" id="fbDomain">EXAMPLE.COM</div>
            <div class="og-card-title" id="fbTitle">Page Title</div>
            <div class="og-card-desc" id="fbDesc">Page description appears here...</div>
          </div>
        </div>

        <div class="preview-label" id="twLabel">🐦 Twitter Card Preview</div>
        <div class="twitter-card" id="twPreview">
          <div id="twImgWrap"><div class="img-placeholder" style="aspect-ratio:2/1">1200 × 600</div></div>
          <div class="twitter-card-body">
            <div class="twitter-card-title" id="twTitle">Page Title</div>
            <div class="twitter-card-desc" id="twDesc">Page description appears here...</div>
            <div class="twitter-card-domain" id="twDomain">example.com</div>
          </div>
        </div>

        <div class="preview-label" id="tagLabel">📋 Generated Meta Tags</div>
        <button class="gz-btn" onclick="toggleTags()" style="margin-bottom:8px" id="showTagsBtn">Show Tags</button>
        <div class="tag-output" id="tagOutput"></div>
      </div>
    </div>
    <div id="status"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Open Graph Preview',
    toolDesc: 'Preview how your page looks when shared on Facebook, Twitter, and LinkedIn. Generate and validate Open Graph meta tags.',
    showTags: 'Show Tags',
    hideTags: 'Hide Tags',
    step1: 'Enter your page title, description, image URL and other OG fields',
    step2: 'See real-time previews for Facebook, Twitter and LinkedIn',
    step3: 'Click Show Tags to generate ready-to-use meta tags',
    step4: 'Copy the meta tags into your HTML <head> section',
  },
  zh: {
    toolTitle: 'Open Graph 预览',
    toolDesc: '预览你的页面在 Facebook、Twitter 和 LinkedIn 分享时的显示效果。生成和验证 Open Graph 标签。',
    showTags: '显示标签',
    hideTags: '隐藏标签',
    step1: '输入页面标题、描述、图片 URL 和其他 OG 字段',
    step2: '实时预览 Facebook、Twitter 和 LinkedIn 的分享效果',
    step3: '点击「显示标签」生成可直接使用的 meta 标签',
    step4: '将 meta 标签复制到 HTML 的 <head> 区域',
  }
});

const { $, copyText, t } = GZ;
let tagsVisible = false;

function getDomain(url) {
  try { return new URL(url).hostname; } catch(e) { return url.replace(/^https?:\/\//, '').split('/')[0] || 'example.com'; }
}

function updatePreview() {
  const title = $('#ogTitle').value || 'Page Title';
  const desc = $('#ogDesc').value || 'Page description appears here...';
  const img = $('#ogImg').value;
  const url = $('#ogUrl').value || 'https://example.com';
  const domain = getDomain(url).toUpperCase();

  // Facebook / LinkedIn
  $('#fbTitle').textContent = title;
  $('#fbDesc').textContent = desc;
  $('#fbDomain').textContent = domain;
  if (img) {
    $('#fbImgWrap').innerHTML = `<img src="${img.replace(/"/g,'&quot;')}" alt="OG Image" onerror="this.outerHTML='<div class=\\'img-placeholder\\'>Image failed to load</div>'">`;
  } else {
    $('#fbImgWrap').innerHTML = '<div class="img-placeholder">1200 × 630</div>';
  }

  // Twitter
  $('#twTitle').textContent = title;
  $('#twDesc').textContent = desc;
  $('#twDomain').textContent = domain.toLowerCase();
  if (img) {
    $('#twImgWrap').innerHTML = `<img src="${img.replace(/"/g,'&quot;')}" alt="Twitter Image" onerror="this.outerHTML='<div class=\\'img-placeholder\\' style=\\'aspect-ratio:2/1\\'>Image failed to load</div>'">`;
  } else {
    $('#twImgWrap').innerHTML = '<div class="img-placeholder" style="aspect-ratio:2/1">1200 × 600</div>';
  }

  // Generate tags
  const type = $('#ogType').value;
  const site = $('#ogSite').value;
  let tags = `<meta property="og:title" content="${title}">\n`;
  tags += `<meta property="og:description" content="${desc}">\n`;
  if (img) tags += `<meta property="og:image" content="${img}">\n`;
  tags += `<meta property="og:url" content="${url}">\n`;
  tags += `<meta property="og:type" content="${type}">\n`;
  if (site) tags += `<meta property="og:site_name" content="${site}">\n`;
  tags += `\n<meta name="twitter:card" content="summary_large_image">\n`;
  tags += `<meta name="twitter:title" content="${title}">\n`;
  tags += `<meta name="twitter:description" content="${desc}">\n`;
  if (img) tags += `<meta name="twitter:image" content="${img}">`;

  $('#tagOutput').textContent = tags;
}

function toggleTags() {
  tagsVisible = !tagsVisible;
  $('#tagOutput').style.display = tagsVisible ? 'block' : 'none';
  $('#showTagsBtn').textContent = tagsVisible ? t('hideTags') : t('showTags');
}

function loadExample() {
  $('#ogTitle').value = 'GameZipper Tools - Free Online Developer Utilities';
  $('#ogDesc').value = 'Free online developer tools including JSON formatter, Base64 encoder, URL encoder, JWT decoder and 700+ more utilities. No signup required.';
  $('#ogImg').value = 'https://tools.gamezipper.com/shared/og-image.png';
  $('#ogUrl').value = 'https://tools.gamezipper.com';
  $('#ogSite').value = 'GameZipper Tools';
  $('#ogType').value = 'website';
  updatePreview();
}

function doClear() {
  $('#ogTitle').value = '';
  $('#ogDesc').value = '';
  $('#ogImg').value = '';
  $('#ogUrl').value = '';
  $('#ogSite').value = '';
  $('#ogType').value = 'website';
  updatePreview();
}

// Labels
$('#lblTitle').textContent = 'og:title';
$('#lblDesc').textContent = 'og:description';
$('#lblImg').textContent = 'og:image URL';
$('#lblUrl').textContent = 'og:url';
$('#lblType').textContent = 'og:type';
$('#lblSite').textContent = 'og:site_name';

$('#ogTitle').addEventListener('input', updatePreview);
$('#ogDesc').addEventListener('input', updatePreview);
$('#ogImg').addEventListener('input', updatePreview);
$('#ogUrl').addEventListener('input', updatePreview);
$('#ogType').addEventListener('change', updatePreview);
$('#ogSite').addEventListener('input', updatePreview);

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="copyText($('#tagOutput').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

updatePreview();

GZ.renderToolPage({
  category: 'dev',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🔍', href:'/dev/google-serp-preview.html', name:'Google SERP Preview'},
    
    
    {icon:'🔗', href:'/dev/url-encode.html', name:'URL Encode'},
  ]
});
</script>
<script src="/tools-result-rec.js?v=20260707v520" defer></script>
</body>
</html>
