  }

    label: { en: 'Sign Up', zh: '注册' },

      'Claim Your Spot', 'Yes, Sign Me Up!', 'Unlock Free Access', 'Get Started — It\'s Free',
      'Create My Profile', 'Join Free Forever', 'Activate My Account'
    ]
  },
  sales: {
    label: { en: 'Sales', zh: '销售' },
    ctas: [
      'Buy Now', 'Shop Now', 'Order Today', 'Get Yours', 'Claim Your Discount',

const STYLES = [
  { bg: '#5bf', color: '#000', radius: '6px' },
  { bg: '#e94560', color: '#fff', radius: '24px' },
  { bg: '#00d672', color: '#000', radius: '4px' },
  { bg: '#61afef', color: '#fff', radius: '8px' },
  { bg: 'transparent', color: '#5bf', border: '2px solid #5bf', radius: '6px' },
];

let currentCat = 'signup';

function renderFilters() {
  $('#filters').innerHTML = Object.entries(CTA_DATA).map(([k,v]) =>
    `<button class="cta-filter-btn ${k === currentCat ? 'active' : ''}" onclick="setCat('${k}')">${GZI18n.getLang() === 'zh' ? v.label.zh : v.label.en}</button>`
  ).join('');
}

function setCat(cat) {
  currentCat = cat;
  renderFilters();
  generate();
}

function generate() {
  const ctas = [...CTA_DATA[currentCat].ctas];
  // Shuffle
  for (let i = ctas.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [ctas[i], ctas[j]] = [ctas[j], ctas[i]];
  }
  const shown = ctas.slice(0, 12);

  $('#ctaList').innerHTML = shown.map((cta, i) => {
    const style = STYLES[i % STYLES.length];
    const styleStr = `background:${style.bg};color:${style.color};border-radius:${style.radius};${style.border ? 'border:'+style.border : ''}`;
    return `<div class="cta-card">
      <span class="cta-preview" style="${styleStr}">${cta}</span>
      <span class="cta-text">${cta}</span>
      <button class="gz-btn gz-btn-secondary" style="font-size:.75em;padding:4px 12px" onclick="copyText('${cta.replace(/'/g, "\\'")}')">${t('copy')}</button>
    </div>`;
  }).join('');
}

$('#toolbar').innerHTML = `<button class="gz-btn" onclick="generate()">${t('generate')}</button>`;

renderFilters();
generate();
