<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "Is the spinner truly random?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. The wheel uses cryptographic-quality randomness from your browser (Math.random with multiple entropy sources) to determine the landing position. Every option has an equal probability of winning."}}, {"@type": "Question", "name": "How many names can I add?", "acceptedAnswer": {"@type": "Answer", "text": "You can add up to 100 entries (one per line). For best visual clarity, 2 to 50 entries work best — more than that and the wheel slices become too thin to read."}}, {"@type": "Question", "name": "Can I remove the winner after each spin?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. Toggle the 'Remove winner after spin' option. This is useful for classroom drawings or raffles where each person should win only once."}}, {"@type": "Question", "name": "Does this work offline?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. After the page loads, the wheel runs entirely in your browser. You can spin, edit names, and view history without an internet connection."}}]}</script>

<script>
GZI18n.register({
  en: {
    toolTitle: 'Spinner Wheel',
    toolDesc: 'Free random name picker and spinner wheel. Enter your options, spin the wheel, and get a fair random winner. Great for classrooms, raffles, giveaways, and decisions.',
    entries: 'Entries (one per line)',
    shuffle: 'Shuffle',
    sort: 'Sort A→Z',
    clear: 'Clear',
    removeWinner: 'Remove winner',
    sound: 'Sound',
    history: 'Recent Winners',
    winnerSub: 'is the winner!',
    spinBtn: 'SPIN',
    spinning: '...',
    step1: 'Enter your options, one per line',
    step2: 'Optionally toggle remove-winner or sound',
    step3: 'Click the SPIN button in the wheel center',
    step4: 'View the winner and check the history list',
  },
  zh: {
    toolTitle: '随机转盘',
    toolDesc: '免费的随机名称抽取器和转盘。输入选项，转动转盘，公平随机选出获胜者。适合课堂点名、抽奖、活动和决策。',
    entries: '选项（每行一个）',
    shuffle: '随机打乱',
    sort: '按字母排序',
    clear: '清空',
    removeWinner: '中奖后移除',
    sound: '音效',
    history: '历史获奖',
    winnerSub: '中奖了！',
    spinBtn: '转动',
    spinning: '...',
    step1: '输入选项，每行一个',
    step2: '可选：开启「中奖后移除」或「音效」',
    step3: '点击转盘中心的「转动」按钮',
    step4: '查看获胜者并查看历史记录',
  }
});

const { $, t } = GZ;

var PALETTE = ['#ef4444','#f97316','#f59e0b','#10b981','#06b6d4','#3b82f6','#8b5cf6','#ec4899','#84cc16','#14b8a6','#f43f5e','#0ea5e9'];
var angle = 0;
var spinning = false;
var entries = [];

$('#lbl-entries').textContent = t('entries');
$('#btn-shuffle').textContent = t('shuffle');
$('#btn-sort').textContent = t('sort');
$('#btn-clear').textContent = t('clear');
$('#lbl-remove').textContent = t('removeWinner');
$('#lbl-sound').textContent = t('sound');
$('#lbl-history').textContent = t('history');

function parseEntries() {
  var raw = $('#entries').value.split('\n').map(function(s){return s.trim();}).filter(function(s){return s.length > 0;});
  return raw.slice(0, 100);
}

function drawWheel() {
  var canvas = $('#wheel');
  var dpr = window.devicePixelRatio || 1;
  var size = Math.min(canvas.clientWidth || 480, 480);
  if (canvas.width !== size * dpr) {
    canvas.width = size * dpr;
    canvas.height = size * dpr;
  }
  var ctx = canvas.getContext('2d');
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.clearRect(0, 0, size, size);
  var cx = size / 2, cy = size / 2;
  var radius = size / 2 - 6;
  var n = entries.length;

  if (n === 0) {
    ctx.fillStyle = 'var(--glass2)';
    ctx.beginPath();
    ctx.arc(cx, cy, radius, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#888';
    ctx.font = '14px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(GZ.lang === 'zh' ? '请添加选项' : 'Add entries to begin', cx, cy);
    return;
  }

  var slice = (Math.PI * 2) / n;

  for (var i = 0; i < n; i++) {
    var startAngle = angle + i * slice;
    var endAngle = startAngle + slice;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, radius, startAngle, endAngle);
    ctx.closePath();
    ctx.fillStyle = PALETTE[i % PALETTE.length];
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.6)';
    ctx.lineWidth = 2;
    ctx.stroke();

    // Text
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(startAngle + slice / 2);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold ' + Math.max(10, Math.min(20, 280 / Math.max(n, 6))) + 'px sans-serif';
    ctx.textAlign = 'right';
    ctx.textBaseline = 'middle';
    var label = entries[i];
    var maxLen = n > 30 ? 6 : n > 15 ? 10 : 16;
    if (label.length > maxLen) label = label.slice(0, maxLen - 1) + '…';
    ctx.fillText(label, radius - 16, 0);
    ctx.restore();
  }

  // Outer ring
  ctx.strokeStyle = 'rgba(255,255,255,0.4)';
  ctx.lineWidth = 4;
  ctx.beginPath();
  ctx.arc(cx, cy, radius, 0, Math.PI * 2);
  ctx.stroke();
}

function spin() {
  if (spinning) return;
  entries = parseEntries();
  if (entries.length === 0) {
    $('#status').innerHTML = '<span style="color:var(--accent)">' + (GZ.lang === 'zh' ? '请先添加至少 2 个选项' : 'Please add at least 2 entries') + '</span>';
    return;
  }
  if (entries.length === 1) {
    announceWinner(entries[0]);
    return;
  }
  spinning = true;
  $('#hub').classList.add('spinning');
  $('#hub').textContent = t('spinning');
  $('#winner').style.display = 'none';

  var spinRounds = 5 + Math.random() * 3;
  var targetSliceOffset = Math.random();
  var totalAngle = spinRounds * Math.PI * 2 + targetSliceOffset * Math.PI * 2;
  var startAngle = angle;
  var startTime = performance.now();
  var duration = 4500 + Math.random() * 1500;

  function easeOutCubic(t) { return 1 - Math.pow(1 - t, 3); }

  function frame(now) {
    var elapsed = now - startTime;
    var progress = Math.min(1, elapsed / duration);
    var eased = easeOutCubic(progress);
    angle = startAngle + totalAngle * eased;
    drawWheel();
    // Tick sound on slice crossing
    if ($('#sound').checked && window._lastTickSlice !== getCurrentSlice()) {
      window._lastTickSlice = getCurrentSlice();
      playTick(progress);
    }
    if (progress < 1) {
      requestAnimationFrame(frame);
    } else {
      finishSpin();
    }
  }
  requestAnimationFrame(frame);
}

function getCurrentSlice() {
  var n = entries.length;
  if (n === 0) return -1;
  var slice = (Math.PI * 2) / n;
  // The pointer is at the top (-Math.PI/2 in canvas coords, but we drew with angle starting at 0 = right)
  // We need: which slice is currently under the top pointer?
  // Top in canvas = angle -Math.PI/2 (i.e., 270 deg / 3PI/2)
  // Normalize: the slice index where startAngle <= pointerAngle < endAngle
  var normalized = ((Math.PI * 1.5) - angle) % (Math.PI * 2);
  while (normalized < 0) normalized += Math.PI * 2;
  return Math.floor(normalized / slice) % n;
}

function finishSpin() {
  spinning = false;
  $('#hub').classList.remove('spinning');
  $('#hub').textContent = t('spinBtn');
  var idx = getCurrentSlice();
  if (idx < 0 || idx >= entries.length) idx = 0;
  var winner = entries[idx];
  announceWinner(winner);
  if ($('#removeWinner').checked) {
    setTimeout(function() { removeWinner(winner); }, 1500);
  }
}

function announceWinner(winner) {
  $('#winner-name').textContent = winner;
  $('#winner-sub').textContent = t('winnerSub');
  $('#winner').style.display = 'block';
  var li = document.createElement('li');
  li.textContent = winner + ' · ' + new Date().toLocaleTimeString();
  var histList = $('#history');
  histList.insertBefore(li, histList.firstChild);
  if (histList.children.length > 20) histList.removeChild(histList.lastChild);
}

function removeWinner(winner) {
  var lines = $('#entries').value.split('\n').map(function(s){return s.trim();});
  var idx = lines.indexOf(winner);
  if (idx >= 0) lines.splice(idx, 1);
  $('#entries').value = lines.join('\n');
  entries = parseEntries();
  drawWheel();
}

function playTick(progress) {
  try {
    if (!window._audioCtx) {
      window._audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    var ctx = window._audioCtx;
    var osc = ctx.createOscillator();
    var gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = 'square';
    osc.frequency.value = 800 + progress * 400;
    gain.gain.setValueAtTime(0.05, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.05);
    osc.start();
    osc.stop(ctx.currentTime + 0.05);
  } catch(e) {}
}

$('#btn-shuffle').onclick = function() {
  var arr = parseEntries();
  for (var i = arr.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = arr[i]; arr[i] = arr[j]; arr[j] = tmp;
  }
  $('#entries').value = arr.join('\n');
  entries = arr;
  drawWheel();
};

$('#btn-sort').onclick = function() {
  var arr = parseEntries().sort();
  $('#entries').value = arr.join('\n');
  entries = arr;
  drawWheel();
};

$('#btn-clear').onclick = function() {
  $('#entries').value = '';
  entries = [];
  $('#history').innerHTML = '';
  drawWheel();
};

$('#entries').addEventListener('input', function() {
  entries = parseEntries();
  drawWheel();
});

entries = parseEntries();
drawWheel();
window.addEventListener('resize', drawWheel);

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🔢', href:'/text/number-sorter.html', name:'Number Sorter'},
    {icon:'🎲', href:'/fun/dice-roller.html', name:'Dice Roller'},
    {icon:'🪙', href:'/fun/coin-flip.html', name:'Coin Flip'},
    {icon:'🧹', href:'/text/remove-duplicates.html', name:'Remove Duplicates'},
  ]
});
</script>
