    date: '日期',

    solarNoon: '太阳正午',

    enterCoords: '输入坐标或使用 GPS 定位',
    step1: '输入计划拍摄的日期',
    step2: '输入纬度和经度，或点击「使用我的位置」',
    step3: '查看黄金时刻和蓝色时刻的时间',
    step4: '根据最佳光照时段安排拍摄计划',
  }
});

const { $, t } = GZ;

function calcSun(date, lat, lng) {
  const rad = Math.PI / 180;
  const deg = 180 / Math.PI;
  const dayOfYear = Math.floor((date - new Date(date.getFullYear(), 0, 0)) / 86400000);
  // Solar declination
  const decl = -23.44 * Math.cos(rad * 360 * (dayOfYear + 10) / 365);
  // Equation of time (minutes)
  const B = rad * 360 * (dayOfYear - 81) / 365;
  const eot = 9.87 * Math.sin(2 * B) - 7.53 * Math.cos(B) - 1.5 * Math.sin(B);
  // Solar noon (local standard time)
  const timezone = -lng / 15;
  const solarNoonMin = 720 - 4 * lng + 60 * timezone + eot * (-1);
  const solarNoon = solarNoonMin / 60;
  // Hour angle for given sun elevation
  function hourAngle(elevation) {
    const cosHa = (Math.sin(rad * elevation) - Math.sin(rad * lat) * Math.sin(rad * decl)) /
                  (Math.cos(rad * lat) * Math.cos(rad * decl));
    if (cosHa > 1) return null; // sun never rises
    if (cosHa < -1) return null; // sun never sets
    return Math.acos(cosHa) * deg / 15;
  }
  const haSunrise = hourAngle(-0.833);
  const haGolden = hourAngle(6);
  const haBlue = hourAngle(-6);
  const results = {};
  function toTime(h) {
    if (h == null) return null;
    let hours = Math.floor(h);
    let mins = Math.round((h - hours) * 60);
    if (mins === 60) { hours++; mins = 0; }
    const ampm = hours < 12 || hours === 24 ? 'AM' : 'PM';
    let h12 = hours % 12;
    if (h12 === 0) h12 = 12;
    return `${h12}:${String(mins).padStart(2, '0')} ${ampm}`;
  }
  if (haSunrise) {
    results.sunrise = toTime(solarNoon - haSunrise);
    results.sunset = toTime(solarNoon + haSunrise);
    results.solarNoon = toTime(solarNoon);
    const dayLen = 2 * haSunrise;
    results.dayLength = `${Math.floor(dayLen)}h ${Math.round((dayLen % 1) * 60)}m`;
  }
  if (haGolden) {
    results.morningGolden = toTime(solarNoon - haGolden);
    results.eveningGolden = toTime(solarNoon + haGolden);
  }
  if (haBlue) {
    results.morningBlue = toTime(solarNoon - haBlue);
    results.eveningBlue = toTime(solarNoon + haBlue);
  }
  return results;
}

function calc() {
  const dateStr = $('#date').value;
  const lat = parseFloat($('#lat').value);
  const lng = parseFloat($('#lng').value);
  if (!dateStr || isNaN(lat) || isNaN(lng)) return;
  const date = new Date(dateStr + 'T12:00:00');
  const r = calcSun(date, lat, lng);
  const events = [
    {icon:'🌌', name: t('morningBlue'), time: r.morningBlue, note: 'Sun 6° below horizon'},
    {icon:'🌅', name: t('morningGolden'), time: r.morningGolden, note: 'Sun 6° above'},
    {icon:'☀️', name: t('sunrise'), time: r.sunrise, note: 'Sun at horizon'},
    {icon:'🕛', name: t('solarNoon'), time: r.solarNoon, note: t('dayLength') + ': ' + (r.dayLength || '—')},
    {icon:'🌇', name: t('sunset'), time: r.sunset, note: 'Sun at horizon'},
    {icon:'🌆', name: t('eveningGolden'), time: r.eveningGolden, note: 'Sun 6° above'},
    {icon:'🌃', name: t('eveningBlue'), time: r.eveningBlue, note: 'Sun 6° below horizon'},
  ];
  $('#result').innerHTML = events.map(e =>
    e.time ? `<div class="gh-event"><span class="icon">${e.icon}</span><div class="info"><div class="name">${e.name}</div><div class="note">${e.note}</div></div><span class="time">${e.time}</span></div>` : ''
  ).join('');
}

$('#date').valueAsDate = new Date();
['date','lat','lng'].forEach(id => $('#' + id).addEventListener('input', calc));
$('#btn-gps').addEventListener('click', () => {
  if (!navigator.geolocation) return;
  navigator.geolocation.getCurrentPosition(pos => {
    $('#lat').value = pos.coords.latitude.toFixed(4);
    $('#lng').value = pos.coords.longitude.toFixed(4);
    calc();
  });
});

  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],

    {icon:'🌙', href:'/calc/moon-phase.html', name:'Moon Phase'},
    {icon:'📸', href:'/calc/depth-of-field-calculator.html', name:'Depth of Field'},
    {icon:'🕐', href:'/calc/day-of-week.html', name:'Day of Week'},
  ]
});
calc();
</script>
