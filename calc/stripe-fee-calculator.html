.sf-field input:focus,.sf-field select:focus{outline:none;border-color:var(--accent)}

.sf-tab.active{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border-color:transparent}
.sf-table{width:100%;font-size:.85rem;border-collapse:collapse;margin-top:8px;table-layout:fixed}
.sf-table th,.sf-table td{padding:8px 10px;text-align:left;border-bottom:1px solid var(--border);word-break:break-word;overflow-wrap:break-word}

.sf-table td{font-family:monospace}
.sf-table .b{color:var(--accent);font-weight:600}
.sf-table .d{color:#ef4444}

<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "How much does Stripe charge per transaction?", "acceptedAnswer": {"@type": "Answer", "text": "Stripe charges a flat 2.9% + $0.30 per successful card transaction for US-based accounts as of 2025. International cards and currencies add an additional 1.5%, and ACH direct debit is 0.8% capped at $5. Stripe Connect platforms pay a discounted rate on each volume tier."}}, {"@type": "Question", "name": "How do I calculate Stripe fees?", "acceptedAnswer": {"@type": "Answer", "text": "Enter the amount, select the transaction type (Standard, International, ACH, or Connect) and currency. The calculator shows what the customer pays, the Stripe fee deducted, and your net payout. You can also enter the amount you want to receive and the tool will reverse-calculate the price to charge the customer."}}, {"@type": "Question", "name": "Who pays the Stripe fee — buyer or seller?", "acceptedAnswer": {"@type": "Answer", "text": "For online card payments, the fee is deducted from the merchant's payout — the customer pays the displayed price and the merchant receives the net amount. Some platforms pass fees to the customer with surcharging, which is allowed in some US states but banned in others."}}, {"@type": "Question", "name": "Is this Stripe calculator up to date for 2025-2026?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. The default rates reflect Stripe's current 2025 fee schedule for US standard accounts. Volume discounts, custom rates, and Connect pricing tiers are not modeled. Always confirm final fees on the Stripe dashboard."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="sf-tabs" id="modeTabs">
      <div class="sf-tab active" data-mode="deduct">I'm selling — fee deducted from amount</div>
      <div class="sf-tab" data-mode="receive">I want to receive a specific amount</div>
    </div>
    <div class="sf-wrap">
      <div class="sf-card">
        <h3>💳 Transaction Details</h3>
        <div class="sf-field">
          <label id="lbl-amount">Amount</label>
          <input type="number" id="amount" value="100" min="0" step="0.01">
        </div>
        <div class="sf-field">
          <label id="lbl-currency">Currency</label>
          <select id="currency">
            <option value="USD" selected>USD — US Dollar</option>
            <option value="EUR">EUR — Euro</option>
            <option value="GBP">GBP — British Pound</option>
            <option value="CAD">CAD — Canadian Dollar</option>
            <option value="AUD">AUD — Australian Dollar</option>
            <option value="JPY">JPY — Japanese Yen</option>
          </select>
        </div>
        <div class="sf-field">
          <label id="lbl-type">Transaction Type</label>
          <select id="txnType">
            <option value="standard" selected>Standard (US domestic card)</option>
            <option value="intl">International card / currency</option>
            <option value="ach">ACH Direct Debit (capped at $5)</option>
            <option value="connect">Stripe Connect (platform fee)</option>
            <option value="express">Stripe Express (Connect)</option>
          </select>
        </div>
        <div class="sf-field" id="connectField" style="display:none">
          <label id="lbl-platform">Platform fee %</label>
          <input type="number" id="platformPct" value="2" min="0" max="100" step="0.1">
        </div>
        <div class="sf-presets" id="presets"></div>
      </div>
      <div class="sf-card">
        <h3>📊 Breakdown</h3>
        <div class="sf-row"><span class="lbl" id="lbl-buyer-pays">Customer pays</span><span class="val" id="buyerPays">$0.00</span></div>
        <div class="sf-row"><span class="lbl" id="lbl-fee">Stripe fee</span><span class="val" id="fee">-$0.00</span></div>
        <div class="sf-row"><span class="lbl" id="lbl-fee-pct">Fee percentage</span><span class="val" id="feePct">0%</span></div>
        <div class="sf-row"><span class="lbl" id="lbl-fixed">Fixed component</span><span class="val" id="fixed">$0.00</span></div>
        <div class="sf-row big"><span class="lbl" id="lbl-receive">You receive</span><span class="val" id="receive">$0.00</span></div>
        <div class="sf-info" id="info"></div>
      </div>
    </div>
    <div class="sf-card" style="margin-top:1rem">
      <h3>📋 Fee Schedule Reference</h3>
      <table class="sf-table" id="rateTable">
        <thead><tr><th>Type</th><th>Rate</th><th>Fixed</th><th>Notes</th></tr></thead>
        <tbody id="rateTableBody"></tbody>
      </table>
    </div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Stripe Fee Calculator',
    toolDesc: 'Calculate Stripe transaction fees instantly — see what the customer pays, the Stripe fee deducted, and your net payout. Supports standard, international, ACH, and Stripe Connect rates.',
    amount: 'Amount',
    currency: 'Currency',
    buyerPays: 'Customer pays',
    fee: 'Stripe fee',
    feePct: 'Fee percentage',
    fixed: 'Fixed component',
    receive: 'You receive',
    platform: 'Platform fee %',
    presetLabel: 'Quick amounts:',
    info1: 'These rates reflect <b>Stripe\'s 2025 US standard fee schedule</b>. International cards and non-USD currencies add 1.5%. ACH direct debit is capped at $5 per charge. Connect rates are for marketplace platforms collecting payments on behalf of connected accounts.',
    info2: 'The fee is <b>deducted from the merchant payout</b>. The customer pays the gross amount and the merchant receives the net after Stripe\'s cut.',
    step1: 'Select the mode — "I\'m selling" deducts the fee from your sale, "I want to receive" reverse-calculates the customer price',
    step2: 'Enter the transaction amount, choose currency, and pick the transaction type (Standard, International, ACH, Connect, Express)',
    step3: 'For Connect, set the platform fee % — the table shows the breakdown of Stripe fee, platform fee, and connected account payout',
    step4: 'Browse the Fee Schedule reference for the latest 2025 Stripe rates',
  },
  zh: {
    toolTitle: 'Stripe 手续费计算器',
    toolDesc: '即时计算 Stripe 交易手续费 — 显示客户实付、扣除的 Stripe 手续费和你的净收款。支持标准、国际、ACH 直扣和 Stripe Connect 费率。',
    amount: '金额',
    currency: '币种',
    buyerPays: '客户支付',
    fee: 'Stripe 手续费',
    feePct: '手续费比例',
    fixed: '固定费用',
    receive: '你实际收到',
    platform: '平台费率 %',
    presetLabel: '快速金额：',
    info1: '这些费率反映 <b>Stripe 2025 美国标准费率表</b>。国际卡和非美元币种加收 1.5%。ACH 直扣每笔最高 $5。Connect 费率适用于为关联账户代收的市场平台。',
    info2: '<b>手续费从商家收款中扣除</b>。客户支付显示的总价，商家收到 Stripe 抽成后的净额。',
    step1: '选择模式 —「我在卖」从你的销售额中扣除手续费，「我想要收到」反向计算需向客户收取多少',
    step2: '输入交易金额，选择币种和交易类型（标准、国际、ACH、Connect、Express）',
    step3: '对于 Connect，设置平台费率 % — 表格展示 Stripe 手续费、平台费和关联账户收款的明细',
    step4: '浏览费率参考表了解 2025 年 Stripe 最新费率',
  }
});

const { $, t } = GZ;

let mode = 'deduct';

const RATES = {
  standard: { pct: 2.9, fixed: 0.30, label: 'Standard', note: 'US domestic card' },
  intl:     { pct: 4.4, fixed: 0.30, label: 'International', note: 'Foreign card/currency +1.5%' },
  ach:      { pct: 0.8, fixed: 0.00, cap: 5, label: 'ACH Direct Debit', note: 'Capped at $5' },
  connect:  { pct: 2.9, fixed: 0.30, label: 'Connect Standard', note: 'Platform fee added' },
  express:  { pct: 2.7, fixed: 0.05, label: 'Connect Express', note: 'Discount for express accounts' },
};

const PRESETS = [10, 25, 50, 100, 250, 500, 1000, 5000];

function getSymbol(cur) {
  return { USD:'$', EUR:'€', GBP:'£', CAD:'C$', AUD:'A$', JPY:'¥' }[cur] || cur + ' ';
}
function fmt(amount, cur) {
  const sym = getSymbol(cur);
  const n = Math.round(amount * 100) / 100;
  return sym + n.toFixed(2);
}

function calc() {
  const amount = parseFloat($('#amount').value) || 0;
  const cur = $('#currency').value;
  const type = $('#txnType').value;
  const rate = RATES[type];
  const showConnect = type === 'connect' || type === 'express';
  $('#connectField').style.display = showConnect ? '' : 'none';

  let buyerPays, fee, receive;
  if (mode === 'deduct') {
    buyerPays = amount;
    let rawFee = buyerPays * rate.pct / 100 + rate.fixed;
    if (rate.cap) rawFee = Math.min(rawFee, rate.cap);
    fee = +rawFee.toFixed(2);
    receive = +(buyerPays - fee).toFixed(2);
  } else {
    receive = amount;
    const denom = 1 - rate.pct / 100;
    if (denom <= 0) { receive = 0; buyerPays = 0; fee = 0; }
    else {
      buyerPays = +((receive + rate.fixed) / denom).toFixed(2);
      let f = buyerPays - receive;
      if (rate.cap) f = Math.min(f, rate.cap);
      fee = +f.toFixed(2);
      receive = +(buyerPays - fee).toFixed(2);
    }
  }

  const feePctOfBuyer = buyerPays > 0 ? (fee / buyerPays * 100) : 0;
  $('#buyerPays').textContent = fmt(buyerPays, cur);
  $('#fee').textContent = '-' + fmt(fee, cur);
  $('#feePct').textContent = feePctOfBuyer.toFixed(2) + '%';
  $('#fixed').textContent = fmt(rate.fixed, cur);
  $('#receive').textContent = fmt(receive, cur);
  $('#info').innerHTML = t('info1') + '<br><br>' + t('info2');
}

function renderTable() {
  const cur = $('#currency').value;
  $('#rateTableBody').innerHTML = Object.entries(RATES).map(([key, r]) => {
    let fixed = fmt(r.fixed, cur);
    if (r.cap) fixed += ' (cap ' + fmt(r.cap, cur) + ')';
    return `<tr><td>${r.label}</td><td>${r.pct.toFixed(2)}%</td><td>${fixed}</td><td style="font-family:inherit">${r.note}</td></tr>`;
  }).join('');
}

document.querySelectorAll('#modeTabs .sf-tab').forEach(el => el.addEventListener('click', e => {
  document.querySelectorAll('#modeTabs .sf-tab').forEach(x => x.classList.remove('active'));
  e.currentTarget.classList.add('active');
  mode = e.currentTarget.dataset.mode;
  calc();
}));

$('#amount').addEventListener('input', calc);
$('#currency').addEventListener('change', () => { calc(); renderTable(); });
$('#txnType').addEventListener('change', calc);
$('#platformPct').addEventListener('input', calc);

const presetsEl = $('#presets');
presetsEl.innerHTML = '<span style="font-size:.75rem;color:var(--text2);margin-right:6px">' + t('presetLabel') + '</span>' +
  PRESETS.map(p => `<div class="sf-preset" data-amt="${p}">${p}</div>`).join('');
presetsEl.querySelectorAll('.sf-preset').forEach(p => p.addEventListener('click', e => {
  $('#amount').value = e.currentTarget.dataset.amt;
  calc();
}));

calc();
renderTable();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'💸', href:'/calc/paypal-fee-calculator.html', name:'PayPal Fee'},
    {icon:'🛍️', href:'/calc/etsy-fee-calculator.html', name:'Etsy Fee'},
    {icon:'💳', href:'/calc/crypto-profit-calculator.html', name:'Crypto Profit'},
    {icon:'💰', href:'/calc/roi.html', name:'ROI Calculator'},
  ]
});
</script>
<script src="/tools-result-rec.js?v=20260707v520" defer></script>
</body>
</html>
