<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "How do I convert Excel to XML?", "acceptedAnswer": {"@type": "Answer", "text": "Upload your .xlsx or .xls file. The first sheet is read automatically. If the workbook has multiple sheets a dropdown lets you pick another. Choose row-style or attribute-style output and the XML appears instantly."}}, {"@type": "Question", "name": "What is the difference between row-style and attribute-style XML?", "acceptedAnswer": {"@type": "Answer", "text": "Row-style puts each cell inside its own child tag, e.g. <row><Name>Alice</Name><Age>30</Age></row>. Attribute-style puts the columns as XML attributes, e.g. <row Name=\"Alice\" Age=\"30\"/>. Pick whichever your downstream app expects."}}, {"@type": "Question", "name": "Does it support multiple sheets?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. When your workbook contains several sheets a dropdown appears after upload so you can convert any sheet individually."}}, {"@type": "Question", "name": "Is my spreadsheet data uploaded to a server?", "acceptedAnswer": {"@type": "Answer", "text": "No. The spreadsheet is parsed entirely in your browser using the SheetJS (xlsx) library. Your data never leaves your computer."}}]}</script>

<script>
GZI18n.register({
  en: {
    toolTitle: 'Excel to XML Converter (XLSX to XML)',
    toolDesc: 'Convert Excel spreadsheets (.xlsx, .xls) to clean XML online. Choose sheet, row-style or attribute-style, and a custom root element. 100% browser-based — no upload, no signup.',
    dropHint: 'Click or drag & drop .xlsx / .xls file here',
    sheet: 'Sheet',
    style: 'Style',
    row: 'Row (child tags)',
    attr: 'Attribute style',
    root: 'Root',
    step1: 'Upload your Excel file by clicking the drop area or dragging it on',
    step2: 'Pick a sheet and choose row-style or attribute-style XML',
    step3: 'Optionally change the root element name (default: data)',
    step4: 'Copy or download the resulting XML',
    copied: 'Copied!',
    download: 'Download XML',
    errParse: 'Failed to read file',
    output: 'Output',
    copy: 'Copy',
    clear: 'Clear',
  },
  zh: {
    toolTitle: 'Excel 转 XML 转换器（XLSX to XML）',
    toolDesc: '在线将 Excel 电子表格（.xlsx, .xls）转换为干净的 XML。可选择工作表、行样式或属性样式以及自定义根元素。100% 浏览器本地运行 — 无需上传、无需注册。',
    dropHint: '点击或拖放 .xlsx / .xls 文件到此处',
    sheet: '工作表',
    style: '样式',
    row: '行（子标签）',
    attr: '属性样式',
    root: '根元素',
    step1: '点击拖放区或拖入 Excel 文件上传',
    step2: '选择工作表，并选择行样式或属性样式 XML',
    step3: '可选：修改根元素名称（默认：data）',
    step4: '复制或下载生成的 XML',
    copied: '已复制！',
    download: '下载 XML',
    errParse: '读取文件失败',
    output: '输出',
    copy: '复制',
    clear: '清空',
  }
});

const { $, copyText, t } = GZ;
let wb = null;

$('#drop-hint').textContent = t('dropHint');
$('#sheet-lbl').textContent = t('sheet');
$('#style-lbl').textContent = t('style');
$('#root-lbl').textContent = t('root');
$('#opt-row').textContent = t('row');
$('#opt-attr').textContent = t('attr');
$('label#lbl-out').textContent = t('output');

const drop = $('#drop-area');
const fileInput = $('#file-input');
drop.addEventListener('click', () => fileInput.click());
drop.addEventListener('dragover', e => { e.preventDefault(); drop.style.borderColor = 'var(--gz-accent)'; drop.style.background = 'var(--gz-hover,#f6f6f6)'; });
drop.addEventListener('dragleave', () => { drop.style.borderColor = 'var(--gz-border)'; drop.style.background = ''; });
drop.addEventListener('drop', e => { e.preventDefault(); drop.style.borderColor = 'var(--gz-border)'; drop.style.background = ''; handleFile(e.dataTransfer.files[0]); });
fileInput.addEventListener('change', () => { if (fileInput.files[0]) handleFile(fileInput.files[0]); });

function handleFile(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      wb = XLSX.read(new Uint8Array(e.target.result), { type: 'array' });
      const sel = $('#sheet-select');
      sel.innerHTML = wb.SheetNames.map(n => `<option value="${n}">${n}</option>`).join('');
      doConvert();
    } catch (err) {
      $('#status').innerHTML = `<span style="color:var(--gz-accent)">⚠ ${t('errParse')}: ${err.message}</span>`;
    }
  };
  reader.readAsArrayBuffer(file);
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function tag(name) { return (name||'col').replace(/[^A-Za-z0-9_\-:]/g,'_').replace(/^([0-9\-\.])/, '_$1'); }

function doConvert() {
  if (!wb) return;
  const sheetName = $('#sheet-select').value || wb.SheetNames[0];
  const ws = wb.Sheets[sheetName];
  const rows = XLSX.utils.sheet_to_json(ws, { header: 1, blankrows: false });
  if (!rows.length) { $('#output').textContent = ''; return; }
  const style = $('#style-select').value;
  const root = tag($('#root-name').value || 'data');
  const headers = rows[0].map((h,i) => tag(h) || ('col' + i));
  let xml = `<?xml version="1.0" encoding="UTF-8"?>\n<${root}>\n`;
  for (let i = 1; i < rows.length; i++) {
    const r = rows[i];
    if (style === 'attr') {
      let attrs = headers.map((h,j) => r[j] !== undefined && r[j] !== '' ? ` ${h}="${esc(r[j])}"` : '').join('');
      xml += `  <item${attrs} />\n`;
    } else {
      let body = headers.map((h,j) => r[j] !== undefined && r[j] !== '' ? `    <${h}>${esc(r[j])}</${h}>\n` : '').join('');
      xml += `  <item>\n${body}  </item>\n`;
    }
  }
  xml += `</${root}>`;
  $('#output').textContent = xml;
  $('#status').innerHTML = `<span style="color:var(--gz-success)">✓ ${(rows.length-1)} rows → XML</span>`;
}

$('#sheet-select').addEventListener('change', doConvert);
$('#style-select').addEventListener('change', doConvert);
$('#root-name').addEventListener('input', doConvert);

$('#toolbar').innerHTML = `
  <button class="gz-btn gz-btn-secondary" onclick="document.getElementById('file-input').click()">📁 Upload</button>
  <button class="gz-btn" onclick="copyText(document.getElementById('output').textContent);showCopied()">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="downloadXml()">${t('download')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="()=>{document.getElementById('output').textContent='';document.getElementById('status').innerHTML='';document.getElementById('file-input').value='';document.getElementById('sheet-select').innerHTML=''}">${t('clear')}</button>`;

window.showCopied = () => { const s=$('#status'); const o=s.innerHTML; s.innerHTML = `<span style="color:var(--gz-success)">✓ ${t('copied')}</span>`; setTimeout(()=>s.innerHTML=o,1500); };
window.downloadXml = () => {
  const text = $('#output').textContent; if (!text) return;
  const blob = new Blob([text], { type: 'application/xml' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = ($('#root-name').value || 'data') + '.xml';
  a.click();
};

GZ.renderToolPage({
  category: 'convert',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🔧', href:'/convert/excel-to-json.html', name:'Excel to JSON'},
    {icon:'📝', href:'/convert/excel-to-csv.html', name:'Excel to CSV'},
    {icon:'🌐', href:'/convert/excel-to-html.html', name:'Excel to HTML'},
    {icon:'📑', href:'/convert/xml-to-json.html', name:'XML to JSON'},
  ]
});
</script>
