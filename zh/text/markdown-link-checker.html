    errLongUrl: 'URL 过长（超过 500 字符）',

    warnHttp: '不安全的 http:// — 应使用 https://',

const { $, copyText, t } = GZ;

const SAMPLE = `# Sample Markdown Document

Welcome to my [blog post](https://example.com). Check out [my GitHub](https://github.com/user).

This is an insecure link: [old site](http://example.com).

An image: ![Alt text](https://example.com/img.png)
An image without alt: ![](https://example.com/img2.png)

## Section 1

A reference link: [ref link][1] and [another][two].

[1]: https://example.com/ref1
[two]: javascript:alert('xss')

An autolink: <https://example.com/autolink>
An email autolink: <foo@example.com>
A mailto: [contact](mailto:)
A bad anchor: [jump](#nonexistent-section)
Empty link: [](https://example.com)
A long URL: [long](https://example.com/` + 'a'.repeat(600) + `)

## See Also

[Same doc anchor](#section-1)`;

function slugify(s) {
  return s.toLowerCase().replace(/[^\w\u4e00-\u9fa5\s-]/g, '').replace(/\s+/g, '-').replace(/-+/g, '-').replace(/^-|-$/g, '');
}

function extractHeadings(md) {
  const headings = [];
  const re = /^(#{1,6})\s+(.*?)$/gm;
  let m;
  while ((m = re.exec(md)) !== null) {
    headings.push({ level: m[1].length, text: m[2].trim(), id: slugify(m[2].trim()) });
  }
  return headings;
}

function checkMarkdown(md) {
  const headings = extractHeadings(md);
  const headingIds = new Set(headings.map(h => h.id));
  const issues = [];
  let lineNum = 1;
  const lines = md.split('\n');
  let globalOffset = 0;

  function findLine(pos) {
    let acc = 0;
    for (let i = 0; i < lines.length; i++) {
      acc += lines[i].length + 1;
      if (acc > pos) return i + 1;
    }
    return lines.length;
  }

  // 1. Inline links: [text](url)
  const inlineRe = /\[([^\]]*)\]\(([^)]*)\)/g;
  let m;
  while ((m = inlineRe.exec(md)) !== null) {
    const text = m[1], url = m[2];
    const line = findLine(m.index);
    issues.push(checkLink(text, url, 'typeInline', line));
  }

  // 2. Images: ![alt](url)
  const imgRe = /!\[([^\]]*)\]\(([^)]*)\)/g;
  while ((m = imgRe.exec(md)) !== null) {
    const alt = m[1], url = m[2];
    const line = findLine(m.index);
    issues.push(checkImage(alt, url, line));
  }

  // 3. Reference link definitions: [id]: url
  const refDefRe = /^\s*\[([^\]]+)\]:\s*(\S+)/gm;
  while ((m = refDefRe.exec(md)) !== null) {
    const id = m[1], url = m[2];
    const line = findLine(m.index);
    if (/^javascript:/i.test(url) || /^data:/i.test(url) || /^vbscript:/i.test(url)) {
      issues.push({ type: 'typeRef', url, text: id, level: 'err', msg: t('errUnsafe'), line });
    } else if (!url) {
      issues.push({ type: 'typeRef', url: '(empty)', text: id, level: 'err', msg: t('errEmpty'), line });
    } else if (/^mailto:\s*$/i.test(url)) {
      issues.push({ type: 'typeRef', url, text: id, level: 'err', msg: t('errMailto'), line });
    } else {
      issues.push({ type: 'typeRef', url, text: id, level: 'ok', msg: '—', line });
    }
  }

  // 4. Reference usage: [text][id]
  const refUseRe = /\[([^\]]+)\]\[([^\]]+)\]/g;
  while ((m = refUseRe.exec(md)) !== null) {
    const text = m[1], refId = m[2];
    // Check if defined
    const defRe = new RegExp(`^\\s*\\[${refId.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')}\\]:`, 'm');
    if (!defRe.test(md)) {
      const line = findLine(m.index);
      issues.push({ type: 'typeRef', url: `[${refId}]`, text, level: 'err', msg: 'Reference ID not defined', line });
    }
  }

  // 5. Autolinks: <url>
  const autoRe = /<(https?:\/\/[^>]+|[^@\s>]+@[^@\s>]+)>/g;
  while ((m = autoRe.exec(md)) !== null) {
    const url = m[1];
    const line = findLine(m.index);
    if (url.includes('@')) {
      issues.push({ type: 'typeAuto', url, text: url, level: 'ok', msg: '—', line });
    } else if (/^http:\/\//i.test(url)) {
      issues.push({ type: 'typeAuto', url, text: url, level: 'warn', msg: t('warnHttp'), line });
    } else {
      issues.push({ type: 'typeAuto', url, text: url, level: 'ok', msg: '—', line });
    }
  }

  // 6. HTML anchor tags: <a href="...">
  const htmlRe = /<a\s+[^>]*href=["']([^"']+)["'][^>]*>(.*?)<\/a>/gi;
  while ((m = htmlRe.exec(md)) !== null) {
    const url = m[1], text = m[2].trim();
    const line = findLine(m.index);
    issues.push(checkLink(text, url, 'typeHtml', line));
  }

  // 7. HTML img tags
  const htmlImgRe = /<img\s+[^>]*src=["']([^"']+)["']([^>]*)>/gi;
  while ((m = htmlImgRe.exec(md)) !== null) {
    const url = m[1], attrs = m[2];
    const altMatch = attrs.match(/alt=["']([^"']*)["']/);
    const alt = altMatch ? altMatch[1] : null;
    const line = findLine(m.index);
    issues.push(checkImage(alt === null ? '⚠️' : alt, url, line, alt === null));
  }

  return { issues, headings, headingIds };
}

function checkLink(text, url, type, line) {
  if (!url) {
    return { type, url: '(empty)', text, level: 'err', msg: t('errEmpty'), line };
  }
  if (/^javascript:/i.test(url) || /^data:(?!image\/)/i.test(url) || /^vbscript:/i.test(url)) {
    return { type, url, text, level: 'err', msg: t('errUnsafe'), line };
  }
  if (/^mailto:\s*$/i.test(url)) {
    return { type, url, text, level: 'err', msg: t('errMailto'), line };
  }
  if (text.trim() === '') {
    return { type, url, text: '(empty)', level: 'err', msg: t('errNoText'), line };
  }
  if (url.length > 500) {
    return { type, url: url.slice(0, 100) + '…', text, level: 'err', msg: t('errLongUrl'), line };
  }
  if (url.startsWith('#')) {
    return { type: 'typeAnchor', url, text, level: 'warn', msg: t('warnAnchor'), line };
  }
  if (/^http:\/\//i.test(url)) {
    return { type, url, text, level: 'warn', msg: t('warnHttp'), line };
  }
  if (/\s/.test(url)) {
    return { type, url, text, level: 'err', msg: t('errMalformed'), line };
  }
  return { type, url, text, level: 'ok', msg: '—', line };
}

function checkImage(alt, url, line, isHtml = false) {
  const baseIssue = checkLink(alt || 'image', url, 'typeImg', line);
  if (!alt || alt.trim() === '') {
    baseIssue.level = 'err';
    baseIssue.msg = t('errNoAlt');
  }
  return baseIssue;
}

function render() {
  const md = $('#input').value;
  if (!md.trim()) {
    $('#results').innerHTML = `<div class="ml-empty">${t('noLinks')}</div>`;
    $('#summary').innerHTML = '';
    return;
  }
  const { issues, headings, headingIds } = checkMarkdown(md);
  // Check anchor existence
  issues.forEach(i => {
    if (i.type === 'typeAnchor' && i.url.startsWith('#')) {
      const id = i.url.slice(1);
      if (headingIds.has(id)) {
        i.level = 'ok'; i.msg = '✓ Anchor exists';
      } else {
        i.level = 'err'; i.msg = t('errAnchor');
      }
    }
  });

  // Summary
  const errCount = issues.filter(i => i.level === 'err').length;
  const warnCount = issues.filter(i => i.level === 'warn').length;
  const okCount = issues.filter(i => i.level === 'ok').length;
  const imgCount = issues.filter(i => i.type === 'typeImg').length;
  const ancCount = issues.filter(i => i.type === 'typeAnchor').length;
  $('#summary').innerHTML = `
    <div class="ml-stat"><div class="num">${issues.length}</div><div class="label">${t('total')}</div></div>
    <div class="ml-stat err"><div class="num">${errCount}</div><div class="label">${t('errors')}</div></div>
    <div class="ml-stat warn"><div class="num">${warnCount}</div><div class="label">${t('warnings')}</div></div>
    <div class="ml-stat ok"><div class="num">${okCount}</div><div class="label">${t('ok')}</div></div>
    <div class="ml-stat"><div class="num">${imgCount}</div><div class="label">${t('images')}</div></div>
    <div class="ml-stat"><div class="num">${ancCount}</div><div class="label">${t('anchors')}</div></div>`;

  // Results
  if (issues.length === 0) {
    $('#results').innerHTML = `<div class="ml-empty">${t('noLinks')}</div>`;
  } else {
    $('#results').innerHTML = issues.map(i => {
      const icon = i.level === 'err' ? '❌' : i.level === 'warn' ? '⚠️' : '✅';
      return `<div class="ml-item ${i.level}">
        <div class="row1">
          <span>${icon}</span>
          <span class="type">${t(i.type)}</span>
          <span class="url">${escapeHtml(i.url)}</span>
        </div>
        <div class="msg">${i.text !== '(empty)' && i.text !== i.url ? `<b>${escapeHtml(i.text.slice(0,60))}</b> · ` : ''}${escapeHtml(i.msg)}</div>
        <div class="line">${t('line')} ${i.line}</div>
      </div>`;
    }).join('');
  }
  return issues;
}

function escapeHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

$('#input').addEventListener('input', render);
$('#actions').innerHTML = `
  <button class="gz-btn" onclick="render()">${t('check')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#input').value=decodeURIComponent(encodeURIComponent(SAMPLE.replace(/\\\\n/g,String.fromCharCode(10))));render()">${t('sample')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#input').value='';render()">${t('clear')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="copyReport()">${t('copy')}</button>`;

function copyReport() {
  const md = $('#input').value;
  const { issues } = checkMarkdown(md);
  let report = `Markdown Link Check Report\n${'='.repeat(40)}\n\n`;
  issues.forEach(i => {
    const lvl = i.level.toUpperCase();
    report += `[${lvl}] ${i.type} @ line ${i.line}\n  URL: ${i.url}\n  Text: ${i.text}\n  ${i.msg}\n\n`;
  });
  copyText(report);
}
