<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="gz-test-area" id="testArea">
      <svg class="gz-mouse-svg" viewBox="0 0 120 180">
        <rect class="gz-mouse-body" x="20" y="10" width="80" height="160" rx="40"/>
        <line x1="60" y1="20" x2="60" y2="80" stroke="var(--border)" stroke-width="1.5"/>
        <rect class="gz-mouse-btn" id="btnLeft" x="24" y="14" width="33" height="50" rx="18" fill="transparent" stroke="var(--border)" stroke-width="1"/>
        <rect class="gz-mouse-btn" id="btnRight" x="63" y="14" width="33" height="50" rx="18" fill="transparent" stroke="var(--border)" stroke-width="1"/>
        <circle class="gz-mouse-btn" id="btnMiddle" cx="60" cy="100" r="8" fill="transparent" stroke="var(--border)" stroke-width="1"/>
      </svg>
      <div class="gz-test-prompt" id="prompt"></div>
      <div class="gz-cps-display" id="cpsDisplay">0.0</div>
      <div style="font-size:.8rem;color:var(--text2)">CPS</div>
    </div>
    <div class="gz-stats">
      <div class="gz-stat-card"><div class="gz-stat-val" id="statLeft">0</div><div class="gz-stat-lbl">🖱️ Left</div></div>
      <div class="gz-stat-card"><div class="gz-stat-val" id="statRight">0</div><div class="gz-stat-lbl">🖱️ Right</div></div>
      <div class="gz-stat-card"><div class="gz-stat-val" id="statMiddle">0</div><div class="gz-stat-lbl">🔘 Middle</div></div>
      <div class="gz-stat-card"><div class="gz-stat-val" id="statDouble">0</div><div class="gz-stat-lbl">⚡ Double</div></div>
      <div class="gz-stat-card"><div class="gz-stat-val" id="statDrag">0</div><div class="gz-stat-lbl">✋ Drags</div></div>
      <div class="gz-stat-card"><div class="gz-stat-val" id="statScroll">0</div><div class="gz-stat-lbl">🌀 Scroll</div></div>
    </div>
    <div style="max-width:500px;margin:0 auto">
      <div class="gz-scroll-area" id="scrollArea"></div>
    </div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Mouse Test',
    toolDesc: 'Test your mouse buttons, scroll wheel, double-click and CPS. Check if left, right and middle clicks register correctly — free, browser-based.',
    clickHere: 'Click anywhere in this area to test your mouse',
    reset: 'Reset',
    scrollTest: 'Scroll here to test your wheel ↑↓',
    step1: 'Click in the test area — the mouse diagram lights up for each button',
    step2: 'Left, right, and middle clicks are counted separately',
    step3: 'Scroll in the box below to test your scroll wheel',
    step4: 'Click Reset to clear all counters and start over',
  },
  zh: {
    toolTitle: '鼠标测试工具',
    toolDesc: '测试鼠标按键、滚轮、双击和 CPS。检查左键、右键和中键是否正常工作 — 免费浏览器工具。',
    clickHere: '在此区域点击任意位置测试鼠标',
    reset: '重置',
    scrollTest: '在此滚动测试滚轮 ↑↓',
    step1: '在测试区域点击 — 鼠标示意图会高亮对应按键',
    step2: '左键、右键和中键分别计数',
    step3: '在下方框中滚动测试滚轮',
    step4: '点击「重置」清除所有计数',
  }
});

const { $, t } = GZ;
let stats = { left: 0, right: 0, middle: 0, double: 0, drag: 0, scroll: 0 };
let clickTimes = [];
let lastClickTime = 0;

function updateStats() {
  $('#statLeft').textContent = stats.left;
  $('#statRight').textContent = stats.right;
  $('#statMiddle').textContent = stats.middle;
  $('#statDouble').textContent = stats.double;
  $('#statDrag').textContent = stats.drag;
  $('#statScroll').textContent = stats.scroll;
}

function updateCPS() {
  const now = Date.now();
  clickTimes = clickTimes.filter(t => now - t < 1000);
  const cps = clickTimes.length;
  $('#cpsDisplay').textContent = cps.toFixed(1);
}

function highlight(btnId, on) {
  const el = document.getElementById(btnId);
  if (el) el.classList.toggle('pressed', on);
}

const testArea = $('#testArea');

testArea.addEventListener('mousedown', (e) => {
  testArea.classList.add('active');
  const now = Date.now();
  clickTimes.push(now);

  if (e.button === 0) { stats.left++; highlight('btnLeft', true); }
  else if (e.button === 2) { stats.right++; highlight('btnRight', true); }
  else if (e.button === 1) { stats.middle++; highlight('btnMiddle', true); e.preventDefault(); }

  // double click detection
  if (now - lastClickTime < 350) stats.double++;
  lastClickTime = now;

  updateStats();
  updateCPS();
});

testArea.addEventListener('mouseup', (e) => {
  testArea.classList.remove('active');
  if (e.button === 0) highlight('btnLeft', false);
  else if (e.button === 2) highlight('btnRight', false);
  else if (e.button === 1) highlight('btnMiddle', false);
});

testArea.addEventListener('contextmenu', e => e.preventDefault());

testArea.addEventListener('dragstart', () => { stats.drag++; updateStats(); });

const scrollArea = $('#scrollArea');
scrollArea.textContent = t('scrollTest');
scrollArea.addEventListener('wheel', (e) => {
  stats.scroll++;
  highlight('btnMiddle', true);
  setTimeout(() => highlight('btnMiddle', false), 100);
  updateStats();
}, { passive: true });

// CPS live update
setInterval(updateCPS, 100);

function reset() {
  stats = { left: 0, right: 0, middle: 0, double: 0, drag: 0, scroll: 0 };
  clickTimes = [];
  lastClickTime = 0;
  updateStats();
  $('#cpsDisplay').textContent = '0.0';
}

$('#prompt').textContent = t('clickHere');
$('#toolbar').innerHTML = `<button class="gz-btn gz-btn-secondary" onclick="reset()">${t('reset')}</button>`;
updateStats();

GZ.renderToolPage({
  category: 'fun',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'⌨️', href:'/fun/keyboard-tester.html', name:'Keyboard Tester'},
    {icon:'⚡', href:'/fun/reaction-time.html', name:'Reaction Time'},
    {icon:'⏱️', href:'/fun/cps-test.html', name:'CPS Test'},
    {icon:'🖱️', href:'/dev/keycode.html', name:'Keycode Viewer'},
  ]
});
</script>
<script src="/tools-result-rec.js?v=20260707v520" defer></script>
</body>
