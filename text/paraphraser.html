function pickSynonym(word) {
  const key = word.toLowerCase();
  if (SYN[key]) {
    const opts = SYN[key];
    return opts[Math.floor(Math.random() * opts.length)];
  }
  return null;
}

function tokenize(text) {
  // Split while keeping separators
  return text.match(/[a-zA-Z\u4e00-\u9fa5]+['-]?[a-zA-Z\u4e00-\u9fa5]*|[^a-zA-Z\u4e00-\u9fa5]+/g) || [];
}

function rewriteStandard(text) {
  const tokens = tokenize(text);
  const out = [];
  let synonymRate = 0.4; // 40% chance to swap
  for (let tok of tokens) {
    if (/^[a-zA-Z]/.test(tok) && tok.length > 3) {
      const syn = pickSynonym(tok);
      if (syn && Math.random() < synonymRate) {
        // Preserve capitalization
        if (tok[0] === tok[0].toUpperCase() && tok[0] !== tok[0].toLowerCase()) {
          out.push(syn.charAt(0).toUpperCase() + syn.slice(1));
        } else {
          out.push(syn);
        }
      } else {
        out.push(tok);
      }
    } else {
      out.push(tok);
    }
  }
  return out.join('');
}

function rewriteFluency(text) {
  // Lower synonym rate, focus on common formal/awkward phrases
  const tokens = tokenize(text);
  const out = [];
  for (let tok of tokens) {
    if (/^[a-zA-Z]/.test(tok) && tok.length > 3 && Math.random() < 0.18) {
      const syn = pickSynonym(tok);
      if (syn) {
        if (tok[0] === tok[0].toUpperCase() && tok[0] !== tok[0].toLowerCase()) {
          out.push(syn.charAt(0).toUpperCase() + syn.slice(1));
        } else {
          out.push(syn);
        }
      } else {
        out.push(tok);
      }
    } else {
      out.push(tok);
    }
  }
  // Apply some fluency transformations
  let result = out.join('');
  result = result.replace(/\bin order to\b/gi, 'to');
  result = result.replace(/\bdue to the fact that\b/gi, 'because');
  result = result.replace(/\bin the event that\b/gi, 'if');
  result = result.replace(/\bwith regard to\b/gi, 'about');
  result = result.replace(/\bin regards to\b/gi, 'about');
  result = result.replace(/\bfor the purpose of\b/gi, 'to');
  result = result.replace(/\bat this point in time\b/gi, 'now');
  result = result.replace(/\ba large number of\b/gi, 'many');
  result = result.replace(/\ba majority of\b/gi, 'most');
  result = result.replace(/\bthe majority of\b/gi, 'most');
  return result;
}

function rewriteCreative(text) {
  // Higher synonym rate + active/passive swap + structure changes
  const tokens = tokenize(text);
  const out = [];
  for (let tok of tokens) {
    if (/^[a-zA-Z]/.test(tok) && tok.length > 3) {
      const syn = pickSynonym(tok);
      if (syn && Math.random() < 0.65) {
        if (tok[0] === tok[0].toUpperCase() && tok[0] !== tok[0].toLowerCase()) {
          out.push(syn.charAt(0).toUpperCase() + syn.slice(1));
        } else {
          out.push(syn);
        }
      } else {
        out.push(tok);
      }
    } else {
      out.push(tok);
    }
  }
  let result = out.join('');
  // Reorder some "however, X" to "X, however"
  result = result.replace(/(However|Nevertheless|Moreover|Furthermore|Additionally), /g, (m, w) => {
    return ''; // remove
  });
  // Sometimes add contrastive connectors
  return result;
}

function rewriteShorten(text) {
  // Remove filler words and condense
  let r = text;
  r = r.replace(/\b(very|really|quite|rather|somewhat|just|simply|actually|basically|literally|essentially|definitely|certainly|absolutely|completely|totally|extremely|incredibly)\s+/gi, '');
  r = r.replace(/\bin order to\b/gi, 'to');
  r = r.replace(/\bdue to the fact that\b/gi, 'because');
  r = r.replace(/\bat this point in time\b/gi, 'now');
  r = r.replace(/\ba large number of\b/gi, 'many');
  r = r.replace(/\bfor the purpose of\b/gi, 'to');
  r = r.replace(/\bin the event that\b/gi, 'if');
  r = r.replace(/\bwith regard to\b/gi, 'about');
  r = r.replace(/\bthe fact that\b/gi, 'that');
  r = r.replace(/\bin spite of the fact that\b/gi, 'although');
  r = r.replace(/\bas a matter of fact,?\s*/gi, '');
  r = r.replace(/\bit is important to note that\s*/gi, '');
  r = r.replace(/\bit should be noted that\s*/gi, '');
  // Remove double spaces
  r = r.replace(/\s+/g, ' ');
  // Light synonym pass
  const tokens = tokenize(r);
  const out = [];
  for (let tok of tokens) {
    if (/^[a-zA-Z]/.test(tok) && tok.length > 4 && Math.random() < 0.15) {
      const syn = pickSynonym(tok);
      if (syn && syn.length < tok.length) {
        if (tok[0] === tok[0].toUpperCase() && tok[0] !== tok[0].toLowerCase()) {
          out.push(syn.charAt(0).toUpperCase() + syn.slice(1));
        } else {
          out.push(syn);
        }
      } else {
        out.push(tok);
      }
    } else {
      out.push(tok);
    }
  }
  return out.join('');
}

function countWords(text) {
  if (/[\u4e00-\u9fa5]/.test(text)) {
    const cjk = (text.match(/[\u4e00-\u9fa5]/g) || []).length;
    const latin = (text.match(/[a-zA-Z]+/g) || []).length;
    return cjk + latin;
  }
  return (text.match(/[a-zA-Z]+/g) || []).length;
}

function fleschKincaid(text) {
  const sentences = text.split(/[.!?]+/).filter(s => s.trim().length);
  const words = text.match(/[a-zA-Z]+/g) || [];
  const wc = words.length || 1;
  const sc = sentences.length || 1;
  let totalSyll = 0;
  for (let w of words) totalSyll += countSyllables(w);
  const fk = 0.39 * (wc/sc) + 11.8 * (totalSyll/wc) - 15.59;
  return Math.max(0, Math.min(100, Math.round(100 - fk)));
}

function countSyllables(word) {
  word = word.toLowerCase();
  if (word.length <= 3) return 1;
  word = word.replace(/(?:[^laeiouy]es|ed|[^laeiouy]e)$/, '');
  word = word.replace(/^y/, '');
  const matches = word.match(/[aeiouy]{1,2}/g);
  return matches ? matches.length : 1;
}

function similarity(a, b) {
  if (!a || !b) return 0;
  const wa = new Set((a.toLowerCase().match(/[a-zA-Z\u4e00-\u9fa5]+/g) || []));
  const wb = new Set((b.toLowerCase().match(/[a-zA-Z\u4e00-\u9fa5]+/g) || []));
  if (wa.size === 0) return 0;
  let common = 0;
  wa.forEach(w => { if (wb.has(w)) common++; });
  return Math.round((common / Math.max(wa.size, wb.size)) * 100);
}

function renderStats(orig, out) {
  const oWords = countWords(orig);
  const nWords = countWords(out);
  const delta = nWords - oWords;
  const dPct = oWords ? Math.round((delta/oWords)*100) : 0;
  const read = fleschKincaid(out);
  const change = 100 - similarity(orig, out);
  const fmtDelta = (n) => {
    if (n === 0) return '<span class="pp-delta">±0</span>';
    if (n > 0) return `<span class="pp-delta up">+${n}</span>`;
    return `<span class="pp-delta down">${n}</span>`;
  };
  const fmtDeltaPct = (n) => {
    if (n === 0) return '<span class="pp-delta">±0%</span>';
    if (n > 0) return `<span class="pp-delta up">+${n}%</span>`;
    return `<span class="pp-delta down">${n}%</span>`;
  };
  $('#stats').innerHTML = `
    <div class="pp-stat"><div class="num">${nWords} ${fmtDelta(nWords-oWords)}</div><div class="lbl">${t('statWords')}</div></div>
    <div class="pp-stat"><div class="num">${out.length} ${fmtDelta(out.length-orig.length)}</div><div class="lbl">${t('statChars')}</div></div>
    <div class="pp-stat"><div class="num">${read}/100</div><div class="lbl">${t('statReads')}</div></div>
    <div class="pp-stat"><div class="num">${change}%</div><div class="lbl">${t('statChange')}</div></div>
  `;
}

function doRewrite() {
  const text = $('#input').value.trim();
  if (!text) { $('#output').value = ''; $('#stats').innerHTML = ''; return; }
  let result;
  if (currentMode === 'standard') result = rewriteStandard(text);
  else if (currentMode === 'fluency') result = rewriteFluency(text);
  else if (currentMode === 'creative') result = rewriteCreative(text);
  else if (currentMode === 'shorten') result = rewriteShorten(text);
  // Run multiple times for creative to maximize change
  if (currentMode === 'creative') {
    const prev = result;
    result = rewriteStandard(result);
    if (result === prev) result = rewriteStandard(text);
  }
  $('#output').value = result;
  lastOutput = result;
  renderStats(text, result);
}
