<script>
GZI18n.register({
  en: {
    toolTitle: 'Video Merger & Joiner',
    toolDesc: 'Combine multiple video clips into one video file in your browser. Drag-and-drop, reorder, and merge. No upload — runs entirely on your device.',
    dropLabel: 'Drop video files here or click to upload',
    noFiles: 'Add at least 2 video files to merge.',

    dlBtn: '⬇ Download merged video',

    step1: 'Click the upload area or drag-and-drop your video files',
    step2: 'Reorder clips using the ↑ / ↓ buttons if needed',
    step3: 'Click Merge videos — processing happens entirely in your browser',
    step4: 'Watch the preview and click Download to save the merged file',
  },
  zh: {
    toolTitle: '视频合并器',
    toolDesc: '在浏览器中将多个视频片段合并为一个视频文件。拖放上传、重新排序、合并。无需上传 — 完全在你的设备上运行。',
    dropLabel: '将视频文件拖到此处或点击上传',
    noFiles: '请至少添加 2 个视频文件再合并。',
    mergeProgress: '正在合并 {n}/{total}…',
    mergeDone: '✓ 完成！合并后的视频已准备好。',
    mergeErr: '✗ 合并过程中出错：',
    outputFmt: '输出 WebM (VP9 + Opus)',
    dlBtn: '⬇ 下载合并后的视频',
    fileLoadErr: '无法加载 "{name}"。你的浏览器可能不支持该格式。',
    step1: '点击上传区域或拖放视频文件',
    step2: '如需重新排序，使用 ↑ / ↓ 按钮',
    step3: '点击「合并视频」— 处理完全在你的浏览器中完成',
    step4: '预览完成后点击「下载」保存合并文件',
  }
});

const { $, t } = GZ;

let files = []; // [{ id, file, url, duration, width, height, videoEl }]

const drop = $('#drop');
const fileInput = $('#fileInput');
drop.addEventListener('click', () => fileInput.click());
drop.addEventListener('dragover', e => { e.preventDefault(); drop.classList.add('drag'); });
drop.addEventListener('dragleave', () => drop.classList.remove('drag'));
drop.addEventListener('drop', e => {
  e.preventDefault(); drop.classList.remove('drag');
  if (e.dataTransfer.files) addFiles(e.dataTransfer.files);
});
fileInput.addEventListener('change', e => addFiles(e.target.files));

function fmtTime(s){
  if (!isFinite(s)) return '—';
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  return `${m}:${String(sec).padStart(2,'0')}`;
}

async function addFiles(fs){
  for (const f of fs){
    if (!f.type.startsWith('video/')) continue;
    const url = URL.createObjectURL(f);
    const v = document.createElement('video');
    v.src = url;
    v.muted = false;
    v.preload = 'metadata';
    await new Promise((res) => {
      v.addEventListener('loadedmetadata', res, { once: true });
      v.addEventListener('error', () => {
        setStatus(t('fileLoadErr').replace('{name}', f.name), 'err');
        res();
      }, { once: true });
    });
    files.push({
      id: Math.random().toString(36).slice(2),
      file: f,
      url,
      duration: v.duration || 0,
      width: v.videoWidth || 0,
      height: v.videoHeight || 0,
      videoEl: v,
    });
  }
  renderList();
  fileInput.value = '';
}

function renderList(){
  const ul = $('#list');
  ul.innerHTML = files.map((f, i) => `
    <li data-id="${f.id}">
      <video src="${f.url}" muted></video>
      <div class="meta">
        <div class="name">${escapeHtml(f.file.name)}</div>
        <div class="dur">${fmtTime(f.duration)} · ${f.width || '?'}×${f.height || '?'} · ${(f.file.size/1048576).toFixed(1)} MB</div>
      </div>
      <div class="act">
        <button onclick="moveFile(${i},-1)" ${i===0?'disabled':''}>↑</button>
        <button onclick="moveFile(${i},1)" ${i===files.length-1?'disabled':''}>↓</button>
        <button class="rm" onclick="removeFile('${f.id}')">✕</button>
      </div>
    </li>`).join('');
}

function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function moveFile(i, dir){
  const j = i + dir;
  if (j < 0 || j >= files.length) return;
  [files[i], files[j]] = [files[j], files[i]];
  renderList();
}
function removeFile(id){
  const i = files.findIndex(f => f.id === id);
  if (i >= 0){
    URL.revokeObjectURL(files[i].url);
    files.splice(i, 1);
    renderList();
  }
}

function setStatus(msg, type){
  const el = $('#status');
  el.style.display = 'block';
  el.innerHTML = `<span class="${type || ''}">${msg}</span>`;
}

async function mergeVideos(){
  if (files.length < 2){ setStatus(t('noFiles'), 'err'); return; }
  const valid = files.filter(f => f.duration > 0);
  if (valid.length < 2){ setStatus(t('noFiles'), 'err'); return; }

  // Determine target dimensions: use the largest
  const w = Math.max(...valid.map(f => f.width || 640));
  const h = Math.max(...valid.map(f => f.height || 480));
  const canvas = document.createElement('canvas');
  canvas.width = w;
  canvas.height = h;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, w, h);

  // Audio: mix using Web Audio API
  const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const audioDest = audioCtx.createMediaStreamDestination();

  const videoStream = canvas.captureStream(30);
  const combinedStream = new MediaStream([
    ...videoStream.getVideoTracks(),
    ...audioDest.stream.getAudioTracks(),
  ]);

  let mime = 'video/webm;codecs=vp9,opus';
  if (!MediaRecorder.isTypeSupported(mime)) mime = 'video/webm;codecs=vp8,opus';
  if (!MediaRecorder.isTypeSupported(mime)) mime = 'video/webm';

  const chunks = [];
  const recorder = new MediaRecorder(combinedStream, { mimeType: mime, videoBitsPerSecond: 5_000_000 });
  recorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
  const stopped = new Promise(res => recorder.onstop = res);
  recorder.start();

  $('#progBar').style.display = 'block';
  $('#progFill').style.width = '0%';

  try {
    for (let i = 0; i < valid.length; i++){
      const f = valid[i];
      setStatus(t('mergeProgress').replace('{n}', i+1).replace('{total}', valid.length));
      $('#progFill').style.width = `${(i / valid.length) * 90}%`;

      // Draw video
      const v = f.videoEl;
      v.muted = false;
      v.currentTime = 0;
      await new Promise(res => {
        if (v.readyState >= 2) res();
        else v.addEventListener('loadeddata', res, { once: true });
      });
      await v.play();

      // Connect audio
      let audioSource = null;
      try {
        audioSource = audioCtx.createMediaElementSource(v);
        audioSource.connect(audioDest);
      } catch(e){ /* element may already be connected */ }

      // Render frames
      const dur = f.duration;
      const startTime = performance.now();
      const drawFrame = () => {
        // Fit into canvas (letterbox)
        const vw = v.videoWidth, vh = v.videoHeight;
        const scale = Math.min(w / vw, h / vh);
        const dw = vw * scale, dh = vh * scale;
        const dx = (w - dw) / 2, dy = (h - dh) / 2;
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, w, h);
        ctx.drawImage(v, dx, dy, dw, dh);
      };
      drawFrame();
      const interval = setInterval(drawFrame, 33);

      // Wait for video to end (or fall back to duration timeout)
      await new Promise(res => {
        const onEnd = () => { v.removeEventListener('ended', onEnd); clearInterval(interval); res(); };
        v.addEventListener('ended', onEnd);
        // Backup timeout based on duration
        setTimeout(() => { v.pause(); onEnd(); }, Math.max(1000, (dur || 5) * 1000 + 200));
      });

      if (audioSource) { try { audioSource.disconnect(); } catch(e){} }
    }
  } catch(err){
    setStatus(t('mergeErr') + err.message, 'err');
    try { recorder.stop(); } catch(e){}
    return;
  }

  recorder.stop();
  await stopped;
  $('#progFill').style.width = '100%';
  const blob = new Blob(chunks, { type: 'video/webm' });
  const url = URL.createObjectURL(blob);
  setStatus(t('mergeDone') + ' · ' + t('outputFmt'), 'ok');
  $('#output').innerHTML = `
    <video controls src="${url}"></video>
    <div style="margin-top:10px"><a class="gz-btn" href="${url}" download="merged-video.webm">${t('dlBtn')}</a></div>
  `;
}

$('#btnMerge').addEventListener('click', mergeVideos);
$('#btnClear').addEventListener('click', () => {
  files.forEach(f => URL.revokeObjectURL(f.url));
  files = [];
  renderList();
  $('#output').innerHTML = '';
  $('#status').style.display = 'none';
  $('#progBar').style.display = 'none';
});

// expose to inline handlers
window.moveFile = moveFile;
window.removeFile = removeFile;

GZ.renderToolPage({

  titleKey: 'toolTitle',

    {icon:'🎞️', href:'/convert/video-trimmer.html', name:'Video Trimmer'},
    {icon:'🔊', href:'/convert/audio-joiner.html', name:'Audio Joiner'},
    {icon:'🔊', href:'/convert/audio-trimmer.html', name:'Audio Trimmer'},
  ]
});
</script>
