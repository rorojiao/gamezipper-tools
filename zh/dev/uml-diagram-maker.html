<script>
GZI18n.register({en:{toolTitle:'UML Diagram Maker',toolDesc:'Create UML sequence, class and state diagrams from plain text. Powered by Mermaid — live preview, export SVG/PNG. Free, private, browser-only.',inputLabel:'Diagram Source (Mermaid)',previewLabel:'Live Preview',sequence:'Sequence',classDiagram:'Class',state:'State',activity:'Activity',er:'ER Diagram',render:'Render',example:'Template',clear:'Clear',downloadSvg:'Download SVG',downloadPng:'Download PNG',step1:'Pick a diagram type — sequence, class, state and more',step2:'Edit the text template to add actors, messages or classes',step3:'Watch the live preview update as you type',step4:'Download as SVG or PNG for docs and presentations'},
zh:{toolTitle:'UML 图表制作工具',toolDesc:'用纯文本创建 UML 时序图、类图和状态图。基于 Mermaid — 实时预览、导出 SVG/PNG。免费、私密、浏览器本地运行。',inputLabel:'图表源码（Mermaid）',previewLabel:'实时预览',sequence:'时序图',classDiagram:'类图',state:'状态图',activity:'活动图',er:'ER 图',render:'渲染',example:'模板',clear:'清空',downloadSvg:'下载 SVG',downloadPng:'下载 PNG',step1:'选择图表类型 — 时序图、类图、状态图等',step2:'编辑文本模板，添加参与者、消息或类',step3:'查看实时预览随输入更新',step4:'下载为 SVG 或 PNG，用于文档和演示'}});
const {$,t}=GZ;
const input=$('#input'),preview=$('#preview'),status=$('#status');
mermaid.initialize({startOnLoad:false,theme:'default',securityLevel:'loose'});
const TEMPLATES={
sequence:'sequenceDiagram\n    autonumber\n    Client->>Server: HTTP Request\n    Server->>Database: Query\n    Database-->>Server: Rows\n    Server-->>Client: JSON Response\n    Note over Client,Server: Encrypted over TLS',
'class':'classDiagram\n    class User {\n        +String name\n        +String email\n        +login()\n        +logout()\n    }\n    class Order {\n        +int id\n        +Date date\n        +total()\n    }\n    User "1" --> "*" Order : places',
state:'stateDiagram-v2\n    [*] --> Pending\n    Pending --> Processing : pay\n    Processing --> Shipped : pack\n    Shipped --> Delivered : deliver\n    Delivered --> [*]\n    Processing --> Cancelled : cancel\n    Cancelled --> [*]',
activity:'flowchart TD\n    A[Start] --> B{Logged in?}\n    B -- No --> C[Show login]\n    C --> B\n    B -- Yes --> D[Load dashboard]\n    D --> E[End]',
er:'erDiagram\n    CUSTOMER ||--o{ ORDER : places\n    ORDER ||--|{ LINE-ITEM : contains\n    CUSTOMER {\n        string name\n        string email\n    }\n    ORDER {\n        int id\n        string status\n    }'
};
let currentType='sequence';
function loadTemplate(type){currentType=type;input.value=TEMPLATES[type];render();}
async function render(){
  let code=(input.value||'').trim();
  if(!code){preview.innerHTML='';return;}
  if(!/^(\s*(erDiagram|stateDiagram|flowchart|sequenceDiagram|classDiagram|graph|pie|gantt|journey|mindmap))/m.test(code)){code='sequenceDiagram\n'+code;}
  try{
    const id='uml-'+Date.now();
    const {svg}=await mermaid.render(id,code);
    preview.innerHTML=svg;
    status.innerHTML='<span style="color:var(--gz-success)">✓ '+t('render')+'</span>';
  }catch(e){
    status.innerHTML='<span style="color:var(--gz-accent)">✗ '+(e.message||e.str||'Error')+'</span>';
  }
}
function downloadSvg(){const svg=preview.querySelector('svg');if(!svg){status.textContent='—';return;}const blob=new Blob([new XMLSerializer().serializeToString(svg)],{type:'image/svg+xml'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='uml-diagram.svg';a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000);status.textContent='✓ SVG';}
function downloadPng(){const svg=preview.querySelector('svg');if(!svg){status.textContent='—';return;}const data=new XMLSerializer().serializeToString(svg);const vb=(svg.viewBox&&svg.viewBox.baseVal)||{width:svg.clientWidth||600,height:svg.clientHeight||400};const w=Math.max(200,vb.width||600),h=Math.max(200,vb.height||400);const img=new Image();const blob=new Blob([data],{type:'image/svg+xml;charset=utf-8'});const url=URL.createObjectURL(blob);img.onload=()=>{const c=document.createElement('canvas');c.width=w*2;c.height=h*2;const ctx=c.getContext('2d');ctx.fillStyle='#fff';ctx.fillRect(0,0,c.width,c.height);ctx.drawImage(img,0,0,c.width,c.height);URL.revokeObjectURL(url);c.toBlob(b=>{const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='uml-diagram.png';a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000);status.textContent='✓ PNG';});};img.src=url;}
$('#toolbar').innerHTML='<button class="gz-btn" onclick="render()">▶ '+t('render')+'</button><button class="gz-btn gz-btn-secondary" onclick="downloadSvg()">🖼 '+t('downloadSvg')+'</button><button class="gz-btn gz-btn-secondary" onclick="downloadPng()">🖼 '+t('downloadPng')+'</button><button class="gz-btn gz-btn-secondary" onclick="loadTemplate(currentType)">'+t('example')+'</button><button class="gz-btn gz-btn-secondary" onclick="input.value=\'\';preview.innerHTML=\'\';status.textContent=\'\'">'+t('clear')+'</button>';
$('#type-buttons').innerHTML=[
  ['sequence',t('sequence')],['class',t('classDiagram')],['state',t('state')],['activity',t('activity')],['er',t('er')]
].map(([k,label])=>`<button class="gz-btn ${k===currentType?'':'gz-btn-secondary'}" onclick="document.querySelectorAll('#type-buttons button').forEach(b=>b.className='gz-btn gz-btn-secondary');this.className='gz-btn';loadTemplate('${k}')">${label}</button>`).join('');
$('#input-label').textContent=t('inputLabel');$('#preview-label').textContent=t('previewLabel');
input.addEventListener('input',()=>{clearTimeout(window._umlt);window._umlt=setTimeout(render,400);});
GZ.renderToolPage({category:'dev',titleKey:'toolTitle',descKey:'toolDesc',howToSteps:['step1','step2','step3','step4'],related:[{icon:'🔀',href:'/dev/flowchart-maker.html',name:'Flowchart Maker'},{icon:'🗄️',href:'/dev/er-diagram-maker.html',name:'ER Diagram'},{icon:'🌳',href:'/dev/json-viewer.html',name:'JSON Viewer'},{icon:'🗺️',href:'/dev/mermaid-editor.html',name:'Mermaid Editor'}]});
loadTemplate('sequence');
</script><script src="/tools-result-rec.js?v=20260707v520" defer></script></body></html>
