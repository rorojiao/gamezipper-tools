<div class="gz-container">

  </div>
  <div class="gz-tool-area">

      <div class="sn-header">
        <div class="sn-title" id="snTitle">🐍 Snake</div>
        <div class="sn-stats">
          <div class="sn-stat"><div class="lbl" id="lblScore">Score</div><div class="val" id="score">0</div></div>
          <div class="sn-stat level"><div class="lbl" id="lblLevel">Level</div><div class="val" id="level">1</div></div>
          <div class="sn-stat best"><div class="lbl" id="lblBest">Best</div><div class="val" id="best">0</div></div>

        <button onclick="setDir(-1,0)">←</button><div class="empty"></div><button onclick="setDir(1,0)">→</button>

<script>
GZI18n.register({
  en: {
    snTitle: 'Snake — Classic Arcade Game',
    snDesc: 'Eat the food, grow longer, avoid your own tail. Free classic Snake with 3 speeds, level progression and best-score tracking.',
    score:'Score', level:'Level', best:'Best',
    slow:'Slow', normal:'Normal', fast:'Fast',
    pause:'⏸ Pause', resume:'▶ Resume', restart:'🔄 Restart', start:'Start Game',
    gameOver:'💀 Game Over!', scoreLabel:'Final score',
    paused:'⏸ Paused', pressStart:'Press Start or Space to begin',
    snStep1:'Pick a difficulty (Slow, Normal, Fast)',
    snStep2:'Press Start or Space to begin',
    snStep3:'Use arrow keys, WASD, or the on-screen D-pad to steer',
    snStep4:'Eat red food to grow and score — avoid walls and your own tail!',
  },
  zh: {
    snTitle: '贪吃蛇 — 经典街机游戏',
    snDesc: '吃食物、长身体、避开自己的尾巴。免费经典贪吃蛇，3 个速度、关卡递进、最佳成绩记录。',
    score:'分数', level:'关卡', best:'最佳',
    slow:'慢速', normal:'普通', fast:'快速',
    pause:'⏸ 暂停', resume:'▶ 继续', restart:'🔄 重开', start:'开始游戏',
    gameOver:'💀 游戏结束！', scoreLabel:'最终得分',
    paused:'⏸ 已暂停', pressStart:'按开始或空格键开始',
    snStep1:'选择难度（慢速、普通、快速）',
    snStep2:'点击「开始游戏」或按空格键开始',
    snStep3:'使用方向键、WASD 或屏幕方向键控制方向',
    snStep4:'吃红色食物成长得分 —— 避免撞墙和撞到自己！',
  }
});

const {t,$} = GZ;

const SPEEDS = { slow: 180, normal: 110, fast: 70 };
const GRID = 20, CELL = 20;

let canvas, ctx, snake, dir, nextDir, food, score, level, best = +(localStorage.getItem('sn-best')||0), running = false, paused = false, gameOver = false, timer = null, speed = 'normal';

$('#lblScore').textContent = t('score');
$('#lblLevel').textContent = t('level');
$('#lblBest').textContent = t('best');
$('#pauseBtn').textContent = t('pause');
$('#restartBtn').textContent = t('restart');

function renderSpeed(){
  $('#speedRow').innerHTML = ['slow','normal','fast'].map(s=>`<button class="gz-btn gz-btn-secondary ${speed===s?'active':''}" onclick="setSpeed('${s}')">${t(s)}</button>`).join('');
}
function setSpeed(s){speed=s;renderSpeed();if(running)startGame();}
window.setSpeed = setSpeed;

function startGame(){
  clearInterval(timer);
  snake = [{x:10,y:10},{x:9,y:10},{x:8,y:10}];
  dir = {x:1,y:0}; nextDir = {x:1,y:0};
  score = 0; level = 1; running = true; paused = false; gameOver = false;
  $('#pauseBtn').textContent = t('pause');
  spawnFood();
  $('#overlay').classList.add('hidden');
  timer = setInterval(tick, SPEEDS[speed]);
  draw();
  updateStats();
}
window.startGame = startGame;

function spawnFood(){
  while(true){
    const x=Math.floor(Math.random()*GRID), y=Math.floor(Math.random()*GRID);
    if(!snake.some(s=>s.x===x&&s.y===y)){food={x,y};return;}
  }
}

function tick(){
  if(paused||!running)return;
  if((nextDir.x!==-dir.x||nextDir.y!==-dir.y))dir=nextDir;
  const head={x:snake[0].x+dir.x, y:snake[0].y+dir.y};
  if(head.x<0||head.x>=GRID||head.y<0||head.y>=GRID||snake.some(s=>s.x===head.x&&s.y===head.y)){endGame();return;}
  snake.unshift(head);
  if(head.x===food.x&&head.y===food.y){score+=10;if(score>best){best=score;localStorage.setItem('sn-best',best);}if(snake.length%5===0){level++;clearInterval(timer);timer=setInterval(tick,Math.max(40,SPEEDS[speed]-(level-1)*8));}spawnFood();}
  else snake.pop();
  draw(); updateStats();
}

function endGame(){
  running=false; gameOver=true; clearInterval(timer);
  $('#overlayText').innerHTML = t('gameOver')+'<br><span style="font-size:.7em;opacity:.8">'+t('scoreLabel')+': '+score+'</span>';
  $('#overlayBtn').textContent = t('restart');
  $('#overlay').classList.remove('hidden');
}

function togglePause(){
  if(!running||gameOver)return;
  paused=!paused;
  $('#pauseBtn').textContent = t(paused?'resume':'pause');
  if(paused){
    $('#overlayText').textContent = t('paused');
    $('#overlayBtn').textContent = t('resume');
    $('#overlay').classList.remove('hidden');
  } else {
    $('#overlay').classList.add('hidden');
  }
}
window.togglePause = togglePause;

function setDir(x,y){
  if((x===0&&y===0)||(x===-dir.x&&y===-dir.y))return;
  nextDir={x,y};
}
window.setDir = setDir;

function updateStats(){
  $('#score').textContent = score;
  $('#level').textContent = level;
  $('#best').textContent = best;
}

function draw(){
  ctx.fillStyle='#0d0d1a';ctx.fillRect(0,0,400,400);
  // grid
  ctx.strokeStyle='rgba(255,255,255,.04)';ctx.lineWidth=1;
  for(let i=0;i<=GRID;i++){ctx.beginPath();ctx.moveTo(i*CELL,0);ctx.lineTo(i*CELL,400);ctx.stroke();ctx.beginPath();ctx.moveTo(0,i*CELL);ctx.lineTo(400,i*CELL);ctx.stroke();}
  // food
  const fx=food.x*CELL,fy=food.y*CELL;
  ctx.fillStyle='#ff4757';
  ctx.beginPath();ctx.arc(fx+CELL/2,fy+CELL/2,CELL/2-1,0,Math.PI*2);ctx.fill();
  // snake
  snake.forEach((s,i)=>{
    const x=s.x*CELL, y=s.y*CELL;
    if(i===0){ctx.fillStyle='#7bed9f';}else{ctx.fillStyle=`hsl(${140-i*2},60%,${Math.max(35,55-i*0.5)}%)`;}
    ctx.fillRect(x+1,y+1,CELL-2,CELL-2);
    if(i===0){
      ctx.fillStyle='#1a1a2e';
      const ex=dir.x,ey=dir.y;
      ctx.fillRect(x+CELL/2-1+ex*5,y+CELL/2-1+ey*5,2,2);
      ctx.fillRect(x+CELL/2-1+ex*5+ey*4,y+CELL/2-1+ey*5+ex*4,2,2);
    }
  });
}

document.addEventListener('keydown',e=>{
  if(e.key===' '||e.key==='p'||e.key==='P'){e.preventDefault();if(!running&&!gameOver)startGame();else togglePause();return;}
  if(e.key==='ArrowUp'||e.key==='w')setDir(0,-1);
  else if(e.key==='ArrowDown'||e.key==='s')setDir(0,1);
  else if(e.key==='ArrowLeft'||e.key==='a')setDir(-1,0);
  else if(e.key==='ArrowRight'||e.key==='d')setDir(1,0);
});

let tx,ty;
const c=$('#canvas');
c.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY;},{passive:true});
c.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-tx, dy=e.changedTouches[0].clientY-ty;
  if(Math.abs(dx)<20&&Math.abs(dy)<20)return;
  if(Math.abs(dx)>Math.abs(dy))setDir(dx>0?1:-1,0);else setDir(0,dy>0?1:-1);
},{passive:true});

canvas = $('#canvas'); ctx = canvas.getContext('2d');
renderSpeed();
$('#overlayText').textContent = t('pressStart');
$('#overlayBtn').textContent = t('start');
draw(); updateStats();

GZ.renderToolPage({
  category: 'fun',
  titleKey: 'snTitle',
  descKey: 'snDesc',
  howToSteps: ['snStep1','snStep2','snStep3','snStep4'],
  related: [
    {icon:'🔢', href:'/fun/2048.html', name:'2048'},
    {icon:'⭕', href:'/fun/tic-tac-toe.html', name:'Tic Tac Toe'},
    {icon:'🧩', href:'/fun/word-search.html', name:'Word Search'},
    {icon:'⌨️', href:'/fun/typing-test.html', name:'Typing Test'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
