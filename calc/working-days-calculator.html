<script>
GZI18n.register({
  en: {
    toolTitle: 'Working Days Calculator',
    toolDesc: 'Count business days between two dates or add/subtract working days from a date. Exclude weekends (Mon–Fri or Mon–Sat) and your own list of holidays. Free, private and browser-only.',
    tabDiff: 'Days between two dates',
    tabAdd: 'Add / subtract working days',
    lbStart: 'Start date',
    lbEnd: 'End date',
    lbDays: 'Working days (+ / −)',
    lbWeek: 'Work week',
    lbHolidays: 'Holidays (one per line, YYYY-MM-DD)',
    opt5: 'Monday – Friday',
    opt6: 'Monday – Saturday',
    resDays: 'working days',
    resCalendar: 'calendar days',
    resResult: 'Result date',
    dDays: 'Working days',
    dCalendar: 'Calendar days',
    dWeeks: 'Approx. weeks',
    dHours: 'Working hours (8h/day)',
    dFrom: 'From',
    dTo: 'To',
    dHolidays: 'Holidays excluded',
    step1: 'Pick the mode: days between two dates, or add/subtract N working days',
    step2: 'Choose your work week (Mon–Fri or Mon–Sat)',
    step3: 'Paste any holiday dates you want excluded',
    step4: 'Read the result — including calendar days, weeks and working hours',
    errRange: 'End date must be after start date',
  },
  zh: {
    toolTitle: '工作日计算器',
    toolDesc: '计算两个日期之间的工作日数，或在某日期上加减工作日。可排除周末（周一至周五或周一至周六）和自定义节假日。免费、私密、浏览器本地运行。',
    tabDiff: '两个日期之间的天数',
    tabAdd: '加 / 减 工作日',
    lbStart: '开始日期',
    lbEnd: '结束日期',
    lbDays: '工作日（+ / −）',
    lbWeek: '工作周',
    lbHolidays: '节假日（每行一个，YYYY-MM-DD）',
    opt5: '周一 – 周五',
    opt6: '周一 – 周六',
    resDays: '个工作日',
    resCalendar: '个日历日',
    resResult: '结果日期',
    dDays: '工作日',
    dCalendar: '日历日',
    dWeeks: '约周数',
    dHours: '工作小时（8 小时/天）',
    dFrom: '从',
    dTo: '到',
    dHolidays: '已排除节假日',
    step1: '选择模式：两个日期之间的天数，或加减 N 个工作日',
    step2: '选择工作周（周一至周五或周一至周六）',
    step3: '粘贴需要排除的节假日日期',
    step4: '查看结果 — 含日历日、周数和工作小时',
    errRange: '结束日期必须晚于开始日期',
  }
});

const { $, t } = GZ;

let mode = 'diff';

function parseHolidays() {
  const set = new Set();
  $('#holidays').value.split('\n').forEach(l => {
    const m = l.trim().match(/^(\d{4})-(\d{2})-(\d{2})$/);
    if (m) set.add(`${m[1]}-${m[2]}-${m[3]}`);
  });
  return set;
}

function isWorkingDay(d, weekMode, holidays) {
  const day = d.getDay(); // 0 Sun, 6 Sat
  if (day === 0) return false;
  if (day === 6 && weekMode === 5) return false;
  const key = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
  if (holidays.has(key)) return false;
  return true;
}

function fmtDate(d) {
  return d.toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' });
}

function calc() {
  const weekMode = parseInt($('#week').value) || 5;
  const holidays = parseHolidays();
  const detail = $('#detail');
  const big = $('#big-result');
  const sub = $('#sub-result');

  if (mode === 'diff') {
    const sStr = $('#start').value, eStr = $('#end').value;
    if (!sStr || !eStr) { big.textContent = '—'; sub.textContent = ''; detail.innerHTML = ''; return; }
    const s = new Date(sStr + 'T00:00:00');
    const e = new Date(eStr + 'T00:00:00');
    if (e < s) { big.textContent = '—'; sub.textContent = t('errRange'); detail.innerHTML = ''; return; }
    let working = 0, calendar = 0, holidayHits = 0;
    const cur = new Date(s);
    while (cur <= e) {
      calendar++;
      const key = cur.getFullYear() + '-' + String(cur.getMonth() + 1).padStart(2, '0') + '-' + String(cur.getDate()).padStart(2, '0');
      const isHoliday = holidays.has(key);
      if (isHoliday) holidayHits++;
      if (isWorkingDay(cur, weekMode, holidays)) working++;
      cur.setDate(cur.getDate() + 1);
    }
    big.textContent = working;
    sub.textContent = t('resDays');
    detail.innerHTML = [
      [t('dCalendar'), calendar + ' ' + t('resCalendar')],
      [t('dWeeks'), (working / 5).toFixed(1)],
      [t('dHours'), (working * 8) + 'h'],
      [t('dHolidays'), holidayHits],
      [t('dFrom'), fmtDate(s)],
      [t('dTo'), fmtDate(e)],
    ].map(([k, v]) => `<div><span>${k}</span><span>${v}</span></div>`).join('');
  } else {
    const sStr = $('#start').value;
    const n = parseInt($('#days').value) || 0;
    if (!sStr) { big.textContent = '—'; sub.textContent = ''; detail.innerHTML = ''; return; }
    const s = new Date(sStr + 'T00:00:00');
    let count = Math.abs(n);
    let dir = n >= 0 ? 1 : -1;
    let holidayHits = 0;
    const cur = new Date(s);
    cur.setDate(cur.getDate() + dir);
    while (count > 0) {
      const key = cur.getFullYear() + '-' + String(cur.getMonth() + 1).padStart(2, '0') + '-' + String(cur.getDate()).padStart(2, '0');
      if (holidays.has(key)) holidayHits++;
      if (isWorkingDay(cur, weekMode, holidays)) count--;
      if (count > 0) cur.setDate(cur.getDate() + dir);
    }
    big.textContent = fmtDate(cur);
    sub.textContent = t('resResult');
    // calendar days between
    const calDays = Math.round(Math.abs(cur - s) / 86400000);
    detail.innerHTML = [
      [t('dFrom'), fmtDate(s)],
      [t('dDays'), (n >= 0 ? '+' : '−') + Math.abs(n)],
      [t('dCalendar'), calDays + ' ' + t('resCalendar')],
      [t('dHours'), (Math.abs(n) * 8) + 'h'],
      [t('dHolidays'), holidayHits],
    ].map(([k, v]) => `<div><span>${k}</span><span>${v}</span></div>`).join('');
  }
}

function setMode(m) {
  mode = m;
  $('#tab-diff').classList.toggle('active', m === 'diff');
  $('#tab-add').classList.toggle('active', m === 'add');
  $('#fld-end').style.display = m === 'diff' ? '' : 'none';
  $('#fld-days').style.display = m === 'add' ? '' : 'none';
  calc();
}

function syncLabels() {
  $('#tab-diff').textContent = t('tabDiff');
  $('#tab-add').textContent = t('tabAdd');
  $('#lb-start').textContent = t('lbStart');
  $('#lb-end').textContent = t('lbEnd');
  $('#lb-days').textContent = t('lbDays');
  $('#lb-week').textContent = t('lbWeek');
  $('#lb-holidays').textContent = t('lbHolidays');
  $('#opt-5').textContent = t('opt5');
  $('#opt-6').textContent = t('opt6');
}

// Default dates: today and +30 days
(function setDefaults() {
  const today = new Date();
  const fmt = d => d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
  $('#start').value = fmt(today);
  const end = new Date(today); end.setDate(end.getDate() + 30);
  $('#end').value = fmt(end);
})();

$('#tab-diff').addEventListener('click', () => setMode('diff'));
$('#tab-add').addEventListener('click', () => setMode('add'));
['start','end','days','week','holidays'].forEach(id => $('#' + id).addEventListener('input', calc));

syncLabels();
setMode('diff');

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📅', href:'/calc/date-calculator.html', name:'Date Calculator'},
    {icon:'📆', href:'/calc/business-day.html', name:'Business Day'},
    {icon:'⏳', href:'/calc/days-until.html', name:'Days Until'},
    {icon:'🗓️', href:'/calc/week-number.html', name:'Week Number'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
