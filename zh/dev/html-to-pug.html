const { $, copyText, t } = GZ;

const VOID = new Set(['area','base','br','col','embed','hr','img','input','link','meta','param','source','track','wbr']);
const SKIP_ROOTS = new Set(['HTML','HEAD','BODY']);

function nodeToPug(node, depth, opts, lines) {
  if (node.nodeType === 1) {
    const tag = node.tagName.toLowerCase();
    // Skip wrapper tags if requested
    if (opts.omit && SKIP_ROOTS.has(node.tagName)) {
      for (const child of node.childNodes) nodeToPug(child, depth, opts, lines);
      return;
    }
    const indent = '  '.repeat(depth);

    // Build shorthand tag.class#id
    let label = tag;
    let classList = [];
    const id = node.id;
    if (node.classList && node.classList.length) {
      classList = [...node.classList];
      if (opts.pretty) label += '.' + classList.map(c => sanitize(c)).join('.');
    }
    if (id && opts.pretty) label += '#' + sanitize(id);

    // Build attribute string
    const attrs = [];
    for (const attr of node.attributes) {
      const name = attr.name;
      if (opts.pretty && (name === 'id' || (name === 'class' && classList.length))) continue;
      attrs.push(attrName(name) + '="' + escAttr(attr.value) + '"');
    }
    const attrStr = attrs.length ? '(' + attrs.join(', ') + ')' : '';

    // Standard Pug behavior:
    // - element with element children → emit `tag attrs` then nest each child at depth+1
    // - element with text-only content → emit `tag attrs text` (single line)
    // - element with no children → emit `tag attrs`
    // - text nodes between elements → emit `| text` at depth+1
    const elementChildren = [...node.childNodes].filter(c => c.nodeType === 1);
    const hasElementChildren = elementChildren.length > 0;

    if (hasElementChildren) {
      // Determine if there's leading text (text before the first element child)
      let leadingText = '';
      let firstElementIdx = -1;
      for (let i = 0; i < node.childNodes.length; i++) {
        const c = node.childNodes[i];
        if (c.nodeType === 1) { firstElementIdx = i; break; }
        if (c.nodeType === 3) leadingText += c.textContent;
      }
      leadingText = leadingText.replace(/\s+/g, ' ').trim();
      lines.push(indent + label + attrStr + (leadingText ? ' ' + escText(leadingText) : ''));
      // Process children starting from the first element child (skip the leading text we already emitted)
      const startIdx = firstElementIdx >= 0 ? firstElementIdx : node.childNodes.length;
      for (let i = startIdx; i < node.childNodes.length; i++) {
        const child = node.childNodes[i];
        if (child.nodeType === 1) {
          nodeToPug(child, depth + 1, opts, lines);
        } else if (child.nodeType === 3) {
          const txt = child.textContent.replace(/\s+/g, ' ').trim();
          if (txt) lines.push('  '.repeat(depth + 1) + '| ' + escText(txt));
        } else if (child.nodeType === 4) {
          // CDATA — skip
        }
      }
    } else {
      // Text-only or empty content
      let textContent = '';
      for (const c of node.childNodes) {
        if (c.nodeType === 3) textContent += c.textContent;
      }
      textContent = textContent.replace(/\s+/g, ' ').trim();
      if (textContent) lines.push(indent + label + attrStr + ' ' + escText(textContent));
      else lines.push(indent + label + attrStr);
    }
  } else if (node.nodeType === 3) {
    const text = node.textContent.trim();
    if (text) {
      lines.push('  '.repeat(depth) + '| ' + escText(text));
    }
  } else if (node.nodeType === 8) {
    lines.push('  '.repeat(depth) + '// ' + node.textContent.trim());
  }
}

function sanitize(s) {
  // Pug IDs/classes must be valid identifiers; escape chars
  return s.replace(/[^a-zA-Z0-9_-]/g, c => '\\' + c);
}
function attrName(n) {
  return n.replace(/[A-Z]/g, m => m.toLowerCase()); // Pug is case-insensitive, normalize
}
function escAttr(v) { return v.replace(/"/g, '&quot;'); }
function escText(t) {
  // Pug requires escaping leading special chars
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function convert(html) {
  const opts = {
    omit: $('#opt-omit').checked,
    doctype: $('#opt-doctype').checked,
    pretty: $('#opt-pretty').checked,
  };
  if (!html.trim()) return '';
  const parser = new DOMParser();
  const doc = parser.parseFromString(html, 'text/html');
  const lines = [];
  if (opts.doctype) lines.push('doctype html');
  // Walk documentElement children
  const root = doc.documentElement;
  if (opts.omit) {
    // Walk all top-level children of html
    for (const child of root.childNodes) nodeToPug(child, 0, opts, lines);
  } else {
    // Start at <html>
    nodeToPug(root, 0, opts, lines);
  }
  return lines.join('\n');
}

  $('#output').textContent = convert($('#input').value);
