<script>

  en: {
    toolTitle: 'JSON5 to JSON Converter',
    toolDesc: 'Convert JSON5 to standard JSON. Supports unquoted keys, trailing commas, single quotes, comments and all JSON5 extensions.',

    outputLabel: 'Standard JSON Output',
    step1: 'Paste your JSON5 data into the input area',
    step2: 'Click Convert to transform JSON5 to standard JSON',
    step3: 'Copy the output or use the Format button for pretty-printed JSON',
    step4: 'Use Load Example to try a sample JSON5 document',
  },
  zh: {
    toolTitle: 'JSON5 转 JSON 转换器',
    toolDesc: '将 JSON5 转换为标准 JSON。支持无引号键名、尾逗号、单引号、注释等全部 JSON5 扩展。',
    inputLabel: 'JSON5 输入',
    outputLabel: '标准 JSON 输出',
    step1: '在输入区粘贴你的 JSON5 数据',
    step2: '点击「转换」将 JSON5 转为标准 JSON',
    step3: '复制输出或使用「格式化」按钮美化 JSON',
    step4: '点击「加载示例」查看 JSON5 功能演示',
  }
});

const { $, copyText, t } = GZ;
let indent = 2;

// Minimal JSON5 parser (handles the most common extensions)
function json5ToJson(input) {
  let s = input;
  // Remove single-line comments (but not inside strings)
  s = stripComments(s);
  // Replace single-quoted strings with double-quoted
  s = fixQuotes(s);
  // Add quotes to unquoted keys
  s = fixUnquotedKeys(s);
  // Remove trailing commas before ] or }
  s = s.replace(/,\s*([\]\}])/g, '$1');
  // Handle multi-line strings (replace literal newlines in strings)
  s = s.replace(/"([^"\\]*(\\.[^"\\]*)*)"/g, (m) => m.replace(/\n/g, '\\n'));
  // Handle hex numbers
  s = s.replace(/(?<=[\[:\s,])\s*0x([0-9a-fA-F]+)/g, (m, hex) => ' ' + parseInt(hex, 16));
  // Handle leading/trailing decimal points
  s = s.replace(/(?<=[\[:\s,])\s*\.(\d+)/g, (m, d) => ' 0.' + d);
  s = s.replace(/(\d+)\.(?=[\s,\]\}])/g, '$1.0');
  // Handle +Infinity, -Infinity, NaN
  s = s.replace(/(?<=[\[:\s,])\s*Infinity/g, ' null');
  s = s.replace(/(?<=[\[:\s,])\s*-Infinity/g, ' null');
  s = s.replace(/(?<=[\[:\s,])\s*NaN/g, ' null');
  return s;
}

function stripComments(s) {
  let inStr1 = false, inStr2 = false, result = '', i = 0;
  while (i < s.length) {
    if (s[i] === '"' && !inStr1) { inStr2 = !inStr2; result += s[i++]; }
    else if (s[i] === "'" && !inStr2) { inStr1 = !inStr1; result += s[i++]; }
    else if (s[i] === '\\' && (inStr1 || inStr2)) { result += s[i] + s[i+1]; i += 2; }
    else if (!inStr1 && !inStr2 && s[i] === '/' && s[i+1] === '/') {
      while (i < s.length && s[i] !== '\n') i++;
    } else if (!inStr1 && !inStr2 && s[i] === '/' && s[i+1] === '*') {
      i += 2;
      while (i < s.length - 1 && !(s[i] === '*' && s[i+1] === '/')) i++;
      i += 2;
    } else { result += s[i++]; }
  }
  return result;
}

function fixQuotes(s) {
  // Replace single-quoted strings with double-quoted
  let result = '', i = 0;
  while (i < s.length) {
    if (s[i] === "'") {
      i++;
      result += '"';
      while (i < s.length && s[i] !== "'") {
        if (s[i] === '\\') { result += s[i++] + (s[i] || ''); i++; }
        else if (s[i] === '"') { result += '\\"'; i++; }
        else { result += s[i++]; }
      }
      i++; // skip closing quote
      result += '"';
    } else { result += s[i++]; }
  }
  return result;
}

function fixUnquotedKeys(s) {
  // Match unquoted keys: word characters followed by colon, not inside strings
  return s.replace(/([{,]\s*)([a-zA-Z_$][a-zA-Z0-9_$]*)\s*:/g, '$1"$2":');
}

function syntaxHighlight(json) {
  return json.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/("(\\u[\da-fA-F]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(\.\d+)?([eE][+-]?\d+)?)/g, m => {
      let c = 'json-number';
      if (/^"/.test(m)) c = /:$/.test(m) ? 'json-key' : 'json-string';
      else if (/true|false/.test(m)) c = 'json-bool';
      else if (/null/.test(m)) c = 'json-null';
      return `<span class="${c}">${m}</span>`;
    });
}

function doConvert() {
  const inp = $('#input').value.trim();
  if (!inp) return;
  try {
    const converted = json5ToJson(inp);
    const obj = JSON.parse(converted);
    const formatted = JSON.stringify(obj, null, indent);
    $('#output').innerHTML = syntaxHighlight(formatted);
    $('#status').innerHTML = `<span style="color:var(--gz-success)">✓ Valid — converted ${formatted.length.toLocaleString()} bytes</span>`;
  } catch(e) {
    $('#status').innerHTML = `<span style="color:var(--gz-accent)">✗ Error: ${e.message}</span>`;
    $('#output').innerHTML = `<span style="color:var(--gz-accent)">${e.message}</span>`;
  }
}

function loadExample() {
  $('#input').value = `{
  // JSON5 Example — comments are allowed!
  name: 'GameZipper Tools',
  version: 1.0,
  features: [
    'JSON5 support',
    'trailing commas!',
  ],
  config: {
    theme: 'dark',
    lang: 'en',
  },
  active: true,
  count: 42,
  hex: 0xFF,
}`;
  doConvert();
}

function doClear() { $('#input').value = ''; $('#output').textContent = ''; $('#status').innerHTML = ''; }

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="doConvert()">${t('convert') || 'Convert'}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example') || 'Example'}</button>
  <select class="gz-select" onchange="indent=+this.value;doConvert()">
    <option value="2">2 spaces</option>
    <option value="4">4 spaces</option>
  </select>
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy') || 'Copy'}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear') || 'Clear'}</button>`;
