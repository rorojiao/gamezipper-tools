const GENDERS = {
  en: [{v:'any',l:'Any'},{v:'m',l:'Male'},{v:'f',l:'Female'},{v:'n',l:'Neutral'}],
  zh: [{v:'any',l:'任意'},{v:'m',l:'男'},{v:'f',l:'女'},{v:'n',l:'中性'}],
};

const $ = s => document.querySelector(s);
const { t, copyText, getLang } = GZ;

function populateStyles() {
  const lang = getLang();
  const sel = $('#style');
  sel.innerHTML = Object.keys(STYLES).map(k => `<option value="${k}">${STYLES[k].label[lang]}</option>`).join('');
  $('#gender').innerHTML = GENDERS[lang].map(g => `<option value="${g.v}">${g.l}</option>`).join('');
}

function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function generateName(style, gender) {
  const data = STYLES[style];
  if (!data) return 'Alex Doe';
  const useGender = gender === 'any' ? (Math.random() < 0.5 ? 'm' : (Math.random() < 0.5 ? 'f' : 'n')) : gender;
  const prefixKey = 'prefixes_' + useGender;
  const suffixKey = 'suffixes_' + useGender;
  const prefix = pick(data[prefixKey] || data.prefixes_m);
  const suffix = pick(data[suffixKey] || data.suffixes_m);
  return (prefix + suffix).replace(/\s+/g, ' ').trim();
}

function generateBatch() {
  const style = $('#style').value;
  const gender = $('#gender').value;
  const n = Math.max(1, Math.min(50, parseInt($('#count').value) || 10));
  const results = [];
  for (let i = 0; i < n; i++) {
    let name = generateName(style, gender);
    while (results.includes(name)) name = generateName(style, gender);
    results.push(name);
  }
  renderResults(results);
}

function renderResults(names) {
  const favs = getFavs();
  const html = names.map(n => {
    const isFav = favs.includes(n);
    return `<div class="name-card">
      <span class="name">${escHtml(n)}</span>
      <div class="actions">
        <button title="Copy" onclick="copyText('${escAttr(n)}')">📋</button>
        <button title="Favorite" class="fav-toggle" data-name="${escAttr(n)}">${isFav ? '⭐' : '☆'}</button>
      </div>
    </div>`;
  }).join('');
  $('#results').innerHTML = html;
  document.querySelectorAll('.fav-toggle').forEach(btn => {
    btn.addEventListener('click', () => toggleFav(btn.dataset.name, btn));
  });
  updateFavBox();
}

function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escAttr(s) { return String(s).replace(/'/g,"\\'").replace(/"/g,'&quot;'); }

function getFavs() {
  try { return JSON.parse(localStorage.getItem('gz-name-favs') || '[]'); } catch { return []; }
}
function saveFavs(arr) { localStorage.setItem('gz-name-favs', JSON.stringify(arr)); }
function toggleFav(name, btn) {
  const arr = getFavs();
  const idx = arr.indexOf(name);
  if (idx >= 0) { arr.splice(idx, 1); btn.textContent = '☆'; }
  else { arr.push(name); btn.textContent = '⭐'; }
  saveFavs(arr);
  updateFavBox();
}
function updateFavBox() {
  const arr = getFavs();
  const box = $('#favBox');
  if (arr.length === 0) { box.style.display = 'none'; return; }
  box.style.display = '';
  $('#favList').innerHTML = arr.length ? arr.map(n =>
    `<span class="fav-pill">${escHtml(n)} <button onclick="removeFav('${escAttr(n)}')">×</button></span>`
  ).join('') : `<span class="empty-fav">No favorites yet — click the ☆ icon on any name.</span>`;
}
function removeFav(name) {
  const arr = getFavs().filter(n => n !== name);
  saveFavs(arr);
  updateFavBox();
  // Re-render results to update star icons
  const results = [...document.querySelectorAll('.name-card .name')].map(el => el.textContent);
  if (results.length) renderResults(results);
}
function clearFavs() {
  saveFavs([]);
  updateFavBox();
  const results = [...document.querySelectorAll('.name-card .name')].map(el => el.textContent);
  if (results.length) renderResults(results);
}
