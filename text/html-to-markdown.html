const { $, copyText, t } = GZ;

function htmlToMd(html) {
  // Create a temporary DOM element to parse HTML
  const doc = new DOMParser().parseFromString(html, 'text/html');
  return convertNode(doc.body).trim();
}

function convertNode(node) {
  if (node.nodeType === 3) return node.textContent;
  if (node.nodeType !== 1) return '';

  const tag = node.tagName.toLowerCase();
  const children = Array.from(node.childNodes).map(convertNode).join('');

  switch (tag) {
    case 'h1': return '\n# ' + children.trim() + '\n\n';
    case 'h2': return '\n## ' + children.trim() + '\n\n';
    case 'h3': return '\n### ' + children.trim() + '\n\n';
    case 'h4': return '\n#### ' + children.trim() + '\n\n';
    case 'h5': return '\n##### ' + children.trim() + '\n\n';
    case 'h6': return '\n###### ' + children.trim() + '\n\n';
    case 'p': return children.trim() + '\n\n';
    case 'br': return '\n';
    case 'hr': return '\n---\n\n';
    case 'strong': case 'b': return '**' + children + '**';
    case 'em': case 'i': return '*' + children + '*';
    case 'del': case 's': case 'strike': return '~~' + children + '~~';
    case 'code': return '`' + children + '`';
    case 'pre': return '\n```\n' + node.textContent + '\n```\n\n';
    case 'blockquote': return '> ' + children.trim().replace(/\n/g, '\n> ') + '\n\n';
    case 'a': {
      const href = node.getAttribute('href') || '';
      return '[' + children + '](' + href + ')';
    }
    case 'img': {
      const src = node.getAttribute('src') || '';
      const alt = node.getAttribute('alt') || '';
      return '![' + alt + '](' + src + ')';
    }
    case 'ul': return '\n' + Array.from(node.children).map(li => '- ' + convertNode(li).trim()).join('\n') + '\n\n';
    case 'ol': return '\n' + Array.from(node.children).map((li, i) => (i + 1) + '. ' + convertNode(li).trim()).join('\n') + '\n\n';
    case 'li': return children;
    case 'table': return convertTable(node);
    case 'div': case 'section': case 'article': case 'main': case 'header': case 'footer': case 'nav': case 'span':
      return children;
    default: return children;
  }
}

function convertTable(table) {
  const rows = table.querySelectorAll('tr');
  if (!rows.length) return '';
  let md = '\n';
  const data = [];
  rows.forEach(row => {
    const cells = row.querySelectorAll('th, td');
    data.push(Array.from(cells).map(c => c.textContent.trim()));
  });
  if (!data.length) return '';
  const cols = data[0].length;
  data.forEach((row, i) => {
    md += '| ' + row.join(' | ') + ' |\n';
    if (i === 0) md += '| ' + row.map(() => '---').join(' | ') + ' |\n';
  });
  md += '\n';
  return md;
}

function doConvert() {
  const html = $('#input').value.trim();
  if (!html) { $('#output').value = ''; return; }
  $('#output').value = htmlToMd(html);
}
