        <button class="gz-btn gz-btn-secondary" onclick="rotate180()">↻ 180°</button>

<script>
GZI18n.register({
  en: {
    toolTitle: 'PDF Rotate',
    toolDesc: 'Rotate PDF pages by 90°, 180° or 270° — select pages, rotate and download. Free, private, runs in your browser.',
    dropLabel: 'Drop a PDF here or click to upload',
    selectAll: 'Select All',
    download: 'Download Rotated PDF',
    pageInfo: n => `${n} page${n > 1 ? 's' : ''} loaded · Click pages to select`,
    rotLabel: d => `${d}°`,
    step1: 'Upload a PDF file by dragging or clicking',
    step2: 'Click pages to select them (or click Select All)',
    step3: 'Click rotate buttons to rotate selected pages',
    step4: 'Download the rotated PDF',
  },
  zh: {
    toolTitle: 'PDF 旋转工具',
    toolDesc: '将 PDF 页面旋转 90°、180° 或 270° — 选择页面、旋转并下载。免费、私密、浏览器本地处理。',
    dropLabel: '拖拽 PDF 到此处或点击上传',
    selectAll: '全选',
    download: '下载旋转后的 PDF',
    pageInfo: n => `已加载 ${n} 页 · 点击页面进行选择`,
    rotLabel: d => `${d}°`,
    step1: '拖拽或点击上传 PDF 文件',
    step2: '点击页面进行选择（或点击全选）',
    step3: '点击旋转按钮旋转所选页面',
    step4: '下载旋转后的 PDF',
  }
});

const { $, t } = GZ;
const { PDFDocument, degrees } = PDFLib;

let pdfBytes = null;
let rotations = []; // per-page rotation tracking
let selected = new Set();

const drop = $('#drop');
const fileInput = $('#fileInput');

drop.addEventListener('click', () => fileInput.click());
drop.addEventListener('dragover', e => { e.preventDefault(); drop.classList.add('drag'); });
drop.addEventListener('dragleave', () => drop.classList.remove('drag'));
drop.addEventListener('drop', e => {
  e.preventDefault(); drop.classList.remove('drag');
  if (e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', e => { if (e.target.files[0]) loadFile(e.target.files[0]); });

$('#dropLabel').textContent = t('dropLabel');
$('#lblSelectAll').textContent = t('selectAll');
$('#lblDownload').textContent = t('download');

async function loadFile(file) {
  pdfBytes = await file.arrayBuffer();
  const pdfDoc = await PDFDocument.load(pdfBytes);
  const pages = pdfDoc.getPages();
  rotations = pages.map(p => p.getRotation().angle);
  selected.clear();

  $('#pageInfo').textContent = t('pageInfo')(pages.length);
  $('#drop').style.display = 'none';
  $('#editor').style.display = 'block';

  await renderPages(pdfDoc);
}

async function renderPages(pdfDoc) {
  const grid = $('#pageGrid');
  grid.innerHTML = '';
  const pages = pdfDoc.getPages();

  // Render thumbnails using pdf-lib + canvas
  for (let i = 0; i < pages.length; i++) {
    const card = document.createElement('div');
    card.className = 'page-card';
    card.dataset.idx = i;

    // Create a simple thumbnail with page number
    const thumb = document.createElement('canvas');
    thumb.width = 100;
    thumb.height = 140;
    const ctx = thumb.getContext('2d');
    ctx.fillStyle = '#fff';
    ctx.fillRect(0, 0, 100, 140);
    ctx.strokeStyle = '#ddd';
    ctx.strokeRect(2, 2, 96, 136);

    ctx.fillStyle = '#666';
    ctx.font = 'bold 16px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('Page ' + (i + 1), 50, 75);

    // Show rotation
    if (rotations[i] % 360 !== 0) {
      const badge = document.createElement('div');
      badge.className = 'rot-badge';
      badge.textContent = rotations[i] + '°';
      card.appendChild(thumb);
      card.appendChild(badge);
    } else {
      card.appendChild(thumb);
    }

    const num = document.createElement('div');
    num.className = 'pg-num';
    num.textContent = '#' + (i + 1);
    card.appendChild(num);

    card.addEventListener('click', () => {
      if (selected.has(i)) { selected.delete(i); card.style.borderColor = ''; }
      else { selected.add(i); card.style.borderColor = 'var(--accent)'; }
    });

    grid.appendChild(card);
  }
}

function selectAll() {
  const grid = $('#pageGrid');
  const cards = grid.children;
  if (selected.size === rotations.length) {
    selected.clear();
    for (const c of cards) c.style.borderColor = '';
  } else {
    for (let i = 0; i < rotations.length; i++) {
      selected.add(i);
      cards[i].style.borderColor = 'var(--accent)';
    }
  }
}

async function rotateCW() { await rotateSelected(90); }
async function rotateCCW() { await rotateSelected(-90); }
async function rotate180() { await rotateSelected(180); }

async function rotateSelected(angle) {
  if (selected.size === 0) return;
  for (const i of selected) {
    rotations[i] = (rotations[i] + angle + 360) % 360;
  }
  // Re-render
  const pdfDoc = await PDFDocument.load(pdfBytes);
  await renderPages(pdfDoc);
}

async function downloadPDF() {
  const pdfDoc = await PDFDocument.load(pdfBytes);
  const pages = pdfDoc.getPages();
  for (let i = 0; i < pages.length; i++) {
    pages[i].setRotation(degrees(rotations[i]));
  }
  const saved = await pdfDoc.save();
  const blob = new Blob([saved], { type: 'application/pdf' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'rotated.pdf';
  a.click();
  URL.revokeObjectURL(url);
}

GZ.renderToolPage({
  category: 'convert',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📄', href:'/convert/pdf-merger.html', name:'PDF Merger'},
    {icon:'✂️', href:'/convert/pdf-page-splitter.html', name:'PDF Splitter'},
    {icon:'🗜️', href:'/convert/pdf-compressor.html', name:'PDF Compressor'},
    {icon:'🖼️', href:'/convert/pdf-to-image.html', name:'PDF to Image'},
  ]
});
</script>
