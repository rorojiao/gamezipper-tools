const { $, copyText, t } = GZ;

function singularize(w) {
  if (/(children|people|men|women)$/i.test(w)) return w.replace(/ren|ple$/i, '');
  if (/(s|x|ch|sh)es$/i.test(w)) return w.replace(/es$/i, '');
  if (/ies$/i.test(w)) return w.replace(/ies$/i, 'y');
  if (/ss$/i.test(w)) return w;
  if (/s$/i.test(w)) return w.replace(/s$/i, '');
  return w;
}
function titleCase(s) { return s ? s.charAt(0).toUpperCase() + s.slice(1) : s; }
function isIdent(s) { return /^[A-Za-z_][A-Za-z0-9_]*$/.test(s); }
function safeName(s) {
  let n = s.replace(/[^A-Za-z0-9_]+/g, '_').replace(/^([0-9])/, '_$1');
  if (!n) n = 'Field';
  n = titleCase(n);
  if (!/^[A-Z]/.test(n)) n = 'T' + n;
  return n;
}

function scalarType(v) {
  if (typeof v === 'boolean') return 'Boolean';
  if (typeof v === 'number') return Number.isInteger(v) ? 'Int' : 'Float';
  if (typeof v === 'string') {
    if (/^[0-9a-f]{24}$/i.test(v)) return 'ID';
    if (/^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i.test(v)) return 'ID';
    return 'String';
  }
  return 'String';
}

function jsonToGql(json, rootName, nonNull, wantQuery) {
  const types = new Map();
  const used = new Set();
  let order = 0;

  function claim(base) {
    let n = safeName(base);
    if (!used.has(n)) { used.add(n); return n; }
    let i = 2;
    while (used.has(n + i)) i++;
    used.add(n + i);
    return n + i;
  }

  function makeType(obj, name) {
    if (types.has(name)) return name;
    types.set(name, { fields: [], order: order++ });
    const def = types.get(name);
    for (const key of Object.keys(obj)) {
      def.fields.push([key, valueToType(obj[key], key, name)]);
    }
    return name;
  }

  function valueToType(val, key, parent) {
    if (val === null || val === undefined) return 'String';
    if (Array.isArray(val)) {
      return '[' + arrayElemType(val, key, parent) + '!]' + (nonNull ? '!' : '');
    }
    if (typeof val === 'object') {
      const nm = claim(parent + safeName(singularize(key)));
      return makeType(val, nm) + (nonNull ? '!' : '');
    }
    return scalarType(val) + (nonNull ? '!' : '');
  }

  function arrayElemType(arr, key, parent) {
    const samples = arr.filter(x => x !== null && x !== undefined);
    if (samples.length === 0) return 'String';
    const objSamples = samples.filter(x => typeof x === 'object' && !Array.isArray(x));
    if (objSamples.length === 0) {
      return scalarType(samples[0]);
    }
    const merged = {};
    for (const o of objSamples) for (const k of Object.keys(o)) if (!(k in merged)) merged[k] = o[k];
    const nm = claim(safeName(singularize(key)));
    return makeType(merged, nm);
  }

  let rootType;
  if (Array.isArray(json)) {
    const samples = json.filter(x => x !== null && typeof x === 'object' && !Array.isArray(x));
    const elemName = claim(rootName);
    const wrapName = claim(rootName + 'List');
    if (samples.length === 0) {
      types.set(wrapName, { fields: [['items', '[String!]']], order: order++ });
    } else {
      const merged = {};
      for (const o of samples) for (const k of Object.keys(o)) if (!(k in merged)) merged[k] = o[k];
      makeType(merged, elemName);
      const listType = '[' + elemName + '!]' + (nonNull ? '!' : '');
      types.set(wrapName, { fields: [['items', listType]], order: order++ });
    }
    rootType = wrapName;
  } else if (typeof json === 'object') {
    rootType = makeType(json, claim(rootName));
  } else {
    throw new Error('root');
  }

  // build SDL
  const arr = [...types.entries()].sort((a, b) => a[1].order - b[1].order);
  let out = '';
  for (const [name, def] of arr) {
    out += 'type ' + name + ' {\n';
    for (const [fn, ft] of def.fields) {
      const fieldName = isIdent(fn) ? fn : JSON.stringify(fn);
      out += '  ' + fieldName + ': ' + ft + '\n';
    }
    out += '}\n\n';
  }
  out = out.trimEnd();

  if (wantQuery) {
    // build a sample query for the root object type
    const rootDef = types.get(rootType);
    let q = '# Sample query\nquery {\n';
    q += buildQueryBody(rootDef, '  ', types, new Set([rootType]));
    q += '\n}';
    out += '\n\n\n' + q;
  }
  return { schema: out, count: types.size };
}

function buildQueryBody(def, indent, types, seen) {
  let s = '';
  for (const [fn, ft] of def.fields) {
    const inner = ft.replace(/^[\[!]+/, '').replace(/[!\]]+$/, '');
    if (types.has(inner) && !seen.has(inner)) {
      seen.add(inner);
      s += indent + fn + ' {\n';
      s += buildQueryBody(types.get(inner), indent + '  ', types, seen);
      s += indent + '}\n';
    } else {
      s += indent + fn + '\n';
    }
  }
  return s;
}

function run() {
  const inp = $('#input').value.trim();
  const status = $('#status');
  if (!inp) { $('#output').value = ''; status.textContent = ''; status.className = 'jg-status'; return; }
  let json;
  try { json = JSON.parse(inp); }
  catch (e) {
    $('#output').value = '';
    let msg = e.message;
    const pm = msg.match(/position (\d+)/);
    if (pm) { const p = +pm[1]; const before = inp.slice(0, p); msg += ' (line ' + (before.split('\n').length) + ')'; }
    status.textContent = t('err') + msg; status.className = 'jg-status err'; return;
  }
  try {
    const rootName = ($('#rootName').value || 'RootType').trim() || 'RootType';
    const nonNull = $('#nonNull').checked;
    const wantQuery = $('#sampleQuery').checked;
    const { schema, count } = jsonToGql(json, rootName, nonNull, wantQuery);
    $('#output').value = schema;
    status.textContent = t('okN').replace('N', count); status.className = 'jg-status ok';
  } catch (e) {
    $('#output').value = '';
    status.textContent = (e.message === 'root') ? t('errRootObj') : (t('err') + e.message);
    status.className = 'jg-status err';
  }
}

      { id: '507f1f77bcf86cd799439012', title: 'Base64 Encoder', uses: 850 }
    ]
  });
  $('#rootName').value = 'App';
  run();
}
function doClear() { $('#input').value = ''; $('#output').value = ''; $('#status').textContent = ''; }
function doDownload() {
  const text = $('#output').value; if (!text) return;
  const blob = new Blob([text], { type: 'text/plain' });
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = 'schema.graphql'; a.click(); URL.revokeObjectURL(a.href);
}

$('#lbl-output').textContent = t('lblOutput');

$('#input').addEventListener('input', run);
$('#rootName').addEventListener('input', run);
$('#nonNull').addEventListener('change', run);
$('#sampleQuery').addEventListener('change', run);

$('#toolbar').innerHTML = `

  <button class="gz-btn" onclick="copyText($('#output').value)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doDownload()">${t('download')}</button>

</script>
