<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>

  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div style="margin:12px 0">
      <label id="lbl-text" style="font-size:.85em;display:block;margin-bottom:4px"></label>
      <textarea id="input" spellcheck="false" style="width:100%;min-height:80px"></textarea>
    </div>
    <div class="hl-swatch" id="swatches"></div>
    <div style="margin:8px 0;display:flex;gap:12px;flex-wrap:wrap;align-items:center">
      <label style="font-size:.85em;display:inline-flex;align-items:center;gap:6px"><span id="lbl-bg"></span><input type="color" id="bgColor" value="#fef08a" style="width:36px;height:28px"></label>
      <label style="font-size:.85em;display:inline-flex;align-items:center;gap:6px"><span id="lbl-tc"></span><input type="color" id="textColor" value="#000000" style="width:36px;height:28px"></label>
      <label style="font-size:.85em;display:inline-flex;align-items:center;gap:6px"><span id="lbl-radius"></span><input type="range" id="radius" min="0" max="12" value="3" style="width:80px"></label>
    </div>
    <h3 id="lbl-preview" style="font-size:1rem;margin:16px 0 4px"></h3>
    <div class="preview-box" id="preview"></div>
    <h3 id="lbl-html" style="font-size:1rem;margin:16px 0 4px"></h3>
    <div class="code-box" id="htmlOut"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Text Highlighter Generator',
    toolDesc: 'Add colored highlighter backgrounds to any text. Pick a color, copy as HTML or Markdown — great for blogs, emails and notes.',
    enterText: 'Enter text to highlight',
    bgColor: 'Background',
    textColor: 'Text color',
    radius: 'Corner radius',
    preview: 'Preview',
    htmlCode: 'HTML code',
    copyRich: 'Copy rich text',
    copyHTML: 'Copy HTML',
    copyMD: 'Copy Markdown',
    step1: 'Type or paste the text you want to highlight',
    step2: 'Pick a highlighter color preset or use the custom color pickers',
    step3: 'See the live preview on the right',
    step4: 'Copy as HTML, Markdown or rich text to paste anywhere',
  },
  zh: {
    toolTitle: '文字高亮生成器',
    toolDesc: '为任意文字添加彩色高亮背景。选择颜色，复制为 HTML 或 Markdown — 适合博客、邮件和笔记。',
    enterText: '输入要高亮的文字',
    bgColor: '背景色',
    textColor: '文字颜色',
    radius: '圆角',
    preview: '预览',
    htmlCode: 'HTML 代码',
    copyRich: '复制富文本',
    copyHTML: '复制 HTML',
    copyMD: '复制 Markdown',
    step1: '输入或粘贴要高亮的文字',
    step2: '选择高亮颜色预设或使用自定义颜色选择器',
    step3: '右侧实时预览效果',
    step4: '复制为 HTML、Markdown 或富文本，粘贴到任意位置',
  }
});

const { $, copyText, t } = GZ;

const PRESETS = [
  { bg:'#fef08a', tc:'#000000' }, // yellow
  { bg:'#bbf7d0', tc:'#000000' }, // green
  { bg:'#fbcfe8', tc:'#000000' }, // pink
  { bg:'#bfdbfe', tc:'#000000' }, // blue
  { bg:'#fed7aa', tc:'#000000' }, // orange
  { bg:'#e9d5ff', tc:'#000000' }, // purple
];

function getStyle() {
  const bg = $('#bgColor').value;
  const tc = $('#textColor').value;
  const r = $('#radius').value;
  return { bg, tc, r };
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function update() {
  const txt = $('#input').value || '';
  const { bg, tc, r } = getStyle();
  const styleAttr = `background:${bg};color:${tc};border-radius:${r}px;padding:0 4px`;
  const html = txt
    ? `<span style="${styleAttr}">${escapeHtml(txt)}</span>`
    : '';
  $('#preview').innerHTML = html || '<span style="opacity:.5">' + (t('enterText')) + '</span>';
  $('#htmlOut').textContent = html;
}

function copyRichText() {
  const html = $('#htmlOut').textContent;
  if (!html) return;
  navigator.clipboard.writeText(html).then(() => {
    // also put rich version on clipboard
    const blob = new Blob([html], { type: 'text/html' });
    navigator.clipboard.write([new ClipboardItem({ 'text/html': blob, 'text/plain': new Blob([$('#input').value], {type:'text/plain'}) })])
      .catch(() => {});
  });
  copyText(html);
}

function copyMarkdown() {
  const txt = $('#input').value;
  copyText('==' + txt + '==');
}

function loadExample() {
  $('#input').value = 'Important notice!';
  update();
}

function selectPreset(i) {
  $('#bgColor').value = PRESETS[i].bg;
  $('#textColor').value = PRESETS[i].tc;
  document.querySelectorAll('#swatches button').forEach((b, idx) => {
    b.classList.toggle('active', idx === i);
  });
  update();
}

$('#input').addEventListener('input', update);
$('#bgColor').addEventListener('input', update);
$('#textColor').addEventListener('input', update);
$('#radius').addEventListener('input', update);

$('#lbl-text').textContent = t('enterText');
$('#lbl-bg').textContent = t('bgColor');
$('#lbl-tc').textContent = t('textColor');
$('#lbl-radius').textContent = t('radius');
$('#lbl-preview').textContent = t('preview');
$('#lbl-html').textContent = t('htmlCode');

$('#swatches').innerHTML = PRESETS.map((p, i) =>
  `<button onclick="selectPreset(${i})" style="background:${p.bg}" title="${p.bg}"></button>`
).join('');
selectPreset(0);

$('#toolbar').innerHTML = `
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn" onclick="copyRichText()">${t('copyRich')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="copyText($('#htmlOut').textContent)">${t('copyHTML')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="copyMarkdown()">${t('copyMD')}</button>`;

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'✒️', href:'/text/bold-text-generator.html', name:'Bold Text'},
    {icon:'🎨', href:'/text/fancy-text.html', name:'Fancy Text'},
    {icon:'✨', href:'/text/aesthetic-text-generator.html', name:'Aesthetic Text'},
    {icon:'❌', href:'/text/crossed-out-text.html', name:'Strikethrough'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
