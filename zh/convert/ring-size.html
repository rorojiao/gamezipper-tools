<script>
GZI18n.register({
  en: {
    toolTitle: 'Ring Size Converter',
    toolDesc: 'Convert ring sizes between US, UK, EU, JP, CH, HK and inner circumference in mm. Printable strip method and full chart included.',
    byCirc: 'By circumference', byDiameter: 'By diameter',
    lblCirc: 'Inner circumference (mm)',
    lblSystem: 'Region / system',
    lblSystemSize: 'Size in selected system',
    lblInfo: 'Equivalent',
    allTitle: 'Equivalent sizes in all systems',
    chartTitle: 'Size chart (women & men)',
    tip: '💡 Tip: Measure at the end of the day when fingers are slightly larger. Cold shrinks fingers; if you are between sizes, go half a size up for wide bands.',
    step1: 'Pick a method — circumference or diameter',
    step2: 'Enter the value in mm (or a system size)',
    step3: 'Choose a region/system',
    step4: 'See the equivalent size in all 6 systems',
  },
  zh: {
    toolTitle: '戒指尺寸转换器',
    toolDesc: '在美、英、欧、日、瑞士、香港尺码和内圈周长（毫米）之间转换，含测量方法说明和完整尺码表。',
    byCirc: '按周长', byDiameter: '按直径',
    lblCirc: '内圈周长 (毫米)',
    lblSystem: '地区/系统',
    lblSystemSize: '所选系统的尺码',
    lblInfo: '等效',
    allTitle: '所有系统的等效尺码',
    chartTitle: '尺码对照表',
    tip: '💡 提示：在一天结束时测量手指（此时手指会略微变大）。天冷时手指会收缩；如果在两个尺码之间，宽版戒指建议选大半号。',
    step1: '选择测量方法 — 周长或直径',
    step2: '输入毫米数值（或系统尺码）',
    step3: '选择地区/系统',
    step4: '查看所有 6 个系统的等效尺码',
  }
});

const { $, t } = GZ;

// Generate ring size table from 40mm to 75mm circumference
// US: size = (circ_mm - 36.5) / 2.55 ≈ (circ - 36.5) / 2.55 (approximation)
// UK: letter = ?
// EU: equals circ_mm
// JP: diameter_mm = circ_mm / π
// CH: equal to EU
// HK: equal to EU
const TABLE = [];
for (let circ = 40; circ <= 75; circ += 0.5) {
  const dia = circ / Math.PI;
  // US: (circ_mm - 36.5) / 2.55 → for circ=49, US=4.9 → 5
  const us = Math.round(((circ - 36.5) / 2.55) * 2) / 2;
  // UK letters (A=0, B=0.5, C=1, ..., Z=12.5) — UK size roughly = (US - 0.5) approximately
  const ukNum = Math.round((us - 0.5) * 2) / 2;
  const ukLetters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
  const ukIdx = Math.max(0, Math.min(ukLetters.length - 1, Math.round(ukNum * 2)));
  const uk = ukLetters[ukIdx] + (ukNum !== Math.floor(ukNum) ? '½' : '');
  TABLE.push({ circ, dia, us, uk, eu: Math.round(circ), jp: Math.round(dia * 10) / 10, ch: Math.round(circ), hk: Math.round(circ) });
}

function findByCirc(circ) {
  return TABLE.reduce((a, b) => Math.abs(b.circ - circ) < Math.abs(a.circ - circ) ? b : a, TABLE[0]);
}

function findBySystem(size, system) {
  const numSize = parseFloat(size);
  if (isNaN(numSize)) return TABLE[0];
  return TABLE.reduce((a, b) => {
    let av = 0, bv = 0;
    if (system === 'us') { av = a.us; bv = b.us; }
    else if (system === 'uk') { av = a.ukNum || 0; bv = b.ukNum || 0; }
    else if (system === 'eu' || system === 'ch' || system === 'hk') { av = a.eu; bv = b.eu; }
    else if (system === 'jp') { av = a.jp; bv = b.jp; }
    return Math.abs(bv - numSize) < Math.abs(av - numSize) ? b : a;
  }, TABLE[0]);
}

function update() {
  const circ = parseFloat($('#circ-mm').value) || 0;
  const row = findByCirc(circ);
  $('#info').value = `${row.dia.toFixed(2)} mm dia`;
  const cards = [
    { l: 'US', v: row.us },
    { l: 'UK', v: row.uk },
    { l: 'EU', v: row.eu },
    { l: 'JP', v: row.jp + ' mm' },
    { l: 'CH', v: row.ch },
    { l: 'HK', v: row.hk },
  ];
  $('#all-results').innerHTML = cards.map(c => `<div class="res-card"><div class="lab">${c.l}</div><div class="val">${c.v}</div></div>`).join('');
}

function renderChart() {
  const tbl = $('#chart-table');
  let body = '<thead><tr><th>Circ (mm)</th><th>Dia (mm)</th><th>US</th><th>UK</th><th>EU</th><th>JP</th><th>CH</th><th>HK</th></tr></thead><tbody>';
  for (const r of TABLE) {
    if (r.circ < 47 || r.circ > 65) continue;
    body += `<tr><td>${r.circ}</td><td>${r.dia.toFixed(2)}</td><td>${r.us}</td><td>${r.uk}</td><td>${r.eu}</td><td>${r.jp}</td><td>${r.ch}</td><td>${r.hk}</td></tr>`;
  }
  body += '</tbody>';
  tbl.innerHTML = body;
}

$('#tip').textContent = t('tip');
$('#lbl-circ').textContent = t('lblCirc');
$('#lbl-system').textContent = t('lblSystem');
$('#lbl-system-size').textContent = t('lblSystemSize');
$('#lbl-info').textContent = t('lblInfo');
$('#all-title').textContent = t('allTitle');
$('#chart-title').textContent = t('chartTitle');

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="$('#circ-mm').value=52;update()">👩 Avg Women (52)</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#circ-mm').value=60;update()">👨 Avg Men (60)</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#circ-mm').value=49;update()">💍 Avg US 5 (49)</button>`;

const tabs = document.createElement('div');
tabs.innerHTML = `
  <div class="method-tabs">
    <button data-m="circ" class="active">📏 ${t('byCirc')}</button>
    <button data-m="diameter">⭕ ${t('byDiameter')}</button>
  </div>`;
tabs.querySelectorAll('button').forEach(b => b.onclick = () => {
  tabs.querySelectorAll('button').forEach(x => x.classList.toggle('active', x === b));
  if (b.dataset.m === 'diameter') {
    const circ = parseFloat($('#circ-mm').value) || 0;
    $('#circ-mm').value = (circ / Math.PI).toFixed(2);
    document.querySelector('label[for="circ-mm"]').textContent = 'Inner diameter (mm)';
  } else {
    const dia = parseFloat($('#circ-mm').value) || 0;
    $('#circ-mm').value = Math.round(dia * Math.PI * 10) / 10;
    document.querySelector('label[for="circ-mm"]').textContent = t('lblCirc');
  }
  update();
});
$('#method-tabs').replaceWith(tabs.firstElementChild);

$('#circ-mm').addEventListener('input', update);
$('#system-size').addEventListener('input', () => {
  const size = $('#system-size').value;
  const system = $('#system').value;
  const row = findBySystem(size, system);
  $('#circ-mm').value = row.circ;
  update();
});
$('#system').addEventListener('change', update);

GZ.renderToolPage({
  category: 'convert',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'👟', href:'/convert/shoe-size.html', name:'Shoe Size'},
    {icon:'📏', href:'/convert/unit.html', name:'Unit Converter'},
    {icon:'🧑‍🍳', href:'/convert/cooking-converter.html', name:'Cooking Converter'},
    {icon:'💱', href:'/convert/currency-converter.html', name:'Currency'},
  ]
});

update();
renderChart();
</script>
