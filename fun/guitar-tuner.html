<script>
GZI18n.register({
  en: {
    toolTitle: 'Online Guitar Tuner',
    toolDesc: 'Tune your guitar with your microphone. Supports Standard, Drop D, Open G and more tunings. Free, accurate, works on any device.',
    startListening: '🎤 Start Listening',
    stopListening: '⏹ Stop',
    centsFlat: 'cents flat ↓',
    centsSharp: 'cents sharp ↑',
    inTune: '✓ In Tune!',
    playString: 'Play a string...',
    step1: 'Click "Start Listening" and allow microphone access',
    step2: 'Select your tuning (Standard, Drop D, Open G, etc.)',
    step3: 'Play each string and watch the pitch indicator',
    step4: 'Adjust tuning pegs until the indicator shows "In Tune"',
  },
  zh: {
    toolTitle: '在线吉他调音器',
    toolDesc: '使用麦克风在线调音。支持标准、Drop D、Open G 等多种调弦方式。免费、精准、全平台。',
    startListening: '🎤 开始调音',
    stopListening: '⏹ 停止',
    centsFlat: '偏低 ↓',
    centsSharp: '偏高 ↑',
    inTune: '✓ 音准了！',
    playString: '拨动琴弦...',
    step1: '点击「开始调音」并允许麦克风权限',
    step2: '选择调弦方式（标准、Drop D、Open G 等）',
    step3: '拨动每根弦，观察音高指示器',
    step4: '调整弦钮直到指示器显示「音准了」',
  }
});

const { $, t } = GZ;

const tunings = {
  standard: ['E2','A2','D3','G3','B3','E4'],
  dropD:    ['D2','A2','D3','G3','B3','E4'],
  openG:    ['D2','G2','D3','G3','B3','D4'],
  openD:    ['D2','A2','D3','F#3','A3','D4'],
  dadgad:   ['D2','A2','D3','G3','A3','D4'],
  halfStep: ['Eb2','Ab2','Db3','Gb3','Bb3','Eb4'],
  chromatic: null
};

const noteFreqs = {
  'C':16.35,'C#':17.32,'D':18.35,'D#':19.45,'E':20.60,'F':21.83,'F#':23.12,
  'G':24.50,'G#':25.96,'A':27.50,'A#':29.14,'B':30.87,
  'Db':17.32,'Eb':19.45,'Gb':23.12,'Ab':25.96,'Bb':29.14
};

function noteToFreq(note) {
  const match = note.match(/^([A-G]#?b?)(\d)$/);
  if (!match) return 440;
  const name = match[1];
  const oct = +match[2];
  const base = noteFreqs[name] || 27.50;
  return base * Math.pow(2, oct);
}

const noteNames = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const tuningNames = {
  standard: 'Standard (EADGBE)',
  dropD: 'Drop D',
  openG: 'Open G',
  openD: 'Open D',
  dadgad: 'DADGAD',
  halfStep: 'Half Step Down',
  chromatic: 'Chromatic'
};

let currentTuning = 'standard';
let audioCtx = null;
let analyser = null;
let listening = false;
let animFrame = null;

// Build tuning buttons
const ts = $('#tuningSelect');
Object.keys(tunings).forEach(key => {
  const btn = document.createElement('button');
  btn.textContent = tuningNames[key];
  btn.onclick = () => selectTuning(key);
  btn.id = 'tbtn-' + key;
  ts.appendChild(btn);
});

function selectTuning(key) {
  currentTuning = key;
  document.querySelectorAll('.tuning-select button').forEach(b => b.classList.remove('active'));
  document.getElementById('tbtn-'+key).classList.add('active');
  renderStrings();
}

function renderStrings() {
  const sv = $('#stringsVisual');
  if (currentTuning === 'chromatic') {
    sv.innerHTML = '<p style="opacity:.5;font-size:.85em">Chromatic mode — play any note</p>';
    return;
  }
  const strings = tunings[currentTuning];
  sv.innerHTML = strings.map((n, i) =>
    `<div class="string-item" id="str-${i}"><div class="string-note">${n.replace(/\d/,'')}</div><div class="string-freq">${noteToFreq(n).toFixed(1)} Hz</div></div>`
  ).join('');
}

$('#startBtn').textContent = t('startListening');

function toggleTuner() {
  if (listening) {
    stopTuner();
  } else {
    startTuner();
  }
}

async function startTuner() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 4096;
    const source = audioCtx.createMediaStreamSource(stream);
    source.connect(analyser);
    listening = true;
    $('#startBtn').textContent = t('stopListening');
    $('#startBtn').classList.add('listening');
    detectPitch();
  } catch(e) {
    alert('Microphone access is required for the tuner. Please allow microphone permission.');
  }
}

function stopTuner() {
  listening = false;
  if (audioCtx) { audioCtx.close(); audioCtx = null; }
  if (animFrame) cancelAnimationFrame(animFrame);
  $('#startBtn').textContent = t('startListening');
  $('#startBtn').classList.remove('listening');
  $('#noteDisplay').textContent = '—';
  $('#centsLabel').textContent = '';
  $('#freqDisplay').textContent = '';
  $('#indicator').style.left = '50%';
  $('#indicator').classList.remove('in-tune');
}

function detectPitch() {
  if (!listening) return;
  const buf = new Float32Array(analyser.fftSize);
  analyser.getFloatTimeDomainData(buf);

  // Autocorrelation pitch detection
  const sampleRate = audioCtx.sampleRate;
  let bestCorrelation = 0;
  let bestOffset = -1;
  const minPeriod = Math.floor(sampleRate / 2000);
  const maxPeriod = Math.floor(sampleRate / 50);

  // Check signal level
  let rms = 0;
  for (let i = 0; i < buf.length; i++) rms += buf[i]*buf[i];
  rms = Math.sqrt(rms / buf.length);

  if (rms < 0.01) {
    $('#noteDisplay').textContent = '—';
    $('#centsLabel').textContent = t('playString');
    $('#freqDisplay').textContent = '';
    animFrame = requestAnimationFrame(detectPitch);
    return;
  }

  // Normalized autocorrelation
  for (let offset = minPeriod; offset <= maxPeriod; offset++) {
    let correlation = 0;
    let norm1 = 0, norm2 = 0;
    for (let i = 0; i < buf.length - offset; i++) {
      correlation += buf[i] * buf[i + offset];
      norm1 += buf[i] * buf[i];
      norm2 += buf[i + offset] * buf[i + offset];
    }
    const norm = Math.sqrt(norm1 * norm2);
    correlation = norm > 0 ? correlation / norm : 0;

    if (correlation > bestCorrelation) {
      bestCorrelation = correlation;
      bestOffset = offset;
    }
  }

  if (bestOffset > 0 && bestCorrelation > 0.8) {
    const freq = sampleRate / bestOffset;
    displayNote(freq);
  }

  animFrame = requestAnimationFrame(detectPitch);
}

function displayNote(freq) {
  const noteNum = 12 * (Math.log2(freq / 440));
  const roundedNote = Math.round(noteNum);
  const cents = Math.round((noteNum - roundedNote) * 100);
  const noteIndex = ((roundedNote % 12) + 12) % 12;
  const noteName = noteNames[noteIndex];

  $('#noteDisplay').textContent = noteName;
  $('#freqDisplay').textContent = freq.toFixed(1) + ' Hz';

  const pct = Math.max(0, Math.min(100, 50 + cents * 0.5));
  $('#indicator').style.left = pct + '%';

  if (Math.abs(cents) <= 3) {
    $('#indicator').classList.add('in-tune');
    $('#centsLabel').textContent = t('inTune');
    $('#centsLabel').style.color = 'var(--gz-success)';
  } else if (cents < 0) {
    $('#indicator').classList.remove('in-tune');
    $('#centsLabel').textContent = Math.abs(cents) + ' ' + t('centsFlat');
    $('#centsLabel').style.color = 'var(--gz-accent)';
  } else {
    $('#indicator').classList.remove('in-tune');
    $('#centsLabel').textContent = cents + ' ' + t('centsSharp');
    $('#centsLabel').style.color = 'var(--gz-accent)';
  }

  // Highlight matching string
  if (currentTuning !== 'chromatic') {
    const strings = tunings[currentTuning];
    strings.forEach((s, i) => {
      const el = document.getElementById('str-'+i);
      if (el) {
        const targetNote = s.replace(/\d/,'');
        if (targetNote === noteName && Math.abs(cents) <= 15) {
          el.classList.add('active');
        } else {
          el.classList.remove('active');
        }
      }
    });
  }
}

selectTuning('standard');

GZ.renderToolPage({
  category: 'fun',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🎹', href:'/fun/piano.html', name:'Virtual Piano'},
    {icon:'🥁', href:'/fun/drum-machine.html', name:'Drum Machine'},
    {icon:'🎵', href:'/fun/metronome.html', name:'Metronome'},
    {icon:'🎸', href:'/fun/chord-progression.html', name:'Chord Progressions'},
  ]
});
</script>
