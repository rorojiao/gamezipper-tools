    toolDesc: '粘贴、拖放或上传任意 SVG 文件，即时预览、查看格式化 XML 源码、检查尺寸和 viewBox，并导出 1x/2x/4x PNG。完全浏览器本地运行，无需上传。',

    dropHint: '将 .svg 文件拖到这里，或点击浏览',
    prev: '预览',
    src: 'XML 源码',
    info: 'SVG 信息',
    emptyHint: '尚未加载 SVG — 上传文件、粘贴标记或点击「加载示例」。',
    noSvg: '⚠ 无法解析 SVG。请确认标记以 <svg> 开头。',
    copied: '✓ XML 已复制到剪贴板',
    width: '宽度',
    height: '高度',
    viewBox: 'ViewBox',
    elements: '元素数',
    bytes: '大小',
    step1: '拖放 SVG 文件、点击浏览，或将 SVG 标记粘贴到源码框',
    step2: '查看器将实时渲染预览并显示格式化 XML',
    step3: '检查尺寸、viewBox、元素数量和字节大小',
    step4: '点击「复制 XML」或导出 1x、2x、4x PNG',

const { $, copyText, t } = GZ;
let currentSvg = '';

function prettifyXml(xml) {
  // Strip XML declaration for nicer display
  xml = xml.replace(/<\?xml[^>]*\?>/g, '').trim();
  let pad = 0, out = '';
  xml.replace(/>\s*</g, '><').split(/(?=<)/).forEach(tok => {
    tok = tok.trim();
    if (!tok) return;
    if (/^<\/[^>]+>$/.test(tok)) pad--;
    out += '  '.repeat(Math.max(0, pad)) + tok + '\n';
    if (/^<[^\/!?][^>]*[^\/]>$/.test(tok)) pad++;
  });
  return out.trim();
}

function parseSvg(raw) {
  const parser = new DOMParser();
  const doc = parser.parseFromString(raw, 'image/svg+xml');
  const err = doc.querySelector('parsererror');
  const svg = doc.querySelector('svg');
  if (err || !svg) return null;
  return svg;
}

function renderInfo(svg) {
  const w = svg.getAttribute('width') || svg.viewBox.baseVal.width || '?';
  const h = svg.getAttribute('height') || svg.viewBox.baseVal.height || '?';
  const vb = svg.getAttribute('viewBox') || '—';
  const elems = svg.querySelectorAll('*').length;
  const bytes = new Blob([currentSvg]).size;
  const cells = [['width', w], ['height', h], ['viewBox', vb], ['elements', elems], ['bytes', formatBytes(bytes)]];
  $('#info').innerHTML = cells.map(([k, v]) =>
    `<div class="cell"><small>${t(k)}</small><b>${v}</b></div>`).join('');
}

function formatBytes(n) {
  if (n < 1024) return n + ' B';
  if (n < 1048576) return (n / 1024).toFixed(1) + ' KB';
  return (n / 1048576).toFixed(2) + ' MB';
}

function load(raw) {
  const svg = parseSvg(raw);
  if (!svg) { $('#status').innerHTML = `<span style="color:var(--gz-accent)">${t('noSvg')}</span>`; return; }
  currentSvg = raw;
  svg.removeAttribute('width');
  svg.removeAttribute('height');
  svg.style.maxWidth = '100%';
  svg.style.maxHeight = '340px';
  $('#preview').innerHTML = '';
  $('#preview').appendChild(svg);
  $('#xmlSrc').textContent = prettifyXml(raw);
  renderInfo(parseSvg(raw));
  $('#status').innerHTML = '';
}

function loadExample() {
  const ex = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none"><circle cx="60" cy="60" r="54" fill="#6366f1"/><path d="M40 62l14 14 28-32" stroke="#fff" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
  load(ex);
}

function doClear() { currentSvg = ''; $('#preview').innerHTML = `<span style="opacity:.5">${t('emptyHint')}</span>`; $('#xmlSrc').textContent = ''; $('#info').innerHTML = ''; $('#status').innerHTML = ''; $('#file').value = ''; }

function exportPng(scale) {
  if (!currentSvg) return;
  const svg = parseSvg(currentSvg);
  const vb = svg.viewBox.baseVal;
  const w = vb && vb.width ? vb.width : (svg.getAttribute('width') || 300);
  const h = vb && vb.height ? vb.height : (svg.getAttribute('height') || 150);
  const canvas = document.createElement('canvas');
  canvas.width = w * scale; canvas.height = h * scale;
  const ctx = canvas.getContext('2d');
  const img = new Image();
  const blob = new Blob([currentSvg], { type: 'image/svg+xml' });
  const url = URL.createObjectURL(blob);
  img.onload = () => {
    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
    URL.revokeObjectURL(url);
    canvas.toBlob(b => {
      const a = document.createElement('a');
      a.href = URL.createObjectURL(b);
      a.download = `svg-${scale}x.png`;
      a.click();
      setTimeout(() => URL.revokeObjectURL(a.href), 1000);
    });
  };
  img.src = url;
}

function copyXml() {
  if (!currentSvg) return;
  copyText($('#xmlSrc').textContent);
  $('#status').innerHTML = `<span style="color:var(--gz-success)">${t('copied')}</span>`;
  setTimeout(() => $('#status').innerHTML = '', 1500);
}

// File input + drag&drop
$('#file').addEventListener('change', e => {
  const f = e.target.files[0]; if (!f) return;
  const r = new FileReader();
  r.onload = () => load(r.result);
  r.readAsText(f);
});
const drop = $('#drop');
drop.addEventListener('click', () => $('#file').click());
['dragenter', 'dragover'].forEach(ev => drop.addEventListener(ev, e => { e.preventDefault(); drop.classList.add('drag'); }));
['dragleave', 'drop'].forEach(ev => drop.addEventListener(ev, e => { e.preventDefault(); drop.classList.remove('drag'); }));
drop.addEventListener('drop', e => {
  const f = e.dataTransfer.files[0]; if (!f) return;
  const r = new FileReader();
  r.onload = () => load(r.result);
  r.readAsText(f);
});

// Editable source: paste & re-render
$('#xmlSrc').contentEditable = true;
$('#xmlSrc').addEventListener('paste', e => {
  e.preventDefault();
  const text = (e.clipboardData || window.clipboardData).getData('text');
  setTimeout(() => load(text), 0);
});

$('#dropLabel').textContent = t('dropHint');
$('#emptyHint').textContent = t('emptyHint');
$('#lblPrev').textContent = t('prev');
$('#lblSrc').textContent = t('src');

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="$('#file').click()">${t('upload')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('loadExample')}</button>
  <button class="gz-btn" onclick="copyXml()">${t('copyXml')}</button>
  <span style="flex:1"></span>
  <button class="gz-btn gz-btn-secondary" onclick="exportPng(1)">${t('png1')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="exportPng(2)">${t('png2')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="exportPng(4)">${t('png4')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

GZ.renderToolPage({

  ]
});
</script>
