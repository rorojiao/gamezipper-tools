<script type="application/ld+json">{"@context":"https://schema.org","@type":"WebApplication","name":"Distance Calculator Between Coordinates","description":"Free distance calculator. Find the great-circle distance between two lat/long coordinates with the Haversine formula — km, miles, nautical miles and bearing. Browser-only.","url":"https://tools.gamezipper.com/calc/distance-calculator.html","applicationCategory":"Utility","operatingSystem":"Web Browser","offers":{"@type":"Offer","price":"0"}}</script>
<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is the Haversine formula?", "acceptedAnswer": {"@type": "Answer", "text": "The Haversine formula calculates the great-circle distance between two points on a sphere given their latitude and longitude. It uses the law of haversines and accounts for the curvature of the Earth, giving an accurate straight-line distance even for points far apart."}}, {"@type": "Question", "name": "Is the Haversine distance the driving distance?", "acceptedAnswer": {"@type": "Answer", "text": "No. The Haversine result is the straight-line (as-the-crow-flies) great-circle distance, which is the shortest path over the Earth's surface. Actual driving, walking or flight distances are longer because they follow roads, airspace and terrain."}}, {"@type": "Question", "name": "What radius of the Earth does this calculator use?", "acceptedAnswer": {"@type": "Answer", "text": "This calculator uses the mean Earth radius of 6,371 km (3,959 miles). Because the Earth is an oblate spheroid rather than a perfect sphere, results have a typical error under 0.5%, which is acceptable for most everyday and navigation purposes."}}, {"@type": "Question", "name": "How do I enter latitude and longitude?", "acceptedAnswer": {"@type": "Answer", "text": "Enter latitude as a decimal between -90 and 90 (positive for North, negative for South) and longitude between -180 and 180 (positive for East, negative for West). You can convert degrees/minutes/seconds to decimal first, or use one of the preset city buttons."}}]}</script>

        <div class="dc-field"><label id="lblLat2"></label><input type="number" id="lat2" value="51.5074" step="0.0001"></div>

<script>
GZI18n.register({
  en: {
    toolTitle: 'Distance Calculator (Coordinates)',
    toolDesc: 'Calculate the great-circle distance between two latitude/longitude points using the Haversine formula. Get results in kilometres, miles and nautical miles plus the initial bearing and an estimated flight time — all in your browser, no signup.',
    from: 'Point A', to: 'Point B',
    lat1: 'Latitude A (−90 to 90)', lon1: 'Longitude A (−180 to 180)', lat2: 'Latitude B', lon2: 'Longitude B',
    heroLbl: 'Straight-Line Distance', heroSub: 'Great-circle distance over Earth\u2019s surface',
    km: 'Kilometres', mi: 'Miles', nm: 'Nautical Miles', bearing: 'Bearing', midlat: 'Δ Latitude', time: 'Est. Flight (900 km/h)',
    copy: '📋 Copy Results', reset: '🔄 Reset', example: '🧪 NYC → London',
    step1: 'Enter the latitude and longitude of point A',
    step2: 'Enter the latitude and longitude of point B',
    step3: 'Use a preset city pair if you need a quick example',
    step4: 'Read the distance in km, miles, nautical miles and the bearing',
  },
  zh: {
    toolTitle: '坐标距离计算器',
    toolDesc: '使用 Haversine（半正矢）公式计算两个经纬度坐标之间的大圆距离。结果以千米、英里和海里显示，并附带初始方位角和估算飞行时间 — 完全浏览器本地运行，无需注册。',
    from: '点 A', to: '点 B',
    lat1: '纬度 A（−90 至 90）', lon1: '经度 A（−180 至 180）', lat2: '纬度 B', lon2: '经度 B',
    heroLbl: '直线距离', heroSub: '地球表面的大圆距离',
    km: '千米', mi: '英里', nm: '海里', bearing: '方位角', midlat: '纬度差', time: '估算飞行（900 km/h）',
    copy: '📋 复制结果', reset: '🔄 重置', example: '🧪 纽约 → 伦敦',
    step1: '输入点 A 的纬度和经度',
    step2: '输入点 B 的纬度和经度',
    step3: '如需快速示例，可使用预设城市组合',
    step4: '查看千米、英里、海里距离以及方位角',
  }
});

const { $, copyText, t } = GZ;
const isZh = GZI18n.getLang() === 'zh';

$('#lblFrom').textContent = t('from');
$('#lblTo').textContent = t('to');
$('#lblLat1').textContent = t('lat1');
$('#lblLon1').textContent = t('lon1');
$('#lblLat2').textContent = t('lat2');
$('#lblLon2').textContent = t('lon2');
$('#heroLbl').textContent = t('heroLbl');
$('#heroSub').textContent = t('heroSub');
$('#lKm').textContent = t('km');
$('#lMi').textContent = t('mi');
$('#lNm').textContent = t('nm');
$('#lBearing').textContent = t('bearing');
$('#lMidLat').textContent = t('midlat');
$('#lTime').textContent = t('time');

const R_KM = 6371;
const PRESETS = [
  { label: 'NYC ↔ London', lat1:40.7128, lon1:-74.0060, lat2:51.5074, lon2:-0.1278 },
  { label: 'Tokyo ↔ Sydney', lat1:35.6762, lon1:139.6503, lat2:-33.8688, lon2:151.2093 },
  { label: 'Paris ↔ Berlin', lat1:48.8566, lon1:2.3522, lat2:52.5200, lon2:13.4050 },
  { label: 'Beijing ↔ Shanghai', lat1:39.9042, lon1:116.4074, lat2:31.2304, lon2:121.4737 },
  { label: 'LA ↔ San Francisco', lat1:34.0522, lon1:-118.2437, lat2:37.7749, lon2:-122.4194 },
];

function fmt(n, dec) { return (n||0).toLocaleString(undefined, {minimumFractionDigits:dec, maximumFractionDigits:dec}); }

function calc() {
  const lat1 = +$('#lat1').value, lon1 = +$('#lon1').value;
  const lat2 = +$('#lat2').value, lon2 = +$('#lon2').value;

  if ([lat1,lon1,lat2,lon2].some(v => isNaN(v)) ||
      Math.abs(lat1) > 90 || Math.abs(lat2) > 90 || Math.abs(lon1) > 180 || Math.abs(lon2) > 180) {
    $('#distVal').textContent = '—';
    ['km','mi','nm','bearing','midlat','flight'].forEach(id => $('#'+id).textContent = '—');
    $('#note').textContent = isZh ? '请输入有效的纬度（−90 到 90）和经度（−180 到 180）。' : 'Enter valid latitude (−90 to 90) and longitude (−180 to 180).';
    return;
  }

  const toRad = d => d * Math.PI / 180;
  const toDeg = r => r * 180 / Math.PI;
  const φ1 = toRad(lat1), φ2 = toRad(lat2);
  const Δφ = toRad(lat2 - lat1);
  const Δλ = toRad(lon2 - lon1);

  const a = Math.sin(Δφ/2)**2 + Math.cos(φ1) * Math.cos(φ2) * Math.sin(Δλ/2)**2;
  const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
  const km = R_KM * c;
  const mi = km * 0.621371;
  const nmiles = km * 0.539957;

  // initial bearing
  const y = Math.sin(Δλ) * Math.cos(φ2);
  const x = Math.cos(φ1) * Math.sin(φ2) - Math.sin(φ1) * Math.cos(φ2) * Math.cos(Δλ);
  let brng = (toDeg(Math.atan2(y, x)) + 360) % 360;

  $('#distVal').textContent = fmt(km, 1) + ' km';
  $('#km').textContent = fmt(km, 1);
  $('#mi').textContent = fmt(mi, 1);
  $('#nm').textContent = fmt(nmiles, 1);
  $('#bearing').textContent = brng.toFixed(1) + '°';
  $('#midlat').textContent = Math.abs(lat2 - lat1).toFixed(4) + '°';
  const flightH = km / 900;
  $('#flight').textContent = flightH > 0 ? (flightH < 1 ? (flightH*60).toFixed(0)+'min' : flightH.toFixed(1)+'h') : '0h';

  $('#note').innerHTML = isZh
    ? `Haversine 公式：<code>a = sin²(Δφ/2) + cos(φ₁)·cos(φ₂)·sin²(Δλ/2)</code>，<code>c = 2·atan2(√a, √(1−a))</code><br>
       距离 = <code>R · c</code>，地球平均半径 <code>R = 6371 km</code>。<br>
       初始方位角 <code>${brng.toFixed(1)}°</code>（0° = 正北，顺时针）。`
    : `Haversine: <code>a = sin²(Δφ/2) + cos(φ₁)·cos(φ₂)·sin²(Δλ/2)</code>, <code>c = 2·atan2(√a, √(1−a))</code><br>
       Distance = <code>R · c</code> with mean Earth radius <code>R = 6,371 km</code>.<br>
       Initial bearing <code>${brng.toFixed(1)}°</code> (0° = North, clockwise).`;
}

['lat1','lon1','lat2','lon2'].forEach(id => $('#'+id).addEventListener('input', calc));

$('#presets').innerHTML = PRESETS.map((p,i) => `<button data-i="${i}">${p.label}</button>`).join('');
$('#presets').addEventListener('click', e => {
  const btn = e.target.closest('button'); if (!btn) return;
  const p = PRESETS[+btn.dataset.i];
  $('#lat1').value = p.lat1; $('#lon1').value = p.lon1;
  $('#lat2').value = p.lat2; $('#lon2').value = p.lon2;
  calc();
});

$('#toolbar').innerHTML = `
  <button class="gz-btn gz-btn-secondary" id="btnCopy">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" id="btnExample">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" id="btnReset">${t('reset')}</button>`;

$('#btnCopy').onclick = () => copyText(`${t('toolTitle')}\n${$('#lat1').value},${$('#lon1').value} → ${$('#lat2').value},${$('#lon2').value}\n${t('km')}: ${$('#km').textContent}\n${t('mi')}: ${$('#mi').textContent}\n${t('nm')}: ${$('#nm').textContent}\n${t('bearing')}: ${$('#bearing').textContent}`);
$('#btnExample').onclick = () => { const p = PRESETS[0]; $('#lat1').value=p.lat1; $('#lon1').value=p.lon1; $('#lat2').value=p.lat2; $('#lon2').value=p.lon2; calc(); };
$('#btnReset').onclick = () => { ['lat1','lon1','lat2','lon2'].forEach(id => $('#'+id).value = 0); calc(); };

calc();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🌍', href:'/dev/coordinates-finder.html', name:'Coordinates Finder'},
    {icon:'📐', href:'/convert/length-converter.html', name:'Length Converter'},
    {icon:'🕐', href:'/convert/timezone.html', name:'Time Zone Converter'},
    {icon:'🧭', href:'/dev/what-is-my-ip.html', name:'What is My IP'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
