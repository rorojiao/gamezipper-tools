<style>
.pomo-wrap{max-width:520px;margin:0 auto;text-align:center}
.pomo-mode{display:flex;gap:6px;justify-content:center;margin-bottom:20px;flex-wrap:wrap}
.pomo-mode button{background:var(--glass2);border:1px solid var(--border);color:var(--text);padding:8px 16px;border-radius:18px;cursor:pointer;font-size:.85em;font-weight:600;transition:.2s}
.pomo-mode button.active{background:var(--accent);color:#000;border-color:var(--accent)}
.pomo-display{position:relative;width:280px;height:280px;margin:0 auto 24px}
.pomo-ring{width:100%;height:100%;transform:rotate(-90deg)}
.pomo-ring circle{fill:none;stroke-width:10}
.pomo-ring .bg{stroke:var(--glass2)}
.pomo-ring .fg{stroke:var(--accent);stroke-linecap:round;transition:stroke-dashoffset .5s, stroke 1s}
.pomo-ring.work .fg{stroke:#00d672}
.pomo-ring.short .fg{stroke:#61afef}
.pomo-ring.long .fg{stroke:#ffa500}
.pomo-time{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:3.4em;font-weight:700;font-variant-numeric:tabular-nums;letter-spacing:-.02em}
.pomo-label{position:absolute;top:60%;left:50%;transform:translateX(-50%);margin-top:4px;font-size:.9em;opacity:.7;text-transform:uppercase;letter-spacing:.1em}
.pomo-cycle{position:absolute;top:18px;left:50%;transform:translateX(-50%);font-size:.75em;opacity:.6;white-space:nowrap}
.pomo-controls{display:flex;gap:10px;justify-content:center;margin-bottom:20px;flex-wrap:wrap}
.pomo-btn{background:var(--accent);color:#000;border:none;padding:12px 24px;border-radius:24px;font-size:1em;font-weight:700;cursor:pointer;transition:.2s;min-width:120px}
.pomo-btn:hover{opacity:.88}
.pomo-btn.secondary{background:var(--glass2);color:var(--text);border:1px solid var(--border)}
.pomo-btn:disabled{opacity:.4;cursor:not-allowed}
.pomo-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:18px}
.pomo-stat{background:var(--glass);border:1px solid var(--border);border-radius:10px;padding:10px}
.pomo-stat .num{font-size:1.6em;font-weight:700;color:var(--accent)}
.pomo-stat .label{font-size:.7em;color:var(--text2);margin-top:2px;text-transform:uppercase;letter-spacing:.05em}
.pomo-settings{margin-top:24px;padding:14px;background:var(--glass);border:1px solid var(--border);border-radius:10px;text-align:left;display:none}
.pomo-settings.open{display:block}
.pomo-settings h3{margin:0 0 10px;font-size:.9em}
.pomo-set-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;font-size:.85em}
.pomo-set-row input[type=number]{width:60px;padding:4px 6px;border:1px solid var(--border);border-radius:6px;background:var(--glass2);color:var(--text);text-align:center}
</style>

<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"What is the Pomodoro Technique?","acceptedAnswer":{"@type":"Answer","text":"The Pomodoro Technique is a time management method developed in the late 1980s. You work in focused 25-minute intervals (pomodoros) separated by short 5-minute breaks. After four pomodoros, you take a longer 15-30 minute break. It helps reduce mental fatigue and improve concentration."}},{"@type":"Question","name":"Can I customize the work and break durations?","acceptedAnswer":{"@type":"Answer","text":"Yes. Click the gear icon to open settings. You can set the work interval, short break, long break and the number of pomodoros before a long break. Settings are saved to your browser."}},{"@type":"Question","name":"Does the timer keep running if I close the tab?","acceptedAnswer":{"@type":"Answer","text":"No. The timer runs only while the tab is open. When you close the tab, the session ends. For long focus sessions, keep the tab in the foreground or pinned."}},{"@type":"Question","name":"Will I hear a sound when the timer ends?","acceptedAnswer":{"@type":"Answer","text":"Yes. A gentle bell plays when a work or break session ends. The tab title also shows the current mode and time remaining so you can glance at it from another tab."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="pomo-wrap">
      <div class="pomo-mode" id="mode"></div>
      <div class="pomo-display">
        <svg class="pomo-ring" viewBox="0 0 280 280">
          <circle class="bg" cx="140" cy="140" r="125"/>
          <circle class="fg" id="ring" cx="140" cy="140" r="125" stroke-dasharray="785.4" stroke-dashoffset="0"/>
        </svg>
        <div class="pomo-time" id="time">25:00</div>
        <div class="pomo-label" id="label">WORK</div>
        <div class="pomo-cycle" id="cycle"></div>
      </div>
      <div class="pomo-controls">
        <button class="pomo-btn" id="btnStart">Start</button>
        <button class="pomo-btn secondary" id="btnReset">Reset</button>
        <button class="pomo-btn secondary" id="btnSkip">Skip</button>
        <button class="pomo-btn secondary" id="btnSettings">⚙</button>
      </div>
      <div class="pomo-stats">
        <div class="pomo-stat"><div class="num" id="statDone">0</div><div class="label">Done</div></div>
        <div class="pomo-stat"><div class="num" id="statTotal">0</div><div class="label">Total</div></div>
        <div class="pomo-stat"><div class="num" id="statMins">0</div><div class="label">Min</div></div>
      </div>
      <div class="pomo-settings" id="settings">
        <h3 id="setTitle"></h3>
        <div class="pomo-set-row"><span id="lblWork"></span> <input type="number" id="setWork" min="1" max="120" value="25"> <span id="unitMin1"></span></div>
        <div class="pomo-set-row"><span id="lblShort"></span> <input type="number" id="setShort" min="1" max="60" value="5"> <span id="unitMin2"></span></div>
        <div class="pomo-set-row"><span id="lblLong"></span> <input type="number" id="setLong" min="1" max="60" value="15"> <span id="unitMin3"></span></div>
        <div class="pomo-set-row"><span id="lblCycle"></span> <input type="number" id="setCycle" min="2" max="10" value="4"></div>
      </div>
    </div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Pomodoro Timer',
    toolDesc: 'Stay focused with the Pomodoro Technique — 25 minutes of work, 5 minutes of break. Customize intervals and track your sessions.',
    work: 'Work',
    short: 'Short Break',
    long: 'Long Break',
    start: 'Start',
    pause: 'Pause',
    reset: 'Reset',
    skip: 'Skip',
    done: 'Done',
    total: 'Total',
    min: 'Min',
    setTitle: '⚙ Settings',
    workLbl: 'Work duration',
    shortLbl: 'Short break',
    longLbl: 'Long break',
    cycleLbl: 'Pomodoros before long break',
    min1: 'min', min2: 'min', min3: 'min',
    step1: 'Pick a mode — Work, Short Break or Long Break',
    step2: 'Click Start to begin the countdown',
    step3: 'When the bell rings, switch mode and repeat',
    step4: 'Open Settings (⚙) to customize intervals — settings are saved in your browser',
  },
  zh: {
    toolTitle: '番茄钟计时器',
    toolDesc: '使用番茄工作法保持专注 — 25 分钟工作，5 分钟休息。可自定义时长，追踪专注时长。',
    work: '工作',
    short: '短休息',
    long: '长休息',
    start: '开始',
    pause: '暂停',
    reset: '重置',
    skip: '跳过',
    done: '已完成',
    total: '总计',
    min: '分钟',
    setTitle: '⚙ 设置',
    workLbl: '工作时长',
    shortLbl: '短休息',
    longLbl: '长休息',
    cycleLbl: '长休息前的番茄数',
    min1: '分钟', min2: '分钟', min3: '分钟',
    step1: '选择模式 — 工作、短休息或长休息',
    step2: '点击「开始」启动倒计时',
    step3: '铃声响起后，切换模式并重复',
    step4: '点击设置（⚙）自定义时长，设置保存在浏览器中',
  }
});

const { $, t } = GZ;

let SETTINGS = { work: 25, short: 5, long: 15, cycle: 4 };
try {
  const saved = localStorage.getItem('gz-pomodoro');
  if (saved) SETTINGS = Object.assign(SETTINGS, JSON.parse(saved));
} catch(e) {}

let state = {
  mode: 'work', // work | short | long
  remaining: SETTINGS.work * 60,
  total: SETTINGS.work * 60,
  running: false,
  interval: null,
  cycles: 0, // completed work sessions
  totalDone: 0, // total pomodoros today
  totalMins: 0,
};

try {
  const today = new Date().toDateString();
  const stat = JSON.parse(localStorage.getItem('gz-pomodoro-stats') || '{}');
  if (stat.date === today) {
    state.totalDone = stat.done || 0;
    state.totalMins = stat.mins || 0;
  }
} catch(e) {}

const CIRCUM = 2 * Math.PI * 125;

function fmt(sec) {
  const m = Math.floor(sec / 60);
  const s = sec % 60;
  return String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
}

function saveStats() {
  const today = new Date().toDateString();
  localStorage.setItem('gz-pomodoro-stats', JSON.stringify({date: today, done: state.totalDone, mins: state.totalMins}));
}

function render() {
  const mode = state.mode;
  $('#time').textContent = fmt(state.remaining);
  $('#label').textContent = mode === 'work' ? t('work') : mode === 'short' ? t('short') : t('long');
  const ring = $('#ring');
  const offset = CIRCUM * (1 - state.remaining / state.total);
  ring.style.strokeDashoffset = offset;
  ring.parentElement.setAttribute('class', 'pomo-ring ' + mode);
  document.title = `${fmt(state.remaining)} - ${$('#label').textContent}`;
  $('#statDone').textContent = state.cycles;
  $('#statTotal').textContent = state.totalDone;
  $('#statMins').textContent = state.totalMins;
  $('#cycle').textContent = `Cycle ${state.cycles % SETTINGS.cycle}/${SETTINGS.cycle}`;
  $('#btnStart').textContent = state.running ? t('pause') : t('start');
  const btns = document.querySelectorAll('.pomo-mode button');
  btns.forEach(b => b.classList.toggle('active', b.dataset.mode === mode));
}

function tick() {
  if (state.remaining > 0) {
    state.remaining--;
    if (state.mode === 'work' && state.remaining % 60 === 0) {
      state.totalMins++;
      saveStats();
    }
    render();
  } else {
    clearInterval(state.interval);
    state.interval = null;
    state.running = false;
    beep();
    if (state.mode === 'work') {
      state.cycles++;
      state.totalDone++;
      saveStats();
      state.mode = (state.cycles % SETTINGS.cycle === 0) ? 'long' : 'short';
      state.remaining = (state.mode === 'long' ? SETTINGS.long : SETTINGS.short) * 60;
    } else {
      state.mode = 'work';
      state.remaining = SETTINGS.work * 60;
    }
    state.total = state.remaining;
    render();
  }
}

function beep() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.frequency.value = 880; o.type = 'sine';
    g.gain.setValueAtTime(0, ctx.currentTime);
    g.gain.linearRampToValueAtTime(0.3, ctx.currentTime + 0.02);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.8);
    o.start(); o.stop(ctx.currentTime + 0.8);
  } catch(e) {}
}

function start() {
  if (state.running) {
    clearInterval(state.interval);
    state.interval = null;
    state.running = false;
  } else {
    state.interval = setInterval(tick, 1000);
    state.running = true;
  }
  render();
}

function reset() {
  if (state.interval) clearInterval(state.interval);
  state.interval = null;
  state.running = false;
  state.remaining = (state.mode === 'work' ? SETTINGS.work : state.mode === 'short' ? SETTINGS.short : SETTINGS.long) * 60;
  state.total = state.remaining;
  render();
}

function skip() {
  if (state.interval) clearInterval(state.interval);
  state.interval = null;
  state.running = false;
  if (state.mode === 'work') {
    state.cycles++;
    state.mode = (state.cycles % SETTINGS.cycle === 0) ? 'long' : 'short';
  } else {
    state.mode = 'work';
  }
  state.remaining = (state.mode === 'work' ? SETTINGS.work : state.mode === 'short' ? SETTINGS.short : SETTINGS.long) * 60;
  state.total = state.remaining;
  render();
}

function setMode(m) {
  if (state.interval) clearInterval(state.interval);
  state.interval = null;
  state.running = false;
  state.mode = m;
  state.remaining = (m === 'work' ? SETTINGS.work : m === 'short' ? SETTINGS.short : SETTINGS.long) * 60;
  state.total = state.remaining;
  render();
}

function toggleSettings() {
  $('#settings').classList.toggle('open');
}

function applySettings() {
  SETTINGS.work = Math.max(1, +$('#setWork').value || 25);
  SETTINGS.short = Math.max(1, +$('#setShort').value || 5);
  SETTINGS.long = Math.max(1, +$('#setLong').value || 15);
  SETTINGS.cycle = Math.max(2, +$('#setCycle').value || 4);
  localStorage.setItem('gz-pomodoro', JSON.stringify(SETTINGS));
  reset();
}

// Build mode buttons
$('#mode').innerHTML = `
  <button data-mode="work" onclick="setMode('work')">${t('work')}</button>
  <button data-mode="short" onclick="setMode('short')">${t('short')}</button>
  <button data-mode="long" onclick="setMode('long')">${t('long')}</button>`;

// Wire controls
$('#btnStart').addEventListener('click', start);
$('#btnReset').addEventListener('click', reset);
$('#btnSkip').addEventListener('click', skip);
$('#btnSettings').addEventListener('click', toggleSettings);

// Settings labels
$('#setTitle').textContent = t('setTitle');
$('#lblWork').textContent = t('workLbl');
$('#lblShort').textContent = t('shortLbl');
$('#lblLong').textContent = t('longLbl');
$('#lblCycle').textContent = t('cycleLbl');
$('#unitMin1').textContent = t('min1');
$('#unitMin2').textContent = t('min2');
$('#unitMin3').textContent = t('min3');
$('#setWork').value = SETTINGS.work;
$('#setShort').value = SETTINGS.short;
$('#setLong').value = SETTINGS.long;
$('#setCycle').value = SETTINGS.cycle;
['#setWork','#setShort','#setLong','#setCycle'].forEach(s => $(s).addEventListener('change', applySettings));

render();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'⏱️', href:'/calc/timer-stopwatch.html', name:'Timer & Stopwatch'},
    {icon:'📅', href:'/calc/date-calculator.html', name:'Date Calculator'},
    {icon:'⏰', href:'/dev/timestamp.html', name:'Timestamp'},
    {icon:'🌍', href:'/convert/timezone.html', name:'Time Zone Converter'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
