<script>
GZI18n.register({
  en: {
    toolTitle: 'Time Zone Comparison',

  zh: {

    toolDesc: '并排对比世界各地城市的当前本地时间。实时更新的时钟，自动识别夏令时，并高亮显示工作时间重叠区间，方便分布式团队安排会议。',
    addCity: '添加城市',
    clear: '清空',
    businessHours: '工作时间：9–18',
    dstActive: '夏令时生效',
    weekday: '工作日',
    weekend: '周末',
    overlapNone: '当前没有工作时间重叠。',
    overlapSome: '工作时间重叠：',
    legendBiz: '在工作时间内 (9–18)',
    legendOff: '在工作时间外',
    step1: '使用下拉菜单添加你想对比的城市或地区',
    step2: '时钟每秒实时更新，自动应用正确的夏令时偏移',
    step3: '本地时间 9–18 的行会高亮显示 — 这些是工作时间',
    step4: '找到大部分行变绿的时间窗口，即可作为重叠会议时段',
  }
});

const { $, t } = GZ;

const CITIES = [
  { city:'New York', tz:'America/New_York' },
  { city:'Los Angeles', tz:'America/Los_Angeles' },
  { city:'Chicago', tz:'America/Chicago' },
  { city:'Toronto', tz:'America/Toronto' },
  { city:'Mexico City', tz:'America/Mexico_City' },
  { city:'São Paulo', tz:'America/Sao_Paulo' },
  { city:'London', tz:'Europe/London' },
  { city:'Paris', tz:'Europe/Paris' },
  { city:'Berlin', tz:'Europe/Berlin' },
  { city:'Madrid', tz:'Europe/Madrid' },
  { city:'Rome', tz:'Europe/Rome' },
  { city:'Amsterdam', tz:'Europe/Amsterdam' },
  { city:'Stockholm', tz:'Europe/Stockholm' },
  { city:'Moscow', tz:'Europe/Moscow' },
  { city:'Istanbul', tz:'Europe/Istanbul' },
  { city:'Dubai', tz:'Asia/Dubai' },
  { city:'Tehran', tz:'Asia/Tehran' },
  { city:'Karachi', tz:'Asia/Karachi' },
  { city:'Mumbai', tz:'Asia/Kolkata' },
  { city:'Delhi', tz:'Asia/Kolkata' },
  { city:'Bangkok', tz:'Asia/Bangkok' },
  { city:'Singapore', tz:'Asia/Singapore' },
  { city:'Hong Kong', tz:'Asia/Hong_Kong' },
  { city:'Shanghai', tz:'Asia/Shanghai' },
  { city:'Beijing', tz:'Asia/Shanghai' },
  { city:'Taipei', tz:'Asia/Taipei' },
  { city:'Seoul', tz:'Asia/Seoul' },
  { city:'Tokyo', tz:'Asia/Tokyo' },
  { city:'Sydney', tz:'Australia/Sydney' },
  { city:'Melbourne', tz:'Australia/Melbourne' },
  { city:'Auckland', tz:'Pacific/Auckland' },
  { city:'Honolulu', tz:'Pacific/Honolulu' },
  { city:'UTC', tz:'UTC' },
];

let selected = [
  { city:'San Francisco', tz:'America/Los_Angeles' },
  { city:'New York', tz:'America/New_York' },
  { city:'London', tz:'Europe/London' },
  { city:'Shanghai', tz:'Asia/Shanghai' },
];

function isDST(tz) {
  // Heuristic: compare January vs July offset
  const now = new Date();
  const jan = new Date(now.getFullYear(), 0, 15);
  const jul = new Date(now.getFullYear(), 6, 15);
  const janOff = -new Intl.DateTimeFormat('en-US', {timeZone:tz, timeZoneName:'shortOffset'}).formatToParts(jan).find(p=>p.type==='timeZoneName').value.match(/[+-]\d+:\d+/)[0] * 60 || getOffset(jan, tz);
  const julOff = getOffset(jul, tz);
  const curOff = getOffset(now, tz);
  // if current offset differs from standard (the one with bigger absolute in northern hemisphere)
  const stdOff = Math.abs(janOff) > Math.abs(julOff) ? janOff : julOff;
  return curOff !== stdOff;
}

function getOffset(date, tz) {
  const parts = new Intl.DateTimeFormat('en-US', {timeZone:tz, year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false}).formatToParts(date);
  const m = {};
  parts.forEach(p => { if(p.type !== 'literal') m[p.type] = p.value; });
  const tzDate = new Date(`${m.year}-${m.month}-${m.day}T${m.hour==='24'?'00':m.hour}:${m.minute}:${m.second}Z`);
  return Math.round((tzDate - date) / 60000);
}

function getZoneParts(tz) {
  const now = new Date();
  const parts = new Intl.DateTimeFormat('en-US', {
    timeZone:tz, weekday:'short', year:'numeric', month:'short', day:'2-digit',
    hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:false
  }).formatToParts(now);
  const m = {};
  parts.forEach(p => { if(p.type !== 'literal') m[p.type] = p.value; });
  return m;
}

function render() {
  const zones = $('#zones');
  zones.innerHTML = '';
  let bizCount = 0;
  selected.forEach((z, idx) => {
    const m = getZoneParts(z.tz);
    const hour = parseInt(m.hour);
    const isWeekend = ['Sat','Sun'].includes(m.weekday);
    const inBiz = !isWeekend && hour >= 9 && hour < 18;
    if (inBiz) bizCount++;
    const row = document.createElement('div');
    row.className = 'tz-row' + (inBiz ? ' biz' : (isWeekend || hour < 7 || hour >= 21 ? ' dark' : ''));
    const tzLabel = z.tz;
    const dstTag = isDST(z.tz) ? ` <span style="font-size:.72em;opacity:.6">· ${t('dstActive')}</span>` : '';
    row.innerHTML = `
      <div>
        <div class="tz-city">${esc(z.city)}${dstTag}</div>
        <div class="tz-zone">${esc(tzLabel)}</div>
      </div>
      <div>
        <div class="tz-time">${m.hour}:${m.minute}:${m.second}</div>
        <div class="tz-date">${m.weekday}, ${m.month} ${m.day} ${m.year}</div>
      </div>
      <button class="tz-rm" data-idx="${idx}" title="remove">×</button>`;
    zones.appendChild(row);
  });
  zones.querySelectorAll('.tz-rm').forEach(btn => btn.addEventListener('click', e => {
    selected.splice(+e.target.dataset.idx, 1);
    render();
  }));
  // status
  if (selected.length === 0) {
    $('#status').innerHTML = '';
  } else if (bizCount === 0) {
    $('#status').innerHTML = `<span style="opacity:.7">${t('overlapNone')}</span>`;
  } else {
    $('#status').innerHTML = `<span style="color:var(--gz-success)">${t('overlapSome')}${bizCount} / ${selected.length}</span>`;
  }
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function addCity() {
  const sel = document.getElementById('city-sel');
  const tz = sel.value;
  if (!tz) return;
  const c = CITIES.find(x => x.tz === tz);
  if (c && !selected.find(s => s.tz === tz)) {
    selected.push(c);
    render();
  } else if (c) {
    // duplicate - allow add anyway with city name
    selected.push({...c});
    render();
  }
}

$('#toolbar').innerHTML = `
  <select class="gz-select" id="city-sel">
    <option value="">— ${t('addCity')} —</option>
    ${CITIES.map(c => `<option value="${c.tz}">${c.city} (${c.tz})</option>`).join('')}
  </select>
  <button class="gz-btn" onclick="addCity()">+ ${t('addCity')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="selected=[];render()">${t('clear')}</button>`;

$('#legend').innerHTML = `
  <span><span class="dot biz"></span> ${t('legendBiz')}</span>
  <span><span class="dot off"></span> ${t('legendOff')}</span>
  <span>· ${t('businessHours')}</span>`;

render();
setInterval(render, 1000);

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🕐', href:'/calc/timezone-converter.html', name:'Timezone Converter'},
    {icon:'🌍', href:'/calc/meeting-planner.html', name:'Meeting Planner'},
    {icon:'📅', href:'/calc/date-difference.html', name:'Date Difference'},
    {icon:'⏰', href:'/calc/world-clock.html', name:'World Clock'},
  ]
});
</script>
