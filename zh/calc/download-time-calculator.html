<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"How is download time calculated?","acceptedAnswer":{"@type":"Answer","text":"Download time is calculated by dividing the file size by your internet connection speed, then converted to minutes/hours. We account for the difference between bits (network speed) and bytes (file size)."}},{"@type":"Question","name":"Why is my actual download slower than estimated?","acceptedAnswer":{"@type":"Answer","text":"Actual download speed can be slower due to network congestion, server limitations, WiFi interference, or other factors. Our calculation assumes ideal conditions with your full bandwidth."}},{"@type":"Question","name":"What is the difference between Mbps and MB/s?","acceptedAnswer":{"@type":"Answer","text":"Mbps (Megabits per second) is used for internet speed, while MB/s (Megabytes per second) is used for file transfer. 1 MB/s = 8 Mbps. Our calculator automatically handles this conversion."}},{"@type":"Question","name":"Can I calculate download time for multiple files?","acceptedAnswer":{"@type":"Answer","text":"Yes. Enter the total size of all files combined. The download time will be the same whether you download them individually or together (assuming consistent network speed)."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>

  <div class="gz-tool-area">

    <div class="gz-dl-form" id="form">
      <label id="lbl-fileSize">File Size
        <input type="number" id="fileSize" min="0" step="any" placeholder="100">
      </label>
      <label id="lbl-fileUnit">File Unit
        <select id="fileUnit">
          <option value="1">Bytes (B)</option>
          <option value="1024">KB</option>
          <option value="1048576" selected>MB</option>
          <option value="1073741824">GB</option>
          <option value="1099511627776">TB</option>
        </select>
      </label>
      <label id="lbl-speed">Internet Speed
        <input type="number" id="speed" min="0" step="any" placeholder="100">
      </label>
      <label id="lbl-speedUnit">Speed Unit
        <select id="speedUnit">
          <option value="0.000001">Kbps</option>
          <option value="0.001" selected>Mbps</option>
          <option value="1">Gbps</option>
        </select>
      </label>
    </div>
    <div class="gz-dl-presets">
      <button class="gz-dl-preset-btn" onclick="setPreset(1000, 'mb')">1 GB File</button>
      <button class="gz-dl-preset-btn" onclick="setPreset(50000, 'mb')">50 GB Game</button>
      <button class="gz-dl-preset-btn" onclick="setPreset(25, 'mb')">25 Mbps</button>
      <button class="gz-dl-preset-btn" onclick="setPreset(100, 'mb')">100 Mbps</button>
      <button class="gz-dl-preset-btn" onclick="setPreset(500, 'mb')">500 Mbps</button>
      <button class="gz-dl-preset-btn" onclick="setPreset(1000, 'mb')">1 Gbps</button>
    </div>
    <div class="gz-dl-result" id="result" style="display:none">
      <div class="gz-dl-time" id="downloadTime">—</div>
      <div id="timeBreakdown"></div>

        <div class="gz-dl-speed-item">
          <strong id="transferSpeed">—</strong>
          <span id="transferSpeedLabel">Transfer Speed</span>
        </div>
        <div class="gz-dl-speed-item">
          <strong id="effectiveSpeed">—</strong>
          <span id="effectiveSpeedLabel">Effective Speed</span>
        </div>
      </div>
    </div>

<script>
GZI18n.register({
  en: {
    toolTitle: 'Download Time Calculator',
    toolDesc: 'Calculate how long it will take to download files based on your internet connection speed. Works for any file size and network speed.',
    calculate: 'Calculate',
    clear: 'Clear',
    fileSize: 'File Size',
    fileUnit: 'File Unit',
    speed: 'Internet Speed',
    speedUnit: 'Speed Unit',
    downloadTime: 'Estimated Time',
    transferSpeed: 'Transfer Speed',
    effectiveSpeed: 'Effective Speed',
    step1: 'Enter your file size (MB, GB, etc.)',
    step2: 'Enter your internet download speed (Mbps, Gbps)',
    step3: 'Click Calculate to see estimated download time',
    step4: 'Use preset buttons for quick common scenarios',
  },
  zh: {
    toolTitle: '下载时间计算器',
    toolDesc: '根据网速计算文件下载时间。支持任意文件大小和网络速度，即时估算下载所需时间。',
    calculate: '计算',
    clear: '清除',
    fileSize: '文件大小',
    fileUnit: '文件单位',
    speed: '网络速度',
    speedUnit: '速度单位',
    downloadTime: '预计时间',
    transferSpeed: '传输速度',
    effectiveSpeed: '有效速度',
    step1: '输入文件大小(MB、GB等)',
    step2: '输入网络下载速度(Mbps、Gbps)',
    step3: '点击「计算」查看预计下载时间',
    step4: '使用预设按钮快速设置常用场景',
  }
});

const { $, t } = GZ;

function calculateDownloadTime() {
  const fileSize = parseFloat($('#fileSize').value);
  const fileUnit = parseFloat($('#fileUnit').value);
  const speed = parseFloat($('#speed').value);
  const speedUnit = parseFloat($('#speedUnit').value);
  
  if (!fileSize || !speed || fileSize <= 0 || speed <= 0) {
    $('#result').style.display = 'none';
    return;
  }
  
  const fileSizeBytes = fileSize * fileUnit;
  const speedBitsPerSecond = speed * speedUnit;
  const speedBytesPerSecond = speedBitsPerSecond / 8;
  
  const totalSeconds = fileSizeBytes / speedBytesPerSecond;
  const hours = Math.floor(totalSeconds / 3600);
  const minutes = Math.floor((totalSeconds % 3600) / 60);
  const seconds = Math.floor(totalSeconds % 60);
  
  let timeStr = '';
  if (hours > 0) timeStr += `${hours}h `;
  if (minutes > 0) timeStr += `${minutes}m `;
  timeStr += `${seconds}s`;
  
  $('#downloadTime').textContent = timeStr;
  $('#transferSpeed').textContent = formatSpeed(speedBytesPerSecond);
  $('#effectiveSpeed').textContent = speed > 0 ? `${speed} ${$('#speedUnit option:selected').text}` : '—';
  $('#timeBreakdown').innerHTML = `
    <small style="color:var(--gz-text2,#aaa)">
      ${formatBytes(fileSizeBytes)} / ${formatSpeed(speedBytesPerSecond)} = ${totalSeconds.toFixed(2)}s total
    </small>
  `;
  $('#result').style.display = 'block';
}

function formatSpeed(bytesPerSecond) {
  if (bytesPerSecond >= 1048576) {
    return (bytesPerSecond / 1048576).toFixed(2) + ' MB/s';
  } else if (bytesPerSecond >= 1024) {
    return (bytesPerSecond / 1024).toFixed(2) + ' KB/s';
  }
  return bytesPerSecond.toFixed(2) + ' B/s';
}

function formatBytes(bytes) {
  if (bytes >= 1099511627776) return (bytes / 1099511627776).toFixed(2) + ' TB';
  if (bytes >= 1073741824) return (bytes / 1073741824).toFixed(2) + ' GB';
  if (bytes >= 1048576) return (bytes / 1048576).toFixed(2) + ' MB';
  if (bytes >= 1024) return (bytes / 1024).toFixed(2) + ' KB';
  return bytes + ' B';
}

function setPreset(size, unit) {
  $('#fileSize').value = size;
  if (unit === 'mb') {
    $('#fileUnit').value = '1048576';
    $('#speedUnit').value = '0.001';
  }
  calculateDownloadTime();
}

function doClear() {
  $('#fileSize').value = '';
  $('#speed').value = '';
  $('#result').style.display = 'none';
}

$('#fileSize').addEventListener('input', calculateDownloadTime);
$('#fileUnit').addEventListener('change', calculateDownloadTime);
$('#speed').addEventListener('input', calculateDownloadTime);
$('#speedUnit').addEventListener('change', calculateDownloadTime);

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="calculateDownloadTime()">${t('calculate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📊', href:'/calc/bandwidth-calculator.html', name:'Bandwidth Calculator'},
    {icon:'⚡', href:'/calc/data-converter.html', name:'Data Converter'},
    {icon:'💾', href:'/calc/storage-calculator.html', name:'Storage Calculator'},
    {icon:'📡', href:'/calc/internet-speed-test.html', name:'Speed Test'},
  ]
});
</script>

</body>
