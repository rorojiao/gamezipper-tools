.gt-preset:hover{transform:translateY(-2px);transition:transform .15s}
.gt-output{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px;font-family:monospace;font-size:.85em;white-space:pre-wrap;word-break:break-all;line-height:1.5;max-height:240px;overflow-y:auto}
.gt-actions{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0}

<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "How does CSS gradient text work?", "acceptedAnswer": {"@type": "Answer", "text": "The technique uses 3 CSS properties: background: linear-gradient(...); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;. The text becomes a 'mask' for the gradient background, so the gradient is visible only where the text glyphs are."}}, {"@type": "Question", "name": "Does gradient text work on all browsers?", "acceptedAnswer": {"@type": "Answer", "text": "Yes — all modern browsers (Chrome, Firefox, Safari, Edge) support background-clip: text. The -webkit- prefix is included for Safari. The tool outputs both prefixed and unprefixed properties for maximum compatibility."}}, {"@type": "Question", "name": "Can I use gradient text on any font?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. The gradient text technique works on any element, including headings, paragraphs, spans, and links. It works with any font, but bolder weights (600-900) make the gradient more visible because the glyphs cover more area."}}, {"@type": "Question", "name": "What are the best gradient combinations?", "acceptedAnswer": {"@type": "Answer", "text": "For maximum readability and visual impact: use 2-3 colors with high contrast, avoid pure red+green (color-blind unfriendly), and consider your background. The tool includes 10 curated presets (sunset, ocean, candy, fire, neon, etc.) that are tested and look great on dark backgrounds."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gt-controls">
      <div class="gt-control">
        <label id="lbl-text"></label>
        <input type="text" id="text" value="Gradient" maxlength="30">
      </div>
      <div class="gt-control">
        <label id="lbl-size"></label>
        <input type="number" id="size" value="80" min="20" max="200">
      </div>
    </div>
    <label style="font-size:.85em;color:var(--text2);font-weight:600" id="lbl-colors"></label>
    <div class="gt-colors" id="colors"></div>
    <button class="gt-add" id="btn-add">+ Add color stop</button>
    <div class="gt-controls" style="margin-top:14px">
      <div class="gt-control">
        <label id="lbl-angle"></label>
        <input type="number" id="angle" value="90" min="0" max="360">
      </div>
      <div class="gt-control">
        <label id="lbl-type"></label>
        <select id="gradType">
          <option value="linear">Linear</option>
          <option value="radial">Radial</option>
          <option value="conic">Conic</option>
        </select>
      </div>
    </div>
    <div class="gt-row" style="margin:8px 0">
      <label><input type="checkbox" id="bold" checked> <span id="lbl-bold">Bold</span></label>
      <label><input type="checkbox" id="italic"> <span id="lbl-italic">Italic</span></label>
      <label><input type="checkbox" id="upper"> <span id="lbl-upper">UPPERCASE</span></label>
    </div>
    <div class="gt-preview" id="preview">Gradient</div>
    <div style="font-size:.85em;color:var(--text2);font-weight:600;margin:14px 0 8px" id="lbl-presets">Quick Presets</div>
    <div class="gt-presets" id="presets"></div>
    <div class="gt-actions">
      <button class="gz-btn" id="btnCopy">📋 Copy CSS</button>
      <button class="gz-btn gz-btn-secondary" id="btnHtml">📄 Copy HTML</button>
      <button class="gz-btn gz-btn-secondary" id="btnTail">🌬️ Tailwind</button>
    </div>
    <div class="gt-output" id="output"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'CSS Gradient Text Generator',
    toolDesc: 'Generate beautiful CSS gradient text with live preview, custom colors, angle, type and 10+ presets. Copy ready-to-use CSS for any element.',
    lblText: 'Your text', lblSize: 'Font size (px)', lblAngle: 'Angle (deg, for linear)', lblType: 'Gradient type',
    lblBold: 'Bold', lblItalic: 'Italic', lblUpper: 'UPPERCASE',
    lblColors: 'Color stops', lblPresets: 'Quick presets',
    step1: 'Type your text in the input',
    step2: 'Add or remove color stops by clicking the swatches and color picker',
    step3: 'Adjust the angle, type, and font style — preview updates live',
    step4: 'Click a preset to instantly apply, or copy the CSS / Tailwind / HTML',
  },
  zh: {
    toolTitle: 'CSS 渐变文字生成器',
    toolDesc: '使用自定义颜色、角度、类型和 10+ 预设生成精美的 CSS 渐变文字。复制可直接使用的 CSS 代码。',
    lblText: '文字内容', lblSize: '字号 (px)', lblAngle: '角度 (度, 线性渐变)', lblType: '渐变类型',
    lblBold: '粗体', lblItalic: '斜体', lblUpper: '大写',
    lblColors: '颜色停点', lblPresets: '快速预设',
    step1: '在输入框中输入文字',
    step2: '点击色块用拾色器添加或修改颜色停点',
    step3: '调整角度、类型和字体样式 — 预览实时更新',
    step4: '点击预设即时应用，或复制 CSS / Tailwind / HTML',
  }
});

const { $, t, copyText } = GZ;

const PRESETS = [
  { name: 'Sunset', colors: ['#ff6b6b','#feca57','#ff9ff3'], angle: 90 },
  { name: 'Ocean', colors: ['#0093E9','#80D0C7'], angle: 90 },
  { name: 'Candy', colors: ['#f093fb','#f5576c'], angle: 90 },
  { name: 'Fire', colors: ['#f12711','#f5af19'], angle: 90 },
  { name: 'Neon', colors: ['#fc00ff','#00dbde'], angle: 90 },
  { name: 'Mint', colors: ['#00b09b','#96c93d'], angle: 90 },
  { name: 'Royal', colors: ['#667eea','#764ba2'], angle: 90 },
  { name: 'Peach', colors: ['#ffecd2','#fcb69f'], angle: 90 },
  { name: 'Berry', colors: ['#8E2DE2','#4A00E0'], angle: 90 },
  { name: 'Lava', colors: ['#f857a6','#ff5858'], angle: 90 },
  { name: 'Forest', colors: ['#134E5E','#71B280'], angle: 90 },
  { name: 'Gold', colors: ['#FFD700','#FF8C00','#FF4500'], angle: 90 },
];

let colorStops = ['#ff6b6b','#feca57','#f5576c'];

function renderColors(){
  $('#colors').innerHTML = colorStops.map((c,i) =>
    `<div class="gt-swatch" style="background:${c}">
      <input type="color" value="${c}" data-i="${i}">
     </div>`
  ).join('') + (colorStops.length>2 ? `<button class="gt-add" onclick="removeColor()" style="background:rgba(239,68,68,.1);color:#ef4444">−</button>` : '');
  document.querySelectorAll('#colors input[type=color]').forEach(inp => {
    inp.addEventListener('input', e => {
      const i = +e.target.dataset.i;
      colorStops[i] = e.target.value;
      render();
    });
  });
}
window.removeColor = function(){
  if (colorStops.length>2) { colorStops.pop(); render(); }
};

function addColor(){
  if (colorStops.length>=6) return;
  colorStops.push('#' + Math.floor(Math.random()*16777215).toString(16).padStart(6,'0'));
  render();
}

function buildGradient(){
  const t = $('#gradType').value;
  const a = +$('#angle').value;
  const colors = colorStops.join(', ');
  if (t==='linear') return `linear-gradient(${a}deg, ${colors})`;
  if (t==='radial') return `radial-gradient(circle, ${colors})`;
  return `conic-gradient(from ${a}deg, ${colors})`;
}

function buildCSS(){
  const text = $('#text').value || 'Gradient';
  const size = +$('#size').value;
  const bold = $('#bold').checked ? '900' : '400';
  const italic = $('#italic').checked ? 'italic' : 'normal';
  const upper = $('#upper').checked ? 'uppercase' : 'none';
  const gradient = buildGradient();
  return `.gradient-text {
  font-size: ${size}px;
  font-weight: ${bold};
  font-style: ${italic};
  text-transform: ${upper};
  background: ${gradient};
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  color: transparent;
  display: inline-block;
}`;
}

function buildHTML(){
  const text = $('#text').value || 'Gradient';
  return `<h1 class="gradient-text">${text}</h1>`;
}

function buildTailwind(){
  const text = $('#text').value || 'Gradient';
  const size = +$('#size').value;
  return `<!-- Use arbitrary value: -->
<h1 class="text-[${size}px] font-black bg-clip-text text-transparent bg-gradient-to-r" style="background-image: ${buildGradient()};">
  ${text}
</h1>`;
}

function render(){
  const text = $('#text').value || 'Gradient';
  const size = +$('#size').value;
  const bold = $('#bold').checked ? '900' : '400';
  const italic = $('#italic').checked ? 'italic' : 'normal';
  const upper = $('#upper').checked ? 'uppercase' : 'none';
  const gradient = buildGradient();
  const preview = $('#preview');
  preview.textContent = text;
  preview.style.fontSize = size + 'px';
  preview.style.fontWeight = bold;
  preview.style.fontStyle = italic;
  preview.style.textTransform = upper;
  preview.style.background = gradient;
  $('#output').textContent = buildCSS();
}

$('#text').addEventListener('input', render);
$('#size').addEventListener('input', render);
$('#angle').addEventListener('input', render);
$('#gradType').addEventListener('change', render);
$('#bold').addEventListener('change', render);
$('#italic').addEventListener('change', render);
$('#upper').addEventListener('change', render);
$('#btn-add').onclick = addColor;
$('#btnCopy').onclick = () => copyText(buildCSS());
$('#btnHtml').onclick = () => copyText(buildCSS() + '\n\n' + buildHTML());
$('#btnTail').onclick = () => copyText(buildTailwind());

function renderPresets(){
  $('#presets').innerHTML = PRESETS.map((p,i) =>
    `<div class="gt-preset" style="background:${p.angle?`linear-gradient(${p.angle}deg, ${p.colors.join(', ')})`:`radial-gradient(circle, ${p.colors.join(', ')})`};-webkit-background-clip:text;background-clip:text;color:transparent;-webkit-text-fill-color:transparent;font-weight:800;font-size:1.1em" onclick="applyPreset(${i})">${p.name}</div>`
  ).join('');
}
window.applyPreset = function(i){
  const p = PRESETS[i];
  colorStops = p.colors.slice();
  $('#angle').value = p.angle;
  $('#gradType').value = 'linear';
  renderColors();
  render();
};

function init(){
  $('#lbl-text').textContent = t('lblText');
  $('#lbl-size').textContent = t('lblSize');
  $('#lbl-angle').textContent = t('lblAngle');
  $('#lbl-type').textContent = t('lblType');
  $('#lbl-bold').textContent = t('lblBold');
  $('#lbl-italic').textContent = t('lblItalic');
  $('#lbl-upper').textContent = t('lblUpper');
  $('#lbl-colors').textContent = t('lblColors');
  $('#lbl-presets').textContent = t('lblPresets');
  renderColors();
  renderPresets();
  render();
}

GZ.renderToolPage({
  category: 'css',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🌈', href:'/css-tools/gradient.html', name:'CSS Gradient'},
    {icon:'✏️', href:'/css-tools/text-shadow.html', name:'Text Shadow'},
    {icon:'🎨', href:'/css-tools/css-filter.html', name:'CSS Filter'},
    {icon:'✏️', href:'/css-tools/text-stroke.html', name:'Text Stroke'},
  ]
});
init();
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
