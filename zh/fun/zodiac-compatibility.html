<script>
GZI18n.register({
  en: {
    toolTitle: 'Zodiac Compatibility Test',
    toolDesc: 'Check the love match between any two western zodiac signs. Get an instant compatibility percentage plus the strengths, challenges and chemistry of your star-sign pairing — free, fun and browser-only.',
    you: 'Your Sign', partner: 'Partner\'s Sign',
    perfect: '💯 Perfect Match', great: '🔥 Great Match', good: '😊 Good Match', okay: '🙂 Okay Match', challenging: '⚡ Challenging',
    strengths: '💪 Strengths', challenges: '⚠️ Challenges', chemistry: '✨ Chemistry',
    randomize: '🎲 Random Pair',
    step1: 'Select your zodiac sign from the first dropdown',
    step2: 'Select your partner\'s sign from the second dropdown',
    step3: 'Read your compatibility percentage and match label',
    step4: 'Explore the strengths, challenges and chemistry of your pairing',
  },
  zh: {
    toolTitle: '星座配对测试',
    toolDesc: '查看任意两个西方星座之间的爱情匹配度。即时获取配对百分比，以及你们的优点、挑战和化学反应 — 免费、有趣、浏览器本地运行。',
    you: '你的星座', partner: 'TA 的星座',
    perfect: '💯 天作之合', great: '🔥 非常般配', good: '😊 比较合适', okay: '🙂 还不错', challenging: '⚡ 充满挑战',
    strengths: '💪 优点', challenges: '⚠️ 挑战', chemistry: '✨ 化学反应',
    randomize: '🎲 随机配对',
    step1: '从第一个下拉框选择你的星座',
    step2: '从第二个下拉框选择对方的星座',
    step3: '查看你们的配对百分比和匹配标签',
    step4: '探索你们配对的优点、挑战和化学反应',
  }
});

const { $, copyText, t } = GZ;

// 12 western zodiac signs with element + traits
const SIGNS = [
  {sym:'♈',en:'Aries',zh:'白羊座',el:'fire',date:'Mar 21 – Apr 19',dateZh:'3月21日 - 4月19日'},
  {sym:'♉',en:'Taurus',zh:'金牛座',el:'earth',date:'Apr 20 – May 20',dateZh:'4月20日 - 5月20日'},
  {sym:'♊',en:'Gemini',zh:'双子座',el:'air',date:'May 21 – Jun 20',dateZh:'5月21日 - 6月20日'},
  {sym:'♋',en:'Cancer',zh:'巨蟹座',el:'water',date:'Jun 21 – Jul 22',dateZh:'6月21日 - 7月22日'},
  {sym:'♌',en:'Leo',zh:'狮子座',el:'fire',date:'Jul 23 – Aug 22',dateZh:'7月23日 - 8月22日'},
  {sym:'♍',en:'Virgo',zh:'处女座',el:'earth',date:'Aug 23 – Sep 22',dateZh:'8月23日 - 9月22日'},
  {sym:'♎',en:'Libra',zh:'天秤座',el:'air',date:'Sep 23 – Oct 22',dateZh:'9月23日 - 10月22日'},
  {sym:'♏',en:'Scorpio',zh:'天蝎座',el:'water',date:'Oct 23 – Nov 21',dateZh:'10月23日 - 11月21日'},
  {sym:'♐',en:'Sagittarius',zh:'射手座',el:'fire',date:'Nov 22 – Dec 21',dateZh:'11月22日 - 12月21日'},
  {sym:'♑',en:'Capricorn',zh:'摩羯座',el:'earth',date:'Dec 22 – Jan 19',dateZh:'12月22日 - 1月19日'},
  {sym:'♒',en:'Aquarius',zh:'水瓶座',el:'air',date:'Jan 20 – Feb 18',dateZh:'1月20日 - 2月18日'},
  {sym:'♓',en:'Pisces',zh:'双鱼座',el:'water',date:'Feb 19 – Mar 20',dateZh:'2月19日 - 3月20日'},
];

// Elemental compatibility matrix (fire-air, earth-water = complementary)
const ELEMENT_MATCH = {
  'fire-fire':85,'fire-earth':45,'fire-air':90,'fire-water':40,
  'earth-fire':45,'earth-earth':82,'earth-air':50,'earth-water':88,
  'air-fire':90,'air-earth':50,'air-air':80,'air-water':48,
  'water-fire':40,'water-earth':88,'water-air':48,'water-water':84,
};

const STRENGTHS = {
  fire:['passion','energy','adventure','spontaneity','enthusiasm'],
  earth:['loyalty','stability','practicality','trust','patience'],
  air:['communication','intellect','wit','social charm','ideas'],
  water:['emotion','intuition','caring','depth','romance'],
};
const STRENGTHS_ZH = {
  fire:['热情','活力','冒险精神','自发性','热忱'],
  earth:['忠诚','稳定','务实','信任','耐心'],
  air:['沟通','智慧','机智','社交魅力','创意'],
  water:['感性','直觉','体贴','深度','浪漫'],
};
const CHALLENGES = {
  fire:['stubbornness','impulsiveness','temper','competitiveness'],
  earth:['rigidity','possessiveness','slowness to change','materialism'],
  air:['detachment','restlessness','indecision','overthinking'],
  water:['moodiness','over-sensitivity','secretiveness','clinginess'],
};
const CHALLENGES_ZH = {
  fire:['固执','冲动','脾气','好胜'],
  earth:['固执','占有欲','慢热','物质主义'],
  air:['疏离','不安','犹豫','想太多'],
  water:['情绪化','敏感','神秘','依赖'],
};

function compute(a, b){
  const key = `${SIGNS[a].el}-${SIGNS[b].el}`;
  let base = ELEMENT_MATCH[key] || 60;
  // same sign bonus
  if(a === b) base = Math.min(95, base + 5);
  // add small deterministic variation per pair so it's not purely elemental
  const variance = ((a+1)*(b+1)*7) % 11 - 5;
  let pct = Math.max(35, Math.min(98, base + variance));
  return pct;
}

function labelFor(pct){
  if(pct >= 90) return t('perfect');
  if(pct >= 75) return t('great');
  if(pct >= 60) return t('good');
  if(pct >= 45) return t('okay');
  return t('challenging');
}
function colorFor(pct){
  if(pct>=90) return '#bb86fc';
  if(pct>=75) return '#e94560';
  if(pct>=60) return '#00d672';
  if(pct>=45) return '#61afef';
  return '#ffb86c';
}

const lang = (GZI18n.current === 'zh') ? 'zh' : 'en';

function renderSelects(){
  const opts = SIGNS.map((s,i)=>`<option value="${i}">${s.sym} ${lang==='zh'?s.zh:s.en} (${lang==='zh'?s.dateZh:s.date})</option>`).join('');
  $('#sel1').innerHTML = opts;
  $('#sel2').innerHTML = opts;
  $('#sel1').value = 0;
  $('#sel2').value = 4;
}

function update(){
  const a = +$('#sel1').value;
  const b = +$('#sel2').value;
  $('#emo1').textContent = SIGNS[a].sym;
  $('#emo2').textContent = SIGNS[b].sym;
  const pct = compute(a, b);
  const lab = labelFor(pct);
  const col = colorFor(pct);
  const sEl = SIGNS[a].el, bEl = SIGNS[b].el;
  const strArr = (lang==='zh'? STRENGTHS_ZH[sEl] : STRENGTHS[sEl]);
  const chaArr = (lang==='zh'? CHALLENGES_ZH[sEl] : CHALLENGES[sEl]);
  const sameEl = sEl === bEl;
  $('#result').innerHTML = `
    <div class="zc-pct" style="color:${col}">${pct}%</div>
    <div class="zc-bar"><div class="zc-bar-fill" style="width:${pct}%;background:linear-gradient(90deg,${col},${col}aa)"></div></div>
    <div class="zc-label" style="color:${col}">${lab}</div>
    <div class="zc-tags">
      ${strArr.slice(0,3).map(s=>`<span class="zc-tag good">${s}</span>`).join('')}
      ${chaArr.slice(0,2).map(s=>`<span class="zc-tag warn">${s}</span>`).join('')}
    </div>
    <div class="zc-desc">
      <h4>${t('strengths')}</h4>
      <p>${lang==='zh'
        ? `${SIGNS[a].zh}（${({fire:'火',earth:'土',air:'风',water:'水'})[sEl]}象）与 ${SIGNS[b].zh}（${({fire:'火',earth:'土',air:'风',water:'水'})[bEl]}象）的组合${sameEl?'同属一象，彼此理解深刻':'分属不同象位，互补潜力大'}。你们共享 ${strArr.slice(0,3).join('、')} 等特质。`
        : `The pairing of ${SIGNS[a].en} (${sEl}) and ${SIGNS[b].en} (${bEl}) ${sameEl?'shares the same element, creating deep mutual understanding':'combines different elements with strong complementary potential'}. You both value ${strArr.slice(0,3).join(', ')} and naturally resonate with each other's energy.`}
      </p>
      <h4>${t('challenges')}</h4>
      <p>${lang==='zh'
        ? `需要注意的潜在摩擦包括 ${chaArr.slice(0,3).join('、')}。坦诚沟通、互相包容是化解分歧的关键。`
        : `Potential friction areas include ${chaArr.slice(0,3).join(', ')}. Open communication and mutual patience are the keys to resolving differences.`}
      </p>
      <h4>${t('chemistry')}</h4>
      <p>${lang==='zh'
        ? `配对得分为 ${pct}%，${pct>=75?'说明你们天生一对，火花四射！':pct>=60?'整体默契不错，只要用心经营就能长久。':'需要更多磨合，但差异也能带来成长。'}`
        : `Compatibility score: ${pct}%. ${pct>=75?'You\'re a natural match with sparks flying!':pct>=60?'Solid chemistry overall — nurture it and it will last.':'More adjustment needed, but differences can spark growth.'}`}
      </p>
    </div>`;
}

$('#sel1').addEventListener('change', update);
$('#sel2').addEventListener('change', update);

$('#lblYou').textContent = t('you');
$('#lblPartner').textContent = t('partner');

$('#toolbar').innerHTML = `<button class="gz-btn gz-btn-secondary" id="btnRand">${t('randomize')}</button>`;
$('#btnRand').onclick = () => {
  $('#sel1').value = Math.floor(Math.random()*12);
  let b; do { b = Math.floor(Math.random()*12); } while(b === +$('#sel1').value && Math.random() < 0.5);
  $('#sel2').value = b;
  update();
};

renderSelects();
update();

GZ.renderToolPage({
  category: 'fun',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'❤️', href:'/fun/love-calculator.html', name:'Love Calculator'},
    {icon:'♈', href:'/fortune/zodiac.html', name:'Zodiac Signs'},
    {icon:'🔮', href:'/fun/yes-no-decision-maker.html', name:'Yes/No Decision'},
    {icon:'🔢', href:'/fortune/numerology.html', name:'Numerology'},
  ]
});
</script>
