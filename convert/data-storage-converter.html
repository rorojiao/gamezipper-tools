<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is the difference between KB and KiB?", "acceptedAnswer": {"@type": "Answer", "text": "KB (kilobyte) uses the decimal/SI scale: 1 KB = 1,000 bytes. KiB (kibibyte) uses the binary/IEC scale: 1 KiB = 1,024 bytes. Hard drive manufacturers use KB/MB/GB (decimal, so drives seem larger), while Windows reports file sizes in KiB/MiB/GiB but labels them KB/MB/GB."}}, {"@type": "Question", "name": "How many bytes are in a megabyte?", "acceptedAnswer": {"@type": "Answer", "text": "1 MB (megabyte, decimal) = 1,000,000 bytes (10^6). 1 MiB (mebibyte, binary) = 1,048,576 bytes (2^20 = 1024×1024). The 1,024-based definition is what most operating systems historically use, while storage vendors use the 1,000-based definition."}}, {"@type": "Question", "name": "What is bigger, a GB or a GiB?", "acceptedAnswer": {"@type": "Answer", "text": "A GiB (gibibyte) is bigger: 1 GiB = 1,073,741,824 bytes, while 1 GB (gigabyte) = 1,000,000,000 bytes. So 1 GiB ≈ 1.074 GB. This is why a '1 TB' hard drive shows as only ~931 GiB in your operating system."}}, {"@type": "Question", "name": "How are bits and bytes related?", "acceptedAnswer": {"@type": "Answer", "text": "1 byte = 8 bits. A bit is the smallest unit of digital data (0 or 1). Bytes are used for file sizes and storage, while bits (or megabits, Mbps) are commonly used for network/download speeds. So a 100 Mbps connection downloads at about 12.5 MB/s."}}]}</script>

<script>
GZI18n.register({
  en: {
    toolTitle: 'Data Storage Converter',
    toolDesc: 'Convert between digital storage units — bit, byte, KB, MB, GB, TB, PB and their binary IEC equivalents (KiB, MiB, GiB, TiB, PiB). Switch between decimal (SI) and binary scales, see all units at once, and understand KB vs KiB.',
    scaleSI: 'Decimal (SI: KB=1000)',
    scaleIEC: 'Binary (IEC: KiB=1024)',
    inputVal: 'Value',
    fromUnit: 'From',
    outputVal: 'Result',
    toUnit: 'To',
    unitCol: 'Unit',
    valCol: 'Value',
    swap: '⇄',
    infoText: '💡 Tip: Storage manufacturers use the decimal scale (1 GB = 10⁹ bytes), so a "1 TB" drive has 1,000,000,000,000 bytes. Windows reports in binary units (GiB) but labels them "GB", which is why the same drive shows as ~931 GB.',
    step1: 'Pick the scale — decimal/SI (KB = 1,000 bytes) or binary/IEC (KiB = 1,024 bytes)',
    step2: 'Enter a value and select the source unit',
    step3: 'Choose the target unit or read the full conversion table below',
    step4: 'Use the swap button to reverse the conversion',
  },
  zh: {
    toolTitle: '数据存储单位转换器',
    toolDesc: '在 bit、byte、KB、MB、GB、TB、PB 及其二进制 IEC 等价单位（KiB、MiB、GiB、TiB、PiB）之间转换。可切换十进制（SI）和二进制标准，一次性查看所有单位，理解 KB 与 KiB 的区别。',
    scaleSI: '十进制（SI：KB=1000）',
    scaleIEC: '二进制（IEC：KiB=1024）',
    inputVal: '数值',
    fromUnit: '源单位',
    outputVal: '结果',
    toUnit: '目标单位',
    unitCol: '单位',
    valCol: '数值',
    swap: '⇄',
    infoText: '💡 提示：硬盘厂商使用十进制标准（1 GB = 10⁹ 字节），所以"1 TB"硬盘有 1,000,000,000,000 字节。Windows 以二进制单位（GiB）显示却标注为"GB"，因此同一硬盘会显示为约 931 GB。',
    step1: '选择标准 — 十进制/SI（KB = 1,000 字节）或二进制/IEC（KiB = 1,024 字节）',
    step2: '输入数值并选择源单位',
    step3: '选择目标单位，或查看下方的完整换算表',
    step4: '使用交换按钮反向转换',
  }
});

const { $, t } = GZ;
const lang = (window.GZI18n && GZI18n.getLang) ? GZI18n.getLang() : 'en';

// Unit definitions: name, factor to bits (1 byte = 8 bits)
const UNITS = {
  bit:   {factor: 1,            si: 'b'},
  byte:  {factor: 8,            si: 'B'},
  KB:    {factor: 8e3,          si: 'KB'},
  MB:    {factor: 8e6,          si: 'MB'},
  GB:    {factor: 8e9,          si: 'GB'},
  TB:    {factor: 8e12,         si: 'TB'},
  PB:    {factor: 8e15,         si: 'PB'},
  EB:    {factor: 8e18,         si: 'EB'},
  KiB:   {factor: 8 * 1024,     si: 'KiB'},
  MiB:   {factor: 8 * 1048576,  si: 'MiB'},
  GiB:   {factor: 8 * 1073741824, si: 'GiB'},
  TiB:   {factor: 8 * 1099511627776, si: 'TiB'},
  PiB:   {factor: 8 * 1125899906842624, si: 'PiB'},
};

const ORDER = ['bit','byte','KB','MB','GB','TB','PB','EB','KiB','MiB','GiB','TiB','PiB'];
let scale = 'si';

function fmtNum(n) {
  if (n === 0) return '0';
  if (!isFinite(n)) return '∞';
  const abs = Math.abs(n);
  if (abs >= 1e15 || (abs < 1e-4 && abs > 0)) return n.toExponential(6);
  if (abs >= 1) {
    const s = n.toPrecision(12);
    return parseFloat(s).toLocaleString(undefined, {maximumFractionDigits: 6});
  }
  return parseFloat(n.toPrecision(8)).toString();
}

function convert(val, fromU, toU) {
  const inBits = val * UNITS[fromU].factor;
  return inBits / UNITS[toU].factor;
}

function renderTable() {
  const fromVal = parseFloat($('#fromVal').value) || 0;
  const fromU = $('#fromUnit').value;
  $('#allBody').innerHTML = ORDER.map(u => {
    const v = convert(fromVal, fromU, u);
    const highlight = u === fromU ? 'style="background:var(--glass)"' : '';
    return `<tr ${highlight}><td>${UNITS[u].si}</td><td>${fmtNum(v)}</td></tr>`;
  }).join('');
}

function doConvert() {
  const v = parseFloat($('#fromVal').value) || 0;
  const fu = $('#fromUnit').value;
  const tu = $('#toUnit').value;
  $('#toVal').value = fmtNum(convert(v, fu, tu));
  renderTable();
}

function buildOptions(selected) {
  return ORDER.map(u => `<option value="${u}" ${u===selected?'selected':''}>${UNITS[u].si}</option>`).join('');
}

$('#scales').innerHTML = `
  <button class="${scale==='si'?'active':''}" onclick="scale='si';document.querySelectorAll('.scale-tabs button').forEach((b,i)=>b.classList.toggle('active',i===0))">${t('scaleSI')}</button>
  <button class="${scale==='iec'?'active':''}" onclick="scale='iec';document.querySelectorAll('.scale-tabs button').forEach((b,i)=>b.classList.toggle('active',i===1))">${t('scaleIEC')}</button>`;

$('#conv').innerHTML = `
  <div style="display:flex;flex-direction:column;gap:6px">
    <label style="font-size:.8em;opacity:.7">${t('inputVal')}</label>
    <input type="number" id="fromVal" value="1" min="0" step="any" style="font-family:monospace">
    <select id="fromUnit">${buildOptions('GB')}</select>
  </div>
  <button class="conv-swap" onclick="const a=$('#fromUnit').value;$('#fromUnit').value=$('#toUnit').value;$('#toUnit').value=a;doConvert()" title="Swap">${t('swap')}</button>
  <div style="display:flex;flex-direction:column;gap:6px">
    <label style="font-size:.8em;opacity:.7">${t('outputVal')}</label>
    <input type="text" id="toVal" readonly style="font-family:monospace">
    <select id="toUnit">${buildOptions('MiB')}</select>
  </div>`;

document.getElementById('th-unit').textContent = t('unitCol');
document.getElementById('th-val').textContent = t('valCol');
document.getElementById('info').textContent = t('infoText');

$('#fromVal').addEventListener('input', doConvert);
$('#fromUnit').addEventListener('change', doConvert);
$('#toUnit').addEventListener('change', doConvert);

doConvert();

GZ.renderToolPage({
  category: 'convert',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📏', href:'/convert/unit.html', name:'Unit Converter'},
    {icon:'🔢', href:'/convert/number-base.html', name:'Number Base'},
    {icon:'🖼️', href:'/calc/image-file-size.html', name:'Image File Size'},
    {icon:'🎨', href:'/color/hex-rgb.html', name:'HEX ↔ RGB'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
