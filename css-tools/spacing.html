<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is the difference between padding and margin in CSS?", "acceptedAnswer": {"@type": "Answer", "text": "Padding is the space inside an element, between its content and its border. Margin is the space outside an element, between its border and neighboring elements. Padding adds to the element's total size (unless box-sizing: border-box is set), while margin pushes other elements away."}}, {"@type": "Question", "name": "What is the CSS shorthand order for padding and margin?", "acceptedAnswer": {"@type": "Answer", "text": "The shorthand follows a clockwise order starting from the top: top, right, bottom, left. With one value all sides are equal; two values are vertical, horizontal; three values are top, horizontal, bottom; four values are top, right, bottom, left. For example: margin: 10px 20px 10px 20px;"}}, {"@type": "Question", "name": "Should I use px, rem, em or % for spacing?", "acceptedAnswer": {"@type": "Answer", "text": "Use rem for spacing that should scale consistently with the root font size (most layout spacing). Use em for spacing relative to the element's own font size (component-internal spacing). Use px for fixed sizes like borders. Use % for fluid layouts where spacing depends on the parent's size."}}, {"@type": "Question", "name": "How do negative margins work?", "acceptedAnswer": {"@type": "Answer", "text": "Negative margins pull an element or its neighbors closer, overlapping content. They are useful for fine-tuning layouts, pulling elements outside their container, or creating overlapping effects. Use them carefully because they can cause overflow or overlap unintended content."}}]}</script>

<script>
GZI18n.register({
  en: {
    toolTitle: 'CSS Padding & Margin Generator',
    toolDesc: 'Generate CSS padding and margin visually with a live box-model preview. Set individual sides or use shorthand, switch between px, rem, em and %. Copy production-ready CSS instantly.',
    modePadding: 'Padding',
    modeMargin: 'Margin',
    modeBoth: 'Both',
    lblControls: 'Controls',
    lblUnit: 'Unit',
    lblBase: 'Root font size (rem base)',
    lblPreview: 'Box model preview',
    lblOutput: 'Generated CSS',
    copy: 'Copy CSS',
    reset: 'Reset',
    marginLabel: 'margin',
    paddingLabel: 'padding',
    contentText: 'Content',
    top: 'Top', right: 'Right', bottom: 'Bottom', left: 'Left',
    allSides: 'All sides (linked)',
    step1: 'Choose Padding, Margin, or Both mode at the top',
    step2: 'Pick a unit (px, rem, em or %) and the root font size for rem',
    step3: 'Drag each side slider or toggle "All sides" for uniform spacing',
    step4: 'Copy the generated CSS into your stylesheet',
  },
  zh: {
    toolTitle: 'CSS Padding & Margin 生成器',
    toolDesc: '可视化生成 CSS padding 和 margin，实时盒模型预览。支持单边或简写、px / rem / em / % 单位切换。一键复制生产可用 CSS。',
    modePadding: 'Padding',
    modeMargin: 'Margin',
    modeBoth: '两者',
    lblControls: '控件',
    lblUnit: '单位',
    lblBase: '根字号（rem 基准）',
    lblPreview: '盒模型预览',
    lblOutput: '生成的 CSS',
    copy: '复制 CSS',
    reset: '重置',
    marginLabel: 'margin',
    paddingLabel: 'padding',
    contentText: '内容',
    top: '上', right: '右', bottom: '下', left: '左',
    allSides: '四边联动',
    step1: '在顶部选择 Padding、Margin 或两者模式',
    step2: '选择单位（px、rem、em 或 %）以及 rem 的根字号',
    step3: '拖动各边滑块，或开启「四边联动」统一间距',
    step4: '复制生成的 CSS 到你的样式表',
  }
});

const { $, copyText, t } = GZ;
const SIDES = ['top','right','bottom','left'];

const state = {
  mode: 'both',        // padding | margin | both
  unit: 'px',
  base: 16,
  linked: { padding: true, margin: true },
  padding: { top: 24, right: 32, bottom: 24, left: 32 },
  margin: { top: 16, right: 0, bottom: 16, left: 0 },
};

function unitToPx(v) {
  if (state.unit === 'rem') return v * state.base;
  if (state.unit === 'em') return v * 16; // assume 16px em context
  if (state.unit === '%') return v * 2; // visual scale for % 
  return v;
}

function fmtVal(v) {
  if (state.unit === '%') return v + '%';
  if (state.unit === 'rem') return (v / state.base).toFixed(3).replace(/\.?0+$/,'') + 'rem';
  if (state.unit === 'em') return (v / 16).toFixed(3).replace(/\.?0+$/,'') + 'em';
  return v + 'px';
}

function buildSides() {
  const show = state.mode === 'both' ? ['padding','margin'] : [state.mode];
  let html = '';
  show.forEach(kind => {
    html += `<div style="margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border)">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <strong style="font-size:.85em;text-transform:capitalize;color:var(--gz-accent)">${kind}</strong>
        <label style="font-size:.72em;display:flex;align-items:center;gap:4px;cursor:pointer;color:var(--text2)">
          <input type="checkbox" id="link_${kind}" ${state.linked[kind]?'checked':''} onchange="state.linked['${kind}']=this.checked;buildSides();update()" style="accent-color:var(--gz-accent)">
          ${t('allSides')}
        </label>
      </div>`;
    if (state.linked[kind]) {
      const all = state[kind].top;
      html += `<div class="sp-field">
        <label><span>${t('allSides')}</span><span class="val" id="v_${kind}_all">${fmtVal(all)}</span></label>
        <input type="range" id="r_${kind}_all" min="0" max="120" value="${all}" oninput="setAll('${kind}',+this.value)">
      </div>`;
    } else {
      html += '<div class="sp-sides">';
      SIDES.forEach(s => {
        html += `<div class="sp-field">
          <label><span>${t(s)}</span><span class="val" id="v_${kind}_${s}">${fmtVal(state[kind][s])}</span></label>
          <input type="range" id="r_${kind}_${s}" min="0" max="120" value="${state[kind][s]}" oninput="state['${kind}']['${s}']=+this.value;update()">
        </div>`;
      });
      html += '</div>';
    }
    html += '</div>';
  });
  $('#sidesBox').innerHTML = html;
}

window.setAll = function(kind, v) {
  SIDES.forEach(s => state[kind][s] = v);
  buildSides(); update();
};

function update() {
  $('#baseV').textContent = state.base;
  $('#unitVal').textContent = state.unit;
  // preview
  const p = state.padding, m = state.margin;
  const pPx = SIDES.map(s => unitToPx(p[s]));
  const mPx = SIDES.map(s => unitToPx(m[s]));
  const pe = $('#paddingEl'), me = $('#marginEl');
  pe.style.padding = pPx.map(v=>v+'px').join(' ');
  me.style.margin = mPx.map(v=>v+'px').join(' ');
  $('#marginLabel').textContent = `margin: ${fmtVal(m.top)} ${fmtVal(m.right)} ${fmtVal(m.bottom)} ${fmtVal(m.left)}`;
  $('#paddingLabel').textContent = `padding: ${fmtVal(p.top)} ${fmtVal(p.right)} ${fmtVal(p.bottom)} ${fmtVal(p.left)}`;
  $('#contentEl').textContent = t('contentText');

  // CSS output
  let out = `<span class="sel">.box</span> {\n`;
  if (state.mode === 'padding' || state.mode === 'both') out += `  <span class="prop">padding</span>: <span class="val">${shorthand(p)}</span>;\n`;
  if (state.mode === 'margin' || state.mode === 'both') out += `  <span class="prop">margin</span>: <span class="val">${shorthand(m)}</span>;\n`;
  out += `  <span class="com">/* box-sizing: border-box recommended */</span>\n}`;
  $('#output').innerHTML = out;
}

function shorthand(o) {
  const a = [o.top, o.right, o.bottom, o.left];
  if (a[0]===a[1] && a[1]===a[2] && a[2]===a[3]) return fmtVal(a[0]);
  if (a[0]===a[2] && a[1]===a[3]) return `${fmtVal(a[0])} ${fmtVal(a[1])}`;
  if (a[1]===a[3]) return `${fmtVal(a[0])} ${fmtVal(a[1])} ${fmtVal(a[2])}`;
  return a.map(fmtVal).join(' ');
}

function buildToggles() {
  const modes = [['padding','modePadding'],['margin','modeMargin'],['both','modeBoth']];
  $('#modeToggle').innerHTML = modes.map(([k,key]) =>
    `<button class="gz-btn gz-btn-secondary ${state.mode===k?'active':''}" onclick="state.mode='${k}';buildToggles();buildSides();update()">${t(key)}</button>`).join('');
  const units = ['px','rem','em','%'];
  $('#unitToggle').innerHTML = units.map(u =>
    `<button class="gz-btn gz-btn-secondary ${state.unit===u?'active':''}" onclick="state.unit='${u}';buildSides();update()">${u}</button>`).join('');
  $('#unitVal').textContent = state.unit;
}

$('#baseSize').addEventListener('input', e => { state.base = +e.target.value; buildSides(); update(); });

const PRESETS = [
  {name:'Card', p:[24,32,24,32], m:[16,0,16,0]},
  {name:'Button', p:[10,20,10,20], m:[8,8,8,8]},
  {name:'Section', p:[80,0,80,0], m:[0,0,0,0]},
  {name:'Tight', p:[8,12,8,12], m:[4,0,4,0]},
  {name:'Hero', p:[120,24,120,24], m:[0,0,40,0]},
];
$('#presets').innerHTML = PRESETS.map(p =>
  `<button class="gz-btn gz-btn-secondary" onclick="applyPreset('${p.name}')">${p.name}</button>`).join('');

window.applyPreset = function(name) {
  const p = PRESETS.find(x=>x.name===name);
  if (!p) return;
  state.linked = {padding:false, margin:false};
  ['top','right','bottom','left'].forEach((s,i)=>{ state.padding[s]=p.p[i]; state.margin[s]=p.m[i]; });
  buildSides(); update();
};

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="applyPreset('Card')">${t('reset')}</button>`;

$('#lblControls').textContent = t('lblControls');
$('#lblUnit').textContent = t('lblUnit');
$('#lblBase').textContent = t('lblBase');
$('#lblPreview').textContent = t('lblPreview');
$('#lblOutput').textContent = t('lblOutput');

buildToggles(); buildSides(); update();

GZ.renderToolPage({
  category: 'css',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📦', href:'/css-tools/box-model.html', name:'Box Model'},
    {icon:'📐', href:'/css-tools/clamp-generator.html', name:'Clamp()'},
    {icon:'🪪', href:'/css-tools/theme-tokens.html', name:'Theme Tokens'},
    {icon:'📏', href:'/css-tools/line-height.html', name:'Line Height'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
