const { $, copyText, t } = GZ;

function spinOnce(str) {
  let out = '', i = 0;
  const n = str.length;
  while (i < n) {
    const ch = str[i];
    if (ch === '{') {
      let depth = 1, j = i + 1, seg = '';
      while (j < n && depth > 0) {
        const c2 = str[j];
        if (c2 === '{') depth++;
        else if (c2 === '}') { depth--; if (depth === 0) break; }
        seg += c2; j++;
      }
      if (depth !== 0) throw new Error('braces');
      const opts = splitPipes(seg).map(s => spinOnce(s));
      out += opts[Math.floor(Math.random() * opts.length)];
      i = j + 1;
    } else {
      out += ch; i++;
    }
  }
  return out;
}

function splitPipes(seg) {
  const res = []; let depth = 0, cur = '';
  for (const ch of seg) {
    if (ch === '{') depth++;
    else if (ch === '}') depth--;
    if (ch === '|' && depth === 0) { res.push(cur); cur = ''; }
    else cur += ch;
  }
  res.push(cur);
  return res;
}

function countCombinations(str) {
  let i = 0; const n = str.length; let total = 1; let hasGroup = false;
  while (i < n) {
    if (str[i] === '{') {
      let depth = 1, j = i + 1, seg = '';
      while (j < n && depth > 0) {
        const c2 = str[j];
        if (c2 === '{') depth++;
        else if (c2 === '}') { depth--; if (depth === 0) break; }
        seg += c2; j++;
      }
      if (depth !== 0) return -1;
      const opts = splitPipes(seg);
      let sub = 0;
      for (const o of opts) { const c = countCombinations(o); sub += c < 0 ? 1 : c; }
      total *= (sub || 1); hasGroup = true; i = j + 1;
    } else i++;
  }
  return total;
}

function doSpin() {
  const inp = $('#input').value;
  if (!inp.trim()) { $('#output').textContent = ''; $('#status').textContent = ''; return; }
  const want = Math.max(1, Math.min(1000, parseInt($('#cnt').value) || 10));
  const unique = $('#uniq').checked;
  let results = [];
  try {
    const max = unique ? Math.min(want * 50, 20000) : want;
    const seen = new Set();
    for (let k = 0; k < max; k++) {
      const r = spinOnce(inp);
      if (unique) { if (seen.has(r)) continue; seen.add(r); results.push(r); if (results.length >= want) break; }
      else results.push(r);
    }
  } catch (e) {
    $('#output').innerHTML = `<span class="err">${t('invalid')}</span>`;
    $('#status').textContent = '';
    return;
  }
  $('#output').textContent = results.join('\n');
  const comb = countCombinations(inp);
  $('#status').textContent = t('generated').replace('{n}', results.length) + (comb > 0 ? ' · ' + t('statCombs').replace('{c}', comb.toLocaleString()) : '');
}

function loadExample() {
  $('#input').value = '{Hello|Hi|Hey} {there|friend}, {check out|discover|explore} our {amazing|awesome|powerful} {free|online} {tools|app|service} — {no signup|required|100% free}!';
  doSpin();
}

function doClear() { $('#input').value = ''; $('#output').textContent = ''; $('#status').textContent = ''; }

$('#toolbar').innerHTML = `
