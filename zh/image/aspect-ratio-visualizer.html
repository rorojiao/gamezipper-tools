<script type="application/ld+json">{"@context":"https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is an aspect ratio?", "acceptedAnswer": {"@type": "Answer", "text": "Aspect ratio is the proportional relationship between an image or screen's width and height, written as W:H. Common ones are 16:9 (widescreen video, TVs), 4:3 (older TVs, iPads), 1:1 (Instagram square), 9:16 (vertical video, TikTok) and 21:9 (ultrawide cinema). The ratio determines the shape regardless of actual pixel size."}}, {"@type": "Question", "name": "How do I calculate aspect ratio from pixels?", "acceptedAnswer": {"@type": "Answer", "text": "Divide width and height by their greatest common divisor (GCD). For 1920×1080: GCD is 120, so the ratio is 16:9. For 1080×1920 (portrait): GCD is 120, so 9:16. Many calculators and tools (like this one) automate the math instantly."}}, {"@type": "Question", "name": "Which aspect ratio is best for social media?", "acceptedAnswer": {"@type": "Answer", "text": "It depends on the platform: Instagram feed posts use 1:1 or 4:5, Stories/Reels use 9:16, Twitter/X uses 16:9 for images, LinkedIn prefers 1.91:1, YouTube uses 16:9 for landscape and 9:16 for Shorts. Pick the platform's native ratio to avoid cropping."}}, {"@type": "Question", "name": "What is the difference between 16:9 and 4:3?", "acceptedAnswer": {"@type": "Answer", "text": "16:9 is widescreen — used by modern TVs, monitors, YouTube and HD video. 4:3 is the older standard — used by traditional TVs, iPad (some modes), some camera formats and older computer monitors. 16:9 is about 78% wider than tall; 4:3 is 33% wider than tall."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>

    <h3 id="lbl-presets" style="margin:6px 0 4px;font-size:.95em">Common Presets</h3>
    <div class="ar-presets" id="presets"></div>

    <h3 id="lbl-custom" style="margin:14px 0 4px;font-size:.95em">Custom Dimensions</h3>
    <div class="ar-custom">
      <label><span id="lbl-w">Width</span>
        <input type="number" id="cw" value="16" min="1">
      </label>
      <span style="color:var(--text2)">×</span>
      <label><span id="lbl-h">Height</span>
        <input type="number" id="ch" value="9" min="1">
      </label>
      <label><span id="lbl-size">Display size</span>
        <input type="number" id="cs" value="400" min="50" max="1200" style="width:90px">
        <span>px</span>
      </label>
      <button class="gz-btn" id="applyCustom" style="padding:6px 14px">Apply</button>
    </div>

    <div class="ar-canvas-area" id="canvas">
      <div class="ar-shape" id="shape">
        <div class="lbl" id="shapeLabel">16:9</div>
      </div>
    </div>

    <div class="ar-info" id="info"></div>

    <h3 id="lbl-compare" style="margin:18px 0 4px;font-size:.95em">Side-by-Side Comparison</h3>
    <div class="ar-compare" id="compare"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>

</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Aspect Ratio Visualizer',
    toolDesc: 'See and compare common aspect ratios at any size. Visualize 16:9, 4:3, 1:1, 21:9, 9:16, custom ratios and more — perfect for design, photo, video and social media work.',
    lblPresets: 'Common Presets', lblCustom: 'Custom Dimensions',
    lblW: 'Width', lblH: 'Height', lblSize: 'Display size',
    lblCompare: 'Side-by-Side Comparison',
    step1: 'Pick a preset or enter custom width and height values',
    step2: 'Adjust the display size slider to see the shape at any pixel size',
    step3: 'Use the comparison grid to see multiple ratios at once',
    step4: 'Click Copy to copy the exact pixel dimensions to clipboard',
  },
  zh: {
    toolTitle: '宽高比可视化工具',
    toolDesc: '可视化并比较常用宽高比。支持 16:9、4:3、1:1、21:9、9:16、自定义比例 — 适用于设计、摄影、视频和社交媒体。',
    lblPresets: '常用预设', lblCustom: '自定义尺寸',
    lblW: '宽度', lblH: '高度', lblSize: '显示尺寸',
    lblCompare: '并排对比',
    step1: '选择预设或输入自定义宽高值',
    step2: '调整显示尺寸滑块，查看不同像素大小下的形状',
    step3: '使用对比网格同时查看多个宽高比',
    step4: '点击「复制」复制精确像素尺寸到剪贴板',
  }
});

const { $, t } = GZ;

const PRESETS = [
  { name: '1:1 Square', w: 1, h: 1, desc: 'Instagram, profile pics' },
  { name: '4:3 Standard', w: 4, h: 3, desc: 'iPad, older monitors' },
  { name: '3:2 Photo', w: 3, h: 2, desc: 'DSLR cameras, 35mm film' },
  { name: '16:9 Widescreen', w: 16, h: 9, desc: 'HD video, YouTube, TVs' },
  { name: '16:10', w: 16, h: 10, desc: 'MacBook, older monitors' },
  { name: '5:4', w: 5, h: 4, desc: 'Large format cameras' },
  { name: '21:9 Ultrawide', w: 21, h: 9, desc: 'Cinema, ultrawide monitors' },
  { name: '2:3 Portrait', w: 2, h: 3, desc: 'Print 4×6 photos' },
  { name: '9:16 Vertical', w: 9, h: 16, desc: 'TikTok, Stories, Reels' },
  { name: '4:5 Portrait', w: 4, h: 5, desc: 'Instagram feed max' },
  { name: '2:1 Banner', w: 2, h: 1, desc: 'Twitter header, banners' },
  { name: '3:1 Cinema', w: 3, h: 1, desc: 'Wide banners, covers' },
];

let current = { w: 16, h: 9, name: '16:9' };
let displaySize = 400;

function gcd(a, b) { return b === 0 ? a : gcd(b, a % b); }
function ratioString(w, h) {
  if (w === h) return '1:1';
  const g = gcd(w, h);
  if (g > 1 && w % g === 0 && h % g === 0) {
    return (w / g) + ':' + (h / g);
  }
  return (Math.round(w * 100) / 100) + ':' + (Math.round(h * 100) / 100);
}

function applyRatio(w, h, name) {
  current = { w, h, name: name || ratioString(w, h) };
  render();
}

function render() {
  const shape = $('#shape');
  const targetMaxW = Math.min(displaySize, $('#canvas').clientWidth - 40);
  const targetMaxH = Math.min(displaySize * 0.7, $('#canvas').clientHeight - 40);
  let pw, ph;
  // Fit longest side to max dimension
  if (current.w >= current.h) {
    pw = targetMaxW;
    ph = pw * current.h / current.w;
    if (ph > targetMaxH) {
      ph = targetMaxH;
      pw = ph * current.w / current.h;
    }
  } else {
    ph = targetMaxH;
    pw = ph * current.w / current.h;
    if (pw > targetMaxW) {
      pw = targetMaxW;
      ph = pw * current.h / current.w;
    }
  }
  shape.style.width = pw + 'px';
  shape.style.height = ph + 'px';
  shape.style.maxWidth = '90%';
  shape.style.maxHeight = '90%';
  $('#shapeLabel').textContent = current.name;

  // Info cells
  const realW = current.w, realH = current.h;
  const px1080W = Math.round(1080 * realW / realH);
  const px720W = Math.round(720 * realW / realH);
  const px4kW = Math.round(3840 * realW / realH);
  $('#info').innerHTML = `
    <div class="ar-info-cell"><div class="k">Ratio</div><div class="v">${current.name}</div></div>
    <div class="ar-info-cell"><div class="k">Decimal</div><div class="v">${(realW/realH).toFixed(4)}</div></div>
    <div class="ar-info-cell"><div class="k">At 1080px H</div><div class="v">${px1080W}×1080</div></div>
    <div class="ar-info-cell"><div class="k">At 720px H</div><div class="v">${px720W}×720</div></div>
    <div class="ar-info-cell"><div class="k">At 4K</div><div class="v">${px4kW}×2160</div></div>
    <div class="ar-info-cell"><div class="k">% Wider</div><div class="v">${Math.round((realW/realH - 1) * 100)}%</div></div>
  `;

  // Comparison
  const compareEl = $('#compare');
  compareEl.innerHTML = '';
  PRESETS.forEach(p => {
    const div = document.createElement('div');
    div.className = 'ar-compare-item';
    const isActive = (p.w === current.w && p.h === current.h);
    let cvW = 100, cvH = 100;
    if (p.w >= p.h) { cvW = 160; cvH = 160 * p.h / p.w; }
    else { cvH = 120; cvW = 120 * p.w / p.h; if (cvW > 180) cvW = 180; }
    div.innerHTML = `
      <h4>${p.name}</h4>
      <div class="visual" style="width:${cvW}px;height:${cvH}px;${isActive?'box-shadow:0 0 0 2px var(--accent)':''}"></div>
      <div class="meta">${p.w}:${p.h} · ${p.desc}</div>
    `;
    div.style.cursor = 'pointer';
    div.addEventListener('click', () => applyRatio(p.w, p.h, p.name));
    compareEl.appendChild(div);
  });

  // Active preset highlight
  document.querySelectorAll('.ar-preset').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.ar-preset').forEach(el => {
    const w = +el.dataset.w, h = +el.dataset.h;
    if (w === current.w && h === current.h) el.classList.add('active');
  });
}

const presetContainer = $('#presets');
PRESETS.forEach(p => {
  const div = document.createElement('div');
  div.className = 'ar-preset';
  div.dataset.w = p.w;
  div.dataset.h = p.h;
  let vw = 50, vh = 50;
  if (p.w >= p.h) { vw = 60; vh = 60 * p.h / p.w; }
  else { vh = 50; vw = 50 * p.w / p.h; if (vw > 60) vw = 60; }
  div.innerHTML = `
    <div class="visual" style="width:${vw}px;height:${vh}px"></div>
    <div class="name">${p.name}</div>
    <div class="dim">${p.w}:${p.h}</div>
  `;
  div.addEventListener('click', () => applyRatio(p.w, p.h, p.name));
  presetContainer.appendChild(div);
});

$('#applyCustom').addEventListener('click', () => {
  const w = +$('#cw').value || 1, h = +$('#ch').value || 1;
  applyRatio(w, h);
});
$('#cs').addEventListener('input', e => {
  displaySize = +e.target.value || 200;
  render();
});

window.addEventListener('resize', render);

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="GZ.copyText(current.w + 'x' + current.h + ' (' + current.name + ')')">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="applyRatio(16,9,'16:9')">${t('clear')}</button>`;

GZ.renderToolPage({
  category: 'image',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1', 'step2', 'step3', 'step4'],
  related: [
    {icon: '📐', href: '/calc/aspect-ratio.html', name: 'Aspect Ratio Calculator'},
    {icon: '📱', href: '/image/social-media-resizer.html', name: 'Social Media Resizer'},
    {icon: '🖼️', href: '/image/resizer.html', name: 'Image Resizer'},
    {icon: '🖥️', href: '/calc/dpi-calculator.html', name: 'DPI / PPI Calculator'},
  ]
});
render();
</script>
<script src="/tools-result-rec.js" defer></script>
</body></html>
