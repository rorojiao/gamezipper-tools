const { $, t } = GZ;

const MECH_DOCS = {
  ip4: {en:'Allow mail from this IPv4 network.', zh:'允许来自该 IPv4 网络的邮件。'},
  ip6: {en:'Allow mail from this IPv6 network.', zh:'允许来自该 IPv6 网络的邮件。'},
  a:   {en:'Allow the A/AAAA records of the domain (or the host given).', zh:'允许该域名（或指定主机）的 A/AAAA 记录。'},
  mx:  {en:'Allow the MX servers of the domain (or the host given).', zh:'允许该域名（或指定主机）的 MX 服务器。'},
  include:{en:'Include the SPF record of another domain.', zh:'引入另一个域名的 SPF 记录。'},
  exists:{en:'Allow if the given name resolves to any address.', zh:'若指定名称能解析出任意地址则允许。'},
  ptr: {en:'Reverse-DNS check. Deprecated and slow.', zh:'反向 DNS 检查。已弃用且缓慢。'},
  all: {en:'Default rule for everything else.', zh:'对其他所有情况的默认规则。'},
  redirect:{en:'Replace this SPF record with another domain\'s.', zh:'用另一个域名的 SPF 记录替换当前记录。'},
  exp: {en:'Explanation string shown on failure.', zh:'失败时显示的解释字符串。'},
};

// qualifier mapping for the all mechanism
function qualClass(q){
  if(q === '+') return 'pass';
  if(q === '-') return 'fail';
  if(q === '~') return 'softfail';
  return 'neutral'; // ? or none
}

async function fetchTxt(name){
  const res = await fetch(`https://cloudflare-dns.com/dns-query?name=${encodeURIComponent(name)}&type=TXT`, {
    headers: { 'accept':'application/dns-json' }
  });
  if(!res.ok) throw new Error('http '+res.status);
  const data = await res.json();
  const answers = (data.Answer || []).filter(a => a.type === 16);
  return answers.map(a => {
    let v = a.data;
    if(v.startsWith('"')) v = v.slice(1);
    if(v.endsWith('"')) v = v.slice(0,-1);
    return v;
  });
}

function esc(s){ return String(s).replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

function parseSpf(record){
  // split on whitespace, skip v=
  const tokens = record.trim().split(/\s+/).filter(Boolean);
  const mechs = [];
  let lookups = 0;
  for(let i=0;i<tokens.length;i++){
    const tok = tokens[i];
    if(/^v=spf/i.test(tok)) continue;
    // qualifier prefix
    let q = '';
    let rest = tok;
    if(/^[+\-~?]/.test(rest)){ q = rest[0]; rest = rest.slice(1); }
    // split mechanism name and value
    const colon = rest.indexOf(':');
    const eq = rest.indexOf('=');
    let name, val='';
    if(colon >= 0){ name = rest.slice(0,colon).toLowerCase(); val = rest.slice(colon+1); }
    else if(eq >= 0 && (rest.slice(0,eq)==='redirect'||rest.slice(0,eq)==='exp')){ name = rest.slice(0,eq).toLowerCase(); val = rest.slice(eq+1); }
    else { name = rest.toLowerCase(); }
    if(name === 'include' || name === 'a' || name === 'mx' || name === 'exists' || name === 'ptr') lookups++;
    if(name === 'include' && !q) q = '+'; // implicit pass for include
    mechs.push({ q, name, val, raw: tok });
  }
  return { mechs, lookups };
}

async function doCheck(){
  const domain = $('#domain').value.trim().toLowerCase().replace(/^https?:\/\//,'').replace(/\/.*$/,'').replace(/^www\./,'');
  if(!domain){ $('#status').textContent = t('needDomain'); $('#result').innerHTML=''; return; }
  const btn = $('#checkBtn');
  btn.classList.add('busy');
  $('#status').innerHTML = `<span style="color:var(--text3)">${t('querying')} <strong>${esc(domain)}</strong> …</span>`;
  $('#result').innerHTML = '';
  try{
    const records = (await fetchTxt(domain)).filter(r => /^v=spf1/i.test(r));
    if(!records.length){
      $('#status').innerHTML = `<span class="score none">${t('scoreNone')}</span>`;
      $('#result').innerHTML = `
        <div class="recs">
          <div class="rec bad">Publish a TXT record on <strong>${esc(domain)}</strong> starting with <code>v=spf1</code> listing your authorized senders.</div>
          <div class="rec warn">End the record with <code>~all</code> (soft fail) at first, then tighten to <code>-all</code> once you have monitored your mail flow.</div>
        </div>`;
      btn.classList.remove('busy');
      return;
    }
    const raw = records[0];
    const { mechs, lookups } = parseSpf(raw);
    const lang = ()=> GZI18n && window.__gzLang === 'zh' ? 'zh' : 'en';

    // find the all mechanism
    const allMech = mechs.find(m => m.name === 'all');
    let scoreClass, scoreText;
    if(allMech){
      const qc = qualClass(allMech.q);
      if(qc === 'fail'){ scoreClass='good'; scoreText=t('scoreGood'); }
      else if(qc === 'softfail'){ scoreClass='ok'; scoreText=t('scoreOk'); }
      else if(qc === 'pass'){ scoreClass='bad'; scoreText=t('scoreBad'); }
      else { scoreClass='bad'; scoreText=t('scoreBad'); }
    } else {
      scoreClass='ok'; scoreText=t('scoreOk');
    }

    // recs
    const recs = [];
    if(!allMech) recs.push({c:'warn', t:'No <code>all</code> mechanism. The default is <code>?all</code> (neutral). Add an explicit <code>-all</code> or <code>~all</code> at the end.'});
    else if(allMech.q === '+') recs.push({c:'bad', t:'<code>+all</code> allows any sender — this defeats SPF. Switch to <code>-all</code> (hard fail).'});
    else if(allMech.q === '~') recs.push({c:'warn', t:'<code>~all</code> is a soft fail. After monitoring your mail for a few weeks, tighten to <code>-all</code>.'});
    else if(allMech.q === '?') recs.push({c:'warn', t:'<code>?all</code> is neutral and does nothing. Use <code>-all</code> to enforce.'});
    if(lookups > 10) recs.push({c:'bad', t:`SPF uses <strong>${lookups}</strong> DNS lookups — over the RFC 7208 limit of 10. Receivers will return PermError. Flatten nested <code>include</code> chains with an SPF flattening service (SPF Macro / DMARC digest).`});
    else if(lookups >= 8) recs.push({c:'warn', t:`${lookups} of 10 DNS lookups used — close to the limit. Avoid adding more <code>include</code> records.`});
    if(mechs.some(m => m.name === 'ptr')) recs.push({c:'warn', t:'The <code>ptr</code> mechanism is deprecated, slow and unreliable. Remove it.'});
    if(records.length > 1) recs.push({c:'bad', t:t('multiRecords')});
    if(allMech && allMech.q === '-' && lookups <= 10) recs.push({c:'good', t:'SPF is enforced with a hard fail and within the lookup budget.'});

    const lang2 = GZI18n && window.__gzLang === 'zh' ? 'zh' : 'en';
    const mechCards = mechs.map(m=>{
      const q = m.q || (m.name === 'all' ? '?' : '+');
      const cls = m.name === 'all' ? qualClass(m.q) : 'info';
      const doc = MECH_DOCS[m.name] ? MECH_DOCS[m.name][lang2] : '';
      return `<div class="mech">
        <span class="q ${cls}">${esc(q)}</span>
        <div class="body">
          <strong>${esc(m.name)}</strong>${m.val?': '+esc(m.val):''}
          ${doc?`<div class="desc">${doc}</div>`:''}
        </div>
      </div>`;
    }).join('');

    const lookupPct = Math.min(100, lookups*10);
    const lookupColor = lookups > 10 ? 'var(--gz-accent)' : lookups >= 8 ? '#ffc107' : '#2ecc71';

    $('#status').innerHTML = `<span class="score ${scoreClass}">${scoreText}</span>`;
    $('#result').innerHTML = `
      <div class="raw"><span class="k">${t('found')} @ ${esc(domain)}</span>${esc(raw)}</div>
      <div class="lookup-box">
        <span style="font-size:.82rem;color:var(--text2)">${t('lookupCount')}</span>
        <div class="lookup-bar"><div style="width:${lookupPct}%;background:${lookupColor}"></div></div>
        <strong style="color:${lookupColor}">${lookups} / 10</strong>
      </div>
      ${lookups>10?`<div style="margin-top:6px;color:var(--gz-accent);font-size:.85rem;font-weight:700">⚠ ${t('lookupOver')}</div>`:''}
      <h3 style="margin:18px 0 0;font-size:1rem">${t('mechanisms')}</h3>
      <div class="mech-list">${mechCards}</div>
      ${recs.length?`<h3 style="margin:18px 0 0;font-size:1rem">${t('recommendations')}</h3><div class="recs">${recs.map(r=>`<div class="rec ${r.c}">${r.t}</div>`).join('')}</div>`:''}`;
  }catch(e){
    $('#status').innerHTML = `<span style="color:var(--gz-accent)">✗ ${t('netError')} (${esc(e.message)})</span>`;
    $('#result').innerHTML='';
  }
  btn.classList.remove('busy');
}

function loadExample(){ $('#domain').value='github.com'; doCheck(); }

$('#domain').addEventListener('keydown', e=>{ if(e.key==='Enter') doCheck(); });
$('#checkBtn').onclick = doCheck;
$('#exampleBtn').onclick = loadExample;

$('#toolbar').innerHTML = '';
$('#checkBtn').textContent = t('check');
$('#exampleBtn').textContent = t('example');
