<script>
GZI18n.register({
  en: {
    toolTitle: 'Workout Planner',
    toolDesc: 'Build a personalized gym routine in seconds. Pick your goal, split and level — get ready-made exercises with sets, reps and rest.',
    generate: 'Generate Plan',
    print: 'Print / PDF',
    goal: 'Goal:', split: 'Split:', level: 'Level:',
    step1: 'Choose your goal (Strength, Muscle, Endurance or General Fitness)',
    step2: 'Pick a workout split (Full Body, Upper/Lower, Push/Pull/Legs or Bro Split)',
    step3: 'Select your experience level (Beginner, Intermediate or Advanced)',
    step4: 'Click Generate Plan and print your ready-to-use workout routine',
    goals: { strength: 'Strength', muscle: 'Muscle Gain', endurance: 'Endurance', general: 'General Fitness' },
    splits: { fullbody: 'Full Body (3d)', upperlower: 'Upper/Lower (4d)', ppl: 'Push/Pull/Legs (6d)', bro: 'Bro Split (5d)' },
    levels: { beginner: 'Beginner', intermediate: 'Intermediate', advanced: 'Advanced' },
    sets: 'sets', reps: 'reps', rest: 'rest',
  },
  zh: {
    toolTitle: '健身训练计划生成器',
    toolDesc: '几秒内生成个性化健身计划。选择目标、训练分割和等级 — 获得带组数、次数和休息的现成动作清单。',
    generate: '生成计划',
    print: '打印 / PDF',
    goal: '目标：', split: '分割：', level: '等级：',
    step1: '选择目标（力量、增肌、耐力或综合体能）',
    step2: '选择训练分割（全身、上/下肢、推/拉/腿或单肌群）',
    step3: '选择经验等级（初级、中级或高级）',
    step4: '点击「生成计划」并打印你的训练方案',
    goals: { strength: '力量', muscle: '增肌', endurance: '耐力', general: '综合体能' },
    splits: { fullbody: '全身 (3天)', upperlower: '上/下肢 (4天)', ppl: '推/拉/腿 (6天)', bro: '单肌群 (5天)' },
    levels: { beginner: '初级', intermediate: '中级', advanced: '高级' },
    sets: '组', reps: '次', rest: '休息',
  }
});

const { $, t } = GZ;
const lang = GZI18n.getLang();

// Exercise database (en/zh)
const EX = {
  squat: { en: 'Barbell Squat', zh: '杠铃深蹲', muscle: { en: 'Legs', zh: '腿部' } },
  bench: { en: 'Bench Press', zh: '卧推', muscle: { en: 'Chest', zh: '胸部' } },
  deadlift: { en: 'Deadlift', zh: '硬拉', muscle: { en: 'Back', zh: '背部' } },
  ohp: { en: 'Overhead Press', zh: '推举', muscle: { en: 'Shoulders', zh: '肩部' } },
  row: { en: 'Bent-Over Row', zh: '俯身划船', muscle: { en: 'Back', zh: '背部' } },
  pullup: { en: 'Pull-Ups', zh: '引体向上', muscle: { en: 'Back', zh: '背部' } },
  rdl: { en: 'Romanian Deadlift', zh: '罗马尼亚硬拉', muscle: { en: 'Hamstrings', zh: '腘绳肌' } },
  lunge: { en: 'Walking Lunges', zh: '箭步蹲', muscle: { en: 'Legs', zh: '腿部' } },
  legpress: { en: 'Leg Press', zh: '腿举', muscle: { en: 'Quads', zh: '股四头肌' } },
  legcurl: { en: 'Leg Curl', zh: '腿弯举', muscle: { en: 'Hamstrings', zh: '腘绳肌' } },
  calf: { en: 'Calf Raises', zh: '提踵', muscle: { en: 'Calves', zh: '小腿' } },
  inclinepress: { en: 'Incline Dumbbell Press', zh: '上斜哑铃推举', muscle: { en: 'Chest', zh: '胸部' } },
  dip: { en: 'Dips', zh: '双杠臂屈伸', muscle: { en: 'Chest/Triceps', zh: '胸/三头' } },
  fly: { en: 'Dumbbell Fly', zh: '哑铃飞鸟', muscle: { en: 'Chest', zh: '胸部' } },
  latpulldown: { en: 'Lat Pulldown', zh: '高位下拉', muscle: { en: 'Back', zh: '背部' } },
  facepull: { en: 'Face Pulls', zh: '面拉', muscle: { en: 'Rear Delts', zh: '后束' } },
  lateralraise: { en: 'Lateral Raises', zh: '侧平举', muscle: { en: 'Shoulders', zh: '肩部' } },
  curl: { en: 'Bicep Curls', zh: '二头弯举', muscle: { en: 'Biceps', zh: '二头肌' } },
  tricep: { en: 'Tricep Pushdowns', zh: '三头下压', muscle: { en: 'Triceps', zh: '三头肌' } },
  hammercurl: { en: 'Hammer Curls', zh: '锤式弯举', muscle: { en: 'Biceps', zh: '二头肌' } },
  skullcrusher: { en: 'Skull Crushers', zh: '仰卧臂屈伸', muscle: { en: 'Triceps', zh: '三头肌' } },
  plank: { en: 'Plank', zh: '平板支撑', muscle: { en: 'Core', zh: '核心' } },
  hipthrust: { en: 'Hip Thrusts', zh: '臀推', muscle: { en: 'Glutes', zh: '臀部' } },
  pushup: { en: 'Push-Ups', zh: '俯卧撑', muscle: { en: 'Chest', zh: '胸部' } },
};

const SPLITS = {
  fullbody: [
    { name: { en: 'Day 1 — Full Body A', zh: '第1天 — 全身 A' }, ex: ['squat','bench','row','plank'] },
    { name: { en: 'Day 2 — Full Body B', zh: '第2天 — 全身 B' }, ex: ['deadlift','ohp','pullup','lunge'] },
    { name: { en: 'Day 3 — Full Body C', zh: '第3天 — 全身 C' }, ex: ['legpress','inclinepress','latpulldown','calf'] },
  ],
  upperlower: [
    { name: { en: 'Day 1 — Upper A', zh: '第1天 — 上肢 A' }, ex: ['bench','row','ohp','curl','tricep'] },
    { name: { en: 'Day 2 — Lower A', zh: '第2天 — 下肢 A' }, ex: ['squat','rdl','legpress','calf','plank'] },
    { name: { en: 'Day 3 — Upper B', zh: '第3天 — 上肢 B' }, ex: ['inclinepress','pullup','lateralraise','hammercurl','skullcrusher'] },
    { name: { en: 'Day 4 — Lower B', zh: '第4天 — 下肢 B' }, ex: ['deadlift','legcurl','lunge','hipthrust','calf'] },
  ],
  ppl: [
    { name: { en: 'Day 1 — Push', zh: '第1天 — 推' }, ex: ['bench','ohp','inclinepress','tricep','lateralraise'] },
    { name: { en: 'Day 2 — Pull', zh: '第2天 — 拉' }, ex: ['deadlift','pullup','row','facepull','curl'] },
    { name: { en: 'Day 3 — Legs', zh: '第3天 — 腿' }, ex: ['squat','rdl','legpress','legcurl','calf'] },
    { name: { en: 'Day 4 — Push', zh: '第4天 — 推' }, ex: ['bench','ohp','dip','skullcrusher','lateralraise'] },
    { name: { en: 'Day 5 — Pull', zh: '第5天 — 拉' }, ex: ['latpulldown','row','facepull','hammercurl','plank'] },
    { name: { en: 'Day 6 — Legs', zh: '第6天 — 腿' }, ex: ['deadlift','hipthrust','lunge','legcurl','calf'] },
  ],
  bro: [
    { name: { en: 'Day 1 — Chest', zh: '第1天 — 胸' }, ex: ['bench','inclinepress','fly','dip','pushup'] },
    { name: { en: 'Day 2 — Back', zh: '第2天 — 背' }, ex: ['deadlift','pullup','row','latpulldown','facepull'] },
    { name: { en: 'Day 3 — Legs', zh: '第3天 — 腿' }, ex: ['squat','rdl','legpress','legcurl','calf'] },
    { name: { en: 'Day 4 — Shoulders', zh: '第4天 — 肩' }, ex: ['ohp','lateralraise','facepull','plank'] },
    { name: { en: 'Day 5 — Arms', zh: '第5天 — 手臂' }, ex: ['curl','hammercurl','tricep','skullcrusher','dip'] },
  ],
};

function params(goal, level) {
  // returns { sets, reps, rest }
  const base = {
    strength: { sets: 5, reps: '3-5', rest: '3min' },
    muscle: { sets: 4, reps: '8-12', rest: '90s' },
    endurance: { sets: 3, reps: '15-20', rest: '45s' },
    general: { sets: 3, reps: '10-12', rest: '60s' },
  }[goal];
  if (level === 'beginner') return { sets: base.sets - 1 || 3, reps: base.reps, rest: base.rest };
  if (level === 'advanced') return { sets: base.sets + 1, reps: base.reps, rest: base.rest };
  return base;
}

function generate() {
  const goal = $('#sel-goal').value;
  const split = $('#sel-split').value;
  const level = $('#sel-level').value;
  const p = params(goal, level);
  const days = SPLITS[split];
  $('#wp-days').innerHTML = days.map(day => {
    const exHtml = day.ex.map(k => {
      const e = EX[k];
      return `<div class="wp-ex">
        <span class="wp-ex-name">${e[lang]}<span class="wp-muscle">${e.muscle[lang]}</span></span>
        <span class="wp-ex-meta">${p.sets} ${t('sets')} × ${p.reps} ${t('reps')} · ${t('rest')} ${p.rest}</span>
      </div>`;
    }).join('');
    return `<div class="wp-daycard"><h3>${day.name[lang]}</h3>${exHtml}</div>`;
  }).join('');
}

// Populate selects
$('#lbl-goal').textContent = t('goal');
$('#lbl-split').textContent = t('split');
$('#lbl-level').textContent = t('level');
$('#sel-goal').innerHTML = ['strength','muscle','endurance','general'].map(g => `<option value="${g}">${t('goals')[g]}</option>`).join('');
$('#sel-split').innerHTML = ['fullbody','upperlower','ppl','bro'].map(s => `<option value="${s}">${t('splits')[s]}</option>`).join('');
$('#sel-level').innerHTML = ['beginner','intermediate','advanced'].map(l => `<option value="${l}">${t('levels')[l]}</option>`).join('');
$('#btn-generate').textContent = t('generate');
$('#btn-generate').onclick = generate;

$('#toolbar').innerHTML = `<button class="gz-btn" onclick="window.print()">${t('print')}</button>`;

generate();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'💪', href:'/calc/one-rep-max.html', name:'1RM Calculator'},
    {icon:'🔥', href:'/calc/tdee-calculator.html', name:'TDEE Calculator'},
    {icon:'🥗', href:'/calc/macro-calculator.html', name:'Macro Calculator'},
    {icon:'⏱️', href:'/calc/tabata-timer.html', name:'Tabata Timer'},
  ]
});
</script>
<script src="/tools-result-rec.js?v=20260707v520" defer></script>
</body>
</html>
