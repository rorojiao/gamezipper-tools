<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "How does compound interest work?", "acceptedAnswer": {"@type": "Answer", "text": "Compound interest is interest calculated on both the initial principal and the accumulated interest from previous periods. The more frequently interest is compounded, the more you earn."}}, {"@type": "Question", "name": "What is the compound interest formula?", "acceptedAnswer": {"@type": "Answer", "text": "A = P(1 + r/n)^(nt), where P is principal, r is annual rate, n is compounding frequency per year, and t is years."}}, {"@type": "Question", "name": "How often should interest be compounded?", "acceptedAnswer": {"@type": "Answer", "text": "More frequent compounding yields more. Daily compounding earns slightly more than monthly, which earns more than annually."}}, {"@type": "Question", "name": "Is this calculator accurate for real investments?", "acceptedAnswer": {"@type": "Answer", "text": "This calculator provides mathematical projections based on fixed rates. Real investments may vary due to market fluctuations, fees, and taxes."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-input-group">
      <div><label id="lbl-principal"></label><input type="number" id="principal" value="10000" min="0" step="100"></div>
      <div><label id="lbl-rate"></label><input type="number" id="rate" value="5" min="0" max="100" step="0.1"></div>
      <div><label id="lbl-years"></label><input type="number" id="years" value="10" min="1" max="100" step="1"></div>
      <div><label id="lbl-compound"></label><select id="compound">
        <option value="1" id="opt-annually"></option>
        <option value="4" id="opt-quarterly"></option>
        <option value="12" id="opt-monthly" selected></option>
        <option value="365" id="opt-daily"></option>
      </select></div>
      <div><label id="lbl-monthly"></label><input type="number" id="monthly" value="0" min="0" step="50"></div>
    </div>
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="gz-result-box" id="results" style="display:none">
      <div class="gz-result-grid">
        <div class="gz-result-item"><div class="value" id="res-total"></div><div class="label" id="res-total-label"></div></div>
        <div class="gz-result-item"><div class="value" id="res-interest"></div><div class="label" id="res-interest-label"></div></div>
        <div class="gz-result-item"><div class="value" id="res-deposits"></div><div class="label" id="res-deposits-label"></div></div>
      </div>
      <div class="gz-chart-bar" id="chart"></div>
      <table class="gz-table" id="table">
        <thead><tr><th id="th-year"></th><th id="th-deposit"></th><th id="th-interest"></th><th id="th-balance"></th></tr></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Compound Interest Calculator',
    toolDesc: 'Calculate compound interest with flexible compounding periods. See total savings, interest earned and year-by-year growth chart.',
    principal: 'Initial Principal ($)',
    rate: 'Annual Interest Rate (%)',
    years: 'Time Period (Years)',
    compound: 'Compounding Frequency',
    monthlyAdd: 'Monthly Addition ($)',
    annually: 'Annually',
    quarterly: 'Quarterly',
    monthly: 'Monthly',
    daily: 'Daily',
    calculate: 'Calculate',
    clear: 'Clear',
    totalFuture: 'Future Value',
    totalInterest: 'Interest Earned',
    totalDeposits: 'Total Deposits',
    thYear: 'Year',
    thDeposit: 'Total Deposits',
    thInterest: 'Interest Earned',
    thBalance: 'Balance',
    step1: 'Enter your initial principal amount',
    step2: 'Set the annual interest rate and time period',
    step3: 'Choose compounding frequency (monthly, quarterly, etc.)',
    step4: 'Optionally add monthly contributions and click Calculate',
  },
  zh: {
    toolTitle: '复利计算器',
    toolDesc: '灵活计算复利收益，支持不同复利周期。查看总储蓄、利息收益和逐年增长图表。',
    principal: '初始本金（元）',
    rate: '年利率（%）',
    years: '投资期限（年）',
    compound: '复利频率',
    monthlyAdd: '每月追加（元）',
    annually: '每年',
    quarterly: '每季度',
    monthly: '每月',
    daily: '每天',
    calculate: '计算',
    clear: '清空',
    totalFuture: '未来总值',
    totalInterest: '利息收益',
    totalDeposits: '本金总额',
    thYear: '年份',
    thDeposit: '累计本金',
    thInterest: '累计利息',
    thBalance: '余额',
    step1: '输入初始本金金额',
    step2: '设置年利率和投资期限',
    step3: '选择复利计算频率（每月、每季度等）',
    step4: '可选设置每月追加投入，点击计算',
  }
});

const { $, t } = GZ;

$('#lbl-principal').textContent = t('principal');
$('#lbl-rate').textContent = t('rate');
$('#lbl-years').textContent = t('years');
$('#lbl-compound').textContent = t('compound');
$('#lbl-monthly').textContent = t('monthlyAdd');
$('#opt-annually').textContent = t('annually');
$('#opt-quarterly').textContent = t('quarterly');
$('#opt-monthly').textContent = t('monthly');
$('#opt-daily').textContent = t('daily');
$('#res-total-label').textContent = t('totalFuture');
$('#res-interest-label').textContent = t('totalInterest');
$('#res-deposits-label').textContent = t('totalDeposits');
$('#th-year').textContent = t('thYear');
$('#th-deposit').textContent = t('thDeposit');
$('#th-interest').textContent = t('thInterest');
$('#th-balance').textContent = t('thBalance');

function fmt(n) { return n.toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2}); }

function calculate() {
  const P = parseFloat($('#principal').value) || 0;
  const r = (parseFloat($('#rate').value) || 0) / 100;
  const years = parseInt($('#years').value) || 1;
  const n = parseInt($('#compound').value) || 12;
  const M = parseFloat($('#monthly').value) || 0;

  const rows = [];
  let balance = P;
  let totalDeposits = P;

  for (let y = 1; y <= years; y++) {
    const startBalance = balance;
    for (let m = 0; m < 12; m++) {
      balance += M;
      totalDeposits += M;
      const periodRate = r / n;
      const periodsPerMonth = n / 12;
      for (let p = 0; p < periodsPerMonth; p++) {
        balance *= (1 + periodRate);
      }
    }
    const interest = balance - startBalance - M * 12;
    rows.push({ year: y, deposits: totalDeposits, interest: balance - totalDeposits, balance: balance });
  }

  const totalInterest = balance - totalDeposits;
  $('#res-total').textContent = '$' + fmt(balance);
  $('#res-interest').textContent = '$' + fmt(totalInterest);
  $('#res-deposits').textContent = '$' + fmt(totalDeposits);
  $('#results').style.display = 'block';

  // Chart
  const maxBal = Math.max(...rows.map(r => r.balance));
  $('#chart').innerHTML = rows.map(r => {
    const h = (r.balance / maxBal * 100).toFixed(1);
    return `<div style="height:${h}%" data-tip="Y${r.year}: $${fmt(r.balance)}"></div>`;
  }).join('');

  // Table (show every year if <=20, else every 5)
  const step = years <= 20 ? 1 : Math.ceil(years / 20);
  $('#tbody').innerHTML = rows.filter((_, i) => (i + 1) % step === 0 || i === 0 || i === rows.length - 1)
    .map(r => `<tr><td>${r.year}</td><td>$${fmt(r.deposits)}</td><td>$${fmt(r.interest)}</td><td>$${fmt(r.balance)}</td></tr>`).join('');
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="calculate()">${t('calculate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="document.getElementById('results').style.display='none'">${t('clear')}</button>`;

calculate();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🏦', href:'/calc/loan-calculator.html', name:'Loan Calculator'},
    {icon:'🏷️', href:'/calc/discount-calculator.html', name:'Discount Calculator'},
    {icon:'📅', href:'/calc/date-calculator.html', name:'Date Calculator'},
    {icon:'⚖️', href:'/calc/bmi-calculator.html', name:'BMI Calculator'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
