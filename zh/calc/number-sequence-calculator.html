<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is an arithmetic sequence?", "acceptedAnswer": {"@type": "Answer", "text": "An arithmetic sequence adds a constant called the common difference d to each term. The nth term is a_n = a_1 + (n-1)d and the sum of the first n terms is S_n = n/2 * (2a_1 + (n-1)d)."}}, {"@type": "Question", "name": "What is a geometric sequence?", "acceptedAnswer": {"@type": "Answer", "text": "A geometric sequence multiplies each term by a constant ratio r. The nth term is a_n = a_1 * r^(n-1). If r is not 1, the sum of the first n terms is S_n = a_1 * (1 - r^n) / (1 - r)."}}, {"@type": "Question", "name": "What is the difference between a sequence and a series?", "acceptedAnswer": {"@type": "Answer", "text": "A sequence is an ordered list of numbers, while a series is the sum of the terms of a sequence. This calculator computes both the individual terms (the sequence) and the running total (the series sum)."}}, {"@type": "Question", "name": "Can this calculator handle geometric sequences with r between -1 and 1?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. It handles any common ratio including fractions, decimals and negative values. For an infinite geometric series with |r| less than 1 it will also show the closed-form limit S = a_1 / (1 - r)."}}]}</script>

<div class="gz-container">

  </div>
  <div class="gz-tool-area">

    <div class="field"><label id="lbl-a1">First term a₁ =</label><input id="a1" class="gz-input" type="number" step="any" value="2"></div>
    <div class="field"><label id="lbl-d">Common difference d =</label><input id="d" class="gz-input" type="number" step="any" value="3"></div>
    <div class="field"><label id="lbl-n">Number of terms n =</label><input id="n" class="gz-input" type="number" step="1" value="10"></div>
    <div class="gz-toolbar" id="toolbar"></div>

  </div>

</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Number Sequence & Series Calculator',
    toolDesc: 'Find the nth term, generate the full sequence and sum the first n terms of arithmetic and geometric sequences with step-by-step work. Free and browser-based.',
    arith: 'Arithmetic',
    geom: 'Geometric',
    lblA1: 'First term a₁ =',
    lblDA: 'Common difference d =',
    lblDG: 'Common ratio r =',
    lblN: 'Number of terms n =',
    calculate: 'Calculate',
    example: 'Example',
    clear: 'Clear',
    needN: 'n must be a positive integer.',
    nthTerm: 'nth term',
    sumNStr: 'Sum of first n terms',
    sequence: 'Sequence',
    infiniteSum: 'Infinite series sum',
    steps: 'Steps',
    formula: 'Formula',
    step1: 'Choose Arithmetic or Geometric mode',
    step2: 'Enter the first term a₁ and the common difference d (or ratio r)',
    step3: 'Set how many terms n you want to see',
    step4: 'Read the nth term, the full sequence, the sum and the formula steps',
  },
  zh: {
    toolTitle: '数列与级数计算器',
    toolDesc: '求第 n 项、生成完整数列并求等差/等比数列前 n 项和，附分步公式。免费、浏览器本地运行。',
    arith: '等差',
    geom: '等比',
    lblA1: '首项 a₁ =',
    lblDA: '公差 d =',
    lblDG: '公比 r =',
    lblN: '项数 n =',
    calculate: '计算',
    example: '示例',
    clear: '清除',
    needN: 'n 必须为正整数。',
    nthTerm: '第 n 项',
    sumNStr: '前 n 项和',
    sequence: '数列',
    infiniteSum: '无穷级数和',
    steps: '步骤',
    formula: '公式',
    step1: '选择等差或等比模式',
    step2: '输入首项 a₁ 和公差 d（或公比 r）',
    step3: '设置要查看的项数 n',
    step4: '查看第 n 项、完整数列、求和结果和公式步骤',
  }
});

const { $, copyText, t } = GZ;
let mode = 'arith';

function fmt(n){
  if(Number.isInteger(n)) return String(n);
  return (Math.round(n*1e10)/1e10).toString();
}
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function compute(){
  const a1 = +$('#a1').value;
  const d = +$('#d').value;
  const n = parseInt($('#n').value, 10);
  if(!Number.isFinite(a1)||!Number.isFinite(d)||!(n>0)){ $('#result').innerHTML=`<div class="err">${t('needN')}</div>`; return; }
  const maxShow = Math.min(n, 50); // avoid rendering huge lists

  let nth, sumN, seqTerms=[], formulaStr, stepsStr, infinite=null;

  if(mode==='arith'){
    nth = a1 + (n-1)*d;
    sumN = n/2*(2*a1 + (n-1)*d);
    formulaStr = `a<sub>n</sub> = a₁ + (n−1)d = ${fmt(a1)} + (${n}−1)·${fmt(d)} = <strong>${fmt(nth)}</strong><br>S<sub>n</sub> = n/2 · (2a₁ + (n−1)d) = ${n}/2 · (2·${fmt(a1)} + ${n-1}·${fmt(d)}) = <strong>${fmt(sumN)}</strong>`;
    for(let i=1;i<=maxShow;i++) seqTerms.push(fmt(a1+(i-1)*d));
  } else {
    // geometric
    if(n>1000 && Math.abs(d)>=1){ /* guard absurd size but still compute via formula */ }
    nth = a1 * Math.pow(d, n-1);
    if(d===1){ sumN = a1*n; }
    else { sumN = a1*(1 - Math.pow(d, n))/(1 - d); }
    formulaStr = `a<sub>n</sub> = a₁ · r^(n−1) = ${fmt(a1)} · ${fmt(d)}^${n-1} = <strong>${fmt(nth)}</strong><br>S<sub>n</sub> = a₁·(1 − rⁿ)/(1 − r) = ${fmt(a1)}·(1 − ${fmt(d)}^${n})/(1 − ${fmt(d)}) = <strong>${fmt(sumN)}</strong>`;
    for(let i=1;i<=maxShow;i++) seqTerms.push(fmt(a1*Math.pow(d, i-1)));
    // infinite sum if |r|<1
    if(Math.abs(d) < 1){ infinite = a1/(1-d); }
  }

  let html = `<div class="res-box">
    <div style="font-size:.8em;color:var(--text2)">${t('nthTerm')} (n=${n})</div>
    <div class="big">${fmt(nth)}</div>
  </div>`;
  html += `<div class="res-box">
    <div style="font-size:.8em;color:var(--text2)">${t('sumNStr')} S<sub>${n}</sub></div>
    <div class="big">${fmt(sumN)}</div>
  </div>`;
  if(infinite!==null){
    html += `<div class="res-box">
      <div style="font-size:.8em;color:var(--text2)">${t('infiniteSum')} S∞ (|r| &lt; 1)</div>
      <div class="big">${fmt(infinite)}</div>
      <div class="steplist">S∞ = a₁/(1 − r) = ${fmt(a1)}/(1 − ${fmt(d)}) = <strong>${fmt(infinite)}</strong></div>
    </div>`;
  }
  if(n<=maxShow){
    html += `<div class="res-box">
      <div style="font-size:.8em;color:var(--text2)">${t('sequence')} (${n} ${mode==='arith'?'terms':'terms'})</div>
      <div class="seq-display">${seqTerms.join(', ')}</div>
    </div>`;
  } else {
    html += `<div class="res-box">
      <div style="font-size:.8em;color:var(--text2)">${t('sequence')} (${t('first')} ${maxShow} ${'terms'})</div>
      <div class="seq-display">${seqTerms.join(', ')}, … (showing first ${maxShow} of ${n})</div>
    </div>`;
  }
  html += `<div class="res-box">
    <div style="font-size:.8em;color:var(--text2)">${t('formula')} & ${t('steps')}</div>
    <div class="steplist">${formulaStr}</div>
  </div>`;
  $('#result').innerHTML = html;
}

function setMode(m){
  mode = m;
  document.querySelectorAll('#dimtoggle button').forEach(b=>b.classList.toggle('active', b.dataset.m===m));
  $('#lbl-d').textContent = m==='arith' ? t('lblDA') : t('lblDG');
  // example value
  $('#d').value = m==='arith' ? 3 : 2;
  compute();
}

$('#dimtoggle').innerHTML = `<button data-m="arith" onclick="setMode('arith')">${t('arith')}</button><button data-m="geom" onclick="setMode('geom')">${t('geom')}</button>`;
$('#lbl-a1').textContent = t('lblA1');
$('#lbl-n').textContent = t('lblN');

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="compute()">${t('calculate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

function loadExample(){
  if(mode==='arith'){ $('#a1').value=5; $('#d').value=-2; $('#n').value=8; }
  else { $('#a1').value=3; $('#d').value=0.5; $('#n').value=10; }
  compute();
}
function doClear(){ $('#result').innerHTML=''; }

['a1','d','n'].forEach(id=>$('#'+id).addEventListener('input', compute));

setMode('arith');
</script>

    {icon:'🔢', href:'/calc/prime-number.html', name:'Prime Number Checker'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
