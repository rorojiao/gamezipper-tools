<script>
GZI18n.register({
  en: {
    toolTitle: 'CSS Clip-Path Generator',
    toolDesc: 'Generate CSS clip-path shapes visually with live preview. Create circles, polygons, and custom shapes.',
    shape: 'Shape',
    presets: 'Presets',
    sides: 'Sides',
    rotate: 'Rotate',
    radius: 'Size',
    copyCode: 'Copy CSS',
    copied: 'Copied!',
    step1: 'Choose a shape type: circle, ellipse, or polygon',
    step2: 'Select a preset or customize with controls',
    step3: 'Preview the clip-path effect in real-time',
    step4: 'Copy the CSS code and use it in your project',
  },
  zh: {
    toolTitle: 'CSS Clip-Path 生成器',
    toolDesc: '可视化生成 CSS clip-path 裁剪形状，支持实时预览。创建圆形、多边形和自定义形状。',
    shape: '形状',
    presets: '预设',
    sides: '边数',
    rotate: '旋转',
    radius: '大小',
    copyCode: '复制 CSS',
    copied: '已复制！',
    step1: '选择形状类型：圆形、椭圆或多边形',
    step2: '选择预设或使用控件自定义',
    step3: '实时预览 clip-path 裁剪效果',
    step4: '复制 CSS 代码并在项目中使用',
  }
});

const { $, copyText, t } = GZ;

const PRESETS = {
  triangle: {sides:3,rotation:0,fn:null},
  square: {sides:4,rotation:45,fn:null},
  pentagon: {sides:5,rotation:-90,fn:null},
  hexagon: {sides:6,rotation:0,fn:null},
  heptagon: {sides:7,rotation:-90,fn:null},
  octagon: {sides:8,rotation:22.5,fn:null},
  star4: {sides:0,rotation:0,fn:()=>{const pts=[];for(let i=0;i<8;i++){const a=(i*45-90)*Math.PI/180;const r=i%2===0?50:20;pts.push(`${(50+r*Math.cos(a)).toFixed(1)}% ${(50+r*Math.sin(a)).toFixed(1)}%`)}return pts.join(',')}},
  star5: {sides:0,rotation:0,fn:()=>{const pts=[];for(let i=0;i<10;i++){const a=(i*36-90)*Math.PI/180;const r=i%2===0?50:20;pts.push(`${(50+r*Math.cos(a)).toFixed(1)}% ${(50+r*Math.sin(a)).toFixed(1)}%`)}return pts.join(',')}},
  star6: {sides:0,rotation:0,fn:()=>{const pts=[];for(let i=0;i<12;i++){const a=(i*30-90)*Math.PI/180;const r=i%2===0?50:22;pts.push(`${(50+r*Math.cos(a)).toFixed(1)}% ${(50+r*Math.sin(a)).toFixed(1)}%`)}return pts.join(',')}},
  arrow: {sides:0,fn:()=>'50% 0%, 100% 40%, 75% 40%, 75% 100%, 25% 100%, 25% 40%, 0% 40%'},
  cross: {sides:0,fn:()=>'35% 0%, 65% 0%, 65% 35%, 100% 35%, 100% 65%, 65% 65%, 65% 100%, 35% 100%, 35% 65%, 0% 65%, 0% 35%, 35% 35%'},
  heart: {sides:0,fn:()=>'50% 100%, 0% 35%, 0% 15%, 10% 0%, 30% 0%, 50% 18%, 70% 0%, 90% 0%, 100% 15%, 100% 35%'},
  diamond: {sides:0,fn:()=>'50% 0%, 100% 50%, 50% 100%, 0% 50%'},
  chevron: {sides:0,fn:()=>'0% 0%, 100% 0%, 100% 60%, 50% 100%, 0% 60%'},
  message: {sides:0,fn:()=>'0% 0%, 100% 0%, 100% 75%, 75% 75%, 75% 100%, 50% 75%, 0% 75%'},
};

const PRESET_NAMES = {
  triangle:'△ Triangle', square:'□ Square', pentagon:'⬠ Pentagon', hexagon:'⬡ Hexagon',
  heptagon:'⬡ Heptagon', octagon:'⯃ Octagon', star4:'✦ Star 4', star5:'★ Star 5',
  star6:'✶ Star 6', arrow:'→ Arrow', cross:'✚ Cross', heart:'♥ Heart',
  diamond:'◆ Diamond', chevron:'⌃ Chevron', message:'💬 Message'
};

let currentClip = '';

function generatePolygon(n, rot, r) {
  const pts = [];
  for (let i = 0; i < n; i++) {
    const a = ((i * 360 / n) + rot - 90) * Math.PI / 180;
    pts.push(`${(50 + r * Math.cos(a)).toFixed(1)}% ${(50 + r * Math.sin(a)).toFixed(1)}%`);
  }
  return pts.join(', ');
}

function updatePolygon() {
  const n = +$('#sides').value;
  const rot = +$('#rotation').value;
  const r = +$('#clip-radius').value;
  $('#sides-val').textContent = n;
  $('#rotate-val').textContent = rot + '°';
  $('#radius-val').textContent = r + '%';
  const pts = generatePolygon(n, rot, r);
  currentClip = `polygon(${pts})`;
  $('#preview-box').style.clipPath = currentClip;
  $('#code-output').textContent = `clip-path: ${currentClip};`;
}

function updateShape() {
  const type = $('#shape-type').value;
  const r = +$('#clip-radius').value;
  $('#radius-val').textContent = r + '%';

  if (type === 'circle') {
    currentClip = `circle(${r}%)`;
    $('#preset-section').style.display = 'none';
    $('#custom-controls').querySelector('#sides').parentElement.style.display = 'none';
    $('#custom-controls').querySelector('#rotation').parentElement.style.display = 'none';
  } else if (type === 'ellipse') {
    currentClip = `ellipse(${r}% ${r * 0.6}% at 50% 50%)`;
    $('#preset-section').style.display = 'none';
    $('#custom-controls').querySelector('#sides').parentElement.style.display = 'none';
    $('#custom-controls').querySelector('#rotation').parentElement.style.display = 'none';
  } else {
    $('#preset-section').style.display = '';
    $('#custom-controls').querySelector('#sides').parentElement.style.display = '';
    $('#custom-controls').querySelector('#rotation').parentElement.style.display = '';
    updatePolygon();
    return;
  }
  $('#preview-box').style.clipPath = currentClip;
  $('#code-output').textContent = `clip-path: ${currentClip};`;
}

function applyPreset(name) {
  const p = PRESETS[name];
  $('#shape-type').value = 'polygon';
  if (p.sides > 0) {
    $('#sides').value = p.sides;
    $('#rotation').value = p.rotation;
    updatePolygon();
  } else if (p.fn) {
    const pts = p.fn();
    currentClip = `polygon(${pts})`;
    $('#preview-box').style.clipPath = currentClip;
    $('#code-output').textContent = `clip-path: ${currentClip};`;
  }
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
}

function copyCode() {
  copyText(`clip-path: ${currentClip};`);
  const btn = $('#copy-btn');
  btn.textContent = t('copied');
  setTimeout(() => btn.textContent = t('copyCode'), 1500);
}

// Build presets UI
$('#presets').innerHTML = Object.keys(PRESETS).map(k =>
  `<button class="preset-btn" onclick="applyPreset('${k}')">${PRESET_NAMES[k]}</button>`
).join('');

$('#lbl-shape').textContent = t('shape');
$('#lbl-presets').textContent = t('presets');
$('#lbl-sides').textContent = t('sides');
$('#lbl-rotate').textContent = t('rotate');
$('#lbl-radius').textContent = t('radius');
$('#copy-btn').textContent = t('copyCode');

// Initialize with hexagon
$('#sides').value = 6;
updatePolygon();

GZ.renderToolPage({
  category: 'css',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🌈', href:'/css-tools/gradient.html', name:'Gradient Generator'},
    {icon:'🔲', href:'/css-tools/shadow.html', name:'Box Shadow'},
    {icon:'📐', href:'/css-tools/flexbox.html', name:'Flexbox Generator'},
    {icon:'📦', href:'/css-tools/minify.html', name:'CSS Minifier'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
