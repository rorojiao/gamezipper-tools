<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="drop-zone" id="drop-zone"></div>
    <div class="ctrl-row">
      <label id="delay-lbl"></label>
      <input type="range" id="delay" min="50" max="2000" value="200" step="50">
      <span class="val" id="delay-val">200ms</span>
    </div>
    <div class="ctrl-row">
      <label id="width-lbl"></label>
      <input type="number" id="gif-width" value="400" min="16" max="2000" style="width:90px">
      <span style="font-size:.85rem;color:var(--text3)">px</span>
    </div>
    <div class="ctrl-row">
      <label id="quality-lbl"></label>
      <input type="number" id="gif-quality" value="10" min="1" max="20" style="width:70px">
    </div>
    <div class="frame-grid" id="frames"></div>
    <div id="preview-area" style="display:none"></div>
    <div class="progress-bar" id="progress-bar" style="display:none"><div class="fill" id="progress-fill" style="width:0%"></div></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'GIF Maker — Create Animated GIFs',
    toolDesc: 'Upload images, arrange frames, set delay and create animated GIFs — free, private, browser-based.',
    upload: 'Upload Images',
    generate: 'Generate GIF',
    download: 'Download GIF',
    clear: 'Clear All',
    dropText: '📎 Click or drag images here to upload',
    delayLabel: 'Frame Delay',
    widthLabel: 'Output Width',
    qualityLabel: 'Quality (1-20)',
    step1: 'Click the upload area or drag images to add frames',
    step2: 'Arrange frames by dragging, set delay and output width',
    step3: 'Click Generate GIF to create the animation',
    step4: 'Preview the GIF and download it to your device',
    generated: 'GIF created!',
    processing: 'Generating...',
  },
  zh: {
    toolTitle: 'GIF 制作工具 — 从图片创建动画 GIF',
    toolDesc: '上传图片，排列帧，设置延迟并创建动画 GIF — 免费且完全浏览器本地处理。',
    upload: '上传图片',
    generate: '生成 GIF',
    download: '下载 GIF',
    clear: '全部清空',
    dropText: '📎 点击或拖拽图片到此处上传',
    delayLabel: '帧延迟',
    widthLabel: '输出宽度',
    qualityLabel: '质量 (1-20)',
    step1: '点击上传区域或拖拽图片添加帧',
    step2: '排列帧顺序，设置延迟时间和输出宽度',
    step3: '点击「生成 GIF」创建动画',
    step4: '预览 GIF 并下载到本地',
    generated: 'GIF 已生成！',
    processing: '正在生成...',
  }
});
const { $, copyText, t } = GZ;
let frames = [];
$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="generateGIF()">${t('generate')}</button>
  <button class="gz-btn gz-btn-secondary" id="dl-btn" onclick="downloadGIF()" disabled>${t('download')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="clearAll()" style="margin-left:auto">${t('clear')}</button>`;
$('#drop-zone').textContent = t('dropText');
$('#delay-lbl').textContent = t('delayLabel');
$('#width-lbl').textContent = t('widthLabel');
$('#quality-lbl').textContent = t('qualityLabel');
$('#delay').addEventListener('input', function() {
  $('#delay-val').textContent = this.value + 'ms';
});
const dropZone = $('#drop-zone');
dropZone.addEventListener('click', () => {
  const inp = document.createElement('input');
  inp.type = 'file'; inp.multiple = true; inp.accept = 'image/*';
  inp.onchange = e => addFiles(e.target.files);
  inp.click();
});
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('dragover'); addFiles(e.dataTransfer.files); });
function addFiles(files) {
  Array.from(files).forEach(file => {
    if (!file.type.startsWith('image/')) return;
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        frames.push({ src: e.target.result, img });
        renderFrames();
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}
function renderFrames() {
  const container = $('#frames');
  container.innerHTML = '';
  frames.forEach((f, i) => {
    const div = document.createElement('div');
    div.className = 'frame-item';
    div.innerHTML = `<span class="frame-idx">${i + 1}</span><img src="${f.src}"><button class="frame-del" onclick="removeFrame(${i})">×</button>`;
    container.appendChild(div);
  });
}
function removeFrame(i) {
  frames.splice(i, 1);
  renderFrames();
}
function generateGIF() {
  if (frames.length < 2) return alert('Add at least 2 frames');
  const delay = parseInt($('#delay').value);
  const width = parseInt($('#gif-width').value);
  const quality = parseInt($('#gif-quality').value);
  $('#preview-area').style.display = 'none';
  $('#progress-bar').style.display = 'block';
  const firstImg = frames[0].img;
  const ratio = firstImg.height / firstImg.width;
  const height = Math.round(width * ratio);
  const gif = new GIF({
    workers: 2,
    quality: quality,
    width: width,
    height: height,
    workerScript: 'https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.worker.js'
  });
  frames.forEach(f => {
    gif.addFrame(f.img, { delay: delay, copy: true });
  });
  gif.on('progress', p => {
    $('#progress-fill').style.width = Math.round(p * 100) + '%';
  });
  gif.on('finished', blob => {
    $('#progress-bar').style.display = 'none';
    const url = URL.createObjectURL(blob);
    $('#preview-area').style.display = 'block';
    $('#preview-area').innerHTML = `<img src="${url}" alt="Generated GIF"><br><span style="font-size:.8rem;color:var(--text3)">${(blob.size/1024).toFixed(1)} KB</span>`;
    window._gifBlob = blob;
    window._gifUrl = url;
    $('#dl-btn').disabled = false;
  });
  gif.render();
}
function downloadGIF() {
  if (!window._gifBlob) return;
  const a = document.createElement('a');
  a.href = window._gifUrl;
  a.download = 'animation.gif';
  a.click();
}
function clearAll() {
  frames = [];
  window._gifBlob = null;
  if (window._gifUrl) { URL.revokeObjectURL(window._gifUrl); window._gifUrl = null; }
  renderFrames();
  $('#preview-area').style.display = 'none';
  $('#preview-area').innerHTML = '';
  $('#progress-bar').style.display = 'none';
  $('#dl-btn').disabled = true;
}
GZ.renderToolPage({
  related: [
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
