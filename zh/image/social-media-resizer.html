<div class="gz-container">

<script>
GZI18n.register({
  en: {
    toolTitle: 'Social Media Image Resizer',
    toolDesc: 'Resize images to the perfect dimensions for Instagram, Facebook, Twitter/X, LinkedIn, YouTube and more. Drag, drop and download — no upload.',
    lblPlatform: 'Choose Platform & Size',
    lblDrop: 'Drop an image here or click to upload',
    lblOrigSize: 'Original',
    lblNewSize: 'Resized',
    download: 'Download',
    format: 'Format',
    step1: 'Select your target platform and image type',
    step2: 'Upload or drag-and-drop your image',
    step3: 'Preview the resized result',
    step4: 'Click Download to save the resized image',
  },
  zh: {
    toolTitle: '社交媒体图片尺寸调整',
    toolDesc: '将图片调整为 Instagram、Facebook、Twitter/X、LinkedIn、YouTube 等平台的完美尺寸。拖拽上传，即时下载。',
    lblPlatform: '选择平台和尺寸',
    lblDrop: '拖拽图片到此处或点击上传',
    lblOrigSize: '原始',
    lblNewSize: '调整后',
    download: '下载',
    format: '格式',
    step1: '选择目标平台和图片类型',
    step2: '上传或拖拽图片',
    step3: '预览调整后的效果',
    step4: '点击下载保存调整后的图片',
  }
});

const { $, t } = GZ;

const PRESETS = [
  {id:'ig-post',icon:'📸',w:1080,h:1080,name:{en:'Instagram Post',zh:'Instagram 帖子'}},
  {id:'ig-story',icon:'📱',w:1080,h:1920,name:{en:'Instagram Story',zh:'Instagram Story'}},
  {id:'ig-reel',icon:'🎬',w:1080,h:1920,name:{en:'Instagram Reel',zh:'Instagram Reel'}},
  {id:'ig-profile',icon:'👤',w:320,h:320,name:{en:'Instagram Profile',zh:'Instagram 头像'}},
  {id:'fb-post',icon:'📘',w:1200,h:630,name:{en:'Facebook Post',zh:'Facebook 帖子'}},
  {id:'fb-cover',icon:'🖼️',w:820,h:312,name:{en:'Facebook Cover',zh:'Facebook 封面'}},
  {id:'fb-ad',icon:'📢',w:1200,h:628,name:{en:'Facebook Ad',zh:'Facebook 广告'}},
  {id:'tw-post',icon:'🐦',w:1200,h:675,name:{en:'Twitter/X Post',zh:'Twitter/X 帖子'}},
  {id:'tw-header',icon:'🖼️',w:1500,h:500,name:{en:'Twitter/X Header',zh:'Twitter/X 头图'}},
  {id:'li-post',icon:'💼',w:1200,h:627,name:{en:'LinkedIn Post',zh:'LinkedIn 帖子'}},
  {id:'li-banner',icon:'🖼️',w:1584,h:396,name:{en:'LinkedIn Banner',zh:'LinkedIn 横幅'}},
  {id:'yt-thumb',icon:'▶️',w:1280,h:720,name:{en:'YouTube Thumbnail',zh:'YouTube 缩略图'}},
  {id:'yt-banner',icon:'🖼️',w:2560,h:1440,name:{en:'YouTube Banner',zh:'YouTube 横幅'}},
  {id:'pin-pin',icon:'📌',w:1000,h:1500,name:{en:'Pinterest Pin',zh:'Pinterest Pin'}},
  {id:'tt-cover',icon:'🎵',w:1080,h:1920,name:{en:'TikTok Video',zh:'TikTok 视频'}},
];

let activePreset = PRESETS[0];
let img = null;
let outputFormat = 'image/png';

const lang = GZI18n.getLang();

$('#presets').innerHTML = PRESETS.map((p, i) => {
  const name = lang === 'zh' ? p.name.zh : p.name.en;
  return `<button class="preset-btn${i===0?' active':''}" onclick="selectPreset(${i},this)">
    <span class="preset-icon">${p.icon}</span>
    <span class="preset-info"><span class="preset-name">${name}</span><span class="preset-size">${p.w}×${p.h}</span></span>
  </button>`;
}).join('');

window.selectPreset = function(idx, btn) {
  activePreset = PRESETS[idx];
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (img) renderCanvas();
};

$('#dropzone').onclick = () => $('#fileInput').click();
$('#dropzone').addEventListener('dragover', e => { e.preventDefault(); $('#dropzone').classList.add('dragover'); });
$('#dropzone').addEventListener('dragleave', () => $('#dropzone').classList.remove('dragover'));
$('#dropzone').addEventListener('drop', e => {
  e.preventDefault();
  $('#dropzone').classList.remove('dragover');
  const file = e.dataTransfer.files[0];
  if (file && file.type.startsWith('image/')) loadImage(file);
});
$('#fileInput').addEventListener('change', e => {
  if (e.target.files[0]) loadImage(e.target.files[0]);
});

function loadImage(file) {
  const reader = new FileReader();
  reader.onload = function(e) {
    img = new Image();
    img.onload = function() { renderCanvas(); };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function renderCanvas() {
  if (!img) return;
  const canvas = $('#canvas');
  const p = activePreset;
  canvas.width = p.w;
  canvas.height = p.h;
  const ctx = canvas.getContext('2d');

  // Fill with white background (for JPEG)
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, p.w, p.h);

  // Cover fit: scale and center
  const scale = Math.max(p.w / img.width, p.h / img.height);
  const sw = img.width * scale;
  const sh = img.height * scale;
  const sx = (p.w - sw) / 2;
  const sy = (p.h - sh) / 2;
  ctx.drawImage(img, sx, sy, sw, sh);

  $('#preview-area').style.display = 'block';
  $('#lbl-orig-size').textContent = `${t('lblOrigSize')}: ${img.width}×${img.height}`;
  $('#lbl-new-size').textContent = `${t('lblNewSize')}: ${p.w}×${p.h}`;
}

function downloadImage() {
  const canvas = $('#canvas');
  const link = document.createElement('a');
  const ext = outputFormat === 'image/png' ? 'png' : 'jpg';
  link.download = `social-media-${activePreset.id}.${ext}`;
  link.href = canvas.toDataURL(outputFormat, 0.92);
  link.click();
}

$('#toolbar').innerHTML = `
  <select class="gz-select" onchange="outputFormat=this.value" style="padding:8px 12px;border-radius:8px;background:var(--glass);border:1px solid var(--border);color:inherit;font-family:inherit">
    <option value="image/png">PNG</option>
    <option value="image/jpeg">JPEG</option>
  </select>
  <button class="gz-btn" onclick="downloadImage()">📥 ${t('download')}</button>`;

GZ.renderToolPage({
  category: 'image',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📐', href:'/image/resizer.html', name:'Image Resizer'},
    {icon:'✂️', href:'/image/cropper.html', name:'Image Cropper'},
    {icon:'🔄', href:'/image/converter.html', name:'Image Converter'},
    {icon:'🖼️', href:'/image/placeholder.html', name:'Placeholder Image'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
