<script>
GZI18n.register({

    toolDesc: '即时检测密码强度。检查长度、复杂度、熵值，获取增强建议。100% 隐私 — 数据不会离开浏览器。',
    enterPw: '在此输入密码…',

    veryWeak: '非常弱',
    weak: '弱',

    strong: '强',
    veryStrong: '非常强',

    entropy: '熵值',
    crackTime: '破解时间',
    charset: '字符集大小',
    tipsTitle: '安全检查清单',
    tipLen8: '至少 8 个字符',
    tipLen12: '至少 12 个字符（推荐）',
    tipUpper: '包含大写字母 (A-Z)',
    tipLower: '包含小写字母 (a-z)',
    tipDigit: '包含数字 (0-9)',
    tipSymbol: '包含特殊符号 (!@#$…)',
    tipNoCommon: '不是常见密码',
    tipNoSequence: '没有明显序列 (123, abc)',
    tipNoRepeat: '没有重复字符 (aaa, 111)',
    instant: '瞬间',
    seconds: '秒',
    minutes: '分钟',
    hours: '小时',
    days: '天',
    years: '年',
    centuries: '世纪',
    millennia: '千年',
    forever: '宇宙热寂',
    bits: '位',
    step1: '在输入框中输入或粘贴密码',
    step2: '实时查看强度条和破解时间估算',
    step3: '查看安全检查清单获取改进建议',
    step4: '使用密码生成器创建强密码',
  }
});

const { $, t } = GZ;

const COMMON_PWS = new Set(['password','123456','12345678','qwerty','abc123','monkey','1234567','letmein','trustno1','dragon','baseball','iloveyou','master','sunshine','ashley','bailey','passw0rd','shadow','123123','654321','superman','qazwsx','michael','football','password1','password123','princess','login','welcome','admin','hello','charlie','donald']);

$('#pw-input').placeholder = t('enterPw');

function toggleVis() {
  const inp = $('#pw-input');
  const isPass = inp.type === 'password';
  inp.type = isPass ? 'text' : 'password';
  $('#vis-btn').textContent = isPass ? '🙈' : '👁️';
}

function calcEntropy(pw) {
  let charsetSize = 0;
  if (/[a-z]/.test(pw)) charsetSize += 26;
  if (/[A-Z]/.test(pw)) charsetSize += 26;
  if (/[0-9]/.test(pw)) charsetSize += 10;
  if (/[^a-zA-Z0-9]/.test(pw)) charsetSize += 32;
  if (charsetSize === 0) return 0;
  return pw.length * Math.log2(charsetSize);
}

function formatTime(seconds) {
  if (seconds < 0.001) return t('instant');
  if (seconds < 60) return Math.ceil(seconds) + ' ' + t('seconds');
  if (seconds < 3600) return Math.ceil(seconds / 60) + ' ' + t('minutes');
  if (seconds < 86400) return Math.ceil(seconds / 3600) + ' ' + t('hours');
  if (seconds < 86400 * 365) return Math.ceil(seconds / 86400) + ' ' + t('days');
  if (seconds < 86400 * 365 * 100) return Math.ceil(seconds / (86400 * 365)) + ' ' + t('years');
  if (seconds < 86400 * 365 * 1e6) return Math.ceil(seconds / (86400 * 365 * 100)) + ' ' + t('centuries');
  if (seconds < 86400 * 365 * 1e9) return Math.ceil(seconds / (86400 * 365 * 1000)) + ' ' + t('millennia');
  return t('forever');
}

function analyze(pw) {
  const entropy = calcEntropy(pw);
  // Assume 10 billion guesses/sec
  const guesses = Math.pow(2, entropy);
  const crackSec = guesses / 1e10;

  let strength, color, pct;
  if (entropy < 28) { strength = 'veryWeak'; color = '#e94560'; pct = 15; }
  else if (entropy < 36) { strength = 'weak'; color = '#ff6b6b'; pct = 30; }
  else if (entropy < 60) { strength = 'fair'; color = '#ffd93d'; pct = 55; }
  else if (entropy < 80) { strength = 'strong'; color = '#4ecdc4'; pct = 80; }
  else { strength = 'veryStrong'; color = '#00d672'; pct = 100; }

  let charsetSize = 0;
  if (/[a-z]/.test(pw)) charsetSize += 26;
  if (/[A-Z]/.test(pw)) charsetSize += 26;
  if (/[0-9]/.test(pw)) charsetSize += 10;
  if (/[^a-zA-Z0-9]/.test(pw)) charsetSize += 32;

  $('#bar-fill').style.width = pct + '%';
  $('#bar-fill').style.background = color;
  $('#strength-label').textContent = t('strength') + ': ' + t(strength);
  $('#strength-label').style.color = color;

  $('#stats-grid').innerHTML = `
    <div class="stat-card"><div class="stat-value">${pw.length}</div><div class="stat-label">${t('length')}</div></div>
    <div class="stat-card"><div class="stat-value">${entropy.toFixed(1)} ${t('bits')}</div><div class="stat-label">${t('entropy')}</div></div>
    <div class="stat-card"><div class="stat-value">${charsetSize}</div><div class="stat-label">${t('charset')}</div></div>
    <div class="stat-card"><div class="stat-value">${pw ? formatTime(crackSec) : '—'}</div><div class="stat-label">${t('crackTime')}</div></div>`;

  const tips = [
    { key: 'tipLen8', pass: pw.length >= 8 },
    { key: 'tipLen12', pass: pw.length >= 12, type: 'warn' },
    { key: 'tipUpper', pass: /[A-Z]/.test(pw) },
    { key: 'tipLower', pass: /[a-z]/.test(pw) },
    { key: 'tipDigit', pass: /[0-9]/.test(pw) },
    { key: 'tipSymbol', pass: /[^a-zA-Z0-9]/.test(pw) },
    { key: 'tipNoCommon', pass: !COMMON_PWS.has(pw.toLowerCase()) },
    { key: 'tipNoSequence', pass: !/(?:abc|bcd|cde|def|123|234|345|456|567|678|789|qwe|wer|ert|rty|asd|sdf|dfg)/i.test(pw) },
    { key: 'tipNoRepeat', pass: !/(.)\1{2,}/.test(pw) },
  ];

  $('#tips-heading').textContent = t('tipsTitle');
  $('#tips-list').innerHTML = tips.map(tip => {
    const cls = tip.pass ? 'pass' : (tip.type === 'warn' && tip.pass ? 'warn' : (tip.pass ? 'pass' : 'fail'));
    const icon = tip.pass ? '✅' : (tip.type === 'warn' ? '⚠️' : '❌');
    return `<li class="${cls}">${icon} ${t(tip.key)}</li>`;
  }).join('');
}

$('#pw-input').addEventListener('input', function() {
  if (this.value) analyze(this.value);
  else {
    $('#bar-fill').style.width = '0%';
    $('#strength-label').textContent = '';
    $('#stats-grid').innerHTML = '';
    $('#tips-list').innerHTML = '';
  }
});
