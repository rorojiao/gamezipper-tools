  var hc='0123456789abcdef';
  function str2hex(state){return rh(state[0])+rh(state[1])+rh(state[2])+rh(state[3]);}
  return function(str){
    // UTF-8 encode
    str=unescape(encodeURIComponent(str));
    var state=cb(str);
    return str2hex(state);

})();

function buildUrl() {
  const email = $('#email').value.trim().toLowerCase();
  const size = $('#size').value || 80;
  const def = $('#def').value;
  const rating = $('#rating').value;
  const force = $('#force').checked;
  if (!email) { $('#url').textContent = ''; $('#html').textContent = ''; $('#md').textContent = ''; $('#preview').innerHTML = `<span class="ph">${t('ph')}</span>`; return; }
  const hash = md5(email);
  const params = new URLSearchParams();
  params.set('s', size);
  params.set('d', def);
  params.set('r', rating);
  if (force) params.set('f', 'y');
  const url = `https://www.gravatar.com/avatar/${hash}?${params.toString()}`;
  $('#url').textContent = url;
  $('#html').textContent = `<img src="${url}" width="${size}" height="${size}" alt="Gravatar">`;
  $('#md').textContent = `![Gravatar](${url})`;
  $('#preview').innerHTML = `
    <div class="checker" style="width:${Math.min(size,160)}px;height:${Math.min(size,160)}px"><img src="${url}" width="${Math.min(size,160)}" height="${Math.min(size,160)}" alt="preview" style="width:100%;height:100%" onerror="this.style.display='none'"></div>
    <div><div style="font-weight:700;font-size:1.1rem">${size}×${size}px</div><div class="ph" style="margin-top:4px">hash: ${hash}</div></div>`;
}
