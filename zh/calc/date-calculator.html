<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="tab-bar" id="tabBar"></div>
    <div id="panel-diff">
      <label id="lbl-start"></label>
      <input type="date" id="date1">
      <label id="lbl-end"></label>
      <input type="date" id="date2">
      <button class="gz-btn" onclick="calcDiff()"></button>
    </div>
    <div id="panel-add" style="display:none">
      <label id="lbl-from"></label>
      <input type="date" id="dateFrom">
      <div style="display:flex;gap:8px;align-items:center">
        <select id="operation" style="width:auto;margin:0">
          <option value="add">+</option>
          <option value="subtract">−</option>
        </select>
        <input type="number" id="amount" value="30" min="0" style="flex:1">
        <select id="unit" style="width:auto;margin:0">
          <option value="days"></option>
          <option value="weeks"></option>
          <option value="months"></option>
          <option value="years"></option>
        </select>
      </div>
      <button class="gz-btn" onclick="calcAdd()" style="margin-top:12px"></button>
    </div>
    <div id="result"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Date Calculator',
    toolDesc: 'Calculate date differences, add or subtract days, weeks, months, and years from any date.',
    tabDiff: 'Date Difference',
    tabAdd: 'Add / Subtract',
    startDate: 'Start Date',
    endDate: 'End Date',
    fromDate: 'Start Date',
    days: 'Days',
    weeks: 'Weeks',
    months: 'Months',
    years: 'Years',
    calculate: 'Calculate',
    result: 'Result',
    totalDays: 'Total Days',
    totalWeeks: 'Total Weeks',
    totalMonths: 'Total Months',
    totalHours: 'Total Hours',
    ymd: 'Y/M/D',
    resultDate: 'Result Date',
    step1: 'Choose between Date Difference or Add/Subtract mode',
    step2: 'Enter your dates and parameters',
    step3: 'Click Calculate to see the result',
    step4: 'The result shows years, months, days, and other units',
    faq1q: 'How is the date difference calculated?',
    faq1a: 'The calculator finds the exact difference between two dates by computing the millisecond difference and converting it into years, months, days, and other units.',
    faq2q: 'Does adding months handle month-end edge cases?',
    faq2a: 'Yes. For example, adding 1 month to January 31 gives February 28 (or 29 in a leap year). The calculator uses JavaScript date arithmetic which handles these cases.',
    faq3q: 'Can I use this for project deadline planning?',
    faq3a: 'Absolutely! Use the Add/Subtract mode to find future dates, or the Date Difference mode to check how many days remain until a deadline.',
  },
  zh: {
    toolTitle: '日期计算器',
    toolDesc: '计算两个日期之间的差值，或从任意日期加减天数、周数、月数和年数。',
    tabDiff: '日期差值',
    tabAdd: '加/减日期',
    startDate: '开始日期',
    endDate: '结束日期',
    fromDate: '起始日期',
    days: '天',
    weeks: '周',
    months: '月',
    years: '年',
    calculate: '计算',
    result: '结果',
    totalDays: '总天数',
    totalWeeks: '总周数',
    totalMonths: '总月数',
    totalHours: '总小时数',
    ymd: '年/月/日',
    resultDate: '结果日期',
    step1: '选择"日期差值"或"加/减日期"模式',
    step2: '输入日期和参数',
    step3: '点击「计算」查看结果',
    step4: '结果将显示年、月、日和其他时间单位',
    faq1q: '日期差值是如何计算的？',
    faq1a: '计算器通过计算两个日期之间的毫秒差值，然后将其转换为年、月、日和其他单位。',
    faq2q: '添加月份时是否处理月末边界情况？',
    faq2a: '是的。例如，在1月31日加1个月会得到2月28日（闰年为29日）。计算器使用 JavaScript 日期运算来处理这些情况。',
    faq3q: '可以用于项目截止日期规划吗？',
    faq3a: '当然可以！使用"加/减日期"模式查找未来日期，或使用"日期差值"模式查看距离截止日期还有多少天。',
  }
});

const { $, t } = GZ;

// Set default dates
const today = new Date();
$('#date1').value = today.toISOString().split('T')[0];
$('#date2').value = new Date(today.getFullYear(), today.getMonth(), today.getDate() + 30).toISOString().split('T')[0];
$('#dateFrom').value = today.toISOString().split('T')[0];

// Tabs
function showTab(tab) {
  $('#panel-diff').style.display = tab === 'diff' ? '' : 'none';
  $('#panel-add').style.display = tab === 'add' ? '' : 'none';
  document.querySelectorAll('.tab-bar button').forEach((b, i) => {
    b.className = (i === (tab === 'diff' ? 0 : 1)) ? 'gz-btn active' : 'gz-btn gz-btn-secondary';
  });
}

$('#tabBar').innerHTML = `
  <button class="gz-btn active" onclick="showTab('diff')">${t('tabDiff')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="showTab('add')">${t('tabAdd')}</button>`;

// Labels
$('#lbl-start').textContent = t('startDate');
$('#lbl-end').textContent = t('endDate');
$('#lbl-from').textContent = t('fromDate');
$('#unit option[value=days]').textContent = t('days');
$('#unit option[value=weeks]').textContent = t('weeks');
$('#unit option[value=months]').textContent = t('months');
$('#unit option[value=years]').textContent = t('years');

function calcDiff() {
  const d1 = new Date($('#date1').value);
  const d2 = new Date($('#date2').value);
  if (isNaN(d1) || isNaN(d2)) return;
  const diffMs = Math.abs(d2 - d1);
  const totalDays = Math.round(diffMs / (1000*60*60*24));
  const totalWeeks = (totalDays / 7).toFixed(1);
  const totalMonths = (totalDays / 30.44).toFixed(1);
  const totalHours = (totalDays * 24).toLocaleString();

  // Calculate years, months, days
  let y = d2.getFullYear() - d1.getFullYear();
  let m = d2.getMonth() - d1.getMonth();
  let d = d2.getDate() - d1.getDate();
  if (d < 0) { m--; d += new Date(d2.getFullYear(), d2.getMonth(), 0).getDate(); }
  if (m < 0) { y--; m += 12; }
  const abs = Math.abs;
  const ymdStr = `${abs(y)} ${t('years')}, ${abs(m)} ${t('months')}, ${abs(d)} ${t('days')}`;

  $('#result').innerHTML = `
    <div class="result-box">
      <div class="big">${ymdStr}</div>
      <div class="sub">${t('ymd')}</div>
    </div>
    <div class="result-grid">
      <div class="result-item"><div class="val">${totalDays.toLocaleString()}</div><div class="lbl">${t('totalDays')}</div></div>
      <div class="result-item"><div class="val">${totalWeeks}</div><div class="lbl">${t('totalWeeks')}</div></div>
      <div class="result-item"><div class="val">${totalMonths}</div><div class="lbl">${t('totalMonths')}</div></div>
      <div class="result-item"><div class="val">${totalHours}</div><div class="lbl">${t('totalHours')}</div></div>
    </div>`;
}

function calcAdd() {
  const base = new Date($('#dateFrom').value);
  if (isNaN(base)) return;
  const amt = parseInt($('#amount').value) || 0;
  const unit = $('#unit').value;
  const op = $('#operation').value;
  const sign = op === 'add' ? 1 : -1;

  const result = new Date(base);
  if (unit === 'days') result.setDate(result.getDate() + sign * amt);
  else if (unit === 'weeks') result.setDate(result.getDate() + sign * amt * 7);
  else if (unit === 'months') result.setMonth(result.getMonth() + sign * amt);
  else if (unit === 'years') result.setFullYear(result.getFullYear() + sign * amt);

  const dateStr = result.toLocaleDateString(undefined, { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
  const isoStr = result.toISOString().split('T')[0];

  // Days from today
  const diffDays = Math.round((result - base) / (1000*60*60*24));

  $('#result').innerHTML = `
    <div class="result-box">
      <div class="big">${isoStr}</div>
      <div class="sub">${dateStr}</div>
    </div>
    <div class="result-grid">
      <div class="result-item"><div class="val">${Math.abs(diffDays).toLocaleString()}</div><div class="lbl">${diffDays >= 0 ? t('days') + ' later' : t('days') + ' earlier'}</div></div>
    </div>`;
}

// Button labels
document.querySelectorAll('#panel-diff .gz-btn, #panel-add .gz-btn').forEach(b => {
  if (!b.textContent) b.textContent = t('calculate');
});

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'⏱️', href:'/dev/timestamp.html', name:'Timestamp'},
    {icon:'🔤', href:'/text/case-converter.html', name:'Case Converter'},
    {icon:'📊', href:'/dev/json.html', name:'JSON Formatter'},
  ]
});
</script>
<script src="/tools-result-rec.js?v=20260707v520" defer></script>
</body>
