<script>
GZI18n.register({
  en: {
    toolTitle: 'JSON Sort',
    toolDesc: 'Sort JSON object keys alphabetically and sort JSON arrays by any field — ascending or descending, with recursive nested sorting.',
    modeKeys: 'Sort Keys',
    modeArray: 'Sort Array',
    ascending: 'Ascending',
    descending: 'Descending',
    fieldName: 'Field (dot-path)',
    fieldNamePh: 'e.g. user.age',
    recursive: 'Recursive',
    caseInsensitive: 'Case-insensitive',
    sort: 'Sort',
    example: 'Example',
    copy: 'Copy',
    clear: 'Clear',
    inputLbl: 'Input JSON',
    outputLbl: 'Sorted JSON',
    validJson: '✓ Valid JSON — sorted',
    invalidJson: '✗ Invalid JSON',
    noArray: 'Top-level value is not an array',
    fieldMissing: 'Some items are missing the field',
    step1: 'Paste or type your JSON into the input area',
    step2: 'Choose Sort Keys (for objects) or Sort Array (for arrays)',
    step3: 'Pick ascending/descending, toggle recursive or case-insensitive',
    step4: 'Click Sort and copy the result',
  },
  zh: {
    toolTitle: 'JSON 排序工具',
    toolDesc: '按字母顺序排序 JSON 对象的键，或按任意字段排序 JSON 数组 — 支持升序/降序和递归嵌套排序。',
    modeKeys: '排序键',
    modeArray: '排序数组',
    ascending: '升序',
    descending: '降序',
    fieldName: '字段（点路径）',
    fieldNamePh: '例如 user.age',
    recursive: '递归',
    caseInsensitive: '忽略大小写',
    sort: '排序',
    example: '示例',
    copy: '复制',
    clear: '清空',
    inputLbl: '输入 JSON',
    outputLbl: '排序后 JSON',
    validJson: '✓ JSON 有效 — 已排序',
    invalidJson: '✗ JSON 无效',
    noArray: '顶层值不是数组',
    fieldMissing: '部分元素缺少该字段',
    step1: '在输入区粘贴或输入 JSON',
    step2: '选择「排序键」（对象）或「排序数组」（数组）',
    step3: '选择升序/降序，可开启递归或忽略大小写',
    step4: '点击「排序」并复制结果',
  }
});

let mode = 'keys';
let order = 'asc';
let caseInsensitive = false;
let recursive = true;

const { $, copyText, t } = GZ;

function syntaxHighlight(json) {
  return json.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/("(\\u[\da-fA-F]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(\.\d+)?([eE][+-]?\d+)?)/g, m => {
      let c = 'json-number';
      if (/^"/.test(m)) c = /:$/.test(m) ? 'json-key' : 'json-string';
      else if (/true|false/.test(m)) c = 'json-bool';
      else if (/null/.test(m)) c = 'json-null';
      return `<span class="${c}">${m}</span>`;
    });
}

function sortByKey(obj) {
  if (Array.isArray(obj)) {
    const arr = recursive ? obj.map(sortByKey) : obj;
    return arr;
  }
  if (obj !== null && typeof obj === 'object') {
    const sorted = {};
    const keys = Object.keys(obj).sort((a, b) => {
      const x = caseInsensitive ? a.toLowerCase() : a;
      const y = caseInsensitive ? b.toLowerCase() : b;
      const cmp = x < y ? -1 : (x > y ? 1 : 0);
      return order === 'asc' ? cmp : -cmp;
    });
    for (const k of keys) {
      sorted[k] = recursive ? sortByKey(obj[k]) : obj[k];
    }
    return sorted;
  }
  return obj;
}

function getByPath(obj, path) {
  if (!path) return undefined;
  const parts = path.split('.');
  let cur = obj;
  for (const p of parts) {
    if (cur === null || cur === undefined) return undefined;
    cur = cur[p];
  }
  return cur;
}

function sortArray(arr, field) {
  return arr.slice().sort((a, b) => {
    const av = field ? getByPath(a, field) : a;
    const bv = field ? getByPath(b, field) : b;
    let cmp = 0;
    if (av === undefined && bv === undefined) cmp = 0;
    else if (av === undefined) cmp = 1;
    else if (bv === undefined) cmp = -1;
    else if (typeof av === 'number' && typeof bv === 'number') cmp = av - bv;
    else {
      const as = caseInsensitive ? String(av).toLowerCase() : String(av);
      const bs = caseInsensitive ? String(bv).toLowerCase() : String(bv);
      cmp = as < bs ? -1 : (as > bs ? 1 : 0);
    }
    return order === 'asc' ? cmp : -cmp;
  });
}

function doSort() {
  const inp = $('#input').value.trim();
  if (!inp) return;
  try {
    const obj = JSON.parse(inp);
    let result;
    if (mode === 'array') {
      if (!Array.isArray(obj)) {
        $('#status').innerHTML = `<span style="color:var(--gz-accent)">${t('invalidJson')}: ${t('noArray')}</span>`;
        return;
      }
      const field = $('#field-input').value.trim();
      result = sortArray(obj, field);
      if (recursive) result = result.map(sortByKey);
    } else {
      result = sortByKey(obj);
    }
    const formatted = JSON.stringify(result, null, 2);
    $('#output').innerHTML = syntaxHighlight(formatted);
    $('#status').innerHTML = `<span style="color:var(--gz-success)">${t('validJson')}</span>`;
  } catch(e) {
    $('#status').innerHTML = `<span style="color:var(--gz-accent)">${t('invalidJson')}: ${e.message}</span>`;
    $('#output').textContent = e.message;
  }
}

function loadExample() {
  if (mode === 'array') {
    $('#input').value = JSON.stringify([
      {"id":3,"name":"Charlie","score":85},
      {"id":1,"name":"alice","score":92},
      {"id":2,"name":"Bob","score":78}
    ], null, 2);
    $('#field-input').value = 'score';
  } else {
    $('#input').value = JSON.stringify({
      "zebra": 1,
      "apple": {"orange": 2, "banana": 3},
      "mango": [3, 1, 2],
      "cherry": "red"
    }, null, 2);
  }
  doSort();
}

function doClear() {
  $('#input').value = '';
  $('#output').textContent = '';
  $('#status').innerHTML = '';
}

function updateFieldVisibility() {
  const fi = $('#field-wrap');
  if (fi) fi.style.display = mode === 'array' ? '' : 'none';
}

function buildToolbar() {
  $('#toolbar').innerHTML = `
    <select class="gz-select" id="mode-select" onchange="mode=this.value;updateFieldVisibility();doSort()">
      <option value="keys">${t('modeKeys')}</option>
      <option value="array">${t('modeArray')}</option>
    </select>
    <select class="gz-select" onchange="order=this.value;doSort()">
      <option value="asc">${t('ascending')}</option>
      <option value="desc">${t('descending')}</option>
    </select>
    <span id="field-wrap" style="display:none">
      <input id="field-input" class="gz-input" style="width:140px;display:inline-block" placeholder="${t('fieldNamePh')}" oninput="doSort()">
    </span>
    <label style="font-size:.85em;cursor:pointer"><input type="checkbox" ${caseInsensitive?'checked':''} onchange="caseInsensitive=this.checked;doSort()"> ${t('caseInsensitive')}</label>
    <label style="font-size:.85em;cursor:pointer"><input type="checkbox" ${recursive?'checked':''} onchange="recursive=this.checked;doSort()"> ${t('recursive')}</label>
    <button class="gz-btn" onclick="doSort()">${t('sort')}</button>
    <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
    <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>
    <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;
  const ms = $('#mode-select'); if (ms) ms.value = mode;
  const fi = $('#field-input'); if (fi) fi.value = 'score';
  updateFieldVisibility();
}

buildToolbar();

GZ.renderToolPage({
  category: 'dev',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📋', href:'/dev/json.html', name:'JSON Formatter'},
    {icon:'🌳', href:'/dev/json-tree.html', name:'JSON Tree'},
    {icon:'⚖️', href:'/dev/json-diff.html', name:'JSON Diff'},
    {icon:'🔗', href:'/dev/json-merge.html', name:'JSON Merge'},
  ]
});
</script>
