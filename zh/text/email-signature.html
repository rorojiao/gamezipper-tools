<script>
GZI18n.register({
  en: {
    toolTitle: 'Email Signature Generator',
    toolDesc: 'Design a professional HTML email signature with avatar, social links and themes — copy-paste into Gmail, Outlook or Apple Mail.',
    info: 'Personal Info', socials: 'Social Links', theme: 'Style', preview: 'Live Preview',
    name: 'Full Name', title: 'Job Title', company: 'Company', dept: 'Department',
    email: 'Email', phone: 'Phone', website: 'Website', address: 'Address',
    avatar: 'Avatar URL (optional)', tagline: 'Tagline / Quote (optional)',
    th_modern: '✨ Modern', th_classic: '📋 Classic', th_minimal: '⚪ Minimal', th_dark: '🌑 Dark',
    socialLabels: { twitter: 'Twitter / X', linkedin: 'LinkedIn', github: 'GitHub', facebook: 'Facebook', instagram: 'Instagram', youtube: 'YouTube', tiktok: 'TikTok', website: 'Website' },
    copy: '📋 Copy HTML', copyText: '📋 Copy as Text', copyHtml: '📋 Copy HTML', download: '⬇️ Download .html', reset: '🔄 Reset',
    copied: '✓ Copied!',
    step1: 'Fill in your personal info on the left form',
    step2: 'Pick the social links you want to show',
    step3: 'Choose a theme that matches your style',
    step4: 'Copy the HTML and paste it into your email client signature settings',
  },
  zh: {
    toolTitle: '电子邮件签名生成器',
    toolDesc: '设计专业的 HTML 邮件签名，含头像、社交链接和多种主题 — 复制粘贴到 Gmail、Outlook 或 Apple Mail。',
    info: '个人信息', socials: '社交链接', theme: '样式', preview: '实时预览',
    name: '姓名', title: '职位', company: '公司', dept: '部门',
    email: '邮箱', phone: '电话', website: '网站', address: '地址',
    avatar: '头像 URL（可选）', tagline: '个性签名 / 语录（可选）',
    th_modern: '✨ 现代', th_classic: '📋 经典', th_minimal: '⚪ 极简', th_dark: '🌑 暗色',
    socialLabels: { twitter: 'Twitter / X', linkedin: 'LinkedIn', github: 'GitHub', facebook: 'Facebook', instagram: 'Instagram', youtube: 'YouTube', tiktok: 'TikTok', website: '网站' },
    copy: '📋 复制 HTML', copyText: '📋 复制为纯文本', copyHtml: '📋 复制 HTML', download: '⬇️ 下载 .html', reset: '🔄 重置',
    copied: '✓ 已复制！',
    step1: '在左侧表单中填写个人信息',
    step2: '选择要显示的社交链接',
    step3: '选择匹配您风格的签名主题',
    step4: '复制 HTML 粘贴到您的邮件客户端签名设置中',
  }
});

const { $, copyText, t } = GZ;
const SOCIALS = [
  { id: 'twitter',  icon: '𝕏',  url: 'https://x.com/' },
  { id: 'linkedin', icon: 'in', url: 'https://linkedin.com/in/' },
  { id: 'github',   icon: '',   url: 'https://github.com/' },
  { id: 'facebook', icon: 'f',  url: 'https://facebook.com/' },
  { id: 'instagram',icon: '',  url: 'https://instagram.com/' },
  { id: 'youtube',  icon: '▶',  url: 'https://youtube.com/@' },
  { id: 'tiktok',   icon: '♪',  url: 'https://tiktok.com/@' },
  { id: 'website',  icon: '🌐', url: 'https://' },
];

let currentTheme = 'modern';

// Init labels
$('#lblInfo').textContent = t('info');
$('#lblSocials').textContent = t('socials');
$('#lblPreview').textContent = t('preview');
$('#lblTheme').textContent = t('theme');
$('#lblName').textContent = t('name');
$('#lblTitle').textContent = t('title');
$('#lblCompany').textContent = t('company');
$('#lblDept').textContent = t('dept');
$('#lblEmail').textContent = t('email');
$('#lblPhone').textContent = t('phone');
$('#lblWebsite').textContent = t('website');
$('#lblAddress').textContent = t('address');
$('#lblAvatar').textContent = t('avatar');
$('#lblTagline').textContent = t('tagline');
['th_modern','th_classic','th_minimal','th_dark'].forEach(id => $('#'+id).textContent = t(id));

// Render socials
$('#socials').innerHTML = SOCIALS.map(s => `
  <label><input type="checkbox" data-sid="${s.id}"> <span>${s.icon} <span data-slabel="${s.id}"></span></span></label>
`).join('');
SOCIALS.forEach(s => { const el = document.querySelector(`[data-slabel="${s.id}"]`); if (el) el.textContent = t('socialLabels')[s.id] || s.id; });

// Render social URL inputs
const socialInputs = SOCIALS.map(s => `
  <div class="row col-1" data-sinput="${s.id}" style="display:none">
    <label><span>${s.icon} ${t('socialLabels')[s.id] || s.id} URL</span>
      <input type="text" data-surl="${s.id}" placeholder="${s.url}username">
    </label>
  </div>
`).join('');
$('#socials').insertAdjacentHTML('afterend', socialInputs);

document.querySelectorAll('[data-sid]').forEach(cb => {
  cb.addEventListener('change', e => {
    const id = e.target.dataset.sid;
    const input = document.querySelector(`[data-sinput="${id}"]`);
    input.style.display = e.target.checked ? 'block' : 'none';
    render();
  });
});

['f_name','f_title','f_company','f_dept','f_email','f_phone','f_website','f_address','f_avatar','f_tagline'].forEach(id => {
  $('#'+id).addEventListener('input', render);
});
document.querySelectorAll('[data-surl]').forEach(inp => inp.addEventListener('input', render));

document.querySelectorAll('.theme-tab').forEach(b => {
  b.addEventListener('click', () => {
    document.querySelectorAll('.theme-tab').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    currentTheme = b.dataset.theme;
    render();
  });
});

function getVal(id) { return ($('#'+id).value || '').trim(); }
function initials(name) {
  return name.split(/\s+/).filter(Boolean).slice(0,2).map(w=>w[0].toUpperCase()).join('') || '?';
}
function escapeHtml(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function getSocials() {
  const out = [];
  document.querySelectorAll('[data-sid]:checked').forEach(cb => {
    const id = cb.dataset.sid;
    const url = ($(`[data-surl="${id}"]`).value || '').trim();
    if (url) {
      const s = SOCIALS.find(x => x.id === id);
      out.push({ id, icon: s.icon, url: url });
    }
  });
  return out;
}

function render() {
  const data = {
    name: getVal('f_name'),
    title: getVal('f_title'),
    company: getVal('f_company'),
    dept: getVal('f_dept'),
    email: getVal('f_email'),
    phone: getVal('f_phone'),
    website: getVal('f_website'),
    address: getVal('f_address'),
    avatar: getVal('f_avatar'),
    tagline: getVal('f_tagline'),
    socials: getSocials(),
    theme: currentTheme,
  };
  const html = buildSignature(data);
  $('#preview').innerHTML = html;
}

function buildSignature(d) {
  const palettes = {
    modern:  { primary: '#1a73e8', text: '#222', muted: '#666', line: '#1a73e8', avatarBg: '#1a73e8' },
    classic: { primary: '#000', text: '#222', muted: '#555', line: '#999', avatarBg: '#333' },
    minimal: { primary: '#222', text: '#222', muted: '#666', line: '#eee', avatarBg: '#000' },
    dark:    { primary: '#7c4dff', text: '#eee', muted: '#aaa', line: '#7c4dff', avatarBg: '#7c4dff' },
  };
  const p = palettes[d.theme] || palettes.modern;
  const textColor = d.theme === 'dark' ? '#fff' : '#222';
  const bgColor = d.theme === 'dark' ? '#1a1a2e' : 'transparent';
  const isDark = d.theme === 'dark';

  const avatarHtml = d.avatar
    ? `<img src="${escapeHtml(d.avatar)}" alt="avatar" width="72" height="72" style="border-radius:50%;display:block;object-fit:cover;width:72px;height:72px;border:0">`
    : `<div style="width:72px;height:72px;border-radius:50%;background:${p.avatarBg};color:#fff;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:700;font-family:Arial,sans-serif">${escapeHtml(initials(d.name||'?'))}</div>`;

  const socialIconsHtml = d.socials.length ? `
    <tr><td style="padding-top:8px">
      ${d.socials.map(s => `<a href="${escapeHtml(s.url)}" style="display:inline-block;width:24px;height:24px;line-height:24px;text-align:center;background:${p.primary};color:#fff;border-radius:50%;text-decoration:none;margin-right:4px;font-size:13px;font-weight:700;font-family:Arial,sans-serif">${s.icon}</a>`).join('')}
    </td></tr>` : '';

  const taglineHtml = d.tagline ? `<div style="margin-top:6px;font-style:italic;color:${p.muted};font-size:13px">${escapeHtml(d.tagline)}</div>` : '';

  return `
    <table cellpadding="0" cellspacing="0" border="0" style="font-family:Arial,Helvetica,sans-serif;color:${textColor};background:${bgColor};padding:6px">
      <tr>
        <td valign="top" style="padding-right:16px">${avatarHtml}</td>
        <td valign="top" style="border-left:3px solid ${p.line};padding-left:14px">
          <div style="font-size:17px;font-weight:700;color:${p.primary}">${escapeHtml(d.name||'Your Name')}</div>
          <div style="font-size:13px;color:${p.muted};margin-top:2px">${escapeHtml(d.title||'Job Title')}${d.dept ? ' · ' + escapeHtml(d.dept) : ''}${d.company ? ' · <strong style=\'color:'+p.text+'\'>'+escapeHtml(d.company)+'</strong>' : ''}</div>
          ${taglineHtml}
          <table cellpadding="0" cellspacing="0" border="0" style="margin-top:8px;font-size:13px;color:${p.muted}">
            ${d.email ? `<tr><td style="padding:1px 6px 1px 0;opacity:.6">✉</td><td><a href="mailto:${escapeHtml(d.email)}" style="color:${p.text};text-decoration:none">${escapeHtml(d.email)}</a></td></tr>` : ''}
            ${d.phone ? `<tr><td style="padding:1px 6px 1px 0;opacity:.6">📞</td><td><a href="tel:${escapeHtml(d.phone.replace(/\s/g,''))}" style="color:${p.text};text-decoration:none">${escapeHtml(d.phone)}</a></td></tr>` : ''}
            ${d.website ? `<tr><td style="padding:1px 6px 1px 0;opacity:.6">🌐</td><td><a href="${escapeHtml(d.website)}" style="color:${p.text};text-decoration:none">${escapeHtml(d.website.replace(/^https?:\/\//,''))}</a></td></tr>` : ''}
            ${d.address ? `<tr><td style="padding:1px 6px 1px 0;opacity:.6">📍</td><td>${escapeHtml(d.address)}</td></tr>` : ''}
          </table>
          ${socialIconsHtml}
        </td>
      </tr>
    </table>`;
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" id="btnHtml">${t('copyHtml')}</button>
  <button class="gz-btn gz-btn-secondary" id="btnText">${t('copyText')}</button>
  <button class="gz-btn gz-btn-secondary" id="btnDl">${t('download')}</button>
  <button class="gz-btn gz-btn-secondary" id="btnReset">${t('reset')}</button>`;

$('#btnHtml').onclick = () => copyText($('#preview').innerHTML);
$('#btnText').onclick = () => {
  const txt = $('#preview').innerText.replace(/\n{2,}/g,'\n').trim();
  copyText(txt);
};
$('#btnDl').onclick = () => {
  const blob = new Blob([$('#preview').innerHTML], { type: 'text/html' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'email-signature.html';
  a.click();
  URL.revokeObjectURL(a.href);
};
$('#btnReset').onclick = () => {
  ['f_name','f_title','f_company','f_dept','f_email','f_phone','f_website','f_address','f_avatar','f_tagline'].forEach(id => $('#'+id).value = '');
  document.querySelectorAll('[data-sid]').forEach(cb => { cb.checked = false; cb.dispatchEvent(new Event('change')); });
  render();
};

// Pre-fill sample data
$('#f_name').value = 'Jane Doe';
$('#f_title').value = 'Senior Product Engineer';
$('#f_company').value = 'Acme Corp';
$('#f_dept').value = 'Platform';
$('#f_email').value = 'jane.doe@acme.com';
$('#f_phone').value = '+1 (555) 123-4567';
$('#f_website').value = 'https://acme.com';
$('#f_address').value = 'San Francisco, CA';
$('#f_tagline').value = 'Building delightful developer tools.';
render();

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'✍️', href:'/text/handwriting.html', name:'Text to Handwriting'},
    {icon:'🔤', href:'/text/case-converter.html', name:'Case Converter'},
    {icon:'📝', href:'/text/word-counter.html', name:'Word Counter'},
    {icon:'📧', href:'/text/email-extractor.html', name:'Email Extractor'},
  ]
});
</script>
