<script>
GZI18n.register({en:{toolTitle:'Hreflang Checker',toolDesc:'Validate hreflang annotations from HTML, XML sitemaps or language-URL pairs. Detect bad codes, duplicates, relative URLs, missing x-default and self references — all locally.',check:'Check Hreflang',example:'Example',clear:'Clear',lblIn:'HTML, sitemap XML, or code + URL pairs',lblOut:'Hreflang audit report',empty:'Paste hreflang annotations first.',lang:'Language / region',url:'Alternate URL',found:'annotations found',noTags:'No hreflang annotations found',badCode:'Invalid or unusual language/region code',duplicate:'Duplicate hreflang code',badUrl:'URL must be an absolute HTTP(S) address',fragment:'Alternate URL should not include a fragment',noDefault:'No x-default fallback found',noSelf:'No self-referencing hreflang was found for the supplied data-page-url',healthy:'Hreflang syntax looks healthy',noteReturn:'Return-tag checking requires the hreflang markup from each alternate page; compare every page cluster member.',step1:'Paste HTML link tags, XML sitemap xhtml:link elements, or one “language URL” pair per line',step2:'For a self-reference check, add data-page-url to the root HTML element',step3:'Click Check Hreflang to validate language codes, URLs and duplicates',step4:'Add reciprocal return tags on every alternate page and verify the cluster in Search Console'},zh:{toolTitle:'Hreflang 检查器',toolDesc:'验证 HTML、XML 站点地图或语言-URL 配对中的 hreflang 标注。检测错误代码、重复项、相对地址、缺失 x-default 和自引用 — 全部本地完成。',check:'检查 Hreflang',example:'示例',clear:'清空',lblIn:'HTML、站点地图 XML 或代码 + URL 配对',lblOut:'Hreflang 审核报告',empty:'请先粘贴 hreflang 标注。',lang:'语言 / 地区',url:'替代 URL',found:'条标注',noTags:'未找到 hreflang 标注',badCode:'语言/地区代码无效或不常见',duplicate:'hreflang 代码重复',badUrl:'URL 必须是绝对 HTTP(S) 地址',fragment:'替代 URL 不应包含片段',noDefault:'缺少 x-default 后备地址',noSelf:'未找到与 data-page-url 对应的自引用 hreflang',healthy:'Hreflang 语法看起来正常',noteReturn:'检查返回标签需要每个替代页面的 hreflang 标记；请比较集群中的每个页面。',step1:'粘贴 HTML link 标签、XML 站点地图 xhtml:link 元素，或每行一个“语言 URL”配对',step2:'如需检查自引用，请在 HTML 根元素添加 data-page-url',step3:'点击「检查 Hreflang」，验证语言代码、URL 和重复项',step4:'在每个替代页面添加相互返回标签，并在 Search Console 中验证集群'}});
const {$,t}=GZ;function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}function issue(cls,msg){return `<div class="hr-row ${cls}">${cls==='bad'?'✗':cls==='warn'?'⚠':'✓'} ${msg}</div>`}
const COMMON=new Set('af am ar az be bg bn bs ca cs cy da de el en es et eu fa fi fr ga gl gu he hi hr hu hy id is it ja ka kk km kn ko lo lt lv mk ml mn mr ms mt my ne nl no pa pl ps pt ro ru sk sl sq sr sv sw ta te th tr uk ur uz vi zh'.split(' '));
function parse(raw){let entries=[],page='';if(/<(?:html|urlset|url|link|xhtml:link)/i.test(raw)){const doc=new DOMParser().parseFromString(raw,'text/html');page=doc.documentElement.getAttribute('data-page-url')||'';doc.querySelectorAll('[hreflang][href]').forEach(x=>entries.push({code:x.getAttribute('hreflang'),url:x.getAttribute('href')}))}if(!entries.length){raw.split(/\r?\n/).forEach(line=>{line=line.trim();if(!line)return;const m=line.match(/^([A-Za-z]{2,3}(?:-[A-Za-z]{2}|-[A-Za-z]{4})?|x-default)\s*[,|\t ]\s*(https?:\/\/\S+)$/i);if(m)entries.push({code:m[1],url:m[2]})})}return{entries,page}}
function validCode(code){if(code.toLowerCase()==='x-default')return true;const p=code.split('-');if(!COMMON.has(p[0].toLowerCase()))return false;if(p.length===1)return true;if(p.length>2)return false;return /^[A-Za-z]{2}$/.test(p[1])||/^[A-Za-z]{4}$/.test(p[1])}
function check(){const raw=$('#input').value.trim(),out=$('#output');if(!raw){out.textContent=t('empty');return}const {entries,page}=parse(raw);if(!entries.length){out.innerHTML=issue('bad',t('noTags'));return}let html=`<div style="margin-bottom:10px"><b>${entries.length}</b> ${t('found')}</div><table class="hr-table"><thead><tr><th>${t('lang')}</th><th>${t('url')}</th></tr></thead><tbody>`;entries.forEach(e=>html+=`<tr><td>${esc(e.code)}</td><td>${esc(e.url)}</td></tr>`);html+='</tbody></table>';let errs=0,warns=0;const seen=new Set();entries.forEach(e=>{const code=e.code.toLowerCase();if(!validCode(code)){errs++;html+=issue('bad',`${t('badCode')}: ${esc(e.code)}`)}if(seen.has(code)){errs++;html+=issue('bad',`${t('duplicate')}: ${esc(e.code)}`)}seen.add(code);try{const u=new URL(e.url);if(!/^https?:$/.test(u.protocol))throw 0;if(u.hash){warns++;html+=issue('warn',`${t('fragment')}: ${esc(e.url)}`)}}catch(x){errs++;html+=issue('bad',`${t('badUrl')}: ${esc(e.url)}`)}});if(!seen.has('x-default')){warns++;html+=issue('warn',t('noDefault'))}if(page&&!entries.some(e=>{try{return new URL(e.url).href===new URL(page).href}catch(x){return false}})){warns++;html+=issue('warn',t('noSelf'))}if(!errs&&!warns)html+=issue('good',t('healthy'));html+=`<div class="hr-row" style="margin-top:10px;color:var(--text2)">ℹ ${t('noteReturn')}</div>`;out.innerHTML=html}
function example(){ $('#input').value=`<html data-page-url="https://example.com/en/product">\n<head>\n<link rel="alternate" hreflang="en" href="https://example.com/en/product">\n<link rel="alternate" hreflang="en-GB" href="https://example.com/en-gb/product">\n<link rel="alternate" hreflang="zh-CN" href="https://example.com/zh/product">\n<link rel="alternate" hreflang="x-default" href="https://example.com/product">\n</head></html>`;check()}
$('#toolbar').innerHTML=`<button class="gz-btn" onclick="check()">${t('check')}</button><button class="gz-btn gz-btn-secondary" onclick="example()">${t('example')}</button><button class="gz-btn gz-btn-secondary" onclick="$('#input').value='';$('#output').innerHTML=''">${t('clear')}</button>`;$('#lbl-in').textContent=t('lblIn');$('#lbl-out').textContent=t('lblOut');GZ.renderToolPage({category:'seo',titleKey:'toolTitle',descKey:'toolDesc',howToSteps:['step1','step2','step3','step4'],related:[{icon:'🔗',href:'/seo/canonical-tag-checker.html',name:'Canonical Checker'},{icon:'🗺️',href:'/seo/sitemap-validator.html',name:'Sitemap Validator'},{icon:'🏷️',href:'/seo/meta-tag-generator.html',name:'Meta Tag Generator'},{icon:'🤖',href:'/seo/robots-validator.html',name:'Robots Validator'}]});
