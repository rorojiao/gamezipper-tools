<script>
GZI18n.register({
  en: {
    toolTitle: 'Sequence Memory Test',
    toolDesc: 'Memorize an ever-growing sequence of flashing tiles. How many can you remember? Free brain training game — no signup, plays right in your browser.',
    level: 'Level',
    best: 'Best',
    start: 'Start',
    restart: 'Restart',
    watch: '👀 Watch the sequence...',
    repeat: '✋ Your turn — repeat the sequence',
    correct: '✓ Correct! Next level...',
    gameover: '✗ Wrong! Game over',
    step1: 'Click Start to begin a new game',
    step2: 'Watch the tiles light up and remember the order',
    step3: 'Click the tiles in the exact same order',
    step4: 'Each correct round adds one more step — go as far as you can',
  },
  zh: {
    toolTitle: '序列记忆测试',
    toolDesc: '记住不断增长的闪烁方块序列，看你能记到第几关？免费大脑训练游戏 — 无需注册，浏览器直接玩。',
    level: '关卡',
    best: '最佳',
    start: '开始',
    restart: '重新开始',
    watch: '👀 请观看序列...',
    repeat: '✋ 轮到你了 — 请按顺序点击',
    correct: '✓ 正确！进入下一关...',
    gameover: '✗ 错了！游戏结束',
    step1: '点击「开始」开始新游戏',
    step2: '观看方块亮起并记住顺序',
    step3: '按完全相同的顺序点击方块',
    step4: '每答对一轮增加一步 — 尽你所能走得更远',
  }
});

const { $, t } = GZ;
const NUM_TILES = 9;
let sequence = [];
let inputIndex = 0;
let level = 0;
let best = parseInt(localStorage.getItem('gz-seqmem-best') || '0', 10);
let phase = 'idle'; // idle | showing | input | over

$('#best-level').textContent = best;

function buildBoard() {
  const board = $('#board');
  board.innerHTML = '';
  const icons = ['🔴','🟠','🟡','🟢','🔵','🟣','⚫','⚪','🟤'];
  for (let i = 0; i < NUM_TILES; i++) {
    const tile = document.createElement('div');
    tile.className = 'seq-tile';
    tile.textContent = icons[i] || '⬜';
    tile.dataset.idx = i;
    tile.onclick = () => handleClick(i);
    board.appendChild(tile);
  }
}

function setStatus(msg) { $('#status').textContent = msg; }

function flashTile(idx, duration = 500) {
  return new Promise(res => {
    const tile = $('#board').children[idx];
    tile.classList.add('flash');
    setTimeout(() => { tile.classList.remove('flash'); res(); }, duration);
  });
}

async function playSequence() {
  phase = 'showing';
  setStatus(t('watch'));
  await sleep(700);
  for (const idx of sequence) {
    await flashTile(idx);
    await sleep(220);
  }
  phase = 'input';
  setStatus(t('repeat'));
  inputIndex = 0;
}

function sleep(ms){return new Promise(r=>setTimeout(r,ms))}

async function handleClick(idx) {
  if (phase !== 'input') return;
  const tile = $('#board').children[idx];
  if (sequence[inputIndex] === idx) {
    tile.classList.add('correct');
    setTimeout(()=>tile.classList.remove('correct'),300);
    inputIndex++;
    if (inputIndex >= sequence.length) {
      phase = 'showing';
      setStatus(t('correct'));
      await sleep(900);
      nextLevel();
    }
  } else {
    tile.classList.add('wrong');
    gameOver();
  }
}

function nextLevel() {
  level++;
  $('#cur-level').textContent = level;
  sequence.push(Math.floor(Math.random() * NUM_TILES));
  playSequence();
}

function startGame() {
  level = 0;
  sequence = [];
  $('#cur-level').textContent = 0;
  $('#status').textContent = '';
  nextLevel();
}

function gameOver() {
  phase = 'over';
  setStatus(t('gameover'));
  if (level > best) {
    best = level;
    localStorage.setItem('gz-seqmem-best', String(best));
    $('#best-level').textContent = best;
  }
  renderControls(true);
}

function renderControls(gameOver) {
  $('#controls').innerHTML = `<button class="gz-btn" onclick="startGame()">${t(gameOver?'restart':'start')}</button>`;
}

buildBoard();
renderControls(false);

GZ.renderToolPage({
  category: 'fun',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🧠', href:'/fun/number-memory-test.html', name:'Number Memory'},
    {icon:'🎯', href:'/fun/reaction-speed-test.html', name:'Reaction Speed Test'},
    {icon:'👁️', href:'/fun/visual-memory-test.html', name:'Visual Memory'},
    {icon:'⚡', href:'/fun/typing-speed-test.html', name:'Typing Speed'},
  ]
});
</script>
