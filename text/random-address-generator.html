const STATES = [
  ['AL','Alabama','350','369'],['AK','Alaska','995','999'],['AZ','Arizona','850','865'],['AR','Arkansas','716','729'],['CA','California','900','961'],['CO','Colorado','800','816'],['CT','Connecticut','060','069'],['DE','Delaware','197','199'],['FL','Florida','320','349'],['GA','Georgia','300','319'],['HI','Hawaii','967','968'],['ID','Idaho','832','838'],['IL','Illinois','600','629'],['IN','Indiana','460','479'],['IA','Iowa','500','528'],['KS','Kansas','660','679'],['KY','Kentucky','400','427'],['LA','Louisiana','700','714'],['ME','Maine','039','049'],['MD','Maryland','206','219'],['MA','Massachusetts','010','027'],['MI','Michigan','480','499'],['MN','Minnesota','550','567'],['MS','Mississippi','386','397'],['MO','Missouri','630','658'],['MT','Montana','590','599'],['NE','Nebraska','680','693'],['NV','Nevada','889','898'],['NH','New Hampshire','030','038'],['NJ','New Jersey','070','089'],['NM','New Mexico','870','884'],['NY','New York','100','149'],['NC','North Carolina','270','289'],['ND','North Dakota','580','588'],['OH','Ohio','430','458'],['OK','Oklahoma','730','749'],['OR','Oregon','970','979'],['PA','Pennsylvania','150','196'],['RI','Rhode Island','028','029'],['SC','South Carolina','290','299'],['SD','South Dakota','570','577'],['TN','Tennessee','370','385'],['TX','Texas','750','799'],['UT','Utah','840','847'],['VT','Vermont','050','059'],['VA','Virginia','220','246'],['WA','Washington','980','994'],['WV','West Virginia','247','268'],['WI','Wisconsin','530','549'],['WY','Wyoming','820','831']
];

function rndInt(max){ return crypto.getRandomValues(new Uint32Array(1))[0] % max; }
function pick(arr){ return arr[rndInt(arr.length)]; }
function pad(n,len){ return String(n).padStart(len,'0'); }

function genZip(s){
  const lo = parseInt(s[2]), hi = parseInt(s[3]);
  const base = lo + rndInt(hi-lo+1);
  return pad(base,3) + pad(rndInt(100),2);
}
function genPlus4(){ return pad(rndInt(10000),4); }
function genPhone(){
  const a = 200 + rndInt(700), b = 200 + rndInt(700);
  return `(${a}) ${pad(b,3)}-${pad(rndInt(10000),4)}`;
}
function genEmail(first,last){
  const dom = ['example.com','testmail.com','mail.com','demo.org','sample.net'];
  const num = rndInt(100);
  const variants = [first.toLowerCase()+'.'+last.toLowerCase(), first.toLowerCase()+num, last.toLowerCase()+num, first[0].toLowerCase()+last.toLowerCase()];
  return pick(variants)+'@'+pick(dom);
}

function genOne(){
  const s = pick(STATES);
  const zip = genZip(s);
  const plus4 = $('#incPlus4').checked ? '-'+genPlus4() : '';
  const a = {
    name: $('#incName').checked ? `${pick(FIRST)} ${pick(LAST)}` : '',
    street: `${1 + rndInt(9999)} ${pick(STREETS)}`,
    city: stateCity(s),
    state: s[0],
    stateName: s[1],
    zip: zip + plus4,
    phone: $('#incPhone').checked ? genPhone() : '',
  };
  if($('#incEmail').checked){
    const parts = a.name ? a.name.split(' ') : [pick(FIRST),pick(LAST)];
    a.email = genEmail(parts[0],parts[1]);
  }
  return a;
}

// City pools keyed by state code (representative cities)
const CITIES = {AL:['Birmingham','Montgomery','Mobile','Huntsville'],AK:['Anchorage','Fairbanks','Juneau'],AZ:['Phoenix','Tucson','Mesa','Scottsdale'],AR:['Little Rock','Fort Smith','Fayetteville'],CA:['Los Angeles','San Diego','San Jose','San Francisco','Sacramento'],CO:['Denver','Colorado Springs','Aurora','Fort Collins'],CT:['Hartford','New Haven','Stamford','Bridgeport'],DE:['Wilmington','Dover','Newark'],FL:['Jacksonville','Miami','Tampa','Orlando','Tallahassee'],GA:['Atlanta','Augusta','Columbus','Savannah'],HI:['Honolulu','Hilo','Kailua'],ID:['Boise','Meridian','Nampa'],IL:['Chicago','Aurora','Naperville','Springfield'],IN:['Indianapolis','Fort Wayne','Evansville'],IA:['Des Moines','Cedar Rapids','Davenport'],KS:['Wichita','Overland Park','Topeka'],KY:['Louisville','Lexington','Bowling Green'],LA:['New Orleans','Baton Rouge','Shreveport'],ME:['Portland','Augusta','Bangor'],MD:['Baltimore','Rockville','Frederick','Annapolis'],MA:['Boston','Worcester','Springfield','Cambridge'],MI:['Detroit','Grand Rapids','Warren','Lansing'],MN:['Minneapolis','Saint Paul','Rochester'],MS:['Jackson','Gulfport','Biloxi'],MO:['Kansas City','St. Louis','Springfield','Columbia'],MT:['Billings','Missoula','Helena'],NE:['Omaha','Lincoln','Bellevue'],NV:['Las Vegas','Henderson','Reno','Carson City'],NH:['Manchester','Nashua','Concord'],NJ:['Newark','Jersey City','Paterson','Trenton'],NM:['Albuquerque','Las Cruces','Santa Fe'],NY:['New York','Buffalo','Rochester','Albany','Syracuse'],NC:['Charlotte','Raleigh','Greensboro','Durham'],ND:['Fargo','Bismarck','Grand Forks'],OH:['Columbus','Cleveland','Cincinnati','Toledo'],OK:['Oklahoma City','Tulsa','Norman'],OR:['Portland','Salem','Eugene','Bend'],PA:['Philadelphia','Pittsburgh','Allentown','Harrisburg'],RI:['Providence','Warwick','Cranston'],SC:['Charleston','Columbia','Greenville'],SD:['Sioux Falls','Rapid City','Pierre'],TN:['Nashville','Memphis','Knoxville','Chattanooga'],TX:['Houston','Dallas','Austin','San Antonio','Fort Worth'],UT:['Salt Lake City','Provo','Ogden'],VT:['Burlington','Montpelier','Rutland'],VA:['Virginia Beach','Norfolk','Richmond','Arlington'],WA:['Seattle','Spokane','Tacoma','Olympia'],WV:['Charleston','Huntington','Morgantown'],WI:['Milwaukee','Madison','Green Bay'],WY:['Cheyenne','Casper','Laramie']};
function stateCity(s){ const c = CITIES[s[0]]; return c ? c[rndInt(c.length)] : s[1]; }

function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function renderCard(a,idx){
  const lines = [];
  if(a.name) lines.push(`<div class="nm">${esc(a.name)}</div>`);
  lines.push(esc(a.street));
  lines.push(`${esc(a.city)}, ${esc(a.state)} ${esc(a.zip)}`);
  if(a.phone) lines.push(`<span class="ph">${esc(a.phone)}</span>`);
  if(a.email) lines.push(`<span style="color:var(--text2)">${esc(a.email)}</span>`);
  return `<div class="addr-card">${lines.join('<br>')}<div class="act"><button onclick="copyCard(${idx})">${t('copyAddr')}</button></div></div>`;
}

function doGenerate(){
  const n = Math.max(1, Math.min(100, parseInt($('#count').value)||12));
  lastAddr = [];
  for(let i=0;i<n;i++) lastAddr.push(genOne());
  const fmt = $('#format').value;
  if(fmt==='card'){
    $('#output').innerHTML = lastAddr.map((a,i)=>renderCard(a,i)).join('');
  } else if(fmt==='json'){
    $('#output').innerHTML = `<textarea readonly style="width:100%;min-height:300px;background:var(--glass);border:1px solid var(--border);border-radius:10px;padding:12px;font-family:monospace;font-size:.85em;color:var(--text)">${esc(JSON.stringify(lastAddr,null,2))}</textarea>`;
  } else {
    const head = ['name','street','city','state','zip','phone','email'].filter(h=> lastAddr.some(a=>a[h])).join(',');
    const rows = lastAddr.map(a=> [a.name,a.street,a.city,a.state,a.zip,a.phone,a.email].filter((_,i)=>true).map(v=>`"${(v||'').replace(/"/g,'""')}"`).join(','));
    $('#output').innerHTML = `<textarea readonly style="width:100%;min-height:300px;background:var(--glass);border:1px solid var(--border);border-radius:10px;padding:12px;font-family:monospace;font-size:.85em;color:var(--text)">${esc(head+'\n'+rows.join('\n'))}</textarea>`;
  }
  $('#stats').innerHTML = '<span style="color:var(--gz-success)">'+t('statLine').replace('%1',lastAddr.length)+'</span>';
}

function copyCard(idx){
  const a = lastAddr[idx];
  const parts = [];
  if(a.name) parts.push(a.name);
  parts.push(a.street);
  parts.push(`${a.city}, ${a.state} ${a.zip}`);
  if(a.phone) parts.push(a.phone);
  if(a.email) parts.push(a.email);
  copyText(parts.join('\n'));
}

function doCopyAll(){
  if(!lastAddr.length) return;
  copyText(lastAddr.map(a=>{
    const parts = [];
    if(a.name) parts.push(a.name);
    parts.push(a.street);
    parts.push(`${a.city}, ${a.state} ${a.zip}`);
    if(a.phone) parts.push(a.phone);
    if(a.email) parts.push(a.email);
    return parts.join('\n');
  }).join('\n\n'));
}

function doDownload(){
  if(!lastAddr.length){ doGenerate(); if(!lastAddr.length) return; }
  const head = 'name,street,city,state,zip,phone,email';
  const rows = lastAddr.map(a=> [a.name,a.street,a.city,a.state,a.zip,a.phone,a.email].map(v=>`"${(v||'').replace(/"/g,'""')}"`).join(','));
  const csv = head+'\n'+rows.join('\n');
  const blob = new Blob([csv],{type:'text/csv;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href=url; a.download='random-addresses.csv';
  document.body.appendChild(a); a.click();
  setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(url);},100);
}

function doClear(){ $('#output').innerHTML=''; $('#stats').textContent=''; lastAddr=[]; }
