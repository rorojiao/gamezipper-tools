<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "How much down payment do I need for a house?", "acceptedAnswer": {"@type": "Answer", "text": "Conventional loans require as little as 3% down, FHA loans 3.5%, VA and USDA loans 0%. However, putting less than 20% down on a conventional loan means you pay private mortgage insurance (PMI), which typically adds 0.3-1.5% of the loan per year until you reach 20% equity."}}, {"@type": "Question", "name": "Is 20% down always the best choice?", "acceptedAnswer": {"@type": "Answer", "text": "Not necessarily. While 20% avoids PMI and lowers your payment, tying up that cash has an opportunity cost. With today's mortgage rates, putting 10-15% down and investing the difference can sometimes beat the PMI cost. Run the numbers with this calculator and compare total cost vs. invested cash."}}, {"@type": "Question", "name": "How is PMI calculated?", "acceptedAnswer": {"@type": "Answer", "text": "PMI is usually 0.3% to 1.5% of the original loan amount per year, paid monthly. The exact rate depends on your credit score, loan-to-value ratio, and loan type. A borrower with excellent credit might pay 0.3%, while a lower-credit borrower could pay 1.5% or more."}}, {"@type": "Question", "name": "Does this calculator store my information?", "acceptedAnswer": {"@type": "Answer", "text": "No. All calculations run entirely in your browser. Nothing is uploaded, saved, or shared with any server."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="dp-form">
      <label><span data-i18n="lblPrice"></span><input type="number" id="price" min="0" step="1000" value="400000"></label>
      <label><span data-i18n="lblAPR"></span><input type="number" id="apr" min="0" step="0.05" value="6.8"></label>
      <label><span data-i18n="lblTerm"></span>
        <select id="term">
          <option value="180">15 years</option>
          <option value="360" selected>30 years</option>
        </select>
      </label>
      <label><span data-i18n="lblPmiRate"></span><input type="number" id="pmiRate" min="0" step="0.05" value="0.6"></label>
    </div>
    <div class="dp-pct" id="pctButtons">
      <button data-p="3" onclick="setPct(3)">3% Down</button>
      <button data-p="5" onclick="setPct(5)">5% Down</button>
      <button data-p="10" onclick="setPct(10)">10% Down</button>
      <button data-p="15" onclick="setPct(15)">15% Down</button>
      <button data-p="20" class="active" onclick="setPct(20)">20% Down</button>
    </div>
    <div class="dp-tiles" id="tiles"></div>
    <div class="dp-compare" id="compare"></div>
    <div class="dp-tip">💡 <span id="tip"></span></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Down Payment Calculator',
    toolDesc: 'See exactly how your down payment changes your monthly mortgage payment, PMI, loan amount and total interest. Compare 3%, 5%, 10%, 15% and 20% down side by side to decide what fits your budget. 100% private — runs in your browser.',
    lblPrice: 'Home Price ($)',
    lblAPR: 'Mortgage Rate / APR (%)',
    lblTerm: 'Loan Term',
    lblPmiRate: 'PMI Annual Rate (%)',
    tileDown: 'Down Payment',
    tileLoan: 'Loan Amount',
    tileMonthly: 'Monthly P&I',
    tilePmi: 'Monthly PMI',
    tileTotal: 'Total Interest',
    tip: 'Tip: Each 5% extra down payment on a $400K home at ~7% saves roughly $135/month in P&I plus PMI. But don\'t drain your emergency fund — keep 3-6 months of expenses in reserve even if it means a smaller down payment.',
    step1: 'Enter the home price and the mortgage rate you expect',
    step2: 'Set the PMI rate (0.3% for great credit, up to 1.5% for fair)',
    step3: 'Click each down-payment percentage to compare',
    step4: 'Pick the scenario that balances monthly cost with your savings',
  },
  zh: {
    toolTitle: '首付计算器',
    toolDesc: '查看首付如何改变你的月供、PMI、贷款金额和总利息。并排对比 3%、5%、10%、15% 和 20% 首付，决定最适合预算的方案。100% 私密 — 浏览器本地运行。',
    lblPrice: '房屋价格 ($)',
    lblAPR: '房贷利率 / APR (%)',
    lblTerm: '贷款期限',
    lblPmiRate: 'PMI 年费率 (%)',
    tileDown: '首付',
    tileLoan: '贷款金额',
    tileMonthly: '月供本金利息',
    tilePmi: '月度 PMI',
    tileTotal: '总利息',
    tip: '提示：在 40 万美元房屋上每多付 5% 首付（约 7% 利率），每月可省约 135 美元本金利息加 PMI。但不要掏空应急金 — 即使首付少一点，也要保留 3-6 个月的生活费储备。',
    step1: '输入房屋价格和预期房贷利率',
    step2: '设置 PMI 费率（信用极好约 0.3%，一般最高 1.5%）',
    step3: '点击各首付比例进行对比',
    step4: '选择月供与储蓄平衡的方案',
  }
});

const { $, $$, t } = GZ;
$$('[data-i18n]').forEach(el => { el.textContent = t(el.dataset.i18n); });

let currentPct = 20;

function setPct(p) {
  currentPct = p;
  document.querySelectorAll('#pctButtons button').forEach(b => b.classList.toggle('active', +b.dataset.p === p));
  render();
}

function monthlyPayment(principal, monthlyRate, months) {
  if (principal <= 0) return 0;
  if (monthlyRate === 0) return principal / months;
  const f = Math.pow(1 + monthlyRate, months);
  return principal * (monthlyRate * f) / (f - 1);
}

function render() {
  const price = Math.max(0, +$('#price').value || 0);
  const apr = Math.max(0, +$('#apr').value || 0);
  const months = +$('#term').value || 360;
  const pmiRate = Math.max(0, +$('#pmiRate').value || 0) / 100;
  const monthlyRate = apr / 100 / 12;

  // Selected scenario tiles
  const downAmt = price * currentPct / 100;
  const loan = Math.max(0, price - downAmt);
  const pi = monthlyPayment(loan, monthlyRate, months);
  const needsPmi = currentPct < 20;
  const pmiMonthly = needsPmi ? (loan * pmiRate) / 12 : 0;
  const totalInterest = Math.max(0, pi * months - loan);

  const cfmt = v => '$' + v.toFixed(0).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
  $('#tiles').innerHTML = `
    <div class="dp-tile"><div class="num">${cfmt(downAmt)}</div><div class="lbl">${t('tileDown')} (${currentPct}%)</div></div>
    <div class="dp-tile"><div class="num">${cfmt(loan)}</div><div class="lbl">${t('tileLoan')}</div></div>
    <div class="dp-tile"><div class="num">$${pi.toFixed(0)}</div><div class="lbl">${t('tileMonthly')}</div></div>
    <div class="dp-tile"><div class="num">${needsPmi ? '$'+pmiMonthly.toFixed(0) : '—'}</div><div class="lbl">${t('tilePmi')}</div></div>
    <div class="dp-tile"><div class="num">${cfmt(totalInterest)}</div><div class="lbl">${t('tileTotal')}</div></div>`;

  // Comparison table
  const pcts = [3, 5, 10, 15, 20, 25];
  const fmt2 = v => '$' + v.toFixed(0).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
  let html = '<table><thead><tr><th>Down %</th><th>Cash Down</th><th>Loan Amount</th><th>Monthly P&amp;I</th><th>Monthly PMI</th><th>Total Monthly</th><th>Total Interest</th></tr></thead><tbody>';
  pcts.forEach(p => {
    const d = price * p / 100;
    const l = Math.max(0, price - d);
    const pay = monthlyPayment(l, monthlyRate, months);
    const pm = p < 20 ? (l * pmiRate) / 12 : 0;
    const ti = Math.max(0, pay * months - l);
    const isCur = p === currentPct ? ' highlight' : '';
    html += `<tr class="${isCur.trim()}" style="${isCur?'background:rgba(78,205,196,.08)':''}" onclick="setPct(${p})" >
      <td>${p}%</td><td>${fmt2(d)}</td><td>${fmt2(l)}</td>
      <td>$${pay.toFixed(0)}</td><td>${p<20?'$'+pm.toFixed(0):'—'}</td>
      <td>$${(pay+pm).toFixed(0)}</td><td>${fmt2(ti)}</td></tr>`;
  });
  html += '</tbody></table>';
  $('#compare').innerHTML = html;
  $('#tip').textContent = t('tip');
}

$('#toolbar').innerHTML = '';
['price','apr','term','pmiRate'].forEach(id => {
  $('#' + id).addEventListener('input', render);
  $('#' + id).addEventListener('change', render);
});

render();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🏠', href:'/calc/mortgage-calculator.html', name:'Mortgage Calculator'},
    {icon:'🏘️', href:'/calc/home-affordability-calculator.html', name:'Home Affordability'},
    {icon:'🔒', href:'/calc/pmi-calculator.html', name:'PMI Calculator'},
    {icon:'💰', href:'/calc/closing-cost-calculator.html', name:'Closing Cost Calculator'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
