<script>
GZI18n.register({
  en: {
    toolTitle: 'Backwards Text Generator',
    toolDesc: 'Reverse text, flip wording, reverse each word\'s letters or mirror text for fun social posts, secret messages and puzzles. Free and instant.',
    lblIn: 'Your Text',
    lblOut: 'Backwards Text',
    mode: 'Mode',
    modeReverse: 'Reverse all text',
    modeWords: 'Reverse word order',
    modeWordLetters: 'Reverse each word\'s letters',
    modeMirror: 'Mirror (CSS flip)',
    step1: 'Type or paste your text into the input area',
    step2: 'Pick a reverse mode from the dropdown',
    step3: 'The backwards version appears instantly in the output',
    step4: 'Click Copy to paste it into social media or messages',
  },
  zh: {
    toolTitle: '反向文字生成器',
    toolDesc: '反转文字、翻转词序、反转每个单词的字母或镜像翻转文字，用于趣味社交帖、秘密消息和谜题。免费且即时。',
    lblIn: '你的文字',
    lblOut: '反向文字',
    mode: '模式',
    modeReverse: '反转全部文字',
    modeWords: '反转词序',
    modeWordLetters: '反转每个单词的字母',
    modeMirror: '镜像翻转（CSS 翻转）',
    step1: '在输入区输入或粘贴文字',
    step2: '从下拉菜单选择反转模式',
    step3: '反向版本即时出现在输出区',
    step4: '点击「复制」粘贴到社交媒体或消息中',
  }
});

const { $, copyText, t } = GZ;

function convert() {
  const text = $('#input').value;
  if (!text) { $('#output').innerHTML = ''; $('#status').innerHTML = ''; return; }
  const mode = $('#opt-mode').value;
  let result;
  if (mode === 'reverse') {
    result = [...text].reverse().join('');
  } else if (mode === 'words') {
    result = text.split(/(\s+)/).reverse().join('');
  } else if (mode === 'wordLetters') {
    result = text.split(/(\s+)/).map(seg => /\s/.test(seg) ? seg : [...seg].reverse().join('')).join('');
  } else if (mode === 'mirror') {
    result = '';
    $('#output').innerHTML = `<span class="mirror">${escapeHtml(text)}</span>`;
    $('#status').innerHTML = `<span style="color:var(--gz-success)">✓ ${text.length} chars mirrored</span>`;
    return;
  }
  $('#output').textContent = result;
  $('#status').innerHTML = `<span style="color:var(--gz-success)">✓ ${result.length} chars</span>`;
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function loadExample() {
  $('#input').value = 'Hello World! This text is now backwards.';
  convert();
}

function doClear() { $('#input').value = ''; $('#output').innerHTML = ''; $('#status').innerHTML = ''; }

$('#input').addEventListener('input', convert);

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

$('#opts').innerHTML = `
  <label>${t('mode')}: <select id="opt-mode">
    <option value="reverse">${t('modeReverse')}</option>
    <option value="words">${t('modeWords')}</option>
    <option value="wordLetters">${t('modeWordLetters')}</option>
    <option value="mirror">${t('modeMirror')}</option>
  </select></label>`;

$('#opt-mode').addEventListener('change', convert);

$('#lbl-in').textContent = t('lblIn');
$('#lbl-out').textContent = t('lblOut');

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🙃', href:'/text/upside-down-text.html', name:'Upside Down Text'},
    {icon:'🔁', href:'/text/reverse-words.html', name:'Reverse Words'},
    {icon:'🔀', href:'/text/text-shuffler.html', name:'Text Shuffler'},
    {icon:'❌', href:'/text/crossed-out-text.html', name:'Crossed Out Text'},
  ]
});
</script>
