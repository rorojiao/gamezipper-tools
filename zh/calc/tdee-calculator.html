<style>
.tdee-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;margin-bottom:18px}
.tdee-card{background:var(--glass);border:1px solid var(--border);border-radius:14px;padding:18px}
.tdee-card label{display:block;font-size:.8rem;margin-bottom:6px;color:var(--text2);font-weight:600}
.tdee-card input,.tdee-card select{width:100%;padding:9px 12px;border-radius:8px;border:1px solid var(--border);background:var(--glass2);color:var(--text);font-size:1rem;font-family:inherit}
.tdee-results{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-top:18px}
.tdee-result{background:var(--glass);border:1px solid var(--border);border-radius:14px;padding:18px;text-align:center}
.tdee-result .val{font-size:1.8rem;font-weight:900;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.tdee-result .lbl{font-size:.78rem;color:var(--text2);margin-top:4px}
.tdee-result.loss{border-color:rgba(233,69,96,.3)}.tdee-result.gain{border-color:rgba(0,214,114,.3)}
.tdee-macros{margin-top:18px;background:var(--glass);border:1px solid var(--border);border-radius:14px;padding:18px}
.tdee-macros h3{font-size:1rem;margin-bottom:12px;color:var(--accent)}
.tdee-macros table{width:100%;border-collapse:collapse;font-size:.85rem}
.tdee-macros td{padding:8px 12px;border-bottom:1px solid var(--border)}

<script type="application/ld+json">{"@context":"https://schema.org","@type":"WebApplication","name":"TDEE Calculator","description":"Calculate your Total Daily Energy Expenditure (TDEE) and daily calorie needs with macro recommendations.","url": "https://tools.gamezipper.com/zh/calc/tdee-calculator.html","applicationCategory":"HealthApplication","operatingSystem":"Web Browser","offers":{"@type":"Offer","price":"0"}}</script>
<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is TDEE?", "acceptedAnswer": {"@type": "Answer", "text": "TDEE stands for Total Daily Energy Expenditure — the total number of calories your body burns in a 24-hour period. It includes your basal metabolic rate (BMR) plus calories burned through activity, digestion, and movement."}}, {"@type": "Question", "name": "How accurate is the TDEE calculator?", "acceptedAnswer": {"@type": "Answer", "text": "The calculator uses the Mifflin-St Jeor BMR equation, which is considered one of the most accurate for the general population. Actual calorie needs can vary by 5-10% based on genetics, muscle mass, hormones, and daily activity."}}, {"@type": "Question", "name": "How many calories should I eat to lose weight?", "acceptedAnswer": {"@type": "Answer", "text": "A safe calorie deficit for weight loss is typically 300-500 calories below your TDEE, which results in about 0.5 kg (1 lb) of fat loss per week. The calculator provides a 500-calorie deficit recommendation by default."}}, {"@type": "Question", "name": "What are macros and how are they calculated?", "acceptedAnswer": {"@type": "Answer", "text": "Macros (macronutrients) are protein, carbs, and fat. The calculator uses a balanced split of 30% protein, 40% carbs, and 30% fat, which is a common starting point for general fitness and health goals."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="tdee-grid">
      <div class="tdee-card">
        <label id="lbl-gender"></label>
        <select id="gender">
          <option value="male" data-i18n="male"></option>
          <option value="female" data-i18n="female"></option>
        </select>
      </div>
      <div class="tdee-card">
        <label id="lbl-age"></label>
        <input type="number" id="age" min="10" max="100" value="30">
      </div>
      <div class="tdee-card">
        <label id="lbl-height"></label>
        <input type="number" id="height" min="100" max="250" value="175">
      </div>
      <div class="tdee-card">
        <label id="lbl-weight"></label>
        <input type="number" id="weight" min="30" max="300" value="70">
      </div>
      <div class="tdee-card">
        <label id="lbl-activity"></label>
        <select id="activity">
          <option value="1.2" data-i18n="sedentary"></option>
          <option value="1.375" data-i18n="light" selected></option>
          <option value="1.55" data-i18n="moderate"></option>
          <option value="1.725" data-i18n="active"></option>
          <option value="1.9" data-i18n="veryActive"></option>
        </select>
      </div>
    </div>
    <div class="tdee-results" id="results"></div>
    <div class="tdee-macros" id="macros"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'TDEE Calculator',
    toolDesc: 'Calculate your Total Daily Energy Expenditure (TDEE) and daily calorie needs for any fitness goal.',
    step1: 'Enter your gender, age, height and weight',
    step2: 'Choose your activity level (sedentary, light, moderate, active, very active)',
    step3: 'View your BMR, TDEE, and calorie targets for cut / maintain / bulk',
    step4: 'Review macro recommendations for protein, carbs and fat',
    gender: 'Gender', age: 'Age (years)', height: 'Height (cm)', weight: 'Weight (kg)',
    activity: 'Activity Level',
    male: 'Male', female: 'Female',
    sedentary: 'Sedentary (desk job, no exercise)',
    light: 'Lightly active (1-3 days/week)',
    moderate: 'Moderately active (3-5 days/week)',
    active: 'Active (6-7 days/week)',
    veryActive: 'Very active (athlete / physical job)',
    bmr: 'BMR', tdee: 'TDEE (maintain)',
    cut: 'Weight Loss (-500 kcal)', bulk: 'Muscle Gain (+300 kcal)',
    macrosTitle: 'Recommended Daily Macros',
    protein: 'Protein (30%)', carbs: 'Carbs (40%)', fat: 'Fat (30%)',
    proteinG: 'g', carbsG: 'g', fatG: 'g',
    calculate: 'Calculate', reset: 'Reset',
  },
  zh: {
    toolTitle: 'TDEE 计算器',
    toolDesc: '计算每日总能量消耗 (TDEE) 和每日热量需求，支持减脂、维持和增肌目标。',
    step1: '输入性别、年龄、身高和体重',
    step2: '选择活动水平（久坐、轻度、中度、活跃、非常活跃）',
    step3: '查看 BMR、TDEE 以及减脂/维持/增肌的热量目标',
    step4: '查看蛋白质、碳水、脂肪的推荐摄入量',
    gender: '性别', age: '年龄（岁）', height: '身高（cm）', weight: '体重（kg）',
    activity: '活动水平',
    male: '男性', female: '女性',
    sedentary: '久坐（办公室工作，无运动）',
    light: '轻度活动（每周 1-3 天运动）',
    moderate: '中度活动（每周 3-5 天运动）',
    active: '活跃（每周 6-7 天运动）',
    veryActive: '非常活跃（运动员/体力工作）',
    bmr: '基础代谢率', tdee: 'TDEE（维持）',
    cut: '减脂（-500 千卡）', bulk: '增肌（+300 千卡）',
    macrosTitle: '每日推荐宏量营养素',
    protein: '蛋白质 (30%)', carbs: '碳水 (40%)', fat: '脂肪 (30%)',
    proteinG: '克', carbsG: '克', fatG: '克',
    calculate: '计算', reset: '重置',
  }
});

const { $, t } = GZ;

function calculate() {
  const gender = $('#gender').value;
  const age = parseFloat($('#age').value);
  const height = parseFloat($('#height').value);
  const weight = parseFloat($('#weight').value);
  const activity = parseFloat($('#activity').value);

  if (!age || !height || !weight) return;

  // Mifflin-St Jeor BMR
  let bmr;
  if (gender === 'male') {
    bmr = 10 * weight + 6.25 * height - 5 * age + 5;
  } else {
    bmr = 10 * weight + 6.25 * height - 5 * age - 161;
  }
  const tdee = bmr * activity;
  const cut = tdee - 500;
  const bulk = tdee + 300;

  $('#results').innerHTML = `
    <div class="tdee-result">
      <div class="val">${Math.round(bmr)}</div>
      <div class="lbl">${t('bmr')} kcal/day</div>
    </div>
    <div class="tdee-result">
      <div class="val">${Math.round(tdee)}</div>
      <div class="lbl">${t('tdee')} kcal/day</div>
    </div>
    <div class="tdee-result loss">
      <div class="val">${Math.round(cut)}</div>
      <div class="lbl">${t('cut')} kcal/day</div>
    </div>
    <div class="tdee-result gain">
      <div class="val">${Math.round(bulk)}</div>
      <div class="lbl">${t('bulk')} kcal/day</div>
    </div>`;

  // Macros at maintenance (TDEE)
  const proteinG = Math.round((tdee * 0.30) / 4);
  const carbsG = Math.round((tdee * 0.40) / 4);
  const fatG = Math.round((tdee * 0.30) / 9);

  $('#macros').innerHTML = `
    <h3>${t('macrosTitle')} @ ${Math.round(tdee)} kcal</h3>
    <table>
      <tr><td>${t('protein')}</td><td>${proteinG} ${t('proteinG')}</td></tr>
      <tr><td>${t('carbs')}</td><td>${carbsG} ${t('carbsG')}</td></tr>
      <tr><td>${t('fat')}</td><td>${fatG} ${t('fatG')}</td></tr>
    </table>`;
}

function reset() {
  $('#age').value = 30;
  $('#height').value = 175;
  $('#weight').value = 70;
  $('#gender').value = 'male';
  $('#activity').value = '1.375';
  calculate();
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="calculate()">${t('calculate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="reset()">${t('reset')}</button>`;

['#gender','#age','#height','#weight','#activity'].forEach(s => {
  $(s).addEventListener('input', calculate);
  $(s).addEventListener('change', calculate);
});

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'⚖️', href:'/calc/bmi-calculator.html', name:'BMI Calculator'},
    {icon:'📅', href:'/calc/age-calculator.html', name:'Age Calculator'},
    {icon:'💰', href:'/calc/percentage-calculator.html', name:'Percentage Calculator'},
    {icon:'🏋️', href:'/calc/compound-interest.html', name:'Compound Interest'},
  ]
});

calculate();
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
