<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "How do I calculate what I need on my final exam?", "acceptedAnswer": {"@type": "Answer", "text": "Use the formula: Final Exam Score = (Target Grade - Current Grade x (1 - Final Weight)) / Final Weight. Enter your current grade, your target grade and how much the final is worth, and the calculator does the rest."}}, {"@type": "Question", "name": "How much is a final exam worth?", "acceptedAnswer": {"@type": "Answer", "text": "Final exams are typically worth 15% to 30% of the overall course grade, with 20% being most common. The exact weight is set by your syllabus, so check it before calculating."}}, {"@type": "Question", "name": "What is a good final grade target?", "acceptedAnswer": {"@type": "Answer", "text": "A common target is one letter grade or 90+ for an A. If the required final score is above 100, it is mathematically impossible on that scale — focus on maximizing partial credit and boosting other graded items."}}, {"@type": "Question", "name": "Is my grade information private?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. Every calculation runs entirely in your browser. No grades, weights or scores are ever sent to any server."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-form" id="form">
      <div class="tab-row" id="mode-tabs">
        <button id="tab-need" class="active" onclick="setMode('need')"></button>
        <button id="tab-final" onclick="setMode('final')"></button>
      </div>
      <div>
        <label id="lbl-current"></label>
        <input type="number" id="current" value="85" min="0" max="100" step="0.1">
      </div>
      <div>
        <label id="lbl-weight"></label>
        <input type="number" id="weight" value="20" min="0.1" max="100" step="1">
      </div>
      <div id="field-need">
        <label id="lbl-target"></label>
        <input type="number" id="target" value="90" min="0" max="100" step="0.1">
      </div>
      <div id="field-final" style="display:none">
        <label id="lbl-final"></label>
        <input type="number" id="finalScore" value="92" min="0" max="100" step="0.1">
      </div>
      <button class="gz-btn" id="calc-btn" onclick="calculate()"></button>
    </div>
    <div id="result"></div>
    <p class="scale-note" id="scale-note"></p>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Final Grade Calculator',
    toolDesc: 'Find the score you need on your final exam to reach your target grade, or calculate your final grade from your current grade and exam weight.',
    modeNeed: 'What do I need on my final?',
    modeFinal: 'What will my final grade be?',
    lblCurrent: 'Current grade (%)',
    lblWeight: 'Final exam weight (%)',
    lblTarget: 'Target overall grade (%)',
    lblFinal: 'Final exam score (%)',
    calc: 'Calculate',
    needLine: 'You need at least',
    needLine2: 'on your final exam to reach a final grade of',
    impossible: 'That target is out of reach — even 100% gives you only {x}%. Aim lower or boost other grades.',
    finalLine: 'Your final grade will be',
    currentIs: 'Current grade',
    weighted: 'Weighted contribution',
    note: 'Out of a 100-point scale. Grades use the standard US scale: A ≥ 90, B ≥ 80, C ≥ 70, D ≥ 60.',
    step1: 'Choose a mode: find the final-exam score you need, or predict your final grade.',
    step2: 'Enter your current grade and how much the final exam is worth (the weight).',
    step3: 'Enter your target grade (or your expected final-exam score) and click Calculate.',
    step4: 'Read the result — the calculator handles the weighted-average math instantly.',
  },
  zh: {
    toolTitle: '期末成绩计算器',
    toolDesc: '计算为达到目标总评成绩，期末考试需要多少分；或根据当前成绩和期末考试权重预测最终成绩。',
    modeNeed: '期末考试我需要考多少分？',
    modeFinal: '我的最终成绩会是多少？',
    lblCurrent: '当前成绩 (%)',
    lblWeight: '期末考试权重 (%)',
    lblTarget: '目标总评成绩 (%)',
    lblFinal: '期末考试成绩 (%)',
    calc: '计算',
    needLine: '你至少需要',
    needLine2: '的期末考试分数，才能达到总评成绩',
    impossible: '目标不可达 — 即使考 100% 也只能得到 {x}%。请降低目标或提高其他成绩。',
    finalLine: '你的最终成绩将是',
    currentIs: '当前成绩',
    weighted: '加权贡献',
    note: '采用百分制。标准美国评分制：A ≥ 90，B ≥ 80，C ≥ 70，D ≥ 60。',
    step1: '选择模式：求所需期末分数，或预测最终成绩。',
    step2: '输入当前成绩以及期末考试的权重占比。',
    step3: '输入目标成绩（或预期期末分数），点击「计算」。',
    step4: '查看结果 — 计算器即时完成加权平均运算。',
  }
});

const { $, t } = GZ;
let mode = 'need';

function setMode(m) {
  mode = m;
  $('#tab-need').classList.toggle('active', m === 'need');
  $('#tab-final').classList.toggle('active', m === 'final');
  $('#field-need').style.display = m === 'need' ? 'block' : 'none';
  $('#field-final').style.display = m === 'final' ? 'block' : 'none';
  $('#calc-btn').textContent = t('calc');
  calculate();
}

function letterFor(pct) {
  if (pct >= 90) return 'A';
  if (pct >= 80) return 'B';
  if (pct >= 70) return 'C';
  if (pct >= 60) return 'D';
  return 'F';
}

function fmt(n) { return Math.round(n * 10) / 10; }

function calculate() {
  const cur = parseFloat($('#current').value);
  const w = parseFloat($('#weight').value) / 100;
  if (isNaN(cur) || isNaN(w) || w <= 0 || w > 1) { $('#result').innerHTML = ''; return; }

  let html = '';
  if (mode === 'need') {
    const target = parseFloat($('#target').value);
    if (isNaN(target)) { $('#result').innerHTML = ''; return; }
    const maxPossible = cur * (1 - w) + 100 * w;
    if (target > maxPossible + 1e-9) {
      html = `<div class="result-card"><div class="big">😞</div><div class="label">${t('impossible').replace('{x}', fmt(maxPossible))}</div></div>`;
    } else {
      const need = (target - cur * (1 - w)) / w;
      const em = need > 100 ? '🔥' : need >= 90 ? '🌟' : need >= 60 ? '👍' : '😄';
      html = `<div class="result-card"><div class="big">${em} ${fmt(Math.max(0, need))}%</div><div class="label">${t('needLine')} <strong>${t('needLine2')}</strong> ${fmt(target)}% (${letterFor(target)})</div></div>`;
    }
  } else {
    const fin = parseFloat($('#finalScore').value);
    if (isNaN(fin)) { $('#result').innerHTML = ''; return; }
    const overall = cur * (1 - w) + fin * w;
    html = `<div class="result-card"><div class="big">${fmt(overall)}%</div><div class="label">${t('finalLine')} <strong>${letterFor(overall)}</strong></div>
      <div class="result-grid">
        <div class="result-item"><div class="val">${fmt(cur)}%</div><div class="lbl">${t('currentIs')}</div></div>
        <div class="result-item"><div class="val">${fmt(fin * w)}%</div><div class="lbl">${t('weighted')}</div></div>
      </div></div>`;
  }
  $('#result').innerHTML = html;
}

['current', 'weight', 'target', 'finalScore'].forEach(id => $('#' + id).addEventListener('input', calculate));
$('#tab-need').textContent = t('modeNeed');
$('#tab-final').textContent = t('modeFinal');
$('#lbl-current').textContent = t('lblCurrent');
$('#lbl-weight').textContent = t('lblWeight');
$('#lbl-target').textContent = t('lblTarget');
$('#lbl-final').textContent = t('lblFinal');
$('#scale-note').textContent = t('note');
calculate();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📈', href:'/calc/pay-raise-calculator.html', name:'Pay Raise'},
    {icon:'🎓', href:'/calc/gpa-calculator.html', name:'GPA'},
    {icon:'🕒', href:'/calc/hours-calculator.html', name:'Hours'},
    {icon:'📊', href:'/calc/grade-calculator.html', name:'Grade Calc'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
