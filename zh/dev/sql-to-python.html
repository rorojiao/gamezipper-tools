// SQL type -> python type
function sqlTypeToPy(sqlType){
  const s = String(sqlType).toUpperCase();
  if (/^(BIG)?INT|SMALLINT|TINYINT|SERIAL|INTEGER$/i.test(s)) return 'int';
  if (/^(DECIMAL|NUMERIC|FLOAT|DOUBLE|REAL|MONEY)/i.test(s)) return 'float';
  if (/^(BOOL|BIT)/i.test(s)) return 'bool';
  if (/^(BLOB|BYTEA|BINARY|VARBINARY)/i.test(s)) return 'bytes';
  if (/^(DATE|DATETIME|TIMESTAMP|TIME|INTERVAL)/i.test(s)) return 'str';
  return 'str'; // CHAR, VARCHAR, TEXT, JSON, UUID, ENUM
}

function pascalCase(s){
  return String(s).replace(/[^a-zA-Z0-9]+/g, ' ').trim()
    .split(/\s+/).map(w => w.charAt(0).toUpperCase() + w.slice(1)).join('')
    .replace(/^([0-9])/, '_$1') || 'Field';
}

function safeIdent(name, fallback){
  let s = String(name).replace(/"/g, '').trim();
  s = s.replace(/[^a-zA-Z0-9_]+/g, '_').replace(/^_+|_+$/g, '');
  if (!s) s = fallback;
  if (/^[0-9]/.test(s)) s = '_' + s;
  return s;
}

// Parse CREATE TABLE: returns { columns: [{name, type, nullable}], tableName }
function parseCreateTable(sql){
  const m = sql.match(/CREATE\s+TABLE\s+(?:IF\s+NOT\s+EXISTS\s+)?(?:"[^"]+"|`[^`]+`|\[ [^\]]+ \]|\[[^\]]+\]|[.\w]+)\s*\(([\s\S]*?)\)\s*;/i);
  if (!m) return null;
  const body = m[1];
  // split on commas not inside parentheses
  const parts = [];
  let depth = 0, cur = '';
  for (const ch of body){
    if (ch === '(') depth++;
    else if (ch === ')') depth--;
    if (ch === ',' && depth === 0){ parts.push(cur); cur = ''; }
    else cur += ch;
  }
  if (cur.trim()) parts.push(cur);
  const columns = [];
  for (const raw of parts){
    const def = raw.trim();
    if (!def) continue;
    // skip table-level constraints
    if (/^(PRIMARY|FOREIGN|UNIQUE|CHECK|CONSTRAINT|KEY|INDEX)\b/i.test(def)) continue;
    const tokens = def.match(/^("(?:[^"]|"")+"|`[^`]+`|\[[^\]]+\]|[.\w]+)\s+([A-Za-z]+(?:\s*\([^)]*\))?)/);
    if (!tokens) continue;
    let colName = tokens[1].replace(/^"(.*)"$/, '$1').replace(/""/g,'"').replace(/^`(.*)`$/, '$1').replace(/^\[(.*)\]$/, '$1');
    const colType = tokens[2].replace(/\s*\([^)]*\)/, '').trim();
    const nullable = !/NOT\s+NULL/i.test(def);
    columns.push({ name: colName, type: colType, nullable });
  }
  const nameMatch = sql.match(/CREATE\s+TABLE\s+(?:IF\s+NOT\s+EXISTS\s+)?(?:"([^"]+)"|`([^`]+)`|\[([^\]]+)\]|([.\w]+))/i);
  const tableName = (nameMatch && (nameMatch[1]||nameMatch[2]||nameMatch[3]||nameMatch[4])) || 'row';
  return { columns, tableName };
}

// Parse INSERT INTO ... VALUES; returns { columns: [names], rows: [[rawValue, ...], ...] }
function parseInserts(sql){
  const result = { columns: null, rows: [] };
  const re = /INSERT\s+INTO\s+(?:"[^"]+"|`[^`]+`|\[[^\]]+\]|[.\w]+)\s*(?:\(([^)]*)\))?\s*VALUES\s*([\s\S]*?);/gi;
  let m;
  while ((m = re.exec(sql)) !== null){
    let cols = null;
    if (m[1] && m[1].trim()){
      cols = m[1].split(',').map(s => s.trim().replace(/^"(.*)"$/, '$1').replace(/^`(.*)`$/, '$1'));
    }
    if (cols && !result.columns) result.columns = cols;
    // parse value tuples
    const valuesBlob = m[2];
    const tuples = [];
    let depth = 0, inStr = false, strCh = null, cur = '';
    for (let i = 0; i < valuesBlob.length; i++){
      const ch = valuesBlob[i];
      if (inStr){
        if (ch === strCh){
          if (valuesBlob[i+1] === strCh){ cur += ch + ch; i++; }
          else { inStr = false; cur += ch; }
        } else cur += ch;
      } else {
        if (ch === "'" || ch === '"'){ inStr = true; strCh = ch; cur += ch; }
        else if (ch === '('){ if (depth === 0){ cur = ''; } else cur += ch; depth++; }
        else if (ch === ')'){ depth--; if (depth === 0){ tuples.push(cur); cur = ''; } else cur += ch; }
        else if (depth > 0) cur += ch;
      }
    }
    tuples.forEach(tup => {
      const vals = splitTopLevel(tup, ',');
      result.rows.push(vals.map(v => v.trim()));
    });
  }
  return result;
}

function splitTopLevel(s, delim){
  const out = [];
  let depth = 0, inStr = false, strCh = null, cur = '';
  for (let i = 0; i < s.length; i++){
    const ch = s[i];
    if (inStr){
      if (ch === strCh){
        if (s[i+1] === strCh){ cur += ch + ch; i++; }
        else { inStr = false; cur += ch; }
      } else cur += ch;
    } else {
      if (ch === "'" || ch === '"'){ inStr = true; strCh = ch; cur += ch; }
      else if (ch === '('){ depth++; cur += ch; }
      else if (ch === ')'){ depth--; cur += ch; }
      else if (ch === delim && depth === 0){ out.push(cur); cur = ''; }
      else cur += ch;
    }
  }
  if (cur !== '' || out.length) out.push(cur);
  return out;
}

// Coerce a raw SQL literal into a Python literal given a target type
function coerceLiteral(raw, pyType){
  const v = raw.trim();
  if (v === '' ) return 'None';
  if (/^NULL$/i.test(v)) return 'None';
  if (v === 'DEFAULT') return 'None';
  if (pyType === 'int'){
    const n = parseInt(v, 10);
    return Number.isFinite(n) ? String(n) : 'None';
  }
  if (pyType === 'float'){
    const n = parseFloat(v);
    return Number.isFinite(n) ? String(n) : 'None';
  }
  if (pyType === 'bool'){
    if (/^TRUE|T|1|YES|Y$/i.test(v)) return 'True';
    if (/^FALSE|F|0|NO|N$/i.test(v)) return 'False';
    return 'None';
  }
  if (pyType === 'bytes'){
    return 'b' + JSON.stringify(v);
  }
  // string-ish: strip SQL quoting
  if (/^'([\s\S]*)'$/.test(v) || /^"([\s\S]*)"$/.test(v)){
    const inner = v.slice(1, -1).replace(/''/g, "'").replace(/""/g, '"');
    return JSON.stringify(inner);
  }
  return JSON.stringify(v);
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function highlight(code){
  const tokenRe = /('(?:\\.|[^'\\])*')|(#.*$)|(@?\w[\w.]*)|(\s+)|([^\s'"\w#@]+)/gm;
  let out = '', m;
  while ((m = tokenRe.exec(code)) !== null){
    const [full, str, com, word, ws, punct] = m;
    if (str) out += `<span class="py-str">${esc(str)}</span>`;
    else if (com) out += `<span class="py-com">${esc(com)}</span>`;
    else if (word){
      let cls = null;
      if (word === 'True' || word === 'False') cls = 'py-bool';
      else if (word === 'None') cls = 'py-none';
      else if (/^(class|from|import|def|return)$/.test(word) || word === '@dataclass') cls = 'py-kw';
      else if (/^-?\d/.test(word) && !isNaN(parseFloat(word))) cls = 'py-num';
      if (cls) out += `<span class="${cls}">${esc(word)}</span>`;
      else out += esc(word);
    } else out += esc(full);
  }
  return out;
}

function convert(){
  const raw = $('#input').value;
  if (!raw.trim()){ $('#output').textContent=''; $('#status').innerHTML=''; return; }

  const tableInfo = parseCreateTable(raw);
  const inserts = parseInserts(raw);

  if (!tableInfo && !inserts.rows.length){
    $('#status').innerHTML = `<span style="color:var(--gz-accent)">${t('noSql')}</span>`;
    $('#output').innerHTML = `<span style="color:var(--gz-accent)">${t('noSql')}</span>`;
    return;
  }

  // Build column list + python types
  let columns, pyTypes, colNames;
  if (tableInfo){
    columns = tableInfo.columns;
    colNames = columns.map(c => c.name);
    pyTypes = columns.map(c => sqlTypeToPy(c.type));
  } else if (inserts.columns){
    colNames = inserts.columns;
    pyTypes = colNames.map(() => 'str');
  } else {
    $('#status').innerHTML = `<span style="color:var(--gz-accent)">${t('noSql')}</span>`;
    $('#output').textContent = '';
    return;
  }

  const style = $('#styleSel').value;
  const classNameRaw = $('#className').value || (tableInfo ? tableInfo.tableName : 'Row');
  const className = pascalCase(classNameRaw);

  // Map insert rows onto our columns
  const dataRows = inserts.rows.map(r => {
    const colsForThis = inserts.columns || colNames;
    const obj = {};
    colsForThis.forEach((c, i) => {
      const idx = colNames.findIndex(n => n.toLowerCase() === c.toLowerCase());
      obj[idx >= 0 ? idx : i] = r[i];
    });
    return obj;
  });

  let code = '';
  const needOptional = columns && columns.some(c => c.nullable);
  const typingImports = new Set();
  pyTypes.forEach(tp => { /* keep simple */ });
  if (style === 'dataclass' || style === 'typed') typingImports.add('Optional');
  if (needOptional) typingImports.add('Optional');

  if (style === 'dataclass'){
    code += 'from dataclasses import dataclass\n';
    if (typingImports.size) code += `from typing import ${[...typingImports].join(', ')}\n`;
    code += '\n\n';
    code += `@dataclass\nclass ${className}:\n`;
    colNames.forEach((n, i) => {
      const ident = safeIdent(n, 'field_' + (i+1));
      const tp = pyTypes[i];
      const nullable = columns ? columns[i].nullable : false;
      code += `    ${ident}: ${nullable ? 'Optional[' + tp + ']' : tp} = None\n`;
    });
    if (dataRows.length){
      code += '\n\n# INSERT data\nrows = [\n';
      dataRows.forEach(row => {
        const args = colNames.map((n, i) => coerceLiteral(row[i] != null ? row[i] : 'NULL', pyTypes[i]));
        code += `    ${className}(${args.join(', ')}),\n`;
      });
      code += ']\n';
    }
  } else if (style === 'typed'){
    code += 'from typing import TypedDict';
    if (typingImports.size && !typingImports.has('TypedDict')) code += ', ' + [...typingImports].join(', ');
    code += '\n\n\n';
    code += `class ${className}(TypedDict):\n`;
    colNames.forEach((n, i) => {
      const ident = safeIdent(n, 'field_' + (i+1));
      const tp = pyTypes[i];
      const nullable = columns ? columns[i].nullable : false;
      code += `    ${ident}: ${nullable ? 'Optional[' + tp + ']' : tp}\n`;
    });
    if (dataRows.length){
      code += '\n\n# INSERT data\nrows = [\n';
      dataRows.forEach(row => {
        const pairs = colNames.map((n, i) => `${JSON.stringify(safeIdent(n, 'field_' + (i+1)))}: ${coerceLiteral(row[i] != null ? row[i] : 'NULL', pyTypes[i])}`);
        code += '    {' + pairs.join(', ') + '},\n';
      });
      code += ']\n';
    }
  } else { // dict
    code += '# list of dicts\nrows = [\n';
    if (dataRows.length){
      dataRows.forEach(row => {
        const pairs = colNames.map((n, i) => `${JSON.stringify(n)}: ${coerceLiteral(row[i] != null ? row[i] : 'NULL', pyTypes[i])}`);
        code += '    {' + pairs.join(', ') + '},\n';
      });
    } else {
      // template from columns
      const pairs = colNames.map((n, i) => `${JSON.stringify(n)}: None  # ${pyTypes[i]}`);
      code += '    {' + pairs.join(', ') + '},\n';
    }
    code += ']\n';
  }

  $('#status').innerHTML = `<span style="color:var(--gz-success)">${t('ok')(colNames.length, dataRows.length)}</span>`;
  $('#output').innerHTML = highlight(code);
}
