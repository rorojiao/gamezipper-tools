GZI18n.register({en:{toolTitle:'AI Content Detector',toolDesc:'Estimate the probability that text was written by AI. Paste any passage to get an AI score with burstiness, perplexity and repetition signals. Free, private, browser-only.',analyze:'Analyze',example:'Load Example',clear:'Clear',wordCount:'0 words',vLow:'Very likely human',vLowSub:'Strong human signals — varied rhythm and vocabulary.',low:'Likely human',lowSub:'Mostly human-like variation detected.',mixed:'Mixed signals',mixedSub:'Some AI-like patterns present — review manually.',high:'Likely AI-generated',highSub:'Uniform structure and vocabulary suggest AI.',vHigh:'Very likely AI-generated',vHighSub:'Strong AI signals — low variation, repetitive structure.',sigBurst:'Burstiness',sigBurstD:'Variation in sentence length. Human text varies more.',sigPpl:'Perplexity proxy',sigPplD:'Word predictability. Lower = more predictable = more AI-like.',sigVar:'Vocabulary variety',sigVarD:'Unique words / total. AI often uses safe, generic vocabulary.',sigRep:'Repetition',sigRepD:'Repeated sentence starts and structures. AI repeats patterns.',sigConn:'Transition words',sigConnD:'Words like moreover, furthermore. AI overuses these.',tipText:'<strong>How to read this:</strong> No detector is 100% accurate. Use this as a directional hint, not proof. Short or heavily edited text is hard to classify. Combine with your own judgment.',step1:'Paste the text you want to check (50+ words works best)',step2:'Click Analyze to compute AI probability signals',step3:'Read the score — green means human, red means AI-like',step4:'Review individual signals to understand the verdict'},
zh:{toolTitle:'AI 内容检测器',toolDesc:'估算文本由 AI 生成的概率。粘贴任意段落，获取 AI 评分以及突发性、困惑度和重复信号。免费、私密、浏览器本地运行。',analyze:'分析',example:'加载示例',clear:'清空',wordCount:'0 词',vLow:'非常可能是人类所写',vLowSub:'人类信号强烈 — 节奏和词汇多变。',low:'可能是人类所写',lowSub:'检测到大多数类似人类的多样性。',mixed:'信号混合',mixedSub:'存在一些 AI 模式 — 建议人工复核。',high:'可能是 AI 生成',highSub:'统一的结构和词汇暗示 AI。',vHigh:'非常可能是 AI 生成',vHighSub:'AI 信号强烈 — 多样性低、结构重复。',sigBurst:'突发性',sigBurstD:'句子长度的变化。人类文本变化更大。',sigPpl:'困惑度近似',sigPplD:'词语可预测性。越低 = 越可预测 = 越像 AI。',sigVar:'词汇多样性',sigVarD:'唯一词 / 总词数。AI 常用安全、通用的词汇。',sigRep:'重复度',sigRepD:'重复的句子开头和结构。AI 倾向重复模式。',sigConn:'连接词',sigConnD:'如 moreover、furthermore。AI 过度使用这些词。',tipText:'<strong>如何解读：</strong> 没有任何检测器 100% 准确。请将此作为方向性提示，而非证据。过短或大幅编辑过的文本难以判定。请结合人工判断。',step1:'粘贴要检测的文本（50 词以上效果最好）',step2:'点击「分析」计算 AI 概率信号',step3:'查看评分 — 绿色偏人类，红色偏 AI',step4:'查看各个信号细节以理解结论'}});
const {$,t}=GZ;
const input=$('#input'),result=$('#result');
const STOP=new Set(('the a an and or but of to in on at for with by from as is are was were be been being this that these those it its their our your my we you they he she him her his hers them us i me').split(' '));
const TRANSITIONS=new Set(['moreover','furthermore','additionally','however','nevertheless','nonetheless','consequently','therefore','thus','hence','accordingly','subsequently','specifically','particularly','essentially','fundamentally','ultimately','indeed','notably','importantly','significantly','overall','overall','overall','basically','literally','actually','certainly','definitely','probably','possibly','perhaps','arguably','presumably','undoubtedly','admittedly','granted','granted','albeit','whereas','although','though','while','whilst','whenever','wherever','whoever','whomever','whichever','whosoever']);
function splitSentences(text){
  return text.replace(/\n+/g,' ').match(/[^.!?]+[.!?]+/g)||[text];
}
function tokenize(text){return(text.toLowerCase().match(/\b[a-z']+\b/g)||[]);}
function analyze(){
  const text=input.value.trim();
  if(text.split(/\s+/).length<20){result.classList.remove('show');return;}
  const sentences=splitSentences(text).map(s=>s.trim()).filter(s=>s.length>0);
  const words=tokenize(text);
  const N=words.length;
  if(N<20||sentences.length<2){result.classList.remove('show');return;}
  const sentLens=sentences.map(s=>s.split(/\s+/).length);
  const meanLen=sentLens.reduce((a,b)=>a+b,0)/sentLens.length;
  const variance=sentLens.reduce((a,l)=>a+(l-meanLen)**2,0)/sentLens.length;
  const stddev=Math.sqrt(variance);
  const cv=meanLen>0?stddev/meanLen:0;
  const burst=Math.min(1,cv/0.6);
  const unique=new Set(words.filter(w=>!STOP.has(w)));
  const contentWords=words.filter(w=>!STOP.has(w)).length;
  const ttr=contentWords>0?unique.size/contentWords:0;
  const variety=Math.min(1,ttr/0.7);
  const bigrams={};
  for(let i=0;i<words.length-1;i++){const bg=words[i]+' '+words[i+1];bigrams[bg]=(bigrams[bg]||0)+1;}
  const repeatedBg=Object.values(bigrams).filter(c=>c>1).reduce((a,c)=>a+c-1,0);
  const repRatio=repeatedBg/Math.max(1,Object.keys(bigrams).length);
  const repetition=Math.min(1,repRatio*4);
  const starts=sentences.map(s=>s.split(/\s+/)[0].toLowerCase().replace(/[^a-z]/g,''));
  const startCounts={};starts.forEach(s=>startCounts[s]=(startCounts[s]||0)+1);
  const repeatStarts=Object.values(startCounts).filter(c=>c>1).reduce((a,c)=>a+c-1,0);
  const startRep=repeatStarts/Math.max(1,starts.length);
  const connCount=words.filter(w=>TRANSITIONS.has(w)).length;
  const connRatio=connCount/Math.max(1,sentences.length);
  const connScore=Math.min(1,connRatio*2.5);
  const avgWordLen=words.reduce((a,w)=>a+w.length,0)/N;
  const pplProxy=Math.max(0,Math.min(1,(5.5-avgWordLen)/3));
  const aiScore=Math.round(Math.max(0,Math.min(100,
    (1-burst)*30+(1-variety)*15+repetition*15+startRep*10+connScore*15+pplProxy*15
  )));
  const ring=$('#ring');
  ring.style.setProperty('--p',aiScore);
  const hue=aiScore<40?120:aiScore<60?45:0;
  ring.style.background=`conic-gradient(hsl(${hue},70%,50%) calc(var(--p)*1%),var(--glass2) 0)`;
  $('#score').textContent=aiScore+'%';
  let verdict,sub;
  if(aiScore<20){verdict=t('vLow');sub=t('vLowSub');}
  else if(aiScore<40){verdict=t('low');sub=t('lowSub');}
  else if(aiScore<60){verdict=t('mixed');sub=t('mixedSub');}
  else if(aiScore<80){verdict=t('high');sub=t('highSub');}
  else{verdict=t('vHigh');sub=t('vHighSub');}
  $('#verdict').textContent=verdict;
  $('#verdict-sub').textContent=sub;
  $('#signals').innerHTML=[
    [t('sigBurst'),Math.round(burst*100)+'%',t('sigBurstD'),1-burst],
    [t('sigPpl'),Math.round(pplProxy*100)+'%',t('sigPplD'),pplProxy],
    [t('sigVar'),Math.round(variety*100)+'%',t('sigVarD'),1-variety],
    [t('sigRep'),Math.round(repetition*100)+'%',t('sigRepD'),repetition],
    [t('sigConn'),Math.round(connScore*100)+'%',t('sigConnD'),connScore],
  ].map(([lbl,val,desc,aiLike])=>`<div class="acd-sig"><div class="lbl">${lbl}</div><div class="val" style="color:hsl(${Math.round((1-aiLike)*120)},60%,55%)">${val}</div><div class="desc">${desc}</div></div>`).join('');
  $('#tip').innerHTML=t('tipText');
  result.classList.add('show');
}
function updateCount(){const n=input.value.trim().split(/\s+/).filter(Boolean).length;$('#count').textContent=n+' '+(GZI18n.getLang()==='zh'?'词':(n===1?'word':'words'));}
function example(){input.value='Moreover, the rapid advancement of artificial intelligence has fundamentally transformed numerous industries across the globe. Furthermore, businesses are increasingly leveraging these technologies to enhance their operational efficiency and productivity. Additionally, the integration of machine learning algorithms enables organizations to make more informed decisions based on data-driven insights. Consequently, companies that fail to adapt to this technological shift risk falling behind their competitors. Therefore, it is essential for leaders to embrace innovation and invest in modern solutions. Specifically, the implementation of automated systems can significantly reduce human error and streamline complex processes. Ultimately, the future belongs to those who are willing to evolve and grow. Importantly, this transformation requires both vision and commitment from all stakeholders involved.';updateCount();analyze();}
$('#toolbar').innerHTML='<button class="gz-btn" onclick="analyze()">🔍 '+t('analyze')+'</button><button class="gz-btn gz-btn-secondary" onclick="example()">'+t('example')+'</button><button class="gz-btn gz-btn-secondary" onclick="input.value=\'\';updateCount();result.classList.remove(\'show\')">'+t('clear')+'</button>';
input.addEventListener('input',updateCount);
updateCount();

</script><script src="/tools-result-rec.js?v=20260707v520" defer></script></body></html>
