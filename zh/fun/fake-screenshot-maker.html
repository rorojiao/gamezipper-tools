<script>
GZI18n.register({
  en: {
    toolTitle: 'Fake Screenshot Maker',
    toolDesc: 'Create realistic iMessage-style chat screenshots for memes, jokes and demos. Edit names, timestamps, dark/light mode and message bubbles — 100% in your browser.',
    contactName: 'Contact name',
    time: 'Header time',
    theme: 'Theme',

    clear: 'Clear',
    me: 'Me',
    them: 'Them',
    text: 'Text',
    del: '✕',
    disclaimer: '⚠️ For memes, jokes and design demos only. Do not use to deceive or impersonate real people.',
    step1: 'Type the contact name and header time shown at the top of the chat',
    step2: 'Toggle between Dark and Light mode',
    step3: 'Add messages — pick Me or Them, type the text, delete with ✕',
    step4: 'Take a screenshot of the phone preview (use your OS screenshot tool)',
  },
  zh: {
    toolTitle: '聊天截图生成器 / 假对话截图',
    toolDesc: '制作逼真的 iMessage 风格聊天截图，用于梗图、玩笑或设计 Demo。可编辑姓名、时间、深色/浅色模式和气泡 — 100% 浏览器本地运行。',
    contactName: '联系人姓名',
    time: '顶部时间',
    theme: '主题',
    messages: '消息',
    addMsg: '添加消息',
    clear: '清空',
    me: '我',
    them: '对方',
    text: '内容',
    del: '✕',
    disclaimer: '⚠️ 仅供梗图、玩笑和设计 Demo 使用，请勿用于欺骗或冒充真实人物。',
    step1: '在顶部输入联系人姓名和显示时间',
    step2: '在深色和浅色模式之间切换',
    step3: '添加消息 — 选择「我」或「对方」，输入文字，✕ 可删除',
    step4: '用系统截图工具截取手机预览区域即可保存',
  }
});
const { $, t } = GZ;
$('#lbl-name').textContent = t('contactName');
$('#lbl-time').textContent = t('time');
$('#lbl-theme').textContent = t('theme');
$('#lbl-msgs').textContent = t('messages');
let messages = [
  {who:'them', text:'Hey, did you see the game last night? 😱'},
  {who:'me', text:'YES! That last-minute goal was insane 🔥'},
  {who:'them', text:'Best match of the season, no cap'},
];
function renderList() {
  $('#msg-list').innerHTML = messages.map((m, i) =>
    `<div class="msg-row">
      <select onchange="updateWho(${i}, this.value)">
        <option value="me"${m.who==='me'?' selected':''}>${t('me')}</option>
        <option value="them"${m.who==='them'?' selected':''}>${t('them')}</option>
      </select>
      <input type="text" value="${(m.text||'').replace(/"/g,'&quot;')}" oninput="updateText(${i}, this.value)">
      <button onclick="delMsg(${i})" title="delete">${t('del')}</button>
    </div>`).join('');
}
function updateWho(i, v) { messages[i].who = v; renderPreview(); }
function updateText(i, v) { messages[i].text = v; renderPreview(); }
function delMsg(i) { messages.splice(i, 1); renderList(); renderPreview(); }
function addMsg() { messages.push({who:'me', text:'New message'}); renderList(); renderPreview(); }
function renderPreview() {
  $('#ph-name').textContent = $('#contact-name').value || ' ';
  const theme = $('#theme-sel').value;
  $('#screen').className = 'phone-screen ' + theme;
  $('#phone').className = 'phone ' + (theme === 'light' ? 'light' : '');
  const body = $('#phone-body');
  body.innerHTML = `<div class="phone-time">${$('#header-time').value}</div>` +
    messages.map(m => `<div class="bubble ${m.who}">${(m.text||'').replace(/</g,'&lt;')}</div>`).join('');
}
$('#contact-name').addEventListener('input', renderPreview);
$('#header-time').addEventListener('input', renderPreview);
$('#theme-sel').addEventListener('change', renderPreview);
$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="addMsg()">${t('addMsg')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="messages=[];renderList();renderPreview()">${t('clear')}</button>
  <span style="margin-left:auto;font-size:.78em;color:var(--text2)">${t('disclaimer')}</span>`;
renderList(); renderPreview();
GZ.renderToolPage({
  category: 'fun',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],

    {icon:'✍️', href:'/text/index.html', name:'Text Tools'},
  ]
});
</script>
