<script>
GZI18n.register({
  en: {
    toolTitle: 'Date Difference Calculator',
    toolDesc: 'Calculate the exact difference between two dates — days, weeks, months, years, and business days. Perfect for project planning, age, and deadline tracking. Free, instant, private.',
    startLabel: 'Start date',
    endLabel: 'End date',
    totalDays: 'total days between dates',
    days: 'Days',
    weeks: 'Weeks',
    months: 'Months',
    years: 'Years',
    bizDays: 'Business days',
    hours: 'Hours',
    minutes: 'Minutes',
    today: 'Today',
    swap: 'Swap dates',
    step1: 'Enter or pick your start date',
    step2: 'Enter or pick your end date',
    step3: 'See total days, weeks, months, years, and business days instantly',
    step4: 'Use Today button to set end date to today, or Swap to reverse the order',
  },
  zh: {
    toolTitle: '日期差计算器',
    toolDesc: '计算两个日期之间的精确差值 — 天数、周数、月数、年数和工作日。适合项目规划、年龄和截止日期追踪。免费、即时、隐私安全。',
    startLabel: '开始日期',
    endLabel: '结束日期',
    totalDays: '两个日期之间的总天数',
    days: '天',
    weeks: '周',
    months: '月',
    years: '年',
    bizDays: '工作日',
    hours: '小时',
    minutes: '分钟',
    today: '今天',
    swap: '交换日期',
    step1: '输入或选择开始日期',
    step2: '输入或选择结束日期',
    step3: '立即查看总天数、周数、月数、年数和工作日',
    step4: '使用「今天」按钮将结束日期设为今天，或「交换」反转顺序',
  }
});

const { $, t } = GZ;

function fmt(n) { return Math.round(n).toLocaleString(); }

function calc() {
  const s = $('#startDate').value;
  const e = $('#endDate').value;
  if (!s || !e) { $('#bigResult').textContent = '—'; $('#subResult').textContent = ''; $('#grid').innerHTML = ''; return; }
  const d1 = new Date(s + 'T00:00:00');
  const d2 = new Date(e + 'T00:00:00');
  const diffMs = d2 - d1;
  const totalDays = Math.round(diffMs / 86400000);
  const absDays = Math.abs(totalDays);

  // Business days (exclude Sat/Sun)
  let bizDays = 0;
  let cur = new Date(d1);
  const step = totalDays >= 0 ? 1 : -1;
  const count = absDays;
  for (let i = 0; i < count; i++) {
    cur.setDate(cur.getDate() + step);
    const dow = cur.getDay();
    if (dow !== 0 && dow !== 6) bizDays++;
  }

  // Months and years (approximate)
  let months = (d2.getFullYear() - d1.getFullYear()) * 12 + (d2.getMonth() - d1.getMonth());
  if (d2.getDate() < d1.getDate()) months -= 1;

  let years = (d2.getFullYear() - d1.getFullYear());
  const mDiff = d2.getMonth() - d1.getMonth();
  if (mDiff < 0 || (mDiff === 0 && d2.getDate() < d1.getDate())) years--;

  const dir = totalDays < 0 ? '−' : '';
  $('#bigResult').textContent = dir + fmt(absDays);
  $('#subResult').textContent = t('totalDays');

  const tiles = [
    {num: dir + (absDays / 7).toFixed(1), lbl: t('weeks')},
    {num: dir + Math.abs(months), lbl: t('months')},
    {num: dir + years, lbl: t('years')},
    {num: bizDays, lbl: t('bizDays')},
    {num: dir + fmt(absDays * 24), lbl: t('hours')},
    {num: dir + fmt(absDays * 1440), lbl: t('minutes')},
  ];
  $('#grid').innerHTML = tiles.map(c => `<div class="dd-tile"><div class="num">${c.num}</div><div class="lbl">${c.lbl}</div></div>`).join('');
}

function setToday() {
  $('#endDate').value = new Date().toISOString().slice(0, 10);
  calc();
}

function swap() {
  const s = $('#startDate').value;
  $('#startDate').value = $('#endDate').value;
  $('#endDate').value = s;
  calc();
}

$('#startDate').addEventListener('change', calc);
$('#endDate').addEventListener('change', calc);
$('#btn-today').textContent = t('today');
$('#btn-swap').textContent = t('swap');
$('#btn-today').onclick = setToday;
$('#btn-swap').onclick = swap;

// Default: Jan 1 → today
const now = new Date();
$('#startDate').value = now.getFullYear() + '-01-01';
$('#endDate').value = now.toISOString().slice(0, 10);
calc();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🎂', href:'/calc/age-calculator.html', name:'Age Calculator'},
    {icon:'⏳', href:'/calc/days-since-calculator.html', name:'Days Since'},
    {icon:'📅', href:'/calc/date-calculator.html', name:'Date Calculator'},
    {icon:'⏰', href:'/calc/countdown.html', name:'Countdown'},
  ]
});
</script>
