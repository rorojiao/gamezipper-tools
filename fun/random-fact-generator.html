const CATEGORIES = ['all', 'science', 'history', 'animals', 'space', 'body', 'food'];
const CAT_LABEL = { all: 'All Facts', science: 'Science', history: 'History', animals: 'Animals', space: 'Space', body: 'Human Body', food: 'Food' };

let currentCat = 'all';
let lastFact = null;

function rand(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function filterByCat(cat) {
  currentCat = cat;
  document.querySelectorAll('.cat-filters button').forEach(b => b.classList.toggle('active', b.dataset.cat === cat));
  generate();
}

function generate() {
  const pool = currentCat === 'all' ? FACTS : FACTS.filter(f => f.cat === currentCat);
  if (!pool.length) return;
  let next;
  do {
    next = rand(pool);
  } while (pool.length > 1 && next === lastFact);
  lastFact = next;
  $('#factText').textContent = next.text;
  $('#factSource').textContent = 'Source: ' + next.source;
  $('#factCard').querySelector('.fact-emoji').textContent = CAT_EMOJI[next.cat] || '💡';
  addToHistory(next);
}

function addToHistory(f) {
  const hist = $('#history');
  const item = document.createElement('div');
  item.className = 'history-item';
  item.innerHTML = `<div class="h-cat">${CAT_LABEL[f.cat]}</div><div>${f.text}</div>`;
  hist.insertBefore(item, hist.firstChild);
  while (hist.children.length > 6) hist.removeChild(hist.lastChild);
}

function copyFact() {
  if (!lastFact) return;
  copyText(`💡 ${lastFact.text}\n\n(Source: ${lastFact.source})`);
}

$('#catFilters').innerHTML = CATEGORIES.map(c => `<button class="gz-btn gz-btn-secondary ${c === 'all' ? 'active' : ''}" data-cat="${c}" onclick="filterByCat('${c}')">${CAT_LABEL[c]}</button>`).join('');
