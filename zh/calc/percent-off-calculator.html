<script type="application/ld+json">{"@context":"https://schema.org","@type":"WebApplication","name":"Percent Off Calculator","description":"Free percent off calculator. Enter the original price and discount percent to instantly find the sale price, savings amount and final cost. Supports coupons, tax and reverse discount.","url": "https://tools.gamezipper.com/zh/calc/percent-off-calculator.html","applicationCategory":"Utility","operatingSystem":"Web Browser","offers":{"@type":"Offer","price":"0"}}</script>
<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"How do I calculate percent off?","acceptedAnswer":{"@type":"Answer","text":"Multiply the original price by the discount percentage (as a decimal), then subtract that amount from the original price. For example, 25% off a $80 item: 80 × 0.25 = $20 saved, so the sale price is 80 − 20 = $60."}},{"@type":"Question","name":"What is the formula for sale price after a discount?","acceptedAnswer":{"@type":"Answer","text":"Sale price = Original price × (1 − discount% / 100). The savings equals Original price × discount% / 100. This single formula gives you the final price in one step."}},{"@type":"Question","name":"How do I stack two discounts (e.g. 20% off then 10% extra)?","acceptedAnswer":{"@type":"Answer","text":"Apply them sequentially, not by adding. First take 20% off, then take 10% off the new price. The combined discount is 1 − (0.8 × 0.9) = 28%, not 30%, because the second discount applies to the already-reduced price."}},{"@type":"Question","name":"How do I find the discount percent from the original and sale price?","acceptedAnswer":{"@type":"Answer","text":"Use the reverse formula: discount% = (Original − Sale) / Original × 100. Switch the calculator to Reverse mode, enter both prices, and it will compute the percentage you saved."}}]}</script>

<div class="gz-container">

    <div class="gz-toolbar" id="toolbar"></div>
    <div class="po-tabs" id="tabs">

      <button class="po-tab" data-mode="rev" id="tab-rev"></button>

      <div class="po-row">

        <div class="po-field">
          <label id="lbl-pct"></label>
          <input type="number" id="pct" step="any" value="25">
        </div>
      </div>
      <div class="po-field">
        <label id="lbl-second"></label>
        <input type="number" id="second" step="any" value="0">
      </div>

    </div>

      <div class="po-row">
        <div class="po-field">
          <label id="lbl-orig"></label>
          <input type="number" id="orig" step="any" value="80">
        </div>

          <label id="lbl-sale"></label>
          <input type="number" id="sale" step="any" value="60">

    <div class="po-result" id="result">
      <div class="po-big" id="resultBig">—</div>
      <div id="resultMeta" style="color:var(--text2);font-size:.9rem"></div>

    <div class="po-grid" id="grid"></div>

<script>
GZI18n.register({
  en:{
    toolTitle:'Percent Off Calculator',
    toolDesc:'Find the sale price and your savings from any discount. Supports stacked coupons and sales tax, plus a reverse mode to find the discount percentage from the original and sale price.',
    tabOff:'% Off a Price',
    tabRev:'Find % From Prices',
    lblPrice:'Original price ($)',
    lblPct:'Discount (%)',
    lblSecond:'Extra/coupon discount (%) — optional',
    lblTax:'Sales tax (%) — optional',
    lblOrig:'Original price ($)',
    lblSale:'Sale price you paid ($)',
    calculate:'⚡ Calculate',copy:'Copy',clear:'Clear',
    resultOff:'Sale price (final cost)',
    resultRev:'Discount percentage',
    cellSave:'You save',
    cellOff:'Total off',
    cellFinal:'Sale price',
    cellTax:'Tax added',
    cellPaid:'You pay (with tax)',
    cellOrig:'Original price',
    formulaOff:'Sale price = Original × (1 − discount/100)',
    formulaOffExtra:'With extra coupon: multiply each discount in turn',
    formulaRev:'Discount% = (Original − Sale) / Original × 100',
    step:'Step',
    stepSavings:'Savings',
    stepFinal:'Sale price',
    enterPrice:'Enter a price and discount, then press Calculate.',
    enterRev:'Enter both prices, then press Calculate.',
    step1:'Enter the original price of the item',
    step2:'Enter the discount percentage (and any extra coupon)',
    step3:'Optionally add sales tax to see what you actually pay',
    step4:'Read the sale price, savings and formula breakdown',
  },
  zh:{
    toolTitle:'打折计算器（百分比折扣）',
    toolDesc:'根据折扣百分比计算折后价和节省金额。支持叠加优惠券和消费税，并提供反向模式：根据原价和成交价反推折扣百分比。',
    tabOff:'按折扣算价格',
    tabRev:'按价格算折扣',
    lblPrice:'原价（$）',
    lblPct:'折扣（%）',
    lblSecond:'额外/优惠券折扣（%）— 可选',
    lblTax:'消费税（%）— 可选',
    lblOrig:'原价（$）',
    lblSale:'实际成交价（$）',
    calculate:'⚡ 计算',copy:'复制',clear:'清空',
    resultOff:'折后价（最终价格）',
    resultRev:'折扣百分比',
    cellSave:'你省下',
    cellOff:'总折扣',
    cellFinal:'折后价',
    cellTax:'加税金额',
    cellPaid:'实付（含税）',
    cellOrig:'原价',
    formulaOff:'折后价 = 原价 × (1 − 折扣/100)',
    formulaOffExtra:'有额外优惠券时：依次相乘折扣',
    formulaRev:'折扣% = (原价 − 成交价) / 原价 × 100',
    step:'步骤',
    stepSavings:'节省金额',
    stepFinal:'折后价',
    enterPrice:'输入价格和折扣后点击计算。',
    enterRev:'输入两个价格后点击计算。',
    step1:'输入商品的原价',
    step2:'输入折扣百分比（及可选的额外优惠券）',
    step3:'可选：填入消费税，查看实付金额',
    step4:'查看折后价、节省金额和公式分解',
  }
});

const { $, copyText, t } = GZ;
let mode='off';

function fmtMoney(n){ if(!isFinite(n)) return String(n); return n.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function fmt(n){ if(!isFinite(n)) return String(n); const r=Math.round(n*1e6)/1e6; return r.toLocaleString('en-US',{maximumFractionDigits:6}); }

function calc(){
  if(mode==='off'){
    const price=parseFloat($('#price').value);
    const pct=parseFloat($('#pct').value);
    const second=parseFloat($('#second').value)||0;
    const tax=parseFloat($('#tax').value)||0;
    if(isNaN(price)||isNaN(pct)){ $('#resultBig').textContent='—'; $('#resultMeta').textContent=t('enterPrice'); $('#grid').innerHTML=''; $('#formula').textContent=t('formulaOff'); return; }
    const d1=1-pct/100;
    const d2=1-second/100;
    const afterD1=price*d1;
    const salePrice=price*d1*d2;
    const savings=price-salePrice;
    const totalOffPct=(1-salePrice/price)*100;
    const taxAmt=salePrice*tax/100;
    const paid=salePrice+taxAmt;
    $('#resultBig').textContent='$'+fmtMoney(salePrice);
    $('#resultMeta').textContent=t('resultOff');
    $('#grid').innerHTML=
      `<div class="po-cell"><div class="lbl">${t('cellFinal')}</div><div class="val">$${fmtMoney(salePrice)}</div></div>`+
      `<div class="po-cell"><div class="lbl">${t('cellSave')}</div><div class="val">$${fmtMoney(savings)}</div></div>`+
      `<div class="po-cell"><div class="lbl">${t('cellOff')}</div><div class="val">${fmt(totalOffPct)}%</div></div>`+
      (tax>0?`<div class="po-cell"><div class="lbl">${t('cellTax')}</div><div class="val">$${fmtMoney(taxAmt)}</div></div><div class="po-cell"><div class="lbl">${t('cellPaid')}</div><div class="val">$${fmtMoney(paid)}</div></div>`:'');
    let steps=
      `<div>${t('formulaOff')}</div>`+
      `<div style="margin-top:8px">${t('step')} 1 — ${t('stepSavings')}: $${fmtMoney(price)} × ${fmt(pct)}% = <b>$${fmtMoney(price*pct/100)}</b></div>`;
    if(second>0){
      steps+=`<div>${t('step')} 2 — ${t('stepFinal')} after 1st discount: $${fmtMoney(afterD1)}</div>`+
             `<div>${t('step')} 3 — ${t('stepSavings')} (coupon): $${fmtMoney(afterD1)} × ${fmt(second)}% = <b>$${fmtMoney(afterD1*second/100)}</b></div>`+
             `<div>${t('step')} 4 — ${t('stepFinal')}: <b>$${fmtMoney(salePrice)}</b> <span style="opacity:.7">(${fmt(totalOffPct)}% ${t('cellOff').toLowerCase()})</span></div>`+
             `<div style="margin-top:6px;opacity:.8">${t('formulaOffExtra')}</div>`;
    } else {
      steps+=`<div>${t('step')} 2 — ${t('stepFinal')}: <b>$${fmtMoney(salePrice)}</b></div>`;
    }
    $('#formula').innerHTML=steps;
  } else {
    const orig=parseFloat($('#orig').value);
    const sale=parseFloat($('#sale').value);
    if(isNaN(orig)||isNaN(sale)){ $('#resultBig').textContent='—'; $('#resultMeta').textContent=t('enterRev'); $('#grid').innerHTML=''; $('#formula').textContent=t('formulaRev'); return; }
    if(orig===0){ $('#resultBig').textContent='—'; $('#resultMeta').textContent=t('enterRev'); return; }
    const discPct=(orig-sale)/orig*100;
    const savings=orig-sale;
    $('#resultBig').textContent=fmt(discPct)+'%';
    $('#resultMeta').textContent=t('resultRev');
    $('#grid').innerHTML=
      `<div class="po-cell"><div class="lbl">${t('cellOrig')}</div><div class="val">$${fmtMoney(orig)}</div></div>`+
      `<div class="po-cell"><div class="lbl">${t('cellSave')}</div><div class="val">$${fmtMoney(savings)}</div></div>`+
      `<div class="po-cell"><div class="lbl">${t('cellFinal')}</div><div class="val">$${fmtMoney(sale)}</div></div>`;
    $('#formula').innerHTML=
      `<div>${t('formulaRev')}</div>`+
      `<div style="margin-top:8px">${t('step')} 1 — ${t('stepSavings')}: $${fmtMoney(orig)} − $${fmtMoney(sale)} = <b>$${fmtMoney(savings)}</b></div>`+
      `<div>${t('step')} 2 — ${t('step')} : $${fmtMoney(savings)} / $${fmtMoney(orig)} = <b>${fmt(savings/orig)}</b></div>`+
      `<div>${t('step')} 3 — × 100 = <b>${fmt(discPct)}%</b></div>`;
  }
}

function setMode(m){
  mode=m;
  $('#tab-off').classList.toggle('active',m==='off');
  $('#tab-rev').classList.toggle('active',m==='rev');
  $('#mode-off').style.display=m==='off'?'':'none';
  $('#mode-rev').style.display=m==='rev'?'':'none';
  calc();
}
$('#tab-off').addEventListener('click',()=>setMode('off'));
$('#tab-rev').addEventListener('click',()=>setMode('rev'));
$('#calcBtn').addEventListener('click',calc);
['price','pct','second','tax','orig','sale'].forEach(id=>{ const el=$('#'+id); el.addEventListener('input',calc); el.addEventListener('keydown',e=>{if(e.key==='Enter')calc();}); });

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="calc()">${t('calculate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="copyText($('#resultBig').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#price').value='';$('#pct').value='';$('#second').value=0;$('#tax').value=0;$('#orig').value='';$('#sale').value='';calc()">${t('clear')}</button>`;

$('#lbl-price').textContent=t('lblPrice');
$('#lbl-pct').textContent=t('lblPct');
$('#lbl-second').textContent=t('lblSecond');
$('#lbl-tax').textContent=t('lblTax');
$('#lbl-orig').textContent=t('lblOrig');
$('#lbl-sale').textContent=t('lblSale');
$('#tab-off').textContent=t('tabOff');
$('#tab-rev').textContent=t('tabRev');

GZ.renderToolPage({
  category:'calc',
  titleKey:'toolTitle',
  descKey:'toolDesc',
  howToSteps:['step1','step2','step3','step4'],
  related:[
    {icon:'%',href:'/calc/percentage-calculator.html',name:'Percentage Calculator'},
    {icon:'🏷️',href:'/calc/discount-calculator.html',name:'Discount Calculator'},
    {icon:'📐',href:'/calc/percent-error-calculator.html',name:'Percent Error Calculator'},
    {icon:'💸',href:'/calc/tip-calculator.html',name:'Tip Calculator'},
  ]
});
calc();
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
