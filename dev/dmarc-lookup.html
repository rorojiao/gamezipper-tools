const { $, t } = GZ;

async function dohLookup(name, type='TXT') {
  const url = `https://dns.google/resolve?name=${encodeURIComponent(name)}&type=${type}`;
  const res = await fetch(url, { headers: { 'accept': 'application/dns-json' } });
  if (!res.ok) throw new Error('DoH HTTP ' + res.status);
  return res.json();
}

function parseDmarc(record) {
  // record like: "v=DMARC1; p=reject; rua=mailto:dmarc@example.com; pct=100; adkim=s; aspf=s"
  const out = { raw: record, valid: false, v:null, p:null, sp:null, adkim:null, aspf:null, pct:null, rua:[], ruf:[], fo:null, ri:null, rf:null };
  const parts = record.split(';').map(s => s.trim()).filter(Boolean);
  for (const part of parts) {
    const eq = part.indexOf('=');
    if (eq < 0) continue;
    const key = part.slice(0, eq).trim().toLowerCase();
    const val = part.slice(eq + 1).trim();
    if (key === 'v') { out.v = val; out.valid = /^DMARC1$/i.test(val); }
    else if (key === 'p') out.p = val.toLowerCase();
    else if (key === 'sp') out.sp = val.toLowerCase();
    else if (key === 'adkim') out.adkim = val.toLowerCase();
    else if (key === 'aspf') out.aspf = val.toLowerCase();
    else if (key === 'pct') { const n = parseInt(val, 10); if (!isNaN(n)) out.pct = n; }
    else if (key === 'rua') out.rua = val.split(',').map(s=>s.trim());
    else if (key === 'ruf') out.ruf = val.split(',').map(s=>s.trim());
    else if (key === 'fo') out.fo = val;
    else if (key === 'ri') out.ri = val;
    else if (key === 'rf') out.rf = val;
  }
  return out;
}

function scorePolicy(d) {
  // Returns 0-100 score and tier
  if (!d || !d.valid) return { score: 0, tier: 'none' };
  let score = 30; // base for publishing
  if (d.p === 'none') score += 10;
  else if (d.p === 'quarantine') score += 30;
  else if (d.p === 'reject') score += 50;
  if (d.sp === 'quarantine') score += 5;
  else if (d.sp === 'reject') score += 10;
  if (d.adkim === 's') score += 3;
  if (d.aspf === 's') score += 3;
  if (d.rua && d.rua.length) score += 4;
  if ((d.pct ?? 0) >= 100) score += 5;
  score = Math.min(100, score);
  let tier;
  if (score >= 80) tier = 'good';
  else if (score >= 50) tier = 'ok';
  else if (score >= 20) tier = 'weak';
  else tier = 'none';
  return { score, tier };
}

function tierLabel(tier) {
  return ({ good: t('scoreGood'), ok: t('scoreOk'), weak: t('scoreWeak'), none: t('scoreNone') })[tier] || '';
}
function tierHint(tier) {
  return ({ good: t('scoreHintGood'), ok: t('scoreHintOk'), weak: t('scoreHintWeak'), none: t('scoreHintNone') })[tier] || '';
}

function policyBadge(p) {
  if (p === 'reject') return `<span class="dmarc-badge reject">${t('policyReject')}</span>`;
  if (p === 'quarantine') return `<span class="dmarc-badge quarantine">${t('policyQuarantine')}</span>`;
  if (p === 'none') return `<span class="dmarc-badge none">${t('policyNone')}</span>`;
  return `<span class="dmarc-badge">—</span>`;
}

function renderResult(domain, data) {
  const records = (data.Answer || []).filter(a => a.type === 16).map(a => a.data.replace(/^"|"$/g, '').replace(/"\s+"/g, ''));
  const dmarcRecs = records.filter(r => /^v=DMARC1/i.test(r));
  if (dmarcRecs.length === 0) {
    $('#result').innerHTML = `
      <div class="empty">
        <div style="font-size:2.5rem;opacity:.5">🚫</div>
        <h3 style="margin:8px 0">${t('notFound')}</h3>
        <p style="color:var(--text2);max-width:500px;margin:0 auto">${t('notFoundHint').replace('{domain}', domain)}</p>
      </div>`;
    return;
  }
  const d = parseDmarc(dmarcRecs[0]);
  const score = scorePolicy(d);
  const lang = GZI18n.getLang();
  const row = (label, val, cls='') => `<tr><td>${label}</td><td>${val ?? `<span style="color:var(--text2);opacity:.6">—</span>`}</td></tr>`;
  const ruaTxt = d.rua.length ? d.rua.map(x=>`<code>${x}</code>`).join('<br>') : null;
  const rufTxt = d.ruf.length ? d.ruf.map(x=>`<code>${x}</code>`).join('<br>') : null;
  $('#result').innerHTML = `
    <div class="score-card">
      <div class="score-row">
        <div>
          <div class="score-num">${score.score}</div>
          <div style="font-size:.78rem;color:var(--text2)">/ 100</div>
        </div>
        <div style="flex:1;min-width:200px">
          <div class="score-bar"><div class="score-bar-fill" style="width:${score.score}%"></div></div>
          <div style="margin-top:6px"><span class="preset-tag ${score.tier==='good'?'good':(score.tier==='none'?'bad':'')}">${tierLabel(score.tier)}</span></div>
        </div>
        <div style="flex:1;min-width:200px;font-size:.85rem;color:var(--text2);line-height:1.6">${tierHint(score.tier)}</div>
      </div>
    </div>
    <table class="dmarc-table">
      ${row(t('fieldVersion'), `<code>${d.v ?? '—'}</code>`)}
      ${row(t('fieldPolicy'), policyBadge(d.p))}
      ${row(t('fieldSubPolicy'), policyBadge(d.sp) || (d.sp ? `<span class="dmarc-badge">${d.sp}</span>` : null))}
      ${row(t('fieldAdkim'), d.adkim ? `<code>${d.adkim}</code> <span class="preset-tag">${d.adkim==='s'?'strict':'relaxed'}</span>` : null)}
      ${row(t('fieldAspf'), d.aspf ? `<code>${d.aspf}</code> <span class="preset-tag">${d.aspf==='s'?'strict':'relaxed'}</span>` : null)}
      ${row(t('fieldPct'), d.pct!=null ? `<code>${d.pct}%</code>` : null)}
      ${row(t('fieldRua'), ruaTxt)}
      ${row(t('fieldRuf'), rufTxt)}
      ${row(t('fieldFo'), d.fo ? `<code>${d.fo}</code>` : null)}
      ${row(t('fieldRi'), d.ri ? `<code>${d.ri}</code> (${parseInt(d.ri,10)}s = ${parseInt(d.ri,10)/86400}d)` : null)}
    </table>
    <h3 style="margin-top:20px;font-size:1rem">${t('rawRecord')}</h3>
    <div class="raw-record">${dmarcRecs[0]}</div>
    <p style="margin-top:12px;font-size:.78rem;color:var(--text2)">↳ Queried <code>_dmarc.${domain}</code> TXT via Google Public DNS (DNS-over-HTTPS).</p>
  `;
}

async function lookup() {
  let domain = $('#domain').value.trim().toLowerCase();
  if (!domain) return;
  domain = domain.replace(/^https?:\/\//, '').replace(/^www\./, '').replace(/\/.*$/, '');
  $('#domain').value = domain;
  $('#result').innerHTML = `<div class="loading">${t('loading')}</div>`;
  try {
    const data = await dohLookup(`_dmarc.${domain}`, 'TXT');
    renderResult(domain, data);
  } catch (e) {
    $('#result').innerHTML = `<div class="empty"><p>⚠️ ${e.message}</p><p style="color:var(--text2);font-size:.85rem">DNS-over-HTTPS may be blocked on your network.</p></div>`;
  }
}

$('#lookup-btn').textContent = t('lookup');
$('#lookup-btn').onclick = lookup;
$('#domain').addEventListener('keydown', e => { if (e.key === 'Enter') lookup(); });

const examples = ['google.com', 'github.com', 'paypal.com', 'microsoft.com', 'apple.com', 'amazon.com'];
$('#examples').innerHTML = examples.map(d => `<button data-d="${d}">${d}</button>`).join('');
$('#examples').querySelectorAll('button').forEach(b => {
  b.onclick = () => { $('#domain').value = b.dataset.d; lookup(); };
});
