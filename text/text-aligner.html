<script>
GZI18n.register({
  en: {
    toolTitle: 'Text Aligner & Padder',
    toolDesc: 'Align text left, right or center, and pad every line to a fixed width with spaces or a custom character. Perfect for ASCII tables, monospace columns and fixed-width formatting.',
    inputLabel: 'Input Text',
    outputLabel: 'Aligned Output',
    align: 'Alignment',
    left: 'Left',
    right: 'Right',
    center: 'Center',
    width: 'Width',
    auto: 'Auto',
    fill: 'Fill char',
    trim: 'Trim trailing pad',
    example: 'Example',
    copy: 'Copy',
    clear: 'Clear',
    result: (n) => `✓ Aligned ${n} lines`,
    step1: 'Paste your text into the input area',
    step2: 'Pick alignment — Left, Right or Center',
    step3: 'Set width (auto = widest line) and fill character',
    step4: 'Click Copy to copy the aligned result',
  },
  zh: {
    toolTitle: '文本对齐与填充工具',
    toolDesc: '将文本左对齐、右对齐或居中对齐，并用空格或自定义字符填充每行到固定宽度。适合 ASCII 表格、等宽列和固定宽度格式化。',
    inputLabel: '输入文本',
    outputLabel: '对齐结果',
    align: '对齐方式',
    left: '左对齐',
    right: '右对齐',
    center: '居中',
    width: '宽度',
    auto: '自动',
    fill: '填充字符',
    trim: '去除尾部填充',
    example: '示例',
    copy: '复制',
    clear: '清空',
    result: (n) => `✓ 已对齐 ${n} 行`,
    step1: '在输入区粘贴文本',
    step2: '选择对齐方式 — 左对齐、右对齐或居中',
    step3: '设置宽度（自动 = 最宽行）和填充字符',
    step4: '点击「复制」将对齐结果复制到剪贴板',
  }
});

let alignMode = 'left';
let widthMode = 'auto';
let customWidth = 20;
let fillChar = ' ';
let trimTrail = false;
const { $, copyText, t } = GZ;

function padLine(str, width) {
  const len = [...str].length;
  if (len >= width) return str;
  const pad = width - len;
  const fill = fillChar || ' ';
  if (alignMode === 'left') return str + fill.repeat(pad);
  if (alignMode === 'right') return fill.repeat(pad) + str;
  // center
  const left = Math.floor(pad / 2);
  const right = pad - left;
  return fill.repeat(left) + str + fill.repeat(right);
}

function doAlign() {
  const raw = $('#input').value;
  if (!raw) { $('#output').textContent = ''; $('#status').innerHTML = ''; return; }
  let lines = raw.split(/\r?\n/);
  // strip trailing newline-only last element if present
  const width = widthMode === 'auto'
    ? Math.max(...lines.map(l => [...l].length), 0)
    : Math.max(1, customWidth || 1);
  let out = lines.map(l => padLine(l, width));
  if (trimTrail && alignMode === 'left') {
    // keep as is for left
  }
  $('#output').textContent = out.join('\n');
  $('#status').innerHTML = `<span style="color:var(--gz-success)">${t('result', out.length)}</span> <span style="opacity:.7">(width ${width})</span>`;
}

function loadExample() {
  $('#input').value = 'Name\nAlice\nBob\nCharlie Jr.\nDiana';
  doAlign();
}

function doClear() { $('#input').value = ''; $('#output').textContent = ''; $('#status').innerHTML = ''; }

$('#input').addEventListener('input', doAlign);

$('#controls').innerHTML = `
  <label>${t('align')}:
    <select id="alignSel" onchange="alignMode=this.value;doAlign()">
      <option value="left">${t('left')}</option>
      <option value="right">${t('right')}</option>
      <option value="center">${t('center')}</option>
    </select>
  </label>
  <label>${t('width')}:
    <select id="widthSel" onchange="widthMode=this.value;$('#widthInput').style.display=this.value==='custom'?'':'none';doAlign()">
      <option value="auto">${t('auto')}</option>
      <option value="custom">${t('custom')||'Custom'}</option>
    </select>
  </label>
  <input type="number" id="widthInput" value="20" min="1" max="500" style="width:70px;display:none" oninput="customWidth=+this.value||1;doAlign()">
  <label>${t('fill')}: <input type="text" id="fillInput" value=" " maxlength="3" style="width:50px" oninput="fillChar=this.value;doAlign()"></label>`;

$('#toolbar').innerHTML = `
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

$('#lbl-in').textContent = t('inputLabel');
$('#lbl-out').textContent = t('outputLabel');

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],

    {icon:'↕️', href:'/text/sort-lines.html', name:'Sort Lines'},
    {icon:'🔢', href:'/text/column-extractor.html', name:'Column Extractor'},
  ]
});
</script>
