<script>
GZI18n.register({
  en: {
    toolTitle: 'HTML Sanitizer',
    toolDesc: 'Remove dangerous scripts, XSS vectors and unwanted tags from HTML. Whitelist-based filtering keeps safe elements — runs entirely in your browser.',

    step4: 'Copy the sanitized HTML from the output area',
  },
  zh: {
    toolTitle: 'HTML 消毒器',
    toolDesc: '移除 HTML 中的危险脚本、XSS 攻击向量和不需要的标签。基于白名单的过滤保留安全元素 — 完全浏览器本地运行。',
    sanitize: '消毒',
    optFormatting: '格式化',
    optLinks: '链接',
    optImages: '图片',
    optTables: '表格',
    optMedia: '媒体',
    optForms: '表单',
    removed: '已移除',
    tagsStripped: '个标签被移除',
    charsBefore: '字符(前)',
    charsAfter: '字符(后)',
    step1: '将 HTML 粘贴到输入区',
    step2: '使用选项选择要保留的标签类别',
    step3: '点击「消毒」按钮清理 HTML',
    step4: '从输出区复制消毒后的 HTML',
  }
});

const { $, copyText, t } = GZ;

const tagSets = {
  formatting: ['p','br','hr','b','i','u','s','em','strong','small','sub','sup','mark','del','ins','abbr','cite','dfn','kbd','samp','var','span','div','h1','h2','h3','h4','h5','h6','blockquote','pre','code','details','summary','figure','figcaption','ruby','rt','rp','bdi','bdo','wbr'],
  links: ['a'],
  images: ['img','picture','source'],
  tables: ['table','thead','tbody','tfoot','tr','th','td','caption','colgroup','col'],
  media: ['audio','video','source','track'],
  forms: ['form','input','button','select','option','optgroup','textarea','label','fieldset','legend','datalist','output','progress','meter'],
};

const globalAttrs = ['class','id','title','lang','dir','role','aria-label','aria-hidden','aria-expanded','style'];
const tagAttrs = {
  a: ['href','target','rel','download'],
  img: ['src','alt','width','height','loading','decoding'],
  td: ['colspan','rowspan','headers'],
  th: ['colspan','rowspan','headers','scope'],
  col: ['span'],
  colgroup: ['span'],
  ol: ['start','type','reversed'],
  li: ['value'],
  blockquote: ['cite'],
  q: ['cite'],
  time: ['datetime'],
  meter: ['value','min','max','low','high','optimum'],
  progress: ['value','max'],
  input: ['type','name','value','placeholder','required','disabled','readonly','checked','min','max','step','pattern','maxlength','minlength','accept','multiple','autofocus','autocomplete','list','form'],
  textarea: ['name','rows','cols','placeholder','required','disabled','readonly','maxlength','minlength','wrap','form'],
  select: ['name','required','disabled','multiple','size','form'],
  option: ['value','selected','disabled','label'],
  button: ['type','name','value','disabled','form'],
  form: ['action','method','enctype','name','target','novalidate','autocomplete'],
  label: ['for','form'],
  fieldset: ['disabled','form','name'],
  source: ['src','type','srcset','sizes','media'],
  audio: ['src','controls','loop','muted','preload'],
  video: ['src','controls','loop','muted','preload','width','height','poster','playsinline'],
  track: ['src','kind','srclang','label','default'],
};

const opts = { formatting: true, links: true, images: true, tables: true, media: false, forms: false };

function buildOptions() {
  const el = $('#options');
  el.innerHTML = Object.keys(opts).map(key =>
    `<label style="cursor:pointer;display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border:1px solid var(--border);border-radius:4px">
      <input type="checkbox" ${opts[key]?'checked':''} onchange="opts['${key}']=this.checked"> ${t('opt'+key.charAt(0).toUpperCase()+key.slice(1))}
    </label>`
  ).join('');
}

function getAllowedTags() {
  let tags = new Set();
  for (const [key, on] of Object.entries(opts)) {
    if (on) tagSets[key].forEach(t => tags.add(t));
  }
  return tags;
}

function doSanitize() {
  const inp = $('#input').value;
  if (!inp.trim()) { $('#output').textContent = ''; $('#status').innerHTML = ''; return; }

  const allowed = getAllowedTags();
  const parser = new DOMParser();
  const doc = parser.parseFromString(`<div>${inp}</div>`, 'text/html');
  const container = doc.body.firstChild;
  let removedCount = 0;

  function walk(node) {
    const children = Array.from(node.childNodes);
    for (const child of children) {
      if (child.nodeType === 1) { // Element
        const tag = child.tagName.toLowerCase();
        if (!allowed.has(tag)) {
          // Replace with its children (unwrap)
          const parent = child.parentNode;
          while (child.firstChild) {
            parent.insertBefore(child.firstChild, child);
          }
          parent.removeChild(child);
          removedCount++;
        } else {
          // Filter attributes
          const allowedForTag = new Set([...globalAttrs, ...(tagAttrs[tag] || [])]);
          const attrs = Array.from(child.attributes);
          for (const attr of attrs) {
            const name = attr.name.toLowerCase();
            // Remove event handlers, javascript: URLs, data: URLs in src/href
            if (name.startsWith('on') || !allowedForTag.has(name)) {
              child.removeAttribute(attr.name);
              removedCount++;
              continue;
            }
            if ((name === 'href' || name === 'src' || name === 'action' || name === 'formaction') && attr.value.trim().toLowerCase().startsWith('javascript:')) {
              child.removeAttribute(attr.name);
              removedCount++;
            }
            if ((name === 'href' || name === 'src' || name === 'action' || name === 'formaction') && attr.value.trim().toLowerCase().startsWith('data:text/html')) {
              child.removeAttribute(attr.name);
              removedCount++;
            }
          }
          walk(child);
        }
      }
    }
  }
  walk(container);

  const result = container.innerHTML;
  $('#output').textContent = result;
  $('#status').innerHTML = `<span style="color:var(--gz-success)">${removedCount} ${t('tagsStripped')}</span> &nbsp;|&nbsp; ${inp.length} ${t('charsBefore')} &nbsp;→&nbsp; ${result.length} ${t('charsAfter')}`;
}

function loadExample() {
  $('#input').value = `<div class="post">
  <h2>Welcome to my blog</h2>
  <p>This is a <strong>sample</strong> post with some <em>formatting</em>.</p>
  <img src="https://example.com/image.jpg" alt="Example" onerror="alert('xss')">
  <a href="javascript:alert('xss')" onclick="steal()">Click me</a>
  <script>document.cookie<\/script>
  <iframe src="https://evil.com" onload="alert(1)"></iframe>
  <p style="color:red">Red text with <a href="https://example.com" target="_blank" rel="noopener">safe link</a></p>
  <table><tr><td onmouseover="alert(1)">Cell</td></tr></table>
  <div style="background:url('javascript:alert(1)')">Dangerous background</div>
</div>`;
  doSanitize();
}

function doClear() { $('#input').value = ''; $('#output').textContent = ''; $('#status').innerHTML = ''; }

buildOptions();

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="doSanitize()">${t('sanitize')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

    {icon:'✅', href:'/dev/html-validator.html', name:'HTML Validator'},
  ]
});
</script>
