.st-wrap{max-width:560px;margin:0 auto;text-align:center}
.st-modes{display:flex;gap:6px;justify-content:center;margin-bottom:20px;flex-wrap:wrap}
.st-modes button{background:var(--glass2);border:1px solid var(--border);color:var(--text);padding:8px 16px;border-radius:18px;cursor:pointer;font-size:.85em;font-weight:600;transition:.2s}
.st-modes button.active{background:var(--accent);color:#000;border-color:var(--accent)}
.st-display{position:relative;width:260px;height:260px;margin:0 auto 20px}
.st-ring{width:100%;height:100%;transform:rotate(-90deg)}
.st-ring circle{fill:none;stroke-width:10}
.st-ring .bg{stroke:var(--glass2)}
.st-ring .fg{stroke:var(--accent);stroke-linecap:round;transition:stroke-dashoffset .5s}
.st-time{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:3em;font-weight:700;font-variant-numeric:tabular-nums;letter-spacing:-.02em}
.st-sub{position:absolute;top:68%;left:50%;transform:translateX(-50%);font-size:.82em;opacity:.7;text-transform:uppercase;letter-spacing:.08em}
.st-controls{display:flex;gap:10px;justify-content:center;margin-bottom:20px;flex-wrap:wrap}
.st-btn{background:var(--accent);color:#000;border:none;padding:12px 28px;border-radius:24px;font-size:1em;font-weight:700;cursor:pointer;transition:.2s;min-width:110px}
.st-btn:hover{opacity:.88}
.st-btn.secondary{background:var(--glass2);color:var(--text);border:1px solid var(--border)}
.st-settings{background:var(--glass);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:16px;display:grid;grid-template-columns:1fr 1fr;gap:12px;text-align:left}
.st-settings label{font-size:.82em;color:var(--text2);display:block;margin-bottom:4px}
.st-settings input{width:100%;background:var(--glass2);border:1px solid var(--border);color:var(--text);padding:8px 10px;border-radius:8px;font-size:.9em}
.st-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.st-stat{background:var(--glass2);border:1px solid var(--border);border-radius:12px;padding:14px 8px}
.st-stat .v{font-size:1.5em;font-weight:700;color:var(--accent)}
.st-stat .k{font-size:.72em;opacity:.7;margin-top:4px;text-transform:uppercase;letter-spacing:.05em}
.st-history{text-align:left}
.st-history h3{font-size:.9em;margin-bottom:8px}
.st-hist-item{display:flex;justify-content:space-between;padding:6px 10px;background:var(--glass2);border:1px solid var(--border);border-radius:8px;margin-bottom:6px;font-size:.82em}
.st-goal-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;font-size:.85em}
.st-progress-bar{flex:1;height:8px;background:var(--glass2);border-radius:4px;overflow:hidden;border:1px solid var(--border)}
.st-progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),#00d672);transition:width .5s}
</style>

<script>
GZI18n.register({
  en: {
    toolTitle: 'Study Timer',
    toolDesc: 'Free online study timer with stopwatch and Pomodoro modes. Track sessions, set goals and boost your focus — all in your browser.',
    modeStopwatch: 'Stopwatch',
    modePomodoro: 'Pomodoro',
    start: 'Start',
    pause: 'Pause',
    reset: 'Reset',
    work: 'Work',
    break: 'Break',
    workMin: 'Work (min)',
    breakMin: 'Break (min)',
    goalMin: 'Daily goal (min)',
    session: 'Session',
    today: 'Today',
    total: 'Total',
    sessions: 'sessions',
    history: 'Session History',
    noHistory: 'No sessions yet — press Start to begin studying!',
    goalLabel: 'Daily Goal',
    step1: 'Pick Stopwatch or Pomodoro mode',
    step2: 'Set your work and break durations (Pomodoro) or just a daily goal',
    step3: 'Press Start and focus — the timer tracks your progress',
    step4: 'Review your session history and total study time',
  },
  zh: {
    toolTitle: '学习计时器',
    toolDesc: '免费在线学习计时器，支持秒表和番茄钟模式。跟踪学习时段、设定目标、提升专注力 — 全部在浏览器中完成。',
    modeStopwatch: '秒表',
    modePomodoro: '番茄钟',
    start: '开始',
    pause: '暂停',
    reset: '重置',
    work: '专注',
    break: '休息',
    workMin: '专注（分钟）',
    breakMin: '休息（分钟）',
    goalMin: '每日目标（分钟）',
    session: '第',
    today: '今日',
    total: '总计',
    sessions: '次',
    history: '学习记录',
    noHistory: '还没有记录 — 点击「开始」开始学习吧！',
    goalLabel: '今日目标',
    step1: '选择秒表或番茄钟模式',
    step2: '设置专注和休息时长（番茄钟）或每日目标',
    step3: '点击「开始」专注学习 — 计时器自动跟踪进度',
    step4: '查看你的学习记录和累计时长',
  }
});

const { $, t } = GZ;
let mode = 'stopwatch';
let running = false;
let elapsed = 0; // seconds
let timerInterval = null;
let pomodoroPhase = 'work'; // work or break
let workDur = 25 * 60, breakDur = 5 * 60;
let goalMin = 120;
let sessions = JSON.parse(localStorage.getItem('gz-study-sessions') || '[]');

function fmt(sec) {
  sec = Math.floor(sec);
  const h = Math.floor(sec / 3600);
  const m = Math.floor((sec % 3600) / 60);
  const s = sec % 60;
  if (h > 0) return `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

function todayKey() { return new Date().toISOString().slice(0,10); }

function todayTotal() {
  return sessions.filter(s => s.date === todayKey()).reduce((a,s) => a + s.dur, 0);
}
function grandTotal() {
  return sessions.reduce((a,s) => a + s.dur, 0);
}

function updateDisplay() {
  let display, max, sub;
  if (mode === 'stopwatch') {
    display = elapsed;
    max = 0;
    sub = '';
  } else {
    const total = pomodoroPhase === 'work' ? workDur : breakDur;
    display = elapsed;
    max = total;
    sub = t(pomodoroPhase === 'work' ? 'work' : 'break');
  }
  $('#time').textContent = fmt(display);
  $('#modeLabel').textContent = sub;
  // ring
  const ring = $('#ring');
  const circ = 565.48;
  if (max > 0) {
    ring.style.strokeDashoffset = circ * (1 - Math.min(display / max, 1));
  } else {
    ring.style.strokeDashoffset = 0; // stopwatch: full ring static
  }
}

function updateStats() {
  const tt = todayTotal();
  const gt = grandTotal();
  $('#stats').innerHTML = `
    <div class="st-stat"><div class="v">${fmt(tt)}</div><div class="k">${t('today')}</div></div>
    <div class="st-stat"><div class="v">${sessions.length}</div><div class="k">${t('sessions')}</div></div>
    <div class="st-stat"><div class="v">${fmt(gt)}</div><div class="k">${t('total')}</div></div>`;
  // goal
  const pct = goalMin > 0 ? Math.min(100, (tt / 60) / goalMin * 100) : 0;
  $('#goalFill').style.width = pct + '%';
  $('#goalText').textContent = `${Math.floor(tt/60)} / ${goalMin}m`;
}

function updateHistory() {
  const recent = sessions.slice(-8).reverse();
  if (recent.length === 0) {
    $('#history').innerHTML = `<p style="opacity:.6;font-size:.85em">${t('noHistory')}</p>`;
    return;
  }
  $('#history').innerHTML = recent.map(s => {
    const d = new Date(s.ts);
    const label = `${d.toLocaleDateString()} ${d.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}`;
    return `<div class="st-hist-item"><span>${label}</span><span style="color:var(--accent);font-weight:600">${fmt(s.dur)} • ${t(s.phase||'work')}</span></div>`;
  }).join('');
}

function tick() {
  elapsed++;
  if (mode === 'pomodoro') {
    const max = pomodoroPhase === 'work' ? workDur : breakDur;
    if (elapsed >= max) {
      // log session only for work phases
      if (pomodoroPhase === 'work') {
        sessions.push({ date: todayKey(), ts: Date.now(), dur: elapsed, phase: 'work' });
        localStorage.setItem('gz-study-sessions', JSON.stringify(sessions));
      }
      pomodoroPhase = pomodoroPhase === 'work' ? 'break' : 'work';
      elapsed = 0;
      // beep
      try { beep(); } catch(e){}
    }
  }
  updateDisplay();
  updateStats();
}

function beep() {
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.connect(gain); gain.connect(ctx.destination);
  osc.frequency.value = 800; osc.type = 'sine';
  gain.gain.setValueAtTime(0.3, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.5);
  osc.start(); osc.stop(ctx.currentTime + 0.5);
}

function start() {
  if (running) return;
  running = true;
  timerInterval = setInterval(tick, 1000);
  renderControls();
}
function pause() {
  if (!running) return;
  running = false;
  clearInterval(timerInterval);
  renderControls();
}
function reset() {
  if (mode === 'stopwatch' && elapsed > 0) {
    sessions.push({ date: todayKey(), ts: Date.now(), dur: elapsed, phase: 'work' });
    localStorage.setItem('gz-study-sessions', JSON.stringify(sessions));
  }
  running = false;
  clearInterval(timerInterval);
  elapsed = 0;
  pomodoroPhase = 'work';
  updateDisplay();
  updateStats();
  updateHistory();
  renderControls();
}

function renderControls() {
  $('#controls').innerHTML = running
    ? `<button class="st-btn" onclick="pause()">${t('pause')}</button><button class="st-btn secondary" onclick="reset()">${t('reset')}</button>`
    : `<button class="st-btn" onclick="start()">${t('start')}</button><button class="st-btn secondary" onclick="reset()">${t('reset')}</button>`;
}

function switchMode(m) {
  if (running) pause();
  mode = m;
  elapsed = 0;
  pomodoroPhase = 'work';
  $('#goalRow').style.display = m === 'pomodoro' ? 'flex' : 'flex';
  $('#settings').style.display = m === 'pomodoro' ? 'grid' : 'grid';
  document.querySelectorAll('.st-modes button').forEach(b => b.classList.toggle('active', b.dataset.m === m));
  updateDisplay();
  renderSettings();
}

function renderSettings() {
  if (mode === 'pomodoro') {
    $('#settings').innerHTML = `
      <div><label>${t('workMin')}</label><input type="number" id="wm" min="1" max="180" value="${workDur/60}" onchange="workDur=+this.value*60;updateDisplay()"></div>
      <div><label>${t('breakMin')}</label><input type="number" id="bm" min="1" max="60" value="${breakDur/60}" onchange="breakDur=+this.value*60;updateDisplay()"></div>`;
  } else {
    $('#settings').innerHTML = `<div style="grid-column:1/-1"><label>${t('goalMin')}</label><input type="number" id="gm" min="1" max="1440" value="${goalMin}" onchange="goalMin=+this.value;updateStats()"></div>`;
  }
  // goal label
  $('#goalLabel').textContent = t('goalLabel');
}

// init
$('#modes').innerHTML = `<button data-m="stopwatch" onclick="switchMode('stopwatch')">${t('modeStopwatch')}</button><button data-m="pomodoro" onclick="switchMode('pomodoro')">${t('modePomodoro')}</button>`;
$('#histTitle').textContent = t('history');
switchMode('stopwatch');
renderControls();
updateDisplay();
updateStats();
updateHistory();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🍅', href:'/calc/pomodoro.html', name:'Pomodoro Timer'},
    {icon:'⏱️', href:'/calc/timer-stopwatch.html', name:'Stopwatch'},
    {icon:'⏰', href:'/calc/countdown-timer.html', name:'Countdown Timer'},
    {icon:'📊', href:'/text/word-counter.html', name:'Word Counter'},
  ]
});
</script>

</body>
