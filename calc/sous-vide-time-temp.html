<script>
GZI18n.register({en:{toolTitle:'Sous Vide Time & Temperature Calculator',toolDesc:'Precise sous vide cooking time and temperature for steak, chicken, pork, fish, eggs and vegetables. Doneness presets and pasteurization-safe times.',chooseFood:'Choose food',doneness:'Doneness',thickness:'Thickness',inch:'inch',result:'Sous Vide Setting',note:'Times are minimums for pasteurization at the listed temperature. Longer cooks (within safe ranges) tenderize tough cuts. Always sear after for crust.',faqTitle:'Sous Vide FAQ',q1:'What temperature is medium-rare steak sous vide?',a1:'The widely accepted temperature for medium-rare sous vide steak is 129°F to 134°F (54°C to 57°C). Many cooks favor 130°F (54.4°C) for a tender, evenly pink result.',q2:'How long should I sous vide chicken breast?',a2:'Pasteurized chicken breast at 145°F (63°C) needs at least 50 minutes for a half-inch piece. Most cooks use 145-150°F for 1-2 hours for juicy texture.',q3:'Do I need to sous vide longer for thicker food?',a3:'Yes. The core must reach the target temperature before the pasteurization clock starts. A 1-inch steak takes about 1 hour, a 2-inch steak may need 2.5-4 hours.',q4:'Is sous vide safe for long cooks?',a4:'Sous vide is safe when you follow pasteurization time-temperature tables. Avoid the danger zone (40-130°F / 4-54°C) for extended periods. Do not exceed 4 hours below 130°F.',step1:'Choose the food and doneness you want.',step2:'Enter the thickness of the portion.',step3:'Read the recommended sous vide temperature and minimum time.',step4:'Sear the food briefly after cooking for a golden crust.'},zh:{toolTitle:'低温慢煮（Sous Vide）时间温度计算器',toolDesc:'精确计算牛排、鸡肉、猪肉、鱼类、鸡蛋和蔬菜的低温慢煮时间和温度。多种熟度预设和巴氏杀菌安全时间。',chooseFood:'选择食物',doneness:'熟度',thickness:'厚度',inch:'英寸',result:'低温慢煮设置',note:'所列时间为该温度下达到巴氏杀菌的最短时间。在安全范围内的更长烹饪可让硬肉变嫩。烹饪后务必煎制上色。',faqTitle:'低温慢煮常见问题',q1:'低温慢煮牛排五分熟（medium-rare）用多少度？',a1:'公认的五分熟低温慢煮牛排温度为 129°F 至 134°F（54°C 至 57°C）。许多厨师偏爱 130°F（54.4°C）以获得从内到外均匀粉嫩的口感。',q2:'低温慢煮鸡胸肉要多久？',a2:'145°F（63°C）下巴氏杀菌的半英寸鸡胸肉至少需要 50 分钟。大多数厨师选择 145-150°F 烹饪 1-2 小时以获得多汁口感。',q3:'较厚的食材需要更长时间吗？',a3:'是的。食材中心必须先达到目标温度，巴氏杀菌计时才开始。1 英寸牛排约需 1 小时，2 英寸牛排可能需要 2.5-4 小时。',q4:'长时间低温慢煮安全吗？',a4:'遵循巴氏杀菌时间-温度表即安全。避免在危险温度区（40-130°F / 4-54°C）长时间停留。低于 130°F 时不要超过 4 小时。',step1:'选择食物和所需熟度。',step2:'输入食材厚度。',step3:'查看推荐的低温慢煮温度和最短时间。',step4:'烹饪后快速煎制以获得金黄外皮。'}});
const{$,t}=GZ;
const FOODS={
  steak:{en:'Steak / beef',zh:'牛排 / 牛肉',doneness:{rare:{en:'Rare',zh:'一分',f:120,c:49,time:'1-2.5h'},mr:{en:'Medium-rare',zh:'三分',f:130,c:54,time:'1-4h'},m:{en:'Medium',zh:'五分',f:135,c:57,time:'1-4h'},mw:{en:'Medium-well',zh:'七分',f:145,c:63,time:'1-4h'},wd:{en:'Well done',zh:'全熟',f:155,c:68,time:'1-4h'}}},
  chicken:{en:'Chicken breast',zh:'鸡胸肉',doneness:{juicy:{en:'Juicy (soft)',zh:'软嫩',f:145,c:63,time:'1-2h'},tender:{en:'Tender (firm)',zh:'紧实',f:150,c:66,time:'1-2h'},trad:{en:'Traditional 165°F',zh:'传统 165°F',f:165,c:74,time:'1h'}}},
  pork:{en:'Pork chop / tenderloin',zh:'猪排 / 猪里脊',doneness:{mr:{en:'Medium',zh:'五分',f:140,c:60,time:'1-2.5h'},m:{en:'Medium-well',zh:'七分',f:145,c:63,time:'1.5-3h'},wd:{en:'Well done',zh:'全熟',f:155,c:68,time:'1.5-3h'}}},
  salmon:{en:'Salmon',zh:'三文鱼',doneness:{rare:{en:'Rare (soft)',zh:'软嫩',f:115,c:46,time:'30-45m'},m:{en:'Medium',zh:'五分',f:125,c:52,time:'45-60m'},f:{en:'Firm / well',zh:'全熟',f:135,c:57,time:'45-60m'}}},
  whitefish:{en:'White fish',zh:'白鱼',doneness:{soft:{en:'Soft',zh:'软',f:125,c:52,time:'30-45m'},firm:{en:'Firm',zh:'紧实',f:135,c:57,time:'30-45m'}}},
  egg:{en:'Egg',zh:'鸡蛋',doneness:{soft:{en:'Soft-set',zh:'溏心',f:167,c:75,time:'13-15m'},jammy:{en:'Jammy',zh:'流心',f:170,c:77,time:'1h'},hard:{en:'Hard',zh:'全熟',f:172,c:78,time:'1h'}}},
  brisket:{en:'Brisket / tough cuts',zh:'牛腩 / 硬肉',doneness:{tender:{en:'Tender (24-72h)',zh:'软嫩（24-72 小时）',f:155,c:68,time:'24-72h'}}},
  veg:{en:'Root vegetables',zh:'根茎类蔬菜',doneness:{tender:{en:'Tender',zh:'软',f:183,c:84,time:'45-60m'}}}
};

const lang=GZI18n.getLang();
const isZh=lang==='zh';
function buildDoneness(foodKey){const f=FOODS[foodKey];return Object.entries(f.doneness).map(([k,v])=>`<button class="${k===curDone?'active':''}" data-k="${k}" onclick="setDone('${k}')">${isZh?v.zh:v.en}</button>`).join('')}
function buildFood(){return Object.entries(FOODS).map(([k,v])=>`<option value="${k}" ${k===curFood?'selected':''}>${isZh?v.zh:v.en}</option>`).join('')}
$('#app').innerHTML=`
<div class="sv-form">
<div class="sv-field"><label>${t('chooseFood')}</label><select id="food" onchange="setFood(this.value)">${buildFood()}</select></div>
<div class="sv-field"><label>${t('thickness')}</label><input id="thick" type="number" min="0.25" step="0.25" value="1"><span style="display:block;font-size:.75rem;color:var(--text2);margin-top:3px">${t('inch')}</span></div>
</div>
<div class="sv-label">${t('doneness')}</div>
<div class="sv-doneness" id="donenessBox">${buildDoneness(curFood)}</div>
<div class="sv-result">
<div class="sv-label">${t('result')}</div>
<div class="sv-temp" id="temp"></div>
<div class="sv-time" id="time"></div>
<div class="sv-note">${t('note')}</div>
</div>
<div class="sv-faq"><h3>${t('faqTitle')}</h3>${[1,2,3,4].map(n=>`<details><summary>${t('q'+n)}</summary><p>${t('a'+n)}</p></details>`).join('')}</div>`;
function setFood(k){curFood=k;const firstKey=Object.keys(FOODS[k].doneness)[0];curDone=firstKey;$('#donenessBox').innerHTML=buildDoneness(k);calc()}
function setDone(k){curDone=k;document.querySelectorAll('#donenessBox button').forEach(b=>b.className=b.dataset.k===k?'active':'');calc()}
function calc(){const f=FOODS[curFood].doneness[curDone];$('#temp').textContent=`${f.f}°F / ${f.c}°C`;const th=+$('#thick').value||1;let timeStr=f.time;if(th>=2&&f.time.includes('h')&&!f.time.includes('m')){const parts=f.time.split('-');timeStr=parts.map(p=>{const h=parseFloat(p);return h?(h*(th>2?1.5:1.1)).toFixed(1)+'h':p}).join('-')}$('#time').textContent=timeStr}
calc();
