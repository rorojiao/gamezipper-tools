<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"What is a good maximum heart rate?","acceptedAnswer":{"@type":"Answer","text":"Maximum heart rate (MHR) is the upper limit of what your cardiovascular system can handle during physical activity. It generally decreases with age. The classic estimate is 220 minus your age, though the Tanaka formula (208 − 0.7 × age) is considered more accurate for adults."}},{"@type":"Question","name":"What are the 5 heart rate zones?","acceptedAnswer":{"@type":"Answer","text":"Zone 1 (50-60% of MHR) is very light recovery. Zone 2 (60-70%) is the fat-burning/aerobic base. Zone 3 (70-80%) is aerobic cardio. Zone 4 (80-90%) is anaerobic threshold. Zone 5 (90-100%) is maximum/peak effort."}},{"@type":"Question","name":"Which MHR formula is most accurate?","acceptedAnswer":{"@type":"Answer","text":"Tanaka (208 − 0.7 × age) is more accurate for healthy adults over 40. Fox (220 − age) is the classic and widely-used estimate but tends to underestimate older adults. Gellish (207 − 0.7 × age) is similar to Tanaka. Try all three and use the average."}},{"@type":"Question","name":"How often should I train in each zone?","acceptedAnswer":{"@type":"Answer","text":"Most coaches recommend 80% of training time in Zones 1-2 (aerobic base) and 20% in Zones 4-5 (high intensity). Always warm up before entering high zones and consult a doctor if you have any cardiovascular conditions."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="hr-input">
      <label><span id="lbl-age"></span><input type="number" id="age" min="1" max="120" placeholder="30"></label>
      <label><span id="lbl-formula"></span><select id="formula">
        <option value="tanaka">Tanaka (208 − 0.7 × age)</option>
        <option value="fox">Fox (220 − age)</option>
        <option value="gellish">Gellish (207 − 0.7 × age)</option>
        <option value="avg" selected>Average of all three</option>
      </select></label>
      <button class="gz-btn" id="btn-calc" onclick="calc()"></button>
    </div>
    <div id="result"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Heart Rate Max Calculator',
    toolDesc: 'Calculate your maximum heart rate (MHR) and 5 training zones with accurate formulas.',
    age: 'Age (years)',
    formula: 'Formula',
    calcBtn: 'Calculate',
    clear: 'Clear',
    yourMHR: 'Your Maximum Heart Rate',
    bpm: 'bpm',
    zone1: 'Zone 1 — Recovery',
    zone2: 'Zone 2 — Fat Burn',
    zone3: 'Zone 3 — Aerobic',
    zone4: 'Zone 4 — Anaerobic',
    zone5: 'Zone 5 — Maximum',
    step1: 'Enter your age in years',
    step2: 'Choose an MHR formula (or use the average)',
    step3: 'Click Calculate to see your max heart rate',
    step4: 'Read your 5 training zones with bpm ranges',
  },
  zh: {
    toolTitle: '最大心率计算器',
    toolDesc: '使用多种公式计算你的最大心率（MHR）和 5 个训练强度区间。',
    age: '年龄（岁）',
    formula: '公式',
    calcBtn: '计算',
    clear: '清空',
    yourMHR: '你的最大心率',
    bpm: '次/分',
    zone1: '区间 1 — 恢复',
    zone2: '区间 2 — 燃脂',
    zone3: '区间 3 — 有氧',
    zone4: '区间 4 — 无氧',
    zone5: '区间 5 — 极限',
    step1: '输入年龄（岁）',
    step2: '选择 MHR 公式（或使用平均值）',
    step3: '点击「计算」查看最大心率',
    step4: '查看 5 个训练区间的心率范围',
  }
});

const { $, t } = GZ;

$('#lbl-age').textContent = t('age');
$('#lbl-formula').textContent = t('formula');
$('#btn-calc').textContent = t('calcBtn');

function mhr(age, f) {
  if (f === 'tanaka')  return 208 - 0.7 * age;
  if (f === 'fox')     return 220 - age;
  if (f === 'gellish') return 207 - 0.7 * age;
  // avg
  return ((208 - 0.7 * age) + (220 - age) + (207 - 0.7 * age)) / 3;
}

const ZONES = [
  { key:'zone1', lo:0.50, hi:0.60 },
  { key:'zone2', lo:0.60, hi:0.70 },
  { key:'zone3', lo:0.70, hi:0.80 },
  { key:'zone4', lo:0.80, hi:0.90 },
  { key:'zone5', lo:0.90, hi:1.00 },
];

function calc() {
  const age = parseInt($('#age').value, 10);
  if (!age || age < 1) return;
  const f = $('#formula').value;
  const max = mhr(age, f);
  $('#result').innerHTML = `
    <div class="hr-big">
      <div class="v">${Math.round(max)} <span style="font-size:.5em">${t('bpm')}</span></div>
      <div class="l">${t('yourMHR')}</div>
    </div>
    <div class="hr-zones">
      ${ZONES.map(z => {
        const lo = Math.round(max * z.lo);
        const hi = Math.round(max * z.hi);
        return `<div class="hr-zone">
          <div><div class="name">${t(z.key)}</div><div class="pct">${Math.round(z.lo*100)}–${Math.round(z.hi*100)}% MHR</div></div>
          <div class="range">${lo}–${hi} ${t('bpm')}</div>
        </div>`;
      }).join('')}
    </div>`;
}

function doClear() { $('#age').value=''; $('#result').innerHTML=''; }

$('#toolbar').innerHTML = `
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'❤️', href:'/calc/bmi-calculator.html', name:'BMI'},
    {icon:'🔥', href:'/calc/bmr-calculator.html', name:'BMR'},
    {icon:'🏃', href:'/calc/calorie-burner-calculator.html', name:'Calories Burned'},
    {icon:'💧', href:'/calc/water-intake.html', name:'Water Intake'},
  ]
});
</script>
<script src="/tools-result-rec.js?v=20260707v520" defer></script>
</body>
