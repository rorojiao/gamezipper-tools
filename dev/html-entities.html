let currentCat = 'All';
function catKey() { return currentCat === 'All' ? 'all' : (currentCat.toLowerCase()); }
function isZh() { return (typeof GZI18n !== 'undefined' && GZI18n.getLang && GZI18n.getLang() === 'zh'); }
const CAT_LABELS_EN = ['All','Symbols','Math','Greek','Latin','Arrows','Currency','Markup','Misc'];
function catLabel(cat) {
  if (!isZh()) return cat;
  const map = {All:'全部',Symbols:'符号',Math:'数学',Greek:'希腊字母',Latin:'拉丁',Arrows:'箭头',Currency:'货币',Markup:'标记',Misc:'其他'};
  return map[cat] || cat;
}

function renderTabs() {
  const cats = ['All','Symbols','Math','Greek','Latin','Arrows','Currency','Markup','Misc'];
  $('#tabs').innerHTML = cats.map(c => `<div class="ent-tab ${c===currentCat?'active':''}" data-c="${c}">${catLabel(c)}</div>`).join('');
  $$('.ent-tab').forEach(el => el.addEventListener('click', () => {
    currentCat = el.getAttribute('data-c');
    renderTabs();
    renderGrid();
  }));
}
function $$(s,p){return [...((p||document).querySelectorAll(s))];}

function renderGrid() {
  const q = $('#search').value.toLowerCase().trim();
  const filtered = ENTITIES.filter(e => {
    if (currentCat !== 'All' && e.cat !== currentCat) return false;
    if (q) {
      const code = e.c.charCodeAt(0).toString(16);
      return e.n.toLowerCase().includes(q) || e.c === q || code === q || ('#'+e.c.charCodeAt(0).toString()).includes(q) || ('&#'+e.c.charCodeAt(0)).includes(q) || e.cat.toLowerCase().includes(q);
    }
    return true;
  });
  $('#grid').innerHTML = filtered.map(e => {
    const code = e.c.charCodeAt(0);
    const hex = code.toString(16).toUpperCase().padStart(4,'0');
    return `<div class="ent-card" data-n="${e.n}" data-c="${e.c}">
      <div class="ch">${e.c === ' ' ? '␣' : e.c}</div>
      <div class="name">&amp;${e.n};</div>
      <div class="code">&#${code}; / &#x${hex};</div>
    </div>`;
  }).join('') || `<div style="grid-column:1/-1;text-align:center;padding:30px;color:var(--text2)">No entities found</div>`;
  $$('.ent-card').forEach(el => {
    el.addEventListener('click', () => {
      const n = el.getAttribute('data-n');
      copyText('&' + n + ';');
    });
  });
}

function encodeText(s) {
  return s.replace(/[\u00A0-\u9999<>&"']/g, ch => {
    if (ch === '<') return '&lt;';
    if (ch === '>') return '&gt;';
    if (ch === '&') return '&amp;';
    if (ch === '"') return '&quot;';
    if (ch === "'") return '&apos;';
    return '&#' + ch.charCodeAt(0) + ';';
  });
}

function decodeText(s) {
  const named = new Map();
  for (const e of ENTITIES) named.set(e.n, e.c);
  named.set('nbsp', ' ');
  named.set('amp', '&');
  return s.replace(/&(#x?[0-9a-fA-F]+|[a-zA-Z]+);/g, (m, body) => {
    if (body[0] === '#') {
      const isHex = body[1] === 'x' || body[1] === 'X';
      const n = parseInt(isHex ? body.substring(2) : body.substring(1), isHex ? 16 : 10);
      if (isNaN(n) || n < 0 || n > 0x10FFFF) return m;
      try { return String.fromCodePoint(n); } catch(e) { return m; }
    }
    if (named.has(body)) return named.get(body);
    return m;
  });
}

$('#btn-enc').addEventListener('click', () => {
  $('#enc-output').value = encodeText($('#enc-input').value);
});
$('#btn-dec').addEventListener('click', () => {
  $('#enc-output').value = decodeText($('#enc-input').value);

$('#btn-clear').addEventListener('click', () => { $('#enc-input').value = ''; $('#enc-output').value = ''; });
