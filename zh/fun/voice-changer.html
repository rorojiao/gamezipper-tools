const { $, t } = GZ;

// Presets: pitch (semitones) + formant shift factor
const PRESETS = [
  {id:'normal',  en:'Normal',      zh:'原声',     ic:'🙂', pitch:0,  formant:1.0},
  {id:'chipmunk',en:'Chipmunk',    zh:'花栗鼠',   ic:'🐿️', pitch:8,  formant:1.6},
  {id:'helium',  en:'Helium',      zh:'氦气',     ic:'🎈', pitch:6,  formant:1.8},
  {id:'deep',    en:'Deep Bass',   zh:'低沉男声', ic:'👹', pitch:-7, formant:0.7},
  {id:'monster', en:'Monster',     zh:'怪兽',     ic:'🐲', pitch:-10,formant:0.6},
  {id:'robot',   en:'Robot',       zh:'机器人',   ic:'🤖', pitch:-3, formant:0.85, ring:true},
  {id:'alien',   en:'Alien',       zh:'外星人',   ic:'👽', pitch:5,  formant:1.3, ring:true},
  {id:'kid',     en:'Kid',         zh:'小孩',     ic:'🧒', pitch:4,  formant:1.4},
  {id:'phone',   en:'Telephone',   zh:'电话',     ic:'📞', pitch:-2, formant:1.0, band:true},
  {id:'echo',    en:'Echo Cave',   zh:'洞穴回声', ic:'🕳️', pitch:-4, formant:0.9, echo:true},
  {id:'squeak',  en:'Mouse Squeak',zh:'老鼠尖叫', ic:'🐭', pitch:11, formant:2.0},
  {id:'giant',   en:'Giant',       zh:'巨人',     ic:'🦣', pitch:-12,formant:0.5},
];

let audioCtx=null, source=null, inStream=null, shiftNode=null, dryGain=null, wetGain=null;
let ringMod=null, ringGain=null, bandFilter=null, echoDelay=null, echoFeedback=null, echoGain=null;
let analyser=null, micGain=null, currentPreset=null, running=false, meterRAF=null;
let userPitch=0, userFormant=1.0;

function status(s, isLive){
  const el=$('#status');
  el.textContent=s;
  el.className='vc-status '+(isLive?'live':'idle');
}

function buildPresets(){
  $('#presets').innerHTML=PRESETS.map(p=>`
    <div class="vc-preset" data-id="${p.id}">
      <span class="ic">${p.ic}</span>
      <span>${GZI18n.getLang()==='zh'?p.zh:p.en}</span>
    </div>`).join('');
  document.querySelectorAll('.vc-preset').forEach(el=>{
    el.onclick=()=>applyPreset(el.dataset.id);
  });
}

function applyPreset(id){
  const p=PRESETS.find(x=>x.id===id);
  if(!p) return;
  currentPreset=p;
  document.querySelectorAll('.vc-preset').forEach(el=>{
    el.classList.toggle('active', el.dataset.id===id);
  });
  // reset user overrides to preset defaults when picking a preset
  userPitch=p.pitch;
  userFormant=p.formant;
  const ps=$('#pitch-slider'), fs=$('#formant-slider');
  if(ps){ ps.value=userPitch; $('#pitch-val').textContent=userPitch; }
  if(fs){ fs.value=userFormant.toFixed(2); $('#formant-val').textContent=userFormant.toFixed(2); }
  if(running) tuneNodes();
}

function tuneNodes(){
  if(!currentPreset) return;
  const semi=userPitch;
  const rate=Math.pow(2, semi/12);
  if(shiftNode){
    try{ shiftNode.pitch=rate; }catch(e){}
  }
  if(micGain){ micGain.gain.value=1.0; }
  // formant: simulate by adjusting band filter center & gain
  if(bandFilter){
    bandFilter.frequency.value = 1500/Math.max(0.4,userFormant);
    bandFilter.Q.value = currentPreset.band ? 6 : 0.7;
  }
  // ring mod for robot/alien
  if(ringMod){
    ringMod.frequency.value = currentPreset.ring ? 50 : 0;
    ringGain.gain.value = currentPreset.ring ? 0.6 : 0;
  }
  // echo
  if(echoGain){
    echoGain.gain.value = currentPreset.echo ? 0.55 : 0;
  }
}

async function start(){
  if(running) return;
  if(!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia)){
    status(t('notSupported'), false); return;
  }
  status(t('statusLive'), true);
  try{
    inStream = await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:false,noiseSuppression:false,autoGainControl:false}});
  }catch(e){
    status(t('micErr'), false); return;
  }
  audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  source = audioCtx.createMediaStreamSource(inStream);

  // Pitch shifter (granular, delay-line based) using playbackRate on a ringbuffer through ScriptProcessor
  shiftNode = createPitchShifter(audioCtx);
  dryGain = audioCtx.createGain();
  wetGain = audioCtx.createGain();
  dryGain.gain.value=0;   // we don't pass through unchanged (would feed back)
  wetGain.gain.value=1.0;

  // Ring modulator
  ringMod = audioCtx.createOscillator();
  ringGain = audioCtx.createGain();
  ringMod.frequency.value=0;
  ringGain.gain.value=0;
  ringMod.connect(ringGain);
  ringMod.start();

  // Biquad for telephone / formant shaping
  bandFilter = audioCtx.createBiquadFilter();
  bandFilter.type='bandpass';
  bandFilter.frequency.value=1500;
  bandFilter.Q.value=0.7;

  // Echo
  echoDelay = audioCtx.createDelay(2.0);
  echoDelay.delayTime.value=0.25;
  echoFeedback = audioCtx.createGain();
  echoFeedback.gain.value=0.4;
  echoGain = audioCtx.createGain();
  echoGain.gain.value=0;

  // Analyser for meter
  analyser = audioCtx.createAnalyser();
  analyser.fftSize=512;

  micGain = audioCtx.createGain();
  micGain.gain.value=1.0;

  // Build graph:
  // source -> micGain -> shiftNode -> bandFilter -> [dry + ring mod] -> echo -> destination
  source.connect(micGain);
  micGain.connect(shiftNode.input);
  shiftNode.connect(bandFilter);

  // ring mod: multiply bandFilter output by oscillator (only when enabled)
  const ringMul = audioCtx.createGain();
  bandFilter.connect(ringMul);
  ringGain.connect(ringMul.gain); // modulates amplitude
  // when ring disabled, ringGain=0 so ringMul passes signal through (gain=1 from base)
  // need base gain 1 on ringMul
  ringMul.gain.value=1.0;

  ringMul.connect(echoDelay);
  echoDelay.connect(echoFeedback);
  echoFeedback.connect(echoDelay);
  echoDelay.connect(echoGain);
  ringMul.connect(echoGain);
  echoGain.connect(analyser);
  analyser.connect(audioCtx.destination);

  running=true;
  $('#btn-start').textContent=t('stop');
  tuneNodes();
  if(!currentPreset) applyPreset('chipmunk');
  startMeter();
  $('#mic-dot').classList.add('on');
}

function stop(){
  if(!running) return;
  running=false;
  cancelAnimationFrame(meterRAF);
  try{
    if(inStream) inStream.getTracks().forEach(tr=>tr.stop());
    if(audioCtx) audioCtx.close();
  }catch(e){}
  audioCtx=null; source=null; inStream=null; shiftNode=null;
  analyser=null; ringMod=null;
  $('#btn-start').textContent=t('start');
  status(t('statusIdle'), false);
  $('#mic-dot').classList.remove('on');
  $('#meter-fill').style.width='0%';
}

// ---- Granular pitch shifter (Puckette-style, two delayed taps crossfaded) ----
function createPitchShifter(ctx){
  const BUFFER=16384;
  const buf=new Float32Array(BUFFER);
  let writePos=0;
  const delayTime=0.08;   // grain window length
  let readA=0, readB=delayTime;
  let crossfade=0;

  const input=ctx.createGain();
  const node=ctx.createGain();

  // Use a 4096-ScriptProcessor for low-ish latency
  const proc=ctx.createScriptProcessor(4096,1,1);
  const sr=ctx.sampleRate;

  proc.onaudioprocess=function(e){
    const inp=e.inputBuffer.getChannelData(0);
    const out=e.outputBuffer.getChannelData(0);
    const n=inp.length;
    // write input into ring buffer
    for(let i=0;i<n;i++){
      buf[writePos]=inp[i];
      writePos=(writePos+1)%BUFFER;
    }
    const rate=Math.pow(2,(userPitch||0)/12);
    // grain length in samples
    const grain=Math.floor(delayTime*sr);
    for(let i=0;i<n;i++){
      // advance read pointers at "rate" speed, mod grain
      readA=(readA+rate);
      readB=(readB+rate);
      if(readA>=grain) readA-=grain;
      if(readB>=grain) readB-=grain;
      // grain windows
      const wA=0.5*(1+Math.cos(Math.PI*2*readA/grain - Math.PI));
      const wB=0.5*(1+Math.cos(Math.PI*2*readB/grain - Math.PI));
      // tap positions behind write head
      const tapA = (writePos - (grain - readA) - n + BUFFER*4) % BUFFER;
      const tapB = (writePos - (grain - readB) - n + BUFFER*4) % BUFFER;
      out[i] = wA*buf[(tapA+BUFFER)%BUFFER] + wB*buf[(tapB+BUFFER)%BUFFER];
    }
  };

  input.connect(proc);
  proc.connect(node);

  const ret=node;
  ret.input=input;
  // expose pitch setter
  Object.defineProperty(ret,'pitch',{set(v){/* updated by reading userPitch live */},get(){return rateNow;}});
  return ret;
}
// simple global so onaudioprocess can see latest userPitch
let rateNow=1;

function startMeter(){
  const data=new Uint8Array(analyser.frequencyBinCount);
  const draw=()=>{
    if(!running||!analyser) return;
    analyser.getByteTimeDomainData(data);
    let sum=0;
    for(let i=0;i<data.length;i++){ const v=(data[i]-128)/128; sum+=v*v; }
    const rms=Math.sqrt(sum/data.length);
    const pct=Math.min(100, Math.round(rms*200));
    $('#meter-fill').style.width=pct+'%';
    meterRAF=requestAnimationFrame(draw);
  };
  draw();
}

function buildControls(){
  $('#controls').innerHTML=`
    <button class="gz-btn" id="btn-start">${t('start')}</button>
    <span class="vc-rec"><span class="vc-dot" id="mic-dot"></span></span>
    <label>${t('pitch')}<br>
      <input type="range" min="-18" max="18" step="1" value="0" id="pitch-slider">
      <span id="pitch-val">0</span>
    </label>
    <label>${t('rate')}<br>
      <input type="range" min="0.5" max="2.0" step="0.05" value="1.0" id="formant-slider">
      <span id="formant-val">1.00</span>
    </label>
    <div class="vc-meter"><div class="vc-meter-fill" id="meter-fill"></div></div>
  `;
  $('#btn-start').onclick=()=> running?stop():start();
  $('#pitch-slider').oninput=e=>{ userPitch=+e.target.value; rateNow=Math.pow(2,userPitch/12); $('#pitch-val').textContent=userPitch; };
  $('#formant-slider').oninput=e=>{ userFormant=+e.target.value; $('#formant-val').textContent=userFormant.toFixed(2); if(running) tuneNodes(); };
  $('#mic-hint').textContent=t('micHint');
}

status(t('statusIdle'), false);
buildControls();
buildPresets();
