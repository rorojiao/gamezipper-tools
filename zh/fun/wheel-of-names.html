<script>
GZI18n.register({
  en: {
    toolTitle: 'Wheel of Names — Random Name Picker',
    toolDesc: 'Spin a colorful wheel to pick a random name, winner or decision. Free online random picker for classrooms, raffles, giveaways and games — runs entirely in your browser.',
    spin: '🎰 Spin',
    reset: 'Reset',
    shuffle: 'Shuffle',
    winnerLabel: '🎉 Winner',
    removeWinner: 'Remove winner after spin',
    historyLabel: 'Recent winners',
    noHistory: 'No spins yet.',
    step1: 'Type or paste your list of names, one per line',
    step2: 'Optionally tick "Remove winner" to avoid repeats',
    step3: 'Click Spin (or tap the wheel) to pick a random winner',
    step4: 'View the winner card and recent spin history',
  },
  zh: {
    toolTitle: '名字大转盘 — 随机点名器',
    toolDesc: '转动彩色大转盘随机抽取名字、获奖者或决定结果。适合课堂点名、抽奖、活动决定等场景 — 完全在浏览器本地运行，免费无广告打扰。',
    spin: '🎰 转动',
    reset: '重置',
    shuffle: '打乱',
    winnerLabel: '🎉 中奖者',
    removeWinner: '每次抽取后移除中奖者',
    historyLabel: '最近中奖记录',
    noHistory: '还没有抽取记录。',
    step1: '在左侧文本框输入名字，每行一个',
    step2: '可选勾选「移除中奖者」避免重复',
    step3: '点击「转动」或直接点击转盘抽取',
    step4: '查看中奖卡片和最近抽取历史',
  }
});

const { $, copyText, t } = GZ;
const PALETTES = {
  rainbow: ['#ff6b6b','#ffd93d','#6bcb77','#4d96ff','#9d4edd','#ff6b9d','#ffa500','#06d6a0'],
  ocean: ['#0077b6','#00b4d8','#90e0ef','#48cae4','#023e8a','#0096c7','#caf0f8','#03045e'],
  sunset: ['#ff7b00','#ff9500','#ffa200','#ff5400','#ff0a54','#ff477e','#ff7096','#ffb3c1'],
  forest: ['#264653','#2a9d8f','#8ab17d','#e9c46a','#f4a261','#e76f51','#588157','#3a5a40'],
};
let palette = 'rainbow';
let names = [];
let rotation = 0;
let spinning = false;
let history = [];

function getNames() {
  return $('#names').value.split('\n').map(n => n.trim()).filter(Boolean);
}

function drawWheel() {
  const canvas = $('#wheel');
  const ctx = canvas.getContext('2d');
  const cx = canvas.width / 2, cy = canvas.height / 2, r = cx - 6;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  const list = names.length ? names : ['—'];
  const slice = (Math.PI * 2) / list.length;
  const colors = PALETTES[palette];
  for (let i = 0; i < list.length; i++) {
    const a0 = rotation + i * slice - Math.PI / 2;
    const a1 = a0 + slice;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, r, a0, a1);
    ctx.closePath();
    ctx.fillStyle = colors[i % colors.length];
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,.55)';
    ctx.lineWidth = 2;
    ctx.stroke();
    // text
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(a0 + slice / 2);
    ctx.textAlign = 'right';
    ctx.fillStyle = '#fff';
    ctx.font = list.length > 24 ? 'bold 11px sans-serif' : (list.length > 12 ? 'bold 13px sans-serif' : 'bold 14px sans-serif');
    const label = list[i].length > 18 ? list[i].slice(0, 17) + '…' : list[i];
    ctx.fillText(label, r - 12, 4);
    ctx.restore();
  }
  // hub
  ctx.beginPath();
  ctx.arc(cx, cy, 22, 0, Math.PI * 2);
  ctx.fillStyle = '#fff';
  ctx.fill();
  ctx.strokeStyle = 'rgba(0,0,0,.15)';
  ctx.lineWidth = 2;
  ctx.stroke();
}

function spin() {
  if (spinning) return;
  names = getNames();
  if (names.length < 2) { $('#status').textContent = names.length < 1 ? '⚠️' : '⚠️'; return; }
  spinning = true;
  const turns = 5 + Math.random() * 4;
  const target = rotation + turns * Math.PI * 2 + Math.random() * Math.PI * 2;
  const start = rotation;
  const dur = 4200 + Math.random() * 1200;
  const t0 = performance.now();
  function frame(now) {
    const p = Math.min((now - t0) / dur, 1);
    const eased = 1 - Math.pow(1 - p, 4); // easeOutQuart
    rotation = start + (target - start) * eased;
    drawWheel();
    if (p < 1) requestAnimationFrame(frame);
    else finishSpin();
  }
  requestAnimationFrame(frame);
}

function finishSpin() {
  spinning = false;
  const list = names;
  const norm = ((rotation % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2);
  const slice = (Math.PI * 2) / list.length;
  const idx = Math.floor(((Math.PI * 2) - norm) / slice) % list.length;
  const winner = list[idx];
  $('#winner').style.display = '';
  $('#winner-name').textContent = winner;
  history.unshift(winner);
  if (history.length > 20) history.pop();
  renderHistory();
  if ($('#remove-winner').checked) {
    const lines = $('#names').value.split('\n').filter(l => l.trim() !== winner);
    $('#names').value = lines.join('\n');
    names = getNames();
  }
  drawWheel();
}

function renderHistory() {
  if (!history.length) { $('#history').innerHTML = `<b>${t('historyLabel')}</b><br>${t('noHistory')}`; return; }
  $('#history').innerHTML = '<b>' + t('historyLabel') + '</b><br>' + history.map((h, i) => (i + 1) + '. ' + h).join('<br>');
}

function shuffleNames() {
  const arr = getNames();
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  $('#names').value = arr.join('\n');
  names = arr;
  drawWheel();
}

function reset() {
  $('#names').value = '';
  history = [];
  names = [];
  $('#winner').style.display = 'none';
  renderHistory();
  drawWheel();
}

function buildTones() {
  const tones = [['rainbow','🌈 Rainbow'],['ocean','🌊 Ocean'],['sunset','🌅 Sunset'],['forest','🌲 Forest']];
  $('#tone-row').innerHTML = tones.map(([k, lbl]) => `<button data-k="${k}" class="${k === palette ? 'active' : ''}">${lbl}</button>`).join('');
  $('#tone-row').querySelectorAll('button').forEach(b => b.onclick = () => {
    palette = b.dataset.k;
    buildTones();
    drawWheel();
  });
}

$('#names').addEventListener('input', () => { names = getNames(); drawWheel(); });
$('#wheel').addEventListener('click', spin);

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="spin()">${t('spin')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="shuffleNames()">${t('shuffle')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="reset()">${t('reset')}</button>`;

$('#winner-lbl').textContent = t('winnerLabel');
$('#lbl-remove').textContent = t('removeWinner');

names = getNames();
if (!names.length) {
  $('#names').value = 'Alice\nBob\nCharlie\nDiana\nEve\nFrank';
  names = getNames();
}
buildTones();
renderHistory();
drawWheel();

GZ.renderToolPage({
  category: 'fun',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🎲', href:'/fun/random-picker.html', name:'Random Picker'},
    {icon:'🎱', href:'/fun/magic-8-ball.html', name:'Magic 8 Ball'},
    {icon:'🪙', href:'/fun/coin-flipper.html', name:'Coin Flipper'},
    {icon:'🔤', href:'/dev/random-string.html', name:'Random String'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
