<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "How do you calculate the cost of a road trip?", "acceptedAnswer": {"@type": "Answer", "text": "Add up fuel (distance ÷ MPG × gas price), lodging (nights × nightly rate), food (people × days × daily food budget), activities, tolls and an emergency buffer. Divide by the number of travelers for the per-person cost."}}, {"@type": "Question", "name": "How much does an average road trip cost per mile?", "acceptedAnswer": {"@type": "Answer", "text": "Fuel alone averages $0.12-$0.20 per mile depending on your car's MPG and gas prices. Add depreciation, maintenance and wear ($0.10-$0.20/mile) and the full IRS rate is $0.67/mile in 2024."}}, {"@type": "Question", "name": "How much should I budget for food per day on a trip?", "acceptedAnswer": {"@type": "Answer", "text": "Budget $40-$60 per person per day for food: $10-$15 breakfast, $15-$20 lunch, $20-$30 dinner, plus snacks. Cooking your own meals can cut this in half."}}, {"@type": "Question", "name": "Is my trip data sent anywhere?", "acceptedAnswer": {"@type": "Answer", "text": "No. This calculator runs 100% in your browser. Nothing is uploaded, stored or shared. Refresh the page to clear your inputs."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-section-title" id="sec-trip"></div>
    <div class="gz-input-group">
      <div><label id="lbl-distance"></label><input type="number" id="distance" value="500" min="0" step="10"></div>
      <div><label id="lbl-mpg"></label><input type="number" id="mpg" value="28" min="1" step="0.5"></div>
      <div><label id="lbl-gasprice"></label><input type="number" id="gasprice" value="3.50" min="0" step="0.01"></div>
      <div><label id="lbl-unit"></label><select id="unit">
        <option value="mi" selected>Miles / MPG / $/gal</option>
        <option value="km">Kilometers / L/100km / $/L</option>
      </select></div>
    </div>

    <div class="gz-section-title" id="sec-travelers"></div>
    <div class="gz-input-group">
      <div><label id="lbl-people"></label><input type="number" id="people" value="2" min="1" step="1"></div>
      <div><label id="lbl-days"></label><input type="number" id="days" value="3" min="1" step="1"></div>
      <div><label id="lbl-lodging"></label><input type="number" id="lodging" value="120" min="0" step="5"></div>
      <div><label id="lbl-food"></label><input type="number" id="food" value="50" min="0" step="5"></div>
    </div>

    <div class="gz-section-title" id="sec-extras"></div>
    <div class="gz-input-group">
      <div><label id="lbl-activities"></label><input type="number" id="activities" value="100" min="0" step="10"></div>
      <div><label id="lbl-tolls"></label><input type="number" id="tolls" value="20" min="0" step="1"></div>
      <div><label id="lbl-flights"></label><input type="number" id="flights" value="0" min="0" step="10"></div>
      <div><label id="lbl-misc"></label><input type="number" id="misc" value="50" min="0" step="5"></div>
    </div>

    <div class="gz-toolbar" id="toolbar"></div>
    <div class="gz-result-box" id="results" style="display:none">
      <div class="gz-result-grid">
        <div class="gz-result-item"><div class="value hero" id="res-total"></div><div class="label" id="res-total-label"></div></div>
        <div class="gz-result-item"><div class="value" id="res-perperson"></div><div class="label" id="res-perperson-label"></div></div>
        <div class="gz-result-item"><div class="value" id="res-perday"></div><div class="label" id="res-perday-label"></div></div>
        <div class="gz-result-item"><div class="value" id="res-fuel"></div><div class="label" id="res-fuel-label"></div></div>
      </div>
      <div class="gz-breakdown" id="breakdown"></div>
    </div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Trip Cost Calculator',
    toolDesc: 'Estimate the total cost of a road trip or vacation. Enter distance, fuel economy, days, lodging, food, activities and more — see per-person and per-day breakdowns instantly.',
    secTrip: '🚗 Trip & Vehicle',
    secTravelers: '👥 Travelers & Stay',
    secExtras: '🎯 Extras',
    distance: 'One-way Distance',
    mpg: 'Fuel Economy',
    gasprice: 'Fuel Price',
    unit: 'Units',
    people: 'Travelers',
    days: 'Trip Days',
    lodging: 'Lodging per Night ($)',
    food: 'Food per Person/Day ($)',
    activities: 'Activities Total ($)',
    tolls: 'Tolls & Parking ($)',
    flights: 'Flights / Transit ($)',
    misc: 'Misc / Buffer ($)',
    calculate: 'Calculate',
    clear: 'Clear',
    resTotal: 'Total Trip Cost',
    resPerPerson: 'Cost per Person',
    resPerDay: 'Cost per Day',
    resFuel: 'Fuel Cost',
    bdFuel: '⛽ Fuel',
    bdLodging: '🏨 Lodging',
    bdFood: '🍔 Food',
    bdActivities: '🎯 Activities',
    bdTolls: '🅿️ Tolls & Parking',
    bdFlights: '✈️ Flights / Transit',
    bdMisc: '🧳 Misc',
    bdTotal: 'Total',
    step1: 'Enter your trip distance, vehicle fuel economy and gas price',
    step2: 'Set the number of travelers, trip days, nightly lodging and food budget',
    step3: 'Add activities, tolls, flights and a misc buffer',
    step4: 'Click Calculate to see total, per-person and per-day costs',
  },
  zh: {
    toolTitle: '旅行费用计算器',
    toolDesc: '估算自驾游或度假的总费用。输入距离、油耗、天数、住宿、餐饮、活动等 — 即时查看人均和每日费用明细。',
    secTrip: '🚗 行程与车辆',
    secTravelers: '👥 出行人数与住宿',
    secExtras: '🎯 其他费用',
    distance: '单程距离',
    mpg: '油耗',
    gasprice: '油价',
    unit: '单位',
    people: '出行人数',
    days: '行程天数',
    lodging: '每晚住宿费（$）',
    food: '每人每天餐饮（$）',
    activities: '活动费用（$）',
    tolls: '过路费与停车费（$）',
    flights: '机票/交通（$）',
    misc: '其他/备用金（$）',
    calculate: '计算',
    clear: '清空',
    resTotal: '旅行总费用',
    resPerPerson: '人均费用',
    resPerDay: '每日费用',
    resFuel: '油费',
    bdFuel: '⛽ 燃油',
    bdLodging: '🏨 住宿',
    bdFood: '🍔 餐饮',
    bdActivities: '🎯 活动',
    bdTolls: '🅿️ 过路费与停车',
    bdFlights: '✈️ 机票/交通',
    bdMisc: '🧳 其他',
    bdTotal: '合计',
    step1: '输入行程距离、车辆油耗和油价',
    step2: '设置出行人数、行程天数、每晚住宿和餐饮预算',
    step3: '添加活动、过路费、机票和备用金',
    step4: '点击计算查看总费用、人均和每日费用',
  }
});

const { $, t } = GZ;

['lbl-distance','lbl-mpg','lbl-gasprice','lbl-unit','lbl-people','lbl-days','lbl-lodging','lbl-food','lbl-activities','lbl-tolls','lbl-flights','lbl-misc']
  .forEach(id => $('#' + id).textContent = t(id.replace('lbl-','')));
$('#sec-trip').textContent = t('secTrip');
$('#sec-travelers').textContent = t('secTravelers');
$('#sec-extras').textContent = t('secExtras');
$('#res-total-label').textContent = t('resTotal');
$('#res-perperson-label').textContent = t('resPerPerson');
$('#res-perday-label').textContent = t('resPerDay');
$('#res-fuel-label').textContent = t('resFuel');

function money(n) { return '$' + n.toLocaleString(undefined, {minimumFractionDigits:0, maximumFractionDigits:0}); }

function calc() {
  const unit = $('#unit').value;
  const distance = Math.max(0, parseFloat($('#distance').value) || 0);
  const mpg = Math.max(0.1, parseFloat($('#mpg').value) || 0);
  const gp = Math.max(0, parseFloat($('#gasprice').value) || 0);
  const people = Math.max(1, parseInt($('#people').value) || 1);
  const days = Math.max(1, parseInt($('#days').value) || 1);
  const lodgingRate = Math.max(0, parseFloat($('#lodging').value) || 0);
  const foodRate = Math.max(0, parseFloat($('#food').value) || 0);
  const activities = Math.max(0, parseFloat($('#activities').value) || 0);
  const tolls = Math.max(0, parseFloat($('#tolls').value) || 0);
  const flights = Math.max(0, parseFloat($('#flights').value) || 0);
  const misc = Math.max(0, parseFloat($('#misc').value) || 0);

  // Fuel calculation: distance × 2 (round trip)
  const totalDistance = distance * 2;
  let fuel;
  if (unit === 'km') {
    // mpg field is L/100km, gp is $/L
    const liters = totalDistance * (mpg / 100);
    fuel = liters * gp;
  } else {
    // mpg field is MPG, gp is $/gal
    fuel = (mpg > 0) ? (totalDistance / mpg) * gp : 0;
  }

  const lodging = lodgingRate * Math.max(0, days - 1); // last day no lodging
  const food = foodRate * people * days;
  const total = fuel + lodging + food + activities + tolls + flights + misc;
  const perPerson = total / people;
  const perDay = total / days;

  $('#res-total').textContent = money(total);
  $('#res-perperson').textContent = money(perPerson);
  $('#res-perday').textContent = money(perDay);
  $('#res-fuel').textContent = money(fuel);

  const rows = [
    ['bdFuel', fuel],
    ['bdLodging', lodging],
    ['bdFood', food],
    ['bdActivities', activities],
    ['bdTolls', tolls],
    ['bdFlights', flights],
    ['bdMisc', misc],
  ];
  $('#breakdown').innerHTML = rows.map(([k, v]) =>
    `<div class="row"><span>${t(k)}</span><span>${money(v)}</span></div>`
  ).join('') + `<div class="row total"><span>${t('bdTotal')}</span><span>${money(total)}</span></div>`;

  $('#results').style.display = 'block';
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="calc()">${t('calculate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="document.getElementById('results').style.display='none'">${t('clear')}</button>`;

calc();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'⛽', href:'/calc/fuel-cost-calculator.html', name:'Fuel Cost'},
    {icon:'🚗', href:'/calc/gas-mileage-calculator.html', name:'Gas Mileage'},
    {icon:'💰', href:'/calc/budget-planner.html', name:'Budget Planner'},
    {icon:'🧾', href:'/calc/bill-splitter.html', name:'Bill Splitter'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
