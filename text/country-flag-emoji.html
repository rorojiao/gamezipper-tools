function flag(iso) {
  return String.fromCodePoint(...[...iso.toUpperCase()].map(c => 0x1F1E6 + c.charCodeAt(0) - 65));
}

function render(query) {
  const q = (query || '').trim().toLowerCase();
  const matches = q
    ? FLAGS.filter(f => f[1].toLowerCase().includes(q) || f[3] && f[2].includes(query.trim()) || f[0].toLowerCase() === q)
    : FLAGS;
  if (!matches.length) { $('#results').innerHTML = `<div class="empty">${t('noResults')}</div>`; return; }
  $('#results').innerHTML = matches.map(f =>
    `<div class="flag-card" onclick="copyFlag(this,'${flag(f[0])}')">
      <div class="flag">${flag(f[0])}</div>
      <div class="name">${f[1]}</div>
      <div class="code">${f[0]}</div>
    </div>`).join('');
}

function copyFlag(el, em) {
  copyText(em);
  showToast(t('copied'));
  el.classList.add('copied');
  setTimeout(() => el.classList.remove('copied'), 800);
}

$('#toolbar').innerHTML = `<input id="search" type="text" placeholder="${t('placeholder')}" oninput="render(this.value)">`;
