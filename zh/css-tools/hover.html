<script>
GZI18n.register({
  en: {
    toolTitle: 'CSS Hover Effect Generator',
    toolDesc: 'Design beautiful CSS hover effects with live preview. 20+ presets — scale, shadow, glow, color shift and more. Copy production-ready CSS.',
    selectEffect: 'Select Effect Preset',
    bgColorLabel: 'Background Color',
    textColorLabel: 'Text Color',
    hoverBgLabel: 'Hover Background',
    borderRadiusLabel: 'Border Radius',
    durationLabel: 'Transition Duration',
    previewTextLabel: 'Button Text',
    step1: 'Choose an effect preset from the grid above',
    step2: 'Customize colors, border radius and transition speed',
    step3: 'Hover over the preview to see the effect live',
    step4: 'Copy the generated CSS code to your project',
  },
  zh: {
    toolTitle: 'CSS 悬停效果生成器',
    toolDesc: '设计精美的 CSS 悬停效果，实时预览。20+ 预设 — 缩放、阴影、发光、变色等，一键复制可用 CSS。',
    selectEffect: '选择效果预设',
    bgColorLabel: '背景颜色',
    textColorLabel: '文字颜色',
    hoverBgLabel: '悬停背景',
    borderRadiusLabel: '圆角',
    durationLabel: '过渡时长',
    previewTextLabel: '按钮文字',
    step1: '从上方网格选择效果预设',
    step2: '自定义颜色、圆角和过渡速度',
    step3: '悬停预览区域查看实时效果',
    step4: '复制生成的 CSS 代码到你的项目',
  }
});

const { $, copyText, t } = GZ;

const effects = [
  { id:'scale', name:'Scale Up', css:{ transform:'scale(1.08)' }},
  { id:'shadow', name:'Shadow', css:{ boxShadow:'0 8px 25px rgba(0,0,0,0.3)' }},
  { id:'glow', name:'Glow', css:{ boxShadow:'0 0 20px rgba(79,70,229,0.6)' }},
  { id:'lift', name:'Lift', css:{ transform:'translateY(-4px)', boxShadow:'0 12px 20px rgba(0,0,0,0.2)' }},
  { id:'brightness', name:'Brighten', css:{ filter:'brightness(1.2)' }},
  { id:'pulse', name:'Pulse', css:{ transform:'scale(1.05)', boxShadow:'0 0 15px rgba(79,70,229,0.5)' }},
  { id:'underline', name:'Underline', css:{ borderBottom:'3px solid currentColor', paddingBottom:'4px' }},
  { id:'skew', name:'Skew', css:{ transform:'skewX(-5deg)' }},
  { id:'rotate', name:'Rotate', css:{ transform:'rotate(2deg)' }},
  { id:'blur', name:'Blur', css:{ filter:'blur(1px)' }},
  { id:'grayscale', name:'Grayscale', css:{ filter:'grayscale(0.3)' }},
  { id:'border', name:'Border', css:{ border:'3px solid rgba(255,255,255,0.8)' }},
  { id:'shrink', name:'Shrink', css:{ transform:'scale(0.95)' }},
  { id:'bounce', name:'Bounce', css:{ transform:'translateY(-8px)' }},
  { id:'glow-text', name:'Text Glow', css:{ textShadow:'0 0 10px rgba(255,255,255,0.8)' }},
  { id:'indent', name:'Indent', css:{ transform:'translateY(3px)', boxShadow:'0 2px 4px rgba(0,0,0,0.2)' }},
  { id:'expand', name:'Expand H', css:{ transform:'scaleX(1.1)' }},
  { id:'flip', name:'Flip', css:{ transform:'rotateY(180deg)' }},
  { id:'fade', name:'Fade', css:{ opacity:'0.7' }},
  { id:'rainbow', name:'Rainbow Shadow', css:{ boxShadow:'0 0 15px #ff0000, 0 0 30px #00ff00, 0 0 45px #0000ff' }},
];

let activeEffect = 'scale';

function renderEffectsGrid() {
  const grid = $('#effects-grid');
  grid.innerHTML = effects.map(e => `<button class="effect-btn ${e.id === activeEffect ? 'active' : ''}" onclick="setEffect('${e.id}')">${e.name}</button>`).join('');
}

function setEffect(id) {
  activeEffect = id;
  renderEffectsGrid();
  renderPreview();
}

function getBaseStyles() {
  return {
    padding: '14px 36px',
    borderRadius: $('#borderRadius').value + 'px',
    backgroundColor: $('#bgColor').value,
    color: $('#textColor').value,
    border: '2px solid ' + $('#bgColor').value,
    fontSize: '16px',
    fontWeight: '600',
    cursor: 'pointer',
    transition: `all ${$('#duration').value}ms ease`,
    display: 'inline-block',
  };
}

function getHoverStyles() {
  const effect = effects.find(e => e.id === activeEffect);
  const base = { backgroundColor: $('#hoverBg').value, borderColor: $('#hoverBg').value };
  return { ...base, ...effect.css };
}

function styleObjToCss(obj, selector) {
  let css = selector + ' {\n';
  for (const [key, value] of Object.entries(obj)) {
    const prop = key.replace(/([A-Z])/g, '-$1').toLowerCase();
    css += `  ${prop}: ${value};\n`;
  }
  css += '}\n';
  return css;
}

function renderPreview() {
  const btn = $('#preview-btn');
  const text = $('#btnText').value || 'Hover Me';
  btn.textContent = text;

  const base = getBaseStyles();
  Object.entries(base).forEach(([k, v]) => btn.style[k] = v);

  const hover = getHoverStyles();
  // Apply hover on mouseenter
  btn.onmouseenter = () => Object.entries(hover).forEach(([k, v]) => btn.style[k] = v);
  btn.onmouseleave = () => {
    Object.keys(hover).forEach(k => btn.style[k] = '');
    Object.entries(base).forEach(([k, v]) => btn.style[k] = v);
  };

  // Generate CSS code
  const code = `.hover-button {\n${Object.entries(base).map(([k, v]) => `  ${k.replace(/([A-Z])/g, '-$1').toLowerCase()}: ${v};`).join('\n')}\n}\n\n.hover-button:hover {\n${Object.entries(hover).map(([k, v]) => `  ${k.replace(/([A-Z])/g, '-$1').toLowerCase()}: ${v};`).join('\n')}\n}`;
  $('#code-output').textContent = code;

  $('#br-val').textContent = $('#borderRadius').value + 'px';
  $('#dur-val').textContent = ($('#duration').value / 1000).toFixed(1) + 's';
}

// Event listeners
['#bgColor','#textColor','#hoverBg','#borderRadius','#duration','#btnText'].forEach(sel => {
  $(sel).addEventListener('input', renderPreview);
});

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="copyText($('#code-output').textContent)">${t('copy')||'Copy CSS'}</button>
  <button class="gz-btn gz-btn-secondary" onclick="activeEffect='scale';$('#bgColor').value='#4F46E5';$('#hoverBg').value='#7C3AED';$('#textColor').value='#ffffff';$('#borderRadius').value=8;$('#duration').value=300;$('#btnText').value='Hover Me';renderEffectsGrid();renderPreview()">${t('reset')||'Reset'}</button>`;

renderEffectsGrid();
renderPreview();

GZ.renderToolPage({
  category: 'css',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🔘', href:'/css-tools/button.html', name:'CSS Button'},
    {icon:'✏️', href:'/css-tools/text-shadow.html', name:'Text Shadow'},
    {icon:'🔲', href:'/css-tools/shadow.html', name:'Box Shadow'},
    {icon:'🎬', href:'/css-tools/animation.html', name:'CSS Animation'},
  ]
});
</script>
