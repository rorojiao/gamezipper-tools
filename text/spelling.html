// Common bigrams for more relevant suggestions
function isWord(w) {
  return COMMON_WORDS.has(w.toLowerCase());
}

// Damerau-Levenshtein distance for suggestions
function editDistance(a, b) {
  if (a === b) return 0;
  const la = a.length, lb = b.length;
  if (Math.abs(la - lb) > 3) return 99;
  const d = [];
  for (let i = 0; i <= la; i++) { d[i] = [i]; }
  for (let j = 0; j <= lb; j++) { d[0][j] = j; }
  for (let i = 1; i <= la; i++) {
    for (let j = 1; j <= lb; j++) {
      const cost = a[i-1] === b[j-1] ? 0 : 1;
      d[i][j] = Math.min(d[i-1][j] + 1, d[i][j-1] + 1, d[i-1][j-1] + cost);
    }
  }
  return d[la][lb];
}

const { $, copyText, t, showToast } = GZ;

function getSuggestions(word, maxDist = 2) {
  if (!word || word.length < 2) return [];
  const candidates = [];
  const lower = word.toLowerCase();
  // Common first-letter swaps, etc - keep simple for performance
  for (const w of COMMON_WORDS) {
    if (Math.abs(w.length - lower.length) > 2) continue;
    const d = editDistance(lower, w);
    if (d > 0 && d <= maxDist) {
      candidates.push({ word: w, dist: d });
    }
  }
  candidates.sort((a, b) => a.dist - b.dist);
  return candidates.slice(0, 6).map(c => c.word);
}

function checkSpelling() {
  const text = $('#input').value;
  if (!text.trim()) {
    $('#output').innerHTML = '<em style="color:var(--text2)">Start typing to check spelling.</em>';
    $('#corrected').style.display = 'none';
    $('#stats').innerHTML = '';
    return;
  }
  const tokens = text.split(/(\b[\w']+\b)/g);
  let misspelled = 0;
  let words = 0;
  const missList = [];

  let html = '';
  for (let i = 0; i < tokens.length; i++) {
    const tok = tokens[i];
    if (/^[\w']+$/.test(tok) && tok.length > 1) {
      words++;
      if (!isWord(tok)) {
        misspelled++;
        const suggestions = getSuggestions(tok);
        missList.push({ word: tok, suggestions, index: i });
        const suggHtml = suggestions.length
          ? suggestions.map(s => `<button onclick="applySuggestion(${i},'${s.replace(/'/g,"\\'")}')">${s}</button>`).join('')
          : '<em style="font-size:.75rem;color:var(--text2)">No suggestions</em>';
        html += `<span class="sp-misspelled">${tok}<span class="sp-suggest">${suggHtml}</span></span>`;
      } else {
        html += tok;
      }
    } else {
      html += tok;
    }
  }

  // Stats
  const chars = text.length;
  const sentences = (text.match(/[.!?]+/g) || []).length;
  $('#stats').innerHTML = `
    <div class="sp-stat"><div class="num">${words}</div><div class="lbl">${t('words')}</div></div>
    <div class="sp-stat"><div class="num">${chars}</div><div class="lbl">${t('chars')}</div></div>
    <div class="sp-stat"><div class="num">${sentences}</div><div class="lbl">${t('sentences')}</div></div>
    <div class="sp-stat"><div class="num ${misspelled?'sp-bad':'sp-good'}">${misspelled}</div><div class="lbl">${t('misspelled')}</div></div>
  `;

  if (misspelled === 0) {
    html = `<div style="color:var(--success);padding:16px;text-align:center">${t('noErrors')}</div>` + html;
  }
  $('#output').innerHTML = html;

  // Apply all suggestions preview
  if (misspelled > 0) {
    let corrected = '';
    for (let i = 0; i < tokens.length; i++) {
      const tok = tokens[i];
      if (/^[\w']+$/.test(tok) && tok.length > 1 && !isWord(tok)) {
        const s = getSuggestions(tok);
        corrected += s[0] || tok;
      } else {
        corrected += tok;
      }
    }
    $('#corrected').textContent = corrected;
    $('#corrected').style.display = 'block';
  } else {
    $('#corrected').style.display = 'none';
  }

  window._missList = missList;
  window._tokens = tokens;
}

function applySuggestion(tokenIdx, suggestion) {
  const tokens = window._tokens;
  tokens[tokenIdx] = suggestion;
  const newText = tokens.join('');
  $('#input').value = newText;
  checkSpelling();
}

function applyAll() {
  const missList = window._missList || [];
  const tokens = window._tokens || [];
  for (const m of missList) {
    if (m.suggestions[0]) {
      tokens[m.index] = m.suggestions[0];
    }
  }
  $('#input').value = tokens.join('');
  checkSpelling();
  showToast('Applied all suggestions');
}

function loadExample() {
  $('#input').value = "Ths is a smple paragrapth with sevral mispelled wrds. The qick brown fox jumps ovr the lazy dogg. A defenit improvement would be helphul for writting cleer prose.";
  checkSpelling();
}

function doClear() { $('#input').value = ''; checkSpelling(); }

$('#input').addEventListener('input', () => {
  clearTimeout(window._spTimer);
  window._spTimer = setTimeout(checkSpelling, 250);
});

$('#input').placeholder = t('placeholder');

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="checkSpelling()">🔍 ${t('check')}</button>
  <button class="gz-btn gz-btn-success" onclick="applyAll()">✓ ${t('applyAll')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('loadExample')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="copyText($('#corrected').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

  ]
});
