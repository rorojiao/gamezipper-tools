<script>
GZI18n.register({
  en: {
    toolTitle: 'Password Strength Checker',
    toolDesc: 'Analyze your password strength with entropy calculation, crack time estimation and actionable security tips.',
    veryWeak: 'Very Weak', weak: 'Weak', fair: 'Fair', strong: 'Strong', veryStrong: 'Very Strong',
    length: 'Length', uppercase: 'Uppercase', lowercase: 'Lowercase', numbers: 'Numbers', symbols: 'Symbols',
    entropy: 'Entropy', charset: 'Charset Size', uniqueChars: 'Unique Characters',
    crackTime: 'Estimated Crack Time', crackDesc: 'Time to brute-force at 10 billion guesses/sec',
    instant: 'Instant', seconds: 'seconds', minutes: 'minutes', hours: 'hours', days: 'days',
    years: 'years', centuries: 'centuries', forever: 'Practically impossible',
    tipLen: 'Use at least 12 characters', tipMix: 'Mix uppercase, lowercase, numbers & symbols',
    tipNoDict: 'Avoid dictionary words and common patterns', tipUnique: 'Use unique characters — avoid repetition',
    step1: 'Type or paste your password in the input field',
    step2: 'The tool analyzes your password in real-time',
    step3: 'Check the strength score, crack time, and analysis',
    step4: 'Follow tips to improve your password',
    generate: 'Generate Strong',
    clear: 'Clear',
  },
  zh: {
    toolTitle: '密码强度检测器',
    toolDesc: '分析密码强度，计算熵值、估算破解时间并提供安全建议。',
    veryWeak: '非常弱', weak: '弱', fair: '一般', strong: '强', veryStrong: '非常强',
    length: '长度', uppercase: '大写字母', lowercase: '小写字母', numbers: '数字', symbols: '特殊符号',
    entropy: '熵值', charset: '字符集大小', uniqueChars: '唯一字符数',
    crackTime: '估算破解时间', crackDesc: '以每秒100亿次猜测的速度暴力破解所需时间',
    instant: '瞬间', seconds: '秒', minutes: '分钟', hours: '小时', days: '天',
    years: '年', centuries: '世纪', forever: '几乎不可能',
    tipLen: '使用至少12个字符', tipMix: '混合使用大写、小写、数字和符号',
    tipNoDict: '避免字典词汇和常见模式', tipUnique: '使用唯一字符 — 避免重复',
    step1: '在输入框中输入或粘贴密码',
    step2: '工具会实时分析密码强度',
    step3: '查看强度评分、破解时间和详细分析',
    step4: '根据建议改进密码',
    generate: '生成强密码',
    clear: '清除',
  }
});

const { $, t, copyText } = GZ;

const COMMON_PASSWORDS = ['password','123456','12345678','qwerty','abc123','monkey','master','dragon','111111','baseball','iloveyou','trustno1','sunshine','princess','football','shadow','superman','michael','letmein','password1'];

function analyzePassword(pw) {
  if (!pw) return { score: 0, level: '', entropy: 0, crackSeconds: 0, analysis: {}, tips: [] };
  const len = pw.length;
  const hasUpper = /[A-Z]/.test(pw);
  const hasLower = /[a-z]/.test(pw);
  const hasDigit = /[0-9]/.test(pw);
  const hasSymbol = /[^A-Za-z0-9]/.test(pw);
  const uniqueChars = new Set(pw).size;
  let charsetSize = 0;
  if (hasLower) charsetSize += 26;
  if (hasUpper) charsetSize += 26;
  if (hasDigit) charsetSize += 10;
  if (hasSymbol) charsetSize += 33;
  if (charsetSize === 0) charsetSize = 26;
  const entropy = len * Math.log2(charsetSize);
  const crackSeconds = Math.pow(charsetSize, len) / 1e10;
  const isCommon = COMMON_PASSWORDS.includes(pw.toLowerCase());
  const hasSeq = /(abc|bcd|cde|def|efg|123|234|345|456|567|678|789|qwe|wer|ert|rty|asd|sdf|dfg)/i.test(pw);
  const hasRepeat = /(.)\1{2,}/.test(pw);

  let score = Math.min(100, Math.round(entropy * 1.2));
  if (isCommon) score = Math.min(score, 5);
  if (hasSeq) score = Math.max(0, score - 15);
  if (hasRepeat) score = Math.max(0, score - 10);
  if (len < 8) score = Math.min(score, 20);
  if (len >= 16) score = Math.min(100, score + 10);

  let level;
  if (score < 20) level = t('veryWeak');
  else if (score < 40) level = t('weak');
  else if (score < 60) level = t('fair');
  else if (score < 80) level = t('strong');
  else level = t('veryStrong');

  const tips = [];
  if (len < 12) tips.push({ icon: '📏', text: t('tipLen'), ok: false });
  else tips.push({ icon: '✅', text: t('tipLen'), ok: true });
  const typeCount = [hasUpper, hasLower, hasDigit, hasSymbol].filter(Boolean).length;
  if (typeCount < 3) tips.push({ icon: '🔤', text: t('tipMix'), ok: false });
  else tips.push({ icon: '✅', text: t('tipMix'), ok: true });
  if (isCommon || hasSeq) tips.push({ icon: '📖', text: t('tipNoDict'), ok: false });
  else tips.push({ icon: '✅', text: t('tipNoDict'), ok: true });
  if (uniqueChars < len * 0.5) tips.push({ icon: '🔄', text: t('tipUnique'), ok: false });
  else tips.push({ icon: '✅', text: t('tipUnique'), ok: true });

  return { score, level, entropy: entropy.toFixed(1), crackSeconds, charsetSize, analysis: { len, hasUpper, hasLower, hasDigit, hasSymbol, uniqueChars }, tips };
}

function formatTime(seconds) {
  if (seconds < 0.001) return t('instant');
  if (seconds < 60) return `${seconds.toFixed(1)} ${t('seconds')}`;
  if (seconds < 3600) return `${(seconds/60).toFixed(1)} ${t('minutes')}`;
  if (seconds < 86400) return `${(seconds/3600).toFixed(1)} ${t('hours')}`;
  if (seconds < 86400*365) return `${(seconds/86400).toFixed(1)} ${t('days')}`;
  if (seconds < 86400*365*100) return `${(seconds/(86400*365)).toFixed(1)} ${t('years')}`;
  if (seconds < 86400*365*1e12) return `${(seconds/(86400*365*100)).toFixed(0)} ${t('centuries')}`;
  return t('forever');
}

function getColor(score) {
  if (score < 20) return '#ef4444';
  if (score < 40) return '#f97316';
  if (score < 60) return '#eab308';
  if (score < 80) return '#22c55e';
  return '#10b981';
}

function updateAnalysis() {
  const pw = $('#pwInput').value;
  const r = analyzePassword(pw);
  const color = getColor(r.score);

  $('#strengthFill').style.width = r.score + '%';
  $('#strengthFill').style.background = color;
  $('#scoreCircle').textContent = r.score;
  $('#scoreCircle').style.background = color + '20';
  $('#scoreCircle').style.color = color;
  $('#scoreLabel').textContent = r.level;
  $('#scoreLabel').style.color = color;
  $('#scoreSub').textContent = pw ? `${t('entropy')}: ${r.entropy} bits` : '';

  $('#crackTime').innerHTML = `<div style="font-weight:700;margin-bottom:4px">⏱️ ${t('crackTime')}</div><div style="font-size:1.2rem;font-weight:900;color:${color}">${pw ? formatTime(r.crackSeconds) : '—'}</div><div style="font-size:.75rem;opacity:.6;margin-top:4px">${t('crackDesc')}</div>`;

  $('#analysis').innerHTML = [
    { label: t('length'), val: r.analysis.len || 0 },
    { label: t('uppercase'), val: r.analysis.hasUpper ? '✅' : '❌' },
    { label: t('lowercase'), val: r.analysis.hasLower ? '✅' : '❌' },
    { label: t('numbers'), val: r.analysis.hasDigit ? '✅' : '❌' },
    { label: t('symbols'), val: r.analysis.hasSymbol ? '✅' : '❌' },
    { label: t('charset'), val: r.charsetSize || 0 },
    { label: t('uniqueChars'), val: r.analysis.uniqueChars || 0 },
  ].map(c => `<div class="analysis-card"><div class="label">${c.label}</div><div class="value">${c.val}</div></div>`).join('');

  $('#tips').innerHTML = r.tips.map(tip => `<div class="tip" style="color:${tip.ok ? 'var(--gz-success)' : 'var(--gz-accent)'}"><span>${tip.icon}</span><span>${tip.text}</span></div>`).join('');
}

function toggleVis() {
  const inp = $('#pwInput');
  inp.type = inp.type === 'password' ? 'text' : 'password';
}

function generateStrong() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZabcdefghjkmnpqrstuvwxyz23456789!@#$%^&*';
  let pw = '';
  const arr = new Uint32Array(20);
  crypto.getRandomValues(arr);
  for (let i = 0; i < 20; i++) pw += chars[arr[i] % chars.length];
  $('#pwInput').value = pw;
  $('#pwInput').type = 'text';
  updateAnalysis();
}

$('#pwInput').addEventListener('input', updateAnalysis);

$('#toolbar').innerHTML = `
  <button class="gz-btn gz-btn-secondary" onclick="generateStrong()">${t('generate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#pwInput').value='';updateAnalysis()">${t('clear')}</button>`;

</script>
