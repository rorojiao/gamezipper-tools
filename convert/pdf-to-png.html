<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div id="dropzone">
      <div class="drop-icon">📄</div>
      <p id="dropzone-text"></p>
      <p id="or-text"></p>
      <button class="gz-btn" id="select-btn"></button>
      <input type="file" id="file-input" accept="application/pdf,.pdf">
    </div>
    <div class="opt-row">
      <div class="opt-group">
        <label id="lbl-scale"></label>
        <select id="scale">
          <option value="1">1x (72 DPI)</option>
          <option value="2" selected>2x (144 DPI)</option>
          <option value="3">3x (216 DPI)</option>
        </select>
      </div>
      <div class="opt-group">
        <label>&nbsp;</label>
        <button class="gz-btn" id="btn-convert"></button>
      </div>
      <div class="opt-group">
        <label>&nbsp;</label>
        <button class="gz-btn gz-btn-secondary" id="btn-clear"></button>
      </div>
    </div>
    <div id="progress"><span id="progress-text"></span></div>
    <div id="results"></div>
    <div id="status"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
if (window.pdfjsLib) pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

GZI18n.register({
  en: {
    toolTitle: 'PDF to PNG Converter',
    toolDesc: 'Convert PDF pages to high-quality PNG images. Drag and drop your PDF — all processing happens in your browser, no upload required.',
    dropzoneText: 'Drop your PDF here',
    orText: 'or',
    selectBtn: 'Browse File',
    lblScale: 'Render Scale',
    convert: '🔄 Convert to PNG',
    clear: '🗑️ Clear',
    progress: 'Processing page {0} of {1}...',
    done: '✓ Converted {0} page(s) to PNG',
    download: '⬇ Download',
    downloadAll: '⬇ Download All (ZIP)',
    step1: 'Drag and drop a PDF file or click Browse',
    step2: 'Choose the render scale (1x-3x)',
    step3: 'Click Convert to render each page as PNG',
    step4: 'Download individual PNGs or all as ZIP',
    needFile: 'Please select a PDF file first',
    page: 'Page',
  },
  zh: {
    toolTitle: 'PDF 转 PNG 转换器',
    toolDesc: '将 PDF 页面转换为高质量 PNG 图片。拖放 PDF 文件 — 全部在浏览器中处理，无需上传。',
    dropzoneText: '将 PDF 拖放至此',
    orText: '或',
    selectBtn: '选择文件',
    lblScale: '渲染倍数',
    convert: '🔄 转换为 PNG',
    clear: '🗑️ 清空',
    progress: '正在处理第 {0}/{1} 页...',
    done: '✓ 已转换 {0} 页为 PNG',
    download: '⬇ 下载',
    downloadAll: '⬇ 全部下载 (ZIP)',
    step1: '拖放 PDF 文件或点击「选择文件」',
    step2: '选择渲染倍数（1x-3x）',
    step3: '点击「转换」将每页渲染为 PNG',
    step4: '下载单个 PNG 或打包下载全部',
    needFile: '请先选择 PDF 文件',
    page: '第',
  }
});

const { $, t } = GZ;

$('#dropzone-text').textContent = t('dropzoneText');
$('#or-text').textContent = t('orText');
$('#select-btn').textContent = t('selectBtn');
$('#lbl-scale').textContent = t('lblScale');
$('#btn-convert').textContent = t('convert');
$('#btn-clear').textContent = t('clear');

let currentFile = null;

const dz = $('#dropzone');
dz.onclick = () => $('#file-input').click();
dz.ondragover = e => { e.preventDefault(); dz.classList.add('dragover'); };
dz.ondragleave = () => dz.classList.remove('dragover');
dz.ondrop = e => { e.preventDefault(); dz.classList.remove('dragover'); if (e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]); };
$('#file-input').onchange = e => { if (e.target.files[0]) loadFile(e.target.files[0]); };

function loadFile(file) {
  if (file.type !== 'application/pdf' && !file.name.toLowerCase().endsWith('.pdf')) return;
  currentFile = file;
  $('#dropzone-text').textContent = '📄 ' + file.name;
  $('#status').innerHTML = '';
  $('#results').style.display = 'none';
  $('#results').innerHTML = '';
}

$('#btn-convert').onclick = async () => {
  if (!currentFile) { $('#status').innerHTML = `<span style="color:var(--gz-accent)">${t('needFile')}</span>`; return; }
  const scale = parseInt($('#scale').value);
  $('#progress').style.display = 'block';
  $('#results').style.display = 'none';
  $('#results').innerHTML = '';

  try {
    const buf = await currentFile.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({ data: buf }).promise;
    const total = pdf.numPages;
    const pngs = [];

    for (let i = 1; i <= total; i++) {
      $('#progress-text').textContent = t('progress').replace('{0}', i).replace('{1}', total);
      const page = await pdf.getPage(i);
      const viewport = page.getViewport({ scale: scale });
      const canvas = document.createElement('canvas');
      canvas.width = viewport.width;
      canvas.height = viewport.height;
      const ctx = canvas.getContext('2d');
      await page.render({ canvasContext: ctx, viewport: viewport }).promise;
      const dataUrl = canvas.toDataURL('image/png');
      pngs.push({ name: `${currentFile.name.replace(/\.pdf$/i, '')}_page_${i}.png`, dataUrl });
    }

    $('#progress').style.display = 'none';
    $('#results').style.display = 'block';
    $('#results').innerHTML = pngs.map((p, idx) => `
      <div class="result-item">
        <img src="${p.dataUrl}" alt="${t('page')} ${idx+1}">
        <button class="gz-btn dl-btn" data-idx="${idx}">${t('download')}</button>
      </div>
    `).join('');

    $('#results').querySelectorAll('.dl-btn').forEach(btn => {
      btn.onclick = () => { const p = pngs[+btn.dataset.idx]; downloadDataUrl(p.dataUrl, p.name); };
    });

    // Download all button
    if (pngs.length > 1) {
      const allBtn = document.createElement('button');
      allBtn.className = 'gz-btn';
      allBtn.textContent = t('downloadAll');
      allBtn.style.cssText = 'display:block;margin:12px auto';
      allBtn.onclick = () => pngs.forEach((p, i) => setTimeout(() => downloadDataUrl(p.dataUrl, p.name), i * 300));
      $('#results').prepend(allBtn);
    }

    $('#status').innerHTML = `<span style="color:var(--gz-success)">${t('done').replace('{0}', total)}</span>`;
  } catch(e) {
    $('#progress').style.display = 'none';
    $('#status').innerHTML = `<span style="color:var(--gz-accent)">Error: ${e.message}</span>`;
  }
};

function downloadDataUrl(dataUrl, filename) {
  const a = document.createElement('a');
  a.href = dataUrl;
  a.download = filename;
  a.click();
}

$('#btn-clear').onclick = () => {
  currentFile = null;
  $('#file-input').value = '';
  $('#dropzone-text').textContent = t('dropzoneText');
  $('#results').innerHTML = '';
  $('#results').style.display = 'none';
  $('#status').innerHTML = '';
  $('#progress').style.display = 'none';
};

GZ.renderToolPage({
  category: 'convert',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🖼️', href:'/convert/pdf-to-image.html', name:'PDF to Image'},
    {icon:'📄', href:'/convert/pdf-to-jpg.html', name:'PDF to JPG'},
    {icon:'✂️', href:'/convert/pdf-splitter.html', name:'PDF Splitter'},
    {icon:'📊', href:'/convert/pdf-merger.html', name:'PDF Merger'},
  ]
});
</script>
<script src="/tools-result-rec.js?v=20260707v520" defer></script>
</body>
