const CONTINENTS = ['All','Africa','Asia','Europe','North America','South America','Oceania'];
let activeContinent = 'All';
let history = [];

function pool() {
  return activeContinent === 'All' ? COUNTRIES : COUNTRIES.filter(c => c[4] === activeContinent);
}

function generate() {
  const p = pool();
  if (!p.length) return;
  const c = p[Math.floor(Math.random() * p.length)];
  renderCard(c);
  if (!history.some(h => h[1] === c[1])) {
    history.unshift(c);
    if (history.length > 12) history.pop();
    renderHistory();
  }
  $('#status').textContent = `${t('drew')} ${c[1]} · ${t('fromPool')} ${p.length} ${t('countries')}`;
}

function renderCard(c) {
  const [flag, name, native, capital, cont, pop, currency, calling, area] = c;
  $('#card').innerHTML = `
    <div class="rc-flag">${flag}</div>
    <div class="rc-name">${esc(name)}</div>
    <div class="rc-native">${esc(native)} · ${flagToRegion(cont)}</div>
    <div class="rc-grid">
      <div class="rc-item"><span class="lbl">${t('capital')}</span><span class="val">${esc(capital)}</span></div>
      <div class="rc-item"><span class="lbl">${t('continentLbl')}</span><span class="val">${cont}</span></div>
      <div class="rc-item"><span class="lbl">${t('population')}</span><span class="val">${formatPop(pop)}</span></div>
      <div class="rc-item"><span class="lbl">${t('currency')}</span><span class="val">${esc(currency)}</span></div>
      <div class="rc-item"><span class="lbl">${t('callingCode')}</span><span class="val">${esc(calling)}</span></div>
      <div class="rc-item"><span class="lbl">${t('area')}</span><span class="val">${formatArea(area)}</span></div>
    </div>`;
}

function renderHistory() {
  if (!history.length) { $('#history').innerHTML = ''; return; }
  $('#history').innerHTML = history.map((c, i) =>
    `<span class="rc-chip" onclick="recall(${i})">${c[0]} ${esc(c[1])}</span>`).join('');
}

function recall(i) {
  if (history[i]) renderCard(history[i]);
}

function flagToRegion(c) {
  // localized continent
  if (GZI18n.getLang() === 'zh') {
    const m = { Africa:'非洲', Asia:'亚洲', Europe:'欧洲', 'North America':'北美洲', 'South America':'南美洲', Oceania:'大洋洲' };
    return m[c] || c;
  }
  return c;
}

function formatPop(n) {
  if (n >= 1e9) return (n/1e9).toFixed(2) + ' B';
  if (n >= 1e6) return (n/1e6).toFixed(2) + ' M';
  if (n >= 1e3) return (n/1e3).toFixed(1) + ' K';
  return n.toLocaleString('en-US');
}

function formatArea(km2) {
  if (km2 < 1) return km2 + ' km²';
  if (km2 >= 1e6) return (km2/1e6).toFixed(2) + ' M km²';
  return km2.toLocaleString('en-US') + ' km²';
}

function doCopy() {
  const card = $('#card');
  if (card.querySelector('.rc-empty')) return;
  const txt = card.innerText.replace(/\s+/g, ' ').trim();
  copyText(txt);
}

function doClear() {
  history = [];
  $('#card').innerHTML = `<div class="rc-empty">${t('empty')}</div>`;
  $('#history').innerHTML = '';
  $('#status').textContent = '';
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

$('#empty').textContent = t('empty');
$('#historyTitle').textContent = t('historyLabel');

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="generate()">${t('generate')}</button>
  <label style="font-size:.85em;color:var(--text2);display:flex;align-items:center;gap:6px">🌍 ${t('continent')}:
    <select class="rc-select" onchange="activeContinent=this.value">
      ${CONTINENTS.map(c => `<option value="${c}">${c === 'All' ? t('allContinents') : c}</option>`).join('')}
    </select>
  </label>
  <button class="gz-btn gz-btn-secondary" onclick="doCopy()">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;
