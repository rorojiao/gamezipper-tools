<script>
GZI18n.register({
  en: {
    toolTitle: 'Image Denoiser',
    toolDesc: 'Remove noise from images — reduce grain and artifacts with adjustable strength. Free, private and browser-based.',
    dropLabel: 'Drop an image here or click to upload',
    strength: 'Denoise Strength',
    radius: 'Filter Radius',
    original: 'Original',
    denoised: 'Denoised',
    step1: 'Upload or drag and drop your noisy image',
    step2: 'Adjust the denoise strength and filter radius',
    step3: 'Preview the before/after result',
    step4: 'Click Download to save the clean image',
  },
  zh: {
    toolTitle: '图片降噪工具',
    toolDesc: '去除图片噪点 — 减少颗粒感和伪影，可调整强度。免费、私密、浏览器本地处理。',
    dropLabel: '拖拽图片到此处或点击上传',
    strength: '降噪强度',
    radius: '滤波半径',
    original: '原图',
    denoised: '降噪后',
    step1: '上传或拖拽有噪点的图片',
    step2: '调整降噪强度和滤波半径',
    step3: '预览前后对比效果',
    step4: '点击下载保存降噪后的图片',
  }
});

const { $, copyText, t } = GZ;
let originalData = null;
const canvas = $('#canvas');
const ctx = canvas.getContext('2d');

function loadImage(file) {
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      const maxW = 800;
      let w = img.width, h = img.height;
      if (w > maxW) { h = Math.round(h * maxW / w); w = maxW; }
      canvas.width = w; canvas.height = h;
      ctx.drawImage(img, 0, 0, w, h);
      originalData = ctx.getImageData(0, 0, w, h);
      $('#controls').style.display = 'block';
      $('#dropZone').style.display = 'none';
      applyDenoise();
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function applyDenoise() {
  if (!originalData) return;
  const strength = +$('#strengthRange').value;
  const radius = +$('#radiusRange').value;
  const w = canvas.width, h = canvas.height;
  const src = originalData.data;
  const output = new Uint8ClampedArray(src);

  // Simple bilateral-like denoising (box blur with edge preservation)
  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      let rSum = 0, gSum = 0, bSum = 0, count = 0;
      const centerIdx = (y * w + x) * 4;
      const cr = src[centerIdx], cg = src[centerIdx+1], cb = src[centerIdx+2];

      for (let dy = -radius; dy <= radius; dy++) {
        for (let dx = -radius; dx <= radius; dx++) {
          const nx = x + dx, ny = y + dy;
          if (nx < 0 || nx >= w || ny < 0 || ny >= h) continue;
          const nIdx = (ny * w + nx) * 4;
          const nr = src[nIdx], ng = src[nIdx+1], nb = src[nIdx+2];
          // Color distance for edge preservation
          const diff = Math.abs(cr-nr) + Math.abs(cg-ng) + Math.abs(cb-nb);
          const weight = diff < strength * 30 ? 1 : 0;
          if (weight) {
            rSum += nr; gSum += ng; bSum += nb; count++;
          }
        }
      }
      if (count > 0) {
        output[centerIdx] = Math.round(rSum / count);
        output[centerIdx+1] = Math.round(gSum / count);
        output[centerIdx+2] = Math.round(bSum / count);
        output[centerIdx+3] = src[centerIdx+3];
      }
    }
  }

  ctx.putImageData(new ImageData(output, w, h), 0, 0);
}

function download() {
  if (!originalData) return;
  const a = document.createElement('a');
  a.href = canvas.toDataURL('image/png');
  a.download = 'denoised-image.png';
  a.click();
}

$('#strengthRange').addEventListener('input', e => {
  $('#strengthVal').textContent = e.target.value;
  applyDenoise();
});
$('#radiusRange').addEventListener('input', e => {
  $('#radiusVal').textContent = e.target.value + 'px';
  applyDenoise();
});

$('#dropZone').addEventListener('click', () => $('#fileInput').click());
$('#fileInput').addEventListener('change', e => { if (e.target.files[0]) loadImage(e.target.files[0]); });
$('#dropZone').addEventListener('dragover', e => { e.preventDefault(); e.currentTarget.classList.add('dragover'); });
$('#dropZone').addEventListener('dragleave', e => { e.currentTarget.classList.remove('dragover'); });
$('#dropZone').addEventListener('drop', e => { e.preventDefault(); e.currentTarget.classList.remove('dragover'); if (e.dataTransfer.files[0]) loadImage(e.dataTransfer.files[0]); });

$('#dropLabel').textContent = t('dropLabel');
$('#lblStrength').textContent = t('strength');
$('#lblRadius').textContent = t('radius');
$('#lblOriginal').textContent = t('original');
$('#lblDenoised').textContent = t('denoised');

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="download()">${t('download')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="document.getElementById('controls').style.display='none';document.getElementById('dropZone').style.display='block';originalData=null">${t('clear')}</button>`;

GZ.renderToolPage({
  category: 'image',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📦', href:'/image/compressor.html', name:'Image Compressor'},
    {icon:'🎨', href:'/image/filters.html', name:'Image Filters'},
    {icon:'🖼️', href:'/image/blur.html', name:'Image Blur'},
    {icon:'✏️', href:'/image/pencil-sketch.html', name:'Pencil Sketch'},
  ]
});
</script>
