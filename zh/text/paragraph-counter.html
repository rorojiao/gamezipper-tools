const { $, copyText, t } = GZ;

function countText(text) {
  if (!text) return null;

  const lines = text.split('\n');
  const lineCount = lines.length;

  // Paragraphs: blocks separated by blank lines
  const paragraphs = text.split(/\n\s*\n/).map(p => p.trim()).filter(p => p.length > 0);
  const paragraphCount = paragraphs.length;

  // Characters
  const charCount = text.length;
  const charNoSpaces = text.replace(/\s/g, '').length;

  // Words: handle CJK + latin
  const cjkCount = (text.match(/[\u4e00-\u9fff\u3040-\u309f\u30a0-\u30ff\uac00-\ud7af]/g) || []).length;
  const latinWords = (text.replace(/[\u4e00-\u9fff\u3040-\u309f\u30a0-\u30ff\uac00-\ud7af]/g, ' ').match(/\b[\w''-]+\b/g) || []).length;
  const wordCount = cjkCount + latinWords;

  // Sentences: terminal punctuation followed by space/end
  const sentences = text.match(/[^.!?。！？]+[.!?。！？]+/g) || [];
  // Also count text without terminal punctuation as 1 sentence if non-empty
  let sentenceCount = sentences.length;
  if (sentenceCount === 0 && text.trim().length > 0) sentenceCount = 1;

  // Reading time: ~200 wpm for English, ~400 cpm for Chinese
  const readingMinutes = cjkCount > latinWords ? cjkCount / 400 : wordCount / 200;
  const readingSeconds = Math.round(readingMinutes * 60);

  // Speaking time: ~130 wpm
  const speakingMinutes = cjkCount > latinWords ? cjkCount / 250 : wordCount / 130;
  const speakingSeconds = Math.round(speakingMinutes * 60);

  // Averages
  const avgWordsPerSentence = sentenceCount > 0 ? (wordCount / sentenceCount).toFixed(1) : '0';
  const avgSentencesPerParagraph = paragraphCount > 0 ? (sentenceCount / paragraphCount).toFixed(1) : '0';
  const longestParagraph = paragraphs.length > 0 ? Math.max(...paragraphs.map(p => {
    const cjk = (p.match(/[\u4e00-\u9fff\u3040-\u309f\u30a0-\u30ff\uac00-\ud7af]/g) || []).length;
    const latin = (p.replace(/[\u4e00-\u9fff\u3040-\u309f\u30a0-\u30ff\uac00-\ud7af]/g, ' ').match(/\b[\w''-]+\b/g) || []).length;
    return cjk + latin;
  })) : 0;

  return {
    paragraphCount, sentenceCount, wordCount, charCount, charNoSpaces, lineCount,
    readingSeconds, speakingSeconds, avgWordsPerSentence, avgSentencesPerParagraph, longestParagraph,
    cjkCount, latinWords
  };
}

function fmtTime(seconds) {
  if (seconds < 60) return seconds + 's';
  const m = Math.floor(seconds / 60);
  const s = seconds % 60;
  return s > 0 ? `${m}m ${s}s` : `${m}m`;
}

function renderStats(stats) {
  const grid = $('#statsGrid');
  if (!stats) { grid.innerHTML = ''; return; }
  grid.innerHTML = `
    <div class="stat-card highlight"><div class="num">${stats.paragraphCount}</div><div class="lbl">${t('paragraphs')}</div></div>
    <div class="stat-card"><div class="num">${stats.sentenceCount}</div><div class="lbl">${t('sentences')}</div></div>
    <div class="stat-card"><div class="num">${stats.wordCount}</div><div class="lbl">${t('words')}</div></div>
    <div class="stat-card"><div class="num">${stats.charCount}</div><div class="lbl">${t('characters')}</div></div>
    <div class="stat-card"><div class="num">${stats.charNoSpaces}</div><div class="lbl">${t('charactersNoSpaces')}</div></div>
    <div class="stat-card"><div class="num">${stats.lineCount}</div><div class="lbl">${t('lines')}</div></div>
    <div class="stat-card"><div class="num" style="font-size:1.2em">${fmtTime(stats.readingSeconds)}</div><div class="lbl">${t('readingTime')}</div></div>
    <div class="stat-card"><div class="num" style="font-size:1.2em">${fmtTime(stats.speakingSeconds)}</div><div class="lbl">${t('speakingTime')}</div></div>
    <div style="grid-column:1/-1;background:var(--gz-card-bg,#1a1a2e);border:1px solid rgba(255,255,255,.08);border-radius:8px;padding:12px 16px;margin-top:4px">
      <div class="detail-row"><span>${t('avgWordsPerSentence')}</span><span class="v">${stats.avgWordsPerSentence}</span></div>
      <div class="detail-row"><span>${t('avgSentencesPerParagraph')}</span><span class="v">${stats.avgSentencesPerParagraph}</span></div>
      <div class="detail-row"><span>${t('longestParagraph')}</span><span class="v">${stats.longestParagraph}</span></div>
    </div>`;
}

function calculate() {
  renderStats(countText($('#input').value));
}

function loadExample() {
  $('#input').value = `The quick brown fox jumps over the lazy dog. This is the first paragraph of our example text. It contains exactly three sentences.

Here is a second paragraph. Writing is a wonderful way to express ideas! The tool should count this as a separate paragraph with two sentences.

And finally, this is the third paragraph. It demonstrates that blank lines separate paragraphs. You can see the counts update in real time as you type or paste text.`;
  calculate();
}

$('#toolbar').innerHTML = `
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('loadExample')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="copyText($('#statsGrid').innerText)">${t('copyStats')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#input').value=\'\';calculate()">${t('clear')}</button>`;

$('#input').addEventListener('input', calculate);
