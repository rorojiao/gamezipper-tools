<body>

          <button class="gz-btn gz-btn-secondary add-btn" id="add-hour"></button>
        </div>
      </div>
      <div>
        <label id="lbl-out" style="display:block;font-size:.78em;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px"></label>

</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Local Business Schema Generator',
    toolDesc: 'Build valid LocalBusiness JSON-LD with NAP data, opening hours, geo coordinates, ratings and price range for local SEO rich results.',
    generate: 'Generate', example: 'Example', copy: 'Copy', clear: 'Clear',
    lblName: 'Business name', lblType: 'Business type', lblUrl: 'Website URL', lblImg: 'Image URL',
    lblStreet: 'Street address', lblCity: 'City', lblRegion: 'Region / State', lblZip: 'Postal code', lblCountry: 'Country (ISO 2)',
    lblPhone: 'Phone', lblPrice: 'Price range', lblLat: 'Latitude', lblLng: 'Longitude',
    lblRating: 'Aggregate rating (0-5)', lblReviews: 'Review count',
    lblHours: 'Opening hours', addHour: '+ Add hours', day: 'Day', open: 'Opens', close: 'Closes',
    step1: 'Enter your business name, address and phone (NAP) data.',
    step2: 'Pick the most specific business type (e.g. Restaurant).',
    step3: 'Optionally add opening hours, geo coordinates and ratings.',
    step4: 'Copy the generated JSON-LD into your page <head>.',
  },
  zh: {
    toolTitle: '本地商家 Schema 生成器',
    toolDesc: '生成符合规范的 LocalBusiness JSON-LD，包含 NAP 信息、营业时间、地理坐标、评分和价格区间，助力本地 SEO 富结果。',
    generate: '生成', example: '示例', copy: '复制', clear: '清空',
    lblName: '商家名称', lblType: '商家类型', lblUrl: '网站 URL', lblImg: '图片 URL',
    lblStreet: '街道地址', lblCity: '城市', lblRegion: '省 / 州', lblZip: '邮政编码', lblCountry: '国家代码 (ISO 2)',
    lblPhone: '电话', lblPrice: '价格区间', lblLat: '纬度', lblLng: '经度',
    lblRating: '综合评分 (0-5)', lblReviews: '评价数量',
    lblHours: '营业时间', addHour: '+ 添加时段', day: '星期', open: '开门', close: '关门',
    step1: '填写商家名称、地址和电话 (NAP) 信息。',
    step2: '选择最具体的商家类型（例如 Restaurant）。',
    step3: '可选：添加营业时间、地理坐标和评分。',
    step4: '将生成的 JSON-LD 复制到页面 <head> 中。',
  }
});
const { $, copyText, t } = GZ;
const TYPES = ['LocalBusiness','Store','Restaurant','CafeOrCoffeeShop','BarOrPub','FastFoodRestaurant','Bakery','Hotel','LodgingBusiness','HotelRoom','HealthAndBeautyBusiness','HairSalon','BeautySalon','NailSalon','Spa','Dentist','MedicalBusiness','Physician','Pharmacy','Hospital','VeterinaryCare','AnimalShelter','AutomotiveBusiness','AutoRepair','AutoPartsStore','AutoWash','GasStation','HomeAndConstructionBusiness','Electrician','Plumber','RoofingContractor','HousePainter','Locksmith','FinancialService','BankOrCreditUnion','InsuranceOffice','AccountingService','LegalService','Notary','TravelAgency','ExerciseGym','SportsActivityLocation','GolfCourse','School','ChildCare','Library','PlaceOfWorship','Church','MovieTheater','PerformartsTheater','MusicVenue','StadiumOrArena','Zoo','AmusementPark','Museum','TouristAttraction'];
const DAYS = [['Mo','Monday'],['Tu','Tuesday'],['We','Wednesday'],['Th','Thursday'],['Fr','Friday'],['Sa','Saturday'],['Su','Sunday']];

function field(id, labelKey, type='text', ph='', full=false, extra='') {
  return `<div class="fg ${full?'full':''}"><label>${t(labelKey)}</label><input id="f-${id}" type="${type}" placeholder="${ph}" ${extra}></div>`;
}

function buildForm() {
  $('#form').innerHTML =
    field('name','lblName','text','Acme Coffee Roasters', true) +
    `<div class="fg"><label>${t('lblType')}</label><select id="f-type">${TYPES.map(x=>`<option value="${x}">${x}</option>`).join('')}</select></div>` +
    field('url','lblUrl','text','https://example.com') +
    field('street','lblStreet','text','123 Main Street', true) +
    field('city','lblCity','text','Springfield') +
    field('region','lblRegion','text','IL') +
    field('zip','lblZip','text','62704') +
    `<div class="fg"><label>${t('lblCountry')}</label><input id="f-country" type="text" placeholder="US" maxlength="2"></div>` +
    field('phone','lblPhone','text','+1-217-555-0142') +
    field('price','lblPrice','text','$$') +
    field('img','lblImg','text','https://example.com/logo.png') +
    field('lat','lblLat','text','39.7817', false,'step="any"') +
    field('lng','lblLng','text','-89.6501', false,'step="any"') +
    field('rating','lblRating','number','4.6', false,'step="0.1" min="0" max="5"') +
    field('reviews','lblReviews','number','128');
  document.getElementById('f-type').value = 'Restaurant';
}

function addHourRow(day='Mo') {
  const row = document.createElement('div');
  row.className = 'hours-row';
  row.innerHTML = `<select class="h-day">${DAYS.map(d=>`<option value="${d[0]}" ${d[0]===day?'selected':''}>${d[1]}</option>`).join('')}</select>` +
    `<input class="h-open" type="time" value="09:00">` +
    `<input class="h-close" type="time" value="17:00">`;
  $('#hours').appendChild(row);
}

function hl(json) {
  return json.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/("(\\u[\da-fA-F]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false)\b|-?\d+(\.\d+)?([eE][+-]?\d+)?)/g, m => {
      let c='gz-num'; if(/^"/.test(m)) c=/:$/.test(m)?'gz-key':'gz-str'; else if(/true|false/.test(m)) c='gz-bool';
      return `<span class="${c}">${m}</span>`;
    });
}

function gen() {
  const v = id => (document.getElementById('f-'+id)||{}).value || '';
  const data = { "@context":"https://schema.org", "@type": v('type') || 'LocalBusiness', "name": v('name') };
  if (v('url')) data.url = v('url');
  if (v('img')) data.image = v('img');
  if (v('phone')) data.telephone = v('phone');
  if (v('price')) data.priceRange = v('price');
  const hasAddr = v('street')||v('city')||v('region')||v('zip')||v('country');
  if (hasAddr) {
    const a = { "@type":"PostalAddress" };
    if (v('street')) a.streetAddress = v('street');
    if (v('city')) a.addressLocality = v('city');
    if (v('region')) a.addressRegion = v('region');
    if (v('zip')) a.postalCode = v('zip');
    if (v('country')) a.addressCountry = v('country');
    data.address = a;
  }
  if (v('lat') && v('lng')) data.geo = { "@type":"GeoCoordinates", latitude: parseFloat(v('lat')), longitude: parseFloat(v('lng')) };
  const hrs = [...$('#hours').querySelectorAll('.hours-row')].map(r => {
    const d = r.querySelector('.h-day').value, o = r.querySelector('.h-open').value, c = r.querySelector('.h-close').value;
    return o && c ? `${d} ${o}-${c}` : null;
  }).filter(Boolean);
  if (hrs.length) data.openingHours = hrs.length === 1 ? hrs[0] : hrs;
  if (v('rating') && v('reviews')) data.aggregateRating = { "@type":"AggregateRating", ratingValue: parseFloat(v('rating')), reviewCount: parseInt(v('reviews')) };
  $('#output').innerHTML = hl(JSON.stringify(data, null, 2));
  $('#status').innerHTML = `<span style="color:var(--gz-success);font-size:.85em">✓ ${Object.keys(data).length} ${t('lblName').includes('名称')?'字段':'fields'} · ${data['@type']}</span>`;
}

function example() {
  document.getElementById('f-name').value = 'Bluebird Bakery & Cafe';
  document.getElementById('f-type').value = 'Bakery';
  document.getElementById('f-url').value = 'https://bluebirdbakery.example';
  document.getElementById('f-street').value = '458 Oak Street';
  document.getElementById('f-city').value = 'Portland';
  document.getElementById('f-region').value = 'OR';
  document.getElementById('f-zip').value = '97205';
  document.getElementById('f-country').value = 'US';
  document.getElementById('f-phone').value = '+1-503-555-0188';
  document.getElementById('f-price').value = '$$';
  document.getElementById('f-img').value = 'https://bluebirdbakery.example/shop.jpg';
  document.getElementById('f-lat').value = '45.5152';
  document.getElementById('f-lng').value = '-122.6784';
  document.getElementById('f-rating').value = '4.8';
  document.getElementById('f-reviews').value = '342';
  $('#hours').innerHTML = '';
  ['Mo','Tu','We','Th','Fr','Sa','Su'].forEach((d,i) => { addHourRow(d); });
  gen();
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="gen()">${t('generate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="example()">${t('example')}</button>
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#hours').innerHTML='';document.querySelectorAll('#form input').forEach(i=>i.value='');gen()">${t('clear')}</button>`;
$('#lbl-hours').textContent = t('lblHours');
$('#add-hour').textContent = t('addHour');
$('#add-hour').onclick = () => { addHourRow(); gen(); };
$('#lbl-out').textContent = 'JSON-LD';
$('#form').addEventListener('input', gen);
$('#hours').addEventListener('input', gen);

buildForm();
GZ.renderToolPage({
  category: 'seo',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'❓', href:'/seo/faq-schema-generator.html', name:'FAQ Schema Generator'},
    {icon:'🛍️', href:'/seo/product-schema-generator.html', name:'Product Schema Generator'},
    {icon:'⭐', href:'/seo/review-schema-generator.html', name:'Review Schema Generator'},
    {icon:'📅', href:'/seo/event-schema-generator.html', name:'Event Schema Generator'},
  ]
});
example();
</script>
<script src="/tools-result-rec.js?v=20260707v520" defer></script>
</body>
</html>
