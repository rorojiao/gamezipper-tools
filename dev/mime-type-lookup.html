let mode = 'ext'; // 'ext' or 'mime'

function setMode(m) {
  mode = m;
  $('#mode-ext').classList.toggle('active', m === 'ext');
  $('#mode-mime').classList.toggle('active', m === 'mime');
  $('#search').placeholder = m === 'ext' ? 'Type an extension (e.g. pdf, jpg)...' : 'Type a MIME type (e.g. image/png)...';
  search();
}

function search() {
  const q = $('#search').value.trim().toLowerCase().replace(/^\./, '');
  if (!q) { $('#results').innerHTML = `<p style="text-align:center;opacity:.5;padding:20px">${t('searchHint')}</p>`; return; }

  let results;
  if (mode === 'ext') {
    results = MIME_DB.filter(m => m.ext.includes(q));
    results.sort((a, b) => {
      const aStarts = a.ext.startsWith(q) ? 0 : 1;
      const bStarts = b.ext.startsWith(q) ? 0 : 1;
      return aStarts - bStarts || a.ext.localeCompare(b.ext);
    });
  } else {
    results = MIME_DB.filter(m => m.type.toLowerCase().includes(q));
    results.sort((a, b) => a.type.localeCompare(b.type));
    // Deduplicate by type
    const seen = new Set();
    results = results.filter(r => { if (seen.has(r.type)) return false; seen.add(r.type); return true; });
  }

  if (!results.length) {
    $('#results').innerHTML = `<p style="text-align:center;padding:20px;opacity:.6">${t('noResults')}</p>`;
    return;
  }

  // Get unique types for count
  const uniqueTypes = new Set(results.map(r => r.type));
  let html = `<p style="font-size:.85em;opacity:.7;margin:4px 0">${results.length} ${t('resultCount')}</p>`;

  results.slice(0, 100).forEach(r => {
    html += `<div class="mime-card" onclick="copyText('${r.type}')">
      <span class="ext">.${r.ext}</span>
      <span class="type">${r.type}</span>
      <button class="copy-btn">${t('copy')}</button>
    </div>`;
  });

  if (results.length > 100) html += `<p style="text-align:center;opacity:.5;padding:8px">...and ${results.length - 100} more</p>`;
  $('#results').innerHTML = html;
}

$('#search').addEventListener('input', search);

$('#toolbar').innerHTML = ``;

// Show popular types on load
$('#results').innerHTML = `<p style="text-align:center;opacity:.5;padding:20px">${t('searchHint')}</p>`;
