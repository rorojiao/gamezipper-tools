<script>
GZI18n.register({
  en: {
    toolTitle: 'Markdown Minifier',
    toolDesc: 'Compress Markdown by removing extra whitespace, blank lines and comments. Reduce file size while keeping formatting intact — free, browser-only.',

    clear: 'Clear',

    success: '✓ Minified',
    optComments: 'Remove HTML comments',

    step2: 'Select which whitespace to remove',
    step3: 'Click Minify to compress',
    step4: 'Click Copy to copy the result',
  },
  zh: {
    toolTitle: 'Markdown 压缩工具',
    toolDesc: '通过去除多余空白、空行和注释来压缩 Markdown。减小文件体积同时保持格式不变 — 免费、纯浏览器运行。',
    minify: '压缩',
    example: '示例',
    copy: '复制',
    clear: '清空',
    inputLabel: 'Markdown 输入',
    outputLabel: '结果',
    empty: '粘贴 Markdown 然后点击压缩',
    success: '✓ 已压缩',
    optComments: '移除 HTML 注释',
    optTrailing: '移除行尾空白',
    optBlank: '合并空行',
    optTrim: '修剪行首尾空白',
    optJoin: '段落合并为一行',
    step1: '在输入区粘贴 Markdown',
    step2: '选择要移除的空白类型',
    step3: '点击「压缩」',
    step4: '点击「复制」复制结果',
  }
});

const { $, copyText, t } = GZ;

function doMinify() {
  let inp = $('#input').value;
  if (!inp.trim()) return;
  const opts = {
    comments: $('#opt-comments').checked,
    trailing: $('#opt-trailing').checked,
    blank: $('#opt-blank').checked,
    trim: $('#opt-trim').checked,
    join: $('#opt-join').checked,
  };
  let result = inp;

  if (opts.comments) {
    result = result.replace(/<!--[\s\S]*?-->/g, '');
  }
  if (opts.trailing) {
    result = result.replace(/[ \t]+$/gm, '');
  }
  if (opts.trim) {
    result = result.split('\n').map(l => l.trim()).join('\n');
  }
  if (opts.blank) {
    // Collapse 2+ consecutive blank lines to 1, but keep paragraph spacing
    result = result.replace(/\n{3,}/g, '\n\n');
  }
  if (opts.join) {
    // Join lines in paragraphs (non-empty consecutive lines) to single line
    result = result.split(/\n\n+/).map(para => para.replace(/\n/g, ' ').trim()).join('\n\n');
  }
  result = result.replace(/\n{3,}/g, '\n\n').trim() + '\n';

  $('#output').textContent = result;
  const orig = inp.length, now = result.length;
  const pct = orig > 0 ? Math.round((1 - now/orig) * 100) : 0;
  $('#status').innerHTML = `<span style="color:var(--gz-success)">${t('success')} (${orig} → ${now} bytes, ${pct}% smaller)</span>`;
}

function loadExample() {
  $('#input').value = '# Project README\n\n<!-- This is a hidden comment -->\n\nWelcome to **My Project**!   \nThis is a description with trailing spaces.   \n\n\n\n## Features\n\n- Feature one\n- Feature two\n- Feature three\n\n\n## Installation\n\n```bash\nnpm install my-project\n```\n\n<!-- TODO: add more docs -->\n\nEnjoy! 🎉';
  doMinify();
}

function doClear() { $('#input').value=''; $('#output').textContent=''; $('#status').innerHTML=''; }

$('#options').innerHTML = `<div class="opt-row">
  <label><input type="checkbox" id="opt-comments" checked> ${t('optComments')}</label>
  <label><input type="checkbox" id="opt-trailing" checked> ${t('optTrailing')}</label>
  <label><input type="checkbox" id="opt-blank" checked> ${t('optBlank')}</label>
  <label><input type="checkbox" id="opt-trim"> ${t('optTrim')}</label>
  <label><input type="checkbox" id="opt-join"> ${t('optJoin')}</label>
</div>`;

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="doMinify()">${t('minify')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

$('#lbl-in').textContent = t('inputLabel');
$('#lbl-out').textContent = t('outputLabel');
$('#output').innerHTML = `<span style="opacity:.5">${t('empty')}</span>`;
