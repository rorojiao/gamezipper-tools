<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="wic-grid">
      <div>
        <label id="lbl-unit"></label>
        <select id="unit">
          <option value="metric" selected>Metric (kg)</option>
          <option value="imperial">Imperial (lb)</option>
        </select>
      </div>
      <div>
        <label id="lbl-weight"></label>
        <input type="number" id="weight" value="70" min="1" step="0.1">
      </div>
      <div>
        <label id="lbl-activity"></label>
        <select id="activity">
          <option value="1.0">Sedentary (little exercise)</option>
          <option value="1.2" selected>Light (1-3 days/week)</option>
          <option value="1.4">Moderate (3-5 days/week)</option>
          <option value="1.6">Active (6-7 days/week)</option>
          <option value="1.8">Very active (athlete)</option>
        </select>
      </div>
      <div>
        <label id="lbl-climate"></label>
        <select id="climate">
          <option value="0">Temperate (default)</option>
          <option value="+500" selected>Warm / summer</option>
          <option value="+1000">Hot / tropical</option>
          <option value="-200">Cold / winter</option>
        </select>
      </div>
      <div>
        <label id="lbl-stage"></label>
        <select id="stage">
          <option value="0" selected>None</option>
          <option value="+300">Pregnant</option>
          <option value="+700">Breastfeeding</option>
        </select>
      </div>
      <div>
        <label id="lbl-hours"></label>
        <input type="number" id="hours" value="14" min="6" max="20">
      </div>
    </div>
    <div class="wic-result">
      <div class="wic-card big"><div class="v" id="total-ml">2500</div><div class="u">milliliters / day</div><div class="l" id="lbl-total"></div></div>
      <div class="wic-card"><div class="v" id="total-oz">84.5</div><div class="u">fl oz</div><div class="l" id="lbl-oz"></div></div>
      <div class="wic-card"><div class="v" id="total-cup">10.6</div><div class="u">cups (250 ml)</div><div class="l" id="lbl-cup"></div></div>
      <div class="wic-card"><div class="v" id="total-bottle">5.0</div><div class="u">500 ml bottles</div><div class="l" id="lbl-bottle"></div></div>
      <div class="wic-card"><div class="v" id="per-kg">35.7</div><div class="u">ml per kg body weight</div><div class="l" id="lbl-perkg"></div></div>
      <div class="wic-card"><div class="v" id="per-hour">179</div><div class="u">ml per active hour</div><div class="l" id="lbl-perhour"></div></div>
    </div>

<script>
GZI18n.register({
  en: {
    toolTitle: 'Water Intake Calculator',
    toolDesc: 'Get a personalized daily hydration target based on your weight, activity level, climate and life stage. Includes an hourly drinking schedule and tips.',
    unit: 'Units',
    weight: 'Body weight',
    activity: 'Activity level',
    climate: 'Climate',
    stage: 'Life stage',
    hours: 'Active drinking hours per day',
    total: 'Daily goal',
    oz: 'US fluid ounces',
    cup: 'Cups',
    bottle: 'Bottles',
    perkg: 'Per kg',
    perhour: 'Per hour',
    schedTitle: 'Hourly drinking schedule',
    step1: 'Choose metric or imperial units',
    step2: 'Enter your body weight',
    step3: 'Pick activity level, climate and life stage for an accurate goal',
    step4: 'Read your daily target and follow the hourly schedule',
    tipText: '<b>Tip:</b> Aim to spread intake evenly across the day. Drink a glass on waking, one with each meal, and refill during workouts. Listen to thirst — it is a reliable signal for most healthy adults.',
    wake: 'Wake',
    sleep: 'Sleep',
    early: 'Early morning',
    morning: 'Morning',
    midday: 'Midday',
    afternoon: 'Afternoon',
    evening: 'Evening',
    night: 'Night',
    midnight: 'Before bed',
  },
  zh: {
    toolTitle: '饮水量计算器',
    toolDesc: '根据体重、活动水平、气候和人生阶段，得出个性化的每日饮水目标，含小时饮水表和实用建议。',
    unit: '单位',
    weight: '体重',
    activity: '活动水平',
    climate: '气候',
    stage: '人生阶段',
    hours: '每日饮水时段',
    total: '每日目标',
    oz: '美制液量盎司',
    cup: '杯',
    bottle: '瓶',
    perkg: '每公斤',
    perhour: '每小时',
    schedTitle: '每小时饮水表',
    step1: '选择公制或英制单位',
    step2: '输入体重',
    step3: '选择活动水平、气候和人生阶段以获得准确目标',
    step4: '查看每日目标并按时段表饮水',
    tipText: '<b>提示：</b>全天均匀摄入。起床后喝一杯，每餐配一杯，运动中补充水分。口渴是健康成年人的可靠信号。',
    wake: '起床',
    sleep: '睡觉',
    early: '清晨',
    morning: '上午',
    midday: '中午',
    afternoon: '下午',
    evening: '傍晚',
    night: '夜晚',
    midnight: '睡前',
  }
});

const { $, t } = GZ;

function calc() {
  const unit = $('#unit').value;
  let weight = parseFloat($('#weight').value);
  if (!(weight > 0)) return;
  if (unit === 'imperial') weight = weight * 0.453592;

  const activity = parseFloat($('#activity').value);
  const climate = parseInt($('#climate').value.replace('+','').replace('-','')) * (($('#climate').value.startsWith('-'))?-1:1);
  const stage = parseInt($('#stage').value.replace('+','').replace('-','')) * (($('#stage').value.startsWith('-'))?-1:1);
  const hours = Math.max(6, Math.min(20, parseInt($('#hours').value) || 14));

  // Base: 35 ml/kg (IOM recommendation average)
  let total = weight * 35 * activity + climate + stage;
  total = Math.max(1200, Math.min(6000, Math.round(total)));

  $('#total-ml').textContent = total;
  $('#total-oz').textContent = (total / 29.5735).toFixed(1);
  $('#total-cup').textContent = (total / 250).toFixed(1);
  $('#total-bottle').textContent = (total / 500).toFixed(1);
  $('#per-kg').textContent = Math.round(total / (unit==='metric' ? parseFloat($('#weight').value) : parseFloat($('#weight').value) * 0.453592));
  $('#per-hour').textContent = Math.round(total / hours);

  $('#lbl-total').textContent = t('total');
  $('#lbl-oz').textContent = t('oz');
  $('#lbl-cup').textContent = t('cup');
  $('#lbl-bottle').textContent = t('bottle');
  $('#lbl-perkg').textContent = t('perkg');
  $('#lbl-perhour').textContent = t('perhour');
  $('#sched-title').textContent = t('schedTitle');
  $('#tips').innerHTML = t('tipText');

  // Schedule: start at 7am, distribute evenly across 'hours' hours
  const perHour = total / hours;
  const grid = $('#hours-grid');
  grid.innerHTML = '';
  const startHour = 7;
  for (let i = 0; i < hours; i++) {
    const hourOfDay = (startHour + i) % 24;
    const ampm = hourOfDay >= 12 ? 'PM' : 'AM';
    const display = hourOfDay === 0 ? 12 : (hourOfDay > 12 ? hourOfDay - 12 : hourOfDay);
    let label = t('morning');
    if (i === 0) label = t('wake');
    else if (i === hours - 1) label = t('midnight');
    else if (i < 2) label = t('early');
    else if (i < 5) label = t('morning');
    else if (i < 8) label = t('midday');
    else if (i < 11) label = t('afternoon');
    else label = t('evening');
    const div = document.createElement('div');
    div.className = 'wic-hour';
    div.innerHTML = `<div class="t">${display} ${ampm}</div><div class="v">${Math.round(perHour)} ml</div><div style="font-size:.65rem;color:var(--text3);margin-top:2px">${label}</div>`;
    grid.appendChild(div);
  }
}

['weight','unit','activity','climate','stage','hours'].forEach(id => {
  $('#' + id).addEventListener('input', calc);
  $('#' + id).addEventListener('change', calc);
});

// Init labels
$('#lbl-unit').textContent = t('unit');
$('#lbl-weight').textContent = t('weight');
$('#lbl-activity').textContent = t('activity');
$('#lbl-climate').textContent = t('climate');
$('#lbl-stage').textContent = t('stage');
$('#lbl-hours').textContent = t('hours');

calc();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'💧', href:'/calc/water-intake.html', name:'Water Intake'},
    {icon:'🍽️', href:'/calc/calorie-calculator.html', name:'Calorie Calculator'},
    {icon:'⚖️', href:'/calc/bmi-calculator.html', name:'BMI Calculator'},
    {icon:'🏃', href:'/calc/macro-calculator.html', name:'Macro Calculator'},
  ]
});
</script>

</body>
