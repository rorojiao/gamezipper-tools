<script>
GZI18n.register({
  en:{toolTitle:'Website SEO Checker', toolDesc:'Run a free on-page SEO audit of any URL. Get a 0-100 score with detailed checks on meta tags, headings, images, structured data, social cards and more.',
    audit:'Audit Website', copy:'Copy', example:'Load Example', loading:'Crawling site…', done:'✓ Audit complete', err:'Error',
    basic:'Essentials', metaSec:'Meta Tags', contentSec:'Content', socialSec:'Social & Structured Data',
    step1:'Paste any public URL of a webpage you want to audit', step2:'Click Audit Website to fetch the page and run 14 on-page checks', step3:'Review your overall score and individual check results', step4:'Fix any failing checks to improve your SEO score' },
  zh:{toolTitle:'网站 SEO 检测器', toolDesc:'对任意 URL 进行免费的页面级 SEO 检测。0-100 分制评分，检查元标签、标题层级、图片、结构化数据、社交卡片等 14 项指标。',
    audit:'检测网站', copy:'复制', example:'加载示例', loading:'正在抓取网站…', done:'✓ 检测完成', err:'错误',
    basic:'基础项', metaSec:'元标签', contentSec:'内容', socialSec:'社交和结构化数据',
    step1:'粘贴任意公开网页的 URL', step2:'点击「检测网站」抓取页面并运行 14 项检查', step3:'查看总体评分和每项检查结果', step4:'修复不通过项以提升 SEO 评分' }
});
const { $, t } = GZ;

const PROXIES = [
  (u)=>'https://api.allorigins.win/raw?url='+encodeURIComponent(u),
  (u)=>'https://corsproxy.io/?'+encodeURIComponent(u),
  (u)=>'https://api.codetabs.com/v1/proxy?quest='+encodeURIComponent(u),
];
async function fetchWithProxies(url){
  let lastErr=null;
  for(const p of PROXIES){
    try{const r=await fetch(p(url),{cache:'no-store'});if(r.ok){return await r.text();}lastErr='Proxy '+r.status;}catch(e){lastErr=String(e);}
  }
  throw new Error(lastErr||'All proxies failed');
}

function metaContent(doc, name){const a = doc.querySelector('meta[name="'+name+'"]'); return a ? a.getAttribute('content') : null;}
function metaProp(doc, p){const a = doc.querySelector('meta[property="'+p+'"]'); return a ? a.getAttribute('content') : null;}

function renderCheck(el, status, title, desc, points){
  const icon = status==='ok' ? '✅' : status==='warn' ? '⚠️' : '❌';
  el.className = 'check '+status;
  el.innerHTML = `<div class="icon">${icon}</div><div class="body"><h5>${title}</h5><p>${desc}</p></div><div class="pts">${points} pt</div>`;
}

async function audit(){
  const url = $('#url').value.trim();
  if(!url){$('#status').textContent='✗ Enter a URL';return;}
  $('#status').textContent = t('loading');
  $('#results').style.display='none';
  let html='';
  try{html=await fetchWithProxies(url);}catch(e){$('#status').innerHTML='<span style="color:var(--gz-accent)">'+t('err')+': '+e.message+'</span>';return;}

  const doc = new DOMParser().parseFromString(html,'text/html');
  const size = new Blob([html]).size;

  const checks = {basic:[], meta:[], content:[], social:[]};
  let score=0;

  // Basic
  let s, d, pts;
  // HTTPS
  s = /^https:/i.test(url) ? 'ok' : 'bad';
  d = s==='ok' ? 'Page is served over HTTPS — required for ranking and security.' : 'Page is not using HTTPS. Switch to a TLS certificate.';
  pts = s==='ok'? 8 : 0; score+=pts;
  checks.basic.push({status:s, title:'HTTPS enabled', desc:d, points:pts});
  // Viewport
  const vp = metaContent(doc,'viewport');
  s = vp ? 'ok' : 'bad';
  d = vp ? 'Mobile viewport meta tag is present.' : 'Add <meta name="viewport" content="width=device-width, initial-scale=1"> for mobile rendering.';
  pts = s==='ok'? 7 : 0; score+=pts;
  checks.basic.push({status:s, title:'Viewport meta tag', desc:d, points:pts});
  // lang
  const lang = doc.documentElement.getAttribute('lang');
  s = lang ? 'ok' : 'warn';
  d = lang ? 'html lang="'+lang+'" declared.' : 'Add lang attribute to <html> for screen readers and SEO.';
  pts = s==='ok'? 5 : 2; score+=pts;
  checks.basic.push({status:s, title:'Language attribute', desc:d, points:pts});
  // favicon
  const fav = doc.querySelector('link[rel*="icon"]');
  s = fav ? 'ok' : 'warn';
  d = fav ? 'Favicon link found.' : 'No favicon link — browsers will request /favicon.ico with a 404.';
  pts = s==='ok'? 5 : 2; score+=pts;
  checks.basic.push({status:s, title:'Favicon declared', desc:d, points:pts});
  // page size
  s = size<200000 ? 'ok' : size<500000 ? 'warn' : 'bad';
  d = 'HTML payload is '+Math.round(size/1024)+' KB. '+(s==='ok'?'Well under the 200 KB target.':s==='warn'?'Consider trimming whitespace, comments, inline scripts.':'Heavy HTML will slow first paint — minify, split chunks.');
  pts = s==='ok'? 7 : s==='warn'? 4 : 0; score+=pts;
  checks.basic.push({status:s, title:'Page size', desc:d, points:pts});

  // Meta
  const title = doc.querySelector('title')?.textContent || '';
  if(!title){ s='bad'; d='Missing <title>. Add one between 30-65 characters.'; pts=0; }
  else if(title.length<30){ s='warn'; d=`Title is only ${title.length} chars — too short.`; pts=4; }
  else if(title.length>65){ s='warn'; d=`Title is ${title.length} chars — may be truncated.`; pts=6; }
  else { s='ok'; d=`Title length: ${title.length} chars.`; pts=10; }
  score+=pts; checks.meta.push({status:s, title:'Title tag', desc:d, points:pts});

  const desc = metaContent(doc,'description');
  if(!desc){ s='bad'; d='Missing meta description.'; pts=0; }
  else if(desc.length<70){ s='warn'; d=`Description is ${desc.length} chars — too short.`; pts=4; }
  else if(desc.length>160){ s='warn'; d=`Description is ${desc.length} chars — may truncate.`; pts=6; }
  else { s='ok'; d=`Description length: ${desc.length} chars.`; pts=10; }
  score+=pts; checks.meta.push({status:s, title:'Meta description', desc:d, points:pts});

  const canon = doc.querySelector('link[rel="canonical"]');
  s = canon ? 'ok' : 'warn';
  d = canon ? 'Canonical link set.' : 'No canonical link. Add one to prevent duplicate content issues.';
  pts = s==='ok'? 6 : 2; score+=pts;
  checks.meta.push({status:s, title:'Canonical URL', desc:d, points:pts});

  const robots = metaContent(doc,'robots');
  s = robots && /noindex/i.test(robots) ? 'bad' : 'ok';
  d = s==='bad' ? 'meta robots contains noindex — page is hidden.' : (robots || 'Default: index, follow.');
  pts = s==='bad' ? 0 : 5; score+=pts;
  checks.meta.push({status:s, title:'Robots directive', desc:d, points:pts});

  // Content
  const h1s = doc.querySelectorAll('h1');
  s = h1s.length===1 ? 'ok' : h1s.length===0 ? 'bad' : 'warn';
  d = s==='ok' ? 'Exactly one H1.' : s==='warn' ? `Multiple H1s (${h1s.length}).` : 'No H1 tag.';
  pts = s==='ok'? 8 : s==='warn'? 4 : 0; score+=pts;
  checks.content.push({status:s, title:'H1 heading', desc:d, points:pts});

  // Image alt coverage
  const imgs = doc.querySelectorAll('img');
  let imgsWithAlt=0; for(const im of imgs){ if(im.getAttribute('alt')!==null && im.getAttribute('alt').trim()!=='') imgsWithAlt++; }
  const altPct = imgs.length? (imgsWithAlt/imgs.length*100) : 100;
  s = imgs.length===0 ? 'warn' : altPct===100 ? 'ok' : altPct>=70 ? 'warn' : 'bad';
  d = imgs.length===0 ? 'No <img> tags on the page.' : `${imgsWithAlt} of ${imgs.length} images have alt text (${altPct.toFixed(0)}%).`;
  pts = imgs.length===0 ? 3 : altPct===100 ? 8 : altPct>=70 ? 4 : 0; score+=pts;
  checks.content.push({status:s, title:'Image alt text', desc:d, points:pts});

  // Word count
  const body = doc.body || doc;
  body.querySelectorAll('script,style,noscript,template').forEach(n=>n.remove());
  const text = body.textContent.replace(/\s+/g,' ').trim();
  const words = text ? text.split(/\s+/).filter(Boolean).length : 0;
  s = words>=300 ? 'ok' : words>=100 ? 'warn' : 'bad';
  d = `${words} words of visible text.`+(s==='ok'?' Enough for SEO.':s==='warn'?' Aim for 300+ for ranking.':' Thin content. Add at least 300 words.');
  pts = s==='ok'? 7 : s==='warn'? 3 : 0; score+=pts;
  checks.content.push({status:s, title:'Word count', desc:d, points:pts});

  // Social
  const og = metaProp(doc,'og:title') && metaProp(doc,'og:description') && metaProp(doc,'og:image');
  s = og ? 'ok' : 'warn';
  d = og ? 'Open Graph title, description and image present.' : 'Missing one or more og:title, og:description or og:image tags.';
  pts = og? 6 : 2; score+=pts;
  checks.social.push({status:s, title:'Open Graph', desc:d, points:pts});
  const tw = metaContent(doc,'twitter:card');
  s = tw ? 'ok' : 'warn';
  d = tw ? `twitter:card = "${tw}".` : 'No twitter:card tag.';
  pts = tw? 4 : 1; score+=pts;
  checks.social.push({status:s, title:'Twitter Card', desc:d, points:pts});
  const jsonld = doc.querySelectorAll('script[type="application/ld+json"]');
  s = jsonld.length? 'ok' : 'warn';
  d = jsonld.length? `${jsonld.length} JSON-LD block(s) found.` : 'No JSON-LD structured data. Add it for rich results.';
  pts = jsonld.length? 6 : 2; score+=pts;
  checks.social.push({status:s, title:'JSON-LD', desc:d, points:pts});

  // Render
  const ring = $('#ringFg');
  const C = 2*Math.PI*68;
  ring.setAttribute('stroke-dasharray', C.toFixed(2));
  ring.setAttribute('stroke-dashoffset', C.toFixed(2));
  setTimeout(()=>{
    const off = C*(1 - score/100);
    ring.setAttribute('stroke-dashoffset', off.toFixed(2));
    ring.setAttribute('stroke', score>=80?'var(--gz-success)':score>=50?'#f0ad4e':'var(--gz-accent)');
  }, 50);
  $('#scoreV').textContent = score;
  $('#scoreL').textContent = score+' / 100';
  const renderGroup = (id, arr)=>{ const el=$('#'+id); el.innerHTML=''; for(const c of arr){ const d=document.createElement('div'); renderCheck(d, c.status, c.title, c.desc, c.points); el.appendChild(d); }};
  renderGroup('cat-basic', checks.basic);
  renderGroup('cat-meta', checks.meta);
  renderGroup('cat-content', checks.content);
  renderGroup('cat-social', checks.social);
  $('#cat-l1').textContent = t('basic');
  $('#cat-l2').textContent = t('metaSec');
  $('#cat-l3').textContent = t('contentSec');
  $('#cat-l4').textContent = t('socialSec');
  $('#results').style.display='block';
  $('#status').innerHTML = '<span style="color:var(--gz-success)">'+t('done')+'</span>';
}
$('#url').addEventListener('keydown', e=>{if(e.key==='Enter')audit();});
$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="audit()">${t('audit')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="GZ.copyText($('#url').value)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#url').value='https://tools.gamezipper.com/';audit()">${t('example')}</button>`;
GZ.renderToolPage({
  category:'seo',
  titleKey:'toolTitle', descKey:'toolDesc',
  howToSteps:['step1','step2','step3','step4'],
  related:[
    {icon:'🔍',href:'/seo/meta-tag-extractor.html',name:'Meta Tag Extractor'},
    {icon:'🕷',href:'/seo/search-engine-spider-simulator.html',name:'Spider Simulator'},
    {icon:'📊',href:'/seo/webpage-size-checker.html',name:'Webpage Size'},
    {icon:'🤖',href:'/seo/robots-txt-validator.html',name:'Robots.txt Validator'},
  ]
});
</script>
