<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "How is plant count calculated for square spacing?", "acceptedAnswer": {"@type": "Answer", "text": "For square spacing, divide the bed length and width by the spacing to get the number of plants per row and per column, then multiply. A 10 ft × 4 ft bed with 1 ft spacing gives 10 × 4 = 40 plants."}}, {"@type": "Question", "name": "What is triangular (offset) spacing?", "acceptedAnswer": {"@type": "Answer", "text": "In triangular spacing, alternate rows are offset by half a space, and the vertical row distance shrinks to spacing × 0.866 (the height of an equilateral triangle). This packs about 15% more plants into the same area than square spacing."}}, {"@type": "Question", "name": "Does the unit matter?", "acceptedAnswer": {"@type": "Answer", "text": "No — as long as you use the same unit for the bed dimensions and the spacing, the plant count is identical. Use inches, feet, centimeters or meters consistently and the result is correct."}}]}</script>

      <div><label id="lbl-sp"></label><input type="number" id="sp" min="0" step="any" value="1"></div>
      <div><label id="lbl-u"></label><select id="unit">
        <option value="ft">feet (ft)</option>

<script>
GZI18n.register({
  en: {
    toolTitle: 'Plant Spacing Calculator',
    toolDesc: 'Find out exactly how many plants you need for a garden bed or field using square or triangular (offset) spacing patterns.',
    length: 'Bed length', width: 'Bed width', spacing: 'Plant spacing', unit: 'Unit',
    example: 'Load Example', clear: 'Clear',
    sqPlants: 'plants (square grid)', triPlants: 'plants (triangular)',
    note: 'Triangular (offset) spacing fits about 15% more plants than square spacing in the same area by staggering rows. Counts are rounded to whole plants and assume plants fill edge gaps.',
    step1: 'Enter your bed or plot length and width',
    step2: 'Enter the recommended spacing between plants',
    step3: 'Pick your measurement unit — keep it consistent',
    step4: 'Read how many plants you need for each layout',
  },
  zh: {
    toolTitle: '植物间距计算器',
    toolDesc: '使用方形或三角形（交错）排列方式，精确计算花园花坛或田地中需要多少株植物。',
    length: '长度', width: '宽度', spacing: '株距', unit: '单位',
    example: '加载示例', clear: '清空',
    sqPlants: '株（方形排列）', triPlants: '株（三角形）',
    note: '三角形（交错）排列通过错行种植，在相同面积下可比方形排列多容纳约 15% 的植物。株数为整数估算，假设边缘也可种植。',
    step1: '输入花坛或地块的长度和宽度',
    step2: '输入植物之间的推荐株距',
    step3: '选择测量单位 — 保持一致即可',
    step4: '查看两种排列方式分别需要的植物数量',
  }
});
const { $, t } = GZ;

function calc(){
  const L = +$('#len').value || 0, W = +$('#wid').value || 0, S = +$('#sp').value || 0;
  if (L<=0 || W<=0 || S<=0){ $('#sq').textContent='—'; $('#tri').textContent='—'; return; }
  // Square grid: plants per row × rows
  const perRow = Math.floor(L/S) + 1;
  const rows = Math.floor(W/S) + 1;
  const sq = perRow * rows;
  // Triangular (offset): row spacing = S * sin(60°) = S * 0.8660
  const rowH = S * 0.8660254;
  const triRows = Math.floor(W/rowH) + 1;
  let tri = 0;
  for (let r=0; r<triRows; r++){
    const offset = (r % 2) * (S/2);
    // available length for this row
    const eff = L - offset;
    const n = eff >= 0 ? Math.floor(eff/S) + 1 : 0;
    tri += n;
  }
  $('#sq').textContent = sq.toLocaleString();
  $('#tri').textContent = tri.toLocaleString();
}

$('#lbl-len').textContent=t('length'); $('#lbl-wid').textContent=t('width');
$('#lbl-sp').textContent=t('spacing'); $('#lbl-u').textContent=t('unit');
$('#sq-lbl').textContent=t('sqPlants'); $('#tri-lbl').textContent=t('triPlants');
$('#note').textContent=t('note');
$('#toolbar').innerHTML=`
  <button class="gz-btn gz-btn-secondary" onclick="loadEx()">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="clearAll()">${t('clear')}</button>`;
['len','wid','sp','unit'].forEach(id=>$('#'+id).addEventListener('input',calc));

function loadEx(){ $('#len').value=20; $('#wid').value=4; $('#sp').value='0.5'; $('#unit').value='ft'; calc(); }
function clearAll(){ $('#len').value=''; $('#wid').value=''; $('#sp').value=''; calc(); }

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🌱', href:'/calc/plant-watering.html', name:'Plant Watering'},
    {icon:'📐', href:'/calc/area-calculator.html', name:'Area Calculator'},
    {icon:'🌾', href:'/calc/mulch-calculator.html', name:'Mulch Calculator'},
    {icon:'🌻', href:'/calc/sod-calculator.html', name:'Sod Calculator'},
  ]
});

calc();
</script>
