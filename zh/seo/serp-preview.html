<div class="gz-container">

</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Google SERP Preview',
    toolDesc: 'Preview how your page looks in Google search results. Optimize title, URL, and meta description for higher click-through rates.',
    pageTitle: 'Page Title',
    pageUrl: 'Page URL',
    metaDesc: 'Meta Description',
    desktop: 'Desktop Preview',
    mobile: 'Mobile Preview',
    chars: 'chars',
    titleIdeal: 'Ideal: 50-60 chars',
    descIdeal: 'Ideal: 150-160 chars',
    step1: 'Enter your page title (keep it 50-60 characters)',
    step2: 'Enter the page URL as it will appear in search',
    step3: 'Write a compelling meta description (150-160 characters)',
    step4: 'Preview both desktop and mobile results and optimize',
  },
  zh: {
    toolTitle: 'Google 搜索结果预览',
    toolDesc: '预览你的网页在 Google 搜索结果中的显示效果。优化标题、URL 和描述以提高点击率。',
    pageTitle: '页面标题',
    pageUrl: '页面 URL',
    metaDesc: 'Meta 描述',
    desktop: '桌面端预览',
    mobile: '移动端预览',
    chars: '字符',
    titleIdeal: '建议：50-60 字符',
    descIdeal: '建议：150-160 字符',
    step1: '输入页面标题（建议 50-60 个字符）',
    step2: '输入搜索结果中显示的页面 URL',
    step3: '撰写吸引人的 Meta 描述（150-160 字符）',
    step4: '预览桌面端和移动端效果并优化',
  }
});

const { $, t } = GZ;

function charClass(len, idealMin, idealMax) {
  if (len >= idealMin && len <= idealMax) return 'gz-char-ok';
  if (len > idealMax && len <= idealMax + 20) return 'gz-char-warn';
  if (len < idealMin && len >= idealMin - 15) return 'gz-char-warn';
  return 'gz-char-bad';
}

function truncate(str, maxPx, fontSize) {
  // Approximate: average char width ~0.55em at given font-size
  const maxChars = Math.floor(maxPx / (fontSize * 0.55));
  if (str.length <= maxChars) return str;
  return str.substring(0, maxChars - 1) + '…';
}

function updatePreview() {
  const title = $('#inp-title').value || 'Page Title';
  const url = $('#inp-url').value || 'https://example.com/page';
  const desc = $('#inp-desc').value || 'Your meta description will appear here. Write a compelling summary of your page content to encourage clicks from search results.';

  // Update char counters
  const titleLen = $('#inp-title').value.length;
  const descLen = $('#inp-desc').value.length;
  $('#title-count').className = 'gz-char-count ' + charClass(titleLen, 50, 60);
  $('#title-count').textContent = titleLen + ' ' + t('chars') + ' — ' + t('titleIdeal');
  $('#desc-count').className = 'gz-char-count ' + charClass(descLen, 150, 160);
  $('#desc-count').textContent = descLen + ' ' + t('chars') + ' — ' + t('descIdeal');

  // Parse domain + breadcrumb
  let domain = url, breadcrumb = url;
  try {
    const u = new URL(url);
    domain = u.hostname;
    breadcrumb = u.hostname + u.pathname;
  } catch(e) {}

  const letter = (domain.replace('www.','')[0] || 'W').toUpperCase();
  const faviconHtml = '<span class="gz-serp-favicon">' + letter + '</span>';

  // Desktop preview
  const dTitle = truncate(title, 600, 20);
  const dDesc = truncate(desc, 920, 14);
  $('#serp-desktop').innerHTML = `
    <div class="gz-serp-url-block">${faviconHtml}<div><div class="gz-serp-site">${domain}</div><div class="gz-serp-breadcrumb">${breadcrumb}</div></div></div>
    <a class="gz-serp-title">${dTitle}</a>
    <div class="gz-serp-desc">${dDesc}</div>`;

  // Mobile preview
  const mTitle = truncate(title, 480, 18);
  const mDesc = truncate(desc, 720, 13);
  $('#serp-mobile').innerHTML = `
    <div class="gz-serp-url-block">${faviconHtml}<div><div class="gz-serp-site">${domain}</div><div class="gz-serp-breadcrumb">${breadcrumb}</div></div></div>
    <a class="gz-serp-title">${mTitle}</a>
    <div class="gz-serp-desc">${mDesc}</div>`;

  $('#desktop-label').textContent = '🖥️ ' + t('desktop');
  $('#mobile-label').textContent = '📱 ' + t('mobile');
}

$('#controls').innerHTML = `
  <div>
    <div class="gz-label-row"><label>${t('pageTitle')}</label><span id="title-count" class="gz-char-count"></span></div>
    <input id="inp-title" type="text" value="Free Online Tools — GameZipper Tools" maxlength="100">
  </div>
  <div>
    <label>${t('pageUrl')}</label>
    <input id="inp-url" type="url" value="https://tools.gamezipper.com/">
  </div>
  <div>
    <div class="gz-label-row"><label>${t('metaDesc')}</label><span id="desc-count" class="gz-char-count"></span></div>
    <textarea id="inp-desc" rows="3">60+ free online tools for developers, designers, creators, and quick everyday tasks. JSON formatter, Base64, color picker, image tools, and more.</textarea>
  </div>
`;

document.querySelectorAll('#controls input, #controls textarea').forEach(function(el) {
  el.addEventListener('input', updatePreview);
});

updatePreview();

GZ.renderToolPage({
  category: 'seo',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🏷️', href:'/seo/meta-tag-generator.html', name:'Meta Tag Generator'},
    {icon:'📏', href:'/seo/title-meta-length-checker.html', name:'Title & Meta Length'},
    {icon:'🖼️', href:'/seo/open-graph-generator.html', name:'Open Graph Generator'},
    {icon:'🤖', href:'/seo/robots-txt-generator.html', name:'Robots.txt Generator'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
