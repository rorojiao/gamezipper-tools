<body>
<div class="gz-container">

        <label id="lblPhone"></label><input id="bizPhone" value="(555) 123-4567">
        <label id="lblReceipt"></label><input id="receiptNo" value="RCP-001">
        <label id="lblDate"></label><input id="receiptDate" type="date">
        <label id="lblCurrency"></label>
        <select id="currency">
          <option value="$">$ USD</option>
          <option value="€">€ EUR</option>
          <option value="£">£ GBP</option>
          <option value="¥">¥ CNY/JPY</option>
          <option value="₹">₹ INR</option>
        </select>
        <label id="lblTax"></label><input id="taxRate" type="number" value="0" min="0" max="100" step="0.5">
        <label id="lblPay"></label>
        <select id="payMethod">
          <option value="Cash">Cash</option>
          <option value="Credit Card">Credit Card</option>
          <option value="Debit Card">Debit Card</option>
          <option value="Bank Transfer">Bank Transfer</option>
          <option value="Mobile Pay">Mobile Pay</option>
        </select>
        <label id="lblItems"></label>
        <div id="itemsList">
          <div class="item-row"><input class="item-name" value="Item 1"><input class="price" type="number" value="10.00" step="0.01"><button onclick="this.parentElement.remove();updatePreview()">✕</button></div>
          <div class="item-row"><input class="item-name" value="Item 2"><input class="price" type="number" value="25.00" step="0.01"><button onclick="this.parentElement.remove();updatePreview()">✕</button></div>
        </div>
        <button class="gz-btn gz-btn-secondary" onclick="addItem()" id="btnAdd" style="margin-top:8px">+ Item</button>
        <label id="lblFooter" style="margin-top:12px"></label><input id="footerText" value="Thank you for your purchase!">
      </div>

<canvas class="receipt-canvas" id="rcanvas"></canvas>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Receipt Generator',
    toolDesc: 'Create professional receipts online — customize items, prices, taxes and download as PNG. Free, private and instant.',
    bizName: 'Business Name',
    address: 'Address',
    phone: 'Phone',
    receiptNo: 'Receipt #',
    date: 'Date',
    currency: 'Currency',
    taxRate: 'Tax Rate (%)',
    payMethod: 'Payment Method',
    items: 'Items',
    footerText: 'Footer Text',
    addItem: '+ Add Item',
    step1: 'Enter your business name, address and phone',
    step2: 'Add items with names and prices',
    step3: 'Set tax rate and payment method',
    step4: 'Click Download to save the receipt as PNG',
  },
  zh: {
    toolTitle: '收据生成器',
    toolDesc: '在线创建专业收据 — 自定义商品、价格、税费并下载为 PNG。免费、私密、即时生成。',
    bizName: '商家名称',
    address: '地址',
    phone: '电话',
    receiptNo: '收据编号',
    date: '日期',
    currency: '货币',
    taxRate: '税率 (%)',
    payMethod: '支付方式',
    items: '商品列表',
    footerText: '页脚文字',
    addItem: '+ 添加商品',
    step1: '输入商家名称、地址和电话',
    step2: '添加商品名称和价格',
    step3: '设置税率和支付方式',
    step4: '点击下载将收据保存为 PNG',
  }
});

const { $, copyText, t } = GZ;

$('#receiptDate').value = new Date().toISOString().split('T')[0];

$('#lblBiz').textContent = t('bizName');
$('#lblAddr').textContent = t('address');
$('#lblPhone').textContent = t('phone');
$('#lblReceipt').textContent = t('receiptNo');
$('#lblDate').textContent = t('date');
$('#lblCurrency').textContent = t('currency');
$('#lblTax').textContent = t('taxRate');
$('#lblPay').textContent = t('payMethod');
$('#lblItems').textContent = t('items');
$('#btnAdd').textContent = t('addItem');
$('#lblFooter').textContent = t('footerText');

function addItem() {
  const row = document.createElement('div');
  row.className = 'item-row';
  row.innerHTML = `<input class="item-name" value="New Item"><input class="price" type="number" value="0.00" step="0.01"><button onclick="this.parentElement.remove();updatePreview()">✕</button>`;
  $('#itemsList').appendChild(row);
  row.querySelector('.item-name').addEventListener('input', updatePreview);
  row.querySelector('.price').addEventListener('input', updatePreview);
  updatePreview();
}

function updatePreview() {
  const cur = $('#currency').value;
  const tax = parseFloat($('#taxRate').value) || 0;
  const items = [...document.querySelectorAll('.item-row')];
  let rows = '';
  let subtotal = 0;
  items.forEach(row => {
    const name = row.querySelector('.item-name').value || 'Item';
    const price = parseFloat(row.querySelector('.price').value) || 0;
    subtotal += price;
    rows += `<div class="row"><span>${name}</span><span>${cur}${price.toFixed(2)}</span></div>`;
  });
  const taxAmt = subtotal * tax / 100;
  const total = subtotal + taxAmt;
  const receipt = $('#receipt');
  receipt.innerHTML = `
    <h3>${$('#bizName').value}</h3>
    <div class="row"><span>${$('#bizAddr').value}</span></div>
    <div class="row"><span>${$('#bizPhone').value}</span></div>
    <div class="divider"></div>
    <div class="row"><span>${t('receiptNo')}: ${$('#receiptNo').value}</span></div>
    <div class="row"><span>${t('date')}: ${$('#receiptDate').value}</span></div>
    <div class="divider"></div>
    ${rows}
    <div class="divider"></div>
    <div class="row"><span>Subtotal</span><span>${cur}${subtotal.toFixed(2)}</span></div>
    ${tax > 0 ? `<div class="row"><span>Tax (${tax}%)</span><span>${cur}${taxAmt.toFixed(2)}</span></div>` : ''}
    <div class="divider"></div>
    <div class="row total"><span>TOTAL</span><span>${cur}${total.toFixed(2)}</span></div>
    <div class="divider"></div>
    <div class="row"><span>${t('payMethod')}: ${$('#payMethod').value}</span></div>
    <div class="divider"></div>
    <p style="text-align:center;margin:0">${$('#footerText').value}</p>`;
}

function downloadReceipt() {
  const receipt = $('#receipt');
  const rc = $('#rcanvas');
  const dpr = 2;
  rc.width = receipt.offsetWidth * dpr;
  rc.height = receipt.offsetHeight * dpr;
  const ctx = rc.getContext('2d');
  ctx.scale(dpr, dpr);
  // Use html2canvas-like approach with foreignObject
  const data = `<svg xmlns="http://www.w3.org/2000/svg" width="${receipt.offsetWidth}" height="${receipt.offsetHeight}">
    <foreignObject width="100%" height="100%">
      <div xmlns="http://www.w3.org/1999/xhtml" style="font-family:Courier New,monospace;font-size:13px;line-height:1.6;color:#1a1a2e;background:#fff;padding:24px">
        ${receipt.innerHTML.replace(/</g,'<').replace(/>/g,'>')}
      </div>
    </foreignObject>
  </svg>`;
  const img = new Image();
  img.onload = () => {
    ctx.fillStyle = '#fff';
    ctx.fillRect(0, 0, rc.width, rc.height);
    ctx.drawImage(img, 0, 0);
    const a = document.createElement('a');
    a.href = rc.toDataURL('image/png');
    a.download = 'receipt.png';
    a.click();
  };
  img.src = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(data);
}

// Listen for changes
['bizName','bizAddr','bizPhone','receiptNo','receiptDate','currency','taxRate','payMethod','footerText'].forEach(id => {
  const el = document.getElementById(id);
  if (el) el.addEventListener('input', updatePreview);
});
document.querySelectorAll('.item-row input').forEach(el => el.addEventListener('input', updatePreview));

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="downloadReceipt()">${t('download')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="updatePreview()">${t('format')}</button>`;

updatePreview();

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📋', href:'/text/invoice-generator.html', name:'Invoice Generator'},
    {icon:'📝', href:'/text/payslip-generator.html', name:'Payslip Generator'},
    
    {icon:'📄', href:'/convert/pdf-merger.html', name:'PDF Merger'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
