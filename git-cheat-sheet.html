<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is Git?", "acceptedAnswer": {"@type": "Answer", "text": "Git is a distributed version control system that tracks changes in source code during software development. It enables multiple developers to collaborate, maintains a complete history of changes, supports branching and merging, and is the foundation of platforms like GitHub, GitLab and Bitbucket."}}, {"@type": "Question", "name": "What is the difference between git merge and git rebase?", "acceptedAnswer": {"@type": "Answer", "text": "git merge combines branches preserving history (creates a merge commit). git rebase replays your commits on top of another branch, producing a linear history. Use merge for shared branches and rebase for local feature branches before pushing. Never rebase commits that have been pushed and shared."}}, {"@type": "Question", "name": "How do I undo a Git commit?", "acceptedAnswer": {"@type": "Answer", "text": "Use git revert <commit> to create a new commit that undoes the changes (safe for shared history). Use git reset --soft HEAD~1 to undo the last commit but keep changes staged. Use git reset --hard HEAD~1 to completely discard the last commit and its changes (destructive)."}}, {"@type": "Question", "name": "How do I resolve a merge conflict?", "acceptedAnswer": {"@type": "Answer", "text": "After a conflict, open the affected files and look for <<<<<<<, ======= and >>>>>>> markers. Edit the file to keep the desired code, removing the markers. Then run git add <file> followed by git commit (for merge) or git rebase --continue (for rebase). Use git merge --abort to cancel."}}]}</script>

<script>
GZI18n.register({
  en: {
    toolTitle: 'Git Cheat Sheet',
    toolDesc: 'Complete interactive Git command reference covering setup, branching, merging, rebasing, stashing, undoing changes and resolving conflicts. Searchable with copy-paste examples.',
    search: 'Search commands...',
    step1: 'Type in the search box to filter commands',
    step2: 'Click a category tab to focus on a workflow',
    step3: 'Read what each command does',
    step4: 'Click Copy to grab the command for your terminal',
  },
  zh: {
    toolTitle: 'Git 速查表',
    toolDesc: '完整的交互式 Git 命令参考，涵盖配置、分支、合并、变基、暂存、撤销变更和冲突解决。支持搜索和复制命令。',
    search: '搜索命令...',
    step1: '在搜索框输入以筛选命令',
    step2: '点击分类标签聚焦工作流',
    step3: '阅读每条命令的用途',
    step4: '点击复制获取命令到终端使用',
  }
});

const { t } = GZ;

const SECTIONS = [
  {id:'all', label:'All'},
  {id:'setup', label:'Setup'},
  {id:'basic', label:'Basic'},
  {id:'branch', label:'Branching'},
  {id:'merge', label:'Merge/Rebase'},
  {id:'undo', label:'Undo'},
  {id:'remote', label:'Remote'},
  {id:'stash', label:'Stash'},
  {id:'inspect', label:'Inspect'},
];

const COMMANDS = [
  // Setup
  {cmd:'git config', sec:'setup', desc:'Set user name/email globally or per repo.', ex:"git config --global user.name 'Your Name'\ngit config --global user.email 'you@example.com'\ngit config --global core.editor 'code --wait'"},
  {cmd:'git init', sec:'setup', desc:'Create a new Git repository.', ex:'git init\n# or clone an existing one\ngit clone <url>'},
  {cmd:'git clone', sec:'setup', desc:'Copy a remote repository locally.', ex:'git clone https://github.com/user/repo.git\ngit clone --depth 1 <url>   # shallow clone'},
  // Basic
  {cmd:'git status', sec:'basic', desc:'Show working tree status.', ex:'git status\n# short format:\ngit status -s'},
  {cmd:'git add', sec:'basic', desc:'Stage changes for commit.', ex:'git add file.txt\ngit add .              # all changes\ngit add -p             # interactive'},
  {cmd:'git commit', sec:'basic', desc:'Record staged changes.', ex:"git commit -m 'feat: add login page'\ngit commit --amend     # fix last commit"},
  {cmd:'git log', sec:'basic', desc:'Show commit history.', ex:'git log --oneline --graph\ngit log -p             # with diffs\ngit log --author=Bob'},
  {cmd:'git diff', sec:'basic', desc:'Show unstaged changes.', ex:'git diff               # unstaged\ngit diff --staged      # staged\ngit diff HEAD~1        # vs last commit'},
  // Branching
  {cmd:'git branch', sec:'branch', desc:'List/create/delete branches.', ex:'git branch                  # list\ngit branch feature          # create\ngit branch -d feature       # delete\ngit branch -m new-name      # rename current'},
  {cmd:'git checkout / switch', sec:'branch', desc:'Switch branches (switch is newer).', ex:'git switch main\ngit switch -c feature     # create + switch\ngit checkout -b feature   # older syntax'},
  {cmd:'git merge', sec:'branch', desc:'Combine another branch into current.', ex:"git switch main\ngit merge feature"},
  // Merge/Rebase
  {cmd:'git rebase', sec:'merge', desc:'Replay commits on top of another branch.', ex:'git switch feature\ngit rebase main           # linearize\ngit rebase --abort        # cancel'},
  {cmd:'git rebase -i', sec:'merge', desc:'Interactive rebase to squash/reorder.', ex:'git rebase -i HEAD~3\n# squash, reword, drop, fixup commits'},
  {cmd:'git cherry-pick', sec:'merge', desc:'Apply a specific commit.', ex:'git cherry-pick <commit-hash>'},
  {cmd:'Resolve conflict', sec:'merge', desc:'Steps after a merge conflict.', ex:'# edit files, remove <<< >>> markers\ngit add <file>\ngit commit              # or: git rebase --continue\ngit merge --abort       # cancel merge'},
  // Undo
  {cmd:'git revert', sec:'undo', desc:'Undo via new commit (safe, shared history).', ex:'git revert <commit-hash>\ngit revert HEAD          # last commit'},
  {cmd:'git reset', sec:'undo', desc:'Move HEAD pointer (rewrites history).', ex:'git reset --soft HEAD~1   # keep changes staged\ngit reset --mixed HEAD~1  # keep changes unstaged\ngit reset --hard HEAD~1   # discard changes'},
  {cmd:'git restore', sec:'undo', desc:'Discard working changes.', ex:'git restore file.txt       # unstage\ngit restore --staged file  # unstage but keep\ngit restore .              # all files'},
  {cmd:'git clean', sec:'undo', desc:'Remove untracked files.', ex:'git clean -n              # dry run\ngit clean -fd             # force dirs+files'},
  // Remote
  {cmd:'git remote', sec:'remote', desc:'Manage remote repositories.', ex:'git remote -v                       # list\ngit remote add origin <url>          # add\ngit remote set-url origin <new-url>  # change'},
  {cmd:'git fetch', sec:'remote', desc:'Download remote changes without merging.', ex:'git fetch origingit fetch --all'},
  {cmd:'git pull', sec:'remote', desc:'Fetch + merge (fetch + merge combined).', ex:'git pull origin main\ngit pull --rebase         # fetch + rebase'},
  {cmd:'git push', sec:'remote', desc:'Upload local commits to remote.', ex:'git push origin main\ngit push -u origin feature # set upstream\ngit push --force-with-lease # safer force'},
  // Stash
  {cmd:'git stash', sec:'stash', desc:'Temporarily shelve changes.', ex:'git stash                 # stash all\ngit stash -m "wip"        # with message\ngit stash list            # view stashes\ngit stash pop             # apply + drop\ngit stash apply           # apply, keep stash'},
  // Inspect
  {cmd:'git show', sec:'inspect', desc:'Show details of a commit.', ex:'git show <commit-hash>\ngit show HEAD            # last commit'},
  {cmd:'git blame', sec:'inspect', desc:'Show who changed each line.', ex:'git blame file.txt\ngit blame -L 10,20 file.txt'},
  {cmd:'git reflog', sec:'inspect', desc:'Reference log of HEAD moves (recovery).', ex:'git reflog\ngit reset --hard HEAD@{2}  # go back'},
  {cmd:'git tag', sec:'inspect', desc:'Mark releases/versions.', ex:"git tag v1.0.0\ngit tag -a v1.0.0 -m 'Release 1.0'\ngit push origin v1.0.0"},
];

let currentSection = 'all';
let searchQuery = '';

function renderTabs() {
  document.getElementById('tabs').innerHTML = SECTIONS.map(s =>
    `<button class="${s.id === currentSection ? 'active' : ''}" onclick="setSection('${s.id}')">${s.label}</button>`
  ).join('');
}

function setSection(id) {
  currentSection = id;
  renderTabs();
  renderCards();
}

function renderCards() {
  const filtered = COMMANDS.filter(c => {
    const secOk = currentSection === 'all' || c.sec === currentSection;
    const q = searchQuery.toLowerCase();
    const qOk = !q || c.cmd.toLowerCase().includes(q) || c.desc.toLowerCase().includes(q);
    return secOk && qOk;
  });
  if (filtered.length === 0) {
    document.getElementById('card-list').innerHTML = '<p style="text-align:center;color:var(--text2);padding:40px">No commands found</p>';
    return;
  }
  document.getElementById('card-list').innerHTML = filtered.map((c, i) => {
    const escaped = c.ex.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    return `<div class="cmd-card">
      <div class="cmd-name">${c.cmd}</div>
      <div class="cmd-desc">${c.desc}</div>
      <div class="cmd-code"><button class="copy-btn" onclick="copyCmd(this, ${i})">Copy</button><code>${escaped}</code></div>
    </div>`;
  }).join('');
  window._cmdData = filtered;
}

function copyCmd(btn, i) {
  const cmd = window._cmdData[i].ex;
  navigator.clipboard.writeText(cmd).then(() => {
    btn.textContent = '✓';
    setTimeout(() => btn.textContent = 'Copy', 1500);
  });
}

document.getElementById('search').addEventListener('input', e => {
  searchQuery = e.target.value;
  renderCards();
});
document.getElementById('search').placeholder = t('search');

renderTabs();
renderCards();

GZ.renderToolPage({
  category: 'dev',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📄', href:'/html-cheat-sheet.html', name:'HTML Cheat Sheet'},
    {icon:'🎨', href:'/css-cheat-sheet.html', name:'CSS Cheat Sheet'},
    {icon:'⚡', href:'/javascript-cheat-sheet.html', name:'JS Cheat Sheet'},
    {icon:'🔮', href:'/dev/regex-cheatsheet.html', name:'Regex Cheat Sheet'},
  ]
});
</script>
