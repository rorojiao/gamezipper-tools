<style>
.warning-box{background:rgba(255,193,7,.15);border:1px solid #ffc107;border-radius:12px;padding:14px;margin-bottom:20px;font-size:.85rem;color:#ffc107;display:flex;gap:10px;align-items:flex-start}
.warning-box .icon{font-size:1.2rem}
.test-container{background:var(--glass);border:1px solid var(--border);border-radius:16px;padding:28px;max-width:600px;margin:0 auto}
.freq-display{text-align:center;margin-bottom:24px}
.freq-display .freq{font-size:3rem;font-weight:900;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.freq-display .label{color:var(--text2);font-size:.9rem;margin-top:4px}
.controls-center{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-bottom:24px}
.big-btn{padding:14px 32px;font-size:1rem;font-weight:700;border:none;border-radius:50px;cursor:pointer;transition:transform .2s}
.big-btn:hover{transform:scale(1.03)}
.btn-play{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff}
.btn-secondary{background:var(--glass2);border:1px solid var(--border);color:var(--text)}
.freq-table{width:100%;border-collapse:collapse;margin-top:20px}
.freq-table th,.freq-table td{padding:8px 12px;text-align:center;border-bottom:1px solid var(--border);font-size:.85rem}
.freq-table th{color:var(--text2);font-weight:600}
.freq-table .status-yes{color:var(--success,#00d672);font-weight:700}
.freq-table .status-no{color:#e94560}
.slider-container{margin:20px 0}
.slider-container label{display:block;text-align:center;font-size:.85rem;color:var(--text2);margin-bottom:8px}
.slider-container input[type=range]{width:100%;accent-color:var(--accent)}
.result-box{background:linear-gradient(135deg,#1a1a2e,#16213e);border-radius:16px;padding:24px;text-align:center;margin-top:20px}
.result-box .age{font-size:2.5rem;font-weight:900;color:var(--accent)}
.result-box .desc{color:#ccc;font-size:.9rem;margin-top:4px}
</style>
<script type="application/ld+json">{"@context":"https://schema.org","@type":"WebApplication","name":"Online Hearing Test","description":"Free online hearing test. Test your hearing frequency range from 20Hz to 20,000Hz. Find your hearing age and check for hearing loss. Runs in your browser with headphones.","url":"https://tools.gamezipper.com/fun/hearing-test.html","applicationCategory":"HealthApplication","operatingSystem":"Web Browser","offers":{"@type":"Offer","price":"0"}}</script>
<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "How accurate is an online hearing test?", "acceptedAnswer": {"@type": "Answer", "text": "Online hearing tests give a general indication of your hearing frequency range but are not a medical diagnosis. Results vary based on your headphones, ambient noise, and browser audio implementation. For clinical accuracy, consult an audiologist."}}, {"@type": "Question", "name": "What frequency can a normal human hear?", "acceptedAnswer": {"@type": "Answer", "text": "The human hearing range is typically 20 Hz to 20,000 Hz (20 kHz). However, this range narrows with age. Most adults over 25 cannot hear above 15-16 kHz, and by age 50 the upper limit often drops to 12 kHz or lower."}}, {"@type": "Question", "name": "What is the mosquito tone (17kHz)?", "acceptedAnswer": {"@type": "Answer", "text": "The 17 kHz mosquito tone is a high-frequency sound that most people under 25 can hear but most adults cannot. It is sometimes used in youth deterrent devices. If you can hear it, your high-frequency hearing is excellent."}}, {"@type": "Question", "name": "Why can't I hear high frequencies anymore?", "acceptedAnswer": {"@type": "Answer", "text": "Losing high-frequency hearing is a natural part of aging called presbycusis. Loud noise exposure, genetics, and certain medications can accelerate it. Protect your hearing by limiting loud volume and wearing ear protection in noisy environments."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="warning-box">
      <span class="icon">⚠️</span>
      <span id="warning-text"></span>
    </div>
    <div class="test-container">
      <div class="freq-display">
        <div class="freq" id="current-freq">8000 Hz</div>
        <div class="label" id="freq-label"></div>
      </div>
      <div class="slider-container">
        <label id="slider-label"></label>
        <input type="range" id="freq-slider" min="20" max="20000" value="8000" step="10">
      </div>
      <div class="controls-center">
        <button class="big-btn btn-play" id="play-btn" onclick="togglePlay()">▶ <span id="play-text"></span></button>
        <button class="big-btn btn-secondary" id="hear-yes" onclick="markResult(true)">✓ <span id="hear-yes-text"></span></button>
        <button class="big-btn btn-secondary" id="hear-no" onclick="markResult(false)">✗ <span id="hear-no-text"></span></button>
      </div>
      <div class="slider-container">
        <label id="vol-label"></label>
        <input type="range" id="vol-slider" min="0" max="100" value="30">
      </div>
      <table class="freq-table" id="result-table">
        <thead>
          <tr><th id="th-freq"></th><th id="th-status"></th></tr>
        </thead>
        <tbody id="result-body"></tbody>
      </table>
      <div class="result-box" id="final-result" style="display:none">
        <div class="age" id="hearing-age"></div>
        <div class="desc" id="hearing-desc"></div>
      </div>
    </div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Online Hearing Test 👂',
    toolDesc: 'Test your hearing frequency range from 20Hz to 20,000Hz. Use headphones in a quiet room to find your hearing age and check for high-frequency hearing loss.',
    warning: 'Use headphones in a quiet room. Start with LOW volume to protect your hearing. This is not a medical diagnosis — consult an audiologist for clinical testing.',
    freqLabel: 'Current Test Frequency',
    sliderLabel: 'Frequency (Hz)',
    volLabel: 'Volume (start low!)',
    play: 'Play Tone',
    stop: 'Stop',
    hearYes: 'I Can Hear',
    hearNo: 'Cannot Hear',
    thFreq: 'Frequency',
    thStatus: 'Status',
    step1: 'Put on headphones and sit in a quiet room',
    step2: 'Set volume low, then click Play Tone to test the current frequency',
    step3: 'Mark "Can Hear" or "Cannot Hear" and try different frequencies using the slider',
    step4: 'The highest frequency you can hear indicates your hearing age',
  },
  zh: {
    toolTitle: '在线听力测试 👂',
    toolDesc: '测试你的听力频率范围，从 20Hz 到 20,000Hz。在安静环境中佩戴耳机，找出你的听力年龄，检测高频听力损失。',
    warning: '请在安静的房间中佩戴耳机使用。从低音量开始以保护听力。本工具非医学诊断 — 如需专业检测请咨询听力学家。',
    freqLabel: '当前测试频率',
    sliderLabel: '频率（Hz）',
    volLabel: '音量（请从低开始！）',
    play: '播放音频',
    stop: '停止',
    hearYes: '能听到',
    hearNo: '听不到',
    thFreq: '频率',
    thStatus: '状态',
    step1: '戴上耳机，坐在安静的房间里',
    step2: '先调低音量，然后点击「播放音频」测试当前频率',
    step3: '标记「能听到」或「听不到」，用滑块尝试不同频率',
    step4: '你能听到的最高频率指示了你的听力年龄',
  }
});

const { $, t } = GZ;

let audioCtx = null;
let oscillator = null;
let gainNode = null;
let isPlaying = false;
let testResults = []; // {freq, heard}

// Hearing age estimates based on max frequency heard
const HEARING_AGE = [
  { freq: 20000, age: '< 20', desc: 'Excellent hearing — typical of young people' },
  { freq: 17000, age: '20-25', desc: 'Very good high-frequency hearing' },
  { freq: 15000, age: '25-30', desc: 'Good hearing, slight high-freq reduction' },
  { freq: 12000, age: '30-40', desc: 'Average adult hearing' },
  { freq: 10000, age: '40-50', desc: 'Mild high-frequency hearing reduction' },
  { freq: 8000,  age: '50-60', desc: 'Moderate high-frequency reduction — common for this age' },
  { freq: 6000,  age: '60+',  desc: 'Significant high-frequency reduction. Consider seeing an audiologist.' },
  { freq: 4000,  age: '60+',  desc: 'Notable hearing loss detected. Please consult an audiologist.' },
];

function togglePlay() {
  if (isPlaying) {
    stopTone();
  } else {
    playTone();
  }
}

function playTone() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();

  oscillator = audioCtx.createOscillator();
  gainNode = audioCtx.createGain();

  const freq = parseInt($('#freq-slider').value);
  oscillator.type = 'sine';
  oscillator.frequency.value = freq;

  const vol = ($('#vol-slider').value / 100) * 0.3;
  gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
  gainNode.gain.linearRampToValueAtTime(vol, audioCtx.currentTime + 0.1);

  oscillator.connect(gainNode);
  gainNode.connect(audioCtx.destination);
  oscillator.start();
  isPlaying = true;
  $('#play-btn').innerHTML = '⏸ <span>' + t('stop') + '</span>';
}

function stopTone() {
  if (oscillator) {
    gainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.05);
    try { oscillator.stop(audioCtx.currentTime + 0.1); } catch(e){}
    oscillator = null;
  }
  isPlaying = false;
  $('#play-btn').innerHTML = '▶ <span>' + t('play') + '</span>';
}

function markResult(heard) {
  const freq = parseInt($('#freq-slider').value);
  // Remove existing entry for this frequency
  testResults = testResults.filter(r => r.freq !== freq);
  testResults.push({ freq, heard });
  testResults.sort((a, b) => b.freq - a.freq);
  updateTable();
  updateFinalResult();
}

function updateTable() {
  const body = $('#result-body');
  body.innerHTML = testResults.map(r => `
    <tr>
      <td>${r.freq.toLocaleString()} Hz</td>
      <td class="${r.heard ? 'status-yes' : 'status-no'}">${r.heard ? '✓ ' + (GZI18n.getLang() === 'zh' ? '能听到' : 'Heard') : '✗ ' + (GZI18n.getLang() === 'zh' ? '听不到' : 'Not heard')}</td>
    </tr>
  `).join('');
}

function updateFinalResult() {
  // Find highest frequency the user can hear
  const heardFreqs = testResults.filter(r => r.heard).map(r => r.freq);
  if (heardFreqs.length === 0) {
    $('#final-result').style.display = 'none';
    return;
  }
  const maxFreq = Math.max(...heardFreqs);
  const match = HEARING_AGE.find(h => maxFreq >= h.freq) || HEARING_AGE[HEARING_AGE.length - 1];

  $('#final-result').style.display = '';
  $('#hearing-age').textContent = GZI18n.getLang() === 'zh' ? '听力年龄：' + match.age : 'Hearing Age: ' + match.age;
  $('#hearing-desc').textContent = match.desc;
}

$('#freq-slider').addEventListener('input', function() {
  const freq = parseInt(this.value);
  $('#current-freq').textContent = freq.toLocaleString() + ' Hz';
  if (isPlaying && oscillator) {
    oscillator.frequency.setValueAtTime(freq, audioCtx.currentTime);
  }
});

$('#vol-slider').addEventListener('input', function() {
  if (isPlaying && gainNode) {
    gainNode.gain.linearRampToValueAtTime((this.value / 100) * 0.3, audioCtx.currentTime + 0.05);
  }
});

// Initialize labels
$('#warning-text').textContent = t('warning');
$('#freq-label').textContent = t('freqLabel');
$('#slider-label').textContent = t('sliderLabel');
$('#vol-label').textContent = t('volLabel');
$('#play-text').textContent = t('play');
$('#hear-yes-text').textContent = t('hearYes');
$('#hear-no-text').textContent = t('hearNo');
$('#th-freq').textContent = t('thFreq');
$('#th-status').textContent = t('thStatus');

GZ.renderToolPage({
  category: 'fun',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🎵', href:'/dev/audio-tuner.html', name:'Audio Tuner'},
    {icon:'🔊', href:'/dev/decibel-meter.html', name:'Decibel Meter'},
    {icon:'🎼', href:'/fun/guitar-tuner.html', name:'Guitar Tuner'},
    {icon:'📊', href:'/dev/spectrogram.html', name:'Spectrogram'},
  ]
});
</script>
<script src="/tools-result-rec.js?v=20260707v520" defer></script>
</body>
</html>
