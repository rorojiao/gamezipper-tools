<script>
GZI18n.register({
  en: {
    toolTitle: 'JSON to ENV Converter',
    toolDesc: 'Convert JSON to .env / dotenv format. Flattens nested objects, quotes values with special chars, and handles all types — 100% browser-based.',
    convert: 'Convert',
    quoteAll: 'Quote all values',
    upperKeys: 'Uppercase keys',
    exportPrefix: 'export prefix',
    step1: 'Paste your JSON into the input area',
    step2: 'Toggle options: quote all values, uppercase keys, or export prefix',
    step3: 'Click Convert to generate the .env format',
    step4: 'Click Download to save as .env file',
  },
  zh: {
    toolTitle: 'JSON 转 ENV 转换器',
    toolDesc: '将 JSON 转换为 .env / dotenv 格式。自动展平嵌套对象、引用特殊字符的值，处理所有类型 — 100% 浏览器本地运行。',
    convert: '转换',
    quoteAll: '所有值加引号',
    upperKeys: '键名大写',
    exportPrefix: 'export 前缀',
    step1: '在输入区粘贴您的 JSON',
    step2: '勾选选项：所有值加引号、键名大写、或添加 export 前缀',
    step3: '点击「转换」生成 .env 格式',
    step4: '点击「下载」保存为 .env 文件',
  }
});

const { $, copyText, t } = GZ;
let quoteAll = false, upperKeys = true, useExport = false;

function flatten(obj, prefix, out) {
  for (const key in obj) {
    if (!Object.prototype.hasOwnProperty.call(obj, key)) continue;
    const val = obj[key];
    const newKey = prefix ? prefix + '_' + key : key;
    if (val !== null && typeof val === 'object' && !Array.isArray(val)) {
      flatten(val, newKey, out);
    } else if (Array.isArray(val)) {
      out[newKey] = JSON.stringify(val);
    } else {
      out[newKey] = val;
    }
  }
  return out;
}

function formatEnvLine(key, val) {
  let k = String(key).replace(/[^A-Za-z0-9_]/g, '_');
  if (upperKeys) k = k.toUpperCase();
  const prefix = useExport ? 'export ' : '';
  const needsQuote = quoteAll || /[\s#"'=]|^$/.test(String(val));
  let v;
  if (val === null || val === undefined) {
    v = '';
    return prefix + k + '=' + (quoteAll ? '""' : '');
  } else if (typeof val === 'boolean') {
    v = val ? 'true' : 'false';
  } else if (typeof val === 'number') {
    v = String(val);
  } else {
    v = String(val);
  }
  if (needsQuote) {
    v = '"' + v.replace(/\\/g, '\\\\').replace(/"/g, '\\"').replace(/\n/g, '\\n') + '"';
  }
  return prefix + k + '=' + v;
}

function doConvert() {
  const inp = $('#input').value.trim();
  if (!inp) { $('#output').textContent = ''; $('#status').innerHTML = ''; return; }
  try {
    const obj = JSON.parse(inp);
    const flat = flatten(obj, '', {});
    const lines = Object.keys(flat).sort().map(k => formatEnvLine(k, flat[k]));
    $('#output').textContent = lines.join('\n');
    $('#status').innerHTML = `<span style="color:var(--gz-success)">✓ ${lines.length} env variables generated</span>`;
  } catch(e) {
    $('#output').innerHTML = `<span style="color:var(--gz-accent)">${e.message}</span>`;
    $('#status').innerHTML = `<span style="color:var(--gz-accent)">✗ Invalid JSON</span>`;
  }
}

function doDownload() {
  const text = $('#output').textContent;
  if (!text) return;
  const blob = new Blob([text], {type: 'text/plain'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = '.env';
  a.click();
  URL.revokeObjectURL(a.href);
}

function loadExample() {
  $('#input').value = JSON.stringify({
    "app": { "name": "MyApp", "port": 3000, "debug": true },
    "database": { "host": "localhost", "port": 5432, "name": "mydb", "user": "admin", "ssl": false },
    "redis": { "url": "redis://localhost:6379", "ttl": "3600" },
    "features": ["auth", "logging"],
    "secret": "p@ss#word with spaces"
  }, null, 2);
  doConvert();
}

function doClear() { $('#input').value = ''; $('#output').textContent = ''; $('#status').innerHTML = ''; }

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="doConvert()">${t('convert')}</button>
  <label class="gz-check"><input type="checkbox" id="opt-upper" ${upperKeys?'checked':''} onchange="upperKeys=this.checked;doConvert()"> ${t('upperKeys')}</label>
  <label class="gz-check"><input type="checkbox" id="opt-quote" ${quoteAll?'checked':''} onchange="quoteAll=this.checked;doConvert()"> ${t('quoteAll')}</label>
  <label class="gz-check"><input type="checkbox" id="opt-export" ${useExport?'checked':''} onchange="useExport=this.checked;doConvert()"> ${t('exportPrefix')}</label>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doDownload()">⬇ .env</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;
