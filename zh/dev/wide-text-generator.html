<script>

  zh: {

    toolDesc: '将文字转换为全角、蒸汽波和等宽等宽体 Unicode 样式，适用于社交媒体帖子和创意项目。',
    inputLabel: '输入文字',
    outputLabel: '宽体文字样式',
    fullwidth: '全角',
    vaporwave: '蒸汽波间隔',
    monoSpaced: '等宽体',
    boldFullwidth: '粗体全角',
    generate: '生成',
    copy: '复制',
    clear: '清空',
    example: '示例',
    step1: '在输入框中输入或粘贴文字',
    step2: '点击「生成」创建宽体文字样式',
    step3: '从结果中选择你喜欢的样式',
    step4: '点击「复制」将文本复制到剪贴板',
  }
});

const {$, copyText, t} = GZ;

function toFullwidth(text) {
  return [...text].map(ch => {
    const code = ch.charCodeAt(0);
    if (code === 32) return '\u3000';
    if (code >= 33 && code <= 126) return String.fromCharCode(code + 65248);
    return ch;
  }).join('');
}

function toVaporwave(text) {
  return [...text].map(ch => {
    const code = ch.charCodeAt(0);
    if (code === 32) return ' ';
    if (code >= 33 && code <= 126) return String.fromCharCode(code + 65248);
    return ch;
  }).join(' ');
}

function toMonospaced(text) {
  const map = {
    'a':'𝚊','b':'𝚋','c':'𝚌','d':'𝚍','e':'𝚎','f':'𝚏','g':'𝚐','h':'𝚑','i':'𝚒','j':'𝚓',
    'k':'𝚔','l':'𝚕','m':'𝚖','n':'𝚗','o':'𝚘','p':'𝚙','q':'𝚚','r':'𝚛','s':'𝚜','t':'𝚝',
    'u':'𝚞','v':'𝚟','w':'𝚠','x':'𝚡','y':'𝚢','z':'𝚣',
    'A':'𝙰','B':'𝙱','C':'𝙲','D':'𝙳','E':'𝙴','F':'𝙵','G':'𝙶','H':'𝙷','I':'𝙸','J':'𝙹',
    'K':'𝙺','L':'𝙻','M':'𝙼','N':'𝙽','O':'𝙾','P':'𝙿','Q':'𝚀','R':'𝚁','S':'𝚂','T':'𝚃',
    'U':'𝚄','V':'𝚅','W':'𝚆','X':'𝚇','Y':'𝚈','Z':'𝚉',
    '0':'𝟶','1':'𝟷','2':'𝟸','3':'𝟹','4':'𝟺','5':'𝟻','6':'𝟼','7':'𝟽','8':'𝟾','9':'𝟿'
  };
  return [...text].map(ch => map[ch] || ch).join('');
}

function toBoldFullwidth(text) {
  return [...text].map(ch => {
    const code = ch.charCodeAt(0);
    if (code === 32) return '\u3000';
    if (code >= 33 && code <= 126) return String.fromCharCode(code + 65248);
    return ch;
  }).join('').split('').join(' ');
}

function doGenerate() {
  const text = $('#input').value;
  if (!text.trim()) { $('#output').innerHTML = ''; return; }
  const styles = [
    {label: t('fullwidth'), fn: toFullwidth},
    {label: t('vaporwave'), fn: toVaporwave},
    {label: t('monoSpaced'), fn: toMonospaced},
    {label: t('boldFullwidth'), fn: toBoldFullwidth},
  ];
  $('#output').innerHTML = styles.map(s => {
    const result = s.fn(text);
    return `<div class="style-box">
      <span class="style-label">${s.label}</span>
      <span class="style-result">${result.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</span>
      <button class="gz-btn" onclick="copyText(this.parentElement.querySelector('.style-result').textContent)">${t('copy')}</button>
    </div>`;
  }).join('');
}

function doClear() { $('#input').value = ''; $('#output').innerHTML = ''; }

function loadExample() {
  $('#input').value = 'Aesthetic Vaporwave';
  doGenerate();
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="doGenerate()">${t('generate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

$('#input').addEventListener('input', doGenerate);

});
