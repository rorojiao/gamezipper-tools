<script>
GZI18n.register({
  en: {
    toolTitle: 'CSV Viewer & Table',
    toolDesc: 'Paste CSV data and view it as a formatted, sortable, searchable table — no upload needed.',
    step1: 'Paste your CSV data into the input area',
    step2: 'Select the delimiter (auto, comma, semicolon, tab)',
    step3: 'Click View Table to render the data',
    step4: 'Click column headers to sort, or use search to filter rows',
    rows: 'rows',
    cols: 'columns',
    search: 'Search rows...',
  },
  zh: {
    toolTitle: 'CSV 表格查看器',
    toolDesc: '粘贴 CSV 数据，即时渲染为可排序、可搜索的表格 — 无需上传。',
    step1: '在输入区粘贴 CSV 数据',
    step2: '选择分隔符（自动、逗号、分号、制表符）',
    step3: '点击「查看表格」渲染数据',
    step4: '点击列标题排序，或使用搜索过滤行',
    rows: '行',
    cols: '列',
    search: '搜索行...',
  }
});

const { $, copyText, t } = GZ;
let parsedRows = [], headers = [], sortCol = -1, sortAsc = true;

function parseCSV(text, delim) {
  const rows = [];
  let row = [], field = '', inQuotes = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    if (inQuotes) {
      if (c === '"') { if (text[i+1] === '"') { field += '"'; i++; } else inQuotes = false; }
      else field += c;
    } else {
      if (c === '"') inQuotes = true;
      else if (c === delim) { row.push(field.trim()); field = ''; }
      else if (c === '\n' || (c === '\r' && text[i+1] === '\n')) { if (c === '\r') i++; row.push(field.trim()); if (row.some(f=>f)) rows.push(row); row = []; field = ''; }
      else field += c;
    }
  }
  row.push(field.trim());
  if (row.some(f=>f)) rows.push(row);
  return rows;
}

function detectDelim(text) {
  const first = text.split('\n')[0] || '';
  const counts = {',':0,';':0,'\t':0};
  for (const c of first) if (c in counts) counts[c]++;
  return Object.entries(counts).sort((a,b)=>b[1]-a[1])[0][0];
}

function renderTable() {
  const text = $('#input').value.trim();
  if (!text) { $('#csv-table').innerHTML=''; $('#table-info').textContent=''; $('#search-box').style.display='none'; return; }
  const delim = $('#delim').value === 'auto' ? detectDelim(text) : $('#delim').value;
  const allRows = parseCSV(text, delim);
  if (allRows.length === 0) return;
  headers = allRows[0];
  parsedRows = allRows.slice(1);
  sortCol = -1;
  applyFilter();
  $('#search-box').style.display = 'block';
}

function applyFilter() {
  const q = ($('#search-box').value || '').toLowerCase();
  let filtered = parsedRows;
  if (q) filtered = parsedRows.filter(row => row.some(cell => cell.toLowerCase().includes(q)));

  let sorted = [...filtered];
  if (sortCol >= 0) {
    sorted.sort((a, b) => {
      const va = (a[sortCol] || '').toLowerCase();
      const vb = (b[sortCol] || '').toLowerCase();
      const na = parseFloat(va), nb = parseFloat(vb);
      if (!isNaN(na) && !isNaN(nb)) return sortAsc ? na - nb : nb - na;
      return sortAsc ? va.localeCompare(vb) : vb.localeCompare(va);
    });
  }

  let html = '<thead><tr>';
  headers.forEach((h, i) => {
    const arrow = sortCol === i ? (sortAsc ? ' ▲' : ' ▼') : '';
    html += `<th onclick="doSort(${i})">${escHtml(h)}<span class="sort-arrow">${arrow}</span></th>`;
  });
  html += '</tr></thead><tbody>';
  sorted.forEach(row => {
    html += '<tr>';
    for (let i = 0; i < headers.length; i++) html += `<td title="${escHtml(row[i]||'')}">${escHtml(row[i]||'')}</td>`;
    html += '</tr>';
  });
  html += '</tbody>';
  $('#csv-table').innerHTML = html;
  $('#table-info').textContent = `${sorted.length} ${t('rows')} × ${headers.length} ${t('cols')}`;
}

function doSort(col) {
  if (sortCol === col) sortAsc = !sortAsc;
  else { sortCol = col; sortAsc = true; }
  applyFilter();
}

function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function loadExample() {
  $('#input').value = 'Name,Role,Email,Score\nAlice Johnson,Developer,alice@example.com,95\nBob Smith,Designer,bob@example.com,88\nCarol White,Manager,carol@example.com,92\nDave Brown,Developer,dave@example.com,78\nEve Davis,QA Lead,eve@example.com,91';
  renderTable();
}

function doClear() { $('#input').value=''; $('#csv-table').innerHTML=''; $('#table-info').textContent=''; $('#search-box').style.display='none'; $('#search-box').value=''; }

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="renderTable()">${t('view')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>
  <select class="gz-select" id="delim" onchange="renderTable()">
    <option value="auto">Auto-detect</option>
    <option value=",">Comma (,)</option>
    <option value=";">Semicolon (;)</option>
    <option value="\t">Tab</option>
  </select>`;

$('#search-box').placeholder = t('search');
$('#search-box').addEventListener('input', applyFilter);

    {icon:'📋', href:'/dev/json.html', name:'JSON Formatter'},
    {icon:'📄', href:'/convert/yaml-json.html', name:'YAML ↔ JSON'},
  ]
});
</script>
