.fmt-btn.active,.fmt-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent)}

<script type="application/ld+json">{"@context":"https://schema.org","@type":"WebApplication","name":"Image Format Converter","description":"Convert images between PNG, JPG, WebP and GIF formats online. Free image format converter — batch convert images in your browser.","url":"https://tools.gamezipper.com/image/converter.html","applicationCategory":"Utility","operatingSystem":"Web Browser","offers":{"@type":"Offer","price":"0"}}</script>

<link rel="alternate" hreflang="en" href="https://tools.gamezipper.com/image/converter.html">
<link rel="alternate" hreflang="zh" href="https://tools.gamezipper.com/zh/image/converter.html">
<link rel="alternate" hreflang="x-default" href="https://tools.gamezipper.com/image/converter.html">

<body>
<div class="gz-container">
  <div class="gz-tool-header"><h1 id="title"></h1><p class="desc" id="desc"></p></div>
  <div class="gz-tool-area">
    <div class="gz-dropzone" id="dropzone" onclick="document.getElementById('fileIn').click()">
      <span class="icon">🔄</span>
      <p id="dropText"></p>
      <input type="file" id="fileIn" accept="image/*" hidden>
    </div>
    <div id="controls" style="display:none">
      <p style="text-align:center;color:var(--text2);font-size:.85rem;margin-bottom:.5rem" id="convertTo"></p>
      <div class="format-btns" id="fmtBtns"></div>
      <div class="info-row" id="info"></div>
      <div class="preview-area"><img id="preview"></div>
      <div style="text-align:center;margin:1rem 0">
        <button class="gz-btn" onclick="doConvert()">🔄 Convert & Download</button>
      </div>
    </div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en:{toolTitle:'Image Format Converter',toolDesc:'Convert images between PNG, JPG, and WebP formats instantly.',
    s1:'Drop an image or click to upload',s2:'Select the target format',
    s3:'Preview the converted image',s4:'Click Convert & Download to save',
    dropHint:'Drop image here or click to upload',convertTo:'Convert to:',
    original:'Original:',converted:'Converted:',
    rCompressor:'Image Compressor',rResizer:'Image Resizer',rCropper:'Image Cropper',rSvgPng:'SVG to PNG'},
  zh:{toolTitle:'图片格式Convert',toolDesc:'即时Convert PNG、JPG、WebP 格式。',
    s1:'拖放图片或点击上传',s2:'Select target format',
    s3:'预览Convert结果',s4:'点击Convert并Download',
    dropHint:'拖放图片到此处或点击上传',convertTo:'Convert为：',
    original:'原始：',converted:'Convert后：',
    rCompressor:'图片压缩',rResizer:'图片缩放',rCropper:'图片裁剪',rSvgPng:'SVG 转 PNG'}
});

const {t}=GZI18n;
let origFile=null,origImg=null,targetFmt='image/png';
const formats=[{label:'PNG',mime:'image/png',ext:'png'},{label:'JPG',mime:'image/jpeg',ext:'jpg'},{label:'WebP',mime:'image/webp',ext:'webp'}];

document.getElementById('dropText').textContent=t('dropHint');
const dz=document.getElementById('dropzone'),fi=document.getElementById('fileIn');
dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('drag-over')});
dz.addEventListener('dragleave',()=>dz.classList.remove('drag-over'));
dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('drag-over');if(e.dataTransfer.files[0])loadFile(e.dataTransfer.files[0])});
fi.addEventListener('change',e=>{if(e.target.files[0])loadFile(e.target.files[0])});

function loadFile(f){
  origFile=f;
  const img=new Image();
  img.onload=()=>{
    origImg=img;
    document.getElementById('preview').src=img.src;
    document.getElementById('controls').style.display='block';
    dz.style.display='none';
    document.getElementById('convertTo').textContent=t('convertTo');
    document.getElementById('fmtBtns').innerHTML=formats.map(f=>
      `<button class="fmt-btn${f.mime===targetFmt?' active':''}" onclick="setFmt('${f.mime}',this)">${f.label}</button>`
    ).join('');
    updateInfo();
  };
  img.src=URL.createObjectURL(f);
}

function setFmt(mime,btn){
  targetFmt=mime;
  document.querySelectorAll('.fmt-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  updateInfo();
}

function fmt(b){return b>1048576?(b/1048576).toFixed(1)+' MB':(b/1024).toFixed(1)+' KB'}

function updateInfo(){
  if(!origImg)return;
  const c=document.createElement('canvas');c.width=origImg.width;c.height=origImg.height;
  c.getContext('2d').drawImage(origImg,0,0);
  c.toBlob(b=>{
    document.getElementById('info').innerHTML=`
      <span>${t('original')} <span class="num">${fmt(origFile.size)} (${origFile.type.split('/')[1]||'?'})</span></span>
      <span>${t('converted')} <span class="num">${fmt(b.size)} (${targetFmt.split('/')[1]})</span></span>`;
  },targetFmt,0.92);
}

function doConvert(){
  if(!origImg)return;
  const c=document.createElement('canvas');c.width=origImg.width;c.height=origImg.height;
  c.getContext('2d').drawImage(origImg,0,0);
  const ext=formats.find(f=>f.mime===targetFmt).ext;
  c.toBlob(b=>{const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='converted.'+ext;a.click()},targetFmt,0.92);
}

GZ.renderToolPage({category:'image',titleKey:'toolTitle',descKey:'toolDesc',
  howToSteps:['s1','s2','s3','s4'],
  related:[
    {href:'/image/compressor.html',icon:'📦',nameKey:'rCompressor'},
    {href:'/image/resizer.html',icon:'📐',nameKey:'rResizer'},
    {href:'/image/cropper.html',icon:'✂️',nameKey:'rCropper'},
    {href:'/image/svg-to-png.html',icon:'🖼️',nameKey:'rSvgPng'}
  ]
});
</script>

</html>
