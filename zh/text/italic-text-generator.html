    toolDesc: '将普通文字转换为 𝑖𝑡𝑎𝑙𝑖𝑐 斜体、𝒊𝒕𝒂𝒍𝒊𝒄 粗斜体、无衬线斜体和无衬线粗斜体等 Unicode 样式。复制粘贴到 Instagram、Twitter、Discord 和抖音 — 纯文字，随处可用。',

    italic: '斜体',
    boldItalic: '粗斜体',
    sansItalic: '无衬线斜体',
    sansBoldItalic: '无衬线粗斜体',
    step1: '输入或粘贴需要变斜体的文字',
    step2: '选择样式：斜体、粗斜体、无衬线斜体或无衬线粗斜体',
    step3: '点击复制，粘贴到文案、简介或评论中',
  }
});

const { $, copyText, t } = GZ;

// Unicode Mathematical Alphanumeric Symbols — italic families.
// Italic lowercase h lives at U+210E (Planck constant), not in the math block.
const STYLES = {
  italic:          { upper: 0x1D434, lower: 0x1D44E, digit: null, lowerExc: { 0x68: 0x210E } },
  boldItalic:      { upper: 0x1D468, lower: 0x1D482, digit: null },
  sansItalic:      { upper: 0x1D608, lower: 0x1D622, digit: null },
  sansBoldItalic:  { upper: 0x1D63C, lower: 0x1D656, digit: null },
};

function stylize(text, key) {
  const s = STYLES[key];
  if (!s) return text;
  let out = '';
  for (const ch of text) {
    const code = ch.codePointAt(0);
    if (code >= 0x41 && code <= 0x5A) {
      out += String.fromCodePoint(code - 0x41 + s.upper);
    } else if (code >= 0x61 && code <= 0x7A) {
      if (s.lowerExc && s.lowerExc[code]) out += String.fromCodePoint(s.lowerExc[code]);
      else out += String.fromCodePoint(code - 0x61 + s.lower);
    } else {
      out += ch;
    }
  }
  return out;
}

let currentStyle = 'italic';

function processText() {
  const text = $('#input').value;
  if (!text) { $('#output').textContent = ''; return; }
  $('#output').textContent = stylize(text, currentStyle);
}

$('#input').addEventListener('input', processText);

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="setStyle('italic',this)">${t('italic')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="setStyle('boldItalic',this)">${t('boldItalic')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="setStyle('sansItalic',this)">${t('sansItalic')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="setStyle('sansBoldItalic',this)">${t('sansBoldItalic')}</button>
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#input').value='';$('#output').textContent=''">${t('clear')}</button>`;

function setStyle(key, btn) {
  currentStyle = key;
  processText();
  btn.parentElement.querySelectorAll('.gz-btn').forEach(b => {
    b.classList.remove('gz-btn-active');
    b.classList.add('gz-btn-secondary');
  });
  btn.classList.add('gz-btn-active');
  btn.classList.remove('gz-btn-secondary');
}

$('#input').value = 'Italic Text Generator';
processText();

GZ.renderToolPage({

});
