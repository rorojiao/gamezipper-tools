const CATEGORIES = ['all', 'smileys', 'hands', 'animals', 'food', 'travel', 'activities', 'objects', 'symbols', 'flags'];
const CAT_LABEL = { all: 'All', smileys: '😊 Smileys', hands: '✋ Hands', animals: '🐾 Animals', food: '🍔 Food', travel: '✈️ Travel', activities: '⚽ Activities', objects: '💻 Objects', symbols: '❤️ Symbols', flags: '🚩 Flags' };

let currentCat = 'all';
let count = 5;
let lastResults = [];

function rand(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function filterByCat(cat) {
  currentCat = cat;
  document.querySelectorAll('.cat-filters button').forEach(b => b.classList.toggle('active', b.dataset.cat === cat));
  generate();
}

function setCount(n) {
  count = n;
  document.querySelectorAll('.count-btn').forEach(b => b.classList.toggle('active', +b.dataset.n === n));
  generate();
}

function generate() {
  const pool = currentCat === 'all' ? EMOJIS : EMOJIS.filter(x => x.c === currentCat);
  if (!pool.length) return;
  const picks = [];
  const used = new Set();
  while (picks.length < Math.min(count, pool.length)) {
    const r = rand(pool);
    if (!used.has(r.e)) { used.add(r.e); picks.push(r); }
  }
  lastResults = picks;
  // Big emoji = first one
  $('#bigEmoji').textContent = picks[0].e;
  $('#emojiName').textContent = picks[0].n;
  $('#emojiCat').textContent = CAT_LABEL[picks[0].c] || picks[0].c;
  // Set list
  $('#emojiSet').innerHTML = picks.map(p => `<span class="item" title="${p.n}" onclick="copySingle('${p.e}')">${p.e}</span>`).join('');
}

function copySingle(e) {
  copyText(e);
}

function copyAll() {
  const str = lastResults.map(p => p.e).join('');
  copyText(str);
}

$('#catFilters').innerHTML = CATEGORIES.map(c => `<button class="gz-btn gz-btn-secondary ${c === 'all' ? 'active' : ''}" data-cat="${c}" onclick="filterByCat('${c}')">${CAT_LABEL[c]}</button>`).join('');

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="generate()">🎲 ${t('generate')}</button>
  <span style="display:inline-flex;gap:6px;margin-left:14px;align-items:center">${t('count')}:
    ${[1,3,5,10,20].map(n => `<button class="gz-btn gz-btn-secondary count-btn ${n===5?'active':''}" data-n="${n}" onclick="setCount(${n})">${n}</button>`).join('')}
  </span>`;
