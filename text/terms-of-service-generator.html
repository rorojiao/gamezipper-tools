const { $, $$, copyText, t } = GZ;
$('#effectiveDate').value = new Date().toISOString().slice(0,10);

// Populate data-i18n labels
$$('[data-i18n]').forEach(el => { el.textContent = t(el.dataset.i18n); });

function generate() {
  const company = $('#companyName').value.trim() || '[Your Company Name]';
  const url = $('#websiteUrl').value.trim() || '[Your Website URL]';
  const email = $('#contactEmail').value.trim() || 'support@example.com';
  const jurisdiction = $('#jurisdiction').value;
  const bizType = $('#bizType').value;
  const date = $('#effectiveDate').value || new Date().toISOString().slice(0,10);
  const bizTypeLabel = $('#bizType').options[$('#bizType').selectedIndex].text;

  const acceptance = $('#chkAcceptance').checked;
  const accounts = $('#chkAccounts').checked;
  const ip = $('#chkIP').checked;
  const prohibited = $('#chkProhibited').checked;
  const liability = $('#chkLiability').checked;
  const termination = $('#chkTermination').checked;
  const governing = $('#chkGoverning').checked;
  const refund = $('#chkRefund').checked;
  const disclaimers = $('#chkDisclaimers').checked;
  const modifications = $('#chkModifications').checked;

  const sections = [];
  sections.push(`TERMS OF SERVICE FOR ${company}\nEffective Date: ${date}\nBusiness Type: ${bizTypeLabel}\n`);

  let n = 1;
  if (acceptance) {
    sections.push(`${n}. ACCEPTANCE OF TERMS
By accessing or using ${url} (the "Service"), you agree to be bound by these Terms of Service ("Terms"). If you disagree with any part of the Terms, you may not access the Service.`);
    n++;
  }
  sections.push(`${n}. DESCRIPTION OF SERVICE
${company} provides ${bizTypeLabel.toLowerCase()} services accessible at ${url}. The Service may include content, features, and functionality as updated from time to time.`);
  n++;

  if (accounts) {
    sections.push(`${n}. USER ACCOUNTS
When you create an account with us, you must provide accurate, complete, and current information. Failure to do so constitutes a breach of the Terms, which may result in immediate termination of your account.

You are responsible for safeguarding the password and for any activities or actions under your account. You must notify us immediately upon becoming aware of any breach of security or unauthorized use of your account.`);
    n++;
  }

  if (ip) {
    sections.push(`${n}. INTELLECTUAL PROPERTY
The Service and its original content, features, and functionality are and will remain the exclusive property of ${company} and its licensors. The Service is protected by copyright, trademark, and other laws. Our trademarks may not be used in connection with any product or service without our prior written consent.`);
    n++;
  }

  if (prohibited) {
    sections.push(`${n}. PROHIBITED USES
You agree not to use the Service:
- In any way that violates any applicable national or international law or regulation
- To transmit any malicious code, viruses, worms, or any destructive content
- To impersonate or attempt to impersonate ${company}, a ${company} employee, another user, or any other person or entity
- To engage in any activity that interferes with or disrupts the Service or the servers and networks connected to the Service
- To collect or track the personal information of others
- To spam, phish, pharm, pretext, spider, crawl, or scrape
- For any obscene or immoral purpose`);
    n++;
  }

  if (refund) {
    sections.push(`${n}. REFUNDS AND PAYMENTS
Certain products or services may be available exclusively through the Service. These products or services may have limited quantities and are subject to our Refund Policy.

We reserve the right to refuse any order you place with us. We may, in our sole discretion, limit or cancel quantities purchased per person, per household, or per order.`);
    n++;
  }

  if (disclaimers) {
    sections.push(`${n}. DISCLAIMERS
The information and Service is provided on an "AS IS" and "AS AVAILABLE" basis. ${company} expressly disclaims all warranties of any kind, including but not limited to the implied warranties of merchantability, fitness for a particular purpose, and non-infringement.

${company} does not warrant that the Service will be uninterrupted, timely, secure, or error-free.`);
    n++;
  }

  if (liability) {
    sections.push(`${n}. LIMITATION OF LIABILITY
In no event shall ${company}, its directors, employees, partners, agents, suppliers, or affiliates, be liable for any indirect, incidental, special, consequential, or punitive damages, including without limitation, loss of profits, data, use, goodwill, or other intangible losses, resulting from your access to or use of the Service.`);
    n++;
  }

  if (termination) {
    sections.push(`${n}. TERMINATION
We may terminate or suspend your account immediately, without prior notice or liability, for any reason whatsoever, including without limitation if you breach the Terms.

Upon termination, your right to use the Service will cease immediately. If you wish to terminate your account, you may simply discontinue using the Service.`);
    n++;
  }

  if (modifications) {
    sections.push(`${n}. MODIFICATIONS TO TERMS
${company} reserves the right to modify or replace these Terms at any time at our sole discretion. If a revision is material, we will try to provide at least 30 days' notice prior to any new terms taking effect. What constitutes a material change will be determined at our sole discretion.

By continuing to access or use our Service after those revisions become effective, you agree to be bound by the revised terms.`);
    n++;
  }

  if (governing) {
    sections.push(`${n}. GOVERNING LAW
These Terms shall be governed and construed in accordance with the laws of ${jurisdiction}, without regard to its conflict of law provisions. Our failure to enforce any right or provision of these Terms will not be considered a waiver of those rights.

Any disputes arising from or relating to the use of the Service shall be subject to the exclusive jurisdiction of the courts located in ${jurisdiction}.`);
    n++;
  }

  sections.push(`${n}. CONTACT US
If you have any questions about these Terms, please contact us at:
Email: ${email}
Website: ${url}
Company: ${company}`);

  $('#output').textContent = sections.join('\n\n');
}

function downloadHTML() {
  const text = $('#output').textContent;
  if (!text.trim()) { generate(); }
  const html = '<!DOCTYPE html>\n<html lang="en">\n<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Terms of Service</title><style>body{font-family:system-ui,sans-serif;max-width:800px;margin:40px auto;padding:0 20px;line-height:1.7;color:#333}h1{font-size:1.5rem}h2{font-size:1.1rem;margin-top:2rem;border-bottom:1px solid #eee;padding-bottom:8px}p{margin:0.8em 0}</style></head>\n<body>' + text.split('\n\n').map(s => {
    const lines = s.split('\n');
    const first = lines[0];
    const rest = lines.slice(1).join('\n');
    if (/^\d+\./.test(first)) return '<h2>' + first + '</h2><p>' + rest.replace(/\n/g, '<br>') + '</p>';
    if (first === first.toUpperCase() && first.length > 5) return '<h1>' + first + '</h1><p>' + rest.replace(/\n/g, '<br>') + '</p>';
    return '<p>' + s.replace(/\n/g, '<br>') + '</p>';
  }).join('\n') + '\n</body>\n</html>';
  const blob = new Blob([html], {type: 'text/html'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'terms-of-service.html';
  a.click();
  URL.revokeObjectURL(a.href);
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="generate()">${t('generate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="downloadHTML()">${t('download')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#output').textContent=''">${t('clear')}</button>`;

$('#chkRefund').addEventListener('change', generate);
['companyName','websiteUrl','contactEmail','jurisdiction','bizType','effectiveDate'].forEach(id => {
  $('#' + id).addEventListener('input', generate);
  $('#' + id).addEventListener('change', generate);
});
['chkAcceptance','chkAccounts','chkIP','chkProhibited','chkLiability','chkTermination','chkGoverning','chkRefund','chkDisclaimers','chkModifications'].forEach(id => {
  $('#' + id).addEventListener('change', generate);
});

generate();

</script>
