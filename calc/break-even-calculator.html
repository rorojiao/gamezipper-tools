<script type="application/ld+json">{"@context":"https://schema.org","@type":"WebApplication","name":"Break-Even Calculator","description":"Calculate your break-even point online for free. Enter fixed costs, variable cost per unit and selling price to find when your business turns a profit. Margin of safety included — 100% browser-based, no signup.","url":"https://tools.gamezipper.com/calc/break-even-calculator.html","applicationCategory":"FinanceApplication","operatingSystem":"Web Browser","offers":{"@type":"Offer","price":"0"}}</script>
<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is the break-even point?", "acceptedAnswer": {"@type": "Answer", "text": "The break-even point is the number of units you must sell so that total revenue equals total costs. Below this point you lose money; above it you make a profit."}}, {"@type": "Question", "name": "How is break-even calculated?", "acceptedAnswer": {"@type": "Answer", "text": "Break-even units = Fixed Costs / (Selling Price per Unit - Variable Cost per Unit). The denominator is your contribution margin per unit."}}, {"@type": "Question", "name": "What is margin of safety?", "acceptedAnswer": {"@type": "Answer", "text": "Margin of safety is how much your actual (or expected) sales can drop before you start losing money. It is expressed as a percentage of expected sales above the break-even point."}}, {"@type": "Question", "name": "What if my selling price is lower than variable cost?", "acceptedAnswer": {"@type": "Answer", "text": "If the selling price per unit is less than or equal to the variable cost per unit, the contribution margin is zero or negative. In that case there is no break-even point — every unit sold loses money."}}]}</script>

<div class="gz-container">

    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">

    <div id="inputs"></div>
    <div id="result" class="be-result"></div>
  </div>

</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Break-Even Calculator',
    toolDesc: 'Find your break-even point in units and dollars. Enter fixed costs, price and variable cost — get contribution margin, margin of safety and more. Free, browser-based.',
    fixedCosts: 'Total Fixed Costs',
    pricePerUnit: 'Selling Price per Unit',
    variableCost: 'Variable Cost per Unit',
    expectedUnits: 'Expected Units Sold (optional)',
    calculate: 'Calculate',
    clear: 'Clear',
    beUnits: 'Break-Even Point (units)',
    beRevenue: 'Break-Even Revenue',
    contributionMargin: 'Contribution Margin per Unit',
    cmRatio: 'Contribution Margin Ratio',
    marginOfSafety: 'Margin of Safety',
    profitAtExpected: 'Profit at Expected Sales',
    step1: 'Enter your total fixed costs (rent, salaries, etc.)',
    step2: 'Enter the selling price per unit of your product',
    step3: 'Enter the variable cost to produce each unit',
    step4: 'Optionally enter expected sales to see projected profit and margin of safety',
  },
  zh: {
    toolTitle: '盈亏平衡点计算器',
    toolDesc: '计算以单位数和金额表示的盈亏平衡点。输入固定成本、售价和单位变动成本 — 即时获取边际贡献、安全边际等。免费、浏览器本地运行。',
    fixedCosts: '总固定成本',
    pricePerUnit: '单位售价',
    variableCost: '单位变动成本',
    expectedUnits: '预期销售数量（可选）',
    calculate: '计算',
    clear: '清除',
    beUnits: '盈亏平衡点（单位数）',
    beRevenue: '盈亏平衡收入',
    contributionMargin: '单位边际贡献',
    cmRatio: '边际贡献率',
    marginOfSafety: '安全边际',
    profitAtExpected: '预期销售利润',
    step1: '输入总固定成本（租金、工资等）',
    step2: '输入产品的单位售价',
    step3: '输入生产每单位的变动成本',
    step4: '可选：输入预期销量以查看预计利润和安全边际',
  }
});

const { $, t } = GZ;

function buildInputs() {
  $('#inputs').innerHTML = `
    <div class="be-row"><span class="be-label">${t('fixedCosts')}</span>
      <input type="number" id="fc" class="gz-input" value="10000" step="any" oninput="calc()"></div>
    <div class="be-row"><span class="be-label">${t('pricePerUnit')}</span>
      <input type="number" id="price" class="gz-input" value="50" step="any" oninput="calc()"></div>
    <div class="be-row"><span class="be-label">${t('variableCost')}</span>
      <input type="number" id="vc" class="gz-input" value="30" step="any" oninput="calc()"></div>
    <div class="be-row"><span class="be-label">${t('expectedUnits')}</span>
      <input type="number" id="exp" class="gz-input" value="600" step="any" oninput="calc()"></div>`;
}

function calc() {
  const fc = parseFloat($('#fc').value) || 0;
  const price = parseFloat($('#price').value) || 0;
  const vc = parseFloat($('#vc').value) || 0;
  const exp = parseFloat($('#exp').value) || 0;

  const cm = price - vc;

  if (cm <= 0) {
    $('#result').innerHTML = `<div class="be-card"><span class="be-warn">⚠ ${t('contributionMargin')} ≤ $0 — ${t('pricePerUnit').toLowerCase()} must exceed ${t('variableCost').toLowerCase()}.</span></div>`;
    return;
  }

  const beUnits = fc / cm;
  const beRev = beUnits * price;
  const cmRatio = cm / price;

  let mosHtml = '';
  if (exp > 0) {
    const mosUnits = exp - beUnits;
    const mosPct = beUnits > 0 ? (mosUnits / exp * 100) : 0;
    const profit = exp * cm - fc;
    mosHtml = `
      <div class="be-card">
        <div>${t('marginOfSafety')}</div>
        <div class="be-big">${mosUnits.toFixed(0)} units (${mosPct.toFixed(1)}%)</div>
        <div class="be-sub">${t('profitAtExpected')}: ${formatMoney(profit)}</div>
      </div>`;
  }

  $('#result').innerHTML = `
    <div class="be-card">
      <div>${t('beUnits')}</div>
      <div class="be-big">${beUnits.toLocaleString('en-US', {maximumFractionDigits:0})} units</div>
    </div>
    <div class="be-card">
      <div>${t('beRevenue')}</div>
      <div class="be-big">${formatMoney(beRev)}</div>
    </div>
    <div class="be-card">
      <div>${t('contributionMargin')}</div>
      <div class="be-big">${formatMoney(cm)}</div>
      <div class="be-sub">${t('cmRatio')}: ${(cmRatio * 100).toFixed(1)}%</div>
    </div>
    ${mosHtml}`;
}

function formatMoney(v) {
  const sign = v < 0 ? '-' : '';
  return sign + '$' + Math.abs(v).toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2});
}

function doClear() {
  ['#fc','#price','#vc','#exp'].forEach(s => { if ($(s)) $(s).value = ''; });
  $('#result').innerHTML = '';
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="calc()">${t('calculate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

buildInputs();
calc();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📊', href:'/calc/profit-margin.html', name:'Profit Margin'},
    {icon:'💰', href:'/calc/npv-calculator.html', name:'NPV Calculator'},
    {icon:'💵', href:'/calc/roi.html', name:'ROI Calculator'},
    {icon:'🏷️', href:'/calc/markup-calculator.html', name:'Markup'},
  ]
});
</script>
