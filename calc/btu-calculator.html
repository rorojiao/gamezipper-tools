<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "How many BTUs do I need per square foot?", "acceptedAnswer": {"@type": "Answer", "text": "A common rule of thumb is 20 BTU/hr per square foot of living space. So a 500 sq ft room needs about 10,000 BTU/hr. The exact figure depends on ceiling height, sun exposure, insulation, number of occupants and whether the room contains a kitchen."}}, {"@type": "Question", "name": "What does BTU mean for air conditioners?", "acceptedAnswer": {"@type": "Answer", "text": "BTU (British Thermal Unit) measures the amount of heat an air conditioner can remove from a room in one hour. A higher BTU rating means more cooling capacity. Buying a unit with too many BTUs causes short cycling and poor dehumidification; too few BTUs leaves the room warm."}}, {"@type": "Question", "name": "What happens if my AC has too many BTUs?", "acceptedAnswer": {"@type": "Answer", "text": "An oversized air conditioner cools the room too quickly and shuts off before removing humidity, leaving the air feeling cold and clammy. It also wastes energy from frequent on/off cycling. Always size within about 10% of the calculated BTU requirement."}}, {"@type": "Question", "name": "How accurate is this BTU calculator?", "acceptedAnswer": {"@type": "Answer", "text": "This tool uses the widely cited ASHRAE/Energy Star room-sizing chart with standard adjustments for sun exposure, kitchen and extra occupants. It gives a reliable estimate for residential rooms; for whole-house loads or commercial spaces consult a Manual J calculation by an HVAC professional."}}]}</script>

<script>
GZI18n.register({
  en: {
    toolTitle: 'BTU Calculator (Air Conditioner Sizing)',
    toolDesc: 'Find the exact BTU/hr, watts and refrigeration tons needed to cool any room — accounts for sun, shade, kitchen and occupancy. Free, browser-based.',
    lblUnit: 'Measurement units',
    lblW: 'Width',
    lblL: 'Length',
    lblH: 'Ceiling height',
    lblSunny: 'Very sunny / lots of windows',
    lblShade: 'Heavily shaded',
    lblKitchen: 'Room contains a kitchen',
    lblOcc: 'Number of people in the room',
    lblOutBtu: 'Recommended cooling',
    lblOutWatts: '≈ Watts',
    lblOutArea: 'Room area',
    lblOutTons: 'Refrigeration tons',
    lblRef: 'ASHRAE room-size BTU reference',
    thArea: 'Area (ft²)', thBtu: 'BTU/hr', thArea2: 'Area (ft²)', thBtu2: 'BTU/hr',
    btnExample: 'Example: 12×14×8 ft, sunny, kitchen, 3 people',
    btnClear: 'Clear',
    step1: 'Choose feet or meters and enter the room width, length and ceiling height',
    step2: 'Tick any adjustments (sunny, shaded, kitchen) and enter the number of occupants',
    step3: 'Read the recommended BTU/hr, watts and refrigeration tons instantly',
    step4: 'Pick an AC unit rated within ±10% of the recommended BTU',
  },
  zh: {
    toolTitle: 'BTU 计算器（空调制冷量选型）',
    toolDesc: '计算任意房间所需的 BTU/小时、瓦数和制冷吨数 — 自动考虑日照、遮阳、厨房和人数。免费，浏览器本地运行。',
    lblUnit: '测量单位',
    lblW: '宽度',
    lblL: '长度',
    lblH: '层高',
    lblSunny: '阳光充足 / 多窗',
    lblShade: '遮阳严重',
    lblKitchen: '房间内有厨房',
    lblOcc: '房间人数',
    lblOutBtu: '建议制冷量',
    lblOutWatts: '≈ 瓦数',
    lblOutArea: '房间面积',
    lblOutTons: '制冷吨',
    lblRef: 'ASHRAE 房间面积-BTU 参考表',
    thArea: '面积 (ft²)', thBtu: 'BTU/hr', thArea2: '面积 (ft²)', thBtu2: 'BTU/hr',
    btnExample: '示例：12×14×8 ft，阳光，厨房，3 人',
    btnClear: '清空',
    step1: '选择英尺或米，输入房间宽度、长度和层高',
    step2: '勾选相应调整项（日照、遮阳、厨房），并输入房间人数',
    step3: '即时读取建议 BTU/小时、瓦数和制冷吨',
    step4: '选购制冷量在建议 BTU ±10% 范围内的空调',
  }
});

const { $, t } = GZ;

// ASHRAE / Energy Star reference table (ft² → BTU/hr)
const REF = [
  [150,5000],[250,6000],[300,7000],[350,8000],[400,9000],
  [450,10000],[550,12000],[700,14000],[1000,18000],[1200,21000],
  [1400,23000],[1500,24000],[2000,30000],[2500,34000]
];

function buildRefTable() {
  const body = $('#ref-body');
  const half = Math.ceil(REF.length/2);
  let html = '';
  for (let i = 0; i < half; i++) {
    const a = REF[i];
    const b = REF[i+half] || ['—','—'];
    html += `<tr><td>${a[0]}</td><td>${a[1].toLocaleString()}</td><td>${b[0]}</td><td>${b[1].toLocaleString ? b[1].toLocaleString() : b[1]}</td></tr>`;
  }
  body.innerHTML = html;
}
buildRefTable();

function btuForArea(sqft) {
  // interpolate within ASHRAE reference table; below 150 → 5000, above 2500 → 34000 + extrapolate
  if (sqft <= REF[0][0]) return REF[0][1];
  for (let i = 1; i < REF.length; i++) {
    if (sqft <= REF[i][0]) {
      const [a0,b0] = REF[i-1];
      const [a1,b1] = REF[i];
      const f = (sqft - a0) / (a1 - a0);
      return Math.round((b0 + f*(b1-b0))/100)*100;
    }
  }
  // beyond largest: 16 BTU/ft²
  return Math.round((REF[REF.length-1][1] + (sqft - REF[REF.length-1][0]) * 16)/100)*100;
}

function calc() {
  const unit = $('#unit').value;
  const w = parseFloat($('#w').value);
  const l = parseFloat($('#l').value);
  const h = parseFloat($('#h').value);
  if (isNaN(w) || isNaN(l)) { $('#result').style.display='none'; return; }

  let sqft = w * l;
  let areaM2 = sqft;
  if (unit === 'm') { areaM2 = sqft; sqft = sqft * 10.7639; }

  let btu = btuForArea(sqft);

  // ceiling height adjustment: scale relative to 8 ft
  if (!isNaN(h) && h > 0) {
    const refH = unit === 'm' ? 2.44 : 8;
    btu *= h / refH;
  }

  if ($('#sunny').checked) btu *= 1.10;
  if ($('#shade').checked) btu *= 0.90;
  if ($('#kitchen').checked) btu += 4000;

  const occ = parseInt($('#occ').value, 10);
  if (!isNaN(occ) && occ > 2) btu += (occ - 2) * 600;

  btu = Math.round(btu/100)*100;
  const watts = Math.round(btu / 3.41214);
  const tons = (btu / 12000).toFixed(2);

  $('#bt-btu').textContent = btu.toLocaleString() + ' BTU/hr';
  $('#bt-watts').textContent = watts.toLocaleString() + ' W';
  $('#bt-tons').textContent = tons + ' t';
  $('#bt-area').textContent = unit === 'm'
    ? areaM2.toFixed(1) + ' m²'
    : Math.round(sqft).toLocaleString() + ' ft²';
  $('#result').style.display = 'grid';
}

['unit','w','l','h','sunny','shade','kitchen','occ'].forEach(id => {
  const el = $('#'+id);
  el.addEventListener('input', calc);
  el.addEventListener('change', calc);
});

function loadExample() {
  $('#unit').value = 'ft';
  $('#w').value = 12; $('#l').value = 14; $('#h').value = 8;
  $('#sunny').checked = true; $('#shade').checked = false;
  $('#kitchen').checked = true; $('#occ').value = 3;
  calc();
}
function doClear() {
  ['w','l','h','occ'].forEach(id => $('#'+id).value='');
  ['sunny','shade','kitchen'].forEach(id => $('#'+id).checked=false);
  $('#result').style.display='none';
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="loadExample()">${t('btnExample')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('btnClear')}</button>`;

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🌡️',href:'/calc/heat-index-calculator.html',name:'Heat Index'},
    {icon:'🧊',href:'/calc/wind-chill.html',name:'Wind Chill'},
    {icon:'💧',href:'/calc/dew-point-calculator.html',name:'Dew Point'},
    {icon:'⚡',href:'/calc/electricity-cost.html',name:'Electricity Cost'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
