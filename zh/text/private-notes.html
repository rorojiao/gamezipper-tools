<script>
GZI18n.register({

    toolDesc: '使用 AES-256 在浏览器中加密存储私密笔记。设置主密码 — 数据绝不上传。',
    newNote: '+ 新建笔记',
    lock: '锁定',
    exportVault: '导出保险箱',
    importVault: '导入保险箱',
    deleteNote: '删除',
    step1: '设置主密码 — 用于加密和解密你的笔记',
    step2: '点击「+ 新建笔记」，添加标题和正文，自动加密保存',
    step3: '使用搜索按标题查找笔记',
    step4: '导出加密备份，或点击「锁定」重新要求输入密码',
    lockMsgFirst: '设置主密码以创建加密保险箱：',
    lockMsgExisting: '输入主密码以解锁保险箱：',
    unlock: '解锁',
    titlePh: '笔记标题…',
    bodyPh: '在这里写下你的私密笔记…',
    searchPh: '搜索笔记…',
    pwMismatch: '密码错误，无法解密保险箱。',
  }
});

const { $, t } = GZ;
const lang = GZI18n.getLang();
const STORE_KEY = 'gz-private-notes-vault';

let vault = null; // { salt, iv, ct } or null
let notes = [];   // decrypted notes
let currentIdx = -1;
let key = null;

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

// --- Crypto helpers (Web Crypto API, AES-GCM) ---
async function deriveKey(password, salt) {
  const enc = new TextEncoder();
  const baseKey = await crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey(
    { name: 'PBKDF2', salt, iterations: 100000, hash: 'SHA-256' },
    baseKey, { name: 'AES-GCM', length: 256 }, false, ['encrypt', 'decrypt']
  );
}

function bufToB64(buf) { return btoa(String.fromCharCode(...new Uint8Array(buf))); }
function b64ToBuf(b64) { return Uint8Array.from(atob(b64), c => c.charCodeAt(0)).buffer; }

async function encryptNotes() {
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const enc = new TextEncoder();
  const ct = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, key, enc.encode(JSON.stringify(notes)));
  const salt = vault.salt;
  vault = { salt, iv: bufToB64(iv), ct: bufToB64(ct) };
  localStorage.setItem(STORE_KEY, JSON.stringify(vault));
}

async function tryUnlock(password) {
  const existing = JSON.parse(localStorage.getItem(STORE_KEY) || 'null');
  if (!existing) {
    // first time: create vault
    const salt = crypto.getRandomValues(new Uint8Array(16));
    key = await deriveKey(password, salt);
    vault = { salt: bufToB64(salt), iv: '', ct: '' };
    notes = [];
    await encryptNotes();
    return true;
  }
  try {
    const salt = new Uint8Array(b64ToBuf(existing.salt));
    key = await deriveKey(password, salt);
    const iv = b64ToBuf(existing.iv);
    const dec = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, b64ToBuf(existing.ct));
    notes = JSON.parse(new TextDecoder().decode(dec));
    vault = existing;
    return true;
  } catch (e) {
    return false;
  }
}

// --- UI ---
function renderList(filter = '') {
  const ul = $('#pn-list');
  const filtered = notes.map((n, i) => ({ ...n, _i: i })).filter(n => !filter || n.title.toLowerCase().includes(filter.toLowerCase()));
  ul.innerHTML = filtered.length ? filtered.map(n => `
    <li class="${n._i === currentIdx ? 'active' : ''}" onclick="selectNote(${n._i})">
      <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(n.title || '(untitled)')}</span>
      <button class="pn-del" onclick="event.stopPropagation();delNote(${n._i})">✕</button>
    </li>`).join('') : `<li style="opacity:.5;cursor:default">${lang === 'zh' ? '暂无笔记' : 'No notes yet'}</li>`;
}

function selectNote(i) {
  currentIdx = i;
  $('#pn-title-in').value = notes[i].title;
  $('#pn-body').value = notes[i].body;
  renderList($('#pn-search').value);
}

function newNote() {
  notes.unshift({ title: '', body: '' });
  currentIdx = 0;
  selectNote(0);
  encryptNotes();
}

async function delNote(i) {
  notes.splice(i, 1);
  if (currentIdx >= notes.length) currentIdx = notes.length - 1;
  if (currentIdx >= 0) selectNote(currentIdx); else { $('#pn-title-in').value = ''; $('#pn-body').value = ''; }
  renderList($('#pn-search').value);
  await encryptNotes();
}

let saveTimer = null;
function scheduleSave() {
  if (currentIdx < 0) return;
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async () => {
    notes[currentIdx].title = $('#pn-title-in').value;
    notes[currentIdx].body = $('#pn-body').value;
    await encryptNotes();
    renderList($('#pn-search').value);
  }, 400);
}

function exportVault() {
  const blob = new Blob([JSON.stringify(vault)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'private-notes-vault.json';
  a.click();
}

function importVault() {
  const inp = document.createElement('input');
  inp.type = 'file'; inp.accept = '.json';
  inp.onchange = () => {
    const f = inp.files[0]; if (!f) return;
    const r = new FileReader();
    r.onload = async () => {
      try {
        const data = JSON.parse(r.result);
        localStorage.setItem(STORE_KEY, JSON.stringify(data));
        alert(lang === 'zh' ? '已导入加密备份。请重新输入主密码解锁。' : 'Encrypted backup imported. Re-enter your master password to unlock.');
        lockApp();
      } catch (e) { alert('Invalid vault file'); }
    };
    r.readAsText(f);
  };
  inp.click();
}

function lockApp() {
  vault = null; notes = []; key = null; currentIdx = -1;
  $('#pn-app').style.display = 'none';
  $('#pn-lock').style.display = 'block';
  $('#pn-pw').value = '';
  $('#pn-lock-msg').textContent = JSON.parse(localStorage.getItem(STORE_KEY) || 'null') ? t('lockMsgExisting') : t('lockMsgFirst');
}

// Init lock screen
$('#pn-lock-msg').textContent = JSON.parse(localStorage.getItem(STORE_KEY) || 'null') ? t('lockMsgExisting') : t('lockMsgFirst');
$('#pn-pw').placeholder = lang === 'zh' ? '主密码' : 'Master password';
$('#pn-unlock-btn').textContent = t('unlock');
$('#pn-search').placeholder = t('searchPh');
$('#pn-title-in').placeholder = t('titlePh');
$('#pn-body').placeholder = t('bodyPh');

$('#pn-unlock-btn').onclick = async () => {
  const pw = $('#pn-pw').value;
  if (!pw) return;
  const ok = await tryUnlock(pw);
  if (ok) {
    $('#pn-lock').style.display = 'none';
    $('#pn-app').style.display = 'block';
    $('#toolbar').innerHTML = `
      <button class="gz-btn" onclick="newNote()">${t('newNote')}</button>
      <button class="gz-btn gz-btn-secondary" onclick="exportVault()">${t('exportVault')}</button>
      <button class="gz-btn gz-btn-secondary" onclick="importVault()">${t('importVault')}</button>
      <button class="gz-btn gz-btn-secondary" onclick="lockApp()">${t('lock')}</button>`;
    if (notes.length === 0) newNote();
    else selectNote(0);
    renderList();
  } else {
    alert(t('pwMismatch'));
    $('#pn-pw').value = '';
  }
};

$('#pn-pw').addEventListener('keydown', e => { if (e.key === 'Enter') $('#pn-unlock-btn').click(); });
$('#pn-search').addEventListener('input', e => renderList(e.target.value));
$('#pn-title-in').addEventListener('input', scheduleSave);
$('#pn-body').addEventListener('input', scheduleSave);

  ]
});
</script>
