const { $, t, copyText } = GZ;

function rand(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function toKebab(s) { return s.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, ''); }
function toSnake(s) { return s.toLowerCase().replace(/[^a-z0-9]+/g, '_').replace(/^_|_$/g, ''); }
function toCamel(s) {
  s = s.toLowerCase().replace(/[^a-z0-9]+/g, ' ').trim();
  return s.split(' ').map((w, i) => i === 0 ? w : w[0].toUpperCase() + w.slice(1)).join('');
}

function makeBranch(cat, sep) {
  const adj = rand(ADJ);
  const noun = rand(NOUN[cat] || NOUN.feature);
  const verb = rand(VERB[cat] || VERB.feature);
  let name;
  if (cat === 'release') {
    name = `${verb}-${noun}-${adj}`;
  } else {
    name = `${verb}-${adj}-${noun}`;
  }
  let out;
  if (sep === 'kebab') out = toKebab(name);
  else if (sep === 'snake') out = toSnake(name);
  else if (sep === 'camel') out = toCamel(name);
  else if (sep === 'slash') {
    const keb = toKebab(name);
    out = `${cat}/${keb}`;
  } else out = name;
  return out;
}

function generate() {
  const cats = $$('.cat-cb:checked').map(el => el.value);
  if (!cats.length) {
    $('#list').innerHTML = '<div style="padding:14px;color:var(--text3);text-align:center">Select at least one category</div>';
    return;
  }
  const count = Math.max(1, Math.min(50, parseInt($('#count').value) || 10));
  const sep = $('#sep').value;
  const prefix = $('#prefix').value.trim();
  const seen = new Set();
  const out = [];
  let attempts = 0;
  while (out.length < count && attempts < count * 20) {
    attempts++;
    const cat = cats[Math.floor(Math.random() * cats.length)];
    let name = makeBranch(cat, sep);
    if (prefix) name = `${prefix}-${name}`;
    if (!seen.has(name)) {
      seen.add(name);
      out.push({cat, name});
    }
  }
  $('#list').innerHTML = out.map((o, i) => `
    <div class="branch-item">
      <span class="badge">${o.cat}</span>
      <span class="text">${escapeHtml(o.name)}</span>
      <button onclick="copyText('${escapeHtml(o.name)}')">📋 Copy</button>
    </div>`).join('');
}

function escapeHtml(s){if(s==null)return'';return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function $$(s,p){return [...((p||document).querySelectorAll(s))];}
