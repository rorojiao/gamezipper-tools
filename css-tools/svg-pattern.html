<style>
#preview{width:100%;min-height:250px;border-radius:12px;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;overflow:hidden;margin-top:8px}
#preview svg{width:100%;height:100%}
.controls{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-top:12px}
.ctrl-group label{display:block;font-size:.8em;margin-bottom:4px;opacity:.7}
.ctrl-group input[type="color"]{width:100%;height:36px;border:1px solid var(--border);border-radius:8px;background:var(--glass);cursor:pointer;padding:2px}
.ctrl-group input[type="range"]{width:100%}
.ctrl-group select,.ctrl-group input[type="text"]{width:100%;padding:6px 10px;border:1px solid var(--border);border-radius:8px;background:var(--glass);color:inherit;font-size:.85em}
#code-output{margin-top:12px;position:relative}
#code-output textarea{height:120px;font-family:monospace;font-size:.8em;width:100%;background:var(--glass);border:1px solid var(--border);border-radius:12px;color:inherit;padding:12px;resize:vertical}
#pattern-types{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.pat-btn{padding:6px 14px;border:1px solid var(--border);border-radius:8px;background:var(--glass);cursor:pointer;font-size:.85em;color:inherit;transition:all .2s}
.pat-btn:hover,.pat-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
</style>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div id="pattern-types"></div>
    <div id="preview"></div>
    <div class="controls" id="controls"></div>
    <div id="code-output">
      <textarea id="code" readonly></textarea>
    </div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'SVG Pattern Generator',
    toolDesc: 'Create beautiful SVG background patterns — dots, lines, waves, grids and more. Export as SVG or copy CSS.',
    step1: 'Select a pattern type from the buttons',
    step2: 'Customize background color, pattern color and size',
    step3: 'Preview the pattern in real-time',
    step4: 'Copy the CSS code or download the SVG file',
    bgColor: 'Background Color',
    patColor: 'Pattern Color',
    scale: 'Scale',
    copyCss: 'Copy CSS',
    downloadSvg: 'Download SVG',
  },
  zh: {
    toolTitle: 'SVG 图案生成器',
    toolDesc: '创建精美的 SVG 背景图案 — 圆点、线条、波浪、网格等。导出 SVG 或复制 CSS 代码。',
    step1: '从按钮中选择图案类型',
    step2: '自定义背景色、图案颜色和大小',
    step3: '实时预览图案效果',
    step4: '复制 CSS 代码或下载 SVG 文件',
    bgColor: '背景色',
    patColor: '图案色',
    scale: '缩放',
    copyCss: '复制 CSS',
    downloadSvg: '下载 SVG',
  }
});

const { $, copyText, t } = GZ;
let currentPattern = 'dots';

const PATTERNS = {
  dots: (bg,fg,s) => `<svg xmlns="http://www.w3.org/2000/svg" width="${s*2}" height="${s*2}"><rect width="100%" height="100%" fill="${bg}"/><circle cx="${s}" cy="${s}" r="${s*.25}" fill="${fg}"/></svg>`,
  diagonal: (bg,fg,s) => `<svg xmlns="http://www.w3.org/2000/svg" width="${s}" height="${s}"><rect width="100%" height="100%" fill="${bg}"/><path d="M0 0L${s} 0M${s*.5} ${s*.5}L${s} ${s*.5}M0 ${s}L${s*.5} ${s}" stroke="${fg}" stroke-width="${s*.1}" fill="none"/></svg>`,
  horizontal: (bg,fg,s) => `<svg xmlns="http://www.w3.org/2000/svg" width="${s}" height="${s}"><rect width="100%" height="100%" fill="${bg}"/><line x1="0" y1="${s*.5}" x2="${s}" y2="${s*.5}" stroke="${fg}" stroke-width="${s*.1}"/></svg>`,
  vertical: (bg,fg,s) => `<svg xmlns="http://www.w3.org/2000/svg" width="${s}" height="${s}"><rect width="100%" height="100%" fill="${bg}"/><line x1="${s*.5}" y1="0" x2="${s*.5}" y2="${s}" stroke="${fg}" stroke-width="${s*.1}"/></svg>`,
  crosshatch: (bg,fg,s) => `<svg xmlns="http://www.w3.org/2000/svg" width="${s}" height="${s}"><rect width="100%" height="100%" fill="${bg}"/><path d="M0 0L${s} ${s}M${s} 0L0 ${s}" stroke="${fg}" stroke-width="${s*.08}" fill="none"/></svg>`,
  waves: (bg,fg,s) => `<svg xmlns="http://www.w3.org/2000/svg" width="${s*2}" height="${s}"><rect width="100%" height="100%" fill="${bg}"/><path d="M0 ${s*.5}Q${s*.5} 0 ${s} ${s*.5}Q${s*1.5} ${s} ${s*2} ${s*.5}" stroke="${fg}" stroke-width="${s*.1}" fill="none"/></svg>`,
  chevrons: (bg,fg,s) => `<svg xmlns="http://www.w3.org/2000/svg" width="${s}" height="${s}"><rect width="100%" height="100%" fill="${bg}"/><path d="M0 ${s*.75}L${s*.5} ${s*.25}L${s} ${s*.75}" stroke="${fg}" stroke-width="${s*.1}" fill="none"/></svg>`,
  zigzag: (bg,fg,s) => `<svg xmlns="http://www.w3.org/2000/svg" width="${s*2}" height="${s}"><rect width="100%" height="100%" fill="${bg}"/><polyline points="0,${s*.75} ${s*.5},${s*.25} ${s},${s*.75} ${s*1.5},${s*.25} ${s*2},${s*.75}" stroke="${fg}" stroke-width="${s*.1}" fill="none"/></svg>`,
  circles: (bg,fg,s) => `<svg xmlns="http://www.w3.org/2000/svg" width="${s*2}" height="${s*2}"><rect width="100%" height="100%" fill="${bg}"/><circle cx="${s}" cy="${s}" r="${s*.7}" stroke="${fg}" stroke-width="${s*.08}" fill="none"/></svg>`,
  squares: (bg,fg,s) => `<svg xmlns="http://www.w3.org/2000/svg" width="${s}" height="${s}"><rect width="100%" height="100%" fill="${bg}"/><rect x="${s*.2}" y="${s*.2}" width="${s*.6}" height="${s*.6}" stroke="${fg}" stroke-width="${s*.08}" fill="none"/></svg>`,
  triangles: (bg,fg,s) => `<svg xmlns="http://www.w3.org/2000/svg" width="${s}" height="${s}"><rect width="100%" height="100%" fill="${bg}"/><polygon points="${s*.5},${s*.15} ${s*.85},${s*.85} ${s*.15},${s*.85}" stroke="${fg}" stroke-width="${s*.08}" fill="none"/></svg>`,
  diamonds: (bg,fg,s) => `<svg xmlns="http://www.w3.org/2000/svg" width="${s}" height="${s}"><rect width="100%" height="100%" fill="${bg}"/><polygon points="${s*.5},${s*.1} ${s*.9},${s*.5} ${s*.5},${s*.9} ${s*.1},${s*.5}" stroke="${fg}" stroke-width="${s*.08}" fill="${fg}" opacity=".3"/></svg>`,
};

const PAT_NAMES = {
  dots:'Dots', diagonal:'Diagonal', horizontal:'Horizontal', vertical:'Vertical',
  crosshatch:'Crosshatch', waves:'Waves', chevrons:'Chevrons', zigzag:'Zigzag',
  circles:'Circles', squares:'Squares', triangles:'Triangles', diamonds:'Diamonds'
};

function render() {
  const bg = $('#bg-color').value;
  const fg = $('#pat-color').value;
  const scale = parseInt($('#pat-scale').value);
  const svg = PATTERNS[currentPattern](bg, fg, scale);
  $('#preview').innerHTML = svg;
  const encoded = btoa(unescape(encodeURIComponent(svg)));
  const css = `background-color: ${bg};\nbackground-image: url("data:image/svg+xml;base64,${encoded}");\nbackground-repeat: repeat;`;
  $('#code').value = css;
}

function downloadSvg() {
  const bg = $('#bg-color').value;
  const fg = $('#pat-color').value;
  const scale = parseInt($('#pat-scale').value);
  const svg = PATTERNS[currentPattern](bg, fg, scale);
  const blob = new Blob([svg], {type:'image/svg+xml'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'pattern.svg';
  a.click();
}

// Build pattern type buttons
const $types = $('#pattern-types');
for (const key of Object.keys(PATTERNS)) {
  const btn = document.createElement('button');
  btn.className = 'pat-btn' + (key === currentPattern ? ' active' : '');
  btn.textContent = PAT_NAMES[key];
  btn.onclick = () => {
    currentPattern = key;
    document.querySelectorAll('.pat-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  };
  $types.appendChild(btn);
}

// Build controls
$('#controls').innerHTML = `
  <div class="ctrl-group"><label>${t('bgColor')}</label><input type="color" id="bg-color" value="#1a1a2e" onchange="render()"></div>
  <div class="ctrl-group"><label>${t('patColor')}</label><input type="color" id="pat-color" value="#e94560" onchange="render()"></div>
  <div class="ctrl-group"><label>${t('scale')}: <span id="scale-val">20</span>px</label><input type="range" id="pat-scale" min="8" max="60" value="20" oninput="document.getElementById('scale-val').textContent=this.value;render()"></div>`;

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="copyText($('#code').value)">${t('copyCss')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="downloadSvg()">${t('downloadSvg')}</button>`;

render();

GZ.renderToolPage({
  category: 'css',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🫧', href:'/css-tools/svg-blob.html', name:'SVG Blob'},
    {icon:'🌈', href:'/css-tools/gradient.html', name:'CSS Gradient'},
    {icon:'✂️', href:'/css-tools/clip-path.html', name:'Clip-Path'},
    {icon:'🪟', href:'/css-tools/glassmorphism.html', name:'Glassmorphism'},
  ]
});
</script>
<script src="/tools-result-rec.js?v=20260707v520" defer></script>
</body>
