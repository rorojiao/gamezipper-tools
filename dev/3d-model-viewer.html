<script>
GZI18n.register({
  en: {
    toolTitle: '3D Model Viewer',
    toolDesc: 'Open and inspect GLB, GLTF, STL and OBJ 3D files right in your browser. Orbit controls, wireframe, grid, lighting and background toggle. Nothing is uploaded.',
    dzTitle: 'Drop a 3D file here or click to browse',
    dzSub: 'Supported: .glb · .gltf · .stl · .obj — processed locally in your browser',
    loading: 'Loading model...',
    btnWire: 'Wireframe',
    btnGrid: 'Grid',
    btnBg: 'Background',
    btnReset: 'Reset View',
    btnAuto: 'Auto-rotate',
    lblLight: 'Bright BG',
    infoFile: 'File',
    infoSize: 'Size',
    infoTris: 'Triangles',
    infoVerts: 'Vertices',
    infoMeshes: 'Meshes',
    errParse: 'Could not parse this file. Make sure it is a valid GLB/GLTF/STL/OBJ.',
    errLib: '3D library failed to load (no internet?). Please retry.',
    step1: 'Click the drop zone or drag a .glb / .gltf / .stl / .obj file onto it',
    step2: 'Wait for the model to load and center automatically in the viewer',
    step3: 'Drag to orbit, scroll to zoom, right-drag to pan around the model',
    step4: 'Toggle wireframe, grid, auto-rotate and background using the toolbar',
  },
  zh: {
    toolTitle: '3D 模型查看器',
    toolDesc: '在浏览器中直接打开和查看 GLB、GLTF、STL、OBJ 3D 文件。支持轨道控制、线框、网格、灯光和背景切换，文件不上传。',
    dzTitle: '拖入 3D 文件或点击浏览',
    dzSub: '支持：.glb · .gltf · .stl · .obj — 完全在浏览器本地处理',
    loading: '正在加载模型...',
    btnWire: '线框',
    btnGrid: '网格',
    btnBg: '背景',
    btnReset: '重置视角',
    btnAuto: '自动旋转',
    lblLight: '亮色背景',
    infoFile: '文件',
    infoSize: '大小',
    infoTris: '三角面',
    infoVerts: '顶点',
    infoMeshes: '网格数',
    errParse: '无法解析此文件，请确认是有效的 GLB/GLTF/STL/OBJ。',
    errLib: '3D 库加载失败（无网络？），请重试。',
    step1: '点击拖放区或将 .glb / .gltf / .stl / .obj 文件拖入',
    step2: '等待模型加载并自动居中显示',
    step3: '拖拽旋转、滚轮缩放、右键拖拽平移',
    step4: '使用工具栏切换线框、网格、自动旋转和背景',
  }
});

const { $, t } = GZ;
let scene, camera, renderer, controls, currentModel, gridHelper, autoRotate=false, wireframe=false;

// labels
$('#dzTitle').textContent = t('dzTitle');
$('#dzSub').textContent = t('dzSub');
$('#btnWire').textContent = t('btnWire');
$('#btnGrid').textContent = t('btnGrid');
$('#btnBg').textContent = t('btnBg');
$('#btnReset').textContent = t('btnReset');
$('#btnAuto').textContent = t('btnAuto');
$('#lblLight').textContent = t('lblLight');

function err(msg){
  const e = $('#errBox');
  e.textContent = msg;
  e.classList.add('show');
}

function initThree(){
  if(scene) return;
  if(typeof THREE === 'undefined'){ err(t('errLib')); return false; }
  const canvas = $('#canvas3d');
  scene = new THREE.Scene();
  camera = new THREE.PerspectiveCamera(45, canvas.clientWidth/canvas.clientHeight, 0.1, 1000);
  camera.position.set(5,4,8);
  renderer = new THREE.WebGLRenderer({canvas, antialias:true, preserveDrawingBuffer:true});
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.setSize(canvas.clientWidth, canvas.clientHeight, false);
  // lights
  scene.add(new THREE.HemisphereLight(0xffffff, 0x444466, 1.2));
  const dl = new THREE.DirectionalLight(0xffffff, 1.4); dl.position.set(5,10,7); scene.add(dl);
  const dl2 = new THREE.DirectionalLight(0xffffff, 0.6); dl2.position.set(-6,3,-5); scene.add(dl2);
  // grid
  gridHelper = new THREE.GridHelper(20, 20, 0x4ecdc4, 0x333355);
  gridHelper.visible = true;
  scene.add(gridHelper);
  // controls
  controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.08;
  window.addEventListener('resize', onResize);
  animate();
  return true;
}

function animate(){
  requestAnimationFrame(animate);
  if(currentModel && autoRotate) currentModel.rotation.y += 0.006;
  if(controls) controls.update();
  if(renderer) renderer.render(scene, camera);
}

function onResize(){
  const c = $('#canvas3d');
  if(!c || !renderer) return;
  camera.aspect = c.clientWidth/c.clientHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(c.clientWidth, c.clientHeight, false);
}

function clearModel(){
  if(currentModel){
    scene.remove(currentModel);
    currentModel.traverse(o=>{
      if(o.geometry) o.geometry.dispose();
      if(o.material){
        if(Array.isArray(o.material)) o.material.forEach(m=>m.dispose());
        else o.material.dispose();
      }
    });
    currentModel = null;
  }
}

function fitCamera(object){
  const box = new THREE.Box3().setFromObject(object);
  if(box.isEmpty()) return;
  const size = box.getSize(new THREE.Vector3());
  const center = box.getCenter(new THREE.Vector3());
  const maxDim = Math.max(size.x, size.y, size.z);
  const fov = camera.fov * (Math.PI/180);
  let dist = maxDim / 2 / Math.tan(fov/2);
  dist *= 1.6;
  // recenter model on grid
  object.position.x += (object.position.x - center.x);
  object.position.z += (object.position.z - center.z);
  object.position.y -= box.min.y;
  camera.position.set(dist*0.7, dist*0.55, dist);
  camera.near = maxDim/100; camera.far = maxDim*100;
  camera.updateProjectionMatrix();
  controls.target.set(0, size.y/2, 0);
  controls.update();
}

function countStats(object){
  let tris=0, verts=0, meshes=0;
  object.traverse(o=>{
    if(o.isMesh){
      meshes++;
      const g = o.geometry;
      if(g){
        if(g.index) tris += g.index.count/3;
        else if(g.attributes.position) tris += g.attributes.position.count/3;
        if(g.attributes.position) verts += g.attributes.position.count;
      }
    }
  });
  return {tris:Math.round(tris), verts, meshes};
}

function applyWire(m){
  m.traverse(o=>{ if(o.isMesh && o.material){ const mats = Array.isArray(o.material)?o.material:[o.material]; mats.forEach(mt=>{ if('wireframe' in mt) mt.wireframe = m; }); } });
}

function loadFile(file){
  $('#errBox').classList.remove('show');
  $('#canvasCard').style.display = '';
  if(!initThree()) return;
  onResize();
  $('#spinner').classList.add('show');
  $('#spinTxt').textContent = t('loading');
  const ext = file.name.split('.').pop().toLowerCase();
  const url = URL.createObjectURL(file);

  function done(object){
    clearModel();
    currentModel = object;
    scene.add(object);
    fitCamera(object);
    if(wireframe) applyWire(true);
    const st = countStats(object);
    const bar = $('#infoBar');
    bar.innerHTML =
      '<span><b>'+t('infoFile')+':</b> '+file.name+'</span>'+
      '<span><b>'+t('infoSize')+':</b> '+(file.size/1024).toFixed(1)+' KB</span>'+
      '<span><b>'+t('infoMeshes')+':</b> '+st.meshes+'</span>'+
      '<span><b>'+t('infoTris')+':</b> '+st.tris.toLocaleString()+'</span>'+
      '<span><b>'+t('infoVerts')+':</b> '+st.verts.toLocaleString()+'</span>';
    $('#spinner').classList.remove('show');
    URL.revokeObjectURL(url);
  }
  function fail(){ $('#spinner').classList.remove('show'); err(t('errParse')); URL.revokeObjectURL(url); }

  setTimeout(()=>{
    try {
      if(ext === 'glb' || ext === 'gltf'){
        const loader = new THREE.GLTFLoader();
        loader.load(url, gltf => done(gltf.scene), undefined, fail);
      } else if(ext === 'stl'){
        const loader = new THREE.STLLoader();
        loader.load(url, geo => {
          const mat = new THREE.MeshStandardMaterial({color:0x9fd8d2, metalness:0.1, roughness:0.6, flatShading:false});
          const mesh = new THREE.Mesh(geo, mat);
          done(mesh);
        }, undefined, fail);
      } else if(ext === 'obj'){
        const loader = new THREE.OBJLoader();
        loader.load(url, obj => {
          obj.traverse(o=>{ if(o.isMesh){ o.material = new THREE.MeshStandardMaterial({color:0x9fd8d2, metalness:0.1, roughness:0.6}); } });
          done(obj);
        }, undefined, fail);
      } else { fail(); }
    } catch(e){ console.error(e); fail(); }
  }, 50);
}

// Toolbar
function toggleWire(){
  wireframe = !wireframe;
  $('#btnWire').classList.toggle('active', wireframe);
  if(currentModel) applyWire(wireframe);
}
function toggleGrid(){
  gridHelper.visible = !gridHelper.visible;
  $('#btnGrid').classList.toggle('active', gridHelper.visible);
}
function toggleBg(){
  const c = $('#canvas3d');
  const dark = c.style.background === '' || c.style.background.includes('1a');
  c.style.background = dark ? '#e8eef5' : '#0e0e1a';
  $('#btnBg').classList.toggle('active', !dark);
}
function resetView(){
  if(currentModel){ fitCamera(currentModel); }
}
function toggleAuto(){
  autoRotate = !autoRotate;
  $('#btnAuto').classList.toggle('active', autoRotate);
}
function setLight(on){
  const c = $('#canvas3d');
  c.style.background = on ? '#e8eef5' : '#0e0e1a';
}

// file input + drag/drop
const drop = $('#drop');
const fileInput = $('#fileInput');
drop.addEventListener('click', ()=>fileInput.click());
fileInput.addEventListener('change', e=>{ if(e.target.files[0]) loadFile(e.target.files[0]); });
['dragenter','dragover'].forEach(ev=>drop.addEventListener(ev, e=>{ e.preventDefault(); drop.classList.add('drag'); }));
['dragleave','drop'].forEach(ev=>drop.addEventListener(ev, e=>{ e.preventDefault(); drop.classList.remove('drag'); }));
drop.addEventListener('drop', e=>{ const f=e.dataTransfer.files[0]; if(f) loadFile(f); });

GZ.renderToolPage({
  related: [
    {icon:'🖼️', href:'/image/svg-to-png.html', name:'SVG to PNG'},
    {icon:'✏️', href:'/image/drawing-pad.html', name:'Drawing Pad'},
    {icon:'🧊', href:'/css-tools/css-3d-transform.html', name:'CSS 3D Transform'},
    {icon:'📐', href:'/image/pixel-art-editor.html', name:'Pixel Art Editor'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
