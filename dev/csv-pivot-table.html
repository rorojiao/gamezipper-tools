const { $, copyText, t } = GZ;
let parsedData = [];
let parsedHeader = [];

// RFC 4180 CSV parser
function parseCSV(text) {
  const rows = [];
  let row = [], field = '', inQuotes = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    if (inQuotes) {
      if (c === '"') {
        if (text[i + 1] === '"') { field += '"'; i++; }
        else inQuotes = false;
      } else field += c;
    } else {
      if (c === '"') inQuotes = true;
      else if (c === ',') { row.push(field); field = ''; }
      else if (c === '\n') { row.push(field); rows.push(row); row = []; field = ''; }
      else if (c === '\r') { /* skip */ }
      else field += c;
    }
  }
  if (field.length || row.length) { row.push(field); rows.push(row); }
  return rows.filter(r => r.length > 1 || (r.length === 1 && r[0].trim() !== ''));
}

function isNumeric(v) {
  if (v === null || v === undefined || v === '') return false;
  const n = Number(String(v).replace(/[, ]/g, ''));
  return !isNaN(n) && isFinite(n);
}

function toNum(v) {
  return Number(String(v).replace(/[, ]/g, ''));
}

function aggregate(values, agg) {
  const nums = values.filter(isNumeric).map(toNum);
  if (agg === 'count') return values.length;
  if (agg === 'countDistinct') return new Set(values.map(v => String(v))).size;
  if (agg === 'sum') return nums.reduce((a, b) => a + b, 0);
  if (nums.length === 0) return 0;
  if (agg === 'avg') return nums.reduce((a, b) => a + b, 0) / nums.length;
  if (agg === 'min') return Math.min(...nums);
  if (agg === 'max') return Math.max(...nums);
  if (agg === 'median') {
    const s = [...nums].sort((a, b) => a - b);
    const mid = Math.floor(s.length / 2);
    return s.length % 2 ? s[mid] : (s[mid - 1] + s[mid]) / 2;
  }
  return 0;
}

function fmt(v) {
  if (typeof v === 'number') {
    if (Number.isInteger(v)) return v.toLocaleString();
    return v.toLocaleString(undefined, { maximumFractionDigits: 4 });
  }
  return String(v);
}

function buildPivot() {
  const out = $('#pivotOutput');
  if (!parsedData.length) {
    out.innerHTML = `<div class="pivot-empty">${t('empty')}</div>`;
    $('#status').textContent = '';
    return;
  }
  const rowIdx = parseInt($('#rowField').value);
  const colIdxRaw = $('#colField').value;
  const colIdx = colIdxRaw === '' ? -1 : parseInt(colIdxRaw);
  const valIdx = parseInt($('#valField').value);
  const agg = $('#aggField').value;

  if (isNaN(rowIdx) || isNaN(valIdx)) {
    out.innerHTML = `<div class="pivot-empty">${t('empty')}</div>`;
    return;
  }

  // group: map[rowLabel][map[colLabel]] = [values...]
  const rowLabels = new Set();
  const colLabels = new Set();
  const groups = new Map();

  for (const rec of parsedData) {
    const rl = rec[rowIdx] ?? '';
    const cl = colIdx >= 0 ? (rec[colIdx] ?? '') : '(All)';
    const vl = rec[valIdx] ?? '';
    rowLabels.add(rl);
    colLabels.add(cl);
    if (!groups.has(rl)) groups.set(rl, new Map());
    const inner = groups.get(rl);
    if (!inner.has(cl)) inner.set(cl, []);
    inner.get(cl).push(vl);
  }

  const sortedRows = [...rowLabels].sort((a, b) => a.localeCompare(b, undefined, { numeric: true }));
  const sortedCols = [...colLabels].sort((a, b) => a.localeCompare(b, undefined, { numeric: true }));

  let html = '<table class="pivot-table"><thead><tr>';
  html += `<th>${parsedHeader[rowIdx] || ''}${colIdx >= 0 ? ' \\ ' + (parsedHeader[colIdx] || '') : ''}</th>`;
  for (const cl of sortedCols) html += `<th>${escapeHtml(cl)}</th>`;
  if (sortedRows.length > 1) html += `<th>${t('grandTotal')}</th>`;
  html += '</tr></thead><tbody>';

  const grandTotals = {};
  for (const rl of sortedRows) {
    html += `<tr><td class="label-cell">${escapeHtml(rl)}</td>`;
    const inner = groups.get(rl);
    for (const cl of sortedCols) {
      const vals = (inner && inner.get(cl)) || [];
      const result = aggregate(vals, agg);
      grandTotals[cl] = (grandTotals[cl] || 0) + (agg === 'count' || agg === 'countDistinct' ? result : (isNumeric(result) ? result : 0));
      html += `<td>${fmt(result)}</td>`;
    }
    if (sortedRows.length > 1) {
      // row total
      const allVals = [];
      inner.forEach(arr => allVals.push(...arr));
      html += `<td style="font-weight:700">${fmt(aggregate(allVals, agg))}</td>`;
    }
    html += '</tr>';
  }

  if (sortedRows.length > 1) {
    html += `<tr style="font-weight:700;background:var(--glass)"><td class="label-cell">${t('grandTotal')}</td>`;
    for (const cl of sortedCols) {
      const allVals = [];
      groups.forEach(inner => { if (inner.has(cl)) allVals.push(...inner.get(cl)); });
      html += `<td>${fmt(aggregate(allVals, agg))}</td>`;
    }
    const totalAll = [];
    groups.forEach(inner => inner.forEach(arr => totalAll.push(...arr)));
    html += `<td>${fmt(aggregate(totalAll, agg))}</td>`;
    html += '</tr>';
  }

  html += '</tbody></table>';
  out.innerHTML = html;
  $('#status').innerHTML = `<span style="color:var(--accent)">✓ ${sortedRows.length} × ${sortedCols.length} pivot built from ${parsedData.length} rows</span>`;
}

function escapeHtml(s) {
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function populateFields() {
  const rowSel = $('#rowField'), colSel = $('#colField'), valSel = $('#valField');
  rowSel.innerHTML = colSel.innerHTML = valSel.innerHTML = '';
  const noneOpt = document.createElement('option');
  noneOpt.value = ''; noneOpt.textContent = '—'; colSel.appendChild(noneOpt.cloneNode(true));
  parsedHeader.forEach((h, i) => {
    const o = document.createElement('option');
    o.value = i; o.textContent = h || `Col ${i + 1}`;
    rowSel.appendChild(o.cloneNode(true));
    colSel.appendChild(o.cloneNode(true));
    valSel.appendChild(o.cloneNode(true));
  });
  // sensible defaults
  if (parsedHeader.length >= 1) rowSel.value = 0;
  if (parsedHeader.length >= 3) valSel.value = parsedHeader.length - 1;
}

function parseInput() {
  const txt = $('#input').value.trim();
  if (!txt) { parsedData = []; parsedHeader = []; return; }
  const rows = parseCSV(txt);
  if (rows.length < 2) { parsedData = []; parsedHeader = []; return; }
  parsedHeader = rows[0].map(h => h.trim());
  parsedData = rows.slice(1).filter(r => r.length === parsedHeader.length || r.length === parsedHeader.length + 1);
}

function onInput() {
  parseInput();
  populateFields();
}

function loadExample() {
  $('#input').value = `Region,Product,Quarter,Sales
North,Widget,Q1,1200
North,Widget,Q2,1500
North,Gadget,Q1,450
North,Gadget,Q2,720
South,Widget,Q1,980
South,Widget,Q2,1100
South,Gadget,Q1,520
South,Gadget,Q2,610
East,Widget,Q1,1340
East,Widget,Q2,1620
East,Gadget,Q1,400
East,Gadget,Q2,580`;
  onInput();
  $('#rowField').value = 0;
  $('#colField').value = String(1);
  $('#valField').value = 3;
  buildPivot();
}

function doClear() {
  $('#input').value = '';
  parsedData = []; parsedHeader = [];
  populateFields();
  $('#pivotOutput').innerHTML = `<div class="pivot-empty">${t('empty')}</div>`;
  $('#status').textContent = '';
}

function copyCsv() {
  const table = document.querySelector('#pivotOutput table');
  if (!table) return;
  const lines = [];
  table.querySelectorAll('tr').forEach(tr => {
    const cells = [...tr.querySelectorAll('th,td')].map(c => {
      const v = c.textContent.replace(/"/g, '""');
      return /[",\n]/.test(v) ? `"${v}"` : v;
    });
    lines.push(cells.join(','));
  });
  copyText(lines.join('\n'));
}

function downloadCsv() {
  const table = document.querySelector('#pivotOutput table');
  if (!table) return;
  const lines = [];
  table.querySelectorAll('tr').forEach(tr => {
    const cells = [...tr.querySelectorAll('th,td')].map(c => {
      const v = c.textContent.replace(/"/g, '""');
      return /[",\n]/.test(v) ? `"${v}"` : v;
    });
    lines.push(cells.join(','));
  });
  const blob = new Blob([lines.join('\n')], { type: 'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'pivot-table.csv';
  a.click();
  URL.revokeObjectURL(url);
}

$('#input').addEventListener('input', onInput);
$('#rowField').addEventListener('change', buildPivot);
$('#colField').addEventListener('change', buildPivot);
$('#valField').addEventListener('change', buildPivot);
$('#aggField').addEventListener('change', buildPivot);

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="buildPivot()">${t('build')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn" onclick="copyCsv()">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="downloadCsv()">${t('download')}</button>
