<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What makes a strong password?", "acceptedAnswer": {"@type": "Answer", "text": "A strong password has at least 16 characters, uses uppercase, lowercase, numbers and symbols, avoids dictionary words, and has high entropy (70+ bits)."}}, {"@type": "Question", "name": "What is password entropy?", "acceptedAnswer": {"@type": "Answer", "text": "Entropy measures the randomness of a password in bits. Higher entropy means harder to crack. It's calculated as log2(pool_size ^ length). Aim for 80+ bits."}}, {"@type": "Question", "name": "How long would it take to crack my password?", "acceptedAnswer": {"@type": "Answer", "text": "A password with 60 bits of entropy takes about 2 years at 10 billion guesses/second. At 80 bits, it would take thousands of years. This tool estimates crack time for various attack scenarios."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <input type="text" id="password" placeholder="Type or generate a password..." autocomplete="off">
    <div class="strength-bar"><div class="strength-fill" id="bar"></div></div>
    <div class="ctrl"><label data-i18n="length"></label><input type="range" id="len" min="4" max="128" value="20"><span id="len-val">20</span></div>
    <div class="check-row">
      <label><input type="checkbox" id="upper" checked> A-Z</label>
      <label><input type="checkbox" id="lower" checked> a-z</label>
      <label><input type="checkbox" id="digits" checked> 0-9</label>
      <label><input type="checkbox" id="symbols" checked> !@#$</label>
      <label><input type="checkbox" id="excludeAmbig"> Exclude 0O1lI</label>
    </div>
    <div class="stats-grid" id="stats"></div>
    <div class="analysis" id="analysis"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Password Strength Meter & Generator',
    toolDesc: 'Generate strong passwords and visualize strength with entropy, crack time estimates and per-character analysis. All processing happens locally.',
    length: 'Length',
    generate: 'Generate',
    copy: 'Copy',
    entropy: 'Entropy',
    crackTime: 'Crack Time (online)',
    crackTimeOffline: 'Crack Time (offline)',
    poolSize: 'Pool Size',
    strength: 'Strength',
    veryWeak: 'Very Weak',
    weak: 'Weak',
    fair: 'Fair',
    strong: 'Strong',
    veryStrong: 'Very Strong',
    charAnalysis: 'Character Analysis',
    step1: 'Type a password or click Generate to create one',
    step2: 'Adjust length and character type options',
    step3: 'Review entropy, crack time and strength rating',
    step4: 'Copy the password and use it securely',
  },
  zh: {
    toolTitle: '密码强度检测与生成器',
    toolDesc: '生成强密码并可视化强度 — 显示熵值、破解时间估算和逐字符分析。所有处理完全在浏览器本地运行。',
    length: '长度',
    generate: '生成',
    copy: '复制',
    entropy: '熵值',
    crackTime: '破解时间（在线）',
    crackTimeOffline: '破解时间（离线）',
    poolSize: '字符池',
    strength: '强度',
    veryWeak: '非常弱',
    weak: '弱',
    fair: '一般',
    strong: '强',
    veryStrong: '非常强',
    charAnalysis: '字符分析',
    step1: '输入密码或点击「生成」创建新密码',
    step2: '调整长度和字符类型选项',
    step3: '查看熵值、破解时间和强度评级',
    step4: '复制密码并安全使用',
  }
});

const { $, copyText, t } = GZ;

function getPool() {
  let pool = '';
  if ($('#upper').checked) pool += 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
  if ($('#lower').checked) pool += 'abcdefghijklmnopqrstuvwxyz';
  if ($('#digits').checked) pool += '0123456789';
  if ($('#symbols').checked) pool += '!@#$%^&*()_+-=[]{}|;:,.<>?';
  if ($('#excludeAmbig').checked) pool = pool.replace(/[0O1lI]/g, '');
  return pool || 'abcdefghijklmnopqrstuvwxyz';
}

function generatePassword() {
  const pool = getPool();
  const len = +$('#len').value;
  const arr = new Uint32Array(len);
  crypto.getRandomValues(arr);
  let pw = '';
  for (let i = 0; i < len; i++) pw += pool[arr[i] % pool.length];
  $('#password').value = pw;
  analyze();
}

function analyze() {
  const pw = $('#password').value;
  if (!pw) { $('#stats').innerHTML=''; $('#analysis').innerHTML=''; $('#bar').style.width='0%'; return; }
  const len = pw.length;
  let hasUpper=false,hasLower=false,hasDigit=false,hasSymbol=false;
  for (const c of pw) {
    if (/[A-Z]/.test(c)) hasUpper=true;
    else if (/[a-z]/.test(c)) hasLower=true;
    else if (/[0-9]/.test(c)) hasDigit=true;
    else hasSymbol=true;
  }
  let poolSize=0;
  if(hasUpper)poolSize+=26;if(hasLower)poolSize+=26;if(hasDigit)poolSize+=10;if(hasSymbol)poolSize+=26;
  if(poolSize===0)poolSize=26;
  const entropy = Math.log2(Math.pow(poolSize, len));
  const onlineSeconds = Math.pow(poolSize, len) / 1000; // 1000 guesses/s
  const offlineSeconds = Math.pow(poolSize, len) / 1e10; // 10B guesses/s

  let str, color, pct;
  if (entropy < 28) { str=t('veryWeak');color='#e94560';pct=10; }
  else if (entropy < 36) { str=t('weak');color='#f97316';pct=25; }
  else if (entropy < 60) { str=t('fair');color='#fbbf24';pct=50; }
  else if (entropy < 80) { str=t('strong');color:'#22c55e';pct=75; }
  else { str=t('veryStrong');color='#0f766e';pct=100; }

  $('#bar').style.width=pct+'%';$('#bar').style.background=color;

  function fmtTime(s) {
    if(!isFinite(s))return '∞';
    if(s<1)return '<1s';if(s<60)return Math.round(s)+'s';if(s<3600)return Math.round(s/60)+'m';
    if(s<86400)return Math.round(s/3600)+'h';if(s<31536000)return Math.round(s/86400)+'d';
    if(s<31536000*1000)return Math.round(s/31536000)+'y';if(s<31536000*1e6)return Math.round(s/31536000/1000)+'K y';
    if(s<31536000*1e9)return Math.round(s/31536000/1e6)+'M y';
    return Math.round(s/31536000/1e9)+'B y';
  }

  $('#stats').innerHTML=`
    <div class="stat-card"><div class="val" style="color:${color}">${entropy.toFixed(0)} bits</div><div class="lbl">${t('entropy')}</div></div>
    <div class="stat-card"><div class="val">${poolSize}</div><div class="lbl">${t('poolSize')}</div></div>
    <div class="stat-card"><div class="val">${fmtTime(onlineSeconds)}</div><div class="lbl">${t('crackTime')}</div></div>
    <div class="stat-card"><div class="val">${fmtTime(offlineSeconds)}</div><div class="lbl">${t('crackTimeOffline')}</div></div>
    <div class="stat-card"><div class="val" style="color:${color}">${str}</div><div class="lbl">${t('strength')}</div></div>`;

  let chars = '';
  for (const c of pw) {
    let col = '#888';
    if (/[A-Z]/.test(c)) col = '#61afef';
    else if (/[a-z]/.test(c)) col = '#00d672';
    else if (/[0-9]/.test(c)) col = '#fbbf24';
    else col = '#e94560';
    chars += `<span class="char-bar" style="background:${col}"></span>`;
  }
  $('#analysis').innerHTML = `<b>${t('charAnalysis')}</b> (${len} chars)<br>${chars}<br>
    <span style="color:#61afef">■</span> Upper &nbsp; <span style="color:#00d672">■</span> Lower &nbsp; <span style="color:#fbbf24">■</span> Digit &nbsp; <span style="color:#e94560">■</span> Symbol`;
}

$('#password').addEventListener('input', analyze);
$('#len').addEventListener('input', e=>{$('#len-val').textContent=e.target.value;analyze()});
['upper','lower','digits','symbols','excludeAmbig'].forEach(id=>$('#'+id).addEventListener('change',()=>{if($('#password').value)analyze()}));

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="generatePassword()">${t('generate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="copyText($('#password').value)">${t('copy')}</button>`;

generatePassword();

GZ.renderToolPage({
  category: 'dev',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🔑', href:'/dev/password-generator.html', name:'Password Gen'},
    {icon:'🔐', href:'/dev/password-entropy.html', name:'Entropy'},
    {icon:'🛡️', href:'/dev/password-audit.html', name:'Password Audit'},
    {icon:'🔏', href:'/dev/hmac.html', name:'HMAC'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
