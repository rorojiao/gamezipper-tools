<script>
GZI18n.register({
  en: {
    toolTitle: 'Free Birthday Card Maker',
    toolDesc: 'Make a personalized birthday card online. Pick a festive theme, add the recipient name, message and signature, choose colors and confetti. Download a shareable PNG — free, no signup, no watermark.',
    download: 'Download PNG',
    lblName: 'Recipient Name', lblMsg: 'Birthday Message', lblSig: 'Signature (optional)',
    lblTheme: 'Theme', lblConfetti: 'Confetti', lblC1: 'Color 1', lblC2: 'Color 2', lblAge: 'Age (optional)',
    step1: 'Type the birthday person\'s name',
    step2: 'Write your message and signature',
    step3: 'Pick a festive theme and colors',
    step4: 'Toggle confetti and Download PNG',
  },
  zh: {
    toolTitle: '免费生日贺卡制作工具',
    toolDesc: '在线制作个性化生日贺卡。选择节日主题、添加寿星名字、祝福语和签名、选择颜色和彩纸效果。下载可分享的 PNG — 免费、无水印、无需注册。',
    download: '下载 PNG',
    lblName: '寿星姓名', lblMsg: '生日祝福语', lblSig: '签名（可选）',
    lblTheme: '主题', lblConfetti: '彩纸效果', lblC1: '颜色 1', lblC2: '颜色 2', lblAge: '年龄（可选）',
    step1: '输入寿星的名字',
    step2: '写下祝福语和签名',
    step3: '选择节日主题和颜色',
    step4: '开启彩纸效果并下载 PNG',
  }
});

const { $, t } = GZ;

const THEME_PRESETS = {
  balloons: ['#ff6b9d','#feca57'],
  confetti: ['#5f27cd','#ee5253'],
  gold: ['#bf953f','#fcf6ba'],
  pastel: ['#a8e6cf','#ffd3b6'],
  dark: ['#0f0c29','#302b63'],
  bold: ['#fc5185','#3fc1c9'],
};

let rngState = 1;
function srand(){ rngState = (rngState*1664525+1013904223)%4294967296; return rngState/4294967296; }

function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);
  ctx.arcTo(x,y,x+w,y,r);
  ctx.closePath();
}

function wrapLines(ctx,text,maxW){
  const words=text.split(' ');let line='';const lines=[];
  for(const w of words){const test=line?line+' '+w:w;if(ctx.measureText(test).width>maxW&&line){lines.push(line);line=w}else line=test}
  if(line)lines.push(line);
  return lines;
}

function drawBalloons(ctx,W,H,c1,c2){
  const colors=[c1,c2,'#fff','#ffd700'];
  rngState=42;
  for(let i=0;i<14;i++){
    const x=srand()*W, y=80+srand()*180, r=18+srand()*22;
    const col=colors[Math.floor(srand()*colors.length)];
    ctx.fillStyle=col;ctx.globalAlpha=0.7;
    ctx.beginPath();ctx.ellipse(x,y,r,r*1.15,0,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;
    ctx.strokeStyle='rgba(255,255,255,0.4)';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(x,y+r*1.15);ctx.lineTo(x,y+r*1.15+50+srand()*80);ctx.stroke();
  }
}

function drawConfetti(ctx,W,H,c1,c2){
  const colors=[c1,c2,'#fff','#48dbfb','#1dd1a1','#feca57'];
  rngState=7;
  for(let i=0;i<80;i++){
    const x=srand()*W, y=srand()*H, size=4+srand()*8;
    const col=colors[Math.floor(srand()*colors.length)];
    ctx.fillStyle=col;ctx.globalAlpha=0.7;
    ctx.save();ctx.translate(x,y);ctx.rotate(srand()*Math.PI*2);
    if(i%2===0)ctx.fillRect(-size/2,-size/4,size,size/2);
    else{ctx.beginPath();ctx.arc(0,0,size/2,0,Math.PI*2);ctx.fill();}
    ctx.restore();
  }
  ctx.globalAlpha=1;
}

function render(){
  const c=$('#canvas'),ctx=c.getContext('2d');
  const W=c.width,H=c.height;
  const theme=$('#theme').value;
  const [pc1,pc2]=THEME_PRESETS[theme];
  const c1=$('#color1').value, c2=$('#color2').value;
  // BG
  const grad=ctx.createLinearGradient(0,0,W,H);
  grad.addColorStop(0,c1);grad.addColorStop(1,c2);
  ctx.fillStyle=grad;ctx.fillRect(0,0,W,H);

  // Theme decorations
  if(theme==='balloons')drawBalloons(ctx,W,H,c1,c2);
  if($('#confetti').value==='on'||theme==='confetti')drawConfetti(ctx,W,H,c1,c2);

  // Central card panel
  ctx.fillStyle='rgba(255,255,255,0.95)';
  roundRect(ctx,80,260,W-160,H-360,28);ctx.fill();
  ctx.strokeStyle='rgba(0,0,0,0.06)';ctx.lineWidth=2;ctx.stroke();

  const cx=W/2;
  // HAPPY BIRTHDAY title
  ctx.fillStyle=c1;
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.font='900 64px Georgia, serif';
  ctx.fillText('Happy Birthday',cx,360);

  // Name
  ctx.fillStyle=c2;
  ctx.font='italic 700 80px Georgia, serif';
  let name=$('#name').value||'Friend';
  let fs=80;
  while(ctx.measureText(name).width>W-260&&fs>32){fs-=4;ctx.font=`italic 700 ${fs}px Georgia, serif`;}
  ctx.fillText(name,cx,470);

  // Age badge
  const age=$('#age').value.trim();
  if(age){
    ctx.fillStyle=c1;
    ctx.beginPath();ctx.arc(cx,560,46,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#fff';ctx.font='900 36px Arial';
    ctx.fillText(age,cx,560);
  }

  // Message
  ctx.fillStyle='#444';
  ctx.font='400 24px Verdana, sans-serif';
  const lines=wrapLines(ctx,$('#msg').value||'',W-260);
  let y=age?650:600;
  lines.slice(0,4).forEach(ln=>{ctx.fillText(ln,cx,y);y+=36;});

  // Signature
  if($('#sig').value){
    y+=10;
    ctx.fillStyle=c1;
    ctx.font='italic 600 26px Georgia, serif';
    ctx.fillText($('#sig').value,cx,y);
  }

  // Cake emoji at bottom
  ctx.font='80px Arial';
  ctx.fillText('🎂',cx,H-130);
}

function downloadPNG(){
  const link=document.createElement('a');
  const name=($('#name').value||'birthday').replace(/[^a-zA-Z0-9]/g,'_').toLowerCase()||'birthday';
  link.download=name+'-birthday-card.png';
  link.href=$('#canvas').toDataURL('image/png');
  link.click();
}

$('#lbl-name').textContent=t('lblName');
$('#lbl-msg').textContent=t('lblMsg');
$('#lbl-sig').textContent=t('lblSig');
$('#lbl-theme').textContent=t('lblTheme');
$('#lbl-confetti').textContent=t('lblConfetti');
$('#lbl-c1').textContent=t('lblC1');
$('#lbl-c2').textContent=t('lblC2');
$('#lbl-age').textContent=t('lblAge');

['name','msg','sig','color1','color2','age'].forEach(id=>$('#'+id).addEventListener('input',render));
['theme','confetti'].forEach(id=>$('#'+id).addEventListener('change',()=>{
  const [a,b]=THEME_PRESETS[$('#theme').value];
  $('#color1').value=a;$('#color2').value=b;
  render();
}));

render();

$('#toolbar').innerHTML=`
  <button class="gz-btn" onclick="downloadPNG()">${t('download')}</button>`;

GZ.renderToolPage({
  category: 'image',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🎫', href:'/image/flyer-maker.html', name:'Flyer Maker'},
    {icon:'🖼️', href:'/image/poster-maker.html', name:'Poster Maker'},
    {icon:'📢', href:'/image/banner-maker.html', name:'Banner Maker'},
    {icon:'💌', href:'/image/bio-link.html', name:'Bio Link Maker'},
  ]
});
</script>
