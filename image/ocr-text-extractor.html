<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="gz-drop" id="drop" onclick="$('#file').click()">
      <p id="drop-hint"></p>
      <p id="drop-sub"></p>
      <input type="file" id="file" accept="image/*" style="display:none" onchange="handleFile(this.files[0])">
    </div>
    <img id="preview" class="gz-preview" style="display:none">
    <div class="gz-field" style="margin-top:14px">
      <label id="lbl-lang"></label>
      <select id="lang">
        <option value="eng">English</option>
        <option value="chi_sim">中文（简体）</option>
        <option value="chi_tra">中文（繁體）</option>
        <option value="jpn">日本語</option>
        <option value="kor">한국어</option>
        <option value="ara">العربية</option>
        <option value="hin">हिन्दी</option>
        <option value="rus">Русский</option>
        <option value="spa">Español</option>
        <option value="fra">Français</option>
        <option value="deu">Deutsch</option>
        <option value="ita">Italiano</option>
        <option value="por">Português</option>
        <option value="tha">ภาษาไทย</option>
        <option value="vie">Tiếng Việt</option>
      </select>
    </div>
    <div class="gz-field">
      <label id="lbl-out"></label>
      <div class="gz-output" id="output"></div>
    </div>
    <div id="status"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script>
GZI18n.register({
  en: {
    toolTitle: 'OCR Text Extractor',
    toolDesc: 'Extract text from images, screenshots and scanned documents. Free OCR powered by Tesseract.js — supports 100+ languages. 100% in your browser, no upload.',
    dropHint: '📎 Click or drop an image here',
    dropSub: 'JPG, PNG, WebP, BMP — text is recognized locally in your browser',
    language: 'Recognition Language',
    output: 'Extracted Text',
    extracting: 'Extracting text…',
    noText: 'No text detected. Try a clearer image or a different language.',
    step1: 'Click the drop area or drag an image file onto it',
    step2: 'Select the language of the text in the image',
    step3: 'Wait a few seconds while Tesseract.js processes locally',
    step4: 'Copy the extracted text from the output box',
  },
  zh: {
    toolTitle: 'OCR 文字提取器',
    toolDesc: '从图片、截图和扫描文档中提取文字。由 Tesseract.js 提供免费 OCR — 支持 100+ 种语言。100% 浏览器本地运行，不上传。',
    dropHint: '📎 点击或拖入图片',
    dropSub: '支持 JPG、PNG、WebP、BMP — 文字在浏览器本地识别',
    language: '识别语言',
    output: '提取的文字',
    extracting: '正在提取文字…',
    noText: '未检测到文字。请尝试更清晰的图片或更换语言。',
    step1: '点击拖放区或将图片拖入',
    step2: '选择图片中文字的语言',
    step3: '等待几秒，Tesseract.js 在本地处理',
    step4: '从输出框复制提取的文字',
  }
});

const { $, copyText, t } = GZ;

$('#drop-hint').textContent = t('dropHint');
$('#drop-sub').textContent = t('dropSub');
$('#lbl-lang').textContent = t('language');
$('#lbl-out').textContent = t('output');

$('#drop').addEventListener('dragover', e => { e.preventDefault(); $('#drop').classList.add('dragover'); });
$('#drop').addEventListener('dragleave', () => $('#drop').classList.remove('dragover'));
$('#drop').addEventListener('drop', e => {
  e.preventDefault();
  $('#drop').classList.remove('dragover');
  if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
});

function handleFile(file) {
  if (!file || !file.type.startsWith('image/')) return;
  const reader = new FileReader();
  reader.onload = e => {
    $('#preview').src = e.target.result;
    $('#preview').style.display = 'block';
    runOCR(e.target.result);
  };
  reader.readAsDataURL(file);
}

async function runOCR(dataUrl) {
  $('#output').innerHTML = `<span class="gz-loading"></span>${t('extracting')}`;
  $('#status').innerHTML = '';
  try {
    const lang = $('#lang').value;
    const result = await Tesseract.recognize(dataUrl, lang, {
      logger: m => {
        if (m.status === 'recognizing text') {
          $('#output').innerHTML = `<span class="gz-loading"></span>${t('extracting')} ${Math.round(m.progress*100)}%`;
        }
      }
    });
    const text = result.data.text.trim();
    $('#output').textContent = text || t('noText');
  } catch (e) {
    $('#output').textContent = 'Error: ' + e.message;
  }
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="$('#file').click()">${t('upload')||'Upload'}</button>
  <button class="gz-btn gz-btn-secondary" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#output').textContent='';$('#preview').style.display='none'">${t('clear')}</button>`;

GZ.renderToolPage({
  category: 'image',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🖼️', href:'/image/image-to-base64.html', name:'Image to Base64'},
    {icon:'📦', href:'/image/compressor.html', name:'Image Compressor'},
    {icon:'🔍', href:'/image/color-extractor.html', name:'Color Extractor'},
    {icon:'📐', href:'/image/resizer.html', name:'Image Resizer'},
  ]
});
</script>
<script src="/tools-result-rec.js?v=20260707v520" defer></script>
</body>
</html>
