const { $, copyText, t } = GZ;

// AI-typical transition phrases / formal connector words
const AI_PHRASES = [
  'in conclusion','furthermore','moreover','additionally','in summary','to summarize',
  'it is important to note','it is worth noting','it should be noted','it is essential',
  'delve into','navigating the','in the realm of','in today\'s digital age','in the digital age',
  'in an ever-evolving','in an era of','it is crucial','plays a crucial role','plays a vital role',
  'underscores the importance','highlights the importance','when it comes to','having said that',
  'on the other hand','first and foremost','last but not least','a wide range of','a variety of',
  'in this article, we will','this article will','we will explore','let us explore',
  '总之','此外','不仅如此','值得一提的是','值得关注的是','在当今时代',
];

const AI_FILLERS = ['tapestry','vibrant','myriad','plethora','landscape','realm','leverage','harness','embark','delve','navigate','robust','seamless','streamline','elevate','foster','facilitate','realm','endeavor','commence','beacon','pivotal','paramount','synergy','holistic','paradigm','meticulous','profound','intricate','vital','essential','fundamental','pivotal role','vital role','crucial role'];

function splitSentences(text) {
  // Handle common abbreviations
  const t = text.replace(/\b(Mr|Mrs|Ms|Dr|Prof|Sr|Jr|St|vs|e\.g|i\.e|U\.S|U\.K|etc)\./gi, '$1<DOT>');
  const parts = t.split(/(?<=[.!?])\s+(?=[A-Z\"\'\u4e00-\u9fa5])/);
  return parts.map(s => s.replace(/<DOT>/g, '.')).filter(s => s.trim().length);
}

function countWords(text) {
  if (/[\u4e00-\u9fa5]/.test(text)) {
    // Chinese: count CJK chars + latin words
    const cjk = (text.match(/[\u4e00-\u9fa5]/g) || []).length;
    const latin = (text.match(/[a-zA-Z]+/g) || []).length;
    return cjk + latin;
  }
  return (text.match(/[a-zA-Z]+/g) || []).length;
}

function analyze(text) {
  const lower = text.toLowerCase();
  const sentences = splitSentences(text);
  const words = (lower.match(/[a-zA-Z\u4e00-\u9fa5]+/g) || []);
  const wordCount = words.length;
  
  // 1. Burstiness - variance in sentence length
  const sentLengths = sentences.map(s => countWords(s));
  const avgLen = sentLengths.length ? sentLengths.reduce((a,b)=>a+b,0)/sentLengths.length : 0;
  const variance = sentLengths.length ? sentLengths.reduce((a,b)=>a+(b-avgLen)**2,0)/sentLengths.length : 0;
  const stdDev = Math.sqrt(variance);
  const cv = avgLen ? stdDev/avgLen : 0; // coefficient of variation
  // AI text typically has low burstiness (cv < 0.35), human cv > 0.55
  const burstinessScore = Math.max(0, Math.min(100, 100 - cv * 150));
  
  // 2. Vocabulary diversity (type-token ratio)
  const unique = new Set(words);
  const ttr = wordCount ? unique.size/wordCount : 0;
  // AI tends toward higher TTR (more diverse vocabulary) when perfect, or lower when generic
  // 0.55-0.65 typical for human, 0.6-0.8 for AI
  let vocScore = 50;
  if (ttr > 0.65) vocScore = 70 + (ttr - 0.65) * 100;
  else if (ttr < 0.45) vocScore = 30;
  else vocScore = 40 + (ttr - 0.45) * 150;
  vocScore = Math.max(0, Math.min(100, vocScore));
  
  // 3. AI transitional phrases
  let phraseHits = 0;
  AI_PHRASES.forEach(p => { if (lower.includes(p)) phraseHits++; });
  const phraseScore = Math.min(100, phraseHits * 18);
  
  // 4. Punctuation uniformity - AI tends to use . and , with low variety
  const punctSet = new Set(text.match(/[.,;:!?\-—()"]/g) || []);
  const punctVariety = punctSet.size;
  let punctScore = 50;
  if (punctVariety <= 2) punctScore = 80;
  else if (punctVariety <= 4) punctScore = 65;
  else if (punctVariety >= 7) punctScore = 25;
  punctScore = Math.max(0, Math.min(100, punctScore));
  
  // 5. Passive voice (rough heuristic)
  const passiveCount = (lower.match(/\b(is|are|was|were|be|been|being)\s+\w+(ed|en)\b/g) || []).length;
  const passiveRatio = wordCount ? passiveCount/wordCount : 0;
  let passiveScore = 40;
  if (passiveRatio > 0.05) passiveScore = 70 + (passiveRatio - 0.05) * 600;
  passiveScore = Math.max(0, Math.min(100, passiveScore));
  
  // 6. List/structure patterns (colons, semicolons in formal patterns)
  const semicolons = (text.match(/;/g) || []).length;
  const dashes = (text.match(/—/g) || []).length;
  const lists = (text.match(/^[\s]*[-•*]\s/gm) || []).length;
  let structScore = 30;
  if (semicolons > 4) structScore += 25;
  if (dashes > 3) structScore += 20;
  if (lists > 5) structScore += 20;
  structScore = Math.max(0, Math.min(100, structScore));
  
  // 7. Word count
  let lengthScore = 30;
  if (wordCount < 30) lengthScore = 80;
  else if (wordCount < 50) lengthScore = 60;
  else if (wordCount > 100) lengthScore = 30;
  lengthScore = Math.max(0, Math.min(100, lengthScore));
  
  // Weighted average
  const weights = { burst: 0.22, voc: 0.18, phrase: 0.22, punct: 0.12, passive: 0.10, struct: 0.10, length: 0.06 };
  const overall = burstinessScore*weights.burst + vocScore*weights.voc + phraseScore*weights.phrase + 
    punctScore*weights.punct + passiveScore*weights.passive + structScore*weights.struct + lengthScore*weights.length;
  
  // Per-sentence AI likelihood
  const sentScores = sentences.map(s => {
    const sl = s.toLowerCase();
    let score = 0;
    if (countWords(s) > 25 && countWords(s) < 45) score += 20; // uniform sentence length
    AI_PHRASES.forEach(p => { if (sl.includes(p)) score += 25; });
    AI_FILLERS.forEach(w => { if (new RegExp('\\b'+w+'\\b').test(sl)) score += 8; });
    if (sl.split('.').length > 3) score += 10;
    return Math.min(100, score);
  });
  
  // Flagged sentences
  const flags = [];
  sentences.forEach((s, i) => {
    if (sentScores[i] >= 60) flags.push({idx: i, text: s, level: 'ai', score: sentScores[i]});
    else if (sentScores[i] >= 30) flags.push({idx: i, text: s, level: 'mix', score: sentScores[i]});
  });
  
  return {
    overall: Math.round(overall),
    signals: {burst: burstinessScore, voc: vocScore, phrase: phraseScore, punct: punctScore, passive: passiveScore, struct: structScore, length: lengthScore},
    sentences, sentScores, flags, wordCount, sentenceCount: sentences.length
  };
}

function classify(score) {
  if (score < 40) return {v: 'human', label: t('verdictHuman'), sub: t('subHuman')};
  if (score < 65) return {v: 'mix', label: t('verdictMix'), sub: t('subMix')};
  return {v: 'ai', label: t('verdictAI'), sub: t('subAI')};
}

function colorLevel(v) {
  if (v >= 65) return 'high';
  if (v >= 40) return 'mid';
  return 'low';
}

function sigLabel(key) {
  return t('sig' + key.charAt(0).toUpperCase() + key.slice(1));
}

function render() {
  const text = $('#input').value.trim();
  $('#lbl-counter').textContent = `${countWords(text)} ` + (GZI18n.getLang()==='zh'?'字':'words');
  if (!text) {
    $('#score').textContent = '0';
    $('#verdict').textContent = '';
    $('#verdict').className = 'ad-verdict';
    $('#sub-verdict').textContent = '';
    $('#signals').innerHTML = '';
    $('#highlight').innerHTML = '';
    $('#meter-arc').setAttribute('stroke-dashoffset', 471);
    return;
  }
  const r = analyze(text);
  $('#score').textContent = r.overall;
  const c = classify(r.overall);
  $('#verdict').textContent = c.label;
  $('#verdict').className = 'ad-verdict ' + c.v;
  $('#sub-verdict').textContent = c.sub;
  // Animate arc
  const offset = 471 - (471 * r.overall / 100);
  $('#meter-arc').setAttribute('stroke-dashoffset', offset);
  const meterColor = r.overall >= 65 ? '#ef4444' : r.overall >= 40 ? '#f59e0b' : '#10b981';
  $('#meter-arc').setAttribute('stroke', meterColor);
  
  // Signals
  const order = ['burst','voc','phrase','punct','passive','struct','length'];
  $('#signals').innerHTML = order.map(k => {
    const v = Math.round(r.signals[k]);
    return `<div class="ad-sig"><span class="name">${sigLabel(k)}</span><span class="val ${colorLevel(v)}">${v}%</span></div>`;
  }).join('');
  
  // Highlighted sentences
  $('#highlight').innerHTML = r.sentences.map((s, i) => {
    const sc = r.sentScores[i];
    const cls = sc >= 60 ? 'sh' : sc >= 30 ? 'sm' : 'sl';
    const tip = `${sc}% AI`;
    return `<span class="${cls}" title="${tip}">${escapeHtml(s)}</span>`;
  }).join(' ');
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function loadExample() {
  $('#input').value = `In today's rapidly evolving digital landscape, the role of artificial intelligence in shaping modern workflows cannot be overstated. It is important to note that organizations across a wide range of industries are increasingly leveraging AI-powered tools to streamline their operations and elevate productivity. Furthermore, this article will explore the myriad ways in which machine learning models can enhance decision-making processes, foster innovation, and ultimately drive sustainable growth. The pivotal role of data cannot be ignored. First and foremost, high-quality datasets are essential for training robust models. Moreover, having said that, the seamless integration of AI into existing infrastructure requires a holistic approach that takes into account both technical and organizational factors. In conclusion, embracing this transformative technology is not merely a strategic advantage but rather a fundamental necessity in the modern era.`;
  render();
}

function doClear() { $('#input').value = ''; render(); }

$('#input').addEventListener('input', render);
$('#input').placeholder = t('ph');
$('#ad-note').textContent = t('note');
$('#btn-example').textContent = t('btnExample');
$('#btn-example').addEventListener('click', loadExample);

$('#btn-clear').addEventListener('click', doClear);

$('#lbl-score').textContent = t('lblScore');
