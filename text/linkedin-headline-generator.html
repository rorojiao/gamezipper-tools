<div class="gz-container">

    <h1 id="title"></h1>

  </div>
  <div class="gz-tool-area">
    <div class="gz-split">
      <div>
        <div class="gz-field">
          <label id="lbl-job"></label>
          <input id="job" type="text" placeholder="Product Manager" maxlength="60">
        </div>
        <div class="gz-field">

        </div>
        <div class="gz-field">

          <input id="industry" type="text" placeholder="SaaS / Fintech" maxlength="40">
        </div>
        <div class="gz-field">

          <input id="audience" type="text" placeholder="helping startups scale" maxlength="60">
        </div>

</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'LinkedIn Headline Generator',
    toolDesc: 'Turn your role and skills into 12+ recruiter-friendly LinkedIn headlines. Choose a style, copy in one click, and watch the character count stay under the 220 limit.',
    lblJob: 'Your job title',
    lblSkill: 'Top skills (comma-separated)',
    lblIndustry: 'Industry or niche',
    lblAudience: 'Value / who you help (optional)',
    lblStyle: 'Headline style',
    lblOut: 'Generated Headlines',
    generate: 'Generate Headlines',
    styleAuth: 'Authority',
    styleKeyword: 'Keyword',
    styleBenefit: 'Benefit',
    styleCreative: 'Creative',
    styleAll: 'All styles',
    step1: 'Fill in your job title and top skills',
    step2: 'Optionally add your industry and the value you deliver',
    step3: 'Pick a headline style (or show all)',
    step4: 'Click any headline to copy it to your clipboard',
    hint: 'Tip: paste a headline into your LinkedIn "Edit Profile" headline field.',
  },
  zh: {
    toolTitle: 'LinkedIn 标题生成器',
    toolDesc: '把你的职位和技能转换为 12+ 个吸引招聘者的 LinkedIn 标题。选择风格、一键复制，并实时查看字符数是否在 220 限制内。',
    lblJob: '你的职位',
    lblSkill: '核心技能（逗号分隔）',
    lblIndustry: '行业或细分领域',
    lblAudience: '价值 / 服务对象（可选）',
    lblStyle: '标题风格',
    lblOut: '生成的标题',
    generate: '生成标题',
    styleAuth: '权威型',
    styleKeyword: '关键词型',
    styleBenefit: '价值型',
    styleCreative: '创意型',
    styleAll: '全部风格',
    step1: '填写你的职位和核心技能',
    step2: '可选填写你的行业和提供的价值',
    step3: '选择标题风格（或显示全部）',
    step4: '点击任意标题即可复制到剪贴板',
    hint: '提示：将标题粘贴到 LinkedIn「编辑个人资料」的标题字段。',
  }
});

const { $, copyText, t, showToast } = GZ;

const STYLES = ['styleAuth','styleKeyword','styleBenefit','styleCreative'];
let currentStyle = 'all';

function escapeHtml(s){return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

function buildHeadlines(job, skill, industry, audience){
  job = (job||'').trim(); skill=(skill||'').trim();
  industry=(industry||'').trim(); audience=(audience||'').trim();
  const skills = skill.split(/[,，、]/).map(s=>s.trim()).filter(Boolean);
  const s1 = skills[0]||'';
  const s2 = skills.slice(0,2).join(' & ') || s1;
  const sList = skills.slice(0,3).join(', ') || s1;
  const j = job || 'Professional';
  const ind = industry || '';
  const aud = audience || '';

  const groups = {
    styleAuth: [
      `${j} | ${s2}${ind?' @ '+ind:''}`,
      `${j} specializing in ${s1}${ind?' ('+ind+')':''}`,
      `${j} — ${s1} Expert`,
      `Senior ${j} | ${sList}`,
    ],
    styleKeyword: [
      `${j} | ${sList}${ind?' | '+ind:''}`,
      `${j} (${sList})${aud?' | '+aud:''}`,
      `${s1} ${j}${ind?' in '+ind:''}`,
      `${j} · ${s2}${ind?' · '+ind:''}`,
    ],
    styleBenefit: [
      `${j} ${aud||'helping teams grow'} | ${s1}`,
      `${j} | ${aud||'driving results'} with ${s1}`,
      `${j} — ${aud||'building products people love'}`,
      `${s1} ${j}${ind?' for '+ind:''} | ${aud||'delivering impact'}`,
    ],
    styleCreative: [
      `${j} by day, ${s1} nerd by night 🚀`,
      `Making ${ind||'things'} better as a ${j} ✨`,
      `${j}. ${s1}. ${aud||'Always learning.'} 🌱`,
      `Your next great ${j} — ${s2} 💡`,
    ],
  };
  return groups;
}

function generate(){
  const job = $('#job').value, skill=$('#skill').value, industry=$('#industry').value, audience=$('#audience').value;
  if (!job.trim() && !skill.trim()){
    $('#output').innerHTML = `<p style="color:var(--text2);font-size:.88rem">${escapeHtml(t('step1'))}</p>`;
    return;
  }
  const groups = buildHeadlines(job, skill, industry, audience);
  const order = currentStyle==='all' ? STYLES : [currentStyle];
  let html = '';
  let idx = 0;
  for (const g of order){
    const list = groups[g];
    for (const h of list){
      const len = h.length;
      const cls = len>220?'char-warn':(len>180?'char-warn':'char-ok');
      const note = len>220?` (${len}/220 — too long)`:len>180?` (${len}/220)`:` ${len}/220`;
      html += `<div class="headline"><div class="h-txt"><div>${escapeHtml(h)}</div><div class="char-count ${cls}">${note}</div></div><button class="gz-btn gz-btn-secondary h-copy" data-h="${escapeHtml(h)}">${t('copy')}</button></div>`;
      idx++;
    }
    if (currentStyle==='all' && idx < order.length*4){
      // visual separator handled by spacing
    }
  }
  $('#output').innerHTML = html + `<p style="color:var(--text2);font-size:.8rem;margin-top:8px">${escapeHtml(t('hint'))}</p>`;
  $('#output').querySelectorAll('.h-copy').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      copyText(btn.getAttribute('data-h'));
      showToast(t('copied'));
    });
  });
}

$('#gen-btn').addEventListener('click', generate);
['job','skill','industry','audience'].forEach(id=>$('#'+id).addEventListener('keydown', e=>{ if(e.key==='Enter') generate(); }));

// Style tabs
$('#style-tabs').innerHTML = ['all',...STYLES].map(s=>{
  const label = t(s==='all'?'styleAll':s);
  return `<span class="style-tab${s==='all'?' active':''}" data-style="${s}">${label}</span>`;
}).join('');
$('#style-tabs').querySelectorAll('.style-tab').forEach(tab=>{
  tab.addEventListener('click', ()=>{
    $('#style-tabs').querySelectorAll('.style-tab').forEach(x=>x.classList.remove('active'));
    tab.classList.add('active');
    currentStyle = tab.getAttribute('data-style');
    generate();
  });
});

$('#gen-btn').textContent = t('generate');
$('#lbl-out').textContent = t('lblOut');

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📄', href:'/text/resume-builder.html', name:'Resume Builder'},
    {icon:'🧾', href:'/text/ats-resume-checker.html', name:'ATS Resume Checker'},
    {icon:'✉️', href:'/text/cover-letter-generator.html', name:'Cover Letter Generator'},
    {icon:'😊', href:'/text/bio-generator.html', name:'Bio Generator'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
