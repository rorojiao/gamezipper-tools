<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"How do I calculate sales tax?","acceptedAnswer":{"@type":"Answer","text":"Multiply the pre-tax amount by the tax rate (as a decimal), then add it to the original amount. For example, $100 at 8% tax = $100 + ($100 × 0.08) = $108."}},{"@type":"Question","name":"How do I reverse-calculate tax from a total?","acceptedAnswer":{"@type":"Answer","text":"Divide the total by (1 + tax rate). For a $108 total at 8% tax: $108 ÷ 1.08 = $100 pre-tax, and the tax is $8."}},{"@type":"Question","name":"What is the difference between sales tax, VAT and GST?","acceptedAnswer":{"@type":"Answer","text":"Sales tax is added at the point of sale (common in the US). VAT (Value Added Tax) is collected at each production stage (common in Europe). GST (Goods and Services Tax) is similar to VAT, used in Canada, Australia, India and other countries."}},{"@type":"Question","name":"Is this sales tax calculator free and private?","acceptedAnswer":{"@type":"Answer","text":"Yes. It runs entirely in your browser — no data is sent to any server. It is 100% free with no signup required."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-form">
      <div class="mode-toggle">
        <button id="mode-add" class="active" onclick="setMode('add')"></button>
        <button id="mode-reverse" onclick="setMode('reverse')"></button>
      </div>
      <div>
        <label id="lbl-amount"></label>
        <input type="number" id="amount" value="100" min="0" step="0.01">
      </div>
      <div>
        <label id="lbl-rate"></label>
        <input type="number" id="rate" value="8.25" min="0" max="100" step="0.01">
        <div class="quick-rates" id="quick-rates"></div>
      </div>
      <button class="gz-btn" onclick="calculate()" id="btn-calc"></button>
    </div>
    <div class="result-card" id="result" style="display:none">
      <div class="big" id="result-total"></div>
      <div class="label" id="result-total-label"></div>
      <div class="result-grid">
        <div class="result-item"><div class="val" id="result-tax"></div><div class="lbl" id="result-tax-label"></div></div>
        <div class="result-item"><div class="val" id="result-net"></div><div class="lbl" id="result-net-label"></div></div>
        <div class="result-item"><div class="val" id="result-rate"></div><div class="lbl" id="result-rate-label"></div></div>
      </div>
    </div>
    <div id="status"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Sales Tax Calculator',
    toolDesc: 'Add or reverse sales tax, VAT and GST for any amount. Free, private, browser-based — no signup.',
    modeAdd: 'Add Tax (from net)',
    modeReverse: 'Reverse Tax (from total)',
    amount: 'Amount',
    taxRate: 'Tax Rate (%)',
    calculate: 'Calculate',
    totalWithTax: 'Total (with tax)',
    taxAmount: 'Tax Amount',
    netAmount: 'Net Amount (before tax)',
    effectiveRate: 'Tax Rate',
    quickRates: 'Quick rates',
    step1: 'Choose mode: add tax to a net amount, or reverse-calculate from a total',
    step2: 'Enter the amount',
    step3: 'Set the tax rate percentage (use quick buttons for common rates)',
    step4: 'Click Calculate to see the breakdown',
  },
  zh: {
    toolTitle: '销售税计算器',
    toolDesc: '正向加税或反向从含税总额反推税额。支持销售税、增值税(VAT)和消费税(GST)。免费、私密、浏览器本地运行。',
    modeAdd: '正向加税（从税前金额）',
    modeReverse: '反向反推（从含税总额）',
    amount: '金额',
    taxRate: '税率 (%)',
    calculate: '计算',
    totalWithTax: '总额（含税）',
    taxAmount: '税额',
    netAmount: '税前金额',
    effectiveRate: '税率',
    quickRates: '快速选择',
    step1: '选择模式：从税前金额加税，或从含税总额反推',
    step2: '输入金额',
    step3: '设置税率百分比（可用快捷按钮）',
    step4: '点击「计算」查看明细',
  }
});

let mode = 'add';
const { $, copyText, t } = GZ;

function setMode(m) {
  mode = m;
  $('#mode-add').classList.toggle('active', m === 'add');
  $('#mode-reverse').classList.toggle('active', m === 'reverse');
  calculate();
}

const RATES = [0, 5, 6, 7, 7.25, 7.5, 8, 8.25, 8.875, 10, 13.5, 15, 20, 25];
$('#quick-rates').innerHTML = RATES.map(r =>
  `<button onclick="$('#rate').value=${r};calculate()">${r}%</button>`
).join('');

function fmt(n) {
  return n.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function calculate() {
  const amount = parseFloat($('#amount').value);
  const rate = parseFloat($('#rate').value);
  if (isNaN(amount) || isNaN(rate) || amount < 0) {
    $('#result').style.display = 'none';
    return;
  }
  const r = rate / 100;
  let net, tax, total;
  if (mode === 'add') {
    net = amount;
    tax = amount * r;
    total = amount + tax;
  } else {
    total = amount;
    net = amount / (1 + r);
    tax = amount - net;
  }
  $('#result').style.display = 'block';
  $('#result-total').textContent = '$' + fmt(total);
  $('#result-tax').textContent = '$' + fmt(tax);
  $('#result-net').textContent = '$' + fmt(net);
  $('#result-rate').textContent = rate + '%';
}

$('#amount').addEventListener('input', calculate);
$('#rate').addEventListener('input', calculate);
calculate();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🏠', href:'/calc/mortgage-calculator.html', name:'Mortgage'},
    {icon:'💰', href:'/calc/tip-calculator.html', name:'Tip Calculator'},
    {icon:'📊', href:'/calc/percentage-calculator.html', name:'Percentage'},
    {icon:'🧾', href:'/calc/vat-calculator.html', name:'VAT Calculator'},
  ]
});
</script>
