<script>
GZI18n.register({
  en: {
    toolTitle: 'Text Joiner — Merge Lines Online',
    toolDesc: 'Join multiple text lines into a single line with a custom separator. Wrap items in quotes, skip empty lines and join instantly — free and private.',
    inputLabel: 'Input (one item per line)',
    outputLabel: 'Joined Output',
    separator: 'Separator',
    custom: 'Custom',
    quoteWrap: 'Wrap in quotes',
    skipEmpty: 'Skip empty lines',
    join: 'Join',
    example: 'Example',
    copy: 'Copy',
    clear: 'Clear',
    result: (n, c) => `✓ Joined ${n} items, ${c} chars`,
    step1: 'Paste your multi-line text into the input area',
    step2: 'Pick a separator — comma, space, pipe or custom',
    step3: 'Toggle quote-wrapping and empty-line skipping',
    step4: 'Click Copy to copy the joined result',
  },
  zh: {
    toolTitle: '文本合并器 — 多行合并为一行',
    toolDesc: '将多行文本合并为一行，支持自定义分隔符。可将每项用引号包裹、跳过空行，即时合并 — 免费且私密。',
    inputLabel: '输入（每行一项）',
    outputLabel: '合并结果',
    separator: '分隔符',
    custom: '自定义',
    quoteWrap: '用引号包裹',
    skipEmpty: '跳过空行',
    join: '合并',
    example: '示例',
    copy: '复制',
    clear: '清空',
    result: (n, c) => `✓ 已合并 ${n} 项，共 ${c} 字符`,
    step1: '在输入区粘贴多行文本',
    step2: '选择分隔符 — 逗号、空格、竖线或自定义',
    step3: '切换引号包裹和跳过空行选项',
    step4: '点击「复制」将合并结果复制到剪贴板',
  }
});

let sepType = 'comma';
let customSep = ', ';
let quoteWrap = false;
let skipEmpty = true;
const { $, copyText, t } = GZ;

function getSep() {
  switch (sepType) {
    case 'comma': return ', ';
    case 'space': return ' ';
    case 'pipe': return ' | ';
    case 'semicolon': return '; ';
    case 'newline': return '\n';
    case 'tab': return '\t';
    case 'custom': return customSep;
    default: return ', ';
  }
}

function doJoin() {
  const raw = $('#input').value;
  if (!raw.trim()) { $('#output').textContent = ''; $('#status').innerHTML = ''; return; }
  let lines = raw.split(/\r?\n/);
  if (skipEmpty) lines = lines.filter(l => l.trim() !== '');
  if (quoteWrap) lines = lines.map(l => '"' + l.replace(/"/g, '\\"') + '"');
  const sep = getSep();
  const result = lines.join(sep);
  $('#output').textContent = result;
  $('#status').innerHTML = `<span style="color:var(--gz-success)">${t('result', lines.length, result.length)}</span>`;
}

function loadExample() {
  $('#input').value = 'New York\nLos Angeles\nChicago\nHouston\nPhoenix\nPhiladelphia\nSan Antonio\nSan Diego';
  doJoin();
}

function doClear() { $('#input').value = ''; $('#output').textContent = ''; $('#status').innerHTML = ''; }

$('#input').addEventListener('input', doJoin);

$('#controls').innerHTML = `
  <label>${t('separator')}:
    <select id="sepSel" onchange="sepType=this.value;doJoin()">
      <option value="comma">Comma (,)</option>
      <option value="space">Space</option>
      <option value="pipe">Pipe (|)</option>
      <option value="semicolon">Semicolon (;)</option>
      <option value="newline">Newline</option>
      <option value="tab">Tab</option>
      <option value="custom">${t('custom')}</option>
    </select>
  </label>
  <input type="text" id="customSepInput" value=", " style="width:90px;display:none" oninput="customSep=this.value;doJoin()">
  <label><input type="checkbox" id="quoteChk" onchange="quoteWrap=this.checked;doJoin()"> ${t('quoteWrap')}</label>
  <label><input type="checkbox" id="skipChk" checked onchange="skipEmpty=this.checked;doJoin()"> ${t('skipEmpty')}</label>`;

$('#sepSel').addEventListener('change', () => {
  $('#customSepInput').style.display = sepType === 'custom' ? '' : 'none';
});

$('#toolbar').innerHTML = `
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

$('#lbl-in').textContent = t('inputLabel');
$('#lbl-out').textContent = t('outputLabel');

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'➕', href:'/text/add-prefix-suffix.html', name:'Add Prefix/Suffix'},
    {icon:'🔁', href:'/text/text-repeater.html', name:'Text Repeater'},
    {icon:'🧹', href:'/text/remove-empty-lines.html', name:'Remove Empty Lines'},
    {icon:'↕️', href:'/text/sort-lines.html', name:'Sort Lines'},
    {icon:'🔢', href:'/text/number-sorter.html', name:'Number Sorter'},
  ]
});
</script>
