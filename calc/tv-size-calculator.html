<style>
.tv-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin:14px 0}
.tv-in{background:var(--glass2);border:1px solid var(--border);border-radius:10px;padding:12px}
.tv-in label{display:block;font-size:.78em;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.04em}
.tv-in input,.tv-in select{width:100%;padding:8px;background:var(--bg2);color:var(--text);border:1px solid var(--border);border-radius:6px;font-size:1em}
.tv-result{background:linear-gradient(135deg,var(--glass2),var(--glass));border:1px solid var(--border);border-radius:14px;padding:20px;margin-top:14px}
.tv-dims{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:14px}
.tv-dim{background:var(--glass2);border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center}
.tv-dim h4{margin:0 0 4px;font-size:.75em;color:var(--muted);text-transform:uppercase}
.tv-dim .v{font-size:1.5em;font-weight:800;color:var(--accent)}
.tv-dim .c{font-size:.7em;color:var(--muted);margin-top:2px}
.tv-presets{display:flex;flex-wrap:wrap;gap:6px;margin:10px 0}
.tv-presets button{font-size:.85em;padding:6px 10px}
.tv-screen{background:var(--bg2);border:2px solid var(--border);border-radius:8px;margin:14px auto;position:relative;overflow:hidden;aspect-ratio:16/9;max-width:300px;width:100%}
.tv-screen .lbl{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:var(--text);font-size:1.2em;font-weight:700}
.tv-tip{background:var(--glass2);border-left:3px solid var(--accent);padding:10px 14px;border-radius:6px;margin:10px 0;font-size:.9em;line-height:1.55}
</style>
<script type="application/ld+json">{"@context":"https://schema.org","@type":"WebApplication","name":"TV Size Calculator","description":"Find the perfect TV size for your room. Calculate screen width, height, viewing distance and PPI from any diagonal inch measurement. 16:9, 21:9, 4:3 aspect ratios supported.","url":"https://tools.gamezipper.com/calc/tv-size-calculator.html","applicationCategory":"Utility","operatingSystem":"Web Browser","offers":{"@type":"Offer","price":"0"}}</script>
<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "How is TV size measured?", "acceptedAnswer": {"@type": "Answer", "text": "TV size refers to the diagonal length of the screen measured in inches, from the top-left corner to the bottom-right corner. The actual width and height depend on the aspect ratio (16:9 for modern TVs)."}}, {"@type": "Question", "name": "What is the ideal viewing distance for my TV?", "acceptedAnswer": {"@type": "Answer", "text": "A common rule of thumb is 1.5-2.5x the screen diagonal for HD content, and 1-1.5x for 4K. For example, a 55-inch 4K TV has a comfortable viewing distance of 55-83 inches (4.6-6.9 ft)."}}, {"@type": "Question", "name": "What is PPI and why does it matter?", "acceptedAnswer": {"@type": "Answer", "text": "PPI (pixels per inch) measures pixel density. A higher PPI means a sharper image. 4K TVs at typical viewing distances have ~80-100 PPI which exceeds the human eye's resolving power at those distances."}}, {"@type": "Question", "name": "Can I use this for monitor sizing?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. The calculator works for any screen. Just pick the matching aspect ratio — most monitors are 16:9, ultrawides are 21:9, and older 4:3 displays can also be calculated."}}]}</script>

<body>
<div class="gz-container">
<div class="gz-tool-header">
<h1 id="title"></h1>
<p class="desc" id="desc"></p>
</div>
<div class="gz-tool-area">
<div class="gz-toolbar" id="toolbar"></div>
<div class="tv-grid">
<div class="tv-in">
<label id="lbl-diag">Diagonal (inches)</label>
<input type="number" id="diag" value="55" min="10" max="120" step="1">
</div>
<div class="tv-in">
<label id="lbl-ratio">Aspect Ratio</label>
<select id="ratio">
<option value="16:9" selected>16:9 (HD/4K TV)</option>
<option value="21:9">21:9 (Ultrawide/Cinema)</option>
<option value="4:3">4:3 (Older TV/Square)</option>
<option value="32:9">32:9 (Super Ultrawide)</option>
<option value="1:1">1:1 (Square)</option>
</select>
</div>
<div class="tv-in">
<label id="lbl-res">Resolution</label>
<select id="res">
<option value="1920x1080" selected>1920×1080 (Full HD)</option>
<option value="1280x720">1280×720 (HD)</option>
<option value="2560x1440">2560×1440 (QHD)</option>
<option value="3840x2160">3840×2160 (4K UHD)</option>
<option value="7680x4320">7680×4320 (8K)</option>
</select>
</div>
</div>
<div class="tv-presets" id="presets"></div>
<div class="tv-screen" id="screen"><div class="lbl" id="screen-lbl">55"</div></div>
<div class="tv-result">
<div class="tv-dims">
<div class="tv-dim"><h4 id="lbl-w">Width</h4><div class="v"><span id="w-in">47.9</span>"</div><div class="c"><span id="w-cm">121.7</span> cm</div></div>
<div class="tv-dim"><h4 id="lbl-h">Height</h4><div class="v"><span id="h-in">26.9</span>"</div><div class="c"><span id="h-cm">68.5</span> cm</div></div>
<div class="tv-dim"><h4 id="lbl-ppi">PPI (Pixel Density)</h4><div class="v"><span id="ppi">40</span></div><div class="c" id="ppi-c">pixels per inch</div></div>
<div class="tv-dim"><h4 id="lbl-area">Screen Area</h4><div class="v"><span id="area">1290</span></div><div class="c" id="area-c">square inches</div></div>
</div>
<div class="tv-tip" id="tip">
<strong id="tip-h">Viewing distance:</strong> <span id="dist-hd">~83"</span> for HD content, <span id="dist-4k">~55"</span> for 4K (<span id="dist-hd-m">2.1m</span> / <span id="dist-4k-m">1.4m</span>).
</div>
</div>
</div>
<div class="gz-howto"><h2></h2><ol></ol></div>
<div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
en:{
toolTitle:'TV Size Calculator',
toolDesc:'Calculate exact screen width, height, viewing distance and pixel density (PPI) for any TV or monitor. Supports 16:9, 21:9, 4:3, 32:9 and 1:1 aspect ratios.',
lblDiag:'Diagonal (inches)',lblRatio:'Aspect Ratio',lblRes:'Resolution',
lblW:'Width',lblH:'Height',lblPpi:'PPI (Pixel Density)',lblArea:'Screen Area',
ppiC:'pixels per inch',areaC:'square inches',
tipH:'Viewing distance:',
hdFor:'for HD content', fourKFor:'for 4K',
tip1:'Sit ~1.5-2.5× the screen diagonal away for HD',
tip2:'Sit ~1-1.5× the screen diagonal away for 4K',
preset32:'32"',preset43:'43"',preset50:'50"',preset55:'55"',preset65:'65"',preset75:'75"',preset85:'85"',
step1:'Enter the diagonal screen size in inches',
step2:'Choose the aspect ratio and resolution of your display',
step3:'See width, height, area and pixel density update instantly',
step4:'Use the preset buttons for common TV sizes',
},
zh:{
toolTitle:'电视尺寸计算器',
toolDesc:'计算任意电视或显示器的精确宽度、高度、观看距离和像素密度（PPI）。支持 16:9、21:9、4:3、32:9 和 1:1 长宽比。',
lblDiag:'对角线（英寸）',lblRatio:'长宽比',lblRes:'分辨率',
lblW:'宽度',lblH:'高度',lblPpi:'PPI（像素密度）',lblArea:'屏幕面积',
ppiC:'每英寸像素数',areaC:'平方英寸',
tipH:'观看距离：',
hdFor:'（HD 内容）', fourKFor:'（4K 内容）',
tip1:'观看 HD 内容时保持屏幕对角线 1.5-2.5 倍的距离',
tip2:'观看 4K 内容时保持屏幕对角线 1-1.5 倍的距离',
preset32:'32 寸',preset43:'43 寸',preset50:'50 寸',preset55:'55 寸',preset65:'65 寸',preset75:'75 寸',preset85:'85 寸',
step1:'输入屏幕对角线尺寸（英寸）',
step2:'选择显示器的长宽比和分辨率',
step3:'即时查看宽度、高度、面积和像素密度',
step4:'使用预设按钮快速选择常见电视尺寸',
}
});

const {$,t}=GZ;
const presetSizes=[32,43,50,55,65,75,85];
const presetKeys=['preset32','preset43','preset50','preset55','preset65','preset75','preset85'];

function calc(){
  const diag=+($('#diag').value)||55;
  const[rw,rh]=$('#ratio').value.split(':').map(Number);
  const[pxw,pxh]=$('#res').value.split('x').map(Number);
  // Compute width and height from diagonal using Pythagoras
  const ratioSum=Math.sqrt(rw*rw+rh*rh);
  const w=(diag*rw)/ratioSum;
  const h=(diag*rh)/ratioSum;
  const wCm=(w*2.54).toFixed(1);
  const hCm=(h*2.54).toFixed(1);
  $('#w-in').textContent=w.toFixed(1);
  $('#h-in').textContent=h.toFixed(1);
  $('#w-cm').textContent=wCm;
  $('#h-cm').textContent=hCm;
  $('#screen-lbl').textContent=diag+'"';
  // PPI: use the actual physical width
  const ppi=(pxw/w).toFixed(0);
  $('#ppi').textContent=ppi;
  const area=Math.round(w*h);
  $('#area').textContent=area;
  // Viewing distance: HD = 1.5-2.5x, 4K = 1-1.5x
  const distHd=Math.round(diag*1.8);
  const dist4k=Math.round(diag*1.2);
  $('#dist-hd').textContent='~'+distHd+'"';
  $('#dist-4k').textContent='~'+dist4k+'"';
  $('#dist-hd-m').textContent=(distHd*0.0254).toFixed(1)+'m';
  $('#dist-4k-m').textContent=(dist4k*0.0254).toFixed(1)+'m';
  // Labels
  $('#lbl-diag').textContent=t('lblDiag');
  $('#lbl-ratio').textContent=t('lblRatio');
  $('#lbl-res').textContent=t('lblRes');
  $('#lbl-w').textContent=t('lblW');
  $('#lbl-h').textContent=t('lblH');
  $('#lbl-ppi').textContent=t('lblPpi');
  $('#lbl-area').textContent=t('lblArea');
  $('#ppi-c').textContent=t('ppiC');
  $('#area-c').textContent=t('areaC');
  $('#tip-h').textContent=t('tipH');
}

function renderPresets(){
  $('#presets').innerHTML=presetSizes.map((s,i)=>`<button class="gz-btn gz-btn-secondary" onclick="$('#diag').value=${s};calc()">${t(presetKeys[i])}</button>`).join('');
}

['diag','ratio','res'].forEach(id=>$('#'+id).addEventListener('input',calc));
$('#diag').addEventListener('input',()=>{renderPresets();});

$('#toolbar').innerHTML=`<button class="gz-btn" onclick="GZ.copyText('TV '+document.getElementById('diag').value+' inches = '+document.getElementById('w-in').textContent+'x'+document.getElementById('h-in').textContent+' inches ('+document.getElementById('w-cm').textContent+'x'+document.getElementById('h-cm').textContent+' cm), '+document.getElementById('ppi').textContent+' PPI')">${t('copy')}</button><button class="gz-btn gz-btn-secondary" onclick="$('#diag').value=55;$('#ratio').value='16:9';$('#res').value='3840x2160';calc()">${t('example')}</button>`;

GZ.renderToolPage({category:'calc',titleKey:'toolTitle',descKey:'toolDesc',howToSteps:['step1','step2','step3','step4'],related:[
  {icon:'🖥️',href:'/dev/screen-resolution.html',name:'Screen Resolution'},
  {icon:'📐',href:'/calc/aspect-ratio.html',name:'Aspect Ratio'},
  {icon:'📏',href:'/dev/css-units.html',name:'CSS Units'},
  {icon:'📊',href:'/dev/rem-px.html',name:'REM ↔ PX'},
]});
renderPresets();calc();
</script>
<script src="/tools-result-rec.js" defer></script>
</body></html>
