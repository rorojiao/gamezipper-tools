function countSigFigs(s) {
  s = String(s).trim().toLowerCase().replace(/\s/g, '');
  if (!s) return 0;
  // strip sign
  s = s.replace(/^[+-]/, '');
  let mantissa, expPart = '';
  if (s.includes('e')) {
    const parts = s.split('e');
    mantissa = parts[0];
    expPart = parts[1] || '';
  } else {
    mantissa = s;
  }
  // remove decimal point
  const digitsOnly = mantissa.replace('.', '');
  if (!digitsOnly || !/[\d]/.test(digitsOnly)) return 0;
  // leading zeros
  let stripped = digitsOnly.replace(/^0+/, '');
  // trailing zeros rule
  const hasDecimal = mantissa.includes('.');
  if (!hasDecimal) {
    // ambiguous trailing zeros in integer — count them as significant per most textbook convention
    // but report as is (do not strip)
  } else {
    // trailing zeros after decimal ARE significant
  }
  return stripped.length;
}

function toSciNotation(num, sigFigs) {
  if (num === 0 || !isFinite(num)) return num.toString();
  const abs = Math.abs(num);
  const exp = Math.floor(Math.log10(abs));
  const mantissa = num / Math.pow(10, exp);
  const rounded = mantissa.toFixed(Math.max(0, sigFigs - 1));
  return `${rounded} × 10^${exp}`;
}

function roundToSigFigs(num, sf) {
  if (num === 0 || !isFinite(num) || sf < 1) return num;
  const abs = Math.abs(num);
  const exp = Math.floor(Math.log10(abs));
  const pow = Math.pow(10, exp - sf + 1);
  const rounded = Math.round(num / pow) * pow;
  // Format to preserve trailing zeros to the right sig fig count
  const m = rounded / Math.pow(10, exp);
  return m.toFixed(sf - 1) + (exp !== 0 ? ` × 10^${exp}` : '');
}

function calculate() {
  const raw = $('#num').value.trim();
  if (!raw) { $('#status').textContent = '⚠️'; $('#result').style.display = 'none'; return; }
  const num = parseFloat(raw);
  if (isNaN(num)) { $('#status').textContent = '⚠️'; $('#result').style.display = 'none'; return; }
  const sf = countSigFigs(raw);
  $('#result').style.display = '';
  $('#r-count').textContent = sf;
  const roundN = parseInt($('#round').value) || sf;
  $('#r-rounded').textContent = roundToSigFigs(num, Math.max(1, roundN));
  $('#r-sci').textContent = toSciNotation(num, Math.max(1, roundN));
  // decimal places
  const decimalStr = raw.includes('.') ? raw.split('.')[1].replace(/e.*$/, '') : '';
  $('#r-dec').textContent = decimalStr.length;
  // total digits
  $('#r-digits').textContent = raw.replace(/[^0-9]/g, '').length;
}
