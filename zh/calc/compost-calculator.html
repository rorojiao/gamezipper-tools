<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is the ideal carbon-to-nitrogen (C:N) ratio for compost?", "acceptedAnswer": {"@type": "Answer", "text": "The ideal compost C:N ratio is about 30:1 by mass. Browns (dry leaves, straw, paper, cardboard) supply carbon, while greens (food scraps, grass, coffee grounds) supply nitrogen. A 3:1 to 4:1 volume ratio of browns to greens usually lands near the 30:1 target."}}, {"@type": "Question", "name": "How big should my compost bin be?", "acceptedAnswer": {"@type": "Answer", "text": "A household compost bin should hold at least 1 cubic yard (27 ft³ / 750 L) so the pile can retain heat, but no larger than 5 cubic yards or it becomes hard to turn. A 3×3×3 ft bin (27 ft³) is the most popular home size."}}, {"@type": "Question", "name": "How much compost do I need for my garden?", "acceptedAnswer": {"@type": "Answer", "text": "Most gardens benefit from a 1–2 inch (2.5–5 cm) layer of compost worked into the topsoil each year. One cubic yard covers about 324 ft² at 1 inch deep. The calculator shows the exact volume you need from your bin or pile dimensions."}}, {"@type": "Question", "name": "Does this calculator account for compost settling?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. Compost loses roughly 40–60% of its volume as the materials decompose. The calculator reports both the raw bin volume and the expected finished compost yield so you can plan how much to harvest."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="cp-form">
      <label><span id="lbl-unit"></span>
        <select id="unit">
          <option value="ft">feet (ft)</option>
          <option value="m">meters (m)</option>
        </select>
      </label>
      <div class="cp-row3">
        <label><span id="lbl-w"></span><input type="number" id="w" placeholder="3" step="any" min="0"></label>
        <label><span id="lbl-l"></span><input type="number" id="l" placeholder="3" step="any" min="0"></label>
        <label><span id="lbl-h"></span><input type="number" id="h" placeholder="3" step="any" min="0"></label>
      </div>
      <div class="cp-row2">
        <label><span id="lbl-shrink"></span><input type="number" id="shrink" placeholder="50" step="any" min="0" max="90"></label>
        <label><span id="lbl-depth"></span><input type="number" id="depth" placeholder="2" step="any" min="0"></label>
      </div>
    </div>
    <div class="cp-result" id="result" style="display:none">
      <div class="cp-card main">
        <div class="value" id="cp-cuft">—</div>

      </div>
      <div class="cp-card">
        <div class="value" id="cp-gal">—</div>
        <div class="label" id="lbl-out-gal">Gallons</div>
      </div>
      <div class="cp-card">
        <div class="value" id="cp-liters">—</div>
        <div class="label" id="lbl-out-lit">Liters</div>
      </div>
      <div class="cp-card">
        <div class="value" id="cp-finish">—</div>
        <div class="label" id="lbl-out-fin">Finished compost</div>
      </div>
      <div class="cp-card">
        <div class="value" id="cp-browns">—</div>
        <div class="label" id="lbl-out-br">Browns (carbon)</div>
      </div>
      <div class="cp-card">
        <div class="value" id="cp-greens">—</div>
        <div class="label" id="lbl-out-gr">Greens (nitrogen)</div>
      </div>
      <div class="cp-card">
        <div class="value" id="cp-area">—</div>
        <div class="label" id="lbl-out-area">Garden area covered</div>
      </div>
    </div>
    <div class="cp-info">
      <h3 id="lbl-tip">Composting tips</h3>
      <ul id="tip-list"></ul>
    </div>

<script>
GZI18n.register({
  en: {
    toolTitle: 'Compost Calculator',
    toolDesc: 'Calculate compost bin or pile volume in cubic feet, gallons and liters, the finished compost yield and the 3:1 browns-to-greens ratio. Free, browser-based.',
    lblUnit: 'Measurement units',
    lblW: 'Width',
    lblL: 'Length',
    lblH: 'Height / depth',
    lblShrink: 'Volume loss during composting (%)',
    lblDepth: 'Garden compost depth (in)',
    lblOutVol: 'Raw bin volume',
    lblOutGal: 'Gallons',
    lblOutLit: 'Liters',
    lblOutFin: 'Finished compost',
    lblOutBr: 'Browns (carbon)',
    lblOutGr: 'Greens (nitrogen)',
    lblOutArea: 'Garden area covered',
    lblTip: 'Composting tips',
    btnExample: 'Example: 3×3×3 ft bin',
    btnClear: 'Clear',
    tip1: 'Aim for a 3:1 to 4:1 ratio of browns (leaves, paper) to greens (food scraps, grass).',
    tip2: 'Keep the pile as moist as a wrung-out sponge — about 40–60% moisture.',
    tip3: 'Turn the pile every 1–2 weeks to add oxygen and speed up decomposition.',
    tip4: 'Finished compost is dark, crumbly and smells earthy — usually ready in 2–6 months.',
    step1: 'Choose feet or meters and enter the width, length and height of your bin or pile',
    step2: 'Set the volume loss (default 50%) and how thick you will spread the finished compost',
    step3: 'Read the volume in ft³, gallons and liters, plus the finished yield',
    step4: 'Mix browns and greens at the recommended ratio for healthy compost',
  },
  zh: {
    toolTitle: '堆肥计算器',
    toolDesc: '计算堆肥箱或堆体的体积（立方英尺、加仑、升），估算腐熟后的堆肥产量和 3:1 的褐绿比。免费，浏览器本地运行。',
    lblUnit: '测量单位',
    lblW: '宽度',
    lblL: '长度',
    lblH: '高度 / 堆体深度',
    lblShrink: '腐熟后体积损失 (%)',
    lblDepth: '花园铺施厚度 (英寸)',
    lblOutVol: '原始体积',
    lblOutGal: '加仑',
    lblOutLit: '升',
    lblOutFin: '腐熟堆肥',
    lblOutBr: '褐料（碳）',
    lblOutGr: '绿料（氮）',
    lblOutArea: '可覆盖花园面积',
    lblTip: '堆肥技巧',
    btnExample: '示例：3×3×3 ft 堆肥箱',
    btnClear: '清空',
    tip1: '建议褐料（落叶、纸张）与绿料（厨余、青草）的体积比为 3:1 至 4:1。',
    tip2: '保持堆体湿度如拧干的湿海绵，约 40–60% 含水率。',
    tip3: '每 1–2 周翻堆一次，补充氧气，加速分解。',
    tip4: '腐熟堆肥呈深色、松散、有泥土气息 — 通常需 2–6 个月。',
    step1: '选择英尺或米，输入堆肥箱或堆体的宽、长、高',
    step2: '设置体积损失（默认 50%）和花园铺施厚度',
    step3: '读取立方英尺、加仑、升及腐熟后的产量',
    step4: '按建议比例混合褐料和绿料，获得优质堆肥',
  }
});

const { $, t } = GZ;

function calc() {
  const unit = $('#unit').value;
  const w = parseFloat($('#w').value);
  const l = parseFloat($('#l').value);
  const h = parseFloat($('#h').value);
  const shrink = parseFloat($('#shrink').value);
  const depth = parseFloat($('#depth').value);
  if (isNaN(w) || isNaN(l) || isNaN(h)) { $('#result').style.display='none'; return; }

  // raw volume in cubic feet
  let cuft;
  if (unit === 'ft') cuft = w*l*h;
  else cuft = (w*l*h) * 35.3147; // m³ → ft³

  const galUS = cuft * 7.48052;
  const liters = cuft * 28.3168;
  const shrinkPct = (isNaN(shrink) ? 50 : Math.max(0, Math.min(90, shrink))) / 100;
  const finishedCuft = cuft * (1 - shrinkPct);
  const brownsCuft = finishedCuft * 0.75;   // 3:1 browns:greens
  const greensCuft = finishedCuft * 0.25;

  // area covered at the chosen garden depth (1 inch over 1 ft² = 1/12 ft³)
  let areaStr = '—';
  if (!isNaN(depth) && depth > 0) {
    const dFt = unit === 'ft' ? depth/12 : depth/100;  // in→ft  OR cm→m
    const areaFt2 = finishedCuft / dFt;
    const areaM2 = areaFt2 / 10.7639;
    areaStr = unit === 'ft' ? Math.round(areaFt2).toLocaleString()+' ft²' : Math.round(areaM2).toLocaleString()+' m²';
  }

  const volUnit = unit === 'ft' ? ' ft³' : ' m³';
  const rawShow = unit === 'ft' ? cuft.toFixed(1)+' ft³' : (cuft/35.3147).toFixed(2)+' m³';
  const finShow = unit === 'ft' ? finishedCuft.toFixed(1)+' ft³' : (finishedCuft/35.3147).toFixed(2)+' m³';
  const brShow = unit === 'ft' ? brownsCuft.toFixed(1)+' ft³' : (brownsCuft/35.3147).toFixed(2)+' m³';
  const grShow = unit === 'ft' ? greensCuft.toFixed(1)+' ft³' : (greensCuft/35.3147).toFixed(2)+' m³';

  $('#cp-cuft').textContent = rawShow;
  $('#cp-gal').textContent = galUS.toLocaleString(undefined,{maximumFractionDigits:0})+' gal';
  $('#cp-liters').textContent = liters.toLocaleString(undefined,{maximumFractionDigits:0})+' L';
  $('#cp-finish').textContent = finShow;
  $('#cp-browns').textContent = brShow;
  $('#cp-greens').textContent = grShow;
  $('#cp-area').textContent = areaStr;
  $('#result').style.display = 'grid';
}

['unit','w','l','h','shrink','depth'].forEach(id => {
  const el = $('#'+id);
  el.addEventListener('input', calc);
  el.addEventListener('change', calc);
});

$('#tip-list').innerHTML = ['tip1','tip2','tip3','tip4'].map(k => `<li>${t(k)}</li>`).join('');

function loadExample() {
  $('#unit').value='ft'; $('#w').value=3; $('#l').value=3; $('#h').value=3;
  $('#shrink').value=50; $('#depth').value=2;
  calc();
}
function doClear() {
  ['w','l','h','depth'].forEach(id => $('#'+id).value='');
  $('#shrink').value=50;
  $('#result').style.display='none';
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="loadExample()">${t('btnExample')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('btnClear')}</button>`;

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🌱',href:'/calc/plant-spacing.html',name:'Plant Spacing'},
    {icon:'🪵',href:'/calc/mulch-calculator.html',name:'Mulch'},
    {icon:'🪨',href:'/calc/gravel-calculator.html',name:'Gravel'},
    {icon:'🧱',href:'/calc/brick-calculator.html',name:'Brick'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
