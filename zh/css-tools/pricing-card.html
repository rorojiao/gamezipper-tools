<script type="application/ld+json">{"@context":"https://schema.org","@type":"WebApplication","name":"CSS Pricing Card Generator","description":"Generate CSS pricing card components visually. Customize plan name, price, features, popular badge and CTA — copy production-ready HTML and CSS.","url": "https://tools.gamezipper.com/zh/css-tools/pricing-card.html","applicationCategory":"Utility","operatingSystem":"Web Browser","offers":{"@type":"Offer","price":"0"}}</script>
<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is a CSS pricing card?", "acceptedAnswer": {"@type": "Answer", "text": "A CSS pricing card is a UI component that displays a subscription plan — its name, monthly price, list of included features and a call-to-action button. Multiple cards form a pricing table."}}, {"@type": "Question", "name": "How do I mark a plan as 'Most Popular'?", "acceptedAnswer": {"@type": "Answer", "text": "Toggle the Popular Badge option. The card gets a highlighted border, a badge label and a distinct accent color so it stands out from the other tiers."}}, {"@type": "Question", "name": "Can I show checkmarks for features?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. Each feature line includes a green check icon by default. You can prefix a feature with a dash or x to show it as excluded (strikethrough style)."}}, {"@type": "Question", "name": "Is the pricing card responsive?", "acceptedAnswer": {"@type": "Answer", "text": "The card has a max-width and centers itself. When you place multiple cards in a flex row they wrap on small screens. The generated CSS includes a mobile media query."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="plan-edit">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div><div style="font-size:.75rem;color:var(--text2);margin-bottom:4px">Plan Name</div><input type="text" id="planName" value="Pro" oninput="render()" style="width:100%;padding:8px;background:var(--glass);border:1px solid var(--border);border-radius:8px;color:var(--text)"></div>
        <div><div style="font-size:.75rem;color:var(--text2);margin-bottom:4px">Price</div><input type="text" id="price" value="$29" oninput="render()" style="width:100%;padding:8px;background:var(--glass);border:1px solid var(--border);border-radius:8px;color:var(--text)"></div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div><div style="font-size:.75rem;color:var(--text2);margin-bottom:4px">Period</div><input type="text" id="period" value="/month" oninput="render()" style="width:100%;padding:8px;background:var(--glass);border:1px solid var(--border);border-radius:8px;color:var(--text)"></div>
        <div><div style="font-size:.75rem;color:var(--text2);margin-bottom:4px">CTA Button</div><input type="text" id="cta" value="Choose Pro" oninput="render()" style="width:100%;padding:8px;background:var(--glass);border:1px solid var(--border);border-radius:8px;color:var(--text)"></div>
      </div>
    </div>
    <div class="feat-edit" id="featEdit"></div>
    <button class="gz-btn gz-btn-secondary" onclick="addFeature()" style="margin-bottom:16px">+ Add Feature</button>
    <div class="ctrl">
      <div><label>Card Bg</label><input type="color" id="cardBg" value="#1e1e3f" onchange="render()"></div>
      <div><label>Card Text</label><input type="color" id="cardTxt" value="#ffffff" onchange="render()"></div>
      <div><label>Accent</label><input type="color" id="accent" value="#4ecdc4" onchange="render()"></div>
      <div><label>Border Radius</label><input type="range" min="0" max="24" value="16" id="radius" onchange="render()"></div>
      <div><label>Popular Badge</label>
        <select id="popular" onchange="render()">
          <option value="1" selected>Show</option><option value="0">Hide</option>
        </select></div>
    </div>
    <div class="preview-box" id="preview" style="display:flex;justify-content:center"></div>
    <div style="display:flex;gap:8px;margin-bottom:8px">
      <button class="gz-btn" onclick="GZ.copyText(genCode())">📋 Copy Code</button>
      <button class="gz-btn gz-btn-secondary" onclick="resetForm()">🔄 Reset</button>
    </div>
    <div class="code-box"><pre id="codeOut"></pre></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'CSS Pricing Card Generator',
    toolDesc: 'Design CSS pricing cards with live preview. Customize plan, price, features and popular badge — copy production-ready code.',
    step1: 'Set the plan name, price, period and CTA label',
    step2: 'Add feature lines (prefix with x for excluded)',
    step3: 'Customize colors, radius and popular badge',
    step4: 'Copy the generated HTML and CSS code',
  },
  zh: {
    toolTitle: 'CSS 价格卡片生成器',
    toolDesc: '可视化设计 CSS 价格卡片 — 自定义套餐、价格、特性和热门标签，复制生产可用代码。',
    step1: '设置套餐名称、价格、周期和按钮文字',
    step2: '添加功能项（以 x 开头表示不包含）',
    step3: '自定义颜色、圆角和热门标签',
    step4: '复制生成的 HTML 和 CSS 代码',
  }
});

const { $, copyText, t } = GZ;

let features = ['10,000 API calls', '5 team members', 'Priority support', 'Advanced analytics', 'Custom integrations'];

function buildFeatures() {
  const el = $('#featEdit');
  el.innerHTML = features.map((f, i) => `
    <div class="fr">
      <input type="text" value="${f.replace(/"/g,'&quot;')}" oninput="features[${i}]=this.value;render()" placeholder="Feature text">
      <button onclick="features.splice(${i},1);buildFeatures();render()">✕</button>
    </div>`).join('');
}

function addFeature() {
  features.push('New feature');
  buildFeatures(); render();
}

function resetForm() {
  $('#planName').value = 'Pro';
  $('#price').value = '$29';
  $('#period').value = '/month';
  $('#cta').value = 'Choose Pro';
  features = ['Feature one', 'Feature two'];
  buildFeatures(); render();
}

function render() {
  const cardBg = $('#cardBg').value;
  const cardTxt = $('#cardTxt').value;
  const accent = $('#accent').value;
  const rad = $('#radius').value + 'px';
  const popular = $('#popular').value === '1';
  const name = $('#planName').value;
  const price = $('#price').value;
  const period = $('#period').value;
  const cta = $('#cta').value;

  const featHtml = features.map(f => {
    const excluded = /^[x-]/i.test(f.trim());
    const label = excluded ? f.replace(/^[x-]\s*/i,'') : f;
    if (excluded) {
      return `<li style="display:flex;align-items:center;gap:8px;margin-bottom:8px;opacity:.4;text-decoration:line-through"><span style="color:#e94560">&times;</span> ${label}</li>`;
    }
    return `<li style="display:flex;align-items:center;gap:8px;margin-bottom:8px"><span style="color:${accent}">✓</span> ${label}</li>`;
  }).join('');

  $('#preview').innerHTML = `
    <div style="background:${cardBg};color:${cardTxt};border-radius:${rad};padding:32px;max-width:320px;width:100%;border:${popular?'2px solid '+accent:'1px solid '+cardTxt+'22'};position:relative;box-shadow:0 10px 40px rgba(0,0,0,.2)">
      ${popular ? `<div style="position:absolute;top:-12px;left:50%;transform:translateX(-50%);background:${accent};color:#fff;padding:4px 16px;border-radius:20px;font-size:.75rem;font-weight:700">MOST POPULAR</div>` : ''}
      <div style="font-size:.9rem;text-transform:uppercase;letter-spacing:1px;opacity:.7;margin-bottom:8px">${name}</div>
      <div style="display:flex;align-items:baseline;gap:4px;margin-bottom:4px"><span style="font-size:2.5rem;font-weight:800">${price}</span><span style="opacity:.6">${period}</span></div>
      <ul style="list-style:none;padding:0;margin:20px 0;font-size:.9rem">${featHtml}</ul>
      <button style="width:100%;padding:12px;background:${accent};color:#fff;border:none;border-radius:8px;cursor:pointer;font-weight:700;font-size:.95rem">${cta}</button>
    </div>`;

  $('#codeOut').textContent = genCode();
}

function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function genCode() {
  const cardBg = $('#cardBg').value;
  const cardTxt = $('#cardTxt').value;
  const accent = $('#accent').value;
  const rad = $('#radius').value + 'px';
  const popular = $('#popular').value === '1';
  const name = $('#planName').value;
  const price = $('#price').value;
  const period = $('#period').value;
  const cta = $('#cta').value;

  const featCode = features.map(f => {
    const excluded = /^[x-]/i.test(f.trim());
    const label = esc(f.replace(/^[x-]\s*/i,''));
    if (excluded) return `      <li class="feature excluded"><span class="ico">&times;</span> ${label}</li>`;
    return `      <li class="feature"><span class="ico">✓</span> ${label}</li>`;
  }).join('\n');

  const borderLine = popular ? `  border: 2px solid ${accent};` : `  border: 1px solid ${cardTxt}22;`;
  const popularBadgeCss = popular ? `\n.popular-badge {\n  position: absolute;\n  top: -12px; left: 50%;\n  transform: translateX(-50%);\n  background: ${accent};\n  color: #fff;\n  padding: 4px 16px;\n  border-radius: 20px;\n  font-size: 0.75rem;\n  font-weight: 700;\n}` : '';

  return `<!-- HTML -->
<div class="pricing-card">
${popular ? '  <span class="popular-badge">MOST POPULAR</span>' : ''}
  <div class="plan-name">${esc(name)}</div>
  <div class="plan-price"><span class="amount">${esc(price)}</span><span class="period">${esc(period)}</span></div>
  <ul class="features">
${featCode}
  </ul>
  <button class="cta-btn">${esc(cta)}</button>
</div>

/* CSS */
.pricing-card {
  background: ${cardBg};
  color: ${cardTxt};
  border-radius: ${rad};
  padding: 32px;
  max-width: 320px;
${borderLine}
  position: relative;
  box-shadow: 0 10px 40px rgba(0,0,0,0.2);
}${popularBadgeCss}
.plan-name {
  font-size: 0.9rem;
  text-transform: uppercase;
  letter-spacing: 1px;
  opacity: 0.7;
  margin-bottom: 8px;
}
.plan-price { display: flex; align-items: baseline; gap: 4px; margin-bottom: 4px; }
.amount { font-size: 2.5rem; font-weight: 800; }
.period { opacity: 0.6; }
.features { list-style: none; padding: 0; margin: 20px 0; font-size: 0.9rem; }
.feature { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.feature .ico { color: ${accent}; }
.feature.excluded { opacity: 0.4; text-decoration: line-through; }
.feature.excluded .ico { color: #e94560; }
.cta-btn {
  width: 100%;
  padding: 12px;
  background: ${accent};
  color: #fff;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-weight: 700;
  font-size: 0.95rem;
  transition: filter 0.2s;
}
.cta-btn:hover { filter: brightness(1.1); }

/* Mobile */
@media (max-width: 480px) {
  .pricing-card { max-width: 100%; }
}`;
}

buildFeatures();
render();

GZ.renderToolPage({
  category: 'css',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📊', href:'/css-tools/pricing-table.html', name:'Pricing Table'},
    {icon:'🗂️', href:'/css-tools/card.html', name:'Card'},
    {icon:'🔘', href:'/css-tools/button.html', name:'Button'},
    {icon:'✨', href:'/css-tools/glass-card.html', name:'Glass Card'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
