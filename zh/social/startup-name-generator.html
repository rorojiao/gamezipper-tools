<script>
GZI18n.register({
  en: {
    toolTitle: 'Startup Name Generator',
    toolDesc: 'Generate catchy brandable startup names for tech, SaaS, AI, fintech and more. Web 2.0, compound, portmanteau styles — free, no signup.',
    style: 'Style',
    keyword: 'Optional seed word (industry, vibe...)',
    generate: 'Generate',
    copy: 'Copy',
    copyAll: 'Copy All',
    clear: 'Clear',
    copied: 'Copied!',
    emptyHint: 'Click Generate to see 12 fresh startup name ideas.',
    step1: 'Pick a naming style (Web 2.0, compound, AI-suffix...)',
    step2: 'Optionally type a seed word for personalization',
    step3: 'Click Generate to get 12 brandable name ideas',
    step4: 'Tap any name to copy it, then check domain availability',
  },
  zh: {
    toolTitle: '创业公司名称生成器',
    toolDesc: '为科技、SaaS、AI、金融科技等生成朗朗上口、可品牌化的创业公司名称。支持 Web 2.0、复合词、混成词等风格 — 免费，无需注册。',
    style: '风格',
    keyword: '可选种子词（行业、氛围…）',
    generate: '生成',
    copy: '复制',
    copyAll: '全部复制',
    clear: '清空',
    copied: '已复制！',
    emptyHint: '点击「生成」查看 12 个全新创业名称灵感。',
    step1: '选择命名风格（Web 2.0、复合词、AI 后缀…）',
    step2: '可选：输入种子词进行个性化',
    step3: '点击生成获取 12 个品牌化名称',
    step4: '点任意名称复制，然后查询域名是否可用',
  }
});

const { $, copyText, t } = GZ;

const SEED = ['nov','zen','lum','vox','pix','nova','orbit','spark','flux','byte','core','hub','nest','loom','flow','beam','wave','glow','hive','zest','quip','vibe','drift','bloom','pulse','echo','mist','stitch','forge','quill','quartz','onyx','cobalt','vivid','swift','crisp','plume','vanta','helio','aether'];
const SUFFIX = ['ify','ly','io','sy','zo','ster','ly','io','hub','labs','verse','nest','base','flow','mind','wave','beam','spark','forge','loop','pulse','sphere','vault','grid','wave','flow','x','ai','os','io'];
const COMPOUND_A = ['bright','clear','quick','smart','swift','fresh','bold','pure','live','true','keen','vivid','prime','quantum','hyper','super','ultra','meta','cyber','pixel'];
const COMPOUND_B = ['book','mind','flow','space','base','stack','cloud','sync','grid','loop','craft','forge','pulse','spark','wave','hub','nest','core','byte','vault'];
const PORTMANTEAU = [
  ['tech','no'],
  ['smart','ly'],
  ['inno','vate'],
  ['flex','ible'],
  ['pixel','ate'],
  ['bright','ly'],
  ['quant','um'],
  ['cosmo','sphere'],
  ['micro','soft'],
  ['open','ai'],
];

const STYLE_KEYS = ['web2','compound','portmanteau','ai-suffix','keyword'];

function pick(a){ return a[Math.floor(Math.random()*a.length)]; }
function cap(s){ return s.charAt(0).toUpperCase()+s.slice(1); }

function build(style, kw){
  switch(style){
    case 'web2': {
      const base = pick(SEED);
      const dropVowel = base.replace(/[aeiou]$/,'');
      return cap(dropVowel);
    }
    case 'compound':
      return cap(pick(COMPOUND_A)) + cap(pick(COMPOUND_B));
    case 'portmanteau': {
      const [a,b] = pick(PORTMANTEAU);
      const cut = Math.max(1, Math.floor(a.length*0.6));
      return cap(a.slice(0,cut) + b);
    }
    case 'ai-suffix': {
      const base = kw && kw.length > 1 ? kw.toLowerCase().replace(/[^a-z]/g,'') : pick(SEED);
      return cap(base) + pick(['ify','ly','.io','.ai','Hub','Labs','OS','verse','mind','flow']);
    }
    case 'keyword': {
      const base = kw && kw.length > 1 ? kw.toLowerCase().replace(/[^a-z]/g,'') : pick(SEED);
      return cap(base) + pick(['ster','zo','sy','flow','beam','spark','pulse','forge','wave','vault','nest','core']);
    }
  }
  return cap(pick(SEED));
}

let lastResults = [];

function generate(){
  const style = $('#style').value;
  const kw = $('#kw').value.trim();
  const names = new Set();
  let guard = 0;
  while(names.size < 12 && guard < 300){
    guard++;
    let n = build(style, kw);
    if(n && n.length >= 3 && n.length <= 14) names.add(n);
  }
  lastResults = [...names];
  render();
}

function render(){
  const grid = $('#grid');
  if(!lastResults.length){
    grid.innerHTML = `<div class="sng-empty">${t('emptyHint')}</div>`;
    return;
  }
  grid.innerHTML = lastResults.map(n => `
    <div class="sng-card">
      <span class="name" onclick="copyOne(this)" data-name="${n.replace(/"/g,'&quot;')}">${n}</span>
      <button onclick="copyOne(this)" data-name="${n.replace(/"/g,'&quot;')}">${t('copy')}</button>
    </div>`).join('');
}

function copyOne(el){
  copyText(el.dataset.name);
  const isBtn = el.tagName === 'BUTTON';
  const original = isBtn ? el.textContent : '';
  if(isBtn) el.textContent = t('copied');
  else el.style.opacity = '.5';
  setTimeout(() => { if(isBtn) el.textContent = original; else el.style.opacity=''; }, 1100);
}

function copyAll(){
  if(!lastResults.length) return;
  copyText(lastResults.join('\n'));
  $('#status').innerHTML = `<span style="color:var(--gz-success)">✓ ${lastResults.length} ${t('copied')}</span>`;
}

function doClear(){ lastResults = []; render(); $('#status').innerHTML=''; }

$('#controls').innerHTML = `
  <label>${t('style')} <select id="style">
    ${STYLE_KEYS.map(s => `<option value="${s}">${({web2:'Web 2.0 ✂️',compound:'Compound 🔗',portmanteau:'Portmanteau 🧩','ai-suffix':'AI Suffix 🤖',keyword:'Keyword+ ✨'})[s]}</option>`).join('')}
  </select></label>
  <input type="text" id="kw" placeholder="${t('keyword')}">`;

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="generate()">${t('generate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="copyAll()">${t('copyAll')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

render();
generate();

GZ.renderToolPage({
  category: 'social',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'💡', href:'/text/brand-name-generator.html', name:'Brand Name'},
    {icon:'👥', href:'/social/team-name-generator.html', name:'Team Name'},
    {icon:'🌐', href:'/dev/domain-name-generator.html', name:'Domain Name'},
    {icon:'✍️', href:'/text/slogan-generator.html', name:'Slogan'},
  ]
});
</script>
