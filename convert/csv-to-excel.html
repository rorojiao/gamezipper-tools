const { $, copyText, t } = GZ;

// RFC4180-ish CSV parser that supports quoted fields, escaped quotes and embedded newlines.
function parseCSV(text, delim) {
  const rows = [];
  let row = [], field = '', inQuotes = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    if (inQuotes) {
      if (c === '"') {
        if (text[i + 1] === '"') { field += '"'; i++; }
        else inQuotes = false;
      } else field += c;
    } else {
      if (c === '"') inQuotes = true;
      else if (c === delim) { row.push(field); field = ''; }
      else if (c === '\n') { row.push(field); rows.push(row); row = []; field = ''; }
      else if (c === '\r') { /* skip — handled by \n */ }
      else field += c;
    }
  }
  // last field/row
  if (field.length || row.length) { row.push(field); rows.push(row); }
  return rows.filter(r => r.length && !(r.length === 1 && r[0] === ''));
}

function escapeCSVCell(v, delim) {
  if (v === null || v === undefined) return '';
  const s = String(v);
  if (/[",\n\r]/.test(s) || s.includes(delim)) return '"' + s.replace(/"/g, '""') + '"';
  return s;
}

function buildCSV(rows, delim) {
  return rows.map(r => r.map(c => escapeCSVCell(c, delim)).join(delim)).join('\n');
}

function xmlEscape(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function colName(idx) {
  let s = '';
  idx = idx + 1;
  while (idx > 0) { const m = (idx - 1) % 26; s = String.fromCharCode(65 + m) + s; idx = Math.floor((idx - 1) / 26); }
  return s;
}

function buildXLS(rows) {
  let xml = '<?xml version="1.0"?>\n';
  xml += '<?mso-application progid="Excel.Sheet"?>\n';
  xml += '<Workbook xmlns="urn:schemas-microsoft-com:office:spreadsheet" xmlns:ss="urn:schemas-microsoft-com:office:spreadsheet">\n';
  xml += '<Worksheet ss:Name="Sheet1"><Table>\n';
  for (const row of rows) {
    const cells = row.map(v => {
      if (v === null || v === undefined || v === '') return '<Cell><Data ss:Type="String"></Data></Cell>';
      const num = Number(v);
      const looksNum = v !== '' && !isNaN(num) && typeof v !== 'boolean' && !/^0\d+/.test(v) && /^-?\d+(\.\d+)?$/.test(v);
      if (looksNum) return '<Cell><Data ss:Type="Number">' + xmlEscape(num) + '</Data></Cell>';
      return '<Cell><Data ss:Type="String">' + xmlEscape(v) + '</Data></Cell>';
    });
    xml += '<Row>' + cells.join('') + '</Row>\n';
  }
  xml += '</Table></Worksheet></Workbook>';
  return xml;
}

function renderPreview(rows) {
  if (!rows.length) { $('#preview').innerHTML = ''; return; }
  let html = '<table><thead><tr>' + rows[0].map(c => '<th>' + escapeHtml(c) + '</th>').join('') + '</tr></thead><tbody>';
  const max = Math.min(rows.length, 101);
  for (let i = 1; i < max; i++) {
    html += '<tr>' + rows[0].map((_, idx) => '<td title="' + escapeHtml(rows[i][idx] ?? '') + '">' + escapeHtml(rows[i][idx] ?? '') + '</td>').join('') + '</tr>';
  }
  html += '</tbody></table>';
  if (rows.length > 101) html += '<p style="margin-top:8px;color:var(--text2);font-size:.85em">Showing first 100 of ' + (rows.length - 1) + ' rows.</p>';
  $('#preview').innerHTML = html;
}

function escapeHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

let lastRows = [];

function doConvert() {
  const text = $('#input').value;
  $('#output').textContent = '';
  $('#preview').innerHTML = '';
  if (!text.trim()) { $('#status').textContent = ''; return; }
  try {
    const delim = $('#delimiter').value;
    let rows = parseCSV(text, delim);
    if (!$('#header').value || $('#header').value === '0') {
      // synthesize header A,B,C from the widest row
      const width = rows.reduce((m, r) => Math.max(m, r.length), 0);
      const hdr = []; for (let i = 0; i < width; i++) hdr.push(colName(i));
      rows = [hdr, ...rows];
    }
    lastRows = rows;
    const cols = rows[0] ? rows[0].length : 0;
    const dataRows = Math.max(0, rows.length - 1);
    $('#status').innerHTML = '<span style="color:var(--gz-success)">' + t('valid').replace('%1', dataRows).replace('%2', cols) + '</span>';
    renderPreview(rows);
    updateOutputPreview();
  } catch (e) {
    $('#status').innerHTML = '<span style="color:var(--gz-error)">' + t('invalid').replace('%1', e.message) + '</span>';
    lastRows = [];
  }
}

function updateOutputPreview() {
  if (!lastRows.length) { $('#output').textContent = ''; return; }
  const fmt = $('#format').value;
  if (fmt === 'csv') $('#output').textContent = buildCSV(lastRows, $('#delimiter').value);
  else if (fmt === 'tsv') $('#output').textContent = buildCSV(lastRows, '\t');
  else $('#output').textContent = buildXLS(lastRows);
}

function downloadFile(filename, content, mime) {
  const blob = new Blob(['\ufeff' + content], { type: mime });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 100);
}

function doDownload() {
  if (!lastRows.length) { doConvert(); if (!lastRows.length) return; }
  const fmt = $('#format').value;
  const ts = new Date().toISOString().slice(0,10);
  if (fmt === 'csv') downloadFile('data-' + ts + '.csv', buildCSV(lastRows, $('#delimiter').value), 'text/csv;charset=utf-8');
  else if (fmt === 'tsv') downloadFile('data-' + ts + '.tsv', buildCSV(lastRows, '\t'), 'text/tab-separated-values;charset=utf-8');
  else downloadFile('data-' + ts + '.xls', buildXLS(lastRows), 'application/vnd.ms-excel;charset=utf-8');
}

function loadExample() {
  $('#input').value = 'id,name,email,age,city,joined\n1,Alice Johnson,alice@example.com,30,Tokyo,2023-04-15\n2,"Smith, Bob",bob@example.com,25,London,2024-01-20\n3,Carol Williams,carol@example.com,35,"New York",2022-11-08\n4,David Lee,david@example.com,28,"San Francisco, CA",2025-06-01';
  $('#delimiter').value = ',';
  doConvert();
}

function doClear() { $('#input').value = ''; $('#output').textContent = ''; $('#preview').innerHTML = ''; $('#status').textContent = ''; lastRows = []; }

$('#input').addEventListener('input', doConvert);
$('#delimiter').addEventListener('change', doConvert);
$('#format').addEventListener('change', updateOutputPreview);
$('#header').addEventListener('change', doConvert);

$('#lbl-delimiter').textContent = t('delimiter');

$('#lbl-preview').textContent = t('preview');

$('#toolbar').innerHTML = `
