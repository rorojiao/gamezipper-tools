    exportPNG: '🖼 导出 PNG', exportSVG: '📄 导出 SVG',
    question: '问题', outcomeYes: '结果 (是)', outcomeNo: '结果 (否)',
    typeQuestion: '输入问题…', typeOutcome: '输入结果…',
    yes: '是', no: '否',
    tplTrouble: '排查电脑问题', tplUmbrella: '要不要带伞？', tplCar: '要不要买车？', tplJob: '要不要辞职？',
    step1: '点击「添加问题」创建第一个决策节点',
    step2: '添加 Yes/No 结果来分支，将绿/红色连接点拖到下一个节点',
    step3: '继续添加节点并连接，直到完成整个决策树',

const { $, t } = GZ;

let nodes = [];
let edges = [];
let nextId = 1;
let selectedNode = null;
let connectMode = null; // {from: id, color: 'yes'|'no'}
let dragging = null; // {id, offsetX, offsetY}
let editingNode = null;

// Node types: 'question' | 'yes' | 'no'
function addNode(type) {
  const svg = $('#svg');
  const rect = svg.getBoundingClientRect();
  const cx = rect.width / 2;
  const cy = rect.height / 2;
  const x = nodes.length === 0 ? cx - 100 : 100 + (nodes.length % 6) * 180;
  const y = nodes.length === 0 ? 60 : 100 + Math.floor(nodes.length / 6) * 130;
  const node = {
    id: nextId++,
    type,
    x, y,
    text: type === 'question' ? t('typeQuestion') : t('typeOutcome')
  };
  nodes.push(node);
  save(); render();
  // Open editor
  setTimeout(() => startEdit(node), 100);
}

function startEdit(node) {
  editingNode = node;
  const rect = $('#svg').getBoundingClientRect();
  const box = $('#inputBox');
  const input = $('#inputField');
  input.value = node.text;
  input.placeholder = node.type === 'question' ? t('typeQuestion') : t('typeOutcome');
  box.style.display = 'block';
  const x = rect.left + node.x + 20;
  const y = rect.top + node.y - 8;
  box.style.left = Math.min(window.innerWidth - 250, x) + 'px';
  box.style.top = y + 'px';
  setTimeout(() => { input.focus(); input.select(); }, 50);
  $('#inputOk').onclick = () => finishEdit(true);
  input.onkeydown = (e) => {
    if (e.key === 'Enter') finishEdit(true);
    else if (e.key === 'Escape') finishEdit(false);
  };
  input.onblur = () => setTimeout(() => finishEdit(true), 100);
}

function finishEdit(commit) {
  if (!editingNode) return;
  if (commit) {
    const v = $('#inputField').value.trim();
    if (v) editingNode.text = v;
  }
  $('#inputBox').style.display = 'none';
  editingNode = null;
  save(); render();
}

function deleteNode(id) {
  nodes = nodes.filter(n => n.id !== id);
  edges = edges.filter(e => e.from !== id && e.to !== id);
  save(); render();
}

function deleteEdge(from, to) {
  edges = edges.filter(e => !(e.from === from && e.to === to));
  save(); render();
}

function deleteSelected() {
  if (selectedNode) deleteNode(selectedNode.id);
}

function clearAll() {
  if (!confirm('Clear all nodes?')) return;
  nodes = []; edges = []; nextId = 1; selectedNode = null;
  save(); render();
}

function startConnect(id, color) {
  if (connectMode && connectMode.from === id) {
    connectMode = null; render();
    return;
  }
  if (connectMode) {
    // complete the connection
    const exists = edges.find(e => e.from === connectMode.from && e.to === id);
    if (!exists) {
      edges.push({from: connectMode.from, to: id, color: connectMode.color});
    }
    connectMode = null;
    save(); render();
    return;
  }
  connectMode = {from: id, color};
  render();
}

function nodeFill(type) {
  if (type === 'question') return {fill: 'rgba(78,205,196,0.18)', stroke: '#4ecdc4'};
  if (type === 'yes') return {fill: 'rgba(0,214,114,0.18)', stroke: '#00d672'};
  return {fill: 'rgba(233,69,96,0.18)', stroke: '#e94560'};
}

function render() {
  const nodesG = $('#nodes');
  const edgesG = $('#edges');
  nodesG.innerHTML = '';
  edgesG.innerHTML = '';

  // Edges
  for (const e of edges) {
    const a = nodes.find(n => n.id === e.from);
    const b = nodes.find(n => n.id === e.to);
    if (!a || !b) continue;
    const x1 = a.x + 100, y1 = a.y + 30;
    const x2 = b.x + 100, y2 = b.y + 30;
    const mx = (x1 + x2) / 2;
    const color = e.color === 'yes' ? '#00d672' : '#e94560';
    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.setAttribute('d', `M ${x1} ${y1} C ${mx} ${y1}, ${mx} ${y2}, ${x2-4} ${y2}`);
    path.setAttribute('stroke', color);
    path.setAttribute('stroke-width', '2');
    path.setAttribute('fill', 'none');
    path.setAttribute('marker-end', 'url(#arrow)');
    path.setAttribute('data-from', e.from);
    path.setAttribute('data-to', e.to);
    path.style.cursor = 'pointer';
    path.onclick = (ev) => {
      if (ev.shiftKey) deleteEdge(e.from, e.to);
    };
    edgesG.appendChild(path);

    // label
    const lbl = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    lbl.setAttribute('x', mx);
    lbl.setAttribute('y', (y1 + y2) / 2 - 4);
    lbl.setAttribute('text-anchor', 'middle');
    lbl.setAttribute('font-size', '11');
    lbl.setAttribute('font-weight', '600');
    lbl.setAttribute('fill', color);
    lbl.textContent = e.color === 'yes' ? t('yes') : t('no');
    edgesG.appendChild(lbl);
  }

  // Highlight connection origin
  if (connectMode) {
    const a = nodes.find(n => n.id === connectMode.from);
    if (a) {
      const ring = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
      ring.setAttribute('x', a.x - 6);
      ring.setAttribute('y', a.y - 6);
      ring.setAttribute('width', '212');
      ring.setAttribute('height', '72');
      ring.setAttribute('fill', 'none');
      ring.setAttribute('stroke', connectMode.color === 'yes' ? '#00d672' : '#e94560');
      ring.setAttribute('stroke-width', '2.5');
      ring.setAttribute('stroke-dasharray', '6 4');
      ring.style.pointerEvents = 'none';
      nodesG.appendChild(ring);
    }
  }

  // Nodes
  for (const n of nodes) {
    const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    g.classList.add('dt-node');
    if (selectedNode === n.id) g.classList.add('selected');
    g.setAttribute('transform', `translate(${n.x}, ${n.y})`);
    const fc = nodeFill(n.type);
    const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    rect.setAttribute('width', '200');
    rect.setAttribute('height', '60');
    rect.setAttribute('rx', n.type === 'question' ? '10' : '30');
    rect.setAttribute('fill', fc.fill);
    rect.setAttribute('stroke', fc.stroke);
    g.appendChild(rect);

    const txt = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    txt.classList.add('node-text');
    txt.setAttribute('x', '100');
    txt.setAttribute('y', '25');
    txt.setAttribute('text-anchor', 'middle');
    txt.setAttribute('font-weight', n.type === 'question' ? '600' : '500');
    const words = (n.text || '').split(' ');
    let line = '', lines = [];
    for (const w of words) {
      const test = line + w + ' ';
      if (test.length > 28 && line) { lines.push(line.trim()); line = w + ' '; }
      else line = test;
    }
    if (line) lines.push(line.trim());
    if (lines.length > 2) { lines = [lines[0], lines.slice(1).join(' ')]; }
    const startY = 25 - (lines.length - 1) * 8;
    lines.forEach((ln, i) => {
      const tspan = document.createElementNS('http://www.w3.org/2000/svg', 'tspan');
      tspan.setAttribute('x', '100');
      tspan.setAttribute('y', startY + i * 16);
      tspan.textContent = ln;
      txt.appendChild(tspan);
    });
    g.appendChild(txt);

    // Connection handles (only for question or yes/no outcomes)
    if (n.type !== 'question' || true) {
      const hYes = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      hYes.setAttribute('cx', '200');
      hYes.setAttribute('cy', '15');
      hYes.setAttribute('r', '6');
      hYes.setAttribute('fill', '#00d672');
      hYes.setAttribute('stroke', '#fff');
      hYes.setAttribute('stroke-width', '2');
      hYes.style.cursor = 'crosshair';
      hYes.onmousedown = (e) => { e.stopPropagation(); startConnect(n.id, 'yes'); };
      g.appendChild(hYes);

      const hNo = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      hNo.setAttribute('cx', '200');
      hNo.setAttribute('cy', '45');
      hNo.setAttribute('r', '6');
      hNo.setAttribute('fill', '#e94560');
      hNo.setAttribute('stroke', '#fff');
      hNo.setAttribute('stroke-width', '2');
      hNo.style.cursor = 'crosshair';
      hNo.onmousedown = (e) => { e.stopPropagation(); startConnect(n.id, 'no'); };
      g.appendChild(hNo);
    }

    g.onmousedown = (e) => {
      if (e.target.tagName === 'circle') return;
      selectedNode = n.id;
      const pt = $('#svg').getBoundingClientRect();
      dragging = {id: n.id, offsetX: (e.clientX - pt.left) - n.x, offsetY: (e.clientY - pt.top) - n.y};
      render();
    };
    g.ondblclick = (e) => {
      e.stopPropagation();
      selectedNode = n.id;
      startEdit(n);
    };

    nodesG.appendChild(g);
  }

  // Cursor & info
  const info = $('.dt-info');
  if (info) info.textContent = `${nodes.length} node${nodes.length !== 1 ? 's' : ''} · ${edges.length} connection${edges.length !== 1 ? 's' : ''}`;
}

document.addEventListener('mousemove', (e) => {
  if (!dragging) return;
  const pt = $('#svg').getBoundingClientRect();
  const n = nodes.find(x => x.id === dragging.id);
  if (!n) return;
  n.x = Math.max(0, Math.min(pt.width - 200, e.clientX - pt.left - dragging.offsetX));
  n.y = Math.max(0, Math.min(pt.height - 60, e.clientY - pt.top - dragging.offsetY));
  render();
});

document.addEventListener('mouseup', () => {
  if (dragging) { dragging = null; save(); }
});

document.addEventListener('keydown', (e) => {
  if (e.key === 'Delete' && selectedNode && !editingNode) deleteSelected();
  if (e.key === 'Escape') {
    if (editingNode) finishEdit(false);
    else { selectedNode = null; connectMode = null; render(); }
  }
});

function save() {
  try { localStorage.setItem('dt_state', JSON.stringify({nodes, edges, nextId})); } catch(e){}
}

function load() {
  try {
    const s = JSON.parse(localStorage.getItem('dt_state') || 'null');
    if (s) { nodes = s.nodes || []; edges = s.edges || []; nextId = s.nextId || 1; render(); }
  } catch(e){}
}

function exportPNG() {
  const svgEl = $('#svg');
  const clone = svgEl.cloneNode(true);
  // Strip style classes that reference CSS
  const bbox = computeBBox();
  if (bbox) {
    clone.setAttribute('viewBox', `${bbox.x - 20} ${bbox.y - 20} ${bbox.w + 40} ${bbox.h + 40}`);
    clone.setAttribute('width', bbox.w + 40);
    clone.setAttribute('height', bbox.h + 40);
  }
  // Add background
  const bg = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  bg.setAttribute('x', bbox ? bbox.x - 20 : 0);
  bg.setAttribute('y', bbox ? bbox.y - 20 : 0);
  bg.setAttribute('width', bbox ? bbox.w + 40 : '100%');
  bg.setAttribute('height', bbox ? bbox.h + 40 : '100%');
  bg.setAttribute('fill', '#1a1a1a');
  clone.insertBefore(bg, clone.firstChild);
  // Style for export
  const style = document.createElementNS('http://www.w3.org/2000/svg', 'style');
  style.textContent = 'text{fill:#fff;font-family:system-ui,sans-serif}.node-text{font-size:13px}';
  clone.insertBefore(style, clone.firstChild);
  const xml = new XMLSerializer().serializeToString(clone);
  const blob = new Blob([xml], {type: 'image/svg+xml'});
  const url = URL.createObjectURL(blob);
  const img = new Image();
  img.onload = () => {
    const c = document.createElement('canvas');
    const scale = 2;
    c.width = (bbox.w + 40) * scale;
    c.height = (bbox.h + 40) * scale;
    const ctx = c.getContext('2d');
    ctx.scale(scale, scale);
    ctx.drawImage(img, 0, 0);
    URL.revokeObjectURL(url);
    const a = document.createElement('a');
    a.href = c.toDataURL('image/png');
    a.download = 'decision-tree.png';
    a.click();
  };
  img.src = url;
}

function exportSVG() {
  const svgEl = $('#svg');
  const clone = svgEl.cloneNode(true);
  const bbox = computeBBox();
  if (bbox) {
    clone.setAttribute('viewBox', `${bbox.x - 20} ${bbox.y - 20} ${bbox.w + 40} ${bbox.h + 40}`);
    clone.setAttribute('width', bbox.w + 40);
    clone.setAttribute('height', bbox.h + 40);
  }
  const xml = new XMLSerializer().serializeToString(clone);
  const blob = new Blob([xml], {type: 'image/svg+xml'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'decision-tree.svg'; a.click();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

function computeBBox() {
  if (!nodes.length) return null;
  const xs = nodes.map(n => n.x), ys = nodes.map(n => n.y);
  const xe = xs.map(x => x + 200), ye = ys.map(y => y + 60);
  return {x: Math.min(...xs), y: Math.min(...ys), w: Math.max(...xe) - Math.min(...xs), h: Math.max(...ye) - Math.min(...ys)};
}

// Templates
const TEMPLATES = {
  trouble: {
    nodes: [
      {id:1, type:'question', x:200, y:50, text:'Is the computer turning on?'},
      {id:2, type:'no', x:50, y:200, text:'Check the power cable and outlet'},
      {id:3, type:'yes', x:400, y:200, text:'Is there a display on screen?'},
      {id:4, type:'no', x:300, y:350, text:'Check the monitor cable'},
      {id:5, type:'yes', x:550, y:350, text:'Try restarting — issue resolved'},
    ],
    edges: [
      {from:1, to:2, color:'no'},
      {from:1, to:3, color:'yes'},
      {from:3, to:4, color:'no'},
      {from:3, to:5, color:'yes'},
    ],
  },

function loadTemplate(name) {
  const tpl = TEMPLATES[name];
  if (!tpl) return;
  if (nodes.length && !confirm('Replace current tree with template?')) return;
  nodes = tpl.nodes.map(n => ({...n}));
  edges = tpl.edges.map(e => ({...e}));
  nextId = Math.max(...nodes.map(n => n.id)) + 1;
  save(); render();
}

}
