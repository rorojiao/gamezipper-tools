<script>
GZI18n.register({
  en: {
    toolTitle: 'Subtitle Editor (SRT & VTT)',
    toolDesc: 'Edit SRT and WebVTT subtitle files — adjust timing, shift, add, delete and export. Free, private, runs in your browser.',
    import: 'Import File',
    exportSrt: 'Export SRT',
    exportVtt: 'Export VTT',

    delete: '✕',
    step1: 'Import an SRT or VTT file, or start from scratch',
    step2: 'Edit text, adjust timestamps, add or remove lines',
    step3: 'Shift all timing if needed, then export to SRT or VTT',
  },
  zh: {
    toolTitle: '字幕编辑器（SRT & VTT）',
    toolDesc: '编辑 SRT 和 WebVTT 字幕文件 — 调整时间轴、偏移、添加、删除和导出。免费私密，浏览器本地运行。',
    import: '导入文件',
    exportSrt: '导出 SRT',
    exportVtt: '导出 VTT',
    addLine: '添加字幕',
    shift: '偏移',
    lblShift: '整体偏移时间轴：',
    lblSec: '秒（+ 延迟，− 提前）',
    delete: '✕',
    step1: '导入 SRT 或 VTT 文件，或从头开始',
    step2: '编辑文本、调整时间戳、添加或删除行',
    step3: '如需调整整体时间轴后，导出为 SRT 或 VTT',
  }
});

const { $, t } = GZ;
let subs = [];

function parseSrt(text) {
  const blocks = text.trim().split(/\n\s*\n/);
  const result = [];
  blocks.forEach(block => {
    const lines = block.trim().split('\n');
    if (lines.length < 2) return;
    const timeIdx = lines.findIndex(l => l.includes('-->'));
    if (timeIdx < 0) return;
    const start = parseTime(lines[timeIdx].split('-->')[0].trim());
    const end = parseTime(lines[timeIdx].split('-->')[1].trim());
    const text2 = lines.slice(timeIdx + 1).join('\n');
    if (!isNaN(start) && !isNaN(end)) result.push({start, end, text: text2});
  });
  return result;
}

function parseVtt(text) {
  const cleaned = text.replace(/^WEBVTT.*\n/i, '');
  return parseSrt(cleaned);
}

function parseTime(s) {
  const m = s.match(/(\d+):(\d+):?(\d+)?[,.]?(\d+)?/);
  if (!m) return NaN;
  const h = parseInt(m[1]) || 0;
  const min = parseInt(m[2]) || 0;
  const sec = parseInt(m[3]) || 0;
  const ms = parseInt((m[4] || '0').padEnd(3,'0').slice(0,3)) || 0;
  return h * 3600 + min * 60 + sec + ms / 1000;
}

function fmtTime(s) {
  const ms = Math.round((s % 1) * 1000);
  const totalSec = Math.floor(s);
  const h = Math.floor(totalSec / 3600);
  const min = Math.floor((totalSec % 3600) / 60);
  const sec = totalSec % 60;
  return `${String(h).padStart(2,'0')}:${String(min).padStart(2,'0')}:${String(sec).padStart(2,'0')},${String(ms).padStart(3,'0')}`;
}

function fmtTimeVtt(s) {
  return fmtTime(s).replace(',', '.');
}

function renderTable() {
  if (!subs.length) {
    $('#subList').innerHTML = `<p class="empty-msg">No subtitles. Import a file or click "Add Subtitle".</p>`;
    return;
  }
  let html = '<table class="sub-table"><thead><tr><th>#</th><th>Start</th><th>End</th><th>Text</th><th></th></tr></thead><tbody>';
  subs.forEach((s, i) => {
    html += `<tr>
      <td>${i + 1}</td>
      <td><input type="text" value="${fmtTime(s.start)}" onchange="subs[${i}].start=parseTime(this.value)"></td>
      <td><input type="text" value="${fmtTime(s.end)}" onchange="subs[${i}].end=parseTime(this.value)"></td>
      <td><textarea onchange="subs[${i}].text=this.value">${s.text.replace(/</g,'&lt;')}</textarea></td>
      <td><button class="gz-btn gz-btn-secondary" style="padding:4px 8px;font-size:.8em" onclick="subs.splice(${i},1);renderTable()">${t('delete')}</button></td>
    </tr>`;
  });
  html += '</tbody></table>';
  $('#subList').innerHTML = html;
}

function addLine() {
  const last = subs.length ? subs[subs.length - 1] : null;
  const start = last ? last.end + 0.5 : 0;
  subs.push({start, end: start + 3, text: ''});
  renderTable();
}

function doShift() {
  const ms = parseFloat($('#shiftMs').value) || 0;
  subs.forEach(s => { s.start += ms; s.end += ms; });
  renderTable();
}

function importFile() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.srt,.vtt';
  input.onchange = e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      const text = ev.target.result;
      if (file.name.endsWith('.vtt')) subs = parseVtt(text);
      else subs = parseSrt(text);
      renderTable();
    };
    reader.readAsText(file);
  };
  input.click();
}

function exportSrt() {
  let srt = '';
  subs.forEach((s, i) => {
    srt += `${i+1}\n${fmtTime(s.start)} --> ${fmtTime(s.end)}\n${s.text}\n\n`;
  });
  downloadFile(srt.trim() + '\n', 'subtitles.srt', 'text/plain');
}

function exportVtt() {
  let vtt = 'WEBVTT\n\n';
  subs.forEach((s, i) => {
    vtt += `${i+1}\n${fmtTimeVtt(s.start)} --> ${fmtTimeVtt(s.end)}\n${s.text}\n\n`;
  });
  downloadFile(vtt.trim() + '\n', 'subtitles.vtt', 'text/vtt');
}

function downloadFile(content, filename, mime) {
  const blob = new Blob([content], {type: mime});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
}

$('#shiftRow').querySelector('#lbl-shift') || ($('#shiftRow').insertAdjacentHTML('afterbegin', `<span>${t('lblShift')}</span>`));
$('#shiftRow').querySelector('#lbl-sec') || 0;
const spans = $('#shiftRow').querySelectorAll('span');
if(spans[0]) spans[0].textContent = t('lblShift');
if(spans[1]) spans[1].textContent = t('lblSec');

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="importFile()">${t('import')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="addLine()">${t('addLine')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doShift()">${t('shift')}</button>
  <button class="gz-btn" onclick="exportSrt()">${t('exportSrt')}</button>
  <button class="gz-btn" onclick="exportVtt()">${t('exportVtt')}</button>`;

renderTable();

GZ.renderToolPage({
  category: 'convert',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3'],
  related: [

    {icon:'📄', href:'/text/html-to-text.html', name:'HTML to Text'},
  ]
});
</script>
