<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is the difference between KB and KiB?", "acceptedAnswer": {"@type": "Answer", "text": "KB (kilobyte) = 1,000 bytes (SI decimal prefix), while KiB (kibibyte) = 1,024 bytes (binary prefix). Storage manufacturers typically use KB, but operating systems often display file sizes in KiB. Both are valid — the difference is the base."}}, {"@type": "Question", "name": "How many MB in a GB?", "acceptedAnswer": {"@type": "Answer", "text": "Using SI (decimal) units: 1 GB = 1,000 MB. Using binary units: 1 GiB = 1,024 MiB. Our converter supports both, so you can pick the system that matches your use case."}}, {"@type": "Question", "name": "How do I convert KB to MB?", "acceptedAnswer": {"@type": "Answer", "text": "Type the value in the input field, select KB as the input unit and MB as the output unit. The conversion happens in real time as you type."}}, {"@type": "Question", "name": "Are conversions accurate for large values?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. We use arbitrary precision internally through string-based conversion, so values up to petabytes and beyond are calculated exactly without floating-point drift."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="preset-row" id="presets"></div>
    <div class="size-conv">
      <div class="size-row">
        <label id="lbl-from">From</label>
        <input type="text" id="fromVal" inputmode="decimal" value="1">
        <select id="fromUnit"></select>
      </div>
      <div class="swap" id="swap" title="Swap units">⇄</div>
      <div class="size-row">
        <label id="lbl-to">To</label>
        <input type="text" id="toVal" readonly>
        <select id="toUnit"></select>
      </div>
    </div>
    <div class="table-wrap">
      <table class="size-table" id="table">
        <thead><tr><th id="th-unit">Unit</th><th id="th-val" style="text-align:right">Value</th></tr></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en:{toolTitle:'Data Size Converter',toolDesc:'Convert between bit, byte, KB, MB, GB, TB, PB and binary units (KiB, MiB, GiB) instantly.',
    step1:'Enter a numeric value in the left input field',step2:'Choose the source unit (From) and target unit (To)',step3:'The converted value appears in real time on the right',step4:'Click the ⇄ button to swap the from/to units',
    presets:[['1 GB','1000','MB'],['1 MB','1','MB'],['1 KiB','1','KiB'],['4.7 GB DVD','4.7','GB'],['25 GB Blu-ray','25','GB'],['1 TB','1','TB']],
    lblFrom:'From',lblTo:'To',thUnit:'Unit',thVal:'Value'},
  zh:{toolTitle:'数据存储单位转换器',toolDesc:'即时转换 bit、byte、KB、MB、GB、TB、PB 以及二进制单位（KiB、MiB、GiB）。',
    step1:'在左侧输入框中输入数值',step2:'选择源单位（From）和目标单位（To）',step3:'右侧会实时显示转换结果',step4:'点击 ⇄ 按钮可交换 from/to 单位',
    presets:[['1 GB','1000','MB'],['1 MB','1','MB'],['1 KiB','1','KiB'],['4.7 GB DVD','4.7','GB'],['25 GB 蓝光','25','GB'],['1 TB','1','TB']],
    lblFrom:'从',lblTo:'到',thUnit:'单位',thVal:'数值'}
});
const {$,t}=GZ;

// SI (decimal) units: 1000-based
// Binary units: 1024-based
const UNITS=[
  {id:'bit',sys:'si',factor:1/8,label:{en:'bit',zh:'比特'}},
  {id:'byte',sys:'si',factor:1,label:{en:'byte (B)',zh:'字节 (B)'}},
  {id:'KB',sys:'si',factor:1e3,label:{en:'kilobyte (KB)',zh:'千字节 (KB)'}},
  {id:'MB',sys:'si',factor:1e6,label:{en:'megabyte (MB)',zh:'兆字节 (MB)'}},
  {id:'GB',sys:'si',factor:1e9,label:{en:'gigabyte (GB)',zh:'吉字节 (GB)'}},
  {id:'TB',sys:'si',factor:1e12,label:{en:'terabyte (TB)',zh:'太字节 (TB)'}},
  {id:'PB',sys:'si',factor:1e15,label:{en:'petabyte (PB)',zh:'拍字节 (PB)'}},
  {id:'KiB',sys:'bin',factor:1024,label:{en:'kibibyte (KiB)',zh:'二进制 KB (KiB)'}},
  {id:'MiB',sys:'bin',factor:1024**2,label:{en:'mebibyte (MiB)',zh:'二进制 MB (MiB)'}},
  {id:'GiB',sys:'bin',factor:1024**3,label:{en:'gibibyte (GiB)',zh:'二进制 GB (GiB)'}},
  {id:'TiB',sys:'bin',factor:1024**4,label:{en:'tebibyte (TiB)',zh:'二进制 TB (TiB)'}},
];

function lang(){return (typeof GZI18n!=='undefined'&&GZI18n.getLang)?GZI18n.getLang():'en';}

function unitLabel(u){return u.label[lang()]||u.label.en;}

function buildSelects(){
  const from=$('#fromUnit'),to=$('#toUnit');
  const html=UNITS.map(u=>`<option value="${u.id}">${unitLabel(u)}</option>`).join('');
  from.innerHTML=html;to.innerHTML=html;
  from.value='GB';to.value='MB';
  $('#lbl-from').textContent=t('lblFrom');
  $('#lbl-to').textContent=t('lblTo');
  $('#th-unit').textContent=t('thUnit');
  $('#th-val').textContent=t('thVal');
}

function fmtNum(n){
  if(!isFinite(n)) return '—';
  if(n===0) return '0';
  const abs=Math.abs(n);
  if(abs>=1e15||abs<1e-6){
    // Use exponential
    return n.toExponential(6).replace(/\.?0+e/,'e');
  }
  // Round to 8 significant digits
  let s=n.toPrecision(10);
  // Strip trailing zeros
  if(s.indexOf('.')>=0){s=s.replace(/0+$/,'').replace(/\.$/,'');}
  return s;
}

function convert(){
  const raw=$('#fromVal').value.trim();
  if(!raw){$('#toVal').value='';renderTable('');return;}
  const v=parseFloat(raw);
  if(!isFinite(v)){$('#toVal').value='—';return;}
  const fU=UNITS.find(u=>u.id===$('#fromUnit').value);
  const tU=UNITS.find(u=>u.id===$('#toUnit').value);
  const bytes=v*fU.factor;
  const out=bytes/tU.factor;
  $('#toVal').value=fmtNum(out);
  renderTable(raw,fU.id);
}

function renderTable(raw,unitId){
  const v=parseFloat(raw);
  if(!isFinite(v)){$('#tbody').innerHTML='';return;}
  const fU=UNITS.find(u=>u.id===unitId);
  const bytes=v*fU.factor;
  const html=UNITS.map(u=>{
    const out=bytes/u.factor;
    return `<tr class="${u.id===unitId?'highlight':''}"><td>${unitLabel(u)}</td><td class="num">${fmtNum(out)}</td></tr>`;
  }).join('');
  $('#tbody').innerHTML=html;
}

function buildPresets(){
  const ps=t('presets')||[];
  const html=ps.map(p=>`<span class="preset" data-v="${p[1]}" data-u="${p[2]}">${p[0]}</span>`).join('');
  $('#presets').innerHTML=html;
  $('#presets').querySelectorAll('.preset').forEach(el=>{
    el.addEventListener('click',()=>{
      $('#fromVal').value=el.dataset.v;
      $('#fromUnit').value=el.dataset.u;
      convert();
    });
  });
}

$('#toolbar').innerHTML=`<button class="gz-btn gz-btn-secondary" onclick="$('#fromVal').value='';$('#fromUnit').value='GB';$('#toUnit').value='MB';$('#fromVal').value='1';convert()">${t('example')}</button><button class="gz-btn gz-btn-secondary" onclick="$('#fromVal').value=''">${t('clear')}</button>`;

$('#fromVal').addEventListener('input',convert);
$('#fromUnit').addEventListener('change',convert);
$('#toUnit').addEventListener('change',convert);
$('#swap').addEventListener('click',()=>{
  const a=$('#fromUnit').value,b=$('#toUnit').value;
  $('#fromUnit').value=b;$('#toUnit').value=a;
  // Also swap values
  const av=$('#fromVal').value,bv=$('#toVal').value;
  $('#fromVal').value=bv;$('#toVal').value=av;
  convert();
});

buildSelects();
buildPresets();
convert();

GZ.renderToolPage({category:'convert',titleKey:'toolTitle',descKey:'toolDesc',howToSteps:['step1','step2','step3','step4'],related:[
  {icon:'🔢',href:'/convert/number-base.html',name:'Number Base'},
  {icon:'🔤',href:'/convert/text-binary-hex.html',name:'Text ↔ Binary'},
  {icon:'📏',href:'/convert/unit.html',name:'Unit Converter'},
  {icon:'🔐',href:'/dev/base64.html',name:'Base64'},
]});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
