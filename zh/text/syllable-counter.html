});

const { $, $$ } = GZ;

// Syllable counting heuristic for English
function countSyllables(word) {
  word = word.toLowerCase().replace(/[^a-z]/g, '');
  if (!word) return 0;
  if (word.length <= 3) return 1;

  // Remove silent endings
  word = word.replace(/(?:[^laeiouy]es|ed|[^laeiouy]e)$/, '');
  word = word.replace(/^y/, '');

  // Count vowel groups
  const matches = word.match(/[aeiouy]{1,2}/g);
  let count = matches ? matches.length : 1;

  // Adjustments for common patterns
  // Silent 'le' at the end
  if (/[^aeiouy]le$/.test(word) && word.length > 4) count++;
  // 'ia', 'io' = 1 syllable
  count = count - (word.match(/[aeiouy]{2}/g) || []).length + (word.match(/[aeiouy][aeiouy]/g) || []).filter(g => !['ai','au','ay','ea','ee','ei','ey','ie','oa','oe','oi','oo','ou','oy','ue','ui'].includes(g)).length;
  // Specific adjustments
  if (/cious|tious|cial|tial/.test(word)) count--;
  if (/ia|io|ius$/.test(word) && word.length > 3) count--;

  return Math.max(1, count);
}

function tokenize(text) {
  return text.split(/\s+/).filter(w => w.length > 0);
}

function splitWords(text) {
  return text.match(/[A-Za-z]+(?:[''][A-Za-z]+)*/g) || [];
}

function update() {
  const text = $('#text').value;
  const lines = text.split('\n').filter(l => l.trim().length > 0);
  const words = splitWords(text);
  const totalSyllables = words.reduce((s, w) => s + countSyllables(w), 0);

  $('#totalSyllables').textContent = totalSyllables;
  $('#words').textContent = words.length;
  $('#lines').textContent = lines.length;
  $('#avgSyllables').textContent = words.length ? (totalSyllables / words.length).toFixed(1) : '0.0';
  $('#avgLine').textContent = lines.length ? (totalSyllables / lines.length).toFixed(1) : '0.0';

  // Per-word list
  $('#wordsList').innerHTML = words.length
    ? words.map(w => `<div class="sy-word"><span class="w">${w}</span><span class="c">${countSyllables(w)}</span></div>`).join('')
    : '<p style="color:var(--text2);font-size:.85rem;margin:0">Start typing to see per-word syllable counts</p>';

  // Haiku check (only if 3 non-empty lines)
  if (lines.length === 3) {
    const counts = lines.map(l => splitWords(l).reduce((s, w) => s + countSyllables(w), 0));
    const target = [5, 7, 5];
    const ok = counts.every((c, i) => c === target[i]);
    $('#haikuCard').style.display = 'block';
    $('#haikuLines').innerHTML = lines.map((l, i) => {
      const c = counts[i];
      const cls = c === target[i] ? 'ok' : 'bad';
      return `<div class="sy-haiku-status ${cls}"><span>Line ${i+1}: <em>"${l.length > 40 ? l.slice(0,40)+'…' : l}"</em></span><span class="count">${c} / ${target[i]}</span></div>`;
    }).join('') + (ok ? '<p style="color:#00d672;margin:10px 0 0;font-weight:700">✓ This is a valid haiku!</p>' : '<p style="color:var(--text2);margin:10px 0 0;font-size:.85rem">Adjust the syllable counts to match 5-7-5 for a haiku.</p>');
  } else if (lines.length > 0 && lines.length !== 3) {
    $('#haikuCard').style.display = 'block';
    $('#haikuLines').innerHTML = '<p style="color:var(--text2);margin:0;font-size:.85rem">Haiku requires exactly 3 lines. Currently you have ' + lines.length + '.</p>';
  } else {
    $('#haikuCard').style.display = 'none';
  }
}

$('#text').addEventListener('input', update);

$('#toolbar').innerHTML = `
  <button class="gz-btn gz-btn-secondary" onclick="loadHaiku()">Load Haiku Example</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadSonnet()">Load Sonnet Excerpt</button>
  <button class="gz-btn" onclick="$('#text').value='';update()">Clear</button>`;

function loadHaiku() {
  $('#text').value = 'An old silent pond...\nA frog jumps into the pond,\nSplash! Silence again.';
  update();
}
function loadSonnet() {
  $('#text').value = 'Shall I compare thee to a summer\'s day?\nThou art more lovely and more temperate:\nRough winds do shake the darling buds of May,\nAnd summer\'s lease hath all too short a date.';
  update();
}

loadHaiku();
