<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="ctrl" id="controls"></div>
    <div class="tweet-card" id="tweet-preview"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Tweet Generator & Preview',
    toolDesc: 'Create realistic tweet mockups for presentations — customize name, handle, content, stats and download as PNG.',
    displayName: 'Display Name',
    handle: 'Handle (@)',
    content: 'Tweet Content',
    avatar: 'Avatar',
    verified: 'Verified ✓',
    retweets: 'Retweets',
    likes: 'Likes',
    replies: 'Replies',
    views: 'Views',
    time: 'Time',
    download: 'Download PNG',
    clear: 'Clear',
    step1: 'Enter the display name and Twitter handle',
    step2: 'Type the tweet content',
    step3: 'Customize stats — retweets, likes, replies and views',
    step4: 'Download the tweet as a PNG image',
  },
  zh: {
    toolTitle: '推文生成器 & 预览',
    toolDesc: '创建逼真的推文截图 — 自定义昵称、账号、内容、互动数据，下载为 PNG 图片。',
    displayName: '显示名称',
    handle: '账号 (@)',
    content: '推文内容',
    avatar: '头像',
    verified: '认证 ✓',
    retweets: '转发',
    likes: '点赞',
    replies: '回复',
    views: '浏览量',
    time: '时间',
    download: '下载 PNG',
    clear: '清除',
    step1: '输入显示名称和 Twitter 账号',
    step2: '输入推文内容',
    step3: '自定义数据 — 转发、点赞、回复和浏览量',
    step4: '下载推文为 PNG 图片',
  }
});

const { $, copyText, t } = GZ;

let cfg = {
  name: 'GameZipper',
  handle: '@GameZipperTools',
  content: 'Check out our new free online tools! 🚀\n\n179+ tools for developers, designers and creators — no signup required.\n\n#WebTools #FreeTools #Developer',
  avatar: '🎮',
  verified: true,
  retweets: 1247,
  likes: 3892,
  replies: 89,
  views: 125000,
  time: '10:30 AM · Jun 2, 2026'
};

function formatNum(n) {
  if (n >= 1000000) return (n/1000000).toFixed(1)+'M';
  if (n >= 1000) return (n/1000).toFixed(1)+'K';
  return n.toString();
}

function buildControls() {
  const c = $('#controls');
  c.innerHTML = `
    <label>${t('displayName')}<input type="text" id="cName" value="${cfg.name}"></label>
    <label>${t('handle')}<input type="text" id="cHandle" value="${cfg.handle}"></label>
    <label>${t('avatar')}<input type="text" id="cAvatar" value="${cfg.avatar}" style="width:60px;text-align:center"></label>
    <label>${t('verified')}<input type="checkbox" id="cVerified" ${cfg.verified?'checked':''}></label>
    <label>${t('content')}<textarea id="cContent" rows="4" style="min-width:250px">${cfg.content}</textarea></label>
    <label>${t('retweets')}<input type="number" id="cRT" value="${cfg.retweets}" min="0"></label>
    <label>${t('likes')}<input type="number" id="cLikes" value="${cfg.likes}" min="0"></label>
    <label>${t('replies')}<input type="number" id="cReplies" value="${cfg.replies}" min="0"></label>
    <label>${t('views')}<input type="number" id="cViews" value="${cfg.views}" min="0"></label>
    <label>${t('time')}<input type="text" id="cTime" value="${cfg.time}"></label>
  `;
  const map = {cName:'name',cHandle:'handle',cContent:'content',cAvatar:'avatar',cTime:'time'};
  Object.keys(map).forEach(id=>$('#'+id).oninput=e=>{cfg[map[id]]=e.target.value;render()});
  $('#cVerified').onchange=e=>{cfg.verified=e.target.checked;render()};
  ['cRT','cLikes','cReplies','cViews'].forEach(id=>{
    const key = {cRT:'retweets',cLikes:'likes',cReplies:'replies',cViews:'views'}[id];
    $('#'+id).oninput=e=>{cfg[key]=+e.target.value;render()};
  });
}

function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function render() {
  const tw = $('#tweet-preview');
  tw.innerHTML = `
    <div class="tweet-header">
      <div class="tweet-avatar">${cfg.avatar}</div>
      <div>
        <div class="tweet-name">${escHtml(cfg.name)}${cfg.verified?'<span class="verified"> ✓</span>':''}</div>
        <div class="tweet-handle">${escHtml(cfg.handle)}</div>
      </div>
    </div>
    <div class="tweet-body">${escHtml(cfg.content)}</div>
    <div class="tweet-time">${escHtml(cfg.time)} · <span style="color:inherit">𝕏</span> Web App</div>
    <div class="tweet-stats">
      <span><strong>${formatNum(cfg.retweets)}</strong> Reposts</span>
      <span><strong>${formatNum(cfg.likes)}</strong> Likes</span>
      <span><strong>${formatNum(cfg.views)}</strong> Views</span>
    </div>
    <div class="tweet-actions">
      <span>💬 ${formatNum(cfg.replies)}</span>
      <span>🔁 ${formatNum(cfg.retweets)}</span>
      <span>❤️ ${formatNum(cfg.likes)}</span>
      <span>📊 ${formatNum(cfg.views)}</span>
      <span>📤</span>
    </div>
  `;
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" id="dlBtn">${t('download')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="cfg.content='';cfg.retweets=0;cfg.likes=0;cfg.replies=0;cfg.views=0;buildControls();render()">${t('clear')}</button>
`;

$('#dlBtn').onclick = async () => {
  try {
    if (typeof html2canvas !== 'undefined') {
      const canvas = await html2canvas($('#tweet-preview'), { backgroundColor: null, scale: 2 });
      const a = document.createElement('a');
      a.href = canvas.toDataURL('image/png');
      a.download = 'tweet.png';
      a.click();
    }
  } catch(e) { console.error(e); }
};

// Load html2canvas
const h2c = document.createElement('script');
h2c.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
document.head.appendChild(h2c);

buildControls();
render();

GZ.renderToolPage({
  category: 'social',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📱', href:'/social/whatsapp-chat.html', name:'WhatsApp Chat'},
    {icon:'🖼️', href:'/social/youtube-thumb.html', name:'YouTube Thumbnail'},
    {icon:'🖼️', href:'/social/og-meta.html', name:'OG Meta'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
