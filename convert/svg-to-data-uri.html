<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is an SVG data URI?", "acceptedAnswer": {"@type": "Answer", "text": "An SVG data URI is a base64-encoded SVG image embedded directly in a URL string starting with data:image/svg+xml;base64,... You can use it inline in CSS background-image, HTML <img src> or JSON without needing a separate file."}}, {"@type": "Question", "name": "Why use a data URI instead of a file?", "acceptedAnswer": {"@type": "Answer", "text": "Data URIs eliminate a network request, work offline, simplify deployment, and let you embed icons/illustrations in CSS without extra HTTP calls. Trade-offs: data URIs cannot be cached separately and may bloat your CSS."}}, {"@type": "Question", "name": "What's the difference between base64 and URL-encoded?", "acceptedAnswer": {"@type": "Answer", "text": "Base64 encoding produces shorter, more reliable strings for any SVG. URL-encoding (percent-encoding) keeps the SVG readable and lets you edit it, but special characters must be escaped. Most CSS uses base64."}}, {"@type": "Question", "name": "Is my SVG processed in the browser?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. The conversion runs entirely in your browser using btoa()/atob() and DOMParser. No SVG is uploaded to any server."}}]}</script>

      <button class="sdu-tab" data-mode="decode" id="tab-decode">Decode Data URI</button>
    </div>

    <div class="sdu-mode active" id="mode-encode">
      <label class="sdu-drop" id="dropzone">
        <div style="font-size:2rem;margin-bottom:6px">📁</div>
        <div id="dz-text">Click or drag an SVG file (or paste SVG below)</div>
        <input type="file" id="fileInput" accept=".svg,image/svg+xml">
      </label>
      <div class="sdu-options">
        <label><input type="checkbox" id="minify" checked> <span id="lbl-minify">Minify SVG</span></label>
        <label><input type="checkbox" id="urlEncode" checked> <span id="lbl-urlencode">URL-encode (instead of base64)</span></label>
        <label><span id="lbl-prefix">Prefix:</span>
          <select id="prefixStyle" style="background:rgba(0,0,0,0.3);border:1px solid var(--border);border-radius:6px;padding:4px;color:var(--text);font-size:.8rem">
            <option value="data">data:image/svg+xml;base64,…</option>
            <option value="urlcss">url("data:…")</option>
            <option value="css">background-image: url("…");</option>
            <option value="img">&lt;img src="…" /&gt;</option>
            <option value="raw">raw base64 only</option>
          </select>
        </label>
      </div>
      <textarea class="sdu" id="svgInput" spellcheck="false" placeholder='<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" fill="#3b82f6"/></svg>'></textarea>
      <div class="gz-toolbar" style="margin-top:12px">
        <button class="gz-btn" id="encodeBtn">⚙️ <span id="lbl-encode">Convert</span></button>
        <button class="gz-btn gz-btn-secondary" id="clearBtn">🗑️ <span id="lbl-clear">Clear</span></button>
      </div>
    </div>

    <div class="sdu-mode" id="mode-decode">
      <textarea class="sdu" id="uriInput" spellcheck="false" placeholder="Paste a data:image/svg+xml;base64,… or url("data:…") string"></textarea>
      <div class="gz-toolbar" style="margin-top:12px">
        <button class="gz-btn" id="decodeBtn">⚙️ <span id="lbl-decode">Decode</span></button>
        <button class="gz-btn gz-btn-secondary" id="clearDecodeBtn">🗑️ <span id="lbl-clear2">Clear</span></button>

        <div class="gz-toolbar" style="margin-top:10px">

<script>
GZI18n.register({
  en: {
    toolTitle: 'SVG to Data URI Converter',
    toolDesc: 'Convert SVG files to base64 data URIs for CSS, HTML, and JSON. Minify, preview, and copy — 100% in your browser.',
    tabEncode: 'Encode SVG',
    tabDecode: 'Decode Data URI',
    dzText: 'Click or drag an SVG file (or paste SVG below)',
    minify: 'Minify SVG',
    urlencode: 'URL-encode (instead of base64)',
    prefix: 'Output format',
    encode: 'Convert',
    decode: 'Decode',
    clear: 'Clear',
    copy: 'Copy',
    download: 'Download',
    output: 'Output',
    preview: 'Preview',
    input: 'Original size',
    outputSize: 'Output size',
    ratio: 'Ratio',
    copyCss: 'Copy as CSS',
    noSvg: 'Please paste or upload SVG',
    invalid: 'Invalid SVG content',
    notUri: 'Not a valid data URI',
    step1: 'Upload an SVG file or paste SVG markup in the input area',
    step2: 'Pick options: minify, URL-encode, and output format',
    step3: 'Click Convert — preview and stats appear instantly',
    step4: 'Copy the data URI for use in CSS, HTML or JSON',
  },
  zh: {
    toolTitle: 'SVG 转 Data URI 工具',
    toolDesc: '将 SVG 文件转换为 base64 data URI，用于 CSS、HTML 和 JSON。压缩、预览、复制 — 100% 浏览器本地运行。',
    tabEncode: '编码 SVG',
    tabDecode: '解码 Data URI',
    dzText: '点击或拖拽 SVG 文件（也可直接粘贴 SVG）',
    minify: '压缩 SVG',
    urlencode: 'URL 编码（替代 base64）',
    prefix: '输出格式',
    encode: '转换',
    decode: '解码',
    clear: '清空',
    copy: '复制',
    download: '下载',
    output: '输出',
    preview: '预览',
    input: '原始大小',
    outputSize: '输出大小',
    ratio: '压缩比',
    copyCss: '复制为 CSS',
    noSvg: '请粘贴或上传 SVG',
    invalid: '无效的 SVG 内容',
    notUri: '不是有效的数据 URI',
    step1: '上传 SVG 文件或在输入区粘贴 SVG 代码',
    step2: '选择选项：压缩、URL 编码和输出格式',
    step3: '点击「转换」— 即时显示预览和统计',
    step4: '复制 data URI 用于 CSS、HTML 或 JSON',
  }
});

const { $, copyText, t } = GZ;

document.querySelectorAll('.sdu-tab').forEach(btn => btn.addEventListener('click', () => {
  document.querySelectorAll('.sdu-tab').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.sdu-mode').forEach(m => m.classList.remove('active'));
  btn.classList.add('active');
  $('#mode-' + btn.dataset.mode).classList.add('active');
  $('#resultRow').style.display = 'none';
}));

['dragover','dragenter'].forEach(ev => $('#dropzone').addEventListener(ev, e => { e.preventDefault(); $('#dropzone').classList.add('dragover'); }));
['dragleave','drop'].forEach(ev => $('#dropzone').addEventListener(ev, e => { e.preventDefault(); $('#dropzone').classList.remove('dragover'); }));
$('#dropzone').addEventListener('drop', e => { if (e.dataTransfer.files.length) loadFile(e.dataTransfer.files[0]); });
$('#fileInput').addEventListener('change', e => { if (e.target.files.length) loadFile(e.dataTransfer ? e.target.files[0] : e.target.files[0]); });

function loadFile(file) {
  if (!file.name.endsWith('.svg') && file.type !== 'image/svg+xml') { alert('Please select an SVG file'); return; }
  const reader = new FileReader();
  reader.onload = e => { $('#svgInput').value = e.target.result; $('#dz-text').textContent = file.name; };
  reader.readAsText(file);
}

function minifySvg(svg) {
  return svg
    .replace(/<!--[\s\S]*?-->/g, '')
    .replace(/\s+/g, ' ')
    .replace(/>\s+</g, '><')
    .replace(/\s*\/\s*/g, '/')
    .replace(/\s*:\s*/g, ':')
    .replace(/\s*;\s*/g, ';')
    .replace(/\s*,\s*/g, ',')
    .replace(/;\s*}/g, '}')
    .replace(/"\s+(\w+=)/g, '" $1')
    .replace(/\s+\/>/g, '/>')
    .replace(/\s+>/g, '>')
    .trim();
}

function encode() {
  let svg = $('#svgInput').value.trim();
  if (!svg) { alert(t('noSvg')); return; }
  if (!$('#svgInput').value.includes('<svg')) { alert(t('invalid')); return; }
  if ($('#minify').checked) svg = minifySvg(svg);
  const inputSize = new Blob([svg]).size;
  let dataUri;
  if ($('#urlEncode').checked) {
    const encoded = encodeURIComponent(svg).replace(/'/g, '%27').replace(/"/g, '%22');
    dataUri = 'data:image/svg+xml;utf8,' + encoded;
  } else {
    const b64 = btoa(unescape(encodeURIComponent(svg)));
    dataUri = 'data:image/svg+xml;base64,' + b64;
  }
  const style = $('#prefixStyle').value;
  let output = dataUri;
  if (style === 'urlcss') output = 'url("' + dataUri + '")';
  else if (style === 'css') output = 'background-image: ' + (dataUri.length > 100 ? dataUri.slice(0, 100) + '…' : dataUri) + ';\n/* full string in clipboard */';
  else if (style === 'img') output = '<img src="' + dataUri + '" alt="" width="24" height="24">';
  showOutput(output, dataUri, inputSize, svg);
}

function decode() {
  let uri = $('#uriInput').value.trim();
  if (!uri) { alert(t('notUri')); return; }
  let m = uri.match(/data:image\/svg\+xml(;base64)?,(.*)/);
  if (!m) { m = uri.match(/url\(["']?(data:image\/svg\+xml[^"')]+)["']?\)/); if (!m) { alert(t('notUri')); return; } uri = m[1]; m = uri.match(/data:image\/svg\+xml(;base64)?,(.*)/); }
  if (!m) { alert(t('notUri')); return; }
  const isB64 = m[1] === ';base64';
  const payload = m[2];
  let svg = isB64 ? decodeURIComponent(escape(atob(payload))) : decodeURIComponent(payload);
  showOutput(svg, uri, new Blob([svg]).size, svg);
}

function showOutput(output, dataUri, inputSize, svg) {
  $('#output').value = output;
  $('#output').dataset.full = dataUri;
  $('#preview').innerHTML = '<img src="' + dataUri + '" alt="preview">';
  const outSize = new Blob([output]).size;
  const ratio = ((1 - outSize / Math.max(inputSize, 1)) * 100).toFixed(0);
  $('#stats').innerHTML =
    `<span class="sdu-stat">${t('input')}: <strong>${inputSize}</strong> B</span>` +
    `<span class="sdu-stat">${t('outputSize')}: <strong>${outSize}</strong> B</span>` +
    (ratio > 0 ? `<span class="sdu-stat">${t('ratio')}: <strong>-${ratio}%</strong></span>` : `<span class="sdu-stat">${t('ratio')}: <strong>+${Math.abs(ratio)}%</strong></span>`);
  $('#resultRow').style.display = 'grid';
}

$('#encodeBtn').addEventListener('click', encode);
$('#decodeBtn').addEventListener('click', decode);
$('#clearBtn').addEventListener('click', () => { $('#svgInput').value = ''; $('#resultRow').style.display = 'none'; });
$('#clearDecodeBtn').addEventListener('click', () => { $('#uriInput').value = ''; $('#resultRow').style.display = 'none'; });
$('#copyBtn').addEventListener('click', () => copyText($('#output').dataset.full || $('#output').value));
$('#downloadBtn').addEventListener('click', () => {
  const blob = new Blob([$('#output').value], { type: $('#output').value.startsWith('<svg') ? 'image/svg+xml' : 'text/plain' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = $('#output').value.startsWith('<svg') ? 'decoded.svg' : 'data-uri.txt';
  a.click();
  URL.revokeObjectURL(a.href);
});

GZ.renderToolPage({
  category: 'convert',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🖼️', href:'/convert/svg-to-png.html', name:'SVG to PNG'},
    {icon:'🗜️', href:'/dev/svg-minifier.html', name:'SVG Minifier'},
    {icon:'🖼️', href:'/convert/image-to-base64.html', name:'Image to Base64'},
    {icon:'🔗', href:'/convert/base64-to-image.html', name:'Base64 to Image'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
