const { $, copyText, t } = GZ;

function calculate() {
  const dateStr = $('#anniversary').value;
  if (!dateStr) return;
  const start = new Date(dateStr + 'T00:00:00');
  const now = new Date();
  if (start > now) return;

  const totalMs = now - start;
  const totalDays = Math.floor(totalMs / (1000 * 60 * 60 * 24));
  const totalHours = Math.floor(totalMs / (1000 * 60 * 60));
  const totalWeeks = Math.floor(totalDays / 7);

  // Calculate years, months, days using date math
  let years = now.getFullYear() - start.getFullYear();
  let months = now.getMonth() - start.getMonth();
  let days = now.getDate() - start.getDate();
  if (days < 0) {
    months--;
    const prevMonth = new Date(now.getFullYear(), now.getMonth(), 0);
    days += prevMonth.getDate();
  }
  if (months < 0) {
    years--;
    months += 12;
  }
  const totalMonths = years * 12 + months;

  // Average heartbeats: ~80 bpm
  const heartbeats = Math.floor(totalMinutes() * 80);
  function totalMinutes() { return totalMs / (1000 * 60); }

  $('#result').style.display = '';
  $('#result-main').textContent = years + ' ' + t('years') + ' ' + months + ' ' + (GZI18n.getLang() === 'zh' ? '月' : 'mo');
  $('#result-label').textContent = t('resultLabel');

  $('#result-years').textContent = years;
  $('#result-years-label').textContent = t('years');
  $('#result-months').textContent = totalMonths;
  $('#result-months-label').textContent = t('months');
  $('#result-weeks').textContent = totalWeeks.toLocaleString();
  $('#result-weeks-label').textContent = t('weeks');
  $('#result-days').textContent = totalDays.toLocaleString();
  $('#result-days-label').textContent = t('days');
  $('#result-hours').textContent = totalHours.toLocaleString();
  $('#result-hours-label').textContent = t('hours');
  $('#result-hearts').textContent = heartbeats.toLocaleString();
  $('#result-hearts-label').textContent = t('hearts');

  // Next milestone: next yearly anniversary
  const nextAnniv = new Date(start);
  nextAnniv.setFullYear(now.getFullYear());
  if (nextAnniv < now) {
    nextAnniv.setFullYear(now.getFullYear() + 1);
  }
  const daysUntil = Math.ceil((nextAnniv - now) / (1000 * 60 * 60 * 24));
  const nextYear = nextAnniv.getFullYear() - start.getFullYear();

  $('#milestone-next').textContent = t('nextMilestone') + ': ' + nextYear + (GZI18n.getLang() === 'zh' ? ' 周年纪念日' : '-Year Anniversary');
  $('#milestone-countdown').textContent = daysUntil + ' ' + t('daysUntil') + ' ' + nextAnniv.toLocaleDateString();
}
