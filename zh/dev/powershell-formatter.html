const { $, copyText, t } = GZ;

const KEYWORDS = new Set(['if','elseif','else','switch','foreach','for','while','do','until','function','filter','return','break','continue','param','begin','process','end','try','catch','finally','throw','using','namespace','class','enum','hidden','static','in','where','select','workflow','parallel','sequence','workflow','workflow','parallel']);
const TYPE_ACCEL = new Set(['string','int','int32','int64','bool','double','float','decimal','char','byte','object','array','hashtable','void','switch','xml','datetime','timespan','regex','scriptblock','psobject','wmi','ciminstance','type','math','math','math','pscustomobject']);

function beautifyPS(src, opts){
  const indent = opts.indent;
  const pad = d => ' '.repeat(d * indent);
  let out = [];
  let depth = 0;
  let i = 0, n = src.length;
  let buf = '';
  let pendingNewline = false;
  let inBlockComment = false;

  function flush(){
    if (buf.length){
      const trimmed = buf.trim();
      if (trimmed.length) out.push(pad(depth) + trimmed);
      buf = '';
    }
  }
  function addSpace(){ if (buf && !/\s$/.test(buf)) buf += ' '; }

  while (i < n){
    const c = src[i];
    const c2 = src[i+1];

    // block comment <# ... #>
    if (c === '<' && c2 === '#'){ inBlockComment = true; flush(); buf += '<#'; i += 2; continue; }
    if (inBlockComment){
      if (c === '#' && c2 === '>'){ buf += '#>'; i += 2; inBlockComment = false; out.push(buf); buf=''; continue; }
      buf += c; i++; continue;
    }
    // line comment
    if (c === '#'){
      let e = src.indexOf('\n', i); if (e === -1) e = n;
      flush();
      out.push(pad(depth) + src.substring(i, e).trim());
      i = e;
      continue;
    }
    // here-strings @'...'@ or @"..."@
    if (c === '@' && (c2 === "'" || c2 === '"') && /\s/.test(src[i-1]||'\n')){
      const heredoc = c2;
      let j = i + 2;
      // find closing '@' or "'@"
      const closeStr = heredoc === "'" ? "'@" : '"@';
      let closeIdx = src.indexOf(closeStr, j);
      if (closeIdx !== -1){
        const body = src.substring(i, closeIdx + 2);
        flush();
        out.push(body); // heredoc verbatim
        i = closeIdx + 2;
        continue;
      }
    }

    // strings
    if (c === "'" || c === '"'){
      const q = c;
      let j = i;
      // handle PowerShell escaping: '' inside '' and "" inside ""
      j++;
      while (j < n){
        if (src[j] === q){
          if (src[j+1] === q){ j += 2; continue; } // escaped quote
          break;
        }
        j++;
      }
      buf += src.substring(i, Math.min(j+1, n));
      i = Math.min(j+1, n);
      continue;
    }

    if (c === '\n'){ flush(); i++; continue; }
    if (/\s/.test(c)){ if (buf.length && !/\s$/.test(buf)) buf += ' '; i++; continue; }

    // braces
    if (c === '{'){
      addSpace();
      buf += '{';
      i++;
      flush();
      depth++;
      continue;
    }
    if (c === '}'){
      flush();
      if (depth > 0) depth--;
      buf += '}';
      i++;
      continue;
    }
    if (c === '(' || c === '['){
      buf += c; i++; continue;
    }
    if (c === ')' || c === ']'){
      buf += c; i++; continue;
    }
    if (c === ';'){
      buf += ';';
      i++;
      flush();
      continue;
    }
    if (c === '|'){
      addSpace(); buf += '|'; addSpace(); i++; continue;
    }
    if (c === ','){
      buf += opts.spaceAfterComma ? ', ' : ',';
      i++; continue;
    }
    // variables $name
    if (c === '$'){
      buf += '$';
      i++;
      let j = i;
      while (j < n && /[A-Za-z0-9_:?]/.test(src[j])) j++;
      buf += src.substring(i, j);
      i = j;
      continue;
    }
    // type accelerator [string]
    if (c === '['){
      buf += '['; i++;
      let j = i;
      while (j < n && /[A-Za-z0-9_.\[\]]/.test(src[j])) j++;
      buf += src.substring(i, j);
      i = j;
      continue;
    }
    // identifiers
    if (/[A-Za-z_]/.test(c)){
      let j = i;
      while (j < n && /[A-Za-z0-9_-]/.test(src[j])) j++;
      const word = src.substring(i, j);
      addSpace();
      buf += word;
      i = j;
      // handle special: "-Verb" etc parameter flag after "-"
      continue;
    }
    // dash parameter
    if (c === '-' && /[A-Za-z]/.test(src[i-1]||' ') && /[A-Za-z]/.test(c2||' ')){
      // parameter: "-Name" / "-eq" / "-gt"
      let j = i + 1;
      while (j < n && /[A-Za-z]/.test(src[j])) j++;
      addSpace();
      buf += src.substring(i, j);
      i = j;
      addSpace();
      continue;
    }

    buf += c; i++;
  }
  flush();
  return out.join('\n').replace(/\n{3,}/g, '\n\n').replace(/^\n+/, '') + (out.length ? '\n' : '');
}

function minifyPS(src){
  const lines = src.split('\n');
  const out = [];
  let prevBlank = false;
  for (const line of lines){
    const trimmed = line.trim();
    if (trimmed === ''){ if (!prevBlank){ out.push(''); prevBlank = true; } continue; }
    let m = trimmed.replace(/[ \t]+/g, ' ');
    out.push(m);
    prevBlank = false;
  }
  return out.join('\n');
}

function highlight(code){
  let i = 0, n = code.length, out = '';
  function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  while (i < n){
    const c = code[i];
    if (c === '<' && code[i+1] === '#'){
      let j = i+2; while (j < n && !(code[j] === '#' && code[j+1] === '>')) j++;
      out += `<span class="ps-com">${esc(code.substring(i, Math.min(j+2,n)))}</span>`;
      i = Math.min(j+2, n); continue;
    }
    if (c === '#'){
      let e = code.indexOf('\n', i); if (e === -1) e = n;
      out += `<span class="ps-com">${esc(code.substring(i, e))}</span>`;
      i = e; continue;
    }
    if (c === "'" || c === '"'){
      const q = c; let j = i+1;
      while (j < n){ if (code[j] === q){ if (code[j+1] === q){ j += 2; continue; } break; } j++; }
      out += `<span class="ps-str">${esc(code.substring(i, Math.min(j+1,n)))}</span>`;
      i = Math.min(j+1, n); continue;
    }
    if (c === '$'){
      let j = i+1;
      while (j < n && /[A-Za-z0-9_:?]/.test(code[j])) j++;
      out += `<span class="ps-var">${esc(code.substring(i, j))}</span>`;
      i = j; continue;
    }
    if (/[A-Za-z_]/.test(c)){
      let j = i;
      while (j < n && /[A-Za-z0-9_-]/.test(code[j])) j++;
      const word = code.substring(i, j);
      // cmdlets: Verb-Noun pattern
      if (/^[A-Z][a-z]+-[A-Z]/.test(word)) out += `<span class="ps-cmdlet">${esc(word)}</span>`;
      else if (KEYWORDS.has(word.toLowerCase())) out += `<span class="ps-kw">${esc(word)}</span>`;
      else out += esc(word);
      i = j; continue;
    }
    out += esc(c); i++;
  }
  return out;
}

function getOpts(){
  return {
    indent: parseInt($('#ind').value) || 2,
    spaceAfterComma: $('#sac').checked,
  };
}

function doBeautify(){
  const inp = $('#input').value;
  if (!inp.trim()){ $('#status').innerHTML = `<span style="color:var(--gz-accent)">${t('empty')}</span>`; $('#output').innerHTML=''; return; }
  const out = beautifyPS(inp, getOpts());
  $('#output').innerHTML = highlight(out);
  window._psOut = out;
  $('#status').innerHTML = `<span style="color:var(--gz-success)">${t('done')} · ${out.split('\n').length} lines</span>`;
}
function doMinify(){
  const inp = $('#input').value;
  if (!inp.trim()){ $('#status').innerHTML = `<span style="color:var(--gz-accent)">${t('empty')}</span>`; $('#output').innerHTML=''; return; }
  const out = minifyPS(inp);
  window._psOut = out;
  $('#output').innerHTML = highlight(out);
  $('#status').innerHTML = `<span style="color:var(--gz-success)">${t('minified')} · ${out.length} chars</span>`;
}
function doCopy(){ if (window._psOut != null) copyText(window._psOut); }
function doDownload(){
  if (window._psOut == null) return;
  const blob = new Blob([window._psOut], {type:'text/plain'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'beautified.ps1';
  a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href), 1000);
}
function loadExample(){
  $('#input').value =
`param([string]$Path=".",[switch]$Recurse)$items=Get-ChildItem-Path$Path;if($Recurse){$items=$items|Where-Object{$_.PSIsContainer}};foreach($item in $items){try{Write-Host"Processing $($item.Name)";if($item.Length-gt1MB){Write-Warning"Large file: $($item.Name)"}else{Copy-Item$item.FullName-Destination"$env:TEMP\backup\"}}catch{Write-Error"Failed: $_"}}`;
  doBeautify();
}
function doClear(){ $('#input').value=''; $('#output').innerHTML=''; $('#status').innerHTML=''; window._psOut=null; }

$('#opts').innerHTML = `

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="doBeautify()">${t('beautify')}</button>
