<script>
GZI18n.register({
  en: {
    toolTitle: 'Random Email Generator',
    toolDesc: 'Generate unlimited fake, random email addresses for QA testing, signups and dummy data — custom domains, styles and count.',
    lblDomain: 'Domain',
    lblCount: 'How Many',
    lblStyle: 'Local-Part Style',

    uniqNo: 'Allow duplicates',
    uniqYes: 'Deduplicate',
    lblLower: 'Force lowercase',
    styleDot: 'name.lastname',
    styleUnderscore: 'name_lastname',
    stylePlus: 'name+tag',
    styleNumeric: 'name123',
    styleRandom: 'fully random',
    btnGenerate: 'Generate',
    btnCopy: 'Copy All',
    btnClear: 'Clear',
    btnCsv: 'Copy as CSV',
    step1: 'Set the domain (use example.test or example.com for safe testing)',
    step2: 'Pick a local-part style and choose how many emails to generate',
    step3: 'Toggle unique-only and lowercase options if needed',
    step4: 'Click Generate, then Copy All or Copy as CSV to use in your tests',
  },
  zh: {
    toolTitle: '随机邮箱生成器',
    toolDesc: '为测试、注册和占位数据生成大量随机邮箱地址 — 可自定义域名、样式和数量。',
    lblDomain: '域名',
    lblCount: '生成数量',
    lblStyle: '邮箱名样式',
    lblUnique: '仅唯一',
    uniqNo: '允许重复',
    uniqYes: '去重',
    lblLower: '强制小写',
    styleDot: 'name.lastname',
    styleUnderscore: 'name_lastname',
    stylePlus: 'name+tag',
    styleNumeric: 'name123',
    styleRandom: '完全随机',
    btnGenerate: '生成',
    btnCopy: '全部复制',
    btnClear: '清空',
    btnCsv: '复制为 CSV',
    step1: '设置域名（测试建议用 example.test 或 example.com）',
    step2: '选择邮箱名样式和生成数量',
    step3: '按需切换「仅唯一」和「强制小写」',
    step4: '点击「生成」，再选择「全部复制」或「复制为 CSV」用于测试',
  }
});

const { $, copyText, t } = GZ;

const FIRST = ['james','mary','john','patricia','robert','jennifer','michael','linda','william','elizabeth','david','barbara','richard','susan','joseph','jessica','thomas','sarah','charles','karen','daniel','nancy','matthew','lisa','anthony','betty','mark','sandra','donald','ashley','steven','dorothy','paul','kimberly','andrew','emily','joshua','donna','kenneth','michelle'];
const LAST = ['smith','johnson','williams','brown','jones','garcia','miller','davis','rodriguez','martinez','hernandez','lopez','gonzalez','wilson','anderson','thomas','taylor','moore','jackson','martin','lee','perez','thompson','white','harris','sanchez','clark','ramirez','lewis','robinson','walker','young','allen','king','wright','scott','torres','nguyen','hill','flores'];

function rand(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function randInt(a, b) { return Math.floor(Math.random() * (b - a + 1)) + a; }
function randHex(n) { let s=''; const c='abcdef0123456789'; for (let i=0;i<n;i++) s += c[Math.floor(Math.random()*c.length)]; return s; }

function makeLocal(style) {
  let f = rand(FIRST), l = rand(LAST);
  switch (style) {
    case 'dot': return `${f}.${l}`;
    case 'underscore': return `${f}_${l}`;
    case 'plus': return `${f}+${randHex(4)}`;
    case 'numeric': return `${f}${randInt(10,9999)}`;
    case 'random':
    default: return randHex(randInt(6,10));
  }
}

function fillOptions() {
  const s = $('#style');
  const opts = ['styleDot','styleUnderscore','stylePlus','styleNumeric','styleRandom'];
  opts.forEach((k,i)=> s.options[i].textContent = t(k));
  const u = $('#unique');
  u.options[0].textContent = t('uniqNo');
  u.options[1].textContent = t('uniqYes');
}

function generate() {
  const domain = ($('#domain').value.trim() || 'example.test').replace(/^@/, '');
  const count = Math.min(10000, Math.max(1, parseInt($('#count').value, 10) || 1));
  const style = $('#style').value;
  const unique = $('#unique').value === 'yes';
  const lower = $('#lowercase').checked;

  const set = new Set();
  const out = [];
  let guard = 0;
  while (out.length < count && guard < count * 50) {
    guard++;
    let local = makeLocal(style);
    if (lower) local = local.toLowerCase();
    const email = `${local}@${domain}`;
    if (unique && set.has(email)) continue;
    set.add(email);
    out.push(email);
  }
  $('#output').textContent = out.join('\n');
}

function doClear() { $('#output').textContent = ''; }
function doCopyCsv() {
  const lines = $('#output').textContent.split('\n').filter(Boolean);
  copyText('email\n' + lines.join('\n'));
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="generate()">${t('btnGenerate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="copyText($('#output').textContent)">${t('btnCopy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doCopyCsv()">${t('btnCsv')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('btnClear')}</button>`;

fillOptions();
generate();

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',

    {icon:'✉️', href:'/text/email-validator.html', name:'Email Validator'},
  ]
});
</script>
