<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is a binomial distribution?", "acceptedAnswer": {"@type": "Answer", "text": "The binomial distribution models the number of successes in a fixed number of independent trials, each with the same probability of success. It applies when there are exactly two outcomes (success/failure), the trials are independent, and the probability stays constant."}}, {"@type": "Question", "name": "What is the formula for binomial probability?", "acceptedAnswer": {"@type": "Answer", "text": "P(X = k) = C(n, k) * p^k * (1-p)^(n-k), where n is the number of trials, k is the number of successes, p is the probability of success on a single trial, and C(n, k) = n! / (k! * (n-k)!) is the binomial coefficient."}}, {"@type": "Question", "name": "What are the mean and standard deviation of a binomial distribution?", "acceptedAnswer": {"@type": "Answer", "text": "The mean (expected value) is n * p and the variance is n * p * (1-p). The standard deviation is the square root of the variance, sqrt(n * p * (1-p)). These describe the center and spread of the number of successes."}}, {"@type": "Question", "name": "When can I use the binomial distribution?", "acceptedAnswer": {"@type": "Answer", "text": "Use it when you have a fixed number of independent trials, each with exactly two outcomes and a constant success probability. Common examples include coin flips, pass/fail test results, defective-or-not items in quality control, and yes/no survey responses."}}]}</script>

<script>
GZI18n.register({
  en: {
    toolTitle: 'Binomial Distribution Calculator',
    toolDesc: 'Compute the probability of k successes in n trials with the binomial distribution. See exact probability P(X=k), cumulative probability, mean, variance and standard deviation with a step-by-step formula and a visual distribution chart.',
    inputs: 'Distribution Parameters', stats: 'Statistics',
    n: 'Number of trials (n)', p: 'Probability of success (p, 0–1)', k: 'Number of successes (k)',
    heroLbl: 'P(X = k)', heroSub: 'Exact probability of exactly k successes',
    mean: 'Mean (μ = np)', variance: 'Variance (σ²)', sd: 'Std Dev (σ)', cum: 'P(X = k)', cumLe: 'P(X ≤ k)', cumG: 'P(X ≥ k)',
    copy: '📋 Copy Results', reset: '🔄 Reset', example: '🧪 Load Example',
    step1: 'Enter the number of trials (n)',
    step2: 'Enter the probability of success on a single trial (0 to 1)',
    step3: 'Enter the number of successes (k) you are interested in',
    step4: 'Read the probability, cumulative values, mean, variance and chart',
  },
  zh: {
    toolTitle: '二项分布计算器',
    toolDesc: '计算在 n 次试验中出现 k 次成功的二项分布概率。查看精确概率 P(X=k)、累积概率、均值、方差和标准差，附带分步公式和可视化分布图。',
    inputs: '分布参数', stats: '统计量',
    n: '试验次数 (n)', p: '单次成功概率 (p, 0–1)', k: '成功次数 (k)',
    heroLbl: 'P(X = k)', heroSub: '恰好 k 次成功的精确概率',
    mean: '均值 (μ = np)', variance: '方差 (σ²)', sd: '标准差 (σ)', cum: 'P(X = k)', cumLe: 'P(X ≤ k)', cumG: 'P(X ≥ k)',
    copy: '📋 复制结果', reset: '🔄 重置', example: '🧪 加载示例',
    step1: '输入试验次数 (n)',
    step2: '输入单次试验的成功概率（0 到 1）',
    step3: '输入你关心的成功次数 (k)',
    step4: '查看概率、累积值、均值、方差和分布图',
  }
});

const { $, copyText, t } = GZ;
const isZh = GZI18n.getLang() === 'zh';

$('#lblInputs').textContent = t('inputs');
$('#lblStats').textContent = t('stats');
$('#lblN').textContent = t('n');
$('#lblP').textContent = t('p');
$('#lblK').textContent = t('k');
$('#heroLbl').textContent = t('heroLbl');
$('#heroSub').textContent = t('heroSub');
$('#lMean').textContent = t('mean');
$('#lVar').textContent = t('variance');
$('#lSd').textContent = t('sd');
$('#lCum').textContent = t('cum');
$('#lCumLe').textContent = t('cumLe');
$('#lCumG').textContent = t('cumG');

function lnFact(x) {
  // log of factorial via Lanczos gamma for large n
  if (x < 2) return 0;
  if (x < 20) { let s = 0; for (let i = 2; i <= x; i++) s += Math.log(i); return s; }
  // Stirling with correction
  const v = x + 1;
  return (v - 0.5) * Math.log(v) - v + 0.5 * Math.log(2 * Math.PI) + 1/(12*v) - 1/(360*v*v*v);
}

function logBinomPMF(k, n, p) {
  if (k < 0 || k > n) return -Infinity;
  if (p <= 0) return k === 0 ? 0 : -Infinity;
  if (p >= 1) return k === n ? 0 : -Infinity;
  return lnFact(n) - lnFact(k) - lnFact(n - k) + k * Math.log(p) + (n - k) * Math.log(1 - p);
}

function pmf(k, n, p) { return Math.exp(logBinomPMF(k, n, p)); }

function calc() {
  const n = Math.round(+$('n').value);
  const pRaw = +$('#p').value;
  const kIn = Math.round(+$('k').value);
  const p = Math.max(0, Math.min(1, pRaw));

  if (!(n >= 0) || !(pRaw >= 0) || !(pRaw <= 1)) {
    $('#pkVal').textContent = '—';
    ['mean','variance','sd','cum','cumLe','cumG'].forEach(id => $('#'+id).textContent = '—');
    $('#note').textContent = isZh ? '请输入有效的 n 和 p（0 ≤ p ≤ 1）。' : 'Enter a valid n and p (0 ≤ p ≤ 1).';
    $('#chart').innerHTML = '';
    return;
  }

  const k = Math.max(0, Math.min(n, kIn));
  const mean = n * p;
  const variance = n * p * (1 - p);
  const sd = Math.sqrt(variance);

  const pk = pmf(k, n, p);
  // cumulative: P(X <= k)
  let cumLe = 0, cumG = 0;
  for (let i = 0; i <= n; i++) {
    const pi = pmf(i, n, p);
    if (i <= k) cumLe += pi;
    if (i >= k) cumG += pi;
  }
  // guard floating rounding
  cumG = Math.min(1, cumG);

  $('#pkVal').textContent = pk.toFixed(6);
  $('#mean').textContent = mean.toFixed(3);
  $('#variance').textContent = variance.toFixed(3);
  $('#sd').textContent = sd.toFixed(3);
  $('#cum').textContent = pk.toFixed(6);
  $('#cumLe').textContent = cumLe.toFixed(6);
  $('#cumG').textContent = cumG.toFixed(6);

  const C = Math.round(Math.exp(lnFact(n) - lnFact(k) - lnFact(n - k)));
  $('#note').innerHTML = isZh
    ? `公式：<code>P(X=k) = C(n,k) · pᵏ · (1−p)ⁿ⁻ᵏ</code><br>
       代入：<code>C(${n},${k}) · ${p}^${k} · ${(1-p).toFixed(4)}^${n-k}</code><br>
       ≈ <code>${C} · ${Math.pow(p,k).toFixed(5)} · ${Math.pow(1-p, n-k).toFixed(5)}</code> = <b>${pk.toFixed(6)}</b>`
    : `Formula: <code>P(X=k) = C(n,k) · pᵏ · (1−p)ⁿ⁻ᵏ</code><br>
       Plug in: <code>C(${n},${k}) · ${p}^${k} · ${(1-p).toFixed(4)}^${n-k}</code><br>
       ≈ <code>${C} · ${Math.pow(p,k).toFixed(5)} · ${Math.pow(1-p, n-k).toFixed(5)}</code> = <b>${pk.toFixed(6)}</b>`;

  // distribution chart — limit to n+1 bars, cap at ~40 for readability
  const maxBars = Math.min(n + 1, 41);
  let start = 0;
  if (n + 1 > maxBars) {
    start = Math.max(0, k - Math.floor(maxBars / 2));
    if (start + maxBars > n + 1) start = n + 1 - maxBars;
  }
  let maxPmf = 0;
  const rows = [];
  for (let i = start; i < start + maxBars && i <= n; i++) {
    const pi = pmf(i, n, p);
    if (pi > maxPmf) maxPmf = pi;
    rows.push({ i, pi });
  }
  $('#chart').innerHTML = rows.map(r => {
    const widthPct = maxPmf > 0 ? (r.pi / maxPmf * 100) : 0;
    const hi = r.i === k ? ' hi' : '';
    return `<div class="bd-bar${hi}"><span class="k">${r.i}</span><span class="track"><span class="fill" style="width:${widthPct.toFixed(1)}%"></span></span><span class="pct">${(r.pi*100).toFixed(2)}%</span></div>`;
  }).join('');
}

['n','p','k'].forEach(id => $('#'+id).addEventListener('input', calc));

$('#toolbar').innerHTML = `
  <button class="gz-btn gz-btn-secondary" id="btnCopy">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" id="btnExample">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" id="btnReset">${t('reset')}</button>`;

$('#btnCopy').onclick = () => copyText(`${t('toolTitle')}\n${t('n')}=${$('#n').value}  ${t('p')}=${$('#p').value}  ${t('k')}=${$('#k').value}\n${t('cum')}: ${$('#cum').textContent}\n${t('cumLe')}: ${$('#cumLe').textContent}\n${t('cumG')}: ${$('#cumG').textContent}\n${t('mean')}: ${$('#mean').textContent}  ${t('sd')}: ${$('#sd').textContent}`);
$('#btnExample').onclick = () => { $('#n').value = 10; $('#p').value = 0.5; $('#k').value = 7; calc(); };
$('#btnReset').onclick = () => { $('#n').value = 0; $('#p').value = 0.5; $('#k').value = 0; calc(); };

calc();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📈', href:'/calc/normal-distribution.html', name:'Normal Distribution'},
    {icon:'📊', href:'/calc/statistics-calculator.html', name:'Statistics Calculator'},
    {icon:'🎯', href:'/calc/permutation.html', name:'Permutation'},
    {icon:'🔢', href:'/calc/factorial-calculator.html', name:'Factorial'},
  ]
});
</script>
