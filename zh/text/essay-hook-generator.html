  },
  zh: {

    toolDesc: '几秒内生成引人入胜的论文开头吸引句。7 种风格 — 提问、引用、数据、轶事、定义、惊人事实和大胆陈述。免费、浏览器本地运行、无需注册。',

    sQuote: '引用', sQuoteD: '以相关名言开头',
    sStat: '数据', sStatD: '以醒目数字引入',
    sAnec: '轶事', sAnecD: '讲述简短故事',
    sDef: '定义', sDefD: '定义关键术语',
    sFact: '惊人事实', sFactD: '让读者惊讶',
    sBold: '大胆陈述', sBoldD: '提出有力主张',
    lblTopic: '论文主题',
    lblKeyword: '可选关键词或焦点',
    phTopic: '如：气候变化、教育中的科技、心理健康',
    phKeyword: '如：青少年、未来、责任',
    out: '你的吸引句',
    emptyHint: '输入主题并点击「生成」即可在此查看你的吸引句。',
    tipQuestion: '提问式吸引句在答案不明显时最有效 — 让读者产生好奇。',
    tipQuote: '在真实论文中使用任何引用都应注明出处。',
    tipStat: '提交前请用可信来源的核实数据替换占位统计数字。',

    tipFact: '惊人事实必须真实且令人惊讶；请核实每一项陈述。',
    tipBold: '大胆陈述制造张力 — 确保论文余下部分兑现承诺。',
    btnGenerate: '生成吸引句', btnShuffle: '重新生成', btnExample: '示例', btnCopy: '复制', btnClear: '清空',
    step1: '从 7 种风格中选择吸引句类型',
    step2: '输入论文主题和可选焦点关键词',
    step3: '点击「生成吸引句」（或「重新生成」获取不同变体）',
    step4: '编辑措辞以衔接你的引言并复制',
  }
});

const { $, copyText, t } = GZ;
let currentStyle = 'question';

const TEMPLATES = {
  question: [
    (topic, kw) => `Have you ever stopped to consider what would happen if ${topic} suddenly disappeared from our lives?`,
    (topic, kw) => `Why is it that ${topic} affects almost everyone, yet so few people truly understand it?`,
    (topic, kw) => `What if everything you thought you knew about ${topic} turned out to be wrong?`,
    (topic, kw) => `Is ${topic} a problem we can still solve, or have we already passed the point of no return?`,
  ],
  quote: [
    (topic, kw) => `"The future depends on what you do today," said Mahatma Gandhi — a sentiment that captures the heart of ${topic}.`,
    (topic, kw) => `As Albert Einstein once observed, "We cannot solve our problems with the same thinking we used when we created them." Few issues illustrate this better than ${topic}.`,
    (topic, kw) => `"Knowledge is power," wrote Francis Bacon — and in the age of ${topic}, that power has never mattered more.`,
    (topic, kw) => `In the words of writer Maya Angelou, "When you know better, you do better." Nowhere is this truer than in our approach to ${topic}.`,
  ],
  statistic: [
    (topic, kw) => `Roughly [X]% of people will encounter ${topic} at some point in their lives — a figure that demands attention.`,
    (topic, kw) => `Every year, millions are affected by ${topic}, yet public awareness remains surprisingly low.`,
    (topic, kw) => `Studies suggest that nearly one in [N] individuals struggles with ${topic}, making it more common than most people realize.`,
    (topic, kw) => `Despite affecting [X] million people worldwide, ${topic} receives only a fraction of the attention it deserves.`,
  ],
  anecdote: [
    (topic, kw) => `Last summer, a close friend confided that ${topic} had quietly reshaped her daily life — a story that, it turns out, is far from unique.`,
    (topic, kw) => `On a rainy Tuesday morning, I watched a stranger struggle with ${topic}, and in that moment I realized how invisible this issue has become.`,
    (topic, kw) => `When I first encountered ${topic} as a teenager, I had no idea it would later define so much of how I see the world.`,
    (topic, kw) => `It started with a small decision — the kind most people overlook — and ended up revealing just how much ${topic} shapes our choices.`,
  ],
  definition: [
    (topic, kw) => `${cap(topic)}${kw ? `, in its broadest sense,` : ''} refers to a phenomenon that touches nearly every aspect of modern life.`,
    (topic, kw) => `At its core, ${topic} is less a single event than a complex web of causes, effects and consequences.`,
    (topic, kw) => `To understand ${topic} is to confront a question that has puzzled thinkers for generations.`,
    (topic, kw) => `${cap(topic)} can be defined in many ways, but at heart it is about how we respond to forces beyond our control.`,
  ],
  fact: [
    (topic, kw) => `Few people realize that ${topic} is now considered one of the defining challenges of our generation.`,
    (topic, kw) => `It may come as a surprise that ${topic} has reshaped entire industries in less than a decade.`,
    (topic, kw) => `What most discussions of ${topic} miss is the speed at which it is transforming everyday life.`,
    (topic, kw) => `Hidden behind the headlines, ${topic} has quietly become one of the most consequential issues of our time.`,
  ],
  bold: [
    (topic, kw) => `We are running out of time to address ${topic} — and pretending otherwise is no longer an option.`,
    (topic, kw) => `${cap(topic)} is not a side issue; it is the issue that will define the coming decade.`,
    (topic, kw) => `Anyone who dismisses ${topic} as someone else's problem has not been paying attention.`,
    (topic, kw) => `The truth about ${topic} is uncomfortable, but avoiding it has become far more dangerous than confronting it.`,
  ],
};

function cap(s){ if(!s) return s; s=s.trim(); return s.charAt(0).toUpperCase()+s.slice(1); }

function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }

function generate(){
  const topic = $('#topic').value.trim();
  if(!topic){ $('#output').innerHTML = `<em style="color:var(--text2)">${t('emptyHint')}</em>`; $('#tip').textContent = tipFor(currentStyle); return; }
  const kw = $('#keyword').value.trim();
  const arr = TEMPLATES[currentStyle];
  let result = pick(arr)(topic.toLowerCase(), kw);
  result = result.replace(/\s{2,}/g,' ').replace(/\s+\./g,'.');
  if(!/[.!?]"?$/.test(result)) result += '.';
  const styleLabel = {question:'Question',quote:'Quotation',statistic:'Statistic',anecdote:'Anecdote',definition:'Definition',fact:'Startling Fact',bold:'Bold Statement'}[currentStyle];
  $('#output').innerHTML = `<div class="hk-card"><span class="style-badge">${styleLabel}</span><div class="hook">${escapeHtml(result)}</div></div>`;
  $('#tip').textContent = tipFor(currentStyle);
}

function tipFor(style){
  const map = {question:'tipQuestion',quote:'tipQuote',statistic:'tipStat',anecdote:'tipAnec',definition:'tipDef',fact:'tipFact',bold:'tipBold'};
  return t(map[style] || 'tipQuestion');
}

function escapeHtml(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function loadExample(){
  $('#topic').value = 'social media';
  $('#keyword').value = 'teenagers';
  generate();
}

function doClear(){ $('#topic').value=''; $('#keyword').value=''; $('#output').innerHTML=''; $('#tip').textContent = tipFor(currentStyle); }

// Build style buttons
const styleDefs = [
  {id:'question', lbl:'sQuestion', desc:'sQuestionD'},
  {id:'quote', lbl:'sQuote', desc:'sQuoteD'},
  {id:'statistic', lbl:'sStat', desc:'sStatD'},
  {id:'anecdote', lbl:'sAnec', desc:'sAnecD'},
  {id:'definition', lbl:'sDef', desc:'sDefD'},
  {id:'fact', lbl:'sFact', desc:'sFactD'},
  {id:'bold', lbl:'sBold', desc:'sBoldD'},
];
$('#styles').innerHTML = styleDefs.map(sd => `<button data-style="${sd.id}" class="${sd.id==='question'?'active':''}">${t(sd.lbl)}<small>${t(sd.desc)}</small></button>`).join('');
$('#styles').querySelectorAll('button').forEach(b => {
  b.addEventListener('click', () => {
    $('#styles').querySelectorAll('button').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    currentStyle = b.dataset.style;
    if($('#topic').value.trim()) generate();
    else $('#tip').textContent = tipFor(currentStyle);
  });
});

$('#lbl-topic').textContent = t('lblTopic');
$('#lbl-keyword').textContent = t('lblKeyword');
$('#topic').placeholder = t('phTopic');
$('#keyword').placeholder = t('phKeyword');
$('#tip').textContent = tipFor(currentStyle);
$('#output').innerHTML = `<em style="color:var(--text2)">${t('emptyHint')}</em>`;

$('#toolbar').innerHTML = `
  <button class="gz-btn" id="btn-gen">${t('btnGenerate')}</button>
  <button class="gz-btn gz-btn-secondary" id="btn-sh">${t('btnShuffle')}</button>
  <button class="gz-btn gz-btn-secondary" id="btn-ex">${t('btnExample')}</button>
  <button class="gz-btn gz-btn-secondary" id="btn-cp">${t('btnCopy')}</button>
  <button class="gz-btn gz-btn-secondary" id="btn-cl">${t('btnClear')}</button>`;
$('#btn-gen').addEventListener('click', generate);
$('#btn-sh').addEventListener('click', generate);
$('#btn-ex').addEventListener('click', loadExample);
$('#btn-cp').addEventListener('click', () => { const hook = $('#output').querySelector('.hook'); if(hook) copyText(hook.textContent); });
$('#btn-cl').addEventListener('click', doClear);
$('#topic').addEventListener('keydown', e => { if(e.key==='Enter'){ e.preventDefault(); generate(); }});

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🎓', href:'/text/thesis-statement-generator.html', name:'Thesis Generator'},
    {icon:'📋', href:'/text/outline-generator.html', name:'Essay Outline'},
    {icon:'📰', href:'/text/headline-analyzer.html', name:'Headline Analyzer'},
    {icon:'📝', href:'/text/paraphraser.html', name:'Paraphraser'},
  ]
});
</script>
