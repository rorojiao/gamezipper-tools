const { $, t, showToast } = GZ;

const fileResults = new Map(); // filename -> {blob, name, wasGPS, wasExif, originalSize, cleanedSize}

const dropZone = $('#drop');
const fileInput = $('#fileInput');

dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });

dropZone.addEventListener('drop', e => {

  dropZone.classList.remove('dragover');
  handleFiles(e.dataTransfer.files);

fileInput.addEventListener('change', e => handleFiles(e.target.files));

// Try to read EXIF using FileReader + manual JPEG marker scan (no external libs)
function readExif(file) {
  return new Promise(resolve => {
    const reader = new FileReader();
    reader.onload = e => {
      const view = new DataView(e.target.result);
      if (view.byteLength < 4 || view.getUint16(0) !== 0xFFD8) { resolve(null); return; }
      const out = {};
      let i = 2;
      while (i < view.byteLength) {
        if (view.getUint8(i) !== 0xFF) break;
        const marker = view.getUint8(i+1);
        const size = view.getUint16(i+2);
        if (marker === 0xE1) {
          // APP1
          // Check for "Exif\0\0"
          if (view.getUint32(i+4) === 0x45786966 && view.getUint16(i+8) === 0) {
            // Parse IFD0 + GPS IFD quickly
            const tiffStart = i + 10;
            const endian = view.getUint16(tiffStart) === 0x4949 ? 'LE' : 'BE';
            const u16 = off => view.getUint16(tiffStart + off, endian === 'LE');
            const u32 = off => view.getUint32(tiffStart + off, endian === 'LE');
            const ifd0 = u16(4);
            const numEntries = u16(ifd0);
            const gpsIfdOffset = null;
            let exifIfdOffset = null;
            for (let n = 0; n < numEntries; n++) {
              const e = ifd0 + 2 + n*12;
              const tag = u16(e);
              const type = u16(e+2);
              const valCount = u32(e+4);
              if (tag === 0x8825) { /* GPS */ out._gpsIfd = u32(e+8); }
              if (tag === 0x8769) { exifIfdOffset = u32(e+8); }
              if (tag === 0x010F) { /* Make */
                const strOff = tiffStart + u32(e+8);
                let s = '';
                for (let k = 0; k < valCount-1 && (strOff+k) < view.byteLength; k++) s += String.fromCharCode(view.getUint8(strOff+k));
                out.make = s;
              }
              if (tag === 0x0110) { /* Model */
                const strOff = tiffStart + u32(e+8);
                let s = '';
                for (let k = 0; k < valCount-1 && (strOff+k) < view.byteLength; k++) s += String.fromCharCode(view.getUint8(strOff+k));
                out.model = s;
              }
              if (tag === 0x0131) { /* Software */
                const strOff = tiffStart + u32(e+8);
                let s = '';
                for (let k = 0; k < valCount-1 && (strOff+k) < view.byteLength; k++) s += String.fromCharCode(view.getUint8(strOff+k));
                out.software = s;
              }
              if (tag === 0x0132) { /* DateTime */
                const strOff = tiffStart + u32(e+8);
                let s = '';
                for (let k = 0; k < valCount-1 && (strOff+k) < view.byteLength; k++) s += String.fromCharCode(view.getUint8(strOff+k));
                out.dateTime = s;
              }
              if (tag === 0x0112) { out.orientation = u16(e+8); }
            }
            if (out._gpsIfd) {
              const gpsN = u16(out._gpsIfd);
              for (let n = 0; n < gpsN; n++) {
                const e = out._gpsIfd + 2 + n*12;
                const tag = u16(e);
                if (tag === 2 || tag === 4) {
                  // Latitude or Longitude reference
                  const ref = view.getUint8(tiffStart + u32(e+8));
                  out[tag===2?'latRef':'lonRef'] = String.fromCharCode(ref);
                }
              }
              out.hasGps = true;
            }
            out.hasExif = true;
          }
        }
        i += 2 + size;
      }
      resolve(out);
    };
    reader.readAsArrayBuffer(file.slice(0, 128*1024)); // first 128KB is enough
  });
}

function cleanImage(file) {
  return new Promise(resolve => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      const canvas = document.createElement('canvas');
      canvas.width = img.naturalWidth;
      canvas.height = img.naturalHeight;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0);
      URL.revokeObjectURL(url);
      const fmt = file.type === 'image/png' ? 'image/png' : file.type === 'image/webp' ? 'image/webp' : 'image/jpeg';
      const quality = fmt === 'image/jpeg' ? 0.95 : undefined;
      canvas.toBlob(blob => resolve(blob), fmt, quality);
    };
    img.onerror = () => { URL.revokeObjectURL(url); resolve(null); };
    img.src = url;
  });
}

function fmtSize(b) {
  if (b < 1024) return b + ' B';
  if (b < 1024*1024) return (b/1024).toFixed(1) + ' KB';
  return (b/1024/1024).toFixed(2) + ' MB';
}

async function handleFiles(files) {
  for (const file of files) {
    if (!file.type.startsWith('image/')) continue;
    const id = 'f' + Math.random().toString(36).slice(2,9);
    const item = document.createElement('div');
    item.className = 'batch-item';
    item.id = id;
    item.innerHTML = `<span class="name">${file.name}</span><span class="size">${fmtSize(file.size)}</span><span class="status">…</span>`;
    $('#batch').prepend(item);

    const exif = await readExif(file);
    const hasGps = exif && exif.hasGps;
    const hasExif = exif && exif.hasExif;
    const blob = await cleanImage(file);
    if (!blob) { item.querySelector('.status').textContent = '✗'; continue; }

    const outName = file.name.replace(/\.(jpe?g|png|webp)$/i, m => '-clean' + m);
    fileResults.set(file.name, { blob, outName, hasGps, hasExif, originalSize: file.size, cleanedSize: blob.size, exif });

    let badges = '';
    if (hasGps) badges += `<span class="badge gps">${t('hasGps')}</span> `;
    if (hasExif) badges += `<span class="badge">${t('hasExif')}</span> `;
    badges += `<span class="badge clean">${t('cleaned')}</span>`;
    item.innerHTML = `<span class="name">${file.name}</span><span class="size">${fmtSize(file.size)} → ${fmtSize(blob.size)}</span>${badges}<a class="gz-btn" style="padding:4px 10px;font-size:.75em" href="${URL.createObjectURL(blob)}" download="${outName}">${t('btnDownload')}</a>`;
  }
  if (fileResults.size) showToast(GZI18n.getLang() === 'en' ? `${fileResults.size} cleaned` : `已清理 ${fileResults.size} 个文件`);
}

function doClear() { fileResults.clear(); $('#batch').innerHTML = ''; }

function loadExample() {
  // Create a synthetic JPEG with EXIF using canvas
  const c = document.createElement('canvas');
  c.width = 320; c.height = 200;
  const ctx = c.getContext('2d');
  const grd = ctx.createLinearGradient(0,0,320,200);
  grd.addColorStop(0,'#4ecdc4'); grd.addColorStop(1,'#556270');
  ctx.fillStyle = grd; ctx.fillRect(0,0,320,200);
  ctx.fillStyle = 'white'; ctx.font = 'bold 28px sans-serif';
  ctx.fillText('Sample Image', 70, 100);
  c.toBlob(b => {
    const f = new File([b], 'sample.jpg', { type: 'image/jpeg' });
    handleFiles([f]);
  }, 'image/jpeg', 0.9);
}
