const $ = s => document.querySelector(s);
const { t, copyText, getLang } = GZ;
let lastStats = null;

function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escAttr(s) { return String(s).replace(/"/g,'&quot;').replace(/'/g,"\\'"); }

function analyze(raw) {
  const data = JSON.parse(raw);
  const stats = {
    bytes: new Blob([raw]).size,
    chars: raw.length,
    nodes: 0,
    depth: 0,
    objects: 0, arrays: 0, strings: 0, numbers: 0, bools: 0, nulls: 0,
    totalObjKeys: 0, totalArrItems: 0, maxArrLen: 0,
    keyCounts: {},
  };

  function walk(node, depth) {
    stats.nodes++;
    if (depth > stats.depth) stats.depth = depth;
    if (node === null) { stats.nulls++; return; }
    const t = typeof node;
    if (t === 'string') stats.strings++;
    else if (t === 'number') stats.numbers++;
    else if (t === 'boolean') stats.bools++;
    else if (Array.isArray(node)) {
      stats.arrays++;
      stats.totalArrItems += node.length;
      if (node.length > stats.maxArrLen) stats.maxArrLen = node.length;
      for (const v of node) walk(v, depth + 1);
    } else if (t === 'object') {
      const keys = Object.keys(node);
      stats.objects++;
      stats.totalObjKeys += keys.length;
      for (const k of keys) {
        stats.keyCounts[k] = (stats.keyCounts[k] || 0) + 1;
        walk(node[k], depth + 1);
      }
    }
  }
  walk(data, 1);

  stats.avgObjKeys = stats.objects ? Math.round((stats.totalObjKeys / stats.objects) * 10) / 10 : 0;
  stats.avgArrLen = stats.arrays ? Math.round((stats.totalArrItems / stats.arrays) * 10) / 10 : 0;
  stats.topKeys = Object.entries(stats.keyCounts).sort((a,b) => b[1]-a[1]).slice(0, 12);
  return { stats, data };
}

function renderBasic(stats) {
  return `<div class="stats-grid">
    <div class="stat-card"><div class="num">${stats.bytes.toLocaleString()}</div><div class="lbl">${t('bytes')}</div></div>
    <div class="stat-card"><div class="num">${stats.chars.toLocaleString()}</div><div class="lbl">${t('chars')}</div></div>
    <div class="stat-card"><div class="num">${stats.nodes.toLocaleString()}</div><div class="lbl">${t('nodes')}</div></div>
    <div class="stat-card"><div class="num">${stats.depth}</div><div class="lbl">${t('depth')}</div></div>
    <div class="stat-card"><div class="num">${stats.objects}</div><div class="lbl">${t('objects')}</div></div>
    <div class="stat-card"><div class="num">${stats.arrays}</div><div class="lbl">${t('arrays')}</div></div>
    <div class="stat-card"><div class="num">${stats.strings}</div><div class="lbl">${t('strings')}</div></div>
    <div class="stat-card"><div class="num">${stats.numbers}</div><div class="lbl">${t('numbers')}</div></div>
    <div class="stat-card"><div class="num">${stats.bools}</div><div class="lbl">${t('bools')}</div></div>
    <div class="stat-card"><div class="num">${stats.nulls}</div><div class="lbl">${t('nulls')}</div></div>
    <div class="stat-card"><div class="num">${stats.avgObjKeys}</div><div class="lbl">${t('avgObjKeys')}</div></div>
    <div class="stat-card"><div class="num">${stats.avgArrLen}</div><div class="lbl">${t('avgArrLen')}</div></div>
  </div>`;
}

function renderTypes(stats) {
  const total = stats.objects + stats.arrays + stats.strings + stats.numbers + stats.bools + stats.nulls;
  if (total === 0) return '';
  const types = [
    ['objects', stats.objects],
    ['arrays', stats.arrays],
    ['strings', stats.strings],
    ['numbers', stats.numbers],
    ['bools', stats.bools],
    ['nulls', stats.nulls],
  ];
  const max = Math.max(...types.map(x => x[1]), 1);
  return `<div class="panel"><h3>${t('types')}</h3>
    ${types.map(([k, v]) => `<div class="bar-row"><span class="lbl">${t(k)}</span><div class="bar"><div class="bar-fill" style="width:${(v/max*100).toFixed(1)}%"></div></div><span class="val">${v} (${(v/total*100).toFixed(1)}%)</span></div>`).join('')}
  </div>`;
}

function renderKeys(stats) {
  if (!stats.topKeys.length) return '';
  const max = stats.topKeys[0][1];
  return `<div class="panel"><h3>${t('keys')}</h3>
    ${stats.topKeys.map(([k, v]) => `<div class="bar-row"><span class="lbl">"${escHtml(k)}"</span><div class="bar"><div class="bar-fill" style="width:${(v/max*100).toFixed(1)}%"></div></div><span class="val">${v}×</span></div>`).join('')}
  </div>`;
}

function renderTree(data) {
  function build(node, keyName) {
    if (node === null) return `<li>${keyName ? '<span class="key">"'+escHtml(keyName)+'"</span>: ' : ''}<span class="null">null</span></li>`;
    const t = typeof node;
    if (t === 'string') return `<li>${keyName ? '<span class="key">"'+escHtml(keyName)+'"</span>: ' : ''}<span class="str">"${escHtml(node)}"</span></li>`;
    if (t === 'number') return `<li>${keyName ? '<span class="key">"'+escHtml(keyName)+'"</span>: ' : ''}<span class="num">${node}</span></li>`;
    if (t === 'boolean') return `<li>${keyName ? '<span class="key">"'+escHtml(keyName)+'"</span>: ' : ''}<span class="bool">${node}</span></li>`;
    if (Array.isArray(node)) {
      if (node.length === 0) return `<li>${keyName ? '<span class="key">"'+escHtml(keyName)+'"</span>: ' : ''}[]</li>`;
      return `<li>${keyName ? '<span class="key">"'+escHtml(keyName)+'"</span>: ' : ''}Array(${node.length})<ul>${node.map(v => build(v, null)).join('')}</ul></li>`;
    }
    if (t === 'object') {
      const keys = Object.keys(node);
      if (keys.length === 0) return `<li>${keyName ? '<span class="key">"'+escHtml(keyName)+'"</span>: ' : ''}{}</li>`;
      return `<li>${keyName ? '<span class="key">"'+escHtml(keyName)+'"</span>: ' : ''}Object{${keys.length}}<ul>${keys.map(k => build(node[k], k)).join('')}</ul></li>`;
    }
    return '';
  }
  // Cap tree at ~500 nodes for performance
  function capWalk(node, depth, limit, count) {
    if (count.value >= limit) return '';
    if (node === null) return `<span class="null">null</span>`;
    const t = typeof node;
    if (t === 'string') return `<span class="str">"${escHtml(node.slice(0,40))}"</span>`;
    if (t === 'number') return `<span class="num">${node}</span>`;
    if (t === 'boolean') return `<span class="bool">${node}</span>`;
    if (Array.isArray(node)) {
      if (node.length === 0) return '[]';
      if (count.value >= limit) return `Array(${node.length})…`;
      let s = `Array(${node.length})<ul>`;
      for (let i = 0; i < node.length; i++) {
        if (count.value >= limit) { s += '<li>…</li>'; break; }
        count.value++;
        s += `<li>${capWalk(node[i], depth+1, limit, count)}</li>`;
      }
      return s + '</ul>';
    }
    if (t === 'object') {
      const keys = Object.keys(node);
      if (keys.length === 0) return '{}';
      if (count.value >= limit) return `Object{${keys.length}}…`;
      let s = `Object{${keys.length}}<ul>`;
      for (let i = 0; i < keys.length; i++) {
        if (count.value >= limit) { s += '<li>…</li>'; break; }
        count.value++;
        const k = keys[i];
        s += `<li><span class="key">"${escHtml(k)}"</span>: ${capWalk(node[k], depth+1, limit, count)}</li>`;
      }
      return s + '</ul>';
    }
    return '';
  }
  const count = { value: 0 };
  const html = capWalk(data, 0, 500, count);
  return `<div class="panel"><h3>${t('tree')}${count.value >= 500 ? ' <small style="opacity:.6">(truncated to 500 nodes)</small>' : ''}</h3><div class="tree"><ul><li>${html}</li></ul></div></div>`;
}

function doAnalyze() {
  const raw = $('#input').value.trim();
  if (!raw) return;
  try {
    const { stats, data } = analyze(raw);
    lastStats = stats;
    $('#status').innerHTML = `<span style="color:var(--gz-success)">${t('valid')}</span>`;
    $('#output').innerHTML = renderBasic(stats) + renderTypes(stats) + renderKeys(stats) + renderTree(data);
  } catch (e) {
    const msg = e.message;
    let info = `<span style="color:var(--gz-accent)">${t('invalid')}: ${escHtml(msg)}</span>`;
    const posMatch = msg.match(/position (\d+)/);
    if (posMatch) {
      const pos = parseInt(posMatch[1]);
      const before = raw.substring(0, pos);
      const line = before.split('\n').length;
      const col = pos - before.lastIndexOf('\n');
      info += ` <span style="opacity:.7">(${t('errLine')} ${line}, ${t('errCol')} ${col})</span>`;
    }
    $('#status').innerHTML = info;
    $('#output').innerHTML = '';
  }
}

function exportJSONStats() {
  if (!lastStats) return;
  const data = JSON.stringify(lastStats, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'json-stats.json'; a.click();
  URL.revokeObjectURL(url);
}

function exportCSVStats() {
  if (!lastStats) return;
  let csv = 'metric,value\n';
  for (const [k, v] of Object.entries(lastStats)) {
    if (typeof v === 'object' && v !== null && !Array.isArray(v)) continue;
    if (Array.isArray(v)) continue;
    csv += `${k},${v}\n`;
  }
  if (lastStats.topKeys) {
    for (const [k, c] of lastStats.topKeys) csv += `key:${k},${c}\n`;
  }
  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'json-stats.csv'; a.click();
  URL.revokeObjectURL(url);
}

$('#input').addEventListener('input', () => { if ($('#input').value.trim().length > 50) doAnalyze(); });
