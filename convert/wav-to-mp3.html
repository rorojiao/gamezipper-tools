const { $, t } = GZ;
let audioBuffer = null;
let fileName = 'audio';

$('#drop').addEventListener('click', () => $('#file').click());
$('#drop').addEventListener('dragover', e => { e.preventDefault(); $('#drop').classList.add('drag'); });
$('#drop').addEventListener('dragleave', () => $('#drop').classList.remove('drag'));
$('#drop').addEventListener('drop', e => {
  e.preventDefault();
  $('#drop').classList.remove('drag');
  if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
});
$('#file').addEventListener('change', e => { if (e.target.files[0]) handleFile(e.target.files[0]); });

function handleFile(file) {
  fileName = file.name.replace(/\.[^.]+$/, '');
  const url = URL.createObjectURL(file);
  $('#player').src = url;
  $('#player').style.display = 'block';
  $('#drop-text').textContent = file.name + ' (' + (file.size / 1024 / 1024).toFixed(2) + ' MB)';
  $('#controls').style.display = 'flex';
  const reader = new FileReader();
  reader.onload = async e => {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      audioBuffer = await ctx.decodeAudioData(e.target.buffer.slice(0));
      const dur = audioBuffer.duration;
      const m = Math.floor(dur / 60);
      const s = Math.floor(dur % 60).toString().padStart(2, '0');
      $('#stats').innerHTML = `<span>${t('duration')}: ${m}:${s}</span><span>${t('channels')}: ${audioBuffer.numberOfChannels}</span><span>${t('loaded')}: ✓</span>`;
    } catch (err) {
      $('#status').innerHTML = `<span style="color:var(--gz-accent)">Decode error: ${err.message}</span>`;
    }
  };
  reader.readAsArrayBuffer(file);
}

function convert() {
  if (!audioBuffer) { $('#status').innerHTML = `<span style="color:var(--gz-accent)">${t('noFile')}</span>`; return; }
  if (typeof lamejs === 'undefined' || !lamejs.Mp3Encoder) {
    $('#status').innerHTML = `<span style="color:var(--gz-accent)">${t('noEncoder')}</span>`;
    return;
  }
  $('#status').innerHTML = `<span style="color:var(--text2)">${t('converting')}</span>`;
  $('#progress').style.display = 'block';
  $('#progress').value = 0;

  setTimeout(() => {
    try {
      const bitrate = +$('#bitrate').value;
      const channels = audioBuffer.numberOfChannels;
      const sampleRate = audioBuffer.sampleRate;
      const encoder = new lamejs.Mp3Encoder(channels, sampleRate, bitrate);
      const blockSize = 1152;
      const mp3Data = [];
      const left = audioBuffer.getChannelData(0);
      const right = channels > 1 ? audioBuffer.getChannelData(1) : left;
      const leftInt16 = new Int16Array(left.length);
      const rightInt16 = new Int16Array(right.length);
      for (let i = 0; i < left.length; i++) {
        leftInt16[i] = Math.max(-32768, Math.min(32767, left[i] * 32767));
        rightInt16[i] = Math.max(-32768, Math.min(32767, right[i] * 32767));
      }
      const totalBlocks = Math.ceil(left.length / blockSize);
      let blocksDone = 0;
      function encodeChunk() {
        const remaining = Math.min(blockSize, left.length - blocksDone * blockSize);
        if (remaining <= 0) {
          const end = encoder.flush();
          if (end.length > 0) mp3Data.push(new Uint8Array(end));
          const blob = new Blob(mp3Data, { type: 'audio/mp3' });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url; a.download = fileName + '.mp3';
          document.body.appendChild(a); a.click(); a.remove();
          setTimeout(() => URL.revokeObjectURL(url), 1000);
          $('#progress').style.display = 'none';
          $('#status').innerHTML = `<span style="color:var(--gz-success)">${t('done')} (${(blob.size / 1024).toFixed(0)} KB)</span>`;
          return;
        }
        const offset = blocksDone * blockSize;
        const lChunk = leftInt16.subarray(offset, offset + remaining);
        const rChunk = rightInt16.subarray(offset, offset + remaining);
        const enc = channels > 1 ? encoder.encodeBuffer(lChunk, rChunk) : encoder.encodeBuffer(lChunk);
        if (enc.length > 0) mp3Data.push(new Uint8Array(enc));
        blocksDone++;
        $('#progress').value = blocksDone / totalBlocks;
        setTimeout(encodeChunk, 0); // yield to keep UI responsive
      }
      encodeChunk();
    } catch (err) {
      $('#progress').style.display = 'none';
      $('#status').innerHTML = `<span style="color:var(--gz-accent)">Error: ${err.message}</span>`;
    }
  }, 50);
}

function reset() {
  audioBuffer = null;
  $('#file').value = '';
  $('#player').src = '';
  $('#player').style.display = 'none';
  $('#controls').style.display = 'none';
  $('#progress').style.display = 'none';
  $('#stats').innerHTML = '';
  $('#status').innerHTML = '';
  $('#drop-text').textContent = t('dropText');
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="convert()">${t('convert')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="reset()">${t('clear')}</button>`;

$('#controls').innerHTML = `
  <label>${t('bitrate')}<select id="bitrate">
    <option value="64">64 kbps</option>
    <option value="96">96 kbps</option>
    <option value="128" selected>128 kbps</option>
    <option value="192">192 kbps</option>
    <option value="256">256 kbps</option>
    <option value="320">320 kbps</option>
  </select></label>`;

$('#drop-text').textContent = t('dropText');

</script>
