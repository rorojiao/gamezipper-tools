<script>
GZI18n.register({
  en: {
    toolTitle: 'Business Day Calculator',
    toolDesc: 'Count business days between dates or add/subtract working days. Excludes weekends and custom holidays.',
    mode: 'Mode',
    optBetween: 'Days Between Dates',
    optAdd: 'Add/Subtract Days',
    start: 'Start Date',
    end: 'End Date',
    days: 'Number of Days',
    dir: 'Direction',
    holiday: 'Add Custom Holiday (optional)',
    businessDays: 'Business Days',
    totalDays: 'Total Calendar Days',
    weekends: 'Weekend Days Excluded',
    holidays: 'Holidays Excluded',
    resultDate: 'Target Date',
    step1: 'Select calculation mode (between dates or add/subtract)',
    step2: 'Enter your start date and end date or number of days',
    step3: 'Optionally add holiday dates to exclude',
    step4: 'View business day count or target date',
  },
  zh: {
    toolTitle: '工作日计算器',
    toolDesc: '计算两个日期之间的工作日数，或加减工作日。自动排除周末和自定义假日。',
    mode: '模式',
    optBetween: '日期间隔天数',
    optAdd: '加减天数',
    start: '开始日期',
    end: '结束日期',
    days: '天数',
    dir: '方向',
    holiday: '添加自定义假日（可选）',
    businessDays: '工作日',
    totalDays: '总日历天数',
    weekends: '排除的周末天数',
    holidays: '排除的假日',
    resultDate: '目标日期',
    step1: '选择计算模式（日期间隔或加减天数）',
    step2: '输入开始日期和结束日期或天数',
    step3: '可选：添加要排除的假日',
    step4: '查看工作日数或目标日期',
  }
});

const { $, t } = GZ;
let holidays = [];

function init() {
  const today = new Date();
  const todayStr = today.toISOString().split('T')[0];
  $('#start').value = todayStr;
  const nextWeek = new Date(today); nextWeek.setDate(nextWeek.getDate() + 30);
  $('#end').value = nextWeek.toISOString().split('T')[0];
}

function isWeekend(d) {
  const day = d.getDay();
  return day === 0 || day === 6;
}

function isHoliday(dateStr) {
  return holidays.includes(dateStr);
}

function fmtDate(d) {
  return d.toLocaleDateString('en-US', { weekday: 'short', year: 'numeric', month: 'short', day: 'numeric' });
}

function countBusinessDays(start, end) {
  let count = 0, total = 0, weekendCount = 0, holidayCount = 0;
  const cur = new Date(start);
  while (cur <= end) {
    const ds = cur.toISOString().split('T')[0];
    total++;
    if (isWeekend(cur)) { weekendCount++; }
    else if (isHoliday(ds)) { holidayCount++; }
    else { count++; }
    cur.setDate(cur.getDate() + 1);
  }
  return { count, total, weekendCount, holidayCount };
}

function addBusinessDays(start, days, direction) {
  let count = 0;
  const cur = new Date(start);
  const step = direction === 'sub' ? -1 : 1;
  while (count < Math.abs(days)) {
    cur.setDate(cur.getDate() + step);
    const ds = cur.toISOString().split('T')[0];
    if (!isWeekend(cur) && !isHoliday(ds)) count++;
  }
  return cur;
}

function calculate() {
  const mode = $('#mode').value;
  const startStr = $('#start').value;
  if (!startStr) return;
  const start = new Date(startStr + 'T00:00:00');

  if (mode === 'between') {
    const endStr = $('#end').value;
    if (!endStr) return;
    const end = new Date(endStr + 'T00:00:00');
    const r = countBusinessDays(start, end);
    $('#results').innerHTML = `
      <div class="result-box">
        <div class="big">${r.count}</div>
        <div class="small">${t('businessDays')}</div>
      </div>
      <div class="result-grid">
        <div><div class="label">${t('totalDays')}</div><div class="val">${r.total}</div></div>
        <div><div class="label">${t('weekends')}</div><div class="val">${r.weekendCount}</div></div>
        <div><div class="label">${t('holidays')}</div><div class="val">${r.holidayCount}</div></div>
      </div>`;
  } else {
    const days = parseInt($('#days').value) || 0;
    const dir = $('#dir').value;
    const result = addBusinessDays(start, days, dir);
    $('#results').innerHTML = `
      <div class="result-box">
        <div class="big">${fmtDate(result)}</div>
        <div class="small">${t('resultDate')} (${dir === 'sub' ? '−' : '+'}${days} ${t('businessDays').toLowerCase()})</div>
      </div>`;
  }
}

function renderHolidays() {
  $('#holiday-list').innerHTML = holidays.map((h, i) =>
    `<span class="holiday-chip">${h}<span class="x" onclick="removeHoliday(${i})">×</span></span>`
  ).join('');
}

window.removeHoliday = function(i) { holidays.splice(i, 1); renderHolidays(); calculate(); };

function toggleMode() {
  const mode = $('#mode').value;
  $('#end-wrap').style.display = mode === 'between' ? '' : 'none';
  $('#days-wrap').style.display = mode === 'add' ? '' : 'none';
  $('#dir-wrap').style.display = mode === 'add' ? '' : 'none';
}

function updateLabels() {
  $('#opt-between').textContent = t('optBetween');
  $('#opt-add').textContent = t('optAdd');
  $('#opt-add-dir').textContent = '+';
  $('#opt-sub-dir').textContent = '−';
}

$('#add-holiday-btn').onclick = () => {
  const hd = $('#holiday-date').value;
  if (hd && !holidays.includes(hd)) { holidays.push(hd); holidays.sort(); renderHolidays(); calculate(); }
  $('#holiday-date').value = '';
};

['mode','start','end','days','dir'].forEach(id => $('#'+id).addEventListener('input', () => { toggleMode(); calculate(); }));
$('#mode').addEventListener('change', toggleMode);

$('#toolbar').innerHTML = `<button class="gz-btn" onclick="calculate()">${t('calculate')||'Calculate'}</button>`;

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📅', href:'/calc/date-calculator.html', name:'Date Calculator'},
    {icon:'📆', href:'/calc/days-until.html', name:'Days Until'},
    {icon:'🎂', href:'/calc/age-calculator.html', name:'Age Calculator'},
    {icon:'⏰', href:'/calc/alarm-clock.html', name:'Alarm Clock'},
  ]
});

init();
updateLabels();
toggleMode();
calculate();
</script>
