    step4: '点击「复制 Plist」将 XML 复制到剪贴板',

const { $, copyText, t } = GZ;

function escapeXml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function toPlistNode(value, indent) {
  const pad = '  '.repeat(indent);
  const padInner = '  '.repeat(indent + 1);
  if (value === null || value === undefined) {
    return `${pad}<string></string>`;
  }
  if (typeof value === 'boolean') {
    return `${pad}<${value ? 'true' : 'false'}/>`;
  }
  if (typeof value === 'number') {
    if (Number.isInteger(value)) {
      return `${pad}<integer>${value}</integer>`;
    }
    return `${pad}<real>${value}</real>`;
  }
  if (typeof value === 'string') {
    return `${pad}<string>${escapeXml(value)}</string>`;
  }
  if (Array.isArray(value)) {
    if (value.length === 0) return `${pad}<array/>`;
    const items = value.map(v => toPlistNode(v, indent + 1)).join('\n');
    return `${pad}<array>\n${items}\n${pad}</array>`;
  }
  if (typeof value === 'object') {
    const keys = Object.keys(value);
    if (keys.length === 0) return `${pad}<dict/>`;
    const items = keys.map(k => `${padInner}<key>${escapeXml(k)}</key>\n${toPlistNode(value[k], indent + 1)}`).join('\n');
    return `${pad}<dict>\n${items}\n${pad}</dict>`;
  }
  return `${pad}<string>${escapeXml(String(value))}</string>`;
}

function jsonToPlist(jsonStr) {
  const obj = JSON.parse(jsonStr);
  let root;
  if (obj === null || typeof obj !== 'object') {
    // Wrap scalar in a dict
    root = toPlistNode({ value: obj }, 0);
  } else {
    root = toPlistNode(obj, 0);
  }
  return `<?xml version="1.0" encoding="UTF-8"?>\n<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">\n<plist version="1.0">\n${root}\n</plist>`;
}

function doConvert() {
  const inp = $('#input').value.trim();
  if (!inp) { $('#output').textContent = ''; $('#status').innerHTML = ''; return; }
  try {
    const plist = jsonToPlist(inp);
    $('#output').textContent = plist;
    const lineCount = plist.split('\n').length;
    $('#status').innerHTML = `<span style="color:var(--gz-success)">${t('valid')}</span> <span style="opacity:.7">(${lineCount} lines)</span>`;
  } catch(e) {
    $('#status').innerHTML = `<span style="color:var(--gz-accent)">Error: ${e.message}</span>`;
    $('#output').textContent = '';
  }
}

function loadExample() {
  $('#input').value = JSON.stringify({
    CFBundleName: 'MyApp',
    CFBundleVersion: '1.0.0',
    CFBundleShortVersionString: '1.0',
    LSMinimumSystemVersion: '10.13',
    SupportedPlatforms: ['MacOSX', 'iPhoneSimulator', 'iPhoneOS'],
    NSAppTransportSecurity: {
      NSAllowsArbitraryLoads: false,
      NSExceptionDomains: {
        'example.com': { NSExceptionAllowsInsecureHTTPLoads: true }
      }
    },
    CacheSize: 1048576
  }, null, 2);
  doConvert();
}

function doClear() { $('#input').value = ''; $('#output').textContent = ''; $('#status').innerHTML = ''; }

$('#input').addEventListener('input', doConvert);

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="doConvert()">${t('convert')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

$('#lbl-in').textContent = t('inputLabel');
