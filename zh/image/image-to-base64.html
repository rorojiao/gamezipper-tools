<script>
GZI18n.register({
  en: {
    toolTitle: 'Image to Base64 Converter',
    toolDesc: 'Convert images to Base64 encoding online. Drag and drop or select PNG, JPG, WebP, GIF images and get data URI strings instantly.',
    dropzone: 'Drag and drop an image here',
    selectFile: 'Select Image',
    orText: 'or',
    preview: 'Preview',
    fileName: 'File Name',
    dimensions: 'Dimensions',
    fileSize: 'File Size',
    mimeType: 'MIME Type',
    dataURI: 'Data URI',
    rawBase64: 'Raw Base64',
    copy: 'Copy',
    copied: 'Copied!',
    clear: 'Clear',
    fileTooLarge: '⚠ File is larger than 1MB. The Base64 output will be very large.',
    unsupportedFormat: 'Unsupported format. Please use PNG, JPG, WebP, or GIF.',
    step1: 'Drag and drop an image onto the drop zone, or click to select a file',
    step2: 'The tool automatically converts the image to a Base64 encoded string',
    step3: 'Toggle between Data URI and Raw Base64 output modes',
    step4: 'Click Copy to copy the Base64 string to your clipboard',
  },
  zh: {
    toolTitle: '图片转 Base64 工具',
    toolDesc: '在线将图片转换为 Base64 编码。支持拖拽或选择 PNG、JPG、WebP、GIF 图片，即时生成 Data URI 字符串。',
    dropzone: '将图片拖放到此处',
    selectFile: '选择图片',
    orText: '或者',
    preview: '预览',
    fileName: '文件名',
    dimensions: '尺寸',
    fileSize: '文件大小',
    mimeType: 'MIME 类型',
    dataURI: 'Data URI',
    rawBase64: '纯 Base64',
    copy: '复制',
    copied: '已复制！',
    clear: '清除',
    fileTooLarge: '⚠ 文件超过 1MB，Base64 输出将非常大。',
    unsupportedFormat: '不支持的格式，请使用 PNG、JPG、WebP 或 GIF。',
    step1: '将图片拖放到拖放区域，或点击选择文件',
    step2: '工具会自动将图片转换为 Base64 编码字符串',
    step3: '在 Data URI 和纯 Base64 输出模式之间切换',
    step4: '点击「复制」将 Base64 字符串复制到剪贴板',
  }
});

const { $, copyText, t } = GZ;
let base64Data = '';
let rawBase64 = '';
let mimeType = '';
let outputMode = 'datauri';

const allowedTypes = ['image/png','image/jpeg','image/webp','image/gif'];

function formatSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1048576) return (bytes / 1024).toFixed(2) + ' KB';
  return (bytes / 1048576).toFixed(2) + ' MB';
}

function handleFile(file) {
  if (!file) return;
  if (!allowedTypes.includes(file.type)) {
    alert(t('unsupportedFormat'));
    return;
  }
  mimeType = file.type;
  const reader = new FileReader();
  reader.onload = function(e) {
    base64Data = e.target.result;
    rawBase64 = base64Data.split(',')[1] || '';

    // Preview
    const img = $('#preview-img');
    img.src = base64Data;
    img.onload = function() {
      $('#val-dimensions').textContent = img.naturalWidth + ' × ' + img.naturalHeight + ' px';
    };

    $('#val-filename').textContent = file.name;
    $('#val-filesize').textContent = formatSize(file.size);
    $('#val-mimetype').textContent = file.type;
    $('#preview-area').style.display = 'block';

    // Warning for large files
    if (file.size > 1048576) {
      $('#warning').textContent = t('fileTooLarge');
      $('#warning').style.display = 'block';
    } else {
      $('#warning').style.display = 'none';
    }

    updateOutput();
  };
  reader.readAsDataURL(file);
}

function updateOutput() {
  const textarea = $('#base64-output');
  textarea.value = outputMode === 'datauri' ? base64Data : rawBase64;
}

// Dropzone events
const dz = $('#dropzone');
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('dragover'); });
dz.addEventListener('dragleave', () => dz.classList.remove('dragover'));
dz.addEventListener('drop', e => {
  e.preventDefault();
  dz.classList.remove('dragover');
  if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
});
dz.addEventListener('click', e => {
  if (e.target.id !== 'select-btn' && e.target.tagName !== 'BUTTON') {
    $('#file-input').click();
  }
});
$('#select-btn').addEventListener('click', e => { e.stopPropagation(); $('#file-input').click(); });
$('#file-input').addEventListener('change', function() { if (this.files.length) handleFile(this.files[0]); });

// Output mode toggle
$('#btn-datauri').addEventListener('click', function() {
  outputMode = 'datauri';
  this.classList.add('active');
  $('#btn-raw').classList.remove('active');
  updateOutput();
});
$('#btn-raw').addEventListener('click', function() {
  outputMode = 'raw';
  this.classList.add('active');
  $('#btn-datauri').classList.remove('active');
  updateOutput();
});

// Toolbar
function doCopy() {
  copyText($('#base64-output').value);
}
function doClear() {
  base64Data = '';
  rawBase64 = '';
  mimeType = '';
  $('#preview-area').style.display = 'none';
  $('#warning').style.display = 'none';
  $('#base64-output').value = '';
  $('#file-input').value = '';
}

// Localize UI elements
$('#dropzone-text').textContent = t('dropzone');
$('#or-text').textContent = t('orText');
$('#select-btn').textContent = t('selectFile');
$('#lbl-filename').textContent = t('fileName');
$('#lbl-dimensions').textContent = t('dimensions');
$('#lbl-filesize').textContent = t('fileSize');
$('#lbl-mimetype').textContent = t('mimeType');
$('#btn-datauri').textContent = t('dataURI');
$('#btn-raw').textContent = t('rawBase64');

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="doCopy()">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

GZ.renderToolPage({
  category: 'image',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📦', href:'/image/compressor.html', name:'Image Compressor'},
    {icon:'🔄', href:'/image/converter.html', name:'Image Converter'},
    {icon:'🖼️', href:'/image/svg-to-png.html', name:'SVG to PNG'},
    {icon:'✂️', href:'/image/cropper.html', name:'Image Cropper'},
  ]
});
</script>
