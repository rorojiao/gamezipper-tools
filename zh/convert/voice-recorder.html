  },
  zh: {

    toolDesc: '免费在线麦克风录音工具。实时波形可视化，下载为 WAV 格式，无需安装，完全浏览器本地运行。',
    record: '⏺ 录音',
    stop: '■ 停止',
    pause: '⏸ 暂停',
    resume: '▶ 继续',
    recording: '录音中…',
    paused: '已暂停',
    ready: '就绪',
    download: '下载 WAV',
    step1: '点击「录音」按钮并允许麦克风权限',
    step2: '说话或播放音频 — 观看实时波形',
    step3: '点击「停止」完成录音',
    step4: '点击录音旁边的「下载」保存为 WAV 文件',
  }
});

const { $, t } = GZ;
let mediaRec, chunks = [], isRecording = false, isPaused = false, recCount = 0;
let timerStart, timerElapsed = 0, timerInterval;
let audioCtx, analyser, dataArray, animId;

const canvas = $('#viz');
const ctx = canvas.getContext('2d');

function resizeCanvas() {
  const dpr = window.devicePixelRatio || 1;
  const w = canvas.clientWidth, h = canvas.clientHeight;
  canvas.width = w * dpr; canvas.height = h * dpr;
  ctx.scale(dpr, dpr);
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

function drawIdle() {
  const w = canvas.clientWidth, h = canvas.clientHeight;
  ctx.clearRect(0, 0, w, h);
  ctx.strokeStyle = 'rgba(255,255,255,0.1)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(0, h/2); ctx.lineTo(w, h/2); ctx.stroke();
}
drawIdle();

function drawWave() {
  if (!analyser) return;
  animId = requestAnimationFrame(drawWave);
  analyser.getByteTimeDomainData(dataArray);
  const w = canvas.clientWidth, h = canvas.clientHeight;
  ctx.clearRect(0, 0, w, h);
  ctx.lineWidth = 2;
  ctx.strokeStyle = getComputedStyle(document.documentElement).getPropertyValue('--gz-accent').trim() || '#e94560';
  ctx.beginPath();
  const sl = w / dataArray.length;
  let x = 0;
  for (let i = 0; i < dataArray.length; i++) {
    const v = dataArray[i] / 128.0;
    const y = (v * h) / 2;
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    x += sl;
  }
  ctx.lineTo(w, h / 2);
  ctx.stroke();
}

function formatTimer(ms) {
  const s = Math.floor(ms / 1000);
  return Math.floor(s / 60) + ':' + String(s % 60).padStart(2, '0');
}

function startTimer() {
  timerStart = Date.now() - timerElapsed;
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    timerElapsed = Date.now() - timerStart;
    $('#timer').textContent = formatTimer(timerElapsed);
  }, 200);
}

function stopTimer() {
  clearInterval(timerInterval);
}

$('#rec-btn').onclick = async () => {
  if (isRecording) return;
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const source = audioCtx.createMediaStreamSource(stream);
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 2048;
    source.connect(analyser);
    dataArray = new Uint8Array(analyser.frequencyBinCount);
    drawWave();

    mediaRec = new MediaRecorder(stream);
    chunks = [];
    mediaRec.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
    mediaRec.onstop = () => {
      const blob = new Blob(chunks, { type: 'audio/webm' });
      stream.getTracks().forEach(t => t.stop());
      cancelAnimationFrame(animId);
      addRecording(blob);
    };
    mediaRec.start();
    isRecording = true; isPaused = false;
    timerElapsed = 0; startTimer();
    $('#rec-btn').disabled = true;
    $('#pause-btn').disabled = false;
    $('#stop-btn').disabled = false;
    $('#status-text').innerHTML = '<span class="rec-indicator"></span>' + t('recording');
  } catch(e) {
    alert('Microphone access denied or unavailable.');
  }
};

$('#pause-btn').onclick = () => {
  if (!isRecording) return;
  if (isPaused) {
    mediaRec.resume(); isPaused = false;
    $('#pause-btn').textContent = t('pause');
    $('#status-text').innerHTML = '<span class="rec-indicator"></span>' + t('recording');
    startTimer();
  } else {
    mediaRec.pause(); isPaused = true;
    $('#pause-btn').textContent = t('resume');
    $('#status-text').textContent = t('paused');
    stopTimer();
  }
};

$('#stop-btn').onclick = () => {
  if (!isRecording) return;
  mediaRec.stop();
  isRecording = false; isPaused = false;
  stopTimer();
  $('#rec-btn').disabled = false;
  $('#pause-btn').disabled = true;
  $('#stop-btn').disabled = true;
  $('#pause-btn').textContent = t('pause');
  $('#status-text').textContent = t('ready');
  drawIdle();
};

async function addRecording(blob) {
  recCount++;
  const arrayBuf = await blob.arrayBuffer();
  const tempCtx = new (window.AudioContext || window.webkitAudioContext)();
  const audioBuf = await tempCtx.decodeAudioData(arrayBuf);
  const wav = audioBufferToWav(audioBuf);
  const wavBlob = new Blob([wav], { type: 'audio/wav' });
  const url = URL.createObjectURL(wavBlob);

  const div = document.createElement('div');
  div.className = 'rec-item';
  const audio = document.createElement('audio');
  audio.controls = true;
  audio.src = url;
  const label = document.createElement('span');
  label.textContent = 'Recording ' + recCount + ' (' + formatTimer(timerElapsed) + ')';
  const dl = document.createElement('a');
  dl.href = url;
  dl.download = 'recording_' + recCount + '.wav';
  dl.className = 'gz-btn gz-btn-secondary';
  dl.textContent = t('download');
  dl.style.fontSize = '.85em';
  div.appendChild(label);
  div.appendChild(audio);
  div.appendChild(dl);
  $('#recordings').prepend(div);
}

function audioBufferToWav(buf) {
  const numCh = buf.numberOfChannels, sr = buf.sampleRate, len = buf.length;
  const bps = 16, byteRate = sr * numCh * bps / 8, blockAlign = numCh * bps / 8;
  const dataSize = len * numCh * bps / 8;
  const buffer = new ArrayBuffer(44 + dataSize);
  const v = new DataView(buffer);
  function ws(o, s) { for (let i = 0; i < s.length; i++) v.setUint8(o + i, s.charCodeAt(i)); }
  ws(0, 'RIFF'); v.setUint32(4, 36 + dataSize, true); ws(8, 'WAVE');
  ws(12, 'fmt '); v.setUint32(16, 16, true); v.setUint16(20, 1, true);
  v.setUint16(22, numCh, true); v.setUint32(24, sr, true);
  v.setUint32(28, byteRate, true); v.setUint16(32, blockAlign, true); v.setUint16(34, bps, true);
  ws(36, 'data'); v.setUint32(40, dataSize, true);
  let off = 44;
  for (let i = 0; i < len; i++) {
    for (let ch = 0; ch < numCh; ch++) {
      const s = Math.max(-1, Math.min(1, buf.getChannelData(ch)[i]));
      v.setInt16(off, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
      off += 2;
    }
  }
  return buffer;
}
