const { $, t } = GZ;
const display = $('#display');
const hidden = $('#hiddenInput');

let target = '';
let typed = '';
let startTime = null;
let errors = 0;
let correct = 0;
let totalKeystrokes = 0;
let finished = false;
let lastDrill = 'quotes';
let pool = [];

function pickText() {
  const drill = $('#drill').value;
  lastDrill = drill;
  if (drill === 'custom') {
    const custom = $('#customText').value.trim();
    target = custom || t('customPlaceholder');
  } else {
    pool = t(drill);
    target = pool[Math.floor(Math.random() * pool.length)];
  }
  typed = '';
  startTime = null;
  errors = 0;
  correct = 0;
  totalKeystrokes = 0;
  finished = false;
  $('#done').style.display = 'none';
  render();
  updateStats();
}

function render() {
  let html = '';
  for (let i = 0; i < target.length; i++) {
    const ch = target[i];
    const display = ch === '\n' ? '↵\n' : ch;
    let cls = 'tp-char pending';
    if (i < typed.length) {
      cls = typed[i] === ch ? 'tp-char correct' : 'tp-char wrong';
    } else if (i === typed.length) {
      cls = 'tp-char current';
    }
    html += `<span class="${cls}">${escapeHtml(display)}</span>`;
  }
  $('#display').innerHTML = html;
  const pct = target.length ? (typed.length / target.length) * 100 : 0;
  $('#progressBar').style.width = pct + '%';
}

function escapeHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function updateStats() {
  const elapsed = startTime ? (Date.now() - startTime) / 1000 / 60 : 0;
  const wpm = elapsed > 0 ? Math.round((correct / 5) / elapsed) : 0;
  const acc = totalKeystrokes > 0 ? Math.round((correct / totalKeystrokes) * 100) : 100;
  $('#stat-wpm').textContent = wpm;
  $('#stat-acc').textContent = acc + '%';
  $('#stat-correct').textContent = correct;
  $('#stat-errors').textContent = errors;
}

function handleKey(e) {
  if (finished) return;
  if (e.key === 'Backspace') {
    e.preventDefault();
    if (typed.length > 0) {
      typed = typed.slice(0, -1);
      render();
    }
    return;
  }
  // Ignore modifier / function keys
  if (e.key.length !== 1 || e.ctrlKey || e.metaKey || e.altKey) return;
  e.preventDefault();
  if (!startTime) startTime = Date.now();
  const expected = target[typed.length];
  typed += e.key;
  totalKeystrokes++;
  if (e.key === expected) {
    correct++;
  } else {
    errors++;
  }
  render();
  updateStats();
  if (typed.length >= target.length) {
    finished = true;
    updateStats();
    const elapsed = (Date.now() - startTime) / 1000 / 60;
    const wpm = elapsed > 0 ? Math.round((correct / 5) / elapsed) : 0;
    const acc = totalKeystrokes > 0 ? Math.round((correct / totalKeystrokes) * 100) : 100;
    $('#done').textContent = t('doneMsg').replace('{wpm}', wpm).replace('{acc}', acc).replace('{err}', errors);
    $('#done').style.display = 'block';
  }
}

// Focus management — keep hidden input focused so mobile keyboards work
display.addEventListener('click', () => hidden.focus());
hidden.addEventListener('keydown', handleKey);
hidden.addEventListener('input', e => {
  // Some mobile IMEs fire input instead of keydown; sync defensively
  e.preventDefault();
});

$('#drill').addEventListener('change', () => {
  const isCustom = $('#drill').value === 'custom';
  $('#customText').style.display = isCustom ? 'block' : 'none';
  if (isCustom) $('#customText').focus();
  pickText();
});
$('#customText').addEventListener('input', () => { if ($('#drill').value === 'custom') pickText(); });
$('#restartBtn').addEventListener('click', () => { typed = ''; startTime = null; errors = 0; correct = 0; totalKeystrokes = 0; finished = false; $('#done').style.display='none'; render(); updateStats(); hidden.focus(); });
$('#newBtn').addEventListener('click', () => { pickText(); hidden.focus(); });

// Labels
$('#lbl-drill').textContent = t('lblDrill');
$('#lbl-wpm').textContent = t('lblWpm');
$('#lbl-acc').textContent = t('lblAcc');
$('#lbl-correct').textContent = t('lblCorrect');
$('#lbl-errors').textContent = t('lblErrors');
$('#restartBtn').textContent = '↻ ' + t('restart');
$('#newBtn').textContent = t('newText');
$('#note').textContent = t('note');
$('#customText').placeholder = t('customPlaceholder');

// Live WPM tick
setInterval(() => { if (startTime && !finished) updateStats(); }, 500);

GZ.renderToolPage({
  category: 'fun',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],

    {icon:'📖', href:'/text/speed-reader.html', name:'Speed Reader'},
    {icon:'⚡', href:'/text/bionic.html', name:'Bionic Reading'},
  ]
});

pickText();
setTimeout(() => hidden.focus(), 100);
</script>
