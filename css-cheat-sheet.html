<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is CSS?", "acceptedAnswer": {"@type": "Answer", "text": "CSS (Cascading Style Sheets) is a stylesheet language used to describe the presentation of HTML documents. It controls colors, fonts, layout, spacing, animations and responsive behavior. CSS3 added features like flexbox, grid, transitions, transforms and custom properties."}}, {"@type": "Question", "name": "What is the difference between Flexbox and Grid?", "acceptedAnswer": {"@type": "Answer", "text": "Flexbox is one-dimensional (row OR column) and ideal for navbars, button groups and centering. Grid is two-dimensional (rows AND columns) and ideal for full page layouts, card grids and complex arrangements. They can be combined — use Grid for page layout and Flexbox inside grid items."}}, {"@type": "Question", "name": "How do I center a div with CSS?", "acceptedAnswer": {"@type": "Answer", "text": "The easiest way is Flexbox: set the parent to display:flex; align-items:center; justify-content:center. Or use Grid: display:grid; place-items:center. Both methods center both horizontally and vertically."}}, {"@type": "Question", "name": "What are CSS custom properties?", "acceptedAnswer": {"@type": "Answer", "text": "Custom properties (CSS variables) let you store reusable values: --color-primary: #4ecdc4;. Reference them with var(--color-primary). They cascade, can be overridden per element, and update dynamically with JavaScript."}}]}</script>

<script>
GZI18n.register({
  en: {
    toolTitle: 'CSS Cheat Sheet',
    toolDesc: 'Complete interactive CSS reference with searchable properties, descriptions and copy-paste examples covering flexbox, grid, animations and more.',
    search: 'Search properties...',
    step1: 'Type in the search box to filter properties',
    step2: 'Click a category tab to narrow the view',
    step3: 'Read the description and accepted values',
    step4: 'Click Copy on any example to grab the code',
  },
  zh: {
    toolTitle: 'CSS 速查表',
    toolDesc: '完整的交互式 CSS 参考手册，支持搜索属性、查看描述和复制示例代码，涵盖 flexbox、grid、动画等。',
    search: '搜索属性...',
    step1: '在搜索框输入以筛选属性',
    step2: '点击分类标签缩小范围',
    step3: '阅读描述和可用值',
    step4: '点击示例上的复制按钮获取代码',
  }
});

const { t } = GZ;

const SECTIONS = [
  {id:'all', label:'All'},
  {id:'flexbox', label:'Flexbox'},
  {id:'grid', label:'Grid'},
  {id:'box', label:'Box Model'},
  {id:'typography', label:'Typography'},
  {id:'color', label:'Colors'},
  {id:'animation', label:'Animation'},
  {id:'position', label:'Position'},
  {id:'responsive', label:'Responsive'},
];

const PROPS = [
  // Flexbox
  {prop:'display: flex', sec:'flexbox', desc:'Enables flexbox layout on container.', ex:'.container {\n  display: flex;\n  gap: 16px;\n}', vals:'flex | inline-flex'},
  {prop:'flex-direction', sec:'flexbox', desc:'Sets main axis direction.', ex:'flex-direction: row-reverse;', vals:'row | row-reverse | column | column-reverse'},
  {prop:'justify-content', sec:'flexbox', desc:'Aligns items along main axis.', ex:'justify-content: space-between;', vals:'flex-start | center | space-between | space-around | space-evenly'},
  {prop:'align-items', sec:'flexbox', desc:'Aligns items along cross axis.', ex:'align-items: center;', vals:'stretch | flex-start | center | flex-end | baseline'},
  {prop:'flex-wrap', sec:'flexbox', desc:'Controls wrapping of items.', ex:'flex-wrap: wrap;', vals:'nowrap | wrap | wrap-reverse'},
  {prop:'flex', sec:'flexbox', desc:'Shorthand for grow, shrink, basis.', ex:'flex: 1 1 0%;', vals:'flex-grow flex-shrink flex-basis'},
  {prop:'gap', sec:'flexbox', desc:'Spacing between flex items.', ex:'gap: 16px;', vals:'<length>'},
  {prop:'align-self', sec:'flexbox', desc:'Overrides align-items for one item.', ex:'.item { align-self: flex-end; }', vals:'auto | flex-start | center | flex-end | stretch'},
  // Grid
  {prop:'display: grid', sec:'grid', desc:'Enables CSS grid layout.', ex:'.layout {\n  display: grid;\n  grid-template-columns: 1fr 2fr;\n}', vals:'grid | inline-grid'},
  {prop:'grid-template-columns', sec:'grid', desc:'Defines column tracks.', ex:'grid-template-columns: repeat(3, 1fr);', vals:'<track-size> | repeat() | fr units'},
  {prop:'grid-template-rows', sec:'grid', desc:'Defines row tracks.', ex:'grid-template-rows: auto 1fr auto;', vals:'<track-size> | fr units'},
  {prop:'grid-column', sec:'grid', desc:'Item spans columns.', ex:'grid-column: 1 / 3;', vals:'<start> / <end> | span <n>'},
  {prop:'grid-row', sec:'grid', desc:'Item spans rows.', ex:'grid-row: span 2;', vals:'<start> / <end> | span <n>'},
  {prop:'grid-gap', sec:'grid', desc:'Shorthand for row/column gap.', ex:'grid-gap: 20px 10px;', vals:'<row-gap> <column-gap>'},
  {prop:'grid-area', sec:'grid', desc:'Place item in named area.', ex:'grid-area: header;', vals:'<name> | <row-start> / <col-start>...'},
  // Box model
  {prop:'margin', sec:'box', desc:'Outer spacing.', ex:'margin: 0 auto;', vals:'<length> | auto'},
  {prop:'padding', sec:'box', desc:'Inner spacing.', ex:'padding: 16px 24px;', vals:'<length> | <percentage>'},
  {prop:'border', sec:'box', desc:'Border shorthand.', ex:'border: 2px solid #4ecdc4;', vals:'<width> <style> <color>'},
  {prop:'border-radius', sec:'box', desc:'Rounds corners.', ex:'border-radius: 12px;', vals:'<length> | <percentage> | 50%'},
  {prop:'box-shadow', sec:'box', desc:'Drop shadow effect.', ex:'box-shadow: 0 4px 12px rgba(0,0,0,.2);', vals:'<offset-x> <offset-y> <blur> <spread> <color>'},
  {prop:'width / height', sec:'box', desc:'Element dimensions.', ex:'width: 100%;\nmax-width: 800px;', vals:'<length> | <percentage> | auto'},
  {prop:'box-sizing', sec:'box', desc:'Includes padding/border in size.', ex:'box-sizing: border-box;', vals:'content-box | border-box'},
  // Typography
  {prop:'font-size', sec:'typography', desc:'Text size.', ex:'font-size: 1.125rem;', vals:'<length> | <percentage> | rem | em'},
  {prop:'font-weight', sec:'typography', desc:'Text thickness.', ex:'font-weight: 700;', vals:'normal | bold | 100–900'},
  {prop:'line-height', sec:'typography', desc:'Vertical spacing between lines.', ex:'line-height: 1.6;', vals:'<number> | <length> | normal'},
  {prop:'letter-spacing', sec:'typography', desc:'Space between characters.', ex:'letter-spacing: 0.05em;', vals:'<length> | normal'},
  {prop:'text-align', sec:'typography', desc:'Horizontal text alignment.', ex:'text-align: center;', vals:'left | right | center | justify'},
  {prop:'text-decoration', sec:'typography', desc:'Underline, strike, etc.', ex:'text-decoration: underline wavy red;', vals:'none | underline | line-through'},
  {prop:'text-transform', sec:'typography', desc:'Changes text case.', ex:'text-transform: uppercase;', vals:'none | capitalize | uppercase | lowercase'},
  {prop:'font-family', sec:'typography', desc:'Font stack.', ex:"font-family: 'Inter', sans-serif;", vals:'<family-name> | generic-family'},
  // Colors
  {prop:'color', sec:'color', desc:'Text color.', ex:'color: #4ecdc4;', vals:'<named> | hex | rgb() | hsl()'},
  {prop:'background-color', sec:'color', desc:'Element background color.', ex:'background-color: rgba(0,0,0,.5);', vals:'<color> | transparent'},
  {prop:'background', sec:'color', desc:'Background shorthand.', ex:'background: linear-gradient(45deg, #4ecdc4, #44a);', vals:'<color> <image> <position> <size>...'},
  {prop:'opacity', sec:'color', desc:'Transparency 0–1.', ex:'opacity: 0.8;', vals:'0 – 1'},
  // Animation
  {prop:'transition', sec:'animation', desc:'Smooth property change.', ex:'transition: all 0.3s ease;', vals:'<property> <duration> <timing> <delay>'},
  {prop:'transform', sec:'animation', desc:'Rotate, scale, translate.', ex:'transform: rotate(45deg) scale(1.2);', vals:'rotate() | scale() | translate() | skew()'},
  {prop:'animation', sec:'animation', desc:'Keyframe animation shorthand.', ex:"animation: spin 2s linear infinite;", vals:'<name> <duration> <timing> <delay> <count> <direction>'},
  {prop:'@keyframes', sec:'animation', desc:'Defines animation steps.', ex:'@keyframes spin {\n  to { transform: rotate(360deg); }\n}', vals:'<name> { from {} to {} }'},
  // Position
  {prop:'position', sec:'position', desc:'Positioning scheme.', ex:'position: absolute;', vals:'static | relative | absolute | fixed | sticky'},
  {prop:'top / right / bottom / left', sec:'position', desc:'Offset edges.', ex:'top: 0;\nleft: 0;', vals:'<length> | <percentage> | auto'},
  {prop:'z-index', sec:'position', desc:'Stacking order.', ex:'z-index: 100;', vals:'<integer> | auto'},
  // Responsive
  {prop:'@media', sec:'responsive', desc:'Responsive breakpoint query.', ex:'@media (max-width: 768px) {\n  .grid { grid-template-columns: 1fr; }\n}', vals:'@media (<condition>) { ... }'},
  {prop:'min-width / max-width', sec:'responsive', desc:'Constrain element size.', ex:'max-width: 1200px;\nmargin: 0 auto;', vals:'<length> | none'},
  {prop:'aspect-ratio', sec:'responsive', desc:'Maintains width/height ratio.', ex:'aspect-ratio: 16 / 9;', vals:'<width> / <height>'},
  {prop:'object-fit', sec:'responsive', desc:'How media fills container.', ex:'object-fit: cover;', vals:'fill | contain | cover | none'},
];

let currentSection = 'all';
let searchQuery = '';

function renderTabs() {
  document.getElementById('tabs').innerHTML = SECTIONS.map(s =>
    `<button class="${s.id === currentSection ? 'active' : ''}" onclick="setSection('${s.id}')">${s.label}</button>`
  ).join('');
}

function setSection(id) {
  currentSection = id;
  renderTabs();
  renderCards();
}

function renderCards() {
  const filtered = PROPS.filter(p => {
    const secOk = currentSection === 'all' || p.sec === currentSection;
    const q = searchQuery.toLowerCase();
    const qOk = !q || p.prop.toLowerCase().includes(q) || p.desc.toLowerCase().includes(q);
    return secOk && qOk;
  });
  if (filtered.length === 0) {
    document.getElementById('card-list').innerHTML = '<p style="text-align:center;color:var(--text2);padding:40px">No properties found</p>';
    return;
  }
  document.getElementById('card-list').innerHTML = filtered.map((p, i) => {
    const escaped = p.ex.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    return `<div class="prop-card">
      <div class="prop-name">${p.prop}</div>
      <div class="prop-desc">${p.desc}</div>
      <div class="prop-example"><button class="copy-btn" onclick="copyExample(this, ${i})">Copy</button><code>${escaped}</code></div>
      <div class="values"><strong>Values:</strong> ${p.vals}</div>
    </div>`;
  }).join('');
  window._propData = filtered;
}

function copyExample(btn, i) {
  const ex = window._propData[i].ex;
  navigator.clipboard.writeText(ex).then(() => {
    btn.textContent = '✓';
    setTimeout(() => btn.textContent = 'Copy', 1500);
  });
}

document.getElementById('search').addEventListener('input', e => {
  searchQuery = e.target.value;
  renderCards();
});
document.getElementById('search').placeholder = t('search');

renderTabs();
renderCards();

GZ.renderToolPage({
  category: 'css',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🎨', href:'/css-tools/gradient.html', name:'CSS Gradient'},
    {icon:'🔲', href:'/css-tools/box-shadow.html', name:'Box Shadow'},
    {icon:'📐', href:'/css-tools/grid.html', name:'CSS Grid'},
    {icon:'📄', href:'/html-cheat-sheet.html', name:'HTML Cheat Sheet'},
  ]
});
</script>

</body>
