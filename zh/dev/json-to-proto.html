const { $, copyText, t } = GZ;

// ---------- Protobuf generator core ----------
function cap(s) { return s.charAt(0).toUpperCase() + s.slice(1); }
function pascal(s) {
  return s.split(/[^a-zA-Z0-9]+/).filter(Boolean).map(cap).join('') || 'Field';
}
function sanitizeField(s) {
  let n = s.replace(/[^a-zA-Z0-9_]/g, '_');
  if (/^[0-9]/.test(n)) n = '_' + n;
  const reserved = new Set(['syntax','import','package','option','message','enum','service','rpc','returns','stream','reserved','extensions','extend','oneof','map','repeated','optional','required','default']);
  if (reserved.has(n.toLowerCase())) n = n + '_field';
  return n;
}

function scalarType(v) {
  if (typeof v === 'boolean') return 'bool';
  if (typeof v === 'string') return 'string';
  if (typeof v === 'number') {
    if (Number.isInteger(v)) {
      if (v < -2147483648 || v > 2147483647) return 'int64';
      return 'int32';
    }
    return 'double';
  }
  return null; // not scalar
}

function fieldCardinality(typeName, syntax) {
  // proto3 has no required/optional by default for ordinary fields
  return '';
}

let msgCounter = 0;
function freshName(base) {
  msgCounter++;
  return base + (msgCounter === 1 ? '' : msgCounter);
}

function collectEnumCandidates(arr) {
  // For arrays of objects, find string fields with low cardinality
  if (!Array.isArray(arr) || !arr.length || typeof arr[0] !== 'object' || arr[0] === null) return {};
  const stringSets = {};
  for (const item of arr) {
    if (!item || typeof item !== 'object') continue;
    for (const [k, v] of Object.entries(item)) {
      if (typeof v === 'string') {
        if (!stringSets[k]) stringSets[k] = new Set();
        stringSets[k].add(v);
      }
    }
  }
  const out = {};
  for (const [k, s] of Object.entries(stringSets)) {
    if (s.size >= 2 && s.size <= 12) out[k] = Array.from(s);
  }
  return out;
}

function analyzeValue(v, prefix, registry, opts) {
  // Returns { type, isRepeated, isMessage, isEnum, enumName, nestedDefs (array of {name, def}) }
  if (Array.isArray(v)) {
    // Determine element type from first non-null item
    let elem = null;
    for (const x of v) { if (x !== null && x !== undefined) { elem = x; break; } }
    if (elem === null) {
      return { type: 'string', isRepeated: true };
    }
    const inner = analyzeValue(elem, prefix, registry, opts);
    const out = { ...inner, isRepeated: true };
    return out;
  }
  if (v !== null && typeof v === 'object') {
    const msgName = freshName(pascal(prefix) || 'Message');
    const def = buildMessageDef(v, msgName, registry, opts);
    registry.messages.push({ name: msgName, def });
    return { type: msgName, isMessage: true };
  }
  if (v === null) {
    return { type: opts.syntax === 'proto3' ? 'google.protobuf.Value' : 'string' };
  }
  const st = scalarType(v);
  return { type: st };
}

function buildMessageDef(obj, msgName, registry, opts) {
  // returns array of {comment, line}
  const lines = [];
  const fieldMap = {}; // sanitizedName -> { type, repeated, idx }
  const enumCandidates = opts.detectEnums ? collectEnumCandidatesFromObject(obj) : {};
  let idx = 0;
  const seen = new Set();

  for (const [rawKey, rawVal] of Object.entries(obj)) {
    if (rawVal === undefined) continue;
    const sname = sanitizeField(rawKey);
    let key = sname;
    let i = 2;
    while (seen.has(key)) { key = sname + '_' + i; i++; }
    seen.add(key);
    idx++;

    const info = analyzeValue(rawVal, rawKey, registry, opts);

    // Handle enum candidate (only if scalar string and matches candidate set within arrays)
    if (info.isRepeated !== true && info.type === 'string' && enumCandidates[rawKey]) {
      const enumName = pascal(rawKey);
      if (!registry.enums.find(e => e.name === enumName)) {
        const values = enumCandidates[rawKey];
        const enumDef = values.map((val, i) => `${sanitizeField(val.toUpperCase())} = ${i};`);
        registry.enums.push({ name: enumName, def: enumDef });
        lines.push({ type: 'enum', enumName });
        lines.push({ type: 'field', field: key, fieldType: enumName, repeated: false, idx });
        continue;
      }
    }

    lines.push({ type: 'field', field: key, fieldType: info.type, repeated: !!info.isRepeated, idx });
  }
  return lines;
}

function collectEnumCandidatesFromObject(obj) {
  // For a single object (not array), we don't have multi-sample, so return {}
  // (enum detection works when arrays contain objects with repeated string values)
  return {};
}

function generateProto(json, opts) {
  msgCounter = 0;
  const registry = { messages: [], enums: [] };
  let rootData = json;
  let rootName = opts.rootName || 'Root';

  // If top-level is array, peek first element
  if (Array.isArray(json)) {
    let first = null;
    for (const x of json) { if (x !== null && x !== undefined) { first = x; break; } }
    rootData = (first && typeof first === 'object') ? first : { item: first };
    rootName = opts.rootName || 'Root';
  }

  if (rootData === null || typeof rootData !== 'object') {
    // Wrap scalar
    rootData = { value: rootData };
  }

  const rootDef = buildMessageDef(rootData, rootName, registry, opts);
  registry.messages.unshift({ name: rootName, def: rootDef });

  // Render
  const lines = [];
  lines.push(`syntax = "${opts.syntax}";`);
  lines.push('');
  if (opts.package) { lines.push(`package ${opts.package};`); lines.push(''); }
  if (opts.outerClass && opts.syntax === 'proto2') {
    lines.push(`option java_outer_classname = "${opts.outerClass}";`);
    lines.push('');
  } else if (opts.outerClass) {
    lines.push(`option java_outer_classname = "${opts.outerClass}";`);
    lines.push('');
  }

  for (const msg of registry.messages) {
    lines.push(`message ${msg.name} {`);
    const indent = '  ';
    if (!msg.def.length) {
      lines.push(indent + '// empty message');
    }
    for (const item of msg.def) {
      if (item.type === 'enum') {
        const e = registry.enums.find(en => en.name === item.enumName);
        if (e) {
          lines.push(indent + `enum ${e.name} {`);
          e.def.forEach(v => lines.push(indent + '  ' + v));
          lines.push(indent + '}');
        }
      } else if (item.type === 'field') {
        const rep = item.repeated ? 'repeated ' : '';
        lines.push(indent + `${rep}${item.fieldType} ${item.field} = ${item.idx};`);
      }
    }
    lines.push('}');
    lines.push('');
  }

  return lines.join('\n');
}

function highlight(code) {
  return code
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/("(?:syntax|package)"|\d+)/g, '<span class="num">$1</span>')
    .replace(/\b(syntax|package|import|option|message|enum|service|rpc|returns|stream|repeated|optional|required|map)\b/g, '<span class="kw">$1</span>')
    .replace(/\b(int32|int64|uint32|uint64|sint32|sint64|fixed32|fixed64|sfixed32|sfixed64|float|double|bool|string|bytes)\b/g, '<span class="typ">$1</span>')
    .replace(/(message\s+)([A-Z][A-Za-z0-9_]*)/g, '$1<span class="msg">$2</span>')
    .replace(/(\s)([a-z_][A-Za-z0-9_]*)\s*=\s*(\d+)/g, '$1<span class="fld">$2</span> = $3');
}

// ---------- UI wiring ----------
function getOpts() {
  return {
    syntax: document.querySelector('input[name=syn]:checked')?.value || 'proto3',
    package: $('#pkg').value.trim().replace(/[^a-zA-Z0-9_.]/g, ''),
    rootName: pascal($('#root').value.trim() || 'Root'),
    outerClass: $('#outer').value.trim().replace(/[^a-zA-Z0-9_]/g, '') || '',
    detectEnums: $('#enumToggle').checked,
  };
}

function doGenerate() {
  const inp = $('#input').value.trim();
  if (!inp) { $('#output').innerHTML = ''; $('#status').innerHTML = ''; return; }
  let parsed;
  try {
    parsed = JSON.parse(inp);
    $('#status').innerHTML = `<span style="color:var(--gz-success,#3fb950)">${t('valid')}</span>`;
  } catch (e) {
    $('#status').innerHTML = `<span style="color:var(--gz-accent,#e94560)">${t('invalid')}: ${escapeHtml(e.message)}</span>`;
    $('#output').innerHTML = '';
    return;
  }
  try {
    const code = generateProto(parsed, getOpts());
    $('#output').innerHTML = highlight(code);
    $('#output').dataset.raw = code;
  } catch (e) {
    $('#status').innerHTML = `<span style="color:var(--gz-accent,#e94560)">Error: ${escapeHtml(e.message)}</span>`;
  }
}

function loadExample() {
  $('#input').value = JSON.stringify({

    name: "Alice",
    email: "alice@example.com",
    isActive: true,
    balance: 1250.75,
    tags: ["vip", "early-adopter"],
    address: {
      street: "123 Main St",
      city: "New York",
      zip: "10001",
      location: { lat: 40.7128, lng: -74.0060 }
    },
    orders: [
      { id: 1001, total: 49.99, status: "shipped" },
      { id: 1002, total: 12.50, status: "pending" }
    ],
    metadata: null
  }, null, 2);
  doGenerate();
}

function doClear() { $('#input').value = ''; $('#output').innerHTML = ''; $('#output').dataset.raw = ''; $('#status').innerHTML = ''; }
function doDownload() {
  const code = $('#output').dataset.raw || '';
  if (!code) return;
  const blob = new Blob([code], { type: 'text/plain;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = (getOpts().rootName || 'schema').toLowerCase() + '.proto';
  document.body.appendChild(a); a.click();
  setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 200);
}

function escapeHtml(s) { return String(s).replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }

  </label>
  <label>${t('packageName')}: <input type="text" id="pkg" value="com.example" placeholder="com.example"></label>

`;

  <button class="gz-btn" onclick="copyText($('#output').dataset.raw)">${t('copy')}</button>
