<style>
.dp-meta{display:flex;flex-wrap:wrap;gap:14px;align-items:center;margin:12px 0}
.dp-meta input,.dp-meta select{padding:8px 12px;border-radius:9px;border:1px solid var(--border);background:var(--glass2);color:var(--text);font-size:.95em}
.dp-meta label{font-size:.78rem;color:var(--text2);display:block;margin-bottom:3px}
.dp-controls{display:flex;flex-wrap:wrap;gap:8px;margin:12px 0}
.dp-cols{display:grid;grid-template-columns:1fr 1fr;gap:18px}
@media(max-width:760px){.dp-cols{grid-template-columns:1fr}}
.dp-box{background:var(--glass2);border:1px solid var(--border);border-radius:14px;padding:16px}
.dp-box h3{margin:0 0 10px;font-size:1rem;display:flex;align-items:center;gap:6px}
.dp-prio{display:flex;gap:8px;margin-bottom:8px}
.dp-prio input{flex:1;padding:9px;border-radius:9px;border:1px solid var(--border);background:var(--glass);color:var(--text);font-size:.92em}
.dp-todo{width:100%;min-height:120px;padding:10px;border-radius:9px;border:1px solid var(--border);background:var(--glass);color:var(--text);font-size:.92em;resize:vertical;font-family:inherit}
.dp-sched{margin-top:6px}
.dp-row{display:flex;align-items:stretch;gap:8px;border-top:1px solid var(--border)}
.dp-row:first-child{border-top:none}
.dp-time{flex:0 0 78px;padding:10px 6px;font-weight:700;font-variant-numeric:tabular-nums;color:var(--accent);font-size:.85rem;display:flex;align-items:center}
.dp-row input{flex:1;padding:9px 8px;border:none;background:transparent;color:var(--text);font-size:.92em;border-radius:0}
.dp-row input:focus{outline:2px solid var(--accent);border-radius:6px}
.dp-opts{display:flex;flex-wrap:wrap;gap:12px;align-items:center;margin:10px 0;font-size:.85em;color:var(--text2)}
.dp-opts select,.dp-opts input[type=number]{padding:6px 10px;border-radius:8px;border:1px solid var(--border);background:var(--glass2);color:var(--text)}
.dp-saved{font-size:.8em;color:var(--gz-success,#00d672);opacity:0;transition:.2s}
.dp-saved.show{opacity:1}
@media print{
  .gz-tool-header,.dp-controls,.dp-opts,.dp-saved,.gz-howto,.gz-related,.gz-topbar,.gz-footer{display:none!important}
  body{background:#fff!important}
  .dp-box{border:1px solid #999;background:#fff;color:#000;break-inside:avoid}
  .dp-time{color:#000}
  .dp-row input,.dp-todo,.dp-meta input{color:#000;border-bottom:1px solid #ccc}
  .dp-row{border-color:#ccc}
}
</style>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="dp-meta">
      <div><label id="lblDate"></label><input type="date" id="date"></div>
      <div><label id="lblFocus"></label><input type="text" id="focus" style="min-width:200px"></div>
    </div>

    <div class="dp-opts">
      <span id="lblStart"></span>
      <input type="number" id="startH" min="0" max="23" value="6">
      <span id="lblEnd"></span>
      <input type="number" id="endH" min="1" max="24" value="23">
      <span id="lblSlot"></span>
      <select id="slot">
        <option value="60" id="opt60"></option>
        <option value="30" id="opt30" selected></option>
      </select>
      <span class="dp-saved" id="saved"></span>
    </div>

    <div class="dp-cols">
      <div class="dp-box">
        <h3 id="hSchedule"></h3>
        <div class="dp-sched" id="sched"></div>
      </div>
      <div>
        <div class="dp-box">
          <h3 id="hPrio"></h3>
          <div class="dp-prio">
            <input id="p1" type="text" placeholder="1">
            <input id="p2" type="text" placeholder="2">
            <input id="p3" type="text" placeholder="3">
          </div>
        </div>
        <div class="dp-box" style="margin-top:18px">
          <h3 id="hTodo"></h3>
          <textarea class="dp-todo" id="todo"></textarea>
        </div>
        <div class="dp-box" style="margin-top:18px">
          <h3 id="hNotes"></h3>
          <textarea class="dp-todo" id="notes" style="min-height:80px"></textarea>
        </div>
      </div>
    </div>

    <div class="dp-controls">
      <button class="gz-btn" id="printBtn" onclick="window.print()"></button>
      <button class="gz-btn gz-btn-secondary" id="exportBtn" onclick="exportTxt()"></button>
      <button class="gz-btn gz-btn-secondary" id="clearBtn" onclick="clearAll()"></button>
    </div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Daily Planner & Hourly Schedule Maker',
    toolDesc: 'Plan your day hour by hour, set top priorities and a to-do list. Auto-saves in your browser and prints a clean one-page schedule. Free, no signup, works offline.',
    lblDate: 'Date', lblFocus: "Today's focus",
    lblStart: 'From', lblEnd: 'to', lblSlot: 'slot',
    opt60: '60 min', opt30: '30 min',
    hSchedule: '🕑 Hourly Schedule', hPrio: '⭐ Top 3 Priorities', hTodo: '✅ To-Do List', hNotes: '📝 Notes',
    printBtn: '🖨️ Print', exportBtn: '⬇ Export .txt', clearBtn: '🗑️ Clear',
    saved: '✓ saved',
    step1: 'Pick a date and write one main focus for the day',
    step2: 'Set your start/end hour and a 30- or 60-minute slot size',
    step3: 'Fill in the hourly schedule, your top 3 priorities, to-dos and notes',
    step4: 'Click Print for a clean one-page plan, or Export to save a text file',
  },
  zh: {
    toolTitle: '每日计划表 / 小时排程生成器',
    toolDesc: '逐小时规划一天，设定三大优先事项和待办清单。自动保存到浏览器，可打印清晰的单页日程。免费、无需注册、离线可用。',
    lblDate: '日期', lblFocus: '今日重点',
    lblStart: '从', lblEnd: '到', lblSlot: '时长',
    opt60: '60 分钟', opt30: '30 分钟',
    hSchedule: '🕑 小时日程', hPrio: '⭐ 三大优先事项', hTodo: '✅ 待办清单', hNotes: '📝 备注',
    printBtn: '🖨️ 打印', exportBtn: '⬇ 导出 .txt', clearBtn: '🗑️ 清空',
    saved: '✓ 已保存',
    step1: '选择日期，写下今日的一个重点',
    step2: '设置起止时间和 30 或 60 分钟的时段',
    step3: '填写小时日程、三大优先事项、待办和备注',
    step4: '点击「打印」生成干净单页计划，或「导出」保存文本文件',
  }
});

const { $, t } = GZ;
const STORE = 'gz_daily_planner_v1';
let data = {};

function initLabels(){
  $('#lblDate').textContent = t('lblDate');
  $('#lblFocus').textContent = t('lblFocus');
  $('#lblStart').textContent = t('lblStart');
  $('#lblEnd').textContent = t('lblEnd');
  $('#lblSlot').textContent = t('lblSlot');
  $('#opt60').textContent = t('opt60');
  $('#opt30').textContent = t('opt30');
  $('#hSchedule').textContent = t('hSchedule');
  $('#hPrio').textContent = t('hPrio');
  $('#hTodo').textContent = t('hTodo');
  $('#hNotes').textContent = t('hNotes');
  $('#printBtn').textContent = t('printBtn');
  $('#exportBtn').textContent = t('exportBtn');
  $('#clearBtn').textContent = t('clearBtn');
}

function load(){
  try{ data = JSON.parse(localStorage.getItem(STORE) || '{}'); }catch(e){ data = {}; }
  if(!data.date) data.date = new Date().toISOString().slice(0,10);
  if(!data.focus) data.focus = '';
  if(!data.p1) data.p1=''; if(!data.p2) data.p2=''; if(!data.p3) data.p3='';
  if(!data.todo) data.todo=''; if(!data.notes) data.notes='';
  if(!data.startH) data.startH=6; if(!data.endH) data.endH=23; if(!data.slot) data.slot='30';
  if(!data.cells) data.cells={};
  $('#date').value = data.date; $('#focus').value = data.focus;
  $('#p1').value=data.p1; $('#p2').value=data.p2; $('#p3').value=data.p3;
  $('#todo').value=data.todo; $('#notes').value=data.notes;
  $('#startH').value=data.startH; $('#endH').value=data.endH; $('#slot').value=data.slot;
}
let saveT;
function save(){
  data.date = $('#date').value; data.focus = $('#focus').value;
  data.p1=$('#p1').value; data.p2=$('#p2').value; data.p3=$('#p3').value;
  data.todo=$('#todo').value; data.notes=$('#notes').value;
  data.startH=parseInt($('#startH').value)||6; data.endH=parseInt($('#endH').value)||23; data.slot=$('#slot').value;
  localStorage.setItem(STORE, JSON.stringify(data));
  const sv=$('#saved'); sv.textContent=t('saved'); sv.classList.add('show');
  clearTimeout(saveT); saveT=setTimeout(()=>sv.classList.remove('show'),1200);
}

function buildSched(){
  const sh = Math.max(0, Math.min(23, parseInt($('#startH').value)||0));
  const eh = Math.max(sh+1, Math.min(24, parseInt($('#endH').value)||24));
  const slotMin = parseInt($('#slot').value)||60;
  const total = (eh - sh) * 60;
  const rows = [];
  for(let m=0; m<total; m+=slotMin){
    const h = sh + Math.floor(m/60);
    const mm = m % 60;
    rows.push(timeLabel(h, mm));
  }
  const wrap = $('#sched');
  wrap.innerHTML = rows.map(lbl => {
    const val = (data.cells[lbl]||'').replace(/"/g,'&quot;').replace(/</g,'&lt;');
    return `<div class="dp-row"><div class="dp-time">${lbl}</div><input type="text" data-cell="${lbl}" value="${val}" placeholder=""></div>`;
  }).join('');
  wrap.querySelectorAll('input[data-cell]').forEach(inp => {
    inp.addEventListener('input', () => { data.cells[inp.dataset.cell] = inp.value; save(); });
  });
}
function timeLabel(h, mm){
  const ap = h < 12 ? 'AM' : 'PM';
  let hh = h % 12; if(hh===0) hh=12;
  return `${hh}:${String(mm).padStart(2,'0')} ${ap}`;
}

['date','focus','p1','p2','p3','todo','notes','startH','endH','slot'].forEach(id=>{
  document.addEventListener('input', e => { if(e.target && e.target.id===id){ save(); if(['startH','endH','slot'].includes(id)) buildSched(); } });
});

function clearAll(){
  if(!confirm('Clear the whole planner?')) return;
  localStorage.removeItem(STORE);
  data = {}; load(); buildSched();
}
function exportTxt(){
  const lines = [];
  lines.push('=== ' + t('toolTitle') + ' ===');
  lines.push((t('lblDate')) + ': ' + data.date);
  if(data.focus) lines.push((t('lblFocus')) + ': ' + data.focus);
  lines.push('');
  lines.push('## ' + t('hPrio'));
  if(data.p1) lines.push('1. ' + data.p1);
  if(data.p2) lines.push('2. ' + data.p2);
  if(data.p3) lines.push('3. ' + data.p3);
  lines.push('');
  lines.push('## ' + t('hSchedule'));
  const sh = parseInt($('#startH').value)||0, eh = parseInt($('#endH').value)||24, slotMin = parseInt($('#slot').value)||60;
  for(let m=0; m<(eh-sh)*60; m+=slotMin){
    const h = sh + Math.floor(m/60), mm = m%60, lbl = timeLabel(h,mm);
    lines.push(`${lbl}  ${data.cells[lbl]||''}`);
  }
  lines.push('');
  lines.push('## ' + t('hTodo'));
  lines.push(data.todo||'');
  if(data.notes){ lines.push(''); lines.push('## ' + t('hNotes')); lines.push(data.notes); }
  const blob = new Blob([lines.join('\n')], {type:'text/plain'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob); a.download = 'daily-planner-'+data.date+'.txt';
  a.click();
}
window.clearAll=clearAll; window.exportTxt=exportTxt;

initLabels();
load();
buildSched();

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🍅', href:'/calc/pomodoro.html', name:'Pomodoro Timer'},
    {icon:'✅', href:'/text/checklist.html', name:'Checklist Maker'},
    {icon:'📊', href:'/fun/habit-tracker.html', name:'Habit Tracker'},
    {icon:'📅', href:'/calc/calendar-generator.html', name:'Calendar Generator'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
