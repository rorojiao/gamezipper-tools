let activeCat = 'all';
let searchTerm = '';

function renderCats() {
  const cats = ['all', 'setup', 'basic', 'branch', 'remote', 'undo', 'stash', 'history', 'tag', 'sub'];
  $('#catTabs').innerHTML = cats.map(c => `<button class="cat-tab ${c===activeCat?'active':''}" data-cat="${c}">${t('cats')[c]}</button>`).join('');
  document.querySelectorAll('.cat-tab').forEach(b => b.addEventListener('click', () => { activeCat = b.dataset.cat; renderCats(); renderList(); }));
}

function renderList() {
  const term = searchTerm.toLowerCase();
  const list = COMMANDS.filter(c => {
    if (activeCat !== 'all' && c.cat !== activeCat) return false;
    if (term && !(c.title.toLowerCase().includes(term) || c.desc.toLowerCase().includes(term) || c.cmd.toLowerCase().includes(term))) return false;
    return true;
  });
  if (!list.length) {
    $('#cmdList').innerHTML = `<div style="text-align:center;padding:30px;opacity:.6">${t('noResults')}</div>`;
    return;
  }
  $('#cmdList').innerHTML = list.map(c => `
    <div class="cmd-card">
      <div>
        <div class="cmd-title">${c.title}</div>
        <div class="cmd-desc">${c.desc}</div>
        <div class="cmd-block"><code>${c.cmd}</code><button class="cp" data-cmd="${c.cmd.replace(/"/g,'&quot;')}">${t('copy')}</button></div>
      </div>
    </div>`).join('');
  document.querySelectorAll('.cp').forEach(btn => btn.addEventListener('click', e => {
    copyText(btn.dataset.cmd);
    const orig = btn.textContent;
    btn.textContent = t('copied');
    setTimeout(() => btn.textContent = orig, 1200);
  }));
}

$('#search').addEventListener('input', e => { searchTerm = e.target.value; renderList(); });

renderCats();
renderList();
