<style>
.gql-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
@media(max-width:760px){.gql-grid{grid-template-columns:1fr}}
.gql-card{background:var(--glass);border:1px solid var(--border);border-radius:14px;padding:18px}
.gql-card label{display:block;font-size:.8rem;margin-bottom:6px;color:var(--text2);font-weight:600}
.gql-url-row{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.gql-url-row input[type="text"]{flex:1;min-width:200px;padding:10px 12px;border-radius:8px;border:1px solid var(--border);background:var(--glass2);color:var(--text);font-size:.95rem;font-family:monospace}
.gql-method{padding:10px 14px;border-radius:8px;border:1px solid var(--border);background:var(--glass2);color:var(--text2);font-weight:700;font-size:.85rem}
.gql-textarea{width:100%;min-height:200px;padding:10px 12px;border-radius:8px;border:1px solid var(--border);background:var(--glass2);color:var(--text);font-size:.9rem;font-family:'SFMono-Regular',Consolas,monospace;resize:vertical;line-height:1.5}
.gql-presets{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.gql-preset{padding:6px 12px;border-radius:6px;border:1px solid var(--border);background:var(--glass2);color:var(--text2);cursor:pointer;font-size:.78rem;font-weight:600}
.gql-preset:hover{border-color:var(--accent);color:var(--accent)}
.gql-output{white-space:pre-wrap;word-break:break-word;font-family:'SFMono-Regular',Consolas,monospace;font-size:.85rem;line-height:1.55;padding:14px;background:var(--glass2);border-radius:8px;border:1px solid var(--border);min-height:200px;max-height:500px;overflow:auto}
.gql-status{display:inline-block;padding:4px 10px;border-radius:6px;font-size:.78rem;font-weight:700;margin-left:8px}
.gql-status.ok{background:rgba(0,214,114,.15);color:#00d672}
.gql-status.err{background:rgba(233,69,96,.15);color:#e94560}
.gql-status.pending{background:rgba(97,175,239,.15);color:#61afef}
.gql-tabs{display:flex;gap:4px;border-bottom:1px solid var(--border);margin-bottom:10px}
.gql-tab{padding:8px 16px;cursor:pointer;font-size:.85rem;color:var(--text2);border-bottom:2px solid transparent;font-weight:600}
.gql-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.gql-meta-row{display:flex;justify-content:space-between;font-size:.8rem;color:var(--text2);margin-bottom:10px;flex-wrap:wrap;gap:8px}
</style>

<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is GraphQL?", "acceptedAnswer": {"@type": "Answer", "text": "GraphQL is a query language for APIs and a runtime for fulfilling those queries with existing data. It gives clients the power to ask for exactly what they need in a single request."}}, {"@type": "Question", "name": "Does this GraphQL tester send my queries to a server?", "acceptedAnswer": {"@type": "Answer", "text": "Your query is sent directly from your browser to the GraphQL endpoint URL you specify — it does not pass through our server. We never see or log your requests, headers or responses."}}, {"@type": "Question", "name": "Why do I get a CORS error?", "acceptedAnswer": {"@type": "Answer", "text": "Browsers block cross-origin requests unless the GraphQL server sends appropriate CORS headers. If you see a CORS error, the endpoint must be configured to allow your origin, or you need to use a proxy server."}}, {"@type": "Question", "name": "Can I send authentication headers?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. Add any headers in the Headers text area as key: value pairs, one per line — Bearer tokens, API keys, cookies, etc."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="gql-card" style="margin-bottom:14px">
      <div class="gql-url-row">
        <span class="gql-method">POST</span>
        <input type="text" id="endpoint" placeholder="https://countries.trevorblades.com/" value="https://countries.trevorblades.com/">
        <button class="gz-btn" id="run-btn" onclick="runQuery()"></button>
      </div>
      <div class="gql-presets" id="presets"></div>
    </div>
    <div class="gql-grid">
      <div class="gql-card">
        <div class="gql-tabs">
          <div class="gql-tab active" data-tab="query" onclick="switchTab('query')" id="tab-query"></div>
          <div class="gql-tab" data-tab="vars" onclick="switchTab('vars')" id="tab-vars"></div>
          <div class="gql-tab" data-tab="headers" onclick="switchTab('headers')" id="tab-headers"></div>
        </div>
        <div id="pane-query">
          <textarea id="query" class="gql-textarea" spellcheck="false">query {
  continents {
    code
    name
  }
}</textarea>
        </div>
        <div id="pane-vars" style="display:none">
          <textarea id="vars" class="gql-textarea" spellcheck="false" style="min-height:140px">{}</textarea>
        </div>
        <div id="pane-headers" style="display:none">
          <textarea id="headers" class="gql-textarea" spellcheck="false" style="min-height:140px" placeholder="Authorization: Bearer token123&#10;X-API-Key: abc"></textarea>
        </div>
      </div>
      <div class="gql-card">
        <div class="gql-meta-row">
          <span><span id="status-badge" class="gql-status pending">idle</span> <span id="status-text"></span></span>
          <span id="time-ms"></span>
        </div>
        <div class="gql-output" id="output">—</div>
      </div>
    </div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'GraphQL Query Tester',
    toolDesc: 'Run GraphQL queries and mutations against any endpoint directly from your browser. Inspect JSON responses, send variables and auth headers — free, no signup.',
    run: '▶ Run',
    tabQuery: 'Query',
    tabVars: 'Variables',
    tabHeaders: 'Headers',
    idle: 'idle',
    pending: 'sending…',
    ok: '✓ OK',
    err: '✗ error',
    step1: 'Enter the GraphQL endpoint URL at the top',
    step2: 'Write your query, mutation or fragment in the Query tab',
    step3: 'Add JSON variables in the Variables tab and auth headers in the Headers tab',
    step4: 'Click Run to send the request and read the formatted response',
  },
  zh: {
    toolTitle: 'GraphQL 查询测试工具',
    toolDesc: '直接在浏览器中对任意 GraphQL 端点执行 query 和 mutation。查看 JSON 响应、发送变量和认证头 — 免费、无需注册。',
    run: '▶ 执行',
    tabQuery: '查询',
    tabVars: '变量',
    tabHeaders: '请求头',
    idle: '空闲',
    pending: '发送中…',
    ok: '✓ 成功',
    err: '✗ 错误',
    step1: '在顶部输入 GraphQL 端点 URL',
    step2: '在「查询」标签页中编写 query、mutation 或 fragment',
    step3: '在「变量」标签页添加 JSON 变量，在「请求头」标签页添加认证头',
    step4: '点击「执行」发送请求并查看格式化响应',
  }
});

const { $, copyText, t } = GZ;

function switchTab(tab) {
  document.querySelectorAll('.gql-tab').forEach(el => el.classList.remove('active'));
  document.querySelector(`[data-tab="${tab}"]`).classList.add('active');
  $('#pane-query').style.display = tab === 'query' ? 'block' : 'none';
  $('#pane-vars').style.display = tab === 'vars' ? 'block' : 'none';
  $('#pane-headers').style.display = tab === 'headers' ? 'block' : 'none';
}

function prettyJson(obj) {
  try { return JSON.stringify(obj, null, 2); } catch(e) { return String(obj); }
}

function setStatus(state, text) {
  const badge = $('#status-badge');
  badge.className = 'gql-status ' + state;
  badge.textContent = t(state === 'ok' ? 'ok' : state === 'err' ? 'err' : state === 'pending' ? 'pending' : 'idle');
  $('#status-text').textContent = text || '';
}

async function runQuery() {
  const endpoint = $('#endpoint').value.trim();
  const query = $('#query').value;
  let varsText = $('#vars').value.trim() || '{}';
  let headersText = $('#headers').value.trim();
  if (!endpoint) { setStatus('err', 'No endpoint'); return; }

  let variables;
  try { variables = JSON.parse(varsText); }
  catch(e) { setStatus('err', 'Invalid Variables JSON: ' + e.message); $('#output').textContent = e.message; return; }

  const headers = { 'Content-Type': 'application/json' };
  headersText.split('\n').forEach(line => {
    const idx = line.indexOf(':');
    if (idx > 0) headers[line.slice(0, idx).trim()] = line.slice(idx + 1).trim();
  });

  setStatus('pending', '');
  $('#time-ms').textContent = '';
  $('#output').textContent = '…';
  $('#run-btn').disabled = true;

  const t0 = performance.now();
  try {
    const res = await fetch(endpoint, {
      method: 'POST',
      headers,
      body: JSON.stringify({ query, variables }),
    });
    const elapsed = Math.round(performance.now() - t0);
    $('#time-ms').textContent = `${res.status} · ${elapsed} ms`;
    const text = await res.text();
    let parsed;
    try { parsed = JSON.parse(text); } catch(e) { parsed = text; }
    if (!res.ok) {
      setStatus('err', `HTTP ${res.status}`);
    } else if (parsed && parsed.errors) {
      setStatus('err', `${(parsed.errors||[]).length} GraphQL error(s)`);
    } else {
      setStatus('ok', 'Success');
    }
    $('#output').textContent = typeof parsed === 'string' ? parsed : prettyJson(parsed);
  } catch(e) {
    const elapsed = Math.round(performance.now() - t0);
    $('#time-ms').textContent = `${elapsed} ms`;
    setStatus('err', e.name === 'TypeError' ? 'Network/CORS error' : e.message);
    $('#output').textContent = `${e.name}: ${e.message}\n\nThis is often caused by CORS restrictions. The endpoint must allow cross-origin requests from your browser.`;
  } finally {
    $('#run-btn').disabled = false;
  }
}

// wire UI
$('#tab-query').textContent = t('tabQuery');
$('#tab-vars').textContent = t('tabVars');
$('#tab-headers').textContent = t('tabHeaders');
$('#run-btn').textContent = t('run');

const presets = [
  { name: 'Countries API', url: 'https://countries.trevorblades.com/', q: 'query {\n  continents {\n    code\n    name\n  }\n}' },
  { name: 'SpaceX API', url: 'https://spacex-production.up.railway.app/', q: 'query {\n  company {\n    name\n    ceo\n    founded\n  }\n}' },
  { name: 'Introspection', url: '', q: 'query IntrospectionQuery {\n  __schema {\n    queryType { name }\n    mutationType { name }\n  }\n}' },
  { name: 'Rick & Morty', url: 'https://rickandmortyapi.com/graphql', q: 'query {\n  characters(page: 1) {\n    results { name species }\n  }\n}' },
];
let presetHtml = '';
presets.forEach((p,i) => { presetHtml += `<span class="gql-preset" onclick="loadPreset(${i})">${p.name}</span>`; });
$('#presets').innerHTML = presetHtml;

function loadPreset(i) {
  const p = presets[i];
  if (p.url) $('#endpoint').value = p.url;
  $('#query').value = p.q;
  runQuery();
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="runQuery()">${t('run')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="copyText($('#output').textContent)">${GZ.t('copy')}</button>`;

// Ctrl/Cmd+Enter to run
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') { e.preventDefault(); runQuery(); }
});

GZ.renderToolPage({
  category: 'dev',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📋', href:'/dev/json.html', name:'JSON Formatter'},
    {icon:'🎫', href:'/dev/jwt.html', name:'JWT Decoder'},
    {icon:'🔌', href:'/dev/api-tester.html', name:'API Tester'},
    {icon:'📡', href:'/dev/http-headers.html', name:'HTTP Headers'},
  ]
});
</script>
<script src="/tools-result-rec.js?v=20260707v520" defer></script>
</body>
</html>
