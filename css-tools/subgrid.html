<style>
.sg-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
@media(max-width:880px){.sg-grid{grid-template-columns:1fr}}
.sg-card{background:var(--glass2);border:1px solid var(--border);border-radius:10px;padding:14px}
.sg-card h3{margin:0 0 10px;font-size:.95rem;display:flex;align-items:center;gap:6px}
.sg-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:8px}
.sg-row label{display:flex;flex-direction:column;font-size:.8em;color:var(--text2);font-weight:600;gap:3px}
.sg-row input,.sg-row select{padding:7px 10px;border:1px solid var(--border);border-radius:8px;background:var(--glass);color:var(--text);font-size:.9em;width:100%;box-sizing:border-box}
.sg-preview{border:1px solid var(--border);border-radius:10px;padding:18px;background:var(--bg2);min-height:340px}
.sg-parent{display:grid;gap:10px;background:rgba(233,69,96,.05);border:2px dashed var(--gz-accent);padding:10px;border-radius:8px}
.sg-child{background:rgba(0,214,114,.08);border:2px solid var(--success);padding:10px;display:grid;gap:8px;border-radius:6px;position:relative}
.sg-child::before{content:attr(data-label);position:absolute;top:6px;left:8px;font-size:.7em;color:var(--success);font-weight:700;background:var(--bg2);padding:1px 6px;border-radius:4px}
.sg-cell{background:rgba(97,175,239,.15);border:1px solid rgba(97,175,239,.4);border-radius:4px;padding:14px 6px;text-align:center;font-size:.7em;color:var(--text2);min-height:36px;display:flex;align-items:center;justify-content:center}
.sg-code{background:#1a1a2e;border:1px solid var(--border);border-radius:10px;padding:14px;font-family:monospace;font-size:.83em;line-height:1.7;white-space:pre-wrap;word-break:break-all;max-height:380px;overflow-y:auto}
.sg-code .sel{color:#e5c07b}.sg-code .prop{color:#61afef}.sg-code .val{color:#98c379}.sg-code .com{color:#5c6370;font-style:italic}
.sg-info{background:var(--glass2);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:12px;font-size:.85em;line-height:1.7}
.sg-info b{color:var(--gz-accent)}
.sg-check{display:flex;align-items:center;gap:6px;margin:6px 0;font-size:.85em;cursor:pointer}
.sg-check input{accent-color:var(--gz-accent)}
.sg-support{display:inline-block;background:var(--success);color:#000;font-size:.7em;padding:2px 8px;border-radius:10px;margin-left:8px;font-weight:700}
</style>
<script type="application/ld+json">{"@context":"https://schema.org","@type":"WebApplication","name":"CSS Subgrid Generator","description":"Generate CSS subgrid layouts with visual preview. Set parent grid, subgrid track alignment, gap inheritance, and line names. Copy production-ready code.","url":"https://tools.gamezipper.com/css-tools/subgrid.html","applicationCategory":"Utility","operatingSystem":"Web Browser","offers":{"@type":"Offer","price":"0"}}</script>
<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is CSS subgrid?", "acceptedAnswer": {"@type": "Answer", "text": "CSS subgrid lets a grid item's children participate in the parent grid's tracks. Instead of defining an independent grid inside a grid item, you use subgrid to inherit the parent's row and column tracks. This solves the long-standing problem of aligning nested card content across multiple cards."}}, {"@type": "Question", "name": "Which browsers support CSS subgrid?", "acceptedAnswer": {"@type": "Answer", "text": "CSS subgrid is supported in Firefox, Chrome 117+, Safari 16+, Edge 117+ and all modern browsers released after mid-2023. It's safe to use in production for most projects. For older browser support, the layout gracefully degrades to a regular grid."}}, {"@type": "Question", "name": "What is the difference between subgrid and nested grid?", "acceptedAnswer": {"@type": "Answer", "text": "A nested grid creates a completely new set of tracks independent of the parent. With subgrid, the child uses the parent's track sizing, so all cards in a row of cards can have headings that line up horizontally, even when content lengths vary."}}, {"@type": "Question", "name": "Can I subgrid in only one direction?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. Use grid-template-columns: subgrid to inherit columns only, grid-template-rows: subgrid to inherit rows only, or both together. This is useful when you want cards to share a common row height but use their own column layout, or vice versa."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="sg-info" id="infoBox"></div>
    <div class="sg-grid">
      <div class="sg-card">
        <h3>🧱 <span id="parentHdr"></span></h3>
        <div class="sg-row">
          <label><span id="lblPCols"></span><input id="pCols" type="text" value="repeat(3, 1fr)"></label>
          <label><span id="lblPRows"></span><input id="pRows" type="text" value="auto"></label>
        </div>
        <div class="sg-row">
          <label><span id="lblPGap"></span><input id="pGap" type="text" value="20px"></label>
          <label><span id="lblPRowsCount"></span><input id="pRowsCount" type="number" value="3" min="1" max="6"></label>
        </div>
      </div>
      <div class="sg-card">
        <h3>🎯 <span id="childHdr"></span> <span class="sg-support">Baseline ✓</span></h3>
        <div class="sg-row">
          <label><span id="lblCCols"></span>
            <select id="cCols">
              <option value="subgrid">subgrid (inherit)</option>
              <option value="none">none (own tracks)</option>
            </select>
          </label>
          <label><span id="lblCRows"></span>
            <select id="cRows">
              <option value="subgrid">subgrid (inherit)</option>
              <option value="none">none (own tracks)</option>
            </select>
          </label>
        </div>
        <div class="sg-row">
          <label><span id="lblCColStart"></span><input id="cColStart" type="text" placeholder="auto"></label>
          <label><span id="lblCRowStart"></span><input id="cRowStart" type="text" placeholder="auto"></label>
        </div>
        <div class="sg-row">
          <label><span id="lblCColSpan"></span><input id="cColSpan" type="text" value="1"></label>
          <label><span id="lblCRowSpan"></span><input id="cRowSpan" type="text" value="3"></label>
        </div>
        <label class="sg-check"><input type="checkbox" id="inheritGap" checked> <span id="lblInheritGap"></span></label>
      </div>
    </div>
    <div class="sg-card">
      <h3>👁 <span id="lblPreview"></span></h3>
      <div class="sg-preview" id="preview"></div>
    </div>

      <h3>📋 <span id="lblCode"></span></h3>
      <div class="sg-code" id="code"></div>
    </div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'CSS Subgrid Generator',
    toolDesc: 'Generate production-ready subgrid CSS with visual preview. Inherit parent tracks, control alignment, and copy code instantly.',
    infoHtml: '<b>💡 What is subgrid?</b> A grid layout value that lets a child element use its parent\'s grid tracks instead of defining new ones. Perfect for cards, articles, or any layout where siblings need to share a common track structure.',
    parentHdr: 'Parent Grid',
    childHdr: 'Subgrid Child',
    lblPCols: 'grid-template-columns',
    lblPRows: 'grid-template-rows',
    lblPGap: 'gap',
    lblPRowsCount: 'Subgrid children count',
    lblCCols: 'grid-template-columns',
    lblCRows: 'grid-template-rows',
    lblCColStart: 'grid-column-start (optional)',
    lblCRowStart: 'grid-row-start (optional)',
    lblCColSpan: 'grid-column span',
    lblCRowSpan: 'grid-row span',
    lblInheritGap: 'Inherit parent gap (gap: inherit)',
    lblPreview: 'Live Preview',
    lblCode: 'Generated CSS',
    copy: 'Copy CSS',
    example: 'Load example',
    reset: 'Reset',
    step1: 'Define the parent grid columns, rows, and gap',
    step2: 'Choose whether the child uses subgrid in columns, rows, or both',
    step3: 'Set the child\'s start position and how many tracks it spans',
    step4: 'Copy the generated CSS for your project',
  },
  zh: {
    toolTitle: 'CSS Subgrid 生成器',
    toolDesc: '生成可投入生产的 subgrid CSS，视觉预览。即时复制代码，支持继承父级网格轨道和对齐控制。',
    infoHtml: '<b>💡 什么是 subgrid？</b> 一种网格布局值，允许子元素使用父级的网格轨道，而不是定义自己的。非常适合卡片、文章或任何需要兄弟节点共享同一轨道结构的布局。',
    parentHdr: '父级网格',
    childHdr: 'Subgrid 子元素',
    lblPCols: 'grid-template-columns',
    lblPRows: 'grid-template-rows',
    lblPGap: 'gap',
    lblPRowsCount: 'Subgrid 子元素数量',
    lblCCols: 'grid-template-columns',
    lblCRows: 'grid-template-rows',
    lblCColStart: 'grid-column-start（可选）',
    lblCRowStart: 'grid-row-start（可选）',
    lblCColSpan: 'grid-column 跨度',
    lblCRowSpan: 'grid-row 跨度',
    lblInheritGap: '继承父级 gap（gap: inherit）',
    lblPreview: '实时预览',
    lblCode: '生成的 CSS',
    copy: '复制 CSS',
    example: '加载示例',
    reset: '重置',
    step1: '定义父级网格的列、行和 gap',
    step2: '选择子元素是否在列、行或两者上使用 subgrid',
    step3: '设置子元素的起始位置和跨越的轨道数',
    step4: '将生成的 CSS 复制到您的项目中',
  }
});

const { $, copyText, t } = GZ;
const inputs = ['pCols','pRows','pGap','pRowsCount','cCols','cRows','cColStart','cRowStart','cColSpan','cRowSpan','inheritGap'];
inputs.forEach(id => {
  const el = $('#'+id);
  el.addEventListener('input', update);
  el.addEventListener('change', update);
});

function escapeHtml(s) {
  return (s||'').toString().replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function update() {
  const pCols = $('#pCols').value || 'repeat(3, 1fr)';
  const pRows = $('#pRows').value || 'auto';
  const pGap = $('#pGap').value || '20px';
  const n = parseInt($('#pRowsCount').value) || 3;
  const cCols = $('#cCols').value;
  const cRows = $('#cRows').value;
  const cColStart = $('#cColStart').value.trim();
  const cRowStart = $('#cRowStart').value.trim();
  const cColSpan = $('#cColSpan').value || '1';
  const cRowSpan = $('#cRowSpan').value || '3';
  const inheritGap = $('#inheritGap').checked;

  // Build preview
  let cells = '';
  for (let r = 0; r < parseInt(cRowSpan); r++) {
    for (let c = 0; c < parseInt(cColSpan); c++) {
      cells += `<div class="sg-cell">${r+1}.${c+1}</div>`;
    }
  }
  let cards = '';
  for (let i = 0; i < n; i++) {
    cards += `<div class="sg-child" data-label="Card ${i+1}">${cells}</div>`;
  }
  const childStyle = `display:grid;${cCols!=='none'?`grid-template-columns:subgrid;`:''}${cRows!=='none'?`grid-template-rows:subgrid;`:''}${cColStart?`grid-column-start:${cColStart};`:''}${cRowStart?`grid-row-start:${cRowStart};`:''}${inheritGap?'gap:inherit;':''}`;
  $('#preview').innerHTML = `<div class="sg-parent" style="grid-template-columns:${pCols};grid-template-rows:${pRows};gap:${pGap}">${cards.replace(/class="sg-child"/, `class="sg-child" style="${childStyle}"`)}</div>`;

  // Build code
  let code = '<span class="com">/* Parent grid */</span>\n';
  code += `<span class="sel">.parent</span> {\n`;
  code += `  <span class="prop">display</span>: <span class="val">grid</span>;\n`;
  code += `  <span class="prop">grid-template-columns</span>: <span class="val">${escapeHtml(pCols)}</span>;\n`;
  if (pRows && pRows !== 'auto') code += `  <span class="prop">grid-template-rows</span>: <span class="val">${escapeHtml(pRows)}</span>;\n`;
  code += `  <span class="prop">gap</span>: <span class="val">${escapeHtml(pGap)}</span>;\n`;
  code += `}\n\n`;
  code += '<span class="com">/* Subgrid child */</span>\n';
  code += `<span class="sel">.card</span> {\n`;
  code += `  <span class="prop">display</span>: <span class="val">grid</span>;\n`;
  if (cCols === 'subgrid') code += `  <span class="prop">grid-template-columns</span>: <span class="val">subgrid</span>;\n`;
  if (cRows === 'subgrid') code += `  <span class="prop">grid-template-rows</span>: <span class="val">subgrid</span>;\n`;
  if (cColStart) code += `  <span class="prop">grid-column-start</span>: <span class="val">${escapeHtml(cColStart)}</span>;\n`;
  if (cRowStart) code += `  <span class="prop">grid-row-start</span>: <span class="val">${escapeHtml(cRowStart)}</span>;\n`;
  if (cColSpan && cColSpan !== '1') code += `  <span class="prop">grid-column</span>: <span class="val">span ${escapeHtml(cColSpan)}</span>;\n`;
  if (cRowSpan && cRowSpan !== '1') code += `  <span class="prop">grid-row</span>: <span class="val">span ${escapeHtml(cRowSpan)}</span>;\n`;
  if (inheritGap) code += `  <span class="prop">gap</span>: <span class="val">inherit</span>;\n`;
  code += `}`;
  $('#code').innerHTML = code;
}

$('#infoBox').innerHTML = t('infoHtml');
$('#parentHdr').textContent = t('parentHdr');
$('#childHdr').textContent = t('childHdr');
$('#lblPCols').textContent = t('lblPCols');
$('#lblPRows').textContent = t('lblPRows');
$('#lblPGap').textContent = t('lblPGap');
$('#lblPRowsCount').textContent = t('lblPRowsCount');
$('#lblCCols').textContent = t('lblCCols');
$('#lblCRows').textContent = t('lblCRows');
$('#lblCColStart').textContent = t('lblCColStart');
$('#lblCRowStart').textContent = t('lblCRowStart');
$('#lblCColSpan').textContent = t('lblCColSpan');
$('#lblCRowSpan').textContent = t('lblCRowSpan');
$('#lblInheritGap').textContent = t('lblInheritGap');
$('#lblPreview').textContent = t('lblPreview');
$('#lblCode').textContent = t('lblCode');

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="copyText($('#code').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="reset()">${t('reset')}</button>`;

function loadExample() {
  $('#pCols').value = 'repeat(3, 1fr)';
  $('#pRows').value = 'auto';
  $('#pGap').value = '20px';
  $('#pRowsCount').value = '3';
  $('#cCols').value = 'subgrid';
  $('#cRows').value = 'subgrid';
  $('#cColStart').value = '';
  $('#cRowStart').value = '';
  $('#cColSpan').value = '1';
  $('#cRowSpan').value = '3';
  $('#inheritGap').checked = true;
  update();
}

function reset() {
  $('#pCols').value = 'repeat(3, 1fr)';
  $('#pRows').value = 'auto';
  $('#pGap').value = '20px';
  $('#pRowsCount').value = '3';
  $('#cCols').value = 'subgrid';
  $('#cRows').value = 'subgrid';
  $('#cColStart').value = '';
  $('#cRowStart').value = '';
  $('#cColSpan').value = '1';
  $('#cRowSpan').value = '3';
  $('#inheritGap').checked = true;
  update();
}

update();

GZ.renderToolPage({
  category: 'css',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🟦', href:'/css-tools/grid.html', name:'CSS Grid Generator'},
    {icon:'📦', href:'/css-tools/flexbox.html', name:'Flexbox Generator'},
    {icon:'🎯', href:'/css-tools/specificity.html', name:'Specificity Calculator'},
    {icon:'✨', href:'/css-tools/theme-tokens.html', name:'Theme Tokens'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
