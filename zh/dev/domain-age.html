</style>

<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is domain age?", "acceptedAnswer": {"@type": "Answer", "text": "Domain age is the length of time since a domain name was first registered. Older domains are often considered more trustworthy by search engines and are sometimes more valuable."}}, {"@type": "Question", "name": "How is domain age calculated?", "acceptedAnswer": {"@type": "Answer", "text": "The tool uses the Registration Data Access Protocol (RDAP), an HTTPS-based successor to WHOIS, to query the domain's registration date. The age is the difference between that date and today."}}, {"@type": "Question", "name": "Does it work for all TLDs?", "acceptedAnswer": {"@type": "Answer", "text": "RDAP coverage is broader than WHOIS for many TLDs (.com, .net, .org, .io, .dev, .app, .ai, country codes), but some registries don't publish RDAP. If RDAP data is unavailable, the tool will tell you."}}, {"@type": "Question", "name": "Is my query private?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. The tool queries the public RDAP endpoint of the registry directly from your browser. No data is sent to any GameZipper server."}}]}</script>

<script>
GZI18n.register({
  en: {
    toolTitle: 'Domain Age Checker',
    toolDesc: 'Check the age of any domain. View registration date, expiration, registrar, status and updated date via RDAP — runs in your browser.',
    check: 'Check Domain',
    placeholder: 'example.com',
    domainAge: 'Domain Age',
    createdOn: 'Created On',
    expiresOn: 'Expires On',
    updatedOn: 'Last Updated',
    registrar: 'Registrar',
    status: 'Status',
    dnssec: 'DNSSEC',
    nameServers: 'Name Servers',
    events: 'Lifecycle Events',
    days: 'days',
    years: 'years',
    months: 'months',
    and: 'and',
    invalid: 'Please enter a valid domain name',
    notFound: 'Domain not found or RDAP data not available',
    networkError: 'Network error — RDAP may be blocked by CORS for this TLD',
    tryPreset: 'Try one of these popular domains:',
    step1: 'Type a domain name (e.g. github.com) and press Check',
    step2: 'View registration date, expiration, registrar and status codes',
    step3: 'See full lifecycle events (created, updated, expires, transferred)',
    step4: 'Copy or save the results for SEO and domain research',
  },
  zh: {
    toolTitle: '域名年龄查询工具',
    toolDesc: '查询任意域名的年龄和注册信息。查看注册日期、到期时间、注册商、状态和最后更新 — 通过 RDAP 协议，完全浏览器本地运行。',
    check: '查询域名',
    placeholder: 'example.com',
    domainAge: '域名年龄',
    createdOn: '注册日期',
    expiresOn: '到期日期',
    updatedOn: '最后更新',
    registrar: '注册商',
    status: '状态',
    dnssec: 'DNSSEC',
    nameServers: '域名服务器',
    events: '生命周期事件',
    days: '天',
    years: '年',
    months: '个月',
    and: '余',
    invalid: '请输入有效的域名',
    notFound: '未找到该域名或该 TLD 不支持 RDAP',
    networkError: '网络错误 — 当前 TLD 的 RDAP 可能被 CORS 屏蔽',
    tryPreset: '试试这些热门域名：',
    step1: '输入域名（如 github.com）并点击查询',
    step2: '查看注册日期、到期时间、注册商和状态码',
    step3: '查看完整生命周期事件（注册、更新、到期、转移）',
    step4: '复制或保存结果，用于 SEO 和域名研究',
  }
});

const { $, t } = GZ;
const result = $('#result');
const input = $('#domainInput');
const presets = $('#presets');

const PRESETS = ['github.com','google.com','wikipedia.org','stackoverflow.com','mozilla.org','cloudflare.com','openai.com','vercel.com'];
presets.innerHTML = '<span style="color:var(--text2);font-size:.8rem">' + t('tryPreset') + '</span>' +
  PRESETS.map(d => `<a class="da-preset" data-d="${d}">${d}</a>`).join('');
presets.querySelectorAll('.da-preset').forEach(a => a.addEventListener('click', e => { input.value = a.dataset.d; lookup(); }));

input.addEventListener('keydown', e => { if (e.key === 'Enter') lookup(); });
$('#lookupBtn').addEventListener('click', lookup);

function cleanDomain(d) {
  d = d.trim().toLowerCase();
  d = d.replace(/^https?:\/\//, '').replace(/^www\./, '').split('/')[0].split('?')[0];
  return d;
}

function isValidDomain(d) {
  return /^[a-z0-9]([a-z0-9-]{0,61}[a-z0-9])?(\.[a-z0-9]([a-z0-9-]{0,61}[a-z0-9])?)+$/.test(d);
}

function formatDate(s) {
  if (!s) return '—';
  try { return new Date(s).toLocaleDateString(); } catch (e) { return s; }
}

function ageString(date) {
  if (!date) return '—';
  const ms = Date.now() - new Date(date).getTime();
  const days = Math.floor(ms / 86400000);
  if (days < 0) return '—';
  const y = Math.floor(days / 365);
  const m = Math.floor((days % 365) / 30);
  if (y > 0) return y + ' ' + t('years') + (m > 0 ? ' ' + m + ' ' + t('months') : '');
  if (m > 0) return m + ' ' + t('months') + ' ' + (days % 30) + ' ' + t('days');
  return days + ' ' + t('days');
}

async function lookup() {
  const raw = input.value;
  const domain = cleanDomain(raw);
  if (!isValidDomain(domain)) { result.innerHTML = '<div class="da-error">' + t('invalid') + '</div>'; return; }
  result.innerHTML = '<div class="da-loading">' + t('check') + ' ' + domain + '…</div>';
  try {
    const res = await fetch('https://rdap.org/domain/' + domain, { headers: { 'Accept': 'application/rdap+json' } });
    if (res.status === 404) { result.innerHTML = '<div class="da-error">' + t('notFound') + ' (' + domain + ')</div>'; return; }
    if (!res.ok) { result.innerHTML = '<div class="da-error">HTTP ' + res.status + ' — ' + t('notFound') + '</div>'; return; }
    const data = await res.json();
    renderResult(domain, data);
  } catch (e) {
    result.innerHTML = '<div class="da-error">' + t('networkError') + '<br><small>' + e.message + '</small></div>';
  }
}

function renderResult(domain, d) {
  const events = {};
  (d.events || []).forEach(ev => { if (ev.eventDate) events[ev.eventAction] = ev.eventDate; });
  const created = events.registration || events['registration expiration' + ''] || null;
  const expires = events.expiration;
  const updated = events['last changed'] || events.lastUpdate;
  const registrar = (d.entities || []).find(e => (e.roles || []).includes('registrar'));
  const registrarName = registrar ? ((registrar.vcardArray && registrar.vcardArray[1] && registrar.vcardArray[1].find(c => c[0] === 'fn')[3]) || registrar.handle || '—') : '—';
  const statuses = d.status || [];
  const nameservers = (d.nameservers || []).map(n => n.ldhName).filter(Boolean);
  const dnssec = d.secureDNS ? (d.secureDNS.delegationSigned ? 'signed' : 'unsigned') : '—';

  let statusHTML = statuses.length
    ? statuses.map(s => {
        const ok = /active|ok|client.*transfer.*prohibited|server.*transfer.*prohibited|server.*deleteprohibited|server.*updateprohibited/i.test(s);
        const warn = /pending|hold|redemption/i.test(s);
        return `<span class="da-status ${ok ? 'da-ok' : warn ? 'da-warn' : 'da-err'}">${s}</span>`;
      }).join('')
    : '—';

  const eventRows = Object.entries(events).map(([k, v]) =>
    `<div class="da-event"><span class="ev">${k}</span><span class="dt">${formatDate(v)}</span></div>`
  ).join('');

  const nsHTML = nameservers.length
    ? nameservers.slice(0, 6).map(n => `<div style="font-family:monospace;font-size:.8rem;color:var(--text2)">${n}</div>`).join('') + (nameservers.length > 6 ? `<div style="font-size:.75rem;color:var(--text2)">+${nameservers.length - 6} more…</div>` : '')
    : '—';

  result.innerHTML = `
    <div class="da-hero">
      <div style="color:var(--text2);font-size:.85rem">${t('domainAge')}</div>
      <div class="da-big">${ageString(created)}</div>
      <div style="color:var(--text2);font-size:.9rem">${domain}</div>
    </div>
    <div class="da-grid">
      <div class="da-card"><div class="label">${t('createdOn')}</div><div class="value">${formatDate(created)}</div></div>
      <div class="da-card"><div class="label">${t('expiresOn')}</div><div class="value">${formatDate(expires)}</div></div>
      <div class="da-card"><div class="label">${t('updatedOn')}</div><div class="value">${formatDate(updated)}</div></div>
      <div class="da-card"><div class="label">${t('registrar')}</div><div class="value">${registrarName}</div></div>
      <div class="da-card"><div class="label">${t('dnssec')}</div><div class="value">${dnssec}</div></div>
      <div class="da-card"><div class="label">${t('status')}</div><div class="value">${statusHTML}</div></div>
    </div>
    <div class="da-card" style="margin-top:1rem">
      <div class="label" style="margin-bottom:8px">${t('nameServers')}</div>
      ${nsHTML}
    </div>
    <div class="da-card" style="margin-top:1rem">
      <div class="label" style="margin-bottom:8px">${t('events')}</div>
      <div class="da-events">${eventRows || '—'}</div>
    </div>
  `;
}

GZ.renderToolPage({
  category: 'dev',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🌐', href:'/dev/dns-lookup.html', name:'DNS Lookup'},
    {icon:'🖥️', href:'/dev/ip-lookup.html', name:'IP Lookup'},
    {icon:'🌍', href:'/dev/subnet-calculator.html', name:'Subnet Calculator'},
    {icon:'⏱️', href:'/dev/speed-test.html', name:'Speed Test'},
  ]
});
</script>

</body>
