<script>
GZI18n.register({
  en: {
    toolTitle: 'JSON Viewer & Tree Explorer',
    toolDesc: 'Paste JSON and explore it as a collapsible, searchable tree. Expand nodes, click to copy paths and navigate deeply nested data visually.',
    expandAll: 'Expand All',
    collapseAll: 'Collapse All',
    searchPh: 'Search keys or values…',
    invalid: '✗ Invalid JSON',
    valid: '✓ Valid JSON',
    pathLabel: 'Path:',
    copied: 'Path copied!',
    step1: 'Paste your JSON into the left panel',
    step2: 'Click the arrows to expand or collapse nodes',
    step3: 'Use the search box to highlight matching keys',
    step4: 'Click any key or value to copy its path',
  },
  zh: {
    toolTitle: 'JSON 树形查看器',
    toolDesc: '粘贴 JSON，以可折叠的树形结构浏览。展开节点、点击复制路径，可视化导航深层嵌套数据。',
    expandAll: '全部展开',
    collapseAll: '全部折叠',
    searchPh: '搜索键名或值…',
    invalid: '✗ JSON 无效',
    valid: '✓ JSON 有效',
    pathLabel: '路径：',
    copied: '路径已复制！',
    step1: '在左侧面板粘贴 JSON',
    step2: '点击箭头展开或折叠节点',
    step3: '使用搜索框高亮匹配的键',
    step4: '点击任意键或值复制其路径',
  }
});

const { $, copyText, t } = GZ;
let rootData = null;
let searchTerm = '';

function escapeHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function valType(v) {
  if (v === null) return 'null';
  if (typeof v === 'string') return 'string';
  if (typeof v === 'number') return 'number';
  if (typeof v === 'boolean') return 'bool';
  if (Array.isArray(v)) return 'array';
  return 'object';
}

function valColor(v) {
  const t2 = valType(v);
  if (t2 === 'string') return 'jv-string';
  if (t2 === 'number') return 'jv-number';
  if (t2 === 'bool') return 'jv-bool';
  if (t2 === 'null') return 'jv-null';
  return '';
}

function matchSearch(text) {
  if (!searchTerm) return false;
  return String(text).toLowerCase().includes(searchTerm.toLowerCase());
}

function buildTree(data, key, path, isLast) {
  const type = valType(data);
  const toggle = type === 'array' || type === 'object';
  const pathStr = path || 'root';

  let html = '<div class="jv-node">';
  const toggleCls = toggle ? '' : ' jv-leaf';
  const highlight = matchSearch(key) || matchSearch(data) ? 'background:rgba(233,69,96,.15);border-radius:4px;padding:0 2px' : '';
  const style = highlight ? ` style="${highlight}"` : '';

  if (key !== null) {
    const keyDisplay = escapeHtml(key);
    const keyHL = matchSearch(key) ? ' style="background:rgba(233,69,96,.25);border-radius:3px"' : '';
    html += `<span class="jv-toggle${toggleCls}" data-path="${escapeHtml(pathStr)}">${toggle ? '▾' : ''}</span>`;
    html += `<span class="jv-key" data-path="${escapeHtml(pathStr)}"${keyHL}>"${keyDisplay}"</span>: `;
  } else {
    html += `<span class="jv-toggle jv-leaf"></span>`;
  }

  if (toggle) {
    const entries = type === 'array' ? data.map((v,i) => [i, v]) : Object.entries(data);
    const openBrace = type === 'array' ? '[' : '{';
    const closeBrace = type === 'array' ? ']' : '}';
    const collapsed = searchTerm ? '' : '';

    html += `<span class="jv-bracket">${openBrace}</span><span class="jv-count">${entries.length} items</span>`;
    if (entries.length > 0) {
      html += `<div class="jv-children" style="${searchTerm ? '' : ''}">`;
      entries.forEach(([k, v], idx) => {
        const childPath = type === 'array' ? `${pathStr}[${k}]` : `${pathStr}.${k}`;
        html += buildTree(v, String(k), childPath, idx === entries.length - 1);
      });
      html += '</div>';
    }
    html += `<span class="jv-bracket">${closeBrace}</span>${isLast ? '' : '<span class="jv-bracket">,</span>'}`;
  } else {
    let valDisplay;
    if (type === 'string') valDisplay = `"${escapeHtml(data)}"`;
    else if (type === 'null') valDisplay = 'null';
    else valDisplay = escapeHtml(String(data));
    const cls = valColor(data);
    const valHL = matchSearch(data) ? ' style="background:rgba(233,69,96,.25);border-radius:3px"' : '';
    html += `<span class="${cls}" data-path="${escapeHtml(pathStr)}"${valHL}>${valDisplay}</span>${isLast ? '' : '<span class="jv-bracket">,</span>'}`;
  }
  html += '</div>';
  return html;
}

function renderTree() {
  if (!rootData) { $('#tree').innerHTML = '<span style="color:var(--text2)">—</span>'; return; }
  $('#tree').innerHTML = buildTree(rootData, null, 'root', true);
  attachListeners();
}

function attachListeners() {
  $('#tree').querySelectorAll('.jv-toggle:not(.jv-leaf)').forEach(el => {
    el.addEventListener('click', function() {
      const node = this.closest('.jv-node');
      const children = node.querySelector(':scope > .jv-children');
      if (children) {
        const hidden = children.style.display === 'none';
        children.style.display = hidden ? '' : 'none';
        this.textContent = hidden ? '▾' : '▸';
      }
    });
  });
  $('#tree').querySelectorAll('.jv-key[data-path], .jv-string[data-path], .jv-number[data-path], .jv-bool[data-path], .jv-null[data-path]').forEach(el => {
    el.addEventListener('click', function() {
      const p = this.dataset.path;
      $('#pathInfo').textContent = t('pathLabel') + ' ' + p;
      $('#pathInfo').style.display = 'block';
      copyText(p);
      const orig = this.style.background;
      this.style.background = 'rgba(0,214,114,.3)';
      setTimeout(() => { this.style.background = orig; }, 500);
    });
  });
}

function doExpandAll() {
  $('#tree').querySelectorAll('.jv-children').forEach(el => el.style.display = '');
  $('#tree').querySelectorAll('.jv-toggle:not(.jv-leaf)').forEach(el => el.textContent = '▾');
}
function doCollapseAll() {
  $('#tree').querySelectorAll('.jv-children').forEach(el => { if (el.parentElement.parentElement.closest('.jv-children')) el.style.display = 'none'; });
}

function doView() {
  const inp = $('#input').value.trim();
  if (!inp) { $('#tree').innerHTML = '<span style="color:var(--text2)">—</span>'; $('#status').innerHTML = ''; rootData = null; return; }
  try {
    rootData = JSON.parse(inp);
    renderTree();
    const count = JSON.stringify(rootData).length;
    $('#status').innerHTML = `<span style="color:var(--gz-success)">${t('valid')}</span> <span style="opacity:.7">(${count.toLocaleString()} chars)</span>`;
  } catch(e) {
    rootData = null;
    $('#tree').innerHTML = `<span style="color:var(--gz-accent)">${escapeHtml(e.message)}</span>`;
    const msg = e.message;
    const posMatch = msg.match(/position (\d+)/);
    let info = `<span style="color:var(--gz-accent)">${t('invalid')}: ${escapeHtml(msg)}</span>`;
    if (posMatch) {
      const pos = parseInt(posMatch[1]);
      const before = inp.substring(0, pos);
      const line = before.split('\n').length;
      const col = pos - before.lastIndexOf('\n');
      info += ` <span style="opacity:.7">(Line ${line}, Col ${col})</span>`;
    }
    $('#status').innerHTML = info;
  }
}

function loadExample() {
  $('#input').value = JSON.stringify({
    "company": "GameZipper",
    "founded": 2024,
    "active": true,
    "tagline": null,
    "products": ["tools", "games", "api"],
    "stats": {
      "totalTools": 2164,
      "monthlyVisitors": 850000,
      "languages": ["en", "zh"],
      "uptime": 99.98
    },
    "team": [
      {"name": "Alice", "role": "Founder", "skills": ["design", "code"]},
      {"name": "Bob", "role": "Developer", "skills": ["frontend", "backend"]}
    ]
  }, null, 2);
  doView();
}

function doClear() { $('#input').value = ''; $('#tree').innerHTML = ''; $('#status').innerHTML = ''; $('#pathInfo').style.display = 'none'; rootData = null; }

$('#input').addEventListener('input', doView);
$('#search').addEventListener('input', function() { searchTerm = this.value; renderTree(); });
$('#search').placeholder = t('searchPh');

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="doView()">${t('format')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doExpandAll()">${t('expandAll')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doCollapseAll()">${t('collapseAll')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

GZ.renderToolPage({
  category: 'dev',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📋', href:'/dev/json.html', name:'JSON Formatter'},
    {icon:'🌳', href:'/dev/json-tree-viewer.html', name:'JSON Tree'},
    {icon:'🔍', href:'/dev/jsonpath.html', name:'JSONPath'},
    {icon:'🔐', href:'/dev/base64.html', name:'Base64'},
  ]
});

loadExample();
</script>

</body>
