const { $, t } = GZ;

const STATE_KEY = 'gz-llc-data-v1';
let state = {
  memberType: 'multi',
  coName: '', effDate: new Date().toISOString().slice(0,10), state: '',
  members: '', capital: '10000', purpose: '',
  management: 'member', profits: 'pro', fiscalYear: 'December',
  jurisdiction: '',
};

function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function nl2br(s){return esc(s).replace(/\n/g,'<br>');}
function loadState(){ try{const r=localStorage.getItem(STATE_KEY); if(r) state=Object.assign(state, JSON.parse(r));}catch(e){} }
function saveState(){ try{localStorage.setItem(STATE_KEY, JSON.stringify(state));}catch(e){} }
function bind(name){ return e => { state[name]=e.target.value; saveState(); renderPreview(); }; }

function parseMembers() {
  // each line: Name — Address — %   (separator: em dash, en dash, hyphen, or comma)
  return state.members.split('\n').map(l => l.trim()).filter(Boolean).map((line, i) => {
    const parts = line.split(/[—–\-]|\s*,\s*|\s{2,}/).map(s=>s.trim()).filter(Boolean);
    // try to find a percentage token
    let pct = '';
    let rest = parts.slice();
    for (let j = 0; j < rest.length; j++) {
      if (/^\d+(\.\d+)?%?$/.test(rest[j])) { pct = rest[j].replace('%','')+'%'; rest.splice(j,1); break; }
    }
    const name = rest[0] || `Member ${i+1}`;
    const addr = rest.slice(1).join(', ');
    return { name, addr, pct: pct || '' };
  });
}
