const {$,t}=GZ;
const money=n=>'$'+(Number.isFinite(n)?n:0).toLocaleString('en-US',{maximumFractionDigits:0});
function pmt(p,r,n){if(n<=0)return 0;return r===0?p/n:p*r/(1-Math.pow(1+r,-n))}
function calc(){
  const price=Math.max(0,+$('#price').value||0),downPct=Math.min(100,Math.max(0,+$('#down').value||0)),down=price*downPct/100,loan=Math.max(0,price-down),noi=Math.max(0,+$('#noi').value||0),annual=Math.max(0,+$('#rate').value||0),r=annual/1200,amort=Math.max(1,Math.round(+$('#amort').value||1)),maturity=Math.min(amort,Math.max(1,Math.round(+$('#maturity').value||1))),payment=pmt(loan,r,amort*12),fees=loan*Math.max(0,+$('#orig').value||0)/100+Math.max(0,+$('#closing').value||0),months=maturity*12;let balance=loan,totalInterest=0,rows=[];
  for(let m=1;m<=months;m++){const interest=balance*r,principal=Math.min(balance,Math.max(0,payment-interest)),paid=interest+principal;balance-=principal;if(balance<.005)balance=0;totalInterest+=interest;rows.push([m,paid,principal,interest,balance]);if(balance<=0)break}
  const annualDebt=payment*12,dscr=annualDebt>0?noi/annualDebt:0,ltv=price>0?loan/price*100:0,effective=loan>0?annual+(fees/loan/Math.max(1,maturity))*100:0;
  $('#loan').textContent=money(loan);$('#monthly').textContent=money(payment);$('#balloon').textContent=money(balance);$('#dscr').textContent=dscr.toFixed(2)+'×';$('#interest').textContent=money(totalInterest);$('#cash').textContent=money(down+fees);$('#ltv').textContent=ltv.toFixed(1)+'%';$('#effective').textContent=effective.toFixed(2)+'%';$('#dscrBox').classList.toggle('warn',dscr>0&&dscr<1.25);$('#dscrBox').classList.toggle('good',dscr>=1.25);$('#schedule').innerHTML=rows.map(x=>`<tr><td>${x[0]}</td><td>${money(x[1])}</td><td>${money(x[2])}</td><td>${money(x[3])}</td><td>${money(x[4])}</td></tr>`).join('');
}
function labels(){['hProperty','lPrice','lDown','lNoi','lRate','hTerms','lAmort','lMaturity','lOrig','lClosing','calculate','example','hResults','sLoan','sMonthly','sBalloon','sDscr','sInterest','sCash','sLtv','sEffective','hSchedule','thMonth','thPayment','thPrincipal','thInterest','thBalance','alert','note'].forEach(id=>$('#'+id).textContent=t(id))}
