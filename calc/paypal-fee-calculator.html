<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "How much does PayPal charge per transaction?", "acceptedAnswer": {"@type": "Answer", "text": "For US domestic Goods & Services transactions, PayPal charges 3.49% + $0.49 as of 2025. International transactions have an additional 1.5% currency conversion fee. Friends & Family transfers are usually free when paid from a PayPal balance or bank account, but cost 3.5% when paid by card."}}, {"@type": "Question", "name": "How do I calculate PayPal fees?", "acceptedAnswer": {"@type": "Answer", "text": "Enter the amount, select the transaction type (Goods & Services, Friends & Family, International, or Donations) and the country. The calculator instantly shows the fee deducted, what the buyer pays, and the amount you receive. You can also enter the amount you want to receive and the tool will reverse-calculate the price to charge the buyer."}}, {"@type": "Question", "name": "Who pays the PayPal fee — buyer or seller?", "acceptedAnswer": {"@type": "Answer", "text": "For Goods & Services, the seller pays the fee — it's deducted automatically from the payment before the funds reach your account. For Friends & Family, the buyer pays only when using a credit/debit card, and the recipient receives the full amount. You can also choose to pass the fee to the buyer in some integrations."}}, {"@type": "Question", "name": "Is this calculator up to date with 2025-2026 PayPal rates?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. The default rates reflect PayPal's current 2025 fee schedule for US accounts. The international fee assumes standard cross-border transactions. Always verify final fees on the official PayPal website before invoicing customers."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="pp-tabs" id="modeTabs">
      <div class="pp-tab active" data-mode="deduct">I'm selling — fee deducted from my amount</div>
      <div class="pp-tab" data-mode="receive">I want to receive a specific amount</div>
    </div>
    <div class="pp-wrap">
      <div class="pp-card">
        <h3>💵 Transaction Details</h3>
        <div class="pp-field">
          <label id="lbl-amount">Amount</label>
          <input type="number" id="amount" value="100" min="0" step="0.01">
        </div>
        <div class="pp-field">
          <label id="lbl-currency">Currency</label>
          <select id="currency">
            <option value="USD" selected>USD — US Dollar</option>
            <option value="EUR">EUR — Euro</option>
            <option value="GBP">GBP — British Pound</option>
            <option value="CAD">CAD — Canadian Dollar</option>
            <option value="AUD">AUD — Australian Dollar</option>
            <option value="JPY">JPY — Japanese Yen</option>
            <option value="CNY">CNY — Chinese Yuan</option>
            <option value="CHF">CHF — Swiss Franc</option>
          </select>
        </div>
        <div class="pp-field">
          <label id="lbl-type">Transaction Type</label>
          <select id="txnType">
            <option value="goods" selected>Goods & Services (domestic)</option>
            <option value="intl">International / Cross-Border</option>
            <option value="ff-card">Friends & Family (paid by card)</option>
            <option value="ff-bank">Friends & Family (bank/balance)</option>
            <option value="donation">Donation / Charity</option>
            <option value="micropayment">Micropayment (under $5)</option>
          </select>
        </div>
        <div class="pp-presets" id="presets"></div>
      </div>
      <div class="pp-card">
        <h3>📊 Breakdown</h3>
        <div class="pp-row"><span class="lbl" id="lbl-buyer-pays">Buyer pays</span><span class="val" id="buyerPays">$0.00</span></div>
        <div class="pp-row"><span class="lbl" id="lbl-fee">PayPal fee</span><span class="val" id="fee">-$0.00</span></div>
        <div class="pp-row"><span class="lbl" id="lbl-fee-pct">Fee percentage</span><span class="val" id="feePct">0%</span></div>
        <div class="pp-row"><span class="lbl" id="lbl-fixed">Fixed fee</span><span class="val" id="fixed">$0.00</span></div>
        <div class="pp-row big"><span class="lbl" id="lbl-receive">You receive</span><span class="val" id="receive">$0.00</span></div>
        <div class="pp-info" id="info"></div>
      </div>
    </div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'PayPal Fee Calculator',
    toolDesc: 'Calculate PayPal transaction fees instantly — see what the buyer pays, what fee is deducted, and what you actually receive. Supports domestic, international, Friends & Family, donations and micropayments.',
    amount: 'Amount',
    currency: 'Currency',
    buyerPays: 'Buyer pays',
    fee: 'PayPal fee',
    feePct: 'Fee percentage',
    fixed: 'Fixed component',
    receive: 'You receive',
    presetLabel: 'Quick amounts:',
    info1: 'These rates reflect the standard <b>2025 PayPal fee schedule</b> for US accounts. International transactions assume a separate currency and add 1.5% for cross-border conversion. Micropayment rates apply to digital goods under $5.',
    info2: 'Fees are <b>always deducted from the seller\'s side</b> for Goods & Services. The buyer pays the gross amount shown, and the net is what lands in your PayPal balance.',
    step1: 'Select the mode — "I\'m selling" deducts the fee from your sale, "I want to receive" reverse-calculates how much to charge',
    step2: 'Enter the transaction amount and choose your currency and transaction type',
    step3: 'View the breakdown — buyer payment, fee deducted, fee percentage, and your net receipt',
    step4: 'Use the Quick amounts presets to see common scenarios at a glance',
  },
  zh: {
    toolTitle: 'PayPal 手续费计算器',
    toolDesc: '即时计算 PayPal 交易手续费 — 显示买家实付、扣除的手续费比例和固定费用，以及你的实际到账金额。支持国内、国际、好友转账、捐赠和小额支付。',
    amount: '金额',
    currency: '币种',
    buyerPays: '买家支付',
    fee: 'PayPal 手续费',
    feePct: '手续费比例',
    fixed: '固定费用',
    receive: '你实际收到',
    presetLabel: '快速金额：',
    info1: '这些费率反映 <b>2025 年 PayPal 美国账户标准费率表</b>。国际交易假定独立币种结算，跨境转换费 +1.5%。小额支付费率适用于 5 美元以下的数字商品。',
    info2: '<b>商品和服务（Goods & Services）交易中，手续费始终从卖家端扣除</b>。买家支付显示的总额，到账 PayPal 余额的是净额。',
    step1: '选择模式 —「我在卖」从你的销售额中扣手续费，「我想要收到」反向计算需向买家收取多少',
    step2: '输入交易金额，选择币种和交易类型',
    step3: '查看明细 — 买家付款、扣除手续费、费率比例和你的净收款',
    step4: '使用快速金额预设，一键查看常见场景',
  }
});

const { $, t } = GZ;

let mode = 'deduct';

const RATES = {
  goods:        { pct: 3.49,  fixed: 0.49, label: 'Goods & Services (US domestic)' },
  intl:         { pct: 4.99,  fixed: 0.49, label: 'International / Cross-Border' },
  'ff-card':    { pct: 3.50,  fixed: 0.49, label: 'Friends & Family (card)' },
  'ff-bank':    { pct: 0.00,  fixed: 0.00, label: 'Friends & Family (bank/balance)' },
  donation:     { pct: 3.49,  fixed: 0.49, label: 'Donation / Charity' },
  micropayment: { pct: 4.99,  fixed: 0.09, label: 'Micropayment (digital under $5)' },
};

const PRESETS = [10, 25, 50, 100, 250, 500, 1000, 5000];

function getSymbol(cur) {
  return { USD:'$', EUR:'€', GBP:'£', CAD:'C$', AUD:'A$', JPY:'¥', CNY:'¥', CHF:'CHF ' }[cur] || cur + ' ';
}

function fmt(amount, cur) {
  const sym = getSymbol(cur);
  const n = Math.round(amount * 100) / 100;
  return sym + n.toFixed(2);
}

function calc() {
  const amount = parseFloat($('#amount').value) || 0;
  const cur = $('#currency').value;
  const type = $('#txnType').value;
  const rate = RATES[type];

  let buyerPays, fee, receive;

  if (mode === 'deduct') {
    buyerPays = amount;
    fee = +(buyerPays * rate.pct / 100 + rate.fixed).toFixed(2);
    receive = +(buyerPays - fee).toFixed(2);
  } else {
    receive = amount;
    // solve buyerPays * (1 - pct/100) - fixed = receive
    // buyerPays = (receive + fixed) / (1 - pct/100)
    const denom = 1 - rate.pct / 100;
    if (denom <= 0) { receive = 0; buyerPays = 0; fee = 0; }
    else {
      buyerPays = +((receive + rate.fixed) / denom).toFixed(2);
      fee = +(buyerPays - receive).toFixed(2);
    }
  }

  const feePctOfBuyer = buyerPays > 0 ? (fee / buyerPays * 100) : 0;

  $('#buyerPays').textContent = fmt(buyerPays, cur);
  $('#fee').textContent = '-' + fmt(fee, cur);
  $('#feePct').textContent = feePctOfBuyer.toFixed(2) + '%';
  $('#fixed').textContent = fmt(rate.fixed, cur);
  $('#receive').textContent = fmt(receive, cur);
  $('#info').innerHTML = t('info1') + '<br><br>' + t('info2');
}

document.querySelectorAll('#modeTabs .pp-tab').forEach(t => t.addEventListener('click', e => {
  document.querySelectorAll('#modeTabs .pp-tab').forEach(x => x.classList.remove('active'));
  e.currentTarget.classList.add('active');
  mode = e.currentTarget.dataset.mode;
  calc();
}));

$('#amount').addEventListener('input', calc);
$('#currency').addEventListener('change', calc);
$('#txnType').addEventListener('change', calc);

const presetsEl = $('#presets');
presetsEl.innerHTML = '<span style="font-size:.75rem;color:var(--text2);margin-right:6px">' + t('presetLabel') + '</span>' +
  PRESETS.map(p => `<div class="pp-preset" data-amt="${p}">${p}</div>`).join('');
presetsEl.querySelectorAll('.pp-preset').forEach(p => p.addEventListener('click', e => {
  $('#amount').value = e.currentTarget.dataset.amt;
  calc();
}));

calc();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'💰', href:'/calc/stripe-fee-calculator.html', name:'Stripe Fee'},
    {icon:'🛍️', href:'/calc/etsy-fee-calculator.html', name:'Etsy Fee'},
    {icon:'💵', href:'/calc/roi.html', name:'ROI Calculator'},
    {icon:'📊', href:'/calc/sales-tax-calculator.html', name:'Sales Tax'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
