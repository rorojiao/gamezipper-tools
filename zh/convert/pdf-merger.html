<script>
GZI18n.register({
  en:{
    toolTitle:'PDF Merger',
    toolDesc:'Merge multiple PDF files into one document. Drag to reorder, then download. 100% client-side — your files never leave your browser.',
    dropText:'Drop PDF files here or click to browse',
    merge:'Merge & Download',
    noFiles:'Add at least 2 PDF files to merge',
    merged:'Merged successfully!',
    step1:'Click the drop zone or drag PDF files into it',
    step2:'Drag files to reorder them as needed',
    step3:'Click "Merge & Download" to combine into one PDF',
    step4:'The merged PDF downloads automatically',
  },
  zh:{
    toolTitle:'PDF 合并工具',
    toolDesc:'将多个 PDF 文件合并为一个文档。拖拽排序后下载。100% 浏览器本地处理，文件不会上传到服务器。',
    dropText:'拖拽 PDF 文件到此处或点击选择',
    merge:'合并并下载',
    noFiles:'请至少添加 2 个 PDF 文件',
    merged:'合并成功！',
    step1:'点击上传区域或拖拽 PDF 文件',
    step2:'拖拽文件调整顺序',
    step3:'点击「合并并下载」将文件合并',
    step4:'合并后的 PDF 自动下载',
  }
});
const {$,t,copyText}=GZ;
let pdfFiles=[];

function formatSize(b){if(b<1024)return b+' B';if(b<1048576)return(b/1024).toFixed(1)+' KB';return(b/1048576).toFixed(1)+' MB';}

function renderList(){
  const ul=$('#fileList');
  ul.innerHTML=pdfFiles.map((f,i)=>`<li draggable="true" data-idx="${i}"><span class="grip">⠿</span><span class="fname">${f.name}</span><span class="fsize">${formatSize(f.size)}</span><button class="remove" onclick="removeFile(${i})">✕</button></li>`).join('');
  // drag reorder
  ul.querySelectorAll('li').forEach(li=>{
    li.addEventListener('dragstart',e=>{e.dataTransfer.setData('text/plain',li.dataset.idx);li.style.opacity='.4';});
    li.addEventListener('dragend',()=>{li.style.opacity='1';});
    li.addEventListener('dragover',e=>{e.preventDefault();li.style.borderLeft='3px solid var(--gz-accent)';});
    li.addEventListener('dragleave',()=>{li.style.borderLeft='';});
    li.addEventListener('drop',e=>{
      e.preventDefault();li.style.borderLeft='';
      const from=+e.dataTransfer.getData('text/plain');
      const to=+li.dataset.idx;
      if(from!==to){const item=pdfFiles.splice(from,1)[0];pdfFiles.splice(to,0,item);renderList();}
    });
  });
}

function removeFile(i){pdfFiles.splice(i,1);renderList();}

function addFiles(fileArr){
  fileArr.forEach(f=>{if(f.type==='application/pdf')pdfFiles.push(f);});
  renderList();
}

// Drop zone
const dz=$('#dropZone');
dz.addEventListener('click',()=>$('#fileInput').click());
$('#fileInput').addEventListener('change',e=>{addFiles(Array.from(e.target.files));e.target.value='';});
dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('dragover');});
dz.addEventListener('dragleave',()=>dz.classList.remove('dragover'));
dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('dragover');addFiles(Array.from(e.dataTransfer.files));});
$('#dropText').textContent=t('dropText');

async function mergePDFs(){
  if(pdfFiles.length<2){alert(t('noFiles'));return;}
  try{
    const{PDFDocument}=PDFLib;
    const mergedPdf=await PDFDocument.create();
    for(const file of pdfFiles){
      const bytes=await file.arrayBuffer();
      const pdf=await PDFDocument.load(bytes);
      const pages=await mergedPdf.copyPages(pdf,pdf.getPageIndices());
      pages.forEach(p=>mergedPdf.addPage(p));
    }
    const mergedBytes=await mergedPdf.save();
    const blob=new Blob([mergedBytes],{type:'application/pdf'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download='merged.pdf';a.click();
    URL.revokeObjectURL(url);
    GZ.showToast(t('merged'));
  }catch(e){alert('Error: '+e.message);}
}

$('#toolbar').innerHTML=`<button class="gz-btn" onclick="mergePDFs()">${t('merge')}</button><button class="gz-btn gz-btn-secondary" onclick="pdfFiles=[];renderList()">${t('clear')}</button>`;

GZ.renderToolPage({category:'convert',titleKey:'toolTitle',descKey:'toolDesc',howToSteps:['step1','step2','step3','step4'],related:[
  {icon:'📱',href:'/convert/qrcode.html',name:'QR Code'},
  {icon:'📊',href:'/convert/csv-to-json.html',name:'CSV to JSON'},
  {icon:'🔄',href:'/convert/yaml-json.html',name:'YAML ↔ JSON'},
]});
</script>
