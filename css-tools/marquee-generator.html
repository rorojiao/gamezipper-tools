<script>
GZI18n.register({
  en: {
    toolTitle: 'CSS Marquee Generator',
    toolDesc: 'Create smooth CSS-only scrolling text animations. Customize direction, speed, colors and copy clean CSS + HTML code.',
    text: 'Text Content',
    direction: 'Direction',
    speed: 'Duration (seconds)',
    fontSize: 'Font Size (px)',
    textColor: 'Text Color',
    bgColor: 'Background Color',
    pauseHover: 'Pause on hover',
    cssCode: 'CSS',
    htmlCode: 'HTML',
    copyCss: 'Copy CSS',
    copyHtml: 'Copy HTML',
    step1: 'Enter the text you want to scroll',
    step2: 'Choose direction, speed, and colors',
    step3: 'Preview the animation in real time',
    step4: 'Copy the generated CSS and HTML code',
  },
  zh: {
    toolTitle: 'CSS 跑马灯生成器',
    toolDesc: '创建纯 CSS 滚动文字动画。自定义方向、速度、颜色，复制 CSS + HTML 代码。',
    text: '文字内容',
    direction: '滚动方向',
    speed: '周期时长（秒）',
    fontSize: '字号 (px)',
    textColor: '文字颜色',
    bgColor: '背景颜色',
    pauseHover: '鼠标悬停暂停',
    cssCode: 'CSS',
    htmlCode: 'HTML',
    copyCss: '复制 CSS',
    copyHtml: '复制 HTML',
    step1: '输入要滚动的文字',
    step2: '选择方向、速度和颜色',
    step3: '实时预览动画效果',
    step4: '复制生成的 CSS 和 HTML 代码',
  }
});

const { $, copyText, t } = GZ;
let activeTab = 'css';

$('#lbl-text').textContent = t('text');
$('#lbl-dir').textContent = t('direction');
$('#lbl-speed').textContent = t('speed');
$('#lbl-fontsize').textContent = t('fontSize');
$('#lbl-color').textContent = t('textColor');
$('#lbl-bg').textContent = t('bgColor');
$('#lbl-pause').textContent = t('pauseHover');

const tabs = [{id:'css',label:t('cssCode')},{id:'html',label:t('htmlCode')}];
const tabsEl = $('#codeTabs');
tabs.forEach(tab => {
  const btn = document.createElement('button');
  btn.textContent = tab.label;
  btn.className = tab.id === activeTab ? 'active' : '';
  btn.onclick = () => {
    activeTab = tab.id;
    tabsEl.querySelectorAll('button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    updateCode();
  };
  tabsEl.appendChild(btn);
});

function updatePreview() {
  const text = $('#txt').value || 'Marquee Text';
  const dir = $('#dir').value;
  const dur = $('#speed').value;
  const fs = $('#fontsize').value;
  const col = $('#color').value;
  const bg = $('#bgColor').value;
  const pause = $('#pauseHover').checked;
  const el = $('#marqueeEl');
  const box = $('#previewBox');

  el.textContent = text;
  el.style.fontSize = fs + 'px';
  el.style.color = col;
  box.style.background = bg;

  el.style.setProperty('--duration', dur + 's');
  el.style.setProperty('--hover-state', pause ? 'paused' : 'running');

  if (dir === 'left') {
    el.style.setProperty('--from-transform','translateX(100%)');
    el.style.setProperty('--to-transform','translateX(-100%)');
  } else if (dir === 'right') {
    el.style.setProperty('--from-transform','translateX(-100%)');
    el.style.setProperty('--to-transform','translateX(100%)');
  } else if (dir === 'up') {
    el.style.setProperty('--from-transform','translateY(100%)');
    el.style.setProperty('--to-transform','translateY(-100%)');
  } else {
    el.style.setProperty('--from-transform','translateY(-100%)');
    el.style.setProperty('--to-transform','translateY(100%)');
  }

  updateCode();
}

function generateCSS() {
  const dur = $('#speed').value;
  const dir = $('#dir').value;
  const fs = $('#fontsize').value;
  const col = $('#color').value;
  const bg = $('#bgColor').value;
  const pause = $('#pauseHover').checked;
  let from, to;
  if (dir==='left'){from='translateX(100%)';to='translateX(-100%)';}
  else if(dir==='right'){from='translateX(-100%)';to='translateX(100%)';}
  else if(dir==='up'){from='translateY(100%)';to='translateY(-100%)';}
  else{from='translateY(-100%)';to='translateY(100%)';}

  return `.marquee-track {
  overflow: hidden;
  white-space: nowrap;
  background: ${bg};
}

.marquee-content {
  display: inline-block;
  white-space: nowrap;
  font-size: ${fs}px;
  color: ${col};
  animation: marqueeScroll ${dur}s linear infinite;${pause ? '\n  cursor: pointer;' : ''}
}${pause ? '\n\n.marquee-content:hover {\n  animation-play-state: paused;\n}' : ''}

@keyframes marqueeScroll {
  0% { transform: ${from}; }
  100% { transform: ${to}; }
}`;
}

function generateHTML() {
  const text = $('#txt').value || 'Marquee Text';
  return `<div class="marquee-track">
  <div class="marquee-content">${text}</div>
</div>`;
}

function updateCode() {
  $('#codeOutput').textContent = activeTab === 'css' ? generateCSS() : generateHTML();
}

$('#btnRow').innerHTML = `
  <button class="gz-btn" onclick="copyText(generateCSS())">${t('copyCss')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="copyText(generateHTML())">${t('copyHtml')}</button>`;

['txt','dir','speed','fontsize','color','bgColor','pauseHover'].forEach(id => {
  const el = document.getElementById(id);
  if (el) el.addEventListener('input', updatePreview);
  if (el) el.addEventListener('change', updatePreview);
});

updatePreview();

GZ.renderToolPage({
  category: 'css',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'✨', href:'/css-tools/animation.html', name:'CSS Animation'},
    {icon:'📝', href:'/css-tools/text-gradient.html', name:'Text Gradient'},
    {icon:'🔲', href:'/css-tools/gradient.html', name:'CSS Gradient'},
    {icon:'🎭', href:'/css-tools/hover.html', name:'CSS Hover'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
