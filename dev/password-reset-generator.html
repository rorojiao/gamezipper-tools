<script>
GZI18n.register({

    generate: '生成',
    copy: '复制',
    copyAll: '全部复制',
    clear: '清空',
    mode: '模式',
    mToken: '重置令牌',
    mOtp: '数字 OTP',
    mBackup: '备用验证码',
    mTotp: 'TOTP 密钥',
    length: '长度（字节）',
    digits: '位数',
    count: '数量',
    format: '格式',
    fBase64url: 'Base64URL',
    fHex: 'Hex',
    fBase64: 'Base64',
    separator: '分隔符',
    result: '令牌',
    entropy: (bits)=>`约 ${bits} 位熵`,
    step1: '选择模式：重置令牌、数字 OTP、备用验证码或 TOTP 密钥',
    step2: '设置长度、数量和输出格式',
    step3: '点击「生成」创建安全令牌',
    step4: '复制单个令牌或全部复制',
  }
});

const { $, copyText, t } = GZ;
let mode = 'token', length = 32, digits = 6, count = 10, format = 'base64url', sep = '-';

function buildOptions(){
  $('#options').innerHTML = `
    <div style="display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:10px">
      <label class="opt">${t('mode')} <select id="o-mode" onchange="mode=this.value;generate()">
        <option value="token">${t('mToken')}</option>
        <option value="otp">${t('mOtp')}</option>
        <option value="backup">${t('mBackup')}</option>
        <option value="totp">${t('mTotp')}</option>
      </select></label>
      <label class="opt" id="grp-length">${t('length')} <select id="o-length" onchange="length=+this.value;generate()">
        ${[16,20,24,32,48,64].map(n=>`<option value="${n}" ${n===length?'selected':''}>${n}</option>`).join('')}
      </select></label>
      <label class="opt" id="grp-digits" style="display:none">${t('digits')} <select id="o-digits" onchange="digits=+this.value;generate()">
        ${[4,5,6,7,8].map(n=>`<option value="${n}" ${n===digits?'selected':''}>${n}</option>`).join('')}
      </select></label>
      <label class="opt" id="grp-count">${t('count')} <input type="number" id="o-count" value="${count}" min="1" max="100" style="width:60px;padding:4px" onchange="count=+this.value;generate()"></label>
      <label class="opt" id="grp-format">${t('format')} <select id="o-format" onchange="format=this.value;generate()">
        <option value="base64url">${t('fBase64url')}</option>
        <option value="hex">${t('fHex')}</option>
        <option value="base64">${t('fBase64')}</option>
      </select></label>
      <label class="opt" id="grp-sep">${t('separator')} <select id="o-sep" onchange="sep=this.value;generate()">
        <option value="-">- (dash)</option>
        <option value=" ">space</option>
        <option value="">none</option>
      </select></label>
    </div>`;
  updateVisibility();
}

function updateVisibility(){
  const showLen = (mode==='token'||mode==='totp');
  const showDig = (mode==='otp'||mode==='backup');
  const showFmt = (mode==='token');
  const showCnt = (mode==='backup');
  const showSep = (mode==='backup'||mode==='otp');
  $('#grp-length').style.display = showLen?'inline-flex':'none';
  $('#grp-digits').style.display = showDig?'inline-flex':'none';
  $('#grp-format').style.display = showFmt?'inline-flex':'none';
  $('#grp-count').style.display = showCnt?'inline-flex':'none';
  $('#grp-sep').style.display = showSep?'inline-flex':'none';
}

// CSPRNG
function randomBytes(n){
  const arr = new Uint8Array(n);
  crypto.getRandomValues(arr);
  return arr;
}
function toHex(arr){ return Array.from(arr).map(b=>b.toString(16).padStart(2,'0')).join(''); }
function toB64(arr){ return btoa(String.fromCharCode(...arr)); }
function toB64Url(arr){ return toB64(arr).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,''); }
function formatDigits(code, d){
  if(!sep) return code;
  const half = Math.ceil(d/2);
  return code.slice(0,half) + sep + code.slice(half);
}

function generate(){
  updateVisibility();
  const out = $('#output');
  if(mode==='token'){
    const bytes = randomBytes(length);
    let token;
    if(format==='hex') token = toHex(bytes);
    else if(format==='base64') token = toB64(bytes);
    else token = toB64Url(bytes);
    const bits = length * 8;
    out.innerHTML = `<div class="token-row"><code>${token}</code><button class="gz-btn gz-btn-sm" onclick="copyText('${token}')">${t('copy')}</button></div>
      <div style="font-size:.8em;opacity:.7;margin-top:6px">${t('entropy',bits)}</div>`;
  } else if(mode==='otp'){
    const max = Math.pow(10, digits);
    const num = Math.floor(crypto.getRandomValues(new Uint32Array(1))[0] / 4294967296 * max);
    const code = num.toString().padStart(digits,'0');
    const formatted = formatDigits(code, digits);
    out.innerHTML = `<div class="token-row"><code style="font-size:1.4em;letter-spacing:2px">${formatted}</code><button class="gz-btn gz-btn-sm" onclick="copyText('${code}')">${t('copy')}</button></div>
      <div style="font-size:.8em;opacity:.7;margin-top:6px">${t('entropy',Math.log2(max))}</div>`;
  } else if(mode==='backup'){
    const max = Math.pow(10, digits);
    const codes = [];
    const cells = [];
    for(let i=0;i<count;i++){
      const num = Math.floor(crypto.getRandomValues(new Uint32Array(1))[0] / 4294967296 * max);
      const code = num.toString().padStart(digits,'0');
      const formatted = formatDigits(code, digits);
      codes.push(code);
      cells.push(`<div class="batch-cell">${formatted}</div>`);
    }
    out.innerHTML = `<div class="batch-grid">${cells.join('')}</div>`;
    out.dataset.all = codes.join('\n');
  } else if(mode==='totp'){
    const bytes = randomBytes(length);
    const secret = toB64Url(bytes);
    const otpauthUrl = `otpauth://totp/YourApp:user@example.com?secret=${secret}&issuer=YourApp&algorithm=SHA1&digits=6&period=30`;
    out.innerHTML = `<div class="token-row"><code>${secret}</code><button class="gz-btn gz-btn-sm" onclick="copyText('${secret}')">${t('copy')}</button></div>
      <div class="token-row"><code style="font-size:.75em">${otpauthUrl}</code><button class="gz-btn gz-btn-sm" onclick="copyText('${otpauthUrl.replace(/'/g,"\\'")}')">${t('copy')}</button></div>
      <div style="font-size:.8em;opacity:.7;margin-top:6px">${t('entropy',length*8)}</div>`;
  }
  $('#status').innerHTML = '';
}

buildOptions();
generate();

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="generate()">${t('generate')}</button>
  <button class="gz-btn" onclick="copyAll()">${t('copyAll')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="generate()">${t('clear')}</button>`;

window.copyAll = function(){
  const text = $('#output').dataset.all || ($('#output').querySelector('code')?.textContent || '');
  if(text){ copyText(text); $('#status').innerHTML=`<span style="color:var(--gz-success)">✓ ${t('copied')}</span>`; }
};

  ]

</script>
