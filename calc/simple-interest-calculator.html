<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is the simple interest formula?", "acceptedAnswer": {"@type": "Answer", "text": "Simple interest is calculated using the formula SI = P × R × T / 100, where P is the principal amount, R is the annual interest rate, and T is the time in years."}}, {"@type": "Question", "name": "How is simple interest different from compound interest?", "acceptedAnswer": {"@type": "Answer", "text": "Simple interest is calculated only on the original principal, while compound interest is calculated on the principal plus accumulated interest. For the same rate and term, compound interest grows faster over time."}}, {"@type": "Question", "name": "Can I calculate interest in months instead of years?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. If your term is in months, divide the number of months by 12 to convert to years before applying the simple interest formula."}}, {"@type": "Question", "name": "What types of loans use simple interest?", "acceptedAnswer": {"@type": "Answer", "text": "Most short-term personal loans, car loans, and some student loans use simple interest. Mortgages and credit cards typically use compound or amortized interest."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-form">
      <div class="gz-form-group">
        <label id="lbl-principal"></label>
        <input type="number" id="principal" value="10000" min="0" step="any">
      </div>
      <div class="gz-form-group">
        <label id="lbl-rate"></label>
        <input type="number" id="rate" value="5" min="0" step="0.01">
      </div>
      <div class="gz-form-group">
        <label id="lbl-time"></label>
        <input type="number" id="time" value="3" min="0" step="0.01">
      </div>
      <div class="gz-form-group">
        <label id="lbl-unit"></label>
        <select id="timeUnit">
          <option value="years" id="opt-years"></option>
          <option value="months" id="opt-months"></option>
          <option value="days" id="opt-days"></option>
        </select>
      </div>
      <div class="gz-full-width">
        <div class="gz-btn-group">
          <button class="gz-btn" id="calcBtn" style="font-size:1.1em;padding:12px 32px"></button>
          <button class="gz-btn gz-btn-secondary" id="resetBtn"></button>
        </div>
      </div>
    </div>
    <div id="results" style="display:none">
      <div class="gz-result-grid" id="resultGrid"></div>
      <div class="gz-chart-area" id="chartArea"></div>
      <div class="gz-formula" id="formulaArea"></div>
    </div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Simple Interest Calculator',
    toolDesc: 'Calculate simple interest with the SI = P × R × T / 100 formula. Get interest, total amount, growth chart and step-by-step solution.',
    lblPrincipal: 'Principal Amount',
    lblRate: 'Annual Interest Rate (%)',
    lblTime: 'Time Period',
    lblUnit: 'Time Unit',
    optYears: 'Years',
    optMonths: 'Months',
    optDays: 'Days',
    calculate: 'Calculate',
    reset: 'Reset',
    interestEarned: 'Interest Earned',
    totalAmount: 'Total Amount',
    principalLabel: 'Principal',
    interestLabel: 'Interest',
    yearsShort: 'yrs',
    monthsShort: 'mo',
    daysShort: 'days',
    step1: 'Enter the principal amount you want to invest or borrow',
    step2: 'Set the annual interest rate as a percentage',
    step3: 'Enter the time period and choose the unit (years, months or days)',
    step4: 'Click Calculate to see the interest, total amount and step-by-step formula',
  },
  zh: {
    toolTitle: '单利计算器',
    toolDesc: '使用公式 SI = P × R × T / 100 计算单利。立即获得利息、总额、增长图表和分步解答。',
    lblPrincipal: '本金',
    lblRate: '年利率 (%)',
    lblTime: '时间',
    lblUnit: '时间单位',
    optYears: '年',
    optMonths: '月',
    optDays: '日',
    calculate: '计算',
    reset: '重置',
    interestEarned: '利息收益',
    totalAmount: '本息合计',
    principalLabel: '本金',
    interestLabel: '利息',
    yearsShort: '年',
    monthsShort: '月',
    daysShort: '天',
    step1: '输入你想投资或借贷的本金金额',
    step2: '设置年利率（百分比）',
    step3: '输入时间并选择单位（年、月或日）',
    step4: '点击计算查看利息、总额和分步公式',
  }
});

const { $, t } = GZ;

$('#lbl-principal').textContent = t('lblPrincipal');
$('#lbl-rate').textContent = t('lblRate');
$('#lbl-time').textContent = t('lblTime');
$('#lbl-unit').textContent = t('lblUnit');
$('#opt-years').textContent = t('optYears');
$('#opt-months').textContent = t('optMonths');
$('#opt-days').textContent = t('optDays');
$('#calcBtn').textContent = t('calculate');
$('#resetBtn').textContent = t('reset');

function formatNum(n) {
  if (!isFinite(n)) return '0.00';
  return n.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function timeInYears(value, unit) {
  if (unit === 'years') return value;
  if (unit === 'months') return value / 12;
  if (unit === 'days') return value / 365;
  return value;
}

function calculate() {
  const P = parseFloat($('#principal').value) || 0;
  const R = parseFloat($('#rate').value) || 0;
  const Tval = parseFloat($('#time').value) || 0;
  const unit = $('#timeUnit').value;
  if (P <= 0 || Tval <= 0) {
    $('#results').style.display = 'none';
    return;
  }
  const T = timeInYears(Tval, unit);
  const SI = (P * R * T) / 100;
  const total = P + SI;

  const unitShort = unit === 'years' ? t('yearsShort') : (unit === 'months' ? t('monthsShort') : t('daysShort'));

  $('#resultGrid').innerHTML = `
    <div class="gz-result-card">
      <div class="label">${t('interestEarned')}</div>
      <div class="value" style="color:#4ecdc4">${formatNum(SI)}</div>
    </div>
    <div class="gz-result-card">
      <div class="label">${t('totalAmount')}</div>
      <div class="value">${formatNum(total)}</div>
    </div>
    <div class="gz-result-card">
      <div class="label">${t('principalLabel')}</div>
      <div class="value" style="opacity:.8">${formatNum(P)}</div>
    </div>`;

  // Pie chart
  const principalAngle = total > 0 ? (P / total) * 360 : 0;
  const interestAngle = 360 - principalAngle;
  const principalLarge = principalAngle > 180 ? 1 : 0;
  const interestLarge = interestAngle > 180 ? 1 : 0;
  const toRad = d => (d - 90) * Math.PI / 180;
  const cos = d => Math.cos(toRad(d));
  const sin = d => Math.sin(toRad(d));
  const r2 = 80;
  const cx2 = 100, cy2 = 100;
  const principalPath = `M ${cx2} ${cy2} L ${cx2 + r2 * cos(0)} ${cy2 + r2 * sin(0)} A ${r2} ${r2} 0 ${principalLarge} 1 ${cx2 + r2 * cos(principalAngle)} ${cy2 + r2 * sin(principalAngle)} Z`;
  const interestPath = `M ${cx2} ${cy2} L ${cx2 + r2 * cos(principalAngle)} ${cy2 + r2 * sin(principalAngle)} A ${r2} ${r2} 0 ${interestLarge} 1 ${cx2 + r2 * cos(360)} ${cy2 + r2 * sin(360)} Z`;

  $('#chartArea').innerHTML = `
    <svg width="200" height="200" viewBox="0 0 200 200">
      <path d="${principalPath}" fill="#4ecdc4"/>
      <path d="${interestPath}" fill="#e94560"/>
    </svg>
    <div class="gz-chart-legend">
      <div class="gz-chart-legend-item"><div class="dot" style="background:#4ecdc4"></div>${t('principalLabel')}: ${formatNum(P)}</div>
      <div class="gz-chart-legend-item"><div class="dot" style="background:#e94560"></div>${t('interestLabel')}: ${formatNum(SI)}</div>
    </div>`;

  // Step-by-step formula
  $('#formulaArea').innerHTML = `
    <div class="step">SI = P × R × T ÷ 100</div>
    <div class="step">SI = <span class="var">${formatNum(P)}</span> × <span class="var">${R}</span> × <span class="var">${T.toFixed(4)}</span> ÷ 100</div>
    <div class="step">SI = <span class="var">${formatNum(SI)}</span> &nbsp; (over ${Tval} ${unitShort} = ${T.toFixed(4)} years)</div>
    <div class="step">Total Amount = P + SI = <span class="var">${formatNum(P)}</span> + <span class="var">${formatNum(SI)}</span> = <span class="var">${formatNum(total)}</span></div>`;

  $('#results').style.display = 'block';
}

$('#calcBtn').addEventListener('click', calculate);
$('#resetBtn').addEventListener('click', () => {
  $('#principal').value = 10000;
  $('#rate').value = 5;
  $('#time').value = 3;
  $('#timeUnit').value = 'years';
  $('#results').style.display = 'none';
});
['principal','rate','time','timeUnit'].forEach(id => {
  $('#' + id).addEventListener('input', calculate);
  $('#' + id).addEventListener('change', calculate);
});

calculate();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📈', href:'/calc/compound-interest.html', name:'Compound Interest'},
    {icon:'🏦', href:'/calc/loan-calculator.html', name:'Loan Calculator'},
    {icon:'💹', href:'/calc/apr-apy-calculator.html', name:'APR / APY'},
    {icon:'🏖️', href:'/calc/retirement-calculator.html', name:'Retirement'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
