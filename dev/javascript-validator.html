const { $, copyText, t } = GZ;

function getLineCol(text, offset){
  let line=1, col=1;
  for(let i=0;i<offset&&i<text.length;i++){
    if(text[i]==='\n'){line++;col=1;}else{col++;}
  }
  return {line,col};
}

function validateJS(code, mode){
  const errors=[];
  const isModule = mode==='module';

  /* Attempt 1: parse as function body (script mode) */
  try{
    if(isModule){
      /* Use dynamic import blob to check module syntax — but we cannot await here.
         Instead, use a trick: try new Function with the code wrapped, which catches most syntax errors
         but allows import/export only in module context.
         For module mode, we check if code contains import/export and do a best-effort parse. */
      /* First: strip import/export statements and check the rest */
      let stripped = code
        .replace(/^\s*import\s+[^;]+;/gm, '')
        .replace(/^\s*import\s+[\s\S]*?from\s+['"][^'"]+['"];?/gm, '')
        .replace(/^\s*export\s+(default\s+)?/gm, '/* export */ ');
      /* eslint-disable-next-line no-new-func */
      new Function(stripped);
    } else {
      /* eslint-disable-next-line no-new-func */
      new Function(code);
    }
  }catch(e){
    /* Parse error message to extract location */
    const msg = e.message;
    /* Chrome/Edge/Node: "Unexpected token '}'" — no location in new Function errors
       Firefox: "missing } after function body" — sometimes with line info
       We need to manually find the error by binary search if no location is given */
    errors.push({
      message: msg,
      line: null,
      col: null,
      raw: e
    });
  }

  return errors;
}

/* More precise approach: try to narrow down the error location by
   parsing line-by-line to find where the syntax breaks */
function findErrorLine(code, mode){
  const lines = code.split('\n');
  const isModule = mode==='module';

  /* Try progressively adding lines until we hit an error, but this approach
     fails for forward references. Instead, let's use a different strategy:
     attempt to parse and if error, try removing one line at a time from the end
     to narrow down the culprit. */

  /* Actually, modern browsers (V8 in Chrome/Edge) do give line numbers in
     Function constructor errors sometimes. Let's try parsing as a full program
     using a script tag approach or eval in a controlled way. */

  /* Best approach: use Function and parse the stack trace for line info */
  try{
    let testCode = code;
    if(isModule){
      testCode = code
        .replace(/^\s*import\s+[^;]+;/gm, '/* import */')
        .replace(/^\s*import\s+[\s\S]*?from\s+['"][^'"]+['"];?/gm, '/* import */')
        .replace(/^\s*export\s+default\s+/gm, 'var __default = ')
        .replace(/^\s*export\s+(var|let|const|function|class|async\s+function)\s+/gm, '$1 ')
        .replace(/^\s*export\s+\{/gm, '/* export */ {');
    }
    /* eslint-disable-next-line no-new-func */
    new Function(testCode);
    return null; /* no error */
  }catch(e){
    /* Try to extract line number from error.
       In V8, Function constructor errors reference the anonymous function body.
       The error sometimes includes a line reference we can map. */

    /* Strategy: binary search for the error line */
    const allLines = code.split('\n');
    let lo=1, hi=allLines.length;
    let errorLine = null;

    /* Try to build partial code and find where it breaks */
    /* This is a heuristic: find the first line after which adding more lines
       still produces the same error. We test from the start. */
    let prefix = '';
    for(let i=0;i<allLines.length;i++){
      prefix += (i>0?'\n':'') + allLines[i];
      let testCode2 = prefix;
      if(isModule){
        testCode2 = prefix
          .replace(/^\s*import\s+[^;]+;/gm, '/* import */')
          .replace(/^\s*import\s+[\s\S]*?from\s+['"][^'"]+['"];?/gm, '/* import */')
          .replace(/^\s*export\s+default\s+/gm, 'var __default = ')
          .replace(/^\s*export\s+(var|let|const|function|class|async\s+function)\s+/gm, '$1 ')
          .replace(/^\s*export\s+\{/gm, '/* export */ {');
      }
      /* Only check if current line could be complete — skip incomplete lines */
      try{
        /* eslint-disable-next-line no-new-func */
        new Function(testCode2);
      }catch(e2){
        /* If this is the first time we see an error, and it's NOT just
           "unexpected end of input" (which means incomplete code), record it */
        if(!/end of input|unexpected end|EOF|unterminated/i.test(e2.message)){
          errorLine = i+1;
          return {
            line: errorLine,
            col: null,
            message: e.message
          };
        }
      }
    }

    /* Fallback: return generic error */
    return {
      line: null,
      col: null,
      message: e.message
    };
  }
}

function doValidate(){
  const inp = $('#input').value;
  if(!inp.trim()){$('#output').innerHTML='';$('#status').innerHTML='';return;}
  const mode = $('#modeSel').value;

  const errInfo = findErrorLine(inp, mode);
  const lineCount = inp.split('\n').length;
  const charCount = inp.length;

  let html = '';
  html += '<div class="stat-box">📝 '+lineCount+' '+t('lines')+'</div>';
  html += '<div class="stat-box">🔤 '+charCount+' '+t('chars')+'</div>';
  html += '<div class="stat-box">'+(mode==='module'?'📦 ES Module':'📜 Script')+'</div>';
  html += '<br><br>';

  if(!errInfo){
    html += '<p class="ok-line">✅ '+t('valid')+'</p>';
    html += '<p style="color:var(--text2);margin-top:8px;font-size:.9em">All syntax checks passed. Your JavaScript is syntactically valid'+(mode==='module'?' (ES module mode)':'')+'.</p>';
    $('#status').innerHTML='<span style="color:var(--gz-success)">'+t('valid')+'</span>';
  } else {
    html += '<p class="err-line">❌ '+t('invalid')+'</p>';
    html += '<div style="margin-top:12px;padding:14px;background:rgba(233,69,96,.08);border:1px solid rgba(233,69,96,.3);border-radius:8px">';
    if(errInfo.line){
      html += '<p style="margin:0 0 6px"><strong>'+t('line')+' '+errInfo.line+'</strong>'+(errInfo.col?' · '+t('col')+' '+errInfo.col:'')+'</p>';
      /* show the error line */
      const lines = inp.split('\n');
      const errLineContent = lines[errInfo.line-1] || '';
      html += '<pre style="margin:6px 0;padding:8px 12px;background:var(--glass2);border-radius:6px;color:var(--text);font-size:.9em;white-space:pre-wrap">'+errLineContent.replace(/</g,'&lt;').replace(/>/g,'&gt;')+'</pre>';
    }
    html += '<p style="margin:8px 0 0;color:var(--text)"><strong>Error:</strong> '+errInfo.message.replace(/</g,'&lt;').replace(/>/g,'&gt;')+'</p>';
    html += '</div>';
    $('#status').innerHTML='<span style="color:var(--gz-accent)">'+t('invalid')+' ('+t('line')+' '+(errInfo.line||'?')+')</span>';
  }

  $('#output').innerHTML = html;
}
