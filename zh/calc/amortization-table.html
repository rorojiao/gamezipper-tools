<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is an amortization schedule?", "acceptedAnswer": {"@type": "Answer", "text": "An amortization schedule is a table showing each loan payment broken down into principal and interest, plus the remaining balance after each payment. It shows exactly how your loan is paid off over time."}}, {"@type": "Question", "name": "How is the monthly payment calculated?", "acceptedAnswer": {"@type": "Answer", "text": "The monthly payment uses the standard amortization formula: M = P × [r(1+r)^n] / [(1+r)^n - 1], where P is the principal, r is the monthly interest rate, and n is the total number of payments."}}, {"@type": "Question", "name": "Can I see how extra payments affect my loan?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. Enter an extra monthly payment amount and the schedule recalculates — you will see the loan paid off sooner and the total interest reduced."}}, {"@type": "Question", "name": "Does this work for mortgages, car loans and personal loans?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. The calculator works for any fixed-rate installment loan — mortgages, auto loans, student loans and personal loans. Just enter the loan amount, annual rate and term."}}]}</script>

<script>
GZI18n.register({
  en: {
    toolTitle: 'Amortization Schedule Calculator',
    toolDesc: 'Generate a complete payment-by-payment amortization table for any loan. See principal, interest and balance for every period. Supports extra payments and weekly/bi-weekly/monthly schedules. Free, browser-only.',
    amount: 'Loan Amount',
    rate: 'Annual Interest Rate (%)',
    term: 'Loan Term (years)',
    extra: 'Extra Payment / Period',
    freq: 'Payments per Year',
    calc: 'Calculate Schedule',
    exportCSV: 'Export CSV',
    monthlyPayment: 'Payment / Period',
    totalPaid: 'Total Paid',
    totalInterest: 'Total Interest',
    payoffTime: 'Payoff Time',
    saved: 'Interest Saved',
    payment: '#',
    pmtHeader: 'Payment',
    principal: 'Principal',
    interest: 'Interest',
    balance: 'Balance',
    done: 'Done!',
    step1: 'Enter your loan amount, interest rate and term',
    step2: 'Optionally add an extra payment per period to see savings',
    step3: 'Click Calculate to generate the full schedule',
    step4: 'Review the summary cards and scroll the payment table',
  },
  zh: {
    toolTitle: '贷款摊销表计算器',
    toolDesc: '为任意贷款生成逐期还款摊销表。查看每期的本金、利息和余额。支持额外还款和按周/双周/按月还款。免费、浏览器本地运行。',
    amount: '贷款金额',
    rate: '年利率（%）',
    term: '贷款期限（年）',
    extra: '每期额外还款',
    freq: '每年还款次数',
    calc: '计算摊销表',
    exportCSV: '导出 CSV',
    monthlyPayment: '每期还款',
    totalPaid: '总还款额',
    totalInterest: '总利息',
    payoffTime: '还清时间',
    saved: '节省利息',
    payment: '#',
    pmtHeader: '还款额',
    principal: '本金',
    interest: '利息',
    balance: '余额',
    done: '完成！',
    step1: '输入贷款金额、利率和期限',
    step2: '可选：添加每期额外还款查看节省效果',
    step3: '点击计算生成完整摊销表',
    step4: '查看摘要卡片并滚动浏览还款明细',
  }
});

const { $, t } = GZ;
let scheduleData = [];

function fmt(n) {
  return n.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function calculate() {
  const P = parseFloat($('#amount').value) || 0;
  const annualRate = parseFloat($('#rate').value) || 0;
  const years = parseFloat($('#years').value) || 0;
  const extra = parseFloat($('#extra').value) || 0;
  const freq = parseInt($('#freq').value);
  if (P <= 0 || years <= 0) { $('#status').textContent = '⚠'; return; }
  const r = annualRate / 100 / freq;
  const n = Math.round(years * freq);
  const M = r === 0 ? P / n : P * (r * Math.pow(1 + r, n)) / (Math.pow(1 + r, n) - 1);
  // Base schedule (no extra) for interest comparison
  let baseInterest = M * n - P;
  // Actual schedule with extra
  scheduleData = [];
  let balance = P;
  let totalInterest = 0;
  let totalPaid = 0;
  let period = 0;
  while (balance > 0.01 && period < n * 2) {
    period++;
    const interest = balance * r;
    let principal = M - interest + extra;
    if (principal > balance) principal = balance;
    balance -= principal;
    if (balance < 0) balance = 0;
    totalInterest += interest;
    totalPaid += principal + interest;
    scheduleData.push({ period, payment: principal + interest, principal, interest, balance });
  }
  const saved = baseInterest - totalInterest;
  const payoffPeriods = scheduleData.length;
  const payoffYears = (payoffPeriods / freq).toFixed(1);
  // summary
  $('#summary').innerHTML = `
    <div class="summary-card highlight"><div class="label">${t('monthlyPayment')}</div><div class="value">${fmt(M + extra)}</div></div>
    <div class="summary-card"><div class="label">${t('totalPaid')}</div><div class="value">${fmt(totalPaid)}</div></div>
    <div class="summary-card cost"><div class="label">${t('totalInterest')}</div><div class="value">${fmt(totalInterest)}</div></div>
    <div class="summary-card"><div class="label">${t('payoffTime')}</div><div class="value">${payoffYears} ${freq === 12 ? 'yr' : 'yr'}</div></div>
    ${extra > 0 ? `<div class="summary-card highlight"><div class="label">${t('saved')}</div><div class="value">${fmt(saved > 0 ? saved : 0)}</div></div>` : ''}
  `;
  renderTable();
  $('#status').innerHTML = `<span style="color:var(--gz-success)">✓ ${scheduleData.length} payments</span>`;
}

function renderTable() {
  $('#table-container').innerHTML = `
    <div class="table-wrap">
      <table class="amort-table">
        <thead><tr>
          <th>${t('payment')}</th>
          <th>${t('pmtHeader')}</th>
          <th>${t('principal')}</th>
          <th>${t('interest')}</th>
          <th>${t('balance')}</th>
        </tr></thead>
        <tbody>
          ${scheduleData.map(r => `<tr>
            <td>${r.period}</td>
            <td>${fmt(r.payment)}</td>
            <td>${fmt(r.principal)}</td>
            <td>${fmt(r.interest)}</td>
            <td>${fmt(r.balance)}</td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>`;
}

function exportCSV() {
  if (scheduleData.length === 0) { calculate(); }
  if (scheduleData.length === 0) return;
  const header = 'Period,Payment,Principal,Interest,Balance\n';
  const rows = scheduleData.map(r => `${r.period},${r.payment.toFixed(2)},${r.principal.toFixed(2)},${r.interest.toFixed(2)},${r.balance.toFixed(2)}`).join('\n');
  const blob = new Blob([header + rows], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'amortization-schedule.csv'; a.click();
  URL.revokeObjectURL(url);
  $('#status').innerHTML = `<span style="color:var(--gz-success)">✓ ${t('done')}</span>`;
}

// labels
$('#lbl-amount').textContent = t('amount');
$('#lbl-rate').textContent = t('rate');
$('#lbl-term').textContent = t('term');
$('#lbl-extra').textContent = t('extra');
$('#lbl-freq').textContent = t('freq');
$('#btn-calc').textContent = t('calc');
$('#btn-export').textContent = t('exportCSV');
$('#btn-calc').onclick = calculate;
$('#btn-export').onclick = exportCSV;
calculate();

$('#toolbar').innerHTML = '';

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🏦', href:'/calc/mortgage-calculator.html', name:'Mortgage Calculator'},
    {icon:'💰', href:'/calc/loan-calculator.html', name:'Loan Calculator'},
    {icon:'📊', href:'/calc/interest-calculator.html', name:'Interest Calculator'},
    {icon:'🚗', href:'/calc/car-loan-calculator.html', name:'Car Loan'},
  ]
});
</script>
