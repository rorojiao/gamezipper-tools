<script>
GZI18n.register({en:{toolTitle:'Word to Markdown Converter',toolDesc:'Convert Word DOCX documents to clean Markdown while preserving headings, lists, tables and links — private, local and free.',dropTitle:'Drop a Word .docx file here',dropHint:'or click to choose a file — nothing is uploaded',output:'Markdown Output',preview:'Document Preview',choose:'Choose DOCX',copy:'Copy Markdown',download:'Download .md',sample:'Try Sample',clear:'Clear',reading:'Reading document…',success:'✓ Converted {name} to Markdown.',invalid:'Please choose a valid .docx file.',error:'This DOCX could not be read. Try saving it again as a modern Word document.',step1:'Drop a .docx file or click to choose one',step2:'The document is converted locally in your browser',step3:'Review the clean Markdown and document preview',step4:'Copy the result or download it as an .md file'},zh:{toolTitle:'Word 转 Markdown 转换器',toolDesc:'将 Word DOCX 文档转换为干净的 Markdown，保留标题、列表、表格和链接 — 私密、本地、免费。',dropTitle:'将 Word .docx 文件拖放到这里',dropHint:'或点击选择文件 — 不会上传任何内容',output:'Markdown 输出',preview:'文档预览',choose:'选择 DOCX',copy:'复制 Markdown',download:'下载 .md',sample:'试用示例',clear:'清空',reading:'正在读取文档…',success:'✓ 已将 {name} 转换为 Markdown。',invalid:'请选择有效的 .docx 文件。',error:'无法读取此 DOCX，请尝试重新保存为现代 Word 文档。',step1:'拖放 .docx 文件或点击选择',step2:'文档在浏览器本地完成转换',step3:'检查干净的 Markdown 和文档预览',step4:'复制结果或下载为 .md 文件'}});
const {$,copyText,t}=GZ;
const drop=$('#drop'),file=$('#file'),status=$('#status'),output=$('#output'),preview=$('#preview');
let lastName='document';
function cleanText(s){return s.replace(/\u00a0/g,' ').replace(/[ \t]+\n/g,'\n').replace(/\n{3,}/g,'\n\n').trim()}
function inlineMd(node){if(node.nodeType===3)return node.nodeValue.replace(/\s+/g,' ');if(node.nodeType!==1)return'';const tag=node.tagName.toLowerCase(),inner=[...node.childNodes].map(inlineMd).join('');if(tag==='strong'||tag==='b')return'**'+inner.trim()+'**';if(tag==='em'||tag==='i')return'*'+inner.trim()+'*';if(tag==='del'||tag==='s')return'~~'+inner.trim()+'~~';if(tag==='code')return'`'+inner.replace(/`/g,'\\`')+'`';if(tag==='br')return'  \n';if(tag==='a')return'['+inner.trim()+']('+(node.getAttribute('href')||'')+')';if(tag==='img'){const alt=node.getAttribute('alt')||'image',src=node.getAttribute('src')||'';return'!['+alt+']('+src+')'}return inner}
function listToMd(node,depth=0){const ordered=node.tagName.toLowerCase()==='ol';let out='';[...node.children].filter(x=>x.tagName.toLowerCase()==='li').forEach((li,i)=>{const prefix='  '.repeat(depth)+(ordered?(i+1)+'. ':'- ');let own='';[...li.childNodes].forEach(n=>{if(n.nodeType===1&&/^(ul|ol)$/i.test(n.tagName))return;own+=inlineMd(n)});out+=prefix+own.trim()+'\n';[...li.children].filter(x=>/^(ul|ol)$/i.test(x.tagName)).forEach(x=>out+=listToMd(x,depth+1))});return out}
function tableToMd(table){const rows=[...table.rows].map(r=>[...r.cells].map(c=>cleanText(inlineMd(c)).replace(/\|/g,'\\|').replace(/\n/g,'<br>')));if(!rows.length)return'';const cols=Math.max(...rows.map(r=>r.length));rows.forEach(r=>{while(r.length<cols)r.push('')});return'| '+rows[0].join(' | ')+' |\n| '+Array(cols).fill('---').join(' | ')+' |\n'+rows.slice(1).map(r=>'| '+r.join(' | ')+' |').join('\n')+'\n\n'}
function blockMd(node){if(node.nodeType===3)return node.nodeValue.trim()?node.nodeValue.trim()+'\n\n':'';if(node.nodeType!==1)return'';const tag=node.tagName.toLowerCase();if(/^h[1-6]$/.test(tag))return'#'.repeat(+tag[1])+' '+inlineMd(node).trim()+'\n\n';if(tag==='p')return inlineMd(node).trim()+'\n\n';if(tag==='ul'||tag==='ol')return listToMd(node)+'\n';if(tag==='table')return tableToMd(node);if(tag==='pre')return'```\n'+node.textContent.replace(/^\n|\n$/g,'')+'\n```\n\n';if(tag==='blockquote')return node.textContent.trim().split('\n').map(x=>'> '+x).join('\n')+'\n\n';if(tag==='hr')return'---\n\n';if(tag==='img')return inlineMd(node)+'\n\n';return[...node.childNodes].map(blockMd).join('')}
function htmlToMarkdown(html){const doc=new DOMParser().parseFromString(html,'text/html');return cleanText([...doc.body.childNodes].map(blockMd).join(''))}
function setResult(html,name){preview.innerHTML=html;output.textContent=htmlToMarkdown(html);lastName=(name||'document').replace(/\.[^.]+$/,'');status.innerHTML='<span style="color:var(--gz-success)">'+t('success').replace('{name}',name||'sample.docx')+'</span>'}
async function handleFile(f){if(!f||!/\.docx$/i.test(f.name)){status.innerHTML='<span style="color:var(--gz-accent)">'+t('invalid')+'</span>';return}status.textContent=t('reading');try{const r=await mammoth.convertToHtml({arrayBuffer:await f.arrayBuffer()});setResult(r.value,f.name)}catch(e){console.error(e);status.innerHTML='<span style="color:var(--gz-accent)">'+t('error')+'</span>'}}
function sample(){setResult('<h1>Launch Notes</h1><p>This <strong>Word document</strong> becomes clean <em>Markdown</em>.</p><h2>Checklist</h2><ul><li>Review the content</li><li>Convert locally</li><li>Copy the result</li></ul><table><thead><tr><th>Owner</th><th>Status</th></tr></thead><tbody><tr><td>Maya</td><td>Ready</td></tr><tr><td>Chen</td><td>Review</td></tr></tbody></table><blockquote><p>Your document never leaves the browser.</p></blockquote>','sample.docx')}
function downloadMd(){if(!output.textContent)return;const blob=new Blob([output.textContent],{type:'text/markdown;charset=utf-8'}),a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=lastName+'.md';a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000)}function clearAll(){output.textContent='';preview.innerHTML='';status.textContent='';file.value=''}
drop.addEventListener('click',()=>file.click());drop.addEventListener('dragover',e=>{e.preventDefault();drop.classList.add('drag')});drop.addEventListener('dragleave',()=>drop.classList.remove('drag'));drop.addEventListener('drop',e=>{e.preventDefault();drop.classList.remove('drag');handleFile(e.dataTransfer.files[0])});file.addEventListener('change',e=>handleFile(e.target.files[0]));
$('#toolbar').innerHTML='<button class="gz-btn" onclick="file.click()">📁 '+t('choose')+'</button><button class="gz-btn" onclick="copyText(output.textContent)">'+t('copy')+'</button><button class="gz-btn gz-btn-secondary" onclick="downloadMd()">⬇ '+t('download')+'</button><button class="gz-btn gz-btn-secondary" onclick="sample()">'+t('sample')+'</button><button class="gz-btn gz-btn-secondary" onclick="clearAll()">'+t('clear')+'</button>';$('#drop-title').textContent=t('dropTitle');$('#drop-hint').textContent=t('dropHint');$('#out-label').textContent=t('output');$('#preview-label').textContent=t('preview');
