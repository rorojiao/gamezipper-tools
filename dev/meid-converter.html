    step3: '使用复制按钮复制任意输出字段',

});

const { $, copyText, t } = GZ;

function detectType(raw) {
  const s = raw.replace(/[\s\-]/g, '').toUpperCase();
  // IMEI: 15 decimal digits
  if (/^\d{15}$/.test(s)) return 'imei';
  // MEID hex: 14 or 15 hex chars
  if (/^[0-9A-F]{14,15}$/.test(s)) return 'meid-hex';
  // MEID decimal: 18 digits
  if (/^\d{18}$/.test(s)) return 'meid-dec';
  // ESN hex: 8 hex chars
  if (/^[0-9A-F]{8}$/.test(s)) return 'esn-hex';
  // ESN decimal: 11 digits
  if (/^\d{11}$/.test(s)) return 'esn-dec';
  return 'unknown';
}

function hexToDecStr(hex) {
  // BigInt-based hex -> decimal string
  let dec = BigInt(0);
  for (const ch of hex) {
    dec = dec * 16n + BigInt(parseInt(ch, 16));
  }
  return dec.toString();
}

function luhnCheck(numStr) {
  // Standard Luhn for IMEI check digit validation
  let sum = 0;
  let dbl = false;
  for (let i = numStr.length - 1; i >= 0; i--) {
    let d = parseInt(numStr[i], 10);
    if (dbl) { d *= 2; if (d > 9) d -= 9; }
    sum += d;
    dbl = !dbl;
  }
  return sum % 10 === 0;
}

function calcLuhnCheckDigit(numStrWithoutCheck) {
  let sum = 0;
  let dbl = true; // check digit position is not doubled
  for (let i = numStrWithoutCheck.length - 1; i >= 0; i--) {
    let d = parseInt(numStrWithoutCheck[i], 10);
    if (dbl) { d *= 2; if (d > 9) d -= 9; }
    sum += d;
    dbl = !dbl;
  }
  return String((10 - (sum % 10)) % 10);
}

function convert() {
  const raw = $('#input').value.trim();
  if (!raw) { $('#status').innerHTML=''; $('#results').innerHTML=''; return; }
  const type = detectType(raw);
  let results = [];
  let isValid = false;
  let typeLabel = '';

  if (type === 'unknown') {
    $('#status').innerHTML = `<span class="valid-badge valid-no">${t('invalid')}</span>`;
    $('#results').innerHTML = `<p style="opacity:.7">Unrecognized format. Enter a 14-15 char hex MEID, 18-digit decimal MEID, 15-digit IMEI, or 8-hex/11-digit ESN.</p>`;
    return;
  }

  const s = raw.replace(/[\s\-]/g, '').toUpperCase();

  if (type === 'meid-hex') {
    typeLabel = 'MEID (Hex)';
    const hex14 = s.length === 15 ? s.slice(0, 14) : s;
    const mfrHex = hex14.slice(0, 6);
    const serHex = hex14.slice(6);
    const mfrDec = hexToDecStr(mfrHex).padStart(8, '0');
    const serDec = hexToDecStr(serHex).padStart(8, '0');
    const decMeid = mfrDec + serDec;
    results.push({ label: t('hexMeid'), value: hex14 });
    results.push({ label: t('decMeid'), value: decMeid });
    results.push({ label: t('manufacturer'), value: `${mfrHex} → ${mfrDec}` });
    results.push({ label: t('serialNum'), value: `${serHex} → ${serDec}` });
    // check digit (RSVD) from hex
    const cd = s.length === 15 ? s[14] : calcRSVD(hex14);
    results.push({ label: t('checkDigit'), value: cd });
    isValid = /^[0-9A-F]{14}$/.test(hex14);
  } else if (type === 'meid-dec') {
    typeLabel = 'MEID (Decimal)';
    const mfrDec = s.slice(0, 8);
    const serDec = s.slice(8, 16);
    const mfrHex = BigInt(mfrDec).toString(16).toUpperCase().padStart(6, '0');
    const serHex = BigInt(serDec).toString(16).toUpperCase().padStart(8, '0');
    const hexMeid = mfrHex + serHex;
    results.push({ label: t('decMeid'), value: s });
    results.push({ label: t('hexMeid'), value: hexMeid });
    results.push({ label: t('manufacturer'), value: `${mfrDec} → ${mfrHex}` });
    results.push({ label: t('serialNum'), value: `${serDec} → ${serHex}` });
    results.push({ label: t('checkDigit'), value: calcRSVD(hexMeid) });
    isValid = /^\d{18}$/.test(s);
  } else if (type === 'imei') {
    typeLabel = 'IMEI';
    results.push({ label: 'IMEEI', value: s });
    results.push({ label: 'TAC (Type Alloc.)', value: s.slice(0, 8) });
    results.push({ label: 'Serial (SNR)', value: s.slice(8, 14) });
    results.push({ label: t('checkDigit'), value: s[14] });
    isValid = luhnCheck(s);
    typeLabel = isValid ? 'IMEI (Luhn ✓)' : 'IMEI (Luhn ✗)';
  } else if (type === 'esn-hex') {
    typeLabel = 'ESN (Hex)';
    const mfrHex = s.slice(0, 2);
    const serHex = s.slice(2);
    const mfrDec = parseInt(mfrHex, 16);
    const serDec = parseInt(serHex, 16);
    results.push({ label: 'ESN (Hex)', value: s });
    results.push({ label: 'ESN (Decimal)', value: String(mfrDec).padStart(3, '0') + String(serDec).padStart(8, '0') });
    results.push({ label: t('manufacturer'), value: `${mfrHex} → ${mfrDec}` });
    results.push({ label: t('serialNum'), value: `${serHex} → ${serDec}` });
    isValid = /^[0-9A-F]{8}$/.test(s);
  } else if (type === 'esn-dec') {
    typeLabel = 'ESN (Decimal)';
    const mfrDec = s.slice(0, 3);
    const serDec = s.slice(3);
    const mfrHex = parseInt(mfrDec, 10).toString(16).toUpperCase().padStart(2, '0');
    const serHex = parseInt(serDec, 10).toString(16).toUpperCase().padStart(6, '0');
    results.push({ label: 'ESN (Decimal)', value: s });
    results.push({ label: 'ESN (Hex)', value: mfrHex + serHex });
    results.push({ label: t('manufacturer'), value: `${mfrDec} → ${mfrHex}` });
    results.push({ label: t('serialNum'), value: `${serDec} → ${serHex}` });
    isValid = /^\d{11}$/.test(s);
  }

  results.unshift({ label: t('type'), value: typeLabel });
  $('#status').innerHTML = `<span class="valid-badge ${isValid?'valid-yes':'valid-no'}">${isValid?t('valid'):t('invalid')}</span>`;
  $('#results').innerHTML = results.map(r => `
    <div class="result-box">
      <div class="result-label">${escapeHtml(r.label)}</div>
      <div class="result-row">
        <span class="result-value">${escapeHtml(r.value)}</span>
        <button class="copy-inline" onclick="copyText('${escapeAttr(r.value)}')">${t('copy')}</button>
      </div>
    </div>`).join('');
}

// RSVD check digit for MEID (simplified — uses the decimal Luhn on the decimal MEID)
function calcRSVD(hexMeid) {
  const mfrHex = hexMeid.slice(0, 6);
  const serHex = hexMeid.slice(6);
  const mfrDec = hexToDecStr(mfrHex).padStart(8, '0');
  const serDec = hexToDecStr(serHex).padStart(8, '0');
  const decMeid = mfrDec + serDec;
  return calcLuhnCheckDigit(decMeid);
}

function escapeHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escapeAttr(s) { return String(s).replace(/'/g,"\\'"); }

function loadExample() {
  $('#input').value = 'A100001D3F2EB6';
  convert();
}

function doClear() { $('#input').value=''; $('#status').innerHTML=''; $('#results').innerHTML=''; }

$('#input').addEventListener('input', convert);

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

</script>
