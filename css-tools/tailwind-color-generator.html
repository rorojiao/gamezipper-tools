<script>
GZI18n.register({
  en: {
    toolTitle: 'Tailwind Color Palette Generator',
    toolDesc: 'Generate a full Tailwind CSS color scale (50-950) from any base color. Copy as Tailwind config, CSS variables, hex or SCSS. Free, browser-based.',
    phName: 'Color name (e.g. brand, primary, accent)',
    defaultName: 'brand',
    tabConfig: 'Tailwind Config',
    tabCSS: 'CSS Variables',
    tabHex: 'Hex List',
    tabSCSS: 'SCSS Map',
    copied: 'Copied!',
    step1: 'Pick a base color with the color picker',
    step2: 'Enter a name for your color (used in Tailwind classes)',
    step3: 'Switch between Tailwind config, CSS vars, hex and SCSS output',
    step4: 'Click copy and paste into your project',
  },
  zh: {
    toolTitle: 'Tailwind 配色生成器',
    toolDesc: '从任意基础色生成完整 Tailwind CSS 色阶（50-950）。可复制为 Tailwind 配置、CSS 变量、十六进制或 SCSS。免费，浏览器本地运行。',
    phName: '颜色名称（如 brand、primary、accent）',
    defaultName: 'brand',
    tabConfig: 'Tailwind 配置',
    tabCSS: 'CSS 变量',
    tabHex: '十六进制列表',
    tabSCSS: 'SCSS Map',
    copied: '已复制！',
    step1: '用取色器选择一个基础色',
    step2: '输入颜色名称（用于 Tailwind 类名）',
    step3: '在 Tailwind 配置、CSS 变量、十六进制和 SCSS 间切换',
    step4: '点击复制，粘贴到你的项目中',
  }
});

const { $, copyText, t } = GZ;

// Tailwind shade steps with lightness targets (0=white, 1=base, 2=black)
const STEPS = [
  { step: 50,  white: 0.95, black: 0 },
  { step: 100, white: 0.90, black: 0 },
  { step: 200, white: 0.78, black: 0 },
  { step: 300, white: 0.60, black: 0 },
  { step: 400, white: 0.30, black: 0 },
  { step: 500, white: 0,    black: 0 },  // base
  { step: 600, white: 0,    black: 0.12 },
  { step: 700, white: 0,    black: 0.28 },
  { step: 800, white: 0,    black: 0.44 },
  { step: 900, white: 0,    black: 0.60 },
  { step: 950, white: 0,    black: 0.75 },
];

function hexToRgb(hex) {
  const m = hex.replace('#','').match(/.{2}/g);
  return [parseInt(m[0],16), parseInt(m[1],16), parseInt(m[2],16)];
}
function rgbToHex(r,g,b) {
  return '#' + [r,g,b].map(x => Math.max(0,Math.min(255,Math.round(x))).toString(16).padStart(2,'0')).join('');
}
function blend(hex, white, black) {
  const [r,g,b] = hexToRgb(hex);
  let nr = r, ng = g, nb = b;
  if (white > 0) { nr = r + (255-r)*white; ng = g + (255-g)*white; nb = b + (255-b)*white; }
  if (black > 0) { nr = r * (1-black); ng = g * (1-black); nb = b * (1-black); }
  return rgbToHex(nr, ng, nb);
}
function luminance(hex) {
  const [r,g,b] = hexToRgb(hex).map(v => { v/=255; return v<=0.03928?v/12.92:Math.pow((v+0.055)/1.055,2.4); });
  return 0.2126*r + 0.7152*g + 0.0722*b;
}

function generate(baseHex) {
  return STEPS.map(s => ({ step: s.step, hex: blend(baseHex, s.white, s.black) }));
}

let activeTab = 'config';

function render() {
  const base = $('#base-color').value;
  const name = ($('#color-name').value.trim() || t('defaultName')).replace(/[^a-zA-Z0-9_-]/g,'');
  $('#hex-display').textContent = base.toUpperCase();
  const palette = generate(base);
  // Render swatches
  $('#palette').innerHTML = palette.map(p => {
    const txt = luminance(p.hex) > 0.5 ? '#000' : '#fff';
    return `<div class="shade-card" onclick="copyText('${p.hex.toUpperCase()}');flash(this)">
      <div class="shade-swatch" style="background:${p.hex};color:${txt}"><span style="font-weight:700;font-size:.8em">${p.step}</span></div>
      <div class="shade-info"><div class="shade-step">${p.step}</div><div class="shade-hex">${p.hex.toUpperCase()}</div></div>
    </div>`;
  }).join('');
  renderCode(palette, name);
}

function renderCode(palette, name) {
  let code = '';
  if (activeTab === 'config') {
    const entries = palette.map(p => `          ${p.step}: '${p.hex.toUpperCase()}'`).join(',\n');
    code = `// tailwind.config.js\nmodule.exports = {\n  theme: {\n    extend: {\n      colors: {\n        ${name}: {\n${entries}\n        }\n      }\n    }\n  }\n}`;
  } else if (activeTab === 'css') {
    code = ':root {\n' + palette.map(p => `  --color-${name}-${p.step}: ${p.hex.toUpperCase()};`).join('\n') + '\n}';
  } else if (activeTab === 'hex') {
    code = palette.map(p => `${name}-${p.step}: ${p.hex.toUpperCase()}`).join('\n');
  } else if (activeTab === 'scss') {
    code = '$' + name + '-colors: (\n' + palette.map(p => `  ${p.step}: ${p.hex.toUpperCase()}`).join(',\n') + '\n);';
  }
  $('#code-out').textContent = code;
}

function setTab(tab) {
  activeTab = tab;
  document.querySelectorAll('#tabs .tab-btn').forEach(b => b.classList.toggle('active', b.dataset.t === tab));
  render();
}

function copyCode() {
  copyText($('#code-out').textContent);
  const fab = $('.copy-fab');
  const old = fab.textContent;
  fab.textContent = '✓';
  setTimeout(()=>fab.textContent=old, 1200);
}

function flash(el) {
  el.style.transform = 'scale(0.95)';
  setTimeout(()=>el.style.transform='', 150);
}

$('#base-color').addEventListener('input', render);
$('#color-name').addEventListener('input', render);
$('#color-name').placeholder = t('phName');

$('#tabs').innerHTML = [
  ['config','tabConfig'],['css','tabCSS'],['hex','tabHex'],['scss','tabSCSS']
].map(([k,label]) => `<button class="tab-btn" data-t="${k}" onclick="setTab('${k}')">${t(label)}</button>`).join('');

GZ.renderToolPage({
  category: 'css-tools',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🎨', href:'/css-tools/tailwind-playground.html', name:'Tailwind Playground'},
    {icon:'🌈', href:'/color/palette.html', name:'Color Palette'},
    {icon:'👁️', href:'/color/contrast.html', name:'Contrast Checker'},
    {icon:'🎚️', href:'/color/shades.html', name:'Shades Generator'},
  ]
});

render();
</script>
