.mw-subtitle{text-align:center;font-size:.8rem;color:#666;margin-bottom:20px;border-bottom:2px solid #2563eb;padding-bottom:8px}

.mw-problems{display:grid;grid-template-columns:repeat(4,1fr);gap:16px 24px;font-size:1.05rem;font-family:'Courier New',monospace}

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="mw-settings" id="settings"></div>
    <div id="output"></div>
    <div id="status"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Math Worksheet Generator',
    toolDesc: 'Create free printable math worksheets for addition, subtraction, multiplication, division and mixed operations. Perfect for K-6 teachers, homeschooling and homework practice.',
    operation: 'Operation:',
    opAdd: 'Addition (+)',
    opSub: 'Subtraction (−)',
    opMul: 'Multiplication (×)',
    opDiv: 'Division (÷)',
    opMix: 'Mixed',
    minNum: 'Min number:',
    maxNum: 'Max number:',
    problemCount: 'Problems:',
    showAnswers: 'Include answer key',
    fixedMul: 'Fixed multiplier (optional):',
    generate: 'Generate Worksheet',
    print: 'Print Worksheet',
    name: 'Name:',
    date: 'Date:',
    score: 'Score:',
    answerKey: 'Answer Key',
    step1: 'Choose the math operation type',
    step2: 'Set number range and problem count',
    step3: 'Toggle answer key on/off if needed',
    step4: 'Click Generate then Print',
  },
  zh: {
    toolTitle: '数学练习题生成器',
    toolDesc: '免费创建可打印的加减乘除及混合运算数学练习题。适合小学教师、家庭教育和课后练习。',
    operation: '运算类型：',
    opAdd: '加法（+）',
    opSub: '减法（−）',
    opMul: '乘法（×）',
    opDiv: '除法（÷）',
    opMix: '混合运算',
    minNum: '最小数：',
    maxNum: '最大数：',
    problemCount: '题目数：',
    showAnswers: '包含答案',
    fixedMul: '固定乘数（可选）：',
    generate: '生成练习题',
    print: '打印练习题',
    name: '姓名：',
    date: '日期：',
    score: '分数：',
    answerKey: '答案',
    step1: '选择运算类型',
    step2: '设置数字范围和题目数量',
    step3: '根据需要开关答案显示',
    step4: '点击生成然后打印',
  }
});

const { $, t } = GZ;
let currentAnswers = [];

$('#settings').innerHTML = `
  <div class="mw-row">
    <label>${t('operation')}</label>
    <select class="mw-select" id="opSelect">
      <option value="add">${t('opAdd')}</option>
      <option value="sub">${t('opSub')}</option>
      <option value="mul">${t('opMul')}</option>
      <option value="div">${t('opDiv')}</option>
      <option value="mix">${t('opMix')}</option>
    </select>
  </div>
  <div class="mw-row">
    <label>${t('minNum')}</label>
    <input class="mw-input" id="minInput" type="number" value="1" min="0" max="9999">
  </div>
  <div class="mw-row">
    <label>${t('maxNum')}</label>
    <input class="mw-input" id="maxInput" type="number" value="20" min="1" max="99999">
  </div>
  <div class="mw-row">
    <label>${t('fixedMul')}</label>
    <input class="mw-input" id="fixedMul" type="number" value="" placeholder="e.g. 7 for ×7 table" min="1" max="20">
  </div>
  <div class="mw-row">
    <label>${t('problemCount')}</label>
    <select class="mw-select" id="countSelect">
      <option value="12">12</option>
      <option value="20" selected>20</option>
      <option value="30">30</option>
      <option value="40">40</option>
      <option value="50">50</option>
    </select>
  </div>
  <div class="mw-row">
    <label><input type="checkbox" id="answerCheck" checked> ${t('showAnswers')}</label>
  </div>
`;

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="generateWorksheet()">${t('generate')}</button>
  <button class="gz-btn" onclick="window.print()">${t('print')}</button>`;

function randInt(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

function makeProblem(op, minN, maxN, fixedM) {
  let a, b, sym, ans;
  switch(op) {
    case 'add':
      a = randInt(minN, maxN); b = randInt(minN, maxN);
      sym = '+'; ans = a + b; break;
    case 'sub':
      a = randInt(minN, maxN); b = randInt(minN, a);
      sym = '−'; ans = a - b; break;
    case 'mul':
      if (fixedM) { b = fixedM; a = randInt(minN, Math.max(minN+1, maxN)); }
      else { a = randInt(minN, Math.min(maxN, 12)); b = randInt(minN, Math.min(maxN, 12)); }
      sym = '×'; ans = a * b; break;
    case 'div':
      b = randInt(Math.max(2, minN), Math.min(12, maxN));
      ans = randInt(minN, Math.min(maxN, 12));
      a = b * ans; sym = '÷'; break;
    default:
      const ops = ['add','sub','mul','div'];
      return makeProblem(ops[randInt(0, 3)], minN, maxN, fixedM);
  }
  return { a, b, sym, ans };
}

function generateWorksheet() {
  const op = $('#opSelect').value;
  let minN = parseInt($('#minInput').value) || 1;
  let maxN = parseInt($('#maxInput').value) || 20;
  if (minN < 0) minN = 0;
  if (maxN <= minN) maxN = minN + 10;
  const fixedM = parseInt($('#fixedMul').value) || null;
  const count = parseInt($('#countSelect').value);
  const showAns = $('#answerCheck').checked;

  let problems = [];
  for (let i = 0; i < count; i++) {
    problems.push(makeProblem(op, minN, maxN, fixedM));
  }
  currentAnswers = problems.map((p, i) => ({ n: i + 1, ans: p.ans }));

  let probHtml = problems.map((p, i) => `
    <div class="mw-problem">
      <span class="num">${i + 1}.</span>
      <span class="num">${p.a}</span>
      <span class="op">${p.sym}</span>
      <span class="num">${p.b}</span>
      <span class="eq">= ______</span>
    </div>`).join('');

  let ansHtml = '';
  if (showAns) {
    ansHtml = `<div class="mw-answer-sheet">
      <h3>${t('answerKey')}</h3>
      <div class="mw-answers">${currentAnswers.map(a => `<div>${a.n}. ${a.ans}</div>`).join('')}</div>
    </div>`;
  }

  $('#output').innerHTML = `<div class="mw-worksheet">
    <div class="mw-title">Math Practice</div>
    <div class="mw-subtitle">${$('#opSelect').selectedOptions[0].text} | ${count} problems</div>
    <div class="mw-name-line">${t('name')}<span></span> ${t('date')}<span></span> ${t('score')}<span></span></div>
    <div class="mw-problems">${probHtml}</div>
  </div>${ansHtml}`;
  $('#status').innerHTML = `<span style="color:var(--success)">✓ ${count} problems generated.</span>`;
}

GZ.renderToolPage({
  category: 'fun',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🔢', href:'/calc/multiplication-table.html', name:'Multiplication Table'},
    {icon:'➕', href:'/calc/basic-calculator.html', name:'Basic Calculator'},
    {icon:'📋', href:'/fun/flashcard-maker.html', name:'Flashcard Maker'},
    {icon:'🧮', href:'/calc/fraction-calculator.html', name:'Fraction Calc'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
