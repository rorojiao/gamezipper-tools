<script>
GZI18n.register({
  en: {
    toolTitle: 'Whitespace Normalizer',
    toolDesc: 'Clean up messy whitespace — collapse multiple spaces, trim lines, normalize line breaks, remove tabs, blank lines and zero-width characters. Free, private, browser-based.',
    ph: 'Paste messy text with extra spaces, tabs or broken line breaks…',
    step1: 'Paste your text into the input box',
    step2: 'Toggle the cleaning options you need',
    step3: 'Watch the normalized output update live',
    step4: 'Click Copy to grab the cleaned text',
    optCollapse: 'Collapse multiple spaces',
    optTrim: 'Trim each line',
    optTabs: 'Tabs to spaces',
    optBlank: 'Remove blank lines',
    optCollapseBlank: 'Collapse consecutive blanks',
    optZeroWidth: 'Remove zero-width chars',
    optTrimDoc: 'Trim document edges',
    optNonBreaking: 'Non-breaking to normal',
    infoPrefix: 'Original:',
    infoMiddle: 'chars → Cleaned:',
    infoSuffix: 'chars · Removed:',
    infoSpaces: 'excess spaces',
  },
  zh: {
    toolTitle: '空白字符规范化工具',
    toolDesc: '清理杂乱的空白字符 — 折叠多余空格、修剪行首尾、统一换行符、移除制表符、空行和零宽字符。免费、私密、浏览器本地运行。',
    ph: '粘贴含多余空格、制表符或混乱换行的杂乱文本…',
    step1: '将文本粘贴到输入框',
    step2: '勾选需要的清理选项',
    step3: '查看实时更新的规范化输出',
    step4: '点击「复制」获取清理后的文本',
    optCollapse: '折叠多余空格',
    optTrim: '修剪每行首尾',
    optTabs: '制表符转空格',
    optBlank: '删除空行',
    optCollapseBlank: '合并连续空行',
    optZeroWidth: '删除零宽字符',
    optTrimDoc: '修剪文档首尾',
    optNonBreaking: '不间断空格转普通',
    infoPrefix: '原文：',
    infoMiddle: '字符 → 清理后：',
    infoSuffix: '字符 · 移除：',
    infoSpaces: '多余空格',
  }
});

const { $, copyText, t } = GZ;

const opts = [
  {id:'collapse', key:'optCollapse', def:true},
  {id:'trim', key:'optTrim', def:true},
  {id:'tabs', key:'optTabs', def:false},
  {id:'blank', key:'optBlank', def:false},
  {id:'collapseBlank', key:'optCollapseBlank', def:false},
  {id:'zeroWidth', key:'optZeroWidth', def:true},
  {id:'trimDoc', key:'optTrimDoc', def:true},
  {id:'nonBreaking', key:'optNonBreaking', def:false},
];

$('#options').innerHTML = opts.map(o =>
  `<label class="opt"><input type="checkbox" id="opt-${o.id}" ${o.def?'checked':''} onchange="transform()"> ${t(o.key)}</label>`
).join('');

function getOpt(id) { return $('#opt-' + id).checked; }

function transform() {
  let text = $('#input').value;
  if (!text) { $('#output').textContent = ''; $('#info').textContent = ''; return; }
  const origLen = text.length;

  if (getOpt('zeroWidth')) text = text.replace(/[\u200B-\u200F\u202A-\u202E\u2060\uFEFF]/g, '');
  if (getOpt('nonBreaking')) text = text.replace(/[\u00A0\u202F]/g, ' ');
  if (getOpt('tabs')) text = text.replace(/\t/g, '  ');

  let lines = text.split(/\r\n|\r|\n/);

  if (getOpt('blank')) lines = lines.filter(l => l.trim() !== '');
  if (getOpt('collapseBlank')) {
    const result = [];
    let prevBlank = false;
    for (const l of lines) {
      const blank = l.trim() === '';
      if (blank && prevBlank) continue;
      result.push(l);
      prevBlank = blank;
    }
    lines = result;
  }
  if (getOpt('trim')) lines = lines.map(l => l.trim());
  if (getOpt('collapse')) lines = lines.map(l => l.replace(/ {2,}/g, ' ').replace(/[^\S\n\r]+/g,' '));

  let result = lines.join('\n');
  if (getOpt('trimDoc')) result = result.replace(/^\s+|\s+$/g, '');

  $('#output').textContent = result;
  const removed = origLen - result.length;
  $('#info').innerHTML = `${t('infoPrefix')} <span>${origLen.toLocaleString()}</span> ${t('infoMiddle')} <span>${result.length.toLocaleString()}</span> ${t('infoSuffix')} <span>${removed.toLocaleString()}</span> ${t('infoSpaces')}`;
}

$('#input').placeholder = t('ph');
$('#input').addEventListener('input', transform);

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#input').value='';transform()">${t('clear')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample();transform()">${t('example')}</button>`;

function loadExample() {
  $('#input').value = "  Hello   World  \n\n\n   This    has\t\ttabs   \n  \u200Btrailing\u200B spaces     \n  \n  Done!  ";
}
GZ.loadExample = loadExample;

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🧹', href:'/text/whitespace-remover.html', name:'Whitespace Remover'},
    {icon:'📝', href:'/text/remove-line-breaks.html', name:'Remove Line Breaks'},
    {icon:'🔢', href:'/text/add-line-numbers.html', name:'Add Line Numbers'},
    {icon:'✂️', href:'/text/tabs-to-spaces.html', name:'Tabs to Spaces'},
  ]
});
</script>
