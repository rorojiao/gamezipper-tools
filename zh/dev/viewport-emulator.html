<script>
GZI18n.register({
  en: {
    toolTitle: 'Viewport & Device Emulator',
    toolDesc: 'Preview websites on different screen sizes. Test responsive design with iPhone, iPad, Android and desktop viewports.',
    step1: 'Enter a website URL and click Go',
    step2: 'Select a device preset or enter custom dimensions',
    step3: 'The page loads in the preview frame at the selected viewport size',
    step4: 'Switch between devices to test responsive breakpoints',
  },
  zh: {
    toolTitle: '视口与设备模拟器',
    toolDesc: '在不同屏幕尺寸下预览网站。使用 iPhone、iPad、Android 和桌面视口测试响应式设计。',
    step1: '输入网站 URL 并点击「前往」',
    step2: '选择设备预设或输入自定义尺寸',
    step3: '页面以所选视口尺寸加载到预览框架中',
    step4: '在不同设备之间切换以测试响应式断点',
  }
});

const { $, copyText, t } = GZ;

const devices = [
  {name:'iPhone SE', w:375, h:667, icon:'📱'},
  {name:'iPhone 15', w:375, h:812, icon:'📱'},
  {name:'iPhone 15 Pro Max', w:430, h:932, icon:'📱'},
  {name:'Galaxy S24', w:360, h:780, icon:'📱'},
  {name:'Pixel 8', w:412, h:915, icon:'📱'},
  {name:'iPad Mini', w:768, h:1024, icon:'📟'},
  {name:'iPad Air', w:820, h:1180, icon:'📟'},
  {name:'iPad Pro 12.9"', w:1024, h:1366, icon:'📟'},
  {name:'Laptop', w:1366, h:768, icon:'💻'},
  {name:'Desktop HD', w:1920, h:1080, icon:'🖥️'},
  {name:'Desktop 2K', w:2560, h:1440, icon:'🖥️'},
];

let activeDevice = 1; // iPhone 15

function buildTabs() {
  const tabs = $('#device-tabs');
  tabs.innerHTML = devices.map((d, i) => 
    `<div class="device-tab${i === activeDevice ? ' active' : ''}" onclick="setDevice(${i})">${d.icon} ${d.name}</div>`
  ).join('');
}

function setDevice(idx) {
  activeDevice = idx;
  const d = devices[idx];
  applySize(d.w, d.h);
  buildTabs();
}

function setCustomSize() {
  const w = parseInt($('#custom-w').value) || 375;
  const h = parseInt($('#custom-h').value) || 812;
  activeDevice = -1;
  applySize(w, h);
  buildTabs();
}

function applySize(w, h) {
  const frame = $('#preview-frame');
  const maxW = Math.min(w, window.innerWidth - 80);
  const scale = Math.min(1, maxW / w);
  const displayH = Math.min(h * scale, 600);
  frame.style.width = w + 'px';
  frame.style.height = h + 'px';
  frame.style.transform = `scale(${scale})`;
  frame.style.transformOrigin = 'top center';
  $('#size-info').textContent = `${w} × ${h}${scale < 1 ? ` (scaled ${Math.round(scale*100)}%)` : ''}`;
}

function loadUrl() {
  let url = $('#url-input').value.trim();
  if (!url) return;
  if (!/^https?:\/\//i.test(url)) url = 'https://' + url;
  $('#url-input').value = url;
  $('#preview-iframe').src = url;
}

$('#url-input').addEventListener('keydown', e => { if (e.key === 'Enter') loadUrl(); });

buildTabs();
setDevice(1);

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="$('#preview-iframe').src='';$('#preview-iframe').srcdoc='<div style=display:flex;justify-content:center;align-items:center;height:100%;font-family:sans-serif;color:#999>Enter a URL above to preview</div>'">${t('clear')}</button>`;

// Set default placeholder
$('#preview-iframe').srcdoc = '<div style="display:flex;justify-content:center;align-items:center;height:100%;font-family:sans-serif;color:#999;font-size:1.2em;text-align:center;padding:20px">Enter a URL above<br>to preview your website</div>';

GZ.renderToolPage({
  category: 'dev',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🖥️', href:'/dev/screen-resolution.html', name:'Screen Resolution'},
    {icon:'🌐', href:'/dev/browser-info.html', name:'Browser Info'},
    {icon:'📐', href:'/css-tools/flexbox.html', name:'Flexbox Generator'},
    {icon:'📋', href:'/dev/css-validator.html', name:'CSS Validator'},
  ]
});
</script>
