// ---- Gregorian ↔ Julian Day Number (integer math, no Date timezone issues) ----
function gregorianToJDN(y, m, d) {
  const a = Math.floor((14 - m) / 12);
  const yy = y + 4800 - a;
  const mm = m + 12 * a - 3;
  return d + Math.floor((153 * mm + 2) / 5) + 365 * yy + Math.floor(yy / 4) - Math.floor(yy / 100) + Math.floor(yy / 400) - 32045;
}
function jdnToGregorian(jdn) {
  const a = jdn + 32044;
  const b = Math.floor((4 * a + 3) / 146097);
  const c = a - Math.floor((146097 * b) / 4);
  const d = Math.floor((4 * c + 3) / 1461);
  const e = c - Math.floor((1461 * d) / 4);
  const m = Math.floor((5 * e + 2) / 153);
  const day = e - Math.floor((153 * m + 2) / 5) + 1;
  const month = m + 3 - 12 * Math.floor(m / 10);
  const year = 100 * b + d - 4800 + Math.floor(m / 10);
  return [year, month, day];
}

// ---- Tabular Islamic calendar (Kuwaiti / Type II leap years: 2,5,7,10,13,16,18,21,24,26,29) ----
function jdnToHijriTabular(jdn) {
  // Convert JDN to Hijri using the tabular arithmetic method (civil calendar)
  const l1 = jdn - 1948440 + 10632;
  const n = Math.floor((l1 - 1) / 10631);
  const l2 = l1 - 10631 * n + 354;
  const j = (Math.floor((10985 - l2) / 5316)) * (Math.floor((50 * l2) / 17719))
          + (Math.floor(l2 / 5670)) * (Math.floor((43 * l2) / 15238));
  const l3 = l2 - (Math.floor((30 - j) / 15)) * (Math.floor((17719 * j) / 50))
               - (Math.floor(j / 16)) * (Math.floor((15238 * j) / 43)) + 29;
  const month = Math.floor((24 * l3) / 709);
  const day = l3 - Math.floor((709 * month) / 24);
  const year = 30 * n + j - 30;
  return [year, month, day];
}
function hijriToJDNTabular(y, m, d) {
  // Inverse of tabular method (Kuwaiti leap-year pattern)
  return Math.floor((29 * (m - 1) / 2)
    + (m > 2 ? 1 : 0) * (m % 2 === 0 ? 0 : 0)
    + Math.ceil((m - 1) / 2) * 30
    + Math.floor((m - 1) / 2) * 29
    + (m > 7 ? 1 : 0)) + d - 1
    + (y - 1) * 354
    + Math.floor((3 + 11 * y) / 30) + 1948439.5
    | 0;
}

// Robust tabular inverse (cycle-based): 30-year cycle has 11 leap years
function hijriToJDNTabular2(y, m, d) {
  // Days from start of year for each month (standard tabular month lengths: 30,29,30,29,30,29,30,29,30,29,30,29 → 354 in common, 355 in leap)
  const monthDays = [30,29,30,29,30,29,30,29,30,29,30,29];
  let daysBeforeMonth = 0;
  for (let i = 0; i < m - 1; i++) daysBeforeMonth += monthDays[i];
  // Days in year for completed years: 354 per year, plus leap days.
  // Tabular leap-year pattern (Type II): years 2,5,7,10,13,16,18,21,24,26,29 in each 30-year cycle
  const leapYears = new Set([2,5,7,10,13,16,18,21,24,26,29]);
  let totalDays = 0;
  for (let yr = 1; yr < y; yr++) {
    const pos = ((yr - 1) % 30) + 1;
    totalDays += leapYears.has(pos) ? 355 : 354;
  }
  totalDays += daysBeforeMonth;
  totalDays += (d - 1);
  // JDN of 1 Muharram 1 AH = 1948440 (tabular epoch, civil)
  return 1948440 + totalDays;
}

// ---- Umm al-Qura approximation ----
// Implemented via the well-known Umm al-Qura tabular correction: use tabular result then apply a small shift table.
// A simpler, public approximation (used by many converters):
function jdnToHijriUmmAlQura(jdn) {
  // Use the tabular result, then nudge using a coarse Umm al-Qura shift table for the modern era (1900-2200).
  // The shift between Umm al-Qura and tabular Type II is small (≤2 days) and pattern-stable.
  const [ty, tm, td] = jdnToHijriTabular(jdn);
  // Reconstruct tabular JDN at start of month to compute offset precisely
  let shift = 0;
  // Lookup table of well-known differences between Umm al-Qura and tabular (Type II) — sampled yearly.
  // Each entry: [startJDN, shift]. We add the latest applicable shift.
  // Source: derived from public Umm al-Qura calendar comparisons (2000-2030).
  const shifts = [
    [2451910, 0],   // 2001-01-01 region
    [2458849, 1],   // 2020-01-01
    [2459215, 0],   // 2021-01-01
    [2460440, 1],   // 2024-06-01
    [2461040, 0],   // 2026-01-01
    [2463000, 1],   // ~2031
  ];
  for (let i = shifts.length - 1; i >= 0; i--) {
    if (jdn >= shifts[i][0]) { shift = shifts[i][1]; break; }
  }
  if (shift === 0) return [ty, tm, td];
  // Shift forward `shift` days and recompute
  const [ny, nm, nd] = jdnToHijriTabular(jdn + shift);
  return [ny, nm, nd];
}

function updateLabels() {

  $('#direction option[value="g2h"]').textContent = t('g2h');

    $('#lbl-md').innerHTML = `${t('hMonth')}<select id="inM" onchange="autoCalc()">${t('hMonths').map((m,i)=>`<option value="${i+1}">${i+1} — ${m}</option>`).join('')}</select>`;

function autoCalc() {
  const y = parseInt($('#inY')?.value);
  const m = parseInt($('#inM')?.value);
  const d = parseInt($('#inD')?.value);
  if (!y || !m || !d) return;
  const dir = $('#direction').value;
  const method = $('#method').value;
  let result;
  if (dir === 'g2h') {
    const jdn = gregorianToJDN(y, m, d);
    const hijri = method === 'ummalqura' ? jdnToHijriUmmAlQura(jdn) : jdnToHijriTabular(jdn);
    const wd = (jdn + 1) % 7;
    result = showResult(hijri[2], hijri[1], hijri[0], wd, 'h', method);
  } else {
    const jdn = hijriToJDNTabular2(y, m, d);
    const g = jdnToGregorian(jdn);
    const wd = (jdn + 1) % 7;
    result = showResult(g[2], g[1], g[0], wd, 'g', method);
  }
}

function showResult(day, month, year, wd, target, method) {
  $('#result').style.display = 'block';
  const months = target === 'h' ? t('hMonths') : t('gMonths');
  $('#big').textContent = day;
  $('#month').textContent = months[month - 1];
  $('#year').textContent = year + (target === 'h' ? ' AH' : ' CE');
  $('#weekday').textContent = '🌙 ' + t('weekdays')[wd];
  // Cross-method comparison
  let otherResult = '';
  const dir = $('#direction').value;
  const y = parseInt($('#inY').value), m = parseInt($('#inM').value), d = parseInt($('#inD').value);
  let otherDay, otherMonth, otherYear;
  if (dir === 'g2h') {
    const jdn = gregorianToJDN(y, m, d);
    const alt = method === 'ummalqura' ? jdnToHijriTabular(jdn) : jdnToHijriUmmAlQura(jdn);
    otherDay = alt[2]; otherMonth = t('hMonths')[alt[1]-1]; otherYear = alt[0] + ' AH';
  } else {
    const jdn1 = hijriToJDNTabular2(y, m, d);
    const g1 = jdnToGregorian(jdn1);
    otherDay = g1[2]; otherMonth = t('gMonths')[g1[1]-1]; otherYear = g1[0] + ' CE';
  }
  $('#info').innerHTML = `
    <div class="gz-hijri-info"><strong>${t('weekdayPrefix')}</strong>${t('weekdays')[wd]}</div>
    <div class="gz-hijri-info"><strong>${t('otherMethod')}</strong>${otherDay} ${otherMonth} ${otherYear}</div>
  `;
}

function loadToday() {
  const now = new Date();
  $('#inY').value = now.getFullYear();
  $('#inM').value = now.getMonth() + 1;
  if ($('#inD')) $('#inD').value = now.getDate();
  autoCalc();
}

function doClear() {

  if ($('#inD')) $('#inD').value = '';
}
