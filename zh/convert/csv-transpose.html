    outDelim: 'Output delimiter',
    step1: 'Paste your CSV, TSV or pipe-delimited data into the input',
    step2: 'Choose input and output delimiters (they can differ)',
    step3: 'Click Transpose — rows become columns and columns become rows',
    step4: 'Copy the result or download it as a file',
  },
  zh: {
    toolTitle: 'CSV 转置工具',
    toolDesc: '即时交换 CSV 数据的行列 — 支持逗号、分号、制表符、竖线和自定义分隔符，正确处理 RFC 4180 引号字段。',
    inDelim: '输入分隔符',
    outDelim: '输出分隔符',
    step1: '将 CSV、TSV 或竖线分隔的数据粘贴到输入区',
    step2: '选择输入和输出分隔符（可以不同）',
    step3: '点击「转置」— 行变列、列变行',
    step4: '复制结果或下载为文件',
  }
});

const { $, copyText, t } = GZ;

function parseCSV(text, delim){
  const rows = [];
  let row = [], field = '', inQuotes = false, i = 0;
  while(i < text.length){
    const ch = text[i];
    if(inQuotes){
      if(ch === '"'){
        if(text[i+1] === '"'){ field += '"'; i += 2; continue; }
        inQuotes = false; i++; continue;
      }
      field += ch; i++; continue;
    }
    if(ch === '"'){ inQuotes = true; i++; continue; }
    if(ch === delim){ row.push(field); field = ''; i++; continue; }
    if(ch === '\r'){ i++; continue; }
    if(ch === '\n'){ row.push(field); rows.push(row); row = []; field = ''; i++; continue; }
    field += ch; i++;
  }
  // last field/row
  if(field.length > 0 || row.length > 0){ row.push(field); rows.push(row); }
  return rows.filter(r => r.length && !(r.length === 1 && r[0] === ''));
}

function escapeField(val, delim){
  const s = String(val);
  if(s.includes(delim) || s.includes('"') || s.includes('\n') || s.includes('\r')){
    return '"' + s.replace(/"/g, '""') + '"';
  }
  return s;
}

function delimValue(select){
  const v = select.value;
  if(v === 'tab') return '\t';
  if(v === 'pipe') return '|';
  if(v === 'semicolon') return ';';
  if(v === 'comma') return ',';
  return v; // custom literal
}

function transpose(){
  const raw = $('#input').value;
  if(!raw.trim()){ $('#output').textContent = ''; $('#status').textContent = ''; return; }
  const inDelim = delimValue($('#inDelim'));
  const outDelim = delimValue($('#outDelim'));
  const rows = parseCSV(raw, inDelim);
  if(!rows.length){ $('#output').textContent = ''; $('#status').textContent = '✗ No rows found.'; return; }

  const maxCols = Math.max(...rows.map(r => r.length));
  const transposed = [];
  for(let c = 0; c < maxCols; c++){
    const newRow = [];
    for(let r = 0; r < rows.length; r++){
      newRow.push(rows[r][c] !== undefined ? rows[r][c] : '');
    }
    transposed.push(newRow);
  }

  const out = transposed.map(r => r.map(f => escapeField(f, outDelim)).join(outDelim)).join('\n');
  $('#output').textContent = out;
  $('#status').textContent = `✓ ${rows.length}×${maxCols} → ${maxCols}×${rows.length}`;
}

function download(){
  const out = $('#output').textContent;
  if(!out) return;
  const blob = new Blob([out], {type:'text/csv'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'transposed.csv';
  a.click();
  URL.revokeObjectURL(a.href);
}

function loadExample(){
  $('#input').value = 'Name,Age,City\nAlice,30,New York\nBob,25,London\nCarol,35,Tokyo';
  transpose();
}

function doClear(){ $('#input').value=''; $('#output').textContent=''; $('#status').textContent=''; }

$('#toolbar').innerHTML = `

    <select class="gz-select" id="inDelim">
      <option value="comma">Comma (,)</option>
      <option value="semicolon">Semicolon (;)</option>
      <option value="tab">Tab</option>
      <option value="pipe">Pipe (|)</option>
    </select>
  </label>
  <label style="display:inline-flex;align-items:center;gap:6px;font-size:.85em;color:var(--text2)">${t('outDelim')}
    <select class="gz-select" id="outDelim">
      <option value="comma">Comma (,)</option>
      <option value="semicolon">Semicolon (;)</option>
      <option value="tab">Tab</option>
      <option value="pipe">Pipe (|)</option>
    </select>
  </label>
  <button class="gz-btn" onclick="transpose()">Transpose</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">Example</button>
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="download()">${t('download')||'Download'}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>
`;

$('#input').addEventListener('input', transpose);
$('#inDelim')?.addEventListener('change', transpose);
$('#outDelim')?.addEventListener('change', transpose);
