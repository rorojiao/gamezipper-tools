    appleTips:[' empire 腰线和V领款式很合适','避免腹部贴身的面料','短裙展示腿部线条','长款开衫营造纵向延伸感'],

    invertedTips:['阔腿裤和A字裙平衡臀部','V领拉长上半身线条','避免垫肩或泡泡袖','上深下浅制造视觉平衡'],

    step4:'点击计算查看您的体型',
  }

const { $, t } = GZ;

$('#form').innerHTML = `
  <div><label>${t('unit')}</label><select id="unit" onchange="toggleUnit()"><option value="cm">${t('cm')}</option><option value="in">${t('inch')}</option></select></div>
  <div><label>${t('bust')}</label><input type="number" id="bust" value="90" min="50" max="200" step="0.1"></div>
  <div><label>${t('waist')}</label><input type="number" id="waist" value="70" min="40" max="180" step="0.1"></div>
  <div><label>${t('hips')}</label><input type="number" id="hips" value="95" min="50" max="200" step="0.1"></div>
  <button class="gz-btn" onclick="calculate()">${t('calculate')}</button>
`;

function calculate() {
  const u = $('#unit').value;
  let bust = parseFloat($('#bust').value);
  let waist = parseFloat($('#waist').value);
  let hips = parseFloat($('#hips').value);
  if (!bust || !waist || !hips) return;

  const whr = (waist / hips).toFixed(2);
  const bw = bust - waist;
  const hw = hips - waist;
  const bh = Math.abs(bust - hips);

  let shape, icon;
  // Hourglass: bust and hips similar (within 5%), waist significantly smaller
  if (bh < bust * 0.05 && bw > bust * 0.08 && hw > hips * 0.08) {
    shape = 'hourglass'; icon = '⏳';
  }
  // Pear: hips > bust by 5%+
  else if (hips > bust * 1.05 && hw > bw) {
    shape = 'pear'; icon = '🍐';
  }
  // Inverted: bust > hips by 5%+
  else if (bust > hips * 1.05 && bw > hw) {
    shape = 'inverted'; icon = '🔻';
  }
  // Apple: waist not much smaller than bust/hips
  else if (waist > bust * 0.85 || whr > 0.85) {
    shape = 'apple'; icon = '🍎';
  }
  // Rectangle: all similar
  else {
    shape = 'rectangle'; icon = '▬';
  }

  const unitLabel = u === 'cm' ? 'cm' : 'in';
  const tips = t(shape + 'Tips');
  $('#results').innerHTML = `
    <div class="shape-result">
      <div class="shape-icon">${icon}</div>
      <div class="shape-name">${t(shape)}</div>
      <div class="desc">${t(shape + 'Desc')}</div>
      <div class="measurements-grid">
        <div class="meas-card"><div class="val">${bust}</div><div class="lbl">${t('bustVal')} (${unitLabel})</div></div>
        <div class="meas-card"><div class="val">${waist}</div><div class="lbl">${t('waistVal')} (${unitLabel})</div></div>
        <div class="meas-card"><div class="val">${hips}</div><div class="lbl">${t('hipsVal')} (${unitLabel})</div></div>
      </div>
      <div class="meas-card" style="margin-top:10px;display:inline-block"><div class="val">${whr}</div><div class="lbl">${t('waistHip')}</div></div>
    </div>
    <div class="tips">
      <h3>${t('stylingTips')}</h3>
      <ul>${Array.isArray(tips) ? tips.map(tip => `<li>${tip}</li>`).join('') : ''}</ul>
    </div>
  `;
}

calculate();
