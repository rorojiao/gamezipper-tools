<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "How many calories do 10,000 steps burn?", "acceptedAnswer": {"@type": "Answer", "text": "For an average person weighing 70 kg (154 lbs), 10,000 steps burn approximately 350-500 calories depending on walking pace. Faster paces and higher body weight increase the calorie burn."}}, {"@type": "Question", "name": "How is the calorie burn from steps calculated?", "acceptedAnswer": {"@type": "Answer", "text": "The calculator uses your weight, step count, and walking pace to estimate calories burned. It factors in stride length to compute distance, then applies MET (metabolic equivalent) values for different activity intensities."}}, {"@type": "Question", "name": "Is walking 10,000 steps a day enough for weight loss?", "acceptedAnswer": {"@type": "Answer", "text": "Walking 10,000 steps daily is a great baseline for general health. Combined with a calorie-controlled diet, it can contribute to weight loss. Adding brisk walking or intervals increases the calorie burn further."}}, {"@type": "Question", "name": "Does running burn more calories than walking the same steps?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. Running the same number of steps burns more calories than walking because it involves greater muscle activation and a higher heart rate. Use the pace selector to switch between walking and running estimates."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">

  </div>
  <div class="gz-tool-area">
    <div class="gz-form" id="form">
      <div>

      </div>
      <div>
        <label id="lbl-steps"></label>
        <input type="number" id="steps" value="10000" min="0" step="100">
      </div>
      <div>
        <label id="lbl-weight"></label>
        <input type="number" id="weight" value="70" min="0" step="0.1">
      </div>
      <div>
        <label id="lbl-height"></label>
        <input type="number" id="height" value="170" min="0" step="1">
      </div>
      <div>
        <label id="lbl-pace"></label>
        <select id="pace">
          <option value="slow">3.2 km/h (2 mph) — Slow walk</option>
          <option value="moderate" selected>5.0 km/h (3.1 mph) — Moderate walk</option>
          <option value="brisk">6.5 km/h (4.0 mph) — Brisk walk</option>
          <option value="jog">8.0 km/h (5.0 mph) — Jog</option>
          <option value="run">10.0 km/h (6.2 mph) — Run</option>
        </select>
      </div>
      <button class="gz-btn" onclick="calculate()" id="btn-calc"></button>
    </div>

      <div class="big" id="result-cal"></div>

        <div class="result-item"><div class="val" id="result-joules"></div><div class="lbl" id="result-joules-label"></div></div>
        <div class="result-item"><div class="val" id="result-fat"></div><div class="lbl" id="result-fat-label"></div></div>
      </div>
    </div>
  </div>

</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Steps to Calories Calculator',
    toolDesc: 'Convert your step count into calories burned. Enter steps, weight, height and pace to estimate energy expenditure for walking or running.',
    lblUnit: 'Unit System',
    lblSteps: 'Step Count',
    lblWeight: 'Body Weight (kg)',
    lblWeightImp: 'Body Weight (lbs)',
    lblHeight: 'Height (cm)',
    lblHeightImp: 'Height (inches)',
    lblPace: 'Walking / Running Pace',
    btnCalc: 'Calculate Calories Burned',
    resultLabel: 'Calories Burned',
    distTraveled: 'Distance',
    timeNeeded: 'Estimated Time',
    energyKj: 'Energy (kJ)',
    fatBurned: 'Fat Burned',
    minutes: 'min',
    hours: 'h',
    km: 'km',
    miles: 'mi',
    step1: 'Choose metric (kg/cm) or imperial (lbs/inches) units',
    step2: 'Enter your daily step count, body weight and height',
    step3: 'Select your walking or running pace',
    step4: 'Click Calculate to see calories burned, distance and estimated time',
  },
  zh: {
    toolTitle: '步数换算卡路里计算器',
    toolDesc: '将步数转换为消耗的卡路里。输入步数、体重、身高和步速，估算步行或跑步消耗的能量。',
    lblUnit: '单位系统',
    lblSteps: '步数',
    lblWeight: '体重（公斤）',
    lblWeightImp: '体重（磅）',
    lblHeight: '身高（厘米）',
    lblHeightImp: '身高（英寸）',
    lblPace: '步行 / 跑步速度',
    btnCalc: '计算消耗卡路里',
    resultLabel: '消耗卡路里',
    distTraveled: '距离',
    timeNeeded: '预计时间',
    energyKj: '能量（千焦）',
    fatBurned: '燃烧脂肪',
    minutes: '分钟',
    hours: '小时',
    km: '公里',
    miles: '英里',
    step1: '选择公制（公斤/厘米）或英制（磅/英寸）',
    step2: '输入每日步数、体重和身高',
    step3: '选择步行或跑步速度',
    step4: '点击「计算消耗卡路里」查看消耗的卡路里、距离和预计时间',
  }
});

const { $, copyText, t } = GZ;

// Pace: km/h speed and MET value
const PACE_DATA = {
  slow:      { kmh: 3.2,  met: 2.8 },
  moderate:  { kmh: 5.0,  met: 3.5 },
  brisk:     { kmh: 6.5,  met: 5.0 },
  jog:       { kmh: 8.0,  met: 8.3 },
  run:       { kmh: 10.0, met: 9.8 },
};

function updateLabels() {
  const isImp = $('#unit').value === 'imperial';
  $('#lbl-weight').textContent = isImp ? t('lblWeightImp') : t('lblWeight');
  $('#lbl-height').textContent = isImp ? t('lblHeightImp') : t('lblHeight');
  if (isImp) {
    if ($('#weight').value == 70) $('#weight').value = 154;
    if ($('#height').value == 170) $('#height').value = 67;
  } else {
    if ($('#weight').value == 154) $('#weight').value = 70;
    if ($('#height').value == 67) $('#height').value = 170;
  }
}

function calculate() {
  const isImp = $('#unit').value === 'imperial';
  const steps = parseInt($('#steps').value) || 0;
  let weight = parseFloat($('#weight').value) || 0;
  let height = parseFloat($('#height').value) || 0;

  // Convert to metric
  const weightKg = isImp ? weight * 0.453592 : weight;
  const heightCm = isImp ? height * 2.54 : height;

  // Estimate stride length based on height and gender-neutral average
  // Walking stride ≈ 0.415 * height, running stride ≈ 0.45 * height
  const pace = $('#pace').value;
  const pd = PACE_DATA[pace];
  const isRunning = pace === 'jog' || pace === 'run';
  const strideM = isRunning ? (heightCm * 0.0045) : (heightCm * 0.00415);
  const distanceKm = (steps * strideM) / 1000;

  // Time = distance / speed
  const hours = distanceKm / pd.kmh;
  const minutes = hours * 60;

  // Calories = MET * weight(kg) * hours
  const calories = pd.met * weightKg * hours;
  const kilojoules = calories * 4.184;
  // Fat burned: 1 gram fat ≈ 7.7 kcal (assuming 85% fat oxidation at moderate intensity is too high; use general 9 kcal/g)
  const fatGrams = calories / 7.7;

  $('#result').style.display = '';
  $('#result-cal').textContent = Math.round(calories) + ' kcal';
  $('#result-label').textContent = t('resultLabel');

  const distUnit = isImp ? t('miles') : t('km');
  const distVal = isImp ? (distanceKm * 0.621371).toFixed(2) : distanceKm.toFixed(2);
  $('#result-dist').textContent = distVal + ' ' + distUnit;
  $('#result-dist-label').textContent = t('distTraveled');

  let timeStr;
  if (minutes >= 60) {
    const h = Math.floor(minutes / 60);
    const m = Math.round(minutes % 60);
    timeStr = h + t('hours') + ' ' + m + t('minutes');
  } else {
    timeStr = Math.round(minutes) + t('minutes');
  }
  $('#result-time').textContent = timeStr;
  $('#result-time-label').textContent = t('timeNeeded');

  $('#result-joules').textContent = Math.round(kilojoules) + ' kJ';
  $('#result-joules-label').textContent = t('energyKj');

  $('#result-fat').textContent = fatGrams.toFixed(1) + ' g';
  $('#result-fat-label').textContent = t('fatBurned');
}

$('#btn-calc').textContent = t('btnCalc');
$('#unit').addEventListener('change', updateLabels);
calculate();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🔥', href:'/calc/calorie-burner-calculator.html', name:'Calorie Burner'},
    {icon:'🏃', href:'/calc/pace-calculator.html', name:'Pace Calculator'},
    {icon:'👣', href:'/calc/steps-to-km-calculator.html', name:'Steps to km'},
    {icon:'⚖️', href:'/calc/bmi-calculator.html', name:'BMI Calculator'},
  ]
});
</script>

</body>
