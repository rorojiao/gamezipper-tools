<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is a half birthday?", "acceptedAnswer": {"@type": "Answer", "text": "A half birthday is the date exactly six months after your date of birth. For example, if you were born on July 1, your half birthday is January 1."}}, {"@type": "Question", "name": "Why do people celebrate half birthdays?", "acceptedAnswer": {"@type": "Answer", "text": "Half birthdays are popular for summer-born kids who have school friends in winter, for kids who share a birthday with a sibling, and as a fun mid-year excuse for cake. Schools and preschools often throw half-birthday parties too."}}, {"@type": "Question", "name": "What if my birthday is the 31st?", "acceptedAnswer": {"@type": "Answer", "text": "The calculator rolls to the last day of the month when the target month has fewer days. So a January 31 birthday becomes a half-birthday on July 31; a March 31 birthday rolls to September 30."}}, {"@type": "Question", "name": "Is my birthday data sent anywhere?", "acceptedAnswer": {"@type": "Answer", "text": "No. The calculation runs entirely in your browser. The birthday you enter never leaves your device."}}]}</script>

<script>
GZI18n.register({
  en: {
    toolTitle: 'Half Birthday Calculator',
    toolDesc: 'Find the date exactly 6 months after your birthday. See how many days, weeks and months away it is, plus the next 5 half-birthday milestones.',
    lblBday: 'Your birthday',
    lblAsof: 'As of date (optional)',
    halfOn: 'Your half birthday falls on',
    daysUntil: 'Days until half birthday',
    weeksUntil: 'Weeks until',
    monthsUntil: 'Months until',
    ageOnHalf: 'Your age on half birthday',
    weekday: 'Day of week',
    next: 'Upcoming half birthdays',
    fact: 'Fun fact',
    pickBirthday: '👇 Pick your birthday above to see your half-birthday date, weekday, and a fun fact.',
    step1: 'Enter your date of birth in the first field',
    step2: 'Optionally set the "as of" date — defaults to today',
    step3: 'See your half-birthday date, weekday and the countdown',
    step4: 'Scroll down for the next 5 half-birthday milestones',
  },
  zh: {
    toolTitle: '半生日计算器',
    toolDesc: '查找你出生日 6 个月后的日期。查看距离半生日还有多少天、周、月，并显示未来 5 个半生日里程碑。',
    lblBday: '你的生日',
    lblAsof: '计算日期（可选）',
    halfOn: '你的半生日是',
    daysUntil: '距离半生日还有',
    weeksUntil: '折合周数',
    monthsUntil: '折合月数',
    ageOnHalf: '半生日时的年龄',
    weekday: '星期',
    next: '即将到来的半生日',
    fact: '趣味知识',
    pickBirthday: '👇 在上方选择你的生日，查看半生日日期、星期和趣味知识。',
    step1: '在第一个字段中输入你的出生日期',
    step2: '可选地设置「计算日期」 — 默认为今天',
    step3: '查看半生日日期、星期和倒计时',
    step4: '向下滚动查看未来 5 个半生日里程碑',
  }
});

const { $, t } = GZ;
$('#lbl-bday').textContent = t('lblBday');
$('#lbl-asof').textContent = t('lblAsof');

function addMonths(date, months) {
  const d = new Date(date);
  const targetMonth = d.getMonth() + months;
  const targetYear = d.getFullYear() + Math.floor(targetMonth / 12);
  const m = ((targetMonth % 12) + 12) % 12;
  const day = d.getDate();
  const last = new Date(targetYear, m + 1, 0).getDate();
  return new Date(targetYear, m, Math.min(day, last));
}

function dayDiff(a, b) {
  const ms = b.getTime() - a.getTime();
  return Math.round(ms / 86400000);
}

const WEEKDAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const WEEKDAYS_ZH = ['星期日','星期一','星期二','星期三','星期四','星期五','星期六'];
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const MONTHS_ZH = ['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];

function isZh() { return (document.documentElement.lang === 'zh') || (localStorage.getItem('gz-lang') === 'zh'); }

function fmt(d) {
  if (isZh()) return `${d.getFullYear()} 年 ${MONTHS_ZH[d.getMonth()]} ${d.getDate()} 日`;
  return `${MONTHS[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`;
}

function calc() {
  const b = $('#bday').value;
  if (!b) { $('#result').style.display = 'none'; return; }
  const birth = new Date(b + 'T00:00:00');
  const asof = $('#asof').value ? new Date($('#asof').value + 'T00:00:00') : new Date(new Date().toDateString());
  const today = new Date(new Date().toDateString());

  // Find next half birthday
  let half = addMonths(birth, 6);
  // Walk forward until >= asof
  let n = 0;
  while (half < asof && n < 200) { half = addMonths(birth, 6 * (++n + 1)); }
  // Walk back if both halves in past (so n=0 case is correct)
  if (half >= asof && n === 0) {
    // OK — half is upcoming
  } else {
    // n now points to the index multiplier
  }

  const ageOnHalf = Math.floor((half - birth) / (365.25 * 86400000));
  const days = dayDiff(today, half);
  const weeks = (days / 7).toFixed(1);
  const months = (days / 30.4375).toFixed(1);

  $('#res-title').textContent = `${t('halfOn')}: ${fmt(half)}`;

  const wkday = isZh() ? WEEKDAYS_ZH[half.getDay()] : WEEKDAYS[half.getDay()];
  $('#res-grid').innerHTML = `
    <div class="result-cell"><div class="k">${t('daysUntil')}</div><div class="v">${days >= 0 ? days : 0}</div></div>
    <div class="result-cell"><div class="k">${t('weeksUntil')}</div><div class="v">${weeks}</div></div>
    <div class="result-cell"><div class="k">${t('monthsUntil')}</div><div class="v">${months}</div></div>
    <div class="result-cell"><div class="k">${t('ageOnHalf')}</div><div class="v">${ageOnHalf}</div></div>
    <div class="result-cell"><div class="k">${t('weekday')}</div><div class="v" style="font-size:1.1em">${wkday}</div></div>
  `;

  // Next 5 half-birthdays
  const startN = n === 0 ? 0 : (n);
  let listHtml = `<li><b>${t('next')}:</b></li>`;
  for (let i = 0; i < 5; i++) {
    const h = addMonths(birth, 6 * (startN + i + 1));
    const off = i === 0 ? '' : '';
    listHtml += `<li>${fmt(h)} <span style="color:var(--text2)">— ${t('ageOnHalf')} ${Math.floor((h - birth) / (365.25 * 86400000))}</span></li>`;
  }
  $('#next-list').innerHTML = listHtml;

  // Fun fact
  const facts = isZh() ? [
    '半生日常见于夏季出生的孩子，因为他们的生日在暑假，朋友不在学校。',
    '在一些学校，老师会给错过班级生日的孩子庆祝半生日，让每个孩子都被祝福。',
    '古罗马人使用 "matrus" 这个词来描述半生日，现代用法可以追溯到 19 世纪的美国。',
    '如果同一天是半生日和满生日，那就是传说中的 "金色生日" — 但这极少发生。',
  ] : [
    'Half birthdays are popular for kids born in summer, since their real birthday falls on school holidays.',
    'Many schools celebrate half birthdays for children who miss class parties during summer break.',
    'The term "half birthday" dates back to 19th-century America and was once used on formal invitations.',
    'A "golden birthday" is when your age matches the day of your birth date — the half-birthday is the next milestone.',
  ];
  const factIdx = half.getDate() % facts.length;
  $('#fact').innerHTML = `<b>${t('fact')}:</b> ${facts[factIdx]}`;

  $('#result').style.display = 'block';
}

$('#bday').addEventListener('change', calc);
$('#asof').addEventListener('change', calc);

// Set today as default for asof
const today = new Date();
$('#asof').value = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
// Default placeholder message
$('#result').style.display = 'none';
const placeholder = document.createElement('div');
placeholder.className = 'fun-fact';
placeholder.textContent = t('pickBirthday');
document.querySelector('.calc-wrap').appendChild(placeholder);

  titleKey: 'toolTitle',

    {href:'/calc/birthday-calculator.html',icon:'🎁',name:'Birthday Calculator'},
    {href:'/calc/days-until.html',icon:'📅',name:'Days Until'},
    {href:'/calc/days-between-dates.html',icon:'📆',name:'Days Between Dates'},
  ]
});
</script>
