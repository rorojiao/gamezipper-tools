<script>
GZI18n.register({
  en: {
    toolTitle: 'GitHub Profile README Generator',
    toolDesc: 'Build a stunning GitHub profile README in seconds. Add stats widgets, tech badges, social links and a custom bio — copy the Markdown and paste it into your profile repo.',
    copy: 'Copy README',
    techPlaceholder: 'Type a tech and press Enter (e.g. JavaScript)',
    step1: 'Fill in your GitHub username and personal info',
    step2: 'Add your social links and tech stack tags',
    step3: 'Pick which optional sections to include',
    step4: 'Copy the generated Markdown into a new repo named after your username',
  },
  zh: {
    toolTitle: 'GitHub 个人主页 README 生成器',
    toolDesc: '几秒钟生成精美的 GitHub 个人主页 README。添加统计、徽章、社交链接和简介 — 复制 Markdown 到你的个人仓库即可。',
    copy: '复制 README',
    techPlaceholder: '输入技术栈后按回车 (例如 JavaScript)',
    step1: '填写 GitHub 用户名和个人信息',
    step2: '添加社交链接和技术栈标签',
    step3: '选择要包含的可选部分',
    step4: '复制生成的 Markdown 到与你用户名同名的新仓库',
  }
});

const {$, copyText, t} = GZ;
let techs = ['JavaScript', 'TypeScript', 'React', 'Node.js', 'Python'];
let currentTab = 'md';

function escapeMd(s) { return (s||'').replace(/\|/g,'\\|'); }
function badgeUrl(label, msg, color) {
  return `https://img.shields.io/badge/${encodeURIComponent(label)}-${encodeURIComponent(msg)}-${color || 'blue'}?style=for-the-badge&logo=${encodeURIComponent(label.toLowerCase())}`;
}

function render() {
  const user = $('#user').value.trim() || 'octocat';
  const name = $('#name').value;
  const role = $('#role').value;
  const bio = $('#bio').value;
  const twitter = $('#twitter').value.trim();
  const linkedin = $('#linkedin').value.trim();
  const website = $('#website').value.trim();
  const email = $('#email').value.trim();
  const working = $('#working').value;
  const learning = $('#learning').value;
  const ask = $('#ask').value;
  const secStats = $('#secStats').checked;
  const secStreak = $('#secStreak').checked;
  const secVisitors = $('#secVisitors').checked;
  const secTrophies = $('#secTrophies').checked;
  const secActivity = $('#secActivity').checked;
  const secWakatime = $('#secWakatime').checked;

  let md = '';
  // Header banner (optional ASCII banner)
  md += `<img src="https://raw.githubusercontent.com/${user}/${user}/main/profile-banner.gif" alt="Banner" onerror="this.style.display='none'">\n\n`;
  md += `# Hi 👋, I'm ${name}\n\n`;
  md += `### ${role}\n\n`;
  md += `${bio}\n\n`;

  // Social badges
  const socials = [];
  if (twitter) socials.push(`[Twitter](https://twitter.com/${twitter.replace('@','')})`);
  if (linkedin) socials.push(`[LinkedIn](https://linkedin.com/in/${linkedin})`);
  if (website) socials.push(`[Website](${website})`);
  if (email) socials.push(`[Email](mailto:${email})`);
  if (socials.length) {
    md += `🔗 **Connect with me:**\n\n`;
    md += socials.map(s => `&nbsp;&nbsp;${s}`).join('\n') + '\n\n';
  }

  // About
  md += `## 🚀 About Me\n\n`;
  if (working) md += `- 🔭 I'm currently working on **${working}**\n`;
  if (learning) md += `- 🌱 I'm currently learning **${learning}**\n`;
  if (ask) md += `- 💬 Ask me about **${ask}**\n`;
  md += `- 👯 I'm looking to collaborate on interesting projects\n`;
  md += `- ⚡ Fun fact: I love turning ☕ into 💻\n\n`;

  // Tech Stack
  if (techs.length) {
    md += `## 🛠 Tech Stack\n\n`;
    md += techs.map(t => `<img src="${badgeUrl(t, '', '4ECDC4')}" alt="${t}">`).join(' ') + '\n\n';
  }

  // GitHub Stats
  if (secStats || secStreak) {
    md += `## 📊 GitHub Stats\n\n`;
    if (secStats) {
      md += `<img src="https://github-readme-stats.vercel.app/api?username=${user}&show_icons=true&theme=tokyonight" alt="Stats">\n\n`;
      md += `<img src="https://github-readme-stats.vercel.app/api/top-langs/?username=${user}&layout=compact&theme=tokyonight" alt="Top Langs">\n\n`;
    }
    if (secStreak) {
      md += `<img src="https://streak-stats.demolab.com?user=${user}&theme=tokyonight" alt="Streak">\n\n`;
    }
  }

  // Visitors
  if (secVisitors) {
    md += `## 👀 Visitors\n\n`;
    md += `<img src="https://komarev.com/ghpvc/?username=${user}&label=Profile%20views&color=0e75b6&style=flat" alt="Visitors">\n\n`;
  }

  // Trophies
  if (secTrophies) {
    md += `## 🏆 Trophies\n\n`;
    md += `<img src="https://github-profile-trophy.vercel.app/?username=${user}&theme=tokyonight&no-frame=false&no-bg=false&margin-w=4" alt="Trophies">\n\n`;
  }

  // Activity
  if (secActivity) {
    md += `## 📈 Activity Graph\n\n`;
    md += `<img src="https://github-readme-activity-graph.vercel.app/graph?username=${user}&theme=tokyo-night" alt="Activity">\n\n`;
  }

  // WakaTime
  if (secWakatime) {
    md += `## ⏱️ WakaTime Stats\n\n`;
    md += `<img src="https://github-readme-stats.vercel.app/api/wakatime?username=${user}&theme=tokyonight" alt="WakaTime">\n\n`;
  }

  md += `---\n\n`;
  md += `<sub>Made with ❤️ using [GameZipper Tools](https://tools.gamezipper.com)</sub>`;

  $('#mdOut').textContent = md;
  window._readmeMd = md;
  renderPreview(md);
}

function renderPreview(md) {
  // Very basic markdown to HTML preview
  let html = md
    .replace(/^### (.*$)/gim, '<h3>$1</h3>')
    .replace(/^## (.*$)/gim, '<h2>$1</h2>')
    .replace(/^# (.*$)/gim, '<h1>$1</h1>')
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.*?)\*/g, '<em>$1</em>')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/^- (.*$)/gim, '<li>$1</li>')
    .replace(/(<li>.*<\/li>)/gs, '<ul>$1</ul>')
    .replace(/\n\n/g, '<br><br>')
    .replace(/<img src="(.*?)" alt="(.*?)"(?: onerror="[^"]*")?>/g, '<img src="$1" alt="$2">')
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
  $('#previewOut').innerHTML = html;
}

function renderTechs() {
  $('#techTags').innerHTML = techs.map((t, i) => `<span class="gh-tag">${t}<span class="x" data-i="${i}">×</span></span>`).join('');
  $('#techTags').querySelectorAll('.x').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      techs.splice(parseInt(el.dataset.i), 1);
      renderTechs();
      render();
    });
  });
}

$('#techInput').addEventListener('keydown', e => {
  if (e.key === 'Enter' && e.target.value.trim()) {
    e.preventDefault();
    const v = e.target.value.trim();
    if (!techs.includes(v)) techs.push(v);
    e.target.value = '';
    renderTechs();
    render();
  }
});

['user','name','role','bio','twitter','linkedin','website','email','working','learning','ask','secStats','secStreak','secVisitors','secTrophies','secActivity','secWakatime'].forEach(id => {
  $('#'+id).addEventListener('input', render);
});

document.querySelectorAll('.gh-tab').forEach(b => {
  b.addEventListener('click', () => {
    document.querySelectorAll('.gh-tab').forEach(x => x.classList.replace('gz-btn','gz-btn-secondary') || x.classList.remove('active'));
    b.classList.add('active');
    b.classList.remove('gz-btn-secondary');
    b.classList.add('gz-btn');
    currentTab = b.dataset.tab;
    $('#mdWrap').style.display = currentTab === 'md' ? 'block' : 'none';
    $('#previewWrap').style.display = currentTab === 'preview' ? 'block' : 'none';
  });
});

$('#toolbar').innerHTML = `
  <button class="gz-btn" id="copyBtn">${t('copy')}</button>
`;
$('#copyBtn').addEventListener('click', () => { if (window._readmeMd) copyText(window._readmeMd); });

renderTechs();
render();

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📝', href:'/text/markdown.html', name:'Markdown Editor'},
    {icon:'📄', href:'/text/markdown-to-html.html', name:'Markdown to HTML'},
    {icon:'📊', href:'/text/word-counter.html', name:'Word Counter'},
    {icon:'✨', href:'/text/fancy-text.html', name:'Fancy Text'},
  ]
});
</script>
