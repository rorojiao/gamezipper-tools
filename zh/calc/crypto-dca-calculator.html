<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"什么是加密货币定投？","acceptedAnswer":{"@type":"Answer","text":"定投（DCA）是指不考虑当时价格，按固定时间表投入固定金额。它把买入分散到不同市场价位，避免完全依赖单一入场点。"}},{"@type":"Question","name":"该计算器如何模拟价格？","acceptedAnswer":{"@type":"Answer","text":"工具在起始价与结束价之间创建平滑的价格路径，并在每个周期投入相同金额。可选择线性路径或按百分比变化的路径进行情景规划。"}},{"@type":"Question","name":"平均买入成本是什么？","acceptedAnswer":{"@type":"Answer","text":"平均买入成本等于总投入除以累计代币数量。定投成本通常与简单计算市场价格的算术平均值不同。"}},{"@type":"Question","name":"工具使用历史或实时价格吗？","acceptedAnswer":{"@type":"Answer","text":"不使用。起始价和结束价由你输入，因此计算完全本地化，可用于假设、目标或手动查询的历史情景。"}}]}</script>

<div class="gz-container">

      <div class="calc-field"><label id="l-start"></label><input id="startprice" type="number" min="0.00000001" step="any" value="40000"></div>
      <div class="calc-field"><label id="l-end"></label><input id="endprice" type="number" min="0.00000001" step="any" value="70000"></div>
      <div class="calc-field"><label id="l-path"></label><select id="path"><option value="linear" id="o-linear"></option><option value="geometric" id="o-geometric"></option></select></div>
    </div>

<script>
GZI18n.register({"en":{"toolTitle":"Crypto DCA Calculator","toolDesc":"Model recurring Bitcoin or crypto purchases and see accumulated units, average cost and return.","amount":"Amount per purchase","purchases":"Number of purchases","frequency":"Purchase frequency","startPrice":"Starting token price","endPrice":"Ending token price","path":"Price path","weekly":"Weekly","biweekly":"Every 2 weeks","monthly":"Monthly","linear":"Linear price path","geometric":"Percentage-based path","invested":"Total invested","units":"Token units","avgCost":"Average cost","finalValue":"Final value","profit":"Profit / loss","roi":"Return on investment","duration":"Investment duration","schedule":"Purchase schedule","number":"#","price":"Price","bought":"Units bought","totalUnits":"Total units","reset":"Reset","note":"Scenario tool only. It excludes trading fees, spreads, taxes, custody risk and real-world price volatility between modeled purchases.","step1":"Enter the amount invested on each recurring purchase","step2":"Choose the number, frequency, start price and end price","step3":"Select a linear or percentage-based price path","step4":"Review accumulated units, average cost, value and ROI"},"zh":{"toolTitle":"加密货币 DCA 定投计算器","toolDesc":"模拟比特币或加密货币定期买入，查看累计数量、平均成本和回报。","amount":"每次投入金额","purchases":"买入次数","frequency":"买入频率","startPrice":"代币起始价格","endPrice":"代币结束价格","path":"价格路径","weekly":"每周","biweekly":"每两周","monthly":"每月","linear":"线性价格路径","geometric":"百分比价格路径","invested":"总投入","units":"代币数量","avgCost":"平均成本","finalValue":"期末价值","profit":"盈利 / 亏损","roi":"投资回报率","duration":"投资时长","schedule":"买入计划","number":"序号","price":"价格","bought":"买入数量","totalUnits":"累计数量","reset":"重置","note":"仅用于情景估算。未计入交易手续费、点差、税费、托管风险和模型买入点之间的真实价格波动。","step1":"输入每次定期买入的投入金额","step2":"选择买入次数、频率、起始价和结束价","step3":"选择线性或百分比价格路径","step4":"查看累计数量、平均成本、期末价值和回报率"}});
const { $, t } = GZ;
function text(id,key){const el=$(id);if(el)el.textContent=t(key)}
function num(id,fallback=0){const n=parseFloat($(id).value);return Number.isFinite(n)?n:fallback}
function money(n,currency){try{return new Intl.NumberFormat(undefined,{style:'currency',currency:currency||'USD',maximumFractionDigits:Math.abs(n)<1?8:2}).format(n)}catch(e){return (currency||'$')+' '+n.toLocaleString(undefined,{maximumFractionDigits:8})}}

[['#l-amount','amount'],['#l-purchases','purchases'],['#l-frequency','frequency'],['#l-start','startPrice'],['#l-end','endPrice'],['#l-path','path'],['#o-weekly','weekly'],['#o-biweekly','biweekly'],['#o-monthly','monthly'],['#o-linear','linear'],['#o-geometric','geometric'],['#k-invested','invested'],['#k-units','units'],['#k-avg','avgCost'],['#k-value','finalValue'],['#k-profit','profit'],['#k-roi','roi'],['#k-duration','duration'],['#schedule','schedule'],['#th-number','number'],['#th-price','price'],['#th-bought','bought'],['#th-total','totalUnits'],['#reset','reset'],['#note','note']].forEach(x=>text(...x));
function calculate(){const amount=Math.max(0,num('#amount')),n=Math.min(520,Math.max(1,Math.round(num('#purchases',1)))),freq=Math.max(1,num('#frequency',1)),start=Math.max(1e-12,num('#startprice',1)),end=Math.max(1e-12,num('#endprice',1)),path=$('#path').value;let units=0,rows=[];for(let i=0;i<n;i++){const f=n===1?1:i/(n-1);const price=path==='geometric'?start*Math.pow(end/start,f):start+(end-start)*f,bought=amount/price;units+=bought;if(n<=60||i<10||i>=n-10||i%Math.ceil(n/30)===0)rows.push([i+1,price,bought,units])}const invested=amount*n,value=units*end,profit=value-invested,roi=invested?profit/invested*100:0,weeks=(n-1)*freq;$('#v-invested').textContent=money(invested,'USD');$('#v-units').textContent=units.toLocaleString(undefined,{maximumFractionDigits:8});$('#v-avg').textContent=money(units?invested/units:0,'USD');$('#v-value').textContent=money(value,'USD');$('#v-profit').textContent=money(profit,'USD');$('#v-roi').textContent=roi.toFixed(2)+'%';$('#v-duration').textContent=(weeks/52).toFixed(2)+' yr';$('#rows').innerHTML=rows.map(r=>'<tr><td>'+r[0]+'</td><td>'+money(r[1],'USD')+'</td><td>'+r[2].toFixed(8)+'</td><td>'+r[3].toFixed(8)+'</td></tr>').join('')}
['#amount','#purchases','#frequency','#startprice','#endprice','#path'].forEach(id=>$(id).addEventListener('input',calculate));$('#reset').onclick=()=>{$('#amount').value=100;$('#purchases').value=52;$('#frequency').value=1;$('#startprice').value=40000;$('#endprice').value=70000;$('#path').value='linear';calculate()};calculate();

GZ.renderToolPage({category:'calc',titleKey:'toolTitle',descKey:'toolDesc',howToSteps:['step1','step2','step3','step4'],related:[{"icon":"₿","href":"/calc/satoshi-to-usd.html","name":"Satoshi to USD"},{"icon":"💹","href":"/calc/crypto-profit-calculator.html","name":"Crypto Profit Calculator"},{"icon":"🪙","href":"/calc/staking-yield-calculator.html","name":"Staking Yield Calculator"},{"icon":"📊","href":"/calc/investment-calculator.html","name":"Investment Calculator"}]});
</script>
