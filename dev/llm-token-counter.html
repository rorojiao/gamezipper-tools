<script>
GZI18n.register({
  en: {
    toolTitle: 'LLM Token Counter & Cost Calculator',
    toolDesc: 'Estimate token counts for GPT-4o, Claude 3.5, Gemini and Llama, then calculate API cost per 1M tokens — live and private in your browser.',
    ph: 'Paste your prompt, system message, or any text here…',
    lbTok: 'Tokens ≈', lbWord: 'Words', lbChar: 'Characters', lbLine: 'Lines',
    hint: 'Estimate based on GPT-style (cl100k / o200k) pretokenization. ±5–10% for English; CJK and emoji are approximate.',
    scCost: 'Estimated API cost',
    lbOut: 'Output tokens (response):', lbReq: 'Requests:', hint2: '(same prompt repeated N times)',
    thModel: 'Model', thIn: 'Input $/1M', thOut2: 'Output $/1M', thTotal: 'Total cost',
    note: 'Prices are editable approximations of public 2026 rates — paste your provider\'s exact numbers for an accurate quote. All math runs locally; nothing is uploaded.',
    step1: 'Paste your prompt or any text into the box above',
    step2: 'Read the estimated token, word, character and line counts instantly',
    step3: 'Set the expected output length and number of requests',
    step4: 'Compare the estimated cost across GPT, Claude, Gemini and Llama models',
  },
  zh: {
    toolTitle: 'LLM Token 计数器 & 成本计算器',
    toolDesc: '估算 GPT-4o、Claude 3.5、Gemini 和 Llama 的 token 数量，并按每百万 token 计算 API 成本 — 浏览器本地实时、私密运行。',
    ph: '在此粘贴提示词、系统消息或任意文本…',
    lbTok: 'Token ≈', lbWord: '单词', lbChar: '字符', lbLine: '行数',
    hint: '基于 GPT 风格（cl100k / o200k）预分词估算。英文误差约 ±5–10%；中文和 Emoji 为近似值。',
    scCost: '预估 API 成本',
    lbOut: '输出 token（回复）：', lbReq: '请求次数：', hint2: '（同一提示重复 N 次）',
    thModel: '模型', thIn: '输入 $/百万', thOut2: '输出 $/百万', thTotal: '总成本',
    note: '价格为可编辑的 2026 年公开费率近似值 — 粘贴你的服务商精确数字以获得准确报价。所有计算均在本地进行，不上传任何数据。',
    step1: '在上方输入框粘贴你的提示词或任意文本',
    step2: '即时查看估算的 token、单词、字符和行数',
    step3: '设置预期的输出长度和请求次数',
    step4: '对比 GPT、Claude、Gemini 和 Llama 各模型的预估成本',
  }
});

const { $, copyText, t } = GZ;

const MODELS = [
  { id:'gpt-4o',         name:'GPT-4o',            in:2.50,  out:10.00 },
  { id:'gpt-4o-mini',     name:'GPT-4o mini',       in:0.15,  out:0.60  },
  { id:'gpt-4.1',         name:'GPT-4.1',           in:2.00,  out:8.00  },
  { id:'o1',              name:'o1',                in:15.00, out:60.00 },
  { id:'o3-mini',         name:'o3-mini',           in:1.10,  out:4.40  },
  { id:'claude-sonnet',   name:'Claude 3.5 Sonnet', in:3.00,  out:15.00 },
  { id:'claude-haiku',    name:'Claude 3.5 Haiku',  in:0.80,  out:4.00  },
  { id:'claude-opus',     name:'Claude 3 Opus',     in:15.00, out:75.00 },
  { id:'gemini-pro',      name:'Gemini 1.5 Pro',    in:1.25,  out:5.00  },
  { id:'gemini-flash',    name:'Gemini 1.5 Flash',  in:0.075, out:0.30  },
  { id:'llama-405b',      name:'Llama 3.1 405B',    in:0.90,  out:0.90  },
];

// GPT-style pretokenizer (cl100k / o200k approximation)
const PRETOK = /'s|'t|'re|'ve|'m|'ll|'d| ?\p{L}+| ?\p{N}+| ?[^\s\p{L}\p{N}]+|\s+(?!\S)|\s+/gu;

function estimateTokens(text){
  if(!text) return 0;
  const chunks = text.match(PRETOK) || [text];
  let tokens = 0;
  for(const chunk of chunks){
    let est = 0;
    for(const ch of chunk){
      const code = ch.codePointAt(0);
      if(code < 0x80){
        if(/[A-Za-z0-9]/.test(ch)) est += 0.25;
        else if(/\s/.test(ch)) est += 0.25;
        else est += 0.5;            // ASCII punctuation/symbol
      } else if(code >= 0x4E00 && code <= 0x9FFF){ est += 1.3; }      // CJK Unified
      else if(code >= 0x3400 && code <= 0x4DBF){ est += 1.3; }        // CJK Ext A
      else if(code >= 0x3040 && code <= 0x30FF){ est += 1.2; }        // Japanese kana
      else if(code >= 0xAC00 && code <= 0xD7AF){ est += 1.3; }        // Hangul
      else if(code >= 0xE000 && code <= 0xF8FF){ est += 1.5; }        // Private use
      else if(code >= 0x1F000){ est += 2; }                            // emoji/supplementary
      else { est += 1; }                                              // other unicode
    }
    tokens += Math.max(1, Math.round(est));
  }
  return tokens;
}

function countWords(text){
  if(!text.trim()) return 0;
  // Count CJK chars as individual "words" plus ASCII word runs
  const ascii = (text.match(/[A-Za-z0-9]+(?:[''-][A-Za-z0-9]+)*/g) || []).length;
  const cjk = (text.match(/[\u3400-\u9FFF\uF900-\uFAFF\u3040-\u30FF\uAC00-\uD7AF]/g) || []).length;
  return ascii + cjk;
}

function fmtMoney(n){
  if(n === 0) return '$0.00';
  if(n < 0.01) return '<$0.01';
  if(n < 1) return '$' + n.toFixed(4).replace(/0+$/,'').replace(/\.$/,'');
  return '$' + n.toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2});
}

function renderModelRows(){
  const body = $('#ltc-body');
  body.innerHTML = MODELS.map(m => `
    <tr data-id="${m.id}">
      <td><b>${m.name}</b></td>
      <td><input type="number" step="0.001" min="0" value="${m.in}"  data-k="in"  aria-label="${m.name} input price"></td>
      <td><input type="number" step="0.001" min="0" value="${m.out}" data-k="out" aria-label="${m.name} output price"></td>
      <td class="cost" data-cost></td>
    </tr>`).join('');
}

function recompute(){
  const text = $('#ltc-input').value;
  const inTok = estimateTokens(text);
  const outTok = Math.max(0, parseInt($('#ltc-out').value, 10) || 0);
  const req = Math.max(1, parseInt($('#ltc-req').value, 10) || 1);

  $('#s-tokens').textContent = inTok.toLocaleString();
  $('#s-words').textContent  = countWords(text).toLocaleString();
  $('#s-chars').textContent  = text.length.toLocaleString();
  $('#s-lines').textContent  = (text ? text.split(/\n/).length : 0).toLocaleString();

  const rows = document.querySelectorAll('#ltc-body tr');
  let best = null, bestCost = Infinity;
  rows.forEach(tr => {
    const id = tr.dataset.id;
    const m = MODELS.find(x => x.id === id);
    m.in  = parseFloat(tr.querySelector('[data-k=in]').value)  || 0;
    m.out = parseFloat(tr.querySelector('[data-k=out]').value) || 0;
    const cost = ((inTok * m.in) + (outTok * m.out)) / 1_000_000 * req;
    tr.querySelector('[data-cost]').textContent = fmtMoney(cost);
    tr.classList.toggle('sel', cost > 0 && cost === Math.min(...[...rows].map(r=>{
      const mm = MODELS.find(x=>x.id===r.dataset.id);
      const c = ((inTok*mm.in)+(outTok*mm.out))/1e6*req;
      return c>0?c:Infinity;
    })));
  });
}

// Apply i18n to elements with id-lang
function applyLangAttrs(){
  document.querySelectorAll('[id-lang]').forEach(el => {
    const key = el.getAttribute('id-lang');
    if(el.tagName === 'TEXTAREA' || el.tagName === 'INPUT'){
      if(el.tagName === 'TEXTAREA') el.placeholder = t(key);
    } else {
      el.textContent = t(key);
    }
  });
}

renderModelRows();
$('#ltc-input').addEventListener('input', recompute);
$('#ltc-out').addEventListener('input', recompute);
$('#ltc-req').addEventListener('input', recompute);
$('#ltc-body').addEventListener('input', recompute);

// Re-apply localized labels when language toggles
const _origToggle = GZ.toggleLang;
GZ.toggleLang = function(){ _origToggle.apply(this, arguments); applyLangAttrs(); recompute(); };

// seed example
$('#ltc-input').value = 'Summarize the key benefits of vector databases for RAG applications in three bullet points, then suggest two open-source options.\n\n向量数据库是现代 RAG 系统的核心组件。';

GZ.renderToolPage({
  category: 'dev',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'#️⃣', href:'/dev/hash.html', name:'Hash Generator'},
    {icon:'🔍', href:'/dev/regex.html', name:'Regex Tester'},
    {icon:'🪄', href:'/dev/regex-generator.html', name:'Regex Generator'},
    {icon:'🆔', href:'/dev/uuid.html', name:'UUID Generator'},
  ]
});

applyLangAttrs();
recompute();
</script>
