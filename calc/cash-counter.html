<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="cc-toolbar">
      <label id="lbl-currency"></label>
      <select id="currency" onchange="switchCurrency()">
        <option value="USD">$ USD</option>
        <option value="EUR">€ EUR</option>
        <option value="GBP">£ GBP</option>
        <option value="CNY">¥ CNY</option>
      </select>
    </div>
    <div class="cc-section-title" id="sec-bills"></div>
    <div id="bills-list"></div>
    <div class="cc-section-title" id="sec-coins"></div>
    <div id="coins-list"></div>
    <div class="cc-toolbar">
      <button class="gz-btn gz-btn-secondary" onclick="clearAll()" id="btn-clear"></button>
      <button class="gz-btn gz-btn-secondary" onclick="exportCSV()" id="btn-export"></button>
    </div>
    <div class="cc-total">
      <div class="cc-total-box">
        <div>
          <div class="lbl" id="lbl-total"></div>
          <div class="lbl" id="lbl-pieces" style="margin-top:4px"></div>
        </div>
        <div class="val" id="total">0.00</div>
      </div>
    </div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Cash Counter Calculator',
    toolDesc: 'Count cash fast — enter how many of each bill and coin you have and instantly see the total. Supports USD, EUR, GBP and CNY. Built for cashiers, retail, events, fundraisers, tip jars and bank deposits. Free, private, no signup.',
    lblCurrency: 'Currency:',
    secBills: '💵 Bills',
    secCoins: '🪙 Coins',
    lblTotal: 'TOTAL CASH',
    lblPieces: '0 pieces',
    piecesSuffix: ' pieces',
    btnClear: 'Clear All',
    btnExport: 'Export CSV',
    copied: 'Copied!',
    step1: 'Pick your currency (USD, EUR, GBP or CNY)',
    step2: 'Enter how many of each bill you have in the Bills section',
    step3: 'Enter how many of each coin in the Coins section',
    step4: 'Read the grand total at the bottom — export to CSV if needed',
  },
  zh: {
    toolTitle: '现金清点计算器',
    toolDesc: '快速清点现金 — 输入每种纸币和硬币的数量，即时查看总额。支持美元、欧元、英镑和人民币。适用于收银员、零售、活动、募捐、小费罐和银行存款。免费、私密、无需注册。',
    lblCurrency: '货币：',
    secBills: '💵 纸币',
    secCoins: '🪙 硬币',
    lblTotal: '现金总额',
    lblPieces: '0 张/枚',
    piecesSuffix: ' 张/枚',
    btnClear: '全部清空',
    btnExport: '导出 CSV',
    copied: '已复制！',
    step1: '选择货币（USD、EUR、GBP 或 CNY）',
    step2: '在「纸币」区输入每种纸币的数量',
    step3: '在「硬币」区输入每种硬币的数量',
    step4: '底部查看总额 — 如需要可导出 CSV',
  }
});

const { $, t, showToast } = GZ;

$('#lbl-currency').textContent = t('lblCurrency');
$('#sec-bills').textContent = t('secBills');
$('#sec-coins').textContent = t('secCoins');
$('#lbl-total').textContent = t('lblTotal');
$('#lbl-pieces').textContent = t('lblPieces');
$('#btn-clear').textContent = t('btnClear');
$('#btn-export').textContent = t('btnExport');

const CURRENCIES = {
  USD: { sym: '$', bills: [100,50,20,10,5,2,1], coins: [1,0.25,0.10,0.05,0.01],
         labels: {100:'$100',50:'$50',20:'$20',10:'$10',5:'$5',2:'$2',1:'$1',0.25:'25¢',0.10:'10¢',0.05:'5¢',0.01:'1¢'} },
  EUR: { sym: '€', bills: [500,200,100,50,20,10,5], coins: [2,1,0.50,0.20,0.10,0.05,0.02,0.01],
         labels: {500:'€500',200:'€200',100:'€100',50:'€50',20:'€20',10:'€10',5:'€5',2:'€2',1:'€1',0.50:'50c',0.20:'20c',0.10:'10c',0.05:'5c',0.02:'2c',0.01:'1c'} },
  GBP: { sym: '£', bills: [50,20,10,5], coins: [2,1,0.50,0.20,0.10,0.05,0.02,0.01],
         labels: {50:'£50',20:'£20',10:'£10',5:'£5',2:'£2',1:'£1',0.50:'50p',0.20:'20p',0.10:'10p',0.05:'5p',0.02:'2p',0.01:'1p'} },
  CNY: { sym: '¥', bills: [100,50,20,10,5,1], coins: [1,0.5,0.1],
         labels: {100:'¥100',50:'¥50',20:'¥20',10:'¥10',5:'¥5',1:'¥1',1:'¥1',0.5:'¥0.5',0.1:'¥0.1'} },
};

let cur = 'USD';

function money(n) {
  return CURRENCIES[cur].sym + n.toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2});
}

function buildList() {
  const c = CURRENCIES[cur];
  const billHtml = c.bills.map(v => {
    // skip dup labels (CNY ¥1 coin/bill)
    const lbl = c.labels[v];
    return `<div class="cc-row cc-bill">
      <span class="denom">${lbl}</span>
      <input type="number" min="0" step="1" value="0" data-val="${v}" data-type="bill" oninput="recalc()">
      <span class="sub" id="sub-bill-${v}">${money(0)}</span>
    </div>`;
  }).join('');
  $('#bills-list').innerHTML = billHtml;
  const coinHtml = c.coins.map(v => {
    const lbl = c.labels[v];
    return `<div class="cc-row cc-coin">
      <span class="denom">${lbl}</span>
      <input type="number" min="0" step="1" value="0" data-val="${v}" data-type="coin" oninput="recalc()">
      <span class="sub" id="sub-coin-${v}">${money(0)}</span>
    </div>`;
  }).join('');
  $('#coins-list').innerHTML = coinHtml;
  recalc();
}

function recalc() {
  let total = 0, pieces = 0;
  document.querySelectorAll('#bills-list input, #coins-list input').forEach(inp => {
    const v = +inp.dataset.val;
    const n = Math.max(0, parseInt(inp.value) || 0);
    const sub = n * v;
    total += sub;
    pieces += n;
    const id = `sub-${inp.dataset.type}-${inp.dataset.val}`;
    const el = document.getElementById(id);
    if (el) el.textContent = money(sub);
  });
  $('#total').textContent = money(total);
  $('#lbl-pieces').textContent = pieces + t('piecesSuffix');
}

function switchCurrency() {
  cur = $('#currency').value;
  buildList();
}

function clearAll() {
  document.querySelectorAll('#bills-list input, #coins-list input').forEach(inp => inp.value = 0);
  recalc();
}

function exportCSV() {
  const c = CURRENCIES[cur];
  let rows = ['Denomination,Count,Subtotal'];
  document.querySelectorAll('#bills-list input').forEach(inp => {
    const n = parseInt(inp.value) || 0;
    if (n > 0) rows.push(`${c.labels[+inp.dataset.val]},${n},${(n * +inp.dataset.val).toFixed(2)}`);
  });
  document.querySelectorAll('#coins-list input').forEach(inp => {
    const n = parseInt(inp.value) || 0;
    if (n > 0) rows.push(`${c.labels[+inp.dataset.val]},${n},${(n * +inp.dataset.val).toFixed(2)}`);
  });
  const total = $('#total').textContent;
  rows.push(`TOTAL,,${total.replace(/[^0-9.]/g,'')}`);
  const csv = rows.join('\n');
  const blob = new Blob([csv], {type:'text/csv'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `cash-count-${cur}.csv`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast(t('copied'));
}

window.switchCurrency = switchCurrency;
window.recalc = recalc;
window.clearAll = clearAll;
window.exportCSV = exportCSV;

buildList();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🧾', href:'/calc/bill-splitter.html', name:'Bill Splitter'},
    {icon:'💰', href:'/calc/tip-calculator.html', name:'Tip Calculator'},
    {icon:'💵', href:'/calc/salary-calculator.html', name:'Salary Calculator'},
    {icon:'🧮', href:'/calc/scientific-calculator.html', name:'Scientific Calc'},
  ]
});
</script>
<script src="/tools-result-rec.js?v=20260707v520" defer></script>
</body>
