    toolDesc: '将任意文字即时转换为上标（x²）和下标（H₂O）Unicode 字符。适合化学式、数学指数、脚注和社交媒体简介。免费、即时、私密。',

    note: '提示：大部分小写字母、数字以及 + − = ( ) 都有 Unicode 上/下标形式。不支持的字符（如大写字母）会保留原样，结果始终清晰可读。',

});

const { $, copyText, t } = GZ;
let mode = 'both';

// Unicode superscript / subscript maps
const SUP_KEYS = "0123456789+-=() .<>_abcdefghijklmnoprstuvwxyzABDEGHIJKLMNOPRTUVW";
const SUP_VALS = "⁰¹²³⁴⁵⁶⁷⁸⁹⁺⁻⁼⁽⁾ ˙˂˃‾ᵃᵇᶜᵈᵉᶠᵍʰⁱʲᵏˡᵐⁿᵒᵖʳˢᵗᵘᵛʷˣʸᶻᴬᴮᴰᴱᴳᴴᴵᴶᴷᴸᴹᴺᴼᴾᴿᵀᵁⱽᵂ";
const SUP = {};
for (let _i = 0; _i < SUP_KEYS.length; _i++) SUP[SUP_KEYS[_i]] = SUP_VALS[_i];
const SUB_KEYS = "0123456789+-=() .aehijklmnoprstuvx";
const SUB_VALS = "₀₁₂₃₄₅₆₇₈₉₊₋₌₍₎ ˙ₐₑₕᵢⱼₖₗₘₙₒₚᵣₛₜᵤᵥₓ";
const SUB = {};
for (let _i = 0; _i < SUB_KEYS.length; _i++) SUB[SUB_KEYS[_i]] = SUB_VALS[_i];

function conv(str, map) {
  let out = '';
  for (const ch of str) {
    out += (map[ch] !== undefined) ? map[ch] : ch;
  }
  return out;
}

function update() {
  const txt = $('#input').value;
  const out = $('#output');
  let cards = '';
  if (mode === 'both' || mode === 'super') {
    const r = conv(txt, SUP);
    cards += card(t('super'), r, t('sampleSuper'));
  }
  if (mode === 'both' || mode === 'sub') {
    const r = conv(txt, SUB);
    cards += card(t('sub'), r, t('sampleSub'));
  }
  out.innerHTML = cards;
}

function card(label, text, sample) {
  const safe = text || '\u00A0';
  const attr = JSON.stringify(JSON.stringify(text||'')).slice(1,-1).replace(/"/g,'&quot;');
  return `<div class="ss-card">
    <div class="lbl"><span>${label}</span><span class="sample">${sample}</span></div>
    <button class="gz-btn copy" onclick="copyText(${attr})">${t('copy')}</button>
    <div class="res" id="res-${label}">${escapeHtml(safe)}</div>
  </div>`;
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

document.querySelectorAll('.ss-tab').forEach(b => b.addEventListener('click', () => {
  document.querySelectorAll('.ss-tab').forEach(x => x.classList.remove('active'));
  b.classList.add('active');
  mode = b.dataset.mode;
  update();
}));

$('#input').addEventListener('input', update);

// Tab labels
document.querySelector('[data-i="both"]').textContent = t('both');
document.querySelector('[data-i="super"]').textContent = t('super');
document.querySelector('[data-i="sub"]').textContent = t('sub');

$('#toolbar').innerHTML = `
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

function loadExample() { $('#input').value = 'H2O + CO2 makes H2CO3\nE = mc2, x2 + y2 = r2\n1st, 2nd, 3rd place'; update(); }
function doClear() { $('#input').value = ''; update(); }

$('#input').placeholder = t('ph');
$('#note').textContent = t('note');
$('#input').value = 'H2O CO2 SO4\nx2 E=mc2 10n\n1st 2nd 3rd';
update();
