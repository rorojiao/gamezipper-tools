<script>

  zh: {

    toolDesc: '粘贴任意文章、论文或文档，使用抽取式 NLP 即时生成简洁摘要。调整长度，复制使用 — 文本永不离开您的浏览器。',
    lblIn: '原文', lblOut: '摘要',
    lblPct: '摘要长度', lblOrig: '原文', lblSum: '摘要', lblRed: '压缩比',
    step1: '在输入区粘贴文章、论文或文档',
    step2: '拖动滑块选择摘要长度（10%–80%）',
    step3: '在输出区阅读自动生成的摘要，查看字数和句数',
    step4: '点击「复制」获取摘要，或点击「清空」重新开始',

});

const STOP = new Set('a,an,the,of,in,on,at,to,for,by,with,from,as,is,are,was,were,be,been,being,and,or,but,if,then,than,that,this,these,those,it,its,he,she,they,we,you,I,my,your,his,her,our,their,me,him,them,us,do,does,did,done,have,has,had,will,would,can,could,should,may,might,must,shall,not,no,nor,so,very,just,more,most,also,such,only,own,same,other,any,all,each,both,every,some,what,which,who,whom,whose,where,when,why,how,because,while,until,about,into,through,during,before,after,above,below,between,out,up,down,off,over,under,again,further,once,here,there,one,two,three,four,five,六,七,八,九,十,的,是,在,了,和,与,或,但,如果,那,这,这些,那些,我,你,他,她,它,我们,他们,自己,有,没,不,很,也,就,还,而,于,及,以,把,被,从,对,到,给,让,使,把,而,被,因为,所以,虽然,但是,然后,以及,的,了,着,过,上,下,里,外,前,后,中,内,外,之,其,亦,乃,即,且,仍,皆,甚,最,极,微,稍,凡,各,本,此,即,如,所,为,到,以,于'.split(','));

const { $, copyText, t } = GZ;

function splitSentences(text) {
  const parts = text.replace(/\s+/g,' ').trim().split(/(?<=[.!?。！？])\s+(?=[A-Z\u4e00-\u9fa5])/);
  return parts.filter(s => s.length > 0);
}

function scoreSentences(sentences) {
  const wordScores = {};
  sentences.forEach(s => {
    const words = s.toLowerCase().match(/[a-z\u4e00-\u9fa5]{2,}/g) || [];
    words.forEach(w => { if (!STOP.has(w)) wordScores[w] = (wordScores[w]||0) + 1; });
  });
  // Normalize
  const maxScore = Math.max(1, ...Object.values(wordScores));
  Object.keys(wordScores).forEach(w => wordScores[w] = wordScores[w] / maxScore);
  return sentences.map((s, i) => {
    const words = s.toLowerCase().match(/[a-z\u4e00-\u9fa5]{2,}/g) || [];
    let score = 0;
    words.forEach(w => { if (wordScores[w]) score += wordScores[w]; });
    score /= Math.max(1, words.length);
    // Position bonus
    if (i === 0) score *= 1.3;
    else if (i < sentences.length * 0.2) score *= 1.1;
    else if (i > sentences.length * 0.8) score *= 1.05;
    return { index: i, text: s, score };
  });
}

function doSummarize() {
  const inp = $('#input').value.trim();
  if (!inp) {
    $('#output').textContent = '';
    $('#origStat').textContent = '0 words · 0 sentences';
    $('#sumStat').textContent = '0 words · 0 sentences';
    $('#redStat').textContent = '0%';
    $('#pctVal').textContent = $('#ratio').value + '%';
    return;
  }
  const ratio = parseInt($('#ratio').value);
  $('#pctVal').textContent = ratio + '%';
  const sentences = splitSentences(inp);
  if (sentences.length <= 1) {
    $('#output').textContent = sentences[0] || inp;
    const wc = (inp.match(/\S+/g) || []).length;
    $('#origStat').textContent = `${wc} words · ${sentences.length} sentences`;
    $('#sumStat').textContent = `${wc} words · ${sentences.length} sentences`;
    $('#redStat').textContent = '0%';
    return;
  }
  const scored = scoreSentences(sentences);
  const totalSent = sentences.length;
  const targetCount = Math.max(1, Math.min(totalSent, Math.round(totalSent * ratio / 100)));
  const top = [...scored].sort((a,b) => b.score - a.score).slice(0, targetCount);
  top.sort((a,b) => a.index - b.index);
  const summary = top.map(s => s.text).join(' ');
  $('#output').textContent = summary;
  const origWords = (inp.match(/\S+/g) || []).length;
  const sumWords = (summary.match(/\S+/g) || []).length;
  $('#origStat').textContent = `${origWords} words · ${totalSent} sentences`;
  $('#sumStat').textContent = `${sumWords} words · ${top.length} sentences`;
  const red = origWords ? Math.round((1 - sumWords/origWords) * 100) : 0;
  $('#redStat').textContent = red + '%';
}

function loadExample() {
  $('#input').value = `The Industrial Revolution, which began in Britain in the late 18th century, was a period of major change in manufacturing, agriculture, mining, and transport. It had far-reaching effects on society and the economy, fundamentally altering the way people lived and worked. Before the revolution, most goods were produced by hand in small workshops or homes. The introduction of new machinery and the factory system transformed production methods and dramatically increased output. Steam power, in particular, revolutionized transportation through the development of railways and steamships, which made it faster and cheaper to move raw materials and finished goods. The growth of factories led to urbanization, as workers moved from rural areas to cities in search of employment. This rapid urbanization brought about many social problems, including overcrowding, poor sanitation, and disease. Working conditions in factories were often harsh, with long hours, low wages, and unsafe environments. These conditions eventually led to the rise of labor unions and the passage of reform laws. The Industrial Revolution also had a significant impact on the environment, as the burning of coal and other fossil fuels led to air and water pollution. Despite its many negative consequences, the Industrial Revolution is widely regarded as a turning point in human history. It paved the way for the technological advances of the 19th and 20th centuries and laid the foundation for the modern industrial world. The changes it brought about continue to shape our lives today, from the way we work to the products we consume. Understanding the Industrial Revolution is essential for understanding the origins of modern capitalism, globalization, and the environmental challenges we now face.`;
  doSummarize();
}

function doClear() { $('#input').value = ''; doSummarize(); }

$('#input').addEventListener('input', doSummarize);
$('#ratio').addEventListener('input', doSummarize);

$('#toolbar').innerHTML = `
