<script>
GZI18n.register({
  en: {
    toolTitle: 'Statistics Calculator',
    toolDesc: 'Calculate mean, median, mode, range, variance, standard deviation, quartiles and more for any list of numbers. Includes histogram, frequency table and sorted data view.',
    step1: 'Paste or type your numbers — one per line, or comma/space/tab separated',
    step2: 'See all statistics (count, sum, mean, median, mode, range, std dev) update live',
    step3: 'Switch to Histogram or Frequency tabs to visualize the data',
    step4: 'Use the example or clear buttons to start fresh',
  },
  zh: {
    toolTitle: '统计计算器',
    toolDesc: '计算任意数字列表的均值、中位数、众数、极差、方差、标准差、四分位数等。包含直方图、频次表和排序视图。',
    step1: '粘贴或输入数字 — 每行一个，或用逗号/空格/制表符分隔',
    step2: '所有统计数据（数量、总和、均值、中位数、众数、极差、标准差）实时更新',
    step3: '切换到「直方图」或「频次」标签可视化数据',
    step4: '使用示例或清空按钮重新开始',
  }
});

const { $, $$, t } = GZ;

function parseNums(s) {
  return s.split(/[\s,;]+/).map(x => x.trim()).filter(x => x).map(Number).filter(n => !isNaN(n) && isFinite(n));
}

function stats(nums) {
  const n = nums.length;
  if (!n) return null;
  const sorted = [...nums].sort((a, b) => a - b);
  const sum = nums.reduce((a, b) => a + b, 0);
  const mean = sum / n;
  const median = n % 2 ? sorted[(n-1)/2] : (sorted[n/2-1] + sorted[n/2]) / 2;
  const freq = {};
  nums.forEach(x => freq[x] = (freq[x]||0) + 1);
  let mode = null, maxF = 0;
  Object.entries(freq).forEach(([k, v]) => { if (v > maxF) { maxF = v; mode = +k; } });
  const min = sorted[0], max = sorted[n-1];
  const range = max - min;
  const variance = nums.reduce((a, b) => a + (b - mean) ** 2, 0) / n;
  const std = Math.sqrt(variance);
  const varianceS = nums.reduce((a, b) => a + (b - mean) ** 2, 0) / (n - 1 || 1);
  const stdS = Math.sqrt(varianceS);
  const q1 = quantile(sorted, 0.25);
  const q2 = quantile(sorted, 0.5);
  const q3 = quantile(sorted, 0.75);
  const iqr = q3 - q1;
  const sumSq = nums.reduce((a, b) => a + b * b, 0);
  return { n, sum, mean, median, mode, modeCount: maxF, min, max, range, variance, std, varianceS, stdS, q1, q2, q3, iqr, sumSq, sorted };
}

function quantile(sorted, p) {
  const i = (sorted.length - 1) * p;
  const lo = Math.floor(i), hi = Math.ceil(i);
  if (lo === hi) return sorted[lo];
  return sorted[lo] + (sorted[hi] - sorted[lo]) * (i - lo);
}

function fmt(v) {
  if (v === null || v === undefined) return '—';
  if (Math.abs(v) >= 1e9) return v.toExponential(4);
  if (Math.abs(v) < 0.001 && v !== 0) return v.toExponential(4);
  const fixed = v.toFixed(6);
  return parseFloat(fixed).toString();
}

function render() {
  const text = $('#input').value;
  const nums = parseNums(text);
  const s = stats(nums);
  if (!s) {
    $('#stats').innerHTML = '';
    $('#sortedList').innerHTML = '';
    $('#hist').innerHTML = '';
    $('#freq').innerHTML = '';
    return;
  }
  $('#stats').innerHTML = [
    ['Count', s.n],
    ['Sum', fmt(s.sum)],
    ['Mean', fmt(s.mean)],
    ['Median', fmt(s.median)],
    ['Mode', s.modeCount > 1 ? fmt(s.mode) + ` (×${s.modeCount})` : '—'],
    ['Min', fmt(s.min)],
    ['Max', fmt(s.max)],
    ['Range', fmt(s.range)],
    ['Variance (pop)', fmt(s.variance)],
    ['Std Dev (pop)', fmt(s.std)],
    ['Variance (sample)', fmt(s.varianceS)],
    ['Std Dev (sample)', fmt(s.stdS)],
    ['Q1 (25%)', fmt(s.q1)],
    ['Q2 (50%)', fmt(s.q2)],
    ['Q3 (75%)', fmt(s.q3)],
    ['IQR', fmt(s.iqr)],
  ].map(([l, v]) => `<div class="sc-stat"><div class="lbl">${l}</div><div class="val">${v}</div></div>`).join('');

  // Sorted list preview
  $('#sortedList').innerHTML = `Sorted (n=${s.n}): <b>${s.sorted.map(x => fmt(x)).join(', ')}</b>`;

  // Histogram
  const numBins = Math.min(30, Math.max(5, Math.ceil(Math.sqrt(s.n))));
  const binSize = s.range / numBins || 1;
  const bins = new Array(numBins).fill(0);
  nums.forEach(x => {
    let b = Math.floor((x - s.min) / binSize);
    if (b >= numBins) b = numBins - 1;
    if (b < 0) b = 0;
    bins[b]++;
  });
  const maxBin = Math.max(...bins);
  $('#hist').innerHTML = bins.map((c, i) => {
    const h = (c / maxBin) * 100;
    const lo = s.min + i * binSize, hi = lo + binSize;
    return `<div class="sc-bar" style="height:${h}%"><div class="tip">${fmt(lo)}–${fmt(hi)}: ${c}</div></div>`;
  }).join('');

  // Frequency
  const freqArr = Object.entries(freq || {}).sort((a, b) => +a[0] - +b[0]);
  const maxF2 = Math.max(...freqArr.map(([k, v]) => +v));
  $('#freq').innerHTML = freqArr.map(([k, v]) => {
    const w = (v / maxF2 * 100).toFixed(1);
    return `<div class="sc-freq-row">
      <div class="v">${fmt(+k)}</div>
      <div style="background:var(--gz-glass);height:14px;border-radius:3px;overflow:hidden"><div style="height:100%;width:${w}%;background:linear-gradient(90deg,var(--gz-accent),var(--gz-accent2));border-radius:3px"></div></div>
      <div class="c">×${v}</div>
    </div>`;
  }).join('');
}

$('#input').addEventListener('input', render);

$$('#tabs .sc-tab').forEach(btn => btn.addEventListener('click', () => {
  $$('#tabs .sc-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  ['data','hist','freq'].forEach(t => $('#tab-'+t).style.display = 'none');
  $('#tab-'+btn.dataset.tab).style.display = 'block';
}));

$('#toolbar').innerHTML = `
  <button class="gz-btn gz-btn-secondary" onclick="$('#input').value='12,15,18,22,22,25,28,30,30,30,35,40';render()">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#input').value='';render()">${t('clear')}</button>
  <button class="gz-btn" onclick="GZ.copyText($('#sortedList').textContent)">${t('copy')}</button>`;

$('#input').value = '12, 15, 18, 22, 22, 25, 28, 30, 30, 30, 35, 40';
render();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📊', href:'/calc/percentage-calculator.html', name:'Percentage Calculator'},
    {icon:'🔢', href:'/calc/binary-calculator.html', name:'Binary Calculator'},
    {icon:'🧮', href:'/calc/scientific-calculator.html', name:'Scientific Calculator'},
  ]
});
</script>
