<script>
GZI18n.register({

    toolDesc: 'Validate European VAT numbers — check the format and structure (country prefix, length and pattern) for all 27 EU countries plus the UK. Bulk mode supported, 100% in-browser. Format-only; for live registration status use the official EU VIES service.',

    toolDesc: '验证欧洲增值税号 — 检查全部 27 个欧盟国家及英国的格式与结构（国家前缀、长度和字符规则）。支持批量验证，100% 浏览器本地运行。仅校验格式；如需查询实时注册状态请使用官方 EU VIES 服务。',
    validate: '验证',
    format: '规范化',
    example: '示例',
    clear: '清除',
    lblIn: '每行输入一个增值税号（含国家前缀）',
    valid: '✓ 格式有效',
    invalid: '✗ 格式无效',
    country: '国家',
    normalized: '规范化',
    errNoPrefix: '开头缺少 2 位国家前缀',
    errUnknown: '未知 / 非欧盟国家前缀「%1」',
    errPattern: '不符合 %1 的规则：%2',
    note: 'ℹ️ 本工具对 27 个欧盟成员国 + 英国进行离线格式校验，并不查询号码是否在用。如需实时注册状态，请使用官方 EU VIES 服务。',
    step1: '每行输入一个增值税号，均以 2 位国家代码开头',
    step2: '点击「验证」按该国规则检查格式',
    step3: '查看识别到的国家和规范化结果',
    step4: '如需实时注册状态，请在官方 EU VIES 网站核实',
  }
});

const { $, copyText, t } = GZ;

// VAT formats: country -> [full regex including prefix, human pattern]
// Sources: EU VIES structure rules. Patterns match the part AFTER the country prefix.
const PATTERNS = {
  AT:['U[0-9]{8}','ATU12345678'], BE:['0?[0-9]{9}','BE0123456749'], BG:['[0-9]{9,10}','BG123456789'],
  CY:['[0-9]{8}[A-Za-z]','CY12345678X'], CZ:['[0-9]{8,10}','CZ12345679'], DE:['[0-9]{9}','DE123456789'],
  DK:['[0-9]{8}','DK12345678'], EE:['[0-9]{9}','EE123456789'], EL:['[0-9]{9}','EL123456789'],
  ES:['[A-Za-z0-9][0-9]{7}[A-Za-z0-9]','ESB1234567C'], FI:['[0-9]{8}','FI12345687'],
  FR:['[A-Za-z0-9]{2}[0-9]{9}','FRAB123456789'], HU:['[0-9]{8}','HU12345687'], IE:['[0-9][A-Za-z0-9\\*\\+][0-9]{5}[A-Za-z]','IE1234567A'],
  IT:['[0-9]{11}','IT12345670017'], LT:['([0-9]{9}|[0-9]{12})','LT123456789'], LU:['[0-9]{8}','LU12345678'],
  LV:['[0-9]{11}','LV12345678901'], MT:['[0-9]{8}','MT12345678'], NL:['[0-9]{9}B[0-9]{2}','NL123456782B01'],
  PL:['[0-9]{10}','PL1234563218'], PT:['[0-9]{9}','PT123456789'], RO:['[0-9]{2,10}','RO12345678'],
  SE:['[0-9]{12}','SE123456789701'], SI:['[0-9]{8}','SI12345678'], SK:['[0-9]{10}','SK1234567890'],
  HR:['[0-9]{11}','HR12345678901'], GB:['([0-9]{9}|[0-9]{12}|GD[0-9]{3}|HA[0-9]{3})','GB123456789']
};
const NAMES = {AT:'Austria',BE:'Belgium',BG:'Bulgaria',CY:'Cyprus',CZ:'Czechia',DE:'Germany',DK:'Denmark',EE:'Estonia',EL:'Greece',ES:'Spain',FI:'Finland',FR:'France',HU:'Hungary',IE:'Ireland',IT:'Italy',LT:'Lithuania',LU:'Luxembourg',LV:'Latvia',MT:'Malta',NL:'Netherlands',PL:'Poland',PT:'Portugal',RO:'Romania',SE:'Sweden',SI:'Slovenia',SK:'Slovakia',HR:'Croatia',GB:'United Kingdom'};

function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function analyze(raw){
  const s = raw.replace(/\s|-/g,'').toUpperCase();
  if(s.length<3) return {raw, valid:false, msg:t('errNoPrefix')};
  const cc = s.slice(0,2);
  if(!/^[A-Z]{2}$/.test(s.slice(0,2)) || !PATTERNS[cc]) return {raw, valid:false, msg:t('errUnknown').replace('%1',esc(cc))};
  const [pat, human] = PATTERNS[cc];
  const body = s.slice(2);
  const re = new RegExp('^(?:'+pat+')$');
  if(!re.test(body)) return {raw, valid:false, msg:t('errPattern').replace('%1',esc(cc)).replace('%2','<code>'+esc(human)+'</code>'), cc};
  return {raw, valid:true, cc, normalized: cc+body, name: NAMES[cc]};
}

function doValidate(){
  const lines = $('#input').value.split('\n').map(s=>s.trim()).filter(Boolean);
  if(!lines.length){ $('#output').innerHTML=''; $('#status').textContent=''; return; }
  const cards = lines.map(line=>{
    const r = analyze(line);
    const cls = r.valid ? 'ok' : 'bad';
    const icon = r.valid ? '✅' : '❌';
    let body;
    if(r.valid){
      body = `<div class="res-row"><span>${t('country')}:</span><code>${esc(r.cc)} · ${esc(r.name)}</code></div>`
           + `<div class="res-row"><span>${t('normalized')}:</span><code>${esc(r.normalized)}</code><button onclick="copyText('${r.normalized}')">⧉</button></div>`;
    } else {
      body = `<div class="res-row" style="color:var(--text2)">${r.msg}</div>`;
    }
    return `<div class="res-card ${cls}"><div class="res-head">${icon} ${r.valid?t('valid'):t('invalid')}${r.cc?' · '+esc(r.cc):''}</div>${body}</div>`;
  });
  $('#output').innerHTML = cards.join('');
  const valid = lines.map(analyze).filter(r=>r.valid).length;
  $('#status').innerHTML = `<span style="color:var(--text2)">✓ ${valid}/${lines.length} ${t('valid')}</span>`;
}

function doFormat(){
  const lines = $('#input').value.split('\n').map(s=>s.trim()).filter(Boolean);
  $('#input').value = lines.map(s=>s.replace(/\s|-/g,'').toUpperCase()).join('\n');
  doValidate();
}

function loadExample(){
  $('#input').value = 'DE123456789\nFRAB123456789\nGB123456782\nIE1234567A\nIT12345670017\nEL123456789\nNL123456782B01\nXX123456789\nDE1234';
  doValidate();
}
function doClear(){ $('#input').value=''; $('#output').innerHTML=''; $('#status').textContent=''; }

$('#lbl-in').textContent = t('lblIn');
$('#note').textContent = t('note');
$('#input').addEventListener('input', doValidate);

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="doValidate()">${t('validate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doFormat()">${t('format')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

GZ.renderToolPage({

    {icon:'🧮', href:'/calc/vat-calculator.html', name:'VAT Calculator'},
  ]
});
</script>
