<script>
GZI18n.register({en:{toolTitle:'Remove Duplicate Lines',toolDesc:'Remove repeated lines from keyword lists, exports, email lists, or plain text while keeping the first occurrence.',step1:'Paste your list into the input box, one item per line.',step2:'Click Remove Duplicates to keep unique lines only.',step3:'Copy the cleaned output or continue processing it with other text tools.'},zh:{toolTitle:'Remove Duplicate Lines',toolDesc:'去除关键词列表、导出数据、邮箱列表或纯文本中的重复行，保留首次出现的内容。',step1:'把列表粘贴到输入框，每行一个项目。',step2:'点击Remove duplicates，保留唯一行。',step3:'复制清理后的结果，或继续用其他文本工具处理。'}});
const {$,copyText,t}=GZ;
function run(){const seen=new Set(); const out=[]; ($('#input').value||'').split('\n').forEach(line=>{if(!seen.has(line)){seen.add(line); out.push(line);}}); $('#output').value=out.join('\n');}
function example(){ $('#input').value='json formatter\nregex tester\njson formatter\nslug generator\nregex tester'; run(); }
$('#toolbar').innerHTML=`<button class="gz-btn" onclick="run()">Remove Duplicates</button><button class="gz-btn gz-btn-secondary" onclick="example()">${t('example')}</button><button class="gz-btn" onclick="copyText($('#output').value)">${t('copy')}</button><button class="gz-btn gz-btn-secondary" onclick="document.querySelectorAll('textarea').forEach(el=>el.value='')">${t('clear')}</button>`;
