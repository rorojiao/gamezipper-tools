<script>

    solve: '求解三角形', clear: '清除', example: '示例',
    needThree: '请输入恰好 3 个已知值（至少包含一条边）。',
    invalidInput: '无效三角形：输入的值无法构成有效三角形。',

    area: '面积', perimeter: '周长', heightA: '高（到边 a）', heightB: '高（到边 b）', heightC: '高（到边 c）',
    inradius: '内切圆半径', circumradius: '外接圆半径', semiPerimeter: '半周长',
    typeRight: '直角', typeAcute: '锐角', typeObtuse: '钝角',
    typeEquilateral: '等边', typeIsosceles: '等腰', typeScalene: '不等边',
    ambiguous: '注意：SSA 情况可能有两个解，当前显示主解。',
    step1: '输入任意 3 个已知值 — 边 (a, b, c) 和角 (A, B, C) 的组合',
    step2: '确保至少有一个值是边长',
    step3: '点击「求解三角形」计算所有未知值',

const { $, t } = GZ;
const D2R = Math.PI / 180, R2D = 180 / Math.PI;

function val(id) { const v = document.getElementById(id).value.trim(); return v === '' ? NaN : parseFloat(v); }

function solve() {
  $('#status').innerHTML = '';
  const a = val('ina'), b = val('inb'), c = val('inc');
  const A = val('inA'), B = val('inB'), C = val('inC');
  const given = [a, b, c, A, B, C].filter(x => !isNaN(x)).length;
  const sidesGiven = [a, b, c].filter(x => !isNaN(x)).length;

  if (given !== 3 || sidesGiven === 0) {
    $('#status').innerHTML = `<span style="color:var(--gz-accent)">${t('needThree')}</span>`;
    $('#result').innerHTML = ''; $('#triSvg').style.display = 'none'; $('#triTypes').innerHTML = '';
    return;
  }

  let sa = a, sb = b, sc = c, aA = isNaN(A) ? null : A, aB = isNaN(B) ? null : B, aC = isNaN(C) ? null : C;
  let ambiguous = false;

  // Fill missing angle using 180° sum if two angles known
  const anglesKnown = [aA, aB, aC].filter(x => x !== null).length;
  if (anglesKnown === 2) {
    const sum = (aA||0) + (aB||0) + (aC||0);
    if (aA === null) aA = 180 - sum;
    else if (aB === null) aB = 180 - sum;
    else if (aC === null) aC = 180 - sum;
  }

  try {
    // SSS: 3 sides
    if (!isNaN(sa) && !isNaN(sb) && !isNaN(sc) && aA === null) {
      if (sa + sb <= sc || sa + sc <= sb || sb + sc <= sa) throw new Error('invalid');
      aA = Math.acos((sb*sb + sc*sc - sa*sa) / (2*sb*sc)) * R2D;
      aB = Math.acos((sa*sa + sc*sc - sb*sb) / (2*sa*sc)) * R2D;
      aC = 180 - aA - aB;
    }
    // SAS: two sides + included angle
    else if (!isNaN(sa) && !isNaN(sb) && aC !== null) {
      sc = Math.sqrt(sa*sa + sb*sb - 2*sa*sb*Math.cos(aC*D2R));
      aA = Math.acos((sb*sb + sc*sc - sa*sa) / (2*sb*sc)) * R2D;
      aB = 180 - aA - aC;
    } else if (!isNaN(sb) && !isNaN(sc) && aA !== null) {
      sa = Math.sqrt(sb*sb + sc*sc - 2*sb*sc*Math.cos(aA*D2R));
      aB = Math.acos((sa*sa + sc*sc - sb*sb) / (2*sa*sc)) * R2D;
      aC = 180 - aA - aB;
    } else if (!isNaN(sa) && !isNaN(sc) && aB !== null) {
      sb = Math.sqrt(sa*sa + sc*sc - 2*sa*sc*Math.cos(aB*D2R));
      aA = Math.acos((sb*sb + sc*sc - sa*sa) / (2*sb*sc)) * R2D;
      aC = 180 - aA - aB;
    }
    // ASA / AAS: one side + two angles (we already computed the third angle)
    else if (aA !== null && aB !== null && aC !== null) {
      if (!isNaN(sa) && isNaN(sb) && isNaN(sc)) {
        sb = sa * Math.sin(aB*D2R) / Math.sin(aA*D2R);
        sc = sa * Math.sin(aC*D2R) / Math.sin(aA*D2R);
      } else if (!isNaN(sb) && isNaN(sa) && isNaN(sc)) {
        sa = sb * Math.sin(aA*D2R) / Math.sin(aB*D2R);
        sc = sb * Math.sin(aC*D2R) / Math.sin(aB*D2R);
      } else if (!isNaN(sc) && isNaN(sa) && isNaN(sb)) {
        sa = sc * Math.sin(aA*D2R) / Math.sin(aC*D2R);
        sb = sc * Math.sin(aB*D2R) / Math.sin(aC*D2R);
      }
    }
    // SSA: two sides + non-included angle
    else if (!isNaN(sa) && !isNaN(sb) && aA !== null && aB === null) {
      const ratio = Math.sin(aA*D2R) * sb / sa;
      if (ratio > 1) throw new Error('invalid');
      aB = Math.asin(ratio) * R2D;
      aC = 180 - aA - aB;
      sc = sa * Math.sin(aC*D2R) / Math.sin(aA*D2R);
      ambiguous = true;
    } else if (!isNaN(sa) && !isNaN(sb) && aB !== null && aA === null) {
      const ratio = Math.sin(aB*D2R) * sa / sb;
      if (ratio > 1) throw new Error('invalid');
      aA = Math.asin(ratio) * R2D;
      aC = 180 - aA - aB;
      sc = sa * Math.sin(aC*D2R) / Math.sin(aA*D2R);
      ambiguous = true;
    } else {
      throw new Error('invalid');
    }

    if (isNaN(sa) || isNaN(sb) || isNaN(sc) || aA === null || sa <= 0) throw new Error('invalid');
    const maxA = Math.max(aA, aB, aC);
    if (maxA >= 180 || aA <= 0 || aB <= 0 || aC <= 0) throw new Error('invalid');

    const s = (sa + sb + sc) / 2;
    const area = Math.sqrt(Math.max(0, s * (s-sa) * (s-sb) * (s-sc)));
    const perim = sa + sb + sc;
    const ha = 2 * area / sa, hb = 2 * area / sb, hc = 2 * area / sc;
    const inr = area / s, cr = (sa * sb * sc) / (4 * area);

    // Triangle type
    const types = [];
    if (Math.abs(maxA - 90) < 0.01) types.push(t('typeRight'));
    else if (maxA > 90) types.push(t('typeObtuse'));
    else types.push(t('typeAcute'));
    if (Math.abs(sa-sb)<0.001 && Math.abs(sb-sc)<0.001) types.push(t('typeEquilateral'));
    else if (Math.abs(sa-sb)<0.001 || Math.abs(sb-sc)<0.001 || Math.abs(sa-sc)<0.001) types.push(t('typeIsosceles'));
    else types.push(t('typeScalene'));

    const r = n => (Math.round(n * 10000) / 10000).toString();
    $('#result').innerHTML = `<h3>${t('results')}</h3>` +
      row(t('sideA'), r(sa)) + row(t('sideB'), r(sb)) + row(t('sideC'), r(sc)) +
      row(t('angleA'), r(aA) + '°') + row(t('angleB'), r(aB) + '°') + row(t('angleC'), r(aC) + '°') +
      row(t('area'), r(area)) + row(t('perimeter'), r(perim)) +
      row(t('semiPerimeter'), r(s)) +
      row(t('heightA'), r(ha)) + row(t('heightB'), r(hb)) + row(t('heightC'), r(hc)) +
      row(t('inradius'), r(inr)) + row(t('circumradius'), r(cr));

    $('#triTypes').innerHTML = types.map(tp => `<span>${tp}</span>`).join('');
    if (ambiguous) $('#status').innerHTML = `<div class="tri-note">${t('ambiguous')}</div>`;

    drawTriangle(sa, sb, sc, aA, aB, aC);
  } catch(e) {
    $('#status').innerHTML = `<span style="color:var(--gz-accent)">${t('invalidInput')}</span>`;
    $('#result').innerHTML = ''; $('#triSvg').style.display = 'none'; $('#triTypes').innerHTML = '';
  }
}

function row(label, val) { return `<div class="row"><span>${label}</span><span>${val}</span></div>`; }

function drawTriangle(a, b, c, A, B, C) {
  // Place triangle with base along bottom. Side c is opposite angle C (between a and b).
  // Vertices: P1 at origin (angle A corner), P2 along base.
  // Place vertex B at origin, C at (a, 0), A computed via angle.
  const px = 40, py = 220, scale = 200 / Math.max(a, b, c);
  const Bx = px, By = py;
  const Cx = px + a * scale, Cy = py;
  const Ax = px + c * scale * Math.cos(B * D2R);
  const Ay = py - c * scale * Math.sin(B * D2R);
  const svg = $('#triSvg');
  svg.style.display = 'block';
  svg.innerHTML = `
    <polygon points="${Bx},${By} ${Cx},${Cy} ${Ax},${Ay}" fill="rgba(78,205,196,0.15)" stroke="#4ecdc4" stroke-width="2"/>
    <text x="${(Bx+Cx)/2}" y="${By+18}" fill="#aaa" font-size="13" text-anchor="middle">a=${(Math.round(a*100)/100)}</text>
    <text x="${Ax-8}" y="${(Ay+By)/2}" fill="#aaa" font-size="13" text-anchor="end">c=${(Math.round(c*100)/100)}</text>
    <text x="${(Ax+Cx)/2+8}" y="${(Ay+Cy)/2}" fill="#aaa" font-size="13">b=${(Math.round(b*100)/100)}</text>
    <text x="${Ax}" y="${Ay-6}" fill="#4ecdc4" font-size="12" text-anchor="middle">A</text>
    <text x="${Bx-12}" y="${By+4}" fill="#4ecdc4" font-size="12">B</text>
    <text x="${Cx+8}" y="${Cy+4}" fill="#4ecdc4" font-size="12">C</text>`;
}

function loadExample() {
  document.getElementById('ina').value = '7';
  document.getElementById('inb').value = '';
  document.getElementById('inc').value = '5';
  document.getElementById('inA').value = '';
  document.getElementById('inB').value = '45';
  document.getElementById('inC').value = '';
  solve();
}

function doClear() {
  ['ina','inb','inc','inA','inB','inC'].forEach(id => document.getElementById(id).value = '');
  $('#result').innerHTML = ''; $('#status').innerHTML = ''; $('#triSvg').style.display = 'none'; $('#triTypes').innerHTML = '';
}

$('#inputs').innerHTML = `
  <label>${t('sideA')}<input type="number" id="ina" step="any" min="0" placeholder="—"></label>
  <label>${t('sideB')}<input type="number" id="inb" step="any" min="0" placeholder="—"></label>
  <label>${t('sideC')}<input type="number" id="inc" step="any" min="0" placeholder="—"></label>
  <label>${t('angleA')}<input type="number" id="inA" step="any" min="0" max="180" placeholder="—"></label>
  <label>${t('angleB')}<input type="number" id="inB" step="any" min="0" max="180" placeholder="—"></label>
  <label>${t('angleC')}<input type="number" id="inC" step="any" min="0" max="180" placeholder="—"></label>`;

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="solve()">${t('solve')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

});
</script>
