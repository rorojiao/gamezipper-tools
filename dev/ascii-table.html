const {$, t} = GZ;

const CHAR_NAMES = {
  0:'NUL (Null)',1:'SOH (Start of Heading)',2:'STX (Start of Text)',3:'ETX (End of Text)',
  4:'EOT (End of Transmission)',5:'ENQ (Enquiry)',6:'ACK (Acknowledge)',7:'BEL (Bell)',
  8:'BS (Backspace)',9:'HT (Horizontal Tab)',10:'LF (Line Feed)',11:'VT (Vertical Tab)',
  12:'FF (Form Feed)',13:'CR (Carriage Return)',14:'SO (Shift Out)',15:'SI (Shift In)',
  16:'DLE (Data Link Escape)',17:'DC1 (Device Control 1)',18:'DC2 (Device Control 2)',19:'DC3 (Device Control 3)',
  20:'DC4 (Device Control 4)',21:'NAK (Negative Ack)',22:'SYN (Synchronous Idle)',23:'ETB (End Trans Block)',
  24:'CAN (Cancel)',25:'EM (End of Medium)',26:'SUB (Substitute)',27:'ESC (Escape)',
  28:'FS (File Separator)',29:'GS (Group Separator)',30:'RS (Record Separator)',31:'US (Unit Separator)',
  32:'Space',127:'DEL (Delete)',128:'€',129:'(unused)',130:'‚',131:'ƒ',132:'„',133:'…',134:'†',135:'‡',
  136:'ˆ',137:'‰',138:'Š',139:'‹',140:'Œ',141:'(unused)',142:'Ž',143:'(unused)',
  144:'(unused)',145:'‘',146:'’',147:'“',148:'”',149:'•',150:'–',151:'—',
  152:'˜',153:'™',154:'š',155:'›',156:'œ',157:'(unused)',158:'ž',159:'Ÿ',
  160:'NBSP (Non-breaking space)',161:'¡ (Inverted !)',162:'¢ (Cent)',163:'£ (Pound)',164:'¤ (Currency)',165:'¥ (Yen)',
  166:'¦ (Broken bar)',167:'§ (Section)',168:'¨ (Diaeresis)',169:'© (Copyright)',170:'ª (Feminine Ordinal)',
  171:'« (Left Guillemet)',172:'¬ (Not sign)',173:'­ (Soft hyphen)',174:'® (Registered)',175:'¯ (Macron)',
  176:'° (Degree)',177:'± (Plus-Minus)',178:'² (Superscript 2)',179:'³ (Superscript 3)',180:'´ (Acute)',181:'µ (Micro)',
  182:'¶ (Pilcrow)',183:'· (Middle dot)',184:'¸ (Cedilla)',185:'¹ (Superscript 1)',186:'º (Masculine Ordinal)',
  187:'» (Right Guillemet)',188:'¼ (Fraction 1/4)',189:'½ (Fraction 1/2)',190:'¾ (Fraction 3/4)',191:'¿ (Inverted ?)',
  192:'À',193:'Á',194:'Â',195:'Ã',196:'Ä',197:'Å',198:'Æ',199:'Ç',
  200:'È',201:'É',202:'Ê',203:'Ë',204:'Ì',205:'Í',206:'Î',207:'Ï',
  208:'Ð',209:'Ñ',210:'Ò',211:'Ó',212:'Ô',213:'Õ',214:'Ö',215:'× (Multiply)',
  216:'Ø',217:'Ù',218:'Ú',219:'Û',220:'Ü',221:'Ý',222:'Þ',223:'ß',
  224:'à',225:'á',226:'â',227:'ã',228:'ä',229:'å',230:'æ',231:'ç',
  232:'è',233:'é',234:'ê',235:'ë',236:'ì',237:'í',238:'î',239:'ï',
  240:'ð',241:'ñ',242:'ò',243:'ó',244:'ô',245:'õ',246:'ö',247:'÷ (Divide)',
  248:'ø',249:'ù',250:'ú',251:'û',252:'ü',253:'ý',254:'þ',255:'ÿ'
};

const HTML_ENTITIES = {
  160:'&nbsp;',161:'&iexcl;',162:'&cent;',163:'&pound;',164:'&curren;',165:'&yen;',
  166:'&brvbar;',167:'&sect;',168:'&uml;',169:'&copy;',170:'&ordf;',171:'&laquo;',
  172:'&not;',173:'&shy;',174:'&reg;',175:'&macr;',176:'&deg;',177:'&plusmn;',
  178:'&sup2;',179:'&sup3;',180:'&acute;',181:'&micro;',182:'&para;',183:'&middot;',
  184:'&cedil;',185:'&sup1;',186:'&ordm;',187:'&raquo;',188:'&frac14;',189:'&frac12;',
  190:'&frac34;',191:'&iquest;',215:'&times;',247:'&divide;',8364:'&euro;',
  60:'&lt;',62:'&gt;',38:'&amp;',34:'&quot;',39:'&apos;'
};

let showAll = false;
let activeGrp = null;

const GROUPS = [
  {id:'ctrl', label:'🔧 Control (0-31)', range:[0,31]},
  {id:'print', label:'🔤 Printable (32-126)', range:[32,126]},
  {id:'latin1', label:'🌍 Latin-1 (128-255)', range:[128,255]},
  {id:'upper', label:'🔠 A-Z (65-90)', range:[65,90]},
  {id:'lower', label:'🔡 a-z (97-122)', range:[97,122]},
  {id:'digits', label:'🔢 0-9 (48-57)', range:[48,57]},
  {id:'sym', label:'💲 Common Symbols', range:[33,47]},
];

function getCharName(i) {
  return CHAR_NAMES[i] || 'Latin-1 ' + i;
}

function charDisplay(i) {
  if (i < 32 && i !== 9 && i !== 10 && i !== 13) return '';
  if (i === 9) return '⇥';
  if (i === 10) return '↵';
  if (i === 13) return '⏎';
  if (i === 32) return '␣';
  return String.fromCharCode(i);
}

function rowHtml(i) {
  const ch = charDisplay(i);
  const isCtrl = i < 32 || i === 127;
  const html = HTML_ENTITIES[i] || '';
  return `<tr data-i="${i}" onclick="copyRow(${i})">
    <td class="at-char" title="${ch}">${ch || '·'}</td>
    <td class="at-code">${i}</td>
    <td class="at-code">${i.toString(16).toUpperCase().padStart(2,'0')}</td>
    <td class="at-code">${i.toString(8).padStart(3,'0')}</td>
    <td class="at-code" style="font-size:.75em">${i.toString(2).padStart(8,'0')}</td>
    <td class="at-code">${html || '—'}</td>
    <td>${isCtrl ? '<span class="at-tag ctrl">CTRL</span> ':''}${getCharName(i)}</td>
  </tr>`;
}

let lastRows = [];
function renderTable(filter) {
  const f = (filter||'').toLowerCase().trim();
  let rows = [];
  for (let i = (showAll ? 0 : 32); i <= (showAll ? 255 : 126); i++) {
    if (activeGrp) {
      const g = GROUPS.find(x=>x.id===activeGrp);
      if (i < g.range[0] || i > g.range[1]) continue;
    }
    if (f) {
      const name = (getCharName(i)||'').toLowerCase();
      const hex = i.toString(16).toUpperCase().padStart(2,'0');
      const dec = String(i);
      const oct = i.toString(8).padStart(3,'0');
      const bin = i.toString(2).padStart(8,'0');
      const ch = String.fromCharCode(i);
      if (!name.includes(f) && !hex.toLowerCase().includes(f) && !dec.includes(f) && !oct.includes(f) && !bin.includes(f) && !ch.toLowerCase().includes(f)) continue;
    }
    rows.push(i);
  }
  lastRows = rows;
  $('#body').innerHTML = rows.length ? rows.map(rowHtml).join('') : `<tr><td colspan="7" style="text-align:center;padding:30px;opacity:.6">${t('noMatch')}</td></tr>`;
  const total = (showAll ? 256 : 95);
  const grpNote = activeGrp ? ' ' + GROUPS.find(x=>x.id===activeGrp).label : '';
  $('#info').textContent = `${t('showing')} ${rows.length} ${t('of')} ${total} (${showAll ? t('allRange') : t('printableOnly')})${grpNote}`;
}

function copyRow(i) {
  const ch = i === 9 ? '\t' : i === 10 ? '\n' : i === 13 ? '\r' : String.fromCharCode(i);
  navigator.clipboard.writeText(ch).then(() => {
    const tr = document.querySelector(`tr[data-i="${i}"]`);
    if (tr) {
      tr.classList.add('copied');
      setTimeout(() => tr.classList.remove('copied'), 600);
    }
    showToast(t('copied') + ' ' + (ch || '(' + i + ')'));
  }).catch(() => {
    const ta = document.createElement('textarea'); ta.value = ch; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
    showToast(t('copied'));
  });
}

function showToast(msg) {
  const el = $('#toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), 1200);
}

function toggleCtrl() {
  showAll = !showAll;
  $('#toggleCtrl').textContent = showAll ? t('showPrintable') : t('showAll');
  renderTable($('#search').value);
}

function buildGroups() {
  $('#groups').innerHTML = `<span class="at-grp${activeGrp===null?' active':''}" onclick="setGrp(null)">All</span>` + GROUPS.map(g =>
    `<span class="at-grp${activeGrp===g.id?' active':''}" onclick="setGrp('${g.id}')">${g.label}</span>`
  ).join('');
}

function setGrp(id) {
  activeGrp = activeGrp === id ? null : id;
  buildGroups();
  renderTable($('#search').value);
}

$('#search').addEventListener('input', e => renderTable(e.target.value));

$('#toolbar').innerHTML = `
  <button class="gz-btn gz-btn-secondary" onclick="renderTable('')">🔄 Refresh</button>
  <button class="gz-btn gz-btn-secondary" onclick="copyText(String.fromCharCode(...Array.from({length:95},(_,i)=>i+32)))">Copy Printable Range</button>
  <button class="gz-btn gz-btn-secondary" onclick="copyText([...lastRows].map(i=>i+' = '+String.fromCharCode(i)+' ('+(getCharName(i)||'').split(' ')[0]+')').join('\\n'))">Copy Table</button>
`;

buildGroups();
renderTable('');

GZ.renderToolPage({
  category: 'dev',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🔡', href:'/dev/html-entity.html', name:'HTML Entity'},
    {icon:'🔣', href:'/dev/html-entities.html', name:'HTML Entities Reference'},
    {icon:'🔐', href:'/dev/url-encode.html', name:'URL Encode'},
    {icon:'🔤', href:'/text/character-encoding-converter.html', name:'Character Encoding'},
  ]
});
</script>
