<script>
GZI18n.register({
  en: {
    toolTitle: 'Bubble Wrap Popper',
    toolDesc: 'Satisfying virtual bubble wrap with sound effects. Pop one, pop many, or auto-pop mode for stress relief. No download required.',
    lblSize: 'Grid', lblSound: 'Sound', lblVol: 'Volume',
    sndPop: 'Pop', sndSnap: 'Snap', sndClick: 'Click', sndBell: 'Bell', sndMute: 'Mute',
    popRow: 'Pop Row', popCol: 'Pop Column', popAll: 'Pop All', auto: 'Auto', reset: 'Reset',
    step1: 'Click any bubble to pop it and hear the satisfying sound',
    step2: 'Click Pop All to burst the entire sheet at once',
    step3: 'Try Auto-Pop mode for continuous random bubble bursts',
    step4: 'Unlock badges by popping 10, 50, 100, 250, 500 or 1000 bubbles',
  },
  zh: {
    toolTitle: '虚拟气泡纸爆爆乐',
    toolDesc: '满足感爆棚的虚拟气泡纸，附带逼真音效。单击、批量爆或自动爆模式 — 减压神器，无需下载。',
    lblSize: '网格', lblSound: '音效', lblVol: '音量',
    sndPop: '啵', sndSnap: '啪', sndClick: '咔哒', sndBell: '铃', sndMute: '静音',
    popRow: '爆一行', popCol: '爆一列', popAll: '全部爆', auto: '自动', reset: '重置',
    step1: '点击任意气泡即可爆掉并听到满足的音效',
    step2: '点击「全部爆」一次性爆破整张气泡纸',
    step3: '试试「自动」模式持续随机爆气泡',
    step4: '爆 10、50、100、250、500 或 1000 个气泡即可解锁成就',
  }
});

const { $, t, showToast } = GZ;
let gridSize = 8;
let totalCells = 64;
let poppedCells = 0;
let totalPopped = 0;
let soundType = 'pop';
let volume = 0.5;
let audioCtx = null;
let isDragging = false;
let autoInterval = null;
let ppsCounter = 0;
let ppsTime = 0;
let unlockedBadges = new Set();

function initAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function playPop() {
  if (soundType === 'none' || !audioCtx) return;
  const t = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const noise = audioCtx.createBufferSource();
  const gain = audioCtx.createGain();
  const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.05, audioCtx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / data.length);
  noise.buffer = buf;
  const noiseGain = audioCtx.createGain();
  noiseGain.gain.setValueAtTime(volume * 0.5, t);
  noiseGain.gain.exponentialRampToValueAtTime(0.001, t + 0.08);
  noise.connect(noiseGain).connect(gain);
  if (soundType === 'pop') {
    osc.type = 'sine';
    osc.frequency.setValueAtTime(180, t);
    osc.frequency.exponentialRampToValueAtTime(60, t + 0.05);
    osc.connect(gain);
  } else if (soundType === 'snap') {
    osc.type = 'square';
    osc.frequency.setValueAtTime(800, t);
    osc.connect(gain);
  } else if (soundType === 'bell') {
    osc.type = 'sine';
    osc.frequency.setValueAtTime(1200, t);
    osc.connect(gain);
  } else if (soundType === 'click') {
    osc.type = 'square';
    osc.frequency.setValueAtTime(2000, t);
    osc.connect(gain);
  }
  gain.gain.setValueAtTime(0, t);
  gain.gain.linearRampToValueAtTime(volume * 0.3, t + 0.001);
  gain.gain.exponentialRampToValueAtTime(0.001, t + 0.08);
  gain.connect(audioCtx.destination);
  osc.start(t);
  noise.start(t);
  osc.stop(t + 0.1);
  noise.stop(t + 0.05);
}

function buildGrid() {
  const g = $('#grid');
  g.style.gridTemplateColumns = `repeat(${gridSize}, 1fr)`;
  g.innerHTML = '';
  totalCells = gridSize * gridSize;
  poppedCells = 0;
  for (let i = 0; i < totalCells; i++) {
    const b = document.createElement('div');
    b.className = 'bw-bubble';
    b.dataset.idx = i;
    b.addEventListener('mousedown', e => { isDragging = true; initAudio(); pop(b); e.preventDefault(); });
    b.addEventListener('mouseenter', () => { if (isDragging && !b.classList.contains('popped')) pop(b); });
    b.addEventListener('touchstart', e => { isDragging = true; initAudio(); pop(b); e.preventDefault(); });
    b.addEventListener('touchmove', e => {
      const t = document.elementFromPoint(e.touches[0].clientX, e.touches[0].clientY);
      if (t && t.classList.contains('bw-bubble') && !t.classList.contains('popped')) pop(t);
      e.preventDefault();
    }, { passive: false });
    g.appendChild(b);
  }
  document.addEventListener('mouseup', () => isDragging = false);
  document.addEventListener('touchend', () => isDragging = false);
  updateStats();
}

function pop(b) {
  if (b.classList.contains('popped')) return;
  b.classList.add('popped');
  poppedCells++;
  totalPopped++;
  ppsCounter++;
  playPop();
  updateStats();
  checkBadges();
}

function popRow() {
  const cells = document.querySelectorAll('.bw-bubble:not(.popped)');
  if (cells.length === 0) return;
  const r = Math.floor(Math.random() * gridSize);
  initAudio();
  for (let c = 0; c < gridSize; c++) {
    const idx = r * gridSize + c;
    const cell = document.querySelector(`.bw-bubble[data-idx="${idx}"]`);
    if (cell && !cell.classList.contains('popped')) pop(cell);
  }
}
function popCol() {
  initAudio();
  const c = Math.floor(Math.random() * gridSize);
  for (let r = 0; r < gridSize; r++) {
    const idx = r * gridSize + c;
    const cell = document.querySelector(`.bw-bubble[data-idx="${idx}"]`);
    if (cell && !cell.classList.contains('popped')) pop(cell);
  }
}
function popAll() {
  initAudio();
  const cells = document.querySelectorAll('.bw-bubble:not(.popped)');
  cells.forEach((c, i) => setTimeout(() => pop(c), i * 12));
}
function toggleAuto() {
  if (autoInterval) {
    clearInterval(autoInterval);
    autoInterval = null;
    $('#autoBtn').textContent = '▶ ' + t('auto');
  } else {
    initAudio();
    $('#autoBtn').textContent = '⏸ ' + t('auto');
    autoInterval = setInterval(() => {
      const cells = [...document.querySelectorAll('.bw-bubble:not(.popped)')];
      if (cells.length === 0) { toggleAuto(); return; }
      const c = cells[Math.floor(Math.random() * cells.length)];
      pop(c);
    }, 80);
  }
}

function updateStats() {
  $('#poppedCount').textContent = poppedCells;
  $('#remainingCount').textContent = totalCells - poppedCells;
  $('#totalCount').textContent = totalPopped;
}

function checkBadges() {
  document.querySelectorAll('.bw-badge').forEach(b => {
    const th = parseInt(b.dataset.threshold);
    if (totalPopped >= th && !unlockedBadges.has(th)) {
      unlockedBadges.add(th);
      b.classList.add('show');
      setTimeout(() => showToast(b.textContent), 200);
    }
  });
}

$('#gridSize').addEventListener('change', e => { gridSize = parseInt(e.target.value); buildGrid(); });
$('#soundSel').addEventListener('change', e => soundType = e.target.value);
$('#volume').addEventListener('input', e => volume = e.target.value / 100);
$('#popRowBtn').addEventListener('click', popRow);
$('#popColBtn').addEventListener('click', popCol);
$('#popAllBtn').addEventListener('click', popAll);
$('#autoBtn').addEventListener('click', toggleAuto);
$('#resetBtn').addEventListener('click', () => {
  if (autoInterval) toggleAuto();
  buildGrid();
  unlockedBadges.clear();
  document.querySelectorAll('.bw-badge').forEach(b => b.classList.remove('show'));
  totalPopped = 0;
  $('#totalCount').textContent = 0;
});

// PPS counter
setInterval(() => {
  const now = Date.now();
  if (ppsTime === 0) { ppsTime = now; return; }
  const elapsed = (now - ppsTime) / 1000;
  const pps = ppsCounter / elapsed;
  $('#ppsCount').textContent = pps.toFixed(1);
  ppsCounter = 0;
  ppsTime = now;
}, 1000);

buildGrid();
GZ.renderToolPage({
  category: 'fun',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'⚡', href:'/fun/reaction-time.html', name:'Reaction Time'},
    {icon:'🎲', href:'/fun/dice-roller.html', name:'Dice Roller'},
    {icon:'🪙', href:'/fun/coin-flipper.html', name:'Coin Flipper'},
    {icon:'🎯', href:'/fun/name-picker.html', name:'Name Picker'},
  ]
});
</script>
