.wp-tasks{flex:1;list-style:none;padding:0;margin:0 0 6px}
.wp-task{display:flex;align-items:flex-start;gap:5px;font-size:.82em;padding:3px 4px;border-radius:6px;cursor:pointer;word-break:break-word}
.wp-task.done{opacity:.45;text-decoration:line-through}
.wp-task .wp-ck{margin-top:2px;flex-shrink:0;cursor:pointer}
.wp-del{background:none;border:none;color:var(--gz-accent);cursor:pointer;font-size:.8em;opacity:.5;padding:0 2px}
.wp-del:hover{opacity:1}
.wp-add{width:100%;background:var(--glass2);border:1px dashed var(--border);color:var(--gz-text);border-radius:8px;padding:6px;font-size:.8em;cursor:pointer;margin-top:auto}
.wp-add:hover{border-color:var(--gz-accent)}
.wp-pri{width:10px;height:10px;border-radius:50%;display:inline-block;margin-left:4px;flex-shrink:0}
.p1{background:#ff6b6b}.p2{background:#feca57}.p3{background:#48dbfb}

</style>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>

  </div>
  <div class="gz-tool-area">

    <div id="wp-stats"></div>

  </div>

</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Weekly Planner',
    toolDesc: 'Plan all 7 days in one clean view. Add tasks, set priorities, check them off and print — auto-saved in your browser.',
    clearAll: 'Clear Week',
    print: 'Print / PDF',
    exportData: 'Export JSON',
    importData: 'Import',
    addTask: '+ Add task',
    high: 'High', med: 'Medium', low: 'Low',
    step1: 'Click any day card to add a task or note',
    step2: 'Pick a priority (High, Medium or Low) for each task',
    step3: 'Check the box when a task is done — it gets crossed out',
    step4: 'Print your weekly plan or export/import the data as JSON',
    total: 'Total', done: 'Done', pct: 'Progress',
  },
  zh: {
    toolTitle: '周计划表',
    toolDesc: '在一个简洁视图中规划整周 7 天。添加任务、设置优先级、勾选完成并打印 — 自动保存在浏览器中。',
    clearAll: '清空一周',
    print: '打印 / PDF',
    exportData: '导出 JSON',
    importData: '导入',
    addTask: '+ 添加任务',
    high: '高', med: '中', low: '低',
    step1: '点击任意日期卡片即可添加任务或备注',
    step2: '为每个任务选择优先级（高、中或低）',
    step3: '完成后勾选复选框 — 任务会被划掉',
    step4: '打印周计划或将数据导出/导入为 JSON',
    total: '总计', done: '已完成', pct: '进度',
  }
});

const { $, t } = GZ;
const DAYS = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
const DAYS_ZH = ['周一','周二','周三','周四','周五','周六','周日'];
const lang = GZI18n.getLang();
const dayNames = lang === 'zh' ? DAYS_ZH : DAYS;

let state = JSON.parse(localStorage.getItem('gz-weekly-planner') || 'null') || { tasks: {} };
DAYS.forEach(d => { if (!state.tasks[d]) state.tasks[d] = []; });

function save() { localStorage.setItem('gz-weekly-planner', JSON.stringify(state)); }

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function weekStart() {
  const d = new Date();
  const day = (d.getDay() + 6) % 7; // Mon=0
  d.setDate(d.getDate() - day);
  return d;
}

function render() {
  const start = weekStart();
  $('#wp-grid').innerHTML = DAYS.map((d, i) => {
    const dt = new Date(start); dt.setDate(start.getDate() + i);
    const dateStr = lang === 'zh'
      ? `${dt.getMonth() + 1}月${dt.getDate()}日`
      : dt.toLocaleDateString('en', { month: 'short', day: 'numeric' });
    const tasks = state.tasks[d] || [];
    const items = tasks.map((task, idx) => `
      <li class="wp-task ${task.done ? 'done' : ''}" onclick="toggleTask('${d}',${idx})">
        <input class="wp-ck" type="checkbox" ${task.done ? 'checked' : ''} onclick="event.stopPropagation();toggleTask('${d}',${idx})">
        <span class="wp-pri p${task.pri}"></span>
        <span style="flex:1">${esc(task.text)}</span>
        <button class="wp-del" onclick="event.stopPropagation();delTask('${d}',${idx})">✕</button>
      </li>`).join('');
    return `
      <div class="wp-day" data-day="${d}">
        <div class="wp-day-head">
          <span class="wp-day-name">${dayNames[i]}</span>
          <span class="wp-day-date">${dateStr}</span>
        </div>
        <ul class="wp-tasks">${items}</ul>
        <button class="wp-add" onclick="addTask('${d}')">${t('addTask')}</button>
      </div>`;
  }).join('');
  renderStats();
}

function renderStats() {
  let total = 0, done = 0;
  DAYS.forEach(d => { (state.tasks[d] || []).forEach(tk => { total++; if (tk.done) done++; }); });
  const pct = total ? Math.round(done / total * 100) : 0;
  $('#wp-stats').innerHTML = `
    <span class="wp-stat">${t('total')}: <b>${total}</b></span>
    <span class="wp-stat">${t('done')}: <b>${done}</b></span>
    <span class="wp-stat">${t('pct')}: <b>${pct}%</b></span>`;
}

function addTask(day) {
  const text = prompt(lang === 'zh' ? '输入任务内容：' : 'Task text:');
  if (!text || !text.trim()) return;
  const priStr = prompt(lang === 'zh' ? '优先级 (1=高, 2=中, 3=低)，默认 2：' : 'Priority (1=High, 2=Medium, 3=Low), default 2:', '2');
  const pri = [1, 2, 3].includes(+priStr) ? +priStr : 2;
  state.tasks[day].push({ text: text.trim(), pri, done: false });
  save(); render();
}

function toggleTask(day, idx) {
  state.tasks[day][idx].done = !state.tasks[day][idx].done;
  save(); render();
}

function delTask(day, idx) {
  state.tasks[day].splice(idx, 1);
  save(); render();
}

function clearAll() {
  if (!confirm(lang === 'zh' ? '确定清空本周所有任务？' : 'Clear all tasks this week?')) return;
  DAYS.forEach(d => state.tasks[d] = []);
  save(); render();
}

function exportData() {
  const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'weekly-planner.json';
  a.click();
}

function importData() {
  const inp = document.createElement('input');
  inp.type = 'file'; inp.accept = '.json';
  inp.onchange = () => {
    const f = inp.files[0]; if (!f) return;
    const r = new FileReader();
    r.onload = () => { try { state = JSON.parse(r.result); DAYS.forEach(d => { if (!state.tasks[d]) state.tasks[d] = []; }); save(); render(); } catch (e) { alert('Invalid JSON'); } };
    r.readAsText(f);
  };
  inp.click();
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="window.print()">${t('print')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="exportData()">${t('exportData')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="importData()">${t('importData')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="clearAll()">${t('clearAll')}</button>`;

render();

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🗓️', href:'/text/daily-planner.html', name:'Daily Planner'},
    {icon:'✅', href:'/text/todo.html', name:'To-Do List'},
    {icon:'🍅', href:'/calc/pomodoro.html', name:'Pomodoro Timer'},
    {icon:'📒', href:'/text/sticky-notes.html', name:'Sticky Notes'},
  ]
});
</script>
