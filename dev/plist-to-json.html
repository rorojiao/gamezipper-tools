const { $, copyText, t } = GZ;

function syntaxHighlight(json) {
  return json.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/("(\\u[\da-fA-F]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(\.\d+)?([eE][+-]?\d+)?)/g, m => {
      let c = 'json-number';
      if (/^"/.test(m)) c = /:$/.test(m) ? 'json-key' : 'json-string';
      else if (/true|false/.test(m)) c = 'json-bool';
      else if (/null/.test(m)) c = 'json-null';
      return `<span class="${c}">${m}</span>`;
    });
}

function parsePlistNode(node) {
  const tag = node.tagName.toLowerCase();
  switch (tag) {
    case 'dict': {
      const obj = {};
      const children = [...node.children];
      for (let i = 0; i < children.length; i += 2) {
        if (children[i] && children[i].tagName.toLowerCase() === 'key' && children[i + 1]) {
          const key = children[i].textContent;
          obj[key] = parsePlistNode(children[i + 1]);
        }
      }
      return obj;
    }
    case 'array': {
      return [...node.children].map(parsePlistNode);
    }
    case 'string':
      return node.textContent;
    case 'integer':
      return parseInt(node.textContent, 10);
    case 'real':
      return parseFloat(node.textContent);
    case 'true':
      return true;
    case 'false':
      return false;
    case 'date':
      return node.textContent;
    case 'data':
      return node.textContent.trim();
    default:
      return node.textContent;
  }
}

function doConvert() {
  const inp = $('#input').value.trim();
  if (!inp) { $('#output').textContent = ''; $('#status').innerHTML = ''; return; }
  try {
    const parser = new DOMParser();
    const doc = parser.parseFromString(inp, 'application/xml');
    const parseErr = doc.querySelector('parsererror');
    if (parseErr) throw new Error(t('errParse') + ': ' + parseErr.textContent.split('\n')[0]);
    const plist = doc.querySelector('plist');
    if (!plist) throw new Error(t('errNoPlist'));
    const rootEl = [...plist.children].find(c => c.tagName && c.tagName.toLowerCase() !== 'xml');
    if (!rootEl) throw new Error(t('errNoPlist'));
    const obj = parsePlistNode(rootEl);
    const json = JSON.stringify(obj, null, 2);
    $('#output').innerHTML = syntaxHighlight(json);
    $('#status').innerHTML = `<span style="color:var(--gz-success)">${t('valid')}</span>`;
  } catch(e) {
    $('#status').innerHTML = `<span style="color:var(--gz-accent)">Error: ${e.message}</span>`;
    $('#output').textContent = '';
  }
}

function loadExample() {
  $('#input').value = `<?xml version="1.0" encoding="UTF-8"?>

  <dict>

    <false/>
    <key>NSExceptionDomains</key>
    <dict>

    <string>iPhoneOS</string>
  </array>
  <key>UILaunchScreen</key>
  <dict/>
</dict>
</plist>`;
  doConvert();
}

function doClear() { $('#input').value = ''; $('#output').textContent = ''; $('#status').innerHTML = ''; }

$('#input').addEventListener('input', doConvert);

$('#toolbar').innerHTML = `
