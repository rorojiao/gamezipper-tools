<script>
GZI18n.register({
  en: {
    toolTitle: 'Magnetometer & Metal Detector',
    toolDesc: 'Turn your phone into a magnetometer and metal detector. Measure magnetic field strength in µT along X, Y, Z — live in your browser. Free and private.',
    start: '▶ Start',
    stop: '⏹ Stop',
    metalDetected: '🧲 STRONG MAGNETIC FIELD DETECTED!',
    notSupported: '⚠ Your device/browser does not support the Magnetometer API. Try Chrome on Android. Desktop and iOS Safari are not supported.',
    running: 'Sensor running… bring metal near your phone!',
    stopped: 'Sensor stopped.',
    step1: 'Open this page on an Android phone using Chrome (the Magnetometer API is not available on iOS or desktop)',
    step2: 'Tap "Start" to begin reading the magnetic field',
    step3: 'Watch the total reading — Earth baseline is 25-65 µT',
    step4: 'Bring a magnet, iron or steel object near your phone to see the value spike',
  },
  zh: {
    toolTitle: '磁力计 & 金属探测器',
    toolDesc: '把手机变成磁力计和金属探测器。实时测量 X、Y、Z 轴磁场强度（µT）。免费私密，浏览器本地运行。',
    start: '▶ 开始',
    stop: '⏹ 停止',
    metalDetected: '🧲 检测到强磁场！',
    notSupported: '⚠ 你的设备/浏览器不支持 Magnetometer API。请使用 Android 版 Chrome。不支持 iOS 和桌面端。',
    running: '传感器运行中… 把金属靠近手机！',
    stopped: '传感器已停止。',
    step1: '在 Android 手机上用 Chrome 打开本页（不支持 iOS 和桌面端）',
    step2: '点击「开始」读取磁场',
    step3: '观察总读数 — 地球磁场基线为 25-65 µT',
    step4: '将磁铁、铁或钢制品靠近手机，观察数值飙升',
  }
});

const { $, t } = GZ;
let sensor = null;
let history = [];
const MAX_HIST = 150;
const chart = $('#chart');
const ctx = chart.getContext('2d');
function resizeChart(){ chart.width = chart.offsetWidth; chart.height = 180; }
window.addEventListener('resize', resizeChart); resizeChart();

function update(x, y, z){
  const total = Math.sqrt(x*x + y*y + z*z);
  $('#total').textContent = total.toFixed(1);
  $('#barLabel').textContent = total.toFixed(1) + ' µT';
  const pct = Math.min(100, (total / 200) * 100);
  $('#barFill').style.width = pct + '%';
  $('#valX').textContent = x.toFixed(1) + ' µT';
  $('#valY').textContent = y.toFixed(1) + ' µT';
  $('#valZ').textContent = z.toFixed(1) + ' µT';
  $('#barX').style.width = Math.min(100, Math.abs(x)) + '%';
  $('#barY').style.width = Math.min(100, Math.abs(y)) + '%';
  $('#barZ').style.width = Math.min(100, Math.abs(z)) + '%';
  if(total > 80){
    $('#metalAlert').style.display = 'block';
    $('#metalAlert').textContent = t('metalDetected');
  } else { $('#metalAlert').style.display = 'none'; }
  history.push(total);
  if(history.length > MAX_HIST) history.shift();
  drawChart();
}

function drawChart(){
  ctx.fillStyle = getComputedStyle(document.body).getPropertyValue('--bg') || '#0a0a1a';
  ctx.fillRect(0,0,chart.width,chart.height);
  if(history.length < 2) return;
  const max = Math.max(80, ...history);
  ctx.strokeStyle = '#4ecdc4'; ctx.lineWidth = 2; ctx.beginPath();
  history.forEach((v,i)=>{
    const px = (i/(MAX_HIST-1))*chart.width;
    const py = chart.height - (v/max)*chart.height*0.9;
    if(i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
  });
  ctx.stroke();
  ctx.lineTo(chart.width,chart.height); ctx.lineTo(0,chart.height); ctx.closePath();
  ctx.fillStyle = 'rgba(78,205,196,0.12)'; ctx.fill();
}

async function start(){
  if(!('Magnetometer' in window)){ $('#status').textContent = t('notSupported'); return; }
  try{
    if(navigator.permissions){
      const p = await navigator.permissions.query({name:'magnetometer'});
      if(p.state === 'denied'){ $('#status').textContent = t('notSupported'); return; }
    }
    sensor = new Magnetometer({frequency: 30 });
    sensor.addEventListener('reading', () => update(sensor.x, sensor.y, sensor.z));
    sensor.start();
    $('#status').textContent = t('running');
  }catch(err){ $('#status').textContent = t('notSupported'); }
}

function stop(){
  if(sensor){ sensor.stop(); sensor = null; }
  $('#status').textContent = t('stopped');
}

if(!('Magnetometer' in window)){ $('#status').textContent = t('notSupported'); }

$('#toolbar').innerHTML = `<button class="gz-btn" onclick="start()">${t('start')}</button><button class="gz-btn gz-btn-secondary" onclick="stop()">${t('stop')}</button>`;

GZ.renderToolPage({
  category: 'dev',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📳', href:'/dev/accelerometer.html', name:'Accelerometer'},
    {icon:'📐', href:'/dev/gyroscope.html', name:'Gyroscope'},
    {icon:'🧭', href:'/dev/online-compass.html', name:'Compass'},
    {icon:'🔊', href:'/dev/decibel-meter.html', name:'Decibel Meter'},
  ]
});
</script>
