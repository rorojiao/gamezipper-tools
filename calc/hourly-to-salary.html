<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "How do I convert hourly wage to annual salary?", "acceptedAnswer": {"@type": "Answer", "text": "Multiply your hourly rate by the number of hours you work per week, then multiply by 52 weeks. Formula: Annual Salary = Hourly Rate × Hours per Week × 52. For example, $25/hour × 40 hours × 52 weeks = $52,000/year."}}, {"@type": "Question", "name": "How many work hours are in a year?", "acceptedAnswer": {"@type": "Answer", "text": "A standard full-time year is 2,080 hours (40 hours/week × 52 weeks). Some calculations use 2,000 hours to account for 2 weeks of unpaid vacation. Part-time workers should use their actual weekly hours."}}, {"@type": "Question", "name": "Does this calculator account for taxes?", "acceptedAnswer": {"@type": "Answer", "text": "No. This calculator shows gross (pre-tax) income. Your actual take-home pay will be lower after federal, state and local taxes, plus deductions like Social Security, Medicare, health insurance and retirement contributions."}}, {"@type": "Question", "name": "What is the difference between salaried and hourly employees?", "acceptedAnswer": {"@type": "Answer", "text": "Salaried employees receive a fixed annual amount regardless of hours worked and are often exempt from overtime. Hourly employees are paid per hour worked and typically qualify for overtime pay (usually 1.5x) for hours over 40 per week."}}]}</script>

<script>
GZI18n.register({
  en: {
    toolTitle: 'Hourly to Salary Calculator',
    toolDesc: 'Convert hourly wage to annual, monthly, weekly and daily salary — or convert a salary back to an hourly rate. Supports overtime pay and custom work hours.',
    modeHourlyToSalary: 'Hourly → Salary',
    modeSalaryToHourly: 'Salary → Hourly',
    hourlyRate: 'Hourly Rate ($)',
    salary: 'Annual Salary ($)',
    hoursWeek: 'Hours per Week',
    overtimeRate: 'Overtime Multiplier',
    overtimeHours: 'Overtime Hours / Week',
    weeksYear: 'Weeks Worked / Year',
    calculate: 'Calculate',
    example: 'Example',
    clear: 'Clear',
    resAnnual: 'Annual Salary',
    resMonthly: 'Monthly Pay',
    resBiweekly: 'Biweekly Pay',
    resWeekly: 'Weekly Pay',
    resDaily: 'Daily Pay',
    resHourly: 'Hourly Rate',
    step1: 'Pick a mode — convert hourly wage to salary, or salary to hourly',
    step2: 'Enter your hourly rate or annual salary',
    step3: 'Set hours per week, weeks per year, and overtime if applicable',
    step4: 'Click Calculate to see yearly, monthly, weekly and daily pay',
  },
  zh: {
    toolTitle: '时薪转年薪计算器',
    toolDesc: '将时薪换算为年薪、月薪、周薪和日薪 — 或将年薪反推为时薪。支持加班工资和自定义工时。',
    modeHourlyToSalary: '时薪 → 年薪',
    modeSalaryToHourly: '年薪 → 时薪',
    hourlyRate: '时薪（元）',
    salary: '年薪（元）',
    hoursWeek: '每周工时',
    overtimeRate: '加班倍率',
    overtimeHours: '每周加班工时',
    weeksYear: '每年工作周数',
    calculate: '计算',
    example: '示例',
    clear: '清空',
    resAnnual: '年薪',
    resMonthly: '月薪',
    resBiweekly: '双周薪',
    resWeekly: '周薪',
    resDaily: '日薪',
    resHourly: '时薪',
    step1: '选择模式 — 时薪转年薪，或年薪转时薪',
    step2: '输入时薪或年薪',
    step3: '设置每周工时、每年工作周数和加班（如适用）',
    step4: '点击计算查看年薪、月薪、周薪和日薪',
  }
});

const { $, t } = GZ;
let mode = 'h2s';

function fmt(n) { return n.toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2}); }

function renderInputs() {
  if (mode === 'h2s') {
    $('#inputs').innerHTML = `
      <div><label>${t('hourlyRate')}</label><input type="number" id="inp-rate" value="25" min="0" step="0.01"></div>
      <div><label>${t('hoursWeek')}</label><input type="number" id="inp-hours" value="40" min="0" step="0.5"></div>
      <div><label>${t('weeksYear')}</label><input type="number" id="inp-weeks" value="52" min="1" max="52" step="1"></div>
      <div><label>${t('overtimeHours')}</label><input type="number" id="inp-ot-hours" value="0" min="0" step="0.5"></div>
      <div><label>${t('overtimeRate')}</label>
        <select id="inp-ot-mult"><option value="1.5">1.5× (US FLSA)</option><option value="2">2×</option><option value="1">1× (no OT)</option></select></div>
      <div></div>`;
  } else {
    $('#inputs').innerHTML = `
      <div><label>${t('salary')}</label><input type="number" id="inp-salary" value="60000" min="0" step="100"></div>
      <div><label>${t('hoursWeek')}</label><input type="number" id="inp-hours" value="40" min="1" step="0.5"></div>
      <div><label>${t('weeksYear')}</label><input type="number" id="inp-weeks" value="52" min="1" max="52" step="1"></div>`;
  }
}

function calculate() {
  const weeks = Math.max(1, parseFloat($('#inp-weeks').value) || 52);
  const hours = Math.max(0, parseFloat($('#inp-hours').value) || 0);

  let annual, hourly;

  if (mode === 'h2s') {
    const rate = parseFloat($('#inp-rate').value) || 0;
    const otHours = Math.max(0, parseFloat($('#inp-ot-hours').value) || 0);
    const otMult = parseFloat($('#inp-ot-mult').value) || 1.5;
    const regPay = rate * hours * weeks;
    const otPay = rate * otMult * otHours * weeks;
    annual = regPay + otPay;
    const totalHours = (hours + otHours) * weeks;
    hourly = totalHours > 0 ? annual / totalHours : rate;
    $('#formula').innerHTML = `Regular Pay = $${fmt(rate)} × ${hours}h × ${weeks}w = <b>$${fmt(regPay)}</b><br>
${otHours > 0 ? `Overtime Pay = $${fmt(rate)} × ${otMult} × ${otHours}h × ${weeks}w = <b>$${fmt(otPay)}</b><br>` : ''}Annual Salary = <b>$${fmt(annual)}</b><br>
Effective Hourly = $${fmt(annual)} ÷ ${(hours+otHours)*weeks}h = <b>$${fmt(hourly)}/h</b>`;
  } else {
    annual = parseFloat($('#inp-salary').value) || 0;
    const totalHours = hours * weeks;
    hourly = totalHours > 0 ? annual / totalHours : 0;
    $('#formula').innerHTML = `Annual Salary = <b>$${fmt(annual)}</b><br>
Total Hours = ${hours}h × ${weeks}w = ${totalHours}h<br>
Hourly Rate = $${fmt(annual)} ÷ ${totalHours}h = <b>$${fmt(hourly)}/h</b>`;
  }

  const monthly = annual / 12;
  const biweekly = annual / (weeks / 2);
  const weekly = annual / weeks;
  const daily = hours > 0 ? weekly / (hours / 8 > 0 ? 5 : 1) : 0;
  const dailyReal = hours > 0 ? weekly / (hours / 8) : 0;

  const items = mode === 'h2s' ? `
    <div class="gz-result-item"><div class="value">$${fmt(annual)}</div><div class="label">${t('resAnnual')}</div></div>
    <div class="gz-result-item"><div class="value">$${fmt(monthly)}</div><div class="label">${t('resMonthly')}</div></div>
    <div class="gz-result-item"><div class="value">$${fmt(biweekly)}</div><div class="label">${t('resBiweekly')}</div></div>
    <div class="gz-result-item"><div class="value">$${fmt(weekly)}</div><div class="label">${t('resWeekly')}</div></div>
    <div class="gz-result-item"><div class="value">$${fmt(dailyReal)}</div><div class="label">${t('resDaily')}</div></div>` : `
    <div class="gz-result-item"><div class="value">$${fmt(hourly)}</div><div class="label">${t('resHourly')}</div></div>
    <div class="gz-result-item"><div class="value">$${fmt(monthly)}</div><div class="label">${t('resMonthly')}</div></div>
    <div class="gz-result-item"><div class="value">$${fmt(weekly)}</div><div class="label">${t('resWeekly')}</div></div>
    <div class="gz-result-item"><div class="value">$${fmt(dailyReal)}</div><div class="label">${t('resDaily')}</div></div>`;

  $('#result-grid').innerHTML = items;
  $('#results').style.display = 'block';
}

$('#modes').innerHTML = `
  <button class="active" onclick="mode='h2s';document.querySelectorAll('.gz-mode-tabs button').forEach((b,i)=>b.classList.toggle('active',i===0));renderInputs();calculate()">${t('modeHourlyToSalary')}</button>
  <button onclick="mode='s2h';document.querySelectorAll('.gz-mode-tabs button').forEach((b,i)=>b.classList.toggle('active',i===1));renderInputs();calculate()">${t('modeSalaryToHourly')}</button>`;

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="calculate()">${t('calculate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="document.getElementById('results').style.display='none'">${t('clear')}</button>`;

renderInputs();
calculate();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📈', href:'/calc/compound-interest.html', name:'Compound Interest'},
    {icon:'🏦', href:'/calc/early-mortgage-payoff.html', name:'Mortgage Payoff'},
    {icon:'💰', href:'/calc/profit-margin.html', name:'Profit Margin'},
    {icon:'🏷️', href:'/calc/percent-off-calculator.html', name:'Percent Off'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
