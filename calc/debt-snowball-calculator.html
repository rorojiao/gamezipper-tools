<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is the debt snowball method?", "acceptedAnswer": {"@type": "Answer", "text": "The debt snowball method, popularized by Dave Ramsey, pays off debts from smallest balance to largest. You make minimum payments on everything, then throw all extra money at the smallest balance. Once it is gone you roll that payment into the next-smallest debt. It wins on motivation and quick wins."}}, {"@type": "Question", "name": "What is the debt avalanche method?", "acceptedAnswer": {"@type": "Answer", "text": "The debt avalanche method pays off debts from highest interest rate to lowest. You make minimum payments everywhere and put extra cash toward the debt with the highest APR. Mathematically it costs the least in total interest, though progress can feel slower early on."}}, {"@type": "Question", "name": "Which pays off debt faster — snowball or avalanche?", "acceptedAnswer": {"@type": "Answer", "text": "The avalanche method is always mathematically optimal: it minimizes total interest and usually finishes slightly sooner. The snowball method may cost a little more but the early wins keep people motivated to stick with the plan. This calculator shows both side by side so you can choose."}}, {"@type": "Question", "name": "How does the extra monthly payment help?", "acceptedAnswer": {"@type": "Answer", "text": "Any amount you pay above the combined minimums goes straight to your target debt. Because it reduces principal faster, less interest accrues each month. Even $50-$100 extra per month can shave years off your payoff timeline and save thousands in interest."}}]}</script>

<script>
GZI18n.register({
  en: {
    toolTitle: 'Debt Snowball Calculator',
    toolDesc: 'Compare the debt snowball and avalanche methods. Add every debt, set an extra monthly payment and instantly see your fastest debt-free date, total interest and which strategy saves the most.',
    debts: 'Your Debts', add: '+ Add debt',
    name: 'Debt name', balance: 'Balance', minPay: 'Min payment', apr: 'APR %',
    extra: 'Extra monthly payment ($)', currency: 'Currency',
    snowball: 'Debt Snowball', snowballSub: 'Smallest balance first',
    avalanche: 'Debt Avalanche', avalancheSub: 'Highest interest first',
    months: 'Months to debt-free', totalInterest: 'Total interest', totalPaid: 'Total paid',
    payoffOrder: 'Payoff order', recommended: 'Recommended',
    example: '🧪 Example', reset: '🔄 Reset', copy: '📋 Copy',
    step1: 'List every debt you owe with its current balance, minimum payment and APR',
    step2: 'Set the extra amount you can pay each month on top of all minimums',
    step3: 'Compare snowball (smallest balance first) vs avalanche (highest APR first)',
    step4: 'Follow the payoff order shown for the strategy that fits your goals',
  },
  zh: {
    toolTitle: '债务雪球计算器',
    toolDesc: '对比债务雪球法和雪崩法。添加所有债务，设置额外月还款额，立即查看最快还清日期、总利息以及哪种策略最省钱。',
    debts: '你的债务', add: '+ 添加债务',
    name: '债务名称', balance: '余额', minPay: '最低还款', apr: '年利率 %',
    extra: '额外月还款 ($)', currency: '货币符号',
    snowball: '债务雪球法', snowballSub: '先还最小余额',
    avalanche: '债务雪崩法', avalancheSub: '先还最高利率',
    months: '还清所需月数', totalInterest: '总利息', totalPaid: '总还款额',
    payoffOrder: '还款顺序', recommended: '推荐',
    example: '🧪 示例', reset: '🔄 重置', copy: '📋 复制',
    step1: '列出所有债务及其当前余额、最低还款额和年利率',
    step2: '设置在所有最低还款之外每月能额外还款的金额',
    step3: '对比雪球法（先还最小余额）与雪崩法（先还最高利率）',
    step4: '按照符合你目标的策略所示的还款顺序执行',
  }
});

const { $, copyText, t } = GZ;

$('#lblDebts').textContent = t('debts');
$('#addBtn').textContent = t('add');
$('#thName').textContent = t('name');
$('#thBalance').textContent = t('balance');
$('#thMin').textContent = t('minPay');
$('#thApr').textContent = t('apr');
$('#lblExtra').textContent = t('extra');
$('#lblCurrency2').textContent = t('currency');

let debts = [];

function addRow(d = { name: '', balance: '', min: '', apr: '' }) {
  debts.push(d);
  renderRows();
  calc();
}
window.addRow = addRow;

function removeRow(i) {
  debts.splice(i, 1);
  renderRows();
  calc();
}
window.removeRow = removeRow;

function renderRows() {
  $('#debtBody').innerHTML = debts.map((d, i) => `
    <tr>
      <td><input type="text" data-i="${i}" data-k="name" value="${(d.name||'').replace(/"/g,'&quot;')}" placeholder="Credit card"></td>
      <td class="num"><input type="number" data-i="${i}" data-k="balance" value="${d.balance}" min="0" step="50"></td>
      <td class="num"><input type="number" data-i="${i}" data-k="min" value="${d.min}" min="0" step="5"></td>
      <td class="num"><input type="number" data-i="${i}" data-k="apr" value="${d.apr}" min="0" max="100" step="0.1"></td>
      <td class="x"><button onclick="removeRow(${i})" title="✕">×</button></td>
    </tr>`).join('');
  $('#debtBody').querySelectorAll('input').forEach(inp => {
    inp.addEventListener('input', e => {
      const i = +e.target.dataset.i, k = e.target.dataset.k;
      debts[i][k] = k === 'name' ? e.target.value : (e.target.value === '' ? '' : +e.target.value);
      calc();
    });
  });
}

function fmt(n) {
  const cur = $('#currency').value || '$';
  return cur + (n || 0).toLocaleString(undefined, { minimumFractionDigits: 0, maximumFractionDigits: 0 });
}

// Simulate a payoff strategy. mode: 'snowball' | 'avalanche'
function simulate(mode) {
  let list = debts
    .filter(d => +d.balance > 0)
    .map((d, idx) => ({
      name: d.name || (t('name') + ' ' + (idx + 1)),
      balance: +d.balance,
      min: +d.min,
      apr: +d.apr,
      orig: +d.balance,
      doneMonth: 0
    }));
  if (!list.length) return null;

  const order = [...list];
  if (mode === 'snowball') order.sort((a, b) => a.balance - b.balance || b.apr - a.apr);
  else order.sort((a, b) => b.apr - a.apr || a.balance - b.balance);

  let extra = Math.max(0, +$('#extra').value || 0);
  let totalInterest = 0;
  let months = 0;
  const payoffOrder = [];
  const MAX_MONTHS = 1200;

  // Ensure minimums cover interest; clamp
  list.forEach(d => {
    if (d.min < d.balance * (d.apr / 100 / 12) * 0.5 && d.min > 0) { /* keep */ }
  });

  while (list.some(d => d.balance > 0.005) && months < MAX_MONTHS) {
    months++;
    // 1) accrue interest, apply minimums
    let snowball = 0;
    list.forEach(d => {
      if (d.balance <= 0) return;
      const interest = d.balance * (d.apr / 100 / 12);
      d.balance += interest;
      totalInterest += interest;
      let pay = Math.min(d.min, d.balance);
      d.balance -= pay;
      // if debt cleared by minimum alone, leftover min rolls to snowball
      if (d.balance <= 0.005) {
        snowball += (pay - (d.balance + pay)); // ~0, leftover negligible
      }
    });
    // 2) cascade minimums that freed up (debts done this round contribute their min to the pool)
    list.forEach(d => {
      if (d.doneMonth === 0 && d.balance <= 0.005) {
        d.doneMonth = months;
        snowball += d.min; // freed minimum rolls forward
        payoffOrder.push(d.name);
      }
    });
    // 3) apply extra + snowball pool to the current target debt in order
    let pool = extra + snowball;
    for (const target of order) {
      const d = list.find(x => x.name === target.name && x.balance > 0.005);
      if (!d) continue;
      if (pool <= 0) break;
      const pay = Math.min(pool, d.balance);
      d.balance -= pay;
      pool -= pay;
      if (d.balance <= 0.005 && d.doneMonth === 0) {
        d.doneMonth = months;
        payoffOrder.push(d.name);
      }
    }
  }
  // any stragglers
  list.forEach(d => { if (d.doneMonth === 0) { d.doneMonth = months; payoffOrder.push(d.name); } });

  const totalPaid = list.reduce((s, d) => s + d.orig, 0) + totalInterest;
  return { months, totalInterest, totalPaid, payoffOrder };
}

function calc() {
  const sb = simulate('snowball');
  const av = simulate('avalanche');
  const winAv = sb && av && av.totalInterest < sb.totalInterest;
  const cur = $('#currency').value || '$';

  if (!sb) {
    $('#compare').innerHTML = `<div class="ds-note" style="grid-column:1/-1">${GZI18n.getLang()==='zh' ? '至少添加一个余额大于 0 的债务。' : 'Add at least one debt with a balance above 0.'}</div>`;
    $('#note').textContent = '';
    return;
  }

  const mkStrat = (title, sub, r, isWin) => `
    <div class="ds-strat ${isWin ? 'win' : ''}">
      <h4>${title}${isWin ? `<span class="tag">${t('recommended')}</span>` : ''}</h4>
      <div class="sub">${sub}</div>
      <div class="big">${r.months} ${GZI18n.getLang()==='zh' ? '个月' : 'mo'}</div>
      <div class="row"><span class="k">${t('totalInterest')}</span><span class="v">${fmt(r.totalInterest)}</span></div>
      <div class="row"><span class="k">${t('totalPaid')}</span><span class="v">${fmt(r.totalPaid)}</span></div>
      <div class="ds-order">${t('payoffOrder')}: ${r.payoffOrder.map((n,i)=>`<b>${i+1}.</b> ${n}`).join(' → ')}</div>
    </div>`;

  $('#compare').innerHTML = mkStrat(t('snowball'), t('snowballSub'), sb, !winAv) + mkStrat(t('avalanche'), t('avalancheSub'), av, winAv);

  const diff = Math.abs(sb.totalInterest - av.totalInterest);
  $('#note').textContent = (GZI18n.getLang()==='zh'
    ? `雪崩法比雪球法${winAv ? '少付' : '多付'}约 ${fmt(diff)} 利息。`
    : `The avalanche method costs about ${fmt(diff)} ${winAv ? 'less' : 'more'} in interest than the snowball method.`);
  window._summary = `${t('snowball')}: ${sb.months}mo, ${fmt(sb.totalInterest)} | ${t('avalanche')}: ${av.months}mo, ${fmt(av.totalInterest)}`;
}

function loadExample() {
  debts = [
    { name: 'Credit card', balance: 1200, min: 35, apr: 22 },
    { name: 'Store card', balance: 4800, min: 96, apr: 27 },
    { name: 'Personal loan', balance: 8000, min: 180, apr: 9 },
    { name: 'Medical bill', balance: 600, min: 25, apr: 0 },
  ];
  $('#extra').value = 150;
  renderRows();
  calc();
}
window.loadExample = loadExample;

function doReset() {
  debts = [];
  $('#extra').value = 100;
  addRow(); addRow();
  calc();
}
window.doReset = doReset;

$('#extra').addEventListener('input', calc);
$('#currency').addEventListener('input', calc);

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doReset()">${t('reset')}</button>
  <button class="gz-btn" onclick="copyText(window._summary)">${t('copy')}</button>`;

// init with two empty rows + example-friendly state
addRow(); addRow();
calc();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'💸', href:'/calc/debt-payoff-calculator.html', name:'Debt Payoff'},
    {icon:'💳', href:'/calc/credit-card-payoff-calculator.html', name:'Credit Card Payoff'},
    {icon:'🏠', href:'/calc/mortgage-calculator.html', name:'Mortgage'},
    {icon:'📈', href:'/calc/compound-interest-calculator.html', name:'Compound Interest'},
  ]
});
</script>
