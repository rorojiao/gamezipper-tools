<body>
<div class="gz-container">
<div class="gz-tool-header">
<h1 id="title"></h1>
<p class="desc" id="desc"></p>
</div>
<div class="gz-tool-area">
<div class="gz-toolbar" id="toolbar"></div>
<div class="cl-template-tabs" id="templates">
<button class="gz-btn" data-tpl="modern" onclick="setTpl('modern')">Modern</button>
<button class="gz-btn gz-btn-secondary" data-tpl="classic" onclick="setTpl('classic')">Classic</button>
<button class="gz-btn gz-btn-secondary" data-tpl="minimal" onclick="setTpl('minimal')">Minimal</button>
</div>
<div class="cl-grid">
<div class="cl-in"><label id="lbl-name">Your Name</label><input type="text" id="name" value="Alex Johnson"></div>
<div class="cl-in"><label id="lbl-email">Email</label><input type="email" id="email" value="alex.johnson@example.com"></div>
<div class="cl-in"><label id="lbl-phone">Phone</label><input type="tel" id="phone" value="+1 (555) 123-4567"></div>
<div class="cl-in"><label id="lbl-location">Location</label><input type="text" id="location" value="San Francisco, CA"></div>
<div class="cl-in"><label id="lbl-company">Company Name</label><input type="text" id="company" value="Acme Corp"></div>
<div class="cl-in"><label id="lbl-role">Job Title / Role</label><input type="text" id="role" value="Senior Software Engineer"></div>
<div class="cl-in full"><label id="lbl-hiring">Hiring Manager (optional)</label><input type="text" id="hiring" value="Hiring Manager"></div>
<div class="cl-in full"><label id="lbl-exp">Relevant Experience / Achievements (one per line)</label><textarea id="exp" rows="4">5+ years building scalable web applications with React and Node.js
Led a team of 4 engineers to deliver a real-time analytics dashboard
Reduced API response times by 40% through caching and query optimization</textarea></div>
<div class="cl-in full"><label id="lbl-skills">Key Skills (comma-separated)</label><input type="text" id="skills" value="JavaScript, TypeScript, React, Node.js, AWS, PostgreSQL"></div>
<div class="cl-in full"><label id="lbl-tone">Tone</label>
<select id="tone">
<option value="professional">Professional (default)</option>
<option value="enthusiastic">Enthusiastic</option>
<option value="concise">Concise</option>
</select>
</div>
</div>
<div class="cl-section">
<h3 id="lbl-preview">Preview</h3>
<div class="cl-preview modern" id="preview"></div>
</div>
</div>
<div class="gz-howto"><h2></h2><ol></ol></div>

<script>
GZI18n.register({
en:{
toolTitle:'Cover Letter Generator',
toolDesc:'Create a professional cover letter in seconds. Pick a template (Modern, Classic or Minimal), fill in your details, and download as PDF — all in your browser, no signup.',
lblName:'Your Name',lblEmail:'Email',lblPhone:'Phone',lblLocation:'Location',
lblCompany:'Company Name',lblRole:'Job Title / Role',lblHiring:'Hiring Manager (optional)',
lblExp:'Relevant Experience / Achievements (one per line)',lblSkills:'Key Skills (comma-separated)',lblTone:'Tone',
lblPreview:'Preview',
tplModern:'Modern',tplClassic:'Classic',tplMinimal:'Minimal',
step1:'Fill in your name, contact info and the target role',
step2:'Choose a template (Modern / Classic / Minimal)',
step3:'Add your relevant experience and skills',
step4:'Print or save as PDF using your browser',
},
zh:{
toolTitle:'求职信生成器',
toolDesc:'秒建专业求职信。选择模板（现代/经典/极简），填写信息，一键下载 PDF — 浏览器本地处理，无需注册。',
lblName:'您的姓名',lblEmail:'邮箱',lblPhone:'电话',lblLocation:'所在地',
lblCompany:'公司名称',lblRole:'职位',lblHiring:'招聘经理（可选）',
lblExp:'相关经验/成就（每行一条）',lblSkills:'关键技能（逗号分隔）',lblTone:'语气',
lblPreview:'预览',
tplModern:'现代',tplClassic:'经典',tplMinimal:'极简',
step1:'填写您的姓名、联系方式和目标职位',
step2:'选择模板（现代 / 经典 / 极简）',
step3:'添加您的相关经验和技能',
step4:'使用浏览器打印或保存为 PDF',
}
});

const {$,t}=GZ;
let tpl='modern';

function setTpl(t){
  tpl=t;
  document.querySelectorAll('#templates button').forEach(b=>b.classList.toggle('gz-btn-secondary',b.dataset.tpl!==t));
  const p=$('#preview');
  p.className='cl-preview '+t;
  render();
}

function escHtml(s){return(s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}

function render(){
  const name=$('#name').value;
  const email=$('#email').value;
  const phone=$('#phone').value;
  const loc=$('#location').value;
  const company=$('#company').value;
  const role=$('#role').value;
  const hiring=$('#hiring').value||'Hiring Manager';
  const exp=$('#exp').value.split('\n').filter(l=>l.trim());
  const skills=$('#skills').value.split(',').map(s=>s.trim()).filter(Boolean);
  const tone=$('#tone').value;

  const today=new Date().toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'});

  const expBullets=exp.map(e=>`• ${e}`).join('\n');
  const skillsLine=skills.length?'My core competencies include '+skills.join(', ')+'.':'';

  const opening=tone==='enthusiastic'
    ?`I am thrilled to apply for the ${role} position at ${company}. Your team's reputation for innovation and impact aligns perfectly with my passion for building products that make a real difference.`
    :tone==='concise'
    ?`I'm applying for the ${role} role at ${company}. My background in ${skills[0]||'software engineering'} and track record of measurable results make me a strong match.`
    :`I am writing to express my strong interest in the ${role} position at ${company}. With a proven track record in software engineering and a deep commitment to delivering high-quality solutions, I am confident I would be a valuable addition to your team.`;

  const body=tone==='enthusiastic'
    ?`In my previous roles, I have had the opportunity to:\n${expBullets}\n\nWhat excites me most about ${company} is the chance to bring these experiences to a team that values innovation and measurable impact.`
    :tone==='concise'
    ?`Highlights from my career:\n${expBullets}\n\n${skillsLine} I would welcome the chance to discuss how I can contribute to ${company}'s goals.`
    :`In my previous roles, I have successfully:\n${expBullets}\n\n${skillsLine} I am particularly drawn to this opportunity because of ${company}'s commitment to excellence and its forward-thinking approach to the industry.`;

  const closing=tone==='enthusiastic'
    ?`I would love the opportunity to discuss how my background aligns with ${company}'s vision. Thank you for considering my application — I look forward to the possibility of joining your team!`
    :tone==='concise'
    ?`I'd welcome a brief conversation about how I can contribute. Thank you for your time.`
    :`I would welcome the opportunity to discuss how my background, skills, and enthusiasm would translate into value for your team. Thank you for considering my application. I look forward to hearing from you.`;

  const html=`<div class="header">
<h2>${escHtml(name)}</h2>
<div>${escHtml(email)} · ${escHtml(phone)} · ${escHtml(loc)}</div>
</div>
<div>${escHtml(today)}</div>
<div class="salutation">Dear ${escHtml(hiring)},</div>
<p>${escHtml(opening)}</p>
<p>${escHtml(body).replace(/\n/g,'</p><p>')}</p>
<p>${escHtml(closing)}</p>
<div class="signature">Sincerely,<br><br>${escHtml(name)}</div>`;

  $('#preview').innerHTML=html;

  // Update labels
  $('#lbl-name').textContent=t('lblName');
  $('#lbl-email').textContent=t('lblEmail');
  $('#lbl-phone').textContent=t('lblPhone');
  $('#lbl-location').textContent=t('lblLocation');
  $('#lbl-company').textContent=t('lblCompany');
  $('#lbl-role').textContent=t('lblRole');
  $('#lbl-hiring').textContent=t('lblHiring');
  $('#lbl-exp').textContent=t('lblExp');
  $('#lbl-skills').textContent=t('lblSkills');
  $('#lbl-tone').textContent=t('lblTone');
  $('#lbl-preview').textContent=t('lblPreview');
}

['name','email','phone','location','company','role','hiring','exp','skills','tone'].forEach(id=>{
  $('#'+id).addEventListener('input',render);
});

$('#toolbar').innerHTML=`<button class="gz-btn" onclick="window.print()">🖨️ Print / Save as PDF</button><button class="gz-btn gz-btn-secondary" onclick="GZ.copyText(document.getElementById('preview').innerText)">${t('copy')}</button>`;

GZ.renderToolPage({category:'text',titleKey:'toolTitle',descKey:'toolDesc',howToSteps:['step1','step2','step3','step4'],related:[
  {icon:'📄',href:'/text/resume-builder.html',name:'Resume Builder'},
  {icon:'📑',href:'/text/citation-generator.html',name:'Citation Generator'},
  {icon:'🧾',href:'/text/invoice-generator.html',name:'Invoice Generator'},
  {icon:'✉️',href:'/text/email-signature.html',name:'Email Signature'},
]});
render();
</script>
<script src="/tools-result-rec.js" defer></script>
</body></html>
