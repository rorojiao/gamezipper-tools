<style>
.kanban-wrap{display:flex;gap:16px;overflow-x:auto;padding:8px 0;min-height:500px}
.kanban-col{min-width:280px;max-width:320px;flex-shrink:0;background:var(--glass2);border:1px solid var(--border);border-radius:16px;display:flex;flex-direction:column;max-height:650px}
.kanban-col-header{padding:14px 16px;font-weight:700;font-size:1em;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border)}
.kanban-col-header .count{background:var(--gz-accent);color:#fff;border-radius:12px;padding:2px 10px;font-size:.8em}
.kanban-col-body{padding:8px;overflow-y:auto;flex:1}
.kanban-card{background:var(--glass);border:1px solid var(--border);border-radius:10px;padding:12px;margin:6px 0;cursor:grab;transition:all .15s;position:relative}
.kanban-card:hover{border-color:var(--gz-accent);transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.1)}
.kanban-card.dragging{opacity:.5;transform:rotate(2deg)}
.kanban-card .card-title{font-weight:600;font-size:.95em;margin-bottom:4px}
.kanban-card .card-desc{font-size:.8em;color:var(--gz-muted);line-height:1.4}
.kanban-card .card-meta{display:flex;justify-content:space-between;align-items:center;margin-top:8px;font-size:.75em;color:var(--gz-muted)}
.kanban-card .card-del{position:absolute;top:6px;right:8px;cursor:pointer;opacity:0;transition:opacity .2s;font-size:.9em}
.kanban-card:hover .card-del{opacity:1}
.priority-high{border-left:3px solid #ff4757}
.priority-medium{border-left:3px solid #ffa502}
.priority-low{border-left:3px solid #2ed573}
.add-card-btn{width:100%;padding:10px;border:1px dashed var(--border);border-radius:8px;background:transparent;color:var(--gz-muted);cursor:pointer;font-size:.9em;transition:all .2s;margin-top:4px}
.add-card-btn:hover{border-color:var(--gz-accent);color:var(--gz-accent);background:var(--glass)}
.add-col-btn{min-width:200px;padding:20px;border:2px dashed var(--border);border-radius:16px;background:transparent;color:var(--gz-muted);cursor:pointer;font-size:1em;display:flex;align-items:center;justify-content:center;gap:8px;flex-shrink:0;transition:all .2s;align-self:flex-start}
.add-col-btn:hover{border-color:var(--gz-accent);color:var(--gz-accent)}
.card-form{padding:8px}
.card-form input,.card-form textarea,.card-form select{width:100%;padding:8px 10px;margin:4px 0;border:1px solid var(--border);border-radius:8px;background:var(--glass);color:var(--gz-text);font-size:.85em;box-sizing:border-box;font-family:inherit}
.card-form textarea{resize:vertical;min-height:60px}
.kanban-toolbar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.drop-indicator{height:4px;background:var(--gz-accent);border-radius:2px;margin:4px 0;transition:all .15s}
</style>

<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is a Kanban board?", "acceptedAnswer": {"@type": "Answer", "text": "A Kanban board is a visual project management tool that uses columns and cards to represent tasks and their progress. You can drag cards between columns like To Do, In Progress, and Done."}}, {"@type": "Question", "name": "Is my data saved?", "acceptedAnswer": {"@type": "Answer", "text": "Yes, your board is automatically saved to your browser's local storage. It persists across sessions on the same device."}}, {"@type": "Question", "name": "Can I export my Kanban board?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. Click the Export JSON button to download your entire board data as a JSON file that you can import later."}}, {"@type": "Question", "name": "How do I add a new column?", "acceptedAnswer": {"@type": "Answer", "text": "Click the '+ Add Column' button on the right side of the board. Enter a name for your new column and start adding cards."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="kanban-toolbar" id="toolbar"></div>
    <div class="kanban-wrap" id="board"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Kanban Board',
    toolDesc: 'Free online Kanban board for task management. Drag-and-drop cards, set priorities, export data — runs entirely in your browser.',
    exportJSON: 'Export JSON',
    importJSON: 'Import JSON',
    clearBoard: 'Clear Board',
    addColumn: '+ Add Column',
    addCard: '+ Add Card',
    columnName: 'Column name...',
    title: 'Title',
    description: 'Description (optional)',
    priority: 'Priority',
    high: 'High',
    medium: 'Medium',
    low: 'Low',
    save: 'Save',
    cancel: 'Cancel',
    delete: 'Delete',
    todo: 'To Do',
    inProgress: 'In Progress',
    done: 'Done',
    step1: 'Add columns to organize your workflow (e.g., To Do, In Progress, Done)',
    step2: 'Click "+ Add Card" in any column to create a new task',
    step3: 'Set priority (High, Medium, Low) and add descriptions',
    step4: 'Drag cards between columns to update their status',
  },
  zh: {
    toolTitle: '看板任务管理',
    toolDesc: '免费在线看板工具，用于任务管理。拖拽卡片、设置优先级、导出数据 — 完全在浏览器中运行。',
    exportJSON: '导出 JSON',
    importJSON: '导入 JSON',
    clearBoard: '清空看板',
    addColumn: '+ 添加列',
    addCard: '+ 添加卡片',
    columnName: '列名称...',
    title: '标题',
    description: '描述（可选）',
    priority: '优先级',
    high: '高',
    medium: '中',
    low: '低',
    save: '保存',
    cancel: '取消',
    delete: '删除',
    todo: '待办',
    inProgress: '进行中',
    done: '已完成',
    step1: '添加列来组织工作流程（如：待办、进行中、已完成）',
    step2: '在任意列中点击「添加卡片」创建新任务',
    step3: '设置优先级（高、中、低）并添加描述',
    step4: '拖拽卡片到不同列来更新状态',
  }
});

const { $, t } = GZ;
const STORAGE_KEY = 'gz-kanban-board';

let board = loadBoard();

function defaultBoard() {
  return {
    columns: [
      { id: 1, name: t('todo'), cards: [] },
      { id: 2, name: t('inProgress'), cards: [] },
      { id: 3, name: t('done'), cards: [] },
    ]
  };
}

function loadBoard() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) return JSON.parse(saved);
  } catch(e) {}
  return defaultBoard();
}

function saveBoard() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(board));
}

let nextId = Date.now();
function genId() { return ++nextId; }

function renderBoard() {
  const el = $('#board');
  let html = '';
  board.columns.forEach((col, ci) => {
    html += `<div class="kanban-col" data-col="${ci}">
      <div class="kanban-col-header">
        <span contenteditable="true" onblur="renameCol(${ci},this.textContent)">${col.name}</span>
        <span class="count">${col.cards.length}</span>
      </div>
      <div class="kanban-col-body" data-col="${ci}" ondragover="onDragOver(event)" ondrop="onDrop(event,${ci})">`;
    col.cards.forEach((card, ki) => {
      html += `<div class="kanban-card priority-${card.priority||'medium'}" draggable="true" data-col="${ci}" data-card="${ki}" ondragstart="onDragStart(event,${ci},${ki})" ondragend="onDragEnd(event)">
        <span class="card-del" onclick="delCard(${ci},${ki})">✕</span>
        <div class="card-title">${esc(card.title)}</div>
        ${card.desc ? `<div class="card-desc">${esc(card.desc)}</div>` : ''}
        <div class="card-meta"><span class="priority-${card.priority||'medium'}">${t(card.priority||'medium')}</span></div>
      </div>`;
    });
    html += `</div>
      <div style="padding:8px"><button class="add-card-btn" onclick="showCardForm(${ci})">${t('addCard')}</button></div>
    </div>`;
  });
  html += `<button class="add-col-btn" onclick="addCol()">📌 ${t('addColumn')}</button>`;
  el.innerHTML = html;
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function addCol() {
  const name = prompt(t('columnName'));
  if (!name) return;
  board.columns.push({ id: genId(), name, cards: [] });
  saveBoard(); renderBoard();
}

function renameCol(ci, name) {
  board.columns[ci].name = name.trim() || board.columns[ci].name;
  saveBoard();
}

function showCardForm(ci) {
  const body = document.querySelectorAll('.kanban-col-body')[ci];
  const existing = body.querySelector('.card-form');
  if (existing) existing.remove();
  const form = document.createElement('div');
  form.className = 'card-form';
  form.innerHTML = `
    <input placeholder="${t('title')}" id="cf-title">
    <textarea placeholder="${t('description')}" id="cf-desc"></textarea>
    <select id="cf-prio">
      <option value="medium">${t('medium')}</option>
      <option value="high">${t('high')}</option>
      <option value="low">${t('low')}</option>
    </select>
    <div style="display:flex;gap:6px;margin-top:6px">
      <button class="gz-btn" onclick="addCard(${ci})">${t('save')}</button>
      <button class="gz-btn gz-btn-secondary" onclick="this.closest('.card-form').remove()">${t('cancel')}</button>
    </div>`;
  body.appendChild(form);
  form.querySelector('#cf-title').focus();
}

function addCard(ci) {
  const col = document.querySelectorAll('.kanban-col')[ci];
  const title = col.querySelector('#cf-title').value.trim();
  if (!title) return;
  const desc = col.querySelector('#cf-desc').value.trim();
  const priority = col.querySelector('#cf-prio').value;
  board.columns[ci].cards.push({ id: genId(), title, desc, priority });
  saveBoard(); renderBoard();
}

function delCard(ci, ki) {
  board.columns[ci].cards.splice(ki, 1);
  saveBoard(); renderBoard();
}

// Drag & Drop
let dragData = null;
function onDragStart(e, ci, ki) {
  dragData = { ci, ki };
  e.target.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
}
function onDragEnd(e) { e.target.classList.remove('dragging'); }
function onDragOver(e) { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; }
function onDrop(e, ci) {
  e.preventDefault();
  if (!dragData) return;
  const card = board.columns[dragData.ci].cards.splice(dragData.ki, 1)[0];
  board.columns[ci].cards.push(card);
  dragData = null;
  saveBoard(); renderBoard();
}

// Toolbar
$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="exportJSON()">${t('exportJSON')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="importJSON()">${t('importJSON')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="clearBoard()">${t('clearBoard')}</button>`;

function exportJSON() {
  const blob = new Blob([JSON.stringify(board, null, 2)], {type:'application/json'});
  const a = document.createElement('a'); a.download = 'kanban-board.json'; a.href = URL.createObjectURL(blob); a.click();
}
function importJSON() {
  const inp = document.createElement('input'); inp.type = 'file'; inp.accept = '.json';
  inp.onchange = () => { const r = new FileReader(); r.onload = () => { try { board = JSON.parse(r.result); saveBoard(); renderBoard(); } catch(e) { alert('Invalid JSON'); } }; r.readAsText(inp.files[0]); };
  inp.click();
}
function clearBoard() {
  if (!confirm(t('clearBoard') + '?')) return;
  board = defaultBoard(); saveBoard(); renderBoard();
}

renderBoard();

GZ.renderToolPage({
  category: 'fun',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📋', href:'/text/notepad.html', name:'Notepad'},
    {icon:'✅', href:'/text/checklist.html', name:'Checklist'},
    {icon:'🍅', href:'/calc/pomodoro.html', name:'Pomodoro Timer'},
    {icon:'📖', href:'/fun/study-planner.html', name:'Study Planner'},
  ]
});
</script>
<script>new Image().src="https://site-analytics.gamezipper.com/hit?s=tools.gamezipper.com&p="+encodeURIComponent(location.pathname);</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
