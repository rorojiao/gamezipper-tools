const fmt2 = n => '$' + n.toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2});
const fmt  = n => '$' + Math.round(n).toLocaleString('en-US');
function pmt(rate, nper, pv){ if(rate<=0) return pv/nper; const r=rate/12; return pv*r/(1-Math.pow(1+r,-nper)); }

function calc(){
  const income = +$('#income').value || 0;
  const coInc  = +$('#coIncome').value || 0;
  const debts  = +$('#debts').value || 0;
  const down   = +$('#down').value || 0;
  const savings= +$('#savings').value || 0;
  const rate   = +$('#credit').value;
  const term   = (+$('#term').value) * 12;
  const taxRt  = +$('#taxRate').value || 0;
  const insYr  = +$('#insurance').value || 0;
  const hoa    = +$('#hoa').value || 0;

  const monthlyGross = (income + coInc) / 12;
  // Use 28/36: max housing 28% of gross, max total DTI 36%
  const maxHousing   = monthlyGross * 0.28;
  const maxDTI       = monthlyGross * 0.36 - debts;
  const monthlyCap   = Math.min(maxHousing, maxDTI) - hoa;
  // Search for max price where PITI+HOA <= monthlyCap
  let lo = 50000, hi = 5000000, best = 0;
  for (let i = 0; i < 60; i++) {
    const mid = (lo + hi) / 2;
    const loanAmt = mid - down;
    if (loanAmt <= 0) { hi = mid; continue; }
    const pi = pmt(rate, term, loanAmt);
    const taxM = mid * (taxRt/100) / 12;
    const insM = insYr / 12;
    const pmiRate = down/mid < 0.20 ? 0.007 : 0;
    const pmiM = loanAmt * pmiRate / 12;
    const total = pi + taxM + insM + hoa + pmiM;
    if (total <= monthlyCap) { best = mid; lo = mid; }
    else { hi = mid; }
  }
  const maxPrice = Math.max(0, Math.round(best / 1000) * 1000);
  if (maxPrice < 50000) maxPrice = 0;

  // Compute final breakdown at the affordable price
  const loanAmt = Math.max(0, maxPrice - down);
  const pi = loanAmt > 0 ? pmt(rate, term, loanAmt) : 0;
  const taxM = maxPrice * (taxRt/100) / 12;
  const insM = insYr / 12;
  const downPct = maxPrice > 0 ? down/maxPrice : 1;
  const pmiRate = downPct < 0.20 ? 0.007 : 0;
  const pmiM = loanAmt * pmiRate / 12;
  const monthlyTotal = pi + taxM + insM + hoa + pmiM;
  const dti = monthlyGross > 0 ? ((monthlyTotal + debts) / monthlyGross) * 100 : 0;

  // Mortgage readiness score (0-100)
  let score = 0;
  // DTI portion (40 points) — lower is better
  if (dti <= 28) score += 40;
  else if (dti <= 36) score += 30;
  else if (dti <= 43) score += 18;
  else score += 5;
  // Down payment portion (20 points)
  if (downPct >= 0.20) score += 20;
  else if (downPct >= 0.10) score += 14;
  else if (downPct >= 0.05) score += 8;
  else score += 3;
  // Credit score portion (20 points)
  if (rate <= 0.0685) score += 20;
  else if (rate <= 0.0725) score += 15;
  else if (rate <= 0.0825) score += 9;
  else score += 3;
  // Savings buffer portion (20 points)
  const monthsOfHousing = monthlyTotal > 0 ? savings / monthlyTotal : 0;
  if (monthsOfHousing >= 6) score += 20;
  else if (monthsOfHousing >= 3) score += 15;
  else if (monthsOfHousing >= 1) score += 8;
  else score += 2;

  // Render
  $('#m-maxPrice').textContent = maxPrice > 0 ? fmt(maxPrice) : '$0';
  $('#m-monthly').textContent = fmt2(Math.max(0, monthlyCap));
  $('#m-dti').textContent = dti.toFixed(1) + '%';
  $('#m-loan').textContent = fmt(loanAmt);
  $('#m-dti').parentElement.classList.remove('good','warn','bad');
  if (dti <= 28) $('#m-dti').parentElement.classList.add('good');
  else if (dti <= 36) $('#m-dti').parentElement.classList.add('warn');
  else $('#m-dti').parentElement.classList.add('bad');

  // Score
  $('#scoreNum').textContent = Math.round(score);
  $('#scoreBox').classList.remove('good','warn','bad');
  let sLabel, sDesc;
  if (score >= 75) { $('#scoreBox').classList.add('good'); sLabel = t('score3'); sDesc = t('ti1'); }
  else if (score >= 50) { $('#scoreBox').classList.add('warn'); sLabel = t('score2'); sDesc = t('ti2'); }
  else if (score >= 25) { sLabel = t('score1'); sDesc = t('ti2'); }
  else { $('#scoreBox').classList.add('bad'); sLabel = t('score0'); sDesc = t('ti3'); }
  $('#scoreLabel').textContent = sLabel;
  $('#scoreDesc').textContent = sDesc;

  // Bar
  const segs = [
    {name: t('pi'),  val: pi,   color:'#4ecdc4', hide: pi===0},
    {name: t('tax'), val: taxM, color:'#f59e0b'},
    {name: t('ins'), val: insM, color:'#3b82f6'},
    {name: t('hoa'), val: hoa,  color:'#8b5cf6', hide: hoa===0},
    {name: t('pmi'), val: pmiM, color:'#ef4444', hide: pmiM<0.5},
  ];
  const sum = segs.filter(s=>!s.hide).reduce((s,x)=>s+x.val,0) || 1;
  const bar = $('#bar');
  bar.innerHTML = '';
  const leg = $('#legend'); leg.innerHTML = '';
  segs.forEach(s=>{
    if (s.hide) return;
    const pct = (s.val/sum)*100;
    if (pct < 1) return;
    const seg = document.createElement('div');
    seg.className = 'ha-bar-seg';
    seg.style.width = pct + '%';
    seg.style.background = s.color;
    seg.textContent = pct > 9 ? (pct.toFixed(0)+'%') : '';
    bar.appendChild(seg);
    leg.innerHTML += '<span><i style="background:'+s.color+'"></i>'+s.name+': '+fmt2(s.val)+'</span>';
  });

  // Table
  const tbody = $('#tbody');
  tbody.innerHTML = '';
  const row = (n, v) => {
    const tr = document.createElement('tr');
    tr.innerHTML = '<td>'+n+'</td><td>'+fmt2(v)+'</td><td>'+((v/sum)*100).toFixed(1)+'%</td>';
    tbody.appendChild(tr);
  };
  segs.forEach(s => { if (!s.hide) row(s.name, s.val); });
  const tr = document.createElement('tr');
  tr.className = 'total';
  tr.innerHTML = '<td>Total monthly</td><td>'+fmt2(sum)+'</td><td>100.0%</td>';
  tbody.appendChild(tr);

  // Tips
  const tips = $('#tips'); tips.innerHTML = '';
  const downP = (downPct*100).toFixed(1);
  const mos = monthsOfHousing.toFixed(1);
  const dtiV = dti.toFixed(1);
  const verdict = dti <= 36 ? t('tipOk') : t('tipHi');
  const stretch = maxPrice > 0 ? '+12' : '0';
  const push = (s) => { const li = document.createElement('li'); li.innerHTML = s; tips.appendChild(li); };
  push(t('tip1').replace('{pct}', downP));
  push(t('tip2').replace('{months}', mos));
  push(t('tip3').replace('{dti}', dtiV).replace('{verdict}', verdict));
  push(t('tip4').replace('{stretch}', stretch));

  $('#results').style.display = 'block';
}

$('#btnCalc').addEventListener('click', calc);
$('#btnReset').addEventListener('click', ()=>{
  $('#income').value=75000; $('#coIncome').value=0; $('#debts').value=450;
  $('#down').value=60000; $('#savings').value=15000;
  $('#term').value=30; $('#taxRate').value=1.2; $('#insurance').value=1800; $('#hoa').value=0;
  $('#credit').value='0.0685';
  $('#results').style.display='none';
});
$('#btnFill').addEventListener('click', ()=>{
  $('#income').value=75000; $('#coIncome').value=0; $('#debts').value=380;
  $('#down').value=60000; $('#savings').value=15000;
  calc();
});
