const { $, copyText, t } = GZ;

function escapeHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function inlineMd(text) {
  // Escape HTML first
  let s = escapeHtml(text);
  // Inline code (do before others so content isn't formatted)
  s = s.replace(/`([^`]+)`/g, '<code>$1</code>');
  // Images ![alt](src)
  s = s.replace(/!\[([^\]]*)\]\(([^)\s]+)(?:\s+&quot;([^&]*)&quot;)?\)/g, '<img alt="$1" src="$2">');
  // Links [text](url)
  s = s.replace(/\[([^\]]+)\]\(([^)\s]+)\)/g, '<a href="$2">$1</a>');
  // Bold
  s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  s = s.replace(/__([^_]+)__/g, '<strong>$1</strong>');
  // Italic
  s = s.replace(/(?<!\*)\*([^*]+)\*(?!\*)/g, '<em>$1</em>');
  s = s.replace(/(?<!_)_([^_]+)_(?!_)/g, '<em>$1</em>');
  // Strikethrough
  s = s.replace(/~~([^~]+)~~/g, '<del>$1</del>');
  return s;
}

function renderMarkdown(md) {
  const lines = md.split('\n');
  let html = '';
  let i = 0;
  let inList = null;
  let inOrdered = null;
  let blockquoteBuf = [];

  function closeList() {
    if (inList !== null) { html += inOrdered ? '</ol>' : '</ul>'; inList = null; inOrdered = null; }
  }
  function flushBlockquote() {
    if (blockquoteBuf.length) {
      html += '<blockquote>' + blockquoteBuf.map(l => inlineMd(l)).join('<br>') + '</blockquote>';
      blockquoteBuf = [];
    }
  }

  while (i < lines.length) {
    let line = lines[i];

    // Fenced code block
    const fence = line.match(/^```\s*(\w+)?\s*$/);
    if (fence) {
      closeList(); flushBlockquote();
      const lang = fence[1] || '';
      let code = [];
      i++;
      while (i < lines.length && !lines[i].match(/^```\s*$/)) { code.push(lines[i]); i++; }
      i++; // skip closing ```
      html += `<pre><code>${escapeHtml(code.join('\n'))}</code></pre>`;
      continue;
    }

    // Heading
    const h = line.match(/^(#{1,6})\s+(.*)$/);
    if (h) {
      closeList(); flushBlockquote();
      const level = h[1].length;
      html += `<h${level}>${inlineMd(h[2])}</h${level}>`;
      i++; continue;
    }

    // Horizontal rule
    if (line.match(/^(\*\*\*|---|___)\s*$/)) {
      closeList(); flushBlockquote();
      html += '<hr>';
      i++; continue;
    }

    // Table (header row + separator row)
    if (line.includes('|') && i + 1 < lines.length && lines[i+1].match(/^\s*\|?[\s\-:|]+\|?\s*$/)) {
      closeList(); flushBlockquote();
      const headers = line.split('|').map(s => s.trim()).filter(s => s !== '' || true);
      // Clean edges
      const parseRow = (r) => {
        let parts = r.split('|');
        if (parts[0].trim() === '') parts.shift();
        if (parts[parts.length-1].trim() === '') parts.pop();
        return parts;
      };
      const hCells = parseRow(line);
      i += 2; // skip header + separator
      html += '<table><thead><tr>';
      hCells.forEach(c => html += `<th>${inlineMd(c.trim())}</th>`);
      html += '</tr></thead><tbody>';
      while (i < lines.length && lines[i].includes('|') && lines[i].trim()) {
        const cells = parseRow(lines[i]);
        html += '<tr>';
        cells.forEach(c => html += `<td>${inlineMd(c.trim())}</td>`);
        html += '</tr>';
        i++;
      }
      html += '</tbody></table>';
      continue;
    }

    // Blockquote
    const bq = line.match(/^>\s?(.*)$/);
    if (bq) {
      closeList();
      blockquoteBuf.push(bq[1]);
      i++; continue;
    } else {
      flushBlockquote();
    }

    // Task list / unordered list
    const task = line.match(/^[\s]*[-*+]\s+\[([ xX])\]\s+(.*)$/);
    const ul = line.match(/^[\s]*[-*+]\s+(.*)$/);
    const ol = line.match(/^[\s]*\d+\.\s+(.*)$/);

    if (task) {
      if (inList !== 'ul') { closeList(); html += '<ul>'; inList = 'ul'; inOrdered = false; }
      const checked = task[1].toLowerCase() === 'x' ? 'checked' : '';
      html += `<li class="task-list-item"><input type="checkbox" ${checked} disabled> ${inlineMd(task[2])}</li>`;
      i++; continue;
    }
    if (ul) {
      if (inList !== 'ul') { closeList(); html += '<ul>'; inList = 'ul'; inOrdered = false; }
      html += `<li>${inlineMd(ul[1])}</li>`;
      i++; continue;
    }
    if (ol) {
      if (inList !== 'ol') { closeList(); html += '<ol>'; inList = 'ol'; inOrdered = true; }
      html += `<li>${inlineMd(ol[1])}</li>`;
      i++; continue;
    }

    // Empty line
    if (line.trim() === '') {
      closeList(); flushBlockquote();
      i++; continue;
    }

    // Paragraph (collect consecutive non-empty, non-special lines)
    closeList(); flushBlockquote();
    let para = [line];
    i++;
    while (i < lines.length && lines[i].trim() !== '' &&
      !lines[i].match(/^#{1,6}\s/) &&
      !lines[i].match(/^```\s*(\w+)?\s*$/) &&
      !lines[i].match(/^(\*\*\*|---|___)\s*$/) &&
      !lines[i].match(/^>\s?/) &&
      !lines[i].match(/^[\s]*[-*+]\s/) &&
      !lines[i].match(/^[\s]*\d+\.\s/)) {
      para.push(lines[i]);
      i++;
    }
    html += `<p>${inlineMd(para.join(' '))}</p>`;
  }
  closeList(); flushBlockquote();
  return html;
}

function doRender() {
  const md = $('#input').value;
  if (!md.trim()) { $('#output').innerHTML = '<p style="color:#999">—</p>'; return; }
  try {
    $('#output').innerHTML = renderMarkdown(md);
  } catch(e) {
    $('#output').innerHTML = '<p style="color:#d73a49">Error: ' + escapeHtml(e.message) + '</p>';
  }
}

function doClear() { $('#input').value = ''; $('#output').innerHTML = '<p style="color:#999">—</p>'; }

// Drag and drop support
document.addEventListener('dragover', e => { e.preventDefault(); });
document.addEventListener('drop', e => {
  e.preventDefault();
  const file = e.dataTransfer.files[0];
  if (file && (file.name.endsWith('.md') || file.name.endsWith('.markdown') || file.name.endsWith('.txt'))) {
    const reader = new FileReader();
    reader.onload = ev => { $('#input').value = ev.target.result; doRender(); };
    reader.readAsText(file);
  }
});
