const { $, copyText, t } = GZ;

function parseCsv(text, delim) {
  const rows = [];
  let row = [], field = '', inQuotes = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    if (inQuotes) {
      if (c === '"') {
        if (text[i + 1] === '"') { field += '"'; i++; }
        else inQuotes = false;
      } else field += c;
    } else {
      if (c === '"') inQuotes = true;
      else if (c === delim) { row.push(field); field = ''; }
      else if (c === '\n') { row.push(field); rows.push(row); row = []; field = ''; }
      else if (c === '\r') { /* skip */ }
      else field += c;
    }
  }
  if (field !== '' || row.length) { row.push(field); rows.push(row); }
  return rows.filter(r => r.length && !(r.length === 1 && r[0] === ''));
}

function escapeLatex(s) {
  return String(s)
    .replace(/\\/g, '\\textbackslash{}')
    .replace(/([&%$#_{}])/g, '\\$1')
    .replace(/~/g, '\\textasciitilde{}')
    .replace(/\^/g, '\\textasciicircum{}');
}

function convert() {
  const inp = $('#input').value;
  if (!inp.trim()) { $('#output').innerHTML = ''; $('#status').innerHTML = ''; return; }
  try {
    const delim = $('#sep').value;
    const rows = parseCsv(inp, delim);
    if (!rows.length) throw new Error('No data rows found');
    const ncols = Math.max(...rows.map(r => r.length));
    const alignVal = $('#alignSel').value;
    let colspec;
    if (alignVal === 'custom') {
      colspec = ($('#customAlign').value || 'l'.repeat(ncols)).trim();
    } else {
      colspec = alignVal.repeat(ncols);
    }

    const useBooktabs = $('#booktabs').checked;
    const caption = $('#caption').value.trim();
    const label = $('#label').value.trim();
    const escRows = rows.map(r => {
      const padded = r.slice();
      while (padded.length < ncols) padded.push('');
      return padded.map(escapeLatex);
    });

    const lines = [];
    if (caption || label) lines.push('\\begin{table}[htbp]');
    lines.push('  \\centering');
    lines.push(`  \\begin{tabular}{${colspec}}`);
    if (useBooktabs) lines.push('    \\toprule');

    // Header
    lines.push('    ' + escRows[0].join(' & ') + ' \\\\');
    if (escRows.length > 1) {
      if (useBooktabs) lines.push('    \\midrule');
      else lines.push('    \\hline');
      for (let i = 1; i < escRows.length; i++) {
        lines.push('    ' + escRows[i].join(' & ') + ' \\\\');
      }
    }
    if (useBooktabs) lines.push('    \\bottomrule');
    else lines.push('    \\hline');
    lines.push('  \\end{tabular}');
    if (caption) lines.push(`  \\caption{${escapeLatex(caption)}}`);
    if (label) lines.push(`  \\label{${escapeLatex(label)}}`);
    if (caption || label) lines.push('\\end{table}');

    $('#output').textContent = lines.join('\n');
    $('#status').innerHTML = `<span style="color:var(--gz-success)">${t('valid')} (${rows.length} × ${ncols})</span>`;
  } catch (e) {
    $('#status').innerHTML = `<span style="color:var(--gz-accent)">✗ ${e.message}</span>`;
    $('#output').innerHTML = `<span style="color:var(--gz-accent)">${e.message}</span>`;
  }
}

function loadExample() {
  $('#input').value = `Name,Role,Salary,Tenure (years)
Alice Johnson,Engineer,"$95,000",4.5
Bob Smith,Designer,"$82,500",2
Carol Lee & Co.,Manager,"$110,000",7.25
Dan O'Brien,Intern,"$45,000",0.5`;
  convert();
}

function doClear() { $('#input').value = ''; $('#output').innerHTML = ''; $('#status').innerHTML = ''; }

$('#opts').innerHTML = `
  <div class="opt-row">

      <select id="alignSel" onchange="convert()">
        <option value="l">↤ left (l)</option>

    <label style="display:none" id="customWrap">${t('alignCustom')}:
      <input type="text" id="customAlign" value="|l|c|r|" size="14" oninput="convert()">
    </label>
    <label><input type="checkbox" id="booktabs" checked onchange="convert()"> ${t('booktabs')}</label>
    <label>${t('sep')}:
      <select id="sep" onchange="convert()">
        <option value=",">,</option>
        <option value=";">;</option>
        <option value="\t">\\t (tab)</option>

    </label>
    <label>${t('caption')}: <input type="text" id="caption" placeholder="Staff salaries 2026" oninput="convert()"></label>
    <label>${t('label')}: <input type="text" id="label" placeholder="tab:salaries" oninput="convert()"></label>

$('#alignSel').addEventListener('change', () => {
  $('#customWrap').style.display = $('#alignSel').value === 'custom' ? '' : 'none';
