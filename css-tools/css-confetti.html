<script>
GZI18n.register({
  en: {
    toolTitle: 'CSS Confetti Animation Generator',
    toolDesc: 'Generate a festive CSS confetti animation for celebrations. Customize colors, count, speed and size — get clean HTML + CSS.',
    pieceCount: 'Piece Count',
    fallSpeed: 'Fall Speed (seconds)',
    pieceSize: 'Piece Size (px)',
    color1: 'Color 1',
    color2: 'Color 2',
    color3: 'Color 3',
    color4: 'Color 4',
    color5: 'Color 5',
    shape: 'Piece Shape',
    step1: 'Choose the number of confetti pieces',
    step2: 'Pick 5 colors for the confetti',
    step3: 'Adjust fall speed and piece size',
    step4: 'Copy the CSS and HTML to your project',
  },
  zh: {
    toolTitle: 'CSS 彩纸动画生成器',
    toolDesc: '生成庆祝用的 CSS 彩纸动画。自定义颜色、数量、速度和大小 — 获取干净的 HTML + CSS。',
    pieceCount: '碎片数量',
    fallSpeed: '下落速度（秒）',
    pieceSize: '碎片大小（px）',
    color1: '颜色 1',
    color2: '颜色 2',
    color3: '颜色 3',
    color4: '颜色 4',
    color5: '颜色 5',
    shape: '碎片形状',
    step1: '选择彩纸碎片数量',
    step2: '为彩纸选择 5 种颜色',
    step3: '调整下落速度和碎片大小',
    step4: '复制 CSS 和 HTML 到你的项目',
  }
});

const { $, copyText, t } = GZ;

function generate() {
  var count = parseInt($('#opt-count').value) || 30;
  var speed = parseInt($('#opt-speed').value) || 3;
  var size = parseInt($('#opt-size').value) || 10;
  var colors = [
    $('#opt-c1').value || '#ff6b6b',
    $('#opt-c2').value || '#4ecdc4',
    $('#opt-c3').value || '#ffd93d',
    $('#opt-c4').value || '#a78bfa',
    $('#opt-c5').value || '#34d399'
  ];
  var shape = $('#opt-shape').value || 'square';
  var radius = shape === 'circle' ? '50%' : shape === 'square' ? '2px' : '0';

  // Update preview
  var previewHTML = [];
  for (var i = 0; i < count; i++) {
    var left = Math.random() * 100;
    var delay = Math.random() * 2;
    var dur = speed + Math.random() * 2;
    var color = colors[i % colors.length];
    previewHTML.push('<span class="gz-confetti-demo" style="left:' + left + '%;width:' + size + 'px;height:' + size + 'px;background:' + color + ';border-radius:' + radius + ';animation-delay:' + delay + 's;animation-duration:' + dur + 's"></span>');
  }
  $('#preview-box').innerHTML = '<div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#fff;font-size:1.5rem;font-weight:bold;z-index:0">🎉 Celebration!</div>' + previewHTML.join('');

  // Generate code
  var piecesHTML = [];
  var stylesCSS = [];
  piecesHTML.push('<!-- HTML -->');
  piecesHTML.push('<div class="confetti-container">');
  for (var i = 0; i < count; i++) {
    var left = (Math.random() * 100).toFixed(1);
    var delay = (Math.random() * 2).toFixed(2);
    var dur = (speed + Math.random() * 2).toFixed(1);
    var color = colors[i % colors.length];
    piecesHTML.push('  <span class="confetti" style="left:' + left + '%;background:' + color + ';animation-delay:' + delay + 's;animation-duration:' + dur + 's"></span>');
  }
  piecesHTML.push('</div>');
  piecesHTML.push('');
  piecesHTML.push('/* CSS */');
  piecesHTML.push('.confetti-container {');
  piecesHTML.push('  position: absolute;');
  piecesHTML.push('  top: 0; left: 0; width: 100%; height: 100%;');
  piecesHTML.push('  pointer-events: none;');
  piecesHTML.push('  overflow: hidden;');
  piecesHTML.push('}');
  piecesHTML.push('');
  piecesHTML.push('.confetti {');
  piecesHTML.push('  position: absolute;');
  piecesHTML.push('  width: ' + size + 'px;');
  piecesHTML.push('  height: ' + size + 'px;');
  piecesHTML.push('  top: -20px;');
  piecesHTML.push('  border-radius: ' + radius + ';');
  piecesHTML.push('  animation: fall ' + speed + 's linear infinite;');
  piecesHTML.push('}');
  piecesHTML.push('');
  piecesHTML.push('@keyframes fall {');
  piecesHTML.push('  0% { transform: translateY(0) rotate(0deg); opacity: 1; }');
  piecesHTML.push('  100% { transform: translateY(100vh) rotate(720deg); opacity: 0.5; }');
  piecesHTML.push('}');

  $('#output').textContent = piecesHTML.join('\n');
}

$('#options').innerHTML = [
  '<div class="gz-opt">',
    '<label>' + t('pieceCount') + '</label>',
    '<input type="number" id="opt-count" value="30" min="5" max="100">',
    '<label style="margin-top:8px">' + t('fallSpeed') + '</label>',
    '<input type="number" id="opt-speed" value="3" min="1" max="15">',
    '<label style="margin-top:8px">' + t('pieceSize') + '</label>',
    '<input type="number" id="opt-size" value="10" min="4" max="30">',
    '<label style="margin-top:8px">' + t('shape') + '</label>',
    '<select id="opt-shape">',
      '<option value="square">Square</option>',
      '<option value="circle">Circle</option>',
      '<option value="rect">Rectangle</option>',
    '</select>',
  '</div>',
  '<div class="gz-opt">',
    '<label>' + t('color1') + '</label>',
    '<input type="color" id="opt-c1" value="#ff6b6b">',
    '<label style="margin-top:8px">' + t('color2') + '</label>',
    '<input type="color" id="opt-c2" value="#4ecdc4">',
    '<label style="margin-top:8px">' + t('color3') + '</label>',
    '<input type="color" id="opt-c3" value="#ffd93d">',
  '</div>',
  '<div class="gz-opt">',
    '<label>' + t('color4') + '</label>',
    '<input type="color" id="opt-c4" value="#a78bfa">',
    '<label style="margin-top:8px">' + t('color5') + '</label>',
    '<input type="color" id="opt-c5" value="#34d399">',
  '</div>'
].join('\n');

$('#toolbar').innerHTML = [
  '<button class="gz-btn" onclick="generate()">' + t('generate') + '</button>',
  '<button class="gz-btn" onclick="copyText($(\'#output\').textContent)">' + t('copy') + '</button>'
].join('');

document.querySelectorAll('#options input, #options select').forEach(function(el) {
  el.addEventListener('input', generate);
  el.addEventListener('change', generate);
});

GZ.renderToolPage({
  category: 'css',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],

    {icon:'🎲', href:'/css-tools/css-3d-cube.html', name:'3D Cube'},
    {icon:'✨', href:'/css-tools/animation.html', name:'CSS Animation'},
    {icon:'🎨', href:'/css-tools/glassmorphism.html', name:'Glassmorphism'},
  ]
});

generate();
</script>
