<style>
.up-controls{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin:14px 0}
.up-card{background:var(--glass2);border:1px solid var(--border);border-radius:12px;padding:14px}
.up-card label{display:block;font-size:.75rem;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.up-card select,.up-card input[type=number]{width:100%;padding:9px 10px;background:var(--bg2);color:var(--text);border:1px solid var(--border);border-radius:8px;font-size:.95em}
.up-scale-row{display:flex;gap:6px;flex-wrap:wrap}
.up-scale{flex:1;min-width:54px;text-align:center;padding:9px 4px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;cursor:pointer;font-weight:700;font-size:.95em;transition:all .15s}
.up-scale.active{border-color:var(--accent);background:var(--glass);box-shadow:0 0 0 2px var(--accent);color:var(--accent)}

.up-stat .lbl{font-size:.7rem;color:var(--text2);text-transform:uppercase;margin-bottom:4px}
.up-stat .val{font-size:1rem;font-weight:700;font-family:monospace}
.up-preview{display:flex;gap:1rem;flex-wrap:wrap;justify-content:center;margin:14px 0}
.up-preview img{max-width:340px;max-height:300px;border-radius:8px;border:1px solid var(--border)}

<script type="application/ld+json">{"@context":"https://schema.org","@type":"WebApplication","name":"Image Upscaler","description":"Free online image upscaler. Enlarge images by 2x, 3x or 4x with high-quality bicubic interpolation. Runs entirely in your browser.","url":"https://tools.gamezipper.com/image/upscale.html","applicationCategory":"Utility","operatingSystem":"Web Browser","offers":{"@type":"Offer","price":"0"}}</script>
<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "How do I upscale an image without losing quality?", "acceptedAnswer": {"@type": "Answer", "text": "Upload your image, pick a scale factor (2x, 3x or 4x), enable high-quality smoothing and click Upscale. The tool redraws your image at the larger size using the browser's high-quality bicubic interpolation, which preserves edges far better than a normal resize."}}, {"@type": "Question", "name": "Does upscaling really add new detail?", "acceptedAnswer": {"@type": "Answer", "text": "Upscaling cannot invent detail that was not in the original, but high-quality bicubic interpolation smooths edges and reduces pixelation so the enlarged image looks much cleaner than a nearest-neighbor resize. For best results start from the highest-resolution source you have."}}, {"@type": "Question", "name": "Is my image uploaded to a server?", "acceptedAnswer": {"@type": "Answer", "text": "No. The entire upscaling process runs locally in your browser using the HTML Canvas API. Your image never leaves your device, so it stays completely private."}}, {"@type": "Question", "name": "What output formats are supported?", "acceptedAnswer": {"@type": "Answer", "text": "You can download the upscaled image as PNG, JPEG or WebP. PNG is lossless and recommended for artwork and screenshots; JPEG gives the smallest files for photos; WebP offers a great balance of quality and size."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="gz-dropzone" id="dropzone" onclick="document.getElementById('fileIn').click()">
      <span class="icon">🖼️</span>
      <p id="dropText"></p>
      <input type="file" id="fileIn" accept="image/png,image/jpeg,image/webp,image/bmp,image/gif" hidden>
    </div>
    <div class="up-controls" id="controls" style="display:none">
      <div class="up-card">
        <label id="lbl-scale">Scale factor</label>
        <div class="up-scale-row" id="scaleRow">
          <div class="up-scale" data-s="2">2x</div>
          <div class="up-scale active" data-s="3">3x</div>
          <div class="up-scale" data-s="4">4x</div>
          <div class="up-scale" data-s="custom">Custom</div>
        </div>
        <input type="number" id="customScale" value="3" min="1.1" max="16" step="0.1" style="margin-top:8px;display:none">
      </div>
      <div class="up-card">
        <label id="lbl-smooth">Smoothing</label>
        <select id="smooth">
          <option value="high" id="opt-high">High quality (bicubic)</option>
          <option value="medium" id="opt-med">Medium</option>
          <option value="low" id="opt-low">Low (pixelated)</option>
        </select>
      </div>
      <div class="up-card">
        <label id="lbl-format">Output format</label>
        <select id="format">
          <option value="png">PNG</option>
          <option value="jpeg">JPEG</option>
          <option value="webp">WebP</option>
        </select>
      </div>
      <div class="up-card">
        <label id="lbl-quality">JPEG/WebP quality</label>
        <input type="number" id="quality" value="92" min="1" max="100" step="1">
      </div>
    </div>
    <div class="up-status" id="status"></div>
    <div class="up-stats" id="stats"></div>
    <div class="up-preview" id="preview"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Image Upscaler',
    toolDesc: 'Enlarge and upscale images by 2x, 3x or 4x using high-quality bicubic interpolation. Sharpen photos, artwork and screenshots without uploading — runs entirely in your browser.',
    dropText: 'Drop an image here or click to choose a file',
    scale: 'Scale factor',
    smooth: 'Smoothing',
    optHigh: 'High quality (bicubic)',
    optMed: 'Medium',
    optLow: 'Low (pixelated)',
    format: 'Output format',
    quality: 'JPEG/WebP quality',
    step: 'Step',
    customScale: 'Custom scale (1.1 - 16x)',
    original: 'Original',
    upscaled: 'Upscaled',
    statusWorking: 'Upscaling…',
    statusDone: '✓ Image upscaled successfully',
    statusErr: '✗ Error: ',
    tooLarge: 'Output too large for canvas — try a smaller scale',
    step1: 'Drop or upload a PNG, JPG, WebP, BMP or GIF image',
    step2: 'Choose a scale factor (2x/3x/4x) and smoothing level',
    step3: 'Click Upscale — the image is enlarged with bicubic smoothing',
    step4: 'Download the result in PNG, JPEG or WebP format',
  },
  zh: {
    toolTitle: '图片放大 / 高清放大工具',
    toolDesc: '通过高质量双三次插值将图片放大 2x、3x 或 4x。让照片、插画和截图放大后依然清晰，完全浏览器本地运行，无需上传。',
    dropText: '拖入图片或点击选择文件',
    scale: '放大倍数',
    smooth: '平滑方式',
    optHigh: '高质量（双三次）',
    optMed: '中等',
    optLow: '低（像素化）',
    format: '输出格式',
    quality: 'JPEG/WebP 质量',
    step: '倍',
    customScale: '自定义倍数（1.1 - 16x）',
    original: '原始',
    upscaled: '放大后',
    statusWorking: '正在放大…',
    statusDone: '✓ 图片放大成功',
    statusErr: '✗ 错误：',
    tooLarge: '输出尺寸过大，请尝试较小的倍数',
    step1: '拖入或上传 PNG、JPG、WebP、BMP 或 GIF 图片',
    step2: '选择放大倍数（2x/3x/4x）和平滑级别',
    step3: '点击放大 — 使用双三次平滑放大图片',
    step4: '下载 PNG、JPEG 或 WebP 格式的结果',
  }
});

const { $, t } = GZ;
let sourceFile = null, sourceUrl = null, outputBlob = null, outputUrl = null;
let scaleMode = '3';

$('#dropText').textContent = t('dropText');

['dragenter','dragover'].forEach(ev => $('#dropzone').addEventListener(ev, e => { e.preventDefault(); $('#dropzone').classList.add('dragover'); }));
['dragleave','drop'].forEach(ev => $('#dropzone').addEventListener(ev, e => { e.preventDefault(); $('#dropzone').classList.remove('dragover'); }));
$('#dropzone').addEventListener('drop', e => { if (e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]); });
$('#fileIn').addEventListener('change', e => { if (e.target.files[0]) loadFile(e.target.files[0]); });

$('#scaleRow').querySelectorAll('.up-scale').forEach(el => el.addEventListener('click', () => {
  $('#scaleRow').querySelectorAll('.up-scale').forEach(x => x.classList.remove('active'));
  el.classList.add('active');
  scaleMode = el.dataset.s;
  $('#customScale').style.display = scaleMode === 'custom' ? 'block' : 'none';
}));

function loadFile(file) {
  sourceFile = file;
  if (sourceUrl) URL.revokeObjectURL(sourceUrl);
  sourceUrl = URL.createObjectURL(file);
  $('#dropzone').style.display = 'none';
  $('#controls').style.display = 'grid';
  $('#status').textContent = file.name + ' — ' + file.type + ' (' + formatBytes(file.size) + ')';
  $('#preview').innerHTML = `<div style="text-align:center"><div style="color:var(--text2);font-size:.8rem;margin-bottom:4px">${t('original')}</div><img src="${sourceUrl}" alt="original"></div>`;
  $('#stats').innerHTML = '';
  outputBlob = null;
}

function getScale() {
  if (scaleMode === 'custom') return Math.max(1.1, Math.min(16, parseFloat($('#customScale').value) || 2));
  return parseInt(scaleMode, 10);
}

function formatBytes(b) {
  if (b < 1024) return b + ' B';
  if (b < 1048576) return (b / 1024).toFixed(1) + ' KB';
  return (b / 1048576).toFixed(2) + ' MB';
}

function loadImage(src) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => resolve(img);
    img.onerror = () => reject(new Error('Image load failed'));
    img.src = src;
  });
}

async function upscale() {
  if (!sourceUrl) return;
  $('#status').textContent = t('statusWorking');
  $('#status').className = 'up-status';
  $('#preview').innerHTML = '';
  try {
    const img = await loadImage(sourceUrl);
    const scale = getScale();
    const w = Math.round(img.naturalWidth * scale);
    const h = Math.round(img.naturalHeight * scale);
    if (w > 16384 || h > 16384 || w * h > 100000000) {
      $('#status').textContent = t('tooLarge');
      $('#status').className = 'up-status';
      $('#preview').innerHTML = `<div style="text-align:center"><div style="color:var(--text2);font-size:.8rem;margin-bottom:4px">${t('original')}</div><img src="${sourceUrl}" alt="original"></div>`;
      return;
    }
    const canvas = document.createElement('canvas');
    canvas.width = w; canvas.height = h;
    const ctx = canvas.getContext('2d');
    ctx.imageSmoothingEnabled = true;
    ctx.imageSmoothingQuality = $('#smooth').value;
    // Step-up scaling for better quality on large factors
    let curW = img.naturalWidth, curH = img.naturalHeight;
    let curCanvas = document.createElement('canvas');
    curCanvas.width = curW; curCanvas.height = curH;
    curCanvas.getContext('2d').drawImage(img, 0, 0);
    while (curW * 2 <= w) {
      const next = document.createElement('canvas');
      next.width = curW * 2; next.height = curH * 2;
      const nctx = next.getContext('2d');
      nctx.imageSmoothingEnabled = true;
      nctx.imageSmoothingQuality = $('#smooth').value;
      nctx.drawImage(curCanvas, 0, 0, next.width, next.height);
      curCanvas = next; curW = next.width; curH = next.height;
    }
    ctx.drawImage(curCanvas, 0, 0, w, h);

    const fmt = $('#format').value;
    const q = (parseInt($('#quality').value, 10) || 92) / 100;
    const mime = fmt === 'png' ? 'image/png' : (fmt === 'webp' ? 'image/webp' : 'image/jpeg');
    await new Promise(resolve => {
      canvas.toBlob(blob => {
        outputBlob = blob;
        if (outputUrl) URL.revokeObjectURL(outputUrl);
        outputUrl = URL.createObjectURL(blob);
        resolve();
      }, mime, q);
    });

    $('#stats').innerHTML = `
      <div class="up-stat"><div class="lbl">${t('original')}</div><div class="val">${img.naturalWidth}×${img.naturalHeight}</div></div>
      <div class="up-stat"><div class="lbl">${t('upscaled')}</div><div class="val">${w}×${h}</div></div>
      <div class="up-stat"><div class="lbl">Scale</div><div class="val">${scale}x</div></div>
      <div class="up-stat"><div class="lbl">Size</div><div class="val">${formatBytes(outputBlob.size)}</div></div>`;
    $('#preview').innerHTML = `<div><div style="text-align:center;color:var(--text2);font-size:.8rem;margin-bottom:4px">${t('original')} (${img.naturalWidth}×${img.naturalHeight})</div><img src="${sourceUrl}" alt="original"></div><div><div style="text-align:center;color:var(--text2);font-size:.8rem;margin-bottom:4px">${t('upscaled')} (${w}×${h})</div><img src="${outputUrl}" alt="upscaled"></div>`;
    $('#status').textContent = t('statusDone');
    $('#status').className = 'up-status ok';
  } catch (e) {
    $('#status').textContent = t('statusErr') + e.message;
  }
}

function download() {
  if (!outputBlob) return;
  const fmt = $('#format').value;
  const base = (sourceFile?.name || 'image').replace(/\.[^.]+$/, '');
  const a = document.createElement('a');
  a.href = outputUrl;
  a.download = base + '-upscaled.' + (fmt === 'jpeg' ? 'jpg' : fmt);
  document.body.appendChild(a); a.click(); a.remove();
}

$('#toolbar').innerHTML = `<button class="gz-btn" onclick="upscale()">${t('upscaled')}</button><button class="gz-btn" onclick="download()">${t('download')}</button><button class="gz-btn gz-btn-secondary" onclick="reset()">${t('clear')}</button>`;

function reset() {
  if (sourceUrl) URL.revokeObjectURL(sourceUrl);
  if (outputUrl) URL.revokeObjectURL(outputUrl);
  sourceFile = null; sourceUrl = null; outputBlob = null; outputUrl = null;
  $('#fileIn').value = '';
  $('#dropzone').style.display = 'block';
  $('#controls').style.display = 'none';
  $('#status').textContent = '';
  $('#stats').innerHTML = '';
  $('#preview').innerHTML = '';
}

GZ.renderToolPage({
  category: 'image',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📐', href:'/image/resizer.html', name:'Image Resizer'},
    {icon:'📏', href:'/image/resize-percentage.html', name:'Resize by %'},
    {icon:'🔍', href:'/image/denoise.html', name:'Image Denoise'},
    {icon:'🎨', href:'/image/filters.html', name:'Image Filters'},
  ]
});
</script>
<script src="/tools-result-rec.js?v=20260707v520" defer></script>
</body>
</html>
