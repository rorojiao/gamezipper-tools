let indentSize = 2;
const { $, copyText, t } = GZ;

function formatCSS(css, indent) {
  const tab = ' '.repeat(indent);
  // Remove comments temporarily
  const comments = [];
  css = css.replace(/\/\*[\s\S]*?\*\//g, m => { comments.push(m); return `__COMMENT_${comments.length-1}__`; });

  // Normalize whitespace
  css = css.replace(/\s+/g, ' ').trim();

  let result = '';
  let level = 0;
  let i = 0;

  while (i < css.length) {
    // @ rules
    if (css[i] === '@') {
      const braceIdx = css.indexOf('{', i);
      const semiIdx = css.indexOf(';', i);
      if (semiIdx !== -1 && (braceIdx === -1 || semiIdx < braceIdx)) {
        // @import etc - no braces
        const rule = css.substring(i, semiIdx + 1);
        result += tab.repeat(level) + rule + '\n';
        i = semiIdx + 1;
        continue;
      }
    }

    // Skip whitespace
    if (css[i] === ' ') { i++; continue; }

    // Opening brace
    if (css[i] === '{') {
      result += ' {\n';
      level++;
      i++;
      continue;
    }

    // Closing brace
    if (css[i] === '}') {
      if (level > 0) level--;
      result += tab.repeat(level) + '}\n';
      i++;
      continue;
    }

    // Property: value; inside a block
    if (level > 0) {
      const semiIdx = css.indexOf(';', i);
      const braceIdx2 = css.indexOf('}', i);
      if (semiIdx !== -1 && semiIdx < braceIdx2) {
        const prop = css.substring(i, semiIdx + 1).trim();
        if (prop) result += tab.repeat(level) + prop + '\n';
        i = semiIdx + 1;
        continue;
      }
    }

    // Selector or @rule before {
    const braceIdx = css.indexOf('{', i);
    const semiIdx3 = css.indexOf(';', i);
    let endIdx;
    if (braceIdx === -1 && semiIdx3 === -1) {
      // Remaining text
      const rest = css.substring(i).trim();
      if (rest) result += tab.repeat(level) + rest + '\n';
      break;
    } else if (braceIdx === -1) {
      endIdx = semiIdx3;
    } else if (semiIdx3 === -1) {
      endIdx = braceIdx;
    } else {
      endIdx = Math.min(braceIdx, semiIdx3);
    }
    const selector = css.substring(i, endIdx).trim();
    if (selector) result += tab.repeat(level) + selector;
    i = endIdx;
  }

  // Restore comments
  result = result.replace(/__COMMENT_(\d+)__/g, (_, idx) => comments[parseInt(idx)]);

  return result.trim();
}

function syntaxHighlightCSS(css) {
  return css
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/(\/\*[\s\S]*?\*\/)/g, '<span class="css-comment">$1</span>')
    .replace(/(@[\w-]+)/g, '<span class="css-atrule">$1</span>')
    .replace(/^([^{}\n@\/][^{}\n]*?)(\{)/gm, '<span class="css-selector">$1</span>{')
    .replace(/([\w-]+)(\s*:\s*)/g, '<span class="css-property">$1</span>$2');
}

function doFormat() {
  const inp = $('#input').value.trim();
  if (!inp) return;
  try {
    const formatted = formatCSS(inp, indentSize);
    $('#output').innerHTML = syntaxHighlightCSS(formatted);
    $('#toolbar').querySelector('.gz-status')?.remove();
    const s = document.createElement('span');
    s.className = 'gz-status';
    s.style.cssText = 'margin-left:8px;font-size:.85em;color:var(--gz-success)';
    s.textContent = t('formatted');
    $('#toolbar').appendChild(s);
  } catch(e) {
    $('#output').textContent = 'Error: ' + e.message;
  }
}

function doClear() { $('#input').value = ''; $('#output').textContent = ''; $('#toolbar').querySelector('.gz-status')?.remove(); }

  doFormat();
}
