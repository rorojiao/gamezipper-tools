function syntaxHighlight(json) {
  return json.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/("(\\u[\da-fA-F]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(\.\d+)?([eE][+-]?\d+)?)/g, m => {
      let c = 'json-number';
      if (/^"/.test(m)) c = /:$/.test(m) ? 'json-key' : 'json-string';
      else if (/true|false/.test(m)) c = 'json-bool';
      else if (/null/.test(m)) c = 'json-null';
      return `<span class="${c}">${m}</span>`;
    });
}

function evalJSONPath(obj, path) {
  if (!path || path === '$') return [obj];
  // Remove leading $
  let expr = path.replace(/^\$/, '');
  if (!expr) return [obj];

  const segments = [];
  // Tokenize: .key, ["key"], [index], [start:end], ..key, *, [?(filter)]
  const tokenRegex = /\.\.([^\[\].]+)|\.([^\[\].]+)|\["([^"]+)"\]|\[(-?\d+)(?::(-?\d+))?\]|\[\*\]|\[(\*)\]|\[\?\(([^)]+)\)\]/g;
  let m;
  let lastIndex = 0;
  const tokens = [];
  // Simple recursive evaluator
  let current = [obj];

  while (expr.length > 0) {
    expr = expr.trim();
    if (!expr) break;

    // Recursive descent: ..key
    if (expr.startsWith('..')) {
      let rest = expr.substring(2);
      let keyMatch = rest.match(/^([^\[\].]+)/);
      let key = '';
      if (keyMatch) {
        key = keyMatch[1];
        rest = rest.substring(key.length);
      } else if (rest.startsWith('*')) {
        key = '*';
        rest = rest.substring(1);
      }
      // Collect all values recursively
      const collected = [];
      function recurse(node) {
        if (node === null || node === undefined) return;
        if (Array.isArray(node)) {
          node.forEach(item => {
            if (key === '*' || key === '') collected.push(item);
            recurse(item);
          });
        } else if (typeof node === 'object') {
          Object.entries(node).forEach(([k, v]) => {
            if (key === '*' || key === '' || k === key) collected.push(v);
            recurse(v);
          });
        }
      }
      const next = [];
      current.forEach(c => {
        const local = [];
        function r2(node) {
          if (node === null || node === undefined) return;
          if (Array.isArray(node)) {
            node.forEach(item => {
              if (key === '*' || key === '') next.push(item);
              r2(item);
            });
          } else if (typeof node === 'object') {
            Object.entries(node).forEach(([k, v]) => {
              if (key === '*' || key === '' || k === key) next.push(v);
              r2(v);
            });
          }
        }
        r2(c);
      });
      current = next;
      expr = rest;
      continue;
    }

    // Wildcard .*
    if (expr.startsWith('.*')) {
      const next = [];
      current.forEach(c => {
        if (Array.isArray(c)) c.forEach(v => next.push(v));
        else if (c && typeof c === 'object') Object.values(c).forEach(v => next.push(v));
      });
      current = next;
      expr = expr.substring(2);
      continue;
    }

    // Dot child: .key
    if (expr.startsWith('.')) {
      let rest = expr.substring(1);
      let keyMatch = rest.match(/^([^\[\].]+)/);
      if (!keyMatch) {
        expr = rest;
        continue;
      }
      const key = keyMatch[1];
      current = current.map(c => (c && typeof c === 'object') ? c[key] : undefined).filter(v => v !== undefined);
      expr = rest.substring(key.length);
      continue;
    }

    // Bracket index [n] or slice [start:end] or [*]
    if (expr.startsWith('[')) {
      const closeIdx = expr.indexOf(']');
      if (closeIdx === -1) break;
      const inner = expr.substring(1, closeIdx);
      if (inner === '*') {
        const next = [];
        current.forEach(c => {
          if (Array.isArray(c)) c.forEach(v => next.push(v));
          else if (c && typeof c === 'object') Object.values(c).forEach(v => next.push(v));
        });
        current = next;
      } else if (inner.includes(':')) {
        const [s, e] = inner.split(':').map(x => x.trim() ? parseInt(x) : undefined);
        const next = [];
        current.forEach(c => {
          if (Array.isArray(c)) {
            const start = s === undefined ? 0 : (s < 0 ? c.length + s : s);
            const end = e === undefined ? c.length : (e < 0 ? c.length + e : e);
            for (let i = start; i < end && i < c.length; i++) if (c[i] !== undefined) next.push(c[i]);
          }
        });
        current = next;
      } else if (/^-?\d+$/.test(inner)) {
        const idx = parseInt(inner);
        current = current.map(c => Array.isArray(c) ? c[idx < 0 ? c.length + idx : idx] : undefined).filter(v => v !== undefined);
      } else if (inner.startsWith('"') || inner.startsWith("'")) {
        const key = inner.replace(/^["']|["']$/g, '');
        current = current.map(c => (c && typeof c === 'object') ? c[key] : undefined).filter(v => v !== undefined);
      }
      expr = expr.substring(closeIdx + 1);
      continue;
    }

    break; // unknown token, stop
  }

  return current.filter(v => v !== undefined);
}

function doEval() {
  const inp = $('#input').value.trim();
  const path = $('#path-input').value.trim();
  if (!inp) { $('#output').textContent = ''; return; }
  try {
    const obj = JSON.parse(inp);
    if (!path) {
      $('#output').innerHTML = syntaxHighlight(JSON.stringify(obj, null, 2));
      return;
    }
    const results = evalJSONPath(obj, path);
    if (!results.length) {
      $('#output').innerHTML = '<span style="color:var(--text2)">No matches found</span>';
      $('#status').textContent = `0 results`;
      return;
    }
    const display = results.length === 1 ? results[0] : results;
    $('#output').innerHTML = syntaxHighlight(JSON.stringify(display, null, 2));
    $('#status').textContent = `${results.length} result${results.length > 1 ? 's' : ''}`;
  } catch(e) {
    $('#output').innerHTML = `<span style="color:var(--gz-accent)">${e.message}</span>`;
    $('#status').textContent = 'Error';
  }
}
