const { $, copyText, t } = GZ;

function parseRobots(txt) {
const lines = txt.split('\n');
const agents = {};
const sitemaps = [];
const errors = [];
const warnings = [];
let currentAgent = null;
let agentOrder = [];

lines.forEach((raw, i) => {
const line = raw.trim();
const lineNum = i + 1;
if (!line || line.startsWith('#')) return;

const colonIdx = line.indexOf(':');
if (colonIdx === -1) {
errors.push({line:lineNum, msg:'Missing colon (:) in directive'});
return;
}

const directive = line.substring(0, colonIdx).trim().toLowerCase();
const value = line.substring(colonIdx + 1).trim();

switch(directive) {
case 'user-agent':
currentAgent = value;
if (!agents[currentAgent]) {
agents[currentAgent] = {allow:[], disallow:[], crawlDelay:null};
agentOrder.push(currentAgent);
} else if (agents[currentAgent].allow.length || agents[currentAgent].disallow.length) {
warnings.push({line:lineNum, msg:t('errDuplicateAgent')+': '+currentAgent});
}
break;
case 'allow':
if (!currentAgent) { errors.push({line:lineNum, msg:t('errMissingAgent')}); break; }
if (!value.startsWith('/') && !value.startsWith('*')) {
warnings.push({line:lineNum, msg:t('errInvalidPath')+': '+value});
}
agents[currentAgent].allow.push({path:value, line:lineNum});
break;
case 'disallow':
if (!currentAgent) { errors.push({line:lineNum, msg:t('errMissingAgent')}); break; }
agents[currentAgent].disallow.push({path:value, line:lineNum});
break;
case 'sitemap':
sitemaps.push({url:value, line:lineNum});
break;
case 'crawl-delay':
if (!currentAgent) { errors.push({line:lineNum, msg:t('errMissingAgent')}); break; }
agents[currentAgent].crawlDelay = value;
warnings.push({line:lineNum, msg:t('warnCrawlDelay')});
break;
}
});

// Count total disallows
let totalDisallow = 0;
for (const a in agents) totalDisallow += agents[a].disallow.length;
if (totalDisallow > 50) {
warnings.push({line:0, msg:t('warnManyDisallows')});
}

return {agents, agentOrder, sitemaps, errors, warnings};
}

function matchPath(pattern, path) {
if (pattern === '' || pattern === '/') return true;
const regexStr = pattern.replace(/[.+^${}()|[\]\\]/g, '\\$&').replace(/\*/g, '.*').replace(/\$/g, '$');
try {
return new RegExp('^' + regexStr).test(path);
} catch(e) { return false; }
}

function isAllowed(agents, agentOrder, testPath) {
const results = [];
const path = testPath.startsWith('/') ? testPath : '/' + testPath;

for (const agentName of agentOrder) {
const agent = agents[agentName];
let allowed = true;
let bestMatch = '';
let bestIsAllow = true;

// Check disallow rules
for (const rule of agent.disallow) {
if (matchPath(rule.path, path) && rule.path.length > bestMatch.length) {
bestMatch = rule.path;
bestIsAllow = false;
allowed = false;
}
}
// Check allow rules (allow overrides disallow if longer match)
for (const rule of agent.allow) {
if (matchPath(rule.path, path) && rule.path.length >= bestMatch.length) {
bestMatch = rule.path;
bestIsAllow = true;
allowed = true;
}
}

results.push({agent: agentName, allowed});
}

return results;
}

function doValidate() {
const txt = $('#input').value.trim();
if (!txt) return;

const result = parseRobots(txt);
const {agents, agentOrder, sitemaps, errors, warnings} = result;

let totalAllow = 0, totalDisallow = 0;
for (const a in agents) {
totalAllow += agents[a].allow.length;
totalDisallow += agents[a].disallow.length;
}

const isValid = errors.length === 0;

let html = '';
html += `<div style="font-size:1.1em;font-weight:700;margin-bottom:12px">${isValid ? t('validMsg') : t('invalidMsg')}</div>`;

html += '<div class="stat-grid">';
html += `<div class="stat-card"><div class="num">${agentOrder.length}</div><div class="lbl">${t('statAgents')}</div></div>`;
html += `<div class="stat-card"><div class="num">${totalAllow}</div><div class="lbl">${t('statAllow')}</div></div>`;
html += `<div class="stat-card"><div class="num">${totalDisallow}</div><div class="lbl">${t('statDisallow')}</div></div>`;
html += `<div class="stat-card"><div class="num">${sitemaps.length}</div><div class="lbl">${t('statSitemaps')}</div></div>`;
html += `<div class="stat-card"><div class="num" style="color:${errors.length?'#e94560':'#00d672'}">${errors.length}</div><div class="lbl">${t('statErrors')}</div></div>`;
html += `<div class="stat-card"><div class="num" style="color:${warnings.length?'#ffd93d':'#00d672'}">${warnings.length}</div><div class="lbl">${t('statWarnings')}</div></div>`;
html += '</div>';

// Errors
if (errors.length) {
html += '<h3 style="margin:12px 0 6px">❌ Errors</h3>';
errors.forEach(e => {
html += `<div class="rule-row warning"><span class="icon">⚠️</span>${t('errorLine').replace('{n}',e.line).replace('{msg}',e.msg)}</div>`;
});
}

// Warnings
if (warnings.length) {
html += '<h3 style="margin:12px 0 6px">⚠️ Warnings</h3>';
warnings.forEach(w => {
html += `<div class="rule-row warning"><span class="icon">⚠️</span>${w.line ? t('errorLine').replace('{n}',w.line).replace('{msg}',w.msg) : w.msg}</div>`;
});
}

// Rules per agent
for (const agentName of agentOrder) {
const agent = agents[agentName];
html += `<h3 style="margin:14px 0 6px">🤖 ${t('ruleAgent')}: <code>${agentName}</code></h3>`;
agent.disallow.forEach(r => {
html += `<div class="rule-row disallow"><span class="icon">🚫</span>${t('ruleDisallow')}: <code>${r.path}</code></div>`;
});
agent.allow.forEach(r => {
html += `<div class="rule-row allow"><span class="icon">✅</span>${t('ruleAllow')}: <code>${r.path}</code></div>`;
});
if (agent.crawlDelay) {
html += `<div class="rule-row warning"><span class="icon">⏱️</span>Crawl-delay: <code>${agent.crawlDelay}</code></div>`;
}
}

// Sitemaps
if (sitemaps.length) {
html += `<h3 style="margin:14px 0 6px">🗺️ ${t('statSitemaps')}</h3>`;
sitemaps.forEach(s => {
html += `<div class="rule-row sitemap"><span class="icon">🗺️</span><code>${s.url}</code></div>`;
});
}

$('#results').innerHTML = html;
}

function testUrl() {
const txt = $('#input').value.trim();
const testPath = $('#test-url').value.trim();
if (!txt || !testPath) return;

const result = parseRobots(txt);
const testResults = isAllowed(result.agents, result.agentOrder, testPath);

let html = '';
testResults.forEach(r => {
html += `<div class="test-result ${r.allowed?'allowed':'blocked'}">${r.allowed?'✅':'🚫'} <strong>${r.agent}</strong>: ${r.allowed?'Allowed':'Blocked'} — <code>${testPath}</code></div>`;
});
$('#test-results').innerHTML = html;
}

Crawl-delay: 10

Sitemap: https://example.com/sitemap.xml
Sitemap: https://example.com/news-sitemap.xml`;
doValidate();
}

</script>
