const { $, t } = GZ;
const example = `# GameZipper Tools — Complete Guide

Welcome to the GameZipper Tools guide. This article walks you through the most popular utilities.

function slugify(text) {
  return text.toLowerCase()
    .replace(/[`*_~]/g, '')
    .replace(/[^\w\s-]/g, '')
    .replace(/\s+/g, '-')
    .replace(/-+/g, '-')
    .replace(/^-|-$/g, '');
}

function extractHeadings(md) {
  const lines = md.split('\n');
  const headings = [];
  const slugCount = {};
  for (const line of lines) {
    const m = line.match(/^(#{1,6})\s+(.+?)\s*#*\s*$/);
    if (!m) continue;
    const level = m[1].length;
    let text = m[2].trim();
    // strip markdown link syntax to use just label
    text = text.replace(/\[([^\]]+)\]\([^)]+\)/g, '$1');
    let slug = slugify(text);
    if (!slug) continue;
    if (slugCount[slug] !== undefined) {
      slugCount[slug]++;
      slug = slug + '-' + slugCount[slug];
    } else {
      slugCount[slug] = 0;
    }
    headings.push({ level, text, slug });
  }
  return headings;
}

function renderTOC(headings, style) {
  if (!headings.length) return '';
  if (style === 'flat') {
    return headings.map(h => `- [${h.text}](#${h.slug})`).join('\n');
  }
  if (style === 'ordered') {
    let html = '';
    let stack = [0,0,0,0,0,0];
    for (const h of headings) {
      stack[h.level - 1]++;
      for (let i = h.level; i < 6; i++) stack[i] = 0;
      const num = stack.slice(0, h.level).join('.');
      const indent = '  '.repeat(h.level - 1);
      html += `${indent}${num}. [${h.text}](#${h.slug})\n`;
    }
    return html.trimEnd();
  }
  if (style === 'brackets') {
    return headings.map(h => `[${h.text}]: #${h.slug}`).join('\n');
  }
  // nested (default)
  let md = '';
  const minLevel = Math.min(...headings.map(h => h.level));
  let prev = minLevel - 1;
  for (const h of headings) {
    if (h.level > prev) {
      while (prev < h.level) { md += (prev === minLevel - 1 ? '' : '\n') + '  '.repeat(prev) + (prev >= minLevel ? '  ' : '') + (prev === minLevel - 1 ? '' : ''); prev++; }
    } else if (h.level < prev) {
      prev = h.level;
    }
    md += (prev === minLevel ? '' : '\n') + '  '.repeat(h.level - minLevel) + '- [' + h.text + '](#' + h.slug + ')';
  }
  return md;
}

function renderHTML(headings) {
  if (!headings.length) return '<em style="color:var(--text2)">' + t('empty') + '</em>';
  const minLevel = Math.min(...headings.map(h => h.level));
  let html = '<ul>';
  const stack = [{ level: minLevel - 1, open: true }];
  for (const h of headings) {
    while (stack[stack.length - 1].level >= h.level) stack.pop();
    while (stack[stack.length - 1].level < h.level - 1) {
      html += '<ul>';
      stack.push({ level: stack[stack.length - 1].level + 1, open: true });
    }
    html += `<li><a href="#${h.slug}">${h.text.replace(/</g,'&lt;')}</a></li>`;
  }
  while (stack.length > 1) { html += '</ul>'; stack.pop(); }
  html += '</ul>';
  return html;
}

function update() {
  const md = $('#input').value;
  const style = $('#style').value;
  const minL = +$('#minLvl').value;
  const maxL = +$('#maxLvl').value;
  const minH = Math.max(1, +$('#minHeadings').value || 1);
  let headings = extractHeadings(md).filter(h => h.level >= minL && h.level <= maxL);
  if (headings.length < minH) {
    $('#output').textContent = t('empty');
    $('#preview').innerHTML = '<em style="color:var(--text2)">' + t('empty') + '</em>';
    $('#stats').innerHTML = `<span>0 ${t('statsHeadings' in GZ.i18n ? 'statsHeadings' : 'headings')}</span>`;
    return;
  }
  const toc = renderTOC(headings, style);
  $('#output').textContent = toc;
  $('#preview').innerHTML = renderHTML(headings);
  const h1 = headings.filter(h => h.level === 1).length;
  const h2 = headings.filter(h => h.level === 2).length;
  const h3 = headings.filter(h => h.level === 3).length;
  $('#stats').innerHTML = `<span>${headings.length} headings</span><span>H1: ${h1}</span><span>H2: ${h2}</span><span>H3+: ${h3}</span>`;
}

['input','style','minLvl','maxLvl','minHeadings'].forEach(id => {
  $('#' + id).addEventListener('input', update);
  $('#' + id).addEventListener('change', update);
});

function loadExample() { $('#input').value = example; update(); }
function doClear() { $('#input').value = ''; $('#output').textContent = ''; $('#preview').innerHTML = ''; $('#stats').innerHTML = ''; }
function doCopy() { GZ.copyText($('#output').textContent); }
