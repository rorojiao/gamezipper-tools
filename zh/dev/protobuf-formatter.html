const { $, copyText, t } = GZ;

const KEYWORDS = new Set(['syntax','package','import','option','message','enum','service','rpc','returns','stream','oneof','map','reserved','extensions','extend','repeated','optional','required','weak','default','deprecated','packed','json_name','lazy','client_streaming','server_streaming']);

const PRIMITIVE_TYPES = new Set(['double','float','int32','int64','uint32','uint64','sint32','sint64','fixed32','fixed64','sfixed32','sfixed64','bool','string','bytes']);

function beautifyProto(src, opts){
  const indent = opts.indent;
  const pad = d => ' '.repeat(d * indent);
  let lines = [];
  let depth = 0;
  let i = 0, n = src.length;
  let buf = '';
  let pendingNewline = false;

  function flush(){
    if (buf.length){
      const trimmed = buf.trim();
      if (trimmed.length) lines.push(pad(depth) + trimmed);
      buf = '';
    }
    pendingNewline = false;
  }

  while (i < n){
    const c = src[i];

    // line comment
    if (c === '/' && src[i+1] === '/'){
      let e = src.indexOf('\n', i); if (e === -1) e = n;
      if (buf.length) lines.push(pad(depth) + buf.trim());
      else lines.push(pad(depth) + src.substring(i, e).trim());
      buf = '';
      i = e;
      continue;
    }
    // block comment
    if (c === '/' && src[i+1] === '*'){
      let j = i + 2;
      while (j < n && !(src[j] === '*' && src[j+1] === '/')) j++;
      const end = Math.min(j+2, n);
      const comment = src.substring(i, end);
      // preserve multi-line block comments on their own lines
      flush();
      lines.push(pad(depth) + comment.replace(/\*/g, '*'));
      i = end;
      continue;
    }

    if (c === '{'){
      const before = buf.trim();
      buf = '';
      lines.push(pad(depth) + before + ' {');
      depth++;
      i++;
      continue;
    }
    if (c === '}'){
      if (depth > 0) depth--;
      flush();
      lines.push(pad(depth) + '}');
      i++;
      // blank line after closing top-level (depth 0) blocks
      if (depth === 0) lines.push('');
      continue;
    }

    if (c === '\n'){
      flush();
      i++;
      continue;
    }
    if (/\s/.test(c)){
      if (buf.length && !/\s$/.test(buf)) buf += ' ';
      i++;
      continue;
    }
    if (c === ';'){
      buf += ';';
      flush();
      i++;
      continue;
    }
    if (c === '"' || c === "'"){
      const q = c;
      let j = i+1;
      while (j < n && src[j] !== q){ if (src[j] === '\\') j++; j++; }
      buf += src.substring(i, Math.min(j+1, n));
      i = Math.min(j+1, n);
      continue;
    }
    buf += c;
    i++;
  }
  flush();

  let result = lines.join('\n');
  // cleanup multiple blank lines
  result = result.replace(/\n{3,}/g, '\n\n').replace(/^\n+/,'').replace(/\s+$/,'\n');

  // align field numbers: find max field-number column width per message block
  if (opts.alignFields){
    result = alignFieldNumbers(result, indent);
  }

  return result;
}

function alignFieldNumbers(src, indent){
  // For each consecutive run of lines that look like "<type> <name> = <num>;" align the "=" column
  const out = src.split('\n');
  for (let k = 0; k < out.length; k++){
    const m = out[k].match(/^(\s*(?:repeated |optional |required |map<[^>]+> )?\w+(?:\.\w+)*\s+\w+)\s*=\s*(\d+)\s*(.*)$/);
    if (!m) continue;
    // find run
    let end = k;
    while (end + 1 < out.length){
      if (out[end+1].match(/^(\s*(?:repeated |optional |required |map<[^>]+> )?\w+(?:\.\w+)*\s+\w+)\s*=\s*\d+/)) end++;
      else break;
    }
    // compute max width of prefix (without the leading indent, but keep indentation)
    let maxLen = 0;
    const items = [];
    for (let j = k; j <= end; j++){
      const mm = out[j].match(/^(\s*(?:repeated |optional |required |map<[^>]+> )?\w+(?:\.\w+)*\s+\w+)\s*=\s*(\d+)\s*(.*)$/);
      if (mm){ items.push({idx:j, prefix:mm[1], num:mm[2], rest:mm[3]}); maxLen = Math.max(maxLen, mm[1].length); }
    }
    for (const it of items){
      const aligned = it.prefix + ' '.repeat(Math.max(1, maxLen - it.prefix.length + 1)) + '= ' + it.num + (it.rest ? ' ' + it.rest : '');
      out[it.idx] = aligned.replace(/\s+;/g, ';');
    }
    k = end;
  }
  return out.join('\n');
}

function minifyProto(src){
  // remove comments, collapse whitespace, keep one statement per relevant space
  let out = '';
  let i = 0, n = src.length;
  let inStr = false, strCh = '';
  while (i < n){
    const c = src[i];
    if (inStr){
      out += c;
      if (c === '\\'){ out += src[i+1]||''; i += 2; continue; }
      if (c === strCh) inStr = false;
      i++; continue;
    }
    if (c === '/' && src[i+1] === '/'){
      let e = src.indexOf('\n', i); if (e === -1) e = n;
      i = e; continue;
    }
    if (c === '/' && src[i+1] === '*'){
      let j = i+2; while (j < n && !(src[j] === '*' && src[j+1] === '/')) j++;
      i = Math.min(j+2, n); continue;
    }
    if (c === '"' || c === "'"){ inStr = true; strCh = c; out += c; i++; continue; }
    if (/\s/.test(c)){
      if (out.length && !/[\s{;<>,(:=]/.test(out[out.length-1])) out += ' ';
      i++; continue;
    }
    out += c; i++;
  }
  // collapse " ;" -> ";", " {" -> "{"
  out = out.replace(/\s+;/g, ';').replace(/\s*,\s*/g, ', ').replace(/\s*\(\s*/g, '(').replace(/\s*\)\s*/g, ')');
  return out.trim();
}

function highlight(code){
  let i = 0, n = code.length, out = '';
  function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  while (i < n){
    const c = code[i];
    if (c === '/' && code[i+1] === '/'){
      let e = code.indexOf('\n', i); if (e === -1) e = n;
      out += `<span class="pb-com">${esc(code.substring(i, e))}</span>`;
      i = e; continue;
    }
    if (c === '/' && code[i+1] === '*'){
      let j = i+2; while (j < n && !(code[j] === '*' && code[j+1] === '/')) j++;
      out += `<span class="pb-com">${esc(code.substring(i, Math.min(j+2,n)))}</span>`;
      i = Math.min(j+2, n); continue;
    }
    if (c === '"' || c === "'"){
      const q = c; let j = i+1;
      while (j < n && code[j] !== q){ if (code[j] === '\\') j++; j++; }
      out += `<span class="pb-str">${esc(code.substring(i, Math.min(j+1,n)))}</span>`;
      i = Math.min(j+1, n); continue;
    }
    if (/[A-Za-z_]/.test(c)){
      let j = i; while (j < n && /[A-Za-z0-9_.]/.test(code[j])) j++;
      const word = code.substring(i, j);
      if (KEYWORDS.has(word)) out += `<span class="pb-kw">${esc(word)}</span>`;
      else if (PRIMITIVE_TYPES.has(word)) out += `<span class="pb-type">${esc(word)}</span>`;
      else out += esc(word);
      i = j; continue;
    }
    out += esc(c); i++;
  }
  return out;
}

function getOpts(){
  return {
    indent: parseInt($('#ind').value) || 2,
    alignFields: $('#alf').checked,
  };
}

function doBeautify(){
  const inp = $('#input').value;
  if (!inp.trim()){ $('#status').innerHTML = `<span style="color:var(--gz-accent)">${t('empty')}</span>`; $('#output').innerHTML=''; return; }
  const out = beautifyProto(inp, getOpts());
  $('#output').innerHTML = highlight(out);
  window._pbOut = out;
  $('#status').innerHTML = `<span style="color:var(--gz-success)">${t('done')} · ${out.split('\n').length} lines</span>`;
}
function doMinify(){
  const inp = $('#input').value;
  if (!inp.trim()){ $('#status').innerHTML = `<span style="color:var(--gz-accent)">${t('empty')}</span>`; $('#output').innerHTML=''; return; }
  const out = minifyProto(inp);
  window._pbOut = out;
  $('#output').innerHTML = highlight(out);
  $('#status').innerHTML = `<span style="color:var(--gz-success)">${t('minified')} · ${out.length} chars</span>`;
}
function doCopy(){ if (window._pbOut != null) copyText(window._pbOut); }
function doDownload(){
  if (window._pbOut == null) return;
  const blob = new Blob([window._pbOut], {type:'text/plain'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'schema.proto';
  a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href), 1000);
}
function loadExample(){
  $('#input').value =
`syntax = "proto3";package example.v1;option java_package="com.example.v1";import "google/protobuf/timestamp.proto";message User{int64 id=1;string name=2;string email=3;repeated string roles=4;google.protobuf.Timestamp created_at=5;enum Status{UNKNOWN=0;ACTIVE=1;INACTIVE=2;BANNED=3;}Status status=6;}service UserService{rpc GetUser(GetUserRequest)returns(User);rpc ListUsers(ListUsersRequest)returns(stream User);}message GetUserRequest{int64 id=1;}message ListUsersRequest{int32 page_size=1;string page_token=2;}`;
  doBeautify();
}
function doClear(){ $('#input').value=''; $('#output').innerHTML=''; $('#status').innerHTML=''; window._pbOut=null; }

$('#opts').innerHTML = `
  <label>${t('indent')}:

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="doBeautify()">${t('beautify')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doMinify()">${t('minify')}</button>
