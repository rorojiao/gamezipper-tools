<div class="gz-container">

<script>
GZI18n.register({
  en:{toolTitle:'PNG Compressor',toolDesc:'Reduce PNG file size by lowering color depth. Batch compress, 100% in your browser — no upload.',
    s1:'Drop PNG images or click to upload (multiple allowed)',s2:'Adjust the colors slider — fewer colors = smaller file',s3:'Preview each result and the space saved',s4:'Click Download on any image to save the compressed PNG',
    dropHint:'Drop PNG images here or click to upload',colors:'Colors:',
    original:'Original:',compressed:'Compressed:',saved:'Saved:',
    download:'⬇️ Download',rJpg:'JPEG Compressor',rWebp:'WebP Compressor',rConverter:'Image Converter',rResizer:'Image Resizer'},
  zh:{toolTitle:'PNG 压缩器',toolDesc:'通过降低色彩深度减小 PNG 文件体积。支持批量压缩，100% 浏览器本地处理，无需上传。',
    s1:'拖放 PNG 图片或点击上传（支持多选）',s2:'调整颜色数滑块 — 颜色越少文件越小',s3:'预览每张图片及节省的空间',s4:'点击图片上的「下载」保存压缩后的 PNG',
    dropHint:'拖放 PNG 图片到此处或点击上传',colors:'颜色数：',
    original:'原始：',compressed:'压缩后：',saved:'节省：',
    download:'⬇️ 下载',rJpg:'JPEG 压缩器',rWebp:'WebP 压缩器',rConverter:'图片转换器',rResizer:'图片缩放'}
});

const {t}=GZI18n;
let files=[];

document.getElementById('dropText').textContent=t('dropHint');
document.getElementById('cLabel').textContent=t('colors');

const dz=document.getElementById('dropzone'),fi=document.getElementById('fileIn');
dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('drag-over')});
dz.addEventListener('dragleave',()=>dz.classList.remove('drag-over'));
dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('drag-over');files=[...e.dataTransfer.files];compressAll()});
fi.addEventListener('change',e=>{if(e.target.files.length){files=[...e.target.files];compressAll()}});

function quantize(canvas,colors){
  const ctx=canvas.getContext('2d');
  const data=ctx.getImageData(0,0,canvas.width,canvas.height);
  const d=data.data;
  const step=Math.max(1,Math.floor(256/Math.sqrt(colors)));
  for(let i=0;i<d.length;i+=4){
    d[i]=Math.round(d[i]/step)*step;
    d[i+1]=Math.round(d[i+1]/step)*step;
    d[i+2]=Math.round(d[i+2]/step)*step;
  }
  ctx.putImageData(data,0,0);
}

function compressAll(){
  const colors=+document.getElementById('colors').value;
  document.getElementById('cVal').textContent=colors;
  const out=document.getElementById('results');out.innerHTML='';
  if(!files.length)return;
  files.forEach((f,idx)=>{
    const img=new Image();
    img.onload=()=>{
      const c=document.createElement('canvas');c.width=img.width;c.height=img.height;
      const ctx=c.getContext('2d');ctx.drawImage(img,0,0);
      quantize(c,colors);
      c.toBlob(b=>{
        const url=URL.createObjectURL(b);
        const pct=((1-b.size/f.size)*100).toFixed(1);
        const card=document.createElement('div');
        card.className='result-card';
        card.innerHTML=`<img src="${url}"><div class="info">${f.name}</div>
          <div class="info">${t('original')} ${fmt(f.size)} → ${t('compressed')} <b>${fmt(b.size)}</b></div>
          <div class="saved">${t('saved')} ${pct}%</div>
          <button class="gz-btn" onclick="dl(${idx})">${t('download')}</button>`;
        out.appendChild(card);
      },'image/png');
    };
    img.src=URL.createObjectURL(f);
  });
}

function dl(idx){
  const colors=+document.getElementById('colors').value;
  const img=new Image();
  img.onload=()=>{
    const c=document.createElement('canvas');c.width=img.width;c.height=img.height;
    const ctx=c.getContext('2d');ctx.drawImage(img,0,0);
    quantize(c,colors);
    c.toBlob(b=>{
      const a=document.createElement('a');a.href=URL.createObjectURL(b);
      a.download='compressed_'+files[idx].name;a.click();
    },'image/png');
  };
  img.src=URL.createObjectURL(files[idx]);
}

function fmt(b){return b>1048576?(b/1048576).toFixed(1)+' MB':(b/1024).toFixed(1)+' KB'}

GZ.renderToolPage({category:'image',titleKey:'toolTitle',descKey:'toolDesc',

    {href:'/image/converter.html',icon:'🔄',nameKey:'rConverter'},
    {href:'/image/resizer.html',icon:'📐',nameKey:'rResizer'}
  ]
});
</script>
