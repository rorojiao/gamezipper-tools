<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div id="activities"></div>
    <div class="btn-row">
      <button class="gz-btn" onclick="calculate()" id="btn-calc"></button>
    </div>
    <div class="result-card" id="result" style="display:none">
      <div class="big" id="result-total"></div>
      <div class="label" id="result-label"></div>
      <div class="result-grid">

        <div class="result-item"><div class="val" id="result-tb"></div><div class="lbl">TB</div></div>
        <div class="result-item"><div class="val" id="result-cost"></div><div class="lbl" id="result-cost-label"></div></div>
      </div>
      <div class="bar-container" id="bar-container"></div>
    </div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Internet Data Usage Calculator',
    toolDesc: 'Estimate your monthly internet data consumption. Enter hours per activity to see how streaming, gaming, video calls, downloads and social media add up.',
    btnCalc: 'Calculate Monthly Usage',
    hoursPerDay: 'Hours/day',
    quality: 'Quality',
    resultLabel: 'Estimated Monthly Data Usage',
    estCost: 'Est. Monthly Cost',
    streamingSD: 'Video Streaming (SD)',
    streamingHD: 'Video Streaming (HD)',
    streaming4K: 'Video Streaming (4K)',
    gaming: 'Online Gaming',
    videoCall: 'Video Calls (HD)',
    socialMedia: 'Social Media Browsing',
    music: 'Music Streaming',
    webBrowsing: 'Web Browsing',
    downloads: 'Large File Downloads',
    step1: 'Enter how many hours per day you spend on each activity',
    step2: 'Select the quality setting where applicable (e.g. SD, HD, 4K)',
    step3: 'Click Calculate to see your estimated monthly data usage',
    step4: 'Check the breakdown to find which activities use the most data',
  },
  zh: {
    toolTitle: '网络流量使用计算器',
    toolDesc: '估算你每月的网络数据流量使用量。输入各项活动的每日使用时长，查看流媒体、游戏、视频通话、下载和社交媒体的流量消耗。',
    btnCalc: '计算月度流量',
    hoursPerDay: '每天小时数',
    quality: '画质',
    resultLabel: '预计月度流量使用',
    estCost: '预计月费用',
    streamingSD: '视频流媒体（标清）',
    streamingHD: '视频流媒体（高清）',
    streaming4K: '视频流媒体（4K）',
    gaming: '在线游戏',
    videoCall: '视频通话（高清）',
    socialMedia: '社交媒体浏览',
    music: '音乐流媒体',
    webBrowsing: '网页浏览',
    downloads: '大文件下载',
    step1: '输入每项活动每天的使用时长',
    step2: '在适用项选择画质设置（如标清、高清、4K）',
    step3: '点击「计算月度流量」查看预计的月度流量使用',
    step4: '查看分解图找出消耗流量最多的活动',
  }
});

const { $, copyText, t } = GZ;
const lang = GZI18n.getLang();

// Data rates in MB per hour
const ACTIVITIES = [
  { id: 'streamSD',   key: 'streamingSD',   rate: 1000, icon: '📺' },
  { id: 'streamHD',   key: 'streamingHD',   rate: 3000, icon: '🎬' },
  { id: 'stream4K',   key: 'streaming4K',   rate: 7000, icon: '🎥' },
  { id: 'gaming',     key: 'gaming',        rate: 100,  icon: '🎮' },
  { id: 'videoCall',  key: 'videoCall',     rate: 540,  icon: '📹' },
  { id: 'social',     key: 'socialMedia',   rate: 120,  icon: '📱' },
  { id: 'music',      key: 'music',         rate: 100,  icon: '🎵' },
  { id: 'web',        key: 'webBrowsing',   rate: 60,   icon: '🌐' },
  { id: 'downloads',  key: 'downloads',     rate: 5000, icon: '⬇️' },
];

// Build activity input rows
const actDiv = $('#activities');
ACTIVITIES.forEach(a => {
  const row = document.createElement('div');
  row.className = 'activity-row';
  row.innerHTML = `
    <label>${a.icon} ${t(a.key)}</label>
    <input type="number" id="hrs-${a.id}" value="0" min="0" max="24" step="0.5">
    <span style="font-size:.8rem;color:var(--text2)">${t('hoursPerDay')} · ${(a.rate/1000).toFixed(1)} GB/h</span>
  `;
  actDiv.appendChild(row);
});

const COLORS = ['#e94560','#00d672','#61afef','#d19a66','#bb86fc','#ff6b6b','#4ecdc4','#ffd93d','#6c5ce7'];

function calculate() {
  let totalMB = 0;
  const breakdown = [];
  ACTIVITIES.forEach((a, i) => {
    const hrs = parseFloat($('#hrs-' + a.id).value) || 0;
    const monthlyMB = hrs * a.rate * 30; // 30 days per month
    totalMB += monthlyMB;
    if (monthlyMB > 0) breakdown.push({ name: t(a.key), mb: monthlyMB, color: COLORS[i] });
  });

  const totalGB = totalMB / 1000;
  const totalTB = totalGB / 1000;

  $('#result').style.display = '';
  $('#result-total').textContent = totalGB >= 1000 ? totalTB.toFixed(2) + ' TB' : totalGB.toFixed(1) + ' GB';
  $('#result-label').textContent = t('resultLabel');
  $('#result-gb').textContent = totalGB.toFixed(1);
  $('#result-tb').textContent = totalTB.toFixed(3);
  // Assume $0.01/GB average blended rate
  const cost = Math.max(30, totalGB * 0.05);
  $('#result-cost').textContent = '$' + cost.toFixed(2);
  $('#result-cost-label').textContent = t('estCost');

  // Breakdown bars
  breakdown.sort((a, b) => b.mb - a.mb);
  const maxMB = breakdown.length ? breakdown[0].mb : 1;
  const barC = $('#bar-container');
  barC.innerHTML = breakdown.map(b => `
    <div class="bar-row">
      <span class="name">${b.name}</span>
      <div class="bar-track"><div class="bar-fill" style="width:${(b.mb/maxMB*100)}%;background:${b.color}"></div></div>
      <span class="val">${(b.mb/1000).toFixed(1)} GB</span>
    </div>
  `).join('');
}

$('#btn-calc').textContent = t('btnCalc');
calculate();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📶', href:'/calc/bandwidth-calculator.html', name:'Bandwidth Calculator'},
    {icon:'⚡', href:'/network/speed-test.html', name:'Speed Test'},
    {icon:'💰', href:'/calc/internet-cost-calculator.html', name:'Internet Cost'},
    {icon:'📊', href:'/calc/subscription-cost-calculator.html', name:'Subscription Cost'},
  ]
});
</script>
<script src="/tools-result-rec.js?v=20260707v520" defer></script>
</body>
