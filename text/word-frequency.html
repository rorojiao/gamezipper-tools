<script>
GZI18n.register({
  en: {
    toolTitle: 'Word Frequency Counter',
    toolDesc: 'Analyze word frequency in any text. See common words, bigrams, trigrams and vocabulary stats for writers, SEO and research.',
    placeholder: 'Paste or type your text here...',
    optStop: 'Exclude stop words',
    optCase: 'Case-insensitive',
    optPunct: 'Keep punctuation as separate tokens',
    optChar: 'Character mode (for Chinese/Japanese)',
    example: 'Load Example',

    tabBigrams: 'Bigrams',
    tabTrigrams: 'Trigrams',
    tabCloud: 'Cloud',
    rank: 'Rank',
    count: 'Count',
    word: 'Word',
    phrase: 'Phrase',
    occurrences: 'occurrences',
    totalWords: 'Total words',
    uniqueWords: 'Unique words',
    sentences: 'Sentences',
    avgLen: 'Avg word length',
    noResults: 'No results yet — type or paste some text above.',
    step1: 'Paste or type your text into the input area',
    step2: 'Toggle options to filter stop words, control case or switch to character mode',
    step3: 'Switch between Words / Bigrams / Trigrams / Cloud tabs',
    step4: 'Use the top results to spot overused words or common phrases',
  },
  zh: {
    toolTitle: '词频统计工具',
    toolDesc: '分析任意文本的词频分布。查看常用词、二元组、三元组和词汇统计，适用于写作、SEO 和研究。',
    optStop: '排除停用词',
    optCase: '不区分大小写',
    optPunct: '保留标点为独立标记',
    optChar: '字符模式（适用于中文/日文）',
    example: '加载示例',
    clear: '清空',
    tabWords: '单词',
    tabBigrams: '二元组',
    tabTrigrams: '三元组',
    tabCloud: '词云',
    rank: '排名',
    count: '次数',
    word: '词',
    phrase: '短语',
    occurrences: '次',
    totalWords: '总词数',
    uniqueWords: '不同词数',
    sentences: '句子数',
    avgLen: '平均词长',
    noResults: '暂无结果 — 请在上方输入或粘贴文本',
    step1: '在输入区粘贴或输入文本',
    step2: '切换选项以排除停用词、控制大小写或切换为字符模式',
    step3: '在「单词/二元组/三元组/词云」之间切换标签页',
    step4: '通过高频词发现过度使用词或常用短语',
  }
});

const { $, t } = GZ;

const STOP = new Set(['a','an','the','and','or','but','if','then','is','are','was','were','be','been','being','have','has','had','do','does','did','will','would','should','could','may','might','must','can','i','you','he','she','it','we','they','me','him','her','us','them','my','your','his','its','our','their','this','that','these','those','of','in','on','at','to','for','with','by','from','as','into','about','up','out','over','under','not','no','so','very','just','than','too','also','only','s','t','d','ll','m','o','re','ve','y','am']);
const STOP_ZH = new Set(['的','了','是','在','我','你','他','她','它','们','这','那','就','也','都','还','和','与','及','或','但','而','因','所','以','用','到','给','让','把','被','从','对','向','为','于','上','下','里','外','中','不','没','没有','很','非常','已经','正在','将','会','能','可以','可能']);

let activeTab = 'words';
let lastResult = null;

function tokenize(text) {
  const useChar = $('#optChar').checked;
  const useCase = $('#optCase').checked;
  const usePunct = $('#optPunct').checked;
  const filterStop = $('#optStop').checked;
  let tokens;
  if (useChar) {
    tokens = [...text].filter(c => /\S/.test(c));
  } else {
    let s = text;
    if (!usePunct) s = s.replace(/[^\w\s一-鿿']/g, ' ');
    s = s.toLowerCase();
    tokens = s.split(/\s+/).filter(Boolean);
  }
  if (!useCase) tokens = tokens.map(t => t.toLowerCase());
  if (filterStop) {
    tokens = tokens.filter(t => {
      if (useChar) return !STOP_ZH.has(t);
      return !STOP.has(t.toLowerCase());
    });
  }
  return tokens;
}

function ngrams(tokens, n) {
  const counts = new Map();
  for (let i = 0; i <= tokens.length - n; i++) {
    const gram = tokens.slice(i, i + n).join(' ');
    counts.set(gram, (counts.get(gram) || 0) + 1);
  }
  return [...counts.entries()].sort((a, b) => b[1] - a[1]);
}

function analyze() {
  const raw = $('#input').value;
  const tokens = tokenize(raw);
  const sentences = raw ? raw.split(/[.!?。！？]+/).filter(s => s.trim()).length : 0;
  const avgLen = tokens.length ? (tokens.join('').length / tokens.length).toFixed(1) : 0;
  const unique = new Set(tokens.map(t => t.toLowerCase())).size;
  const unigrams = ngrams(tokens, 1);
  const bigrams = ngrams(tokens, 2);
  const trigrams = ngrams(tokens, 3);
  lastResult = { tokens, sentences, avgLen, unique, unigrams, bigrams, trigrams };
  renderSummary();
  renderActive();
}

function renderSummary() {
  if (!lastResult || !lastResult.tokens.length) {
    $('#summary').innerHTML = '';
    return;
  }
  $('#summary').innerHTML = `
    <div class="wf-stat"><div class="num">${lastResult.tokens.length}</div><div class="label">${t('totalWords')}</div></div>
    <div class="wf-stat"><div class="num">${lastResult.unique}</div><div class="label">${t('uniqueWords')}</div></div>
    <div class="wf-stat"><div class="num">${lastResult.sentences}</div><div class="label">${t('sentences')}</div></div>
    <div class="wf-stat"><div class="num">${lastResult.avgLen}</div><div class="label">${t('avgLen')}</div></div>`;
}

function renderActive() {
  if (!lastResult || !lastResult.tokens.length) {
    $('#output').innerHTML = `<div style="opacity:.6;text-align:center;padding:20px">${t('noResults')}</div>`;
    return;
  }
  let data;
  if (activeTab === 'words') data = lastResult.unigrams;
  else if (activeTab === 'bigrams') data = lastResult.bigrams;
  else if (activeTab === 'trigrams') data = lastResult.trigrams;
  else if (activeTab === 'cloud') { renderCloud(data); return; }
  const top = data.slice(0, 50);
  const max = top[0] ? top[0][1] : 1;
  const header = activeTab === 'words' ? t('word') : t('phrase');
  const html = `<table class="wf-table"><thead><tr><th>${t('rank')}</th><th>${header}</th><th class="wf-num">${t('count')}</th><th></th></tr></thead><tbody>${
    top.map(([k, v], i) => `<tr class="wf-row"><td>${i + 1}</td><td class="wf-word">${escapeHtml(k)}</td><td class="wf-num">${v}</td><td><span class="wf-bar" style="width:${Math.round(v / max * 120)}px"></span></td></tr>`).join('')
  }</tbody></table>`;
  $('#output').innerHTML = html;
}

function renderCloud() {
  const top = lastResult.unigrams.slice(0, 50);
  const max = top[0] ? top[0][1] : 1;
  const min = top[top.length - 1] ? top[top.length - 1][1] : 1;
  function scale(v) {
    if (max === min) return 1.2;
    return 0.85 + (v - min) / (max - min) * 1.4;
  }
  $('#output').innerHTML = `<div class="wf-cloud">${
    top.map(([k, v]) => `<span class="tag" style="font-size:${scale(v).toFixed(2)}em" title="${v} ${t('occurrences')}">${escapeHtml(k)}</span>`).join('')
  }</div>`;
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function buildTabs() {
  $('#tabs').innerHTML = ['words','bigrams','trigrams','cloud'].map(k => `<button class="wf-tab ${activeTab===k?'active':''}" data-tab="${k}" onclick="setTab('${k}')">${t('tab' + k[0].toUpperCase() + k.slice(1))}</button>`).join('');
}

function setTab(k) {
  activeTab = k;
  buildTabs();
  renderActive();
}

function loadExample() {
  $('#input').value = 'The Pomodoro Technique is a time management method. The technique uses a timer to break work into intervals, traditionally 25 minutes in length, separated by short breaks. These intervals are named pomodoros, the plural of the Italian word pomodoro for tomato. The method is based on the idea that frequent breaks can improve mental agility.';
  analyze();
}

function clearAll() {
  $('#input').value = '';
  $('#summary').innerHTML = '';
  lastResult = null;
  renderActive();
}

['#input','#optStop','#optCase','#optPunct','#optChar'].forEach(sel => {
  $(sel).addEventListener('input', analyze);
  if (sel !== '#input') $(sel).addEventListener('change', analyze);
});

$('#lblStop').textContent = t('optStop');
$('#lblCase').textContent = t('optCase');
$('#lblPunct').textContent = t('optPunct');
$('#lblChar').textContent = t('optChar');
$('#input').placeholder = t('placeholder');

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="clearAll()">${t('clear')}</button>`;

buildTabs();
renderActive();

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🔢', href:'/text/letter-counter.html', name:'Letter Counter'},
    {icon:'📝', href:'/text/word-counter.html', name:'Word Counter'},
    {icon:'📊', href:'/text/diff.html', name:'Text Diff'},
    {icon:'📚', href:'/text/readability-checker.html', name:'Readability'},
  ]
});
</script>
