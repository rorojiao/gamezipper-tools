<script>
GZI18n.register({
  en: {
    toolTitle: 'Slot Machine Game',
    toolDesc: 'Play a free online slot machine with 3 reels of cherries, lemons, bells, bars, 7s and diamonds. Place your bet, spin and win virtual credits. No real money, no signup — pure arcade fun.',
    lblCredits: 'CREDITS',
    lblBet: 'Bet',
    btnReset: 'Reset Bank to 1000',
    lblPayout: 'Payout Table (per bet)',
    win3: '🎉 JACKPOT! 3 of a kind!',
    win2cherry: '🍒 Two cherries! Small win',
    win1cherry: '🍒 One cherry! Tiny win',
    lose: 'No match. Spin again!',
    broke: '💸 Out of credits! Hit Reset to play again.',
    step1: 'Choose your bet amount (default 10 credits)',
    step2: 'Click SPIN to roll the three reels',
    step3: 'Match three symbols on the center line to win',
    step4: 'Three 7s is the jackpot (50x); cherries pay even one or two',
  },
  zh: {
    toolTitle: '老虎机游戏',
    toolDesc: '免费在线玩 3 转盘老虎机 — 樱桃、柠檬、铃铛、BAR、7 和钻石。下注、转动并赢取虚拟筹码。不涉及真钱、无需注册 — 纯粹娱乐。',
    lblCredits: '筹码',
    lblBet: '下注',
    btnReset: '重置为 1000 筹码',
    lblPayout: '奖金表（按下注额）',
    win3: '🎉 大奖！三连相同！',
    win2cherry: '🍒 两个樱桃！小额奖励',
    win1cherry: '🍒 一个樱桃！迷你奖励',
    lose: '未命中，再转一次！',
    broke: '💸 筹码用完了！点击重置继续游戏。',
    step1: '选择下注金额（默认 10 筹码）',
    step2: '点击 SPIN 转动三个转盘',
    step3: '中线三连相同即获胜',
    step4: '三个 7 是头奖（50 倍），樱桃一个或两个也有奖',
  }
});

const { $, t } = GZ;

// Symbol set: emoji, name, weight (probability), 3-match multiplier
const SYMBOLS = [
  { e: '🍒', w: 28, mult: 4 },
  { e: '🍋', w: 22, mult: 5 },
  { e: '🍇', w: 18, mult: 5 },
  { e: '🔔', w: 12, mult: 15 },
  { e: '🍫', w: 8, mult: 10 }, // bar
  { e: '💎', w: 6, mult: 25 },
  { e: '7️⃣', w: 3, mult: 50 },
];
const TOTAL_W = SYMBOLS.reduce((s, x) => s + x.w, 0);

let credits = +(localStorage.getItem('slot-credits') || 1000);
let spinning = false;

$('#lbl-credits').textContent = t('lblCredits');
$('#credits').textContent = credits;
$('#lbl-bet').textContent = t('lblBet');
$('#btn-reset').textContent = t('btnReset');
$('#lbl-payout').textContent = t('lblPayout');

// Build initial reels
function fillStrip(strip, finalSym) {
  // 20 random cells ending with the target symbol at position 19 (centered)
  const cells = [];
  for (let i = 0; i < 19; i++) {
    cells.push(SYMBOLS[Math.floor(Math.random() * SYMBOLS.length)].e);
  }
  cells.push(finalSym);
  strip.innerHTML = cells.map(s => `<div class="reel-cell">${s}</div>`).join('');
  // position so the final symbol is centered (cell 19 at y=0 within 120px viewport)
  strip.style.transform = 'translateY(0px)';
}

function randomSymbol() {
  let r = Math.floor(crypto.getRandomValues(new Uint32Array(1))[0] / 4294967295 * TOTAL_W);
  for (const s of SYMBOLS) { r -= s.w; if (r < 0) return s; }
  return SYMBOLS[0];
}

// Initial fill
fillStrip($('#strip-0'), '🍒');
fillStrip($('#strip-1'), '🍋');
fillStrip($('#strip-2'), '🍇');

// Payout table
$('#payout-list').innerHTML = [...SYMBOLS].reverse().map(s =>
  `<div class="prow"><span class="sym">${s.e}${s.e}${s.e}</span><span>${s.mult}×</span></div>`
).join('') + `<div class="prow"><span class="sym">🍒🍒</span><span>2×</span></div><div class="prow"><span class="sym">🍒</span><span>1×</span></div>`;

function spin() {
  if (spinning) return;
  let bet = Math.max(1, parseInt($('#bet').value) || 1);
  if (bet > credits) bet = credits;
  if (credits <= 0) { $('#msg').textContent = t('broke'); return; }
  $('#bet').value = bet;
  spinning = true;
  $('#spin-btn').disabled = true;
  $('#msg').textContent = '…';
  credits -= bet;
  localStorage.setItem('slot-credits', credits);
  $('#credits').textContent = credits;

  // Determine outcome per reel
  const results = [randomSymbol(), randomSymbol(), randomSymbol()];

  // Animate each reel: fill with random cells, then transition to final
  const reels = [$('#strip-0'), $('#strip-1'), $('#strip-2')];
  const stops = [1100, 1500, 1900]; // staggered stops

  reels.forEach((strip, i) => {
    const finalSym = results[i].e;
    // long strip
    const cells = [];
    for (let k = 0; k < 40 + i * 5; k++) {
      cells.push(SYMBOLS[Math.floor(Math.random() * SYMBOLS.length)].e);
    }
    cells.push(finalSym);
    strip.innerHTML = cells.map(s => `<div class="reel-cell">${s}</div>`).join('');
    strip.style.transition = 'none';
    strip.style.transform = 'translateY(0px)';
    // force reflow
    void strip.offsetHeight;
    const targetIdx = cells.length - 1;
    const offset = -targetIdx * 120;
    strip.style.transition = `transform ${stops[i]/1000}s cubic-bezier(.25,.1,.25,1)`;
    strip.style.transform = `translateY(${offset}px)`;
  });

  // Evaluate after all reels stop
  setTimeout(() => {
    evaluate(results, bet);
    spinning = false;
    $('#spin-btn').disabled = false;
  }, 1950);
}

function evaluate(results, bet) {
  const [a, b, c] = results;
  let win = 0, msgKey = 'lose';
  if (a.e === b.e && b.e === c.e) {
    win = a.mult * bet;
    msgKey = 'win3';
  } else if (a.e === '🍒' && b.e === '🍒') {
    win = 2 * bet; msgKey = 'win2cherry';
  } else if (a.e === '🍒') {
    win = 1 * bet; msgKey = 'win1cherry';
  } else if (b.e === '🍒' && c.e === '🍒') {
    win = 2 * bet; msgKey = 'win2cherry';
  } else if (b.e === '🍒') {
    win = 1 * bet; msgKey = 'win1cherry';
  } else if (c.e === '🍒') {
    win = 1 * bet; msgKey = 'win1cherry';
  }
  credits += win;
  localStorage.setItem('slot-credits', credits);
  $('#credits').textContent = credits;
  if (win > 0) {
    $('#msg').innerHTML = `${t(msgKey)} <span style="color:var(--gz-success,#27ae60)">+${win}</span>`;
  } else {
    $('#msg').textContent = t('lose');
  }
}

function resetBank() {
  credits = 1000;
  localStorage.setItem('slot-credits', credits);
  $('#credits').textContent = credits;
  $('#msg').textContent = '';
}
window.spin = spin;
window.resetBank = resetBank;

GZ.renderToolPage({
  category: 'fun',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🎰', href:'/fun/lottery-picker.html', name:'Lottery Picker'},
    {icon:'🪙', href:'/fun/coin-flipper.html', name:'Coin Flipper'},
    {icon:'🎲', href:'/fun/dice-roller.html', name:'Dice Roller'},
    {icon:'🎡', href:'/fun/decision-wheel.html', name:'Decision Wheel'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
