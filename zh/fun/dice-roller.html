<style>
.dr-quick{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.dr-die-btn{background:var(--glass2);border:1px solid var(--border);border-radius:12px;padding:10px 16px;cursor:pointer;font-size:.9rem;color:var(--text);transition:all .15s;font-weight:600}
.dr-die-btn:hover{transform:translateY(-2px);border-color:var(--accent);background:rgba(108,92,231,.15)}
.dr-die-btn .die-label{font-size:1.1rem;font-weight:800;color:var(--accent)}
.dr-formula{display:flex;gap:8px;margin-bottom:14px;align-items:center;flex-wrap:wrap}
.dr-formula input{flex:1;min-width:160px;padding:10px;background:rgba(0,0,0,.3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:monospace;font-size:1rem}
.dr-formula input:focus{outline:none;border-color:var(--accent)}
.dr-stage{text-align:center;padding:20px;background:linear-gradient(135deg,rgba(108,92,231,.08),rgba(78,205,196,.05));border-radius:12px;margin-bottom:14px;min-height:120px;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:8px}
.dr-stage .formula{font-family:monospace;color:var(--text2);font-size:.9rem}
.dr-stage .results{display:flex;gap:6px;flex-wrap:wrap;justify-content:center}
.dr-die{width:48px;height:48px;background:var(--glass2);border:2px solid var(--accent);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.2rem;font-weight:800;color:var(--accent);animation:drPop .35s}
.dr-die.crit{max-width:none;padding:0 12px;height:48px;background:linear-gradient(135deg,#ffd93d,#ff6b6b);color:#0a0a1a;border-color:transparent;animation:drCrit .6s}
.dr-die.fumble{background:#ff6b6b;color:#fff;border-color:transparent}
@keyframes drPop{0%{transform:scale(.3);opacity:0}60%{transform:scale(1.15)}100%{transform:scale(1);opacity:1}}
@keyframes drCrit{0%{transform:scale(.3) rotate(0)}50%{transform:scale(1.4) rotate(360deg)}100%{transform:scale(1) rotate(720deg)}}
.dr-stage .total{font-size:2rem;font-weight:900;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-top:6px}
.dr-stage .detail{color:var(--text2);font-size:.8rem;margin-top:2px}
.dr-history{max-height:240px;overflow:auto;background:var(--glass2);border:1px solid var(--border);border-radius:8px;padding:10px;font-family:monospace;font-size:.85rem}
.dr-history:empty::before{content:"No rolls yet — pick a die above to start.";color:var(--text2);font-style:italic}
.dr-history .row{padding:4px 0;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;gap:8px}
.dr-history .row:last-child{border-bottom:none}
.dr-history .row .f{color:var(--text2)}
.dr-history .row .r{color:var(--accent);font-weight:700}
</style>

<div class="gz-container">

  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="dr-quick">
      <button class="dr-die-btn" data-sides="4"><div class="die-label">D4</div><div style="font-size:.7rem;color:var(--text2)">4-sided</div></button>
      <button class="dr-die-btn" data-sides="6"><div class="die-label">D6</div><div style="font-size:.7rem;color:var(--text2)">6-sided</div></button>
      <button class="dr-die-btn" data-sides="8"><div class="die-label">D8</div><div style="font-size:.7rem;color:var(--text2)">8-sided</div></button>
      <button class="dr-die-btn" data-sides="10"><div class="die-label">D10</div><div style="font-size:.7rem;color:var(--text2)">10-sided</div></button>
      <button class="dr-die-btn" data-sides="12"><div class="die-label">D12</div><div style="font-size:.7rem;color:var(--text2)">12-sided</div></button>
      <button class="dr-die-btn" data-sides="20"><div class="die-label">D20</div><div style="font-size:.7rem;color:var(--text2)">20-sided</div></button>
      <button class="dr-die-btn" data-sides="100"><div class="die-label">D100</div><div style="font-size:.7rem;color:var(--text2)">100-sided</div></button>
    </div>
    <div class="dr-formula">
      <input type="text" id="formula" placeholder="e.g. 3d6+2 or 1d20-1" value="1d20">
      <button class="gz-btn" onclick="rollFormula()">Roll</button>
    </div>
    <div class="dr-stage" id="stage">
      <div class="formula">Ready to roll</div>
      <div class="results"></div>
    </div>

    <div class="dr-history" id="history"></div>

<script>
GZI18n.register({
  en: {
    toolTitle: 'Dice Roller',
    toolDesc: 'Roll D4, D6, D8, D10, D12, D20 or D100 dice. Supports custom notation like 3d6+2 — perfect for D&D, board games and tabletop RPGs.',
    step1: 'Click a quick-roll button (D6, D20, etc.) or type a custom formula',
    step2: 'Press Enter or click Roll to roll the dice',
    step3: 'View the individual results, modifier and total',
    step4: 'Browse past rolls in the history below',
    history: 'History',
    clear: 'Clear',
    adv: 'Advantage (2d20 keep high)',
    dis: 'Disadvantage (2d20 keep low)',
    invalid: 'Invalid formula — use NdM±K (e.g. 3d6+2)',
  },
  zh: {
    toolTitle: '骰子模拟器',
    toolDesc: '掷 D4、D6、D8、D10、D12、D20 或 D100 骰子。支持 3d6+2 等自定义公式 — 适合 D&D、桌游和跑团。',
    step1: '点击快速掷骰按钮（D6、D20 等）或输入自定义公式',
    step2: '按回车键或点击"掷"按钮开始掷骰',
    step3: '查看每个骰子的结果、修正值和总数',
    step4: '在下方历史记录中查看过往掷骰',
    history: '历史记录',
    clear: '清空',
    adv: '优势（2d20 取高）',
    dis: '劣势（2d20 取低）',
    invalid: '公式无效 — 请使用 NdM±K 格式（如 3d6+2）',
  }
});

const { $, t } = GZ;
let history = [];

function rollDice(count, sides) {
  const out = [];
  for (let i = 0; i < count; i++) {
    out.push(1 + Math.floor(Math.random() * sides));
  }
  return out;
}

function parseFormula(str) {
  // Supports: NdM, NdM+K, NdM-K, advantage (adv), disadvantage (dis)
  const trimmed = str.trim().toLowerCase();
  if (trimmed === 'adv' || trimmed === 'dis') {
    return { count: 2, sides: 20, modifier: 0, mode: trimmed };
  }
  const m = trimmed.match(/^(\d{1,3})d(\d{1,3})([+\-]\d{1,3})?$/);
  if (!m) return null;
  return {
    count: Math.min(parseInt(m[1]), 100),
    sides: Math.min(parseInt(m[2]), 1000),
    modifier: m[3] ? parseInt(m[3]) : 0,
    mode: null
  };
}

function showRoll(formula, results, modifier, total) {
  const stage = $('#stage');
  const sumResults = results.reduce((a,b)=>a+b, 0) + modifier;
  const modStr = modifier === 0 ? '' : (modifier > 0 ? ` + ${modifier}` : ` − ${Math.abs(modifier)}`);
  const diceHtml = results.map(r => {
    let cls = 'dr-die';
    if (results.length === 1 && r === $('#formula').value.includes('d20') ? 20 : r);
    if (r === 20) cls += ' crit';
    else if (r === 1 && results.length === 1) cls += ' fumble';
    return `<div class="${cls}">${r}</div>`;
  }).join('');
  const detail = `${results.length}d${results.length ? '' : ''} = [${results.join(', ')}]${modStr} = <b style="color:var(--accent)">${sumResults}</b>`;
  stage.innerHTML = `
    <div class="formula">${formula}</div>
    <div class="results">${diceHtml}</div>
    <div class="total">${total}</div>
    <div class="detail">${detail}</div>`;
}

function rollFormula() {
  const input = $('#formula').value;
  const parsed = parseFormula(input);
  if (!parsed) { $('#stage').innerHTML = `<div class="formula">${t('invalid')}</div>`; return; }
  let results, formula, kept, modifier = parsed.modifier;
  if (parsed.mode === 'adv' || parsed.mode === 'dis') {
    const dice = rollDice(2, 20);
    results = [parsed.mode === 'adv' ? Math.max(...dice) : Math.min(...dice)];
    formula = parsed.mode === 'adv' ? 'd20 (advantage)' : 'd20 (disadvantage)';
    kept = dice;
    showRoll(formula, kept, 0, results[0]);
    history.unshift({ f: formula, results: kept, kept: results, mod: 0, total: results[0] });
  } else {
    const rolled = rollDice(parsed.count, parsed.sides);
    const total = rolled.reduce((a,b)=>a+b, 0) + modifier;
    formula = `${parsed.count}d${parsed.sides}${modifier !== 0 ? (modifier > 0 ? '+'+modifier : modifier) : ''}`;
    showRoll(formula, rolled, modifier, total);
    history.unshift({ f: formula, results: rolled, mod: modifier, total });
  }
  renderHistory();
}

function quickRoll(sides) {
  $('#formula').value = `1d${sides}`;
  rollFormula();
}

function renderHistory() {
  $('#history').innerHTML = history.slice(0, 50).map(h => {
    const modStr = h.mod === 0 ? '' : (h.mod > 0 ? '+'+h.mod : h.mod);
    return `<div class="row"><span class="f">${h.f}</span><span>[${h.results.join(', ')}]${modStr}</span><span class="r">=${h.total}</span></div>`;
  }).join('');
}

document.querySelectorAll('.dr-die-btn').forEach(btn => {
  btn.addEventListener('click', () => quickRoll(parseInt(btn.dataset.sides)));
});

$('#formula').addEventListener('keydown', e => { if (e.key === 'Enter') rollFormula(); });

$('#toolbar').innerHTML = `
  <button class="gz-btn gz-btn-secondary" onclick="$('#formula').value='adv';rollFormula()">${t('adv')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#formula').value='dis';rollFormula()">${t('dis')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="history=[];renderHistory()">${t('clear')}</button>`;

GZ.renderToolPage({
  category: 'fun',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🪙', href:'/fun/coin-flipper.html', name:'Coin Flipper'},
    {icon:'🎯', href:'/fun/name-picker.html', name:'Name Picker'},
    {icon:'🎡', href:'/fun/decision-wheel.html', name:'Decision Wheel'},
    {icon:'👥', href:'/fun/team-generator.html', name:'Team Generator'},
  ]
});
</script>

</body>
