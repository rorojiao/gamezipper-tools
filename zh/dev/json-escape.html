const { $, copyText, t } = GZ;

// Escape raw text into a JSON-safe string body (no surrounding quotes)
function escapeJSON(str){
  // JSON.stringify wraps in quotes; we strip the surrounding quotes to return the escaped body
  let s = JSON.stringify(str);
  return s.slice(1, -1);
}

// Unescape a JSON-string-body back to real text
function unescapeJSON(str){
  // Wrap in quotes and parse; if it fails, report a friendly error
  try {
    return JSON.parse('"' + str + '"');
  } catch(e){
    throw new Error('Invalid JSON escape sequence');
  }
}

let lastMode = 'escaped';

function doEscape(){
  const v = $('#je-in').value;
  try {
    $('#je-out').value = escapeJSON(v);
    lastMode = 'escaped';
    $('#je-meta').innerHTML = `<b>${t('escaped')}:</b> ${$('#je-out').value.length.toLocaleString()} ${t('chars')}`;
  } catch(e){ $('#je-out').value = 'Error: ' + e.message; }
}

function doUnescape(){
  const v = $('#je-in').value;
  try {
    $('#je-out').value = unescapeJSON(v);
    lastMode = 'unescaped';
    $('#je-meta').innerHTML = `<b>${t('unescaped')}:</b> ${$('#je-out').value.length.toLocaleString()} ${t('chars')}`;
  } catch(e){
    $('#je-out').value = 'Error: ' + e.message;
    $('#je-meta').innerHTML = '<b style="color:var(--gz-accent)">⚠ ' + e.message + '</b>';
  }
}

function doSwap(){
  const out = $('#je-out').value;
  $('#je-in').value = out;
  $('#je-out').value = '';
  $('#je-meta').innerHTML = '';
}

function loadExample(){
  $('#je-in').value = 'She said: "Hello\\nWorld" — café ☕ cost $5.50\\t(tab)';
  doEscape();
}

function doClear(){ $('#je-in').value=''; $('#je-out').value=''; $('#je-meta').innerHTML=''; }

$('#toolbar').innerHTML = `
