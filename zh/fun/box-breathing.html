<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"What is box breathing?","acceptedAnswer":{"@type":"Answer","text":"Box breathing (or square breathing) is a simple technique where you inhale for 4 seconds, hold for 4 seconds, exhale for 4 seconds, and hold empty for 4 seconds. Navy SEALs use it to stay calm under pressure."}},{"@type":"Question","name":"How often should I do box breathing?","acceptedAnswer":{"@type":"Answer","text":"Even 3 to 5 minutes a day can lower stress and heart rate. Many people use it before meetings, exams, sleep, or whenever they feel anxious."}},{"@type":"Question","name":"Does this breathing tool work offline?","acceptedAnswer":{"@type":"Answer","text":"Yes. The animated breathing guide runs entirely in your browser. Once loaded, no internet connection is needed to follow the exercise."}},{"@type":"Question","name":"What is the difference between box, 4-7-8 and coherent breathing?","acceptedAnswer":{"@type":"Answer","text":"Box breathing keeps all four phases equal at 4 seconds. 4-7-8 breathing uses a 4-second inhale, 7-second hold and 8-second exhale to help you fall asleep. Coherent breathing targets about 5.5 breaths per minute for heart-rate balance."}}]}</script>

        <div><b id="stat-time">0:00</b><span id="lbl-time"></span></div>

</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Box Breathing Exercise',
    toolDesc: 'Guided box breathing (4-4-4-4) with an animated breathing circle. Reduce stress and anxiety in minutes — also 4-7-8 and coherent breathing modes.',
    start: 'Start',
    stop: 'Stop',
    reset: 'Reset',
    inhale: 'Breathe In',
    hold: 'Hold',
    exhale: 'Breathe Out',
    holdEmpty: 'Hold Empty',
    cycles: 'cycles',
    session: 'session',
    info: 'Follow the circle — expand on inhale, hold, contract on exhale, hold again. Breathe gently through your nose.',
    box: 'Box 4-4-4-4',
    relax: '4-7-8 Relax',
    coherent: 'Coherent 5-5',
    step1: 'Pick a breathing mode (Box, 4-7-8 or Coherent)',
    step2: 'Press Start and follow the expanding circle',
    step3: 'Breathe through your nose, keep shoulders relaxed',
    step4: 'Continue for 3-5 minutes, then press Stop',
  },
  zh: {
    toolTitle: '方块呼吸练习',
    toolDesc: '带动画引导圆圈的方法呼吸练习（4-4-4-4）。几分钟内缓解压力和焦虑 — 还支持 4-7-8 和谐振呼吸模式。',
    start: '开始',
    stop: '停止',
    reset: '重置',
    inhale: '吸气',
    hold: '屏息',
    exhale: '呼气',
    holdEmpty: '停顿',
    cycles: '轮',
    session: '时长',
    info: '跟随圆圈 — 吸气时放大，屏住，呼气时缩小，再停顿。用鼻子轻轻呼吸。',
    box: '方块 4-4-4-4',
    relax: '4-7-8 助眠',
    coherent: '谐振 5-5',
    step1: '选择呼吸模式（方块、4-7-8 或谐振）',
    step2: '点击「开始」，跟随扩张的圆圈',
    step3: '用鼻子呼吸，肩膀保持放松',
    step4: '持续 3-5 分钟，然后点击「停止」',
  }
});

const { $, t } = GZ;

const MODES = {
  box:      { pattern:['inhale','hold','exhale','holdEmpty'], secs:[4,4,4,4] },
  relax:    { pattern:['inhale','hold','exhale'],            secs:[4,7,8] },
  coherent: { pattern:['inhale','exhale'],                   secs:[5,5] }
};

let mode = 'box';
let running = false;
let phaseIdx = 0;
let phaseRemain = 0;
let cycles = 0;
let elapsed = 0;
let timer = null;

const circle = $('#circle');
const phaseEl = $('#phase');
const countEl = $('#count');

function fmtTime(s){ const m=Math.floor(s/60); return m+':'+String(s%60).padStart(2,'0'); }

function buildModes(){
  $('#modes').innerHTML = ['box','relax','coherent'].map(k=>`<button class="br-mode ${k===mode?'active':''}" data-m="${k}">${t(k)}</button>`).join('');
  $('#modes').querySelectorAll('.br-mode').forEach(b=>b.onclick=()=>{
    if(running) return;
    mode = b.dataset.m;
    buildModes();
    reset();
  });
}

function setPhase(){
  const m = MODES[mode];
  const ph = m.pattern[phaseIdx];
  phaseRemain = m.secs[phaseIdx];
  phaseEl.textContent = t(ph);
  countEl.textContent = phaseRemain;
  // animate circle
  const expand = ph === 'inhale';
  const full = ph === 'exhale';
  circle.style.transition = `transform ${m.secs[phaseIdx]}s cubic-bezier(.45,0,.55,1), background .8s`;
  if (expand) {
    circle.style.transform = 'scale(2.1)';
    circle.style.background = 'radial-gradient(circle at 35% 35%,#7ee8e1,#2bbfbb)';
  } else if (full) {
    circle.style.transform = 'scale(1)';
    circle.style.background = 'radial-gradient(circle at 35% 35%,#4ecdc4,#1a9a92)';
  } else {
    // hold — keep current size, just shift color
    circle.style.transition = 'background .8s';
    circle.style.background = 'radial-gradient(circle at 35% 35%,#9ad6f0,#3a7bd5)';
  }
}

function tick(){
  phaseRemain--;
  elapsed++;
  if (phaseRemain <= 0) {
    phaseIdx++;
    if (phaseIdx >= MODES[mode].pattern.length) {
      phaseIdx = 0;
      cycles++;
      $('#stat-cycles').textContent = cycles;
    }
    setPhase();
  } else {
    countEl.textContent = phaseRemain;
  }
  $('#stat-time').textContent = fmtTime(elapsed);
}

function start(){
  if(running) return;
  running = true;
  $('#goBtn').textContent = t('stop');
  if (phaseIdx === 0 && phaseRemain === 0) setPhase();
  timer = setInterval(tick, 1000);
}

function stop(){
  running = false;
  $('#goBtn').textContent = t('start');
  if (timer) { clearInterval(timer); timer = null; }
}

function reset(){
  stop();
  phaseIdx = 0; phaseRemain = 0; cycles = 0; elapsed = 0;
  $('#stat-cycles').textContent = '0';
  $('#stat-time').textContent = '0:00';
  phaseEl.textContent = t('inhale');
  countEl.textContent = '—';
  circle.style.transition = 'transform .6s, background .8s';
  circle.style.transform = 'scale(1)';
  circle.style.background = 'radial-gradient(circle at 35% 35%,#4ecdc4,#1a9a92)';
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" id="goBtn">${t('start')}</button>
  <button class="gz-btn gz-btn-secondary" id="resetBtn">${t('reset')}</button>
`;

$('#goBtn').onclick = () => running ? stop() : start();
$('#resetBtn').onclick = reset;
$('#lbl-cycles').textContent = t('cycles');
$('#lbl-time').textContent = t('session');
$('#info').textContent = t('info');

buildModes();
reset();

GZ.renderToolPage({
  category: 'fun',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🍅', href:'/calc/pomodoro.html', name:'Pomodoro Timer'},
    {icon:'🎵', href:'/fun/white-noise.html', name:'White Noise'},
    {icon:'🧘', href:'/fun/stretch-break.html', name:'Stretch Break'},
    {icon:'⏱️', href:'/fun/stopwatch.html', name:'Stopwatch'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
