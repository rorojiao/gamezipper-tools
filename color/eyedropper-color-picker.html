<script>
GZI18n.register({
  en: {
    toolTitle: 'EyeDropper Color Picker',
    toolDesc: 'Pick any color from your screen with the native EyeDropper API, or fine-tune with a full HSL/HSV picker. Get HEX, RGB, HSL, HSV and CMYK with one-click copy. 100% browser-only.',
    pick: '🎯 Pick Screen Color',
    clear: 'Clear History',

  },
  zh: {

    toolDesc: '使用原生 EyeDropper API 从屏幕任意位置取色，或用完整的 HSL/HSV 取色器精调。即时获取 HEX、RGB、HSL、HSV、CMYK，一键复制。100% 浏览器本地运行。',
    pick: '🎯 屏幕取色',
    clear: '清空历史',
    noApi: 'ℹ️ 当前浏览器不支持原生 EyeDropper API。请使用下方取色器，或在 Chrome/Edge 中打开本页以采样任意屏幕像素。',
    lblHexIn: '或输入 HEX 颜色',
    lblHistory: '历史记录',
    step1: '点击「屏幕取色」采样屏幕任意像素（Chrome/Edge）',
    step2: '无 EyeDropper 时，在饱和度方块和色相条上拖动取色',
    step3: '查看 HEX、RGB、HSL、HSV、CMYK 数值',
    step4: '点击 ⧉ 复制任意格式，或输入 HEX 代码进行转换',
  }
});

const { $, copyText, t } = GZ;
let H = 0, S = 100, V = 100;          // current color in HSV (model)
const history = [];

function clamp(n, a, b){ return Math.min(b, Math.max(a, n)); }

// ---- HSV <-> RGB <-> HEX ----
function hsv2rgb(h, s, v){
  h = (h % 360 + 360) % 360; s /= 100; v /= 100;
  const c = v * s, x = c * (1 - Math.abs((h / 60) % 2 - 1)), m = v - c;
  let r=0,g=0,b=0;
  if(h<60){r=c;g=x;} else if(h<120){r=x;g=c;} else if(h<180){g=c;b=x;}
  else if(h<240){g=x;b=c;} else if(h<300){r=x;b=c;} else {r=c;b=x;}
  return [Math.round((r+m)*255), Math.round((g+m)*255), Math.round((b+m)*255)];
}
function rgb2hsv(r,g,b){
  r/=255;g/=255;b/=255;
  const mx=Math.max(r,g,b),mn=Math.min(r,g,b),d=mx-mn;
  let h=0; const s = mx===0?0:d/mx, v=mx;
  if(d!==0){
    if(mx===r) h=((g-b)/d)%6;
    else if(mx===g) h=(b-r)/d+2;
    else h=(r-g)/d+4;
    h*=60; if(h<0) h+=360;
  }
  return [Math.round(h), Math.round(s*100), Math.round(v*100)];
}
function rgb2hsl(r,g,b){
  r/=255;g/=255;b/=255;
  const mx=Math.max(r,g,b),mn=Math.min(r,g,b),d=mx-mn;
  let h=0,s=0; const l=(mx+mn)/2;
  if(d!==0){
    s = d/(1-Math.abs(2*l-1));
    if(mx===r) h=((g-b)/d)%6; else if(mx===g) h=(b-r)/d+2; else h=(r-g)/d+4;
    h*=60; if(h<0) h+=360;
  }
  return [Math.round(h), Math.round(s*100), Math.round(l*100)];
}
function rgb2cmyk(r,g,b){
  r/=255;g/=255;b/=255;
  const k=1-Math.max(r,g,b);
  if(k===1) return [0,0,0,100];
  const c=(1-r-k)/(1-k), m=(1-g-k)/(1-k), y=(1-b-k)/(1-k);
  return [Math.round(c*100),Math.round(m*100),Math.round(y*100),Math.round(k*100)];
}
function toHex(r,g,b){ return '#'+[r,g,b].map(n=>n.toString(16).padStart(2,'0')).join('').toUpperCase(); }
function hex2rgb(hex){
  hex = hex.replace('#','').trim();
  if(hex.length===3) hex = hex.split('').map(c=>c+c).join('');
  if(!/^[0-9a-f]{6}$/i.test(hex)) return null;
  return [parseInt(hex.slice(0,2),16),parseInt(hex.slice(2,4),16),parseInt(hex.slice(4,6),16)];
}

function render(){
  const [r,g,b] = hsv2rgb(H,S,V);
  const hex = toHex(r,g,b);
  const [hh,hs,hl] = rgb2hsl(r,g,b);
  const [cc,mm,yy,kk] = rgb2cmyk(r,g,b);
  $('#v-hex').textContent = hex;
  $('#v-rgb').textContent = `rgb(${r}, ${g}, ${b})`;
  $('#v-hsl').textContent = `hsl(${hh}, ${hs}%, ${hl}%)`;
  $('#v-hsv').textContent = `hsv(${Math.round(H)}, ${Math.round(S)}%, ${Math.round(V)}%)`;
  $('#v-cmyk').textContent = `cmyk(${cc}%, ${mm}%, ${yy}%, ${kk}%)`;
  $('#swatch').style.background = hex;
  // hue cursor
  $('#hue-cursor').style.left = (H/360*100)+'%';
  // saturation square background reflects current hue
  const [pr,pg,pb] = hsv2rgb(H,100,100);
  $('#sv').style.background =
    `linear-gradient(to top, #000, transparent), linear-gradient(to right, #fff, rgb(${pr},${pg},${pb}))`;
  drawSVCrosshair();
  $('#hex-in').value = hex.slice(1);
}

let cursorPos = null;
function drawSVCrosshair(){
  // draw crosshair via box-shadow overlay element
  let cv = $('#sv-cross');
  const rect = $('#sv').getBoundingClientRect();
  if(!cv){
    cv = document.createElement('div');
    cv.id='sv-cross';
    cv.style.cssText='position:absolute;width:14px;height:14px;border:2px solid #fff;border-radius:50%;box-shadow:0 0 0 1px #000,0 0 3px #000;pointer-events:none;transform:translate(-50%,-50%)';
    $('#sv').parentElement.style.position='relative';
    $('#sv').parentElement.appendChild(cv);
  }
  cv.style.left = (S/100*rect.width)+'px';
  cv.style.top  = ((1-V/100)*rect.height)+'px';
}

function pushHistory(hex){
  if(history[0]===hex) return;
  history.unshift(hex);
  if(history.length>18) history.pop();
  $('#history').innerHTML = history.map(h=>`<div class="h" style="background:${h}" title="${h}" onclick="loadHex('${h}')"></div>`).join('');
}
function loadHex(hex){
  const rgb = hex2rgb(hex); if(!rgb) return;
  [H,S,V] = rgb2hsv(...rgb); render();
}

// ---- EyeDropper native API ----
const hasEyeDropper = typeof window.EyeDropper === 'function';
if(!hasEyeDropper){ $('#noapi').style.display='block'; $('#noapi').textContent = t('noApi'); }

async function doPick(){
  if(!hasEyeDropper){
    // highlight fallback square
    $('#sv').style.outline='3px solid var(--gz-accent,#e94560)';
    setTimeout(()=>$('#sv').style.outline='',500);
    return;
  }
  try{
    const dropper = new EyeDropper();
    const res = await dropper.open();
    loadHex(res.sRGBHex);
    pushHistory(res.sRGBHex.toUpperCase());
  }catch(e){ /* user cancelled */ }
}

// ---- SV square drag ----
let dragging=false;
function svUpdate(e){
  const rect = $('#sv').getBoundingClientRect();
  const cx = (e.touches?e.touches[0].clientX:e.clientX) - rect.left;
  const cy = (e.touches?e.touches[0].clientY:e.clientY) - rect.top;
  S = clamp(cx/rect.width*100, 0, 100);
  V = clamp((1-cy/rect.height)*100, 0, 100);
  render();
}
$('#sv').addEventListener('mousedown', e=>{dragging=true;svUpdate(e);});
$('#sv').addEventListener('touchstart', e=>{dragging=true;svUpdate(e);e.preventDefault();},{passive:false});
document.addEventListener('mousemove', e=>{if(dragging)svUpdate(e);});
document.addEventListener('touchmove', e=>{if(dragging){svUpdate(e);e.preventDefault();}},{passive:false});
document.addEventListener('mouseup', ()=>{ if(dragging){dragging=false; pushHistory($('#v-hex').textContent);} });
document.addEventListener('touchend', ()=>{ if(dragging){dragging=false; pushHistory($('#v-hex').textContent);} });

// ---- hue bar drag ----
let hueDrag=false;
function hueUpdate(e){
  const rect = $('#hue').getBoundingClientRect();
  const cx = (e.touches?e.touches[0].clientX:e.clientX) - rect.left;
  H = clamp(cx/rect.width*360, 0, 360); render();
}
$('#hue').addEventListener('mousedown', e=>{hueDrag=true;hueUpdate(e);});
$('#hue').addEventListener('touchstart', e=>{hueDrag=true;hueUpdate(e);e.preventDefault();},{passive:false});
document.addEventListener('mousemove', e=>{if(hueDrag)hueUpdate(e);});
document.addEventListener('touchmove', e=>{if(hueDrag){hueUpdate(e);e.preventDefault();}},{passive:false});
document.addEventListener('mouseup', ()=>{if(hueDrag)hueDrag=false;});
document.addEventListener('touchend', ()=>{if(hueDrag)hueDrag=false;});

// ---- hex input ----
$('#hex-in').addEventListener('input', e=>{
  const rgb = hex2rgb(e.target.value);
  if(rgb){ [H,S,V]=rgb2hsv(...rgb); render(); }
});

$('#lbl-hex-in').textContent = t('lblHexIn');
$('#lbl-history').textContent = t('lblHistory');

$('#toolbar').innerHTML = `
  <button class="gz-btn" id="pick-btn" onclick="doPick()">${t('pick')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="clearHistory()">${t('clear')}</button>`;
function clearHistory(){ history.length=0; $('#history').innerHTML=''; }

// init
loadHex('#3B82F6');   // nice default blue
window.addEventListener('resize', drawSVCrosshair);

GZ.renderToolPage({
  category: 'color',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🎨', href:'/color/picker.html', name:'Color Picker'},
    {icon:'🔄', href:'/color/hex-rgb.html', name:'HEX ↔ RGB'},
    {icon:'🌈', href:'/color/palette.html', name:'Palette Generator'},
    {icon:'👁️', href:'/color/contrast.html', name:'Contrast Checker'},
  ]
});
</script>
