<div class="gz-container">

<script>
GZI18n.register({
  en: {
    toolTitle: 'Voice Typing Tool — Speech to Text',
    toolDesc: 'Speak into your microphone and see text appear instantly. Free dictation tool using the Web Speech API — 100% in your browser, no upload, no signup. Supports 20+ languages.',
    startListening: 'Start Listening',
    stopListening: 'Stop Listening',
    placeholder: 'Your transcribed text will appear here. Click the microphone and start speaking...',
    statusIdle: 'Ready — click the microphone to start',
    statusListening: '🎤 Listening... speak now',
    statusStopped: 'Stopped',
    statusUnsupported: '⚠ Speech recognition is not supported in this browser. Try Chrome, Edge or Safari.',
    warnMic: '⚠ Please allow microphone access when prompted by your browser.',
    interimPlaceholder: 'Speech preview appears here...',
    clear: 'Clear',
    copy: 'Copy',
    download: 'Download TXT',
    wordCount: 'words',
    step1: 'Select your spoken language from the dropdown',
    step2: 'Click the microphone button and allow mic access',
    step3: 'Speak naturally — text appears as you talk',
    step4: 'Edit, copy or download your transcript',
  },
  zh: {
    toolTitle: '语音输入工具 — 语音转文字',
    toolDesc: '对着麦克风说话，文字即时出现。使用 Web Speech API 的免费听写工具 — 100% 浏览器本地运行，无需上传、无需注册。支持 20+ 种语言。',
    startListening: '开始听写',
    stopListening: '停止听写',
    placeholder: '你的转录文字将出现在这里。点击麦克风按钮并开始说话...',
    statusIdle: '准备就绪 — 点击麦克风开始',
    statusListening: '🎤 正在听写...请说话',
    statusStopped: '已停止',
    statusUnsupported: '⚠ 此浏览器不支持语音识别。请尝试 Chrome、Edge 或 Safari。',
    warnMic: '⚠ 请在浏览器提示时允许访问麦克风。',
    interimPlaceholder: '语音预览出现在这里...',
    clear: '清空',
    copy: '复制',
    download: '下载 TXT',
    wordCount: '词',
    step1: '从下拉菜单选择你说的语言',
    step2: '点击麦克风按钮并允许麦克风访问',
    step3: '自然说话 — 文字会随你说话实时出现',
    step4: '编辑、复制或下载你的转录文本',
  }
});

const { $, t } = GZ;

let recognition = null;
let isListening = false;
let finalText = '';

const SR = window.SpeechRecognition || window.webkitSpeechRecognition;

if (!SR) {
  $('#warn').classList.add('show');
  $('#warn').textContent = t('statusUnsupported');
  $('#micBtn').disabled = true;
  $('#micBtn').style.opacity = '0.5';
  $('#statusText').textContent = t('statusUnsupported');
} else {
  recognition = new SR();
  recognition.continuous = true;
  recognition.interimResults = true;
  $('#statusText').textContent = t('statusIdle');
}

$('#output').placeholder = t('placeholder');
$('#interim').textContent = t('interimPlaceholder');
$('#micLabel').textContent = t('startListening');

if (recognition) {
  recognition.onresult = (event) => {
    let interim = '';
    for (let i = event.resultIndex; i < event.results.length; i++) {
      const transcript = event.results[i][0].transcript;
      if (event.results[i].isFinal) {
        finalText += transcript;
      } else {
        interim += transcript;
      }
    }
    $('#output').value = finalText;
    $('#interim').textContent = interim || t('interimPlaceholder');
  };

  recognition.onerror = (event) => {
    if (event.error === 'not-allowed' || event.error === 'service-not-allowed') {
      $('#warn').classList.add('show');
      $('#warn').textContent = t('warnMic');
    }
    $('#statusText').textContent = 'Error: ' + event.error;
    stopListening();
  };

  recognition.onend = () => {
    if (isListening) {
      // Auto-restart if still supposed to be listening
      try { recognition.start(); } catch(e) { stopListening(); }
    } else {
      stopListening();
    }
  };
}

function startListening() {
  if (!recognition) return;
  recognition.lang = $('#lang').value;
  finalText = $('#output').value;
  try {
    recognition.start();
    isListening = true;
    $('#micBtn').classList.add('recording');
    $('#micLabel').textContent = t('stopListening');
    $('#dot').className = 'vt-dot recording';
    $('#statusText').textContent = t('statusListening');
  } catch(e) {
    // Already started
  }
}

function stopListening() {
  if (!recognition) return;
  isListening = false;
  try { recognition.stop(); } catch(e) {}
  $('#micBtn').classList.remove('recording');
  $('#micLabel').textContent = t('startListening');
  $('#dot').className = 'vt-dot';
  $('#statusText').textContent = t('statusStopped');
  $('#interim').textContent = t('interimPlaceholder');
}

function toggleMic() {
  if (isListening) stopListening(); else startListening();
}

$('#lang').addEventListener('change', () => {
  if (isListening) {
    stopListening();
    setTimeout(startListening, 200);
  }
});

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="GZ.copyText(document.getElementById('output').value)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="document.getElementById('output').value='';finalText=''">${t('clear')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="var b=new Blob([document.getElementById('output').value],{type:'text/plain'});var a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='transcript.txt';a.click()">${t('download')}</button>`;

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1', 'step2', 'step3', 'step4'],
  related: [
    {icon: '🔊', href: '/text/text-to-speech.html', name: 'Text to Speech'},
    {icon: '📝', href: '/text/word-counter.html', name: 'Word Counter'},
    {icon: '✍️', href: '/text/handwriting.html', name: 'Text to Handwriting'},
    {icon: '⌨️', href: '/text/typewriter.html', name: 'Typewriter Effect'},
  ]
});
</script>
