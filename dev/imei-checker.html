// Manufacturer by TAC prefix (first 8 digits or key prefixes)
// These are commonly known TAC ranges; full GSMA database not available client-side
const BRANDS = [
  // Apple
  {prefix:'0139',brand:'Apple iPhone'},
  {prefix:'3533',brand:'Apple iPhone'},
  {prefix:'3582',brand:'Apple iPhone'},
  {prefix:'3591',brand:'Apple iPhone'},

function luhnValid(imei) {
  let sum = 0;
  let dbl = false;
  for (let i = imei.length - 1; i >= 0; i--) {
    let d = parseInt(imei[i]);
    if (dbl) {
      d *= 2;
      if (d > 9) d -= 9;
    }
    sum += d;
    dbl = !dbl;
  }
  return sum % 10 === 0;
}

function calcCheckDigit(first14) {
  let sum = 0;
  let dbl = true; // for the 15th position
  for (let i = 13; i >= 0; i--) {
    let d = parseInt(first14[i]);
    if (!dbl) {
      d *= 2;
      if (d > 9) d -= 9;
    }
    sum += d;
    dbl = !dbl;
  }
  return (10 - (sum % 10)) % 10;
}

function getBrand(tac) {
  const tac8 = tac.substring(0, 4);
  for (const b of BRANDS) {
    if (tac8.startsWith(b.prefix.substring(0, 4))) return b.brand;
  }
  return t('unknownBrand');
}

$('#app').innerHTML = `
  <div class="gz-field" style="margin-bottom:16px">
    <input type="text" id="imei" class="imei-input" maxlength="16" placeholder="${t('placeholder')}" oninput="this.value=this.value.replace(/[^0-9]/g,'')">
  </div>
  <button class="gz-btn" onclick="check()" style="width:100%;max-width:400px;font-size:1.05em;padding:12px">${t('check')}</button>
  <div id="result" style="margin-top:16px"></div>
`;

function row(key, val) {
  return `<div class="decode-row"><span class="key">${key}</span><span class="val">${val}</span></div>`;
}

function check() {
  let imei = $('#imei').value.trim();
  if (!/^\d{14,16}$/.test(imei)) {
    $('#result').innerHTML = `<div style="color:#e74c3c;padding:12px;text-align:center">${t('invalid')}</div>`;
    return;
  }

  let valid, typeLabel, isSV = false, isShort = false;
  if (imei.length === 15) {
    valid = luhnValid(imei);
    typeLabel = t('type15');
  } else if (imei.length === 16) {
    // IMEISV - no check digit, 8 TAC + 6 SV
    valid = true;
    isSV = true;
    typeLabel = t('type16');
  } else {
    // 14 digits - show computed check digit
    isShort = true;
    valid = true;
    typeLabel = t('type14');
  }

  const tac = imei.substring(0, 8);
  const rbi = tac.substring(0, 2);
  const reportingBody = RBIS[rbi] || t('notFound');
  const brand = getBrand(tac);
  const modelId = tac.substring(2);

  let serial, sv, checkDig;
  if (isSV) {
    serial = imei.substring(8, 12);
    sv = imei.substring(12);
    checkDig = 'N/A (IMEISV)';
  } else if (isShort) {
    const cd = calcCheckDigit(imei);
    serial = imei.substring(8);
    checkDig = `${cd} (computed)`;
  } else {
    serial = imei.substring(8, 14);
    checkDig = imei[14];
    sv = 'N/A';
  }

  let colors = [];
  for (let i = 0; i < imei.length; i++) {
    let bg = '#9b59b6';
    if (i < 8) bg = '#4ecdc4';
    else if (i < 14 && !isShort) bg = '#f39c12';
    else if (!isSV && i === imei.length - 1) bg = valid ? '#27ae60' : '#e74c3c';
    else bg = '#3498db';
    colors.push(`<span style="color:#fff;background:${bg};border-radius:4px;padding:2px 0">${imei[i]}</span>`);
  }

  const status = isSV ? t('validSV') : (valid ? t('valid') : t('invalid2'));
  const statusClass = (isSV || valid) ? 'check-ok' : 'check-fail';

  $('#result').innerHTML = `
    <div class="imei-display">${colors.join('&nbsp;')}</div>
    <div style="background:var(--glass);border:1px solid var(--border);border-radius:16px;padding:4px 16px;margin-bottom:16px">
      ${row(t('luhnCheck'), `<span class="check-valid ${statusClass}">${status}</span>`)}
      ${row(t('type'), typeLabel)}
    </div>
    <div style="background:var(--glass);border:1px solid var(--border);border-radius:16px;padding:4px 16px">
      ${row(t('tac'), tac)}
      ${row(t('manufacturer'), brand)}
      ${row(t('reportingBody'), `${reportingBody} (${rbi})`)}
      ${row(t('modelId'), modelId)}
      ${row(t('serial'), serial)}
      ${isSV ? row(t('softwareVersion'), sv) : ''}
      ${row(t('checkDigit'), checkDig)}
    </div>
  `;
}

</script>
