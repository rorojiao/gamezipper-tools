    delimiter: '分隔符',

    step3: '点击「验证」检查错误',
    step4: '查看逐行错误报告',
    valid: '✓ CSV 有效',
    errors: '✗ 发现 {n} 个问题',
    stats: '统计信息',
    totalRows: '总行数',
    totalCols: '列数',
    totalCells: '总单元格数',
    emptyRows: '空行数',
    hasBOM: 'BOM 标记',
    yes: '是',
    no: '否',
  }
});

const { $, copyText, t } = GZ;
let delimiter = 'auto';

function detectDelimiter(text) {
  const firstLine = text.split('\n')[0] || '';
  const counts = { ',': 0, ';': 0, '\t': 0, '|': 0 };
  for (const ch of firstLine) { if (ch in counts) counts[ch]++; }
  let best = ',', max = 0;
  for (const [d, c] of Object.entries(counts)) { if (c > max) { max = c; best = d; } }
  return best;
}

function parseCSVLine(line, delim) {
  const result = [];
  let cur = '', inQuotes = false, fieldStarted = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (ch === '"') {
      if (inQuotes && line[i+1] === '"') { cur += '"'; i++; }
      else inQuotes = !inQuotes;
      fieldStarted = true;
    } else if (ch === delim && !inQuotes) {
      result.push(cur); cur = ''; fieldStarted = false;
    } else {
      cur += ch; fieldStarted = true;
    }
  }
  result.push(cur);
  return { fields: result, inQuotes };
}

function validate() {
  const raw = $('#input').value;
  if (!raw.trim()) return;
  const hasBOM = raw.charCodeAt(0) === 0xFEFF;
  const text = hasBOM ? raw.slice(1) : raw;
  const delim = delimiter === 'auto' ? detectDelimiter(text) : delimiter;

  const lines = text.split('\n');
  const errors = [];
  let expectedCols = -1;
  let emptyRows = 0;
  let totalCells = 0;

  // Determine expected cols from first non-empty line
  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];
    if (line.trim() === '') { if (i < lines.length - 1) emptyRows++; continue; }
    const { fields, inQuotes } = parseCSVLine(line, delim);
    if (inQuotes) errors.push({ line: i+1, msg: t('en') && t('en') || 'Unclosed quote' });
    totalCells += fields.length;
    if (expectedCols === -1) expectedCols = fields.length;
    else if (fields.length !== expectedCols) {
      errors.push({ line: i+1, msg: `Expected ${expectedCols} fields, found ${fields.length}` });
    }
  }

  const totalRows = lines.filter(l => l.trim() !== '').length;
  let html = `<div style="margin-bottom:12px">`;
  html += `<span class="stat-card"><b>${totalRows}</b>${t('totalRows')}</span>`;
  html += `<span class="stat-card"><b>${expectedCols > 0 ? expectedCols : 0}</b>${t('totalCols')}</span>`;
  html += `<span class="stat-card"><b>${totalCells}</b>${t('totalCells')}</span>`;
  html += `<span class="stat-card"><b>${emptyRows}</b>${t('emptyRows')}</span>`;
  html += `<span class="stat-card"><b>${hasBOM ? t('yes') : t('no')}</b>${t('hasBOM')}</span>`;
  html += `</div>`;

  if (errors.length === 0) {
    html += `<div class="ok-line">${t('valid')}</div>`;
    $('#status').innerHTML = `<span style="color:var(--gz-success)">${t('valid')}</span>`;
  } else {
    html += `<div class="err-line" style="font-weight:bold;margin-bottom:6px">${t('errors').replace('{n}', errors.length)}</div>`;
    errors.slice(0, 50).forEach(e => {
      html += `<div class="err-line">Line ${e.line}: ${e.msg}</div>`;
    });
    if (errors.length > 50) html += `<div class="err-line">... and ${errors.length - 50} more</div>`;
    $('#status').innerHTML = `<span style="color:var(--gz-accent)">${t('errors').replace('{n}', errors.length)}</span>`;
  }

  $('#output').innerHTML = html;
}

function loadExample() {
  $('#input').value = 'name,age,city\nAlice,30,"New York"\nBob,25,Los Angeles\nCharlie,35,"Chicago, IL"\nDiana,28';
  validate();
}

function doClear() { $('#input').value = ''; $('#output').textContent = ''; $('#status').innerHTML = ''; }

$('#input').addEventListener('input', validate);

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="validate()">${t('validate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>
  <select class="gz-select" onchange="delimiter=this.value;validate()">
    <option value="auto">${t('auto')}</option>
    <option value=",">${t('comma')}</option>
    <option value=";">${t('semicolon')}</option>
    <option value="\t">${t('tab')}</option>
    <option value="|">${t('pipe')}</option>
  </select>`;
