const { $, t } = GZ;

function ordinalSuffix(num) {
  const abs = Math.abs(Math.floor(num));
  const lastTwo = abs % 100;
  if (lastTwo >= 11 && lastTwo <= 13) return 'th';
  const last = abs % 10;
  if (last === 1) return 'st';
  if (last === 2) return 'nd';
  if (last === 3) return 'rd';
  return 'th';
}

const WORDS = ['zeroth','first','second','third','fourth','fifth','sixth','seventh','eighth','ninth','tenth','eleventh','twelfth','thirteenth','fourteenth','fifteenth','sixteenth','seventeenth','eighteenth','nineteenth','twentieth'];

function toWord(n) {
  const i = Math.floor(Math.abs(n));
  if (i <= 20) return WORDS[i];
  // crude fallback
  return null;
}

function ruleFor(num) {
  const abs = Math.abs(Math.floor(num));
  const lastTwo = abs % 100;
  if (lastTwo >= 11 && lastTwo <= 13) return '11-13 always use -th';
  const last = abs % 10;
  return last === 1 ? 'ends in 1 → -st' : last === 2 ? 'ends in 2 → -nd' : last === 3 ? 'ends in 3 → -rd' : 'otherwise → -th';
}

function render() {
  const raw = $('#input').value.trim();
  if (!raw || isNaN(parseFloat(raw))) {
    $('#result').style.display = 'none';
    return;
  }
  const num = parseFloat(raw);
  const suffix = ordinalSuffix(num);
  $('#bigResult').textContent = num + suffix;
  $('#subResult').textContent = t('suffix') + ': "' + suffix + '"';
  const word = toWord(num);
  const cells = [
    {num: Math.abs(Math.floor(num)) % 10, lbl: t('lastDigit')},
    {num: suffix, lbl: t('suffix')},
  ];
  if (word) cells.push({num: word, lbl: t('word')});
  $('#grid').innerHTML = cells.map(c => `<div class="ord-tile"><div class="num">${c.num}</div><div class="lbl">${c.lbl}</div></div>`).join('');
  $('#result').style.display = 'block';
}

const refData = [[1,'1st','first'],[2,'2nd','second'],[3,'3rd','third'],[4,'4th','fourth'],[5,'5th','fifth'],[11,'11th','eleventh'],[12,'12th','twelfth'],[13,'13th','thirteenth'],[21,'21st','twenty-first'],[22,'22nd','twenty-second'],[23,'23rd','twenty-third'],[32,'32nd','thirty-second'],[100,'100th','hundredth'],[1000,'1000th','thousandth']];
