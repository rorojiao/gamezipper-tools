<script>
GZI18n.register({
  en: {
    toolTitle: 'Simon Says Memory Game',
    toolDesc: 'Play the classic Simon Says memory game online for free. Watch the color sequence, repeat it back and grow your streak — with sound, increasing difficulty and high-score tracking.',
    lblLevel: 'Level',
    lblBest: 'Best',
    lblStreak: 'Streak',
    centerLbl: 'SIMON',
    start: '▶ Start Game',
    reset: 'Reset',
    soundOn: '🔊 Sound On',
    soundOff: '🔇 Muted',
    ready: 'Press Start to play',
    watch: '👀 Watch carefully…',
    repeat: '👉 Your turn — repeat the sequence',
    correct: '✓ Correct! Next level…',
    wrong: '✗ Wrong! Game over',
    over: 'Game Over — you reached level',
    newBest: '🏆 New high score!',
    step1: 'Press Start to begin a new round',
    step2: 'Simon plays a sequence of colored pads with tones',
    step3: 'Repeat the same sequence by clicking the pads in order',
    step4: 'Each correct round adds one more step to the sequence',
  },
  zh: {
    toolTitle: 'Simon Says 记忆游戏',
    toolDesc: '免费在线玩经典的 Simon Says 记忆游戏。观察颜色序列并按顺序重复，连续通关提升等级 — 含音效、难度递增和最高分记录。',
    lblLevel: '等级',
    lblBest: '最高',
    lblStreak: '连胜',
    centerLbl: '记忆',
    start: '▶ 开始游戏',
    reset: '重置',
    soundOn: '🔊 开启声音',
    soundOff: '🔇 已静音',
    ready: '点击「开始」进行游戏',
    watch: '👀 仔细观察…',
    repeat: '👉 轮到你了 — 按顺序点击',
    correct: '✓ 正确！下一关…',
    wrong: '✗ 错误！游戏结束',
    over: '游戏结束 — 你达到了等级',
    newBest: '🏆 新纪录！',
    step1: '点击「开始」开启新一轮',
    step2: 'Simon 会播放一段带音效的颜色序列',
    step3: '按相同顺序点击色块重复序列',
    step4: '每通过一关，序列增加一个步骤',
  }
});

const { $, t } = GZ;

const PADS = ['.green', '.red', '.yellow', '.blue'];
const FREQS = [329.63, 261.63, 220.00, 164.81]; // E4, C4, A3, E3
let sequence = [], playerIndex = 0, level = 0, best = +(localStorage.getItem('simon-best') || 0);
let streak = +(localStorage.getItem('simon-streak') || 0);
let muted = false, audioCtx = null, acceptingInput = false;

$('#stat-best').textContent = best;
$('#stat-streak').textContent = streak;
$('#lbl-level').textContent = t('lblLevel');
$('#lbl-best').textContent = t('lblBest');
$('#lbl-streak').textContent = t('lblStreak');
$('#center-lbl').textContent = t('centerLbl');
$('#status').textContent = t('ready');

function ensureAudio() {
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
  }
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
}

function beep(freq, ms) {
  if (muted || !audioCtx) return;
  const o = audioCtx.createOscillator(), g = audioCtx.createGain();
  o.type = 'sine'; o.frequency.value = freq;
  g.gain.setValueAtTime(0, audioCtx.currentTime);
  g.gain.linearRampToValueAtTime(0.25, audioCtx.currentTime + 0.02);
  g.gain.linearRampToValueAtTime(0, audioCtx.currentTime + ms / 1000);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(); o.stop(audioCtx.currentTime + ms / 1000);
}

function errorSound() {
  if (muted || !audioCtx) return;
  const o = audioCtx.createOscillator(), g = audioCtx.createGain();
  o.type = 'sawtooth'; o.frequency.setValueAtTime(200, audioCtx.currentTime);
  o.frequency.exponentialRampToValueAtTime(60, audioCtx.currentTime + 0.5);
  g.gain.setValueAtTime(0.25, audioCtx.currentTime);
  g.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.5);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(); o.stop(audioCtx.currentTime + 0.5);
}

function lightPad(idx, ms) {
  const pad = document.querySelector(PADS[idx]);
  pad.classList.add('active');
  beep(FREQS[idx], ms);
  setTimeout(() => pad.classList.remove('active'), ms);
}

function disablePads(on) {
  document.querySelectorAll('.simon-pad').forEach(p => p.classList.toggle('disabled', on));
}

async function playSequence() {
  acceptingInput = false;
  disablePads(true);
  $('#status').textContent = t('watch');
  const stepMs = Math.max(280, 600 - level * 18);
  await new Promise(r => setTimeout(r, 500));
  for (let i = 0; i < sequence.length; i++) {
    lightPad(sequence[i], stepMs * 0.6);
    await new Promise(r => setTimeout(r, stepMs));
  }
  $('#status').textContent = t('repeat');
  disablePads(false);
  acceptingInput = true;
  playerIndex = 0;
}

function startGame() {
  ensureAudio();
  sequence = [];
  level = 0;
  $('#stat-level').textContent = 0;
  $('#center-level').textContent = '—';
  nextRound();
}

function nextRound() {
  level++;
  sequence.push(Math.floor(Math.random() * 4));
  $('#stat-level').textContent = level;
  $('#center-level').textContent = level;
  $('#status').textContent = t('correct');
  playerIndex = 0;
  playSequence();
}

function gameOver() {
  acceptingInput = false;
  disablePads(true);
  errorSound();
  // update best
  const score = sequence.length - 1; // levels completed
  let newBest = false;
  if (score > best) { best = score; localStorage.setItem('simon-best', best); $('#stat-best').textContent = best; newBest = true; }
  // streak breaks
  streak = 0; localStorage.setItem('simon-streak', 0); $('#stat-streak').textContent = 0;
  $('#status').innerHTML = (newBest ? t('newBest') + ' ' : '') + t('wrong') + ' (' + t('over') + ' ' + level + ')';
  $('#center-level').textContent = '✗';
}

document.querySelectorAll('.simon-pad').forEach(pad => {
  pad.addEventListener('click', () => {
    if (!acceptingInput || pad.classList.contains('disabled')) return;
    const idx = +pad.dataset.pad;
    lightPad(idx, 220);
    if (sequence[playerIndex] === idx) {
      playerIndex++;
      if (playerIndex === sequence.length) {
        // round complete
        acceptingInput = false;
        disablePads(true);
        streak++; localStorage.setItem('simon-streak', streak); $('#stat-streak').textContent = streak;
        setTimeout(nextRound, 700);
      }
    } else {
      gameOver();
    }
  });
});

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="startGame()">${t('start')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="toggleSound()">${t('soundOn')}</button>`;

function toggleSound() {
  muted = !muted;
  if (!muted) ensureAudio();
  // update label
  const btns = document.querySelectorAll('#toolbar .gz-btn');
  if (btns[1]) btns[1].textContent = muted ? t('soundOff') : t('soundOn');
}
window.toggleSound = toggleSound;
window.startGame = startGame;

GZ.renderToolPage({
  category: 'fun',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🧠', href:'/fun/memory-game.html', name:'Memory Game'},
    {icon:'⌨️', href:'/fun/typing-test.html', name:'Typing Speed Test'},
    {icon:'⚡', href:'/fun/reaction-time.html', name:'Reaction Time'},
    {icon:'🟩', href:'/fun/wordle.html', name:'Wordle'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
