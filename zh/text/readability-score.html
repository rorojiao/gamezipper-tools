<script>
GZI18n.register({
  en: {
    toolTitle: 'Readability Score Calculator',
    toolDesc: 'Measure how easy your text is to read with 5 industry-standard formulas: Flesch Reading Ease, Flesch-Kincaid, Gunning Fog, SMOG, and Coleman-Liau.',
    step1: 'Paste your text into the input area above',

    step4: 'Use the example button to load sample text',

  },
  zh: {
    toolTitle: '可读性评分计算器',
    toolDesc: '使用 5 个行业标准公式衡量文本的可读性：Flesch 阅读容易度、Flesch-Kincaid、Gunning Fog、SMOG 和 Coleman-Liau。',
    step1: '将文本粘贴到上方输入区',
    step2: '输入时即时更新评分',
    step3: '比较不同公式的评分以获得多角度分析',
    step4: '点击「加载示例」使用样例文本',
    example: '加载示例',
    clear: '清空',
  }
});

const { $, t } = GZ;

// Simple syllable counter heuristic for English
function countSyllables(word) {
  word = word.toLowerCase().replace(/[^a-z]/g, '');
  if (!word) return 0;
  if (word.length <= 3) return 1;
  word = word.replace(/(?:[^laeiouy]es|ed|[^laeiouy]e)$/, '');
  word = word.replace(/^y/, '');
  const matches = word.match(/[aeiouy]{1,2}/g);
  return matches ? matches.length : 1;
}

function countComplexWords(words) {
  return words.filter(w => countSyllables(w) >= 3).length;
}

function analyzeText(text) {
  if (!text.trim()) return null;
  // Strip URLs, emails, numbers
  const cleanText = text.replace(/https?:\/\/\S+|[\w.-]+@[\w.-]+/g, ' ');
  const sentences = cleanText.split(/[.!?]+/).filter(s => s.trim().length > 0);
  const words = cleanText.split(/\s+/).filter(w => w.match(/[a-zA-Z]/));
  const totalSyllables = words.reduce((sum, w) => sum + countSyllables(w), 0);
  const complexWords = countComplexWords(words);
  const characters = cleanText.replace(/\s/g, '').length;

  const W = words.length;
  const S = sentences.length || 1;
  const Sy = totalSyllables || 1;
  const C = characters || 1;
  const CW = complexWords;

  const fleschRE = 206.835 - 1.015 * (W / S) - 84.6 * (Sy / W);
  const fleschKincaid = 0.39 * (W / S) + 11.8 * (Sy / W) - 15.59;
  const gunningFog = 0.4 * ((W / S) + 100 * (CW / W));
  const smog = 1.043 * Math.sqrt(CW * (30 / S)) + 3.1291;
  const colemanLiau = 0.0588 * (C / W * 100) - 0.296 * (S / W * 100) - 15.8;

  return {
    fleschRE, fleschKincaid, gunningFog, smog, colemanLiau,
    words: W, sentences: S, syllables: totalSyllables, complexWords: CW,
    characters: C,
  };
}

function gradeLabel(score, type) {
  if (type === 'fleschRE') {
    if (score >= 90) return ['Very Easy', '5th grade', 'easy'];
    if (score >= 80) return ['Easy', '6th grade', 'easy'];
    if (score >= 70) return ['Fairly Easy', '7th grade', 'easy'];
    if (score >= 60) return ['Standard', '8-9th grade', 'medium'];
    if (score >= 50) return ['Fairly Difficult', '10-12th grade', 'medium'];
    if (score >= 30) return ['Difficult', 'College', 'hard'];
    return ['Very Difficult', 'College Grad', 'hard'];
  }
  // For grade-level formulas
  const grade = score;
  if (grade < 6) return ['Easy', `${grade.toFixed(1)} grade`, 'easy'];
  if (grade < 10) return ['Medium', `${grade.toFixed(1)} grade`, 'medium'];
  if (grade < 14) return ['Hard', `${grade.toFixed(1)} grade`, 'hard'];
  return ['Very Hard', `${grade.toFixed(1)} grade`, 'hard'];
}

function render(r) {
  if (!r) { $('#scores').innerHTML = ''; $('#meta').textContent = ''; return; }
  const cards = [
    { key: 'fleschRE', label: 'Flesch Reading Ease', val: r.fleschRE.toFixed(1), desc: 'Higher = easier' },
    { key: 'fk', label: 'Flesch-Kincaid Grade', val: r.fleschKincaid.toFixed(1), desc: 'US school grade' },
    { key: 'gf', label: 'Gunning Fog Index', val: r.gunningFog.toFixed(1), desc: 'Years of education' },
    { key: 'smog', label: 'SMOG Index', val: r.smog.toFixed(1), desc: 'Years of education' },
    { key: 'cl', label: 'Coleman-Liau Index', val: r.colemanLiau.toFixed(1), desc: 'US school grade' },
  ];
  const meta = `${r.words} words · ${r.sentences} sentences · ${r.syllables} syllables · ${r.complexWords} complex (${(r.complexWords / r.words * 100).toFixed(0)}%)`;
  $('#meta').textContent = meta;
  $('#scores').innerHTML = cards.map(c => {
    const score = c.key === 'fleschRE' ? r.fleschRE : (c.key === 'fk' ? r.fleschKincaid : c.key === 'gf' ? r.gunningFog : c.key === 'smog' ? r.smog : r.colemanLiau);
    const [label, grade, level] = gradeLabel(score, c.key === 'fleschRE' ? 'fleschRE' : 'grade');
    return `<div class="rs-card ${level}"><div class="label">${c.label}</div><div class="score">${c.val}</div><div class="desc">${label} · ${grade}</div></div>`;
  }).join('');
}

const EXAMPLE = `The quick brown fox jumps over the lazy dog. Reading is a fundamental skill that opens doors to knowledge and imagination. When we read, our brains process symbols, decode meanings, and build connections between ideas. Good writing is clear, concise, and considerate of the audience. It uses simple words whenever possible and arranges them in logical order. Short sentences are easier to read than long ones. Paragraphs help organize related thoughts and give readers a place to pause. Headings and bullet points make scanning easier. Editing is where good writing becomes great. Read your work aloud to catch awkward phrases. Cut every unnecessary word. Replace jargon with plain language. Show, don't tell. The best writers revise relentlessly until every sentence earns its place.`;

$('#textInput').addEventListener('input', e => render(analyzeText(e.target.value)));

$('#toolbar').innerHTML = `
  <button class="gz-btn gz-btn-secondary" onclick="$('#textInput').value=EXAMPLE;render(analyzeText(EXAMPLE))">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#textInput').value='';render(null)">${t('clear')}</button>`;

});
