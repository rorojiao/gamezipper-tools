<script>
GZI18n.register({en:{toolTitle:'Password Entropy Calculator',toolDesc:'Estimate password entropy, character pool, combinations and brute-force crack time at different attack speeds. Analysis stays entirely in your browser.',placeholder:'Enter a password or passphrase to analyze…',veryWeak:'Very weak',weak:'Weak',fair:'Fair',strong:'Strong',veryStrong:'Very strong',length:'Length',pool:'Character pool',entropy:'Adjusted entropy',combinations:'Combinations',lower:'Lowercase',upper:'Uppercase',digits:'Digits',symbols:'Symbols',spaces:'Spaces',unicode:'Unicode',scenario:'Attack scenario',rate:'Guesses / second',time:'Average crack time',online:'Rate-limited online',slow:'Slow password hash',fast:'Fast offline hash',gpu:'High-speed GPU cluster',generate:'Generate 20 chars',clear:'Clear',note:'Estimates assume an attacker searches half of the adjusted keyspace. Actual security depends on randomness, hashing, rate limiting, leaked patterns and reuse. Do not paste a real production password into any device you do not trust.',step1:'Enter a test password or passphrase; the tool detects its character sets',step2:'Review theoretical and adjusted entropy, pool size and possible combinations',step3:'Compare average brute-force time under online, slow-hash and fast offline scenarios',step4:'Improve length and randomness; prefer a password manager or several random words'},zh:{toolTitle:'密码熵与破解时间计算器',toolDesc:'估算密码熵、字符池、组合数量和不同攻击速度下的暴力破解时间。分析完全在浏览器内进行。',placeholder:'输入要分析的密码或密码短语……',veryWeak:'非常弱',weak:'较弱',fair:'一般',strong:'强',veryStrong:'非常强',length:'长度',pool:'字符池',entropy:'调整后熵值',combinations:'组合数量',lower:'小写字母',upper:'大写字母',digits:'数字',symbols:'符号',spaces:'空格',unicode:'Unicode',scenario:'攻击场景',rate:'每秒猜测次数',time:'平均破解时间',online:'有限速在线攻击',slow:'慢速密码哈希',fast:'快速离线哈希',gpu:'高速 GPU 集群',generate:'生成 20 位',clear:'清空',note:'估算假设攻击者搜索调整后密钥空间的一半。实际安全性取决于随机性、哈希算法、限速、泄露模式和密码复用。不要在不信任的设备上粘贴真实生产密码。',step1:'输入测试密码或密码短语，工具会检测所用字符集',step2:'查看理论/调整后熵值、字符池大小和可能组合数量',step3:'比较在线、慢速哈希和快速离线攻击场景下的平均破解时间',step4:'增加长度和随机性，优先使用密码管理器或多个随机单词'}});
const {$,t}=GZ;
function analyze(){const p=$('#password').value,L=[...p].length,sets={lower:/[a-z]/.test(p),upper:/[A-Z]/.test(p),digits:/\d/.test(p),symbols:/[!-/:-@[-`{-~]/.test(p),spaces:/\s/.test(p),unicode:/[^\x00-\x7F]/.test(p)};let pool=(sets.lower?26:0)+(sets.upper?26:0)+(sets.digits?10:0)+(sets.symbols?33:0)+(sets.spaces?1:0)+(sets.unicode?100:0);let theoretical=L&&pool?L*Math.log2(pool):0,penalty=0;if(/(.)\1{2,}/u.test(p))penalty+=8;if(/(?:0123|1234|2345|3456|4567|5678|6789|abcd|qwerty|password|letmein)/i.test(p))penalty+=18;if(L&&new Set([...p]).size/Math.max(1,L)<.55)penalty+=8;const entropy=Math.max(0,theoretical-penalty),comb=entropy?2**Math.min(entropy,1023):0;let rating,color;if(entropy<28)[rating,color]=[t('veryWeak'),'#ef476f'];else if(entropy<40)[rating,color]=[t('weak'),'#ff7b00'];else if(entropy<60)[rating,color]=[t('fair'),'#ffd166'];else if(entropy<80)[rating,color]=[t('strong'),'#06d6a0'];else[rating,color]=[t('veryStrong'),'#4ecdc4'];$('#rating').textContent=L?rating:'—';$('#rating').style.color=color;$('#bar').style.width=Math.min(100,entropy/1.2)+'%';$('#bar').style.background=color;$('#flags').innerHTML=Object.entries(sets).map(([k,v])=>`<span class="pe-flag ${v?'on':''}">${v?'✓':'○'} ${t(k)}</span>`).join('');$('#cards').innerHTML=[[t('length'),L],[t('pool'),pool],[t('entropy'),entropy.toFixed(1)+' bits'],[t('combinations'),formatBig(comb)]].map(x=>`<div class="pe-card"><strong>${x[1]}</strong><span>${x[0]}</span></div>`).join('');const rates=[[t('online'),10],[t('slow'),1e4],[t('fast'),1e9],[t('gpu'),1e14]];$('#times').innerHTML=rates.map(([n,r])=>`<tr><td>${n}</td><td>${formatBig(r)}</td><td><strong>${formatTime(comb/(2*r))}</strong></td></tr>`).join('')}
function formatBig(n){if(!isFinite(n))return '∞';if(n===0)return '0';if(n<1e6)return Math.round(n).toLocaleString();return n.toExponential(2)}
function formatTime(sec){if(!isFinite(sec))return '∞';if(sec<1)return '< 1 sec';const units=[[31557600,'years'],[86400,'days'],[3600,'hours'],[60,'minutes'],[1,'seconds']];for(const [d,n] of units)if(sec>=d){const v=sec/d;if(n==='years'&&v>=1e9)return v.toExponential(2)+' years';return v.toLocaleString(undefined,{maximumFractionDigits:v<10?1:0})+' '+n}return '< 1 sec'}
function labels(){$('#password').placeholder=t('placeholder');$('#scenario-head').textContent=t('scenario');$('#rate-head').textContent=t('rate');$('#time-head').textContent=t('time');$('#generate').textContent=t('generate');$('#clear').textContent=t('clear');$('#note').textContent=t('note')}
$('#password').oninput=analyze;$('#eye').onclick=()=>{$('#password').type=$('#password').type==='password'?'text':'password'};document.querySelectorAll('[data-example]').forEach(b=>b.onclick=()=>{$('#password').value=b.dataset.example;analyze()});$('#generate').onclick=()=>{const chars='ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz23456789!@#$%^&*_-+=';const a=new Uint32Array(20);crypto.getRandomValues(a);$('#password').value=[...a].map(x=>chars[x%chars.length]).join('');analyze()};$('#clear').onclick=()=>{$('#password').value='';analyze()};labels();analyze();
