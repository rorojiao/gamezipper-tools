const { $, copyText, t } = GZ;

function fmt(n){
  if(!isFinite(n)) return n>0?'∞':'-∞';
  if(Number.isInteger(n)) return n.toString();
  return (Math.round(n*1e12)/1e12).toString();
}

// Step-by-step evaluator. Tokens: numbers and operators + - * / ^ ( )
function tokenize(s){
  const toks=[];let i=0;
  s=s.replace(/\s+/g,'');
  while(i<s.length){
    const c=s[i];
    if(/[0-9.]/.test(c)){
      let num='';while(i<s.length&&/[0-9.]/.test(s[i])){num+=s[i++];}
      if((num.match(/\./g)||[]).length>1) throw new Error('bad number');
      toks.push({t:'num',v:parseFloat(num)});
    } else if('+-*/^()'.includes(c)){
      // unary minus: at start or after operator or '('
      if(c==='-'&&(toks.length===0||toks[toks.length-1].t==='op'||toks[toks.length-1].v==='(')){
        // treat as part of number
        let num='-';i++;
        if(i<s.length&&s[i]==='('){
          toks.push({t:'num',v:0});toks.push({t:'op',v:'-'});continue;
        }
        while(i<s.length&&/[0-9.]/.test(s[i])){num+=s[i++];}
        toks.push({t:'num',v:parseFloat(num)});
      } else if(c==='+'){
        if(toks.length===0||toks[toks.length-1].v==='('){i++;continue;}
        toks.push({t:'op',v:c});i++;
      } else {
        toks.push({t:'op',v:c});i++;
      }
    } else throw new Error('bad char '+c);
  }
  return toks;
}
const PREC={'+':1,'-':1,'*':2,'/':2,'^':3};
const RIGHT={'^':true};
function toRPN(toks){
  const out=[],stack=[];
  for(const tk of toks){
    if(tk.t==='num') out.push(tk);
    else {
      if(tk.v==='(') stack.push(tk);
      else if(tk.v===')'){
        while(stack.length&&stack[stack.length-1].v!=='(') out.push(stack.pop());
        if(!stack.length) throw new Error('mismatch )');
        stack.pop();
      } else {
        while(stack.length){
          const top=stack[stack.length-1];
          if(top.v==='(') break;
          if(PREC[top.v]>PREC[tk.v]||(PREC[top.v]===PREC[tk.v]&&!RIGHT[tk.v])) out.push(stack.pop());
          else break;
        }
        stack.push(tk);
      }
    }
  }
  while(stack.length){const top=stack.pop();if(top.v==='('||top.v===')') throw new Error('mismatch (');out.push(top);}
  return out;
}
function evalRPN(rpn){
  const st=[];
  for(const tk of rpn){
    if(tk.t==='num') st.push(tk.v);
    else {
      if(st.length<2) throw new Error('bad expr');
      const b=st.pop(),a=st.pop();let r;
      switch(tk.v){
        case '+':r=a+b;break;
        case '-':r=a-b;break;
        case '*':r=a*b;break;
        case '/':if(b===0)throw new Error('div0');r=a/b;break;
        case '^':r=Math.pow(a,b);break;
      }
      st.push(r);
    }
  }
  if(st.length!==1) throw new Error('bad expr');
  return st[0];
}

// Build a string representation of the current token list for step display
function toksToString(toks){
  return toks.map(tk=>tk.t==='num'?fmt(tk.v):tk.v).join(' ').replace(/\s*\(\s*/g,' (').replace(/\s*\)\s*/g,') ').replace(/\( /g,'(').replace(/ \)/g,')').trim();
}

// Step-by-step reduction: find innermost parens, evaluate sub-expressions
function stepwise(toks){
  const steps=[];
  let cur=toks.slice();
  let guard=0;
  // 1. Reduce parentheses inside-out
  while(cur.some(tk=>tk.v==='(')){
    if(guard++>500) break;
    // find innermost ( ... )
    let depth=0,maxDepth=0,openIdx=-1,closeIdx=-1;
    for(let i=0;i<cur.length;i++){
      if(cur[i].v==='('){depth++;if(depth>maxDepth){maxDepth=depth;openIdx=i;}}
      if(cur[i].v===')'){if(depth>0){closeIdx=i;}}
    }
    // re-find innermost properly
    openIdx=-1;closeIdx=-1;
    for(let i=0;i<cur.length;i++){
      if(cur[i].v==='(') openIdx=i;
      else if(cur[i].v===')'&&openIdx!==-1){closeIdx=i;break;}
    }
    if(openIdx===-1||closeIdx===-1) throw new Error('mismatch');
    const inner=cur.slice(openIdx+1,closeIdx);
    const rpnInner=toRPN(inner);
    const val=evalRPN(rpnInner);
    const before=toksToString(cur);
    cur=[...cur.slice(0,openIdx),{t:'num',v:val},...cur.slice(closeIdx+1)];
    steps.push(`${t('stepLine')} — ${before}  →  ${toksToString(cur)}  (= ${fmt(val)} inside parens)`);
  }
  // 2. Evaluate exponents left to right
  guard=0;
  while(cur.some(tk=>tk.v==='^')){
    if(guard++>500) break;
    const i=cur.findIndex(tk=>tk.v==='^');
    const a=cur[i-1].v,b=cur[i+1].v;
    const r=Math.pow(a,b);
    const before=toksToString(cur);
    cur=[...cur.slice(0,i-1),{t:'num',v:r},...cur.slice(i+2)];
    steps.push(`${t('stepLine')} — ${before}  →  ${toksToString(cur)}  (= ${fmt(a)}^${fmt(b)} = ${fmt(r)})`);
  }
  // 3. Mult/Div left to right
  guard=0;
  while(cur.some(tk=>tk.v==='*'||tk.v==='/')){
    if(guard++>500) break;
    const i=cur.findIndex(tk=>tk.v==='*'||tk.v==='/');
    const op=cur[i].v;const a=cur[i-1].v,b=cur[i+1].v;
    if(op==='/'&&b===0) throw new Error('div0');
    const r=op==='*'?a*b:a/b;
    const before=toksToString(cur);
    cur=[...cur.slice(0,i-1),{t:'num',v:r},...cur.slice(i+2)];
    steps.push(`${t('stepLine')} — ${before}  →  ${toksToString(cur)}  (= ${fmt(a)} ${op} ${fmt(b)} = ${fmt(r)})`);
  }
  // 4. Add/Sub left to right
  guard=0;
  while(cur.some(tk=>tk.v==='+'||tk.v==='-')){
    if(guard++>500) break;
    const i=cur.findIndex(tk=>tk.v==='+'||tk.v==='-');
    const op=cur[i].v;const a=cur[i-1].v,b=cur[i+1].v;
    const r=op==='+'?a+b:a-b;
    const before=toksToString(cur);
    cur=[...cur.slice(0,i-1),{t:'num',v:r},...cur.slice(i+2)];
    steps.push(`${t('stepLine')} — ${before}  →  ${toksToString(cur)}  (= ${fmt(a)} ${op==='+'?'+'.'-'} ${fmt(b)} = ${fmt(r)})`);
  }
  if(cur.length!==1||cur[0].t!=='num') throw new Error('bad expr');
  return {result:cur[0].v,steps};
}

function calc(){
  const elB=$('#resultBig'),elM=$('#resultMeta'),stepsEl=$('#steps');
  const raw=$('#expr').value.trim();
  if(!raw){elB.textContent='—';elM.textContent='';stepsEl.textContent='';return;}
  try{
    const toks=tokenize(raw);
    // final sanity: count parens
    const rpn=toRPN(toks);
    const final=evalRPN(rpn);
    const sw=stepwise(toks);
    elB.textContent=fmt(final);
    elM.textContent=`${t('result')}`;
    stepsEl.innerHTML=sw.steps.map(s=>`<div class="step-line">${s}</div>`).join('') ||
      `<div class="step-line">${fmt(final)}</div>`;
  } catch(e){
    elB.textContent='—';
    elM.textContent=e.message==='div0'?t('divZero'):t('syntaxError');
    stepsEl.textContent='';
  }
}

document.querySelectorAll('.pem-key').forEach(btn=>{
  btn.addEventListener('click',()=>{
    const k=btn.dataset.k;
    const inp=$('#expr');
    if(k==='C'){inp.value='';calc();return;}
    if(k==='='){calc();return;}
    inp.value+=k;inp.focus();calc();
  });
});
$('#expr').addEventListener('input',calc);
$('#expr').addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();calc();}});

$('#toolbar').innerHTML=`
  <button class="gz-btn" onclick="calc()">${t('calculate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="copyText($('#resultBig').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="document.getElementById('expr').value='';calc()">${t('clear')}</button>`;

</script>
