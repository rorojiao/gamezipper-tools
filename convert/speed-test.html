<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "How does the internet speed test work?", "acceptedAnswer": {"@type": "Answer", "text": "The test downloads and uploads small data files from public test servers and measures how fast the data transfers. It also measures ping (latency) by sending small requests and timing the round-trip. Everything runs in your browser — no app install needed."}}, {"@type": "Question", "name": "Is this speed test accurate?", "acceptedAnswer": {"@type": "Answer", "text": "The test provides a good estimate of your real-world connection speed. Results may vary based on server distance, network congestion, WiFi signal strength, and background downloads. For best results, close other apps using bandwidth and connect via Ethernet if possible."}}, {"@type": "Question", "name": "What is a good internet speed?", "acceptedAnswer": {"@type": "Answer", "text": "For basic browsing and email, 10-25 Mbps download is sufficient. For HD streaming and video calls, 25-50 Mbps is recommended. For 4K streaming, gaming and large households, 100+ Mbps is ideal. Upload speeds of 5-10 Mbps or higher are good for content creation."}}, {"@type": "Question", "name": "What are ping, download and upload speeds?", "acceptedAnswer": {"@type": "Answer", "text": "Ping (latency) measures how quickly your device gets a response from a server, measured in milliseconds (ms). Download speed is how fast data comes from the internet to your device (streaming, browsing). Upload speed is how fast data goes from your device to the internet (video calls, file sharing)."}}]}</script>

<script>
GZI18n.register({
  en: {
    toolTitle: 'Internet Speed Test',
    toolDesc: 'Test your download speed, upload speed, ping and jitter. Free, fast and accurate — works on WiFi, broadband, fiber and mobile.',
    startTest: 'Start Speed Test',
    testing: 'Testing…',
    phasePing: 'Measuring ping and jitter…',
    phaseDownload: 'Testing download speed…',
    phaseUpload: 'Testing upload speed…',
    phaseDone: 'Test complete!',
    phaseReady: 'Click Start to begin',
    server: 'Test Server',
    history: 'Recent Tests',
    noHistory: 'No recent tests',
    step1: 'Click "Start Speed Test" to begin the test',
    step2: 'The tool measures ping, then download speed',
    step3: 'Upload speed is tested next',
    step4: 'Review your results — download, upload, ping and jitter',
  },
  zh: {
    toolTitle: '网络测速工具',
    toolDesc: '测试你的下载速度、上传速度、延迟（Ping）和抖动。免费、快速、准确 — 支持 WiFi、宽带、光纤和移动网络。',
    startTest: '开始测速',
    testing: '测试中…',
    phasePing: '正在测量延迟和抖动…',
    phaseDownload: '正在测试下载速度…',
    phaseUpload: '正在测试上传速度…',
    phaseDone: '测试完成！',
    phaseReady: '点击「开始测速」',
    server: '测试服务器',
    history: '最近测试记录',
    noHistory: '暂无记录',
    step1: '点击「开始测速」按钮',
    step2: '工具先测量 Ping 延迟，再测下载速度',
    step3: '接着测试上传速度',
    step4: '查看结果 — 下载、上传、Ping 和抖动',
  }
});

const { $, t } = GZ;
const CIRC = 628; // circumference of r=100

// Test endpoints — public CDN files of various sizes
const TEST_FILES = [
  { url: 'https://speed.cloudflare.com/__down?bytes=10000000', size: 10000000 },
  { url: 'https://speed.cloudflare.com/__down?bytes=5000000', size: 5000000 },
  { url: 'https://speed.hetzner.de/100MB.bin', size: 5000000 },
];

let testing = false;
let currentPhase = '';

function setGauge(value, max) {
  const pct = Math.min(value / max, 1);
  $('#gaugeFill').style.strokeDashoffset = CIRC * (1 - pct);
  $('#gaugeValue').textContent = value < 10 ? value.toFixed(1) : Math.round(value);
}

function setPhase(phase) {
  currentPhase = phase;
  $('#phase').textContent = t(phase);
  $('#gaugeLabel').textContent = t(phase).replace(/…/g,'').trim();
}

function formatSpeed(bps) {
  return bps < 10 ? bps.toFixed(2) : bps < 100 ? bps.toFixed(1) : Math.round(bps).toString();
}

async function measurePing() {
  setPhase('phasePing');
  const pings = [];
  for (let i = 0; i < 6; i++) {
    const start = performance.now();
    try {
      await fetch('https://speed.cloudflare.com/__down?bytes=1000&t=' + Date.now() + i, { cache: 'no-store' });
      pings.push(performance.now() - start);
    } catch(e) {
      pings.push(performance.now() - start);
    }
  }
  pings.shift(); // discard first (warmup)
  const avgPing = pings.reduce((a,b)=>a+b,0) / pings.length;
  const jitter = Math.sqrt(pings.reduce((sum,p)=>sum + Math.pow(p - avgPing, 2), 0) / pings.length);
  return { ping: avgPing, jitter: jitter };
}

async function measureDownload() {
  setPhase('phaseDownload');
  let bestSpeed = 0;
  for (const file of TEST_FILES) {
    try {
      const start = performance.now();
      const res = await fetch(file.url + '?t=' + Date.now(), { cache: 'no-store' });
      const reader = res.body.getReader();
      let received = 0;
      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        received += value.length;
        const elapsed = (performance.now() - start) / 1000;
        const speed = (received * 8) / (elapsed * 1000000); // Mbps
        if (speed > bestSpeed) bestSpeed = speed;
        setGauge(speed, 500);
        if (elapsed > 10) break; // timeout
      }
      if (received > 1000000) break; // good enough measurement
    } catch(e) { continue; }
  }
  return bestSpeed;
}

async function measureUpload() {
  setPhase('phaseUpload');
  const data = new Uint8Array(2000000); // 2MB
  for (let i = 0; i < data.length; i++) data[i] = Math.random() * 256;
  let bestSpeed = 0;
  try {
    const start = performance.now();
    const res = await fetch('https://speed.cloudflare.com/__up', {
      method: 'POST',
      body: data,
      cache: 'no-store',
    });
    const elapsed = (performance.now() - start) / 1000;
    bestSpeed = (data.length * 8) / (elapsed * 1000000);
    setGauge(bestSpeed, 500);
  } catch(e) {
    bestSpeed = 0;
  }
  return bestSpeed;
}

async function runTest() {
  if (testing) return;
  testing = true;
  $('#resultGrid').style.display = 'none';
  setGauge(0, 500);
  $('button.gz-test-btn').textContent = t('testing');
  $('button.gz-test-btn').classList.add('gz-spin');

  $('#serverInfo').innerHTML = `🌐 ${t('server')}: Cloudflare / Hetzner CDN`;

  // Ping
  const { ping, jitter } = await measurePing();
  $('#pingResult').textContent = Math.round(ping) + ' ms';
  $('#jitterResult').textContent = jitter.toFixed(1) + ' ms';

  // Download
  const dlSpeed = await measureDownload();
  $('#dlResult').textContent = formatSpeed(dlSpeed) + ' Mbps';

  // Upload
  const ulSpeed = await measureUpload();
  $('#ulResult').textContent = ulSpeed > 0 ? formatSpeed(ulSpeed) + ' Mbps' : 'N/A';

  setPhase('phaseDone');
  $('#resultGrid').style.display = 'grid';
  setGauge(dlSpeed, 500);
  $('button.gz-test-btn').textContent = t('startTest');
  $('button.gz-test-btn').classList.remove('gz-spin');
  testing = false;

  // Save history
  saveHistory({ dl: dlSpeed, ul: ulSpeed, ping: Math.round(ping), time: new Date() });
  renderHistory();
}

function saveHistory(result) {
  let history = JSON.parse(localStorage.getItem('gz-speed-history') || '[]');
  history.unshift(result);
  history = history.slice(0, 5);
  localStorage.setItem('gz-speed-history', JSON.stringify(history));
}

function renderHistory() {
  const history = JSON.parse(localStorage.getItem('gz-speed-history') || '[]');
  if (!history.length) {
    $('#history').innerHTML = `<div style="text-align:center;color:var(--text2);font-size:.85rem;padding:14px">${t('noHistory')}</div>`;
    return;
  }
  let html = `<div style="font-weight:700;margin-bottom:8px;text-align:center">${t('history')}</div>`;
  history.forEach(h => {
    const d = new Date(h.time);
    html += `<div class="gz-history-item">
      <span>⬇️ ${formatSpeed(h.dl)} Mbps · ⬆️ ${h.ul > 0 ? formatSpeed(h.ul) : 'N/A'} Mbps · 📡 ${h.ping} ms</span>
      <span style="color:var(--text2)">${d.toLocaleDateString()} ${d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</span>
    </div>`;
  });
  $('#history').innerHTML = html;
}

$('#toolbar').innerHTML = `<button class="gz-btn gz-test-btn" onclick="runTest()">${t('startTest')}</button>`;

setPhase('phaseReady');
renderHistory();

GZ.renderToolPage({
  category: 'convert',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🌐', href:'/dev/my-ip-address.html', name:'My IP Address'},
    {icon:'📡', href:'/dev/http-headers-checker.html', name:'HTTP Headers'},
    {icon:'🔗', href:'/dev/unshorten-url.html', name:'Unshorten URL'},
    {icon:'🔋', href:'/dev/battery-status.html', name:'Battery Status'},
  ]
});
</script>

</body>
