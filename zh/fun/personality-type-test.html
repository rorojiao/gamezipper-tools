let state = { started: false, current: 0, answers: new Array(QUESTIONS.length).fill(null) };

function startQuiz() {
  state = { started: true, current: 0, answers: new Array(QUESTIONS.length).fill(null) };
  renderQuestion();
}
function selectAnswer(idx) { state.answers[state.current] = idx; renderQuestion(); }
function goNext() { if (state.current < QUESTIONS.length-1) { state.current++; renderQuestion(); } }
function goPrev() { if (state.current > 0) { state.current--; renderQuestion(); } }

function renderQuestion() {
  const area = $('#quiz-area');
  const q = QUESTIONS[state.current];
  const progress = ((state.current+1)/QUESTIONS.length)*100;
  area.innerHTML = `
    <div class="quiz-progress">
      <span>${t('qOf')} ${state.current+1} ${t('of')} ${QUESTIONS.length}</span>
      <div class="progress-bar"><div class="progress-fill" style="width:${progress}%"></div></div>
      <span>${Math.round(progress)}%</span>
    </div>
    <div class="q-card">
      <div class="q-dimension">${q.dimLabel[L]}</div>
      <div class="q-text">${q.text[L]}</div>
      <div class="scale-opts">
        <button class="scale-opt ${state.answers[state.current]===0?'selected':''}" onclick="selectAnswer(0)">${q.optA[L]}</button>
        <button class="scale-opt ${state.answers[state.current]===1?'selected':''}" onclick="selectAnswer(1)">${q.optB[L]}</button>
      </div>
    </div>
    <div class="quiz-nav">
      <button class="gz-btn gz-btn-secondary" onclick="goPrev()" ${state.current===0?'disabled style="opacity:.4"':''}>${t('prev')}</button>

    const q = QUESTIONS[i];
    if (ans === null) { // treat unanswered randomly-ish: default to poleA
      tally[q.poleA]++; return;
    }
    if (ans === 0) tally[q.poleA]++;
    else {
      const opp = { E:'I', I:'E', S:'N', N:'S', T:'F', F:'T', J:'P', P:'J' };
      tally[opp[q.poleA]]++;
    }
  });
  const code = (tally.E>=tally.I?'E':'I') + (tally.S>=tally.N?'S':'N') + (tally.T>=tally.F?'T':'F') + (tally.J>=tally.P?'J':'P');
  const info = TYPES[code] || TYPES['INFP'];
  const dimLabels = {
    EI: { en:['Extraversion','Introversion'], zh:['外向','内向'] },
    SN: { en:['Sensing','Intuition'], zh:['实感','直觉'] },
    TF: { en:['Thinking','Feeling'], zh:['思考','情感'] },
    JP: { en:['Judging','Perceiving'], zh:['判断','感知'] },
  };

  function traitBar(dim, aPole, bPole) {
    const a = tally[aPole], b = tally[bPole];
    const total = a + b || 1;
    const aPct = Math.round(a/total*100);
    const lbl = dimLabels[dim][L];
    return `
      <div class="trait-row">
        <div class="trait-labels"><span>${lbl[0]} ${aPole} · ${aPct}%</span><span>${bPole} · ${100-aPct}% ${lbl[1]}</span></div>
        <div class="trait-bar"><div class="trait-fill" style="left:0;width:${100-aPct}%;right:0"></div></div>
      </div>`;
  }

  $('#quiz-area').innerHTML = `
    <div class="q-card result-card">
      <div class="type-code">${code}</div>
      <div class="type-name">${info[L]}</div>
      <div class="type-desc">${info[L+'D']}</div>
      <div class="trait-bars">
        ${traitBar('EI','E','I')}
        ${traitBar('SN','S','N')}
        ${traitBar('TF','T','F')}
        ${traitBar('JP','J','P')}
      </div>
      <div style="margin-top:20px"><button style="padding:12px 28px;font-size:1em;border-radius:10px;cursor:pointer;border:none;font-weight:600;background:#a29bfe;color:#000" onclick="startQuiz()">${t('retake')}</button></div>
    </div>
  `;
}

function renderIntro() {
  $('#quiz-area').innerHTML = `
    <div class="q-card result-card">
      <div style="font-size:3em;margin-bottom:16px">✨</div>
      <div style="font-size:1.1em;margin-bottom:8px">${t('introText')}</div>
      <div style="margin-top:20px"><button style="padding:14px 36px;font-size:1.1em;border-radius:12px;cursor:pointer;border:none;font-weight:700;background:#a29bfe;color:#000" onclick="startQuiz()">${t('startBtn')}</button></div>
    </div>
  `;
}
