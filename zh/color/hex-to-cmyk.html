<script>
GZI18n.register({
  en: {
    toolTitle: 'HEX to CMYK Converter',
    toolDesc: 'Convert HEX colors to CMYK and back. Get precise print-ready CMYK values from any web color with bidirectional conversion.',
    copy: 'Copy',
    step1: 'Enter a HEX color or use the color picker',
    step2: 'View the CMYK breakdown and adjust sliders',
    step3: 'Or adjust CMYK sliders to find the matching HEX',
    step4: 'Copy values for your print or web project',
  },
  zh: {
    toolTitle: 'HEX 转 CMYK 转换器',
    toolDesc: '将 HEX 颜色转换为 CMYK 并支持反向转换。获取任意网页颜色的精确印刷用 CMYK 值。',
    copy: '复制',
    step1: '输入 HEX 颜色或使用颜色选择器',
    step2: '查看 CMYK 分解并调整滑块',
    step3: '或调整 CMYK 滑块来找到匹配的 HEX',
    step4: '复制数值用于印刷或网页项目',
  }
});

const { $, copyText, t } = GZ;

function hexToRgb(hex) {
  hex = hex.replace('#','');
  if (hex.length === 3) hex = hex[0]+hex[0]+hex[1]+hex[1]+hex[2]+hex[2];
  return { r: parseInt(hex.substr(0,2),16), g: parseInt(hex.substr(2,2),16), b: parseInt(hex.substr(4,2),16) };
}

function rgbToHex(r,g,b) {
  return '#'+[r,g,b].map(v=>Math.max(0,Math.min(255,Math.round(v))).toString(16).padStart(2,'0')).join('');
}

function rgbToCmyk(r,g,b) {
  if (r===0&&g===0&&b===0) return {c:0,m:0,y:0,k:100};
  const rr=r/255, gg=g/255, bb=b/255;
  const k=1-Math.max(rr,gg,bb);
  const c=(1-rr-k)/(1-k);
  const m=(1-gg-k)/(1-k);
  const y=(1-bb-k)/(1-k);
  return {c:Math.round(c*100),m:Math.round(m*100),y:Math.round(y*100),k:Math.round(k*100)};
}

function cmykToRgb(c,m,y,k) {
  const rr=255*(1-c/100)*(1-k/100);
  const gg=255*(1-m/100)*(1-k/100);
  const bb=255*(1-y/100)*(1-k/100);
  return {r:Math.round(rr),g:Math.round(gg),b:Math.round(bb)};
}

function fromHex() {
  let hex=$('#hex').value.trim();
  if(!hex.startsWith('#'))hex='#'+hex;
  if(!/^#[0-9a-fA-F]{3,6}$/.test(hex))return;
  const rgb=hexToRgb(hex);
  const cmyk=rgbToCmyk(rgb.r,rgb.g,rgb.b);
  $('#c').value=cmyk.c;$('#m').value=cmyk.m;$('#y').value=cmyk.y;$('#k').value=cmyk.k;
  $('#picker').value=hex;
  updateDisplay(rgb,cmyk,hex);
}

function fromCmyk() {
  const c=+$('#c').value,m=+$('#m').value,y=+$('#y').value,k=+$('#k').value;
  const rgb=cmykToRgb(c,m,y,k);
  const hex=rgbToHex(rgb.r,rgb.g,rgb.b);
  $('#hex').value=hex;
  $('#picker').value=hex;
  updateDisplay(rgb,{c,m,y,k},hex);
}

function updateDisplay(rgb, cmyk, hex) {
  $('#preview').style.background=hex;
  $('#cv').textContent=cmyk.c+'%';
  $('#mv').textContent=cmyk.m+'%';
  $('#yv').textContent=cmyk.y+'%';
  $('#kv').textContent=cmyk.k+'%';
  const hsl=rgbToHsl(rgb.r,rgb.g,rgb.b);
  $('#values').innerHTML=`
    <div class="card"><div class="val">${hex.toUpperCase()}</div><div class="lbl">HEX</div></div>
    <div class="card"><div class="val">${rgb.r}, ${rgb.g}, ${rgb.b}</div><div class="lbl">RGB</div></div>
    <div class="card"><div class="val">C${cmyk.c} M${cmyk.m} Y${cmyk.y} K${cmyk.k}</div><div class="lbl">CMYK</div></div>
    <div class="card"><div class="val">${hsl.h}°, ${hsl.s}%, ${hsl.l}%</div><div class="lbl">HSL</div></div>`;
}

function rgbToHsl(r,g,b){
  r/=255;g/=255;b/=255;
  const max=Math.max(r,g,b),min=Math.min(r,g,b),l=(max+min)/2;
  let h=0,s=0;
  if(max!==min){
    const d=max-min;
    s=l>.5?d/(2-max-min):d/(max+min);
    if(max===r)h=((g-b)/d+(g<b?6:0))/6;
    else if(max===g)h=((b-r)/d+2)/6;
    else h=((r-g)/d+4)/6;
  }
  return{h:Math.round(h*360),s:Math.round(s*100),l:Math.round(l*100)};
}

$('#hex').addEventListener('input', fromHex);
$('#picker').addEventListener('input', e=>{$('#hex').value=e.target.value;fromHex()});
$('#c').addEventListener('input', fromCmyk);
$('#m').addEventListener('input', fromCmyk);
$('#y').addEventListener('input', fromCmyk);
$('#k').addEventListener('input', fromCmyk);

$('#toolbar').innerHTML = `<button class="gz-btn" onclick="copyText($('#hex').value)">${t('copy')}</button>`;

fromHex();

GZ.renderToolPage({
  category: 'color',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [

    {icon:'🎨', href:'/color/picker.html', name:'Color Picker'},
    {icon:'🎨', href:'/convert/color.html', name:'Color Converter'},
    {icon:'🌈', href:'/color/palette.html', name:'Palette'},
  ]
});
</script>
