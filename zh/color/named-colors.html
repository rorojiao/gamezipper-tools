function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return {r,g,b};
}

function rgbToHsl(r,g,b) {
  r/=255;g/=255;b/=255;
  const max=Math.max(r,g,b),min=Math.min(r,g,b);
  let h,s,l=(max+min)/2;
  if(max===min){h=s=0;}else{
    const d=max-min;s=l>.5?d/(2-max-min):d/(max+min);
    switch(max){case r:h=((g-b)/d+(g<b?6:0))/6;break;case g:h=((b-r)/d+2)/6;break;case b:h=((r-g)/d+4)/6;break;}
  }
  return `hsl(${Math.round(h*360)}, ${Math.round(s*100)}%, ${Math.round(l*100)}%)`;
}

function renderColors(filter) {
  const q = filter.toLowerCase();
  const filtered = q ? COLORS.filter(c => c[0].toLowerCase().includes(q) || c[1].toLowerCase().includes(q)) : COLORS;
  if (!filtered.length) {
    $('#grid').innerHTML = `<div class="no-results">${t('noResults')}</div>`;
    return;
  }
  let html = '';
  for (const [name, hex] of filtered) {
    const {r,g,b} = hexToRgb(hex);
    const hsl = rgbToHsl(r,g,b);
    const isLight = (r*299+g*587+b*114)/1000 > 150;
    html += `<div class="color-card" onclick="showDetail('${name}','${hex}',${r},${g},${b},'${hsl.replace(/'/g,"\\'")}')">
      <div class="color-swatch" style="background:${hex}${isLight?';border-bottom:1px solid var(--border)':''}"></div>
      <div class="color-info"><div class="name">${name}</div><div class="hex">${hex}</div></div></div>`;
  }
  $('#grid').innerHTML = html;
}

function showDetail(name, hex, r, g, b, hsl) {
  const isLight = (r*299+g*587+b*114)/1000 > 150;
  const d = $('#detail');
  d.classList.add('active');
  d.innerHTML = `
    <div class="big-swatch" style="background:${hex}${isLight?';border:1px solid var(--border)':''}"></div>
    <div class="details">
      <div class="row"><span class="lbl">Name</span><span class="val">${name}</span></div>
      <div class="row"><span class="lbl">HEX</span><span class="val" style="cursor:pointer" onclick="copyText('${hex}')">${hex}</span></div>
      <div class="row"><span class="lbl">RGB</span><span class="val" style="cursor:pointer" onclick="copyText('rgb(${r}, ${g}, ${b})')">rgb(${r}, ${g}, ${b})</span></div>
      <div class="row"><span class="lbl">HSL</span><span class="val" style="cursor:pointer" onclick="copyText('${hsl}')">${hsl}</span></div>
      <div class="row"><span class="lbl">CSS</span><span class="val" style="cursor:pointer" onclick="copyText('color: ${name};')">color: ${name};</span></div>
    </div>`;
}
