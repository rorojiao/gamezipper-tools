const {$,t,copyText}=GZ;

// Set defaults — start = today 9:00, end = today 10:00
(function initDefaults(){
  const today=new Date();
  const iso=today.toISOString().slice(0,10);
  $('#evDateStart').value=iso;
  $('#evDateEnd').value=iso;
})();

function toggleAllDay(){
  const ad=$('#evAllDay').checked;
  $('#evTimeStart').style.display=ad?'none':'block';
  $('#evTimeEnd').style.display=ad?'none':'block';
  $('#evTz').closest('div').style.display=ad?'none':'block';
}

function pad(n){return String(n).padStart(2,'0');}

// Convert local datetime string + offset to ICS UTC format: 20260101T090000Z or with offset
function toICSDate(dateStr, timeStr, allDay, tz){
  if(allDay){
    return {date: dateStr.replace(/-/g,''), isUTC:false, time:''};
  }
  // We produce floating local time but with TZID if local selected; otherwise fixed offset
  const datePart=dateStr.replace(/-/g,'');
  const timePart=(timeStr||'00:00').replace(':','')+'00';
  if(tz==='local'){
    return {date: datePart+'T'+timePart, isUTC:false, time:''};
  }
  // Build UTC via Date object
  // Combine dateStr + timeStr - interpret as being in chosen tz offset
  // Use Date.UTC then subtract offset
  const [y,m,d]=dateStr.split('-').map(Number);
  const [hh,mm]=(timeStr||'00:00').split(':').map(Number);
  const sign=tz[0]; const off=tz.slice(1);
  const [oh,om]=off.split(':').map(Number);
  const offsetMinutes=(sign==='-'?-1:1)*(oh*60+om);
  const utcMs=Date.UTC(y,m-1,d,hh,mm)-offsetMinutes*60000;
  const u=new Date(utcMs);
  const us=`${u.getUTCFullYear()}${pad(u.getUTCMonth()+1)}${pad(u.getUTCDate())}T${pad(u.getUTCHours())}${pad(u.getUTCMinutes())}${pad(u.getUTCSeconds())}Z`;
  return {date: us, isUTC:true, time:''};
}

function escICS(s){
  return String(s||'')
    .replace(/\\/g,'\\\\')
    .replace(/;/g,'\\;')
    .replace(/,/g,'\\,')
    .replace(/\n/g,'\\n');
}

function foldICS(line){
  // RFC 5545 line folding — break at 75 octets
  if(line.length<=75) return line;
  const out=[line.slice(0,75)];
  let rest=line.slice(75);
  while(rest.length>73){ out.push(' '+rest.slice(0,73)); rest=rest.slice(73); }
  if(rest.length) out.push(' '+rest);
  return out.join('\r\n');
}

function generateICS(){
  const title=$('#evTitle').value.trim();
  if(!title){alert(t('titleRequired'));return;}
  const allDay=$('#evAllDay').checked;
  const tz=$('#evTz').value;
  const start=toICSDate($('#evDateStart').value, $('#evTimeStart').value, allDay, tz);
  const end=toICSDate($('#evDateEnd').value, $('#evTimeEnd').value, allDay, tz);
  // Safety: if end before start, swap
  const dtStart=start.date;
  const dtEnd=end.date;
  const freq=$('#evFreq').value;
  const until=$('#evUntil').value;
  const reminder=parseInt($('#evReminder').value);
  const loc=$('#evLoc').value;
  const desc=$('#evDesc').value;
  const stamp=new Date();
  const dtstamp=`${stamp.getUTCFullYear()}${pad(stamp.getUTCMonth()+1)}${pad(stamp.getUTCDate())}T${pad(stamp.getUTCHours())}${pad(stamp.getUTCMinutes())}${pad(stamp.getUTCSeconds())}Z`;
  const uid=`${Date.now()}-${Math.random().toString(36).slice(2,8)}@tools.gamezipper.com`;

  const lines=[
    'BEGIN:VCALENDAR',
    'VERSION:2.0',
    'PRODID:-//GameZipper Tools//ICS Generator//EN',
    'CALSCALE:GREGORIAN',
    'METHOD:PUBLISH',
    'BEGIN:VEVENT',
    'UID:'+uid,
    'DTSTAMP:'+dtstamp,
  ];
  if(allDay){
    lines.push('DTSTART;VALUE=DATE:'+dtStart);
    const e = new Date($('#evDateEnd').value);
    e.setDate(e.getDate()+1);
    const nextDay=e.toISOString().slice(0,10).replace(/-/g,'');
    lines.push('DTEND;VALUE=DATE:'+nextDay);
  } else if(tz==='local'){
    lines.push('DTSTART:'+dtStart);
    lines.push('DTEND:'+dtEnd);
  } else {
    lines.push('DTSTART:'+dtStart);
    lines.push('DTEND:'+dtEnd);
  }
  if(freq!=='NONE'){
    let rrule='RRULE:FREQ='+freq;
    if(freq==='WEEKLY') rrule+=';BYDAY='+['SU','MO','TU','WE','TH','FR','SA'][new Date($('#evDateStart').value+'T00:00').getDay()];
    if(until) rrule+=';UNTIL='+until.replace(/-/g,'')+'T235959Z';
    lines.push(rrule);
  }
  if(loc) lines.push(foldICS('LOCATION:'+escICS(loc)));
  if(desc) lines.push(foldICS('DESCRIPTION:'+escICS(desc)));
  lines.push(foldICS('SUMMARY:'+escICS(title)));
  if(reminder>0){
    lines.push('BEGIN:VALARM');
    lines.push('ACTION:DISPLAY');
    lines.push(foldICS('DESCRIPTION:'+escICS(title)));
    lines.push('TRIGGER:-PT'+reminder+'M');
    lines.push('END:VALARM');
  }
  lines.push('END:VEVENT');
  lines.push('END:VCALENDAR');

  const ics=lines.join('\r\n');
  $('#output').textContent=ics;
  return ics;
}

function downloadICS(){
  const ics=generateICS();
  if(!ics) return;
  const blob=new Blob([ics],{type:'text/calendar;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='event.ics';a.click();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
  GZ.showToast('✓ '+t('downloaded'));
}
