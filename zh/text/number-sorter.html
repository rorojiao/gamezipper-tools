<script>
GZI18n.register({
  en: {
    toolTitle: 'Number Sorter',
    toolDesc: 'Sort numbers in ascending or descending order, remove duplicates, and view statistics like sum, average, and median.',
    ascending: 'Sort Ascending',
    descending: 'Sort Descending',
    removeDup: 'Remove Duplicates',

    newline: 'New Line',

    avg: 'Average',
    min: 'Min',
    max: 'Max',
    median: 'Median',
    range: 'Range',
    step1: 'Paste or type numbers separated by commas, spaces, or new lines',
    step2: 'Choose ascending or descending sort order',
    step3: 'Optionally enable "Remove Duplicates"',
    step4: 'View the sorted result and statistics below',
  },
  zh: {
    toolTitle: '数字排序工具',
    toolDesc: '按升序或降序排列数字，去除重复项，并查看求和、平均值、中位数等统计信息。',
    ascending: '升序排列',
    descending: '降序排列',
    removeDup: '去除重复',
    separator: '分隔符',
    comma: '逗号',
    space: '空格',
    newline: '换行',
    count: '数量',
    sum: '总和',
    avg: '平均值',
    min: '最小值',
    max: '最大值',
    median: '中位数',
    range: '范围',
    step1: '粘贴或输入用逗号、空格或换行分隔的数字',
    step2: '选择升序或降序排列',
    step3: '可选开启「去除重复项」',
    step4: '查看排序结果和下方统计信息',
  }
});

const { $, copyText, t } = GZ;

function parseNumbers(text) {
  return text.split(/[,\s\n\r]+/).map(s => s.trim()).filter(s => s !== '').map(Number).filter(n => !isNaN(n));
}

function getMedian(arr) {
  const sorted = [...arr].sort((a,b) => a - b);
  const mid = Math.floor(sorted.length / 2);
  return sorted.length % 2 !== 0 ? sorted[mid] : (sorted[mid - 1] + sorted[mid]) / 2;
}

function sortNumbers(dir) {
  const nums = parseNumbers($('#input').value);
  if (!nums.length) return;

  const dupCheckbox = $('#removeDup');
  let filtered = dupCheckbox && dupCheckbox.checked ? [...new Set(nums)] : nums;

  filtered.sort((a, b) => dir === 'asc' ? a - b : b - a);

  const sepEl = $('#sepSelect');
  const sep = sepEl ? sepEl.value : ', ';
  $('#output').textContent = filtered.join(sep);

  const sum = filtered.reduce((a, b) => a + b, 0);
  const avg = sum / filtered.length;
  const mn = Math.min(...filtered);
  const mx = Math.max(...filtered);
  const med = getMedian(filtered);

  $('#stats').innerHTML = `
    <span class="stat"><b>${t('count')}:</b> ${filtered.length}</span>
    <span class="stat"><b>${t('sum')}:</b> ${sum.toLocaleString()}</span>
    <span class="stat"><b>${t('avg')}:</b> ${avg.toFixed(2)}</span>
    <span class="stat"><b>${t('min')}:</b> ${mn}</span>
    <span class="stat"><b>${t('max')}:</b> ${mx}</span>
    <span class="stat"><b>${t('median')}:</b> ${med}</span>
    <span class="stat"><b>${t('range')}:</b> ${(mx - mn).toLocaleString()}</span>`;
}

function doClear() { $('#input').value = ''; $('#output').textContent = ''; $('#stats').innerHTML = ''; }

function loadExample() {
  $('#input').value = '42, 7, 13, 99, 1, 55, 23\n8 16 32 64\n3.14\n-5\n7\n42';
  sortNumbers('asc');
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="sortNumbers('asc')">${t('ascending')} ↑</button>
  <button class="gz-btn gz-btn-secondary" onclick="sortNumbers('desc')">${t('descending')} ↓</button>
  <label style="display:inline-flex;align-items:center;gap:4px;font-size:.85em"><input type="checkbox" id="removeDup"> ${t('removeDup')}</label>
  <select class="gz-select" id="sepSelect">
    <option value=", ">${t('comma')}</option>
    <option value=" ">${t('space')}</option>
    <option value="\n">${t('newline')}</option>
  </select>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

});
</script>
