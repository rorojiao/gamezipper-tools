<script>
GZI18n.register({
  en:{toolTitle:'Open Graph Image Generator', toolDesc:'Design a 1200×630 Open Graph (OG) image for social shares. Choose gradient or solid background, custom colors, title, subtitle and download as PNG. 100% in your browser.',
    lblTitle:'Title', lblSub:'Subtitle', lblDomain:'Domain', lblBg:'Background', lblC1:'Color 1', lblC2:'Color 2', lblTx:'Text color', lblAc:'Accent', lblPresets:'Presets', lblSize:'Size', lblIcon:'Icon (emoji)',
    download:'Download PNG', randomize:'Randomize', reset:'Reset', regenerate:'Regenerate',
    step1:'Enter a title, subtitle and optional domain', step2:'Pick a background type, two colors and a text color', step3:'Watch the canvas update live as you type', step4:'Click Download PNG to save the 1200×630 image' },
  zh:{toolTitle:'Open Graph 图片生成器', toolDesc:'在线生成 1200×630 的 OG 分享预览图。选择渐变或纯色背景、自定义颜色、标题、副标题，下载为 PNG。100% 浏览器本地运行。',
    lblTitle:'标题', lblSub:'副标题', lblDomain:'域名', lblBg:'背景', lblC1:'颜色 1', lblC2:'颜色 2', lblTx:'文字颜色', lblAc:'强调色', lblPresets:'预设', lblSize:'尺寸', lblIcon:'图标（Emoji）',
    download:'下载 PNG', randomize:'随机配色', reset:'重置', regenerate:'重新生成',
    step1:'输入标题、副标题和可选的域名', step2:'选择背景类型、两种颜色和文字颜色', step3:'边输入边看画布实时更新', step4:'点击「下载 PNG」保存 1200×630 图片' }
});
const { $, t, copyText } = GZ;

const PRESETS = [
  {n:'Sunset',   c1:'#ff6b6b', c2:'#ffd93d', tx:'#ffffff', ac:'#ffffff'},
  {n:'Ocean',    c1:'#0077b6', c2:'#00b4d8', tx:'#ffffff', ac:'#ffd93d'},
  {n:'Forest',   c1:'#134e5e', c2:'#71b280', tx:'#ffffff', ac:'#f7d488'},
  {n:'Violet',   c1:'#7c3aed', c2:'#ec4899', tx:'#ffffff', ac:'#ffd93d'},
  {n:'Mono',     c1:'#1a1a1a', c2:'#444444', tx:'#ffffff', ac:'#4ecdc4'},
  {n:'Paper',    c1:'#fef9e7', c2:'#fdebd0', tx:'#1a1a2e', ac:'#e94560'},
  {n:'Cyber',    c1:'#0f0c29', c2:'#302b63', tx:'#4ecdc4', ac:'#ff6b6b'},
  {n:'Coral',    c1:'#ee9ca7', c2:'#ffdde1', tx:'#1a1a2e', ac:'#e94560'},
];

const FONT_TITLE = "Inter, 'Helvetica Neue', Helvetica, Arial, sans-serif";
const FONT_BODY  = "Inter, 'Helvetica Neue', Helvetica, Arial, sans-serif";

function wrapText(ctx, text, maxWidth){
  const words = text.split(/\s+/);
  const lines = [];
  let line = '';
  for(const w of words){
    const test = line ? line+' '+w : w;
    if(ctx.measureText(test).width > maxWidth && line){
      lines.push(line); line = w;
    } else line = test;
  }
  if(line) lines.push(line);
  return lines;
}

function draw(){
  const cv = $('#canvas');
  const ctx = cv.getContext('2d');
  const W = cv.width, H = cv.height;
  const bgType = $('#bgType').value;
  const c1 = $('#color1').value;
  const c2 = $('#color2').value;
  const txC = $('#textColor').value;
  const acC = $('#accentColor').value;
  const title = $('#title').value || '';
  const sub = $('#subtitle').value || '';
  const dom = $('#domain').value || '';
  const icon = $('#icon').value || '';

  // Background
  if(bgType === 'solid'){
    ctx.fillStyle = c1; ctx.fillRect(0,0,W,H);
  } else if(bgType === 'dark'){
    const g = ctx.createLinearGradient(0,0,W,H);
    g.addColorStop(0,'#0a0a1a'); g.addColorStop(1,'#1f1f3a');
    ctx.fillStyle = g; ctx.fillRect(0,0,W,H);
  } else {
    const g = ctx.createLinearGradient(0,0,W,H);
    g.addColorStop(0, c1); g.addColorStop(1, c2);
    ctx.fillStyle = g; ctx.fillRect(0,0,W,H);
  }

  // Decorative blobs
  ctx.globalAlpha = 0.18;
  ctx.fillStyle = acC;
  ctx.beginPath(); ctx.arc(W*0.1, H*0.15, 220, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(W*0.95, H*0.85, 280, 0, Math.PI*2); ctx.fill();
  ctx.globalAlpha = 0.10;
  ctx.fillStyle = '#ffffff';
  ctx.beginPath(); ctx.arc(W*0.78, H*0.25, 160, 0, Math.PI*2); ctx.fill();
  ctx.globalAlpha = 1;

  // Accent bar
  ctx.fillStyle = acC;
  ctx.fillRect(80, 110, 80, 8);

  // Icon
  if(icon){
    ctx.font = '110px "Apple Color Emoji", "Segoe UI Emoji", "Noto Color Emoji", sans-serif';
    ctx.textAlign = 'left';
    ctx.textBaseline = 'top';
    ctx.fillText(icon, 80, 150);
  }

  // Title
  ctx.font = 'bold 84px '+FONT_TITLE;
  ctx.fillStyle = txC;
  ctx.textAlign = 'left';
  ctx.textBaseline = 'top';
  const titleMaxW = W - 160;
  const titleLines = wrapText(ctx, title, titleMaxW);
  const titleSize = titleLines.length > 2 ? 70 : titleLines.length > 1 ? 80 : 90;
  ctx.font = 'bold '+titleSize+'px '+FONT_TITLE;
  let y = icon ? 290 : 220;
  for(const line of wrapText(ctx, title, titleMaxW)){
    ctx.fillText(line, 80, y);
    y += titleSize*1.15;
    if(y > H-180) break;
  }

  // Subtitle
  if(sub){
    ctx.font = '36px '+FONT_BODY;
    ctx.fillStyle = txC;
    ctx.globalAlpha = 0.85;
    const subLines = wrapText(ctx, sub, titleMaxW);
    for(const line of subLines){
      ctx.fillText(line, 80, y);
      y += 44;
      if(y > H-100) break;
    }
    ctx.globalAlpha = 1;
  }

  // Domain (bottom)
  if(dom){
    ctx.font = 'bold 32px '+FONT_BODY;
    ctx.fillStyle = txC;
    ctx.fillRect(80, H-78, 4, 28);
    ctx.fillText(dom.toUpperCase(), 100, H-72);
  }
}

function regenerate(){
  const cv = $('#canvas');
  const sz = $('#size').value.split('x').map(Number);
  cv.width = sz[0]; cv.height = sz[1];
  draw();
  $('#status').textContent = '✓ Regenerated '+sz[0]+'×'+sz[1];
}

function applyPreset(p){
  $('#color1').value = p.c1; $('#color2').value = p.c2;
  $('#textColor').value = p.tx; $('#accentColor').value = p.ac;
  draw();
}

function randomize(){
  const c1='#'+Math.floor(Math.random()*0xffffff).toString(16).padStart(6,'0');
  const c2='#'+Math.floor(Math.random()*0xffffff).toString(16).padStart(6,'0');
  const tx = (parseInt(c1.slice(1),16)+parseInt(c2.slice(1),16))>0xaaaaaa*2 ? '#0a0a1a' : '#ffffff';
  $('#color1').value = c1; $('#color2').value = c2;
  $('#textColor').value = tx; $('#accentColor').value = '#ffd93d';
  draw();
}

function download(){
  const cv = $('#canvas');
  const url = cv.toDataURL('image/png');
  const a = document.createElement('a');
  a.href = url; a.download = 'og-image-'+cv.width+'x'+cv.height+'.png';
  a.click();
}

function init(){
  // Presets
  const cont = $('#presets'); cont.innerHTML='';
  for(const p of PRESETS){
    const el = document.createElement('div');
    el.className = 'preset-swatch';
    el.title = p.n;
    el.style.background = 'linear-gradient(135deg, '+p.c1+', '+p.c2+')';
    el.addEventListener('click', ()=>{ document.querySelectorAll('.preset-swatch').forEach(x=>x.classList.remove('active')); el.classList.add('active'); applyPreset(p); });
    cont.appendChild(el);
  }
  ['title','subtitle','domain','icon','color1','color2','textColor','accentColor','bgType','size'].forEach(id=>{
    const el = $('#'+id); if(!el) return;
    el.addEventListener('input', draw);
    el.addEventListener('change', ()=>{ if(id==='size') regenerate(); else draw(); });
  });
  draw();
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="download()">${t('download')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="randomize()">${t('randomize')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="regenerate()">${t('regenerate')}</button>`;

GZ.renderToolPage({
  category:'social',
  titleKey:'toolTitle', descKey:'toolDesc',
  howToSteps:['step1','step2','step3','step4'],
  related:[
    {icon:'👁',href:'/seo/open-graph-preview.html',name:'Open Graph Preview'},
    {icon:'🖼',href:'/social/og-image-generator.html',name:'OG Image Generator'},
    {icon:'🐦',href:'/seo/twitter-card-preview.html',name:'Twitter Card Preview'},
    {icon:'💼',href:'/seo/linkedin-preview.html',name:'LinkedIn Preview'},
  ]
});

init();
</script>
