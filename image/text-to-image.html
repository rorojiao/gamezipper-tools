<body>

    <div class="ctrl">

        <option value="Times New Roman">Times New Roman</option>
        <option value="Courier New">Courier New</option>
        <option value="Impact">Impact</option>

    </div>
    <div class="ctrl">
      <label id="lbl-width"></label>
      <input type="number" id="canvasWidth" value="1200" min="200" max="4096" style="width:80px">
      <span>x</span>
      <input type="number" id="canvasHeight" value="630" min="200" max="4096" style="width:80px">
      <div class="size-grid">
        <button onclick="setSize(1200,630)">OG 1200×630</button>
        <button onclick="setSize(1080,1080)">Instagram 1080</button>

<script>
GZI18n.register({
  en: {
    toolTitle: 'Text to Image Generator',
    toolDesc: 'Create beautiful images from text with custom fonts, colors and backgrounds — perfect for quotes, social media and OG images.',
    inputPlaceholder: 'Type your text here... quotes, captions, anything!',
    font: 'Font',
    size: 'Size',
    weight: 'Weight',
    color: 'Text Color',
    bg: 'Background',
    align: 'Align',
    padding: 'Padding',
    lineH: 'Line Height',
    shadow: 'Shadow',
    width: 'Width',
    downloadPng: '⬇ Download PNG',
    downloadJpg: '⬇ Download JPG',
    step1: 'Type or paste your text in the input area',
    step2: 'Choose font, size, colors and alignment',
    step3: 'Adjust padding and shadow for the perfect look',
    step4: 'Click Download PNG or JPG to save the image',
  },
  zh: {
    toolTitle: '文字转图片生成器',
    toolDesc: '使用自定义字体、颜色和背景从文字创建精美图片 — 适用于引言、社交媒体和 OG 预览图。',
    inputPlaceholder: '在此输入文字... 名言、标题、任何内容！',
    font: '字体',
    size: '字号',
    weight: '粗细',
    color: '文字颜色',
    bg: '背景色',
    align: '对齐',
    padding: '内边距',
    lineH: '行高',
    shadow: '阴影',
    width: '宽度',
    downloadPng: '⬇ 下载 PNG',
    downloadJpg: '⬇ 下载 JPG',
    step1: '在输入框中输入或粘贴文字',
    step2: '选择字体、大小、颜色和对齐方式',
    step3: '调整内边距和阴影达到理想效果',
    step4: '点击「下载 PNG」或「下载 JPG」保存图片',
  }
});

const { $, t } = GZ;
const canvas = $('#canvas');
const ctx = canvas.getContext('2d');

$('#textInput').placeholder = t('inputPlaceholder');
$('#lbl-font').textContent = t('font');
$('#lbl-size').textContent = t('size');
$('#lbl-weight').textContent = t('weight');
$('#lbl-color').textContent = t('color');
$('#lbl-bg').textContent = t('bg');
$('#lbl-align').textContent = t('align');
$('#lbl-padding').textContent = t('padding');
$('#lbl-lineH').textContent = t('lineH');
$('#lbl-shadow').textContent = t('shadow');
$('#lbl-width').textContent = t('width');
$('#btn-download-png').textContent = t('downloadPng');
$('#btn-download-jpg').textContent = t('downloadJpg');

function setSize(w, h) {
  $('#canvasWidth').value = w;
  $('#canvasHeight').value = h;
  render();
}

function wrapText(ctx, text, maxWidth) {
  const lines = [];
  const paragraphs = text.split('\n');
  for (const para of paragraphs) {
    if (para === '') { lines.push(''); continue; }
    const words = para.split(' ');
    let line = '';
    for (const word of words) {
      const test = line ? line + ' ' + word : word;
      if (ctx.measureText(test).width > maxWidth && line) {
        lines.push(line);
        line = word;
      } else {
        line = test;
      }
    }
    lines.push(line);
  }
  return lines;
}

function render() {
  const text = $('#textInput').value || t('inputPlaceholder');
  const ff = $('#fontFamily').value;
  const fs = +$('#fontSize').value;
  const fw = $('#fontWeight').value;
  const tc = $('#textColor').value;
  const bc = $('#bgColor').value;
  const ta = $('#textAlign').value;
  const pad = +$('#padding').value;
  const lh = +$('#lineHeight').value / 10;
  const sh = +$('#textShadow').value;
  const w = +$('#canvasWidth').value;
  const h = +$('#canvasHeight').value;

  canvas.width = w;
  canvas.height = h;

  // Background
  ctx.fillStyle = bc;
  ctx.fillRect(0, 0, w, h);

  // Text
  ctx.font = `${fw} ${fs}px "${ff}"`;
  ctx.fillStyle = tc;
  ctx.textAlign = ta;
  ctx.textBaseline = 'top';

  const x = ta === 'center' ? w / 2 : ta === 'right' ? w - pad : pad;
  const maxWidth = w - pad * 2;
  const lines = wrapText(ctx, text, maxWidth);
  const totalH = lines.length * fs * lh;
  const startY = (h - totalH) / 2;

  if (sh > 0) {
    ctx.shadowColor = 'rgba(0,0,0,0.5)';
    ctx.shadowBlur = sh * 2;
    ctx.shadowOffsetX = sh;
    ctx.shadowOffsetY = sh;
  }

  lines.forEach((line, i) => {
    ctx.fillText(line, x, startY + i * fs * lh);
  });

  ctx.shadowColor = 'transparent';
}

// Auto-render on any input change
['textInput','fontFamily','fontSize','fontWeight','textColor','bgColor','textAlign','padding','lineHeight','textShadow','canvasWidth','canvasHeight'].forEach(id => {
  const el = $('#' + id);
  if (el) el.addEventListener('input', render);
});

function downloadPNG() {
  const a = document.createElement('a');
  a.download = 'text-image.png';
  a.href = canvas.toDataURL('image/png');
  a.click();
}

function downloadJPG() {
  const a = document.createElement('a');
  a.download = 'text-image.jpg';
  a.href = canvas.toDataURL('image/jpeg', 0.92);
  a.click();
}

// Initial render
$('#textInput').value = 'Your Text Here\nMake it Beautiful ✨';
render();

GZ.renderToolPage({
  category: 'image',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🖼️', href:'/image/placeholder.html', name:'Placeholder Image'},
    {icon:'💬', href:'/image/image-caption.html', name:'Image Caption'},
    {icon:'💻', href:'/image/code-to-image.html', name:'Code to Image'},
    {icon:'🖼️', href:'/social/og-image-generator.html', name:'OG Image Generator'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
