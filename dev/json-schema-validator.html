// === Minimal JSON Schema Draft-07 validator ===
function validateSchema(data, schema, path, errors, stats) {
  if (!stats) stats = {props: 0, arrays: 0, paths: 0};
  stats.paths++;
  if (!schema || typeof schema !== 'object') return;
  if (schema.$ref) {
    errors.push({path: path || '(root)', reason: '$ref not supported in this lightweight validator', expected: 'inline schema'});
    return;
  }
  // type check
  if (schema.type) {
    const types = Array.isArray(schema.type) ? schema.type : [schema.type];
    const actual = typeOf(data);
    if (!types.some(t => t === actual || (t === 'integer' && actual === 'number' && Number.isInteger(data)) || (t === 'null' && actual === 'null'))) {
      errors.push({path: path || '(root)', reason: 'type mismatch', expected: types.join('|'), actual});
    }
  }
  // enum
  if (schema.enum && !schema.enum.some(v => deepEqual(v, data))) {
    errors.push({path: path || '(root)', reason: 'value not in enum', expected: JSON.stringify(schema.enum), actual: JSON.stringify(data)});
  }
  // const
  if (schema.const !== undefined && !deepEqual(schema.const, data)) {
    errors.push({path: path || '(root)', reason: 'value does not match const', expected: JSON.stringify(schema.const), actual: JSON.stringify(data)});
  }
  // string
  if (typeof data === 'string') {
    if (schema.minLength !== undefined && data.length < schema.minLength) {
      errors.push({path: path || '(root)', reason: 'string too short', expected: 'minLength ' + schema.minLength, actual: 'length ' + data.length});
    }
    if (schema.maxLength !== undefined && data.length > schema.maxLength) {
      errors.push({path: path || '(root)', reason: 'string too long', expected: 'maxLength ' + schema.maxLength, actual: 'length ' + data.length});
    }
    if (schema.pattern) {
      try {
        if (!new RegExp(schema.pattern).test(data)) {
          errors.push({path: path || '(root)', reason: 'pattern mismatch', expected: schema.pattern, actual: data});
        }
      } catch(e) {}
    }
    if (schema.format) {
      const fmt = schema.format.toLowerCase();
      if (fmt === 'email' && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(data)) errors.push({path: path || '(root)', reason: 'invalid email format', expected: 'valid email', actual: data});
      if (fmt === 'uri' && !/^[a-z][a-z0-9+.-]*:\/\//i.test(data)) errors.push({path: path || '(root)', reason: 'invalid URI format', expected: 'valid URI', actual: data});
      if (fmt === 'uuid' && !/^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i.test(data)) errors.push({path: path || '(root)', reason: 'invalid UUID format', expected: 'valid UUID', actual: data});
      if (fmt === 'date' && !/^\d{4}-\d{2}-\d{2}$/.test(data)) errors.push({path: path || '(root)', reason: 'invalid date format', expected: 'YYYY-MM-DD', actual: data});
      if (fmt === 'date-time' && isNaN(Date.parse(data))) errors.push({path: path || '(root)', reason: 'invalid date-time format', expected: 'ISO 8601', actual: data});
    }
  }
  // number
  if (typeof data === 'number') {
    if (schema.minimum !== undefined && data < schema.minimum) {
      errors.push({path: path || '(root)', reason: 'below minimum', expected: '>= ' + schema.minimum, actual: data});
    }
    if (schema.maximum !== undefined && data > schema.maximum) {
      errors.push({path: path || '(root)', reason: 'above maximum', expected: '<= ' + schema.maximum, actual: data});
    }
    if (schema.exclusiveMinimum !== undefined && data <= schema.exclusiveMinimum) {
      errors.push({path: path || '(root)', reason: 'not above exclusiveMinimum', expected: '> ' + schema.exclusiveMinimum, actual: data});
    }
    if (schema.exclusiveMaximum !== undefined && data >= schema.exclusiveMaximum) {
      errors.push({path: path || '(root)', reason: 'not below exclusiveMaximum', expected: '< ' + schema.exclusiveMaximum, actual: data});
    }
    if (schema.multipleOf !== undefined && schema.multipleOf > 0) {
      const ratio = data / schema.multipleOf;
      if (Math.abs(ratio - Math.round(ratio)) > 1e-10) {
        errors.push({path: path || '(root)', reason: 'not multipleOf', expected: 'multiple of ' + schema.multipleOf, actual: data});
      }
    }
  }
  // array
  if (Array.isArray(data)) {
    stats.arrays++;
    if (schema.minItems !== undefined && data.length < schema.minItems) errors.push({path: path || '(root)', reason: 'array too short', expected: 'minItems ' + schema.minItems, actual: 'length ' + data.length});
    if (schema.maxItems !== undefined && data.length > schema.maxItems) errors.push({path: path || '(root)', reason: 'array too long', expected: 'maxItems ' + schema.maxItems, actual: 'length ' + data.length});
    if (schema.uniqueItems) {
      for (let i = 0; i < data.length; i++) {
        for (let j = i + 1; j < data.length; j++) {
          if (deepEqual(data[i], data[j])) {
            errors.push({path: (path||'') + '[' + j + ']', reason: 'duplicate item (uniqueItems)', expected: 'unique', actual: JSON.stringify(data[j])});
            break;
          }
        }
      }
    }
    if (schema.items) {
      const itemSchema = Array.isArray(schema.items) ? schema.items : [schema.items];
      const isTuple = Array.isArray(schema.items);
      data.forEach((item, i) => {
        if (isTuple && itemSchema[i]) {
          validateSchema(item, itemSchema[i], (path || '') + '[' + i + ']', errors, stats);
        } else if (!isTuple) {
          validateSchema(item, schema.items, (path || '') + '[' + i + ']', errors, stats);
        } else {
          if (schema.additionalItems === false) {
            errors.push({path: (path||'') + '[' + i + ']', reason: 'additional item not allowed', expected: 'no additionalItems', actual: 'index ' + i});
          } else if (schema.additionalItems && typeof schema.additionalItems === 'object') {
            validateSchema(item, schema.additionalItems, (path||'') + '[' + i + ']', errors, stats);
          }
        }
      });
    }
  }
  // object
  if (data && typeof data === 'object' && !Array.isArray(data)) {
    stats.props++;
    if (schema.required && Array.isArray(schema.required)) {
      schema.required.forEach(req => {
        if (!(req in data)) {
          errors.push({path: (path||'(root)') + ' → ' + req, reason: 'required property missing', expected: 'present', actual: 'undefined'});
        }
      });
    }
    if (schema.properties) {
      Object.keys(data).forEach(key => {
        if (schema.properties[key]) {
          validateSchema(data[key], schema.properties[key], (path || '(root)') + '.' + key, errors, stats);
        } else if (schema.additionalProperties === false) {
          errors.push({path: (path||'(root)') + '.' + key, reason: 'additional property not allowed', expected: 'in schema', actual: key});
        } else if (schema.additionalProperties && typeof schema.additionalProperties === 'object') {
          validateSchema(data[key], schema.additionalProperties, (path || '(root)') + '.' + key, errors, stats);
        }
      });
    }
    if (schema.minProperties !== undefined && Object.keys(data).length < schema.minProperties) errors.push({path: path || '(root)', reason: 'too few properties', expected: 'minProperties ' + schema.minProperties, actual: Object.keys(data).length});
    if (schema.maxProperties !== undefined && Object.keys(data).length > schema.maxProperties) errors.push({path: path || '(root)', reason: 'too many properties', expected: 'maxProperties ' + schema.maxProperties, actual: Object.keys(data).length});
  }
}

function typeOf(v) {
  if (v === null) return 'null';
  if (Array.isArray(v)) return 'array';
  if (Number.isInteger(v)) return 'integer';
  return typeof v;
}
function deepEqual(a, b) {
  if (a === b) return true;
  if (typeof a !== typeof b) return false;
  if (a === null || b === null) return false;
  if (Array.isArray(a)) return Array.isArray(b) && a.length === b.length && a.every((v,i) => deepEqual(v, b[i]));
  if (typeof a === 'object') {
    const ka = Object.keys(a), kb = Object.keys(b);
    return ka.length === kb.length && ka.every(k => deepEqual(a[k], b[k]));
  }
  return false;
}

function validate() {
  const result = $('#result');
  let json, schema;
  try { json = JSON.parse($('#jsonInput').value || 'null'); }
  catch(e) {
    result.innerHTML = '<div class="jsv-result invalid"><strong>JSON parse error:</strong> ' + e.message + '</div>';
    return;
  }
  try { schema = JSON.parse($('#schemaInput').value || '{}'); }
  catch(e) {
    result.innerHTML = '<div class="jsv-result invalid"><strong>Schema parse error:</strong> ' + e.message + '</div>';
    return;
  }
  const errors = [];
  const stats = {props:0, arrays:0, paths:0};
  validateSchema(json, schema, '', errors, stats);

  if (errors.length === 0) {
    result.innerHTML = `<div class="jsv-result valid">${t('valid')}</div>
    <div class="jsv-stats">
      <div class="jsv-stat"><div class="num">0</div><div class="lbl">${t('statsErrors')}</div></div>
      <div class="jsv-stat"><div class="num">${stats.paths}</div><div class="lbl">${t('statsPaths')}</div></div>
      <div class="jsv-stat"><div class="num">${stats.props}</div><div class="lbl">${t('statsProps')}</div></div>
      <div class="jsv-stat"><div class="num">${stats.arrays}</div><div class="lbl">${t('statsArrays')}</div></div>
    </div>
    <p style="color:var(--text2);font-size:.9em;text-align:center;margin:8px 0">${t('noErrors')}</p>`;
  } else {
    const errHtml = errors.map(e => `<div class="jsv-error">
      <div class="path">${e.path}</div>
      <div class="reason">${e.reason}</div>
      <div class="expected">expected: ${e.expected}${e.actual !== undefined ? ' &nbsp;|&nbsp; actual: ' + (typeof e.actual === 'string' ? e.actual : JSON.stringify(e.actual)) : ''}</div>
    </div>`).join('');
    result.innerHTML = `<div class="jsv-result invalid">${t('invalid').replace('%s', errors.length)}</div>
    <div class="jsv-stats">
      <div class="jsv-stat"><div class="num">${errors.length}</div><div class="lbl">${t('statsErrors')}</div></div>
      <div class="jsv-stat"><div class="num">${stats.paths}</div><div class="lbl">${t('statsPaths')}</div></div>
      <div class="jsv-stat"><div class="num">${stats.props}</div><div class="lbl">${t('statsProps')}</div></div>
      <div class="jsv-stat"><div class="num">${stats.arrays}</div><div class="lbl">${t('statsArrays')}</div></div>
    </div>
    ${errHtml}`;
  }
}

  <button class="gz-btn gz-btn-secondary" onclick="$('#jsonInput').value=JSON_PRESETS['User'];$('#schemaInput').value=SCHEMA_PRESETS['User'];validate()">${t('example')}</button>
