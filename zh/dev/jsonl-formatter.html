<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is JSONL (NDJSON)?", "acceptedAnswer": {"@type": "Answer", "text": "JSONL (JSON Lines), also called NDJSON (Newline-Delimited JSON), is a format where each line of a file is a separate, valid JSON object. Unlike a JSON array, there are no commas between objects and no enclosing brackets. It is widely used for logs, streaming data, and BigQuery exports because you can process one record at a time."}}, {"@type": "Question", "name": "How is JSONL different from a JSON array?", "acceptedAnswer": {"@type": "Answer", "text": "A JSON array wraps all objects in [ ] and separates them with commas, so the entire file must be parsed at once. JSONL puts one JSON object per line with no brackets or commas, so you can read, append, and stream records incrementally — ideal for large datasets and log files."}}, {"@type": "Question", "name": "Can I convert JSONL to a JSON array?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. Click the 'To JSON Array' button and every line will be parsed and combined into a single JSON array enclosed in [ ]. Click 'To JSONL' to convert a JSON array back into newline-delimited JSON Lines."}}, {"@type": "Question", "name": "How does the validator work?", "acceptedAnswer": {"@type": "Answer", "text": "Each non-empty line is parsed independently with JSON.parse. If a line fails, you get the exact line number and the error message. Empty lines are allowed and skipped. All validation runs in your browser — nothing is uploaded."}}]}</script>

<script>

  },
  zh: {

    toolDesc: '格式化、验证、压缩和转换 JSONL（JSON Lines）。JSONL 与 JSON 数组互转。免费，浏览器本地运行，无需上传。',
    format: '格式化',
    minify: '压缩',
    toJsonArray: '转 JSON 数组',
    toJsonl: '转 JSONL',
    example: '示例',
    copy: '复制',
    clear: '清除',
    validN: (n, errs) => `✓ 有效 — ${n} 行${errs?`，已跳过 ${errs} 行空行`:''}`,
    invalidLine: (ln, msg) => `✗ 第 ${ln} 行：${msg}`,
    indent: '空格',
    step1: '在输入区粘贴 JSONL（每行一个 JSON 对象）',
    step2: '点击「格式化」美化每行，或点击「压缩」',
    step3: '使用「转 JSON 数组 / 转 JSONL」在两种格式间转换',
    step4: '点击「复制」将结果复制到剪贴板',
  }
});

let indent = 2;
const { $, copyText, t } = GZ;

function syntaxHighlight(json) {
  return json.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/("(\\u[\da-fA-F]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(\.\d+)?([eE][+-]?\d+)?)/g, m => {
      let c = 'json-number';
      if (/^"/.test(m)) c = /:$/.test(m) ? 'json-key' : 'json-string';
      else if (/true|false/.test(m)) c = 'json-bool';
      else if (/null/.test(m)) c = 'json-null';
      return `<span class="${c}">${m}</span>`;
    });
}

function processLines(mode) {
  const raw = $('#input').value;
  if (!raw.trim()) { $('#output').textContent = ''; $('#status').innerHTML = ''; return; }
  const lines = raw.split('\n');
  const out = [];
  let valid = 0, empty = 0, firstErr = null;
  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];
    if (!line.trim()) { empty++; continue; }
    try {
      const obj = JSON.parse(line);
      valid++;
      if (mode === 'format') out.push(JSON.stringify(obj, null, indent));
      else if (mode === 'minify') out.push(JSON.stringify(obj));
      else if (mode === 'jsonl') out.push(JSON.stringify(obj)); // re-emit compact JSONL
      else if (mode === 'array') out.push(obj); // collect for array
    } catch (e) {
      if (!firstErr) firstErr = { line: i + 1, msg: e.message };
      out.push(line); // keep raw on error for context
    }
  }
  if (firstErr) {
    $('#status').innerHTML = `<span style="color:var(--gz-accent)">${t('invalidLine', firstErr.line, firstErr.msg)}</span>`;
    $('#output').innerHTML = `<span style="color:var(--gz-accent)">${firstErr.msg} (line ${firstErr.line})</span>`;
    return;
  }
  let resultText;
  if (mode === 'array') {
    resultText = JSON.stringify(out, null, indent);
  } else {
    resultText = out.join('\n');
  }
  $('#output').innerHTML = mode === 'array' ? syntaxHighlight(resultText) : resultText.split('\n').map(l => `<span class="ln"></span>${syntaxHighlight(l)}`).join('\n');
  $('#status').innerHTML = `<span style="color:var(--gz-success)">${t('validN', valid, empty)}</span>`;
}

function convertArrayToJsonl() {
  // Parse input as JSON array, output as JSONL
  const raw = $('#input').value.trim();
  if (!raw) return;
  try {
    const arr = JSON.parse(raw);
    if (!Array.isArray(arr)) throw new Error('Input is not a JSON array');
    const out = arr.map(o => JSON.stringify(o)).join('\n');
    $('#input').value = out;
    processLines('jsonl');
  } catch (e) {
    $('#status').innerHTML = `<span style="color:var(--gz-accent)">✗ ${e.message}</span>`;
    $('#output').innerHTML = `<span style="color:var(--gz-accent)">${e.message}</span>`;
  }
}

function loadExample() {
  $('#input').value = '{"name":"Alice","age":30,"role":"admin"}\n{"name":"Bob","age":25,"role":"user"}\n{"name":"Carol","age":35,"role":"user","active":false}';
  processLines('format');
}

function doClear() { $('#input').value = ''; $('#output').textContent = ''; $('#status').innerHTML = ''; }

$('#input').addEventListener('input', () => processLines('format'));

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="processLines('format')">${t('format')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="processLines('minify')">${t('minify')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="processLines('array')">${t('toJsonArray')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="convertArrayToJsonl()">${t('toJsonl')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <select class="gz-select" onchange="indent=+this.value;processLines('format')">
    <option value="2">2 ${t('indent')}</option>
    <option value="4">4 ${t('indent')}</option>
  </select>
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;
