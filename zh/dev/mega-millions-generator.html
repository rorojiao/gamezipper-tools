const { $, copyText, t } = GZ;

function randInt(min, max) {
  const a = new Uint32Array(1);
  (crypto || window.crypto).getRandomValues(a);
  return min + (a[0] % (max - min + 1));
}

function genWhiteBalls() {
  const pool = [];
  for (let i = 1; i <= 70; i++) pool.push(i);
  const picks = [];
  for (let i = 0; i < 5; i++) {
    const idx = randInt(0, pool.length - 1);
    picks.push(pool[idx]);
    pool.splice(idx, 1);
  }
  return picks.sort((a, b) => a - b);
}

function generate() {
  const count = +$('#ticket-count').value || 1;
  const results = $('#results');
  let html = '';
  let allNumbers = [];
  for (let tk = 0; tk < count; tk++) {
    const whites = genWhiteBalls();
    const mb = randInt(1, 25);
    allNumbers.push([...whites, mb]);
    const ballsHtml = whites.map(n => `<span class="ball white-ball">${n}</span>`).join('');
    html += `<div class="ticket"><span class="ticket-num">#${tk + 1}</span>${ballsHtml}<span class="ball gold-ball">${mb}</span></div>`;
  }
  results.innerHTML = html;
  results.dataset.all = JSON.stringify(allNumbers);
}

function copyAll() {
  const data = $('#results').dataset.all;
  if (!data) return;
  const arr = JSON.parse(data);
  const text = arr.map((row, i) => `Ticket ${i + 1}: ${row.slice(0, 5).join('-')} (MB: ${row[5]})`).join('\n');
  copyText(text);
}

function doClear() { $('#results').innerHTML = ''; $('#results').dataset.all = ''; }

$('#toolbar').innerHTML = `
  <label>${t('tickets')}: </label>
  <select class="gz-select" id="ticket-count">
    ${Array.from({length:10},(_,i)=>`<option value="${i+1}"${i===0?' selected':''}>${i+1}</option>`).join('')}
  </select>
  <button class="gz-btn" onclick="generate()">${t('generate')}</button>
