<style>
.up-mode{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.up-mode-btn{background:var(--glass2);border:1px solid var(--border);border-radius:8px;padding:8px 16px;cursor:pointer;font-size:.85rem;color:var(--text);transition:all .15s;font-weight:600}
.up-mode-btn:hover{border-color:var(--accent)}
.up-mode-btn.active{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border-color:transparent}
.up-form{background:var(--glass2);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:14px;display:grid;grid-template-columns:2fr 1fr 1fr 1fr auto;gap:8px;align-items:end}
@media(max-width:780px){.up-form{grid-template-columns:1fr 1fr}}
@media(max-width:480px){.up-form{grid-template-columns:1fr}}
.up-ctrl{display:flex;flex-direction:column;gap:4px}
.up-ctrl label{font-size:.75rem;color:var(--text2);font-weight:600}
.up-ctrl input,.up-ctrl select{padding:8px 10px;background:var(--glass);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:.9rem;width:100%;box-sizing:border-box;min-width:0}
.up-rm{background:var(--glass2);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:8px 12px;cursor:pointer;font-size:.85rem}
.up-rm:hover{border-color:var(--accent);color:var(--accent)}
.up-result{background:var(--glass2);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:14px;overflow-x:auto}
.up-row{display:grid;grid-template-columns:1.6fr 1fr 1fr 1fr 1fr;gap:8px;padding:8px 4px;align-items:center;border-bottom:1px solid var(--border);font-size:.88rem}
.up-row:last-child{border-bottom:none}
.up-row.head{font-weight:700;color:var(--text2);font-size:.78rem;text-transform:uppercase;letter-spacing:.5px}
.up-row .best{background:linear-gradient(135deg,rgba(108,92,231,.18),rgba(0,206,201,.12));border-radius:6px;padding:2px 6px;font-weight:700;color:var(--accent)}
.up-row .worst{color:var(--text2)}
.up-row .winner-bar{height:6px;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:3px;margin-top:2px}
.up-summary{background:var(--glass);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-top:14px;display:flex;gap:14px;flex-wrap:wrap;justify-content:space-between}
.up-summary .item .label{font-size:.78rem;color:var(--text2);display:block}
.up-summary .item .value{font-size:1.05rem;font-weight:700;color:var(--accent);font-family:monospace}
.up-add{background:var(--glass);border:1px dashed var(--border);border-radius:8px;padding:8px 14px;cursor:pointer;font-size:.9rem;color:var(--text2);width:100%;text-align:center;margin-top:6px}
.up-add:hover{border-color:var(--accent);color:var(--text)}
.up-currency{display:flex;align-items:end;gap:8px;margin-bottom:14px;background:var(--glass2);border:1px solid var(--border);border-radius:10px;padding:10px 14px}
.up-currency label{font-size:.78rem;color:var(--text2);font-weight:600}
.up-currency select{padding:6px 10px;background:var(--glass);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:.9rem}
</style>
<script type="application/ld+json">{"@context":"https://schema.org","@type":"WebApplication","name":"Unit Price Calculator","description":"Free online unit price calculator. Compare prices by cost per ounce, gram, liter or any unit to find the best deal. Bulk list mode, savings calculator and currency support.","url": "https://tools.gamezipper.com/zh/calc/unit-price.html","applicationCategory":"Utility","operatingSystem":"Web Browser","offers":{"@type":"Offer","price":"0"}}</script>
<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is unit price?", "acceptedAnswer": {"@type": "Answer", "text": "Unit price is the cost per standardized unit of measurement (per ounce, gram, liter, count, square foot, etc.). It lets you fairly compare products sold in different package sizes so you can identify the best value."}}, {"@type": "Question", "name": "How do I compare two products for the best deal?", "acceptedAnswer": {"@type": "Answer", "text": "Add each product with its price, package size and unit. The calculator instantly shows the cost per unit, ranks them from cheapest to most expensive, and highlights the best deal. You can also see the savings amount between the best and worst options."}}, {"@type": "Question", "name": "Can I compare products with different units?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. Pick any unit you like (oz, g, ml, kg, lb, count, etc.) and the calculator will normalize. For different unit types (weight vs volume), convert to the same unit first using the built-in conversion factors."}}, {"@type": "Question", "name": "Does it work for non-food items?", "acceptedAnswer": {"@type": "Answer", "text": "Absolutely. Use it for toilet paper (cost per sheet), detergent (per load), tiles (per square foot), screws (per piece), or anything else sold in different package sizes."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="up-currency">
      <label id="lblCur">Currency symbol</label>
      <select id="currency">
        <option value="$">$ — USD / CAD / AUD</option>
        <option value="€">€ — EUR</option>
        <option value="£">£ — GBP</option>
        <option value="¥">¥ — CNY / JPY</option>
        <option value="₹">₹ — INR</option>
        <option value="₩">₩ — KRW</option>
        <option value="₽">₽ — RUB</option>
        <option value="R$">R$ — BRL</option>
      </select>
    </div>

    <div class="up-mode">
      <div class="up-mode-btn active" data-base="oz">oz (ounce)</div>
      <div class="up-mode-btn" data-base="g">g (gram)</div>
      <div class="up-mode-btn" data-base="lb">lb (pound)</div>
      <div class="up-mode-btn" data-base="kg">kg (kilogram)</div>
      <div class="up-mode-btn" data-base="ml">ml (milliliter)</div>
      <div class="up-mode-btn" data-base="l">L (liter)</div>
      <div class="up-mode-btn" data-base="ct">count</div>
    </div>

    <div id="rows"></div>
    <button class="up-add" onclick="addRow()">+ <span id="addLbl">Add another product</span></button>

    <div class="up-result" id="result" style="display:none">
      <div class="up-row head">
        <div id="hProduct">Product</div>
        <div id="hPrice">Price</div>
        <div id="hSize">Size</div>
        <div id="hUnit">Unit price</div>
        <div id="hBar">Bar</div>
      </div>
      <div id="resultRows"></div>
      <div class="up-summary" id="summary"></div>
    </div>

    <div class="gz-toolbar" id="toolbar"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Unit Price Calculator',
    toolDesc: 'Compare product prices by cost per ounce, gram, liter or any unit to instantly find the best deal. Add unlimited products, see savings and pick a winner — perfect for grocery shopping.',
    lblCur: 'Currency symbol',
    hProduct: 'Product', hPrice: 'Price', hSize: 'Size', hUnit: 'Unit price', hBar: '',
    addLbl: 'Add another product',
    step1: 'Click the unit tabs (oz, g, lb, kg, ml, L, count) to set the comparison unit',
    step2: 'Add each product row with name, price and package size in any unit',
    step3: 'See live unit-price ranking, the best deal highlighted and total savings',
    step4: 'Adjust units, currency or rows as you shop — the comparison updates instantly',
  },
  zh: {
    toolTitle: '单价计算器',
    toolDesc: '通过每盎司、克、升或任意单位的成本比较商品价格，即时找到最划算的选择。添加任意数量的商品，查看节省金额并挑选最佳方案 — 适合日常购物。',
    lblCur: '货币符号',
    hProduct: '商品', hPrice: '价格', hSize: '规格', hUnit: '单价', hBar: '',
    addLbl: '添加另一个商品',
    step1: '点击单位标签（oz、g、lb、kg、ml、L、count）设置比较单位',
    step2: '为每个商品添加行：名称、价格和任意单位的规格',
    step3: '查看实时单价排名、最佳选择高亮和总节省金额',
    step4: '购物时调整单位、货币或商品行 — 比较结果即时更新',
  }
});

// Conversion to base units (g, ml, count)
const TO_G = { g: 1, kg: 1000, oz: 28.3495, lb: 453.592 };
const TO_ML = { ml: 1, l: 1000 };

const { $, copyText, t } = GZ;
let baseUnit = 'oz';
let rowId = 0;
const rows = new Map();

document.querySelectorAll('.up-mode-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.up-mode-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    baseUnit = btn.dataset.base;
    if (baseUnit === 'ct') {
      // Switch all rows to count
      rows.forEach(r => { r.sizeUnit = 'ct'; });
    }
    render();
  });
});

function addRow(name = '', price = '', size = '', sizeUnit = null) {
  const id = ++rowId;
  const finalSizeUnit = sizeUnit || (baseUnit === 'ct' ? 'ct' : (TO_G[baseUnit] !== undefined ? baseUnit : (TO_ML[baseUnit] !== undefined ? baseUnit : 'oz')));
  rows.set(id, { name, price, size, sizeUnit: finalSizeUnit });
  const row = document.createElement('div');
  row.className = 'up-form';
  row.id = 'row-' + id;
  row.innerHTML = `
    <div class="up-ctrl">
      <label>${t('hProduct')}</label>
      <input type="text" data-k="name" value="${name}" placeholder="e.g. Brand A 32oz">
    </div>
    <div class="up-ctrl">
      <label>${t('hPrice')}</label>
      <input type="number" step="0.01" data-k="price" value="${price}" placeholder="3.99">
    </div>
    <div class="up-ctrl">
      <label>${t('hSize')}</label>
      <input type="number" step="0.01" data-k="size" value="${size}" placeholder="32">
    </div>
    <div class="up-ctrl">
      <label>Unit</label>
      <select data-k="sizeUnit">${sizeOptions()}</select>
    </div>
    <button class="up-rm" data-id="${id}">×</button>`;
  row.querySelector('select[data-k=sizeUnit]').value = finalSizeUnit;
  row.querySelectorAll('input,select').forEach(el => el.addEventListener('input', () => { collect(id); render(); }));
  row.querySelector('.up-rm').addEventListener('click', () => { rows.delete(id); row.remove(); render(); });
  document.getElementById('rows').appendChild(row);
  render();
}

function sizeOptions() {
  return ['g','kg','oz','lb','ml','l','ct'].map(u => `<option value="${u}">${u}</option>`).join('');
}

function collect(id) {
  const row = document.getElementById('row-' + id);
  if (!row) return;
  const data = rows.get(id) || {};
  row.querySelectorAll('[data-k]').forEach(el => data[el.dataset.k] = el.value);
  rows.set(id, data);
}

function toBase(size, unit) {
  if (unit === 'ct') return size; // base is count
  if (TO_G[unit] !== undefined) {
    if (baseUnit === 'ct') return null; // incompatible
    return size * TO_G[unit] / (TO_G[baseUnit] || 1);
  }
  if (TO_ML[unit] !== undefined) {
    if (baseUnit === 'ct') return null;
    return size * TO_ML[unit] / (TO_ML[baseUnit] || 1);
  }
  return null;
}

function render() {
  collectAll();
  const data = Array.from(rows.values()).filter(r => r.price && r.size);
  if (data.length < 1) {
    document.getElementById('result').style.display = 'none';
    return;
  }
  const cur = document.getElementById('currency').value;
  const baseName = baseUnit === 'ct' ? '' : '/' + baseUnit;
  const items = data.map(r => {
    const s = parseFloat(r.size), p = parseFloat(r.price);
    const norm = toBase(s, r.sizeUnit);
    const unitPrice = norm ? p / norm : p / s;
    return { ...r, price: p, size: s, unitPrice, norm };
  });
  // Sort: incompatible last
  items.sort((a, b) => {
    if (a.unitPrice === null) return 1;
    if (b.unitPrice === null) return -1;
    return a.unitPrice - b.unitPrice;
  });
  const best = items[0].unitPrice;
  const worst = items[items.length - 1].unitPrice;
  const max = worst * 1.2;

  const html = items.map((it, i) => {
    const isBest = i === 0 && it.unitPrice !== null;
    const isWorst = i === items.length - 1 && items.length > 1 && it.unitPrice !== null;
    const pctWidth = it.unitPrice ? Math.max(2, Math.min(100, (1 - it.unitPrice / max) * 100)) : 0;
    return `<div class="up-row">
      <div>${it.name || '<em style="color:var(--text2)">—</em>'}</div>
      <div>${cur}${it.price.toFixed(2)}</div>
      <div>${it.size} ${it.sizeUnit}</div>
      <div class="${isBest ? 'best' : isWorst ? 'worst' : ''}">${it.unitPrice !== null ? cur + it.unitPrice.toFixed(3) + baseName : '—'}</div>
      <div><div class="winner-bar" style="width:${pctWidth}%"></div></div>
    </div>`;
  }).join('');
  document.getElementById('resultRows').innerHTML = html;
  document.getElementById('result').style.display = 'block';

  // Summary
  const savings = items.length > 1 && best !== null && worst !== null ? (worst - best) * Math.max(...items.map(i => i.norm || 0)) : 0;
  const savingsPct = items.length > 1 && best && worst ? Math.round((1 - best/worst) * 100) : 0;
  document.getElementById('summary').innerHTML = `
    <div class="item"><span class="label">${items.length} ${items.length === 1 ? 'product' : 'products'}</span></div>
    <div class="item"><span class="label">Best deal</span><span class="value">${cur}${best !== null ? best.toFixed(3) + baseName : '—'}</span></div>
    ${items.length > 1 ? `<div class="item"><span class="label">Savings per unit</span><span class="value">${cur}${(worst-best).toFixed(3)}${baseName}</span></div>` : ''}
    ${items.length > 1 ? `<div class="item"><span class="label">Savings</span><span class="value">${savingsPct}% cheaper</span></div>` : ''}`;
}

function collectAll() {
  rows.forEach((_, id) => collect(id));
}

document.getElementById('currency').addEventListener('change', render);

// Pre-populate with examples
addRow('Brand A — 32 oz', 3.99, 32, 'oz');
addRow('Brand B — 48 oz', 5.49, 48, 'oz');
addRow('Brand C — 24 oz', 2.79, 24, 'oz');

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="addRow()">+ Add Product</button>
  <button class="gz-btn gz-btn-secondary" onclick="rows.clear();document.getElementById('rows').innerHTML='';render()">${t('clear')}</button>`;

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🏷️', href:'/calc/discount-calculator.html', name:'Discount Calculator'},
    {icon:'💰', href:'/calc/tip-calculator.html', name:'Tip Calculator'},
    {icon:'💱', href:'/convert/currency-converter.html', name:'Currency Converter'},
    {icon:'📏', href:'/convert/unit.html', name:'Unit Converter'},
  ]
});
</script>
<script src="/tools-result-rec.js?v=20260707v520" defer></script>
</body>
