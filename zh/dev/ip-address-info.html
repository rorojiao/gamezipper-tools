const { $, copyText, t } = GZ;

const SAMPLES = ['192.168.1.1','10.0.0.1','127.0.0.1','8.8.8.8','172.16.5.10','2001:db8::1','::1','fe80::1','169.254.1.1','224.0.0.1'];

// Parse IPv4 — returns array of 4 octets or null.
function parseIPv4(str){
  const parts = str.split('.');
  if(parts.length !== 4) return null;
  const octets = [];
  for(const p of parts){
    if(!/^\d+$/.test(p)) return null;
    const n = parseInt(p, 10);
    if(isNaN(n) || n < 0 || n > 255) return null;
    // Reject leading zeros except for "0" itself (some specs treat 010 as octal)
    if(p.length > 1 && p.charAt(0) === '0') return null;
    octets.push(n);
  }
  return octets;
}

// Parse IPv6 — returns array of 8 16-bit groups or null.
function parseIPv6(str){
  // Handle IPv4-mapped (::ffff:1.2.3.4)
  let v4Suffix = null;
  const lastColon = str.lastIndexOf(':');
  if(lastColon !== -1 && str.indexOf('.', lastColon) !== -1){
    const maybeV4 = str.substring(lastColon + 1);
    const v4 = parseIPv4(maybeV4);
    if(v4){
      v4Suffix = v4;
      str = str.substring(0, lastColon + 1) + (v4[0] * 256 + v4[1]).toString(16) + ':' + (v4[2] * 256 + v4[3]).toString(16);
    } else {
      return null;
    }
  }
  // Split on :: (only one allowed)
  const dblColon = str.indexOf('::');
  let groups;
  if(dblColon !== -1){
    if(str.indexOf('::', dblColon + 1) !== -1) return null; // multiple ::
    const before = str.substring(0, dblColon);
    const after = str.substring(dblColon + 2);
    const beforeParts = before ? before.split(':') : [];
    const afterParts = after ? after.split(':') : [];
    const total = beforeParts.length + afterParts.length;
    if(total > 7) return null;
    const fill = 8 - total;
    groups = beforeParts.concat(new Array(fill).fill('0')).concat(afterParts);
  } else {
    groups = str.split(':');
    if(groups.length !== 8) return null;
  }
  const result = [];
  for(const g of groups){
    if(!/^[0-9a-fA-F]{1,4}$/.test(g)) return null;
    result.push(parseInt(g, 16));
  }
  return result;
}

function ipv4Info(octs){
  const ipStr = octs.join('.');
  const int32 = (octs[0] << 24) >>> 0 | (octs[1] << 16) | (octs[2] << 8) | octs[3];
  // Type detection
  let type = t('typePublic'), scope = t('scopeGlobal');
  const a = octs[0];
  if(a === 127){ type = t('typeLoopback'); scope = t('scopeLoopback'); }
  else if(a === 10 || (a === 172 && octs[1] >= 16 && octs[1] <= 31) || (a === 192 && octs[1] === 168)){ type = t('typePrivate'); scope = t('scopeUniqueLocal'); }
  else if(a === 169 && octs[1] === 254){ type = t('typeLinkLocal'); scope = t('scopeLink'); }
  else if(a >= 224 && a <= 239){ type = t('typeMulticast'); scope = t('scopeGlobal'); }
  else if(a >= 240){ type = t('typeReserved'); scope = t('scopeGlobal'); }
  else if(a === 0){ type = t('typeUnspecified'); scope = t('scopeUnspecified'); }
  else if((a === 192 && octs[1] === 0 && octs[2] === 2) || (a === 198 && (octs[1] === 51 && octs[2] === 100) || (a === 198 && octs[1] === 18)) || (a === 203 && octs[1] === 0 && octs[2] === 113)){ type = t('typeDocumentation'); scope = t('scopeGlobal'); }
  // Class (classful addressing — 0 and 127 are part of the Class A range but reserved)
  let cls;
  if(a <= 127) cls = t('classA');
  else if(a >= 128 && a <= 191) cls = t('classB');
  else if(a >= 192 && a <= 223) cls = t('classC');
  else if(a >= 224 && a <= 239) cls = t('classD');
  else cls = t('classE');
  // Binary
  const binary = octs.map(o => o.toString(2).padStart(8, '0')).join('.');
  // Reverse DNS
  const ptr = octs.slice().reverse().join('.') + '.in-addr.arpa';
  return {
    version: 'IPv4 (32 ' + t('bits') + ')',
    normalized: ipStr,
    type, scope, cls, binary, ptr,
    badge: t('validIpv4')
  };
}

function ipv6Info(groups){
  // Full normalized form
  const norm = groups.map(g => g.toString(16)).join(':');
  // Compressed form via URL
  let compressed;
  try {
    // Browser-native URL is not reliable for this; do manual compression
    compressed = compressIPv6(groups);
  } catch(e){ compressed = norm; }
  const a = groups[0];
  let type = t('typePublic'), scope = t('scopeGlobal');
  const isAllZero = groups.every(g => g === 0);
  if(isAllZero){ type = t('typeUnspecified'); scope = t('scopeUnspecified'); }
  else if(groups[0] === 0 && groups[1] === 0 && groups[2] === 0 && groups[3] === 0 && groups[4] === 0 && groups[5] === 0 && groups[6] === 0 && groups[7] === 1){ type = t('typeLoopback'); scope = t('scopeLoopback'); }
  else if((groups[0] & 0xffc0) === 0xfe80){ type = t('typeLinkLocal'); scope = t('scopeLink'); }       // fe80::/10
  else if((groups[0] & 0xfe00) === 0xfc00){ type = t('typeUniqueLocal'); scope = t('scopeUniqueLocal'); } // fc00::/7
  else if((groups[0] & 0xff00) === 0xff00){ type = t('typeMulticast'); scope = t('scopeGlobal'); }       // ff00::/8
  else if((groups[0] & 0xff00) === 0x2000 && (groups[1] === 0xdb8)){ type = t('typeDocumentation'); scope = t('scopeGlobal'); } // 2001:db8::/32
  // Binary (128 bits)
  const binary = groups.map(g => g.toString(2).padStart(16, '0')).join(':');
  // Reverse DNS
  const nibbles = groups.map(g => g.toString(16).padStart(4,'0').split('').reverse()).flat();
  const ptr = nibbles.join('.') + '.ip6.arpa';
  return {
    version: 'IPv6 (128 ' + t('bits') + ')',
    normalized: compressed,
    type, scope,
    cls: '—',
    binary, ptr,
    badge: t('validIpv6')
  };
}

function compressIPv6(groups){
  const hex = groups.map(g => g.toString(16));
  // Find longest run of zeros
  let bestStart = -1, bestLen = 0, curStart = -1, curLen = 0;
  for(let i = 0; i < hex.length; i++){
    if(groups[i] === 0){
      if(curStart === -1) curStart = i;
      curLen++;
      if(curLen > bestLen){ bestLen = curLen; bestStart = curStart; }
    } else {
      curStart = -1; curLen = 0;
    }
  }
  if(bestLen < 2) return hex.join(':');
  const before = hex.slice(0, bestStart);
  const after = hex.slice(bestStart + bestLen);
  return before.join(':') + '::' + after.join(':');
}

function doCheck(){
  const raw = $('#ip').value.trim();
  const out = $('#result');
  if(!raw){ out.innerHTML = '<div class="ip-err">'+t('invalidEmpty')+'</div>'; return; }

  let info = null, badgeClass = 'warn';
  const v4 = parseIPv4(raw);
  if(v4){ info = ipv4Info(v4); badgeClass = ''; }
  else {
    const v6 = parseIPv6(raw);
    if(v6){ info = ipv6Info(v6); badgeClass = ''; }
  }

  if(!info){
    out.innerHTML = '<div class="ip-err">'+t('invalid')+': <code style="font-family:monospace">'+escapeHtml(raw)+'</code></div>';
    return;
  }

  out.innerHTML = `
    <div class="ip-card">
      <div class="lbl">${t('address')}<span class="ip-badge ${badgeClass}">${info.badge}</span></div>
      <div class="val">${escapeHtml(info.normalized)}</div>
    </div>
    <div class="ip-grid">
      <div class="ip-card"><div class="lbl">${t('version')}</div><div class="val" style="font-size:.95rem">${info.version}</div></div>
      <div class="ip-card"><div class="lbl">${t('type')}</div><div class="val" style="font-size:.92rem">${info.type}</div></div>
      <div class="ip-card"><div class="lbl">${t('scope')}</div><div class="val" style="font-size:.92rem">${info.scope}</div></div>
      <div class="ip-card"><div class="lbl">${t('ipv4Class')}</div><div class="val" style="font-size:.92rem">${info.cls}</div></div>
    </div>
    <div class="ip-card">
      <div class="lbl">${t('binary')}</div>
      <div class="ip-binary">${info.binary}</div>
    </div>
    <div class="ip-card">
      <div class="lbl">${t('reverseDns')}</div>
      <div class="val" style="font-size:.95rem">${info.ptr} <button class="gz-btn gz-btn-secondary" style="margin-left:8px;padding:4px 10px;font-size:.78rem" onclick="GZ.copyText('${info.ptr}')">📋</button></div>
    </div>`;
}

function escapeHtml(s){ return String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

function doRandom(){
  const s = SAMPLES[Math.floor(Math.random() * SAMPLES.length)];
  $('#ip').value = s;
  doCheck();
}

  SAMPLES.slice(0, 6).map(s => '<button onclick="document.getElementById(\'ip\').value=\''+s+'\';doCheck()">'+s+'</button>').join('');
