<script>

    nodes: '个节点',
    step1: '在左侧输入区粘贴你的 JSON',
    step2: '点击「渲染树」生成交互式树',
    step3: '点击三角图标展开或折叠节点',
    step4: '使用搜索框高亮匹配的键或值',
    step5: '点击复制图标获取叶节点值或其 JSON 路径',

});

const { $, copyText, t } = GZ;
let nodeCount = 0;
let allToggles = [];

function escapeHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function highlightSearch(text, q) {
  if (!q) return escapeHtml(text);
  const esc = escapeHtml(text);
  const qEsc = escapeHtml(q).replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return esc.replace(new RegExp(qEsc, 'gi'), m => `<span class="jt-highlight">${m}</span>`);
}

function buildTree(data, key, path, isRoot) {
  nodeCount++;
  const isArr = Array.isArray(data);
  const isObj = typeof data === 'object' && data !== null;
  
  let childrenHtml = '';
  let preview = '';
  
  if (isObj) {
    const entries = isArr ? data.map((v,i)=>[i,v]) : Object.entries(data);
    for (const [k, v] of entries) {
      const childPath = isArr ? `${path}[${k}]` : (path ? `${path}.${k}` : k);
      childrenHtml += buildTree(v, k, childPath, false);
    }
    if (isArr) preview = `Array(${data.length})`;
    else preview = `{${Object.keys(data).length} keys}`;
  }

  const hasChildren = childrenHtml !== '';
  const childList = hasChildren ? `<ul class="jt-ul ${isRoot?'root':''}">${childrenHtml}</ul>` : '';
  
  let keyHtml = '';
  if (!isRoot) {
    if (isArr && typeof key === 'number') {
      keyHtml = `<span class="jt-key" style="color:#61afef">[${key}]</span>`;
    } else {
      keyHtml = `<span class="jt-key">"${escapeHtml(key)}"</span><span class="jt-colon">:</span>`;
    }
  }

  let valueHtml = '';
  let copyIcons = '';
  if (!isObj) {
    let cls = 'jt-string';
    let display = JSON.stringify(data);
    if (typeof data === 'number') cls = 'jt-number';
    else if (typeof data === 'boolean') cls = 'jt-bool';
    else if (data === null) cls = 'jt-null';
    const q = $('#jtSearch').value.trim();
    valueHtml = `<span class="${cls}">${highlightSearch(typeof data==='string'?data:String(data), q)}</span>`;
    copyIcons = `<span class="jt-copyval" onclick="copyVal(this, ${JSON.stringify(JSON.stringify(data))})">⧉</span>` +
                `<span class="jt-copypath" onclick="copyVal(this, ${JSON.stringify(path)})">⇥</span>`;
  } else {
    const q = $('#jtSearch').value.trim();
    if (q) {
      // check if key matches
    }
    valueHtml = `<span class="jt-preview">${preview}</span>`;
  }

  const toggleClass = hasChildren ? '' : 'leaf';
  const toggleChar = hasChildren ? '▾' : '';
  
  return `<li class="jt-li">
    <div class="jt-row">
      <span class="jt-toggle ${toggleClass}" onclick="toggleNode(this)">${toggleChar}</span>
      ${keyHtml}
      ${valueHtml}
      ${copyIcons}
    </div>
    ${childList}
  </li>`;
}

function toggleNode(el) {
  if (el.classList.contains('leaf')) return;
  const li = el.closest('.jt-li');
  const ul = li.querySelector(':scope > ul.jt-ul');
  if (!ul) return;
  const hidden = ul.style.display === 'none';
  ul.style.display = hidden ? '' : 'none';
  el.textContent = hidden ? '▾' : '▸';
}

function copyVal(btn, val) {
  copyText(val);
  const orig = btn.textContent;
  btn.textContent = '✓';
  setTimeout(() => btn.textContent = orig, 1000);
}

function doRender() {
  const inp = $('#input').value.trim();
  if (!inp) {
    $('#output').innerHTML = `<div class="jt-empty">${t('empty')}</div>`;
    $('#status').innerHTML = '';
    return;
  }
  try {
    const data = JSON.parse(inp);
    nodeCount = 0;
    const tree = buildTree(data, '', '', true);
    $('#output').innerHTML = `<div class="jt-tree"><ul class="jt-ul root">${tree}</ul></div><div class="jt-stats">${nodeCount} ${t('nodes')}</div>`;
    $('#status').innerHTML = `<span style="color:var(--gz-success)">${t('valid')}</span>`;
    allToggles = [...document.querySelectorAll('.jt-toggle:not(.leaf)')];
    // auto-collapse deep arrays/objects with > 20 children
  } catch(e) {
    $('#output').innerHTML = `<div class="jt-empty" style="color:var(--gz-accent)">${t('error')}: ${escapeHtml(e.message)}</div>`;
    $('#status').innerHTML = `<span style="color:var(--gz-accent)">${t('error')}: ${escapeHtml(e.message)}</span>`;
  }
}

function doSearch() {
  doRender();
}

function expandAll() {
  document.querySelectorAll('.jt-toggle:not(.leaf)').forEach(el => {
    const li = el.closest('.jt-li');
    const ul = li.querySelector(':scope > ul.jt-ul');
    if (ul) { ul.style.display = ''; el.textContent = '▾'; }
  });
}

function collapseAll() {
  document.querySelectorAll('.jt-toggle:not(.leaf)').forEach(el => {
    const li = el.closest('.jt-li');
    const ul = li.querySelector(':scope > ul.jt-ul');
    if (ul && !li.parentElement.classList.contains('root')) {
      ul.style.display = 'none';
      el.textContent = '▸';
    }
  });
}

function loadExample() {
  $('#input').value = JSON.stringify({
    "product": {
      "id": 42,
      "name": "Wireless Headphones",
      "active": true,
      "price": 129.99,
      "tags": ["audio", "bluetooth", "premium"],
      "specs": {
        "battery": "30h",
        "weight_g": 250,
        "noise_cancelling": true
      },
      "reviews": [
        {"user": "Alice", "rating": 5, "comment": "Amazing sound!"},
        {"user": "Bob", "rating": 4, "comment": null}
      ],
      "warranty": null
    }
  }, null, 2);
  doRender();
}

function doClear() {
  $('#input').value = '';
  $('#output').innerHTML = `<div class="jt-empty">${t('empty')}</div>`;
  $('#status').innerHTML = '';
  $('#jtSearch').value = '';
}

$('#jtSearch').setAttribute('placeholder', t('searchPh'));
$('#jtSearch').addEventListener('input', doSearch);
$('#jtExpandAll').textContent = t('expandAll');
$('#jtCollapseAll').textContent = t('collapseAll');
$('#jtExpandAll').addEventListener('click', expandAll);
$('#jtCollapseAll').addEventListener('click', collapseAll);
$('#output').querySelector('.jt-empty').textContent = t('empty');

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="doRender()">${t('render')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

$('#lbl-in') && ($('#lbl-in').textContent = t('inputLabel'));
$('#lbl-out') && ($('#lbl-out').textContent = t('outputLabel'));

    {icon:'📊', href:'/dev/json-statistics.html', name:'JSON Statistics'},
  ]
});
</script>
