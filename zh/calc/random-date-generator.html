<script>
GZI18n.register({
  en: {
    toolTitle: 'Random Date Generator',
    toolDesc: 'Generate random dates within any range for testing databases, mock data and scheduling. Custom count, formats, weekend exclusion and CSV export — all in your browser.',

    copy: 'Copy',
    download: 'Download CSV',
    clear: 'Clear',

    lblEnd: 'End Date',
    lblCount: 'Number of Dates',
    lblFormat: 'Output Format',
    lblTime: 'Include random time',
    lblWeekend: 'Skip weekends',
    lblSort: 'Sort chronologically',
    lblUnique: 'Unique dates only',
    statLine: '✓ Generated %1 date(s)',
    warnRange: '⚠ Start date must be before end date.',
    warnWeekend: '⚠ Range has no weekdays — weekends not skipped.',
    step1: 'Set the start and end date of the range',
    step2: 'Choose how many dates and the output format',
    step3: 'Toggle time, weekend skip and sorting options',
    step4: 'Click Generate, then copy or download as CSV',
  },
  zh: {
    toolTitle: '随机日期生成器',
    toolDesc: '在任意范围内生成随机日期，用于测试数据库、模拟数据和排程。自定义数量、格式、排除周末和导出 CSV — 全部在浏览器本地运行。',
    generate: '生成',
    copy: '复制',
    download: '下载 CSV',
    clear: '清除',
    lblStart: '开始日期',
    lblEnd: '结束日期',
    lblCount: '日期数量',
    lblFormat: '输出格式',
    lblTime: '包含随机时间',
    lblWeekend: '排除周末',
    lblSort: '按时间排序',
    lblUnique: '仅唯一日期',
    statLine: '✓ 生成 %1 个日期',
    warnRange: '⚠ 开始日期必须早于结束日期。',
    warnWeekend: '⚠ 该范围内没有工作日 — 无法排除周末。',
    step1: '设置范围的开始和结束日期',
    step2: '选择日期数量和输出格式',
    step3: '勾选时间、排除周末和排序选项',
    step4: '点击「生成」，然后复制或下载为 CSV',
  }
});

const { $, copyText, t } = GZ;
let lastDates = [];

function rndInt(max){ const a = new Uint32Array(1); crypto.getRandomValues(a); return a[0] % max; }

function parseDate(s){ return new Date(s+'T00:00:00').getTime(); }

function formatDate(ms, fmt, incTime){
  const d = new Date(ms);
  const Y = d.getFullYear();
  const M = String(d.getMonth()+1).padStart(2,'0');
  const D = String(d.getDate()).padStart(2,'0');
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  switch(fmt){
    case 'us': return `${M}/${D}/${Y}`;
    case 'eu': return `${D}/${M}/${Y}`;
    case 'long': return `${months[d.getMonth()]} ${d.getDate()}, ${Y}`;
    case 'unix': return String(Math.floor(d.getTime()/1000));
    case 'iso-full': return d.toISOString();
    default:
      if(incTime){
        const h = String(d.getHours()).padStart(2,'0');
        const mi = String(d.getMinutes()).padStart(2,'0');
        const s2 = String(d.getSeconds()).padStart(2,'0');
        return `${Y}-${M}-${D} ${h}:${mi}:${s2}`;
      }
      return `${Y}-${M}-${D}`;
  }
}

function doGenerate(){
  const startStr = $('#start').value;
  const endStr = $('#end').value;
  if(!startStr || !endStr){ return; }
  const start = parseDate(startStr);
  let end = parseDate(endStr);
  if(end < start){ $('#stats').innerHTML='<span style="color:var(--gz-error)">'+t('warnRange')+'</span>'; $('#output').textContent=''; lastDates=[]; return; }
  // if include time, span the whole final day
  if($('#incTime').checked){ end = end + 24*3600*1000 - 1; }
  const span = end - start;
  const count = Math.max(1, Math.min(1000, parseInt($('#count').value)||10));
  const fmt = $('#format').value;
  const incTime = $('#incTime').checked;
  const skipWk = $('#skipWeekend').checked;
  const wantUnique = $('#unique').checked;

  const result = [];
  const seen = new Set();
  let attempts = 0;
  const maxAttempts = count * 50 + 1000;
  let weekendWarn = false;
  while(result.length < count && attempts < maxAttempts){
    attempts++;
    const ms = start + rndInt(span+1);
    const d = new Date(ms);
    const day = d.getDay();
    if(skipWk && (day===0 || day===6)){ continue; }
    const dayKey = d.toDateString();
    if(wantUnique && seen.has(dayKey)){ continue; }
    if(wantUnique) seen.add(dayKey);
    result.push(ms);
  }
  if(skipWk && result.length===0 && attempts>=maxAttempts) weekendWarn = true;

  if($('#sort').checked) result.sort((a,b)=>a-b);
  lastDates = result.map(ms=>formatDate(ms, fmt, incTime));

  $('#output').textContent = lastDates.join('\n');
  let stat = '<span style="color:var(--gz-success)">'+t('statLine').replace('%1',lastDates.length)+'</span>';
  if(weekendWarn) stat += ' <span style="color:var(--gz-accent)">'+t('warnWeekend')+'</span>';
  $('#stats').innerHTML = stat;
}

function doDownload(){
  if(!lastDates.length){ doGenerate(); if(!lastDates.length) return; }
  const csv = 'date\n'+lastDates.map(d=>`"${d}"`).join('\n');
  const blob = new Blob([csv],{type:'text/csv;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href=url; a.download='random-dates.csv';
  document.body.appendChild(a); a.click();
  setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(url);},100);
}

function doClear(){ $('#output').textContent=''; $('#stats').textContent=''; lastDates=[]; }

$('#lbl-start').textContent = t('lblStart');
$('#lbl-end').textContent = t('lblEnd');
$('#lbl-count').textContent = t('lblCount');
$('#lbl-format').textContent = t('lblFormat');
$('#lbl-time').textContent = t('lblTime');
$('#lbl-weekend').textContent = t('lblWeekend');
$('#lbl-sort').textContent = t('lblSort');
$('#lbl-unique').textContent = t('lblUnique');

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="doGenerate()">${t('generate')}</button>
  <button class="gz-btn" onclick="doDownload()">⬇ ${t('download')}</button>
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

doGenerate();

GZ.renderToolPage({
  category: 'calc',

    {icon:'⏰', href:'/dev/timestamp.html', name:'Timestamp Converter'},
    {icon:'🎲', href:'/fun/random-picker.html', name:'Random Picker'},
  ]
});
</script>
