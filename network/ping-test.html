  <div class="gz-tool-header">

<script>
GZI18n.register({
  en: {
    toolTitle: 'Ping Test',
    toolDesc: 'Measure website latency and response time from your browser. Send multiple HTTP pings to check reachability and speed — free, instant, no signup.',

    step2: 'Choose how many pings to send',
    step3: 'Click Start Ping to begin measuring latency',
    step4: 'Review min, max, average latency and packet loss',
  },
  zh: {
    toolTitle: 'Ping 延迟测试',
    toolDesc: '从浏览器测量网站延迟和响应时间。发送多个 HTTP Ping 检测可达性和速度 — 免费、即时、无需注册。',
    btnPing: '开始 Ping',
    seq: '#',
    time: '延迟 (ms)',
    status: '状态',
    reachable: '可达',
    unreachable: '不可达',
    min: '最小',
    max: '最大',
    avg: '平均',
    loss: '丢包率',
    sent: '发送',
    received: '接收',
    enterHost: '请输入主机名或网址。',
    pinging: '正在 Ping',
    noData: '暂无数据。请输入主机并点击「开始 Ping」。',
    step1: '输入主机名（如 google.com 或 github.com）',
    step2: '选择发送的 Ping 次数',
    step3: '点击「开始 Ping」开始测量延迟',
    step4: '查看最小、最大、平均延迟和丢包率',
  }
});

const { $, t } = GZ;
let pinging = false;

async function singlePing(url) {
  const ctrl = new AbortController();
  const timer = setTimeout(() => ctrl.abort(), 8000);
  const cacheBust = url + (url.includes('?') ? '&' : '?') + '_=' + Date.now();
  const start = performance.now();
  try {
    await fetch(cacheBust, { mode: 'no-cors', signal: ctrl.signal, cache: 'no-store' });
    clearTimeout(timer);
    return performance.now() - start;
  } catch (e) {
    clearTimeout(timer);
    if (e.name === 'AbortError') return null;
    return null;
  }
}

function latencyClass(ms) {
  if (ms < 50) return 'pt-good';
  if (ms < 200) return 'pt-ok';
  return 'pt-bad';
}

async function doPing() {
  if (pinging) return;
  let host = $('#host').value.trim();
  if (!host) { $('#output').innerHTML = `<div class="pt-loading">${t('enterHost')}</div>`; return; }
  host = host.replace(/^https?:\/\//, '').replace(/\/.*$/, '');
  const count = parseInt($('#count').value);
  const url = 'https://' + host;

  pinging = true;
  $('#btn-ping').disabled = true;
  $('#stats').innerHTML = '';
  $('#output').innerHTML = `<div class="pt-loading">${t('pinging')} ${host}...</div>`;

  const results = [];
  let html = `<div style="font-weight:600;margin-bottom:8px">${t('pinging')} ${host} × ${count}</div>`;
  html += '<table class="pt-table"><thead><tr><th>' + t('seq') + '</th><th>' + t('time') + '</th><th>' + t('status') + '</th></tr></thead><tbody id="pt-body"></tbody></table>';
  $('#output').innerHTML = html;
  const tbody = $('#pt-body');

  for (let i = 0; i < count; i++) {
    const ms = await singlePing(url);
    results.push(ms);
    const row = document.createElement('tr');
    if (ms !== null) {
      row.innerHTML = `<td>${i + 1}</td><td class="${latencyClass(ms)}">${ms.toFixed(1)}</td><td class="pt-good">✓ ${t('reachable')}</td>`;
    } else {
      row.innerHTML = `<td>${i + 1}</td><td class="pt-bad">—</td><td class="pt-bad">✗ ${t('unreachable')}</td>`;
    }
    tbody.appendChild(row);
  }

  // Compute stats
  const valid = results.filter(r => r !== null);
  const lost = results.length - valid.length;
  if (valid.length > 0) {
    const min = Math.min(...valid);
    const max = Math.max(...valid);
    const avg = valid.reduce((a, b) => a + b, 0) / valid.length;
    const lossPct = ((lost / results.length) * 100).toFixed(0);
    $('#stats').innerHTML = `
      <div class="pt-stats">
        <div class="pt-stat"><div class="num ${latencyClass(min)}">${min.toFixed(0)}</div><div class="lbl">${t('min')} (ms)</div></div>
        <div class="pt-stat"><div class="num ${latencyClass(avg)}">${avg.toFixed(0)}</div><div class="lbl">${t('avg')} (ms)</div></div>
        <div class="pt-stat"><div class="num ${latencyClass(max)}">${max.toFixed(0)}</div><div class="lbl">${t('max')} (ms)</div></div>
        <div class="pt-stat"><div class="num ${lossPct > 0 ? 'pt-bad' : 'pt-good'}">${lossPct}%</div><div class="lbl">${t('loss')}</div></div>
        <div class="pt-stat"><div class="num">${results.length}</div><div class="lbl">${t('sent')}</div></div>
        <div class="pt-stat"><div class="num">${valid.length}</div><div class="lbl">${t('received')}</div></div>
      </div>`;
  }

  pinging = false;
  $('#btn-ping').disabled = false;
}

$('#host').addEventListener('keydown', e => { if (e.key === 'Enter') doPing(); });

GZ.renderToolPage({

</script>
