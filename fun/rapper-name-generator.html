<script>
GZI18n.register({
  en: {
    toolTitle: 'Rapper Name Generator',
    toolDesc: 'Create cool rap stage names — Lil, MC, Young, Big, Yung, Chief and more. Pick a style (Trap, Drill, Old School, Mumble) and get 20 unique hip-hop names every click. Free, private, no signup.',
    sTrap: '🔥 Trap', sDrill: '🔪 Drill', sOldSchool: '🎩 Old School', sMumble: '😴 Mumble', sRandom: '🎲 Random',

    step2: 'Click Generate to spin up 20 unique stage names',
    step3: 'Tap the copy icon on any name to grab it',
    step4: 'Click Copy All to grab the full list at once',
  },
  zh: {
    toolTitle: '说唱艺名生成器',
    toolDesc: '生成酷炫的说唱艺名 — Lil、MC、Young、Big、Yung、Chief 等。选择风格（Trap、Drill、Old School、Mumble），每次点击获得 20 个独特的嘻哈艺名。免费、私密、无需注册。',
    sTrap: '🔥 Trap', sDrill: '🔪 Drill', sOldSchool: '🎩 Old School', sMumble: '😴 Mumble', sRandom: '🎲 随机',
    btnGen: '生成 20 个名字',
    btnCopy: '全部复制',
    copied: '已复制！',
    step1: '选择说唱风格 — Trap、Drill、Old School、Mumble 或随机',
    step2: '点击「生成」获得 20 个独特的艺名',
    step3: '点击任意名字旁的复制按钮即可获取',
    step4: '点击「全部复制」一次性获取整个列表',
  }
});

const { $, t, showToast } = GZ;
const pick = a => a[Math.floor(Math.random() * a.length)];
const cap = s => s.charAt(0).toUpperCase() + s.slice(1);

// Core word banks for rap names
const CORE = ['Wayne','Thug','Sean','Pac','Rocky','Boogie','Baby','Pump','Peep','Skies','Tune','Yachty','Ski','Uzi','Xan','Nas','Pain','Drip','Flex','Hood','Cash','Savage','Gucci','Wop','Tecca','Tariq','Melo','Durk','Baby','Breezy','Draco','Capo','Glock','Don','Killa','Pharaoh','Vamp','Demon','Goat','Wick','Sosa','Herbo','Gates','Glow','Reaper','Thugger','Pluto','Nardo','Shordy','Cito','Rico','Stunna','Tunechi','Ski','Knot','Rari'];
const PRE = ['Lil','Young','Big','Yung','Chief','DJ','Lil','Lil','Yung','Lil'];
const SUFFIX = ['eezy','ock','y','boi','man','ito','Lord','rock','daddy','mo','starr','-Boi','world','Dogg','Whip','Ice','Gang'];
const SINGLE = ['Playboi','Sheck','Wifisfuneral','Liludder','Sniper','Trippie','Juice','Smoke','Pop','Roddy','Polo','NBA','XXXTentacion','Lil','Takeoff','Quavo','Offset','Future','Migos','Cordae','Lucki','Key','Gunn'];

function makeName(style) {
  const r = Math.random();
  if (style === 'trap' || (style === 'random' && r < 0.35)) {
    // Lil/Yung/Young + core
    return pick(PRE) + ' ' + pick(CORE);
  }
  if (style === 'drill' || (style === 'random' && r < 0.55)) {
    // core + suffix or street names
    if (Math.random() < 0.5) return pick(CORE) + pick(SUFFIX).replace('-','');
    return 'Lil ' + pick(CORE);
  }
  if (style === 'oldschool' || (style === 'random' && r < 0.75)) {
    // MC + name, or The Notorious X, Doc X, Snoop-style
    const pats = ['MC ' + pick(CORE), 'The Notorious ' + pick(CORE), 'Doc ' + pick(CORE), 'Snoop ' + pick(CORE), pick(CORE) + ' Daddy', 'Ice ' + pick(CORE), pick(CORE) + ' Dogg'];
    return pick(pats);
  }
  if (style === 'mumble' || style === 'random') {
    // single stylized word or core+eezy
    if (Math.random() < 0.4) return pick(SINGLE);
    return pick(CORE).toLowerCase() + pick(['eezy','ocky','ito','uzzi','ardi']);
  }
  return pick(PRE) + ' ' + pick(CORE);
}

let style = 'trap';
const STYLES = [
  {id:'trap',key:'sTrap'},{id:'drill',key:'sDrill'},{id:'oldschool',key:'sOldSchool'},
  {id:'mumble',key:'sMumble'},{id:'random',key:'sRandom'},
];
$('#style-tabs').innerHTML = STYLES.map(s => `<button data-id="${s.id}" class="${s.id===style?'active':''}">${t(s.key)}</button>`).join('');
document.querySelectorAll('#style-tabs button').forEach(b => {
  b.addEventListener('click', () => {
    document.querySelectorAll('#style-tabs button').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    style = b.dataset.id;
    generate();
  });
});

function generate() {
  const seen = new Set();
  const names = [];
  let safety = 0;
  while (names.length < 20 && safety < 400) {
    let n = makeName(style);
    // tidy
    n = n.replace(/\s+/g,' ').trim();
    if (!seen.has(n)) { seen.add(n); names.push(n); }
    safety++;
  }
  $('#grid').innerHTML = names.map(n => `
    <div class="rn-card">
      <span class="name">${n.replace(/</g,'&lt;')}<span class="tag">${cap(style)}</span></span>
      <button data-name="${n.replace(/"/g,'&quot;')}" title="copy">📋</button>
    </div>`).join('');
  document.querySelectorAll('#grid .rn-card button').forEach(b => {
    b.addEventListener('click', async () => {
      try { await navigator.clipboard.writeText(b.dataset.name.replace(/&quot;/g,'"')); showToast(t('copied')); }
      catch (e) { showToast(t('copied')); }
    });
  });
}

function copyAll() {
  const names = [...document.querySelectorAll('#grid .rn-card .name')].map(e => e.firstChild.textContent.trim());
  if (!names.length) return;
  navigator.clipboard.writeText(names.join('\n')).then(() => showToast(t('copied'))).catch(() => showToast(t('copied')));
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="generate()">🎤 ${t('btnGen')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="copyAll()">📋 ${t('btnCopy')}</button>`;

generate();

    {icon:'🎸', href:'/fun/band-name-generator.html', name:'Band Name Generator'},
  ]
});
</script>
