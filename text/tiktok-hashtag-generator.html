<script>
GZI18n.register({
  en: {
    toolTitle: 'TikTok Hashtag Generator',
    toolDesc: 'Generate trending TikTok hashtags from your keywords or text. Get a mix of broad, niche and viral tags to boost views. Copy with one click — free and private.',
    placeholder: 'Enter your topic, e.g. cooking, fitness, coding, travel...',
    lblCategory: 'Category:',
    example: 'Load Example',
    clear: 'Clear',
    copyAll: 'Copy All Selected',
    reset: 'Reset',
    broad: '🌐 Broad / Viral Tags',
    niche: '🎯 Niche Tags',
    trend: '🔥 Trending Tags',
    keyword: '🔑 From Your Keywords',
    selectHint: 'Click tags to select. Then copy all selected.',
    noKeywords: 'Enter keywords above to generate hashtags.',
  },
  zh: {
    toolTitle: 'TikTok 标签生成器',
    toolDesc: '根据你的关键词或文本生成热门 TikTok 标签。获取广泛、垂直和病毒式标签的组合，提升播放量。一键复制 — 免费且私密。',
    placeholder: '输入你的主题，如烹饪、健身、编程、旅行...',
    lblCategory: '分类：',
    example: '加载示例',
    clear: '清空',
    copyAll: '复制所有已选',
    reset: '重置',
    broad: '🌐 广泛 / 病毒式标签',
    niche: '🎯 垂直标签',
    trend: '🔥 热门标签',
    keyword: '🔑 关键词标签',
    selectHint: '点击标签进行选择，然后复制所有已选标签。',
    noKeywords: '在上方输入关键词以生成标签。',
  }
});

const { $, copyText, t } = GZ;

const CATEGORIES = {
  general: { en:'General', zh:'通用' },
  food: { en:'Food & Cooking', zh:'美食烹饪' },
  fitness: { en:'Fitness & Health', zh:'健身健康' },
  beauty: { en:'Beauty & Fashion', zh:'美妆时尚' },
  comedy: { en:'Comedy & Entertainment', zh:'搞笑娱乐' },
  tech: { en:'Tech & Coding', zh:'科技编程' },
  travel: { en:'Travel', zh:'旅行' },
  music: { en:'Music', zh:'音乐' },
  gaming: { en:'Gaming', zh:'游戏' },
  education: { en:'Education & How-To', zh:'教育教程' },
  business: { en:'Business & Finance', zh:'商业财经' },
  art: { en:'Art & DIY', zh:'艺术手工' },
};

const BROAD = ['#fyp','#foryou','#foryoupage','#viral','#tiktok','#trending','#explore','#new'];
const NICHE = {
  general: ['#content','#creator','#video','#daily','#lifestyle','#motivation','#inspiration'],
  food: ['#foodtiktok','#recipe','#cooking','#foodie','#easyrecipe','#mealprep','#homecooking','#foodlover'],
  fitness: ['#fitness','#workout','#gym','#fitnesstiktok','#homeworkout','#weightloss','#health','#yoga'],
  beauty: ['#makeuptiktok','#skincare','#beauty','#makeup','#skincareroutine','#glowup','#hairstyle'],
  comedy: ['#funny','#comedy','#humor','#lol','#meme','#skit','#relatable'],
  tech: ['#techtiktok','#coding','#programming','#tech','#developer','#webdev','#ai','#programming'],
  travel: ['#travel','#traveltiktok','#wanderlust','#travelgram','#adventure','#explore','#vacation'],
  music: ['#musictok','#music','#singing','#cover','#newmusic','#producer','#songwriter'],
  gaming: ['#gaming','#gamingtiktok','#gamer','#gameplay','#streamer','#twitch'],
  education: ['#learning','#education','#howto','#tutorial','#tips','#didyouknow','#learnontiktok'],
  business: ['#businesstok','#entrepreneur','#sidehustle','#money','#investing','#finance','#smallbusiness'],
  art: ['#art','#arttiktok','#drawing','#diy','#crafts','#creative','#artist'],
};
const TREND = ['#pov','#storytime','#dayinmylife','#getreadywithme','#grwm','#behindthescenes','#tutorial','#transformations','#challenge','#duet','#stitch'];

let selected = new Set();

function slugify(s){
  return s.toLowerCase().replace(/[^a-z0-9\u4e00-\u9fff]+/g,'').trim();
}

function generate(){
  const kw = $('#keywords').value.trim();
  const cat = $('#category').value;
  const result = $('#result');
  const actionBar = $('#actionBar');
  if (!kw){
    result.innerHTML = `<div style="opacity:.6;text-align:center;padding:30px">${t('noKeywords')}</div>`;
    actionBar.style.display = 'none';
    selected.clear();
    return;
  }
  actionBar.style.display = 'flex';
  // Build keyword-based tags
  const words = kw.split(/[,，\s]+/).filter(Boolean).map(slugify).filter(Boolean);
  const kwTags = [];
  words.forEach(w => {
    kwTags.push('#'+w);
    kwTags.push('#'+w+'tiktok');
    kwTags.push('#'+w+'life');
    kwTags.push('#'+w+'lover');
  });
  const nicheTags = NICHE[cat] || NICHE.general;
  const sections = [
    { title: t('keyword'), tags: [...new Set(kwTags)].slice(0,12) },
    { title: t('broad'), tags: BROAD },
    { title: t('niche'), tags: nicheTags },
    { title: t('trend'), tags: TREND.slice(0,8) },
  ];
  result.innerHTML = `<div style="font-size:.8em;color:var(--text2);margin-bottom:8px">${t('selectHint')}</div><div class="tt-sections">${
    sections.map(s => `<div class="tt-section"><h3>${s.title}</h3><div class="tt-tags">${s.tags.map(tag=>`<span class="tt-tag" data-tag="${escapeAttr(tag)}" onclick="toggleTag(this)">${escapeHtml(tag)}</span>`).join('')}</div></div>`).join('')
  }</div>`;
}

function escapeHtml(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function escapeAttr(s){return escapeHtml(s);}

function toggleTag(el){
  const tag = el.dataset.tag;
  if (selected.has(tag)){ selected.delete(tag); el.classList.remove('selected'); }
  else { selected.add(tag); el.classList.add('selected'); }
}

function copyAll(){
  if (!selected.size) return;
  copyText([...selected].join(' '));
}

function reset(){
  selected.clear();
  document.querySelectorAll('.tt-tag.selected').forEach(el=>el.classList.remove('selected'));
}

function loadExample(){
  $('#keywords').value = 'easy pasta recipe';
  $('#category').value = 'food';
  generate();
}

function clearAll(){
  $('#keywords').value=''; selected.clear(); generate();
}

// Build category dropdown
$('#category').innerHTML = Object.entries(CATEGORIES).map(([k,v])=>`<option value="${k}">${v.en}</option>`).join('');

$('#keywords').addEventListener('input',generate);
$('#category').addEventListener('change',generate);
$('#copyAll').addEventListener('click',copyAll);
$('#reset').addEventListener('click',reset);

$('#keywords').placeholder = t('placeholder');
$('#lblCategory').textContent = t('lblCategory');
$('#copyAll').textContent = t('copyAll');
$('#reset').textContent = t('reset');

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="clearAll()">${t('clear')}</button>`;

generate();

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'💬', href:'/social/instagram-hashtag-generator.html', name:'Instagram Hashtags'},
    {icon:'🐦', href:'/social/twitter-character-counter.html', name:'Twitter Counter'},
    {icon:'📝', href:'/text/instagram-caption-generator.html', name:'Instagram Captions'},
    {icon:'📺', href:'/text/youtube-tag-generator.html', name:'YouTube Tags'},
  ]
});
</script>

</body>
