<script>
GZI18n.register({
  en: {
    toolTitle: 'Roman Numeral Converter',
    toolDesc: 'Convert Arabic numbers to Roman numerals and Roman numerals back to numbers. Supports 1-3999 with standard subtractive notation.',
    step1: 'Enter a number (1-3999) on the left, see the Roman numeral on the right',
    step2: 'Or enter a Roman numeral on the right, see the number on the left',
    step3: 'Both directions update instantly as you type',
    step4: 'Check the reference table below for common Roman numerals',
    arabicLabel: 'Arabic Number', romanLabel: 'Roman Numeral',
  },
  zh: {
    toolTitle: '罗马数字转换器',
    toolDesc: '阿拉伯数字与罗马数字互转。支持 1-3999 范围内的标准减法记数法。',
    step1: '在左侧输入数字(1-3999)，右侧显示对应的罗马数字',
    step2: '或在右侧输入罗马数字，左侧显示对应的数字',
    step3: '双向实时更新，随输入即时显示',
    step4: '查看下方参考表了解常见罗马数字',
    arabicLabel: '阿拉伯数字', romanLabel: '罗马数字',
  }
});

const { $, copyText, t } = GZ;

const ROMAN_MAP = [
  { v: 1000, s: 'M' }, { v: 900, s: 'CM' }, { v: 500, s: 'D' }, { v: 400, s: 'CD' },
  { v: 100, s: 'C' }, { v: 90, s: 'XC' }, { v: 50, s: 'L' }, { v: 40, s: 'XL' },
  { v: 10, s: 'X' }, { v: 9, s: 'IX' }, { v: 5, s: 'V' }, { v: 4, s: 'IV' }, { v: 1, s: 'I' }
];

function toRoman(num) {
  if (num < 1 || num > 3999 || !Number.isInteger(num)) return null;
  let result = '';
  for (const { v, s } of ROMAN_MAP) {
    while (num >= v) { result += s; num -= v; }
  }
  return result;
}

function fromRoman(s) {
  if (!s || !/^[IVXLCDM]+$/i.test(s)) return null;
  s = s.toUpperCase();
  const values = { I: 1, V: 5, X: 10, L: 50, C: 100, D: 500, M: 1000 };
  let total = 0, prev = 0;
  for (let i = s.length - 1; i >= 0; i--) {
    const cur = values[s[i]];
    if (cur < prev) total -= cur; else total += cur;
    prev = cur;
  }
  // Validate: try re-encoding and check it matches (catches invalid forms)
  if (total < 1 || total > 3999) return null;
  if (toRoman(total) !== s) return null;
  return total;
}

function onNumInput() {
  const v = $('#numInput').value.trim();
  const err = $('#numError');
  const res = $('#romResult');
  err.textContent = '';
  if (!v) { res.textContent = ''; return; }
  const n = parseInt(v, 10);
  if (isNaN(n) || n < 1 || n > 3999) { err.textContent = 'Enter an integer between 1 and 3999'; res.textContent = ''; return; }
  const r = toRoman(n);
  res.textContent = r;
  $('#romInput').value = r;
}

function onRomInput() {
  const v = $('#romInput').value.trim().toUpperCase();
  const err = $('#romError');
  const res = $('#numResult');
  err.textContent = '';
  if (!v) { res.textContent = ''; return; }
  const n = fromRoman(v);
  if (n === null) { err.textContent = 'Invalid Roman numeral'; res.textContent = ''; return; }
  res.textContent = n;
  $('#numInput').value = n;
}

$('#numInput').addEventListener('input', onNumInput);
$('#romInput').addEventListener('input', onRomInput);

$('#toolbar').innerHTML = `
  <button class="gz-btn gz-btn-secondary" onclick="$('#numInput').value=2024;onNumInput()">2024 → MMXXIV</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#numInput').value=1994;onNumInput()">1994 → MCMXCIV</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#numInput').value=1984;onNumInput()">1984 → MCMLXXXIV</button>
  <button class="gz-btn" onclick="copyText($('#romResult').textContent)">${t('copy')}</button>`;

});
