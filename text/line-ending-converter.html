<script>
GZI18n.register({
  en: {
    toolTitle: 'Line Ending Converter (CRLF ↔ LF)',
    toolDesc: 'Convert line endings between Windows (CRLF), Unix/Linux/macOS (LF) and old Mac (CR). Detect mixed line breaks and normalize instantly — 100% in your browser.',
    target: 'Target line ending',
    step1: 'Paste text, code or a file into the input area',
    step2: 'Check the detected source line endings (CRLF, LF, CR or mixed)',
    step3: 'Pick the target line ending — LF for Unix/macOS, CRLF for Windows',
    step4: 'Click Convert and copy the normalized result',
  },
  zh: {
    toolTitle: '换行符转换器 (CRLF ↔ LF)',
    toolDesc: '在 Windows (CRLF)、Unix/Linux/macOS (LF) 和老式 Mac (CR) 换行符之间转换。检测混合换行并即时规范化 — 100% 浏览器本地运行。',
    target: '目标换行符',
    step1: '将文本、代码或文件粘贴到输入区',
    step2: '查看检测到的源换行符（CRLF、LF、CR 或混合）',
    step3: '选择目标换行符 — LF 适用于 Unix/macOS，CRLF 适用于 Windows',
    step4: '点击「转换」并复制规范化后的结果',
  }
});

const { $, copyText, t } = GZ;

function detect(text){
  let crlf = 0, lf = 0, cr = 0;
  for(let i = 0; i < text.length; i++){
    if(text[i] === '\r'){
      if(text[i+1] === '\n'){ crlf++; i++; }
      else cr++;
    } else if(text[i] === '\n'){ lf++; }
  }
  return { crlf, lf, cr };
}

function updateDetected(){
  const text = $('#input').value;
  const d = detect(text);
  const total = d.crlf + d.lf + d.cr;
  const lang = GZI18n.getLang();
  if(total === 0){
    $('#detected').innerHTML = lang === 'zh'
      ? '<b>检测：</b> 无换行符'
      : '<b>Detected:</b> no line breaks';
    return;
  }
  const types = [];
  if(d.crlf) types.push(`CRLF (\\r\\n) × ${d.crlf}`);
  if(d.lf) types.push(`LF (\\n) × ${d.lf}`);
  if(d.cr) types.push(`CR (\\r) × ${d.cr}`);
  const mixed = types.length > 1 ? (lang === 'zh' ? ' <span style="color:var(--gz-accent)">⚠ 混合换行</span>' : ' <span style="color:var(--gz-accent)">⚠ mixed</span>') : '';
  $('#detected').innerHTML = (lang === 'zh' ? '<b>检测：</b> ' : '<b>Detected:</b> ') + types.join(' · ') + mixed;
}

function convert(){
  const text = $('#input').value;
  if(!text){ $('#output').textContent = ''; $('#status').textContent = ''; return; }
  const target = $('#target').value;
  // Normalize everything to LF first
  const normalized = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n');
  let out;
  if(target === 'crlf') out = normalized.replace(/\n/g, '\r\n');
  else if(target === 'cr') out = normalized.replace(/\n/g, '\r');
  else out = normalized; // lf
  $('#output').textContent = out;
  const after = detect(out);
  const label = target === 'crlf' ? 'CRLF (\\r\\n)' : target === 'cr' ? 'CR (\\r)' : 'LF (\\n)';
  const count = target === 'crlf' ? after.crlf : target === 'cr' ? after.cr : after.lf;
  $('#status').textContent = `✓ ${count} line break(s) → ${label}`;
}

function loadExample(){
  $('#input').value = 'Line one\r\nLine two\r\nLine three with CRLF\r\nLine four LF only\nLast line';
  updateDetected();
  convert();
}

function doClear(){ $('#input').value=''; $('#output').textContent=''; $('#status').textContent=''; updateDetected(); }

$('#toolbar').innerHTML = `
  <label style="display:inline-flex;align-items:center;gap:6px;font-size:.85em;color:var(--text2)">${t('target')}
    <select class="gz-select" id="target">
      <option value="lf">LF — Unix / Linux / macOS (\\n)</option>
      <option value="crlf">CRLF — Windows (\\r\\n)</option>
      <option value="cr">CR — Old Mac (\\r)</option>
    </select>
  </label>
  <button class="gz-btn" onclick="convert()">Convert</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">Example</button>
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>
`;

$('#input').addEventListener('input', () => { updateDetected(); convert(); });
$('#target')?.addEventListener('change', convert);

updateDetected();

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'↩️', href:'/text/remove-line-breaks.html', name:'Remove Line Breaks'},
    {icon:'↔️', href:'/text/tabs-to-spaces.html', name:'Tabs to Spaces'},
    {icon:'🧹', href:'/text/whitespace-remover.html', name:'Whitespace Remover'},
    {icon:'⬜', href:'/text/remove-empty-lines.html', name:'Remove Empty Lines'},
  ]
});
</script>
