<script>
GZI18n.register({
  en: {
    toolTitle: 'Random Port Number Generator',
    toolDesc: 'Generate random TCP/UDP port numbers for development, testing and debugging. Pick a range (well-known, registered, dynamic or custom), exclude ports you already use, and copy or export the result instantly.',
    lblPreset: 'Range',
    lblQty: 'Quantity',
    lblMin: 'Min port',
    lblMax: 'Max port',
    lblExclude: 'Exclude (comma-separated)',
    lblFmt: 'Output format',
    generate: '🎲 Generate',
    clear: 'Clear',
    copyAll: 'Copy all',
    download: 'Download',
    step1: 'Pick a port range (well-known, registered, dynamic or custom min/max)',
    step2: 'Optionally exclude specific ports you already use (comma-separated)',
    step3: 'Click Generate — ports are picked with crypto.getRandomValues',
    step4: 'Copy or download as plain text, CSV, JSON or SQL',
  },
  zh: {
    toolTitle: '随机端口号生成器',
    toolDesc: '为开发、测试和调试生成随机 TCP/UDP 端口号。选择范围（知名端口、注册端口、动态端口或自定义），排除已使用的端口，一键复制或导出。',
    lblPreset: '端口范围',
    lblQty: '生成数量',
    lblMin: '最小端口',
    lblMax: '最大端口',
    lblExclude: '排除（逗号分隔）',
    lblFmt: '输出格式',
    generate: '🎲 生成',
    clear: '清空',
    copyAll: '复制全部',
    download: '下载',
    step1: '选择端口范围（知名、注册、动态或自定义 min/max）',
    step2: '可选择排除已使用的端口（逗号分隔）',
    step3: '点击生成 — 端口使用 crypto.getRandomValues 本地生成',
    step4: '复制或下载为纯文本、CSV、JSON 或 SQL',
  }
});

const { $, copyText, t } = GZ;

const PRESETS = {
  dev: [1024, 9999],
  registered: [1024, 49151],
  dynamic: [49152, 65535],
  wellknown: [0, 1023],
  all: [0, 65535],
};

function rnd(max) {
  const arr = new Uint32Array(1);
  crypto.getRandomValues(arr);
  return arr[0] % max;
}

function doGenerate() {
  const preset = $('#preset').value;
  let min, max;
  if (preset === 'custom') {
    min = Math.max(0, Math.min(65535, parseInt($('#minPort').value, 10) || 0));
    max = Math.max(0, Math.min(65535, parseInt($('#maxPort').value, 10) || 65535));
  } else {
    [min, max] = PRESETS[preset];
  }
  if (min > max) [min, max] = [max, min];

  const qty = Math.max(1, Math.min(1000, parseInt($('#qty').value, 10) || 1));
  const excl = new Set(($('#exclude').value || '')
    .split(/[,\s]+/).map(s => s.trim()).filter(s => /^\d+$/.test(s)).map(Number));
  const range = max - min + 1;
  const arr = [];
  for (let i = 0; i < qty; i++) {
    let attempts = 0, port;
    do {
      port = min + rnd(range);
      attempts++;
    } while (excl.has(port) && attempts < 200);
    if (!excl.has(port)) arr.push(port);
  }

  const format = $('#format').value;
  let text;
  if (format === 'json') text = JSON.stringify(arr, null, 2);
  else if (format === 'csv') text = 'port\n' + arr.join('\n');
  else if (format === 'sql') text = arr.map(s => `(${s})`).join(',\n');
  else if (format === 'space') text = arr.join(' ');
  else text = arr.join('\n');

  $('#output').textContent = text;

  // Info panel
  const totalRange = range - excl.size;
  const unique = new Set(arr).size;
  $('#info').style.display = '';
  $('#info').innerHTML =
    `<div class="row"><span class="key">Range</span><span class="val">${min}–${max}</span></div>` +
    `<div class="row"><span class="key">Available (after exclusions)</span><span class="val">${totalRange.toLocaleString()}</span></div>` +
    `<div class="row"><span class="key">Generated</span><span class="val">${arr.length}</span></div>` +
    `<div class="row"><span class="key">Unique</span><span class="val">${unique}</span></div>` +
    `<div class="row"><span class="key">Excluded ports</span><span class="val">${excl.size}</span></div>`;

  $('#copyBtn').style.display = $('#downloadBtn').style.display = '';
}

function doClear() {
  $('#output').textContent = '';
  $('#info').style.display = 'none';
  $('#copyBtn').style.display = $('#downloadBtn').style.display = 'none';
}

function doCopy() { copyText($('#output').textContent); }
function doDownload() {
  const text = $('#output').textContent;
  const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `random-ports-${Date.now()}.txt`;
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 1000);
}

$('#preset').addEventListener('change', () => {
  const v = $('#preset').value;
  const isCustom = (v === 'custom');
  $('#minPort').disabled = !isCustom;
  $('#maxPort').disabled = !isCustom;
});

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="doGenerate()">${t('generate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;
$('#copyBtn').onclick = doCopy;
$('#downloadBtn').onclick = doDownload;
$('#preset').dispatchEvent(new Event('change'));

GZ.renderToolPage({
  category: 'dev',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🌐', href:'/dev/ipv4-subnet-calculator.html', name:'IPv4 Subnet Calculator'},
    {icon:'🧮', href:'/dev/cidr-calculator.html', name:'CIDR Calculator'},
    {icon:'🔌', href:'/dev/random-mac-address.html', name:'Random MAC'},
    {icon:'🔢', href:'/network/port-numbers.html', name:'Port Numbers'},
  ]
});
</script>
