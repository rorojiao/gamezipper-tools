<script>
GZI18n.register({
  en: {
    toolTitle: 'Color Contrast Matrix',
    toolDesc: 'Generate a WCAG contrast matrix grid. Test all color pair combinations from your palette at once — instantly see AA/AAA pass-fail ratios for accessible design systems.',

  },
  zh: {
    toolTitle: '颜色对比度矩阵',
    toolDesc: '生成 WCAG 对比度矩阵网格。一次性测试调色板中所有颜色组合 — 即时查看 AA/AAA 合格/不合格比率，用于无障碍设计系统。',
    addColor: '+ 添加颜色',
    reset: '重置',
    sample: '示例调色板',
    step1: '使用颜色选择器添加调色板颜色',
    step2: '矩阵显示每种颜色组合的对比度比率',
    step3: '绿色徽章 = 通过 WCAG，红色 = 不合格',
    step4: '文本无障碍使用 AA（4.5:1）或 AAA（7:1）标准',
    aa: 'AA',
    aaa: 'AAA',
    fail: '不合格',
    largeText: '大文本可用',
    normalText: '普通文本可用',
    none: '无对比度',
    bg: '背景色 →',
    fg: '↓ 前景色',
  }
});

const { $, t } = GZ;

let colors = ['#000000', '#FFFFFF', '#007BFF', '#28A745', '#DC3545', '#FFC107'];

function hexToRgb(hex) {
  hex = hex.replace('#', '');
  return {
    r: parseInt(hex.slice(0, 2), 16),
    g: parseInt(hex.slice(2, 4), 16),
    b: parseInt(hex.slice(4, 6), 16)
  };
}

function relativeLuminance({ r, g, b }) {
  const srgb = [r, g, b].map(v => {
    v /= 255;
    return v <= 0.03928 ? v / 12.92 : Math.pow((v + 0.055) / 1.055, 2.4);
  });
  return 0.2126 * srgb[0] + 0.7152 * srgb[1] + 0.0722 * srgb[2];
}

function contrastRatio(hex1, hex2) {
  const l1 = relativeLuminance(hexToRgb(hex1));
  const l2 = relativeLuminance(hexToRgb(hex2));
  const [lighter, darker] = l1 > l2 ? [l1, l2] : [l2, l1];
  return (lighter + 0.05) / (darker + 0.05);
}

function renderPaletteInput() {
  const wrap = $('#paletteInput');
  wrap.innerHTML = '';
  colors.forEach((c, i) => {
    const chip = document.createElement('div');
    chip.className = 'color-chip';
    chip.innerHTML = `
      <input type="color" value="${c}" data-idx="${i}" class="chip-color">
      <input type="text" value="${c.toUpperCase()}" data-idx="${i}" class="chip-hex">
      ${colors.length > 2 ? `<span class="chip-remove" data-idx="${i}">✕</span>` : ''}`;
    wrap.appendChild(chip);
  });
  const addBtn = document.createElement('button');
  addBtn.className = 'gz-btn gz-btn-secondary';
  addBtn.style.fontSize = '.8em';
  addBtn.textContent = t('addColor');
  addBtn.onclick = () => { colors.push('#888888'); renderPaletteInput(); renderMatrix(); };
  wrap.appendChild(addBtn);
}

function renderMatrix() {
  const n = colors.length;
  const tbl = $('#matrix');
  let html = '<thead><tr><th></th>';
  // Column headers (background colors)
  colors.forEach((bg, j) => {
    html += `<th><span class="swatch" style="background:${bg}"></span>${bg.toUpperCase()}</th>`;
  });
  html += '</tr></thead><tbody>';
  // Rows (foreground colors)
  colors.forEach((fg, i) => {
    html += `<tr><td class="col-label"><span class="swatch" style="background:${fg}"></span>${fg.toUpperCase()}</td>`;
    colors.forEach((bg, j) => {
      if (i === j) {
        html += '<td style="opacity:.2"><div class="cell">—</div></td>';
      } else {
        const ratio = contrastRatio(fg, bg);
        const passesAA = ratio >= 4.5;
        const passesAAA = ratio >= 7;
        const passesLarge = ratio >= 3;
        let badge = '';
        if (passesAAA) badge = `<span class="badge badge-pass">AAA</span>`;
        else if (passesAA) badge = `<span class="badge badge-pass">AA</span>`;
        else if (passesLarge) badge = `<span class="badge badge-pass">3:1</span>`;
        else badge = `<span class="badge badge-fail">${t('fail')}</span>`;
        const ratioStr = ratio.toFixed(2) + ':1';
        html += `<td style="background:${bg}"><div class="cell" style="color:${fg}">
          <div class="cell-preview">Aa Bb 文字</div>
          ${badge}
          <div class="ratio">${ratioStr}</div>
        </div></td>`;
      }
    });
    html += '</tr>';
  });
  html += '</tbody>';
  tbl.innerHTML = html;

  $('#legend').innerHTML = `
    <div class="legend-item"><span class="badge badge-pass">AAA</span> ≥ 7:1</div>
    <div class="legend-item"><span class="badge badge-pass">AA</span> ≥ 4.5:1</div>
    <div class="legend-item"><span class="badge badge-pass">3:1</span> ${t('largeText')}</div>
    <div class="legend-item"><span class="badge badge-fail">${t('fail')}</span> < 3:1</div>`;
}

// Event delegation
document.addEventListener('input', (e) => {
  if (e.target.classList.contains('chip-color')) {
    const idx = +e.target.dataset.idx;
    colors[idx] = e.target.value;
    const hexInput = e.target.parentElement.querySelector('.chip-hex');
    if (hexInput) hexInput.value = e.target.value.toUpperCase();
    renderMatrix();
  }
  if (e.target.classList.contains('chip-hex')) {
    let v = e.target.value.trim();
    if (!v.startsWith('#')) v = '#' + v;
    if (/^#[0-9A-Fa-f]{6}$/.test(v)) {
      const idx = +e.target.dataset.idx;
      colors[idx] = v;
      const colorInput = e.target.parentElement.querySelector('.chip-color');
      if (colorInput) colorInput.value = v;
      renderMatrix();
    }
  }
});

document.addEventListener('click', (e) => {
  if (e.target.classList.contains('chip-remove')) {
    const idx = +e.target.dataset.idx;
    if (colors.length > 2) {
      colors.splice(idx, 1);
      renderPaletteInput();
      renderMatrix();
    }
  }
});

$('#toolbar').innerHTML = `
  <button class="gz-btn gz-btn-secondary" onclick="loadSample()">${t('sample')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="resetPalette()">${t('reset')}</button>`;

function loadSample() {
  colors = ['#0D1117', '#F0F6FC', '#58A6FF', '#3FB950', '#F85149', '#D29922', '#BC8CFF', '#FF7B72'];
  renderPaletteInput();
  renderMatrix();
}

function resetPalette() {
  colors = ['#000000', '#FFFFFF', '#007BFF', '#28A745', '#DC3545', '#FFC107'];
  renderPaletteInput();
  renderMatrix();
}

GZ.renderToolPage({
  category: 'color',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'✅', href:'/color/wcag-contrast.html', name:'WCAG Contrast'},
    {icon:'🎨', href:'/color/color-wheel.html', name:'Color Wheel'},
    {icon:'👁️', href:'/color/blindness.html', name:'Color Blindness'},
    {icon:'🌈', href:'/color/palette.html', name:'Color Palette'},
  ]
});

renderPaletteInput();
renderMatrix();
</script>
