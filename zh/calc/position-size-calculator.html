<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is position sizing?", "acceptedAnswer": {"@type": "Answer", "text": "Position sizing decides how many units, shares or lots to buy or sell so that if your stop-loss is hit you lose only a planned percentage of your account — typically 1% to 2%. It is the single most important risk-management rule for traders."}}, {"@type": "Question", "name": "How is position size calculated?", "acceptedAnswer": {"@type": "Answer", "text": "Formula: Position Size = (Account Balance × Risk %) ÷ (Stop-Loss Distance × Per-Unit Value). For a $10,000 account risking 1% with a 50-pip stop on EUR/USD ($10/pip per standard lot), position size = ($100) ÷ (50 × $10) = 0.2 lots."}}, {"@type": "Question", "name": "What is a standard lot in forex?", "acceptedAnswer": {"@type": "Answer", "text": "A standard lot is 100,000 units of the base currency. A mini lot is 10,000 units and a micro lot is 1,000 units. Pip value per standard lot on most USD-quote pairs is roughly $10."}}, {"@type": "Question", "name": "Is this financial advice?", "acceptedAnswer": {"@type": "Answer", "text": "No. This calculator provides mathematical risk sizing only. It is not investment advice. Always do your own research and consult a licensed advisor before trading."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="ps-tabs">
      <div class="ps-tab active" data-mode="forex" id="tab-forex">💱 Forex</div>
      <div class="ps-tab" data-mode="stock" id="tab-stock">📈 Stocks</div>
      <div class="ps-tab" data-mode="crypto" id="tab-crypto">🪙 Crypto</div>
    </div>
    <div class="ps-grid">
      <div class="ps-card">
        <div class="ps-field">
          <label id="lbl-balance"></label>
          <input type="number" id="balance" value="10000" min="0" step="any">
        </div>
        <div class="ps-field">
          <label id="lbl-risk"></label>
          <div class="ps-preset">
            <button onclick="setRisk(0.5)">0.5%</button>
            <button onclick="setRisk(1)">1%</button>
            <button onclick="setRisk(2)">2%</button>
            <button onclick="setRisk(3)">3%</button>
          </div>
          <input type="number" id="risk" value="1" min="0" step="any">
        </div>
        <div class="ps-field" id="fld-entry">
          <label id="lbl-entry"></label>
          <input type="number" id="entry" value="1.1000" min="0" step="any">
        </div>
        <div class="ps-field">
          <label id="lbl-stop"></label>
          <input type="number" id="stop" value="1.0950" min="0" step="any">
        </div>
        <div class="ps-field" id="fld-pipvalue">
          <label id="lbl-pipvalue"></label>
          <input type="number" id="pipvalue" value="10" min="0" step="any">
        </div>
        <div class="ps-field" id="fld-contract">
          <label id="lbl-contract"></label>
          <input type="number" id="contract" value="100000" min="1" step="any">
        </div>
        <div class="ps-err" id="err"></div>
      </div>
      <div class="ps-card">
        <div class="ps-hero">
          <div class="lbl" id="lbl-position"></div>
          <div class="val" id="pos-size">0</div>
          <div class="unit" id="pos-unit"></div>
        </div>
        <div class="ps-row"><span class="lbl" id="lbl-risk-amt"></span><span class="val" id="r-risk">$0</span></div>
        <div class="ps-row"><span class="lbl" id="lbl-stop-dist"></span><span class="val" id="r-stopdist">0</span></div>
        <div class="ps-row"><span class="lbl" id="lbl-units"></span><span class="val" id="r-units">0</span></div>
        <div class="ps-row"><span class="lbl" id="lbl-lots"></span><span class="val" id="r-lots">0</span></div>
        <div class="ps-row"><span class="lbl" id="lbl-notional"></span><span class="val" id="r-notional">$0</span></div>
      </div>
    </div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>

</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Position Size Calculator',
    toolDesc: 'Calculate the right trade size for forex, stocks, crypto and CFDs. Enter account balance, risk percent, entry and stop-loss to instantly see lot size, units, dollar risk and notional value. Free, private, browser-based.',
    tabForex: 'Forex',
    tabStock: 'Stocks',
    tabCrypto: 'Crypto',
    lblBalance: 'Account balance ($)',
    lblRisk: 'Risk per trade (%)',
    lblEntry: 'Entry price',
    lblStop: 'Stop-loss price',
    lblPipvalue: 'Pip value per standard lot ($)',
    lblContract: 'Contract / lot size (units)',
    lblPosition: 'Position size',
    lblRiskAmt: 'Amount at risk',
    lblStopDist: 'Stop-loss distance',
    lblUnits: 'Position units',
    lblLots: 'Position in lots',
    lblNotional: 'Notional value',
    unitUnits: 'units',
    unitLots: 'standard lots',
    unitShares: 'shares',
    pip: 'pips',
    step1: 'Pick your market (forex, stocks or crypto)',
    step2: 'Enter your account balance and the % you are willing to risk',
    step3: 'Enter your entry price and stop-loss price',
    step4: 'Read the suggested position size — never exceed your risk amount',
    errEntry: 'Entry and stop-loss must be different and positive.',
    errNeg: 'Please enter non-negative values.',
  },
  zh: {
    toolTitle: '仓位计算器（外汇 / 股票 / 加密货币）',
    toolDesc: '为外汇、股票、加密货币和差价合约交易计算正确的仓位大小。输入账户余额、风险百分比、入场价和止损价，即时查看手数、单位数、风险金额和名义价值。免费、私密、浏览器本地运行。',
    tabForex: '外汇',
    tabStock: '股票',
    tabCrypto: '加密货币',
    lblBalance: '账户余额（$）',
    lblRisk: '单笔风险（%）',
    lblEntry: '入场价',
    lblStop: '止损价',
    lblPipvalue: '每标准手点值（$）',
    lblContract: '合约/手数（单位）',
    lblPosition: '仓位大小',
    lblRiskAmt: '风险金额',
    lblStopDist: '止损距离',
    lblUnits: '仓位单位',
    lblLots: '仓位手数',
    lblNotional: '名义价值',
    unitUnits: '单位',
    unitLots: '标准手',
    unitShares: '股',
    pip: '点',
    step1: '选择交易市场（外汇、股票或加密货币）',
    step2: '输入账户余额和愿意承担的风险百分比',
    step3: '输入入场价和止损价',
    step4: '查看建议仓位 — 切勿超出风险金额',
    errEntry: '入场价和止损价必须为正且不相等。',
    errNeg: '请输入非负值。',
  }
});

const { $, t } = GZ;

function money(n) {
  if (!isFinite(n)) n = 0;
  return '$' + n.toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2});
}
function num(n, dec) {
  if (!isFinite(n)) n = 0;
  return n.toLocaleString(undefined, {minimumFractionDigits:dec||0, maximumFractionDigits:dec||0});
}

let mode = 'forex';

// Bind labels
$('#tab-forex').textContent = t('tabForex');
$('#tab-stock').textContent = t('tabStock');
$('#tab-crypto').textContent = t('tabCrypto');
$('#lbl-balance').textContent = t('lblBalance');
$('#lbl-risk').textContent = t('lblRisk');
$('#lbl-entry').textContent = t('lblEntry');
$('#lbl-stop').textContent = t('lblStop');
$('#lbl-pipvalue').textContent = t('lblPipvalue');
$('#lbl-contract').textContent = t('lblContract');
$('#lbl-position').textContent = t('lblPosition');
$('#lbl-risk-amt').textContent = t('lblRiskAmt');
$('#lbl-stop-dist').textContent = t('lblStopDist');
$('#lbl-units').textContent = t('lblUnits');
$('#lbl-lots').textContent = t('lblLots');
$('#lbl-notional').textContent = t('lblNotional');

document.querySelectorAll('.ps-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.ps-tab').forEach(x => x.classList.remove('active'));
    tab.classList.add('active');
    mode = tab.dataset.mode;
    applyModeDefaults();
    updateFields();
  });
});

function applyModeDefaults() {
  if (mode === 'forex') {
    $('#entry').value = '1.1000';
    $('#stop').value = '1.0950';
    $('#pipvalue').value = '10';
    $('#contract').value = '100000';
  } else if (mode === 'stock') {
    $('#entry').value = '150';
    $('#stop').value = '145';
    $('#pipvalue').value = '1';
    $('#contract').value = '1';
  } else {
    $('#entry').value = '60000';
    $('#stop').value = '58000';
    $('#pipvalue').value = '1';
    $('#contract').value = '1';
  }
}

function updateFields() {
  // Forex uses pip value + contract size; stocks/crypto use entry/stop price + contract=1
  const showPip = mode === 'forex';
  $('#fld-pipvalue').style.display = showPip ? '' : 'none';
  $('#fld-contract').style.display = showPip ? '' : 'none';
  calculate();
}

window.setRisk = function(pct) {
  $('#risk').value = pct;
  calculate();
};

function calculate() {
  $('#err').textContent = '';
  const balance = parseFloat($('#balance').value) || 0;
  const riskPct = parseFloat($('#risk').value) || 0;
  const entry = parseFloat($('#entry').value) || 0;
  const stop = parseFloat($('#stop').value) || 0;

  if (balance < 0 || riskPct < 0 || entry < 0 || stop < 0) {
    $('#err').textContent = t('errNeg');
    return;
  }
  if (entry <= 0 || stop <= 0 || entry === stop) {
    $('#err').textContent = t('errEntry');
    return;
  }

  const riskAmt = balance * riskPct / 100;
  const stopDist = Math.abs(entry - stop);

  let units, lots, notional, stopDistLabel;

  if (mode === 'forex') {
    const pipValue = parseFloat($('#pipvalue').value) || 0;
    const contractSize = parseFloat($('#contract').value) || 100000;
    // Determine pip size: for JPY pairs pip=0.01, others 0.0001
    const pipSize = entry > 50 ? 0.01 : 0.0001;
    const pips = stopDist / pipSize;
    stopDistLabel = num(pips, 1) + ' ' + t('pip');
    if (pipValue <= 0 || pips <= 0) {
      $('#err').textContent = t('errEntry');
      return;
    }
    // Position size in standard lots
    lots = riskAmt / (pips * pipValue);
    units = lots * contractSize;
    notional = units * entry;
  } else {
    // Stocks / crypto: per-unit risk = stopDist; units = riskAmt / stopDist
    stopDistLabel = num(stopDist, entry > 1000 ? 2 : 4) + ' (' + ((stopDist/entry)*100).toFixed(2) + '%)';
    units = riskAmt / stopDist;
    lots = units;
    notional = units * entry;
  }

  $('#pos-size').textContent = num(units, units >= 1000 ? 0 : 4);
  $('#pos-unit').textContent = mode === 'forex' ? t('unitUnits') : (mode === 'stock' ? t('unitShares') : t('unitUnits'));
  $('#r-risk').textContent = money(riskAmt);
  $('#r-stopdist').textContent = stopDistLabel;
  $('#r-units').textContent = num(units, units >= 1000 ? 0 : 4) + ' ' + t('unitUnits');
  $('#r-lots').textContent = num(lots, lots >= 100 ? 2 : 4) + ' ' + (mode === 'forex' ? t('unitLots') : (mode === 'stock' ? t('unitShares') : t('unitUnits')));
  $('#r-notional').textContent = money(notional);
}

['balance','risk','entry','stop','pipvalue','contract'].forEach(id => {
  $('#' + id).addEventListener('input', calculate);
});

updateFields();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🪙', href:'/calc/crypto-profit-calculator.html', name:'Crypto Profit'},
    
    {icon:'💹', href:'/calc/compound-interest-calculator.html', name:'Compound Interest'},
    {icon:'💰', href:'/calc/future-value-calculator.html', name:'Future Value'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
