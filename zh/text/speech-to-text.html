<body>

        <option value="en-US">English (US)</option>
        <option value="en-GB">English (UK)</option>
        <option value="zh-CN">中文（普通话）</option>

        <option value="de-DE">Deutsch</option>
        <option value="ja-JP">日本語</option>
        <option value="ko-KR">한국어</option>
        <option value="pt-BR">Português (BR)</option>
        <option value="ru-RU">Русский</option>
        <option value="ar-SA">العربية</option>
        <option value="hi-IN">हिन्दी</option>
        <option value="it-IT">Italiano</option>
        <option value="nl-NL">Nederlands</option>
        <option value="pl-PL">Polski</option>
        <option value="tr-TR">Türkçe</option>
        <option value="vi-VN">Tiếng Việt</option>
        <option value="th-TH">ไทย</option>
      </select>
    </div>
    <div id="output"></div>
    <div id="interim" style="color:var(--text2);opacity:.6;margin-top:4px;min-height:20px"></div>

  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Speech to Text (Voice Typing)',
    toolDesc: 'Convert your voice to text in real time. Free voice typing tool — supports 15+ languages.',
    start: '🎤 Start Listening',
    stop: '⏹ Stop',
    listening: 'Listening...',
    stopped: 'Stopped',
    notSupported: 'Speech recognition is not supported in this browser. Please use Chrome or Edge.',
    ready: 'Ready — click Start to begin',
    step1: 'Select your language from the dropdown',
    step2: 'Click "Start Listening" and allow microphone access',
    step3: 'Speak naturally — text appears in real time',
    step4: 'Click Stop when done, then copy or clear the text',
  },
  zh: {
    toolTitle: '语音转文字（语音输入）',
    toolDesc: '实时将语音转换为文字。免费语音输入工具，支持 15+ 种语言。',
    start: '🎤 开始听写',
    stop: '⏹ 停止',
    listening: '正在听写...',
    stopped: '已停止',
    notSupported: '当前浏览器不支持语音识别，请使用 Chrome 或 Edge。',
    ready: '准备就绪 — 点击「开始听写」',
    step1: '从下拉菜单选择语言',
    step2: '点击「开始听写」并允许麦克风权限',
    step3: '自然说话 — 文字会实时显示',
    step4: '完成后点击「停止」，然后复制或清除文本',
  }
});

const { $, copyText, t } = GZ;

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognition = null;
let finalTranscript = '';
let isListening = false;

if (SpeechRecognition) {
  recognition = new SpeechRecognition();
  recognition.continuous = true;
  recognition.interimResults = true;

  recognition.onresult = function(event) {
    let interim = '';
    for (let i = event.resultIndex; i < event.results.length; i++) {
      if (event.results[i].isFinal) {
        finalTranscript += event.results[i][0].transcript + ' ';
      } else {
        interim += event.results[i][0].transcript;
      }
    }
    $('#output').textContent = finalTranscript;
    $('#interim').textContent = interim;
  };

  recognition.onerror = function(event) {
    if (event.error === 'not-allowed') {
      $('#status').innerHTML = '<span style="color:var(--gz-accent)">Microphone access denied. Please allow microphone in browser settings.</span>';
    }
    stopListening();
  };

  recognition.onend = function() {
    if (isListening) {
      // Auto-restart if still supposed to be listening
      try { recognition.start(); } catch(e) {}
    }
  };
}

function startListening() {
  if (!recognition) {
    $('#status').innerHTML = '<span style="color:var(--gz-accent)">' + t('notSupported') + '</span>';
    return;
  }
  recognition.lang = $('#lang-select').value;
  isListening = true;
  recognition.start();
  $('#mic-dot').classList.add('active');
  $('#mic-status-text').textContent = t('listening');
  $('#btn-toggle').textContent = t('stop');
  $('#btn-toggle').onclick = stopListening;
}

function stopListening() {
  isListening = false;
  if (recognition) try { recognition.stop(); } catch(e) {}
  $('#mic-dot').classList.remove('active');
  $('#mic-status-text').textContent = t('stopped');
  $('#btn-toggle').textContent = t('start');
  $('#btn-toggle').onclick = startListening;
}

function doClear() {
  finalTranscript = '';
  $('#output').textContent = '';
  $('#interim').textContent = '';
}

function downloadText() {
  const text = $('#output').textContent;
  if (!text.trim()) return;
  const blob = new Blob([text], {type:'text/plain'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'speech-to-text.txt';
  a.click();
  URL.revokeObjectURL(a.href);
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" id="btn-toggle" onclick="startListening()">${t('start')}</button>
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="downloadText()">${t('download')||'Download'}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

$('#mic-status-text').textContent = recognition ? t('ready') : t('notSupported');

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🔊', href:'/text/text-to-speech.html', name:'Text to Speech'},
    {icon:'📝', href:'/text/word-counter.html', name:'Word Counter'},
    {icon:'🔤', href:'/text/case-converter.html', name:'Case Converter'},
    {icon:'✍️', href:'/text/handwriting.html', name:'Text to Handwriting'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
