<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What are analogous colors?", "acceptedAnswer": {"@type": "Answer", "text": "Analogous colors are groups of three to five colors that sit next to each other on the color wheel. They share a similar hue and naturally create harmonious, soothing color schemes commonly used in nature-inspired and monochromatic-adjacent designs."}}, {"@type": "Question", "name": "How many colors are in an analogous scheme?", "acceptedAnswer": {"@type": "Answer", "text": "This tool generates 5 analogous colors: your base color plus two colors on each side of it on the color wheel. You can adjust the hue spread (angle) between 15 and 60 degrees to control how far apart the adjacent colors are."}}, {"@type": "Question", "name": "What angle should I use for analogous colors?", "acceptedAnswer": {"@type": "Answer", "text": "A 30-degree spread is the classic analogous angle, giving closely related hues. 15 degrees produces very subtle variations, while 45-60 degrees creates more contrast while still feeling harmonious. Experiment to find what suits your design."}}, {"@type": "Question", "name": "Are my colors processed on a server?", "acceptedAnswer": {"@type": "Answer", "text": "No. All color calculations use the HSL color model and happen entirely in your browser via JavaScript. No color values are ever transmitted to any server."}}]}</script>

<script>
GZI18n.register({
  en: {
    toolTitle: 'Analogous Colors Generator',
    toolDesc: 'Create harmonious analogous color schemes from any base color. Get 5 adjacent hues with adjustable spread angle, each with HEX, RGB and HSL.',
    spread: 'Hue Spread',
    step1: 'Pick a base color using the color picker or type a HEX value',
    step2: 'Adjust the hue spread slider (15°–60°) to control similarity',
    step3: 'Click any swatch to copy its HEX code',
    step4: 'Use the palette in your design, CSS or design tool',
  },
  zh: {
    toolTitle: '类似色生成器',
    toolDesc: '从任意基础色创建和谐的类似色配色方案，获得 5 个相邻色相，可调节色相角度，每个颜色提供 HEX、RGB 和 HSL 值。',
    spread: '色相角度',
    step1: '使用取色器选择基础色，或直接输入 HEX 值',
    step2: '拖动色相角度滑块（15°–60°）控制相似程度',
    step3: '点击任意色块复制其 HEX 值',
    step4: '将配色方案用于设计、CSS 或设计工具',
  }
});
const { $, copyText, t } = GZ;

function hex2hsl(hex){
  hex = hex.replace('#','');
  if(hex.length===3) hex = hex.split('').map(c=>c+c).join('');
  if(!/^[0-9a-f]{6}$/i.test(hex)) return null;
  let r=parseInt(hex.slice(0,2),16)/255, g=parseInt(hex.slice(2,4),16)/255, b=parseInt(hex.slice(4,6),16)/255;
  const mx=Math.max(r,g,b),mn=Math.min(r,g,b),d=mx-mn;
  let h=0,s=0; const l=(mx+mn)/2;
  if(d!==0){ s=d/(1-Math.abs(2*l-1)); if(mx===r)h=((g-b)/d)%6; else if(mx===g)h=(b-r)/d+2; else h=(r-g)/d+4; h*=60; if(h<0)h+=360; }
  return [Math.round(h),Math.round(s*100),Math.round(l*100)];
}
function hsl2hex(h,s,l){
  s/=100;l/=100;
  const c=(1-Math.abs(2*l-1))*s, x=c*(1-Math.abs((h/60)%2-1)), m=l-c/2;
  let r=0,g=0,b=0;
  if(h<60){r=c;g=x;}else if(h<120){r=x;g=c;}else if(h<180){g=c;b=x;}else if(h<240){g=x;b=c;}else if(h<300){r=x;b=c;}else{r=c;b=x;}
  return '#'+[r,g,b].map(n=>Math.round((n+m)*255).toString(16).padStart(2,'0')).join('').toUpperCase();
}

function render(){
  const hex=$('#hex').value.trim();
  const hsl=hex2hsl(hex);
  if(!hsl){ $('#palette').innerHTML='<span style="color:var(--gz-accent)">Invalid HEX</span>'; return; }
  const [H,S,L]=hsl;
  const spread=+$('#spread').value;
  $('#spread-val').textContent=spread+'°';
  const angles=[-2*spread,-spread,0,spread,2*spread];
  let html='';
  angles.forEach(a=>{
    let h=(H+a+360)%360;
    const hx=hsl2hex(h,S,L);
    const isBase = a===0;
    html += `<div class="pc" onclick="copyText('${hx}')" title="${hx}">
      <div class="pb" style="background:${hx}"></div>
      <div class="pi"><code>${hx}</code><code style="opacity:.7">hsl(${h}, ${S}%, ${L}%)</code>${isBase?'<span class="base-tag">BASE</span>':''}</div>
    </div>`;
  });
  $('#palette').innerHTML=html;
}

$('#picker').addEventListener('input',e=>{ $('#hex').value=e.target.value.toUpperCase(); render(); });
$('#hex').addEventListener('input',e=>{ const v=e.target.value.toUpperCase(); if(/#[0-9A-F]{6}/.test(v)) $('#picker').value=v; render(); });
$('#spread').addEventListener('input', render);
$('#lbl-spread').textContent = t('spread');

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="copyAll()">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadRandom()">${t('example')}</button>`;
function copyAll(){ const all=[...document.querySelectorAll('#palette code')].filter((_,i)=>i%2===0).map(e=>e.textContent); copyText(all.join(', ')); }
function loadRandom(){ const h=Math.floor(Math.random()*360),s=60+Math.floor(Math.random()*30),l=45+Math.floor(Math.random()*15); const hx=hsl2hex(h,s,l); $('#hex').value=hx; $('#picker').value=hx; render(); }

render();

    {icon:'⚖️', href:'/color/harmony.html', name:'Color Harmony'},
  ]
});
