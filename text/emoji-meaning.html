const CATS=['all','smileys','people','animals','food','activities','travel','objects','symbols','flags'];
let curCat='all';
function codepoint(ch){return 'U+'+ch.codePointAt(0).toString(16).toUpperCase().padStart(4,'0');}
function render(){
  const q=$('#search').value.trim().toLowerCase();
  const filtered=D.filter(([ch,name,cat,sub,year,mean,kw])=>{
    if(curCat!=='all'&&sub!==curCat)return false;
    if(!q)return true;
    if(q.length<=2&&[...q].some(c=>c.charCodeAt(0)>0x2000)){return ch===q;}
    if(ch.includes(q))return true;
    if(name.toLowerCase().includes(q))return true;
    if(cat.toLowerCase().includes(q))return true;
    if(kw.some(k=>k.includes(q)))return true;
    return false;
  });
  if(!filtered.length){$('#grid').innerHTML='';$('#status').textContent=t('noResults');return;}
  $('#status').textContent='';
  $('#grid').innerHTML=filtered.slice(0,300).map(([ch,name])=>`<button class="em-card" onclick="showDetail('${ch}')"><span class="ch">${ch}</span><span class="nm">${name}</span></button>`).join('');
}
function showDetail(ch){
  const e=D.find(x=>x[0]===ch);
  if(!e)return;
  const [emoji,name,cat,sub,year,mean,kw]=e;
  $('#d-ch').textContent=emoji;
  $('#d-name').textContent=name;
  $('#d-kw').textContent=kw.map(k=>'#'+k).join(' ');
  $('#d-rows').innerHTML=[
    [t('unicodeName'),name],
    [t('codepoint'),'<code>'+codepoint(emoji)+'</code>'],
    [t('category'),cat+' / '+sub],
    [t('origin'),year],
    [t('meaning'),mean]
  ].map(([k,v])=>`<div class="row"><span>${k}</span><span>${v}</span></div>`).join('');
  $('#d-copy').onclick=()=>{copyText(emoji);$('#d-copy').textContent=t('copied');setTimeout(()=>$('#d-copy').textContent=t('copy'),1500);};
  $('#d-close').onclick=()=>$('#detail').classList.remove('open');
  $('#detail').classList.add('open');
}
$('#search').placeholder=t('searchPh');
$('#search').addEventListener('input',render);
$('#cats').innerHTML=CATS.map(c=>`<button class="gz-btn ${c==='all'?'':'gz-btn-secondary'}" onclick="document.querySelectorAll('#cats button').forEach(b=>b.className='gz-btn gz-btn-secondary');this.className='gz-btn';curCat='${c}';render()">${t(c)}</button>`).join('');
$('#d-copy').textContent=t('copy');$('#d-close').textContent=t('close');
$('#detail').addEventListener('click',e=>{if(e.target.id==='detail')$('#detail').classList.remove('open');});
