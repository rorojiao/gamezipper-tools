<script>
GZI18n.register({
  en: {
    toolTitle: 'Alternating Case Generator',
    toolDesc: 'Convert text to alternating caps (aLtErNaTiNg), SpongeBob mocking text, random case or inverse case — perfect for memes and social media.',
    startUpper: 'Start with UPPER',
    startLower: 'Start with lower',
    step1: 'Pick a style: Alternating, Random, Inverse or SpongeBob mocking',
    step2: 'Type or paste your text in the input area',
    step3: 'Toggle the start case (upper or lower) for the alternating pattern',
    step4: 'Click Copy and paste your meme text anywhere',
  },
  zh: {
    toolTitle: '交替大小写生成器',
    toolDesc: '将文字转换为交替大小写（aLtErNaTiNg）、SpongeBob 嘲讽体、随机大小写或反转大小写 — 适用于表情包和社交媒体。',
    startUpper: '大写开头',
    startLower: '小写开头',
    step1: '选择风格：交替、随机、反转或 SpongeBob 嘲讽体',
    step2: '在输入区输入或粘贴文字',
    step3: '切换交替模式的起始大小写（大写或小写）',
    step4: '点击「复制」并将表情包文字粘贴到任意平台',
  }
});

const { $, copyText, t } = GZ;
let mode = 'alternating';
let startUpper = true;
let seed = 12345;

// Deterministic PRNG so output is stable per input (no flicker)
function nextRand(){
  seed = (seed * 1103515245 + 12345) & 0x7fffffff;
  return seed / 0x7fffffff;
}

function transform(text, m){
  let up = startUpper;
  seed = 12345;
  let out = '';
  for(const ch of text){
    const code = ch.charCodeAt(0);
    const isLetter = (code >= 65 && code <= 90) || (code >= 97 && code <= 122);
    if(!isLetter){ out += ch; continue; }
    if(m === 'alternating'){
      out += up ? ch.toUpperCase() : ch.toLowerCase();
      up = !up;
    } else if(m === 'inverse'){
      out += (code >= 97) ? ch.toUpperCase() : ch.toLowerCase();
    } else if(m === 'random'){
      out += nextRand() < 0.5 ? ch.toUpperCase() : ch.toLowerCase();
    } else if(m === 'spongebob'){
      // Per-word random, classic mocking meme
      out += nextRand() < 0.5 ? ch.toUpperCase() : ch.toLowerCase();
    }
  }
  return out;
}

const STYLES = [
  { id:'alternating', demo:'HeLlO wOrLd' },
  { id:'spongebob', demo:'hElLo wOrLd' },
  { id:'random', demo:'hElLo WorLd' },
  { id:'inverse', demo:'hELLO WORLD' },
];

function renderStyles(){
  $('#styles').innerHTML = STYLES.map(s => `
    <div class="style-card${s.id===mode?' active':''}" onclick="setMode('${s.id}')">
      ${s.id.charAt(0).toUpperCase()+s.id.slice(1)}
      <span class="demo">${s.demo}</span>
    </div>
  `).join('');
}

function setMode(m){
  mode = m;
  renderStyles();
  convert();
}

function convert(){
  const text = $('#input').value || '';
  if(!text){ $('#output').textContent = ''; $('#status').textContent = ''; return; }
  const out = transform(text, mode);
  $('#output').textContent = out;
  $('#status').textContent = `✓ ${out.length} chars · ${mode} case`;
}

function loadExample(){
  $('#input').value = 'I do not understand what you are talking about';
  convert();
}

function doClear(){ $('#input').value=''; $('#output').textContent=''; $('#status').textContent=''; }

$('#toolbar').innerHTML = `
  <button class="gz-btn gz-btn-secondary" onclick="toggleStart()"><span id="startLbl">${t('startUpper')}</span></button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">Example</button>
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="reroll()">${t('example')||'Reroll'}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>
`;

function toggleStart(){
  startUpper = !startUpper;
  $('#startLbl').textContent = startUpper ? t('startUpper') : t('startLower');
  convert();
}

function reroll(){
  seed = Math.floor(Math.random() * 1000000) + 1;
  convert();
}

$('#input').addEventListener('input', convert);

renderStyles();

GZ.renderToolPage({
  category: 'text',

    {icon:'🌀', href:'/text/glitch-text.html', name:'Glitch Text'},
  ]
});
</script>
