<script>
GZI18n.register({
  en: {
    toolTitle: 'Image Format Detector',
    toolDesc: 'Identify any image format from a file using magic bytes. Detects JPEG, PNG, WebP, GIF, BMP, TIFF, HEIC, AVIF, ICO, SVG and 25+ other formats — works offline, no upload.',
    step1: 'Drop an image file or click to browse',
    step2: 'The detector reads the magic bytes to identify the format',
    step3: 'See the exact format, MIME type, compression and metadata',
    step4: 'Use the raw hex dump to inspect the file header manually',
  },
  zh: {
    toolTitle: '图片格式检测器',
    toolDesc: '通过魔术字节（magic bytes）识别任意图片格式。支持 JPEG、PNG、WebP、GIF、BMP、TIFF、HEIC、AVIF、ICO、SVG 等 25+ 种格式 — 离线运行，无需上传。',
    step1: '拖入图片或点击浏览',
    step2: '检测器读取魔术字节识别格式',
    step3: '查看准确的格式、MIME 类型、压缩方式和元数据',
    step4: '查看原始十六进制头部转储',
  }
});

const { $, copyText, t } = GZ;

// Format signatures (magic bytes → format info)
const SIGNATURES = [
  {name:'JPEG', ext:['jpg','jpeg'], mime:'image/jpeg', class:'fd-badge-lossy', tags:['lossy'], check: (b) => b[0]===0xFF && b[1]===0xD8 && b[2]===0xFF},
  {name:'PNG', ext:['png'], mime:'image/png', class:'fd-badge-lossless', tags:['lossless'], check: (b) => b[0]===0x89 && b[1]===0x50 && b[2]===0x4E && b[3]===0x47},
  {name:'GIF87a', ext:['gif'], mime:'image/gif', class:'fd-badge-lossless fd-badge-anim', tags:['lossless','animation'], check: (b) => b[0]===0x47 && b[1]===0x49 && b[2]===0x46 && b[3]===0x38 && b[4]===0x37 && b[5]===0x61},
  {name:'GIF89a', ext:['gif'], mime:'image/gif', class:'fd-badge-lossless fd-badge-anim', tags:['lossless','animation'], check: (b) => b[0]===0x47 && b[1]===0x49 && b[2]===0x46 && b[3]===0x38 && b[4]===0x39 && b[5]===0x61},
  {name:'WebP', ext:['webp'], mime:'image/webp', class:'fd-badge-lossless', tags:['lossless','animation'], check: (b, v) => b[0]===0x52 && b[1]===0x49 && b[2]===0x46 && b[3]===0x46 && b[8]===0x57 && b[9]===0x45 && b[10]===0x42 && b[11]===0x50, len: 12, verify: (b) => v(8, 12)},
  {name:'BMP', ext:['bmp'], mime:'image/bmp', class:'fd-badge-lossless', tags:['lossless'], check: (b) => b[0]===0x42 && b[1]===0x4D},
  {name:'TIFF (LE)', ext:['tif','tiff'], mime:'image/tiff', class:'fd-badge-lossless', tags:['lossless'], check: (b) => b[0]===0x49 && b[1]===0x49 && b[2]===0x2A && b[3]===0x00},
  {name:'TIFF (BE)', ext:['tif','tiff'], mime:'image/tiff', class:'fd-badge-lossless', tags:['lossless'], check: (b) => b[0]===0x4D && b[1]===0x4D && b[2]===0x00 && b[3]===0x2A},
  {name:'HEIC / HEIF', ext:['heic','heif'], mime:'image/heic', class:'fd-badge-lossy', tags:['lossy'], check: (b) => Array.from(b.slice(4, 8)).join(',') === '102,116,121,112' && /heic|heix|hevc|heim|heis|mif1|msf1/.test(new TextDecoder().decode(b.slice(8, 12)))},
  {name:'AVIF', ext:['avif'], mime:'image/avif', class:'fd-badge-lossy', tags:['lossy','animation'], check: (b) => Array.from(b.slice(4, 8)).join(',') === '102,116,121,112' && /avif|avis/.test(new TextDecoder().decode(b.slice(8, 12)))},
  {name:'JPEG XL', ext:['jxl'], mime:'image/jxl', class:'fd-badge-lossless', tags:['lossless'], check: (b) => (b[0]===0xFF && b[1]===0x0A) || (b[0]===0x00 && b[1]===0x00 && b[2]===0x00 && b[3]===0x0C && b[4]===0x4A && b[5]===0x58 && b[6]===0x4C && b[7]===0x20)},
  {name:'ICO', ext:['ico'], mime:'image/x-icon', class:'fd-badge-lossless', tags:['lossless'], check: (b) => b[0]===0x00 && b[1]===0x00 && b[2]===0x01 && b[3]===0x00},
  {name:'CUR', ext:['cur'], mime:'image/x-cur', class:'fd-badge-lossless', tags:['lossless'], check: (b) => b[0]===0x00 && b[1]===0x00 && b[2]===0x02 && b[3]===0x00},
  {name:'WebP (extended)', ext:['webp'], mime:'image/webp', class:'fd-badge-lossless', tags:['lossless','animation'], check: (b) => b[0]===0x52 && b[1]===0x49 && b[2]===0x46 && b[3]===0x46},
  {name:'PSD', ext:['psd'], mime:'image/vnd.adobe.photoshop', class:'fd-badge-img', tags:['layered'], check: (b) => b[0]===0x38 && b[1]===0x42 && b[2]===0x50 && b[3]===0x53},
  {name:'Adobe Illustrator', ext:['ai'], mime:'application/postscript', class:'fd-badge-img', tags:['vector'], check: (b) => b[0]===0x25 && b[1]===0x21 && b[2]===0x50 && b[3]===0x53 && b[4]===0x2D && b[5]===0x33 && b[6]===0x2E && b[7]===0x30 && b[8]===0x30 && b[9]===0x31 && b[10]===0x20 && b[11]===0x41 && b[12]===0x49 && b[13]===0x20},
  {name:'EPS', ext:['eps'], mime:'application/postscript', class:'fd-badge-img', tags:['vector'], check: (b) => b[0]===0x25 && b[1]===0x21 && b[2]===0x50 && b[3]===0x53 && b[4]===0x2D && b[5]===0x33 && b[6]===0x2E && b[7]===0x30 && b[8]===0x30 && b[9]===0x31 && b[10]===0x20 && b[11]===0x45 && b[12]===0x50 && b[13]===0x53 && b[14]===0x46 && b[15]===0x2D},
  {name:'JPEG 2000', ext:['jp2','j2k'], mime:'image/jp2', class:'fd-badge-lossy', tags:['lossy'], check: (b) => Array.from(b.slice(0, 12)).join(',') === '0,0,0,12,106,80,32,32,13,10,135,10' || (b[0]===0xFF && b[1]===0x4F)},
  {name:'PBM (binary)', ext:['pbm'], mime:'image/x-portable-bitmap', class:'fd-badge-lossless', tags:['bitmap'], check: (b) => b[0]===0x50 && b[1]===0x34 && b[2]===0x0A},
  {name:'PGM (binary)', ext:['pgm'], mime:'image/x-portable-graymap', class:'fd-badge-lossless', tags:['bitmap'], check: (b) => b[0]===0x50 && b[1]===0x35 && b[2]===0x0A},
  {name:'PPM (binary)', ext:['ppm'], mime:'image/x-portable-pixmap', class:'fd-badge-lossless', tags:['bitmap'], check: (b) => b[0]===0x50 && b[1]===0x36 && b[2]===0x0A},
  {name:'XBM', ext:['xbm'], mime:'image/x-xbitmap', class:'fd-badge-lossless', tags:['bitmap'], check: (b) => new TextDecoder().decode(b.slice(0, 7)) === '#define'},
  {name:'XPM', ext:['xpm'], mime:'image/x-xpixmap', class:'fd-badge-lossless', tags:['bitmap'], check: (b) => new TextDecoder().decode(b.slice(0, 9)) === '/* XPM */'},
  {name:'SVG', ext:['svg','svgz'], mime:'image/svg+xml', class:'fd-badge-lossless', tags:['vector'], check: (b) => new TextDecoder().decode(b.slice(0, 5)).trim() === '<?xml' || new TextDecoder().decode(b.slice(0, 4)) === '<svg'},
  {name:'WOFF', ext:['woff'], mime:'font/woff', class:'fd-badge-img', tags:['font'], check: (b) => b[0]===0x77 && b[1]===0x4F && b[2]===0x46 && b[3]===0x46},
  {name:'WOFF2', ext:['woff2'], mime:'font/woff2', class:'fd-badge-img', tags:['font'], check: (b) => b[0]===0x77 && b[1]===0x4F && b[2]===0x46 && b[3]===0x32},
  {name:'TTF', ext:['ttf'], mime:'font/ttf', class:'fd-badge-img', tags:['font'], check: (b) => Array.from(b.slice(0, 4)).join(',') === '0,1,0,0' || new TextDecoder().decode(b.slice(0, 4)) === 'true'},
  {name:'OTF', ext:['otf'], mime:'font/otf', class:'fd-badge-img', tags:['font'], check: (b) => b[0]===0x4F && b[1]===0x54 && b[2]===0x54 && b[3]===0x4F},
  {name:'EXR', ext:['exr'], mime:'image/x-exr', class:'fd-badge-img', tags:['hdr'], check: (b) => b[0]===0x76 && b[1]===0x2F && b[2]===0x31 && b[3]===0x01},
];

function detectFormat(bytes) {
  for (const sig of SIGNATURES) {
    if (sig.check(bytes)) return sig;
  }
  return null;
}

function bytesToHex(bytes, n) {
  n = Math.min(n, bytes.length);
  const lines = [];
  for (let i = 0; i < n; i += 16) {
    const chunk = bytes.slice(i, Math.min(i + 16, n));
    const hex = Array.from(chunk).map(b => b.toString(16).padStart(2, '0').toUpperCase()).join(' ');
    const ascii = Array.from(chunk).map(b => (b >= 32 && b <= 126) ? String.fromCharCode(b) : '.').join('');
    lines.push(`${i.toString(16).padStart(8, '0')}  ${hex.padEnd(48, ' ')}  ${ascii}`);
  }
  return lines.join('\n');
}

function getImageDimensions(file) {
  return new Promise((resolve) => {
    const url = URL.createObjectURL(file);
    const img = new Image();
    img.onload = () => {
      resolve({width: img.naturalWidth, height: img.naturalHeight});
      URL.revokeObjectURL(url);
    };
    img.onerror = () => {
      resolve({width: null, height: null});
      URL.revokeObjectURL(url);
    };
    img.src = url;
  });
}

function formatSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024*1024) return (bytes/1024).toFixed(2) + ' KB';
  if (bytes < 1024*1024*1024) return (bytes/1024/1024).toFixed(2) + ' MB';
  return (bytes/1024/1024/1024).toFixed(2) + ' GB';
}

async function handleFile(file) {
  if (!file) return;
  const buffer = await file.arrayBuffer();
  const bytes = new Uint8Array(buffer).slice(0, 32);
  const sig = detectFormat(bytes);
  const dims = await getImageDimensions(file);
  const info = $('#info');
  const preview = $('#preview');
  const hexDump = $('#hexDump');
  // Build preview
  if (file.type.startsWith('image/') && file.type !== 'image/heic' && file.type !== 'image/heif') {
    const url = URL.createObjectURL(file);
    preview.innerHTML = `<img src="${url}" alt="${file.name}">`;
  } else if (file.type === 'image/heic' || file.type === 'image/heif') {
    preview.innerHTML = `<p class="ph">📷 HEIC preview not supported in browsers<br><small>Format detected but image can't be rendered natively</small></p>`;
  } else {
    preview.innerHTML = `<p class="ph">📄 ${file.name}<br><small>${file.type || 'unknown type'}</small></p>`;
  }
  // Build info
  const tags = sig ? sig.tags.map(t => `<span class="badge ${sig.class}">${t}</span>`).join('') : '<span class="badge fd-badge-lossy">unknown</span>';
  info.style.display = 'block';
  info.innerHTML = `
    <div class="row"><span>Format</span><span><b>${sig ? sig.name : 'Unknown'}</b> ${tags}</span></div>
    <div class="row"><span>Extension</span><span>.${(sig ? sig.ext[0] : file.name.split('.').pop()).toLowerCase()}</span></div>
    <div class="row"><span>MIME Type</span><span>${sig ? sig.mime : (file.type || 'unknown')}</span></div>
    <div class="row"><span>File Size</span><span>${formatSize(file.size)} (${file.size.toLocaleString()} bytes)</span></div>
    ${dims.width ? `<div class="row"><span>Dimensions</span><span>${dims.width} × ${dims.height} px</span></div>` : ''}
    <div class="row"><span>File Name</span><span>${file.name}</span></div>
    <div class="row"><span>Last Modified</span><span>${new Date(file.lastModified).toLocaleString()}</span></div>
  `;
  // Hex dump
  hexDump.style.display = 'block';
  hexDump.textContent = bytesToHex(bytes, 32);
}

const drop = $('#drop');
const fileInput = $('#file');
drop.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', (e) => handleFile(e.target.files[0]));
drop.addEventListener('dragover', (e) => { e.preventDefault(); drop.classList.add('drag'); });
drop.addEventListener('dragleave', () => drop.classList.remove('drag'));
drop.addEventListener('drop', (e) => {
  e.preventDefault();
  drop.classList.remove('drag');
  if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
});

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="$('#file').click()">${t('upload')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#info').style.display='none';$('#hexDump').style.display='none';$('#preview').innerHTML='<p class=ph>📷 Preview will appear here</p>';$('#file').value='';">${t('clear')}</button>`;

GZ.renderToolPage({
  category: 'image',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📦', href:'/image/compressor.html', name:'Image Compressor'},
    {icon:'🔄', href:'/image/converter.html', name:'Image Converter'},
    {icon:'📐', href:'/image/resizer.html', name:'Image Resizer'},
    {icon:'📸', href:'/image/exif-viewer.html', name:'EXIF Viewer'},
  ]
});
</script>
