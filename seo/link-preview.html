<style>
.ctrl{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
@media(max-width:768px){.ctrl{grid-template-columns:1fr}}
.ctrl label{font-size:.85em;display:flex;flex-direction:column;gap:4px;color:var(--text2)}
.ctrl input[type=text],.ctrl textarea{background:var(--glass);color:var(--text);border:1px solid var(--border);padding:8px 10px;border-radius:8px;font-size:.85em;width:100%}
.platform-tabs{display:flex;gap:8px;margin-bottom:12px}
.platform-tab{padding:8px 16px;border-radius:20px;cursor:pointer;font-size:.85em;border:1px solid var(--border);background:var(--glass);color:var(--text2);transition:all .2s}
.platform-tab.active{background:var(--accent);color:#000;border-color:var(--accent);font-weight:600}
#preview-area{padding:16px;display:flex;justify-content:center}
#output{white-space:pre-wrap;word-break:break-all;font-family:monospace;font-size:.8em;line-height:1.5;max-height:380px;overflow:auto}
.gz-toolbar{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
/* Facebook preview */
.fb-card{width:500px;max-width:100%;border:1px solid #dadde1;border-radius:8px;overflow:hidden;background:#fff;font-family:Helvetica,Arial,sans-serif}
.fb-card .fb-img{width:100%;height:260px;object-fit:cover;background:#e4e6eb;display:flex;align-items:center;justify-content:center;color:#65676b;font-size:14px}
.fb-card .fb-body{padding:12px}
.fb-card .fb-url{font-size:12px;color:#65676b;text-transform:uppercase;letter-spacing:.5px}
.fb-card .fb-title{font-size:16px;font-weight:600;color:#1d2129;margin:4px 0}
.fb-card .fb-desc{font-size:14px;color:#606770;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
/* Twitter preview */
.tw-card{width:500px;max-width:100%;border:1px solid #cfd9de;border-radius:14px;overflow:hidden;background:#fff;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
.tw-card .tw-img{width:100%;height:260px;object-fit:cover;background:#f7f9f9;display:flex;align-items:center;justify-content:center;color:#536471;font-size:14px}
.tw-card .tw-body{padding:12px}
.tw-card .tw-title{font-size:15px;font-weight:700;color:#0f1419}
.tw-card .tw-desc{font-size:14px;color:#536471;margin-top:2px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.tw-card .tw-url{font-size:14px;color:#536471;margin-top:4px}
/* LinkedIn preview */
.li-card{width:500px;max-width:100%;border:1px solid #e0e0e0;border-radius:0;overflow:hidden;background:#fff;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
.li-card .li-img{width:100%;height:260px;object-fit:cover;background:#eef3f8;display:flex;align-items:center;justify-content:center;color:#666;font-size:14px}
.li-card .li-body{padding:12px;background:#f3f2ef}
.li-card .li-title{font-size:14px;font-weight:600;color:#000}
.li-card .li-url{font-size:12px;color:#666;margin-top:4px}
</style>

<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "How do I create a link preview card?", "acceptedAnswer": {"@type": "Answer", "text": "Enter your page title, description, image URL and domain name. The tool generates preview cards showing how your link will appear on Facebook, Twitter and LinkedIn."}}, {"@type": "Question", "name": "What are Open Graph meta tags?", "acceptedAnswer": {"@type": "Answer", "text": "Open Graph tags are HTML meta tags that control how your page appears when shared on social media. They include og:title, og:description, og:image and og:url."}}, {"@type": "Question", "name": "Does this generate the meta tags I need?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. The tool generates complete Open Graph and Twitter Card meta tags that you can paste into your HTML head section."}}]}</script>

<link rel="alternate" hreflang="zh" href="https://tools.gamezipper.com/zh/seo/link-preview.html">
<link rel="alternate" hreflang="x-default" href="https://tools.gamezipper.com/seo/link-preview.html">
</head>
<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="ctrl" id="controls"></div>
    <div class="platform-tabs">
      <div class="platform-tab active" onclick="setPlatform('facebook',this)">📘 Facebook</div>
      <div class="platform-tab" onclick="setPlatform('twitter',this)">🐦 Twitter / X</div>
      <div class="platform-tab" onclick="setPlatform('linkedin',this)">💼 LinkedIn</div>
    </div>
    <div id="preview-area"></div>
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="gz-output" id="output"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Link Preview Card Generator',
    toolDesc: 'Preview and generate link cards for Facebook, Twitter and LinkedIn with custom Open Graph meta tags.',
    titleField: 'Page Title',
    titleVal: 'GameZipper — Free Online Games & Tools',
    descField: 'Description',
    descVal: 'Play free online games and use 500+ developer tools. No signup, instant fun and productivity.',
    imgUrl: 'Image URL',
    imgUrlVal: 'https://tools.gamezipper.com/shared/og-image.png',
    domain: 'Domain',
    domainVal: 'gamezipper.com',
    copyMeta: 'Copy Meta Tags',
    step1: 'Enter your page title, description, image URL and domain',
    step2: 'Switch between Facebook, Twitter and LinkedIn tabs',
    step3: 'See the live preview of your link card',
    step4: 'Copy the generated meta tags and paste into your HTML head',
  },
  zh: {
    toolTitle: '链接预览卡片生成器',
    toolDesc: '预览并生成 Facebook、Twitter 和 LinkedIn 的链接卡片，输出 Open Graph 元标签。',
    titleField: '页面标题',
    titleVal: 'GameZipper — 免费在线游戏和工具',
    descField: '描述',
    descVal: '免费在线游戏和 500+ 开发工具。无需注册，即开即用。',
    imgUrl: '图片 URL',
    imgUrlVal: 'https://tools.gamezipper.com/shared/og-image.png',
    domain: '域名',
    domainVal: 'gamezipper.com',
    copyMeta: '复制 Meta 标签',
    step1: '输入页面标题、描述、图片 URL 和域名',
    step2: '在 Facebook、Twitter 和 LinkedIn 之间切换',
    step3: '实时预览链接卡片效果',
    step4: '复制生成的 Meta 标签粘贴到 HTML head 中',
  }
});

const { $, copyText, t } = GZ;
let platform = 'facebook';

function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function setPlatform(p, el) {
  platform = p;
  document.querySelectorAll('.platform-tab').forEach(t => t.classList.remove('active'));
  if (el) el.classList.add('active');
  update();
}

function update() {
  const title = getVal('in-title') || t('titleVal');
  const desc = getVal('in-desc') || t('descVal');
  const img = getVal('in-img') || t('imgUrlVal');
  const domain = getVal('in-domain') || t('domainVal');
  const area = $('#preview-area');

  const imgHtml = img ? `<img src="${esc(img)}" style="width:100%;height:100%;object-fit:cover" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><div style="display:none;width:100%;height:100%;align-items:center;justify-content:center;color:inherit;font-size:14px">Image not found</div>` : `<div style="display:flex;width:100%;height:100%;align-items:center;justify-content:center;color:inherit;font-size:14px">No image</div>`;

  if (platform === 'facebook') {
    area.innerHTML = `<div class="fb-card"><div class="fb-img" style="position:relative">${imgHtml}</div><div class="fb-body"><div class="fb-url">${esc(domain)}</div><div class="fb-title">${esc(title)}</div><div class="fb-desc">${esc(desc)}</div></div></div>`;
  } else if (platform === 'twitter') {
    area.innerHTML = `<div class="tw-card"><div class="tw-img" style="position:relative">${imgHtml}</div><div class="tw-body"><div class="tw-title">${esc(title)}</div><div class="tw-desc">${esc(desc)}</div><div class="tw-url">${esc(domain)}</div></div></div>`;
  } else {
    area.innerHTML = `<div class="li-card"><div class="li-img" style="position:relative">${imgHtml}</div><div class="li-body"><div class="li-title">${esc(title)}</div><div class="li-url">${esc(domain)}</div></div></div>`;
  }

  const meta = `<!-- Open Graph Meta Tags -->
<meta property="og:title" content="${esc(title)}">
<meta property="og:description" content="${esc(desc)}">
<meta property="og:image" content="${esc(img)}">
<meta property="og:url" content="https://${esc(domain)}">
<meta property="og:type" content="website">
<meta property="og:site_name" content="${esc(domain)}">
<!-- Twitter Card Meta Tags -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="${esc(title)}">
<meta name="twitter:description" content="${esc(desc)}">
<meta name="twitter:image" content="${esc(img)}">`;

  $('#output').textContent = meta;
}

function getVal(id) { const el = $(`#${id}`); return el ? el.value : ''; }

$('#controls').innerHTML = `
  <label>${t('titleField')}<input type="text" id="in-title" value="${esc(t('titleVal'))}" oninput="update()"></label>
  <label>${t('domain')}<input type="text" id="in-domain" value="${esc(t('domainVal'))}" oninput="update()"></label>
  <label>${t('descField')}<textarea id="in-desc" rows="2" oninput="update()">${esc(t('descVal'))}</textarea></label>
  <label>${t('imgUrl')}<input type="text" id="in-img" value="${esc(t('imgUrlVal'))}" oninput="update()"></label>
`;

$('#toolbar').innerHTML = `<button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copyMeta')}</button>`;

update();

GZ.renderToolPage({
  category: 'seo',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'👁️', href:'/seo/serp-preview.html', name:'SERP Preview'},
    {icon:'🖼️', href:'/seo/open-graph-preview.html', name:'OG Preview'},
    {icon:'🏷️', href:'/seo/open-graph-generator.html', name:'OG Generator'},
    {icon:'🏷️', href:'/seo/meta-tag-generator.html', name:'Meta Tags'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
