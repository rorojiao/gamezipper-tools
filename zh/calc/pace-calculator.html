.pace-tabs{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.pace-tab{padding:10px 14px;border-radius:10px;border:1px solid var(--border);background:var(--glass2);color:var(--text);cursor:pointer;font-family:inherit;font-size:.85em;font-weight:600;transition:all .15s}

.pace-mode{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center}

.pace-input input{flex:1;padding:10px;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:1.1em;font-family:inherit;font-weight:600;text-align:center;min-width:0}
.pace-input select{padding:10px;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:.9em;font-family:inherit}
.pace-input .unit{font-size:.85em;color:var(--text2);font-weight:600}
.pace-results{background:linear-gradient(135deg,rgba(0,214,114,0.1),rgba(78,205,196,0.1));border:1px solid #00d672;border-radius:14px;padding:18px;margin-bottom:16px;text-align:center}
.pace-results .big{font-size:2.4rem;font-weight:800;color:#00d672;font-variant-numeric:tabular-nums;line-height:1;margin-bottom:4px}

.pace-preset:hover{background:var(--accent);color:#000;border-color:var(--accent)}
.splits{background:var(--glass2);border:1px solid var(--border);border-radius:12px;padding:16px;margin-top:16px}
.splits h3{margin:0 0 10px;font-size:1rem}
.splits table{width:100%;border-collapse:collapse;font-size:.9em}
.splits th,.splits td{padding:8px;text-align:left;border-bottom:1px solid var(--border)}
.splits th{color:var(--text2);font-weight:600;font-size:.85em}
.splits tr:last-child td{border-bottom:none}
.splits .dist{font-weight:700;color:var(--accent)}

<script type="application/ld+json">{"@context":"https://schema.org","@type":"WebApplication","name":"Pace Calculator","description":"Free online running pace calculator. Convert between pace, finish time and distance with splits for 5K, 10K, half marathon and marathon.","url": "https://tools.gamezipper.com/zh/calc/pace-calculator.html","applicationCategory":"Utility","operatingSystem":"Web Browser","offers":{"@type":"Offer","price":"0"}}</script>
<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "How do I calculate my running pace?", "acceptedAnswer": {"@type": "Answer", "text": "Divide your run time (in minutes) by the distance (in km or miles). For example, a 30-minute 5K = 30/5 = 6:00 min/km. The calculator does this automatically and also computes split times for each kilometer or mile."}}, {"@type": "Question", "name": "What is a good 5K pace for beginners?", "acceptedAnswer": {"@type": "Answer", "text": "Most beginner runners finish a 5K in 25-35 minutes, which is roughly 8:00-11:00 min/km or 13:00-18:00 min/mile. With training, 5K paces of 5:30-6:30 min/km are achievable for recreational runners."}}, {"@type": "Question", "name": "How is marathon pace calculated?", "acceptedAnswer": {"@type": "Answer", "text": "Marathon pace = total time / 42.195 km (26.2 mi). A 4-hour marathon is about 5:41 min/km or 9:09 min/mile. Most runners aim for an even split, though some prefer negative splits (faster second half)."}}]}</script>

<script>
GZI18n.register({
  en: {
    toolTitle: 'Running Pace Calculator',
    toolDesc: 'Convert between pace, finish time and distance for 5K, 10K, half marathon, marathon and any custom distance.',
    km: 'Kilometers',
    mi: 'Miles',
    modePace: 'Pace → Time',
    modeTime: 'Time → Pace',
    modeDist: 'Time → Distance',
    pace: 'Pace',
    paceMin: 'min',
    paceSec: 'sec',
    time: 'Finish time',
    hours: 'hr',
    minutes: 'min',
    seconds: 'sec',
    distance: 'Distance',
    unit: 'Unit',
    resultPace: 'Your Pace',
    resultTime: 'Finish Time',
    resultDist: 'Distance',
    resultPaceUnit: 'min per',
    preset: 'Quick presets',
    preset5k: '5K',
    preset10k: '10K',
    presetHalf: 'Half Marathon',
    presetFull: 'Marathon',
    splits: 'Splits',
    splitsKm: 'Splits per km',
    splitsMi: 'Splits per mile',
    splitsTotal: 'Total time at split',
    splitsNote: 'Even pace based on your input',
    step1: 'Pick km or miles',
    step2: 'Choose what to calculate: Pace → Time, Time → Pace, or Time → Distance',
    step3: 'Enter the two known values',
    step4: 'View result, splits and quick presets for 5K, 10K, half and full marathon',
  },
  zh: {
    toolTitle: '跑步配速计算器',
    toolDesc: '在配速、完赛时间和距离之间换算，适用于 5K、10K、半马、全马和任意自定义距离。',
    km: '公里',
    mi: '英里',
    modePace: '配速 → 时间',
    modeTime: '时间 → 配速',
    modeDist: '时间 → 距离',
    pace: '配速',
    paceMin: '分',
    paceSec: '秒',
    time: '完赛时间',
    hours: '时',
    minutes: '分',
    seconds: '秒',
    distance: '距离',
    unit: '单位',
    resultPace: '你的配速',
    resultTime: '完赛时间',
    resultDist: '总距离',
    resultPaceUnit: '每',
    preset: '快捷预设',
    preset5k: '5 公里',
    preset10k: '10 公里',
    presetHalf: '半程马拉松',
    presetFull: '全程马拉松',
    splits: '分段配速',
    splitsKm: '每公里分段',
    splitsMi: '每英里分段',
    splitsTotal: '分段累计时间',
    splitsNote: '基于你的输入计算的匀速分段',
    step1: '选择公里或英里单位',
    step2: '选择要计算的模式：配速→时间、时间→配速或时间→距离',
    step3: '输入两个已知值',
    step4: '查看结果、分段配速和 5K/10K/半马/全马快捷预设',
  }
});

const { $, t } = GZ;
let unit = 'km';
let mode = 'pace';

$('#u-km').textContent = 'km';
$('#u-mi').textContent = 'mi';
$('#m-pace').textContent = t('modePace');
$('#m-time').textContent = t('modeTime');
$('#m-dist').textContent = t('modeDist');

function pad(n) { return n.toString().padStart(2, '0'); }
function toMin(h, m, s) { return h * 60 + m + s / 60; }
function fromMin(min) {
  const h = Math.floor(min / 60);
  const m = Math.floor(min % 60);
  const s = Math.round((min - Math.floor(min)) * 60);
  if (h > 0) return `${h}:${pad(m)}:${pad(s)}`;
  return `${m}:${pad(s)}`;
}
function paceStr(min) {
  if (!isFinite(min) || min <= 0) return '--:--';
  const m = Math.floor(min);
  const s = Math.round((min - m) * 60);
  if (s === 60) return `${pad(m+1)}:00`;
  return `${m}:${pad(s)}`;
}
function getPace() {
  const pm = parseInt($('#pace-m').value) || 0;
  const ps = parseInt($('#pace-s').value) || 0;
  return pm + ps / 60;
}
function getTime() {
  const h = parseInt($('#time-h').value) || 0;
  const m = parseInt($('#time-m').value) || 0;
  const s = parseInt($('#time-s').value) || 0;
  return toMin(h, m, s);
}
function getDist() {
  return parseFloat($('#dist').value) || 0;
}

function renderInputs() {
  const u = unit === 'km' ? 'km' : 'mi';
  const distU = unit === 'km' ? t('km') : t('mi');
  let html = '';
  if (mode === 'pace') {
    html = `
      <div class="pace-input"><label>${t('pace')} (min/${u})</label>
        <div class="pace-input-row">
          <input type="number" id="pace-m" min="0" value="5" oninput="calc()">
          <span class="unit">${t('paceMin')}</span>
          <input type="number" id="pace-s" min="0" max="59" value="30" oninput="calc()">
          <span class="unit">${t('paceSec')}</span>
        </div>
      </div>
      <div class="pace-input"><label>${t('distance')} (${u})</label>
        <input type="number" id="dist" min="0" step="0.1" value="5" oninput="calc()">
      </div>`;
  } else if (mode === 'time') {
    html = `
      <div class="pace-input"><label>${t('time')}</label>
        <div class="pace-input-row">
          <input type="number" id="time-h" min="0" value="0" oninput="calc()"><span class="unit">${t('hours')}</span>
          <input type="number" id="time-m" min="0" max="59" value="30" oninput="calc()"><span class="unit">${t('minutes')}</span>
          <input type="number" id="time-s" min="0" max="59" value="0" oninput="calc()"><span class="unit">${t('seconds')}</span>
        </div>
      </div>
      <div class="pace-input"><label>${t('distance')} (${u})</label>
        <input type="number" id="dist" min="0" step="0.1" value="5" oninput="calc()">
      </div>`;
  } else {
    html = `
      <div class="pace-input"><label>${t('time')}</label>
        <div class="pace-input-row">
          <input type="number" id="time-h" min="0" value="1" oninput="calc()"><span class="unit">${t('hours')}</span>
          <input type="number" id="time-m" min="0" max="59" value="30" oninput="calc()"><span class="unit">${t('minutes')}</span>
          <input type="number" id="time-s" min="0" max="59" value="0" oninput="calc()"><span class="unit">${t('seconds')}</span>
        </div>
      </div>
      <div class="pace-input"><label>${t('pace')} (min/${u})</label>
        <div class="pace-input-row">
          <input type="number" id="pace-m" min="0" value="5" oninput="calc()"><span class="unit">${t('paceMin')}</span>
          <input type="number" id="pace-s" min="0" max="59" value="30" oninput="calc()"><span class="unit">${t('paceSec')}</span>
        </div>
      </div>`;
  }
  $('#inputs').innerHTML = html;
}

function calc() {
  const u = unit;
  const distU = u === 'km' ? t('km') : t('mi');
  let html = '';
  let totalTimeMin = 0, paceMin = 0, dist = 0;
  if (mode === 'pace') {
    paceMin = getPace();
    dist = getDist();
    if (paceMin <= 0 || dist <= 0) { $('#result').innerHTML = ''; renderSplits(0, 0); return; }
    totalTimeMin = paceMin * dist;
    html = `<div class="pace-results"><div class="big">${fromMin(totalTimeMin)}</div><div class="lbl">${t('resultTime')} @ ${paceStr(paceMin)} min/${u}</div></div>`;
  } else if (mode === 'time') {
    totalTimeMin = getTime();
    dist = getDist();
    if (totalTimeMin <= 0 || dist <= 0) { $('#result').innerHTML = ''; renderSplits(0, 0); return; }
    paceMin = totalTimeMin / dist;
    html = `<div class="pace-results"><div class="big">${paceStr(paceMin)} min/${u}</div><div class="lbl">${t('resultPace')}</div></div>`;
  } else {
    totalTimeMin = getTime();
    paceMin = getPace();
    if (totalTimeMin <= 0 || paceMin <= 0) { $('#result').innerHTML = ''; renderSplits(0, 0); return; }
    dist = totalTimeMin / paceMin;
    html = `<div class="pace-results"><div class="big">${dist.toFixed(2)} ${u}</div><div class="lbl">${t('resultDist')}</div></div>`;
  }
  $('#result').innerHTML = html;
  renderSplits(paceMin, dist);
}

function renderSplits(pace, dist) {
  if (pace <= 0 || dist <= 0) { $('#splits').innerHTML = ''; return; }
  const u = unit;
  const splitsLbl = u === 'km' ? t('splitsKm') : t('splitsMi');
  const kmDist = u === 'km' ? 1 : 1.609344;
  const segments = Math.floor(dist);
  let rows = '';
  let cum = 0;
  for (let i = 1; i <= segments; i++) {
    cum += pace;
    rows += `<tr><td class="dist">${u === 'km' ? i : (i*kmDist).toFixed(2)} ${u}</td><td>${paceStr(pace)}</td><td>${fromMin(cum)}</td></tr>`;
  }
  const lastFrac = dist - segments;
  if (lastFrac > 0.01) {
    const lastPace = pace * lastFrac;
    cum += lastPace;
    const lastDist = u === 'km' ? `${segments}+${lastFrac.toFixed(2)}` : `${(segments*kmDist).toFixed(2)}+${(lastFrac*kmDist).toFixed(2)}`;
    rows += `<tr><td class="dist">${lastDist} ${u}</td><td>${paceStr(lastPace)}</td><td>${fromMin(cum)}</td></tr>`;
  }
  $('#splits').innerHTML = `<h3>${t('splits')} — ${splitsLbl}</h3>
    <p style="font-size:.78em;color:var(--text2);margin:0 0 8px">${t('splitsNote')}</p>
    <table><thead><tr><th>${t('distance')}</th><th>${t('pace')}</th><th>${t('splitsTotal')}</th></tr></thead><tbody>${rows}</tbody></table>`;
}

function setUnit(u) {
  unit = u;
  document.querySelectorAll('#unit-mode .pace-mode-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`#unit-mode .pace-mode-btn[data-unit="${u}"]`).classList.add('active');
  renderInputs();
  calc();
}
function setMode(m) {
  mode = m;
  document.querySelectorAll('#mode .pace-tab').forEach(b => b.classList.remove('active'));
  document.querySelector(`#mode .pace-tab[data-mode="${m}"]`).classList.add('active');
  renderInputs();
  calc();
}

document.querySelectorAll('#unit-mode .pace-mode-btn').forEach(btn => {
  btn.addEventListener('click', () => setUnit(btn.dataset.unit));
});
document.querySelectorAll('#mode .pace-tab').forEach(btn => {
  btn.addEventListener('click', () => setMode(btn.dataset.mode));
});

renderInputs();
calc();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🚗', href:'/calc/speed-distance-time.html', name:'Speed Distance Time'},
    {icon:'⏱️', href:'/calc/timer-stopwatch.html', name:'Stopwatch'},
    {icon:'🏃', href:'/calc/calorie-calculator.html', name:'Calorie Calculator'},
    {icon:'⚖️', href:'/calc/bmi-calculator.html', name:'BMI Calculator'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
