<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is letter spacing in CSS?", "acceptedAnswer": {"@type": "Answer", "text": "Letter spacing (CSS property: letter-spacing) controls the space between individual characters in text. Also called tracking in typography, it increases or decreases the gap between letters for stylistic or readability purposes."}}, {"@type": "Question", "name": "What unit should I use for letter spacing?", "acceptedAnswer": {"@type": "Answer", "text": "em and rem are recommended because they scale relative to font size, maintaining proportions across different text sizes. px gives precise control but doesn't scale. For responsive design, prefer em or rem units."}}, {"@type": "Question", "name": "What is good letter spacing for headings?", "acceptedAnswer": {"@type": "Answer", "text": "Uppercase headings often look good with slightly positive tracking (0.05em to 0.15em). Body text usually uses normal or slightly negative tracking for readability. Large display text can use tighter spacing (-0.02em to -0.05em)."}}, {"@type": "Question", "name": "How do I convert letter spacing between units?", "acceptedAnswer": {"@type": "Answer", "text": "1em equals the current font size. At 16px font size, 1em = 16px = 100%. So 0.1em at 16px = 1.6px. The tool automatically converts between px, em, rem, and percentage for you."}}]}</script>

<script>
GZI18n.register({
  en: {
    toolTitle: 'Letter Spacing Generator',
    toolDesc: 'Free CSS letter spacing generator with live preview. Adjust tracking in px, em, rem, % — preview headings, body text and buttons with copy-ready CSS.',
    lblSpacing: 'Letter Spacing',
    lblFontSize: 'Base Font Size',
    lblFontWeight: 'Font Weight',
    copy: 'Copy CSS',
    step1: 'Adjust the letter spacing slider to change tracking',
    step2: 'Switch between px, em, rem, % units using the toggle',
    step3: 'Change base font size to see how em/rem units scale',
    step4: 'Click Copy CSS to get the ready-to-paste code',
  },
  zh: {
    toolTitle: '字间距生成器',
    toolDesc: '免费 CSS 字间距生成器，支持实时预览。以 px、em、rem、% 调整字距 — 预览标题、正文和按钮，生成可直接复制的 CSS。',
    lblSpacing: '字间距',
    lblFontSize: '基础字号',
    lblFontWeight: '字重',
    copy: '复制 CSS',
    step1: '拖动字间距滑块改变字符间距',
    step2: '使用切换按钮在 px、em、rem、% 单位间切换',
    step3: '改变基础字号查看 em/rem 单位如何缩放',
    step4: '点击「复制 CSS」获取可直接粘贴的代码',
  }
});

let unit = 'em';
const { $, copyText, t } = GZ;

function getSpacingPx() {
  return parseFloat($('#spacingRange').value) / 10; // slider value /10 = px
}

function getFontSize() {
  return parseInt($('#fontSizeRange').value);
}

function getFontWeight() {
  return parseInt($('#fontWeightRange').value);
}

function formatSpacing(px) {
  const fontSize = getFontSize();
  switch (unit) {
    case 'px': return px.toFixed(1) + 'px';
    case 'em': return (px / fontSize).toFixed(3) + 'em';
    case 'rem': return (px / 16).toFixed(3) + 'rem';
    case '%': return ((px / fontSize) * 100).toFixed(1) + '%';
  }
}

function update() {
  const px = getSpacingPx();
  const fontSize = getFontSize();
  const weight = getFontWeight();
  const cssSpacing = formatSpacing(px);

  $('#spacingVal').textContent = cssSpacing;
  $('#fontSizeVal').textContent = fontSize + 'px';
  $('#fontWeightVal').textContent = weight;

  // Apply to preview
  $('#pH1').style.letterSpacing = px + 'px';
  $('#pH1').style.fontWeight = weight;
  $('#pBody').style.letterSpacing = px + 'px';
  $('#pBtn').style.letterSpacing = px + 'px';
  $('#pBtn').style.fontWeight = weight;

  // Generate CSS code
  const cssPx = px.toFixed(1) + 'px';
  const cssEm = (px / fontSize).toFixed(3) + 'em';
  const cssRem = (px / 16).toFixed(3) + 'rem';
  const cssPct = ((px / fontSize) * 100).toFixed(1) + '%';

  $('#codeOutput').textContent =
`/* Letter Spacing CSS */
letter-spacing: ${cssSpacing};

/* All unit equivalents (base font: ${fontSize}px) */
/* letter-spacing: ${cssPx}; */
/* letter-spacing: ${cssEm}; */
/* letter-spacing: ${cssRem}; */
/* letter-spacing: ${cssPct}; */`;
}

$('#spacingRange').addEventListener('input', update);
$('#fontSizeRange').addEventListener('input', update);
$('#fontWeightRange').addEventListener('input', update);

function setUnit(u) {
  unit = u;
  document.querySelectorAll('#unitToggle button').forEach(b => {
    b.classList.toggle('active', b.dataset.unit === u);
  });
  update();
}

$('#unitToggle').innerHTML = ['px','em','rem','%'].map(u =>
  `<button data-unit="${u}" class="${u==='em'?'active':''}">${u}</button>`
).join('');

$('#unitToggle').addEventListener('click', (e) => {
  if (e.target.dataset.unit) setUnit(e.target.dataset.unit);
});

$('#toolbar').innerHTML = `<button class="gz-btn" onclick="copyText(document.getElementById('codeOutput').textContent)">📋 ${t('copy')}</button>`;

GZ.renderToolPage({
  category: 'css-tools',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📏', href:'/css-tools/line-height.html', name:'Line Height'},
    {icon:'🔤', href:'/css-tools/font-pair.html', name:'Font Pairs'},
    {icon:'📐', href:'/css-tools/em-px.html', name:'EM to PX'},
    {icon:'✨', href:'/css-tools/text-shadow.html', name:'Text Shadow'},
  ]
});

update();
</script>
