const { $, copyText, t } = GZ;

function escapePropValue(str, unicode) {
  let s = String(str);
  s = s.replace(/\\/g, '\\\\');
  s = s.replace(/\n/g, '\\n');
  s = s.replace(/\r/g, '\\r');
  s = s.replace(/\t/g, '\\t');
  if (unicode) {
    s = s.replace(/[\u0080-\uFFFF]/g, ch => {
      const code = ch.charCodeAt(0);
      return '\\u' + code.toString(16).padStart(4, '0').toUpperCase();
    });
  }
  return s;
}

function escapePropKey(str, unicode) {
  let s = String(str);
  s = s.replace(/\\/g, '\\\\');
  s = s.replace(/[=: \t#]/g, ch => '\\' + ch);
  if (unicode) {
    s = s.replace(/[\u0080-\uFFFF]/g, ch => {
      const code = ch.charCodeAt(0);
      return '\\u' + code.toString(16).padStart(4, '0').toUpperCase();
    });
  }
  return s;
}

function flatten(obj, prefix, arrayStyle, unicode, out) {
  if (obj === null) {
    out[prefix] = '';
  } else if (Array.isArray(obj)) {
    obj.forEach((item, i) => {
      const key = prefix + (arrayStyle === 'bracket' ? `[${i}]` : '.' + i);
      flatten(item, key, arrayStyle, unicode, out);
    });
  } else if (typeof obj === 'object') {
    const keys = Object.keys(obj);
    keys.forEach(k => {
      const key = prefix ? prefix + '.' + k : k;
      flatten(obj[k], key, arrayStyle, unicode, out);
    });
  } else {
    // primitive
    out[prefix] = obj;
  }
}

function convert() {
  const inp = $('#input').value.trim();
  if (!inp) return;
  let obj;
  try {
    obj = JSON.parse(inp);
  } catch (e) {
    $('#status').innerHTML = `<span style="color:var(--gz-accent)">${t('invalid')}: ${escapeHtml(e.message)}</span>`;
    $('#output').textContent = '';
    return;
  }
  const arrayStyle = document.querySelector('input[name="arrayStyle"]:checked').value;
  const unicode = $('#unicodeEscape').checked;
  const sort = $('#sortKeys').checked;

  const flat = {};
  flatten(obj, '', arrayStyle, unicode, flat);

  let keys = Object.keys(flat);
  if (sort) keys = keys.sort();

  const lines = keys.map(k => escapePropKey(k, unicode) + '=' + escapePropValue(flat[k], unicode));
  const result = lines.join('\n');
  $('#output').textContent = result;
  $('#status').innerHTML = `<span style="color:var(--gz-success)">${t('valid', keys.length)}</span>`;
  window._result = result;
}

function escapeHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function loadExample() {
  $('#input').value = JSON.stringify({
    app: { name: 'MyApp', version: '2.1.0', debug: true },
    server: { host: 'localhost', port: 8080, timeout: 30000 },
    database: { url: 'jdbc:postgresql://db:5432/app', pool: { min: 5, max: 20 } },
    features: ['auth', 'logging', 'cache'],
    message: 'Hello 世界'
  }, null, 2);
  convert();
}

function downloadResult() {
  if (!window._result) return;
  const blob = new Blob([window._result], { type: 'text/plain' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'config.properties';
  a.click();
  URL.revokeObjectURL(a.href);
}

function doClear() { $('#input').value = ''; $('#output').textContent = ''; $('#status').innerHTML = ''; window._result = ''; }

$('#lbl-dot').textContent = t('lblDot');
$('#lbl-bracket').textContent = t('lblBracket');
$('#lbl-unicode').textContent = t('lblUnicode');
$('#lbl-sort').textContent = t('lblSort');
$('#lbl-in').textContent = t('lblIn');
$('#lbl-out').textContent = t('lblOut');

$('#input').addEventListener('input', convert);

$('#toolbar').innerHTML = `

  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="downloadResult()">${t('download')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
