<script>
GZI18n.register({
  en: {
    toolTitle: 'Add Line Numbers to Text',
    toolDesc: 'Add line numbers to any text instantly. Customize the start number, step, separator, zero-padding and whether to number empty lines. Free, private, browser-only.',
    inputLabel: 'Input Text',
    outputLabel: 'Numbered Output',
    start: 'Start',
    step: 'Step',
    separator: 'Separator',
    pad: 'Pad',
    numberEmpty: 'Number empty lines',
    example: 'Example',
    copy: 'Copy',
    clear: 'Clear',
    result: (n) => `✓ Numbered ${n} lines`,
    step1: 'Paste your text into the input area',
    step2: 'Set the start number and step',
    step3: 'Pick a separator and optional zero-padding',
    step4: 'Click Copy to copy the numbered result',
  },
  zh: {
    toolTitle: '为文本添加行号',
    toolDesc: '即时为任意文本添加行号。可自定义起始数字、步长、分隔符、零填充，以及是否为空行编号。免费、私密、浏览器本地运行。',
    inputLabel: '输入文本',
    outputLabel: '带行号结果',
    start: '起始',
    step: '步长',
    separator: '分隔符',
    pad: '填充',
    numberEmpty: '为空行编号',
    example: '示例',
    copy: '复制',
    clear: '清空',
    result: (n) => `✓ 已为 ${n} 行编号`,
    step1: '在输入区粘贴文本',
    step2: '设置起始数字和步长',
    step3: '选择分隔符和可选的零填充',
    step4: '点击「复制」将带行号的结果复制到剪贴板',
  }
});

let startNum = 1;
let step = 1;
let sep = '. ';
let padWidth = 0;
let doNumberEmpty = true;
const { $, copyText, t } = GZ;

function pad(num) {
  const s = String(num);
  if (padWidth > s.length) return '0'.repeat(padWidth - s.length) + s;
  return s;
}

function doNumber() {
  const raw = $('#input').value;
  if (!raw) { $('#output').textContent = ''; $('#status').innerHTML = ''; return; }
  // preserve trailing newline by splitting carefully
  const hasTrailingNL = /\n$/.test(raw);
  let lines = raw.split(/\r?\n/);
  if (hasTrailingNL) lines.pop();
  let n = startNum;
  const out = lines.map(line => {
    const isEmpty = line.trim() === '';
    if (isEmpty && !doNumberEmpty) return line;
    const prefix = pad(n) + sep;
    n += step;
    return prefix + line;
  });
  $('#output').textContent = out.join('\n');
  $('#status').innerHTML = `<span style="color:var(--gz-success)">${t('result', lines.length)}</span>`;
}

function loadExample() {
  $('#input').value = 'function greet(name) {\n  console.log("Hello, " + name);\n}\n\ngreet("World");';
  doNumber();
}

function doClear() { $('#input').value = ''; $('#output').textContent = ''; $('#status').innerHTML = ''; }

$('#input').addEventListener('input', doNumber);

$('#controls').innerHTML = `
  <label>${t('start')}: <input type="number" id="startInput" value="1" oninput="startNum=+this.value||0;doNumber()"></label>
  <label>${t('step')}: <input type="number" id="stepInput" value="1" oninput="step=+this.value||1;doNumber()"></label>
  <label>${t('separator')}: <input type="text" id="sepInput" value=". " style="width:60px" oninput="sep=this.value;doNumber()"></label>
  <label>${t('pad')}: <input type="number" id="padInput" value="0" min="0" max="10" oninput="padWidth=+this.value||0;doNumber()"></label>
  <label><input type="checkbox" id="emptyChk" checked onchange="doNumberEmpty=this.checked;doNumber()"> ${t('numberEmpty')}</label>`;

$('#toolbar').innerHTML = `
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

$('#lbl-in').textContent = t('inputLabel');
$('#lbl-out').textContent = t('outputLabel');

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🧹', href:'/text/remove-empty-lines.html', name:'Remove Empty Lines'},
    {icon:'➕', href:'/text/add-prefix-suffix.html', name:'Add Prefix/Suffix'},
    {icon:'↕️', href:'/text/sort-lines.html', name:'Sort Lines'},
    {icon:'🔢', href:'/text/line-counter.html', name:'Line Counter'},
  ]
});
</script>
