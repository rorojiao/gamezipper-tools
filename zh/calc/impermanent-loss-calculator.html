<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"What is impermanent loss?","acceptedAnswer":{"@type":"Answer","text":"Impermanent loss is the difference between the value of assets held in an AMM liquidity pool and the value they would have had if simply held in your wallet. It arises when the token price ratio changes."}},{"@type":"Question","name":"How is impermanent loss calculated?","acceptedAnswer":{"@type":"Answer","text":"For a standard 50/50 constant-product pool, IL = 2 × √r ÷ (1 + r) − 1, where r is the new price ratio divided by the initial price ratio."}},{"@type":"Question","name":"Can trading fees offset impermanent loss?","acceptedAnswer":{"@type":"Answer","text":"Yes. Fees and liquidity incentives can offset the loss. The calculator shows the minimum fee return required for the LP position to catch up with HODL at the selected price ratio."}},{"@type":"Question","name":"Does the calculator support concentrated liquidity?","acceptedAnswer":{"@type":"Answer","text":"No. This model is for a full-range 50/50 constant-product AMM. Concentrated liquidity, weighted pools, token emissions and range exits require additional assumptions."}}]}</script>

<script>
GZI18n.register({"en":{"toolTitle":"Impermanent Loss Calculator","toolDesc":"Compare a 50/50 AMM liquidity-pool position with simply holding after any token price move.","investment":"Initial position value","initialPrice":"Initial token price","newPrice":"New token price","feeReturn":"LP fees/rewards earned (%)","priceChange":"Token price change","ilPercent":"Impermanent loss","lossAmount":"Loss vs HODL","hodlValue":"HODL value","lpValue":"LP value incl. fees","breakEven":"Fee return to break even","reset":"Reset","scenarios":"Price-move scenarios","move":"Price move","ratio":"Price ratio","il":"IL","note":"Model: standard full-range 50/50 constant-product AMM. It excludes concentrated liquidity ranges, slippage, gas, taxes and changing pool weights.","step1":"Enter the initial investment and the token’s initial price","step2":"Enter its new price and any LP fees or incentives earned","step3":"Compare the LP position value with the HODL alternative","step4":"Review impermanent loss and the fee return needed to break even"},"zh":{"toolTitle":"无常损失计算器","toolDesc":"比较任意币价变化后，50/50 AMM 流动性池仓位与单纯持币策略的价值。","investment":"初始仓位价值","initialPrice":"代币初始价格","newPrice":"代币新价格","feeReturn":"LP 手续费/激励收益（%）","priceChange":"代币价格变化","ilPercent":"无常损失","lossAmount":"相对持币的损失","hodlValue":"持币价值","lpValue":"含手续费的 LP 价值","breakEven":"回本所需手续费收益","reset":"重置","scenarios":"价格变化情景","move":"价格变化","ratio":"价格比","il":"无常损失","note":"模型：标准全区间 50/50 恒定乘积 AMM。未计入集中流动性区间、滑点、Gas、税费和池权重变化。","step1":"输入初始投入金额和代币初始价格","step2":"输入新价格以及已赚取的 LP 手续费或激励","step3":"比较 LP 仓位价值与持币替代方案","step4":"查看无常损失和回本所需手续费收益"}});
const { $, t } = GZ;
function text(id,key){const el=$(id);if(el)el.textContent=t(key)}
function num(id,fallback=0){const n=parseFloat($(id).value);return Number.isFinite(n)?n:fallback}
function money(n,currency){try{return new Intl.NumberFormat(undefined,{style:'currency',currency:currency||'USD',maximumFractionDigits:Math.abs(n)<1?8:2}).format(n)}catch(e){return (currency||'$')+' '+n.toLocaleString(undefined,{maximumFractionDigits:8})}}

[['#l-invest','investment'],['#l-initial','initialPrice'],['#l-new','newPrice'],['#l-fees','feeReturn'],['#k-change','priceChange'],['#k-il','ilPercent'],['#k-loss','lossAmount'],['#k-hodl','hodlValue'],['#k-lp','lpValue'],['#k-break','breakEven'],['#reset','reset'],['#scenarios','scenarios'],['#th-move','move'],['#th-ratio','ratio'],['#th-il','il'],['#note','note']].forEach(x=>text(...x));
function ilFor(r){return 2*Math.sqrt(r)/(1+r)-1}
function calculate(){const invest=Math.max(0,num('#investment')),initial=Math.max(1e-12,num('#initial',1)),now=Math.max(1e-12,num('#newprice',1)),fees=Math.max(0,num('#fees'))/100,r=now/initial,il=ilFor(r),hodl=invest*(1+r)/2,lpBase=invest*Math.sqrt(r),lp=lpBase*(1+fees),loss=hodl-lp,breakEven=hodl/lpBase-1;$('#v-change').textContent=((r-1)*100).toFixed(2)+'%';$('#v-il').textContent=(il*100).toFixed(4)+'%';$('#v-loss').textContent=loss.toLocaleString(undefined,{maximumFractionDigits:2});$('#v-hodl').textContent=hodl.toLocaleString(undefined,{maximumFractionDigits:2});$('#v-lp').textContent=lp.toLocaleString(undefined,{maximumFractionDigits:2});$('#v-break').textContent=(breakEven*100).toFixed(4)+'%';const moves=[-90,-75,-50,-25,25,50,100,200,400];$('#rows').innerHTML=moves.map(m=>{const x=1+m/100;return '<tr><td>'+((m>0?'+':'')+m)+'%</td><td>'+x.toFixed(2)+'×</td><td>'+(ilFor(x)*100).toFixed(4)+'%</td></tr>'}).join('')}
['#investment','#initial','#newprice','#fees'].forEach(id=>$(id).addEventListener('input',calculate));$('#reset').onclick=()=>{$('#investment').value=10000;$('#initial').value=100;$('#newprice').value=200;$('#fees').value=2;calculate()};calculate();

GZ.renderToolPage({category:'calc',titleKey:'toolTitle',descKey:'toolDesc',howToSteps:['step1','step2','step3','step4'],related:[{"icon":"🪙","href":"/calc/staking-yield-calculator.html","name":"Staking Yield Calculator"},{"icon":"📈","href":"/calc/crypto-profit-calculator.html","name":"Crypto Profit Calculator"},{"icon":"🔁","href":"/calc/crypto-dca-calculator.html","name":"Crypto DCA Calculator"},{"icon":"⛽","href":"/calc/gas-fee-estimator.html","name":"Gas Fee Estimator"}]});
</script>
