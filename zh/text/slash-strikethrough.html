    toolDesc: 'Add a forward slash through every character for a unique ̸c̸r̸o̸s̸s̸e̸d̸-̸o̸u̸t̸ look. Copy & paste to Facebook, Twitter, Discord and Reddit — works everywhere.',

    step4: 'Paste it into Facebook, Twitter, Discord or Reddit',
  },
  zh: {
    toolTitle: '斜线删除线文字生成器',
    toolDesc: '为每个字符添加斜线，打造独特的 ̸删̸除̸效̸果̸。一键复制粘贴到 Facebook、Twitter、Discord 和 Reddit，全平台通用。',
    lblIn: '输入或粘贴你的文字',
    lblOut: '斜线样式（点击复制）',
    clear: '清空',
    copy: '复制',
    copied: '✓ 已复制！',
    sampleText: '斜线文字',
    singleLabel: '单斜线',
    doubleLabel: '双斜线',
    longLabel: '长斜线',
    backslashLabel: '反斜线',
    step1: '在输入框中输入或粘贴文字',
    step2: '浏览各种斜线删除线样式',
    step3: '点击所需样式旁的「复制」按钮',
    step4: '粘贴到 Facebook、Twitter、Discord 或 Reddit',
  }
});

const { $, copyText, t } = GZ;

// Combining marks
const SOLIDUS_LONG = '\u0338';        // long solidus overlay (forward slash)
const SOLIDUS_SHORT = '\u0337';       // short solidus overlay
const REVERSE_SOLIDUS = '\u0339';     // reverse solidus overlay (backslash)

function applyMark(str, mark){
  let out='';
  for(const ch of str){ out += ch + mark; }
  return out;
}

function render(){
  const input = $('#input').value || t('sampleText');
  const styles = [
    {label: t('singleLabel'),  result: applyMark(input, SOLIDUS_SHORT)},
    {label: t('longLabel'),    result: applyMark(input, SOLIDUS_LONG)},
    {label: t('doubleLabel'),  result: applyMark(applyMark(input, SOLIDUS_LONG), SOLIDUS_SHORT)},
    {label: t('backslashLabel'), result: applyMark(input, REVERSE_SOLIDUS)},
  ];
  let html='';
  for(const s of styles){
    html += `<div class="result-row"><span class="label">${escapeHtml(s.label)}</span><span class="out">${escapeHtml(s.result)}</span><button class="gz-btn gz-btn-tool copy-btn" data-text="${escapeAttr(s.result)}">${t('copy')}</button></div>`;
  }
  $('#output').innerHTML = html;
  $('#output').querySelectorAll('.copy-btn').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      copyText(btn.dataset.text);
      const orig = btn.textContent;
      btn.textContent = t('copied');
      setTimeout(()=>{btn.textContent = orig;}, 1200);
    });
  });
}

function escapeHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function escapeAttr(s){return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

$('#input').addEventListener('input', render);

$('#toolbar').innerHTML = `<button class="gz-btn" id="btn-clear">${t('clear')}</button>`;
$('#btn-clear').addEventListener('click', ()=>{$('#input').value='';render();$('#input').focus();});

render();

GZ.renderToolPage({

  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],

});
