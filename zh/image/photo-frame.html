const { $, t } = GZ;

let photoImg = null;

function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);
  ctx.arcTo(x,y,x+w,y,r);
  ctx.closePath();
}

function drawPhotoCover(ctx,img,dx,dy,dw,dh,radius){
  ctx.save();
  if(radius>0){
    roundRect(ctx,dx,dy,dw,dh,radius);ctx.clip();
  } else {
    ctx.beginPath();ctx.rect(dx,dy,dw,dh);ctx.clip();
  }
  if(img){
    const s=Math.max(dw/img.width, dh/img.height);
    const sw=img.width*s, sh=img.height*s;
    ctx.drawImage(img, dx+(dw-sw)/2, dy+(dh-sh)/2, sw, sh);
  } else {
    // Placeholder gradient
    const g=ctx.createLinearGradient(dx,dy,dx+dw,dy+dh);
    g.addColorStop(0,'#667eea');g.addColorStop(1,'#764ba2');
    ctx.fillStyle=g;ctx.fillRect(dx,dy,dw,dh);
    ctx.fillStyle='rgba(255,255,255,0.7)';
    ctx.font='24px Arial';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('No photo', dx+dw/2, dy+dh/2);
  }
  ctx.restore();
}

function render(){
  const c=$('#canvas'),ctx=c.getContext('2d');
  const W=c.width,H=c.height;
  const frame=$('#frame').value;
  const fcolor=$('#frameColor').value;
  const bg=$('#bgColor').value;
  const caption=$('#caption').value;

  // BG
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);

  if(frame==='polaroid'){
    const fw=Math.min(W,H)*0.78, fh=fw*1.18;
    const fx=(W-fw)/2, fy=(H-fh)/2;
    // Polaroid card
    ctx.fillStyle=fcolor;
    ctx.shadowColor='rgba(0,0,0,0.4)';ctx.shadowBlur=20;ctx.shadowOffsetY=8;
    roundRect(ctx,fx,fy,fw,fh,4);ctx.fill();
    ctx.shadowColor='transparent';ctx.shadowBlur=0;ctx.shadowOffsetY=0;
    // Photo area
    const pad=fw*0.06;
    const photoH=fh*0.78;
    drawPhotoCover(ctx,photoImg,fx+pad,fy+pad,fw-pad*2,photoH,0);
    // Caption
    if(caption){
      ctx.fillStyle='#333';
      ctx.font=`italic 400 ${fw*0.075}px 'Bradley Hand', 'Comic Sans MS', cursive`;
      ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(caption, W/2, fy+photoH+pad*2+fh*0.06);
    }
  } else if(frame==='instant'){
    const fw=Math.min(W,H)*0.82, fh=fw;
    const fx=(W-fw)/2, fy=(H-fh)/2;
    ctx.fillStyle=fcolor;
    ctx.shadowColor='rgba(0,0,0,0.4)';ctx.shadowBlur=20;ctx.shadowOffsetY=8;
    roundRect(ctx,fx,fy,fw,fh,4);ctx.fill();
    ctx.shadowColor='transparent';
    const pad=fw*0.07;
    const photoSize=fw-pad*2;
    const ph=fh*0.78;
    drawPhotoCover(ctx,photoImg,fx+pad,fy+pad,photoSize,ph,0);
    if(caption){
      ctx.fillStyle='#333';
      ctx.font=`italic 400 ${fw*0.06}px cursive`;
      ctx.textAlign='center';
      ctx.fillText(caption, W/2, fy+ph+pad*2+fh*0.08);
    }
  } else if(frame==='vintage'){
    const fw=Math.min(W,H)*0.8, fx=(W-fw)/2, fy=(H-fw)/2;
    ctx.fillStyle=fcolor;
    ctx.shadowColor='rgba(0,0,0,0.4)';ctx.shadowBlur=20;ctx.shadowOffsetY=8;
    roundRect(ctx,fx,fy,fw,fw,4);ctx.fill();
    ctx.shadowColor='transparent';
    const pad=fw*0.05;
    const sz=fw-pad*2;
    drawPhotoCover(ctx,photoImg,fx+pad,fy+pad,sz,sz,0);
    // Sepia overlay
    ctx.save();roundRect(ctx,fx+pad,fy+pad,sz,sz,0);ctx.clip();
    ctx.fillStyle='rgba(112,66,20,0.25)';ctx.fillRect(fx+pad,fy+pad,sz,sz);
    // Vignette
    const vg=ctx.createRadialGradient(W/2,H/2,sz*0.3,W/2,H/2,sz*0.75);
    vg.addColorStop(0,'rgba(0,0,0,0)');vg.addColorStop(1,'rgba(0,0,0,0.55)');
    ctx.fillStyle=vg;ctx.fillRect(fx+pad,fy+pad,sz,sz);
    ctx.restore();
    // Scratches
    ctx.strokeStyle='rgba(255,255,255,0.15)';ctx.lineWidth=1;
    for(let i=0;i<8;i++){
      ctx.beginPath();
      ctx.moveTo(fx+Math.random()*fw, fy+Math.random()*fw);
      ctx.lineTo(fx+Math.random()*fw, fy+Math.random()*fw);
      ctx.stroke();
    }
  } else if(frame==='gallery'){
    const fw=Math.min(W,H)*0.86, fx=(W-fw)/2, fy=(H-fw)/2;
    // Outer wood/gold frame
    ctx.fillStyle=fcolor;
    ctx.shadowColor='rgba(0,0,0,0.4)';ctx.shadowBlur=25;ctx.shadowOffsetY=10;
    roundRect(ctx,fx,fy,fw,fw,2);ctx.fill();
    ctx.shadowColor='transparent';
    // Inner mat (white)
    const mp=fw*0.08;
    ctx.fillStyle='#f8f6f0';
    roundRect(ctx,fx+mp,fy+mp,fw-mp*2,fw-mp*2,2);ctx.fill();
    // Photo
    const pp=fw*0.18;
    const sz=fw-pp*2;
    drawPhotoCover(ctx,photoImg,fx+pp,fy+pp,sz,sz,0);
    // Inner shadow
    ctx.strokeStyle='rgba(0,0,0,0.2)';ctx.lineWidth=4;
    roundRect(ctx,fx+pp-2,fy+pp-2,sz+4,sz+4,0);ctx.stroke();
  } else if(frame==='washi'){
    // Paper on desk
    const fw=Math.min(W,H)*0.78, fx=(W-fw)/2, fy=(H-fw)/2;
    ctx.save();
    ctx.translate(W/2,H/2);ctx.rotate(-0.04);ctx.translate(-W/2,-H/2);
    ctx.fillStyle=fcolor;
    ctx.shadowColor='rgba(0,0,0,0.35)';ctx.shadowBlur=15;ctx.shadowOffsetY=6;
    const newX=(W-fw)/2, newY=(H-fw)/2;
    roundRect(ctx,newX,newY,fw,fw,4);ctx.fill();
    ctx.shadowColor='transparent';
    const pad=fw*0.04;
    const sz=fw-pad*2;
    drawPhotoCover(ctx,photoImg,newX+pad,newY+pad,sz,sz,0);
    ctx.restore();
    // Washi tape strips
    ctx.fillStyle='rgba(255,182,193,0.85)'; // pink
    ctx.save();ctx.translate(W/2,H/2);ctx.rotate(0.05);
    ctx.fillRect(-fw*0.4,-fw*0.46,fw*0.35,28);
    ctx.restore();
    ctx.fillStyle='rgba(173,216,230,0.85)'; // blue
    ctx.save();ctx.translate(W/2,H/2);ctx.rotate(-0.08);
    ctx.fillRect(fw*0.05,-fw*0.46,fw*0.32,28);
    ctx.restore();
    // Tape pattern
    ctx.strokeStyle='rgba(255,255,255,0.25)';ctx.lineWidth=1;
    ctx.save();ctx.translate(W/2,H/2);ctx.rotate(0.05);
    for(let x=-fw*0.4;x<-fw*0.05;x+=6){ctx.beginPath();ctx.moveTo(x,-fw*0.46);ctx.lineTo(x,-fw*0.46+28);ctx.stroke();}
    ctx.restore();
  } else if(frame==='rounded'){
    const fw=Math.min(W,H)*0.82, fx=(W-fw)/2, fy=(H-fw)/2;
    const r=fw*0.06;
    ctx.fillStyle=fcolor;
    ctx.shadowColor='rgba(0,0,0,0.3)';ctx.shadowBlur=18;ctx.shadowOffsetY=8;
    roundRect(ctx,fx,fy,fw,fw,r);ctx.fill();
    ctx.shadowColor='transparent';
    const pad=fw*0.03;
    const sz=fw-pad*2;
    drawPhotoCover(ctx,photoImg,fx+pad,fy+pad,sz,sz,r-pad);
  }
}

function downloadPNG(){
  const link=document.createElement('a');
  link.download='framed-photo.png';
  link.href=$('#canvas').toDataURL('image/png');
  link.click();
}

function loadFile(file){
  if(!file)return;
  const r=new FileReader();
  r.onload=ev=>{
    const img=new Image();
    img.onload=()=>{photoImg=img;document.getElementById('drop-text').textContent=t('dropLoaded');render();};
    img.src=ev.target.result;
  };
  r.readAsDataURL(file);
}

$('#lbl-upload').textContent=t('lblUpload');
$('#lbl-frame').textContent=t('lblFrame');
$('#lbl-color').textContent=t('lblColor');
$('#lbl-caption').textContent=t('lblCaption');
$('#lbl-bg').textContent=t('lblBg');
document.getElementById('drop-text').textContent=t('dropHint');

const drop=$('#drop'),fileInput=$('#file');
drop.addEventListener('click',()=>fileInput.click());
fileInput.addEventListener('change',e=>loadFile(e.target.files[0]));
['dragover','dragenter'].forEach(ev=>drop.addEventListener(ev,e=>{e.preventDefault();drop.classList.add('drag');}));
['dragleave','drop'].forEach(ev=>drop.addEventListener(ev,e=>{e.preventDefault();drop.classList.remove('drag');}));
drop.addEventListener('drop',e=>loadFile(e.dataTransfer.files[0]));

['frame','frameColor','caption','bgColor'].forEach(id=>$('#'+id).addEventListener('input',render));

render();

$('#toolbar').innerHTML=`
  <button class="gz-btn" onclick="downloadPNG()">${t('download')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="photoImg=null;document.getElementById('drop-text').textContent=t('dropHint');render()">${t('clearPhoto')}</button>`;

    {icon:'✏️', href:'/image/pencil-sketch.html', name:'Pencil Sketch'},
