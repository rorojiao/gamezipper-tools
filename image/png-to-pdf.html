<div class="gz-container">

<script>
GZI18n.register({
  en:{toolTitle:'PNG to PDF Converter',toolDesc:'Convert PNG, JPG and WebP images to PDF online. Merge multiple images into one multi-page PDF — free, no upload, no signup.',
    s1:'Select or drag images (PNG, JPG, WebP)',s2:'Choose page size and orientation',
    s3:'Reorder pages if needed using up/down buttons',s4:'Click Generate PDF to download',
    dropHint:'Drop images here or click to upload',
    pageSizeL:'Page size:',orientL:'Orientation:',
    fitToImg:'Fit to image',portrait:'Portrait',landscape:'Landscape',
    files:'images',reset:'↩️ Reset',genPDF:'📄 Generate PDF',
    moveUp:'↑',moveDown:'↓',
    rImageToPdf:'Image to PDF',rJpgToPdf:'JPG to PDF',rPdfMerger:'PDF Merger',rImageConverter:'Image Converter'},
  zh:{toolTitle:'PNG 转 PDF 转换器',toolDesc:'将 PNG、JPG、WebP 图片在线转为 PDF。多张图片可合并为一份多页 PDF — 免费，无需上传。',
    s1:'选择或拖放图片（PNG、JPG、WebP）',s2:'选择页面尺寸和方向',
    s3:'按需使用上/下按钮调整页面顺序',s4:'点击「生成 PDF」下载',
    dropHint:'拖放图片到此处或点击上传',
    pageSizeL:'页面大小：',orientL:'方向：',
    fitToImg:'适应图片',portrait:'纵向',landscape:'横向',
    files:'张图片',reset:'↩️ 重置',genPDF:'📄 生成 PDF',
    moveUp:'↑',moveDown:'↓',
    rImageToPdf:'图片转 PDF',rJpgToPdf:'JPG 转 PDF',rPdfMerger:'PDF 合并',rImageConverter:'图片格式转换'}
});
const {t}=GZI18n;
let files=[];
document.getElementById('dropText').textContent=t('dropHint');
document.getElementById('pageSizeLabel').textContent=t('pageSizeL');
document.getElementById('orientLabel').textContent=t('orientL');
document.getElementById('fitOpt').textContent=t('fitToImg');
document.getElementById('orientP').textContent=t('portrait');
document.getElementById('orientL').textContent=t('landscape');
document.getElementById('genBtn').textContent=t('genPDF');
const dz=document.getElementById('dropzone'),fi=document.getElementById('fileIn');
dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('drag-over')});
dz.addEventListener('dragleave',()=>dz.classList.remove('drag-over'));
dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('drag-over');handleFiles(e.dataTransfer.files)});
fi.addEventListener('change',e=>{handleFiles(e.target.files)});
function handleFiles(fl){const newFiles=Array.from(fl).filter(f=>f.type.startsWith('image/'));if(!newFiles.length)return;files=files.concat(newFiles);document.getElementById('controls').style.display='block';dz.style.display='none';renderList();updateSummary()}
function fmt(b){return b>1048576?(b/1048576).toFixed(1)+' MB':(b/1024).toFixed(1)+' KB'}
function renderList(){const r=document.getElementById('results');r.innerHTML='';files.forEach((f,i)=>{const card=document.createElement('div');card.className='result-card';const url=URL.createObjectURL(f);card.innerHTML=`<img src="${url}"><div class="meta"><div class="name">${f.name}</div><div class="size">${fmt(f.size)}</div></div><div class="reorder"><button onclick="moveItem(${i},-1)" title="${t('moveUp')}">↑</button><button onclick="moveItem(${i},1)" title="${t('moveDown')}">↓</button><button onclick="removeItem(${i})" style="color:var(--gz-accent)" title="Remove">✕</button></div>`;r.appendChild(card)})}
function moveItem(i,dir){const j=i+dir;if(j<0||j>=files.length)return;[files[i],files[j]]=[files[j],files[i]];renderList()}
function removeItem(i){files.splice(i,1);if(!files.length){resetTool();return}renderList();updateSummary()}
function updateSummary(){document.getElementById('summary').innerHTML=`<span class="num">${files.length}</span> ${t('files')}`}
function generatePDF(){
  if(!files.length)return;
  const ps=document.getElementById('pageSize').value;
  const orient=document.getElementById('orient').value;
  document.getElementById('status').textContent='⏳ Generating...';
  // Load jsPDF dynamically
  if(typeof window.jspdf==='undefined'){
    const s=document.createElement('script');s.src='https://cdn.jsdelivr.net/npm/jspdf@2.5.2/dist/jspdf.umd.min.js';
    s.onload=()=>doGeneratePDF(ps,orient);
    s.onerror=()=>{document.getElementById('status').innerHTML='<span style="color:var(--gz-accent)">⚠ Failed to load PDF library. Check your connection.</span>'};
    document.head.appendChild(s);
  }else{doGeneratePDF(ps,orient)}
}
function doGeneratePDF(ps,orient){
  const {jsPDF}=window.jspdf;
  const PAGE_DIMS={a4:'a4',letter:'letter',legal:'legal'};
  let pdf;
  const images=files.map(f=>({url:URL.createObjectURL(f),name:f.name}));
  let processed=0;
  images.forEach((info,i)=>{
    const img=new Image();
    img.onload=()=>{
      const c=document.createElement('canvas');c.width=img.width;c.height=img.height;
      c.getContext('2d').drawImage(img,0,0);
      const dataURL=c.toDataURL('image/jpeg',0.92);
      if(ps==='fit'){
        if(i===0)pdf=new jsPDF({orientation:img.width>img.height?'l':'p',unit:'px',format:[img.width+40,img.height+40]});
        if(i>0)pdf.addPage([img.width+40,img.height+40],img.width>img.height?'l':'p');
        pdf.addImage(dataURL,'JPEG',20,20,img.width,img.height);
      }else{
        if(i===0)pdf=new jsPDF({orientation:orient,unit:'pt',format:PAGE_DIMS[ps]});
        if(i>0)pdf.addPage(PAGE_DIMS[ps],orient);
        const pageW=pdf.internal.pageSize.getWidth();
        const pageH=pdf.internal.pageSize.getHeight();
        const margin=28;const availW=pageW-margin*2,availH=pageH-margin*2;
        const scale=Math.min(availW/img.width,availH/img.height);
        const dw=img.width*scale,dh=img.height*scale;
        const dx=(pageW-dw)/2,dy=(pageH-dh)/2;
        pdf.addImage(dataURL,'JPEG',dx,dy,dw,dh);
      }
      processed++;
      if(processed===images.length){pdf.save('converted.pdf');document.getElementById('status').innerHTML='<span style="color:var(--gz-success)">✓ PDF generated and downloaded!</span>'}
    };
    img.src=info.url;
  });
}
function resetTool(){files=[];document.getElementById('controls').style.display='none';dz.style.display='block';fi.value='';document.getElementById('status').textContent=''}
GZ.renderToolPage({category:'image',titleKey:'toolTitle',descKey:'toolDesc',
  howToSteps:['s1','s2','s3','s4'],
  related:[
    {href:'/image/image-to-pdf.html',icon:'📄',nameKey:'rImageToPdf'},
    {href:'/image/converter.html',icon:'🔄',nameKey:'rImageConverter'},
    {href:'/pdf/pdf-merger.html',icon:'📎',nameKey:'rPdfMerger'},
    {href:'/image/image-to-jpg.html',icon:'🖼️',nameKey:'rJpgToPdf'}
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
