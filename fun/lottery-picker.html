<style>
.lotto-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:14px}
@media(max-width:640px){.lotto-grid{grid-template-columns:1fr}}
.lotto-field{background:var(--glass2);border:1px solid var(--border);border-radius:12px;padding:14px}
.lotto-field label{display:block;font-size:.85em;color:var(--text2);margin-bottom:6px}
.lotto-field select,.lotto-field input{width:100%;background:rgba(0,0,0,.3);border:1px solid var(--border);border-radius:8px;padding:8px 10px;color:var(--text);font-size:1em;font-family:monospace}
.balls-area{background:linear-gradient(135deg,rgba(78,205,196,.08),rgba(0,114,178,.08));border:1px solid var(--border);border-radius:16px;padding:24px;margin-top:18px;min-height:200px;display:flex;flex-direction:column;align-items:center;justify-content:center}
.balls-row{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-bottom:12px}
.ball{display:inline-flex;align-items:center;justify-content:center;width:54px;height:54px;border-radius:50%;background:linear-gradient(145deg,#fff,#e0e0e0);color:#000;font-weight:800;font-size:1.2em;box-shadow:0 4px 12px rgba(0,0,0,.4),inset 0 -2px 6px rgba(0,0,0,.2);font-family:'Arial Black',sans-serif;animation:pop .5s cubic-bezier(.68,-.55,.27,1.55)}
.ball.bonus{background:linear-gradient(145deg,#ffd93d,#ff8800);color:#000}
.ball.power{background:linear-gradient(145deg,#ff4444,#cc0000);color:#fff}
@keyframes pop{0%{transform:scale(0) rotate(180deg);opacity:0}100%{transform:scale(1) rotate(0);opacity:1}}
.history{background:var(--glass2);border:1px solid var(--border);border-radius:12px;padding:12px;margin-top:14px;max-height:200px;overflow:auto}
.history h4{margin:0 0 8px;font-size:.9rem;color:var(--text2)}
.history .row{padding:6px 0;border-bottom:1px solid var(--border);font-family:monospace;font-size:.85em;display:flex;justify-content:space-between}
.history .row:last-child{border-bottom:none}
.history .mini-ball{display:inline-block;background:rgba(255,255,255,.1);border-radius:50%;width:22px;height:22px;line-height:22px;text-align:center;font-size:.7em;margin:0 2px}
.tip{background:rgba(255,217,61,.1);border-left:3px solid #ffd93d;padding:10px 14px;border-radius:6px;font-size:.85em;margin-top:12px;color:var(--text2)}
</style>
<script type="application/ld+json">{"@context":"https://schema.org","@type":"WebApplication","name":"Lottery Number Picker","description":"Free online lottery number picker. Generate random lottery numbers for Powerball, Mega Millions, EuroMillions, UK Lotto, Keno and 20+ games. Cryptographic randomness, no signup.","url":"https://tools.gamezipper.com/fun/lottery-picker.html","applicationCategory":"Utility","operatingSystem":"Web Browser","offers":{"@type":"Offer","price":"0"}}</script>
<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "Is the lottery number generator truly random?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. The tool uses the browser's cryptographic random number generator (crypto.getRandomValues) to draw numbers, the same primitive used by online banking and security systems. Each draw is independent and uniformly distributed."}}, {"@type": "Question", "name": "Which lottery games are supported?", "acceptedAnswer": {"@type": "Answer", "text": "You can pick from 20+ presets including Powerball, Mega Millions, EuroMillions, EuroJackpot, UK Lotto, Keno, Pick 3/4/5, Daily Lotto and more — or define a custom game with any main pool and bonus ball range."}}, {"@type": "Question", "name": "Can I save the draws I generated?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. Every draw is kept in a history list at the bottom of the page. Each entry shows the timestamp, main numbers and bonus ball, and you can copy the row to your clipboard for safekeeping."}}, {"@type": "Question", "name": "Does this tool increase my chances of winning?", "acceptedAnswer": {"@type": "Answer", "text": "No. The probability of any specific draw is exactly the same as the probability of a quick-pick at a retail terminal. The tool is a fun, free alternative for picking numbers without paying for a ticket."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>

    <div class="lotto-grid">
      <div class="lotto-field">
        <label id="lblGame">Lottery Game</label>
        <select id="game"></select>
      </div>
      <div class="lotto-field">
        <label id="lblCount">Number of lines</label>
        <select id="count">
          <option value="1">1 line</option>
          <option value="3" selected>3 lines</option>
          <option value="5">5 lines</option>
          <option value="10">10 lines</option>
          <option value="20">20 lines</option>
        </select>
      </div>
    </div>

    <div class="lotto-grid">
      <div class="lotto-field">
        <label id="lblPool">Main pool (1 to ?)</label>
        <div class="row" style="display:flex;gap:8px"><input type="number" id="poolFrom" value="1" min="1"><span style="line-height:36px">→</span><input type="number" id="poolTo" value="69" min="2"><input type="number" id="pickN" value="5" min="1" placeholder="pick N"></div>
      </div>
      <div class="lotto-field">
        <label id="lblBonus">Bonus ball (optional)</label>
        <div class="row" style="display:flex;gap:8px"><input type="number" id="bonusFrom" value="1" min="1"><span style="line-height:36px">→</span><input type="number" id="bonusTo" value="26" min="1"><input type="number" id="bonusCount" value="1" min="0" placeholder="count"></div>
      </div>
    </div>

    <div class="balls-area" id="ballsArea">
      <div id="lines"></div>
    </div>

    <div class="tip" id="tip">🎲 Uses <code>crypto.getRandomValues</code> for true randomness. Click "Generate" to draw new lines.</div>

    <div class="history">
      <h4 id="histH">📜 History (this session)</h4>
      <div id="history"></div>
    </div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en:{toolTitle:'Lottery Number Picker',toolDesc:'Pick random lottery numbers for Powerball, Mega Millions, EuroMillions, UK Lotto, Keno and 20+ games. Cryptographic randomness, supports custom rules.',
    step1:'Choose a lottery game preset (or set custom main pool and bonus range)',step2:'Pick how many lines you want to generate',step3:'Click "Generate" to draw random numbers',step4:'Copy the result to your clipboard and check the history list',
    lblGame:'Lottery Game',lblCount:'Number of lines',lblPool:'Main pool (1 to ?)',lblBonus:'Bonus ball (optional)',
    histH:'📜 History (this session)',
    generate:'🎲 Generate',copy:'Copy all',clear:'Clear history',cryptoTip:'🎲 Uses crypto.getRandomValues for true randomness. Click "Generate" to draw new lines.'},
  zh:{toolTitle:'彩票号码生成器',toolDesc:'为 Powerball、Mega Millions、EuroMillions、英国彩票、Keno 等 20+ 彩票生成随机号码。加密学强度随机数，支持自定义规则。',
    step1:'选择彩票预设（或自定义主号码池和特别号范围）',step2:'选择要生成多少注',step3:'点击「生成」抽取随机号码',step4:'一键复制到剪贴板，并查看历史记录',
    lblGame:'彩票类型',lblCount:'注数',lblPool:'主号码池 (1 → ?)',lblBonus:'特别号 (可选)',
    histH:'📜 历史记录 (本次会话)',
    generate:'🎲 生成',copy:'复制全部',clear:'清空历史',cryptoTip:'🎲 使用 crypto.getRandomValues 生成真随机数。点击「生成」抽取新号码。'}
});

const GAMES=[
  {n:'Powerball (US)',main:[1,69,5],bonus:[1,26,1]},
  {n:'Mega Millions (US)',main:[1,70,5],bonus:[1,25,1]},
  {n:'EuroMillions',main:[1,50,5],bonus:[1,12,2]},
  {n:'EuroJackpot',main:[1,50,5],bonus:[1,12,2]},
  {n:'UK Lotto',main:[1,59,6],bonus:null},
  {n:'Lotto 6/49 (CA)',main:[1,49,6],bonus:[1,49,1]},
  {n:'Lotto Max (CA)',main:[1,50,7],bonus:null},
  {n:'SuperEnalotto (IT)',main:[1,90,6],bonus:[1,90,1]},
  {n:'El Gordo (ES)',main:[1,54,5],bonus:[1,10,1]},
  {n:'La Primitiva (ES)',main:[1,49,6],bonus:[1,49,1]},
  {n:'Lotto 6aus49 (DE)',main:[1,49,6],bonus:[1,9,1]},
  {n:'France Loto',main:[1,49,5],bonus:[1,10,1]},
  {n:'Daily Lotto (ZA)',main:[1,36,5],bonus:null},
  {n:'Oz Lotto (AU)',main:[1,47,7],bonus:[1,45,2]},
  {n:'Powerball (AU)',main:[1,35,7],bonus:[1,20,1]},
  {n:'Lotto (AU)',main:[1,45,6],bonus:[1,45,2]},
  {n:'Keno (10/80)',main:[1,80,10],bonus:null},
  {n:'Keno (20/80)',main:[1,80,20],bonus:null},
  {n:'Pick 3',main:[0,9,3],bonus:null},
  {n:'Pick 4',main:[0,9,4],bonus:null},
  {n:'Pick 5',main:[0,9,5],bonus:null},
  {n:'Custom',main:[1,49,6],bonus:null}
];

const {$,t}=GZ;
const history=[];

function populateGames(){
  $('#game').innerHTML=GAMES.map((g,i)=>`<option value="${i}">${g.n}</option>`).join('');
}
populateGames();

function setGame(idx){
  const g=GAMES[idx];
  $('#poolFrom').value=g.main[0];
  $('#poolTo').value=g.main[1];
  $('#pickN').value=g.main[2];
  if(g.bonus){
    $('#bonusFrom').value=g.bonus[0];
    $('#bonusTo').value=g.bonus[1];
    $('#bonusCount').value=g.bonus[2];
  } else {
    $('#bonusFrom').value=0;$('#bonusTo').value=0;$('#bonusCount').value=0;
  }
}
$('#game').addEventListener('change',e=>setGame(+e.target.value));
setGame(0);

function cryptoRand(){
  const buf=new Uint32Array(1);
  crypto.getRandomValues(buf);
  return buf[0]/0x100000000;
}
function pickUnique(from, to, n){
  const arr=[];
  for(let i=from;i<=to;i++) arr.push(i);
  for(let i=arr.length-1;i>0;i--){
    const j=Math.floor(cryptoRand()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
  return arr.slice(0,n).sort((a,b)=>a-b);
}
function pad(n,len=2){ return String(n).padStart(len,'0'); }

function generate(){
  const N=+$('#count').value;
  const from=+$('#poolFrom').value, to=+$('#poolTo').value, k=+$('#pickN').value;
  const bFrom=+$('#bonusFrom').value, bTo=+$('#bonusTo').value, bCount=+$('#bonusCount').value;
  const lines=[];
  for(let i=0;i<N;i++){
    if(k>to-from+1){ alert('Cannot pick '+k+' unique numbers from '+from+'–'+to); return; }
    const main=pickUnique(from,to,k);
    let bonus=[];
    if(bCount>0 && bTo>=bFrom){
      const extra=pickUnique(bFrom,bTo,bCount);
      bonus=extra;
    }
    lines.push({main,bonus});
  }
  renderLines(lines);
  const ts=new Date().toLocaleString();
  history.unshift({ts,lines,game:GAMES[+$('#game').value].n});
  if(history.length>20) history.length=20;
  renderHistory();
}

function renderLines(lines){
  const html=lines.map(line=>{
    const mainBalls=line.main.map(n=>`<span class="ball">${pad(n)}</span>`).join('');
    const bonusBalls=line.bonus.length?line.bonus.map(n=>`<span class="ball bonus">${pad(n)}</span>`).join(''):'';
    return `<div class="balls-row">${mainBalls}${bonusBalls}</div>`;
  }).join('');
  $('#lines').innerHTML=html;
}
function renderHistory(){
  if(history.length===0){$('#history').innerHTML='<div style="color:var(--text2);font-size:.85em">No draws yet.</div>';return;}
  $('#history').innerHTML=history.map(h=>{
    const balls=h.lines.map(line=>line.main.map(n=>`<span class="mini-ball">${pad(n)}</span>`).join('') + (line.bonus.length?line.bonus.map(n=>`<span class="mini-ball" style="background:rgba(255,217,61,.3)">${pad(n)}</span>`).join(''):'')).join(' ');
    return `<div class="row"><span>${h.game}</span><span>${h.ts}</span></div><div class="row" style="border-bottom:1px solid var(--border)">${balls}</div>`;
  }).join('');
}
renderHistory();

$('#toolbar').innerHTML=`
  <button class="gz-btn" onclick="generate()">${t('generate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="GZ.copyText(history.length?history[0].lines.map(l=>l.main.join(' ')+' '+(l.bonus.length?'| '+l.bonus.join(' '):'')).join('\\n'):'')">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="history.length=0;renderHistory()">${t('clear')}</button>`;

GZ.renderToolPage({
  category:'fun',
  titleKey:'toolTitle',descKey:'toolDesc',
  howToSteps:['step1','step2','step3','step4'],
  related:[
    {icon:'🎲',href:'/fun/dice-roller.html',name:'Dice Roller'},
    {icon:'🎯',href:'/fun/name-picker.html',name:'Random Name Picker'},
    {icon:'🪙',href:'/fun/coin-flipper.html',name:'Coin Flipper'},
    {icon:'🎰',href:'/fortune/lucky-number.html',name:'Lucky Number Generator'}
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
