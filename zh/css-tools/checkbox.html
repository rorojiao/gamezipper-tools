<script>
GZI18n.register({
  en: {
    toolTitle: 'CSS Checkbox Generator',
    toolDesc: 'Design custom CSS checkboxes with live preview — colors, size, border radius, animations and ready-to-use code.',
    size: 'Size (px)',
    bgColor: 'Background',
    checkColor: 'Check Color',
    borderColor: 'Border',
    borderRadius: 'Border Radius',
    borderWidth: 'Border Width',
    checkStyle: 'Check Style',
    animation: 'Animation',
    option1: 'Option 1',
    option2: 'Option 2',
    option3: 'Option 3',
    copy: 'Copy Code',
    copied: 'Copied!',
    step1: 'Adjust the controls — size, colors, border, check style and animation',
    step2: 'Preview the checkbox in real time',
    step3: 'Click "Copy Code" to get the HTML and CSS',
    step4: 'Paste the code into your project',
  },
  zh: {
    toolTitle: 'CSS 复选框生成器',
    toolDesc: '可视化设计自定义 CSS 复选框 — 颜色、大小、圆角、动画，实时预览并复制代码。',
    size: '大小 (px)',
    bgColor: '背景色',
    checkColor: '勾选颜色',
    borderColor: '边框色',
    borderRadius: '圆角',
    borderWidth: '边框宽度',
    checkStyle: '勾选样式',
    animation: '动画',
    option1: '选项 1',
    option2: '选项 2',
    option3: '选项 3',
    copy: '复制代码',
    copied: '已复制！',
    step1: '调整控件 — 大小、颜色、边框、勾选样式和动画',
    step2: '实时预览复选框效果',
    step3: '点击「复制代码」获取 HTML 和 CSS',
    step4: '将代码粘贴到你的项目中',
  }
});

const { $, copyText, t } = GZ;
const checkStyles = ['checkmark','tick','cross','dot','fill'];
const animStyles = ['none','scale','slide','bounce','fade'];

let cfg = { size:22, bgColor:'#4ecdc4', checkColor:'#fff', borderColor:'#ccc', borderRadius:4, borderWidth:2, checkStyle:'checkmark', animation:'scale' };

function buildControls() {
  const c = $('#controls');
  c.innerHTML = `
    <label>${t('size')}<input type="number" id="cSize" value="${cfg.size}" min="14" max="48"></label>
    <label>${t('borderRadius')}<input type="number" id="cRadius" value="${cfg.borderRadius}" min="0" max="24"></label>
    <label>${t('borderWidth')}<input type="number" id="cBorderW" value="${cfg.borderWidth}" min="0" max="6"></label>
    <label>${t('bgColor')}<input type="color" id="cBg" value="${cfg.bgColor}"></label>
    <label>${t('checkColor')}<input type="color" id="cCheck" value="${cfg.checkColor}"></label>
    <label>${t('borderColor')}<input type="color" id="cBorder" value="${cfg.borderColor}"></label>
    <label>${t('checkStyle')}<select id="cStyle">${checkStyles.map(s=>`<option value="${s}"${s===cfg.checkStyle?' selected':''}>${s}</option>`).join('')}</select></label>
    <label>${t('animation')}<select id="cAnim">${animStyles.map(s=>`<option value="${s}"${s===cfg.animation?' selected':''}>${s}</option>`).join('')}</select></label>
  `;
  ['cSize','cRadius','cBorderW'].forEach(id=>$('#'+id).onchange=e=>{cfg[{cSize:'size',cRadius:'borderRadius',cBorderW:'borderWidth'}[id]]=+e.target.value;render()});
  ['cBg','cCheck','cBorder'].forEach(id=>$('#'+id).oninput=e=>{cfg[{cBg:'bgColor',cCheck:'checkColor',cBorder:'borderColor'}[id]]=e.target.value;render()});
  ['cStyle','cAnim'].forEach(id=>$('#'+id).onchange=e=>{cfg[{cStyle:'checkStyle',cAnim:'animation'}[id]]=e.target.value;render()});
}

function getCheckMarkSVG(style, color) {
  switch(style) {
    case 'checkmark': return `<svg viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 12 9 17 20 6"/></svg>`;
    case 'tick': return `<svg viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="3" stroke-linecap="round"><line x1="5" y1="12" x2="10" y2="17"/><line x1="10" y1="17" x2="19" y2="7"/></svg>`;
    case 'cross': return `<svg viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="3" stroke-linecap="round"><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></svg>`;
    case 'dot': return `<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="6" fill="${color}"/></svg>`;
    case 'fill': return `<svg viewBox="0 0 24 24"><rect x="4" y="4" width="16" height="16" rx="2" fill="${color}"/></svg>`;
  }
}

function getAnimCSS(anim) {
  switch(anim) {
    case 'scale': return `.gz-cb input:checked+span .gz-cb-mark{transform:scale(1);transition:transform .2s cubic-bezier(.4,0,.2,1)}\n.gz-cb .gz-cb-mark{transform:scale(0);transition:transform .2s cubic-bezier(.4,0,.2,1)}`;
    case 'slide': return `.gz-cb input:checked+span .gz-cb-mark{opacity:1;transform:translateY(0);transition:all .2s ease}\n.gz-cb .gz-cb-mark{opacity:0;transform:translateY(-4px);transition:all .2s ease}`;
    case 'bounce': return `.gz-cb input:checked+span .gz-cb-mark{transform:scale(1);transition:transform .3s cubic-bezier(.68,-.55,.27,1.55)}\n.gz-cb .gz-cb-mark{transform:scale(0);transition:transform .3s cubic-bezier(.68,-.55,.27,1.55)}`;
    case 'fade': return `.gz-cb input:checked+span .gz-cb-mark{opacity:1;transition:opacity .25s ease}\n.gz-cb .gz-cb-mark{opacity:0;transition:opacity .25s ease}`;
    default: return `.gz-cb input:checked+span .gz-cb-mark{display:block}\n.gz-cb .gz-cb-mark{display:none}`;
  }
}

function render() {
  const s = cfg.size;
  const markSVG = getCheckMarkSVG(cfg.checkStyle, cfg.checkColor);
  const animCSS = getAnimCSS(cfg.animation);
  const options = [t('option1'), t('option2'), t('option3')];

  // Preview
  const p = $('#preview');
  p.innerHTML = options.map((opt,i) => `
    <label class="gz-cb" style="position:relative;display:flex;align-items:center;gap:8px;cursor:pointer;margin:8px 0">
      <input type="checkbox" ${i===0?'checked':''} style="position:absolute;opacity:0;width:0;height:0">
      <span style="display:inline-flex;align-items:center;justify-content:center;width:${s}px;height:${s}px;border:${cfg.borderWidth}px solid ${cfg.borderColor};border-radius:${cfg.borderRadius}px;background:#fff;position:relative;flex-shrink:0;transition:background .2s,border-color .2s">
        <span class="gz-cb-mark" style="position:absolute;inset:2px;display:flex;align-items:center;justify-content:center;${cfg.animation==='none'?'':'transform:scale(0);'}">${markSVG}</span>
      </span>
      <span style="font-size:.95em">${opt}</span>
    </label>`).join('');

  // Make preview interactive
  p.querySelectorAll('.gz-cb').forEach(label => {
    const inp = label.querySelector('input');
    const box = label.querySelector('span > span');
    const outerBox = label.querySelector('span');
    inp.addEventListener('change', () => {
      if (inp.checked) {
        outerBox.style.background = cfg.bgColor;
        outerBox.style.borderColor = cfg.bgColor;
        if (cfg.animation === 'scale' || cfg.animation === 'bounce') box.style.transform = 'scale(1)';
        else if (cfg.animation === 'slide') { box.style.opacity = '1'; box.style.transform = 'translateY(0)'; }
        else if (cfg.animation === 'fade') box.style.opacity = '1';
        else box.style.display = 'flex';
      } else {
        outerBox.style.background = '#fff';
        outerBox.style.borderColor = cfg.borderColor;
        if (cfg.animation === 'scale' || cfg.animation === 'bounce') box.style.transform = 'scale(0)';
        else if (cfg.animation === 'slide') { box.style.opacity = '0'; box.style.transform = 'translateY(-4px)'; }
        else if (cfg.animation === 'fade') box.style.opacity = '0';
        else box.style.display = 'none';
      }
    });
    if (inp.checked) {
      outerBox.style.background = cfg.bgColor;
      outerBox.style.borderColor = cfg.bgColor;
      if (cfg.animation !== 'none') {
        setTimeout(() => {
          if (cfg.animation === 'scale' || cfg.animation === 'bounce') box.style.transform = 'scale(1)';
          else if (cfg.animation === 'slide') { box.style.opacity = '1'; box.style.transform = 'translateY(0)'; }
          else if (cfg.animation === 'fade') box.style.opacity = '1';
        }, 50);
      }
    }
  });

  // Code
  const css = `.custom-checkbox {
  position: relative;
  display: flex;
  align-items: center;
  gap: 8px;
  cursor: pointer;
}

.custom-checkbox input {
  position: absolute;
  opacity: 0;
  width: 0;
  height: 0;
}

.custom-checkbox .cb-box {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: ${s}px;
  height: ${s}px;
  border: ${cfg.borderWidth}px solid ${cfg.borderColor};
  border-radius: ${cfg.borderRadius}px;
  background: #fff;
  position: relative;
  transition: background 0.2s, border-color 0.2s;
}

.custom-checkbox input:checked + .cb-box {
  background: ${cfg.bgColor};
  border-color: ${cfg.bgColor};
}

.custom-checkbox .cb-mark {
  position: absolute;
  inset: 2px;
  display: flex;
  align-items: center;
  justify-content: center;
}

${animCSS.replace(/\.gz-cb/g, '.custom-checkbox').replace(/\.gz-cb-mark/g, '.cb-mark')}`;

  const html = `<label class="custom-checkbox">
  <input type="checkbox" checked>
  <span class="cb-box">
    <span class="cb-mark">
      ${markSVG}
    </span>
  </span>
  <span>Option</span>
</label>`;

  $('#code').textContent = `<!-- HTML -->\n${html}\n\n/* CSS */\n${css}`;
}

function doCopy() {
  copyText($('#code').textContent);
  const btn = $('#copyBtn');
  btn.textContent = t('copied');
  setTimeout(() => btn.textContent = t('copy'), 1500);
}

$('#copyBtn').textContent = t('copy');
buildControls();
render();

GZ.renderToolPage({
  category: 'css',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🔘', href:'/css-tools/switch.html', name:'CSS Switch'},
    {icon:'🔘', href:'/css-tools/button.html', name:'CSS Button'},
    {icon:'🎨', href:'/css-tools/border-radius.html', name:'Border Radius'},
    {icon:'🔲', href:'/css-tools/shadow.html', name:'Box Shadow'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
