const lang0 = (GZI18n.getLang ? GZI18n.getLang() : 'en');
const L = () => (GZI18n.getLang ? GZI18n.getLang() : 'en');

// Each answer contributes weight to licenses
const LICENSES = {
  MIT: {
    spdx:'MIT', color:'green', icon:'🟢',
    name:{en:'MIT License',zh:'MIT 许可证'},
    sum:{en:'A short, permissive license. Anyone can use, copy, modify and distribute your code, even in closed-source products, as long as they include the copyright notice. The most popular open source license.',
         zh:'简短宽松的许可证。任何人都可以使用、复制、修改和分发你的代码，甚至用于闭源产品，只需保留版权声明。最流行的开源许可证。'},

    tldr:['Commercial use ✓','Modification ✓','Patent grant ✓','State changes','Must include notice','No liability','No trademark'],
  },
  BSD3: {
    spdx:'BSD-3-Clause', color:'green', icon:'🟢',
    name:{en:'BSD 3-Clause License',zh:'BSD 3-Clause 许可证'},
    sum:{en:'A permissive license similar to MIT, with an extra clause barring use of your name for endorsement. Popular with academic and BSD-ecosystem projects.',
         zh:'与 MIT 类似的宽松许可证，额外禁止未经许可用你的名字进行背书。常见于学术和 BSD 生态项目。'},
    tldr:['Commercial use ✓','Modification ✓','Distribution ✓','Must include notice','No endorsement','No liability'],
  },
  GPL: {
    spdx:'GPL-3.0', color:'blue', icon:'🔵',
    name:{en:'GNU GPLv3',zh:'GNU GPL v3'},
    sum:{en:'A strong copyleft license. Anyone who distributes your code or a derivative must release their source under the same license. Ensures the software and all derivatives stay free and open source forever.',
         zh:'强 copyleft 许可证。任何人分发你的代码或衍生作品时，都必须以相同许可证开源。确保软件及其衍生作品永远保持自由开源。'},
    tldr:['Commercial use ✓','Modification ✓ (same license)','Distribution ✓ (source required)','Copyleft','Patent grant ✓','No liability'],

         zh:'与 GPL 类似，但针对网络使用设计。如果用户通过网络（如 Web SaaS）使用你的软件，你必须向其提供源码。堵住了 SaaS 的漏洞。'},
    tldr:['Commercial use ✓','Network use = distribution','Copyleft (stronger)','Source required for SaaS','Patent grant ✓','No liability'],
  },
  LGPL: {

         zh:'针对库的弱 copyleft。他人可从闭源应用中链接你的库，但对库本身的修改必须开源。适合共享库的折中方案。'},
    tldr:['Linking allowed from closed source','Library mods must be open','Copyleft (weak)','No liability'],
  },
  MPL: {
    spdx:'MPL-2.0', color:'blue', icon:'🔵',

    sum:{en:'A file-level copyleft. Modified existing files must be shared under MPL, but new files can stay proprietary and the project can be combined with closed-source code. Balanced and modern.',
         zh:'文件级 copyleft。被修改的现有文件必须以 MPL 共享，但新文件可保持专有，且可与闭源代码组合。平衡且现代。'},

const QUESTIONS = [
  { id:'permissive', q:{en:'How should others be able to use your code?',zh:'你希望他人如何使用你的代码？'},

      {v:'copy', label:{en:'Derivatives must stay open source',zh:'衍生作品必须保持开源'}, w:{GPL:3,AGPL:2,MPL:2,LGPL:2}},
    ]},
  { id:'patent', q:{en:'Do you want explicit patent protection?',zh:'你希望提供明确的专利保护吗？'},
    opts:[
      {v:'yes', label:{en:'Yes — patent grant matters (recommended for large projects)',zh:'是 — 专利授权很重要（推荐大型项目）'}, w:{Apache:3,GPL:1,AGPL:1,MPL:1}},
      {v:'no', label:{en:'No patents involved, keep it simple',zh:'不涉及专利，保持简单'}, w:{MIT:2,BSD3:2,Unlicense:1}},

      {v:'yes', label:{en:'Yes — network use should count as distribution',zh:'是 — 网络使用应视为分发'}, w:{AGPL:4}},

    ]},

    opts:[
      {v:'app', label:{en:'A standalone app or service',zh:'独立的应用或服务'}, w:{MIT:1,Apache:1,GPL:1}},

      {v:'snip', label:{en:'A tiny snippet or example',zh:'小代码片段或示例'}, w:{Unlicense:3,MIT:2}},
    ]},
  { id:'simplicity', q:{en:'How important is a short, well-known license?',zh:'简短且广为人知的许可证有多重要？'},

      {v:'high', label:{en:'Very — I want maximum adoption with zero friction',zh:'很重要 — 希望最大采用率、零摩擦'}, w:{MIT:3,BSD3:1}},

      {v:'low', label:{en:'Not important — freedom of derivatives matters more',zh:'不重要 — 衍生作品的自由更重要'}, w:{GPL:2,AGPL:2}},
    ]},
];

let answers = {}; // id -> weights object

function renderQuiz(){
  const L = (GZI18n.getLang ? GZI18n.getLang() : 'en');
  $('#quiz').innerHTML = QUESTIONS.map(q=>`
    <div class="gz-q">
      <div class="qtxt">${q.q[L]||q.q.en}</div>
      <div class="gz-opts">
        ${q.opts.map(o=>`
          <label class="gz-opt${answers[q.id]&&answers[q.id].v===o.v?' sel':''}">
            <input type="radio" name="q_${q.id}" value="${o.v}" ${answers[q.id]&&answers[q.id].v===o.v?'checked':''} onchange="pick('${q.id}','${o.v}')">
            <span>${o.label[L]||o.label.en}</span>
          </label>`).join('')}
      </div>
    </div>`).join('');
}

function pick(qid, v){
  const q = QUESTIONS.find(x=>x.id===qid);
  const opt = q.opts.find(o=>o.v===v);
  answers[qid] = { v, w: opt.w || {} };
  renderQuiz(); recommend();
}

function recommend(){
  const L = (GZI18n.getLang ? GZI18n.getLang() : 'en');
  const score = {};
  Object.values(answers).forEach(a=>{ Object.entries(a.w).forEach(([k,v])=>score[k]=(score[k]||0)+v); });
  // Slight default weighting so unanswered still shows something sensible
  if(Object.keys(score).length===0){ $('#result').innerHTML = `<p style="opacity:.8">${t('needMore')}</p>`; return; }
  const ranked = Object.entries(score).sort((a,b)=>b[1]-a[1]);
  const topKey = ranked[0][0];
  const lic = LICENSES[topKey];
  const badgeMD = `![License](${'https://img.shields.io/badge/License-'+encodeURIComponent(lic.spdx)+'-'+lic.color+'.svg'})`;
  const r = $('#result');
  r.innerHTML = `
    <div class="gz-badge">${lic.icon} ${lic.spdx}</div>
    <div class="gz-lic-name">${lic.name[L]||lic.name.en}</div>
    <p class="gz-lic-sum">${lic.sum[L]||lic.sum.en}</p>
    <div class="gz-tldr">${lic.tldr.map(x=>`<span>${x}</span>`).join('')}</div>
    <div style="display:flex;flex-wrap:wrap;gap:8px;margin:12px 0">
      <button class="gz-btn" onclick="copyText(currentLicenseText)">${t('copy')}</button>
      <button class="gz-btn gz-btn-secondary" onclick="copyText(${JSON.stringify(badgeMD)})">${t('copyBadge')}</button>
      <button class="gz-btn gz-btn-secondary" onclick="downloadLicense('${topKey}')">${t('download')}</button>
    </div>
    <div style="font-size:.8rem;font-weight:600;margin-top:8px">${t('fullText')}</div>
    <div class="gz-lic-text" id="lic-text"></div>`;
  // Load full text
  currentLicenseText = LICENSE_TEXTS[topKey] || (lic.name.en + ' — full text not bundled.');
  $('#lic-text').textContent = currentLicenseText;
}

let currentLicenseText = '';

function downloadLicense(key){
  const lic = LICENSES[key];
  const text = LICENSE_TEXTS[key] || '';
  if(!text) return;
  const blob = new Blob([text], {type:'text/plain'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'LICENSE';
  a.click(); URL.revokeObjectURL(a.href);
}

function resetAll(){ answers={}; renderQuiz(); recommend(); }
