<style>
textarea{width:100%;min-height:200px;background:rgba(0,0,0,0.3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:1rem;color:var(--text);font-size:0.95rem;resize:vertical;line-height:1.6;transition:border-color 0.2s;touch-action:manipulation}
textarea:focus{outline:none;border-color:var(--accent)}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;margin:1.5rem 0}
.stat-box{background:var(--glass2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px;text-align:center}
.stat-box .num{font-size:1.8rem;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.stat-box .label{color:var(--text2);font-size:0.75rem;margin-top:4px;text-transform:uppercase;letter-spacing:0.5px}
.kw-list{margin-top:1rem}
.kw-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
.kw-item:last-child{border:none}
.kw-bar{flex:1;height:6px;background:var(--glass2);border-radius:3px;overflow:hidden}
.kw-bar-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:3px;transition:width 0.3s}
.kw-word{font-weight:600;min-width:80px;font-size:0.9rem}
.kw-pct{color:var(--text2);font-size:0.8rem;min-width:50px;text-align:right}
.section-title{font-size:1rem;font-weight:700;margin:1.5rem 0 0.5rem;color:var(--text)}
</style>
<script async src="https://www.googletagmanager.com/gtag/js?id=G-PD9VL4Y05J"></script>

</head>
<body>
<div class="gz-container">
<div class="gz-tool-header">
<h1>📝 Word Counter</h1>
<p class="desc">Count words, characters, sentences & check readability</p>
</div>
<div class="gz-toolbar">
<button class="gz-btn gz-btn-sm" onclick="copyText()">📋 Copy</button>
<button class="gz-btn gz-btn-secondary gz-btn-sm" onclick="clearAll()">🗑️ Clear</button>
</div>
<textarea id="input" placeholder="Type or paste your text here..." oninput="analyze()"></textarea>
<div class="stats-grid">
<div class="stat-box"><div class="num" id="words">0</div><div class="label">Words</div></div>
<div class="stat-box"><div class="num" id="chars">0</div><div class="label">Characters</div></div>
<div class="stat-box"><div class="num" id="charsNoSpace">0</div><div class="label">No Spaces</div></div>
<div class="stat-box"><div class="num" id="sentences">0</div><div class="label">Sentences</div></div>
<div class="stat-box"><div class="num" id="paragraphs">0</div><div class="label">Paragraphs</div></div>
<div class="stat-box"><div class="num" id="lines">0</div><div class="label">Lines</div></div>
</div>
<div class="stats-grid">
<div class="stat-box"><div class="num" id="readTime">0 min</div><div class="label">Reading Time</div></div>
<div class="stat-box"><div class="num" id="speakTime">0 min</div><div class="label">Speaking Time</div></div>
<div class="stat-box"><div class="num" id="readability">0</div><div class="label">Readability (FK)</div></div>
</div>
<div class="section-title">🔑 Top Keywords</div>
<div class="kw-list" id="keywords"><p style="color:var(--text3);font-size:0.85rem">Start typing to see keyword density...</p></div>
</div>
<script>
GZ.renderHeader('calc');GZ.renderFooter();
new Image().src="https://site-analytics.cap.1ktower.com/hit?s=tools.gamezipper.com&p="+encodeURIComponent(location.pathname);
function analyze(){const t=document.getElementById('input').value;const w=t.trim()?t.trim().split(/\s+/):[];const wc=w.length;const cc=t.length;const ccns=t.replace(/\s/g,'').length;const sc=t.split(/[.!?]+/).filter(s=>s.trim()).length;const pc=t.split(/\n\n+/).filter(p=>p.trim()).length|| (t.trim()?1:0);const lc=t.split('\n').length;document.getElementById('words').textContent=wc;document.getElementById('chars').textContent=cc;document.getElementById('charsNoSpace').textContent=ccns;document.getElementById('sentences').textContent=sc;document.getElementById('paragraphs').textContent=pc;document.getElementById('lines').textContent=lc;document.getElementById('readTime').textContent=wc<200?'< 1 min':Math.ceil(wc/200)+' min';document.getElementById('speakTime').textContent=wc<130?'< 1 min':Math.ceil(wc/130)+' min';let fk=0;if(wc>0&&sc>0){const syllables=w.reduce((a,word)=>{word=word.toLowerCase().replace(/(?:[^laeiouy]es|ed|[^laeiouy]e)$/,'');word=word.replace(/^y/,'');const m=word.match(/[aeiouy]{1,2}/g);return a+(m?m.length:1)},0);fk=Math.round(0.39*(wc/sc)+11.8*(syllables/wc)-15.59);if(fk<0)fk=0;if(fk>100)fk=100}document.getElementById('readability').textContent=fk;const stops=new Set(['the','a','an','is','are','was','were','be','been','being','have','has','had','do','does','did','will','would','shall','should','may','might','must','can','could','of','in','to','for','with','on','at','from','by','about','as','into','through','during','before','after','above','below','between','and','but','or','nor','not','so','yet','both','either','neither','each','every','all','any','few','more','most','other','some','such','no','only','own','same','than','too','very','just','because','if','when','where','how','what','which','who','whom','this','that','these','those','i','me','my','we','our','you','your','he','him','his','she','her','it','its','they','them','their']);const freq={};w.forEach(word=>{const lw=word.toLowerCase().replace(/[^a-z0-9'-]/g,'');if(lw.length>2&&!stops.has(lw))freq[lw]=(freq[lw]||0)+1});const sorted=Object.entries(freq).sort((a,b)=>b[1]-a[1]).slice(0,5);const kwEl=document.getElementById('keywords');if(sorted.length===0){kwEl.innerHTML='<p style="color:var(--text3);font-size:0.85rem">Start typing to see keyword density...</p>'}else{const max=sorted[0][1];kwEl.innerHTML=sorted.map(([word,count])=>{const pct=((count/wc)*100).toFixed(1);return `<div class="kw-item"><span class="kw-word">${word}</span><div class="kw-bar"><div class="kw-bar-fill" style="width:${(count/max)*100}%"></div></div><span class="kw-pct">${pct}%</span></div>`}).join('')}}
function copyText(){const t=document.getElementById('input').value;GZ.copyText(t)}
function clearAll(){document.getElementById('input').value='';analyze()}
</script>
</body>
</html>
