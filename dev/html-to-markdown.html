function htmlToMd(html) {
  // Normalize whitespace
  html = html.replace(/\r\n/g, '\n').replace(/\t/g, '  ');
  
  // Parse using DOM
  const doc = new DOMParser().parseFromString(html, 'text/html');
  
  function convertNode(node) {
    if (node.nodeType === Node.TEXT_NODE) {
      return node.textContent.replace(/\s+/g, ' ');
    }
    if (node.nodeType === Node.COMMENT_NODE) return '';
    if (node.nodeType !== Node.ELEMENT_NODE) return '';
    
    const tag = node.tagName.toLowerCase();
    const children = () => Array.from(node.childNodes).map(convertNode).join('');
    
    switch(tag) {
      case 'h1': return `\n\n# ${children().trim()}\n\n`;
      case 'h2': return `\n\n## ${children().trim()}\n\n`;
      case 'h3': return `\n\n### ${children().trim()}\n\n`;
      case 'h4': return `\n\n#### ${children().trim()}\n\n`;
      case 'h5': return `\n\n##### ${children().trim()}\n\n`;
      case 'h6': return `\n\n###### ${children().trim()}\n\n`;
      case 'p': return `\n\n${children().trim()}\n\n`;
      case 'strong': case 'b': return `**${children().trim()}**`;
      case 'em': case 'i': return `*${children().trim()}*`;
      case 'del': case 's': case 'strike': return `~~${children().trim()}~~`;
      case 'a': {
        const href = node.getAttribute('href') || '';
        const text = children().trim();
        return `[${text}](${href})`;
      }
      case 'img': {
        const src = node.getAttribute('src') || '';
        const alt = node.getAttribute('alt') || '';
        return `![${alt}](${src})`;
      }
      case 'code': {
        if (node.parentElement && node.parentElement.tagName.toLowerCase() === 'pre') {
          return children();
        }
        return `\`${children().trim()}\``;
      }
      case 'pre': {
        const codeNode = node.querySelector('code');
        let lang = '';
        let content = '';
        if (codeNode) {
          const cls = codeNode.getAttribute('class') || '';
          const langMatch = cls.match(/language-(\w+)/);
          if (langMatch) lang = langMatch[1];
          content = codeNode.textContent;
        } else {
          content = node.textContent;
        }
        return `\n\n\`\`\`${lang}\n${content.trim()}\n\`\`\`\n\n`;
      }
      case 'blockquote': return `\n\n> ${children().trim().replace(/\n/g, '\n> ')}\n\n`;
      case 'hr': case 'br': return tag === 'hr' ? '\n\n---\n\n' : '\n';
      case 'ul': return `\n${Array.from(node.children).map(li => `- ${convertNode(li).trim()}`).join('\n')}\n\n`;
      case 'ol': return `\n${Array.from(node.children).map((li, i) => `${i+1}. ${convertNode(li).trim()}`).join('\n')}\n\n`;
      case 'li': return children();
      case 'table': {
        const thead = node.querySelector('thead');
        const tbody = node.querySelector('tbody') || node;
        const headerRow = thead ? thead.querySelector('tr') : node.querySelector('tr');
        if (!headerRow) return children();
        
        const headers = Array.from(headerRow.querySelectorAll('th,td')).map(c => c.textContent.trim());
        const sep = headers.map(() => '---').join('|');
        let result = `\n| ${headers.join(' | ')} |\n| ${sep} |\n`;
        
        const rows = tbody.querySelectorAll('tr');
        Array.from(rows).forEach(row => {
          if (row === headerRow && !thead) return;
          const cells = Array.from(row.querySelectorAll('td')).map(c => c.textContent.trim());
          if (cells.length) result += `| ${cells.join(' | ')} |\n`;
        });
        return result + '\n';
      }
      case 'div': case 'span': case 'section': case 'article': case 'main': case 'header': case 'footer': case 'nav':
      case 'figure': case 'figcaption': case 'details': case 'summary':
        return children();
      default: return children();
    }
  }
  
  let md = convertNode(doc.body);
  // Clean up excessive newlines
  md = md.replace(/\n{3,}/g, '\n\n').trim();
  return md;
}

function doConvert() {
  const html = $('#input').value;
  if (!html.trim()) { $('#output').textContent = ''; return; }
  try {
    const md = htmlToMd(html);
    $('#output').textContent = md;
    $('#status').innerHTML = `<span style="color:var(--gz-success)">✓ ${t('converted')}</span>`;
  } catch(e) {
    $('#status').innerHTML = `<span style="color:var(--gz-accent)">Error: ${e.message}</span>`;
  }
}
