    mExpand: '扩写', mExpandD: '添加细节',
    mAcademic: '学术', mAcademicD: '学术风格',

    lblOut: '重写后段落',
    phIn: '在此粘贴你的段落...',
    phOut: '重写后的段落将显示在这里。',
    statWords: '字数', statSents: '句子数', statChars: '字符数', statChange: '改动量',
    btnRewrite: '重写', btnExample: '示例', btnCopy: '复制', btnSwap: '用作输入', btnClear: '清空',
    step1: '将段落粘贴到原段落框',
    step2: '选择模式 — 正式、简洁、扩写或学术',
    step3: '点击「重写」生成新段落',
    step4: '使用「复制」或「用作输入」继续优化',

const { $, copyText, t } = GZ;
let currentMode = 'formal';

// Synonym dictionaries
const FORMAL = {
  'get':'obtain','got':'received','gets':'obtains','big':'substantial','biggest':'largest',
  'small':'minor','good':'favorable','bad':'unfavorable','really':'considerably','very':'notably',
  'a lot of':'numerous','lots of':'numerous','kind of':'somewhat','sort of':'somewhat',
  'stuff':'material','things':'matters','thing':'matter','show':'demonstrate','shows':'demonstrates',
  'use':'utilize','uses':'utilizes','used':'utilized','help':'assist','helps':'assists','helped':'assisted',
  'start':'commence','starts':'commences','started':'commenced','end':'conclude','ends':'concludes',
  'find out':'ascertain','find':'identify','make':'produce','makes':'produces','made':'produced',
  'try':'attempt','tries':'attempts','tried':'attempted','want':'desire','wants':'desires',
  'think':'consider','thinks':'considers','thought':'considered','need':'require','needs':'requires',
  'about':'approximately','also':'furthermore','but':'however','so':'therefore','because':'since',
  'and':'moreover','or':'alternatively','if':'provided that','like':'such as','kids':'children',
  'ok':'acceptable','okay':'acceptable','yeah':'yes','nope':'no','gonna':'going to','wanna':'want to',
};

const SIMPLE = {
  'utilize':'use','utilizes':'uses','utilized':'used','demonstrate':'show','demonstrates':'shows',
  'demonstrated':'showed','commence':'start','commences':'starts','commenced':'started',
  'ascertain':'find out','facilitate':'help','facilitates':'helps','approximately':'about',
  'furthermore':'also','moreover':'also','nevertheless':'still','notwithstanding':'despite',
  'consequently':'so','therefore':'so','additionally':'also','subsequently':'later',
  'nevertheless':'but','individuals':'people','individual':'person','numerous':'many',
  'sufficient':'enough','insufficient':'not enough','obtain':'get','obtains':'gets','obtained':'got',
  'regarding':'about','concerning':'about','purchase':'buy','purchases':'buys','purchased':'bought',
  'additional':'more','additionally':'also','assist':'help','assists':'helps',
  'require':'need','requires':'needs','required':'needed','endeavor':'try','endeavors':'tries',
};

const EXPAND_PHRASES = [
  'It is worth noting that ', 'In this context, ', 'To put this in perspective, ',
  'From a broader viewpoint, ', 'As a matter of fact, ', 'To elaborate further, ',
  'Significantly, ', 'Importantly, ', 'In essence, ',
];
const EXPAND_BRIDGES = [
  ', which is particularly relevant because ', ', an observation that bears emphasizing',
  ', a point that becomes clearer when examined closely', ', as the following discussion suggests',
  ', a detail that should not be overlooked',
];

function swap(text, dict){
  // Sort keys longest first to avoid partial matches
  const keys = Object.keys(dict).sort((a,b)=>b.length-a.length);
  let out = text;
  for(const k of keys){
    const re = new RegExp('\\b'+k.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+'\\b','gi');
    out = out.replace(re, m => matchCase(m, dict[k.toLowerCase()]));
  }
  return out;
}

function matchCase(src, repl){
  if(src === src.toUpperCase()) return repl.toUpperCase();
  if(src.charAt(0) === src.charAt(0).toUpperCase()) return repl.charAt(0).toUpperCase()+repl.slice(1);
  return repl;
}

function splitSentences(text){
  return text.match(/[^.!?]+[.!?]+(\s|$)|[^.!?]+$/g)?.map(s=>s.trim()).filter(Boolean) || [text];
}

function rewriteFormal(text){
  let out = swap(text, FORMAL);
  // Expand contractions
  out = out.replace(/\bcan't\b/gi,'cannot').replace(/\bwon't\b/gi,'will not')
    .replace(/\bdon't\b/gi,'do not').replace(/\bdoesn't\b/gi,'does not')
    .replace(/\bdidn't\b/gi,'did not').replace(/\bisn't\b/gi,'is not')
    .replace(/\baren't\b/gi,'are not').replace(/\bwasn't\b/gi,'was not')
    .replace(/\bweren't\b/gi,'were not').replace(/\bhaven't\b/gi,'have not')
    .replace(/\bhasn't\b/gi,'has not').replace(/\bhadn't\b/gi,'had not')
    .replace(/\bI'm\b/gi,'I am').replace(/\bwe're\b/gi,'we are')
    .replace(/\bthey're\b/gi,'they are').replace(/\bit's\b/gi,'it is')
    .replace(/\bthat's\b/gi,'that is').replace(/\blet's\b/gi,'let us');
  return out;
}

function rewriteSimple(text){
  return swap(text, SIMPLE);
}

function rewriteExpand(text){
  const sents = splitSentences(text);
  const out = sents.map((s, i) => {
    if(i===0) return pick(EXPAND_PHRASES) + lowercaseFirst(s);
    if(i===sents.length-1 && Math.random()<0.5) return lowercaseFirst(s) + pick(EXPAND_BRIDGES) + '.';
    if(Math.random()<0.4) return pick(EXPAND_PHRASES) + lowercaseFirst(s);
    return s;
  });
  return out.join(' ');
}

function lowercaseFirst(s){
  s = s.trim();
  if(/^[A-Z]/.test(s) && !/^[A-Z]{2,}/.test(s)) return s.charAt(0).toLowerCase()+s.slice(1);
  return s;
}

function rewriteAcademic(text){
  let out = rewriteFormal(text);
  out = swap(out, FORMAL); // second pass for residual informal words
  // Add hedging to absolute statements
  out = out.replace(/\bis\b(?!\s+(not|a|an|the|one|also|often|usually|rarely|sometimes))/gi, 'is widely considered to be');
  out = out.replace(/\s{2,}/g,' ').replace(/\s+\./g,'.');
  return out;
}

function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }

function countWords(s){ return (s.match(/\S+/g)||[]).length; }

function similarity(a, b){
  if(!a||!b) return 0;
  const wa = new Set((a.toLowerCase().match(/[a-z]+/g)||[]));
  const wb = new Set((b.toLowerCase().match(/[a-z]+/g)||[]));
  if(wa.size===0) return 0;
  let common=0; wa.forEach(w=>{ if(wb.has(w)) common++; });
  return Math.round((common/Math.max(wa.size,wb.size))*100);
}

function renderStats(orig, out){
  const oW = countWords(orig), nW = countWords(out);
  const dW = nW - oW;
  const dC = out.length - orig.length;
  const change = 100 - similarity(orig, out);
  const fmt = n => n===0?'<span class="pr-delta">±0</span>':(n>0?`<span class="pr-delta up">+${n}</span>`:`<span class="pr-delta down">${n}</span>`);
  $('#stats').innerHTML = `
    <div class="pr-stat"><div class="num">${nW} ${fmt(nW-oW)}</div><div class="lbl">${t('statWords')}</div></div>
    <div class="pr-stat"><div class="num">${out.length} ${fmt(dC)}</div><div class="lbl">${t('statChars')}</div></div>
    <div class="pr-stat"><div class="num">${(out.match(/[.!?]+/g)||[]).length||1}</div><div class="lbl">${t('statSents')}</div></div>
    <div class="pr-stat"><div class="num">${change}%</div><div class="lbl">${t('statChange')}</div></div>`;
}

function doRewrite(){
  const text = $('#input').value.trim();
  if(!text){ $('#output').value=''; $('#stats').innerHTML=''; return; }
  let result;
  if(currentMode==='formal') result = rewriteFormal(text);
  else if(currentMode==='simple') result = rewriteSimple(text);
  else if(currentMode==='expand') result = rewriteExpand(text);
  else result = rewriteAcademic(text);
  $('#output').value = result;
  renderStats(text, result);
}

function loadExample(){
  $('#input').value = 'Social media has changed the way people talk to each other. Lots of kids use it every day, and it\'s really changed how they make friends. But it also has some big problems, like cyberbullying and fake news. We need to think about how to fix these things so that social media can be a good thing for everyone.';
  doRewrite();
}

function doClear(){ $('#input').value=''; $('#output').value=''; $('#stats').innerHTML=''; }

// Modes
const modeDefs = [
  {id:'formal', lbl:'mFormal', desc:'mFormalD'},
  {id:'simple', lbl:'mSimple', desc:'mSimpleD'},
  {id:'expand', lbl:'mExpand', desc:'mExpandD'},
  {id:'academic', lbl:'mAcademic', desc:'mAcademicD'},
];
$('#modes').innerHTML = modeDefs.map(m => `<button data-mode="${m.id}" class="${m.id==='formal'?'active':''}">${t(m.lbl)}<small>${t(m.desc)}</small></button>`).join('');
$('#modes').querySelectorAll('button').forEach(b => {
  b.addEventListener('click', () => {
    $('#modes').querySelectorAll('button').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    currentMode = b.dataset.mode;
    if($('#input').value.trim()) doRewrite();
  });
});

$('#lbl-in').textContent = t('lblIn');
$('#lbl-out').textContent = t('lblOut');
$('#input').placeholder = t('phIn');
$('#output').placeholder = t('phOut');

$('#toolbar').innerHTML = `
  <button class="gz-btn" id="btn-rw">${t('btnRewrite')}</button>
  <button class="gz-btn gz-btn-secondary" id="btn-ex">${t('btnExample')}</button>
  <button class="gz-btn gz-btn-secondary" id="btn-cp">${t('btnCopy')}</button>
  <button class="gz-btn gz-btn-secondary" id="btn-sw">${t('btnSwap')}</button>
  <button class="gz-btn gz-btn-secondary" id="btn-cl">${t('btnClear')}</button>`;
$('#btn-rw').addEventListener('click', doRewrite);
$('#btn-ex').addEventListener('click', loadExample);
$('#btn-cp').addEventListener('click', () => copyText($('#output').value));
$('#btn-sw').addEventListener('click', () => { $('#input').value = $('#output').value; doRewrite(); });
$('#btn-cl').addEventListener('click', doClear);

  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
