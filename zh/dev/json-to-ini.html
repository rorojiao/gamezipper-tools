    convert: '转换',
    step1: '在输入区粘贴或输入 JSON',
    step2: '点击「转换」生成 INI 格式',
    step3: '顶层键放入 [DEFAULT]，嵌套对象变为分区',
    step4: '点击「复制」复制 INI 输出',
  }
});

const { $, copyText, t } = GZ;

function formatValue(val) {
  if (val === null) return '';
  if (typeof val === 'boolean') return val ? 'true' : 'false';
  if (typeof val === 'number') return String(val);
  if (typeof val === 'string') {
    // Escape backslashes and newlines for INI
    return val.replace(/\\/g,'\\\\').replace(/\n/g,'\\n');
  }
  if (Array.isArray(val)) return val.map(formatValue).join(',');
  return String(val);
}

function jsonToIni(obj, prefix) {
  let result = '';
  let rootPairs = [];
  let sections = [];

  for (const key in obj) {
    const val = obj[key];
    if (val !== null && typeof val === 'object' && !Array.isArray(val)) {
      sections.push({ key, val });
    } else {
      rootPairs.push({ key, val });
    }
  }

  // Write root-level pairs under [DEFAULT] if any
  if (rootPairs.length > 0) {
    if (sections.length > 0 || prefix) {
      result += '[DEFAULT]\n';
    }
    rootPairs.forEach(({key, val}) => {
      if (Array.isArray(val)) {
        val.forEach((item, i) => {
          if (item !== null && typeof item === 'object') {
            result += `\n[${key}[${i}]]\n`;
            for (const k in item) {
              result += `${k} = ${formatValue(item[k])}\n`;
            }
          } else {
            result += `${key}[${i}] = ${formatValue(item)}\n`;
          }
        });
      } else {
        result += `${key} = ${formatValue(val)}\n`;
      }
    });
  }

  // Write sections
  sections.forEach(({key, val}) => {
    const sectionName = prefix ? `${prefix}.${key}` : key;
    // Recursively handle nested objects
    let hasNestedObj = false;
    let flatPairs = [];
    for (const k in val) {
      if (val[k] !== null && typeof val[k] === 'object' && !Array.isArray(val[k])) {
        hasNestedObj = true;
      } else {
        flatPairs.push({key: k, val: val[k]});
      }
    }
    if (flatPairs.length > 0) {
      result += `\n[${sectionName}]\n`;
      flatPairs.forEach(({key: k, val: v}) => {
        if (Array.isArray(v)) {
          v.forEach((item, i) => {
            if (item !== null && typeof item === 'object') {
              result += `\n[${sectionName}.${k}[${i}]]\n`;
              for (const ik in item) result += `${ik} = ${formatValue(item[ik])}\n`;
            } else {
              result += `${k}[${i}] = ${formatValue(v)}\n`;
            }
          });
        } else {
          result += `${k} = ${formatValue(v)}\n`;
        }
      });
    }
    // Handle deeper nesting
    for (const k in val) {
      if (val[k] !== null && typeof val[k] === 'object' && !Array.isArray(val[k])) {
        result += jsonToIni({[k]: val[k]}, sectionName);
      }
    }
  });

  return result;
}

function doConvert() {
  const inp = $('#input').value.trim();
  if (!inp) { $('#output').value = ''; $('#status').innerHTML = ''; return; }
  try {
    const obj = JSON.parse(inp);
    const ini = jsonToIni(obj, '').trim() + '\n';
    $('#output').value = ini;
    $('#status').innerHTML = '<span style="color:var(--gz-success)">✓ Converted successfully</span>';
  } catch(e) {
    $('#status').innerHTML = `<span style="color:var(--gz-accent)">✗ Invalid JSON: ${e.message}</span>`;
    $('#output').value = '';
  }
}

function loadExample() {
  $('#input').value = JSON.stringify({
    app: { name: "MyApp", version: "2.1.0", debug: false },
    server: { host: "localhost", port: 8080, timeout: 30 },
    database: { name: "production", pool: 10, ssl: true },
    features: ["auth", "cache", "logging"]
  }, null, 2);
  doConvert();
}

function doClear() { $('#input').value = ''; $('#output').value = ''; $('#status').innerHTML = ''; }

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="doConvert()">${t('convert')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn" onclick="copyText($('#output').value)">${t('copy')}</button>
