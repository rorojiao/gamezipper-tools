<script>
GZI18n.register({
  en: {
    toolTitle: 'Snow Day Calculator',
    toolDesc: 'Predict the chance of a school snow day based on snowfall, temperature, wind, road conditions and your area type.',
    lblSnow: 'Expected Snowfall (inches)',
    lblTemp: 'Temperature (°F)',

    areaRural: 'Rural',
    dayWeekday: 'Weekday (Tue–Thu)',
    dayMonday: 'Monday',
    dayFriday: 'Friday',
    btnCalc: 'Calculate Snow Day Chance',
    resultLabel: 'Estimated Chance of a Snow Day',
    verdictVeryHigh: 'Very High — Stay warm! 🌨️',
    verdictHigh: 'High — Bundle up! ❄️',
    verdictMedium: 'Moderate — 50/50 🤷',
    verdictLow: 'Low — Probably not 😬',
    verdictVeryLow: 'Very Low — School is on 📚',
    factorSnow: 'Snowfall',
    factorWind: 'Wind Chill',
    factorRoads: 'Road Conditions',
    factorArea: 'Area Profile',
    factorDay: 'Day of Week',
    disclaimer: 'For fun only. Always follow your school district and local weather authorities for official closure decisions.',
    step1: 'Enter expected snowfall, temperature and wind speed',
    step2: 'Choose the road conditions and your area type (urban/suburban/rural)',

  },
  zh: {
    toolTitle: '雪天停课计算器',
    toolDesc: '根据降雪量、气温、风速、道路状况和地区类型预测学校停课概率。',
    lblSnow: '预计降雪量（英寸）',
    lblTemp: '气温（°F）',
    lblWind: '风速（英里/时）',
    lblRoads: '道路状况',
    lblArea: '地区类型',
    lblDay: '星期',
    roadClear: '已清扫 / 已撒盐',
    roadIcy: '结冰 / 湿滑',
    roadDeep: '积雪深厚',
    areaUrban: '城市',
    areaSuburban: '郊区',
    areaRural: '乡村',
    dayWeekday: '工作日（周二–周四）',
    dayMonday: '周一',
    dayFriday: '周五',
    btnCalc: '计算停课概率',
    resultLabel: '预计停课概率',
    verdictVeryHigh: '极高 — 留在被窝吧！🌨️',
    verdictHigh: '高 — 多穿点！❄️',
    verdictMedium: '中等 — 五五开 🤷',
    verdictLow: '低 — 大概率不停课 😬',
    verdictVeryLow: '极低 — 准时上学 📚',
    factorSnow: '降雪量',
    factorWind: '风寒指数',
    factorRoads: '道路状况',
    factorArea: '地区概况',
    factorDay: '星期因素',
    disclaimer: '仅供娱乐。是否停课请以学校官方和当地气象部门通知为准。',
    step1: '输入预计降雪量、气温和风速',
    step2: '选择道路状况和地区类型（城市/郊区/乡村）',
    step3: '选择星期 — 周一和周五历史上停课更多',
    step4: '点击「计算停课概率」查看预估概率',
  }
});

const { $, t } = GZ;

function fillOptions() {
  const roads = $('#roads');
  roads.options[0].textContent = t('roadClear');
  roads.options[1].textContent = t('roadIcy');
  roads.options[2].textContent = t('roadDeep');
  const area = $('#area');
  area.options[0].textContent = t('areaUrban');
  area.options[1].textContent = t('areaSuburban');
  area.options[2].textContent = t('areaRural');
  const day = $('#day');
  day.options[0].textContent = t('dayWeekday');
  day.options[1].textContent = t('dayMonday');
  day.options[2].textContent = t('dayFriday');
}

function windChill(tempF, windMph) {
  if (tempF > 50 || windMph < 3) return tempF;
  return 35.74 + 0.6215 * tempF - 35.75 * Math.pow(windMph, 0.16) + 0.4275 * tempF * Math.pow(windMph, 0.16);
}

function calculate() {
  const snow = Math.max(0, parseFloat($('#snow').value) || 0);
  const temp = parseFloat($('#temp').value) || 50;
  const wind = Math.max(0, parseFloat($('#wind').value) || 0);
  const roads = $('#roads').value;
  const area = $('#area').value;
  const day = $('#day').value;

  const wc = windChill(temp, wind);

  // Snowfall factor (0-35 pts): 8in = ~35
  const fSnow = Math.min(35, snow * 4.5);

  // Wind chill factor (0-15 pts): colder => more
  let fWind = 0;
  if (wc < 0) fWind = 15;
  else if (wc < 10) fWind = 12;
  else if (wc < 20) fWind = 9;
  else if (wc < 32) fWind = 5;
  else fWind = 1;

  // Road factor (0-20)
  const roadMap = { clear: 4, icy: 14, deep: 20 };
  const fRoads = roadMap[roads] || 4;

  // Area factor (0-20)
  const areaMap = { urban: 6, suburban: 12, rural: 20 };
  const fArea = areaMap[area] || 6;

  // Day factor (0-10)
  const dayMap = { weekday: 4, monday: 10, friday: 8 };
  const fDay = dayMap[day] || 4;

  const total = Math.min(100, Math.round(fSnow + fWind + fRoads + fArea + fDay));

  let verdict;
  if (total >= 85) verdict = t('verdictVeryHigh');
  else if (total >= 65) verdict = t('verdictHigh');
  else if (total >= 40) verdict = t('verdictMedium');
  else if (total >= 20) verdict = t('verdictLow');
  else verdict = t('verdictVeryLow');

  $('#result').style.display = '';
  $('#result-pct').textContent = total + '%';
  $('#result-label').textContent = verdict;
  $('#gauge').style.width = total + '%';

  $('#factors').innerHTML = `
    <div class="item"><b>${t('factorSnow')}</b>${fSnow}/35</div>
    <div class="item"><b>${t('factorWind')}</b>${fWind}/15 · ${wc.toFixed(0)}°F</div>
    <div class="item"><b>${t('factorRoads')}</b>${fRoads}/20</div>
    <div class="item"><b>${t('factorArea')}</b>${fArea}/20</div>
    <div class="item"><b>${t('factorDay')}</b>${fDay}/10</div>
  `;
  $('#disclaimer').textContent = t('disclaimer');
}

$('#btn-calc').textContent = t('btnCalc');
fillOptions();
calculate();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],

    {icon:'📅', href:'/calc/date-calculator.html', name:'Date Calc'},
  ]
});
</script>
