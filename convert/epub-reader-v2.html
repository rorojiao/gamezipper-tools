<script>
GZI18n.register({
  en: {
    toolTitle: 'EPUB Reader — Read eBooks Online',
    toolDesc: 'Read EPUB eBooks online for free. Drag and drop, navigate chapters, customize font, size and theme. 100% browser-based — no upload, no signup.',
    dropText: 'Drop your .epub file here or click to browse',
    tocHeading: 'Chapters',

  },
  zh: {

    toolDesc: '免费在线阅读 EPUB 电子书。拖拽上传、浏览章节、自定义字体/字号/主题。100% 浏览器本地运行 — 无需上传、无需注册。',
    dropText: '将 .epub 文件拖到这里或点击选择',
    tocHeading: '目录',
    lblFont: '字体',
    lblSize: '字号',
    lblTheme: '主题',
    loading: '正在读取 EPUB…',
    invalid: '此文件不是有效的 EPUB 归档。',
    step1: '将 .epub 文件拖入上传区',
    step2: '点击侧边栏的章节开始阅读',
    step3: '根据喜好自定义字体、字号和主题',
    step4: '你的电子书完全私密 — 所有操作在浏览器中进行',
  }

const { $, t } = GZ;
let book = null;
let currentChapter = 0;

function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function decodeEntities(s) {
  const ent = { amp: '&', lt: '<', gt: '>', quot: '"', apos: "'", nbsp: ' ', copy: '©', reg: '®', mdash: '—', ndash: '–', hellip: '…', lsquo: '‘', rsquo: '’', ldquo: '“', rdquo: '”' };
  return s.replace(/&(#x?[0-9a-f]+|[a-z]+);/gi, (full, code) => {
    if (code[0] === '#') {
      const num = code[1] === 'x' || code[1] === 'X' ? parseInt(code.slice(2), 16) : parseInt(code.slice(1), 10);
      return String.fromCodePoint(num);
    }
    return ent[code.toLowerCase()] || full;
  });
}

function sanitizeHtml(html) {
  // remove scripts and event handlers
  html = html.replace(/<script\b[^<]*(?:(?!<\/script>)<[^<]*)*<\/script>/gi, '');
  html = html.replace(/<style\b[^<]*(?:(?!<\/style>)<[^<]*)*<\/style>/gi, '');
  html = html.replace(/\son\w+="[^"]*"/gi, '');
  html = html.replace(/\son\w+='[^']*'/gi, '');
  html = html.replace(/javascript:/gi, '');
  return decodeEntities(html);
}

async function loadEpub(file) {
  $('#status').textContent = t('loading');
  try {
    const zip = await JSZip.loadAsync(await file.arrayBuffer());
    const containerXml = await zip.file('META-INF/container.xml')?.async('string');
    if (!containerXml) throw new Error(t('invalid'));
    const opfPath = (containerXml.match(/full-path="([^"]+)"/) || [])[1];
    if (!opfPath) throw new Error(t('invalid'));
    const opfXml = await zip.file(opfPath)?.async('string');
    if (!opfXml) throw new Error(t('invalid'));
    const opfDir = opfPath.includes('/') ? opfPath.replace(/[^/]+$/, '') : '';

    // manifest + spine
    const manifest = {};
    const itemRe = /<item\b[^>]*\/>/g;
    let m;
    while ((m = itemRe.exec(opfXml)) !== null) {
      const tag = m[0];
      const id = (tag.match(/id="([^"]+)"/) || [])[1];
      const href = (tag.match(/href="([^"]+)"/) || [])[1];
      const mt = (tag.match(/media-type="([^"]+)"/) || [])[1];
      if (id && href) manifest[id] = { href: decodeURIComponent(href), mediaType: mt };
    }
    const spineIds = [];
    const spineRe = /<itemref\b[^>]*idref="([^"]+)"[^>]*\/?>/g;
    while ((m = spineRe.exec(opfXml)) !== null) spineIds.push(m[1]);
    if (!spineIds.length) Object.keys(manifest).forEach(k => { if (manifest[k].mediaType === 'application/xhtml+xml') spineIds.push(k); });

    // title
    const bookTitle = (opfXml.match(/<dc:title[^>]*>([\s\S]*?)<\/dc:title>/i) || [])[1] || file.name;
    const bookAuthor = (opfXml.match(/<dc:creator[^>]*>([\s\S]*?)<\/dc:creator>/i) || [])[1] || '';

    // resolve chapters
    const chapters = [];
    for (const id of spineIds) {
      const item = manifest[id];
      if (!item || item.mediaType !== 'application/xhtml+xml') continue;
      const filePath = (opfDir + item.href).replace(/^\.\//, '');
      const html = await zip.file(filePath)?.async('string');
      if (html) {
        const bodyMatch = html.match(/<body[^>]*>([\s\S]*?)<\/body>/i);
        const body = bodyMatch ? bodyMatch[1] : html;
        const hMatch = body.match(/<h[1-6][^>]*>([\s\S]*?)<\/h[1-6]>/i);
        const label = hMatch ? hMatch[1].replace(/<[^>]+>/g,'').trim() : `Chapter ${chapters.length + 1}`;
        chapters.push({ label, html: body });
      }
    }
    book = { title: bookTitle.replace(/<[^>]+>/g,'').trim(), author: bookAuthor.replace(/<[^>]+>/g,'').trim(), chapters };
    $('#info').innerHTML = `<div class="midi-info"><strong>${esc(book.title)}</strong>${book.author ? ' — ' + esc(book.author) : ''} · ${book.chapters.length} chapters</div>`;
    $('#dropZone').style.display = 'none';
    $('#controls').style.display = 'flex';
    $('#reader').style.display = 'grid';
    renderToc();
    showChapter(0);
    $('#status').textContent = '';
  } catch (e) {
    $('#status').innerHTML = `<span style="color:var(--gz-accent)">${t('invalid')} (${e.message})</span>`;
  }
}

function renderToc() {
  if (!book) return;
  $('#toc').innerHTML = book.chapters.map((c, i) =>
    `<a data-i="${i}" class="${i===currentChapter?'active':''}">${esc((c.label||'Chapter '+(i+1)).slice(0,60))}</a>`
  ).join('');
  $('#toc').querySelectorAll('a').forEach(a => a.addEventListener('click', e => showChapter(+e.target.dataset.i)));
}

function showChapter(i) {
  if (!book || i < 0 || i >= book.chapters.length) return;
  currentChapter = i;
  $('#content').innerHTML = sanitizeHtml(book.chapters[i].html);
  $('#content').scrollTop = 0;
  renderToc();
}

// Controls
$('#fontFamily').addEventListener('change', e => $('#content').style.fontFamily = e.target.value);
$('#fontSize2').addEventListener('input', e => $('#content').style.fontSize = e.target.value + 'px');
$('#theme').addEventListener('change', e => {
  const r = $('#reader');
  r.classList.remove('theme-light','theme-sepia','theme-dark');
  r.classList.add(e.target.value);
});
$('#newBook').addEventListener('click', () => {
  book = null;
  $('#reader').style.display = 'none';
  $('#controls').style.display = 'none';
  $('#dropZone').style.display = 'block';
  $('#info').innerHTML = '';
});

const dz = $('#dropZone');
dz.addEventListener('click', () => $('#fileInput').click());
$('#fileInput').addEventListener('change', e => { if (e.target.files[0]) loadEpub(e.target.files[0]); e.target.value=''; });
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('dragover'); });
dz.addEventListener('dragleave', () => dz.classList.remove('dragover'));
dz.addEventListener('drop', e => { e.preventDefault(); dz.classList.remove('dragover'); if (e.dataTransfer.files[0]) loadEpub(e.dataTransfer.files[0]); });
$('#dropText').textContent = t('dropText');
$('#tocHeading').textContent = t('tocHeading');
$('#lbl-font').textContent = t('lblFont');
$('#lbl-size').textContent = t('lblSize');
$('#lbl-theme').textContent = t('lblTheme');
$('#toolbar').innerHTML = '';

GZ.renderToolPage({
  category: 'convert',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📄', href:'/convert/epub-to-pdf.html', name:'EPUB to PDF'},
    {icon:'📖', href:'/convert/pdf-viewer.html', name:'PDF Viewer'},
    {icon:'📄', href:'/convert/word-to-pdf.html', name:'Word to PDF'},
    {icon:'🗜️', href:'/convert/pdf-compressor.html', name:'PDF Compressor'},
  ]
});
</script>
