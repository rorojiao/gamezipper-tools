<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "How do I convert hourly pay to yearly salary?", "acceptedAnswer": {"@type": "Answer", "text": "Multiply your hourly rate by the hours you work per week, then by the number of weeks you work per year. For a full-time worker at 40 hours/week and 52 weeks, yearly salary = hourly rate x 40 x 52 = hourly rate x 2,080. This calculator does the math for you instantly."}}, {"@type": "Question", "name": "How many work hours are in a year?", "acceptedAnswer": {"@type": "Answer", "text": "A standard full-time year has 2,080 working hours (40 hours x 52 weeks). If you get 2 weeks of unpaid vacation, it is 2,000 hours (40 x 50). You can change the weeks-per-year field in this calculator to match your real schedule, including holidays and PTO."}}, {"@type": "Question", "name": "Does this calculator include overtime?", "acceptedAnswer": {"@type": "Answer", "text": "Optionally yes. Turn on overtime, enter your extra weekly hours, and set the overtime multiplier (the U.S. FLSA default is 1.5x time-and-a-half). The calculator adds overtime pay to your base salary. Turn it off for a straight-time estimate."}}, {"@type": "Question", "name": "Is the calculation before or after taxes?", "acceptedAnswer": {"@type": "Answer", "text": "All amounts shown are gross (pre-tax). Your take-home pay will be lower after federal, state, Social Security, Medicare and benefit deductions. Use the result as a starting point and apply your local tax rates separately."}}]}</script>

<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="hs-input">
      <label><span id="lblRate"></span><input type="number" id="rate" value="25" min="0" step="0.01"></label>
      <label><span id="lblHours"></span><input type="number" id="hours" value="40" min="0" step="0.5"></label>
      <label><span id="lblWeeks"></span><input type="number" id="weeks" value="52" min="1" max="52" step="1"></label>
    </div>
    <div class="hs-currency">
      <span id="lblCurrency"></span>
      <select id="currency">
        <option value="$">USD $</option>
        <option value="€">EUR €</option>
        <option value="£">GBP £</option>
        <option value="¥">CNY ¥</option>
        <option value="₹">INR ₹</option>
        <option value="A$">AUD A$</option>
        <option value="C$">CAD C$</option>
        <option value="R">ZAR R</option>
      </select>
    </div>
    <div class="hs-ot">
      <input type="checkbox" id="useOT">
      <label for="useOT" id="lblOT" style="margin:0;cursor:pointer"></label>
    </div>
    <div id="otFields" style="display:none">
      <div class="hs-input" style="margin-bottom:8px">
        <label><span id="lblOTHrs"></span><input type="number" id="otHours" value="5" min="0" step="0.5"></label>
        <label><span id="lblOTMult"></span><select id="otMult"><option value="1.5">1.5x</option><option value="2">2x (double)</option><option value="1.25">1.25x</option><option value="1">1x</option></select></label>
      </div>
    </div>
    <div id="result"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: "Hourly to Salary Calculator",
    toolDesc: "Convert your hourly wage into annual, monthly, bi-weekly, weekly and daily salary. Adjust hours, weeks and overtime for an accurate estimate.",
    rate: "Hourly rate", hours: "Hours / week", weeks: "Weeks / year",
    currency: "Currency", lblOT: "Include overtime", oTHrs: "Overtime hours / week", oTMult: "Overtime multiplier",
    annual: "Annual salary", monthly: "Monthly", biweekly: "Bi-weekly", weekly: "Weekly", daily: "Daily (8h)",
    baseSalary: "Base salary", overtimePay: "Overtime pay", totalHours: "Total hours / year", effectiveRate: "Effective hourly rate",
    step1: "Enter your hourly rate (e.g. 25)",
    step2: "Set hours per week (default 40) and weeks per year (default 52)",
    step3: "Optionally turn on overtime and set extra hours + multiplier",
    step4: "Read your annual, monthly, bi-weekly, weekly and daily salary",
  },
  zh: {
    toolTitle: "时薪转年薪计算器",
    toolDesc: "将时薪换算为年薪、月薪、双周薪、周薪和日薪。可调整每周工时、每年工作周数和加班费，估算准确。",
    rate: "时薪", hours: "每周工时", weeks: "每年工作周数",
    currency: "货币", lblOT: "包含加班费", oTHrs: "每周加班工时", oTMult: "加班倍数",
    annual: "年薪", monthly: "月薪", biweekly: "双周薪", weekly: "周薪", daily: "日薪（8 小时）",
    baseSalary: "基本薪资", overtimePay: "加班费", totalHours: "全年总工时", effectiveRate: "实际时薪",
    step1: "输入你的时薪（如 25）",
    step2: "设置每周工时（默认 40）和每年工作周数（默认 52）",
    step3: "可选开启加班，并设置加班工时和倍数",
    step4: "查看年薪、月薪、双周薪、周薪和日薪",
  }
});

const { $, t } = GZ;

function setLabels(){
  $("#lblRate").textContent = t("rate");
  $("#lblHours").textContent = t("hours");
  $("#lblWeeks").textContent = t("weeks");
  $("#lblCurrency").textContent = t("currency");
  $("#lblOT").textContent = t("lblOT");
  $("#lblOTHrs").textContent = t("oTHrs");
  $("#lblOTMult").textContent = t("oTMult");
}
setLabels();

$("#useOT").addEventListener("change", e => {
  $("#otFields").style.display = e.target.checked ? "block" : "none";
});
["rate","hours","weeks","otHours","otMult"].forEach(id => $("#"+id).addEventListener("input", calc));
$("#useOT").addEventListener("change", calc);
$("#currency").addEventListener("change", calc);

function fmt(n, cur){
  if (!isFinite(n)) n = 0;
  return cur + n.toLocaleString("en-US", {minimumFractionDigits:2, maximumFractionDigits:2});
}

function calc(){
  const cur = $("#currency").value;
  const rate = parseFloat($("#rate").value) || 0;
  const hpw = parseFloat($("#hours").value) || 0;
  const wpy = parseFloat($("#weeks").value) || 0;
  const useOT = $("#useOT").checked;
  const otH = parseFloat($("#otHours").value) || 0;
  const otMult = parseFloat($("#otMult").value) || 1.5;

  const weeklyBase = rate * hpw;
  let weeklyOT = 0;
  if (useOT) weeklyOT = rate * otMult * otH;
  const weeklyTotal = weeklyBase + weeklyOT;
  const annual = weeklyTotal * wpy;
  const monthly = annual / 12;
  const biweekly = weeklyTotal * 2;
  const weekly = weeklyTotal;
  const daily = rate * 8;
  const totalHours = (hpw + (useOT?otH:0)) * wpy;
  const effective = totalHours > 0 ? annual / totalHours : 0;

  $("#result").innerHTML = `
    <div class="hs-grid">
      <div class="hs-card highlight"><div class="value">${fmt(annual,cur)}</div><div class="label">${t("annual")}</div></div>
      <div class="hs-card"><div class="value">${fmt(monthly,cur)}</div><div class="label">${t("monthly")}</div></div>
      <div class="hs-card"><div class="value">${fmt(biweekly,cur)}</div><div class="label">${t("biweekly")}</div></div>
      <div class="hs-card"><div class="value">${fmt(weekly,cur)}</div><div class="label">${t("weekly")}</div></div>
      <div class="hs-card"><div class="value">${fmt(daily,cur)}</div><div class="label">${t("daily")}</div></div>
    </div>
    <div class="hs-detail">
      <div class="row"><span>${t("baseSalary")}</span><span class="v">${fmt(weeklyBase*wpy,cur)}</span></div>
      ${useOT?`<div class="row"><span>${t("overtimePay")}</span><span class="v">${fmt(weeklyOT*wpy,cur)}</span></div>`:""}
      <div class="row"><span>${t("totalHours")}</span><span class="v">${totalHours.toLocaleString("en-US",{maximumFractionDigits:1})}</span></div>
      <div class="row"><span>${t("effectiveRate")}</span><span class="v">${fmt(effective,cur)}/h</span></div>
    </div>`;
}

$("#toolbar").innerHTML = `<button class="gz-btn" onclick="calc()">${t("calculate")||"Calculate"}</button>`;

GZ.renderToolPage({
  category: "calc",
  titleKey: "toolTitle",
  descKey: "toolDesc",
  howToSteps: ["step1","step2","step3","step4"],
  related: [
    {icon:"💵", href:"/calc/pay-raise-calculator.html", name:"Pay Raise"},
    {icon:"🏠", href:"/calc/mortgage-calculator.html", name:"Mortgage"},
    {icon:"📈", href:"/calc/compound-interest.html", name:"Compound Interest"},
    {icon:"💰", href:"/calc/savings-goal-calculator.html", name:"Savings Goal"},
  ]
});
calc();
</script>
</body></html>
