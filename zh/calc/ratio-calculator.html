<div class="gz-container">

  <div class="gz-tool-area">

</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Ratio Calculator',
    toolDesc: 'Solve proportions A:B = C:D, simplify ratios, and convert to fractions, decimals and percentages instantly.',
    proportionMode: 'Solve Proportion',
    simplifyMode: 'Simplify Ratio',
    calculate: 'Calculate',
    clear: 'Clear',
    example: 'Example',
    missingX: 'X (solve)',
    simplifiedRatio: 'Simplified Ratio',
    fraction: 'Fraction',
    decimal: 'Decimal',
    percentage: 'Percentage',
    multiplier: 'Multiplier',
    gcd: 'GCD',
    enterA: 'A',
    enterB: 'B',
    enterC: 'C',
    enterD: 'D',
    step1: 'Choose a mode: Solve Proportion or Simplify Ratio',
    step2: 'Enter the values (leave one blank to solve for it)',
    step3: 'Click Calculate to get instant results',
    step4: 'See the simplified form, fraction, decimal and percentage',
  },
  zh: {
    toolTitle: '比例计算器',
    toolDesc: '即时求解比例 A:B = C:D，化简比例，转换为分数、小数和百分比。',
    proportionMode: '求解比例',
    simplifyMode: '化简比例',
    calculate: '计算',
    clear: '清除',
    example: '示例',
    missingX: 'X（求解）',
    simplifiedRatio: '化简比例',
    fraction: '分数',
    decimal: '小数',
    percentage: '百分比',
    multiplier: '倍数',
    gcd: '最大公约数',
    enterA: 'A',
    enterB: 'B',
    enterC: 'C',
    enterD: 'D',
    step1: '选择模式：求解比例或化简比例',
    step2: '输入数值（留空一个以求解）',
    step3: '点击计算获取即时结果',
    step4: '查看化简形式、分数、小数和百分比',
  }
});

let mode = 'proportion';
const { $, t } = GZ;

function gcd(a, b) { a = Math.abs(a); b = Math.abs(b); while (b) { [a, b] = [b, a % b]; } return a; }

function renderModes() {
  $('#modes').innerHTML = `
    <button class="gz-btn ${mode==='proportion'?'active':''}" onclick="setMode('proportion')">${t('proportionMode')}</button>
    <button class="gz-btn ${mode==='simplify'?'active':''}" onclick="setMode('simplify')">${t('simplifyMode')}</button>`;
}

function setMode(m) { mode = m; renderInput(); renderModes(); $('#results').innerHTML = ''; }

function renderInput() {
  if (mode === 'proportion') {
    $('#input-area').innerHTML = `<div class="ratio-grid">
      <input type="number" id="inpA" placeholder="${t('enterA')}">
      <span class="colon">:</span>
      <input type="number" id="inpB" placeholder="${t('enterB')}">
      <span class="eq">=</span>
      <input type="number" id="inpC" placeholder="${t('enterC')}">
      <span class="colon">:</span>
      <input type="number" id="inpD" placeholder="${t('enterD')}">
    </div>`;
  } else {
    $('#input-area').innerHTML = `<div class="ratio-grid" style="grid-template-columns:1fr auto 1fr">
      <input type="number" id="inpA" placeholder="${t('enterA')}">
      <span class="colon">:</span>
      <input type="number" id="inpB" placeholder="${t('enterB')}">
    </div>`;
  }
}

function calculate() {
  const results = $('#results');
  if (mode === 'proportion') {
    const vals = ['inpA','inpB','inpC','inpD'].map(id => {
      const el = document.getElementById(id);
      return el.value === '' ? null : parseFloat(el.value);
    });
    const nullCount = vals.filter(v => v === null).length;
    if (nullCount !== 1) { results.innerHTML = '<div class="result-box"><p style="color:var(--gz-accent)">Please leave exactly one field blank to solve for it.</p></div>'; return; }
    let [A, B, C, D] = vals;
    let solved = '';
    if (A === null) { A = (B * C) / D; solved = `A = ${A}`; document.getElementById('inpA').value = A; }
    else if (B === null) { B = (A * D) / C; solved = `B = ${B}`; document.getElementById('inpB').value = B; }
    else if (C === null) { C = (A * D) / B; solved = `C = ${C}`; document.getElementById('inpC').value = C; }
    else if (D === null) { D = (B * C) / A; solved = `D = ${D}`; document.getElementById('inpD').value = D; }

    const g = gcd(A, B);
    const sA = A / g, sB = B / g;
    const g2 = gcd(C, D);
    const sC = C / g2, sD = D / g2;

    results.innerHTML = `<div class="result-box">
      <h3>${solved}</h3>
      <div class="result-row"><span class="result-label">A : B</span><span class="result-value">${A} : ${B}</span></div>
      <div class="result-row"><span class="result-label">C : D</span><span class="result-value">${C} : ${D}</span></div>
      <div class="result-row"><span class="result-label">${t('simplifiedRatio')} (A:B)</span><span class="result-value">${sA} : ${sB}</span></div>
      <div class="result-row"><span class="result-label">${t('simplifiedRatio')} (C:D)</span><span class="result-value">${sC} : ${sD}</span></div>
      <div class="result-row"><span class="result-label">${t('fraction')} (A/B)</span><span class="result-value">${sA}/${sB}</span></div>
      <div class="result-row"><span class="result-label">${t('decimal')}</span><span class="result-value">${(A/B).toFixed(6)}</span></div>
      <div class="result-row"><span class="result-label">${t('percentage')}</span><span class="result-value">${((A/B)*100).toFixed(2)}%</span></div>
      <div class="result-row"><span class="result-label">${t('gcd')} (A,B)</span><span class="result-value">${g}</span></div>
    </div>`;
  } else {
    const A = parseFloat(document.getElementById('inpA').value);
    const B = parseFloat(document.getElementById('inpB').value);
    if (!A || !B) { results.innerHTML = '<div class="result-box"><p style="color:var(--gz-accent)">Please enter both values.</p></div>'; return; }
    const g = gcd(A, B);
    const sA = A / g, sB = B / g;
    results.innerHTML = `<div class="result-box">
      <h3>${A} : ${B} → ${sA} : ${sB}</h3>
      <div class="result-row"><span class="result-label">${t('simplifiedRatio')}</span><span class="result-value">${sA} : ${sB}</span></div>
      <div class="result-row"><span class="result-label">${t('fraction')}</span><span class="result-value">${sA}/${sB}</span></div>
      <div class="result-row"><span class="result-label">${t('decimal')}</span><span class="result-value">${(A/B).toFixed(6)}</span></div>
      <div class="result-row"><span class="result-label">${t('percentage')}</span><span class="result-value">${((A/B)*100).toFixed(2)}%</span></div>
      <div class="result-row"><span class="result-label">${t('multiplier')}</span><span class="result-value">×${g}</span></div>
      <div class="result-row"><span class="result-label">${t('gcd')}</span><span class="result-value">${g}</span></div>
    </div>`;
  }
}

function loadExample() {
  if (mode === 'proportion') {
    document.getElementById('inpA').value = 3;
    document.getElementById('inpB').value = 4;
    document.getElementById('inpC').value = 9;
    document.getElementById('inpD').value = '';
  } else {
    document.getElementById('inpA').value = 24;
    document.getElementById('inpB').value = 36;
  }
  calculate();
}

function doClear() {
  ['inpA','inpB','inpC','inpD'].forEach(id => { const el = document.getElementById(id); if(el) el.value = ''; });
  $('#results').innerHTML = '';
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="calculate()">${t('calculate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

renderModes();
renderInput();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🔢', href:'/calc/percentage-calculator.html', name:'% Calculator'},
    {icon:'½', href:'/calc/fraction-calculator.html', name:'Fractions'},
    {icon:'📐', href:'/calc/aspect-ratio.html', name:'Aspect Ratio'},
    {icon:'🔢', href:'/calc/percentage-calculator.html', name:'Percent'},
  ]
});
</script>
<script src="/tools-result-rec.js?v=20260707v520" defer></script>
</body>
