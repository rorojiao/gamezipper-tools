const { $, copyText, t } = GZ;

let ipData = null;

function makeCard(label, value) {
  return `<div class="info-card"><div class="label">${label}</div><div class="value">${value || '—'}</div></div>`;
}

function detectBrowser() {
  const ua = navigator.userAgent;
  if (ua.includes('Firefox/')) return 'Firefox ' + ua.match(/Firefox\/(\d+)/)?.[1];
  if (ua.includes('Edg/')) return 'Edge ' + ua.match(/Edg\/(\d+)/)?.[1];
  if (ua.includes('Chrome/')) return 'Chrome ' + ua.match(/Chrome\/(\d+)/)?.[1];
  if (ua.includes('Safari/') && !ua.includes('Chrome')) return 'Safari ' + ua.match(/Version\/(\d+)/)?.[1];
  if (ua.includes('Opera') || ua.includes('OPR/')) return 'Opera ' + (ua.match(/OPR\/(\d+)/)?.[1] || '');
  return navigator.userAgent.substring(0, 50);
}

function detectOS() {
  const ua = navigator.userAgent;
  if (ua.includes('Win')) return 'Windows';
  if (ua.includes('Mac')) return 'macOS';
  if (ua.includes('Linux') && !ua.includes('Android')) return 'Linux';
  if (ua.includes('Android')) return 'Android';
  if (ua.includes('iPhone') || ua.includes('iPad')) return 'iOS';
  return navigator.platform || 'Unknown';
}

function showBrowserInfo() {
  const html = [
    makeCard(t('browser'), detectBrowser()),
    makeCard(t('os'), detectOS()),
    makeCard(t('platform'), navigator.platform || '—'),
    makeCard(t('language'), navigator.language || '—'),
    makeCard(t('screenRes'), `${screen.width} × ${screen.height}`),
    makeCard(t('viewport'), `${window.innerWidth} × ${window.innerHeight}`),
    makeCard(t('colorDepth'), `${screen.colorDepth}-bit`),
    makeCard(t('pixelRatio'), window.devicePixelRatio?.toFixed(1) + 'x' || '—'),
    makeCard(t('online'), navigator.onLine ? `<span style="color:var(--gz-success)">${t('onlineYes')}</span>` : `<span style="color:var(--gz-accent)">${t('onlineNo')}</span>`),
    makeCard(t('cookies'), navigator.cookieEnabled ? '✓' : '✗'),
    makeCard(t('doNotTrack'), navigator.doNotTrack === '1' ? '✓ Enabled' : '✗ Disabled'),
    makeCard(t('userAgent'), `<span style="font-size:.78em;word-break:break-all">${navigator.userAgent}</span>`),
  ].join('');
  $('#browser-info').innerHTML = html;
}

async function fetchIP() {
  const display = $('#ip-display');
  display.textContent = 'Loading...';
  display.className = 'ip-big loading';

  try {
    const res = await fetch('https://ipapi.co/json/', { signal: AbortSignal.timeout(8000) });
    if (!res.ok) throw new Error('API error');
    ipData = await res.json();

    display.textContent = ipData.ip || '—';
    display.className = 'ip-big';

    const isIPv6 = ipData.ip && ipData.ip.includes(':');
    const html = [
      makeCard(t('city'), ipData.city),
      makeCard(t('region'), ipData.region),
      makeCard(t('country'), `${ipData.country_name || ''} ${ipData.country_code ? '(' + ipData.country_code + ')' : ''}`),
      makeCard(t('postal'), ipData.postal),
      makeCard(t('timezone'), ipData.timezone),
      makeCard(t('coordinates'), ipData.latitude && ipData.longitude ? `${ipData.latitude}, ${ipData.longitude}` : '—'),
      makeCard(t('isp'), ipData.org),
      makeCard(t('asn'), ipData.asn),
      makeCard(t('ipVersion'), isIPv6 ? 'IPv6' : 'IPv4'),
    ].join('');
    $('#ip-info').innerHTML = html;
  } catch(e) {
    display.textContent = t('loadFailed');
    display.className = 'ip-big';
    display.style.color = 'var(--gz-accent)';
  }
}

function copyIP() {
  if (ipData && ipData.ip) {
    copyText(ipData.ip);
    const msg = $('#copy-msg');
    msg.textContent = t('copied');
    setTimeout(() => msg.textContent = '', 2000);
  }
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="copyIP()">${t('copyIp')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="fetchIP()">${t('refresh')}</button>`;

$('#browser-title').textContent = t('browserTitle');

showBrowserInfo();
fetchIP();
