  zh: {

    toolDesc: '将 JSON 数组数据即时转换为整洁美观的 HTML 表格。实时预览、复制 HTML 源码、一键导出 — 100% 浏览器本地运行。',
    convert: '转换',

    copyHtml: '复制 HTML',
    preview: '预览',
    htmlSource: 'HTML 源码',
    inputLabel: 'JSON 输入',
    outputLabel: '结果',
    noData: '输入 JSON 数组以查看表格',
    error: 'JSON 无效：',
    success: '✓ 表格已生成',
    step1: '在输入区粘贴 JSON 对象数组',
    step2: '点击「转换」生成表格',
    step3: '在「预览」和「HTML 源码」之间切换',
    step4: '点击「复制」复制 HTML 表格代码',
  }
});

const { $, copyText, t } = GZ;
let lastTableHtml = '';

function getData(inp) {
  const obj = JSON.parse(inp);
  let arr = obj;
  if (!Array.isArray(arr)) {
    if (typeof obj === 'object' && obj !== null) {
      const arrKey = Object.keys(obj).find(k => Array.isArray(obj[k]));
      if (arrKey) arr = obj[arrKey];
      else arr = [obj];
    } else { throw new Error('Input must be a JSON array or object'); }
  }
  return arr;
}

function escapeHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function doConvert() {
  const inp = $('#input').value.trim();
  if (!inp) { $('#output').innerHTML = `<span style="opacity:.5">${t('noData')}</span>`; $('#html-out').textContent=''; $('#status').innerHTML=''; return; }
  try {
    const arr = getData(inp);
    const keys = [...new Set(arr.flatMap(o => typeof o === 'object' && o !== null ? Object.keys(o) : []))];
    if (keys.length === 0) throw new Error('No object keys found in array');

    let html = '<table class="preview-table">\n  <thead>\n    <tr>';
    keys.forEach(k => { html += `<th>${escapeHtml(k)}</th>`; });
    html += '</tr>\n  </thead>\n  <tbody>\n';
    arr.forEach(row => {
      html += '    <tr>';
      keys.forEach(k => {
        const v = (typeof row === 'object' && row !== null) ? row[k] : '';
        const display = v === undefined || v === null ? '' : (typeof v === 'object' ? JSON.stringify(v) : String(v));
        html += `<td>${escapeHtml(display)}</td>`;
      });
      html += '</tr>\n';
    });
    html += '  </tbody>\n</table>';
    lastTableHtml = html;
    $('#output').innerHTML = html;
    $('#html-out').textContent = html;
    $('#status').innerHTML = `<span style="color:var(--gz-success)">${t('success')} (${arr.length} rows × ${keys.length} cols)</span>`;
  } catch(e) {
    $('#status').innerHTML = `<span style="color:var(--gz-accent)">${t('error')}${e.message}</span>`;
    $('#output').innerHTML = `<span style="color:var(--gz-accent)">${e.message}</span>`;
    $('#html-out').textContent = '';
  }
}

function showTab(tab) {
  if (tab === 'preview') {
    $('#output').style.display = 'block';
    $('#html-out').style.display = 'none';
  } else {
    $('#output').style.display = 'none';
    $('#html-out').style.display = 'block';
  }
  document.querySelectorAll('.gz-tab').forEach(el => el.classList.toggle('active', el.dataset.tab === tab));
}

function loadExample() {
  $('#input').value = JSON.stringify([
    {id:1,name:'Alice',email:'alice@example.com',role:'Admin',active:true},
    {id:2,name:'Bob',email:'bob@example.com',role:'Editor',active:true},
    {id:3,name:'Charlie',email:'charlie@example.com',role:'Viewer',active:false},
    {id:4,name:'Diana',email:'diana@example.com',role:'Editor',active:true}
  ], null, 2);
  doConvert();
}

function doClear() { $('#input').value=''; $('#output').innerHTML=''; $('#html-out').textContent=''; $('#status').innerHTML=''; }

$('#tabs').innerHTML = `
  <button class="gz-tab active" data-tab="preview" onclick="showTab('preview')">${t('preview')}</button>
  <button class="gz-tab" data-tab="html" onclick="showTab('html')">${t('htmlSource')}</button>`;

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="doConvert()">${t('convert')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn" onclick="copyText(lastTableHtml)">${t('copyHtml')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

$('#input').addEventListener('input', () => { clearTimeout(window._j2tTimer); window._j2tTimer = setTimeout(doConvert, 300); });
$('#lbl-in').textContent = t('inputLabel');
$('#lbl-out').textContent = t('outputLabel');

    {icon:'🗂️', href:'/convert/json-to-csv.html', name:'JSON to CSV'},
  ]
});
