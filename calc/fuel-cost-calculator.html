<style>

.gz-form label{display:block;font-size:.85em;color:var(--text2);margin-bottom:4px;font-weight:600}
.gz-form input,.gz-form select{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:10px;background:var(--glass2);color:var(--text);font-size:1rem;box-sizing:border-box}
.gz-form input:focus,.gz-form select:focus{outline:none;border-color:var(--accent)}
.result-card{background:var(--glass);border:1px solid var(--border);border-radius:16px;padding:24px;margin-top:20px;text-align:center}
.result-card .big{font-size:2.4rem;font-weight:900;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.result-card .label{color:var(--text2);font-size:.9rem;margin-top:4px}
.result-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:16px}
.result-item{background:var(--glass2);border:1px solid var(--border);border-radius:12px;padding:14px;text-align:center}

</style>
<script type="application/ld+json">{"@context":"https://schema.org","@type":"WebApplication","name":"Fuel Cost Calculator","description":"Calculate fuel cost for your trip. Enter distance, fuel efficiency and gas price to estimate total fuel cost instantly.","url":"https://tools.gamezipper.com/calc/fuel-cost-calculator.html","applicationCategory":"Utility","operatingSystem":"Web Browser","offers":{"@type":"Offer","price":"0"}}</script>
<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "How do I calculate fuel cost for a trip?", "acceptedAnswer": {"@type": "Answer", "text": "Enter the trip distance, your vehicle's fuel consumption rate (e.g. liters per 100km or miles per gallon), and the current fuel price. The calculator will instantly show the total fuel cost."}}, {"@type": "Question", "name": "Does this tool support both metric and imperial units?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. You can switch between km/liters and miles/gallons. The calculator automatically converts and computes the correct result."}}, {"@type": "Question", "name": "Is my data sent to any server?", "acceptedAnswer": {"@type": "Answer", "text": "No. All calculations happen entirely in your browser. No data is sent to any server."}}, {"@type": "Question", "name": "Can I calculate fuel cost for a round trip?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. Simply enter the round-trip distance (double the one-way distance) or use the round-trip checkbox to automatically double the distance."}}]}</script>

<link rel="alternate" hreflang="zh" href="https://tools.gamezipper.com/zh/calc/fuel-cost-calculator.html">

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-form" id="form">
      <div>
        <label id="lbl-unit"></label>
        <select id="unit">
          <option value="metric">km / liters / L per 100km</option>
          <option value="imperial">miles / gallons / MPG</option>
        </select>
      </div>
      <div>
        <label id="lbl-distance"></label>
        <input type="number" id="distance" value="500" min="0" step="1">
      </div>
      <div>
        <label id="lbl-consumption"></label>
        <input type="number" id="consumption" value="8" min="0" step="0.1">
      </div>
      <div>
        <label id="lbl-price"></label>
        <input type="number" id="price" value="1.5" min="0" step="0.01">
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <input type="checkbox" id="roundtrip" style="width:auto">
        <label for="roundtrip" id="lbl-roundtrip" style="margin:0;font-size:.9rem;color:var(--text);cursor:pointer"></label>
      </div>
      <button class="gz-btn" onclick="calculate()" id="btn-calc"></button>
    </div>
    <div class="result-card" id="result" style="display:none">
      <div class="big" id="result-cost"></div>
      <div class="label" id="result-label"></div>
      <div class="result-grid">
        <div class="result-item"><div class="val" id="result-fuel"></div><div class="lbl" id="result-fuel-label"></div></div>
        <div class="result-item"><div class="val" id="result-dist"></div><div class="lbl" id="result-dist-label"></div></div>
        <div class="result-item"><div class="val" id="result-efficiency"></div><div class="lbl" id="result-eff-label"></div></div>
        <div class="result-item"><div class="val" id="result-cost-per-unit"></div><div class="lbl" id="result-cpu-label"></div></div>
      </div>
    </div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Fuel Cost Calculator',
    toolDesc: 'Calculate fuel cost for your trip based on distance, fuel efficiency, and gas price.',
    lblUnit: 'Unit System',
    lblDistance: 'Trip Distance (km)',
    lblDistanceImp: 'Trip Distance (miles)',
    lblConsumption: 'Fuel Consumption (L/100km)',
    lblConsumptionImp: 'Fuel Consumption (MPG)',
    lblPrice: 'Fuel Price (per liter)',
    lblPriceImp: 'Fuel Price (per gallon)',
    lblRoundtrip: 'Round trip (double distance)',
    btnCalc: 'Calculate Fuel Cost',
    resultLabel: 'Estimated Fuel Cost',
    fuelUsed: 'Fuel Needed',
    totalDist: 'Total Distance',
    efficiency: 'Efficiency',
    costPerDist: 'Cost per km',
    costPerDistImp: 'Cost per mile',
    liters: 'liters',
    gallons: 'gallons',
    km: 'km',
    miles: 'miles',
    step1: 'Select metric (km/L) or imperial (miles/gallon) units',
    step2: 'Enter your trip distance, vehicle fuel consumption, and fuel price',
    step3: 'Check "Round trip" if you are returning to your starting point',
    step4: 'Click Calculate to see the estimated fuel cost and fuel needed',
  },
  zh: {
    toolTitle: '油费计算器',
    toolDesc: '根据行驶距离、油耗和油价，计算旅途所需油费。',
    lblUnit: '单位系统',
    lblDistance: '行驶距离（公里）',
    lblDistanceImp: '行驶距离（英里）',
    lblConsumption: '油耗（升/百公里）',
    lblConsumptionImp: '油耗（MPG）',
    lblPrice: '油价（每升）',
    lblPriceImp: '油价（每加仑）',
    lblRoundtrip: '往返行程（距离翻倍）',
    btnCalc: '计算油费',
    resultLabel: '预计油费',
    fuelUsed: '所需油量',
    totalDist: '总里程',
    efficiency: '油耗表现',
    costPerDist: '每公里费用',
    costPerDistImp: '每英里费用',
    liters: '升',
    gallons: '加仑',
    km: '公里',
    miles: '英里',
    step1: '选择公制（公里/升）或英制（英里/加仑）',
    step2: '输入行驶距离、车辆油耗和当前油价',
    step3: '如为往返行程，勾选「往返行程」',
    step4: '点击「计算油费」查看预估费用和所需油量',
  }
});

const { $, copyText, t } = GZ;
const lang = GZI18n.getLang();

function updateLabels() {
  const u = $('#unit').value;
  const isImp = u === 'imperial';
  const dLabel = $('#lbl-distance');
  const cLabel = $('#lbl-consumption');
  const pLabel = $('#lbl-price');
  dLabel.textContent = isImp ? t('lblDistanceImp') : t('lblDistance');
  cLabel.textContent = isImp ? t('lblConsumptionImp') : t('lblConsumption');
  pLabel.textContent = isImp ? t('lblPriceImp') : t('lblPrice');
}

function calculate() {
  const u = $('#unit').value;
  const isImp = u === 'imperial';
  let dist = parseFloat($('#distance').value) || 0;
  const cons = parseFloat($('#consumption').value) || 0;
  const price = parseFloat($('#price').value) || 0;

  const roundtrip = $('#roundtrip').checked;
  if (roundtrip) dist *= 2;

  let fuelNeeded, totalCost;
  if (isImp) {
    // cons = MPG, price = per gallon
    fuelNeeded = cons > 0 ? dist / cons : 0;
    totalCost = fuelNeeded * price;
  } else {
    // cons = L/100km, price = per liter
    fuelNeeded = dist * cons / 100;
    totalCost = fuelNeeded * price;
  }

  const currency = '$';
  $('#result').style.display = '';
  $('#result-cost').textContent = currency + totalCost.toFixed(2);
  $('#result-label').textContent = t('resultLabel');

  const fuelUnit = isImp ? t('gallons') : t('liters');
  const distUnit = isImp ? t('miles') : t('km');
  $('#result-fuel').textContent = fuelNeeded.toFixed(2) + ' ' + fuelUnit;
  $('#result-fuel-label').textContent = t('fuelUsed');
  $('#result-dist').textContent = dist.toFixed(0) + ' ' + distUnit;
  $('#result-dist-label').textContent = t('totalDist');
  $('#result-efficiency').textContent = cons + (isImp ? ' MPG' : ' L/100km');
  $('#result-eff-label').textContent = t('efficiency');
  const costPerDist = dist > 0 ? (totalCost / dist).toFixed(3) : '0';
  $('#result-cost-per-unit').textContent = currency + costPerDist + '/' + (isImp ? 'mi' : 'km');
  $('#result-cpu-label').textContent = isImp ? t('costPerDistImp') : t('costPerDist');
}

$('#btn-calc').textContent = t('btnCalc');
$('#lbl-roundtrip').textContent = t('lblRoundtrip');
$('#unit').addEventListener('change', updateLabels);
updateLabels();
calculate();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📅', href:'/calc/date-calculator.html', name:'Date Calculator'},
    {icon:'📏', href:'/convert/unit.html', name:'Unit Converter'},
    {icon:'🔢', href:'/convert/number-base.html', name:'Number Base'},
    {icon:'💡', href:'/calc/percentage-calculator.html', name:'Percentage Calculator'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
