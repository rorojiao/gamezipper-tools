<script>
GZI18n.register({
  en:{
    toolTitle:'Protect PDF — Add Password to PDF',
    toolDesc:'Encrypt and lock a PDF with a password. Set a user and/or owner password and restrict printing, copying and editing. Everything runs in your browser — your file and password never get uploaded.',
    dropText:'Drop a PDF here or click to browse',
    userPwd:'User password (to open) *',
    ownerPwd:'Owner password (optional)',
    perms:'Restrictions (optional)',
    pPrint:'Allow printing',
    pCopy:'Allow copying text & images',
    pModify:'Allow modifying the document',
    pAnnot:'Allow annotations & forms',
    encrypt:'Encrypt & Download',
    clear:'Clear',
    noFile:'Please choose a PDF file first',
    noPwd:'Please enter a user password',
    done:'Encrypted PDF downloaded!',
    tooShort:'Password must be at least 1 character',
    step1:'Drop or select the PDF you want to protect',
    step2:'Enter a user password (required to open) and optionally an owner password',
    step3:'Optionally tick restrictions for printing, copying and editing',
    step4:'Click Encrypt & Download — the protected PDF is generated locally and saved',
  },
  zh:{
    toolTitle:'PDF 加密保护 — 给 PDF 添加密码',
    toolDesc:'用密码加密并锁定 PDF。可设置用户密码和/或所有者密码，并限制打印、复制和编辑。全部在浏览器本地完成，文件和密码都不会上传。',
    dropText:'拖拽 PDF 到此处或点击选择',
    userPwd:'用户密码（打开时需要）*',
    ownerPwd:'所有者密码（可选）',
    perms:'权限限制（可选）',
    pPrint:'允许打印',
    pCopy:'允许复制文字和图片',
    pModify:'允许修改文档',
    pAnnot:'允许批注和填写表单',
    encrypt:'加密并下载',
    clear:'清除',
    noFile:'请先选择一个 PDF 文件',
    noPwd:'请输入用户密码',
    done:'加密后的 PDF 已下载！',
    tooShort:'密码至少需要 1 个字符',
    step1:'拖入或选择需要加密的 PDF',
    step2:'输入用户密码（打开时必需），可选填所有者密码',
    step3:'可选勾选打印、复制、编辑等权限限制',
    step4:'点击「加密并下载」— 受保护的 PDF 在本地生成并保存',
  }
});
const {$,t}=GZ;
let pdfFile=null;

function formatSize(b){if(b<1024)return b+' B';if(b<1048576)return(b/1024).toFixed(1)+' KB';return(b/1048576).toFixed(1)+' MB';}

function renderFile(){
  if(!pdfFile){$('#fileHolder').innerHTML='';$('#opts').style.display='none';return;}
  $('#fileHolder').innerHTML=`<div class="pdf-file"><span>📄</span><span class="fname">${pdfFile.name}</span><span class="gz-text-muted">${formatSize(pdfFile.size)}</span><button class="remove" onclick="pdfFile=null;renderFile()">✕</button></div>`;
  $('#opts').style.display='block';
}

$('#dropText').textContent=t('dropText');
const dz=$('#dropZone');
dz.addEventListener('click',()=>$('#fileInput').click());
$('#fileInput').addEventListener('change',e=>{if(e.target.files[0]){pdfFile=e.target.files[0];renderFile();}e.target.value='';});
dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('dragover');});
dz.addEventListener('dragleave',()=>dz.classList.remove('dragover'));
dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('dragover');if(e.dataTransfer.files[0]&&/pdf/i.test(e.dataTransfer.files[0].type||e.dataTransfer.files[0].name)){pdfFile=e.dataTransfer.files[0];renderFile();}});

const PERMS=[
  {id:'printing',key:'pPrint',perm:{printing:'highResolution'}},
  {id:'copying',key:'pCopy',perm:{copying:true}},
  {id:'modifying',key:'pModify',perm:{modifying:true}},
  {id:'annotating',key:'pAnnot',perm:{annotating:true,fillingForms:true}},
];
$('#permGrid').innerHTML=PERMS.map(p=>`<label><input type="checkbox" id="perm_${p.id}" checked> ${t(p.key)}</label>`).join('');

async function encryptPDF(){
  if(!pdfFile){alert(t('noFile'));return;}
  const userPwd=$('#userPwd').value;
  if(!userPwd){alert(t('noPwd'));return;}
  let ownerPwd=$('#ownerPwd').value.trim();
  // map checkbox state to pdf-lib permission flags (checked = allowed)
  const finalPerms={};
  PERMS.forEach(p=>{
    const c=$('#perm_'+p.id).checked;
    if(p.id==='printing'){finalPerms.printing=c?'highResolution':'notAllowed';}
    else if(p.id==='copying'){finalPerms.copying=c;}
    else if(p.id==='modifying'){finalPerms.modifying=c;}
    else if(p.id==='annotating'){finalPerms.annotating=c;finalPerms.fillingForms=c;}
  });
  try{
    const {PDFDocument}=PDFLib;
    const bytes=await pdfFile.arrayBuffer();
    const doc=await PDFDocument.load(bytes,{ignoreEncryption:true});
    const opts={userPassword:userPwd,permissions:finalPerms};
    if(ownerPwd)opts.ownerPassword=ownerPwd;
    const out=await doc.save(opts);
    const blob=new Blob([out],{type:'application/pdf'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download=pdfFile.name.replace(/\.pdf$/i,'')+'-protected.pdf';a.click();
    URL.revokeObjectURL(url);
    GZ.showToast(t('done'));
  }catch(e){alert('Error: '+e.message);}
}

$('#toolbar').innerHTML=`<button class="gz-btn" onclick="encryptPDF()">🔒 ${t('encrypt')}</button><button class="gz-btn gz-btn-secondary" onclick="pdfFile=null;renderFile();$('#userPwd').value='';$('#ownerPwd').value='';">${t('clear')}</button>`;

GZ.renderToolPage({category:'convert',titleKey:'toolTitle',descKey:'toolDesc',howToSteps:['step1','step2','step3','step4'],related:[
  {icon:'🔓',href:'/convert/unlock-pdf.html',name:'Unlock PDF'},
  {icon:'🔗',href:'/convert/pdf-merger.html',name:'PDF Merger'},
  {icon:'✂️',href:'/convert/pdf-splitter.html',name:'PDF Splitter'},
  {icon:'🗜️',href:'/convert/pdf-compressor.html',name:'PDF Compressor'},
]});
</script>
