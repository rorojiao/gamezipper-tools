<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is a mesh gradient?", "acceptedAnswer": {"@type": "Answer", "text": "A mesh gradient is a multi-point radial gradient that blends several colors at different positions, creating smooth organic color transitions. Popular in modern web and app design, mesh gradients produce the soft, colorful backgrounds seen on many landing pages."}}, {"@type": "Question", "name": "How is a mesh gradient created in CSS?", "acceptedAnswer": {"@type": "Answer", "text": "The tool layers multiple radial-gradient backgrounds at different positions, each with its own color and size. The browser blends them together to produce the mesh effect. The generated CSS uses the standard background property and works in all modern browsers."}}, {"@type": "Question", "name": "Can I add or remove color stops?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. Use the Add Color and Remove buttons to control how many color points your mesh gradient uses. The tool supports 2 to 6 color stops for optimal blending."}}, {"@type": "Question", "name": "Does the mesh gradient work on all browsers?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. The technique uses standard CSS radial-gradients which are supported by all modern browsers including Chrome, Firefox, Safari and Edge with 98%+ global support."}}]}</script>

<script>
GZI18n.register({
  en: {
    toolTitle: 'CSS Mesh Gradient Generator',
    toolDesc: 'Create stunning multi-color mesh gradients with live preview. Add color stops, adjust positions and blur — copy production-ready CSS instantly.',
    preset: 'Preset', addColor: 'Add Color', removeColor: 'Remove', copyCode: 'Copy CSS',
    copied: 'Copied!', gradientSize: 'Gradient Size', blur: 'Softness', height: 'Height',
    pSunset: 'Sunset', pOcean: 'Ocean', pAurora: 'Aurora', pCandy: 'Candy', pForest: 'Forest', pCosmic: 'Cosmic', pPeach: 'Peach', pMint: 'Mint',
    color: 'Color', position: 'Position',
    step1: 'Choose a preset or start from the default mesh gradient',
    step2: 'Add or remove color stops and adjust their positions',
    step3: 'Fine-tune the gradient size and softness',
    step4: 'Copy the CSS code for your project',
  },
  zh: {
    toolTitle: 'CSS 网格渐变生成器',
    toolDesc: '创建精美的多色网格渐变效果，实时预览。添加颜色点、调整位置和柔和度 — 一键复制 CSS 代码。',
    preset: '预设', addColor: '添加颜色', removeColor: '删除', copyCode: '复制 CSS',
    copied: '已复制！', gradientSize: '渐变大小', blur: '柔和度', height: '高度',
    pSunset: '日落', pOcean: '海洋', pAurora: '极光', pCandy: '糖果', pForest: '森林', pCosmic: '宇宙', pPeach: '蜜桃', pMint: '薄荷',
    color: '颜色', position: '位置',
    step1: '选择预设或从默认网格渐变开始',
    step2: '添加或删除颜色点并调整位置',
    step3: '微调渐变大小和柔和度',
    step4: '复制生成的 CSS 代码',
  }
});

const { $, copyText, t } = GZ;

const presets = {
  sunset:  [{c:'#ff6b6b',x:20,y:20},{c:'#feca57',x:80,y:30},{c:'#ff9ff3',x:50,y:80},{c:'#ee5a6f',x:90,y:90}],
  ocean:   [{c:'#0061ff',x:20,y:30},{c:'#60efff',x:80,y:20},{c:'#0093E9',x:50,y:80},{c:'#80D0C7',x:90,y:70}],
  aurora:  [{c:'#00dbde',x:15,y:25},{c:'#fc00ff',x:85,y:20},{c:'#4facfe',x:30,y:85},{c:'#00f2fe',x:80,y:75},{c:'#a855f7',x:50,y:50}],
  candy:   [{c:'#ff9a9e',x:20,y:20},{c:'#fad0c4',x:80,y:30},{c:'#ffecd2',x:50,y:70},{c:'#fbc2eb',x:80,y:80}],
  forest:  [{c:'#38ef7d',x:20,y:30},{c:'#11998e',x:80,y:20},{c:'#0cebeb',x:30,y:80},{c:'#2ecc71',x:80,y:80}],
  cosmic:  [{c:'#8e2de2',x:20,y:25},{c:'#4a00e0',x:80,y:20},{c:'#e94057',x:30,y:80},{c:'#f27121',x:80,y:75}],
  peach:   [{c:'#ffecd2',x:20,y:20},{c:'#fcb69f',x:80,y:30},{c:'#ff9a8b',x:50,y:80},{c:'#ff6a88',x:90,y:90}],
  mint:    [{c:'#a8edea',x:20,y:20},{c:'#84fab0',x:80,y:30},{c:'#d4fc79',x:30,y:80},{c:'#96e6a1',x:80,y:80}],
};

let stops = JSON.parse(JSON.stringify(presets.sunset));
let gradSize = 60;
let softness = 100;

function update() {
  // Build CSS mesh gradient: stack radial-gradients
  const layers = stops.map(s =>
    `radial-gradient(at ${s.x}% ${s.y}%, ${s.c} 0px, transparent ${gradSize}%)`
  ).join(', ');
  const bg = `${layers}, #1a1a2e`;
  $('#meshPreview').style.background = bg;
  $('#meshPreview').style.filter = `blur(${softness > 100 ? (softness-100)/100 * 1.5 : 0}px)`;

  // Generate code
  const css = `.mesh-gradient {\n  background:\n${stops.map(s => `    radial-gradient(at ${s.x}% ${s.y}%, ${s.c} 0px, transparent ${gradSize}%)`).join(',\n')};\n  min-height: ${$('#meshPreview').offsetHeight}px;\n}`;
  $('#codeBox').textContent = css;
}

function renderStops() {
  $('#stopsContainer').innerHTML = stops.map((s, i) => `
    <div class="stop-row">
      <input type="color" value="${s.c}" oninput="stops[${i}].c=this.value;update()">
      <span class="pos-label">${t('color')} ${i+1}</span>
      <input type="range" min="0" max="100" value="${s.x}" oninput="stops[${i}].x=+this.value;document.getElementById('xv${i}').textContent=this.value+'%';update()">
      <span class="pos-label" id="xv${i}">${s.x}%</span>
      <input type="range" min="0" max="100" value="${s.y}" oninput="stops[${i}].y=+this.value;document.getElementById('yv${i}').textContent=this.value+'%';update()">
      <span class="pos-label" id="yv${i}">${s.y}%</span>
      ${stops.length > 2 ? `<button class="gz-btn gz-btn-secondary" style="padding:4px 10px;font-size:.8em" onclick="removeStop(${i})">${t('removeColor')}</button>` : ''}
    </div>`).join('');
}

window.removeStop = function(i) {
  if (stops.length > 2) { stops.splice(i, 1); renderStops(); update(); }
};
window.addStop = function() {
  if (stops.length >= 6) return;
  const colors = ['#4ecdc4','#ffd93d','#ff6b6b','#a855f7','#60efff'];
  stops.push({ c: colors[stops.length % colors.length], x: 50, y: 50 });
  renderStops(); update();
};
window.applyPreset = function(name) {
  if (!presets[name]) return;
  stops = JSON.parse(JSON.stringify(presets[name]));
  renderStops(); update();
};

$('#globalControls').innerHTML = `
  <label>${t('gradientSize')}: <span id="sizeVal">${gradSize}%</span>
    <input type="range" min="30" max="90" value="${gradSize}" oninput="gradSize=+this.value;document.getElementById('sizeVal').textContent=this.value+'%';update()"></label>
  <label>${t('softness')}: <span id="softVal">${softness}%</span>
    <input type="range" min="50" max="150" value="${softness}" oninput="softness=+this.value;document.getElementById('softVal').textContent=this.value+'%';update()"></label>`;

$('#toolbar').innerHTML = `
  <select class="gz-select" onchange="applyPreset(this.value)">
    <option value="">${t('preset')}…</option>
    <option value="sunset">${t('pSunset')}</option>
    <option value="ocean">${t('pOcean')}</option>
    <option value="aurora">${t('pAurora')}</option>
    <option value="candy">${t('pCandy')}</option>
    <option value="forest">${t('pForest')}</option>
    <option value="cosmic">${t('pCosmic')}</option>
    <option value="peach">${t('pPeach')}</option>
    <option value="mint">${t('pMint')}</option>
  </select>
  <button class="gz-btn gz-btn-secondary" onclick="addStop()">${t('addColor')}</button>
  <button class="gz-btn" onclick="copyText($('#codeBox').textContent)">${t('copyCode')}</button>`;

renderStops();
update();

GZ.renderToolPage({
  category: 'css',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🌈', href:'/css-tools/gradient.html', name:'CSS Gradient'},
    {icon:'🌈', href:'/css-tools/gradient-border.html', name:'Gradient Border'},
    {icon:'🌈', href:'/css-tools/text-gradient.html', name:'Text Gradient'},
    {icon:'🪟', href:'/css-tools/glassmorphism.html', name:'Glassmorphism'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
