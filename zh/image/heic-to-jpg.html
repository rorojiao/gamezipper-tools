<script>
GZI18n.register({
  en: {
    toolTitle: 'HEIC to JPG Converter',
    toolDesc: 'Convert iPhone HEIC/HEIF photos to JPG online. Batch convert with adjustable quality — 100% browser-based, no upload, no signup.',
    dropHere: 'Drop HEIC/HEIF files here or click to browse',
    quality: 'JPG Quality',
    convert: 'Convert',
    convertAll: 'Convert All',
    downloadAll: 'Download All',
    clearAll: 'Clear',
    converting: 'Converting',
    done: 'Done',
    error: 'Conversion failed',
    step1: 'Drag and drop your HEIC or HEIF files onto the upload area',
    step2: 'Adjust the JPG quality slider if needed (default 90%)',
    step3: 'Click Convert All to process every file',
    step4: 'Download individual JPGs or use Download All',
  },
  zh: {
    toolTitle: 'HEIC 转 JPG 转换器',
    toolDesc: '在线将 iPhone 的 HEIC/HEIF 照片转换为 JPG。批量转换、可调质量 — 100% 浏览器本地运行，无需上传、无需注册。',
    dropHere: '将 HEIC/HEIF 文件拖放到此处或点击浏览',
    quality: 'JPG 质量',
    convert: '转换',
    convertAll: '全部转换',
    downloadAll: '全部下载',
    clearAll: '清空',
    converting: '转换中',
    done: '完成',
    error: '转换失败',
    step1: '将 HEIC 或 HEIF 文件拖放到上传区域',
    step2: '如需可调整 JPG 质量滑块（默认 90%）',
    step3: '点击「全部转换」处理每个文件',
    step4: '下载单个 JPG 或使用「全部下载」',
  }
});

const { $, copyText, t } = GZ;

let pendingFiles = [];
let convertedFiles = []; // { name, blob, url, originalSize }

$('#quality').addEventListener('input', e => {
  $('#quality-val').textContent = Math.round(e.target.value * 100) + '%';
});

function addFiles(files) {
  for (const f of files) {
    if (/\.(heic|heif)$/i.test(f.name) || f.type === 'image/heic' || f.type === 'image/heif') {
      pendingFiles.push(f);
    }
  }
  renderPending();
}

function renderPending() {
  if (pendingFiles.length === 0 && convertedFiles.length === 0) {
    $('#results').innerHTML = '';
    return;
  }
  let html = '';
  convertedFiles.forEach((c, idx) => {
    const sizeKB = (c.blob.size / 1024).toFixed(1);
    const origKB = (c.originalSize / 1024).toFixed(1);
    const ratio = ((1 - c.blob.size / c.originalSize) * 100).toFixed(0);
    html += `<div class="result-card">
      <img src="${c.url}" alt="${escapeAttr(c.name)}">
      <div class="name">${escapeHtml(c.name)}</div>
      <div class="size">${origKB} KB → ${sizeKB} KB (${ratio > 0 ? '-' : '+'}${Math.abs(ratio)}%)</div>
      <button class="gz-btn" style="font-size:.75em;padding:4px 10px" onclick="downloadOne(${idx})">${t('done')} ↓</button>
    </div>`;
  });
  pendingFiles.forEach((f, idx) => {
    html += `<div class="result-card">
      <div style="height:100px;display:flex;align-items:center;justify-content:center;font-size:2em">📸</div>
      <div class="name">${escapeHtml(f.name)}</div>
      <div class="size">${(f.size / 1024).toFixed(1)} KB — ${t('convert')}?</div>
      <button class="gz-btn gz-btn-secondary" style="font-size:.75em;padding:4px 10px" onclick="convertOne(${idx})">${t('convert')}</button>
    </div>`;
  });
  $('#results').innerHTML = html;
}

async function convertOne(idx) {
  const file = pendingFiles[idx];
  const card = $$('.result-card')[$$('.result-card').length - (pendingFiles.length - idx)];
  if (card) card.querySelector('button').textContent = t('converting') + '…';
  try {
    const quality = parseFloat($('#quality').value);
    const blob = await heic2any({ blob: file, toType: 'image/jpeg', quality });
    pendingFiles.splice(idx, 1);
    const url = URL.createObjectURL(blob);
    const newName = file.name.replace(/\.(heic|heif)$/i, '.jpg');
    convertedFiles.push({ name: newName, blob, url, originalSize: file.size });
    renderPending();
  } catch (e) {
    if (card) card.querySelector('button').textContent = t('error');
    console.error(e);
  }
}

async function convertAll() {
  while (pendingFiles.length > 0) {
    await convertOne(0);
  }
}

function downloadOne(idx) {
  const c = convertedFiles[idx];
  const a = document.createElement('a');
  a.href = c.url;
  a.download = c.name;
  a.click();
}

function downloadAll() {
  convertedFiles.forEach((c, i) => {
    setTimeout(() => downloadOne(i), i * 200);
  });
}

function clearAll() {
  convertedFiles.forEach(c => URL.revokeObjectURL(c.url));
  convertedFiles = [];
  pendingFiles = [];
  renderPending();
  $('#status').innerHTML = '';
}

function escapeHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escapeAttr(s) { return escapeHtml(s).replace(/"/g,'&quot;'); }

// Drag & drop
const dz = $('#dropzone');
dz.addEventListener('click', () => $('#file-input').click());
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('dragover'); });
dz.addEventListener('dragleave', () => dz.classList.remove('dragover'));
dz.addEventListener('drop', e => {
  e.preventDefault();
  dz.classList.remove('dragover');
  addFiles(e.dataTransfer.files);
});
$('#file-input').addEventListener('change', e => {
  addFiles(e.target.files);
  e.target.value = '';
});

$('#dz-text').textContent = t('dropHere');
$('#lbl-quality').textContent = t('quality') + ':';

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="convertAll()">${t('convertAll')}</button>
  <button class="gz-btn" onclick="downloadAll()">${t('downloadAll')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="clearAll()">${t('clearAll')}</button>`;

GZ.renderToolPage({
  category: 'image',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🖼️', href:'/image/image-to-jpg.html', name:'Image to JPG'},
    {icon:'🔄', href:'/image/image-converter.html', name:'Image Converter'},
    {icon:'📐', href:'/image/image-resizer.html', name:'Image Resizer'},
    {icon:'🗜️', href:'/image/compressor.html', name:'Image Compressor'},
  ]
});
</script>
