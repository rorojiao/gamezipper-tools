      <label id="lbl-sep"></label>
      <select class="gz-select" id="sep-select" style="width:auto">
        <option value=" ">Space</option>
        <option value=",">Comma</option>
        <option value="">None</option>
      </select>
      <label><input type="checkbox" id="prefix-0x"> 0x</label>
      <label><input type="checkbox" id="uppercase" checked> A–F</label>

      <div><label id="lbl-in"></label><textarea id="input" rows="8" spellcheck="false" placeholder="Hello World"></textarea></div>

</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Text to Hex Converter',
    toolDesc: 'Convert any text to hexadecimal (hex) instantly. Supports UTF-8, custom separators and live conversion.',
    separator: 'Separator:',
    inputLabel: 'Text Input',
    outputLabel: 'Hex Output',
    example: 'Example',
    clear: 'Clear',
    copy: 'Copy',
    swap: '⇄ Hex to Text',
    step1: 'Paste or type your text in the input area',
    step2: 'Choose a separator: space, comma, or none',
    step3: 'Optionally prefix each byte with 0x and toggle uppercase',
    step4: 'Click Copy to copy the hex output to clipboard',
  },
  zh: {
    toolTitle: '文本转十六进制转换器',
    toolDesc: '即时将任意文本转换为十六进制（Hex）。支持 UTF-8、自定义分隔符和实时转换。',
    separator: '分隔符：',
    inputLabel: '文本输入',
    outputLabel: '十六进制输出',
    example: '示例',
    clear: '清空',
    copy: '复制',
    swap: '⇄ 十六进制转文本',
    step1: '在输入区粘贴或输入文本',
    step2: '选择分隔符：空格、逗号或无',
    step3: '可选在每个字节前加 0x 前缀，并切换大小写',
    step4: '点击「复制」将十六进制结果复制到剪贴板',
  }
});

const { $, copyText, t } = GZ;

function textToHex(text) {
  const sep = $('#sep-select').value;
  const prefix = $('#prefix-0x').checked ? '0x' : '';
  const upper = $('#uppercase').checked;
  const bytes = new TextEncoder().encode(text);
  let hex = Array.from(bytes).map(b => {
    let h = b.toString(16).padStart(2, '0');
    if (upper) h = h.toUpperCase();
    return prefix + h;
  });
  return hex.join(sep);
}

function convert() {
  const inp = $('#input').value;
  $('#output').value = inp ? textToHex(inp) : '';
}

function loadExample() {
  $('#input').value = 'Hello, GameZipper! 🎮';
  convert();
}

function doClear() { $('#input').value = ''; $('#output').value = ''; }

$('#input').addEventListener('input', convert);
$('#sep-select').addEventListener('change', convert);
$('#prefix-0x').addEventListener('change', convert);
$('#uppercase').addEventListener('change', convert);

$('#toolbar').innerHTML = `
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn" onclick="copyText($('#output').value)">${t('copy')}</button>
  <a class="gz-btn gz-btn-secondary" href="/dev/hex-to-text.html" style="text-decoration:none">${t('swap')}</a>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

GZ.renderToolPage({
  category: 'dev',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🔤', href:'/dev/hex-to-text.html', name:'Hex to Text'},
    {icon:'🔢', href:'/dev/ascii-binary-hex-converter.html', name:'ASCII/Binary/Hex'},
    {icon:'🔐', href:'/dev/base64.html', name:'Base64'},
    {icon:'🔗', href:'/dev/url-encode.html', name:'URL Encode'},
  ]
});
</script>
