<script>
GZI18n.register({
  en: {

    reset: 'Reset',

    eventTitle: 'Event name (optional)',

    seconds: 'Seconds',

    enterTarget: 'Pick a target date in the future.',

  },
  zh: {
    toolTitle: '倒计时器',
    toolDesc: '倒计时到任意日期和时间。实时显示天、时、分、秒，归零时播放提示音。免费、私密、浏览器本地运行。',
    start: '开始倒计时',
    stop: '停止',
    reset: '重置',
    targetDate: '目标日期',
    targetTime: '目标时间',
    eventTitle: '事件名称（可选）',
    days: '天',
    hours: '时',
    minutes: '分',
    seconds: '秒',
    reached: '⏰ 倒计时结束！',
    enterTarget: '请选择一个未来的目标日期',
    past: '该日期已过去 — 请选择未来日期',
    newYear: '元旦',
    christmas: '圣诞节',
    weekend: '本周末',
    week: '一周后',
    month: '一个月后',
    step1: '点击预设按钮或自行选择日期和时间',
    step2: '可选填写事件名称，显示在倒计时上方',
    step3: '点击「开始倒计时」开始计时',
    step4: '保持标签页打开 — 归零时将播放提示音',
  }
});

const { $, t } = GZ;
let interval = null;
let targetMs = null;
let audioCtx = null;

function pad(n){ return String(n).padStart(2,'0'); }

function renderCountdown(remaining){
  const done = remaining <= 0;
  if(done) remaining = 0;
  const d = Math.floor(remaining/86400000);
  const h = Math.floor(remaining%86400000/3600000);
  const m = Math.floor(remaining%3600000/60000);
  const s = Math.floor(remaining%60000/1000);
  const cls = done ? 'gz-cd-unit gz-done' : 'gz-cd-unit';
  $('#countdown').innerHTML =
    `<div class="${cls}"><div class="n">${d}</div><div class="l">${t('days')}</div></div>`+
    `<div class="${cls}"><div class="n">${pad(h)}</div><div class="l">${t('hours')}</div></div>`+
    `<div class="${cls}"><div class="n">${pad(m)}</div><div class="l">${t('minutes')}</div></div>`+
    `<div class="${cls}"><div class="n">${pad(s)}</div><div class="l">${t('seconds')}</div></div>`;
}

function chime(){
  try{
    audioCtx = audioCtx || new (window.AudioContext||window.webkitAudioContext)();
    [880, 1320, 1760].forEach((freq,i)=>{
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.type='sine'; o.frequency.value=freq;
      o.connect(g); g.connect(audioCtx.destination);
      const ts = audioCtx.currentTime + i*0.18;
      g.gain.setValueAtTime(0.0001, ts);
      g.gain.exponentialRampToValueAtTime(0.3, ts+0.02);
      g.gain.exponentialRampToValueAtTime(0.0001, ts+0.4);
      o.start(ts); o.stop(ts+0.45);
    });
  }catch(e){}
}

function tick(){
  if(targetMs===null) return;
  const remaining = targetMs - Date.now();
  renderCountdown(remaining);
  if(remaining <= 0){
    if(interval){ clearInterval(interval); interval=null; }
    chime();
    $('#status').innerHTML = `<span style="color:var(--gz-accent2,#ff6b6b);font-weight:700">${t('reached')}</span>`;
    $('#toolbar').querySelector('button.gz-btn').textContent = t('start');
  }
}

function readTarget(){
  const d = $('#targetDate').value;
  const tm = $('#targetTime').value || '00:00';
  if(!d) return null;
  return new Date(d+'T'+tm).getTime();
}

function start(){
  if(interval){ stop(); return; }
  const ms = readTarget();
  if(ms===null){ $('#status').innerHTML = `<span style="color:var(--gz-accent,#ff6b6b)">${t('enterTarget')}</span>`; return; }
  if(ms <= Date.now()){ $('#status').innerHTML = `<span style="color:var(--gz-accent,#ff6b6b)">${t('past')}</span>`; return; }
  targetMs = ms;
  localStorage.setItem('gz-cd-target', String(ms));
  localStorage.setItem('gz-cd-title', $('#targetTitle').value);
  updateLabel();
  tick();
  interval = setInterval(tick, 1000);
  $('#status').innerHTML = '';
  $('#toolbar').querySelector('button.gz-btn').textContent = t('stop');
}

function stop(){
  if(interval){ clearInterval(interval); interval=null; }
  $('#toolbar').querySelector('button.gz-btn').textContent = t('start');
}

function reset(){
  stop(); targetMs=null; renderCountdown(0);
  $('#countdown').innerHTML='';
  $('#targetLabel').textContent='';
  $('#status').innerHTML='';
  localStorage.removeItem('gz-cd-target');
  localStorage.removeItem('gz-cd-title');
}

function updateLabel(){
  const title = $('#targetTitle').value.trim();
  if(title) $('#targetLabel').textContent = '🎯 ' + title;
  else if(targetMs) $('#targetLabel').textContent = '⏳ ' + new Date(targetMs).toLocaleString();
  else $('#targetLabel').textContent = '';
}

function setPreset(kind){
  const now = new Date();
  let target;
  if(kind==='newYear') target = new Date(now.getFullYear()+1,0,1,0,0,0);
  else if(kind==='christmas') target = new Date(now.getFullYear(),11,25,0,0,0);
  else if(kind==='weekend'){
    const day = now.getDay();
    const toSat = day===6 ? 7 : (6-day);
    target = new Date(now); target.setDate(now.getDate()+ (toSat===0?7:toSat)); target.setHours(0,0,0,0);
  }
  else if(kind==='week'){ target = new Date(now.getTime()+7*86400000); }
  else if(kind==='month'){ target = new Date(now.getTime()+30*86400000); }
  $('#targetDate').value = target.toISOString().slice(0,10);
  $('#targetTime').value = pad(target.getHours())+':'+pad(target.getMinutes());
  $('#targetTitle').value = t(kind);
  updateLabel();
}

// labels
$('#lblDate').textContent = t('targetDate');
$('#lblTime').textContent = t('targetTime');
$('#lblTitle').textContent = t('eventTitle');
['targetDate','targetTime','targetTitle'].forEach(id=>$('#'+id).addEventListener('input', updateLabel));

// presets bar
$('#presets').innerHTML =
  `<button class="gz-btn gz-btn-secondary gz-btn-sm" onclick="setPreset('newYear')">${t('newYear')}</button>`+
  `<button class="gz-btn gz-btn-secondary gz-btn-sm" onclick="setPreset('christmas')">${t('christmas')}</button>`+
  `<button class="gz-btn gz-btn-secondary gz-btn-sm" onclick="setPreset('weekend')">${t('weekend')}</button>`+
  `<button class="gz-btn gz-btn-secondary gz-btn-sm" onclick="setPreset('week')">${t('week')}</button>`+
  `<button class="gz-btn gz-btn-secondary gz-btn-sm" onclick="setPreset('month')">${t('month')}</button>`;

$('#toolbar').innerHTML =
  `<button class="gz-btn" onclick="start()">${t('start')}</button>`+
  `<button class="gz-btn gz-btn-secondary" onclick="reset()">${t('reset')}</button>`;

// restore from localStorage
const saved = localStorage.getItem('gz-cd-target');
if(saved){
  const ms = parseInt(saved);
  if(ms > Date.now()){
    targetMs = ms;
    $('#targetDate').value = new Date(ms).toISOString().slice(0,10);
    $('#targetTime').value = pad(new Date(ms).getHours())+':'+pad(new Date(ms).getMinutes());
    $('#targetTitle').value = localStorage.getItem('gz-cd-title') || '';
    updateLabel();
    tick();
    interval = setInterval(tick, 1000);
  }
}

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🍅', href:'/calc/pomodoro.html', name:'Pomodoro Timer'},
    {icon:'⏰', href:'/dev/timestamp.html', name:'Timestamp Converter'},
    {icon:'📅', href:'/calc/date-calculator.html', name:'Date Calculator'},
    {icon:'⏲️', href:'/calc/alarm-clock.html', name:'Alarm Clock'},
  ]
});
</script>
