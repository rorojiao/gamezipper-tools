<script>
GZI18n.register({
  en: {
    toolTitle: 'Certificate Generator',
    toolDesc: 'Create professional certificates for awards, achievements, completion and participation. Customize design and download as PNG.',
    recipientName: 'Recipient Name',
    certTitle: 'Certificate Title',
    theme: 'Theme',
    orgName: 'Organization Name',
    certDate: 'Date',
    certDesc: 'Description',
    signer: 'Signer Name',
    download: 'Download PNG',
    step1: 'Enter the recipient name and certificate title',
    step2: 'Choose a color theme and customize details',
    step3: 'Add organization name, date and signer',
    step4: 'Click Download PNG to save your certificate',
  },
  zh: {
    toolTitle: '证书生成器',
    toolDesc: '创建专业的荣誉证书、奖状、培训结业证和参与证明。自定义设计并下载为 PNG。',
    recipientName: '获奖者姓名',
    certTitle: '证书标题',
    theme: '主题',
    orgName: '颁发机构',
    certDate: '日期',
    certDesc: '描述',
    signer: '签发人',
    download: '下载 PNG',
    step1: '输入获奖者姓名和证书标题',
    step2: '选择配色主题并自定义详细信息',
    step3: '添加颁发机构、日期和签发人',
    step4: '点击「下载 PNG」保存证书',
  }
});

const { $, t } = GZ;
const canvas = $('#canvas');
const ctx = canvas.getContext('2d');

const themes = {
  gold: { bg: '#FFFDF5', border: '#C9A84C', accent: '#B8941F', text: '#4A3B0F', sub: '#7A6520' },
  blue: { bg: '#F0F5FF', border: '#2B5797', accent: '#1E3F6F', text: '#1A2A44', sub: '#3A5A84' },
  green: { bg: '#F2FFF2', border: '#2E7D32', accent: '#1B5E20', text: '#1B3A1B', sub: '#3E6E3E' },
  red: { bg: '#FFF5F5', border: '#B71C1C', accent: '#8B0000', text: '#3A0A0A', sub: '#7A2020' },
  purple: { bg: '#F8F0FF', border: '#7B1FA2', accent: '#5C0976', text: '#2A0A3A', sub: '#5A2A6A' },
};

// Set today's date
$('#certDate').value = new Date().toISOString().split('T')[0];

function render() {
  const w = canvas.width, h = canvas.height;
  const th = themes[$('#theme').value];
  const recipient = $('#recipientName').value || 'Recipient Name';
  const title = $('#certTitle').value || 'Certificate of Achievement';
  const org = $('#orgName').value || '';
  const date = $('#certDate').value || '';
  const desc = $('#certDesc').value || '';
  const signer = $('#signer').value || '';

  // Background
  ctx.fillStyle = th.bg;
  ctx.fillRect(0, 0, w, h);

  // Outer border
  ctx.strokeStyle = th.border;
  ctx.lineWidth = 8;
  ctx.strokeRect(20, 20, w - 40, h - 40);

  // Inner border
  ctx.strokeStyle = th.accent;
  ctx.lineWidth = 2;
  ctx.strokeRect(35, 35, w - 70, h - 70);

  // Corner decorations
  drawCorners(w, h, th.border);

  // Decorative top line
  const cx = w / 2;
  ctx.fillStyle = th.border;
  drawStar(cx, 80, 12, 5, th.border);

  // Certificate Title
  ctx.textAlign = 'center';
  ctx.fillStyle = th.accent;
  ctx.font = `bold 52px Georgia, serif`;
  ctx.fillText(title.toUpperCase(), cx, 170);

  // Decorative line under title
  ctx.strokeStyle = th.border;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(cx - 250, 195);
  ctx.lineTo(cx + 250, 195);
  ctx.stroke();

  // "Presented to" text
  ctx.fillStyle = th.sub;
  ctx.font = `italic 24px Georgia, serif`;
  ctx.fillText('This certificate is proudly presented to', cx, 270);

  // Recipient Name
  ctx.fillStyle = th.text;
  ctx.font = `bold 64px Georgia, serif`;
  ctx.fillText(recipient, cx, 380);

  // Decorative line under name
  const nameWidth = ctx.measureText(recipient).width;
  ctx.strokeStyle = th.border;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(cx - Math.min(nameWidth, 600) / 2 - 30, 410);
  ctx.lineTo(cx + Math.min(nameWidth, 600) / 2 + 30, 410);
  ctx.stroke();

  // Description
  ctx.fillStyle = th.sub;
  ctx.font = `28px Georgia, serif`;
  if (desc) {
    ctx.fillText(desc, cx, 480);
  }

  // Date and signer
  ctx.fillStyle = th.text;
  ctx.font = `22px Georgia, serif`;

  // Date on left
  if (date) {
    ctx.textAlign = 'left';
    ctx.fillStyle = th.sub;
    ctx.font = `italic 20px Georgia, serif`;
    ctx.fillText('Date: ' + date, 120, 620);
    ctx.strokeStyle = th.border;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(120, 635);
    ctx.lineTo(380, 635);
    ctx.stroke();
  }

  // Signer on right
  if (signer) {
    ctx.textAlign = 'right';
    ctx.fillStyle = th.sub;
    ctx.font = `italic 20px Georgia, serif`;
    ctx.fillText(signer, w - 120, 620);
    ctx.strokeStyle = th.border;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(w - 380, 635);
    ctx.lineTo(w - 120, 635);
    ctx.stroke();
  }

  // Organization at bottom
  if (org) {
    ctx.textAlign = 'center';
    ctx.fillStyle = th.accent;
    ctx.font = `bold 26px Georgia, serif`;
    ctx.fillText(org, cx, 750);
  }

  // Bottom seal
  ctx.beginPath();
  ctx.arc(cx, 880, 50, 0, Math.PI * 2);
  ctx.strokeStyle = th.border;
  ctx.lineWidth = 3;
  ctx.stroke();
  ctx.fillStyle = th.accent;
  ctx.font = `bold 14px Arial`;
  ctx.textAlign = 'center';
  ctx.fillText('✦ OFFICIAL ✦', cx, 877);
  ctx.font = `11px Arial`;
  ctx.fillText('SEAL', cx, 895);

  // Bottom decorative elements
  drawStar(cx - 120, 980, 8, 5, th.border);
  drawStar(cx + 120, 980, 8, 5, th.border);
  ctx.fillStyle = th.border;
  ctx.font = '16px Georgia, serif';
  ctx.fillText('— ★ —', cx, 985);
}

function drawCorners(w, h, color) {
  ctx.fillStyle = color;
  const s = 18, o = 30;
  [[o,o],[o+s,o],[o,o+s]].forEach(([x,y]) => ctx.fillRect(x-4,y-4,8,8));
  [[w-o,o],[w-o-s,o],[w-o,o+s]].forEach(([x,y]) => ctx.fillRect(x-4,y-4,8,8));
  [[o,h-o],[o+s,h-o],[o,h-o-s]].forEach(([x,y]) => ctx.fillRect(x-4,y-4,8,8));
  [[w-o,h-o],[w-o-s,h-o],[w-o,h-o-s]].forEach(([x,y]) => ctx.fillRect(x-4,y-4,8,8));
}

function drawStar(cx, cy, r, points, color) {
  ctx.fillStyle = color;
  ctx.beginPath();
  for (let i = 0; i < points * 2; i++) {
    const radius = i % 2 === 0 ? r : r * 0.4;
    const angle = (i * Math.PI) / points - Math.PI / 2;
    const x = cx + Math.cos(angle) * radius;
    const y = cy + Math.sin(angle) * radius;
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  }
  ctx.closePath();
  ctx.fill();
}

// Auto-render on any input change
['recipientName','certTitle','theme','orgName','certDate','certDesc','signer'].forEach(id => {
  $('#' + id).addEventListener('input', render);
});

render();

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="$('canvas').toBlob(b=>{const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='certificate.png';a.click()})">${t('download')}</button>`;

GZ.renderToolPage({
  category: 'image',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'✍️', href:'/image/signature-generator.html', name:'Signature'},
    {icon:'📄', href:'/text/resume-builder.html', name:'Resume Builder'},
    {icon:'🖼️', href:'/image/code-to-image.html', name:'Code to Image'},
    {icon:'😂', href:'/image/meme-generator.html', name:'Meme Generator'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
