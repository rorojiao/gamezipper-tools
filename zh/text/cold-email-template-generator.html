const CATS = ['all','sales','partnership','recruiting','pr','investor','reactivation','backlink','event','referral','followup'];
let currentCat = 'all';
let current = null;
let favs = [];
try { favs = JSON.parse(localStorage.getItem('gz_ce_favs') || '[]'); } catch(e){ favs = []; }

function pool() {
  if (currentCat === 'all') {
    let arr = [];
    Object.values(EMAILS).forEach(a => arr = arr.concat(a));
    return arr;
  }
  return EMAILS[currentCat] || [];
}

function newEmail() {
  const p = pool();
  if (!p.length) return;
  let next;
  let guard = 0;
  do { next = p[Math.floor(Math.random()*p.length)]; guard++; }
  while (current && next.body === current.body && p.length > 1 && guard < 10);
  current = next;
  $('#ceSubject').textContent = current.subject;
  $('#ceBody').textContent = current.body;
  $('#ceMeta').innerHTML = '<span class="ce-chip">' + (t('meta' + current.tag.charAt(0)) || current.tag) + '</span><span class="ce-chip ghost">' + (current.subject.length + current.body.length) + ' chars</span>';
  updateFavBtn();
}

function copyCurrent() {
  if (!current) return;
  const text = 'Subject: ' + current.subject + '\n\n' + current.body;
  GZ.copyText(text);
  showToast(t('btnCopy') + ' ✓');
}

function copySubject() {
  if (!current) return;
  GZ.copyText(current.subject);
  showToast(t('btnCopySubject') + ' ✓');
}

function isFav() { return current && favs.some(f => f.body === current.body); }
function updateFavBtn() { $('#btnFav').innerHTML = isFav() ? '❤️' : '🤍'; }

function toggleFav() {
  if (!current) return;
  if (isFav()) { favs = favs.filter(f => f.body !== current.body); }
  else { favs.unshift({body: current.body, subject: current.subject, savedAt: Date.now()}); }
  localStorage.setItem('gz_ce_favs', JSON.stringify(favs));
  updateFavBtn();
  renderFavs();
}

function renderFavs() {
  const box = $('#favList');
  if (!favs.length) { box.innerHTML = ''; return; }
  box.innerHTML = `<h3 style="text-align:center;margin:8px 0">${t('favTitle')}</h3>` + favs.map((f,i) =>
    `<div class="fav-item"><span class="txt"><strong>${f.subject}</strong><br>${f.body.slice(0,60).replace(/\n/g,' ')}…</span><button onclick="removeFav(${i})" title="${t('remove')}">${t('remove')}</button></div>`
  ).join('');
}

function removeFav(i) {
  favs.splice(i,1);
  localStorage.setItem('gz_ce_favs', JSON.stringify(favs));
  updateFavBtn();
  renderFavs();
}

function showToast(msg) {
  let tt = document.querySelector('.ce-toast');
  if (!tt) {
    tt = document.createElement('div');
    tt.className = 'ce-toast';
    document.body.appendChild(tt);
  }
  tt.textContent = msg;
  tt.classList.add('show');
  clearTimeout(tt._tm);
  tt._tm = setTimeout(() => tt.classList.remove('show'), 1800);
}

const catBtnContainer = $('#catBtns');
CATS.forEach(c => {
  const btn = document.createElement('button');
  btn.textContent = t('cat_' + c);
  btn.className = c === currentCat ? 'active' : '';
  btn.onclick = () => {
    currentCat = c;
    catBtnContainer.querySelectorAll('button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    newEmail();
  };
  catBtnContainer.appendChild(btn);
});

$('#btnNew').textContent = t('btnNew');

$('#btnCopySubject').textContent = t('btnCopySubject');
$('#btnFav').textContent = t('btnFav');
$('#ceDisclaimer').textContent = t('disclaimer');
newEmail();
renderFavs();
