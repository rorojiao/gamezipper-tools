const { $, copyText, t } = GZ;

// Referral fee percentages (key = category select value)
const REFERRAL = {
  other: 0.15, electronics: 0.08, beauty: 0.08, jewelry: 0.20,
  watches: 0.16, clothing: 0.17, shoes: 0.17, books: 0.15,
  home: 0.15, toys: 0.15, grocery: 0.08, sports: 0.15, pet: 0.15,
  baby: 0.08, music: 0.15, office: 0.15, pc: 0.06, games: 0.08,
  camera: 0.08, tools: 0.15, auto: 0.12, outdoor: 0.15, garden: 0.15,
  health: 0.08, kitchen: 0.15, industrial: 0.12,
};

const CATS = [
  ['other','catOther'],['electronics','catElectronics'],['beauty','catBeauty'],
  ['jewelry','catJewelry'],['watches','catWatches'],['clothing','catClothing'],
  ['shoes','catShoes'],['books','catBooks'],['home','catHome'],['toys','catToys'],
  ['grocery','catGrocery'],['sports','catSports'],['pet','catPet'],['baby','catBaby'],
  ['music','catMusic'],['office','catOffice'],['pc','catPCHardware'],['games','catVideoGames'],
  ['camera','catCamera'],['tools','catTools'],['auto','catAuto'],['outdoor','catOutdoor'],
  ['garden','catLawnGarden'],['health','catHealth'],['kitchen','catKitchen'],['industrial','catIndustrial'],
];

// Populate category select
$('#category').innerHTML = CATS.map(([v,k]) => `<option value="${v}">${t(k)}</option>`).join('');

// Approximate FBA fulfillment fee based on size tier and weight (US marketplace, 2025-2026)
function fbaFee(size, weight) {
  if (size === 'oversize') {
    // Oversize tiers: small-overweight to special-oversize; approximate base + per-lb
    if (weight <= 2) return 5.04 + Math.max(0, weight - 1) * 0.34;
    if (weight <= 5) return 6.14 + Math.max(0, weight - 2) * 0.34;
    if (weight <= 10) return 7.32 + Math.max(0, weight - 5) * 0.40;
    if (weight <= 50) return 9.73 + Math.max(0, weight - 10) * 0.40;
    if (weight <= 150) return 27.69 + Math.max(0, weight - 70) * 0.40;
    return 79.00 + Math.max(0, weight - 150) * 0.80;
  }
  // Standard size
  if (weight <= 1) return 3.06;
  if (weight <= 2) return 3.27 + Math.max(0, weight - 1) * 0.21;
  return 3.90 + Math.max(0, weight - 2) * 0.27;
}

function money(n) { return '$' + (isFinite(n) ? n.toFixed(2) : '0.00'); }
function pct(n) { return (isFinite(n) ? n.toFixed(1) : '0.0') + '%'; }

function calculate() {
  const price = parseFloat($('#price').value) || 0;
  const cost = parseFloat($('#cost').value) || 0;
  const cat = $('#category').value;
  const fulfill = $('#fulfill').value;
  const size = $('#size').value;
  const weight = parseFloat($('#weight').value) || 0;
  const storage = parseFloat($('#storage').value) || 0;
  const shipping = parseFloat($('#shipping').value) || 0;

  const refPct = REFERRAL[cat] ?? 0.15;
  let referral = price * refPct;
  if (referral < 0.30) referral = 0.30; // minimum referral fee
  const fulfillment = fulfill === 'fba' ? fbaFee(size, weight) : 0;
  const totalFees = referral + fulfillment + storage + shipping;
  const profit = price - cost - totalFees;
  const margin = price > 0 ? (profit / price * 100) : 0;
  const roi = cost > 0 ? (profit / cost * 100) : 0;

  const fmt = (lbl, val, cls='') => `<div class="result-line ${cls}"><span class="lbl">${lbl}</span><span class="val">${val}</span></div>`;
  const profitCls = profit >= 0 ? 'total' : 'total negative';
  $('#result').innerHTML =
    fmt(t('salePrice'), money(price)) +
    fmt(t('productCost'), '−' + money(cost)) +
    fmt(t('referralFee'), '−' + money(referral) + ' (' + pct(refPct*100) + ')') +
    (fulfillment > 0 ? fmt(t('fulfillmentFee'), '−' + money(fulfillment)) : '') +
    (storage > 0 ? fmt(t('storageFee'), '−' + money(storage)) : '') +
    (shipping > 0 ? fmt(t('inboundShipping'), '−' + money(shipping)) : '') +
    fmt(t('totalFees'), '−' + money(totalFees + cost)) +
    fmt(t('profit'), money(profit), profitCls) +
    fmt(t('margin'), pct(margin)) +
    fmt(t('roi'), pct(roi));
}

function copyBreakdown() { copyText($('#result').innerText); }

['#price','#cost','#category','#fulfill','#size','#weight','#storage','#shipping'].forEach(s => $(s).addEventListener('input', calculate));
$('#fulfill').addEventListener('change', calculate);
$('#category').addEventListener('change', calculate);
$('#size').addEventListener('change', calculate);

$('#lbl-price').textContent = t('price');
$('#lbl-cost').textContent = t('cost');
$('#lbl-cat').textContent = t('category');
$('#lbl-fulfill').textContent = t('fulfill');

$('#disclaimer').textContent = t('disclaimer');

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="calculate()">🧮 ${t('calculate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="copyBreakdown()">📑 ${t('copy')}</button>`;

calculate();
