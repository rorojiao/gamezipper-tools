const { $, t } = GZ;
let lang = GZI18n.getLang();
const STATE_KEY = 'gz-lease-data-v1';
let state = {
  type: 'fixed',
  effDate: new Date().toISOString().slice(0,10),
  llName: '', llAddr: '',
  tName: '', tAddr: '', tPhone: '',
  propAddr: '', propType: 'apt',
  startDate: new Date().toISOString().slice(0,10), termMonths: 12, endDate: '',
  rent: '', rentDay: 1, deposit: '', lateFee: '',
  pets: 'no', utilities: '',
  jurisdiction: '', noticeDays: 30,
};

function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function nl2br(s){return esc(s).replace(/\n/g,'<br>');}
function loadState(){ try{const r=localStorage.getItem(STATE_KEY); if(r) state=Object.assign(state, JSON.parse(r));}catch(e){} }
function saveState(){ try{localStorage.setItem(STATE_KEY, JSON.stringify(state));}catch(e){} }
function bind(name){ return e => { state[name]=e.target.value; saveState(); renderPreview(); }; }

function downloadPDF(){
  const css='body{font-family:Georgia,"Times New Roman",serif;color:#222;padding:40px 48px;font-size:12.5px;line-height:1.7}h1{text-align:center;font-size:22px;margin:0 0 4px;text-transform:uppercase;letter-spacing:1px}h2{font-size:14px;margin:16px 0 6px}.leg-sub{text-align:center;color:#555;font-size:11px;margin-bottom:18px}p{margin:0 0 9px;text-align:justify}.leg-sig{margin-top:30px;display:grid;grid-template-columns:1fr 1fr;gap:24px}.leg-sig .line{border-top:1px solid #333;margin-top:36px;padding-top:4px;font-size:11px;color:#555}';
  const w=window.open('','_blank','width=860,height=1100');
  w.document.write(`<!DOCTYPE html><html><head><meta charset="utf-8"><title>Lease Agreement</title><style>${css}</style></head><body>${$('#preview').innerHTML}</body></html>\n`);
  w.document.close();
  setTimeout(()=>{try{w.focus();w.print();}catch(e){}},300);
}

function loadExample(){ state={type:'fixed',effDate:new Date().toISOString().slice(0,10),llName:'Acme Properties LLC',llAddr:'500 Market Street, Suite 400\nSan Francisco, CA 94105, USA',tName:'Jane Marie Doe',tAddr:'12 Birch Lane, Apt 5B\nSan Francisco, CA 94110, USA',tPhone:'+1 (415) 555-0142',propAddr:'Unit 5B, 12 Birch Lane\nSan Francisco, CA 94110',propType:'apt',startDate:new Date().toISOString().slice(0,10),termMonths:12,endDate:'',rent:'$2,200',rentDay:1,deposit:'$2,200',lateFee:'$25',pets:'no',utilities:'electricity, gas, internet',jurisdiction:'the State of California, United States of America',noticeDays:30}; saveState(); renderForm(); renderPreview(); }
