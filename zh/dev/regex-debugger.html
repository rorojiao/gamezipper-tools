<script type="application/ld+json">{"@context":"https://schema.org","@type":"WebApplication","name":"Regex Debugger & Visualizer","description":"Free online regex debugger and visualizer. Step through how your regular expression matches any text character by character. See capture groups, match positions and a live explanation. No upload, runs in your browser.","url": "https://tools.gamezipper.com/zh/dev/regex-debugger.html","applicationCategory":"Utility","operatingSystem":"Web Browser","offers":{"@type":"Offer","price":"0"}}</script>
<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is a regex debugger?", "acceptedAnswer": {"@type": "Answer", "text": "A regex debugger (or regex visualizer) lets you see exactly how a regular expression matches a given test string. It highlights every match, shows the position of each capture group, and breaks down the regex pattern token by token so you can understand why it matches (or why it doesn't). It is invaluable for fixing patterns that behave unexpectedly."}}, {"@type": "Question", "name": "Which regex flags are supported?", "acceptedAnswer": {"@type": "Answer", "text": "All standard JavaScript regex flags are supported: g (global — find all matches), i (case-insensitive), m (multiline — ^ and $ match line boundaries), s (dotAll — . matches newlines), u (unicode), and y (sticky). Toggle them with the flag chips above the test area."}}, {"@type": "Question", "name": "Is my text or regex uploaded to a server?", "acceptedAnswer": {"@type": "Answer", "text": "No. This regex debugger runs entirely in your browser using the built-in JavaScript RegExp engine. Neither your pattern nor your test string ever leaves your device, so it is safe to debug patterns against proprietary or sensitive data."}}, {"@type": "Question", "name": "Why does my regex work here but not in my language?", "acceptedAnswer": {"@type": "Answer", "text": "Different programming languages use different regex engines with subtly different syntax and behavior. This tool uses the JavaScript (ECMAScript) regex engine. If your regex uses features like lookbehind (?<=...), named groups (?P<name>...) or possessive quantifiers, they may behave differently in Python, PCRE, Go RE2 or Java. Always test in your target environment."}}]}</script>

<script>
GZI18n.register({
  en: {
    toolTitle: 'Regex Debugger & Visualizer',
    toolDesc: 'Step through how your regular expression matches any text. See every match, capture group and position highlighted, plus a token-by-token pattern explanation. Runs entirely in your browser — nothing is uploaded.',
    pattern: 'Pattern',
    flags: 'Flags',
    testStr: 'Test string',
    matches: 'match(es)',
    noMatch: 'No matches found',
    invalidRegex: 'Invalid regex',
    group: 'Group',
    fullMatch: 'Full match',
    explain: 'Pattern breakdown',
    copy: 'Copy',
    clear: 'Clear',
    step1: 'Enter your regex pattern (without surrounding slashes)',
    step2: 'Toggle flags (g, i, m, s, u) as needed',
    step3: 'Type or paste the text you want to test against',
    step4: 'Review highlighted matches, capture groups and the explanation below',
  },
  zh: {
    toolTitle: '正则表达式调试器 / 可视化',
    toolDesc: '逐步查看正则表达式如何匹配文本。高亮显示每个匹配、捕获组和位置，并提供逐 token 的模式解释。完全在浏览器本地运行，不上传任何数据。',
    pattern: '模式',
    flags: '标志',
    testStr: '测试文本',
    matches: '个匹配',
    noMatch: '未找到匹配',
    invalidRegex: '正则表达式无效',
    group: '分组',
    fullMatch: '完整匹配',
    explain: '模式分解',
    copy: '复制',
    clear: '清除',
    step1: '输入正则表达式（不需要斜杠包裹）',
    step2: '按需切换标志（g、i、m、s、u）',
    step3: '输入或粘贴要测试的文本',
    step4: '查看下方高亮匹配、捕获组和解释',
  }
});

const { $, copyText, t } = GZ;

let activeFlags = { g: true, i: false, m: false, s: false, u: false };

const FLAG_DESC = {
  en: { g: 'global — find all', i: 'case-insensitive', m: 'multiline ^/$', s: 'dotAll . matches \\n', u: 'unicode' },
  zh: { g: '全局 — 匹配全部', i: '忽略大小写', m: '多行 ^/$', s: '. 匹配换行', u: 'Unicode' },
};

function renderFlagChips(){
  const lang = GZI18n.current === 'zh' ? 'zh' : 'en';
  $('#flag-chips').innerHTML = Object.keys(activeFlags).map(f =>
    '<span class="flag-chip'+(activeFlags[f]?' active':'')+'" data-flag="'+f+'">'+f+'<span style="font-size:.7rem;opacity:.7;margin-left:4px">'+FLAG_DESC[lang][f]+'</span></span>'
  ).join('');
  $('#flag-chips').querySelectorAll('.flag-chip').forEach(chip => {
    chip.onclick = () => {
      const f = chip.dataset.flag;
      activeFlags[f] = !activeFlags[f];
      renderFlagChips();
      runDebug();
    };
  });
}

function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function runDebug(){
  const pattern = $('#pattern').value;
  const testStr = $('#test').value;
  if (!pattern){ $('#match-view').innerHTML = '<span style="color:var(--text3)">'+esc(t('testStr'))+'</span>'; $('#groups-output').innerHTML=''; $('#explain-box').innerHTML=''; $('#status').innerHTML=''; return; }

  const flagStr = Object.keys(activeFlags).filter(f => activeFlags[f]).join('');
  let regex;
  try {
    regex = new RegExp(pattern, flagStr);
  } catch(e){
    $('#status').innerHTML = '<span style="color:var(--gz-accent)">✗ '+t('invalidRegex')+': '+esc(e.message)+'</span>';
    $('#match-view').innerHTML = '<span style="color:var(--gz-accent)">'+esc(e.message)+'</span>';
    $('#groups-output').innerHTML='';
    $('#explain-box').innerHTML='';
    return;
  }

  // Find all matches
  const matches = [];
  if (activeFlags.g){
    let m;
    let lastIndex = 0;
    let safety = 0;
    while ((m = regex.exec(testStr)) !== null && safety < 10000){
      matches.push({ match: m, index: m.index, length: m[0].length });
      if (m[0].length === 0) regex.lastIndex++;
      safety++;
    }
  } else {
    const m = regex.exec(testStr);
    if (m) matches.push({ match: m, index: m.index, length: m[0].length });
  }

  if (matches.length === 0){
    $('#status').innerHTML = '<span style="color:var(--text3)">○ '+t('noMatch')+'</span>';
    // Show text without highlights
    $('#match-view').innerHTML = esc(testStr) || '<span style="color:var(--text3)">—</span>';
    $('#groups-output').innerHTML='';
    renderExplain(pattern);
    return;
  }

  $('#status').innerHTML = '<span style="color:var(--gz-success)">✓ '+matches.length+' '+t('matches')+'</span>';

  // Build highlighted match view
  let html = '';
  let pos = 0;
  for (const mt of matches){
    // text before match
    if (mt.index > pos){
      html += esc(testStr.slice(pos, mt.index));
    }
    const matchText = mt.match[0];
    if (matchText.length === 0){
      // zero-width match — show position marker
      html += '<span class="match-pos">⟶</span>';
    } else {
      html += '<span class="match-hit" title="'+t('fullMatch')+': '+esc(matchText)+'">'+esc(matchText)+'</span>';
    }
    pos = mt.index + matchText.length;
  }
  if (pos < testStr.length) html += esc(testStr.slice(pos));
  $('#match-view').innerHTML = html || '<span style="color:var(--text3)">—</span>';

  // Groups table
  const numGroups = matches[0].match.length - 1;
  if (numGroups > 0){
    let tbl = '<table class="groups-table"><thead><tr><th>#</th>';
    matches.forEach((mt, idx) => { tbl += '<th>Match '+(idx+1)+'</th>'; });
    tbl += '</tr></thead><tbody>';
    tbl += '<tr><td><strong>'+t('fullMatch')+'</strong></td>';
    matches.forEach(mt => { tbl += '<td><code>'+esc(mt.match[0] || '(empty)')+'</code></td>'; });
    tbl += '</tr>';
    for (let g = 1; g <= numGroups; g++){
      tbl += '<tr><td>'+t('group')+' '+g+'</td>';
      matches.forEach(mt => { tbl += '<td><code>'+esc(mt.match[g] || '—')+'</code></td>'; });
      tbl += '</tr>';
    }
    tbl += '</tbody></table>';
    $('#groups-output').innerHTML = tbl;
  } else {
    $('#groups-output').innerHTML = '';
  }

  renderExplain(pattern);
}

function renderExplain(pattern){
  const tokens = [];
  let i = 0;
  const n = pattern.length;
  const lang = GZI18n.current === 'zh' ? 'zh' : 'en';
  const L = lang === 'zh' ? {
    char: '匹配字符', anyChar: '匹配任意字符（换行除外）', digit: '匹配数字 0-9', word: '匹配字母/数字/下划线', space: '匹配空白字符',
    notDigit: '匹配非数字', notWord: '匹配非单词字符', notSpace: '匹配非空白',
    start: '字符串/行开头', end: '字符串/行结尾', group: '捕获组', alt: '或（分支）',
    quant: '次', charClass: '字符类', anchored: '单词边界', anchorEnd: '单词结尾',
    raw: '匹配',
  } : {
    char: 'matches character', anyChar: 'any char except newline', digit: 'digit 0-9', word: 'word char [A-Za-z0-9_]', space: 'whitespace',
    notDigit: 'non-digit', notWord: 'non-word char', notSpace: 'non-whitespace',
    start: 'start of string/line', end: 'end of string/line', group: 'capture group', alt: 'OR (alternation)',
    quant: 'times', charClass: 'character class', anchored: 'word boundary', anchorEnd: 'non-word boundary',
    raw: 'matches',
  };

  while (i < n){
    const c = pattern[i];
    if (c === '\\'){
      const next = pattern[i+1];
      if (next === 'd') { tokens.push({tok:'\\d', desc:L.digit}); i+=2; continue; }
      if (next === 'w') { tokens.push({tok:'\\w', desc:L.word}); i+=2; continue; }
      if (next === 's') { tokens.push({tok:'\\s', desc:L.space}); i+=2; continue; }
      if (next === 'D') { tokens.push({tok:'\\D', desc:L.notDigit}); i+=2; continue; }
      if (next === 'W') { tokens.push({tok:'\\W', desc:L.notWord}); i+=2; continue; }
      if (next === 'S') { tokens.push({tok:'\\S', desc:L.notSpace}); i+=2; continue; }
      if (next === 'b') { tokens.push({tok:'\\b', desc:L.anchored}); i+=2; continue; }
      if (next === 'B') { tokens.push({tok:'\\B', desc:L.anchorEnd}); i+=2; continue; }
      if (next === 'n') { tokens.push({tok:'\\n', desc:L.raw+' \\n'}); i+=2; continue; }
      if (next === 't') { tokens.push({tok:'\\t', desc:L.raw+' \\t'}); i+=2; continue; }
      if (next === '.') { tokens.push({tok:'\\.', desc:L.raw+' .'}); i+=2; continue; }
      if (next === '\\') { tokens.push({tok:'\\\\', desc:L.raw+' \\'}); i+=2; continue; }
      // generic escape
      tokens.push({tok:'\\'+next, desc:L.raw+' '+next}); i+=2; continue;
    }
    if (c === '.') { tokens.push({tok:'.', desc:L.anyChar}); i++; continue; }
    if (c === '^') { tokens.push({tok:'^', desc:L.start}); i++; continue; }
    if (c === '$') { tokens.push({tok:'$', desc:L.end}); i++; continue; }
    if (c === '|') { tokens.push({tok:'|', desc:L.alt}); i++; continue; }
    if (c === '(') {
      if (pattern[i+1] === '?'){ tokens.push({tok:'(?:', desc:'non-capturing group'}); i+=3; if (pattern[i-1] === '<') i++; }
      else if (pattern.substr(i,3) === '(?<' || pattern.substr(i,4) === '(?P<'){ tokens.push({tok:'(?<', desc:'named group'}); i = pattern.indexOf('>', i)+1 || i+3; }
      else { tokens.push({tok:'(', desc:L.group}); i++; }
      continue;
    }
    if (c === '['){
      let j = i+1;
      if (pattern[j] === '^') j++;
      if (pattern[j] === ']') j++;
      while (j < n && pattern[j] !== ']') j++;
      const cls = pattern.slice(i, j+1);
      tokens.push({tok:cls, desc:L.charClass}); i = j+1; continue;
    }
    if (c === '*' || c === '+' || c === '?'){
      const last = tokens[tokens.length-1];
      if (last) last.tok += c;
      tokens.push({tok:c, desc:'0+ / 1+ / 0-1 '+L.quant});
      i++; continue;
    }
    if (c === '{'){
      let j = pattern.indexOf('}', i);
      if (j === -1) j = n;
      tokens.push({tok:pattern.slice(i, j+1), desc:'{n,m} '+L.quant}); i = j+1; continue;
    }
    // literal char
    tokens.push({tok:c, desc:L.char+' "'+c+'"'}); i++;
  }

  $('#explain-box').innerHTML = '<strong>'+t('explain')+':</strong><br>'+tokens.map(tk =>
    '<span class="explain-token"><code>'+esc(tk.tok)+'</code> <span style="color:var(--text3);font-size:.85em">'+esc(tk.desc)+'</span></span>'
  ).join(' ');
}

function loadExample(){
  $('#pattern').value = '(\\w+)@(\\w+)\\.(\\w+)';
  $('#test').value = 'Contact us at hello@gamezipper.com or admin@test.org for support.';
  activeFlags = { g: true, i: false, m: false, s: false, u: false };
  renderFlagChips();
  runDebug();
}

function doClear(){ $('#pattern').value=''; $('#test').value=''; $('#match-view').innerHTML=''; $('#groups-output').innerHTML=''; $('#explain-box').innerHTML=''; $('#status').innerHTML=''; }

$('#toolbar').innerHTML = '\
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">'+(GZI18n.current==='zh'?'示例':'Example')+'</button>\
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">'+t('clear')+'</button>';

$('#pattern').addEventListener('input', runDebug);
$('#test').addEventListener('input', runDebug);

renderFlagChips();
runDebug();

GZ.renderToolPage({
  category: 'dev',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🔍', href:'/dev/regex-tester.html', name:'Regex Tester'},
    {icon:'📖', href:'/dev/regex-cheatsheet.html', name:'Regex Cheat Sheet'},
    {icon:'🎨', href:'/dev/regex-visualizer.html', name:'Regex Visualizer'},
    {icon:'🔄', href:'/dev/regex-replace.html', name:'Regex Replace'},
  ]
});
</script>
