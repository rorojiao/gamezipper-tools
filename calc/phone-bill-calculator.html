.pb-breakdown table{width:100%;border-collapse:collapse}

.pb-breakdown tr:last-child td{border-bottom:none}
.pb-breakdown tr.total td{font-size:1rem;color:var(--gz-accent);border-top:2px solid var(--border);padding-top:10px}

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="pb-input-group">
      <div><label id="lbl-plan"></label><input type="number" id="plan" value="60" step="1" min="0"></div>
      <div><label id="lbl-lines"></label><input type="number" id="lines" value="1" min="1" max="10"></div>
      <div><label id="lbl-data"></label><input type="number" id="dataOver" value="0" step="0.5" min="0"></div>
      <div><label id="lbl-dataRate"></label><input type="number" id="dataRate" value="10" step="0.5" min="0"></div>
      <div><label id="lbl-device"></label><input type="number" id="device" value="0" step="5" min="0"></div>
      <div><label id="lbl-insurance"></label><input type="number" id="insurance" value="0" step="1" min="0"></div>
      <div><label id="lbl-tax"></label><input type="number" id="tax" value="15" step="0.5" min="0" max="50">%</div>
      <div><label id="lbl-discount"></label><input type="number" id="discount" value="0" step="5" min="0"></div>
    </div>
    <div class="pb-summary" id="summary"></div>
    <div class="pb-breakdown" id="breakdown"></div>
    <div class="pb-tip" id="tip"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Phone Bill Calculator',
    toolDesc: 'Calculate your total monthly and yearly mobile phone cost. Add plan, data overage, device installments, insurance, taxes and discounts.',
    lblPlan: 'Base Plan ($/month)',
    lblLines: 'Number of Lines',
    lblData: 'Data Overage (GB)',
    lblDataRate: 'Overage Rate ($/GB)',
    lblDevice: 'Device Installment ($/mo)',
    lblInsurance: 'Insurance ($/mo)',
    lblTax: 'Tax & Fees (%)',
    lblDiscount: 'Discount ($/mo)',
    monthly: 'Monthly Total',
    yearly: 'Yearly Total',
    annualSavings: 'With $15 MVNO',
    step1: 'Enter your base monthly plan cost',
    step2: 'Add data overage, device installment and insurance',
    step3: 'Set your local tax/fee percentage',
    step4: 'Compare to budget MVNO alternatives for savings tips',
  },
  zh: {
    toolTitle: '手机话费计算器',
    toolDesc: '计算你的每月和每年手机总费用。添加套餐费、流量超额、分期付款、保险、税费和折扣。',
    lblPlan: '基础套餐（元/月）',
    lblLines: '号码数量',
    lblData: '超额流量 (GB)',
    lblDataRate: '超额单价（元/GB）',
    lblDevice: '手机分期（元/月）',
    lblInsurance: '保险（元/月）',
    lblTax: '税费 (%)',
    lblDiscount: '折扣（元/月）',
    monthly: '月度总计',
    yearly: '年度总计',
    annualSavings: '使用低价套餐',
    step1: '输入你的基础月套餐费',
    step2: '添加流量超额、手机分期和保险',
    step3: '设置当地税费百分比',
    step4: '对比低价套餐方案获取省钱建议',
  }
});

const { $, t } = GZ;

function calc() {
  const plan = +$('#plan').value || 0;
  const lines = +$('#lines').value || 1;
  const dataOver = +$('#dataOver').value || 0;
  const dataRate = +$('#dataRate').value || 0;
  const device = +$('#device').value || 0;
  const insurance = +$('#insurance').value || 0;
  const taxPct = +$('#tax').value || 0;
  const discount = +$('#discount').value || 0;

  const planTotal = plan * lines;
  const dataCost = dataOver * dataRate;
  const subtotal = planTotal + dataCost + device + insurance - discount;
  const taxCost = subtotal * (taxPct / 100);
  const monthly = subtotal + taxCost;
  const yearly = monthly * 12;
  const mvnoYearly = 15 * 12 * lines;

  const fmt = n => '$' + n.toFixed(2);
  const saving = yearly - mvnoYearly;

  $('#summary').innerHTML = `
    <div class="pb-card"><div class="val">${fmt(monthly)}</div><div class="lbl">${t('monthly')}</div></div>
    <div class="pb-card"><div class="val">${fmt(yearly)}</div><div class="lbl">${t('yearly')}</div></div>
    <div class="pb-card"><div class="val">${fmt(mvnoYearly)}</div><div class="lbl">${t('annualSavings')}</div></div>
  `;

  $('#breakdown').innerHTML = `
    <table>
      <tr><td>Plan (${lines} × ${fmt(plan)})</td><td>${fmt(planTotal)}</td></tr>
      ${dataCost > 0 ? `<tr><td>Data Overage (${dataOver} GB)</td><td>${fmt(dataCost)}</td></tr>` : ''}
      ${device > 0 ? `<tr><td>Device Installment</td><td>${fmt(device)}</td></tr>` : ''}
      ${insurance > 0 ? `<tr><td>Insurance</td><td>${fmt(insurance)}</td></tr>` : ''}
      ${discount > 0 ? `<tr><td>Discount</td><td>−${fmt(discount)}</td></tr>` : ''}
      <tr><td>Tax & Fees (${taxPct}%)</td><td>${fmt(taxCost)}</td></tr>
      <tr class="total"><td>Monthly Total</td><td>${fmt(monthly)}</td></tr>
    </table>`;

  let tip = '';
  if (plan > 40 && lines === 1) {
    tip = `💡 Switching to an MVNO (Mint, Visible, US Mobile) at $15/month could save you ${fmt(saving)} per year — that's ${fmt(saving/12)} every month.`;
  } else if (insurance > 0) {
    tip = `💡 Carrier insurance at ${fmt(insurance)}/month adds up to ${fmt(insurance*12)}/year. Consider self-insuring or third-party options like AppleCare.`;
  } else if (dataOver > 2) {
    tip = `💡 You're spending ${fmt(dataCost*12)}/year on data overage. Consider an unlimited plan or use Wi-Fi more often.`;
  } else {
    tip = `✓ Your phone bill looks reasonable at ${fmt(monthly)}/month. Keep monitoring for sneaky fee increases.`;
  }
  $('#tip').textContent = tip;
}

const labels = ['lbl-plan','lbl-lines','lbl-data','lbl-dataRate','lbl-device','lbl-insurance','lbl-tax','lbl-discount'];
const keys = ['lblPlan','lblLines','lblData','lblDataRate','lblDevice','lblInsurance','lblTax','lblDiscount'];
labels.forEach((id, i) => { $('#' + id).textContent = t(keys[i]); });

['plan','lines','dataOver','dataRate','device','insurance','tax','discount'].forEach(id => {
  $('#' + id).oninput = calc;
});

$('#toolbar').innerHTML = '';
calc();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'💧', href:'/calc/water-bill-calculator.html', name:'Water Bill'},
    {icon:'📺', href:'/calc/streaming-cost-calculator.html', name:'Streaming Cost'},
    {icon:'💳', href:'/calc/subscription-cost-calculator.html', name:'Subscription Cost'},
    {icon:'💰', href:'/calc/budget-planner.html', name:'Budget Planner'},
  ]
});
</script>
<script src="/tools-result-rec.js?v=20260707v520" defer></script>
</body>
</html>
