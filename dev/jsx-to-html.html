const { $, copyText, t } = GZ;

function escapeHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function rewriteClassName(html){
  return html.replace(/\bclassName\s*=\s*"/gi, 'class="');
}

function rewriteClassNameExpr(html){
  // className={expr} — only inline if expr is a string literal
  return html.replace(/\bclassName\s*=\s*\{("([^"]*)"|'([^']*)')\}/gi, (m, expr, dq, sq) => {
    const v = dq != null ? dq : sq;
    return `class="${v}"`;
  });
}

function rewriteHtmlFor(html){
  return html.replace(/\bhtmlFor\s*=\s*"/gi, 'for="').replace(/\bhtmlFor\s*=\s*\{("([^"]*)"|'([^']*)')\}/gi, (m, expr, dq, sq) => `for="${dq != null ? dq : sq}"`);
}

function rewriteEvents(html, toLower){
  // camelCase React handlers: onClick={fn} or onClick={() => ...}
  const map = {onClick:'onclick', onMouseOver:'onmouseover', onMouseOut:'onmouseout',
    onMouseDown:'onmousedown', onMouseUp:'onmouseup', onMouseMove:'onmousemove',
    onInput:'oninput', onChange:'onchange', onSubmit:'onsubmit',
    onKeyDown:'onkeydown', onKeyUp:'onkeyup', onKeyPress:'onkeypress',
    onFocus:'onfocus', onBlur:'onblur', onLoad:'onload', onError:'onerror',
    onScroll:'onscroll', onResize:'onresize', onDoubleClick:'ondblclick',
    onContextMenu:'oncontextmenu'};
  if(toLower){
    // onClick={foo} => onclick="foo()" ; onClick={() => X} => onclick="X"
    return html.replace(/\son([A-Z][a-zA-Z]+)\s*=\s*\{([^{}]*)\}/g, (m, name, expr) => {
      const lower = map['on'+name] || ('on'+name.toLowerCase());
      const trimmed = expr.trim();
      const ref = trimmed.match(/^([a-zA-Z_$][\w$]*)$/);
      if(ref) return ` ${lower}="${ref[1]}()"`;
      const arrow = trimmed.match(/^\(\s*\)\s*=>\s*(.+)$/);
      if(arrow) return ` ${lower}="${arrow[1].trim()}"`;
      return ` ${lower}="${trimmed}"`;
    });
  }
  // Just drop React event handlers
  return html.replace(/\son([A-Z][a-zA-Z]+)\s*=\s*\{[^{}]*\}/g, '');
}

function rewriteStyles(html){
  // style={{ color: 'red', fontSize: '14px' }} => style="color:red;font-size:14px"
  // Match balanced single-level braces
  return html.replace(/\bstyle\s*=\s*\{\{\s*([^{}]*)\s*\}\}/g, (m, body) => {
    const decls = [];
    // Split on top-level commas (respecting quotes — single and double)
    const parts = [];
    let cur = '', quote = null;
    for(let i = 0; i < body.length; i++){
      const ch = body[i];
      if(quote){
        cur += ch;
        if(ch === quote){ quote = null; }
      } else if(ch === "'" || ch === '"'){
        quote = ch; cur += ch;
      } else if(ch === ','){
        parts.push(cur); cur = '';
      } else {
        cur += ch;
      }
    }
    if(cur.trim()) parts.push(cur);
    for(const p of parts){
      const pm = p.match(/^\s*([a-zA-Z]+)\s*:\s*(.+?)\s*$/);
      if(!pm) continue;
      let key = pm[1];
      let val = pm[2].trim();
      // camelCase to kebab-case
      key = key.replace(/([A-Z])/g, '-$1').toLowerCase();
      // Strip surrounding quotes from value
      if((val[0] === "'" && val[val.length-1] === "'") || (val[0] === '"' && val[val.length-1] === '"')){
        val = val.slice(1,-1);
      }
      decls.push(`${key}:${val}`);
    }
    return `style="${decls.join(';')}"`;
  });
}

function inlineExpressions(html){
  // {"static string"} => static string
  // {42} => 42
  // {true}/{false} => drop
  // {expr} => {{expr}} placeholder for dynamic
  return html.replace(/\{("([^"\\]*(?:\\.[^"\\]*)*)"|'([^'\\]*(?:\\.[^'\\]*)*)')\}/g, (m, dq, dqInner, sqInner) => {
    return dqInner != null ? dqInner : sqInner;
  }).replace(/\{\s*(-?\d+(?:\.\d+)?)\s*\}/g, '$1')
    .replace(/\{\s*(true|false)\s*\}/g, '')
    .replace(/\{([^{}]+)\}/g, (m, expr) => {
      const trimmed = expr.trim();
      // ternary with both string literals: cond ? 'a' : 'b' => keep as placeholder
      return `{{${trimmed}}}`;
    });
}

function stripSelfClose(html){
  // <br /> => <br>
  return html.replace(/<(img|input|br|hr|meta|link|area|base|col|embed|source|track|wbr)\b([^>]*?)\s*\/>/gi, '<$1$2>');
}

function stripJsxComments(html){
  return html.replace(/\{\/\*[\s\S]*?\*\/\}/g, '');
}

function minifyHtml(html){
  return html.replace(/>\s+</g, '><').replace(/\s{2,}/g, ' ').trim();
}

function convert(){
  let html = $('#input').value.trim();
  if(!html){ $('#output').textContent = ''; $('#status').textContent = ''; return; }
  try {
    html = stripJsxComments(html);
    html = rewriteClassNameExpr(html);
    html = rewriteClassName(html);
    html = rewriteHtmlFor(html);
    html = rewriteEvents(html, $('#opt-events').checked);
    if($('#opt-styles').checked) html = rewriteStyles(html);
    html = inlineExpressions(html);
    html = stripSelfClose(html);
    if($('#opt-minify').checked) html = minifyHtml(html);

    $('#output').textContent = html;
    $('#status').innerHTML = `<span style="color:var(--gz-success)">${t('status')}</span>`;
  } catch(e){
    $('#output').innerHTML = `<span style="color:var(--gz-accent)">${escapeHtml(e.message)}</span>`;
    $('#status').textContent = '';
  }
}

</div>`;
  convert();
}
