<body>
<div class="gz-container">
  <div class="gz-tool-header">

      <button data-mode="annual" class="active" id="tab-salary"></button>

      <div class="row" id="salary-row">

        <div><label id="lbl-payfreq"></label>

            <option value="12">Monthly</option>
            <option value="24">Semi-monthly</option>
            <option value="26">Bi-weekly</option>

          </select>
        </div>
      </div>
      <div class="row" id="hourly-row" style="display:none">
        <div><label id="lbl-hourly-rate"></label><input type="number" id="hourly-rate" value="25" min="0" step="0.5"></div>
        <div><label id="lbl-hours"></label><input type="number" id="hours" value="40" min="0" step="0.5"></div>
        <div><label id="lbl-weeks"></label><input type="number" id="weeks" value="52" min="1" max="52" step="1"></div>
      </div>
      <div class="row">
        <div><label id="lbl-filing"></label>
          <select id="filing">
            <option value="single">Single</option>
            <option value="married">Married Filing Jointly</option>
            <option value="head">Head of Household</option>
          </select>
        </div>
        <div><label id="lbl-state"></label>
          <select id="state"></select>
        </div>
      </div>
      <div class="row">
        <div><label id="lbl-401k"></label><input type="number" id="k401" value="0" min="0" max="100" step="0.5"></div>
        <div><label id="lbl-pretax"></label><input type="number" id="pretax" value="0" min="0" step="50"></div>
      </div>
      <button class="gz-btn" onclick="calculate()" id="btn-calc"></button>
    </div>
    <div class="result-card" id="result" style="display:none">
      <div class="big" id="result-takehome"></div>
      <div class="label" id="result-label"></div>
      <div class="deduction-grid">
        <div class="deduction-item"><div class="lbl" id="lbl-gross"></div><div class="val" id="r-gross"></div></div>
        <div class="deduction-item neg"><div class="lbl" id="lbl-fed"></div><div class="val" id="r-fed"></div></div>
        <div class="deduction-item neg"><div class="lbl" id="lbl-ss"></div><div class="val" id="r-ss"></div></div>
        <div class="deduction-item neg"><div class="lbl" id="lbl-mc"></div><div class="val" id="r-mc"></div></div>
        <div class="deduction-item neg"><div class="lbl" id="lbl-st"></div><div class="val" id="r-st"></div></div>
        <div class="deduction-item neg"><div class="lbl" id="lbl-k401"></div><div class="val" id="r-k401"></div></div>
      </div>
      <div class="note" id="note"></div>
    </div>
    <div id="status"></div>
  </div>

<script>
GZI18n.register({
  en: {
    toolTitle: 'Paycheck Calculator',
    toolDesc: 'Estimate your take-home pay after federal tax, Social Security, Medicare, state tax and 401(k) contributions. Supports both salary and hourly pay. Free online US paycheck calculator.',
    tabSalary: '💼 Annual Salary',
    tabHourly: '⏰ Hourly',
    lblSalary: 'Annual Salary ($)',
    lblPayfreq: 'Pay Frequency',
    lblHourlyRate: 'Hourly Rate ($)',
    lblHours: 'Hours per Week',
    lblWeeks: 'Weeks per Year',
    lblFiling: 'Filing Status',
    lblState: 'State',
    lbl401k: '401(k) Contribution (%)',
    lblPretax: 'Other Pre-tax ($/yr)',
    btnCalc: 'Calculate Take-Home Pay',
    resultLabel: 'Estimated Annual Take-Home',
    lblGross: 'Gross Pay',
    lblFed: 'Federal Income Tax',
    lblSS: 'Social Security (6.2%)',
    lblMc: 'Medicare (1.45%)',
    lblSt: 'State Income Tax',
    lblK401: '401(k) Contribution',
    note: 'Estimate only. Uses 2026 federal brackets, simplified state rates and the employee share of FICA. Verify with a tax professional for filing.',
    perPaycheck: 'Per paycheck',
    monthly: 'Monthly take-home',
    step1: 'Pick Annual Salary or Hourly mode',
    step2: 'Enter your pay, filing status and state',
    step3: 'Optionally add 401(k) % and other pre-tax deductions',
    step4: 'Click Calculate to see take-home pay and full deduction breakdown',
  },
  zh: {
    toolTitle: '工资计算器（到手收入）',
    toolDesc: '估算扣除联邦税、社保、医疗保险、州税和 401(k) 后的实际到手收入。支持年薪和时薪两种模式。免费在线美国工资计算器。',
    tabSalary: '💼 年薪',
    tabHourly: '⏰ 时薪',
    lblSalary: '年薪（美元）',
    lblPayfreq: '发薪周期',
    lblHourlyRate: '时薪（美元）',
    lblHours: '每周工时',
    lblWeeks: '每年工作周数',
    lblFiling: '报税身份',
    lblState: '所在州',
    lbl401k: '401(k) 缴存比例 (%)',
    lblPretax: '其他税前扣除（美元/年）',
    btnCalc: '计算到手收入',
    resultLabel: '预计年度到手收入',
    lblGross: '税前总收入',
    lblFed: '联邦所得税',
    lblSS: '社保 (6.2%)',
    lblMc: '医疗保险 (1.45%)',
    lblSt: '州所得税',
    lblK401: '401(k) 缴存',
    note: '仅为估算。使用 2026 联邦税率表、简化的州税率和员工 FICA 部分。报税前请咨询税务专业人士。',
    perPaycheck: '每次发薪',
    monthly: '每月到手',
    step1: '选择「年薪」或「时薪」模式',
    step2: '输入薪资、报税身份和所在州',
    step3: '可选填 401(k) 缴存比例和其他税前扣除',
    step4: '点击「计算」查看到手收入和完整扣税明细',
  }
});

const { $, t } = GZ;

// 2026 federal tax brackets (annual)
const FED_2026 = {
  single:   [[11925,0.10],[48475,0.12],[103350,0.22],[197300,0.24],[250525,0.32],[626350,0.35],[Infinity,0.37]],
  married:  [[23850,0.10],[96950,0.22],[206700,0.24],[394600,0.32],[501050,0.35],[Infinity,0.37]],
  head:     [[17000,0.10],[64850,0.12],[103350,0.22],[197300,0.24],[250500,0.32],[626350,0.35],[Infinity,0.37]]
};
const STD_DED = { single: 14600, married: 29200, head: 21900 };
const SS_WAGE_CAP_2026 = 177000; // approx
const SS_RATE = 0.062, MC_RATE = 0.0145;

// Simplified state income tax rates (top marginal flat approximation)
const STATE_TAX = {
  AL:0.05,AK:0.00,AZ:0.025,AR:0.044,CA:0.093,CO:0.044,CT:0.05,DE:0.066,FL:0.00,GA:0.0549,HI:0.079,ID:0.058,IL:0.0495,IN:0.0305,IA:0.057,KS:0.057,KY:0.045,LA:0.0425,ME:0.0715,MD:0.0575,MA:0.05,MI:0.0425,MN:0.0785,MS:0.05,MO:0.0495,MT:0.0675,NE:0.0584,NV:0.00,NH:0.00,NJ:0.0637,NM:0.049,NY:0.0685,NC:0.0425,ND:0.025,OH:0.035,OK:0.0475,OR:0.099,PA:0.0307,RI:0.0599,SC:0.064,SD:0.00,TN:0.00,TX:0.00,UT:0.0465,VT:0.0875,VA:0.0575,WA:0.00,WV:0.0512,WI:0.0765,WY:0.00,DC:0.0895
};
const STATE_NAMES = {AL:'Alabama',AK:'Alaska',AZ:'Arizona',AR:'Arkansas',CA:'California',CO:'Colorado',CT:'Connecticut',DE:'Delaware',FL:'Florida',GA:'Georgia',HI:'Hawaii',ID:'Idaho',IL:'Illinois',IN:'Indiana',IA:'Iowa',KS:'Kansas',KY:'Kentucky',LA:'Louisiana',ME:'Maine',MD:'Maryland',MA:'Massachusetts',MI:'Michigan',MN:'Minnesota',MS:'Mississippi',MO:'Missouri',MT:'Montana',NE:'Nebraska',NV:'Nevada',NH:'New Hampshire',NJ:'New Jersey',NM:'New Mexico',NY:'New York',NC:'North Carolina',ND:'North Dakota',OH:'Ohio',OK:'Oklahoma',OR:'Oregon',PA:'Pennsylvania',RI:'Rhode Island',SC:'South Carolina',SD:'South Dakota',TN:'Tennessee',TX:'Texas',UT:'Utah',VT:'Vermont',VA:'Virginia',WA:'Washington',WV:'West Virginia',WI:'Wisconsin',WY:'Wyoming',DC:'District of Columbia'};

function buildStates() {
  $('#state').innerHTML = Object.keys(STATE_NAMES).map(s => `<option value="${s}">${STATE_NAMES[s]}</option>`).join('');
}
buildStates();

let mode = 'annual';
$('#mode-tabs').querySelectorAll('button').forEach(b => b.onclick = () => {
  mode = b.dataset.mode;
  $('#mode-tabs').querySelectorAll('button').forEach(x => x.classList.remove('active'));
  b.classList.add('active');
  $('#salary-row').style.display = mode === 'annual' ? '' : 'none';
  $('#hourly-row').style.display = mode === 'hourly' ? 'grid' : 'none';
});

function fedTax(taxable) {
  if (taxable <= 0) return 0;
  const brackets = FED_2026[$('#filing').value];
  let tax = 0, prev = 0;
  for (const [cap, rate] of brackets) {
    if (taxable > cap) { tax += (cap - prev) * rate; prev = cap; }
    else { tax += (taxable - prev) * rate; break; }
  }
  return tax;
}

function fmt(n) { return '$' + Math.max(0, n).toLocaleString('en-US', { maximumFractionDigits: 0 }); }

function calculate() {
  let gross;
  if (mode === 'annual') gross = parseFloat($('#salary').value) || 0;
  else {
    const rate = parseFloat($('#hourly-rate').value) || 0;
    const hrs = parseFloat($('#hours').value) || 0;
    const wks = parseFloat($('#weeks').value) || 0;
    gross = rate * hrs * wks;
  }
  const k401pct = (parseFloat($('#k401').value) || 0) / 100;
  const otherPretax = parseFloat($('#pretax').value) || 0;
  const k401 = gross * Math.min(k401pct, 1);
  const ssWages = Math.min(gross, SS_WAGE_CAP_2026);
  const ss = ssWages * SS_RATE;
  const mc = gross * MC_RATE;
  // Federal taxable: gross - 401k - other pretax - std deduction
  const std = STD_DED[$('#filing').value];
  const fedTaxable = Math.max(0, gross - k401 - otherPretax - std);
  const fed = fedTax(fedTaxable);
  const stRate = STATE_TAX[$('#state').value] || 0;
  const state = Math.max(0, gross - k401 - otherPretax) * stRate;

  const totalDed = fed + ss + mc + state + k401 + otherPretax;
  const takeHome = gross - totalDed;

  $('#result').style.display = '';
  $('#result-takehome').textContent = fmt(takeHome) + '/yr';
  $('#r-gross').textContent = fmt(gross);
  $('#r-fed').textContent = '−' + fmt(fed);
  $('#r-ss').textContent = '−' + fmt(ss);
  $('#r-mc').textContent = '−' + fmt(mc);
  $('#r-st').textContent = '−' + fmt(state);
  $('#r-k401').textContent = '−' + fmt(k401 + otherPretax);

  // add per-paycheck and monthly
  const oldNote = $('#note').dataset.base || '';
  const freq = parseInt($('#payfreq').value) || 12;
  const perPay = takeHome / freq;
  const monthly = takeHome / 12;
  const extra = `<br><br><b>${t('perPaycheck')}:</b> ${fmt(perPay)} &nbsp;·&nbsp; <b>${t('monthly')}:</b> ${fmt(monthly)}`;
  $('#note').innerHTML = t('note') + extra;
}

// labels
$('#tab-salary').textContent = t('tabSalary');
$('#tab-hourly').textContent = t('tabHourly');
$('#lbl-salary').textContent = t('lblSalary');
$('#lbl-payfreq').textContent = t('lblPayfreq');
$('#lbl-hourly-rate').textContent = t('lblHourlyRate');
$('#lbl-hours').textContent = t('lblHours');
$('#lbl-weeks').textContent = t('lblWeeks');
$('#lbl-filing').textContent = t('lblFiling');
$('#lbl-state').textContent = t('lblState');
$('#lbl-401k').textContent = t('lbl401k');
$('#lbl-pretax').textContent = t('lblPretax');
$('#btn-calc').textContent = t('btnCalc');
$('#result-label').textContent = t('resultLabel');
$('#lbl-gross').textContent = t('lblGross');
$('#lbl-fed').textContent = t('lblFed');
$('#lbl-ss').textContent = t('lblSS');
$('#lbl-mc').textContent = t('lblMc');
$('#lbl-st').textContent = t('lblSt');
$('#lbl-k401').textContent = t('lblK401');
calculate();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'💵', href:'/calc/salary-calculator.html', name:'Salary Calculator'},
    {icon:'🏦', href:'/calc/early-mortgage-payoff.html', name:'Mortgage Payoff'},
    {icon:'💼', href:'/calc/overtime-calculator.html', name:'Overtime Calculator'},
    {icon:'💸', href:'/calc/tax-calculator.html', name:'US Tax Calculator'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
