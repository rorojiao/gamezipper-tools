<script>
GZI18n.register({
  en: {
    toolTitle: 'Image Duotone Generator',
    toolDesc: 'Turn any photo into a stylish two-color duotone. Pick shadow and highlight colors, tune the contrast, and download a PNG — all in your browser, nothing uploaded.',
    dropTxt: 'Click or drop an image here (PNG / JPG / WebP)',
    lblShadow: 'Shadow color (darks)',
    lblHi: 'Highlight color (lights)',
    lblContrast: 'Contrast',
    lblPresets: 'Presets',
    download: 'Download PNG',
    sample: 'Use sample image',
    step1: 'Click the drop area to load an image (or try the sample)',
    step2: 'Choose shadow and highlight colors, or pick a preset',
    step3: 'Adjust the contrast slider to taste',
    step4: 'Download your duotone image as PNG',
  },
  zh: {
    toolTitle: '双色调图片生成器',
    toolDesc: '将任意照片转为时尚的双色调效果。选择暗部和亮部颜色，调整对比度，下载 PNG — 完全在浏览器中完成，无需上传。',
    dropTxt: '点击或拖入图片（PNG / JPG / WebP）',
    lblShadow: '暗部颜色',
    lblHi: '亮部颜色',
    lblContrast: '对比度',
    lblPresets: '预设',
    download: '下载 PNG',
    sample: '使用示例图片',
    step1: '点击区域加载图片（或使用示例）',
    step2: '选择暗部和亮部颜色，或点击预设',
    step3: '调整对比度滑块至满意',
    step4: '下载双色调图片为 PNG',
  }
});

const { $, t } = GZ;
const canvas = $('#canvas');
const ctx = canvas.getContext('2d');
let origData = null; // ImageData of original grayscale+luma
let imgLoaded = false;

const PRESETS = [
  ['#1a1a2e','#ff6b9d'],['#0f3460','#e94560'],['#16213e','#00d672'],
  ['#2d0a31','#ff9a44'],['#0a192f','#64ffda'],['#3c1642','#ff6700'],
  ['#000000','#ffffff'],['#240046','#ff5d8f'],['#1d3557','#e63946'],
];

$('#drop-txt').textContent = t('dropTxt');
$('#lbl-shadow').textContent = t('lblShadow');
$('#lbl-hi').textContent = t('lblHi');
$('#lbl-contrast').textContent = t('lblContrast');
$('#lbl-presets').textContent = t('lblPresets');

$('#presets').innerHTML = PRESETS.map(([s,h])=>`<div class="gz-preset" style="background:linear-gradient(90deg,${s},${h})" onclick="applyPreset('${s}','${h}')" title="${s} → ${h}"></div>`).join('');

function applyPreset(s,h){ $('#i-shadow').value=s; $('#i-hi').value=h; apply(); }

$('#drop').addEventListener('click', ()=> $('#file').click());
$('#file').addEventListener('change', e=> { if(e.target.files[0]) loadImage(e.target.files[0]); });
['dragover','dragenter'].forEach(ev=> $('#drop').addEventListener(ev, e=>{e.preventDefault();$('#drop').style.borderColor='var(--gz-accent)';}));
['dragleave','drop'].forEach(ev=> $('#drop').addEventListener(ev, e=>{e.preventDefault();$('#drop').style.borderColor='';}));
$('#drop').addEventListener('drop', e=>{ const f=e.dataTransfer.files[0]; if(f) loadImage(f); });

function loadImage(file){
  const reader = new FileReader();
  reader.onload = e=>{
    const img = new Image();
    img.onload = ()=>{
      const maxW = 900;
      let w = img.width, h = img.height;
      if(w>maxW){ h = Math.round(h*maxW/w); w = maxW; }
      canvas.width = w; canvas.height = h;
      ctx.drawImage(img,0,0,w,h);
      try {
        origData = ctx.getImageData(0,0,w,h);
        imgLoaded = true;
        apply();
      } catch(err){
        origData=null; imgLoaded=false;
        alert('Could not read image data (tainted canvas).');
      }
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function hexToRgb(hex){
  hex = hex.replace('#','');
  if(hex.length===3) hex = hex.split('').map(c=>c+c).join('');
  return [parseInt(hex.slice(0,2),16), parseInt(hex.slice(2,4),16), parseInt(hex.slice(4,6),16)];
}

function apply(){
  if(!imgLoaded || !origData) return;
  const [sr,sg,sb] = hexToRgb($('#i-shadow').value);
  const [hr,hg,hb] = hexToRgb($('#i-hi').value);
  const contrast = (+$('#i-contrast').value)/100; // 0..2, 1=normal (no change)
  const out = ctx.createImageData(origData.width, origData.height);
  const src = origData.data, dst = out.data;
  for(let i=0;i<src.length;i+=4){
    // luminance
    let l = (0.299*src[i]+0.587*src[i+1]+0.114*src[i+2])/255;
    // simple correct contrast around 0.5 midpoint
    l = (l-0.5)*contrast + 0.5;
    if(l<0)l=0; if(l>1)l=1;
    dst[i]   = sr + (hr-sr)*l;
    dst[i+1] = sg + (hg-sg)*l;
    dst[i+2] = sb + (hb-sb)*l;
    dst[i+3] = src[i+3];
  }
  ctx.putImageData(out,0,0);
}

$('#i-shadow').addEventListener('input', apply);
$('#i-hi').addEventListener('input', apply);
$('#i-contrast').addEventListener('input', apply);

function download(){
  if(!imgLoaded){ return; }
  const a = document.createElement('a');
  a.href = canvas.toDataURL('image/png');
  a.download = 'duotone.png';
  a.click();
}

function loadSample(){
  // programmatically drawn gradient sample so it works offline (no external fetch)
  canvas.width = 600; canvas.height = 400;
  const g = ctx.createRadialGradient(300,200,20,300,200,360);
  g.addColorStop(0,'#ffffff'); g.addColorStop(1,'#000000');
  ctx.fillStyle=g; ctx.fillRect(0,0,600,400);
  // draw some shapes for texture
  ctx.fillStyle='rgba(128,128,128,0.5)';
  for(let i=0;i<6;i++){ ctx.beginPath(); ctx.arc(100+i*80, 120+40*Math.sin(i), 40, 0, 7); ctx.fill(); }
  ctx.fillStyle='rgba(60,60,60,0.7)'; ctx.fillRect(60,260,480,90);
  origData = ctx.getImageData(0,0,600,400);
  imgLoaded = true; apply();
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="download()">${t('download')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadSample()">${t('sample')}</button>`;

// initial empty canvas hint
canvas.width=600; canvas.height=120;
ctx.fillStyle='var(--text2, #888)'; ctx.font='14px sans-serif'; ctx.textAlign='center';
ctx.fillText(t('dropTxt'), 300, 64);

GZ.renderToolPage({
  category: 'image',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🎞️', href:'/image/filters.html', name:'Image Filters'},
    {icon:'🎨', href:'/image/color-palette-extractor.html', name:'Color Extractor'},
    {icon:'🌫️', href:'/image/blur.html', name:'Image Blur'},
    {icon:'🎚️', href:'/image/grayscale.html', name:'Grayscale Image'},
  ]
});
</script>
