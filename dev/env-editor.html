const { $, copyText, t } = GZ;

let sortKeys = false;
let quoteStyle = 'auto';
let outFormat = 'env';

// --- .env parser (returns array of {type:'comment'|'pair'|'blank', key, value, comment}) ---
function parseEnv(text){
  const lines = text.split('\n');
  const out = [];
  for(let idx = 0; idx < lines.length; idx++){
    const raw = lines[idx];
    const line = raw.trim();
    if(line === ''){ out.push({type:'blank'}); continue; }
    if(line.startsWith('#')){ out.push({type:'comment', value: raw}); continue; }
    // optional leading "export "
    let work = line;
    const exportMatch = work.match(/^export\s+/);
    if(exportMatch) work = work.slice(exportMatch[0].length);
    const eq = work.indexOf('=');
    if(eq < 0){ out.push({type:'comment', value: raw}); continue; }
    let key = work.slice(0, eq).trim();
    // key may be quoted
    if((key.startsWith('"') && key.endsWith('"')) || (key.startsWith("'") && key.endsWith("'"))) key = key.slice(1,-1);
    let value = work.slice(eq+1);
    // strip inline trailing comment only if value is unquoted & has whitespace before #
    let inlineComment = '';
    const trimmedVal = value.trim();
    if(!(trimmedVal.startsWith('"') || trimmedVal.startsWith("'"))){
      const hash = value.indexOf(' #');
      if(hash >= 0){ inlineComment = value.slice(hash+1); value = value.slice(0, hash); }
    }
    value = unquote(value.trim());
    out.push({type:'pair', key, value, exportPrefix: !!exportMatch, inlineComment});
  }
  return out;
}

function unquote(v){
  if(v.length >= 2){
    if(v[0] === '"' && v[v.length-1] === '"') return unescapeDouble(v.slice(1,-1));
    if(v[0] === "'" && v[v.length-1] === "'") return v.slice(1,-1).replace(/\\'/g,"'");
  }
  return v;
}
function unescapeDouble(s){
  return s.replace(/\\(.)/g, (m,c)=> c==='n'?'\n': c==='t'?'\t': c==='r'?'\r':c);
}

function needsQuote(v){
  return v === '' || /[\s#"'\n\r=]/.test(v);
}

function quoteValue(v){
  if(quoteStyle === 'auto'){
    return needsQuote(v) ? `"${escapeDouble(v)}"` : v;
  } else if(quoteStyle === 'single'){
    return `'${v.replace(/\\/g,'\\\\').replace(/'/g,"\\'")}'`;
  } else { // double
    return `"${escapeDouble(v)}"`;
  }
}
function escapeDouble(s){ return s.replace(/\\/g,'\\\\').replace(/"/g,'\\"').replace(/\n/g,'\\n').replace(/\r/g,'\\r').replace(/\t/g,'\\t'); }

function isValidKey(k){ return /^[A-Za-z_][A-Za-z0-9_]*$/.test(k); }

function formatEnv(items){
  let pairs = items.filter(x=>x.type==='pair');
  const comments = items.filter(x=>x.type==='comment');
  if(sortKeys) pairs = pairs.slice().sort((a,b)=> a.key.localeCompare(b.key));

  if(outFormat === 'json'){
    const obj = {};
    pairs.forEach(p => { obj[p.key] = p.value; });
    return JSON.stringify(obj, null, 2);
  }

  const lines = [];
  if(groupComments && comments.length){
    lines.push('# Environment variables');
    lines.push('# Generated by tools.gamezipper.com — do not commit real secrets');
    lines.push('');
  }
  pairs.forEach(p => {
    const prefix = p.exportPrefix ? 'export ' : '';
    const qv = quoteValue(p.value);
    const ic = p.inlineComment ? '  ' + p.inlineComment : '';
    if(!isValidKey(p.key)){
      lines.push(`# ⚠ invalid key: "${p.key}"`);
    }
    lines.push(`${prefix}${p.key}=${qv}${ic}`);
  });
  // preserve standalone comments that aren't pair inline
  const standalone = items.filter(x=> x.type==='comment' && !x.inlineComment);
  return lines.join('\n');
}

function highlightEnv(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/^(#.*)$/gm,'<span class="env-c">$1</span>')
    .replace(/^([A-Za-z_][\w]*)(\s*=)/gm,'<span class="env-k">$1</span>$2');
}

function doFormat(){
  const raw = $('#input').value;
  if(!raw.trim()){ $('#status').innerHTML=''; $('#output').textContent=''; return; }
  try{
    const items = parseEnv(raw);
    const result = formatEnv(items);
    $('#output').innerHTML = outFormat === 'json' ? highlightJSON(result) : highlightEnv(result);
    const count = items.filter(x=>x.type==='pair').length;
    $('#status').innerHTML = `<span style="color:var(--gz-success)">${t('done')} · ${count} variable(s)</span>`;
  }catch(e){
    $('#status').innerHTML = `<span style="color:var(--gz-accent)">${t('invalid')}: ${e.message}</span>`;
    $('#output').textContent='';
  }
}

function highlightJSON(json){
  return json.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/("(\\u[\da-fA-F]{4}|\\[^u]|[^\\"])*"\s*:)/g,'<span class="env-k">$1</span>')
    .replace(/:\s*("(\\u[\da-fA-F]{4}|\\[^u]|[^\\"])*")/g,': <span class="env-v">$1</span>');
}

# Feature flags

`;
  doFormat();
}

function doDownload(){
  const code = $('#output').textContent;
  if(!code) return;
  const blob = new Blob([code], {type:'text/plain'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = outFormat === 'json' ? 'env.json' : '.env';
  a.click();
  URL.revokeObjectURL(a.href);
}
