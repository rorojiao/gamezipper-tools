<script>
GZI18n.register({
  en: {
    toolTitle: 'Backlink Checker',

    nofollow: 'Nofollow',

    resultsFor: 'Found {n} links:',
    anchor: 'Anchor',
    follow: 'Follow',
    noText: '(no text)',
    note: 'This tool analyzes links locally in your browser. For a full domain-level backlink profile (like Ahrefs/Moz), use a dedicated backlink index service.',
    step1: 'Choose a mode: paste an HTML snippet or a list of URLs',
    step2: 'Click Analyze Links to extract and classify each link',
    step3: 'Review the summary — total, dofollow, nofollow and unique domains',
    step4: 'Scroll the list to inspect each link\'s anchor text and type',
  },
  zh: {
    toolTitle: '外链检查器',
    toolDesc: '分析外链和出站链接 — 检测 dofollow/nofollow、锚文本、引荐域名和链接质量。100% 浏览器本地运行，无需注册。',
    modeHtml: '分析 HTML',
    modeList: '分析 URL 列表',
    lblHtml: '粘贴包含链接的 HTML（页面源码、博客文章等）',
    lblList: '粘贴外链 URL 列表（每行一个）',
    analyze: '分析链接',
    clear: '清空',
    example: '示例',
    copy: '复制结果',
    totalLinks: '总链接数',
    dofollow: 'Dofollow',
    nofollow: 'Nofollow',
    uniqueDomains: '唯一域名',
    noLinks: '输入中未找到链接。',
    resultsFor: '找到 {n} 个链接：',
    anchor: '锚文本',
    follow: '类型',
    noText: '（无文本）',
    note: '本工具在浏览器本地分析链接。如需整域级别的外链概况（类似 Ahrefs/Moz），请使用专门的外链索引服务。',
    step1: '选择模式：粘贴 HTML 片段或 URL 列表',
    step2: '点击「分析链接」提取并分类每个链接',
    step3: '查看汇总 — 总数、dofollow、nofollow 和唯一域名',
    step4: '滚动列表查看每个链接的锚文本和类型',
  }
});

const { $, copyText, t } = GZ;
let currentMode = 'list';

function switchMode(m){
  currentMode = m;
  $('#mode-html').style.display = m==='html' ? '' : 'none';
  $('#mode-list').style.display = m==='list' ? '' : 'none';
  document.querySelectorAll('.mode-tab').forEach(b=>b.classList.toggle('active', b.dataset.m===m));
}

$('#mode-tabs').innerHTML = `
  <button class="mode-tab active" data-m="list" onclick="switchMode('list')">${t('modeList')}</button>
  <button class="mode-tab" data-m="html" onclick="switchMode('html')">${t('modeHtml')}</button>`;

function extractLinks(){
  const links = [];
  if(currentMode === 'html'){
    const html = $('#html-input').value;
    if(!html.trim()){ $('#status').textContent = ''; return []; }
    const doc = new DOMParser().parseFromString(html, 'text/html');
    doc.querySelectorAll('a[href]').forEach(a => {
      const href = a.getAttribute('href') || '';
      const rel = (a.getAttribute('rel') || '').toLowerCase();
      const isNofollow = rel.includes('nofollow') || rel.includes('sponsored') || rel.includes('ugc');
      const anchor = (a.textContent || a.getAttribute('title') || '').trim();
      links.push({href, anchor, nofollow: isNofollow});
    });
  } else {
    const raw = $('#list-input').value.split('\n').map(s=>s.trim()).filter(Boolean);
    raw.forEach(line => {
      const m = line.match(/^(\S+)(?:\s+(.+))?$/);
      if(m) links.push({href: m[1], anchor: (m[2]||'').trim(), nofollow: false});
    });
  }
  return links.filter(l => /^https?:\/\//i.test(l.href));
}

function domainOf(url){
  try { return new URL(url).hostname.replace(/^www\./,''); } catch(e){ return ''; }
}

function faviconFor(url){
  try {
    const d = new URL(url).hostname;
    return `https://www.google.com/s2/favicons?domain=${d}&sz=32`;
  } catch(e){ return ''; }
}

function analyze(){
  const links = extractLinks();
  if(!links.length){
    $('#stats').style.display='none';
    $('#output').innerHTML='';
    $('#status').innerHTML = `<span style="color:var(--gz-accent)">${t('noLinks')}</span>`;
    return;
  }
  const follow = links.filter(l=>!l.nofollow).length;
  const nofollow = links.length - follow;
  const domains = new Set(links.map(l=>domainOf(l.href))).size;

  $('#status').textContent = t('resultsFor').replace('{n}', links.length);
  $('#stats').style.display = '';
  $('#stats').innerHTML = `
    <div class="stat-box"><div class="num">${links.length}</div><div class="lbl">${t('totalLinks')}</div></div>
    <div class="stat-box"><div class="num" style="color:#00d672">${follow}</div><div class="lbl">${t('dofollow')}</div></div>
    <div class="stat-box"><div class="num" style="color:#e94560">${nofollow}</div><div class="lbl">${t('nofollow')}</div></div>
    <div class="stat-box"><div class="num">${domains}</div><div class="lbl">${t('uniqueDomains')}</div></div>`;

  $('#output').innerHTML = links.map(l => `
    <div class="link-card">
      <img class="favicon" src="${faviconFor(l.href)}" alt="" onerror="this.style.display='none'">
      <div>
        <div class="src-url">${l.href}</div>
        <div class="anchor">${t('anchor')}: ${l.anchor || t('noText')}</div>
      </div>
      <span class="tag ${l.nofollow?'tag-nofollow':'tag-follow'}">${l.nofollow?'nofollow':'dofollow'}</span>
    </div>`).join('');
}

function loadExample(){
  if(currentMode === 'html'){
    $('#html-input').value = `<article>\n  <p>Check out <a href="https://example.com/guide">our SEO guide</a> for more.</p>\n  <p>This <a href="https://sponsor.com/buy" rel="sponsored nofollow">sponsored link</a> is paid.</p>\n  <p>Read <a href="https://blog.example.com/tips" rel="nofollow">these tips</a> too.</p>\n  <p>Another <a href="https://example.com/resource" title="Resource">resource</a> you may like.</p>\n</article>`;
  } else {
    $('#list-input').value = 'https://example.com/guide  Our SEO Guide\nhttps://sponsor.com/buy  Sponsored Link\nhttps://blog.example.com/tips\nhttps://example.com/resource  Resource\nhttps://news.site.com/article';
  }
  analyze();
}

function doClear(){
  $('#html-input').value=''; $('#list-input').value='';
  $('#output').innerHTML=''; $('#status').textContent=''; $('#stats').style.display='none';
}

function copyResults(){
  const links = extractLinks();
  if(!links.length) return;
  const text = links.map(l => `${l.href}\t${l.nofollow?'nofollow':'dofollow'}\t${l.anchor||''}`).join('\n');
  copyText(text);
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="analyze()">${t('analyze')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="copyResults()">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

$('#note').textContent = t('note');

GZ.renderToolPage({
  category: 'seo',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🔗', href:'/seo/broken-link-checker.html', name:'Broken Link Checker'},
    {icon:'📊', href:'/seo/website-seo-checker.html', name:'Website SEO Checker'},
    {icon:'🏷️', href:'/dev/slug-generator.html', name:'URL Slug Generator'},
    {icon:'📐', href:'/seo/meta-tag-generator.html', name:'Meta Tag Generator'},
  ]
});
</script>
