<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"How do I check if a website is down?","acceptedAnswer":{"@type":"Answer","text":"Enter the website URL and click Check. The tool sends a request and reports whether the site is reachable, along with response time and HTTP status."}},{"@type":"Question","name":"Does this tool work for any website?","acceptedAnswer":{"@type":"Answer","text":"It works for most public websites. Some sites may block CORS requests from browsers, in which case the tool uses a fallback check."}},{"@type":"Question","name":"Is this tool accurate?","acceptedAnswer":{"@type":"Answer","text":"The tool checks from your browser's perspective. If a site blocks cross-origin requests, the result may show as unreachable even if the site is up."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="url-input">
      <input type="url" id="urlInput" placeholder="https://example.com" spellcheck="false">
      <button class="gz-btn" id="checkBtn" onclick="checkSite()"></button>
    </div>
    <div id="result"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Website Status Checker — Is It Down?',
    toolDesc: 'Check if any website is up or down. Measure response time and HTTP status code from your browser — free and instant.',
    step1: 'Enter the website URL you want to check',
    step2: 'Click the Check button to start the test',
    step3: 'See the website status, response time and details',
    step4: 'Try multiple sites to compare availability',
    check: 'Check',
    checking: 'Checking…',
    up: '✅ Website is UP',
    down: '❌ Website is DOWN or Unreachable',
    error: '⚠️ Could not reach the website',
    url: 'URL',
    status: 'HTTP Status',
    responseTime: 'Response Time',
    checkedAt: 'Checked At',
    enterUrl: 'Please enter a valid URL',
    ms: 'ms',
  },
  zh: {
    toolTitle: '网站状态检查器 — 网站挂了吗？',
    toolDesc: '检查任意网站是否正常运行。测量响应时间和 HTTP 状态码 — 免费即时，浏览器本地运行。',
    step1: '输入要检查的网站 URL',
    step2: '点击「检查」按钮开始测试',
    step3: '查看网站状态、响应时间和详细信息',
    step4: '可以同时检查多个网站进行对比',
    check: '检查',
    checking: '检查中…',
    up: '✅ 网站正常运行',
    down: '❌ 网站无法访问',
    error: '⚠️ 无法连接到网站',
    url: 'URL',
    status: 'HTTP 状态码',
    responseTime: '响应时间',
    checkedAt: '检查时间',
    enterUrl: '请输入有效的 URL',
    ms: '毫秒',
  }
});

const { $, t } = GZ;

$('#checkBtn').textContent = t('check');
$('#urlInput').addEventListener('keydown', e => { if (e.key === 'Enter') checkSite(); });

async function checkSite() {
  let url = $('#urlInput').value.trim();
  if (!url) { alert(t('enterUrl')); return; }
  if (!/^https?:\/\//i.test(url)) url = 'https://' + url;
  $('#urlInput').value = url;

  $('#result').innerHTML = `<div class="result-card checking"><h3>${t('checking')}</h3></div>`;
  $('#checkBtn').disabled = true;
  $('#checkBtn').textContent = t('checking');

  const startTime = performance.now();
  let isUp = false;
  let statusCode = '—';
  let errorMsg = '';

  try {
    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), 10000);
    const resp = await fetch(url, { method: 'HEAD', mode: 'no-cors', signal: controller.signal });
    clearTimeout(timeoutId);
    const elapsed = Math.round(performance.now() - startTime);
    // no-cors mode: opaque response, type='opaque' means reachable
    isUp = resp.type === 'opaque' || resp.ok;
    statusCode = resp.status || (resp.type === 'opaque' ? '200 (opaque)' : '—');
    showResult(url, isUp, statusCode, elapsed);
  } catch (e) {
    const elapsed = Math.round(performance.now() - startTime);
    isUp = false;
    errorMsg = e.name === 'AbortError' ? 'Timeout (10s)' : e.message;
    showResult(url, false, '—', elapsed, errorMsg);
  }
  $('#checkBtn').disabled = false;
  $('#checkBtn').textContent = t('check');
}

function showResult(url, isUp, statusCode, elapsed, errorMsg) {
  const statusClass = isUp ? 'up' : 'down';
  const statusText = isUp ? t('up') : (errorMsg ? t('error') : t('down'));
  const now = new Date().toLocaleString();
  $('#result').innerHTML = `
    <div class="result-card ${statusClass}">
      <h3 class="${isUp ? 'up-text' : 'down-text'}">${statusText}</h3>
      ${errorMsg ? `<p style="opacity:.7;margin:4px 0">${errorMsg}</p>` : ''}
      <div class="status-grid">
        <div class="status-item"><div class="label">${t('url')}</div><div class="value" style="font-size:.85em;word-break:break-all">${url}</div></div>
        <div class="status-item"><div class="label">${t('status')}</div><div class="value ${isUp ? 'up-text' : 'down-text'}">${statusCode}</div></div>
        <div class="status-item"><div class="label">${t('responseTime')}</div><div class="value">${elapsed} ${t('ms')}</div></div>
        <div class="status-item"><div class="label">${t('checkedAt')}</div><div class="value" style="font-size:.85em">${now}</div></div>
      </div>
    </div>`;
}

GZ.renderToolPage({
  category: 'dev',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🔒', href:'/dev/ssl-checker.html', name:'SSL Checker'},
    {icon:'📡', href:'/dev/http-headers.html', name:'HTTP Headers'},
    {icon:'🔁', href:'/dev/redirect-checker.html', name:'Redirect Checker'},
    {icon:'🌐', href:'/dev/dns-lookup.html', name:'DNS Lookup'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
