const { $, copyText, t } = GZ;

// Set defaults
$('#effectiveDate').value = new Date().toISOString().slice(0,10);

function generate() {
  const company = $('#companyName').value.trim() || '[Your Company Name]';
  const url = $('#websiteUrl').value.trim() || '[Your Website URL]';
  const email = $('#contactEmail').value.trim() || 'privacy@example.com';
  const country = $('#country').value;
  const date = $('#effectiveDate').value || new Date().toISOString().slice(0,10);

  const personal = $('#chkPersonal').checked;
  const usage = $('#chkUsage').checked;
  const cookies = $('#chkCookies').checked;
  const location = $('#chkLocation').checked;
  const payment = $('#chkPayment').checked;
  const device = $('#chkDevice').checked;
  const analytics = $('#chkAnalytics').checked;
  const ads = $('#chkAds').checked;
  const thirdParty = $('#chkThirdParty').checked;
  const newsletter = $('#chkNewsletter').checked;
  const social = $('#chkSocial').checked;
  const gdpr = $('#chkGDPR').checked;
  const ccpa = $('#chkCCPA').checked;
  const coppa = $('#chkCOPPA').checked;

  let sections = [];

  sections.push(`PRIVACY POLICY FOR ${company}\nEffective Date: ${date}\n`);

  sections.push(`1. INTRODUCTION
${company} ("we", "us", or "our") operates ${url}. This Privacy Policy explains how we collect, use, disclose, and safeguard your information when you visit our website.`);

  let dataTypes = [];
  if (personal) dataTypes.push('- Personal identification information (name, email address, phone number)');
  if (usage) dataTypes.push('- Usage data (pages visited, time spent on site, click patterns)');
  if (cookies) dataTypes.push('- Cookies and tracking technologies');
  if (location) dataTypes.push('- Geographic location data');
  if (payment) dataTypes.push('- Payment and billing information');
  if (device) dataTypes.push('- Device information (browser type, operating system, device identifiers)');

  sections.push(`2. INFORMATION WE COLLECT
We may collect the following types of information:\n${dataTypes.join('\n')}`);

  sections.push(`3. HOW WE USE YOUR INFORMATION
We use the collected information for purposes including:
- To operate and maintain our website
- To improve your experience on our website
- To communicate with you regarding updates and services
- To comply with legal obligations
- To detect and prevent fraud or abuse`);

  if (cookies) {
    sections.push(`4. COOKIES AND TRACKING TECHNOLOGIES
We use cookies and similar tracking technologies to track activity on our website. You can instruct your browser to refuse all cookies or to indicate when a cookie is being sent. However, if you do not accept cookies, you may not be able to use some portions of our website.`);
  }

  if (analytics) {
    sections.push(`${cookies ? '5' : '4'}. ANALYTICS
We use analytics services such as Google Analytics to monitor and analyze the use of our website. These services collect information such as how often users visit, what pages they visit, and what other sites they used prior to coming to our website.`);
  }

  if (ads) {
    sections.push(`${cookies ? '5' : '4'}. ADVERTISING
We may use third-party advertising companies to serve ads when you visit our website. These companies may use information about your visits to this and other websites to provide advertisements about goods and services of interest to you.`);
  }

  let sharingNum = (cookies ? 4 : 3) + (analytics ? 1 : 0) + (ads ? 1 : 0) + 1;
  sections.push(`${sharingNum}. SHARING YOUR INFORMATION
We may share your information in the following situations:
- With service providers who perform services on our behalf
- To comply with a legal obligation
- To protect and defend our rights or property
- With your consent${thirdParty ? '\n- With third-party partners for purposes disclosed at the point of collection' : ''}`);

  let secNum = sharingNum + 1;
  sections.push(`${secNum}. DATA SECURITY
We implement appropriate technical and organizational security measures to protect your personal data against unauthorized access, alteration, disclosure, or destruction. However, no method of transmission over the Internet is 100% secure.`);

  secNum++;
  sections.push(`${secNum}. DATA RETENTION
We retain your personal data only for as long as necessary to fulfill the purposes outlined in this Privacy Policy, unless a longer retention period is required by law.`);

  if (newsletter) {
    secNum++;
    sections.push(`${secNum}. EMAIL COMMUNICATIONS
If you subscribe to our newsletter, we will send you periodic emails. You can unsubscribe at any time by clicking the unsubscribe link in any email or contacting us at ${email}.`);
  }

  if (gdpr) {
    secNum++;
    sections.push(`${secNum}. YOUR RIGHTS UNDER GDPR
If you are a resident of the European Economic Area (EEA), you have the following data protection rights:
- The right to access your personal data
- The right to rectify inaccurate personal data
- The right to erasure ("right to be forgotten")
- The right to restrict processing
- The right to data portability
- The right to object to processing
To exercise these rights, please contact us at ${email}.`);
  }

  if (ccpa) {
    secNum++;
    sections.push(`${secNum}. YOUR RIGHTS UNDER CCPA
If you are a California resident, you have the right to:
- Know what personal information is collected
- Request deletion of your personal information
- Opt out of the sale of personal information
- Not be discriminated against for exercising your rights
We do not sell personal information. To make a request, contact us at ${email}.`);
  }

  if (coppa) {
    secNum++;
    sections.push(`${secNum}. CHILDREN'S PRIVACY (COPPA)
Our website is not intended for children under 13 years of age. We do not knowingly collect personal information from children under 13. If you are a parent or guardian and believe your child has provided us with personal information, please contact us at ${email}.`);
  }

  secNum++;
  sections.push(`${secNum}. CHANGES TO THIS PRIVACY POLICY
We may update this Privacy Policy from time to time. We will notify you of any changes by posting the new Privacy Policy on this page and updating the "Effective Date" at the top.`);

  secNum++;
  sections.push(`${secNum}. CONTACT US
If you have any questions about this Privacy Policy, please contact us at:
Email: ${email}
Website: ${url}
Company: ${company}`);

  $('#output').textContent = sections.join('\n\n');
}

function downloadHTML() {
  const text = $('#output').textContent;
  if (!text.trim()) { generate(); }
  const html = '<!DOCTYPE html>\n<html lang="zh">\n<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Privacy Policy</title><style>body{font-family:system-ui,sans-serif;max-width:800px;margin:40px auto;padding:0 20px;line-height:1.7;color:#333}h1{font-size:1.5rem}h2{font-size:1.1rem;margin-top:2rem;border-bottom:1px solid #eee;padding-bottom:8px}p{margin:0.8em 0}</style></head>\n<body>' + text.split('\n\n').map(s => {
    const lines = s.split('\n');
    const first = lines[0];
    const rest = lines.slice(1).join('\n');
    if (/^\d+\./.test(first)) return '<h2>' + first + '</h2><p>' + rest.replace(/\n/g, '<br>') + '</p>';
    if (first === first.toUpperCase() && first.length > 5) return '<h1>' + first + '</h1><p>' + rest.replace(/\n/g, '<br>') + '</p>';
    return '<p>' + s.replace(/\n/g, '<br>') + '</p>';
  }).join('\n') + '\n</body>\n</html>';
  const blob = new Blob([html], {type: 'text/html'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'privacy-policy.html';
  a.click();
}

$('#input').addEventListener('input', generate);
$('#toolbar').innerHTML=`<button class="gz-btn" onclick="generate()">${t('generate')}</button><button class="gz-btn" onclick="downloadHTML()">Download HTML</button><button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button><button class="gz-btn gz-btn-secondary" onclick="$('#input').value='';$('#output').textContent=''">${t('clear')}</button>`;

generate();
</script>
