const { $, copyText, t } = GZ;

const KEYWORDS = new Set(['if','then','elif','else','fi','for','in','do','done','while','until','case','esac','function','return','break','continue','local','export','unset','readonly','declare','typeset','select','time','coproc','alias','unalias','set','shift','source','trap','wait','eval','exec','exit','let','test','printf','echo','read','readarray','mapfile','true','false','cd','pwd','pushd','popd']);

function beautifyBash(src, opts){
  const indent = opts.indent;
  const pad = d => ' '.repeat(d * indent);
  let out = [];
  let depth = 0;
  let i = 0, n = src.length;
  let inSQuote = false, inDQuote = false, inBacktick = false;

  function flush(buf){
    const trimmed = buf.trim();
    if (trimmed.length) out.push(pad(depth) + trimmed);
  }

  while (i < n){
    const c = src[i];
    const c2 = src[i+1];

    // line comment
    if (!inSQuote && !inDQuote && !inBacktick && c === '#' && (i === 0 || /\s/.test(src[i-1]))){
      let eol = src.indexOf('\n', i);
      if (eol === -1) eol = n;
      // gather until newline
      const comment = src.substring(i, eol);
      // we need to emit the accumulated buf + comment, then newline
      // find current line start - just append to last entry or new entry
      // Simpler: stop, flush buffer, then push a line with comment
      // but comment might be inline - for beautify, keep it inline only if buffer exists
      // We'll emit on its own line for clarity
      // But first consume any pending buf as a statement
      // Actually we need a proper tokenizer. Let's do statement-level parsing.
      break;
    }
    i++;
  }

  // Statement-level beautifier: split into logical statements and track nesting
  // This is more robust for shell.
  const stmts = tokenizeShell(src);
  return renderShell(stmts, indent, opts);
}

// Tokenize shell source into logical statements (respecting quotes, heredocs)
function tokenizeShell(src){
  const tokens = []; // each token: {type:'word'|'op'|'newline'|'comment'|'heredoc', value}
  let i = 0, n = src.length;
  let inSQuote = false, inDQuote = false, inBacktick = false;
  let buf = '';
  let bufType = 'word';

  function flushBuf(){
    if (buf.length){ tokens.push({type:bufType, value:buf}); buf = ''; bufType = 'word'; }
  }

  while (i < n){
    const c = src[i];
    const c2 = src[i+1];

    if (inSQuote){ buf += c; if (c === "'") inSQuote = false; i++; continue; }
    if (inDQuote){
      buf += c;
      if (c === '\\' && i+1 < n){ buf += src[i+1]; i += 2; continue; }
      if (c === '"') inDQuote = false;
      i++; continue;
    }
    if (inBacktick){ buf += c; if (c === '`') inBacktick = false; i++; continue; }

    // comment
    if (c === '#' && (i === 0 || /[\s;]/.test(src[i-1]))){
      flushBuf();
      let e = src.indexOf('\n', i); if (e === -1) e = n;
      tokens.push({type:'comment', value: src.substring(i, e)});
      i = e; continue;
    }

    // heredoc
    if (c === '<' && c2 === '<'){
      flushBuf();
      let j = i + 2;
      if (src[j] === '-') j++;
      let quoted = '';
      if (src[j] === '"' || src[j] === "'"){ quoted = src[j]; j++; }
      let tagStart = j;
      while (j < n && /[A-Za-z0-9_]/.test(src[j])) j++;
      let tag = src.substring(tagStart, j);
      if (quoted && src[j] === quoted) j++;
      // consume rest of line
      let eol = src.indexOf('\n', j); if (eol === -1) eol = n;
      const opener = src.substring(i, eol);
      tokens.push({type:'op', value: opener});
      i = eol === n ? n : eol + 1;
      // body
      const tagRe = new RegExp('^\\s*' + tag.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '\\s*$');
      let bodyLines = [];
      while (i < n){
        let le = src.indexOf('\n', i); if (le === -1) le = n;
        const ln = src.substring(i, le);
        if (tagRe.test(ln)){ i = le === n ? n : le + 1; break; }
        bodyLines.push(ln);
        i = le === n ? n : le + 1;
      }
      tokens.push({type:'heredoc', value: bodyLines.join('\n') + '\n' + tag});
      continue;
    }

    // quotes
    if (c === "'"){ flushBuf(); buf = "'"; inSQuote = true; i++; continue; }
    if (c === '"'){ flushBuf(); buf = '"'; inDQuote = true; i++; continue; }
    if (c === '`'){ flushBuf(); buf = '`'; inBacktick = true; i++; continue; }

    // newline
    if (c === '\n'){ flushBuf(); tokens.push({type:'newline', value:'\n'}); i++; continue; }

    // whitespace -> token boundary
    if (/\s/.test(c)){ flushBuf(); i++; continue; }

    // statement separators and operators
    if (c === ';' || c === '&' || c === '|'){
      // ;; (case)
      if (c === ';' && c2 === ';'){ flushBuf(); tokens.push({type:'op', value:';;'}); i += 2; continue; }
      if (c === '&' && c2 === '&'){ flushBuf(); tokens.push({type:'op', value:'&&'}); i += 2; continue; }
      if (c === '|' && c2 === '|'){ flushBuf(); tokens.push({type:'op', value:'||'}); i += 2; continue; }
      flushBuf();
      tokens.push({type:'op', value: c});
      i++; continue;
    }

    // accumulate into word buffer
    buf += c;
    i++;
  }
  flushBuf();
  return tokens;
}

function renderShell(tokens, indent, opts){
  const pad = d => ' '.repeat(d * indent);
  let depth = 0;
  let inCase = 0; // nesting level of case statements
  let pendingCase = false; // true after 'case' keyword, waiting for 'in'
  let lines = [];
  let lineBuf = [];

  function curLine(){
    return lineBuf.join('');
  }
  function pushToken(t){
    if (lineBuf.length && !/[\s({]$/.test(curLine())) lineBuf.push(' ');
    lineBuf.push(t);
  }
  function newline(){
    const trimmed = curLine().trim();
    if (trimmed.length) lines.push(pad(depth) + trimmed);
    lineBuf = [];
  }

  const OPEN_KW = {if:1, for:1, while:1, until:1, case:1, select:1};

  for (let k = 0; k < tokens.length; k++){
    const tok = tokens[k];
    if (tok.type === 'comment'){
      if (lineBuf.length){ pushToken(tok.value); }
      else { lines.push(pad(depth) + tok.value.trim()); }
      continue;
    }
    if (tok.type === 'heredoc'){
      newline();
      const bodyLines = tok.value.split('\n');
      for (const bl of bodyLines) lines.push(bl);
      continue;
    }
    if (tok.type === 'newline'){
      newline();
      continue;
    }
    if (tok.type === 'op'){
      if (tok.value === ';'){
        newline();
        continue;
      }
      if (tok.value === '&'){
        pushToken('&');
        newline();
        continue;
      }
      if (tok.value === '&&' || tok.value === '||' || tok.value === '|'){
        pushToken(tok.value);
        continue;
      }
      if (tok.value === ';;'){
        // case branch terminator - at body depth, dedent back to pattern depth after
        newline();
        lines.push(pad(depth) + ';;');
        if (depth > 0) depth--;
        newline();
        continue;
      }
      if (/^<</.test(tok.value)){
        pushToken(tok.value);
        newline();
        continue;
      }
      pushToken(tok.value);
      continue;
    }
    const w = tok.value;

    // opening keywords
    if (OPEN_KW[w]){
      newline();
      pushToken(w);
      if (w === 'case' || w === 'select'){
        pendingCase = true;
      }
      continue;
    }
    if (w === 'in' && pendingCase){
      // part of "case $x in" - keep on line, newline after, then increase depth
      pushToken(w);
      newline();
      depth++;
      inCase++;
      pendingCase = false;
      continue;
    }
    if (w === 'then' || w === 'do'){
      pushToken(w);
      newline();
      depth++;
      continue;
    }
    if (w === 'fi' || w === 'done'){
      newline();
      if (depth > 0) depth--;
      pushToken(w);
      continue;
    }
    if (w === 'esac'){
      newline();
      if (depth > 0) depth--;
      if (inCase > 0) inCase--;
      pushToken(w);
      continue;
    }
    if (w === 'else'){
      newline();
      if (depth > 0) depth--;
      pushToken(w);
      newline();
      depth++;
      continue;
    }
    if (w === 'elif'){
      newline();
      if (depth > 0) depth--;
      pushToken(w);
      continue;
    }
    // case pattern like "foo)" - detect by trailing )
    if (/\)$/.test(w) && !/^\)/.test(w) && inCase > 0){
      newline();
      pushToken(w);
      newline();
      depth++;
      continue;
    }
    // function body { ... }
    if (w === '{'){
      newline();
      pushToken('{');
      newline();
      depth++;
      continue;
    }
    if (w === '}'){
      newline();
      if (depth > 0) depth--;
      pushToken('}');
      newline();
      continue;
    }
    pushToken(w);
  }
  newline();
  return lines.join('\n').replace(/\n{3,}/g, '\n\n').replace(/^\n+/, '').replace(/\s+$/,'') + '\n';
}

function minifyBash(src){
  // collapse runs of whitespace, but preserve newlines that matter
  // Simple approach: remove leading/trailing whitespace per line, collapse multiple blank lines
  const lines = src.split('\n');
  const out = [];
  let prevBlank = false;
  for (const line of lines){
    const trimmed = line.trim();
    if (trimmed === ''){ if (!prevBlank){ out.push(''); prevBlank = true; } continue; }
    // collapse internal whitespace
    let minified = trimmed.replace(/[ \t]+/g, ' ');
    out.push(minified);
    prevBlank = false;
  }
  return out.join('\n');
}

function highlight(code){
  let i = 0, n = code.length, out = '';
  while (i < n){
    const c = code[i];
    if (c === '#'){
      let e = code.indexOf('\n', i); if (e === -1) e = n;
      out += `<span class="sh-com">${esc(code.substring(i, e))}</span>`;
      i = e; continue;
    }
    if (c === "'"){
      let j = i+1; while (j < n && code[j] !== "'") j++;
      out += `<span class="sh-str">${esc(code.substring(i, Math.min(j+1,n)))}</span>`;
      i = Math.min(j+1, n); continue;
    }
    if (c === '"'){
      let j = i+1; while (j < n && code[j] !== '"'){ if (code[j] === '\\') j++; j++; }
      out += `<span class="sh-str">${esc(code.substring(i, Math.min(j+1,n)))}</span>`;
      i = Math.min(j+1, n); continue;
    }
    if (c === '`'){
      let j = i+1; while (j < n && code[j] !== '`') j++;
      out += `<span class="sh-str">${esc(code.substring(i, Math.min(j+1,n)))}</span>`;
      i = Math.min(j+1, n); continue;
    }
    if (/[A-Za-z_]/.test(c)){
      let j = i; while (j < n && /[A-Za-z0-9_]/.test(code[j])) j++;
      const word = code.substring(i, j);
      if (KEYWORDS.has(word)) out += `<span class="sh-kw">${esc(word)}</span>`;
      else out += esc(word);
      i = j; continue;
    }
    if (c === '$' && code[i+1] === '{'){
      let j = i+2; while (j < n && code[j] !== '}') j++;
      out += `<span class="sh-var">${esc(code.substring(i, Math.min(j+1,n)))}</span>`;
      i = Math.min(j+1, n); continue;
    }
    out += esc(c); i++;
  }
  return out;
}
function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function doBeautify(){
  const inp = $('#input').value;
  if (!inp.trim()){ $('#status').innerHTML = `<span style="color:var(--gz-accent)">${t('empty')}</span>`; $('#output').innerHTML=''; return; }
  const out = beautifyBash(inp, getOpts());
  $('#output').innerHTML = highlight(out);
  window._shOut = out;
  $('#status').innerHTML = `<span style="color:var(--gz-success)">${t('done')} · ${out.split('\n').length} lines</span>`;
}
function doMinify(){
  const inp = $('#input').value;
  if (!inp.trim()){ $('#status').innerHTML = `<span style="color:var(--gz-accent)">${t('empty')}</span>`; $('#output').innerHTML=''; return; }
  const out = minifyBash(inp);
  window._shOut = out;
  $('#output').innerHTML = highlight(out);
  $('#status').innerHTML = `<span style="color:var(--gz-success)">${t('minified')} · ${out.length} chars</span>`;
}
function doCopy(){ if (window._shOut != null) copyText(window._shOut); }
function doDownload(){
  if (window._shOut == null) return;
  const blob = new Blob([window._shOut], {type:'text/x-shellscript'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'beautified.sh';
  a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href), 1000);
}
