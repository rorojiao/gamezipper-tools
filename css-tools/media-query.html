<script>
GZI18n.register({
  en: {
    toolTitle: 'CSS Media Query Generator',
    toolDesc: 'Generate responsive CSS media queries visually. Set breakpoints, conditions, and copy production-ready code.',
    addBreakpoint: '+ Add Breakpoint',
    output: 'Generated CSS',
    step1: 'Click "+ Add Breakpoint" to add a media query condition',
    step2: 'Choose the condition type (min-width, max-width, orientation, etc.)',
    step3: 'Set the value and add CSS rules inside the block',
    step4: 'Copy the generated media query CSS into your stylesheet',
  },
  zh: {
    toolTitle: 'CSS 媒体查询生成器',
    toolDesc: '可视化生成响应式 CSS 媒体查询。设置断点、条件，一键复制生产可用的 CSS 代码。',
    addBreakpoint: '+ 添加断点',
    output: '生成的 CSS',
    step1: '点击「添加断点」添加一个媒体查询条件',
    step2: '选择条件类型（min-width、max-width、方向等）',
    step3: '设置数值并添加 CSS 规则',
    step4: '将生成的媒体查询 CSS 复制到样式表中',
  }
});
const { $, copyText, t } = GZ;
const CONDITIONS = [
  {v:'min-width',l:'min-width'},{v:'max-width',l:'max-width'},
  {v:'min-height',l:'min-height'},{v:'max-height',l:'max-height'},
  {v:'orientation: landscape',l:'landscape'},{v:'orientation: portrait',l:'portrait'},
  {v:'prefers-color-scheme: dark',l:'dark mode'},{v:'prefers-color-scheme: light',l:'light mode'},
  {v:'prefers-reduced-motion: reduce',l:'reduced motion'},
  {v:'min-resolution: 2dppx',l:'retina (2x)'},{v:'min-resolution: 3dppx',l:'retina (3x)'},
];
const PRESETS = [
  {name:'Mobile',cond:'max-width',val:'480px'},
  {name:'Tablet',cond:'min-width',val:'768px'},
  {name:'Laptop',cond:'min-width',val:'1024px'},
  {name:'Desktop',cond:'min-width',val:'1280px'},
  {name:'Large',cond:'min-width',val:'1536px'},
];
let queries = [];
let qId = 0;
function addQuery(preset) {
  const id = qId++;
  const cond = preset ? preset.cond : 'min-width';
  const val = preset ? preset.val : '768px';
  const css = preset ? `/* ${preset.name} styles */\n  ` : '/* Your CSS here */\n  ';
  queries.push({id, cond, val, css});
  render();
}
function removeQuery(id) {
  queries = queries.filter(q => q.id !== id);
  render();
}
function render() {
  const qc = $('#queries');
  qc.innerHTML = '';
  queries.forEach(q => {
    const div = document.createElement('div');
    div.className = 'query-row';
    const hasVal = !q.cond.includes(':');
    div.innerHTML = `
      <select onchange="updateCond(${q.id},this.value)">
        ${CONDITIONS.map(c => `<option value="${c.v}" ${c.v===q.cond?'selected':''}>${c.l}</option>`).join('')}
      </select>
      ${hasVal ? `<input type="text" value="${q.val}" onchange="updateVal(${q.id},this.value)" style="width:80px;padding:6px 8px;border-radius:8px;background:var(--glass2);border:1px solid var(--border);color:var(--text);font-size:.85em">` : ''}
      <button onclick="removeQuery(${q.id})">✕</button>`;
    qc.appendChild(div);
  });
  generate();
}
function updateCond(id, val) {
  const q = queries.find(q => q.id === id);
  if (q) { q.cond = val; render(); }
}
function updateVal(id, val) {
  const q = queries.find(q => q.id === id);
  if (q) { q.val = val; generate(); }
}
function generate() {
  if (queries.length === 0) {
    $('#output').textContent = '/* Add breakpoints to generate media queries */';
    $('#preview').innerHTML = '';
    return;
  }
  let css = '';
  const previews = [];
  queries.forEach(q => {
    const cond = q.cond.includes(':') ? `(${q.cond})` : `(${q.cond}: ${q.val})`;
    css += `@media ${cond} {\n  /* Your styles here */\n}\n\n`;
    const numVal = parseInt(q.val);
    if (!isNaN(numVal)) {
      const pct = Math.min(100, Math.max(5, (numVal / 1920) * 100));
      previews.push({label: `${q.cond}: ${q.val}`, width: pct});
    }
  });
  $('#output').textContent = css.trim();
  let previewHtml = '<div style="display:flex;flex-direction:column;gap:8px">';
  previews.forEach(p => {
    previewHtml += `<div><div class="preview-bar" style="width:${p.width}%"></div><div class="preview-label">${p.label}</div></div>`;
  });
  previewHtml += '</div>';
  $('#preview').innerHTML = previewHtml;
}
$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy') || 'Copy'}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadPresets()">Load Presets</button>`;
function loadPresets() {
  queries = [];
  qId = 0;
  PRESETS.forEach(p => addQuery(p));
}
// Start with a default
addQuery({cond:'min-width',val:'768px',name:'Tablet'});
addQuery({cond:'min-width',val:'1024px',name:'Laptop'});
GZ.renderToolPage({
  category: 'css',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📐', href:'/css-tools/flexbox.html', name:'Flexbox'},
    {icon:'🔲', href:'/css-tools/grid.html', name:'CSS Grid'},
    {icon:'📏', href:'/css-tools/clamp.html', name:'CSS Clamp'},
    {icon:'📐', href:'/css-tools/container-query.html', name:'Container Query'},
  ]
});
</script>
