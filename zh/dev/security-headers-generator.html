<script type="application/ld+json">{"@context":"https://schema.org","@type":"WebApplication","name":"Security Headers Generator","description":"Generate secure HTTP response headers including CSP, HSTS, X-Frame-Options, Referrer-Policy and Permissions-Policy with Nginx, Apache and Express snippets.","url": "https://tools.gamezipper.com/zh/dev/security-headers-generator.html","applicationCategory":"DeveloperApplication","operatingSystem":"Web Browser","offers":{"@type":"Offer","price":"0"}}</script>
<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"What are HTTP security headers?","acceptedAnswer":{"@type":"Answer","text":"Security headers are HTTP response headers that tell browsers how to protect your site, such as blocking clickjacking, enforcing HTTPS, limiting feature access and reducing XSS risk."}},{"@type":"Question","name":"Which headers should every website use?","acceptedAnswer":{"@type":"Answer","text":"Most modern sites should use Content-Security-Policy, Strict-Transport-Security, X-Content-Type-Options, Referrer-Policy, Permissions-Policy and either X-Frame-Options or CSP frame-ancestors."}},{"@type":"Question","name":"Can I use the generated headers in Nginx or Apache?","acceptedAnswer":{"@type":"Answer","text":"Yes. Choose the output format to get raw headers, Nginx add_header directives, Apache Header set directives or Express.js middleware code."}},{"@type":"Question","name":"Does this tool scan my website?","acceptedAnswer":{"@type":"Answer","text":"No. It is a generator that runs entirely in your browser. Use it together with a security headers checker after deployment to verify the live response."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header"><h1 id="title"></h1><p class="desc" id="desc"></p></div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="sec-grid">
      <label><span id="lbl-format"></span><select id="format" onchange="generate()"><option value="raw">Raw HTTP headers</option><option value="nginx">Nginx</option><option value="apache">Apache</option><option value="express">Express.js</option></select></label>
      <label>default-src <input id="defaultSrc" value="'self'" oninput="generate()"></label>
      <label>script-src <input id="scriptSrc" value="'self'" oninput="generate()"></label>
      <label>style-src <input id="styleSrc" value="'self' 'unsafe-inline'" oninput="generate()"></label>
      <label>img-src <input id="imgSrc" value="'self' data: https:" oninput="generate()"></label>
      <label>connect-src <input id="connectSrc" value="'self'" oninput="generate()"></label>
      <label>frame-ancestors <input id="frameAncestors" value="'none'" oninput="generate()"></label>
      <label>HSTS max-age <input id="hstsAge" value="31536000" oninput="generate()"></label>
      <label>Referrer-Policy <select id="referrer" onchange="generate()"><option>strict-origin-when-cross-origin</option><option>no-referrer</option><option>same-origin</option><option>origin</option></select></label>
    </div>
    <div class="sec-checks">
      <label><input id="hsts" type="checkbox" checked onchange="generate()"> HSTS</label>
      <label><input id="preload" type="checkbox" onchange="generate()"> HSTS preload</label>
      <label><input id="xcto" type="checkbox" checked onchange="generate()"> X-Content-Type-Options</label>
      <label><input id="coop" type="checkbox" checked onchange="generate()"> COOP</label>
      <label><input id="corp" type="checkbox" onchange="generate()"> CORP</label>
      <label><input id="permissions" type="checkbox" checked onchange="generate()"> Permissions-Policy</label>
    </div>
    <div class="score" id="score"></div>
    <div><label id="lbl-out"></label><div class="gz-output" id="output"></div></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en:{toolTitle:'Security Headers Generator',toolDesc:'Generate CSP, HSTS, Referrer-Policy and other HTTP security headers for Nginx, Apache, Express or raw responses.',format:'Output format',outputLabel:'Generated headers',generate:'Generate',strict:'Strict preset',balanced:'Balanced preset',score:'Security score',step1:'Choose raw, Nginx, Apache or Express output.',step2:'Edit CSP directives and toggle recommended headers.',step3:'Copy the generated snippet into your server configuration.',step4:'Deploy and verify your live site with a security headers checker.'},
  zh:{toolTitle:'安全响应头生成器',toolDesc:'为 Nginx、Apache、Express 或原始响应生成 CSP、HSTS、Referrer-Policy 等 HTTP 安全头。',format:'输出格式',outputLabel:'生成的响应头',generate:'生成',strict:'严格预设',balanced:'平衡预设',score:'安全评分',step1:'选择 Raw、Nginx、Apache 或 Express 输出。',step2:'编辑 CSP 指令并开关推荐安全头。',step3:'将生成片段复制到服务器配置。',step4:'部署后使用安全头检查器验证线上站点。'}
});
const {$,copyText,t}=GZ;
function headerLines(){
  const csp=[['default-src',$('#defaultSrc').value],['script-src',$('#scriptSrc').value],['style-src',$('#styleSrc').value],['img-src',$('#imgSrc').value],['connect-src',$('#connectSrc').value],['frame-ancestors',$('#frameAncestors').value],['base-uri',"'self'"],['form-action',"'self'"]].filter(x=>x[1]).map(x=>x[0]+' '+x[1]).join('; ');
  const h={'Content-Security-Policy':csp,'Referrer-Policy':$('#referrer').value,'X-Frame-Options':$('#frameAncestors').value.includes("'none'")?'DENY':'SAMEORIGIN'};
  if($('#hsts').checked)h['Strict-Transport-Security']='max-age='+($('#hstsAge').value||'31536000')+'; includeSubDomains'+($('#preload').checked?'; preload':'');
  if($('#xcto').checked)h['X-Content-Type-Options']='nosniff'; if($('#coop').checked)h['Cross-Origin-Opener-Policy']='same-origin'; if($('#corp').checked)h['Cross-Origin-Resource-Policy']='same-origin';
  if($('#permissions').checked)h['Permissions-Policy']='camera=(), microphone=(), geolocation=(), payment=(), usb=(), interest-cohort=()'; return h;
}
function render(h){const fmt=$('#format').value; const entries=Object.entries(h); if(fmt==='raw')return entries.map(([k,v])=>k+': '+v).join('\n'); if(fmt==='nginx')return entries.map(([k,v])=>`add_header ${k} "${v.replace(/"/g,'\\"')}" always;`).join('\n'); if(fmt==='apache')return entries.map(([k,v])=>`Header always set ${k} "${v.replace(/"/g,'\\"')}"`).join('\n'); return `app.use((req, res, next) => {\n${entries.map(([k,v])=>`  res.setHeader(${JSON.stringify(k)}, ${JSON.stringify(v)});`).join('\n')}\n  next();\n});`;}
function score(h){let s=0;if(h['Content-Security-Policy'])s+=35;if(h['Strict-Transport-Security'])s+=20;if(h['X-Content-Type-Options'])s+=10;if(h['Referrer-Policy'])s+=10;if(h['Permissions-Policy'])s+=10;if(h['Cross-Origin-Opener-Policy'])s+=8;if(h['Cross-Origin-Resource-Policy'])s+=7;return Math.min(100,s)}
function generate(){const h=headerLines();$('#output').textContent=render(h);const s=score(h);$('#score').innerHTML=`🛡️ ${t('score')}: <strong style="color:${s>80?'var(--gz-success)':s>55?'#ffaa00':'var(--gz-accent)'}">${s}/100</strong>`}
function preset(kind){ if(kind==='strict'){ $('#scriptSrc').value="'self'";$('#styleSrc').value="'self'";$('#imgSrc').value="'self' data:";$('#frameAncestors').value="'none'";$('#preload').checked=true;$('#corp').checked=true;} else {$('#scriptSrc').value="'self' https:";$('#styleSrc').value="'self' 'unsafe-inline' https:";$('#imgSrc').value="'self' data: https:";$('#frameAncestors').value="'self'";$('#preload').checked=false;$('#corp').checked=false;} generate();}
$('#lbl-format').textContent=t('format');$('#lbl-out').textContent=t('outputLabel');
$('#toolbar').innerHTML=`<button class="gz-btn" onclick="generate()">${t('generate')}</button><button class="gz-btn gz-btn-secondary" onclick="preset('strict')">${t('strict')}</button><button class="gz-btn gz-btn-secondary" onclick="preset('balanced')">${t('balanced')}</button><button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>`;
GZ.renderToolPage({category:'dev',titleKey:'toolTitle',descKey:'toolDesc',howToSteps:['step1','step2','step3','step4'],related:[{icon:'🔒',href:'/dev/security-headers.html',name:'Security Headers Checker'},{icon:'🛡️',href:'/dev/csp-generator.html',name:'CSP Generator'},{icon:'🧪',href:'/dev/cors-tester.html',name:'CORS Tester'},{icon:'🔐',href:'/dev/password-strength-checker.html',name:'Password Checker'}]});
generate();
</script>

</body>
