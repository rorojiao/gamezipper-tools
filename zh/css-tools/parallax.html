<script type="application/ld+json">{"@context":"https://schema.org","@type":"WebApplication","name":"CSS Parallax Scroll Effect Generator","description":"Generate CSS parallax scroll effects with live preview. Customize speed, direction, layers and copy production-ready CSS and HTML.","url": "https://tools.gamezipper.com/zh/css-tools/parallax.html","applicationCategory":"Utility","operatingSystem":"Web Browser","offers":{"@type":"Offer","price":"0"}}</script>
<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is CSS parallax scrolling?", "acceptedAnswer": {"@type": "Answer", "text": "CSS parallax is a visual effect where background elements move at a different speed than foreground content when scrolling, creating a sense of depth. It uses CSS perspective and translateZ transforms."}}, {"@type": "Question", "name": "Does CSS parallax work on mobile?", "acceptedAnswer": {"@type": "Answer", "text": "CSS parallax using perspective and translateZ has limited support on iOS Safari. The generator includes a fallback that works on all devices."}}, {"@type": "Question", "name": "How do I add multiple parallax layers?", "acceptedAnswer": {"@type": "Answer", "text": "Each layer gets a different translateZ value. Background layers use negative values (e.g., translateZ(-2px)) and scale up to fill the viewport. The generator handles this automatically."}}]}</script>

<script>
GZI18n.register({
  en: {
    toolTitle: 'CSS Parallax Scroll Effect Generator',
    toolDesc: 'Create beautiful parallax scroll effects with CSS perspective and translateZ — customize layers, speed and overflow, get copy-ready code.',
    layers: 'Layers',
    speed: 'Speed',
    bgHeight: 'BG Height',
    copy: 'Copy Code',
    reset: 'Reset',
    preview: 'Live Preview (scroll inside)',
    generatedCode: 'Generated HTML + CSS',
    step1: 'Choose the number of parallax layers (1–4)',
    step2: 'Adjust the parallax speed and background height',
    step3: 'Scroll inside the preview to see the parallax effect',
    step4: 'Click "Copy Code" to get production-ready HTML and CSS',
    sectionTitle: 'Your Content Here',
    sectionDesc: 'This is where your main content goes. The parallax background layers behind this section create a beautiful depth effect as users scroll.',
  },
  zh: {
    toolTitle: 'CSS 视差滚动效果生成器',
    toolDesc: '使用 CSS perspective 和 translateZ 创建精美的视差滚动效果 — 自定义图层、速度和溢出，一键复制可用代码。',
    layers: '图层数',
    speed: '速度',
    bgHeight: '背景高度',
    copy: '复制代码',
    reset: '重置',
    preview: '实时预览（在框内滚动）',
    generatedCode: '生成的 HTML + CSS',
    step1: '选择视差图层数量（1-4）',
    step2: '调整视差速度和背景高度',
    step3: '在预览框内滚动查看视差效果',
    step4: '点击「复制代码」获取生产可用的 HTML 和 CSS',
    sectionTitle: '你的内容在这里',
    sectionDesc: '这是主要内容的区域。视差背景图层在该区域后面创建优美的深度效果，用户滚动时产生沉浸式体验。',
  }
});

const { $, copyText, t } = GZ;
let layers = 2, speed = 2, bgH = 600;

function update() {
  const wrap = $('#preview-wrap');
  const colors = ['rgba(78,205,196,0.3)','rgba(255,107,107,0.3)','rgba(255,217,61,0.3)','rgba(150,100,255,0.3)'];
  const emojis = ['🏔️','🌊','🌲','☁️'];
  let bgHTML = '';
  for (let i = 0; i < layers; i++) {
    const z = -(speed * (i + 1));
    const s = 1 + speed * (i + 1);
    bgHTML += `<div class="parallax-bg" style="transform:translateZ(${z}px) scale(${s});height:${bgH}px;background:${colors[i]}">${emojis[i].repeat(8)}</div>`;
  }
  wrap.innerHTML = `<div class="parallax-container" style="perspective:1px;overflow-x:hidden;overflow-y:auto;height:500px;transform-style:preserve-3d">
    ${bgHTML}
    <div class="parallax-content" style="transform:translateZ(0);margin-top:${bgH}px">
      <h2>${t('sectionTitle')}</h2>
      <p>${t('sectionDesc')}</p>
      <p style="margin-top:20px">${t('sectionDesc')}</p>
    </div>
  </div>`;

  const code = `<!-- Parallax Container -->
<div class="parallax-wrapper" style="perspective: 1px; height: 100vh; overflow-x: hidden; overflow-y: auto;">
  <div class="parallax-container" style="transform-style: preserve-3d; position: relative;">
${Array.from({length: layers}, (_, i) => {
  const z = -(speed * (i + 1));
  const s = 1 + speed * (i + 1);
  return `    <!-- Layer ${i+1} -->
    <div style="position: absolute; top: 0; left: 0; right: 0; height: ${bgH}px; transform: translateZ(${z}px) scale(${s}); background: ${colors[i]}; display: flex; align-items: center; justify-content: center;"></div>`;
}).join('\n')}
    <!-- Content -->
    <div style="position: relative; transform: translateZ(0); padding: 40px 24px; margin-top: ${bgH}px; background: #fff;">
      <h2>${t('sectionTitle')}</h2>
      <p>${t('sectionDesc')}</p>
    </div>
  </div>
</div>

<style>
.parallax-wrapper {
  perspective: 1px;
  height: 100vh;
  overflow-x: hidden;
  overflow-y: auto;
}
.parallax-container {
  transform-style: preserve-3d;
  position: relative;
}
</style>`;
  $('#code-output').textContent = code;
}

$('#controls').innerHTML = `
  <div class="ctrl-group"><label>${t('layers')}:</label><input type="range" min="1" max="4" value="${layers}" oninput="layers=+this.value;$('#layer-val').textContent=layers;update()"><span id="layer-val">${layers}</span></div>
  <div class="ctrl-group"><label>${t('speed')}:</label><input type="range" min="1" max="5" value="${speed}" oninput="speed=+this.value;$('#speed-val').textContent=speed;update()"><span id="speed-val">${speed}</span></div>
  <div class="ctrl-group"><label>${t('bgHeight')}:</label><input type="range" min="300" max="1000" step="50" value="${bgH}" oninput="bgH=+this.value;$('#h-val').textContent=bgH;update()"><span id="h-val">${bgH}</span></div>`;

$('#preview-label').textContent = t('preview');
$('#code-label').textContent = t('generatedCode');

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="copyText($('#code-output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="layers=2;speed=2;bgH=600;update();$('#controls').querySelectorAll('input')[0].value=2;$('#controls').querySelectorAll('input')[1].value=2;$('#controls').querySelectorAll('input')[2].value=600;$('#layer-val').textContent=2;$('#speed-val').textContent=2;$('#h-val').textContent=600">${t('reset')}</button>`;

GZ.renderToolPage({
  category: 'css',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🎬', href:'/css-tools/animation.html', name:'Animation'},
    {icon:'📐', href:'/css-tools/grid.html', name:'Grid'},
    {icon:'🫧', href:'/css-tools/svg-blob.html', name:'SVG Blob'},
    {icon:'🌊', href:'/css-tools/wave-divider.html', name:'Wave Divider'},
  ]
});
update();
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
