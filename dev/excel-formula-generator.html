<script>
GZI18n.register({
  en: {
    toolTitle: 'Excel Formula Generator',
    toolDesc: 'Build Excel formulas visually without memorizing syntax. IF, VLOOKUP, XLOOKUP, SUMIFS, COUNTIFS, CONCAT, TEXT and more — copy into Excel or Google Sheets.',
    fields: 'Formula Inputs',
    result: 'Generated Formula',
    copy: 'Copy Formula',
    clear: 'Clear',
    step1: 'Select a formula category from the buttons above',
    step2: 'Fill in the input fields with your cell references or values',
    step3: 'The formula is built live in the result panel',
    step4: 'Click Copy Formula and paste into Excel or Google Sheets',
    copied: '✓ Formula copied to clipboard!',
  },
  zh: {
    toolTitle: 'Excel 公式生成器',
    toolDesc: '可视化构建 Excel 公式，无需记忆语法。支持 IF、VLOOKUP、XLOOKUP、SUMIFS、COUNTIFS、CONCAT、TEXT 等 — 复制到 Excel 或 Google Sheets。',
    fields: '公式输入',
    result: '生成的公式',
    copy: '复制公式',
    clear: '清空',
    step1: '从上方按钮选择公式类别',
    step2: '在输入字段中填写单元格引用或值',
    step3: '公式实时显示在结果区域',
    step4: '点击「复制公式」并粘贴到 Excel 或 Google Sheets',
    copied: '✓ 公式已复制到剪贴板！',
  }
});

const { $, copyText, t } = GZ;
let currentCat = 'if';

const CATEGORIES = {
  if: { label: 'IF', fields: ['condition', 'valueIfTrue', 'valueIfFalse'], labels_en: ['Condition (e.g. A1>10)', 'Value if TRUE', 'Value if FALSE'], labels_zh: ['条件（如 A1>10）','为真时的值','为假时的值'] },
  iferror: { label: 'IFERROR', fields: ['formula', 'valueIfError'], labels_en: ['Formula / value', 'Value if error'], labels_zh: ['公式/值','出错时的值'] },
  vlookup: { label: 'VLOOKUP', fields: ['lookupValue', 'tableRange', 'colIndex', 'exactMatch'], labels_en: ['Lookup value', 'Table range (e.g. A:D)', 'Column index', 'Exact match? (TRUE/FALSE)'], labels_zh: ['查找值','表格范围（如 A:D）','列号','精确匹配？（TRUE/FALSE）'] },
  xlookup: { label: 'XLOOKUP', fields: ['lookupValue', 'lookupArray', 'returnArray', 'notFound'], labels_en: ['Lookup value', 'Lookup array (e.g. A:A)', 'Return array (e.g. D:D)', 'If not found (optional)'], labels_zh: ['查找值','查找数组（如 A:A）','返回数组（如 D:D）','未找到时（可选）'] },
  sumif: { label: 'SUMIF', fields: ['range', 'criteria', 'sumRange'], labels_en: ['Criteria range', 'Criteria (e.g. ">10")', 'Sum range (optional)'], labels_zh: ['条件范围','条件（如 ">10"）','求和范围（可选）'] },
  sumifs: { label: 'SUMIFS', fields: ['sumRange', 'critRange1', 'crit1', 'critRange2', 'crit2'], labels_en: ['Sum range', 'Criteria range 1', 'Criteria 1', 'Criteria range 2 (opt)', 'Criteria 2 (opt)'], labels_zh: ['求和范围','条件范围 1','条件 1','条件范围 2（可选）','条件 2（可选）'] },
  countif: { label: 'COUNTIF', fields: ['range', 'criteria'], labels_en: ['Range', 'Criteria'], labels_zh: ['范围','条件'] },
  countifs: { label: 'COUNTIFS', fields: ['critRange1', 'crit1', 'critRange2', 'crit2'], labels_en: ['Criteria range 1', 'Criteria 1', 'Criteria range 2 (opt)', 'Criteria 2 (opt)'], labels_zh: ['条件范围 1','条件 1','条件范围 2（可选）','条件 2（可选）'] },
  concat: { label: 'CONCAT', fields: ['text1', 'text2', 'text3'], labels_en: ['Text/Cell 1', 'Text/Cell 2', 'Text/Cell 3 (opt)'], labels_zh: ['文本/单元格 1','文本/单元格 2','文本/单元格 3（可选）'] },
  textjoin: { label: 'TEXTJOIN', fields: ['delimiter', 'ignoreEmpty', 'text1', 'text2'], labels_en: ['Delimiter', 'Ignore empty? (TRUE/FALSE)', 'Text/Range 1', 'Text/Range 2'], labels_zh: ['分隔符','忽略空值？（TRUE/FALSE）','文本/范围 1','文本/范围 2'] },
  left: { label: 'LEFT/RIGHT', fields: ['text', 'numChars', 'side'], labels_en: ['Text/Cell', 'Number of chars', 'Side (left/right)'], labels_zh: ['文本/单元格','字符数','方向（left/right）'] },
  text: { label: 'TEXT', fields: ['value', 'format'], labels_en: ['Value/Cell', 'Format code (e.g. "0.00")'], labels_zh: ['值/单元格','格式代码（如 "0.00"）'] },
  datedif: { label: 'DATEDIF', fields: ['startDate', 'endDate', 'unit'], labels_en: ['Start date', 'End date', 'Unit (Y/M/D/MD/YM/YD)'], labels_zh: ['开始日期','结束日期','单位（Y/M/D/MD/YM/YD）'] },
  index_match: { label: 'INDEX+MATCH', fields: ['returnRange', 'lookupArray', 'lookupValue'], labels_en: ['Return range', 'Lookup array', 'Lookup value'], labels_zh: ['返回范围','查找数组','查找值'] },
};

function fmtVal(v) {
  if (v === undefined || v === '') return '';
  // If it's a cell ref (letters+numbers) or already a formula, use as-is
  if (/^[A-Za-z]+[0-9]+(:[A-Za-z]+[0-9]+)?$/.test(v.trim())) return v.trim();
  if (/^[A-Za-z]+:[A-Za-z]+$/.test(v.trim())) return v.trim();
  if (/^(TRUE|FALSE)$/i.test(v.trim())) return v.trim().toUpperCase();
  if (/^-?\d+(\.\d+)?$/.test(v.trim())) return v.trim();
  // Otherwise wrap in quotes
  return '"' + v.replace(/"/g, '""') + '"';
}

function generateFormula(cat, vals) {
  const v = vals;
  switch(cat) {
    case 'if': return `=IF(${v.condition}, ${fmtVal(v.valueIfTrue)}, ${fmtVal(v.valueIfFalse)})`;
    case 'iferror': return `=IFERROR(${v.formula}, ${fmtVal(v.valueIfError)})`;
    case 'vlookup': return `=VLOOKUP(${fmtVal(v.lookupValue)}, ${v.tableRange}, ${v.colIndex}, ${v.exactMatch})`;
    case 'xlookup': return v.notFound ? `=XLOOKUP(${fmtVal(v.lookupValue)}, ${v.lookupArray}, ${v.returnArray}, ${fmtVal(v.notFound)})` : `=XLOOKUP(${fmtVal(v.lookupValue)}, ${v.lookupArray}, ${v.returnArray})`;
    case 'sumif': return v.sumRange ? `=SUMIF(${v.range}, ${fmtVal(v.criteria)}, ${v.sumRange})` : `=SUMIF(${v.range}, ${fmtVal(v.criteria)})`;
    case 'sumifs': {
      let base = `=SUMIFS(${v.sumRange}, ${v.critRange1}, ${fmtVal(v.crit1)}`;
      if (v.critRange2 && v.crit2) base += `, ${v.critRange2}, ${fmtVal(v.crit2)}`;
      return base + ')';
    }
    case 'countif': return `=COUNTIF(${v.range}, ${fmtVal(v.criteria)})`;
    case 'countifs': {
      let base = `=COUNTIFS(${v.critRange1}, ${fmtVal(v.crit1)}`;
      if (v.critRange2 && v.crit2) base += `, ${v.critRange2}, ${fmtVal(v.crit2)}`;
      return base + ')';
    }
    case 'concat': {
      let parts = [v.text1, v.text2, v.text3].filter(x => x !== undefined && x !== '').map(fmtVal);
      return `=CONCAT(${parts.join(', ')})`;
    }
    case 'textjoin': return `=TEXTJOIN(${fmtVal(v.delimiter)}, ${v.ignoreEmpty.toUpperCase()}, ${fmtVal(v.text1)}, ${fmtVal(v.text2)})`;
    case 'left': return v.side.toLowerCase() === 'right' ? `=RIGHT(${fmtVal(v.text)}, ${v.numChars})` : `=LEFT(${fmtVal(v.text)}, ${v.numChars})`;
    case 'text': return `=TEXT(${fmtVal(v.value)}, ${fmtVal(v.format)})`;
    case 'datedif': return `=DATEDIF(${fmtVal(v.startDate)}, ${fmtVal(v.endDate)}, "${v.unit}")`;
    case 'index_match': return `=INDEX(${v.returnRange}, MATCH(${fmtVal(v.lookupValue)}, ${v.lookupArray}, 0))`;
    default: return '';
  }
}

function renderFields() {
  const cat = CATEGORIES[currentCat];
  const isZh = GZI18n.lang === 'zh';
  const labels = isZh ? cat.labels_zh : cat.labels_en;
  const html = cat.fields.map((f, i) =>
    `<div class="gz-form-row"><label>${labels[i]}</label><input type="text" id="f-${f}" oninput="updateFormula()" placeholder="${labels[i]}"></div>`
  ).join('');
  $('#formFields').innerHTML = html;
  updateFormula();
}

function updateFormula() {
  const cat = CATEGORIES[currentCat];
  const vals = {};
  cat.fields.forEach(f => { vals[f] = ($('#f-' + f) || {value:''}).value; });
  const formula = generateFormula(currentCat, vals);
  $('#output').textContent = formula;
}

function selectCat(cat) {
  currentCat = cat;
  document.querySelectorAll('.formula-cat button').forEach(b => b.classList.toggle('active', b.dataset.cat === cat));
  renderFields();
}

// Render category buttons
$('#catBtns').innerHTML = Object.entries(CATEGORIES).map(([k, v]) =>
  `<button data-cat="${k}" onclick="selectCat('${k}')">${v.label}</button>`
).join('');

$('#copyBtn').onclick = () => { copyText($('#output').textContent); $('#status').textContent = t('copied'); setTimeout(() => $('#status').textContent = '', 2000); };
$('#clearBtn').onclick = () => { document.querySelectorAll('#formFields input').forEach(i => i.value = ''); updateFormula(); };

selectCat('if');

GZ.renderToolPage({
  category: 'dev',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📊', href:'/dev/json-to-csv.html', name:'JSON to CSV'},
    {icon:'🧮', href:'/dev/excel-formula-generator.html', name:'Excel Formulas'},
    {icon:'📋', href:'/dev/csv-formatter.html', name:'CSV Formatter'},
    {icon:'🔢', href:'/dev/sql.html', name:'SQL Formatter'},
  ]
});
</script>

</body>
