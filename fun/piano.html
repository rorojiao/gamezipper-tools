<script>
GZI18n.register({
  en: {
    toolTitle: 'Virtual Piano — Play Online',
    toolDesc: 'Play piano online for free. Two octaves, keyboard shortcuts, sustain pedal and volume control.',
    volume: 'Volume',
    sustain: 'Sustain',
    step1: 'Click piano keys with your mouse or use keyboard shortcuts',
    step2: 'Adjust volume and sustain with the controls above',
    step3: 'White keys: A S D F G H J K L ; — Black keys: W E T Y U O P',
    step4: 'Enjoy playing melodies and chords!',
  },
  zh: {
    toolTitle: '虚拟钢琴 — 在线弹奏',
    toolDesc: '免费在线弹钢琴。两个八度，支持键盘快捷键、延音踏板和音量控制。',
    volume: '音量',
    sustain: '延音',
    step1: '用鼠标点击琴键或使用键盘快捷键弹奏',
    step2: '通过上方控件调节音量和延音',
    step3: '白键：A S D F G H J K L ; — 黑键：W E T Y U O P',
    step4: '尽情弹奏旋律与和弦！',
  }
});

const { $, t } = GZ;
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
let volume = 0.5, sustain = false, activeOsc = {};

// Note frequencies (C4 to C6)
const notes = [
  {n:'C4',f:261.63,type:'w',kb:'a'},{n:'C#4',f:277.18,type:'b',kb:'w'},
  {n:'D4',f:293.66,type:'w',kb:'s'},{n:'D#4',f:311.13,type:'b',kb:'e'},
  {n:'E4',f:329.63,type:'w',kb:'d'},
  {n:'F4',f:349.23,type:'w',kb:'f'},{n:'F#4',f:369.99,type:'b',kb:'t'},
  {n:'G4',f:392.00,type:'w',kb:'g'},{n:'G#4',f:415.30,type:'b',kb:'y'},
  {n:'A4',f:440.00,type:'w',kb:'h'},{n:'A#4',f:466.16,type:'b',kb:'u'},
  {n:'B4',f:493.88,type:'w',kb:'j'},
  {n:'C5',f:523.25,type:'w',kb:'k'},{n:'C#5',f:554.37,type:'b',kb:'o'},
  {n:'D5',f:587.33,type:'w',kb:'l'},{n:'D#5',f:622.25,type:'b',kb:'p'},
  {n:'E5',f:659.25,type:'w',kb:';'},
  {n:'F5',f:698.46,type:'w',kb:null},{n:'F#5',f:739.99,type:'b',kb:null},
  {n:'G5',f:783.99,type:'w',kb:null},{n:'G#5',f:830.61,type:'b',kb:null},
  {n:'A5',f:880.00,type:'w',kb:null},{n:'A#5',f:932.33,type:'b',kb:null},
  {n:'B5',f:987.77,type:'w',kb:null},{n:'C6',f:1046.50,type:'w',kb:null},
];

function playNote(note) {
  if (audioCtx.state === 'suspended') audioCtx.resume();
  if (activeOsc[note.n]) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'triangle';
  osc.frequency.value = note.f;
  gain.gain.setValueAtTime(volume, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(volume * 0.6, audioCtx.currentTime + 0.3);
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.start(); activeOsc[note.n] = { osc, gain };
}

function stopNote(note) {
  if (!activeOsc[note.n]) return;
  const { osc, gain } = activeOsc[note.n];
  const t = audioCtx.currentTime;
  const rel = sustain ? 2.0 : 0.3;
  gain.gain.cancelScheduledValues(t);
  gain.gain.setValueAtTime(gain.gain.value, t);
  gain.gain.exponentialRampToValueAtTime(0.001, t + rel);
  osc.stop(t + rel + 0.05);
  delete activeOsc[note.n];
}

// Build piano keyboard
let html = '', wIdx = 0, blackPositions = [];
const whiteNotes = notes.filter(n => n.type === 'w');
const blackNotes = notes.filter(n => n.type === 'b');

whiteNotes.forEach((n, i) => {
  html += `<div class="wkey" data-note="${n.n}" data-freq="${n.f}">${n.kb ? `<span>${n.kb.toUpperCase()}</span>` : ''}<br><span class="note">${n.n}</span></div>`;
});

// Calculate black key positions
let bIdx = 0;
notes.forEach((n, i) => {
  if (n.type === 'b') {
    // Count white keys before this black key
    let wc = notes.slice(0, i).filter(x => x.type === 'w').length;
    blackPositions.push({ ...n, left: wc * 48 - 15 });
  }
});

$('#piano').innerHTML = html;
blackPositions.forEach(n => {
  const el = document.createElement('div');
  el.className = 'bkey';
  el.dataset.note = n.n;
  el.dataset.freq = n.f;
  el.style.left = n.left + 'px';
  el.innerHTML = n.kb ? `<span>${n.kb.toUpperCase()}</span>` : '';
  $('#piano').appendChild(el);
});

// Mouse/touch events
document.querySelectorAll('.wkey,.bkey').forEach(key => {
  const note = notes.find(n => n.n === key.dataset.note);
  key.addEventListener('pointerdown', e => { e.preventDefault(); playNote(note); key.classList.add('pressed'); });
  key.addEventListener('pointerup', () => { stopNote(note); key.classList.remove('pressed'); });
  key.addEventListener('pointerleave', () => { stopNote(note); key.classList.remove('pressed'); });
});

// Keyboard shortcuts
const kbMap = {};
notes.forEach(n => { if (n.kb) kbMap[n.kb] = n; });
document.addEventListener('keydown', e => {
  if (e.repeat) return;
  const n = kbMap[e.key.toLowerCase()];
  if (n) { playNote(n); const el = document.querySelector(`[data-note="${n.n}"]`); if (el) el.classList.add('pressed'); }
});
document.addEventListener('keyup', e => {
  const n = kbMap[e.key.toLowerCase()];
  if (n) { stopNote(n); const el = document.querySelector(`[data-note="${n.n}"]`); if (el) el.classList.remove('pressed'); }
});

$('#controls').innerHTML = `
  <label>${t('volume')} <input type="range" min="0" max="100" value="50" id="vol-slider"></label>
  <label><input type="checkbox" id="sus-toggle"> ${t('sustain')}</label>
`;
$('#vol-slider').oninput = e => { volume = e.target.value / 100; };
$('#sus-toggle').onchange = e => { sustain = e.target.checked; };

GZ.renderToolPage({
  category: 'fun',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],

    {icon:'🎼', href:'/fun/metronome.html', name:'Metronome'},
    {icon:'🎹', href:'/fun/chord-progression.html', name:'Chords'},
    {icon:'⌨️', href:'/fun/typing-test.html', name:'Typing Test'},
  ]
});
</script>
