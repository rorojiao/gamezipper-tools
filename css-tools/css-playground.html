<script>
GZI18n.register({
  en: {
    toolTitle: 'CSS Playground',
    toolDesc: 'Write HTML and CSS side by side with live preview. Experiment with layouts, animations, and visual effects instantly.',
    run: '▶ Run',
    download: '⬇ Download',
    copyCode: '📋 Copy',
    clear: '🗑 Clear',
    example: 'Example',
    autoRun: 'Auto-run',
    step1: 'Write HTML markup in the left editor pane',
    step2: 'Write CSS styles in the center editor pane',
    step3: 'Preview updates automatically as you type',
    step4: 'Download or copy the combined HTML file',
    step5: 'Use Example to load a starter template',
  },
  zh: {
    toolTitle: 'CSS 在线编辑器',
    toolDesc: '左右对照编写 HTML 和 CSS，实时预览效果。即时实验布局、动画和视觉效果。',
    run: '▶ 运行',
    download: '⬇ 下载',
    copyCode: '📋 复制',
    clear: '🗑 清空',
    example: '示例',
    autoRun: '自动运行',
    step1: '在左侧编辑器中编写 HTML 标记',
    step2: '在中间编辑器中编写 CSS 样式',
    step3: '输入时预览区域自动更新',
    step4: '下载或复制合并后的 HTML 文件',
    step5: '点击「示例」加载入门模板',
  }
});

const { $, copyText, t } = GZ;
let autoRun = true;
let timer;

function updatePreview() {
  const html = $('#html-editor').value;
  const css = $('#css-editor').value;
  const frame = $('#preview-frame');
  const doc = frame.contentDocument || frame.contentWindow.document;
  doc.open();
  doc.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><style>body{margin:0;font-family:system-ui,sans-serif}${css}</style></head><body>${html}</body></html>`);
  doc.close();
}

function scheduleUpdate() {
  if (!autoRun) return;
  clearTimeout(timer);
  timer = setTimeout(updatePreview, 300);
}

function loadExample() {
  $('#html-editor').value = `<div class="container">\n  <div class="card">\n    <div class="avatar">GZ</div>\n    <h2>CSS Playground</h2>\n    <p>Experiment with modern CSS features live!</p>\n    <div class="tags">\n      <span class="tag">Grid</span>\n      <span class="tag">Flexbox</span>\n      <span class="tag">Animation</span>\n    </div>\n    <button class="btn">Get Started →</button>\n  </div>\n</div>`;
  $('#css-editor').value = `.container {\n  display: flex;\n  align-items: center;\n  justify-content: center;\n  min-height: 100vh;\n  background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);\n}\n\n.card {\n  background: rgba(255, 255, 255, 0.05);\n  backdrop-filter: blur(10px);\n  border: 1px solid rgba(255, 255, 255, 0.1);\n  border-radius: 20px;\n  padding: 40px;\n  text-align: center;\n  max-width: 380px;\n  color: #fff;\n}\n\n.avatar {\n  width: 64px;\n  height: 64px;\n  border-radius: 50%;\n  background: linear-gradient(135deg, #4ecdc4, #44b09e);\n  display: flex;\n  align-items: center;\n  justify-content: center;\n  font-weight: 700;\n  font-size: 1.2em;\n  margin: 0 auto 20px;\n  animation: pulse 2s infinite;\n}\n\n@keyframes pulse {\n  0%, 100% { transform: scale(1); }\n  50% { transform: scale(1.05); }\n}\n\nh2 { margin: 0 0 8px; font-size: 1.5em; }\np { color: rgba(255,255,255,0.7); margin: 0 0 20px; }\n\n.tags { display: flex; gap: 8px; justify-content: center; margin-bottom: 24px; }\n.tag {\n  padding: 4px 12px;\n  border-radius: 99px;\n  background: rgba(78, 205, 196, 0.15);\n  color: #4ecdc4;\n  font-size: 0.8em;\n}\n\n.btn {\n  background: linear-gradient(135deg, #4ecdc4, #44b09e);\n  color: #fff;\n  border: none;\n  padding: 12px 28px;\n  border-radius: 99px;\n  font-size: 0.95em;\n  cursor: pointer;\n  transition: transform 0.2s, box-shadow 0.2s;\n}\n.btn:hover {\n  transform: translateY(-2px);\n  box-shadow: 0 8px 24px rgba(78, 205, 196, 0.3);\n}`;
  updatePreview();
}

function doClear() {
  $('#html-editor').value = '';
  $('#css-editor').value = '';
  updatePreview();
}

function downloadCode() {
  const html = $('#html-editor').value;
  const css = $('#css-editor').value;
  const full = `<!DOCTYPE html>\n<html lang="en">\n<head>\n<meta charset="UTF-8">\n<meta name="viewport" content="width=device-width,initial-scale=1">\n<style>\n${css}\n</style>\n</head>\n<body>\n${html}\n</body>\n</html>`;
  const blob = new Blob([full], { type: 'text/html' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'style.html';
  a.click();
}

function copyCode() {
  const html = $('#html-editor').value;
  const css = $('#css-editor').value;
  copyCode_full = `<!DOCTYPE html>\n<html>\n<head><style>\n${css}\n</style></head>\n<body>\n${html}\n</body>\n</html>`;
  copyText(copyCode_full);
}

$('#html-editor').addEventListener('input', scheduleUpdate);
$('#css-editor').addEventListener('input', scheduleUpdate);

// Tab support in textareas
['html-editor','css-editor'].forEach(id => {
  const el = $('#' + id);
  el.addEventListener('keydown', e => {
    if (e.key === 'Tab') {
      e.preventDefault();
      const s = el.selectionStart, end = el.selectionEnd;
      el.value = el.value.substring(0, s) + '  ' + el.value.substring(end);
      el.selectionStart = el.selectionEnd = s + 2;
      scheduleUpdate();
    }
  });
});

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="updatePreview()">${t('run')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="downloadCode()">${t('download')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="copyCode()">${t('copyCode')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

GZ.renderToolPage({
  category: 'css-tools',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4','step5'],
  related: [
    {icon:'🌐', href:'/text/html-playground.html', name:'HTML Playground'},
    {icon:'⚡', href:'/dev/javascript-playground.html', name:'JS Playground'},
    {icon:'🎨', href:'/css-tools/border-radius.html', name:'Border Radius'},
    {icon:'🌈', href:'/css-tools/box-shadow.html', name:'Box Shadow'},
  ]
});

loadExample();
</script>
