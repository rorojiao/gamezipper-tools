<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is a Content Security Policy (CSP)?", "acceptedAnswer": {"@type": "Answer", "text": "CSP is an HTTP response header that helps prevent cross-site scripting (XSS), clickjacking and other code injection attacks by specifying which content sources are allowed to load on your page."}}, {"@type": "Question", "name": "How do I add a CSP header to my website?", "acceptedAnswer": {"@type": "Answer", "text": "Add the Content-Security-Policy header to your server responses. In Nginx: add_header Content-Security-Policy 'your-policy'; In Apache: Header set Content-Security-Policy 'your-policy'; You can also use a meta tag."}}, {"@type": "Question", "name": "What is the difference between Content-Security-Policy and Content-Security-Policy-Report-Only?", "acceptedAnswer": {"@type": "Answer", "text": "Content-Security-Policy enforces the rules and blocks violations. Content-Security-Policy-Report-Only only reports violations without blocking, useful for testing before enforcement."}}, {"@type": "Question", "name": "Can I use a CSP meta tag instead of an HTTP header?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. Use <meta http-equiv='Content-Security-Policy' content='your-policy'>. However, meta tags do not support report-uri or frame-ancestors directives."}}]}</script>

<script>
GZI18n.register({
  en: {
    toolTitle: 'Content Security Policy (CSP) Generator',
    toolDesc: 'Generate CSP headers to protect your website from XSS and injection attacks.',
    outputLabel: 'Generated CSP Header',
    generate: 'Generate',
    copyHeader: 'Copy Header',
    copyMeta: 'Copy Meta Tag',
    reportOnly: 'Report-Only Mode',
    reset: 'Reset',
    generated: 'CSP header copied!',
    step1: 'Configure each directive by selecting sources and entering custom domains',
    step2: 'Toggle Report-Only mode to test without enforcing',
    step3: 'Click Generate to build the CSP header',
    step4: 'Copy as HTTP header or HTML meta tag',
    srcNone: "'none'", srcSelf: "'self'", srcUnsafeInline: "'unsafe-inline'", srcUnsafeEval: "'unsafe-eval'", srcData: "data:", srcBlob: "blob:", srcHttps: "https:", srcCustom: "Custom sources (space-separated)",
  },
  zh: {
    toolTitle: 'Content Security Policy (CSP) 生成器',
    toolDesc: '生成 CSP 安全响应头，保护网站免受 XSS 和注入攻击。',
    outputLabel: '生成的 CSP 响应头',
    generate: '生成',
    copyHeader: '复制响应头',
    copyMeta: '复制 Meta 标签',
    reportOnly: '仅报告模式',
    reset: '重置',
    generated: 'CSP 响应头已复制！',
    step1: '配置每个指令的来源，选择复选框并输入自定义域名',
    step2: '切换仅报告模式以测试而不强制执行',
    step3: '点击「生成」构建 CSP 响应头',
    step4: '复制为 HTTP 响应头或 HTML meta 标签',
    srcNone: "'none'", srcSelf: "'self'", srcUnsafeInline: "'unsafe-inline'", srcUnsafeEval: "'unsafe-eval'", srcData: "data:", srcBlob: "blob:", srcHttps: "https:", srcCustom: "自定义来源（空格分隔）",
  }
});
const { $, copyText, t } = GZ;
const directives = [
  { key: 'default-src', label: 'default-src', desc: 'Default for all fetches' },
  { key: 'script-src', label: 'script-src', desc: 'JavaScript sources' },
  { key: 'style-src', label: 'style-src', desc: 'CSS sources' },
  { key: 'img-src', label: 'img-src', desc: 'Image sources' },
  { key: 'font-src', label: 'font-src', desc: 'Font sources' },
  { key: 'connect-src', label: 'connect-src', desc: 'XHR / Fetch / WebSocket' },
  { key: 'frame-src', label: 'frame-src', desc: 'Iframe sources' },
  { key: 'media-src', label: 'media-src', desc: 'Audio & video' },
  { key: 'object-src', label: 'object-src', desc: 'Plugin sources' },
  { key: 'manifest-src', label: 'manifest-src', desc: 'Web app manifest' },
  { key: 'worker-src', label: 'worker-src', desc: 'Web worker sources' },
  { key: 'base-uri', label: 'base-uri', desc: 'Base tag restriction' },
  { key: 'form-action', label: 'form-action', desc: 'Form submission targets' },
  { key: 'frame-ancestors', label: 'frame-ancestors', desc: 'Who can embed this page' },
];
const sources = ['srcSelf','srcUnsafeInline','srcUnsafeEval','srcData','srcBlob','srcHttps','srcNone'];
const sourceVals = ["'self'","'unsafe-inline'","'unsafe-eval'","data:","blob:","https:","'none'"];
function buildUI() {
  let html = '';
  directives.forEach(d => {
    html += `<div class="csp-section"><h3><span class="directive-tag">${d.label}</span> ${d.desc}</h3><div class="csp-row">`;
    sources.forEach((s, i) => {
      html += `<span class="csp-check"><input type="checkbox" data-dir="${d.key}" data-src="${sourceVals[i]}" id="${d.key}-${i}"><label for="${d.key}-${i}">${t(s)}</label></span>`;
    });
    html += `</div><div class="csp-row"><label>${t('srcCustom')}</label><input type="text" data-dir="${d.key}" data-custom="1" placeholder="cdn.example.com *.example.org"></div></div>`;
  });
  $('#csp-config').innerHTML = html;
  $('#csp-config').addEventListener('change', generateCSP);
  $('#csp-config').addEventListener('input', generateCSP);
}
function generateCSP() {
  const parts = [];
  const grouped = {};
  directives.forEach(d => {
    const vals = [];
    document.querySelectorAll(`input[data-dir="${d.key}"]:checked`).forEach(cb => {
      const v = cb.dataset.src;
      if (v === "'none'") { vals.length = 0; vals.push("'none'"); return; }
      if (!vals.includes("'none'")) vals.push(v);
    });
    const custom = document.querySelector(`input[data-dir="${d.key}"][data-custom]`).value.trim();
    if (custom) custom.split(/\s+/).forEach(v => { if (!vals.includes(v) && !vals.includes("'none'")) vals.push(v); });
    if (vals.length) parts.push(`${d.key} ${vals.join(' ')}`);
  });
  const reportOnly = $('#report-only-toggle')?.checked;
  const headerName = reportOnly ? 'Content-Security-Policy-Report-Only' : 'Content-Security-Policy';
  const value = parts.join('; ');
  const fullHeader = `${headerName}: ${value}`;
  const metaTag = `<meta http-equiv="Content-Security-Policy" content="${value}">`;
  $('#output').innerHTML = `<div style="margin-bottom:.5rem;color:var(--accent);font-weight:700">${headerName}:</div>${escHtml(value)}${value ? `\n\n<div style="color:var(--text3);font-size:.8rem;margin-top:.8rem"><!-- Nginx -->\nadd_header ${headerName} '${escHtml(value)}';\n\n<!-- Apache -->\nHeader set ${headerName} '${escHtml(value)}'\n\n<!-- HTML Meta -->\n${escHtml(metaTag)}</div>` : ''}`;
}
function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function getCSPValue() {
  const el = $('#output');
  return el.textContent.split('\n').filter(l => !l.startsWith('<!--') && !l.startsWith('add_header') && !l.startsWith('Header set') && !l.startsWith('<meta') && l.trim()).join('\n').trim();
}
buildUI();
$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="generateCSP()">${t('generate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="copyText(getCSPValue())">${t('copyHeader')}</button>
  <span class="csp-check" style="margin-left:8px"><input type="checkbox" id="report-only-toggle" onchange="generateCSP()"><label for="report-only-toggle">${t('reportOnly')}</label></span>
  <button class="gz-btn gz-btn-secondary" onclick="resetAll()" style="margin-left:auto">${t('reset')}</button>`;
function resetAll() {
  document.querySelectorAll('#csp-config input[type="checkbox"]').forEach(cb => cb.checked = false);
  document.querySelectorAll('#csp-config input[type="text"]').forEach(inp => inp.value = '');
  $('#report-only-toggle').checked = false;
  generateCSP();
}
generateCSP();
GZ.renderToolPage({
  category: 'dev',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🔐', href:'/dev/htaccess.html', name:'.htaccess'},
    {icon:'🔒', href:'/dev/ssl-checker.html', name:'SSL Checker'},
    {icon:'📡', href:'/dev/http-headers.html', name:'HTTP Headers'},
    {icon:'📄', href:'/dev/nginx-config.html', name:'Nginx Config'},
  ]
});
</script>
