    bytes: '字节',
    lines: '行',
    empty: '粘贴 JSON 以进行验证。',
    step1: '将 JSON 粘贴或输入到上方文本框',
    step2: '验证器会在你输入时自动运行 — 无需点击按钮',
    step3: '查看结果：绿色表示有效，红色显示错误及行列号',
    step4: '点击「格式化」美化有效的 JSON，或点击「清空」重新开始',
  }
});

const { $, copyText, t } = GZ;

function countNodes(obj, stats) {
  if (obj === null || typeof obj !== 'object') return;
  if (Array.isArray(obj)) {
    stats.arrays++;
    obj.forEach(v => countNodes(v, stats));
  } else {
    stats.objects++;
    stats.keys += Object.keys(obj).length;
    Object.values(obj).forEach(v => countNodes(v, stats));
  }
}

function validate() {
  const raw = $('#input').value;
  const result = $('#result');
  const stats = $('#stats');
  if (!raw.trim()) {
    result.className = '';
    result.textContent = t('empty');
    stats.innerHTML = '';
    return;
  }
  try {
    const obj = JSON.parse(raw);
    const s = { objects: 0, arrays: 0, keys: 0 };
    countNodes(obj, s);
    const lineCount = raw.split('\n').length;
    const byteLen = new Blob([raw]).size;
    result.className = 'valid';
    result.innerHTML = `<strong>${t('valid')}</strong>`;
    stats.innerHTML = `
      <span>${t('objects')}: ${s.objects}</span>
      <span>${t('arrays')}: ${s.arrays}</span>
      <span>${t('keys')}: ${s.keys}</span>
      <span>${t('lines')}: ${lineCount}</span>
      <span>${t('bytes')}: ${byteLen.toLocaleString()}</span>`;
  } catch (e) {
    const msg = e.message;
    const posMatch = msg.match(/position (\d+)/);
    let detail = msg;
    if (posMatch) {
      const pos = parseInt(posMatch[1]);
      const before = raw.substring(0, pos);
      const line = before.split('\n').length;
      const col = pos - before.lastIndexOf('\n');
      detail = `${msg} (Line ${line}, Col ${col})`;
    }
    result.className = 'invalid';
    result.innerHTML = `<strong>${t('invalid')}</strong><br>${detail}`;
    stats.innerHTML = '';
  }
}

function formatValid() {
  const raw = $('#input').value.trim();
  if (!raw) return;
  try {
    const obj = JSON.parse(raw);
    $('#input').value = JSON.stringify(obj, null, 2);
    validate();
  } catch (e) {
    // already shown by validate
  }
}

function loadExample() {
  $('#input').value = JSON.stringify({
    "app": "GameZipper Tools",
    "version": "2.0",
    "features": ["validator", "formatter", "beautifier"],
    "config": { "theme": "dark", "public": true },
    "users": 2173
  }, null, 2);
  validate();
}

function doClear() {
  $('#input').value = '';
  validate();
}

$('#input').addEventListener('input', validate);

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="validate()">${t('btnValidate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="formatValid()">${t('btnFormat')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('btnExample')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('btnClear')}</button>`;
