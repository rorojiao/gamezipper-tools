<script>
GZI18n.register({
  en: {
    toolTitle: 'Matching Pairs Worksheet Generator',
    toolDesc: 'Create free printable matching pairs worksheets for vocabulary, synonyms, antonyms, math equations, states-capitals and more. Randomized answer columns, includes optional answer key.',
    enterPairs: 'Enter pairs (format: left | right, one per line):',
    showKey: 'Show answer key',
    leftHeader: 'Column A',
    rightHeader: 'Column B',
    instructions: 'Draw a line to match each item in Column A with its pair in Column B.',
    generate: 'Generate Worksheet',
    print: 'Print Worksheet',
    example: 'Example: Synonyms',
    name: 'Name:',
    date: 'Date:',
    score: 'Score:',
    answerKey: 'Answer Key',
    step1: 'Enter pairs using "left | right" format (one per line)',
    step2: 'Optionally toggle answer key on/off',
    step3: 'Click Generate to shuffle and create the worksheet',
    step4: 'Print the worksheet for your students',
  },
  zh: {
    toolTitle: '配对练习题生成器',
    toolDesc: '为词汇、同义词、反义词、数学算式、州-首都等免费创建可打印的配对练习题。答案列随机排列，可附带答案。',
    enterPairs: '输入配对（格式：左 | 右，每行一组）：',
    showKey: '显示答案',
    leftHeader: 'A列',
    rightHeader: 'B列',
    instructions: '请画线将A列的每个条目与B列中对应的配对连接起来。',
    generate: '生成练习题',
    print: '打印练习题',
    example: '示例：同义词',
    name: '姓名：',
    date: '日期：',
    score: '分数：',
    answerKey: '答案',
    step1: '使用"左 | 右"格式输入配对（每行一组）',
    step2: '可选开关答案显示',
    step3: '点击"生成练习题"随机排列并创建',
    step4: '打印练习题供学生使用',
  }
});

const { $, t } = GZ;

const examplePairs = `happy | joyful\nsad | unhappy\nbig | large\nsmall | tiny\nfast | quick\nslow | sluggish\nsmart | intelligent\nbeautiful | gorgeous\nangry | furious\neasy | simple`;

$('#settings').innerHTML = `
  <div class="mp-row"><label>${t('enterPairs')}</label></div>
  <textarea class="mp-textarea" id="pairsInput" spellcheck="false" placeholder="happy | joyful&#10;big | large&#10;cat | 猫&#10;2+2 | 4"></textarea>
  <div class="mp-row">
    <label><input type="checkbox" id="keyCheck" checked> ${t('showKey')}</label>
  </div>
`;

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="generateWorksheet()">${t('generate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn" onclick="window.print()">${t('print')}</button>`;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function generateWorksheet() {
  const raw = $('#pairsInput').value.trim();
  if (!raw) { $('#status').innerHTML = '<span style="color:var(--accent)">⚠ Please enter pairs.</span>'; return; }
  const pairs = raw.split('\n').map(l => {
    const parts = l.split('|').map(s => s.trim());
    return parts.length === 2 && parts[0] && parts[1] ? { left: parts[0], right: parts[1] } : null;
  }).filter(p => p);

  if (pairs.length < 2) { $('#status').innerHTML = '<span style="color:var(--accent)">⚠ Need at least 2 valid pairs.</span>'; return; }
  if (pairs.length > 25) pairs.length = 25;

  const showKey = $('#keyCheck').checked;
  const shuffledRight = shuffle(pairs.map(p => p.right));
  const letters = 'ABCDEFGHIJKLMNOPQRSTUVWXY';

  let rowsHtml = pairs.map((p, i) => `
    <tr>
      <td class="mp-col-left"><span class="mp-letters">${i + 1}</span><span class="mp-item-left">${p.left}</span></td>
      <td class="mp-col-mid">——</td>
      <td class="mp-col-right"><span class="mp-letters" style="background:#fef3c7">${letters[i]}</span><span class="mp-item-right">${shuffledRight[i]}</span></td>
    </tr>`).join('');

  let keyHtml = '';
  if (showKey) {
    keyHtml = `<div style="margin-top:16px;background:#f9f9f9;padding:12px;border-radius:6px;border:1px solid #e0e0e0">
      <h3 style="margin:0 0 8px;font-size:.9rem">${t('answerKey')}</h3>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:4px;font-size:.85rem;font-family:monospace">
        ${pairs.map((p, i) => `<div>${i + 1} → ${letters[shuffledRight.indexOf(p.right)]} (${p.right})</div>`).join('')}
      </div>
    </div>`;
  }

  $('#output').innerHTML = `<div class="mp-worksheet">
    <div class="mp-title">Matching Pairs</div>
    <div class="mp-sub">${pairs.length} pairs</div>
    <div class="mp-name">${t('name')}<span></span> ${t('date')}<span></span> ${t('score')}<span></span></div>
    <div class="mp-instructions">${t('instructions')}</div>
    <table class="mp-table">
      <tr><th class="mp-col-left">${t('leftHeader')}</th><th class="mp-col-mid"></th><th class="mp-col-right">${t('rightHeader')}</th></tr>
      ${rowsHtml}
    </table>
  </div>${keyHtml}`;
  $('#status').innerHTML = `<span style="color:var(--success)">✓ Worksheet with ${pairs.length} pairs generated.</span>`;
}

function loadExample() {
  $('#pairsInput').value = examplePairs;
  generateWorksheet();
}

GZ.renderToolPage({
  category: 'fun',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],

    {icon:'📋', href:'/fun/word-search.html', name:'Word Search'},
    {icon:'🎴', href:'/fun/flashcard-maker.html', name:'Flashcard Maker'},
    {icon:'🔢', href:'/fun/math-worksheet-generator.html', name:'Math Worksheet'},
  ]
});
</script>
