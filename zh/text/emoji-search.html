  ['🇬🇷','flags','greece flag'],
  ['🇮🇪','flags','ireland flag'],
];

let currentCat = 'all';
let searchTerm = '';

$('#search').placeholder = t('searchPh');

$('#cats').innerHTML = CATEGORIES.map(c =>
  `<button class="${c.id === 'all' ? 'active' : ''}" data-cat="${c.id}" onclick="setCat('${c.id}',this)">${c.id === 'all' ? '🌐' : ''} ${t(c.key)}</button>`
).join('');

function setCat(cat, btn) {
  currentCat = cat;
  document.querySelectorAll('.es-cats button').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  renderGrid();
}

$('#search').addEventListener('input', e => {
  searchTerm = e.target.value.toLowerCase().trim();
  renderGrid();
});

function renderGrid() {
  let list = EMOJIS;
  if (currentCat !== 'all') list = list.filter(e => e[1] === currentCat);
  if (searchTerm) {
    list = list.filter(e => {
      const combined = (e[0] + ' ' + e[1] + ' ' + e[2]).toLowerCase();
      const terms = searchTerm.split(/\s+/);
      return terms.every(t => combined.includes(t));
    });
  }
  $('#count').textContent = `${list.length} ${t('count')}`;
  const grid = $('#grid');
  if (list.length > 500) list = list.slice(0, 500);
  grid.innerHTML = list.map(e => `<button class="es-emoji" onclick="pickEmoji(this,'${e[0].codePointAt(0).toString(16).toUpperCase()}','${e[0]}')" title="${e[2]}">${e[0]}</button>`).join('');
}

function pickEmoji(btn, code, emoji) {
  copyText(emoji);
  btn.classList.add('copied');
  setTimeout(() => btn.classList.remove('copied'), 600);
  $('#info').style.display = 'flex';
  $('#infoEmoji').textContent = emoji;
  $('#infoDetails').innerHTML = `<div style="font-size:1.2em;margin-bottom:4px">${emoji}</div><div><code>U+${code}</code></div>`;
}

renderGrid();

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'😊', href:'/text/emoji-picker.html', name:'Emoji Picker'},
    {icon:'🔤', href:'/text/unicode-search.html', name:'Unicode Search'},
    {icon:'✨', href:'/text/fancy-text.html', name:'Fancy Text'},
    {icon:'🎨', href:'/text/ascii-art.html', name:'ASCII Art'},
  ]
});
</script>
