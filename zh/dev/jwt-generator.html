<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is a JWT?", "acceptedAnswer": {"@type": "Answer", "text": "JWT (JSON Web Token, RFC 7519) is a compact, URL-safe way to represent claims between two parties. It consists of three Base64URL-encoded parts separated by dots: header.payload.signature. JWTs are commonly used for authentication and information exchange in web APIs."}}, {"@type": "Question", "name": "What's the difference between HS256 and RS256?", "acceptedAnswer": {"@type": "Answer", "text": "HS256 (HMAC-SHA256) is symmetric — the same secret key signs and verifies the token, so both parties must share the secret. RS256 (RSA-SHA256) is asymmetric — a private key signs and a public key verifies, so the verifying party never needs the signing key. RS256 is preferred for distributed systems."}}, {"@type": "Question", "name": "How should I set the expiration (exp)?", "acceptedAnswer": {"@type": "Answer", "text": "The exp claim is a NumericDate — seconds since the Unix epoch (1970-01-01 UTC). Short-lived tokens (5-60 minutes) paired with refresh tokens are best practice. Never use long expirations for access tokens, and always include exp to prevent replay attacks."}}, {"@type": "Question", "name": "Are JWTs encrypted?", "acceptedAnswer": {"@type": "Answer", "text": "No. Standard JWTs (JWS) are signed but not encrypted — anyone who has the token can read its payload by Base64-decoding it. For confidentiality use JWE (JSON Web Encryption), or never put sensitive data in a JWT payload."}}, {"@type": "Question", "name": "Is my secret safe here?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. Signing happens entirely in your browser via the Web Crypto API. Your secret or private key is never uploaded to any server. For real production secrets, prefer generating them in a secure backend."}}]}</script>

<script>

  zh: {

    toolDesc: '使用 HS256 / HS384 / HS512（HMAC）或 RS256（RSA）签名 JSON Web Token。设置声明、过期时间并实时预览编码后的令牌 — 完全在浏览器中运行。',
    algorithm: '算法',
    expIn: '过期时间（exp）',

    privKey: 'RSA 私钥（PEM，用于 RS256）',
    payload: 'Payload（JSON 声明）',
    token: '已签名 JWT',
    generate: '签名生成',
    copy: '复制令牌',
    loadExample: '加载示例',
    clear: '清空',
    jsonErr: '✗ Payload 不是有效的 JSON',
    ok: '✓ 令牌已签名',
    err: '✗ 错误',
    missingSecret: '请提供密钥',
    missingPrivKey: '请提供 PEM 格式的 RSA 私钥',
    step1: '选择算法（HS256 用共享密钥的 HMAC，RS256 用 RSA）',
    step2: '输入密钥或 RSA 私钥，并编辑 JSON payload',
    step3: '点击「签名生成」— JWT 在本地通过 Web Crypto 计算',
    step4: '复制令牌并使用对应的 JWT 调试器验证',
    note: '🔒 签名完全在浏览器中通过 Web Crypto API 完成。你的密钥或私钥永远不会被上传。',
  }
});

document.querySelectorAll('[data-i18n]').forEach(el => el.textContent = GZ.t(el.dataset.i18n));
const { $, copyText, t } = GZ;
$('#note').textContent = t('note');

const enc = new TextEncoder();

function b64url(input) {
  let str;
  if (typeof input === 'string') {
    str = btoa(unescape(encodeURIComponent(input)));
  } else {
    const bytes = new Uint8Array(input);
    let bin = '';
    bytes.forEach(b => bin += String.fromCharCode(b));
    str = btoa(bin);
  }
  return str.replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
}

function pemToArrayBuffer(pem) {
  const b64 = pem.replace(/-----[^-]+-----/g, '').replace(/\s+/g, '');
  const bin = atob(b64);
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  return bytes.buffer;
}

function onAlgChange() {
  const alg = $('#alg').value;
  $('#secretCard').style.display = alg.startsWith('HS') ? '' : 'none';
  $('#privKeyCard').style.display = alg.startsWith('RS') ? '' : 'none';
}

function getPayload() {
  const txt = $('#payload').value.trim();
  const obj = JSON.parse(txt);
  const expIn = +$('#expIn').value;
  if (expIn > 0) obj.exp = Math.floor(Date.now() / 1000) + expIn;
  if (!obj.iat) obj.iat = Math.floor(Date.now() / 1000);
  return obj;
}

async function sign() {
  try {
    const alg = $('#alg').value;
    const payload = getPayload();

    const header = { alg, typ: 'JWT', kid: undefined };
    delete header.kid;
    const headerB64 = b64url(JSON.stringify(header));
    const payloadB64 = b64url(JSON.stringify(payload));
    const signingInput = `${headerB64}.${payloadB64}`;
    const data = enc.encode(signingInput);

    let sig;
    if (alg.startsWith('HS')) {
      const secret = $('#secret').value;
      if (!secret) throw new Error(t('missingSecret'));
      const key = await crypto.subtle.importKey('raw', enc.encode(secret), { name: 'HMAC', hash: { name: `SHA-${alg.slice(2)}` } }, false, ['sign']);
      sig = await crypto.subtle.sign('HMAC', key, data);
    } else if (alg === 'RS256') {
      const pem = $('#privKey').value.trim();
      if (!pem) throw new Error(t('missingPrivKey'));
      const key = await crypto.subtle.importKey('pkcs8', pemToArrayBuffer(pem), { name: 'RSASSA-PKCS1-v1_5', hash: 'SHA-256' }, false, ['sign']);
      sig = await crypto.subtle.sign('RSASSA-PKCS1-v1_5', key, data);
    }

    const sigB64 = b64url(sig);
    const token = `${signingInput}.${sigB64}`;

    $('#tokenHtml').innerHTML = `<span class="tok-h">${headerB64}</span>.<span class="tok-p">${payloadB64}</span>.<span class="tok-s">${sigB64}</span>`;
    window._lastToken = token;
    $('#status').className = 'status ok';
    $('#status').textContent = t('ok');
  } catch(e) {
    if (e instanceof SyntaxError) {
      $('#status').className = 'status err';
      $('#status').textContent = t('jsonErr') + ': ' + e.message;
    } else {
      $('#status').className = 'status err';
      $('#status').textContent = `${t('err')}: ${e.message}`;
    }
  }
}

function loadExample() {
  $('#payload').value = JSON.stringify({
    sub: '1234567890',
    name: 'John Doe',
    role: 'admin',
    iss: 'gamezipper-tools',
    aud: 'api.example.com',
  }, null, 2);
  $('#secret').value = 'my-super-secret-key-2026';
  onAlgChange();
  sign();
}

function clearAll() {
  $('#payload').value = '';
  $('#tokenHtml').textContent = '';
  $('#status').textContent = '';
  window._lastToken = '';
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="sign()">✍️ ${t('generate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="copyText(window._lastToken || '')">📋 ${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">📥 ${t('loadExample')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="clearAll()">🗑 ${t('clear')}</button>`;

loadExample();
