<script>
GZI18n.register({
  en: {
    toolTitle: 'Acronym Generator',
    toolDesc: 'Convert any phrase or sentence into a memorable acronym. Choose from 5 styles — first letter, vowels, consonants, alternating and creative — perfect for project names, brands and writing.',
    lblIn: 'Phrase',
    step1: 'Type or paste any phrase, sentence or product description',
    step2: 'Click any of the 5 style buttons (First Letter, Vowels, Consonants, Alternating, Creative) to switch variant',
    step3: 'The big acronym and source phrase appear at the top, with all variants listed below',
    step4: 'Click the copy button next to any variant to grab it for your project or brand',
  },
  zh: {
    toolTitle: '首字母缩写生成器',
    toolDesc: '将任意短语或句子转换为好记的首字母缩写。提供 5 种风格 — 首字母、仅元音、仅辅音、交替和创意 — 适用于项目名、品牌和写作。',
    lblIn: '短语',
    step1: '输入或粘贴任意短语、句子或产品描述',
    step2: '点击 5 种风格按钮（首字母、元音、辅音、交替、创意）切换变体',
    step3: '顶部显示大字号缩写和源短语，下方列出所有变体',
    step4: '点击变体旁的复制按钮即可用于项目或品牌',
  }
});

const { $, copyText, t } = GZ;
let style = 'first';

function tokenize(text) {
  return text.trim().split(/[\s,;.!?。！？、]+/).filter(w => w.length > 0);
}

function firstLetter(words) {
  return words.map(w => w[0].toUpperCase()).join('');
}

function vowelOnly(words) {
  return words.map(w => {
    const m = w.match(/[aeiouAEIOU]/g);
    return m ? m[0].toUpperCase() : w[0].toUpperCase();
  }).join('');
}

function consonantOnly(words) {
  return words.map(w => {
    const m = w.match(/[bcdfghjklmnpqrstvwxyzBCDFGHJKLMNPQRSTVWXYZ]/g);
    return m ? m[0].toUpperCase() : w[0].toUpperCase();
  }).join('');
}

function alternating(words) {
  // Take first letter, then 2nd letter of next word, etc.
  return words.map((w, i) => {
    if (w.length === 1) return w.toUpperCase();
    const idx = (i % 2 === 0) ? 0 : Math.min(1, w.length - 1);
    return w[idx].toUpperCase();
  }).join('');
}

function creative(words) {
  // Use first letter, but for short words (<4 chars) take a vowel; for long words use first letter
  return words.map(w => {
    if (w.length <= 3) {
      const m = w.match(/[aeiouAEIOU]/g);
      if (m) return m[0].toUpperCase();
    }
    return w[0].toUpperCase();
  }).join('');
}

const STYLES = {
  first: { name: 'First Letter', fn: firstLetter },
  vowel: { name: 'Vowels Only', fn: vowelOnly },
  consonant: { name: 'Consonants Only', fn: consonantOnly },
  alt: { name: 'Alternating', fn: alternating },
  creative: { name: 'Creative', fn: creative },
};

function generate() {
  const inp = $('#input').value.trim();
  const variantsDiv = $('#variants');
  if (!inp) {
    $('#result').style.display = 'none';
    variantsDiv.innerHTML = '';
    return;
  }
  const words = tokenize(inp);
  if (words.length === 0) {
    $('#result').style.display = 'none';
    variantsDiv.innerHTML = '';
    return;
  }
  const main = STYLES[style].fn(words);
  $('#result').style.display = 'block';
  $('#bigResult').textContent = main;
  $('#wordsResult').textContent = words.join(' ');

  variantsDiv.innerHTML = '<div style="font-size:.85rem;color:var(--text2);margin-bottom:8px;font-weight:700">All Variants</div>' +
    Object.entries(STYLES).map(([k, s]) => {
      const acr = s.fn(words);
      return `<div class="ag-var">
        <div class="a">${acr}</div>
        <div class="b">${s.name}</div>
        <button onclick="copyText('${acr.replace(/'/g, "\\'")}')">📋 Copy</button>
      </div>`;
    }).join('');
}

document.querySelectorAll('.ag-mode-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.ag-mode-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    style = btn.dataset.style;
    generate();
  });
});

$('#input').addEventListener('input', generate);

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="copyText($('#bigResult').textContent)">${t('copy')} Main</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#input').value='';generate()">${t('clear')}</button>`;

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],

    {icon:'✨', href:'/text/fancy-text.html', name:'Fancy Text'},
    {icon:'🔗', href:'/text/slug.html', name:'Slug Generator'},
    {icon:'🙃', href:'/text/flip-text.html', name:'Flip Text'},
  ]
});
</script>
