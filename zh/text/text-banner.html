const { $, copyText, t } = GZ;

// Built-in 5-row block font. Each char -> array of 5 strings (5 wide).
const FONT = {
'A':[' ███ ','█   █','█████','█   █','█   █'],
'B':['████ ','█   █','████ ','█   █','████ '],
'C':[' ████','█    ','█    ','█    ',' ████'],

'G':[' ███ ','█    ','█ ███','█   █',' ███ '],
'H':['█   █','█   █','█████','█   █','█   █'],
'I':['█████','  █  ','  █  ','  █  ','█████'],
'J':[' ████','   █ ','   █ ','█  █ ',' ██  '],
'K':['█   █','█  █ ','███  ','█  █ ','█   █'],

'P':['████ ','█   █','████ ','█    ','█    '],
'Q':[' ███ ','█   █','█   █','█ ███',' ████'],
'R':['████ ','█   █','████ ','█  █ ','█   █'],
'S':[' ████','█    ',' ███ ','    █','████ '],
'T':['█████','  █  ','  █  ','  █  ','  █  '],
'U':['█   █','█   █','█   █','█   █',' ███ '],
'V':['█   █','█   █','█   █',' █ █ ','  █  '],
'W':['█   █','█   █','█ █ █','██ ██','█   █'],
'X':['█   █',' █ █ ','  █  ',' █ █ ','█   █'],
'Y':['█   █',' █ █ ','  █  ','  █  ','  █  '],
'Z':['█████','   █ ','  █  ',' █   ','█████'],
'0':[' ███ ','█   █','█   █','█   █',' ███ '],
'1':['  █  ',' ██  ','  █  ','  █  ','█████'],

'6':[' ███ ','█    ','████ ','█   █',' ███ '],
'7':['█████','    █','   █ ','  █  ',' █   '],
'8':[' ███ ','█   █',' ███ ','█   █',' ███ '],
'9':[' ███ ','█   █',' ████','    █',' ███ '],
' ':['     ','     ','     ','     ','     '],
'!':['  █  ','  █  ','  █  ','     ','  █  '],
'?':[' ███ ','█   █','   █ ','     ','  █  '],
'.':['     ','     ','     ','     ','  █  '],
',':['     ','     ','     ','     ',' █   '],
'-':['     ','     ','█████','     ','     '],
'+':['     ','  █  ','█████','  █  ','     '],

'/':['    █','   █ ','  █  ',' █   ','█    '],
'\\':['█    ',' █   ','  █  ','   █ ','    █'],
'(':['   █ ','  █  ','  █  ','  █  ','   █ '],
')':[' █   ','  █  ','  █  ','  █  ',' █   '],
'[':[' ██  ',' █   ',' █   ',' █   ',' ██  '],
']':[' ██  ','  █  ','  █  ','  █  ',' ██  '],
'<':['   █ ','  █  ',' █   ','  █  ','   █ '],
'>':[' █   ','  █  ','   █ ','  █  ',' █   '],
'_':['     ','     ','     ','     ','█████'],
};

let fillKey = 'block', gap = 1;

$('#form').innerHTML = `
  <div><label>${t('lblText')}</label><input type="text" id="i-text" placeholder="${t('ph')}" value="GAMEZIPPER" oninput="render()"></div>
  <div class="gz-row">
    <div><label>${t('lblStyle')}</label>
      <select id="i-style" onchange="fillKey=this.value;render()">
        <option value="block">${t('stBlock')}</option>
        <option value="dark">${t('stDark')}</option>
        <option value="medium">${t('stMedium')}</option>
        <option value="light">${t('stLight')}</option>
      </select>
    </div>
    <div><label>${t('lblGap')}</label>
      <select id="i-gap" onchange="gap=+this.value;render()">
        <option value="0">0</option>
        <option value="1" selected>1</option>
        <option value="2">2</option>
        <option value="3">3</option>
      </select>
    </div>
  </div>
`;

function outlineRows(rows){
  // (legacy) kept as no-op stub; superseded by the fill-character selector.
  return rows;
}

function render(){
  const FILL = { block:'█', dark:'▓', medium:'▒', light:'░' };
  const fill = FILL[fillKey] || '█';
  const raw = $('#i-text').value || '';
  const text = raw.toUpperCase();
  const sep = ' '.repeat(gap);
  const lines = ['','','','',''];
  for(let i=0;i<text.length;i++){
    const ch = text[i];
    let glyph = FONT[ch];
    if(!glyph){ // unknown char: render literally as a single-cell column
      glyph = ['     ','  █  ','  █  ','  █  ','     '];
    }
    for(let r=0;r<5;r++){ lines[r] += (i>0?sep:'') + glyph[r].replace(/█/g, fill); }
  }
  const out = $('#output');
  out.textContent = lines.join('\n');
}

function loadExample(){
  $('#i-text').value='HELLO';
  render();
}
function doClear(){ $('#i-text').value=''; render(); }

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

render();
