<body>
<div class="gz-container">
  <div class="gz-tool-header">

  <div class="gz-tool-area">

    <div class="bng-form">
      <label><span data-i18n="lblKeyword"></span><input type="text" id="keyword" placeholder="lumi, nova, swift..."></label>

          <option value="kids">Kids / Family</option>
          <option value="travel">Travel / Lifestyle</option>
        </select>
      </label>
    </div>
    <div class="bng-pills" id="styles"></div>
    <div class="bng-results" id="results"></div>

  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Brand Name Generator',
    toolDesc: 'Find a unique, memorable brand name in seconds. Pick a style and industry, type an optional keyword, and get 30+ name ideas to copy and check.',
    lblKeyword: 'Keyword (optional)',
    lblIndustry: 'Industry',
    indAny: 'Any industry',
    styleModern: '⚡ Modern',
    styleCatchy: '🎯 Catchy',
    styleMadeUp: '✨ Made-up',
    stylePortmanteau: '🔀 Portmanteau',
    styleCompound: '🧱 Compound',
    styleClassic: '🏆 Classic',
    btnGenerate: 'Generate names',
    styleTag: 'style',
    emptyHint: 'Press Generate to see brand name ideas →',
    step1: 'Optionally type a keyword that reflects your product or vibe',
    step2: 'Pick the industry and naming style you want',
    step3: 'Click Generate to get 30+ unique brand name ideas',
    step4: 'Click any name to copy it, then check the .com and trademark availability',
  },
  zh: {
    toolTitle: '品牌名称生成器',
    toolDesc: '几秒内找到一个独特、好记的品牌名。选择风格和行业，可选输入关键词，即可获得 30+ 个可复制和查询的品牌名灵感。',
    lblKeyword: '关键词（可选）',
    lblIndustry: '行业',
    indAny: '任意行业',
    styleModern: '⚡ 现代',
    styleCatchy: '🎯 朗朗上口',
    styleMadeUp: '✨ 自创',
    stylePortmanteau: '🔀 合成词',
    styleCompound: '🧱 复合',
    styleClassic: '🏆 经典',
    btnGenerate: '生成名称',
    styleTag: '风格',
    emptyHint: '点击「生成名称」查看品牌名灵感 →',
    step1: '可选：输入一个反映你产品或调性的关键词',
    step2: '选择行业和命名风格',
    step3: '点击「生成名称」获取 30+ 个独特品牌名',
    step4: '点击任一名称复制，然后查询 .com 域名和商标是否可用',
  }
});

const { $, copyText, t, showToast } = GZ;

const DATA = {
  prefixes: ['lumi','nova','vivid','zen','apex','echo','flux','aura','vero','sage','lyra','orin','kova','nori','pip','quill','mint','solo','vibe','wisp','halo','juno','rivo','cove','mere','fenn','tova','umbr','vest','yarn','zylo'],
  suffixes: ['ly','ify','io','lab','hub','nest','works','wave','forge','craft','sphere','loop','port','yard','field','pulse','spark','glow','bloom','shore','way','lane','den','hive','roost','point','arc','beam'],
  vowels: ['a','e','i','o','u'],
  tech: ['byte','sync','node','grid','stack','pixel','cloud','loop','cyber','data','bot','net','smart','core','shift'],
  fashion: ['velvet','linen','silk','bloom','rose','glow','lace','amber','coco','mauve','blush','noir','aura'],
  food: ['crumb','spice','harvest','oat','crisp','honey','berry','sprout','maple','saffron','cocoa','olive'],
  health: ['pure','vital','bloom','calm','root','leaf','zen','flow','breath','glow','well','rise'],
  finance: ['vault','mint','ledger','summit','crest','merit','anchor','trust','yield','penny','equity'],
  edu: ['scholar','scribe','lumen','tutor','spark','quest','brain','wit','clever','study','mind'],
  eco: ['leaf','verd','green','sprout','earth','bloom','meadow','grove','willow','moss','fern'],
  kids: ['pip','cub','sprout','bean','tot','pop','tiny','mini','joey','cub','fox','owl'],
  travel: ['wander','cove','drift','compass','passport','vista','roam','trail','escape','globe','haven']
};

const STYLE_KEYS = ['modern','catchy','madeUp','portmanteau','compound','classic'];
let style = 'modern';

const cap = s => s.charAt(0).toUpperCase() + s.slice(1);
const pick = arr => arr[Math.floor(Math.random() * arr.length)];

function makeNames(keyword, industry, styleName, count = 30) {
  const kw = (keyword || '').toLowerCase().replace(/[^a-z]/g, '');
  const pool = industry !== 'any' && DATA[industry] ? DATA[industry] : [];
  const base = kw || (pool.length ? pick(pool) : pick(DATA.prefixes));
  const out = new Set();
  let guard = 0;
  while (out.size < count && guard < count * 8) {
    guard++;
    let name = '';
    switch (styleName) {
      case 'modern':
        name = base + pick(['','.'+pick(DATA.suffixes)]).replace('.','') || base + pick(['io','ly','xr','va','os']);
        if (Math.random() < .5) name = (kw ? kw : pick(DATA.prefixes)) + pick(['io','ly','xr','va','os','ai','hq','up']);
        else name = pick(DATA.prefixes) + (kw ? kw : '');
        break;
      case 'catchy':
        const c = 'bcdfghjklmnprstvwz'.split('');
        name = pick(c) + base.slice(0, 2) + (Math.random()<.5 ? 'o' : 'y') + base.slice(0,2);
        break;
      case 'madeUp':
        const len = 4 + Math.floor(Math.random()*3);
        name = '';
        for (let i=0;i<len;i++) name += (i%2===0) ? pick('bcdfghjklmnprstvwz'.split('')) : pick(DATA.vowels);
        break;
      case 'portmanteau':
        const a = kw || pick(pool.length?pool:DATA.prefixes);
        const b = pick(DATA.suffixes);
        name = a.slice(0, Math.ceil(a.length*0.6)) + b.slice(Math.floor(b.length*0.3));
        break;
      case 'compound':
        name = (kw || pick(DATA.prefixes)) + cap(pick(DATA.suffixes));
        break;
      case 'classic':
        name = (kw || pick(pool.length?pool:DATA.prefixes)) + pick(['ify','ly','io','works','labs','co','studio','andco']);
        break;
    }
    name = name.replace(/[^a-zA-Z]/g,'').toLowerCase();
    if (name.length >= 4 && name.length <= 12) out.add(name);
  }
  return [...out];
}

function render() {
  const kw = $('#keyword').value.trim();
  const ind = $('#industry').value;
  const names = makeNames(kw, ind, style, 30);
  if (!names.length) {
    $('#results').innerHTML = `<div class="bng-empty">${t('emptyHint')}</div>`;
    return;
  }
  $('#results').innerHTML = names.map((n, i) => `
    <div class="bng-card" data-name="${n}" title="Click to copy ${n}">
      <div class="nm">${cap(n)}</div>
      <div class="st">${t('styleTag')}: ${t('style' + style.charAt(0).toUpperCase() + style.slice(1))}</div>
    </div>`).join('');
}

$('#styles').innerHTML = STYLE_KEYS.map((s, i) => `<button class="bng-pill${i === 0 ? ' active' : ''}" data-style="${s}">${t('style' + s.charAt(0).toUpperCase() + s.slice(1))}</button>`).join('');
$('#styles').addEventListener('click', e => {
  const btn = e.target.closest('.bng-pill'); if (!btn) return;
  document.querySelectorAll('.bng-pill').forEach(b => b.classList.remove('active'));
  btn.classList.add('active'); style = btn.dataset.style; render();
});

$('#results').addEventListener('click', e => {
  const card = e.target.closest('.bng-card'); if (!card) return;
  copyText(card.dataset.name);
  showToast('✓ ' + card.dataset.name);
});

$('#toolbar').innerHTML = `<button class="gz-btn" id="btn-gen">${t('btnGenerate')}</button>`;
$('#btn-gen').onclick = render;
$('#keyword').addEventListener('input', () => { if ($('#keyword').value.length > 1) render(); });

render();

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1', 'step2', 'step3', 'step4'],
  related: [
    {icon:'💼', href:'/text/business-name-generator.html', name:'Business Name'},
    {icon:'📱', href:'/text/app-name-generator.html', name:'App Name'},
    {icon:'🆔', href:'/text/username-generator.html', name:'Username'},
    {icon:'🌐', href:'/dev/domain-name-generator.html', name:'Domain Name'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
