<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is CSS specificity?", "acceptedAnswer": {"@type": "Answer", "text": "CSS specificity is the algorithm browsers use to determine which CSS rule wins when multiple rules target the same element. It's calculated as a 4-part score: inline styles, IDs, classes/attributes/pseudo-classes, and elements/pseudo-elements."}}, {"@type": "Question", "name": "How is CSS specificity calculated?", "acceptedAnswer": {"@type": "Answer", "text": "Specificity is expressed as (a, b, c, d) where a = inline styles, b = IDs, c = classes/attributes/pseudo-classes, d = elements/pseudo-elements. The !important rule overrides all normal specificity. The higher tuple wins (compared left to right)."}, {"@type": "Question", "name": "Why is !important bad practice?", "acceptedAnswer": {"@type": "Answer", "text": "!important breaks the natural cascade and makes CSS hard to maintain. Use it sparingly, only for utility classes or third-party overrides. The specificity calculator shows the score without !important, which can then override almost anything."}}, {"@type": "Question", "name": "Can I compare multiple selectors?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. Paste multiple selectors (one per line) and the tool calculates the specificity for each. The highest score is highlighted, and you can sort the results to see the winning selector at a glance."}}]}</script>

  zh: {

    toolDesc: '计算任意 CSS 选择器的优先级，视觉化分解 ID、类和类型选择器。',
    lblInput: '粘贴你的 CSS 选择器（每行一个）：',
    btnCalc: '计算', btnClear: '清空', btnSort: '按分数排序',
    high: '高', med: '中', low: '低',
    step1: '将一个或多个 CSS 选择器粘贴到输入框（每行一个）',
    step2: '点击「计算」查看优先级分数和视觉化分解',
    step3: '使用「排序」按分数从高到低排列选择器',
    step4: '当多个选择器作用于同一元素时，分数最高的胜出',
  }
});

const { $, t } = GZ;

function calculateSpecificity(selector) {
  // Strip pseudo-elements like ::before, ::after
  let sel = selector.trim();
  if (!sel) return null;
  // Remove pseudo-elements from count (counted as type)
  // Count !important (don't affect score, just flag)
  let hasImportant = /!important/i.test(sel);
  sel = sel.replace(/!important/gi, '').trim();
  // IDs
  const ids = (sel.match(/#[\w-]+/g) || []).length;
  // Classes, attributes, pseudo-classes (not pseudo-elements)
  const classes = (sel.match(/\.[\w-]+/g) || []).length;
  const attrs = (sel.match(/\[[^\]]+\]/g) || []).length;
  const pseudoClasses = (sel.match(/:(?!:)[a-z-]+(\([^)]*\))?/gi) || []).length;
  // Types and pseudo-elements
  const types = (sel.match(/\b[a-z]+\b/gi) || []).length - ids - classes;
  const pseudoElements = (sel.match(/::[a-z-]+/gi) || []).length;
  // Also need to subtract attr/pseudo content words
  // The word count above includes 'type' words inside brackets, so adjust
  // We have to recalculate types more carefully
  // First remove IDs, classes, attrs, pseudo classes, pseudo elements
  let stripped = sel
    .replace(/#[\w-]+/g, '')
    .replace(/\.[\w-]+/g, '')
    .replace(/\[[^\]]+\]/g, '')
    .replace(/:{1,2}[a-z-]+(\([^)]*\))?/gi, '')
    .replace(/[>+~,\s]+/g, ' ');
  const typesCount = (stripped.match(/[a-z]+/gi) || []).length;
  // Universal selector and combinators don't count
  // The 'not', 'is', 'where' pseudo-classes take the highest specificity of their arguments - simplified here
  const total = [0, ids, classes + attrs + pseudoClasses, typesCount + pseudoElements];
  // Score for sorting: simple weighted
  const score = total[1] * 10000 + total[2] * 100 + total[3];
  return {selector, ids, classes: classes + attrs + pseudoClasses, types: typesCount + pseudoElements, total, score, hasImportant};
}

function highlightSelector(sel) {
  return sel
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/(#[\w-]+)/g, '<span class="id">$1</span>')
    .replace(/(\.[\w-]+)/g, '<span class="cls">$1</span>')
    .replace(/(\b[a-z]+\b)(?![^<>]*>)/g, '<span class="tag">$1</span>');
}

function rank(s) {
  if (s >= 100) return {label:'high', text: t('high')};
  if (s >= 10) return {label:'med', text: t('med')};
  return {label:'low', text: t('low')};
}

function renderResults(results) {
  const maxScore = Math.max(...results.map(r=>r.score), 1);
  const html = results.map(r => {
    const rk = rank(r.score);
    return `<div class="sp-result">
      <div class="sp-selector">${highlightSelector(r.selector)}</div>
      <div class="sp-col sp-hide-mobile">0</div>
      <div class="sp-col sp-hide-mobile">${r.ids}<div class="sp-bar"><div style="width:${Math.min(100, r.ids*30)}%"></div></div></div>
      <div class="sp-col sp-hide-mobile">${r.classes}<div class="sp-bar"><div style="width:${Math.min(100, r.classes*15)}%"></div></div></div>
      <div class="sp-col sp-hide-mobile">${r.types}<div class="sp-bar"><div style="width:${Math.min(100, r.types*8)}%"></div></div></div>
      <div class="sp-score" title="(${r.total.join(',')})">${r.score}</div>
    </div>`;
  }).join('');
  $('#results').innerHTML = html;
}

function calc() {
  const lines = $('#input').value.split('\n').map(s=>s.trim()).filter(Boolean);
  const results = lines.map(calculateSpecificity).filter(Boolean);
  renderResults(results);
}

function sortResults() {
  const lines = $('#input').value.split('\n').map(s=>s.trim()).filter(Boolean);
  const results = lines.map(calculateSpecificity).filter(Boolean);
  results.sort((a,b) => b.score - a.score);
  renderResults(results);
}

$('#input').addEventListener('input', calc);
$('#btn-calc').addEventListener('click', calc);
$('#btn-clear').addEventListener('click', () => { $('#input').value = ''; $('#results').innerHTML = ''; });
$('#btn-sort').addEventListener('click', sortResults);
$('#btn-calc').textContent = t('btnCalc');
$('#btn-clear').textContent = t('btnClear');
$('#btn-sort').textContent = t('btnSort');

document.querySelectorAll('.sp-ex').forEach(b => {
  b.addEventListener('click', () => {
    $('#input').value = b.dataset.sel;
    calc();
  });
});
