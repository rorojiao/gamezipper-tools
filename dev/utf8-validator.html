    step2: '工具即时验证 UTF-8 编码',
    step3: '查看状态行了解有效性和 BOM 检测',

const { $, copyText, t } = GZ;
let mode = 'text';

function hexToBytes(hex) {
  return hex.trim().split(/[\s,]+/).filter(Boolean).map(h => {
    const n = parseInt(h, 16);
    return isNaN(n) ? null : n;
  });
}

function decodeUtf8(bytes) {
  // Returns array of {char, cp, byteLen, bytes[], valid, error}
  const result = [];
  let i = 0;
  while (i < bytes.length) {
    const b = bytes[i];
    let byteLen, cp, minCp;
    if (b < 0x80) { byteLen = 1; cp = b; minCp = 0; }
    else if ((b & 0xE0) === 0xC0) { byteLen = 2; cp = b & 0x1F; minCp = 0x80; }
    else if ((b & 0xF0) === 0xE0) { byteLen = 3; cp = b & 0x0F; minCp = 0x800; }
    else if ((b & 0xF8) === 0xF0) { byteLen = 4; cp = b & 0x07; minCp = 0x10000; }
    else { result.push({valid:false, error:t('invalidByte'), byte:b, bytes:[b]}); i++; continue; }

    const seq = bytes.slice(i, i + byteLen);
    let valid = true, error = '';
    if (i + byteLen > bytes.length) { valid = false; error = 'Truncated sequence'; }
    else {
      for (let j = 1; j < byteLen; j++) {
        if ((bytes[i+j] & 0xC0) !== 0x80) { valid = false; error = t('invalidByte'); break; }
        cp = (cp << 6) | (bytes[i+j] & 0x3F);
      }
      if (valid && cp < minCp) { valid = false; error = t('overlong'); }
      if (valid && cp > 0x10FFFF) { valid = false; error = 'Codepoint too large'; }
      if (valid && cp >= 0xD800 && cp <= 0xDFFF) { valid = false; error = 'Surrogate codepoint'; }
    }

    if (valid) {
      result.push({valid:true, char:String.fromCodePoint(cp), cp, byteLen, bytes:seq});
    } else {
      result.push({valid:false, error, byte:b, bytes:seq});
    }
    i += byteLen;
  }
  return result;
}

function validate() {
  const inp = $('#input').value;
  const status = $('#status');
  const output = $('#output');
  const bytebreak = $('#bytebreak');

  if (!inp.trim()) {
    status.innerHTML = '';
    output.textContent = '';
    bytebreak.innerHTML = '';
    return;
  }

  let bytes;
  if (mode === 'hex') {
    const parsed = hexToBytes(inp);
    if (parsed.some(b => b === null)) {
      status.innerHTML = `<span class="status-err">${t('invalid')}: invalid hex input</span>`;
      output.textContent = '';
      bytebreak.innerHTML = '';
      return;
    }
    bytes = parsed;
  } else {
    bytes = Array.from(new TextEncoder().encode(inp));
  }

  const decoded = mode === 'hex' ? decodeUtf8(bytes) : [...inp].map(ch => {
    const cp = ch.codePointAt(0);
    const enc = Array.from(new TextEncoder().encode(ch));
    return {valid:true, char:ch, cp, byteLen:enc.length, bytes:enc};
  });

  const allValid = decoded.every(d => d.valid);
  const hasBOM = bytes.length >= 3 && bytes[0]===0xEF && bytes[1]===0xBB && bytes[2]===0xBF;
  const validChars = decoded.filter(d => d.valid);

  status.innerHTML = `
    <span class="${allValid?'status-ok':'status-err'}" style="font-weight:700">${allValid?t('valid'):t('invalid')}</span>
    &nbsp;|&nbsp; ${hasBOM ? `<span style="color:var(--gz-accent,#e94560)">${t('hasBOM')}</span>` : t('noBOM')}
    &nbsp;|&nbsp; ${t('charCount')}: ${validChars.length}
    &nbsp;|&nbsp; ${t('byteCount')}: ${bytes.length}
  `;

  output.textContent = validChars.map(d => d.char).join('');

  // Byte breakdown table
  let html = '<table class="byte-table"><thead><tr><th>#</th><th>'+t('colChar')+'</th><th>'+t('colCodepoint')+'</th><th>'+t('colBytes')+'</th><th>'+t('colDec')+'</th></tr></thead><tbody>';
  decoded.slice(0, 500).forEach((d, idx) => {
    const hex = d.bytes.map(b => b.toString(16).toUpperCase().padStart(2,'0')).join(' ');
    if (d.valid) {
      const cpHex = 'U+' + d.cp.toString(16).toUpperCase().padStart(d.cp > 0xFFFF ? 6 : 4, '0');
      const esc = d.char.replace(/</g,'&lt;').replace(/>/g,'&gt;');
      html += `<tr><td>${idx+1}</td><td class="char-cell">${esc || '&nbsp;'}</td><td>${cpHex}</td><td>${hex}</td><td>${d.cp}</td></tr>`;
    } else {
      html += `<tr style="background:rgba(233,69,96,.1)"><td>${idx+1}</td><td class="char-cell" style="color:var(--gz-accent,#e94560)">✗</td><td colspan="3" style="color:var(--gz-accent,#e94560)">${d.error}: ${hex}</td></tr>`;
    }
  });
  if (decoded.length > 500) html += `<tr><td colspan="5" style="text-align:center;color:var(--text3)">… ${decoded.length - 500} more</td></tr>`;
  html += '</tbody></table>';
  bytebreak.innerHTML = html;
}

$('#input').addEventListener('input', validate);

$('#toolbar').innerHTML = `
  <button class="gz-btn" id="mode-btn" onclick="toggleMode()">${t('modeHex')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#input').value='';validate()">${t('clear')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>`;

function toggleMode() {
  mode = mode === 'text' ? 'hex' : 'text';
  $('#mode-btn').textContent = mode === 'text' ? t('modeHex') : t('modeText');
  validate();
}
window.toggleMode = toggleMode;

function loadExample() {
  if (mode === 'hex') {
    $('#input').value = '48 65 6C 6C 6F 20 F0 9F 8C 8E';
  } else {
    $('#input').value = 'Hello 🌐 — UTF-8 世界';
  }
  validate();
}
window.loadExample = loadExample;

validate();
