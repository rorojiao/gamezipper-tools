.mulch-info{background:var(--glass);border-left:3px solid var(--accent);padding:10px 14px;border-radius:6px;font-size:.85em;color:var(--text2);margin-top:8px}

<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "How deep should mulch be applied?", "acceptedAnswer": {"@type": "Answer", "text": "For flower beds, apply 2-3 inches (5-7 cm) of mulch. For trees and shrubs, 3-4 inches (7-10 cm) is ideal. Avoid piling mulch against tree trunks (the 'mulch volcano' effect) — leave 2-3 inches of space around the base. For vegetable gardens, 1-2 inches is usually enough."}}, {"@type": "Question", "name": "How much mulch do I need per square foot?", "acceptedAnswer": {"@type": "Answer", "text": "One cubic yard of mulch covers about 162 square feet at 2 inches deep, or 108 square feet at 3 inches deep. One cubic foot covers about 12 square feet at 1 inch, 6 square feet at 2 inches, or 4 square feet at 3 inches."}}, {"@type": "Question", "name": "How many bags equal a cubic yard?", "acceptedAnswer": {"@type": "Answer", "text": "A standard 2 cubic foot bag covers about 24 square feet at 1 inch deep. There are 13.5 bags of 2 cu ft in a cubic yard. Larger 3 cu ft bags are also common (9 per yard). Bulk delivery is usually cheaper when you need more than 2-3 cubic yards."}}, {"@type": "Question", "name": "What is the difference between mulch, compost, and soil?", "acceptedAnswer": {"@type": "Answer", "text": "Mulch is a top layer (wood chips, bark, straw) used to retain moisture and suppress weeds. Compost is decomposed organic matter added to soil to improve fertility. Topsoil is the upper layer of native soil. Each serves a different purpose in gardening and landscaping."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <label style="font-size:.85em;color:var(--text2);font-weight:600" id="lbl-unit"></label>
    <div class="mulch-tabs" id="unit">
      <button data-unit="imperial" class="active">Imperial (ft, yd³)</button>
      <button data-unit="metric">Metric (m, m³)</button>
    </div>
    <div class="mulch-section">
      <h3 id="lbl-area"></h3>
      <div class="mulch-row">
        <label><span id="lbl-len"></span><input type="number" id="len" min="0" step="1" value="20" oninput="calc()"></label>
        <label><span id="lbl-wid"></span><input type="number" id="wid" min="0" step="1" value="10" oninput="calc()"></label>
      </div>
    </div>
    <div class="mulch-section">
      <h3 id="lbl-depth"></h3>
      <div class="mulch-row">
        <label><span id="lbl-depthI"></span><input type="number" id="depth" min="0" step="0.5" value="3" oninput="calc()"></label>
        <div>
          <span id="lbl-presets" style="font-size:.85em;color:var(--text2);font-weight:600"></span>
          <div class="mulch-presets" id="presets"></div>
        </div>
      </div>
    </div>
    <div class="mulch-section">
      <h3 id="lbl-pricing">Pricing (optional)</h3>
      <div class="mulch-cost-row">
        <label><span id="lbl-costUnit"></span><input type="number" id="costPerUnit" min="0" step="0.5" value="35" oninput="calc()"></label>
        <label><span id="lbl-bagSize"></span>
          <select id="bagSize" onchange="calc()">
            <option value="2">2 cu ft (small bag)</option>
            <option value="3" selected>3 cu ft (standard bag)</option>
            <option value="1.5">1.5 cu ft (compressed)</option>
            <option value="0">No bags (bulk only)</option>
          </select>
        </label>
      </div>
    </div>
    <div class="mulch-results" id="results"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Mulch Calculator',
    toolDesc: 'Estimate how much mulch, soil, compost, or gravel you need for any garden bed. Enter area and depth to get cubic yards, cubic feet, and bag counts instantly.',
    lblUnit: 'Units',
    lblArea: 'Garden Bed Area',
    lblLen: 'Length (ft/m)',
    lblWid: 'Width (ft/m)',
    lblDepth: 'Depth',
    lblDepthI: 'Depth (inches / cm)',
    lblPresets: 'Common depths',
    lblCostUnit: 'Cost per yd³ / m³ ($)',
    lblBagSize: 'Bag size (cu ft)',
    lblPricing: 'Pricing & Bags',
    volNeeded: 'Volume Needed',
    inCuYd: 'Cubic Yards',
    inCuFt: 'Cubic Feet',
    bagsNeeded: 'Bags (2 cu ft)',
    estimatedCost: 'Estimated Cost',
    depthShallow: '1\" (shallow)',
    depthStandard: '2\" (standard)',
    depthDeep: '3\" (deep)',
    depthHeavy: '4\" (heavy)',
    step1: 'Select your preferred unit system (Imperial or Metric)',
    step2: 'Enter the length and width of your garden bed',
    step3: 'Set the depth — most flower beds need 2-3 inches (5-7 cm)',
    step4: 'Optionally enter cost per yard to see the total price',
  },
  zh: {
    toolTitle: '覆盖物用量计算器',
    toolDesc: '估算花园苗床所需的覆盖物、土壤、堆肥或砾石数量。输入面积和深度,即时获得立方米、立方英尺和袋数。',
    lblUnit: '单位',
    lblArea: '苗床面积',
    lblLen: '长度 (米/英尺)',
    lblWid: '宽度 (米/英尺)',
    lblDepth: '深度',
    lblDepthI: '深度 (厘米/英寸)',
    lblPresets: '常用深度',
    lblCostUnit: '单价 (元/m³ 或 yd³)',
    lblBagSize: '袋装规格 (cu ft)',
    lblPricing: '费用与袋装',
    volNeeded: '需要体积',
    inCuYd: '立方码',
    inCuFt: '立方英尺',
    bagsNeeded: '袋数',
    estimatedCost: '预估费用',
    depthShallow: '2.5 cm (浅)',
    depthStandard: '5 cm (标准)',
    depthDeep: '7.5 cm (深)',
    depthHeavy: '10 cm (厚重)',
    step1: '选择单位制(英制或公制)',
    step2: '输入苗床的长度和宽度',
    step3: '设置深度(花圃通常 5-7 cm)',
    step4: '可输入单价查看总费用',
  }
});

const { $, t } = GZ;
let unit = 'imperial';

const depthPresets = {
  imperial: [
    {name:'1\" shallow', v:1},
    {name:'2\" standard', v:2},
    {name:'3\" deep', v:3},
    {name:'4\" heavy', v:4},
  ],
  metric: [
    {name:'2.5 cm 浅', v:2.5},
    {name:'5 cm 标准', v:5},
    {name:'7.5 cm 深', v:7.5},
    {name:'10 cm 厚重', v:10},
  ]
};

function renderPresets() {
  $('#presets').innerHTML = depthPresets[unit].map((p, i) => `<button data-i="${i}">${p.name}</button>`).join('');
  document.querySelectorAll('#presets button').forEach(btn => {
    btn.addEventListener('click', () => {
      $('#depth').value = depthPresets[unit][+btn.dataset.i].v;
      calc();
    });
  });
}

function calc() {
  const L = parseFloat($('#len').value) || 0;
  const W = parseFloat($('#wid').value) || 0;
  const D = parseFloat($('#depth').value) || 0;
  const cost = parseFloat($('#costPerUnit').value) || 0;
  const bagSize = parseFloat($('#bagSize').value) || 0;

  let cuFt, cuYd, bags = 0, totalCost = 0;
  if (unit === 'imperial') {
    // area in ft² × depth in inches / 12 = cubic feet
    cuFt = (L * W * D) / 12;
    cuYd = cuFt / 27;
  } else {
    // area in m² × depth in cm / 100 = cubic meters
    const cuM = (L * W * D) / 100;
    cuFt = cuM * 35.31;
    cuYd = cuM * 1.308;
  }
  if (bagSize > 0) bags = Math.ceil(cuFt / bagSize);
  totalCost = unit === 'imperial' ? cuYd * cost : (cuFt / 35.31) * cost;

  const primaryUnit = unit === 'imperial' ? 'yd³' : 'm³';
  const primary = unit === 'imperial' ? cuYd : (cuFt / 35.31);

  $('#results').innerHTML = `
    <div class="mulch-card primary"><div class="value">${primary.toFixed(2)} ${primaryUnit}</div><div class="label">${t('volNeeded')}</div></div>
    <div class="mulch-card"><div class="value">${cuFt.toFixed(1)} ft³</div><div class="label">${t('inCuFt')}</div></div>
    ${bagSize > 0 ? `<div class="mulch-card"><div class="value">${bags}</div><div class="label">${t('bagsNeeded')}</div></div>` : ''}
    <div class="mulch-card"><div class="value">$${totalCost.toFixed(0)}</div><div class="label">${t('estimatedCost')}</div></div>`;
}

function changeUnit(u, btn) {
  unit = u;
  document.querySelectorAll('#unit button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  // Update defaults
  if (u === 'metric') {
    $('#len').value = 6; $('#wid').value = 3; $('#depth').value = 5;
  } else {
    $('#len').value = 20; $('#wid').value = 10; $('#depth').value = 3;
  }
  renderPresets();
  calc();
}

document.querySelectorAll('#unit button').forEach(btn => {
  btn.addEventListener('click', () => changeUnit(btn.dataset.unit, btn));
});

$('#toolbar').innerHTML = `
  <button class="gz-btn gz-btn-secondary" onclick="$('#depth').value=2;calc()">2\" / 5 cm</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#depth').value=3;calc()">3\" / 7.5 cm</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#depth').value=4;calc()">4\" / 10 cm</button>`;

renderPresets();
calc();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🧱', href:'/calc/concrete.html', name:'Concrete Calculator'},
    {icon:'🎨', href:'/calc/paint-calculator.html', name:'Paint Calculator'},
    {icon:'🟫', href:'/calc/tile-calculator.html', name:'Tile Calculator'},
    {icon:'📐', href:'/calc/area-calculator.html', name:'Area Calculator'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
