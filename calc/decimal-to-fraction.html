    resultLabel: '分数结果',
    improper: '假分数',
    mixed: '带分数',
    decimalVal: '小数值',
    gcd: '所用最大公约数',
    steps: '化简步骤',
    errInput: '请输入有效的小数。',
    step1: '在输入框中输入小数（如 0.75 或 3.14）',
    step2: '可选：输入永远循环的数字（如 0.333… 输入 3）',
    step3: '点击「转换」得到最简分数和带分数',
    step4: '查看化简步骤了解最大公约数约分过程',
  }
});

const { $, t } = GZ;

function gcdBig(a, b) {
  a = a < 0n ? -a : a; b = b < 0n ? -b : b;
  while (b) { [a, b] = [b, a % b]; }
  return a || 1n;
}

function fmtFrac(num, den) {
  if (den < 0n) { num = -num; den = -den; }
  return `<span class="frac"><span class="num">${num}</span><span class="den">${den}</span></span>`;
}

function convert() {
  const dec = $('#decimal').value.trim();
  const repeatStr = $('#repeat').value.trim();
  if (!dec || isNaN(parseFloat(dec))) {
    $('#result').innerHTML = `<span style="color:var(--accent)">${t('errInput')}</span>`;
    $('#detail').style.display = 'none';
    return;
  }
  const isNeg = parseFloat(dec) < 0;
  const sign = isNeg ? '-' : '';

  let num, den, steps;
  if (repeatStr && /^-?\d*\.?\d*$/.test(dec)) {
    // Repeating decimal: use the algebraic method
    // Let x = dec, with the trailing `repeatStr` repeating.
    // Split into non-repeating decimal part (after the point) and repeating part.
    const absDec = dec.replace('-', '');
    const dotIdx = absDec.indexOf('.');
    const intPart = dotIdx < 0 ? absDec : absDec.slice(0, dotIdx);
    const fracPart = dotIdx < 0 ? '' : absDec.slice(dotIdx + 1);
    const repLen = repeatStr.length;
    const nonRepLen = fracPart.length - repLen;
    const nonRep = fracPart.slice(0, nonRepLen);
    // Build numerator and denominator as BigInt
    const combined = (nonRep + repeatStr) || '0';
    const onlyNonRep = nonRep || '0';
    let n = BigInt(combined) - BigInt(onlyNonRep);
    let d = BigInt('9'.repeat(repLen) + '0'.repeat(nonRepLen) || '1');
    if (d === 0n) d = 1n;
    const g = gcdBig(n, d);
    num = n / g; den = d / g;
    steps = [
      `Let x = ${dec} (with "${repeatStr}" repeating)`,
      `Multiply to shift one full repeat cycle, then subtract to cancel the repeating tail.`,
      `Numerator   = ${combined} − ${onlyNonRep} = ${n}`,
      `Denominator = ${'9'.repeat(repLen)}${'0'.repeat(nonRepLen)} = ${d}`,
      `GCD(${n}, ${d}) = ${g}  →  divide both by ${g}`,
      `Fraction = ${sign}${num} / ${den}`,
    ];
  } else {
    // Terminating decimal: shift by 10^(# of decimal places)
    const absDec = dec.replace('-', '');
    const dotIdx = absDec.indexOf('.');
    const places = dotIdx < 0 ? 0 : absDec.length - dotIdx - 1;
    const withoutDot = absDec.replace('.', '');
    let n = BigInt(withoutDot || '0');
    let d = 10n ** BigInt(places);
    if (d === 0n) d = 1n;
    const g = gcdBig(n, d);
    num = n / g; den = d / g;
    steps = [
      `x = ${dec}`,
      places === 0
        ? `${dec} is already a whole number → ${dec}/1`
        : `Multiply top and bottom by 10^${places} = ${d.toString()}:`,
      places === 0 ? '' : `   ${n} / ${d}`,
      `GCD(${n}, ${d}) = ${g}  →  divide both by ${g}`,
      `Fraction = ${sign}${num} / ${den}`,
    ].filter(Boolean);
  }

  // Mixed number
  let mixedHtml = '';
  const whole = num / den;
  const rem = num % den;
  if (whole !== 0n && rem !== 0n) {
    mixedHtml = `<tr><td>${t('mixed')}</td><td>${sign}${whole} ${fmtFrac(rem, den)}</td></tr>`;
  } else if (whole !== 0n && rem === 0n) {
    mixedHtml = `<tr><td>${t('mixed')}</td><td>${sign}${whole}</td></tr>`;
  }

  $('#result').innerHTML = `
    <div style="color:var(--text2);font-size:.8em;margin-bottom:4px">${t('resultLabel')}</div>
    <div class="df-result">${sign}${fmtFrac(num < 0n ? -num : num, den)}</div>
    <table class="df-table">
      <tr><td>${t('improper')}</td><td>${sign}${num < 0n ? -num : num} / ${den}</td></tr>
      ${mixedHtml}
      <tr><td>${t('decimalVal')}</td><td>${dec}</td></tr>
      <tr><td>${t('gcd')}</td><td>${steps.find(s => s.startsWith('GCD'))?.match(/= (\d+)/)?.[1] || '—'}</td></tr>
    </table>`;

  $('#detail').style.display = 'block';
  $('#detail').innerHTML = `<div style="color:var(--text2);font-size:.85em;margin-bottom:6px">${t('steps')}</div><div class="df-detail">${steps.join('\n')}</div>`;
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="convert()">${t('convert')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#decimal').value='0.75';$('#repeat').value='';convert()">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#decimal').value='';$('#repeat').value='';$('#result').innerHTML='';$('#detail').style.display='none'">${t('clear')}</button>`;

$('#decimal').addEventListener('keydown', e => { if (e.key === 'Enter') convert(); });

</script>
