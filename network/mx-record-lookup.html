<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is an MX record?", "acceptedAnswer": {"@type": "Answer", "text": "An MX (Mail Exchange) record specifies the mail server responsible for receiving email for a domain. It includes a priority value (lower = higher priority) and the mail server hostname."}}, {"@type": "Question", "name": "Why would I check MX records?", "acceptedAnswer": {"@type": "Answer", "text": "You check MX records to verify email routing, diagnose mail delivery issues, confirm DNS changes for services like Google Workspace or Microsoft 365, and troubleshoot why emails are not being received."}}, {"@type": "Question", "name": "How do MX record priorities work?", "acceptedAnswer": {"@type": "Answer", "text": "MX records have a priority number. The sending mail server tries the lowest priority number first. If that server is unavailable, it falls back to the next higher priority. This provides redundancy for email delivery."}}, {"@type": "Question", "name": "What does it mean if a domain has no MX records?", "acceptedAnswer": {"@type": "Answer", "text": "If a domain has no MX records, it cannot receive email directly. Some systems fall back to the A record, but most modern mail servers require a valid MX record to deliver mail."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="mx-input-row">
      <input type="text" id="domain" placeholder="gmail.com" spellcheck="false">
      <button class="gz-btn" onclick="doLookup()" id="btn-lookup"></button>

  </div>

<script>
GZI18n.register({
  en: {
    toolTitle: 'MX Record Lookup',
    toolDesc: 'Check MX (mail exchange) records for any domain. Find mail servers, priorities, and diagnose email delivery issues — free, instant, browser-based.',
    btnLookup: 'Lookup MX',
    priority: 'Priority',
    mailServer: 'Mail Server',
    ttl: 'TTL',
    noRecords: 'No MX records found. This domain cannot receive email directly.',
    fetchError: 'Failed to fetch MX records. Please check the domain and try again.',
    loading: 'Looking up MX records...',
    recordsFound: 'records found',
    queryFor: 'MX lookup for',
    step1: 'Enter a domain name (e.g. gmail.com or yourdomain.com)',
    step2: 'Click Lookup MX to query the mail exchange records',
    step3: 'Review the mail server hostnames and their priorities',
    step4: 'Lower priority numbers indicate primary mail servers',
  },
  zh: {
    toolTitle: 'MX 记录查询',
    toolDesc: '查询任意域名的 MX（邮件交换）记录。查找邮件服务器、优先级，诊断邮件投递问题 — 免费、即时、浏览器本地运行。',
    btnLookup: '查询 MX',
    priority: '优先级',
    mailServer: '邮件服务器',
    ttl: 'TTL',
    noRecords: '未找到 MX 记录。该域名无法直接接收邮件。',
    fetchError: '获取 MX 记录失败，请检查域名后重试。',
    loading: '正在查询 MX 记录...',
    recordsFound: '条记录',
    queryFor: 'MX 查询',
    step1: '输入域名（如 gmail.com 或 yourdomain.com）',
    step2: '点击「查询 MX」获取邮件交换记录',
    step3: '查看邮件服务器主机名及其优先级',
    step4: '优先级数字越低，表示主要邮件服务器',
  }
});

const { $, copyText, t } = GZ;

async function doLookup() {
  let domain = $('#domain').value.trim();
  if (!domain) return;
  domain = domain.replace(/^https?:\/\//, '').replace(/\/.*$/, '').replace(/^www\./, '').replace(/^.*@/, '');
  const output = $('#output');
  output.innerHTML = `<div class="mx-loading">${t('loading')}</div>`;

  try {
    const res = await fetch(`https://cloudflare-dns.com/dns-query?name=${encodeURIComponent(domain)}&type=MX`, {
      headers: { 'Accept': 'application/dns-json' }
    });
    const data = await res.json();

    if (!data.Answer || data.Answer.length === 0) {
      output.innerHTML = `<div class="mx-error">${t('noRecords')}</div>`;
      return;
    }

    // MX records: type 15, data format "priority hostname."
    const mxRecords = data.Answer.filter(r => r.type === 15).map(r => {
      const parts = r.data.split(' ');
      return { priority: parseInt(parts[0]) || 0, host: parts.slice(1).join(' ').replace(/\.$/, ''), ttl: r.TTL };
    }).sort((a, b) => a.priority - b.priority);

    if (mxRecords.length === 0) {
      output.innerHTML = `<div class="mx-error">${t('noRecords')}</div>`;
      return;
    }

    let html = `<div style="margin-bottom:8px"><span class="mx-stat">${t('queryFor')}: <strong>${domain}</strong></span><span class="mx-stat"><strong>${mxRecords.length}</strong> ${t('recordsFound')}</span></div>`;
    html += '<table class="mx-table"><thead><tr><th>' + t('priority') + '</th><th>' + t('mailServer') + '</th><th>' + t('ttl') + '</th></tr></thead><tbody>';
    for (const r of mxRecords) {
      html += `<tr><td><span class="mx-badge">${r.priority}</span></td><td>${r.host}</td><td>${r.ttl}s</td></tr>`;
    }
    html += '</tbody></table>';
    html += `<div class="mx-info">💡 <strong>Tip:</strong> The mail server with the lowest priority number is contacted first. If it is unavailable, the sender tries the next priority. <code>${mxRecords[0].host}</code> is the primary mail server for <code>${domain}</code>.</div>`;
    output.innerHTML = html;
  } catch (e) {
    output.innerHTML = `<div class="mx-error">${t('fetchError')}<br><small>${e.message}</small></div>`;
  }
}

$('#domain').addEventListener('keydown', e => { if (e.key === 'Enter') doLookup(); });

GZ.renderToolPage({
  category: 'dev',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],

    {icon:'📡', href:'/network/http-headers-checker.html', name:'HTTP Headers'},
  ]
});
</script>
