<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is a topic sentence?", "acceptedAnswer": {"@type": "Answer", "text": "A topic sentence is the first sentence of a body paragraph. It states the main idea of that paragraph and connects it back to your thesis. Every other sentence in the paragraph should support or develop it."}}, {"@type": "Question", "name": "What are the 5 topic sentence styles?", "acceptedAnswer": {"@type": "Answer", "text": "Claim: states the paragraph's main argument directly. Evidence: introduces proof or data. Transition: links to the previous paragraph. Contrast: sets up a difference or counterpoint. Question: opens with a thought-provoking question the paragraph will answer."}}, {"@type": "Question", "name": "How is a topic sentence different from a thesis statement?", "acceptedAnswer": {"@type": "Answer", "text": "A thesis statement covers the whole essay and sits in the introduction. A topic sentence covers a single paragraph and sits at its start. Each topic sentence should support the thesis."}}, {"@type": "Question", "name": "Can I use the generated sentence as-is?", "acceptedAnswer": {"@type": "Answer", "text": "Use it as a strong starting point, then edit it so it fits your exact paragraph, tone and argument. Treat it as a draft to refine."}}]}</script>

<div class="gz-container">

<script>
GZI18n.register({
  en: {
    toolTitle: 'Topic Sentence Generator',
    toolDesc: 'Generate a clear, focused topic sentence for any body paragraph in seconds. 5 styles — claim, evidence, transition, contrast and question. Free, browser-based, no signup.',
    sClaim: 'Claim', sClaimD: 'State the main argument',
    sEvidence: 'Evidence', sEvidenceD: 'Introduce proof',
    sTransition: 'Transition', sTransitionD: 'Link to previous',
    sContrast: 'Contrast', sContrastD: 'Set up difference',
    sQuestion: 'Question', sQuestionD: 'Open with a question',
    lblTopic: 'Essay topic',
    lblIdea: 'This paragraph\'s main idea',
    phTopic: 'e.g. social media, renewable energy, school uniforms',
    phIdea: 'e.g. cyberbullying is the most harmful effect',
    emptyHint: 'Type a topic and the paragraph\'s main idea, then click Generate.',
    tipClaim: 'Claim sentences work well in argument essays — make the point debatable.',
    tipEvidence: 'Evidence sentences should preview the proof without giving everything away.',
    tipTransition: 'Transition sentences work best in the middle of an essay to connect ideas.',
    tipContrast: 'Contrast sentences are powerful for counter-argument paragraphs.',
    tipQuestion: 'Question sentences engage readers — but make sure the paragraph answers the question.',
    btnGenerate: 'Generate', btnShuffle: 'Regenerate', btnExample: 'Example', btnCopy: 'Copy', btnClear: 'Clear',
    step1: 'Pick a style — Claim, Evidence, Transition, Contrast or Question',
    step2: 'Type your essay topic and this paragraph\'s main idea',
    step3: 'Click Generate (or Regenerate for another variation)',
    step4: 'Edit the wording to fit your paragraph and copy it',
  },
  zh: {
    toolTitle: '主题句生成器',
    toolDesc: '几秒内为任意正文段落生成清晰、聚焦的主题句。5 种风格 — 论点、证据、过渡、对比和提问。免费、浏览器本地运行、无需注册。',
    sClaim: '论点', sClaimD: '陈述主要论点',
    sEvidence: '证据', sEvidenceD: '引入证明',
    sTransition: '过渡', sTransitionD: '连接上文',
    sContrast: '对比', sContrastD: '设置差异',
    sQuestion: '提问', sQuestionD: '以问题开头',
    lblTopic: '论文主题',
    lblIdea: '本段的主要观点',
    phTopic: '如：社交媒体、可再生能源、校服',
    phIdea: '如：网络霸凌是最有害的影响',
    emptyHint: '输入主题和本段的主要观点，然后点击「生成」。',
    tipClaim: '论点句适用于议论文 — 让观点具有可争论性。',
    tipEvidence: '证据句应预告证明而不透露全部细节。',
    tipTransition: '过渡句最适合用于论文中段，连接前后观点。',
    tipContrast: '对比句适合用于反方论点段落。',
    tipQuestion: '提问句能吸引读者 — 但要确保段落回答了该问题。',
    btnGenerate: '生成', btnShuffle: '重新生成', btnExample: '示例', btnCopy: '复制', btnClear: '清空',
    step1: '选择风格 — 论点、证据、过渡、对比或提问',
    step2: '输入论文主题和本段的主要观点',
    step3: '点击「生成」（或「重新生成」获取不同变体）',
    step4: '编辑措辞以适应你的段落并复制',
  }
});

const { $, copyText, t } = GZ;
let currentStyle = 'claim';

const TEMPLATES = {
  claim: [
    (topic, idea) => `${cap(idea)} stands out as the most significant aspect of ${topic}.`,
    (topic, idea) => `At the center of any serious discussion of ${topic} is ${lower(idea)}.`,
    (topic, idea) => `${cap(idea)}, more than any other factor, defines the debate around ${topic}.`,
    (topic, idea) => `Understanding ${topic} begins with recognizing that ${lower(idea)}.`,
  ],
  evidence: [
    (topic, idea) => `The clearest evidence for this claim comes from ${lower(idea)}.`,
    (topic, idea) => `Consider, for example, ${lower(idea)} — a case that illustrates the point sharply.`,
    (topic, idea) => `Data on ${lower(idea)} offers compelling support for this view of ${topic}.`,
    (topic, idea) => `Few examples illustrate the issue as vividly as ${lower(idea)}.`,
  ],
  transition: [
    (topic, idea) => `Building on the previous point, ${lower(idea)} reveals another dimension of ${topic}.`,
    (topic, idea) => `Equally important to the discussion of ${topic} is ${lower(idea)}.`,
    (topic, idea) => `Closely related to the previous argument is ${lower(idea)}.`,
    (topic, idea) => `This naturally leads to a second consideration: ${lower(idea)}.`,
  ],
  contrast: [
    (topic, idea) => `While the previous point holds true, ${lower(idea)} suggests a different picture.`,
    (topic, idea) => `In contrast to what might be expected, ${lower(idea)}.`,
    (topic, idea) => `Despite the appeal of the conventional view, ${lower(idea)}.`,
    (topic, idea) => `On the other hand, critics of ${topic} point to ${lower(idea)}.`,
  ],
  question: [
    (topic, idea) => `Why does ${lower(idea)} matter so much in any serious discussion of ${topic}?`,
    (topic, idea) => `What role does ${lower(idea)} play in shaping our understanding of ${topic}?`,
    (topic, idea) => `How should we weigh ${lower(idea)} against the other factors at work in ${topic}?`,
    (topic, idea) => `Is ${lower(idea)} really as straightforward as it first appears?`,
  ],
};

function cap(s){ if(!s) return s; s=s.trim(); return s.charAt(0).toUpperCase()+s.slice(1); }
function lower(s){ if(!s) return s; s=s.trim().replace(/[.!?]+$/,''); if(/^[A-Z]/.test(s) && !/^[A-Z]{2,}/.test(s)) return s.charAt(0).toLowerCase()+s.slice(1); return s; }
function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
function escapeHtml(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function generate(){
  const topic = $('#topic').value.trim();
  const idea = $('#idea').value.trim();
  if(!topic || !idea){ $('#output').innerHTML = `<em style="color:var(--text2)">${t('emptyHint')}</em>`; $('#tip').textContent = tipFor(currentStyle); return; }
  const arr = TEMPLATES[currentStyle];
  let result = pick(arr)(topic.toLowerCase(), idea);
  result = result.replace(/\s{2,}/g,' ').replace(/\s+\./g,'.');
  if(!/[.!?]"?$/.test(result)) result += '.';
  const label = {claim:'Claim',evidence:'Evidence',transition:'Transition',contrast:'Contrast',question:'Question'}[currentStyle];
  $('#output').innerHTML = `<span class="badge">${label}</span><div class="sentence">${escapeHtml(result)}</div>`;
  $('#tip').textContent = tipFor(currentStyle);
}

function tipFor(style){
  return t({claim:'tipClaim',evidence:'tipEvidence',transition:'tipTransition',contrast:'tipContrast',question:'tipQuestion'}[style] || 'tipClaim');
}

function loadExample(){
  $('#topic').value = 'social media';
  $('#idea').value = 'cyberbullying is the most harmful effect on teenagers';
  generate();
}

function doClear(){ $('#topic').value=''; $('#idea').value=''; $('#output').innerHTML=''; $('#tip').textContent = tipFor(currentStyle); }

const styleDefs = [
  {id:'claim', lbl:'sClaim', desc:'sClaimD'},
  {id:'evidence', lbl:'sEvidence', desc:'sEvidenceD'},
  {id:'transition', lbl:'sTransition', desc:'sTransitionD'},
  {id:'contrast', lbl:'sContrast', desc:'sContrastD'},
  {id:'question', lbl:'sQuestion', desc:'sQuestionD'},
];
$('#styles').innerHTML = styleDefs.map(sd => `<button data-style="${sd.id}" class="${sd.id==='claim'?'active':''}">${t(sd.lbl)}<small>${t(sd.desc)}</small></button>`).join('');
$('#styles').querySelectorAll('button').forEach(b => {
  b.addEventListener('click', () => {
    $('#styles').querySelectorAll('button').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    currentStyle = b.dataset.style;
    if($('#topic').value.trim() && $('#idea').value.trim()) generate();
    else $('#tip').textContent = tipFor(currentStyle);
  });
});

$('#lbl-topic').textContent = t('lblTopic');
$('#lbl-idea').textContent = t('lblIdea');
$('#topic').placeholder = t('phTopic');
$('#idea').placeholder = t('phIdea');
$('#tip').textContent = tipFor(currentStyle);
$('#output').innerHTML = `<em style="color:var(--text2)">${t('emptyHint')}</em>`;

$('#toolbar').innerHTML = `
  <button class="gz-btn" id="btn-gen">${t('btnGenerate')}</button>
  <button class="gz-btn gz-btn-secondary" id="btn-sh">${t('btnShuffle')}</button>
  <button class="gz-btn gz-btn-secondary" id="btn-ex">${t('btnExample')}</button>
  <button class="gz-btn gz-btn-secondary" id="btn-cp">${t('btnCopy')}</button>
  <button class="gz-btn gz-btn-secondary" id="btn-cl">${t('btnClear')}</button>`;
$('#btn-gen').addEventListener('click', generate);
$('#btn-sh').addEventListener('click', generate);
$('#btn-ex').addEventListener('click', loadExample);
$('#btn-cp').addEventListener('click', () => { const s = $('#output').querySelector('.sentence'); if(s) copyText(s.textContent); });
$('#btn-cl').addEventListener('click', doClear);
$('#topic').addEventListener('keydown', e => { if(e.key==='Enter'){ e.preventDefault(); $('#idea').focus(); }});

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🎓', href:'/text/thesis-statement-generator.html', name:'Thesis Gen'},
    {icon:'🎣', href:'/text/essay-hook-generator.html', name:'Essay Hook'},
    {icon:'📑', href:'/text/conclusion-generator.html', name:'Conclusion'},
    {icon:'🔄', href:'/text/paragraph-rewriter.html', name:'Paragraph Rewriter'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
