<script>
GZI18n.register({
  en: {
    toolTitle: 'Online Digital Clock — Full Screen Time',
    toolDesc: 'A big, clean digital clock with fullscreen mode, seconds, 12/24-hour toggle, date and custom colors. Perfect for classrooms, presentations, exams, live streams and desk displays. Free and browser-only.',
    btnFullscreen: '⛶ Fullscreen',
    btnExit: 'Exit',
    lblSec: 'Seconds',
    lbl24: '24-hour',
    lblDate: 'Date',
    lblDark: 'Dark background',
    step1: 'Click the clock or the Fullscreen button to expand to full screen.',
    step2: 'Toggle Seconds, 24-hour and Date using the checkboxes.',
    step3: 'Pick an accent color from the color dots.',
    step4: 'Press Esc (or tap the ✕ button) to exit fullscreen.',
  },
  zh: {
    toolTitle: '在线数字时钟 — 全屏显示',
    toolDesc: '一款简洁大气的数字时钟，支持全屏、秒数、12/24 小时切换、日期和自定义颜色。适合教室、演讲、考试、直播和桌面显示。免费、浏览器本地运行。',
    btnFullscreen: '⛶ 全屏',
    btnExit: '退出',
    lblSec: '秒数',
    lbl24: '24 小时制',
    lblDate: '日期',
    lblDark: '深色背景',
    step1: '点击时钟或「全屏」按钮铺满整个屏幕。',
    step2: '使用复选框切换秒数、24 小时制和日期。',
    step3: '从颜色圆点中选择强调色。',
    step4: '按 Esc（或点 ✕ 按钮）退出全屏。',
  }
});

const { $, t } = GZ;

let showSec = true, fmt24 = false, showDate = true, darkBg = true;
let accent = '#4ecdc4';

const COLORS = ['#4ecdc4','#ff6b6b','#ffd93d','#6bcf7f','#a78bfa','#f472b6','#ffffff'];

function pad(n){ return String(n).padStart(2,'0'); }

function render(){
  const now = new Date();
  let h = now.getHours();
  let ampm = '';
  if(!fmt24){
    ampm = h >= 12 ? 'PM' : 'AM';
    h = h % 12; if(h === 0) h = 12;
  }
  const m = pad(now.getMinutes());
  const s = pad(now.getSeconds());
  let html = `${pad(h)}:${m}`;
  if(showSec) html += `<span class="dc-sec">:${s}</span>`;
  if(!fmt24) html += `<span class="dc-ampm">${ampm}</span>`;
  $('#time').innerHTML = html;

  if(showDate){
    const opts = {weekday:'long', year:'numeric', month:'long', day:'numeric'};
    const locale = (GZ.lang === 'zh') ? 'zh-CN' : 'en-US';
    $('#date').style.display = '';
    try{ $('#date').textContent = now.toLocaleDateString(locale, opts); }
    catch(e){ $('#date').textContent = now.toDateString(); }
  } else {
    $('#date').style.display = 'none';
  }
}

function applyTheme(){
  $('#stage').style.background = darkBg ? 'var(--glass)' : '#ffffff';
  $('#time').style.color = accent;
  $('#date').style.color = darkBg ? 'var(--text2)' : '#666';
}

function buildColors(){
  $('#color-row').innerHTML = COLORS.map(c=>
    `<button data-c="${c}" style="background:${c}" class="${c===accent?'active':''}" aria-label="${c}"></button>`
  ).join('');
  $('#color-row').querySelectorAll('button').forEach(b=>{
    b.onclick = ()=>{
      accent = b.dataset.c;
      $('#color-row').querySelectorAll('button').forEach(x=>x.classList.remove('active'));
      b.classList.add('active');
      applyTheme();
    };
  });
}

function goFullscreen(){
  const el = $('#stage');
  const req = el.requestFullscreen || el.webkitRequestFullscreen || el.msRequestFullscreen;
  if(req){ try{ req.call(el).catch(()=>{}); }catch(e){} }
}

$('#stage').addEventListener('click', goFullscreen);
$('#exit-lbl').textContent = t('btnExit');
$('#lbl-sec').textContent = t('lblSec');
$('#lbl-24').textContent = t('lbl24');
$('#lbl-date').textContent = t('lblDate');
$('#lbl-dark').textContent = t('lblDark');

$('#show-sec').onchange = e=>{ showSec = e.target.checked; render(); };
$('#fmt-24').onchange = e=>{ fmt24 = e.target.checked; render(); };
$('#show-date').onchange = e=>{ showDate = e.target.checked; render(); };
$('#dark-bg').onchange = e=>{ darkBg = e.target.checked; applyTheme(); };

document.addEventListener('fullscreenchange', ()=>{
  $('#exit-fs').style.display = document.fullscreenElement ? 'flex' : 'none';
});

buildColors();
applyTheme();
render();
setInterval(render, 1000);

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="goFullscreen()">${t('btnFullscreen')}</button>`;

GZ.renderToolPage({
  category: 'fun',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'⏱️', href:'/fun/stopwatch.html', name:'Stopwatch'},
    {icon:'⏰', href:'/calc/alarm-clock.html', name:'Alarm Clock'},
    {icon:'🌍', href:'/convert/world-clock.html', name:'World Clock'},
    {icon:'⏳', href:'/fun/countdown.html', name:'Countdown'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
