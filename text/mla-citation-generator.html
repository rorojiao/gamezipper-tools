    publisher: '出版社',
    edition: '版次（如 3rd）',
    year: '出版年份',

  }

const { $, copyText, t } = GZ;
let currentType = 'book';

const FIELDS = {
  book:    ['authors','title','edition','publisher','year'],
  website: ['authors','title','siteName','publisher','year','dayMonth','url','accessDate'],
  journal: ['authors','title','journal','volume','issue','year','pages','doi'],
  news:    ['authors','title','siteName','dayMonth','year','url'],
};

function formatAuthors(raw) {
  if (!raw || !raw.trim()) return '';
  const parts = raw.split(';').map(s => s.trim()).filter(Boolean);
  const list = parts.map(p => {
    const m = p.match(/^([^,]+),\s*(.+)$/);
    if (m) {
      const last = m[1].trim();
      const firsts = m[2].trim();
      return `${last}, ${firsts}`;
    }
    return p;
  });
  if (list.length === 1) return list[0];
  if (list.length === 2) return `${list[0]}, and ${list[1]}`;
  return list.slice(0, -1).join(', ') + ', and ' + list[list.length - 1];
}

function val(id) { const el = document.getElementById('f-' + id); return el ? el.value.trim() : ''; }

function buildCitation() {
  const fields = FIELDS[currentType];
  const vals = {};
  fields.forEach(f => vals[f] = val(f));

  if (!vals.title) {
    $('#citation-out').innerHTML = `<span class="empty">${t('emptyHint')}</span>`;
    $('#status').innerHTML = `<span style="opacity:.6">${t('needAuthor')}</span>`;
    return;
  }

  const authors = formatAuthors(vals.authors);
  const title = vals.title;
  let body = '';

  if (currentType === 'book') {
    const parts = [];
    if (authors) parts.push(authors + '.');
    let t2 = `«I»${title}«/I»`;
    if (vals.edition) t2 += `, ${vals.edition} ed.`;
    parts.push(t2 + ',');
    if (vals.publisher) parts.push(vals.publisher + ',');
    if (vals.year) parts.push(vals.year + '.');
    // collapse trailing comma if year missing
    body = parts.join(' ').replace(/,\s*$/, '.');
    if (!body.endsWith('.')) body += '.';
  } else if (currentType === 'website') {
    const parts = [];
    if (authors) parts.push(authors + '.');
    parts.push(`«I»${title}«/I».`);
    if (vals.siteName) parts.push(`«I»${vals.siteName}«/I»,`);
    if (vals.dayMonth && vals.year) parts.push(`${vals.dayMonth} ${vals.year},`);
    else if (vals.year) parts.push(vals.year + ',');
    if (vals.url) parts.push(vals.url + '.');
    if (vals.accessDate && vals.url) body = parts.join(' ').replace(/(\.)\s*$/, '.') + ` Accessed ${vals.accessDate}.`;
    else body = parts.join(' ');
  } else if (currentType === 'journal') {
    const parts = [];
    if (authors) parts.push(authors + '.');
    parts.push(`"${title}."`);
    if (vals.journal) parts.push(`«I»${vals.journal}«/I»,`);
    let loc = '';
    if (vals.volume) loc += `vol. ${vals.volume}`;
    if (vals.issue) loc += (loc ? ', ' : '') + `no. ${vals.issue}`;
    if (loc) parts.push(loc + ',');
    if (vals.year) parts.push(vals.year + ',');
    if (vals.pages) parts.push(`pp. ${vals.pages}.`);
    if (vals.doi) parts.push(`https://doi.org/${vals.doi.replace(/^https?:\/\/doi\.org\//i, '')}.`);
    body = parts.join(' ');
  } else if (currentType === 'news') {
    const parts = [];
    if (authors) parts.push(authors + '.');
    parts.push(`"${title}."`);
    if (vals.siteName) parts.push(`«I»${vals.siteName}«/I»,`);
    if (vals.dayMonth && vals.year) parts.push(`${vals.dayMonth} ${vals.year},`);
    else if (vals.year) parts.push(vals.year + ',');
    if (vals.url) parts.push(vals.url + '.');
    body = parts.join(' ');
  }

  let html = body
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/«I»/g, '<i>').replace(/«\/I»/g, '</i>')
    .replace(/&lt;i&gt;/g,'<i>').replace(/&lt;\/i&gt;/g,'</i>');
  $('#citation-out').innerHTML = html;
  $('#citation-out').dataset.plain = body.replace(/«\/?I»/g, '');
  $('#status').innerHTML = `<span style="color:var(--gz-success,#00d672)">${t('generated')}</span>`;
}

function renderForm() {
  const fields = FIELDS[currentType];
  const grid = $('#form-grid');
  grid.innerHTML = fields.map(f => {
    const full = (f === 'authors' || f === 'title') ? ' full' : '';
    const label = t(f);
    const el = f === 'title' ? 'textarea' : 'input';
    if (el === 'textarea') {
      return `<div class="${full.trim()}"><label>${label}</label><textarea id="f-${f}" rows="2"></textarea></div>`;
    }
    return `<div class="${full.trim()}"><label>${label}</label><input id="f-${f}" type="text"></div>`;
  }).join('');
  fields.forEach(f => {
    const el = document.getElementById('f-' + f);
    if (el) el.addEventListener('input', buildCitation);
  });
  buildCitation();
}

function renderTabs() {
  const tabs = [
    ['book', 'typeBook'],
    ['website', 'typeWebsite'],
    ['journal', 'typeJournal'],
    ['news', 'typeNews'],
  ];
  $('#type-tabs').innerHTML = tabs.map(([id, key]) =>
    `<div class="gz-tab ${id === currentType ? 'active' : ''}" data-type="${id}">${t(key)}</div>`
  ).join('');
  $('#type-tabs').querySelectorAll('.gz-tab').forEach(el => {
    el.addEventListener('click', () => {
      currentType = el.dataset.type;
      $('#type-tabs').querySelectorAll('.gz-tab').forEach(x => x.classList.remove('active'));
      el.classList.add('active');
      renderForm();
    });
  });
}

function loadExample() {
  const examples = {
    book: { authors: 'Tartt, Donna', title: 'The Goldfinch', edition: '', publisher: 'Little, Brown', year: '2013' },
    website: { authors: 'Smith, John', title: 'How AI is changing research', siteName: 'Tech Daily', publisher: '', year: '2024', dayMonth: '12 Jan.', url: 'https://example.com/ai-research', accessDate: '2025-02-10' },
    journal: { authors: 'Garcia, Maria; Lee, Tom', title: 'Effects of sleep on memory consolidation', journal: 'Journal of Sleep Research', volume: '32', issue: '4', year: '2023', pages: '45-58', doi: '10.1111/jsr.13982' },
    news: { authors: 'Williams, Pat', title: 'City unveils new transit plan', siteName: 'The Daily Herald', dayMonth: '3 June', year: '2025', url: 'https://example.com/transit-plan' },
  };
  const ex = examples[currentType];
  Object.entries(ex).forEach(([k, v]) => {
    const el = document.getElementById('f-' + k);
    if (el) el.value = v;
  });
  buildCitation();
}

function doClear() {
  FIELDS[currentType].forEach(f => { const el = document.getElementById('f-' + f); if (el) el.value = ''; });
  buildCitation();
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn" onclick="copyText(document.getElementById('citation-out').dataset.plain || document.getElementById('citation-out').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

renderTabs();
renderForm();

    {icon:'📝', href:'/text/lorem-ipsum.html', name:'Lorem Ipsum'},
  ]
});
</script>
