.ml-card h3{margin:0 0 12px;font-size:1rem}

.result-grid .cell .l{font-size:.76em;opacity:.7}
.rate-presets{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.rate-presets button{padding:5px 10px;background:var(--glass);border:1px solid var(--border);border-radius:14px;cursor:pointer;font-size:.8em;color:inherit}
.rate-presets button:hover{background:var(--accent);color:#fff;border-color:var(--accent)}

<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is the IRS standard mileage rate for 2025?", "acceptedAnswer": {"@type": "Answer", "text": "The IRS standard mileage rate for business use in 2025 is 70 cents per mile (up from 67 cents in 2024). For medical or moving purposes it is 21 cents per mile, and for charitable organizations it is 14 cents per mile. Rates are adjusted annually."}}, {"@type": "Question", "name": "How do I calculate mileage reimbursement?", "acceptedAnswer": {"@type": "Answer", "text": "Multiply total business miles driven by the applicable mileage rate. For example, 500 business miles at the 2025 IRS rate of 70 cents = $350 reimbursement. This calculator does it automatically and lets you add multiple trips."}}, {"@type": "Question", "name": "What is the difference between the mileage method and actual expense method?", "acceptedAnswer": {"@type": "Answer", "text": "The mileage method multiplies total miles by a flat IRS rate and is simplest. The actual expense method tracks real costs like gas, maintenance, depreciation, and insurance, then multiplies by the business-use percentage. The mileage method is usually easier but the actual method may yield a larger deduction for some vehicles."}}, {"@type": "Question", "name": "Can I track multiple trips at once?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. Add as many trips as you need with dates, descriptions, and miles. The calculator sums them up and applies the reimbursement rate to the grand total, perfect for monthly or annual expense reports."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="ml-grid">
      <div class="ml-card">
        <h3>🚗 <span id="lblTrips"></span></h3>
        <div class="ml-row" style="font-weight:600;font-size:.76em;text-transform:uppercase;opacity:.7">
          <span id="hdrDate"></span><span id="hdrDesc"></span><span id="hdrMiles"></span><span id="hdrCost"></span><span></span>
        </div>
        <div id="tripList"></div>
        <button class="gz-btn gz-btn-secondary" id="btnAdd" style="margin-top:8px;font-size:.85em">+ <span id="lblAddTrip"></span></button>
      </div>
      <div class="ml-card">
        <h3>⚙️ <span id="lblSettings"></span></h3>
        <div class="ml-field"><label id="lblRate"></label><input type="number" id="rate" value="0.70" min="0" step="0.01"></div>
        <div class="rate-presets" id="ratePresets"></div>
        <div class="ml-field" style="margin-top:12px"><label id="lblFuel"></label><input type="number" id="mpg" value="0" min="0" step="0.5" placeholder="0"></div>
        <div class="ml-field"><label id="lblGasPrice"></label><input type="number" id="gasPrice" value="0" min="0" step="0.1" placeholder="0"></div>
        <div class="ml-field"><label id="lblCurrency"></label><input type="text" id="currency" value="$" maxlength="3"></div>
        <div class="result-box">
          <div class="lbl" id="lblTotalMiles"></div>
          <div class="big" id="totalMiles">0</div>
          <div class="result-grid">
            <div class="cell"><div class="l" id="lblReimburse"></div><div class="v" id="reimburse">$0</div></div>
            <div class="cell"><div class="l" id="lblFuelCost"></div><div class="v" id="fuelCost">$0</div></div>
            <div class="cell"><div class="l" id="lblTripsCount"></div><div class="v" id="tripsCount">0</div></div>
            <div class="cell"><div class="l" id="lblAvgMiles"></div><div class="v" id="avgMiles">0</div></div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Mileage Calculator',
    toolDesc: 'Track business and personal trip miles. Calculate IRS mileage reimbursement, fuel costs, and build expense reports. Updated with 2025 IRS standard mileage rates.',
    trips: 'Trip Log', settings: 'Mileage Settings',
    date: 'Date', desc: 'Description', miles: 'Miles', cost: 'Cost', addTrip: 'Add Trip',
    rate: 'Reimbursement rate ($/mile)', fuel: 'Fuel efficiency (MPG) — optional', gasPrice: 'Gas price ($/gal) — optional', currency: 'Currency symbol',
    totalMiles: 'Total Miles', reimburse: 'Reimbursement', fuelCost: 'Estimated Fuel', tripsCount: 'Trips', avgMiles: 'Avg / Trip',
    copy: '📋 Copy Report', reset: '🔄 Reset', example: '🧪 Load Example',
    step1: 'Add each trip with a date, description, and miles driven',
    step2: 'Set the reimbursement rate — click a preset for current IRS rates',
    step3: 'Optionally enter MPG and gas price to estimate fuel cost',
    step4: 'Copy the mileage report for your expense submission',
  },
  zh: {
    toolTitle: '里程计算器',
    toolDesc: '记录商务和个人出行里程。计算里程报销费用、油费并生成费用报告。已更新 2025 年 IRS 标准里程费率。',
    trips: '行程记录', settings: '里程设置',
    date: '日期', desc: '描述', miles: '里程', cost: '费用', addTrip: '添加行程',
    rate: '报销费率 ($/英里)', fuel: '油耗 (MPG) — 可选', gasPrice: '油价 ($/加仑) — 可选', currency: '货币符号',
    totalMiles: '总里程', reimburse: '报销金额', fuelCost: '预估油费', tripsCount: '行程数', avgMiles: '平均/程',
    copy: '📋 复制报告', reset: '🔄 重置', example: '🧪 加载示例',
    step1: '为每次行程添加日期、描述和行驶里程',
    step2: '设置报销费率 — 点击预设按钮使用最新 IRS 费率',
    step3: '可选输入油耗和油价以估算油费',
    step4: '复制里程报告用于费用提交',
  }
});

const { $, copyText, t } = GZ;
const isZh = GZI18n.getLang() === 'zh';

['trips','settings','addTrip','rate','fuel','gasPrice','currency','totalMiles','reimburse','fuelCost','tripsCount','avgMiles'].forEach(k => { const el = $('#lbl' + k.charAt(0).toUpperCase() + k.slice(1)); if (el) el.textContent = t(k); });
$('#hdrDate').textContent = t('date'); $('#hdrDesc').textContent = t('desc'); $('#hdrMiles').textContent = t('miles'); $('#hdrCost').textContent = t('cost');

let trips = [];

function fmtMoney(n) { const c = $('#currency').value || '$'; return c + (n || 0).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }

function renderTrips() {
  $('#tripList').innerHTML = trips.map((trip, i) => `
    <div class="ml-row">
      <input type="text" class="t-date" data-i="${i}" value="${trip.date}" placeholder="2025-01-15">
      <input type="text" class="t-desc" data-i="${i}" value="${trip.desc}" placeholder="${isZh?'客户拜访':'Client visit'}">
      <input type="number" class="t-miles" data-i="${i}" value="${trip.miles}" min="0" step="0.1" placeholder="0">
      <span class="t-cost" style="text-align:center;font-weight:600;color:var(--accent)">${fmtMoney((trip.miles||0) * (+$('#rate').value || 0))}</span>
      <button class="del" onclick="delTrip(${i})">×</button>
    </div>`).join('');
  document.querySelectorAll('.t-date,.t-desc,.t-miles').forEach(el => el.addEventListener('input', e => {
    const i = +e.target.dataset.i, key = e.target.className.replace('t-','');
    trips[i][key] = e.target.value;
    if (key === 'miles') trips[i].miles = +e.target.value || 0;
    calc();
  }));
}

function addTrip() { trips.push({date:'', desc:'', miles:0}); renderTrips(); }
window.delTrip = function(i) { trips.splice(i, 1); renderTrips(); calc(); };
window.addTrip = addTrip;

function calc() {
  const rate = +$('#rate').value || 0;
  const mpg = +$('#mpg').value || 0;
  const gasPrice = +$('#gasPrice').value || 0;
  const total = trips.reduce((s, tr) => s + (+tr.miles || 0), 0);
  const reimburse = total * rate;
  const fuelCost = mpg > 0 ? (total / mpg) * gasPrice : 0;
  const count = trips.length;
  const avg = count ? total / count : 0;

  $('#totalMiles').textContent = total.toLocaleString(undefined, { maximumFractionDigits: 1 });
  $('#reimburse').textContent = fmtMoney(reimburse);
  $('#fuelCost').textContent = fuelCost > 0 ? fmtMoney(fuelCost) : '—';
  $('#tripsCount').textContent = count;
  $('#avgMiles').textContent = avg.toFixed(1);
  renderTrips();
}

// IRS rate presets
const PRESETS = isZh
  ? [{l:'商务 70¢', v:0.70}, {l:'医疗 21¢', v:0.21}, {l:'慈善 14¢', v:0.14}]
  : [{l:'Business 70¢', v:0.70}, {l:'Medical 21¢', v:0.21}, {l:'Charity 14¢', v:0.14}];
$('#ratePresets').innerHTML = PRESETS.map(p => `<button data-v="${p.v}">${p.l}</button>`).join('');
document.querySelectorAll('#ratePresets button').forEach(b => b.addEventListener('click', () => { $('#rate').value = b.dataset.v; calc(); }));

$('#btnAdd').onclick = addTrip;
['rate','mpg','gasPrice','currency'].forEach(id => $('#' + id).addEventListener('input', calc));

$('#toolbar').innerHTML = `
  <button class="gz-btn gz-btn-secondary" id="btnCopy">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" id="btnExample">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" id="btnReset">${t('reset')}</button>`;

$('#btnCopy').onclick = () => {
  let txt = `${t('toolTitle')}\n${t('totalMiles')}: ${$('#totalMiles').textContent}\n${t('reimburse')}: ${$('#reimburse').textContent}\n${t('tripsCount')}: ${trips.length}\n`;
  trips.forEach((tr,i) => { if (tr.miles) txt += `  ${tr.date||'-'} | ${tr.desc||'-'} | ${tr.miles} ${isZh?'英里':'mi'}\n`; });
  copyText(txt);
};
$('#btnExample').onclick = () => {
  trips = [
    {date:'2025-06-09', desc: isZh?'客户会议':'Client meeting', miles:28.5},
    {date:'2025-06-10', desc: isZh?'机场接送':'Airport pickup', miles:42},
    {date:'2025-06-12', desc: isZh?'供应商拜访':'Supplier visit', miles:15.3},
    {date:'2025-06-14', desc: isZh?'办公采购':'Office supplies', miles:8.7},
  ];
  calc();
};
$('#btnReset').onclick = () => { trips = []; calc(); };

calc();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'⛽', href:'/calc/fuel-cost-calculator.html', name:'Fuel Cost Calculator'},
    {icon:'🚗', href:'/calc/gas-mileage-calculator.html', name:'Gas Mileage'},
    {icon:'💰', href:'/calc/salary-calculator.html', name:'Salary Calculator'},
    
  ]
});
</script>
<script src="/tools-result-rec.js?v=20260707v520" defer></script>
</body>
</html>
