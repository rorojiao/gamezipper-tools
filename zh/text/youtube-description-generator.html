<div class="gz-container">

  </div>
  <div class="gz-tool-area">

      <div>
        <label style="display:block;margin-bottom:4px;font-weight:bold" id="lbl-title"></label>

          <button class="gz-btn" id="genBtn"></button>

<script>
GZI18n.register({
  en: {
    toolTitle: 'YouTube Description Generator',
    toolDesc: 'Generate SEO-optimized YouTube video descriptions with chapters, links and hashtags. Enter your details — copy a ready-to-paste description.',
    videoTitle: 'Video Title',
    keywords: 'Keywords / Tags (comma-separated)',
    channelName: 'Channel Name (optional)',
    chapters: 'Chapters (one per line, format: 0:00 Intro)',
    chaptersPlaceholder: '0:00 Intro\n1:30 Main Topic\n5:00 Tips\n8:00 Conclusion',
    output: 'Generated Description',
    generate: 'Generate',
    copy: 'Copy Description',
    clear: 'Clear',
    copied: 'Copied!',
    step1: 'Enter your video title and target keywords',
    step2: 'Optionally add your channel name and video chapters',
    step3: 'Click Generate to create an SEO-optimized description',
    step4: 'Click Copy to paste it directly into YouTube Studio',
  },
  zh: {
    toolTitle: 'YouTube 描述生成器',
    toolDesc: '生成 SEO 优化的 YouTube 视频描述，包含章节、链接和话题标签。输入信息即可获得可直接粘贴的描述。',
    videoTitle: '视频标题',
    keywords: '关键词 / 标签（逗号分隔）',
    channelName: '频道名称（可选）',
    chapters: '章节（每行一个，格式：0:00 简介）',
    chaptersPlaceholder: '0:00 简介\n1:30 主要内容\n5:00 小贴士\n8:00 总结',
    output: '生成的描述',
    generate: '生成',
    copy: '复制描述',
    clear: '清除',
    copied: '已复制！',
    step1: '输入视频标题和目标关键词',
    step2: '可选添加频道名称和视频章节',
    step3: '点击「生成」创建 SEO 优化描述',
    step4: '点击「复制」直接粘贴到 YouTube Studio',
  }
});

const { $, copyText, t } = GZ;

$('#lbl-title').textContent = t('videoTitle');
$('#lbl-keywords').textContent = t('keywords');
$('#lbl-channel').textContent = t('channelName');
$('#lbl-chapters').textContent = t('chapters');
$('#lbl-output').textContent = t('output');
$('#genBtn').textContent = t('generate');
$('#copyBtn').textContent = t('copy');
$('#clearBtn').textContent = t('clear');
$('#chapters').placeholder = t('chaptersPlaceholder');

function generateDescription() {
  const title = $('#videoTitle').value.trim();
  const keywordsRaw = $('#keywords').value.trim();
  const channel = $('#channelName').value.trim() || (GZI18n.getLang() === 'zh' ? '我的频道' : 'My Channel');
  const chaptersRaw = $('#chapters').value.trim();

  if (!title) { $('#output').value = GZI18n.getLang() === 'zh' ? '请先输入视频标题' : 'Please enter a video title first'; return; }

  const keywords = keywordsRaw.split(',').map(k => k.trim()).filter(Boolean);
  const lang = GZI18n.getLang();

  let desc = '';
  if (lang === 'zh') {
    desc += `${title}\n\n`;
    if (keywords.length) desc += `在本期视频中，我们将深入探讨${keywords.slice(0,3).join('、')}等内容。无论你是初学者还是有经验的内容创作者，这个视频都会给你带来实用的技巧和灵感。\n\n`;
    desc += `📌 视频亮点：\n`;
    desc += `• ${keywords[0] || title} 的核心概念和原理\n`;
    desc += `• 实用技巧和操作演示\n`;
    desc += `• 常见问题解答和避坑指南\n`;
    desc += `• 最佳实践和进阶建议\n\n`;
  } else {
    desc += `${title}\n\n`;
    if (keywords.length) desc += `In this video, we dive deep into ${keywords.slice(0,3).join(', ')} and more. Whether you're a beginner or experienced, you'll walk away with practical tips and actionable insights you can use right away.\n\n`;
    desc += `📌 What you'll learn:\n`;
    desc += `• The fundamentals of ${keywords[0] || 'this topic'}\n`;
    desc += `• Step-by-step walkthroughs and demonstrations\n`;
    desc += `• Common mistakes to avoid (and how to fix them)\n`;
    desc += `• Pro tips and best practices\n\n`;
  }

  // Chapters
  if (chaptersRaw) {
    desc += `⏱️ Timestamps:\n`;
    chaptersRaw.split('\n').filter(l => l.trim()).forEach(line => {
      desc += `${line.trim()}\n`;
    });
    desc += `\n`;
  }

  // Call to action
  if (lang === 'zh') {
    desc += `🔔 如果这个视频对你有帮助，请点赞、订阅并开启通知，不错过更多精彩内容！\n\n`;
    desc += `🔗 相关链接：\n`;
    desc += `• 订阅频道：[订阅链接]\n`;
    desc += `• 官方网站：[网站链接]\n`;
    desc += `• 社交媒体：[社交链接]\n\n`;
  } else {
    desc += `🔔 If you found this video helpful, please like, subscribe and hit the bell notification for more content!\n\n`;
    desc += `🔗 Useful Links:\n`;
    desc += `• Subscribe: [Subscribe Link]\n`;
    desc += `• Website: [Website Link]\n`;
    desc += `• Social Media: [Social Links]\n\n`;
  }

  // Hashtags
  if (keywords.length) {
    const hashtags = keywords.map(k => '#' + k.replace(/[^a-zA-Z0-9\u4e00-\u9fff]/g, ''));
    desc += (lang === 'zh' ? `🏷️ 话题标签：\n` : `🏷️ Hashtags:\n`);
    desc += hashtags.join(' ') + '\n\n';
  }

  // SEO keywords section
  if (keywords.length) {
    desc += (lang === 'zh' ? `🔍 相关搜索：\n` : `🔍 Related searches:\n`);
    desc += keywords.map(k => `${k}`).join(', ') + '\n\n';
  }

  // Disclaimer
  if (lang === 'zh') {
    desc += `关于 ${channel}：\n我们致力于分享${keywords[0] || '实用'}相关的知识和经验，帮助大家成长。欢迎在评论区留言互动！\n`;
  } else {
    desc += `About ${channel}:\nWe share knowledge and tips about ${keywords[0] || 'this topic'} to help you grow. Drop a comment below with your thoughts!\n`;
  }

  $('#output').value = desc;
}

$('#genBtn').addEventListener('click', generateDescription);
$('#copyBtn').addEventListener('click', () => {
  const out = $('#output').value;
  if (out) { copyText(out); $('#copyBtn').textContent = t('copied'); setTimeout(() => $('#copyBtn').textContent = t('copy'), 1500); }
});
$('#clearBtn').addEventListener('click', () => {
  $('#videoTitle').value = ''; $('#keywords').value = ''; $('#channelName').value = '';
  $('#chapters').value = ''; $('#output').value = '';
});

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🎬', href:'/text/youtube-title-generator.html', name:'YT Titles'},
    {icon:'🏷️', href:'/text/youtube-tag-generator.html', name:'YT Tags'},
    {icon:'#️⃣', href:'/text/hashtag-generator.html', name:'Hashtags'},
    {icon:'📷', href:'/text/instagram-caption-generator.html', name:'IG Captions'},
  ]
});
</script>
