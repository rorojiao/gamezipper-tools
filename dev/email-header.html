const { $, copyText, t, showToast } = GZ;

function escapeHtml(s) {
  if (s == null) return '';
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function unescapeHeader(s) {
  return s.replace(/\\([\n\r\t])/g, (_, c) => ({n:'\n', r:'\r', t:'\t'}[c])).replace(/\\(.)/g, '$1');
}

function parseHeaders(raw) {
  if (!raw) return [];
  let s = raw.replace(/\r\n/g, '\n').replace(/\r/g, '\n');
  s = s.replace(/^.*?(?=^\S)/m, m => m);
  if (/^.+?:/m.test(s.split('\n')[0])) {
    s = s.split('\n').filter(line => {
      if (/^\s/.test(line)) return true;
      if (/^$/.test(line)) return true;
      if (/^[^:]+:/.test(line)) return true;
      return false;
    }).join('\n');
  }
  const headers = [];
  const lines = s.split('\n');
  let current = null;
  for (const line of lines) {
    if (/^$/.test(line)) {
      if (current) { headers.push(current); current = null; }
      break;
    }
    if (/^[ \t]/.test(line) && current) {
      current.value += '\n' + unescapeHeader(line.trim());
    } else {
      if (current) headers.push(current);
      const m = line.match(/^([A-Za-z0-9\-]+)\s*:\s*(.*)$/);
      if (m) {
        current = { name: m[1], value: m[2] };
      } else if (current) {
        current.value += '\n' + line;
      }
    }
  }
  if (current) headers.push(current);
  return headers;
}

function getHeaderValue(headers, name) {
  const h = headers.find(h => h.name.toLowerCase() === name.toLowerCase());
  return h ? h.value : null;
}

function parseAddressList(value) {
  if (!value) return [];
  const addr = [];
  const re = /(?:"?([^"<]*?)"?\s*)?<?([\w.+-]+@[\w.-]+\.[\w-]+)>?/g;
  let m;
  while ((m = re.exec(value)) !== null) {
    if (m[2]) addr.push({ name: (m[1] || '').trim(), email: m[2] });
  }
  return addr;
}

function parseAuthResult(value) {
  if (!value) return { result: 'none' };
  const m = value.match(/(\w+(?:\.\w+)?)\s*=\s*([a-zA-Z]+)/);
  if (!m) return { result: 'none' };
  return { result: m[2].toLowerCase(), header: m[1] };
}

function renderAuth(headers) {
  const cards = [];
  for (const h of headers) {
    if (h.name.toLowerCase() === 'authentication-results') {
      const spf = parseAuthResult(h.value.match(/spf=([^\s;]+)/i)?.[0]);
      const dkim = parseAuthResult(h.value.match(/dkim=([^\s;]+)/i)?.[0]);
      const dmarc = parseAuthResult(h.value.match(/dmarc=([^\s;]+)/i)?.[0]);
      const map = { pass: t('pass'), fail: t('fail'), softfail: t('softfail'), neutral: t('neutral'), none: t('none') };
      if (spf.result !== 'none') cards.push({ name: t('spf'), result: spf.result, label: map[spf.result] || spf.result });
      if (dkim.result !== 'none') cards.push({ name: t('dkim'), result: dkim.result, label: map[dkim.result] || dkim.result });
      if (dmarc.result !== 'none') cards.push({ name: t('dmarc'), result: dmarc.result, label: map[dmarc.result] || dmarc.result });
    }
  }
  if (!cards.length) return `<p style="opacity:.7;font-size:.9em;padding:8px 0">${t('noAuth')}</p>`;
  return '<div class="auth-grid">' + cards.map(c => {
    const cls = c.result === 'pass' ? 'pass' : (c.result === 'fail' ? 'fail' : '');
    return `<div class="auth-card ${cls}"><div class="name">${c.name}</div><div><span class="badge ${c.result}">${c.label}</span></div></div>`;
  }).join('') + '</div>';
}

function renderHops(headers) {
  const hops = headers.filter(h => h.name.toLowerCase() === 'received');
  if (!hops.length) return `<p style="opacity:.7;font-size:.9em">${t('noHops')}</p>`;
  return '<table class="hop-table"><tbody>' + hops.map((h, i) => {
    const fromMatch = h.value.match(/from\s+([^\s(]+)/i);
    const ipMatch = h.value.match(/\(([\d.]+|[a-f0-9:]+)\)/i);
    const byMatch = h.value.match(/by\s+([^\s]+)/i);
    const dateMatch = h.value.match(/;\s*(.+)$/);
    return `<tr><th>#${i + 1}</th><td><div class="from">${escapeHtml(fromMatch?.[1] || 'unknown')}</div>${ipMatch ? '<div>IP: ' + escapeHtml(ipMatch[1]) + '</div>' : ''}<div>via: ${escapeHtml(byMatch?.[1] || 'unknown')}</div>${dateMatch ? '<div style="opacity:.7;font-size:.9em">' + escapeHtml(dateMatch[1].trim()) + '</div>' : ''}</td></tr>`;
  }).join('') + '</tbody></table>';
}

function renderSummary(headers) {
  const from = getHeaderValue(headers, 'From');
  const to = getHeaderValue(headers, 'To');
  const cc = getHeaderValue(headers, 'Cc');
  const subject = getHeaderValue(headers, 'Subject');
  const date = getHeaderValue(headers, 'Date');
  const msgId = getHeaderValue(headers, 'Message-ID');
  const returnPath = getHeaderValue(headers, 'Return-Path');
  const replyTo = getHeaderValue(headers, 'Reply-To');
  const fields = [
    { lbl: t('from'), val: from },
    { lbl: t('to'), val: to },
    cc ? { lbl: t('cc'), val: cc } : null,
    { lbl: t('subject'), val: subject },
    { lbl: t('date'), val: date },
    { lbl: t('messageId'), val: msgId },
    { lbl: t('returnPath'), val: returnPath },
    { lbl: t('replyTo'), val: replyTo },
  ].filter(f => f && f.val);
  return '<div class="summary">' + fields.map(f => `<div class="summary-card"><div class="lbl">${escapeHtml(f.lbl)}</div><div class="val">${escapeHtml(f.val)}</div></div>`).join('') + '</div>';
}

function renderAllHeaders(headers) {
  return '<div class="headers-list">' + headers.map(h => `<div class="header-row"><span class="k">${escapeHtml(h.name)}:</span><span class="v">${escapeHtml(h.value)}</span></div>`).join('') + '</div>';
}

function doAnalyze() {
  const raw = $('#input').value;
  const out = $('#output');
  if (!raw.trim()) {
    out.innerHTML = `<p style="opacity:.7">${t('empty')}</p>`;
    return;
  }
  const headers = parseHeaders(raw);
  if (!headers.length) {
    out.innerHTML = `<div class="warn">⚠️ ${t('parserError')}</div>`;
    return;
  }
  let html = `<h2 style="font-size:1.1rem;margin:0 0 10px">📋 ${t('summary')}</h2>`;
  html += renderSummary(headers);
  html += `<h2 style="font-size:1.1rem;margin:14px 0 10px">🔐 ${t('authentication')}</h2>`;
  html += renderAuth(headers);
  html += `<h2 style="font-size:1.1rem;margin:14px 0 10px">📍 ${t('hops')}</h2>`;
  html += renderHops(headers);
  html += `<h2 style="font-size:1.1rem;margin:14px 0 10px">📜 ${t('allHeaders')} (${headers.length})</h2>`;
  html += renderAllHeaders(headers);
  out.innerHTML = html;
}
