<script>
GZI18n.register({
  en: {
    toolTitle: 'Moving Cost Calculator',
    toolDesc: 'Estimate the cost of your move with side-by-side comparison of DIY truck rental, full-service movers and portable containers. Enter distance, home size and add-ons to see which option saves the most.',
    distance: 'Move Distance (miles)',
    homesize: 'Home Size',
    packers: 'Packing Service',
    storage: 'Storage (days × rate)',
    insurance: 'Insurance',
    extras: 'Travel / Hotels / Misc ($)',
    optStudio: 'Studio',
    opt1br: '1 Bedroom',
    opt2br: '2 Bedroom',
    opt3br: '3 Bedroom',
    opt4br: '4+ Bedroom',
    optSelfPack: 'Self-pack',
    optProPack: 'Pro packing (+$300-$800)',
    optReleased: 'Basic (included)',
    optFull: 'Full value protection',
    calculate: 'Calculate',
    clear: 'Clear',
    resLowest: 'Best Option',
    resTruck: 'DIY Truck',
    resMovers: 'Full-Service',
    resPod: 'Container / Pod',
    optTruck: 'DIY Truck Rental',
    optMovers: 'Full-Service Movers',
    optPod: 'Container (PODS)',
    optBest: '✓ Cheapest',
    bdSupplies: '📦 Packing Supplies',
    bdFuel: '⛽ Fuel (truck)',
    bdTruckRental: '🚚 Truck Rental',
    bdLabor: '💪 Mover Labor',
    bdTravel: '🛣️ Travel & Lodging',
    bdStorage: '📦 Storage',
    bdInsurance: '🛡️ Insurance',
    bdMisc: '🧳 Misc',
    bdTotal: 'Total',
    step1: 'Enter your move distance and home size',
    step2: 'Pick packing service, storage and insurance level',
    step3: 'Add travel, lodging and any misc costs',
    step4: 'Compare DIY truck, full-service movers and containers side by side',
  },
  zh: {
    toolTitle: '搬家费用计算器',
    toolDesc: '并排对比 DIY 卡车租赁、全包搬家公司和便携集装箱的搬家费用。输入距离、房屋大小和附加服务，查看最省钱的方案。',
    distance: '搬家距离（英里）',
    homesize: '房屋大小',
    packers: '打包服务',
    storage: '仓储（天数 × 日费）',
    insurance: '保险',
    extras: '旅行/酒店/其他（$）',
    optStudio: '单间',
    opt1br: '一居室',
    opt2br: '两居室',
    opt3br: '三居室',
    opt4br: '四居及以上',
    optSelfPack: '自己打包',
    optProPack: '专业打包（+$300-$800）',
    optReleased: '基础（含）',
    optFull: '全额保障',
    calculate: '计算',
    clear: '清空',
    resLowest: '最优方案',
    resTruck: 'DIY 卡车',
    resMovers: '全包搬家',
    resPod: '集装箱',
    optTruck: 'DIY 卡车租赁',
    optMovers: '全包搬家公司',
    optPod: '集装箱（PODS）',
    optBest: '✓ 最便宜',
    bdSupplies: '📦 打包耗材',
    bdFuel: '⛽ 卡车油费',
    bdTruckRental: '🚚 卡车租赁',
    bdLabor: '💼 搬运工',
    bdTravel: '🛣️ 旅行与住宿',
    bdStorage: '📦 仓储',
    bdInsurance: '🛡️ 保险',
    bdMisc: '🧳 其他',
    bdTotal: '合计',
    step1: '输入搬家距离和房屋大小',
    step2: '选择打包服务、仓储和保险级别',
    step3: '添加旅行、住宿和其他费用',
    step4: '并排对比 DIY 卡车、全包搬家和集装箱',
  }
});

const { $, t } = GZ;

$('#lbl-distance').textContent = t('distance');
$('#lbl-homesize').textContent = t('homesize');
$('#lbl-packers').textContent = t('packers');
$('#lbl-storage').textContent = t('storage');
$('#lbl-insurance').textContent = t('insurance');
$('#lbl-extras').textContent = t('extras');
$('#opt-studio').textContent = t('optStudio');
$('#opt-1br').textContent = t('opt1br');
$('#opt-2br').textContent = t('opt2br');
$('#opt-3br').textContent = t('opt3br');
$('#opt-4br').textContent = t('opt4br');
$('#opt-self-pack').textContent = t('optSelfPack');
$('#opt-pro-pack').textContent = t('optProPack');
$('#opt-released').textContent = t('optReleased');
$('#opt-full').textContent = t('optFull');
$('#res-lowest-label').textContent = t('resLowest');
$('#res-truck-label').textContent = t('resTruck');
$('#res-movers-label').textContent = t('resMovers');
$('#res-pod-label').textContent = t('resPod');

// Approx room → weight (lbs) → multiplier
const HOME_MULT = { 1: 0.4, 2: 0.7, 3: 1.0, 4: 1.5, 5: 2.0 }; // multiplier vs 2BR baseline
const PACK_COST = { 1: 100, 2: 200, 3: 350, 4: 500, 5: 700 }; // supplies per home size
const PRO_PACK_ADD = { 1: 300, 2: 500, 3: 700, 4: 1000, 5: 1400 };

function money(n) { return '$' + Math.round(n).toLocaleString(); }

function calc() {
  const distance = Math.max(0, parseFloat($('#distance').value) || 0);
  const hs = parseInt($('#homesize').value);
  const mult = HOME_MULT[hs];
  const proPack = $('#packers').value === '1';
  const storage = Math.max(0, parseFloat($('#storage').value) || 0);
  const fullInsurance = $('#insurance').value === '1';
  const extras = Math.max(0, parseFloat($('#extras').value) || 0);

  const supplies = proPack ? PACK_COST[hs] * 0.5 : PACK_COST[hs];
  const proPackCost = proPack ? PRO_PACK_ADD[hs] : 0;

  // Option 1: DIY Truck
  // Base truck rental + mileage + fuel (truck ~8 MPG)
  const isLocal = distance <= 50;
  const truckBase = isLocal ? 30 : 200 + distance * 0.8 * mult;
  const truckMiles = isLocal ? 60 : distance * 2;
  const truckMileage = isLocal ? truckMiles * 0.99 : 0; // included for one-way
  const truckFuelGallons = truckMiles / 8;
  const truckFuel = truckFuelGallons * 3.50;
  const truckTotal = supplies + truckBase + truckMileage + truckFuel + extras + (fullInsurance ? 80 : 0);

  // Option 2: Full-Service Movers
  // Local: hourly rate by home size; Long-distance: by weight × distance
  let moversLabor;
  if (isLocal) {
    const hoursBySize = { 1: 3, 2: 5, 3: 7, 4: 10, 5: 13 };
    moversLabor = hoursBySize[hs] * 3 * 50; // 3 movers × $50/hr × hours
  } else {
    // weight-based: $0.50-$0.70 per pound-mile equivalent
    const weightLbs = 3500 * mult; // 2BR ~ 3500 lbs
    moversLabor = weightLbs * (distance / 1000) * 0.55 + 600 * mult; // base truck fee
  }
  const moversTotal = moversLabor + proPackCost + extras + storage + (fullInsurance ? moversLabor * 0.03 : 0) + supplies * 0.3;

  // Option 3: Portable Container (PODS, U-Pack)
  // # containers based on home size, transport fee by distance
  const containers = Math.max(1, Math.ceil(mult * 2));
  const containerRate = 150 * containers; // per month
  const transport = isLocal ? 100 * containers : distance * 1.2 * containers;
  const podTotal = containerRate + transport + supplies + extras + storage * 0.7 + (fullInsurance ? 100 * containers : 0);

  const options = [
    { key: 'truck', icon: '🚚', name: t('optTruck'), price: truckTotal, rows: [
      ['bdSupplies', supplies],
      ['bdTruckRental', truckBase + truckMileage],
      ['bdFuel', truckFuel],
      ['bdTravel', extras],
      ['bdInsurance', fullInsurance ? 80 : 0],
    ]},
    { key: 'movers', icon: '🚛', name: t('optMovers'), price: moversTotal, rows: [
      ['bdLabor', moversLabor],
      ['bdSupplies', proPackCost + supplies * 0.3],
      ['bdTravel', extras],
      ['bdStorage', storage],
      ['bdInsurance', fullInsurance ? moversLabor * 0.03 : 0],
    ]},
    { key: 'pod', icon: '📦', name: t('optPod'), price: podTotal, rows: [
      ['bdTruckRental', containerRate],
      ['bdFuel', transport],
      ['bdSupplies', supplies],
      ['bdTravel', extras],
      ['bdStorage', storage * 0.7],
      ['bdInsurance', fullInsurance ? 100 * containers : 0],
    ]},
  ];

  const lowest = Math.min(truckTotal, moversTotal, podTotal);

  $('#compare').innerHTML = options.map(o =>
    `<div class="gz-opt ${o.price === lowest ? 'best' : ''}">
      <div class="icon">${o.icon}</div>
      <div class="name">${o.name}</div>
      <div class="price">${money(o.price)}</div>
      ${o.price === lowest ? `<div class="badge">${t('optBest')}</div>` : ''}
    </div>`
  ).join('');

  $('#res-lowest').textContent = money(lowest);
  $('#res-truck').textContent = money(truckTotal);
  $('#res-movers').textContent = money(moversTotal);
  $('#res-pod').textContent = money(podTotal);

  // Show detailed breakdown of the cheapest option
  const cheapest = options.find(o => o.price === lowest);
  $('#breakdown').innerHTML = cheapest.rows.map(([k, v]) =>
    v > 0 ? `<div class="row"><span>${t(k)}</span><span>${money(v)}</span></div>` : ''
  ).join('') + `<div class="row total"><span>${t('bdTotal')}</span><span>${money(cheapest.price)}</span></div>`;

  $('#results').style.display = 'block';
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="calc()">${t('calculate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="document.getElementById('results').style.display='none'">${t('clear')}</button>`;

calc();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🏠', href:'/calc/mortgage-calculator.html', name:'Mortgage'},
    {icon:'💰', href:'/calc/budget-planner.html', name:'Budget Planner'},
    {icon:'🏷️', href:'/calc/loan-calculator.html', name:'Loan Calculator'},
    {icon:'🚗', href:'/calc/car-affordability-calculator.html', name:'Car Affordability'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
