const htmlTags = new Set(['div','span','p','a','img','ul','ol','li','table','tr','td','th','thead','tbody','tfoot','form','input','button','label','select','option','textarea','fieldset','legend','h1','h2','h3','h4','h5','h6','header','footer','nav','main','section','article','aside','figure','figcaption','details','summary','dialog','canvas','svg','video','audio','source','track','iframe','embed','object','param','picture','map','area','br','hr','wbr','b','i','strong','em','mark','small','del','ins','sub','sup','code','pre','samp','kbd','var','blockquote','q','cite','abbr','address','bdi','bdo','time','data','ruby','rt','rp','bdi','caption','col','colgroup','title','meta','link','style','script','base','head','body','html']);

function toPascalCase(str) {
  return str.replace(/(^|[-_])([a-z])/g, (_, sep, c) => c.toUpperCase())
            .replace(/^(.)/, c => c.toUpperCase());
}

function getTagAndName(selector) {
  selector = selector.trim();
  // ID selector
  if (selector.startsWith('#')) {
    const name = selector.slice(1);
    return { tag: 'div', name: toPascalCase(name) };
  }
  // Class selector
  if (selector.startsWith('.')) {
    const name = selector.slice(1).split(/[\s:>+~]/)[0];
    return { tag: 'div', name: toPascalCase(name) };
  }
  // Element selector
  const tagMatch = selector.match(/^([a-zA-Z][\w-]*)/);
  if (tagMatch) {
    const tag = tagMatch[1].toLowerCase();
    const validTag = htmlTags.has(tag) ? tag : 'div';
    // Check for class/ID after element
    const rest = selector.slice(tagMatch[1].length);
    if (rest.startsWith('.')) {
      const name = rest.slice(1).split(/[\s:>+~]/)[0];
      return { tag: validTag, name: toPascalCase(name) };
    }
    if (rest.startsWith('#')) {
      const name = rest.slice(1);
      return { tag: validTag, name: toPascalCase(name) };
    }
    return { tag: validTag, name: toPascalCase(validTag) };
  }
  return { tag: 'div', name: 'Styled' };
}

function camelCaseProp(prop) {
  if (!opts.camel) return prop;
  return prop.replace(/-([a-z])/g, (_, c) => c.toUpperCase());
}

function convertCSSToStyled(css) {
  const components = [];
  let importAdded = false;

  // Parse CSS rules
  const ruleRegex = /([^{}]+)\{([^}]*)\}/g;
  let match;
  const usedNames = new Set();

  while ((match = ruleRegex.exec(css)) !== null) {
    let selector = match[1].trim();
    let body = match[2].trim();

    if (!selector || !body) continue;

    // Skip @media, @keyframes for now, handle separately
    if (selector.startsWith('@')) {
      // Extract media query content
      const innerRules = body;
      if (selector.startsWith('@media')) {
        // Re-parse inner rules
        const innerRegex = /([^{}]+)\{([^}]*)\}/g;
        let innerMatch;
        while ((innerMatch = innerRegex.exec(innerRules)) !== null) {
          const innerSel = innerMatch[1].trim();
          const innerBody = innerMatch[2].trim();
          if (innerSel && innerBody && !innerSel.startsWith('@')) {
            const { tag, name } = getTagAndName(innerSel);
            let uniqueName = name;
            let counter = 2;
            while (usedNames.has(uniqueName)) { uniqueName = name + counter++; }
            usedNames.add(uniqueName);
            const camelBody = innerBody.split(';').map(s => s.trim()).filter(Boolean)
              .map(line => {
                const idx = line.indexOf(':');
                if (idx < 0) return line;
                const prop = line.slice(0, idx).trim();
                const val = line.slice(idx + 1).trim();
                return `  ${camelCaseProp(prop)}: ${val};`;
              }).join('\n');
            components.push(`const ${uniqueName} = styled.${tag}\`\n@media ${selector.replace('@media ','')} {\n${camelBody}\n}\n\`;`);
          }
        }
      }
      continue;
    }

    // Handle compound selectors — take first
    const primarySelector = selector.split(',')[0].trim();
    const { tag, name } = getTagAndName(primarySelector);

    let uniqueName = name;
    let counter = 2;
    while (usedNames.has(uniqueName)) { uniqueName = name + counter++; }
    usedNames.add(uniqueName);

    // Handle pseudo-classes
    const pseudoMatch = primarySelector.match(/:([a-z-]+)$/);
    let styledBody = '';

    const camelBody = body.split(';').map(s => s.trim()).filter(Boolean)
      .map(line => {
        const idx = line.indexOf(':');
        if (idx < 0) return line;
        const prop = line.slice(0, idx).trim();
        const val = line.slice(idx + 1).trim();
        return `  ${camelCaseProp(prop)}: ${val};`;
      }).join('\n');

    if (pseudoMatch) {
      const pseudo = pseudoMatch[1];
      styledBody = `const ${uniqueName} = styled.${tag}\`\n&:${pseudo} {\n${camelBody}\n}\n\`;`;
    } else {
      styledBody = `const ${uniqueName} = styled.${tag}\`\n${camelBody}\n\`;`;
    }

    components.push(styledBody);
  }

  let output = '';
  if (opts.importStmt) {
    output += "import styled from 'styled-components';\n\n";
  }
  output += components.join('\n\n');

  if (opts.ts) {
    output = output.replace(/styled\.([a-zA-Z]+)/g, 'styled.$1<any>');
  }

  return output;
}

function doConvert() {
  const inp = $('#input').value.trim();
  if (!inp) { $('#output').textContent = ''; $('#status').innerHTML = ''; return; }
  try {
    const result = convertCSSToStyled(inp);
    const count = (result.match(/const \w+ = styled/g) || []).length;
    $('#output').textContent = result;
    $('#status').innerHTML = `<span style="color:var(--gz-success)">✓ Generated ${count} styled component${count!==1?'s':''}</span>`;
  } catch(e) {
    $('#output').textContent = '';
    $('#status').innerHTML = `<span style="color:var(--gz-accent)">Error: ${e.message}</span>`;
  }
}
