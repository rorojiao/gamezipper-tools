const { $, copyText, t } = GZ;
let mode = 'essay';
const modes = ['essay','blog','research','presentation','meeting'];
const modeKeys = {essay:'essay',blog:'blog',research:'research',presentation:'presentation',meeting:'meeting'};

$('#mode-tabs').innerHTML = modes.map(m =>
  `<button class="mode-tab${m===mode?' active':''}" data-mode="${m}">${t(modeKeys[m])}</button>`
).join('');

document.querySelectorAll('.mode-tab').forEach(btn => {
  btn.addEventListener('click', () => {
    mode = btn.dataset.mode;
    document.querySelectorAll('.mode-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  });
});

$('#lbl-topic').textContent = t('topic');
$('#lbl-points').textContent = t('points');
$('#topic').placeholder = mode === 'meeting' ? 'e.g., Q3 Planning Review' : 'e.g., Climate Change Solutions';

function generate() {
  const topic = $('#topic').value.trim();
  if (!topic) { $('#output').innerHTML = `<p style="color:var(--text2)">${t('enterTopic')}</p>`; return; }
  const pts = $('#points').value.trim().split('\n').filter(l => l.trim());
  let html = `<h2>${topic}</h2>`;

  function section(title, items) {
    return `<div class="section"><h3>${title}</h3>${items.map(i => `<p>• ${i}</p>`).join('')}</div>`;
  }

  if (mode === 'essay') {
    html += section(t('intro'), [t('hook'), t('thesis') + ': ' + topic, t('roadmap')]);
    if (pts.length) {
      pts.forEach((p, i) => {
        html += section(`${t('body')} ${i+1}: ${p}`, [t('claim') + ': ' + p, t('evidence'), t('analysis'), t('transition')]);
      });
    } else {
      for (let i = 1; i <= 3; i++) {
        html += section(`${t('body')} ${i}`, [t('claim'), t('evidence'), t('analysis'), t('transition')]);
      }
    }
    html += section(t('conclusion'), [t('summarize'), t('implications'), t('callToAction')]);
  } else if (mode === 'blog') {
    html += section(t('intro'), [t('hookBlog'), t('overview')]);
    if (pts.length) {
      pts.forEach(p => {
        html += section(`${t('subheading')}: ${p}`, [p, t('keyTakeaway')]);
      });
    } else {
      for (let i = 1; i <= 3; i++) {
        html += section(`${t('subheading')} ${i}`, ['Key content point', t('keyTakeaway')]);
      }
    }
    html += section(t('conclusion'), [t('summary'), t('closing')]);
  } else if (mode === 'research') {
    html += section(t('abstract'), [topic + ' — brief summary']);
    html += section(t('intro'), [t('background'), t('gap'), t('thesis')]);
    html += section(t('litReview'), [t('existing'), t('comparison')]);
    html += section(t('methodology'), [t('design'), t('sample'), t('limitations')]);
    html += section(t('results'), [t('findings'), t('interpretation')]);
    html += section(t('conclusion'), [t('summarize'), t('futureWork')]);
  } else if (mode === 'presentation') {
    html += section(`${t('slide')} 1`, [t('titleSlide')]);
    html += section(`${t('slide')} 2`, [t('agendaSlide')]);
    const n = pts.length || 3;
    for (let i = 0; i < n; i++) {
      html += section(`${t('slide')} ${i+3}: ${pts[i] || t('contentSlide') + ' ' + (i+1)}`, [t('bullets'), t('visual')]);
    }
    html += section(`${t('slide')} ${n+3}`, [t('summarySlide')]);
    html += section(`${t('slide')} ${n+4}`, [t('qaSlide')]);
  } else {
    html += section(t('meetingGoal'), [topic]);
    html += section(t('attendees'), ['List attendees and roles']);
    const n = pts.length || 3;
    for (let i = 0; i < n; i++) {
      html += section(`${t('agendaItem')} ${i+1}: ${pts[i] || 'Topic ' + (i+1)}`, [t('discussion'), t('decision')]);
    }
    html += section(t('nextSteps'), ['Action items with owners and deadlines']);
  }

  $('#output').innerHTML = html;
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="generate()">${t('generate')}</button>
  <button class="gz-btn" onclick="copyText($('#output').innerText)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#topic').value='';$('#points').value='';$('#output').innerHTML=''">${t('clear')}</button>`;
