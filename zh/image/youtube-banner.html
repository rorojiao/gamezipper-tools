    download: '下载 PNG',
    lblText: '频道名 / 主标题', lblSub: '标语（可选）',
    lblAlign: '文字对齐', lblOverlay: '照片遮罩',
    lblColor1: '渐变颜色 1', lblColor2: '渐变颜色 2',
    lblTextColor: '文字颜色', lblSafe: '安全区参考线',
    lblPhoto: '背景照片（可选）',
    lblPhotoHelp: '上传的照片只保存在你的浏览器中 — 不会发送到任何服务器。',
    lblLogo: '频道 Logo（可选）', lblTheme: '快速主题',
    step1: '输入频道名和可选标语',
    step2: '将所有文字保留在虚线安全区内，确保在所有设备上显示',
    step3: '选择渐变主题，或上传背景照片和 Logo',
    step4: '点击「下载 PNG」并上传到 YouTube 工作室 → 自定义',
  }
});

const { $, t } = GZ;

const THEMES = [
  ['#ff0000','#282828'],['#667eea','#764ba2'],['#f12711','#f5af19'],
  ['#00c6ff','#0072ff'],['#11998e','#38ef7d'],['#fc466b','#3f5efb'],
  ['#ee0979','#ff6a00'],['#0f2027','#2c5364'],['#c31432','#240b36'],
  ['#00d2ff','#3a47d5'],['#f7971e','#ffd200'],['#000000','#434343'],
];

let photoImg = null, logoImg = null;

function wrapLines(ctx,text,maxW){
  const words=text.split(' ');let line='';const lines=[];
  for(const w of words){const test=line?line+' '+w:w;if(ctx.measureText(test).width>maxW&&line){lines.push(line);line=w}else line=test}
  if(line)lines.push(line);
  return lines;
}

function render(){
  const c=$('#canvas'),ctx=c.getContext('2d');
  // YouTube official size, fixed
  c.width=2560;c.height=1440;
  const W=c.width,H=c.height;
  const c1=$('#color1').value,c2=$('#color2').value;
  const text=$('#channelText').value||'Channel';
  const sub=$('#subText').value;
  const tc=$('#textColor').value;
  const align=$('#align').value;
  const overlay=parseFloat($('#overlay').value);
  // Safe area: 1546x423 horizontally centered, vertically centered
  const safeW=1546, safeH=423;
  const safeX=(W-safeW)/2, safeY=(H-safeH)/2;

  // Background
  if(photoImg){
    const ir=photoImg.width/photoImg.height, cr=W/H;
    let dw,dh,dx,dy;
    if(ir>cr){ dh=H; dw=H*ir; dx=(W-dw)/2; dy=0; }
    else { dw=W; dh=W/ir; dx=0; dy=(H-dh)/2; }
    ctx.drawImage(photoImg,dx,dy,dw,dh);
    if(overlay>0){ ctx.fillStyle=`rgba(0,0,0,${overlay})`; ctx.fillRect(0,0,W,H); }
  } else {
    const grad=ctx.createLinearGradient(0,0,W,H);
    grad.addColorStop(0,c1);grad.addColorStop(1,c2);
    ctx.fillStyle=grad; ctx.fillRect(0,0,W,H);
    ctx.fillStyle='rgba(255,255,255,0.05)';
    for(let i=0;i<W+H;i+=120){ ctx.beginPath();ctx.arc((i*1.3)%W,(i*0.7)%H,3,0,Math.PI*2);ctx.fill(); }
  }

  // Text inside safe area
  ctx.textAlign=align;
  ctx.textBaseline='middle';
  const cx=safeX+safeW/2, cy=safeY+safeH/2;
  const tx=align==='left'?safeX+30:align==='right'?safeX+safeW-30:cx;
  // If logo present, shift text right a bit when left-aligned
  let textLeftPad = (align==='left' && logoImg) ? 360 : 0;
  const txAdj = align==='left'?safeX+30+textLeftPad:tx;

  ctx.fillStyle=tc;
  ctx.shadowColor='rgba(0,0,0,0.5)'; ctx.shadowBlur=24; ctx.shadowOffsetY=6;
  let fs=Math.min(safeH*0.5,200);
  ctx.font=`900 ${fs}px Arial Black, sans-serif`;
  const maxW=safeW-60-textLeftPad;
  while(ctx.measureText(text).width>maxW&&fs>24){fs-=4;ctx.font=`900 ${fs}px Arial Black, sans-serif`}
  const titleLines=wrapLines(ctx,text,maxW);
  const tcy=sub?cy-safeH*0.12:cy;
  titleLines.forEach((ln,i)=>{
    ctx.fillText(ln,txAdj,tcy-(titleLines.length-1)*fs*0.55+i*fs*1.1);
  });
  ctx.shadowColor='transparent'; ctx.shadowBlur=0; ctx.shadowOffsetY=0;

  if(sub){
    ctx.font=`400 ${Math.min(safeH*0.2,48)}px Verdana, sans-serif`;
    ctx.globalAlpha=0.95;
    const subLines=wrapLines(ctx,sub,maxW);
    subLines.forEach((ln,i)=>{
      ctx.fillText(ln,txAdj,cy+safeH*0.25+i*safeH*0.22);
    });
    ctx.globalAlpha=1;
  }

  // Logo inside safe area, left aligned
  if(logoImg){
    const lh=safeH*0.78, lw=logoImg.width/logoImg.height*lh;
    ctx.save();
    ctx.beginPath();
    const lx=safeX+30, ly=cy-lh/2;
    // rounded clip
    const r=Math.min(lh,lw)*0.18;
    ctx.moveTo(lx+r,ly);
    ctx.arcTo(lx+lw,ly,lx+lw,ly+lh,r);
    ctx.arcTo(lx+lw,ly+lh,lx,ly+lh,r);
    ctx.arcTo(lx,ly+lh,lx,ly,r);
    ctx.arcTo(lx,ly,lx+lw,ly,r);
    ctx.closePath();
    ctx.clip();
    ctx.drawImage(logoImg,lx,ly,lw,lh);
    ctx.restore();
  }

  // Safe area guide
  if($('#safeArea').value==='1'){
    ctx.save();
    ctx.strokeStyle='rgba(255,255,255,0.85)';
    ctx.setLineDash([16,12]); ctx.lineWidth=4;
    ctx.strokeRect(safeX,safeY,safeW,safeH);
    ctx.restore();
  }
}

function downloadPNG(){
  // Hide guide for export
  const prev=$('#safeArea').value;
  $('#safeArea').value='0'; render();
  const link=document.createElement('a');
  const name=($('#channelText').value||'youtube-banner').replace(/[^a-zA-Z0-9]/g,'_').toLowerCase()||'youtube-banner';
  link.download=name+'-channel-art.png';
  link.href=$('#canvas').toDataURL('image/png');
  link.click();
  $('#safeArea').value=prev; render();
}

function loadImage(e,target){
  const file=e.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=ev=>{
    const img=new Image();
    img.onload=()=>{ if(target==='photo') photoImg=img; else logoImg=img; render(); };
    img.src=ev.target.result;
  };
  reader.readAsDataURL(file);
}

$('#themes').innerHTML=THEMES.map((p,i)=>`<button data-i="${i}" style="background:linear-gradient(135deg,${p[0]},${p[1]})" title="${p[0]} → ${p[1]}"></button>`).join('');
$('#themes').addEventListener('click',e=>{
  const b=e.target.closest('button'); if(!b) return;
  const p=THEMES[+b.dataset.i];
  $('#color1').value=p[0]; $('#color2').value=p[1];
  photoImg=null; $('#photo').value='';
  $('#themes').querySelectorAll('button').forEach(x=>x.classList.remove('active'));
  b.classList.add('active');
  render();
});

$('#lbl-text').textContent=t('lblText');
$('#lbl-sub').textContent=t('lblSub');
$('#lbl-align').textContent=t('lblAlign');
$('#lbl-overlay').textContent=t('lblOverlay');
$('#lbl-color1').textContent=t('lblColor1');
$('#lbl-color2').textContent=t('lblColor2');
$('#lbl-text-color').textContent=t('lblTextColor');
$('#lbl-safe').textContent=t('lblSafe');
$('#lbl-photo').textContent=t('lblPhoto');
$('#lbl-photo-help').textContent=t('lblPhotoHelp');
$('#lbl-logo').textContent=t('lblLogo');
$('#lbl-theme').textContent=t('lblTheme');

['channelText','subText','color1','color2','textColor'].forEach(id=>$('#'+id).addEventListener('input',render));
['align','overlay','safeArea'].forEach(id=>$('#'+id).addEventListener('change',render));
$('#photo').addEventListener('change',e=>loadImage(e,'photo'));
$('#logo').addEventListener('change',e=>loadImage(e,'logo'));

render();

$('#toolbar').innerHTML=`
  <button class="gz-btn" onclick="downloadPNG()">⬇️ ${t('download')}</button>`;

  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],

    {icon:'🖼️', href:'/image/facebook-cover.html', name:'Facebook Cover Maker'},
    {icon:'🎨', href:'/image/logo-maker.html', name:'Logo Maker'},
    {icon:'🖼️', href:'/image/poster-maker.html', name:'Poster Maker'},
  ]

</script>
