<script>
GZI18n.register({
  en: {
    toolTitle: 'Text Simplifier & Plain English Converter',
    toolDesc: 'Simplify complex text into plain English. Replace hard words with simpler alternatives, shorten sentences and remove filler. Make any text easier to read — free, browser-only.',

    step2: 'Toggle word, sentence and filler simplification options',
    step3: 'Review the simplified output and the highlighted changes',
    step4: 'Copy the plain English result to use anywhere',
  },
  zh: {
    toolTitle: '文本简化器 / 简明英语转换器',
    toolDesc: '将复杂文本简化为简明英语。用更简单的词替换难词，缩短句子，移除填充词。让任何文本更易读 — 免费、浏览器本地运行。',
    optWords: '简化词汇',
    optSentences: '缩短句子',
    optFiller: '移除填充词',
    input: '你的文本',
    output: '简化后的文本',
    words: '词数',
    sentences: '句数',
    avgSentence: '平均词/句',
    reductions: '替换词数',
    step1: '将文本粘贴到左侧输入框',
    step2: '切换词汇、句子和填充词简化选项',
    step3: '查看简化结果和高亮的改动',
    step4: '复制简明英语结果使用',
  }
});

const { $, copyText, t } = GZ;

$('#opt-words-l').textContent = t('optWords');
$('#opt-sentences-l').textContent = t('optSentences');
$('#opt-filler-l').textContent = t('optFiller');
$('#lbl-in').textContent = t('input');
$('#lbl-out').textContent = t('output');

// Complex -> simple word replacements (200+)
const REPLACEMENTS = {
  'utilize':'use','utilized':'used','utilizes':'uses','utilizing':'using',
  'facilitate':'help','facilitates':'helps','facilitated':'helped',
  'demonstrate':'show','demonstrates':'shows','demonstrated':'showed','demonstrating':'showing',
  'subsequently':'later','consequently':'so','furthermore':'also','moreover':'also','nevertheless':'still','nonetheless':'still',
  'approximately':'about','sufficient':'enough','insufficient':'not enough',
  'additional':'more','additionally':'also','numerous':'many','predominantly':'mostly',
  'individuals':'people','individual':'person','commence':'start','commenced':'started','commencing':'starting',
  'terminate':'end','terminated':'ended','terminating':'ending',
  'endeavor':'try','endeavors':'tries','endeavored':'tried',
  'ascertain':'find out','ascertained':'found out',
  'endeavour':'try','endeavours':'tries',
  'purchase':'buy','purchased':'bought','purchasing':'buying',
  'obtain':'get','obtained':'got','obtaining':'getting',
  'require':'need','requires':'needs','required':'needed','requiring':'needing',
  'assist':'help','assists':'helps','assisted':'helped','assistance':'help','assisting':'helping',
  'regarding':'about','concerning':'about','respecting':'about',
  'prior':'before','prior to':'before','subsequent':'later','subsequent to':'after',
  'in order to':'to','in the event that':'if','in the event of':'if',
  'due to the fact that':'because','owing to the fact that':'because','for the reason that':'because',
  'notwithstanding':'despite','notwithstanding that':'although',
  'in accordance with':'following','in compliance with':'following',
  'remuneration':'pay','compensation':'pay','remunerate':'pay',
  'ameliorate':'improve','deteriorate':'worsen','exacerbate':'worsen','mitigate':'reduce','alleviate':'ease',
  'expedite':'speed up','expedites':'speeds up','expedited':'sped up',
  'elucidate':'explain','elucidates':'explains','elucidated':'explained',
  'elaborate':'add detail','elaborates':'adds detail','elaborated':'added detail',
  'cognizant':'aware','cognizance':'awareness',
  'disseminate':'share','disseminates':'shares','disseminated':'shared','dissemination':'sharing',
  'formulate':'create','formulates':'creates','formulated':'created','formulating':'creating',
  'implement':'do','implements':'does','implemented':'did','implementing':'doing','implementation':'doing',
  'indicate':'show','indicates':'shows','indicated':'showed','indicating':'showing',
  'initiate':'start','initiates':'starts','initiated':'started','initiating':'starting','initiation':'start',
  'inquire':'ask','inquires':'asks','inquired':'asked','inquiring':'asking','inquiry':'question',
  'necessitate':'need','necessitates':'needs','necessitated':'needed',
  'optimize':'improve','optimizes':'improves','optimized':'improved','optimizing':'improving',
  'pertaining':'about','pertaining to':'about',
  'proceed':'go','proceeds':'goes','proceeded':'went','proceeding':'going',
  'constitute':'make up','constitutes':'makes up','constituted':'made up',
  'preclude':'prevent','precludes':'prevents','precluded':'prevented',
  'remit':'send','remittance':'payment',
  'transparent':'clear','transparency':'openness',
  'verbalize':'say','verbalizes':'says',
  'operative':'working','viability':'feasibility','viable':'workable',
  'magnitude':'size','magnitude of':'size of',
  'proximity':'closeness','in proximity to':'near',
  'allocate':'give','allocates':'gives','allocated':'gave','allocation':'giving',
  'alternative':'choice','alternatively':'or','alternatives':'choices',
  'modification':'change','modifications':'changes','modify':'change','modifies':'changes','modified':'changed',
  'notified':'told','notify':'tell','notifies':'tells','notification':'notice',
  'optimal':'best','optimally':'best',
  'parameters':'limits','parameter':'limit',
  'principle':'rule','principles':'rules',
  'strategy':'plan','strategies':'plans','strategic':'planned',
  'perspective':'view','perspectives':'views',
  'methodology':'method','methodologies':'methods',
  'component':'part','components':'parts',
  'concept':'idea','concepts':'ideas','conceptual':'idea-based',
  'criteria':'rules','criterion':'rule',
  'fundamental':'basic','fundamentals':'basics','fundamentally':'basically',
  'objective':'goal','objectives':'goals',
  'predominant':'main','predominantly':'mostly',
  'preliminary':'first','primarily':'mostly','primary':'main',
  'provision':'supply','provisions':'supplies',
  'rationale':'reason','rationales':'reasons',
  'specific':'exact','specifically':'exactly',
  'statute':'law','statutes':'laws','statutory':'legal',
  'subsequent':'next','subsequently':'later',
  'sufficient':'enough','sufficiently':'enough',
  'summarize':'sum up','summarizes':'sums up','summarized':'summed up',
  'tentative':'unsure','tentatively':'uncertainly',
  'validate':'check','validates':'checks','validated':'checked','validation':'checking',
  'whereas':'while','whereupon':'then',
  'witnessed':'saw','witness':'see',
  'yearned':'wanted','yearn':'want',
  'zealous':'eager','zeal':'eagerness',
  'consequently':'so','hence':'so','thus':'so','therefore':'so',
  'nevertheless':'however','nonetheless':'however',
  'inasmuch as':'since','insofar as':'as far as',
  'notwithstanding':'despite','notwithstanding that':'although',
};

const FILLERS = /\b(basically|actually|honestly|frankly|literally|virtually|essentially|fundamentally|generally speaking|in general|as a matter of fact|to be honest|at the end of the day|when all is said and done|for all intents and purposes|it goes without saying that|it should be noted that|needless to say|in today\'s society|in the modern world|since the beginning of time)\b[,\s]*/gi;

let reductions = 0;
let diffParts = [];

function simplify() {
  let text = $('#input').value;
  diffParts = [];
  reductions = 0;

  if (!text.trim()) {
    $('#output').value = '';
    $('#stats').innerHTML = '';
    $('#diff').innerHTML = '';
    return;
  }

  if ($('#opt-filler').checked) {
    text = text.replace(FILLERS, '');
  }

  if ($('#opt-words').checked) {
    for (const [complex, simple] of Object.entries(REPLACEMENTS)) {
      const re = new RegExp('\\b' + complex.replace(/'/g, "'") + '\\b', 'gi');
      text = text.replace(re, (m) => {
        reductions++;
        diffParts.push({from: m, to: preserveCase(m, simple)});
        return preserveCase(m, simple);
      });
    }
  }

  if ($('#opt-sentences').checked) {
    // Split very long sentences (>30 words) at conjunctions
    text = text.replace(/([.!?])\s+/g, '$1\n').split('\n').map(line => {
      const words = line.trim().split(/\s+/);
      if (words.length > 30) {
        const mid = Math.floor(words.length / 2);
        // find nearest "and"/"but" near middle
        for (let i = mid; i < words.length; i++) {
          if (/^(and|but|so|because|while|which|that)$/i.test(words[i])) {
            words[i-1] = words[i-1].replace(/[,;]$/, '.') + '.';
            return words.slice(0, i).join(' ') + ' ' + words.slice(i).join(' ');
          }
        }
      }
      return line;
    }).join(' ');
  }

  $('#output').value = text;

  // Stats
  const inWords = $('#input').value.trim().split(/\s+/).filter(Boolean).length;
  const outWords = text.trim().split(/\s+/).filter(Boolean).length;
  const sentences = (text.match(/[.!?]+/g) || []).length || 1;
  $('#stats').innerHTML = `<span>${t('words')}: <b>${inWords}</b> → <b>${outWords}</b></span><span>${t('sentences')}: <b>${sentences}</b></span><span>${t('avgSentence')}: <b>${(outWords/sentences).toFixed(1)}</b></span><span>${t('reductions')}: <b>${reductions}</b></span>`;

  // Diff
  if (diffParts.length) {
    $('#diff').innerHTML = '<b>' + t('reductions') + ':</b><br>' + diffParts.slice(0, 30).map(d => `<del>${d.from}</del> → <ins>${d.to}</ins>`).join(',&nbsp; ');
  } else {
    $('#diff').innerHTML = '<i style="color:var(--text2)">No word-level changes. Try toggling options or paste different text.</i>';
  }
}

function preserveCase(original, replacement) {
  if (original[0] === original[0].toUpperCase()) {
    return replacement[0].toUpperCase() + replacement.slice(1);
  }
  return replacement;
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="copyText($('#output').value)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#input').value='';simplify()">${t('clear')}</button>`;

function loadExample() {
  $('#input').value = 'Subsequent to the implementation of the new methodology, we observed a substantial amelioration in the overall efficiency. It should be noted that the utilization of additional resources was necessitated. Furthermore, the team will endeavor to facilitate a more optimal outcome in the forthcoming quarter.';
  simplify();
}

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📖', href:'/text/readability-checker.html', name:'Readability'},
    {icon:'✍️', href:'/text/passive-to-active.html', name:'Passive→Active'},
    {icon:'🔁', href:'/text/text-paraphraser.html', name:'Paraphraser'},
    {icon:'📏', href:'/text/word-counter.html', name:'Word Counter'},
  ]
});
</script>
