<script>
GZI18n.register({
  en: {
    toolTitle: 'Random Word Generator',
    toolDesc: 'Generate random English words for writing prompts, brainstorming, games and vocabulary practice. Filter by type, length and starting letter.',
    lblCount: 'Number of Words',
    lblType: 'Word Type',
    lblLength: 'Word Length',
    lblLetter: 'Starts With (optional)',
    optAll: 'All Words',
    optNoun: 'Noun',
    optVerb: 'Verb',
    optAdj: 'Adjective',
    optAny: 'Any Length',
    generate: 'Generate',
    copy: 'Copy All',
    copied: 'Copied!',
    emptyMsg: 'No words match your filters. Try loosening them.',
    statsWords: 'words generated',
    step1: 'Pick how many words you want (1–100)',
    step2: 'Choose a word type — all, nouns, verbs or adjectives',
    step3: 'Optionally filter by word length or starting letter',
    step4: 'Click Generate, then click any word chip to copy it',
  },
  zh: {
    toolTitle: '随机单词生成器',
    toolDesc: '为写作灵感、头脑风暴、游戏和词汇练习生成随机英文单词。可按类型、长度和首字母筛选。',
    lblCount: '单词数量',
    lblType: '词性',
    lblLength: '单词长度',
    lblLetter: '首字母（可选）',
    optAll: '全部',
    optNoun: '名词',
    optVerb: '动词',
    optAdj: '形容词',
    optAny: '任意长度',
    generate: '生成',
    copy: '复制全部',
    copied: '已复制！',
    emptyMsg: '没有符合条件的单词，请放宽筛选条件。',
    statsWords: '个单词',
    step1: '选择要生成的单词数量（1–100）',
    step2: '选择词性 — 全部、名词、动词或形容词',
    step3: '可选：按单词长度或首字母筛选',
    step4: '点击生成，然后点击任意单词复制它',
  }
});

const { $, t, copyText } = GZ;

$('#lbl-count').textContent = t('lblCount');
$('#lbl-type').textContent = t('lblType');
$('#lbl-length').textContent = t('lblLength');
$('#lbl-letter').textContent = t('lblLetter');
$('#opt-all').textContent = t('optAll');
$('#opt-noun').textContent = t('optNoun');
$('#opt-verb').textContent = t('optVerb');
$('#opt-adj').textContent = t('optAdj');
$('#opt-any').textContent = t('optAny');
$('#genBtn').textContent = t('generate');
$('#copyBtn').textContent = t('copy');
$('#emptyMsg').textContent = t('emptyMsg');

// Built-in curated word lists
const NOUNS = ["apple","river","mountain","elephant","castle","forest","guitar","window","planet","kettle","candle","pencil","jungle","engine","saddle","ribbon","galaxy","ticket","sandwich","whisper","pebble","bottle","feather","volcano","library","treasure","bicycle","garden","puppet","thunder","crystal","harbor","bridge","wallet","pillar","meadow","lantern","anchor","sweater","compass","penguin","cactus","balloon","jacket","meteor","sapphire","honey","dolphin","walnut","tornado","piano","carpet","meadow","feather","mosaic","carnival","parachute","oyster","shovel","icicle","glacier","mango","beacon","pillow","quilt","ribbon","tornado","biscuit","helmet","lantern","rooster","sandal","canvas","riddle","violin","walnut","feather","beaver","castle","fossil","jaguar","kitten","lobster","manor","nectar","orchid","pebble","quartz","razor","scarf","tulip","umbra","violet","walnut","xylophone","yogurt","zephyr","acorn","bishop","copper","dagger","ember","falcon","ginger","hammer","iguana","jasper","kingdom","ladder","marble","needle","ocean","pillow","quiver","rabbit","sailor","temple","urchin","vessel","willow","yonder","zebra"];
const VERBS = ["jump","whisper","dance","explore","gather","imagine","juggle","kneel","listen","murmur","notice","observe","paint","quench","remember","sing","travel","uncover","wander","x-ray","yell","zip","climb","bounce","sparkle","glide","amble","sprint","tumble","hover","plunge","rotate","scatter","gather","polish","deliver","capture","embrace","follow","create","imagine","launch","measure","navigate","open","pierce","question","respect","settle","tumble","unfold","vanish","whisper","accelerate","balance","climb","discover","explore","forecast","gather","harness","investigate","journey","kindle","linger","modify","negotiate","organize","pursue","qualify","refresh","simplify","transform","unite","verify","wander","accelerate","bounce","climb","deliver","embrace","flicker","gallop","hurry","ignite","juggle","knead","linger","mimic","nudge","orbit","plunge","quiver","race","soar","tremble","unfold","veer","whirl","yawn","zigzag"];
const ADJECTIVES = ["brave","silky","ancient","curious","golden","vibrant","mellow","fragrant","puzzled","whimsical","shimmering","cosmic","frozen","gentle","jolly","keen","lively","mystic","noble","optimistic","placid","quirky","radiant","serene","tranquil","upbeat","velvety","witty","youthful","zealous","azure","bright","calm","dazzling","eager","faithful","graceful","honest","innocent","jovial","kind","loyal","modest","naive","obedient","patient","quiet","reckless","sturdy","tidy","unique","vast","warm","zesty","amber","bubbly","clever","diligent","elegant","fierce","gleaming","humble","icy","jazzy","knotty","limber","misty","nostalgic","ornate","playful","quaint","robust","sparkly","tender","uneven","vivid","woolly","yearning","zigzag","ample","bold","crisp","deep","fair","grand","hazy","ivory","keen","lush","mellow","narrow","olive","pale","quixotic","rich","soft","tall","umbra","wide","young","zonal"];
const POS_MAP = { noun: NOUNS, verb: VERBS, adjective: ADJECTIVES };

function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function filterWords(list, length, letter) {
  let out = list;
  if (length > 0) {
    if (length >= 8) out = out.filter(w => w.length >= 8);
    else out = out.filter(w => w.length === length);
  }
  if (letter) {
    const l = letter.toLowerCase();
    out = out.filter(w => w.startsWith(l));
  }
  return out;
}

function generate() {
  const count = Math.max(1, Math.min(100, parseInt($('#count').value) || 1));
  const type = $('#type').value;
  const length = parseInt($('#length').value) || 0;
  const letter = $('#letter').value.trim().toLowerCase();

  let pool = type === 'all' ? [].concat(NOUNS, VERBS, ADJECTIVES) : (POS_MAP[type] || []);
  pool = filterWords(pool, length, letter);

  if (pool.length === 0) {
    $('#wordList').innerHTML = '';
    $('#emptyMsg').style.display = 'block';
    $('#stats').textContent = '';
    return;
  }
  $('#emptyMsg').style.display = 'none';

  const shuffled = shuffle(pool);
  const picks = shuffled.slice(0, Math.min(count, shuffled.length));
  // Allow repeats if user asks for more than pool size
  while (picks.length < count && pool.length > 0) {
    picks.push(pool[Math.floor(Math.random() * pool.length)]);
  }

  $('#wordList').innerHTML = picks.map(w => {
    let pos = '';
    if (type === 'all') {
      if (NOUNS.includes(w)) pos = 'noun';
      else if (VERBS.includes(w)) pos = 'verb';
      else if (ADJECTIVES.includes(w)) pos = 'adjective';
    } else {
      pos = type;
    }
    return `<span class="gz-word-chip" data-w="${w}" title="Click to copy">${w}<span class="pos">${pos}</span></span>`;
  }).join('');

  $('#stats').textContent = `${picks.length} ${t('statsWords')}`;

  // Click to copy
  document.querySelectorAll('.gz-word-chip').forEach(chip => {
    chip.addEventListener('click', () => copyText(chip.dataset.w));
  });
}

$('#genBtn').addEventListener('click', generate);
$('#copyBtn').addEventListener('click', () => {
  const words = Array.from(document.querySelectorAll('.gz-word-chip')).map(c => c.dataset.w).join(', ');
  if (words) { copyText(words); $('#copyBtn').textContent = t('copied'); setTimeout(() => $('#copyBtn').textContent = t('copy'), 1500); }
});
['count','type','length','letter'].forEach(id => {
  $('#' + id).addEventListener('change', generate);
});

generate();

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🎲', href:'/convert/randomizer.html', name:'Random Number'},
    {icon:'🎭', href:'/text/anagram-solver.html', name:'Anagram Solver'},
    {icon:'🔀', href:'/text/word-scrambler.html', name:'Word Scrambler'},
    {icon:'🔤', href:'/text/word-frequency.html', name:'Word Frequency'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
