const CATEGORIES = [
  { id: 'all', en: 'All', zh: '全部' },
  { id: 'red-meat', en: 'Red Meat', zh: '红肉' },
  { id: 'meat', en: 'Meat', zh: '肉类' },
  { id: 'poultry', en: 'Poultry', zh: '禽肉' },
  { id: 'seafood', en: 'Seafood', zh: '海鲜' },
  { id: 'pasta', en: 'Pasta & Pizza', zh: '意面披萨' },
  { id: 'spicy', en: 'Spicy', zh: '辣味' },
  { id: 'cheese', en: 'Cheese', zh: '奶酪' },
  { id: 'dessert', en: 'Dessert', zh: '甜点' },
  { id: 'vegetarian', en: 'Vegetarian', zh: '素食' },
];

const lang = (typeof GZI18n !== 'undefined' && GZI18n.getLang) ? GZI18n.getLang() : 'en';
const isZh = lang === 'zh';

let activeCat = 'all';
let searchTerm = '';

function buildCats() {
  $('#cats').innerHTML = CATEGORIES.map(c =>
    `<div class="wp-cat ${c.id === activeCat ? 'active' : ''}" data-id="${c.id}">${isZh ? c.zh : c.en}</div>`
  ).join('');
  $('#cats').querySelectorAll('.wp-cat').forEach(el => {
    el.addEventListener('click', () => { activeCat = el.dataset.id; buildCats(); render(); });
  });
}

function render() {
  let list = PAIRINGS.filter(p =>
    (activeCat === 'all' || p.cat === activeCat) &&
    (!searchTerm || p.kw.toLowerCase().includes(searchTerm.toLowerCase()) ||
     p.food.toLowerCase().includes(searchTerm.toLowerCase()) ||
     p.foodZh.includes(searchTerm))
  );

  if (list.length === 0) {
    $('#output').innerHTML = `<div class="wp-result" style="text-align:center;opacity:.7">No pairings found for "${searchTerm}". Try "steak", "salmon" or "cheese".</div>`;
    return;
  }

  $('#output').innerHTML = list.map(p => {
    const foodName = isZh ? p.foodZh : p.food;
    const wines = p.wines.map(w => `
      <div class="wp-wine">
        <div class="type">${w.type}</div>
        <div class="name">${w.name}</div>
        <div class="why">${isZh ? w.whyZh : w.whyEn}</div>
      </div>`).join('');
    return `<div class="wp-result">
      <h3>${foodName}</h3>
      <div class="wp-pair">${wines}</div>
      <div class="wp-rule"><b>${t('rule')}:</b> ${isZh ? p.ruleZh : p.ruleEn}</div>
    </div>`;
  }).join('');
}

$('#search').setAttribute('placeholder', t('searchPh'));
$('#search').addEventListener('input', e => { searchTerm = e.target.value; render(); });

buildCats();
render();
