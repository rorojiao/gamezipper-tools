.gz-cad-form{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:16px 0;max-width:500px}
.gz-cad-form label{display:flex;flex-direction:column;gap:4px;font-size:.85em;color:var(--gz-text2,#aaa)}
.gz-cad-form input{padding:10px 12px;border:1px solid var(--gz-border,#333);border-radius:8px;background:var(--gz-surface,#1e1e2e);color:var(--gz-text,#eee);font-size:1em}
.gz-cad-result{text-align:center;padding:24px;background:var(--gz-surface,#1e1e2e);border:1px solid var(--gz-border,#333);border-radius:12px;margin:16px 0}
.gz-cad-spm{font-size:3.5em;font-weight:800;color:var(--gz-accent,#4ecdc4)}
.gz-cad-spm small{font-size:.3em;color:var(--gz-text2,#aaa);font-weight:400}
.gz-cad-rating{font-size:1.1em;margin:8px 0;font-weight:600}
.gz-cad-bar{height:14px;border-radius:7px;background:linear-gradient(to right,#e94560,#fdd835,#66bb6a);margin:16px auto;max-width:400px;position:relative}
.gz-cad-marker{position:absolute;top:-6px;width:4px;height:26px;background:#fff;border-radius:2px;transform:translateX(-50%);transition:left .3s}
.gz-cad-ranges{display:flex;justify-content:space-between;max-width:400px;margin:4px auto;font-size:.75em;color:var(--gz-text2,#aaa)}
.gz-cad-zone{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-top:16px}
.gz-cad-zone-item{padding:12px;border-radius:8px;background:rgba(78,205,196,.06);border:1px solid rgba(78,205,196,.2);text-align:center;font-size:.85em}
.gz-cad-zone-item strong{display:block;font-size:1.4em;color:var(--gz-accent,#4ecdc4)}
.gz-cad-timer{text-align:center;margin:12px 0}
.gz-cad-timer-display{font-size:2.5em;font-family:monospace;font-weight:700;margin:8px 0}
.gz-cad-step-counter{font-size:1.2em;margin:8px 0}
.gz-cad-timer button{padding:10px 20px;margin:4px;border-radius:8px;border:none;cursor:pointer;font-size:1em}
@media(max-width:600px){.gz-cad-spm{font-size:2.5em}.gz-cad-form{grid-template-columns:1fr}}
</style>
<script type="application/ld+json">{"@context":"https://schema.org","@type":"WebApplication","name":"Running Cadence Calculator","description":"Calculate your running cadence (steps per minute). Count steps over a timed run, find your SPM, compare to the 180 benchmark, and get target training zones. Free, browser-only.","url":"https://tools.gamezipper.com/calc/running-cadence-calculator.html","applicationCategory":"Utility","operatingSystem":"Web Browser","offers":{"@type":"Offer","price":"0"}}</script>
<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"What is a good running cadence?","acceptedAnswer":{"@type":"Answer","text":"The commonly cited ideal is around 180 steps per minute (SPM), popularized by coach Jack Daniels. However, optimal cadence varies by runner — most recreational runners land between 155 and 170 SPM, and improving toward 170-180 can reduce injury risk and improve efficiency."}},{"@type":"Question","name":"How do I measure my cadence?","acceptedAnswer":{"@type":"Answer","text":"Count your steps for exactly 60 seconds while running at your normal pace, or count for 30 seconds and multiply by 2. Many fitness watches also report cadence automatically. You can use the live step counter on this page during a timed run."}},{"@type":"Question","name":"Should everyone run at 180 SPM?","acceptedAnswer":{"@type":"Answer","text":"No. 180 is a benchmark, not a rule. Taller runners and slower paces naturally have lower cadences. A good goal is to increase your current cadence by 5-10% rather than forcing 180 immediately."}},{"@type":"Question","name":"Why does higher cadence help?","acceptedAnswer":{"@type":"Answer","text":"A higher cadence means shorter, quicker strides. This reduces vertical oscillation, decreases impact forces on each landing, and tends to improve running economy and lower injury rates."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <h3 id="manual-title" style="font-size:1em;margin:8px 0"></h3>
    <div class="gz-cad-form">
      <label id="lbl-time"></label><input type="number" id="f-seconds" value="60" min="1" step="1">
      <label id="lbl-steps"></label><input type="number" id="f-steps" value="170" min="1" step="1">
    </div>
    <div style="text-align:center;margin:8px 0">
      <button class="gz-btn" onclick="calculate()" id="btn-calc"></button>
    </div>
    <div class="gz-cad-result" id="result" style="display:none"></div>

    <h3 id="live-title" style="font-size:1em;margin:20px 0 8px"></h3>
    <div class="gz-cad-timer">
      <div class="gz-cad-timer-display" id="timer-display">00:30</div>
      <div class="gz-cad-step-counter" id="step-display"></div>
      <button class="gz-btn" id="btn-tap" onclick="tapStep()"></button>
      <button class="gz-btn gz-btn-secondary" id="btn-start" onclick="toggleTimer()"></button>
      <button class="gz-btn gz-btn-secondary" id="btn-reset-timer" onclick="resetTimer()"></button>
    </div>

    <div class="gz-cad-zone" id="zones" style="display:none"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Running Cadence Calculator (SPM)',
    toolDesc: 'Find your running cadence in steps per minute. Count manually or use the live tap counter, compare to the 180 benchmark, and get your training zones.',
    manualTitle: 'Manual Calculation',
    timeLbl: 'Time counted (seconds)',
    stepsLbl: 'Steps counted',
    calc: 'Calculate Cadence',
    liveTitle: 'Live Tap Counter',
    tapStep: '👆 Tap per step',
    start: '▶ Start 30s timer',
    stop: '⏹ Stop',
    resetTimer: '↻ Reset',
    yourCadence: 'Your Cadence',
    spm: 'SPM',
    stepCount: 'Steps',
    rating: {
      low: 'Below average — try increasing cadence by 5%',
      avg: 'Average recreational runner cadence',
      good: 'Good cadence — close to the efficiency sweet spot',
      great: 'Excellent! Near the 180 SPM benchmark',
    },
    zonesTitle: 'Training Zones (based on your cadence)',
    step1: 'Option 1: Count your steps for 60 seconds while running, enter both numbers above.',
    step2: 'Option 2: Use the live tap counter — tap once per footstrike during a timed run.',
    step3: 'Click Calculate to see your cadence in steps per minute.',
    step4: 'Review your rating and suggested training zones to improve efficiency.',
  },
  zh: {
    toolTitle: '跑步步频计算器（SPM）',
    toolDesc: '计算你的跑步步频（每分钟步数）。手动计数或使用实时点击计数器，对比 180 步/分基准，获取训练区间建议。',
    manualTitle: '手动计算',
    timeLbl: '计时秒数',
    stepsLbl: '步数',
    calc: '计算步频',
    liveTitle: '实时点击计数',
    tapStep: '👆 每步点一下',
    start: '▶ 开始 30 秒计时',
    stop: '⏹ 停止',
    resetTimer: '↻ 重置',
    yourCadence: '你的步频',
    spm: '步/分',
    stepCount: '步',
    rating: {
      low: '低于平均水平 — 建议提高 5%',
      avg: '普通业余跑者步频',
      good: '良好 — 接近高效区间',
      great: '优秀！接近 180 步/分基准',
    },
    zonesTitle: '训练区间（基于你的步频）',
    step1: '方式一：跑步时数 60 秒内的步数，输入上方两个数字。',
    step2: '方式二：使用实时点击计数器 — 跑步时每落地一次点一下。',
    step3: '点击「计算步频」查看每分钟步数。',
    step4: '查看评级和训练区间建议以提升效率。',
  }
});

const { $, t } = GZ;

$('#manual-title').textContent = t('manualTitle');
$('#lbl-time').textContent = t('timeLbl');
$('#lbl-steps').textContent = t('stepsLbl');
$('#btn-calc').textContent = t('calc');
$('#live-title').textContent = t('liveTitle');
$('#btn-tap').textContent = t('tapStep');
$('#btn-start').textContent = t('start');
$('#btn-reset-timer').textContent = t('resetTimer');
$('#step-display').textContent = t('stepCount') + ': 0';

function calculate() {
  const secs = parseFloat($('#f-seconds').value) || 0;
  const steps = parseFloat($('#f-steps').value) || 0;
  if (secs <= 0 || steps <= 0) return;
  const spm = Math.round((steps / secs) * 60);
  showResult(spm);
}

function showResult(spm) {
  let rating, color;
  if (spm < 160) { rating = t('rating').low; color = '#e94560'; }
  else if (spm < 170) { rating = t('rating').avg; color = '#fdd835'; }
  else if (spm < 180) { rating = t('rating').good; color = '#66bb6a'; }
  else { rating = t('rating').great; color = '#4ecdc4'; }

  const markerPos = Math.min(100, Math.max(0, ((spm - 150) / 50) * 100));
  $('#result').innerHTML = `
    <div class="gz-cad-spm">${spm}<small> ${t('spm')}</small></div>
    <div class="gz-cad-rating" style="color:${color}">${rating}</div>
    <div class="gz-cad-bar"><div class="gz-cad-marker" style="left:${markerPos}%"></div></div>
    <div class="gz-cad-ranges"><span>150</span><span>160</span><span>170</span><span>180</span><span>200</span></div>
  `;
  $('#result').style.display = 'block';

  const zones = [
    {pct:'−5%', label:t('spm')+' '+(spm-9), note:'Easy recovery'},
    {pct:'Base', label:t('spm')+' '+spm, note:'Your natural cadence'},
    {pct:'+5%', label:t('spm')+' '+(spm+9), note:'Efficiency target'},
    {pct:'+10%', label:t('spm')+' '+(spm+18), note:'Race pace goal'},
  ];
  $('#zones').innerHTML = `<div style="grid-column:1/-1;font-weight:600;margin-bottom:4px">${t('zonesTitle')}</div>` +
    zones.map(z => `<div class="gz-cad-zone-item"><strong>${z.label}</strong>${z.pct}<br><span style="opacity:.7">${z.note}</span></div>`).join('');
  $('#zones').style.display = 'grid';
}

// Live tap counter
let timerSecs = 30, timerRemaining = 30, tapCount = 0, timerInterval = null, running = false;

function updateTimerDisplay() {
  const m = Math.floor(timerRemaining / 60).toString().padStart(2,'0');
  const s = (timerRemaining % 60).toString().padStart(2,'0');
  $('#timer-display').textContent = `${m}:${s}`;
  $('#step-display').textContent = t('stepCount') + ': ' + tapCount;
}

function tapStep() {
  if (running) {
    tapCount++;
    updateTimerDisplay();
  } else if (tapCount === 0) {
    // first tap starts timer
    toggleTimer();
    tapCount++;
    updateTimerDisplay();
  }
}

function toggleTimer() {
  if (running) {
    clearInterval(timerInterval);
    running = false;
    $('#btn-start').textContent = t('start');
    if (tapCount > 0 && timerRemaining < timerSecs) {
      // auto-calculate
      const elapsed = timerSecs - timerRemaining;
      const spm = Math.round((tapCount / elapsed) * 60);
      $('#f-seconds').value = elapsed;
      $('#f-steps').value = tapCount;
      showResult(spm);
    }
  } else {
    running = true;
    $('#btn-start').textContent = t('stop');
    timerInterval = setInterval(() => {
      timerRemaining--;
      updateTimerDisplay();
      if (timerRemaining <= 0) {
        clearInterval(timerInterval);
        running = false;
        $('#btn-start').textContent = t('start');
        if (tapCount > 0) {
          const spm = Math.round((tapCount / timerSecs) * 60);
          $('#f-seconds').value = timerSecs;
          $('#f-steps').value = tapCount;
          showResult(spm);
        }
      }
    }, 1000);
  }
}

function resetTimer() {
  clearInterval(timerInterval);
  running = false;
  timerRemaining = timerSecs;
  tapCount = 0;
  $('#btn-start').textContent = t('start');
  updateTimerDisplay();
}

$('#toolbar').innerHTML = '';
updateTimerDisplay();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🏃', href:'/calc/pace-calculator.html', name:'Pace Calculator'},
    {icon:'🚶', href:'/calc/walking-pace-calculator.html', name:'Walking Pace'},
    {icon:'📏', href:'/calc/steps-to-km-calculator.html', name:'Steps to KM'},
    {icon:'🦵', href:'/calc/vertical-jump-calculator.html', name:'Vertical Jump'},
  ]
});
</script>
<script src="/tools-result-rec.js?v=20260707v520" defer></script>
</body>
</html>
