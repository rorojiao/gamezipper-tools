<script type="application/ld+json">{"@context":"https://schema.org","@type":"WebApplication","name":"CSS Hero Section Generator","description":"Generate CSS hero section components visually. Customize headline, subtext, CTA buttons, background gradient and layout — copy production-ready HTML and CSS.","url":"https://tools.gamezipper.com/css-tools/hero-section.html","applicationCategory":"Utility","operatingSystem":"Web Browser","offers":{"@type":"Offer","price":"0"}}</script>
<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is a CSS hero section?", "acceptedAnswer": {"@type": "Answer", "text": "A CSS hero section is the large banner area at the top of a landing page. It typically contains a headline, a short subheading, one or two call-to-action buttons and a background image or gradient."}}, {"@type": "Question", "name": "Can I use a gradient background?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. Choose from solid, two-color linear gradient or three-color gradient. You can also pick a radial gradient. All colors update live in the preview and the generated CSS."}}, {"@type": "Question", "name": "How many CTA buttons can I add?", "acceptedAnswer": {"@type": "Answer", "text": "You can show one primary button, or a primary plus a secondary (outline) button. Toggle the Secondary Button option to control this."}}, {"@type": "Question", "name": "Is the hero section responsive?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. The hero uses flexbox with centered text and scales padding on small screens. The generated CSS includes a mobile media query that adjusts font sizes."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="field"><label>Headline</label><input type="text" id="headline" value="Build Better Products, Faster" oninput="render()"></div>
    <div class="field"><label>Subtext</label><textarea id="subtext" oninput="render()">The all-in-one platform that helps teams design, ship and scale beautiful products your users will love.</textarea></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;max-width:500px;margin-bottom:16px">
      <div class="field" style="margin:0"><label>Primary Button</label><input type="text" id="btn1" value="Get Started Free" oninput="render()"></div>
      <div class="field" style="margin:0"><label>Secondary Button</label><input type="text" id="btn2" value="Watch Demo" oninput="render()"></div>
    </div>
    <div class="ctrl">
      <div><label>Bg Type</label>
        <select id="bgType" onchange="render()">
          <option value="gradient2" selected>Linear Gradient</option>
          <option value="gradient3">3-Color Gradient</option>
          <option value="solid">Solid</option>
          <option value="radial">Radial</option>
        </select></div>
      <div><label>Color 1</label><input type="color" id="col1" value="#1a1a2e" onchange="render()"></div>
      <div><label>Color 2</label><input type="color" id="col2" value="#4ecdc4" onchange="render()"></div>
      <div><label>Color 3</label><input type="color" id="col3" value="#e94560" onchange="render()"></div>
      <div><label>Angle</label><input type="range" min="0" max="360" value="135" id="angle" onchange="render()"></div>
      <div><label>Text Color</label><input type="color" id="txtColor" value="#ffffff" onchange="render()"></div>
      <div><label>Primary Btn</label><input type="color" id="btn1Bg" value="#4ecdc4" onchange="render()"></div>
      <div><label>Secondary Btn</label>
        <select id="showBtn2" onchange="render()">
          <option value="1" selected>Show</option><option value="0">Hide</option>
        </select></div>
      <div><label>Alignment</label>
        <select id="align" onchange="render()">
          <option value="center" selected>Center</option><option value="left">Left</option>
        </select></div>
    </div>
    <div class="preview-box" id="preview"></div>
    <div style="display:flex;gap:8px;margin-bottom:8px">
      <button class="gz-btn" onclick="GZ.copyText(genCode())">📋 Copy Code</button>
      <button class="gz-btn gz-btn-secondary" onclick="resetForm()">🔄 Reset</button>
    </div>
    <div class="code-box"><pre id="codeOut"></pre></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'CSS Hero Section Generator',
    toolDesc: 'Design CSS hero sections with live preview. Customize headline, CTAs, gradient background and layout — copy production-ready code.',
    step1: 'Edit the headline and subtext',
    step2: 'Customize the background gradient, angle and text color',
    step3: 'Toggle primary and secondary CTA buttons',
    step4: 'Copy the generated HTML and CSS code',
  },
  zh: {
    toolTitle: 'CSS Hero 首屏区块生成器',
    toolDesc: '可视化设计 CSS 首屏区块 — 自定义标题、按钮、渐变背景和布局，复制生产可用代码。',
    step1: '编辑标题和副标题',
    step2: '自定义背景渐变、角度和文字颜色',
    step3: '切换主按钮和次按钮',
    step4: '复制生成的 HTML 和 CSS 代码',
  }
});

const { $, copyText, t } = GZ;

function buildBg() {
  const type = $('#bgType').value;
  const c1 = $('#col1').value, c2 = $('#col2').value, c3 = $('#col3').value;
  const angle = $('#angle').value;
  if (type === 'solid') return c1;
  if (type === 'gradient2') return `linear-gradient(${angle}deg, ${c1}, ${c2})`;
  if (type === 'gradient3') return `linear-gradient(${angle}deg, ${c1}, ${c2}, ${c3})`;
  if (type === 'radial') return `radial-gradient(circle at center, ${c2}, ${c1})`;
  return c1;
}

function render() {
  const bg = buildBg();
  const txt = $('#txtColor').value;
  const btn1Bg = $('#btn1Bg').value;
  const headline = $('#headline').value;
  const subtext = $('#subtext').value;
  const btn1 = $('#btn1').value;
  const btn2 = $('#btn2').value;
  const showBtn2 = $('#showBtn2').value === '1';
  const align = $('#align').value;

  const btn2Html = showBtn2 ? `<button style="padding:14px 28px;background:transparent;color:${txt};border:2px solid ${txt}55;border-radius:8px;cursor:pointer;font-size:1rem;font-weight:600">${btn2}</button>` : '';

  $('#preview').innerHTML = `
    <section style="background:${bg};color:${txt};padding:80px 24px;text-align:${align};display:flex;flex-direction:column;align-items:${align==='center'?'center':'flex-start'};gap:20px">
      <h1 style="font-size:2.8rem;font-weight:800;margin:0;max-width:700px;line-height:1.2">${headline}</h1>
      <p style="font-size:1.15rem;opacity:.85;max-width:560px;margin:0;line-height:1.6">${subtext}</p>
      <div style="display:flex;gap:12px;flex-wrap:wrap;margin-top:8px">
        <button style="padding:14px 28px;background:${btn1Bg};color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:1rem;font-weight:700">${btn1}</button>
        ${btn2Html}
      </div>
    </section>`;

  $('#codeOut').textContent = genCode();
}

function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function genCode() {
  const bg = buildBg();
  const txt = $('#txtColor').value;
  const btn1Bg = $('#btn1Bg').value;
  const headline = esc($('#headline').value);
  const subtext = esc($('#subtext').value);
  const btn1 = esc($('#btn1').value);
  const btn2 = esc($('#btn2').value);
  const showBtn2 = $('#showBtn2').value === '1';
  const align = $('#align').value;
  const itemsAlign = align === 'center' ? 'center' : 'flex-start';

  const btn2Code = showBtn2 ? `\n    <button class="hero-btn hero-btn-secondary">${btn2}</button>` : '';

  return `<!-- HTML -->
<section class="hero">
  <h1 class="hero-title">${headline}</h1>
  <p class="hero-subtext">${subtext}</p>
  <div class="hero-actions">
    <button class="hero-btn hero-btn-primary">${btn1}</button>${btn2Code}
  </div>
</section>

/* CSS */
.hero {
  background: ${bg};
  color: ${txt};
  padding: 80px 24px;
  text-align: ${align};
  display: flex;
  flex-direction: column;
  align-items: ${itemsAlign};
  gap: 20px;
}
.hero-title {
  font-size: 2.8rem;
  font-weight: 800;
  margin: 0;
  max-width: 700px;
  line-height: 1.2;
}
.hero-subtext {
  font-size: 1.15rem;
  opacity: 0.85;
  max-width: 560px;
  margin: 0;
  line-height: 1.6;
}
.hero-actions {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  margin-top: 8px;
}
.hero-btn {
  padding: 14px 28px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 1rem;
  font-weight: 600;
  transition: filter 0.2s, transform 0.2s;
}
.hero-btn:hover { transform: translateY(-2px); }
.hero-btn-primary {
  background: ${btn1Bg};
  color: #fff;
  border: none;
  font-weight: 700;
}
.hero-btn-secondary {
  background: transparent;
  color: ${txt};
  border: 2px solid ${txt}55;
}

/* Mobile */
@media (max-width: 768px) {
  .hero { padding: 48px 20px; }
  .hero-title { font-size: 2rem; }
  .hero-subtext { font-size: 1rem; }
}`;
}

function resetForm() {
  $('#headline').value = 'Build Better Products, Faster';
  $('#subtext').value = 'The all-in-one platform that helps teams design, ship and scale beautiful products.';
  $('#btn1').value = 'Get Started';
  $('#btn2').value = 'Learn More';
  render();
}

render();

GZ.renderToolPage({
  category: 'css',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📊', href:'/css-tools/pricing-table.html', name:'Pricing Table'},
    {icon:'🗂️', href:'/css-tools/card.html', name:'Card'},
    {icon:'🌈', href:'/css-tools/gradient.html', name:'Gradient'},
    {icon:'✨', href:'/css-tools/glass-card.html', name:'Glass Card'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
