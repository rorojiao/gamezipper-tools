let currentCat = 'length';

function convertTemp(val, from, to) {
  // first convert from -> Celsius
  let c;
  if (from.startsWith('Celsius')) c = val;
  else if (from.startsWith('Fahrenheit')) c = (val - 32) * 5/9;
  else if (from.startsWith('Kelvin')) c = val - 273.15;
  else if (from.startsWith('Rankine')) c = (val - 491.67) * 5/9;
  else c = val;
  // then Celsius -> target
  if (to.startsWith('Celsius')) return c;
  if (to.startsWith('Fahrenheit')) return c * 9/5 + 32;
  if (to.startsWith('Kelvin')) return c + 273.15;
  if (to.startsWith('Rankine')) return (c + 273.15) * 9/5;
  return c;
}

function convertVal(val, fromU, toU, cat) {
  if (cat === 'temp') return convertTemp(val, fromU, toU);
  const catData = CATEGORIES[cat];
  const fromDef = catData.units.find(u => u.name === fromU);
  const toDef = catData.units.find(u => u.name === toU);
  if (!fromDef || !toDef) return NaN;
  // fuel inverse handling (L/100km)
  if (fromDef.inv) {
    // from L/100km -> base (km/L): if x L/100km, then 100/x km/L
    const base = val === 0 ? Infinity : 100 / val;
    if (toDef.inv) return base === Infinity ? 0 : (100 / base);
    return base * toDef.factor / catData.units[0].factor;
  }
  let base = val * fromDef.factor;
  if (toDef.inv) {
    const kml = base / catData.units[0].factor;
    return kml === 0 ? Infinity : (100 / kml);
  }
  return base / toDef.factor;
}

function fmt(n) {
  if (!isFinite(n)) return n > 0 ? '∞' : '-∞';
  if (n === 0) return '0';
  const abs = Math.abs(n);
  if (abs >= 1e15 || abs < 1e-6) return n.toExponential(6);
  if (abs >= 1) return parseFloat(n.toPrecision(10)).toString();
  return parseFloat(n.toPrecision(8)).toString();
}

function populateUnits() {
  const cat = CATEGORIES[currentCat];
  const fromSel = $('#from-unit');
  const toSel = $('#to-unit');
  fromSel.innerHTML = cat.units.map(u => `<option>${u.name}</option>`).join('');
  toSel.innerHTML = cat.units.map(u => `<option>${u.name}</option>`).join('');
  // sensible defaults
  fromSel.selectedIndex = 0;
  toSel.selectedIndex = cat.units.length > 1 ? 1 : 0;
  if (currentCat === 'length') { fromSel.selectedIndex = 5; toSel.selectedIndex = 6; }
  if (currentCat === 'mass') { fromSel.selectedIndex = 5; toSel.selectedIndex = 2; }
  if (currentCat === 'temp') { fromSel.selectedIndex = 0; toSel.selectedIndex = 1; }
  if (currentCat === 'data') { fromSel.selectedIndex = 5; toSel.selectedIndex = 2; }
}

function render() {
  const cat = CATEGORIES[currentCat];
  const val = parseFloat($('#from-val').value);
  const fromU = $('#from-unit').value;
  const toU = $('#to-unit').value;
  if (isNaN(val)) {
    $('#to-val').value = '';
    $('#result-line').innerHTML = `<span style="color:var(--text3)">—</span>`;
    $('#quick-body').innerHTML = '';
    return;
  }
  const out = convertVal(val, fromU, toU, currentCat);
  $('#to-val').value = isFinite(out) ? fmt(out) : '';
  $('#result-line').innerHTML = `<div><strong>${fmt(val)}</strong> ${fromU} =</div><div class="big">${fmt(out)}</div><div>${toU}</div>`;
  // quick table
  let rows = '';
  for (const u of cat.units) {
    const v = convertVal(1, fromU, u.name, currentCat);
    rows += `<tr><td>${u.name}</td><td class="num">${fmt(v)}</td></tr>`;
  }
  $('#quick-body').innerHTML = rows;
}

function buildCatPills() {
  const pills = $('#cat-pills');
  pills.innerHTML = Object.keys(CATEGORIES).map(k =>
    `<button data-cat="${k}" class="${k===currentCat?'active':''}">${t(CATEGORIES[k].label)}</button>`
  ).join('');
  pills.querySelectorAll('button').forEach(b => {
    b.addEventListener('click', () => {
      currentCat = b.dataset.cat;
      buildCatPills();
      populateUnits();
      render();
    });
  });
}

$('#from-val').addEventListener('input', render);
$('#from-unit').addEventListener('change', render);
$('#to-unit').addEventListener('change', render);
$('#swap').addEventListener('click', () => {
  const f = $('#from-unit');
  const tu = $('#to-unit');
  const fi = f.selectedIndex;
  f.selectedIndex = tu.selectedIndex;
  tu.selectedIndex = fi;
  const v = $('#to-val').value;
  if (v) $('#from-val').value = v;
  render();
});

$('#toolbar').innerHTML = `<button class="gz-btn" onclick="copyText($('#to-val').value)">${t('copy')||'Copy'}</button>`;

buildCatPills();
populateUnits();
render();

$('#th-value').textContent = t('tableValue');
