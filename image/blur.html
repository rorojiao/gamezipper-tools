<script>
GZI18n.register({
  en: {
    toolTitle: 'Image Blur Tool',
    toolDesc: 'Blur images online — adjust intensity, blur entire image or selected areas. Free, private and browser-based.',
    dropLabel: 'Drop an image here or click to upload',
    blurAmount: 'Blur Intensity',
    selectMode: 'Select Area',
    fullMode: 'Full Image',
    step1: 'Upload or drag and drop your image',
    step2: 'Adjust the blur intensity slider',
    step3: 'Choose Full Image or select a specific area to blur',
    step4: 'Click Download to save the blurred image',
  },
  zh: {
    toolTitle: '图片模糊工具',
    toolDesc: '在线模糊图片 — 调整模糊强度，模糊整张图片或选定区域。免费、私密、浏览器本地处理。',
    dropLabel: '拖拽图片到此处或点击上传',
    blurAmount: '模糊强度',
    selectMode: '区域模糊',
    fullMode: '整图模糊',
    step1: '上传或拖拽图片到页面',
    step2: '调整模糊强度滑块',
    step3: '选择整图模糊或框选特定区域模糊',
    step4: '点击下载保存模糊后的图片',
  }
});

const { $, copyText, t } = GZ;
let img = null, mode = 'full', selRect = null, dragging = false, sx, sy;

const canvas = $('#canvas');
const ctx = canvas.getContext('2d');

function loadImage(file) {
  const reader = new FileReader();
  reader.onload = e => {
    img = new Image();
    img.onload = () => {
      const maxW = 800;
      let w = img.width, h = img.height;
      if (w > maxW) { h = Math.round(h * maxW / w); w = maxW; }
      canvas.width = w; canvas.height = h;
      $('#controls').style.display = 'block';
      $('#dropZone').style.display = 'none';
      selRect = null;
      applyBlur();
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function applyBlur() {
  if (!img) return;
  const blur = +$('#blurRange').value;
  ctx.filter = 'none';
  ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
  ctx.filter = 'none';

  if (mode === 'full') {
    ctx.filter = `blur(${blur}px)`;
    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
    ctx.filter = 'none';
  } else if (selRect) {
    const r = selRect;
    const temp = document.createElement('canvas');
    temp.width = r.w; temp.height = r.h;
    const tctx = temp.getContext('2d');
    tctx.filter = `blur(${blur}px)`;
    tctx.drawImage(canvas, r.x, r.y, r.w, r.h, 0, 0, r.w, r.h);
    ctx.drawImage(temp, r.x, r.y);
  }
}

function download() {
  if (!img) return;
  const a = document.createElement('a');
  a.href = canvas.toDataURL('image/png');
  a.download = 'blurred-image.png';
  a.click();
}

// Canvas selection drawing
canvas.addEventListener('mousedown', e => {
  if (mode !== 'select') return;
  const rect = canvas.getBoundingClientRect();
  sx = (e.clientX - rect.left) * (canvas.width / rect.width);
  sy = (e.clientY - rect.top) * (canvas.height / rect.height);
  dragging = true;
});
canvas.addEventListener('mousemove', e => {
  if (!dragging || mode !== 'select') return;
  const rect = canvas.getBoundingClientRect();
  const mx = (e.clientX - rect.left) * (canvas.width / rect.width);
  const my = (e.clientY - rect.top) * (canvas.height / rect.height);
  selRect = { x: Math.min(sx, mx), y: Math.min(sy, my), w: Math.abs(mx - sx), h: Math.abs(my - sy) };
  applyBlur();
  // Draw selection rectangle
  if (selRect.w > 2 && selRect.h > 2) {
    ctx.strokeStyle = 'var(--gz-accent)';
    ctx.lineWidth = 2;
    ctx.setLineDash([6, 3]);
    ctx.strokeRect(selRect.x, selRect.y, selRect.w, selRect.h);
    ctx.setLineDash([]);
  }
});
canvas.addEventListener('mouseup', () => { dragging = false; });

// Touch support
canvas.addEventListener('touchstart', e => {
  if (mode !== 'select') return;
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const touch = e.touches[0];
  sx = (touch.clientX - rect.left) * (canvas.width / rect.width);
  sy = (touch.clientY - rect.top) * (canvas.height / rect.height);
  dragging = true;
}, { passive: false });
canvas.addEventListener('touchmove', e => {
  if (!dragging || mode !== 'select') return;
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const touch = e.touches[0];
  const mx = (touch.clientX - rect.left) * (canvas.width / rect.width);
  const my = (touch.clientY - rect.top) * (canvas.height / rect.height);
  selRect = { x: Math.min(sx, mx), y: Math.min(sy, my), w: Math.abs(mx - sx), h: Math.abs(my - sy) };
  applyBlur();
}, { passive: false });
canvas.addEventListener('touchend', () => { dragging = false; });

$('#blurRange').addEventListener('input', e => {
  $('#blurVal').textContent = e.target.value + 'px';
  applyBlur();
});

$('#dropZone').addEventListener('click', () => $('#fileInput').click());
$('#fileInput').addEventListener('change', e => { if (e.target.files[0]) loadImage(e.target.files[0]); });
$('#dropZone').addEventListener('dragover', e => { e.preventDefault(); e.currentTarget.classList.add('dragover'); });
$('#dropZone').addEventListener('dragleave', e => { e.currentTarget.classList.remove('dragover'); });
$('#dropZone').addEventListener('drop', e => { e.preventDefault(); e.currentTarget.classList.remove('dragover'); if (e.dataTransfer.files[0]) loadImage(e.dataTransfer.files[0]); });

$('#dropLabel').textContent = t('dropLabel');

$('#toolbar').innerHTML = `
  <button class="gz-btn" id="btnFull" onclick="mode='full';selRect=null;applyBlur();document.getElementById('btnFull').style.opacity=1;document.getElementById('btnSel').style.opacity=.6">${t('fullMode')}</button>
  <button class="gz-btn gz-btn-secondary" id="btnSel" style="opacity:.6" onclick="mode='select';document.getElementById('btnSel').style.opacity=1;document.getElementById('btnFull').style.opacity=.6">${t('selectMode')}</button>
  <button class="gz-btn" onclick="download()">${t('download')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="document.getElementById('controls').style.display='none';document.getElementById('dropZone').style.display='block';img=null">${t('clear')}</button>`;

GZ.renderToolPage({
  category: 'image',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📦', href:'/image/compressor.html', name:'Image Compressor'},
    {icon:'🖼️', href:'/image/pixelate.html', name:'Pixelate Image'},
    {icon:'✂️', href:'/image/cropper.html', name:'Image Cropper'},
    {icon:'🎨', href:'/image/filters.html', name:'Image Filters'},
  ]
});
</script>
