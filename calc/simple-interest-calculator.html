<script type="application/ld+json">{"@context":"https://schema.org","@type":"WebApplication","name":"Simple Interest Calculator","description":"Calculate simple interest instantly. Enter principal, rate and time to find interest earned and total amount. Free online simple interest calculator with step-by-step formula.","url":"https://tools.gamezipper.com/calc/simple-interest-calculator.html","applicationCategory":"Utility","operatingSystem":"Web Browser","offers":{"@type":"Offer","price":"0"}}</script>
<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is simple interest?", "acceptedAnswer": {"@type": "Answer", "text": "Simple interest is a method of calculating interest where interest is earned only on the original principal amount. The formula is I = P × R × T, where P is principal, R is the annual interest rate (as a decimal), and T is time in years."}}, {"@type": "Question", "name": "What is the simple interest formula?", "acceptedAnswer": {"@type": "Answer", "text": "Simple Interest = Principal × Rate × Time (I = P × R × T). Total Amount = Principal + Interest (A = P + I). Rate must be expressed as a decimal (5% = 0.05) and time must be in years."}}, {"@type": "Question", "name": "How is simple interest different from compound interest?", "acceptedAnswer": {"@type": "Answer", "text": "Simple interest is calculated only on the original principal, so it grows linearly. Compound interest is calculated on the principal plus previously earned interest, so it grows exponentially. Over long periods, compound interest yields significantly more."}}, {"@type": "Question", "name": "What are common uses of simple interest?", "acceptedAnswer": {"@type": "Answer", "text": "Simple interest is commonly used for short-term loans, car loans, some personal loans, treasury bills, and basic savings calculations. Most mortgages and long-term investments use compound interest instead."}}]}</script>

<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-input-group" id="inputs"></div>
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="gz-result-box" id="results" style="display:none">

  </div>

  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Simple Interest Calculator',
    toolDesc: 'Calculate simple interest on loans and investments. Enter principal, annual rate and time period to get interest earned and total amount with a step-by-step formula breakdown.',
    principal: 'Principal ($)',
    rate: 'Annual Interest Rate (%)',
    time: 'Time Period',
    years: 'Years',
    months: 'Months',
    days: 'Days',
    calculate: 'Calculate',
    clear: 'Clear',
    example: 'Example',
    resInterest: 'Interest Earned',
    resTotal: 'Total Amount',
    resPrincipal: 'Principal',
    resMonthly: 'Monthly Interest',
    step1: 'Enter the principal amount (the initial sum of money)',
    step2: 'Enter the annual interest rate as a percentage',
    step3: 'Enter the time period and select the unit (years, months or days)',
    step4: 'Click Calculate to see the interest, total amount and formula breakdown',
  },
  zh: {
    toolTitle: '单利计算器',
    toolDesc: '计算贷款和投资的简单利息。输入本金、年利率和时间，获取利息总额和本息合计，附带逐步公式说明。',
    principal: '本金（元）',
    rate: '年利率（%）',
    time: '期限',
    years: '年',
    months: '月',
    days: '天',
    calculate: '计算',
    clear: '清空',
    example: '示例',
    resInterest: '利息',
    resTotal: '本息合计',
    resPrincipal: '本金',
    resMonthly: '月利息',
    step1: '输入本金金额（初始资金）',
    step2: '输入年利率（百分比）',
    step3: '输入时间并选择单位（年、月或天）',
    step4: '点击计算查看利息、本息合计和公式说明',
  }
});

const { $, t } = GZ;

function fmt(n) { return n.toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2}); }

function calculate() {
  const P = parseFloat($('#inp-principal').value) || 0;
  const R = parseFloat($('#inp-rate').value) || 0;
  const Tval = parseFloat($('#inp-time').value) || 0;
  const unit = $('#inp-unit').value;

  let Tyears;
  if (unit === 'years') Tyears = Tval;
  else if (unit === 'months') Tyears = Tval / 12;
  else Tyears = Tval / 365;

  const interest = P * (R / 100) * Tyears;
  const total = P + interest;
  const monthlyInterest = Tyears > 0 ? interest / (Tyears * 12) : 0;

  const unitLabel = unit === 'years' ? t('years') : unit === 'months' ? t('months') : t('days');

  $('#result-grid').innerHTML = `
    <div class="gz-result-item"><div class="value">$${fmt(interest)}</div><div class="label">${t('resInterest')}</div></div>
    <div class="gz-result-item"><div class="value">$${fmt(total)}</div><div class="label">${t('resTotal')}</div></div>
    <div class="gz-result-item"><div class="value">$${fmt(P)}</div><div class="label">${t('resPrincipal')}</div></div>
    <div class="gz-result-item"><div class="value">$${fmt(monthlyInterest)}</div><div class="label">${t('resMonthly')}</div></div>`;

  $('#formula').innerHTML = `I = P × R × T<br>
P = $${fmt(P)},  R = ${R}%,  T = ${Tval} ${unitLabel} = ${Tyears.toFixed(6)} ${t('years')}<br>
I = $${fmt(P)} × ${(R/100)} × ${Tyears.toFixed(6)} = <b>$${fmt(interest)}</b><br>
A = P + I = $${fmt(P)} + $${fmt(interest)} = <b>$${fmt(total)}</b>`;
  $('#results').style.display = 'block';
}

$('#inputs').innerHTML = `
  <div><label>${t('principal')}</label><input type="number" id="inp-principal" value="10000" min="0" step="any"></div>
  <div><label>${t('rate')}</label><input type="number" id="inp-rate" value="5" min="0" step="0.01"></div>
  <div><label>${t('time')}</label><input type="number" id="inp-time" value="3" min="0" step="any">
       <select id="inp-unit" style="margin-top:6px">
         <option value="years">${t('years')}</option>
         <option value="months">${t('months')}</option>
         <option value="days">${t('days')}</option>
       </select></div>`;

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="calculate()">${t('calculate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#inp-principal').value=10000;$('#inp-rate').value=5;$('#inp-time').value=3;$('#inp-unit').value='years';calculate()">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="document.getElementById('results').style.display='none'">${t('clear')}</button>`;

calculate();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📈', href:'/calc/compound-interest.html', name:'Compound Interest'},
    {icon:'🏦', href:'/calc/loan-calculator.html', name:'Loan Calculator'},
    {icon:'💰', href:'/calc/profit-margin.html', name:'Profit Margin'},
    {icon:'🔢', href:'/calc/percentage-calculator.html', name:'Percentage Calculator'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
