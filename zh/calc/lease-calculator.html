<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "How is a car lease payment calculated?", "acceptedAnswer": {"@type": "Answer", "text": "The standard lease formula is: Monthly Payment = (Depreciation + Finance Charge) ÷ Months. Depreciation = (Net Cap Cost − Residual Value) ÷ Term. Finance Charge = (Net Cap Cost + Residual Value) × Money Factor. The money factor is the lease equivalent of an interest rate — multiply it by 2400 to get the approximate APR (e.g. 0.00125 MF ≈ 3% APR)."}}, {"@type": "Question", "name": "What is a money factor?", "acceptedAnswer": {"@type": "Answer", "text": "A money factor (MF) is the lease financing rate expressed as a small decimal instead of a percentage. A money factor of 0.00125 equals roughly 3% APR (0.00125 × 2400). You can convert any APR to a money factor by dividing it by 2400. Dealers are required to disclose both the money factor and its APR equivalent in your lease contract."}}, {"@type": "Question", "name": "What is residual value?", "acceptedAnswer": {"@type": "Answer", "text": "Residual value is what the leasing company expects the car to be worth at the end of the lease. It's set as a percentage of MSRP and depends on the term (typically 36 or 39 months). A higher residual means lower monthly payments because less of the car is being depreciated during the lease. Manufacturer-subsidized leases often have inflated residuals to lower advertised payments."}}, {"@type": "Question", "name": "Should I put money down on a lease?", "acceptedAnswer": {"@type": "Answer", "text": "Most experts recommend $0 down on a lease. If the car is stolen or totaled in the first week, you lose any down payment — and gap insurance usually doesn't cover it. A larger down payment also reduces your monthly payment but doesn't reduce the total cost of the lease much, because the depreciation is fixed. Put your down payment toward the monthly payment instead, so you can walk away if needed."}}]}</script>

<script>
GZI18n.register({
  en: {
    toolTitle: 'Auto Lease Calculator',
    toolDesc: 'Calculate your monthly car lease payment, total cost, and depreciation. Enter cap cost, residual value, money factor, term and down payment to see exactly what you will pay.',
    lblCap: 'Net Cap Cost ($)',
    lblResidual: 'Residual Value ($)',
    lblMf: 'Money Factor (e.g. 0.00125)',
    lblTerm: 'Lease Term',
    lblDown: 'Down Payment ($)',
    lblFees: 'Acquisition / Doc Fees ($)',
    lblTax: 'Sales Tax (%)',
    lblMiles: 'Mileage Allowance / year',
    aprHint: 'Money factor × 2400 ≈ APR equivalent',
    tileMonthly: 'Monthly Payment (pre-tax)',
    tileWithTax: 'Monthly Payment (with tax)',
    tileDep: 'Total Depreciation',
    tileFin: 'Total Finance Charge',
    tileTotal: 'Total Cost of Lease',
    tileDriveoff: 'Total Drive-Off',
    tileEffRate: 'Effective APR',
    tip: 'Manufacturer lease deals often advertise a low money factor to look attractive, but the real savings come from subsidized residual values. Always compare total cost, not just the monthly number.',
    step1: 'Get the negotiated cap cost, residual value, and money factor from the dealer (or use manufacturer website for advertised deals)',
    step2: 'Enter the lease term in months and your down payment',
    step3: 'Add acquisition / doc fees, sales tax rate and annual mileage allowance',
    step4: 'Review the monthly payment, total cost, and effective APR. Negotiate the cap cost and money factor to lower the deal',
  },
  zh: {
    toolTitle: '汽车租赁计算器',
    toolDesc: '计算汽车月租、总成本和折旧。输入协议价、残值、资金系数、租期和首付，清楚了解真实花费。',
    lblCap: '净协议价（美元）',
    lblResidual: '残值（美元）',
    lblMf: '资金系数（例如 0.00125）',
    lblTerm: '租期',
    lblDown: '首付（美元）',
    lblFees: '手续费 / 文档费（美元）',
    lblTax: '销售税（%）',
    lblMiles: '年度里程上限',
    aprHint: '资金系数 × 2400 ≈ 实际年化利率 (APR)',
    tileMonthly: '税前月供',
    tileWithTax: '税后月供',
    tileDep: '总折旧',
    tileFin: '总利息',
    tileTotal: '租赁总成本',
    tileDriveoff: '首期总支出',
    tileEffRate: '实际 APR',
    tip: '厂家促销租赁看起来资金系数低，真正省钱的关键是补贴的残值。比较时请看总成本，而不仅是月供。',
    step1: '从经销商获取协议价、残值和资金系数（或参考厂家官网的促销）',
    step2: '输入租期（月）和首付',
    step3: '填入手续费、销售税率和年度里程上限',
    step4: '查看月供、总成本和实际 APR。谈判重点是压低协议价和资金系数',
  }
});

const { $ } = GZ;

function compute() {
  const cap = parseFloat($('#cap').value) || 0;
  const residual = parseFloat($('#residual').value) || 0;
  const mf = parseFloat($('#mf').value) || 0;
  const term = parseInt($('#term').value) || 36;
  const down = parseFloat($('#down').value) || 0;
  const fees = parseFloat($('#fees').value) || 0;
  const tax = parseFloat($('#tax').value) || 0;

  // Net cap cost after down payment
  const netCap = cap - down + fees;
  // Depreciation per month
  const dep = (netCap - residual) / term;
  // Finance charge per month
  const fin = (netCap + residual) * mf;
  // Base monthly payment
  const monthly = dep + fin;
  // With tax
  const monthlyTax = monthly * (1 + tax/100);

  const totalDep = netCap - residual;
  const totalFin = fin * term;
  const totalCost = down + fees + monthlyTax * term;
  const driveoff = down + fees + monthlyTax;
  const apr = (mf * 2400).toFixed(2);

  $('#apr-hint').innerHTML = '<b>' + apr + '% APR</b> — ' + GZI18n.t('aprHint');

  const tiles = [
    {p:true, val: '$' + monthly.toFixed(2), lbl: GZI18n.t('tileMonthly')},
    {p:false, val: '$' + monthlyTax.toFixed(2), lbl: GZI18n.t('tileWithTax')},
    {p:false, val: '$' + totalDep.toFixed(0), lbl: GZI18n.t('tileDep')},
    {p:false, val: '$' + totalFin.toFixed(0), lbl: GZI18n.t('tileFin')},
    {p:false, val: '$' + totalCost.toFixed(0), lbl: GZI18n.t('tileTotal')},
    {p:false, val: '$' + driveoff.toFixed(0), lbl: GZI18n.t('tileDriveoff')},
  ];
  $('#tiles').innerHTML = tiles.map(x => `<div class="lc-tile ${x.p?'primary':''}"><div class="num">${x.val}</div><div class="lbl">${x.lbl}</div></div>`).join('');

  // Table
  let rows = '<table class="lc-table"><thead><tr><th>Month</th><th>Depreciation</th><th>Finance</th><th>Monthly</th><th>Remaining Value</th><th>Cumulative Paid</th></tr></thead><tbody>';
  let cumPaid = down + fees;
  for (let m = 1; m <= term; m++) {
    const value = netCap - (netCap - residual) * (m / term);
    cumPaid += monthlyTax;
    rows += `<tr><td>${m}</td><td>$${dep.toFixed(2)}</td><td>$${fin.toFixed(2)}</td><td>$${monthlyTax.toFixed(2)}</td><td>$${value.toFixed(0)}</td><td>$${cumPaid.toFixed(0)}</td></tr>`;
  }
  rows += '</tbody></table>';
  $('#tableWrap').innerHTML = rows;

  // Chart
  drawChart(term, netCap, residual, dep, fin, monthlyTax);

  $('#tip').textContent = GZI18n.t('tip');
}

function drawChart(term, netCap, residual, dep, fin, monthlyTax) {
  const c = $('#chart');
  c.innerHTML = '';
  const w = c.clientWidth - 20, h = 200;
  const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  svg.setAttribute('width', w); svg.setAttribute('height', h); svg.setAttribute('viewBox', `0 0 ${w} ${h}`);

  // Stacked bars: depreciation + finance
  const maxBar = dep + fin;
  const barW = (w - 60) / term;
  for (let m = 1; m <= term; m++) {
    const x = 50 + (m - 1) * barW;
    const depH = (dep / maxBar) * (h - 50);
    const finH = (fin / maxBar) * (h - 50);
    const depRect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    depRect.setAttribute('x', x + 1); depRect.setAttribute('y', h - 20 - depH - finH);
    depRect.setAttribute('width', barW - 2); depRect.setAttribute('height', depH);
    depRect.setAttribute('fill', '#00d672'); svg.appendChild(depRect);
    const finRect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    finRect.setAttribute('x', x + 1); finRect.setAttribute('y', h - 20 - finH);
    finRect.setAttribute('width', barW - 2); finRect.setAttribute('height', finH);
    finRect.setAttribute('fill', '#ff6b6b'); svg.appendChild(finRect);
  }

  // Axes
  const axis = (x1,y1,x2,y2) => {
    const l = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    l.setAttribute('x1',x1); l.setAttribute('y1',y1); l.setAttribute('x2',x2); l.setAttribute('y2',y2);
    l.setAttribute('stroke','#888'); l.setAttribute('stroke-width','1'); svg.appendChild(l);
  };
  axis(50, h-20, w-10, h-20);
  axis(50, 20, 50, h-20);

  // Legend
  const lTxt = (txt, color, ypos) => {
    const t = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    t.setAttribute('x', 60); t.setAttribute('y', ypos);
    t.setAttribute('fill', color); t.setAttribute('font-size','11'); t.setAttribute('font-weight','700');
    t.textContent = '■ ' + txt; svg.appendChild(t);
  };
  lTxt('Depreciation', '#00d672', 30);
  lTxt('Finance charge', '#ff6b6b', 48);

  const xLab = document.createElementNS('http://www.w3.org/2000/svg', 'text');
  xLab.setAttribute('x', w/2 - 20); xLab.setAttribute('y', h-4);
  xLab.setAttribute('fill', '#888'); xLab.setAttribute('font-size','10');
  xLab.textContent = 'Month'; svg.appendChild(xLab);

  c.appendChild(svg);
}

['#cap','#residual','#mf','#term','#down','#fees','#tax','#miles'].forEach(sel => $(sel).addEventListener('input', compute));

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🚗', href:'/calc/car-loan-calculator.html', name:'Car Loan Calculator'},
    {icon:'💵', href:'/calc/loan-calculator.html', name:'Loan Calculator'},
    {icon:'⛽', href:'/calc/fuel-cost-calculator.html', name:'Fuel Cost'},
    {icon:'💰', href:'/calc/sales-tax-calculator.html', name:'Sales Tax'},
  ]
});
compute();
</script>
