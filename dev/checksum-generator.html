async function hashData(algoName, data) {
  if (algoName === 'MD5') {
    return md5(typeof data === 'string' ? data : new TextDecoder().decode(data));
  }
  const buf = typeof data === 'string' ? new TextEncoder().encode(data) : data;
  const hashBuf = await crypto.subtle.digest(algoName, buf);
  return Array.from(new Uint8Array(hashBuf)).map(b => b.toString(16).padStart(2, '0')).join('');
}

function renderResults(results) {
  const container = $('#results');
  container.innerHTML = '';
  results.forEach(({ name, hash }) => {
    const row = document.createElement('div');
    row.className = 'checksum-row';
    row.innerHTML = `<label>${name}</label><span class="hash-val">${hash || '—'}</span>`;
    const btn = document.createElement('button');
    btn.className = 'gz-btn gz-btn-secondary';
    btn.textContent = t('copy');
    btn.onclick = () => { copyText(hash); btn.textContent = t('copied'); setTimeout(() => btn.textContent = t('copy'), 1500); };
    row.appendChild(btn);
    container.appendChild(row);
  });
}

async function generate() {
  const inp = $('#input').value;
  if (!inp) { $('#results').innerHTML = ''; return; }
  const results = [];
  for (const { name, algo } of ALGOS) {
    try {
      const hash = await hashData(algo || name, inp);
      results.push({ name, hash });
    } catch(e) {
      results.push({ name, hash: '' });
    }
  }
  renderResults(results);
}

async function hashFile(file) {
  const buf = await file.arrayBuffer();
  const results = [];
  for (const { name, algo } of ALGOS) {
    try {
      const hash = await hashData(algo || name, new Uint8Array(buf));
      results.push({ name, hash });
    } catch(e) {
      results.push({ name, hash: '' });
    }
  }
  renderResults(results);
  $('#status').textContent = `📄 ${file.name} (${(file.size / 1024).toFixed(2)} KB)`;
}

function setupFileUpload() {
  const input = document.createElement('input');
  input.type = 'file';
  input.id = 'fileInput';
  input.style.display = 'none';
  input.onchange = (e) => { if (e.target.files[0]) hashFile(e.target.files[0]); };
  document.body.appendChild(input);
}

setupFileUpload();
