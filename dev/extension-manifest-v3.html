<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is Manifest V3?", "acceptedAnswer": {"@type": "Answer", "text": "Manifest V3 is the latest version of the Chrome Extension platform manifest file. It replaces background pages with service workers, introduces the action API, and enforces stricter security policies."}}, {"@type": "Question", "name": "What is the difference between Manifest V2 and V3?", "acceptedAnswer": {"@type": "Answer", "text": "Key differences: background.pages replaced by background.service_worker, browser_action/page_action replaced by action, remotely hosted code is no longer allowed, and webRequest API replaced by declarativeNetRequest for blocking."}}, {"@type": "Question", "name": "What permissions does my Chrome extension need?", "acceptedAnswer": {"@type": "Answer", "text": "Common permissions include: activeTab, storage, tabs, scripting, alarms, notifications, contextMenus, sidePanel. Only request permissions your extension actually needs to minimize review friction."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div style="margin-bottom:.5rem;display:flex;flex-wrap:wrap;gap:.3rem">
      <strong id="lbl-presets" style="font-size:.9em;width:100%"></strong>
    </div>
    <div id="presets" style="display:flex;flex-wrap:wrap;gap:.3rem;margin-bottom:.8rem"></div>

    <!-- Basic Info -->
    <div class="section-toggle"><input type="checkbox" checked disabled><strong id="lbl-basic"></strong></div>
    <div class="section-body">
      <div class="form-grid">
        <div class="form-group"><label id="lbl-name"></label><input id="extName" value="My Extension" oninput="generate()"></div>
        <div class="form-group"><label id="lbl-version"></label><input id="extVersion" value="1.0.0" oninput="generate()"></div>
        <div class="form-group"><label id="lbl-desc-input"></label><input id="extDesc" placeholder="A short description" oninput="generate()"></div>
        <div class="form-group"><label id="lbl-author"></label><input id="extAuthor" placeholder="Your Name" oninput="generate()"></div>
      </div>
    </div>

    <!-- Permissions -->
    <div class="section-toggle" onclick="toggleSec(this)"><input type="checkbox" checked><strong id="lbl-perms"></strong></div>
    <div class="section-body">
      <div class="checkbox-group" id="permChecks"></div>
    </div>

    <!-- Action / Popup -->
    <div class="section-toggle" onclick="toggleSec(this)"><input type="checkbox" id="enableAction"><strong id="lbl-action"></strong></div>
    <div class="section-body">
      <div class="form-grid">
        <div class="form-group"><label id="lbl-popup"></label><input id="actionPopup" value="popup.html" oninput="generate()"></div>
        <div class="form-group"><label id="lbl-icon"></label><input id="actionIcon" value="icon48.png" oninput="generate()"></div>
      </div>
    </div>

    <!-- Background -->
    <div class="section-toggle" onclick="toggleSec(this)"><input type="checkbox" id="enableBg"><strong id="lbl-bg"></strong></div>
    <div class="section-body">
      <div class="form-group"><label id="lbl-sw"></label><input id="bgSW" value="background.js" oninput="generate()"></div>
    </div>

    <!-- Content Scripts -->
    <div class="section-toggle" onclick="toggleSec(this)"><input type="checkbox" id="enableCS"><strong id="lbl-cs"></strong></div>
    <div class="section-body">
      <div class="form-grid">
        <div class="form-group"><label id="lbl-cs-matches"></label><input id="csMatches" value="*://*.example.com/*" oninput="generate()"></div>
        <div class="form-group"><label id="lbl-cs-js"></label><input id="csJS" value="content.js" oninput="generate()"></div>
        <div class="form-group"><label id="lbl-cs-css"></label><input id="csCSS" value="content.css" oninput="generate()"></div>
        <div class="form-group"><label id="lbl-cs-run"></label>
          <select id="csRunAt" onchange="generate()">
            <option value="document_idle">document_idle</option>
            <option value="document_start">document_start</option>
            <option value="document_end">document_end</option>
          </select>
        </div>
      </div>
    </div>

    <!-- Options Page -->
    <div class="section-toggle" onclick="toggleSec(this)"><input type="checkbox" id="enableOptions"><strong id="lbl-options"></strong></div>
    <div class="section-body">
      <div class="form-group"><label id="lbl-options-page"></label><input id="optionsPage" value="options.html" oninput="generate()"></div>
    </div>

    <!-- Output -->
    <div style="margin-top:1rem">
      <h3 style="margin-bottom:.5rem;font-size:.95em" id="lbl-output"></h3>
      <div class="output-block" id="output"></div>
    </div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Chrome Extension Manifest V3 Generator',
    toolDesc: 'Generate manifest.json for Chrome Extensions using Manifest V3. Configure permissions, content scripts, service workers, and download instantly.',
    copy: 'Copy JSON',
    download: 'Download manifest.json',
    lblPresets: 'Quick Presets:',
    presetBlank: 'Blank',
    presetContentScript: 'Content Script',
    presetPopup: 'Popup Extension',
    presetSidePanel: 'Side Panel',
    presetDevTools: 'DevTools',
    lblBasic: 'Basic Info',
    lblName: 'Name',
    lblVersion: 'Version',
    lblDescInput: 'Description',
    lblAuthor: 'Author',
    lblPerms: 'Permissions',
    lblAction: 'Action (Popup)',
    lblPopup: 'Popup HTML',
    lblIcon: 'Default Icon',
    lblBg: 'Background Service Worker',
    lblSw: 'Service Worker File',
    lblCs: 'Content Scripts',
    lblCsMatches: 'URL Matches',
    lblCsJs: 'JS Files (comma-separated)',
    lblCsCss: 'CSS Files (comma-separated)',
    lblCsRun: 'Run At',
    lblOptions: 'Options Page',
    lblOptionsPage: 'Options HTML',
    lblOutput: 'Generated manifest.json',
    step1: 'Enter your extension name, version, and description',
    step2: 'Select required permissions from the checkboxes',
    step3: 'Enable and configure action popup, background, content scripts as needed',
    step4: 'Download or copy the generated manifest.json to your project',
  },
  zh: {
    toolTitle: 'Chrome 扩展 Manifest V3 生成器',
    toolDesc: '为 Chrome 扩展生成 Manifest V3 的 manifest.json。配置权限、内容脚本、Service Worker，一键下载。',
    copy: '复制 JSON',
    download: '下载 manifest.json',
    lblPresets: '快速预设：',
    presetBlank: '空白',
    presetContentScript: '内容脚本',
    presetPopup: '弹出窗口扩展',
    presetSidePanel: '侧边栏',
    presetDevTools: 'DevTools',
    lblBasic: '基本信息',
    lblName: '名称',
    lblVersion: '版本',
    lblDescInput: '描述',
    lblAuthor: '作者',
    lblPerms: '权限',
    lblAction: '操作（弹出窗口）',
    lblPopup: '弹出窗口 HTML',
    lblIcon: '默认图标',
    lblBg: '后台 Service Worker',
    lblSw: 'Service Worker 文件',
    lblCs: '内容脚本',
    lblCsMatches: 'URL 匹配',
    lblCsJs: 'JS 文件（逗号分隔）',
    lblCsCss: 'CSS 文件（逗号分隔）',
    lblCsRun: '运行时机',
    lblOptions: '选项页',
    lblOptionsPage: '选项 HTML',
    lblOutput: '生成的 manifest.json',
    step1: '输入扩展名称、版本和描述',
    step2: '从复选框中选择所需权限',
    step3: '按需启用和配置弹出窗口、后台、内容脚本',
    step4: '下载或复制生成的 manifest.json 到你的项目',
  }
});

const { $, copyText, t } = GZ;

const allPerms = ['activeTab','storage','tabs','scripting','alarms','notifications','contextMenus','sidePanel','offscreen','identity','bookmarks','history','topSites','favicon','webNavigation','system.cpu','system.memory','system.storage','geolocation','cookies','declarativeNetRequest','declarativeNetRequestFeedback','declarativeNetRequestWithHostAccess'];

function renderPerms() {
  $('#permChecks').innerHTML = allPerms.map(p =>
    `<label class="chk-label"><input type="checkbox" value="${p}" onchange="generate()"> ${p}</label>`
  ).join('');
}

function getSelectedPerms() {
  return [...document.querySelectorAll('#permChecks input:checked')].map(c => c.value);
}

function toggleSec(el) {
  const cb = el.querySelector('input[type=checkbox]');
  if (cb && !cb.disabled) cb.checked = !cb.checked;
  generate();
}

function generate() {
  const manifest = {
    manifest_version: 3,
    name: $('#extName').value || 'My Extension',
    version: $('#extVersion').value || '1.0.0',
  };

  const desc = $('#extDesc').value.trim();
  if (desc) manifest.description = desc;

  const perms = getSelectedPerms();
  if (perms.length) manifest.permissions = perms;

  // Action
  if ($('#enableAction').checked) {
    manifest.action = { default_icon: {} };
    if ($('#actionPopup').value) manifest.action.default_popup = $('#actionPopup').value;
    const icon = $('#actionIcon').value;
    if (icon) {
      manifest.action.default_icon = { '16': icon, '48': icon, '128': icon };
    }
    manifest.icons = { '16': icon || 'icon16.png', '48': icon || 'icon48.png', '128': icon || 'icon128.png' };
  }

  // Background
  if ($('#enableBg').checked) {
    manifest.background = { service_worker: $('#bgSW').value || 'background.js' };
  }

  // Content Scripts
  if ($('#enableCS').checked) {
    const matches = $('#csMatches').value.split(',').map(s => s.trim()).filter(Boolean);
    const js = $('#csJS').value.split(',').map(s => s.trim()).filter(Boolean);
    const css = $('#csCSS').value.split(',').map(s => s.trim()).filter(Boolean);
    if (matches.length) {
      manifest.content_scripts = [{ matches }];
      if (js.length) manifest.content_scripts[0].js = js;
      if (css.length) manifest.content_scripts[0].css = css;
      manifest.content_scripts[0].run_at = $('#csRunAt').value;
    }
  }

  // Options
  if ($('#enableOptions').checked) {
    manifest.options_page = $('#optionsPage').value || 'options.html';
  }

  const json = JSON.stringify(manifest, null, 2);
  $('#output').textContent = json;
  $('#output').dataset.raw = json;
}

function downloadManifest() {
  const json = $('#output').dataset.raw;
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'manifest.json'; a.click();
  URL.revokeObjectURL(url);
}

const presets = {
  blank: { perms:[], action:false, bg:false, cs:false, options:false },
  contentScript: { perms:['activeTab','storage'], action:true, bg:false, cs:true, options:false },
  popup: { perms:['activeTab','storage'], action:true, bg:false, cs:false, options:true },
  sidePanel: { perms:['activeTab','storage','sidePanel'], action:true, bg:true, cs:false, options:false },
  devtools: { perms:['activeTab','storage'], action:false, bg:true, cs:false, options:false },
};

function loadPreset(name) {
  const p = presets[name];
  // Reset perms
  document.querySelectorAll('#permChecks input').forEach(c => c.checked = p.perms.includes(c.value));
  $('#enableAction').checked = p.action;
  $('#enableBg').checked = p.bg;
  $('#enableCS').checked = p.cs;
  $('#enableOptions').checked = p.options;
  generate();
}

$('#toolbar').innerHTML = `
  <button class="gz-btn gz-btn-secondary" onclick="copyText($('#output').dataset.raw||'')">${t('copy')}</button>
  <button class="gz-btn" onclick="downloadManifest()">${t('download')}</button>`;

$('#presets').innerHTML = Object.keys(presets).map(n =>
  `<button class="tag-chip" onclick="loadPreset('${n}')">${t('preset'+n.charAt(0).toUpperCase()+n.slice(1))}</button>`
).join('');

renderPerms();
generate();

GZ.renderToolPage({
  category: 'dev',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📦', href:'/dev/json-formatter.html', name:'JSON Formatter'},
    {icon:'🔒', href:'/dev/csp-generator.html', name:'CSP Generator'},
    {icon:'⚡', href:'/dev/resource-hints-generator.html', name:'Resource Hints'},
    {icon:'🛡️', href:'/dev/permissions-policy-generator.html', name:'Permissions Policy'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
