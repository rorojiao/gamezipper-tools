<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "How is cost per use calculated?", "acceptedAnswer": {"@type": "Answer", "text": "Cost per use equals the total cost of an item (purchase price plus any maintenance or running costs) divided by the number of times you expect to use it over its lifetime. For example, a $200 coat worn 400 times has a cost per use of $0.50."}}, {"@type": "Question", "name": "What is a good cost per use?", "acceptedAnswer": {"@type": "Answer", "text": "There is no fixed threshold — it depends on the category. The goal is comparison: the item with the lowest cost per use offers the best long-term value. Daily-use items (shoes, appliances, tools) often beat cheap alternatives that wear out quickly."}}, {"@type": "Question", "name": "Can I compare different products at once?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. Add as many items as you like — each row computes its own cost per use, and the lowest-value item is highlighted as the best deal so you can decide which to buy."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header"><h1 id="title"></h1><p class="desc" id="desc"></p></div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="cpu-grid" id="rows"></div>
    <p class="note" id="hint"></p>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Cost Per Use Calculator',
    toolDesc: 'Reveal the true value of any product by dividing its price by expected uses. Compare items side by side and shop smarter.',
    item: 'Item', price: 'Price', uses: 'Uses', usesPerYr: 'Uses / year', years: 'Lifespan (yr)', maint: 'Extra cost', currency: 'Currency',
    itemN: 'Item', addRow: '➕ Add Item', reset: 'Reset', example: 'Load Example',
    result: 'Cost per use', bestDeal: '🏆 Best value',
    hint: 'Tip: switch the mode to estimate uses from "uses per year × lifespan". Include repairs, ink, batteries or subscriptions in Extra cost.',
    modeUses: 'Total uses', modeYears: 'Per year × lifespan',
    step1: 'Enter the purchase price of the product',
    step2: 'Choose how to estimate uses — a total number, or uses per year × lifespan',
    step3: 'Add any extra costs (maintenance, accessories, subscriptions)',
    step4: 'Compare cost per use across items — the lowest wins',
  },
  zh: {
    toolTitle: '单次使用成本计算器',
    toolDesc: '通过价格除以预期使用次数，揭示产品的真实价值。并排比较多个商品，做出更明智的消费决策。',
    item: '商品', price: '价格', uses: '使用次数', usesPerYr: '每年次数', years: '寿命（年）', maint: '附加成本', currency: '货币',
    itemN: '商品', addRow: '➕ 添加商品', reset: '重置', example: '加载示例',
    result: '单次成本', bestDeal: '🏆 最划算',
    hint: '提示：可切换为「每年次数 × 寿命」来估算总使用次数。维修、墨水、电池或订阅费请计入附加成本。',
    modeUses: '总次数', modeYears: '每年次数 × 寿命',
    step1: '输入商品的购买价格',
    step2: '选择估算方式 — 直接填总次数，或每年次数 × 寿命',
    step3: '添加附加成本（维修、配件、订阅等）',
    step4: '比较各商品的单次成本，最低者最划算',
  }
});
const { $, copyText, t } = GZ;
let mode = 'uses';
let rows = [];
const CURRENCIES = ['USD $','EUR €','GBP £','CNY ¥','JPY ¥','INR ₹','AUD $','CAD $'];

function newRow(data={}) {
  rows.push(Object.assign({name:'', price:'', uses:'', upy:'', years:'', maint:'', cur:'USD $'}, data));
  render();
}

function render() {
  const box = $('#rows');
  box.innerHTML = '';
  rows.forEach((r, i) => {
    const div = document.createElement('div');
    div.className = 'cpu-row';
    div.innerHTML = `
      <h3>${t('itemN')} #${i+1}
        <button class="rm" title="remove" onclick="delRow(${i})">✕</button>
      </h3>
      <div class="cpu-fields">
        <div><label>${t('item')}</label><input type="text" value="${esc(r.name)}" oninput="rows[${i}].name=this.value;calc()"></div>
        <div><label>${t('currency')}</label><select onchange="rows[${i}].cur=this.value;calc()">${CURRENCIES.map(c=>`<option ${c===r.cur?'selected':''}>${c}</option>`).join('')}</select></div>
        <div><label>${t('price')}</label><input type="number" min="0" step="any" value="${r.price}" oninput="rows[${i}].price=this.value;calc()"></div>
        ${mode==='uses' ? `<div><label>${t('uses')}</label><input type="number" min="0" step="any" value="${r.uses}" oninput="rows[${i}].uses=this.value;calc()"></div>`
          : `<div><label>${t('usesPerYr')}</label><input type="number" min="0" step="any" value="${r.upy}" oninput="rows[${i}].upy=this.value;calc()"></div>
             <div><label>${t('years')}</label><input type="number" min="0" step="any" value="${r.years}" oninput="rows[${i}].years=this.value;calc()"></div>`}
        <div><label>${t('maint')}</label><input type="number" min="0" step="any" value="${r.maint}" oninput="rows[${i}].maint=this.value;calc()"></div>
      </div>
      <div class="cpu-result" id="res-${i}"></div>`;
    box.appendChild(div);
  });
  calc();
}

function esc(s){return String(s).replace(/"/g,'&quot;').replace(/</g,'&lt;');}

function calc() {
  const vals = rows.map(r => {
    const total = (parseFloat(r.price)||0) + (parseFloat(r.maint)||0);
    let uses = mode==='uses' ? (parseFloat(r.uses)||0) : (parseFloat(r.upy)||0) * (parseFloat(r.years)||0);
    const cpu = uses > 0 ? total/uses : Infinity;
    return { total, uses, cpu, cur: r.cur };
  });
  const min = Math.min(...vals.map(v=>v.cpu));
  rows.forEach((r,i) => {
    const el = $(`#res-${i}`);
    if (!el) return;
    const v = vals[i];
    const cur = r.cur;
    if (v.uses <= 0 || v.total <= 0) {
      el.innerHTML = `<span style="color:var(--text2)">—</span>`;
      return;
    }
    const cpuStr = v.cpu < Infinity ? curFmt(cur, v.cpu) : '∞';
    el.innerHTML = `<span>${t('result')}: <b>${cpuStr}</b></span><span>${curFmt(cur,v.total)} ÷ ${fmt(v.uses)}</span>`;
    el.parentElement.classList.toggle('best', v.cpu === min && min < Infinity);
  });
}

function curFmt(cur, n){
  const sym = cur.split(' ')[1] || '';
  return sym + (n>=100? n.toLocaleString(undefined,{maximumFractionDigits:2}) : n.toFixed(2));
}
function fmt(n){return n>=1000? n.toLocaleString() : (Math.round(n*100)/100);}

function delRow(i){ rows.splice(i,1); if(!rows.length) newRow(); render(); }

function setMode(m){
  mode = m;
  document.querySelectorAll('#toolbar .gz-btn').forEach(b=>b.classList.remove('active'));
  calc();
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="newRow()">${t('addRow')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="resetAll()">${t('reset')}</button>
  <select class="gz-select" onchange="mode=this.value;render()">
    <option value="uses">${t('modeUses')}</option>
    <option value="years">${t('modeYears')}</option>
  </select>`;
$('#hint').textContent = t('hint');

function loadExample(){
  rows = [];
  newRow({name:'Cheap Sneakers', price:'35', uses:'60', maint:'0', cur:'USD $'});
  newRow({name:'Quality Sneakers', price:'120', uses:'400', maint:'10', cur:'USD $'});
}
function resetAll(){ rows=[]; newRow({}); }

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'💹', href:'/calc/roi-calculator.html', name:'ROI Calculator'},
    {icon:'🏷️', href:'/calc/discount-calculator.html', name:'Discount Calculator'},
    {icon:'💰', href:'/calc/unit-price.html', name:'Unit Price'},
    {icon:'🔁', href:'/calc/subscription-cost-calculator.html', name:'Subscription Cost'},
  ]
});

newRow({name:'', price:'', uses:'', maint:'', cur:'USD $'});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
