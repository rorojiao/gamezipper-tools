<script>
GZI18n.register({
  en: {
    toolTitle: 'Text Wrap & Column Formatter',
    toolDesc: 'Wrap text to any column width, add line numbers, indent lines and format paragraphs — instant and free.',
    input: 'Input Text',
    output: 'Wrapped Result',
    step1: 'Paste or type your text in the input area',
    step2: 'Set the column width (default 80 characters)',
    step3: 'Optionally enable line numbers, indent or prefix',
    step4: 'Copy the wrapped result to your clipboard',
  },
  zh: {
    toolTitle: '文本换行与列格式化',
    toolDesc: '将文本按指定列宽换行，添加行号、缩进和前缀 — 即时免费。',
    input: '输入文本',
    output: '换行结果',
    step1: '在输入区粘贴或输入文本',
    step2: '设置列宽（默认 80 字符）',
    step3: '可选启用行号、缩进或前缀',
    step4: '将换行结果复制到剪贴板',
  }
});
const { $, copyText, t } = GZ;
function wrapText(text, width) {
  const lines = [];
  const paragraphs = text.split('\n');
  for (const para of paragraphs) {
    if (!para.trim()) { lines.push(''); continue; }
    const words = para.split(/\s+/);
    let line = '';
    for (const word of words) {
      if (!word) continue;
      if (line.length + (line ? 1 : 0) + word.length > width && line) {
        lines.push(line);
        line = word;
      } else {
        line = line ? line + ' ' + word : word;
      }
    }
    if (line) lines.push(line);
  }
  return lines;
}
function process() {
  const text = $('#input').value;
  const width = parseInt($('#width').value) || 80;
  const showLineNums = $('#lineNums').checked;
  const indent = $('#indent').value;
  const prefix = $('#prefix').value;
  const lines = wrapText(text, width);
  const numWidth = String(lines.length).length;
  const result = lines.map((line, i) => {
    let l = indent + prefix + line;
    if (showLineNums) {
      const num = String(i + 1).padStart(numWidth, ' ');
      l = num + ' | ' + l;
    }
    return l;
  }).join('\n');
  $('#output').textContent = result;
}
$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy') || 'Copy'}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#input').value='';process()">${t('clear') || 'Clear'}</button>`;
$('#input').addEventListener('input', process);
$('#width').addEventListener('input', process);
$('#lineNums').addEventListener('change', process);
$('#indent').addEventListener('input', process);
$('#prefix').addEventListener('input', process);
process();
GZ.renderToolPage({

});
</script>
