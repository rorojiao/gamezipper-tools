<script>
GZI18n.register({
  en: {
    toolTitle: 'Blog Post Ideas Generator',
    toolDesc: 'Generate unlimited, SEO-friendly blog post ideas. Enter your niche or keyword — get 30+ creative blog post titles and content angles instantly.',
    nichePlaceholder: 'Enter your niche or keyword (e.g., “digital marketing”, “vegan cooking”)...',
    generate: 'Generate Ideas',
    copyAll: 'Copy All',
    copy: 'Copy',
    copied: 'Copied!',
    ideasGenerated: 'ideas generated',
    step1: 'Enter your blog niche or main keyword',
    step2: 'Click Generate Ideas to get 30+ title variations',
    step3: 'Browse ideas across different content types (how-to, listicle, etc.)',
    step4: 'Click Copy on any idea to save it for your content calendar',
  },
  zh: {
    toolTitle: '博客文章创意生成器',
    toolDesc: '生成无限量、SEO 友好的博客文章创意。输入你的领域或关键词 — 即时获取 30+ 个创意标题和内容角度。',
    nichePlaceholder: '输入你的领域或关键词（如"数字营销"、"纯素烹饪"）...',
    generate: '生成创意',
    copyAll: '全部复制',
    copy: '复制',
    copied: '已复制！',
    ideasGenerated: '个创意已生成',
    step1: '输入你的博客领域或主要关键词',
    step2: '点击「生成创意」获取 30+ 种标题变体',
    step3: '浏览不同内容类型的创意（教程、清单等）',
    step4: '点击任意创意旁的「复制」保存到你的内容日历',
  }
});

const { $, copyText, t } = GZ;
$('#nicheInput').placeholder = t('nichePlaceholder');
$('#genBtn').textContent = t('generate');
$('#copyAllBtn').textContent = t('copyAll');

const IDEA_TEMPLATES = {
  howto: [
    'How to Get Started with {Topic} (Complete Guide)',
    'How to Master {Topic} in 30 Days',
    'How to {Topic} on a Budget',
    'How to Avoid Common {Topic} Mistakes',
    'Step-by-Step {Topic} for Beginners',
  ],
  listicle: [
    '7 Essential {Topic} Tips Every Beginner Should Know',
    '10 {Topic} Tools That Will Save You Hours',
    '15 {Topic} Trends to Watch in 2026',
    '21 {Topic} Resources You Can\'t Live Without',
    '5 Signs You\'re Ready to Level Up Your {Topic}',
  ],
  comparison: [
    '{Topic} vs Traditional Methods: Which Is Better?',
    'The Best {Topic} Strategies Compared',
    'Free vs Paid {Topic}: What\'s Worth Your Money?',
    '{Topic}: In-House vs Outsourced — Pros and Cons',
  ],
  guide: [
    'The Ultimate Guide to {Topic} (2026 Edition)',
    '{Topic} 101: Everything You Need to Know',
    'The Complete {Topic} Handbook for Beginners',
    'A Beginner\'s Journey into {Topic}',
    '{Topic} Demystified: A No-Jargon Guide',
  ],
  mistakes: [
    '7 {Topic} Mistakes That Are Costing You Money',
    'The Biggest {Topic} Myths Debunked',
    'Why Your {Topic} Strategy Isn\'t Working (And How to Fix It)',
    'Common {Topic} Pitfalls and How to Avoid Them',
  ],
  case_study: [
    'Case Study: How I Grew My {Topic} from Zero',
    'How {Brand} Succeeded with {Topic} (Real Results)',
    '{Topic} Success Story: From $0 to $10K',
    'I Tried {Topic} for 90 Days — Here\'s What Happened',
  ],
  trends: [
    'The Future of {Topic}: 2026 Predictions',
    '{Topic} Trends You Can\'t Ignore This Year',
    'How AI Is Changing {Topic} Forever',
    'Emerging {Topic} Technologies to Watch',
  ],
  qa: [
    'Is {Topic} Worth It in 2026?',
    'What Nobody Tells You About {Topic}',
    'How Much Does {Topic} Really Cost?',
    'Can You Learn {Topic} Without Experience?',
    'How Long Does It Take to Master {Topic}?',
  ],
  roundup: [
    'The Best {Topic} Blogs to Follow in 2026',
    'Top {Topic} Podcasts for Beginners',
    '10 {Topic} Books That Changed My Life',
    'The Best Free {Topic} Courses Online',
  ],
  personal: [
    'My {Topic} Journey: Lessons Learned',
    'Why I Switched to {Topic} (And Never Looked Back)',
    'What I Wish I Knew Before Starting {Topic}',
    'How {Topic} Changed My Life',
  ],
};

const SECTION_LABELS = {
  howto: { en: '📝 How-To Guides', zh: '📝 教程指南' },
  listicle: { en: '📋 Listicles', zh: '📋 清单文章' },
  comparison: { en: '⚖️ Comparisons', zh: '⚖️ 对比分析' },
  guide: { en: '📚 Ultimate Guides', zh: '📚 终极指南' },
  mistakes: { en: '⚠️ Common Mistakes', zh: '⚠️ 常见错误' },
  case_study: { en: '📊 Case Studies', zh: '📊 案例研究' },
  trends: { en: '🔮 Trends & Future', zh: '🔮 趋势与未来' },
  qa: { en: '❓ Questions & Answers', zh: '❓ 问答类' },
  roundup: { en: '🏆 Roundups', zh: '🏆 盘点合集' },
  personal: { en: '💬 Personal Stories', zh: '💬 个人故事' },
};

let currentIdeas = [];

function generateIdeas() {
  let topic = $('#nicheInput').value.trim();
  if (!topic) { $('#results').innerHTML = ''; $('#stats').textContent = ''; return; }
  topic = topic.charAt(0).toUpperCase() + topic.slice(1);
  
  currentIdeas = [];
  const lang = GZI18n.getLang();
  let html = '';
  
  Object.entries(IDEA_TEMPLATES).forEach(([section, templates]) => {
    const label = SECTION_LABELS[section][lang];
    const ideas = templates.map(tpl => tpl.replace(/\{Topic\}/g, topic).replace(/\{Brand\}/g, lang === 'zh' ? '某品牌' : 'Top Brands'));
    currentIdeas.push(...ideas);
    html += `<div style="margin-bottom:16px">
      <h3 style="font-size:1em;margin-bottom:6px;color:var(--gz-accent)">${label}</h3>
      ${ideas.map((idea, i) => `
        <div style="display:flex;align-items:center;gap:8px;padding:8px 10px;margin-bottom:4px;background:var(--glass);border:1px solid var(--border);border-radius:6px">
          <span style="flex:1;cursor:pointer" onclick="copyText(this.textContent);flashIdea(this)">${idea}</span>
          <button class="gz-btn gz-btn-secondary" style="padding:3px 8px;font-size:.75em" onclick="copyText('${idea.replace(/'/g,"\\'")}');this.textContent='${t('copied')}'">${t('copy')}</button>
        </div>`).join('')}
    </div>`;
  });
  
  $('#results').innerHTML = html;
  $('#stats').textContent = `${currentIdeas.length} ${t('ideasGenerated')}`;
}

window.flashIdea = function(el) {
  copyText(el.textContent);
  const orig = el.style.color;
  el.style.color = 'var(--gz-accent)';
  setTimeout(() => el.style.color = orig, 500);
};

$('#genBtn').addEventListener('click', generateIdeas);
$('#nicheInput').addEventListener('keydown', e => { if (e.key === 'Enter') generateIdeas(); });
$('#copyAllBtn').addEventListener('click', () => {
  if (!currentIdeas.length) return;
  copyText(currentIdeas.join('\n'));
  $('#copyAllBtn').textContent = t('copied');
  setTimeout(() => $('#copyAllBtn').textContent = t('copyAll'), 1500);
});

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📝', href:'/text/blog-title-generator.html', name:'Blog Titles'},
    {icon:'#️⃣', href:'/text/hashtag-generator.html', name:'Hashtags'},
    {icon:'🏷️', href:'/text/youtube-tag-generator.html', name:'YT Tags'},
    {icon:'✉️', href:'/text/email-writer.html', name:'Email Writer'},
  ]
});
</script>

</body>
