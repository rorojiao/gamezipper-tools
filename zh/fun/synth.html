<script>
GZI18n.register({
  en: {
    toolTitle: 'Online Synthesizer',
    toolDesc: 'Play and design synth sounds in your browser. Dual oscillators, resonant filter, ADSR envelope, LFO and 6 presets. Play with your keyboard or mouse — pure Web Audio, no install, no signup.',
    step1: 'Click any key (or press A W S E D F T G Y H U J K on your keyboard)',
    step2: 'Tweak oscillators, filter and envelope to shape your sound',
    step3: 'Try the built-in presets: Lead, Pad, Bass, Pluck, Bell, Acid',
    step4: 'Click Save Preset to keep your patch in this browser',
    hint: '⌨️ Keyboard map: A=C, W=C#, S=D, E=D#, D=E, F=F, T=F#, G=G, Y=G#, H=A, U=A#, J=B, K=C(octave up). Click a key first if no sound — browsers need a user gesture.',
  },
  zh: {
    toolTitle: '在线合成器',
    toolDesc: '在浏览器中弹奏和设计合成器音色。双振荡器、共振滤波器、ADSR 包络、LFO 和 6 种预设。用键盘或鼠标演奏 — 纯 Web Audio，无需安装、无需注册。',
    step1: '点击任意琴键（或按键盘 A W S E D F T G Y H U J K）',
    step2: '调节振荡器、滤波器和包络来塑造你的音色',
    step3: '试试内置预设：Lead、Pad、Bass、Pluck、Bell、Acid',
    step4: '点击「保存预设」将你的音色保存在此浏览器中',
    hint: '⌨️ 键盘映射：A=C, W=C#, S=D, E=D#, D=E, F=F, T=F#, G=G, Y=G#, H=A, U=A#, J=B, K=C(高八度)。若无声音请先点击琴键 — 浏览器需要用户交互才能启动音频。',
  }
});

const { $, t } = GZ;
let actx = null, analyser = null, dataArray = null, rafId = null;
let P = { o1t:'sawtooth', o2t:'square', det:7, mix:0.3, cut:3000, res:3, att:0.02, dec:0.2, sus:0.6, rel:0.3, vol:0.5, lfo:0, lfod:0 };
const active = new Map(); // freq -> nodes

const PRESETS = {
  'Lead':  { o1t:'sawtooth', o2t:'square', det:7, mix:0.4, cut:4500, res:5, att:0.01, dec:0.15, sus:0.7, rel:0.2, vol:0.5, lfo:0, lfod:0 },
  'Pad':   { o1t:'sine', o2t:'triangle', det:12, mix:0.5, cut:2000, res:1, att:0.4, dec:0.5, sus:0.8, rel:1.2, vol:0.4, lfo:0.5, lfod:0.3 },
  'Bass':  { o1t:'sawtooth', o2t:'sine', det:-12, mix:0.3, cut:600, res:8, att:0.005, dec:0.1, sus:0.5, rel:0.1, vol:0.6, lfo:0, lfod:0 },
  'Pluck': { o1t:'triangle', o2t:'sine', det:0, mix:0.2, cut:3000, res:2, att:0.001, dec:0.15, sus:0.0, rel:0.15, vol:0.5, lfo:0, lfod:0 },
  'Bell':  { o1t:'sine', o2t:'sine', det:19, mix:0.4, cut:6000, res:0, att:0.001, dec:0.8, sus:0.0, rel:1.5, vol:0.4, lfo:0, lfod:0 },
  'Acid':  { o1t:'sawtooth', o2t:'square', det:0, mix:0.5, cut:1500, res:18, att:0.005, dec:0.2, sus:0.4, rel:0.1, vol:0.5, lfo:3, lfod:0.5 },
};

function ensureCtx(){ if(!actx){ actx=new (window.AudioContext||window.webkitAudioContext)(); analyser=actx.createAnalyser(); analyser.fftSize=512; dataArray=new Uint8Array(analyser.frequencyBinCount); analyser.connect(actx.destination);} if(actx.state==='suspended') actx.resume(); }

function midiToFreq(m){ return 440*Math.pow(2,(m-69)/12); }

function noteOn(midi) {
  ensureCtx();
  if (active.has(midi)) return;
  const freq = midiToFreq(midi);
  const now = actx.currentTime;
  // master gain
  const master = actx.createGain(); master.gain.value = P.vol * 0.4;
  // filter
  const filter = actx.createBiquadFilter(); filter.type='lowpass'; filter.frequency.value=P.cut; filter.Q.value=P.res;
  // oscillators
  const o1 = actx.createOscillator(); o1.type=P.o1t; o1.frequency.value=freq;
  const g1 = actx.createGain(); g1.gain.value = 1 - P.mix*0.7;
  o1.connect(g1); g1.connect(filter);
  const o2 = actx.createOscillator(); o2.type=P.o2t; o2.frequency.value=freq; o2.detune.value=P.det*100;
  const g2 = actx.createGain(); g2.gain.value = P.mix;
  o2.connect(g2); g2.connect(filter);
  // LFO -> filter cutoff
  let lfo=null, lfoGain=null;
  if (P.lfo > 0 && P.lfod > 0) {
    lfo = actx.createOscillator(); lfo.frequency.value = P.lfo;
    lfoGain = actx.createGain(); lfoGain.gain.value = P.cut * P.lfod * 0.8;
    lfo.connect(lfoGain); lfoGain.connect(filter.frequency);
    lfo.start(now);
  }
  // envelope on master
  master.gain.setValueAtTime(0, now);
  master.gain.linearRampToValueAtTime(P.vol*0.4, now + Math.max(0.001,P.att));
  master.gain.exponentialRampToValueAtTime(Math.max(0.0001, P.vol*0.4*P.sus), now + P.att + P.dec);
  filter.connect(master); master.connect(analyser);
  o1.start(now); o2.start(now);
  active.set(midi, {o1,o2,g1,g2,filter,master,lfo});
  startVis();
}
function noteOff(midi) {
  const n = active.get(midi); if (!n) return;
  const now = actx.currentTime;
  n.master.gain.cancelScheduledValues(now);
  n.master.gain.setValueAtTime(n.master.gain.value, now);
  n.master.gain.exponentialRampToValueAtTime(0.0001, now + Math.max(0.02,P.rel));
  setTimeout(() => { try{n.o1.stop();}catch(e){} try{n.o2.stop();}catch(e){} try{if(n.lfo)n.lfo.stop();}catch(e){} }, (P.rel+0.1)*1000);
  active.delete(midi);
}
function setParam(k,v){ P[k]=v; // update active notes' live params where possible
  if (k==='cut' || k==='res') { active.forEach(n => { if(k==='cut') n.filter.frequency.setValueAtTime(v, actx.currentTime); else n.filter.Q.setValueAtTime(v, actx.currentTime); }); }
  if (k==='vol') { active.forEach(n => n.master.gain.setValueAtTime(v*0.4*P.sus, actx.currentTime)); }
}
function updLabel(id,v){ const el=$('#'+id); if(el) el.textContent=v; }

function loadPreset(name) {
  const p = PRESETS[name] || JSON.parse(localStorage.getItem('synth-'+name));
  if (!p) return;
  P = {...p};
  // sync UI
  ['o1t','o2t'].forEach(k => { $('#'+k).value=P[k]; updLabel('v-'+k,P[k]); });
  [['det',' semitones'],['mix','%'],['cut',' Hz'],['res',''],['att','s'],['dec','s'],['sus','%'],['rel','s'],['vol','%'],['lfo',' Hz'],['lfod','%']].forEach(([k,unit]) => {
    const el=$('#'+k); if(!el) return;
    if (k==='mix'||k==='sus'||k==='vol'||k==='lfod') el.value=Math.round(P[k]*100);
    else if (k==='att'||k==='dec'||k==='rel') el.value=Math.round(P[k]*1000);
    else el.value=P[k];
    updLabel('v-'+k, el.value + (unit==='s'?'':unit===' Hz'?' Hz':unit==='%'?'%':unit===' semitones'?' semitones':''));
    // For time values show seconds
    if (unit==='s') updLabel('v-'+k, (P[k]).toFixed(2)+'s');
  });
  // refresh preset highlight
  document.querySelectorAll('.syn-preset').forEach(b => b.classList.toggle('active', b.dataset.name===name));
}

function savePreset() {
  const name = prompt('Preset name:', 'My Patch ' + (Object.keys(localStorage).filter(k=>k.startsWith('synth-')).length+1));
  if (!name) return;
  localStorage.setItem('synth-'+name, JSON.stringify(P));
  renderPresets();
}

function renderPresets() {
  const bar = $('#presets');
  const built = Object.keys(PRESETS);
  const custom = Object.keys(localStorage).filter(k=>k.startsWith('synth-')).map(k=>k.replace('synth-',''));
  bar.innerHTML = built.concat(custom).map(n => `<div class="syn-preset" data-name="${n}" onclick="loadPreset('${n}')">${custom.includes(n)?'⭐ ':''}${n}</div>`).join('');
}

// Build keyboard (1.5 octaves C4-G5)
const WHITE_SEMITONES = [0,2,4,5,7,9,11,12,14];
const WHITE_KEYS = ['a','s','d','f','g','h','j','k','l'];
const BLACK_MAP = {0:{s:1,k:'w'},1:{s:3,k:'e'},3:{s:6,k:'t'},4:{s:8,k:'y'},5:{s:10,k:'u'},7:{s:13,k:'o'}};
const BASE_MIDI = 60; // C4
function buildKeys() {
  const keys = $('#keys'); keys.innerHTML='';
  WHITE_SEMITONES.forEach((s,i) => {
    const midi = BASE_MIDI + s;
    const div = document.createElement('div');
    div.className='syn-w'; div.dataset.midi=midi;
    const noteName = ['C','D','E','F','G','A','B','C','D'][i];
    div.innerHTML=`<div class="n">${noteName}</div><div class="k">${WHITE_KEYS[i].toUpperCase()}</div>`;
    addKey(div, midi);
    keys.appendChild(div);
    // black key after?
    if (BLACK_MAP[i]) {
      const bm = BASE_MIDI + BLACK_MAP[i].s;
      const bk = document.createElement('div');
      bk.className='syn-b'; bk.dataset.midi=bm;
      bk.style.left = (((i+1)/WHITE_SEMITONES.length)*100 - 3) + '%';
      bk.title = BLACK_MAP[i].k.toUpperCase();
      addKey(bk, bm);
      keys.appendChild(bk);
    }
  });
}
function addKey(el, midi) {
  const down = (e) => { e.preventDefault(); el.classList.add('active'); noteOn(midi); };
  const up = (e) => { el.classList.remove('active'); noteOff(midi); };
  el.addEventListener('mousedown', down);
  el.addEventListener('touchstart', down, {passive:false});
  el.addEventListener('mouseup', up);
  el.addEventListener('mouseleave', up);
  el.addEventListener('touchend', up);
}
const heldKeys = new Set();
document.addEventListener('keydown', e => {
  if (e.repeat) return;
  if (['INPUT','SELECT','TEXTAREA'].includes(e.target.tagName)) return;
  const k = e.key.toLowerCase();
  if (heldKeys.has(k)) return;
  heldKeys.add(k);
  const el = document.querySelector(`.syn-w[data-midi], .syn-b[data-midi]`);
  // find by key letter
  const allKeys = [...document.querySelectorAll('.syn-w, .syn-b')];
  // map letter -> midi
  let midi = null;
  WHITE_KEYS.forEach((wk,i) => { if (wk===k) midi = BASE_MIDI + WHITE_SEMITONES[i]; });
  Object.values(BLACK_MAP).forEach(b => { if (b.k===k) midi = BASE_MIDI + b.s; });
  if (midi!==null) {
    const kel = document.querySelector(`[data-midi="${midi}"]`);
    if (kel) { kel.classList.add('active'); noteOn(midi); }
  }
});
document.addEventListener('keyup', e => {
  const k = e.key.toLowerCase();
  if (!heldKeys.has(k)) return;
  heldKeys.delete(k);
  let midi = null;
  WHITE_KEYS.forEach((wk,i) => { if (wk===k) midi = BASE_MIDI + WHITE_SEMITONES[i]; });
  Object.values(BLACK_MAP).forEach(b => { if (b.k===k) midi = BASE_MIDI + b.s; });
  if (midi!==null) {
    const kel = document.querySelector(`[data-midi="${midi}"]`);
    if (kel) { kel.classList.remove('active'); noteOff(midi); }
  }
});

// Visualizer
function startVis() {
  if (rafId) return;
  const canvas = $('#vis'); const ctx = canvas.getContext('2d');
  function loop(){
    if (!analyser || active.size===0) { ctx.clearRect(0,0,canvas.width,canvas.height); rafId=null; return; }
    analyser.getByteTimeDomainData(dataArray);
    ctx.fillStyle='#000'; ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.lineWidth=2; ctx.strokeStyle='#4ecdc4'; ctx.beginPath();
    const slice = canvas.width / dataArray.length;
    for (let i=0;i<dataArray.length;i++){
      const v = dataArray[i]/128.0; const y = v * canvas.height/2;
      if (i===0) ctx.moveTo(0,y); else ctx.lineTo(i*slice,y);
    }
    ctx.stroke();
    rafId = requestAnimationFrame(loop);
  }
  loop();
}
