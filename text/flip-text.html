function flipUpsideDown(text) {
  return text.split('').map(c => flipMap[c] || c).reverse().join('');
}

function reverseText(text) {
  return text.split('').reverse().join('');
}

function mirrorText(text) {
  return text.split('').map(c => {
    const mirrorChars = {'(':' )',')':'(','[':']',']':'[','{':'}','}':'{','<':'>','>':'<','/':'\\','\\':'/'};
    return mirrorChars[c] || c;
  }).reverse().join('');
}

function bubbleText(text) {
  return text.split('').map(c => bubbleMap[c] || c).join('');
}

let currentMode = 'flip';

function processText() {
  const text = $('#input').value;
  if (!text) { $('#output').textContent = ''; return; }
  let result;
  switch(currentMode) {
    case 'flip': result = flipUpsideDown(text); break;
    case 'reverse': result = reverseText(text); break;
    case 'mirror': result = mirrorText(text); break;
    case 'bubble': result = bubbleText(text); break;
    default: result = flipUpsideDown(text);
  }
  $('#output').textContent = result;
}

$('#input').addEventListener('input', processText);
