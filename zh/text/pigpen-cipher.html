function svgFor(letter) {
  if (!GLYPHS[letter]) return '';
  return `<svg width="22" height="22" viewBox="-1 -1 22 22" style="display:inline-block;vertical-align:middle">${GLYPHS[letter]}</svg>`;
}

function encode(text) {
  let html = '';
  let plain = '';
  for (const ch of text) {
    const up = ch.toUpperCase();
    if (GLYPHS[up]) {
      html += svgFor(up) + ' ';
      plain += up + ' ';
    } else if (ch === ' ' || ch === '\n' || ch === '\t') {
      html += '<span style="display:inline-block;width:16px"></span>';
      plain += ' ';
    } else {
      html += `<span style="opacity:.6">${ch}</span>`;
      plain += ch;
    }
  }
  return { html, plain };
}

function update() {
  const inp = $('#input').value;
  const { html, plain } = encode(inp);
  $('#output').innerHTML = html;
  $('#output').dataset.plain = plain;
}

function loadExample() {
  $('#input').value = 'HELLO WORLD';
  update();
}

function doClear() { $('#input').value = ''; $('#output').innerHTML = ''; }

function copyOutput() {
  const plain = $('#output').dataset.plain || '';
  copyText(plain);
}

// Build reference chart
function buildReference() {
  const letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
  $('#reference').innerHTML = letters.map(L => {
    const svg = svgFor(L);
    return `<div class="pig-cell">${svg}<b>${L}</b></div>`;
  }).join('');
}

$('#input').addEventListener('input', update);

  <button class="gz-btn" onclick="copyOutput()">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

buildReference();
