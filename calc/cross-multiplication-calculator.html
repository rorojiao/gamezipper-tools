<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"What is cross multiplication?","acceptedAnswer":{"@type":"Answer","text":"Cross multiplication is a method for solving a proportion a/b = c/d. You multiply across the equals sign: a×d = b×c. If one of the four values is unknown, you can solve for it using this equation."}},{"@type":"Question","name":"How do I solve for x in 3/4 = x/12?","acceptedAnswer":{"@type":"Answer","text":"Cross multiply: 3 × 12 = 4 × x, so 36 = 4x, and x = 9. The calculator automates this and shows each step."}},{"@type":"Question","name":"What are common uses of cross multiplication?","acceptedAnswer":{"@type":"Answer","text":"Scaling recipes, resizing images, calculating map distances, working out unit prices, currency conversion ratios, diluting chemicals, mixing paint, and checking whether two fractions are equivalent."}},{"@type":"Question","name":"Can the calculator find any missing value?","acceptedAnswer":{"@type":"Answer","text":"Yes. Leave any one of the four fields (a, b, c, d) blank and the tool will solve for it. If you fill in all four it checks whether the proportion is true and reports the difference."}}]}</script>

<body>
<div class="gz-container">

<script>
GZI18n.register({
  en:{
    toolTitle:'Cross Multiplication Calculator',
    toolDesc:'Solve proportions a/b = c/d with cross multiplication. Leave any one field blank to find the missing value, or fill all four to check if the proportion is true. Step-by-step work included.',
    calculate:'⚡ Calculate',copy:'Copy',clear:'Clear',
    hint:'Leave ONE field empty to solve for it, or fill all four to verify the proportion.',
    resultSolve:'solved',
    resultTrue:'✓ The proportion is TRUE — both sides are equal.',
    resultFalse:'✗ The proportion is FALSE — left ≠ right.',
    resultDiff:'Difference:',
    step1T:'Step 1 — Set up the cross product',
    step2T:'Step 2 — Cross multiply',
    step3T:'Step 3 — Solve',
    invalidMissing:'Leave exactly ONE field empty (to solve for it), or fill all four.',
    invalidDiv:'Cannot divide by zero — check your inputs.',
    invalidNum:'Please enter valid numbers.',
    step1:'Enter three known values into a/b = c/d',
    step2:'Leave the fourth field empty to solve for it',
    step3:'Press Calculate to see the cross-multiply work',
    step4:'Use the result to scale recipes, ratios or images',
  },
  zh:{
    toolTitle:'交叉相乘计算器',
    toolDesc:'用交叉相乘法求解比例 a/b = c/d。留空任意一个字段即可求出该未知数，或全部填入以验证比例是否成立。附逐步过程。',
    calculate:'⚡ 计算',copy:'复制',clear:'清空',
    hint:'留空其中一个字段即可求解，或全部填入以验证比例是否成立。',
    resultSolve:'解得',
    resultTrue:'✓ 比例成立 — 左右两边相等。',
    resultFalse:'✗ 比例不成立 — 左 ≠ 右。',
    resultDiff:'差值：',
    step1T:'步骤 1 — 列出交叉积',
    step2T:'步骤 2 — 交叉相乘',
    step3T:'步骤 3 — 求解',
    invalidMissing:'请留空一个字段（用于求解），或全部填写。',
    invalidDiv:'除数为零 — 请检查输入。',
    invalidNum:'请输入有效数字。',
    step1:'在 a/b = c/d 中输入三个已知值',
    step2:'将第四个字段留空，要求解的就是它',
    step3:'点击「计算」查看交叉相乘过程',
    step4:'用结果缩放食谱、比例或图像',
  }
});

const { $, copyText, t } = GZ;

function fmt(n){
  if(!isFinite(n)) return n>0?'∞':'-∞';
  if(Number.isInteger(n)) return n.toString();
  return (Math.round(n*1e10)/1e10).toLocaleString('en-US',{maximumFractionDigits:10});
}
function val(id){const v=$('#'+id).value;return v===''?null:parseFloat(v);}

function calc(){
  const elB=$('#resultBig'),elM=$('#resultMeta'),steps=$('#steps');
  const a=val('a'),b=val('b'),c=val('c'),d=val('d');
  const arr=[a,b,c,d],ids=['a','b','c','d'];
  const blanks=arr.filter(x=>x===null).length;
  // reset missing highlight
  ['a','b','c','d'].forEach(id=>$('#'+id).parentElement.classList.remove('missing'));
  if(arr.some(x=>x!==null&&isNaN(x))){elB.textContent='—';elM.textContent=t('invalidNum');steps.textContent='';return;}
  if(blanks===0){
    // verify
    const left=a*b!==0&&d!==0?(a*d):null;
    const right=b*c;
    if(b===0||d===0){elB.textContent='—';elM.textContent=t('invalidDiv');steps.textContent='';return;}
    const equal=Math.abs((a*d)-(b*c))<1e-9;
    elB.textContent=equal?'TRUE':'FALSE';
    elM.textContent=equal?t('resultTrue'):`${t('resultFalse')} ${t('resultDiff')} ${fmt((a*d)-(b*c))}`;
    steps.innerHTML=
      `<div><b>${t('step1T')}</b>: ${fmt(a)} × ${fmt(d)} = ${fmt(b)} × ${fmt(c)}</div>`+
      `<div style="margin-top:6px">${t('step2T')}: ${fmt(a*d)} ${equal?'=':'≠'} ${fmt(b*c)}</div>`;
    return;
  }
  if(blanks!==1){elB.textContent='—';elM.textContent=t('invalidMissing');steps.textContent='';return;}
  // solve for the one blank
  const idx=arr.indexOf(null);
  $('#'+ids[idx]).parentElement.classList.add('missing');
  let result,work;
  const A=a,B=b,C=c,D=d;
  try{
    if(idx===0){ // solve a: a*d = b*c → a = b*c/d
      if(D===0) throw new Error('div');
      result=(B*C)/D;
      work=`<div><b>${t('step1T')}</b>: a × ${fmt(D)} = ${fmt(B)} × ${fmt(C)}</div>`+
            `<div style="margin-top:6px">${t('step2T')}: a × ${fmt(D)} = ${fmt(B*C)}</div>`+
            `<div>${t('step3T')}: a = ${fmt(B*C)} / ${fmt(D)} = <b>${fmt(result)}</b></div>`;
    } else if(idx===1){ // solve b: a*d = b*c → b = a*d/c
      if(C===0) throw new Error('div');
      result=(A*D)/C;
      work=`<div><b>${t('step1T')}</b>: ${fmt(A)} × ${fmt(D)} = b × ${fmt(C)}</div>`+
            `<div style="margin-top:6px">${t('step2T')}: ${fmt(A*D)} = b × ${fmt(C)}</div>`+
            `<div>${t('step3T')}: b = ${fmt(A*D)} / ${fmt(C)} = <b>${fmt(result)}</b></div>`;
    } else if(idx===2){ // solve c: a*d = b*c → c = a*d/b
      if(B===0) throw new Error('div');
      result=(A*D)/B;
      work=`<div><b>${t('step1T')}</b>: ${fmt(A)} × ${fmt(D)} = ${fmt(B)} × c</div>`+
            `<div style="margin-top:6px">${t('step2T')}: ${fmt(A*D)} = ${fmt(B)} × c</div>`+
            `<div>${t('step3T')}: c = ${fmt(A*D)} / ${fmt(B)} = <b>${fmt(result)}</b></div>`;
    } else { // solve d: a*d = b*c → d = b*c/a
      if(A===0) throw new Error('div');
      result=(B*C)/A;
      work=`<div><b>${t('step1T')}</b>: ${fmt(A)} × d = ${fmt(B)} × ${fmt(C)}</div>`+
            `<div style="margin-top:6px">${t('step2T')}: ${fmt(A)} × d = ${fmt(B*C)}</div>`+
            `<div>${t('step3T')}: d = ${fmt(B*C)} / ${fmt(A)} = <b>${fmt(result)}</b></div>`;
    }
  } catch(e){elB.textContent='—';elM.textContent=t('invalidDiv');steps.textContent='';return;}
  elB.textContent=`${ids[idx].toUpperCase()} = ${fmt(result)}`;
  elM.textContent=t('resultSolve');
  steps.innerHTML=work;
}

$('#calcBtn').addEventListener('click',calc);
['a','b','c','d'].forEach(id=>{$('#'+id).addEventListener('input',calc);});
$('#hint').textContent=t('hint');

$('#toolbar').innerHTML=`
  <button class="gz-btn" onclick="calc()">${t('calculate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="copyText($('#resultBig').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="['a','b','c','d'].forEach(id=>document.getElementById(id).value='');calc()">${t('clear')}</button>`;

GZ.renderToolPage({
  category:'calc',
  titleKey:'toolTitle',
  descKey:'toolDesc',
  howToSteps:['step1','step2','step3','step4'],
  related:[
    {icon:'📐',href:'/calc/ratio-calculator.html',name:'Ratio Calculator'},
    {icon:'➗',href:'/calc/fraction-simplifier.html',name:'Fraction Simplifier'},
    {icon:'🔢',href:'/calc/percentage-calculator.html',name:'Percentage Calculator'},
    {icon:'🧮',href:'/calc/fraction-calculator.html',name:'Fraction Calculator'},
  ]
});
calc();
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
