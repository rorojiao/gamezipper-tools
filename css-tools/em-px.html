<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"What is the difference between EM and PX?","acceptedAnswer":{"@type":"Answer","text":"PX (pixels) is an absolute unit — 16px is always 16px regardless of context. EM is relative to the parent element's font-size. If the parent is 16px, then 1em = 16px, 2em = 32px."}},{"@type":"Question","name":"What is the default browser font size?","acceptedAnswer":{"@type":"Answer","text":"Most browsers default to 16px. This means 1em = 16px by default. You can change the base size in this tool to match your project's root font-size setting."}},{"@type":"Question","name":"Should I use EM or REM?","acceptedAnswer":{"@type":"Answer","text":"REM is relative to the root element (html), making it more predictable. EM is relative to the parent element, so it compounds in nested elements. Use REM for layout and spacing, EM for text that should scale with its parent (like nested lists)."}},{"@type":"Question","name":"How do I convert EM to PX?","acceptedAnswer":{"@type":"Answer","text":"Multiply the EM value by the base font size in pixels. For example, with a 16px base: 1.5em × 16px = 24px. This tool does the calculation instantly as you type."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="empx-base">
      <label id="lbl-base"></label>
      <input type="number" id="base" value="16" min="1" max="200" step="1">
      <span style="color:var(--text2);font-size:.8rem;margin-left:4px">px</span>
    </div>
    <div class="empx-row">
      <div class="empx-field">
        <label>EM</label>
        <input type="number" id="em" value="1" step="0.1" oninput="fromEm()">
      </div>
      <div class="empx-arrow">⇄</div>
      <div class="empx-field">
        <label>PX</label>
        <input type="number" id="px" value="16" step="1" oninput="fromPx()">
      </div>
    </div>
    <div id="result-note" style="font-size:.85rem;color:var(--text2);margin-bottom:16px"></div>
    <h3 id="ref-title" style="margin-top:24px"></h3>
    <table class="empx-table" id="ref-table">
      <thead><tr><th>EM</th><th>PX</th><th>REM</th><th>%</th></tr></thead>
      <tbody></tbody>
    </table>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'EM ↔ PX Converter',
    toolDesc: 'Convert between EM and PX CSS units with a custom base font size. Includes a live reference table for common values — perfect for responsive design.',
    lblBase: 'Base font size',
    refTitle: 'Common Conversions',
    resultNote: (em, px, base) => `<strong>${em}em</strong> = <strong>${px}px</strong> (base: ${base}px)`,
    step1: 'Set your base font size (default is 16px, the browser default)',
    step2: 'Type a value in either the EM or PX field',
    step3: 'The conversion updates instantly in both directions',
    step4: 'Use the reference table for common EM/PX/REM values',
  },
  zh: {
    toolTitle: 'EM ↔ PX 单位转换器',
    toolDesc: '在 EM 和 PX CSS 单位之间转换，可自定义基准字号。包含常用值参考表 — 适合响应式设计。',
    lblBase: '基准字号',
    refTitle: '常用换算',
    resultNote: (em, px, base) => `<strong>${em}em</strong> = <strong>${px}px</strong>（基准：${base}px）`,
    step1: '设置基准字号（默认 16px，即浏览器默认值）',
    step2: '在 EM 或 PX 输入框中输入数值',
    step3: '双向转换即时更新',
    step4: '使用参考表查看常用 EM/PX/REM 值',
  }
});

const { $, copyText, t } = GZ;

function fromEm() {
  const base = parseFloat($('#base').value) || 16;
  const em = parseFloat($('#em').value) || 0;
  const px = Math.round(em * base * 1000) / 1000;
  $('#px').value = px;
  $('#result-note').innerHTML = t('resultNote')(em, px, base);
}

function fromPx() {
  const base = parseFloat($('#base').value) || 16;
  const px = parseFloat($('#px').value) || 0;
  const em = Math.round((px / base) * 1000) / 1000;
  $('#em').value = em;
  $('#result-note').innerHTML = t('resultNote')(em, px, base);
}

function buildRefTable() {
  const base = parseFloat($('#base').value) || 16;
  const values = [0.25, 0.5, 0.625, 0.75, 0.875, 1, 1.125, 1.25, 1.5, 1.75, 2, 2.5, 3, 4, 5];
  const tbody = $('#ref-table tbody');
  tbody.innerHTML = values.map(em => {
    const px = em * base;
    const pct = em * 100;
    return `<tr><td>${em}em</td><td>${px}px</td><td>${em}rem</td><td>${pct}%</td></tr>`;
  }).join('');
}

$('#base').addEventListener('input', () => { fromEm(); buildRefTable(); });

$('#lbl-base').textContent = t('lblBase');
$('#ref-title').textContent = t('refTitle');
fromEm();
buildRefTable();

GZ.renderToolPage({
  category: 'css',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📏', href:'/dev/rem-px.html', name:'REM ↔ PX'},
    {icon:'📐', href:'/css-tools/clamp.html', name:'CSS Clamp()'},
    {icon:'📏', href:'/dev/css-units.html', name:'CSS Unit Converter'},
    {icon:'🎨', href:'/css-tools/line-height.html', name:'Line Height'},
  ]
});
</script>
