<body>
<div class="gz-container">

  </div>
  <div class="gz-tool-area">

      <div id="drop-zone">

        <div>Drop an image here or click to upload</div>
        <input type="file" id="file-input" accept="image/*" style="display:none">

      <div id="controls" style="display:none">
        <div class="ctrl-row">
          <label>Background</label>
          <select id="bg-mode">
            <option value="black">Black</option>

          <select id="fit-mode">
            <option value="contain">Fit Inside (no crop)</option>
            <option value="cover">Fill & Crop</option>
          </select>
        </div>
        <div class="ctrl-row">
          <label>Output Format</label>
          <select id="out-format">
            <option value="image/png">PNG</option>

<script>
GZI18n.register({
  en: {
    toolTitle: 'TikTok Video Resizer',
    toolDesc: 'Resize images for TikTok, Instagram Reels, YouTube Shorts and more. Convert to 9:16 with backgrounds — all in your browser.',
    step1: 'Choose a preset (TikTok, Reels, Shorts) or set custom dimensions',
    step2: 'Upload your image by drag and drop or click',
    step3: 'Adjust background, fit mode and output format',
    step4: 'Click Download to save the resized image',
  },
  zh: {
    toolTitle: 'TikTok 视频尺寸调整器',
    toolDesc: '为 TikTok、Instagram Reels、YouTube Shorts 等调整图片尺寸。转换为 9:16 并添加背景 — 完全浏览器本地处理。',
    step1: '选择预设（TikTok、Reels、Shorts）或设置自定义尺寸',
    step2: '拖拽或点击上传图片',
    step3: '调整背景、适配模式和输出格式',
    step4: '点击「下载」保存调整后的图片',
  }
});

const { $, copyText, t } = GZ;

const PRESETS = [
  { name: 'TikTok', w: 1080, h: 1920, icon: '🎵' },
  { name: 'IG Reels', w: 1080, h: 1920, icon: '🎬' },
  { name: 'YT Shorts', w: 1080, h: 1920, icon: '📺' },
  { name: 'IG Story', w: 1080, h: 1920, icon: '📱' },
  { name: 'IG Post', w: 1080, h: 1080, icon: '📷' },
  { name: 'IG Landscape', w: 1080, h: 566, icon: '🌅' },
  { name: 'FB Cover', w: 820, h: 312, icon: '📘' },
  { name: 'Twitter/X', w: 1600, h: 900, icon: '🐦' },
  { name: 'LinkedIn', w: 1200, h: 627, icon: '💼' },
  { name: 'Pinterest', w: 1000, h: 1500, icon: '📌' },
  { name: 'YouTube', w: 1280, h: 720, icon: '▶️' },
  { name: 'Snapchat', w: 1080, h: 1920, icon: '👻' },
];

let currentPreset = PRESETS[0];
let img = null;

// Render presets
$('#presets').innerHTML = PRESETS.map((p, i) => 
  `<div class="preset-btn${i===0?' active':''}" onclick="selectPreset(${i},this)">${p.icon} ${p.name}<br><small>${p.w}×${p.h}</small></div>`
).join('');

function selectPreset(i, el) {
  currentPreset = PRESETS[i];
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
  if (el) el.classList.add('active');
  renderCanvas();
}

// File handling
const dropZone = $('#drop-zone');
const fileInput = $('#file-input');

dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('dragover');
  if (e.dataTransfer.files.length) loadFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', () => { if (fileInput.files.length) loadFile(fileInput.files[0]); });

function loadFile(file) {
  const reader = new FileReader();
  reader.onload = e => {
    img = new Image();
    img.onload = () => {
      $('#controls').style.display = 'block';
      $('#info').innerHTML = `Original: ${img.width}×${img.height} · <strong>${(file.size/1024).toFixed(1)} KB</strong>`;
      renderCanvas();
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function renderCanvas() {
  if (!img) return;
  const { w, h } = currentPreset;
  const canvas = $('#canvas');
  const ctx = canvas.getContext('2d');
  
  // Scale canvas for display
  const maxDisplay = 400;
  const scale = Math.min(maxDisplay / w, maxDisplay / h, 1);
  canvas.width = w;
  canvas.height = h;
  canvas.style.width = Math.round(w * scale) + 'px';
  canvas.style.height = Math.round(h * scale) + 'px';
  
  const bgMode = $('#bg-mode').value;
  const bgColor = $('#bg-color').value;
  const fitMode = $('#fit-mode').value;
  
  // Draw background
  if (bgMode === 'blur') {
    ctx.filter = 'blur(30px)';
    ctx.drawImage(img, -20, -20, w + 40, h + 40);
    ctx.filter = 'none';
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.fillRect(0, 0, w, h);
  } else if (bgMode === 'black') {
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, w, h);
  } else if (bgMode === 'white') {
    ctx.fillStyle = '#fff';
    ctx.fillRect(0, 0, w, h);
  } else {
    ctx.fillStyle = bgColor;
    ctx.fillRect(0, 0, w, h);
  }
  
  // Draw image
  const imgRatio = img.width / img.height;
  const canvasRatio = w / h;
  let dx, dy, dw, dh;
  
  if (fitMode === 'contain') {
    if (imgRatio > canvasRatio) {
      dw = w;
      dh = w / imgRatio;
    } else {
      dh = h;
      dw = h * imgRatio;
    }
    dx = (w - dw) / 2;
    dy = (h - dh) / 2;
  } else {
    if (imgRatio > canvasRatio) {
      dh = h;
      dw = h * imgRatio;
    } else {
      dw = w;
      dh = w / imgRatio;
    }
    dx = (w - dw) / 2;
    dy = (h - dh) / 2;
  }
  
  ctx.drawImage(img, dx, dy, dw, dh);
  $('#info').innerHTML += ` · Output: ${w}×${h}`;
}

['bg-mode','bg-color','fit-mode'].forEach(id => {
  document.getElementById(id).addEventListener('change', renderCanvas);
  document.getElementById(id).addEventListener('input', renderCanvas);
});
$('#quality').addEventListener('input', () => {
  $('#quality-val').textContent = $('#quality').value + '%';
});

function download() {
  if (!img) return;
  const canvas = $('#canvas');
  const format = $('#out-format').value;
  const quality = $('#quality').value / 100;
  const ext = format === 'image/png' ? 'png' : format === 'image/jpeg' ? 'jpg' : 'webp';
  const a = document.createElement('a');
  a.download = `tiktok-${currentPreset.w}x${currentPreset.h}.${ext}`;
  a.href = canvas.toDataURL(format, quality);
  a.click();
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="download()">⬇ ${t('copy').replace('Copy','Download')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="fileInput.click()">📁 Upload</button>`;

GZ.renderToolPage({
  category: 'image',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📱', href:'/image/social-media-resizer.html', name:'Social Media Resizer'},
    {icon:'📐', href:'/image/aspect-ratio-visualizer.html', name:'Aspect Ratio Visualizer'},
    {icon:'✂️', href:'/image/cropper.html', name:'Image Cropper'},
    {icon:'🔄', href:'/image/resizer.html', name:'Image Resizer'},
  ]
});
</script>

</body>
