<script>
GZI18n.register({
  en: {
    toolTitle: 'Lottery Odds Calculator',
    toolDesc: 'Calculate the exact odds of winning any lottery jackpot or prize tier. Presets for Powerball, Mega Millions, EuroMillions and custom games — see your real winning probability.',

    bonus: 'Bonus pool (pool / pick, 0 = none)',
    tickets: 'Number of tickets',

    matchTierBonus: 'Match the X main + bonus',
    anyPrize: 'Chance of winning ANY prize',
    pers: '%',
  },
  zh: {
    toolTitle: '彩票中奖概率计算器',
    toolDesc: '计算任意彩票头奖或各奖级的中奖概率。内置 Powerball、Mega Millions、EuroMillions 预设及自定义玩法 — 查看真实的中奖概率。',
    main: '主号码（总池 / 选号数）',
    bonus: '附加池（总池 / 选号数，0=无）',
    tickets: '购买票数',
    calc: '计算概率',
    step1: '选择预设或输入自定义玩法结构',
    step2: '输入你打算购买多少张彩票',
    step3: '点击计算按钮查看精确概率',
    step4: '查看头奖概率和各奖级概率',
    jackpot: '头奖概率',
    matchAll: '命中全部号码',
    oneIn: '1 / ',
    prob: '概率',
    withTickets: 'X 张票',
    matchTier: '命中 X 个主号',
    matchTierBonus: '命中 X 个主号 + 附加号',
    anyPrize: '中任意奖项的概率',
    pers: '%',
  }
});

const { $, t } = GZ;

const PRESETS = [
  { id: 'powerball', label: 'US Powerball', m: 69, n: 5, bm: 26, bn: 1 },
  { id: 'mega', label: 'Mega Millions', m: 70, n: 5, bm: 25, bn: 1 },
  { id: 'euromillions', label: 'EuroMillions', m: 50, n: 5, bm: 12, bn: 2 },
  { id: 'uklotto', label: 'UK Lotto', m: 59, n: 6, bm: 0, bn: 0 },
  { id: 'custom', label: 'Custom', m: 69, n: 5, bm: 26, bn: 1 },
];

let activePreset = 'powerball';

// Big integer combinations: C(m, n) computed exactly using BigInt
function bigComb(m, n) {
  if (n < 0 || n > m) return 0n;
  if (n === 0 || n === m) return 1n;
  let k = Math.min(n, m - n);
  let num = 1n, den = 1n;
  for (let i = 0; i < k; i++) {
    num *= BigInt(m - i);
    den *= BigInt(i + 1);
  }
  return num / den;
}

// Probability of matching exactly k of n drawn from main pool (size m)
function matchMainExactly(m, n, k) {
  // C(n, k) * C(m - n, n - k) / C(m, n)
  let num = bigComb(n, k) * bigComb(m - n, n - k);
  let den = bigComb(m, n);
  return num * 1000n / den; // scaled by 1000 for display; returns ratio numerator/denominator
}

function formatBig(b) {
  let s = b.toString();
  if (s.length <= 3) return s;
  return s.replace(/\B(?=(\d{3})+(?!\d))/g, ',');
}

function buildTabs() {
  $('#mode-tabs').innerHTML = PRESETS.map(p =>
    `<div class="lot-tab ${p.id === activePreset ? 'active' : ''}" data-id="${p.id}">${p.label}</div>`
  ).join('');
  $('#mode-tabs').querySelectorAll('.lot-tab').forEach(el => {
    el.addEventListener('click', () => {
      activePreset = el.dataset.id;
      const p = PRESETS.find(x => x.id === activePreset);
      $('#m').value = p.m; $('#n').value = p.n;
      $('#bm').value = p.bm; $('#bn').value = p.bn;
      buildTabs();
    });
  });
}

function calculate() {
  const m = +$('#m').value || 0;
  const n = +$('#n').value || 0;
  const bm = +$('#bm').value || 0;
  const bn = +$('#bn').value || 0;
  const tickets = Math.max(1, +$('#tk').value || 1);

  if (m < n || n < 1 || m < 1) {
    $('#output').innerHTML = `<div class="lot-card" style="color:var(--gz-accent,#e94560)">Invalid input: pick count must be ≤ pool size.</div>`;
    return;
  }

  const mainCombos = bigComb(m, n);
  const bonusCombos = (bm > 0 && bn > 0) ? bigComb(bm, bn) : 1n;
  const jackpotCombos = mainCombos * bonusCombos;

  // Probability 1/jackpotCombos with `tickets` tickets = tickets/jackpotCombos
  // Build tiers: match i main numbers (no bonus), and i main + bonus if applicable
  const tiers = [];
  for (let i = n; i >= 0; i--) {
    const ways = bigComb(n, i) * bigComb(m - n, n - i);
    const oddsNoBonus = (ways > 0n && mainCombos > 0n) ? (mainCombos / ways) : 0n;
    if (i > 0 && ways > 0n) {
      tiers.push({ main: i, bonus: false, ways, odds: oddsNoBonus });
    }
    if (bm > 0 && bn > 0 && i > 0 && ways > 0n) {
      // bonus: pick correct bonus combo (1 way) out of bonusCombos
      const tierBonusWays = ways * 1n;
      const tierBonusTotal = mainCombos * bonusCombos;
      const oddsBonus = tierBonusTotal / tierBonusWays;
      tiers.push({ main: i, bonus: true, ways: tierBonusWays, odds: oddsBonus });
    }
  }

  let html = `<div class="lot-card">
    <div class="lot-sub">${t('matchAll')}</div>
    <div class="lot-big">1 in ${formatBig(jackpotCombos)}</div>
    <div class="lot-sub">${(Number(tickets) / Number(jackpotCombos) * 100).toExponential(3)}% ${t('withTickets').replace('X', tickets)} — ${(100 / Number(jackpotCombos) * tickets).toExponential(2)}%</div>
  </div>`;

  // Any-prize approximation: sum of all tiers. Hard with BigInt, so estimate.
  // Probability of matching at least 3 main = sum over i>=3
  let anyWays = 0n;
  for (let i = 3; i <= n; i++) {
    anyWays += bigComb(n, i) * bigComb(m - n, n - i);
  }
  const anyOdds = anyWays > 0n ? (mainCombos / anyWays) : 0n;

  html += `<div class="lot-card">
    <div class="lot-sub">${t('anyPrize')} (≥3 main)</div>
    <div class="lot-big">1 in ${formatBig(anyOdds)}</div>
  </div>`;

  // Tier table
  html += `<div class="lot-card"><div class="lot-sub" style="margin-bottom:8px;font-weight:bold">Prize Tiers</div>`;
  for (const tier of tiers.slice(0, 8)) {
    const label = tier.bonus
      ? t('matchTierBonus').replace('X', tier.main)
      : t('matchTier').replace('X', tier.main);
    html += `<div class="lot-tier"><span>${label}</span><span>1 in ${formatBig(tier.odds)}</span></div>`;
  }
  html += `</div>`;

  $('#output').innerHTML = html;
}

$('#calc-btn').addEventListener('click', calculate);

// Init labels and tabs
$('#lbl-main').textContent = t('main');
$('#lbl-bonus').textContent = t('bonus');
$('#lbl-tickets').textContent = t('tickets');
$('#calc-btn').textContent = t('calc');
buildTabs();
calculate();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],

    {icon:'🎲', href:'/calc/permutation.html', name:'Permutations'},
    {icon:'📊', href:'/calc/probability-calculator.html', name:'Probability'},
    {icon:'🔢', href:'/calc/permutations-combinations.html', name:'Combinations'},
  ]
});
</script>
