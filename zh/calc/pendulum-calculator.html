<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is the period of a simple pendulum?", "acceptedAnswer": {"@type": "Answer", "text": "The period T = 2π√(L/g), where L is the length in meters and g is gravity (9.81 m/s²). The period depends only on length and gravity — not on mass or (small) swing amplitude."}}, {"@type": "Question", "name": "How long should a pendulum be for a 1-second period?", "acceptedAnswer": {"@type": "Answer", "text": "For a 1-second period on Earth, L = g × (T/2π)² = 9.81 × (1/6.283)² ≈ 0.248 m, about 25 cm. A 1-meter pendulum swings with a period of about 2.0 seconds."}}, {"@type": "Question", "name": "Does the mass of the bob affect the period?", "acceptedAnswer": {"@type": "Answer", "text": "No. For a simple pendulum the period depends only on length and gravity, not on the bob's mass. A heavier and lighter bob at the same length swing in sync (assuming small angles)."}}, {"@type": "Question", "name": "What is the small-angle approximation?", "acceptedAnswer": {"@type": "Answer", "text": "The formula T = 2π√(L/g) is accurate for swing angles under about 15°. At larger angles the true period grows slightly longer; this calculator uses the standard small-angle model used in physics classes."}}]}</script>

<script>
GZI18n.register({
  en: {
    toolTitle: 'Simple Pendulum Calculator',
    toolDesc: 'Solve the simple pendulum equation T = 2π√(L/g) for period, length or gravity. Enter any two values and instantly get the third plus frequency, with an animated swing. Perfect for physics homework, clockmaking and lab experiments.',
    lblT: 'Period (T)',
    lblL: 'Length (L)',
    lblG: 'Gravity (g)',
    rT: 'Period',
    rL: 'Length',
    rF: 'Frequency',
    example: 'Example',
    clear: 'Clear',
    formulas: 'Formulas: T = 2π√(L/g) · L = g·(T/2π)² · g = 4π²L/T² · f = 1/T',
    errInputs: 'Enter any two of period, length and gravity.',
    step1: 'Enter any two of period (s), length (m) or gravity (m/s²)',
    step2: 'Leave the unknown field blank',
    step3: 'The calculator instantly solves for the missing value',
    step4: 'Watch the animated swing and read frequency',
  },
  zh: {
    toolTitle: '单摆计算器',
    toolDesc: '用 T = 2π√(L/g) 求解周期、摆长或重力。输入任意两项，即时算出第三项及频率，附带摆动动画。适合物理作业、钟表制作和实验。',
    lblT: '周期 (T)',
    lblL: '摆长 (L)',
    lblG: '重力加速度 (g)',
    rT: '周期',
    rL: '摆长',
    rF: '频率',
    example: '示例',
    clear: '清空',
    formulas: '公式：T = 2π√(L/g) · L = g·(T/2π)² · g = 4π²L/T² · f = 1/T',
    errInputs: '请输入周期、摆长、重力中的任意两项。',
    step1: '输入周期 (s)、摆长 (m) 或重力 (m/s²) 中的任意两项',
    step2: '未知项留空',
    step3: '计算器即时算出缺失的值',
    step4: '查看摆动动画并读取频率',
  }
});

const { $, t } = GZ;

$('#lbl-t span:first-child').textContent = t('lblT');
$('#lbl-l span:first-child').textContent = t('lblL');
$('#lbl-g span:first-child').textContent = t('lblG');
$('#r-t').textContent = t('rT');
$('#r-l').textContent = t('rL');
$('#r-f').textContent = t('rF');
$('#formulas').textContent = t('formulas');

function num(id) { const v = $('#' + id).value; return v === '' ? null : parseFloat(v); }
function fmt(n) {
  if (!isFinite(n)) return '—';
  const abs = Math.abs(n);
  if (abs !== 0 && (abs < 0.0001 || abs >= 1e6)) return n.toExponential(3);
  return n.toLocaleString(undefined, { maximumFractionDigits: 4 });
}

let animT = 2.0, raf = null;
function drawSwing() {
  const canvas = $('#swing');
  const ctx = canvas.getContext('2d');
  const W = canvas.width = canvas.clientWidth;
  const H = canvas.height = canvas.clientHeight;
  const pivotX = W / 2, pivotY = 22;
  const len = H - pivotY - 18;
  const omega = (2 * Math.PI) / Math.max(0.2, animT);
  const phase = (Date.now() / 1000) * omega;
  const angle = 0.5 * Math.sin(phase); // ±0.5 rad (~28°)
  const bx = pivotX + len * Math.sin(angle);
  const by = pivotY + len * Math.cos(angle);
  ctx.clearRect(0, 0, W, H);
  // pivot
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.beginPath(); ctx.arc(pivotX, pivotY, 4, 0, 7); ctx.fill();
  // string
  ctx.strokeStyle = 'rgba(255,255,255,0.45)';
  ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(pivotX, pivotY); ctx.lineTo(bx, by); ctx.stroke();
  // bob
  ctx.fillStyle = getComputedStyle(document.body).getPropertyValue('--gz-accent') || '#4ecdc4';
  ctx.beginPath(); ctx.arc(bx, by, 12, 0, 7); ctx.fill();
}
function loop() { drawSwing(); raf = requestAnimationFrame(loop); }

function calc() {
  let T = num('T'), L = num('L'), g = num('g');
  const filled = [T, L, g].filter(x => x !== null).length;
  if (filled < 2) { $('#results').style.display = 'none'; return; }
  if (g === null && T !== null && L !== null && T !== 0) g = (4 * Math.PI * Math.PI * L) / (T * T);
  if (L === null && T !== null && g !== null) L = g * Math.pow(T / (2 * Math.PI), 2);
  if (T === null && L !== null && g !== null && g !== 0) T = 2 * Math.PI * Math.sqrt(L / g);
  const f = T !== null && T !== 0 ? 1 / T : null;
  $('#out-t').textContent = T !== null && isFinite(T) ? fmt(T) + ' s' : '—';
  $('#out-l').textContent = L !== null && isFinite(L) ? fmt(L) + ' m' : '—';
  $('#out-f').textContent = f !== null && isFinite(f) ? fmt(f) + ' Hz' : '—';
  $('#results').style.display = 'block';
  if (T !== null && isFinite(T) && T > 0) { animT = T; if (!raf) loop(); }
}

['T', 'L', 'g'].forEach(id => $('#' + id).addEventListener('input', calc));

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="$('#g').value='9.81';$('#L').value='1';$('#T').value='';calc()">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="['T','L','g'].forEach(id=>document.getElementById(id).value='');calc()">${t('clear')}</button>`;

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1', 'step2', 'step3', 'step4'],
  related: [
    { icon: '🎯', href: '/calc/projectile-motion-calculator.html', name: 'Projectile Motion' },
    { icon: '🪂', href: '/calc/free-fall-calculator.html', name: 'Free Fall' },
    { icon: '🔄', href: '/calc/newtons-second-law-calculator.html', name: 'Newton\'s 2nd Law' },
    { icon: '🪨', href: '/calc/density-calculator.html', name: 'Density' },
  ]
});
loop();
</script>
