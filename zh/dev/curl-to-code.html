function parseCurl(cmd) {
  const result = {url:'',method:'GET',headers:{},data:''};
  cmd = cmd.replace(/\\\n/g, ' ').replace(/\s+/g, ' ').trim();
  if (cmd.startsWith('curl')) cmd = cmd.substring(4).trim();

  const args = [];
  let current = '', inQuote = false, quoteChar = '';
  for (let i = 0; i < cmd.length; i++) {
    const ch = cmd[i];
    if (inQuote) {
      if (ch === quoteChar) inQuote = false;
      else current += ch;
    } else if (ch === '"' || ch === "'") {
      inQuote = true; quoteChar = ch;
    } else if (ch === ' ') {
      if (current) args.push(current);
      current = '';
    } else {
      current += ch;
    }
  }
  if (current) args.push(current);

  for (let i = 0; i < args.length; i++) {
    const a = args[i];
    if (a === '-X' || a === '--request') {
      result.method = args[++i]?.toUpperCase() || 'GET';
    } else if (a === '-H' || a === '--header') {
      const h = args[++i] || '';
      const colonIdx = h.indexOf(':');
      if (colonIdx > 0) {
        result.headers[h.substring(0, colonIdx).trim()] = h.substring(colonIdx + 1).trim();
      }
    } else if (a === '-d' || a === '--data' || a === '--data-raw' || a === '--data-binary' || a === '--data-ascii') {
      result.data = args[++i] || '';
      if (result.method === 'GET') result.method = 'POST';
    } else if (a === '-F' || a === '--form') {
      const f = args[++i] || '';
      result.data = result.data ? result.data + '&' + f : f;
      if (result.method === 'GET') result.method = 'POST';
    } else if (!a.startsWith('-') && !result.url) {
      result.url = a;
    }
  }
  return result;
}

function toPython(r) {
  const hasHeaders = Object.keys(r.headers).length > 0;
  const hasData = !!r.data;
  let code = 'import requests\n\n';
  code += `url = "${r.url}"\n`;
  if (hasHeaders) {
    code += 'headers = {\n';
    for (const [k,v] of Object.entries(r.headers)) code += `    "${k}": "${v.replace(/"/g,'\\"')}",\n`;
    code += '}\n';
  }
  if (hasData) {
    const isJson = Object.entries(r.headers).some(([k,v]) => k.toLowerCase()==='content-type' && v.includes('json'));
    if (isJson) {
      code += `payload = ${r.data}\n`;
      code += `response = requests.${r.method.toLowerCase()}(url, headers=${hasHeaders?'headers':'{}'}, json=payload)\n`;
    } else {
      code += `data = "${r.data.replace(/"/g,'\\"')}"\n`;
      code += `response = requests.${r.method.toLowerCase()}(url, headers=${hasHeaders?'headers':'{}'}, data=data)\n`;
    }
  } else {
    code += `response = requests.${r.method.toLowerCase()}(url, headers=${hasHeaders?'headers':'{}'})\n`;
  }
  code += '\nprint(response.status_code)\nprint(response.text)';
  return code;
}

function toJavaScript(r) {
  const hasHeaders = Object.keys(r.headers).length > 0;
  const hasData = !!r.data;
  let code = `const url = "${r.url}";\n`;
  const opts = [];
  if (r.method !== 'GET') opts.push(`  method: "${r.method}"`);
  if (hasHeaders) {
    let h = '  headers: {\n';
    for (const [k,v] of Object.entries(r.headers)) h += `    "${k}": "${v.replace(/"/g,'\\"')}",\n`;
    h += '  }';
    opts.push(h);
  }
  if (hasData) opts.push(`  body: JSON.stringify(${r.data})`);
  if (opts.length) {
    code += `\nconst options = {\n${opts.join(',\n')}\n};\n\n`;
    code += `fetch(url, options)\n  .then(res => res.json())\n  .then(data => console.log(data))\n  .catch(err => console.error(err));`;
  } else {
    code += `\nfetch(url)\n  .then(res => res.json())\n  .then(data => console.log(data))\n  .catch(err => console.error(err));`;
  }
  return code;
}

function toNodejs(r) {
  const hasHeaders = Object.keys(r.headers).length > 0;
  const hasData = !!r.data;
  let code = `const axios = require('axios');\n\n`;
  code += `const config = {\n  method: '${r.method.toLowerCase()}',\n  url: '${r.url}',`;
  if (hasHeaders) {
    code += '\n  headers: {';
    for (const [k,v] of Object.entries(r.headers)) code += `\n    '${k}': '${v.replace(/'/g,"\\'")}',`;
    code += '\n  },';
  }
  if (hasData) {
    const isJson = Object.entries(r.headers).some(([k,v]) => k.toLowerCase()==='content-type' && v.includes('json'));
    if (isJson) code += `\n  data: ${r.data},`;
    else code += `\n  data: '${r.data.replace(/'/g,"\\'")}',`;
  }
  code += '\n};\n\n';
  code += 'axios(config)\n  .then(res => console.log(res.data))\n  .catch(err => console.error(err));';
  return code;
}

function toPhp(r) {
  const hasHeaders = Object.keys(r.headers).length > 0;
  const hasData = !!r.data;
  let code = `<?php\n\n$ch = curl_init();\n\ncurl_setopt($ch, CURLOPT_URL, '${r.url}');\ncurl_setopt($ch, CURLOPT_RETURNTRANSFER, true);\n`;
  if (r.method === 'POST') code += `curl_setopt($ch, CURLOPT_POST, true);\n`;
  else if (r.method !== 'GET') code += `curl_setopt($ch, CURLOPT_CUSTOMREQUEST, '${r.method}');\n`;
  if (hasHeaders) {
    code += 'curl_setopt($ch, CURLOPT_HTTPHEADER, [\n';
    for (const [k,v] of Object.entries(r.headers)) code += `    '${k}: ${v.replace(/'/g,"\\'")}',\n`;
    code += ']);\n';
  }
  if (hasData) code += `curl_setopt($ch, CURLOPT_POSTFIELDS, '${r.data.replace(/'/g,"\\'")}');\n`;
  code += `\n$response = curl_exec($ch);\ncurl_close($ch);\n\necho $response;\n`;
  return code;
}

function toGo(r) {
  const hasHeaders = Object.keys(r.headers).length > 0;
  const hasData = !!r.data;
  let code = 'package main\n\nimport (\n\t"fmt"\n\t"io"\n\t"net/http"';
  if (hasData) code += '\n\t"strings"';
  code += '\n)\n\nfunc main() {\n';
  if (hasData) {
    code += `\tbody := strings.NewReader(\`${r.data}\`)\n`;
    code += `\treq, err := http.NewRequest("${r.method}", "${r.url}", body)\n`;
  } else {
    code += `\treq, err := http.NewRequest("${r.method}", "${r.url}", nil)\n`;
  }
  code += '\tif err != nil {\n\t\tpanic(err)\n\t}\n';
  if (hasHeaders) {
    for (const [k,v] of Object.entries(r.headers)) code += `\treq.Header.Set("${k}", "${v.replace(/"/g,'\\"')}")\n`;
  }
  code += '\tclient := &http.Client{}\n\tresp, err := client.Do(req)\n\tif err != nil {\n\t\tpanic(err)\n\t}\n\tdefer resp.Body.Close()\n\n\tbodyBytes, _ := io.ReadAll(resp.Body)\n\tfmt.Println(string(bodyBytes))\n}';
  return code;
}

function toJava(r) {
  const hasHeaders = Object.keys(r.headers).length > 0;
  const hasData = !!r.data;
  let code = 'import java.io.*;\nimport java.net.*;\nimport java.nio.charset.StandardCharsets;\n\npublic class Main {\n    public static void main(String[] args) throws Exception {\n';
  code += `        URL url = new URL("${r.url}");\n`;
  code += `        HttpURLConnection conn = (HttpURLConnection) url.openConnection();\n`;
  code += `        conn.setRequestMethod("${r.method}");\n`;
  if (hasHeaders) {
    for (const [k,v] of Object.entries(r.headers)) code += `        conn.setRequestProperty("${k}", "${v.replace(/"/g,'\\"')}");\n`;
  }
  if (hasData) {
    code += `        conn.setDoOutput(true);\n`;
    code += `        try (OutputStream os = conn.getOutputStream()) {\n`;
    code += `            byte[] input = "${r.data.replace(/"/g,'\\"')}".getBytes(StandardCharsets.UTF_8);\n`;
    code += `            os.write(input, 0, input.length);\n        }\n`;
  }
  code += `\n        int code = conn.getResponseCode();\n        System.out.println("Response code: " + code);\n`;
  code += `        try (BufferedReader br = new BufferedReader(new InputStreamReader(conn.getInputStream()))) {\n`;
  code += `            String line;\n            while ((line = br.readLine()) != null) {\n                System.out.println(line);\n            }\n        }\n    }\n}`;
  return code;
}

function convert() {
  const input = $('#input').value.trim();
  if (!input) { $('#output').textContent = ''; return; }
  try {
    const parsed = parseCurl(input);
    const generators = {python:toPython,javascript:toJavaScript,nodejs:toNodejs,php:toPhp,go:toGo,java:toJava};
    const code = (generators[currentLang] || toPython)(parsed);
    $('#output').textContent = code;
  } catch(e) {
    $('#output').textContent = 'Error: ' + e.message;
  }
}

  btn.classList.add('active');

}
