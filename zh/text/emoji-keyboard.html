let activeCat = 'smileys';
let output = '';
let recents = [];

function getAllItems() {
  const all = [];
  for (const cat of Object.values(EMOJIS)) all.push(...cat.items);
  return all;
}

function renderCats() {
  $('#cats').innerHTML = Object.entries(EMOJIS).map(([k, v]) =>
    `<span class="ek-cat${activeCat === k ? ' active' : ''}" data-cat="${k}">${v.icon} ${v.name}</span>`
  ).join('');
}

function renderGrid(filter = '') {
  const grid = $('#grid');
  let items = activeCat === 'all' ? getAllItems() : (EMOJIS[activeCat] ? EMOJIS[activeCat].items : []);
  if (filter) {
    const q = filter.toLowerCase();
    items = getAllItems().filter(([_, name]) => name.toLowerCase().includes(q));
  }
  if (!items.length) { grid.innerHTML = `<div class="ek-empty">${t('empty')}</div>`; return; }
  grid.innerHTML = items.map(([emoji]) => `<div class="ek-emoji" data-emoji="${emoji}">${emoji}</div>`).join('');
}

function renderRecents() {
  const box = $('#recentsBox');
  if (!recents.length) { box.style.display = 'none'; return; }
  box.style.display = 'block';
  $('#recentsRow').innerHTML = recents.map(e => `<span class="ek-emoji" data-emoji="${e}">${e}</span>`).join('');
}

function renderOutput() {
  $('#output').textContent = output;
  $('#status').textContent = `${[...output].length} character${[...output].length === 1 ? '' : 's'}`;
}

function addEmoji(e) {
  output += e;
  recents = [e, ...recents.filter(x => x !== e)].slice(0, 20);
  try { localStorage.setItem('ek_recents', JSON.stringify(recents)); } catch(_) {}
  renderOutput();
  renderRecents();
}

$('#search').addEventListener('input', e => renderGrid(e.target.value));
$('#cats').addEventListener('click', e => {
  const el = e.target.closest('.ek-cat');
  if (!el) return;
  activeCat = el.dataset.cat;
  $('#search').value = '';
  renderCats();
  renderGrid();
});
$('#grid').addEventListener('click', e => {
  const el = e.target.closest('.ek-emoji');
  if (el) addEmoji(el.dataset.emoji);
});
$('#recentsRow').addEventListener('click', e => {
  const el = e.target.closest('.ek-emoji');
  if (el) addEmoji(el.dataset.emoji);
});

try { recents = JSON.parse(localStorage.getItem('ek_recents') || '[]'); } catch(_) { recents = []; }

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copyOut')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#output').textContent='';output='';renderOutput()">${t('clearOut')}</button>`;

renderCats();
renderGrid();
renderRecents();
renderOutput();

});
