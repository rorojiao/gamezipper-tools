const CATEGORIES = ['all', 'mammal', 'bird', 'reptile', 'amphibian', 'marine', 'insect'];

let currentCat = 'all';
let lastAnimal = null;

function rand(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function filterByCat(cat) {
  currentCat = cat;
  document.querySelectorAll('.cat-filters button').forEach(b => b.classList.toggle('active', b.dataset.cat === cat));
  generate();
}

function generate() {
  const pool = currentCat === 'all' ? ANIMALS : ANIMALS.filter(a => a.cat === currentCat);
  if (!pool.length) return;
  let next;
  do {
    next = rand(pool);
  } while (pool.length > 1 && next === lastAnimal);
  lastAnimal = next;
  $('#animalEmoji').textContent = next.emoji;
  $('#animalName').textContent = next.name;
  $('#animalSci').textContent = next.sci;
  $('#animalHabitat').textContent = '🌍 ' + next.habitat;
  $('#animalFact').textContent = next.fact;
  // Update count if filtered
  document.getElementById('countTag').textContent = pool.length + ' ' + (currentCat === 'all' ? 'animals' : 'in this category');
  addToHistory(next);
}

function addToHistory(a) {
  const hist = $('#history');
  const item = document.createElement('div');
  item.className = 'history-item';
  item.innerHTML = `<div class="h-emoji">${a.emoji}</div><div class="h-info"><strong>${a.name}</strong><br><span>${a.sci}</span></div>`;
  hist.insertBefore(item, hist.firstChild);
  while (hist.children.length > 6) hist.removeChild(hist.lastChild);
}

function copyAnimal() {
  const a = lastAnimal;
  if (!a) return;
  copyText(`${a.emoji} ${a.name} (${a.sci})\n📍 ${a.habitat}\n💡 ${a.fact}`);
}

const catLabels = { all: 'All', mammal: 'Mammals', bird: 'Birds', reptile: 'Reptiles', amphibian: 'Amphibians', marine: 'Marine', insect: 'Insects' };
$('#catFilters').innerHTML = CATEGORIES.map(c => `<button class="gz-btn gz-btn-secondary ${c === 'all' ? 'active' : ''}" data-cat="${c}" onclick="filterByCat('${c}')">${catLabels[c]}</button>`).join('');

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="generate()">🎲 ${t('generate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="copyAnimal()">📋 ${t('copy')}</button>
  <span id="countTag" style="font-size:.85em;color:var(--text2);margin-left:auto"></span>`;

GZ.renderToolPage({
  category: 'fun',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🎲', href:'/fun/random-fact-generator.html', name:'Random Fact'},
    {icon:'😂', href:'/fun/random-joke-generator.html', name:'Random Joke'},
    {icon:'😄', href:'/fun/random-emoji.html', name:'Random Emoji'},
    {icon:'🎯', href:'/fun/random-name-picker.html', name:'Random Picker'},
  ]
});

document.addEventListener('keydown', e => { if (e.code === 'Space' && e.target.tagName !== 'INPUT' && e.target.tagName !== 'TEXTAREA') { e.preventDefault(); generate(); } });

generate();
