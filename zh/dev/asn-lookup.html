function parseASN(str) {
  str = (str || '').trim().toUpperCase().replace(/^AS/, '');
  if (!/^\d+$/.test(str)) return null;
  const n = parseInt(str, 10);
  if (n < 1 || n > 4294967295) return null;
  return n;
}

function kv(key, val) {
  return `<div class="kv"><span class="k">${key}</span><span class="v">${val || '—'}</span></div>`;
}

function renderResult(data) {
  const num = data.asn;
  const html = `
    <div class="result-card">
      ${kv(t('asNumber'), 'AS' + num)}
      ${kv(t('holder'), data.holder || data.org || '—')}
      ${kv(t('country'), data.country ? `<span class="badge">${data.country}</span>` : '—')}
      ${kv(t('registry'), data.registry || '—')}
      ${kv(t('allocated'), data.allocated || '—')}
    </div>`;
  $('#result').innerHTML = html;
}

async function doLookup() {
  const raw = input.value;
  const num = parseASN(raw);
  if (num === null) {
    $('#status').innerHTML = `<span style="color:var(--gz-accent)">⚠ ${t('invalid')}</span>`;
    $('#result').innerHTML = '';
    return;
  }
  $('#status').innerHTML = `<span style="color:var(--text2)">⏳ ${t('loading')}</span>`;
  $('#result').innerHTML = '';
  const known = KNOWN_ASN[String(num)];
  // Try Team Cymru whois via RIPEstat (CORS-friendly)
  try {
    const resp = await fetch(`https://stat.ripe.net/data/as-overview/data.json?resource=AS${num}`);
    if (resp.ok) {
      const j = await resp.json();
      const d = j.data;
      if (d && d.holder) {
        renderResult({
          asn: num,
          holder: d.holder,
          org: d.holder,
          country: known ? known.country : (d.query || ''),
          registry: d.type || (known ? known.registry : ''),
          allocated: ''
        });
        $('#status').innerHTML = `<span style="color:var(--gz-success)">✓ ${t('valid')}</span>`;
        return;
      }
    }
  } catch(e) { /* fall through */ }

  // Fallback to curated list
  if (known) {
    renderResult({
      asn: num,
      holder: known.org,
      org: known.org,
      country: known.country,
      registry: known.registry,
      allocated: ''
    });
    $('#status').innerHTML = `<span style="color:var(--gz-success)">✓ ${t('valid')}</span> <span style="color:var(--text2);font-size:.8em">(offline data)</span>`;
    return;
  }

  $('#status').innerHTML = `<span style="color:var(--gz-accent)">⚠ ${t('notFound')}</span>`;
}
