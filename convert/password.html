<script type="application/ld+json">{"@context":"https://schema.org","@type":"WebApplication","name":"Password Generator","description":"Generate strong, secure random passwords online. Free password generator — customize length, uppercase letters, symbols and numbers.","url":"https://tools.gamezipper.com/convert/password.html","applicationCategory":"Utility","operatingSystem":"Web Browser","offers":{"@type":"Offer","price":"0"}}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="pw-slider"><label id="lbl-len"></label><input type="range" id="pwLen" min="8" max="64" value="16"><span id="pwLenVal">16</span></div>
    <div class="pw-options">
      <label><input type="checkbox" id="optUpper" checked> <span id="lbl-upper"></span></label>
      <label><input type="checkbox" id="optLower" checked> <span id="lbl-lower"></span></label>
      <label><input type="checkbox" id="optDigit" checked> <span id="lbl-digit"></span></label>
      <label><input type="checkbox" id="optSpecial" checked> <span id="lbl-special"></span></label>
    </div>
    <div class="pw-batch"><label id="lbl-count"></label> <select id="pwCount"><option>1</option><option>3</option><option>5</option><option>10</option></select></div>
    <div class="pw-strength" id="strengthBar"></div>
    <div class="pw-strength-label" id="strengthLabel"></div>
    <div id="results"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en:{
    toolTitle:'Password Generator',toolDesc:'Generate strong, secure passwords with customizable length, character options, and strength indicator. Batch generate up to 10 passwords.',
    lblLen:'Length:',upper:'Uppercase (A-Z)',lower:'Lowercase (a-z)',digit:'Digits (0-9)',special:'Special (!@#$...)',
    lblCount:'Batch count:',
    weak:'Weak',medium:'Medium',strong:'Strong',veryStrong:'Very Strong',
    step1:'Set password length with the slider',step2:'Choose character types to include',step3:'Click Generate to create passwords',step4:'Click Copy to copy any password',
  },
  zh:{
    toolTitle:'密码生成器',toolDesc:'生成安全强密码，可自定义长度、字符类型，含强度指示器。支持批量生成最多10个密码。',
    lblLen:'长度：',upper:'大写字母 (A-Z)',lower:'小写字母 (a-z)',digit:'数字 (0-9)',special:'特殊字符 (!@#$...)',
    lblCount:'批量数量：',
    weak:'弱',medium:'中等',strong:'强',veryStrong:'极强',
    step1:'用滑块设置密码长度',step2:'选择要包含的字符类型',step3:'点击"生成"创建密码',step4:'点击"复制"复制任意密码',
  }
});
const {$,t,copyText}=GZ;
const UPPER='ABCDEFGHIJKLMNOPQRSTUVWXYZ',LOWER='abcdefghijklmnopqrstuvwxyz',DIGITS='0123456789',SPECIAL='!@#$%^&*()_+-=[]{}|;:,.<>?';

function genPassword(len,chars){
  const arr=new Uint32Array(len);crypto.getRandomValues(arr);
  return Array.from(arr,v=>chars[v%chars.length]).join('');
}

function getStrength(pw){
  let score=0;const l=pw.length;
  if(l>=12)score++;if(l>=20)score++;if(l>=32)score++;
  if(/[A-Z]/.test(pw))score++;if(/[a-z]/.test(pw))score++;if(/\d/.test(pw))score++;if(/[^A-Za-z0-9]/.test(pw))score++;
  if(score<=2)return{label:t('weak'),color:'#e94560',pct:25};
  if(score<=4)return{label:t('medium'),color:'#ff9f43',pct:50};
  if(score<=5)return{label:t('strong'),color:'#54a0ff',pct:75};
  return{label:t('veryStrong'),color:'#00d672',pct:100};
}

function generate(){
  let chars='';
  if($('#optUpper').checked)chars+=UPPER;
  if($('#optLower').checked)chars+=LOWER;
  if($('#optDigit').checked)chars+=DIGITS;
  if($('#optSpecial').checked)chars+=SPECIAL;
  if(!chars){chars=LOWER+DIGITS;}
  const len=parseInt($('#pwLen').value);
  const count=parseInt($('#pwCount').value);
  const passwords=[];
  for(let i=0;i<count;i++)passwords.push(genPassword(len,chars));
  $('#results').innerHTML=passwords.map(pw=>`<div class="pw-result"><span>${pw}</span><button class="gz-btn gz-btn-sm" onclick="GZ.copyText('${pw}')">${t('copy')}</button></div>`).join('');
  const s=getStrength(passwords[0]);
  $('#strengthBar').style.cssText=`background:${s.color};width:${s.pct}%`;
  $('#strengthLabel').textContent=s.label;
  $('#strengthLabel').style.color=s.color;
}

$('#lbl-len').textContent=t('lblLen');
$('#lbl-upper').textContent=t('upper');
$('#lbl-lower').textContent=t('lower');
$('#lbl-digit').textContent=t('digit');
$('#lbl-special').textContent=t('special');
$('#lbl-count').textContent=t('lblCount');
$('#pwLen').addEventListener('input',()=>{$('#pwLenVal').textContent=$('#pwLen').value;});

$('#toolbar').innerHTML=`<button class="gz-btn" onclick="generate()">${t('generate')}</button><button class="gz-btn gz-btn-secondary" onclick="generate()">${t('example')}</button>`;

GZ.renderToolPage({category:'convert',titleKey:'toolTitle',descKey:'toolDesc',howToSteps:['step1','step2','step3','step4'],related:[
  {icon:'📊',href:'/convert/barcode.html',name:'Barcode Generator'},
  {icon:'🎲',href:'/convert/randomizer.html',name:'List Randomizer'},
  {icon:'📸',href:'/convert/instagram.html',name:'Instagram Post'},
]});
generate();
</script>
