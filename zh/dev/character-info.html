const { $, copyText, t } = GZ;

// Major Unicode blocks (start, end, name)
const BLOCKS = [
  [0x0000,0x007F,'Basic Latin'],
  [0x0080,0x00FF,'Latin-1 Supplement'],
  [0x0100,0x017F,'Latin Extended-A'],
  [0x0180,0x024F,'Latin Extended-B'],
  [0x0250,0x02AF,'IPA Extensions'],
  [0x02B0,0x02FF,'Spacing Modifier Letters'],

  [0x0600,0x06FF,'Arabic'],

  [0x2000,0x206F,'General Punctuation'],
  [0x2070,0x209F,'Superscripts and Subscripts'],
  [0x20A0,0x20CF,'Currency Symbols'],
  [0x20D0,0x20FF,'Combining Diacritical Marks for Symbols'],
  [0x2100,0x214F,'Letterlike Symbols'],

  [0x1F300,0x1F5FF,'Miscellaneous Symbols and Pictographs'],

  [0x1F700,0x1F77F,'Alchemical Symbols'],
  [0x1F900,0x1F9FF,'Supplemental Symbols and Pictographs'],
  [0x1FA00,0x1FA6F,'Chess Symbols'],
  [0x1FA70,0x1FAFF,'Symbols and Pictographs Extended-A'],

const CATEGORIES = {
  'Lu':'Uppercase Letter','Ll':'Lowercase Letter','Lt':'Titlecase Letter','Lm':'Modifier Letter',
  'Lo':'Other Letter','Mn':'Nonspacing Mark','Mc':'Spacing Mark','Me':'Enclosing Mark',
  'Nd':'Decimal Number','Nl':'Letter Number','No':'Other Number','Zs':'Space Separator',
  'Zl':'Line Separator','Zp':'Paragraph Separator','Cc':'Control','Cf':'Format',
  'Cs':'Surrogate','Co':'Private Use','Cn':'Unassigned','Sm':'Math Symbol',
  'Sc':'Currency Symbol','Sk':'Modifier Symbol','So':'Other Symbol','Pc':'Connector Punctuation',
  'Pd':'Dash Punctuation','Ps':'Open Punctuation','Pe':'Close Punctuation','Pi':'Initial Punctuation',
  'Pf':'Final Punctuation','Po':'Other Punctuation',
};

function getBlock(cp) {
  for (const [s, e, n] of BLOCKS) { if (cp >= s && cp <= e) return n; }
  return 'Unknown / Supplemental';
}

function getCategory(ch) {
  const cp = ch.codePointAt(0);
  if (cp === 0x20 || cp === 0xA0) return 'Zs — Space Separator';
  if (cp < 0x20 || (cp >= 0x7F && cp <= 0x9F)) return 'Cc — Control';
  if (cp >= 0xD800 && cp <= 0xDFFF) return 'Cs — Surrogate';
  if (cp >= 0xE000 && cp <= 0xF8FF) return 'Co — Private Use';
  // Letter
  if (/[a-z]/i.test(ch)) return /[A-Z]/.test(ch) ? 'Lu — Uppercase Letter' : 'Ll — Lowercase Letter';
  if (/[0-9]/.test(ch)) return 'Nd — Decimal Number';
  if (/\s/.test(ch)) return 'Zs — Space Separator';
  if (/[!-/:-@\[-`{-~]/.test(ch)) {
    if (/[()[]{}]/.test(ch)) return 'Ps/Pe — Bracket Punctuation';
    return 'Po/So — Punctuation / Symbol';
  }
  return 'Lo/So — Letter / Symbol';
}

function utf8Bytes(cp) {
  const bytes = [];
  if (cp < 0x80) { bytes.push(cp); }
  else if (cp < 0x800) { bytes.push(0xC0 | (cp >> 6), 0x80 | (cp & 0x3F)); }
  else if (cp < 0x10000) { bytes.push(0xE0 | (cp >> 12), 0x80 | ((cp >> 6) & 0x3F), 0x80 | (cp & 0x3F)); }
  else { bytes.push(0xF0 | (cp >> 18), 0x80 | ((cp >> 12) & 0x3F), 0x80 | ((cp >> 6) & 0x3F), 0x80 | (cp & 0x3F)); }
  return bytes.map(b => b.toString(16).toUpperCase().padStart(2,'0')).join(' ');
}

function utf16Bytes(cp) {
  if (cp <= 0xFFFF) return [cp].map(c => ((c >> 8) & 0xFF).toString(16).toUpperCase().padStart(2,'0') + ' ' + (c & 0xFF).toString(16).toUpperCase().padStart(2,'0')).join(' ');
  const off = cp - 0x10000;
  const hi = 0xD800 + (off >> 10);
  const lo = 0xDC00 + (off & 0x3FF);
  return [hi, lo].map(c => ((c >> 8) & 0xFF).toString(16).toUpperCase().padStart(2,'0') + ' ' + (c & 0xFF).toString(16).toUpperCase().padStart(2,'0')).join(' ');
}

function row(label, value) {
  if (value === undefined || value === null || value === '') return '';
  const safe = String(value).replace(/</g,'&lt;').replace(/>/g,'&gt;');
  return `<tr><td>${label}</td><td><span class="val" onclick="copyText(this.dataset.v)" data-v="${safe.replace(/"/g,'&quot;')}">${safe}</span><span class="copy-chip" onclick="copyText('${safe.replace(/'/g,"\\'")}')">📋 ${t('copy')}</span></td></tr>`;
}

function analyze() {
  const input = $('#input').value;
  const display = $('#char-display');
  const result = $('#result');
  const multi = $('#multi-result');

  if (!input) {
    display.textContent = '—';
    result.innerHTML = `<p style="color:var(--text3);text-align:center">${t('noInput')}</p>`;
    multi.innerHTML = '';
    return;
  }

  // Use code points (handles surrogate pairs / astral)
  const chars = [...input];
  const first = chars[0];
  const cp = first.codePointAt(0);

  display.textContent = first;

  const hex = cp.toString(16).toUpperCase().padStart(cp > 0xFFFF ? 6 : 4, '0');
  const cpStr = 'U+' + hex;

  let html = '<table class="info-table">';
  html += row(t('char'), first);
  html += row(t('codepoint'), cpStr);
  html += row(t('decimal'), cp);
  html += row(t('utf8'), utf8Bytes(cp));
  html += row(t('utf16'), utf16Bytes(cp));
  html += row(t('htmlEntity'), '&#x' + hex + ';');
  html += row(t('htmlEntityDec'), '&#' + cp + ';');
  html += row(t('cssEscape'), '\\' + hex.toLowerCase());
  html += row(t('jsEscape'), cp > 0xFFFF ? '\\u{' + hex.toLowerCase() + '}' : '\\u' + hex.toLowerCase().padStart(4,'0'));
  html += row(t('urlEncode'), encodeURIComponent(first));
  html += row(t('block'), getBlock(cp));
  html += row(t('category'), getCategory(first));
  html += '</table>';
  result.innerHTML = html;

  // Multi-char breakdown
  if (chars.length > 1) {
    let mhtml = `<h3 style="margin:14px 0 8px;font-size:1rem">${t('multi')} (${chars.length})</h3><table class="info-table">`;
    chars.slice(0, 200).forEach((ch, i) => {
      const c = ch.codePointAt(0);
      const h = c.toString(16).toUpperCase().padStart(c > 0xFFFF ? 6 : 4, '0');
      mhtml += `<tr><td style="width:10%">${i+1}</td><td style="width:15%;font-size:1.3em;text-align:center">${ch.replace(/</g,'&lt;')}</td><td>U+${h}</td><td style="color:var(--text3)">${getBlock(c)}</td></tr>`;
    });
    if (chars.length > 200) mhtml += `<tr><td colspan="4" style="text-align:center;color:var(--text3)">… ${chars.length - 200} more</td></tr>`;
    mhtml += '</table>';
    multi.innerHTML = mhtml;
  } else {
    multi.innerHTML = '';
  }
}

$('#input').placeholder = t('ph');
$('#input').addEventListener('input', analyze);

$('#toolbar').innerHTML = `
  <button class="gz-btn gz-btn-secondary" onclick="$('#input').value='';analyze()">${t('clear')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#input').value='🎉';analyze()">${t('example')}</button>`;

// Load example
$('#input').value = 'A';
analyze();
