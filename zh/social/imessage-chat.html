<script>
GZI18n.register({
  en: {
    toolTitle: 'iMessage Chat Generator',
    toolDesc: 'Create realistic iMessage chat mockups — customize names, messages, time stamps and download as PNG.',
    lblContact: 'Contact Name',
    lblTime: 'Chat Time',
    lblBattery: 'Battery Level',
    lblMessages: 'Messages',
    addSent: '+ Add Sent',
    addRecv: '+ Add Received',
    download: '⬇ Download PNG',
    step1: 'Set the contact name and chat time',
    step2: 'Add messages — choose sent (blue) or received (gray)',
    step3: 'Click messages to edit or delete them',
    step4: 'Download the chat mockup as a PNG image',
  },
  zh: {
    toolTitle: 'iMessage 聊天生成器',
    toolDesc: '创建逼真的 iMessage 聊天截图 — 自定义联系人、消息、时间戳，下载为 PNG。',
    lblContact: '联系人名称',
    lblTime: '聊天时间',
    lblBattery: '电池电量',
    lblMessages: '消息列表',
    addSent: '+ 添加发送消息',
    addRecv: '+ 添加接收消息',
    download: '⬇ 下载 PNG',
    step1: '设置联系人名称和聊天时间',
    step2: '添加消息 — 选择发送（蓝色）或接收（灰色）',
    step3: '点击消息进行编辑或删除',
    step4: '下载聊天截图为 PNG 图片',
  }
});

const { $, copyText, t } = GZ;

let messages = [
  {type:'recv', text:'Hey! Are you coming tonight?'},
  {type:'sent', text:'Yes! What time should I be there?'},
  {type:'recv', text:'Around 8pm 🎉'},
  {type:'sent', text:'Sounds great, see you then!'},
];

function renderPreview() {
  const name = $('#contactName').value || 'Contact';
  $('#headerName').textContent = name;
  $('#avatarLetter').textContent = name.charAt(0).toUpperCase();
  
  const body = $('#chatBody');
  body.innerHTML = '';
  messages.forEach(msg => {
    const div = document.createElement('div');
    div.className = 'msg ' + (msg.type === 'sent' ? 'sent' : 'recv');
    div.textContent = msg.text;
    body.appendChild(div);
  });
  
  const time = $('#chatTime').value;
  if (time) {
    const tdiv = document.createElement('div');
    tdiv.className = 'msg-time';
    tdiv.style.textAlign = 'center';
    tdiv.textContent = time;
    body.insertBefore(tdiv, body.firstChild);
  }
  
  body.scrollTop = body.scrollHeight;
}

function renderMsgList() {
  const list = $('#msgList');
  list.innerHTML = '';
  messages.forEach((msg, i) => {
    const row = document.createElement('div');
    row.className = 'msg-row';
    row.innerHTML = `<select data-i="${i}" class="msg-type"><option value="sent"${msg.type==='sent'?' selected':''}>→</option><option value="recv"${msg.type==='recv'?' selected':''}>←</option></select><input type="text" value="${msg.text.replace(/"/g,'&quot;')}" data-i="${i}" class="msg-text"><button data-i="${i}" class="msg-del">×</button>`;
    list.appendChild(row);
  });
  
  list.querySelectorAll('.msg-type').forEach(sel => {
    sel.addEventListener('change', e => {
      messages[+e.target.dataset.i].type = e.target.value;
      renderPreview();
    });
  });
  list.querySelectorAll('.msg-text').forEach(inp => {
    inp.addEventListener('input', e => {
      messages[+e.target.dataset.i].text = e.target.value;
      renderPreview();
    });
  });
  list.querySelectorAll('.msg-del').forEach(btn => {
    btn.addEventListener('click', e => {
      messages.splice(+e.target.dataset.i, 1);
      renderMsgList();
      renderPreview();
    });
  });
}

$('#btnAddSent').addEventListener('click', () => {
  messages.push({type:'sent', text:'Your message'});
  renderMsgList();
  renderPreview();
});
$('#btnAddRecv').addEventListener('click', () => {
  messages.push({type:'recv', text:'Reply message'});
  renderMsgList();
  renderPreview();
});

$('#contactName').addEventListener('input', renderPreview);
$('#chatTime').addEventListener('input', renderPreview);
$('#battery').addEventListener('input', renderPreview);

$('#btnDownload').textContent = t('download');
$('#btnAddSent').textContent = t('addSent');
$('#btnAddRecv').textContent = t('addRecv');

$('#btnDownload').addEventListener('click', () => {
  const frame = $('#phoneFrame');
  const canvas = document.createElement('canvas');
  const scale = 2;
  canvas.width = frame.offsetWidth * scale;
  canvas.height = frame.offsetHeight * scale;
  const ctx = canvas.getContext('2d');
  ctx.scale(scale, scale);
  // Use html2canvas-style approach: draw DOM to canvas
  // Simple fallback: use svg foreignObject
  const data = new XMLSerializer().serializeToString(frame);
  const svgStr = `<svg xmlns="http://www.w3.org/2000/svg" width="${frame.offsetWidth}" height="${frame.offsetHeight}"><foreignObject width="100%" height="100%"><div xmlns="http://www.w3.org/1999/xhtml" style="font-family:system-ui,sans-serif">${data.replace(/</g,'<').replace(/>/g,'>')}</div></foreignObject></svg>`;
  
  // Simpler approach: capture via html2canvas if available, or use basic canvas rendering
  const a = document.createElement('a');
  
  // Use built-in canvas rendering approach
  ctx.fillStyle = '#fff';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  
  // Draw phone frame
  const fw = frame.offsetWidth, fh = frame.offsetHeight;
  ctx.fillStyle = '#fff';
  roundRect(ctx, 0, 0, fw, fh, 40);
  ctx.fill();
  
  // Header
  ctx.fillStyle = '#F6F6F6';
  roundRect(ctx, 0, 0, fw, 60, 0);
  ctx.fill();
  
  ctx.fillStyle = '#000';
  ctx.font = 'bold 15px system-ui';
  ctx.textAlign = 'center';
  ctx.fillText($('#contactName').value || 'Contact', fw/2, 45);
  
  // Messages
  let y = 80;
  ctx.textAlign = 'left';
  messages.forEach(msg => {
    ctx.font = '14px system-ui';
    const text = msg.text;
    const maxW = fw * 0.6;
    const lines = wrapText(ctx, text, maxW);
    const h = lines.length * 20 + 16;
    
    const x = msg.type === 'sent' ? fw - maxW - 30 : 12;
    
    ctx.fillStyle = msg.type === 'sent' ? '#007AFF' : '#E9E9EB';
    roundRect(ctx, x, y, maxW + 16, h, 18);
    ctx.fill();
    
    ctx.fillStyle = msg.type === 'sent' ? '#fff' : '#000';
    lines.forEach((line, li) => {
      ctx.fillText(line, x + 8, y + 20 + li * 20);
    });
    y += h + 8;
  });
  
  a.download = 'imessage-chat.png';
  a.href = canvas.toDataURL('image/png');
  a.click();
});

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y);
  ctx.quadraticCurveTo(x+w, y, x+w, y+r);
  ctx.lineTo(x+w, y+h-r);
  ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
  ctx.lineTo(x+r, y+h);
  ctx.quadraticCurveTo(x, y+h, x, y+h-r);
  ctx.lineTo(x, y+r);
  ctx.quadraticCurveTo(x, y, x+r, y);
  ctx.closePath();
}

function wrapText(ctx, text, maxW) {
  const words = text.split(' ');
  const lines = [];
  let line = '';
  words.forEach(word => {
    const test = line ? line + ' ' + word : word;
    if (ctx.measureText(test).width > maxW && line) {
      lines.push(line);
      line = word;
    } else {
      line = test;
    }
  });
  if (line) lines.push(line);
  return lines.length ? lines : [''];
}

$('#toolbar').innerHTML = `
  <button class="gz-btn gz-btn-secondary" onclick="messages=[{type:'recv',text:'Hey!'},{type:'sent',text:'Hello! 👋'}];renderMsgList();renderPreview()">${t('example')||'Example'}</button>
  <button class="gz-btn gz-btn-secondary" onclick="messages=[];renderMsgList();renderPreview()">${t('clear')}</button>`;

renderMsgList();
renderPreview();

    {icon:'📷', href:'/social/instagram-post.html', name:'Instagram Post'},
    {icon:'📺', href:'/social/youtube-thumb.html', name:'YouTube Thumb'},
  ]
});
</script>
