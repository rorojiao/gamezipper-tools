  }

function applyPreset() {
  const p = presets[$('#preset').value];
  $('#cardWidth').value = p.width;
  $('#padding').value = p.padding;
  $('#borderRadius').value = p.borderRadius;
  $('#shadowIntensity').value = p.shadow;
  $('#shadowSpread').value = p.spread;
  $('#bgColor').value = p.bg;
  $('#textColor').value = p.text;
  $('#accentColor').value = p.accent;
  $('#borderColor').value = p.border;
  $('#borderWidth').value = p.bw;
  render();
}

function render() {
  const w = +$('#cardWidth').value;
  const p = +$('#padding').value;
  const br = +$('#borderRadius').value;
  const si = +$('#shadowIntensity').value;
  const ss = +$('#shadowSpread').value;
  const bg = $('#bgColor').value;
  const tc = $('#textColor').value;
  const ac = $('#accentColor').value;
  const bc = $('#borderColor').value;
  const bw = +$('#borderWidth').value;

  // Update val spans
  $('#cardWidthVal').textContent = w + 'px';
  $('#paddingVal').textContent = p + 'px';
  $('#borderRadiusVal').textContent = br + 'px';
  $('#shadowIntensityVal').textContent = si;
  $('#shadowSpreadVal').textContent = ss;
  $('#borderWidthVal').textContent = bw + 'px';

  const boxShadow = `0 ${si}px ${si*2}px -${ss}px rgba(0,0,0,0.3)`;
  const border = bw > 0 ? `${bw}px solid ${bc}` : 'none';

  const cardStyle = `width:${w}px;padding:${p}px;border-radius:${br}px;background:${bg};color:${tc};box-shadow:${boxShadow};border:${border};font-family:system-ui,-apple-system,sans-serif;overflow:hidden`;
  const preset = presets[$('#preset').value];

  $('#preview').innerHTML = `<div style="${cardStyle}">${preset.html}</div>`;

  const cssCode = `.card {
  width: ${w}px;
  padding: ${p}px;
  border-radius: ${br}px;
  background: ${bg};
  color: ${tc};
  box-shadow: ${boxShadow};
  border: ${border};
  overflow: hidden;
  /* Optional: add transition for hover effects */
  transition: transform 0.2s ease, box-shadow 0.2s ease;
}

.card:hover {
  transform: translateY(-4px);
  box-shadow: 0 ${si+8}px ${si*3}px -${ss}px rgba(0,0,0,0.4);
}`;

  $('#code').textContent = cssCode;
}

$('#preset').addEventListener('change', applyPreset);
['cardWidth','padding','borderRadius','shadowIntensity','shadowSpread','borderWidth'].forEach(id => {
  $('#' + id).addEventListener('input', render);
});
['bgColor','textColor','accentColor','borderColor'].forEach(id => {
  $('#' + id).addEventListener('input', render);
});
