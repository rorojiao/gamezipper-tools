<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is a DMARC record?", "acceptedAnswer": {"@type": "Answer", "text": "DMARC (Domain-based Message Authentication, Reporting and Conformance) is a DNS TXT record published at _dmarc.<yourdomain>. It tells receiving mail servers what to do when an email fails SPF and DKIM checks — none, quarantine or reject — and where to send aggregate (rua) and forensic (ruf) reports."}}, {"@type": "Question", "name": "What is a good DMARC policy?", "acceptedAnswer": {"@type": "Answer", "text": "Start with p=none to collect reports and see who is sending mail as you, then move to p=quarantine (move failing mail to spam), and finally p=reject to block spoofed mail outright. A mature setup uses p=reject with sp=reject and a working rua= report address."}}, {"@type": "Question", "name": "Where does the DMARC record live?", "acceptedAnswer": {"@type": "Answer", "text": "DMARC is published as a TXT record on the subdomain _dmarc under your apex domain. For example.com the record is queried at _dmarc.example.com. This tool queries that exact hostname for you."}}, {"@type": "Question", "name": "Does this checker send my domain to a server?", "acceptedAnswer": {"@type": "Answer", "text": "No. The DNS lookup is sent directly from your browser to the public Cloudflare DNS-over-HTTPS resolver (cloudflare-dns.com). The domain name itself is the only thing queried, just like any DNS resolver would."}}]}</script>

const { $, t } = GZ;

const TAG_DOCS = {
  v: {en:'DMARC version. Must be DMARC1.', zh:'DMARC 版本。必须为 DMARC1。'},
  p: {en:'Policy for the organizational domain: none (monitor), quarantine (spam) or reject (block).', zh:'组织域的策略：none（仅监控）、quarantine（隔离）或 reject（拒绝）。'},
  sp: {en:'Policy for subdomains. Defaults to the value of p.', zh:'子域的策略。默认与 p 相同。'},
  rua: {en:'Address (mailto:) that receives aggregate reports.', zh:'接收聚合报告的地址（mailto:）。'},
  ruf: {en:'Address (mailto:) that receives forensic failure reports.', zh:'接收取证失败报告的地址（mailto:）。'},
  adkim: {en:'DKIM alignment mode: r (relaxed, default) or s (strict).', zh:'DKIM 对齐模式：r（宽松，默认）或 s（严格）。'},
  aspf: {en:'SPF alignment mode: r (relaxed, default) or s (strict).', zh:'SPF 对齐模式：r（宽松，默认）或 s（严格）。'},
  pct: {en:'Percentage of mail the policy applies to (0–100).', zh:'策略应用的邮件百分比（0–100）。'},
  fo: {en:'Forensic report options: 0, 1, d or s.', zh:'取证报告选项：0、1、d 或 s。'},
  ri: {en:'Report interval in seconds between aggregate reports.', zh:'聚合报告之间的间隔秒数。'},
};

async function fetchTxt(name){
  const res = await fetch(`https://cloudflare-dns.com/dns-query?name=${encodeURIComponent(name)}&type=TXT`, {
    headers: { 'accept':'application/dns-json' }
  });
  if(!res.ok) throw new Error('http '+res.status);
  const data = await res.json();
  const answers = (data.Answer || []).filter(a => a.type === 16);
  return answers.map(a => {
    let v = a.data;
    if(v.startsWith('"')) v = v.slice(1);
    if(v.endsWith('"')) v = v.slice(0,-1);
    return v;
  });
}

function parseDmarc(record){
  // record like: v=DMARC1; p=reject; rua=mailto:dmarc@x.com; ...
  const parts = record.split(';').map(s=>s.trim()).filter(Boolean);
  const tags = {};
  for(const part of parts){
    const eq = part.indexOf('=');
    if(eq < 0) continue;
    const k = part.slice(0, eq).trim().toLowerCase();
    const v = part.slice(eq+1).trim();
    tags[k] = v;
  }
  return tags;
}

function esc(s){ return String(s).replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

async function doCheck(){
  const domain = $('#domain').value.trim().toLowerCase().replace(/^https?:\/\//,'').replace(/\/.*$/,'').replace(/^www\./,'');
  if(!domain){ $('#status').textContent = t('needDomain'); $('#result').innerHTML=''; return; }
  const btn = $('#checkBtn');
  btn.classList.add('busy');
  $('#status').innerHTML = `<span style="color:var(--text3)">${t('querying')}<strong>${esc(domain)}</strong> …</span>`;
  $('#result').innerHTML = '';
  try{
    const records = (await fetchTxt('_dmarc.'+domain)).filter(r => /^v=DMARC1/i.test(r));
    if(!records.length){
      $('#status').innerHTML = `<span class="score none">${t('scoreNone')}</span>`;
      $('#result').innerHTML = `
        <div class="recs">
          <div class="rec bad">Publish a TXT record at <code>_dmarc.${esc(domain)}</code> beginning with <code>v=DMARC1</code>.</div>
          <div class="rec warn">Start with <code>p=none</code> and add a <code>rua=mailto:</code> so you receive reports before enforcing.</div>
        </div>`;
      btn.classList.remove('busy');
      return;
    }
    const raw = records[0];
    const tags = parseDmarc(raw);
    const lang = ()=> GZI18n && window.__gzLang === 'zh' ? 'zh' : 'en';
    // score
    const p = (tags.p || 'none').toLowerCase();
    let scoreClass, scoreText;
    if(p === 'reject'){ scoreClass='good'; scoreText=t('scoreGood'); }
    else if(p === 'quarantine'){ scoreClass='ok'; scoreText=t('scoreOk'); }
    else { scoreClass='bad'; scoreText=t('scoreBad'); }

    // recommendations
    const recs = [];
    if(tags.v && tags.v.toLowerCase() !== 'dmarc1') recs.push({c:'bad', t:'<code>v</code> must be <code>DMARC1</code> (case-sensitive). Current value is invalid.'});
    if(p === 'none') recs.push({c:'warn', t:'<code>p=none</code> only collects reports. Move to <code>p=quarantine</code>, then <code>p=reject</code> after a few weeks of clean reports.'});
    if(!tags.rua) recs.push({c:'warn', t:'No <code>rua=</code> set. Add <code>rua=mailto:dmarc-reports@'+esc(domain)+'</code> to receive aggregate reports.'});
    if(p !== 'none' && tags.pct && tags.pct !== '100') recs.push({c:'warn', t:'<code>pct='+esc(tags.pct)+'</code> means only that % of mail is policy-enforced. Raise to 100 once stable.'});
    if(tags.aspf === 's') recs.push({c:'warn', t:'<code>aspf=s</code> (strict SPF alignment) can break legitimate forwarded mail. <code>r</code> (relaxed) is safer.'});
    if(tags.adkim === 's') recs.push({c:'warn', t:'<code>adkim=s</code> (strict DKIM alignment) is stricter than the relaxed default and may reject valid mail.'});
    if(records.length > 1) recs.push({c:'bad', t:t('multiRecords')});
    if(p === 'reject' && tags.rua && (!tags.pct || tags.pct==='100')) recs.push({c:'good', t:'Great — strong enforcement with report collection and 100% coverage.'});

    // tag cards
    const lang2 = GZI18n && window.__gzLang === 'zh' ? 'zh' : 'en';
    const tagCards = Object.keys(tags).map(k=>{
      const doc = TAG_DOCS[k] ? TAG_DOCS[k][lang2] : '';
      return `<div class="tag"><div class="name">${esc(k)}</div><div class="val">${esc(tags[k])}</div>${doc?`<div class="desc">${doc}</div>`:''}</div>`;
    }).join('');

    $('#status').innerHTML = `<span class="score ${scoreClass}">${scoreText}</span>`;
    $('#result').innerHTML = `
      <div class="raw"><span class="k">${t('found')} @ _dmarc.${esc(domain)}</span>${esc(raw)}</div>
      <h3 style="margin:18px 0 0;font-size:1rem">${t('tags')}</h3>
      <div class="tag-list">${tagCards}</div>
      ${recs.length?`<h3 style="margin:18px 0 0;font-size:1rem">${t('recommendations')}</h3><div class="recs">${recs.map(r=>`<div class="rec ${r.c}">${r.t}</div>`).join('')}</div>`:''}`;
  }catch(e){
    $('#status').innerHTML = `<span style="color:var(--gz-accent)">✗ ${t('netError')} (${esc(e.message)})</span>`;
    $('#result').innerHTML='';
  }
  btn.classList.remove('busy');
}

function loadExample(){ $('#domain').value='github.com'; doCheck(); }

$('#domain').addEventListener('keydown', e=>{ if(e.key==='Enter') doCheck(); });
