const { $, copyText, t } = GZ;

let tables = [];   // array of 2D arrays (rows of cells)
let activeTable = 0;

function parseHTMLTables(html) {
  const doc = new DOMParser().parseFromString('<body>' + html + '</body>', 'text/html');
  const out = [];
  doc.querySelectorAll('table').forEach(table => {
    // Determine grid size, accounting for colspan/rowspan
    const rows = table.querySelectorAll('tr');
    if (!rows.length) return;
    // Build a sparse grid and fill it
    const grid = [];
    const occupied = []; // grid[r][c] = true if filled
    let maxCols = 0;
    rows.forEach((tr, r) => {
      while (grid.length <= r) { grid.push([]); occupied.push([]); }
      let c = 0;
      const cells = tr.querySelectorAll('th,td');
      for (const cell of cells) {
        while (occupied[r][c]) c++;
        const text = cell.textContent.replace(/\s+/g, ' ').trim();
        const cs = Math.max(1, parseInt(cell.getAttribute('colspan') || '1', 10));
        const rs = Math.max(1, parseInt(cell.getAttribute('rowspan') || '1', 10));
        for (let rr = 0; rr < rs; rr++) {
          for (let cc = 0; cc < cs; cc++) {
            while (grid.length <= r + rr) { grid.push([]); occupied.push([]); }
            while (grid[r + rr].length <= c + cc) { grid[r + rr].push(''); occupied[r + rr].push(false); }
            grid[r + rr][c + cc] = text;
            occupied[r + rr][c + cc] = true;
            if (c + cc + 1 > maxCols) maxCols = c + cc + 1;
          }
        }
        c += cs;
      }
    });
    // Pad rows to maxCols
    for (const row of grid) while (row.length < maxCols) row.push('');
    out.push(grid);
  });
  return out;
}

function escapeCSVCell(v, delim) {
  if (v === null || v === undefined) return '';
  const s = String(v);
  if (/[",\n\r]/.test(s) || s.includes(delim)) return '"' + s.replace(/"/g, '""') + '"';
  return s;
}

function buildCSV(grid, delim) {
  return grid.map(r => r.map(c => escapeCSVCell(c, delim)).join(delim)).join('\n');
}

function xmlEscape(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function buildXLS(grid) {
  let xml = '<?xml version="1.0"?>\n<?mso-application progid="Excel.Sheet"?>\n';
  xml += '<Workbook xmlns="urn:schemas-microsoft-com:office:spreadsheet" xmlns:ss="urn:schemas-microsoft-com:office:spreadsheet">\n';
  xml += '<Worksheet ss:Name="Sheet1"><Table>\n';
  for (const row of grid) {
    const cells = row.map(v => {
      if (v === '') return '<Cell><Data ss:Type="String"></Data></Cell>';
      const num = Number(v);
      if (!isNaN(num) && /^-?\d+(\.\d+)?$/.test(v)) return '<Cell><Data ss:Type="Number">' + xmlEscape(num) + '</Data></Cell>';
      return '<Cell><Data ss:Type="String">' + xmlEscape(v) + '</Data></Cell>';
    });
    xml += '<Row>' + cells.join('') + '</Row>\n';
  }
  xml += '</Table></Worksheet></Workbook>';
  return xml;
}

function escapeHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function renderPreview() {
  if (!tables.length) { $('#preview').innerHTML = ''; return; }
  const grid = tables[activeTable];
  let html = '<table><tbody>';
  grid.forEach((row, idx) => {
    const tag = idx === 0 ? 'th' : 'td';
    html += '<tr>' + row.map(c => '<' + tag + ' title="' + escapeHtml(c) + '">' + escapeHtml(c) + '</' + tag + '>').join('') + '</tr>';
  });
  html += '</tbody></table>';
  if (grid.length > 100) html += '<p style="margin-top:8px;color:var(--text2);font-size:.85em">Showing first 100 of ' + grid.length + ' rows.</p>';
  $('#preview').innerHTML = html;
}

function renderTabs() {
  const tabs = $('#table-tabs');
  if (tables.length <= 1) { tabs.innerHTML = ''; return; }
  tabs.innerHTML = tables.map((_, i) => `<button class="${i === activeTable ? 'active' : ''}" onclick="selectTable(${i})">Table ${i + 1}</button>`).join('');
}

function selectTable(i) {
  activeTable = i;
  renderTabs();
  renderPreview();
  updateOutput();
  if (tables[i]) {
    const grid = tables[i];
    $('#status').innerHTML = '<span style="color:var(--gz-success)">' + t('valid').replace('%1', tables.length).replace('%2', i + 1).replace('%3', grid.length).replace('%4', grid[0] ? grid[0].length : 0) + '</span>';
  }
}

function updateOutput() {
  if (!tables.length) { $('#output').textContent = ''; return; }
  const grid = tables[activeTable];
  const fmt = $('#format').value;
  const delim = $('#delimiter').value;
  if (fmt === 'csv') $('#output').textContent = buildCSV(grid, delim);
  else if (fmt === 'tsv') $('#output').textContent = buildCSV(grid, '\t');
  else $('#output').textContent = buildXLS(grid);
}

function doConvert() {
  const text = $('#input').value;
  $('#output').textContent = '';
  $('#preview').innerHTML = '';
  $('#table-tabs').innerHTML = '';
  if (!text.trim()) { $('#status').textContent = ''; tables = []; return; }
  try {
    const parsed = parseHTMLTables(text);
    if (!parsed.length) {
      $('#status').innerHTML = '<span style="color:var(--gz-error)">' + t('invalid') + '</span>';
      tables = [];
      return;
    }
    tables = parsed;
    activeTable = 0;
    renderTabs();
    renderPreview();
    updateOutput();
    const grid = tables[0] || [];
    $('#status').innerHTML = '<span style="color:var(--gz-success)">' + t('valid').replace('%1', tables.length).replace('%2', 1).replace('%3', grid.length).replace('%4', grid[0] ? grid[0].length : 0) + '</span>';
  } catch (e) {
    $('#status').innerHTML = '<span style="color:var(--gz-error)">' + t('error').replace('%1', e.message) + '</span>';
    tables = [];
  }
}

function downloadFile(filename, content, mime) {
  const blob = new Blob(['\ufeff' + content], { type: mime });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 100);
}

function doDownload() {
  if (!tables.length) { doConvert(); if (!tables.length) return; }
  const grid = tables[activeTable];
  const fmt = $('#format').value;
  const delim = $('#delimiter').value;
  const ts = new Date().toISOString().slice(0, 10);
  const suffix = tables.length > 1 ? ('-t' + (activeTable + 1)) : '';
  if (fmt === 'csv') downloadFile('table' + suffix + '-' + ts + '.csv', buildCSV(grid, delim), 'text/csv;charset=utf-8');
  else if (fmt === 'tsv') downloadFile('table' + suffix + '-' + ts + '.tsv', buildCSV(grid, '\t'), 'text/tab-separated-values;charset=utf-8');
  else downloadFile('table' + suffix + '-' + ts + '.xls', buildXLS(grid), 'application/vnd.ms-excel;charset=utf-8');
}

function loadExample() {
  $('#input').value = `<table>
  <thead><tr><th>Rank</th><th>Name</th><th>Country</th><th>Score</th></tr></thead>
  <tbody>
    <tr><td>1</td><td>Alice</td><td rowspan="2">USA</td><td>9.8</td></tr>
    <tr><td>2</td><td>Bob</td><td>9.5</td></tr>
    <tr><td>3</td><td>Carol</td><td>UK</td><td>9.2</td></tr>
    <tr><td>4</td><td>Dan</td><td>Japan</td><td colspan="2">8.9 (tie)</td></tr>
  </tbody>
</table>`;
  doConvert();
}

function doClear() { $('#input').value = ''; $('#output').textContent = ''; $('#preview').innerHTML = ''; $('#table-tabs').innerHTML = ''; $('#status').textContent = ''; tables = []; }

$('#input').addEventListener('input', doConvert);
$('#delimiter').addEventListener('change', updateOutput);
$('#format').addEventListener('change', updateOutput);

$('#lbl-delimiter').textContent = t('delimiter');
$('#lbl-format').textContent = t('format');
$('#lbl-preview').textContent = t('preview');

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="doConvert()">${t('convert')}</button>
  <button class="gz-btn" onclick="doDownload()">⬇ ${t('download')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

GZ.renderToolPage({

  titleKey: 'toolTitle',

    {icon:'📊', href:'/convert/json-to-excel.html', name:'JSON to Excel'},
  ]
});
</script>
