const { $, t } = GZ;

function toEntities(str, hex) {
  let out = '';
  for (const ch of str) {
    const code = ch.codePointAt(0);
    if (hex) out += '&#x' + code.toString(16) + ';';
    else out += '&#' + code + ';';
  }
  return out;
}

function toJs(str) {
  const escaped = str.replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/"/g, '\\"');
  return `<script>document.write('${escaped}'.replace(/[a-z]/gi, c => String.fromCharCode((c <= 'Z' ? 90 : 122) >= c.charCodeAt(0) ? c.charCodeAt(0) + 13 - (c <= 'Z' ? 65 : 97) % 26 : c.charCodeAt(0))));<\/script>`;
}

function toCss(str) {
  // CSS direction: rtl + unicode-bidi:bidi-override, so the text shows reversed
  const reversed = str.split('').reverse().join('');
  const span = `<span style="unicode-bidi:bidi-override;direction:rtl">${toEntities(reversed, false)}</span>`;
  return span;
}

function toAtReplace(str) { return str.replace(/@/g, '[at]').replace(/\./g, '[dot]'); }

function toRot13(str) {
  // We ROT-encode and decode via JS at runtime
  const rot = str.replace(/[a-zA-Z]/g, c => {
    const base = c <= 'Z' ? 65 : 97;
    return String.fromCharCode(((c.charCodeAt(0) - base + 13) % 26) + base);
  });
  return `<script>document.write('${rot}'.replace(/[a-zA-Z]/g, c => { const b = c <= 'Z' ? 65 : 97; return String.fromCharCode(((c.charCodeAt(0) - b + 13) % 26) + b); }));<\/script>`;
}

function obfuscateOne(email, method) {
  const linkMode = $('#linkMode').value;
  const textMode = $('#textMode').value;
  const customText = $('#customText').value;
  const text = (textMode === 'email') ? email : (textMode === 'custom' ? customText : '');

  if (method === 'entities') return buildLink(toEntities(email, false), text, linkMode, email);
  if (method === 'hex') return buildLink(toEntities(email, true), text, linkMode, email);
  if (method === 'css') return toCss(email);
  if (method === 'at-replace') return buildLink(toAtReplace(email), text, linkMode, email);
  if (method === 'rot') return toRot13(email);
  if (method === 'js') return toJs(email);
  return '';
}

function buildLink(obfText, displayText, linkMode, email) {
  const dt = displayText || obfText;
  if (linkMode === 'mailto') {
    return `<a href="mailto:${email.replace(/"/g, '&quot;')}">${dt}</a>`;
  }
  return `<span>${dt}</span>`;
}

function obfuscateAll(email) {
  const methods = ['entities', 'hex', 'js', 'css', 'at-replace', 'rot'];
  return methods.map(m => `<!-- ${m} -->\n${obfuscateOne(email, m)}`).join('\n\n');
}

function update() {
  const emails = $('#input').value.split('\n').map(s => s.trim()).filter(Boolean);
  const method = $('#method').value;
  if (!emails.length) {
    $('#output').textContent = '';
    $('#live').innerHTML = '';
    return;
  }
  const codes = emails.map(e => {
    if (method === 'all') return '=== ' + e + ' ===\n' + obfuscateAll(e);
    return obfuscateOne(e, method);
  });
  const code = codes.join('\n\n');
  $('#output').textContent = code;
  // Render preview (limit to first 3 to keep DOM sane)
  $('#live').innerHTML = emails.slice(0, 3).map(e => {
    if (method === 'js' || method === 'rot') {
      return `<div>${e} → ${evalJsPreview(e, method)}</div>`;
    }
    if (method === 'css') {
      return `<div>${e} → <span style="unicode-bidi:bidi-override;direction:rtl">${e.split('').reverse().join('')}</span> (looks correct in browser)</div>`;
    }
    return `<div>${e} → <code>${obfuscateOne(e, method).replace(/</g,'&lt;')}</code></div>`;
  }).join('') + (emails.length > 3 ? `<div style="opacity:.6">+ ${emails.length - 3} more</div>` : '');
}

function evalJsPreview(email, method) {
  // For preview only: decode entity-based obfuscation and JS-style for human reading
  if (method === 'js') {
    // Simulate JS output by decoding using the same logic
    return email; // visually identical
  }
  if (method === 'rot') return email; // visually identical
  return email;
}

['input','method','linkMode','textMode','customText'].forEach(id => {
  const el = $('#' + id);
  el.addEventListener('input', update);
  el.addEventListener('change', update);
});

function addEmail() {
  const e = $('#email').value.trim();
  if (!e) return;
  const cur = $('#input').value;
  $('#input').value = cur ? cur + '\n' + e : e;
  update();
}
function doClear() { $('#input').value = ''; $('#output').textContent = ''; $('#live').innerHTML = ''; }
