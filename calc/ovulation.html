<script type="application/ld+json">{"@context":"https://schema.org","@type":"WebApplication","name":"Ovulation Calculator","description":"Calculate your fertile window, ovulation day, and next period date. Free online ovulation calculator for cycle planning and pregnancy tracking.","url":"https://tools.gamezipper.com/calc/ovulation.html","applicationCategory":"Utility","operatingSystem":"Web Browser","offers":{"@type":"Offer","price":"0"}}</script>
<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "How is ovulation calculated?", "acceptedAnswer": {"@type": "Answer", "text": "Ovulation usually occurs 14 days before the next period begins. Subtract 14 from your typical cycle length to find your luteal phase length, then count backward from your last period start date. The fertile window is the 5 days before ovulation, plus ovulation day itself."}}, {"@type": "Question", "name": "How accurate is an online ovulation calculator?", "acceptedAnswer": {"@type": "Answer", "text": "Online ovulation calculators provide a statistical estimate. They are most accurate for women with regular 26-32 day cycles. Actual ovulation can vary by a few days even in regular cycles, so use this tool as a guide alongside ovulation test kits, basal body temperature tracking or cervical mucus observations."}}, {"@type": "Question", "name": "When am I most fertile?", "acceptedAnswer": {"@type": "Answer", "text": "You are most fertile during the 5 days leading up to ovulation and on ovulation day itself. The peak fertile day is usually the day before ovulation, when fertile cervical mucus is most abundant. Sperm can survive up to 5 days in the reproductive tract, so intercourse during this window gives the highest pregnancy chance."}}, {"@type": "Question", "name": "Can this tool help with pregnancy planning?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. The calculator shows your fertile window and estimated ovulation date, which are the best days to have intercourse for conception. The next-period date is also shown. If your cycles are irregular, track several cycles and use the average length for better estimates."}}]}</script>

<script>
GZI18n.register({
  en: {
    toolTitle: 'Ovulation Calculator',
    toolDesc: 'Find your fertile window, estimated ovulation day, and next period date. Visualize your monthly cycle to plan pregnancy or track fertility.',
    last: 'Last Period Start Date',
    cycle: 'Cycle Length (days)',
    luteal: 'Luteal Phase (days)',
    period: 'Period Length (days)',
    mainLbl: 'Estimated Ovulation Day',
    fertile: 'Fertile Window',
    fertileStart: 'Fertile Window Starts',
    fertileEnd: 'Fertile Window Ends',
    nextPeriod: 'Next Period Date',
    safeStart: 'Safer Period After',
    safeEnd: 'Safer Period Until',
    cycleDay: 'Cycle Day',
    today: 'Today',
    print: 'Print',
    infoText: 'This calculator uses your last period start, average cycle length, and luteal phase length to estimate ovulation (luteal phase length is most consistent across cycles). For best results, track your cycle for 3 months and use the average length.',
    step1: 'Enter the first day of your most recent period',
    step2: 'Set your average cycle length (21-35 typical), luteal phase (14 typical), and period length',
    step3: 'View your estimated ovulation day and fertile window',
    step4: 'Read the visual cycle chart for peak fertility days',
  },
  zh: {
    toolTitle: '排卵期计算器',
    toolDesc: '查找你的易孕期、预估排卵日和下次月经日期。可视化展示你的月经周期，帮助备孕或跟踪排卵。',
    last: '最近一次月经开始日期',
    cycle: '月经周期（天）',
    luteal: '黄体期（天）',
    period: '月经持续（天）',
    mainLbl: '预估排卵日',
    fertile: '易孕期',
    fertileStart: '易孕期开始',
    fertileEnd: '易孕期结束',
    nextPeriod: '下次月经日期',
    safeStart: '相对安全期开始',
    safeEnd: '相对安全期结束',
    cycleDay: '周期第',
    today: '今天',
    print: '打印',
    infoText: '本计算器根据最近一次月经开始日期、平均周期长度和黄体期长度来估算排卵日（黄体期长度在不同周期中最稳定）。建议先跟踪 3 个月经周期，使用平均长度获得更准确的结果。',
    step1: '输入最近一次月经开始的第一天',
    step2: '设置平均周期长度（21-35 常见）、黄体期（通常 14 天）和经期长度',
    step3: '查看预估排卵日和易孕期',
    step4: '阅读可视化周期图，识别最佳受孕日',
  }
});

const { $, t } = GZ;
const getLang = () => (window.GZI18n && window.GZI18n.getLang) ? window.GZI18n.getLang() : 'en';

function fmt(d) {
  return d.toLocaleDateString(getLang() === 'zh' ? 'zh-CN' : 'en-US', { year: 'numeric', month: 'short', day: 'numeric' });
}
function addDays(d, n) {
  const r = new Date(d);
  r.setDate(r.getDate() + n);
  return r;
}

function calc() {
  const lastStr = $('#last').value;
  if (!lastStr) return;
  const last = new Date(lastStr);
  const cycle = parseInt($('#cycle').value) || 28;
  const luteal = parseInt($('#luteal').value) || 14;
  const period = parseInt($('#period').value) || 5;

  // Ovulation day = last period + (cycle - luteal) days
  const ovDay = addDays(last, cycle - luteal);
  // Fertile window = 5 days before ovulation through ovulation day
  const fertileStart = addDays(ovDay, -5);
  const fertileEnd = ovDay;
  // Next period = last period + cycle days
  const nextPeriod = addDays(last, cycle);
  // "Safer" period after fertile window until next period
  const safeStart = addDays(ovDay, 1);
  const safeEnd = addDays(nextPeriod, -1);

  $('#ovDay').textContent = fmt(ovDay);

  $('#results').innerHTML = `
    <div class="oc-box highlight"><div class="name">${t('mainLbl')}</div><div class="val">${fmt(ovDay)}</div></div>
    <div class="oc-box"><div class="name">${t('fertileStart')}</div><div class="val">${fmt(fertileStart)}</div></div>
    <div class="oc-box"><div class="name">${t('fertileEnd')}</div><div class="val">${fmt(fertileEnd)}</div></div>
    <div class="oc-box"><div class="name">${t('nextPeriod')}</div><div class="val">${fmt(nextPeriod)}</div></div>
    <div class="oc-box"><div class="name">${t('safeStart')}</div><div class="val">${fmt(safeStart)}</div></div>
    <div class="oc-box"><div class="name">${t('safeEnd')}</div><div class="val">${fmt(safeEnd)}</div></div>
  `;

  // Build cycle day grid
  const today = new Date();
  today.setHours(0,0,0,0);
  let html = '';
  for (let d = 1; d <= cycle; d++) {
    const date = addDays(last, d - 1);
    const isToday = date.getTime() === today.getTime();
    const isPeriod = d <= period;
    const isOv = date.getTime() === ovDay.getTime();
    const isFertile = date >= fertileStart && date <= fertileEnd;
    let cls = 'oc-day';
    if (isOv) cls += ' ovulation';
    else if (isPeriod) cls += ' period';
    else if (isFertile) cls += ' fertile';
    html += `<div class="${cls}"><div class="num">${d}</div>${isToday ? '📍' : ''}</div>`;
  }
  $('#days').innerHTML = html;

  $('#info').textContent = t('infoText');
}

// Set default last period to 14 days ago
const d = new Date();
d.setDate(d.getDate() - 14);
$('#last').value = d.toISOString().slice(0, 10);

['last', 'cycle', 'luteal', 'period'].forEach(id => {
  $('#' + id).addEventListener('input', calc);
  $('#' + id).addEventListener('change', calc);
});

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="calc()">${t('calculate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="window.print()">${t('print') || 'Print'}</button>`;

calc();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📅', href:'/calc/pregnancy-due-date.html', name:'Pregnancy Due Date'},
    {icon:'📅', href:'/calc/date-calculator.html', name:'Date Calculator'},
    {icon:'🎂', href:'/calc/age-calculator.html', name:'Age Calculator'},
    {icon:'⚖️', href:'/calc/bmi-calculator.html', name:'BMI'},
  ]
});
</script>

</body>
