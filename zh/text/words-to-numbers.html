<script>

  en: {
    toolTitle: 'Words to Numbers Converter',

  },
  zh: {
    toolTitle: '英文数字转阿拉伯数字',
    toolDesc: '将英文拼写的数字（如 two hundred fifty thousand）转换为阿拉伯数字。支持 and、连字符、小数、负数，最大到 centillion。',
    convert: '转换',
    example: '示例',
    copy: '复制',
    clear: '清空',
    lblIn: '英文数字',
    lblOut: '数字',
    hint: '示例："two hundred fifty thousand"、"negative three point one four"、"1 million 250 thousand"',
    errInvalid: '无法解析 — 请检查是否有未知单词',
    step1: '输入英文拼写的数字（如 "two hundred fifty thousand"）',
    step2: '按需使用 and、连字符，小数用 point',
    step3: '点击「转换」即时得到数字',
    step4: '点击「复制」复制结果',
  }
});

const { $, copyText, t } = GZ;

// Short-scale magnitude names -> power of 1000
const SCALE = {
  thousand: 1, million: 2, billion: 3, trillion: 4, quadrillion: 5, quintillion: 6,
  sextillion: 7, septillion: 8, octillion: 9, nonillion: 10, decillion: 11,
  undecillion: 12, duodecillion: 13, tredecillion: 14, quattuordecillion: 15,
  quindecillion: 16, sexdecillion: 17, septendecillion: 18, octodecillion: 19,
  novemdecillion: 20, vigintillion: 21, trigintillion: 31, quadragintillion: 41,
  quinquagintillion: 51, sexagintillion: 61, septuagintillion: 71, octogintillion: 81,
  nonagintillion: 91, centillion: 101,
};
const UNITS = {zero:0,one:1,two:2,three:3,four:4,five:5,six:6,seven:7,eight:8,nine:9,
  ten:10,eleven:11,twelve:12,thirteen:13,fourteen:14,fifteen:15,sixteen:16,seventeen:17,eighteen:18,nineteen:19};
const TENS = {twenty:2,thirty:3,forty:4,fifty:5,sixty:6,seventy:7,eighty:8,ninety:9};
const DIGIT = {zero:0,one:1,two:2,three:3,four:4,five:5,six:6,seven:7,eight:8,nine:9,
  oh:0, nil:0, nought:0};

function tokenize(str) {
  // normalize
  str = str.toLowerCase().trim().replace(/[,$]/g, ' ');
  let negative = false;
  if (/^(negative|minus)\b/.test(str)) { negative = true; str = str.replace(/^(negative|minus)\b/, ''); }
  let decimals = null;
  const pointIdx = str.search(/\bpoint\b/);
  if (pointIdx >= 0) {
    decimals = str.slice(pointIdx).replace(/^point\b/, '').trim();
    str = str.slice(0, pointIdx).trim();
  }
  // split on whitespace and hyphens, drop 'and' & 'a'
  const tokens = str.split(/[\s\-]+/).filter(x => x && x !== 'and' && x !== 'a');
  return { negative, tokens, decimals };
}

function parseInteger(tokens) {
  let total = 0n;        // grand total
  let current = 0n;      // current segment
  let lastScale = 0;
  for (const raw of tokens) {
    let tok = raw;
    // plain digit run
    if (/^\d+$/.test(tok)) {
      current += BigInt(tok);
      continue;
    }
    if (UNITS[tok] !== undefined) { current += BigInt(UNITS[tok]); continue; }
    if (TENS[tok] !== undefined) { current += BigInt(TENS[tok]) * 10n; continue; }
    if (tok === 'hundred') { current *= 100n; continue; }
    if (SCALE[tok] !== undefined) {
      const power = BigInt(SCALE[tok]) * 3n; // 10^(3*scale)
      const segTotal = current === 0n ? 1n : current;
      total += segTotal * (10n ** power);
      current = 0n;
      lastScale = SCALE[tok];
      continue;
    }
    // unknown word
    throw new Error('unknown token: ' + tok);
  }
  return total + current;
}

function parseDecimals(decStr) {
  if (!decStr) return '';
  const toks = decStr.split(/[\s\-]+/).filter(Boolean);
  let out = '';
  for (const raw of toks) {
    if (/^\d+$/.test(raw)) { out += raw; continue; }
    if (DIGIT[raw] !== undefined) { out += DIGIT[raw]; continue; }
    // ignore unknown
  }
  return out;
}

function convert() {
  const inp = $('#input').value.trim();
  $('#status').textContent = '';
  if (!inp) { $('#output').textContent = ''; return; }
  try {
    const { negative, tokens, decimals } = tokenize(inp);
    if (tokens.length === 0 && decimals === null) { $('#output').textContent = ''; return; }
    let intPart = tokens.length ? parseInteger(tokens).toString() : '0';
    let result = intPart;
    if (decimals !== null) {
      const dec = parseDecimals(decimals);
      result = intPart + '.' + (dec || '0');
    }
    if (negative && result !== '0') result = '-' + result;
    $('#output').textContent = result;
  } catch (e) {
    $('#output').textContent = '';
    $('#status').textContent = '✗ ' + t('errInvalid') + ' (' + e.message + ')';
  }
}

function loadExample() {
  $('#input').value = 'two hundred fifty thousand three hundred forty-seven point one two';
  convert();
}
function doClear() { $('#input').value = ''; $('#output').textContent = ''; $('#status').textContent = ''; }

$('#lbl-in').textContent = t('lblIn');
$('#lbl-out').textContent = t('lblOut');
$('#hint').textContent = t('hint');

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="convert()">${t('convert')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

$('#input').addEventListener('input', convert);
loadExample();

  ]
});
</script>
