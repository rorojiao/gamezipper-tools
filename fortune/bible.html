let activeTopic = 'all';
let history = [];

function books() {
  const set = new Set(VERSES.map(v => v.b));
  return Array.from(set).sort();
}

function renderBooks() {
  const sel = document.getElementById('book');
  const lang = GZI18n.getLang();
  sel.innerHTML = '<option value="all">' + (lang==='zh'?'所有书卷':'All Books') + '</option>' + books().map(b => `<option>${b}</option>`).join('');
}

function renderTopics() {
  document.getElementById('topics').innerHTML = TOPICS.map(t => `<span class="bb-chip ${t.id===activeTopic?'active':''}" data-t="${t.id}">${t.l}</span>`).join('');
  document.querySelectorAll('.bb-chip').forEach(c => c.addEventListener('click', () => { activeTopic = c.dataset.t; renderTopics(); pick(); }));
}

function filtered() {
  const test = document.getElementById('testament').value;
  const book = document.getElementById('book').value;
  return VERSES.filter(v => {
    if (test !== 'all' && v.test !== test) return false;
    if (book !== 'all' && v.b !== book) return false;
    if (activeTopic !== 'all' && !v.t.includes(activeTopic)) return false;
    return true;
  });
}

function pick() {
  const pool = filtered();
  if (!pool.length) return;
  const v = pool[Math.floor(Math.random()*pool.length)];
  const trans = document.getElementById('translation').value;
  const transLabel = trans === 'kjv' ? 'King James Version' : trans === 'niv' ? 'Modern English' : 'World English Bible';
  document.getElementById('verse').textContent = v.verse;
  document.getElementById('ref').textContent = `${v.b} ${v.c}:${v.v}`;
  document.getElementById('trans').textContent = '— ' + transLabel;
  history.unshift({v:v.verse, r:`${v.b} ${v.c}:${v.v}`, t:transLabel});
  if (history.length > 8) history.pop();
  renderHistory();
}

function renderHistory() {
  const h = document.getElementById('hist');
  if (!history.length) { h.innerHTML = ''; return; }
  h.innerHTML = '<h3 style="color:#d4af37;font-family:Cinzel,serif;font-size:1rem;margin-bottom:6px;text-align:center">History</h3>' + history.map((x,i) => 
    `<div class="bb-h" data-i="${i}"><div class="t">${x.r}</div><div class="v">${x.v.substring(0,140)}${x.v.length>140?'…':''}</div></div>`
  ).join('');
  document.querySelectorAll('.bb-h').forEach(el => el.addEventListener('click', () => {
    const h = history[+el.dataset.i];
    document.getElementById('verse').textContent = h.v;
    document.getElementById('ref').textContent = h.r;
    document.getElementById('trans').textContent = '— ' + h.t;
  }));
}

function html2canvasFallback(el) {
  const w = 800, h = 600;
  const c = document.createElement('canvas');
  c.width = w; c.height = h;
  const ctx = c.getContext('2d');
  // Background
  const grad = ctx.createLinearGradient(0,0,w,h);
  grad.addColorStop(0, '#1a1208'); grad.addColorStop(0.5, '#2a1a0a'); grad.addColorStop(1, '#1a1208');
  ctx.fillStyle = grad; ctx.fillRect(0,0,w,h);
  // Border
  ctx.strokeStyle = 'rgba(212,175,55,0.5)'; ctx.lineWidth = 2; ctx.strokeRect(20,20,w-40,h-40);
  ctx.strokeStyle = 'rgba(212,175,55,0.3)'; ctx.lineWidth = 1; ctx.strokeRect(28,28,w-56,h-56);
  // Verse text
  ctx.fillStyle = '#f5e6c8'; ctx.font = 'italic 22px serif'; ctx.textAlign = 'center';
  const verse = document.getElementById('verse').textContent;
  const ref = document.getElementById('ref').textContent;
  wrapText(ctx, `"${verse}"`, w/2, h/2 - 30, w-100, 32);
  // Reference
  ctx.fillStyle = '#d4af37'; ctx.font = '600 20px serif';
  ctx.fillText('— ' + ref, w/2, h - 60);
  // Download
  const a = document.createElement('a');
  a.href = c.toDataURL('image/png');
  a.download = 'bible-verse.png';
  a.click();
}

function wrapText(ctx, text, x, y, maxWidth, lineHeight) {
  const words = text.split(' ');
  let line = ''; let yy = y;
  for (let n = 0; n < words.length; n++) {
    const testLine = line + words[n] + ' ';
    const metrics = ctx.measureText(testLine);
    if (metrics.width > maxWidth && n > 0) {
      ctx.fillText(line, x, yy);
      line = words[n] + ' ';
      yy += lineHeight;
    } else { line = testLine; }
  }
  ctx.fillText(line, x, yy);
}
