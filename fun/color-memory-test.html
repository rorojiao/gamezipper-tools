<script>
GZI18n.register({
  en: {
    toolTitle: 'Color Memory Test',
    toolDesc: 'A color flashes briefly — can you pick the exact match from similar-looking options? Free visual memory game, gets harder each round, no signup.',
    lblLevel2: 'Level',
    lblStreak: 'Streak',
    lblBest3: 'Best',
    start: 'Start',
    again: 'Play Again',
    memorize: ' memorize this color...',
    pick: ' now pick the exact same color',
    correct: '✓ Correct!',
    wrong: '✗ Not quite — game over',
    roundN: 'Round',
    step1: 'Click Start to begin',
    step2: 'Memorize the target color shown briefly',
    step3: 'Pick the exact same color from the grid',
    step4: 'Each correct round the options get harder to tell apart',
  },
  zh: {
    toolTitle: '色彩记忆测试',
    toolDesc: '一种颜色短暂闪现 — 你能从相近的选项中选出完全相同的一个吗？免费视觉记忆游戏，逐关变难，无需注册。',
    lblLevel2: '关卡',
    lblStreak: '连击',
    lblBest3: '最佳',
    start: '开始',
    again: '再玩一次',
    memorize: ' 请记住这个颜色...',
    pick: ' 请选出完全相同的颜色',
    correct: '✓ 正确！',
    wrong: '✗ 不对 — 游戏结束',
    roundN: '第',
    step1: '点击「开始」',
    step2: '短暂记忆目标颜色',
    step3: '从网格中选出完全相同的颜色',
    step4: '每答对一关，选项颜色会更相近、更难分辨',
  }
});

const { $, t } = GZ;
let level = 0;
let streak = 0;
let best = parseInt(localStorage.getItem('gz-colmem-best') || '0', 10);
let targetHsl = null;
let phase = 'idle'; // idle | show | pick | over

$('#best3').textContent = best;

function randHSL() {
  return [Math.floor(Math.random()*360), 55 + Math.random()*30, 45 + Math.random()*20];
}
function hslStr([h,s,l]) { return `hsl(${h},${s}%,${l}%)`; }
function jitter(hsl, amount) {
  let [h,s,l] = hsl;
  h = (h + (Math.random()*2-1)*amount + 360) % 360;
  s = Math.max(0, Math.min(100, s + (Math.random()*2-1)*amount*0.5));
  l = Math.max(5, Math.min(95, l + (Math.random()*2-1)*amount*0.6));
  return [Math.round(h), Math.round(s), Math.round(l)];
}
function sleep(ms){return new Promise(r=>setTimeout(r,ms))}

function buildChoices() {
  // difficulty: number of options and how close they are
  const numOptions = Math.min(9, 4 + level);
  const spread = Math.max(4, 40 - level*4); // degrees/jitter shrinks as level grows
  const options = new Set([hslStr(targetHsl)]);
  while (options.size < numOptions) {
    options.add(hslStr(jitter(targetHsl, spread)));
  }
  const arr = [...options];
  // shuffle
  for (let i = arr.length-1; i>0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]] = [arr[j],arr[i]];
  }
  const choices = $('#choices');
  choices.innerHTML = '';
  arr.forEach(c => {
    const el = document.createElement('div');
    el.className = 'cm-choice';
    el.style.background = c;
    el.onclick = () => pick(c);
    choices.appendChild(el);
  });
}

function pick(c) {
  if (phase !== 'pick') return;
  const correct = c === hslStr(targetHsl);
  const choiceEls = [...$('#choices').children];
  choiceEls.forEach(el => {
    if (el.style.background === hslStr(targetHsl)) el.classList.add('correct');
    else if (el.style.background === c) el.classList.add('wrong');
    el.onclick = null;
  });
  if (correct) {
    level++; streak++;
    $('#lvl').textContent = level;
    $('#streak').textContent = streak;
    if (level > best) {
      best = level;
      localStorage.setItem('gz-colmem-best', String(best));
      $('#best3').textContent = best;
    }
    $('#status').textContent = t('correct');
    phase = 'show';
    setTimeout(nextRound, 1100);
  } else {
    gameOver();
  }
}

async function showTarget() {
  phase = 'show';
  $('#status').textContent = t('memorize');
  $('#choices').innerHTML = '';
  const showMs = Math.max(900, 2200 - level*120);
  $('#target').style.opacity = '1';
  $('#target').style.background = hslStr(targetHsl);
  await sleep(showMs);
  $('#target').style.background = '#444';
  $('#target').style.opacity = '0.5';
  phase = 'pick';
  $('#status').textContent = t('pick');
  buildChoices();
}

function nextRound() {
  targetHsl = randHSL();
  $('#round-info').textContent = `${t('roundN')} ${level+1}`;
  showTarget();
}

function startGame() {
  level = 0; streak = 0;
  $('#lvl').textContent = 0;
  $('#streak').textContent = 0;
  $('#status').textContent = '';
  nextRound();
}

function gameOver() {
  phase = 'over';
  $('#status').textContent = t('wrong');
  renderControls(true);
}

function renderControls(isOver) {
  $('#controls').innerHTML = `<button class="gz-btn" onclick="startGame()">${t(isOver?again:start)}</button>`;
}

renderControls(false);

GZ.renderToolPage({
  category: 'fun',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🧩', href:'/fun/sequence-memory-test.html', name:'Sequence Memory'},
    {icon:'⚡', href:'/fun/reaction-speed-test.html', name:'Reaction Speed'},
    {icon:'👁️', href:'/fun/visual-memory-test.html', name:'Visual Memory'},
    {icon:'🎨', href:'/color/picker.html', name:'Color Picker'},
  ]
});
</script>
