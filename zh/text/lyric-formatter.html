const { $, copyText, t } = GZ;

// Section header patterns (case-insensitive)
const SECTION_RE = /^\s*\[?\s*(verse|chorus|bridge|hook|pre[-\s]?chorus|intro|outro|refrain|interlude|solo|instrumental|v\d|c\d|b\d)(?:\s*\d+)?\s*:?\s*\]?\s*$/i;

// Syllable estimate: count vowel groups per word (English)
function countSyllables(line){
  if(!line.trim()) return 0;
  let total=0;
  const words=line.toLowerCase().match(/[a-zà-ÿ]+/g) || [];
  for(const w of words){
    const groups=w.match(/[aeiouyà-ÿ]+/g);
    let n = groups ? groups.length : 1;
    // subtract silent trailing 'e' unless word ends in 'le' after consonant
    if(w.endsWith('e') && n>1 && !/le$/.test(w)) n--;
    if(w.endsWith('es') && n>1) n--;
    if(n<1) n=1;
    // small heuristic for cn/jp etc.
    total+=n;
  }
  // for CJK: count characters as syllables
  const cjk=(line.match(/[\u3400-\u9fff]/g)||[]).length;
  total+=cjk;
  return total;
}

function capitalize(s){
  if(!s) return s;
  // title-case-ish: first non-space char uppercase
  return s.replace(/^(\s*)([a-zà-ÿ])/i, (m,sp,c)=> sp + c.toUpperCase());
}

function formatLyrics(){
  let txt=$('#input').value;
  if(!txt.trim()){ $('#output').innerHTML=''; updateStats(''); return; }
  const opts=readOpts();
  let lines=txt.replace(/\r/g,'').split('\n');

  // Strip existing tags ONLY when strip is on AND tag is off.
  // (When tag is on, the detector reads the original section header first.)
  if(opts.strip && !opts.tag){
    lines=lines.map(l=> l.replace(SECTION_RE,'').trimEnd());
  }

  if(opts.trim){
    lines=lines.map(l=>l.trim());
    // collapse 2+ blank lines to 1
    const out=[];
    let prevBlank=false;
    for(const l of lines){
      const blank=!l.trim();
      if(blank && prevBlank) continue;
      out.push(l);
      prevBlank=blank;
    }
    lines=out;
  }

  if(opts.caps){
    lines=lines.map(l=> capitalize(l));
  }

  if(opts.tag){
    // auto-detect likely section starts: a short line whose first word is a known
    // section keyword (case-insensitive), e.g. "VERSE 1", "Chorus", "[Bridge]"
    const tagged=[];
    let sectionCount=0;
    let lineIdx=0;
    const known=['verse','chorus','bridge','hook','pre-chorus','prechorus','intro','outro','refrain','interlude','solo','instrumental'];
    for(let i=0;i<lines.length;i++){
      const l=lines[i];
      const trimmed=l.trim();
      const firstWord=(trimmed.toLowerCase().split(/[\s\[:\]]/)[0]||'').trim();
      const isLikelySection =
        trimmed.length>0 && trimmed.length<32 &&
        known.includes(firstWord) &&
        // sanity: not a real lyric line that just happens to start with "verse" etc.
        trimmed.split(/\s+/).length <= 4;
      if(isLikelySection){
        // Normalize to "Verse 1", "Chorus" etc.
        const nice = trimmed.charAt(0).toUpperCase() + trimmed.slice(1).toLowerCase();
        tagged.push({type:'section', text: nice});
        sectionCount++;
      } else {
        tagged.push({type:'line', text:l, idx:lineIdx++});
      }
    }
    renderTagged(tagged, opts);
    let plain='';
    let syllTotal=0;
    let wordCount=0, charCount=0;
    let lineCounter=0;
    for(const item of tagged){
      if(item.type==='section'){
        plain += `[${item.text.toUpperCase()}]\n`;
      } else {
        let l=item.text;
        if(opts.numbers){ lineCounter++; l = `${lineCounter}. ${l}`; }
        if(opts.syll){
          const sc=countSyllables(l);
          syllTotal+=sc;
          plain += `${l}  ·${sc}\n`;
        } else {
          syllTotal+=countSyllables(l);
          plain += l+'\n';
        }
        wordCount += (l.match(/\S+/g)||[]).length;
        charCount += l.length;
      }
    }
    updateStats(plain, {lines: tagged.filter(x=>x.type==='line').length, words: wordCount, syll: syllTotal, sections: sectionCount, chars: charCount});
    return;
  }

  // No tagging path
  let plain='';
  let syllTotal=0, wordCount=0, charCount=0, lineCount=0;
  let html='';
  lines.forEach((l,i)=>{
    let display=l;
    if(opts.numbers){ lineCount++; display=`${lineCount}. ${l}`; }
    if(opts.syll){
      const sc=countSyllables(l);
      syllTotal+=sc;
      html += `<div>${escapeHtml(display)} <span class="lf-tag">${sc}</span></div>`;
      plain += `${display}  ·${sc}\n`;
    } else {
      syllTotal+=countSyllables(l);
      html += `<div>${escapeHtml(display)}</div>`;
      plain += display+'\n';
    }
    wordCount += (l.match(/\S+/g)||[]).length;
    charCount += l.length;
  });
  $('#output').innerHTML = html || '<div style="opacity:.5">(empty)</div>';
  updateStats(plain, {lines: lines.filter(l=>l.trim()).length, words: wordCount, syll: syllTotal, sections: 0, chars: charCount});
}

function renderTagged(items, opts){
  let html='';
  let plain='';
  let lineCounter=0;
  for(const it of items){
    if(it.type==='section'){
      html += `<div class="lf-verse">${escapeHtml(it.text.toUpperCase())}</div>`;
      plain += `[${it.text.toUpperCase()}]\n`;
    } else {
      let l=it.text;
      if(opts.numbers){ lineCounter++; l=`${lineCounter}. ${l}`; }
      if(opts.syll){
        const sc=countSyllables(l);
        html += `<div>${escapeHtml(l)} <span class="lf-tag">${sc}</span></div>`;
        plain += `${l}  ·${sc}\n`;
      } else {
        html += `<div>${escapeHtml(l)}</div>`;
        plain += l+'\n';
      }
    }
  }
  $('#output').innerHTML=html || '<div style="opacity:.5">(empty)</div>';
}

function escapeHtml(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

const OPT_DEFS=[
  {id:'optTrim', key:'trim', def:true},
  {id:'optCaps', key:'caps', def:true},
  {id:'optTag',  key:'tag',  def:true},
  {id:'optSyll', key:'syll', def:false},
  {id:'optStrip',key:'strip',def:false},
  {id:'optNumbers',key:'numbers',def:false},
];

function readOpts(){
  const o={};
  OPT_DEFS.forEach(d=>{ o[d.key] = $('#'+d.id).checked; });
  return o;
}

function buildOptions(){
  const lang=GZI18n.getLang();
  $('#options').innerHTML = OPT_DEFS.map(d=>`
    <label><input type="checkbox" id="${d.id}" ${d.def?'checked':''}> ${t(d.id)}</label>
  `).join('');
  OPT_DEFS.forEach(d=>{
    $('#'+d.id).onchange=formatLyrics;
  });
}

function updateStats(plain, extra){
  const txt = typeof plain==='string' ? plain : $('#input').value;
  const lines=txt.split('\n').filter(l=>l.trim()).length;
  const words=(txt.match(/\S+/g)||[]).length;
  const chars=txt.length;
  const syll=(txt.split('\n').reduce((a,l)=>a+countSyllables(l),0));
  $('#stats').innerHTML=`
    <div class="lf-stat"><div class="num">${extra?.lines ?? lines}</div><div class="lbl">${t('statLines')}</div></div>
    <div class="lf-stat"><div class="num">${extra?.words ?? words}</div><div class="lbl">${t('statWords')}</div></div>
    <div class="lf-stat"><div class="num">${extra?.syll ?? syll}</div><div class="lbl">${t('statSyll')}</div></div>
    <div class="lf-stat"><div class="num">${extra?.sections ?? 0}</div><div class="lbl">${t('statSections')}</div></div>
    <div class="lf-stat"><div class="num">${extra?.chars ?? chars}</div><div class="lbl">${t('statChars')}</div></div>
  `;
}

function exportMarkdown(){
  const txt=$('#output').innerText;
  if(!txt.trim()) return;
  // Convert our [SECTION] markers to Markdown headings if present
  const md=txt.split('\n').map(l=>{
    const m=l.match(/^\[(.+)\]$/);
    return m? `### ${m[1]}` : l;
  }).join('\n');
  const blob=new Blob([md],{type:'text/markdown'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='lyrics.md';
  a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href), 5000);
}

function loadExample(){
  const ex = `VERSE 1
   Walking down an empty street
the rain is falling  on my feet
      I can't remember where to go

CHORUS
        cause you are the rhythm of my heart
You are the light when it gets dark
   Take me back to the very start

Verse 2
every moment feels the same
playing this lonely guessing game`;
  $('#input').value=ex;
  formatLyrics();
}

function doClear(){ $('#input').value=''; $('#output').innerHTML=''; updateStats(''); }

$('#input').placeholder=t('placeholder');

$('#toolbar').innerHTML=`
  <button class="gz-btn" onclick="formatLyrics()">${t('format')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn" onclick="copyText($('#output').innerText)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="exportMarkdown()">${t('markdown')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>
`;

document.querySelector('label#lbl-in').textContent = t('lblIn');
document.querySelector('label#lbl-out').textContent = t('lblOut');

$('#input').addEventListener('input', formatLyrics);
buildOptions();
formatLyrics();
