  zh: {

    toolDesc: '将文本换行为固定字符宽度。可选择断开长单词或保留单词完整，设置自定义宽度（72、80、120…），即时获得整洁的硬换行结果。免费且私密。',
    inputLabel: '输入文本',
    outputLabel: '换行结果',
    width: '宽度（字符）',
    mode: '模式',
    breakWords: '断开长单词',
    preserveWords: '保留单词',
    preserveParagraphs: '保留段落',
    example: '示例',
    copy: '复制',
    clear: '清空',
    result: (n, l) => `✓ 已换行为 ${n} 字符，共 ${l} 行`,
    step1: '在输入区粘贴文本',
    step2: '设置换行宽度（字符数）',
    step3: '选择断开长单词或保留单词完整',
    step4: '点击「复制」将换行结果复制到剪贴板',
  }
});

let wrapWidth = 80;
let breakWords = false;
let keepParagraphs = true;
const { $, copyText, t } = GZ;

function wrapLine(line, width, breakW) {
  if (line.length <= width) return [line];
  const result = [];
  let pos = 0;
  while (pos < line.length) {
    if (line.length - pos <= width) {
      result.push(line.substring(pos));
      break;
    }
    let chunk = line.substring(pos, pos + width);
    if (breakW) {
      result.push(chunk);
      pos += width;
    } else {
      // find last space in chunk
      let breakAt = chunk.lastIndexOf(' ');
      if (breakAt <= 0) {
        // no space found, look ahead for next space
        let nextSpace = line.indexOf(' ', pos + width);
        if (nextSpace === -1) {
          result.push(line.substring(pos));
          break;
        }
        result.push(line.substring(pos, nextSpace));
        pos = nextSpace + 1;
      } else {
        result.push(line.substring(pos, pos + breakAt));
        pos += breakAt + 1; // skip the space
      }
    }
  }
  return result;
}

function doWrap() {
  const raw = $('#input').value;
  if (!raw) { $('#output').textContent = ''; $('#status').innerHTML = ''; return; }
  const w = Math.max(1, wrapWidth);
  let paragraphs;
  if (keepParagraphs) {
    paragraphs = raw.split(/\n\s*\n/);
  } else {
    paragraphs = [raw.replace(/\n\s*\n/g, '\n')];
  }
  const outParas = paragraphs.map(para => {
    // normalize internal single newlines to spaces within a paragraph
    const flat = para.replace(/\r?\n/g, ' ').replace(/\s+/g, ' ').trim();
    if (!flat) return '';
    return wrapLine(flat, w, breakWords).join('\n');
  });
  const result = outParas.join('\n\n');
  const lineCount = result.split('\n').length;
  $('#output').textContent = result;
  $('#status').innerHTML = `<span style="color:var(--gz-success)">${t('result', w, lineCount)}</span>`;
}

function loadExample() {
  $('#input').value = 'The quick brown fox jumps over the lazy dog. This pangram contains every letter of the English alphabet and is commonly used to display font samples and test keyboards. It has been used since at least the late 19th century.';
  doWrap();
}

function doClear() { $('#input').value = ''; $('#output').textContent = ''; $('#status').innerHTML = ''; }

$('#input').addEventListener('input', doWrap);

$('#controls').innerHTML = `
  <label>${t('width')}: <input type="number" id="widthInput" value="80" min="1" max="500" oninput="wrapWidth=Math.max(1,+this.value||80);doWrap()"></label>
  <label>${t('mode')}:
    <select id="modeSel" onchange="breakWords=this.value==='break';doWrap()">
      <option value="preserve">${t('preserveWords')}</option>
      <option value="break">${t('breakWords')}</option>
    </select>
  </label>
  <label><input type="checkbox" id="paraChk" checked onchange="keepParagraphs=this.checked;doWrap()"> ${t('preserveParagraphs')}</label>`;

$('#toolbar').innerHTML = `
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

$('#lbl-in').textContent = t('inputLabel');
$('#lbl-out').textContent = t('outputLabel');
