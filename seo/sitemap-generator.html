<script>
GZI18n.register({
  en: {
    toolTitle: 'XML Sitemap Generator',
    toolDesc: 'Create valid XML sitemaps for your website. Add URLs, set priorities and change frequencies. Download sitemap.xml instantly.',
    addUrl: 'Add URL',
    generate: 'Generate',
    download: 'Download',
    priority: 'Priority',
    changefreq: 'Changefreq',
    url: 'URL',
    step1: 'Add your website URLs using the input fields',
    step2: 'Set priority (0.0–1.0) and change frequency for each URL',
    step3: 'Click Generate to create the XML sitemap',
    step4: 'Download the sitemap.xml and upload it to your website root',
  },
  zh: {
    toolTitle: 'XML 站点地图生成器',
    toolDesc: '为你的网站创建标准的 XML 站点地图。添加 URL、设置优先级和更新频率，一键下载 sitemap.xml。',
    addUrl: '添加 URL',
    generate: '生成',
    download: '下载',
    priority: '优先级',
    changefreq: '更新频率',
    url: 'URL',
    step1: '使用输入框添加网站 URL',
    step2: '为每个 URL 设置优先级（0.0–1.0）和更新频率',
    step3: '点击「生成」创建 XML 站点地图',
    step4: '下载 sitemap.xml 并上传到网站根目录',
  }
});

const { $, copyText, t } = GZ;
let urlCount = 0;

function addUrlRow(url, priority, changefreq) {
  url = url || '';
  priority = priority || '0.8';
  changefreq = changefreq || 'weekly';
  const id = urlCount++;
  const container = $('#url-rows');
  const row = document.createElement('div');
  row.className = 'gz-url-row';
  row.id = 'row-' + id;
  row.innerHTML = `
    <input type="url" placeholder="https://example.com/page" value="${url}" class="url-input">
    <select class="priority-input">
      <option value="1.0" ${priority==='1.0'?'selected':''}>1.0</option>
      <option value="0.9" ${priority==='0.9'?'selected':''}>0.9</option>
      <option value="0.8" ${priority==='0.8'?'selected':''}>0.8</option>
      <option value="0.7" ${priority==='0.7'?'selected':''}>0.7</option>
      <option value="0.6" ${priority==='0.6'?'selected':''}>0.6</option>
      <option value="0.5" ${priority==='0.5'?'selected':''}>0.5</option>
      <option value="0.4" ${priority==='0.4'?'selected':''}>0.4</option>
      <option value="0.3" ${priority==='0.3'?'selected':''}>0.3</option>
      <option value="0.2" ${priority==='0.2'?'selected':''}>0.2</option>
      <option value="0.1" ${priority==='0.1'?'selected':''}>0.1</option>
    </select>
    <select class="freq-input">
      <option value="always" ${changefreq==='always'?'selected':''}>always</option>
      <option value="hourly" ${changefreq==='hourly'?'selected':''}>hourly</option>
      <option value="daily" ${changefreq==='daily'?'selected':''}>daily</option>
      <option value="weekly" ${changefreq==='weekly'?'selected':''}>weekly</option>
      <option value="monthly" ${changefreq==='monthly'?'selected':''}>monthly</option>
      <option value="yearly" ${changefreq==='yearly'?'selected':''}>yearly</option>
      <option value="never" ${changefreq==='never'?'selected':''}>never</option>
    </select>
    <button onclick="document.getElementById('row-${id}').remove()" title="Remove">✕</button>
  `;
  container.appendChild(row);
}

function generateSitemap() {
  const rows = document.querySelectorAll('.gz-url-row');
  const today = new Date().toISOString().split('T')[0];
  let xml = '<?xml version="1.0" encoding="UTF-8"?>\n';
  xml += '<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">\n';
  rows.forEach(function(row) {
    const url = row.querySelector('.url-input').value.trim();
    if (!url) return;
    const priority = row.querySelector('.priority-input').value;
    const freq = row.querySelector('.freq-input').value;
    xml += '  <url>\n';
    xml += '    <loc>' + escapeXml(url) + '</loc>\n';
    xml += '    <lastmod>' + today + '</lastmod>\n';
    xml += '    <changefreq>' + freq + '</changefreq>\n';
    xml += '    <priority>' + priority + '</priority>\n';
    xml += '  </url>\n';
  });
  xml += '</urlset>';
  $('#output').textContent = xml;
}

function escapeXml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&apos;');
}

function downloadSitemap() {
  const xml = $('#output').textContent;
  if (!xml) { generateSitemap(); }
  const content = $('#output').textContent;
  if (!content) return;
  const blob = new Blob([content], {type: 'application/xml'});
  const link = document.createElement('a');
  link.download = 'sitemap.xml';
  link.href = URL.createObjectURL(blob);
  link.click();
  URL.revokeObjectURL(link.href);
}

// Initialize with 3 empty rows
addUrlRow('', '1.0', 'daily');
addUrlRow('', '0.8', 'weekly');
addUrlRow('', '0.6', 'monthly');

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="generateSitemap()">⚙️ ${t('generate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="addUrlRow()">➕ ${t('addUrl')}</button>
  <button class="gz-btn" onclick="downloadSitemap()">📥 ${t('download')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="copyText($('#output').textContent)">${t('copy')}</button>`;

</script>
