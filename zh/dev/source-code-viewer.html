<script>
GZI18n.register({
  en:{toolTitle:'Source Code Viewer',toolDesc:'Paste source code or open a local file to view it with line numbers, language detection and code statistics. Nothing is uploaded.',wrapLines:'Wrap long lines',trimEmpty:'Trim empty edge lines',openFile:'Open local file:',render:'View Code',example:'Example',copy:'Copy Code',download:'Download .txt',clear:'Clear',lines:'Lines',chars:'Characters',bytes:'Bytes',language:'Detected',step1:'Paste code into the editor or choose a local text/source file',step2:'Click View Code, or edit the code to update the viewer automatically',step3:'Review line numbers, detected language and basic statistics',step4:'Copy or download the code when needed'},
  zh:{toolTitle:'源代码查看器',toolDesc:'粘贴源代码或打开本地文件，带行号、语言检测和代码统计查看。所有内容都在浏览器本地处理，不上传。',wrapLines:'长行自动换行',trimEmpty:'裁剪首尾空行',openFile:'打开本地文件：',render:'查看代码',example:'示例',copy:'复制代码',download:'下载 .txt',clear:'清空',lines:'行数',chars:'字符数',bytes:'字节',language:'检测类型',step1:'将代码粘贴到编辑器，或选择本地文本/源码文件',step2:'点击“查看代码”，编辑内容也会自动更新预览',step3:'查看行号、检测到的语言和基础统计信息',step4:'需要时复制或下载代码'}
});
const {$,copyText,t}=GZ;
const sample='<!doctype html>\n<html>\n<head>\n  <title>Demo</title>\n  <style>body{font-family:sans-serif;background:#f8fafc}</style>\n</head>\n<body>\n  <h1>Hello GameZipper</h1>\n  <p class="lead">Paste any source code here.</p>\n</body>\n</html>';
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function detect(code){const c=code.trim();if(!c)return '—';if(/^<\?xml|<\w+[\s>]/i.test(c))return 'HTML / XML';if(/^\s*[\[{]/.test(c)){try{JSON.parse(c);return 'JSON';}catch(e){}}if(/\b(function|const|let|var|=>|import|export)\b/.test(c))return 'JavaScript';if(/\b(def|class|import|from|print\()\b/.test(c))return 'Python';if(/[.#][\w-]+\s*\{|@media\b/.test(c))return 'CSS';return 'Text';}
function current(){let v=$('#input').value;if($('#trimEmpty').checked)v=v.replace(/^\s*\n/,'').replace(/\n\s*$/,'');return v;}
function render(){const code=current();const lines=code.length?code.split('\n'):[''];$('#viewer').style.whiteSpace=$('#wrap').checked?'pre-wrap':'pre';$('#viewer').innerHTML=lines.map((line,i)=>`<div class="sv-line"><span class="sv-ln">${i+1}</span><code class="sv-code">${esc(line)||' '}</code></div>`).join('');const bytes=new Blob([code]).size;$('#stats').innerHTML=`<div class="sv-stat"><strong>${code?lines.length:0}</strong>${t('lines')}</div><div class="sv-stat"><strong>${code.length}</strong>${t('chars')}</div><div class="sv-stat"><strong>${bytes}</strong>${t('bytes')}</div><div class="sv-stat"><strong>${detect(code)}</strong>${t('language')}</div>`;}
function loadExample(){ $('#input').value=sample; render(); }
function clearAll(){ $('#input').value=''; render(); }
function download(){const blob=new Blob([current()],{type:'text/plain'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='source-code.txt';a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000);}
$('#toolbar').innerHTML=`<button class="gz-btn" onclick="render()">${t('render')}</button><button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button><button class="gz-btn" onclick="copyText(current())">${t('copy')}</button><button class="gz-btn gz-btn-secondary" onclick="download()">${t('download')}</button><button class="gz-btn gz-btn-secondary" onclick="clearAll()">${t('clear')}</button>`;
$('#input').addEventListener('input',render);$('#wrap').addEventListener('change',render);$('#trimEmpty').addEventListener('change',render);$('#file').addEventListener('change',e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{$('#input').value=String(r.result||'');render();};r.readAsText(f);});
GZ.renderToolPage({category:'dev',titleKey:'toolTitle',descKey:'toolDesc',howToSteps:['step1','step2','step3','step4'],related:[{icon:'👁️',href:'/dev/html-viewer.html',name:'HTML Viewer'},{icon:'✅',href:'/dev/html-validator.html',name:'HTML Validator'},{icon:'📄',href:'/dev/html-formatter.html',name:'HTML Formatter'},{icon:'🎯',href:'/dev/regex-extractor.html',name:'Regex Extractor'}]});
loadExample();
</script>
