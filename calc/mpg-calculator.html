<style>

.mpg-form input,.mpg-form select{padding:10px 12px;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:1em}

.mpg-card .value{font-size:2.2rem;font-weight:800;color:var(--accent);line-height:1.1}

<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"How do I calculate MPG?","acceptedAnswer":{"@type":"Answer","text":"MPG (miles per gallon) is calculated by dividing the miles driven by the gallons of fuel used. For example, if you drove 300 miles and used 12 gallons, your MPG is 300 / 12 = 25 mpg."}},{""@type":"Question","name":"What is the difference between US MPG and Imperial MPG?","acceptedAnswer":{"@type":"Answer","text":"US MPG uses the US liquid gallon (3.785 liters), while Imperial MPG uses the Imperial gallon (4.546 liters). The same fuel efficiency gives a higher number in Imperial MPG because the Imperial gallon is larger."}},{""@type":"Question","name":"How do I convert MPG to L/100km?","acceptedAnswer":{"@type":"Answer","text":"To convert US MPG to L/100km, use the formula: L/100km = 235.215 / MPG. For example, 30 US MPG equals about 7.84 L/100km. This tool converts automatically."}},{""@type":"Question","name":"What is a good MPG?","acceptedAnswer":{"@type":"Answer","text":"For gasoline cars, 25-30 US MPG is average, 30+ is good, and 40+ is excellent. Hybrids typically achieve 45-58 MPG, while efficient diesels can reach 35-45 MPG."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="mpg-form">
      <label><span id="lbl-distance"></span>
        <input type="number" id="distance" min="0" step="any" placeholder="350" oninput="calcMPG()">
      </label>
      <label><span id="lbl-fuel"></span>
        <input type="number" id="fuel" min="0" step="any" placeholder="13.5" oninput="calcMPG()">
      </label>
      <label><span id="lbl-unit"></span>
        <select id="unitsel" onchange="calcMPG()">
          <option value="us">US (miles / US gallons)</option>
          <option value="uk">UK (miles / Imperial gallons)</option>
          <option value="metric">Metric (km / liters)</option>
        </select>
      </label>
    </div>
    <div id="result"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'MPG Calculator',
    toolDesc: 'Calculate your car\u2019s miles per gallon (MPG) and fuel efficiency. Convert between US MPG, Imperial MPG and L/100km instantly.',
    distance: 'Distance traveled',
    fuel: 'Fuel used',
    unit: 'Measurement unit',
    calcBtn: 'Calculate',
    clearBtn: 'Clear',
    usMpg: 'US MPG',
    ukMpg: 'Imperial MPG',
    l100km: 'Liters / 100km',
    kmpl: 'km / liter',
    costPerMile: 'Cost per mile',
    enterValues: 'Enter your distance and fuel used to see results.',
    invalidInput: 'Please enter valid numbers greater than zero.',
    step1: 'Enter the distance you traveled (miles or km)',
    step2: 'Enter the amount of fuel used (gallons or liters)',
    step3: 'Select your measurement unit system',
    step4: 'View your MPG and fuel efficiency in all units',
    pricePerGal: 'Fuel price (optional, per gallon)',
  },
  zh: {
    toolTitle: 'MPG \u8ba1\u7b97\u5668',
    toolDesc: '\u8ba1\u7b97\u6c7d\u8f66\u7684\u6bcf\u52a0\u4ed1\u82f1\u91cc\u6570\uff08MPG\uff09\u548c\u71c3\u6cb9\u6548\u7387\u3002\u5728\u7f8e\u5236 MPG\u3001\u82f1\u5236 MPG \u548c L/100km \u4e4b\u95f4\u5373\u65f6\u8f6c\u6362\u3002',
    distance: '\u884c\u9a76\u8ddd\u79bb',
    fuel: '\u71c3\u6cb9\u6d88\u8017',
    unit: '\u8ba1\u91cf\u5355\u4f4d',
    calcBtn: '\u8ba1\u7b97',
    clearBtn: '\u6e05\u9664',
    usMpg: '\u7f8e\u5236 MPG',
    ukMpg: '\u82f1\u5236 MPG',
    l100km: '\u5347 / 100\u516c\u91cc',
    kmpl: '\u516c\u91cc / \u5347',
    costPerMile: '\u6bcf\u82f1\u91cc\u6210\u672c',
    enterValues: '\u8f93\u5165\u884c\u9a76\u8ddd\u79bb\u548c\u71c3\u6cb9\u6d88\u8017\u5373\u53ef\u67e5\u770b\u7ed3\u679c\u3002',
    invalidInput: '\u8bf7\u8f93\u5165\u5927\u4e8e\u96f6\u7684\u6709\u6548\u6570\u5b57\u3002',
    step1: '\u8f93\u5165\u884c\u9a76\u7684\u8ddd\u79bb\uff08\u82f1\u91cc\u6216\u516c\u91cc\uff09',
    step2: '\u8f93\u5165\u6d88\u8017\u7684\u71c3\u6cb9\uff08\u52a0\u4ed1\u6216\u5347\uff09',
    step3: '\u9009\u62e9\u8ba1\u91cf\u5355\u4f4d\u7cfb\u7edf',
    step4: '\u67e5\u770b\u5404\u79cd\u5355\u4f4d\u4e0b\u7684 MPG \u548c\u71c3\u6cb9\u6548\u7387',
    pricePerGal: '\u6cb9\u4ef7\uff08\u53ef\u9009\uff0c\u6bcf\u52a0\u4ed1\uff09',
  }
});
const { $, t } = GZ;

function calcMPG() {
  const dist = parseFloat($('#distance').value);
  const fuel = parseFloat($('#fuel').value);
  if (!dist || !fuel || dist <= 0 || fuel <= 0) {
    $('#result').innerHTML = `<p style="text-align:center;color:var(--text2);padding:20px">${t('enterValues')}</p>`;
    return;
  }
  const unit = $('#unitsel').value;
  let miles, usGallons;
  if (unit === 'us') { miles = dist; usGallons = fuel; }
  else if (unit === 'uk') { miles = dist; usGallons = fuel * 1.20095; }
  else { miles = dist / 1.609344; usGallons = fuel / 3.785412; }
  const usMpg = miles / usGallons;
  const ukMpg = usMpg * 1.20095;
  const l100km = 235.215 / usMpg;
  const kmpl = 100 / l100km;
  $('#result').innerHTML = `
    <div class="mpg-result">
      <div class="mpg-card primary"><div class="value">${usMpg.toFixed(1)}</div><div class="unit">${t('usMpg')}</div></div>
      <div class="mpg-card"><div class="value">${ukMpg.toFixed(1)}</div><div class="unit">${t('ukMpg')}</div></div>
      <div class="mpg-card"><div class="value">${l100km.toFixed(1)}</div><div class="unit">${t('l100km')}</div></div>
      <div class="mpg-card"><div class="value">${kmpl.toFixed(1)}</div><div class="unit">${t('kmpl')}</div></div>
    </div>`;
}

function doClear() {
  $('#distance').value = ''; $('#fuel').value = '';
  $('#result').innerHTML = `<p style="text-align:center;color:var(--text2);padding:20px">${t('enterValues')}</p>`;
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="calcMPG()">${t('calcBtn')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clearBtn')}</button>`;

$('#result').innerHTML = `<p style="text-align:center;color:var(--text2);padding:20px">${t('enterValues')}</p>`;

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'\u26fd', href:'/calc/fuel-cost-calculator.html', name:'Fuel Cost'},
    {icon:'\ud83d\udcb0', href:'/calc/tip-calculator.html', name:'Tip Calculator'},
    {icon:'\ud83d\ude98', href:'/calc/toll-calculator.html', name:'Toll Calculator'},
    {icon:'\ud83c\udf0d', href:'/calc/carbon-footprint.html', name:'Carbon Footprint'},
  ]
});
</script>
<script src="/tools-result-rec.js?v=20260707v520" defer></script>
</body>
