// Rule-based IPA conversion for words not in dictionary
function wordToIPA(word) {
  const lower = word.toLowerCase().replace(/[^a-z]/g, '');
  if (!lower) return '';
  if (IPA_DICT[lower]) return IPA_DICT[lower];

  let ipa = lower;

  // Apply common English pronunciation rules (approximate)
  // Silent e at end
  if (ipa.length > 2 && ipa.endsWith('e') && !ipa.endsWith('le') && !ipa.endsWith('ve')) {
    const before = ipa[ipa.length - 2];
    if ('aeiou'.includes(before)) {
      // double vowel + e, keep
    } else {
      ipa = ipa.slice(0, -1); // drop silent e
    }
  }

  // Consonant clusters
  ipa = ipa.replace(/th/g, 'θ');
  ipa = ipa.replace(/sh/g, 'ʃ');
  ipa = ipa.replace(/ch/g, 'tʃ');
  ipa = ipa.replace(/ph/g, 'f');
  ipa = ipa.replace(/wh/g, 'w');
  ipa = ipa.replace(/ng/g, 'ŋ');
  ipa = ipa.replace(/ck/g, 'k');
  ipa = ipa.replace(/gh/g, 'ɡ');

  // Vowel patterns
  ipa = ipa.replace(/ee/gi, 'iː');
  ipa = ipa.replace(/oo/gi, 'uː');
  ipa = ipa.replace(/ea/gi, 'iː');
  ipa = ipa.replace(/ou/gi, 'aʊ');
  ipa = ipa.replace(/oi/gi, 'ɔɪ');
  ipa = ipa.replace(/ai/gi, 'eɪ');
  ipa = ipa.replace(/ay/gi, 'eɪ');
  ipa = ipa.replace(/igh/gi, 'aɪ');
  ipa = ipa.replace(/ie/gi, 'iː');
  ipa = ipa.replace(/ow/gi, 'aʊ');
  ipa = ipa.replace(/aw/gi, 'ɔː');
  ipa = ipa.replace(/au/gi, 'ɔː');

  // Single vowels (rough approximation)
  ipa = ipa.replace(/a(?!ː)/g, 'æ');
  ipa = ipa.replace(/e(?!ː)(?!ɪ)/g, 'ɛ');
  ipa = ipa.replace(/i(?!ː)(?!ɪ)/g, 'ɪ');
  ipa = ipa.replace(/o(?!ː)(?!ʊ)/g, 'ɒ');
  ipa = ipa.replace(/u(?!ː)/g, 'ʌ');

  // Consonants
  ipa = ipa.replace(/c(?![eiy])/g, 'k');
  ipa = ipa.replace(/c[eiy]/g, 's');
  ipa = ipa.replace(/g(?!ː)/g, 'ɡ');
  ipa = ipa.replace(/y/g, 'j');
  ipa = ipa.replace(/j/g, 'dʒ');
  ipa = ipa.replace(/x/g, 'ks');
  ipa = ipa.replace(/q/g, 'k');
  ipa = ipa.replace(/w/g, 'w');
  ipa = ipa.replace(/r/g, 'r');
  ipa = ipa.replace(/z/g, 'z');

  return '/' + ipa + '/';
}

function convertText() {
  const text = $('#input').value.trim();
  if (!text) {
    $('#output').innerHTML = '<em style="color:var(--text2)">Enter English text above to see IPA transcription.</em>';
    return;
  }

  const tokens = text.split(/(\s+|[.,!?;:'"()\[\]{}])/);
  let html = '<div class="pr-result">';

  for (const tok of tokens) {
    if (!tok.trim()) continue;
    if (/^[.,!?;:'"()\[\]{}]$/.test(tok)) {
      html += tok + ' ';
      continue;
    }
    const clean = tok.replace(/[^a-zA-Z'-]/g, '');
    if (!clean) { html += tok + ' '; continue; }

    const ipa = wordToIPA(clean);
    const isDict = !!IPA_DICT[clean.toLowerCase()];

    html += `<span class="pr-word">
      <span class="pr-ortho">${tok} <span onclick="speak('${clean.replace(/'/g,"\\'")}')" style="cursor:pointer;opacity:.5" title="Listen">🔊</span></span>
      <span class="pr-ipa">${ipa}${isDict ? '' : ' <small style="opacity:.4">(approx)</small>'}</span>
    </span>`;
  }
  html += '</div>';

  // Full IPA line
  const fullIPA = tokens.filter(t => t.trim()).map(t => {
    const clean = t.replace(/[^a-zA-Z'-]/g, '');
    if (!clean || /^[.,!?;:'"()\[\]{}]$/.test(t.trim())) return t;
    return wordToIPA(clean).replace(/\//g, '');
  }).join(' ');

  html += `<div style="margin-top:12px;padding:12px;background:var(--glass);border-radius:10px;border:1px solid var(--border)">
    <strong style="font-size:.85rem">Full IPA:</strong>
    <div style="font-size:1rem;margin-top:4px;color:var(--accent);font-family:'DejaVu Sans','Gentium Plus',sans-serif;line-height:1.8">/${fullIPA}/</div>
    <div style="margin-top:8px;display:flex;gap:6px;flex-wrap:wrap">
      <button class="gz-btn gz-btn-sm" onclick="speak($('#input').value)">🔊 ${t('listen') || 'Listen'}</button>
      <button class="gz-btn gz-btn-secondary gz-btn-sm" onclick="copyText('/${fullIPA}/')">${t('copy')}</button>
    </div>
  </div>`;

  // IPA reference table
  html += `<div style="margin-top:16px"><h3 style="font-size:.9rem;margin-bottom:8px">${t('ipaChart')}</h3>
  <table class="pr-table">
    <tr><th>Symbol</th><th>Example</th><th>Sound</th></tr>
    <tr><td class="pr-phoneme">/æ/</td><td>cat, hat</td><td class="pr-example">short a as in "cat"</td></tr>
    <tr><td class="pr-phoneme">/eɪ/</td><td>day, say</td><td class="pr-example">long a as in "day"</td></tr>
    <tr><td class="pr-phoneme">/ɪ/</td><td>sit, bit</td><td class="pr-example">short i as in "sit"</td></tr>
    <tr><td class="pr-phoneme">/iː/</td><td>see, me</td><td class="pr-example">long e as in "see"</td></tr>
    <tr><td class="pr-phoneme">/ɒ/</td><td>hot, dog</td><td class="pr-example">short o as in "hot"</td></tr>
    <tr><td class="pr-phoneme">/oʊ/</td><td>go, know</td><td class="pr-example">long o as in "go"</td></tr>
    <tr><td class="pr-phoneme">/ʌ/</td><td>cup, run</td><td class="pr-example">short u as in "cup"</td></tr>
    <tr><td class="pr-phoneme">/uː/</td><td>food, blue</td><td class="pr-example">long u as in "food"</td></tr>
    <tr><td class="pr-phoneme">/aɪ/</td><td>my, time</td><td class="pr-example">long i as in "my"</td></tr>
    <tr><td class="pr-phoneme">/aʊ/</td><td>how, now</td><td class="pr-example">ow as in "how"</td></tr>
    <tr><td class="pr-phoneme">/ɔɪ/</td><td>boy, oil</td><td class="pr-example">oy as in "boy"</td></tr>
    <tr><td class="pr-phoneme">/θ/</td><td>think, three</td><td class="pr-example">th as in "think"</td></tr>
    <tr><td class="pr-phoneme">/ð/</td><td>the, this</td><td class="pr-example">th as in "the"</td></tr>
    <tr><td class="pr-phoneme">/ʃ/</td><td>she, fish</td><td class="pr-example">sh as in "she"</td></tr>
    <tr><td class="pr-phoneme">/tʃ/</td><td>church, each</td><td class="pr-example">ch as in "church"</td></tr>
    <tr><td class="pr-phoneme">/ŋ/</td><td>sing, ring</td><td class="pr-example">ng as in "sing"</td></tr>
    <tr><td class="pr-phoneme">/dʒ/</td><td>judge, age</td><td class="pr-example">j/ge as in "judge"</td></tr>
  </table></div>`;

  $('#output').innerHTML = html;
}

function speak(text) {
  if ('speechSynthesis' in window) {
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'en-US';
    u.rate = 0.85;
    speechSynthesis.cancel();
    speechSynthesis.speak(u);
  }
}

function loadExample() {
  $('#input').value = "The quick brown fox jumps over the lazy dog. English pronunciation can be tricky because the spelling does not always match the sound.";
  convertText();
}

function doClear() { $('#input').value = ''; $('#output').innerHTML = ''; }

$('#input').addEventListener('input', () => {
  clearTimeout(window._prTimer);
  window._prTimer = setTimeout(convertText, 300);
});

  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
