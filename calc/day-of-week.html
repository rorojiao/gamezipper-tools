<script>
GZI18n.register({
  en: {
    toolTitle: 'Day of Week Calculator',
    toolDesc: 'Find what day of the week any date was or will be — past, future or today. Includes day of year, ISO week number and days from today.',
    pickDate: 'Pick a date',
    dayOfYear: 'Day of year',
    weekNumber: 'ISO week',
    quarter: 'Quarter',
    daysFromToday: 'Days from today',
    ago: 'days ago',
    inFuture: 'days from now',
    today: 'Today',
    isLeap: 'Leap year',
    notLeap: 'Not a leap year',
    weekdayFull: ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'],
    monthsFull: ['January','February','March','April','May','June','July','August','September','October','November','December'],
    errDate: 'Please pick a valid date',
    step1: 'Use the date picker to choose any past, present or future date',
    step2: 'The tool instantly shows the weekday name and a stats panel',
    step3: 'See day of year, ISO week number, quarter and leap-year status',
    step4: 'Read how many days ago or how many days until that date',
  },
  zh: {
    toolTitle: '星期几计算器',
    toolDesc: '查询任意日期是星期几 — 过去、未来或今天。包含当年第几天、ISO 周数和距今天的天数。',
    pickDate: '选择日期',
    dayOfYear: '当年第几天',
    weekNumber: 'ISO 周',
    quarter: '季度',
    daysFromToday: '距今天',
    ago: '天前',
    inFuture: '天后',
    today: '今天',
    isLeap: '闰年',
    notLeap: '非闰年',
    weekdayFull: ['星期日','星期一','星期二','星期三','星期四','星期五','星期六'],
    monthsFull: ['1 月','2 月','3 月','4 月','5 月','6 月','7 月','8 月','9 月','10 月','11 月','12 月'],
    errDate: '请选择有效日期',
    step1: '使用日期选择器选择任意过去、现在或未来的日期',
    step2: '工具即时显示星期几和统计面板',
    step3: '查看当年第几天、ISO 周数、季度和闰年状态',
    step4: '查看距今多少天前或多少天后',
  }
});

const { $, t } = GZ;

function isLeap(y) {
  return (y % 4 === 0 && y % 100 !== 0) || y % 400 === 0;
}

function dayOfYear(date) {
  const start = new Date(date.getFullYear(), 0, 0);
  const diff = date - start;
  return Math.floor(diff / 86400000);
}

function isoWeek(date) {
  const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
  const dayNum = d.getUTCDay() || 7;
  d.setUTCDate(d.getUTCDate() + 4 - dayNum);
  const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
  return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
}

function startOfDay(d) {
  return new Date(d.getFullYear(), d.getMonth(), d.getDate());
}

function fmtDate(date) {
  const wd = t('weekdayFull')[date.getDay()];
  const mo = t('monthsFull')[date.getMonth()];
  return `${wd}, ${mo} ${date.getDate()}, ${date.getFullYear()}`;
}

function render() {
  const raw = $('#date').value;
  if (!raw) { $('#output').innerHTML = ''; return; }
  const parts = raw.split('-');
  if (parts.length !== 3) { $('#output').innerHTML = `<span style="color:var(--gz-accent)">${t('errDate')}</span>`; return; }
  const date = new Date(+parts[0], +parts[1] - 1, +parts[2]);
  if (isNaN(date.getTime())) { $('#output').innerHTML = `<span style="color:var(--gz-accent)">${t('errDate')}</span>`; return; }

  const wd = t('weekdayFull')[date.getDay()];
  const doy = dayOfYear(date);
  const iso = isoWeek(date);
  const quarter = Math.floor(date.getMonth() / 3) + 1;
  const leap = isLeap(date.getFullYear());

  const today = startOfDay(new Date());
  const diffDays = Math.round((startOfDay(date) - today) / 86400000);
  let diffText;
  if (diffDays === 0) diffText = t('today');
  else if (diffDays < 0) diffText = `${Math.abs(diffDays)} ${t('ago')}`;
  else diffText = `${diffDays} ${t('inFuture')}`;

  $('#output').innerHTML = `
    <div class="result-card">
      <div class="weekday">${wd}</div>
      <div class="date-pretty">${fmtDate(date)}</div>
    </div>
    <div class="stat-grid">
      <div class="stat-cell"><div class="num">${doy}</div><div class="lbl">${t('dayOfYear')} / ${leap ? 366 : 365}</div></div>
      <div class="stat-cell"><div class="num">${iso}</div><div class="lbl">${t('weekNumber')}</div></div>
      <div class="stat-cell"><div class="num">Q${quarter}</div><div class="lbl">${t('quarter')}</div></div>
      <div class="stat-cell"><div class="num">${diffDays === 0 ? '0' : Math.abs(diffDays)}</div><div class="lbl">${t('daysFromToday')} (${diffText})</div></div>
      <div class="stat-cell"><div class="num" style="font-size:1.1em">${leap ? t('isLeap') : t('notLeap')}</div><div class="lbl">${date.getFullYear()}</div></div>
    </div>`;
}

function loadToday() {
  const now = new Date();
  $('#date').value = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
  render();
}

function loadRandom() {
  const year = 1900 + Math.floor(Math.random() * 200);
  const month = 1 + Math.floor(Math.random() * 12);
  const dim = new Date(year, month, 0).getDate();
  const day = 1 + Math.floor(Math.random() * dim);
  $('#date').value = `${year}-${String(month).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
  render();
}

$('#input-row').innerHTML = `
  <label><b>${t('pickDate')}:</b></label>
  <input id="date" type="date" min="0001-01-01" max="9999-12-31">
  <button class="gz-btn gz-btn-secondary" onclick="loadRandom()">🎲 Random</button>`;

$('#date').addEventListener('input', render);

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="render()">${t('pickDate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadToday()">Today</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadRandom()">Random</button>`;

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📅', href:'/calc/date-calculator.html', name:'Date Calculator'},
    {icon:'🎂', href:'/calc/age-calculator.html', name:'Age Calculator'},
    {icon:'⏰', href:'/dev/timestamp.html', name:'Timestamp'},
    {icon:'📆', href:'/calc/calendar-generator.html', name:'Calendar Generator'},
  ]
});

loadToday();
</script>
