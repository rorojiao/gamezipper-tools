<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"How much house can I afford?","acceptedAnswer":{"@type":"Answer","text":"A common rule is the 28/36 rule: your housing payment should be at most 28% of your gross monthly income, and your total monthly debt payments (including the mortgage) should be at most 36%. This calculator applies those ratios to your income, debts, down payment and interest rate to estimate the maximum home price you can afford."}},{"@type":"Question","name":"What is the 28/36 rule?","acceptedAnswer":{"@type":"Answer","text":"The 28/36 rule is a guideline used by lenders. The 28 means your front-end ratio (mortgage principal, interest, taxes and insurance) should not exceed 28% of your gross monthly income. The 36 means your back-end ratio (all monthly debt, including the mortgage, credit cards, auto and student loans) should not exceed 36% of gross monthly income."}},{"@type":"Question","name":"Does this calculator include property taxes and insurance?","acceptedAnswer":{"@type":"Answer","text":"Yes. The calculator estimates annual property taxes (default 1.1% of home value) and home insurance (default 0.35% of home value), plus PMI when your down payment is under 20%. These are added to principal and interest to give your full monthly PITI payment."}},{"@type":"Question","name":"Is my financial data private?","acceptedAnswer":{"@type":"Answer","text":"Yes. All calculations run entirely in your browser. Nothing you type is ever sent to a server or stored anywhere."}}]}</script>

<script>
GZI18n.register({
  en: {
    toolTitle: 'Home Affordability Calculator',
    toolDesc: 'How much house can I afford? Estimate your maximum home price with the 28/36 rule, income, down payment, debts and mortgage rate — instant, private and free.',
    annualIncome: 'Gross annual income (before tax)',
    downPayment: 'Down payment',
    monthlyDebt: 'Monthly debt payments (cars, cards, student loans)',
    rate: 'Interest rate (%)',
    term: 'Loan term (years)',
    propertyTax: 'Property tax rate (% / year)',
    insurance: 'Home insurance rate (% / year)',
    advanced: 'Advanced (taxes, insurance, PMI)',
    step1: 'Enter your gross annual household income',
    step2: 'Add your down payment and monthly debt payments',
    step3: 'Set the interest rate and loan term',
    step4: 'Read your maximum affordable home price and PITI breakdown',
    maxHome: 'Max home price',
    maxLoan: 'Maximum loan amount',
    monthlyPITI: 'Monthly payment (PITI)',
    principal: 'Principal & interest',
    tax: 'Property tax / mo',
    ins: 'Home insurance / mo',
    pmi: 'PMI / mo',
    front: 'Front-end ratio (PITI ÷ income)',
    back: 'Back-end ratio (all debt ÷ income)',
    downPct: 'Down payment %',
    ruleGreat: 'Comfortable — under the 28/36 rule',
    ruleTight: 'Tight — at the lender limit',
    ruleOver: 'Stretched — exceeds 28/36',
  },
  zh: {
    toolTitle: '购房预算计算器',
    toolDesc: '我能买得起多大的房子？基于 28/36 法则、收入、首付、债务和房贷利率，即时估算你可负担的最高房价 — 免费私密。',
    annualIncome: '税前年收入',
    downPayment: '首付金额',
    monthlyDebt: '月债务支出（车贷、信用卡、助学贷款等）',
    rate: '房贷利率 (%)',
    term: '贷款年限',
    propertyTax: '房产税率 (% / 年)',
    insurance: '房屋保险费率 (% / 年)',
    advanced: '高级（税费、保险、PMI）',
    step1: '输入家庭税前年收入',
    step2: '填写首付和月度债务支出',
    step3: '设置房贷利率和贷款年限',
    step4: '查看可负担的最高房价和每月还款明细',
    maxHome: '可负担房价上限',
    maxLoan: '最高贷款额',
    monthlyPITI: '月供 (PITI)',
    principal: '本金 + 利息',
    tax: '月房产税',
    ins: '月房屋保险',
    pmi: '月 PMI',
    front: '前端比率 (PITI ÷ 收入)',
    back: '后端比率 (总债务 ÷ 收入)',
    downPct: '首付比例',
    ruleGreat: '轻松 — 在 28/36 法则之内',
    ruleTight: '紧张 — 接近贷款上限',
    ruleOver: '吃力 — 超出 28/36',
  }
});

const { $, t } = GZ;
const money = n => '$' + Math.round(n).toLocaleString();

$('#inputs').innerHTML = `
  <div class="field"><label>${t('annualIncome')}</label><input type="number" id="income" value="90000" min="0" step="1000"></div>
  <div class="field"><label>${t('downPayment')}</label><input type="number" id="down" value="40000" min="0" step="1000"></div>
  <div class="field"><label>${t('monthlyDebt')}</label><input type="number" id="debt" value="400" min="0" step="50"></div>
  <div class="field"><label>${t('rate')}</label><input type="number" id="rate" value="6.8" min="0" step="0.05"></div>
  <div class="field"><label>${t('term')}</label><input type="number" id="term" value="30" min="5" max="40" step="1"></div>
  <div class="field"><label>${t('propertyTax')}</label><input type="number" id="tax" value="1.1" min="0" step="0.05"></div>
  <div class="field"><label>${t('insurance')}</label><input type="number" id="ins" value="0.35" min="0" step="0.05"></div>
`;

document.querySelectorAll('#inputs input').forEach(i => i.addEventListener('input', recalc));

function pmt(P, annualRate, months) {
  if (annualRate === 0) return P / months;
  const r = annualRate / 12;
  return P * r * Math.pow(1 + r, months) / (Math.pow(1 + r, months) - 1);
}

function recalc() {
  const inc = +$('#income').value || 0;
  const down = +$('#down').value || 0;
  const debt = +$('#debt').value || 0;
  const rate = (+$('#rate').value || 0) / 100;
  const term = +$('#term').value || 30;
  const taxR = (+$('#tax').value || 0) / 100;
  const insR = (+$('#ins').value || 0) / 100;
  const months = term * 12;

  const moInc = inc / 12;
  // 28/36 rule
  const maxPITI = Math.max(0, moInc * 0.28);
  const maxAllDebt = Math.max(0, moInc * 0.36);
  const allowedPITI = Math.max(0, maxAllDebt - debt);
  const budgetPITI = Math.min(maxPITI, allowedPITI);

  // Solve for loan where PI + tax + ins + PMI = budgetPITI
  // Estimate home price iteratively
  let home = budgetPITI * 12 * 4; // initial guess
  for (let iter = 0; iter < 60; iter++) {
    const loan = Math.max(0, home - down);
    const ltv = home > 0 ? loan / home : 0;
    const pi = pmt(loan, rate, months);
    const taxMo = home * taxR / 12;
    const insMo = home * insR / 12;
    const pmiMo = ltv >= 0.80 ? 0 : loan * 0.0055 / 12;
    const total = pi + taxMo + insMo + pmiMo;
    const diff = total - budgetPITI;
    if (Math.abs(diff) < 1) break;
    home -= diff * 90; // adjust home price
    if (home < down) { home = down + 1000; break; }
  }
  home = Math.max(home, down + 1000);
  const loan = Math.max(0, home - down);
  const ltv = home > 0 ? loan / home : 0;
  const pi = pmt(loan, rate, months);
  const taxMo = home * taxR / 12;
  const insMo = home * insR / 12;
  const pmiMo = ltv >= 0.80 ? 0 : loan * 0.0055 / 12;
  const piti = pi + taxMo + insMo + pmiMo;
  const front = moInc > 0 ? piti / moInc * 100 : 0;
  const back = moInc > 0 ? (piti + debt) / moInc * 100 : 0;
  const downPct = home > 0 ? down / home * 100 : 0;

  const cls = front <= 28 && back <= 36 ? 'rule-ok' : (front <= 32 && back <= 40 ? 'rule-warn' : 'rule-bad');
  const label = front <= 28 && back <= 36 ? t('ruleGreat') : (front <= 32 && back <= 40 ? t('ruleTight') : t('ruleOver'));

  $('#results').innerHTML = `
    <div class="result-big">${money(home)}</div>
    <div style="margin:6px 0 12px;font-size:.85em;opacity:.8">${t('maxHome')}</div>
    <span class="rule-pill ${cls}">${label}</span>
    <div style="margin-top:14px">
      <div class="result-row"><span>${t('maxLoan')}</span><span class="v">${money(loan)}</span></div>
      <div class="result-row"><span>${t('monthlyPITI')}</span><span class="v">${money(piti)}</span></div>
      <div class="result-row"><span>${t('principal')}</span><span class="v">${money(pi)}</span></div>
      <div class="result-row"><span>${t('tax')}</span><span class="v">${money(taxMo)}</span></div>
      <div class="result-row"><span>${t('ins')}</span><span class="v">${money(insMo)}</span></div>
      ${pmiMo > 0 ? `<div class="result-row"><span>${t('pmi')}</span><span class="v">${money(pmiMo)}</span></div>` : ''}
      <div class="result-row"><span>${t('downPct')}</span><span class="v">${downPct.toFixed(1)}%</span></div>
      <div class="result-row"><span>${t('front')}</span><span class="v">${front.toFixed(1)}%</span></div>
      <div class="result-row"><span>${t('back')}</span><span class="v">${back.toFixed(1)}%</span></div>
    </div>`;
}
recalc();

$('#toolbar').innerHTML = `<button class="gz-btn gz-btn-secondary" onclick="document.querySelectorAll('#inputs input').forEach(i=>i.value='');recalc()">Clear</button>`;

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🏠', href:'/calc/mortgage-calculator.html', name:'Mortgage'},
    {icon:'🔑', href:'/calc/fha-loan-calculator.html', name:'FHA Loan'},
    {icon:'🏘️', href:'/calc/rent-vs-buy.html', name:'Rent vs Buy'},
    {icon:'🏦', href:'/calc/loan-calculator.html', name:'Loan Calculator'},
  ]
});
</script>
