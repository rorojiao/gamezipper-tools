<script>
GZI18n.register({
  en: {
    toolTitle: 'HTML Unescape & Decode Entities',
    toolDesc: 'Unescape HTML entities and decode escaped characters. Convert &lt; &amp; &quot; &#39; &nbsp; back to readable text — supports named, decimal and hex entities.',

    optNamed: 'Named entities',
    optDecimal: 'Decimal (&#nnn;)',
    optHex: 'Hex (&#xHH;)',
    optNbsp: 'Decode &nbsp;',
    step1: 'Paste HTML-escaped text into the input area',
    step2: 'Select which entity types to decode',
    step3: 'Click Unescape to convert entities back',
    step4: 'Copy the decoded readable text',
    done: '✓ Decoded {n} entit(y/ies)',
    noChange: 'No entities found to decode',
  },
  zh: {
    toolTitle: 'HTML 反转义 / 实体解码',
    toolDesc: '反转义 HTML 实体并解码转义字符。将 &lt; &amp; &quot; &#39; &nbsp; 转换回可读文本 — 支持命名、十进制和十六进制实体。',
    unescape: '反转义',
    optNamed: '命名实体',
    optDecimal: '十进制 (&#nnn;)',
    optHex: '十六进制 (&#xHH;)',
    optNbsp: '解码 &nbsp;',
    step1: '在输入区粘贴 HTML 转义文本',
    step2: '选择要解码的实体类型',
    step3: '点击「反转义」将实体转换回字符',
    step4: '复制解码后的可读文本',
    done: '✓ 解码了 {n} 个实体',
    noChange: '未找到需要解码的实体',
  }
});

const { $, copyText, t } = GZ;

const namedEntities = {
  '&lt;': '<', '&gt;': '>', '&amp;': '&', '&quot;': '"', '&apos;': "'",
  '&nbsp;': '\u00A0', '&copy;': '\u00A9', '&reg;': '\u00AE', '&trade;': '\u2122',
  '&hellip;': '\u2026', '&mdash;': '\u2014', '&ndash;': '\u2013',
  '&lsquo;': '\u2018', '&rsquo;': '\u2019', '&ldquo;': '\u201C', '&rdquo;': '\u201D',
  '&deg;': '\u00B0', '&plusmn;': '\u00B1', '&times;': '\u00D7', '&divide;': '\u00F7',
  '&euro;': '\u20AC', '&pound;': '\u00A3', '&yen;': '\u00A5', '&cent;': '\u00A2',
  '&sect;': '\u00A7', '&para;': '\u00B6', '&middot;': '\u00B7',
  '&laquo;': '\u00AB', '&raquo;': '\u00BB', '&iexcl;': '\u00A1', '&iquest;': '\u00BF',
  '&frac12;': '\u00BD', '&frac14;': '\u00BC', '&frac34;': '\u00BE',
  '&sup2;': '\u00B2', '&sup3;': '\u00B3', '&sup1;': '\u00B9',
  '&alpha;': '\u03B1', '&beta;': '\u03B2', '&gamma;': '\u03B3', '&delta;': '\u03B4',
  '&pi;': '\u03C0', '&sigma;': '\u03C3', '&omega;': '\u03C9',
  '&infin;': '\u221E', '&ne;': '\u2260', '&le;': '\u2264', '&ge;': '\u2265',
  '&larr;': '\u2190', '&rarr;': '\u2192', '&uarr;': '\u2191', '&darr;': '\u2193',
  '&spades;': '\u2660', '&clubs;': '\u2663', '&hearts;': '\u2665', '&diams;': '\u2666',
  '&check;': '\u2713', '&cross;': '\u2717', '&star;': '\u2605', '&bull;': '\u2022',
};

function process() {
  let text = $('#input').value;
  if (!text) return;
  let entityCount = 0;
  const original = text;

  if ($('#opt-named').checked) {
    // Named entities - sort by length descending to match longer names first
    const sortedNames = Object.keys(namedEntities).sort((a, b) => b.length - a.length);
    for (const ent of sortedNames) {
      while (text.includes(ent)) {
        text = text.replace(ent, namedEntities[ent]);
        entityCount++;
      }
    }
  }

  if ($('#opt-decimal').checked) {
    text = text.replace(/&#(\d+);/g, (m, dec) => {
      entityCount++;
      return String.fromCharCode(parseInt(dec, 10));
    });
  }

  if ($('#opt-hex').checked) {
    text = text.replace(/&#x([0-9a-fA-F]+);/g, (m, hex) => {
      entityCount++;
      return String.fromCharCode(parseInt(hex, 16));
    });
  }

  if (!$('#opt-nbsp').checked && $('#opt-named')) {
    // Restore nbsp if user doesn't want it decoded
    // Already handled by named entities toggle
  }
  if (!$('#opt-nbsp').checked) {
    text = text.replace(/\u00A0/g, '&nbsp;');
  }

  $('#output').textContent = text;
  if (entityCount > 0) {
    $('#status').innerHTML = `<span style="color:var(--gz-success)">${t('done').replace('{n}', entityCount)}</span>`;
  } else {
    $('#status').innerHTML = `<span style="color:var(--text2)">${t('noChange')}</span>`;
  }
}

function loadExample() {
  $('#input').value = 'Hello &lt;world&gt;&apos;s &amp; best &quot;tool&quot;&#10;Cost: &euro;100 &amp; &pound;50&#10;Temperature: 25&deg;C &#177; 2&deg;';
  process();
}

function doClear() { $('#input').value = ''; $('#output').textContent = ''; $('#status').innerHTML = ''; }

$('#input').addEventListener('input', process);

const optHtml = `
  <div class="opt-row">
    <label><input type="checkbox" id="opt-named" checked onchange="process()"> ${t('optNamed')}</label>
    <label><input type="checkbox" id="opt-decimal" checked onchange="process()"> ${t('optDecimal')}</label>
    <label><input type="checkbox" id="opt-hex" checked onchange="process()"> ${t('optHex')}</label>
    <label><input type="checkbox" id="opt-nbsp" checked onchange="process()"> ${t('optNbsp')}</label>
  </div>`;

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="process()">${t('unescape')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

const optDiv = document.createElement('div');
optDiv.innerHTML = optHtml;
$('#toolbar').after(optDiv);

  titleKey: 'toolTitle',
  descKey: 'toolDesc',

    {icon:'🧹', href:'/text/remove-html-tags.html', name:'Remove HTML Tags'},
  ]
});
</script>
