.kb-wrap{background:var(--glass2);border:1px solid var(--border);border-radius:14px;padding:14px;margin:14px 0;user-select:none}
.kb-row{display:flex;gap:4px;margin-bottom:4px;justify-content:center;flex-wrap:nowrap}
.kb-key{flex:1;min-width:28px;max-width:60px;height:38px;background:var(--bg2);border:1px solid var(--border);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:.75em;font-weight:600;color:var(--text);transition:all .08s;cursor:pointer;box-shadow:0 2px 0 var(--border)}
.kb-key.pressed{background:var(--accent);color:#000;transform:translateY(1px);box-shadow:0 1px 0 var(--border)}
.kb-key.wide{flex:2;max-width:120px;font-size:.7em}
.kb-key.wider{flex:3;max-width:180px}
.kb-key.widest{flex:6;max-width:380px}
.kb-key.tall{height:82px;align-items:flex-end;padding-bottom:8px}
.kb-stats{display:flex;flex-wrap:wrap;gap:8px;margin:10px 0}
.kb-stat{background:var(--glass2);border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-size:.85em}
.kb-stat b{color:var(--accent);font-size:1.1em;display:block}
.kb-status{margin:8px 0;padding:10px;border-radius:8px;font-size:.9em}
.kb-status.ok{background:rgba(0,214,114,.1);border:1px solid var(--gz-success);color:var(--gz-success)}
.kb-status.warn{background:rgba(245,185,66,.1);border:1px solid #f5b942;color:#f5b942}
.kb-log{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:8px;font-family:monospace;font-size:.8em;max-height:120px;overflow-y:auto;margin-top:10px}
.kb-log .row{padding:2px 4px;border-bottom:1px solid var(--border)}
.kb-mod{display:inline-block;padding:3px 8px;background:var(--glass2);border:1px solid var(--border);border-radius:4px;margin:0 4px;font-family:monospace;font-size:.8em}
.kb-mod.active{background:var(--accent);color:#000}
</style>

<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "How do I test my keyboard online?", "acceptedAnswer": {"@type": "Answer", "text": "Click anywhere on the page to focus it, then press any key on your physical keyboard. The corresponding virtual key on the on-screen layout will light up green. Press every key systematically to verify all of them work."}}, {"@type": "Question", "name": "How do I know if a key is stuck?", "acceptedAnswer": {"@type": "Answer", "text": "A stuck key stays lit even after you release it. The key event log shows 'stuck' for any key that doesn't fire a keyup event within 1 second. Common causes: debris under the key, mechanical failure, or a software issue."}}, {"@type": "Question", "name": "What is N-key rollover (NKRO)?", "acceptedAnswer": {"@type": "Answer", "text": "NKRO is the ability of a keyboard to register multiple simultaneous key presses. Most modern keyboards support 6-key rollover or full NKRO. Hold down several keys at once — if all of them stay lit, NKRO works."}}, {"@type": "Question", "name": "Is my keystroke data safe?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. All key events are processed locally in your browser. Nothing is logged, sent, or stored on any server. Close the tab to clear all session data instantly."}}]}</script>

<script>
GZI18n.register({
en:{
toolTitle:'Keyboard Tester',
toolDesc:'Test every key on your physical keyboard, detect stuck keys, and check N-key rollover. Visualize key presses in real time on an on-screen layout.',
lblKeys:'Keys pressed',lblModifiers:'Modifiers',lblStuck:'Stuck keys',lblLog:'Event log:',
statusReady:'Click here and start typing — keys you press will light up green.',
statusOk:'Working great! Try pressing multiple keys at once for NKRO testing.',
statusStuck:'Stuck key detected: ',
step1:'Click on the keyboard area to focus the page',
step2:'Press every key on your physical keyboard — they light up green',
step3:'Test simultaneous key presses for N-key rollover',
step4:'Watch the event log and stuck-key counter for issues',
},
zh:{
toolTitle:'键盘测试器',
toolDesc:'测试物理键盘的每个按键，检测卡键，并检查 N 键无冲（NKRO）。在屏幕键盘上实时可视化按键状态。',
lblKeys:'已按按键',lblModifiers:'修饰键',lblStuck:'卡键数',lblLog:'事件日志：',
statusReady:'点击此处并开始按键 — 你按下的键会亮起绿色。',
statusOk:'工作正常！同时按下多个键测试 NKRO 无冲能力。',
statusStuck:'检测到卡键：',
step1:'点击键盘区域聚焦页面',
step2:'按下物理键盘上的每个键 — 它们会亮起绿色',
step3:'同时按多个键测试 N 键无冲',
step4:'观察事件日志和卡键计数发现问题',
}
});

const {$,t}=GZ;
let totalPressed=0,stuckCount=0;
const stuck={};
const STUCK_TIMEOUT=1500;

const layout=[
  ['Esc','F1','F2','F3','F4','F5','F6','F7','F8','F9','F10','F11','F12','PrtSc','Del'],
  ['`','1','2','3','4','5','6','7','8','9','0','-','=','Backspace'],
  ['Tab','Q','W','E','R','T','Y','U','I','O','P','[',']','\\'],
  ['CapsLock','A','S','D','F','G','H','J','K','L',';',"'",'Enter'],
  ['Shift','Z','X','C','V','B','N','M',',','.','/','Shift'],
  ['Ctrl','Meta','Alt','Space','Alt','Meta','Menu','Ctrl'],
];

const NUMPAD=[
  ['NumLock','/','*','-'],
  ['7','8','9','+'],
  ['4','5','6','+'],
  ['1','2','3','Enter'],
  ['0','.','Enter'],
];

const KEY_MAP={
  'Esc':'Escape','Backspace':'Backspace','Tab':'Tab','Enter':'Enter','CapsLock':'CapsLock','Shift':'Shift',
  'Ctrl':'Control','Alt':'Alt','Meta':'OS','Menu':'ContextMenu','PrtSc':'PrintScreen','Del':'Delete',
  'Space':' ','NumLock':'NumLock',
};

function buildKeyboard(){
  const wrap=$('#keyboard');
  // Main alpha area
  const main=document.createElement('div');
  main.id='main-kb';
  layout.forEach((row,rIdx)=>{
    const r=document.createElement('div');r.className='kb-row';
    row.forEach(k=>{
      const el=document.createElement('div');
      let cls='kb-key';
      const wide=['Backspace','Tab','CapsLock','Enter'].includes(k);
      const wider=['Shift'].includes(k);
      if(wide)cls+=' wide';
      if(wider)cls+=' wider';
      if(k==='Space'){cls+=' widest';}
      el.className=cls;
      el.dataset.key=KEY_MAP[k]||k;
      el.dataset.label=k;
      el.textContent=k;
      r.appendChild(el);
    });
    main.appendChild(r);
  });
  wrap.appendChild(main);
  // Numpad
  const np=document.createElement('div');
  np.style.cssText='margin-top:10px;display:flex;gap:4px;justify-content:center;flex-wrap:wrap';
  // Skip numpad in compact display
  wrap.appendChild(np);
}

const pressed={};

function flashKey(code,down){
  const el=document.querySelector(`.kb-key[data-key="${CSS.escape(code)}"]`);
  if(el){
    el.classList.toggle('pressed',down);
    if(down && !pressed[code]){
      pressed[code]=true;
      totalPressed++;
      $('#cnt-keys').textContent=totalPressed;
    }else if(!down){
      delete pressed[code];
    }
  }
  // Modifiers
  const mc=code.toLowerCase();
  if(mc==='shift'){document.querySelectorAll('[data-key="Shift"]').forEach(e=>e.classList.toggle('pressed',down));$('#m-shift').classList.toggle('active',down);}
  if(mc==='control'){document.querySelectorAll('[data-key="Control"]').forEach(e=>e.classList.toggle('pressed',down));$('#m-ctrl').classList.toggle('active',down);}
  if(mc==='alt'){document.querySelectorAll('[data-key="Alt"]').forEach(e=>e.classList.toggle('pressed',down));$('#m-alt').classList.toggle('active',down);}
  if(mc==='os'||mc==='meta'){$('#m-meta').classList.toggle('active',down);}
}

function logEvent(text,type){
  const log=$('#log');
  const r=document.createElement('div');r.className='row';
  r.textContent=new Date().toLocaleTimeString()+' — '+text;
  log.prepend(r);
  while(log.children.length>50)log.removeChild(log.lastChild);
}

function checkStuck(code){
  if(pressed[code] && !stuck[code]){
    stuck[code]=setTimeout(()=>{
      if(pressed[code]){
        stuckCount++;
        $('#cnt-stuck').textContent=stuckCount;
        $('#status').className='kb-status warn';
        $('#status-text').textContent=t('statusStuck')+code;
        logEvent('STUCK: '+code,'warn');
      }
    },STUCK_TIMEOUT);
  }
  if(!pressed[code] && stuck[code]){
    clearTimeout(stuck[code]);
    delete stuck[code];
  }
}

document.addEventListener('keydown',e=>{
  e.preventDefault();
  const c=e.code;
  flashKey(c,true);
  logEvent('DOWN '+c+(e.key&&e.key.length===1?' ('+e.key+')':''));
  checkStuck(c);
});

document.addEventListener('keyup',e=>{
  e.preventDefault();
  const c=e.code;
  flashKey(c,false);
  logEvent('UP '+c);
  checkStuck(c);
});

// Click keys to test visual
document.addEventListener('click',e=>{
  const k=e.target.closest('.kb-key');
  if(k){
    flashKey(k.dataset.key,true);
    setTimeout(()=>flashKey(k.dataset.key,false),150);
  }
});

$('#toolbar').innerHTML=`<button class="gz-btn" onclick="document.getElementById('status').className='kb-status ok';document.getElementById('status-text').textContent='${t('statusOk')}'">${t('step2')}</button><button class="gz-btn gz-btn-secondary" onclick="document.getElementById('log').innerHTML='';totalPressed=0;stuckCount=0;document.getElementById('cnt-keys').textContent='0';document.getElementById('cnt-stuck').textContent='0';Object.keys(pressed).forEach(k=>delete pressed[k]);Object.keys(stuck).forEach(k=>{clearTimeout(stuck[k]);delete stuck[k]});document.querySelectorAll('.kb-key.pressed').forEach(k=>k.classList.remove('pressed'))">Clear</button>`;

GZ.renderToolPage({category:'fun',titleKey:'toolTitle',descKey:'toolDesc',howToSteps:['step1','step2','step3','step4'],related:[
  {icon:'⌨️',href:'/fun/typing-test.html',name:'Typing Test'},
  {icon:'🖱️',href:'/fun/reaction-time.html',name:'Reaction Time'},
  {icon:'📷',href:'/dev/webcam-test.html',name:'Webcam Test'},
  {icon:'🖥️',href:'/dev/screen-resolution.html',name:'Screen Resolution'},
]});

function init(){
  buildKeyboard();
  $('#lbl-keys').textContent=t('lblKeys');
  $('#lbl-modifiers').textContent=t('lblModifiers');
  $('#lbl-stuck').textContent=t('lblStuck');
  $('#lbl-log').textContent=t('lblLog');
  $('#status-text').textContent=t('statusReady');
}
init();
</script>
