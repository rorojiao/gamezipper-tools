<script>
GZI18n.register({
  en: {
    toolTitle: 'Google SERP Preview',
    toolDesc: 'Preview how your page appears in Google search results. Optimize title tags, meta descriptions and URLs for higher click-through rates.',
    urlLabel: 'Page URL',
    titleLabel: 'Title Tag',
    descLabel: 'Meta Description',
    previewLabel: 'SERP Preview',
    example: 'Example',
    clear: 'Clear',
    chars: 'chars',
    step1: 'Enter your page URL in the URL field',
    step2: 'Type your title tag (ideal: 50-60 characters)',
    step3: 'Write a compelling meta description (ideal: 150-160 characters)',
    step4: 'Preview the result and optimize for maximum click-through rate',
  },
  zh: {
    toolTitle: 'Google 搜索结果预览',
    toolDesc: '预览您的网页在 Google 搜索结果中的展示效果。优化标题标签、元描述和 URL 以提高点击率。',
    urlLabel: '页面 URL',
    titleLabel: '标题标签',
    descLabel: '元描述',
    previewLabel: '搜索结果预览',
    example: '示例',
    clear: '清空',
    chars: '字符',
    step1: '在 URL 字段中输入页面 URL',
    step2: '输入标题标签（建议：50-60 个字符）',
    step3: '编写吸引人的元描述（建议：150-160 个字符）',
    step4: '预览结果并优化以提高点击率',
  }
});

const { $, t } = GZ;

function updatePreview() {
  const url = $('#url-input').value || 'https://example.com';
  const title = $('#title-input').value || 'Page Title';
  const desc = $('#desc-input').value || 'Meta description...';

  // URL
  let displayUrl = url.replace(/^https?:\/\//, '').replace(/\/$/, '');
  try { const u = new URL(url); $('#serp-url-text').textContent = u.hostname + u.pathname; } catch(e) { $('#serp-url-text').textContent = displayUrl; }

  // Breadcrumb
  try { const u = new URL(url); const parts = u.pathname.split('/').filter(Boolean); if (parts.length > 0) { $('#serp-breadcrumb').textContent = u.hostname + ' › ' + parts.join(' › '); } else { $('#serp-breadcrumb').textContent = ''; } } catch(e) { $('#serp-breadcrumb').textContent = ''; }

  // Title
  $('#serp-title').textContent = title;

  // Description
  $('#serp-desc').textContent = desc;

  // Character counts
  const titleLen = title.length;
  const descLen = desc.length;

  function charStatus(len, min, max) { return len === 0 ? '' : len < min ? 'gz-char-warn' : len <= max ? 'gz-char-ok' : 'gz-char-bad'; }

  $('#title-count').textContent = `${titleLen} ${t('chars')}`;
  $('#title-count').className = 'gz-char-count ' + charStatus(titleLen, 30, 60);
  $('#desc-count').textContent = `${descLen} ${t('chars')}`;
  $('#desc-count').className = 'gz-char-count ' + charStatus(descLen, 120, 160);

  // Meters
  const titlePct = Math.min(100, (titleLen / 60) * 100);
  const titleColor = titleLen <= 60 ? '#27ae60' : titleLen <= 75 ? '#f39c12' : '#e74c3c';
  $('#title-meter').style.width = titlePct + '%';
  $('#title-meter').style.background = titleColor;

  const descPct = Math.min(100, (descLen / 160) * 100);
  const descColor = descLen <= 160 ? '#27ae60' : descLen <= 200 ? '#f39c12' : '#e74c3c';
  $('#desc-meter').style.width = descPct + '%';
  $('#desc-meter').style.background = descColor;

  // Tips
  if (titleLen === 0) { $('#title-tip').textContent = ''; $('#title-tip').className = 'gz-tip'; }
  else if (titleLen < 30) { $('#title-tip').textContent = '⚠ Title is too short. Aim for 50-60 characters.'; $('#title-tip').className = 'gz-tip gz-tip-warn'; }
  else if (titleLen <= 60) { $('#title-tip').textContent = '✓ Good title length!'; $('#title-tip').className = 'gz-tip gz-tip-good'; }
  else { $('#title-tip').textContent = '✗ Title is too long and may be truncated in search results.'; $('#title-tip').className = 'gz-tip gz-tip-bad'; }

  if (descLen === 0) { $('#desc-tip').textContent = ''; $('#desc-tip').className = 'gz-tip'; }
  else if (descLen < 120) { $('#desc-tip').textContent = '⚠ Description is short. Aim for 150-160 characters.'; $('#desc-tip').className = 'gz-tip gz-tip-warn'; }
  else if (descLen <= 160) { $('#desc-tip').textContent = '✓ Good description length!'; $('#desc-tip').className = 'gz-tip gz-tip-good'; }
  else { $('#desc-tip').textContent = '✗ Description is too long and may be truncated.'; $('#desc-tip').className = 'gz-tip gz-tip-bad'; }
}

['url-input','title-input','desc-input'].forEach(id => {
  $('#' + id).addEventListener('input', updatePreview);
});

function setMode(mode) {
  const container = $('#preview-container');
  $('#btn-desktop').classList.toggle('active', mode === 'desktop');
  $('#btn-mobile').classList.toggle('active', mode === 'mobile');
  container.classList.toggle('gz-preview-mobile', mode === 'mobile');
}

function loadExample() {
  $('#url-input').value = 'https://tools.gamezipper.com/dev/json.html';
  $('#title-input').value = 'JSON Formatter & Viewer - Free Online Tool | GameZipper Tools';
  $('#desc-input').value = 'Format, validate, minify and beautify JSON data online. Free JSON formatter and viewer — paste JSON and get clean, readable output instantly. No signup required.';
  updatePreview();
}

function doClear() {
  $('#url-input').value = '';
  $('#title-input').value = '';
  $('#desc-input').value = '';
  updatePreview();
}

$('#toolbar').innerHTML = `
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

GZ.renderToolPage({
  category: 'seo',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🏷️', href:'/seo/meta-tag-generator.html', name:'Meta Tag Generator'},
    {icon:'📄', href:'/seo/open-graph-preview.html', name:'OG Preview'},
    {icon:'📊', href:'/seo/robots-txt-validator.html', name:'Robots.txt'},
    {icon:'🗺️', href:'/seo/sitemap-generator.html', name:'Sitemap Generator'},
  ]
});
</script>
