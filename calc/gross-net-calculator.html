<style>
.gn-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-top:8px}
@media(max-width:720px){.gn-grid{grid-template-columns:1fr}}
.gn-card{background:var(--glass);border:1px solid var(--border);border-radius:16px;padding:20px}
.gn-field{margin-bottom:14px}
.gn-field label{display:block;font-size:.85em;margin-bottom:5px;opacity:.85;font-weight:600}
.gn-field .input-wrap{position:relative;display:flex;align-items:center}
.gn-field input{width:100%;padding:11px 14px;border-radius:10px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:1.05em;box-sizing:border-box}
.gn-field input:focus{outline:none;border-color:var(--accent)}
.gn-field .prefix,.gn-field .suffix{position:absolute;font-size:.85em;opacity:.6}
.gn-field .prefix{left:12px}
.gn-field .suffix{right:12px}
.gn-field input.has-prefix{padding-left:28px}
.gn-field input.has-suffix{padding-right:40px}
.gn-field select{width:100%;padding:11px 14px;border-radius:10px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:1em;box-sizing:border-box}
.gn-mode{display:flex;gap:8px;margin-bottom:14px}
.gn-mode-btn{flex:1;padding:12px;border-radius:10px;border:1px solid var(--border);background:var(--bg2);color:var(--text);cursor:pointer;font-size:.95em;font-weight:600;text-align:center;transition:.15s}
.gn-mode-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.gn-result{background:var(--glass);border:1px solid var(--border);border-radius:16px;padding:24px;margin-top:18px}
.gn-big{font-size:2.2em;font-weight:800;color:var(--accent);line-height:1.1}
.gn-big .currency{font-size:.55em;opacity:.7;font-weight:600}
.gn-breakdown{margin-top:18px;display:grid;gap:10px}
.gn-row{display:flex;justify-content:space-between;padding:10px 14px;background:var(--glass2);border-radius:10px;font-size:.95em}
.gn-row.highlight{background:var(--accent);color:#fff;font-weight:700;font-size:1.05em}
.gn-row .lbl{opacity:.8}
.gn-row .val{font-weight:600}
.gn-presets{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.gn-preset{padding:4px 10px;border-radius:999px;background:var(--glass2);border:1px solid var(--border);cursor:pointer;font-size:.8em;transition:.15s}
.gn-preset:hover{border-color:var(--accent);background:var(--accent);color:#fff}
</style>
<script type="application/ld+json">{"@context":"https://schema.org","@type":"WebApplication","name":"Gross Net Calculator","description":"Free gross-net calculator. Add or remove VAT/sales tax from any amount with custom rates and full breakdown.","url":"https://tools.gamezipper.com/calc/gross-net-calculator.html","applicationCategory":"Utility","operatingSystem":"Web Browser","offers":{"@type":"Offer","price":"0"}}</script>
<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"What is the difference between gross and net?","acceptedAnswer":{"@type":"Answer","text":"Gross amount includes tax (the price the customer pays). Net amount excludes tax (the base price before tax is added). For example, if an item costs $120 gross with 20% VAT, the net amount is $100 and the VAT is $20."}},{"@type":"Question","name":"How do I calculate VAT from a net amount?","acceptedAnswer":{"@type":"Answer","text":"To add VAT: gross = net × (1 + rate/100). For example, $100 net + 20% VAT = $100 × 1.20 = $120 gross. The VAT portion is $20."}},{"@type":"Question","name":"How do I remove VAT from a gross amount?","acceptedAnswer":{"@type":"Answer","text":"To remove VAT: net = gross / (1 + rate/100). For example, $120 gross with 20% VAT: net = $120 / 1.20 = $100. The VAT portion is $20."}},{"@type":"Question","name":"What are common VAT rates worldwide?","acceptedAnswer":{"@type":"Answer","text":"Standard VAT rates: UK 20%, Germany 19%, France 20%, Italy 22%, Spain 21%, Netherlands 21%, Ireland 23%, China 13%, Australia 10% (GST), Japan 10% (JCT), USA has no federal VAT but states charge sales tax (0-10.25%)."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="gn-grid">
      <div class="gn-card" id="input-card"></div>
      <div class="gn-card" id="info-card"></div>
    </div>
    <div class="gn-result" id="results"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Gross Net Calculator (VAT / Sales Tax)',
    toolDesc: 'Add or remove VAT and sales tax from any amount. Supports custom rates and common worldwide rates (20%, 19%, 10%). See the full breakdown of net, tax and gross — free and private.',
    modeAdd: 'Add Tax (Net → Gross)',
    modeRemove: 'Remove Tax (Gross → Net)',
    amount: 'Amount',
    taxRate: 'Tax rate',
    commonRates: 'Common rates',
    calculate: 'Calculate',
    netAmount: 'Net amount',
    taxAmount: 'Tax amount',
    grossAmount: 'Gross amount',
    resultLabel: 'Result',
    step1: 'Choose whether to add tax (net to gross) or remove tax (gross to net)',
    step2: 'Enter the amount',
    step3: 'Set the tax rate or click a common rate preset',
    step4: 'See the net, tax and gross breakdown',
  },
  zh: {
    toolTitle: '毛额净额计算器（增值税 / 销售税）',
    toolDesc: '从任意金额添加或去除增值税和销售税。支持自定义税率和全球常见税率（20%、19%、10%）。查看净额、税额和毛额的完整明细 — 免费且私密。',
    modeAdd: '加税（净额 → 毛额）',
    modeRemove: '去税（毛额 → 净额）',
    amount: '金额',
    taxRate: '税率',
    commonRates: '常见税率',
    calculate: '计算',
    netAmount: '净额',
    taxAmount: '税额',
    grossAmount: '毛额',
    resultLabel: '结果',
    step1: '选择是加税（净额转毛额）还是去税（毛额转净额）',
    step2: '输入金额',
    step3: '设置税率或点击常见税率预设',
    step4: '查看净额、税额和毛额明细',
  }
});

const { $, t } = GZ;

let mode = 'add';

const cur = (n) => {
  const lang = GZI18n.getLang ? GZI18n.getLang() : 'en';
  try { return new Intl.NumberFormat(lang === 'zh' ? 'zh-CN' : 'en-US', {style:'currency', currency:'USD', maximumFractionDigits:2}).format(n); }
  catch(e) { return '$' + n.toFixed(2); }
};

const RATES = [
  {label:'UK 20%', val:20}, {label:'DE 19%', val:19}, {label:'FR 20%', val:20},
  {label:'IT 22%', val:22}, {label:'ES 21%', val:21}, {label:'NL 21%', val:21},
  {label:'CN 13%', val:13}, {label:'AU 10%', val:10}, {label:'JP 10%', val:10},
  {label:'US 7.25%', val:7.25}, {label:'CH 7.7%', val:7.7}, {label:'SG 9%', val:9},
];

$('#input-card').innerHTML = `
  <div class="gn-mode">
    <button class="gn-mode-btn active" id="mode-add" onclick="setMode('add')">${t('modeAdd')}</button>
    <button class="gn-mode-btn" id="mode-remove" onclick="setMode('remove')">${t('modeRemove')}</button>
  </div>
  <div class="gn-field">
    <label id="lbl-amount">${t('amount')}</label>
    <div class="input-wrap">
      <span class="prefix">$</span>
      <input type="number" id="amount" class="has-prefix" value="100" min="0" step="0.01">
    </div>
  </div>
  <div class="gn-field">
    <label>${t('taxRate')}</label>
    <div class="input-wrap">
      <input type="number" id="rate" value="20" min="0" max="100" step="0.1">
      <span class="suffix">%</span>
    </div>
  </div>
  <div class="gn-field">
    <label>${t('commonRates')}</label>
    <div class="gn-presets">
      ${RATES.map(r => `<span class="gn-preset" onclick="setRate(${r.val})">${r.label}</span>`).join('')}
    </div>
  </div>
  <button class="gz-btn" style="width:100%;padding:12px" onclick="calculate()">${t('calculate')}</button>
`;

$('#info-card').innerHTML = `
  <h3 style="margin:0 0 14px;font-size:1.05em">ℹ️ Gross vs Net</h3>
  <div style="padding:14px;background:var(--glass2);border-radius:10px;font-family:'JetBrains Mono',monospace;font-size:.88em;line-height:1.8">
    <strong>Add tax</strong> (Net → Gross):<br>
    gross = net × (1 + rate%)<br><br>
    <strong>Remove tax</strong> (Gross → Net):<br>
    net = gross ÷ (1 + rate%)
  </div>
  <p style="font-size:.88em;line-height:1.6;opacity:.85;margin-top:14px">
    <strong>Gross</strong> is the price the customer pays (tax included).
    <strong>Net</strong> is the base price before tax.
    The <strong>tax amount</strong> is the difference.
  </p>
  <div style="margin-top:12px;padding:12px 14px;background:var(--glass2);border-radius:10px;font-size:.82em;line-height:1.55;opacity:.85">
    <strong>Example:</strong> €100 net + 19% VAT = €119 gross.<br>
    €119 gross − 19% VAT = €100 net (€19 tax).
  </div>
`;

function setMode(m) {
  mode = m;
  $('#mode-add').classList.toggle('active', m === 'add');
  $('#mode-remove').classList.toggle('active', m === 'remove');
  calculate();
}

function setRate(r) {
  $('#rate').value = r;
  calculate();
}

function calculate() {
  const amount = parseFloat($('#amount').value) || 0;
  const rate = parseFloat($('#rate').value) || 0;
  if (amount <= 0) {
    $('#results').innerHTML = '<div style="text-align:center;opacity:.5;padding:20px">Enter an amount to calculate</div>';
    return;
  }
  let net, tax, gross;
  if (mode === 'add') {
    net = amount;
    tax = amount * rate / 100;
    gross = net + tax;
  } else {
    gross = amount;
    net = amount / (1 + rate / 100);
    tax = gross - net;
  }
  $('#results').innerHTML = `
    <div style="text-align:center">
      <div style="font-size:.85em;opacity:.7;text-transform:uppercase;letter-spacing:.05em">${mode === 'add' ? t('grossAmount') : t('netAmount')}</div>
      <div class="gn-big"><span class="currency">$</span>${(mode === 'add' ? gross : net).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',')}</div>
    </div>
    <div class="gn-breakdown">
      <div class="gn-row"><span class="lbl">${t('netAmount')}</span><span class="val">${cur(net)}</span></div>
      <div class="gn-row"><span class="lbl">${t('taxAmount')} (${rate}%)</span><span class="val">${cur(tax)}</span></div>
      <div class="gn-row highlight"><span>${t('grossAmount')}</span><span>${cur(gross)}</span></div>
    </div>`;
}

calculate();
$('#amount').addEventListener('input', calculate);
$('#rate').addEventListener('input', calculate);

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1', 'step2', 'step3', 'step4'],
  related: [
    {icon: '💸', href: '/calc/sales-tax-calculator.html', name: 'Sales Tax Calculator'},
    {icon: '🌍', href: '/calc/vat-calculator.html', name: 'VAT Calculator'},
    {icon: '💼', href: '/calc/profit-margin.html', name: 'Profit Margin'},
    {icon: '🏷️', href: '/calc/discount-calculator.html', name: 'Discount Calculator'},
  ]
});
</script>
<script src="/tools-result-rec.js?v=20260707v520" defer></script>
</body></html>
