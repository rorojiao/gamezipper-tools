<script>
GZI18n.register({
  en: {
    toolTitle: 'Cron Expression Parser & Generator',
    toolDesc: 'Parse and validate cron expressions with human-readable descriptions. See next execution times, use presets — free online tool for developers.',
    parse: '🔍 Parse',
    lblHuman: '📋 Human-Readable Description',
    lblNext: '⏰ Next 10 Execution Times',
    presetEveryMin: 'Every minute',
    presetEvery5Min: 'Every 5 min',
    presetEveryHour: 'Every hour',
    presetDaily: 'Daily midnight',
    presetWeekly: 'Weekly (Mon)',
    presetMonthly: 'Monthly (1st)',
    presetWeekday: 'Weekdays 9am',
    step1: 'Enter a cron expression or choose a preset',
    step2: 'Click "Parse" to analyze',
    step3: 'See the human-readable description',
    step4: 'View the next 10 scheduled execution times',
    invalidCron: 'Invalid cron expression. Must have 5 fields: minute hour day-of-month month day-of-week',
    every: 'Every',
    minute: 'minute',
    hour: 'hour',
    day: 'day',
    month: 'month',
    dayOfWeek: 'day of week',
    at: 'at',
    from: 'from',
    through: 'through',
  },
  zh: {
    toolTitle: 'Cron 表达式解析器',
    toolDesc: '解析和验证 Cron 表达式，提供人类可读的描述。查看下次执行时间，使用预设模板 — 免费开发者工具。',
    parse: '🔍 解析',
    lblHuman: '📋 人类可读描述',
    lblNext: '⏰ 下次 10 次执行时间',
    presetEveryMin: '每分钟',
    presetEvery5Min: '每 5 分钟',
    presetEveryHour: '每小时',
    presetDaily: '每天午夜',
    presetWeekly: '每周一',
    presetMonthly: '每月 1 日',
    presetWeekday: '工作日 9 点',
    step1: '输入 Cron 表达式或选择预设',
    step2: '点击「解析」进行分析',
    step3: '查看人类可读的描述',
    step4: '查看下次 10 个计划执行时间',
    invalidCron: '无效的 Cron 表达式。必须包含 5 个字段：分 时 日 月 周',
    every: '每',
    minute: '分钟',
    hour: '小时',
    day: '日',
    month: '月',
    dayOfWeek: '星期',
    at: '在',
    from: '从',
    through: '到',
  }
});

const { $, copyText, t } = GZ;

const PRESETS = [
  {label: t('presetEveryMin'), expr: '* * * * *'},
  {label: t('presetEvery5Min'), expr: '*/5 * * * *'},
  {label: t('presetEveryHour'), expr: '0 * * * *'},
  {label: t('presetDaily'), expr: '0 0 * * *'},
  {label: t('presetWeekly'), expr: '0 0 * * 1'},
  {label: t('presetMonthly'), expr: '0 0 1 * *'},
  {label: t('presetWeekday'), expr: '0 9 * * 1-5'},
];

$('#presets').innerHTML = PRESETS.map(p => `<button data-expr="${p.expr}">${p.label}</button>`).join('');
document.querySelectorAll('#presets button').forEach(btn => {
  btn.onclick = () => { $('#cron').value = btn.dataset.expr; parseCron(); };
});

$('#lbl-human').textContent = t('lblHuman');
$('#lbl-next').textContent = t('lblNext');

const MONTH_NAMES = ['','January','February','March','April','May','June','July','August','September','October','November','December'];
const DOW_NAMES = ['','Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

function parseField(field, min, max, name) {
  if (field === '*') return t('every') + ' ' + name;
  if (field.startsWith('*/')) return t('every') + ' ' + field.slice(2) + ' ' + name + 's';
  if (field.includes('-')) {
    const [a, b] = field.split('-');
    return name + ' ' + t('from') + ' ' + a + ' ' + t('through') + ' ' + b;
  }
  if (field.includes(',')) return name + ' ' + field.split(',').join(', ');
  return name + ' ' + field;
}

function parseCron() {
  const expr = $('#cron').value.trim();
  const parts = expr.split(/\s+/);
  if (parts.length !== 5) {
    $('#error').textContent = t('invalidCron');
    $('#error').style.display = 'block';
    $('#result-desc').style.display = 'none';
    $('#result-runs').style.display = 'none';
    return;
  }
  $('#error').style.display = 'none';

  const [minute, hour, dom, month, dow] = parts;
  const desc = [
    parseField(minute, 0, 59, t('minute')),
    parseField(hour, 0, 23, t('hour')),
    parseField(dom, 1, 31, t('day')),
    parseField(month, 1, 12, t('month')),
    parseField(dow, 0, 6, t('dayOfWeek')),
  ].join(', ');

  $('#human-desc').textContent = desc.charAt(0).toUpperCase() + desc.slice(1);
  $('#result-desc').style.display = 'block';

  // Calculate next run times
  const nextRuns = getNextRuns(parts, 10);
  $('#next-runs').innerHTML = nextRuns.map(d => `<span class="run">${d}</span>`).join('');
  $('#result-runs').style.display = 'block';
}

function getNextRuns(parts, count) {
  const runs = [];
  const [minField, hourField, domField, monthField, dowField] = parts;

  function matches(field, val, min, max) {
    if (field === '*') return true;
    if (field.startsWith('*/')) return val % parseInt(field.slice(2)) === 0;
    if (field.includes(',')) return field.split(',').map(Number).includes(val);
    if (field.includes('-')) { const [a,b] = field.split('-').map(Number); return val >= a && val <= b; }
    return parseInt(field) === val;
  }

  let d = new Date();
  d.setSeconds(0, 0);
  d.setMinutes(d.getMinutes() + 1);

  const maxIter = 525600; // max 1 year of minutes
  let iter = 0;
  while (runs.length < count && iter < maxIter) {
    iter++;
    if (matches(minField, d.getMinutes(), 0, 59) &&
        matches(hourField, d.getHours(), 0, 23) &&
        matches(domField, d.getDate(), 1, 31) &&
        matches(monthField, d.getMonth() + 1, 1, 12) &&
        matches(dowField, d.getDay(), 0, 6)) {
      runs.push(d.toLocaleString());
    }
    d.setMinutes(d.getMinutes() + 1);
  }
  return runs;
}

$('#btn-parse').onclick = parseCron;
$('#cron').onkeydown = e => { if (e.key === 'Enter') parseCron(); };

// Parse on load
parseCron();

GZ.renderToolPage(
    ',name:'JSON Formatter'},
    
    {href:'/dev/uuid-generator.html',icon:'🆔',name:'UUID Generator'},
  ]
});
</script>
