<div class="gz-container">

  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="ts-grid">
      <div class="ts-card">
        <h3>🕒 <span id="lblWeek"></span></h3>
        <table class="ts-table">
          <thead>
            <tr>
              <th id="thDay"></th>
              <th id="thIn"></th>
              <th id="thOut"></th>
              <th id="thBreak"></th>
              <th id="thHours"></th>
            </tr>
          </thead>
          <tbody id="tsBody"></tbody>
        </table>
        <div class="summary" id="daySummary"></div>
      </div>
      <div class="ts-card">
        <h3>⚙️ <span id="lblSettings"></span></h3>
        <div class="ts-field"><label id="lblRate"></label><input type="number" id="rate" value="20" min="0" step="0.5"></div>
        <div class="ts-field"><label id="lblOTThreshold"></label><input type="number" id="otThreshold" value="40" min="0" step="0.5"></div>
        <div class="ts-field"><label id="lblOTMult"></label><input type="number" id="otMult" value="1.5" min="1" step="0.1"></div>
        <div class="ts-field"><label id="lblCurrency"></label><input type="text" id="currency" value="$" maxlength="3"></div>
        <div class="summary">
          <div class="sum-box"><div class="lbl" id="sumRegLbl"></div><div class="val" id="sumReg">0h</div></div>
          <div class="sum-box"><div class="lbl" id="sumOTLbl"></div><div class="val" id="sumOT">0h</div></div>
          <div class="sum-box"><div class="lbl" id="sumTotalLbl"></div><div class="val" id="sumTotal">0h</div></div>
          <div class="sum-box gross"><div class="lbl" id="sumPayLbl"></div><div class="val" id="sumPay">$0</div></div>
        </div>
        <div style="margin-top:12px;font-size:.82em;line-height:1.5;opacity:.75" id="breakdownNote"></div>
      </div>
    </div>
  </div>

<script>
GZI18n.register({
  en: {
    toolTitle: 'Timesheet Calculator',
    toolDesc: 'Track daily clock-in and clock-out times across a week. Automatically calculates work hours, regular vs overtime pay, and gross wages for hourly workers.',
    week: 'Weekly Timesheet', settings: 'Pay Settings',
    day: 'Day', clockIn: 'Clock In', clockOut: 'Clock Out', breakTime: 'Break (h)', hours: 'Hours',
    hourlyRate: 'Hourly rate ($)', otThreshold: 'Overtime threshold (h/week)', otMult: 'Overtime multiplier', currency: 'Currency symbol',
    regLbl: 'Regular Hours', otLbl: 'Overtime Hours', totalLbl: 'Total Hours', payLbl: 'Gross Pay',
    copy: '📋 Copy Summary', reset: '🔄 Reset', example: '🧪 Load Example',
    step1: 'Enter your clock-in and clock-out times for each day you worked',
    step2: 'Add unpaid break time in hours (e.g. 1 for a 1-hour lunch)',
    step3: 'Set your hourly rate, overtime threshold (usually 40h) and multiplier (usually 1.5x)',
    step4: 'View total regular hours, overtime hours and gross pay instantly',
  },
  zh: {
    toolTitle: '工时表计算器',
    toolDesc: '记录每天上下班打卡时间，自动计算一周工作总时长、常规工时与加班工时，以及应发工资，适合计时工作者和自由职业者。',
    week: '周工时表', settings: '工资设置',
    day: '星期', clockIn: '上班时间', clockOut: '下班时间', breakTime: '休息 (小时)', hours: '工时',
    hourlyRate: '时薪 ($)', otThreshold: '加班门槛 (小时/周)', otMult: '加班倍数', currency: '货币符号',
    regLbl: '常规工时', otLbl: '加班工时', totalLbl: '总工时', payLbl: '应发工资',
    copy: '📋 复制摘要', reset: '🔄 重置', example: '🧪 加载示例',
    step1: '为每个工作日输入上班和下班打卡时间',
    step2: '输入无薪休息时间（小时，如午休 1 小时）',
    step3: '设置时薪、加班门槛（通常 40 小时）和加班倍数（通常 1.5 倍）',
    step4: '即时查看常规工时、加班工时和应发工资',
  }
});

const { $, copyText, t } = GZ;
const DAYS_EN = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
const DAYS_ZH = ['周一','周二','周三','周四','周五','周六','周日'];
const isZh = GZI18n.getLang() === 'zh';
const DAYS = isZh ? DAYS_ZH : DAYS_EN;

$('#lblWeek').textContent = t('week');
$('#lblSettings').textContent = t('settings');
$('#thDay').textContent = t('day');
$('#thIn').textContent = t('clockIn');
$('#thOut').textContent = t('clockOut');
$('#thBreak').textContent = t('breakTime');
$('#thHours').textContent = t('hours');
$('#lblRate').textContent = t('hourlyRate');
$('#lblOTThreshold').textContent = t('otThreshold');
$('#lblOTMult').textContent = t('otMult');
$('#lblCurrency').textContent = t('currency');
$('#sumRegLbl').textContent = t('regLbl');
$('#sumOTLbl').textContent = t('otLbl');
$('#sumTotalLbl').textContent = t('totalLbl');
$('#sumPayLbl').textContent = t('payLbl');

// Build table rows
$('#tsBody').innerHTML = DAYS.map((d, i) => `
  <tr>
    <td class="day-cell">${d}</td>
    <td><input type="text" class="ts-in" data-day="${i}" placeholder="9:00"></td>
    <td><input type="text" class="ts-out" data-day="${i}" placeholder="17:00"></td>
    <td><input type="number" class="ts-break" data-day="${i}" value="0" min="0" step="0.5" style="width:55px"></td>
    <td><input type="text" class="ts-hours" data-day="${i}" readonly style="width:60px;font-weight:600;color:var(--accent)"></td>
  </tr>
`).join('') + `
  <tr class="total-row">
    <td colspan="4" style="text-align:right">${isZh ? '合计' : 'Total'}</td>
    <td><span id="weekTotal" style="font-size:1.05em">0h</span></td>
  </tr>`;

function parseTime(str) {
  if (!str || !str.trim()) return null;
  str = str.trim().toUpperCase();
  let m;
  // 12-hour: 9:00 AM / 9:00PM / 9AM
  m = str.match(/^(\d{1,2})(?::(\d{2}))?\s*(AM|PM)$/);
  if (m) {
    let h = +m[1], min = +(m[2] || 0);
    if (m[3] === 'PM' && h !== 12) h += 12;
    if (m[3] === 'AM' && h === 12) h = 0;
    return h + min / 60;
  }
  // 24-hour or plain: 14:30 / 9:00 / 9
  m = str.match(/^(\d{1,2}):?(\d{2})?$/);
  if (m) {
    return +m[1] + (m[2] ? +m[2] / 60 : 0);
  }
  return null;
}

function fmtHours(h) {
  if (!h) return '0h';
  const hh = Math.floor(h);
  const mm = Math.round((h - hh) * 60);
  return mm > 0 ? `${hh}h ${mm}m` : `${hh}h`;
}

function fmtMoney(n) {
  const cur = $('#currency').value || '$';
  return cur + (n || 0).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function calc() {
  const rate = +$('#rate').value || 0;
  const otThreshold = +$('#otThreshold').value || 999;
  const otMult = +$('#otMult').value || 1;

  let totalHours = 0;
  let totalReg = 0;
  let totalOT = 0;

  for (let i = 0; i < 7; i++) {
    const inT = parseTime(document.querySelector(`.ts-in[data-day="${i}"]`).value);
    const outT = parseTime(document.querySelector(`.ts-out[data-day="${i}"]`).value);
    const brk = +document.querySelector(`.ts-break[data-day="${i}"]`).value || 0;
    const hoursEl = document.querySelector(`.ts-hours[data-day="${i}"]`);

    let dayHours = 0;
    if (inT !== null && outT !== null) {
      dayHours = outT - inT - brk;
      if (dayHours < 0) dayHours += 24; // overnight shift
      if (dayHours < 0) dayHours = 0;
    }
    hoursEl.value = dayHours > 0 ? fmtHours(dayHours) : '';
    totalHours += dayHours;
  }

  // Overtime
  if (totalHours > otThreshold) {
    totalOT = totalHours - otThreshold;
    totalReg = otThreshold;
  } else {
    totalReg = totalHours;
    totalOT = 0;
  }

  const regPay = totalReg * rate;
  const otPay = totalOT * rate * otMult;
  const gross = regPay + otPay;

  $('#sumReg').textContent = fmtHours(totalReg);
  $('#sumOT').textContent = fmtHours(totalOT);
  $('#sumTotal').textContent = fmtHours(totalHours);
  $('#sumPay').textContent = fmtMoney(gross);
  $('#weekTotal').textContent = fmtHours(totalHours);

  $('#breakdownNote').innerHTML = (isZh
    ? `常规：${fmtHours(totalReg)} × ${fmtMoney(rate)} = <b>${fmtMoney(regPay)}</b><br>`
    : `Regular: ${fmtHours(totalReg)} × ${fmtMoney(rate)} = <b>${fmtMoney(regPay)}</b><br>`)
    + (totalOT > 0 ? (isZh
      ? `加班：${fmtHours(totalOT)} × ${fmtMoney(rate)} × ${otMult} = <b>${fmtMoney(otPay)}</b>`
      : `Overtime: ${fmtHours(totalOT)} × ${fmtMoney(rate)} × ${otMult} = <b>${fmtMoney(otPay)}</b>`) : '');
}

// Listen
document.querySelectorAll('.ts-in,.ts-out,.ts-break').forEach(el => el.addEventListener('input', calc));
['rate','otThreshold','otMult','currency'].forEach(id => $('#' + id).addEventListener('input', calc));

$('#toolbar').innerHTML = `
  <button class="gz-btn gz-btn-secondary" id="btnCopy">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" id="btnExample">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" id="btnReset">${t('reset')}</button>`;

$('#btnCopy').onclick = () => {
  const txt = `${t('toolTitle')}\n${t('regLbl')}: ${$('#sumReg').textContent}\n${t('otLbl')}: ${$('#sumOT').textContent}\n${t('totalLbl')}: ${$('#sumTotal').textContent}\n${t('payLbl')}: ${$('#sumPay').textContent}`;
  copyText(txt);
};
$('#btnExample').onclick = () => {
  const data = [['9:00','17:00',1],['9:00','17:00',1],['9:00','17:00',1],['9:00','17:00',1],['9:00','18:30',1],['',' ',0],['',' ',0]];
  for (let i = 0; i < 7; i++) {
    document.querySelector(`.ts-in[data-day="${i}"]`).value = data[i][0];
    document.querySelector(`.ts-out[data-day="${i}"]`).value = data[i][1];
    document.querySelector(`.ts-break[data-day="${i}"]`).value = data[i][2];
  }
  calc();
};
$('#btnReset').onclick = () => {
  for (let i = 0; i < 7; i++) {
    document.querySelector(`.ts-in[data-day="${i}"]`).value = '';
    document.querySelector(`.ts-out[data-day="${i}"]`).value = '';
    document.querySelector(`.ts-break[data-day="${i}"]`).value = 0;
    document.querySelector(`.ts-hours[data-day="${i}"]`).value = '';
  }
  calc();
};

calc();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'💰', href:'/calc/salary-calculator.html', name:'Salary Calculator'},
    {icon:'⏰', href:'/calc/hours-calculator.html', name:'Hours Calculator'},
    {icon:'🧾', href:'/calc/time-card.html', name:'Time Card Calculator'},
    {icon:'💵', href:'/calc/payroll-calculator.html', name:'Overtime Pay'},
  ]
});
</script>
<script src="/tools-result-rec.js?v=20260707v520" defer></script>
</body>
