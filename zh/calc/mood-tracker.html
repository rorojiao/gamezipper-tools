<style>
.mt-wrap{display:grid;grid-template-columns:1fr;gap:16px;margin-top:8px}

.mt-card h3{margin:0 0 10px;font-size:1.05rem}
.mt-pickers{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin:8px 0 14px}
.mt-mood{display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 14px;border-radius:14px;border:2px solid transparent;background:rgba(255,255,255,.04);cursor:pointer;transition:transform .12s,border-color .15s;min-width:74px}
.mt-mood:hover{transform:translateY(-2px)}
.mt-mood .e{font-size:2rem;line-height:1}
.mt-mood .n{font-size:.72rem;color:var(--text2,#aaa)}
.mt-mood.sel{border-color:var(--accent,#4ecdc4);background:rgba(78,205,196,.12)}
.mt-tags{display:flex;gap:6px;flex-wrap:wrap;margin:6px 0 12px;justify-content:center}

.mt-tag.sel{background:var(--accent,#4ecdc4);color:#08131a;border-color:transparent;font-weight:600}
.mt-note{width:100%;min-height:80px;padding:11px 14px;border-radius:10px;border:1px solid var(--border,#333);background:var(--surface,#1e1e2e);color:var(--text,#eee);font-size:.9rem;font-family:inherit;resize:vertical;box-sizing:border-box}

.mt-cal{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-top:10px}
.mt-dow{font-size:.7rem;color:var(--text2,#aaa);text-align:center;padding-bottom:2px;text-transform:uppercase}
.mt-day{aspect-ratio:1;border-radius:8px;background:rgba(255,255,255,.04);display:flex;align-items:center;justify-content:center;font-size:1rem;position:relative;cursor:default}
.mt-day.empty{background:transparent}
.mt-day.future{opacity:.35}
.mt-day .num{position:absolute;top:3px;left:5px;font-size:.62rem;color:var(--text2,#888)}
.mt-nav{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.mt-nav button{background:rgba(255,255,255,.06);border:1px solid var(--border,#333);color:var(--text,#eee);border-radius:8px;padding:6px 12px;cursor:pointer}
.mt-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px}

.mt-stat .v{font-size:1.4rem;font-weight:800;color:var(--accent,#4ecdc4)}
.mt-stat .l{font-size:.75rem;color:var(--text2,#aaa);margin-top:3px;text-transform:uppercase;letter-spacing:.5px}
.mt-chart{display:flex;align-items:flex-end;gap:3px;height:120px;margin-top:10px;padding:0 4px}
.mt-bar{flex:1;background:linear-gradient(to top,rgba(255,255,255,.1),rgba(255,255,255,.25));border-radius:4px 4px 0 0;min-height:2px;transition:height .25s;position:relative}
.mt-bar:hover::after{content:attr(data-tip);position:absolute;bottom:100%;left:50%;transform:translateX(-50%);background:var(--surface,#1e1e2e);color:var(--text,#eee);padding:3px 7px;border-radius:5px;font-size:.7rem;white-space:nowrap;border:1px solid var(--border,#333)}
.mt-history{max-height:260px;overflow:auto;margin-top:6px}
.mt-hrow{display:flex;align-items:center;gap:10px;padding:8px 6px;border-bottom:1px solid rgba(255,255,255,.05);font-size:.85rem}
.mt-hrow .e{font-size:1.4rem}
.mt-hrow .d{color:var(--text2,#aaa);min-width:90px;font-size:.8rem}
.mt-hrow .nt{flex:1;color:var(--text,#eee)}
.mt-hrow .tg{font-size:.7rem;color:var(--accent,#4ecdc4);background:rgba(78,205,196,.1);padding:2px 7px;border-radius:10px}
.mt-hrow .del{background:transparent;border:none;color:var(--text2,#888);cursor:pointer;font-size:.95rem;padding:2px 6px}
.mt-export{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}

@media(max-width:600px){.mt-mood{min-width:60px;padding:8px 10px}.mt-mood .e{font-size:1.6rem}}

<script>
GZI18n.register({
  en: {
    toolTitle: 'Mood Tracker',
    toolDesc: 'Log how you feel each day with emojis, tags and notes. See trends on a calendar and chart. Private — everything stays in your browser.',
    m1: 'Awful', m2: 'Bad', m3: 'Okay', m4: 'Good', m5: 'Great',
    notePh: 'What happened today? (optional)',
    today: 'How do you feel today?',
    save: 'Save entry',
    saved: '✓ Saved',
    statsTitle: 'Last 30 days',
    historyTitle: 'History',
    avg: 'Avg mood',
    entries: 'Entries',
    streak: 'Day streak',
    best: 'Best tag',
    jsonBtn: 'Export JSON',
    csvBtn: 'Export CSV',
    clearBtn: 'Clear all data',
    dow: ['Su','Mo','Tu','We','Th','Fr','Sa'],
    months: ['January','February','March','April','May','June','July','August','September','October','November','December'],
    tags: ['work','family','friends','exercise','sleep','food','travel','health','money','love','creative','rest'],
    noData: 'No entries yet — log today to begin',
    step1: 'Tap the emoji that matches how you feel today',
    step2: 'Optionally pick tags for what influenced your mood and add a short note',
    step3: 'Press Save — your entry appears on the calendar and chart instantly',
    step4: 'Scroll the history list, export backups or clear data anytime — all stored locally',
  },
  zh: {
    toolTitle: '心情追踪器',
    toolDesc: '每天用 Emoji、标签和笔记记录心情，在日历和图表上查看趋势。完全私密 — 所有数据只保存在你的浏览器中。',
    m1: '糟糕', m2: '不好', m3: '一般', m4: '不错', m5: '很棒',
    notePh: '今天发生了什么？（可选）',
    today: '今天心情如何？',
    save: '保存记录',
    saved: '✓ 已保存',
    statsTitle: '最近 30 天',
    historyTitle: '历史记录',
    avg: '平均心情',
    entries: '记录数',
    streak: '连续天数',
    best: '最佳标签',
    jsonBtn: '导出 JSON',
    csvBtn: '导出 CSV',
    clearBtn: '清空全部数据',
    dow: ['日','一','二','三','四','五','六'],
    months: ['1 月','2 月','3 月','4 月','5 月','6 月','7 月','8 月','9 月','10 月','11 月','12 月'],
    tags: ['工作','家庭','朋友','运动','睡眠','饮食','旅行','健康','财务','爱情','创意','休息'],
    noData: '还没有记录 — 从今天开始吧',
    step1: '点击与今天心情最相符的 Emoji',
    step2: '可选选择影响心情的标签并添加简短笔记',
    step3: '点击「保存」— 记录立即显示在日历和图表中',
    step4: '可滚动查看历史、导出备份或清空数据 — 全部本地保存',
  }
});

const { $, t } = GZ;

const MOODS = [
  { v: 1, e: '😢', k: 'm1', color: '#e57373' },
  { v: 2, e: '😕', k: 'm2', color: '#ffb74d' },
  { v: 3, e: '😐', k: 'm3', color: '#fff176' },
  { v: 4, e: '🙂', k: 'm4', color: '#aed581' },
  { v: 5, e: '😄', k: 'm5', color: '#66bb6a' },
];

let ENTRIES = {};
try { const s = localStorage.getItem('gz-mood'); if (s) ENTRIES = JSON.parse(s); } catch(e) {}

let cur = {
  mood: null,
  tags: [],
  note: '',
};

let viewYear, viewMonth;
const today = new Date();
viewYear = today.getFullYear();
viewMonth = today.getMonth();

const pad = n => String(n).padStart(2, '0');
const dateKey = d => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
function parseKey(k) { const [y,m,d] = k.split('-').map(Number); return new Date(y, m-1, d); }

function loadToday() {
  const k = dateKey(today);
  const e = ENTRIES[k];
  if (e) { cur.mood = e.mood; cur.tags = e.tags || []; cur.note = e.note || ''; }
}

function renderPicker() {
  $('#moodPicker').innerHTML = MOODS.map(m =>
    `<div class="mt-mood${cur.mood === m.v ? ' sel' : ''}" data-v="${m.v}"><span class="e">${m.e}</span><span class="n">${t(m.k)}</span></div>`
  ).join('');
  document.querySelectorAll('#moodPicker .mt-mood').forEach(el => {
    el.addEventListener('click', () => { cur.mood = +el.dataset.v; renderPicker(); });
  });
  const tagList = t('tags');
  $('#tagPicker').innerHTML = tagList.map(tg =>
    `<button class="mt-tag${cur.tags.includes(tg) ? ' sel' : ''}" data-tag="${tg}">${tg}</button>`
  ).join('');
  document.querySelectorAll('#tagPicker .mt-tag').forEach(el => {
    el.addEventListener('click', () => {
      const tg = el.dataset.tag;
      cur.tags = cur.tags.includes(tg) ? cur.tags.filter(x => x !== tg) : [...cur.tags, tg];
      renderPicker();
    });
  });
  $('#note').value = cur.note;
  $('#note').placeholder = t('notePh');
}

function save() {
  if (!cur.mood) { $('#savedMsg').textContent = '⚠ ' + t('m3'); return; }
  const k = dateKey(today);
  ENTRIES[k] = { mood: cur.mood, tags: cur.tags, note: cur.note, ts: Date.now() };
  try { localStorage.setItem('gz-mood', JSON.stringify(ENTRIES)); } catch(e) {}
  $('#savedMsg').textContent = t('saved');
  setTimeout(() => $('#savedMsg').textContent = '', 1800);
  renderAll();
}

function renderCalendar() {
  const first = new Date(viewYear, viewMonth, 1);
  const last = new Date(viewYear, viewMonth + 1, 0);
  const startDow = first.getDay();
  const days = last.getDate();
  $('#monthLabel').textContent = t('months')[viewMonth] + ' ' + viewYear;
  let html = t('dow').map(d => `<div class="mt-dow">${d}</div>`).join('');
  for (let i = 0; i < startDow; i++) html += '<div class="mt-day empty"></div>';
  const nowKey = dateKey(today);
  for (let d = 1; d <= days; d++) {
    const date = new Date(viewYear, viewMonth, d);
    const k = dateKey(date);
    const e = ENTRIES[k];
    const mood = e ? MOODS.find(m => m.v === e.mood) : null;
    const isFuture = k > nowKey;
    let bg = '';
    if (mood) bg = `background:${mood.color}33;border-color:${mood.color}66;`;
    html += `<div class="mt-day${isFuture ? ' future' : ''}" style="${bg}" title="${e ? (e.note || '') : ''}"><span class="num">${d}</span>${mood ? mood.e : ''}</div>`;
  }
  $('#cal').innerHTML = html;
}

function renderStats() {
  const keys = Object.keys(ENTRIES).sort();
  const last30 = keys.slice(-30);
  const vals = last30.map(k => ENTRIES[k].mood);
  const avg = vals.length ? (vals.reduce((a,b)=>a+b,0) / vals.length) : 0;
  // streak
  let streak = 0;
  const tk = today;
  while (true) {
    const k = dateKey(tk);
    if (ENTRIES[k]) { streak++; tk.setDate(tk.getDate() - 1); }
    else break;
  }
  // best tag
  const tagCount = {};
  last30.forEach(k => (ENTRIES[k].tags || []).forEach(tg => tagCount[tg] = (tagCount[tg] || 0) + 1));
  const best = Object.entries(tagCount).sort((a,b)=>b[1]-a[1])[0];
  $('#stats').innerHTML = `
    <div class="mt-stat"><div class="v">${avg ? avg.toFixed(1) : '—'}</div><div class="l">${t('avg')}</div></div>
    <div class="mt-stat"><div class="v">${last30.length}</div><div class="l">${t('entries')}</div></div>
    <div class="mt-stat"><div class="v">${streak}</div><div class="l">${t('streak')}</div></div>
    <div class="mt-stat"><div class="v" style="font-size:1.1rem">${best ? best[0] : '—'}</div><div class="l">${t('best')}</div></div>`;
  // chart last 14 days
  const last14 = keys.slice(-14);
  $('#chart').innerHTML = last14.map(k => {
    const m = ENTRIES[k].mood;
    const h = (m / 5) * 100;
    const mood = MOODS.find(x => x.v === m);
    return `<div class="mt-bar" style="height:${h}%;background:${mood.color}" data-tip="${k}: ${t(mood.k)}"></div>`;
  }).join('') || '<div style="color:var(--text2,#aaa);font-size:.85rem;width:100%;text-align:center;align-self:center">' + t('noData') + '</div>';
}

function renderHistory() {
  const keys = Object.keys(ENTRIES).sort().reverse();
  if (!keys.length) {
    $('#history').innerHTML = `<div style="color:var(--text2,#aaa);font-size:.85rem;padding:14px;text-align:center">${t('noData')}</div>`;
    return;
  }
  $('#history').innerHTML = keys.slice(0, 60).map(k => {
    const e = ENTRIES[k];
    const mood = MOODS.find(m => m.v === e.mood);
    const date = parseKey(k);
    const ds = date.toLocaleDateString();
    const tags = (e.tags || []).map(tg => `<span class="tg">${tg}</span>`).join(' ');
    return `<div class="mt-hrow"><span class="e">${mood.e}</span><span class="d">${ds}</span><span class="nt">${e.note || ''}</span>${tags}<button class="del" data-k="${k}" title="×">×</button></div>`;
  }).join('');
  document.querySelectorAll('#history .del').forEach(b => {
    b.addEventListener('click', () => { delete ENTRIES[b.dataset.k]; localStorage.setItem('gz-mood', JSON.stringify(ENTRIES)); renderAll(); });
  });
}

function exportJson() {
  const blob = new Blob([JSON.stringify(ENTRIES, null, 2)], { type: 'application/json' });
  downloadBlob(blob, 'mood-tracker.json');
}
function exportCsv() {
  const rows = [['date','mood_value','mood_label','tags','note']];
  Object.keys(ENTRIES).sort().forEach(k => {
    const e = ENTRIES[k];
    const m = MOODS.find(x => x.v === e.mood);
    rows.push([k, e.mood, m.k, (e.tags || []).join('|'), (e.note || '').replace(/"/g,'""')]);
  });
  const csv = rows.map(r => r.map(c => `"${c}"`).join(',')).join('\n');
  downloadBlob(new Blob([csv], { type: 'text/csv' }), 'mood-tracker.csv');
}
function downloadBlob(blob, name) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = name; document.body.appendChild(a); a.click();
  setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 200);
}
function clearAll() {
  if (!confirm('Clear all mood data?')) return;
  ENTRIES = {};
  localStorage.removeItem('gz-mood');
  cur = { mood: null, tags: [], note: '' };
  renderPicker();
  renderAll();
}

function renderAll() {
  renderCalendar();
  renderStats();
  renderHistory();
}

// Labels
$('#todayTitle').textContent = t('today');
$('#statsTitle').textContent = t('statsTitle');
$('#historyTitle').textContent = t('historyTitle');
$('#btnSave').textContent = t('save');
$('#btnJson').textContent = t('jsonBtn');
$('#btnCsv').textContent = t('csvBtn');
$('#btnClear').textContent = t('clearBtn');

$('#btnSave').addEventListener('click', save);
$('#note').addEventListener('input', e => cur.note = e.target.value);
$('#prevMonth').addEventListener('click', () => { viewMonth--; if (viewMonth < 0) { viewMonth = 11; viewYear--; } renderCalendar(); });
$('#nextMonth').addEventListener('click', () => { viewMonth++; if (viewMonth > 11) { viewMonth = 0; viewYear++; } renderCalendar(); });
$('#btnJson').addEventListener('click', exportJson);
$('#btnCsv').addEventListener('click', exportCsv);
$('#btnClear').addEventListener('click', clearAll);

loadToday();
renderPicker();
renderAll();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🙏', href:'/text/gratitude-journal.html', name:'Gratitude Journal'},
    {icon:'✅', href:'/fun/habit-tracker.html', name:'Habit Tracker'},
    {icon:'😌', href:'/fun/box-breathing.html', name:'Box Breathing'},
    {icon:'😴', href:'/calc/sleep-calculator.html', name:'Sleep Calculator'},
    {icon:'💧', href:'/calc/water-intake.html', name:'Water Intake'},
  ]
});
</script>
