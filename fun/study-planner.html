<style>
.study-layout{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:700px){.study-layout{grid-template-columns:1fr}}
.timer-box{text-align:center;padding:24px;border:1px solid var(--gz-border);border-radius:12px;background:var(--gz-card)}
.timer-ring{width:200px;height:200px;margin:0 auto 16px;position:relative}
.timer-ring svg{width:100%;height:100%;transform:rotate(-90deg)}
.timer-ring circle{fill:none;stroke-width:8}
.timer-ring .track{stroke:var(--gz-border)}
.timer-ring .progress{stroke:var(--gz-accent);stroke-linecap:round;transition:stroke-dashoffset .5s}
.timer-ring .time-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:2em;font-weight:700}
.timer-label{font-size:1em;margin-bottom:8px;font-weight:600}
.timer-controls{display:flex;gap:8px;justify-content:center;margin-top:12px}
.session-info{margin-top:12px;font-size:.85em;opacity:.7}
.subjects-box{padding:16px;border:1px solid var(--gz-border);border-radius:12px;background:var(--gz-card)}
.subjects-box h3{margin:0 0 10px;font-size:1em}
.subject-item{display:flex;align-items:center;gap:8px;padding:8px;border:1px solid var(--gz-border);border-radius:8px;margin-bottom:6px;cursor:pointer;transition:all .2s}
.subject-item:hover{border-color:var(--gz-accent)}
.subject-item.active{border-color:var(--gz-accent);background:rgba(78,205,196,.1)}
.subject-item .color-dot{width:12px;height:12px;border-radius:50%}
.subject-item .name{flex:1}
.subject-item .time{font-size:.8em;opacity:.7}
.add-subject{display:flex;gap:6px;margin-top:8px}
.add-subject input{flex:1;padding:6px 10px;border:1px solid var(--gz-border);border-radius:6px;background:var(--gz-bg);color:var(--gz-text)}
.stats-box{grid-column:1/-1;padding:16px;border:1px solid var(--gz-border);border-radius:12px;background:var(--gz-card)}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-top:10px}
.stat-card{text-align:center;padding:10px;border-radius:8px}
.stat-card .val{font-size:1.5em;font-weight:700}
.stat-card .lbl{font-size:.75em;opacity:.6}
</style>

<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is the Pomodoro technique?", "acceptedAnswer": {"@type": "Answer", "text": "The Pomodoro technique involves studying in focused 25-minute blocks followed by 5-minute breaks. After 4 sessions, take a longer 15-30 minute break."}}, {"@type": "Question", "name": "Can I customize the timer durations?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. You can set custom study duration (1-120 min), short break (1-30 min), and long break (5-60 min) to match your preferred study rhythm."}}, {"@type": "Question", "name": "Does the timer work in the background?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. The timer continues running even when the tab is in the background. You will hear an audio alert when the timer ends."}}, {"@type": "Question", "name": "Can I track multiple subjects?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. Add as many subjects as you like and switch between them. The timer tracks time spent on each subject separately."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="study-layout">
      <div class="timer-box">
        <div class="timer-label" id="timerLabel"></div>
        <div class="timer-ring">
          <svg viewBox="0 0 120 120">
            <circle class="track" cx="60" cy="60" r="54"/>
            <circle class="progress" id="progressRing" cx="60" cy="60" r="54" stroke-dasharray="339.292" stroke-dashoffset="0"/>
          </svg>
          <div class="time-text" id="timeDisplay">25:00</div>
        </div>
        <div class="timer-controls">
          <button class="gz-btn" id="startBtn" onclick="toggleTimer()"></button>
          <button class="gz-btn gz-btn-secondary" onclick="skipPhase()">⏭</button>
          <button class="gz-btn gz-btn-secondary" onclick="resetTimer()">↺</button>
        </div>
        <div class="session-info" id="sessionInfo"></div>
        <div style="margin-top:12px;display:flex;gap:6px;justify-content:center;flex-wrap:wrap;font-size:.85em">
          <label id="lbl-study"></label><input type="number" id="studyMin" value="25" min="1" max="120" style="width:50px">
          <label id="lbl-short"></label><input type="number" id="shortMin" value="5" min="1" max="30" style="width:50px">
          <label id="lbl-long"></label><input type="number" id="longMin" value="15" min="5" max="60" style="width:50px">
        </div>
      </div>
      <div class="subjects-box">
        <h3 id="subjectsTitle"></h3>
        <div id="subjectsList"></div>
        <div class="add-subject">
          <input type="text" id="newSubject" placeholder="New subject...">
          <button class="gz-btn gz-btn-secondary" onclick="addSubject()">+</button>
        </div>
      </div>
      <div class="stats-box">
        <h3 id="statsTitle"></h3>
        <div class="stats-grid" id="statsGrid"></div>
      </div>
    </div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Study Planner & Timer',
    toolDesc: 'Plan study sessions with a Pomodoro timer, subject tracking and break management. Boost your productivity with focused study blocks.',
    focus: 'Focus Time',
    shortBreak: 'Short Break',
    longBreak: 'Long Break',
    start: '▶ Start',
    pause: '⏸ Pause',
    session: 'Session',
    subjects: '📚 Subjects',
    stats: '📊 Today\'s Stats',
    totalFocus: 'Total Focus',
    sessions: 'Sessions',
    longest: 'Longest Streak',
    studyMin: 'Study',
    shortBreakMin: 'Short',
    longBreakMin: 'Long',
    step1: 'Add your study subjects in the right panel',
    step2: 'Set your preferred study and break durations',
    step3: 'Click Start to begin a focus session',
    step4: 'Take breaks when prompted and track your progress',
  },
  zh: {
    toolTitle: '学习计划器 & 计时器',
    toolDesc: '使用番茄钟计时器规划学习，追踪科目和休息时间。专注学习提升效率。',
    focus: '专注时间',
    shortBreak: '短休息',
    longBreak: '长休息',
    start: '▶ 开始',
    pause: '⏸ 暂停',
    session: '第',
    subjects: '📚 科目',
    stats: '📊 今日统计',
    totalFocus: '总专注',
    sessions: '会话数',
    longest: '最长连续',
    studyMin: '学习',
    shortBreakMin: '短休',
    longBreakMin: '长休',
    step1: '在右侧面板添加学习科目',
    step2: '设置你偏好的学习和休息时长',
    step3: '点击开始进入专注模式',
    step4: '按时休息并追踪你的学习进度',
  }
});

const { $, t } = GZ;

const subjectColors = ['#4ecdc4','#ff6b6b','#ffc107','#6495ed','#e91e63','#9c27b0','#ff9800','#4caf50'];
let subjects = [
  {name:'Math', time:0, color:subjectColors[0]},
  {name:'English', time:0, color:subjectColors[1]},
  {name:'Science', time:0, color:subjectColors[2]},
];
let activeSubject = 0;
let totalFocusTime = 0;
let totalSessions = 0;
let longestStreak = 0;
let currentStreak = 0;

// Timer state
let phase = 'focus'; // focus, short, long
let running = false;
let remaining = 25 * 60;
let total = 25 * 60;
let timerInterval = null;

const circumference = 2 * Math.PI * 54;

$('#lbl-study').textContent = t('studyMin');
$('#lbl-short').textContent = t('shortBreakMin');
$('#lbl-long').textContent = t('longBreakMin');
$('#subjectsTitle').textContent = t('subjects');
$('#statsTitle').textContent = t('stats');

$('#startBtn').textContent = t('start');
$('#timerLabel').textContent = t('focus');

function renderSubjects() {
  const list = $('#subjectsList');
  list.innerHTML = subjects.map((s, i) => `
    <div class="subject-item ${i===activeSubject?'active':''}" onclick="selectSubject(${i})">
      <div class="color-dot" style="background:${s.color}"></div>
      <span class="name">${s.name}</span>
      <span class="time">${formatTime(s.time)}</span>
    </div>
  `).join('');
}

function selectSubject(i) {
  activeSubject = i;
  renderSubjects();
}

function addSubject() {
  const name = $('#newSubject').value.trim();
  if (!name) return;
  subjects.push({name, time:0, color:subjectColors[subjects.length % subjectColors.length]});
  $('#newSubject').value = '';
  renderSubjects();
}

function formatTime(sec) {
  const h = Math.floor(sec/3600);
  const m = Math.floor((sec%3600)/60);
  if (h > 0) return `${h}h ${m}m`;
  return `${m}m`;
}

function updateDisplay() {
  const min = Math.floor(remaining / 60);
  const sec = remaining % 60;
  $('#timeDisplay').textContent = `${String(min).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;

  const progress = total > 0 ? (total - remaining) / total : 0;
  const offset = circumference * (1 - progress);
  $('#progressRing').style.strokeDashoffset = offset;

  const colors = {focus:'var(--gz-accent)', short:'var(--gz-success)', long:'#6495ed'};
  $('#progressRing').style.stroke = colors[phase] || 'var(--gz-accent)';
  $('#sessionInfo').textContent = `${t('session')} ${totalSessions + 1}`;
}

function toggleTimer() {
  if (running) {
    pauseTimer();
  } else {
    startTimer();
  }
}

function startTimer() {
  if (remaining <= 0) resetTimer();
  running = true;
  $('#startBtn').textContent = t('pause');
  timerInterval = setInterval(() => {
    remaining--;
    if (phase === 'focus') {
      totalFocusTime++;
      if (subjects[activeSubject]) subjects[activeSubject].time++;
      currentStreak++;
      if (currentStreak > longestStreak) longestStreak = currentStreak;
    }
    updateDisplay();
    updateStats();
    renderSubjects();
    if (remaining <= 0) {
      phaseComplete();
    }
  }, 1000);
}

function pauseTimer() {
  running = false;
  clearInterval(timerInterval);
  $('#startBtn').textContent = t('start');
}

function phaseComplete() {
  pauseTimer();
  playBeep();
  if (phase === 'focus') {
    totalSessions++;
    if (totalSessions % 4 === 0) {
      phase = 'long';
      total = (+$('#longMin').value || 15) * 60;
    } else {
      phase = 'short';
      total = (+$('#shortMin').value || 5) * 60;
    }
  } else {
    phase = 'focus';
    total = (+$('#studyMin').value || 25) * 60;
  }
  remaining = total;
  const labels = {focus: t('focus'), short: t('shortBreak'), long: t('longBreak')};
  $('#timerLabel').textContent = labels[phase];
  updateDisplay();
  updateStats();
}

function skipPhase() {
  pauseTimer();
  phaseComplete();
}

function resetTimer() {
  pauseTimer();
  phase = 'focus';
  total = (+$('#studyMin').value || 25) * 60;
  remaining = total;
  currentStreak = 0;
  $('#timerLabel').textContent = t('focus');
  updateDisplay();
}

function updateStats() {
  $('#statsGrid').innerHTML = `
    <div class="stat-card" style="background:rgba(78,205,196,.1)"><div class="val">${formatTime(totalFocusTime)}</div><div class="lbl">${t('totalFocus')}</div></div>
    <div class="stat-card" style="background:rgba(255,107,107,.1)"><div class="val">${totalSessions}</div><div class="lbl">${t('sessions')}</div></div>
    <div class="stat-card" style="background:rgba(255,193,7,.1)"><div class="val">${formatTime(longestStreak)}</div><div class="lbl">${t('longest')}</div></div>
  `;
}

function playBeep() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.frequency.value = 800;
    gain.gain.value = 0.3;
    osc.start();
    osc.stop(ctx.currentTime + 0.3);
  } catch(e) {}
}

// Init
renderSubjects();
updateDisplay();
updateStats();

GZ.renderToolPage({
  related: [
    {icon:'⏰', href:'/fun/countdown.html', name:'Countdown Timer'},
    
    {icon:'⏱️', href:'/fun/stopwatch.html', name:'Stopwatch'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
