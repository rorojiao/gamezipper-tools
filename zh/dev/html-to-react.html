const { $, copyText, t } = GZ;

function escapeHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// React void elements that must self-close in JSX
const VOID_TAGS = new Set(['area','base','br','col','embed','hr','img','input','link','meta','param','source','track','wbr']);

function rewriteClassFor(html){
  // class -> className
  return html.replace(/\bclass\s*=\s*"/gi, 'className="');
}

function rewriteForAttr(html){
  // for -> htmlFor (only on label attribute)
  return html.replace(/\bfor\s*=\s*"/gi, 'htmlFor="');
}

function rewriteEvents(html){
  const map = {
    'onclick':'onClick','onmouseover':'onMouseOver','onmouseout':'onMouseOut',
    'onmousedown':'onMouseDown','onmouseup':'onMouseUp','onmousemove':'onMouseMove',
    'oninput':'onInput','onchange':'onChange','onsubmit':'onSubmit',
    'onkeydown':'onKeyDown','onkeyup':'onKeyUp','onkeypress':'onKeyPress',
    'onfocus':'onFocus','onblur':'onBlur','onload':'onLoad',
    'onerror':'onError','onscroll':'onScroll','onresize':'onResize',
    'ondoubleclick':'onDoubleClick','oncontextmenu':'onContextMenu'
  };
  // Convert onclick="foo()" => onClick={foo}
  //          onclick="foo(a,b)" => onClick={() => foo(a,b)}
  return html.replace(/\son([a-z]+)\s*=\s*"([^"]*)"/gi, (m, name, body) => {
    const camel = 'on' + name.charAt(0).toUpperCase() + name.slice(1).toLowerCase();
    const reactName = map[camel.toLowerCase()] || camel;
    const trimmed = body.trim();
    // Bare function name with optional empty parens => pass as reference
    const ref = trimmed.match(/^([a-zA-Z_$][\w$]*)(\(\))?$/);
    if(ref && !ref[2]){
      return ` ${reactName}={${ref[1]}}`;
    }
    if(ref && ref[2]){
      return ` ${reactName}={${ref[1]}}`;
    }
    // Otherwise wrap in arrow function
    return ` ${reactName}={() => { ${trimmed} }}`;
  });
}

function rewriteStyles(html){
  // style="color:red;font-size:14px" => style={{ color:'red', fontSize:'14px' }}
  return html.replace(/\bstyle\s*=\s*"([^"]*)"/gi, (m, decls) => {
    const pairs = decls.split(';').map(s => s.trim()).filter(Boolean);
    if(pairs.length === 0) return m;
    const props = pairs.map(p => {
      const idx = p.indexOf(':');
      if(idx === -1) return null;
      let key = p.slice(0, idx).trim();
      let val = p.slice(idx+1).trim();
      // kebab-case to camelCase
      key = key.replace(/-([a-z])/g, (_, c) => c.toUpperCase());
      // quote non-numeric values
      if(!/^-?\d+(\.\d+)?$/.test(val) && !/^var\(/.test(val)){
        val = `'${val.replace(/'/g, "\\'")}'`;
      }
      return `${key}: ${val}`;
    }).filter(Boolean);
    return ` style={{ ${props.join(', ')} }}`;
  });
}

function selfCloseVoid(html){
  // <img src="..."> => <img src="..." />
  // Avoid double-closing <img ... />
  return html.replace(/(<(?:img|input|br|hr|meta|link|area|base|col|embed|source|track|wbr)\b[^>]*?)(?<!\/)>/gi, (m, head) => {
    return head.trimEnd() + ' />';
  });
}

function sanitizeJsxText(html){
  // Escape braces in text nodes? Leave as-is; assume user pastes valid HTML.
  // But React JSX text can't contain raw { } — we leave it; rare in pure HTML.
  return html;
}

function convert(){
  let html = $('#input').value.trim();
  if(!html){ $('#output').textContent = ''; $('#status').textContent = ''; return; }
  try {
    const rawName = ($('#comp-name').value.trim() || 'MyComponent');
    const compName = rawName.charAt(0).toUpperCase() + rawName.slice(1).replace(/[^A-Za-z0-9_]/g,'');
    const isTs = $('#opt-lang').value === 'ts';

    if($('#opt-selfclose').checked) html = selfCloseVoid(html);
    // className & htmlFor always (required for valid JSX)
    html = rewriteClassFor(html);
    html = rewriteForAttr(html);
    if($('#opt-events').checked) html = rewriteEvents(html);
    if($('#opt-styles').checked) html = rewriteStyles(html);
    html = sanitizeJsxText(html);

    const indented = html.replace(/\n/g,'\n      ');

    let out;
    if(isTs){
      out = `import React from 'react'\n\ninterface ${compName}Props {\n  // add your props here\n}\n\nexport default function ${compName}(props: ${compName}Props) {\n  return (\n    <>\n      ${indented}\n    </>\n  )\n}\n`;
    } else {
      out = `import React from 'react'\n\nexport default function ${compName}() {\n  return (\n    <>\n      ${indented}\n    </>\n  )\n}\n`;
    }

    $('#output').textContent = out;
    $('#status').innerHTML = `<span style="color:var(--gz-success)">${t('status').replace('{comp}', compName)}</span>`;
  } catch(e){
    $('#output').innerHTML = `<span style="color:var(--gz-accent)">${escapeHtml(e.message)}</span>`;
    $('#status').textContent = '';
  }
}
