    step3: '点击「提取」查找并分类每个卡号',
    step4: '复制列表 — 分享结果时建议启用脱敏',
    note: '⚠ 为安全起见，切勿将真实卡号粘贴到任何网站。本工具仅用于测试、日志分析和 PCI-DSS 审计场景。所有处理均在本地完成 — 不上传任何数据。',

const { $, copyText, t } = GZ;

const CARD_RE = /\b(?:(?:\d{4}[-\s]?){3}\d{4}|\d{4}[-\s]?\d{6}[-\s]?\d{5}|3\d{3}[-\s]?\d{6}[-\s]?\d{5}|(?:\d{4}[-\s]?){2}\d{3,7})\b/g;

function luhn(num){
  const digits = num.replace(/\D/g, '');
  if(digits.length < 12 || digits.length > 19) return false;
  let sum = 0, alt = false;
  for(let i = digits.length - 1; i >= 0; i--){
    let n = parseInt(digits[i], 10);
    if(alt){ n *= 2; if(n > 9) n -= 9; }
    sum += n;
    alt = !alt;
  }
  return sum % 10 === 0;
}

function detectBrand(num){
  const n = num.replace(/\D/g, '');
  if(/^4\d{12}(\d{3})?(\d{3})?$/.test(n)) return {name:'Visa', cls:'brand-visa'};
  if(/^(5[1-5]\d{14}|2(2[2-9]\d{2}|[3-6]\d{3}|7[01]\d{2}|720)\d{12})$/.test(n)) return {name:'Mastercard', cls:'brand-mastercard'};
  if(/^3[47]\d{13}$/.test(n)) return {name:'Amex', cls:'brand-amex'};
  if(/^(6011\d{12}|65\d{14}|64[4-9]\d{13})$/.test(n)) return {name:'Discover', cls:'brand-discover'};
  if(/^3(0[0-5]\d{11}|6\d{12})\d*$/.test(n)) return {name:'Diners', cls:'brand-diners'};
  if(/^35(2[89]|[3-8]\d)\d{12}$/.test(n)) return {name:'JCB', cls:'brand-jcb'};
  if(/^62\d{14,17}$/.test(n)) return {name:'UnionPay', cls:'brand-unionpay'};
  return {name:'Unknown', cls:'brand-unknown'};
}

function maskNum(num){
  const d = num.replace(/\D/g, '');
  if(d.length <= 8) return num;
  return d.slice(0,4) + ' •••• •••• ' + d.slice(-4);
}

let lastResults = [];

function extract(){
  const text = $('#input').value;
  if(!text.trim()){ $('#output').innerHTML=''; $('#stats').style.display='none'; return; }
  const doValidate = $('#opt-validate').checked;
  const dedup = $('#opt-dedup').checked;
  const mask = $('#opt-mask').checked;
  const onlyValid = $('#opt-onlyvalid').checked;

  const matches = text.match(CARD_RE) || [];
  let rows = matches.map(raw => {
    const num = raw.trim();
    const digits = num.replace(/\D/g, '');
    if(digits.length < 12 || digits.length > 19) return null;
    const brand = detectBrand(num);
    const valid = doValidate ? luhn(num) : true;
    return {num, digits, brand, valid};
  }).filter(Boolean);

  if(onlyValid && doValidate){
    rows = rows.filter(r => r.valid);
  }

  if(dedup){
    const seen = new Set();
    rows = rows.filter(r => {
      if(seen.has(r.digits)) return false;
      seen.add(r.digits); return true;
    });
  }

  lastResults = rows;

  if(!rows.length){
    $('#stats').style.display = 'none';
    $('#output').innerHTML = `<div style="padding:14px;color:var(--text2);text-align:center">${t('noCards')}</div>`;
    return;
  }

  const validCount = rows.filter(r=>r.valid).length;
  const invalidCount = rows.length - validCount;
  $('#stats').style.display = '';
  $('#stats').innerHTML = `
    <div class="stat"><div class="v">${rows.length}</div><div class="k">${t('totalFound')}</div></div>
    <div class="stat"><div class="v">${validCount}</div><div class="k">${t('valid')}</div></div>
    <div class="stat"><div class="v" style="color:#e94560">${invalidCount}</div><div class="k">${t('invalid')}</div></div>
    <div class="stat"><div class="v">${new Set(rows.map(r=>r.digits)).size}</div><div class="k">${t('unique')}</div></div>`;

  $('#output').innerHTML = rows.map(r => `
    <div class="card-row">
      <span class="brand-tag ${r.brand.cls}">${r.brand.name}</span>
      <div>
        <div class="${mask?'card-masked':'card-num'}">${mask ? maskNum(r.num) : r.num}</div>
        <div class="card-meta">${r.digits.length} digits${mask ? ' · ' + t('masked') : ''}</div>
      </div>
      ${doValidate ? `<span class="valid-tag ${r.valid?'tag-valid':'tag-invalid'}">${r.valid?t('validLabel'):t('invalidLabel')}</span>` : ''}
    </div>`).join('');
}

function loadExample(){
  $('#input').value = `Test payment log sample:
Visa (test): 4111 1111 1111 1111
Mastercard (test): 5555 5555 5555 4444
Amex (test): 3782 822463 10005
Invalid number: 4111 1111 1111 1112
Discover (test): 6011 1111 1111 1117
Random digits (not a card): 1234 5678 9012 3456
JCB (test): 3530 1113 3330 0000`;
  extract();
}

function doClear(){ $('#input').value=''; $('#output').innerHTML=''; $('#stats').style.display='none'; lastResults = []; }

function copyList(){
  if(!lastResults.length) return;
  copyText(lastResults.map(r => `${r.num}\t${r.brand.name}\t${r.valid?'valid':'invalid'}`).join('\n'));
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="extract()">${t('extract')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn" onclick="copyList()">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

['opt-validate','opt-dedup','opt-mask','opt-onlyvalid'].forEach(id => {
  $('#'+id).addEventListener('change', extract);
});
$('#input').addEventListener('input', extract);

$('#note').textContent = t('note');

</script>
