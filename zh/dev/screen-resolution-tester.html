<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is screen resolution?", "acceptedAnswer": {"@type": "Answer", "text": "Screen resolution is the number of pixels displayed on your screen, expressed as width x height (e.g. 1920x1080). Higher resolutions fit more content but make everything smaller. Common resolutions include Full HD (1920x1080), 4K (3840x2160) and 2560x1440 (QHD)."}}, {"@type": "Question", "name": "What is the difference between screen resolution and viewport size?", "acceptedAnswer": {"@type": "Answer", "text": "Screen resolution is the total pixel dimensions of your physical display. Viewport size is the available space inside the browser window for web content — it is always smaller because it excludes browser chrome, toolbars, scrollbars and the taskbar."}}, {"@type": "Question", "name": "What is device pixel ratio (DPR)?", "acceptedAnswer": {"@type": "Answer", "text": "Device pixel ratio is the ratio between physical pixels and CSS (logical) pixels. On a Retina display with DPR 2, one CSS pixel maps to a 2x2 grid of physical pixels. This makes text and images sharper. Modern phones typically have DPR 2-3."}}, {"@type": "Question", "name": "Why does my resolution show differently in different browsers?", "acceptedAnswer": {"@type": "Answer", "text": "Browsers report CSS pixels, not physical pixels. A 4K screen at 200% Windows scaling will report 1920x1080 CSS pixels even though the physical resolution is 3840x2160. This tool shows both values for clarity."}}]}</script>

<div class="gz-container">

</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Screen Resolution Tester',
    toolDesc: 'Check your screen resolution, viewport size, DPI, pixel ratio, color depth and aspect ratio. Live updates on resize — perfect for responsive design testing.',
    liveViewport: 'Live viewport size — resize your browser to see it change',
    screenRes: 'Screen Resolution',
    viewport: 'Browser Viewport',
    pixelRatio: 'Device Pixel Ratio',
    colorDepth: 'Color Depth',
    aspectRatio: 'Aspect Ratio',
    orientation: 'Orientation',
    availScreen: 'Available Screen',
    breakpointTitle: 'CSS Framework Breakpoints',
    deviceTitle: 'Common Device Resolutions',
    device: 'Device',
    resolution: 'Resolution',
    step1: 'Your screen and viewport info is displayed automatically',
    step2: 'Resize your browser window to see the viewport update live',
    step3: 'Check which CSS breakpoint your current width falls into',
    step4: 'Compare against common device resolutions below',
  },
  zh: {
    toolTitle: '屏幕分辨率检测器',
    toolDesc: '查看屏幕分辨率、视口大小、DPI、像素比、颜色深度和宽高比。调整窗口实时更新 — 适合响应式设计测试。',
    liveViewport: '实时视口大小 — 调整浏览器窗口即可看到变化',
    screenRes: '屏幕分辨率',
    viewport: '浏览器视口',
    pixelRatio: '设备像素比',
    colorDepth: '颜色深度',
    aspectRatio: '宽高比',
    orientation: '屏幕方向',
    availScreen: '可用屏幕区域',
    breakpointTitle: 'CSS 框架断点',
    deviceTitle: '常见设备分辨率',
    device: '设备',
    resolution: '分辨率',
    step1: '屏幕和视口信息已自动显示',
    step2: '调整浏览器窗口可看到视口实时变化',
    step3: '查看当前宽度对应的 CSS 断点',
    step4: '与下方常见设备分辨率对比',
  }
});

const { $, t } = GZ;

function gcd(a, b) { return b === 0 ? a : gcd(b, a % b); }
function aspect(w, h) { const g = gcd(w, h); return `${w/g}:${h/g}`; }

const devices = [
  { name: 'iPhone SE', w: 375, h: 667 },
  { name: 'iPhone 15', w: 393, h: 852 },
  { name: 'iPhone 15 Pro Max', w: 430, h: 932 },
  { name: 'iPad Mini', w: 768, h: 1024 },
  { name: 'iPad Pro 11"', w: 834, h: 1194 },
  { name: 'Samsung Galaxy S24', w: 360, h: 780 },
  { name: 'Pixel 8', w: 412, h: 915 },
  { name: 'Laptop (HD)', w: 1366, h: 768 },
  { name: 'Desktop (Full HD)', w: 1920, h: 1080 },
  { name: 'Desktop (QHD)', w: 2560, h: 1440 },
  { name: 'Desktop (4K)', w: 3840, h: 2160 },
];

const breakpoints = [
  { label: 'xs <576px', w: 576, color: '#ef4444' },
  { label: 'sm 576-768', w: 768, color: '#f59e0b' },
  { label: 'md 768-992', w: 992, color: '#22c55e' },
  { label: 'lg 992-1200', w: 1200, color: '#3b82f6' },
  { label: 'xl ≥1200', w: 1400, color: '#8b5cf6' },
];

function getInfo() {
  const sw = screen.width;
  const sh = screen.height;
  const aw = screen.availWidth;
  const ah = screen.availHeight;
  const vw = window.innerWidth;
  const vh = window.innerHeight;
  const dpr = window.devicePixelRatio || 1;
  const cd = screen.colorDepth || 24;
  const orient = vw > vh ? (t('orientation') === '屏幕方向' ? '横屏' : 'Landscape') : (t('orientation') === '屏幕方向' ? '竖屏' : 'Portrait');
  return { sw, sh, aw, ah, vw, vh, dpr, cd, orient };
}

function render() {
  const info = getInfo();
  const physW = Math.round(info.sw * info.dpr);
  const physH = Math.round(info.sh * info.dpr);

  $('#previewBox').innerHTML = `
    <span class="gz-live-indicator"></span>
    <strong>${t('liveViewport')}</strong>
    <div style="font-size:2rem;font-weight:800;color:var(--gz-accent,#4f8cff);margin-top:8px">${info.vw} × ${info.vh}px</div>
  `;

  $('#infoGrid').innerHTML = `
    <div class="gz-info-card">
      <div class="gz-info-card-label">${t('screenRes')}</div>
      <div class="gz-info-card-value">${info.sw} × ${info.sh}</div>
      <div class="gz-info-card-detail">Physical: ${physW} × ${physH}px</div>
    </div>
    <div class="gz-info-card">
      <div class="gz-info-card-label">${t('viewport')}</div>
      <div class="gz-info-card-value">${info.vw} × ${info.vh}</div>
      <div class="gz-info-card-detail">CSS pixels (live)</div>
    </div>
    <div class="gz-info-card">
      <div class="gz-info-card-label">${t('pixelRatio')}</div>
      <div class="gz-info-card-value">${info.dpr}x</div>
      <div class="gz-info-card-detail">${info.dpr >= 2 ? 'Retina / HiDPI' : 'Standard'}</div>
    </div>
    <div class="gz-info-card">
      <div class="gz-info-card-label">${t('colorDepth')}</div>
      <div class="gz-info-card-value">${info.cd}-bit</div>
      <div class="gz-info-card-detail">${Math.pow(2, info.cd).toExponential(0)} colors</div>
    </div>
    <div class="gz-info-card">
      <div class="gz-info-card-label">${t('aspectRatio')}</div>
      <div class="gz-info-card-value">${aspect(info.sw, info.sh)}</div>
      <div class="gz-info-card-detail">${(info.sw / info.sh).toFixed(2)}:1 ratio</div>
    </div>
    <div class="gz-info-card">
      <div class="gz-info-card-label">${t('orientation')}</div>
      <div class="gz-info-card-value">${info.orient}</div>
      <div class="gz-info-card-detail">${screen.orientation ? screen.orientation.type : ''}</div>
    </div>
    <div class="gz-info-card">
      <div class="gz-info-card-label">${t('availScreen')}</div>
      <div class="gz-info-card-value">${info.aw} × ${info.ah}</div>
      <div class="gz-info-card-detail">Excludes taskbar</div>
    </div>
  `;

  // Breakpoint bar
  let bpHtml = '';
  const maxBp = breakpoints[breakpoints.length-1].w;
  breakpoints.forEach(bp => {
    const pct = (bp.w / maxBp) * 100;
    bpHtml += `<div class="gz-breakpoint-marker" style="left:${pct}%" data-label="${bp.label}"></div>`;
  });
  $('#bpBar').innerHTML = bpHtml;

  // Current breakpoint highlight
  let curBp = breakpoints[0].label;
  for (const bp of breakpoints) {
    if (info.vw >= bp.w) curBp = bp.label;
  }
  $('#bpTitle').textContent = t('breakpointTitle') + ` → ${curBp.split(' ')[0]}`;

  // Device table
  $('#devTitle').textContent = t('deviceTitle');
  let devHtml = `<thead><tr><th>${t('device')}</th><th>${t('resolution')}</th><th>Aspect</th></tr></thead><tbody>`;
  devices.forEach(d => {
    const match = (info.vw === d.w && info.vh === d.h) || (info.sw === d.w && info.sh === d.h);
    devHtml += `<tr${match ? ' class="match"' : ''}><td>${match ? '✅ ' : ''}${d.name}</td><td>${d.w} × ${d.h}</td><td>${aspect(d.w, d.h)}</td></tr>`;
  });
  devHtml += '</tbody>';
  $('#deviceTable').innerHTML = devHtml;
}

window.addEventListener('resize', render);
window.addEventListener('orientationchange', render);

$('#toolbar').innerHTML = `<button class="gz-btn" onclick="render()">↻ Refresh</button>`;
render();

GZ.renderToolPage({
  category: 'dev',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🌐', href:'/dev/browser-info.html', name:'Browser Info'},
    {icon:'📏', href:'/calc/dpi-calculator.html', name:'DPI Calculator'},
    {icon:'📐', href:'/calc/aspect-ratio.html', name:'Aspect Ratio'},
    {icon:'📐', href:'/image/aspect-ratio-visualizer.html', name:'Aspect Ratio Visualizer'},
  ]
});
</script>
<script src="/tools-result-rec.js?v=20260707v520" defer></script>
</body>
</html>
