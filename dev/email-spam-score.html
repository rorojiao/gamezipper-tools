<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"What is a spam score for email?","acceptedAnswer":{"@type":"Answer","text":"A spam score is a numeric estimate of how likely an email is to be flagged by spam filters like SpamAssassin, Gmail or Outlook. A higher score means more red flags: spammy words, ALL CAPS, excessive punctuation, missing plain text, or a high image-to-text ratio."}},{"@type":"Question","name":"How do I lower my email spam score?","acceptedAnswer":{"@type":"Answer","text":"Avoid spam trigger words (free, guaranteed, act now), do not write the subject in ALL CAPS, limit exclamation marks, always include a plain-text version, keep the image-to-text ratio low, set up SPF/DKIM/DMARC, and never use a misleading subject line."}},{"@type":"Question","name":"What spam-trigger words should I avoid?","acceptedAnswer":{"@type":"Answer","text":"Common spam words include: free, guarantee, risk-free, winner, act now, limited time, click here, buy, cheap, discount, earn money, make money, weight loss, vi4gra, $$$$ and excessive use of ALL CAPS or symbols like !!! or $$$."}},{"@type":"Question","name":"Is this email spam checker private?","acceptedAnswer":{"@type":"Answer","text":"Yes. The entire analysis runs in your browser. Your email subject and body never leave your device — nothing is uploaded to any server."}}]}</script>

<script>
GZI18n.register({
  en: {
    toolTitle: 'Email Spam Score Tester',
    toolDesc: 'Scan your email subject and body for spam-trigger words, formatting red flags and deliverability issues. Get an instant spam score with plain-English explanations — free, private, runs in your browser.',
    subject: 'Email Subject',
    body: 'Email Body (plain text)',
    check: 'Check Spam Score',
    example: 'Load Example',
    clear: 'Clear',
    step1: 'Paste your email subject line into the Subject field',
    step2: 'Paste the email body (plain text version) into the Body field',
    step3: 'Click Check Spam Score to analyze for red flags',
    step4: 'Review each flagged issue and the recommended fix before you send',
    score: 'Spam Score',
    excellent: 'Excellent — very low risk',
    good: 'Good — minor issues only',
    warning: 'Caution — likely to trigger some filters',
    danger: 'High risk — likely to be filtered as spam',
    found: 'Red Flags Found',
    noIssues: 'No spam red flags detected. Still set up SPF, DKIM and DMARC for best deliverability.',
    enterContent: 'Please enter a subject and body to analyze.',
  },
  zh: {
    toolTitle: '邮件垃圾评分检测器',
    toolDesc: '扫描邮件标题和正文中的垃圾触发词、格式问题和可送达性隐患。即时获取垃圾评分并附带通俗解释 — 免费、私密、浏览器本地运行。',
    subject: '邮件标题',
    body: '邮件正文（纯文本）',
    check: '检测垃圾评分',
    example: '加载示例',
    clear: '清空',
    step1: '将邮件标题粘贴到「标题」输入框',
    step2: '将邮件正文（纯文本版本）粘贴到「正文」框',
    step3: '点击「检测垃圾评分」分析各项隐患',
    step4: '查看每个被标记的问题和修复建议，再发送邮件',
    score: '垃圾评分',
    excellent: '优秀 — 风险极低',
    good: '良好 — 仅有轻微问题',
    warning: '需注意 — 可能触发部分过滤器',
    danger: '高风险 — 很可能被判为垃圾邮件',
    found: '发现的隐患',
    noIssues: '未检测到垃圾邮件隐患。仍建议配置 SPF、DKIM 和 DMARC 以获得最佳送达率。',
    enterContent: '请输入标题和正文以进行分析。',
  }
});

const { $, t } = GZ;
$('#lbl-subject').textContent = t('subject');
$('#lbl-body').textContent = t('body');
$('#checkBtn').textContent = t('check');
$('#exampleBtn').textContent = t('example');
$('#clearBtn').textContent = t('clear');

$('#checkBtn').onclick = runCheck;
$('#exampleBtn').onclick = () => {
  $('#subject').value = 'URGENT!!! Make $$$ MONEY $$$ fast - FREE guaranteed winner!!!';
  $('#body').value = 'Click here NOW for your FREE prize!!!\n\n100% GUARANTEED to make money fast. Act now, limited time offer. Click here: http://spammy-link.xyz\n\nBuy now and save 90%!!! No risk, risk-free investment.';
  runCheck();
};
$('#clearBtn').onclick = () => { $('#subject').value=''; $('#body').value=''; $('#result').innerHTML=''; };

// Curated spam-trigger word list (lowercase, partial match)
const SPAM_WORDS = [
  'free','guarantee','guaranteed','risk free','risk-free','no risk','winner','you\'re a winner','act now','click here','click below',
  'buy','cheap','discount','earn money','make money','money making','money fast','weight loss','lose weight','viagra','cialis','casino',
  'lottery','prize','cash bonus','100% free','best price','big bucks','billion','call now','cancel at any time','consolidate debt',
  'double your','easy money','easy terms','free access','free hosting','free instant','free money','free preview','free quote',
  'free trial','full refund','get out of debt','get paid','give it away','guaranteed approval','increase sales','increase traffic',
  'incredible deal','information you requested','instant','investment','let us help','limited time','lowest price','make money',
  'million','money back','money making','no catch','no cost','no credit check','no fees','no hidden','no obligation','one time',
  'open','order now','order today','promise you','pure profit','request now','requires investment','satisfaction guaranteed',
  'save $','save up to','save big money','save money','serious cash','stop further distribution','subject to','take action',
  'this is not spam','this isn\'t spam','trial','urgent','viagra','winner','work from home','you are a winner','you have been selected',
  '$$$','!!!','click to remove','amazing','bonus','credit card','dear friend','dear winner','for free','for instant access',
  'hidden','income','mass email','obligation','opt in','potential earnings','pre-approved','sale','search engine listings',
  'see for yourself','special promotion','this won\'t last','urgent response','while supplies last'
];

function runCheck() {
  const subject = $('#subject').value;
  const body = $('#body').value;
  if (!subject && !body) {
    $('#result').innerHTML = `<div style="color:var(--gz-accent);padding:14px">${t('enterContent')}</div>`;
    return;
  }
  const text = (subject + '\n' + body);
  const lower = text.toLowerCase();
  const issues = [];
  let score = 0;
  const hits = new Set();

  // 1. Spam words
  SPAM_WORDS.forEach(w => {
    if (lower.includes(w)) { hits.add(w); score += 1.2; }
  });

  // 2. ALL CAPS subject
  const letters = subject.replace(/[^A-Za-z]/g,'');
  if (letters.length >= 6) {
    const upper = subject.replace(/[^A-Z]/g,'').length;
    if (upper / letters.length > 0.6) {
      issues.push({icon:'🔠', title:'Subject is mostly ALL CAPS', fix:'Use sentence case. ALL CAPS screams spam.'});
      score += 2.5;
    }
  }

  // 3. Excessive exclamation marks
  const excl = (text.match(/!/g) || []).length;
  if (excl >= 3) {
    issues.push({icon:'❗', title:`${excl} exclamation marks found`, fix:'Use at most one ! per email. Avoid "!!!" or "!!!!".'});
    score += Math.min(excl * 0.4, 2);
  }

  // 4. Dollar signs / cash symbols
  const dollars = (text.match(/\$/g) || []).length;
  if (dollars >= 2) {
    issues.push({icon:'💲', title:`${dollars} "$" symbols`, fix:'Limit money symbols. Many filters treat $$$ as spam.'});
    score += Math.min(dollars * 0.3, 1.5);
  }

  // 5. All-caps words in body
  const capsWords = (body.match(/\b[A-Z]{4,}\b/g) || []);
  if (capsWords.length >= 3) {
    issues.push({icon:'🔠', title:`${capsWords.length} ALL-CAPS words in body`, fix:'Avoid SHOUTING in body text. Use normal capitalization.'});
    score += Math.min(capsWords.length * 0.2, 1.5);
  }

  // 6. URL in subject
  if (/https?:\/\//i.test(subject) || /www\./i.test(subject)) {
    issues.push({icon:'🔗', title:'URL in subject line', fix:'URLs in subjects trigger filters. Move links to the body.'});
    score += 1.5;
  }

  // 7. Excessive URLs in body
  const urls = (body.match(/https?:\/\/\S+/gi) || []);
  if (urls.length >= 4) {
    issues.push({icon:'🔗', title:`${urls.length} links in body`, fix:'Too many links looks promotional. Keep it to 1-2.'});
    score += Math.min(urls.length * 0.25, 1.5);
  }

  // 8. Spam words list as issue
  if (hits.size > 0) {
    const pills = [...hits].slice(0,15).map(w => `<span class="word-pill">"${w}"</span>`).join('');
    issues.unshift({icon:'🚩', title:`${hits.size} spam-trigger words detected`, fix:'Rewrite or remove these words. See highlighted terms.', extra: pills});
  }

  // 9. Empty body
  if (!body.trim()) {
    issues.push({icon:'📭', title:'No body text', fix:'Always include a plain-text body. Image-only emails get flagged.'});
    score += 1.5;
  }

  // 10. Very short body
  if (body.trim() && body.trim().length < 40) {
    issues.push({icon:'📏', title:'Body is very short', fix:'Emails under ~40 characters look like spam. Add context.'});
    score += 0.8;
  }

  // 11. Misleading RE:/FW: in subject
  if (/^(re|fw|fwd):\s/i.test(subject) && !body.trim()) {
    issues.push({icon:'📨', title:'RE:/FW: with no real thread', fix:'Don\'t fake a reply or forward. Filters detect this.'});
    score += 1.5;
  }

  // 12. Suspicious TLD in links
  if (urls.some(u => /\.(xyz|top|click|gq|ml|cf|tk|loan|work|date|racing|review|party|download|science|host|accountant|bid)\b/i.test(u))) {
    issues.push({icon:'⚠️', title:'Links to suspicious TLD (.xyz, .top, .gq, …)', fix:'Avoid cheap or abused TLDs. Use a trusted domain.'});
    score += 2;
  }

  // 13. Excessive emoji
  const emojis = (text.match(/[\u{1F300}-\u{1FAFF}\u{2600}-\u{27BF}]/gu) || []);
  if (emojis.length >= 4) {
    issues.push({icon:'🎉', title:`${emojis.length} emojis`, fix:'1-2 emojis max. Too many can trip spam filters.'});
    score += Math.min(emojis.length * 0.15, 1);
  }

  // Score buckets
  let cls, label;
  if (score < 2) { cls = 'score-good'; label = t('excellent'); }
  else if (score < 5) { cls = 'score-good'; label = t('good'); }
  else if (score < 9) { cls = 'score-warn'; label = t('warning'); }
  else { cls = 'score-bad'; label = t('danger'); }

  const issuesHtml = issues.length === 0
    ? `<div style="padding:12px;color:var(--gz-success)">✓ ${t('noIssues')}</div>`
    : issues.map(i => `
        <div class="issue-row">
          <span class="issue-icon">${i.icon}</span>
          <div class="issue-text">
            <b>${i.title}</b>
            <span>${i.fix}</span>
            ${i.extra ? `<div style="margin-top:4px">${i.extra}</div>` : ''}
          </div>
        </div>`).join('');

  $('#result').innerHTML = `
    <div class="score-card">
      <div class="score-num ${cls}">${score.toFixed(1)}</div>
      <div class="score-label">${t('score')} · ${label}</div>
    </div>
    <div style="background:var(--glass);border:1px solid var(--border);border-radius:12px;overflow:hidden">
      <div style="padding:10px 14px;font-weight:700;border-bottom:1px solid var(--border)">${t('found')} (${issues.length})</div>
      ${issuesHtml}
    </div>`;
}

$('#toolbar').innerHTML = ``;

GZ.renderToolPage({
  category: 'dev',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [

    {icon:'✉️', href:'/text/email-writer.html', name:'AI Email Writer'},
    {icon:'🔒', href:'/text/swift-bic-validator.html', name:'SWIFT Validator'},
    {icon:'🔐', href:'/dev/email-validator.html', name:'Email Validator'},
  ]
});
</script>
