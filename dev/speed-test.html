<script>
GZI18n.register({
en:{
toolTitle:'Network Speed Test',
toolDesc:'Test your internet download speed, latency, and connection quality directly in the browser.',
btnStart:'Start Test',
btnStop:'Stop',
statusReady:'Ready',
statusPing:'Testing Latency...',
statusDownload:'Testing Download...',
statusDone:'Test Complete!',

rLatency:'Latency',
rJitter:'Jitter',
rConn:'Connection',
connType:'Type',

step1:'Close other tabs and downloads for accurate results',
step2:'Click Start Test to begin the speed measurement',
step3:'Wait for the latency and download tests to complete',
step4:'Review your download speed, ping, and connection type',
},
zh:{
toolTitle:'网络速度测试',
toolDesc:'在浏览器中直接测试网络下载速度、延迟和连接质量。',
btnStart:'开始测试',
btnStop:'停止',
statusReady:'就绪',
statusPing:'正在测试延迟...',
statusDownload:'正在测试下载速度...',
statusDone:'测试完成！',
rDownload:'下载',
rLatency:'延迟',
rJitter:'抖动',
rConn:'连接',
connType:'类型',
mbps:'Mbps',
ms:'ms',
good:'优秀',
fair:'良好',
slow:'较慢',
step1:'关闭其他标签页和下载任务以获得准确结果',
step2:'点击「开始测试」启动速度测量',
step3:'等待延迟和下载测试完成',
step4:'查看下载速度、延迟和连接类型',
}
});

const { $, t } = GZ;
let isRunning = false;
let abortController = null;

const testFiles = [
  {url:'https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js',size:89000},
  {url:'https://cdn.jsdelivr.net/npm/lodash@4.17.21/lodash.min.js',size:73000},
  {url:'https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css',size:227000},
];

function log(msg) {
  const el = $('#test-log');
  el.innerHTML += msg + '<br>';
  el.scrollTop = el.scrollHeight;
}

function getConnType() {
  const conn = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
  if (conn) {
    return {type: conn.effectiveType || conn.type || 'unknown', downlink: conn.downlink};
  }
  return {type: 'unknown'};
}

async function runPingTest() {
  $('#speed-status').textContent = t('statusPing');
  const pings = [];
  for (let i = 0; i < 5; i++) {
    try {
      const start = performance.now();
      const ctrl = new AbortController();
      await fetch(testFiles[0].url + '?_=' + Date.now() + Math.random(), {cache:'no-store',signal:ctrl.signal,mode:'cors'});
      const end = performance.now();
      pings.push(end - start);
      // Abort immediately, we only needed the connection time
      ctrl.abort();
    } catch(e) {
      // Connection established but abort - still count
    }
  }
  if (pings.length === 0) return {latency: 0, jitter: 0};
  pings.sort((a,b) => a - b);
  const latency = pings[Math.floor(pings.length / 2)];
  const jitter = Math.round(pings.reduce((sum, v, i) => i > 0 ? sum + Math.abs(v - pings[i-1]) : 0, 0) / (pings.length - 1));
  return {latency: Math.round(latency), jitter};
}

async function runDownloadTest() {
  $('#speed-status').textContent = t('statusDownload');
  const speeds = [];
  const totalRounds = 3;
  
  for (let round = 0; round < totalRounds && isRunning; round++) {
    for (const file of testFiles) {
      if (!isRunning) break;
      try {
        const start = performance.now();
        const resp = await fetch(file.url + '?_=' + Date.now() + Math.random(), {cache:'no-store',mode:'cors'});
        const buf = await resp.arrayBuffer();
        const end = performance.now();
        const duration = (end - start) / 1000; // seconds
        const bits = buf.byteLength * 8;
        const mbps = (bits / duration) / 1000000;
        speeds.push(mbps);
        
        // Update display
        const currentSpeed = speeds[speeds.length - 1];
        updateSpeedGauge(currentSpeed);
        log(`Round ${round+1}: ${(currentSpeed).toFixed(1)} Mbps`);
      } catch(e) {
        log('Test chunk error: ' + e.message);
      }
    }
  }
  
  if (speeds.length === 0) return 0;
  // Use median speed
  speeds.sort((a,b) => a - b);
  return speeds[Math.floor(speeds.length / 2)];
}

function updateSpeedGauge(speed) {
  const maxSpeed = 200;
  const pct = Math.min(speed / maxSpeed, 1);
  const circumference = 553;
  const offset = circumference * (1 - pct);
  document.getElementById('progress-circle').style.strokeDashoffset = offset;
  document.getElementById('speed-text').textContent = speed.toFixed(1);
  
  let color = '#e94560';
  if (speed > 50) color = '#00d672';
  else if (speed > 10) color = '#ffd93d';
  document.getElementById('progress-circle').style.stroke = color;
}

async function startTest() {
  if (isRunning) return;
  isRunning = true;
  abortController = new AbortController();
  
  // Reset
  $('#test-log').innerHTML = '';
  document.getElementById('progress-circle').style.strokeDashoffset = 553;
  document.getElementById('speed-text').textContent = '0';
  document.getElementById('speed-status').textContent = '';
  $('#results').style.display = 'none';
  
  $('#toolbar').innerHTML = `<button class="gz-btn" onclick="stopTest()">${t('btnStop')}</button>`;
  
  log('Starting speed test...');
  $('#server-info').textContent = 'CDN: jsdelivr.net';
  
  // Ping test
  const {latency, jitter} = await runPingTest();
  log(`Latency: ${latency}ms, Jitter: ${jitter}ms`);
  
  // Download test
  const downloadSpeed = await runDownloadTest();
  
  // Done
  isRunning = false;
  document.getElementById('speed-status').textContent = t('statusDone');
  updateSpeedGauge(downloadSpeed);
  
  // Show results
  const conn = getConnType();
  $('#results').style.display = 'grid';
  $('#r-download').textContent = downloadSpeed.toFixed(1) + ' ' + t('mbps');
  $('#r-latency').textContent = latency + ' ' + t('ms');
  $('#r-jitter').textContent = jitter + ' ' + t('ms');
  $('#r-conn').textContent = (conn.type || 'N/A').toUpperCase();
  $('#r-download-lbl').textContent = t('rDownload');
  $('#r-latency-lbl').textContent = t('rLatency');
  $('#r-jitter-lbl').textContent = t('rJitter');
  $('#r-conn-lbl').textContent = t('rConn');
  
  $('#toolbar').innerHTML = `<button class="gz-btn" onclick="startTest()">${t('btnStart')}</button>`;
  
  log('Test complete!');
}

function stopTest() {
  isRunning = false;
  document.getElementById('speed-status').textContent = t('statusDone');
  $('#toolbar').innerHTML = `<button class="gz-btn" onclick="startTest()">${t('btnStart')}</button>`;
}

document.getElementById('speed-status').textContent = t('statusReady');

$('#toolbar').innerHTML = `<button class="gz-btn" onclick="startTest()">${t('btnStart')}</button>`;

{icon:'🌐',href:'/dev/dns-lookup.html',name:'DNS Lookup'},
]
});
</script>
