<script>
GZI18n.register({
  en: {
    toolTitle: 'Reverse Words in Text',
    toolDesc: 'Reverse the order of words in each line. Optionally reverse letters within each word, choose a separator, and trim or drop empty lines. Fast and private.',
    sep: 'Word separator:',
    revLetters: 'Reverse letters within each word',
    trim: 'Trim whitespace',
    removeEmpty: 'Remove empty lines',
    step1: 'Paste or type your text in the input area',
    step2: 'Choose a word separator (space, comma, pipe or tab)',
    step3: 'Toggle options like reversing letters or removing empty lines',
    step4: 'Click Copy to copy the reversed-word result',
    faq1q: 'What does this tool do?',
    faq1a: 'It reverses the order of words within each line. For example, "one two three four" becomes "four three two one". Each line is processed independently.',
    faq2q: 'Can I reverse words in a CSV or comma-separated list?',
    faq2a: 'Yes. Set the separator to Comma and the tool will reverse comma-separated fields per line. Pipe and tab separators are also supported.',
    faq3q: 'What does "Reverse letters within each word" do?',
    faq3a: 'In addition to changing word order, it flips the characters of each word, so "hello world" becomes "dlrow olleh".',
  },
  zh: {
    toolTitle: '反转单词顺序',
    toolDesc: '反转每行中单词的顺序。可选择反转每个单词内的字母、设置分隔符、修剪空白或删除空行。快速且私密。',
    sep: '单词分隔符：',
    revLetters: '同时反转每个单词内的字母',
    trim: '去除首尾空白',
    removeEmpty: '删除空行',
    step1: '在输入区粘贴或输入文本',
    step2: '选择单词分隔符（空格、逗号、竖线或制表符）',
    step3: '按需勾选反转字母或删除空行等选项',
    step4: '点击「复制」复制反转后的结果',
    faq1q: '这个工具是做什么的？',
    faq1a: '它反转每行中单词的顺序。例如 "one two three four" 变为 "four three two one"。每行独立处理。',
    faq2q: '可以反转 CSV 或逗号分隔的列表吗？',
    faq2a: '可以。将分隔符设为逗号，工具会逐行反转逗号分隔的字段。也支持竖线和制表符。',
    faq3q: '「反转每个单词内的字母」是什么效果？',
    faq3a: '除了改变单词顺序外，还会翻转每个单词的字符，例如 "hello world" 变为 "dlrow olleh"。',
  }
});

const { $, copyText, t } = GZ;

function getSep() {
  const v = $('#sep').value;
  return v === '\\t' ? '\t' : v;
}

function reverseWords() {
  let text = $('#input').value;
  if (!text) { $('#output').textContent = ''; return; }
  const sep = getSep();
  const revLetters = $('#rev-letters').checked;
  const trim = $('#trim').checked;
  const removeEmpty = $('#remove-empty').checked;
  let lines = text.split(/\r?\n/);
  if (removeEmpty) lines = lines.filter(l => l.trim() !== '');
  const out = lines.map(line => {
    let parts = line.split(sep);
    if (trim) parts = parts.map(p => p.trim());
    parts.reverse();
    if (revLetters) parts = parts.map(p => [...p].reverse().join(''));
    return parts.join(sep);
  });
  $('#output').textContent = out.join('\n');
}

['#input','#sep','#rev-letters','#trim','#remove-empty'].forEach(sel => {
  const el = $(sel);
  el.addEventListener('input', reverseWords);
  if (el.tagName === 'SELECT') el.addEventListener('change', reverseWords);
});

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example') || 'Example'}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#input').value=\'\';reverseWords()">${t('clear')}</button>`;

function loadExample() {
  $('#input').value = 'The quick brown fox\nFirst Second Third Fourth\nApples Bananas Cherries';
  reverseWords();
}

$('#lbl-sep').textContent = t('sep');
$('#lbl-revletters').textContent = t('revLetters');
$('#lbl-trim').textContent = t('trim');
$('#lbl-empty').textContent = t('removeEmpty');

    {icon:'🪞', href:'/text/mirror-text.html', name:'Mirror Text'},
  ]
});
</script>
