<style>
.ub-grid{display:grid;grid-template-columns:1.2fr 1fr;gap:16px;margin-top:14px}
@media(max-width:880px){.ub-grid{grid-template-columns:1fr}}
.ub-card{background:var(--glass2);border:1px solid var(--border);border-radius:14px;padding:18px}
.ub-card h3{font-size:1rem;margin-bottom:12px;color:var(--accent)}
.ub-base label{display:block;font-size:.85rem;color:var(--text2);margin:8px 0 4px}
.ub-base input,.ub-base select{width:100%;padding:9px 12px;background:var(--bg2);color:var(--text);border:1px solid var(--border);border-radius:8px;font-size:.95rem;font-family:monospace}
.ub-params{display:flex;flex-direction:column;gap:8px;margin-top:8px;max-height:380px;overflow-y:auto;padding-right:4px}
.ub-param{display:grid;grid-template-columns:1.2fr 1.6fr auto auto;gap:6px;align-items:center}
.ub-param input{padding:7px 10px;background:var(--bg2);color:var(--text);border:1px solid var(--border);border-radius:6px;font-family:monospace;font-size:.85rem}
.ub-param .cb{display:flex;align-items:center;justify-content:center;width:30px;height:30px;border-radius:6px;background:var(--glass);color:var(--text2);cursor:pointer;border:1px solid var(--border);font-size:.9rem}
.ub-param .cb:hover{background:var(--accent);color:#fff}
.ub-add{background:var(--glass);color:var(--accent);border:1px dashed var(--border);border-radius:8px;padding:9px;width:100%;margin-top:10px;cursor:pointer;font-size:.9rem}
.ub-add:hover{background:var(--accent);color:#fff}
.ub-output{font-family:monospace;font-size:.85rem;word-break:break-all;background:var(--bg2);padding:12px;border-radius:8px;border:1px solid var(--border);max-height:200px;overflow-y:auto;white-space:pre-wrap}
.ub-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin:8px 0}
.ub-row label{font-size:.85rem;color:var(--text2);display:flex;align-items:center;gap:6px}
.ub-actions{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
.ub-actions button{padding:7px 12px;font-size:.85rem}
.ub-parse-result{font-size:.85rem;line-height:1.6;background:var(--bg2);padding:12px;border-radius:8px;border:1px solid var(--border);margin-top:8px;max-height:200px;overflow-y:auto}
.ub-parse-result .k{color:var(--accent);font-weight:600}
.ub-parse-result .v{color:var(--text)}
</style>
<script type="application/ld+json">{"@context":"https://schema.org","@type":"WebApplication","name":"URL Builder","description":"Build URLs with query string parameters visually. Add, edit, remove and reorder URL parameters. Encode values, switch between URL-encoded and plain modes, and copy the result.","url":"https://tools.gamezipper.com/dev/url-builder.html","applicationCategory":"Utility","operatingSystem":"Web Browser","offers":{"@type":"Offer","price":"0"}}</script>
<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is a URL query string?", "acceptedAnswer": {"@type": "Answer", "text": "A query string is the part of a URL that comes after the question mark (?). It contains key=value pairs separated by ampersands (&). For example, in https://example.com/search?q=hello&page=2, the query string is q=hello&page=2, where q and page are parameter names."}}, {"@type": "Question", "name": "What is URL encoding?", "acceptedAnswer": {"@type": "Answer", "text": "URL encoding (percent-encoding) replaces unsafe characters with %XX where XX is the hex byte value. Spaces become %20 or +, ampersands become %26, and so on. This is required so URLs only contain ASCII characters that web servers and browsers can handle reliably."}}, {"@type": "Question", "name": "How many parameters can I add?", "acceptedAnswer": {"@type": "Answer", "text": "There is no hard limit, but practical limits exist: most browsers support URLs up to 2,083 characters, and many servers reject URLs over 8,192 characters. For large data, use POST requests with a body instead of GET query strings."}}, {"@type": "Question", "name": "Can I parse an existing URL?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. Switch to the Parse mode, paste a URL, and the tool will extract the protocol, host, path and query parameters into editable rows that you can modify and rebuild."}}]}</script>
<link rel="alternate" hreflang="en" href="https://tools.gamezipper.com/dev/url-builder.html">
<link rel="alternate" hreflang="zh" href="https://tools.gamezipper.com/zh/dev/url-builder.html">
<link rel="alternate" hreflang="x-default" href="https://tools.gamezipper.com/dev/url-builder.html">

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="mode-tabs" style="display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap">
      <button class="active" data-mode="build" id="tab-build"></button>
      <button data-mode="parse" id="tab-parse"></button>
    </div>

    <div id="mode-build" class="ub-grid">
      <div class="ub-card">
        <h3 id="lbl-base"></h3>
        <div class="ub-base">
          <label id="lbl-proto"></label>
          <select id="protocol">
            <option value="https://">https://</option>
            <option value="http://">http://</option>
            <option value="ftp://">ftp://</option>
            <option value="ws://">ws://</option>
            <option value="wss://">wss://</option>
            <option value="">none</option>
          </select>
          <label id="lbl-host"></label>
          <input type="text" id="host" value="api.example.com" placeholder="example.com">
          <label id="lbl-port"></label>
          <input type="text" id="port" placeholder="8080">
          <label id="lbl-path"></label>
          <input type="text" id="path" value="/v1/search" placeholder="/path/to/resource">
        </div>
      </div>
      <div class="ub-card">
        <h3 id="lbl-params"></h3>
        <div class="ub-params" id="params"></div>
        <button class="ub-add" id="addParam">+ <span id="lbl-add"></span></button>
        <div class="ub-row" style="margin-top:14px">
          <label><input type="checkbox" id="encodeMode" checked> <span id="lbl-encode"></span></label>
          <label><input type="checkbox" id="includeHash"> <span id="lbl-hash"></span></label>
        </div>
        <input type="text" id="hash" placeholder="fragment" style="width:100%;padding:8px;background:var(--bg2);color:var(--text);border:1px solid var(--border);border-radius:6px;margin-top:6px;font-family:monospace;font-size:.85rem">
      </div>
    </div>

    <div class="ub-card" style="margin-top:14px">
      <h3 id="lbl-output"></h3>
      <div class="ub-output" id="output"></div>
      <div class="ub-actions">
        <button class="gz-btn" onclick="copyText($('#output').textContent)"><span id="btn-copy"></span></button>
        <button class="gz-btn gz-btn-secondary" onclick="openUrl()"><span id="btn-open"></span></button>
        <button class="gz-btn gz-btn-secondary" onclick="reset()"><span id="btn-reset"></span></button>
      </div>
    </div>

    <div id="mode-parse" class="ub-card" style="display:none">
      <h3 id="lbl-parse"></h3>
      <textarea id="parseInput" rows="4" style="width:100%;padding:10px;background:var(--bg2);color:var(--text);border:1px solid var(--border);border-radius:8px;font-family:monospace;font-size:.9rem;resize:vertical" placeholder="https://example.com/path?key1=value1&key2=value2#hash"></textarea>
      <div class="ub-actions" style="margin-top:8px">
        <button class="gz-btn" id="btn-parse-go"><span id="lbl-parseBtn"></span></button>
        <button class="gz-btn gz-btn-secondary" onclick="$('#parseInput').value='';$('#parseResult').innerHTML=''"><span id="lbl-parseClear"></span></button>
      </div>
      <div id="parseResult" class="ub-parse-result" style="margin-top:10px"></div>
    </div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'URL Builder & Parser',
    toolDesc: 'Visually build URLs with query string parameters, or paste a URL to parse it into parts. Encode, decode, reorder, copy and open in one click.',
    build: 'Build', parse: 'Parse',
    lblBase: 'Base URL', lblProto: 'Protocol', lblHost: 'Host', lblPort: 'Port (optional)', lblPath: 'Path',
    lblParams: 'Query Parameters', lblAdd: 'Add Parameter',
    lblEncode: 'URL-encode values', lblHash: 'Include hash fragment',
    lblOutput: 'Generated URL', lblParse: 'Parse URL',
    btnCopy: 'Copy', btnOpen: 'Open URL', btnReset: 'Reset',
    lblParseBtn: 'Parse', lblParseClear: 'Clear',
    step1: 'Enter protocol, host, optional port, and path',
    step2: 'Add query parameters with key/value pairs',
    step3: 'Toggle URL-encoding and hash fragment as needed',
    step4: 'Copy the result or paste a URL to parse it instead',
    step5: 'Use the Parse tab to deconstruct any URL into parts',
  },
  zh: {
    toolTitle: 'URL 生成器与解析器',
    toolDesc: '可视化构建带查询参数的 URL，或粘贴 URL 解析其组成部分。编码、解码、排序、复制和打开，一键搞定。',
    build: '构建', parse: '解析',
    lblBase: '基础 URL', lblProto: '协议', lblHost: '主机', lblPort: '端口 (可选)', lblPath: '路径',
    lblParams: '查询参数', lblAdd: '添加参数',
    lblEncode: 'URL 编码值', lblHash: '包含 hash 片段',
    lblOutput: '生成的 URL', lblParse: '解析 URL',
    btnCopy: '复制', btnOpen: '打开 URL', btnReset: '重置',
    lblParseBtn: '解析', lblParseClear: '清空',
    step1: '输入协议、主机、可选端口和路径',
    step2: '使用键值对添加查询参数',
    step3: '根据需要切换 URL 编码和 hash 片段',
    step4: '复制结果或粘贴 URL 切换到解析模式',
    step5: '使用解析标签将任何 URL 拆解成组成部分',
  }
});

const { $, copyText, t } = GZ;
let params = [];
let currentMode = 'build';

function defaultParams() {
  return [
    { key: 'q', value: 'hello world' },
    { key: 'page', value: '1' },
    { key: 'limit', value: '20' },
  ];
}

function renderParams() {
  const container = $('#params');
  container.innerHTML = '';
  params.forEach((p, i) => {
    const row = document.createElement('div');
    row.className = 'ub-param';
    row.innerHTML = `
      <input type="text" value="${escapeAttr(p.key)}" data-i="${i}" data-f="key" placeholder="key">
      <input type="text" value="${escapeAttr(p.value)}" data-i="${i}" data-f="value" placeholder="value">
      <span class="cb" onclick="moveParam(${i},-1)" title="up">▲</span>
      <span class="cb" onclick="moveParam(${i},1)" title="down">▼</span>
      <span class="cb" style="grid-column:1/4;color:var(--gz-accent);justify-self:end" onclick="removeParam(${i})" title="remove">✕</span>
    `;
    container.appendChild(row);
  });
  container.querySelectorAll('input').forEach(inp => {
    inp.addEventListener('input', e => {
      const i = +e.target.dataset.i;
      const f = e.target.dataset.f;
      params[i][f] = e.target.value;
      buildUrl();
    });
  });
}

function escapeAttr(s) {
  return s.replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;');
}

function addParam() {
  params.push({ key: '', value: '' });
  renderParams();
  buildUrl();
  setTimeout(() => {
    const inputs = document.querySelectorAll('#params input[data-f="key"]');
    if (inputs.length) inputs[inputs.length - 1].focus();
  }, 0);
}

function removeParam(i) {
  params.splice(i, 1);
  renderParams();
  buildUrl();
}

function moveParam(i, dir) {
  const j = i + dir;
  if (j < 0 || j >= params.length) return;
  [params[i], params[j]] = [params[j], params[i]];
  renderParams();
  buildUrl();
}

function buildUrl() {
  const proto = $('#protocol').value;
  const host = $('#host').value;
  const port = $('#port').value;
  const path = $('#path').value || '';
  const enc = $('#encodeMode').checked;
  const useHash = $('#includeHash').checked;
  const hash = $('#hash').value;
  const encFn = enc ? encodeURIComponent : (s => s);
  let url = '';
  if (proto) url += proto;
  url += host;
  if (port) url += ':' + port;
  url += path.startsWith('/') ? path : (path ? '/' + path : '');
  const validParams = params.filter(p => p.key.trim());
  if (validParams.length) {
    url += '?' + validParams.map(p => `${encFn(p.key)}=${encFn(p.value)}`).join('&');
  }
  if (useHash && hash) {
    url += '#' + (enc ? encodeURIComponent(hash) : hash);
  }
  $('#output').textContent = url;
}

function openUrl() {
  const url = $('#output').textContent;
  if (url) window.open(url, '_blank', 'noopener');
}

function reset() {
  $('#protocol').value = 'https://';
  $('#host').value = 'api.example.com';
  $('#port').value = '';
  $('#path').value = '/v1/search';
  $('#encodeMode').checked = true;
  $('#includeHash').checked = false;
  $('#hash').value = '';
  params = defaultParams();
  renderParams();
  buildUrl();
}

function parseUrl() {
  const url = $('#parseInput').value.trim();
  if (!url) {
    $('#parseResult').innerHTML = '<em style="opacity:.6">—</em>';
    return;
  }
  try {
    // Allow protocol-less input
    const u = url.match(/^[a-z][a-z0-9+.-]*:\/\//i) ? url : 'http://' + url;
    const parsed = new URL(u);
    let html = `<div><span class="k">protocol:</span> <span class="v">${escapeHtml(parsed.protocol)}</span></div>`;
    html += `<div><span class="k">host:</span> <span class="v">${escapeHtml(parsed.hostname)}</span></div>`;
    if (parsed.port) html += `<div><span class="k">port:</span> <span class="v">${escapeHtml(parsed.port)}</span></div>`;
    html += `<div><span class="k">path:</span> <span class="v">${escapeHtml(parsed.pathname)}</span></div>`;
    html += `<div style="margin-top:8px"><span class="k">query params:</span></div>`;
    const sp = new URLSearchParams(parsed.search);
    if ([...sp].length === 0) html += '<div style="opacity:.6;margin-left:12px">—</div>';
    else {
      for (const [k, v] of sp) {
        html += `<div style="margin-left:12px"><span class="k">${escapeHtml(k)}</span> = <span class="v">${escapeHtml(v)}</span></div>`;
      }
    }
    if (parsed.hash) html += `<div style="margin-top:8px"><span class="k">hash:</span> <span class="v">${escapeHtml(parsed.hash)}</span></div>`;
    $('#parseResult').innerHTML = html;
  } catch (e) {
    $('#parseResult').innerHTML = `<em style="color:var(--gz-accent)">Invalid URL: ${escapeHtml(e.message)}</em>`;
  }
}

function escapeHtml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function setMode(m) {
  currentMode = m;
  document.querySelectorAll('.mode-tabs button').forEach(b => b.classList.toggle('active', b.dataset.mode === m));
  $('#mode-build').style.display = m === 'build' ? 'grid' : 'none';
  $('#mode-parse').style.display = m === 'parse' ? 'block' : 'none';
}

// Init
$('#tab-build').textContent = t('build');
$('#tab-parse').textContent = t('parse');
$('#lbl-base').textContent = t('lblBase');
$('#lbl-proto').textContent = t('lblProto');
$('#lbl-host').textContent = t('lblHost');
$('#lbl-port').textContent = t('lblPort');
$('#lbl-path').textContent = t('lblPath');
$('#lbl-params').textContent = t('lblParams');
$('#lbl-add').textContent = t('lblAdd');
$('#lbl-encode').textContent = t('lblEncode');
$('#lbl-hash').textContent = t('lblHash');
$('#lbl-output').textContent = t('lblOutput');
$('#lbl-parse').textContent = t('lblParse');
$('#btn-copy').textContent = t('btnCopy');
$('#btn-open').textContent = t('btnOpen');
$('#btn-reset').textContent = t('btnReset');
$('#lbl-parseBtn').textContent = t('lblParseBtn');
$('#lbl-parseClear').textContent = t('lblParseClear');

document.querySelectorAll('.mode-tabs button').forEach(b => b.addEventListener('click', () => setMode(b.dataset.mode)));
$('#addParam').addEventListener('click', addParam);
['protocol','host','port','path','encodeMode','includeHash','hash'].forEach(id => {
  $('#' + id).addEventListener('input', buildUrl);
  $('#' + id).addEventListener('change', buildUrl);
});
$('#btn-parse-go').addEventListener('click', parseUrl);
$('#parseInput').addEventListener('input', () => { if (currentMode === 'parse') parseUrl(); });

params = defaultParams();
renderParams();
buildUrl();

GZ.renderToolPage({
  category: 'dev',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4','step5'],
  related: [
    {icon:'🔗', href:'/dev/url-encode.html', name:'URL Encoder'},
    {icon:'🧩', href:'/dev/url-parser.html', name:'URL Parser'},
    {icon:'🏷️', href:'/seo/utm-builder.html', name:'UTM Builder'},
    {icon:'🔍', href:'/dev/curl-to-code.html', name:'cURL to Code'},
  ]
});
</script>
<script src="/tools-result-rec.js?v=20260707v520" defer></script>
</body>
</html>
