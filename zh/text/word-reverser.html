<script>
GZI18n.register({
  en: {
    toolTitle: 'Word Reverser',
    toolDesc: 'Reverse the letters inside each word, flip word order, or both. Keep punctuation in place or reverse it too. Free, browser-only, no signup.',
    lettersInWord: 'Reverse letters in each word',
    wordOrder: 'Reverse word order',
    both: 'Reverse both',
    keepPunct: 'Keep punctuation in place',
    preserveCase: 'Preserve case position',
    step1: 'Paste or type your text into the input area',
    step2: 'Pick a mode — reverse letters, word order or both',
    step3: 'Optionally anchor punctuation or preserve capitalization',
    step4: 'Copy the reversed text with one click',
  },
  zh: {
    toolTitle: '单词反转器',
    toolDesc: '反转每个单词中的字母、单词顺序，或两者都反转。可保留标点位置或同时反转。免费，浏览器本地运行，无需注册。',
    lettersInWord: '反转每个单词的字母',
    wordOrder: '反转单词顺序',
    both: '两者都反转',
    keepPunct: '标点保留原位',
    preserveCase: '保留大小写位置',
    step1: '在输入区粘贴或输入文本',
    step2: '选择模式 — 反转字母、单词顺序或两者',
    step3: '可选锚定标点或保留大小写',
    step4: '一键复制反转后的文本',
  }
});

const { $, copyText, t } = GZ;
let mode = 'letters', keepPunct = false, preserveCase = false;

function reverseWord(word) {
  if (keepPunct) {
    // Separate leading/trailing punctuation
    const m = word.match(/^([^\p{L}\p{N}]*)([\s\S]*?)([^\p{L}\p{N}]*)$/u);
    if (m) {
      const lead = m[1], core = m[2], trail = m[3];
      return lead + reverseCore(core) + trail;
    }
  }
  return reverseCore(word);
}

function reverseCore(s) {
  let reversed = [...s].reverse().join('');
  if (preserveCase) {
    // Apply original case positions
    let out = '';
    for (let i = 0; i < s.length; i++) {
      const origChar = s[i];
      const newChar = reversed[i];
      if (origChar === origChar.toUpperCase() && origChar !== origChar.toLowerCase()) {
        out += newChar.toUpperCase();
      } else if (origChar === origChar.toLowerCase() && origChar !== origChar.toUpperCase()) {
        out += newChar.toLowerCase();
      } else {
        out += newChar;
      }
    }
    return out;
  }
  return reversed;
}

function process() {
  const inp = $('#input').value;
  if (!inp) { $('#output').textContent = ''; $('#status').textContent = ''; return; }
  const lines = inp.split('\n');
  const outLines = lines.map(line => {
    const words = line.split(/(\s+)/); // keep whitespace tokens
    let arr = words.filter(w => w.trim().length > 0);
    if (mode === 'wordOrder' || mode === 'both') {
      arr.reverse();
    }
    if (mode === 'letters' || mode === 'both') {
      arr = arr.map(reverseWord);
    }
    // Rebuild line preserving original whitespace structure
    if (mode === 'wordOrder' || mode === 'both') {
      // Rebuild with single spaces between reversed words
      return arr.join(' ');
    }
    // Letters-only: map back into original whitespace structure
    let wordIdx = 0;
    return words.map(tok => tok.trim().length > 0 ? (arr[wordIdx++] || '') : tok).join('');
  });
  const result = outLines.join('\n');
  $('#output').textContent = result;
  $('#status').innerHTML = `<span style="opacity:.7">${result.length} chars</span>`;
}

$('#input').addEventListener('input', process);

$('#toolbar').innerHTML = `
  <select class="gz-select" id="mode-sel">
    <option value="letters" selected>${t('lettersInWord')}</option>
    <option value="wordOrder">${t('wordOrder')}</option>
    <option value="both">${t('both')}</option>
  </select>
  <label class="gz-check"><input type="checkbox" id="cb-punct"> ${t('keepPunct')}</label>
  <label class="gz-check"><input type="checkbox" id="cb-case"> ${t('preserveCase')}</label>
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#input').value='';process()">${t('clear')}</button>`;

$('#mode-sel').addEventListener('change', e => { mode = e.target.value; process(); });
$('#cb-punct').addEventListener('change', e => { keepPunct = e.target.checked; process(); });
$('#cb-case').addEventListener('change', e => { preserveCase = e.target.checked; process(); });

$('#input').value = 'Hello World!\nThis is a test sentence.';
process();

GZ.renderToolPage({

    {icon:'🔄', href:'/text/backwards-text-generator.html', name:'Backwards Text'},
  ]
});
</script>
