const { $, copyText, t } = GZ;

// Build the options UI
function buildOptions() {
  const opts = [
    ['optHeadings', 'headings', true],
    ['optEmphasis', 'emphasis', true],
    ['optCode', 'code', true],
    ['optLinks', 'links', true],
    ['optImages', 'images', true],
    ['optLists', 'lists', true],
    ['optBlockquote', 'blockquote', true],
    ['optHr', 'hr', true],
    ['optHtml', 'html', true],
    ['optExtra', 'extra', true],
  ];
  $('#opts').innerHTML = opts.map(([key, id, def]) =>
    `<label><input type="checkbox" id="opt-${id}" ${def ? 'checked' : ''}> ${t(key)}</label>`
  ).join('') +
  `<label style="display:flex;gap:6px;align-items:center;cursor:default"><span>${t('linkModeLabel')}</span>` +
  `<select id="linkMode" style="padding:4px;background:var(--bg2);color:var(--text);border:1px solid var(--border);border-radius:6px">` +
  `<option value="text">${t('linkTextOnly')}</option>` +
  `<option value="url">${t('linkUrlOnly')}</option>` +
  `<option value="both">${t('linkBoth')}</option>` +
  `</select></label>`;
  // Attach listeners
  opts.forEach(([_, id]) => {
    const el = $('#opt-' + id);
    el.addEventListener('change', strip);
    el.addEventListener('input', strip);
  });
  $('#linkMode').addEventListener('change', strip);
}

function stripMarkdown(text) {
  const get = id => $('#opt-' + id) && $('#opt-' + id).checked;
  let s = text;

  // Extract code blocks first so we don't mangle them
  const codeBlocks = [];
  if (get('code')) {
    s = s.replace(/```[\s\S]*?```/g, m => { codeBlocks.push(m.replace(/^```[^\n]*\n?/, '').replace(/```$/, '')); return '\u0000CB' + (codeBlocks.length - 1) + '\u0000'; });
    s = s.replace(/`([^`\n]+)`/g, '$1');
  } else {
    // Keep code blocks but normalize fences
  }

  // Images ![alt](url) — before HTML strip so the alt text survives
  if (get('images')) {
    s = s.replace(/!\[([^\]]*)\]\(([^)\s]+)[^)]*\)/g, (m, alt) => alt);
  }

  // Links [text](url) — before HTML strip so the text/URL survives
  if (get('links')) {
    const mode = $('#linkMode').value;
    s = s.replace(/\[([^\]]+)\]\(([^)\s]+)[^)]*\)/g, (m, txt, url) => {
      if (mode === 'text') return txt;
      if (mode === 'url') return url;
      return `${txt} (${url})`;
    });
    // Reference-style links [text][ref] and [ref]
    s = s.replace(/\[([^\]]+)\]\[[^\]]*\]/g, '$1');
    // Bare autolinks <http://...> — preserve the URL itself
    s = s.replace(/<(https?:\/\/[^>]+)>/g, '$1');
    // Strip link definitions  [ref]: url "title"
    s = s.replace(/^\s*\[[^\]]+\]:\s*[^\n]+$/gm, '');
  }

  // HTML tags — after autolinks so we don't eat <http://...>
  if (get('html')) s = s.replace(/<[^>]+>/g, '');

  // Headings (do before emphasis so we don't kill # inside)
  if (get('headings')) {
    s = s.replace(/^#{1,6}\s+(.+?)\s*#*\s*$/gm, '$1');
    s = s.replace(/^#{1,6}\s+(.+)$/gm, '$1');  // simpler fallback for lines without trailing space
    s = s.replace(/^(=+)\s*$/gm, '');  // setext h1 underline
  }

  // Horizontal rules
  if (get('hr')) {
    s = s.replace(/^\s*([-*_])\1{2,}\s*$/gm, '');
  }

  // Blockquotes
  if (get('blockquote')) {
    s = s.replace(/^\s*>\s?/gm, '');
  }

  // Lists
  if (get('lists')) {
    s = s.replace(/^\s*[-*+]\s+/gm, '');   // unordered
    s = s.replace(/^\s*\d+\.\s+/gm, '');    // ordered
    s = s.replace(/^\s*([-*+])\s+\[[ xX]\]\s+/gm, '');  // task lists
    s = s.replace(/^\s*\d+\.\s+\[[ xX]\]\s+/gm, '');
  }

  // Emphasis / strong
  if (get('emphasis')) {
    s = s.replace(/\*\*\*([^*]+)\*\*\*/g, '$1');  // bold italic
    s = s.replace(/___([^_]+)___/g, '$1');
    s = s.replace(/\*\*([^*]+)\*\*/g, '$1');       // bold
    s = s.replace(/__([^_]+)__/g, '$1');
    s = s.replace(/(^|[^*])\*([^*\n]+)\*(?!\*)/g, '$1$2');  // italic *
    s = s.replace(/(^|[^_])_([^_\n]+)_(?!_)/g, '$1$2');     // italic _
    s = s.replace(/~~([^~]+)~~/g, '$1');           // strikethrough
  }

  // Restore code blocks
  if (get('code')) {
    s = s.replace(/\u0000CB(\d+)\u0000/g, (m, i) => codeBlocks[+i]);
  }

  // Collapse multiple blank lines
  if (get('extra')) {
    s = s.replace(/[ \t]+\n/g, '\n');           // trailing whitespace
    s = s.replace(/\n{3,}/g, '\n\n');            // multiple blank lines
    s = s.replace(/^\s+|\s+$/g, '');             // trim ends
  }

  return s;
}

function strip() {
  const inp = $('#input').value;
  if (!inp) { $('#output').textContent = ''; $('#status').innerHTML = ''; return; }
  const out = stripMarkdown(inp);
  $('#output').textContent = out;
  const charsRemoved = inp.length - out.length;
  const pct = inp.length ? Math.round(100 * charsRemoved / inp.length) : 0;
  const wordCount = (out.match(/\S+/g) || []).length;
  const lineCount = out.split('\n').length;
  $('#status').innerHTML = `<div class="gz-stats">
    <span class="pill">${t('statChars')}: <b>${out.length}</b></span>
    <span class="pill">${t('statWords')}: <b>${wordCount}</b></span>
    <span class="pill">${t('statLines')}: <b>${lineCount}</b></span>
    <span class="pill">${t('statReduction')}: <b>${charsRemoved} (${pct}%)</b></span>
  </div>`;
}

2. Second **bold** item

> A blockquote with __underlined__ text.

Visit <https://tools.gamezipper.com> for more.

---

Final paragraph with ~~strikethrough~~ text.`;
  strip();
}

</script>
