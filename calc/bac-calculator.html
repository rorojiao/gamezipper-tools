<script>

  zh: {

    toolDesc:'使用 Widmark 公式估算血液酒精含量。输入饮酒量、体重、性别和经过时间。',
    gender:'性别',
    male:'男',
    female:'女',
    weight:'体重',
    weightUnit:'单位',
    kg:'公斤',
    lb:'磅',
    drinks:'标准饮酒量',
    drinkHelp:'1 杯 = 14克酒精（1 杯啤酒 / 5盎司葡萄酒 / 1.5盎司烈酒）',
    hours:'自第一杯以来的小时数',
    calculate:'计算 BAC',
    yourBAC:'估算 BAC',
    soberTime:'清醒（0.00%）所需时间',
    hoursShort:'小时',
    statusSafe:'可能清醒',
    statusCaution:'注意 — 功能受损',
    statusDanger:'超过法定上限（0.08%）',
    statusCritical:'危险水平',
    effects:'BAC 等级影响',
    eff001:'0.01-0.03% — 轻微放松，情绪略有变化',
    eff004:'0.04-0.06% — 抑制力降低，轻微欣快感',
    eff007:'0.07-0.09% — 协调性下降，判断力受损',
    eff010:'0.10-0.12% — 明显受损，言语不清',
    eff013:'0.13-0.15% — 严重失衡，视力模糊',
    eff016:'0.16-0.19% — 烦躁，恶心，严重醉酒',
    eff020:'0.20%+ — 严重醉酒，断片风险',
    disclaimer:'⚠️ 本计算器仅提供估算值，绝不应用于判断是否适合驾车。实际 BAC 受多种因素影响。如需准确结果请使用呼吸分析仪或血液检测。有疑虑时请勿驾车。',
    step1:'选择性别并输入体重',
    step2:'输入饮酒的标准杯数',
    step3:'输入自第一杯以来经过的小时数',
    step4:'点击计算查看估算 BAC 和影响',
  }
});

const { $, t } = GZ;

$('#form').innerHTML = `
  <div class="row">
    <div><label>${t('gender')}</label><select id="gender"><option value="male">${t('male')}</option><option value="female">${t('female')}</option></select></div>
    <div><label>${t('weightUnit')}</label><select id="unit"><option value="kg">${t('kg')}</option><option value="lb">${t('lb')}</option></select></div>
  </div>
  <div><label>${t('weight')}</label><input type="number" id="weight" value="70" min="30" max="250" step="0.1"></div>
  <div><label>${t('drinks')}</label><input type="number" id="drinks" value="2" min="0" max="30" step="0.5"><div style="font-size:.78em;color:var(--text2);margin-top:2px">${t('drinkHelp')}</div></div>
  <div><label>${t('hours')}</label><input type="number" id="hours" value="1" min="0" max="24" step="0.25"></div>
  <button class="gz-btn" onclick="calculate()">${t('calculate')}</button>
`;

function calculate() {
  let weight = parseFloat($('#weight').value);
  const unit = $('#unit').value;
  const gender = $('#gender').value;
  const drinks = parseFloat($('#drinks').value) || 0;
  const hours = parseFloat($('#hours').value) || 0;
  if (!weight || weight <= 0 || drinks <= 0) {
    $('#results').innerHTML = '';
    return;
  }

  // Convert to kg
  if (unit === 'lb') weight = weight / 2.205;

  // Widmark formula: BAC = (A × 5.14 / (W × r)) - 0.015 × H
  // A = total alcohol in ounces, W = weight in lbs, r = gender constant
  const weightLb = weight * 2.205;
  const r = gender === 'male' ? 0.73 : 0.66;
  // Each standard drink = 0.6 oz (14g) of pure alcohol
  const totalAlcoholOz = drinks * 0.6;
  let bac = ((totalAlcoholOz * 5.14) / (weightLb * r)) - (0.015 * hours);
  bac = Math.max(0, bac);

  const bacStr = bac.toFixed(4);
  const bacPct = (bac * 100).toFixed(2);

  // Status
  let statusClass, statusText;
  if (bac < 0.04) { statusClass = 'safe'; statusText = t('statusSafe'); }
  else if (bac < 0.08) { statusClass = 'caution'; statusText = t('statusCaution'); }
  else if (bac < 0.15) { statusClass = 'danger'; statusText = t('statusDanger'); }
  else { statusClass = 'critical'; statusText = t('statusCritical'); }

  // Time to sober
  const soberHours = bac > 0 ? (bac / 0.015).toFixed(1) : '0';

  // Meter color
  let meterColor = '#00d672';
  if (bac >= 0.08) meterColor = '#e06c75';
  else if (bac >= 0.04) meterColor = '#e5c07b';

  const meterWidth = Math.min(bac / 0.20 * 100, 100);

  const effects = [
    { key: 'eff001', range: [0.01, 0.03], color: '#00d672' },
    { key: 'eff004', range: [0.04, 0.06], color: '#61afef' },
    { key: 'eff007', range: [0.07, 0.09], color: '#e5c07b' },
    { key: 'eff010', range: [0.10, 0.12], color: '#d19a66' },
    { key: 'eff013', range: [0.13, 0.15], color: '#e06c75' },
    { key: 'eff016', range: [0.16, 0.19], color: '#e06c75' },
    { key: 'eff020', range: [0.20, 1.0], color: '#be5046' },
  ];

  $('#results').innerHTML = `
    <div class="bac-result">
      <div style="font-size:.85em;color:var(--text2)">${t('yourBAC')}</div>
      <div class="bac-value" style="color:${meterColor}">${bacPct}%</div>
      <div class="status ${statusClass}">${statusText}</div>
      <div class="bac-meter"><div class="fill" style="width:${meterWidth}%;background:${meterColor}"></div></div>
      <div style="margin-top:8px;font-size:.9em">${t('soberTime')}: ~${soberHours} ${t('hoursShort')}</div>
    </div>
    <div class="effects-list">
      <h3>${t('effects')}</h3>
      ${effects.map(e => `<div class="effect" style="${bac >= e.range[0] && bac <= e.range[1] ? 'font-weight:600;background:var(--glass2);padding:8px;border-radius:6px' : ''}"><span class="dot" style="background:${e.color}"></span> ${t(e.key)}</div>`).join('')}
    </div>
    <div class="disclaimer">${t('disclaimer')}</div>
  `;
}

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [

    {icon:'⚖️', href:'/calc/bmi-calculator.html', name:'BMI Calculator'},
    {icon:'💪', href:'/calc/protein-calculator.html', name:'Protein Calculator'},
    {icon:'💧', href:'/calc/water-intake.html', name:'Water Intake'},
  ]
});
</script>
