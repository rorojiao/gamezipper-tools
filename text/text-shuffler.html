  }

const { $, copyText, t } = GZ;
let mode = 'lines';

function fisherYates(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function shuffle() {
  const text = $('#input').value;
  if (!text) { $('#output').textContent = ''; return; }
  let result = '';
  if (mode === 'lines') {
    result = fisherYates(text.split(/\r?\n/)).join('\n');
  } else if (mode === 'words') {
    result = text.split(/\r?\n/).map(line =>
      fisherYates(line.split(/(\s+)/)).join('')
    ).join('\n');
  } else {
    result = fisherYates([...text]).join('');
  }
  $('#output').textContent = result;
}

function setMode(m) {
  mode = m;
  ['lines','words','chars'].forEach(k => {
    const btn = $('#m-' + k);
    btn.classList.toggle('active', k === m);
  });
}
$('#mode-row').addEventListener('click', e => {
  const btn = e.target.closest('.mode-btn');
  if (btn) { setMode(btn.dataset.mode); shuffle(); }
});

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="shuffle()">${t('shuffle') || 'Shuffle'}</button>
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example') || 'Example'}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#input').value=\'\';$('#output').textContent=\'\'">${t('clear')}</button>`;

function loadExample() {
  $('#input').value = 'Apple\nBanana\nCherry\nDate\nElderberry\nFig\nGrape';
  setMode('lines');
  shuffle();
}

$('#m-lines').textContent = t('modeLines');
$('#m-words').textContent = t('modeWords');
$('#m-chars').textContent = t('modeChars');
