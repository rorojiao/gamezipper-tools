<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="et-template">

      <button class="gz-btn gz-btn-secondary" data-tpl="promo">🎉 Promo</button>

        <div class="et-field"><label id="lbl-pre"></label><input id="f-preheader" type="text"></div>
        <div class="et-field"><label id="lbl-from"></label><input id="f-from" type="text"></div>
        <div class="et-field"><label id="lbl-company"></label><input id="f-company" type="text"></div>
        <div class="et-field"><label id="lbl-color"></label><input id="f-color" type="color"></div>
        <div class="et-field"><label id="lbl-bg"></label><input id="f-bg" type="color"></div>

          <div>
            <button class="gz-btn" id="btn-cpy" style="font-size:.75rem;padding:6px 10px">Copy</button>

          </div>

    </div>

<script>
GZI18n.register({
  en: {
    toolTitle: 'Email Template Builder',
    toolDesc: 'Build responsive HTML email templates visually — choose a template, customize content, and export production-ready HTML for any email service.',
    lblSettings: 'Email Settings',
    lblSections: 'Sections',
    lblSubj: 'Subject line',
    lblPre: 'Preheader (preview text)',
    lblFrom: 'From name',
    lblCompany: 'Company / brand',
    lblColor: 'Brand color',
    lblBg: 'Background color',
    lblPreview: 'Live Preview',
    lblHtml: 'HTML Output',
    addSection: '+ Add section',
    delete: 'Delete',
    header: 'Header / Logo', hero: 'Hero Banner', text: 'Text Block', cta: 'Call-to-Action', footer: 'Footer',
    step1: 'Pick a template above to get started',
    step2: 'Edit brand info (subject, preheader, from, company, colors) on the left',
    step3: 'Add, remove and customize sections (header, hero, text, CTA, footer)',
    step4: 'Copy or download the HTML to paste into your email service',
  },
  zh: {
    toolTitle: '邮件模板生成器',
    toolDesc: '可视化构建响应式 HTML 邮件模板 — 选择模板、自定义内容、导出可直接使用的 HTML，兼容各类邮件服务。',
    lblSettings: '邮件设置',
    lblSections: '区块',
    lblSubj: '主题',
    lblPre: '预览文本',
    lblFrom: '发件人',
    lblCompany: '公司 / 品牌',
    lblColor: '品牌主色',
    lblBg: '背景色',
    lblPreview: '实时预览',
    lblHtml: 'HTML 输出',
    addSection: '+ 添加区块',
    delete: '删除',
    header: '页眉/Logo', hero: '主视觉', text: '文本块', cta: '行动按钮', footer: '页脚',
    step1: '选择上方模板开始',
    step2: '在左侧编辑品牌信息（主题、预览、发件人、公司、颜色）',
    step3: '添加、删除和自定义区块（页眉、主视觉、文本、按钮、页脚）',
    step4: '复制或下载 HTML 粘贴到你的邮件服务',
  }
});

const { $, $$, copyText, t } = GZ;

const state = {
  meta: {
    subject: 'Welcome to Our Newsletter!',
    preheader: 'Thanks for signing up — here is what is inside.',
    from: 'Acme Team',
    company: 'Acme Inc.',
    color: '#4f46e5',
    bg: '#f4f4f5',
  },
  sections: [],
  activeIdx: 0,
};

function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escAttr(s) { return String(s).replace(/"/g,'&quot;').replace(/</g,'&lt;'); }

function sectionHtml(s) {
  const c = state.meta.color;
  switch (s.type) {
    case 'header': {
      const text = s.title || state.meta.company;
      return `<tr><td align="center" style="padding:24px 20px;background:${state.meta.color}"><h1 style="margin:0;color:#ffffff;font-size:28px;font-weight:700">${escHtml(text)}</h1></td></tr>`;
    }
    case 'hero': {
      const heading = s.heading || 'Welcome aboard!';
      const sub = s.sub || 'We are glad to have you.';
      const img = s.img || '';
      return `<tr><td style="padding:0"><img src="${escAttr(img)}" alt="" style="width:100%;display:block" onerror="this.style.display='none'"></td></tr><tr><td style="padding:30px 40px;background:#ffffff"><h2 style="margin:0 0 12px;color:#111;font-size:24px">${escHtml(heading)}</h2><p style="margin:0;color:#555;font-size:16px;line-height:1.5">${escHtml(sub)}</p></td></tr>`;
    }
    case 'text': {
      return `<tr><td style="padding:30px 40px;background:#ffffff"><h2 style="margin:0 0 12px;color:#111;font-size:22px">${escHtml(s.heading || 'Section title')}</h2><p style="margin:0;color:#555;font-size:16px;line-height:1.6">${escHtml(s.body || 'Your content here...')}</p></td></tr>`;
    }
    case 'cta': {
      return `<tr><td align="center" style="padding:30px 40px;background:#ffffff"><h3 style="margin:0 0 16px;color:#111;font-size:22px">${escHtml(s.heading || 'Ready to get started?')}</h3><table cellpadding="0" cellspacing="0" border="0"><tr><td align="center" style="border-radius:8px;background:${c}"><a href="${escAttr(s.url || 'https://example.com')}" style="display:inline-block;padding:14px 32px;color:#ffffff;text-decoration:none;font-weight:700;font-size:16px">${escHtml(s.label || 'Get Started')}</a></td></tr></table></td></tr>`;
    }
    case 'footer': {
      return `<tr><td align="center" style="padding:24px 20px;background:#fafafa"><p style="margin:0 0 6px;color:#888;font-size:13px">© 2026 ${escHtml(state.meta.company)}. All rights reserved.</p><p style="margin:0;color:#aaa;font-size:12px">You are receiving this email because you signed up at example.com.</p></td></tr>`;
    }
  }
  return '';
}

function renderHtml() {
  const c = state.meta.color;
  const sectionsHtml = state.sections.map(sectionHtml).join('\n');
  return `<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="x-apple-disable-message-reformatting">
<title>${escHtml(state.meta.subject)}</title>
</head>
<body style="margin:0;padding:0;background:${state.meta.bg};font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif">
<div style="display:none;max-height:0;overflow:hidden;mso-hide:all">${escHtml(state.meta.preheader)}&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;</div>
<table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="background:${state.meta.bg}">
<tr><td align="center" style="padding:20px 10px">
<table role="presentation" cellpadding="0" cellspacing="0" border="0" width="600" style="max-width:600px;background:#ffffff;border-radius:8px;overflow:hidden">
${sectionsHtml}
</table>
</td></tr>
</table>
</body>
</html>`;
}

function render() {
  // section list
  const list = $('#section-list');
  list.innerHTML = state.sections.map((s, i) =>
    `<div class="et-section-item ${i === state.activeIdx ? 'active' : ''}" data-idx="${i}">
       <span>${t(s.type)}</span>
       <button data-del="${i}">×</button>
     </div>`).join('') + `<button class="gz-btn gz-btn-secondary" id="add-sec" style="width:100%;margin-top:8px;font-size:.8rem">${t('addSection')}</button>`;
  // section editor
  const editor = $('#section-editor');
  const s = state.sections[state.activeIdx];
  if (!s) { editor.innerHTML = ''; }
  else {
    let fields = '';
    if (s.type === 'header') fields = `<div class="et-field"><label>Title</label><input id="s-title" type="text" value="${escAttr(s.title || state.meta.company)}"></div>`;
    if (s.type === 'hero') fields = `<div class="et-field"><label>Heading</label><input id="s-heading" type="text" value="${escAttr(s.heading || '')}"></div><div class="et-field"><label>Subtext</label><textarea id="s-sub">${escHtml(s.sub || '')}</textarea></div><div class="et-field"><label>Image URL (optional)</label><input id="s-img" type="text" value="${escAttr(s.img || '')}"></div>`;
    if (s.type === 'text') fields = `<div class="et-field"><label>Heading</label><input id="s-heading" type="text" value="${escAttr(s.heading || '')}"></div><div class="et-field"><label>Body</label><textarea id="s-body" rows="5">${escHtml(s.body || '')}</textarea></div>`;
    if (s.type === 'cta') fields = `<div class="et-field"><label>Heading</label><input id="s-heading" type="text" value="${escAttr(s.heading || '')}"></div><div class="et-field"><label>Button label</label><input id="s-label" type="text" value="${escAttr(s.label || '')}"></div><div class="et-field"><label>Button URL</label><input id="s-url" type="text" value="${escAttr(s.url || '')}"></div>`;
    editor.innerHTML = `<h4 style="margin:14px 0 8px;font-size:.85rem">Edit: ${t(s.type)}</h4>${fields}<button class="gz-btn gz-btn-secondary" id="del-sec" style="width:100%;margin-top:8px;font-size:.8rem">${t('delete')}</button>`;
  }
  // output
  const html = renderHtml();
  $('#code-out').textContent = html;
  const iframe = $('#preview');
  iframe.srcdoc = html;
}

function bind() {
  // meta
  ['subject','preheader','from','company','color','bg'].forEach(k => {
    const el = $('#f-' + k);
    el.addEventListener('input', () => { state.meta[k] = el.value; render(); });
  });
  // section list clicks
  $('#section-list').addEventListener('click', e => {
    if (e.target.dataset.idx !== undefined) { state.activeIdx = +e.target.dataset.idx; render(); return; }
    if (e.target.dataset.del !== undefined) { state.sections.splice(+e.target.dataset.del, 1); state.activeIdx = Math.min(state.activeIdx, state.sections.length - 1); render(); return; }
    if (e.target.id === 'add-sec') { addSection('text'); return; }
  });
  // editor changes
  const ed = $('#section-editor');
  ed.addEventListener('input', e => {
    const s = state.sections[state.activeIdx]; if (!s) return;
    const id = e.target.id;
    if (id === 's-title') s.title = e.target.value;
    if (id === 's-heading') s.heading = e.target.value;
    if (id === 's-sub') s.sub = e.target.value;
    if (id === 's-body') s.body = e.target.value;
    if (id === 's-img') s.img = e.target.value;
    if (id === 's-label') s.label = e.target.value;
    if (id === 's-url') s.url = e.target.value;
    render();
  });
  ed.addEventListener('click', e => { if (e.target.id === 'del-sec') { state.sections.splice(state.activeIdx, 1); state.activeIdx = Math.max(0, state.activeIdx - 1); render(); } });
  // template buttons
  $$('.et-template button').forEach(b => b.onclick = () => loadTemplate(b.dataset.tpl));
}

function addSection(type, data) {
  state.sections.push(Object.assign({ type }, data || {}));
  state.activeIdx = state.sections.length - 1;
  render();
}

function loadTemplate(name) {
  state.sections = [];
  if (name === 'welcome') {
    addSection('header', { title: 'Welcome to Acme!' });
    addSection('hero', { heading: 'Thanks for joining us!', sub: 'We are thrilled to have you on board. Here is what you can expect:', img: '' });
    addSection('text', { heading: 'What is next?', body: 'Get started with our 5-minute quickstart guide and explore the dashboard. If you have any questions, our team is always happy to help.' });
    addSection('cta', { heading: 'Ready to dive in?', label: 'Go to Dashboard', url: 'https://example.com/dashboard' });
    addSection('footer', {});
  } else if (name === 'promo') {
    addSection('header', { title: '🎉 Flash Sale!' });
    addSection('hero', { heading: '50% off everything', sub: 'For the next 48 hours only.', img: '' });
    addSection('cta', { heading: 'Shop now and save big', label: 'Shop the Sale', url: 'https://example.com/sale' });
    addSection('footer', {});
  } else if (name === 'receipt') {
    addSection('header', { title: 'Order Confirmed' });
    addSection('text', { heading: 'Thanks for your order!', body: 'Your order #12345 has been received and is being processed. We will send a shipping notification once your items are on the way.' });
    addSection('cta', { heading: 'View order details', label: 'View Order', url: 'https://example.com/orders/12345' });
    addSection('footer', {});
  } else if (name === 'newsletter') {
    addSection('header', { title: 'The Weekly Dispatch' });
    addSection('text', { heading: 'Top stories this week', body: 'Catch up on the latest industry news, deep-dive tutorials and product updates curated by our team.' });
    addSection('cta', { heading: 'Read more on our blog', label: 'Read the Blog', url: 'https://example.com/blog' });
    addSection('footer', {});
  }
  state.activeIdx = 0;
  render();
}

// initialize labels
$('#lbl-settings').textContent = t('lblSettings');
$('#lbl-sections').textContent = t('lblSections');
$('#lbl-subj').textContent = t('lblSubj');
$('#lbl-pre').textContent = t('lblPre');
$('#lbl-from').textContent = t('lblFrom');
$('#lbl-company').textContent = t('lblCompany');
$('#lbl-color').textContent = t('lblColor');
$('#lbl-bg').textContent = t('lblBg');
$('#lbl-preview').textContent = t('lblPreview');
$('#lbl-html').textContent = t('lblHtml');
$('#f-subject').value = state.meta.subject;
$('#f-preheader').value = state.meta.preheader;
$('#f-from').value = state.meta.from;
$('#f-company').value = state.meta.company;
$('#f-color').value = state.meta.color;
$('#f-bg').value = state.meta.bg;

bind();
loadTemplate('welcome');

$('#btn-cpy').onclick = () => copyText($('#code-out').textContent);
$('#btn-dl').onclick = () => {
  const v = $('#code-out').textContent;
  const blob = new Blob([v], { type: 'text/html' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'email-template.html';
  a.click();
  URL.revokeObjectURL(url);
};

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'✉️', href:'/text/email-signature.html', name:'Email Signature'},
    {icon:'📄', href:'/text/invoice-generator.html', name:'Invoice Generator'},
    {icon:'🏷️', href:'/text/hashtag-generator.html', name:'Hashtag Generator'},
    {icon:'📱', href:'/social/og-meta.html', name:'OG Meta'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
