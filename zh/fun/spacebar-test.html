<script>
GZI18n.register({
  en: {
    toolTitle: 'Spacebar Test — Spacebar Speed Test',
    toolDesc: 'Measure your spacebar pressing speed (hits per second) with this free spacebar clicker test. Choose 5, 10, 30 or 60 seconds, press the spacebar as fast as you can, and see your HPS score, total taps and skill rank. Pure browser game.',
    hps: 'HPS', hits: 'Hits', time: 'Time', history: 'Recent Attempts', mode: 'Mode', reset: '🔄 Reset',
    clickToStart: 'Press SPACE or click here to start',
    pressNow: 'PRESS SPACE! PRESS SPACE!',
    timesUp: '⏰ Time\'s up!',
    subStart: 'Press the spacebar (or tap) to begin',
    subRun: 'Keep pressing the spacebar as fast as you can!',
    subDone: 'Press again or click Reset to retry',
    rankSlow: '🐢 Slow Poke', rankAvg: '🙂 Average', rankGood: '😎 Good', rankGreat: '🔥 Great', rankPro: '⚡ Pro', rankGod: '👑 Godlike',
    step1: 'Pick a test duration — 5s, 10s, 30s or 60s',
    step2: 'Click the test area, then press the SPACE bar',
    step3: 'Press the spacebar as fast as you can until time runs out',
    step4: 'Check your HPS score and skill rank, then try to beat it!',
  },
  zh: {
    toolTitle: '空格键测试 — 空格键速度测试',
    toolDesc: '用这款免费的空格键点击测试来测量你的空格键按压速度（每秒次数）。选择 5、10、30 或 60 秒，尽可能快地按空格键，查看 HPS 分数、总按压数和技能等级。纯浏览器小游戏。',
    hps: 'HPS', hits: '按压数', time: '时间', history: '最近成绩', mode: '模式', reset: '🔄 重置',
    clickToStart: '按空格键或点击此处开始',
    pressNow: '按空格键！按空格键！',
    timesUp: '⏰ 时间到！',
    subStart: '按空格键（或点击）即可开始',
    subRun: '尽可能快地持续按空格键！',
    subDone: '再次按下或点击重置可重新挑战',
    rankSlow: '🐢 慢吞吞', rankAvg: '🙂 一般', rankGood: '😎 不错', rankGreat: '🔥 很棒', rankPro: '⚡ 高手', rankGod: '👑 神级',
    step1: '选择测试时长 — 5 秒、10 秒、30 秒或 60 秒',
    step2: '点击测试区域，然后按下空格键',
    step3: '在时间结束前尽可能快地按空格键',
    step4: '查看 HPS 分数和技能等级，努力打破纪录！',
  }
});

const { $, copyText, t } = GZ;

const DURATIONS = [5, 10, 30, 60];
let duration = 10;
let hits = 0;
let running = false;
let done = false;
let startTime = 0;
let rafId = null;
let history = [];

function rankFor(hps){
  if(hps < 4) return t('rankSlow');
  if(hps < 6) return t('rankAvg');
  if(hps < 7) return t('rankGood');
  if(hps < 9) return t('rankGreat');
  if(hps < 11) return t('rankPro');
  return t('rankGod');
}
function rankColor(hps){
  if(hps<4) return '#888'; if(hps<6) return '#61afef'; if(hps<7) return '#00d672';
  if(hps<9) return '#ffb86c'; if(hps<11) return '#e94560'; return '#bb86fc';
}

function renderModes(){
  $('#modes').innerHTML = DURATIONS.map(d=>`<button data-d="${d}" class="${d===duration?'active':''}">${d}s</button>`).join('');
  $('#modes').querySelectorAll('button').forEach(b => b.onclick = () => {
    if(running) return;
    duration = +b.dataset.d; reset(); renderModes();
  });
}

function reset(){
  running=false; done=false; hits=0; startTime=0;
  if(rafId) cancelAnimationFrame(rafId);
  $('#arena').className='sb-arena';
  $('#big').textContent='⌨️'; $('#big').style.color='';
  $('#sub').innerHTML=t('subStart');
  $('#hint').innerHTML=t('clickToStart');
  $('#sHps').textContent='0.00'; $('#sHits').textContent='0'; $('#sTime').textContent='0.0s';
  $('#rank').textContent='';
}

function tick(){
  if(!running) return;
  const elapsed = (performance.now()-startTime)/1000;
  const remain = Math.max(0, duration-elapsed);
  $('#sTime').textContent = remain.toFixed(1)+'s';
  $('#sHps').textContent = (hits/Math.max(elapsed,0.001)).toFixed(2);
  $('#sHits').textContent = hits;
  $('#big').textContent = remain.toFixed(1);
  if(remain <= 0){ finish(); return; }
  rafId = requestAnimationFrame(tick);
}

function finish(){
  running=false; done=true;
  if(rafId) cancelAnimationFrame(rafId);
  const hps = hits/duration;
  $('#arena').className='sb-arena done';
  $('#big').textContent = hps.toFixed(2);
  $('#big').style.color = rankColor(hps);
  $('#sub').textContent = t('subDone');
  $('#hint').textContent = t('timesUp');
  $('#sHps').textContent = hps.toFixed(2);
  $('#sTime').textContent = duration+'.0s';
  const rk = rankFor(hps);
  $('#rank').innerHTML = `<span style="color:${rankColor(hps)}">${rk}</span> · ${hits} ${t('hits').toLowerCase()} · ${hps.toFixed(2)} ${t('hps')}`;
  history.unshift({hps: +hps.toFixed(2), hits, mode: duration+'s', ts: Date.now()});
  if(history.length>10) history.pop();
  renderHistory();
}

function renderHistory(){
  const tb = $('#histTable').querySelector('tbody');
  if(!history.length){ tb.innerHTML = `<tr><td colspan="4" style="opacity:.5">${t('subStart')}</td></tr>`; return; }
  tb.innerHTML = history.map((h,i)=>`<tr><td>${i+1}</td><td>${h.mode}</td><td style="color:${rankColor(h.hps)};font-weight:700">${h.hps.toFixed(2)}</td><td>${h.hits}</td></tr>`).join('');
}

const arena = $('#arena');
function handleStart(){
  if(!running && !done){
    running=true; hits=1;
    startTime=performance.now();
    $('#arena').className='sb-arena running';
    $('#big').textContent='1'; $('#big').style.color='var(--accent)';
    $('#sub').textContent=t('subRun');
    $('#hint').textContent=t('pressNow');
    rafId=requestAnimationFrame(tick);
  } else if(running){
    hits++;
    $('#sHits').textContent=hits;
  } else if(done){
    reset();
  }
}
arena.addEventListener('mousedown', (e) => { e.preventDefault(); handleStart(); });
arena.addEventListener('touchstart', (e) => { e.preventDefault(); handleStart(); }, {passive:false});

// Keyboard spacebar handler — global so it works without focus
document.addEventListener('keydown', (e) => {
  if(e.code === 'Space' || e.key === ' ' || e.keyCode === 32){
    e.preventDefault();
    handleStart();
  }
});

$('#sub').innerHTML = t('subStart');
$('#hint').innerHTML = t('clickToStart');
$('#lHps').textContent = t('hps');
$('#lHits').textContent = t('hits');
$('#lTime').textContent = t('time');
$('#lblHistory').textContent = t('history');
$('#hMode').textContent = t('mode'); $('#hHps').textContent = t('hps'); $('#hHits').textContent = t('hits');

$('#rankScale').innerHTML = [
  ['<4',t('rankSlow'),'#888'],
  ['4-6',t('rankAvg'),'#61afef'],
  ['6-7',t('rankGood'),'#00d672'],
  ['7-9',t('rankGreat'),'#ffb86c'],
  ['9-11',t('rankPro'),'#e94560'],
  ['11+',t('rankGod'),'#bb86fc'],
].map(([r,n,c])=>`<span class="sb-rank-pill" style="border-color:${c};color:${c}">${r} · ${n}</span>`).join('');

$('#toolbar').innerHTML = `<button class="gz-btn gz-btn-secondary" id="btnReset">${t('reset')}</button>`;
$('#btnReset').onclick = reset;

renderModes();
renderHistory();

GZ.renderToolPage({
  category: 'fun',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🖱️', href:'/fun/cps-test.html', name:'CPS Test'},
    {icon:'⚡', href:'/fun/reaction-time.html', name:'Reaction Time Test'},
    {icon:'⌨️', href:'/fun/typing-test.html', name:'Typing Test'},
    {icon:'⌨️', href:'/fun/keyboard-tester.html', name:'Keyboard Tester'},
  ]
});
</script>
