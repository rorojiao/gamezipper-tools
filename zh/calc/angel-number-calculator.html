<script>
GZI18n.register({
  en: {
    toolTitle: 'Angel Number Calculator',
    toolDesc: 'Discover your angel number and life path from your birth date, full name, or any number that keeps appearing. Free numerology reading.',
    tabBirth: 'By birth date',
    tabName: 'By name',
    tabRepeating: 'By repeating number',
    lblBirth: 'Your birth date',
    lblName: 'Your full name (A–Z)',
    lblRepeat: 'Number you keep seeing (e.g. 1111, 333, 777)',
    lifePath: 'Life Path Number',
    angelNumber: 'Your Angel Number',
    masterNumber: 'Master Number',
    funOnly: 'For fun & reflection only — not a prediction.',
    clear: 'Clear',
    step1: 'Pick a mode — birth date, full name, or a repeating number',
    step2: 'Enter your birth date, name or the number',
    step3: 'See your angel number, life path and meaning',
    step4: 'Read meanings as journaling prompts, not predictions',
  },
  zh: {
    toolTitle: '天使数字计算器',
    toolDesc: '从出生日期、全名或反复出现的数字中找出你的天使数字和生命灵数。免费命理解读。',
    tabBirth: '按出生日期',
    tabName: '按姓名',
    tabRepeating: '按重复数字',
    lblBirth: '你的出生日期',
    lblName: '你的全名（A–Z 字母）',
    lblRepeat: '你反复看到的数字（如 1111、333、777）',
    lifePath: '生命灵数',
    angelNumber: '你的天使数字',
    masterNumber: '大师数字',
    funOnly: '仅供娱乐与反思 — 不是预言。',
    clear: '清除',
    step1: '选择模式 — 出生日期、姓名或重复数字',
    step2: '输入出生日期、姓名或数字',
    step3: '查看你的天使数字、生命灵数及其含义',
    step4: '将含义视为冥想提示，而非预言',
  }
});

const { $, t } = GZ;
let mode = 'birth';

const MEANINGS = {
  1: {title:'The Leader', text:'You are independent, ambitious and a natural pioneer. 1 is the energy of new beginnings. Your angels encourage you to trust your instincts and take initiative.'},
  2: {title:'The Peacemaker', text:'You are sensitive, cooperative and diplomatic. 2 carries the energy of partnership and balance. Trust that harmony will come through patience.'},
  3: {title:'The Creator', text:'You are expressive, joyful and creative. 3 brings inspiration, communication and self-expression. Share your gifts with the world.'},
  4: {title:'The Builder', text:'You are practical, hard-working and grounded. 4 is about stability, structure and discipline. Build your foundation one step at a time.'},
  5: {title:'The Free Spirit', text:'You are adventurous, curious and adaptable. 5 brings change, freedom and travel. Embrace the unexpected.'},
  6: {title:'The Nurturer', text:'You are loving, responsible and family-oriented. 6 carries the energy of home, care and service. Lead with compassion.'},
  7: {title:'The Seeker', text:'You are introspective, analytical and spiritual. 7 is the number of wisdom, study and inner knowing. Trust your intuition.'},
  8: {title:'The Powerhouse', text:'You are ambitious, confident and business-minded. 8 brings abundance, success and material mastery. Balance power with generosity.'},
  9: {title:'The Humanitarian', text:'You are compassionate, idealistic and wise. 9 carries universal love, completion and service to others. Let go and give back.'},
  11: {title:'Master Intuitive (11)', text:'A master number of spiritual insight and inspiration. You may feel things deeply and sense what others cannot. Channel your sensitivity into creative or healing work.'},
  22: {title:'Master Builder (22)', text:'The master number of big dreams made real. You have the vision and practicality to build something that lasts. Stay disciplined and patient.'},
  33: {title:'Master Teacher (33)', text:'The master number of compassion and uplift. You are here to guide and heal others through love and example. Self-care keeps your gift sustainable.'},
};

function reduceToSingle(n) {
  // Keep master numbers 11, 22, 33
  while (n > 9 && n !== 11 && n !== 22 && n !== 33) {
    n = String(n).split('').reduce((s,d) => s + +d, 0);
  }
  return n;
}

function letterValue(ch) {
  ch = ch.toUpperCase();
  if (ch >= 'A' && ch <= 'Z') return ch.charCodeAt(0) - 64;
  return 0;
}

function renderTabs() {
  $('#tabs').innerHTML = `
    <div class="tab ${mode==='birth'?'active':''}" onclick="switchMode('birth')">${t('tabBirth')}</div>
    <div class="tab ${mode==='name'?'active':''}" onclick="switchMode('name')">${t('tabName')}</div>
    <div class="tab ${mode==='repeat'?'active':''}" onclick="switchMode('repeat')">${t('tabRepeating')}</div>`;
}

function switchMode(m) { mode = m; renderTabs(); renderInput(); recalc(); }

function renderInput() {
  if (mode === 'birth') {
    $('#input-area').innerHTML = `<div class="field"><label>${t('lblBirth')}</label><input type="date" id="birthDate" value="1995-06-15" oninput="recalc()"></div>`;
  } else if (mode === 'name') {
    $('#input-area').innerHTML = `<div class="field"><label>${t('lblName')}</label><input type="text" id="fullName" value="John Smith" oninput="recalc()"></div>`;
  } else {
    $('#input-area').innerHTML = `<div class="field"><label>${t('lblRepeat')}</label><input type="text" id="repeatNum" value="1111" oninput="recalc()"></div>`;
  }
}

function recalc() {
  const out = $('#result');
  let num = NaN, display = '';
  if (mode === 'birth') {
    const v = $('#birthDate') ? $('#birthDate').value : '';
    const digits = v.replace(/\D/g,'');
    if (!digits) { out.innerHTML = ''; return; }
    const sum = digits.split('').reduce((s,d) => s + +d, 0);
    num = reduceToSingle(sum);
    display = num;
  } else if (mode === 'name') {
    const v = $('#fullName') ? $('#fullName').value : '';
    const sum = v.split('').reduce((s,ch) => s + letterValue(ch), 0);
    if (sum === 0) { out.innerHTML = ''; return; }
    num = reduceToSingle(sum);
    display = num;
  } else {
    const v = $('#repeatNum') ? $('#repeatNum').value.replace(/\D/g,'') : '';
    if (!v) { out.innerHTML = ''; return; }
    display = v;
    const sum = v.split('').reduce((s,d) => s + +d, 0);
    num = reduceToSingle(sum);
  }

  const meaning = MEANINGS[num] || MEANINGS[1];
  const isMaster = (num === 11 || num === 22 || num === 33);

  out.innerHTML = `
    <div class="result-card">
      <div style="color:var(--text2);font-size:.85em">${t('angelNumber')}</div>
      <div class="angel-big">${display}</div>
      <div class="life-path">${t('lifePath')}: ${num}${isMaster ? `<span class="master-badge">${t('masterNumber')}</span>` : ''}</div>
      <div class="meaning">
        <h3>${meaning.title}</h3>
        <p>${meaning.text}</p>
      </div>
      <div style="margin-top:14px;font-size:.78em;color:var(--text3)">✨ ${t('funOnly')}</div>
    </div>`;
}

window.switchMode = switchMode;
window.recalc = recalc;

$('#toolbar').innerHTML = '';

renderTabs();
renderInput();
recalc();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🎲', href:'/calc/random-number-generator.html', name:'Random Number'},
    {icon:'🔮', href:'/fun/magic-8-ball.html', name:'Magic 8 Ball'},
    {icon:'🔢', href:'/calc/numerology.html', name:'Numerology'},
    {icon:'🌙', href:'/calc/moon-phase.html', name:'Moon Phase'},
  ]
});
</script>
