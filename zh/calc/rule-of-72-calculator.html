<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"What is the Rule of 72?","acceptedAnswer":{"@type":"Answer","text":"The Rule of 72 is a simple formula to estimate how long it takes for an investment to double given a fixed annual rate of return. Divide 72 by the interest rate percentage to get the approximate number of years."}},{"@type":"Question","name":"How accurate is the Rule of 72?","acceptedAnswer":{"@type":"Answer","text":"The Rule of 72 is quite accurate for interest rates between 6% and 10%. For rates outside this range, there are slight variations: Rule of 69.3 for continuous compounding, Rule of 70 for daily compounding, and Rule of 71 for monthly compounding."}},{"@type":"Question","name":"Can I use the Rule of 72 for any investment?","acceptedAnswer":{"@type":"Answer","text":"The Rule of 72 works best for investments with consistent compound interest like savings accounts, CDs, bonds, or index funds. It's less accurate for volatile investments like stocks or those with variable returns."}},{"@type":"Question","name":"What does a 6% return mean?","acceptedAnswer":{"@type":"Answer","text":"With a 6% annual return, your investment would double in approximately 12 years (72 ÷ 6 = 12). This demonstrates the power of compound interest over time."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="gz-rule72-form" id="form">
      <label id="lbl-interestRate">Annual Interest Rate (%)
        <input type="number" id="interestRate" min="0.1" max="100" step="0.1" placeholder="7">
      </label>
      <label id="lbl-initialAmount">Initial Investment ($)
        <input type="number" id="initialAmount" min="0" step="100" placeholder="10000">
      </label>
    </div>
    <div class="gz-rule72-examples" id="examples"></div>
    <div class="gz-rule72-result" id="result" style="display:none">
      <div class="gz-rule72-years" id="doublingTime">—</div>
      <div class="gz-rule72-formula" id="formula"></div>
      <div class="gz-rule72-visualization" id="visualization"></div>
    </div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Rule of 72 Calculator',
    toolDesc: 'Estimate how long it takes to double your investment. Enter interest rate to calculate doubling time using the Rule of 72.',
    calculate: 'Calculate',
    clear: 'Clear',
    interestRate: 'Annual Interest Rate (%)',
    initialAmount: 'Initial Investment ($)',
    yearsToDouble: 'Years to Double',
    formula: 'Formula: 72 ÷ Interest Rate = Years',
    futureValue: 'Future Value',
    commonRates: 'Common Interest Rates',
    step1: 'Enter the annual interest rate (%)',
    step2: 'Optionally enter your initial investment amount',
    step3: 'Click Calculate to see doubling time',
    step4: 'View growth projection and common rate examples',
  },
  zh: {
    toolTitle: '72法则计算器',
    toolDesc: '估算投资翻倍所需时间。输入利率，使用72法则计算翻倍时间。',
    calculate: '计算',
    clear: '清除',
    interestRate: '年利率 (%)',
    initialAmount: '初始投资 ($)',
    yearsToDouble: '翻倍年数',
    formula: '公式: 72 ÷ 利率 = 年数',
    futureValue: '未来价值',
    commonRates: '常见利率',
    step1: '输入年利率(%)',
    step2: '可选输入初始投资金额',
    step3: '点击「计算」查看翻倍时间',
    step4: '查看增长预测和常见利率示例',
  }
});

const { $, t } = GZ;

function calculateRule72() {
  const rate = parseFloat($('#interestRate').value);
  const initialAmount = parseFloat($('#initialAmount').value) || 0;
  
  if (!rate || rate <= 0) {
    $('#result').style.display = 'none';
    return;
  }
  
  const years = 72 / rate;
  $('#doublingTime').textContent = years.toFixed(1) + ' ' + (years === 1 ? 'year' : 'years');
  $('#formula').innerHTML = `<strong>${t('formula')}:</strong> 72 ÷ ${rate}% = ${years.toFixed(1)} years`;
  
  if (initialAmount > 0) {
    const doubledAmount = initialAmount * 2;
    $('#formula').innerHTML += `<br><small style="color:var(--gz-text2,#aaa)">${t('futureValue')}: $${initialAmount.toLocaleString()} → $${doubledAmount.toLocaleString()}</small>`;
    
    // Create growth visualization
    let barsHTML = '<div class="gz-rule72-bars">';
    const milestones = [0, years/4, years/2, years*3/4, years];
    const maxAmount = initialAmount * 2.5;
    
    milestones.forEach((year, i) => {
      const amount = initialAmount * Math.pow(1 + rate/100, year);
      const height = (amount / maxAmount) * 100;
      barsHTML += `
        <div class="gz-rule72-bar" style="height:${height}%">
          <span class="bar-value">$${formatNumber(amount)}</span>
          <span>${year.toFixed(1)}y</span>
        </div>`;
    });
    barsHTML += '</div>';
    $('#visualization').innerHTML = barsHTML;
  } else {
    $('#visualization').innerHTML = '';
  }
  
  $('#result').style.display = 'block';
}

function formatNumber(num) {
  if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
  if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
  return num.toFixed(0);
}

function setExample(rate) {
  $('#interestRate').value = rate;
  calculateRule72();
}

function doClear() {
  $('#interestRate').value = '';
  $('#initialAmount').value = '';
  $('#result').style.display = 'none';
}

$('#interestRate').addEventListener('input', calculateRule72);
$('#initialAmount').addEventListener('input', calculateRule72);

const examples = [
  { rate: 2, label: '2% - Savings' },
  { rate: 4, label: '4% - Bonds' },
  { rate: 6, label: '6% - Conservative' },
  { rate: 8, label: '8% - Balanced' },
  { rate: 10, label: '10% - Growth' },
  { rate: 12, label: '12% - Aggressive' },
];

$('#examples').innerHTML = examples.map(ex => `
  <div class="gz-rule72-example" onclick="setExample(${ex.rate})">
    <strong>${ex.rate}%</strong>
    <span>${ex.label}</span>
  </div>
`).join('');

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="calculateRule72()">${t('calculate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📈', href:'/calc/compound-interest-calculator.html', name:'Compound Interest'},
    {icon:'💰', href:'/calc/roi-calculator.html', name:'ROI Calculator'},
    {icon:'🎯', href:'/calc/investment-calculator.html', name:'Investment Calculator'},
    {icon:'📊', href:'/calc/savings-calculator.html', name:'Savings Calculator'},
  ]
});
</script>

</body>
