.sc-time .n{font-size:1.8rem;font-weight:900;color:var(--accent2)}

</style>

<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "How much does a pack-a-day smoker spend per year?", "acceptedAnswer": {"@type": "Answer", "text": "At the US average of about $8 per pack, a pack-a-day smoker spends roughly $2,920 per year on cigarettes. In high-tax states like New York or California the total can exceed $5,000 per year."}}, {"@type": "Question", "name": "How is the lifetime smoking cost calculated?", "acceptedAnswer": {"@type": "Answer", "text": "We multiply your daily cost by the number of years you've been smoking (and the years until a target age you set). The estimate uses your current pack price and daily amount and does not adjust for inflation or future tax rises — both would push the real number higher."}}, {"@type": "Question", "name": "How much money will I save by quitting smoking?", "acceptedAnswer": {"@type": "Answer", "text": "Your savings equal your daily cigarette cost times the number of days since you quit. Quitting a $8/day habit saves about $240 per month, $2,920 per year, and $29,200 over a decade — plus lower health, dental and insurance costs."}}, {"@type": "Question", "name": "What do those savings buy?", "acceptedAnswer": {"@type": "Answer", "text": "To make the number feel real, we translate your yearly savings into everyday equivalents — cups of coffee, movie tickets, tankfuls of gas, concert tickets and flights — so you can see exactly what you're giving up."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="sc-form">
      <div class="sc-row">
        <div>
          <label id="lbl-cig"></label>
          <input type="number" id="cig" value="20" min="0" step="1">
        </div>
        <div>
          <label id="lbl-pack"></label>
          <input type="number" id="packPrice" value="8" min="0" step="0.1">
        </div>
      </div>
      <div class="sc-row">
        <div>
          <label id="lbl-currency"></label>
          <select id="currency">
            <option value="$">USD ($)</option>
            <option value="€">EUR (€)</option>
            <option value="£">GBP (£)</option>
            <option value="¥">CNY (¥)</option>
            <option value="₹">INR (₹)</option>
            <option value="A$">AUD (A$)</option>
            <option value="C$">CAD (C$)</option>
          </select>
        </div>
        <div>
          <label id="lbl-per-pack"></label>
          <input type="number" id="perPack" value="20" min="1" step="1">
        </div>
      </div>
      <div>
        <label id="lbl-years"></label>
        <input type="number" id="years" value="10" min="0" step="1">
      </div>
    </div>
    <div id="result"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Smoking Cost Calculator',
    toolDesc: 'See exactly how much smoking costs you per day, week, month and year — plus your lifetime total and how much you save by quitting.',
    lblCig: 'Cigarettes per day',
    lblPack: 'Price per pack',
    lblCurrency: 'Currency',
    lblPerPack: 'Cigarettes per pack',
    lblYears: 'Years you have smoked',
    step1: 'Enter how many cigarettes you smoke per day and the price of a pack',
    step2: 'Pick your currency and the number of cigarettes in a pack (usually 20)',
    step3: 'Enter how many years you have smoked so far',
    step4: 'Read the daily, weekly, monthly and yearly cost plus savings if you quit',
  },
  zh: {
    toolTitle: '吸烟花费计算器',
    toolDesc: '查看你的吸烟习惯每天、每周、每月和每年花多少钱 — 以及戒烟后能省下多少。',
    lblCig: '每天抽烟数（支）',
    lblPack: '每包价格',
    lblCurrency: '货币',
    lblPerPack: '每包烟支数',
    lblYears: '已吸烟年数',
    step1: '输入你每天抽多少支烟以及一包烟的价格',
    step2: '选择货币和每包烟的支数（通常为 20）',
    step3: '输入你已经吸烟了多少年',
    step4: '查看每天、每周、每月和每年的花费，以及戒烟后能省下的钱',
  }
});

const { t } = GZ;
const lang = GZI18n.getLang();

function cur(n) {
  const c = document.getElementById('currency').value;
  if (n >= 1000000) return c + (n/1000000).toFixed(2) + 'M';
  if (n >= 10000) return c + Math.round(n).toLocaleString();
  return c + Math.round(n*100)/100;
}

function render() {
  const cig = parseFloat(document.getElementById('cig').value) || 0;
  const price = parseFloat(document.getElementById('packPrice').value) || 0;
  const perPack = parseFloat(document.getElementById('perPack').value) || 20;
  const years = parseFloat(document.getElementById('years').value) || 0;
  const costPerCig = perPack > 0 ? price / perPack : 0;
  const perDay = cig * costPerCig;
  const perWeek = perDay * 7;
  const perMonth = perDay * 30.4;
  const perYear = perDay * 365;
  const soFar = perYear * years;
  const quitNow10 = perYear * 10;
  const quitNow20 = perYear * 20;

  // Equivalent equivalents (per year) — rough USD-like reference; same currency as user
  const coffee = perYear / 4;
  const movie = perYear / 15;
  const gas = perYear / 50;
  const concert = perYear / 100;
  const flight = perYear / 350;
  const laptop = perYear / 1200;

  const minutesLost = cig * 11 * 365 * years; // ~11 min/cig
  const daysLost = Math.round(minutesLost / (60*24));

  const html = `
  <div class="sc-big">
    <div class="amt">${cur(perYear)}</div>
    <div class="cap">${lang==='zh'?'每年花费':'Cost per year'}</div>
  </div>
  <div class="sc-grid">
    <div class="sc-card"><div class="lbl">${lang==='zh'?'每天':'Per day'}</div><div class="val">${cur(perDay)}</div></div>
    <div class="sc-card"><div class="lbl">${lang==='zh'?'每周':'Per week'}</div><div class="val">${cur(perWeek)}</div></div>
    <div class="sc-card"><div class="lbl">${lang==='zh'?'每月':'Per month'}</div><div class="val">${cur(perMonth)}</div></div>
    <div class="sc-card"><div class="lbl">${lang==='zh'?'已花掉':'Spent so far'}</div><div class="val">${cur(soFar)}</div><div style="font-size:.7rem;color:var(--text2)">${years} ${lang==='zh'?'年累计':'yrs total'}</div></div>
  </div>
  <div class="sc-eq">
    <div class="head">${lang==='zh'?'如果你现在戒烟，能省下':'If you quit now, you would save'}</div>
    <div class="item"><span>${lang==='zh'?'1 年':'In 1 year'}</span><span class="v">${cur(perYear)}</span></div>
    <div class="item"><span>${lang==='zh'?'5 年':'In 5 years'}</span><span class="v">${cur(perYear*5)}</span></div>
    <div class="item"><span>${lang==='zh'?'10 年':'In 10 years'}</span><span class="v">${cur(quitNow10)}</span></div>
    <div class="item"><span>${lang==='zh'?'20 年':'In 20 years'}</span><span class="v">${cur(quitNow20)}</span></div>
  </div>
  <div style="margin-top:14px;font-size:.85rem;color:var(--text2);font-weight:600">${lang==='zh'?'你的年度烟钱还能买：':'Your yearly smoking budget could buy:'}</div>
  <div class="sc-equivalents">
    <div class="sc-eqv"><div class="ico">☕</div><div class="what">${lang==='zh'?'咖啡':'coffees'}</div><div class="q">${Math.round(coffee).toLocaleString()}</div></div>
    <div class="sc-eqv"><div class="ico">🎬</div><div class="what">${lang==='zh'?'电影票':'movie tickets'}</div><div class="q">${Math.round(movie).toLocaleString()}</div></div>
    <div class="sc-eqv"><div class="ico">⛽</div><div class="what">${lang==='zh'?'油箱':'tankfuls of gas'}</div><div class="q">${Math.round(gas).toLocaleString()}</div></div>
    <div class="sc-eqv"><div class="ico">🎫</div><div class="what">${lang==='zh'?'演唱会':'concert tickets'}</div><div class="q">${Math.round(concert).toLocaleString()}</div></div>
    <div class="sc-eqv"><div class="ico">✈️</div><div class="what">${lang==='zh'?'机票':'flights'}</div><div class="q">${Math.round(flight).toLocaleString()}</div></div>
    <div class="sc-eqv"><div class="ico">💻</div><div class="what">${lang==='zh'?'笔记本':'laptops'}</div><div class="q">${Math.round(laptop).toLocaleString()}</div></div>
  </div>
  <div class="sc-time">
    <div class="n">${daysLost.toLocaleString()} ${lang==='zh'?'天':'days'}</div>
    <div class="t">${lang==='zh'?`按每支烟约 11 分钟寿命计算，过去 ${years} 年你已损失约这么多时间`:`~11 min per cigarette: time lost over ${years} years (approx.)`}</div>
  </div>`;
  document.getElementById('result').innerHTML = html;
}

function setupLabels() {
  document.getElementById('lbl-cig').textContent = t('lblCig');
  document.getElementById('lbl-pack').textContent = t('lblPack');
  document.getElementById('lbl-currency').textContent = t('lblCurrency');
  document.getElementById('lbl-per-pack').textContent = t('lblPerPack');
  document.getElementById('lbl-years').textContent = t('lblYears');
}

setupLabels();

['cig','packPrice','perPack','years','currency'].forEach(id => {
  const el = document.getElementById(id);
  el.addEventListener('input', render);
  el.addEventListener('change', render);
});

render();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'☕', href:'/calc/coffee-caffeine.html', name:'Caffeine'},
    {icon:'💰', href:'/calc/savings-goal-calculator.html', name:'Savings Goal'},
    {icon:'🏦', href:'/calc/loan-calculator.html', name:'Loan'},
    {icon:'📈', href:'/calc/compound-interest.html', name:'Compound Interest'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
