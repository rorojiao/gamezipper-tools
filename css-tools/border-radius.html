<script>
GZI18n.register({
  en: {
    toolTitle: 'CSS Border Radius Generator',
    toolDesc: 'Generate CSS border-radius visually with live preview. Drag sliders, use presets, and copy the code.',
    tl: 'Top Left', tr: 'Top Right', br: 'Bottom Right', bl: 'Bottom Left',
    linkCorners: 'Link corners',
    unit: 'Unit', px: 'px', pct: '%',
    presets: 'Presets', circle: 'Circle', pill: 'Pill', blob: 'Blob', leaf: 'Leaf', square: 'Square',
    codeLabel: 'CSS Code',
    step1: 'Drag sliders to adjust each corner radius',
    step2: 'Or click a preset for common shapes',
    step3: 'Toggle between px and % units',
    step4: 'Copy the generated CSS code',
    copied: 'Copied!',
  },
  zh: {
    toolTitle: 'CSS 圆角生成器',
    toolDesc: '可视化生成 CSS border-radius，实时预览，拖动滑块或使用预设，一键复制代码。',
    tl: '左上', tr: '右上', br: '右下', bl: '左下',
    linkCorners: '联动四角',
    unit: '单位', px: 'px', pct: '%',
    presets: '预设', circle: '圆形', pill: '胶囊', blob: '水滴', leaf: '叶子', square: '方形',
    codeLabel: 'CSS 代码',
    step1: '拖动滑块调整每个角的圆角半径',
    step2: '或点击预设使用常见形状',
    step3: '切换 px 和 % 单位',
    step4: '一键复制生成的 CSS 代码',
    copied: '已复制！',
  }
});

const { $, copyText, t } = GZ;
let vals = [20, 20, 20, 20];
let unit = 'px';
let linked = true;

function buildControls() {
  const labels = ['tl', 'tr', 'br', 'bl'];
  let html = '';
  labels.forEach((l, i) => {
    html += `<label>${t(l)}<input type="range" min="0" max="150" value="${vals[i]}" data-i="${i}" oninput="onSlider(this)"><span id="val${i}">${vals[i]}${unit}</span></label>`;
  });
  html += `<label style="grid-column:1/-1;display:flex;flex-direction:row;align-items:center;gap:8px"><input type="checkbox" ${linked?'checked':''} onchange="linked=this.checked"> ${t('linkCorners')}</label>`;
  html += `<label>${t('unit')}<select class="gz-select" onchange="unit=this.value;update()"><option value="px"${unit==='px'?' selected':''}>px</option><option value="%"${unit==='%'?' selected':''}>%</option></select></label>`;
  $('#controls').innerHTML = html;
}

function onSlider(el) {
  const i = +el.dataset.i;
  const v = +el.value;
  if (linked) { vals = [v, v, v, v]; } else { vals[i] = v; }
  update();
}

function update() {
  const br = vals.map(v => v + unit).join(' ');
  $('#preview').style.borderRadius = br;
  $('#codeText').textContent = `border-radius: ${br};`;
  for (let i = 0; i < 4; i++) {
    const el = document.getElementById('val' + i);
    if (el) el.textContent = vals[i] + unit;
    const slider = document.querySelector(`input[type=range][data-i="${i}"]`);
    if (slider && linked) slider.value = vals[i];
  }
}

function applyPreset(v) {
  if (linked) { vals = [v, v, v, v]; } else { vals = [...v]; }
  update();
  buildControls();
}

function copyCode() {
  copyText($('#codeText').textContent);
  const btn = $('#code').querySelector('button');
  btn.textContent = t('copied');
  setTimeout(() => btn.textContent = 'Copy', 1500);
}

$('#toolbar').innerHTML = `
  <span style="font-weight:600;margin-right:8px">${t('presets')}:</span>
  <button class="gz-btn gz-btn-secondary" onclick="linked=true;applyPreset(50);unit='%';buildControls();update()">${t('circle')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="linked=true;applyPreset(999);unit='px';buildControls();update()">${t('pill')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="linked=false;applyPreset([60,40,60,40]);buildControls()">${t('blob')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="linked=false;applyPreset([0,50,50,0]);buildControls()">${t('leaf')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="linked=true;applyPreset(0);unit='px';buildControls();update()">${t('square')}</button>
  <button class="gz-btn" onclick="copyCode()">${t('copy')}</button>`;

buildControls();
update();

GZ.renderToolPage({
  category: 'css',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🌈', href:'/css-tools/gradient.html', name:'CSS Gradient'},
    {icon:'🔲', href:'/css-tools/shadow.html', name:'Box Shadow'},
    {icon:'📐', href:'/css-tools/flexbox.html', name:'Flexbox'},
    {icon:'✂️', href:'/css-tools/clip-path.html', name:'Clip-Path'},
  ]
});
</script>
