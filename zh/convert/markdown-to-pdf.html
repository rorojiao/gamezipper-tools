function escapeHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function renderMd(md){
  if(!md) return '';
  // First escape all HTML to prevent injection
  let s = escapeHtml(md);
  // Restore fenced code blocks (preserve content) — process them first
  s = s.replace(/```([a-z0-9_-]*)\n([\s\S]*?)```/gi, function(_,lang,code){
    return '<pre><code class="language-'+(lang||'')+'">'+code.replace(/\n$/,'')+'</code></pre>';
  });
  s = s.replace(/`([^`\n]+)`/g,'<code>$1</code>');
  // Headings
  s = s.replace(/^######\s+(.*)$/gm,'<h6>$1</h6>');
  s = s.replace(/^#####\s+(.*)$/gm,'<h5>$1</h5>');
  s = s.replace(/^####\s+(.*)$/gm,'<h4>$1</h4>');
  s = s.replace(/^###\s+(.*)$/gm,'<h3>$1</h3>');
  s = s.replace(/^##\s+(.*)$/gm,'<h2>$1</h2>');
  s = s.replace(/^#\s+(.*)$/gm,'<h1>$1</h1>');
  // Bold and italic
  s = s.replace(/\*\*([^*\n]+)\*\*/g,'<strong>$1</strong>');
  s = s.replace(/__([^_\n]+)__/g,'<strong>$1</strong>');
  s = s.replace(/(?<!\*)\*([^*\n]+)\*(?!\*)/g,'<em>$1</em>');
  s = s.replace(/(?<!_)_([^_\n]+)_(?!_)/g,'<em>$1</em>');
  // Strikethrough (GFM)
  s = s.replace(/~~([^~\n]+)~~/g,'<del>$1</del>');
  // Links and images
  s = s.replace(/!\[([^\]]*)\]\(([^)\s]+)(?:\s+"([^"]*)")?\)/g,'<img alt="$1" src="$2" title="$3">');
  s = s.replace(/\[([^\]]+)\]\(([^)\s]+)(?:\s+"([^"]*)")?\)/g,'<a href="$2" title="$3">$1</a>');
  // Blockquote
  s = s.replace(/^&gt;\s?(.*)$/gm,'<blockquote>$1</blockquote>');
  // HR
  s = s.replace(/^---+$/gm,'<hr>');
  s = s.replace(/^\*\*\*+$/gm,'<hr>');
  // Tables (GFM)
  s = s.replace(/((?:^\|.*\|\n)+)/gm, function(block){
    const lines = block.trim().split('\n');
    if(lines.length<2) return block;
    const heads = lines[0].split('|').slice(1,-1).map(h=>h.trim());
    if(!/^\|?\s*:?-{3,}/.test(lines[1])) return block;
    const rows = lines.slice(2).map(r=>r.split('|').slice(1,-1).map(c=>c.trim()));
    let t = '<table><thead><tr>';
    heads.forEach(h=>t+='<th>'+h+'</th>');
    t += '</tr></thead><tbody>';
    rows.forEach(r=>{t+='<tr>';r.forEach(c=>t+='<td>'+c+'</td>');t+='</tr>';});
    t += '</tbody></table>';
    return t;
  });
  // Unordered lists
  s = s.replace(/(?:^[ \t]*[-*+]\s+.*\n?)+/gm, function(block){
    const items = block.trim().split('\n').map(l=>l.replace(/^[ \t]*[-*+]\s+/,''));
    return '<ul>'+items.map(i=>'<li>'+i+'</li>').join('')+'</ul>';
  });
  // Ordered lists
  s = s.replace(/(?:^[ \t]*\d+\.\s+.*\n?)+/gm, function(block){
    const items = block.trim().split('\n').map(l=>l.replace(/^[ \t]*\d+\.\s+/,''));
    return '<ol>'+items.map(i=>'<li>'+i+'</li>').join('')+'</ol>';
  });
  // Paragraphs
  s = s.split(/\n{2,}/).map(p=>{
    if(!p.trim()) return '';
    if(/^<(h[1-6]|ul|ol|pre|table|blockquote|hr|div)/.test(p.trim())) return p;
    return '<p>'+p.replace(/\n/g,'<br>')+'</p>';
  }).join('\n');
  return s;
}
