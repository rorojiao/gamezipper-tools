    resetLbl: '加载其他文件',
    captured: '帧已截取',
    step1: '拖入或选择视频文件（MP4、WebM 或 MOV）',
    step2: '拖动定位滑块到想要的时刻',
    step3: '点击「截取当前帧」，或切换到批量模式一次抓取多帧',
    step4: '单独下载 PNG 或点击「全部下载为 ZIP」',

const { $, t } = GZ;
const video = $('#video');
let frames = []; // [{ dataUrl, time, label }]
let fileName = 'frame';

function formatTime(s) {
  if (!isFinite(s)) return '00:00.000';
  const mm = Math.floor(s / 60).toString().padStart(2, '0');
  const ss = Math.floor(s % 60).toString().padStart(2, '0');
  const ms = Math.floor((s % 1) * 1000).toString().padStart(3, '0');
  return `${mm}:${ss}.${ms}`;
}

function captureCurrentFrame() {
  const canvas = document.createElement('canvas');
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  if (!canvas.width || !canvas.height) return null;
  canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
  return { dataUrl: canvas.toDataURL('image/png'), time: video.currentTime, label: formatTime(video.currentTime) };
}

function renderFrames() {
  const grid = $('#frame-grid');
  grid.innerHTML = '';
  frames.forEach((f, i) => {
    const card = document.createElement('div');
    card.className = 'frame-card';
    const img = document.createElement('img');
    img.src = f.dataUrl; img.alt = `Frame at ${f.label}`;
    card.appendChild(img);
    const meta = document.createElement('div');
    meta.className = 'meta';
    meta.innerHTML = `<span>#${i+1} · ${f.label}</span>`;
    const dl = document.createElement('a');
    dl.href = '#'; dl.textContent = '⬇️';
    dl.onclick = (e) => {
      e.preventDefault();
      const a = document.createElement('a');
      a.href = f.dataUrl;
      a.download = `${fileName}_${String(i+1).padStart(3,'0')}_${f.label.replace(/[:.]/g,'-')}.png`;
      a.click();
    };
    meta.appendChild(dl);
    card.appendChild(meta);
    grid.appendChild(card);
  });
  $('#status').textContent = frames.length ? `${frames.length} ${t('captured')}` : '';
}

function handleFile(file) {
  if (!file || !file.type.startsWith('video/')) { $('#status').textContent = '⚠️ Please select a video file.'; return; }
  fileName = file.name.replace(/\.[^.]+$/, '') || 'frame';
  const url = URL.createObjectURL(file);
  video.src = url;
  $('#drop-area').style.display = 'none';
  $('#editor').style.display = 'block';
  video.onloadedmetadata = () => {
    $('#seek').max = video.duration || 100;
    $('#time-label').textContent = `00:00.000 / ${formatTime(video.duration)}`;
  };
}

video.ontimeupdate = () => {
  if (document.activeElement !== $('#seek')) {
    $('#seek').value = video.currentTime;
  }
  $('#time-label').textContent = `${formatTime(video.currentTime)} / ${formatTime(video.duration)}`;
};
$('#seek').oninput = () => { video.currentTime = parseFloat($('#seek').value); };

document.querySelectorAll('input[name=mode]').forEach(r => {
  r.onchange = () => {
    const batch = r.value === 'batch';
    $('#batch-opts').style.display = batch ? 'flex' : 'none';
    $('#capture').childNodes[1].textContent = batch ? t('captureLbl') + ' (' + t('batchFramesLbl') + ')' : t('captureLbl');
  };
});

$('#capture').onclick = async () => {
  const mode = document.querySelector('input[name=mode]:checked').value;
  if (mode === 'single') {
    const f = captureCurrentFrame();
    if (f) { frames.push(f); renderFrames(); }
  } else {
    const count = Math.max(2, Math.min(200, parseInt($('#batchCount').value) || 10));
    const dur = video.duration;
    if (!isFinite(dur)) { $('#status').textContent = '⚠️ Video duration unknown.'; return; }
    $('#status').textContent = '⏳ Capturing...';
    // Pause and seek through the video, capturing at each step
    video.pause();
    for (let i = 0; i < count; i++) {
      const time = (dur * (i + 0.5)) / count; // center each frame
      await new Promise(res => {
        const onSeek = () => { video.removeEventListener('seeked', onSeek); res(); };
        video.addEventListener('seeked', onSeek);
        video.currentTime = time;
      });
      // Small delay to ensure frame is painted
      await new Promise(r => setTimeout(r, 60));
      const f = captureCurrentFrame();
      if (f) frames.push(f);
      $('#status').textContent = `⏳ ${i+1} / ${count}`;
    }
    renderFrames();
  }
};

$('#clear-frames').onclick = () => { frames = []; renderFrames(); };
$('#reset').onclick = () => {
  frames = [];
  video.pause(); video.removeAttribute('src'); video.load();
  $('#editor').style.display = 'none';
  $('#drop-area').style.display = 'block';
  $('#status').textContent = '';
  $('#file-input').value = '';
  $('#drop-text').textContent = t('dropHere');
};

// Minimal ZIP writer (store)
async function downloadZip() {
  if (!frames.length) return;
  $('#status').textContent = '⏳ Zipping...';
  const files = [];
  for (let i = 0; i < frames.length; i++) {
    const blob = await (await fetch(frames[i].dataUrl)).blob();
    files.push({ name: `${fileName}_${String(i+1).padStart(3,'0')}.png`, data: new Uint8Array(await blob.arrayBuffer()) });
  }
  const zip = buildZip(files);
  const blob = new Blob([zip], { type: 'application/zip' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `${fileName}_frames.zip`;
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 5000);
  $('#status').textContent = `✓ ${files.length} frames zipped`;
}
function buildZip(files) {
  const crcTable = (() => { const t = new Uint32Array(256); for (let i=0;i<256;i++){let c=i;for(let k=0;k<8;k++)c=(c&1)?(0xEDB88320^(c>>>1)):(c>>>1);t[i]=c>>>0;} return t; })();
  function crc32(buf){let c=0xFFFFFFFF;for(let i=0;i<buf.length;i++)c=crcTable[(c^buf[i])&0xFF]^(c>>>8);return(c^0xFFFFFFFF)>>>0;}
  function str(s){return new TextEncoder().encode(s);}
  function u16(n){return[n&0xff,(n>>>8)&0xff];}
  function u32(n){return[n&0xff,(n>>>8)&0xff,(n>>>16)&0xff,(n>>>24)&0xff];}
  const chunks=[];const central=[];let offset=0;
  for(const f of files){
    const name=str(f.name);const crc=crc32(f.data);
    const local=[].concat(u32(0x04034b50),u16(20),u16(0x0800),u16(0),u16(0),u16(0),u32(crc),u32(f.data.length),u32(f.data.length),u16(name.length),u16(0),Array.from(name),Array.from(f.data));
    central.push([].concat(u32(0x02014b50),u16(20),u16(20),u16(0x0800),u16(0),u16(0),u16(0),u32(crc),u32(f.data.length),u32(f.data.length),u16(name.length),u16(0),u16(0),u16(0),u16(0),u32(0),u32(offset),Array.from(name)));
    chunks.push(new Uint8Array(local));offset+=local.length;
  }
  const cdStart=offset;let cdSize=0;
  central.forEach(c=>{chunks.push(new Uint8Array(c));cdSize+=c.length;});
  const end=[].concat(u32(0x06054b50),u16(0),u16(0),u16(files.length),u16(files.length),u32(cdSize),u32(cdStart),u16(0));
  chunks.push(new Uint8Array(end));
  const total=chunks.reduce((a,c)=>a+c.length,0);const out=new Uint8Array(total);let o=0;
  chunks.forEach(c=>{out.set(c,o);o+=c.length;});return out;
}
$('#download-zip').onclick = downloadZip;

$('#drop-area').onclick = () => $('#file-input').click();
$('#file-input').onchange = e => { if (e.target.files[0]) handleFile(e.target.files[0]); };
$('#drop-area').ondragover = e => { e.preventDefault(); $('#drop-area').classList.add('drag'); };
$('#drop-area').ondragleave = () => $('#drop-area').classList.remove('drag');
$('#drop-area').ondrop = e => { e.preventDefault(); $('#drop-area').classList.remove('drag'); if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]); };

$('#drop-text').textContent = t('dropHere');
$('#seekLbl').textContent = t('seekLbl');
$('#modeSingleLbl').textContent = t('modeSingleLbl');
$('#modeBatchLbl').textContent = t('modeBatchLbl');
$('#batchCountLbl').textContent = t('batchCountLbl');
$('#batchFramesLbl').textContent = t('batchFramesLbl');
$('#captureLbl').textContent = t('captureLbl');
$('#zipLbl').textContent = t('zipLbl');
$('#clearLbl').textContent = t('clearLbl');
$('#resetLbl').textContent = t('resetLbl');
