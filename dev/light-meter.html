<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"How does the light meter estimate lux?","acceptedAnswer":{"@type":"Answer","text":"It captures a frame from your camera and computes the average pixel brightness, which is then mapped to an approximate lux value. The reading is calibrated against typical office lighting conditions."}},{"@type":"Question","name":"How accurate is it?","acceptedAnswer":{"@type":"Answer","text":"The estimated lux is approximate, since webcams are not calibrated lux sensors. It's great for relative comparisons (brighter vs darker) and general lighting checks, but not for professional photography metering."}},{"@type":"Question","name":"What is a good lux for reading?","acceptedAnswer":{"@type":"Answer","text":"For comfortable reading, 300-500 lux is recommended. Office work needs 500 lux, while detailed tasks like drafting need 1000+ lux. Outdoor sunlight can exceed 100,000 lux."}},{"@type":"Question","name":"Is the camera feed private?","acceptedAnswer":{"@type":"Answer","text":"Yes. The camera feed is processed entirely in your browser using Canvas API. No images or video are ever sent to any server — 100% private."}}]}</script>

<script>
GZI18n.register({
  en: {
    toolTitle: 'Light Meter (Lux Meter)',
    toolDesc: 'Measure ambient light intensity in lux using your phone or webcam. Free online lux meter — check room lighting, screen brightness and photography exposure.',
    start: '📷 Start Camera',
    stop: '⏹ Stop',
    veryDark: 'Very dark — turn on more lights',
    dark: 'Dim — typical of mood lighting',
    normal: 'Comfortable — good for living spaces',
    bright: 'Bright — suitable for reading and office work',
    veryBright: 'Very bright — daylight conditions',
    notSupported: '⚠ Camera access is required. Please allow camera permission and try again.',
    step1: 'Click "Start Camera" and allow camera access when prompted',
    step2: 'Point your camera at the area you want to measure',
    step3: 'Read the estimated lux value — it updates in real time',
    step4: 'Compare against the reference table below to evaluate your lighting',
  },
  zh: {
    toolTitle: '照度计（Lux Meter）',
    toolDesc: '使用手机或网络摄像头测量环境光照度（lux）。免费在线照度计 — 检查室内照明、屏幕亮度和摄影曝光。',
    start: '📷 开启摄像头',
    stop: '⏹ 停止',
    veryDark: '非常暗 — 请开灯',
    dark: '昏暗 — 氛围灯光',
    normal: '舒适 — 适合起居室',
    bright: '明亮 — 适合阅读和办公',
    veryBright: '非常明亮 — 日照条件',
    notSupported: '⚠ 需要摄像头权限。请允许摄像头访问后重试。',
    step1: '点击「开启摄像头」并在提示时允许访问',
    step2: '将摄像头对准要测量的区域',
    step3: '读取估算 lux 值 — 实时更新',
    step4: '对照下方参考表评估照明条件',
  }
});

const { $, t } = GZ;
let stream = null;
let video = $('#video');
let canvas = $('#preview');
let ctx = canvas.getContext('2d');
let running = false;

async function start(){
  try{
    stream = await navigator.mediaDevices.getUserMedia({video: {facingMode: 'environment'}, audio: false});
    video.srcObject = stream;
    video.play();
    running = true;
    measureLoop();
    $('#status').textContent = '';
  }catch(err){ $('#status').textContent = t('notSupported'); }
}

function stop(){
  running = false;
  if(stream){ stream.getTracks().forEach(tr => tr.stop()); stream = null; }
  ctx.clearRect(0,0,canvas.width,canvas.height);
}

function measureLoop(){
  if(!running) return;
  if(video.readyState >= 2){
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    const data = ctx.getImageData(0,0,canvas.width,canvas.height).data;
    let sum = 0;
    for(let i=0;i<data.length;i+=4){
      // Rec709 luma
      sum += 0.2126*data[i] + 0.7152*data[i+1] + 0.0722*data[i+2];
    }
    const avg = sum / (data.length/4);
    // Map 0-255 brightness to approximate lux using a gamma curve
    const norm = avg / 255;
    // Calibrate so that office lighting (~500 lux) maps to avg ~128
    const lux = Math.round(Math.pow(norm, 2.5) * 100000);
    $('#lux').textContent = lux.toLocaleString();
    const pct = Math.min(100, Math.log10(lux+1) / 5 * 100);
    $('#luxBar').style.width = pct + '%';
    const el = $('#context');
    if(lux < 10){ el.textContent = t('veryDark'); el.style.background='rgba(40,40,60,.4)'; el.style.color='#adb5bd'; }
    else if(lux < 50){ el.textContent = t('dark'); el.style.background='rgba(108,117,125,.2)'; el.style.color='#adb5bd'; }
    else if(lux < 300){ el.textContent = t('normal'); el.style.background='rgba(78,205,196,.15)'; el.style.color='#4ecdc4'; }
    else if(lux < 2000){ el.textContent = t('bright'); el.style.background='rgba(255,230,109,.15)'; el.style.color='#ffe66d'; }
    else { el.textContent = t('veryBright'); el.style.background='rgba(255,107,107,.15)'; el.style.color='#ff6b6b'; }
  }
  requestAnimationFrame(measureLoop);
}

$('#toolbar').innerHTML = `<button class="gz-btn" onclick="start()">${t('start')}</button><button class="gz-btn gz-btn-secondary" onclick="stop()">${t('stop')}</button>`;

GZ.renderToolPage({

  titleKey: 'toolTitle',
  descKey: 'toolDesc',

    {icon:'🌡️', href:'/dev/barometer.html', name:'Barometer'},
    {icon:'📷', href:'/dev/webcam-test.html', name:'Webcam Test'},
  ]
});
</script>
