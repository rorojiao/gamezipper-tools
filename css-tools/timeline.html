.tl-layout{display:grid;grid-template-columns:340px 1fr;gap:18px;margin-top:12px}
@media(max-width:900px){.tl-layout{grid-template-columns:1fr}}
.tl-panel{background:var(--glass);border:1px solid var(--border);border-radius:14px;padding:16px}
.tl-row{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:10px}
.tl-row label{font-size:.85em;font-weight:600;color:var(--text2);flex:1}
.tl-row select,.tl-row input[type=text],.tl-row input[type=color]{flex:1.4;padding:6px 8px;border:1px solid var(--border);border-radius:8px;background:var(--glass2);color:var(--text);font-size:.85em;min-width:0}
.tl-row input[type=color]{width:36px;height:32px;flex:0 0 36px;cursor:pointer}
.tl-events{display:flex;flex-direction:column;gap:8px;max-height:280px;overflow-y:auto;padding:4px;background:var(--glass2);border-radius:8px}
.tl-event{display:flex;gap:6px;align-items:center;background:var(--glass);padding:6px 8px;border-radius:6px}
.tl-event input{flex:1;padding:4px 6px;border:1px solid var(--border);border-radius:4px;background:var(--glass2);color:var(--text);font-size:.8em;min-width:0}
.tl-event .icon-input{width:36px;flex:0 0 36px;text-align:center}
.tl-event button{background:var(--gz-accent);color:#fff;border:none;width:22px;height:22px;border-radius:4px;cursor:pointer;font-size:.9em;padding:0}
.tl-event button.del{background:var(--gz-accent, #e94560)}
.tl-preview{padding:24px;background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);border-radius:14px;min-height:480px;overflow:auto}
.tl-timeline{position:relative;padding:20px 0;margin:0;list-style:none}
.tl-timeline.vertical::before{content:"";position:absolute;left:24px;top:0;bottom:0;width:3px;background:var(--accent-c,#5566ff);border-radius:3px}
.tl-timeline.horizontal{display:flex;gap:32px;overflow-x:auto;padding:20px 0}
.tl-timeline.horizontal::before{content:"";position:absolute;left:0;right:0;top:38px;height:3px;background:var(--accent-c,#5566ff);border-radius:3px}
.tl-item-v{position:relative;padding-left:60px;margin-bottom:24px;min-height:48px}
.tl-item-v::before{content:"";position:absolute;left:14px;top:6px;width:22px;height:22px;border-radius:50%;background:var(--accent-c,#5566ff);border:4px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.3);z-index:1}
.tl-item-h{min-width:220px;flex-shrink:0;padding-top:64px;position:relative;text-align:center;color:#fff}
.tl-item-h::before{content:"";position:absolute;left:50%;top:30px;width:20px;height:20px;border-radius:50%;background:var(--accent-c,#5566ff);border:4px solid #fff;transform:translateX(-50%);z-index:1}
.tl-date{font-size:.75em;font-weight:700;color:var(--accent-c,#5566ff);letter-spacing:.5px;text-transform:uppercase}
.tl-content{background:rgba(255,255,255,.08);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:14px 18px;margin-top:6px;color:#fff}
.tl-content h4{margin:0 0 4px;font-size:1rem}
.tl-content p{margin:0;font-size:.85em;opacity:.85;line-height:1.5}
.tl-icon{font-size:1.2em;margin-right:4px}
.tl-out{background:#0d1117;color:#c9d1d9;padding:16px;border-radius:10px;font-family:monospace;font-size:.78em;line-height:1.55;overflow-x:auto;max-height:300px;overflow-y:auto;white-space:pre;margin-top:14px}
.tl-add-btn{margin-top:6px;width:100%;background:var(--accent-c,#5566ff);color:#fff;border:none;padding:8px;border-radius:6px;cursor:pointer;font-weight:600}
</style>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="tl-layout">
      <div class="tl-panel">
        <h3 style="margin:0 0 12px;font-size:1rem">⚙️ Settings</h3>
        <div class="tl-row"><label id="lbl-orient"></label>
          <select id="orient"><option value="vertical">Vertical</option><option value="horizontal">Horizontal</option></select>
        </div>
        <div class="tl-row"><label id="lbl-accent"></label><input type="color" id="accent" value="#5566ff"></div>
        <h3 style="margin:12px 0 6px;font-size:.9rem" id="lbl-events"></h3>
        <div class="tl-events" id="eventList"></div>
        <button class="tl-add-btn" id="btn-add">+ Add Event</button>
      </div>
      <div>
        <div class="tl-preview" id="preview">
          <ul class="tl-timeline vertical" id="timeline"></ul>
        </div>
        <h3 style="margin:18px 0 8px;font-size:1rem" id="lbl-code"></h3>
        <pre class="tl-out" id="output"></pre>
        <div style="display:flex;gap:8px;margin-top:10px;flex-wrap:wrap">
          <button class="gz-btn" id="btn-copy"></button>
        </div>
      </div>
    </div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'CSS Timeline Generator',
    toolDesc: 'Design beautiful vertical or horizontal CSS timeline components for portfolios, history pages and project milestones — with live preview and ready-to-use code.',
    lblOrient: 'Orientation', lblAccent: 'Accent color', lblEvents: 'Events',
    lblCode: 'Generated HTML + CSS',
    btnCopy: 'Copy Code', btnAdd: '+ Add Event',
    step1: 'Choose vertical or horizontal layout',
    step2: 'Add or remove events with date, title, description and icon',
    step3: 'Pick an accent color that matches your brand',
    step4: 'Copy the generated HTML and CSS into your project',
  },
  zh: {
    toolTitle: 'CSS 时间线生成器',
    toolDesc: '为作品集、历史页面和项目里程碑设计精美的 CSS 时间线组件，支持垂直和水平布局，实时预览，生成即用代码。',
    lblOrient: '方向', lblAccent: '主题色', lblEvents: '事件',
    lblCode: '生成的 HTML + CSS',
    btnCopy: '复制代码', btnAdd: '+ 添加事件',
    step1: '选择垂直或水平布局',
    step2: '添加或删除事件，包含日期、标题、描述和图标',
    step3: '选择匹配你品牌的主题色',
    step4: '复制生成的 HTML 和 CSS 到你的项目中',
  }
});

const { $, copyText, t } = GZ;
let events = [
  {date:'2024',icon:'🚀',title:'Company Founded',desc:'Started in a small garage with big dreams.'},
  {date:'2024',icon:'💡',title:'First Product Launch',desc:'Released the v1.0 of our flagship product to 10K early users.'},
  {date:'2025',icon:'🌍',title:'Global Expansion',desc:'Expanded to 50+ countries with localized support.'},
  {date:'2026',icon:'🏆',title:'Industry Award',desc:'Recognized as the fastest-growing SaaS in our category.'},
];

function renderEvents() {
  $('#eventList').innerHTML = events.map((e,i) => `
    <div class="tl-event" data-i="${i}">
      <input type="text" class="icon-input" value="${e.icon}" data-k="icon">
      <input type="text" value="${e.date}" data-k="date" placeholder="Date">
      <input type="text" value="${e.title}" data-k="title" placeholder="Title">
      <input type="text" value="${e.desc}" data-k="desc" placeholder="Description">
      <button class="del" data-act="del">×</button>
    </div>
  `).join('');
  $('#eventList').querySelectorAll('.tl-event').forEach(row => {
    const i = +row.dataset.i;
    row.querySelectorAll('input').forEach(inp => {
      inp.addEventListener('input', e => {
        events[i][inp.dataset.k] = e.target.value;
        renderTimeline();
      });
    });
    row.querySelector('[data-act=del]').addEventListener('click', () => {
      if (events.length > 1) { events.splice(i,1); renderEvents(); renderTimeline(); }
    });
  });
}

function renderTimeline() {
  const orient = $('#orient').value;
  const accent = $('#accent').value;
  document.documentElement.style.setProperty('--accent-c', accent);
  const tl = $('#timeline');
  tl.className = 'tl-timeline ' + orient;
  tl.innerHTML = events.map(e => `
    <li class="tl-item-${orient==='vertical'?'v':'h'}">
      <div class="tl-date">${e.date}</div>
      <div class="tl-content">
        <h4><span class="tl-icon">${e.icon}</span>${e.title}</h4>
        <p>${e.desc}</p>
      </div>
    </li>
  `).join('');
  generateCode();
}

function generateCode() {
  const orient = $('#orient').value;
  const accent = $('#accent').value;
  const css = `/* === Timeline CSS === */
:root { --accent: ${accent}; }
.timeline { position: relative; padding: 20px 0; margin: 0; list-style: none; }
.timeline.${orient}::before {
  content: ""; position: absolute;
  ${orient==='vertical' ? 'left: 24px; top: 0; bottom: 0; width: 3px;' : 'left: 0; right: 0; top: 38px; height: 3px;'}
  background: var(--accent); border-radius: 3px;
}
.timeline.horizontal { display: flex; gap: 32px; overflow-x: auto; }
.timeline-item {
  ${orient==='vertical'
    ? 'position: relative; padding-left: 60px; margin-bottom: 24px;'
    : 'min-width: 220px; flex-shrink: 0; padding-top: 64px; text-align: center;'}
}
.timeline-item::before {
  content: ""; position: absolute;
  ${orient==='vertical'
    ? 'left: 14px; top: 6px; width: 22px; height: 22px;'
    : 'left: 50%; top: 30px; width: 20px; height: 20px; transform: translateX(-50%);'}
  border-radius: 50%; background: var(--accent);
  border: 4px solid #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.3); z-index: 1;
}
.timeline-date { font-size: 0.75em; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: 0.5px; }
.timeline-content {
  background: rgba(255,255,255,0.08); backdrop-filter: blur(8px);
  border: 1px solid rgba(255,255,255,0.1); border-radius: 12px;
  padding: 14px 18px; margin-top: 6px;
}
.timeline-content h4 { margin: 0 0 4px; font-size: 1rem; }
.timeline-content p { margin: 0; font-size: 0.85em; opacity: 0.85; line-height: 1.5; }`;
  let html = '<ul class="timeline ' + orient + '">\n';
  events.forEach(e => {
    html += `  <li class="timeline-item">\n`;
    html += `    <div class="timeline-date">${e.date}</div>\n`;
    html += `    <div class="timeline-content">\n      <h4>${e.icon} ${e.title}</h4>\n      <p>${e.desc}</p>\n    </div>\n  </li>\n`;
  });
  html += '</ul>';
  $('#output').textContent = css + '\n\n/* === HTML === */\n' + html;
}

$('#orient').addEventListener('change', renderTimeline);
$('#accent').addEventListener('input', renderTimeline);
$('#btn-add').addEventListener('click', () => {
  events.push({date:'2026',icon:'📌',title:'New Event',desc:'Describe what happened here.'});
  renderEvents(); renderTimeline();
});
$('#btn-copy').textContent = t('btnCopy');
$('#btn-add').textContent = t('btnAdd');
$('#btn-copy').addEventListener('click', () => copyText($('#output').textContent));

renderEvents(); renderTimeline();

GZ.renderToolPage({
  category: 'css',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📊', href:'/css-tools/table-generator.html', name:'HTML Table Generator'},
    {icon:'🌫️', href:'/css-tools/glassmorphism.html', name:'Glassmorphism'},
    {icon:'🎀', href:'/css-tools/ribbon.html', name:'CSS Ribbon'},
    {icon:'💲', href:'/css-tools/pricing-table.html', name:'Pricing Table'},
  ]
});
</script>
<script>new Image().src="https://site-analytics.gamezipper.com/hit?s=tools.gamezipper.com&p="+encodeURIComponent(location.pathname);</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
