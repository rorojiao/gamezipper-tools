<script>
GZI18n.register({
  en: {
    toolTitle: 'Birthday Calculator',

    lblTob: 'Time of birth',

  },
  zh: {

    toolDesc: '查询你出生那天是星期几，精确到秒的年龄、活了多少天、下一个生日倒计时、半岁生日和生肖。',
    lblDob: '出生日期',
    lblTob: '出生时间',
    lblLive: '实时更新年龄（每秒）',
    step1: '输入你的出生日期（知道时间也可填）',
    step2: '查看你出生那天是星期几',
    step3: '实时显示你的年龄：年、月、天、时、分、秒',
    step4: '查看已活天数、半岁生日、下次生日倒计时和生肖',
  }
});

const { t } = GZ;
let lang = GZI18n.getLang();

const WEEKDAYS = {
  en: ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'],
  zh: ['星期日','星期一','星期二','星期三','星期四','星期五','星期六']
};
const MONTHS = {
  en: ['January','February','March','April','May','June','July','August','September','October','November','December'],
  zh: ['1 月','2 月','3 月','4 月','5 月','6 月','7 月','8 月','9 月','10 月','11 月','12 月']
};
const ZODIAC_EN = ['Rat','Ox','Tiger','Rabbit','Dragon','Snake','Horse','Goat','Monkey','Rooster','Dog','Pig'];
const ZODIAC_ZH = ['鼠','牛','虎','兔','龙','蛇','马','羊','猴','鸡','狗','猪'];
// Approx lunar new year starts (UTC) for each Gregorian year, used for boundary detection
const CNY = {
  1940:'02-08',1941:'01-27',1942:'02-15',1943:'02-05',1944:'01-25',1945:'02-13',1946:'02-02',1947:'01-22',1948:'02-10',1949:'01-29',
  1950:'02-17',1951:'02-06',1952:'01-27',1953:'02-14',1954:'02-03',1955:'01-24',1956:'02-12',1957:'01-31',1958:'02-18',1959:'02-08',
  1960:'01-28',1961:'02-15',1962:'02-05',1963:'01-25',1964:'02-13',1965:'02-02',1966:'01-21',1967:'02-09',1968:'01-30',1969:'02-17',
  1970:'02-06',1971:'01-27',1972:'02-15',1973:'02-03',1974:'01-23',1975:'02-11',1976:'01-31',1977:'02-18',1978:'02-07',1979:'01-28',
  1980:'02-16',1981:'02-05',1982:'01-25',1983:'02-13',1984:'02-02',1985:'02-20',1986:'02-09',1987:'01-29',1988:'02-17',1989:'02-06',
  1990:'01-27',1991:'02-15',1992:'02-04',1993:'01-23',1994:'02-10',1995:'01-31',1996:'02-19',1997:'02-07',1998:'01-28',1999:'02-16',
  2000:'02-05',2001:'01-24',2002:'02-12',2003:'02-01',2004:'01-22',2005:'02-09',2006:'01-29',2007:'02-18',2008:'02-07',2009:'01-26',
  2010:'02-14',2011:'02-03',2012:'01-23',2013:'02-10',2014:'01-31',2015:'02-19',2016:'02-08',2017:'01-28',2018:'02-16',2019:'02-05',
  2020:'01-25',2021:'02-12',2022:'02-01',2023:'01-22',2024:'02-10',2025:'01-29',2026:'02-17',2027:'02-06',2028:'01-26',2029:'02-13',
  2030:'02-03'
};

function chineseZodiac(y, m, d) {
  // Determine animal. If birthday is before CNY of that year, use previous year.
  let effYear = y;
  const cny = CNY[y];
  if (cny) {
    const [cm, cd] = cny.split('-').map(Number);
    if (m < cm || (m === cm && d < cd)) effYear = y - 1;
  }
  const idx = (effYear - 4) % 12;
  const safe = ((idx % 12) + 12) % 12;
  return { en: ZODIAC_EN[safe], zh: ZODIAC_ZH[safe], year: effYear };
}

function exactAge(birth, now) {
  let y = now.getFullYear() - birth.getFullYear();
  let mo = now.getMonth() - birth.getMonth();
  let d = now.getDate() - birth.getDate();
  let h = now.getHours() - birth.getHours();
  let mi = now.getMinutes() - birth.getMinutes();
  let s = now.getSeconds() - birth.getSeconds();
  if (s < 0) { s += 60; mi--; }
  if (mi < 0) { mi += 60; h--; }
  if (h < 0) { h += 24; d--; }
  if (d < 0) {
    const prev = new Date(now.getFullYear(), now.getMonth(), 0).getDate();
    d += prev; mo--;
  }
  if (mo < 0) { mo += 12; y--; }
  return { y, mo, d, h, mi, s };
}

function nextBirthday(birth, now) {
  let next = new Date(now.getFullYear(), birth.getMonth(), birth.getDate(), birth.getHours(), birth.getMinutes(), birth.getSeconds());
  if (next < now) next.setFullYear(next.getFullYear() + 1);
  return next;
}

function halfBirthday(birth, now) {
  let hb = new Date(now.getFullYear(), birth.getMonth() + 6, birth.getDate());
  if (hb < now) hb.setFullYear(hb.getFullYear() + 1);
  return hb;
}

function fmtDate(dt) {
  const wd = WEEKDAYS[lang][dt.getDay()];
  const mo = MONTHS[lang][dt.getMonth()];
  return `${wd}, ${mo} ${dt.getDate()}, ${dt.getFullYear()}`;
}

function fmtDateShort(dt) {
  const wd = WEEKDAYS[lang][dt.getDay()];
  return `${wd}, ${dt.getMonth()+1}/${dt.getDate()}/${dt.getFullYear()}`;
}

function daysBetween(a, b) {
  return Math.floor((b - a) / 86400000);
}

function pad(n) { return String(n).padStart(2,'0'); }

let timer = null;

function render() {
  lang = GZI18n.getLang();
  const dobVal = document.getElementById('dob').value;
  const tobVal = document.getElementById('tob').value;
  if (!dobVal) { document.getElementById('output').innerHTML = ''; return; }
  const [y, m, d] = dobVal.split('-').map(Number);
  const [hh, mm] = (tobVal || '12:00').split(':').map(Number);
  const birth = new Date(y, m - 1, d, hh || 12, mm || 0, 0, 0);
  if (isNaN(birth.getTime())) { document.getElementById('output').innerHTML = ''; return; }
  const now = new Date();
  if (birth > now) {
    document.getElementById('output').innerHTML = `<div style="margin-top:1rem;padding:14px;background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.3);border-radius:12px;color:var(--text)">${lang==='zh'?'⚠ 出生日期不能在未来':'⚠ Birth date cannot be in the future.'}</div>`;
    return;
  }
  const age = exactAge(birth, now);
  const daysAlive = daysBetween(birth, now);
  const weeks = Math.floor(daysAlive / 7);
  const monthsAlive = age.y * 12 + age.mo;
  const sleepHours = Math.round(daysAlive * 8); // ~8h/night
  const heartbeats = daysAlive * 24 * 60 * 70; // ~70bpm
  const wd = WEEKDAYS[lang][birth.getDay()];
  const next = nextBirthday(birth, now);
  const half = halfBirthday(birth, now);
  const daysToNext = daysBetween(now, next);
  const zodiac = chineseZodiac(y, m, d);

  // ISO week of birth
  const tmp = new Date(birth);
  tmp.setHours(0,0,0,0);
  const thu = new Date(tmp);
  thu.setDate(tmp.getDate() - ((tmp.getDay() + 6) % 7) + 3);
  const isoWeek = Math.ceil((((thu - new Date(thu.getFullYear(),0,1)) / 86400000) + 1) / 7);

  // Countdown ms
  const ms = next - now;
  const cdDays = Math.floor(ms / 86400000);
  const cdHrs = Math.floor((ms % 86400000) / 3600000);
  const cdMin = Math.floor((ms % 3600000) / 60000);
  const cdSec = Math.floor((ms % 60000) / 1000);

  const turnNext = age.y + 1;

  const out = `
  <div class="bd-day">
    <div class="big">${wd}</div>
    <div class="tag">${lang==='zh' ? `你出生在 ${fmtDate(birth)} · ISO 第 ${isoWeek} 周` : `You were born on ${fmtDate(birth)} · ISO week ${isoWeek}`}</div>
  </div>
  <div class="bd-age">
    ${lang==='zh'
      ? `你现在 <b>${age.y} 岁 ${age.mo} 个月 ${age.d} 天</b><br>${pad(age.h)}:${pad(age.mi)}:${pad(age.s)} 旧`
      : `You are <b>${age.y} years, ${age.mo} months, ${age.d} days</b><br>${pad(age.h)}:${pad(age.mi)}:${pad(age.s)} old`}
  </div>
  <div class="bd-grid">
    <div class="bd-card"><div class="lbl">${lang==='zh'?'已活天数':'Days alive'}</div><div class="val">${daysAlive.toLocaleString()}</div><div class="sub">${lang==='zh'?`约 ${weeks.toLocaleString()} 周`:`~${weeks.toLocaleString()} weeks`}</div></div>
    <div class="bd-card"><div class="lbl">${lang==='zh'?'已活月数':'Months alive'}</div><div class="val">${monthsAlive.toLocaleString()}</div><div class="sub">${lang==='zh'?'个完整月':'full months'}</div></div>
    <div class="bd-card"><div class="lbl">${lang==='zh'?'估计心跳':'Est. heartbeats'}</div><div class="val">${(heartbeats/1e9).toFixed(2)}B</div><div class="sub">${lang==='zh'?'按 70 bpm 估算':'at 70 bpm'}</div></div>
    <div class="bd-card"><div class="lbl">${lang==='zh'?'估计睡眠':'Est. sleep'}</div><div class="val">${(sleepHours/24).toLocaleString(undefined,{maximumFractionDigits:0})}</div><div class="sub">${lang==='zh'?'天 (8h/晚)':'days (8h/night)'}</div></div>
    <div class="bd-card"><div class="lbl">${lang==='zh'?'生肖':'Chinese zodiac'}</div><div class="val">${lang==='zh'?zodiac.zh:zodiac.en}</div><div class="sub">${zodiac.year}</div></div>
    <div class="bd-card"><div class="lbl">${lang==='zh'?'半岁生日':'Half birthday'}</div><div class="val" style="font-size:1.05rem">${fmtDateShort(half)}</div><div class="sub">${lang==='zh'?'下一次':'next'} ${daysBetween(now, half)} ${lang==='zh'?'天后':'days'}</div></div>
  </div>
  <div class="bd-card" style="margin-top:14px">
    <div class="lbl">${lang==='zh'?'距离下一个生日':'Countdown to next birthday'}</div>
    <div class="val" style="font-size:1.3rem">${lang==='zh'?`你将满 ${turnNext} 岁`:`You'll turn ${turnNext}`} · ${daysToNext} ${lang==='zh'?'天':'days'}</div>
    <div class="bd-countdown">
      <div class="unit"><div class="num">${cdDays}</div><div class="cap">${lang==='zh'?'天':'days'}</div></div>
      <div class="unit"><div class="num">${cdHrs}</div><div class="cap">${lang==='zh'?'时':'hours'}</div></div>
      <div class="unit"><div class="num">${cdMin}</div><div class="cap">${lang==='zh'?'分':'min'}</div></div>
      <div class="unit"><div class="num">${cdSec}</div><div class="cap">${lang==='zh'?'秒':'sec'}</div></div>
    </div>
  </div>`;
  document.getElementById('output').innerHTML = out;
}

function tick() {
  if (document.getElementById('live').checked) render();
}

document.getElementById('dob').addEventListener('input', render);
document.getElementById('tob').addEventListener('input', render);
document.getElementById('live').addEventListener('change', () => {
  if (document.getElementById('live').checked) { render(); startTimer(); }
  else stopTimer();
});

function startTimer() {
  stopTimer();
  timer = setInterval(tick, 1000);
}
function stopTimer() { if (timer) { clearInterval(timer); timer = null; } }

render();
startTimer();

GZ.renderToolPage({
  category: 'calc',

});
</script>
