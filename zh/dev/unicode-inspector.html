GZI18n.register({en:{toolTitle:'Unicode Inspector',toolDesc:'Inspect every Unicode character or grapheme cluster. View code points, names, scripts, categories, UTF-8 bytes, UTF-16 units and HTML entities.',sample:'Load Unicode sample',copy:'Copy report',clear:'Clear',grapheme:'Group grapheme clusters',placeholder:'Type or paste Unicode text, emoji or suspicious invisible characters…',units:'Displayed units',codepoints:'Code points',utf8:'UTF-8 bytes',utf16:'UTF-16 units',character:'Character',index:'Index',codepoint:'Code point',name:'Name / type',script:'Script',bytes:'UTF-8',units16:'UTF-16',entity:'HTML entity',step1:'Type or paste multilingual text, emoji, symbols or invisible marks',step2:'Choose whether to group user-perceived grapheme clusters such as joined emoji',step3:'Read each code point, Unicode label, script, UTF-8 bytes and UTF-16 units',step4:'Copy the tab-separated report for debugging, documentation or test cases'},zh:{toolTitle:'Unicode 字符检查器',toolDesc:'检查每个 Unicode 字符或字素簇，查看码位、名称、文字系统、类别、UTF-8 字节、UTF-16 单元和 HTML 实体。',sample:'加载 Unicode 示例',copy:'复制报告',clear:'清空',grapheme:'合并显示字素簇',placeholder:'输入或粘贴 Unicode 文本、Emoji 或可疑的不可见字符……',units:'显示单元',codepoints:'码位数',utf8:'UTF-8 字节',utf16:'UTF-16 单元',character:'字符',index:'序号',codepoint:'码位',name:'名称 / 类型',script:'文字系统',bytes:'UTF-8',units16:'UTF-16',entity:'HTML 实体',step1:'输入或粘贴多语言文本、Emoji、符号或不可见标记',step2:'选择是否合并显示由多个码位组成的字素簇，例如组合 Emoji',step3:'查看每个码位、Unicode 标签、文字系统、UTF-8 字节和 UTF-16 单元',step4:'复制制表符分隔的报告，用于调试、文档或测试用例'}});
const {$,t,copyText}=GZ;let report='';
const NAMES={9:'CHARACTER TABULATION',10:'LINE FEED',13:'CARRIAGE RETURN',32:'SPACE',160:'NO-BREAK SPACE',8203:'ZERO WIDTH SPACE',8204:'ZERO WIDTH NON-JOINER',8205:'ZERO WIDTH JOINER',8206:'LEFT-TO-RIGHT MARK',8207:'RIGHT-TO-LEFT MARK',8232:'LINE SEPARATOR',8233:'PARAGRAPH SEPARATOR',8288:'WORD JOINER',65279:'ZERO WIDTH NO-BREAK SPACE / BOM',65039:'VARIATION SELECTOR-16'};
function scriptOf(ch){const tests=[['Han',/\p{Script=Han}/u],['Latin',/\p{Script=Latin}/u],['Cyrillic',/\p{Script=Cyrillic}/u],['Arabic',/\p{Script=Arabic}/u],['Hebrew',/\p{Script=Hebrew}/u],['Devanagari',/\p{Script=Devanagari}/u],['Hiragana',/\p{Script=Hiragana}/u],['Katakana',/\p{Script=Katakana}/u],['Hangul',/\p{Script=Hangul}/u],['Greek',/\p{Script=Greek}/u]];for(const [n,r] of tests)if(r.test(ch))return n;return /\p{Emoji}/u.test(ch)?'Emoji / Common':'Common'}
function category(ch,n){if(NAMES[n])return NAMES[n];if(/\p{Emoji}/u.test(ch))return 'EMOJI / SYMBOL';if(/\p{Letter}/u.test(ch))return 'LETTER';if(/\p{Number}/u.test(ch))return 'NUMBER';if(/\p{Mark}/u.test(ch))return 'COMBINING MARK';if(/\p{Punctuation}/u.test(ch))return 'PUNCTUATION';if(/\p{Separator}/u.test(ch))return 'SEPARATOR';if(/\p{Symbol}/u.test(ch))return 'SYMBOL';return 'OTHER / CONTROL'}
function visible(s){return [...s].map(ch=>{const n=ch.codePointAt(0);if(NAMES[n])return '⟦'+NAMES[n].replace(/ /g,' ')+'⟧';return ch}).join('')}
function cpInfo(ch){const n=ch.codePointAt(0),u='U+'+n.toString(16).toUpperCase().padStart(4,'0'),b=[...new TextEncoder().encode(ch)].map(x=>x.toString(16).toUpperCase().padStart(2,'0')).join(' '),u16=[];for(let i=0;i<ch.length;i++)u16.push(ch.charCodeAt(i).toString(16).toUpperCase().padStart(4,'0'));return{u,n,b,u16:u16.join(' '),name:category(ch,n),script:scriptOf(ch),entity:'&#x'+n.toString(16).toUpperCase()+';'}}
function update(){const s=$('#input').value,group=$('#grapheme').checked;let segments;if(group&&Intl.Segmenter)segments=[...new Intl.Segmenter(undefined,{granularity:'grapheme'}).segment(s)].map(x=>x.segment);else segments=[...s];const cps=[...s],byteCount=new TextEncoder().encode(s).length;$('#stats').innerHTML=[[t('units'),segments.length],[t('codepoints'),cps.length],[t('utf8'),byteCount],[t('utf16'),s.length]].map(x=>`<span class="ui-pill"><b>${x[1]}</b> ${x[0]}</span>`).join('');$('#head').innerHTML=[t('index'),t('character'),t('codepoint'),t('name'),t('script'),t('bytes'),t('units16'),t('entity')].map(x=>`<th>${x}</th>`).join('');let lines=['Index\tCharacter\tCode point\tName/type\tScript\tUTF-8\tUTF-16\tHTML entity'];$('#rows').innerHTML=segments.map((seg,i)=>{const all=[...seg].map(cpInfo),codes=all.map(x=>x.u).join(' + '),names=all.map(x=>x.name).join(' + '),scripts=[...new Set(all.map(x=>x.script))].join(' + '),bytes=all.map(x=>x.b).join(' | '),units=all.map(x=>x.u16).join(' '),entities=all.map(x=>x.entity).join('');lines.push([i,visible(seg),codes,names,scripts,bytes,units,entities].join('\t'));return`<tr><td>${i}</td><td class="ui-char">${escapeHtml(visible(seg))}</td><td class="ui-code">${codes}</td><td class="ui-name">${names}</td><td>${scripts}</td><td class="ui-code">${bytes}</td><td class="ui-code">${units}</td><td class="ui-code">${entities.replace(/&/g,'&amp;')}</td></tr>`}).join('')||`<tr><td colspan="8" class="ui-empty">—</td></tr>`;report=lines.join('\n')}
function escapeHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function labels(){$('#sample').textContent=t('sample');$('#copy').textContent=t('copy');$('#clear').textContent=t('clear');$('#grapheme-label').textContent=t('grapheme');$('#input').placeholder=t('placeholder')}
$('#input').oninput=update;$('#grapheme').onchange=update;$('#sample').onclick=()=>{$('#input').value='A café 中文 العربية 👨‍👩‍👧‍👦 👍🏽\nzero\u200bwidth NBSP:\u00a0';update()};$('#copy').onclick=()=>copyText(report);$('#clear').onclick=()=>{$('#input').value='';update()};labels();update();
GZ.renderToolPage({category:'dev',titleKey:'toolTitle',descKey:'toolDesc',howToSteps:['step1','step2','step3','step4'],related:[{icon:'👁️',href:'/text/whitespace-visualizer.html',name:'Whitespace Visualizer'},{icon:'🗺️',href:'/text/character-map.html',name:'Character Map'},{icon:'🔤',href:'/text/character-info.html',name:'Character Info'},{icon:'🔣',href:'/dev/unicode-escape.html',name:'Unicode Escape'}]});
