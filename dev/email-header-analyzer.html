const { $, copyText, t } = GZ;

function parseHeaders(raw) {
  // Parse headers into key-value pairs
  const headers = {};
  const lines = raw.split('\n');
  let currentKey = '';
  for (const line of lines) {
    if (/^\s/.test(line) && currentKey) {
      headers[currentKey] += ' ' + line.trim();
    } else {
      const m = line.match(/^([a-zA-Z][\w-]*):\s*(.*)/);
      if (m) {
        currentKey = m[1].toLowerCase();
        const val = m[2].trim();
        if (headers[currentKey]) {
          if (Array.isArray(headers[currentKey])) headers[currentKey].push(val);
          else headers[currentKey] = [headers[currentKey], val];
        } else {
          headers[currentKey] = val;
        }
      }
    }
  }
  return headers;
}

function analyze() {
  const raw = $('#input').value.trim();
  if (!raw) { $('#results').innerHTML = ''; return; }
  const h = parseHeaders(raw);
  let html = '';

  // Basic info
  html += '<div class="gz-section-title">📋 Basic Information</div>';
  html += '<table class="gz-result-table">';
  const basics = [
    ['from', 'From'],
    ['to', 'To'],
    ['cc', 'CC'],
    ['subject', 'Subject'],
    ['date', 'Date'],
    ['message-id', 'Message ID'],
    ['reply-to', 'Reply-To'],
    ['return-path', 'Return-Path'],
    ['x-mailer', 'X-Mailer'],
    ['mime-version', 'MIME Version'],
    ['content-type', 'Content Type'],
  ];
  for (const [key, label] of basics) {
    if (h[key]) html += `<tr><td>${label}</td><td>${esc(Array.isArray(h[key]) ? h[key][h[key].length-1] : h[key])}</td></tr>`;
  }
  html += '</table>';

  // Authentication results
  html += '<div class="gz-section-title">🔐 Authentication Results</div>';
  html += '<table class="gz-result-table">';
  const authKeys = [
    ['authentication-results', 'Authentication Results'],
    ['dkim-signature', 'DKIM Signature'],
    ['received-spf', 'Received-SPF'],
    ['dmarc-filter', 'DMARC Filter'],
    ['x-spam-status', 'Spam Status'],
    ['x-spam-score', 'Spam Score'],
    ['x-spam-level', 'Spam Level'],
  ];
  let hasAuth = false;
  for (const [key, label] of authKeys) {
    if (h[key]) {
      hasAuth = true;
      let val = Array.isArray(h[key]) ? h[key].join('<br>') : h[key];
      // Add tags for common results
      val = val.replace(/pass/gi, '<span class="gz-tag gz-tag-pass">PASS</span>');
      val = val.replace(/fail/gi, '<span class="gz-tag gz-tag-fail">FAIL</span>');
      val = val.replace(/neutral/gi, '<span class="gz-tag gz-tag-neutral">NEUTRAL</span>');
      html += `<tr><td>${label}</td><td>${val}</td></tr>`;
    }
  }
  // Check auth in received headers
  const receivedHeaders = Array.isArray(h['received']) ? h['received'] : (h['received'] ? [h['received']] : []);
  for (const r of receivedHeaders) {
    if (/spf=pass/i.test(r) || /dkim=pass/i.test(r)) {
      hasAuth = true;
      break;
    }
  }
  if (!hasAuth) html += '<tr><td colspan="2"><span class="gz-tag gz-tag-info">No authentication headers found</span></td></tr>';
  html += '</table>';

  // Routing hops
  html += '<div class="gz-section-title">🗺️ Routing Path</div>';
  if (receivedHeaders.length > 0) {
    const hops = receivedHeaders.reverse();
    hops.forEach((hop, i) => {
      const fromMatch = hop.match(/from\s+([^\s]+)/i);
      const byMatch = hop.match(/by\s+([^\s]+)/i);
      const timeMatch = hop.match(/;\s*(.+)$/);
      html += `<div class="gz-hop">
        <div class="gz-hop-header">Hop ${i + 1}${fromMatch ? ' — From: ' + esc(fromMatch[1]) : ''}${byMatch ? ' → To: ' + esc(byMatch[1]) : ''}</div>
        <div>${timeMatch ? 'Time: ' + esc(timeMatch[1].trim()) : ''}</div>
        <div style="opacity:.7;font-size:.85em;margin-top:4px">${esc(hop.substring(0, 200))}</div>
      </div>`;
    });
  } else {
    html += '<p style="color:var(--text3);font-size:.85em">No Received headers found.</p>';
  }

  // Security warnings
  html += '<div class="gz-section-title">⚠️ Security Analysis</div>';
  const warnings = [];
  const fromVal = Array.isArray(h['from']) ? h['from'][0] : h['from'];
  const returnPath = Array.isArray(h['return-path']) ? h['return-path'][0] : h['return-path'];
  if (fromVal && returnPath) {
    const fromDomain = (fromVal.match(/@([\w.-]+)/) || [])[1];
    const rpDomain = (returnPath.match(/@([\w.-]+)/) || [])[1];
    if (fromDomain && rpDomain && fromDomain.toLowerCase() !== rpDomain.toLowerCase()) {
      warnings.push('<span class="gz-tag gz-tag-fail">MISMATCH</span> From domain and Return-Path domain differ — may indicate spoofing.');
    }
  }
  const allAuthRaw = JSON.stringify(h).toLowerCase();
  if (allAuthRaw.includes('spf=fail') || allAuthRaw.includes('spf=softfail')) {
    warnings.push('<span class="gz-tag gz-tag-fail">SPF FAIL</span> SPF authentication failed — the sending server is not authorized.');
  }
  if (allAuthRaw.includes('dkim=fail')) {
    warnings.push('<span class="gz-tag gz-tag-fail">DKIM FAIL</span> DKIM signature verification failed — email content may have been altered.');
  }
  if (allAuthRaw.includes('dmarc=fail')) {
    warnings.push('<span class="gz-tag gz-tag-fail">DMARC FAIL</span> DMARC policy check failed — email does not meet authentication requirements.');
  }
  if (warnings.length === 0) {
    html += '<p style="color:var(--gz-success);font-size:.85em">✓ No obvious security issues detected in headers.</p>';
  } else {
    warnings.forEach(w => { html += `<p style="font-size:.85em;margin-bottom:6px">${w}</p>`; });
  }

  // Raw headers
  html += '<div class="gz-section-title">📝 All Headers</div>';
  html += '<table class="gz-result-table">';
  for (const [key, val] of Object.entries(h)) {
    const display = Array.isArray(val) ? val.join('<br>') : val;
    html += `<tr><td>${esc(key)}</td><td>${esc(display)}</td></tr>`;
  }
  html += '</table>';

  $('#results').innerHTML = html;
  $('#status').innerHTML = `<span style="color:var(--gz-success)">✓ Analyzed ${Object.keys(h).length} header fields</span>`;
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

}

</script>
