<script>
GZI18n.register({
  en: {
    toolTitle: 'Days Between Dates Calculator',
    toolDesc: 'Calculate days, weeks, months, years and business days between any two dates — or add/subtract days from a date. Handles leap years. 100% browser-only.',
    tabBetween: 'Between dates', tabAdd: 'Add / Subtract',
    lblStart: 'Start date', lblEnd: 'End date',
    lblIncl: 'End date', lblWeekend: 'Count',
    lblAddStart: 'Start date', lblAddOp: 'Operation',
    lblAddVal: 'Amount', lblAddUnit: 'Unit',
    calc: 'Calculate',
    betweenHead: 'is', addHead: 'Result',
    from: 'From', to: 'to', result: 'Result date',
    days: 'Days', weeks: 'Weeks', months: 'Months', years: 'Years',
    hours: 'Hours', minutes: 'Minutes',
    business: 'Business days', totalDays: 'Total days', endDate: 'End date',
    weekend: 'Weekend', weekday: 'Weekday',
    step1: 'Enter a start date and an end date',
    step2: 'Choose whether to include the end date and weekends',
    step3: 'Read the day, week, month, year and business-day breakdown',
    step4: 'Or switch to Add / Subtract to compute a future / past date',
  },
  zh: {
    toolTitle: '日期相差天数计算器',
    toolDesc: '计算两个日期之间的天数、周数、月数、年数和工作日 — 或对日期加/减天数。自动处理闰年。100% 浏览器本地运行。',
    tabBetween: '日期相差', tabAdd: '加 / 减日期',
    lblStart: '起始日期', lblEnd: '结束日期',
    lblIncl: '结束日期', lblWeekend: '是否',
    lblAddStart: '起始日期', lblAddOp: '操作',
    lblAddVal: '数量', lblAddUnit: '单位',
    calc: '计算',
    betweenHead: '相差', addHead: '结果',
    from: '从', to: '到', result: '结果日期',
    days: '天', weeks: '周', months: '月', years: '年',
    hours: '小时', minutes: '分钟',
    business: '工作日', totalDays: '总天数', endDate: '结束日期',
    weekend: '周末', weekday: '工作日',
    step1: '输入起始日期和结束日期',
    step2: '选择是否包含结束日期和周末',
    step3: '查看天、周、月、年和工作日分解',
    step4: '或切换到「加 / 减」计算未来 / 过去日期',
  }
});

const { $, t } = GZ;

// Default dates
const today = new Date();
const yyyy = today.getFullYear();
const mm = String(today.getMonth() + 1).padStart(2, '0');
const dd = String(today.getDate()).padStart(2, '0');
const todayStr = `${yyyy}-${mm}-${dd}`;
const future = new Date(today.getTime() + 30 * 86400000);
const fy = future.getFullYear();
const fm = String(future.getMonth() + 1).padStart(2, '0');
const fd = String(future.getDate()).padStart(2, '0');
const futureStr = `${fy}-${fm}-${fd}`;

$('#startDate').value = todayStr;
$('#endDate').value = futureStr;
$('#addStart').value = todayStr;

$('#tabs').addEventListener('click', e => {
  const tab = e.target.closest('.tab');
  if (!tab) return;
  const mode = tab.dataset.mode;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t === tab));
  $('#mode-between').style.display = mode === 'between' ? '' : 'none';
  $('#mode-add').style.display = mode === 'add' ? '' : 'none';
});

function parseDate(s) { return new Date(s + 'T00:00:00'); }
function fmtDate(d) { return d.toISOString().slice(0,10); }

function diffDays(a, b) {
  return Math.round((b - a) / 86400000);
}

function businessDaysBetween(a, b, inclusive) {
  const start = inclusive ? new Date(a) : new Date(a.getTime() + 86400000);
  const end = inclusive ? b : new Date(b.getTime() - 86400000);
  if (end < start) return 0;
  let n = 0;
  const cur = new Date(start);
  while (cur <= end) {
    const dow = cur.getDay();
    if (dow !== 0 && dow !== 6) n++;
    cur.setDate(cur.getDate() + 1);
  }
  return n;
}

function doBetween() {
  const a = parseDate($('#startDate').value);
  const b = parseDate($('#endDate').value);
  const inclusive = $('#inclusive').value === '1';
  const skipWeekend = $('#countWeekend').value === '0';
  if (isNaN(a) || isNaN(b) || b < a) { $('#result').innerHTML = '<span style="color:var(--accent)">⚠ Invalid date range</span>'; return; }

  let days = diffDays(a, b);
  if (inclusive) days += 1;
  const weeks = days / 7;
  const months = days / 30.436875;
  const years = days / 365.2425;
  const hours = days * 24;
  const minutes = hours * 60;
  const bdays = skipWeekend ? businessDaysBetween(a, b, inclusive) : days;

  $('#result').innerHTML = `<div>${t('from')} <strong>${fmtDate(a)}</strong> ${t('to')} <strong>${fmtDate(b)}</strong></div><div class="big">${t('betweenHead')} ${days} ${t('days')}</div>`;
  $('#summary').innerHTML = `
    <div class="summary-cell"><div class="lbl">${t('days')}</div><div class="val">${days.toLocaleString()}</div></div>
    <div class="summary-cell"><div class="lbl">${t('weeks')}</div><div class="val">${weeks.toLocaleString(undefined,{maximumFractionDigits:2})}</div></div>
    <div class="summary-cell"><div class="lbl">${t('months')}</div><div class="val">${months.toLocaleString(undefined,{maximumFractionDigits:2})}</div></div>
    <div class="summary-cell"><div class="lbl">${t('years')}</div><div class="val">${years.toLocaleString(undefined,{maximumFractionDigits:2})}</div></div>
    <div class="summary-cell"><div class="lbl">${t('business')}</div><div class="val">${bdays.toLocaleString()}</div></div>
    <div class="summary-cell"><div class="lbl">${t('hours')}</div><div class="val">${hours.toLocaleString()}</div></div>
    <div class="summary-cell"><div class="lbl">${t('minutes')}</div><div class="val">${minutes.toLocaleString()}</div></div>
  `;
  renderStrip(a, b);
}

function renderStrip(a, b) {
  const cap = 90;
  const start = a < b ? a : b;
  const end = b > a ? b : a;
  const span = Math.min(diffDays(start, end) + 1, cap);
  const out = [];
  for (let i = 0; i < span; i++) {
    const d = new Date(start.getTime() + i * 86400000);
    const dow = d.getDay();
    const cls = dow === 0 || dow === 6 ? 'day-cell weekend' : 'day-cell weekday';
    out.push(`<span class="${cls}">${d.toISOString().slice(5,10)}</span>`);
  }
  $('#strip').innerHTML = out.join('');
}

function doAdd() {
  const start = parseDate($('#addStart').value);
  const op = $('#addOp').value;
  const val = parseInt($('#addVal').value) || 0;
  const unit = $('#addUnit').value;
  if (isNaN(start)) { $('#result').innerHTML = '<span style="color:var(--accent)">⚠ Invalid date</span>'; return; }
  const sign = op === '+' ? 1 : -1;
  const d = new Date(start);
  if (unit === 'd') d.setDate(d.getDate() + sign * val);
  else if (unit === 'w') d.setDate(d.getDate() + sign * val * 7);
  else if (unit === 'm') d.setMonth(d.getMonth() + sign * val);
  else if (unit === 'y') d.setFullYear(d.getFullYear() + sign * val);
  const today2 = new Date(todayStr + 'T00:00:00');
  const daysFromToday = diffDays(today2, d);
  const dayLabel = [t('weekday'),t('weekday'),t('weekday'),t('weekday'),t('weekday'),t('weekend'),t('weekend')][d.getDay()];
  $('#result').innerHTML = `<div>${t('addHead')}: <span class="big">${fmtDate(d)}</span></div><div style="margin-top:6px">${dayLabel} · ${daysFromToday > 0 ? '+' : ''}${daysFromToday} days from today</div>`;
  $('#summary').innerHTML = '';
  $('#strip').innerHTML = '';
}

$('#btn-between').addEventListener('click', doBetween);
$('#btn-add').addEventListener('click', doAdd);

doBetween();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle', descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📅', href:'/calc/date-calculator.html', name:'Date Calculator'},
    {icon:'⏰', href:'/calc/leap-year-calculator.html', name:'Leap Year'},
    {icon:'⏳', href:'/calc/days-until.html', name:'Days Until'},
    {icon:'🎯', href:'/calc/countdown-timer.html', name:'Event Countdown'},
  ]
});
</script>

</body>
