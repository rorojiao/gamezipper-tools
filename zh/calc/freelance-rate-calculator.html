<script>
GZI18n.register({
  en: {
    toolTitle: 'Freelance Rate Calculator',
    toolDesc: 'Find the minimum hourly rate you should charge as a freelancer. Enter your target income, expenses, tax and billable hours — get a break-even rate plus a profit margin recommendation. Free and private.',
    ratePerHour: '/hr',
    rateSub: 'Your break-even freelance rate',
    cardIncome: 'Income & Costs',
    cardHours: 'Working Time',
    lbIncome: 'Desired annual take-home income',
    lbExpenses: 'Annual business expenses',
    hintExpenses: 'Software, hardware, internet, office, insurance…',
    lbTax: 'Income tax rate (%)',
    hintTax: 'Self-employment + income tax combined',
    lbSavings: 'Savings / safety buffer (%)',
    hintSavings: 'Recommended 10–20% for slow months',
    lbWeeks: 'Work weeks per year',
    hintWeeks: '52 weeks − vacation − holidays',
    lbHours: 'Billable hours per week',
    hintHours: 'Time you actually bill clients (typical 20–30)',
    lbCurrency: 'Currency symbol',
    bdPretax: 'Pre-tax income needed',
    bdTax: 'Tax amount',
    bdTotal: 'Gross revenue target',
    bdBillable: 'Billable hours / year',
    bdDaily: 'Suggested day rate (8h)',
    bdProfit10: 'Rate with 10% profit',
    bdProfit20: 'Rate with 20% profit',
    step1: 'Enter your desired take-home income for the year',
    step2: 'Add your business expenses, tax rate and savings buffer',
    step3: 'Set how many weeks and billable hours you can realistically work',
    step4: 'Read your break-even hourly rate — and what to charge with profit',
  },
  zh: {
    toolTitle: '自由职业费率计算器',
    toolDesc: '计算自由职业者的最低时薪。输入目标收入、开销、税率和可计费工时 — 得到保本时薪及建议利润费率。免费、私密、浏览器本地运行。',
    ratePerHour: '/时',
    rateSub: '你的保本自由职业费率',
    cardIncome: '收入与成本',
    cardHours: '工作时间',
    lbIncome: '期望年税后收入',
    lbExpenses: '年度业务开销',
    hintExpenses: '软件、硬件、网络、办公、保险…',
    lbTax: '综合所得税率 (%)',
    hintTax: '自雇税 + 个人所得税合计',
    lbSavings: '储蓄 / 安全缓冲 (%)',
    hintSavings: '建议 10–20%，用于淡季',
    lbWeeks: '每年工作周数',
    hintWeeks: '52 周 − 假期 − 节假日',
    lbHours: '每周可计费小时数',
    hintHours: '真正向客户计费的时间（典型 20–30）',
    lbCurrency: '货币符号',
    bdPretax: '所需税前收入',
    bdTax: '税款金额',
    bdTotal: '目标毛收入',
    bdBillable: '年度可计费小时',
    bdDaily: '建议日费率（8 小时）',
    bdProfit10: '含 10% 利润的费率',
    bdProfit20: '含 20% 利润的费率',
    step1: '输入你期望的年税后收入',
    step2: '添加业务开销、税率和储蓄缓冲',
    step3: '设置你每年实际能工作多少周、每周可计费多少小时',
    step4: '查看保本时薪，以及加上利润后的建议费率',
  }
});

const { $, t } = GZ;

function num(id) { return parseFloat($('#' + id).value) || 0; }

function calc() {
  const cur = $('#currency').value.slice(0, 3) || '$';
  const income = Math.max(0, num('income'));
  const expenses = Math.max(0, num('expenses'));
  const taxPct = Math.min(70, Math.max(0, num('tax')));
  const savingsPct = Math.min(50, Math.max(0, num('savings')));
  const weeks = Math.min(52, Math.max(1, num('weeks')));
  const hours = Math.min(80, Math.max(1, num('hours')));

  // pretax income that yields `income` after tax
  const pretax = taxPct > 0 ? income / (1 - taxPct / 100) : income;
  const taxAmount = pretax - income;
  const withExpenses = pretax + expenses;
  const withSavings = savingsPct > 0 ? withExpenses / (1 - savingsPct / 100) : withExpenses;
  const total = withSavings;
  const billable = weeks * hours;
  const rate = billable > 0 ? total / billable : 0;

  $('#rate-big').textContent = cur + rate.toFixed(2) + t('ratePerHour');
  $('#rate-sub').textContent = t('rateSub');

  const daily = rate * 8;
  const r10 = rate * 1.10;
  const r20 = rate * 1.20;
  const bd = $('#breakdown');
  bd.innerHTML = [
    [t('bdPretax'), cur + pretax.toFixed(0)],
    [t('bdTax'), cur + taxAmount.toFixed(0)],
    [t('bdTotal'), cur + total.toFixed(0)],
    [t('bdBillable'), billable + 'h'],
    [t('bdDaily'), cur + daily.toFixed(0)],
    [t('bdProfit10'), cur + r10.toFixed(2)],
    [t('bdProfit20'), cur + r20.toFixed(2)],
  ].map(([k, v]) => `<div><span>${k}</span><span>${v}</span></div>`).join('');
}

['income','expenses','tax','savings','weeks','hours','currency'].forEach(id => {
  $('#' + id).addEventListener('input', calc);
});

// i18n labels
[
  ['card-income','cardIncome'], ['card-hours','cardHours'],
  ['lb-income','lbIncome'], ['lb-expenses','lbExpenses'], ['hint-expenses','hintExpenses'],
  ['lb-tax','lbTax'], ['hint-tax','hintTax'],
  ['lb-savings','lbSavings'], ['hint-savings','hintSavings'],
  ['lb-weeks','lbWeeks'], ['hint-weeks','hintWeeks'],
  ['lb-hours','lbHours'], ['hint-hours','hintHours'],
  ['lb-currency','lbCurrency'],
].forEach(([id, key]) => { const el = $('#' + id); if (el) el.textContent = t(key); });

calc();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'💼', href:'/calc/hourly-to-salary-calculator.html', name:'Hourly to Salary'},
    {icon:'⏱️', href:'/calc/time-tracker.html', name:'Time Tracker'},
    {icon:'🧾', href:'/calc/self-employment-tax-calculator.html', name:'Self-Employment Tax'},
    {icon:'💰', href:'/calc/income-tax-calculator.html', name:'Income Tax'},
  ]
});
</script>
