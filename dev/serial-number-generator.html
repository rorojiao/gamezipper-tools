<script>

    pattern: '格式模式（X=字母, #=数字, A=字母数字, a=小写）',
    quantity: '数量（1-1000）',
    charset: '字符集',
    dedup: '去重（保证唯一）',
    checksum: '添加 Luhn 校验位',
    legend: '图例：X = 大写字母 · # = 数字 · A = 字母数字 · a = 小写 · 其他字符 = 原样输出',
    outputLabel: '生成的序列号',
    generate: '生成', copy: '全部复制', clear: '清除', download: '下载 CSV',
    copied: '已复制！',
    step1: '输入格式模式（如 XXXX-XXXX-XXXX-XXXX）',
    step2: '设置数量和字符集选项',
    step3: '如需检测输入错误，启用校验和',
    step4: '点击「生成」，然后复制或下载为 CSV',
  }
});

const { $, copyText, t, showToast } = GZ;

const CHARSET_UPPER = 'ABCDEFGHJKLMNPQRSTUVWXYZ'; // no I, O
const CHARSET_ALNUM = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789'; // no 0,1,I,O
const CHARSET_HEX = '0123456789ABCDEF';
const CHARSET_LOWER = 'abcdefghjkmnpqrstuvwxyz'; // no i,l,o
const CHARSET_DIGITS = '0123456789';

function secureRandomInt(max){
  const arr = new Uint32Array(1);
  crypto.getRandomValues(arr);
  return arr[0] % max;
}

function generateSegment(type, charsetMode){
  let charset;
  if(charsetMode === 'auto'){
    switch(type){
      case 'X': charset = CHARSET_UPPER; break;
      case 'A': charset = CHARSET_ALNUM; break;
      case 'a': charset = CHARSET_LOWER; break;
      case '#': charset = CHARSET_DIGITS; break;
      default: charset = CHARSET_ALNUM;
    }
  } else {
    switch(charsetMode){
      case 'upper': charset = CHARSET_UPPER; break;
      case 'alnum': charset = CHARSET_ALNUM; break;
      case 'hex': charset = CHARSET_HEX; break;
      default: charset = CHARSET_ALNUM;
    }
  }
  return charset[secureRandomInt(charset.length)];
}

function luhnChecksum(numberStr){
  let sum = 0;
  let alt = false;
  // Process from right to left
  const clean = numberStr.replace(/[^0-9]/g, '');
  for(let i = clean.length - 1; i >= 0; i--){
    let n = parseInt(clean[i]);
    if(alt){ n *= 2; if(n > 9) n -= 9; }
    sum += n;
    alt = !alt;
  }
  const check = (10 - (sum % 10)) % 10;
  return check.toString();
}

function generateOne(pattern, charsetMode, addChecksum){
  let result = '';
  for(const ch of pattern){
    if(ch === 'X') result += generateSegment('X', charsetMode);
    else if(ch === '#') result += generateSegment('#', charsetMode);
    else if(ch === 'A') result += generateSegment('A', charsetMode);
    else if(ch === 'a') result += generateSegment('a', charsetMode);
    else result += ch; // literal
  }
  if(addChecksum){
    const cs = luhnChecksum(result);
    result += '-' + cs;
  }
  return result;
}

function setPattern(p){ $('#pattern').value = p; }

function doGenerate(){
  const pattern = $('#pattern').value.trim();
  if(!pattern){ $('#status').innerHTML = '<span style="color:var(--gz-accent)">Please enter a pattern</span>'; return; }
  const charsetMode = $('#charset').value;
  const dedup = $('#dedup').checked;
  const addChecksum = $('#checksum').checked;
  const qty = Math.min(1000, Math.max(1, parseInt($('#qty').value) || 10));

  const results = new Set();
  let attempts = 0;
  const maxAttempts = qty * 5;
  while(results.size < qty && attempts < maxAttempts){
    const sn = generateOne(pattern, charsetMode, addChecksum);
    if(!dedup) results.add(sn);
    else results.add(sn);
    attempts++;
    if(!dedup && results.size >= qty) break;
    if(!dedup){ results.add(sn); if(results.size >= qty) break; }
  }

  const arr = [...results];
  if(arr.length < qty && dedup){
    $('#status').innerHTML = `<span style="color:var(--gz-accent)">⚠ Only ${arr.length} unique values possible with this pattern. Try a longer pattern.</span>`;
  } else {
    $('#status').innerHTML = `<span style="color:var(--gz-success)">✓ ${arr.length} serial number(s) generated</span>`;
  }

  let html = '<div class="result-box">';
  arr.forEach((sn, i) => {
    html += `<div class="result-line"><code>${sn}</code></div>`;
  });
  html += '</div>';
  $('#output').innerHTML = html;
  window._serials = arr;
}

function copyAll(){ if(window._serials && window._serials.length){ copyText(window._serials.join('\n')); showToast(t('copied')); } }
function downloadCSV(){
  if(!window._serials || !window._serials.length) return;
  const csv = 'Serial Number\n' + window._serials.map(s => `"${s}"`).join('\n');
  const blob = new Blob([csv], {type:'text/csv'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'serial-numbers.csv';
  a.click();
  URL.revokeObjectURL(url);
}
function doClear(){ $('#output').innerHTML = '<p style="opacity:.6">Click Generate to create serial numbers.</p>'; $('#status').innerHTML=''; window._serials=null; }

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="doGenerate()">${t('generate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="copyAll()">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="downloadCSV()">${t('download')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

});

</script>
