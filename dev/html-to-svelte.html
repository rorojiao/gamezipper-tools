const { $, copyText, t } = GZ;

function escapeHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function rewriteEvents(html){
  // onclick="foo()" => on:click={foo}
  //          onclick="foo(a,b)" => on:click={() => foo(a,b)}
  return html.replace(/\son([a-z]+)\s*=\s*"([^"]*)"/gi, (m, name, body) => {
    const trimmed = body.trim();
    const ref = trimmed.match(/^([a-zA-Z_$][\w$]*)(\(\))?$/);
    if(ref && ref[2]) return ` on:${name}={${ref[1]}}`;
    if(ref) return ` on:${name}={${ref[1]}}`;
    return ` on:${name}={() => { ${trimmed} }}`;
  });
}

function addBindings(html, declared){
  // <input ... id="x" ... > => <input bind:value={x} ... >
  // Use id or name attribute to derive variable name
  return html.replace(/<(input|textarea|select)\b([^>]*?)>/gi, (m, tag, attrs) => {
    let varName = null;
    const idM = attrs.match(/\bid\s*=\s*"([^"]+)"/i);
    const nameM = attrs.match(/\bname\s*=\s*"([^"]+)"/i);
    if(idM) varName = idM[1].replace(/[-_](\w)/g, (_,c)=>c.toUpperCase()).replace(/[^A-Za-z0-9_$]/g,'');
    else if(nameM) varName = nameM[1].replace(/[-_](\w)/g, (_,c)=>c.toUpperCase()).replace(/[^A-Za-z0-9_$]/g,'');
    if(!varName) return m;
    declared.add(varName);
    return `<${tag}${attrs} bind:value={${varName}}>`;
  });
}

function convert(){
  let html = $('#input').value.trim();
  if(!html){ $('#output').textContent = ''; $('#status').textContent = ''; return; }
  try {
    const ver = $('#opt-ver').value;
    const declared = new Set();
    if($('#opt-events').checked) html = rewriteEvents(html);
    if($('#opt-bind').checked) html = addBindings(html, declared);

    const scoped = $('#opt-scoped').checked ? ' scoped' : '';
    const indented = html.replace(/\n/g,'\n  ');

    let scriptBody;
    if(ver === '5'){
      const lines = [...declared].map(v => `  let ${v} = $state('');`);
      scriptBody = `<script>\n${lines.join('\n')}\n<\/script>\n\n`;
    } else {
      const lines = [...declared].map(v => `  let ${v} = '';`);
      scriptBody = `<script>\n${lines.join('\n')}\n<\/script>\n\n`;
    }

    const out = `${scriptBody}<div>\n  ${indented}\n</div>\n\n<style${scoped}>\n  /* add styles here */\n</style>\n`;
    $('#output').textContent = out;
    $('#status').innerHTML = `<span style="color:var(--gz-success)">${t('status')}</span>`;
  } catch(e){
    $('#output').innerHTML = `<span style="color:var(--gz-accent)">${escapeHtml(e.message)}</span>`;
    $('#status').textContent = '';
  }
}

function loadSample(){
  $('#input').value = `<div class="form">

  <label for="pw">Password</label>
  <input type="password" id="pw">
  <button onclick="submit()">Create account</button>
</div>`;
  convert();
}

function clearAll(){
  $('#input').value = ''; $('#output').textContent = ''; $('#status').textContent = '';
}

function applyI18n(){
  $('#lbl-ver').textContent = t('verLabel');
  $('#lbl-events').textContent = t('eventsLabel');
  $('#lbl-bind').textContent = t('bindLabel');
  $('#lbl-scoped').textContent = t('scopedLabel');
}

  <button class="gz-btn" onclick="convert()">${t('convert')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadSample()">${t('sample')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="clearAll()" style="margin-left:auto">${t('clear')}</button>`;

['input','opt-ver','opt-events','opt-bind','opt-scoped'].forEach(id => {
  const el = $('#' + id);

  el.addEventListener('change', convert);
});
