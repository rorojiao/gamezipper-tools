const { $, copyText, t } = GZ;

function escapeHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// Parse functions: capture name, async, params, default values, isArrow
function parseFunctions(code){
  const fns = [];
  // Regular / async / generator functions
  const funcRegex = /(?:export\s+(?:default\s+)?)?(?:async\s+)?function\s*\*?\s*([A-Za-z_$][\w$]*)?\s*\(([^)]*)\)/g;
  let m;
  while((m = funcRegex.exec(code)) !== null){
    fns.push({name: m[1] || 'anonymous', params: m[2], isAsync: /\basync\b/.test(m[0].split('function')[0])});
  }
  // Arrow functions: const foo = (a,b) => ...   OR   const foo = a => ...
  const arrowRegex = /(?:const|let|var)\s+([A-Za-z_$][\w$]*)\s*=\s*(async\s*)?\(([^)]*)\)\s*=>/g;
  while((m = arrowRegex.exec(code)) !== null){
    fns.push({name: m[1], params: m[3], isAsync: !!m[2]});
  }
  // Shorthand arrow without parens: const foo = a =>
  const shortArrow = /(?:const|let|var)\s+([A-Za-z_$][\w$]*)\s*=\s*(async\s+)?([A-Za-z_$][\w$]*)\s*=>(?!\s*[=(])/g;
  while((m = shortArrow.exec(code)) !== null){
    fns.push({name: m[1], params: m[3], isAsync: !!m[2]});
  }
  // Class methods: foo(a, b) { ... }  with simple body
  const methodRegex = /\b(async\s+)?([A-Za-z_$][\w$]*)\s*\(([^)]*)\)\s*\{/g;
  // Avoid double-counting functions already captured
  const seen = new Set(fns.map(f => f.name));
  while((m = methodRegex.exec(code)) !== null){
    const name = m[2];
    if(['if','for','while','switch','catch','function','return'].includes(name)) continue;
    if(seen.has(name)) continue;
    fns.push({name: name, params: m[3], isAsync: !!m[1], isMethod:true});
    seen.add(name);
  }
  return fns;
}

function parseParams(paramStr){
  if(!paramStr.trim()) return [];
  // Handle default values and destructuring minimally
  const parts = [];
  let depth = 0, cur = '';
  for(const ch of paramStr){
    if(ch === '(' || ch === '[' || ch === '{') depth++;
    if(ch === ')' || ch === ']' || ch === '}') depth--;
    if(ch === ',' && depth === 0){ parts.push(cur); cur=''; continue; }
    cur += ch;
  }
  if(cur.trim()) parts.push(cur);

  return parts.map(p => {
    const trimmed = p.trim();
    let name, def, optional = false;
    const eqIdx = trimmed.indexOf('=');
    if(eqIdx !== -1){
      name = trimmed.substring(0, eqIdx).trim();
      def = trimmed.substring(eqIdx + 1).trim();
      optional = true;
    } else {
      name = trimmed;
    }
    name = name.replace(/^\.{3}/, '').replace(/[\[\]{}]/g,'').trim();
    // Strip TS type annotations: a: string -> a
    name = name.split(':')[0].trim();
    return {name, def, optional};
  }).filter(p => p.name);
}

function inferType(p, code){
  // From default value
  if(p.def !== undefined && p.def !== null){
    const d = p.def.trim();
    if(/^['"`].*['"`]$/.test(d)) return 'string';
    if(d === 'true' || d === 'false') return 'boolean';
    if(/^-?\d+(\.\d+)?$/.test(d)) return 'number';
    if(d === 'null') return 'null';
    if(/^\[/.test(d)) return 'Array';
    if(/^\{/.test(d)) return 'Object';
  }
  // From name conventions
  const n = p.name.toLowerCase();
  if(/^(is|has|can|should|was|will)[A-Z]/.test(p.name)) return 'boolean';
  if(/(count|num|len|length|size|index|age|total)$/i.test(n)) return 'number';
  if(/^(str|text|msg|name|title|desc|url|email)/.test(n)) return 'string';
  if(/^(arr|list|items|data|rows)/.test(n)) return 'Array';
  if(/^(opts|options|config|cfg|props)/.test(n)) return 'Object';
  if(/^cb$|^callback$|^fn$|^handler$|^on[A-Z]/.test(n)) return 'Function';
  // Heuristic from preceding usage in code
  const usageRegex = new RegExp('\\b' + p.name.replace(/[.*+?^${}()|[\\]\\\\]/g,'\\\\$&') + '\\s*\\.(map|filter|forEach|reduce|push|pop|slice)\\b');
  if(usageRegex.test(code)) return 'Array';
  return '*';
}

function buildJSDoc(fn, code){
  const params = parseParams(fn.params);
  const lines = [];
  lines.push('/**');
  lines.push(` * ${fn.name} — describe what this function does.`);
  if($('#opt-types').checked){
    for(const p of params){
      const ty = inferType(p, code);
      const opt = p.optional ? '=' : '';
      lines.push(` * @param {${ty}${opt}} ${p.name} - description`);
    }
    const retTy = fn.isAsync ? 'Promise<*> ' : '* ';
    lines.push(` * @returns {${retTy.trim()}} description`);
  } else {
    for(const p of params){
      const opt = p.optional ? ' [optional]' : '';
      lines.push(` * @param ${p.name}${opt} - description`);
    }
    lines.push(` * @returns description`);
  }
  if($('#opt-throws').checked && fn.isAsync){
    lines.push(` * @throws {Error} description of when this fails`);
  }
  if($('#opt-example').checked){
    const sampleArgs = params.slice(0,3).map(p => p.def || (p.name==='cb'||p.name==='fn'?'()=>{}' : (inferType(p,code)==='string'?"''" : (inferType(p,code)==='number'?'0':'null')))).join(', ');
    lines.push(` * @example`);
    lines.push(` * ${fn.isAsync?'await ':''}${fn.name}(${sampleArgs});`);
  }
  lines.push(' */');
  if($('#opt-style').value === 'block'){
    return lines.map((l,i)=> i===0?'/*': (i===lines.length-1?' */': ' *'+l.slice(1))).join('\n');
  }
  return lines.join('\n');
}

function generate(){
  const code = $('#input').value;
  if(!code.trim()){ $('#output').textContent=''; $('#status').textContent=''; return; }
  try {
    const fns = parseFunctions(code);
    if(fns.length === 0){
      $('#output').innerHTML = `<span style="color:var(--gz-accent)">${escapeHtml(t('noFunc'))}</span>`;
      $('#status').textContent='';
      return;
    }
    const docs = fns.map(f => buildJSDoc(f, code)).join('\n\n');
    $('#output').textContent = docs;
    $('#status').innerHTML = `<span style="color:var(--gz-success)">${t('status').replace('{n}', fns.length)}</span>`;
  } catch(e){
    $('#output').innerHTML = `<span style="color:var(--gz-accent)">${escapeHtml(e.message)}</span>`;
    $('#status').textContent='';
  }
}
