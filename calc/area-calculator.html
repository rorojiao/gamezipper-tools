.ac-shapes{display:flex;flex-direction:column;gap:4px;max-height:600px;overflow-y:auto;background:var(--glass2);border:1px solid var(--border);border-radius:10px;padding:6px}
.ac-shape{padding:8px 12px;border-radius:6px;cursor:pointer;transition:background .12s;display:flex;align-items:center;gap:8px;font-size:.92em}
.ac-shape:hover{background:var(--glass)}

.ac-shape.active svg{stroke:#fff;fill:#fff}
.ac-shape svg{width:22px;height:22px;flex-shrink:0}

.ac-formula b{color:var(--accent)}
.ac-svg-box{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:14px;display:flex;justify-content:center;align-items:center;min-height:140px;margin:10px 0}
.ac-svg-box svg{max-width:240px;max-height:180px;width:100%;height:auto}
.ac-inputs{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin:10px 0}
.ac-input label{display:flex;flex-direction:column;gap:4px;font-size:.85em;font-weight:500}
.ac-input input{padding:7px 10px;background:var(--bg2);color:var(--text);border:1px solid var(--border);border-radius:6px;font-size:.95em;font-family:inherit}
.ac-result{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;padding:14px 18px;border-radius:10px;margin:12px 0;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.ac-result-text{font-size:1.1em;font-weight:600}
.ac-result-value{font-size:1.6em;font-weight:700;font-family:'JetBrains Mono',monospace}
.ac-units{font-size:.85em;margin-top:8px;display:flex;flex-wrap:wrap;gap:6px}
.ac-unit{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:4px 10px;font-size:.85em;font-family:monospace}
.ac-status{font-size:.85em;min-height:1.4em;margin-top:4px}
.ac-status.ok{color:var(--success)}
.ac-status.err{color:var(--danger)}

<script>
GZI18n.register({
  en: {
    toolTitle: 'Area Calculator',
    toolDesc: 'Calculate the area of 11+ geometric shapes — square, rectangle, triangle, circle, ellipse, trapezoid, parallelogram, sector, regular polygon, rhombus, annulus. Visual diagram and formula shown for each shape.',
    step1: 'Pick a shape from the left sidebar',
    step2: 'Enter the required measurements (use the same unit for all)',
    step3: 'Read the area instantly with the formula and diagram reference',
    step4: 'Use Copy to copy the result, or change the unit preset for conversions',
  },
  zh: {
    toolTitle: '面积计算器',
    toolDesc: '计算 11+ 种几何图形的面积 — 正方形、长方形、三角形、圆形、椭圆、梯形、平行四边形、扇形、正多边形、菱形、圆环。显示视觉图示和公式。',
    step1: '从左侧边栏选择形状',
    step2: '输入所需尺寸（所有输入使用相同单位）',
    step3: '即时查看面积，并对照公式和图示',
    step4: '点击「复制」复制结果，或切换单位预设进行换算',
  }
});

const { $, copyText, t } = GZ;

const SHAPES = {
  square: {
    name: 'Square',
    formula: 'A = side²',
    svg: '<svg viewBox="0 0 100 100"><rect x="20" y="20" width="60" height="60" fill="rgba(0,200,251,0.15)" stroke="currentColor" stroke-width="2"/><text x="50" y="55" text-anchor="middle" font-size="14" fill="currentColor">s</text></svg>',
    inputs: [{id:'s', label:'Side (s)', val:10}],
    calc: v => v.s * v.s
  },
  rectangle: {
    name: 'Rectangle',
    formula: 'A = length × width',
    svg: '<svg viewBox="0 0 100 100"><rect x="15" y="25" width="70" height="50" fill="rgba(0,200,251,0.15)" stroke="currentColor" stroke-width="2"/><text x="50" y="55" text-anchor="middle" font-size="12" fill="currentColor">l × w</text></svg>',
    inputs: [{id:'l', label:'Length (l)', val:10},{id:'w', label:'Width (w)', val:5}],
    calc: v => v.l * v.w
  },
  triangle: {
    name: 'Triangle',
    formula: 'A = (base × height) ÷ 2',
    svg: '<svg viewBox="0 0 100 100"><polygon points="50,15 85,80 15,80" fill="rgba(0,200,251,0.15)" stroke="currentColor" stroke-width="2"/><text x="50" y="65" text-anchor="middle" font-size="12" fill="currentColor">b</text><text x="35" y="50" text-anchor="middle" font-size="12" fill="currentColor">h</text></svg>',
    inputs: [{id:'b', label:'Base (b)', val:10},{id:'h', label:'Height (h)', val:8}],
    calc: v => (v.b * v.h) / 2
  },
  'right-triangle': {
    name: 'Right Triangle',
    formula: 'A = (leg₁ × leg₂) ÷ 2',
    svg: '<svg viewBox="0 0 100 100"><polygon points="20,80 20,20 80,80" fill="rgba(0,200,251,0.15)" stroke="currentColor" stroke-width="2"/><text x="50" y="65" text-anchor="middle" font-size="12" fill="currentColor">a</text><text x="32" y="50" text-anchor="middle" font-size="12" fill="currentColor">b</text></svg>',
    inputs: [{id:'a', label:'Leg a', val:3},{id:'b', label:'Leg b', val:4}],
    calc: v => (v.a * v.b) / 2
  },
  circle: {
    name: 'Circle',
    formula: 'A = π × r²',
    svg: '<svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="35" fill="rgba(0,200,251,0.15)" stroke="currentColor" stroke-width="2"/><line x1="50" y1="50" x2="85" y2="50" stroke="currentColor" stroke-width="1.5"/><text x="67" y="46" text-anchor="middle" font-size="12" fill="currentColor">r</text></svg>',
    inputs: [{id:'r', label:'Radius (r)', val:5}],
    calc: v => Math.PI * v.r * v.r
  },
  ellipse: {
    name: 'Ellipse',
    formula: 'A = π × a × b',
    svg: '<svg viewBox="0 0 100 100"><ellipse cx="50" cy="50" rx="38" ry="22" fill="rgba(0,200,251,0.15)" stroke="currentColor" stroke-width="2"/><line x1="50" y1="50" x2="88" y2="50" stroke="currentColor" stroke-width="1.5"/><line x1="50" y1="50" x2="50" y2="72" stroke="currentColor" stroke-width="1.5"/><text x="68" y="46" text-anchor="middle" font-size="11" fill="currentColor">a</text><text x="55" y="65" font-size="11" fill="currentColor">b</text></svg>',
    inputs: [{id:'a', label:'Semi-major (a)', val:8},{id:'b', label:'Semi-minor (b)', val:5}],
    calc: v => Math.PI * v.a * v.b
  },
  trapezoid: {
    name: 'Trapezoid',
    formula: 'A = ((a + b) ÷ 2) × h',
    svg: '<svg viewBox="0 0 100 100"><polygon points="20,80 80,80 65,25 35,25" fill="rgba(0,200,251,0.15)" stroke="currentColor" stroke-width="2"/><line x1="35" y1="25" x2="35" y2="80" stroke="currentColor" stroke-width="1" stroke-dasharray="3,2"/><text x="50" y="55" text-anchor="middle" font-size="11" fill="currentColor">h</text><text x="27" y="55" text-anchor="middle" font-size="10" fill="currentColor">a</text><text x="73" y="55" text-anchor="middle" font-size="10" fill="currentColor">b</text></svg>',
    inputs: [{id:'a', label:'Base a (top)', val:6},{id:'b', label:'Base b (bottom)', val:10},{id:'h', label:'Height (h)', val:8}],
    calc: v => ((v.a + v.b) / 2) * v.h
  },
  parallelogram: {
    name: 'Parallelogram',
    formula: 'A = base × height',
    svg: '<svg viewBox="0 0 100 100"><polygon points="25,75 75,75 90,25 40,25" fill="rgba(0,200,251,0.15)" stroke="currentColor" stroke-width="2"/><line x1="40" y1="25" x2="40" y2="75" stroke="currentColor" stroke-width="1" stroke-dasharray="3,2"/><text x="50" y="55" text-anchor="middle" font-size="11" fill="currentColor">h</text><text x="55" y="20" text-anchor="middle" font-size="11" fill="currentColor">b</text></svg>',
    inputs: [{id:'b', label:'Base (b)', val:10},{id:'h', label:'Height (h)', val:6}],
    calc: v => v.b * v.h
  },
  sector: {
    name: 'Sector',
    formula: 'A = (θ ÷ 360) × π × r²',
    svg: '<svg viewBox="0 0 100 100"><path d="M 50 50 L 85 50 A 35 35 0 0 0 30 18 Z" fill="rgba(0,200,251,0.25)" stroke="currentColor" stroke-width="2"/><line x1="50" y1="50" x2="85" y2="50" stroke="currentColor" stroke-width="1.5"/><line x1="50" y1="50" x2="30" y2="18" stroke="currentColor" stroke-width="1.5"/><text x="70" y="45" font-size="11" fill="currentColor">r</text><text x="50" y="38" text-anchor="middle" font-size="11" fill="currentColor">θ</text></svg>',
    inputs: [{id:'r', label:'Radius (r)', val:5},{id:'a', label:'Angle θ (degrees)', val:60}],
    calc: v => (v.a / 360) * Math.PI * v.r * v.r
  },
  polygon: {
    name: 'Regular Polygon',
    formula: 'A = (n × s²) ÷ (4 × tan(π ÷ n))',
    svg: '<svg viewBox="0 0 100 100"><polygon points="50,15 90,40 75,85 25,85 10,40" fill="rgba(0,200,251,0.15)" stroke="currentColor" stroke-width="2"/><text x="50" y="55" text-anchor="middle" font-size="11" fill="currentColor">n, s</text></svg>',
    inputs: [{id:'n', label:'Sides (n, 3-12)', val:5, min:3, max:12, integer:true},{id:'s', label:'Side length (s)', val:5}],
    calc: v => (v.n * v.s * v.s) / (4 * Math.tan(Math.PI / v.n))
  },
  rhombus: {
    name: 'Rhombus',
    formula: 'A = (d₁ × d₂) ÷ 2',
    svg: '<svg viewBox="0 0 100 100"><polygon points="50,15 85,50 50,85 15,50" fill="rgba(0,200,251,0.15)" stroke="currentColor" stroke-width="2"/><line x1="15" y1="50" x2="85" y2="50" stroke="currentColor" stroke-width="1" stroke-dasharray="2,2"/><line x1="50" y1="15" x2="50" y2="85" stroke="currentColor" stroke-width="1" stroke-dasharray="2,2"/><text x="50" y="55" text-anchor="middle" font-size="10" fill="currentColor">d₁×d₂</text></svg>',
    inputs: [{id:'d1', label:'Diagonal d₁', val:8},{id:'d2', label:'Diagonal d₂', val:6}],
    calc: v => (v.d1 * v.d2) / 2
  },
  annulus: {
    name: 'Annulus (Ring)',
    formula: 'A = π × (R² − r²)',
    svg: '<svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="35" fill="none" stroke="currentColor" stroke-width="2"/><circle cx="50" cy="50" r="20" fill="none" stroke="currentColor" stroke-width="2"/><line x1="50" y1="50" x2="50" y2="15" stroke="currentColor" stroke-width="1" stroke-dasharray="2,2"/><line x1="50" y1="50" x2="50" y2="30" stroke="currentColor" stroke-width="1" stroke-dasharray="2,2"/><text x="55" y="22" font-size="10" fill="currentColor">R</text><text x="55" y="42" font-size="10" fill="currentColor">r</text></svg>',
    inputs: [{id:'R', label:'Outer radius (R)', val:8},{id:'r', label:'Inner radius (r)', val:4}],
    calc: v => Math.PI * (v.R * v.R - v.r * v.r)
  }
};

const UNIT_FACTORS = { mm:0.001, cm:0.01, m:1, km:1000, in:0.0254, ft:0.3048, yd:0.9144, mi:1609.344 };
let currentShape = 'rectangle';
let currentUnit = 'm';

function renderShapes() {
  const list = $('#shapes');
  list.innerHTML = Object.entries(SHAPES).map(([key, shape]) =>
    `<div class="ac-shape${key===currentShape?' active':''}" data-shape="${key}">${shape.svg}<span>${shape.name}</span></div>`
  ).join('');
  list.querySelectorAll('.ac-shape').forEach(el => {
    el.addEventListener('click', () => {
      currentShape = el.dataset.shape;
      renderShapes();
      renderPanel();
    });
  });
}

function renderPanel() {
  const shape = SHAPES[currentShape];
  $('#shape-name').textContent = shape.name;
  $('#svg-box').innerHTML = shape.svg;
  $('#formula').innerHTML = `<b>Formula:</b> ${shape.formula}`;
  const inputsEl = $('#inputs');
  inputsEl.innerHTML = shape.inputs.map(inp => {
    const step = inp.integer ? '1' : 'any';
    const min = inp.min ?? '';
    const max = inp.max ?? '';
    return `<div class="ac-input">
      <label>${inp.label}<input type="number" id="inp-${inp.id}" value="${inp.val}" ${min!==''?`min="${min}"`:''} ${max!==''?`max="${max}"`:''} step="${step}"></label>
    </div>`;
  }).join('');
  shape.inputs.forEach(inp => {
    $(`#inp-${inp.id}`).addEventListener('input', calculate);
  });
  calculate();
}

function calculate() {
  const shape = SHAPES[currentShape];
  const v = {};
  let valid = true;
  shape.inputs.forEach(inp => {
    const raw = $(`#inp-${inp.id}`).value;
    const n = parseFloat(raw);
    if (isNaN(n) || n < 0) { valid = false; v[inp.id] = 0; }
    else v[inp.id] = n;
  });
  if (!valid) {
    $('#result-value').textContent = '—';
    $('#status').innerHTML = `<span style="color:var(--danger)">Enter positive numbers</span>`;
    $('#units').innerHTML = '';
    return;
  }
  const A = shape.calc(v);
  $('#result-value').textContent = A.toLocaleString(undefined, {maximumFractionDigits: 6}) + ' sq';
  $('#status').innerHTML = `<span class="ok">✓ ${shape.name} area calculated</span>`;
  $('#status').className = 'ac-status ok';
  // Convert to other units (assuming the inputs were in the current unit)
  const factor = UNIT_FACTORS[currentUnit] || 1;
  const baseArea = A * factor * factor;
  $('#units').innerHTML = Object.entries(UNIT_FACTORS).map(([u, f]) => {
    const v = baseArea / (f * f);
    return `<span class="ac-unit">${v.toLocaleString(undefined, {maximumFractionDigits:4})} ${u}²</span>`;
  }).join('');
}

function doClear() {
  const shape = SHAPES[currentShape];
  shape.inputs.forEach(inp => { $(`#inp-${inp.id}`).value = 0; });
  calculate();
}

function loadExample() {
  currentShape = 'rectangle';
  renderShapes();
  $('#inp-l').value = 12;
  $('#inp-w').value = 8;
  calculate();
}

function changeUnit(u) {
  currentUnit = u;
  document.querySelectorAll('.ac-unit-btn').forEach(b => b.classList.toggle('active', b.dataset.unit === u));
  calculate();
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn" onclick="copyText($('#result-value').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>
  <span style="margin-left:8px;font-size:.85em;opacity:.75">Unit:</span>
  ${Object.keys(UNIT_FACTORS).map(u => `<button class="gz-btn gz-btn-secondary ac-unit-btn${u==='m'?' active':''}" data-unit="${u}" onclick="changeUnit('${u}')" style="padding:4px 10px;font-size:.85em">${u}</button>`).join('')}`;

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📏', href:'/calc/aspect-ratio.html', name:'Aspect Ratio'},
    {icon:'🧱', href:'/calc/concrete.html', name:'Concrete Calc'},
    {icon:'📐', href:'/calc/fraction-calculator.html', name:'Fraction Calculator'},
    {icon:'⭕', href:'/css-tools/border-radius.html', name:'Border Radius'},
  ]
});

renderShapes();
renderPanel();
</script>
<script src="/tools-result-rec.js" defer></script>
