const { $, copyText, t } = GZ;
let showTags=true;
let rootName='AutoGenerated';

function capitalize(s){ return s.charAt(0).toUpperCase()+s.slice(1); }
function toPascal(s){ return s.replace(/[_\-\s]+(.)?/g,(_,c)=>c?c.toUpperCase():'').replace(/^./,c=>c.toUpperCase()); }

function inferType(val){
  if(val===null) return ['interface{}',null];
  if(typeof val==='string') return ['string',null];
  if(typeof val==='boolean') return ['bool',null];
  if(typeof val==='number') return Number.isInteger(val)?['int',null]:['float64',null];
  if(Array.isArray(val)){
    if(val.length===0) return ['[]interface{}',null];
    const [innerType,innerStruct]=inferType(val[0]);
    return ['[]'+innerType, innerStruct];
  }
  if(typeof val==='object') return [capitalize('NestedStruct'), val];
  return ['interface{}',null];
}

function generateStruct(obj, name, depth){
  let lines=[`type ${toPascal(name)} struct {`];
  const subStructs=[];
  const keys=Object.keys(obj);
  keys.forEach(key=>{
    const [goType, nested]=inferType(obj[key]);
    const pascalKey=toPascal(key);
    const tag=showTags?` \`json:"${key}"\``:'';
    if(nested && typeof nested==='object' && !Array.isArray(nested)){
      const subName=pascalKey;
      lines.push(`\t${pascalKey} ${subName}${tag}`);
      subStructs.push(generateStruct(nested, subName, depth+1));
    } else {
      lines.push(`\t${pascalKey} ${goType}${tag}`);
    }
  });
  lines.push('}');
  return [...lines,...subStructs].join('\n');
}

function doConvert(){
  const inp=$('#input').value.trim();
  if(!inp) return;
  try{
    const obj=JSON.parse(inp);
    rootName=$('#struct-name')?$('#struct-name').value||'AutoGenerated':'AutoGenerated';
    showTags=$('#json-tags')?$('#json-tags').checked:true;
    const code=generateStruct(obj, rootName, 0);
    const plainCode=code;
    // Syntax highlight
    const highlighted=code.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/\/\/.*/g, m=>`<span class="cm">${m}</span>`)
      .replace(/\b(type|struct|string|int|float64|bool|interface|map)\b/g, '<span class="kw">$1</span>')
      .replace(/`json:"[^"]*"`/g, m=>`<span class="tg">${m}</span>`)
      .replace(/\b[A-Z][a-zA-Z0-9]*\b/g, m=>{
        if(['type','struct','string','int','float64','bool','interface','map'].includes(m)) return m;
        return `<span class="tp">${m}</span>`;
      });
    $('#output').innerHTML=highlighted;
    $('#output').dataset.plain=plainCode;
    $('#status').innerHTML=`<span style="color:var(--gz-success)">${t('validJson')}</span>`;
  }catch(e){
    $('#output').innerHTML=`<span style="color:var(--gz-accent)">${t('invalidJson')}${e.message}</span>`;
    $('#status').innerHTML=`<span style="color:var(--gz-accent)">${t('invalidJson')}${e.message}</span>`;
  }
}

  $('#input').value=JSON.stringify({
