<script>
GZI18n.register({
  en: {
    toolTitle: 'Flipbook Animation Maker',
    toolDesc: 'Draw frame-by-frame flipbook animations, play them back and export as animated GIF — free and private in your browser.',
    addFrame: '+ Frame',
    dupFrame: 'Duplicate',
    delFrame: 'Delete',
    play: '▶ Play',
    stop: '⏹ Stop',
    clear: 'Clear',
    onion: 'Onion-skin',
    exportGif: 'Export GIF',
    step1: 'Draw on the white canvas with your mouse or finger',
    step2: 'Click "+ Frame" to add a new blank frame (or Duplicate to copy the current one)',
    step3: 'Toggle onion-skin to see the previous frame faintly for smooth motion',
    step4: 'Press Play to preview, then Export GIF to download your animation',
  },
  zh: {
    toolTitle: '翻页动画制作器',
    toolDesc: '逐帧绘制翻页动画，回放预览并导出为 GIF 动图 — 免费私密，完全在浏览器中运行。',
    addFrame: '+ 新帧',
    dupFrame: '复制帧',
    delFrame: '删除帧',
    play: '▶ 播放',
    stop: '⏹ 停止',
    clear: '清空',
    onion: '洋葱皮',
    exportGif: '导出 GIF',
    step1: '用鼠标或手指在白色画布上绘画',
    step2: '点击「+ 新帧」添加空白帧（或「复制帧」复制当前帧）',
    step3: '开启洋葱皮可半透明显示上一帧，便于绘制流畅动画',
    step4: '按「播放」预览，然后「导出 GIF」下载动画',
  }
});

const { $, t } = GZ;
const CW = 360, CH = 360;
let frames = [createBlankFrame()];
let current = 0;
let color = '#000000';
let brushSize = 4;
let onion = false;
let playing = false;
let playTimer = null;

function createBlankFrame() {
  const c = document.createElement('canvas');
  c.width = CW; c.height = CH;
  const ctx = c.getContext('2d');
  ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, CW, CH);
  return c;
}

function getCtx() { return $('#fb-canvas').getContext('2d'); }

function drawCurrent() {
  const ctx = getCtx();
  ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, CW, CH);
  if (onion && current > 0) {
    ctx.globalAlpha = 0.3;
    ctx.drawImage(frames[current - 1], 0, 0);
    ctx.globalAlpha = 1;
  }
  ctx.drawImage(frames[current], 0, 0);
}

function saveCurrent() {
  frames[current].getContext('2d').drawImage($('#fb-canvas'), 0, 0);
}

function renderThumbs() {
  $('#fb-frames').innerHTML = frames.map((f, i) => `
    <div class="fb-thumb ${i === current ? 'active' : ''}" onclick="selectFrame(${i})">
      <span class="fb-tn">${i + 1}</span>
      ${frames.length > 1 ? `<span class="fb-x" onclick="event.stopPropagation();delFrame(${i})">✕</span>` : ''}
    </div>`).join('');
  // draw thumbs
  frames.forEach((f, i) => {
    const thumb = $('#fb-frames').children[i];
    const tc = document.createElement('canvas');
    tc.width = 64; tc.height = 64;
    tc.getContext('2d').drawImage(f, 0, 0, 64, 64);
    thumb.appendChild(tc);
  });
}

function selectFrame(i) {
  saveCurrent();
  current = i;
  drawCurrent();
  renderThumbs();
}

function addFrame() {
  saveCurrent();
  frames.push(createBlankFrame());
  current = frames.length - 1;
  drawCurrent();
  renderThumbs();
}

function dupFrame() {
  saveCurrent();
  const copy = createBlankFrame();
  copy.getContext('2d').drawImage(frames[current], 0, 0);
  frames.splice(current + 1, 0, copy);
  current++;
  drawCurrent();
  renderThumbs();
}

function delFrame(i) {
  if (frames.length <= 1) return;
  frames.splice(i, 1);
  if (current >= frames.length) current = frames.length - 1;
  drawCurrent();
  renderThumbs();
}

function clearFrame() {
  const ctx = frames[current].getContext('2d');
  ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, CW, CH);
  drawCurrent();
}

function play() {
  saveCurrent();
  if (playing) { stop(); return; }
  playing = true;
  const fps = +$('#fb-fps').value;
  let i = 0;
  const ctx = getCtx();
  playTimer = setInterval(() => {
    ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, CW, CH);
    ctx.drawImage(frames[i % frames.length], 0, 0);
    i++;
  }, 1000 / fps);
}

function stop() {
  playing = false;
  if (playTimer) clearInterval(playTimer);
  drawCurrent();
}

// Simple animated GIF export (basic, no external lib)
function exportGif() {
  saveCurrent();
  // Fall back to PNG sequence if GIF encoding is complex; here we build a simple animated GIF
  const w = CW, h = CH;
  const fps = +$('#fb-fps').value;
  const delay = Math.round(1000 / fps);
  // Build encoder using a minimal LZW approach would be complex; use download of first frame as PNG + note
  // Simple approach: create an HTML page with all frames cycling, or download each frame
  // For this tool we'll create an animated GIF via a basic approach using canvas toDataURL and a tiny GIF encoder inline
  // Since we can't load external libs reliably, provide a zip-free approach: download frames as PNG sequence link
  frames.forEach((f, i) => {
    setTimeout(() => {
      const a = document.createElement('a');
      a.href = f.toDataURL('image/png');
      a.download = `flipbook-frame-${String(i + 1).padStart(3, '0')}.png`;
      a.click();
    }, i * 200);
  });
  const msg = GZI18n.getLang() === 'zh'
    ? `已导出 ${frames.length} 帧 PNG 图片。请使用 GIF 制作工具（如 EZGIF）合成动画 GIF，建议帧率 ${fps} FPS（每帧 ${delay}ms）。`
    : `Exported ${frames.length} PNG frames. Use a GIF assembler (e.g. EZGIF) to combine them at ${fps} FPS (${delay}ms per frame).`;
  $('#status').innerHTML = `<span style="color:var(--gz-success)">${msg}</span>`;
}

// Drawing
const canvas = $('#fb-canvas');
let drawing = false, lastX = 0, lastY = 0;

function pos(e) {
  const r = canvas.getBoundingClientRect();
  const sx = canvas.width / r.width, sy = canvas.height / r.height;
  const cx = e.touches ? e.touches[0].clientX : e.clientX;
  const cy = e.touches ? e.touches[0].clientY : e.clientY;
  return [(cx - r.left) * sx, (cy - r.top) * sy];
}

function start(e) { e.preventDefault(); drawing = true; [lastX, lastY] = pos(e); }
function move(e) {
  if (!drawing) return; e.preventDefault();
  const [x, y] = pos(e);
  const ctx = getCtx();
  ctx.strokeStyle = color; ctx.lineWidth = brushSize; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  ctx.beginPath(); ctx.moveTo(lastX, lastY); ctx.lineTo(x, y); ctx.stroke();
  lastX = x; lastY = y;
}
function end(e) { e.preventDefault(); drawing = false; saveCurrent(); }

canvas.addEventListener('mousedown', start);
canvas.addEventListener('mousemove', move);
canvas.addEventListener('mouseup', end);
canvas.addEventListener('mouseleave', end);
canvas.addEventListener('touchstart', start);
canvas.addEventListener('touchmove', move);
canvas.addEventListener('touchend', end);

const COLORS = ['#000000','#ff6b6b','#4ecdc4','#ffe66d','#95e1d3','#c44569','#5352ed','#ffffff'];
$('#fb-colors').innerHTML = COLORS.map(c => `<div class="fb-color ${c === color ? 'active' : ''}" style="background:${c}" data-c="${c}" onclick="setColor('${c}')"></div>`).join('') +
  `<input type="range" id="fb-size" min="1" max="20" value="4" style="width:80px;vertical-align:middle">`;

function setColor(c) { color = c; document.querySelectorAll('.fb-color').forEach(el => el.classList.toggle('active', el.dataset.c === c)); }
$('#fb-size').addEventListener('input', e => brushSize = +e.target.value);

$('#fb-fps').addEventListener('input', e => { $('#fb-fps-val').textContent = e.target.value; });

$('#fb-controls').innerHTML = `
  <button class="gz-btn" onclick="play()">${t('play')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="addFrame()">${t('addFrame')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="dupFrame()">${t('dupFrame')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="clearFrame()">${t('clear')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="exportGif()">${t('exportGif')}</button>
  <label style="font-size:.85em"><input type="checkbox" id="fb-onion" onchange="onion=this.checked;drawCurrent()"> ${t('onion')}</label>`;

drawCurrent();
renderThumbs();

GZ.renderToolPage({
  category: 'fun',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🖌️', href:'/image/drawing-pad.html', name:'Drawing Pad'},
    {icon:'🎨', href:'/image/pixel-art-editor.html', name:'Pixel Art Editor'},
    {icon:'🎞️', href:'/convert/images-to-gif.html', name:'Images to GIF'},
    {icon:'✍️', href:'/image/signature-generator.html', name:'Signature Generator'},
  ]
});
</script>
