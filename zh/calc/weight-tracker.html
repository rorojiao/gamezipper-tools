<script>
GZI18n.register({
  en: {
    toolTitle: 'Weight Tracker',
    toolDesc: 'Log your weight and watch your progress on a live chart. Tracks current weight, change, BMI, goal and streaks. Private — runs entirely in your browser.',
    lblDate: 'Date',
    lblWeight: 'Weight',
    add: 'Log',
    lblUnit: 'Unit',
    lblHeight: 'Height (cm)',
    lblGoal: 'Goal weight',

    range30: '30 days',
    range90: '90 days',
    rangeAll: 'All',
    needVal: 'Please enter a weight',
    bmiUnder: 'Underweight',
    bmiNormal: 'Normal',
    bmiOver: 'Overweight',
    bmiObese: 'Obese',
    empty: 'No entries yet — log your weight to begin',
    step1: 'Set your unit, height and goal in the options row',
    step2: 'Pick the date and enter your weight, then press Log',
    step3: 'Watch the chart and summary update — BMI and change calculate automatically',
    step4: 'Browse entries, switch chart range, or export a CSV/JSON backup anytime',
  },
  zh: {
    toolTitle: '体重追踪器',
    toolDesc: '记录体重，在实时图表上查看进度。自动统计当前体重、变化、BMI、目标和连续天数。完全私密 — 仅在浏览器中运行。',
    lblDate: '日期',
    lblWeight: '体重',
    add: '记录',
    lblUnit: '单位',
    lblHeight: '身高（厘米）',
    lblGoal: '目标体重',
    statsTitle: '概览',
    historyTitle: '记录',
    current: '当前',
    change: '总变化',
    avg: '周均',
    bmi: 'BMI',
    goal: '距目标',
    streak: '连续天数',
    jsonBtn: '导出 JSON',
    csvBtn: '导出 CSV',
    clearBtn: '清空全部数据',
    range7: '7 天',
    range30: '30 天',
    range90: '90 天',
    rangeAll: '全部',
    needVal: '请输入体重',
    bmiUnder: '偏瘦',
    bmiNormal: '正常',
    bmiOver: '超重',
    bmiObese: '肥胖',
    empty: '还没有记录 — 从今天开始记录吧',
    step1: '在选项行设置单位、身高和目标',
    step2: '选择日期并输入体重，点击「记录」',
    step3: '查看图表和概览更新 — BMI 和变化自动计算',
    step4: '浏览记录、切换图表范围，随时导出 CSV/JSON 备份',
  }
});

const { $, t } = GZ;

let CFG = { unit: 'kg', height: 0, goal: 0 };
let ENTRIES = {}; // { 'YYYY-MM-DD': kgValue }
try { const c = localStorage.getItem('gz-weight-cfg'); if (c) Object.assign(CFG, JSON.parse(c)); } catch(e) {}
try { const e = localStorage.getItem('gz-weight'); if (e) ENTRIES = JSON.parse(e); } catch(e) {}

let chartRange = 30;

// Unit conversion helpers — always store as kg
const TO_KG = { kg: 1, lb: 0.45359237, st: 6.35029318 };
const FROM_KG = { kg: 1, lb: 1/0.45359237, st: 1/6.35029318 };
function toUnit(kg) { return kg * FROM_KG[CFG.unit]; }
function fromUnit(v) { return v * TO_KG[CFG.unit]; }
function unitSym() { return CFG.unit; }
function fmt(v, dec) { return (v).toFixed(dec == null ? 1 : dec); }

const pad = n => String(n).padStart(2, '0');
const todayKey = () => {
  const d = new Date();
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
};

function addEntry() {
  const d = $('#inDate').value || todayKey();
  const v = parseFloat($('#inWeight').value);
  if (!v || v <= 0) { alert(t('needVal')); return; }
  ENTRIES[d] = fromUnit(v);
  try { localStorage.setItem('gz-weight', JSON.stringify(ENTRIES)); } catch(e) {}
  $('#inWeight').value = '';
  renderAll();
}

function renderStats() {
  const keys = Object.keys(ENTRIES).sort();
  if (!keys.length) {
    $('#stats').innerHTML = `<div class="wt-stat" style="grid-column:1/-1"><div class="v">—</div><div class="l">${t('empty')}</div></div>`;
    return;
  }
  const first = ENTRIES[keys[0]];
  const last = ENTRIES[keys[keys.length - 1]];
  const change = last - first;
  // weekly avg (last 7 entries if available)
  const last7 = keys.slice(-7).map(k => ENTRIES[k]);
  const avg7 = last7.reduce((a,b)=>a+b,0) / last7.length;
  // weekly rate: slope per week
  let weeklyRate = 0;
  if (keys.length >= 2) {
    const days = (new Date(keys[keys.length-1]) - new Date(keys[0])) / 86400000;
    if (days > 0) weeklyRate = (change / days) * 7;
  }
  // BMI
  let bmi = 0, bmiCat = '';
  if (CFG.height > 0) {
    const h = CFG.height / 100;
    bmi = last / (h * h);
    bmiCat = bmi < 18.5 ? t('bmiUnder') : bmi < 25 ? t('bmiNormal') : bmi < 30 ? t('bmiOver') : t('bmiObese');
  }
  // to goal
  let toGoal = '';
  if (CFG.goal > 0) toGoal = (toUnit(last - fromUnit(CFG.goal))).toFixed(1) + ' ' + unitSym();
  // streak
  let streak = 0;
  const d = new Date();
  while (true) {
    const k = `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
    if (ENTRIES[k]) { streak++; d.setDate(d.getDate() - 1); }
    else break;
  }
  const cls = change < 0 ? 'loss' : change > 0 ? 'gain' : '';
  const arrow = change < 0 ? '▼ ' : change > 0 ? '▲ ' : '';
  $('#stats').innerHTML = `
    <div class="wt-stat"><div class="v">${fmt(toUnit(last))}</div><div class="l">${t('current')} (${unitSym()})</div></div>
    <div class="wt-stat ${cls}"><div class="v">${arrow}${fmt(toUnit(Math.abs(change)))}</div><div class="l">${t('change')}</div></div>
    <div class="wt-stat"><div class="v">${weeklyRate ? fmt(toUnit(weeklyRate), 2) : '—'}</div><div class="l">${t('avg')} / ${unitSym()}</div></div>
    <div class="wt-stat"><div class="v">${bmi ? bmi.toFixed(1) : '—'}</div><div class="l">${t('bmi')} ${bmiCat ? '· ' + bmiCat : ''}</div></div>
    <div class="wt-stat"><div class="v">${toGoal || '—'}</div><div class="l">${t('goal')}</div></div>
    <div class="wt-stat"><div class="v">${streak}</div><div class="l">${t('streak')}</div></div>`;
}

function renderChart() {
  const svg = $('#chart');
  const W = 600, H = 240, PAD = 30;
  const keys = Object.keys(ENTRIES).sort();
  if (keys.length < 2) {
    svg.innerHTML = `<text x="${W/2}" y="${H/2}" text-anchor="middle" fill="#888" font-size="14">${t('empty')}</text>`;
    return;
  }
  // filter by range
  let fKeys = keys;
  if (chartRange !== 'all') {
    const cutoff = new Date(); cutoff.setDate(cutoff.getDate() - chartRange);
    fKeys = keys.filter(k => new Date(k) >= cutoff);
    if (fKeys.length < 2) fKeys = keys.slice(-Math.max(2, chartRange));
  }
  const vals = fKeys.map(k => ENTRIES[k]);
  const min = Math.min(...vals), max = Math.max(...vals);
  const range = max - min || 1;
  const pad = range * 0.15;
  const lo = min - pad, hi = max + pad;
  const xOf = i => PAD + (i / (fKeys.length - 1)) * (W - 2 * PAD);
  const yOf = v => PAD + (1 - (v - lo) / (hi - lo)) * (H - 2 * PAD);
  // goal line
  let goalLine = '';
  if (CFG.goal > 0) {
    const gy = yOf(fromUnit(CFG.goal));
    if (gy > PAD && gy < H - PAD) {
      goalLine = `<line x1="${PAD}" y1="${gy}" x2="${W - PAD}" y2="${gy}" stroke="#ab47bc" stroke-width="1.5" stroke-dasharray="6 4" opacity="0.6"/><text x="${W - PAD}" y="${gy - 5}" text-anchor="end" fill="#ab47bc" font-size="11">goal ${CFG.goal} ${unitSym()}</text>`;
    }
  }
  // build path
  let pathD = '', areaD = '';
  fKeys.forEach((k, i) => {
    const x = xOf(i), y = yOf(ENTRIES[k]);
    pathD += (i === 0 ? 'M' : 'L') + x.toFixed(1) + ' ' + y.toFixed(1) + ' ';
    areaD += (i === 0 ? 'M' : 'L') + x.toFixed(1) + ' ' + y.toFixed(1) + ' ';
  });
  areaD += `L ${xOf(fKeys.length-1).toFixed(1)} ${(H-PAD)} L ${PAD} ${(H-PAD)} Z`;
  // dots
  const dots = fKeys.map((k, i) => {
    const x = xOf(i), y = yOf(ENTRIES[k]);
    return `<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="3" fill="#4ecdc4"><title>${k}: ${fmt(toUnit(ENTRIES[k]))} ${unitSym()}</title></circle>`;
  }).join('');
  // y-axis labels
  const yLabels = [0, 0.5, 1].map(p => {
    const v = lo + (hi - lo) * p;
    const y = yOf(v);
    return `<line x1="${PAD-5}" y1="${y}" x2="${W-PAD}" y2="${y}" stroke="rgba(255,255,255,0.05)" stroke-width="1"/><text x="${PAD-8}" y="${y+4}" text-anchor="end" fill="#888" font-size="10">${fmt(toUnit(v))}</text>`;
  }).join('');
  // x-axis labels (first, middle, last)
  const xLabels = [0, Math.floor((fKeys.length-1)/2), fKeys.length-1].map(i => {
    const x = xOf(i);
    return `<text x="${x}" y="${H - PAD + 16}" text-anchor="middle" fill="#888" font-size="10">${fKeys[i]}</text>`;
  }).join('');
  svg.innerHTML = `
    <defs><linearGradient id="wtGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4ecdc4" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#4ecdc4" stop-opacity="0"/>
    </linearGradient></defs>
    ${yLabels}
    <path d="${areaD}" fill="url(#wtGrad)"/>
    ${goalLine}
    <path d="${pathD}" fill="none" stroke="#4ecdc4" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
    ${dots}
    ${xLabels}`;
}

function renderHistory() {
  const keys = Object.keys(ENTRIES).sort().reverse();
  if (!keys.length) { $('#history').innerHTML = `<div class="wt-empty">${t('empty')}</div>`; return; }
  let prev = null;
  $('#history').innerHTML = keys.map(k => {
    const w = ENTRIES[k];
    const dispW = fmt(toUnit(w));
    let chg = '';
    if (prev !== null) {
      const diff = w - prev;
      if (Math.abs(diff) > 0.001) {
        const cls = diff < 0 ? 'loss' : 'gain';
        const ar = diff < 0 ? '▼' : '▲';
        chg = `<span class="chg" style="color:${diff<0?'#66bb6a':'#ff7043'}">${ar} ${fmt(toUnit(Math.abs(diff)))}</span>`;
      } else chg = '<span class="chg" style="color:#888">—</span>';
    } else chg = '<span class="chg" style="color:#888"></span>';
    prev = w;
    return `<div class="wt-hrow"><span class="d">${k}</span><span class="w">${dispW} ${unitSym()}</span>${chg}<button class="del" data-k="${k}">×</button></div>`;
  }).join('');
  document.querySelectorAll('#history .del').forEach(b => {
    b.addEventListener('click', () => { delete ENTRIES[b.dataset.k]; localStorage.setItem('gz-weight', JSON.stringify(ENTRIES)); renderAll(); });
  });
}

function saveCfg() { try { localStorage.setItem('gz-weight-cfg', JSON.stringify(CFG)); } catch(e) {} }

function exportJson() {
  const out = { unit: CFG.unit, height: CFG.height, goal: CFG.goal, entries: ENTRIES };
  download(new Blob([JSON.stringify(out, null, 2)], { type: 'application/json' }), 'weight-tracker.json');
}
function exportCsv() {
  const rows = [['date', 'weight_' + CFG.unit]];
  Object.keys(ENTRIES).sort().forEach(k => rows.push([k, fmt(toUnit(ENTRIES[k]), 2)]));
  const csv = rows.map(r => r.join(',')).join('\n');
  download(new Blob([csv], { type: 'text/csv' }), 'weight-tracker.csv');
}
function download(blob, name) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = name; document.body.appendChild(a); a.click();
  setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 200);
}
function clearAll() {
  if (!confirm('Clear all weight entries?')) return;
  ENTRIES = {};
  localStorage.removeItem('gz-weight');
  renderAll();
}

function renderAll() { renderStats(); renderChart(); renderHistory(); }

function syncOpts() {
  $('#optUnit').value = CFG.unit;
  $('#optHeight').value = CFG.height || '';
  $('#optGoal').value = CFG.goal || '';
}

function renderRange() {
  const opts = [['7', t('range7')], ['30', t('range30')], ['90', t('range90')], ['all', t('rangeAll')]];
  $('#range').innerHTML = opts.map(([k,n]) => `<button data-r="${k}" class="${String(chartRange) === k ? 'active' : ''}">${n}</button>`).join('');
  document.querySelectorAll('#range button').forEach(b => {
    b.addEventListener('click', () => { chartRange = b.dataset.r === 'all' ? 'all' : +b.dataset.r; renderRange(); renderChart(); });
  });
}

// Labels
$('#lblDate').textContent = t('lblDate');
$('#lblWeight').textContent = t('lblWeight');
$('#btnAdd').textContent = t('add');
$('#lblUnit').textContent = t('lblUnit');
$('#lblHeight').textContent = t('lblHeight');
$('#lblGoal').textContent = t('lblGoal');
$('#statsTitle').textContent = t('statsTitle');
$('#historyTitle').textContent = t('historyTitle');
$('#btnJson').textContent = t('jsonBtn');
$('#btnCsv').textContent = t('csvBtn');
$('#btnClear').textContent = t('clearBtn');

$('#optHeight').addEventListener('input', e => { CFG.height = +e.target.value || 0; saveCfg(); renderStats(); });
$('#optGoal').addEventListener('input', e => { CFG.goal = +e.target.value || 0; saveCfg(); renderAll(); });
$('#btnJson').addEventListener('click', exportJson);
$('#btnCsv').addEventListener('click', exportCsv);
$('#btnClear').addEventListener('click', clearAll);
