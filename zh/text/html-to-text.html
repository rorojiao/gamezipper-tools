const { $, copyText, t } = GZ;

const BLOCK_TAGS = new Set(['P','DIV','SECTION','ARTICLE','HEADER','FOOTER','MAIN','ASIDE','H1','H2','H3','H4','H5','H6','LI','TR','BR','HR','BLOCKQUOTE','PRE','FIGURE','FIGCAPTION','TD','TH']);
const SKIP_TAGS = new Set(['SCRIPT','STYLE','NOSCRIPT','TEMPLATE','HEAD','META','LINK','TITLE']);

function walk(node, out, opts) {
  if (!node) return;
  node.childNodes.forEach(child => {
    if (child.nodeType === 3) { // text
      out.push(child.textContent);
    } else if (child.nodeType === 1) {
      const tag = child.tagName;
      if (SKIP_TAGS.has(tag)) return;
      if (tag === 'BR') { if (opts.breaks) out.push('\n'); return; }
      if (tag === 'HR') { if (opts.breaks) out.push('\n———————————\n'); return; }
      if (tag === 'IMG') {
        const alt = child.getAttribute('alt');
        if (alt && opts.breaks) out.push(` [${alt}] `);
        return;
      }
      if (tag === 'A' && opts.links) {
        const href = child.getAttribute('href');
        walk(child, out, opts);
        if (href) out.push(` (${href})`);
        return;
      }
      if ((tag === 'UL' || tag === 'OL') && opts.lists) {
        let i = 1;
        child.querySelectorAll(':scope > li').forEach(li => {
          const buf = [];
          walk(li, buf, opts);
          const text = buf.join('').trim();
          out.push((tag === 'OL' ? `${i}. ` : '• ') + text + '\n');
          i++;
        });
        out.push('\n');
        return;
      }
      if (tag === 'TABLE' && opts.tables) {
        renderTable(child, out, opts);
        out.push('\n');
        return;
      }
      // Recursive walk for other elements
      walk(child, out, opts);
      if (opts.breaks && BLOCK_TAGS.has(tag)) out.push('\n');
    }
  });
}

function renderTable(table, out, opts) {
  const rows = table.querySelectorAll('tr');
  const grid = [];
  rows.forEach(tr => {
    const row = [];
    tr.querySelectorAll('td,th').forEach(cell => {
      const buf = [];
      walk(cell, buf, opts);
      row.push(buf.join('').replace(/\s+/g, ' ').trim());
    });
    grid.push(row);
  });
  if (!grid.length) return;
  const colW = [];
  grid.forEach(r => r.forEach((c, i) => { colW[i] = Math.max(colW[i] || 0, c.length); }));
  grid.forEach((r, ri) => {
    out.push('| ' + r.map((c, i) => c.padEnd(colW[i] || 0)).join(' | ') + ' |\n');
    if (ri === 0) {
      out.push('| ' + colW.map(w => '-'.repeat(w || 0)).join(' | ') + ' |\n');
    }
  });
}

function convert() {
  const html = $('#input').value;
  const out = $('#output');
  const stats = $('#stats');
  if (!html.trim()) { out.textContent = ''; stats.innerHTML = ''; return; }
  const opts = {
    breaks: $('#optBreaks').checked,
    lists: $('#optLists').checked,
    tables: $('#optTables').checked,
    links: $('#optLinks').checked,
    trim: $('#optTrim').checked,
  };
  const doc = new DOMParser().parseFromString(html, 'text/html');
  // Use body if present, else the whole document
  const root = doc.body && doc.body.childNodes.length ? doc.body : doc.documentElement;
  const buf = [];
  walk(root, buf, opts);
  let text = buf.join('');
  // Decode common entities (DOMParser already does this for text nodes, but normalize nbsp)
  text = text.replace(/\u00a0/g, ' ');
  if (opts.trim) {
    text = text.split('\n').map(l => l.replace(/[ \t]+/g, ' ').trimEnd()).join('\n').replace(/\n{3,}/g, '\n\n').trim() + '\n';
  }
  out.textContent = text;
  const words = (text.match(/\S+/g) || []).length;
  stats.innerHTML = `<span><b>${words}</b> ${t('words')}</span><span><b>${text.length}</b> ${t('chars')}</span><span><b>${text.split('\n').length}</b> ${t('lines')}</span>`;
}
