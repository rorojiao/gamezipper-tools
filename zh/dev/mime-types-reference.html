<script>
GZI18n.register({
  en: {
    toolTitle: 'MIME Types Reference & Lookup',
    toolDesc: 'Searchable reference of common MIME types. Look up any file extension to find its MIME type, or search by type. Covers web, images, video, audio, docs, fonts. Free, instant, private.',
    thExt: 'Extension', thMime: 'MIME Type', thCat: 'Category',
    all: 'All', web: 'Web', image: 'Image', video: 'Video', audio: 'Audio', doc: 'Document', font: 'Font', archive: 'Archive', app: 'Application',
    searchPlaceholder: 'Search extension or MIME type...',
    step1: 'Type a file extension (e.g., "pdf") or MIME type in the search box',
    step2: 'Use category buttons to filter by web, image, video, audio, etc.',
    step3: 'Click any row to copy the MIME type to clipboard',
    step4: 'Reference covers 200+ common types for web development',
  },
  zh: {
    toolTitle: 'MIME 类型参考与查询',
    toolDesc: '可搜索的常见 MIME 类型参考表。通过文件扩展名查询 MIME 类型，或按类型搜索。涵盖 Web、图片、视频、音频、文档、字体。免费、即时、隐私安全。',
    thExt: '扩展名', thMime: 'MIME 类型', thCat: '类别',
    all: '全部', web: '网页', image: '图片', video: '视频', audio: '音频', doc: '文档', font: '字体', archive: '压缩包', app: '应用',
    searchPlaceholder: '搜索扩展名或 MIME 类型...',
    step1: '在搜索框中输入文件扩展名（如 "pdf"）或 MIME 类型',
    step2: '使用类别按钮按网页、图片、视频、音频等筛选',
    step3: '点击任意行将 MIME 类型复制到剪贴板',
    step4: '参考表涵盖 200+ 常见 Web 开发类型',
  }
});

const { $, t, copyText } = GZ;

const TYPES = [
  // Web
  ['.html','text/html','web'],['.htm','text/html','web'],['.css','text/css','web'],['.js','text/javascript','web'],
  ['.mjs','text/javascript','web'],['.json','application/json','web'],['.xml','application/xml','web'],['.txt','text/plain','web'],
  ['.csv','text/csv','web'],['.svg','image/svg+xml','web'],['.ico','image/x-icon','web'],['.woff','font/woff','web'],
  ['.woff2','font/woff2','web'],['.map','application/json','web'],['.webmanifest','application/manifest+json','web'],
  // Images
  ['.png','image/png','image'],['.jpg','image/jpeg','image'],['.jpeg','image/jpeg','image'],['.gif','image/gif','image'],
  ['.webp','image/webp','image'],['.bmp','image/bmp','image'],['.tiff','image/tiff','image'],['.avif','image/avif','image'],
  ['.heic','image/heic','image'],['.heif','image/heif','image'],['.psd','image/vnd.adobe.photoshop','image'],
  // Video
  ['.mp4','video/mp4','video'],['.webm','video/webm','video'],['.avi','video/x-msvideo','video'],['.mov','video/quicktime','video'],
  ['.mkv','video/x-matroska','video'],['.flv','video/x-flv','video'],['.wmv','video/x-ms-wmv','video'],['.m4v','video/x-m4v','video'],
  ['.mpeg','video/mpeg','video'],['.3gp','video/3gpp','video'],['.ogv','video/ogg','video'],
  // Audio
  ['.mp3','audio/mpeg','audio'],['.wav','audio/wav','audio'],['.ogg','audio/ogg','audio'],['.flac','audio/flac','audio'],
  ['.aac','audio/aac','audio'],['.m4a','audio/mp4','audio'],['.wma','audio/x-ms-wma','audio'],['.opus','audio/opus','audio'],
  ['.oga','audio/ogg','audio'],['.mid','audio/midi','audio'],['.midi','audio/midi','audio'],
  // Documents
  ['.pdf','application/pdf','doc'],['.doc','application/msword','doc'],['.docx','application/vnd.openxmlformats-officedocument.wordprocessingml.document','doc'],
  ['.xls','application/vnd.ms-excel','doc'],['.xlsx','application/vnd.openxmlformats-officedocument.spreadsheetml.sheet','doc'],
  ['.ppt','application/vnd.ms-powerpoint','doc'],['.pptx','application/vnd.openxmlformats-officedocument.presentationml.presentation','doc'],
  ['.odt','application/vnd.oasis.opendocument.text','doc'],['.ods','application/vnd.oasis.opendocument.spreadsheet','doc'],
  ['.odp','application/vnd.oasis.opendocument.presentation','doc'],['.rtf','application/rtf','doc'],['.pages','application/x-iwork-pages-sffpages','doc'],
  // Fonts
  ['.ttf','font/ttf','font'],['.otf','font/otf','font'],['.eot','application/vnd.ms-fontobject','font'],
  // Archives
  ['.zip','application/zip','archive'],['.gz','application/gzip','archive'],['.tar','application/x-tar','archive'],
  ['.rar','application/vnd.rar','archive'],['.7z','application/x-7z-compressed','archive'],['.bz2','application/x-bzip2','archive'],
  ['.xz','application/x-xz','archive'],
  // Application / other
  ['.exe','application/x-msdownload','app'],['.dmg','application/x-apple-diskimage','app'],['.deb','application/vnd.debian.binary-package','app'],
  ['.rpm','application/x-rpm','app'],['.apk','application/vnd.android.package-archive','app'],['.jar','application/java-archive','app'],
  ['.class','application/java-vm','app'],['.wasm','application/wasm','app'],['.bin','application/octet-stream','app'],
  ['.yaml','text/yaml','app'],['.yml','text/yaml','app'],['.toml','text/plain','app'],['.ini','text/plain','app'],
  ['.sh','application/x-sh','app'],['.py','text/x-python','app'],['.rb','text/x-ruby','app'],['.go','text/x-go','app'],
  ['.rs','text/rust','app'],['.java','text/x-java-source','app'],['.c','text/x-c','app'],['.cpp','text/x-c++','app'],
  ['.ts','text/typescript','app'],['.tsx','text/typescript','app'],['.jsx','text/javascript','app'],['.php','application/x-httpd-php','app'],
  ['.sql','application/sql','app'],['.graphql','application/graphql','app'],['.proto','text/x-protobuf','app'],
  ['.torrent','application/x-bittorrent','app'],['.ics','text/calendar','app'],['.vcf','text/vcard','app'],
  ['.epub','application/epub+zip','app'],['.mobi','application/x-mobipocket-ebook','app'],['.azw','application/vnd.amazon.ebook','app'],
];

const CAT_LIST = ['all','web','image','video','audio','doc','font','archive','app'];
let activeCat = 'all';

function render() {
  const q = $('#search').value.toLowerCase().trim();
  const filtered = TYPES.filter(([ext, mime, cat]) => {
    if (activeCat !== 'all' && cat !== activeCat) return false;
    if (!q) return true;
    return ext.includes(q) || mime.toLowerCase().includes(q) || cat.includes(q);
  });
  $('#body').innerHTML = filtered.map(([ext, mime, cat]) =>
    `<tr data-mime="${mime}"><td class="ext">${ext}</td><td class="mime">${mime}</td><td class="cat">${t(cat)}</td></tr>`
  ).join('');
  $('#count').textContent = `${filtered.length} / ${TYPES.length} types`;

  $('#body').querySelectorAll('tr').forEach(tr => {
    tr.onclick = () => { copyText(tr.dataset.mime); };
  });
}

// Labels
$('#th-ext').textContent = t('thExt');
$('#th-mime').textContent = t('thMime');
$('#th-cat').textContent = t('thCat');
$('#search').placeholder = t('searchPlaceholder');

// Category buttons
$('#cats').innerHTML = CAT_LIST.map(c => `<button data-cat="${c}" class="${c==='all'?'active':''}">${t(c)}</button>`).join('');
$('#cats').querySelectorAll('button').forEach(btn => {
  btn.onclick = () => {
    activeCat = btn.dataset.cat;
    $('#cats').querySelectorAll('button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  };
});

$('#search').addEventListener('input', render);
render();

GZ.renderToolPage({
  category: 'dev',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📋', href:'/dev/http-status-codes.html', name:'HTTP Status Codes'},
    {icon:'🏷️', href:'/dev/cache-control-parser.html', name:'Cache-Control'},
    {icon:'🌐', href:'/dev/accept-language-parser.html', name:'Accept-Language'},
    {icon:'📄', href:'/dev/changelog-generator.html', name:'Changelog Gen'},
  ]
});
</script>
