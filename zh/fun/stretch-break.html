<script>
GZI18n.register({
  en: {
    toolTitle: 'Stretch Break Timer',
    toolDesc: 'Free eye-rest and stretch break reminder. Follow the 20-20-20 rule for screen fatigue, and stand up regularly to ease neck and back strain.',
    start: 'Start',
    pause: 'Pause',
    reset: 'Reset',
    work: 'Time until break',
    eyes: 'Look 20 ft away',
    move: 'Stand up & stretch',
    eyeTitle: 'Look 20 feet away 👀',
    eyeSub: 'Every 20 min, look at something 20 ft (6 m) away for 20 seconds to relax your eyes.',
    moveTitle: 'Stand up & stretch 🧍',
    moveSub: 'Roll your shoulders, stretch your neck and walk around for a minute.',
    skip: 'Skip break',
    tipsH: 'Healthy screen habits',
    tip1: 'Keep screen about an arm\u2019s length away, top at eye level',
    tip2: 'Blink often — screens make us blink up to 60% less',
    tip3: 'Adjust lighting to avoid glare on your screen',
    step1: 'Pick an interval (20 min eyes, 30 min move, etc.)',
    step2: 'Press Start and keep working normally',
    step3: 'When the chime sounds, take the short break',
    step4: 'Press Skip to resume when you are ready',
  },
  zh: {
    toolTitle: '拉伸休息定时器',
    toolDesc: '免费的眼部休息和拉伸提醒工具。遵循 20-20-20 法则缓解屏幕疲劳，定时起身活动以减轻颈背压力。',
    start: '开始',
    pause: '暂停',
    reset: '重置',
    work: '距下次休息',
    eyes: '看 6 米外',
    move: '起身拉伸',
    eyeTitle: '看 20 英尺外 👀',
    eyeSub: '每 20 分钟，看 6 米外的物体 20 秒，让眼睛放松。',
    moveTitle: '站起来拉伸 🧍',
    moveSub: '转动肩膀、伸展脖子，起来走动一分钟。',
    skip: '跳过休息',
    tipsH: '健康用屏习惯',
    tip1: '屏幕保持一臂距离，顶部与视线平齐',
    tip2: '多眨眼 — 看屏幕时眨眼次数可减少 60%',
    tip3: '调整光线，避免屏幕反光',
    step1: '选择提醒间隔（20 分钟护眼、30 分钟活动等）',
    step2: '点击「开始」，正常工作即可',
    step3: '听到提示音时，进行短暂休息',
    step4: '休息完毕点击「跳过」继续',
  }
});

const { $, t } = GZ;

// interval presets: {min, kind:'eyes'|'move', emoji}
const PRESETS = [
  {min:20, kind:'eyes', emoji:'👀', en:'20 min · Eyes', zh:'20 分 · 护眼'},
  {min:30, kind:'move', emoji:'🧍', en:'30 min · Move', zh:'30 分 · 活动'},
  {min:45, kind:'move', emoji:'🧍', en:'45 min · Move', zh:'45 分 · 活动'},
  {min:60, kind:'move', emoji:'🧍', en:'60 min · Move', zh:'60 分 · 活动'},
];

let presetIdx = 1;       // default 30 min move
let running = false;
let remain = PRESETS[presetIdx].min * 60;
let cycleLen = remain;
let timer = null;
let breakActive = false;
let breakRemain = 0;
const BREAK_SECS = 20;   // 20s eyes / can be reused
const MOVE_BREAK = 60;   // 60s move

const RING_C = 2 * Math.PI * 52; // 326.7

function fmt(s){ const m=Math.floor(s/60); const ss=s%60; return m+':'+String(ss).padStart(2,'0'); }

function buildPreset(){
  const lang = GZI18n.getLang();
  $('#preset').innerHTML = PRESETS.map((p,i)=>`<button class="${i===presetIdx?'active':''}" data-i="${i}">${lang==='zh'?p.zh:p.en}</button>`).join('');
  $('#preset').querySelectorAll('button').forEach(b=>b.onclick=()=>{
    if(running) return;
    presetIdx = +b.dataset.i;
    remain = PRESETS[presetIdx].min*60; cycleLen = remain;
    buildPreset(); renderRing(); renderLbl();
  });
}

function renderRing(){
  const frac = breakActive ? (breakRemain/ (PRESETS[presetIdx].kind==='move'?MOVE_BREAK:BREAK_SECS)) : (remain/cycleLen);
  $('#fillArc').setAttribute('stroke-dashoffset', RING_C*(1-frac));
  $('#big').textContent = breakActive ? fmt(breakRemain) : fmt(remain);
}

function renderLbl(){
  $('#lbl').textContent = breakActive
    ? (PRESETS[presetIdx].kind==='eyes'? t('eyes') : t('move'))
    : t('work');
}

function chime(){
  try {
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.type='sine'; o.frequency.value=880;
    g.gain.setValueAtTime(0.0001, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.3, ctx.currentTime+0.05);
    g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime+0.8);
    o.start(); o.stop(ctx.currentTime+0.85);
  } catch(e){}
}

function showBreak(){
  breakActive = true;
  const k = PRESETS[presetIdx].kind;
  breakRemain = k==='move' ? MOVE_BREAK : BREAK_SECS;
  const card = $('#nowCard');
  card.classList.add('show');
  $('#nowEmoji').textContent = k==='eyes' ? '👀' : '🧍';
  $('#nowTitle').textContent = k==='eyes' ? t('eyeTitle') : t('moveTitle');
  $('#nowSub').textContent = k==='eyes' ? t('eyeSub') : t('moveSub');
  renderRing(); renderLbl();
  document.title = '⏰ ' + (k==='eyes'?t('eyes'):t('move')) + ' — GameZipper Tools';
  chime();
}

function hideBreak(){
  breakActive = false;
  $('#nowCard').classList.remove('show');
  document.title = 'Stretch Break Timer | GameZipper Tools';
}

function tick(){
  if (breakActive){
    breakRemain--;
    if (breakRemain <= 0){
      hideBreak();
      remain = cycleLen;
    }
  } else {
    remain--;
    if (remain <= 0){ showBreak(); }
  }
  renderRing(); renderLbl();
}

function start(){
  if(running) return;
  running = true;
  $('#goBtn').textContent = t('pause');
  timer = setInterval(tick, 1000);
}
function pause(){
  running = false;
  $('#goBtn').textContent = t('start');
  if(timer){clearInterval(timer);timer=null;}
}
function reset(){
  pause(); hideBreak();
  remain = PRESETS[presetIdx].min*60; cycleLen=remain;
  renderRing(); renderLbl();
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" id="goBtn">${t('start')}</button>
  <button class="gz-btn gz-btn-secondary" id="skipBtn">${t('skip')}</button>
  <button class="gz-btn gz-btn-secondary" id="resetBtn">${t('reset')}</button>
`;
$('#goBtn').onclick = ()=> running? pause(): start();
$('#skipBtn').onclick = ()=>{ if(breakActive){ hideBreak(); remain=cycleLen; renderRing(); renderLbl(); } };
$('#resetBtn').onclick = reset;
$('#tipsH').textContent = t('tipsH');
$('#tipsUL').innerHTML = ['tip1','tip2','tip3'].map(k=>`<li>${t(k)}</li>`).join('');

buildPreset();
reset();

GZ.renderToolPage({
  category: 'fun',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🧘', href:'/fun/box-breathing.html', name:'Box Breathing'},
    {icon:'🍅', href:'/calc/pomodoro.html', name:'Pomodoro Timer'},
    {icon:'🎵', href:'/fun/white-noise.html', name:'White Noise'},
    {icon:'⏱️', href:'/calc/timer-stopwatch.html', name:'Timer'},
  ]
});
</script>

</body>
