<style>
.ag-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:14px}
@media(max-width:640px){.ag-grid{grid-template-columns:1fr}}
.ag-field{background:var(--glass2);border:1px solid var(--border);border-radius:12px;padding:14px}
.ag-field label{display:block;font-size:.85em;color:var(--text2);margin-bottom:6px}
.ag-field textarea{width:100%;min-height:120px;background:rgba(0,0,0,.3);border:1px solid var(--border);border-radius:8px;padding:10px;color:var(--text);font-size:1em;font-family:monospace;resize:vertical}
.ag-field textarea:focus{outline:none;border-color:var(--accent)}
.ag-options{display:flex;flex-wrap:wrap;gap:10px;margin:14px 0;padding:10px;background:var(--glass2);border:1px solid var(--border);border-radius:10px}
.ag-options label{display:flex;align-items:center;gap:6px;font-size:.88em;cursor:pointer;color:var(--text2)}
.ag-options input[type=checkbox]{accent-color:var(--accent);width:16px;height:16px}
.verdict{text-align:center;padding:20px;background:var(--glass);border:1px solid var(--border);border-radius:14px;margin:14px 0}
.verdict .icon{font-size:3rem;line-height:1;margin-bottom:8px}
.verdict h2{margin:0;font-size:1.4rem}
.verdict.match{background:rgba(0,214,114,.1);border-color:rgba(0,214,114,.4);color:var(--gz-success)}
.verdict.nomatch{background:rgba(233,69,96,.1);border-color:rgba(233,69,96,.4);color:#e94560}
.verdict.empty{background:rgba(255,217,61,.1);border-color:rgba(255,217,61,.4);color:#ffd93d}
.char-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:14px}
@media(max-width:640px){.char-grid{grid-template-columns:1fr}}
.char-card{background:var(--glass2);border:1px solid var(--border);border-radius:10px;padding:12px}
.char-card h4{margin:0 0 8px;font-size:.9rem;color:var(--text2)}
.char-pills{display:flex;flex-wrap:wrap;gap:4px;max-height:200px;overflow:auto}
.char-pill{background:rgba(0,0,0,.3);border:1px solid var(--border);border-radius:6px;padding:4px 8px;font-family:monospace;font-size:.9em}
.char-pill.a{background:rgba(0,214,114,.15);border-color:rgba(0,214,114,.3);color:var(--gz-success)}
.char-pill.b{background:rgba(0,198,251,.15);border-color:rgba(0,198,251,.3);color:#4ecdc4}
.char-pill.diff{background:rgba(233,69,96,.15);border-color:rgba(233,69,96,.3);color:#e94560}
</style>
<script type="application/ld+json">{"@context":"https://schema.org","@type":"WebApplication","name":"Anagram Checker","description":"Free online anagram checker. Find out if two words or phrases are anagrams of each other instantly. Supports case toggle, ignores spaces, punctuation and accents.","url": "https://tools.gamezipper.com/zh/text/anagram-checker.html","applicationCategory":"Utility","operatingSystem":"Web Browser","offers":{"@type":"Offer","price":"0"}}</script>
<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is an anagram?", "acceptedAnswer": {"@type": "Answer", "text": "An anagram is a word or phrase formed by rearranging the letters of another word or phrase, using all original letters exactly once. For example, 'listen' and 'silent' are anagrams."}}, {"@type": "Question", "name": "How does the anagram checker work?", "acceptedAnswer": {"@type": "Answer", "text": "The tool normalizes both inputs (case, accents, spaces, punctuation removed) and then compares the character counts. If both inputs have the same letters with the same frequencies, they are anagrams."}}, {"@type": "Question", "name": "What if I include spaces or punctuation?", "acceptedAnswer": {"@type": "Answer", "text": "By default the tool ignores spaces, hyphens, punctuation and accents. You can also choose to count each character literally for stricter comparison. The character breakdown at the bottom shows exactly how each letter is distributed."}}, {"@type": "Question", "name": "Is an anagram case sensitive?", "acceptedAnswer": {"@type": "Answer", "text": "By default the comparison is case-insensitive. Uncheck the 'ignore case' option if you want to treat 'A' and 'a' as distinct characters."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>

    <div class="ag-grid">
      <div class="ag-field">
        <label id="lblA">Word / Phrase A</label>
        <textarea id="textA" placeholder="listen" spellcheck="false">listen</textarea>
      </div>
      <div class="ag-field">
        <label id="lblB">Word / Phrase B</label>
        <textarea id="textB" placeholder="silent" spellcheck="false">silent</textarea>
      </div>
    </div>

    <div class="ag-options">
      <label><input type="checkbox" id="optCase" checked> <span id="lblCase">Ignore case</span></label>
      <label><input type="checkbox" id="optSpace" checked> <span id="lblSpace">Ignore spaces, punctuation &amp; hyphens</span></label>
      <label><input type="checkbox" id="optAccent" checked> <span id="lblAccent">Strip accents (é → e)</span></label>
      <label><input type="checkbox" id="optNum" checked> <span id="lblNum">Ignore digits</span></label>
    </div>

    <div class="verdict" id="verdict">
      <div class="icon">⏳</div>
      <h2 id="verdictText">—</h2>
    </div>

    <div class="char-grid">
      <div class="char-card">
        <h4 id="lblCharsA">📋 Letter frequency (A)</h4>
        <div class="char-pills" id="freqA"></div>
      </div>
      <div class="char-card">
        <h4 id="lblCharsB">📋 Letter frequency (B)</h4>
        <div class="char-pills" id="freqB"></div>
      </div>
    </div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en:{toolTitle:'Anagram Checker',toolDesc:'Find out if two words or phrases are anagrams of each other. Shows letter frequency and ignores spaces, case, accents and punctuation by default.',
    step1:'Type or paste the first word/phrase in box A',step2:'Type the second word/phrase in box B',step3:'Toggle options (case, spaces, accents, digits) to fine-tune the comparison',step4:'Read the verdict and see the letter-by-letter breakdown at the bottom',
    lblA:'Word / Phrase A',lblB:'Word / Phrase B',
    lblCase:'Ignore case',lblSpace:'Ignore spaces, punctuation &amp; hyphens',lblAccent:'Strip accents (é → e)',lblNum:'Ignore digits',
    lblCharsA:'📋 Letter frequency (A)',lblCharsB:'📋 Letter frequency (B)',
    yesMatch:'✓ Anagrams!',noMatch:'✗ Not anagrams',empty:'Type something in both boxes',swap:'⇅ Swap A and B',clear:'Clear',example:'Load example',
    swListen:'listen',swSilent:'silent',
    swA1:'astronomer',swA2:'moon starer',swD1:'hello',swD2:'world'},
  zh:{toolTitle:'字母异序词检查器',toolDesc:'检测两个单词或短语是否为字母异序词（anagram）。默认忽略空格、大小写、变音符号和标点，显示逐字符频次对比。',
    step1:'在 A 框输入或粘贴第一个单词/短语',step2:'在 B 框输入第二个单词/短语',step3:'按需切换选项（大小写、空格、变音符号、数字）',step4:'查看判定结果和底部逐字符的频率对比',
    lblA:'单词 / 短语 A',lblB:'单词 / 短语 B',
    lblCase:'忽略大小写',lblSpace:'忽略空格、标点 &amp; 连字符',lblAccent:'去掉变音符号 (é → e)',lblNum:'忽略数字',
    lblCharsA:'📋 字符频率 (A)',lblCharsB:'📋 字符频率 (B)',
    yesMatch:'✓ 是字母异序词！',noMatch:'✗ 不是字母异序词',empty:'请在两个框中输入内容',swap:'⇅ 交换 A 和 B',clear:'清空',example:'加载示例',
    swListen:'倾听',swSilent:'安静',
    swA1:'天文学家',swA2:'月亮凝视者',swD1:'你好',swD2:'世界'}
});

const {$,t}=GZ;

function normalize(s){
  if(!s) return '';
  let n=s;
  if($('#optCase').checked) n=n.toLowerCase();
  if($('#optAccent').checked) n=n.normalize('NFD').replace(/[\u0300-\u036f]/g,'');
  if($('#optNum').checked) n=n.replace(/[0-9]/g,'');
  if($('#optSpace').checked) n=n.replace(/[\s\W_-]/g,'');
  return n;
}

function frequency(s){
  const f={};
  for(const c of s) f[c]=(f[c]||0)+1;
  return f;
}

function compare(){
  const rawA=$('#textA').value, rawB=$('#textB').value;
  const normA=normalize(rawA), normB=normalize(rawB);
  const v=$('#verdict'); v.className='verdict';
  if(!normA||!normB){
    v.classList.add('empty');
    v.innerHTML=`<div class="icon">⏳</div><h2>${t('empty')}</h2>`;
    $('#freqA').innerHTML=''; $('#freqB').innerHTML='';
    return;
  }
  const fA=frequency(normA), fB=frequency(normB);
  const isMatch=normA.length===normB.length && Object.keys(fA).length===Object.keys(fB).length && Object.keys(fA).every(c=>fA[c]===fB[c]);
  if(isMatch){
    v.classList.add('match');
    v.innerHTML=`<div class="icon">✅</div><h2>${t('yesMatch')}</h2>`;
  } else {
    v.classList.add('nomatch');
    v.innerHTML=`<div class="icon">❌</div><h2>${t('noMatch')}</h2>`;
  }
  renderFreq('A',fA,fB);
  renderFreq('B',fB,fA);
}

function renderFreq(which, f, other){
  const el=$('#freq'+which); el.innerHTML='';
  const keys=Object.keys(f).sort();
  for(const k of keys){
    const c=f[k];
    const oc=other[k]||0;
    let cls='char-pill '+which.toLowerCase();
    if(oc===0) cls+=' diff';
    const span=document.createElement('span');
    span.className=cls;
    span.textContent=`${k}×${c}`;
    if(oc>0&&oc!==c) span.title=`other side has ${k}×${oc}`;
    el.appendChild(span);
  }
}

$('#textA').addEventListener('input',compare);
$('#textB').addEventListener('input',compare);
['optCase','optSpace','optAccent','optNum'].forEach(id=>$('#'+id).addEventListener('change',compare));

$('#toolbar').innerHTML=`
  <button class="gz-btn" onclick="const a=$('#textA').value;$('#textA').value=$('#textB').value;$('#textB').value=a;compare()">${t('swap')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#textA').value=t('swListen');$('#textB').value=t('swSilent');compare()">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#textA').value='';$('#textB').value='';compare()">${t('clear')}</button>`;

GZ.renderToolPage({
  category:'text',
  titleKey:'toolTitle',descKey:'toolDesc',
  howToSteps:['step1','step2','step3','step4'],
  related:[
    {icon:'🔤',href:'/text/anagram-solver.html',name:'Anagram Solver'},
    {icon:'🪞',href:'/text/palindrome-checker.html',name:'Palindrome Checker'},
    {icon:'🔁',href:'/text/flip-text.html',name:'Flip Text'},
    {icon:'✨',href:'/text/fancy-text.html',name:'Fancy Text'}
  ]
});
compare();
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
