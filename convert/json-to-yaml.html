const { $, copyText, t } = GZ;
let mode = 'json2yaml'; // or 'yaml2json'

// --- JSON to YAML ---
function jsonToYaml(obj, indent = 0) {
  const pad = '  '.repeat(indent);
  if (obj === null) return 'null';
  if (obj === undefined) return 'null';
  if (typeof obj === 'boolean') return obj ? 'true' : 'false';
  if (typeof obj === 'number') return String(obj);
  if (typeof obj === 'string') return formatYamlString(obj);
  if (Array.isArray(obj)) {
    if (obj.length === 0) return '[]';
    return obj.map(item => {
      const val = jsonToYaml(item, indent + 1);
      if (val.includes('\n')) {
        const lines = val.split('\n');
        return `${pad}- ${lines[0]}\n${lines.slice(1).map(l => '  ' + l).join('\n')}`;
      }
      return `${pad}- ${val}`;
    }).join('\n');
  }
  if (typeof obj === 'object') {
    const keys = Object.keys(obj);
    if (keys.length === 0) return '{}';
    return keys.map(key => {
      const val = obj[key];
      const k = /^[a-zA-Z0-9_-]+$/.test(key) ? key : JSON.stringify(key);
      if (val === null) return `${pad}${k}: null`;
      if (typeof val === 'object') {
        const nested = jsonToYaml(val, indent + 1);
        if (nested === '{}' || nested === '[]') return `${pad}${k}: ${nested}`;
        return `${pad}${k}:\n${nested}`;
      }
      return `${pad}${k}: ${jsonToYaml(val, indent + 1)}`;
    }).join('\n');
  }
  return String(obj);
}

function formatYamlString(s) {
  if (s === '') return '""';
  if (/[:\#{}\[\],&*?|<>=!%@`"'#\n]/.test(s)) return JSON.stringify(s);
  if (/^\s|\s$/.test(s)) return JSON.stringify(s);
  if (/^(true|false|null|yes|no|on|off|~)$/i.test(s)) return JSON.stringify(s);
  if (/^\d+$/.test(s)) return JSON.stringify(s);
  return s;
}

// --- YAML to JSON (simplified parser) ---
function yamlToJson(yamlText) {
  const lines = yamlText.split('\n').filter(l => l.trim() && !l.trim().startsWith('#'));
  let idx = 0;

  function getIndent(line) { return line.match(/^ */)[0].length; }

  function parseValue(val) {
    val = val.trim();
    if (val === '' || val === '~' || val.toLowerCase() === 'null') return null;
    if (val === 'true' || val === 'yes') return true;
    if (val === 'false' || val === 'no') return false;
    if (val.startsWith('"') && val.endsWith('"')) return JSON.parse(val);
    if (val.startsWith("'") && val.endsWith("'")) return val.slice(1, -1);
    if (/^-?\d+$/.test(val)) return parseInt(val);
    if (/^-?\d+\.\d+$/.test(val)) return parseFloat(val);
    if (val.startsWith('[') && val.endsWith(']')) {
      try { return JSON.parse(val); } catch(e) {}
    }
    return val;
  }

  function parseBlock(baseIndent) {
    const result = {};
    const arr = [];
    let isArray = false;

    while (idx < lines.length) {
      const line = lines[idx];
      const indent = getIndent(line);
      if (indent < baseIndent) break;

      if (indent === baseIndent) {
        const trimmed = line.trim();
        if (trimmed.startsWith('- ')) {
          isArray = true;
          const val = trimmed.slice(2);
          if (val.includes(':')) {
            // inline object
            const obj = {};
            const m = val.match(/^(\w+):\s*(.*)$/);
            if (m) {
              obj[m[1]] = m[2] ? parseValue(m[2]) : null;
              idx++;
              const sub = parseBlock(indent + 2);
              Object.assign(obj, sub);
              arr.push(obj);
            } else {
              arr.push(parseValue(val));
              idx++;
            }
          } else if (val === '') {
            idx++;
            const sub = parseBlock(indent + 2);
            arr.push(typeof sub === 'object' && !Array.isArray(sub) && Object.keys(sub).length === 0 ? null : sub);
          } else {
            arr.push(parseValue(val));
            idx++;
          }
        } else if (trimmed.startsWith('-')) {
          isArray = true;
          idx++;
          const sub = parseBlock(indent + 2);
          arr.push(sub);
        } else {
          const colonIdx = trimmed.indexOf(':');
          if (colonIdx === -1) { idx++; break; }
          const key = trimmed.substring(0, colonIdx).trim().replace(/^["']|["']$/g, '');
          const valStr = trimmed.substring(colonIdx + 1).trim();
          if (valStr === '' || valStr === '|') {
            idx++;
            const sub = parseBlock(indent + 2);
            result[key] = sub;
          } else {
            result[key] = parseValue(valStr);
            idx++;
          }
        }
      } else {
        break;
      }
    }
    return isArray ? arr : result;
  }

  return parseBlock(getIndent(lines[0] || ''));
}

function convert() {
  const input = $('#input').value.trim();
  if (!input) { $('#output').textContent = ''; $('#status').innerHTML = ''; return; }

  if (mode === 'json2yaml') {
    try {
      const obj = JSON.parse(input);
      const yaml = jsonToYaml(obj);
      $('#output').textContent = yaml;
      $('#status').innerHTML = `<span class="ok">${t('validJson')}</span>`;
    } catch(e) {
      $('#status').innerHTML = `<span class="err">${t('invalidJson')}: ${e.message}</span>`;
      $('#output').textContent = '';
    }
  } else {
    try {
      const obj = yamlToJson(input);
      const json = JSON.stringify(obj, null, 2);
      $('#output').textContent = json;
      $('#status').innerHTML = `<span class="ok">${t('validYaml')}</span>`;
    } catch(e) {
      $('#status').innerHTML = `<span class="err">${t('invalidYaml')}: ${e.message}</span>`;
      $('#output').textContent = '';
    }
  }
}

function setMode(m) {
  mode = m;

  $('#lbl-out').textContent = m === 'json2yaml' ? t('outputYaml') : t('outputJson');
  convert();
}
