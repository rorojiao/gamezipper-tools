const { $, copyText, t } = GZ;

function escapeLatexText(s) {
  return String(s)
    .replace(/\\/g, '\\textbackslash{}')
    .replace(/([&%$#_{}])/g, '\\$1')
    .replace(/~/g, '\\textasciitilde{}')
    .replace(/\^/g, '\\textasciicircum{}');
}

function escapeVerb(s) {
  return String(s).replace(/([&%$#_{}^~\\])/g, '$1');
}

function parseInline(text) {
  // Strategy: transform each markdown construct into ready LaTeX, stashing the
  // generated LaTeX command so the final escapeLatexText pass only touches
  // literal text and never corrupts the commands we just built.
  const stash = [];
  const keep = s => { stash.push(s); return `\x00${stash.length - 1}\x00`; };

  // 1. Inline code — escape content, wrap in \texttt
  text = text.replace(/`([^`]+)`/g, (_, c) => keep(`\\texttt{${escapeLatexText(c)}}`));
  // 2. Inline math — passthrough (LaTeX math mode), do NOT escape
  text = text.replace(/\$([^$]+)\$/g, (_, m) => keep(`$${m}$`));
  // 3. Images ![alt](url)
  text = text.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, (_, alt, url) =>
    keep(`\\includegraphics[width=0.7\\linewidth]{${url}}`));
  // 4. Links [text](url) — recursively process the label so nested bold/code works
  text = text.replace(/\[([^\]]+)\]\(([^)]+)\)/g, (_, label, url) =>
    keep(`\\href{${url}}{${parseInline(label)}}`));
  // 5. Bold / italic / strikethrough — loop to handle nesting, escape inner content
  let prev;
  do {
    prev = text;
    text = text.replace(/\*\*([^*]+)\*\*/g, (_, c) => keep(`\\textbf{${escapeLatexText(c)}}`));
    text = text.replace(/__([^_]+)__/g, (_, c) => keep(`\\textbf{${escapeLatexText(c)}}`));
    text = text.replace(/\*([^*]+)\*/g, (_, c) => keep(`\\textit{${escapeLatexText(c)}}`));
    text = text.replace(/(?<!\w)_([^_]+)_(?!\w)/g, (_, c) => keep(`\\textit{${escapeLatexText(c)}}`));
    text = text.replace(/~~([^~]+)~~/g, (_, c) => keep(`\\sout{${escapeLatexText(c)}}`));
  } while (text !== prev);
  // 6. Escape the remaining literal text (placeholders contain no special chars)
  text = escapeLatexText(text);
  // 7. Restore stashed LaTeX commands
  text = text.replace(/\x00(\d+)\x00/g, (_, i) => stash[+i]);
  return text;
}

function convertTable(lines, startIdx) {
  // lines[startIdx] = header, startIdx+1 = alignment, then data
  const header = lines[startIdx].split('|').map(c => c.trim()).filter((_, i, a) => !(i === 0 && a[0] === '') && !(i === a.length - 1 && a[a.length - 1] === ''));
  const alignRow = lines[startIdx + 1].split('|').map(c => c.trim());
  const ncols = header.length;
  const aligns = [];
  for (let i = 0; i < ncols; i++) {
    const cell = alignRow[i] || '';
    const l = cell.startsWith(':'), r = cell.endsWith(':');
    aligns.push(l && r ? 'c' : r ? 'r' : 'l');
  }
  const rows = [header];
  let i = startIdx + 2;
  while (i < lines.length && lines[i].includes('|')) {
    const cells = lines[i].split('|').filter((_, idx, arr) => !(idx === 0 && arr[0] === '') && !(idx === arr.length - 1 && arr[arr.length - 1] === '')).map(c => c.trim());
    while (cells.length < ncols) cells.push('');
    rows.push(cells.slice(0, ncols));
    i++;
  }
  const out = [];
  out.push('\\begin{tabular}{' + aligns.join(' ') + '}');
  out.push('\\hline');
  out.push(rows[0].map(parseInline).join(' & ') + ' \\\\');
  out.push('\\hline');
  for (let r = 1; r < rows.length; r++) out.push(rows[r].map(parseInline).join(' & ') + ' \\\\');
  out.push('\\hline');
  out.push('\\end{tabular}');
  return { latex: out.join('\n'), nextIdx: i };
}

function convert() {
  const inp = $('#input').value;
  if (!inp.trim()) { $('#output').innerHTML = ''; $('#status').innerHTML = ''; return; }
  try {
    const useWrap = $('#docWrap').value === 'full';
    const codeStyle = $('#codeStyle').value; // verbatim | listings
    const lines = inp.replace(/\r\n/g, '\n').split('\n');
    const out = [];
    let i = 0;
    let inUl = false, inOl = false;

    function closeLists() {
      if (inUl) { out.push('\\end{itemize}'); inUl = false; }
      if (inOl) { out.push('\\end{enumerate}'); inOl = false; }
    }

    while (i < lines.length) {
      let line = lines[i];

      // Fenced code block
      const fence = line.match(/^```(\w*)\s*$/);
      if (fence) {
        closeLists();
        const lang = fence[1];
        i++;
        const buf = [];
        while (i < lines.length && !lines[i].match(/^```\s*$/)) { buf.push(lines[i]); i++; }
        i++; // skip closing fence
        if (codeStyle === 'listings') {
          out.push(`\\begin{lstlisting}${lang ? `[language=${lang}]` : ''}`);
          out.push(...buf);
          out.push('\\end{lstlisting}');
        } else {
          out.push('\\begin{verbatim}');
          out.push(...buf);
          out.push('\\end{verbatim}');
        }
        continue;
      }

      // ATX heading
      const h = line.match(/^(#{1,6})\s+(.*)$/);
      if (h) {
        closeLists();
        const lvl = h[1].length;
        const cmd = lvl === 1 ? 'section' : lvl === 2 ? 'subsection' : lvl === 3 ? 'subsubsection' : lvl === 4 ? 'paragraph' : 'subparagraph';
        out.push(`\\${cmd}{${parseInline(h[2])}}`);
        i++; continue;
      }

      // Horizontal rule
      if (/^(-{3,}|\*{3,}|_{3,})\s*$/.test(line)) {
        closeLists();
        out.push('\\noindent\\rule{\\linewidth}{0.4pt}');
        i++; continue;
      }

      // Blockquote
      const bq = line.match(/^>\s?(.*)$/);
      if (bq) {
        closeLists();
        const buf = [bq[1]];
        i++;
        while (i < lines.length && /^>\s?/.test(lines[i])) { buf.push(lines[i].replace(/^>\s?/, '')); i++; }
        out.push('\\begin{quote}');
        out.push(parseInline(buf.join(' ')));
        out.push('\\end{quote}');
        continue;
      }

      // Table (header + alignment row)
      if (line.includes('|') && i + 1 < lines.length && /^\s*\|?[\s:|-]+\|?\s*$/.test(lines[i + 1]) && lines[i + 1].includes('-')) {
        closeLists();
        const { latex, nextIdx } = convertTable(lines, i);
        out.push(latex);
        i = nextIdx;
        continue;
      }

      // Unordered list
      const ul = line.match(/^(\s*)[-*+]\s+(.*)$/);
      if (ul) {
        if (inOl) { out.push('\\end{enumerate}'); inOl = false; }
        if (!inUl) { out.push('\\begin{itemize}'); inUl = true; }
        out.push('  \\item ' + parseInline(ul[2]));
        i++; continue;
      }
      // Ordered list
      const ol = line.match(/^(\s*)(\d+)\.\s+(.*)$/);
      if (ol) {
        if (inUl) { out.push('\\end{itemize}'); inUl = false; }
        if (!inOl) { out.push('\\begin{enumerate}'); inOl = true; }
        out.push('  \\item ' + parseInline(ol[3]));
        i++; continue;
      }

      // Blank line
      if (line.trim() === '') { closeLists(); i++; continue; }

      // Paragraph
      closeLists();
      const para = [line];
      i++;
      while (i < lines.length && lines[i].trim() !== '' &&
        !lines[i].match(/^#{1,6}\s/) && !lines[i].match(/^```/) &&
        !lines[i].match(/^>\s?/) && !lines[i].match(/^\s*[-*+]\s/) &&
        !lines[i].match(/^\s*\d+\.\s/) && !/^(-{3,}|\*{3,}|_{3,})\s*$/.test(lines[i])) {
        para.push(lines[i]); i++;
      }
      out.push(parseInline(para.join(' ')));
      out.push('');
    }
    closeLists();

    let latex;
    if (useWrap) {
      const preamble = ['\\documentclass{article}',
        '\\usepackage[utf8]{inputenc}',
        '\\usepackage{hyperref}',
        '\\usepackage{graphicx}',
        '\\usepackage{ulem}'];
      if (codeStyle === 'listings') preamble.push('\\usepackage{listings}');
      latex = preamble.join('\n') + '\n\\begin{document}\n\n' + out.join('\n') + '\n\n\\end{document}';
    } else {
      latex = out.join('\n');
    }
    $('#output').textContent = latex;
    $('#status').innerHTML = `<span style="color:var(--gz-success)">${t('valid')}</span>`;
  } catch (e) {
    $('#status').innerHTML = `<span style="color:var(--gz-accent)">✗ ${e.message}</span>`;
    $('#output').innerHTML = `<span style="color:var(--gz-accent)">${e.message}</span>`;
  }
}
