function escapeHtml(s){if(s==null)return'';return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

function renderList(filter) {
  const list = $('#tpl-list');
  const f = (filter || '').toLowerCase().trim();
  const grouped = {};
  Object.keys(TEMPLATES).forEach(name => {
    if (f && !name.toLowerCase().includes(f)) return;
    const cat = TEMPLATE_CATEGORY[name] || 'Other';
    if (!grouped[cat]) grouped[cat] = [];
    grouped[cat].push(name);
  });
  let html = '';
  for (const cat of CATEGORY_ORDER) {
    if (!grouped[cat] || !grouped[cat].length) continue;
    html += `<div class="cat-header">${escapeHtml(cat)}</div>`;
    grouped[cat].forEach(name => {
      const isSel = selected.has(name);
      html += `<label class="tpl-item ${isSel?'selected':''}"><input type="checkbox" ${isSel?'checked':''} onchange="toggleTpl('${escapeHtml(name)}', this.checked)"><span>${escapeHtml(name)}</span><span class="cat">${isSel?'✓':''}</span></label>`;
    });
  }
  if (!html) html = '<div style="padding:14px;text-align:center;color:var(--text3)">No templates match your search</div>';
  list.innerHTML = html;
}

function toggleTpl(name, on) {
  if (on) selected.add(name); else selected.delete(name);
  renderList($('#search').value);
  renderOutput();
}

function renderOutput() {
  const sel = Array.from(selected);
  let combined = '# Generated .gitignore — https://tools.gamezipper.com/dev/gitignore-generator.html\n';
  combined += '# Generated on ' + new Date().toISOString() + '\n\n';
  sel.forEach(name => {
    combined += '# ===== ' + name + ' =====\n';
    combined += TEMPLATES[name] + '\n\n';
  });
  $('#output').value = combined.trim();
  // Stats
  const lines = combined.split('\n').filter(l => l && !l.startsWith('#'));
  $('#stats').textContent = `${sel.length} template(s) • ${lines.length} active rules • ${combined.length} chars`;
  // Tags
  const tagsHtml = Array.from(selected).map(n => `<span class="tag">${escapeHtml(n)}<button onclick="toggleTpl('${escapeHtml(n)}', false)">×</button></span>`).join('');
  $('#selected').innerHTML = tagsHtml || '<span style="color:var(--text3);font-size:.85em">No templates selected — pick from the list below</span>';
}

function downloadFile() {
  if (!$('#output').value.trim()) return;
  const blob = new Blob([$('#output').value], {type: 'text/plain'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = '.gitignore';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

$('#lbl-templates').textContent = t('lblTemplates');
$('#lbl-output').textContent = t('lblOutput');
$('#search').placeholder = '🔍 ' + t('search');

// Wire up search
$('#search').addEventListener('input', e => renderList(e.target.value));
$('#output').addEventListener('input', () => {
  const lines = $('#output').value.split('\n').filter(l => l && !l.startsWith('#'));
  $('#stats').textContent = `${selected.size} template(s) • ${lines.length} active rules • ${$('#output').value.length} chars`;
});

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="downloadFile()">⬇️ Download .gitignore</button>
  <button class="gz-btn gz-btn-secondary" onclick="copyText($('#output').value)">📋 ${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="selected.clear();renderList($('#search').value);renderOutput()">🗑️ ${t('clear')}</button>`;

renderList();
renderOutput();

GZ.renderToolPage({
category: 'dev',
titleKey: 'toolTitle',
descKey: 'toolDesc',
howToSteps: ['step1','step2','step3','step4'],
related: [

]
});
