<script>
GZI18n.register({
  en: {
    toolTitle: 'CSS Blob Generator',
    toolDesc: 'Create organic blob shapes with custom border-radius values. Pick a preset or fine-tune the 8 corner values. Perfect for hero sections, cards, avatars and modern illustrations.',
    presetsLabel: 'Shape Presets',
    size: 'Size (px)',
    color: 'Color',
    advancedMode: 'Advanced (8-point border-radius)',
    cssCode: 'Generated Code',
    copy: 'Copy',
    randomize: '🎲 Randomize',
    step1: 'Pick a preset shape or enable Advanced mode',
    step2: 'Adjust the size and color',
    step3: 'Fine-tune corner values for unique blobs',
    step4: 'Copy the HTML and CSS to use in your project'
  },
  zh: {
    toolTitle: 'CSS 异形生成器',
    toolDesc: '使用自定义 border-radius 值创建有机异形。预设或精细调整 8 个角点。非常适合 hero 区、卡片、头像和现代插图。',
    presetsLabel: '形状预设',
    size: '尺寸 (px)',
    color: '颜色',
    advancedMode: '高级模式（8 点 border-radius）',
    cssCode: '生成代码',
    copy: '复制',
    randomize: '🎲 随机化',
    step1: '选择预设或启用高级模式',
    step2: '调整尺寸和颜色',
    step3: '精细调整角点值以获得独特形状',
    step4: '复制 HTML 和 CSS 用于项目'
  }
});

const { $, t, copyText } = GZ;
let currentTab = 'html';

const PRESETS = [
  { name: 'Smooth',     tl:[60,50], tr:[70,40], bl:[40,70], br:[50,60] },
  { name: 'Leaf',       tl:[20,80], tr:[60,20], bl:[80,60], br:[40,40] },
  { name: 'Egg',        tl:[50,60], tr:[50,60], bl:[50,40], br:[50,40] },
  { name: 'Wave',       tl:[70,30], tr:[30,70], bl:[70,30], br:[30,70] },
  { name: 'Heart-ish',  tl:[80,50], tr:[80,50], bl:[20,30], br:[20,30] },
  { name: 'Pebble',     tl:[40,30], tr:[60,40], bl:[30,60], br:[50,50] },
  { name: 'Cloud',      tl:[70,50], tr:[70,50], bl:[30,70], br:[50,30] },
  { name: 'Star-ish',   tl:[90,40], tr:[40,90], bl:[40,30], br:[30,40] }
];

function buildBorderRadius() {
  if ($('#advanced-toggle').checked) {
    const tlh = clamp($('#tl-h').value), tlv = clamp($('#tl-v').value);
    const trh = clamp($('#tr-h').value), trv = clamp($('#tr-v').value);
    const blh = clamp($('#bl-h').value), blv = clamp($('#bl-v').value);
    const brh = clamp($('#br-h').value), brv = clamp($('#br-v').value);
    return `${tlh}% ${trh}% ${brh}% ${blh}% / ${tlv}% ${trv}% ${brv}% ${blv}%`;
  } else {
    const seed = PRESETS[Math.floor(Math.random() * PRESETS.length)];
    $('#tl-h').value = seed.tl[0]; $('#tl-v').value = seed.tl[1];
    $('#tr-h').value = seed.tr[0]; $('#tr-v').value = seed.tr[1];
    $('#bl-h').value = seed.bl[0]; $('#bl-v').value = seed.bl[1];
    $('#br-h').value = seed.br[0]; $('#br-v').value = seed.br[1];
    return `${seed.tl[0]}% ${seed.tr[0]}% ${seed.br[0]}% ${seed.bl[0]}% / ${seed.tl[1]}% ${seed.tr[1]}% ${seed.br[1]}% ${seed.bl[1]}%`;
  }
}

function clamp(v) { return Math.max(0, Math.min(100, parseInt(v) || 50)); }

function generate() {
  const size = Math.max(40, Math.min(600, parseInt($('#size').value) || 200));
  const color = $('#color').value;
  const blob = $('#blob');
  blob.style.width = size + 'px';
  blob.style.height = size + 'px';
  blob.style.background = color;
  blob.style.borderRadius = buildBorderRadius();
  updateCode();
}

function updateCode() {
  const size = $('#size').value;
  const color = $('#color').value;
  const radius = $('#blob').style.borderRadius;
  const css = `.blob {
  width: ${size}px;
  height: ${size}px;
  background: ${color};
  border-radius: ${radius};
}`;
  const html = `<div class="blob"></div>`;
  $('#code-block').textContent = currentTab === 'html' ? html : css;
}

function renderPresets() {
  $('#preset-grid').innerHTML = PRESETS.map((p, i) => 
    `<div class="preset-btn" data-i="${i}">${p.name}</div>`
  ).join('');
  document.querySelectorAll('.preset-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      $('#advanced-toggle').checked = true;
      $('#advanced-toggle').dispatchEvent(new Event('change'));
      const p = PRESETS[parseInt(btn.dataset.i)];
      $('#tl-h').value = p.tl[0]; $('#tl-v').value = p.tl[1];
      $('#tr-h').value = p.tr[0]; $('#tr-v').value = p.tr[1];
      $('#bl-h').value = p.bl[0]; $('#bl-v').value = p.bl[1];
      $('#br-h').value = p.br[0]; $('#br-v').value = p.br[1];
      generate();
    });
  });
}

$('#advanced-toggle').addEventListener('change', e => {
  $('#advanced-panel').classList.toggle('show', e.target.checked);
  if (e.target.checked) {
    const inputs = ['tl-h','tl-v','tr-h','tr-v','bl-h','bl-v','br-h','br-v'];
    inputs.forEach(id => $('#'+id).addEventListener('input', generate));
  }
  generate();
});

['size','color'].forEach(id => $('#'+id).addEventListener('input', generate));

document.querySelectorAll('.code-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.code-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentTab = tab.dataset.tab;
    updateCode();
  });
});

$('#toolbar').innerHTML = `<button class="gz-btn" onclick="randomizeBlob()">${t('randomize')}</button><button class="gz-btn gz-btn-secondary" onclick="copyBlob()">${t('copy')}</button>`;

function randomizeBlob() {
  const tl=[rnd(),rnd()], tr=[rnd(),rnd()], bl=[rnd(),rnd()], br=[rnd(),rnd()];
  $('#tl-h').value = tl[0]; $('#tl-v').value = tl[1];
  $('#tr-h').value = tr[0]; $('#tr-v').value = tr[1];
  $('#bl-h').value = bl[0]; $('#bl-v').value = bl[1];
  $('#br-h').value = br[0]; $('#br-v').value = br[1];
  generate();
}
function rnd() { return 30 + Math.floor(Math.random() * 50); }

function copyBlob() {
  const code = $('#code-block').textContent;
  copyText(code);
}

renderPresets();
generate();

GZ.renderToolPage({
  category: 'css',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🔺', href:'/css-tools/css-triangle-generator.html', name:'CSS Triangle'},
    {icon:'➡️', href:'/css-tools/css-arrow-generator.html', name:'CSS Arrow'},
    {icon:'🎨', href:'/css-tools/gradient.html', name:'CSS Gradient'},
    {icon:'✨', href:'/css-tools/neumorphism-generator.html', name:'Neumorphism'},
  ]
});
</script>

</body>
