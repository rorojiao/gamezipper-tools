<script>
GZI18n.register({
  en: {
    toolTitle: 'Google Fonts Preview & Pair Finder',
    toolDesc: 'Preview Google Fonts side by side, find perfect font pairings for headings and body text.',
    headingFont: 'Heading Font',
    bodyFont: 'Body Font',
    headingText: 'Heading Text',
    bodyText: 'Body Text',
    sampleHeading: 'The Quick Brown Fox',
    sampleBody: 'Typography is the art and technique of arranging type to make written language legible, readable, and appealing when displayed. Good typography creates a clear visual hierarchy and enhances the reading experience.',
    getCode: 'Get Code',
    copy: 'Copy',
    copied: 'Copied!',
    swap: 'Swap',
    random: 'Random Pair',
    embedCode: 'Embed Code',
    step1: 'Select a heading font and body font from the dropdowns',
    step2: 'Customize the preview text to match your project',
    step3: 'Try the Random Pair button for inspiration',
    step4: 'Click Get Code to copy the HTML embed code',
  },
  zh: {
    toolTitle: 'Google Fonts 预览与字体搭配',
    toolDesc: '并排预览 Google Fonts，为标题和正文找到完美的字体搭配方案。',
    headingFont: '标题字体',
    bodyFont: '正文字体',
    headingText: '标题文本',
    bodyText: '正文文本',
    sampleHeading: '敏捷的棕色狐狸',
    sampleBody: '排版设计是一种艺术和技术，通过对文字的安排使书面语言变得清晰、易读和美观。优秀的排版能建立清晰的视觉层次，提升阅读体验。',
    getCode: '获取代码',
    copy: '复制',
    copied: '已复制！',
    swap: '交换',
    random: '随机搭配',
    embedCode: '嵌入代码',
    step1: '从下拉菜单中选择标题字体和正文字体',
    step2: '自定义预览文本以匹配您的项目',
    step3: '点击随机搭配按钮获取灵感',
    step4: '点击获取代码复制 HTML 嵌入代码',
  }
});

const { $, copyText, t } = GZ;

const FONTS = [
  'Roboto','Open Sans','Lato','Montserrat','Poppins','Raleway','Inter',
  'Nunito','Ubuntu','Playfair Display','Merriweather','PT Serif',
  'Source Sans 3','Oswald','Roboto Condensed','Noto Sans','Rubik',
  'Work Sans','Quicksand','Inconsolata','Fira Code','JetBrains Mono',
  'Source Code Pro','Space Grotesk','DM Sans','Manrope','Lexend',
  'Outfit','Plus Jakarta Sans','Sora','Cabinet Grotesk','Satoshi',
  'Bricolage Grotesque','Onest','Geist','Archivo','Space Mono',
  'IBM Plex Sans','IBM Plex Mono','IBM Plex Serif','Crimson Text',
  'Libre Baskerville','Cardo','Cormorant','EB Garamond','Spectral',
  'Bitter','Karla','Dosis','Josefin Sans','Anton','Bebas Neue',
  'Righteous','Pacifico','Dancing Script','Shadows Into Light',
  'Caveat','Comfortaa','Orbitron','Press Start 2P','ZCOOL QingKe HuangYou',
  'Noto Sans SC','Noto Serif SC','Ma Shan Zheng','ZCOOL XiaoWei',
  'Liu Jian Mao Cao','Long Cang'
];

const loadedFonts = new Set();

function loadFont(name) {
  if (loadedFonts.has(name)) return;
  loadedFonts.add(name);
  const link = document.createElement('link');
  link.rel = 'stylesheet';
  link.href = `https://fonts.googleapis.com/css2?family=${encodeURIComponent(name)}:wght@400;700&display=swap`;
  document.head.appendChild(link);
}

function buildSelect(id, label) {
  let html = `<select id="${id}">`;
  FONTS.forEach(f => { html += `<option value="${f}">${f}</option>`; });
  html += '</select>';
  return html;
}

let headingFont = 'Playfair Display';
let bodyFont = 'Roboto';
let headingText = '';
let bodyText = '';

function renderPreview() {
  loadFont(headingFont);
  loadFont(bodyFont);
  const ht = headingText || t('sampleHeading');
  const bt = bodyText || t('sampleBody');
  $('#preview').innerHTML = `
    <div class="font-preview-card">
      <h3>${t('headingFont')}: ${headingFont}</h3>
      <div class="sample" style="font-family:'${headingFont}',serif">${ht}</div>
    </div>
    <div class="font-preview-card">
      <h3>${t('bodyFont')}: ${bodyFont}</h3>
      <div class="sample-body" style="font-family:'${bodyFont}',sans-serif">${bt}</div>
    </div>`;
}

function showCode() {
  const el = $('#fontCode');
  el.classList.add('show');
  const linkTag = `<link href="https://fonts.googleapis.com/css2?family=${encodeURIComponent(headingFont)}:wght@400;700&family=${encodeURIComponent(bodyFont)}:wght@400;700&display=swap" rel="stylesheet">`;
  const css = `h1, h2, h3 { font-family: '${headingFont}', serif; }\np, body { font-family: '${bodyFont}', sans-serif; }`;
  el.innerHTML = `<strong>${t('embedCode')}:</strong><br>${linkTag}<br><br>${css}<br><br><button class="gz-btn" onclick="copyText(\`${linkTag}\\n\\n<style>\\n${css}\\n</style>\`)">${t('copy')}</button>`;
}

function randomPair() {
  const h = FONTS[Math.floor(Math.random() * FONTS.length)];
  let b = FONTS[Math.floor(Math.random() * FONTS.length)];
  while (b === h) b = FONTS[Math.floor(Math.random() * FONTS.length)];
  headingFont = h; bodyFont = b;
  $('#headingSelect').value = h;
  $('#bodySelect').value = b;
  renderPreview();
}

function swapFonts() {
  [headingFont, bodyFont] = [bodyFont, headingFont];
  $('#headingSelect').value = headingFont;
  $('#bodySelect').value = bodyFont;
  renderPreview();
}

$('#toolbar').innerHTML = `
  <div style="width:100%;display:flex;flex-wrap:wrap;gap:8px;align-items:center">
    <label style="font-size:.85em">${t('headingFont')}:</label>
    ${buildSelect('headingSelect','heading')}
    <label style="font-size:.85em">${t('bodyFont')}:</label>
    ${buildSelect('bodySelect','body')}
    <button class="gz-btn gz-btn-secondary" onclick="swapFonts()">${t('swap')}</button>
    <button class="gz-btn gz-btn-secondary" onclick="randomPair()">🎲 ${t('random')}</button>
  </div>
  <div style="width:100%;display:flex;flex-wrap:wrap;gap:8px;margin-top:8px">
    <input id="headingInput" placeholder="${t('headingText')}" oninput="headingText=this.value;renderPreview()">
    <input id="bodyInput" placeholder="${t('bodyText')}" oninput="bodyText=this.value;renderPreview()">
    <button class="gz-btn" onclick="showCode()">📋 ${t('getCode')}</button>
  </div>`;

$('#headingSelect').value = headingFont;
$('#bodySelect').value = bodyFont;
$('#headingSelect').addEventListener('change', function() { headingFont = this.value; renderPreview(); });
$('#bodySelect').addEventListener('change', function() { bodyFont = this.value; renderPreview(); });

loadFont(headingFont);
loadFont(bodyFont);
renderPreview();

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'↕️', href:'/css-tools/line-height.html', name:'Line Height'},
    {icon:'📝', href:'/text/markdown.html', name:'Markdown Preview'},
    {icon:'💻', href:'/text/html-playground.html', name:'HTML Playground'},
    {icon:'🎨', href:'/css-tools/gradient.html', name:'CSS Gradient'},
  ]
});
</script>
