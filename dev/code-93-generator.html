<script>
GZI18n.register({
  en: {

    toolDesc: 'Generate Code 93 barcodes online. Compact high-density encoding of A-Z, 0-9 and symbols. Automatic C and K mod-47 check digits, SVG/PNG download — 100% browser-only.',

  },
  zh: {
    toolTitle: 'Code 93 条形码生成器',
    toolDesc: '在线生成 Code 93 条形码。紧凑高密度编码 A-Z、0-9 和符号。自动计算 C 和 K mod-47 校验位，可下载 SVG/PNG — 100% 浏览器本地运行。',
    lblData: '数据',
    lblScale: '缩放',
    lblHeight: '高度',
    lblShowText: '显示文字',
    downloadSvg: '下载 SVG',
    downloadPng: '下载 PNG',
    empty: '请在上方输入数据以生成条形码。',
    encoded: (d, c, k) => `已编码 "${d}"，校验位 C=${c}, K=${k}`,
    notInSet: '部分字符不在 Code 93 字符集中，已被忽略。',
    step1: '输入大写字母、数字或符号 - . $ / + % 和空格',
    step2: '校验位 C 和 K 会自动计算（Code 93 必需）',
    step3: '根据需要调整缩放和高度',
    step4: '下载为 SVG（矢量）或 PNG（位图）',
  }
});

const { $, copyText, t } = GZ;

// Code 93 character set + values (47 total)
const CHARS = '0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ-. $/+%*';
// Patterns: each is 9 modules of widths 1 or 4. Order: 3 bars, 3 spaces.
// From the Code 93 specification.
const PATTERNS = {
  '0':'100010100','1':'101001000','2':'101000100','3':'101000010','4':'100101000',
  '5':'100100100','6':'100100010','7':'101010000','8':'100010010','9':'100001010',
  'A':'110101000','B':'110100100','C':'110100010','D':'110010100','E':'110010010',
  'F':'110001010','G':'101101000','H':'101100100','I':'101100010','J':'100110100',
  'K':'100011010','L':'101011000','M':'101001100','N':'101000110','O':'100101100',
  'P':'100010110','Q':'110110100','R':'110110010','S':'110101100','T':'110100110',
  'U':'110010110','V':'110011010','W':'101101100','X':'101100110','Y':'100110110',
  'Z':'100101100','-':'100100110','.':'111010100',' ':'111010010','$':'111001010',
  '/':'101101110','+':'101110110','%':'110101110','*':'100100100'
};

function checkDigit(data, type) {
  // type: 'C' weights 1..20 cyclic; 'K' weights 1..15 cyclic (after C is appended)
  const max = type === 'C' ? 20 : 15;
  let sum = 0;
  let weight = 1;
  // process right to left
  for (let i = data.length - 1; i >= 0; i--) {
    const idx = CHARS.indexOf(data[i]);
    if (idx < 0) continue;
    sum += idx * weight;
    weight++;
    if (weight > max) weight = 1;
  }
  return CHARS[sum % 47];
}

function generate() {
  const raw = ($('#data').value || '').toUpperCase();
  const svg = $('#barcode-svg');
  const info = $('#info');

  if (!raw) {
    svg.innerHTML = '';
    info.innerHTML = `<span style="color:var(--text2)">${t('empty')}</span>`;
    return;
  }

  // Filter to valid chars
  let clean = '';
  let hadInvalid = false;
  for (const ch of raw) {
    if (ch in PATTERNS && ch !== '*') clean += ch;
    else hadInvalid = true;
  }

  if (!clean) {
    svg.innerHTML = '';
    info.innerHTML = `<span style="color:var(--gz-accent)">${t('notInSet')}</span>`;
    return;
  }

  // Compute check digits
  const c = checkDigit(clean, 'C');
  const k = checkDigit(clean + c, 'K');
  const dataWithChecks = clean + c + k;

  // Build bits: start (*) + data+checks + stop (*)
  // Each character is 9 modules. Inter-character gap is 1 narrow module (single 0).
  // Code 93 actually has NO inter-character gap; symbols are continuous.
  let bits = PATTERNS['*'];
  for (let i = 0; i < dataWithChecks.length; i++) {
    bits += PATTERNS[dataWithChecks[i]];
  }
  bits += PATTERNS['*'];
  // termination bar (1-module extra)
  bits += '1';

  const scale = parseInt($('#scale').value);
  const barH = parseInt($('#height').value);
  const unitW = scale;
  const quietZone = 10 * scale;
  const totalW = bits.length * unitW + quietZone * 2;
  const textH = $('#showtext').checked ? 20 : 0;
  const totalH = barH + textH;
  const textY = barH + 16;

  let rects = '';
  for (let i = 0; i < bits.length; i++) {
    if (bits[i] === '1') {
      rects += `<rect x="${quietZone + i * unitW}" y="0" width="${unitW}" height="${barH}" fill="#000"/>`;
    }
  }
  let textEl = '';
  if ($('#showtext').checked) {
    textEl = `<text x="${totalW/2}" y="${textY}" font-family="monospace" font-size="14" fill="#000" text-anchor="middle" letter-spacing="2">${dataWithChecks}</text>`;
  }

  svg.setAttribute('width', totalW);
  svg.setAttribute('height', totalH);
  svg.setAttribute('viewBox', `0 0 ${totalW} ${totalH}`);
  svg.innerHTML = `<rect x="0" y="0" width="${totalW}" height="${totalH}" fill="#fff"/>${rects}${textEl}`;

  let infoHtml = `<span style="color:var(--gz-success)">✓ ${t('encoded')(clean, c, k)}</span>`;
  if (hadInvalid) infoHtml += ` <span style="color:var(--gz-accent)">⚠ ${t('notInSet')}</span>`;
  info.innerHTML = infoHtml;
}

$('#data').addEventListener('input', generate);
$('#scale').addEventListener('input', e => { $('#scale-val').textContent = e.target.value + 'x'; generate(); });
$('#height').addEventListener('input', e => { $('#height-val').textContent = e.target.value + 'px'; generate(); });
$('#showtext').addEventListener('change', generate);

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="downloadSvg()">${t('downloadSvg')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="downloadPng()">${t('downloadPng')}</button>`;

function downloadSvg() {
  const svg = $('#barcode-svg');
  const clone = svg.cloneNode(true);
  const data = new XMLSerializer().serializeToString(clone);
  const blob = new Blob([data], {type: 'image/svg+xml'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `code93-${Date.now()}.svg`;
  a.click();
  URL.revokeObjectURL(a.href);
}

function downloadPng() {
  const svg = $('#barcode-svg');
  const data = new XMLSerializer().serializeToString(svg);
  const img = new Image();
  const blob = new Blob([data], {type: 'image/svg+xml'});
  const url = URL.createObjectURL(blob);
  img.onload = function() {
    const canvas = document.createElement('canvas');
    canvas.width = img.width * 2;
    canvas.height = img.height * 2;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#fff';
    ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
    URL.revokeObjectURL(url);
    canvas.toBlob(function(b) {
      const a = document.createElement('a');
      a.href = URL.createObjectURL(b);
      a.download = `code93-${Date.now()}.png`;
      a.click();
      URL.revokeObjectURL(a.href);
    });
  };
  img.src = url;
}

$('#lbl-data').textContent = t('lblData');
$('#lbl-scale').textContent = t('lblScale');
$('#lbl-height').textContent = t('lblHeight');
$('#lbl-showtext').textContent = t('lblShowText');
$('#scale-val').textContent = '2x';
$('#height-val').textContent = '100px';

generate();

  ]
});
</script>
