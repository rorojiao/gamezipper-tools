    missingPunctMsg: '句子似乎缺少结尾标点。',

    extraSpaceMsg: '检测到多个连续空格。',
    passiveVoice: '被动语态',
    passiveVoiceMsg: '检测到被动语态结构："{phrase}"。建议使用主动语态。',
    commonConfusion: '常见混淆',
    commonConfusionMsg: '"{word}" 可能与 "{suggestion}" 混淆，请检查上下文。',
    runOn: '过长句子',

    repeatedStarter: '重复句首',
    repeatedStarterMsg: '多个句子以 "{word}" 开头，建议变换句式。',

const { $, copyText, t } = GZ;

const PASSIVE_PATTERNS = [
  /\b(is|are|was|were|be|been|being)\s+(being\s+)?\w+ed\b/gi,
  /\b(is|are|was|were|be|been|being)\s+(being\s+)?\w+en\b/gi,
];

const CONFUSIONS = {
  'their': 'there / they\'re',
  'there': 'their / they\'re',
  'they\'re': 'their / there',
  'your': 'you\'re',
  'you\'re': 'your',
  'its': 'it\'s',
  'it\'s': 'its',
  'then': 'than',
  'than': 'then',
  'affect': 'effect',
  'effect': 'affect',
  'accept': 'except',
  'except': 'accept',
  'lose': 'loose',
  'loose': 'lose',
  'complement': 'compliment',
  'compliment': 'complement',
  'principal': 'principle',
  'principle': 'principal',
  'stationary': 'stationery',
  'stationery': 'stationary',
};

let currentText = '';

function checkGrammar() {
  const text = $('#input').value;
  currentText = text;
  if (!text.trim()) {
    $('#output').innerHTML = '<em style="color:var(--text2)">Start typing to check grammar.</em>';
    $('#stats').innerHTML = '';
    return;
  }

  const issues = [];

  // 1. Double words
  const doubleMatch = text.matchAll(/\b(\w+)\s+\1\b/gi);
  for (const m of doubleMatch) {
    issues.push({
      type: 'doubleWord', level: 'gi-error',
      msg: t('doubleWordMsg').replace('{word}', m[1]),
      context: m[0], pos: m.index, len: m[0].length,
      fix: m[1]
    });
  }

  // 2. Sentence capitalization
  const sentences = text.split(/(?<=[.!?])\s+/);
  let offset = 0;
  for (const s of sentences) {
    if (s.length > 0 && /^[a-z]/.test(s)) {
      issues.push({
        type: 'capitalization', level: 'gi-error',
        msg: t('capitalizationMsg'),
        context: s.substring(0, Math.min(50, s.length)),
        pos: offset, len: 1,
        fix: s[0].toUpperCase() + s.substring(1)
      });
    }
    offset += s.length + 1;
  }

  // 3. Missing end punctuation
  const lines = text.split('\n');
  offset = 0;
  for (const line of lines) {
    const trimmed = line.trim();
    if (trimmed.length > 10 && !/[.!?]$/.test(trimmed)) {
      issues.push({
        type: 'missingPunct', level: 'gi-info',
        msg: t('missingPunctMsg'),
        context: trimmed.substring(Math.max(0, trimmed.length - 40)),
        pos: offset + line.length - 1, len: 0,
        fix: null
      });
    }
    offset += line.length + 1;
  }

  // 4. Extra spaces
  const extraSpaces = text.matchAll(/ {2,}/g);
  for (const m of extraSpaces) {
    issues.push({
      type: 'extraSpace', level: '',
      msg: t('extraSpaceMsg'),
      context: `"${m[0]}" (${m[0].length} spaces)`,
      pos: m.index, len: m[0].length,
      fix: ' '
    });
  }

  // 5. Passive voice
  for (const pat of PASSIVE_PATTERNS) {
    pat.lastIndex = 0;
    const matches = text.matchAll(pat);
    for (const m of matches) {
      issues.push({
        type: 'passiveVoice', level: '',
        msg: t('passiveVoiceMsg').replace('{phrase}', m[0]),
        context: m[0],
        pos: m.index, len: m[0].length,
        fix: null
      });
    }
  }

  // 6. Common confusions
  const wordTokens = text.split(/(\b\w+'\w+\b|\b\w+\b)/g);
  offset = 0;
  for (let i = 0; i < wordTokens.length; i++) {
    const tok = wordTokens[i];
    const lower = tok.toLowerCase();
    if (CONFUSIONS[lower]) {
      issues.push({
        type: 'commonConfusion', level: '',
        msg: t('commonConfusionMsg').replace('{word}', tok).replace('{suggestion}', CONFUSIONS[lower]),
        context: tok,
        pos: text.indexOf(tok, offset), len: tok.length,
        fix: null
      });
    }
    offset += tok.length;
  }

  // 7. Run-on sentences (long sentences)
  const allSentences = text.split(/[.!?]+/).filter(s => s.trim().length > 0);
  offset = 0;
  for (const s of allSentences) {
    const wordCount = s.trim().split(/\s+/).length;
    if (wordCount > 40) {
      issues.push({
        type: 'runOn', level: 'gi-info',
        msg: t('runOnMsg').replace('{count}', wordCount),
        context: s.trim().substring(0, 60) + '...',
        pos: text.indexOf(s.trim(), offset), len: s.trim().length,
        fix: null
      });
    }
    offset += s.length + 1;
  }

  // 8. Repeated sentence starters
  const starters = allSentences.map(s => {
    const first = s.trim().split(/\s+/)[0];
    return first ? first.toLowerCase() : '';
  }).filter(Boolean);
  const starterCounts = {};
  starters.forEach(s => { starterCounts[s] = (starterCounts[s] || 0) + 1; });
  for (const [word, count] of Object.entries(starterCounts)) {
    if (count >= 3 && word.length > 2) {
      issues.push({
        type: 'repeatedStarter', level: '',
        msg: t('repeatedStarterMsg').replace('{word}', word),
        context: `"${word}" used ${count} times`,
        pos: -1, len: 0,
        fix: null
      });
    }
  }

  // Stats
  const totalWords = text.split(/\s+/).filter(Boolean).length;
  const totalSentences = (text.match(/[.!?]+/g) || []).length || 1;
  $('#stats').innerHTML = `
    <div class="gi-stat"><div class="num">${totalWords}</div><div class="lbl">${t('words')}</div></div>
    <div class="gi-stat"><div class="num">${totalSentences}</div><div class="lbl">${t('sentences')}</div></div>
    <div class="gi-stat"><div class="num" style="color:${issues.length?'var(--warn)':'var(--success)'}">${issues.length}</div><div class="lbl">${t('issues')}</div></div>
  `;

  if (issues.length === 0) {
    $('#output').innerHTML = `<div style="color:var(--success);padding:16px;text-align:center">${t('noIssues')}</div>`;
    return;
  }

  const typeIcons = {
    doubleWord: '🔁', capitalization: '🔤', missingPunct: '❓',
    extraSpace: '⬜', passiveVoice: '🔄', commonConfusion: '❗',
    runOn: '📏', repeatedStarter: '🔁'
  };

  let html = `<div style="margin-bottom:8px;color:var(--text2);font-size:.85rem">${issues.length} ${t('issuesFound')}</div>`;
  for (const issue of issues) {
    const typeLabel = t(issue.type);
    const icon = typeIcons[issue.type] || '⚠️';
    html += `<div class="gi-issue ${issue.level}">
      <div class="gi-icon">${icon}</div>
      <div class="gi-body">
        <div class="gi-type">${typeLabel}</div>
        <div class="gi-msg">${issue.msg}</div>
        ${issue.context ? `<div class="gi-context">${issue.context}</div>` : ''}
      </div>
    </div>`;
  }
  $('#output').innerHTML = html;
}

function loadExample() {
  $('#input').value = "the quick brown fox jumps over the lazy dog. This is a test sentence that has has a double word in it. Their are many reasons why your going to love this tool. The ball was thrown by the pitcher.\nThis is an extremely long run-on sentence that just keeps going and going without any proper punctuation or pause or break or any kind of stopping point it just rambles on and on about nothing in particular and keeps adding more words without mercy until the reader is completely exhausted.\nthe second sentence also starts with lowercase.  And this one has  extra  spaces.";
  checkGrammar();
}

function doClear() { $('#input').value = ''; checkGrammar(); }

$('#input').addEventListener('input', () => {
  clearTimeout(window._gmTimer);
  window._gmTimer = setTimeout(checkGrammar, 350);
});

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="checkGrammar()">🔍 ${t('check')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

    {icon:'🔍', href:'/text/find-replace.html', name:'Find & Replace'},
  ]
});
</script>
