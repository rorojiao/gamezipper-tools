.rb-form-section h3 .add-btn{background:var(--accent);color:#fff;border:0;padding:4px 12px;border-radius:8px;font-size:.75rem;cursor:pointer;font-family:inherit}
.rb-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.rb-grid label{font-size:.78rem;color:var(--text2);margin-bottom:3px;display:block}
.rb-grid input,.rb-grid textarea{width:100%;background:rgba(0,0,0,0.3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:.55rem .7rem;color:var(--text);font-size:.85rem;font-family:inherit}
.rb-grid input:focus,.rb-grid textarea:focus{outline:none;border-color:var(--accent)}
.rb-full{grid-column:1/-1}
.rb-item{background:rgba(0,0,0,0.2);border:1px solid var(--border);border-radius:8px;padding:10px;margin-bottom:8px;position:relative}
.rb-item .del{position:absolute;top:8px;right:8px;background:transparent;border:0;color:var(--text2);cursor:pointer;font-size:1rem;padding:2px 6px}

.rb-template-tabs{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.rb-tmpl{padding:6px 14px;border-radius:8px;background:var(--glass2);border:1px solid var(--border);color:var(--text2);cursor:pointer;font-size:.8rem;font-weight:600}
.rb-tmpl.active{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border-color:transparent}
.rb-preview h1{font-size:1.6rem;margin:0 0 4px;color:#111}
.rb-preview h2{font-size:.95rem;text-transform:uppercase;letter-spacing:1px;border-bottom:1px solid #ccc;padding-bottom:3px;margin:14px 0 6px;color:#333}
.rb-preview .contact{font-size:.8rem;color:#555;margin-bottom:8px}
.rb-preview .exp{ margin-bottom:8px}
.rb-preview .exp-title{font-weight:700}
.rb-preview .exp-meta{font-size:.78rem;color:#666;font-style:italic;margin-bottom:2px}
.rb-preview ul{margin:4px 0 4px 18px;padding:0}
.rb-preview li{margin-bottom:1px}
.rb-preview.tmpl-modern{font-family:'Segoe UI',Arial,sans-serif}
.rb-preview.tmpl-modern h1{color:#2563eb}
.rb-preview.tmpl-modern h2{color:#2563eb;border-bottom:2px solid #2563eb}
.rb-preview.tmpl-minimal h1{font-weight:300;font-size:1.8rem}
.rb-preview.tmpl-minimal h2{font-weight:600;color:#666;border-bottom:0;font-size:.85rem;letter-spacing:2px;margin-top:18px}
.rb-preview.tmpl-minimal{border-left:4px solid #2563eb}

<script>
GZI18n.register({
  en: {
    toolTitle: 'Resume Builder',
    toolDesc: 'Build a professional resume in minutes. Fill in your details, choose a template, and download as PDF — no signup, no watermarks, fully private.',

    summaryText: 'Brief summary of your professional background and goals',
    downloadPdf: '📥 Download PDF',
    saveDraft: '💾 Save Draft',
    clearAll: '🗑️ Clear All',
    step1: 'Fill in your personal information on the left',
    step2: 'Add work experience and education entries',
    step3: 'Choose a template and review the live preview on the right',

  },
  zh: {
    toolTitle: '简历生成器',
    toolDesc: '几分钟内创建专业简历。填写信息、选择模板、下载 PDF — 无需注册、无水印、完全本地保护隐私。',
    tmpl: { classic: '经典', modern: '现代', minimal: '极简' },
    personal: '个人信息', exp: '工作经验', edu: '教育背景', skills: '技能', langs: '语言',
    fullName: '姓名', jobTitle: '职位', email: '邮箱', phone: '电话', location: '所在地', website: '网站 / LinkedIn',
    company: '公司', position: '岗位', startDate: '开始日期', endDate: '结束日期', summary: '职责 / 成就', addExp: '+ 添加经验',
    school: '学校', degree: '学位', field: '专业', eduStart: '开始日期', eduEnd: '结束日期', addEdu: '+ 添加教育',
    addSkill: '+ 添加技能', addLang: '+ 添加语言',
    summarySec: '个人简介', addSummary: '+ 添加简介',
    summaryText: '简要描述您的职业背景和目标',
    downloadPdf: '📥 下载 PDF',
    saveDraft: '💾 保存草稿',
    clearAll: '🗑️ 清空全部',
    step1: '在左侧填写个人信息',
    step2: '添加工作经验和教育背景',
    step3: '选择模板并实时查看右侧预览',
    step4: '点击「下载 PDF」保存简历',
  }
});

const { $, $$, copyText, t, showToast } = GZ;
let currentTmpl = 'classic';
let lang = GZI18n.getLang();
const STATE_KEY = 'gz-resume-data-v1';

let state = {
  personal: { name:'', title:'', email:'', phone:'', location:'', website:'' },
  summary: '',
  experience: [],
  education: [],
  skills: [],
  languages: [],
};

function loadState() {
  try { const raw = localStorage.getItem(STATE_KEY); if (raw) state = Object.assign(state, JSON.parse(raw)); } catch(e) {}
}
function saveState() { try { localStorage.setItem(STATE_KEY, JSON.stringify(state)); } catch(e) {} }

function renderTemplateTabs() {
  const tmpl = t('tmpl');
  $('#tmplTabs').innerHTML = Object.entries(tmpl).map(([k,v]) =>
    `<button class="rb-tmpl ${k===currentTmpl?'active':''}" data-tmpl="${k}">${v}</button>`
  ).join('');
  $$('#tmplTabs .rb-tmpl').forEach(b => b.onclick = () => { currentTmpl = b.dataset.tmpl; renderTemplateTabs(); renderPreview(); });
}

function renderForm() {
  $('#form').innerHTML = `
    <div class="rb-form-section">
      <h3>${t('personal')}</h3>
      <div class="rb-grid">
        <div class="rb-full"><label>${t('fullName')}</label><input data-p="name" value="${esc(state.personal.name)}" placeholder="John Smith"></div>
        <div class="rb-full"><label>${t('jobTitle')}</label><input data-p="title" value="${esc(state.personal.title)}" placeholder="Senior Software Engineer"></div>
        <div><label>${t('email')}</label><input data-p="email" value="${esc(state.personal.email)}" placeholder="john@example.com"></div>
        <div><label>${t('phone')}</label><input data-p="phone" value="${esc(state.personal.phone)}" placeholder="+1 234 567 8900"></div>
        <div><label>${t('location')}</label><input data-p="location" value="${esc(state.personal.location)}" placeholder="New York, NY"></div>
        <div><label>${t('website')}</label><input data-p="website" value="${esc(state.personal.website)}" placeholder="linkedin.com/in/john"></div>
      </div>
    </div>
    <div class="rb-form-section">
      <h3>${t('summarySec')} <button class="add-btn" onclick="toggleSummary()">${state.summary===''?'+':'-'}</button></h3>
      ${state.summary!==undefined && state.summary!=='' || true ? `<textarea data-p="summary" placeholder="${t('summaryText')}" style="width:100%;background:rgba(0,0,0,0.3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:.55rem .7rem;color:var(--text);font-size:.85rem;font-family:inherit;min-height:80px">${esc(state.summary||'')}</textarea>`:''}
    </div>
    <div class="rb-form-section">
      <h3>${t('exp')} <button class="add-btn" onclick="addExp()">${t('addExp')}</button></h3>
      <div id="expList">
        ${state.experience.map((e,i) => expItemHTML(e,i)).join('')}
      </div>
    </div>
    <div class="rb-form-section">
      <h3>${t('edu')} <button class="add-btn" onclick="addEdu()">${t('addEdu')}</button></h3>
      <div id="eduList">
        ${state.education.map((e,i) => eduItemHTML(e,i)).join('')}
      </div>
    </div>
    <div class="rb-form-section">
      <h3>${t('skills')} <button class="add-btn" onclick="addSkill()">${t('addSkill')}</button></h3>
      <div id="skillList">
        ${state.skills.map((s,i) => skillItemHTML(s,i)).join('')}
      </div>
    </div>
    <div class="rb-form-section">
      <h3>${t('langs')} <button class="add-btn" onclick="addLang()">${t('addLang')}</button></h3>
      <div id="langList">
        ${state.languages.map((l,i) => langItemHTML(l,i)).join('')}
      </div>
    </div>`;
  bindFormEvents();
}

function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function expItemHTML(e,i) {
  return `<div class="rb-item">
    <button class="del" onclick="delExp(${i})">✕</button>
    <div class="rb-grid">
      <div class="rb-full"><label>${t('position')}</label><input data-exp="${i}" data-f="position" value="${esc(e.position)}"></div>
      <div class="rb-full"><label>${t('company')}</label><input data-exp="${i}" data-f="company" value="${esc(e.company)}"></div>
      <div><label>${t('startDate')}</label><input data-exp="${i}" data-f="start" value="${esc(e.start)}" placeholder="2020"></div>
      <div><label>${t('endDate')}</label><input data-exp="${i}" data-f="end" value="${esc(e.end)}" placeholder="Present"></div>
      <div class="rb-full"><label>${t('summary')}</label><textarea data-exp="${i}" data-f="summary" style="width:100%;background:rgba(0,0,0,0.3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:.5rem .7rem;color:var(--text);font-size:.85rem;font-family:inherit;min-height:60px">${esc(e.summary)}</textarea></div>
    </div>
  </div>`;
}
function eduItemHTML(e,i) {
  return `<div class="rb-item">
    <button class="del" onclick="delEdu(${i})">✕</button>
    <div class="rb-grid">
      <div class="rb-full"><label>${t('school')}</label><input data-edu="${i}" data-f="school" value="${esc(e.school)}"></div>
      <div><label>${t('degree')}</label><input data-edu="${i}" data-f="degree" value="${esc(e.degree)}"></div>
      <div><label>${t('field')}</label><input data-edu="${i}" data-f="field" value="${esc(e.field)}"></div>
      <div><label>${t('eduStart')}</label><input data-edu="${i}" data-f="start" value="${esc(e.start)}" placeholder="2016"></div>
      <div><label>${t('eduEnd')}</label><input data-edu="${i}" data-f="end" value="${esc(e.end)}" placeholder="2020"></div>
    </div>
  </div>`;
}
function skillItemHTML(s,i) {
  return `<div class="rb-item" style="display:flex;gap:8px;align-items:center">
    <button class="del" onclick="delSkill(${i})">✕</button>
    <input data-skill="${i}" value="${esc(s)}" style="flex:1;background:rgba(0,0,0,0.3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:.5rem .7rem;color:var(--text);font-size:.85rem" placeholder="JavaScript">
  </div>`;
}
function langItemHTML(l,i) {
  return `<div class="rb-item" style="display:grid;grid-template-columns:1fr 1fr auto;gap:6px;align-items:center">
    <button class="del" onclick="delLang(${i})">✕</button>
    <input data-lang="${i}" data-f="name" value="${esc(l.name)}" style="background:rgba(0,0,0,0.3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:.5rem .7rem;color:var(--text);font-size:.85rem" placeholder="English">
    <input data-lang="${i}" data-f="level" value="${esc(l.level)}" style="background:rgba(0,0,0,0.3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:.5rem .7rem;color:var(--text);font-size:.85rem" placeholder="Fluent">
  </div>`;
}

function bindFormEvents() {
  $$('#form input[data-p]').forEach(i => i.oninput = e => { state.personal[i.dataset.p] = i.value; saveState(); renderPreview(); });
  $$('#form textarea[data-p]').forEach(i => i.oninput = e => { state.summary = i.value; saveState(); renderPreview(); });
  $$('#form input[data-exp]').forEach(i => i.oninput = e => { const idx = +i.dataset.exp; const f = i.dataset.f; const ta = i.tagName==='TEXTAREA'; if(ta) state.experience[idx][f] = i.value; else state.experience[idx][f] = i.value; saveState(); renderPreview(); });
  $$('#form textarea[data-exp]').forEach(i => i.oninput = e => { const idx = +i.dataset.exp; state.experience[idx][i.dataset.f] = i.value; saveState(); renderPreview(); });
  $$('#form input[data-edu]').forEach(i => i.oninput = e => { state.education[+i.dataset.edu][i.dataset.f] = i.value; saveState(); renderPreview(); });
  $$('#form input[data-skill]').forEach(i => i.oninput = e => { state.skills[+i.dataset.skill] = i.value; saveState(); renderPreview(); });
  $$('#form input[data-lang]').forEach(i => i.oninput = e => { state.languages[+i.dataset.lang][i.dataset.f] = i.value; saveState(); renderPreview(); });
}

function toggleSummary() { state.summary = state.summary ? '' : ' ' ; saveState(); renderForm(); }
function addExp() { state.experience.push({position:'',company:'',start:'',end:'',summary:''}); saveState(); renderForm(); renderPreview(); }
function delExp(i) { state.experience.splice(i,1); saveState(); renderForm(); renderPreview(); }
function addEdu() { state.education.push({school:'',degree:'',field:'',start:'',end:''}); saveState(); renderForm(); renderPreview(); }
function delEdu(i) { state.education.splice(i,1); saveState(); renderForm(); renderPreview(); }
function addSkill() { state.skills.push(''); saveState(); renderForm(); renderPreview(); }
function delSkill(i) { state.skills.splice(i,1); saveState(); renderForm(); renderPreview(); }
function addLang() { state.languages.push({name:'',level:''}); saveState(); renderForm(); renderPreview(); }
function delLang(i) { state.languages.splice(i,1); saveState(); renderForm(); renderPreview(); }

function renderPreview() {
  const p = state.personal;
  const cls = 'rb-preview tmpl-' + currentTmpl;
  $('#preview').className = cls;
  let html = `<h1>${esc(p.name || 'Your Name')}</h1>`;
  if (p.title) html += `<div style="font-size:1rem;color:#444;margin-bottom:6px">${esc(p.title)}</div>`;
  const contact = [p.email, p.phone, p.location, p.website].filter(Boolean);
  if (contact.length) html += `<div class="contact">${contact.map(esc).join(' · ')}</div>`;
  if (state.summary && state.summary.trim()) {
    html += `<h2>${lang==='zh'?'个人简介':'Summary'}</h2><p>${esc(state.summary)}</p>`;
  }
  if (state.experience.length) {
    html += `<h2>${lang==='zh'?'工作经验':'Experience'}</h2>`;
    state.experience.forEach(e => {
      if (!e.position && !e.company) return;
      html += `<div class="exp">
        <div class="exp-title">${esc(e.position||'')}${e.company?' · '+esc(e.company):''}</div>
        <div class="exp-meta">${esc(e.start||'')} — ${esc(e.end||'')}</div>
        ${e.summary?'<ul>'+e.summary.split('\n').filter(Boolean).map(l=>`<li>${esc(l)}</li>`).join('')+'</ul>':''}
      </div>`;
    });
  }
  if (state.education.length) {
    html += `<h2>${lang==='zh'?'教育背景':'Education'}</h2>`;
    state.education.forEach(e => {
      if (!e.school && !e.degree) return;
      html += `<div class="exp">
        <div class="exp-title">${esc(e.school||'')}</div>
        <div>${esc(e.degree||'')}${e.field?', '+esc(e.field):''}</div>
        <div class="exp-meta">${esc(e.start||'')} — ${esc(e.end||'')}</div>
      </div>`;
    });
  }
  if (state.skills.filter(Boolean).length) {
    html += `<h2>${lang==='zh'?'技能':'Skills'}</h2><p>${state.skills.filter(Boolean).map(esc).join(' · ')}</p>`;
  }
  if (state.languages.filter(l => l.name).length) {
    html += `<h2>${lang==='zh'?'语言':'Languages'}</h2><p>${state.languages.filter(l=>l.name).map(l => esc(l.name)+(l.level?' ('+esc(l.level)+')':'')).join(' · ')}</p>`;
  }
  $('#preview').innerHTML = html;
}

function downloadPDF() {
  const w = window.open('', '_blank', 'width=900,height=1100');
  const css = 'body{font-family:Georgia,serif;color:#222;padding:36px;font-size:13px;line-height:1.5}'+
    (currentTmpl==='modern'?'body{font-family:Segoe UI,Arial,sans-serif}h1{color:#2563eb}h2{color:#2563eb;border-bottom:2px solid #2563eb}':'')+
    (currentTmpl==='minimal'?'body{font-family:Helvetica,sans-serif;border-left:4px solid #2563eb;padding-left:32px}h1{font-weight:300}h2{font-weight:600;color:#666;border-bottom:0;letter-spacing:2px;font-size:11px}':'')+
    'h1{font-size:26px;margin:0 0 4px}h2{font-size:13px;text-transform:uppercase;letter-spacing:1px;border-bottom:1px solid #ccc;padding-bottom:3px;margin:14px 0 6px}.contact{font-size:11px;color:#555;margin-bottom:6px}.exp{margin-bottom:8px}.exp-title{font-weight:700}.exp-meta{font-size:11px;color:#666;font-style:italic}ul{margin:4px 0 4px 18px}';
  w.document.write(`<!DOCTYPE html><html><head><meta charset="utf-8"><title>Resume — ${esc(state.personal.name||'Resume')}</title><style>${css}</style><link rel="alternate" hreflang="en" href="https://tools.gamezipper.com/text/resume-builder.html">
<link rel="alternate" hreflang="zh" href="https://tools.gamezipper.com/zh/text/resume-builder.html">
<link rel="alternate" hreflang="x-default" href="https://tools.gamezipper.com/text/resume-builder.html">
<script>localStorage.setItem('gz-lang','zh');</script>
</head><body>${$('#preview').innerHTML}</body></html>
`;
}
$('#input').addEventListener('input', renderResume);
$('#toolbar').innerHTML=`<button class="gz-btn" onclick="renderResume()">${t("renderResume")}</button><button class="gz-btn" onclick="copyText($('#output').value||$('#output').innerText)">${t("copy")}</button><button class="gz-btn gz-btn-secondary" onclick="$('#input').value=''">${t("clear")}</button>`;

</script>
