const { $, copyText, t } = GZ;
const opts = { pkg: 'main', omitempty: false, pascal: true };
const seen = new Map(); // signature -> struct name
const structs = [];

function toPascal(s) {
  return s.replace(/(^|[_\W]+)(\w)/g, (_, __, c) => c.toUpperCase()).replace(/\W/g, '');
}

function goTypeFor(value, hint) {
  if (value === null) return '*' + goTypeFor('', hint); // unknown -> pointer
  if (Array.isArray(value)) {
    if (!value.length) return '[]interface{}';
    const nonNull = value.filter(v => v !== null);
    if (!nonNull.length) return '[]interface{}';
    const first = nonNull[0];
    if (typeof first === 'object') {
      return '[]' + objectStruct(nonNull.filter(v => typeof v === 'object'), hint);
    }
    return '[]' + scalarType(first);
  }
  if (typeof value === 'object') return objectStruct([value], hint);
  return scalarType(value);
}

function scalarType(v) {
  if (typeof v === 'boolean') return 'bool';
  if (typeof v === 'number') return Number.isInteger(v) ? 'int' : 'float64';
  if (typeof v === 'string') return 'string';
  return 'interface{}';
}

function mergeKeys(objs) {
  const keys = new Set();
  objs.forEach(o => Object.keys(o).forEach(k => keys.add(k)));
  return [...keys];
}

function objectStruct(objs, hint) {
  // build signature for dedup
  const sampleKeys = mergeKeys(objs).sort();
  const sig = sampleKeys.join('|');
  if (seen.has(sig)) return seen.get(sig);
  const name = uniqueName(hint || 'Auto');
  seen.set(sig, name);
  const fields = [];
  sampleKeys.forEach(k => {
    const samples = objs.map(o => o[k]).filter(v => v !== undefined && v !== null);
    const fieldName = opts.pascal ? toPascal(k) : k;
    let gtype;
    if (!samples.length) gtype = 'interface{}';
    else {
      // if all objects, merge
      const objSamples = samples.filter(v => typeof v === 'object' && !Array.isArray(v));
      const arrSamples = samples.filter(v => Array.isArray(v));
      if (objSamples.length === samples.length) {
        gtype = objectStruct(objSamples, k);
      } else if (arrSamples.length === samples.length) {
        // merge arrays
        const flat = [];
        arrSamples.forEach(a => a.forEach(v => flat.push(v)));
        gtype = goTypeFor(flat.length ? flat : arrSamples[0], k);
      } else {
        const types = [...new Set(samples.map(scalarType))];
        gtype = types.length === 1 ? types[0] : 'interface{}';
      }
    }
    const tag = opts.omitempty ? ` \`json:"${k},omitempty"\`` : ` \`json:"${k}"\``;
    fields.push(`    ${fieldName} ${gtype}${tag}`);
  });
  structs.push(`type ${name} struct {\n${fields.join('\n')}\n}`);
  return name;
}

const usedNames = new Set();
function uniqueName(base) {
  let n = toPascal(base);
  if (!n) n = 'Auto';
  if (!usedNames.has(n)) { usedNames.add(n); return n; }
  let i = 2;
  while (usedNames.has(n + i)) i++;
  usedNames.add(n + i);
  return n + i;
}

function convert() {
  const raw = $('#input').value.trim();
  if (!raw) return;
  let obj;
  try { obj = JSON.parse(raw); } catch (e) {
    $('#status').innerHTML = `<span style="color:var(--gz-accent)">${t('invalidJson')}${e.message}</span>`;
    $('#output').textContent = '';
    return;
  }
  // reset
  seen.clear(); structs.length = 0; usedNames.clear();
  let root;
  if (Array.isArray(obj)) {
    const nonNull = obj.filter(v => v !== null);
    const objs = nonNull.filter(v => typeof v === 'object');
    if (objs.length) root = objectStruct(objs, 'Root');
    else root = '[]' + scalarType(nonNull[0] ?? '');
    structs.unshift(`type Root ${root.startsWith('[]') ? root : root}`);
    if (root.startsWith('[]')) structs.shift();
  } else if (typeof obj === 'object' && obj !== null) {
    root = objectStruct([obj], 'Root');
  } else {
    $('#output').innerHTML = `<span class="go-com">// ${t('invalidJson')}root must be object or array</span>`;
    return;
  }
  const code = `// ${t('autoGen')}\npackage ${opts.pkg}\n\n${structs.join('\n\n')}\n`;
  $('#output').innerHTML = highlightGo(code);
  $('#status').innerHTML = `<span style="color:var(--gz-success)">${t('ok')}</span>`;
}

function highlightGo(code) {
  return code.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/(\/\/[^\n]*)/g, '<span class="go-com">$1</span>')
    .replace(/(`[^`]*`)/g, '<span class="go-tag">$1</span>')
    .replace(/\b(package|type|struct|interface|map|chan|func|return|range|var|const|nil|true|false)\b/g, '<span class="go-kw">$1</span>')
    .replace(/\b(int|int8|int16|int32|int64|uint|uint8|uint16|uint32|uint64|float32|float64|string|bool|byte|rune|error|any)\b/g, '<span class="go-type">$1</span>');
}

function loadExample() {
  $('#input').value = JSON.stringify({
    "id": 42,
    "user_name": "alice",
    "email": "alice@example.com",
    "is_active": true,
    "score": 98.5,
    "tags": ["go", "json"],
    "address": { "city": "Shanghai", "zip": "200000" },
    "posts": [{ "title": "Hello", "views": 100 }]
  }, null, 2);
  convert();
}

function doClear() { $('#input').value=''; $('#output').textContent=''; $('#status').innerHTML=''; }

$('#opts').innerHTML = `
  <label>${t('optPkg')} <input type="text" id="o-pkg" value="main"></label>
  <label><input type="checkbox" id="o-omit"> ${t('optOmitEmpty')}</label>
  <label><input type="checkbox" id="o-pascal" checked> ${t('optPascal')}</label>`;
$('#o-pkg').addEventListener('input', e => { opts.pkg = e.target.value || 'main'; convert(); });
$('#o-omit').addEventListener('change', e => { opts.omitempty = e.target.checked; convert(); });
$('#o-pascal').addEventListener('change', e => { opts.pascal = e.target.checked; convert(); });

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="convert()">${t('convert')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>
