<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"What is scientific notation?","acceptedAnswer":{"@type":"Answer","text":"Scientific notation writes a number as a × 10ⁿ where 1 ≤ |a| < 10 and n is an integer. For example 300000000 becomes 3 × 10⁸. It is the standard way to express very large or very small numbers in science."}},{"@type":"Question","name":"What is the difference between scientific, E, and engineering notation?","acceptedAnswer":{"@type":"Answer","text":"Scientific notation uses a × 10ⁿ with 1 ≤ |a| < 10. E-notation replaces the × 10 with E (3E8). Engineering notation is like scientific notation but the exponent is always a multiple of 3 and the coefficient can be between 1 and 1000, matching SI prefixes like kilo and mega."}},{"@type":"Question","name":"How do I convert a decimal to scientific notation?","acceptedAnswer":{"@type":"Answer","text":"Move the decimal point until you have one non-zero digit to its left. The number of moves is the exponent n; moves to the left make n positive, moves to the right make n negative. For 0.00042 you move the decimal 4 places right, giving 4.2 × 10⁻⁴."}},{"@type":"Question","name":"Does this calculator handle negative numbers and zero?","acceptedAnswer":{"@type":"Answer","text":"Yes. Negative numbers keep their sign in the coefficient. Zero has no standard scientific notation form because there is no non-zero leading digit, so the tool reports zero as 0 × 10⁰ by convention."}}]}</script>

<script>
GZI18n.register({
  en:{
    toolTitle:'Scientific Notation Calculator',
    toolDesc:'Convert any number to scientific notation, E-notation, and engineering notation. Handles very large and very small numbers instantly with a clear breakdown.',
    lblNum:'Enter a number (e.g. 300000000, 0.00042, 6.022e23)',
    convert:'⚡ Convert',copy:'Copy',clear:'Clear',
    sciLabel:'Scientific notation',
    eLabel:'E-notation',
    engLabel:'Engineering notation',
    decLabel:'Decimal',
    exponentLabel:'Exponent n',
    invalid:'Please enter a valid number (digits, decimal point, optional sign, and optional e/E exponent).',
    enterNum:'Enter a number above and press Convert.',
    negative:'negative',
    step1:'Type a number in any format (decimal, scientific, or E-notation)',
    step2:'Press Convert to see all notation forms',
    step3:'Use Copy to grab the result you need',
    step4:'Try tiny numbers like 0.0000001 to see negative exponents',
  },
  zh:{
    toolTitle:'科学计数法计算器',
    toolDesc:'将任意数字转换为科学计数法、E 计数法和工程计数法。即时处理极大或极小的数字，并提供清晰的分解说明。',
    lblNum:'输入数字（如 300000000、0.00042、6.022e23）',
    convert:'⚡ 转换',copy:'复制',clear:'清空',
    sciLabel:'科学计数法',
    eLabel:'E 计数法',
    engLabel:'工程计数法',
    decLabel:'十进制',
    exponentLabel:'指数 n',
    invalid:'请输入有效的数字（数字、小数点、可选正负号和可选的 e/E 指数）。',
    enterNum:'在上方输入数字后点击转换。',
    negative:'负',
    step1:'以任意格式输入数字（十进制、科学计数法或 E 计数法）',
    step2:'点击「转换」查看所有计数法形式',
    step3:'点击「复制」获取所需结果',
    step4:'试试 0.0000001 这样的小数字，查看负指数',
  }
});

const { $, copyText, t } = GZ;

function superscript(n){
  const map={'-':'⁻','0':'⁰','1':'¹','2':'²','3':'³','4':'⁴','5':'⁵','6':'⁶','7':'⁷','8':'⁸','9':'⁹'};
  return String(n).split('').map(c=>map[c]||c).join('');
}

function parseNum(str){
  str=String(str).trim().replace(/,/g,'');
  if(str==='') return NaN;
  // accept forms like 3e8, 3×10^8, 3 * 10^8
  str=str.replace(/[×x]/i,'e').replace(/\s*\*\s*/g,'').replace(/\^/g,'');
  if(/10/i.test(str) && /e/i.test(str)){}
  // handle "3*10^8" already turned to "3108"? no. Better: explicit handling
  return parseFloat(str);
}

function toSci(num){
  if(num===0) return {coef:0,exp:0};
  const neg=num<0; num=Math.abs(num);
  let exp=Math.floor(Math.log10(num));
  let coef=num/Math.pow(10,exp);
  // normalize due to float error
  if(coef>=10){coef/=10;exp++;}
  if(coef<1){coef*=10;exp--;}
  return {coef:neg?-coef:coef,exp};
}

function fmtCoef(n){
  const r=Math.round(n*1e10)/1e10;
  return r.toString();
}

function render(){
  const raw=$('#numInput').value.trim();
  const el=$('#result');
  if(!raw){ el.innerHTML=`<div style="color:var(--text2);text-align:center;padding:1rem">${t('enterNum')}</div>`; return; }
  const num=parseNum(raw);
  if(isNaN(num)){ el.innerHTML=`<div style="color:var(--gz-accent);text-align:center;padding:1rem">${t('invalid')}</div>`; return; }
  const {coef,exp}=toSci(num);
  const sciStr=`${fmtCoef(coef)} × 10${superscript(exp)}`;
  const eStr=`${fmtCoef(coef)}E${exp}`;
  // engineering notation: exponent multiple of 3
  let engExp=exp;
  while(engExp%3!==0){engExp--; }
  // adjust
  let eAdj = Math.floor(exp/3)*3;
  let engCoef = num/Math.pow(10,eAdj);
  let engStr;
  if(num===0){ engStr='0 × 10⁰'; }
  else { engStr=`${fmtCoef(Math.round(engCoef*1e10)/1e10)} × 10${superscript(eAdj)}`; }
  el.innerHTML=`
    <div class="sn-line"><span class="lbl">${t('sciLabel')}</span><span class="val hi">${sciStr}</span></div>
    <div class="sn-line"><span class="lbl">${t('eLabel')}</span><span class="val">${eStr}</span></div>
    <div class="sn-line"><span class="lbl">${t('engLabel')}</span><span class="val">${engStr}</span></div>
    <div class="sn-line"><span class="lbl">${t('decLabel')}</span><span class="val">${num.toPrecision(12).replace(/\.?0+$/,'')}</span></div>
    <div class="sn-line"><span class="lbl">${t('exponentLabel')}</span><span class="val">${exp}</span></div>
    <button class="gz-btn gz-btn-secondary" style="margin-top:12px" onclick="copyText('${sciStr}')">${t('copy')} (${t('sciLabel')})</button>`;
}

$('#calcBtn').addEventListener('click',render);
$('#numInput').addEventListener('input',render);
$('#numInput').addEventListener('keydown',e=>{if(e.key==='Enter')render();});

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="render()">${t('convert')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#numInput').value='';render()">${t('clear')}</button>`;
$('#lbl-num').textContent=t('lblNum');

GZ.renderToolPage({
  category:'calc',
  titleKey:'toolTitle',
  descKey:'toolDesc',
  howToSteps:['step1','step2','step3','step4'],
  related:[
    {icon:'%',href:'/calc/percent-error-calculator.html',name:'Percent Error Calculator'},
    {icon:'➗',href:'/calc/fraction-calculator.html',name:'Fraction Calculator'},
    {icon:'🔢',href:'/convert/number-base.html',name:'Number Base'},
    {icon:'📐',href:'/calc/equation-solver.html',name:'Equation Solver'},
  ]
});
render();
</script>
