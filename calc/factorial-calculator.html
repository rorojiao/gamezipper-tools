<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is a factorial?", "acceptedAnswer": {"@type": "Answer", "text": "A factorial (n!) is the product of all positive integers from 1 to n. For example, 5! = 5 × 4 × 3 × 2 × 1 = 120. By convention, 0! = 1."}}, {"@type": "Question", "name": "How large a number can this calculator handle?", "acceptedAnswer": {"@type": "Answer", "text": "This calculator uses BigInt, so it can handle factorials of very large numbers (hundreds or thousands). The result will be displayed in full, along with the number of digits."}}, {"@type": "Question", "name": "What are trailing zeros in a factorial?", "acceptedAnswer": {"@type": "Answer", "text": "Trailing zeros are the zeros at the end of n!. They are caused by factors of 10 (2×5 pairs). The number of trailing zeros in n! equals the sum of floor(n/5^k) for k=1,2,3,... until 5^k > n."}}, {"@type": "Question", "name": "Is 0! defined?", "acceptedAnswer": {"@type": "Answer", "text": "Yes, 0! = 1 by convention. This is consistent with the combinatorial interpretation: there is exactly one way to arrange zero objects."}}]}</script>

<body>

        <div class="fc-field">

      <div id="error" class="fc-error" style="display:none"></div>

        <div class="fc-prop"><div class="lbl" id="lbl-even"></div><div class="val" id="val-even"></div></div>
        <div class="fc-prop"><div class="lbl" id="lbl-binary-digits"></div><div class="val" id="val-binary-digits"></div></div>
      </div>

  </div>

</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Factorial Calculator',
    toolDesc: 'Calculate the factorial (n!) of any non-negative integer instantly with BigInt precision, digit count, and trailing zero analysis.',
    lblN: 'Enter a number (n)',
    calculate: 'Calculate',
    lblDigits: 'Number of Digits',
    lblTrailing: 'Trailing Zeros',
    lblEven: 'Even / Odd',
    lblBinaryDigits: 'Binary Digits',
    evenYes: 'Even',
    evenNo: 'Odd',
    stepsTitle: 'Step-by-step Calculation',
    stepResult: 'Final result',
    errNegative: 'Please enter a non-negative integer.',
    errTooLarge: 'Please enter a number ≤ 100,000 for reasonable performance.',
    errEmpty: 'Please enter a number.',
    step1: 'Enter a non-negative integer in the input field',
    step2: 'Click "Calculate" to compute n!',
    step3: 'View the full result, digit count, and trailing zeros',
    step4: 'Check the step-by-step breakdown below',
  },
  zh: {
    toolTitle: '阶乘计算器',
    toolDesc: '即时计算任意非负整数的阶乘（n!），使用 BigInt 精度，显示位数和末尾零分析。',
    lblN: '输入数字 (n)',
    calculate: '计算',
    lblDigits: '位数',
    lblTrailing: '末尾零',
    lblEven: '奇偶性',
    lblBinaryDigits: '二进制位数',
    evenYes: '偶数',
    evenNo: '奇数',
    stepsTitle: '逐步计算过程',
    stepResult: '最终结果',
    errNegative: '请输入非负整数。',
    errTooLarge: '请输入 ≤ 100,000 的数字以确保合理性能。',
    errEmpty: '请输入一个数字。',
    step1: '在输入框中输入一个非负整数',
    step2: '点击"计算"按钮计算 n!',
    step3: '查看完整结果、位数和末尾零个数',
    step4: '在下方查看逐步计算过程',
  }
});

const { $, copyText, t } = GZ;

function factorial(n) {
  let result = 1n;
  for (let i = 2n; i <= n; i++) result *= i;
  return result;
}

function trailingZeros(n) {
  let count = 0;
  for (let power = 5; power <= n; power *= 5) count += Math.floor(n / power);
  return count;
}

function calculate() {
  const val = $('#n-input').value.trim();
  if (!val) { showError(t('errEmpty')); return; }
  const n = parseInt(val);
  if (isNaN(n) || n < 0) { showError(t('errNegative')); return; }
  if (n > 100000) { showError(t('errTooLarge')); return; }
  hideError();

  const result = factorial(BigInt(n));
  const resultStr = result.toString();

  // Result display
  $('#result-expr').textContent = `${n}! =`;
  if (resultStr.length <= 30) {
    $('#result-value').textContent = resultStr;
    $('#big-val').style.display = 'none';
  } else {
    $('#result-value').textContent = resultStr.slice(0, 20) + '...' + resultStr.slice(-20);
    $('#big-val').textContent = resultStr;
    $('#big-val').style.display = 'block';
  }
  $('#result-box').style.display = 'block';

  // Properties
  $('#val-digits').textContent = resultStr.length.toLocaleString();
  $('#val-trailing').textContent = n >= 5 ? trailingZeros(n).toLocaleString() : '0';
  $('#val-even').textContent = n >= 2 ? t('evenYes') : t('evenNo');
  $('#val-binary-digits').textContent = result.toString(2).length.toLocaleString();
  $('#props').style.display = 'grid';

  // Steps
  let html = `<div class="step-title">${t('stepsTitle')}</div>`;
  if (n <= 20) {
    let parts = [];
    for (let i = n; i >= 1; i--) parts.push(i);
    html += `<div class="step-line">${n}! = ${parts.join(' × ')}</div>`;
    // Show intermediate products
    if (n <= 12) {
      let prod = 1n;
      for (let i = 1; i <= n; i++) {
        prod *= BigInt(i);
        html += `<div class="step-line">${i}! = <span class="step-highlight">${prod}</span></div>`;
      }
    }
  } else {
    html += `<div class="step-line">${n}! = ${n} × ${n-1} × ${n-2} × ... × 2 × 1</div>`;
  }
  html += `<div class="step-line" style="margin-top:6px">→ <span class="step-highlight">${t('stepResult')}: ${resultStr.length <= 60 ? resultStr : resultStr.slice(0, 30) + '...' + resultStr.slice(-30) + ` (${resultStr.length} digits)`}</span></div>`;
  $('#steps').innerHTML = html;
  $('#steps').style.display = 'block';
}

function showError(msg) { $('#error').textContent = msg; $('#error').style.display = 'block'; $('#result-box').style.display='none'; $('#big-val').style.display='none'; $('#props').style.display='none'; $('#steps').style.display='none'; }
function hideError() { $('#error').style.display = 'none'; }
function doClear() { $('#n-input').value=''; $('#result-box').style.display='none'; $('#big-val').style.display='none'; $('#props').style.display='none'; $('#steps').style.display='none'; hideError(); }

$('#n-input').addEventListener('keydown', e => { if (e.key === 'Enter') calculate(); });

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="calculate()">${t('calculate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

$('#lbl-n').textContent = t('lblN');
$('#lbl-digits').textContent = t('lblDigits');
$('#lbl-trailing').textContent = t('lblTrailing');
$('#lbl-even').textContent = t('lblEven');
$('#lbl-binary-digits').textContent = t('lblBinaryDigits');

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🔢', href:'/calc/gcd-lcm-calculator.html', name:'GCD & LCM'},
    {icon:'📊', href:'/calc/permutation.html', name:'Permutation'},
    {icon:'🧮', href:'/calc/math-solver.html', name:'Math Solver'},
    {icon:'📐', href:'/calc/prime-number.html', name:'Prime Number'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
