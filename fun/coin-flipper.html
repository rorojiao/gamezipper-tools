<style>
.cf-stage{display:flex;flex-direction:column;align-items:center;gap:14px;padding:20px;background:linear-gradient(135deg,rgba(255,217,61,.08),rgba(255,107,107,.05));border-radius:14px;min-height:200px;justify-content:center}
.cf-coin{width:140px;height:140px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:2rem;font-weight:900;color:#0a0a1a;position:relative;perspective:600px;cursor:pointer;user-select:none}
.cf-coin-inner{width:100%;height:100%;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:transform .8s cubic-bezier(.25,.8,.25,1);transform-style:preserve-3d;box-shadow:0 8px 30px rgba(0,0,0,.35),inset 0 0 20px rgba(255,255,255,.2)}
.cf-coin.heads .cf-coin-inner{background:linear-gradient(135deg,#ffd93d,#f59e0b);transform:rotateY(0)}
.cf-coin.tails .cf-coin-inner{background:linear-gradient(135deg,#c0c0c0,#7d7d7d);color:#fff;transform:rotateY(0)}
.cf-coin.flipping .cf-coin-inner{animation:cfSpin 1s linear}
@keyframes cfSpin{0%{transform:rotateY(0) rotateX(0)}100%{transform:rotateY(1800deg) rotateX(720deg)}}
.cf-coin-side{position:absolute;width:100%;height:100%;border-radius:50%;display:flex;align-items:center;justify-content:center;backface-visibility:hidden}
.cf-label{font-size:1.4rem;font-weight:900;letter-spacing:1px}
.cf-result{font-size:1.5rem;font-weight:800;min-height:32px;text-align:center;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.cf-options{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;align-items:center;margin-top:6px}
.cf-options input[type=number]{width:80px;padding:8px;border:1px solid var(--border);border-radius:8px;background:rgba(0,0,0,.3);color:var(--text);font-family:monospace;text-align:center}
.cf-options label{color:var(--text2);font-size:.85rem}
.cf-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-top:14px}
.cf-stat{background:var(--glass2);border:1px solid var(--border);border-radius:10px;padding:10px;text-align:center}
.cf-stat .v{font-size:1.5rem;font-weight:900;color:var(--accent);display:block}
.cf-stat .l{color:var(--text2);font-size:.75rem;margin-top:2px}
.cf-bar{height:8px;background:rgba(0,0,0,.3);border-radius:4px;overflow:hidden;display:flex;margin-top:10px}
.cf-bar > div{height:100%;transition:width .4s}
.cf-bar .heads{background:linear-gradient(90deg,#ffd93d,#f59e0b)}
.cf-bar .tails{background:linear-gradient(90deg,#c0c0c0,#7d7d7d)}
.cf-history{max-height:180px;overflow:auto;background:var(--glass2);border:1px solid var(--border);border-radius:8px;padding:10px;font-family:monospace;font-size:.85rem}
.cf-history:empty::before{content:"No flips yet — click the coin!";color:var(--text2);font-style:italic}
.cf-history .row{padding:3px 0;border-bottom:1px solid var(--border);display:flex;justify-content:space-between}
.cf-history .row:last-child{border-bottom:none}
.cf-history .heads-text{color:#ffd93d;font-weight:700}
.cf-history .tails-text{color:#c0c0c0;font-weight:700}
</style>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="cf-stage">
      <div class="cf-coin heads" id="coin" onclick="flipCoin()">
        <div class="cf-coin-inner">
          <div class="cf-coin-side"><div class="cf-label">HEADS</div></div>
        </div>
      </div>
      <div class="cf-result" id="result">Click the coin to flip</div>
      <div class="cf-options">
        <label>Flips: <input type="number" id="count" min="1" max="100" value="1"></label>
      </div>
    </div>
    <div class="cf-stats">
      <div class="cf-stat"><span class="v" id="statTotal">0</span><div class="l">Total Flips</div></div>
      <div class="cf-stat"><span class="v" id="statHeads">0</span><div class="l">Heads (H)</div></div>
      <div class="cf-stat"><span class="v" id="statTails">0</span><div class="l">Tails (T)</div></div>
      <div class="cf-stat"><span class="v" id="statStreak">0</span><div class="l">Current Streak</div></div>
    </div>
    <div class="cf-bar"><div class="heads" id="barHeads" style="width:50%"></div><div class="tails" id="barTails" style="width:50%"></div></div>
    <h3 style="margin:14px 0 6px;font-size:.95rem;color:var(--text2)">📜 History</h3>
    <div class="cf-history" id="history"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Coin Flipper',
    toolDesc: 'Flip a virtual coin online for free. Heads or tails, multi-flip with stats, streak counter and history. Perfect for tie-breakers, games and quick decisions.',
    step1: 'Click the big coin in the center (or set a number of flips)',
    step2: 'Watch the coin spin and land on heads or tails',
    step3: 'Check the running stats and the heads/tails bar',
    step4: 'Browse the history of all your flips below',
    flipN: (n) => `Flip ${n} ×`,
    reset: 'Reset Stats',
    h: 'Heads',
    t: 'Tails',
  },
  zh: {
    toolTitle: '在线抛硬币',
    toolDesc: '免费在线虚拟抛硬币。正面还是反面？支持多次连续抛掷、统计、连胜计数和历史记录。适合平局裁决、游戏和快速决定。',
    step1: '点击中间的大硬币（可先设置抛掷次数）',
    step2: '观看硬币旋转并落在正面或反面',
    step3: '查看累计统计数据和正反面比例条',
    step4: '在下方历史记录中查看所有结果',
    flipN: (n) => `抛 ${n} 次`,
    reset: '重置统计',
    h: '正面',
    t: '反面',
  }
});

const { $, t } = GZ;
let total = 0, heads = 0, tails = 0, streak = 0, lastSide = null, history = [];

function flipCoin() {
  const n = Math.max(1, Math.min(100, parseInt($('#count').value) || 1));
  const coin = $('#coin');
  coin.classList.add('flipping');
  setTimeout(() => coin.classList.remove('flipping'), 1000);

  const rolls = [];
  for (let i = 0; i < n; i++) {
    const side = Math.random() < 0.5 ? 'H' : 'T';
    rolls.push(side);
  }
  // Wait for animation, then show result of last
  setTimeout(() => {
    const last = rolls[rolls.length - 1];
    if (last === 'H') {
      coin.classList.remove('tails'); coin.classList.add('heads');
      coin.querySelector('.cf-coin-inner').innerHTML = '<div class="cf-coin-side"><div class="cf-label">HEADS</div></div>';
    } else {
      coin.classList.remove('heads'); coin.classList.add('tails');
      coin.querySelector('.cf-coin-inner').innerHTML = '<div class="cf-coin-side"><div class="cf-label" style="color:#fff">TAILS</div></div>';
    }
    rolls.forEach(side => {
      total++;
      if (side === 'H') heads++; else tails++;
      if (side === lastSide) { streak++; } else { streak = 1; lastSide = side; }
    });
    const lang = GZI18n.getLang();
    if (n === 1) {
      $('#result').textContent = (last === 'H' ? t('h') : t('t')) + '!';
    } else {
      const h = rolls.filter(x => x === 'H').length;
      const tt = n - h;
      $('#result').textContent = `${h} ${t('h')} · ${tt} ${t('t')}`;
    }
    history.unshift({ rolls, ts: new Date().toLocaleTimeString() });
    if (history.length > 100) history.pop();
    renderStats();
    renderHistory();
  }, 900);
}

function renderStats() {
  $('#statTotal').textContent = total;
  $('#statHeads').textContent = heads;
  $('#statTails').textContent = tails;
  $('#statStreak').textContent = streak + (lastSide === 'H' ? 'H' : lastSide === 'T' ? 'T' : '');
  const pctH = total === 0 ? 50 : (heads / total * 100);
  $('#barHeads').style.width = pctH + '%';
  $('#barTails').style.width = (100 - pctH) + '%';
}

function renderHistory() {
  const lang = GZI18n.getLang();
  $('#history').innerHTML = history.map(h => {
    const hCount = h.rolls.filter(x => x === 'H').length;
    const tCount = h.rolls.length - hCount;
    const items = h.rolls.map(s => `<span class="${s === 'H' ? 'heads-text' : 'tails-text'}">${s}</span>`).join(' ');
    return `<div class="row"><span>${items}</span><span>${hCount}H · ${tCount}T</span><span style="color:var(--text2)">${h.ts}</span></div>`;
  }).join('');
}

function reset() {
  total = 0; heads = 0; tails = 0; streak = 0; lastSide = null; history = [];
  renderStats(); renderHistory();
  $('#result').textContent = 'Click the coin to flip';
  $('#coin').classList.remove('flipping');
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="flipCoin()">${t('flipN')(1)}</button>
  <button class="gz-btn gz-btn-secondary" onclick="reset()">${t('reset')}</button>`;

GZ.renderToolPage({
  category: 'fun',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🎲', href:'/fun/dice-roller.html', name:'Dice Roller'},
    {icon:'🎯', href:'/fun/name-picker.html', name:'Name Picker'},
    {icon:'🎡', href:'/fun/decision-wheel.html', name:'Decision Wheel'},
    {icon:'👥', href:'/fun/team-generator.html', name:'Team Generator'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
