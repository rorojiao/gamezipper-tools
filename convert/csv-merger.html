<script>
GZI18n.register({
  en: {
    toolTitle: 'CSV Merger',
    toolDesc: 'Combine multiple CSV files into one. Stack rows vertically or join side-by-side by a key column. Handles different headers. Free, private, browser-only.',
    dropHint: '📎 Drop CSV files here or click to select',
    merge: 'Merge',

    lblOutDelim: 'Output delimiter:',
    lblOut: 'Merged Output',
    noFiles: 'Add at least one CSV file.',
    result: (f, r) => `✓ Merged ${f} file(s) into ${r} row(s)`,
    step1: 'Drag CSV files into the drop zone, or click to select them',
    step2: 'Choose Stack (vertical) or Join by key (side-by-side) mode',
    step3: 'Click Merge to combine — different headers are unified automatically',
    step4: 'Preview the result and download the merged CSV',
  },
  zh: {
    toolTitle: 'CSV 合并器',
    toolDesc: '将多个 CSV 文件合并为一个。可纵向堆叠行，也可按键列横向拼接。自动处理不同的表头。免费、私密、浏览器本地运行。',
    dropHint: '📎 拖放 CSV 文件到此处，或点击选择',
    merge: '合并',
    download: '下载 CSV',
    clear: '全部清空',
    example: '加载示例',
    modeStack: '纵向堆叠',
    modeJoin: '按键列拼接',
    lblKey: '关键列：',
    lblUnion: '合并表头',
    lblOutDelim: '输出分隔符：',
    lblOut: '合并结果',
    noFiles: '请至少添加一个 CSV 文件。',
    result: (f, r) => `✓ 已将 ${f} 个文件合并为 ${r} 行`,
    step1: '将 CSV 文件拖入拖放区，或点击选择文件',
    step2: '选择「纵向堆叠」或「按键列拼接」模式',
    step3: '点击合并 — 自动统一不同的表头',
    step4: '预览结果并下载合并后的 CSV',
  }
});

let files = []; // {name, text, rows, delim}
const { $, copyText, t } = GZ;

function escapeHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function detectDelim(text) {
  const firstLine = (text.split('\n')[0] || '');
  if (firstLine.includes('\t')) return '\t';
  const semi = (firstLine.match(/;/g) || []).length;
  const pipe = (firstLine.match(/\|/g) || []).length;
  const comma = (firstLine.match(/,/g) || []).length;
  if (semi > comma && semi > pipe) return ';';
  if (pipe > comma && pipe > semi) return '|';
  return ',';
}

function parseCSV(text, delim) {
  const rows = [];
  let row = [], cur = '', inQ = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    if (c === '"') { if (inQ && text[i+1] === '"') { cur += '"'; i++; } else inQ = !inQ; }
    else if (c === delim && !inQ) { row.push(cur); cur = ''; }
    else if (c === '\n' && !inQ) { row.push(cur); rows.push(row); row = []; cur = ''; }
    else if (c === '\r') {}
    else cur += c;
  }
  if (cur || row.length) { row.push(cur); rows.push(row); }
  return rows.filter(r => !(r.length === 1 && r[0] === ''));
}

function toCSV(rows, delim) {
  return rows.map(r => r.map(v => {
    const s = String(v == null ? '' : v);
    return (s.includes(delim) || s.includes('"') || s.includes('\n') || s.includes('\r')) ? '"' + s.replace(/"/g, '""') + '"' : s;
  }).join(delim)).join('\n');
}

function renderFiles() {
  const wrap = $('#filesList');
  if (!files.length) { wrap.innerHTML = ''; return; }
  wrap.innerHTML = files.map((f, i) => `<div class="file-card">
    <span class="fn">${escapeHtml(f.name)}</span>
    <span class="fr">${f.rows.length} rows</span>
    <button class="gz-btn gz-btn-secondary" style="padding:3px 10px;font-size:.8em" onclick="removeFile(${i})">✕</button>
  </div>`).join('');
}

function removeFile(i) { files.splice(i, 1); renderFiles(); updateKeyOptions(); }

function updateKeyOptions() {
  const sel = $('#keyCol');
  if (!files.length) { sel.innerHTML = ''; return; }
  const header = files[0].rows[0] || [];
  sel.innerHTML = header.map((h, i) => `<option value="${i}">${escapeHtml(h) || 'Col ' + i}</option>`).join('');
}

function addFiles(fileList) {
  const arr = Array.from(fileList);
  let pending = arr.length;
  if (!pending) return;
  arr.forEach(f => {
    const reader = new FileReader();
    reader.onload = e => {
      const text = e.target.result;
      const delim = detectDelim(text);
      const rows = parseCSV(text, delim);
      files.push({ name: f.name, text, rows, delim });
      pending--;
      if (pending === 0) { renderFiles(); updateKeyOptions(); }
    };
    reader.readAsText(f);
  });
}

function doMerge() {
  if (!files.length) { $('#status').innerHTML = `<span style="color:var(--gz-accent)">${t('noFiles')}</span>`; return; }
  const outDelimEl = $('#outDelim');
  const outDelim = outDelimEl.value === 'tab' ? '\t' : outDelimEl.value;
  const mode = document.querySelector('input[name="mode"]:checked').value;
  const union = $('#unionHeaders').checked;

  let result;
  if (mode === 'stack') {
    if (union) {
      // Collect all unique headers preserving order
      const allHeaders = [];
      files.forEach(f => { (f.rows[0] || []).forEach(h => { if (!allHeaders.includes(h)) allHeaders.push(h); }); });
      result = [allHeaders];
      files.forEach(f => {
        const h = f.rows[0] || [];
        const idx = h.map(hh => allHeaders.indexOf(hh));
        for (let i = 1; i < f.rows.length; i++) {
          const row = allHeaders.map((_, ci) => {
            const src = idx.indexOf(ci);
            return src >= 0 ? (f.rows[i][src] || '') : '';
          });
          result.push(row);
        }
      });
    } else {
      result = [];
      files.forEach((f, fi) => {
        if (fi === 0) result.push(...f.rows);
        else result.push(...f.rows.slice(1)); // skip subsequent headers
      });
    }
  } else {
    // Join by key
    const keyIdx = parseInt($('#keyCol').value) || 0;
    const allHeaders = [];
    files.forEach((f, fi) => (f.rows[0] || []).forEach((h, hi) => {
      if (fi === 0 || hi !== keyIdx) { const label = fi === 0 ? h : (h + '_' + fi); if (!allHeaders.includes(label)) allHeaders.push(label); }
    }));
    result = [allHeaders];
    // Build lookup from first file
    const lookup = {};
    const order = [];
    files[0].rows.slice(1).forEach(r => {
      const k = r[keyIdx] || '';
      if (!lookup[k]) { lookup[k] = { row: new Array(allHeaders.length).fill(''), }; order.push(k); }
      // fill from first file
      (files[0].rows[0] || []).forEach((h, hi) => {
        const ci = allHeaders.indexOf(hi === keyIdx && files.length > 1 ? h : h);
        if (ci >= 0) lookup[k].row[ci] = r[hi] || '';
      });
    });
    // Fill from other files
    for (let fi = 1; fi < files.length; fi++) {
      const f = files[fi];
      const h = f.rows[0] || [];
      h.forEach((hh, hi) => {
        if (hi === keyIdx) return;
        const label = hh + '_' + fi;
        const ci = allHeaders.indexOf(label);
        f.rows.slice(1).forEach(r => {
          const k = r[keyIdx] || '';
          if (lookup[k] && ci >= 0) lookup[k].row[ci] = r[hi] || '';
        });
      });
    }
    order.forEach(k => result.push(lookup[k].row));
  }

  const out = toCSV(result, outDelim);
  $('#output').textContent = out.split('\n').slice(0, 100).join('\n') + (result.length > 100 ? '\n... (' + result.length + ' rows total)' : '');
  $('#status').innerHTML = `<span style="color:var(--gz-success)">${t('result', files.length, result.length - 1)}</span>`;
  window._mergedCSV = out;
}

function downloadResult() {
  if (!window._mergedCSV) return;
  const blob = new Blob([window._mergedCSV], { type: 'text/csv' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'merged.csv';
  a.click();
  URL.revokeObjectURL(a.href);
}

function loadExample() {
  files = [
    { name: 'employees_us.csv', rows: [['id','name','country'],['1','Alice','US'],['2','Bob','US']], delim: ',' },
    { name: 'employees_uk.csv', rows: [['id','name','country'],['3','Carol','UK'],['4','Dave','UK']], delim: ',' },
  ];
  renderFiles(); updateKeyOptions(); doMerge();
}

function doClear() { files = []; window._mergedCSV = ''; $('#output').textContent = ''; $('#status').innerHTML = ''; renderFiles(); updateKeyOptions(); }

// Wire up
$('#dropZone').textContent = t('dropHint');
$('#dropZone').addEventListener('click', () => $('#fileInput').click());
$('#dropZone').addEventListener('dragover', e => { e.preventDefault(); $('#dropZone').classList.add('drag'); });
$('#dropZone').addEventListener('dragleave', () => $('#dropZone').classList.remove('drag'));
$('#dropZone').addEventListener('drop', e => { e.preventDefault(); $('#dropZone').classList.remove('drag'); addFiles(e.dataTransfer.files); });
$('#fileInput').addEventListener('change', e => { addFiles(e.target.files); e.target.value = ''; });
document.querySelectorAll('input[name="mode"]').forEach(r => r.addEventListener('change', () => {
  $('#keyWrap').style.display = document.querySelector('input[name="mode"]:checked').value === 'join' ? '' : 'none';
}));

$('#lbl-stack').textContent = t('modeStack');
$('#lbl-join').textContent = t('modeJoin');
$('#lbl-key').textContent = t('lblKey');
$('#lbl-union').textContent = t('lblUnion');
$('#lbl-outdelim').textContent = t('lblOutDelim');
$('#lbl-out').textContent = t('lblOut');

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="doMerge()">${t('merge')}</button>
  <button class="gz-btn" onclick="downloadResult()">${t('download')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

GZ.renderToolPage({
  category: 'convert',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'✂️', href:'/convert/csv-splitter.html', name:'CSV Splitter'},
    {icon:'🔗', href:'/convert/csv-joiner.html', name:'CSV Joiner'},
    {icon:'📋', href:'/convert/csv-to-json.html', name:'CSV to JSON'},
    {icon:'🔀', href:'/convert/csv-transpose.html', name:'CSV Transpose'},
  ]
});
</script>
