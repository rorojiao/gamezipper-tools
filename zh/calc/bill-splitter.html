.bs2-layout{display:grid;grid-template-columns:1.4fr 1fr;gap:20px}
@media (max-width:880px){.bs2-layout{grid-template-columns:1fr}}
.bs2-card{background:var(--glass2);border:1px solid var(--border);border-radius:12px;padding:18px}
.bs2-people{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.bs2-person{padding:6px 12px;background:var(--glass);border:1px solid var(--border);border-radius:8px;display:flex;align-items:center;gap:6px;font-size:.88rem;cursor:pointer;transition:all .15s}
.bs2-person.active{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border-color:transparent}
.bs2-person .x{opacity:.5;font-weight:700;cursor:pointer}

.bs2-add-person{padding:6px 10px;background:transparent;border:1px dashed var(--border);border-radius:8px;color:var(--text2);cursor:pointer;font-size:.85rem}
.bs2-items{margin-bottom:14px}
.bs2-item{display:grid;grid-template-columns:1fr 100px auto;gap:8px;align-items:center;margin-bottom:6px}
.bs2-item input[type=text]{padding:8px 10px;background:var(--glass);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:.9rem}
.bs2-item input[type=number]{padding:8px 10px;background:var(--glass);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:.9rem}
.bs2-item .x{background:transparent;border:1px solid var(--border);color:var(--text2);border-radius:6px;width:28px;height:28px;cursor:pointer;font-size:.9rem}
.bs2-item .x:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
.bs2-row{display:flex;justify-content:space-between;align-items:center;margin-top:8px}
.bs2-row input{width:80px;padding:6px 8px;background:var(--glass);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:.85rem;text-align:right}
.bs2-add{padding:8px 14px;background:var(--glass);border:1px dashed var(--border);border-radius:8px;color:var(--text2);cursor:pointer;font-size:.88rem;width:100%;transition:all .15s}
.bs2-add:hover{border-color:var(--accent);color:var(--accent)}
.bs2-summary{background:var(--glass2);border:1px solid var(--border);border-radius:12px;padding:18px;display:flex;flex-direction:column;gap:8px}
.bs2-line{display:flex;justify-content:space-between;font-size:.9rem;padding:4px 0}
.bs2-line.total{font-size:1.1rem;font-weight:800;border-top:1px solid var(--border);padding-top:10px;margin-top:6px;color:var(--accent)}
.bs2-line.sub{color:var(--text2)}
.bs2-split-list{margin-top:10px;display:flex;flex-direction:column;gap:6px}
.bs2-split-row{display:flex;justify-content:space-between;align-items:center;background:var(--glass);border:1px solid var(--border);border-radius:8px;padding:10px 12px}
.bs2-split-row .name{font-weight:600;font-size:.92rem}
.bs2-split-row .amt{color:var(--accent);font-weight:800;font-size:1rem}
.bs2-mode{display:flex;gap:6px;margin-bottom:10px}
.bs2-mode-btn{flex:1;padding:8px;background:var(--glass);border:1px solid var(--border);border-radius:8px;cursor:pointer;font-size:.85rem;font-weight:600;transition:all .15s}
.bs2-mode-btn.active{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border-color:transparent}
.bs2-info{font-size:.78rem;color:var(--text2);margin-top:8px;line-height:1.5}
.bs2-assign{margin-top:10px;display:flex;flex-wrap:wrap;gap:4px}
.bs2-assign-chip{padding:4px 8px;background:var(--glass);border:1px solid var(--border);border-radius:6px;cursor:pointer;font-size:.75rem;transition:all .15s}
.bs2-assign-chip.on{background:var(--accent);color:#fff;border-color:var(--accent)}

<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "How do I split a bill among multiple people?", "acceptedAnswer": {"@type": "Answer", "text": "Add the people sharing the bill, enter each item and its cost, set tax and tip percentages, and the tool divides everything automatically. Each person can be assigned specific items, or the bill can be split equally."}}, {"@type": "Question", "name": "Can I assign specific items to specific people?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. Click on any item to expand its assignment chips — toggle which people ordered that item. The cost is then shared only among those people, which is fair when one person didn't order the steak."}}, {"@type": "Question", "name": "Does tax and tip get split fairly?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. Tax and tip are calculated as a percentage of the total bill and then distributed to each person proportional to their share of the pre-tax subtotal. This way someone who only had a $5 salad doesn't pay the same tip as the person who ordered a $40 entrée."}}, {"@type": "Question", "name": "Is my data private?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. The bill splitter runs entirely in your browser. No data is sent to a server, and nothing is saved between page reloads."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="bs2-layout">
      <div class="bs2-card">
        <h3 style="margin:0 0 12px;font-size:1rem">👥 People</h3>
        <div class="bs2-people" id="people"></div>
        <div style="display:flex;gap:6px;margin-bottom:18px">
          <input type="text" id="newPerson" placeholder="Add person..." style="flex:1;padding:8px 10px;background:var(--glass);border:1px solid var(--border);border-radius:8px;color:var(--text)">
          <button class="gz-btn gz-btn-secondary" id="addPersonBtn">+ Add</button>
        </div>

        <h3 style="margin:0 0 12px;font-size:1rem">🧾 Items</h3>
        <div class="bs2-items" id="items"></div>
        <button class="bs2-add" id="addItem">+ Add Item</button>

        <div style="margin-top:18px;display:grid;grid-template-columns:1fr 1fr;gap:12px">
          <div>
            <label style="display:block;font-size:.8rem;color:var(--text2);margin-bottom:4px">Tax (%)</label>
            <input type="number" id="tax" value="0" min="0" step="0.1" style="width:100%;padding:8px 10px;background:var(--glass);border:1px solid var(--border);border-radius:8px;color:var(--text)">
          </div>
          <div>
            <label style="display:block;font-size:.8rem;color:var(--text2);margin-bottom:4px">Tip (%)</label>
            <input type="number" id="tip" value="18" min="0" step="0.1" style="width:100%;padding:8px 10px;background:var(--glass);border:1px solid var(--border);border-radius:8px;color:var(--text)">
          </div>
        </div>
      </div>
      <div class="bs2-summary">
        <h3 style="margin:0 0 8px;font-size:1rem">💰 Summary</h3>
        <div class="bs2-mode">
          <div class="bs2-mode-btn active" data-mode="equal">Equal split</div>
          <div class="bs2-mode-btn" data-mode="item">By item</div>
        </div>
        <div class="bs2-line sub"><span>Subtotal</span><span id="subtotal">$0.00</span></div>
        <div class="bs2-line sub"><span>Tax (<span id="taxPct">0</span>%)</span><span id="taxAmt">$0.00</span></div>
        <div class="bs2-line sub"><span>Tip (<span id="tipPct">18</span>%)</span><span id="tipAmt">$0.00</span></div>
        <div class="bs2-line total"><span>Total</span><span id="total">$0.00</span></div>
        <h4 style="margin:14px 0 6px;font-size:.9rem">Per Person</h4>
        <div class="bs2-split-list" id="splitList"></div>
        <p class="bs2-info">Tip and tax are distributed proportionally based on each person's share of the pre-tax subtotal. Toggle Equal split to ignore item assignments and divide the total evenly.</p>
      </div>
    </div>
    <div class="gz-toolbar" id="toolbar"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>

<script>
GZI18n.register({
  en: {
    toolTitle: 'Bill Splitter',
    toolDesc: 'Split the bill with friends easily. Add people, items, tax and tip — the calculator distributes everything fairly, even with item-level assignments.',
    step1: 'Add the people sharing the bill (use the input + button, or load the sample)',
    step2: 'Enter each item and its cost. Optionally click an item to assign it to specific people',
    step3: 'Set the tax and tip percentages — they distribute proportionally to each person\'s subtotal',
    step4: 'Switch between Equal split and By item mode in the summary panel',
  },
  zh: {
    toolTitle: '账单分摊器',
    toolDesc: '轻松与朋友分摊账单。添加人员、商品、税费和小费 — 工具会按比例公平分配所有内容，支持按商品指定归属。',
    step1: '添加共同分摊账单的人员（使用输入框和按钮，或加载示例）',
    step2: '输入每个商品和价格。可点击商品将其分配给指定的人',
    step3: '设置税费和小费百分比 — 它们会按每个人税前小计的比例分配',
    step4: '在汇总面板中切换「平均分摊」和「按商品」模式',
  }
});

const { $, $$ } = GZ;

let people = [];
let items = [];
let mode = 'equal';
let nextId = 1;

function addPerson(name) {
  people.push({ id: nextId++, name });
  render();
}
function addItem(name = '', price = 0) {
  items.push({ id: nextId++, name, price, assigned: people.map(p => p.id) });
  render();
}
function removePerson(id) {
  people = people.filter(p => p.id !== id);
  items.forEach(it => { it.assigned = it.assigned.filter(a => a !== id); });
  render();
}
function removeItem(id) {
  items = items.filter(i => i.id !== id);
  render();
}
function toggleAssign(itemId, personId) {
  const it = items.find(i => i.id === itemId);
  if (!it) return;
  if (it.assigned.includes(personId)) it.assigned = it.assigned.filter(a => a !== personId);
  else it.assigned.push(personId);
  render();
}
function fmt(n) { return '$' + (Math.round(n * 100) / 100).toFixed(2); }

function render() {
  // People
  $('#people').innerHTML = people.map(p => `<div class="bs2-person">${p.name}<span class="x" data-rm-person="${p.id}">×</span></div>`).join('') +
    (people.length === 0 ? '<span style="color:var(--text2);font-size:.85rem">No people yet</span>' : '');

  // Items
  $('#items').innerHTML = items.map(it => {
    const chips = people.map(p => `<div class="bs2-assign-chip ${it.assigned.includes(p.id) ? 'on' : ''}" data-toggle-assign="${it.id},${p.id}">${p.name}</div>`).join('');
    return `<div class="bs2-item" style="grid-template-columns:1fr 100px auto">
      <input type="text" placeholder="Item name" value="${it.name.replace(/"/g, '&quot;')}" data-edit-name="${it.id}">
      <input type="number" placeholder="0.00" step="0.01" min="0" value="${it.price}" data-edit-price="${it.id}">
      <button class="x" data-rm-item="${it.id}">×</button>
    </div>
    ${people.length > 0 ? `<div class="bs2-assign">${chips}</div>` : ''}`;
  }).join('') + (items.length === 0 ? '<p style="color:var(--text2);font-size:.85rem">No items yet — add some below</p>' : '');

  // Summary
  const subtotal = items.reduce((s, it) => s + (+it.price || 0), 0);
  const taxPct = +$('#tax').value || 0;
  const tipPct = +$('#tip').value || 0;
  const taxAmt = subtotal * taxPct / 100;
  const tipAmt = subtotal * tipPct / 100;
  const total = subtotal + taxAmt + tipAmt;
  $('#subtotal').textContent = fmt(subtotal);
  $('#taxAmt').textContent = fmt(taxAmt);
  $('#tipAmt').textContent = fmt(tipAmt);
  $('#total').textContent = fmt(total);
  $('#taxPct').textContent = taxPct;
  $('#tipPct').textContent = tipPct;

  // Per person
  if (people.length === 0) {
    $('#splitList').innerHTML = '<p style="color:var(--text2);font-size:.85rem">Add people to see the split</p>';
  } else {
    let result;
    if (mode === 'equal') {
      const per = total / people.length;
      result = people.map(p => ({ name: p.name, amt: per }));
    } else {
      // Per-person subtotal from assigned items
      const perSubtotal = {};
      people.forEach(p => perSubtotal[p.id] = 0);
      items.forEach(it => {
        if (it.assigned.length === 0) return;
        const share = (+it.price || 0) / it.assigned.length;
        it.assigned.forEach(pid => perSubtotal[pid] += share);
      });
      const totalSub = Object.values(perSubtotal).reduce((s, v) => s + v, 0);
      result = people.map(p => {
        const sub = perSubtotal[p.id];
        const share = totalSub > 0 ? sub / totalSub : 1 / people.length;
        return { name: p.name, amt: sub + (taxAmt + tipAmt) * share };
      });
    }
    $('#splitList').innerHTML = result.map(r =>
      `<div class="bs2-split-row"><span class="name">${r.name}</span><span class="amt">${fmt(r.amt)}</span></div>`
    ).join('');
    // Sanity check
    const sum = result.reduce((s, r) => s + r.amt, 0);
    if (Math.abs(sum - total) > 0.01) {
      // rounding adjustment on the largest
      const max = result.reduce((a, b) => a.amt > b.amt ? a : b);
      max.amt += (total - sum);
    }
  }
}

// Event delegation
document.body.addEventListener('click', e => {
  const t = e.target;
  const rmP = t.getAttribute('data-rm-person');
  const rmI = t.getAttribute('data-rm-item');
  const tgA = t.getAttribute('data-toggle-assign');
  if (rmP) removePerson(+rmP);
  else if (rmI) removeItem(+rmI);
  else if (tgA) {
    const [iid, pid] = tgA.split(',').map(Number);
    toggleAssign(iid, pid);
  }
});
document.body.addEventListener('input', e => {
  const t = e.target;
  const en = t.getAttribute('data-edit-name');
  const ep = t.getAttribute('data-edit-price');
  if (en !== null) {
    const it = items.find(i => i.id === +en);
    if (it) it.name = t.value;
    return; // don't re-render while typing name
  }
  if (ep !== null) {
    const it = items.find(i => i.id === +ep);
    if (it) it.price = +t.value || 0;
    render();
  }
});
['tax','tip'].forEach(id => $('#' + id).addEventListener('input', render));

$('#addPersonBtn').addEventListener('click', () => {
  const v = $('#newPerson').value.trim();
  if (v) { addPerson(v); $('#newPerson').value = ''; }
});
$('#newPerson').addEventListener('keydown', e => { if (e.key === 'Enter') $('#addPersonBtn').click(); });
$('#addItem').addEventListener('click', () => addItem());

document.querySelectorAll('.bs2-mode-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.bs2-mode-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    mode = btn.dataset.mode;
    render();
  });
});

$('#toolbar').innerHTML = `
  <button class="gz-btn gz-btn-secondary" onclick="reset()">Reset</button>
  <button class="gz-btn" onclick="loadSample()">Load Sample</button>
  <button class="gz-btn" onclick="GZ.copyText($('#splitList').innerText)">Copy Results</button>`;

function reset() { people = []; items = []; render(); }
function loadSample() {
  people = []; items = []; nextId = 1;
  addPerson('Alice'); addPerson('Bob'); addPerson('Charlie');
  addItem('Pizza', 18);
  addItem('Pasta', 14);
  addItem('Salad', 8);
  addItem('Drinks', 12);
  addItem('Dessert', 9);
  $('#tax').value = 8;
  $('#tip').value = 18;
  render();
}

loadSample();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'💵', href:'/calc/tip-calculator.html', name:'Tip Calculator'},
    {icon:'💰', href:'/calc/percentage-calculator.html', name:'Percentage Calculator'},
    {icon:'🧾', href:'/text/invoice-generator.html', name:'Invoice Generator'},
    {icon:'💱', href:'/convert/currency-converter.html', name:'Currency Converter'},
  ]
});
</script>
<script>new Image().src="https://site-analytics.gamezipper.com/hit?s=tools.gamezipper.com&p="+encodeURIComponent(location.pathname);</script>
<script src="/tools-result-rec.js" defer></script>
</body>
