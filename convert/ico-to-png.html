    toolDesc: '将 ICO 图标文件转换为 PNG 图片。上传 .ico 文件，预览并逐一下载其中嵌入的每种尺寸为 PNG — 也可一键打包 ZIP。完全浏览器本地运行。',
    dropText: '拖入 .ico 文件或点击选择',
    zip: '全部下载为 ZIP',
    reset: '换一个',
    download: '下载 PNG',
    statusDone: '✓ 已提取 {n} 张图片',
    statusErr: '✗ 错误：',
    errInvalid: '不是有效的 ICO/CUR 文件',
    step1: '拖入或上传 .ico（或 .cur）图标文件',
    step2: '工具会解析其中嵌入的每种尺寸',

    step4: '单独下载 PNG 或全部打包为 ZIP',

const { $, t } = GZ;
let images = []; // { width, height, dataUrl, pngBlob, size }
let baseName = 'favicon';

$('#dropText').textContent = t('dropText');
$('#lblZip').textContent = t('zip');
$('#lblReset').textContent = t('reset');

['dragenter','dragover'].forEach(ev => $('#dropzone').addEventListener(ev, e => { e.preventDefault(); $('#dropzone').classList.add('dragover'); }));
['dragleave','drop'].forEach(ev => $('#dropzone').addEventListener(ev, e => { e.preventDefault(); $('#dropzone').classList.remove('dragover'); }));
$('#dropzone').addEventListener('drop', e => { if (e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]); });
$('#fileIn').addEventListener('change', e => { if (e.target.files[0]) loadFile(e.target.files[0]); });
$('#zipBtn').addEventListener('click', downloadZip);
$('#resetBtn').addEventListener('click', reset);

async function loadFile(file) {
  images = [];
  $('#grid').innerHTML = '';
  $('#status').textContent = '';
  $('#status').className = 'ip-status';
  try {
    baseName = file.name.replace(/\.(ico|cur)$/i, '') || 'favicon';
    const buf = new Uint8Array(await file.arrayBuffer());
    if (buf.length < 6) throw new Error(t('errInvalid'));
    const reserved = buf[0] | (buf[1] << 8);
    const type = buf[2] | (buf[3] << 8);
    const count = buf[4] | (buf[5] << 8);
    if (reserved !== 0 || (type !== 1 && type !== 2) || count === 0) throw new Error(t('errInvalid'));
    const dv = new DataView(buf.buffer);
    let off = 6;
    const entries = [];
    for (let i = 0; i < count && off + 16 <= buf.length; i++) {
      let w = buf[off]; if (w === 0) w = 256;
      let h = buf[off + 1]; if (h === 0) h = 256;
      const size = dv.getUint32(off + 8, true);
      const imgOff = dv.getUint32(off + 12, true);
      entries.push({ w, h, size, imgOff });
      off += 16;
    }
    for (const e of entries) {
      if (e.imgOff + e.size > buf.length) continue;
      const chunk = buf.subarray(e.imgOff, e.imgOff + e.size);
      let pngUrl = null;
      // PNG-embedded entry
      const isPng = chunk.length >= 4 && chunk[0] === 0x89 && chunk[1] === 0x50 && chunk[2] === 0x4E && chunk[3] === 0x47;
      if (isPng) {
        pngUrl = URL.createObjectURL(new Blob([chunk], { type: 'image/png' }));
      } else {
        pngUrl = await bmpToPngUrl(chunk, e.w, e.h);
      }
      if (!pngUrl) continue;
      const blob = await (await fetch(pngUrl)).blob();
      images.push({ width: e.w, height: e.h, dataUrl: pngUrl, pngBlob: blob, size: blob.size });
    }
    images.sort((a, b) => b.width - a.width);
    renderGrid();
    $('#status').textContent = t('statusDone').replace('{n}', images.length);
    $('#status').className = 'ip-status ok';
    $('#bulkActions').style.display = 'flex';
  } catch (e) {
    $('#status').textContent = t('statusErr') + e.message;
    $('#status').className = 'ip-status err';
  }
}

async function bmpToPngUrl(buf, w, h) {
  // BMP DIB header for ICO: height field is doubled (XOR + AND mask). Parse 32-bit BGRA or 24-bit or palette.
  try {
    const dv = new DataView(buf.buffer, buf.byteOffset, buf.byteLength);
    const headerSize = dv.getUint32(0, true);
    let bpp;
    if (headerSize >= 40) bpp = dv.getUint16(14, true);
    else bpp = 0;
    const canvas = document.createElement('canvas');
    canvas.width = w; canvas.height = h;
    const ctx = canvas.getContext('2d');
    const imgData = ctx.createImageData(w, h);
    const data = imgData.data;
    let stride;
    if (bpp === 32) stride = w * 4;
    else if (bpp === 24) stride = ((Math.floor((w * 3 + 3) / 4)) * 4);
    else return null; // palette + 1/4/8 bpp not supported in this minimal path
    const colorStart = headerSize;
    for (let y = 0; y < h; y++) {
      const srcRow = colorStart + (h - 1 - y) * stride;
      const dstRow = y * w * 4;
      for (let x = 0; x < w; x++) {
        if (bpp === 32) {
          const s = srcRow + x * 4;
          data[dstRow + x * 4] = buf[s + 2];     // R
          data[dstRow + x * 4 + 1] = buf[s + 1]; // G
          data[dstRow + x * 4 + 2] = buf[s];     // B
          data[dstRow + x * 4 + 3] = buf[s + 3]; // A
        } else {
          const s = srcRow + x * 3;
          data[dstRow + x * 4] = buf[s + 2];
          data[dstRow + x * 4 + 1] = buf[s + 1];
          data[dstRow + x * 4 + 2] = buf[s];
          data[dstRow + x * 4 + 3] = 255;
        }
      }
    }
    ctx.putImageData(imgData, 0, 0);
    return new Promise(resolve => canvas.toBlob(b => resolve(URL.createObjectURL(b)), 'image/png'));
  } catch { return null; }
}

function renderGrid() {
  $('#grid').innerHTML = images.map((im, i) => `
    <div class="ip-card">
      <div class="frame"><img src="${im.dataUrl}" alt="${im.width}x${im.height}"></div>
      <div class="dim">${im.width} × ${im.height}</div>
      <div class="sz">PNG · ${(im.size / 1024).toFixed(1)} KB</div>
      <button class="gz-btn" onclick="downloadOne(${i})">${t('download')}</button>
    </div>`).join('');
}

function downloadOne(i) {
  const im = images[i];
  if (!im) return;
  const a = document.createElement('a');
  a.href = im.dataUrl;
  a.download = `${baseName}-${im.width}x${im.height}.png`;
  document.body.appendChild(a); a.click(); a.remove();
}

async function downloadZip() {
  if (!images.length) return;
  const zip = new JSZip();
  for (const im of images) {
    zip.file(`${baseName}-${im.width}x${im.height}.png`, im.pngBlob);
  }
  const blob = await zip.generateAsync({ type: 'blob' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `${baseName}-png-set.zip`;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

function reset() {
  images.forEach(im => { try { URL.revokeObjectURL(im.dataUrl); } catch {} });
  images = [];
  $('#fileIn').value = '';
  $('#grid').innerHTML = '';
  $('#status').textContent = '';
  $('#status').className = 'ip-status';
  $('#bulkActions').style.display = 'none';
}

</script>
