    optCsv2: '逗号 (CSV)', optTsv2: '制表符 (TSV)', optSemi2: '分号 ;', optPipe2: '竖线 |', optCustom2: '自定义…',
    optJsonArr: 'JSON（数组的数组）', optJsonObj: 'JSON（对象数组）',
    convertBtn: '转换', status: '✓ {rows} 行 · {cols} 列',
    lblIn: '输入', lblOut: '输出',
    step1: '将分隔数据粘贴到输入框',
    step2: '选择源分隔符（或自动检测）和目标格式',

});

const { $, copyText, t } = GZ;

function initLabels(){
  $('#lblFrom').textContent=t('lblFrom'); $('#lblTo').textContent=t('lblTo');
  $('#lblCustomFrom').textContent=t('lblCustomFrom'); $('#lblCustomTo').textContent=t('lblCustomTo');
  $('#optAuto').textContent=t('optAuto'); $('#optCsv').textContent=t('optCsv'); $('#optTsv').textContent=t('optTsv');
  $('#optSemi').textContent=t('optSemi'); $('#optPipe').textContent=t('optPipe'); $('#optCustom').textContent=t('optCustom');
  $('#optCsv2').textContent=t('optCsv2'); $('#optTsv2').textContent=t('optTsv2'); $('#optSemi2').textContent=t('optSemi2');
  $('#optPipe2').textContent=t('optPipe2'); $('#optCustom2').textContent=t('optCustom2');
  $('#optJsonArr').textContent=t('optJsonArr'); $('#optJsonObj').textContent=t('optJsonObj');
  $('#convertBtn').textContent=t('convertBtn');
  $('#lblIn').textContent=t('lblIn'); $('#lblOut').textContent=t('lblOut');
  const ex = 'name,city,note\n"Smith, John",New York,"likes, commas"\nJane Doe,"San Francisco","say ""hi"""\nLee Wei,上海,多行\n"line one\nline two"';
  $('#input').placeholder = ex;
}

function realDelim(v){
  if(v === 'auto') return null;
  if(v === 'custom') return $('#customFrom').value || '';
  if(v === '\\t' || v === '\t') return '\t';
  return v;
}

function parse(text, delim){
  // auto detect
  if(delim === null){
    const cands = [',','\t',';','|'];
    let best=',', bestScore=-1;
    for(const c of cands){
      const lines = text.split(/\r?\n/).slice(0,10);
      const counts = lines.map(l => countUnquoted(l, c));
      const avg = counts.reduce((a,b)=>a+b,0)/(counts.length||1);
      // consistency: variance low
      const mean = avg; const variance = counts.reduce((a,b)=>a+(b-mean)**2,0)/(counts.length||1);
      if(avg > 0 && variance < 0.6 && avg > bestScore){ bestScore = avg; best = c; }
    }
    delim = best;
  }
  const rows = [];
  let row = [], field = '', inQ = false;
  for(let i=0; i<text.length; i++){
    const ch = text[i];
    if(inQ){
      if(ch === '"'){
        if(text[i+1] === '"'){ field += '"'; i++; }
        else inQ = false;
      } else field += ch;
    } else {
      if(ch === '"'){ inQ = true; }
      else if(ch === delim){ row.push(field); field=''; }
      else if(ch === '\n'){ row.push(field); rows.push(row); row=[]; field=''; }
      else if(ch === '\r'){ /* skip */ }
      else field += ch;
    }
  }
  // last field/row
  if(field.length || row.length){ row.push(field); rows.push(row); }
  // trim trailing fully-empty rows
  while(rows.length && rows[rows.length-1].length===1 && rows[rows.length-1][0].trim()==='') rows.pop();
  return { rows, delim };
}

function countUnquoted(line, delim){
  let inQ=false, n=0;
  for(const ch of line){ if(ch==='"') inQ=!inQ; else if(ch===delim && !inQ) n++; }
  return n;
}

function escField(val, delim){
  const needs = val.indexOf(delim)>=0 || val.indexOf('\n')>=0 || val.indexOf('\r')>=0 || val.indexOf('"')>=0;
  if(!needs) return val;
  return '"' + val.replace(/"/g,'""') + '"';
}

function convert(){
  const inp = $('#input').value;
  if(!inp.trim()){ $('#output').value=''; $('#status').textContent=''; $('#preview').innerHTML=''; return; }
  const fromVal = $('#from').value;
  const { rows, delim } = parse(inp, realDelim(fromVal));
  const toVal = $('#to').value;
  let out = '';
  if(toVal === 'json'){
    out = JSON.stringify(rows, null, 2);
  } else if(toVal === 'jsonobj'){
    const hdr = rows[0] || [];
    const obj = rows.slice(1).map(r => {
      const o = {}; hdr.forEach((h,i)=> o[h] = r[i] !== undefined ? r[i] : ''); return o;
    });
    out = JSON.stringify(obj, null, 2);
  } else {
    let od = toVal === 'custom' ? ($('#customTo').value || ',')
           : toVal === '\\t' ? '\t'
           : toVal;
    out = rows.map(r => r.map(v => escField(v, od)).join(od)).join('\n');
  }
  $('#output').value = out;
  const cols = rows.reduce((m,r)=>Math.max(m,r.length),0);
  const stat = t('status').replace('{rows}', rows.length).replace('{cols}', cols);
  const autoNote = fromVal==='auto' ? ' (auto: "'+(delim==='\t'?'TAB':delim)+'")' : '';
  $('#status').innerHTML = `<span style="color:var(--gz-success,#00d672)">${stat}</span><span style="color:var(--text3)">${autoNote}</span>`;
  renderPreview(rows, toVal === 'jsonobj');
}

function renderPreview(rows, asObj){
  if(!rows.length){ $('#preview').innerHTML=''; return; }
  let header, body;
  if(asObj){ header = rows[0]; body = rows.slice(1); }
  else { header = rows[0].map((_,i)=>`col ${i+1}`); body = rows; }
  const esc = s => String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;');
  $('#preview').innerHTML = `<table><thead><tr>${header.map(h=>`<th>${esc(h)}</th>`).join('')}</tr></thead>
    <tbody>${body.slice(0,200).map(r=>`<tr>${header.map((_,i)=>`<td>${esc(r[i])}</td>`).join('')}</tr>`).join('')}</tbody></table>`;
}

function loadExample(){
  $('#from').value = ','; $('#to').value = '|';
  $('#input').value = 'name,email,role\n"Alice, A.",alice@example.com,admin\nBob "B" Lee,bob@example.com,"editor, writer"\nCarla,carla@example.com,viewer';
  convert();
}
function copyOut(){ copyText($('#output').value); }
function downloadOut(){
  const v = $('#output').value; if(!v) return;
  const toVal = $('#to').value;
  const ext = toVal==='json'||toVal==='jsonobj' ? 'json' : toVal==='\\t' ? 'tsv' : 'csv';
  const blob = new Blob([v], {type:'text/plain'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob); a.download = 'converted.'+ext; a.click();
}
window.convert=convert; window.loadExample=loadExample; window.copyOut=copyOut; window.downloadOut=downloadOut;

$('#input').addEventListener('input', convert);

initLabels();

});
</script>
