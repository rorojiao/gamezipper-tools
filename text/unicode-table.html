let currentList = [];
let selectedCode = null;

function initBlockSelect() {
  $('#block').innerHTML = `<option value="">${t('allBlocks')}</option>` +
    blocks.map((b,i) => `<option value="${i}">${b.name} (${b.start.toString(16).toUpperCase()}\u2013${b.end.toString(16).toUpperCase()})</option>`).join('');
}

function buildList() {
  const search = $('#search').value.trim().toLowerCase();
  const blockIdx = $('#block').value;
  let arr = [];
  if (blockIdx !== '') {
    const b = blocks[+blockIdx];
    for (let c = b.start; c <= b.end; c++) arr.push(c);
  } else if (/^[0-9a-f]{2,6}$/i.test(search)) {
    // code point search
    const cp = parseInt(search, 16);
    for (let c = Math.max(0x20, cp-32); c <= cp+32; c++) {
      if (c <= 0x1FAFF) arr.push(c);
    }
  } else if (search) {
    // search common blocks by name
    const ranges = [[0x0020,0x007F],[0x00A0,0x04FF],[0x2000,0x2BFF],[0x3000,0x303F],[0xFF00,0xFFEF],[0x1F300,0x1FAFF]];
    for (const [s,e] of ranges) {
      for (let c = s; c <= e; c++) {
        const ch = String.fromCodePoint(c);
        let name = '';
        try { name = (String.prototype.codePointAt ? '' : ''); } catch(e){}
        // cheap name matching via char itself + common keyword sets
        const desc = describeChar(c, ch);
        if (desc && desc.toLowerCase().includes(search)) arr.push(c);
        if (arr.length > 600) break;
      }
      if (arr.length > 600) break;
    }
  } else {
    // default: arrows + common symbols
    for (let c = 0x2190; c <= 0x22FF; c++) arr.push(c);
  }
  currentList = arr;
  renderGrid();
}

  [0x1F60A,'smiling face smiling eyes'],[0x1F60D,'heart eyes face'],[0x1F618,'kiss face'],
  [0x1F61C,'winking face tongue'],[0x1F61E,'disappointed face'],[0x1F620,'angry face'],
  [0x1F622,'crying face tear'],[0x1F62D,'loudly crying face'],[0x1F631,'screaming face'],

function describeChar(code, ch) {
  const found = keywordMap.find(k => k[0] === code);
  if (found) return found[1];
  return '';
}

function renderGrid() {
  if (currentList.length === 0) {
    $('#grid').innerHTML = `<div style="grid-column:1/-1;text-align:center;color:var(--text2);padding:40px">${t('noResults')}</div>`;
    return;
  }
  // cap display for performance
  const display = currentList.slice(0, 1500);
  $('#grid').innerHTML = display.map(c => {
    const ch = String.fromCodePoint(c);
    return `<div class="unicode-cell${c===selectedCode?' active':''}" onclick="selectChar(${c})" title="U+${c.toString(16).toUpperCase().padStart(4,'0')}">${ch}</div>`;
  }).join('');
}

function selectChar(code) {
  selectedCode = code;
  const ch = String.fromCodePoint(code);
  const hex = 'U+' + code.toString(16).toUpperCase().padStart(4,'0');
  const utf8 = [];
  const buf = new TextEncoder().encode(ch);
  for (const b of buf) utf8.push(b.toString(16).toUpperCase().padStart(2,'0'));
  const b = blocks.find(b => code >= b.start && code <= b.end);
  const desc = describeChar(code, ch) || t('selected');
  $('#info').innerHTML = `
    <span class="char">${ch}</span>
    <div class="meta"><b>${t('codePoint')}:</b> ${hex}<br><b>${t('utf8')}:</b> ${utf8.join(' ')}<br><b>${t('block')}:</b> ${b?b.name:'\u2014'}</div>
    <div class="meta"><b>${t('name')}:</b> ${desc}</div>
    <button class="gz-btn" onclick="copySelected()">${t('copy')}</button>`;
  renderGrid();
}

function copySelected() {
  if (selectedCode === null) return;
  copyText(String.fromCodePoint(selectedCode));
}

function doSearch() { buildList(); }

$('#toolbar').innerHTML = `<button class="gz-btn gz-btn-secondary" onclick="copySelected()">${t('copy')}</button>`;
$('#search').placeholder = t('searchPlaceholder');
initBlockSelect();
