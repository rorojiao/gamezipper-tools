<script>
GZI18n.register({
  en: {
    toolTitle: 'SVG Blob Generator',
    toolDesc: 'Generate random, smooth SVG blob shapes for modern web design. Customize complexity, color, size and randomness.',
    lblPoints: 'Complexity (Points)',
    lblRandomness: 'Randomness',
    lblSize: 'Size (px)',
    lblFill: 'Fill Color',
    lblStroke: 'Stroke',
    lblStrokeColor: 'Stroke Color',
    optNone: 'None',
    optSolid: 'Solid',
    generate: '🎲 Generate',
    copySVG: '📋 Copy SVG',
    downloadSVG: '⬇ Download SVG',
    step1: 'Adjust complexity, randomness and size sliders',
    step2: 'Pick a fill color and optional stroke',
    step3: 'Click Generate to create a new random blob',
    step4: 'Copy the SVG code or download as SVG file',
  },
  zh: {
    toolTitle: 'SVG Blob 生成器',
    toolDesc: '生成随机、平滑的 SVG Blob 形状，用于现代网页设计。自定义复杂度、颜色、大小和随机性。',
    lblPoints: '复杂度（控制点数）',
    lblRandomness: '随机度',
    lblSize: '尺寸 (px)',
    lblFill: '填充颜色',
    lblStroke: '描边',
    lblStrokeColor: '描边颜色',
    optNone: '无',
    optSolid: '实线',
    generate: '🎲 生成',
    copySVG: '📋 复制 SVG',
    downloadSVG: '⬇ 下载 SVG',
    step1: '调整复杂度、随机度和大小滑块',
    step2: '选择填充颜色和可选描边',
    step3: '点击「生成」创建新的随机 Blob',
    step4: '复制 SVG 代码或下载 SVG 文件',
  }
});

const { $, copyText, t } = GZ;

// Labels
$('#lbl-points').textContent = t('lblPoints');
$('#lbl-randomness').textContent = t('lblRandomness');
$('#lbl-size').textContent = t('lblSize');
$('#lbl-fill').textContent = t('lblFill');
$('#lbl-stroke').textContent = t('lblStroke');
$('#lbl-stroke-color').textContent = t('lblStrokeColor');
$('#opt-none').textContent = t('optNone');
$('#opt-solid').textContent = t('optSolid');

function generateBlobPath(numPoints, randomness, size) {
  const cx = size / 2;
  const cy = size / 2;
  const baseRadius = size * 0.35;
  const angleStep = (Math.PI * 2) / numPoints;
  const randomFactor = randomness / 100;

  const points = [];
  for (let i = 0; i < numPoints; i++) {
    const angle = angleStep * i - Math.PI / 2;
    const r = baseRadius * (1 - randomFactor * 0.5 + Math.random() * randomFactor);
    points.push({
      x: cx + r * Math.cos(angle),
      y: cy + r * Math.sin(angle)
    });
  }

  // Generate smooth path using cubic bezier
  let path = `M ${points[0].x.toFixed(2)} ${points[0].y.toFixed(2)}`;

  for (let i = 0; i < numPoints; i++) {
    const curr = points[i];
    const next = points[(i + 1) % numPoints];
    const next2 = points[(i + 2) % numPoints];
    const prev = points[(i - 1 + numPoints) % numPoints];

    const tension = 0.4;
    const cp1x = curr.x + (next.x - prev.x) * tension;
    const cp1y = curr.y + (next.y - prev.y) * tension;
    const cp2x = next.x - (next2.x - curr.x) * tension;
    const cp2y = next.y - (next2.y - curr.y) * tension;

    path += ` C ${cp1x.toFixed(2)} ${cp1y.toFixed(2)}, ${cp2x.toFixed(2)} ${cp2y.toFixed(2)}, ${next.x.toFixed(2)} ${next.y.toFixed(2)}`;
  }

  path += ' Z';
  return path;
}

function generate() {
  const numPoints = parseInt($('#points').value);
  const randomness = parseInt($('#randomness').value);
  const size = parseInt($('#size').value);
  const fillColor = $('#fillColor').value;
  const strokeOption = $('#stroke').value || document.getElementById('strokeOption').value;
  const strokeColor = $('#strokeColor').value;

  const path = generateBlobPath(numPoints, randomness, size);

  let strokeAttr = '';
  if (strokeOption === 'solid') {
    strokeAttr = ` stroke="${strokeColor}" stroke-width="2"`;
  }

  const svg = `<svg viewBox="0 0 ${size} ${size}" xmlns="http://www.w3.org/2000/svg"><path d="${path}" fill="${fillColor}"${strokeAttr}/></svg>`;
  $('#preview').innerHTML = svg;
  $('#svgCode').value = svg;
}

// Slider value display
$('#points').addEventListener('input', function() {
  $('#points-val').textContent = this.value;
  generate();
});
$('#randomness').addEventListener('input', function() {
  $('#randomness-val').textContent = this.value + '%';
  generate();
});
$('#size').addEventListener('input', generate);
$('#fillColor').addEventListener('input', generate);
$('#strokeColor').addEventListener('input', generate);
document.getElementById('strokeOption').addEventListener('change', generate);

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="generate()">${t('generate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="copyText($('#svgCode').value)">${t('copySVG')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="downloadSVG()">${t('downloadSVG')}</button>`;

function downloadSVG() {
  const svgCode = $('#svgCode').value;
  if (!svgCode) return;
  const blob = new Blob([svgCode], { type: 'image/svg+xml' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'blob.svg';
  a.click();
  URL.revokeObjectURL(url);
}

// Initial generation
generate();

GZ.renderToolPage({
  category: 'css',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],

    {icon:'🔲', href:'/css-tools/shadow.html', name:'Box Shadow'},
  ]
});
</script>
