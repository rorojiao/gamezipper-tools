<script>
GZI18n.register({
  en: {
    toolTitle: 'Free Bio Link Maker',
    toolDesc: 'Create a Linktree-style bio link page with avatar, multiple links, gradient background and custom button styles. Download a phone-sized PNG for your Instagram, TikTok or Twitter bio. Free, no signup, no watermark.',
    download: 'Download PNG',
    randomize: 'Random Theme',
    lblName: 'Display Name', lblTagline: 'Tagline', lblAvatar: 'Avatar (optional)',
    lblTheme: 'Theme', lblBtnStyle: 'Button Style',
    lblC1: 'Custom Color 1', lblC2: 'Custom Color 2',
    lblLinks: 'Links (one label + URL per line)',
    step1: 'Type your @username and a short tagline',
    step2: 'Optionally upload an avatar photo',
    step3: 'List your links — one label and URL per line',
    step4: 'Pick a theme and button style, then Download PNG',
  },
  zh: {
    toolTitle: '免费个人主页链接生成器',
    toolDesc: '制作 Linktree 风格的个人主页链接页面，包含头像、多个链接、渐变背景和自定义按钮样式。下载手机尺寸 PNG，用于 Instagram、TikTok、Twitter 简介位。免费、无水印、无需注册。',
    download: '下载 PNG',
    randomize: '随机主题',
    lblName: '显示名称', lblTagline: '个性签名', lblAvatar: '头像（可选）',
    lblTheme: '主题', lblBtnStyle: '按钮样式',
    lblC1: '自定义颜色 1', lblC2: '自定义颜色 2',
    lblLinks: '链接（每行一个标题 + 网址）',
    step1: '输入 @用户名 和简短签名',
    step2: '可选：上传头像图片',
    step3: '列出链接 — 每行一个标题加网址',
    step4: '选择主题和按钮样式，然后下载 PNG',
  }
});

const { $, t } = GZ;

const THEMES = {
  sunset: ['#ee0979', '#ff6a00'],
  ocean: ['#2193b0', '#6dd5ed'],
  purple: ['#8e2de2', '#4a00e0'],
  forest: ['#134e5e', '#71b280'],
  candy: ['#fc5c7d', '#ffa17f'],
  dark: ['#232526', '#414345'],
  gold: ['#bf953f', '#fcf6ba'],
  custom: ['#ee0979', '#ff6a00'],
};

let avatarImg = null;

function roundRect(ctx,x,y,w,h,r){
  if(typeof r==='number')r={tl:r,tr:r,br:r,bl:r};
  ctx.beginPath();
  ctx.moveTo(x+r.tl,y);
  ctx.lineTo(x+w-r.tr,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r.tr);
  ctx.lineTo(x+w,y+h-r.br);ctx.quadraticCurveTo(x+w,y+h,x+w-r.br,y+h);
  ctx.lineTo(x+r.bl,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r.bl);
  ctx.lineTo(x,y+r.tl);ctx.quadraticCurveTo(x,y,x+r.tl,y);
  ctx.closePath();
}

function parseLinks(){
  const raw = $('#links').value.split('\n');
  const out = [];
  for(let i=0;i<raw.length;i++){
    const line = raw[i].trim();
    if(!line) continue;
    if(/^https?:\/\//.test(line) && out.length){
      out[out.length-1].url = line;
    } else {
      out.push({label: line, url: ''});
    }
  }
  return out.filter(l=>l.label);
}

function render(){
  const c=$('#canvas'),ctx=c.getContext('2d');
  const W=c.width,H=c.height;
  const theme=$('#theme').value;
  const [c1,c2]=THEMES[theme]||[$('#color1').value,$('#color2').value];
  const realC1 = theme==='custom'?$('#color1').value:c1;
  const realC2 = theme==='custom'?$('#color2').value:c2;
  const btnStyle=$('#btnStyle').value;

  // Background gradient
  const grad=ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,realC1);grad.addColorStop(1,realC2);
  ctx.fillStyle=grad;ctx.fillRect(0,0,W,H);

  // Soft decorative circles
  ctx.fillStyle='rgba(255,255,255,0.06)';
  ctx.beginPath();ctx.arc(W*0.85,80,80,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(W*0.1,H*0.55,120,0,Math.PI*2);ctx.fill();

  const cx=W/2;
  // Avatar
  const avR=72, avY=120;
  if(avatarImg){
    ctx.save();
    ctx.beginPath();ctx.arc(cx,avY,avR,0,Math.PI*2);ctx.closePath();ctx.clip();
    const iw=avatarImg.width, ih=avatarImg.height;
    const s=Math.max(avR*2/iw, avR*2/ih);
    ctx.drawImage(avatarImg, cx-avR*iw*s/(iw*s), avY-avR*ih*s/(ih*s), iw*s, ih*s);
    ctx.restore();
    // Recompute with proper aspect
    ctx.save();
    ctx.beginPath();ctx.arc(cx,avY,avR,0,Math.PI*2);ctx.closePath();ctx.clip();
    const scale=Math.max(avR*2/iw, avR*2/ih);
    const dw=iw*scale, dh=ih*scale;
    ctx.drawImage(avatarImg, cx-dw/2, avY-dh/2, dw, dh);
    ctx.restore();
  } else {
    // Default avatar circle with initial
    ctx.fillStyle='rgba(255,255,255,0.25)';
    ctx.beginPath();ctx.arc(cx,avY,avR,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#fff';
    ctx.font='700 60px Arial, sans-serif';
    ctx.textAlign='center';ctx.textBaseline='middle';
    const initial=($('#name').value||'?').replace('@','').charAt(0).toUpperCase()||'?';
    ctx.fillText(initial,cx,avY);
  }
  // Avatar ring
  ctx.strokeStyle='rgba(255,255,255,0.6)';ctx.lineWidth=3;
  ctx.beginPath();ctx.arc(cx,avY,avR+4,0,Math.PI*2);ctx.stroke();

  // Name
  ctx.fillStyle='#fff';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.font='800 30px Arial, sans-serif';
  ctx.fillText($('#name').value||'@username', cx, avY+avR+34);

  // Tagline
  ctx.font='400 17px Verdana, sans-serif';
  ctx.globalAlpha=0.9;
  ctx.fillText($('#tagline').value||'', cx, avY+avR+66);
  ctx.globalAlpha=1;

  // Links
  const links=parseLinks();
  const btnH=54, btnW=W-90, btnX=(W-btnW)/2;
  let y=avY+avR+110;
  const radius = btnStyle==='square'?4:btnStyle==='rounded'?16:btnStyle==='pill'?27:12;

  links.forEach(l=>{
    if(y+btnH > H-30) return;
    // Button
    if(btnStyle==='outline'){
      ctx.strokeStyle='rgba(255,255,255,0.9)';ctx.lineWidth=2;
      roundRect(ctx,btnX,y,btnW,btnH,radius);ctx.stroke();
      ctx.fillStyle='#fff';
    } else {
      ctx.fillStyle='rgba(255,255,255,0.92)';
      roundRect(ctx,btnX,y,btnW,btnH,radius);ctx.fill();
      ctx.fillStyle='#222';
    }
    // Label
    ctx.font='600 18px Arial, sans-serif';
    ctx.textAlign='center';
    let label=l.label;
    while(ctx.measureText(label).width>btnW-60){label=label.slice(0,-2)+'…';}
    ctx.fillText(label, cx, y+btnH/2);
    // Arrow
    ctx.font='18px Arial';
    ctx.textAlign='right';
    ctx.fillText('→', btnX+btnW-22, y+btnH/2);
    y+=btnH+14;
  });
}

function downloadPNG(){
  const link=document.createElement('a');
  const name=($('#name').value||'bio').replace(/[^a-zA-Z0-9]/g,'_').toLowerCase()||'bio';
  link.download=name+'-bio-link.png';
  link.href=$('#canvas').toDataURL('image/png');
  link.click();
}

function onAvatar(e){
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=ev=>{
    const img=new Image();
    img.onload=()=>{avatarImg=img;render();};
    img.src=ev.target.result;
  };
  r.readAsDataURL(f);
}

function randomize(){
  const keys=Object.keys(THEMES).filter(k=>k!=='custom');
  $('#theme').value=keys[Math.floor(Math.random()*keys.length)];
  render();
}

function syncCustom(){
  const isCustom=$('#theme').value==='custom';
  $('#c1wrap').style.display=isCustom?'':'none';
  $('#c2wrap').style.display=isCustom?'':'none';
}

$('#lbl-name').textContent=t('lblName');
$('#lbl-tagline').textContent=t('lblTagline');
$('#lbl-avatar').textContent=t('lblAvatar');
$('#lbl-theme').textContent=t('lblTheme');
$('#lbl-btn-style').textContent=t('lblBtnStyle');
$('#lbl-c1').textContent=t('lblC1');
$('#lbl-c2').textContent=t('lblC2');
$('#lbl-links').textContent=t('lblLinks');

$('#avatar').addEventListener('change',onAvatar);
['name','tagline','color1','color2','links'].forEach(id=>$('#'+id).addEventListener('input',render));
['theme','btnStyle'].forEach(id=>$('#'+id).addEventListener('change',()=>{syncCustom();render();}));

syncCustom();render();

$('#toolbar').innerHTML=`
  <button class="gz-btn" onclick="downloadPNG()">${t('download')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="randomize()">🎨 ${t('randomize')}</button>`;

GZ.renderToolPage({
  category: 'image',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🎨', href:'/image/logo-maker.html', name:'Logo Maker'},
    {icon:'🖼️', href:'/image/poster-maker.html', name:'Poster Maker'},
    {icon:'📢', href:'/image/banner-maker.html', name:'Banner Maker'},
    {icon:'🎫', href:'/image/flyer-maker.html', name:'Flyer Maker'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
