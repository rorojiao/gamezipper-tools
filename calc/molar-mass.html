const { $, t } = GZ;

// Atomic masses (IUPAC 2021 values, g/mol)
const ATOMIC = {
  H:1.008, He:4.0026, Li:6.94, Be:9.0122, B:10.81, C:12.011, N:14.007, O:15.999, F:18.998, Ne:20.180,
  Na:22.990, Mg:24.305, Al:26.982, Si:28.085, P:30.974, S:32.06, Cl:35.45, Ar:39.948, K:39.098, Ca:40.078,
  Sc:44.956, Ti:47.867, V:50.942, Cr:51.996, Mn:54.938, Fe:55.845, Co:58.933, Ni:58.693, Cu:63.546, Zn:65.38,
  Ga:69.723, Ge:72.63, As:74.922, Se:78.971, Br:79.904, Kr:83.798, Rb:85.468, Sr:87.62, Y:88.906, Zr:91.224,
  Nb:92.906, Mo:95.95, Tc:98, Ru:101.07, Rh:102.91, Pd:106.42, Ag:107.87, Cd:112.41, In:114.82, Sn:118.71,
  Sb:121.76, Te:127.60, I:126.90, Xe:131.29, Cs:132.91, Ba:137.33, La:138.91, Ce:140.12, Pr:140.91, Nd:144.24,
  Pm:145, Sm:150.36, Eu:151.96, Gd:157.25, Tb:158.93, Dy:162.50, Ho:164.93, Er:167.26, Tm:168.93, Yb:173.05,
  Lu:174.97, Hf:178.49, Ta:180.95, W:183.84, Re:186.21, Os:190.23, Ir:192.22, Pt:195.08, Au:196.97, Hg:200.59,
  Tl:204.38, Pb:207.2, Bi:208.98, Po:209, At:210, Rn:222, Fr:223, Ra:226, Ac:227, Th:232.04, Pa:231.04, U:238.03
};

// Parse formula into {element: count}. Handles parentheses and hydrates (CuSO4·5H2O).
function parseFormula(formula) {
  formula = formula.replace(/[·•*]/g, '.').replace(/\s+/g, '').replace(/[\[\]]/g, m => m === '[' ? '(' : ')');
  // Split on TOP-LEVEL dots (hydrate separators), keeping parens intact
  const segs = []; let depth = 0, cur = '';
  for (const ch of formula) {
    if (ch === '(') depth++;
    if (ch === ')') depth--;
    if (ch === '.' && depth === 0) { segs.push(cur); cur = ''; }
    else cur += ch;
  }
  segs.push(cur);
  const counts = {};
  for (const seg of segs) {
    if (!seg) continue;
    const m = seg.match(/^(\d+)/);
    const mult = m ? parseInt(m[1], 10) : 1;
    const rest = m ? seg.slice(m[1].length) : seg;
    const c = parseSegment(rest);
    for (const k in c) counts[k] = (counts[k] || 0) + c[k] * mult;
  }
  return counts;
}

// Parse a single segment (no dots) with recursive-descent + parens
function parseSegment(s) {
  let i = 0; const len = s.length;
  function readNumber() { let n = ''; while (i < len && /[0-9]/.test(s[i])) { n += s[i]; i++; } return n === '' ? 1 : parseInt(n, 10); }
  function parseGroup() {
    const counts = {};
    while (i < len) {
      const ch = s[i];
      if (ch === '(') {
        i++; const inner = parseGroup();
        if (s[i] !== ')') throw new Error('Missing ")"');
        i++; const m = readNumber();
        for (const k in inner) counts[k] = (counts[k] || 0) + inner[k] * m;
      } else if (ch === ')') {
        break;
      } else if (/[A-Z]/.test(ch)) {
        let sym = ch; i++;
        if (i < len && /[a-z]/.test(s[i])) { sym += s[i]; i++; }
        if (ATOMIC[sym] === undefined) throw new Error(t('errUnknown').replace('{el}', sym));
        const m = readNumber();
        counts[sym] = (counts[sym] || 0) + m;
      } else {
        throw new Error(t('errParse'));
      }
    }
    return counts;
  }
  const r = parseGroup();
  if (i < len) throw new Error(t('errParse'));
  return r;
}

function prettyFormula(formula) {
  // turn H2O into H₂O with subscripts
  return formula.replace(/[·•*]/g, '·').replace(/\s+/g, '').replace(/(\d+)/g, m => {
    const subs = '₀₁₂₃₄₅₆₇₈₉';
    return m.split('').map(d => subs[+d]).join('');
  });
}

function calculate() {
  const raw = $('#input').value.trim();
  $('#err').textContent = '';
  if (!raw) {
    $('#result').style.display='none'; $('#breakdown-wrap').style.display='none';
    return;
  }
  try {
    const counts = parseFormula(raw);
    const elements = Object.keys(counts).sort();
    let total = 0;
    const rows = elements.map(el => {
      const mass = counts[el] * ATOMIC[el];
      total += mass;
      return { el, count: counts[el], mass };
    });
    $('#result').style.display = 'block';
    $('#r-formula').innerHTML = prettyFormula(raw);
    $('#r-mass').textContent = total.toFixed(3);
    $('#r-label').textContent = t('resultLabel');

    const pct = mass => (mass / total * 100).toFixed(2) + '%';
    let body = rows.map(r => `<tr><td>${r.el}</td><td class="num">${r.count}</td><td class="num">${r.mass.toFixed(3)}</td><td class="num">${pct(r.mass)}</td></tr>`).join('');
    body += `<tr><td>${t('colTotal')}</td><td class="num">—</td><td class="num">${total.toFixed(3)}</td><td class="num">100.00%</td></tr>`;
    $('#breakdown').innerHTML = `<thead><tr><th>${t('colElement')}</th><th class="num">${t('colCount')}</th><th class="num">${t('colMass')}</th><th class="num">${t('colPercent')}</th></tr></thead><tbody>${body}</tbody>`;
    $('#breakdown-wrap').style.display = 'block';
  } catch (e) {
    $('#err').textContent = '✗ ' + e.message;
    $('#result').style.display='none'; $('#breakdown-wrap').style.display='none';
  }
}

const examples = ['H2O','NaCl','C6H12O6','Ca(NO3)2','CuSO4·5H2O','H2SO4','CH3COOH','Fe2O3'];
$('#chips').innerHTML = examples.map(c => `<span class="chip" onclick="pick('${c}')">${c}</span>`).join('');
function pick(c) { $('#input').value = c; calculate(); }
function loadExample() { $('#input').value = 'C6H12O6'; calculate(); }
function doClear() { $('#input').value=''; calculate(); }

$('#input').addEventListener('input', calculate);
$('#toolbar').innerHTML = `
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

});
calculate();
</script>
