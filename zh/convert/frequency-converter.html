</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Frequency Converter',
    toolDesc: 'Convert between hertz (Hz), mHz, kHz, MHz, GHz, THz, RPM, rad/s and deg/s — instantly, free and private.',
    swap: 'Swap',
    clear: 'Clear',
    copy: 'Copy',
    step1: 'Enter a frequency value',
    step2: 'Pick the source unit (From)',
    step3: 'Pick the target unit (To)',
    step4: 'The result and conversion factor update instantly',
  },
  zh: {
    toolTitle: '频率单位转换器',
    toolDesc: '在赫兹 (Hz)、毫赫、千赫 (kHz)、兆赫 (MHz)、吉赫 (GHz)、太赫、RPM、弧度/秒和度/秒之间转换 — 即时、免费且私密。',
    swap: '交换',
    clear: '清除',
    copy: '复制',
    step1: '输入一个频率值',
    step2: '选择源单位（从）',
    step3: '选择目标单位（到）',
    step4: '结果和换算系数即时更新',
  }
});

const { $, copyText, t } = GZ;

// Base unit: hertz (cycles per second)
const UNITS = [
  { id: 'mhz',  label: 'Millihertz (mHz)', zh: '毫赫兹 (mHz)', factor: 0.001 },
  { id: 'hz',   label: 'Hertz (Hz)',       zh: '赫兹 (Hz)',    factor: 1 },
  { id: 'khz',  label: 'Kilohertz (kHz)',  zh: '千赫兹 (kHz)', factor: 1e3 },
  { id: 'mhz2', label: 'Megahertz (MHz)',  zh: '兆赫兹 (MHz)', factor: 1e6 },
  { id: 'ghz',  label: 'Gigahertz (GHz)',  zh: '吉赫兹 (GHz)', factor: 1e9 },
  { id: 'thz',  label: 'Terahertz (THz)',  zh: '太赫兹 (THz)', factor: 1e12 },
  { id: 'rpm',  label: 'Revolutions / min (RPM)', zh: '转每分 (RPM)', factor: 1/60 },
  { id: 'rads', label: 'Radian / sec (rad/s)',    zh: '弧度每秒 (rad/s)', factor: 1/(2*Math.PI) },
  { id: 'degs', label: 'Degree / sec (°/s)',      zh: '度每秒 (°/s)',     factor: 1/360 },
];

const lang = GZI18n.getLang();
const opts = UNITS.map(u => `<option value="${u.id}">${lang === 'zh' ? u.zh : u.label}</option>`).join('');

$('#converter').innerHTML = `
  <div class="gz-converter-row">
    <input type="number" id="inputVal" placeholder="0" step="any" oninput="convert()">
    <select id="fromUnit" onchange="convert()">${opts}</select>
  </div>
  <div class="gz-converter-row" style="justify-content:center">
    <button class="gz-btn gz-btn-secondary" onclick="swapUnits()">⇅ ${t('swap')}</button>
  </div>
  <div class="gz-converter-row">
    <input type="text" id="outputVal" readonly>
    <select id="toUnit" onchange="convert()">${opts}</select>
  </div>
  <div id="formulaDisplay" style="margin-top:8px;font-size:.85em;opacity:.7"></div>
`;

$('#fromUnit').value = 'hz';
$('#toUnit').value = 'rpm';

function fmt(n) {
  if (!isFinite(n)) return '';
  return parseFloat(n.toPrecision(12)).toString();
}

function convert() {
  const val = parseFloat($('#inputVal').value);
  if (isNaN(val)) { $('#outputVal').value = ''; $('#formulaDisplay').textContent = ''; return; }
  const from = UNITS.find(u => u.id === $('#fromUnit').value);
  const to = UNITS.find(u => u.id === $('#toUnit').value);
  const inHz = val * from.factor;
  const result = inHz / to.factor;
  $('#outputVal').value = fmt(result);
  const ratio = from.factor / to.factor;
  $('#formulaDisplay').textContent = `1 ${from.id} = ${fmt(ratio)} ${to.id}`;
}

function swapUnits() {
  const f = $('#fromUnit').value;
  $('#fromUnit').value = $('#toUnit').value;
  $('#toUnit').value = f;
  convert();
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="copyText($('#outputVal').value)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#inputVal').value='';$('#outputVal').value='';$('#formulaDisplay').textContent=''">${t('clear')}</button>
`;

convert();

GZ.renderToolPage({
  category: 'convert',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🎸', href:'/fun/guitar-tuner.html', name:'Guitar Tuner'},
    {icon:'⏱️', href:'/fun/metronome.html', name:'Metronome'},
    {icon:'🎵', href:'/fun/bpm-tapper.html', name:'BPM Tapper'},
    {icon:'📶', href:'/convert/data-rate.html', name:'Data Rate'},
  ]
});
</script>
