<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is a GSTIN?", "acceptedAnswer": {"@type": "Answer", "text": "A GSTIN (Goods and Services Tax Identification Number) is a 15-character unique identifier assigned to every registered business in India under the GST regime. It is based on the state code, PAN and an entity number."}}, {"@type": "Question", "name": "How is the GSTIN checksum verified?", "acceptedAnswer": {"@type": "Answer", "text": "Each GSTIN ends with a check digit derived from the preceding 14 characters using a base-36 modulo algorithm. This tool recomputes that check digit and compares it to confirm the number was not mistyped."}}, {"@type": "Question", "name": "Does this tool check if a GST number is registered?", "acceptedAnswer": {"@type": "Answer", "text": "No. It validates the structure and checksum offline. To confirm a GSTIN is active with the government, use the official GST portal search, which requires network access to tax authority servers."}}, {"@type": "Question", "name": "Is it safe to paste my GST number here?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. All validation happens locally in your browser. Nothing you type is sent to any server or stored anywhere."}}]}</script>

<script>

    panType: 'PAN Type', panTypeC:'Company', panTypeP:'Person', panTypeH:'HUF', panTypeF:'Firm/LLP', panTypeA:'AOP', panTypeT:'Trust', panTypeB:'BOI', panTypeL:'Local Authority', panTypeJ:'Juridical',

  },
  zh: {
    gstTitle: 'GST 验证器 — GSTIN 号码校验与解析',
    gstDesc: '校验印度 GSTIN：检查 15 位格式、验证校验位、解析州代码、PAN 和实体类型。完全在浏览器本地运行。',
    lookup: '校验', enter: '请输入 15 位 GSTIN。',
    valid: 'GSTIN 有效 ✓', invalid: 'GSTIN 无效 ✗',
    state: '州', stateCode: '州代码', pan: 'PAN（10 位）', entityType: '实体编号', zDigit: 'Z（默认）', checkDigit: '校验位', checkOk: '校验位匹配', checkBad: '校验位不匹配',
    entityNote: '1 = 主要业务；2–9 = 同一 PAN 在同一州的附加注册。',
    panType: 'PAN 类型', panTypeC:'公司', panTypeP:'个人', panTypeH:'印度教家族', panTypeF:'合伙/LLP', panTypeA:'协会', panTypeT:'信托', panTypeB:'BOI', panTypeL:'地方当局', panTypeJ:'法人',
    fmtLen: '必须为 15 位字母数字字符。',
    step1: '输入或粘贴 15 位 GSTIN',
    step2: '校验随输入即时运行',
    step3: '查看有效性、校验位、州和解析出的 PAN',
    step4: '复制报告用于开票或存档',
  }
});

const { $, copyText, t } = GZ;

// Indian state codes (GST)
const STATES = {
  '01':'Jammu & Kashmir','02':'Himachal Pradesh','03':'Punjab','04':'Chandigarh',
  '05':'Uttarakhand','06':'Haryana','07':'Delhi','08':'Rajasthan','09':'Uttar Pradesh',
  '10':'Bihar','11':'Sikkim','12':'Arunachal Pradesh','13':'Nagaland','14':'Manipur',
  '15':'Mizoram','16':'Tripura','17':'Meghalaya','18':'Assam','19':'West Bengal',
  '20':'Jharkhand','21':'Odisha','22':'Chhattisgarh','23':'Madhya Pradesh','24':'Gujarat',
  '25':'Daman & Diu','26':'Dadra & Nagar Haveli and Daman & Diu','27':'Maharashtra',
  '28':'Andhra Pradesh (Old)','29':'Karnataka','30':'Goa','31':'Lakshadweep',
  '32':'Kerala','33':'Tamil Nadu','34':'Puducherry','35':'Andaman & Nicobar Islands',
  '36':'Telangana','37':'Andhra Pradesh','38':'Ladakh','97':'Other Territory / Centre'
};

const PAN_4TH = { C:'panTypeC', P:'panTypeP', H:'panTypeH', F:'panTypeF', A:'panTypeA', T:'panTypeT', B:'panTypeB', L:'panTypeL', J:'panTypeJ' };

// GSTIN checksum algorithm (base-36)
function gstChecksum(g14){
  const c='0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ';
  const f='0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ'; // place-value factor chars
  // factor pattern: 1 and 2 alternating, but GST uses a specific place factor
  const factor = [1,2,1,2,1,2,1,2,1,2,1,2,1,2];
  let sum=0;
  for(let i=0;i<14;i++){
    let code = g14[i].toUpperCase();
    let val = c.indexOf(code);
    let prod = val * factor[i];
    sum += Math.floor(prod/36) + (prod%36);
  }
  const checkVal = (36 - (sum%36)) % 36;
  return c[checkVal];
}

function lookup(){
  const raw=$('#gst-input').value.trim().toUpperCase();
  const res=$('#result'); const st=$('#status');
  if(!raw){ res.innerHTML=''; st.innerHTML=`<span style="opacity:.7">${t('enter')}</span>`; return; }
  if(raw.length!==15 || !/^[0-9A-Z]{15}$/.test(raw)){
    res.innerHTML='';
    st.innerHTML=`<span class="badge badge-bad">${t('invalid')}</span> <span style="opacity:.7">${t('fmtLen')}</span>`;
    return;
  }
  const stateCode=raw.slice(0,2);
  const pan=raw.slice(2,12);
  const entity=raw[12];
  const z=raw[13];
  const check=raw[14];
  const computedCheck=gstChecksum(raw.slice(0,14));
  const ok = computedCheck===check;
  const stateName=STATES[stateCode]||('Unknown ('+stateCode+')');
  const pan4=pan[3];
  const panTypeKey=PAN_4TH[pan4];
  const panType = panTypeKey ? t(panTypeKey) : '—';

  st.innerHTML = ok ? `<span class="badge badge-ok">${t('valid')}</span>`
                    : `<span class="badge badge-bad">${t('invalid')}</span> <span style="opacity:.7">${t('checkBad')}</span>`;

  // Color-coded segments
  const seg=(txt,label)=>`<span class="seg">${txt}<small>${label}</small></span>`;
  res.innerHTML = `
    <div class="gst-card">
      <div class="gst-seg">
        ${seg(stateCode,t('stateCode'))}${seg(pan,t('pan'))}${seg(entity,t('entityType'))}${seg(z,t('zDigit'))}${seg(check,t('checkDigit'))}
      </div>
      <div class="gst-row"><span class="k">${t('state')}</span><span class="v">${stateCode} — ${stateName}</span></div>
      <div class="gst-row"><span class="k">${t('pan')}</span><span class="v">${pan}</span></div>
      <div class="gst-row"><span class="k">${t('panType')}</span><span class="v">${panType}</span></div>
      <div class="gst-row"><span class="k">${t('entityType')}</span><span class="v">${entity}</span></div>
      <div class="gst-row"><span class="k">${t('zDigit')}</span><span class="v">${z}</span></div>
      <div class="gst-row"><span class="k">${t('checkDigit')}</span><span class="v">${check} <span style="opacity:.7">(${t('computed')||'computed'}: ${computedCheck}) — ${ok?t('checkOk'):t('checkBad')}</span></span></div>
      <div style="margin-top:8px;font-size:.78em;opacity:.7">${t('entityNote')}</div>
    </div>`;
}

$('#gst-input').addEventListener('input', lookup);

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="lookup()">${t('lookup')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="GZ.copyText($('#result').innerText)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#gst-input').value='';lookup()">${t('clear')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#gst-input').value='29AAACR5055K1Z3';lookup()">${t('example')}</button>`;

  ]
});
</script>
