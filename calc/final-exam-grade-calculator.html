<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "How do I calculate what I need on my final exam?", "acceptedAnswer": {"@type": "Answer", "text": "Use the formula: required final score = (target grade - current grade x (1 - final weight)) / final weight, where final weight is a decimal (e.g. 25% = 0.25). This calculator applies that formula instantly so you know the exact score to aim for."}}, {"@type": "Question", "name": "What does the final exam weight mean?", "acceptedAnswer": {"@type": "Answer", "text": "The final exam weight is how much of your overall course grade the final is worth. Check your syllabus — a common value is 20% or 25%. If your final is worth 25% of the grade, everything else (homework, midterms) is worth the remaining 75%."}}, {"@type": "Question", "name": "Can I use letter grades instead of percentages?", "acceptedAnswer": {"@type": "Answer", "text": "This calculator uses percentages for accuracy, but you can switch the target grade to a letter (A, B, C) and it maps to a typical percentage scale. For precise results, enter your school's exact percentage for each letter."}}, {"@type": "Question", "name": "What if the required score is over 100%?", "acceptedAnswer": {"@type": "Answer", "text": "If the calculator shows you need more than 100% on the final, the target grade is mathematically out of reach with the current setup. You would need extra credit, a curved grade, or to adjust your target to a realistic level."}}]}</script>

<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">

    <div class="fg-input">
      <label><span id="lblCurrent"></span><input type="number" id="current" value="85" min="0" max="100" step="0.1"></label>
      <label><span id="lblWeight"></span><input type="number" id="weight" value="25" min="1" max="100" step="1"></label>
      <label><span id="lblTarget"></span><input type="number" id="target" value="90" min="0" max="100" step="0.1"></label>
    </div>
    <div class="fg-mode" id="targetMode"></div>
    <div id="result"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: "Final Exam Grade Calculator",
    toolDesc: "Find the exact score you need on your final exam to hit your target course grade. Enter your current grade, the final's weight and your goal.",
    current: "Current grade (%)", weight: "Final exam weight (%)", target: "Target course grade (%)",
    needLabel: "you need on the final exam to reach",
    letterTarget: "Target as letter",
    pctTarget: "Target as %",
    achievable: "✓ Achievable", stretch: "⚡ Stretch goal", outOfReach: "✗ Out of reach",
    maxCourse: "Max course grade (final=100%)", minCourse: "Min course grade (final=0%)",
    weightCheck: "Everything else is worth",
    step1: "Enter your current overall grade as a percentage (e.g. 85)",
    step2: "Enter how much the final exam is worth (e.g. 25 for 25%)",
    step3: "Set your target course grade — as a % or a letter (A, B, C)",
    step4: "Read the exact score you need and whether your goal is realistic",
  },
  zh: {
    toolTitle: "期末考试成绩计算器",
    toolDesc: "计算在期末考试中需要多少分才能达到目标课程总评成绩。输入当前成绩、期末考试占比和目标成绩。",
    current: "当前成绩 (%)", weight: "期末考试占比 (%)", target: "目标课程成绩 (%)",
    needLabel: "你需要期末考这个分数才能达到",
    letterTarget: "目标为字母等级", pctTarget: "目标为百分比",
    achievable: "✓ 可达成", stretch: "⚡ 有挑战", outOfReach: "✗ 无法达到",
    maxCourse: "最高课程成绩（期末=100%）", minCourse: "最低课程成绩（期末=0%）",
    weightCheck: "其余部分占",
    step1: "输入当前总评成绩的百分比（如 85）",
    step2: "输入期末考试的占比（如 25 表示 25%）",
    step3: "设置目标课程成绩 — 百分比或字母等级（A、B、C）",
    step4: "查看所需分数，以及目标是否现实",
  }
});

const { $, t } = GZ;
let mode = "pct";

const LETTERS = { "A+":98, "A":93, "A-":90, "B+":87, "B":83, "B-":80, "C+":77, "C":73, "C-":70, "D+":67, "D":63, "D-":60, "F":50 };

function setLabels(){
  $("#lblCurrent").textContent = t("current");
  $("#lblWeight").textContent = t("weight");
  $("#lblTarget").textContent = t("target");
}
setLabels();

function buildMode(){
  $("#targetMode").innerHTML = `<button class="${mode==='pct'?'active':''}" data-m="pct">${t("pctTarget")}</button><button class="${mode==='letter'?'active':''}" data-m="letter">${t("letterTarget")}</button>` +
    (mode==='letter' ? `<select id="letterSel" style="padding:6px 10px;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--text)">${Object.keys(LETTERS).map(l=>`<option value="${l}">${l} (${LETTERS[l]}%)</option>`).join("")}</select>` : "");
  $("#targetMode").querySelectorAll("button").forEach(b => b.onclick = ()=>{ mode = b.dataset.m; buildMode(); calc(); });
  const sel = $("#letterSel");
  if (sel) sel.onchange = calc;
  const tEl = $("#target");
  tEl.style.display = mode==='pct' ? "" : "none";
  $("#lblTarget").style.display = mode==='pct' ? "" : "none";
}

["current","weight","target"].forEach(id => $("#"+id).addEventListener("input", calc));

function calc(){
  const current = parseFloat($("#current").value);
  const weight = parseFloat($("#weight").value);
  let target;
  if (mode === "letter"){
    const sel = $("#letterSel");
    target = sel ? LETTERS[sel.value] : 90;
  } else {
    target = parseFloat($("#target").value);
  }
  if (isNaN(current) || isNaN(weight) || isNaN(target) || weight <= 0 || weight > 100){
    $("#result").innerHTML = "";
    return;
  }
  const w = weight / 100;
  const need = (target - current * (1 - w)) / w;
  const maxCourse = current * (1 - w) + 100 * w;
  const minCourse = current * (1 - w) + 0 * w;

  let status, statusCls;
  if (need <= 0){ status = t("achievable"); statusCls = "good"; }
  else if (need <= 100){ status = need > 90 ? t("stretch") : t("achievable"); statusCls = need > 90 ? "stretch" : "good"; }
  else { status = t("outOfReach"); statusCls = "bad"; }

  const needTxt = isFinite(need) ? need.toFixed(1) + "%" : "—";
  const targetTxt = mode==='letter' ? ($("#letterSel")?$("#letterSel").value:"A") + " (" + target + "%)" : target + "%";

  $("#result").innerHTML = `
    <div class="fg-hero">
      <div class="need">${needTxt}</div>
      <div class="lbl">${t("needLabel")} <strong>${targetTxt}</strong></div>
      <div class="status">${status}</div>
    </div>
    <div class="fg-grid">
      <div class="fg-card"><div class="value">${maxCourse.toFixed(1)}%</div><div class="label">${t("maxCourse")}</div></div>
      <div class="fg-card"><div class="value">${minCourse.toFixed(1)}%</div><div class="label">${t("minCourse")}</div></div>
      <div class="fg-card"><div class="value">${(100-weight).toFixed(0)}%</div><div class="label">${t("weightCheck")}</div></div>
    </div>`;
}

$("#toolbar").innerHTML = `<button class="gz-btn" onclick="calc()">${t("calculate")||"Calculate"}</button>`;

GZ.renderToolPage({
  category: "calc",
  titleKey: "toolTitle",
  descKey: "toolDesc",
  howToSteps: ["step1","step2","step3","step4"],
  related: [
    {icon:"📊", href:"/calc/grade-calculator.html", name:"Grade Calculator"},
    {icon:"🎓", href:"/calc/gpa-calculator.html", name:"GPA Calculator"},
    {icon:"📈", href:"/calc/pay-raise-calculator.html", name:"Pay Raise"},
    {icon:"💰", href:"/calc/hourly-to-salary-calculator.html", name:"Hourly to Salary"},
  ]
});
buildMode();
calc();
</script>
</body></html>
