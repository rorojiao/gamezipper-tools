<script>
GZI18n.register({
  en: {
    toolTitle: 'RGB to HEX Converter',
    toolDesc: 'Convert RGB color values to HEX codes with live sliders, color preview, and instant copy. Also shows HSL, RGBA, and CMYK.',
    step1: 'Drag the R, G, B sliders to choose your color',
    step2: 'The HEX value updates live in the result box',
    step3: 'Click Copy to grab the HEX code for CSS',
    step4: 'Or paste a HEX code in the manual box to reverse-convert',
    copy: 'Copy',
    copied: 'Copied!',
    manualHex: 'Or enter a HEX value to convert back',
  },
  zh: {
    toolTitle: 'RGB 转 HEX 转换器',
    toolDesc: '通过滑块实时将 RGB 颜色值转换为 HEX 代码，附带颜色预览和一键复制。同时显示 HSL、RGBA 和 CMYK。',
    step1: '拖动 R、G、B 滑块选择颜色',
    step2: 'HEX 值实时显示在结果框中',
    step3: '点击「复制」获取 CSS 可用的 HEX 代码',
    step4: '或在下框粘贴 HEX 代码反向转换',
    copy: '复制',
    copied: '已复制！',
    manualHex: '或输入 HEX 值反向转换',
  }
});
const { $, copyText, t } = GZ;

function rgbToHex(r,g,b){return '#'+[r,g,b].map(x=>(+x).toString(16).padStart(2,'0').toUpperCase()).join('');}
function rgbToHsl(r,g,b){
  r/=255;g/=255;b/=255;
  const max=Math.max(r,g,b),min=Math.min(r,g,b);
  let h,s,l=(max+min)/2;
  if(max===min){h=s=0;}
  else{
    const d=max-min;
    s=l>.5?d/(2-max-min):d/(max+min);
    switch(max){
      case r:h=(g-b)/d+(g<b?6:0);break;
      case g:h=(b-r)/d+2;break;
      case b:h=(r-g)/d+4;break;
    }
    h/=6;
  }
  return [Math.round(h*360),Math.round(s*100),Math.round(l*100)];
}
function rgbToCmyk(r,g,b){
  r/=255;g/=255;b/=255;
  const k=1-Math.max(r,g,b);
  if(k===1)return[0,0,0,100];
  const c=(1-r-k)/(1-k),m=(1-g-k)/(1-k),y=(1-b-k)/(1-k);
  return [Math.round(c*100),Math.round(m*100),Math.round(y*100),Math.round(k*100)];
}

function update(){
  const r=+$('#r').value,g=+$('#g').value,b=+$('#b').value;
  $('#rval').textContent=r;$('#gval').textContent=g;$('#bval').textContent=b;
  const hex=rgbToHex(r,g,b);
  $('#hex').textContent=hex;
  $('#preview').style.background=hex;
  $('#swatch').style.background=hex;
  $('#rgbStr').textContent=`rgb(${r}, ${g}, ${b})`;
  $('#rgbaStr').textContent=`rgba(${r},${g},${b},1)`;
  const[h,s,l]=rgbToHsl(r,g,b);
  $('#hslStr').textContent=`hsl(${h}, ${s}%, ${l}%)`;
  const[c,m,y,k]=rgbToCmyk(r,g,b);
  $('#cmykStr').textContent=`cmyk(${c},${m},${y},${k})`;
}

function parseManual(){
  const v=$('#manualHex').value.trim();
  const m=v.match(/^#?([0-9a-fA-F]{6}|[0-9a-fA-F]{3})$/);
  if(!m)return;
  let hex=m[1];
  if(hex.length===3)hex=hex.split('').map(c=>c+c).join('');
  const r=parseInt(hex.substr(0,2),16);
  const g=parseInt(hex.substr(2,2),16);
  const b=parseInt(hex.substr(4,2),16);
  $('#r').value=r;$('#g').value=g;$('#b').value=b;
  update();
}

['r','g','b'].forEach(id=>$('#'+id).addEventListener('input',update));
$('#copyBtn').addEventListener('click',()=>{copyText($('#hex').textContent);GZ.showToast(t('copied'));});
$('#lbl-manual').textContent=t('manualHex');

GZ.renderToolPage({
  category:'color',
  titleKey:'toolTitle',
  descKey:'toolDesc',
  howToSteps:['step1','step2','step3','step4'],
  related:[
    {icon:'🎨',href:'/color/hex-rgb.html',name:'HEX to RGB'},
    {icon:'🌈',href:'/color/hex-to-hsl.html',name:'HEX to HSL'},
    {icon:'🖨️',href:'/color/hex-to-cmyk.html',name:'HEX to CMYK'},
    {icon:'✨',href:'/color/picker.html',name:'Color Picker'},
  ]
});
update();
</script>
