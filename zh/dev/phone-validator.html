function detectCountry(digits) {
  // Try 3-digit, then 2-digit, then 1-digit codes.
  const c3 = COUNTRY_MAP[digits.slice(0, 3)];
  if (c3) return { code: digits.slice(0, 3), info: c3, national: digits.slice(3) };
  const c2 = COUNTRY_MAP[digits.slice(0, 2)];
  if (c2) return { code: digits.slice(0, 2), info: c2, national: digits.slice(2) };
  const c1 = COUNTRY_MAP[digits.slice(0, 1)];
  if (c1) return { code: digits.slice(0, 1), info: c1, national: digits.slice(1) };
  return null;
}

function classifyNational(code, national) {
  const info = COUNTRY_MAP[code];
  if (!info) return 'unknown';
  // NANP: mobile if area code is not 900-series toll.
  if (info.mobile && info.mobile.indexOf(national.slice(0, 3)) >= 0) return 'mobile';
  // Heuristic: most countries route mobile to a leading prefix.
  const mobilePrefix = /^(?:1[3-9]\d|5[0-9]|6[0-9]|7[0-9]|8[1-9]|9[0-9])/; // China-style or generic mobile
  if (/^[6-9]/.test(national) && national.length >= 9) return 'mobile';
  if (/^[2-5]/.test(national) && national.length >= 8) return 'landline';
  return 'unknown';
}

function validateOne(raw) {
  const original = raw.trim();
  if (!original) return null;
  // Strip everything but digits and a leading +.
  const hasPlus = /^\s*\+/.test(original);
  let digits = original.replace(/[^\d]/g, '');
  if (!digits) return { ok: false, raw: original, reason: 'empty' };

  let national, code, info;
  // If + present, treat as international.
  if (hasPlus) {
    const det = detectCountry(digits);
    if (!det) return { ok: false, raw: original, reason: 'unknown_country_code' };
    code = det.code; info = det.info; national = det.national;
  } else {
    // Try as international first (no +). If the first 1-3 digits match a known code, treat that way.
    const det = detectCountry(digits);
    if (det && det.national.length >= 6) {
      code = det.code; info = det.info; national = det.national;
    } else {
      // No country code detected — ambiguous without a default.
      return { ok: false, raw: original, reason: 'missing_country_code', digits };
    }
  }

  const len = national.length;
  const ok = len >= info.min && len <= info.max && /^\d+$/.test(national);
  const type = ok ? classifyNational(code, national) : 'unknown';
  const e164 = '+' + code + national;

  return {
    ok,
    raw: original,
    e164: ok ? e164 : null,
    country: info.name + ' (+' + code + ')',
    iso: info.iso,
    type,
    reason: ok ? null : (len < info.min ? 'too_short' : 'too_long'),
  };
}

function runValidate() {
  const lines = $('#input').value.split('\n').map(s => s.trim()).filter(Boolean);
  if (!lines.length) { $('#results').innerHTML = ''; $('#stats').innerHTML = ''; return; }
  const rows = lines.map(validateOne);
  const validCount = rows.filter(r => r && r.ok).length;

  const html = rows.map((r, i) => {
    if (!r) return '';
    if (r.ok) {
      return `<div class="pv-row">
        <span class="pv-icon">✅</span>
        <div>
          <div class="pv-input">${esc(r.raw)} <span class="pv-badge pv-valid">${t('valid')}</span></div>
          <div class="pv-details">${t('country')}: ${esc(r.country)} · ${t('type')}: ${typeLabel(r.type)}${r.e164 ? ` · ${t('e164')}: <span class="pv-e164">${esc(r.e164)}</span>` : ''}</div>
        </div>
        <button class="gz-btn gz-btn-secondary" style="font-size:.75em;padding:4px 10px" onclick="copyText('${esc(r.e164 || '')}')">${GZ.t('copy')}</button>
      </div>`;
    }
    return `<div class="pv-row">
      <span class="pv-icon">❌</span>
      <div>
        <div class="pv-input">${esc(r.raw)} <span class="pv-badge pv-invalid">${t('invalid')}</span></div>
        <div class="pv-details">${reasonLabel(r.reason)}</div>
      </div>
      <span></span>
    </div>`;
  }).join('');
  $('#results').innerHTML = html;
  $('#stats').innerHTML = `<span>${t('summary')(validCount, rows.filter(Boolean).length)}</span>`;
}

function typeLabel(k) { return t(k) || t('unknown'); }

  const m = {

    missing_country_code: 'No country code detected — prefix with + or the dial code',
    too_short: 'Number is shorter than expected for this country',
    too_long: 'Number is longer than expected for this country',
  };
  return m[r] || 'Invalid format';
}
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

}
