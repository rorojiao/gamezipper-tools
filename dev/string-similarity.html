const { $, t } = GZ;
let mode = 'char';

// ── algorithms (operate on token arrays; a string is just char-token array) ──
function levenshtein(a, b) {
  const m = a.length, n = b.length;
  if (m === 0) return n;
  if (n === 0) return m;
  let prev = new Array(n + 1);
  let curr = new Array(n + 1);
  for (let j = 0; j <= n; j++) prev[j] = j;
  for (let i = 1; i <= m; i++) {
    curr[0] = i;
    for (let j = 1; j <= n; j++) {
      const cost = a[i - 1] === b[j - 1] ? 0 : 1;
      curr[j] = Math.min(curr[j - 1] + 1, prev[j] + 1, prev[j - 1] + cost);
    }
    [prev, curr] = [curr, prev];
  }
  return prev[n];
}

function hamming(a, b) {
  if (a.length !== b.length) return null;
  let d = 0;
  for (let i = 0; i < a.length; i++) if (a[i] !== b[i]) d++;
  return d;
}

function jaro(s1, s2) {
  if (s1.length === 0 && s2.length === 0) return 1;
  if (s1.length === 0 || s2.length === 0) return 0;
  const matchDist = Math.max(Math.floor(Math.max(s1.length, s2.length) / 2) - 1, 0);
  const s1Matches = new Array(s1.length).fill(false);
  const s2Matches = new Array(s2.length).fill(false);
  let matches = 0;
  for (let i = 0; i < s1.length; i++) {
    const start = Math.max(0, i - matchDist);
    const end = Math.min(i + matchDist + 1, s2.length);
    for (let j = start; j < end; j++) {
      if (s2Matches[j]) continue;
      if (s1[i] !== s2[j]) continue;
      s1Matches[i] = true; s2Matches[j] = true; matches++; break;
    }
  }
  if (matches === 0) return 0;
  let t = 0, k = 0;
  for (let i = 0; i < s1.length; i++) {
    if (!s1Matches[i]) continue;
    while (!s2Matches[k]) k++;
    if (s1[i] !== s2[k]) t++;
    k++;
  }
  t /= 2;
  return (matches / s1.length + matches / s2.length + (matches - t) / matches) / 3;
}

function jaroWinkler(a, b) {
  const j = jaro(a, b);
  let prefix = 0;
  for (let i = 0; i < Math.min(4, a.length, b.length); i++) {
    if (a[i] === b[i]) prefix++; else break;
  }
  return j + prefix * 0.1 * (1 - j);
}

function bigrams(tokens) {
  if (tokens.length < 2) return new Set(tokens);
  const s = new Set();
  for (let i = 0; i < tokens.length - 1; i++) s.add(tokens[i] + '\u0001' + tokens[i + 1]);
  return s;
}

function sorensenDice(a, b) {
  const A = bigrams(a), B = bigrams(b);
  if (A.size === 0 && B.size === 0) return 1;
  let inter = 0;
  for (const g of A) if (B.has(g)) inter++;
  return (2 * inter) / (A.size + B.size);
}

function jaccard(a, b) {
  const A = new Set(a), B = new Set(b);
  if (A.size === 0 && B.size === 0) return 1;
  let inter = 0;
  for (const x of A) if (B.has(x)) inter++;
  return inter / (A.size + B.size - inter);
}

function cosineSim(a, b) {
  const A = bigrams(a), B = bigrams(b);
  if (A.size === 0 && B.size === 0) return 1;
  if (A.size === 0 || B.size === 0) return 0;
  let inter = 0;
  for (const g of A) if (B.has(g)) inter++;
  return inter / Math.sqrt(A.size * B.size);
}

function pct(v) { return (v * 100).toFixed(1) + '%'; }

function compute() {
  const aRaw = $('#strA').value;
  const bRaw = $('#strB').value;
  const a = mode === 'char' ? [...aRaw] : aRaw.split(/\s+/).filter(Boolean);
  const b = mode === 'char' ? [...bRaw] : bRaw.split(/\s+/).filter(Boolean);

  $('#meta').innerHTML = `
    <div class="chip">${t('metaLenA')}: ${a.length}</div>
    <div class="chip">${t('metaLenB')}: ${b.length}</div>
    <div class="chip">${t('metaSame')}: ${aRaw === bRaw ? '✓' : '✗'}</div>`;

  const lev = levenshtein(a, b);
  const levSim = a.length + b.length === 0 ? 1 : 1 - lev / Math.max(a.length, b.length);
  const jw = jaroWinkler(a, b);
  const ham = hamming(a, b);
  const sd = sorensenDice(a, b);
  const cos = cosineSim(a, b);
  const jac = jaccard(a, b);

  const cards = [
    { name: 'Levenshtein', value: pct(levSim), raw: `distance = ${lev}` },
    { name: 'Jaro-Winkler', value: pct(jw), raw: `similarity = ${jw.toFixed(4)}` },
    { name: ham === null ? 'Hamming (N/A — unequal length)' : 'Hamming', value: ham === null ? 'N/A' : pct(1 - ham / a.length), raw: ham === null ? 'requires equal length' : `distance = ${ham}` },
    { name: 'Sørensen-Dice', value: pct(sd), raw: `coefficient = ${sd.toFixed(4)}` },
    { name: 'Cosine', value: pct(cos), raw: `bigram cosine = ${cos.toFixed(4)}` },
    { name: 'Jaccard', value: pct(jac), raw: `index = ${jac.toFixed(4)}` },
  ];

  $('#results').innerHTML = cards.map(c => {
    const ratio = parseFloat(c.value) / 100 || 0;
    return `<div class="sim-card">
      <div class="name">${c.name}</div>
      <div class="value">${c.value}</div>
      <div class="raw">${c.raw}</div>
      <div class="bar"><span style="width:${Math.max(0, Math.min(100, ratio * 100))}%"></span></div>
    </div>`;
  }).join('');
}

function loadExample() {
  $('#strA').value = 'GameZipper Tools';
  $('#strB').value = 'GameZipper Tool';
  compute();
}

function doClear() {
  $('#strA').value = '';
  $('#strB').value = '';
  $('#meta').innerHTML = '';
  $('#results').innerHTML = '';
}

function doSwap() {
  const a = $('#strA').value;
  $('#strA').value = $('#strB').value;
  $('#strB').value = a;
  compute();
}

function setMode(m) {
  mode = m;
  $('#modeChar').classList.toggle('gz-btn-secondary', m !== 'char');
  $('#modeWord').classList.toggle('gz-btn-secondary', m !== 'word');
  compute();
}

</script>
