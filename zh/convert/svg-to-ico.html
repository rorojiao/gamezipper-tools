const { $, t } = GZ;
const SIZES = [16, 24, 32, 48, 64, 128, 256];
const DEFAULT_SIZES = new Set([16, 32, 48]);
let svgText = null;
let svgFileName = 'favicon';
let activeSizes = new Set(DEFAULT_SIZES);
let svgNaturalSize = 256;

function renderSizeGrid() {
  const grid = $('#size-grid');
  grid.innerHTML = '';
  SIZES.forEach(s => {
    const card = document.createElement('div');
    card.className = 'size-card' + (activeSizes.has(s) ? ' active' : '');
    const preview = document.createElement('div');
    preview.className = 'preview';
    const img = document.createElement('img');
    img.style.width = Math.min(s, 56) + 'px';
    img.style.height = Math.min(s, 56) + 'px';
    img.alt = `${s}×${s}`;
    if (svgText) {
      const blob = new Blob([svgText], { type: 'image/svg+xml' });
      img.src = URL.createObjectURL(blob);
    }
    preview.appendChild(img);
    card.appendChild(preview);
    const lbl = document.createElement('div');
    lbl.className = 'lbl';
    lbl.textContent = `${s} × ${s}`;
    card.appendChild(lbl);
    const chk = document.createElement('div');
    chk.className = 'chk';
    card.appendChild(chk);
    card.onclick = () => {
      if (activeSizes.has(s)) activeSizes.delete(s);
      else activeSizes.add(s);
      renderSizeGrid();
    };
    grid.appendChild(card);
  });
}

async function rasterize(size, useBg, bgColor) {
  const canvas = document.createElement('canvas');
  canvas.width = size; canvas.height = size;
  const ctx = canvas.getContext('2d');
  if (useBg) {
    ctx.fillStyle = bgColor;
    ctx.fillRect(0, 0, size, size);
  }
  // Render SVG via Image
  const blob = new Blob([svgText], { type: 'image/svg+xml' });
  const url = URL.createObjectURL(blob);
  try {
    const img = await new Promise((res, rej) => {
      const i = new Image();
      i.onload = () => res(i);
      i.onerror = () => rej(new Error('SVG render failed'));
      i.src = url;
    });
    // If SVG has no intrinsic size, draw to fill the canvas
    const iw = img.naturalWidth || size;
    const ih = img.naturalHeight || size;
    // Fit (contain) into the square
    const scale = Math.min(size / iw, size / ih);
    const dw = iw * scale, dh = ih * scale;
    const dx = (size - dw) / 2, dy = (size - dh) / 2;
    ctx.drawImage(img, dx, dy, dw, dh);
  } finally {
    URL.revokeObjectURL(url);
  }
  return canvas;
}

// Encode ICO file from PNG-encoded images (each entry is PNG).
// ICO format: ICONDIR (6 bytes) + ICONDIRENTRY (16 bytes each) + image data
async function buildIco(images) {
  // images: [{ size, pngBytes }]
  const enc = new TextEncoder();
  const header = new Uint8Array(6);
  const dv = new DataView(header.buffer);
  dv.setUint16(0, 0, true); // reserved
  dv.setUint16(2, 1, true); // type = icon
  dv.setUint16(4, images.length, true); // count
  const entries = [];
  const blobs = [];
  let offset = 6 + images.length * 16;
  for (const im of images) {
    const entry = new Uint8Array(16);
    const edv = new DataView(entry.buffer);
    const s = im.size;
    edv.setUint8(0, s >= 256 ? 0 : s); // width (0 = 256)
    edv.setUint8(1, s >= 256 ? 0 : s); // height
    edv.setUint8(2, 0); // colors in palette
    edv.setUint8(3, 0); // reserved
    edv.setUint16(4, 1, true); // planes
    edv.setUint16(6, 32, true); // bpp
    edv.setUint32(8, im.pngBytes.length, true); // size
    edv.setUint32(12, offset, true); // offset
    entries.push(entry);
    blobs.push(im.pngBytes);
    offset += im.pngBytes.length;
  }
  // Concat
  const total = 6 + entries.length * 16 + blobs.reduce((a,b) => a + b.length, 0);
  const out = new Uint8Array(total);
  let o = 0;
  out.set(header, o); o += header.length;
  entries.forEach(e => { out.set(e, o); o += e.length; });
  blobs.forEach(b => { out.set(b, o); o += b.length; });
  return out;
}

async function loadFile(file) {
  if (!file) return;
  const isSvg = file.type === 'image/svg+xml' || /\.svg$/i.test(file.name);
  if (!isSvg) { $('#status').textContent = '⚠️ ' + t('noSvg'); return; }
  svgText = await file.text();
  svgFileName = file.name.replace(/\.svg$/i, '') || 'favicon';
  // Try to read intrinsic size from viewBox/width
  const vb = svgText.match(/viewBox=["']([\d\s.\-]+)["']/i);
  if (vb) {
    const parts = vb[1].split(/[\s,]+/).map(parseFloat);
    if (parts.length === 4) svgNaturalSize = Math.max(parts[2], parts[3]);
  }
  $('#drop-area').style.display = 'none';
  $('#editor').style.display = 'block';
  renderSizeGrid();
}

async function downloadIco() {
  if (!svgText) return;
  if (activeSizes.size === 0) { alert(t('noSize')); return; }
  const useBg = $('#optBg').checked;
  const bgColor = $('#bgColor').value;
  $('#status').textContent = '⏳ Rendering...';
  const sizes = Array.from(activeSizes).sort((a,b) => a-b);
  const images = [];
  for (const s of sizes) {
    const canvas = await rasterize(s, useBg, bgColor);
    const blob = await new Promise(res => canvas.toBlob(res, 'image/png'));
    const bytes = new Uint8Array(await blob.arrayBuffer());
    images.push({ size: s, pngBytes: bytes });
  }
  const ico = await buildIco(images);
  const outBlob = new Blob([ico], { type: 'image/x-icon' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(outBlob);
  a.download = `${svgFileName}.ico`;
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 5000);
  $('#status').textContent = `✓ ${t('downloaded')} (${sizes.join(', ')} px)`;
}

async function downloadPng() {
  if (!svgText) return;
  if (activeSizes.size === 0) { alert(t('noSize')); return; }
  const useBg = $('#optBg').checked;
  const bgColor = $('#bgColor').value;
  const size = Math.max(...Array.from(activeSizes));
  const canvas = await rasterize(size, useBg, bgColor);
  const blob = await new Promise(res => canvas.toBlob(res, 'image/png'));
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `${svgFileName}_${size}.png`;
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 5000);
}

$('#drop-area').ondragleave = () => $('#drop-area').classList.remove('drag');
$('#drop-area').ondrop = e => {
  e.preventDefault(); $('#drop-area').classList.remove('drag');
  if (e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]);
};

$('#drop-text').textContent = t('dropHere');
