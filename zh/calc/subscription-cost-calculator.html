<div class="gz-container">

</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Subscription Cost Calculator',
    toolDesc: 'Add up every subscription you pay for — streaming, cloud, software, gym, apps and more. See your true monthly, yearly and lifetime cost instantly.',
    addRow: '+ Add Subscription',
    clearAll: 'Clear All',
    name: 'Service Name',
    price: 'Price',
    cycle: 'Billing Cycle',
    monthly: 'Monthly',
    yearly: 'Yearly',
    weekly: 'Weekly',
    lifetime: 'Lifetime (5 yr)',
    perMonth: 'per month',
    perYear: 'per year',
    perWeek: 'per week',
    over5yr: 'over 5 years',
    step1: 'Click a quick-add preset or press "Add Subscription"',
    step2: 'Enter the service name, price and billing cycle',
    step3: 'Watch the monthly, yearly and 5-year totals update live',
    step4: 'Remove a row to instantly see how much cancelling saves',
  },
  zh: {
    toolTitle: '订阅费用计算器',
    toolDesc: '统计你所有订阅服务的真实开销 — 流媒体、云存储、软件、健身、App 等。即时查看每月、每年和 5 年总花费。',
    addRow: '+ 添加订阅',
    clearAll: '全部清除',
    name: '服务名称',
    price: '价格',
    cycle: '计费周期',
    monthly: '每月',
    yearly: '每年',
    weekly: '每周',
    lifetime: '5 年总计',
    perMonth: '每月',
    perYear: '每年',
    perWeek: '每周',
    over5yr: '5 年累计',
    step1: '点击快捷预设或按「添加订阅」',
    step2: '填写服务名称、价格和计费周期',
    step3: '实时查看每月、每年和 5 年总花费',
    step4: '删除某行即可即时查看取消该订阅能省多少',
  }
});

const { $, copyText, t } = GZ;

const PRESETS = [
  {n:'Netflix',p:15.49,c:'monthly'},{n:'Spotify',p:10.99,c:'monthly'},
  {n:'Disney+',p:10.99,c:'monthly'},{n:'Apple Music',p:10.99,c:'monthly'},
  {n:'YouTube Premium',p:13.99,c:'monthly'},{n:'iCloud+ 200GB',p:2.99,c:'monthly'},
  {n:'Google One',p:1.99,c:'monthly'},{n:'Amazon Prime',p:139,c:'yearly'},
  {n:'Adobe Creative Cloud',p:59.99,c:'monthly'},{n:'Microsoft 365',p:99,c:'yearly'},
  {n:'ChatGPT Plus',p:20,c:'monthly'},{n:'Gym Membership',p:40,c:'monthly'},
  {n:'Dropbox Plus',p:11.99,c:'monthly'},{n:'Hulu',p:7.99,c:'monthly'},
  {n:'HBO Max',p:15.99,c:'monthly'},{n:'Notion Plus',p:10,c:'monthly'},
  {n:'Gmail Workspace',p:6,c:'monthly'},{n:'GitHub Pro',p:4,c:'monthly'},
];

let subs = [];

function toMonthly(price, cycle){
  if(cycle==='monthly') return price;
  if(cycle==='yearly') return price/12;
  if(cycle==='weekly') return price*52/12;
  return 0;
}

function render(){
  const el = $('#subs');
  el.innerHTML = subs.map((s,i)=>`
    <div class="sub-row">
      <input type="text" value="${escapeHtml(s.n)}" placeholder="${t('name')}" data-i="${i}" data-k="n">
      <input type="number" step="0.01" min="0" value="${s.p}" placeholder="${t('price')}" data-i="${i}" data-k="p">
      <select data-i="${i}" data-k="c">
        <option value="monthly"${s.c==='monthly'?' selected':''}>${t('monthly')}</option>
        <option value="yearly"${s.c==='yearly'?' selected':''}>${t('yearly')}</option>
        <option value="weekly"${s.c==='weekly'?' selected':''}>${t('weekly')}</option>
      </select>
      <button class="del" data-del="${i}" title="Remove">×</button>
    </div>`).join('');

  el.querySelectorAll('input,select').forEach(inp=>{
    inp.addEventListener('input', e=>{
      const i=+e.target.dataset.i, k=e.target.dataset.k;
      if(k==='p') subs[i][k]=parseFloat(e.target.value)||0;
      else subs[i][k]=e.target.value;
      renderSummary();
    });
  });
  el.querySelectorAll('[data-del]').forEach(btn=>{
    btn.addEventListener('click', e=>{
      subs.splice(+e.target.dataset.del,1);
      render();
    });
  });
  renderSummary();
}

function escapeHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function renderSummary(){
  const m = subs.reduce((a,s)=>a+toMonthly(s.p,s.c),0);
  const y = m*12;
  const w = m/4.333;
  const life = m*60;
  const fmt = v => v.toLocaleString(undefined,{style:'currency',currency:'USD',maximumFractionDigits:2});
  $('#summary').innerHTML = subs.length ? `
    <div class="card"><div class="val">${fmt(m)}</div><div class="lbl">${t('perMonth')}</div></div>
    <div class="card alt"><div class="val">${fmt(y)}</div><div class="lbl">${t('perYear')}</div></div>
    <div class="card"><div class="val">${fmt(w)}</div><div class="lbl">${t('perWeek')}</div></div>
    <div class="card alt"><div class="val">${fmt(life)}</div><div class="lbl">${t('over5yr')}</div></div>
  ` : '';
}

function addRow(n='',p=0,c='monthly'){
  subs.push({n,p,c});
  render();
}

function clearAll(){
  subs=[];
  render();
}

$('#presets').innerHTML = PRESETS.map((p,i)=>`<button data-preset="${i}">${p.n}</button>`).join('');
$('#presets').querySelectorAll('[data-preset]').forEach(btn=>{
  btn.addEventListener('click',()=>{
    const p=PRESETS[+btn.dataset.preset];
    addRow(p.n,p.p,p.c);
  });
});

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="addRow()">${t('addRow')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="clearAll()">${t('clearAll')}</button>`;

addRow('Netflix',15.49,'monthly');
addRow('Spotify',10.99,'monthly');

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🏦', href:'/calc/loan-calculator.html', name:'Loan Calculator'},
    {icon:'💸', href:'/calc/tax-calculator.html', name:'Tax Calculator'},
    {icon:'💰', href:'/calc/salary-calculator.html', name:'Salary Calculator'},
    {icon:'📈', href:'/calc/compound-interest.html', name:'Compound Interest'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
