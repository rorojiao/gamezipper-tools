<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is APY?", "acceptedAnswer": {"@type": "Answer", "text": "APY (Annual Percentage Yield) is the real rate of return earned on an investment or savings account over one year, taking into account the effect of compounding interest. APY is always higher than or equal to the nominal APR when compounding occurs more than once per year."}}, {"@type": "Question", "name": "How is APY calculated?", "acceptedAnswer": {"@type": "Answer", "text": "APY is calculated using the formula: APY = (1 + r/n)^n - 1, where r is the nominal annual interest rate (APR) as a decimal, and n is the number of compounding periods per year. More frequent compounding results in a higher APY."}}, {"@type": "Question", "name": "What is the difference between APR and APY?", "acceptedAnswer": {"@type": "Answer", "text": "APR (Annual Percentage Rate) is the simple annual interest rate without compounding. APY (Annual Percentage Yield) includes the effect of compounding. For example, 12% APR compounded monthly gives an APY of about 12.68%, meaning you earn slightly more than the nominal rate."}}, {"@type": "Question", "name": "Is this APY calculator free?", "acceptedAnswer": {"@type": "Answer", "text": "Yes, this APY calculator is 100% free and runs entirely in your browser. No data is sent to any server and no signup is required."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div style="max-width:520px;margin:0 auto">
      <div class="gz-input-row">
        <label id="lbl-principal"></label>
        <input type="number" id="principal" value="10000" min="0" step="any">
      </div>
      <div class="gz-input-row">
        <label id="lbl-apr"></label>
        <input type="number" id="apr" value="5" min="0" step="0.01">
      </div>
      <div class="gz-input-row">
        <label id="lbl-freq"></label>
        <select id="freq">
          <option value="1">1 — Annually</option>
          <option value="2">2 — Semi-annually</option>
          <option value="4">4 — Quarterly</option>
          <option value="12" selected>12 — Monthly</option>
          <option value="52">52 — Weekly</option>
          <option value="365">365 — Daily</option>
        </select>
      </div>
      <div class="gz-input-row">
        <label id="lbl-years"></label>
        <input type="number" id="years" value="1" min="0" step="0.5">
      </div>
      <div class="gz-result-box" id="result"></div>
    </div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'APY Calculator',
    toolDesc: 'Calculate Annual Percentage Yield (APY) from APR and compounding frequency. See your real return on savings, CDs and staking.',
    principal: 'Principal amount ($)',
    apr: 'Nominal APR (annual rate %)',
    freq: 'Compounding frequency (per year)',
    years: 'Investment period (years)',
    calc: 'Calculate',
    apyLabel: 'Effective APY',
    finalBalance: 'Final balance',
    totalInterest: 'Total interest earned',
    step1: 'Enter your principal (starting amount)',
    step2: 'Enter the nominal APR (annual interest rate)',
    step3: 'Choose how often interest compounds',
    step4: 'See your effective APY and final balance instantly',
  },
  zh: {
    toolTitle: 'APY 计算器（年化百分比收益率）',
    toolDesc: '根据名义年利率和复利频率计算年化百分比收益率（APY）。查看储蓄、定期存款和质押的真实收益。',
    principal: '本金（美元）',
    apr: '名义年利率 APR（%）',
    freq: '复利频率（每年次数）',
    years: '投资期限（年）',
    calc: '计算',
    apyLabel: '实际年化收益率 APY',
    finalBalance: '期末余额',
    totalInterest: '总利息收入',
    step1: '输入本金（初始金额）',
    step2: '输入名义年利率（APR）',
    step3: '选择利息复利计算的频率',
    step4: '即时查看实际 APY 和期末余额',
  }
});

const { $, t } = GZ;

function calc() {
  const p = parseFloat($('#principal').value) || 0;
  const r = (parseFloat($('#apr').value) || 0) / 100;
  const n = parseInt($('#freq').value) || 1;
  const y = parseFloat($('#years').value) || 0;

  const apy = Math.pow(1 + r / n, n) - 1;
  const finalBalance = p * Math.pow(1 + r / n, n * y);
  const interest = finalBalance - p;

  $('#result').innerHTML = `
    <div style="text-align:center;margin-bottom:12px">
      <div style="font-size:.8rem;color:var(--text2)">${t('apyLabel')}</div>
      <div class="gz-result-big">${(apy * 100).toFixed(4)}%</div>
    </div>
    <div class="gz-result-row"><span class="gz-result-label">${t('finalBalance')}</span><span class="gz-result-value">$${finalBalance.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})}</span></div>
    <div class="gz-result-row"><span class="gz-result-label">${t('totalInterest')}</span><span class="gz-result-value" style="color:var(--gz-success)">$${interest.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})}</span></div>
  `;
}

['principal','apr','freq','years'].forEach(id => $('#' + id).addEventListener('input', calc));

$('#toolbar').innerHTML = `<button class="gz-btn" onclick="calc()">${t('calc')}</button>`;

calc();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'💰', href:'/calc/compound-interest.html', name:'Compound Interest'},
    {icon:'🏦', href:'/calc/loan-calculator.html', name:'Loan Calculator'},
    {icon:'📈', href:'/calc/roi-calculator.html', name:'ROI Calculator'},
    {icon:'💵', href:'/calc/mortgage-calculator.html', name:'Mortgage Calculator'},
  ]
});
</script>
<script src="/tools-result-rec.js?v=20260707v520" defer></script>
</body>
