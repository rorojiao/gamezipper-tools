<script type="application/ld+json">{"@context":"https://schema.org","@type":"WebApplication","name":"Scroll Animation Generator","description":"Generate CSS scroll animations for your website. Fade in, slide up, zoom, rotate and more — copy production-ready CSS and JavaScript. Free and browser-based.","url":"https://tools.gamezipper.com/css-tools/scroll-animation.html","applicationCategory":"Utility","operatingSystem":"Web Browser","offers":{"@type":"Offer","price":"0"}}</script>
<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"What is a scroll animation?","acceptedAnswer":{"@type":"Answer","text":"A scroll animation triggers a visual effect when an element enters the viewport as the user scrolls. Common effects include fade-in, slide-up, and zoom-in using CSS transitions or keyframes."}},{"@type":"Question","name":"Does this require JavaScript?","acceptedAnswer":{"@type":"Answer","text":"This tool uses a small Intersection Observer snippet (5 lines of JS) to detect when elements enter the viewport, then applies CSS classes for the animation. This is the most performant approach."}},{"@type":"Question","name":"Are scroll animations bad for performance?","acceptedAnswer":{"@type":"Answer","text":"No, not when done correctly. Using CSS transitions with transform and opacity (GPU-accelerated properties) and Intersection Observer is very performant and won't cause layout shifts."}},{"@type":"Question","name":"Can I use these animations with React or Vue?","acceptedAnswer":{"@type":"Answer","text":"Yes. The CSS classes work with any framework. For React/Vue you can use Intersection Observer directly in components, or use libraries like AOS, Framer Motion, or GSAP ScrollTrigger."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <p style="font-weight:600;margin-bottom:8px" data-i18n="selectEffect"></p>
    <div class="effects-grid" id="effects-grid"></div>
    <div class="gz-split">
      <div>
        <div class="gz-control"><label data-i18n="distanceLabel"></label><input type="range" id="distance" min="10" max="200" value="40"><span id="dist-val">40px</span></div>
        <div class="gz-control"><label data-i18n="durationLabel"></label><input type="range" id="duration" min="200" max="2000" step="100" value="600"><span id="dur-val">0.6s</span></div>
        <div class="gz-control"><label data-i18n="delayLabel"></label><input type="range" id="delay" min="0" max="500" step="50" value="0"><span id="delay-val">0ms</span></div>
        <div class="gz-control"><label data-i18n="easingLabel"></label>
          <select id="easing">
            <option value="ease">ease</option>
            <option value="ease-in">ease-in</option>
            <option value="ease-out" selected>ease-out</option>
            <option value="ease-in-out">ease-in-out</option>
            <option value="cubic-bezier(0.16, 1, 0.3, 1)">ease-out-expo</option>
            <option value="linear">linear</option>
          </select>
        </div>
        <div class="gz-control"><label data-i18n="thresholdLabel"></label><input type="range" id="threshold" min="0" max="100" value="20"><span id="thresh-val">20%</span></div>
        <h4 style="margin-top:16px;font-size:.9rem" data-i18n="codeLabel"></h4>
        <div id="code-output"></div>
      </div>
      <div>
        <h4 style="margin:0 0 8px;font-size:.9rem" data-i18n="previewLabel"></h4>
        <div id="preview-container">
          <div id="preview-inner">
            <div style="text-align:center;opacity:.4;font-size:.85rem">↓ Scroll down ↓</div>
            <div class="demo-card" data-animate>Card 1 — This element animates on scroll</div>
            <div class="demo-card" data-animate>Card 2 — Watch it appear!</div>
            <div class="demo-card" data-animate>Card 3 — Smooth and performant</div>
            <div class="demo-card" data-animate>Card 4 — No library needed</div>
            <div class="demo-card" data-animate>Card 5 — Pure CSS + Observer</div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>

<script>
GZI18n.register({
  en: {
    toolTitle: 'Scroll Animation Generator',
    toolDesc: 'Generate CSS scroll animations for your website. Fade in, slide, zoom, rotate and more — copy production-ready CSS + JS. Free and browser-based.',
    selectEffect: 'Select Animation Effect',
    distanceLabel: 'Distance (px)',
    durationLabel: 'Duration (ms)',
    delayLabel: 'Delay (ms)',
    easingLabel: 'Easing Function',
    thresholdLabel: 'Trigger Threshold',
    codeLabel: 'Generated Code',
    previewLabel: 'Live Preview (scroll ↓)',
    step1: 'Choose an animation effect from the grid',
    step2: 'Adjust distance, duration, delay and easing',
    step3: 'Preview the animation in the scroll demo',
    step4: 'Copy the CSS + JS code to your project',
  },
  zh: {
    toolTitle: 'CSS 滚动动画生成器',
    toolDesc: '为网站生成 CSS 滚动动画。淡入、滑动、缩放、旋转等 — 复制即用的 CSS + JS 代码。免费浏览器本地运行。',
    selectEffect: '选择动画效果',
    distanceLabel: '距离（px）',
    durationLabel: '时长（ms）',
    delayLabel: '延迟（ms）',
    easingLabel: '缓动函数',
    thresholdLabel: '触发阈值',
    codeLabel: '生成代码',
    previewLabel: '实时预览（向下滚动 ↓）',
    step1: '从网格中选择动画效果',
    step2: '调整距离、时长、延迟和缓动',
    step3: '在滚动演示中预览动画',
    step4: '复制 CSS + JS 代码到你的项目',
  }
});

const { $, copyText, t } = GZ;

const effects = [
  { id:'fade-up', name:'Fade Up', initial:'translateY({d}px)', final:'translateY(0)' },
  { id:'fade-down', name:'Fade Down', initial:'translateY(-{d}px)', final:'translateY(0)' },
  { id:'fade-left', name:'Fade Left', initial:'translateX({d}px)', final:'translateX(0)' },
  { id:'fade-right', name:'Fade Right', initial:'translateX(-{d}px)', final:'translateX(0)' },
  { id:'zoom-in', name:'Zoom In', initial:'scale(0.8)', final:'scale(1)' },
  { id:'zoom-out', name:'Zoom Out', initial:'scale(1.2)', final:'scale(1)' },
  { id:'rotate-in', name:'Rotate In', initial:'rotate(-10deg) scale(0.9)', final:'rotate(0) scale(1)' },
  { id:'flip-up', name:'Flip Up', initial:'perspective(600px) rotateX(15deg)', final:'perspective(600px) rotateX(0)' },
  { id:'blur-in', name:'Blur In', initial:'filter:blur(6px)', final:'filter:blur(0)' },
  { id:'slide-up', name:'Slide Up', initial:'translateY(100%)', final:'translateY(0)', clip:true },
  { id:'bounce', name:'Bounce', initial:'translateY({d}px)', final:'translateY(0)', bounce:true },
  { id:'fade', name:'Fade Only', initial:'', final:'' },
];

let activeEffect = 'fade-up';

function renderEffectsGrid() {
  $('#effects-grid').innerHTML = effects.map(e => `<button class="effect-btn ${e.id===activeEffect?'active':''}" onclick="setEffect('${e.id}')">${e.name}</button>`).join('');
}

function setEffect(id) { activeEffect = id; renderEffectsGrid(); renderAll(); }

function getTransform(isInitial) {
  const e = effects.find(x => x.id === activeEffect);
  const d = $('#distance').value;
  let tpl = isInitial ? e.initial : e.final;
  return tpl.replace(/{d}/g, d);
}

function isFilterEffect() {
  return activeEffect === 'blur-in';
}

function generateCode() {
  const dur = $('#duration').value;
  const del = $('#delay').value;
  const ease = $('#easing').value;
  const thresh = ($('#threshold').value / 100).toFixed(2);
  const e = effects.find(x => x.id === activeEffect);
  const d = $('#distance').value;

  let hiddenProps = '  opacity: 0;\n';
  if (isFilterEffect()) {
    hiddenProps += `  filter: blur(6px);\n`;
  } else if (e.clip) {
    hiddenProps += `  clip-path: inset(100% 0 0 0);\n`;
  } else {
    const init = e.initial.replace(/{d}/g, d);
    if (init) hiddenProps += `  transform: ${init};\n`;
  }

  let visibleProps = '  opacity: 1;\n';
  if (isFilterEffect()) {
    visibleProps += `  filter: blur(0);\n`;
  } else if (e.clip) {
    visibleProps += `  clip-path: inset(0 0 0 0);\n`;
  } else {
    visibleProps += `  transform: ${e.final.replace(/{d}/g, d)};\n`;
  }

  const css = `.scroll-animate {\n${hiddenProps}  transition: opacity ${dur}ms ${ease} ${del}ms, ${isFilterEffect() ? 'filter' : e.clip ? 'clip-path' : 'transform'} ${dur}ms ${ease} ${del}ms;\n}\n\n.scroll-animate.visible {\n${visibleProps}}`;

  const js = `// Intersection Observer for scroll animations\nconst observer = new IntersectionObserver((entries) => {\n  entries.forEach(entry => {\n    if (entry.isIntersecting) {\n      entry.target.classList.add('visible');\n      observer.unobserve(entry.target);\n    }\n  });\n}, { threshold: ${thresh} });\n\ndocument.querySelectorAll('.scroll-animate').forEach(el => observer.observe(el));`;

  return `<!-- Add to <style> -->\n${css}\n\n<!-- Add to <script> -->\n${js}\n\n<!-- HTML usage -->\n<div class="scroll-animate">Your content here</div>`;
}

function renderAll() {
  const dur = $('#duration').value;
  const del = $('#delay').value;
  const ease = $('#easing').value;
  const e = effects.find(x => x.id === activeEffect);
  const d = $('#distance').value;

  // Update display values
  $('#dist-val').textContent = d + 'px';
  $('#dur-val').textContent = (dur/1000).toFixed(1) + 's';
  $('#delay-val').textContent = del + 'ms';
  $('#thresh-val').textContent = $('#threshold').value + '%';

  // Update code output
  $('#code-output').textContent = generateCode();

  // Update preview cards
  document.querySelectorAll('.demo-card').forEach(card => {
    card.classList.remove('visible');
    card.style.transition = `all ${dur}ms ${ease} ${del}ms`;
    card.style.opacity = '0';
    if (isFilterEffect()) {
      card.style.filter = 'blur(6px)';
      card.style.transform = '';
    } else if (e.clip) {
      card.style.clipPath = 'inset(100% 0 0 0)';
      card.style.transform = '';
    } else {
      card.style.transform = e.initial.replace(/{d}/g, d);
      card.style.filter = '';
      card.style.clipPath = '';
    }
  });

  // Reset scroll
  const container = $('#preview-container');
  container.scrollTop = 0;

  // Re-observe
  setupObserver();
}

let observer = null;
function setupObserver() {
  if (observer) observer.disconnect();
  const thresh = $('#threshold').value / 100;
  observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
        const e = effects.find(x => x.id === activeEffect);
        const d = $('#distance').value;
        entry.target.style.opacity = '1';
        if (isFilterEffect()) {
          entry.target.style.filter = 'blur(0)';
        } else if (e.clip) {
          entry.target.style.clipPath = 'inset(0 0 0 0)';
        } else {
          entry.target.style.transform = e.final.replace(/{d}/g, d);
        }
        observer.unobserve(entry.target);
      }
    });
  }, { root: $('#preview-container'), threshold: thresh });

  document.querySelectorAll('.demo-card').forEach(el => observer.observe(el));
}

['#distance','#duration','#delay','#easing','#threshold'].forEach(sel => {
  $(sel).addEventListener('input', renderAll);
});

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="copyText(generateCode())">${t('copy')||'Copy Code'}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#preview-container').scrollTop=0;renderAll()">Replay</button>`;

renderEffectsGrid();
renderAll();

GZ.renderToolPage({
  category: 'css',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🎬', href:'/css-tools/animation.html', name:'CSS Animation'},
    {icon:'🏔️', href:'/css-tools/parallax.html', name:'Parallax'},
    {icon:'🌈', href:'/css-tools/gradient-animator.html', name:'Gradient Anim'},
    {icon:'⏳', href:'/css-tools/loader.html', name:'CSS Loader'},
  ]
});
</script>

<script src="/tools-result-rec.js" defer></script>
</body>
