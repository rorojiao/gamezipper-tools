<script>

    lblStyle: '料理风格：',
    keywordPh: '可选关键词（如城市、名字或主题）',
    generate: '生成名称',
    more: '生成更多',
    copy: '复制',
    fav: '★',
    unfav: '☆',
    clear: '清空',
    exportFav: '复制收藏',
    copied: '已复制！',
    emptyMsg: '点击「生成名称」获取 20+ 个餐厅名灵感。',
    step1: '选择料理风格，或保持「Any」',
    step2: '可选添加关键词，如城市、创始人名字或主题',
    step3: '点击生成即可一次查看 20+ 个名称',
    step4: '收藏你喜欢的名称，一键复制',
  }
});

const { $, t, copyText } = GZ;

$('#lbl-style').textContent = t('lblStyle');
$('#keyword').placeholder = t('keywordPh');
$('#empty').textContent = t('emptyMsg');

// Word banks per cuisine style
const BANK = {
  italian: {
    prefixes: ['Bella', 'Trattoria', 'Nonna', 'Cucina', 'Dolce', 'Roma', 'Milano', 'Venezia', 'Napoli', 'Bologna', 'Toscana', 'Amore', 'Fresco', 'Mamma', 'Bambino', 'Caro'],
    cores: ['Pasta', 'Vita', 'Casa', 'Forno', 'Giardino', 'Olio', 'Vino', 'Tavola', 'Cucina', 'Famiglia', 'Sole', 'Luna', 'Cielo', 'Bacio'],
    suffixes: ['di Roma', 'di Napoli', '& Co.', 'Italian Kitchen', 'Trattoria', 'Ristorante', 'Pizzeria', 'Eats', 'Kitchen', 'Bistro'],
    standalone: ['The Olive Grove', 'Tuscan Sun', 'Little Italy', 'Roma Express', 'Mama Mia', 'Bella Cucina', 'Trattoria Verde', 'Casa di Pasta'],
  },
  french: {
    prefixes: ['Le', 'La', 'Café', 'Bistro', 'Petit', 'Maison', 'Château', 'Rue', 'Côte', 'Belle', 'Bon', 'Délice', 'Fleur', 'Olive'],
    cores: ['Paris', 'Lyon', 'Provence', 'Bordeaux', 'Crêpe', 'Baguette', 'Fromage', 'Vin', 'Rouge', 'Bleu', 'Étoile', 'Jardin'],
    suffixes: ['Bistro', 'Brasserie', 'Café', '& Co.', 'French Kitchen', 'de Paris', 'Bakery', 'Eatery'],
    standalone: ['The Parisian', 'Café de Flore', 'Le Petit Bistro', 'Maison Blanche', 'Belle Époque', 'Crêpe & Co.', 'Rue Saint-Honoré'],
  },
  asian: {
    prefixes: ['Golden', 'Jade', 'Dragon', 'Lotus', 'Bamboo', 'Sakura', 'Red', 'Imperial', 'Eastern', 'Tiger', 'Phoenix', 'Imperial', 'Blossom'],
    cores: ['Wok', 'Garden', 'House', 'Palace', 'Kitchen', 'Harbor', 'Pavilion', 'Corner', 'Bistro', 'Express', 'Noodle', 'Rice'],
    suffixes: ['Asian Bistro', 'Sushi Bar', 'Noodle House', 'Wok Kitchen', '& Co.', 'Bao House', 'Eatery', 'Express'],
    standalone: ['The Golden Dragon', 'Jade Palace', 'Lotus Garden', 'Sakura Sushi', 'Bamboo House', 'Red Lantern', 'Imperial Wok'],
  },
  mexican: {
    prefixes: ['El', 'La', 'Casa', 'Los', 'Las', 'Taquería', 'Mi', 'Buen', 'Fiesta', 'Sol', 'Azteca', 'Maya'],
    cores: ['Sol', 'Luna', 'Fiesta', 'Amigo', 'Taco', 'Burrito', 'Salsa', 'Fuego', 'Verde', 'Oro', 'Rancho', 'Hacienda'],
    suffixes: ['Mexican Kitchen', 'Cantina', 'Taquería', '& Grill', 'Restaurant', 'Eats', 'Cocina', 'Burrito Co.'],
    standalone: ['Casa del Sol', 'El Mariachi', 'La Fiesta', 'Los Amigos', 'Taquería Azteca', 'Salsa Verde', 'Mi Tierra'],
  },
  seafood: {
    prefixes: ['The', 'Blue', 'Cape', 'Harbor', 'Bay', 'Ocean', 'Saltwater', 'Pearl', 'Coral', 'Sailor', 'Capt.', "Captain's"],
    cores: ['Catch', 'Harbor', 'Wharf', 'Bay', 'Reef', 'Tide', 'Anchor', 'Mariner', 'Oyster', 'Lobster', 'Crab', 'Net'],
    suffixes: ['Seafood Co.', 'Oyster Bar', 'Fish House', '& Grill', 'Seafood Grill', 'Catch', 'Wharf', 'Marine'],
    standalone: ['The Salty Crab', 'Blue Harbor', 'Cape Cod Catch', 'Pearl Oyster Bar', 'The Net Result', "Captain's Table", 'Saltwater Grill'],
  },
  modern: {
    prefixes: ['The', 'Élevé', 'Lume', 'Aura', 'Verve', 'Noir', 'Sage', 'Ember', 'Onyx', 'Cobalt', 'Verde', 'Prime'],
    cores: ['Table', 'Room', 'Kitchen', 'Cellar', 'Pantry', 'Plate', 'Marrow', 'Atlas', 'Forge', 'Foundry', 'Quill'],
    suffixes: ['— Modern Dining', 'Fine Dining', 'Kitchen & Bar', '& Co.', 'Eatery', 'Bistro', 'Cellar'],
    standalone: ['The Modern Plate', 'Ember & Oak', 'Noir Fine Dining', 'Lume Bistro', 'The Foundry', 'Cobalt Room', 'Atlas Kitchen'],
  },
  cafe: {
    prefixes: ['The', 'Morning', 'Cozy', 'Sleepy', 'Wandering', 'Bluebird', 'Steaming', 'Daily', 'Honest', 'Little', 'Wildflower'],
    cores: ['Bean', 'Cup', 'Mug', 'Roast', 'Grind', 'Sip', 'Crumb', 'Loaf', 'Pastry', 'Kettle', 'Café', 'Bakehouse'],
    suffixes: ['Café', 'Coffee Co.', 'Bakehouse', '& Bakery', 'Coffee Bar', 'Roasters', 'Bakery', 'Eats'],
    standalone: ['The Daily Grind', 'Morning Light Café', 'Bluebird Bakery', 'The Cozy Cup', 'Loaf & Crumb', 'Wildflower Coffee', 'Sleepy Mug'],
  },
  grill: {
    prefixes: ['The', 'Smoky', 'Iron', 'Big', "Red's", 'Wild', 'Black', 'Brisket', 'Pit', 'Hickory', 'Stoker', "Bandit's"],
    cores: ['Pit', 'Grill', 'Smokehouse', 'BBQ', 'Brisket', 'Rib', 'Steakhouse', 'Fire', 'Coals', 'Ash', 'Hog'],
    suffixes: ['BBQ & Grill', 'Smokehouse', 'Steakhouse', '& Grill', 'BBQ Co.', 'Pit Stop', 'Smoke Co.', 'Grill'],
    standalone: ['The Smoky Pit', 'Iron Grill', 'Hickory Smokehouse', "Red's BBQ", 'Brisket & Co.', 'The Wild Hog', 'Black Iron BBQ'],
  },
  any: null, // handled specially
};

function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function cap(s) { return s.charAt(0).toUpperCase() + s.slice(1); }

// Generate one name
function genName(style, keyword) {
  const k = keyword && keyword.trim();
  // 35% chance to use a standalone name (if no keyword)
  if (!k && Math.random() < 0.35) {
    return { name: pick(BANK[style].standalone), style: style };
  }
  const B = BANK[style];
  // pattern 1: prefix + core
  // pattern 2: prefix + core + suffix
  // pattern 3: "The X Y"
  // pattern 4: keyword + suffix
  const r = Math.random();
  let name;
  if (r < 0.3) name = `${pick(B.prefixes)} ${pick(B.cores)}`;
  else if (r < 0.6) name = `${pick(B.prefixes)} ${pick(B.cores)} ${pick(B.suffixes)}`;
  else if (r < 0.8) name = `The ${pick(B.cores)}`;
  else name = `${pick(B.prefixes)} ${pick(B.suffixes)}`;
  // inject keyword
  if (k) {
    const kr = Math.random();
    if (kr < 0.4) name = `${cap(k)} ${name}`;
    else if (kr < 0.7) name = `${name} ${cap(k)}`;
    else name = `${cap(k)}'s ${pick(B.cores)}`;
  }
  return { name: name.replace(/\s+/g, ' ').trim(), style: style };
}

function styleLabel(s) {
  return { italian:'Italian', french:'French', asian:'Asian', mexican:'Mexican',
           seafood:'Seafood', modern:'Modern', cafe:'Café', grill:'Grill/BBQ' }[s] || s;
}

let favorites = JSON.parse(localStorage.getItem('rest-favs') || '[]');
let currentNames = [];

function renderResults() {
  const list = $('#results');
  if (currentNames.length === 0) {
    list.innerHTML = `<div class="empty">${t('emptyMsg')}</div>`;
    return;
  }
  list.innerHTML = currentNames.map((n, i) => {
    const isFav = favorites.includes(n.name);
    return `<div class="name-card${isFav?' fav':''}">
      <div>
        <div class="nm">${n.name}</div>
        <div class="style">${styleLabel(n.style)}</div>
      </div>
      <div class="actions">
        <button onclick="toggleFav(${i})" title="Favorite">${isFav?'★':'☆'}</button>
        <button onclick="copyName(${i})">${t('copy')}</button>
      </div>
    </div>`;
  }).join('');
}

function generate(append) {
  const style = $('#style').value;
  const keyword = $('#keyword').value;
  const styles = style === 'any' ? ['italian','french','asian','mexican','seafood','modern','cafe','grill'] : [style];
  const newNames = [];
  const count = 20;
  const seen = new Set(currentNames.map(n => n.name));
  let attempts = 0;
  while (newNames.length < count && attempts < count * 5) {
    const s = pick(styles);
    const n = genName(s, keyword);
    if (!seen.has(n.name)) { seen.add(n.name); newNames.push(n); }
    attempts++;
  }
  currentNames = append ? [...currentNames, ...newNames] : newNames;
  renderResults();
}

function toggleFav(i) {
  const name = currentNames[i].name;
  const idx = favorites.indexOf(name);
  if (idx >= 0) favorites.splice(idx, 1);
  else favorites.push(name);
  localStorage.setItem('rest-favs', JSON.stringify(favorites));
  renderResults();
}

function copyName(i) { copyText(currentNames[i].name); }
function copyFavs() { if (favorites.length) copyText(favorites.join('\n')); else copyText(''); }
function clearAll() { currentNames = []; favorites = []; localStorage.setItem('rest-favs', '[]'); renderResults(); }

window.toggleFav = toggleFav;
window.copyName = copyName;

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="generate(false)">${t('generate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="generate(true)">${t('more')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="copyFavs()">${t('exportFav')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="clearAll()">${t('clear')}</button>`;
window.generate = generate;
window.copyFavs = copyFavs;
window.clearAll = clearAll;

// auto-generate on first load
generate(false);

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'💼', href:'/text/business-name-generator.html', name:'Business Name'},
    {icon:'🏷️', href:'/text/brand-name-generator.html', name:'Brand Name'},
    {icon:'🏪', href:'/text/app-name-generator.html', name:'App Name'},
    {icon:'🎙️', href:'/text/podcast-name-generator.html', name:'Podcast Name'},
  ]
});
</script>
