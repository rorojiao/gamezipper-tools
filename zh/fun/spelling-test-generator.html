<script>
GZI18n.register({
  en: {
    toolTitle: 'Spelling Test Generator',
    toolDesc: 'Create free printable spelling test worksheets for classrooms and homeschooling. Generate word lists, fill-in-the-blank and scrambled letter spelling tests in seconds.',
    enterWords: 'Enter spelling words (one per line):',
    format: 'Test format:',
    fmtList: 'Word List + Write Lines',
    fmtBlank: 'Fill-in-the-Blank Lines',
    fmtScramble: 'Scrambled Letters',
    linesPerWord: 'Lines per word:',
    generate: 'Generate Test',
    print: 'Print Test',
    example: 'Example Words',
    name: 'Name:',
    date: 'Date:',
    score: 'Score:',
    unscramble: 'Unscramble each word:',
    step1: 'Enter your spelling words (one per line)',
    step2: 'Choose test format (list, blank, or scrambled)',
    step3: 'Set the number of practice lines per word',
    step4: 'Click Generate then Print',
  },
  zh: {
    toolTitle: '拼写测试生成器',
    toolDesc: '为课堂和家庭教育免费创建可打印的拼写测试练习题。快速生成单词表、填空和打乱字母拼写测试。',
    enterWords: '输入拼写单词（每行一个）：',
    format: '测试格式：',
    fmtList: '单词表 + 书写线',
    fmtBlank: '填空书写线',
    fmtScramble: '打乱字母',
    linesPerWord: '每词练习线数：',
    generate: '生成测试',
    print: '打印测试',
    example: '示例单词',
    name: '姓名：',
    date: '日期：',
    score: '分数：',
    unscramble: '请还原每个单词：',
    step1: '输入拼写单词（每行一个）',
    step2: '选择测试格式（单词表、填空或打乱字母）',
    step3: '设置每个单词的练习行数',
    step4: '点击生成然后打印',
  }
});

const { $, t } = GZ;

const exampleWords = `beautiful\nknowledge\nnecessary\nrhythm\nseparate\ntomorrow\nuntil\nweird\nneighbor\nfriend\nbecause\ndefinitely\nembarrass\noccurrence\nprivilege`;

$('#settings').innerHTML = `
  <div class="st-row"><label>${t('enterWords')}</label></div>
  <textarea class="st-textarea" id="wordsInput" spellcheck="false" placeholder="One word per line..."></textarea>
  <div class="st-row">
    <label>${t('format')}</label>
    <select class="st-select" id="fmtSelect">
      <option value="list" selected>${t('fmtList')}</option>
      <option value="blank">${t('fmtBlank')}</option>
      <option value="scramble">${t('fmtScramble')}</option>
    </select>
  </div>
  <div class="st-row">
    <label>${t('linesPerWord')}</label>
    <select class="st-select" id="linesSelect">
      <option value="1">1 line</option>
      <option value="2" selected>2 lines</option>
      <option value="3">3 lines</option>
    </select>
  </div>
`;

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="generateTest()">${t('generate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn" onclick="window.print()">${t('print')}</button>`;

function shuffleWord(w) {
  if (w.length < 2) return w;
  let arr = w.split('');
  let shuffled;
  do {
    shuffled = [...arr];
    for (let i = shuffled.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
    }
  } while (shuffled.join('') === w && arr.length > 1);
  return shuffled.join('');
}

function generateTest() {
  const raw = $('#wordsInput').value.trim();
  if (!raw) { $('#status').innerHTML = '<span style="color:var(--accent)">⚠ Please enter spelling words.</span>'; return; }
  const words = raw.split('\n').map(w => w.trim()).filter(w => w);
  const fmt = $('#fmtSelect').value;
  const lines = parseInt($('#linesSelect').value);

  let bodyHtml = '';
  if (fmt === 'list') {
    bodyHtml = `<div class="st-list">${words.map((w, i) => `
      <div class="st-list-item">
        <span class="n">${i + 1}.</span>
        <span style="min-width:120px">${w}</span>
        <span class="st-blank"></span>
      </div>
      ${Array(lines - 1).fill(0).map(() => `<div class="st-list-item"><span class="n"></span><span style="min-width:120px"></span><span class="st-blank"></span></div>`).join('')}
    `).join('')}</div>`;
  } else if (fmt === 'blank') {
    bodyHtml = `<div class="st-list">${words.map((w, i) => `
      <div class="st-list-item">
        <span class="n">${i + 1}.</span>
        <span class="st-blank"></span>
      </div>
    `).join('')}</div>
    <div class="st-lines">${Array(Math.min(words.length * lines, 30)).fill(0).map((_, i) => `<div class="st-line-item">${i + 1}.</div>`).join('')}</div>`;
  } else if (fmt === 'scramble') {
    bodyHtml = `<div style="font-size:.9rem;margin-bottom:10px;font-style:italic">${t('unscramble')}</div>
    <div class="st-list">${words.map((w, i) => `
      <div class="st-list-item">
        <span class="n">${i + 1}.</span>
        <span style="font-size:1.1rem;font-weight:700;letter-spacing:2px">${shuffleWord(w.toUpperCase())}</span>
        <span class="st-blank"></span>
      </div>
    `).join('')}</div>`;
  }

  $('#output').innerHTML = `<div class="st-worksheet">
    <div class="st-title">Spelling Test</div>
    <div class="st-sub">${$('#fmtSelect').selectedOptions[0].text} | ${words.length} words</div>
    <div class="st-name">${t('name')}<span></span> ${t('date')}<span></span> ${t('score')}<span></span></div>
    ${bodyHtml}
  </div>`;
  $('#status').innerHTML = `<span style="color:var(--success)">✓ Test generated with ${words.length} words.</span>`;
}

function loadExample() {
  $('#wordsInput').value = exampleWords;
  generateTest();
}

GZ.renderToolPage({
  category: 'fun',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],

    {icon:'📋', href:'/fun/word-search.html', name:'Word Search'},
    {icon:'🎴', href:'/fun/flashcard-maker.html', name:'Flashcards'},
    {icon:'🔢', href:'/fun/math-worksheet-generator.html', name:'Math Worksheet'},
  ]
});
</script>
