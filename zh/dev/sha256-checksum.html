  en: {

    toolDesc: '从任意文本或文件生成 SHA-1、SHA-256、SHA-384、SHA-512 校验和。即时、纯浏览器运行、无需上传。',
    lblIn: '输入要哈希的文本',
    dropHint: '📂 拖入文件或点击选择 — 文件内容在本地进行哈希',
    fileInfo: '文件：%f（%s 字节）',
    verify: '校验和验证 — 粘贴期望的哈希值进行比对',
    copy: '复制',
    clear: '清空',
    match: '✓ 匹配成功（%a）',
    nomatch: '没有算法与此哈希匹配',
    empty: '在上方输入文本或拖入文件以生成校验和',
    step1: '在输入框中输入或粘贴文本',
    step2: '拖入文件以对其原始字节进行哈希',
    step3: '点击任一哈希旁的「复制」（SHA-1/256/384/512）',
    step4: '在验证框中粘贴已知哈希以确认完整性',
  }
});

const { $, copyText, t } = GZ;
const ALGOS = ['SHA-1','SHA-256','SHA-384','SHA-512'];
let verifyHash = '';

async function digest(algo, data){
  const buf = await crypto.subtle.digest(algo, data);
  return [...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,'0')).join('');
}

function renderHashes(map){
  const box = $('#hashes');
  if(!Object.keys(map).length){ box.innerHTML = `<div style="opacity:.6;text-align:center;padding:14px">${t('empty')}</div>`; return; }
  box.innerHTML = ALGOS.map(a=>{
    const h = map[a] || '';
    return `<div class="gz-hash-row"><label>${a}</label><code id="h-${a}">${h}</code><button class="gz-btn gz-btn-secondary" onclick="copyText('${h}')">${t('copy')}</button></div>`;
  }).join('');
  runVerify();
}

async function fromText(){
  const txt = $('#input').value;
  const map = {};
  if(!txt){ renderHashes(map); return; }
  const data = new TextEncoder().encode(txt);
  for(const a of ALGOS) map[a] = await digest(a, data);
  renderHashes(map);
}

async function fromFile(file){
  if(!file) return;
  $('#fileInfo').textContent = t('fileInfo').replace('%f',file.name).replace('%s',file.size.toLocaleString());
  const buf = await file.arrayBuffer();
  const map = {};
  for(const a of ALGOS) map[a] = await digest(a, buf);
  renderHashes(map);
}

function runVerify(){
  const v = $('#verifyInput').value.trim().toLowerCase();
  const res = $('#verifyResult');
  if(!v){ res.innerHTML=''; return; }
  for(const a of ALGOS){
    const el = document.getElementById('h-'+a);
    if(el && el.textContent.toLowerCase() === v){
      res.innerHTML = `<span class="gz-match">${t('match').replace('%a',a)}</span>`;
      return;
    }
  }
  res.innerHTML = `<span class="gz-nomatch">${t('nomatch')}</span>`;
}

function doClear(){ $('#input').value=''; $('#fileInfo').textContent=''; $('#verifyInput').value=''; fromText(); }

$('#input').addEventListener('input', fromText);
$('#verifyInput').addEventListener('input', runVerify);

const drop = $('#drop');
drop.addEventListener('click', ()=>{ const i=document.createElement('input'); i.type='file'; i.onchange=e=>fromFile(e.target.files[0]); i.click(); });
['dragover','dragenter'].forEach(ev=>drop.addEventListener(ev,e=>{e.preventDefault();drop.classList.add('drag');}));
['dragleave','drop'].forEach(ev=>drop.addEventListener(ev,e=>{e.preventDefault();drop.classList.remove('drag');}));
drop.addEventListener('drop',e=>{ if(e.dataTransfer.files[0]) fromFile(e.dataTransfer.files[0]); });

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="fromText()">${t('copy')==='Copy'?'Hash text':'哈希文本'}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

drop.textContent = t('dropHint');
$('#lbl-in').textContent = t('lblIn');
$('#lbl-verify').textContent = t('verify');
$('#input').placeholder = t('lblIn');
renderHashes({});

});
