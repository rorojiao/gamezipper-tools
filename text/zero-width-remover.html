<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What are zero-width characters?", "acceptedAnswer": {"@type": "Answer", "text": "Zero-width characters are invisible Unicode characters that take up no visible space but can cause bugs in code, URLs, databases, and text processing. Common examples include Zero Width Space (U+200B), Zero Width Joiner (U+200D), and Zero Width Non-Joiner (U+200C)."}}, {"@type": "Question", "name": "How do invisible characters get into my text?", "acceptedAnswer": {"@type": "Answer", "text": "They often come from copying text from websites, chat apps, PDFs, or word processors. They can also be inserted accidentally through keyboard shortcuts or IME input methods."}}, {"@type": "Question", "name": "Why should I remove zero-width characters?", "acceptedAnswer": {"@type": "Answer", "text": "Invisible characters can cause string comparison failures, broken URLs, database query issues, rendering bugs, and security vulnerabilities. Removing them ensures clean, predictable text."}}, {"@type": "Question", "name": "Is my text processed securely?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. All processing happens entirely in your browser. No text data is ever sent to any server."}}]}</script>

<script>
GZI18n.register({
  en: {
    toolTitle: 'Zero Width Character Remover',
    toolDesc: 'Detect and remove invisible zero-width characters, hidden Unicode and control characters from text.',
    removedCount: 'Invisible chars found',
    charBefore: 'Before',
    charAfter: 'After',
    foundTypes: 'Character types found:',
    step1: 'Paste text that may contain invisible characters',
    step2: 'Click "Clean Text" to scan and remove zero-width characters',
    step3: 'Review the detected character types in the report below',
    step4: 'Copy the cleaned text to clipboard',
  },
  zh: {
    toolTitle: '零宽字符移除工具',
    toolDesc: '检测并移除文本中不可见的零宽字符、隐藏 Unicode 和控制字符。',
    removedCount: '发现隐形字符',
    charBefore: '处理前',
    charAfter: '处理后',
    foundTypes: '发现的字符类型：',
    step1: '粘贴可能包含隐形字符的文本',
    step2: '点击「清除文本」扫描并移除零宽字符',
    step3: '查看下方报告中的字符类型',
    step4: '复制干净的文本到剪贴板',
  }
});

const { $, copyText, t } = GZ;

const ZW_CHARS = [
  [/\u200B/g, 'U+200B Zero Width Space'],
  [/\u200C/g, 'U+200C Zero Width Non-Joiner'],
  [/\u200D/g, 'U+200D Zero Width Joiner'],
  [/\u2060/g, 'U+2060 Word Joiner'],
  [/\uFEFF/g, 'U+FEFF BOM / Zero Width No-Break Space'],
  [/\u00AD/g, 'U+00AD Soft Hyphen'],
  [/\u180E/g, 'U+180E Mongolian Vowel Separator'],
  [/\u202A-\u202E]/g, 'U+202A-202E BiDi Controls'],
  [/[\u202A\u202B\u202C\u202D\u202E]/g, 'U+202A-202E BiDi Controls'],
  [/\u2061-\u2064]/g, 'U+2061-2064 Invisible Operators'],
  [/[\u2061\u2062\u2063\u2064]/g, 'U+2061-2064 Invisible Operators'],
  [/\u200E-\u200F]/g, 'U+200E-200F LRM/RLM'],
  [/[\u200E\u200F]/g, 'U+200E-200F LRM/RLM'],
  [/[\u034F]/g, 'U+034F Combining Grapheme Joiner'],
  [/[\u2066\u2067\u2068\u2069]/g, 'U+2066-2069 BiDI Isolates'],
  [/\u0000/g, 'U+0000 Null'],
  [/[\u0001-\u001F]/g, 'U+0001-001F Control Chars'],
  [/[\u007F]/g, 'U+007F DEL'],
  [/\u00A0/g, 'U+00A0 Non-Breaking Space'],
];

function cleanText(text) {
  const found = new Map();
  let cleaned = text;
  for (const [regex, label] of ZW_CHARS) {
    const matches = cleaned.match(regex);
    if (matches && matches.length > 0) {
      found.set(label, matches.length);
    }
    cleaned = cleaned.replace(regex, '');
  }
  return { cleaned, found };
}

function processText() {
  const inp = $('#input').value;
  if (!inp) { $('#output').value = ''; $('#stats').innerHTML = ''; $('#found').style.display = 'none'; return; }
  const { cleaned, found } = cleanText(inp);
  $('#output').value = cleaned;
  const removed = inp.length - cleaned.length;
  $('#stats').innerHTML = `<span>${t('charBefore')}: ${inp.length}</span><span>${t('charAfter')}: ${cleaned.length}</span><span>${t('removedCount')}: ${removed >= 0 ? removed : 0}</span>`;

  if (found.size > 0) {
    let html = `<strong>${t('foundTypes')}</strong><br>`;
    for (const [label, count] of found) {
      html += `<code>${label} (${count})</code> `;
    }
    $('#found').innerHTML = html;
    $('#found').style.display = 'block';
  } else {
    $('#found').style.display = 'none';
  }
}

function loadExample() {
  const demo = 'Hello\u200BWorld\u200D!\uFEFF This\u200C has\u00AD invisible\u2060 chars.';
  $('#input').value = demo;
  processText();
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="processText()">${t('format')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="copyText($('#output').value)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#input').value='';$('#output').value='';$('#stats').innerHTML='';$('#found').style.display='none'">${t('clear')}</button>`;

$('#input').addEventListener('input', processText);

GZ.renderToolPage({

    {icon:'🔤', href:'/text/case-converter.html', name:'Case Converter'},
  ]
});
</script>
