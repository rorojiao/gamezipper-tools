<script>
GZI18n.register({
  en: {
    toolTitle: 'Photo Collage Maker',
    toolDesc: 'Create photo collages online — pick grid layouts (2, 3, 4, 6, 9, 12 photos), adjust spacing, background and rounded corners. Free, runs in your browser — no upload.',
    layout: 'Layout',
    upload: 'Photos',
    addText: 'Add Photos',
    size: 'Canvas Size',

    radius: 'Corner Radius',
    bg: 'Background',

    downloadJPG: 'Download JPG',
    done: 'Download started.',
    noPhotos: 'Add at least one photo.',
    step1: 'Click Add Photos to upload your images',
    step2: 'Choose a grid layout that matches your photo count',
    step3: 'Adjust spacing, background color and corner radius',
    step4: 'Click Download PNG or JPG to save the collage',
  },
  zh: {
    toolTitle: '照片拼贴制作工具',
    toolDesc: '在线制作照片拼贴 — 选择网格布局（2/3/4/6/9/12 张），调整间距、背景色和圆角。免费、浏览器本地运行 — 无需上传。',
    layout: '布局',
    upload: '照片',
    addText: '添加照片',
    size: '画布尺寸',
    spacing: '间距',
    radius: '圆角',
    bg: '背景色',
    downloadPNG: '下载 PNG',
    downloadJPG: '下载 JPG',
    done: '下载已开始。',
    noPhotos: '请至少添加一张照片。',
    step1: '点击添加照片上传图片',
    step2: '选择与照片数量匹配的网格布局',
    step3: '调整间距、背景色和圆角',
    step4: '点击下载 PNG 或 JPG 保存拼贴',
  }
});

const { $, t } = GZ;
let photos = []; // {img, src}
let layoutKey = '2h';

const LAYOUTS = {
  '2h': { icon: '⬛⬛', cols: 2, rows: 1 },
  '2v': { icon: '🟫\n🟫', cols: 1, rows: 2 },
  '3h': { icon: '⋮⋮⋮', cols: 3, rows: 1 },
  '4':  { icon: ' ⊞', cols: 2, rows: 2 },
  '3v': { icon: '⋮⋮⋮', cols: 1, rows: 3 },
  '6':  { icon: '3×2', cols: 3, rows: 2 },
  '9':  { icon: '3×3', cols: 3, rows: 3 },
  '12': { icon: '4×3', cols: 4, rows: 3 },
};

$('#add-photos').onclick = () => $('#photo-input').click();
$('#photo-input').addEventListener('change', e => {
  const files = Array.from(e.target.files);
  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = ev => {
      const image = new Image();
      image.onload = () => { photos.push({ img: image, src: ev.target.result }); renderThumbs(); renderCollage(); };
      image.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  });
  e.target.value = '';
});

function renderLayouts() {
  $('#layout-grid').innerHTML = Object.entries(LAYOUTS).map(([k, v]) =>
    `<button class="layout-btn ${k === layoutKey ? 'active' : ''}" data-k="${k}" title="${v.cols}×${v.rows}">${v.icon}</button>`
  ).join('');
  $$('.layout-btn').forEach(b => b.onclick = () => { layoutKey = b.dataset.k; renderLayouts(); renderCollage(); });
}

function renderThumbs() {
  $('#thumb-list').innerHTML = photos.map((p, i) =>
    `<div class="thumb-item"><img src="${p.src}"><button class="rm" onclick="removePhoto(${i})">✕</button></div>`
  ).join('');
}

function removePhoto(idx) {
  photos.splice(idx, 1);
  renderThumbs(); renderCollage();
}

function renderCollage() {
  const canvas = $('#collage-canvas');
  const ctx = canvas.getContext('2d');
  let size = +$('#canvas-size').value;
  const isWide = size === 1200 || size === 1280;
  const w = size, h = isWide ? Math.round(size * (size === 1200 ? 2/3 : 720/1280)) : size;
  canvas.width = w; canvas.height = h;
  ctx.fillStyle = $('#bg-color').value;
  ctx.fillRect(0, 0, w, h);
  const layout = LAYOUTS[layoutKey];
  const spacing = +$('#spacing').value;
  const radius = +$('#radius').value;
  const cellW = (w - spacing * (layout.cols + 1)) / layout.cols;
  const cellH = (h - spacing * (layout.rows + 1)) / layout.rows;
  let idx = 0;
  for (let r = 0; r < layout.rows; r++) {
    for (let c = 0; c < layout.cols; c++) {
      if (idx >= photos.length) break;
      const x = spacing + c * (cellW + spacing);
      const y = spacing + r * (cellH + spacing);
      // clip rounded rect
      ctx.save();
      ctx.beginPath();
      roundRect(ctx, x, y, cellW, cellH, radius);
      ctx.clip();
      // draw cover
      const p = photos[idx];
      const ir = p.img.width / p.img.height;
      const cr = cellW / cellH;
      let dw, dh;
      if (ir > cr) { dh = cellH; dw = dh * ir; } else { dw = cellW; dh = dw / ir; }
      ctx.drawImage(p.img, x + (cellW - dw) / 2, y + (cellH - dh) / 2, dw, dh);
      ctx.restore();
      idx++;
    }
  }
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}

['spacing', 'radius', 'bg-color', 'canvas-size'].forEach(id => {
  $('#' + id).addEventListener('input', () => {
    $('#spacing-val').textContent = $('#spacing').value + 'px';
    $('#radius-val').textContent = $('#radius').value + 'px';
    renderCollage();
  });
});

$('#btn-png').onclick = () => download('png');
$('#btn-jpg').onclick = () => download('jpg');

function download(fmt) {
  if (photos.length === 0) { $('#status').textContent = t('noPhotos'); return; }
  const canvas = $('#collage-canvas');
  canvas.toBlob(blob => {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'collage.' + fmt; a.click();
    URL.revokeObjectURL(url);
    $('#status').innerHTML = `<span style="color:var(--gz-success)">✓ ${t('done')}</span>`;
  }, fmt === 'png' ? 'image/png' : 'image/jpeg', 0.92);
}

// labels
$('#lbl-layout').textContent = t('layout');
$('#lbl-upload').textContent = t('upload');
$('#add-text').textContent = t('addText');
$('#lbl-size').textContent = t('size');
$('#lbl-spacing').textContent = t('spacing');
$('#lbl-radius').textContent = t('radius');
$('#lbl-bg').textContent = t('bg');
$('#btn-png').textContent = t('downloadPNG');
$('#btn-jpg').textContent = t('downloadJPG');
renderLayouts();

$('#toolbar').innerHTML = '';

GZ.renderToolPage({
  category: 'image',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🖼️', href:'/image/image-collage.html', name:'Image Collage'},
    {icon:'📐', href:'/image/resizer.html', name:'Image Resizer'},
    {icon:'🔄', href:'/image/converter.html', name:'Image Converter'},
    {icon:'🧹', href:'/image/remove-bg.html', name:'Background Remover'},
  ]
});
</script>
