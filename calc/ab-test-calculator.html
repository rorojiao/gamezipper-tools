<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"How do I know if my A/B test is statistically significant?","acceptedAnswer":{"@type":"Answer","text":"A result is usually considered statistically significant at the 95% confidence level, which corresponds to a p-value below 0.05. This calculator computes the two-proportion z-test for variants A and B and tells you whether the difference is significant at the 90%, 95% or 99% level."}},{"@type":"Question","name":"What is a good sample size for an A/B test?","acceptedAnswer":{"@type":"Answer","text":"Sample size depends on your baseline conversion rate, the minimum detectable effect, and the desired statistical power (typically 80%). As a rule of thumb you need thousands of visitors per variant to detect small lifts. The bigger the expected lift, the smaller the required sample."}},{"@type":"Question","name":"What is the difference between one-tailed and two-tailed tests?","acceptedAnswer":{"@type":"Answer","text":"A two-tailed test checks whether variant B is different from variant A in either direction (better or worse). A one-tailed test only checks for improvement. This calculator uses a two-tailed test by default because it is more conservative and is standard practice for A/B testing."}},{"@type":"Question","name":"Is my experiment data private?","acceptedAnswer":{"@type":"Answer","text":"Yes. The calculator runs entirely in your browser. No data is uploaded to any server."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>

  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="calc-grid">

</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'A/B Test Significance Calculator',
    toolDesc: 'Calculate statistical significance for A/B tests. Enter visitors and conversions for each variant to get conversion rates, lift, z-score, p-value, 95% CI and a clear winner — free and private.',
    control: 'Control (A)',
    variant: 'Variant (B)',
    visitors: 'Visitors',
    conversions: 'Conversions',
    convRate: 'Conversion rate',
    lift: 'Relative lift',
    zscore: 'Z-score',
    pvalue: 'p-value (two-tailed)',
    ci: '95% CI of lift',
    confidence: 'Confidence',
    winner: 'Variant B wins',
    loser: 'Variant B loses',
    tie: 'No significant difference',
    sig99: 'Significant at 99%',
    sig95: 'Significant at 95%',
    sig90: 'Significant at 90%',
    notsig: 'Not yet significant',
    step1: 'Enter visitors for the Control (A) and Variant (B)',
    step2: 'Enter conversions for each variant',
    step3: 'Read the conversion rate and relative lift',
    step4: 'Check the p-value and confidence to see if the result is significant',
  },
  zh: {
    toolTitle: 'A/B 测试显著性计算器',
    toolDesc: '计算 A/B 测试的统计显著性。输入各变体的访客数和转化数，获取转化率、提升幅度、Z 值、p 值、95% 置信区间和明确的获胜者 — 免费私密。',
    control: '对照组 (A)',
    variant: '实验组 (B)',
    visitors: '访客数',
    conversions: '转化数',
    convRate: '转化率',
    lift: '相对提升',
    zscore: 'Z 值',
    pvalue: 'p 值（双尾）',
    ci: '提升的 95% 置信区间',
    confidence: '置信度',
    winner: '实验组 B 胜出',
    loser: '实验组 B 落后',
    tie: '无显著差异',
    sig99: '99% 显著',
    sig95: '95% 显著',
    sig90: '90% 显著',
    notsig: '尚不显著',
    step1: '输入对照组 (A) 和实验组 (B) 的访客数',
    step2: '输入各组的转化数',
    step3: '查看转化率和相对提升',
    step4: '根据 p 值和置信度判断结果是否显著',
  }
});

const { $, t } = GZ;

$('#card-a').innerHTML = `<h3><span class="swatch" style="background:#3b82f6"></span>${t('control')}</h3>
  <div class="field"><label>${t('visitors')}</label><input type="number" id="na" value="10000" min="0" step="100"></div>
  <div class="field"><label>${t('conversions')}</label><input type="number" id="ca" value="320" min="0" step="1"></div>`;
$('#card-b').innerHTML = `<h3><span class="swatch" style="background:#22c55e"></span>${t('variant')}</h3>
  <div class="field"><label>${t('visitors')}</label><input type="number" id="nb" value="10000" min="0" step="100"></div>
  <div class="field"><label>${t('conversions')}</label><input type="number" id="cb" value="390" min="0" step="1"></div>`;
document.querySelectorAll('input[type=number]').forEach(i => i.addEventListener('input', recalc));

// Standard normal CDF via Abramowitz & Stegun 26.2.17
function normalCdf(z) {
  const t = 1 / (1 + 0.2316419 * Math.abs(z));
  const d = 0.3989423 * Math.exp(-z * z / 2);
  const p = d * t * (0.3193815 + t * (-0.3565638 + t * (1.781478 + t * (-1.821256 + t * 1.330274))));
  return z > 0 ? 1 - p : p;
}

function recalc() {
  const na = +$('#na').value || 0, ca = +$('#ca').value || 0;
  const nb = +$('#nb').value || 0, cb = +$('#cb').value || 0;
  const pa = na > 0 ? ca / na : 0;
  const pb = nb > 0 ? cb / nb : 0;
  const pooled = (na + nb) > 0 ? (ca + cb) / (na + nb) : 0;
  const se = Math.sqrt(pooled * (1 - pooled) * (1 / Math.max(1, na) + 1 / Math.max(1, nb)));
  const z = se > 0 ? (pb - pa) / se : 0;
  const pTwo = 2 * (1 - normalCdf(Math.abs(z)));
  const lift = pa > 0 ? (pb - pa) / pa * 100 : 0;
  // 95% CI on the difference in proportions
  const seDiff = Math.sqrt(pa * (1 - pa) / Math.max(1, na) + pb * (1 - pb) / Math.max(1, nb));
  const ciLow = (pb - pa) - 1.96 * seDiff;
  const ciHigh = (pb - pa) + 1.96 * seDiff;
  // Lift CI in percentage points relative to baseline
  const liftLow = pa > 0 ? ciLow / pa * 100 : 0;
  const liftHigh = pa > 0 ? ciHigh / pa * 100 : 0;
  const conf = (1 - pTwo) * 100;

  let verdict = 'tie', vText = t('tie'), sigText = t('notsig');
  if (na > 0 && nb > 0 && ca >= 0 && cb >= 0) {
    if (pTwo < 0.01) { sigText = t('sig99'); verdict = pb > pa ? 'win' : 'lose'; vText = pb > pa ? t('winner') : t('loser'); }
    else if (pTwo < 0.05) { sigText = t('sig95'); verdict = pb > pa ? 'win' : 'lose'; vText = pb > pa ? t('winner') : t('loser'); }
    else if (pTwo < 0.10) { sigText = t('sig90'); verdict = pb > pa ? 'win' : 'lose'; vText = pb > pa ? t('winner') : t('loser'); }
    else { sigText = t('notsig'); verdict = 'tie'; vText = t('tie'); }
  }

  const maxRate = Math.max(pa, pb, 0.0001);
  $('#results').innerHTML = `
    <div class="big-verdict ${verdict}">${vText}</div>
    <div style="opacity:.8;font-size:.9em">${sigText}</div>
    <div class="legend">
      <span><span class="swatch" style="background:#3b82f6;width:10px;height:10px;border-radius:3px;display:inline-block"></span>A: ${(pa*100).toFixed(2)}%</span>
      <span><span class="swatch" style="background:#22c55e;width:10px;height:10px;border-radius:3px;display:inline-block"></span>B: ${(pb*100).toFixed(2)}%</span>
    </div>
    <div class="conv-bar"><div style="background:#3b82f6;width:${(pa/maxRate*100).toFixed(1)}%;height:50%;display:inline-block;vertical-align:bottom"></div><div style="background:#22c55e;width:${(pb/maxRate*100).toFixed(1)}%;height:50%;display:inline-block;vertical-align:bottom"></div></div>
    <div class="result-grid">
      <div class="stat"><div class="lbl">${t('lift')}</div><div class="val">${lift >= 0 ? '+' : ''}${lift.toFixed(1)}%</div><div class="sub">${t('convRate')} B vs A</div></div>
      <div class="stat"><div class="lbl">${t('zscore')}</div><div class="val">${z.toFixed(3)}</div><div class="sub">${se > 0 ? 'two-proportion z' : '—'}</div></div>
      <div class="stat"><div class="lbl">${t('pvalue')}</div><div class="val">${pTwo < 0.0001 ? '<0.0001' : pTwo.toFixed(4)}</div><div class="sub">${t('confidence')}: ${conf.toFixed(1)}%</div></div>
      <div class="stat" style="grid-column:1/-1"><div class="lbl">${t('ci')} (relative)</div><div class="val" style="font-size:1.1em">${liftLow >= 0 ? '+' : ''}${liftLow.toFixed(1)}% &nbsp;→&nbsp; ${liftHigh >= 0 ? '+' : ''}${liftHigh.toFixed(1)}%</div><div class="sub">95% CI of relative lift</div></div>
    </div>
  `;
}
recalc();

$('#toolbar').innerHTML = `<button class="gz-btn gz-btn-secondary" onclick="document.querySelectorAll('input[type=number]').forEach(i=>i.value='');recalc()">Clear</button>`;

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🔬', href:'/calc/sample-size-calculator.html', name:'Sample Size'},
    {icon:'📏', href:'/calc/confidence-interval-calculator.html', name:'Confidence Interval'},
    {icon:'🎯', href:'/calc/binomial-distribution-calculator.html', name:'Binomial'},
    {icon:'📐', href:'/calc/normal-distribution.html', name:'Normal Distribution'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
