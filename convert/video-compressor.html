<script>
GZI18n.register({
  en: {
    toolTitle: 'Video Compressor',
    toolDesc: 'Compress MP4 and WebM videos online — adjust quality, resolution and bitrate. Free, private, runs entirely in your browser.',
    dropLabel: 'Drag & drop a video file here, or click to select',
    sourceLabel: 'Original Video',
    qualityLabel: 'Video Bitrate:',

    newTool: 'New',
    step1: 'Drag and drop or select a video file (MP4 or WebM)',
    step2: 'Choose video bitrate and resolution scale',
    step3: 'Click "Start Compression" and wait for processing',
    step4: 'Preview the result and download the compressed video',
  },
  zh: {
    toolTitle: '视频压缩工具',
    toolDesc: '在线压缩 MP4 和 WebM 视频 — 调整质量、分辨率和码率。免费、私密，完全在浏览器中处理。',
    dropLabel: '拖拽视频文件到此处，或点击选择',
    sourceLabel: '原始视频',
    qualityLabel: '视频码率：',
    resolutionLabel: '分辨率缩放：',
    compressBtn: '▶ 开始压缩',
    compressing: '压缩中…',
    resultTitle: '压缩完成！',
    downloadBtn: '⬇ 下载压缩后的视频',
    original: '原始',
    compressed: '压缩后',
    saved: '节省',
    duration: '时长',
    fileSize: '文件大小',
    newTool: '新',
    step1: '拖拽或选择一个视频文件（MP4 或 WebM）',
    step2: '选择视频码率和分辨率缩放',
    step3: '点击「开始压缩」等待处理完成',
    step4: '预览结果并下载压缩后的视频',
  }
});

const { $, t } = GZ;
let sourceFile = null;
let resultBlob = null;

const dropZone = $('#dropZone');
const fileInput = $('#fileInput');

$('#dropLabel').textContent = t('dropLabel');
$('#lblQuality').textContent = t('qualityLabel');
$('#lblResolution').textContent = t('resolutionLabel');
$('#compressBtn').textContent = t('compressBtn');

dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('dragover'); if(e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]); });
fileInput.addEventListener('change', () => { if(fileInput.files.length) handleFile(fileInput.files[0]); });

function formatSize(bytes) {
  if(bytes<1024) return bytes+' B';
  if(bytes<1048576) return (bytes/1024).toFixed(1)+' KB';
  return (bytes/1048576).toFixed(2)+' MB';
}

function formatDuration(sec) {
  const m = Math.floor(sec/60), s = Math.floor(sec%60);
  return `${m}:${s.toString().padStart(2,'0')}`;
}

function handleFile(file) {
  if(!file.type.match(/video\/(mp4|webm|ogg)/)) { alert('Please select an MP4 or WebM video file.'); return; }
  sourceFile = file;
  const vid = $('#previewVideo');
  vid.src = URL.createObjectURL(file);
  vid.onloadedmetadata = () => {
    $('#sourceInfo').style.display = 'block';
    dropZone.style.display = 'none';
    $('#sourceStats').innerHTML = `
      <span class="stat">📄 ${file.name}</span>
      <span class="stat">${t('fileSize')}: ${formatSize(file.size)}</span>
      <span class="stat">${vid.videoWidth}×${vid.videoHeight}</span>
      <span class="stat">${t('duration')}: ${formatDuration(vid.duration)}</span>
    `;
  };
}

async function startCompress() {
  if(!sourceFile) return;
  const vid = $('#previewVideo');
  const bitsPerSecond = parseInt($('#videoBitsPerSecond').value);
  const scale = parseFloat($('#scaleFactor').value);
  const targetW = Math.round(vid.videoWidth * scale / 2) * 2;
  const targetH = Math.round(vid.videoHeight * scale / 2) * 2;

  $('#compressBtn').disabled = true;
  $('#compressBtn').textContent = t('compressing');
  $('#progressSection').style.display = 'block';
  $('#resultSection').style.display = 'none';

  // Use canvas + MediaRecorder approach
  const canvas = document.createElement('canvas');
  canvas.width = targetW;
  canvas.height = targetH;
  const ctx = canvas.getContext('2d');

  const stream = canvas.captureStream(30);
  // Try to get audio
  try {
    const audioCtx = new AudioContext();
    const source = audioCtx.createMediaElementSource(vid);
    const dest = audioCtx.createMediaStreamDestination();
    source.connect(dest);
    source.connect(audioCtx.destination);
    dest.stream.getAudioTracks().forEach(track => stream.addTrack(track));
  } catch(e) {}

  const mimeType = MediaRecorder.isTypeSupported('video/webm;codecs=vp9,opus') ? 'video/webm;codecs=vp9,opus'
    : MediaRecorder.isTypeSupported('video/webm;codecs=vp8,opus') ? 'video/webm;codecs=vp8,opus'
    : 'video/webm';

  const recorder = new MediaRecorder(stream, { mimeType, videoBitsPerSecond: bitsPerSecond });
  const chunks = [];
  recorder.ondataavailable = e => { if(e.data.size) chunks.push(e.data); };

  recorder.onstop = () => {
    resultBlob = new Blob(chunks, { type: 'video/webm' });
    $('#progressSection').style.display = 'none';
    $('#resultSection').style.display = 'block';
    $('#resultTitle').textContent = t('resultTitle');
    const saved = ((1 - resultBlob.size / sourceFile.size) * 100).toFixed(1);
    $('#resultStats').innerHTML = `
      <span class="stat">${t('original')}: ${formatSize(sourceFile.size)}</span>
      <span class="stat">${t('compressed')}: ${formatSize(resultBlob.size)}</span>
      <span class="stat" style="color:var(--accent)">${t('saved')}: ${saved}%</span>
      <span class="stat">${targetW}×${targetH}</span>
    `;
    const rv = $('#resultVideo');
    rv.src = URL.createObjectURL(resultBlob);
    $('#downloadBtn').textContent = t('downloadBtn');
    $('#compressBtn').disabled = false;
    $('#compressBtn').textContent = t('compressBtn');
  };

  recorder.start(1000);
  vid.currentTime = 0;
  vid.muted = false;

  function drawFrame() {
    if(vid.ended || vid.paused) { recorder.stop(); return; }
    ctx.drawImage(vid, 0, 0, targetW, targetH);
    const pct = (vid.currentTime / vid.duration * 100).toFixed(0);
    $('#progressFill').style.width = pct + '%';
    $('#progressText').textContent = `${t('compressing')} ${pct}%`;
    requestAnimationFrame(drawFrame);
  }

  vid.onplay = () => drawFrame();
  vid.onended = () => { setTimeout(() => { if(recorder.state === 'recording') recorder.stop(); }, 200); };
  await vid.play();
}

function downloadResult() {
  if(!resultBlob) return;
  const a = document.createElement('a');
  a.href = URL.createObjectURL(resultBlob);
  a.download = sourceFile.name.replace(/\.[^.]+$/, '') + '_compressed.webm';
  a.click();
}

$('#toolbar').innerHTML = `<button class="gz-btn gz-btn-secondary" onclick="resetTool()">${t('clear')}</button>`;

function resetTool() {
  sourceFile = null; resultBlob = null;
  dropZone.style.display = 'block';
  $('#sourceInfo').style.display = 'none';
  $('#progressSection').style.display = 'none';
  $('#resultSection').style.display = 'none';
  fileInput.value = '';
}

GZ.renderToolPage({
  category: 'convert',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],

    {icon:'🎞️', href:'/convert/video-to-gif.html', name:'Video to GIF'},
    {icon:'🗜️', href:'/convert/gif-compressor.html', name:'GIF Compressor'},
    {icon:'🎵', href:'/convert/audio-converter.html', name:'Audio Converter'},
  ]
});
</script>
