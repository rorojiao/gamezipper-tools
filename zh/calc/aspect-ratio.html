<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-presets" id="presets"></div>
    <div class="gz-calc-grid">
      <div class="gz-field">
        <label id="lbl-w"></label>
        <input type="number" id="inp-w" min="1" placeholder="1920">
      </div>
      <div class="gz-field">
        <label id="lbl-h"></label>
        <input type="number" id="inp-h" min="1" placeholder="1080">
      </div>
    </div>
    <div class="gz-section" id="results-section">
      <h3 id="lbl-results"></h3>
      <div id="results"></div>
    </div>
    <div id="preview-box">
      <div id="preview-rect"></div>
      <div id="preview-label"></div>
    </div>
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="gz-section">
      <h3 id="lbl-resize"></h3>
      <div class="gz-calc-grid">
        <div class="gz-field">
          <label id="lbl-new-w"></label>
          <input type="number" id="inp-new-w" min="1">
        </div>
        <div class="gz-field">
          <label id="lbl-new-h"></label>
          <input type="number" id="inp-new-h" min="1">
        </div>
      </div>
      <div id="resize-result"></div>
    </div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en:{
    toolTitle:'Aspect Ratio Calculator',
    toolDesc:'Calculate aspect ratios and resize dimensions for screens, images, and videos.',
    lblWidth:'Width (px)',
    lblHeight:'Height (px)',
    lblResults:'Results',
    lblResize:'Resize Keeping Aspect Ratio',
    lblNewW:'New Width',
    lblNewH:'New Height',
    ratio:'Aspect Ratio',
    decimal:'Decimal',
    orientation:'Orientation',
    landscape:'Landscape',
    portrait:'Portrait',
    square:'Square',
    pixelCount:'Total Pixels',
    preset16_9:'16:9 (HD)',
    preset4_3:'4:3 (Classic)',
    preset1_1:'1:1 (Square)',
    preset21_9:'21:9 (Ultrawide)',
    preset9_16:'9:16 (Vertical)',
    preset3_2:'3:2 (Photo)',
    preset2_1:'2:1 (Univisium)',
    step1:'Enter width and height in pixels',
    step2:'View the aspect ratio, decimal ratio and total pixels',
    step3:'Enter a new width or height to calculate the matching dimension',
    step4:'Use presets for common aspect ratios',
  },
  zh:{
    toolTitle:'宽高比计算器',
    toolDesc:'计算屏幕、图片和视频的宽高比，并根据比例调整尺寸。',
    lblWidth:'宽度 (px)',
    lblHeight:'高度 (px)',
    lblResults:'计算结果',
    lblResize:'按比例调整尺寸',
    lblNewW:'新宽度',
    lblNewH:'新高度',
    ratio:'宽高比',
    decimal:'小数比例',
    orientation:'方向',
    landscape:'横向',
    portrait:'纵向',
    square:'正方形',
    pixelCount:'总像素',
    preset16_9:'16:9 (高清)',
    preset4_3:'4:3 (经典)',
    preset1_1:'1:1 (正方形)',
    preset21_9:'21:9 (超宽屏)',
    preset9_16:'9:16 (竖屏)',
    preset3_2:'3:2 (照片)',
    preset2_1:'2:1 (电影)',
    step1:'输入宽度和高度（像素）',
    step2:'查看宽高比、小数比例和总像素',
    step3:'输入新宽度或高度来计算对应尺寸',
    step4:'使用预设选择常见宽高比',
  }
});

const { $, copyText, t } = GZ;

$('#lbl-w').textContent = t('lblWidth');
$('#lbl-h').textContent = t('lblHeight');
$('#lbl-results').textContent = t('lblResults');
$('#lbl-resize').textContent = t('lblResize');
$('#lbl-new-w').textContent = t('lblNewW');
$('#lbl-new-h').textContent = t('lblNewH');

function gcd(a, b) { return b === 0 ? a : gcd(b, a % b); }

const presetList = [
  {label:t('preset16_9'), w:16, h:9},
  {label:t('preset4_3'), w:4, h:3},
  {label:t('preset1_1'), w:1, h:1},
  {label:t('preset21_9'), w:21, h:9},
  {label:t('preset9_16'), w:9, h:16},
  {label:t('preset3_2'), w:3, h:2},
  {label:t('preset2_1'), w:2, h:1},
];

$('#presets').innerHTML = presetList.map((p,i) =>
  `<button onclick="applyPreset(${i})">${p.label}</button>`
).join('');

function applyPreset(i) {
  const p = presetList[i];
  const base = 120;
  const ratio = p.w / p.h;
  if (ratio >= 1) {
    $('#inp-w').value = base * ratio;
    $('#inp-h').value = base;
  } else {
    $('#inp-w').value = base;
    $('#inp-h').value = base / ratio;
  }
  calculate();
}

function calculate() {
  const w = parseInt($('#inp-w').value);
  const h = parseInt($('#inp-h').value);
  if (!w || !h || w <= 0 || h <= 0) { $('#results').innerHTML = ''; updatePreview(1,1); return; }
  const g = gcd(w, h);
  const rw = w / g;
  const rh = h / g;
  const decimal = (w / h).toFixed(4);
  const orientation = w > h ? t('landscape') : (w < h ? t('portrait') : t('square'));
  const pixels = (w * h).toLocaleString();

  $('#results').innerHTML = `
    <div class="gz-result-row"><span class="gz-result-label">${t('ratio')}</span><span class="gz-result-value">${rw}:${rh}</span></div>
    <div class="gz-result-row"><span class="gz-result-label">${t('decimal')}</span><span class="gz-result-value">${decimal}</span></div>
    <div class="gz-result-row"><span class="gz-result-label">${t('orientation')}</span><span class="gz-result-value">${orientation}</span></div>
    <div class="gz-result-row"><span class="gz-result-label">${t('pixelCount')}</span><span class="gz-result-value">${pixels} px</span></div>`;

  updatePreview(w, h);
  calcResize();
}

function updatePreview(w, h) {
  const maxDim = 240;
  const ratio = w / h;
  let pw, ph;
  if (ratio >= 1) { pw = maxDim; ph = maxDim / ratio; }
  else { ph = maxDim; pw = maxDim * ratio; }
  const rect = $('#preview-rect');
  rect.style.width = pw + 'px';
  rect.style.height = ph + 'px';
  $('#preview-label').textContent = `${w} × ${h}`;
}

function calcResize() {
  const w = parseInt($('#inp-w').value);
  const h = parseInt($('#inp-h').value);
  const nw = parseInt($('#inp-new-w').value);
  const nh = parseInt($('#inp-new-h').value);
  if (!w || !h || w <= 0 || h <= 0) { $('#resize-result').textContent = ''; return; }
  const ratio = w / h;
  if (nw && nw > 0) {
    const calcH = Math.round(nw / ratio);
    $('#resize-result').innerHTML = `<span style="opacity:.7">${nw} × <strong style="color:var(--gz-accent)">${calcH}</strong> px</span>`;
  } else if (nh && nh > 0) {
    const calcW = Math.round(nh * ratio);
    $('#resize-result').innerHTML = `<span style="opacity:.7"><strong style="color:var(--gz-accent)">${calcW}</strong> × ${nh} px</span>`;
  } else {
    $('#resize-result').textContent = '';
  }
}

['inp-w','inp-h'].forEach(id => $('#'+id).addEventListener('input', calculate));
['inp-new-w','inp-new-h'].forEach(id => $('#'+id).addEventListener('input', calcResize));

$('#toolbar').innerHTML = `<button class="gz-btn gz-btn-secondary" onclick="clearAll()">${t('clear')}</button>`;

function clearAll() {
  ['inp-w','inp-h','inp-new-w','inp-new-h'].forEach(id => $('#'+id).value='');
  $('#results').innerHTML = '';
  $('#resize-result').textContent = '';
  updatePreview(1,1);
  $('#preview-label').textContent = '';
}

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📐', href:'/image/resizer.html', name:'Image Resizer'},
    {icon:'🖼️', href:'/image/placeholder.html', name:'Placeholder Image'},
    {icon:'🖥️', href:'/dev/screen-resolution.html', name:'Screen Resolution'},
    {icon:'📏', href:'/convert/unit.html', name:'Unit Converter'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
