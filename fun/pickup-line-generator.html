const CATS = [
  {id:'all', icon:'✨'}, {id:'cheesy', icon:'🧀'}, {id:'funny', icon:'😂'}, {id:'cute', icon:'🥰'}, {id:'smooth', icon:'😎'}
];
const EMOJI = {cheesy:'🧀', funny:'😂', cute:'🥰', smooth:'😎', all:'😍'};
let cat = 'all', lastIdx = -1, shown = 0;

function pool() {
  const lang = GZI18n.getLang() === 'zh' ? 'zh' : 'en';
  const src = LINES[lang];
  if (cat === 'all') {
    const all = [];
    for (const k in src) src[k].forEach(t => all.push({t, tag:k}));
    return all;
  }
  return (src[cat] || []).map(t => ({t, tag:cat}));
}

function pick() {
  const p = pool();
  if (!p.length) return null;
  let idx;
  do { idx = Math.floor(Math.random() * p.length); } while (p.length > 1 && idx === lastIdx);
  lastIdx = idx;
  return p[idx];
}

function render() {
  const item = pick();
  if (!item) return;
  $('#emoji').textContent = EMOJI[item.tag] || '😍';
  $('#tag').textContent = t(item.tag);
  $('#line').textContent = item.t;
  shown++;
  $('#counter').textContent = (GZI18n.getLang()==='zh' ? `已为你送上 ${shown} 句情话 💕` : `${shown} lines served 💕`);
}

function buildCats() {
  $('#cats').innerHTML = CATS.map(c =>
    `<button class="cat-btn${c.id===cat?' active':''}" data-c="${c.id}">${c.icon} ${t(c.id)}</button>`).join('');
  GZ.$$('#cats .cat-btn').forEach(b => b.onclick = () => { cat = b.dataset.c; lastIdx=-1; buildCats(); render(); });
}

function shareLine() {
  const txt = $('#line').textContent;
  if (navigator.share) { navigator.share({title:'GameZipper Pickup Line', text:txt}).catch(()=>{}); }
  else { copyText(txt); }
}

$('#toolbar').innerHTML = `
