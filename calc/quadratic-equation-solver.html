<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"What is a quadratic equation?","acceptedAnswer":{"@type":"Answer","text":"A quadratic equation is a second-degree polynomial of the form ax²+bx+c=0, where a, b and c are real numbers and a ≠ 0. Its graph is a parabola."}},{"@type":"Question","name":"What is the quadratic formula?","acceptedAnswer":{"@type":"Answer","text":"The quadratic formula is x = (-b ± √(b²-4ac)) / (2a). Plugging a, b and c into this formula gives the two roots (solutions) of the equation."}},{"@type":"Question","name":"What does the discriminant tell me?","acceptedAnswer":{"@type":"Answer","text":"The discriminant is Δ = b²-4ac. If Δ > 0 there are two distinct real roots; if Δ = 0 there is one repeated real root; if Δ < 0 there are two complex conjugate roots."}},{"@type":"Question","name":"What are the vertex and axis of symmetry?","acceptedAnswer":{"@type":"Answer","text":"The axis of symmetry is the vertical line x = -b/(2a). The vertex of the parabola sits on this line at the point (-b/(2a), f(-b/(2a))). It is the minimum (if a > 0) or maximum (if a < 0) of the parabola."}}]}</script>

<script>

    solve: '求解',
    example: '示例',
    clear: '清空',
    roots: '根（解）',
    discriminant: '判别式 (Δ = b²−4ac)',
    vertex: '顶点',
    axis: '对称轴',
    direction: '抛物线开口',
    stepDisc: '计算判别式：Δ = b² − 4ac',
    stepRoots: '套用求根公式：x = (−b ± √Δ) / (2a)',
    twoReal: 'Δ > 0 → 两个不相等的实数根',
    oneReal: 'Δ = 0 → 两个相等的实数根',
    complex: 'Δ < 0 → 两个共轭复数根',
    upward: '向上（有最小值）',
    downward: '向下（有最大值）',
    linearEq: 'a 不能为 0 — 这是一元一次方程，不是二次方程。',
    needInput: '请输入 a、b、c 的值以求解。',
    step1: '输入方程 ax²+bx+c=0 的系数 a、b、c',
    step2: '查看根、判别式、顶点和对称轴',
    step3: '阅读分步推导，理解答案的求解过程',

const { $, t } = GZ;

function fmt(n) {
  if (!isFinite(n)) return '∞';
  // Round to avoid float noise, keep up to 6 sig digits
  const r = Math.round(n * 1e10) / 1e10;
  if (Number.isInteger(r)) return String(r);
  return String(parseFloat(r.toPrecision(12)));
}

function fmtComplex(re, im) {
  if (Math.abs(im) < 1e-12) return fmt(re);
  const reStr = Math.abs(re) < 1e-12 ? '' : fmt(re);
  const sign = im < 0 ? '−' : '+';
  const imAbs = fmt(Math.abs(im));
  const imPart = imAbs === '1' ? 'i' : imAbs + 'i';
  if (!reStr) return (im < 0 ? '−' : '') + imPart;
  return `${reStr} ${sign} ${imPart}`;
}

function sqrtComplex(n) {
  if (n >= 0) return { re: Math.sqrt(n), im: 0, isReal: true };
  return { re: 0, im: Math.sqrt(-n), isReal: false };
}

function solve() {
  const a = parseFloat($('#inA').value);
  const b = parseFloat($('#inB').value);
  const c = parseFloat($('#inC').value);
  const out = $('#output');
  if (isNaN(a) || isNaN(b) || isNaN(c)) { out.innerHTML = `<p style="opacity:.6">${t('needInput')}</p>`; drawPlot(1,-5,6); return; }
  if (a === 0) {
    out.innerHTML = `<div class="qe-result-card"><p style="color:var(--gz-accent,#e94560)">${t('linearEq')}</p></div>`;
    drawPlot(0, b, c);
    return;
  }
  const disc = b*b - 4*a*c;
  const s = sqrtComplex(disc);
  const negB = -b;
  const twoA = 2*a;
  const r1re = (negB + s.re) / twoA;
  const r1im = s.im / twoA;
  const r2re = (negB - s.re) / twoA;
  const r2im = -s.im / twoA;
  const vx = -b / (2*a);
  const vy = a*vx*vx + b*vx + c;
  const opensUp = a > 0;

  let nature;
  if (disc > 0) nature = t('twoReal');
  else if (disc === 0) nature = t('oneReal');
  else nature = t('complex');

  const root1 = fmtComplex(r1re, r1im);
  const root2 = fmtComplex(r2re, r2im);

  out.innerHTML = `
    <div class="qe-result-card">
      <h3 style="margin:0 0 10px;font-size:1.05em">${t('roots')} <span style="font-size:.8em;color:var(--text2,#aaa);font-weight:400">— ${nature}</span></h3>
      <div class="qe-roots">
        <div class="qe-root"><div class="label">x₁</div><div class="value">${root1}</div></div>
        <div class="qe-root"><div class="label">x₂</div><div class="value">${root2}</div></div>
      </div>
      <div class="qe-info">
        <div><span>${t('discriminant')}</span><b>Δ = ${fmt(disc)}</b></div>
        <div><span>${t('axis')}</span><b>x = ${fmt(vx)}</b></div>
        <div><span>${t('vertex')}</span><b>(${fmt(vx)}, ${fmt(vy)})</b></div>
        <div><span>${t('direction')}</span><b>${opensUp ? t('upward') : t('downward')}</b></div>
      </div>
    </div>
    <div class="qe-steps">
      <span class="step"><b>1.</b> ${t('stepDisc')}:</span>
      <span class="step" style="padding-left:18px">Δ = (${fmt(b)})² − 4·(${fmt(a)})·(${fmt(c)}) = ${fmt(b*b)} − ${fmt(4*a*c)} = <b>${fmt(disc)}</b></span>
      <span class="step"><b>2.</b> ${t('stepRoots')}:</span>
      <span class="step" style="padding-left:18px">x = (${fmt(negB)} ± √${fmt(disc)}) / ${fmt(twoA)}</span>
      <span class="step" style="padding-left:18px">x₁ = <b>${root1}</b>　　x₂ = <b>${root2}</b></span>
    </div>`;

  drawPlot(a, b, c, r1re, r2re, disc);
}

function drawPlot(a, b, c, r1, r2, disc) {
  const canvas = $('#plot');
  const dpr = window.devicePixelRatio || 1;
  const W = canvas.clientWidth, H = canvas.clientHeight;
  canvas.width = W * dpr; canvas.height = H * dpr;
  const ctx = canvas.getContext('2d');
  ctx.setTransform(dpr,0,0,dpr,0,0);
  ctx.clearRect(0,0,W,H);

  // Choose x range around vertex
  const vx = a !== 0 ? -b/(2*a) : 0;
  let xMin, xMax;
  if (a !== 0 && isFinite(r1) && isFinite(r2) && disc >= 0) {
    const lo = Math.min(r1, r2, vx), hi = Math.max(r1, r2, vx);
    const pad = Math.max(2, (hi-lo) * 0.4 + 1);
    xMin = lo - pad; xMax = hi + pad;
  } else if (a !== 0) {
    xMin = vx - 6; xMax = vx + 6;
  } else {
    xMin = -6; xMax = 6;
  }
  if (!isFinite(xMin) || !isFinite(xMax) || xMin >= xMax) { xMin = -6; xMax = 6; }

  // sample y range
  const N = 200;
  let yMin = Infinity, yMax = -Infinity;
  const ys = [];
  for (let i=0;i<=N;i++){
    const x = xMin + (xMax-xMin)*i/N;
    const y = a*x*x + b*x + c;
    ys.push(y);
    if (isFinite(y)) { if (y<yMin) yMin=y; if (y>yMax) yMax=y; }
  }
  if (!isFinite(yMin) || !isFinite(yMax)) { yMin=-10; yMax=10; }
  const yPad = (yMax-yMin)*0.15 + 1;
  yMin -= yPad; yMax += yPad;

  const padL=40, padR=16, padT=16, padB=28;
  const px = x => padL + (x-xMin)/(xMax-xMin)*(W-padL-padR);
  const py = y => padT + (yMax-y)/(yMax-yMin)*(H-padT-padB);

  // grid
  ctx.strokeStyle = 'rgba(255,255,255,0.06)';
  ctx.lineWidth = 1;
  for (let gx=Math.ceil(xMin); gx<=Math.floor(xMax); gx++){
    ctx.beginPath(); ctx.moveTo(px(gx),padT); ctx.lineTo(px(gx),H-padB); ctx.stroke();
  }
  for (let gy=Math.ceil(yMin); gy<=Math.floor(yMax); gy++){
    ctx.beginPath(); ctx.moveTo(padL,py(gy)); ctx.lineTo(W-padR,py(gy)); ctx.stroke();
  }
  // axes
  ctx.strokeStyle = 'rgba(255,255,255,0.35)';
  ctx.lineWidth = 1.5;
  if (yMin <= 0 && yMax >= 0){ ctx.beginPath(); ctx.moveTo(padL,py(0)); ctx.lineTo(W-padR,py(0)); ctx.stroke(); }
  if (xMin <= 0 && xMax >= 0){ ctx.beginPath(); ctx.moveTo(px(0),padT); ctx.lineTo(px(0),H-padB); ctx.stroke(); }

  // parabola
  ctx.strokeStyle = '#4ecdc4';
  ctx.lineWidth = 2.5;
  ctx.beginPath();
  let started=false;
  for (let i=0;i<=N;i++){
    const x = xMin + (xMax-xMin)*i/N;
    const y = ys[i];
    if (!isFinite(y) || y < yMin || y > yMax){ started=false; continue; }
    const X=px(x), Y=py(y);
    if (!started){ ctx.moveTo(X,Y); started=true; } else ctx.lineTo(X,Y);
  }
  ctx.stroke();

  // roots
  if (disc >= 0 && a!==0 && isFinite(r1) && isFinite(r2) && r1>=xMin && r1<=xMax){
    ctx.fillStyle='#ff6b6b';
    [r1,r2].forEach(rx=>{ if(rx>=xMin&&rx<=xMax){ ctx.beginPath(); ctx.arc(px(rx),py(0),5,0,Math.PI*2); ctx.fill(); }});
  }
  // vertex
  if (a!==0){
    const vxv=-b/(2*a), vyv=a*vxv*vxv+b*vxv+c;
    if (vxv>=xMin&&vxv<=xMax&&vyv>=yMin&&vyv<=yMax){
      ctx.fillStyle='#ffd93d'; ctx.beginPath(); ctx.arc(px(vxv),py(vyv),5,0,Math.PI*2); ctx.fill();
    }
  }
}

function loadExample() {
  // pick a varied example
  const ex = [[1,-5,6],[1,2,1],[1,2,5],[2,-7,3]];
  const e = ex[Math.floor(Math.random()*ex.length)];
  $('#inA').value=e[0]; $('#inB').value=e[1]; $('#inC').value=e[2]; solve();
}
function doClear(){ $('#inA').value=''; $('#inB').value=''; $('#inC').value=''; $('#output').innerHTML=''; drawPlot(1,-5,6); }

['inA','inB','inC'].forEach(id=>document.getElementById(id).addEventListener('input', solve));
window.addEventListener('resize', solve);

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="solve()">${t('solve')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

solve();

</script>
