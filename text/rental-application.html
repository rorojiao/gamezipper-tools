const { $, t } = GZ;
let lang = GZI18n.getLang();
const STATE_KEY = 'gz-rentapp-data-v1';
let state = {
  appDate: new Date().toISOString().slice(0,10), propAddr: '', propRent: '', desiredMove: '', leaseTerm: '12',
  fullName: '', dob: '', ssn: '', phone: '', email: '', driverLic: '', currAddr: '', currLandlord: '',
  occupants: '', pets: '', smoker: 'no',
  employer: '', jobTitle: '', employerAddr: '', supervisor: '', employedSince: '', monthlyIncome: '', otherIncome: '', incomeSource: '',
  prevAddr: '', prevLandlord: '', prevRent: '', reasonLeft: '',
  ref1: '', ref2: '',
  veh1: '', veh2: '',
  evicted: 'no', bankruptcy: 'no', felony: 'no',
  jurisdiction: '',
};

function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function nl2br(s){return esc(s).replace(/\n/g,'<br>');}
function f(label, val){ return val && String(val).trim() ? `<div class="field"><b>${label}:</b> ${esc(val)}</div>` : ''; }
function loadState(){ try{const r=localStorage.getItem(STATE_KEY); if(r) state=Object.assign(state, JSON.parse(r));}catch(e){} }
function saveState(){ try{localStorage.setItem(STATE_KEY, JSON.stringify(state));}catch(e){} }
function bind(name){ return e => { state[name]=e.target.value; saveState(); renderPreview(); }; }

      <div class="leg-full"><label>${t('currLandlord')}</label><input data-bind="currLandlord" value="${esc(state.currLandlord)}"></div>
    </div></div>
    <div class="leg-section"><h3>${t('occSec')}</h3><div class="leg-grid">
      <div class="leg-full"><label>${t('occupants')}</label><textarea data-bind="occupants" rows="3">${esc(state.occupants)}</textarea></div>

      <div><label>${t('monthlyIncome')}</label><input type="number" min="0" data-bind="monthlyIncome" value="${esc(state.monthlyIncome)}"></div>
      <div class="leg-full"><label>${t('employerAddr')}</label><textarea data-bind="employerAddr" rows="2">${esc(state.employerAddr)}</textarea></div>

      <div class="leg-full"><label>${t('incomeSource')}</label><input data-bind="incomeSource" value="${esc(state.incomeSource)}"></div>

      <div><label>${t('evicted')}</label><select data-bind="evicted"><option value="no" ${state.evicted==='no'?'selected':''}>${t('no')}</option><option value="yes" ${state.evicted==='yes'?'selected':''}>${t('yes')}</option></select></div>
