<script type="application/ld+json">{"@context":"https://schema.org","@type":"WebApplication","name":"Personal Loan Calculator","description":"Estimate monthly payments, total interest and payoff date for an unsecured personal loan. Adjustable amount, APR and term.","url":"https://tools.gamezipper.com/calc/personal-loan-calculator.html","applicationCategory":"Utility","operatingSystem":"Web Browser","offers":{"@type":"Offer","price":"0"}}</script>
<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "How is a personal loan monthly payment calculated?", "acceptedAnswer": {"@type": "Answer", "text": "The standard amortization formula is Monthly Payment = P × [r(1+r)^n] / [(1+r)^n − 1], where P is the loan amount, r is the monthly interest rate (APR ÷ 12), and n is the number of months. This spreads principal and interest evenly across every payment."}}, {"@type": "Question", "name": "What is a good APR for a personal loan?", "acceptedAnswer": {"@type": "Answer", "text": "As of 2026, excellent-credit borrowers (760+) typically qualify for 7-10% APR, good credit (700-759) sees 10-15%, and fair credit (640-699) sees 15-25%. Rates above 28% are considered predatory — consider a credit-builder loan or secured alternative instead."}}, {"@type": "Question", "name": "What loan term should I choose?", "acceptedAnswer": {"@type": "Answer", "text": "Personal loans usually run 12-84 months. Shorter terms (24-36) cost the least interest but raise your monthly payment. Longer terms (60-84) lower the payment but can double your total interest. Aim for the shortest term whose payment fits your budget comfortably."}}, {"@type": "Question", "name": "Are my loan details sent to a server?", "acceptedAnswer": {"@type": "Answer", "text": "No. All math runs entirely in your browser. Nothing is uploaded, stored, or shared — the calculator never touches a server."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="pl-form">
      <label><span data-i18n="lblAmount"></span><input type="number" id="amount" min="0" step="100" value="15000"></label>
      <label><span data-i18n="lblAPR"></span><input type="number" id="apr" min="0" step="0.1" value="11.5"></label>
      <label><span data-i18n="lblTerm"></span>
        <select id="term">
          <option value="12">12 months (1 yr)</option>
          <option value="24">24 months (2 yr)</option>
          <option value="36" selected>36 months (3 yr)</option>
          <option value="48">48 months (4 yr)</option>
          <option value="60">60 months (5 yr)</option>
          <option value="72">72 months (6 yr)</option>
          <option value="84">84 months (7 yr)</option>
        </select>
      </label>
      <label><span data-i18n="lblOrigination"></span><input type="number" id="origination" min="0" step="0.5" value="4.0"></label>
    </div>
    <div class="pl-tiles" id="tiles"></div>
    <div class="pl-chart" id="chart"></div>
    <div class="pl-table-wrap" id="tableWrap"></div>
    <div class="pl-tip">💡 <span id="tip"></span></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Personal Loan Calculator',
    toolDesc: 'Estimate monthly payments, total interest and payoff date for an unsecured personal loan. Factor in origination fees and compare terms to find the cheapest option. 100% private — no data leaves your browser.',
    lblAmount: 'Loan Amount ($)',
    lblAPR: 'Annual Interest Rate / APR (%)',
    lblTerm: 'Loan Term',
    lblOrigination: 'Origination Fee (%)',
    tileMonthly: 'Monthly Payment',
    tileInterest: 'Total Interest',
    tilePaid: 'Total Paid',
    tileAPR: 'True Cost APR',
    tilePayoff: 'Payoff Date',
    tip: 'Tip: A 36-month term is the sweet spot for most personal loans — long enough to keep the payment affordable, short enough to avoid paying more than ~20% of the loan in interest. Avoid origination fees above 6%.',
    step1: 'Enter the loan amount you want to borrow',
    step2: 'Set the APR your lender quoted and the loan term',
    step3: 'Optionally add an origination fee to see the true cost',
    step4: 'Compare the monthly payment and total interest across terms',
  },
  zh: {
    toolTitle: '个人贷款计算器',
    toolDesc: '估算无抵押个人贷款的月供、总利息和还清日期。可计入贷款手续费，对比不同期限找到最省钱的方案。100% 私密 — 数据不离开浏览器。',
    lblAmount: '贷款金额 ($)',
    lblAPR: '年利率 / APR (%)',
    lblTerm: '贷款期限',
    lblOrigination: '贷款手续费 (%)',
    tileMonthly: '月供',
    tileInterest: '总利息',
    tilePaid: '总还款',
    tileAPR: '实际成本年化',
    tilePayoff: '还清日期',
    tip: '提示：36 个月是大多数个人贷款的最佳期限 — 足够长以保持月供可负担，又足够短以避免利息超过贷款额的约 20%。手续费超过 6% 的贷款应避免。',
    step1: '输入你想要借的贷款金额',
    step2: '设置贷款机构报价的 APR 和贷款期限',
    step3: '可选：填入贷款手续费查看真实成本',
    step4: '对比不同期限的月供和总利息',
  }
});

const { $, $$, t } = GZ;
$$('[data-i18n]').forEach(el => { el.textContent = t(el.dataset.i18n); });

function calc() {
  const amount = Math.max(0, +$('#amount').value || 0);
  const apr = Math.max(0, +$('#apr').value || 0);
  const months = Math.max(1, +$('#term').value || 36);
  const origPct = Math.max(0, +$('#origination').value || 0);

  const originationFee = amount * origPct / 100;
  const principal = amount; // borrower receives amount, but repays amount + fee financing; we model principal = amount for standard amortization
  const monthlyRate = apr / 100 / 12;

  let monthly = 0;
  if (principal > 0) {
    if (monthlyRate === 0) {
      monthly = principal / months;
    } else {
      const f = Math.pow(1 + monthlyRate, months);
      monthly = principal * (monthlyRate * f) / (f - 1);
    }
  }
  const totalPaid = monthly * months;
  const totalInterest = Math.max(0, totalPaid - principal);

  // Effective APR including origination fee (true cost): the borrower effectively receives (amount - fee) but repays totalPaid
  const netReceived = amount - originationFee;
  let trueAPR = apr;
  if (netReceived > 0 && monthly > 0) {
    // Solve for monthly rate where PV of payments = netReceived (bisection)
    let lo = 0, hi = 0.05, mid;
    for (let i = 0; i < 60; i++) {
      mid = (lo + hi) / 2;
      const f = Math.pow(1 + mid, months);
      const pv = monthly * (1 - 1 / f) / mid;
      if (pv > netReceived) lo = mid; else hi = mid;
    }
    trueAPR = mid * 12 * 100;
  }

  const payoff = new Date();
  payoff.setMonth(payoff.getMonth() + months);

  const cfmt = v => '$' + v.toFixed(0).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
  $('#tiles').innerHTML = `
    <div class="pl-tile"><div class="num">$${monthly.toFixed(2)}</div><div class="lbl">${t('tileMonthly')}</div></div>
    <div class="pl-tile"><div class="num">${cfmt(totalInterest)}</div><div class="lbl">${t('tileInterest')}</div></div>
    <div class="pl-tile"><div class="num">${cfmt(totalPaid)}</div><div class="lbl">${t('tilePaid')}</div></div>
    <div class="pl-tile"><div class="num">${trueAPR.toFixed(1)}%</div><div class="lbl">${t('tileAPR')}</div></div>
    <div class="pl-tile"><div class="num">${payoff.toLocaleDateString('en-US', {year:'numeric', month:'short'})}</div><div class="lbl">${t('tilePayoff')}</div></div>`;

  // Amortization + chart
  let balance = principal;
  const data = [];
  for (let i = 1; i <= months; i++) {
    const interest = balance * monthlyRate;
    const principalPay = monthly - interest;
    balance = Math.max(0, balance - principalPay);
    data.push({month:i, payment:monthly, principal:principalPay, interest, balance});
  }

  let svg = '<svg viewBox="0 0 600 160" preserveAspectRatio="none" width="100%" height="100%">';
  const barWidth = 580 / months;
  for (let i = 0; i < months; i++) {
    const x = 10 + i * barWidth;
    const intH = (data[i].interest / monthly) * 130;
    const prinH = (data[i].principal / monthly) * 130;
    svg += `<rect x="${x}" y="${150 - prinH}" width="${Math.max(0.5,barWidth - 0.5)}" height="${prinH}" fill="var(--success)"/>`;
    svg += `<rect x="${x}" y="${150 - prinH - intH}" width="${Math.max(0.5,barWidth - 0.5)}" height="${intH}" fill="var(--accent)"/>`;
  }
  svg += '</svg>';
  $('#chart').innerHTML = svg + `<div style="display:flex;gap:14px;font-size:.78em;margin-top:6px;justify-content:center"><span><span style="display:inline-block;width:10px;height:10px;background:var(--success);border-radius:2px;vertical-align:middle"></span> Principal</span><span><span style="display:inline-block;width:10px;height:10px;background:var(--accent);border-radius:2px;vertical-align:middle"></span> Interest</span></div>`;

  const fmt = v => '$' + v.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
  const yearGroups = Math.ceil(months / 12);
  let tableHtml = '<table class="pl-table"><thead><tr><th>Period</th><th>Payment</th><th>Principal</th><th>Interest</th><th>Balance</th></tr></thead><tbody>';
  for (let y = 1; y <= yearGroups; y++) {
    const start = (y-1)*12, end = Math.min(y*12, months);
    let yp=0, yi=0, ypay=0;
    for (let i = start; i < end; i++) { yp += data[i].principal; yi += data[i].interest; ypay += monthly; }
    const endBal = data[end-1].balance;
    tableHtml += `<tr style="background:var(--glass)"><td>Year ${y}</td><td>${fmt(ypay)}</td><td>${fmt(yp)}</td><td>${fmt(yi)}</td><td>${fmt(endBal)}</td></tr>`;
  }
  tableHtml += '</tbody></table>';
  $('#tableWrap').innerHTML = tableHtml;

  $('#tip').textContent = t('tip');
}

$('#toolbar').innerHTML = '';
['amount','apr','term','origination'].forEach(id => {
  $('#' + id).addEventListener('input', calc);
  $('#' + id).addEventListener('change', calc);
});

calc();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🏦', href:'/calc/loan-calculator.html', name:'Loan Calculator'},
    {icon:'📋', href:'/calc/loan-amortization.html', name:'Amortization Schedule'},
    {icon:'💳', href:'/calc/credit-card-payoff-calculator.html', name:'Credit Card Payoff'},
    {icon:'⚖️', href:'/calc/loan-comparison.html', name:'Loan Comparison'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
