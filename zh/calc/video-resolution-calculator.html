<script>
GZI18n.register({
  en: {
    toolTitle: 'Video Resolution & Aspect Ratio Calculator',
    toolDesc: 'Convert between 4K, 1440p, 1080p, 720p, 480p and aspect ratios for YouTube, TikTok, Instagram and Reels.',
    input: 'Input Resolution',
    width: 'Width (px)',
    height: 'Height (px)',
    aspect: 'Aspect Ratio',
    result: 'Result',
    resCol: 'Resolution',
    nameCol: 'Name',
    mpCol: 'MP',
    useCol: 'Common Use',
    step1: 'Enter a width and height in pixels, or pick one of the preset chips',
    step2: 'The aspect ratio is auto-calculated and shown in the form W:H',
    step3: 'See pixel count, megapixels and standard 16:9 conversions',
    step4: 'Use the table below to compare common video resolutions',
  },
  zh: {
    toolTitle: '视频分辨率与宽高比计算器',
    toolDesc: '在 4K、1440p、1080p、720p、480p 和不同宽高比之间转换 — 适合 YouTube、TikTok、Instagram 和 Reels。',
    input: '输入分辨率',
    width: '宽度（像素）',
    height: '高度（像素）',
    aspect: '宽高比',
    result: '结果',
    resCol: '分辨率',
    nameCol: '名称',
    mpCol: '像素',
    useCol: '常见用途',
    step1: '输入宽度和高度（像素），或点击预设按钮',
    step2: '自动计算宽高比并显示为 W:H 形式',
    step3: '查看像素总数、百万像素和标准 16:9 转换',
    step4: '使用下方表格对比常见视频分辨率',
  }
});

const { $, t, copyText } = GZ;

const PRESETS = [
  { w: 7680, h: 4320, name: '8K UHD', use: 'High-end' },
  { w: 3840, h: 2160, name: '4K UHD', use: 'YouTube 4K' },
  { w: 2560, h: 1440, name: '1440p (QHD)', use: 'Monitors' },
  { w: 1920, h: 1080, name: '1080p (FHD)', use: 'YouTube' },
  { w: 1280, h: 720, name: '720p (HD)', use: 'YouTube' },
  { w: 854, h: 480, name: '480p (SD)', use: 'Web video' },
  { w: 640, h: 360, name: '360p', use: 'Web low-bandwidth' },
  { w: 1080, h: 1920, name: '1080×1920', use: 'TikTok / Reels' },
  { w: 1080, h: 1350, name: '1080×1350', use: 'Instagram Feed 4:5' },
  { w: 1080, h: 1080, name: '1080×1080', use: 'Instagram Square' },
];

function gcd(a, b) { return b === 0 ? a : gcd(b, a % b); }
function aspectRatio(w, h) {
  if (!w || !h) return '–';
  const g = gcd(Math.round(w), Math.round(h));
  return (w/g) + ':' + (h/g);
}
function num(n) { return n.toLocaleString(); }
function mb(n) { return (n / (1024*1024)).toFixed(1); }

function update() {
  const w = parseInt($('#w').value) || 0;
  const h = parseInt($('#h').value) || 0;
  const px = w * h;
  const mp = (px / 1e6).toFixed(2);
  const ar = aspectRatio(w, h);
  $('#ar').value = ar;
  $('#o-res').textContent = num(w) + ' × ' + num(h);
  $('#o-sub').textContent = ar + ' · ' + mp + ' megapixels';

  // Compute 16:9 equivalent
  const ratio169 = 16/9;
  let w169, h169;
  if (w/h > ratio169) { h169 = h; w169 = Math.round(h * ratio169); }
  else { w169 = w; h169 = Math.round(w / ratio169); }

  $('#o-stats').innerHTML = [
    { num: num(px), label: 'Pixels' },
    { num: mp, label: 'Megapixels' },
    { num: w169 + '×' + h169, label: '16:9 fit' },
    { num: mb(px*3) + ' MB', label: 'RGB24 / frame' },
  ].map(s => `<div class="vrc-stat"><div class="num">${s.num}</div><div class="label">${s.label}</div></div>`).join('');

  // Update table — mark active row
  const tbody = document.querySelector('#common-table tbody');
  tbody.innerHTML = '';
  PRESETS.forEach(p => {
    const mp = (p.w*p.h/1e6).toFixed(2);
    const active = (p.w===w && p.h===h) ? 'style="background:var(--glass2);font-weight:700"' : '';
    tbody.innerHTML += `<tr ${active}><td>${num(p.w)} × ${num(p.h)}</td><td>${p.name}</td><td>${mp}</td><td>${p.use}</td></tr>`;
  });
}

function renderPresets() {
  const wrap = $('#presets');
  wrap.innerHTML = PRESETS.map(p => `<button onclick="$('#w').value=${p.w};$('#h').value=${p.h};update()">${p.name}</button>`).join('');
}

$('#w').addEventListener('input', update);
$('#h').addEventListener('input', update);

renderPresets();
update();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📺', href:'/calc/dpi-calculator.html', name:'DPI / PPI Calculator'},
    {icon:'📐', href:'/calc/aspect-ratio-calculator.html', name:'Aspect Ratio Calculator'},
    {icon:'🖼️', href:'/calc/screen-size-calculator.html', name:'Screen Size Calculator'},
    {icon:'📷', href:'/image/image-dpi-checker.html', name:'Image DPI Checker'},
  ]
});
</script>
