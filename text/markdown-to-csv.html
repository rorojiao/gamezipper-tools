let mode = 'md2csv';
let delim = ',';
let align = 'left';

function setMode(m){
  mode = m;
  document.querySelectorAll('#opts .seg button.mode-btn').forEach(b => b.classList.toggle('active', b.dataset.m === m));
  convert();
}
function setDelim(d){
  delim = d;

function setAlign(a){
  align = a;
  document.querySelectorAll('#opts .seg button.align-btn').forEach(b => b.classList.toggle('active', b.dataset.a === a));
  if (mode === 'csv2md') convert();
}

// ---- Markdown table parsing ----
function splitMdRow(line){
  let s = line.trim();
  if (s.startsWith('|')) s = s.slice(1);
  if (s.endsWith('|') && !s.endsWith('\\|')) s = s.slice(0, -1);
  // split on unescaped pipes
  const cells = [];
  let cur = '', i = 0;
  while (i < s.length){
    if (s[i] === '\\' && s[i+1] === '|'){ cur += '|'; i += 2; continue; }
    if (s[i] === '|'){ cells.push(cur.trim()); cur = ''; i++; continue; }
    cur += s[i]; i++;
  }
  cells.push(cur.trim());
  return cells.map(c => c.replace(/\\([\\|])/g, '$1'));
}

function isSeparatorRow(cells){
  return cells.length > 0 && cells.every(c => /^:?-{1,}:?$/.test(c.trim()));
}

function mdTableToRows(src){
  const lines = src.split(/\r?\n/);
  // find first line that looks like a table row
  const tableLines = lines.filter(l => l.trim() && l.includes('|'));
  if (tableLines.length < 2) return null;
  const rows = tableLines.map(splitMdRow);
  // drop separator row
  const dataRows = [];
  let header = null, sepFound = false;
  for (let i = 0; i < rows.length; i++){
    if (isSeparatorRow(rows[i])){ sepFound = true; continue; }
    dataRows.push(rows[i]);
  }
  if (!sepFound || dataRows.length === 0) return null;
  return dataRows;
}

// ---- CSV parsing (RFC4180-ish) ----
function parseDelimited(text, d){
  const rows = [];
  let row = [], field = '', i = 0, inQuotes = false;
  while (i < text.length){
    const c = text[i];
    if (inQuotes){
      if (c === '"'){
        if (text[i+1] === '"'){ field += '"'; i += 2; continue; }
        inQuotes = false; i++; continue;
      }
      field += c; i++; continue;
    }
    if (c === '"'){ inQuotes = true; i++; continue; }
    if (c === d){ row.push(field); field = ''; i++; continue; }
    if (c === '\n'){ row.push(field); rows.push(row); row = []; field = ''; i++; continue; }
    if (c === '\r'){ i++; continue; }
    field += c; i++;
  }
  if (field.length || row.length){ row.push(field); rows.push(row); }
  return rows.filter(r => r.length && !(r.length === 1 && r[0] === ''));
}

function csvField(val, d){
  const s = String(val == null ? '' : val);
  if (s.indexOf(d) !== -1 || s.indexOf('"') !== -1 || s.indexOf('\n') !== -1 || s.indexOf('\r') !== -1){
    return '"' + s.replace(/"/g, '""') + '"';
  }
  return s;
}

function rowsToCsv(rows, d){
  return rows.map(r => r.map(c => csvField(c, d)).join(d)).join('\n') + '\n';
}

function rowsToMdTable(rows){
  if (!rows.length) return '';
  const cols = Math.max(...rows.map(r => r.length));
  const norm = rows.map(r => { const a = r.slice(); while (a.length < cols) a.push(''); return a; });
  const header = norm[0];
  const body = norm.slice(1);
  const widths = [];
  for (let c = 0; c < cols; c++){
    let w = 0;
    for (const r of norm) w = Math.max(w, String(r[c]).replace(/\|/g,'\\|').length);
    widths.push(Math.max(3, w));
  }
  function cellPad(val, w, side){
    let s = String(val).replace(/\|/g, '\\|');
    if (side === 'right') return s.padStart(w);
    if (side === 'center'){ const total = w - s.length; const l = Math.floor(total/2), r = total - l; return ' '.repeat(l) + s + ' '.repeat(r); }
    return s.padEnd(w);
  }
  function sep(c){
    const w = widths[c];
    if (align === 'center') return ':' + '-'.repeat(Math.max(1,w-2)) + ':';
    if (align === 'right') return '-'.repeat(Math.max(1,w-1)) + ':';
    return ':' + '-'.repeat(Math.max(1,w-1));
  }
  let out = '';
  out += '| ' + header.map((h,c) => cellPad(h, widths[c], align)).join(' | ') + ' |\n';
  out += '|' + sep(0) + Array.from({length:cols-1}, (_,c)=>'+'+sep(c+1)).join('') + '|\n';
  // simpler separator line:
  const sepLine = '|' + Array.from({length:cols}, (_,c) => {
    const w = widths[c];
    if (align === 'center') return ':' + '-'.repeat(Math.max(1,w-2)) + ':';
    if (align === 'right') return '-'.repeat(Math.max(1,w-1)) + ':';
    return ':' + '-'.repeat(Math.max(1,w-1));
  }).join('|') + '|';
  out = '';
  out += '| ' + header.map((h,c) => cellPad(h, widths[c], align)).join(' | ') + ' |\n';
  out += sepLine + '\n';
  for (const r of body){
    out += '| ' + r.map((cell,c) => cellPad(cell, widths[c], align)).join(' | ') + ' |\n';
  }
  return out;
}

function convert(){
  const inp = $('#input').value;
  $('#output').textContent = '';
  if (!inp.trim()){ $('#status').innerHTML = `<span style="color:var(--gz-accent)">${t('empty')}</span>`; return; }
  let out = '', status = '';
  if (mode === 'md2csv'){
    const rows = mdTableToRows(inp);
    if (!rows){ $('#status').innerHTML = `<span style="color:var(--gz-accent)">${t('noTable')}</span>`; return; }
    out = rowsToCsv(rows, delim);
    status = `<span style="color:var(--gz-success)">${t('doneMdToCsv')} · ${rows.length} ${t('rowsOut')} × ${rows[0].length} ${t('colsOut')}</span>`;
  } else {
    const rows = parseDelimited(inp, delim);
    if (!rows.length){ $('#status').innerHTML = `<span style="color:var(--gz-accent)">${t('noCsv')}</span>`; return; }
    out = rowsToMdTable(rows);
    status = `<span style="color:var(--gz-success)">${t('doneCsvToMd')} · ${rows.length} ${t('rowsOut')} × ${rows[0].length} ${t('colsOut')}</span>`;
  }
  window._csvOut = out;
  $('#output').textContent = out;
  $('#status').innerHTML = status;
}

function doCopy(){ if (window._csvOut != null) copyText(window._csvOut); }

function doDownload(){
  if (window._csvOut == null) return;
  const ext = mode === 'md2csv' ? (delim === '\t' ? 'tsv' : 'csv') : 'md';
  const mime = ext === 'md' ? 'text/markdown' : 'text/csv';
  const blob = new Blob([window._csvOut], {type: mime});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'converted.' + ext;
  a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href), 1000);
}
