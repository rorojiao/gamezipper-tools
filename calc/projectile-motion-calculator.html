<script type="application/ld+json">{"@context":"https://schema.org","@type":"WebApplication","name":"Projectile Motion Calculator","description":"Calculate projectile range, maximum height, time of flight and velocity components from initial velocity and launch angle. Free physics calculator with trajectory chart and formulas.","url":"https://tools.gamezipper.com/calc/projectile-motion-calculator.html","applicationCategory":"Calculator","operatingSystem":"Web Browser","offers":{"@type":"Offer","price":"0"}}</script>
<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is projectile motion?", "acceptedAnswer": {"@type": "Answer", "text": "Projectile motion is the motion of an object thrown into the air subject only to gravity. The horizontal velocity stays constant while vertical velocity changes due to gravity (g = 9.81 m/s²). The path forms a parabola."}}, {"@type": "Question", "name": "What is the formula for projectile range?", "acceptedAnswer": {"@type": "Answer", "text": "For a projectile launched on level ground, range R = (v₀² × sin(2θ)) / g, where v₀ is initial velocity, θ is the launch angle and g is 9.81 m/s². Maximum range on level ground occurs at 45°."}}, {"@type": "Question", "name": "How do I calculate time of flight?", "acceptedAnswer": {"@type": "Answer", "text": "Time of flight on level ground T = (2 × v₀ × sin(θ)) / g. The object rises and falls back to the same vertical level, so total air time depends only on the vertical velocity component and gravity."}}, {"@type": "Question", "name": "Does air resistance affect the result?", "acceptedAnswer": {"@type": "Answer", "text": "This calculator assumes an ideal vacuum (no air resistance), which is the standard physics-class model. In real life air resistance shortens range and lowers maximum height, especially for light or fast objects."}}]}</script>

<script>
GZI18n.register({
  en: {
    toolTitle: 'Projectile Motion Calculator',
    toolDesc: 'Calculate projectile range, maximum height, time of flight and velocity components from initial velocity and launch angle. Live parabolic trajectory chart with formulas — perfect for physics homework and engineering.',
    lblV0: 'Initial velocity v₀ (m/s)',
    lblAngle: 'Launch angle θ (degrees)',
    lblG: 'Gravity g (m/s²)',
    rRange: 'Range (horizontal distance)',
    rHeight: 'Maximum height',
    rTime: 'Time of flight',
    rVx: 'Horizontal velocity component vₓ',
    rVy: 'Vertical velocity component vᵧ',
    example: 'Example',
    clear: 'Clear',
    formulas: 'Formulas: R = v₀²·sin(2θ)/g · H = v₀²·sin²θ/(2g) · T = 2·v₀·sinθ/g · vₓ = v₀·cosθ · vᵧ = v₀·sinθ',
    errInputs: 'Enter initial velocity (> 0), launch angle (0–90°) and gravity (> 0).',
    step1: 'Enter the initial launch velocity in m/s',
    step2: 'Enter the launch angle in degrees (0–90)',
    step3: 'Adjust gravity if needed (Earth = 9.81, Moon = 1.62)',
    step4: 'Read range, height, time of flight and see the trajectory',
  },
  zh: {
    toolTitle: '抛体运动计算器',
    toolDesc: '根据初速度和发射角，即时计算抛体的射程、最大高度、飞行时间和速度分量。带实时抛物线轨迹图和公式 — 适合物理作业和工程计算。',
    lblV0: '初速度 v₀ (m/s)',
    lblAngle: '发射角 θ (度)',
    lblG: '重力加速度 g (m/s²)',
    rRange: '射程（水平距离）',
    rHeight: '最大高度',
    rTime: '飞行时间',
    rVx: '水平速度分量 vₓ',
    rVy: '竖直速度分量 vᵧ',
    example: '示例',
    clear: '清空',
    formulas: '公式：R = v₀²·sin(2θ)/g · H = v₀²·sin²θ/(2g) · T = 2·v₀·sinθ/g · vₓ = v₀·cosθ · vᵧ = v₀·sinθ',
    errInputs: '请输入初速度（>0）、发射角（0–90°）和重力加速度（>0）。',
    step1: '输入发射初速度（m/s）',
    step2: '输入发射角度（度，0–90）',
    step3: '如需可修改重力（地球=9.81，月球=1.62）',
    step4: '查看射程、高度、飞行时间及轨迹图',
  }
});

const { $, t } = GZ;

$('#lbl-v0').textContent = t('lblV0');
$('#lbl-angle').textContent = t('lblAngle');
$('#lbl-g').textContent = t('lblG');
$('#r-range').textContent = t('rRange');
$('#r-height').textContent = t('rHeight');
$('#r-time').textContent = t('rTime');
$('#r-vx').textContent = t('rVx');
$('#r-vy').textContent = t('rVy');
$('#formulas').textContent = t('formulas');

function num(id) { const v = $('#' + id).value; return v === '' ? null : parseFloat(v); }
function fmt(n) {
  if (!isFinite(n)) return '—';
  const abs = Math.abs(n);
  if (abs !== 0 && (abs < 0.001 || abs >= 1e6)) return n.toExponential(3);
  return n.toLocaleString(undefined, { maximumFractionDigits: 4 });
}

function drawChart(range, height) {
  const canvas = $('#chart');
  const ctx = canvas.getContext('2d');
  const W = canvas.width = canvas.clientWidth;
  const H = canvas.height = canvas.clientHeight;
  ctx.clearRect(0, 0, W, H);
  if (!(range > 0) || !(height >= 0)) return;
  const pad = 32;
  const scaleX = (W - pad * 2) / range;
  const peakH = Math.max(height, range * 0.05);
  const scaleY = (H - pad * 2) / (peakH * 1.15);
  // axes
  ctx.strokeStyle = 'rgba(255,255,255,0.25)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(pad, H - pad); ctx.lineTo(W - pad, H - pad); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(pad, pad); ctx.lineTo(pad, H - pad); ctx.stroke();
  // trajectory
  ctx.strokeStyle = getComputedStyle(document.body).getPropertyValue('--gz-accent') || '#4ecdc4';
  ctx.lineWidth = 2.5;
  ctx.beginPath();
  for (let p = 0; p <= 1; p += 0.02) {
    const x = p * range;
    const y = 4 * height * p * (1 - p);
    const px = pad + x * scaleX;
    const py = H - pad - y * scaleY;
    p === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
  }
  ctx.stroke();
  // labels
  ctx.fillStyle = 'rgba(255,255,255,0.55)';
  ctx.font = '11px monospace';
  ctx.fillText('Range ' + fmt(range) + ' m', pad + 4, H - pad - 6);
  ctx.fillText('Height ' + fmt(height) + ' m', pad + 6, pad + 12);
}

function calc() {
  const v0 = num('v0'), ang = num('angle'), g = num('g');
  if (v0 === null || ang === null || g === null || v0 <= 0 || g <= 0 || ang < 0 || ang > 90) {
    $('#results').style.display = 'none';
    const c = $('#chart').getContext('2d'); c.clearRect(0, 0, $('#chart').width, $('#chart').height);
    return;
  }
  const rad = ang * Math.PI / 180;
  const sin = Math.sin(rad), cos = Math.cos(rad);
  const vx = v0 * cos, vy = v0 * sin;
  const range = (v0 * v0 * Math.sin(2 * rad)) / g;
  const height = (v0 * v0 * sin * sin) / (2 * g);
  const time = (2 * v0 * sin) / g;
  $('#out-range').textContent = fmt(range) + ' m';
  $('#out-height').textContent = fmt(height) + ' m';
  $('#out-time').textContent = fmt(time) + ' s';
  $('#out-vx').textContent = fmt(vx) + ' m/s';
  $('#out-vy').textContent = fmt(vy) + ' m/s';
  $('#results').style.display = 'block';
  drawChart(range, height);
}

['v0', 'angle', 'g'].forEach(id => $('#' + id).addEventListener('input', calc));

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="$('#v0').value='20';$('#angle').value='45';$('#g').value='9.81';calc()">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="['v0','angle','g'].forEach(id=>document.getElementById(id).value='');calc()">${t('clear')}</button>`;

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1', 'step2', 'step3', 'step4'],
  related: [

    { icon: '🔄', href: '/calc/newtons-second-law-calculator.html', name: 'Newton\'s 2nd Law' },

    { icon: '⏱️', href: '/calc/pendulum-calculator.html', name: 'Pendulum' },
  ]
});
</script>
