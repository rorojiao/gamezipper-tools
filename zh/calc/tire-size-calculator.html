<body>
<div class="gz-container">

</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Tire Size Calculator & Comparator',
    toolDesc: 'Compare tire sizes side by side — calculate diameter, width, sidewall, circumference and RPM. Visual comparison for plus-sizing and tire upgrades.',
    tire1: '🔴 Tire 1 (Original)',
    tire2: '🔵 Tire 2 (New)',
    width: 'Width (mm)',
    aspect: 'Aspect (%)',
    rim: 'Rim (in)',
    compare: 'Compare',
    metric: 'Metric',
    value1: 'Tire 1',
    value2: 'Tire 2',
    diff: 'Difference',
    diaIn: 'Diameter (in)',
    diaMm: 'Diameter (mm)',
    widthIn: 'Width (in)',
    sidewallIn: 'Sidewall (in)',
    circIn: 'Circumference (in)',
    circMm: 'Circumference (mm)',
    revsMile: 'Revs / Mile',
    speedoError: 'Speedo Error',
    warning: '⚠️ Diameter difference exceeds 3%. This may affect speedometer accuracy, ABS, traction control and clearance.',
    step1: 'Enter the width, aspect ratio and rim size for Tire 1 (original)',
    step2: 'Enter the dimensions for Tire 2 (new/alternative)',
    step3: 'Review the comparison table and visual',
    step4: 'Check the diameter difference — keep it within ±3%',
  },
  zh: {
    toolTitle: '轮胎尺寸计算与对比器',
    toolDesc: '并排对比两种轮胎尺寸 — 计算直径、宽度、侧壁、周长和每英里转数，可视化比较，适用于轮胎升级。',
    tire1: '🔴 轮胎 1（原装）',
    tire2: '🔵 轮胎 2（新）',
    width: '宽度 (mm)',
    aspect: '扁平比 (%)',
    rim: '轮毂 (in)',
    compare: '对比',
    metric: '规格',
    value1: '轮胎 1',
    value2: '轮胎 2',
    diff: '差异',
    diaIn: '直径 (in)',
    diaMm: '直径 (mm)',
    widthIn: '宽度 (in)',
    sidewallIn: '侧壁 (in)',
    circIn: '周长 (in)',
    circMm: '周长 (mm)',
    revsMile: '每英里转数',
    speedoError: '速度表偏差',
    warning: '⚠️ 直径差异超过 3%，可能影响速度表精度、ABS、牵引力控制和轮胎间隙。',
    step1: '输入轮胎 1（原装）的宽度、扁平比和轮毂尺寸',
    step2: '输入轮胎 2（新/替代）的尺寸',
    step3: '查看对比表和可视化效果',
    step4: '检查直径差异 — 保持在 ±3% 以内',
  }
});

const { $, t } = GZ;

function calc(w, a, r) {
  const sidewallIn = (w * a / 100) / 25.4;
  const diaIn = parseFloat(r) + 2 * sidewallIn;
  const diaMm = diaIn * 25.4;
  const circIn = Math.PI * diaIn;
  const circMm = circIn * 25.4;
  const revs = 63360 / circIn;
  return { diaIn, diaMm, widthIn: w / 25.4, sidewallIn, circIn, circMm, revs };
}

function fmt(n, d=2) { return n.toFixed(d); }

function compare() {
  const t1 = calc(+$('#w1').value, +$('#a1').value, +$('#r1').value);
  const t2 = calc(+$('#w2').value, +$('#a2').value, +$('#r2').value);
  const rows = [
    ['diaIn','diaMm','widthIn','sidewallIn','circIn','circMm','revsMile']
  ];
  let html = `<table class="result-table"><tr><th>${t('metric')}</th><th>${t('value1')}</th><th>${t('value2')}</th><th>${t('diff')}</th></tr>`;
  const metrics = [
    {key:'diaIn',label:'diaIn'},{key:'diaMm',label:'diaMm'},{key:'widthIn',label:'widthIn'},
    {key:'sidewallIn',label:'sidewallIn'},{key:'circIn',label:'circIn'},{key:'circMm',label:'circMm'},
    {key:'revs',label:'revsMile'}
  ];
  for (const m of metrics) {
    const v1 = m.key==='revs' ? t1.revs : t1[m.key];
    const v2 = m.key==='revs' ? t2.revs : t2[m.key];
    const diff = v2 - v1;
    const pct = v1 ? (diff / v1 * 100) : 0;
    const cls = diff > 0 ? 'diff-pos' : diff < 0 ? 'diff-neg' : '';
    html += `<tr><td>${t(m.label)}</td><td>${fmt(v1)}</td><td>${fmt(v2)}</td><td class="${cls}">${diff>0?'+':''}${fmt(diff)} (${diff>0?'+':''}${fmt(pct,1)}%)</td></tr>`;
  }
  const speedErr = ((t2.diaIn - t1.diaIn) / t1.diaIn * 100);
  html += `<tr><td>${t('speedoError')}</td><td colspan="2" class="${Math.abs(speedErr)>3?'diff-neg':'diff-pos'}">${speedErr>0?'+':''}${fmt(speedErr,1)}%</td><td class="${Math.abs(speedErr)>3?'diff-neg':''}">at 60 mph → ${(60*(1+speedErr/100)).toFixed(1)} mph</td></tr>`;
  html += '</table>';
  $('#results').innerHTML = html;

  const diaPct = Math.abs((t2.diaIn - t1.diaIn) / t1.diaIn * 100);
  const warn = $('#warning');
  if (diaPct > 3) { warn.style.display = 'block'; warn.textContent = t('warning'); }
  else { warn.style.display = 'none'; }

  // Visual
  const maxDia = Math.max(t1.diaIn, t2.diaIn);
  const scale = 100 / maxDia;
  const s1 = t1.diaIn * scale, s2 = t2.diaIn * scale;
  $('#visual').innerHTML = `
    <div class="tire-circle" style="width:${s1}px;height:${s1}px;border-color:#e94560;background:#e9456022">
      ${$('#w1').value}/${$('#a1').value}R${$('#r1').value}<br>${fmt(t1.diaIn)}″
    </div>
    <div class="tire-circle" style="width:${s2}px;height:${s2}px;border-color:#0f766e;background:#0f766e22">
      ${$('#w2').value}/${$('#a2').value}R${$('#r2').value}<br>${fmt(t2.diaIn)}″
    </div>`;
}

document.querySelectorAll('#w1,#a1,#r1,#w2,#a2,#r2').forEach(el => el.addEventListener('input', compare));

$('#toolbar').innerHTML = `<button class="gz-btn" onclick="compare()">${t('compare')}</button>`;

compare();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📐', href:'/calc/aspect-ratio.html', name:'Aspect Ratio'},
    {icon:'📏', href:'/calc/dpi-calculator.html', name:'DPI Calculator'},
    {icon:'⛽', href:'/calc/gas-mileage-calculator.html', name:'Gas Mileage'},
    {icon:'🚙', href:'/calc/car-loan-calculator.html', name:'Car Loan'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
