// Active filter: 'all' | 'tcp' | 'udp' | 'both'
let activeFilter = 'all';

function protoLabel(proto){
  if(proto==='both') return '<span class="port-proto both">'+t('both')+'</span>';
  if(proto==='tcp') return '<span class="port-proto tcp">TCP</span>';
  return '<span class="port-proto udp">UDP</span>';
}

function render(){
  const q = $('#q').value.trim().toLowerCase();
  const filtered = PORTS.filter(p => {
    if(activeFilter==='tcp' && p.proto==='udp') return false;
    if(activeFilter==='udp' && p.proto==='tcp') return false;
    if(activeFilter==='both' && p.proto!=='both') return false;
    if(!q) return true;
    return String(p.p)===q ||
      p.svc.toLowerCase().includes(q) ||
      p.desc.toLowerCase().includes(q);
  });
  filtered.sort((a,b)=> a.p - b.p || (a.proto==='tcp'?-1:b.proto==='tcp'?1:0));

  const tbl = $('#table');
  if(filtered.length===0){
    tbl.innerHTML = '<tbody><tr><td colspan="4"><div class="port-empty">'+t('noResults')+'</div></td></tr></tbody>';
  } else {
    const rows = filtered.map(p => '<tr><td><span class="port-num">'+p.p+'</span></td><td>'+protoLabel(p.proto)+'</td><td><strong>'+p.svc+'</strong></td><td>'+p.desc+'</td></tr>').join('');
    tbl.innerHTML = '<thead><tr><th>'+t('port')+'</th><th>'+t('protocol')+'</th><th>'+t('service')+'</th><th>'+t('description')+'</th></tr></thead><tbody>'+rows+'</tbody>';
  }
  $('#count').textContent = t('showing')+' '+filtered.length+' '+t('of')+' '+PORTS.length+' '+t('entries');
}

function setFilter(f){
  activeFilter = f;
  document.querySelectorAll('#filters button').forEach(b => b.classList.toggle('active', b.dataset.f===f));
  render();
}

$('#filters').innerHTML = [
  ['all', t('all')],
  ['tcp', t('tcpOnly')],
  ['udp', t('udpOnly')],
  ['both', t('both')],
].map(([f,label]) => '<button data-f="'+f+'" class="'+(f==='all'?'active':'')+'" onclick="setFilter(\''+f+'\')">'+label+'</button>').join('');

$('#q').placeholder = t('searchPh');
render();
