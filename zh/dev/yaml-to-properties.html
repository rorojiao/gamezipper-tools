let escapeVals = true;
const { $, copyText, t } = GZ;

// Minimal YAML parser supporting nested maps, arrays, scalars, comments
function parseYAML(text) {
  const lines = text.split(/\r?\n/);
  // stack of {indent, obj/isArray, key}
  const root = {};
  const stack = [{indent: -1, node: root, isArray: false}];
  let comments = [];

  function getIndent(line) {
    const m = line.match(/^(\s*)/);
    return m[1].replace(/\t/g, '  ').length;
  }

  for (let raw of lines) {
    // detect comment-only line
    const trimmedAll = raw.trim();
    if (!trimmedAll) continue;
    if (trimmedAll.startsWith('#')) {
      comments.push(trimmedAll);
      continue;
    }
    const indent = getIndent(raw);
    const line = raw.replace(/^(\s*)/, '');

    // pop stack to find parent
    while (stack.length > 1 && stack[stack.length - 1].indent >= indent) stack.pop();
    const parent = stack[stack.length - 1].node;

    // list item
    if (line.startsWith('- ')) {
      const value = parseScalar(line.substring(2).trim());
      if (Array.isArray(parent)) parent.push(value);
      continue;
    }
    if (line === '-') {
      if (Array.isArray(parent)) parent.push(null);
      continue;
    }

    // key: value or key:
    const colonIdx = findColon(line);
    if (colonIdx === -1) continue;
    const key = line.substring(0, colonIdx).trim().replace(/^["']|["']$/g, '');
    let valuePart = line.substring(colonIdx + 1).trim();

    if (valuePart === '' || valuePart === '|' || valuePart === '>') {
      // nested map or empty
      if (!parent.hasOwnProperty(key)) parent[key] = {};
      stack.push({indent: indent, node: parent[key], isArray: false});
    } else {
      parent[key] = parseScalar(valuePart);
    }
  }
  return {root, comments};
}

function findColon(line) {
  // find first ': ' or trailing ':'
  for (let i = 0; i < line.length; i++) {
    if (line[i] === ':') {
      if (i === line.length - 1) return i;
      if (line[i + 1] === ' ' || line[i + 1] === '\t') return i;
    }
  }
  return -1;
}

function parseScalar(s) {
  if (s === 'null' || s === '~' || s === '') return null;
  if (s === 'true' || s === 'True' || s === 'TRUE') return true;
  if (s === 'false' || s === 'False' || s === 'FALSE') return false;
  if (/^-?\d+$/.test(s)) return parseInt(s, 10);
  if (/^-?\d+\.\d+([eE][+-]?\d+)?$/.test(s)) return parseFloat(s);
  // quoted string
  if ((s.startsWith('"') && s.endsWith('"')) || (s.startsWith("'") && s.endsWith("'"))) {
    return s.substring(1, s.length - 1);
  }
  return s;
}

function escapeProp(val) {
  let s = String(val);
  if (!escapeVals) return s;
  // escape backslash first, then special chars
  s = s.replace(/\\/g, '\\\\');
  s = s.replace(/=/g, '\\=');
  s = s.replace(/#/g, '\\#');
  if (s.includes(':')) s = s.replace(/:/g, '\\:');
  return s;
}

function flatten(obj, prefix, out) {
  for (const key in obj) {
    const val = obj[key];
    const newKey = prefix ? prefix + '.' + key : key;
    if (val === null) {
      out[newKey] = '';
    } else if (Array.isArray(val)) {
      val.forEach((item, i) => {
        if (item !== null && typeof item === 'object') {
          flatten(item, newKey + '[' + i + ']', out);
        } else {
          out[newKey + '[' + i + ']'] = item;
        }
      });
    } else if (typeof val === 'object') {
      flatten(val, newKey, out);
    } else {
      out[newKey] = val;
    }
  }
}

function doConvert() {
  const inp = $('#input').value.trim();
  if (!inp) { $('#output').textContent = ''; $('#status').innerHTML = ''; return; }
  try {
    const {root, comments} = parseYAML(inp);
    const flat = {};
    flatten(root, '', flat);
    let result = '';
    if (comments.length) {
      result += comments.join('\n') + '\n';
    }
    const keys = Object.keys(flat).sort();
    for (const k of keys) {
      result += k + '=' + escapeProp(flat[k]) + '\n';
    }
    $('#output').textContent = result.trimEnd();
    $('#status').innerHTML = `<span style="color:var(--gz-success)">${t('valid')}</span> <span style="opacity:.7">(${keys.length} properties)</span>`;
  } catch(e) {
    $('#status').innerHTML = `<span style="color:var(--gz-accent)">${t('invalid')}: ${e.message}</span>`;
    $('#output').textContent = '';
  }
}

function loadExample() {

  doConvert();
}

function doClear() { $('#input').value = ''; $('#output').textContent = ''; $('#status').innerHTML = ''; }
