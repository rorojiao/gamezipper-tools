  },
  zh: {

    toolDesc: '分析任意文本中的关键词密度和频率 — 支持单词、二元组和三元组，停用词过滤让 SEO 分析更准确。',
    lblStop: '忽略停用词（the、is、a…）',
    lblCase: '不区分大小写',
    lblMinlen: '最小词长：',
    lblTop: '结果数量：',
    tUnigram: '单词',
    tBigram: '二元词组',
    tTrigram: '三元词组',
    word: '关键词',
    phrase: '词组',
    count: '次数',
    density: '密度',
    words: '词',
    chars: '字符',
    sentences: '句',
    readingTime: '阅读时间',
    min: '分钟',
    step1: '将文章、网页或段落粘贴到输入区',
    step2: '切换停用词过滤、大小写和最小词长选项',
    step3: '在单词、二元组和三元组标签页查看热门关键词',
    step4: '目标关键词密度建议控制在 1-3%，SEO 效果最佳',
  }
});

const { $, t } = GZ;

const STOP = new Set(['the','a','an','and','or','but','is','are','was','were','be','been','being','have','has','had','do','does','did','will','would','should','could','may','might','must','can','i','you','he','she','it','we','they','them','their','this','that','these','those','in','on','at','by','for','with','about','of','to','from','as','into','through','during','before','after','above','below','between','up','down','out','off','over','under','again','further','then','once','here','there','when','where','why','how','all','any','both','each','few','more','most','other','some','such','no','nor','not','only','own','same','so','than','too','very','s','t','m','d','ll','re','ve','y','ain','aren','couldn','didn','doesn','hadn','hasn','haven','isn','ma','mightn','mustn','needn','shan','shouldn','wasn','weren','won','wouldn','just','also','get','got','like','make','made','one','two','use','used','using','new','now','way','said']);

function switchTab(name, btn) {
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.tab-panel').forEach(p => p.style.display = 'none');
  document.getElementById('tab-' + name).style.display = '';
}

function tokenize(text) {
  return text.toLowerCase().match(/[a-z0-9\u4e00-\u9fff][a-z0-9\u4e00-\u9fff'-]*/g) || [];
}

function getNgrams(tokens, n) {
  const counts = {};
  for (let i = 0; i <= tokens.length - n; i++) {
    const phrase = tokens.slice(i, i + n);
    if (phrase.some(w => STOP.has(w))) continue;
    if (phrase.length === 1 && phrase[0].length < (parseInt(document.getElementById('minLen').value) || 3)) continue;
    const key = phrase.join(' ');
    counts[key] = (counts[key] || 0) + 1;
  }
  return counts;
}

function renderTable(panelId, counts, totalWords, label) {
  const top = parseInt(document.getElementById('topN').value) || 20;
  const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]).slice(0, top);
  const maxCount = sorted[0]?.[1] || 1;
  if (sorted.length === 0) { document.getElementById(panelId).innerHTML = '<p style="opacity:.6;padding:14px">No data — paste some text above.</p>'; return; }
  const rows = sorted.map(([w, c]) => {
    const density = totalWords ? ((c / totalWords) * 100).toFixed(2) : '0.00';
    return `<tr><td>${w}</td><td>${c}</td><td>${density}%<div class="kw-bar"><div style="width:${(c / maxCount) * 100}%"></div></div></td></tr>`;
  }).join('');
  document.getElementById(panelId).innerHTML = `<table class="kw-table"><thead><tr><th>${label}</th><th>${t('count')}</th><th style="min-width:180px">${t('density')}</th></tr></thead><tbody>${rows}</tbody></table>`;
}

function analyze() {
  const raw = $('#input').value;
  if (!raw.trim()) {
    document.getElementById('kpiRow').innerHTML = '';
    document.getElementById('tab-unigram').innerHTML = '';
    document.getElementById('tab-bigram').innerHTML = '';
    document.getElementById('tab-trigram').innerHTML = '';
    return;
  }
  const useStop = document.getElementById('optStop').checked;
  const useCase = document.getElementById('optCase').checked;
  const text = useCase ? raw : raw.toLowerCase();
  const tokens = tokenize(text);
  const filtered = useStop ? tokens.filter(w => !STOP.has(w)) : tokens;
  const wordCount = tokens.length;
  const charCount = raw.length;
  const sentenceCount = (raw.match(/[.!?。！？]+/g) || []).length || 1;
  const readingTime = Math.max(1, Math.round(wordCount / 200));

  document.getElementById('kpiRow').innerHTML = `
    <div class="kpi"><div class="num">${wordCount}</div><div class="lbl">${t('words')}</div></div>
    <div class="kpi"><div class="num">${charCount}</div><div class="lbl">${t('chars')}</div></div>
    <div class="kpi"><div class="num">${sentenceCount}</div><div class="lbl">${t('sentences')}</div></div>
    <div class="kpi"><div class="num">${readingTime} ${t('min')}</div><div class="lbl">${t('readingTime')}</div></div>
  `;

  const unigrams = getNgrams(filtered, 1);
  const bigrams = getNgrams(filtered, 2);
  const trigrams = getNgrams(filtered, 3);

  renderTable('tab-unigram', unigrams, wordCount, t('word'));
  renderTable('tab-bigram', bigrams, wordCount, t('phrase'));
  renderTable('tab-trigram', trigrams, wordCount, t('phrase'));
}

function loadExample() {
  $('#input').value = `Keyword density is the percentage of times a keyword appears in a text compared to the total word count. Most SEO guides recommend keeping keyword density between 1% and 3%. If keyword density is too low, search engines may not understand what the page is about. If keyword density is too high, the page may be flagged for keyword stuffing. A good SEO strategy balances keyword density with high-quality, readable content. Use this keyword density checker to analyze your content and improve your SEO strategy.`;
  analyze();
}

function doClear() { $('#input').value = ''; analyze(); }

$('#input').addEventListener('input', analyze);

document.getElementById('toolbar').innerHTML = `
  <button class="gz-btn" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn" onclick="analyze()">${t('format')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

GZ.renderToolPage({

  ]
});
</script>
