<script>
GZI18n.register({
  en: {
    toolTitle: 'Org Chart Generator',
    toolDesc: 'Create organizational charts online — add members, define hierarchy, customize and download as PNG. Free and browser-based.',
    memberName: 'Name',
    memberTitle: 'Job Title',
    reportsTo: 'Reports To',
    boxColor: 'Box Color',
    addMember: '+ Add Member',
    topLevel: '-- Top Level --',
    step1: 'Enter member name and job title',
    step2: 'Select who they report to (or leave as Top Level)',
    step3: 'Customize the box color for each member',
    step4: 'Click Download to save the org chart as PNG',
  },
  zh: {
    toolTitle: '组织架构图生成器',
    toolDesc: '在线创建组织架构图 — 添加成员、定义层级、自定义颜色并下载为 PNG。免费浏览器工具。',
    memberName: '姓名',
    memberTitle: '职位',
    reportsTo: '上级',
    boxColor: '方框颜色',
    addMember: '+ 添加成员',
    topLevel: '-- 顶层 --',
    step1: '输入成员姓名和职位',
    step2: '选择其上级（或留空为顶层）',
    step3: '自定义每个成员的方框颜色',
    step4: '点击下载将组织架构图保存为 PNG',
  }
});

const { $, copyText, t } = GZ;
let members = [];
let nextId = 1;

$('#lblName').textContent = t('memberName');
$('#lblTitle').textContent = t('memberTitle');
$('#lblReports').textContent = t('reportsTo');
$('#lblColor').textContent = t('boxColor');
$('#btnAdd').textContent = t('addMember');

function addMember() {
  const name = $('#memberName').value.trim();
  const title = $('#memberTitle').value.trim();
  const reportsTo = $('#reportsTo').value;
  const color = $('#boxColor').value;
  if (!name) return;

  members.push({ id: nextId++, name, title, reportsTo: reportsTo ? +reportsTo : null, color });
  $('#memberName').value = '';
  $('#memberTitle').value = '';
  updateUI();
}

function removeMember(id) {
  const parent = members.find(m => m.id === id);
  // Reassign children to the removed member's parent
  members.forEach(m => {
    if (m.reportsTo === id) m.reportsTo = parent ? parent.reportsTo : null;
  });
  members = members.filter(m => m.id !== id);
  updateUI();
}

function updateUI() {
  // Update member list
  $('#memberList').innerHTML = members.map(m => `
    <div class="member-card" style="border-left:3px solid ${m.color}">
      <button class="del" onclick="removeMember(${m.id})">✕</button>
      <div class="name">${m.name}</div>
      <div class="title">${m.title || '—'}</div>
    </div>
  `).join('');

  // Update reportsTo dropdown
  const current = $('#reportsTo').value;
  $('#reportsTo').innerHTML = `<option value="">${t('topLevel')}</option>` +
    members.map(m => `<option value="${m.id}">${m.name}</option>`).join('');
  $('#reportsTo').value = current;

  renderChart();
}

function renderChart() {
  const canvas = $('#orgCanvas');
  const ctx = canvas.getContext('2d');
  const boxW = 160, boxH = 60, gapX = 20, gapY = 60, padX = 40, padY = 30;

  // Build tree
  function getChildren(parentId) {
    return members.filter(m => m.reportsTo === parentId);
  }

  // Calculate subtree width
  function getWidth(id) {
    const children = getChildren(id);
    if (!children.length) return boxW + gapX;
    return children.reduce((sum, c) => sum + getWidth(c.id), 0);
  }

  const roots = getChildren(null);
  const totalW = roots.reduce((sum, r) => sum + getWidth(r.id), 0) + padX * 2;
  
  // Calculate max depth
  function getDepth(id) {
    const children = getChildren(id);
    if (!children.length) return 1;
    return 1 + Math.max(...children.map(c => getDepth(c.id)));
  }
  const maxDepth = roots.length ? Math.max(...roots.map(r => getDepth(r.id))) : 0;
  const totalH = maxDepth * (boxH + gapY) + padY * 2;

  canvas.width = Math.max(totalW, 400);
  canvas.height = Math.max(totalH, 200);

  ctx.fillStyle = '#fff';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  if (!members.length) {
    ctx.fillStyle = '#aaa';
    ctx.font = '16px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('Add members to generate chart', canvas.width/2, canvas.height/2);
    return;
  }

  // Draw nodes
  function drawNode(member, x, y) {
    // Box
    ctx.fillStyle = member.color || '#4ecdc4';
    const radius = 8;
    ctx.beginPath();
    ctx.roundRect(x, y, boxW, boxH, radius);
    ctx.fill();

    // Text
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 13px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(member.name, x + boxW/2, y + 24, boxW - 16);
    ctx.font = '11px sans-serif';
    ctx.fillText(member.title || '', x + boxW/2, y + 42, boxW - 16);

    // Children
    const children = getChildren(member.id);
    if (children.length) {
      const childTotalW = children.reduce((sum, c) => sum + getWidth(c.id), 0);
      let cx = x + boxW/2 - childTotalW/2;
      const cy = y + boxH + gapY;

      children.forEach(child => {
        const cw = getWidth(child.id);
        const childX = cx + cw/2 - boxW/2;

        // Draw connection line
        ctx.strokeStyle = '#ccc';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(x + boxW/2, y + boxH);
        ctx.lineTo(x + boxW/2, y + boxH + gapY/2);
        ctx.lineTo(cx + cw/2, y + boxH + gapY/2);
        ctx.lineTo(cx + cw/2, cy);
        ctx.stroke();

        drawNode(child, childX, cy);
        cx += cw;
      });
    }
  }

  let startX = padX;
  roots.forEach(root => {
    const w = getWidth(root.id);
    drawNode(root, startX + w/2 - boxW/2, padY);
    startX += w;
  });
}

function downloadChart() {
  const a = document.createElement('a');
  a.href = $('#orgCanvas').toDataURL('image/png');
  a.download = 'org-chart.png';
  a.click();
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="downloadChart()">${t('download')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="members=[];nextId=1;updateUI()">${t('clear')}</button>`;

// Add default example data
members = [
  { id: nextId++, name: 'CEO', title: 'Chief Executive', reportsTo: null, color: '#4ecdc4' },
  { id: nextId++, name: 'CTO', title: 'Technology', reportsTo: 1, color: '#ff6b6b' },
  { id: nextId++, name: 'CFO', title: 'Finance', reportsTo: 1, color: '#ffd93d' },
  { id: nextId++, name: 'VP Eng', title: 'Engineering', reportsTo: 2, color: '#a8e6cf' },
  { id: nextId++, name: 'VP Design', title: 'Design', reportsTo: 2, color: '#a8e6cf' },
  { id: nextId++, name: 'Accounting', title: 'Accounting', reportsTo: 3, color: '#dcedc1' },
];
updateUI();

  category: 'image',

  descKey: 'toolDesc',

  related: [

    {icon:'📊', href:'/image/chart-maker.html', name:'Chart Maker'},
    {icon:'📜', href:'/image/certificate-generator.html', name:'Certificate Generator'},
  ]
});
</script>
