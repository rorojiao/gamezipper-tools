<script>

  zh: {

    toolDesc: '将任意文字转换为小型下标字符（如 H₂O、xₙ）。使用 Unicode 编码，一键复制到 Word、Google Docs、化学公式和数学公式。',

    copy: '复制',
    copied: '✓ 已复制！',
    sampleText: '下标',
    fullLabel: '完整下标',
    smallLabel: '迷你下标',
    step1: '输入或粘贴文字 — 试试 H2O 或 x1+x2',
    step2: '在输出区浏览各种下标样式',
    step3: '点击所需样式旁的「复制」按钮',
    step4: '粘贴到 Word、Google Docs、Facebook 或化学笔记',
  }
});

const { $, copyText, t } = GZ;

// Unicode subscript characters (U+2080 block + superscripts). Only some letters exist.
const SUB_MAP = {
  '0':'₀','1':'₁','2':'₂','3':'₃','4':'₄','5':'₅','6':'₆','7':'₇','8':'₈','9':'₉',
  '+':'₊','-':'₋','=':'₌','(':'₍',')':'₎','a':'ₐ','e':'ₑ','o':'ₒ','x':'ₓ','ə':'ₔ',
  'h':'ₕ','k':'ₖ','l':'ₗ','m':'ₘ','n':'ₙ','p':'ₚ','s':'ₛ','t':'ₜ',
  // uppercase approximations using modifier letters / fallback
  'A':'ₐ','B':'ᵦ','C':'ᵧ','D':'ᵨ','E':'ₑ','H':'ₕ','I':'ᵢ','J':'ⱼ','K':'ₖ','L':'ₗ',
  'M':'ₘ','N':'ₙ','O':'ₒ','P':'ₚ','R':'ᵣ','T':'ₜ','U':'ᵤ','V':'ᵥ','X':'ₓ',
};
// Some uppercase are mapped via combining or modifier letters; many simply fallback.
// For a smoother "everything-subscript" experience we apply combining mark as fallback.
const COMBINING_SUBSCRIPT = '\u1D62'; // not standard; use small cap fallback
// Better: for chars without a dedicated subscript, leave as-is (they will sit on baseline).

function toSubscript(str){
  let out='';
  for(const ch of str){
    out += SUB_MAP[ch] || ch.toLowerCase && SUB_MAP[ch.toLowerCase()] || ch;
  }
  return out;
}

// "Mini" variant: lowercase the input first, then subscript
function toMini(str){
  return toSubscript(str.toLowerCase());
}

function render(){
  const input = $('#input').value || t('sampleText');
  const styles = [
    {label: t('fullLabel'), result: toSubscript(input)},
    {label: t('smallLabel'), result: toMini(input)},
  ];
  let html='';
  for(const s of styles){
    html += `<div class="sub-row"><span class="label">${escapeHtml(s.label)}</span><span class="out">${escapeHtml(s.result)}</span><button class="gz-btn gz-btn-tool copy-btn" data-text="${escapeAttr(s.result)}">${t('copy')}</button></div>`;
  }
  $('#output').innerHTML = html;
  $('#output').querySelectorAll('.copy-btn').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      copyText(btn.dataset.text);
      const orig = btn.textContent;
      btn.textContent = t('copied');
      setTimeout(()=>{btn.textContent = orig;}, 1200);
    });
  });
}

function escapeHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function escapeAttr(s){return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

$('#input').addEventListener('input', render);

$('#toolbar').innerHTML = `<button class="gz-btn" id="btn-clear">${t('clear')}</button>`;
$('#btn-clear').addEventListener('click', ()=>{$('#input').value='';render();$('#input').focus();});

render();

});
