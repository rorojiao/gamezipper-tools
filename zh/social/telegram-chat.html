<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="ctrl" id="controls"></div>
    <div class="tg-wrap" id="tg-preview"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Telegram Chat Generator',
    toolDesc: 'Create realistic Telegram chat mockups for design — customize contact, messages and timestamps, then download as PNG.',
    contactName: 'Contact Name',
    avatar: 'Avatar',
    status: 'Status Text',
    message: 'Message',
    direction: 'Direction',
    incoming: 'Incoming',
    outgoing: 'Outgoing',
    time: 'Time',
    readReceipt: 'Read ✓✓',
    addMessage: 'Add Message',
    clear: 'Clear All',
    online: 'online',
    step1: 'Enter the contact name and status text',
    step2: 'Type a message and choose Incoming or Outgoing',
    step3: 'Click Add Message to build the conversation',
    step4: 'Download the Telegram chat as a PNG image',
  },
  zh: {
    toolTitle: 'Telegram 聊天生成器',
    toolDesc: '创建逼真的 Telegram 聊天截图 — 自定义联系人、消息和时间戳，下载为 PNG 图片。',
    contactName: '联系人名称',
    avatar: '头像',
    status: '状态文字',
    message: '消息',
    direction: '方向',
    incoming: '收到',
    outgoing: '发送',
    time: '时间',
    readReceipt: '已读 ✓✓',
    addMessage: '添加消息',
    clear: '全部清除',
    online: '在线',
    step1: '输入联系人名称和状态文字',
    step2: '输入消息并选择收到或发送',
    step3: '点击「添加消息」构建对话',
    step4: '下载 Telegram 聊天为 PNG 图片',
  }
});

const { $, copyText, t } = GZ;

let cfg = {
  name: 'GameZipper Team',
  avatar: '🎮',
  status: 'online',
  messages: [
    {dir:'in', text:'Hey! Did you see the new free tools site?', time:'10:24', read:false},
    {dir:'out', text:'Yes! 955+ tools and no signup needed 🔥', time:'10:25', read:true},
    {dir:'in', text:'That\'s amazing. Sending it to everyone right now!', time:'10:26', read:false},
  ]
};

function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function buildControls() {
  const c = $('#controls');
  c.innerHTML = `
    <label>${t('contactName')}<input type="text" id="cName" value="${escHtml(cfg.name)}"></label>
    <label>${t('avatar')}<input type="text" id="cAvatar" value="${escHtml(cfg.avatar)}" style="width:60px;text-align:center"></label>
    <label>${t('status')}<input type="text" id="cStatus" value="${escHtml(cfg.status)}"></label>
    <label>${t('message')}<textarea id="cMsg" rows="2" style="min-width:240px"></textarea></label>
    <label>${t('direction')}<select id="cDir"><option value="in">${t('incoming')}</option><option value="out">${t('outgoing')}</option></select></label>
    <label>${t('time')}<input type="text" id="cTime" value="${new Date().toTimeString().slice(0,5)}" style="width:80px"></label>
    <label>${t('readReceipt')}<input type="checkbox" id="cRead"></label>
  `;
  $('#cName').oninput=e=>{cfg.name=e.target.value;render()};
  $('#cAvatar').oninput=e=>{cfg.avatar=e.target.value;render()};
  $('#cStatus').oninput=e=>{cfg.status=e.target.value;render()};
}

function addMessage() {
  const text = $('#cMsg').value.trim();
  if (!text) return;
  cfg.messages.push({
    dir: $('#cDir').value,
    text,
    time: $('#cTime').value,
    read: $('#cRead').checked
  });
  $('#cMsg').value = '';
  render();
}

function delMsg(i) { cfg.messages.splice(i,1); render(); }

function render() {
  $('#tg-preview').innerHTML = `
    <div class="tg-head">
      <span class="tg-back">‹</span>
      <div class="tg-avatar">${escHtml(cfg.avatar||'?')}</div>
      <div class="tg-info">
        <div class="tg-name">${escHtml(cfg.name)}</div>
        <div class="tg-status">${escHtml(cfg.status)}</div>
      </div>
    </div>
    <div class="tg-body">
      <div class="tg-date">Today</div>
      ${cfg.messages.map((m,i)=>`
        <div class="tg-bubble tg-${m.dir}" title="click to delete" onclick="delMsg(${i})">
          ${escHtml(m.text)}
          <div class="tg-time">${escHtml(m.time)}${m.dir==='out'?(m.read?' <span class="tg-checks">✓✓</span>':' <span class="tg-checks" style="opacity:.5">✓✓</span>'):''}</div>
        </div>`).join('')}
    </div>
  `;
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="addMessage()">${t('addMessage')}</button>
  <button class="gz-btn" id="dlBtn">${t('download')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="cfg.messages=[];render()">${t('clear')}</button>
`;

$('#dlBtn').onclick = async () => {
  try {
    if (typeof html2canvas !== 'undefined') {
      const canvas = await html2canvas($('#tg-preview'), { backgroundColor: null, scale: 2 });
      const a = document.createElement('a');
      a.href = canvas.toDataURL('image/png');
      a.download = 'telegram-chat.png';
      a.click();
    }
  } catch(e) { console.error(e); }
};

const h2c = document.createElement('script');
h2c.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
document.head.appendChild(h2c);

buildControls();
render();

GZ.renderToolPage({
  category: 'social',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'💬', href:'/social/whatsapp-chat.html', name:'WhatsApp Chat'},
    {icon:'💬', href:'/social/imessage-chat.html', name:'iMessage Chat'},
    {icon:'💬', href:'/social/instagram-dm.html', name:'Instagram DM'},
    {icon:'👻', href:'/social/snapchat-chat.html', name:'Snapchat Chat'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
