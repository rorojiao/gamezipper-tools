<script>

  en: {

    toolDesc: 'Create custom receipt templates for props, pranks, education and testing. Add store name, items and tax — download as image. Free, browser-only.',

  zh: {

    toolDesc: '为道具、恶搞、教学和测试创建自定义收据模板。添加店铺名、商品和税率 — 下载为图片。免费，浏览器本地运行。',
    storeName: '店铺名称',
    address: '地址',
    phone: '电话',
    date: '日期',
    receiptNo: '收据编号',
    items: '商品',
    addItem: '+ 添加商品',
    taxRate: '税率 (%)',
    payment: '支付方式',
    download: '下载为 PNG',
    subtotal: '小计',
    tax: '税',
    total: '总计',
    thankYou: '感谢惠顾！',
    returnPolicy: '凭收据 30 天内可退换',
    itemName: '商品',
    price: '价格',
    qty: '数量',
    step1: '输入店铺名称、地址和联系方式',
    step2: '添加商品及数量和价格',
    step3: '设置税率和支付方式',
    step4: '点击「下载」将收据保存为 PNG',
  }
});

const { $, t } = GZ;

let items = [
  {name:'Game Controller', qty:1, price:59.99},
  {name:'USB Cable', qty:2, price:12.99},
  {name:'Mouse Pad', qty:1, price:8.50},
];

$('#date').value = new Date().toISOString().split('T')[0];

function renderItems() {
  $('#items-list').innerHTML = items.map((item, i) => `
    <div class="item-row" style="margin-bottom:6px">
      <input type="text" value="${item.name}" oninput="items[${i}].name=this.value;render()" placeholder="${t('itemName')}">
      <input type="number" value="${item.qty}" min="1" oninput="items[${i}].qty=+this.value;render()" placeholder="${t('qty')}">
      <input type="number" value="${item.price}" min="0" step="0.01" oninput="items[${i}].price=+this.value;render()" placeholder="${t('price')}">
      <button class="btn-remove" onclick="removeItem(${i})">×</button>
    </div>
  `).join('');
}

function addItem() {
  items.push({name:'', qty:1, price:0});
  renderItems();
  render();
}

function removeItem(i) {
  items.splice(i, 1);
  renderItems();
  render();
}

function render() {
  const store = $('#store').value || 'Store';
  const addr = $('#addr').value || '';
  const phone = $('#phone').value || '';
  const date = $('#date').value || '';
  const receiptNo = $('#receiptNo').value || '000';
  const taxRate = parseFloat($('#taxRate').value) || 0;
  const payment = $('#payment').value;

  let subtotal = 0;
  const itemsHtml = items.filter(i => i.name).map(i => {
    const lineTotal = i.qty * i.price;
    subtotal += lineTotal;
    return `<div class="receipt-item"><span class="name">${i.qty}× ${i.name}</span><span>$${lineTotal.toFixed(2)}</span></div>`;
  }).join('');

  const tax = subtotal * (taxRate / 100);
  const total = subtotal + tax;
  const now = new Date();
  const time = now.toLocaleTimeString('en-US', { hour:'2-digit', minute:'2-digit' });

  $('#receipt').innerHTML = `
    <div class="receipt-header">
      <div class="store">${store}</div>
      <div class="addr">${addr}</div>
      <div class="addr">${phone}</div>
    </div>
    <div class="receipt-meta">
      <span>Date: ${date}</span>
      <span>Time: ${time}</span>
    </div>
    <div class="receipt-meta">
      <span>Receipt #: ${receiptNo}</span>
      <span>Reg: 01</span>
    </div>
    <div class="receipt-items">${itemsHtml}</div>
    <div class="receipt-totals">
      <div>${t('subtotal')}: $${subtotal.toFixed(2)}</div>
      <div>${t('tax')} (${taxRate}%): $${tax.toFixed(2)}</div>
      <div class="grand">${t('total')}: $${total.toFixed(2)}</div>
    </div>
    <div class="receipt-meta" style="margin-top:8px">
      <span>Paid: ${payment}</span>
      <span>$${total.toFixed(2)}</span>
    </div>
    <div class="receipt-footer">
      <div>${t('thankYou')}</div>
      <div style="margin-top:4px">${t('returnPolicy')}</div>
    </div>
  `;
}

function downloadReceipt() {
  const receipt = $('#receipt');
  // Use SVG foreignObject approach for screenshot
  const data = receipt.innerHTML;
  const w = 380;
  const h = receipt.scrollHeight + 48;
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}">
    <foreignObject width="100%" height="100%">
      <div xmlns="http://www.w3.org/1999/xhtml" style="font-family:'Courier New',monospace;background:#fff;color:#1a1a1a;padding:24px;font-size:.85rem;line-height:1.5;width:${w-48}px">
        ${data}
      </div>
    </foreignObject>
  </svg>`;
  const blob = new Blob([svg], { type: 'image/svg+xml' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `receipt-${$('#receiptNo').value || 'template'}.svg`;
  a.click();
  URL.revokeObjectURL(url);
}

['store','addr','phone','date','receiptNo','taxRate','payment'].forEach(id =>
  $('#' + id).addEventListener('input', render)
);

renderItems();
render();
