<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "How is screen size measured?", "acceptedAnswer": {"@type": "Answer", "text": "Screen size is measured diagonally in inches, from one corner of the visible area to the opposite corner. The width and height are smaller than the diagonal — for a 16:9 screen, the diagonal is about 1.794× the height."}}, {"@type": "Question", "name": "What is PPI?", "acceptedAnswer": {"@type": "Answer", "text": "PPI (Pixels Per Inch) tells you how densely packed the pixels are on the screen. Higher PPI = sharper image. A modern phone is around 400-500 PPI, a typical 4K monitor is around 160 PPI, and a 1080p 27-inch monitor is about 82 PPI."}}, {"@type": "Question", "name": "How far should I sit from my TV?", "acceptedAnswer": {"@type": "Answer", "text": "For 1080p content, the recommended distance is about 1.5-2.5× the screen diagonal. For 4K content, you can sit closer — around 1-1.5× the diagonal — because the higher pixel density hides individual pixels from your seat."}}, {"@type": "Question", "name": "Can I enter a resolution to get PPI?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. Enter the screen width and height in cm or inches and the resolution in pixels. The calculator instantly gives you the PPI and a pixel density rating (Retina, HiDPI, standard)."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="ssc-grid">
      <div>
        <label id="lbl-unit"></label>
        <select id="unit">
          <option value="cm">Centimeters</option>
          <option value="inch" selected>Inches</option>
          <option value="mm">Millimeters</option>
        </select>
      </div>
      <div>
        <label id="lbl-w"></label>
        <input type="number" id="w" value="13.6" step="0.1" min="0.1">
      </div>
      <div>
        <label id="lbl-h"></label>
        <input type="number" id="h" value="7.6" step="0.1" min="0.1">
      </div>
      <div>
        <label id="lbl-resw"></label>
        <input type="number" id="resw" value="2560" min="1" placeholder="e.g. 1920">
      </div>
      <div>
        <label id="lbl-resh"></label>
        <input type="number" id="resh" value="1600" min="1" placeholder="e.g. 1080">
      </div>
    </div>
    <div class="ssc-result">
      <div class="ssc-card"><div class="v" id="diag-in">14.0</div><div class="u" id="u1">inches</div><div class="l" id="lbl-diag"></div></div>
      <div class="ssc-card"><div class="v" id="diag-cm">35.6</div><div class="u">cm</div><div class="l" id="lbl-diag"></div></div>
      <div class="ssc-card"><div class="v" id="ppi-val">226</div><div class="u">PPI</div><div class="l" id="lbl-ppi"></div></div>
      <div class="ssc-card"><div class="v" id="aspect-val">16:10</div><div class="u">&nbsp;</div><div class="l" id="lbl-aspect"></div></div>
      <div class="ssc-card"><div class="v" id="area-val">103</div><div class="u">in²</div><div class="l" id="lbl-area"></div></div>
      <div class="ssc-card"><div class="v" id="view-val">42</div><div class="u">in (min)</div><div class="l" id="lbl-view"></div></div>
    </div>
    <div class="ssc-preview">
      <div class="ssc-tv" id="tv">
        <div class="lbl" id="tv-lbl">14.0" diagonal</div>
        <div class="ratio" id="tv-ratio">16:10</div>
      </div>
    </div>
    <div style="margin-top:14px;font-size:.78rem;color:var(--text2)" id="sizes-label"></div>
    <div class="ssc-sizes" id="sizes"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Screen Size Calculator',
    toolDesc: 'Compute diagonal screen size from width and height, calculate PPI (pixels per inch) and recommended viewing distance for TVs, monitors and phones.',
    unit: 'Units',
    width: 'Width',
    height: 'Height',
    resw: 'Resolution width (px)',
    resh: 'Resolution height (px)',
    diag: 'Diagonal',
    ppi: 'Pixel density',
    aspect: 'Aspect ratio',
    area: 'Area',
    viewDist: 'Min viewing distance',
    sizesLabel: 'Same aspect ratio at common sizes',
    step1: 'Choose your units (inches, cm or mm) and enter the screen width and height',
    step2: 'Optionally enter the pixel resolution to get PPI',
    step3: 'Read the diagonal, PPI and viewing distance instantly',
    step4: 'Use the preview to visualize the proportions',
    inches: 'inches',
    retina: 'Retina',
    hidpi: 'HiDPI',
    standard: 'Standard',
  },
  zh: {
    toolTitle: '屏幕尺寸计算器',
    toolDesc: '根据宽高计算屏幕对角线尺寸、PPI 像素密度和推荐观看距离，适用于电视、显示器和手机。',
    unit: '单位',
    width: '宽度',
    height: '高度',
    resw: '分辨率宽 (px)',
    resh: '分辨率高 (px)',
    diag: '对角线',
    ppi: '像素密度',
    aspect: '宽高比',
    area: '面积',
    viewDist: '最小观看距离',
    sizesLabel: '同宽高比的常见尺寸',
    step1: '选择单位（英寸、厘米或毫米）并输入屏幕宽高',
    step2: '可选输入像素分辨率以计算 PPI',
    step3: '即时查看对角线、PPI 和观看距离',
    step4: '使用预览查看比例效果',
    inches: '英寸',
    retina: '视网膜屏',
    hidpi: '高清',
    standard: '标准',
  }
});

const { $, t } = GZ;

function gcd(a, b) { a = Math.round(Math.abs(a)); b = Math.round(Math.abs(b)); while (b) { [a, b] = [b, a % b]; } return a || 1; }

function calc() {
  let w = parseFloat($('#w').value);
  let h = parseFloat($('#h').value);
  const unit = $('#unit').value;
  if (!(w > 0) || !(h > 0)) return;

  // Normalize to inches
  let wIn, hIn;
  if (unit === 'cm') { wIn = w / 2.54; hIn = h / 2.54; }
  else if (unit === 'mm') { wIn = w / 25.4; hIn = h / 25.4; }
  else { wIn = w; hIn = h; }

  const diagIn = Math.sqrt(wIn * wIn + hIn * hIn);
  const diagCm = diagIn * 2.54;
  $('#diag-in').textContent = diagIn.toFixed(2);
  $('#diag-cm').textContent = diagCm.toFixed(2);
  $('#u1').textContent = t('inches');

  // Area
  const areaIn = wIn * hIn;
  $('#area-val').textContent = areaIn.toFixed(1);

  // Aspect ratio
  const g = gcd(w, h);
  const aw = +(w / g).toFixed(2);
  const ah = +(h / g).toFixed(2);
  $('#aspect-val').textContent = `${aw}:${ah}`;

  // PPI
  const resw = parseFloat($('#resw').value);
  const resh = parseFloat($('#resh').value);
  let ppi = 0;
  if (resw > 0 && resh > 0 && wIn > 0 && hIn > 0) {
    ppi = Math.sqrt(resw * resw + resh * resh) / diagIn;
  }
  $('#ppi-val').textContent = ppi > 0 ? Math.round(ppi) : '—';

  // Viewing distance (1080p baseline: 1.5-2.5x diagonal)
  const minDist = diagIn * 1.5;
  $('#view-val').textContent = Math.round(minDist);

  // Preview
  const tv = $('#tv');
  const maxW = 460;
  const ratio = wIn / hIn;
  let pw, ph;
  if (ratio >= 1) { pw = maxW; ph = maxW / ratio; }
  else { ph = maxW; pw = maxW * ratio; }
  tv.style.width = pw + 'px';
  tv.style.height = ph + 'px';
  $('#tv-lbl').textContent = `${diagIn.toFixed(1)}" diagonal`;
  $('#tv-ratio').textContent = `${aw}:${ah}`;

  // Common sizes
  const sizes = [24, 27, 32, 43, 50, 55, 65, 75, 85];
  $('#sizes').innerHTML = sizes.map(s => {
    if (ratio >= 1) {
      const sw = s * ratio;
      const sh = s;
      return `<div class="ssc-size"><b>${sw.toFixed(1)}"</b> × ${sh}"</div>`;
    } else {
      const sw = s;
      const sh = s / ratio;
      return `<div class="ssc-size"><b>${sw}"</b> × ${sh.toFixed(1)}"</div>`;
    }
  }).join('');
}

['w','h','resw','resh','unit'].forEach(id => $('#' + id).addEventListener('input', calc));

// Init labels
$('#lbl-unit').textContent = t('unit');
$('#lbl-w').textContent = t('width');
$('#lbl-h').textContent = t('height');
$('#lbl-resw').textContent = t('resw');
$('#lbl-resh').textContent = t('resh');
$('#lbl-diag').textContent = t('diag');
$('#lbl-ppi').textContent = t('ppi');
$('#lbl-aspect').textContent = t('aspect');
$('#lbl-area').textContent = t('area');
$('#lbl-view').textContent = t('viewDist');
$('#sizes-label').textContent = t('sizesLabel');

calc();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🖥️', href:'/calc/tv-size-calculator.html', name:'TV Size'},
    {icon:'📐', href:'/calc/aspect-ratio-calculator.html', name:'Aspect Ratio'},
    {icon:'📱', href:'/calc/dpi-calculator.html', name:'DPI'},
    {icon:'🔍', href:'/calc/ppi-calculator.html', name:'PPI'},
  ]
});
</script>

</body>
