const { $, copyText, t } = GZ;

const DATA = {
  us: { flag:'🇺🇸', streets:['Main St','Oak Ave','Maple Dr','Cedar Ln','Pine St','Elm St','Washington Ave','Park Blvd','Lake Rd','Hill St','Sunset Dr','River Rd','Highland Ave','Church St','Forest Dr'], cities:[['New York','NY','10001'],['Los Angeles','CA','90001'],['Chicago','IL','60601'],['Houston','TX','77001'],['Phoenix','AZ','85001'],['Seattle','WA','98101'],['Denver','CO','80201'],['Boston','MA','02101'],['Atlanta','GA','30301'],['Miami','FL','33101'],['Dallas','TX','75201'],['Portland','OR','97201']], zip: c => c[2], fmt:(n,s,c)=>`${n} ${s}\n${c[0]}, ${c[1]} ${c[2]}\nUnited States` },
  gb: { flag:'🇬🇧', streets:['High Street','Station Road','Main Street','Church Lane','Park Road','Victoria Road','The Avenue','Queens Road','Mill Lane','New Road','Church Street','York Road'], cities:[['London','London','SW1A 1AA'],['Manchester','Greater Manchester','M1 1AE'],['Birmingham','West Midlands','B1 1AA'],['Leeds','West Yorkshire','LS1 4AP'],['Glasgow','Glasgow City','G1 1XQ'],['Liverpool','Merseyside','L1 8JQ'],['Newcastle','Tyne and Wear','NE1 5DF'],['Sheffield','South Yorkshire','S1 2HE'],['Bristol','Bristol','BS1 4ST'],['Edinburgh','City of Edinburgh','EH1 1YJ']], zip: c => c[2], fmt:(n,s,c)=>`${n} ${s}\n${c[0]}\n${c[1]}\n${c[2]}\nUnited Kingdom` },
  de: { flag:'🇩🇪', streets:['Hauptstraße','Bahnhofstraße','Schulstraße','Gartenstraße','Bergstraße','Dorfstraße','Lindenstraße','Goethestraße','Mozartweg','Waldstraße','Schillerstraße','Kirchstraße'], cities:[['Berlin','Berlin','10115'],['München','Bayern','80331'],['Hamburg','Hamburg','20095'],['Köln','Nordrhein-Westfalen','50667'],['Frankfurt','Hessen','60311'],['Stuttgart','Baden-Württemberg','70173'],['Düsseldorf','Nordrhein-Westfalen','40213'],['Leipzig','Sachsen','04109'],['Dortmund','Nordrhein-Westfalen','44135'],['Essen','Nordrhein-Westfalen','45127']], zip: c => c[2], fmt:(n,s,c)=>`${c[2]} ${c[0]}\n${n} ${s}\n${c[1]}\nDeutschland` },
  fr: { flag:'🇫🇷', streets:['Rue de la Paix','Avenue des Champs','Rue Victor Hugo','Boulevard Saint-Michel','Rue du Marché','Avenue de la République','Rue Pasteur','Rue Jean Jaurès','Rue de la Gare','Avenue Jean Médecin','Boulevard Haussmann'], cities:[['Paris','Île-de-France','75001'],['Marseille','Provence-Alpes-Côte d\'Azur','13001'],['Lyon','Auvergne-Rhône-Alpes','69001'],['Toulouse','Occitanie','31000'],['Nice','Provence-Alpes-Côte d\'Azur','06000'],['Nantes','Pays de la Loire','44000'],['Bordeaux','Nouvelle-Aquitaine','33000'],['Lille','Hauts-de-France','59000'],['Strasbourg','Grand Est','67000'],['Montpellier','Occitanie','34000']], zip: c => c[2], fmt:(n,s,c)=>`${n} ${s}\n${c[2]} ${c[0]}\n${c[1]}\nFrance` },
  ca: { flag:'🇨🇦', streets:['Main Street','King Street','Queen Street','Yonge Street','Bay Street','Bank Street','Dundas Street','Bloor Street','Spadina Avenue','College Street','Wellington Street'], cities:[['Toronto','ON','M5H 2N2'],['Montreal','QC','H3A 0G4'],['Vancouver','BC','V6B 5K3'],['Calgary','AB','T2P 1J9'],['Ottawa','ON','K1A 0A6'],['Edmonton','AB','T5J 0K7'],['Winnipeg','MB','R3C 0V8'],['Quebec City','QC','G1R 5K6'],['Hamilton','ON','L8P 1A2'],['Halifax','NS','B3J 1S9']], zip: c => c[2], fmt:(n,s,c)=>`${n} ${s}\n${c[0]}, ${c[1]}\n${c[2]}\nCanada` },
  au: { flag:'🇦🇺', streets:['George Street','Pitt Street','Collins Street','Bourke Street','Queen Street','King Street','Adelaide Street','William Street','Elizabeth Street','Macquarie Street','Flinders Street'], cities:[['Sydney','NSW','2000'],['Melbourne','VIC','3000'],['Brisbane','QLD','4000'],['Perth','WA','6000'],['Adelaide','SA','5000'],['Gold Coast','QLD','4217'],['Newcastle','NSW','2300'],['Canberra','ACT','2600'],['Hobart','TAS','7000'],['Darwin','NT','0800']], zip: c => c[2], fmt:(n,s,c)=>`${n} ${s}\n${c[0]} ${c[1]} ${c[2]}\nAustralia` },
};

function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function pick(a){return a[Math.floor(Math.random()*a.length)];}

function genAddress(country){
  const d = DATA[country] || DATA.us;
  const city = pick(d.cities);
  const obj = { street: rnd(1,9999)+' '+pick(d.streets), city: city[0], region: city[1], postal: d.zip(city), country };
  obj.text = d.fmt(rnd(1,9999), pick(d.streets), city);
  obj._city = city;
  return obj;
}

let current = null;
function render(){
  const country = $('#selCountry').value;
  const d = DATA[country];
  $('#flag').textContent = d.flag;
  current = genAddress(country);
  $('#addrLines').innerHTML = current.text.split('\n').map(l=>`<div>${l}</div>`).join('');
  $('#btnMap').href = 'https://www.google.com/maps/search/?api=1&query='+encodeURIComponent(current.street.split(' ').slice(1).join(' ')+' '+current.city);
}

function genBatch(){
  const country = $('#selCountry').value;
  const n = Math.min(500, Math.max(1, +$('#batchCount').value || 20));
  const fmt = $('#batchFmt').value;
  const rows = [];
  for(let i=0;i<n;i++) rows.push(genAddress(country));
  let out='';
  const cols = ['street','city','region','postal','country'];
  if(fmt==='json'){ out = JSON.stringify(rows.map(r=>{const o={};cols.forEach(c=>o[c]=r[c]);return o;}),null,2); }
  else if(fmt==='csv'){ out = cols.join(',')+'\n'+rows.map(r=>cols.map(c=>{const v=String(r[c]);return v.includes(',')?'"'+v+'"':v;}).join(',')).join('\n'); }
  else if(fmt==='tsv'){ out = cols.join('\t')+'\n'+rows.map(r=>cols.map(c=>r[c]).join('\t')).join('\n'); }
  else { out = rows.map(r=>r.text).join('\n---\n'); }
  $('#batchOut').value = out;
}

$('#lblCountry').textContent = t('country');
$('#lblCount').textContent = t('count');
$('#lblFmt').textContent = t('format');
$('#lblBatch').textContent = t('batchTitle');
$('#disclaimer').textContent = t('disclaimer');

$('#toolbar').innerHTML = `
  <button class="gz-btn" id="btnGen">${t('generate')}</button>
  <button class="gz-btn gz-btn-secondary" id="btnBatch">${t('batchTitle')}</button>`;
$('#btnGen').onclick = () => { render(); };
$('#btnBatch').onclick = genBatch;
$('#btnCopy').onclick = () => copyText(current.text);
$('#selCountry').onchange = () => { render(); genBatch(); };

render();
genBatch();

GZ.renderToolPage({

</script>
