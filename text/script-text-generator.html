const { $, copyText, t } = GZ;

// Unicode Mathematical Alphanumeric Symbols — Script family.
// 8 script capitals (B,E,F,H,I,L,M,R) and 3 lowercase (e,g,o) live in
// Letterlike Symbols (U+2100-214F) — they double as math constants
// (ℬ, ℰ, ℱ, ℋ, ℐ, ℒ, ℳ, ℛ, ℯ, ℊ, ℴ).
const STYLES = {
  script: {
    upper: 0x1D49C, lower: 0x1D4B6, digit: null,
    upperExc: { 0x42: 0x212C, 0x45: 0x2130, 0x46: 0x2131, 0x48: 0x210B, 0x49: 0x2110, 0x4C: 0x2112, 0x4D: 0x2133, 0x52: 0x211B },
    lowerExc: { 0x65: 0x212F, 0x67: 0x210A, 0x6F: 0x2134 }
  },
  boldScript: { upper: 0x1D4D0, lower: 0x1D4EA, digit: null },
};

function stylize(text, key) {
  const s = STYLES[key];
  if (!s) return text;
  let out = '';
  for (const ch of text) {
    const code = ch.codePointAt(0);
    if (code >= 0x41 && code <= 0x5A) {
      if (s.upperExc && s.upperExc[code]) out += String.fromCodePoint(s.upperExc[code]);
      else out += String.fromCodePoint(code - 0x41 + s.upper);
    } else if (code >= 0x61 && code <= 0x7A) {
      if (s.lowerExc && s.lowerExc[code]) out += String.fromCodePoint(s.lowerExc[code]);
      else out += String.fromCodePoint(code - 0x61 + s.lower);
    } else {
      out += ch;
    }
  }
  return out;
}

let currentStyle = 'script';

function processText() {
  const text = $('#input').value;
  if (!text) { $('#output').textContent = ''; return; }
  $('#output').textContent = stylize(text, currentStyle);
}

$('#input').addEventListener('input', processText);

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="setStyle('script',this)">${t('script')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="setStyle('boldScript',this)">${t('boldScript')}</button>
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#input').value='';$('#output').textContent=''">${t('clear')}</button>`;

function setStyle(key, btn) {
  currentStyle = key;
  processText();
  btn.parentElement.querySelectorAll('.gz-btn').forEach(b => {
    b.classList.remove('gz-btn-active');
    b.classList.add('gz-btn-secondary');
  });
  btn.classList.add('gz-btn-active');
  btn.classList.remove('gz-btn-secondary');
}

$('#input').value = 'Elegant Script';
processText();
