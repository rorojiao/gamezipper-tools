<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is Net Present Value (NPV)?", "acceptedAnswer": {"@type": "Answer", "text": "NPV is the difference between the present value of cash inflows and outflows over time. It tells you whether an investment will be profitable after accounting for the time value of money at a given discount rate."}}, {"@type": "Question", "name": "What does a positive NPV mean?", "acceptedAnswer": {"@type": "Answer", "text": "A positive NPV means the investment is expected to generate more value than its cost — it is financially worthwhile. A negative NPV means it will lose money at the given discount rate. An NPV of zero means it breaks even."}}, {"@type": "Question", "name": "What discount rate should I use?", "acceptedAnswer": {"@type": "Answer", "text": "Common choices are your cost of capital, required rate of return, or the prevailing interest rate. Businesses often use WACC (Weighted Average Cost of Capital), typically 8-15%. Individuals might use a savings rate of 4-7%."}}, {"@type": "Question", "name": "What is the NPV formula?", "acceptedAnswer": {"@type": "Answer", "text": "NPV = Σ [Cash Flow_t / (1 + r)^t] for each period t, where r is the discount rate. The initial investment (Year 0) is usually a negative cash flow. Each future cash flow is discounted back to today's value."}}]}</script>

<script>
GZI18n.register({
  en: {
    toolTitle: 'NPV Calculator',
    toolDesc: 'Calculate Net Present Value (NPV) of any investment — enter initial cost, discount rate and yearly cash flows. See PV breakdown and profitability verdict. Free, private, browser-based.',
    initialInvest: 'Initial Investment (Year 0, negative $)',
    discRate: 'Discount Rate (% per year)',
    cashflows: 'Yearly Cash Flows',
    year: 'Year',
    cashflow: 'Cash Flow ($)',
    presentValue: 'Present Value',
    addYear: '+ Add Year',
    calculate: 'Calculate NPV',
    npvResult: 'Net Present Value (NPV)',
    positive: '✓ Good investment — NPV is positive',
    negative: '✗ Reject — NPV is negative',
    neutral: '~ Break even — NPV ≈ 0',
    totalPV: 'Total PV of Cash Flows',
    totalInvest: 'Total Investment',
    formulaTitle: 'NPV Formula',
    f1: 'NPV = Σ [ CFₜ / (1 + r)ᵗ ] for t = 0, 1, 2, … n',
    f2: 'r = discount rate, CFₜ = cash flow in year t',
    step1: 'Enter the initial investment as a negative number (e.g. -10000)',
    step2: 'Set your discount rate (e.g. 10% = cost of capital)',
    step3: 'Add yearly cash flows (positive for income, negative for costs)',
    step4: 'Read the NPV — positive means the investment is worthwhile',
  },
  zh: {
    toolTitle: '净现值（NPV）计算器',
    toolDesc: '计算任意投资的净现值（NPV）— 输入初始投资、折现率和每年现金流。查看现值明细和投资判断。免费、私密、浏览器本地运行。',
    initialInvest: '初始投资（第 0 年，负数 $）',
    discRate: '折现率（每年 %）',
    cashflows: '每年现金流',
    year: '年',
    cashflow: '现金流 ($)',
    presentValue: '现值',
    addYear: '+ 添加年份',
    calculate: '计算 NPV',
    npvResult: '净现值（NPV）',
    positive: '✓ 值得投资 — NPV 为正',
    negative: '✗ 不建议 — NPV 为负',
    neutral: '~ 持平 — NPV ≈ 0',
    totalPV: '现金流总现值',
    totalInvest: '总投资',
    formulaTitle: 'NPV 公式',
    f1: 'NPV = Σ [ CFₜ / (1 + r)ᵗ ] ，t = 0, 1, 2, … n',
    f2: 'r = 折现率，CFₜ = 第 t 年现金流',
    step1: '初始投资输入负数（如 -10000）',
    step2: '设置折现率（如 10% = 资本成本）',
    step3: '添加每年现金流（正数为收入，负数为支出）',
    step4: '查看 NPV — 为正表示投资可行',
  }
});

const { $, t } = GZ;
let cashflows = [3000, 4000, 5000, 4000];

function fmt(n) { return '$' + n.toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2}); }

function renderCashflows() {
  const container = $('#cashflow-container');
  let html = `<div style="margin-bottom:12px;font-weight:600;font-size:.9em">${t('cashflows')}</div>`;
  cashflows.forEach((cf, i) => {
    const year = i + 1;
    const r = parseFloat($('#rate').value) / 100 || 0;
    const pv = cf / Math.pow(1 + r, year);
    html += `<div class="cashflow-row">
      <label>${t('year')} ${year}</label>
      <input type="number" class="cf-input" data-idx="${i}" value="${cf}" step="any">
      <span class="pv">${fmt(pv)}</span>
      <button onclick="removeYear(${i})" title="Remove">✕</button>
    </div>`;
  });
  container.innerHTML = html;
  $$('.cf-input').forEach(el => {
    el.addEventListener('input', e => {
      const idx = +e.target.dataset.idx;
      cashflows[idx] = parseFloat(e.target.value) || 0;
      updatePVs();
    });
  });
}

function updatePVs() {
  const r = parseFloat($('#rate').value) / 100 || 0;
  $$('.cf-input').forEach((el, i) => {
    const cf = parseFloat(el.value) || 0;
    const pv = cf / Math.pow(1 + r, i + 1);
    const pvSpan = el.parentElement.querySelector('.pv');
    if (pvSpan) pvSpan.textContent = fmt(pv);
  });
}

function addYear() {
  cashflows.push(0);
  renderCashflows();
}

function removeYear(idx) {
  if (cashflows.length > 1) {
    cashflows.splice(idx, 1);
    renderCashflows();
  }
}

function calculate() {
  // Read current values from inputs
  const inputs = $$('.cf-input');
  cashflows = Array.from(inputs).map(el => parseFloat(el.value) || 0);

  const initial = parseFloat($('#initial').value) || 0;
  const r = parseFloat($('#rate').value) / 100 || 0;

  let npv = initial; // Year 0
  let totalPV = 0;
  const pvs = [];
  cashflows.forEach((cf, i) => {
    const pv = cf / Math.pow(1 + r, i + 1);
    npv += pv;
    totalPV += pv;
    pvs.push(pv);
  });

  const cls = npv > 0.01 ? 'positive' : (npv < -0.01 ? 'negative' : '');
  const verdict = npv > 0.01 ? t('positive') : (npv < -0.01 ? t('negative') : t('neutral'));
  const sign = npv >= 0 ? '' : '-';

  $('#results').innerHTML = `
    <div class="result-banner ${cls}">
      <div class="label">${t('npvResult')}</div>
      <div class="value">${fmt(Math.abs(npv))}</div>
      <div class="verdict">${verdict}</div>
    </div>
    <div class="summary-grid">
      <div class="summary-card"><div class="label">${t('totalPV')}</div><div class="value">${fmt(totalPV)}</div></div>
      <div class="summary-card"><div class="label">${t('totalInvest')}</div><div class="value">${fmt(Math.abs(initial))}</div></div>
    </div>`;

  $('#formula-box').innerHTML = `<strong>${t('formulaTitle')}:</strong><br><code>${t('f1')}</code><br><code>${t('f2')}</code>`;
}

// Event listeners
$('#lbl-invest').textContent = t('initialInvest');
$('#lbl-rate').textContent = t('discRate');
$('#btn-add-year').textContent = t('addYear');
$('#btn-calc').textContent = t('calculate');
$('#btn-add-year').addEventListener('click', addYear);
$('#btn-calc').addEventListener('click', calculate);
$('#rate').addEventListener('input', () => { updatePVs(); });

$('#toolbar').innerHTML = '';

renderCashflows();
calculate();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📊', href:'/calc/roi-calculator.html', name:'ROI'},
    {icon:'🏦', href:'/calc/loan-calculator.html', name:'Loan'},
    {icon:'🪙', href:'/calc/compound-interest-calculator.html', name:'Compound Interest'},
    {icon:'📈', href:'/calc/break-even-calculator.html', name:'Break Even'},
  ]
});
</script>
