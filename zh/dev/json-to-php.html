    jsonValid: '✓ JSON 有效', jsonInvalid: '✗ JSON 无效',
    step1: '将 JSON 粘贴到输入框，工具会自动解析并转换。',
    step2: '选择数组语法（[] 或 array()）、缩进方式和 PHP 变量名。',
    step3: '按项目风格切换 => 箭头和结尾分号。',
    step4: '点击复制将生成的 PHP 代码粘贴到脚本中。',

const { $, copyText, t } = GZ;

function escapeHtml(s) {
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function getIndent(level) {
  const v = $('#indent').value;
  const unit = v === 'tab' ? '\t' : ' '.repeat(+v);
  return unit.repeat(level);
}

function phpVal(value, level) {
  const ind = getIndent(level);
  const indClose = getIndent(level - 1);
  const shortSyntax = $('#syntax').value === 'short';
  const openArr = shortSyntax ? '[' : 'array(';
  const closeArr = shortSyntax ? ']' : ')';
  const arrow = $('#arrow').checked ? ' => ' : ', ';

  if (value === null) return { txt: 'null', cls: 'tok-null' };
  if (typeof value === 'boolean') return { txt: value ? 'true' : 'false', cls: 'tok-bool' };
  if (typeof value === 'number') {
    if (Number.isInteger(value)) return { txt: String(value), cls: 'tok-num' };
    return { txt: String(value), cls: 'tok-num' };
  }
  if (typeof value === 'string') {
    const esc = value.replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/\n/g, '\\n').replace(/\t/g, '\\t').replace(/\r/g, '\\r');
    return { txt: `'${esc}'`, cls: 'tok-str' };
  }
  // array or object
  const isObj = !Array.isArray(value);
  const keys = isObj ? Object.keys(value) : null;
  const len = isObj ? keys.length : value.length;
  if (len === 0) {
    return { txt: `<span class="tok-sym">${openArr}</span><span class="tok-sym">${closeArr}</span>`, cls: '' };
  }
  let parts = [`<span class="tok-sym">${openArr}</span>`];
  for (let i = 0; i < len; i++) {
    const k = isObj ? keys[i] : i;
    const v = value[k];
    const childParts = phpVal(v, level + 1);
    let line = `${ind}<span class="tok-key">${isObj ? `'${String(k).replace(/'/g, "\\'")}'` : k}</span>${arrow}${childParts.txt}`;
    parts.push(line + ',');
  }
  parts.push(`${indClose}<span class="tok-sym">${closeArr}</span>`);
  return { txt: parts.join('\n'), cls: '' };
}

function convert() {
  const inp = $('#input').value.trim();
  if (!inp) { $('#output').innerHTML = ''; $('#status').innerHTML = ''; return; }
  try {
    const obj = JSON.parse(inp);
    const varname = ($('#varname').value.trim() || '$data').replace(/^\$*/, '$');
    const semi = $('#semicolon').checked ? ';' : '';
    const result = phpVal(obj, 1);
    const html = `<span class="tok-key">${escapeHtml(varname)}</span> ${$('#arrow').checked ? '<span class="tok-sym">=</span> ' : ''}${result.txt}<span class="tok-sym">${semi}</span>`;
    $('#output').innerHTML = html;
    $('#status').innerHTML = `<span style="color:var(--gz-success)">${t('jsonValid')}</span>`;
  } catch (e) {
    $('#status').innerHTML = `<span style="color:var(--gz-accent)">${t('jsonInvalid')}: ${e.message}</span>`;
    $('#output').innerHTML = `<span style="color:var(--gz-accent)">${escapeHtml(e.message)}</span>`;
  }
}

function loadExample() {
  $('#input').value = JSON.stringify({
    app: 'GameZipper Tools',
    version: 2.6,
    active: true,
    null_value: null,
    features: ['json', 'php', 'rust', 42],
    nested: { level: 3, items: [{ id: 1, name: 'First' }, { id: 2, name: 'Second' }] }
  }, null, 2);
  convert();
}

function doClear() { $('#input').value = ''; $('#output').innerHTML = ''; $('#status').innerHTML = ''; }

['input', 'syntax', 'indent', 'varname', 'arrow', 'semicolon'].forEach(id => {
  $('#' + id).addEventListener('input', convert);
  $('#' + id).addEventListener('change', convert);
});

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="convert()">${t('btnConvert')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('btnExample')}</button>
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('btnCopy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('btnClear')}</button>`;

$('#lbl-syntax').textContent = t('syntaxLabel');
$('#lbl-indent').textContent = t('indentLabel');
