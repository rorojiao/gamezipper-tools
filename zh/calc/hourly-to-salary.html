  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="form-row">
      <div>
        <label class="gz-label" id="lbl-rate"></label>
        <input type="number" id="rate" class="gz-input" value="25" min="0" step="0.01">
      </div>
      <div>
        <label class="gz-label" id="lbl-hours"></label>
        <input type="number" id="hours" class="gz-input" value="40" min="0" max="168">
      </div>
      <div>
        <label class="gz-label" id="lbl-ot"></label>
        <input type="number" id="ot" class="gz-input" value="0" min="0" max="80">
      </div>
      <div>
        <label class="gz-label" id="lbl-mult"></label>
        <select id="mult" class="gz-select">
          <option value="1.5">1.5×</option>
          <option value="2">2×</option>
          <option value="1">1×</option>
        </select>
      </div>

  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Hourly to Salary Calculator',
    toolDesc: 'Convert your hourly wage to annual, monthly, weekly, and daily salary. Includes overtime calculations.',
    rate: 'Hourly Rate ($)',
    hours: 'Hours per Week',
    ot: 'Overtime Hours/Week',
    mult: 'Overtime Multiplier',
    annual: 'Annual Salary',
    monthly: 'Monthly Salary',
    biweekly: 'Bi-Weekly Pay',
    weekly: 'Weekly Pay',
    daily: 'Daily Pay',
    baseAnnual: 'Base annual',
    withOT: 'incl. overtime',
    step1: 'Enter your hourly pay rate',
    step2: 'Set your regular hours per week (default 40)',
    step3: 'Optionally add overtime hours and multiplier',
    step4: 'View your salary breakdown across all time periods',
  },
  zh: {
    toolTitle: '时薪转年薪计算器',
    toolDesc: '将时薪转换为年薪、月薪、周薪和日薪，支持加班费计算。',
    rate: '时薪（$）',
    hours: '每周工时',
    ot: '每周加班时数',
    mult: '加班倍率',
    annual: '年薪',
    monthly: '月薪',
    biweekly: '双周薪',
    weekly: '周薪',
    daily: '日薪',
    baseAnnual: '基本年薪',
    withOT: '含加班费',
    step1: '输入你的时薪',
    step2: '设置每周正常工时（默认 40）',
    step3: '可选：输入加班时数和倍率',
    step4: '查看各时间周期的薪资明细',
  }
});

const { $, t } = GZ;

function fmt(n) {
  return '$' + n.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function calculate() {
  const rate = parseFloat($('#rate').value) || 0;
  const hours = parseFloat($('#hours').value) || 0;
  const ot = parseFloat($('#ot').value) || 0;
  const mult = parseFloat($('#mult').value) || 1.5;

  const weeklyBase = rate * hours;
  const weeklyOT = rate * mult * ot;
  const weeklyTotal = weeklyBase + weeklyOT;
  const annualTotal = weeklyTotal * 52;
  const monthly = annualTotal / 12;
  const biweekly = weeklyTotal * 2;
  const daily = weeklyTotal / 5;

  $('#results').innerHTML = `
    <div class="result-card"><div class="label">${t('annual')}</div><div class="value">${fmt(annualTotal)}</div><div class="sub">${t('withOT')}</div></div>
    <div class="result-card"><div class="label">${t('monthly')}</div><div class="value">${fmt(monthly)}</div><div class="sub">${t('withOT')}</div></div>
    <div class="result-card"><div class="label">${t('biweekly')}</div><div class="value">${fmt(biweekly)}</div><div class="sub">${t('withOT')}</div></div>
    <div class="result-card"><div class="label">${t('weekly')}</div><div class="value">${fmt(weeklyTotal)}</div><div class="sub">${t('withOT')}</div></div>
    <div class="result-card"><div class="label">${t('daily')}</div><div class="value">${fmt(daily)}</div><div class="sub">${t('withOT')}</div></div>
  `;
}

['rate','hours','ot','mult'].forEach(id => $('#'+id).addEventListener('input', calculate));

$('#toolbar').innerHTML = `<button class="gz-btn" onclick="calculate()">${t('calculate')||'Calculate'}</button>`;

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'💰', href:'/calc/salary-to-hourly.html', name:'Salary to Hourly'},
    {icon:'🏦', href:'/calc/paycheck-calculator.html', name:'Paycheck Calculator'},
    {icon:'⏰', href:'/calc/overtime-calculator.html', name:'Overtime Calc'},
    {icon:'📊', href:'/calc/salary-calculator.html', name:'Salary Calculator'},
  ]
});

calculate();
</script>
<script src="/tools-result-rec.js?v=20260707v520" defer></script>
</body>
