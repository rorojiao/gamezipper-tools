<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"How is calories burned calculated?","acceptedAnswer":{"@type":"Answer","text":"We use the MET formula: Calories = MET × weight(kg) × duration(hours). MET (Metabolic Equivalent of Task) measures how much energy an activity uses compared to resting. Running has a high MET (~9.8), walking moderate (~3.5), watching TV lowest (~1)."}},{"@type":"Question","name":"What is a MET value?","acceptedAnswer":{"@type":"Answer","text":"MET (Metabolic Equivalent of Task) compares an activity's energy cost to sitting still. 1 MET ≈ 1 kcal/kg/hour. Activities are categorized: light (under 3 MET), moderate (3-6), vigorous (6+). Our database includes MET values for 50+ common activities."}},{"@type":"Question","name":"Why do my fitness tracker numbers differ?","acceptedAnswer":{"@type":"Answer","text":"Fitness trackers use heart rate, motion sensors, and proprietary algorithms — they often report 10-30% more or fewer calories than MET-based estimates. Both are estimates; treat any single number as a rough guide."}},{"@type":"Question","name":"Which activities burn the most calories per hour?","acceptedAnswer":{"@type":"Answer","text":"High-intensity activities like running (≈700-900 kcal/h), jumping rope (≈750), swimming laps (≈600-800), cycling fast (≈700), and HIIT (≈600-800) burn the most for most adults. Strength training burns fewer during the session but boosts metabolism afterward."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="cb-input">
      <label><span id="lbl-act"></span><select id="activity" onchange="calc()"></select></label>
      <label><span id="lbl-dur"></span><input type="number" id="duration" min="0" step="1" placeholder="60" oninput="calc()"></label>
      <label><span id="lbl-wt"></span><input type="number" id="weight" min="0" placeholder="70" oninput="calc()"></label>
    </div>
    <div id="result"></div>
  </div>

</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Calorie Burn Calculator',
    toolDesc: 'Estimate calories burned by activity using MET values and your body weight.',
    activity: 'Activity',
    duration: 'Duration (minutes)',
    weight: 'Weight (kg)',
    clear: 'Clear',
    burned: 'Calories Burned',
    kcal: 'kcal',
    perHour: 'per hour',
    perMinute: 'per minute',
    joules: 'Kilojoules',
    selectActivity: '— Select an activity —',
    step1: 'Pick an activity from the dropdown',
    step2: 'Enter how many minutes you exercised',
    step3: 'Enter your body weight in kilograms',
    step4: 'See total calories, kcal per hour, and per minute',
  },
  zh: {
    toolTitle: '热量消耗计算器',
    toolDesc: '使用 MET 值和体重估算各种运动消耗的热量。',
    activity: '运动项目',
    duration: '时长（分钟）',
    weight: '体重 (kg)',
    clear: '清空',
    burned: '消耗热量',
    kcal: '千卡',
    perHour: '每小时',
    perMinute: '每分钟',
    joules: '千焦',
    selectActivity: '— 选择运动 —',
    step1: '从下拉菜单选择运动项目',
    step2: '输入运动分钟数',
    step3: '输入体重（公斤）',
    step4: '查看总热量、每小时和每分钟消耗',
  }
});

const { $, t } = GZ;

// MET values (Compendium of Physical Activities, simplified)
const ACTIVITIES = [
  { met: 1.3, en: 'Watching TV',                    zh: '看电视' },
  { met: 2.0, en: 'Walking, slow (2 mph)',          zh: '慢走 (3.2 km/h)' },
  { met: 3.5, en: 'Walking, moderate (3.5 mph)',    zh: '中速走 (5.6 km/h)' },
  { met: 5.0, en: 'Walking, brisk (4 mph)',         zh: '快走 (6.4 km/h)' },
  { met: 8.0, en: 'Walking, uphill (3.5 mph)',      zh: '上坡走' },
  { met: 6.0, en: 'Hiking',                         zh: '徒步' },
  { met: 7.0, en: 'Jogging (5 mph)',                zh: '慢跑 (8 km/h)' },
  { met: 9.8, en: 'Running (6 mph / 10 km/h)',      zh: '跑步 (10 km/h)' },
  { met: 11.5,en: 'Running (7.5 mph / 12 km/h)',    zh: '快跑 (12 km/h)' },
  { met: 12.8,en: 'Running (8 mph / 13 km/h)',      zh: '冲刺跑 (13 km/h)' },
  { met: 7.5, en: 'Cycling, leisure (10 mph)',      zh: '休闲骑行 (16 km/h)' },
  { met: 10.0,en: 'Cycling, moderate (12-14 mph)',  zh: '中速骑行 (19-22 km/h)' },
  { met: 12.0,en: 'Cycling, fast (14-16 mph)',      zh: '快速骑行 (22-26 km/h)' },
  { met: 6.0, en: 'Swimming, leisurely',            zh: '休闲游泳' },
  { met: 8.0, en: 'Swimming, freestyle laps',       zh: '自由泳' },
  { met: 10.0,en: 'Swimming, fast laps',            zh: '快速游泳' },
  { met: 7.0, en: 'Yoga, Hatha',                    zh: '哈他瑜伽' },
  { met: 4.0, en: 'Yoga, gentle',                   zh: '轻柔瑜伽' },
  { met: 5.0, en: 'Pilates',                        zh: '普拉提' },
  { met: 6.0, en: 'Weightlifting, moderate',        zh: '中等强度力量训练' },
  { met: 3.5, en: 'Weightlifting, light',           zh: '轻度力量训练' },
  { met: 8.0, en: 'HIIT',                           zh: 'HIIT 高强度间歇' },
  { met: 5.0, en: 'Dancing, general',               zh: '一般跳舞' },
  { met: 7.3, en: 'Aerobics, high impact',          zh: '高强度有氧' },
  { met: 5.0, en: 'Aerobics, low impact',           zh: '低强度有氧' },
  { met: 7.0, en: 'Tennis, singles',                zh: '单打网球' },
  { met: 6.0, en: 'Tennis, doubles',                zh: '双打网球' },
  { met: 7.0, en: 'Basketball, game',               zh: '篮球比赛' },
  { met: 6.0, en: 'Basketball, shooting hoops',     zh: '篮球投篮' },
  { met: 7.0, en: 'Soccer, casual',                 zh: '休闲足球' },
  { met: 10.0,en: 'Soccer, competitive',            zh: '竞技足球' },
  { met: 6.0, en: 'Golf, carrying clubs',           zh: '高尔夫（自背球杆）' },
  { met: 4.8, en: 'Golf, cart',                     zh: '高尔夫（坐车）' },
  { met: 5.0, en: 'Stair climbing',                 zh: '爬楼梯' },
  { met: 8.8, en: 'Jumping rope, moderate',         zh: '中速跳绳' },
  { met: 12.3,en: 'Jumping rope, fast',             zh: '快速跳绳' },
  { met: 6.0, en: 'Rowing, moderate',               zh: '中等划船' },
  { met: 4.0, en: 'Stretching',                     zh: '拉伸' },
  { met: 5.5, en: 'Martial arts, moderate',         zh: '中等强度武术' },
  { met: 4.0, en: 'Tai Chi',                        zh: '太极' },
  { met: 6.0, en: 'Skateboarding',                  zh: '滑板' },
  { met: 7.0, en: 'Skiing, downhill',               zh: '高山滑雪' },
  { met: 5.0, en: 'House cleaning',                 zh: '家务打扫' },
  { met: 3.5, en: 'Cooking',                        zh: '做饭' },
  { met: 4.0, en: 'Gardening, general',             zh: '一般园艺' },
  { met: 8.0, en: 'Shoveling snow',                 zh: '铲雪' },
];

const lang = GZI18n.getLang();
$('#activity').innerHTML = `<option value="">${t('selectActivity')}</option>` +
  ACTIVITIES.map((a, i) => `<option value="${i}">${a[lang]||a.en} (MET ${a.met})</option>`).join('');

$('#lbl-act').textContent = t('activity');
$('#lbl-dur').textContent = t('duration');
$('#lbl-wt').textContent  = t('weight');

function calc() {
  const i = parseInt($('#activity').value, 10);
  const dur = parseFloat($('#duration').value) || 0;
  const wt  = parseFloat($('#weight').value) || 0;
  if (isNaN(i) || dur <= 0 || wt <= 0) { $('#result').innerHTML = ''; return; }
  const met = ACTIVITIES[i].met;
  const hours = dur / 60;
  const kcal = met * wt * hours;
  const perH = met * wt;
  const perM = perH / 60;
  const kj = kcal * 4.184;
  $('#result').innerHTML = `
    <div class="cb-big">
      <div class="v">${Math.round(kcal).toLocaleString()} <span style="font-size:.45em">${t('kcal')}</span></div>
      <div class="l">${t('burned')} · ${ACTIVITIES[i][lang]||ACTIVITIES[i].en}</div>
    </div>
    <div class="cb-grid">
      <div class="cb-card"><div class="v">${Math.round(perH)}</div><div class="l">${t('kcal')} · ${t('perHour')}</div></div>
      <div class="cb-card"><div class="v">${perM.toFixed(1)}</div><div class="l">${t('kcal')} · ${t('perMinute')}</div></div>
      <div class="cb-card"><div class="v">${Math.round(kj)}</div><div class="l">${t('joules')}</div></div>
      <div class="cb-card"><div class="v">${met}</div><div class="l">MET</div></div>
    </div>`;
}

function doClear() {
  $('#activity').value = '';
  $('#duration').value = '';
  $('#weight').value = '';
  $('#result').innerHTML = '';
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="calc()">${t('burned')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'❤️', href:'/calc/heart-rate-max-calculator.html', name:'Heart Rate Max'},
    {icon:'🔥', href:'/calc/bmr-calculator.html', name:'BMR'},
    {icon:'🚶', href:'/calc/steps-to-km-calculator.html', name:'Steps to KM'},
    {icon:'⚖️', href:'/calc/bmi-calculator.html', name:'BMI'},
  ]
});
</script>
<script src="/tools-result-rec.js?v=20260707v520" defer></script>
</body>
</html>
