<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"How does the visual memory test work?","acceptedAnswer":{"@type":"Answer","text":"A 3×3 grid of tiles lights up in a pattern. Memorize which tiles are lit, then click them to recreate the pattern. Each level adds more tiles. You have 3 lives."}},{"@type":"Question","name":"What is a good visual memory score?","acceptedAnswer":{"@type":"Answer","text":"Reaching level 7-9 is average. Level 10-12 is good. Beyond level 15 is exceptional. The grid grows as you progress, making higher levels much harder."}},{"@type":"Question","name":"How can I improve my visual memory?","acceptedAnswer":{"@type":"Answer","text":"Focus on the pattern as a shape rather than individual tiles. Look for lines, corners, and symmetry. Practice regularly and stay relaxed — stress impairs memory."}},{"@type":"Question","name":"What brain skills does this test?","acceptedAnswer":{"@type":"Answer","text":"Visual-spatial short-term memory, pattern recognition and working memory capacity. These skills are linked to navigation, design work and mathematical ability."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>

  </div>
  <div class="gz-tool-area">

<script>
GZI18n.register({
  en: {
    toolTitle: 'Visual Memory Test',
    toolDesc: 'Tiles light up on a grid — memorize the pattern, then click the lit tiles to recreate it. Each level adds more tiles. Average is level 7. 3 lives.',
    start: 'Click to start', memorize: 'Memorize the pattern', yourTurn: 'Click the lit tiles',
    level: 'Level', tiles: 'Tiles', lives: 'Lives', best: 'Best', restart: 'Restart',
    correct: '✓ Correct!', wrong: '✗ Wrong tile!', gameOver: 'Game Over',
    tip: 'Memorize the lit tiles, then click them. 3 lives. Grid grows each level.',
    step1: 'Click the stage to start. Watch the grid carefully',
    step2: 'Tiles light up one by one — memorize which ones',
    step3: 'When prompted, click all the tiles that were lit',
    step4: 'Each correct level adds tiles. Three mistakes end the game',
  },
  zh: {
    toolTitle: '视觉记忆测试',
    toolDesc: '网格上的方块会亮起 — 记住亮起的位置，然后点击它们重现图案。每关增加更多方块。平均水平为第 7 关。3 条命。',
    start: '点击开始', memorize: '记住图案', yourTurn: '点击亮过的方块',
    level: '关卡', tiles: '方块', lives: '生命', best: '最佳', restart: '重新开始',
    correct: '✓ 正确！', wrong: '✗ 错误！', gameOver: '游戏结束',
    tip: '记住亮起的方块，然后点击它们。3 条命。网格随关卡增大。',
    step1: '点击区域开始。仔细观察网格',
    step2: '方块逐一亮起 — 记住哪些亮了',
    step3: '出现提示时，点击所有亮过的方块',
    step4: '每过一关增加方块。答错 3 次游戏结束',
  }
});

const { $, t } = GZ;
let level = 1;
let lives = 3;
let best = 0;
let gridSize = 3;
let litCells = [];
let clickedCells = new Set();
let phase = 'idle';
let gridEl = null;

function getGridSize(lvl) {
  if (lvl <= 4) return 3;
  if (lvl <= 9) return 4;
  if (lvl <= 16) return 5;
  return 6;
}

function getNumTiles(lvl) {
  // humanbenchmark formula: 3 + level, capped by grid capacity
  const n = 3 + lvl;
  const cap = Math.floor(getGridSize(lvl) * getGridSize(lvl) * 0.6);
  return Math.min(n, cap);
}

function buildGrid() {
  gridSize = getGridSize(level);
  const total = gridSize * gridSize;
  const numTiles = getNumTiles(level);
  litCells = [];
  while (litCells.length < numTiles) {
    const idx = Math.floor(Math.random() * total);
    if (!litCells.includes(idx)) litCells.push(idx);
  }
  clickedCells = new Set();
  renderGrid(true); // not interactive during show
}

function renderGrid(interactive) {
  const stage = $('#stage');
  const tileW = gridSize <= 3 ? 60 : gridSize <= 4 ? 52 : gridSize <= 5 ? 44 : 38;
  stage.innerHTML = `
    <span class="lvl-badge">${t('level')} ${level}</span>
    <div class="status" id="gridStatus">${interactive ? t('yourTurn') : t('memorize')}</div>
    <div class="grid" id="vGrid" style="grid-template-columns:repeat(${gridSize},${tileW}px)"></div>`;
  gridEl = $('#vGrid');
  for (let i = 0; i < gridSize * gridSize; i++) {
    const tile = document.createElement('div');
    tile.className = 'tile' + (interactive ? ' clickable' : ' disabled');
    tile.dataset.idx = i;
    if (interactive) tile.onclick = () => onTileClick(i, tile);
    gridEl.appendChild(tile);
  }
}

function showPattern() {
  phase = 'showing';
  buildGrid();
  // light up tiles sequentially
  litCells.forEach((idx, i) => {
    setTimeout(() => {
      const tile = gridEl.children[idx];
      tile.classList.add('lit');
      setTimeout(() => tile.classList.remove('lit'), 500);
    }, i * 700);
  });
  // switch to input mode after all tiles shown
  const totalTime = litCells.length * 700 + 600;
  setTimeout(() => {
    if (phase === 'showing') startInput();
  }, totalTime);
}

function startInput() {
  phase = 'input';
  renderGrid(true);
}

function onTileClick(idx, tile) {
  if (phase !== 'input') return;
  if (clickedCells.has(idx)) return;
  clickedCells.add(idx);

  if (litCells.includes(idx)) {
    tile.classList.add('correct');
    // check if all found
    const found = [...clickedCells].filter(c => litCells.includes(c));
    if (found.length === litCells.length) {
      phase = 'done';
      level++;
      if (level - 1 > best) best = level - 1;
      $('#gridStatus').textContent = t('correct');
      renderStats();
      setTimeout(showPattern, 1200);
    }
  } else {
    tile.classList.add('wrong');
    // show all correct ones
    litCells.forEach(li => { if (gridEl.children[li]) gridEl.children[li].classList.add('correct'); });
    lives--;
    renderStats();
    if (lives <= 0) {
      gameOver();
    } else {
      $('#gridStatus').textContent = t('wrong');
      phase = 'done';
      setTimeout(showPattern, 1500);
    }
  }
}

function gameOver() {
  phase = 'idle';
  const stage = $('#stage');
  stage.innerHTML = `
    <div style="font-size:2em;font-weight:900;color:#e94560">${t('gameOver')}</div>
    <div style="font-size:1.4em;margin:12px 0">${t('level')}: <b style="color:var(--gz-accent)">${level - 1}</b></div>
    <button class="gz-btn" onclick="restart()" style="font-size:1.2em;padding:12px 28px">🔄 ${t('restart')}</button>`;
}

function restart() {
  level = 1; lives = 3;
  renderStats();
  showPattern();
}

function renderStats() {
  $('#stats').innerHTML = `
    <div class="stat"><div class="num">${level}</div><div class="lbl">${t('level')}</div></div>
    <div class="stat"><div class="num">${litCells.length}</div><div class="lbl">${t('tiles')}</div></div>
    <div class="stat"><div class="num lives">${'❤'.repeat(Math.max(0,lives))}${'🖤'.repeat(3-Math.max(0,lives))}</div><div class="lbl">${t('lives')}</div></div>
    <div class="stat"><div class="num">${best}</div><div class="lbl">${t('best')}</div></div>`;
}

function init() {
  phase = 'idle';
  $('#stage').className = 'stage';
  $('#stage').innerHTML = `<div style="font-size:1.6em;font-weight:700;color:var(--text2)">${t('start')}</div>`;
  $('#stats').innerHTML = '';
}

$('#stage').addEventListener('click', (e) => {
  if (phase === 'idle' && !e.target.classList.contains('tile')) restart();
});
$('#toolbar').innerHTML = `<button class="gz-btn" onclick="init()">🔄 ${t('restart')}</button>`;

GZ.renderToolPage({
  related: [
    {icon:'🔢', href:'/fun/number-memory-test.html', name:'Number Memory Test'},
    {icon:'⚡', href:'/fun/reaction-time.html', name:'Reaction Time Test'},
    {icon:'🐵', href:'/fun/chimp-test.html', name:'Chimp Test'},
  ]
});
init();
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
