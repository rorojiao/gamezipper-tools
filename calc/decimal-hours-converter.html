<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"What is a decimal hour?","acceptedAnswer":{"@type":"Answer","text":"A decimal hour is the total hours expressed as a single decimal number. For example, 8 hours 30 minutes = 8.5 decimal hours, and 7 hours 15 minutes = 7.25 decimal hours."}},{"@type":"Question","name":"How do I convert 8:30 to decimal hours?","acceptedAnswer":{"@type":"Answer","text":"Divide the minutes by 60 and add to the hours. So 8 hours 30 minutes = 8 + (30 ÷ 60) = 8.5 decimal hours."}},{"@type":"Question","name":"How do I convert 0.25 to hours and minutes?","acceptedAnswer":{"@type":"Answer","text":"Multiply 0.25 by 60 to get 15 minutes. So 0.25 decimal hours = 15 minutes. Combined with the whole hour part: 0.25 = 0 hours 15 minutes."}},{"@type":"Question","name":"What is 7 hours 45 minutes as a decimal?","acceptedAnswer":{"@type":"Answer","text":"7 hours 45 minutes = 7 + (45 ÷ 60) = 7.75 decimal hours. This is the standard format used by payroll, invoicing and Excel time-tracking sheets."}}]}</script>

  <div class="gz-tool-area">
    <div class="tabs" id="tabs">
      <div class="tab active" data-mode="toDec" id="tab-toDec">→ <span data-i18n="toDec"></span></div>

        <div><label id="lbl-m"></label><input type="number" id="mm" class="gz-input" value="30" min="0" max="59" step="1"></div>

          <textarea id="batchIn" placeholder="8:30&#10;7:45&#10;9:15&#10;6:00"></textarea>
        </div>
      </div>

      <div class="batch-out" id="batchOut"></div>
    </div>
    <div class="result-card" id="result"></div>
    <div class="summary-grid" id="summary"></div>

<script>
GZI18n.register({
  en: {
    toolTitle: 'Decimal Hours Converter',
    toolDesc: 'Convert hours and minutes (HH:MM:SS) to decimal hours and back. Includes batch conversion for timesheets and payroll. 100% browser-only.',
    toDec: 'HH:MM:SS → Decimal', toHms: 'Decimal → HH:MM:SS', batch: 'Batch convert',
    lblH: 'Hours', lblM: 'Minutes', lblS: 'Seconds',
    lblDec: 'Decimal hours (e.g. 8.5)',
    lblBatchIn: 'Paste HH:MM lines (one per row)',
    convert: 'Convert',
    headline: 'Result',
    formulaText: 'Decimal hours = Hours + (Minutes ÷ 60) + (Seconds ÷ 3600)',
    formulaText2: 'Hours = floor(decimal); Minutes = round((decimal - Hours) × 60); Seconds = ((decimal - Hours) × 60 - Minutes) × 60',
    step1: 'Enter hours, minutes, seconds (or a decimal)',
    step2: 'Click Convert to see the result in the other format',
    step3: 'Use Batch mode to convert a list at once',
    step4: 'Copy the result for your timesheet, invoice or payroll',
    tableH1: 'HH:MM:SS', tableH2: 'Decimal hours', tableH3: 'In minutes',
  },
  zh: {
    toolTitle: '十进制小时转换器',
    toolDesc: '将小时:分钟:秒 转换为十进制小时，反之亦然。含批量转换模式，适合考勤表和工资单。100% 浏览器本地运行。',
    toDec: 'HH:MM:SS → 十进制', toHms: '十进制 → HH:MM:SS', batch: '批量转换',
    lblH: '小时', lblM: '分钟', lblS: '秒',
    lblDec: '十进制小时（如 8.5）',
    lblBatchIn: '粘贴 HH:MM 行（每行一条）',
    convert: '转换',
    headline: '结果',
    formulaText: '十进制小时 = 小时 + (分钟 ÷ 60) + (秒 ÷ 3600)',
    formulaText2: '小时 = floor(十进制); 分钟 = round((十进制 - 小时) × 60); 秒 = ((十进制 - 小时) × 60 - 分钟) × 60',
    step1: '输入小时、分钟、秒（或十进制）',
    step2: '点击「转换」查看另一种格式',
    step3: '使用「批量」模式一次转换多行',
    step4: '复制结果用于考勤表、发票或工资单',
    tableH1: 'HH:MM:SS', tableH2: '十进制小时', tableH3: '总分钟',
  }
});

const { $, t } = GZ;

function toDecimal(h, m, s) {
  return h + m / 60 + s / 3600;
}

function fromDecimal(d) {
  const h = Math.floor(d);
  const mFloat = (d - h) * 60;
  const m = Math.floor(mFloat);
  const s = Math.round((mFloat - m) * 60);
  return { h, m, s };
}

function doToDec() {
  const h = parseInt($('#hh').value) || 0;
  const m = parseInt($('#mm').value) || 0;
  const s = parseInt($('#ss').value) || 0;
  const dec = toDecimal(h, m, s);
  const minutes = dec * 60;
  $('#result').innerHTML = `<div class="big">${dec.toFixed(4)} h</div><div style="margin-top:6px">${h}h ${m}m ${s}s</div>`;
  $('#summary').innerHTML = `
    <div class="summary-cell"><div class="lbl">Decimal</div><div class="val">${dec.toFixed(4)}</div></div>
    <div class="summary-cell"><div class="lbl">Minutes</div><div class="val">${minutes.toFixed(2)}</div></div>
    <div class="summary-cell"><div class="lbl">Seconds</div><div class="val">${(dec*3600).toFixed(1)}</div></div>
    <div class="summary-cell"><div class="lbl">As 8h day %</div><div class="val">${(dec/8*100).toFixed(1)}%</div></div>
  `;
  $('#formula').innerHTML = `<strong>${t('headline')}:</strong> ${t('formulaText')}`;
  $('#tableWrap').innerHTML = '';
}

function doToHms() {
  const dec = parseFloat($('#dec').value) || 0;
  const r = fromDecimal(dec);
  const pad = n => String(n).padStart(2, '0');
  const hms = `${r.h}:${pad(r.m)}:${pad(r.s)}`;
  $('#result').innerHTML = `<div class="big">${hms}</div><div style="margin-top:6px">${dec} decimal hours</div>`;
  $('#summary').innerHTML = `
    <div class="summary-cell"><div class="lbl">HH</div><div class="val">${r.h}</div></div>
    <div class="summary-cell"><div class="lbl">MM</div><div class="val">${r.m}</div></div>
    <div class="summary-cell"><div class="lbl">SS</div><div class="val">${r.s}</div></div>
    <div class="summary-cell"><div class="lbl">Total min</div><div class="val">${(dec*60).toFixed(2)}</div></div>
  `;
  $('#formula').innerHTML = `<strong>${t('headline')}:</strong> ${t('formulaText2')}`;
  $('#tableWrap').innerHTML = '';
}

function doBatch() {
  const lines = $('#batchIn').value.split('\n').map(s => s.trim()).filter(Boolean);
  const out = [];
  const rows = [];
  for (const line of lines) {
    const m = line.match(/^(\d+):(\d{1,2})(?::(\d{1,2}))?$/);
    if (!m) { out.push(`${line}\t— invalid`); rows.push(null); continue; }
    const h = +m[1], mn = +m[2], s = +(m[3] || 0);
    const dec = toDecimal(h, mn, s);
    out.push(`${line}\t${dec.toFixed(4)} h\t(${dec.toFixed(2)} h)`);
    rows.push({ line, h, m: mn, s, dec });
  }
  $('#batchOut').textContent = out.join('\n');
  // Total
  const total = rows.filter(Boolean).reduce((sum, r) => sum + r.dec, 0);
  $('#result').innerHTML = `<div class="big">${total.toFixed(2)} h</div><div style="margin-top:6px">${rows.filter(Boolean).length} entries</div>`;
  $('#summary').innerHTML = `
    <div class="summary-cell"><div class="lbl">Total h</div><div class="val">${total.toFixed(2)}</div></div>
    <div class="summary-cell"><div class="lbl">Avg h</div><div class="val">${(total / (rows.filter(Boolean).length || 1)).toFixed(2)}</div></div>
    <div class="summary-cell"><div class="lbl">Min h</div><div class="val">${Math.min(...rows.filter(Boolean).map(r => r.dec)).toFixed(2)}</div></div>
    <div class="summary-cell"><div class="lbl">Max h</div><div class="val">${Math.max(...rows.filter(Boolean).map(r => r.dec)).toFixed(2)}</div></div>
  `;
  $('#formula').innerHTML = `<strong>${t('headline')}:</strong> ${t('formulaText')}`;
  // Build table
  const tableRows = rows.filter(Boolean).map(r => `<tr><td>${r.line}</td><td>${r.dec.toFixed(4)} h</td><td>${(r.dec*60).toFixed(1)} min</td></tr>`).join('');
  $('#tableWrap').innerHTML = `<table class="decimal-tbl"><thead><tr><th>${t('tableH1')}</th><th>${t('tableH2')}</th><th>${t('tableH3')}</th></tr></thead><tbody>${tableRows}</tbody></table>`;
}

$('#tabs').addEventListener('click', e => {
  const tab = e.target.closest('.tab');
  if (!tab) return;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t === tab));
  const mode = tab.dataset.mode;
  $('#mode-toDec').style.display = mode === 'toDec' ? '' : 'none';
  $('#mode-toHms').style.display = mode === 'toHms' ? '' : 'none';
  $('#mode-batch').style.display = mode === 'batch' ? '' : 'none';
});

$('#btn-toDec').addEventListener('click', doToDec);
$('#btn-toHms').addEventListener('click', doToHms);
$('#btn-batch').addEventListener('click', doBatch);

doToDec();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle', descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'⏱️', href:'/calc/timer-stopwatch.html', name:'Timer / Stopwatch'},
    {icon:'🕒', href:'/calc/time-card-calculator.html', name:'Time Card'},
    {icon:'🍅', href:'/text/pomodoro-timer.html', name:'Pomodoro'},
    {icon:'⏰', href:'/calc/work-hours-calculator.html', name:'Work Hours'},
  ]
});
</script>
<script src="/tools-result-rec.js?v=20260707v520" defer></script>
</body>
</html>
