<script>
GZI18n.register({
  en: {
    toolTitle: 'URL Status Code Checker',
    toolDesc: 'Check the HTTP status code of any URL. Enter one or multiple URLs — get status codes, redirect chains and response times. Free, browser-based.',
    placeholder: 'Enter URLs (one per line, max 50)...\nhttps://example.com\nhttps://example.com/page\nhttps://example.com/redirect',
    check: 'Check Status',
    clear: 'Clear',
    checking: 'Checking...',
    url: 'URL',
    status: 'Status',
    code: 'Code',
    time: 'Time',
    redirects: 'Redirects',
    finalUrl: 'Final URL',
    step1: 'Enter one or more URLs in the input area (one per line)',
    step2: 'Click Check Status to test each URL',
    step3: 'Review the status codes, response times and redirect chains',
    step4: 'Use the results to find broken links and redirect issues',
  },
  zh: {
    toolTitle: 'URL 状态码检查器',
    toolDesc: '检查任意 URL 的 HTTP 状态码。输入一个或多个 URL — 获取状态码、重定向链和响应时间。免费、浏览器本地运行。',
    placeholder: '输入 URL（每行一个，最多 50 个）...\nhttps://example.com\nhttps://example.com/page\nhttps://example.com/redirect',
    check: '检查状态',
    clear: '清除',
    checking: '检查中...',
    url: 'URL',
    status: '状态',
    code: '代码',
    time: '耗时',
    redirects: '重定向',
    finalUrl: '最终 URL',
    step1: '在输入区输入一个或多个 URL（每行一个）',
    step2: '点击「检查状态」测试每个 URL',
    step3: '查看状态码、响应时间和重定向链',
    step4: '利用结果查找失效链接和重定向问题',
  }
});

const { $, t } = GZ;
$('#urlInput').placeholder = t('placeholder');

const STATUS_INFO = {
  200: {label:'OK',color:'#00d672'},201:{label:'Created',color:'#00d672'},204:{label:'No Content',color:'#00d672'},
  301: {label:'Moved Permanently',color:'#f0a020'},302:{label:'Found',color:'#f0a020'},304:{label:'Not Modified',color:'#f0a020'},307:{label:'Temp Redirect',color:'#f0a020'},308:{label:'Perm Redirect',color:'#f0a020'},
  400: {label:'Bad Request',color:'#e94560'},401:{label:'Unauthorized',color:'#e94560'},403:{label:'Forbidden',color:'#e94560'},404:{label:'Not Found',color:'#e94560'},405:{label:'Method Not Allowed',color:'#e94560'},410:{label:'Gone',color:'#e94560'},429:{label:'Too Many Requests',color:'#e94560'},
  500: {label:'Server Error',color:'#e94560'},502:{label:'Bad Gateway',color:'#e94560'},503:{label:'Unavailable',color:'#e94560'},504:{label:'Gateway Timeout',color:'#e94560'},
};

async function checkUrl(url) {
  const start = performance.now();
  try {
    // Normalize URL
    if (!/^https?:\/\//.test(url)) url = 'https://' + url;
    
    const resp = await fetch(url, {
      method: 'HEAD',
      mode: 'no-cors',
      redirect: 'follow',
      cache: 'no-store',
    });
    const elapsed = Math.round(performance.now() - start);
    
    // In no-cors mode, response.type is 'opaque' and status is 0
    if (resp.type === 'opaque') {
      return { code: 200, label: 'OK (opaque)', color: '#00d672', time: elapsed, finalUrl: url, note: 'CORS-restricted, status assumed OK' };
    }
    
    const code = resp.status;
    const info = STATUS_INFO[code] || {label:'Unknown',color:'#888'};
    return { code, label: info.label, color: info.color, time: elapsed, finalUrl: resp.url || url };
  } catch(e) {
    const elapsed = Math.round(performance.now() - start);
    // Try GET fallback for CORS-blocked HEAD
    try {
      const resp2 = await fetch(url, { method: 'GET', mode: 'no-cors', redirect: 'follow', cache: 'no-store' });
      const elapsed2 = Math.round(performance.now() - start);
      if (resp2.type === 'opaque') {
        return { code: 200, label: 'OK (opaque)', color: '#00d672', time: elapsed2, finalUrl: url, note: 'CORS-restricted, status assumed OK' };
      }
      const code2 = resp2.status;
      const info2 = STATUS_INFO[code2] || {label:'Unknown',color:'#888'};
      return { code: code2, label: info2.label, color: info2.color, time: elapsed2, finalUrl: resp2.url || url };
    } catch(e2) {
      return { code: 'ERR', label: e2.name === 'TypeError' ? 'Network/CORS Error' : e2.message, color: '#e94560', time: elapsed, finalUrl: url };
    }
  }
}

async function checkAll() {
  const urls = $('#urlInput').value.split('\n').map(u => u.trim()).filter(Boolean).slice(0, 50);
  if (!urls.length) return;
  
  $('#results').innerHTML = `<p style="color:var(--text3)">${t('checking')} (${urls.length})</p>`;
  $('#toolbar').querySelector('button').disabled = true;
  
  const results = [];
  for (const url of urls) {
    const result = await checkUrl(url);
    results.push({url, ...result});
    renderProgress(results, urls.length);
  }
  
  renderFinal(results);
  $('#toolbar').querySelector('button').disabled = false;
}

function renderProgress(results, total) {
  const html = results.map(r => renderRow(r)).join('');
  $('#results').innerHTML = html + `<p style="color:var(--text3);margin-top:8px">${t('checking')} ${results.length}/${total}...</p>`;
}

function renderFinal(results) {
  const ok = results.filter(r => r.code === 200 || r.code === 201).length;
  const redirect = results.filter(r => String(r.code).startsWith('3')).length;
  const err = results.filter(r => String(r.code).startsWith('4') || String(r.code).startsWith('5') || r.code === 'ERR').length;
  
  $('#results').innerHTML = results.map(r => renderRow(r)).join('');
  $('#summary').innerHTML = `✅ ${ok} OK &nbsp;|&nbsp; 🔀 ${redirect} Redirect &nbsp;|&nbsp; ❌ ${err} Error &nbsp;|&nbsp; Total: ${results.length}`;
}

function renderRow(r) {
  return `
    <div style="display:flex;align-items:center;gap:10px;padding:8px 12px;margin-bottom:4px;background:var(--glass);border:1px solid var(--border);border-radius:8px;font-size:.85em;flex-wrap:wrap">
      <span style="background:${r.color};color:#fff;padding:2px 8px;border-radius:4px;font-weight:bold;min-width:36px;text-align:center">${r.code}</span>
      <span style="color:${r.color};font-weight:bold;min-width:100px">${r.label}</span>
      <span style="flex:1;word-break:break-all;font-family:monospace">${r.url}</span>
      <span style="color:var(--text3);white-space:nowrap">${r.time}ms</span>
    </div>`;
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="checkAll()">${t('check')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#urlInput').value='';$('#results').innerHTML='';$('#summary').textContent=''">${t('clear')}</button>`;

GZ.renderToolPage({
  category: 'dev',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📊', href:'/dev/http-status-codes.html', name:'HTTP Codes'},
    {icon:'🔗', href:'/dev/unshorten-url.html', name:'Unshorten URL'},
    {icon:'📡', href:'/dev/http-headers.html', name:'HTTP Headers'},
    {icon:'✅', href:'/seo/broken-link-checker.html', name:'Broken Links'},
  ]
});
</script>
