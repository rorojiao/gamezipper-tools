<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"What is simple interest?","acceptedAnswer":{"@type":"Answer","text":"Simple interest is a method of calculating interest where interest is earned only on the original principal amount. The formula is SI = P × R × T / 100."}},{"@type":"Question","name":"What is the simple interest formula?","acceptedAnswer":{"@type":"Answer","text":"The simple interest formula is SI = P × R × T / 100, where P is the principal, R is the annual interest rate (%), and T is the time in years."}},{"@type":"Question","name":"How is simple interest different from compound interest?","acceptedAnswer":{"@type":"Answer","text":"Simple interest is calculated only on the principal, while compound interest is calculated on the principal plus previously earned interest. Compound interest grows faster over time."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-form" id="form">
      <div class="form-row">
        <div>
          <label id="lbl-principal"></label>
          <input type="number" id="principal" value="10000" min="0" step="100">
        </div>
        <div>
          <label id="lbl-rate"></label>
          <input type="number" id="rate" value="5" min="0" max="100" step="0.1">
        </div>
      </div>
      <div class="form-row">
        <div>
          <label id="lbl-years"></label>
          <input type="number" id="years" value="5" min="1" max="100" step="1">
        </div>
        <div></div>
      </div>
      <button class="gz-btn" onclick="calculate()" id="btn-calc"></button>
    </div>
    <div class="result-card" id="result" style="display:none">
      <div class="big" id="result-final"></div>
      <div class="label" id="result-final-label"></div>
      <div class="result-grid">
        <div class="result-item"><div class="val" id="result-interest"></div><div class="lbl" id="result-interest-label"></div></div>
        <div class="result-item"><div class="val" id="result-principal"></div><div class="lbl" id="result-principal-label"></div></div>
        <div class="result-item"><div class="val" id="result-rate"></div><div class="lbl" id="result-rate-label"></div></div>
      </div>
      <div class="step-solution" id="step-solution"></div>
      <div class="chart-wrap"><canvas id="chart" width="600" height="240"></canvas></div>
    </div>
    <div id="status"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Simple Interest Calculator',
    toolDesc: 'Calculate simple interest instantly with SI = P × R × T / 100. Get interest earned, total amount, growth chart and step-by-step solution.',
    principal: 'Principal Amount',
    rate: 'Annual Interest Rate (%)',
    years: 'Time Period (Years)',
    calculate: 'Calculate',
    finalValue: 'Total Amount (Principal + Interest)',
    totalInterest: 'Simple Interest',
    principalLabel: 'Principal',
    rateUsed: 'Annual Rate',
    step1: 'Enter the principal amount (the initial sum of money)',
    step2: 'Input the annual interest rate as a percentage',
    step3: 'Specify the time period in years',
    step4: 'Click Calculate to see interest, total amount, and growth chart',
  },
  zh: {
    toolTitle: '单利计算器',
    toolDesc: '使用 SI = P × R × T / 100 公式即时计算单利。获取利息、总额、增长图表和分步解答。',
    principal: '本金金额',
    rate: '年化利率 (%)',
    years: '期限（年）',
    calculate: '计算',
    finalValue: '总额（本金+利息）',
    totalInterest: '单利利息',
    principalLabel: '本金',
    rateUsed: '年化利率',
    step1: '输入本金金额（初始资金）',
    step2: '输入年化利率（百分比）',
    step3: '输入投资期限（年）',
    step4: '点击计算查看利息、总额和增长图表',
  }
});

const { $, t } = GZ;

$('#lbl-principal').textContent = t('principal');
$('#lbl-rate').textContent = t('rate');
$('#lbl-years').textContent = t('years');
$('#btn-calc').textContent = t('calculate');

function fmt(n) {
  return n.toLocaleString(GZ.lang === 'zh' ? 'zh-CN' : 'en-US', { maximumFractionDigits: 2 });
}

function calculate() {
  var P = parseFloat($('#principal').value) || 0;
  var R = parseFloat($('#rate').value) || 0;
  var T = parseInt($('#years').value) || 1;

  if (P < 0 || T < 1) { $('#status').innerHTML = '<span style="color:var(--accent)">' + (GZ.lang === 'zh' ? '请输入有效参数' : 'Please enter valid inputs') + '</span>'; return; }

  var SI = P * R * T / 100;
  var total = P + SI;

  $('#result-final').textContent = fmt(total);
  $('#result-final-label').textContent = t('finalValue');
  $('#result-interest').textContent = fmt(SI);
  $('#result-interest-label').textContent = t('totalInterest');
  $('#result-principal').textContent = fmt(P);
  $('#result-principal-label').textContent = t('principalLabel');
  $('#result-rate').textContent = R.toFixed(1) + '%';
  $('#result-rate-label').textContent = t('rateUsed');

  // Step-by-step solution
  var stepHtml = GZ.lang === 'zh'
    ? '<b>计算过程：</b><br>SI = P × R × T / 100<br>SI = ' + fmt(P) + ' × ' + R + ' × ' + T + ' / 100<br>SI = ' + fmt(SI) + '<br><br><b>总额</b> = P + SI = ' + fmt(P) + ' + ' + fmt(SI) + ' = ' + fmt(total)
    : '<b>Solution:</b><br>SI = P × R × T / 100<br>SI = ' + fmt(P) + ' × ' + R + ' × ' + T + ' / 100<br>SI = ' + fmt(SI) + '<br><br><b>Total Amount</b> = P + SI = ' + fmt(P) + ' + ' + fmt(SI) + ' = ' + fmt(total);
  $('#step-solution').innerHTML = stepHtml;

  $('#result').style.display = 'block';
  $('#status').innerHTML = '';

  drawChart(P, SI, T);
}

function drawChart(P, SI, years) {
  var canvas = $('#chart');
  var dpr = window.devicePixelRatio || 1;
  var W = canvas.clientWidth, H = 240;
  canvas.width = W * dpr; canvas.height = H * dpr;
  var ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  ctx.clearRect(0, 0, W, H);

  var padL = 50, padR = 12, padT = 12, padB = 28;
  var cw = W - padL - padR, ch = H - padT - padB;

  var maxVal = P + SI;
  if (maxVal <= 0) maxVal = 1;

  // Grid lines
  ctx.strokeStyle = 'rgba(128,128,128,0.15)';
  ctx.font = '10px sans-serif';
  ctx.textAlign = 'right';
  for (var g = 0; g <= 4; g++) {
    var y = padT + (ch * g / 4);
    ctx.beginPath();
    ctx.moveTo(padL, y); ctx.lineTo(W - padR, y);
    ctx.stroke();
    var v = maxVal * (1 - g/4);
    ctx.fillText(fmtShort(v), padL - 6, y + 3);
  }

  // Principal area (bottom)
  ctx.fillStyle = 'rgba(0,198,251,0.18)';
  ctx.beginPath();
  ctx.moveTo(padL, padT + ch);
  ctx.lineTo(padL + cw, padT + ch - (P / maxVal) * ch);
  ctx.lineTo(padL + cw, padT + ch);
  ctx.closePath();
  ctx.fill();

  // Interest area (top of principal)
  ctx.fillStyle = 'rgba(255,107,107,0.25)';
  ctx.beginPath();
  ctx.moveTo(padL, padT + ch - (P / maxVal) * ch);
  ctx.lineTo(padL + cw, padT + ch - (P / maxVal) * ch);
  ctx.lineTo(padL + cw, padT + ch - ((P + SI) / maxVal) * ch);
  ctx.lineTo(padL, padT + ch - ((P + SI) / maxVal) * ch);
  ctx.closePath();
  ctx.fill();

  // Total line
  ctx.strokeStyle = '#00c6fb';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(padL, padT + ch - (P / maxVal) * ch);
  ctx.lineTo(padL + cw, padT + ch - ((P + SI) / maxVal) * ch);
  ctx.stroke();

  // Legend
  ctx.font = '11px sans-serif';
  ctx.textAlign = 'left';
  ctx.fillStyle = 'rgba(0,198,251,0.6)';
  ctx.fillRect(padL + 8, padT + 4, 10, 10);
  ctx.fillStyle = 'var(--text2)';
  ctx.fillText(GZ.lang === 'zh' ? '本金' : 'Principal', padL + 22, padT + 13);
  ctx.fillStyle = 'rgba(255,107,107,0.6)';
  ctx.fillRect(padL + 108, padT + 4, 10, 10);
  ctx.fillStyle = 'var(--text2)';
  ctx.fillText(GZ.lang === 'zh' ? '利息' : 'Interest', padL + 122, padT + 13);

  // X axis labels
  ctx.fillStyle = 'rgba(128,128,128,0.7)';
  ctx.textAlign = 'center';
  var xSteps = Math.min(5, years);
  for (var xi = 0; xi <= xSteps; xi++) {
    var yr = Math.round(years * xi / xSteps);
    var x = padL + (yr / years) * cw;
    ctx.fillText(yr + 'y', x, H - 8);
  }
}

function fmtShort(v) {
  if (v >= 1e6) return (v/1e6).toFixed(1) + 'M';
  if (v >= 1e3) return (v/1e3).toFixed(0) + 'K';
  return Math.round(v).toString();
}

['principal','rate','years'].forEach(function(id) {
  $('#' + id).addEventListener('input', calculate);
  $('#' + id).addEventListener('change', calculate);
});

calculate();
window.addEventListener('resize', calculate);

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📈', href:'/calc/compound-interest-calculator.html', name:'Compound Interest'},
    {icon:'🏠', href:'/calc/mortgage-calculator.html', name:'Mortgage Calculator'},
    {icon:'⛽', href:'/calc/fuel-cost-calculator.html', name:'Fuel Cost'},
    {icon:'📅', href:'/calc/date-calculator.html', name:'Date Calculator'},
  ]
});
</script>
<script src="/tools-result-rec.js?v=20260709v520" defer></script>
</body>
</html>
