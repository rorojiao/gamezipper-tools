<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What are CSS vendor prefixes?", "acceptedAnswer": {"@type": "Answer", "text": "Vendor prefixes are browser-specific prefixes added to experimental or non-standard CSS properties: -webkit- (Chrome, Safari, Edge), -moz- (Firefox), -ms- (Internet Explorer), -o- (old Opera). They allow browsers to ship features before they are fully standardized."}}, {"@type": "Question", "name": "Which CSS properties need prefixes?", "acceptedAnswer": {"@type": "Answer", "text": "Common properties that still benefit from prefixes include user-select, appearance, backdrop-filter, clip-path, scrollbar styles, hyphens, tab-size and certain flexbox/grid properties in older browsers. The prefixer detects these and adds the correct prefixes automatically."}}, {"@type": "Question", "name": "Is autoprefixer better?", "acceptedAnswer": {"@type": "Answer", "text": "Build-tool autoprefixers (PostCSS, Autoprefixer npm package) are more accurate because they use the caniuse database to add only the prefixes needed for your target browsers. This online tool is great for quick one-off CSS without a build step."}}, {"@type": "Question", "name": "Does this tool upload my CSS?", "acceptedAnswer": {"@type": "Answer", "text": "No. All CSS processing happens entirely in your browser. Your code never leaves your device — nothing is sent to any server."}}]}</script>

<div class="gz-container">

      <div><label id="lbl-out"></label><div class="gz-output" id="output"></div></div>

  </div>

</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'CSS Prefixer (Vendor Prefix Adder)',
    toolDesc: 'Automatically add -webkit, -moz, -ms and -o vendor prefixes to your CSS. Paste raw CSS — get cross-browser output instantly.',
    processed: 'CSS processed — {n} prefixes added',
    noChange: 'No prefixes needed',
    step1: 'Paste your CSS into the input area',
    step2: 'Click Process to add vendor prefixes',
    step3: 'Review the prefixed output on the right',
    step4: 'Click Copy to copy the result',
  },
  zh: {
    toolTitle: 'CSS 前缀添加器',
    toolDesc: '自动为你的 CSS 添加 -webkit、-moz、-ms 和 -o 浏览器前缀。粘贴原始 CSS — 即时获得跨浏览器兼容的输出。',
    processed: 'CSS 已处理 — 添加了 {n} 个前缀',
    noChange: '无需添加前缀',
    step1: '将 CSS 粘贴到输入区',
    step2: '点击「处理」添加浏览器前缀',
    step3: '在右侧查看添加前缀后的输出',
    step4: '点击「复制」复制结果',
  }
});

const { $, copyText, t } = GZ;

// Properties that need vendor prefixes
const PREFIX_MAP = {
  'user-select': ['-webkit-', '-moz-', '-ms-'],
  'appearance': ['-webkit-', '-moz-'],
  'backdrop-filter': ['-webkit-'],
  'clip-path': ['-webkit-'],
  'hyphens': ['-webkit-', '-ms-', '-moz-'],
  'tab-size': ['-moz-', '-o-'],
  'text-size-adjust': ['-webkit-', '-moz-', '-ms-'],
  'position': [],
  'box-decoration-break': ['-webkit-'],
  'text-emphasis': ['-webkit-'],
  'text-orientation': ['-webkit-'],
  'writing-mode': ['-webkit-', '-ms-'],
  'overflow-wrap': [],
  'font-feature-settings': ['-webkit-', '-moz-'],
  'font-variant-ligatures': ['-webkit-', '-moz-'],
  'perspective': ['-webkit-'],
  'transform': ['-webkit-'],
  'transform-style': ['-webkit-'],
  'transform-origin': ['-webkit-'],
  'animation': ['-webkit-'],
  'animation-name': ['-webkit-'],
  'animation-duration': ['-webkit-'],
  'animation-timing-function': ['-webkit-'],
  'animation-delay': ['-webkit-'],
  'animation-iteration-count': ['-webkit-'],
  'animation-direction': ['-webkit-'],
  'animation-fill-mode': ['-webkit-'],
  'animation-play-state': ['-webkit-'],
  'transition': ['-webkit-'],
  'transition-property': ['-webkit-'],
  'transition-duration': ['-webkit-'],
  'transition-timing-function': ['-webkit-'],
  'transition-delay': ['-webkit-'],
  'flex': ['-webkit-'],
  'flex-grow': ['-webkit-'],
  'flex-shrink': ['-webkit-'],
  'flex-basis': ['-webkit-'],
  'flex-direction': ['-webkit-'],
  'flex-wrap': ['-webkit-'],
  'flex-flow': ['-webkit-'],
  'justify-content': ['-webkit-'],
  'align-items': ['-webkit-'],
  'align-content': ['-webkit-'],
  'align-self': ['-webkit-'],
  'order': ['-webkit-'],
  'box-shadow': [],
  'border-radius': [],
  'columns': ['-webkit-', '-moz-'],
  'column-count': ['-webkit-', '-moz-'],
  'column-fill': ['-webkit-', '-moz-'],
  'column-gap': ['-webkit-', '-moz-'],
  'column-rule': ['-webkit-', '-moz-'],
  'column-span': ['-webkit-', '-moz-'],
  'column-width': ['-webkit-', '-moz-'],
  'resize': [],
  'overflow-scrolling': ['-webkit-'],
};

function doPrefix() {
  const inp = $('#input').value;
  if (!inp.trim()) { $('#output').textContent = ''; $('#status').innerHTML = ''; return; }

  let prefixCount = 0;
  // Process line by line, detect property:value patterns
  const result = inp.replace(/^(\s*)([\w-]+)\s*:\s*([^;]+);(\s*)$/gm, (match, indent, prop, value, trail) => {
    const prefixes = PREFIX_MAP[prop];
    if (!prefixes || prefixes.length === 0) return match;
    let out = '';
    prefixes.forEach(p => {
      out += `${indent}${p}${prop}: ${value};\n`;
      prefixCount++;
    });
    out += `${indent}${prop}: ${value};`;
    return out;
  });

  $('#output').textContent = result;
  if (prefixCount > 0) {
    $('#status').innerHTML = `<span style="color:var(--gz-success)">${t('processed').replace('{n}', prefixCount)}</span>`;
  } else {
    $('#status').innerHTML = `<span style="color:var(--text2)">${t('noChange')}</span>`;
  }
}

function loadExample() {
  $('#input').value = `.card {
  display: flex;
  align-items: center;
  user-select: none;
  appearance: none;
  backdrop-filter: blur(10px);
  transform: scale(1.05);
  transition: transform 0.3s ease;
  hyphens: auto;
  column-count: 3;
}`;
  doPrefix();
}

function doClear() { $('#input').value = ''; $('#output').textContent = ''; $('#status').innerHTML = ''; }

$('#input').addEventListener('input', doPrefix);

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="doPrefix()">${t('process')||'Process'}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

GZ.renderToolPage({
  category: 'dev',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'✨', href:'/dev/js-beautifier.html', name:'JS Beautifier'},
    {icon:'🎨', href:'/css-tools/css-formatter.html', name:'CSS Formatter'},
    {icon:'🖼️', href:'/css-tools/box-shadow.html', name:'Box Shadow'},
    {icon:'🌈', href:'/css-tools/gradient.html', name:'Gradient'},
  ]
});
</script>

</body>
