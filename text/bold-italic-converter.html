const { $, copyText, t } = GZ;

const RANGES = [
  { key: 'styleBold',          lower: 0x1D5EE, upper: 0x1D5D4, digits: 0x1D7EC },
  { key: 'styleItalic',        lower: 0x1D622, upper: 0x1D608 },
  { key: 'styleBoldItalic',    lower: 0x1D63C, upper: 0x1D622 },
  { key: 'styleScript',        lower: 0x1D4D6, upper: 0x1D4BC, skip: { 'h':0x210E } },
  { key: 'styleBoldScript',    lower: 0x1D4EA, upper: 0x1D4D0 },
  { key: 'styleFraktur',       lower: 0x1D51E, upper: 0x1D504 },
  { key: 'styleBoldFraktur',   lower: 0x1D586, upper: 0x1D56C },
  { key: 'styleDouble',        lower: 0x1D552, upper: 0x1D538 },
  { key: 'styleMono',          lower: 0x1D68A, upper: 0x1D670, digits: 0x1D7F6 },
  { key: 'styleSerifBold',     lower: 0x1D402, upper: 0x1D3EE, digits: 0x1D7CE },
  { key: 'styleSerifItalic',   lower: 0x1D456, upper: 0x1D442, skip: { 'h':0x210E } },
];

function convertStyle(text, range) {
  return [...text].map(ch => {
    const code = ch.charCodeAt(0);
    if (ch >= 'a' && ch <= 'z') {
      const idx = ch.charCodeAt(0) - 97;
      if (range.skip && range.skip[ch]) return String.fromCodePoint(range.skip[ch]);
      return String.fromCodePoint(range.lower + idx);
    }
    if (ch >= 'A' && ch <= 'Z') {
      const idx = ch.charCodeAt(0) - 65;
      return String.fromCodePoint(range.upper + idx);
    }
    if (ch >= '0' && ch <= '9' && range.digits) {
      const idx = ch.charCodeAt(0) - 48;
      return String.fromCodePoint(range.digits + idx);
    }
    return ch;
  }).join('');
}

function convert() {
  const text = $('#input').value || '';
  $('#results').innerHTML = RANGES.map(r => {
    const converted = convertStyle(text, r);
    return `<div class="result-card">
      <div style="flex:1">
        <div class="label">${t(r.key)}</div>
        <div class="text">${converted || '<span style="opacity:.4">—</span>'}</div>
      </div>
      <button class="gz-btn gz-btn-secondary" onclick="copyText(this.parentNode.querySelector('.text').textContent)">${t('copy')}</button>
    </div>`;
  }).join('');
}
