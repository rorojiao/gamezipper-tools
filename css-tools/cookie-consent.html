    acceptBtn: '接受按钮',
    rejectBtn: '拒绝按钮',
    learnMore: '了解更多文字',
    privacyLink: '隐私政策 URL',
    position: '位置',

    codeLabel: '生成代码',
    step1: '自定义横幅文字、颜色和位置',
    step2: '实时预览横幅效果',
    step3: '点击「生成代码」或复制 HTML/CSS/JS',
    step4: '粘贴到网站 head 或 body 中',
  }
});

const { $, copyText, t } = GZ;

function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function getVal(id) { return $(`#${id}`)?.value || ''; }

function update() {
  const text = getVal('bannerText') || t('bannerTextVal');
  const accept = getVal('acceptBtn') || 'Accept All';
  const reject = getVal('rejectBtn') || 'Reject';
  const learn = getVal('learnMore') || 'Learn more';
  const link = getVal('privacyLink') || '#privacy';
  const pos = getVal('position') || 'bottom';
  const bg = getVal('bgColor') || '#1a1a2e';
  const fg = getVal('textColor') || '#ffffff';
  const btn = getVal('btnColor') || '#4ecdc4';
  const radius = getVal('borderRadius') || '8';

  const posCSS = pos === 'top' ? 'top:0;left:0;right:0' :
                 pos === 'floating' ? 'bottom:20px;left:50%;transform:translateX(-50%);max-width:500px;width:calc(100% - 40px)' :
                 'bottom:0;left:0;right:0';

  const preview = $('#preview-body');
  preview.innerHTML = `
    <div style="position:relative;${posCSS};background:${bg};color:${fg};padding:16px 20px;border-radius:${radius}px;display:flex;flex-wrap:wrap;align-items:center;gap:12px;font-size:14px;z-index:9999;box-shadow:0 -2px 10px rgba(0,0,0,.2)">
      <div style="flex:1;min-width:200px">${esc(text)} <a href="${esc(link)}" style="color:${btn};text-decoration:underline">${esc(learn)}</a></div>
      <div style="display:flex;gap:8px">
        <button style="background:${btn};color:#000;border:none;padding:8px 20px;border-radius:${radius}px;cursor:pointer;font-weight:600">${esc(accept)}</button>
        <button style="background:transparent;color:${fg};border:1px solid ${fg};padding:8px 20px;border-radius:${radius}px;cursor:pointer">${esc(reject)}</button>
      </div>
    </div>`;

  const code = `<!-- Cookie Consent Banner by GameZipper Tools -->
<style>
.cookie-banner{position:fixed;${posCSS};background:${bg};color:${fg};padding:16px 20px;border-radius:${radius}px;display:flex;flex-wrap:wrap;align-items:center;gap:12px;font-size:14px;z-index:9999;box-shadow:0 -2px 10px rgba(0,0,0,.2)}
.cookie-banner p{flex:1;min-width:200px;margin:0}
.cookie-banner a{color:${btn};text-decoration:underline}
.cookie-btn{padding:8px 20px;border-radius:${radius}px;cursor:pointer;font-weight:600;border:none;font-size:14px}
.cookie-accept{background:${btn};color:#000}
.cookie-reject{background:transparent;color:${fg};border:1px solid ${fg}}
</style>
<div class="cookie-banner" id="cookieBanner">
  <p>${esc(text)} <a href="${esc(link)}">${esc(learn)}</a></p>
  <div style="display:flex;gap:8px">
    <button class="cookie-btn cookie-accept" onclick="document.getElementById('cookieBanner').style.display='none';localStorage.setItem('cookies','accepted')">${esc(accept)}</button>
    <button class="cookie-btn cookie-reject" onclick="document.getElementById('cookieBanner').style.display='none';localStorage.setItem('cookies','rejected')">${esc(reject)}</button>
  </div>
</div>
<script>if(localStorage.getItem('cookies'))document.getElementById('cookieBanner').style.display='none';<\/script>`;

  $('#output').textContent = code;
  $('#code-label').textContent = t('codeLabel');
}

$('#controls').innerHTML = `
  <label>${t('bannerText')}<textarea id="bannerText" rows="2" oninput="update()">${t('bannerTextVal')}</textarea></label>
  <label>${t('privacyLink')}<input type="text" id="privacyLink" value="#privacy" oninput="update()"></label>
  <label>${t('acceptBtn')}<input type="text" id="acceptBtn" value="Accept All" oninput="update()"></label>
  <label>${t('rejectBtn')}<input type="text" id="rejectBtn" value="Reject" oninput="update()"></label>
  <label>${t('learnMore')}<input type="text" id="learnMore" value="Learn more" oninput="update()"></label>
  <label>${t('position')}<select id="position" onchange="update()">
    <option value="bottom">${t('bottom')}</option>
    <option value="top">${t('top')}</option>
    <option value="floating">${t('floating')}</option>
  </select></label>
  <label>${t('bgColor')}<input type="color" id="bgColor" value="#1a1a2e" oninput="update()"></label>
  <label>${t('textColor')}<input type="color" id="textColor" value="#ffffff" oninput="update()"></label>
  <label>${t('btnColor')}<input type="color" id="btnColor" value="#4ecdc4" oninput="update()"></label>
  <label>${t('borderRadius')}<input type="text" id="borderRadius" value="8" oninput="update()"></label>
`;

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>`;

update();

  category: 'css',

    {icon:'🔘', href:'/css-tools/button.html', name:'Button Generator'},
  ]
});
</script>
