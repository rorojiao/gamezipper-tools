<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>

  <div class="gz-tool-area">

<script>
GZI18n.register({
  en: {
    toolTitle: 'Team Name Generator',
    toolDesc: 'Generate cool, funny and unique team names for sports, esports, work, trivia and gaming — free, instant, no signup.',
    category: 'Category',
    style: 'Style',
    keyword: 'Optional keyword (city, mascot...)',
    generate: 'Generate Names',
    copyAll: 'Copy All',
    clear: 'Clear',
    copied: 'Copied!',
    emptyHint: 'Click "Generate Names" to see 12 fresh suggestions.',
    step1: 'Choose a category that fits your team',
    step2: 'Pick a style — cool, funny, fierce or clever',
    step3: 'Optionally type a keyword to personalize names',
    step4: 'Click Generate Names, then tap any name to copy it',
  },
  zh: {
    toolTitle: '团队名称生成器',
    toolDesc: '为运动、电竞、工作、问答和游戏生成酷炫、搞笑、独特的队名 — 免费、即时、无需注册。',
    category: '类别',
    style: '风格',
    keyword: '可选关键词（城市、吉祥物…）',
    generate: '生成名称',
    copyAll: '全部复制',
    clear: '清空',
    copied: '已复制！',
    emptyHint: '点击「生成名称」查看 12 个全新建议。',
    step1: '选择适合你团队的类别',
    step2: '选择风格 — 酷炫、搞笑、霸气或巧妙',
    step3: '可选：输入关键词来个性化名称',
    step4: '点击生成，然后点任意名称即可复制',
  }
});

const { $, copyText, t } = GZ;

const BANKS = {
  sport: { adj:['Golden','Iron','Silver','Thunder','Lightning','Royal','Mighty','Wild','Crimson','Azure','Storm','Phantom','Elite','Victorious','Flying','Brave','Rapid','Supreme'], noun:['Tigers','Eagles','Lions','Wolves','Sharks','Falcons','Dragons','Bears','Hawks','Bulls','Panthers','Titans','Giants','Warriors','Knights','Mustangs','Cobras','Rhinos'] },
  esports: { adj:['Pixel','Cyber','Neon','Quantum','Hyper','Toxic','Vortex','Apex','Glitch','Phantom','Shadow','Void','Nexus','Plasma','Binary','Hex','Overclock','Spectral'], noun:['Snipers','Reapers','Phantoms','Sentinels','Renegades','Outlaws','Syndicate','Vanguard','Legion','Havoc','Spectre','Ninjas','Titans','Predators','Wraiths','Squad','E-Squad','Syndicate'] },
  work: { adj:['Agile','Synergy','Innovation','Apex','Quantum','Bright','Bold','Prime','Elite','Stellar','Strategic','Dynamic','Forward','Summit','Catalyst','Momentum','Vision','Cornerstone'], noun:['Pioneers','Innovators','Achievers','Builders','Thinkers','Leaders','Minds','Force','Collective','Alliance','Taskforce','Vanguard','Crew','Squad','Network','Hub','Labs','Works'] },
  trivia: { adj:['Smarty','Know-It-All','Quizzical','Brainy','Clever','Witty','Trivia','Mental','Genius','Einstein','Brainy','Sharp','Quick','Brilliant','Smart','Savvy','Cerebral','Bright'], noun:['Pants','Society','Club','Crew','Bandits','Federation','Brigade','Quartet','Collective','Minds','Squad','Alliance','Society','Guild','League','Council','Circle','Pack'] },
  gaming: { adj:['Epic','Legendary','Mythic','Radiant','Shattered','Arcane','Astral','Shadow','Frozen','Burning','Crystal','Storm','Iron','Golden','Eternal','Cursed','Sacred','Phantom'], noun:['Crusaders','Conquerors','Vanguard','Legion','Guardians','Champions','Heralds','Reign','Order','Covenant','Brotherhood','Circle','Requiem','Ascendants','Defiant','Phoenix','Sentinels','Wardens'] },
  fantasy: { adj:['Crimson','Mystic','Ancient','Forgotten','Eternal','Silver','Shadow','Iron','Crystal','Golden','Storm','Frost','Ember','Twilight','Radiant','Velvet','Obsidian','Sable'], noun:['Dragons','Wizards','Elves','Knights','Sorcerers','Wardens','Keepers','Sentinels','Blades','Crowns','Thrones','Realm','Order','Coven','Legion','Hunt','Circle','Court'] },
};

const STYLES = {
  cool: ['','','The ','Team ','','The ','','','',''],
  funny: ['The Mighty ','The Quirky ','Professor ','Captain ','The Legendary ','Sir ','The Atomic ','Doctor ','The Great ','Lord '],
  fierce: ['The Savage ','The Ruthless ','The Invincible ','The Unstoppable ','The Fearsome ','The Deadly ','The Vengeful ','The Relentless ','The Brutal ','The Merciless '],
  clever: ['The ','Puns & ','The Quotable ','The Witty ','The Brainy ','The Learned ','The Notable ','The Wise ','The Keen ','The Sagacious '],
};

const CATS = ['sport','esports','work','trivia','gaming','fantasy'];
const STYLE_KEYS = ['cool','funny','fierce','clever'];

let lastResults = [];

function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }

function generate(){
  const cat = $('#cat').value;
  const style = $('#style').value;
  const kw = $('#kw').value.trim();
  const bank = BANKS[cat] || BANKS.sport;
  const prefixes = STYLES[style] || STYLES.cool;
  const names = new Set();
  let guard = 0;
  while(names.size < 12 && guard < 200){
    guard++;
    let pre = pick(prefixes);
    let a = pick(bank.adj);
    let n = pick(bank.noun);
    let name;
    if(kw && Math.random() < 0.5){
      name = pre + kw + ' ' + n;
    } else {
      name = pre + a + ' ' + n;
    }
    names.add(name.replace(/\s+/g,' ').trim());
  }
  lastResults = [...names];
  render();
}

function render(){
  const grid = $('#grid');
  if(!lastResults.length){
    grid.innerHTML = `<div class="tng-empty">${t('emptyHint')}</div>`;
    return;
  }
  grid.innerHTML = lastResults.map(n => `
    <div class="tng-card">
      <span class="name" onclick="copyOne(this)" data-name="${n.replace(/"/g,'&quot;')}">${n}</span>
      <button onclick="copyOne(this)" data-name="${n.replace(/"/g,'&quot;')}">${t('copyAll').split(' ')[0]}</button>
    </div>`).join('');
}

function copyOne(el){
  const n = el.dataset.name;
  copyText(n);
  flash(el, t('copied'));
}

function flash(el, msg){
  const original = el.tagName === 'BUTTON' ? el.textContent : '';
  if(el.tagName === 'BUTTON'){ el.textContent = msg; }
  else { el.style.opacity = '.5'; }
  setTimeout(() => {
    if(el.tagName === 'BUTTON') el.textContent = original;
    else el.style.opacity = '';
  }, 1100);
}

function copyAll(){
  if(!lastResults.length) return;
  copyText(lastResults.join('\n'));
  $('#status').innerHTML = `<span style="color:var(--gz-success)">✓ ${lastResults.length} ${t('copied')}</span>`;
}

function doClear(){ lastResults = []; render(); $('#status').innerHTML = ''; }

$('#controls').innerHTML = `
  <label>${t('category')} <select id="cat">
    ${CATS.map((c,i) => `<option value="${c}">${({sport:'Sports ⚽',esports:'Esports 🎮',work:'Work 💼',trivia:'Trivia 🧠',gaming:'Gaming 🗡️',fantasy:'Fantasy 🐉'})[c]}</option>`).join('')}
  </select></label>
  <label>${t('style')} <select id="style">
    ${STYLE_KEYS.map(s => `<option value="${s}">${({cool:'Cool 😎',funny:'Funny 😂',fierce:'Fierce 🔥',clever:'Clever 🧐'})[s]}</option>`).join('')}
  </select></label>
  <input type="text" id="kw" placeholder="${t('keyword')}">`;

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="generate()">${t('generate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="copyAll()">${t('copyAll')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

render();
generate();

GZ.renderToolPage({
  category: 'social',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🎨', href:'/social/bio-generator.html', name:'Bio Generator'},
    {icon:'🏷️', href:'/social/username-generator.html', name:'Username Generator'},
    {icon:'🟧', href:'/social/reddit-post.html', name:'Reddit Post'},
    {icon:'📸', href:'/social/instagram-post.html', name:'Instagram Post'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
