<script>
GZI18n.register({
  en: {
    toolTitle: 'Math Worksheet Generator',
    toolDesc: 'Create free printable math worksheets for addition, subtraction, multiplication and division. Pick number range and problem count — print or save as PDF. No signup.',
    operation: 'Operation',
    add: 'Addition (+)',
    sub: 'Subtraction (−)',
    mul: 'Multiplication (×)',
    div: 'Division (÷)',
    mixed: 'Mixed',
    minNum: 'Min number',
    maxNum: 'Max number',
    count: 'Problems',
    showAnswers: 'Show answers',
    generate: 'Generate',
    print: 'Print / PDF',
    nameField: 'Name: ____________________',
    dateField: 'Date: __________',
    titleAdd: 'Addition Worksheet',
    titleSub: 'Subtraction Worksheet',
    titleMul: 'Multiplication Worksheet',
    titleDiv: 'Division Worksheet',
    titleMixed: 'Mixed Math Worksheet',
    noRegroup: 'No regrouping',
    step1: 'Pick an operation (add, subtract, multiply, divide or mixed)',
    step2: 'Set the number range and how many problems',
    step3: 'Toggle "Show answers" if you want the answer key',
    step4: 'Click "Print / PDF" to print or save as PDF',
  },
  zh: {
    toolTitle: '数学练习卷生成器',
    toolDesc: '免费创建可打印的数学练习卷，支持加、减、乘、除运算。选择数字范围和题目数量 — 打印或保存为 PDF。无需注册。',
    operation: '运算',
    add: '加法 (+)',
    sub: '减法 (−)',
    mul: '乘法 (×)',
    div: '除法 (÷)',
    mixed: '混合',
    minNum: '最小数',
    maxNum: '最大数',
    count: '题目数',
    showAnswers: '显示答案',
    generate: '生成',
    print: '打印 / PDF',
    nameField: '姓名：____________________',
    dateField: '日期：__________',
    titleAdd: '加法练习卷',
    titleSub: '减法练习卷',
    titleMul: '乘法练习卷',
    titleDiv: '除法练习卷',
    titleMixed: '混合运算练习卷',
    noRegroup: '无需进位',
    step1: '选择运算类型（加、减、乘、除或混合）',
    step2: '设置数字范围和题目数量',
    step3: '如需答案，勾选「显示答案」',
    step4: '点击「打印 / PDF」打印或保存为 PDF',
  }
});

const { $, t } = GZ;
let op = 'add', minN = 1, maxN = 20, count = 20, showAns = false;

function randInt(a,b){ return Math.floor(Math.random()*(b-a+1))+a; }

function makeProblem(operation){
  let a, b, sym, ans;
  if(operation==='add'){ a=randInt(minN,maxN); b=randInt(minN,maxN); sym='+'; ans=a+b; }
  else if(operation==='sub'){ a=randInt(minN,maxN); b=randInt(minN,a); sym='−'; ans=a-b; }
  else if(operation==='mul'){ a=randInt(minN,maxN); b=randInt(minN,maxN); sym='×'; ans=a*b; }
  else { // division — make exact
    b=randInt(2,Math.max(2,maxN)); a=randInt(1,Math.max(1,Math.floor(maxN/b)))*b; sym='÷'; ans=a/b;
  }
  return {a,b,sym,ans};
}

function generate(){
  const ops = op==='mixed' ? ['add','sub','mul','div'] : [op];
  const titleKey = op==='add'?'titleAdd':op==='sub'?'titleSub':op==='mul'?'titleMul':op==='div'?'titleDiv':'titleMixed';
  const problems = [];
  for(let i=0;i<count;i++){
    problems.push(makeProblem(ops[Math.floor(Math.random()*ops.length)]));
  }
  let html = `<div class="ws-header">
    <div><strong style="font-size:1.3rem">${t(titleKey)}</strong></div>
    <div style="display:flex;gap:18px;flex-direction:column">
      <div class="field">${t('nameField')}</div>
      <div class="field">${t('dateField')}  &nbsp; ${t('count')}: ${count}</div>
    </div>
  </div><div class="ws-grid">`;
  problems.forEach((p,i)=>{
    html += `<div class="ws-problem"><span class="idx">${i+1}.</span>`;
    html += `<span class="num">${p.a}</span><span>${p.sym}</span><span class="num">${p.b}</span><span>=</span>`;
    if(showAns){ html += `<span class="num" style="color:var(--gz-accent)"><strong>${p.ans}</strong></span>`; }
    else { html += `<span class="blank"></span>`; }
    html += `</div>`;
  });
  html += '</div>';
  $('#worksheet').innerHTML = html;
}

function doPrint(){ window.print(); }

$('#toolbar').innerHTML = `
  <label style="display:inline-flex;align-items:center;gap:6px">${t('operation')}
  <select class="gz-select" onchange="op=this.value">
    <option value="add">${t('add')}</option>
    <option value="sub">${t('sub')}</option>
    <option value="mul">${t('mul')}</option>
    <option value="div">${t('div')}</option>
    <option value="mixed">${t('mixed')}</option>
  </select></label>
  <label style="display:inline-flex;align-items:center;gap:6px">${t('minNum')} <input class="gz-input" type="number" id="minN" value="1" min="0" style="width:70px" onchange="minN=Math.max(0,+this.value||0)"></label>
  <label style="display:inline-flex;align-items:center;gap:6px">${t('maxNum')} <input class="gz-input" type="number" id="maxN" value="20" min="1" style="width:70px" onchange="maxN=Math.max(minN+1,+this.value||minN+1)"></label>
  <label style="display:inline-flex;align-items:center;gap:6px">${t('count')} <input class="gz-input" type="number" id="cnt" value="20" min="4" max="100" style="width:70px" onchange="count=Math.min(100,Math.max(4,+this.value||20))"></label>
  <label style="display:inline-flex;align-items:center;gap:6px"><input type="checkbox" onchange="showAns=this.checked"> ${t('showAnswers')}</label>
  <button class="gz-btn" onclick="generate()">${t('generate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doPrint()">🖨️ ${t('print')}</button>`;

generate();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🎓', href:'/calc/grade-calculator.html', name:'Grade Calculator'},
    {icon:'🔢', href:'/calc/factorial-calculator.html', name:'Factorial'},
    {icon:'√', href:'/calc/square-root-calculator.html', name:'Square Root'},
    {icon:'🎓', href:'/calc/cgpa-calculator.html', name:'CGPA Calculator'},
  ]
});
</script>
