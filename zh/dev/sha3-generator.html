const { $, copyText, t, showToast } = GZ;

const ALGOS = [
  {id:'sha3_224',name:'SHA3-224',len:224,webcrypto:false},
  {id:'sha3_256',name:'SHA3-256',len:256,webcrypto:false},
  {id:'sha3_384',name:'SHA3-384',len:384,webcrypto:false},
  {id:'sha3_512',name:'SHA3-512',len:512,webcrypto:false},
  {id:'keccak256',name:'Keccak-256',len:256,webcrypto:false},
  {id:'keccak512',name:'Keccak-512',len:512,webcrypto:false},
];

// --- Keccak-f[1600] permutation (pure JS, no dependencies) ---
const RC = [
  0x0000000000000001n,0x0000000000008082n,0x800000000000808an,0x8000000080008000n,
  0x000000000000808bn,0x0000000080000001n,0x8000000080008081n,0x8000000000008009n,
  0x000000000000008an,0x0000000000000088n,0x0000000080008009n,0x000000008000000an,
  0x000000008000808bn,0x800000000000008bn,0x8000000000008089n,0x8000000000008003n,
  0x8000000000008002n,0x8000000000000080n,0x000000000000800an,0x800000008000000an,
  0x8000000080008081n,0x8000000000008080n,0x0000000080000001n,0x8000000080008008n,
];
const ROT = [
  [0,36,3,41,18],
  [1,44,10,45,2],
  [62,6,43,15,61],
  [28,55,25,21,56],
  [27,20,39,8,14],
];

function keccakF(state){
  for(let rnd=0;rnd<24;rnd++){
    // Theta
    const C=[],D=[];
    for(let x=0;x<5;x++){
      C[x]=state[x][0]^state[x][1]^state[x][2]^state[x][3]^state[x][4];
    }
    for(let x=0;x<5;x++){
      D[x]=C[(x+4)%5]^((C[(x+1)%5]<<1n)|(C[(x+1)%5]>>63n));
    }
    for(let x=0;x<5;x++)for(let y=0;y<5;y++)state[x][y]^=D[x];

    // Rho and Pi
    const B=Array.from({length:5},()=>new Array(5).fill(0n));
    for(let x=0;x<5;x++)for(let y=0;y<5;y++){
      const r=ROT[x][y];
      B[y][(2*x+3*y)%5]=(state[x][y]<<BigInt(r))|(state[x][y]>>BigInt(64-r));
    }

    // Chi
    for(let x=0;x<5;x++)for(let y=0;y<5;y++){
      state[x][y]=B[x][y]^(B[(x+1)%5][y]^((~B[(x+2)%5][y])&0xFFFFFFFFFFFFFFFFn));
    }

    // Iota
    state[0][0]^=RC[rnd];
  }
}

function keccakSponge(msgBytes,rateBytes,outputBytes,padByte){
  // rate in bytes must be < 200; capacity = 200 - rate
  const state=Array.from({length:5},()=>new Array(5).fill(0n));
  // Padding
  const padded=[...msgBytes];
  padded.push(padByte);
  while(padded.length%rateBytes!==rateBytes-1)padded.push(0);
  padded.push(0x80);

  // Absorb
  for(let blk=0;blk<padded.length;blk+=rateBytes){
    for(let i=0;i<rateBytes;i+=8){
      let lane=0n;
      for(let j=0;j<8&&i+j<rateBytes;j++){
        lane|=BigInt(padded[blk+i+j])<<(BigInt(j)*8n);
      }
      const x=(i/8)%5,y=Math.floor((i/8)/5);
      state[x][y]^=lane;
    }
    keccakF(state);
  }

  // Squeeze
  const out=[];
  while(out.length<outputBytes){
    for(let i=0;i<rateBytes&&out.length<outputBytes;i+=8){
      const x=(i/8)%5,y=Math.floor((i/8)/5);
      const lane=state[x][y];
      for(let j=0;j<8&&out.length<outputBytes;j++){
        out.push(Number((lane>>(BigInt(j)*8n))&0xFFn));
      }
    }
    if(out.length<outputBytes)keccakF(state);
  }
  return out;
}

function bytesToHex(bytes){return bytes.map(b=>b.toString(16).padStart(2,'0')).join('');}
function strToBytes(str){
  const enc=new TextEncoder();
  return Array.from(enc.encode(str));
}

function generateHash(algoId, text){
  const bytes=strToBytes(text);
  let outLen,rate,pad;
  switch(algoId){
    case 'sha3_224': outLen=28;rate=144;pad=0x06;break;
    case 'sha3_256': outLen=32;rate=136;pad=0x06;break;
    case 'sha3_384': outLen=48;rate=104;pad=0x06;break;
    case 'sha3_512': outLen=64;rate=72;pad=0x06;break;
    case 'keccak256': outLen=32;rate=136;pad=0x01;break;
    case 'keccak512': outLen=64;rate=72;pad=0x01;break;
    default:return'';
  }
  return bytesToHex(keccakSponge(bytes,rate,outLen,pad));
}

function doGenerate(){
  const text=$('#input').value;
  if(!text){$('#output').innerHTML=`<p style="opacity:.6">${t('empty')}</p>`;$('#status').innerHTML='';return;}
  const enabled=ALGOS.filter(a=>$('#chk_'+a.id).checked);
  let html='';
  for(const algo of enabled){
    const hash=generateHash(algo.id,text);
    html+=`<div class="hash-row"><strong>${algo.name}</strong><code>${hash}</code><button class="gz-btn gz-btn-sm" onclick="copyHash('${hash}')">${t('copy')}</button></div>`;
  }
  $('#output').innerHTML=html||`<p style="opacity:.6">${t('empty')}</p>`;
  $('#status').innerHTML=`<span style="color:var(--gz-success)">✓ ${enabled.length} hash(es) generated</span>`;
}

function copyHash(h){copyText(h);showToast(t('copied'));}

function doClear(){$('#input').value='';$('#output').innerHTML=`<p style="opacity:.6">${t('empty')}</p>`;$('#status').innerHTML='';}

$('#input').addEventListener('input',doGenerate);

$('#toolbar').innerHTML=`
  <button class="gz-btn" onclick="doGenerate()">${t('generate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

const algoToggles=`<div class="algo-toggle">${ALGOS.map((a,i)=>`<label><input type="checkbox" id="chk_${a.id}" ${[1,4].includes(i)?'checked':''} onchange="doGenerate()"> ${a.name}</label>`).join('')}</div>`;
