<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="tst-controls">
      <label><span id="lbl-dur"></span>
        <select id="duration">
          <option value="60">1 min</option>
          <option value="120">2 min</option>
          <option value="180" selected>3 min</option>
          <option value="300">5 min</option>
        </select>
      </label>
      <button class="gz-btn" id="btn-start" onclick="startTest()"></button>
      <button class="gz-btn gz-btn-secondary" id="btn-reset" onclick="resetTest()"></button>
      <span class="tst-timer" id="timer">3:00</span>
    </div>

      <div class="tst-stat"><div class="val" id="s-errors">0</div><div class="lbl" id="s-errors-lbl"></div></div>

  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>

</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Typing Speed Test',
    toolDesc: 'Test your typing speed and accuracy for free. Measure words per minute (WPM) with timed practice tests from 1 to 5 minutes — no signup required.',
    duration: 'Duration',
    start: 'Start Test',
    reset: 'Reset',
    wpm: 'WPM',
    accuracy: 'Accuracy',
    correct: 'Correct',
    errors: 'Errors',
    step1: 'Choose a test duration (1, 2, 3 or 5 minutes)',
    step2: 'Click Start Test and begin typing the displayed text',
    step3: 'Type as fast and accurately as you can until time runs out',
    step4: 'View your WPM, accuracy, error count and typing rank',
    rankSlow: '🐌 Keep practicing! Average is around 40 WPM.',
    rankAvg: '👍 Good! You type at an average speed.',
    rankGood: '✅ Great job! Above-average typing speed.',
    rankPro: '⚡ Excellent! Professional-level typing speed.',
    rankMaster: '🏆 Outstanding! You are in the top tier of typists.',
  },
  zh: {
    toolTitle: '打字速度测试',
    toolDesc: '免费测试你的打字速度和准确率。通过 1 到 5 分钟的限时练习测试，测量每分钟字数（WPM）— 无需注册。',
    duration: '时长',
    start: '开始测试',
    reset: '重置',
    wpm: 'WPM',
    accuracy: '准确率',
    correct: '正确',
    errors: '错误',
    step1: '选择测试时长（1、2、3 或 5 分钟）',
    step2: '点击「开始测试」并开始输入显示的文本',
    step3: '在时间结束前尽可能快且准确地打字',
    step4: '查看你的 WPM、准确率、错误数和打字等级',
    rankSlow: '🐌 继续练习！平均速度约为 40 WPM。',
    rankAvg: '👍 不错！你的打字速度处于平均水平。',
    rankGood: '✅ 很棒！高于平均水平的打字速度。',
    rankPro: '⚡ 优秀！专业级打字速度。',
    rankMaster: '🏆 出色！你是顶级打字高手。',
  }
});

const SAMPLE_TEXTS = [
  "The quick brown fox jumps over the lazy dog. Pack my box with five dozen liquor jugs. How vexingly quick daft zebras jump! Bright vixens jump dozy fowl quack. Jackdaws love my big sphinx of quartz.",
  "Technology has transformed the way we communicate, work, and live. From smartphones to artificial intelligence, innovation drives progress forward. The internet connects billions of people across the globe in an instant.",
  "Reading expands the mind and builds empathy. Books transport us to different worlds, introduce us to fascinating characters, and teach us about history, science, and the human experience. A good book is a lifelong friend.",
  "Practice makes perfect, or so the saying goes. Consistent effort over time leads to mastery. Whether learning a language, playing an instrument, or improving typing speed, regular practice is the key to success.",
  "Nature offers endless wonders to explore. From the depths of the ocean to the highest mountain peaks, every corner of our planet holds beauty and mystery. Protecting these natural treasures is our shared responsibility."
];

const { $, t } = GZ;
let chars = [], currentIdx = 0, correctCount = 0, errorCount = 0, totalTyped = 0;
let timeLeft = 180, timerInterval = null, testActive = false, currentText = '';

function loadText() {
  currentText = SAMPLE_TEXTS[Math.floor(Math.random() * SAMPLE_TEXTS.length)];
  chars = currentText.split('');
  currentIdx = 0; correctCount = 0; errorCount = 0; totalTyped = 0;
  renderText();
}

function renderText() {
  $('#display').innerHTML = chars.map((c, i) => {
    let cls = 'char';
    if (i < currentIdx) cls += c === chars[i] ? ' correct' : ' incorrect';
    else if (i === currentIdx) cls += ' current';
    return `<span class="${cls}">${c === ' ' ? '&nbsp;' : c}</span>`;
  }).join('');
}

function startTest() {
  loadText();
  timeLeft = parseInt($('#duration').value);
  $('#timer').textContent = formatTime(timeLeft);
  $('#input').value = '';
  $('#input').disabled = false;
  $('#input').focus();
  $('#stats').style.display = 'none';
  $('#rank').style.display = 'none';
  testActive = true;
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    timeLeft--;
    $('#timer').textContent = formatTime(timeLeft);
    if (timeLeft <= 0) endTest();
  }, 1000);
}

function endTest() {
  clearInterval(timerInterval);
  testActive = false;
  $('#input').disabled = true;
  const minutes = parseInt($('#duration').value) / 60;
  const wpm = Math.round((correctCount / 5) / minutes);
  const acc = totalTyped > 0 ? Math.round((correctCount / totalTyped) * 100) : 0;
  $('#s-wpm').textContent = wpm;
  $('#s-acc').textContent = acc + '%';
  $('#s-correct').textContent = correctCount;
  $('#s-errors').textContent = errorCount;
  $('#stats').style.display = 'grid';
  let rankKey = 'rankSlow';
  if (wpm >= 80) rankKey = 'rankMaster';
  else if (wpm >= 60) rankKey = 'rankPro';
  else if (wpm >= 45) rankKey = 'rankGood';
  else if (wpm >= 30) rankKey = 'rankAvg';
  $('#rank').textContent = t(rankKey);
  $('#rank').style.display = 'block';
}

function resetTest() {
  clearInterval(timerInterval);
  testActive = false;
  $('#input').value = '';
  $('#input').disabled = true;
  timeLeft = parseInt($('#duration').value);
  $('#timer').textContent = formatTime(timeLeft);
  $('#stats').style.display = 'none';
  $('#rank').style.display = 'none';
  loadText();
}

function onInput() {
  if (!testActive) return;
  const val = $('#input').value;
  totalTyped = val.length;
  correctCount = 0;
  errorCount = 0;
  for (let i = 0; i < val.length; i++) {
    if (i < chars.length) {
      if (val[i] === chars[i]) correctCount++;
      else errorCount++;
    }
  }
  currentIdx = val.length;
  renderText();
  if (currentIdx >= chars.length) {
    // reload new text for continuous typing
    const typed = val;
    loadText();
    $('#input').value = '';
    currentIdx = 0;
    // keep accumulated counts
    correctCount += typed.split('').filter((c,i) => c === chars[i]).length;
    renderText();
  }
}

function formatTime(s) {
  const m = Math.floor(s / 60);
  const sec = s % 60;
  return `${m}:${sec.toString().padStart(2, '0')}`;
}

// init
$('#btn-start').textContent = t('start');
$('#btn-reset').textContent = t('reset');
$('#s-wpm-lbl').textContent = t('wpm');
$('#s-acc-lbl').textContent = t('accuracy');
$('#s-correct-lbl').textContent = t('correct');
$('#s-errors-lbl').textContent = t('errors');
timeLeft = parseInt($('#duration').value);
$('#timer').textContent = formatTime(timeLeft);
loadText();

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📝', href:'/text/word-counter.html', name:'Word Counter'},
    {icon:'📊', href:'/text/reading-speed-test.html', name:'Reading Speed Test'},
    {icon:'✍️', href:'/text/markdown-editor.html', name:'Markdown Editor'},
    {icon:'🔤', href:'/text/case-converter.html', name:'Case Converter'},
  ]
});
</script>
