.cps-arena.done{border-color:#bb86fc}
.cps-big{font-size:4.5rem;font-weight:800;font-family:monospace;color:var(--accent);line-height:1}

.cps-stat .v{font-size:1.8rem;font-weight:700;color:var(--accent);font-family:monospace}
.cps-stat .l{font-size:.78em;opacity:.7;margin-top:2px}
.cps-rank{text-align:center;margin-top:14px;font-size:1.1rem;font-weight:600}
.cps-history{max-width:680px;margin:18px auto 0;background:var(--glass);border:1px solid var(--border);border-radius:12px;padding:14px}
.cps-history h3{margin:0 0 8px;font-size:.95rem}
.cps-history table{width:100%;border-collapse:collapse;font-size:.85em}
.cps-history td,.cps-history th{padding:6px 8px;border-bottom:1px solid var(--border);text-align:center}
.cps-history th{opacity:.65;font-weight:600}
.cps-ranks{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin-top:14px;font-size:.75em}
.cps-rank-pill{padding:4px 10px;border-radius:20px;border:1px solid var(--border);background:var(--glass)}

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">

    <div class="cps-modes" id="modes"></div>

      <table id="histTable"><thead><tr><th>#</th><th id="hMode"></th><th id="hCps"></th><th id="hClicks"></th></tr></thead><tbody></tbody></table>

<script>
GZI18n.register({
  en: {
    toolTitle: 'CPS Test — Click Speed Test',
    toolDesc: 'Measure your clicks per second (CPS) with this free click speed test. Choose 1, 5, 10, 30 or 100 seconds, click as fast as you can, and see your CPS score, total clicks and skill rank. Pure browser game.',
    cps: 'CPS', clicks: 'Clicks', time: 'Time', history: 'Recent Attempts', mode: 'Mode', reset: '🔄 Reset', best: '🏆 Best',
    clickToStart: 'Click here to start', clickNow: 'CLICK! CLICK! CLICK!', timesUp: '⏰ Time\'s up!',
    subStart: 'Click anywhere in this box to begin', subRun: 'Keep clicking as fast as you can!', subDone: 'Click again to retry',
    rankSlow: '🐢 Slow Poke', rankAvg: '🙂 Average', rankGood: '😎 Good', rankGreat: '🔥 Great', rankPro: '⚡ Pro', rankGod: '👑 Godlike',
    step1: 'Pick a test duration — 1s, 5s, 10s, 30s or 100s',
    step2: 'Click in the big box to start the timer',
    step3: 'Click as fast as you can until the time runs out',
    step4: 'Check your CPS score and skill rank, then try to beat it!',
  },
  zh: {
    toolTitle: 'CPS 测试 — 鼠标点击速度测试',
    toolDesc: '用这款免费的点击速度测试来测量你的每秒点击数（CPS）。选择 1、5、10、30 或 100 秒，尽可能快地点击，查看 CPS 分数、总点击数和技能等级。纯浏览器小游戏。',
    cps: 'CPS', clicks: '点击数', time: '时间', history: '最近成绩', mode: '模式', reset: '🔄 重置', best: '🏆 最佳',
    clickToStart: '点击此处开始', clickNow: '点击！点击！点击！', timesUp: '⏰ 时间到！',
    subStart: '在此方框任意位置点击即可开始', subRun: '尽可能快地持续点击！', subDone: '再次点击可重新挑战',
    rankSlow: '🐢 慢吞吞', rankAvg: '🙂 一般', rankGood: '😎 不错', rankGreat: '🔥 很棒', rankPro: '⚡ 高手', rankGod: '👑 神级',
    step1: '选择测试时长 — 1 秒、5 秒、10 秒、30 秒或 100 秒',
    step2: '点击大方框开始计时',
    step3: '在时间结束前尽可能快地点击',
    step4: '查看 CPS 分数和技能等级，努力打破纪录！',
  }
});

const { $, copyText, t } = GZ;

const DURATIONS = [1, 5, 10, 30, 100];
let duration = 10;
let clicks = 0;
let running = false;
let done = false;
let startTime = 0;
let rafId = null;
let history = [];

function rankFor(cps){
  if(cps < 5) return t('rankSlow');
  if(cps < 7) return t('rankAvg');
  if(cps < 9) return t('rankGood');
  if(cps < 12) return t('rankGreat');
  if(cps < 15) return t('rankPro');
  return t('rankGod');
}
function rankColor(cps){
  if(cps<5) return '#888'; if(cps<7) return '#61afef'; if(cps<9) return '#00d672';
  if(cps<12) return '#ffb86c'; if(cps<15) return '#e94560'; return '#bb86fc';
}

function renderModes(){
  $('#modes').innerHTML = DURATIONS.map(d=>`<button data-d="${d}" class="${d===duration?'active':''}">${d}s</button>`).join('');
  $('#modes').querySelectorAll('button').forEach(b => b.onclick = () => {
    if(running) return;
    duration = +b.dataset.d; reset(); renderModes();
  });
}

function reset(){
  running=false; done=false; clicks=0; startTime=0;
  if(rafId) cancelAnimationFrame(rafId);
  $('#arena').className='cps-arena';
  $('#big').textContent='🖱️'; $('#big').style.color='';
  $('#sub').textContent=t('subStart');
  $('#hint').textContent=t('clickToStart');
  $('#sCps').textContent='0.00'; $('#sClicks').textContent='0'; $('#sTime').textContent='0.0s';
  $('#rank').textContent='';
}

function tick(){
  if(!running) return;
  const elapsed = (performance.now()-startTime)/1000;
  const remain = Math.max(0, duration-elapsed);
  $('#sTime').textContent = remain.toFixed(1)+'s';
  $('#sCps').textContent = (clicks/Math.max(elapsed,0.001)).toFixed(2);
  $('#sClicks').textContent = clicks;
  $('#big').textContent = remain.toFixed(1);
  if(remain <= 0){ finish(); return; }
  rafId = requestAnimationFrame(tick);
}

function finish(){
  running=false; done=true;
  if(rafId) cancelAnimationFrame(rafId);
  const cps = clicks/duration;
  $('#arena').className='cps-arena done';
  $('#big').textContent = cps.toFixed(2);
  $('#big').style.color = rankColor(cps);
  $('#sub').textContent = t('subDone');
  $('#hint').textContent = t('timesUp');
  $('#sCps').textContent = cps.toFixed(2);
  $('#sTime').textContent = duration+'.0s';
  const rk = rankFor(cps);
  $('#rank').innerHTML = `<span style="color:${rankColor(cps)}">${rk}</span> · ${clicks} ${t('clicks').toLowerCase()} · ${cps.toFixed(2)} ${t('cps')}`;
  history.unshift({cps: +cps.toFixed(2), clicks, mode: duration+'s', ts: Date.now()});
  if(history.length>10) history.pop();
  renderHistory();
}

function renderHistory(){
  const tb = $('#histTable').querySelector('tbody');
  if(!history.length){ tb.innerHTML = `<tr><td colspan="4" style="opacity:.5">${t('subStart')}</td></tr>`; return; }
  const best = Math.max(...history.map(h=>h.cps));
  tb.innerHTML = history.map((h,i)=>`<tr><td>${i+1}</td><td>${h.mode}</td><td style="color:${rankColor(h.cps)};font-weight:700">${h.cps.toFixed(2)}</td><td>${h.clicks}</td></tr>`).join('');
}

const arena = $('#arena');
function handleStart(){
  if(!running && !done){
    running=true; clicks=1;
    startTime=performance.now();
    $('#arena').className='cps-arena running';
    $('#big').textContent='1'; $('#big').style.color='var(--accent)';
    $('#sub').textContent=t('subRun');
    $('#hint').textContent=t('clickNow');
    rafId=requestAnimationFrame(tick);
  } else if(running){
    clicks++;
    $('#sClicks').textContent=clicks;
  } else if(done){
    reset();
  }
}
arena.addEventListener('mousedown', handleStart);
arena.addEventListener('touchstart', (e) => { e.preventDefault(); handleStart(); }, {passive:false});
// prevent context menu interfering
arena.addEventListener('contextmenu', e => e.preventDefault());

// labels
$('#sub').textContent = t('subStart');
$('#hint').textContent = t('clickToStart');
$('#lCps').textContent = t('cps');
$('#lClicks').textContent = t('clicks');
$('#lTime').textContent = t('time');
$('#lblHistory').textContent = t('history');
$('#hMode').textContent = t('mode'); $('#hCps').textContent = t('cps'); $('#hClicks').textContent = t('clicks');

$('#rankScale').innerHTML = [
  ['<5',t('rankSlow'),'#888'],
  ['5-7',t('rankAvg'),'#61afef'],
  ['7-9',t('rankGood'),'#00d672'],
  ['9-12',t('rankGreat'),'#ffb86c'],
  ['12-15',t('rankPro'),'#e94560'],
  ['15+',t('rankGod'),'#bb86fc'],
].map(([r,n,c])=>`<span class="cps-rank-pill" style="border-color:${c};color:${c}">${r} · ${n}</span>`).join('');

$('#toolbar').innerHTML = `<button class="gz-btn gz-btn-secondary" id="btnReset">${t('reset')}</button>`;
$('#btnReset').onclick = reset;

renderModes();
renderHistory();

GZ.renderToolPage({
  category: 'fun',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'⏱️', href:'/calc/timer-stopwatch.html', name:'Stopwatch'},
    {icon:'⚡', href:'/fun/reaction-time.html', name:'Reaction Time Test'},
    {icon:'⌨️', href:'/fun/typing-test.html', name:'Typing Test'},
    {icon:'🖱️', href:'/fun/mouse-tester.html', name:'Mouse Tester'},
  ]
});
</script>
<script src="/tools-result-rec.js?v=20260707v520" defer></script>
</body>
</html>
