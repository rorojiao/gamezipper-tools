<script>

    noLib: 'MP4 封装库加载失败，请刷新页面。',

const { $, t } = GZ;
let fileData = null;
let fileName = 'video';

$('#drop').addEventListener('click', () => $('#file').click());
$('#drop').addEventListener('dragover', e => { e.preventDefault(); $('#drop').classList.add('drag'); });
$('#drop').addEventListener('dragleave', () => $('#drop').classList.remove('drag'));
$('#drop').addEventListener('drop', e => {
  e.preventDefault();
  $('#drop').classList.remove('drag');
  if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
});
$('#file').addEventListener('change', e => { if (e.target.files[0]) handleFile(e.target.files[0]); });

function handleFile(file) {
  fileName = file.name.replace(/\.[^.]+$/, '');
  const url = URL.createObjectURL(file);
  $('#player').src = url;
  $('#player').style.display = 'block';
  $('#drop-text').textContent = file.name + ' (' + (file.size / 1024 / 1024).toFixed(2) + ' MB)';
  const m = Math.floor(file.duration / 60);
  $('#stats').innerHTML = `<span>${t('size')}: ${(file.size / 1024 / 1024).toFixed(2)} MB</span><span>${t('loaded')}: ✓</span>`;
  const reader = new FileReader();
  reader.onload = e => {
    fileData = e.target.result;
    fileData.fileStart = 0;
  };
  reader.readAsArrayBuffer(file);
}

function convert() {
  if (!fileData) { $('#status').innerHTML = `<span style="color:var(--gz-accent)">${t('noFile')}</span>`; return; }
  if (typeof MP4Box === 'undefined' || !MP4Box.createFile) {
    $('#status').innerHTML = `<span style="color:var(--gz-accent)">${t('noLib')}</span>`;
    return;
  }
  $('#status').innerHTML = `<span style="color:var(--text2)">${t('converting')}</span>`;
  $('#progress').style.display = 'block';
  $('#progress').value = 0.3;

  setTimeout(() => {
    try {
      const mp4File = MP4Box.createFile();
      const outChunks = [];
      mp4File.onReady = function(info) {
        mp4File.setExtractionOptions(info.tracks[0].id, null, { nbSamples: 1000 });
        mp4File.start();
      };
      mp4File.onData = function(data) {
        outChunks.push(data);
      };
      // Write input data to the parser
      const buf = fileData;
      buf.fileStart = 0;
      mp4File.appendBuffer(buf);
      mp4File.flush();
      // Serialize the output mp4
      setTimeout(() => {
        try {
          const serialized = mp4File.getBuffer();
          const blob = new Blob([serialized], { type: 'video/mp4' });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url; a.download = fileName + '.mp4';
          document.body.appendChild(a); a.click(); a.remove();
          setTimeout(() => URL.revokeObjectURL(url), 2000);
          $('#progress').value = 1;
          setTimeout(() => $('#progress').style.display = 'none', 500);
          $('#status').innerHTML = `<span style="color:var(--gz-success)">${t('done')} (${(blob.size / 1024 / 1024).toFixed(2)} MB)</span>`;
        } catch (err2) {
          $('#progress').style.display = 'none';
          $('#status').innerHTML = `<span style="color:var(--gz-accent)">Mux error: ${err2.message}</span>`;
        }
      }, 300);
    } catch (err) {
      $('#progress').style.display = 'none';
      $('#status').innerHTML = `<span style="color:var(--gz-accent)">Error: ${err.message}</span>`;
    }
  }, 50);
}

function reset() {
  fileData = null;
  $('#file').value = '';
  $('#player').src = '';
  $('#player').style.display = 'none';
  $('#progress').style.display = 'none';
  $('#stats').innerHTML = '';
  $('#status').innerHTML = '';
  $('#drop-text').textContent = t('dropText');
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="convert()">${t('convert')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="reset()">${t('clear')}</button>`;

$('#drop-text').textContent = t('dropText');
$('#note').textContent = t('noteText');
