<script>
GZI18n.register({
  en: {
    toolTitle: 'Days Until Date Calculator',
    toolDesc: 'Count down the days, weeks, months, hours and minutes until any future date. Track anniversaries, deadlines, vacations, exams and milestones.',
    target: 'Target date',
    from: 'Start date (defaults to today)',
    days: 'Days',
    weeks: 'Weeks',
    months: 'Months',
    years: 'Years',
    hours: 'Hours',
    minutes: 'Minutes',
    business: 'Business days',
    weekend: 'Weekend days',
    step1: 'Pick a target date (or use one of the preset shortcuts)',
    step2: 'Optionally adjust the start date — defaults to today',
    step3: 'See the full breakdown: days, weeks, months, hours, business days, weekend days',
    step4: 'Use the detail card to plan your timeline and milestones',
  },
  zh: {
    toolTitle: '日期倒计时计算器',
    toolDesc: '计算距离未来任意日期的天数、周数、月数、小时和分钟。用于纪念日、截止日、假期、考试等重要节点。',
    target: '目标日期',
    from: '起始日期（默认为今天）',
    days: '天',
    weeks: '周',
    months: '月',
    years: '年',
    hours: '小时',
    minutes: '分钟',
    business: '工作日',
    weekend: '周末天数',
    step1: '选择目标日期（或使用下方预设快捷按钮）',
    step2: '可选调整起始日期 — 默认为今天',
    step3: '查看完整分解：天、周、月、小时、工作日、周末天数',
    step4: '使用详情面板规划时间线和重要里程碑',
  }
});

const { t } = GZ;

const WEEKDAYS_EN = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const WEEKDAYS_ZH = ['星期日','星期一','星期二','星期三','星期四','星期五','星期六'];
const MONTHS_EN = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const MONTHS_ZH = ['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];

const today = new Date();
const todayStr = today.toISOString().split('T')[0];
document.getElementById('from').value = todayStr;
document.getElementById('target').value = (() => {
  const d = new Date(); d.setMonth(d.getMonth() + 3);
  return d.toISOString().split('T')[0];
})();

const PRESETS = [
  { label: 'New Year', labelZh: '元旦', months: 0, day: 1, month: 0 },
  { label: 'Valentine\'s', labelZh: '情人节', day: 14, month: 1 },
  { label: 'Spring Festival', labelZh: '春节', day: 1, month: 1, lunar: true },
  { label: 'Easter', labelZh: '复活节', day: 31, month: 2 },
  { label: 'Halloween', labelZh: '万圣节', day: 31, month: 9 },
  { label: 'Christmas', labelZh: '圣诞节', day: 25, month: 11 },
  { label: '+1 Week', labelZh: '+1 周', days: 7 },
  { label: '+1 Month', labelZh: '+1 月', months: 1 },
  { label: '+1 Year', labelZh: '+1 年', years: 1 },
  { label: '+100 Days', labelZh: '+100 天', days: 100 },
];

function renderPresets() {
  const lang = GZI18n.getLang();
  document.getElementById('presets').innerHTML = PRESETS.map((p,i) => {
    const lbl = lang==='zh' ? p.labelZh : p.label;
    return `<div class="du-preset" data-i="${i}">${lbl}</div>`;
  }).join('');
  document.querySelectorAll('.du-preset').forEach(el => {
    el.addEventListener('click', () => {
      const p = PRESETS[+el.dataset.i];
      const d = new Date();
      if (p.years) d.setFullYear(d.getFullYear() + p.years);
      if (p.months) d.setMonth(d.getMonth() + p.months);
      if (p.days) d.setDate(d.getDate() + p.days);
      if (p.day !== undefined) d.setMonth(p.month);
      if (p.day !== undefined) d.setDate(p.day);
      document.getElementById('target').value = d.toISOString().split('T')[0];
      calc();
    });
  });
}

function calc() {
  const target = new Date(document.getElementById('target').value);
  const from = new Date(document.getElementById('from').value);
  if (isNaN(target) || isNaN(from)) return;
  
  const ms = target.getTime() - from.getTime();
  const sign = ms < 0 ? -1 : 1;
  const absMs = Math.abs(ms);
  
  const days = Math.floor(absMs / 86400000);
  const weeks = Math.floor(days / 7);
  const months = (target.getFullYear() - from.getFullYear()) * 12 + (target.getMonth() - from.getMonth()) - (target.getDate() < from.getDate() ? 1 : 0);
  const years = target.getFullYear() - from.getFullYear() - (target.getMonth() < from.getMonth() || (target.getMonth() === from.getMonth() && target.getDate() < from.getDate()) ? 1 : 0);
  const hours = Math.floor(absMs / 3600000);
  const minutes = Math.floor(absMs / 60000);
  const seconds = Math.floor(absMs / 1000);
  
  // Business days and weekends
  let biz = 0, wknd = 0;
  const cur = new Date(from);
  const end = new Date(target);
  const step = sign;
  while ((step > 0 && cur < end) || (step < 0 && cur > end)) {
    const dow = cur.getDay();
    if (dow === 0 || dow === 6) wknd++;
    else biz++;
    cur.setDate(cur.getDate() + step);
  }
  
  const lang = GZI18n.getLang();
  const wd = lang==='zh' ? WEEKDAYS_ZH[target.getDay()] : WEEKDAYS_EN[target.getDay()];
  const mo = lang==='zh' ? MONTHS_ZH[target.getMonth()] : MONTHS_EN[target.getMonth()];
  
  document.getElementById('main').innerHTML = `
    <div class="du-big"><span class="num">${sign>0?days:-days}</span><div class="lbl">${t('days')}</div></div>
    <div class="du-big"><span class="num">${sign>0?weeks:-weeks}</span><div class="lbl">${t('weeks')}</div></div>
    <div class="du-big"><span class="num">${sign>0?Math.abs(months):-Math.abs(months)}</span><div class="lbl">${t('months')}</div></div>
    <div class="du-big"><span class="num">${sign>0?years:-years}</span><div class="lbl">${t('years')}</div></div>
    <div class="du-big"><span class="num">${sign>0?hours.toLocaleString():(-hours).toLocaleString()}</span><div class="lbl">${t('hours')}</div></div>
    <div class="du-big"><span class="num">${sign>0?minutes.toLocaleString():(-minutes).toLocaleString()}</span><div class="lbl">${t('minutes')}</div></div>
  `;
  
  document.getElementById('detail').innerHTML = `
    <div class="row"><span class="k">${lang==='zh'?'目标日期':'Target date'}</span><span class="v">${wd}, ${mo} ${target.getDate()}, ${target.getFullYear()}</span></div>
    <div class="row"><span class="k">${lang==='zh'?'起算日期':'Start date'}</span><span class="v">${from.toISOString().split('T')[0]}</span></div>
    <div class="row"><span class="k">${lang==='zh'?'总秒数':'Total seconds'}</span><span class="v">${sign>0?seconds.toLocaleString():(-seconds).toLocaleString()}</span></div>
    <div class="row"><span class="k">${t('business')}</span><span class="v">${sign>0?biz:-biz}</span></div>
    <div class="row"><span class="k">${t('weekend')}</span><span class="v">${sign>0?wknd:-wknd}</span></div>
    <div class="row"><span class="k">${lang==='zh'?'星期几':'Day of week'}</span><span class="v">${wd}</span></div>
  `;
  
  const tip = document.getElementById('tip');
  if (sign > 0) {
    tip.innerHTML = `🎯 ${lang==='zh'?`距离目标还有 ${days} 天 (${weeks} 周 ${days%7} 天)`:`${days} days, ${weeks} weeks and ${days%7} days to go`} — ${lang==='zh'?'把握时间，达成目标！':'Make the most of every day!'}`;
  } else {
    tip.innerHTML = `⏰ ${lang==='zh'?`已过去 ${-days} 天 (${-weeks} 周 ${(-days)%7} 天)`:`${-days} days have passed (${-weeks} weeks and ${(-days)%7} days)`} — ${lang==='zh'?'回顾这段时光所经历的事':'Look back at what has happened'}`;
  }
}

renderPresets();
calc();
['target','from'].forEach(id => document.getElementById(id).addEventListener('change', calc));
['target','from'].forEach(id => document.getElementById(id).addEventListener('input', calc));

setInterval(calc, 60000);

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📅', href:'/calc/date-calculator.html', name:'Date Calculator'},
    {icon:'🎂', href:'/calc/age-calculator.html', name:'Age Calculator'},
    {icon:'📆', href:'/calc/business-day.html', name:'Business Day Calculator'},
    {icon:'⏰', href:'/calc/hours-calculator.html', name:'Hours Calculator'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
