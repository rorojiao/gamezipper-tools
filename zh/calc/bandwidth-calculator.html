<div class="gz-container">

  <div class="gz-tool-area">
    <div class="mode-tabs" id="mode-tabs"></div>
    <div id="fields-time">
      <div class="field-row">
        <div><label id="lbl-fsize"></label><input type="number" id="file-size" class="gz-input" value="1" step="any" min="0"></div>
        <div><label id="lbl-funit"></label>

        </div>
        <div><label id="lbl-speed"></label><input type="number" id="speed" class="gz-input" value="100" step="any" min="0"></div>
        <div><label id="lbl-sunit"></label>
          <select id="speed-unit" class="gz-select">

            <option value="Mbps" selected>Mbps</option>
            <option value="Gbps">Gbps</option>

        <div><label id="lbl-fsize2"></label><input type="number" id="file-size2" class="gz-input" value="1" step="any" min="0"></div>
        <div><label id="lbl-funit2"></label>
          <select id="file-unit2" class="gz-select">
            <option value="KB">KB</option>
            <option value="MB" selected>MB</option>
            <option value="GB">GB</option>
            <option value="TB">TB</option>
          </select>
        </div>
        <div><label id="lbl-hours"></label><input type="number" id="time-hours" class="gz-input" value="0" step="any" min="0"></div>
        <div><label id="lbl-mins"></label><input type="number" id="time-mins" class="gz-input" value="1" step="any" min="0"></div>
        <div><label id="lbl-secs"></label><input type="number" id="time-secs" class="gz-input" value="0" step="any" min="0"></div>
      </div>
    </div>

    <div id="status"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Bandwidth Calculator',
    toolDesc: 'Calculate download/upload time from file size and speed, or find the speed needed to transfer a file within a time limit. Free, browser-only.',
    modeTime: 'Time from Speed',
    modeSpeed: 'Speed from Time',
    fileSize: 'File Size',
    speed: 'Connection Speed',
    hours: 'Hours',
    mins: 'Minutes',
    secs: 'Seconds',
    step1: 'Pick a mode: estimate transfer time, or required speed',
    step2: 'Enter your file size (KB, MB, GB, TB)',
    step3: 'Enter the speed (Mbps) or the time limit',
    step4: 'Read the result instantly — adjust any value to recalculate',
    resTime: 'Estimated transfer time',
    resSpeed: 'Required connection speed',
    realWorld: 'Note: real-world throughput is usually 70-90% of advertised speed due to overhead.',
  },
  zh: {
    toolTitle: '带宽计算器',
    toolDesc: '根据文件大小和网速计算下载/上传时间，或计算在限定时间内完成传输所需的速度。免费、浏览器本地运行。',
    modeTime: '由速度算时间',
    modeSpeed: '由时间算速度',
    fileSize: '文件大小',
    speed: '连接速度',
    hours: '小时',
    mins: '分钟',
    secs: '秒',
    step1: '选择模式：估算传输时间或所需速度',
    step2: '输入文件大小（KB、MB、GB、TB）',
    step3: '输入速度（Mbps）或时间限制',
    step4: '即时查看结果 — 调整任意值即可重新计算',
    resTime: '预计传输时间',
    resSpeed: '所需连接速度',
    realWorld: '提示：实际传输速度通常为标称速度的 70-90%，因协议开销而异。',
  }
});

const { $, t } = GZ;
let mode = 'time';

const FILE_FACTORS = { KB:1e3, MB:1e6, GB:1e9, TB:1e12 }; // bytes
// speed in bits per second
const SPEED_FACTORS = { Kbps:1e3, Mbps:1e6, Gbps:1e9, KBps:8e3, MBps:8e6 };

const PRESETS = [
  { label: '10 Mbps', speed: 10, unit: 'Mbps' },
  { label: '50 Mbps', speed: 50, unit: 'Mbps' },
  { label: '100 Mbps', speed: 100, unit: 'Mbps' },
  { label: '300 Mbps', speed: 300, unit: 'Mbps' },
  { label: '500 Mbps', speed: 500, unit: 'Mbps' },
  { label: '1 Gbps', speed: 1, unit: 'Gbps' },
];

function formatDuration(seconds) {
  if (!isFinite(seconds) || seconds < 0) return '—';
  if (seconds === 0) return '0 s';
  if (seconds < 1) return (seconds * 1000).toFixed(0) + ' ms';
  if (seconds < 60) return seconds.toFixed(1) + ' s';
  const h = Math.floor(seconds / 3600);
  const m = Math.floor((seconds % 3600) / 60);
  const s = Math.floor(seconds % 60);
  const parts = [];
  if (h > 0) parts.push(h + ' h');
  if (m > 0) parts.push(m + ' min');
  if (s > 0) parts.push(s + ' s');
  return parts.join(' ');
}

function formatSpeed(bps) {
  if (!isFinite(bps) || bps <= 0) return '—';
  if (bps >= 1e9) return (bps / 1e9).toFixed(2) + ' Gbps (' + (bps / 8e6).toFixed(2) + ' MB/s)';
  if (bps >= 1e6) return (bps / 1e6).toFixed(2) + ' Mbps (' + (bps / 8e6).toFixed(2) + ' MB/s)';
  if (bps >= 1e3) return (bps / 1e3).toFixed(2) + ' Kbps (' + (bps / 8e3).toFixed(2) + ' KB/s)';
  return bps.toFixed(0) + ' bps';
}

function calcTime() {
  const size = parseFloat($('#file-size').value);
  const sUnit = $('#file-unit').value;
  const speed = parseFloat($('#speed').value);
  const spUnit = $('#speed-unit').value;
  if (isNaN(size) || isNaN(speed) || size <= 0 || speed <= 0) {
    $('#result').innerHTML = `<div class="big">—</div><div class="sub">${t('resTime')}</div>`;
    return;
  }
  const bytes = size * FILE_FACTORS[sUnit];
  const bits = bytes * 8;
  const bps = speed * SPEED_FACTORS[spUnit];
  const seconds = bits / bps;
  $('#result').innerHTML = `<div class="big">${formatDuration(seconds)}</div><div class="sub">${t('resTime')} · ${formatSpeed(bps)} · ${(bytes/1e6).toFixed(2)} MB</div>`;
  $('#status').textContent = t('realWorld');
}

function calcSpeed() {
  const size = parseFloat($('#file-size2').value);
  const sUnit = $('#file-unit2').value;
  const h = parseFloat($('#time-hours').value) || 0;
  const m = parseFloat($('#time-mins').value) || 0;
  const s = parseFloat($('#time-secs').value) || 0;
  const seconds = h * 3600 + m * 60 + s;
  if (isNaN(size) || size <= 0 || seconds <= 0) {
    $('#result').innerHTML = `<div class="big">—</div><div class="sub">${t('resSpeed')}</div>`;
    return;
  }
  const bytes = size * FILE_FACTORS[sUnit];
  const bits = bytes * 8;
  const bps = bits / seconds;
  $('#result').innerHTML = `<div class="big">${formatSpeed(bps)}</div><div class="sub">${t('resSpeed')} · in ${formatDuration(seconds)}</div>`;
  $('#status').textContent = t('realWorld');
}

function recalc() { mode === 'time' ? calcTime() : calcSpeed(); }

function setMode(m) {
  mode = m;
  document.querySelectorAll('.mode-tab').forEach(el => el.classList.toggle('active', el.dataset.mode === m));
  $('#fields-time').style.display = m === 'time' ? '' : 'none';
  $('#fields-speed').style.display = m === 'speed' ? '' : 'none';
  recalc();
}

$('#mode-tabs').innerHTML = `
  <div class="mode-tab active" data-mode="time">${t('modeTime')}</div>
  <div class="mode-tab" data-mode="speed">${t('modeSpeed')}</div>`;
document.querySelectorAll('.mode-tab').forEach(el => el.onclick = () => setMode(el.dataset.mode));

const presetRow = $('#presets');
PRESETS.forEach(p => {
  const btn = document.createElement('div');
  btn.className = 'preset-btn';
  btn.textContent = p.label;
  btn.onclick = () => { $('#speed').value = p.speed; $('#speed-unit').value = p.unit; recalc(); };
  presetRow.appendChild(btn);
});

['file-size','file-unit','speed','speed-unit','file-size2','file-unit2','time-hours','time-mins','time-secs'].forEach(id => {
  const el = $('#' + id);
  if (el) el.addEventListener('input', recalc);
});

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📊', href:'/calc/image-file-size.html', name:'Image File Size'},
    {icon:'🔢', href:'/calc/percentage-calculator.html', name:'Percentage'},
    {icon:'🏦', href:'/calc/loan-calculator.html', name:'Loan Calculator'},
    {icon:'📐', href:'/calc/aspect-ratio.html', name:'Aspect Ratio'},
  ]
});

recalc();
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
