const { $, t } = GZ;
let frames = []; // [{ dataUrl, delay }]
let gifWidth = 0, gifHeight = 0;
let fileName = 'frames';

// Minimal GIF decoder — supports 89a, LZW, variable codes, transparency, disposal.
// Based on a compact public-domain implementation.
function decodeGif(arrayBuffer) {
  return new Promise((resolve, reject) => {
    const bytes = new Uint8Array(arrayBuffer);
    let p = 0;
    const readByte = () => bytes[p++];
    const readU16 = () => bytes[p++] | (bytes[p++] << 8);
    const readBytes = (n) => bytes.slice(p, p += n);
    // Header
    const sig = String.fromCharCode(bytes[0], bytes[1], bytes[2], bytes[3], bytes[4], bytes[5]);
    if (sig.slice(0, 3) !== 'GIF') return reject(new Error('Not a GIF'));
    // Logical screen descriptor
    const width = readU16();
    const height = readU16();
    const packed = readByte();
    const bgColorIdx = readByte();
    const pixelAspect = readByte();
    const hasGCT = !!(packed & 0x80);
    const gctSize = hasGCT ? (2 << (packed & 0x07)) : 0;
    const gct = hasGCT ? parsePalette(readBytes(gctSize * 3)) : null;
    // Frame state
    const frames = [];
    let disposal = 0;
    let transparentIdx = null;
    let delay = 0;
    const canvas = document.createElement('canvas');
    canvas.width = width; canvas.height = height;
    const ctx = canvas.getContext('2d');
    let prevImageData = null;

    function parsePalette(arr) {
      const pal = [];
      for (let i = 0; i < arr.length; i += 3) {
        pal.push([arr[i], arr[i+1], arr[i+2], 255]);
      }
      return pal;
    }

    function lzw(minCodeSize, data) {
      const clearCode = 1 << minCodeSize;
      const endCode = clearCode + 1;
      let codeSize = minCodeSize + 1;
      let dict = [];
      function resetDict() {
        dict = [];
        for (let i = 0; i < clearCode; i++) dict.push(String.fromCharCode(i));
        dict.push(''); dict.push(''); // clear, end
        codeSize = minCodeSize + 1;
      }
      resetDict();
      const output = [];
      let bitBuf = 0, bitCount = 0, prevCode = null;
      let pos = 0;
      while (pos < data.length || bitCount >= codeSize) {
        while (bitCount < codeSize && pos < data.length) {
          bitBuf |= data[pos++] << bitCount;
          bitCount += 8;
        }
        if (bitCount < codeSize) break;
        const code = bitBuf & ((1 << codeSize) - 1);
        bitBuf >>= codeSize;
        bitCount -= codeSize;
        if (code === clearCode) { resetDict(); prevCode = null; continue; }
        if (code === endCode) break;
        let entry;
        if (code < dict.length) {
          entry = dict[code];
          if (prevCode !== null) dict.push(dict[prevCode] + entry[0]);
        } else if (prevCode !== null) {
          entry = dict[prevCode] + dict[prevCode][0];
          dict.push(entry);
        } else {
          break;
        }
        prevCode = code;
        for (let i = 0; i < entry.length; i++) output.push(entry.charCodeAt(i));
      }
      return output;
    }

    function readSubBlocks() {
      const out = [];
      while (true) {
        const size = bytes[p++];
        if (size === 0) break;
        for (let i = 0; i < size; i++) out.push(bytes[p + i]);
        p += size;
      }
      return out;
    }

    function skipSubBlocks() {
      while (true) {
        const size = bytes[p++];
        if (size === 0) break;
        p += size;
      }
    }

    // Main parse loop
    while (p < bytes.length) {
      const b = bytes[p++];
      if (b === 0x21) { // Extension
        const label = bytes[p++];
        if (label === 0xF9) { // Graphic Control Extension
          const blockSize = bytes[p++];
          const pk = bytes[p++];
          disposal = (pk >> 2) & 0x07;
          delay = bytes[p++] | (bytes[p++] << 8);
          const ti = bytes[p++];
          p++; // terminator
          transparentIdx = (pk & 0x01) ? ti : null;
        } else if (label === 0xFF) { // Application extension
          skipSubBlocks();
        } else {
          skipSubBlocks();
        }
      } else if (b === 0x2C) { // Image descriptor
        const x = readU16(), y = readU16(), w = readU16(), h = readU16();
        const ip = readByte();
        const hasLCT = !!(ip & 0x80);
        const interlaced = !!(ip & 0x40);
        const lctSize = hasLCT ? (2 << (ip & 0x07)) : 0;
        const palette = hasLCT ? parsePalette(readBytes(lctSize * 3)) : gct;
        const minCodeSize = bytes[p++];
        const compressed = readSubBlocks();
        const indices = lzw(minCodeSize, compressed);
        // Build image data
        const frame = ctx.createImageData(width, height);
        if (disposal === 3 && prevImageData) {
          frame.data.set(prevImageData.data);
        }
        // For disposal 1/0, frame starts as what's already on canvas (we re-fetch)
        if ((disposal === 0 || disposal === 1)) {
          const current = ctx.getImageData(0, 0, width, height);
          frame.data.set(current.data);
        }
        const rowOff = interlaced ? buildInterlaceOrder(h) : null;
        for (let i = 0; i < indices.length; i++) {
          const idx = indices[i];
          let px = i % w, py = Math.floor(i / w);
          if (interlaced) py = rowOff[py];
          if (py >= h) continue;
          const fx = x + px, fy = y + py;
          if (fx >= width || fy >= height) continue;
          if (transparentIdx !== null && idx === transparentIdx) continue;
          const c = palette[idx] || [0,0,0,255];
          const di = (fy * width + fx) * 4;
          frame.data[di] = c[0];
          frame.data[di+1] = c[1];
          frame.data[di+2] = c[2];
          frame.data[di+3] = c[3];
        }
        ctx.putImageData(frame, 0, 0);
        // Save snapshot
        const snap = ctx.getImageData(0, 0, width, height);
        const tmp = document.createElement('canvas');
        tmp.width = width; tmp.height = height;
        tmp.getContext('2d').putImageData(snap, 0, 0);
        frames.push({ dataUrl: tmp.toDataURL('image/png'), delay });
        // Handle disposal for next frame
        if (disposal === 2 || disposal === 3) {
          // restore to background (or previous for 3)
          if (disposal === 2) {
            ctx.clearRect(x, y, w, h);
          } else if (prevImageData) {
            ctx.putImageData(prevImageData, 0, 0);
          }
        } else {
          prevImageData = ctx.getImageData(0, 0, width, height);
        }
      } else if (b === 0x3B) { // Trailer
        break;
      }
    }
    resolve({ frames, width, height });
  });
}

function buildInterlaceOrder(h) {
  const order = new Array(h);
  let y = 0, pass = 0;
  const passes = [8, 8, 4, 2];
  const starts = [0, 4, 2, 1];
  for (let p = 0; p < 4; p++) {
    for (let yy = starts[p]; yy < h; yy += passes[p]) {
      order[yy] = yy;
    }
  }
  return order;
}

async function loadFile(file) {
  if (!file || file.type !== 'image/gif') { $('#status').textContent = '⚠️ ' + t('notGif'); return; }
  fileName = file.name.replace(/\.gif$/i, '') || 'frames';
  $('#status').textContent = '⏳ ' + t('dropHint');
  try {
    const buf = await file.arrayBuffer();
    const result = await decodeGif(buf);
    frames = result.frames;
    gifWidth = result.width;
    gifHeight = result.height;
    if (frames.length < 2) { $('#status').textContent = '⚠️ ' + t('noFrames'); }
    $('#drop-text').innerHTML = `<b>${file.name}</b> · ${result.width}×${result.height} · ${frames.length} ${t('frames')}`;
    $('#opts').style.display = 'flex';
    renderToolbar();
    renderFrames();
  } catch (e) {
    $('#status').textContent = '⚠️ ' + e.message;
  }
}

function renderFrames() {
  const grid = $('#frame-grid');
  grid.innerHTML = '';
  const flatten = $('#optFlatten').checked;
  const scale = Math.max(0.1, Math.min(4, parseFloat($('#optScale').value) || 1));
  frames.forEach((f, i) => {
    const card = document.createElement('div');
    card.className = 'frame-card';
    const thumb = document.createElement('div');
    thumb.className = 'thumb';
    const img = document.createElement('img');
    img.alt = `Frame ${i+1}`;
    if (flatten || scale !== 1) {
      const tmp = document.createElement('canvas');
      tmp.width = Math.max(1, Math.round(gifWidth * scale));
      tmp.height = Math.max(1, Math.round(gifHeight * scale));
      const tctx = tmp.getContext('2d');
      if (flatten) { tctx.fillStyle = '#fff'; tctx.fillRect(0,0,tmp.width,tmp.height); }
      const src = new Image();
      src.onload = () => { tctx.drawImage(src, 0, 0, tmp.width, tmp.height); img.src = tmp.toDataURL('image/png'); };
      src.src = f.dataUrl;
    } else {
      img.src = f.dataUrl;
    }
    thumb.appendChild(img);
    card.appendChild(thumb);
    const meta = document.createElement('div');
    meta.className = 'meta';
    const delay = f.delay ? (f.delay / 100).toFixed(2) + 's' : '—';
    meta.innerHTML = `<span>#${i+1} · ${delay}</span>`;
    const dl = document.createElement('a');
    dl.href = '#'; dl.textContent = '⬇️';
    dl.onclick = (e) => {
      e.preventDefault();
      const src = img.src;
      const a = document.createElement('a');
      a.href = src; a.download = `${fileName}_${String(i+1).padStart(3,'0')}.png`;
      a.click();
    };
    meta.appendChild(dl);
    card.appendChild(meta);
    grid.appendChild(card);
  });
}

function renderToolbar() {
  $('#toolbar').style.display = 'flex';
  $('#toolbar').innerHTML = `
    <button class="gz-btn" id="dl-all">${t('downloadAll')}</button>
    <button class="gz-btn gz-btn-secondary" id="reset">${t('reset')}</button>`;
  $('#dl-all').onclick = downloadAllZip;
  $('#reset').onclick = () => {
    frames = []; $('#frame-grid').innerHTML = ''; $('#toolbar').style.display='none'; $('#opts').style.display='none';
    $('#status').textContent=''; $('#file-input').value=''; $('#drop-text').textContent=t('dropHere');
  };
}

async function downloadAllZip() {
  if (frames.length === 0) return;
  $('#status').textContent = '⏳ Zipping...';
  // Minimal ZIP writer (store, no compression)
  const files = [];
  for (let i = 0; i < frames.length; i++) {
    const blob = await (await fetch(frames[i].dataUrl)).blob();
    files.push({ name: `${fileName}_${String(i+1).padStart(3,'0')}.png`, data: new Uint8Array(await blob.arrayBuffer()) });
  }
  const zipBytes = buildZip(files);
  const blob = new Blob([zipBytes], { type: 'application/zip' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `${fileName}_frames.zip`;
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 5000);
  $('#status').textContent = `✓ ${files.length} frames zipped`;
}

function buildZip(files) {
  // CRC32
  const crcTable = (() => {
    const t = new Uint32Array(256);
    for (let i = 0; i < 256; i++) {
      let c = i;
      for (let k = 0; k < 8; k++) c = (c & 1) ? (0xEDB88320 ^ (c >>> 1)) : (c >>> 1);
      t[i] = c >>> 0;
    }
    return t;
  })();
  function crc32(buf) {
    let c = 0xFFFFFFFF;
    for (let i = 0; i < buf.length; i++) c = crcTable[(c ^ buf[i]) & 0xFF] ^ (c >>> 8);
    return (c ^ 0xFFFFFFFF) >>> 0;
  }
  function str(s) { return new TextEncoder().encode(s); }
  function u16(n) { return [n & 0xff, (n >>> 8) & 0xff]; }
  function u32(n) { return [n & 0xff, (n >>> 8) & 0xff, (n >>> 16) & 0xff, (n >>> 24) & 0xff]; }
  const chunks = [];
  const central = [];
  let offset = 0;
  for (const f of files) {
    const name = str(f.name);
    const crc = crc32(f.data);
    const local = [].concat(
      u32(0x04034b50), u16(20), u16(0x0800), u16(0), u16(0), u16(0),
      u32(crc), u32(f.data.length), u32(f.data.length),
      u16(name.length), u16(0),
      Array.from(name),
      Array.from(f.data)
    );
    central.push([].concat(
      u32(0x02014b50), u16(20), u16(20), u16(0x0800), u16(0), u16(0), u16(0),
      u32(crc), u32(f.data.length), u32(f.data.length),
      u16(name.length), u16(0), u16(0), u16(0), u16(0), u32(0), u32(offset),
      Array.from(name)
    ));
    chunks.push(new Uint8Array(local));
    offset += local.length;
  }
  const cdStart = offset;
  let cdSize = 0;
  central.forEach(c => { chunks.push(new Uint8Array(c)); cdSize += c.length; });
  const end = [].concat(
    u32(0x06054b50), u16(0), u16(0), u16(files.length), u16(files.length),
    u32(cdSize), u32(cdStart), u16(0)
  );
  chunks.push(new Uint8Array(end));
  // Concat
  const total = chunks.reduce((a, c) => a + c.length, 0);
  const out = new Uint8Array(total);
  let o = 0;
  chunks.forEach(c => { out.set(c, o); o += c.length; });
  return out;
}
