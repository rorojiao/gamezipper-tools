<script>
GZI18n.register({
  en: {
    toolTitle: 'Remove Emojis from Text',
    toolDesc: 'Strip emojis, emoticons and symbols from any text instantly. Toggle extra options and extract removed emojis. Pure browser, no upload.',
    lblIn: 'Paste text with emojis',
    lblOut: 'Cleaned text (no emojis)',
    lblExtracted: 'Extracted emojis',
    remove: 'Remove Emojis',
    copy: 'Copy',
    clear: 'Clear',
    optSpace: 'Collapse extra spaces',
    optNewline: 'Trim blank lines',
    optSymbol: 'Also remove dingbats & symbols (♥★♪)',
    statEmpty: 'Enter text above to start',
    statRemoved: '<b>%n</b> emoji(s) removed',
    statNone: 'No emojis found in the text',
    step1: 'Paste the text containing emojis into the input box',
    step2: 'Toggle options to collapse spaces or remove symbols',
    step3: 'Copy the cleaned text from the output area',
    step4: 'Grab extracted emojis from the lower panel if needed',
  },
  zh: {
    toolTitle: '去除文本中的 Emoji',
    toolDesc: '即时从任意文本中去除 emoji、颜文字和符号。支持额外选项并可提取被移除的 emoji。纯浏览器运行，无需上传。',
    lblIn: '粘贴包含 emoji 的文本',
    lblOut: '清洁后的文本（无 emoji）',
    lblExtracted: '提取出的 emoji',
    remove: '去除 Emoji',
    copy: '复制',
    clear: '清空',
    optSpace: '合并多余空格',
    optNewline: '删除空行',
    optSymbol: '同时去除装饰符号（♥★♪）',
    statEmpty: '在上方输入文本开始',
    statRemoved: '已移除 <b>%n</b> 个 emoji',
    statNone: '文本中未发现 emoji',
    step1: '将包含 emoji 的文本粘贴到输入框',
    step2: '勾选选项以合并空格或去除符号',
    step3: '从输出区复制清洁后的文本',
    step4: '如需保留 emoji，可从下方面板提取',
  }
});

const { $, copyText, t } = GZ;

// Comprehensive emoji regex covering key Unicode emoji blocks + variation selectors + ZWJ
const EMOJI_RE = /[\u{1F1E6}-\u{1F1FF}]{2}|[\u{1F300}-\u{1F5FF}\u{1F600}-\u{1F64F}\u{1F680}-\u{1F6FF}\u{1F700}-\u{1F77F}\u{1F780}-\u{1F7FF}\u{1F800}-\u{1F8FF}\u{1F900}-\u{1F9FF}\u{1FA00}-\u{1FA6F}\u{1FA70}-\u{1FAFF}\u{2600}-\u{26FF}\u{2700}-\u{27BF}\u{2B00}-\u{2BFF}\u{2190}-\u{21FF}\u{2B05}-\u{2B07}\u{FE0F}\u{200D}]/gu;
const SYMBOL_RE = /[\u{2190}-\u{21FF}\u{2200}-\u{22FF}\u{2300}-\u{23FF}\u{25A0}-\u{25FF}\u{2600}-\u{26FF}\u{2700}-\u{27BF}\u{2B00}-\u{2BFF}\u{FE0F}]/gu;

function process(){
  const txt = $('#input').value;
  if(!txt){ $('#output').textContent=''; $('#stat').textContent=t('statEmpty'); $('#extracted').textContent=''; return; }
  const re = $('#opt-symbol').checked ? SYMBOL_RE : EMOJI_RE;
  const extracted = txt.match(re) || [];
  let cleaned = txt.replace(re,'');
  if($('#opt-space').checked) cleaned = cleaned.replace(/[ \t]{2,}/g,' ').replace(/ ([\n.!?])/g,'$1');
  if($('#opt-newline').checked) cleaned = cleaned.replace(/\n{3,}/g,'\n\n').replace(/^\n+|\n+$/g,'');
  $('#output').textContent = cleaned;
  $('#extracted').textContent = extracted.join(' ');
  if(extracted.length) $('#stat').innerHTML = t('statRemoved').replace('%n',extracted.length);
  else $('#stat').innerHTML = t('statNone');
}

function doClear(){ $('#input').value=''; process(); }

$('#opts').innerHTML = `
  <label><input type="checkbox" id="opt-space"> ${t('optSpace')}</label>
  <label><input type="checkbox" id="opt-newline"> ${t('optNewline')}</label>
  <label><input type="checkbox" id="opt-symbol"> ${t('optSymbol')}</label>`;

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

$('#lbl-in').textContent = t('lblIn');
$('#lbl-out').textContent = t('lblOut');
$('#lbl-extracted').textContent = t('lblExtracted');
$('#input').placeholder = t('lblIn');
$('#stat').textContent = t('statEmpty');

$('#input').addEventListener('input', process);
$('#opts').addEventListener('change', process);

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],

    {icon:'🔢', href:'/text/word-counter.html', name:'Word Counter'},
    {icon:'🌐', href:'/text/remove-accents.html', name:'Remove Accents'},
    {icon:'🧹', href:'/text/remove-duplicates.html', name:'Remove Dup Lines'},
    {icon:'↕️', href:'/text/add-line-numbers.html', name:'Add Line Numbers'},
  ]
});
</script>
