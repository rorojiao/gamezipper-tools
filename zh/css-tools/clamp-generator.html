<script type="application/ld+json">{"@context":"https://schema.org","@type":"WebApplication","name":"CSS Clamp() Generator","description":"Generate CSS clamp() values for responsive font sizes, spacing and layout. Set min, preferred (vw), and max sizes with live preview at any viewport width. Free browser-based tool.","url": "https://tools.gamezipper.com/zh/css-tools/clamp-generator.html","applicationCategory":"Utility","operatingSystem":"Web Browser","offers":{"@type":"Offer","price":"0"}}</script>
<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is CSS clamp()?", "acceptedAnswer": {"@type": "Answer", "text": "CSS clamp() takes three values: a minimum, a preferred (often in vw units), and a maximum. The browser picks the preferred value, but it cannot go below the minimum or above the maximum. This lets you create fluid typography that scales with the viewport without media queries."}}, {"@type": "Question", "name": "Why use vw units for the preferred value?", "acceptedAnswer": {"@type": "Answer", "text": "Viewport width (vw) units are relative to the screen size, so a value like 5vw means 5% of the viewport width. Combined with a min and max, this creates smooth scaling. The formula is often: clamp(min, preferred_vw + offset_rem, max) which uses a slope + intercept approach for precise control."}}, {"@type": "Question", "name": "How do I choose min and max values?", "acceptedAnswer": {"@type": "Answer", "text": "A common pattern is to set the min for mobile (around 320px wide) and the max for desktop (around 1280px wide). The preferred value smoothly interpolates between them. For body text, 16-18px is typical on mobile and 18-22px on desktop. For headings, scale up the range."}}, {"@type": "Question", "name": "Is clamp() supported in all browsers?", "acceptedAnswer": {"@type": "Answer", "text": "clamp() is supported in all modern browsers released after 2020 — Chrome 79+, Firefox 75+, Safari 13.1+, Edge 79+. For older browsers, use a fallback static value first, then clamp() as the second declaration: font-size: 16px; font-size: clamp(16px, 4vw, 24px);"}}]}</script>

<script>
GZI18n.register({
  en: {
    toolTitle: 'CSS Clamp() Generator',
    toolDesc: 'Generate CSS clamp() values for fluid responsive typography. Set min, preferred (vw), and max with live preview at any viewport width. No media queries needed.',
    infoHtml: '<b>💡 The fluid formula:</b> <code>clamp(<i>min</i>, <i>vw + rem</i>, <i>max</i>)</code> scales smoothly between a small and large screen, clamped at the boundaries. The viewport slider below lets you test the value at any screen width.',
    lblSizing: 'Size configuration',
    lblMin: 'Minimum size',
    lblPref: 'Preferred (vw)',
    lblMax: 'Maximum size',
    lblBp: 'Breakpoints',
    lblPreview: 'Live preview',
    lblVpAt: 'Preview at viewport width:',
    lblOutput: 'Generated CSS',
    lblChart: 'Scaling chart',
    copy: 'Copy CSS',
    example: 'Load example',
    reset: 'Reset',
    step1: 'Set the minimum size (smallest screen, usually mobile)',
    step2: 'Set the preferred scaling in vw (1vw = 1% of viewport width)',
    step3: 'Set the maximum size (largest screen, usually desktop)',
    step4: 'Copy the clamp() value and paste it into your font-size property',
  },
  zh: {
    toolTitle: 'CSS Clamp() 生成器',
    toolDesc: '生成 CSS clamp() 值，用于流体响应式排版。设置最小、首选 (vw) 和最大值，在任意视口宽度下实时预览。无需媒体查询。',
    infoHtml: '<b>💡 流体公式：</b> <code>clamp(<i>min</i>, <i>vw + rem</i>, <i>max</i>)</code> 在大小屏幕之间平滑缩放，并在边界处截断。下方的视口滑块可让您测试任意屏幕宽度下的值。',
    lblSizing: '尺寸配置',
    lblMin: '最小尺寸',
    lblPref: '首选 (vw)',
    lblMax: '最大尺寸',
    lblBp: '断点',
    lblPreview: '实时预览',
    lblVpAt: '在以下视口宽度预览：',
    lblOutput: '生成的 CSS',
    lblChart: '缩放图表',
    copy: '复制 CSS',
    example: '加载示例',
    reset: '重置',
    step1: '设置最小尺寸（最小屏幕，通常为移动端）',
    step2: '设置首选缩放 vw（1vw = 视口宽度的 1%）',
    step3: '设置最大尺寸（最大屏幕，通常为桌面端）',
    step4: '复制 clamp() 值并粘贴到 font-size 属性中',
  }
});

const { $, copyText, t } = GZ;
const ids = ['minSize','prefVw','maxSize','bpMin','bpMax','vpWidth'];
ids.forEach(id => {
  const el = $('#'+id);
  el.addEventListener('input', update);
});

function escapeHtml(s) { return (s||'').toString().replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function calcClamp(minPx, maxPx, vpMin, vpMax, prefVw) {
  // Calculate slope in px per viewport pixel
  const slope = (maxPx - minPx) / (vpMax - vpMin);
  // y-intercept in px
  const yIntPx = minPx - slope * vpMin;
  // Convert to vw + rem
  // slope in vw: slope * 100 (since 1vw = vpWidth/100)
  const slopeVw = slope * 100;
  // y-intercept in rem (16px base)
  const yRem = yIntPx / 16;
  return {slope, yIntPx, slopeVw, yRem, prefVw};
}

function update() {
  const minPx = parseFloat($('#minSize').value);
  const maxPx = parseFloat($('#maxSize').value);
  const prefVw = parseFloat($('#prefVw').value);
  const vpMin = parseFloat($('#bpMin').value);
  const vpMax = parseFloat($('#bpMax').value);
  const vpWidth = parseFloat($('#vpWidth').value);

  // Update display
  $('#minV').textContent = minPx;
  $('#prefV').textContent = prefVw;
  $('#maxV').textContent = maxPx;
  $('#bpV').textContent = vpMin;
  $('#bpV2').textContent = vpMax;

  // Calculate slope & intercept for the vw + rem form
  const c = calcClamp(minPx, maxPx, vpMin, vpMax, prefVw);
  let prefExpr;
  if (Math.abs(c.slopeVw - prefVw) < 0.05) {
    prefExpr = `${prefVw.toFixed(2)}vw`;
  } else {
    prefExpr = `${prefVw.toFixed(2)}vw + ${c.yRem.toFixed(3)}rem`;
  }
  const clampStr = `clamp(${minPx}px, ${prefExpr}, ${maxPx}px)`;

  // Compute effective px at vpWidth using clamp()
  let effectiveVw = vpWidth * (prefVw / 100);
  let effectiveRemPx = c.yRem * 16;
  let px = Math.max(minPx, Math.min(maxPx, effectiveVw + effectiveRemPx));
  if (vpWidth <= vpMin) px = minPx;
  if (vpWidth >= vpMax) px = maxPx;

  // Update preview
  $('#previewEl').style.fontSize = px + 'px';
  $('#vpResult').textContent = `→ ${px.toFixed(2)}px`;

  // Output
  let out = `<span class="com">/* Fluid ${prefExpr}, min ${minPx}px, max ${maxPx}px */</span>\n`;
  out += `<span class="sel">.text</span> {\n`;
  out += `  <span class="prop">font-size</span>: <span class="val">${escapeHtml(clampStr)}</span>;\n`;
  out += `  <span class="com">/* Effective: ${px.toFixed(2)}px at ${vpWidth}px viewport */</span>\n`;
  out += `}`;
  $('#output').innerHTML = out;

  // Chart
  drawChart(minPx, maxPx, vpMin, vpMax, prefVw, c.yRem);

  // Table
  const sizes = [320, 480, 640, 768, 1024, 1280, 1536, 1920, 2560];
  let tableHtml = '<tr><th>Viewport</th><th>Computed size</th><th>Clamp</th></tr>';
  sizes.forEach(vp => {
    let v = vp * (prefVw / 100) + c.yRem * 16;
    let raw = v;
    v = Math.max(minPx, Math.min(maxPx, v));
    let status = (v !== raw) ? 'min' : 'max';
    if (Math.abs(v - raw) < 0.05) status = 'fluid';
    tableHtml += `<tr><td>${vp}px</td><td>${v.toFixed(2)}px</td><td class="${status==='fluid'?'hi':''}">${status}</td></tr>`;
  });
  $('#tableEl').innerHTML = tableHtml;
}

function drawChart(minPx, maxPx, vpMin, vpMax, prefVw, yRem) {
  const W = 600, H = 160, P = 20;
  const xMin = 0, xMax = 1920;
  const yMin = 0, yMax = maxPx * 1.2;
  const xScale = (x) => P + (x - xMin) / (xMax - xMin) * (W - 2*P);
  const yScale = (y) => H - P - (y - yMin) / (yMax - yMin) * (H - 2*P);
  let path = '';
  for (let x = xMin; x <= xMax; x += 5) {
    let v = x * (prefVw / 100) + yRem * 16;
    v = Math.max(minPx, Math.min(maxPx, v));
    path += (path ? 'L' : 'M') + xScale(x) + ',' + yScale(v) + ' ';
  }
  const svg = `<svg class="cl-svg" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
    <line x1="${P}" y1="${yScale(minPx)}" x2="${W-P}" y2="${yScale(minPx)}" stroke="var(--gz-accent)" stroke-dasharray="3,3" opacity=".6"/>
    <line x1="${P}" y1="${yScale(maxPx)}" x2="${W-P}" y2="${yScale(maxPx)}" stroke="var(--gz-accent)" stroke-dasharray="3,3" opacity=".6"/>
    <line x1="${xScale(vpMin)}" y1="${P}" x2="${xScale(vpMin)}" y2="${H-P}" stroke="var(--success)" stroke-dasharray="2,2" opacity=".5"/>
    <line x1="${xScale(vpMax)}" y1="${P}" x2="${xScale(vpMax)}" y2="${H-P}" stroke="var(--success)" stroke-dasharray="2,2" opacity=".5"/>
    <text x="${W-P}" y="${yScale(minPx)-3}" text-anchor="end" font-size="9" fill="var(--gz-accent)">min ${minPx}px</text>
    <text x="${W-P}" y="${yScale(maxPx)-3}" text-anchor="end" font-size="9" fill="var(--gz-accent)">max ${maxPx}px</text>
    <text x="${xScale(vpMin)+3}" y="${H-P-3}" font-size="9" fill="var(--success)">${vpMin}</text>
    <text x="${xScale(vpMax)+3}" y="${H-P-3}" font-size="9" fill="var(--success)">${vpMax}</text>
    <path d="${path}" stroke="#61afef" stroke-width="2" fill="none"/>
  </svg>`;
  $('#chart').innerHTML = svg;
}

const PRESETS = [
  {name:'Body', m:16, p:1.5, M:18, vp1:320, vp2:1280, vp:1200},
  {name:'H1', m:30, p:5, M:64, vp1:320, vp2:1280, vp:1200},
  {name:'H2', m:24, p:4, M:48, vp1:320, vp2:1280, vp:1200},
  {name:'H3', m:20, p:3, M:32, vp1:320, vp2:1280, vp:1200},
  {name:'Caption', m:12, p:1, M:14, vp1:320, vp2:1280, vp:1200},
  {name:'Hero', m:36, p:8, M:96, vp1:320, vp2:1280, vp:1200},
];

$('#presets').innerHTML = PRESETS.map(p => `<button class="gz-btn gz-btn-secondary cl-presets" onclick="loadPreset('${p.name}')">${p.name}</button>`).join('');

window.loadPreset = function(name) {
  const p = PRESETS.find(x => x.name === name);
  if (!p) return;
  $('#minSize').value = p.m; $('#prefVw').value = p.p; $('#maxSize').value = p.M;
  $('#bpMin').value = p.vp1; $('#bpMax').value = p.vp2; $('#vpWidth').value = p.vp;
  update();
};

$('#infoBox').innerHTML = t('infoHtml');
$('#lblSizing').textContent = t('lblSizing');
$('#lblMin').textContent = t('lblMin');
$('#lblPref').textContent = t('lblPref');
$('#lblMax').textContent = t('lblMax');
$('#lblBp').textContent = t('lblBp');
$('#lblPreview').textContent = t('lblPreview');
$('#lblVpAt').textContent = t('lblVpAt');
$('#lblOutput').textContent = t('lblOutput');
$('#lblChart').textContent = t('lblChart');

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadPreset('Body')">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#minSize').value=16;$('#prefVw').value=2.5;$('#maxSize').value=32;$('#bpMin').value=320;$('#bpMax').value=1280;$('#vpWidth').value=1200;update()">${t('reset')}</button>`;

update();

GZ.renderToolPage({
  category: 'css',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',

  related: [
    {icon:'🟦', href:'/css-tools/grid.html', name:'CSS Grid Generator'},
    {icon:'📦', href:'/css-tools/flexbox.html', name:'Flexbox Generator'},
    {icon:'✨', href:'/css-tools/theme-tokens.html', name:'Theme Tokens'},
    {icon:'🎨', href:'/css-tools/css-variables.html', name:'CSS Variables'},
  ]
});
</script>
