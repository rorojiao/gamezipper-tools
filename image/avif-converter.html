<script>
GZI18n.register({
  en: {
    toolTitle: 'AVIF Converter',
    toolDesc: 'Convert images to and from AVIF format — PNG, JPG, WebP ↔ AVIF. Free, fast, and runs entirely in your browser.',
    dropHere: 'Drop an image here or click to select',
    outputFormat: 'Output Format:',
    quality: 'Quality:',
    original: 'Original',
    converted: 'Converted',
    download: 'Download',
    step1: 'Drop or select an image (PNG, JPG, WebP, AVIF)',
    step2: 'Choose the output format (AVIF, PNG, JPG, or WebP)',
    step3: 'Adjust quality if needed and preview the result',
    step4: 'Click Download to save the converted image',
    noSupport: 'Your browser does not support AVIF encoding. Try Chrome, Firefox or Edge.',
  },
  zh: {
    toolTitle: 'AVIF 转换器',
    toolDesc: '将图片转换为 AVIF 格式或从 AVIF 转换 — PNG、JPG、WebP ↔ AVIF。免费、快速，完全在浏览器中运行。',
    dropHere: '拖拽图片到此处或点击选择',
    outputFormat: '输出格式：',
    quality: '质量：',
    original: '原始图片',
    converted: '转换结果',
    download: '下载',
    step1: '拖拽或选择图片（PNG、JPG、WebP、AVIF）',
    step2: '选择输出格式（AVIF、PNG、JPG 或 WebP）',
    step3: '按需调整质量并预览结果',
    step4: '点击「下载」保存转换后的图片',
    noSupport: '您的浏览器不支持 AVIF 编码。请使用 Chrome、Firefox 或 Edge。',
  }
});

const { $, copyText, t } = GZ;

$('#dropText').textContent = t('dropHere');
$('#lblOutputFormat').textContent = t('outputFormat');
$('#lblQuality').textContent = t('quality');
$('#lblOriginal').textContent = t('original');
$('#lblConverted').textContent = t('converted');
$('#downloadBtn').textContent = t('download');

let currentBlob = null;
let currentExt = 'avif';
let originalFileSize = 0;
let origImage = null;

// Check AVIF support
function checkAvifSupport() {
  try {
    const c = document.createElement('canvas');
    c.width = 1; c.height = 1;
    return c.toBlob !== undefined;
  } catch(e) { return false; }
}

const dropZone = $('#dropZone');
const fileInput = $('#fileInput');

dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('dragover');
  if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', () => { if (fileInput.files.length) handleFile(fileInput.files[0]); });

$('#quality').addEventListener('input', function() {
  $('#qualityVal').textContent = this.value + '%';
  if (origImage) convert();
});

document.querySelectorAll('input[name="fmt"]').forEach(r => {
  r.addEventListener('change', () => {
    currentExt = r.value;
    const showQuality = (r.value === 'avif' || r.value === 'jpeg' || r.value === 'webp');
    $('#qualityRow').style.display = showQuality ? '' : 'none';
    if (origImage) convert();
  });
});

function handleFile(file) {
  if (!file.type.startsWith('image/')) return;
  originalFileSize = file.size;
  origImage = new Image();
  origImage.onload = () => {
    const canvas = $('#origCanvas');
    canvas.width = origImage.naturalWidth;
    canvas.height = origImage.naturalHeight;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(origImage, 0, 0);
    $('#origSize').textContent = formatSize(originalFileSize) + ' · ' + origImage.naturalWidth + '×' + origImage.naturalHeight;
    $('#previewArea').style.display = '';
    convert();
  };
  origImage.src = URL.createObjectURL(file);
}

async function convert() {
  const canvas = $('#origCanvas');
  const fmt = document.querySelector('input[name="fmt"]:checked').value;
  const q = parseInt($('#quality').value) / 100;
  const mimeType = fmt === 'avif' ? 'image/avif' : fmt === 'png' ? 'image/png' : fmt === 'jpeg' ? 'image/jpeg' : 'image/webp';

  try {
    currentBlob = await new Promise((resolve, reject) => {
      canvas.toBlob(blob => {
        if (!blob) reject(new Error('Conversion failed'));
        else resolve(blob);
      }, mimeType, q);
    });

    const url = URL.createObjectURL(currentBlob);
    const img = $('#resultImg');
    img.src = url;
    img.style.display = '';

    const convSize = currentBlob.size;
    $('#convSize').textContent = formatSize(convSize);
    const pct = ((1 - convSize / originalFileSize) * 100);
    const sign = pct >= 0 ? '-' : '+';
    $('#savings').innerHTML = `${formatSize(originalFileSize)} → ${formatSize(convSize)} (<span class="saved">${sign}${Math.abs(pct).toFixed(1)}%</span>)`;
    $('#resultRow').style.display = '';

    $('#downloadBtn').onclick = () => {
      const a = document.createElement('a');
      a.href = url;
      a.download = 'converted.' + (fmt === 'jpeg' ? 'jpg' : fmt);
      a.click();
    };
  } catch(e) {
    $('#convSize').textContent = t('noSupport');
  }
}

function formatSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / 1048576).toFixed(2) + ' MB';
}

GZ.renderToolPage({
  category: 'image',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [

    {icon:'✂️', href:'/image/cropper.html', name:'Image Cropper'},
  ]
});
</script>
