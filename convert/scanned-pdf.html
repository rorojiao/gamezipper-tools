<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="drop-zone" id="dropZone">
      <p id="dropLabel"></p>
      <p id="dropHint"></p>
      <input type="file" id="fileInput" accept=".pdf,.png,.jpg,.jpeg,.webp,.bmp,.tiff" hidden>
    </div>
    <div class="progress-bar" id="progressBar" style="display:none"><div id="progress" style="width:0"></div></div>
    <div id="status" style="margin:8px 0;font-size:.85em"></div>
    <label id="lbl-lang" style="font-size:.85em;display:block;margin:8px 0"></label>
    <select id="ocrLang" style="padding:6px 10px;border:1px solid var(--border);border-radius:6px;background:var(--input-bg);color:inherit;margin-bottom:12px">
      <option value="eng">English</option>
      <option value="chi_sim">简体中文</option>
      <option value="chi_tra">繁體中文</option>
      <option value="jpn">日本語</option>
      <option value="kor">한국어</option>
      <option value="spa">Español</option>
      <option value="fra">Français</option>
      <option value="deu">Deutsch</option>
      <option value="por">Português</option>
      <option value="rus">Русский</option>
      <option value="ara">العربية</option>
      <option value="hin">हिन्दी</option>
    </select>
    <div class="gz-output" id="output"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'PDF to Searchable Text (OCR)',
    toolDesc: 'Extract text from scanned PDFs and images using OCR. Supports 100+ languages — all processing runs privately in your browser.',
    dropLabel: '📎 Drop PDF or image files here',
    dropHint: 'Supports PDF, PNG, JPG, WebP, BMP, TIFF — or click to browse',
    lblLang: 'OCR Language:',
    step1: 'Upload a scanned PDF or image file',
    step2: 'Select the document language for best accuracy',
    step3: 'Click Extract Text and wait for OCR processing',
    step4: 'Copy the extracted text to clipboard',
    extractBtn: 'Extract Text',
    copy: 'Copy',
    clear: 'Clear',
    processing: 'Processing... Please wait.',
    done: 'Done! Extracted text is ready.',
    noText: 'No text was detected. Try a clearer image or different language.',
  },
  zh: {
    toolTitle: 'PDF 文字识别 (OCR)',
    toolDesc: '使用 OCR 从扫描版 PDF 和图片中提取文字。支持 100+ 种语言，全部在浏览器中本地处理。',
    dropLabel: '📎 拖拽 PDF 或图片文件到此处',
    dropHint: '支持 PDF、PNG、JPG、WebP、BMP、TIFF — 或点击浏览',
    lblLang: 'OCR 语言:',
    step1: '上传扫描版 PDF 或图片文件',
    step2: '选择文档语言以获得最佳识别效果',
    step3: '点击提取文字并等待 OCR 处理',
    step4: '将提取的文字复制到剪贴板',
    extractBtn: '提取文字',
    copy: '复制',
    clear: '清除',
    processing: '正在处理，请稍候...',
    done: '完成！文字已提取。',
    noText: '未检测到文字。请尝试更清晰的图片或切换语言。',
  }
});

const { $, copyText, t } = GZ;
let currentFile = null;

$('#dropLabel').textContent = t('dropLabel');
$('#dropHint').textContent = t('dropHint');
$('#lbl-lang').textContent = t('lblLang');

const dz = $('#dropZone');
const fi = $('#fileInput');
dz.onclick = () => fi.click();
dz.ondragover = e => { e.preventDefault(); dz.classList.add('dragover'); };
dz.ondragleave = () => dz.classList.remove('dragover');
dz.ondrop = e => { e.preventDefault(); dz.classList.remove('dragover'); if(e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]); };
fi.onchange = () => { if(fi.files[0]) handleFile(fi.files[0]); };

function handleFile(file) {
  currentFile = file;
  dz.innerHTML = `<p style="font-weight:600">${file.name}</p><p style="font-size:.8em;opacity:.6">${(file.size/1024).toFixed(1)} KB</p>`;
}

async function extractText() {
  if (!currentFile) return;
  const lang = $('#ocrLang').value;
  const pb = $('#progressBar');
  const pg = $('#progress');
  const st = $('#status');
  pb.style.display = 'block';
  pg.style.width = '10%';
  st.textContent = t('processing');

  try {
    const Tesseract = await import('https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js');
    const worker = await Tesseract.createWorker(lang, 1, {
      logger: m => {
        if (m.status === 'recognizing text') pg.style.width = (10 + m.progress * 80) + '%';
      }
    });

    let result;
    if (currentFile.type === 'application/pdf') {
      const pdfjsLib = await import('https://cdn.jsdelivr.net/npm/pdfjs-dist@4/build/pdf.min.mjs');
      const arrayBuffer = await currentFile.arrayBuffer();
      const pdf = await pdfjsLib.getDocument({data: arrayBuffer}).promise;
      let fullText = '';
      for (let i = 1; i <= pdf.numPages; i++) {
        const page = await pdf.getPage(i);
        const viewport = page.getViewport({scale: 2});
        const canvas = document.createElement('canvas');
        canvas.width = viewport.width; canvas.height = viewport.height;
        await page.render({canvasContext: canvas.getContext('2d'), viewport}).promise;
        const {data: {text}} = await worker.recognize(canvas);
        fullText += `--- Page ${i} ---\n${text}\n\n`;
        pg.style.width = (10 + (i/pdf.numPages)*80) + '%';
      }
      result = fullText;
      await worker.terminate();
    } else {
      const {data: {text}} = await worker.recognize(currentFile);
      result = text;
      await worker.terminate();
    }

    pg.style.width = '100%';
    st.textContent = result.trim() ? t('done') : t('noText');
    $('#output').textContent = result || '';
  } catch(e) {
    st.textContent = 'Error: ' + e.message;
    console.error(e);
  }
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="extractText()">${t('extractBtn')}</button>
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="currentFile=null;$('#output').textContent='';$('#progressBar').style.display='none';$('#status').textContent='';$('#dropZone').innerHTML='<p>${t('dropLabel')}</p><p>${t('dropHint')}</p>'">${t('clear')}</button>`;

GZ.renderToolPage({
  category: 'convert',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📄', href:'/convert/pdf-to-image.html', name:'PDF to Image'},
    {icon:'📝', href:'/image/ocr.html', name:'Image OCR'},
    {icon:'📄', href:'/convert/pdf-merger.html', name:'PDF Merger'},
    {icon:'🗜️', href:'/convert/pdf-compressor.html', name:'PDF Compressor'},
  ]
});
</script>

</body>
