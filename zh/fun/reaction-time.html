<script>
GZI18n.register({
  en: {
    toolTitle: 'Reaction Time Test',
    toolDesc: 'Test your visual reaction time. Click as fast as you can when the screen turns green. Average is around 250ms — can you beat it?',
    start: 'Click to start', wait: 'Wait for green...', tooSoon: 'Too soon! Click to try again',
    go: 'CLICK NOW!', again: 'Click to play again',
    excellent: 'Excellent', good: 'Good', average: 'Average', slow: 'Slow',
    last: 'Last', best: 'Best', avg: 'Average', attempts: 'Attempts',
    tip: 'Wait for green, then click as fast as you can.',
    tip2: 'Click to begin. The screen will turn red — wait for green, then click!',
    step1: 'Click the box to start. It will turn red — wait for green',
    step2: 'Click as fast as you can the moment it turns green',
    step3: 'Your reaction time in milliseconds is displayed',
    step4: 'Click again to retry. Your best and average are tracked',
  },
  zh: {
    toolTitle: '反应速度测试',
    toolDesc: '测试你的视觉反应速度。屏幕变绿时尽快点击！平均水平约 250 毫秒 — 你能打破纪录吗？',
    start: '点击开始', wait: '等待变绿...', tooSoon: '太快了！点击重试',
    go: '立即点击！', again: '点击再玩一次',
    excellent: '极佳', good: '良好', average: '一般', slow: '较慢',
    last: '最近', best: '最佳', avg: '平均', attempts: '次数',
    tip: '等待变绿，然后尽快点击。',
    tip2: '点击开始。屏幕会变红 — 等待变绿，然后点击！',
    step1: '点击方框开始。屏幕会变红 — 等待变绿',
    step2: '屏幕变绿的一瞬间尽快点击',
    step3: '显示你的反应时间(毫秒)',
    step4: '再次点击重试。系统会记录你的最佳和平均成绩',
  }
});

const { $, t } = GZ;
let state = 'idle'; // idle | waiting | go | result
let startTime = 0;
let timeoutId = null;
let history = [];
let lastTime = 0;

function setState(s, msg) {
  state = s;
  const stage = $('#stage');
  stage.className = 'stage' + (s === 'waiting' ? ' wait' : s === 'go' ? ' go' : s === 'early' ? ' early' : s === 'result' ? ' result' : '');
  stage.textContent = msg;
}

function rating(ms) {
  if (ms < 200) return t('excellent');
  if (ms < 250) return t('good');
  if (ms < 350) return t('average');
  return t('slow');
}

function onClick() {
  if (state === 'idle' || state === 'result') {
    setState('waiting', t('wait'));
    $('#tipText').textContent = t('tip2');
    timeoutId = setTimeout(() => {
      startTime = performance.now();
      setState('go', t('go'));
    }, 1200 + Math.random() * 2300);
  } else if (state === 'waiting') {
    clearTimeout(timeoutId);
    setState('early', t('tooSoon'));
  } else if (state === 'go') {
    const ms = Math.round(performance.now() - startTime);
    lastTime = ms;
    history.unshift(ms);
    if (history.length > 20) history.pop();
    setState('result', `${ms} ms — ${rating(ms)}`);
    renderStats();
    renderHistory();
  } else if (state === 'early') {
    setState('waiting', t('wait'));
    timeoutId = setTimeout(() => {
      startTime = performance.now();
      setState('go', t('go'));
    }, 1200 + Math.random() * 2300);
  }
}

function renderStats() {
  if (history.length === 0) { $('#stats').innerHTML = ''; return; }
  const best = Math.min(...history);
  const avg = Math.round(history.reduce((a, b) => a + b, 0) / history.length);
  $('#stats').innerHTML = `
    <div class="stat"><div class="num">${lastTime}</div><div class="lbl">${t('last')} (ms)</div></div>
    <div class="stat"><div class="num">${best}</div><div class="lbl">${t('best')} (ms)</div></div>
    <div class="stat"><div class="num">${avg}</div><div class="lbl">${t('avg')} (ms)</div></div>
    <div class="stat"><div class="num">${history.length}</div><div class="lbl">${t('attempts')}</div></div>
  `;
}

function renderHistory() {
  if (history.length === 0) { $('#history').style.display = 'none'; return; }
  $('#history').style.display = '';
  $('#historyList').innerHTML = history.map((ms, i) =>
    `<div class="history-row"><div>#${history.length - i}</div><div>${ms} ms</div><div>${rating(ms)}</div></div>`
  ).join('');
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="history=[];lastTime=0;renderStats();renderHistory();setState('idle', t('start'))">🔄 ${t('again')}</button>`;

GZ.renderToolPage({
  category: 'fun',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'⏱️', href:'/calc/timer-stopwatch.html', name:'Timer & Stopwatch'},
    {icon:'🔢', href:'/convert/randomizer.html', name:'Random Number'},
    {icon:'🎲', href:'/text/list-randomizer.html', name:'List Randomizer'},
    {icon:'🌍', href:'/convert/timezone.html', name:'Time Zone Converter'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
