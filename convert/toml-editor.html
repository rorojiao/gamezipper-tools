<script type="module">
import * as TOML from 'https://cdn.jsdelivr.net/npm/smol-toml@1.3.1/dist/smol-toml.mjs';
window.TOML=TOML;
</script>
<script>
GZI18n.register({
  en: {
    toolTitle: 'TOML Editor & Validator',
    toolDesc: 'Edit, validate and convert TOML to JSON with live validation. Supports TOML v1.0 specification — perfect for pyproject.toml and Cargo.toml.',
    validate: '✓ Validate',
    toJson: '→ JSON',
    toToml: '← TOML',
    copy: '📋 Copy',
    clear: 'Clear',
    example: 'Example',
    inputLabel: 'TOML Input',
    outputLabel: 'Output',
    valid: '✓ Valid TOML',
    invalid: '✗ Invalid TOML: ',
    step1: 'Paste or type your TOML content in the editor',
    step2: 'Click Validate to check for syntax errors',
    step3: 'Click To JSON to convert TOML to formatted JSON',
    step4: 'Copy the output for use in your project',
  },
  zh: {
    toolTitle: 'TOML 编辑器 & 验证器',
    toolDesc: '在线编辑、验证 TOML 并转换为 JSON，支持 TOML v1.0 规范 — 适用于 pyproject.toml 和 Cargo.toml。',
    validate: '✓ 验证',
    toJson: '→ JSON',
    toToml: '← TOML',
    copy: '📋 复制',
    clear: '清空',
    example: '示例',
    inputLabel: 'TOML 输入',
    outputLabel: '输出',
    valid: '✓ TOML 格式正确',
    invalid: '✗ TOML 无效：',
    step1: '在编辑器中粘贴或输入 TOML 内容',
    step2: '点击「验证」检查语法错误',
    step3: '点击「→ JSON」将 TOML 转换为格式化的 JSON',
    step4: '复制输出用于你的项目',
  }
});

const { $, copyText, t } = GZ;
let mode='json'; // json output mode

function waitForTOML(cb){ if(window.TOML) cb(); else setTimeout(()=>waitForTOML(cb),100); }

const exampleToml = `[package]
name = "my-project"
version = "1.0.0"
description = "A sample TOML configuration"
authors = ["Alice <alice@example.com>", "Bob <bob@example.com>"]

[dependencies]
framework = "2.1"
database = { version = "3.0", features = ["ssl", "pool"] }

[build]
source_dir = "src"
output_dir = "dist"
optimization = 3
debug = true

[server]
host = "0.0.0.0"
port = 8080
max_connections = 1000

[[servers]]
name = "alpha"
ip = "10.0.0.1"

[[servers]]
name = "beta"
ip = "10.0.0.2"`;

function doValidate(){
  const inp=$('#toml-input').value.trim();
  if(!inp) return;
  if(!window.TOML){ $('#status').innerHTML='<span style="color:var(--gz-accent)">Loading TOML parser...</span>'; return; }
  try{
    const parsed=window.TOML.parse(inp);
    const json=JSON.stringify(parsed,null,2);
    if(mode==='json'){
      $('#output').textContent=json;
    }
    $('#status').innerHTML=`<span style="color:var(--gz-success)">${t('valid')}</span>`;
  }catch(e){
    $('#status').innerHTML=`<span style="color:var(--gz-accent)">${t('invalid')}${e.message}</span>`;
    $('#output').innerHTML=`<span style="color:var(--gz-accent)">${e.message}</span>`;
  }
}

function doToJson(){
  mode='json';
  const inp=$('#toml-input').value.trim();
  if(!inp) return;
  if(!window.TOML){ return; }
  try{
    const parsed=window.TOML.parse(inp);
    const json=JSON.stringify(parsed,null,2);
    $('#output').textContent=json;
    $('#status').innerHTML=`<span style="color:var(--gz-success)">${t('valid')}</span>`;
  }catch(e){
    $('#status').innerHTML=`<span style="color:var(--gz-accent)">${t('invalid')}${e.message}</span>`;
    $('#output').innerHTML=`<span style="color:var(--gz-accent)">${e.message}</span>`;
  }
}

function loadExample(){
  $('#toml-input').value=exampleToml;
  waitForTOML(doToJson);
}

function doClear(){ $('#toml-input').value=''; $('#output').textContent=''; $('#status').innerHTML=''; }

$('#toolbar').innerHTML=`
  <button class="gz-btn" onclick="doValidate()">${t('validate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doToJson()">${t('toJson')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="copyText(document.getElementById('output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

$('#lbl-in').textContent=t('inputLabel');
$('#lbl-out').textContent=t('outputLabel');

$('#toml-input').addEventListener('input', function(){
  waitForTOML(doToJson);
});

// Load example on start
waitForTOML(loadExample);

GZ.renderToolPage({
  category:'convert',
  titleKey:'toolTitle',
  descKey:'toolDesc',
  howToSteps:['step1','step2','step3','step4'],
  related:[
    {icon:'🔄',href:'/convert/json-to-toml.html',name:'JSON to TOML'},
    {icon:'📊',href:'/dev/json.html',name:'JSON Formatter'},
    {icon:'📝',href:'/dev/yaml.html',name:'YAML Formatter'},
    {icon:'📝',href:'/convert/csv-to-json.html',name:'CSV to JSON'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
