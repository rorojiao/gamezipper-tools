<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is a SIP?", "acceptedAnswer": {"@type": "Answer", "text": "A Systematic Investment Plan (SIP) lets you invest a fixed amount in a mutual fund at regular intervals (usually monthly). It builds wealth through rupee cost averaging and the power of compounding."}}, {"@type": "Question", "name": "How is SIP return calculated?", "acceptedAnswer": {"@type": "Answer", "text": "The maturity value uses the future value of an annuity formula: FV = P × [((1 + i)^n − 1) / i] × (1 + i), where P is the monthly investment, i is the monthly rate (annual rate / 12 / 100), and n is the number of months."}}, {"@type": "Question", "name": "Is a 12% return realistic for SIP?", "acceptedAnswer": {"@type": "Answer", "text": "Historically, equity mutual funds in India have delivered roughly 10–15% annualized returns over the long term, so 12% is a commonly used planning estimate. Actual returns vary with market conditions."}}, {"@type": "Question", "name": "Does this SIP calculator store my data?", "acceptedAnswer": {"@type": "Answer", "text": "No. All calculations run entirely in your browser. Nothing is uploaded or stored on any server."}}]}</script>

<div class="gz-container">

      <div><label id="lbl-rate"></label><input type="number" id="rate" value="12" min="0" max="50" step="0.1"></div>
      <div><label id="lbl-years"></label><input type="number" id="years" value="10" min="1" max="50" step="1"></div>
      <div><label id="lbl-stepup"></label><input type="number" id="stepup" value="0" min="0" max="50" step="1"></div>
      <div><label id="lbl-currency"></label><select id="currency">
        <option value="₹">₹ INR</option>
        <option value="$">$ USD</option>

      </select></div>

      </div>
      <div class="gz-chart-bar" id="chart"></div>

        <thead><tr><th id="th-year"></th><th id="th-invested"></th><th id="th-gain"></th><th id="th-balance"></th></tr></thead>

</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'SIP Calculator',
    toolDesc: 'Calculate mutual fund SIP returns — enter monthly investment, expected return rate and tenure. See maturity value, invested amount, estimated gains and a yearly growth chart. Optional top-up SIP supported.',
    monthly: 'Monthly Investment',
    lumpsum: 'One-time Lump Sum',
    rate: 'Expected Annual Return (%)',
    years: 'Investment Period (Years)',
    stepup: 'Annual Step-up (%)',
    currency: 'Currency',
    calculate: 'Calculate',
    clear: 'Clear',
    maturity: 'Maturity Value',
    invested: 'Invested Amount',
    gain: 'Estimated Gains',
    thYear: 'Year',
    thInvested: 'Total Invested',
    thGain: 'Gains',
    thBalance: 'Balance',
    step1: 'Enter your monthly SIP investment amount',
    step2: 'Set the expected annual return rate and tenure',
    step3: 'Optionally add a lump sum and annual step-up percentage',
    step4: 'Click Calculate to see maturity value and growth chart',
  },
  zh: {
    toolTitle: 'SIP 定投计算器',
    toolDesc: '计算基金定投收益 — 输入每月投资额、预期年化收益率和投资期限。查看到期总额、累计投入、预估收益和逐年增长图。支持追加定投。',
    monthly: '每月定投金额',
    lumpsum: '一次性投入',
    rate: '预期年化收益率（%）',
    years: '投资期限（年）',
    stepup: '每年递增（%）',
    currency: '货币',
    calculate: '计算',
    clear: '清空',
    maturity: '到期总金额',
    invested: '累计投入',
    gain: '预估收益',
    thYear: '年份',
    thInvested: '累计投入',
    thGain: '累计收益',
    thBalance: '账户余额',
    step1: '输入每月定投金额',
    step2: '设置预期年化收益率和投资期限',
    step3: '可选添加一次性投入和每年递增比例',
    step4: '点击计算查看到期金额和增长图表',
  }
});

const { $, t } = GZ;

$('#lbl-monthly').textContent = t('monthly');
$('#lbl-lumpsum').textContent = t('lumpsum');
$('#lbl-rate').textContent = t('rate');
$('#lbl-years').textContent = t('years');
$('#lbl-stepup').textContent = t('stepup');
$('#lbl-currency').textContent = t('currency');
$('#res-maturity-label').textContent = t('maturity');
$('#res-invested-label').textContent = t('invested');
$('#res-gain-label').textContent = t('gain');
$('#th-year').textContent = t('thYear');
$('#th-invested').textContent = t('thInvested');
$('#th-gain').textContent = t('thGain');
$('#th-balance').textContent = t('thBalance');

function fmt(n) { return n.toLocaleString(undefined, {minimumFractionDigits:0, maximumFractionDigits:0}); }

function calculate() {
  const cur = $('#currency').value;
  const monthlyStart = Math.max(0, parseFloat($('#monthly').value) || 0);
  const lumpsum = Math.max(0, parseFloat($('#lumpsum').value) || 0);
  const rate = Math.max(0, Math.min(50, parseFloat($('#rate').value) || 0)) / 100;
  const years = Math.max(1, Math.min(50, parseInt($('#years').value) || 1));
  const stepupPct = Math.max(0, Math.min(50, parseFloat($('#stepup').value) || 0)) / 100;

  const i = rate / 12;
  const rows = [];
  let balance = lumpsum;
  let invested = lumpsum;
  let currentMonthly = monthlyStart;

  for (let y = 1; y <= years; y++) {
    for (let m = 0; m < 12; m++) {
      balance += currentMonthly;
      invested += currentMonthly;
      balance *= (1 + i);
    }
    rows.push({ year: y, invested: invested, gain: balance - invested, balance: balance });
    currentMonthly *= (1 + stepupPct);
  }

  const gain = balance - invested;
  $('#res-maturity').textContent = cur + fmt(balance);
  $('#res-invested').textContent = cur + fmt(invested);
  $('#res-gain').textContent = cur + fmt(gain);
  $('#results').style.display = 'block';

  const maxBal = Math.max(...rows.map(r => r.balance));
  $('#chart').innerHTML = rows.map(r => {
    const h = (r.balance / maxBal * 100).toFixed(1);
    return `<div style="height:${h}%" data-tip="Y${r.year}: ${cur}${fmt(r.balance)}"></div>`;
  }).join('');

  const step = years <= 20 ? 1 : Math.ceil(years / 20);
  $('#tbody').innerHTML = rows.filter((_, idx) => (idx + 1) % step === 0 || idx === 0 || idx === rows.length - 1)
    .map(r => `<tr><td>${r.year}</td><td>${cur}${fmt(r.invested)}</td><td>${cur}${fmt(r.gain)}</td><td>${cur}${fmt(r.balance)}</td></tr>`).join('');
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="calculate()">${t('calculate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="document.getElementById('results').style.display='none'">${t('clear')}</button>`;

calculate();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📈', href:'/calc/compound-interest.html', name:'Compound Interest'},
    {icon:'🏦', href:'/calc/loan-calculator.html', name:'Loan Calculator'},
    {icon:'💸', href:'/calc/roi-calculator.html', name:'ROI Calculator'},
    {icon:'📊', href:'/calc/stock-return.html', name:'Stock Return'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
