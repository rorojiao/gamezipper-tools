<style>

.form-group label{display:block;font-weight:600;margin-bottom:4px;font-size:.85em}
.form-group input,.form-group textarea,.form-group select{width:100%;padding:8px;background:var(--glass);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:.9em}

.embed-inner .embed-title{color:#00b4d8;font-weight:700;font-size:1em;margin-bottom:4px}
.embed-inner .embed-desc{color:#dcddde;font-size:.9em;line-height:1.4;white-space:pre-wrap}
.embed-inner .embed-field{margin-top:8px}

.embed-inner .embed-field-value{color:#dcddde;font-size:.85em;white-space:pre-wrap}
.embed-inner .embed-footer{margin-top:10px;font-size:.75em;color:#72767d}
.embed-inner .embed-image{margin-top:8px;max-width:100%;border-radius:4px}
.embed-inner .embed-thumb{float:right;max-width:80px;max-height:80px;border-radius:4px;margin-left:8px}

.field-item .field-item-name{font-weight:600;font-size:.85em}
.field-item .field-item-value{font-size:.8em;opacity:.8;margin-top:2px}
.field-item button{position:absolute;top:6px;right:6px;font-size:.75em}
.color-row{display:flex;align-items:center;gap:8px}
.color-row input[type=color]{width:40px;height:34px;padding:0;border:none;border-radius:4px;cursor:pointer}
.json-output{background:var(--glass);border:1px solid var(--border);border-radius:6px;padding:12px;font-family:monospace;font-size:.8em;white-space:pre-wrap;word-break:break-all;max-height:400px;overflow:auto}

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="gz-split">
      <div>
        <div class="form-group">
          <label id="lbl-author"></label>
          <input type="text" id="f-author" placeholder="Author name">
        </div>
        <div class="form-group">
          <label id="lbl-title"></label>
          <input type="text" id="f-title" placeholder="Embed title">
        </div>
        <div class="form-group">
          <label id="lbl-url"></label>
          <input type="url" id="f-url" placeholder="https://example.com">
        </div>
        <div class="form-group">
          <label id="lbl-desc"></label>
          <textarea id="f-desc" placeholder="Embed description..."></textarea>
        </div>
        <div class="form-group">
          <label id="lbl-color"></label>
          <div class="color-row">
            <input type="color" id="f-color" value="#5865F2">
            <input type="text" id="f-color-hex" value="#5865F2" style="flex:1">
          </div>
        </div>
        <div class="form-group">
          <label id="lbl-thumb"></label>
          <input type="url" id="f-thumb" placeholder="Thumbnail image URL">
        </div>
        <div class="form-group">
          <label id="lbl-image"></label>
          <input type="url" id="f-image" placeholder="Main image URL">
        </div>
        <div class="form-group">
          <label id="lbl-footer"></label>
          <input type="text" id="f-footer" placeholder="Footer text">
        </div>
        <div class="form-group">
          <label id="lbl-timestamp"></label>
          <select id="f-timestamp">
            <option value="">None</option>
            <option value="now" selected>Current time</option>
          </select>
        </div>
        <div class="form-group">
          <label id="lbl-fields"></label>
          <div class="fields-list" id="fields-list"></div>
          <div class="field-row">
            <input type="text" id="fn" placeholder="Field name">
            <input type="text" id="fv" placeholder="Field value">
            <label style="white-space:nowrap;font-size:.8em"><input type="checkbox" id="fi"> Inline</label>
            <button class="gz-btn" onclick="addField()" style="padding:6px 10px">+</button>
          </div>
        </div>
      </div>
      <div>
        <label id="lbl-preview"></label>
        <div class="embed-preview" id="preview"></div>
        <label style="margin-top:16px;display:block;font-weight:600" id="lbl-json"></label>
        <div class="json-output" id="json-output"></div>
      </div>
    </div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Discord Embed Builder',
    toolDesc: 'Design Discord embed messages with live preview and generate webhook JSON code.',
    lblAuthor: 'Author',
    lblTitle: 'Title',
    lblUrl: 'URL (clickable title)',
    lblDesc: 'Description',
    lblColor: 'Color',
    lblThumb: 'Thumbnail URL',
    lblImage: 'Image URL',
    lblFooter: 'Footer',
    lblTimestamp: 'Timestamp',
    lblFields: 'Fields',
    lblPreview: 'Preview',
    lblJson: 'JSON Code',
    step1: 'Fill in the embed fields: title, description, color, images',
    step2: 'Add custom fields with name, value and inline toggle',
    step3: 'See the live preview on the right side',
    step4: 'Copy the JSON and use it with your Discord webhook or bot',
  },
  zh: {
    toolTitle: 'Discord Embed 构建器',
    toolDesc: '设计 Discord Embed 消息，实时预览并生成 Webhook JSON 代码。',
    lblAuthor: '作者',
    lblTitle: '标题',
    lblUrl: '链接（可点击标题）',
    lblDesc: '描述',
    lblColor: '颜色',
    lblThumb: '缩略图 URL',
    lblImage: '图片 URL',
    lblFooter: '页脚',
    lblTimestamp: '时间戳',
    lblFields: '自定义字段',
    lblPreview: '预览',
    lblJson: 'JSON 代码',
    step1: '填写 Embed 字段：标题、描述、颜色、图片',
    step2: '添加自定义字段，设置名称、值和行内显示',
    step3: '右侧实时预览效果',
    step4: '复制 JSON 并用于 Discord Webhook 或 Bot',
  }
});

const { $, copyText, t } = GZ;
let fields = [];

function addField() {
  const n = $('#fn').value.trim();
  const v = $('#fv').value.trim();
  const i = $('#fi').checked;
  if (!n || !v) return;
  fields.push({name: n, value: v, inline: i});
  $('#fn').value = '';
  $('#fv').value = '';
  $('#fi').checked = false;
  renderFields();
  update();
}

function removeField(idx) {
  fields.splice(idx, 1);
  renderFields();
  update();
}

function renderFields() {
  const list = $('#fields-list');
  list.innerHTML = fields.map((f, i) => `
    <div class="field-item">
      <div class="field-item-name">${f.name} ${f.inline ? '(inline)' : ''}</div>
      <div class="field-item-value">${f.value}</div>
      <button class="gz-btn gz-btn-secondary" onclick="removeField(${i})" style="padding:2px 6px;font-size:.7em">✕</button>
    </div>
  `).join('');
}

function buildEmbed() {
  const embed = {};
  const title = $('#f-title').value.trim();
  const desc = $('#f-desc').value.trim();
  const url = $('#f-url').value.trim();
  const color = parseInt($('#f-color').value.slice(1), 16);
  const thumb = $('#f-thumb').value.trim();
  const image = $('#f-image').value.trim();
  const footer = $('#f-footer').value.trim();
  const author = $('#f-author').value.trim();
  const ts = $('#f-timestamp').value;

  if (title) embed.title = title;
  if (url) embed.url = url;
  if (desc) embed.description = desc;
  embed.color = color;
  if (thumb) embed.thumbnail = {url: thumb};
  if (image) embed.image = {url: image};
  if (footer) embed.footer = {text: footer};
  if (author) embed.author = {name: author};
  if (ts === 'now') embed.timestamp = new Date().toISOString();
  if (fields.length) embed.fields = [...fields];
  return embed;
}

function update() {
  const embed = buildEmbed();

  // Preview
  let html = '<div class="embed-inner">';
  if (embed.author) html += `<div style="color:#fff;font-size:.85em;font-weight:600;margin-bottom:4px">${esc(embed.author.name)}</div>`;
  html += '<div style="overflow:hidden">';
  if (embed.thumbnail) html += `<img class="embed-thumb" src="${esc(embed.thumbnail.url)}" onerror="this.style.display='none'">`;
  if (embed.title) html += `<div class="embed-title">${embed.url ? `<a href="${esc(embed.url)}" style="color:#00b4d8;text-decoration:none">${esc(embed.title)}</a>` : esc(embed.title)}</div>`;
  if (embed.description) html += `<div class="embed-desc">${esc(embed.description)}</div>`;
  if (embed.fields && embed.fields.length) {
    html += '<div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:8px">';
    embed.fields.forEach(f => {
      html += `<div class="embed-field" style="flex:${f.inline ? '1 1 150px' : '1 1 100%'};min-width:0"><div class="embed-field-name">${esc(f.name)}</div><div class="embed-field-value">${esc(f.value)}</div></div>`;
    });
    html += '</div>';
  }
  html += '</div>';
  if (embed.image) html += `<img class="embed-image" src="${esc(embed.image.url)}" onerror="this.style.display='none'">`;
  if (embed.footer || embed.timestamp) html += `<div class="embed-footer">${esc(embed.footer?.text || '')}${embed.timestamp ? ' • ' + new Date(embed.timestamp).toLocaleString() : ''}</div>`;
  html += '</div>';

  $('#preview').innerHTML = html;
  $('#preview').querySelector('.embed-inner').style.borderColor = $('#f-color').value;

  // JSON
  const payload = {embeds: [embed]};
  $('#json-output').textContent = JSON.stringify(payload, null, 2);
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Bind all inputs
['f-title','f-desc','f-url','f-thumb','f-image','f-footer','f-author','f-timestamp'].forEach(id => {
  const el = $('#'+id);
  el.addEventListener('input', update);
  el.addEventListener('change', update);
});

$('#f-color').addEventListener('input', e => {
  $('#f-color-hex').value = e.target.value;
  update();
});
$('#f-color-hex').addEventListener('input', e => {
  if (/^#[0-9a-fA-F]{6}$/.test(e.target.value)) {
    $('#f-color').value = e.target.value;
    update();
  }
});

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="copyText($('#json-output').textContent)">${t('copy')} JSON</button>
  <button class="gz-btn gz-btn-secondary" onclick="copyText(JSON.stringify({embeds:[buildEmbed()]}))">${t('copy')} Webhook Payload</button>
  <button class="gz-btn gz-btn-secondary" onclick="resetEmbed()">Reset</button>`;

function resetEmbed() {
  ['f-title','f-desc','f-url','f-thumb','f-image','f-footer','f-author'].forEach(id => $('#'+id).value = '');
  $('#f-color').value = '#5865F2';
  $('#f-color-hex').value = '#5865F2';
  fields = [];
  renderFields();
  update();
}

update();

GZ.renderToolPage({
  category: 'social',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🪝', href:'/dev/webhook-tester.html', name:'Webhook Tester'},
    {icon:'📱', href:'/convert/qrcode.html', name:'QR Code'},
    {icon:'🐦', href:'/seo/twitter-card-preview.html', name:'Twitter Card Preview'},
    {icon:'🖼️', href:'/seo/open-graph-preview.html', name:'Open Graph Preview'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
