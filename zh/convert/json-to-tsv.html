<script>
GZI18n.register({
  en: {
    toolTitle: 'JSON to TSV Converter',
    toolDesc: 'Convert JSON arrays of objects to tab-separated values (TSV) instantly. Nested objects are flattened with dot notation — perfect for Excel and Google Sheets. Free and private.',
    includeHeader: 'Header row',
    flatten: 'Flatten nested',
    rowsConverted: '✓ Converted {n} rows, {c} columns',
    invalidJson: '✗ Invalid JSON',
    step1: 'Paste a JSON array of objects into the input area',
    step2: 'Toggle header row and nested-flattening as needed',
    step3: 'Click Convert to generate TSV output',
    step4: 'Copy the result and paste into Excel or Google Sheets',
  },
  zh: {
    toolTitle: 'JSON 转 TSV 转换器',
    toolDesc: '将 JSON 对象数组即时转换为制表符分隔值（TSV）。嵌套对象用点号展开 — 非常适合 Excel 和 Google Sheets。免费且私密。',
    includeHeader: '包含表头行',
    flatten: '展开嵌套',
    rowsConverted: '✓ 已转换 {n} 行，{c} 列',
    invalidJson: '✗ JSON 无效',
    step1: '将 JSON 对象数组粘贴到输入区',
    step2: '按需切换表头行和嵌套展开选项',
    step3: '点击「转换」生成 TSV 输出',
    step4: '复制结果并粘贴到 Excel 或 Google Sheets',
  }
});

const { $, copyText, t } = GZ;
let includeHeader = true, flatten = true;

function escapeTSV(v) {
  if (v == null) return '';
  if (typeof v === 'object') v = JSON.stringify(v);
  return String(v).replace(/\t/g, ' ').replace(/\r?\n/g, ' ');
}

function flattenObj(obj, prefix, out) {
  for (const k in obj) {
    const key = prefix ? prefix + '.' + k : k;
    const val = obj[k];
    if (val && typeof val === 'object' && !Array.isArray(val) && flatten) {
      flattenObj(val, key, out);
    } else if (Array.isArray(val) && flatten) {
      out[key] = val.map(x => typeof x === 'object' ? JSON.stringify(x) : x).join('; ');
    } else {
      out[key] = val;
    }
  }
  return out;
}

function convert() {
  const inp = $('#input').value.trim();
  if (!inp) return;
  let arr;
  try {
    const parsed = JSON.parse(inp);
    arr = Array.isArray(parsed) ? parsed : (Array.isArray(parsed.data) ? parsed.data : [parsed]);
  } catch (e) {
    $('#status').innerHTML = `<span style="color:var(--gz-accent)">${t('invalidJson')}: ${e.message}</span>`;
    $('#output').innerHTML = `<span style="color:var(--gz-accent)">${e.message}</span>`;
    return;
  }
  const flatRows = arr.map(item => flattenObj(item, '', {}));
  const colSet = [];
  flatRows.forEach(r => { for (const k in r) if (colSet.indexOf(k) === -1) colSet.push(k); });
  const lines = [];
  if (includeHeader) lines.push(colSet.map(escapeTSV).join('\t'));
  flatRows.forEach(r => lines.push(colSet.map(c => escapeTSV(r[c])).join('\t')));
  $('#output').textContent = lines.join('\n');
  $('#status').innerHTML = `<span style="color:var(--gz-success)">${t('rowsConverted').replace('{n}', flatRows.length).replace('{c}', colSet.length)}</span>`;
}

function loadExample() {
  $('#input').value = JSON.stringify([
    {id:1, name:'Alice', email:'alice@example.com', role:'Engineer', meta:{country:'USA', team:'Core'}},
    {id:2, name:'Bob', email:'bob@example.com', role:'Designer', meta:{country:'UK', team:'UX'}},
    {id:3, name:'Carol', email:'carol@example.com', role:'Manager', meta:{country:'Japan', team:'Ops'}}
  ], null, 2);
  convert();
}

function doClear() { $('#input').value = ''; $('#output').textContent = ''; $('#status').innerHTML = ''; }

function downloadTSV() {
  const text = $('#output').textContent;
  if (!text) return;
  const blob = new Blob([text], {type: 'text/tab-separated-values'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'data.tsv';
  a.click();
  URL.revokeObjectURL(a.href);
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="convert()">${t('convert')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <label style="font-size:.85em;display:inline-flex;align-items:center;gap:4px"><input type="checkbox" ${includeHeader?'checked':''} onchange="includeHeader=this.checked;convert()"> ${t('includeHeader')}</label>
  <label style="font-size:.85em;display:inline-flex;align-items:center;gap:4px"><input type="checkbox" ${flatten?'checked':''} onchange="flatten=this.checked;convert()"> ${t('flatten')}</label>
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="downloadTSV()">${t('download')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

  ]
});
