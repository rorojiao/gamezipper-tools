    step1: '在输入框中输入视频主题或目标关键词',

    step3: '点击「生成标题」获取 20+ 种标题变体',
    step4: '点击任意标题旁的「复制」即可使用',
  }
});

const { $, copyText, t } = GZ;
const styleSelect = $('#styleSelect');
const styles = t('styles');
Object.entries(styles).forEach(([k,v]) => {
  const opt = document.createElement('option');
  opt.value = k; opt.textContent = v;
  styleSelect.appendChild(opt);
});

$('#topicInput').placeholder = t('topicPlaceholder');
$('#genBtn').textContent = t('generate');

// Title template engine
const TITLE_TEMPLATES = {

    'How to {Topic} Like a Pro in 10 Minutes',

  ],

function generateTitles() {
  let topic = $('#topicInput').value.trim();
  if (!topic) { $('#results').innerHTML = `<p style="color:var(--gz-accent)">${t('topicPlaceholder')}</p>`; return; }
  // Capitalize first letter
  topic = topic.charAt(0).toUpperCase() + topic.slice(1);
  const style = styleSelect.value;
  const templates = TITLE_TEMPLATES[style] || TITLE_TEMPLATES.howto;
  const results = templates.map(tpl => tpl.replace(/\{Topic\}/g, topic));
  renderResults(results);
}

function renderResults(titles) {
  if (!titles.length) return;
  const html = titles.map((title, i) => `
    <div style="display:flex;align-items:center;gap:8px;padding:10px 12px;margin-bottom:6px;background:var(--glass);border:1px solid var(--border);border-radius:8px">
      <span style="color:var(--gz-accent);font-weight:bold;min-width:24px">${i+1}.</span>
      <span style="flex:1;cursor:pointer" onclick="copyText(this.textContent);flashCopied(this)">${title}</span>
      <span style="color:var(--text3);font-size:.8em;white-space:nowrap">${title.length} ch</span>
      <button class="gz-btn gz-btn-secondary" style="padding:4px 10px;font-size:.8em" onclick="copyText('${title.replace(/'/g,"\\'")}');this.textContent='${t('copied')}'">${t('copyTitle')}</button>
    </div>`).join('');
  $('#results').innerHTML = html;
}

window.flashCopied = function(el) {
  copyText(el.textContent);
  const orig = el.style.background;
  el.style.background = 'var(--gz-accent)';
  setTimeout(() => el.style.background = orig, 600);
};

$('#genBtn').addEventListener('click', generateTitles);
$('#topicInput').addEventListener('keydown', e => { if (e.key === 'Enter') generateTitles(); });
styleSelect.addEventListener('change', () => { if ($('#topicInput').value.trim()) generateTitles(); });
