// ---------- TOML parser (TOML 1.0 subset) ----------
function TomlError(msg, line, col){
  const e = new Error(msg);
  e.line = line; e.col = col; e.toml = true;
  return e;
}

function parseToml(src){
  const root = {};
  let errors = [];
  // current table reference (array of key path)
  let current = root;
  let currentPath = [];

  const lines = src.split(/\r?\n/);
  let i = 0;
  let lineCount = 0; // keys written
  let tableCount = 0;

  function setDeep(obj, path, value){
    let o = obj;
    for (let k = 0; k < path.length - 1; k++){
      const key = path[k];
      if (o[key] === undefined){ o[key] = {}; }
      if (typeof o[key] !== 'object' || Array.isArray(o[key])){ throw TomlError('Key "'+key+'" is not a table', linesCol, 1); }
      o = o[key];
    }
    o[path[path.length-1]] = value;
  }

  while (i < lines.length){
    let line = lines[i];
    const lineNo = i + 1;
    // strip comments (respect strings)
    let stripped = stripComment(line).trim();
    if (stripped === ''){ i++; continue; }

    // Table header [a.b.c] or [[a.b]]
    if (stripped.startsWith('[[')){
      const end = stripped.indexOf(']]');
      if (end === -1){ errors.push({line:lineNo,col:1,msg:'Unclosed array-of-tables header [['}); i++; continue; }
      const pathStr = stripped.slice(2, end).trim();
      const path = parseKeyPath(pathStr, lineNo);
      if (!path){ i++; continue; }
      // navigate/create array of tables
      let o = root;
      for (let k = 0; k < path.length - 1; k++){
        if (o[path[k]] === undefined) o[path[k]] = {};
        o = o[path[k]];
      }
      const last = path[path.length-1];
      if (o[last] === undefined) o[last] = [];
      if (!Array.isArray(o[last])){ errors.push({line:lineNo,col:1,msg:'Key "'+last+'" is not an array of tables'}); i++; continue; }
      const newT = {};
      o[last].push(newT);
      current = newT; currentPath = path;
      tableCount++;
      i++;
      continue;
    }
    if (stripped.startsWith('[')){
      const end = stripped.indexOf(']');
      if (end === -1){ errors.push({line:lineNo,col:1,msg:'Unclosed table header ['}); i++; continue; }
      const pathStr = stripped.slice(1, end).trim();
      const path = parseKeyPath(pathStr, lineNo);
      if (!path){ i++; continue; }
      // navigate/create — always descend into the child for every path segment
      let o = root;
      for (let k = 0; k < path.length; k++){
        const key = path[k];
        if (o[key] === undefined) o[key] = {};
        if (Array.isArray(o[key])) o = o[key][o[key].length - 1];
        else o = o[key];
      }
      current = o; currentPath = path;
      tableCount++;
      i++;
      continue;
    }

    // key = value (possibly dotted key path)
    const eq = findEquals(stripped);
    if (eq === -1){ errors.push({line:lineNo,col:1,msg:'Expected "key = value" but no "=" found: ' + truncate(stripped)}); i++; continue; }
    const keyPart = stripped.slice(0, eq).trim();
    const valPart = stripped.slice(eq + 1).trim();
    const path = parseKeyPath(keyPart, lineNo);
    if (!path){ i++; continue; }

    // parse value (may span multiple lines for multiline strings / arrays)
    let value, consumed;
    try {
      const res = parseValue(valPart, lines, i);
      value = res.value;
      consumed = res.lines; // additional lines consumed
    } catch(e){
      errors.push({line:lineNo,col:eq+2,msg:e.toml ? e.message : ('Invalid value: '+e.message)});
      i++; continue;
    }
    try {
      setDeep(current, path, value);
      lineCount++;
    } catch(e){
      errors.push({line:lineNo,col:1,msg:e.toml ? e.message : ('Could not set key: '+e.message)});
    }
    i += 1 + (consumed || 0);
  }

  if (errors.length) throw { errors };
  return { data: root, keys: lineCount, tables: tableCount };
}

function truncate(s){ return s.length > 60 ? s.slice(0,60)+'…' : s; }

// Strip a # comment that is not inside a string. Simplified: walk char by char respecting quotes.
function stripComment(line){
  let out = '', inS = null, i = 0;
  while (i < line.length){
    const c = line[i];
    if (inS){
      out += c;
      if (c === '\\' && (inS === '"')) { out += line[i+1]||''; i += 2; continue; }
      if (c === inS) inS = null;
      i++; continue;
    }
    if (c === '"' || c === "'"){ inS = c; out += c; i++; continue; }
    if (c === '#') break;
    out += c; i++;
  }
  return out;
}

function findEquals(s){
  // find top-level '=' not inside quotes
  let inS = null, i = 0;
  while (i < s.length){
    const c = s[i];
    if (inS){ if (c === inS) inS = null; i++; continue; }
    if (c === '"' || c === "'"){ inS = c; i++; continue; }
    if (c === '=') return i;
    i++;
  }
  return -1;
}

function parseKeyPath(str, lineNo){
  // a.b."c".d
  const parts = [];
  let i = 0;
  while (i < str.length){
    while (i < str.length && str[i] === ' ') i++;
    if (i >= str.length) break;
    if (str[i] === '"'){
      let j = i+1, s = '';
      while (j < str.length){ if (str[j]==='\\'){ s+=str[j+1]; j+=2; continue;} if (str[j]==='"'){j++; break;} s+=str[j]; j++; }
      parts.push(s); i = j;
    } else if (str[i] === "'"){
      let j = i+1, s = '';
      while (j < str.length && str[j] !== "'"){ s += str[j]; j++; }
      parts.push(s); i = j+1;
    } else {
      let j = i, s = '';
      while (j < str.length && /[A-Za-z0-9_-]/.test(str[j])){ s += str[j]; j++; }
      if (!s){ errors_global.push({line:lineNo,col:i+1,msg:'Invalid key character'}); return null; }
      parts.push(s); i = j;
    }
    while (i < str.length && str[i] === ' ') i++;
    if (i < str.length && str[i] === '.') i++;
  }
  return parts;
}

let errors_global = [];

function parseValue(raw, lines, startIdx){
  // trim
  let s = raw.trim();
  const lineNo = startIdx + 1;
  // multiline basic string """..."""
  if (s.startsWith('"""')){
    return parseMultilineString(raw, lines, startIdx, '"""', true);
  }
  if (s.startsWith("'''")){
    return parseMultilineString(raw, lines, startIdx, "'''", false);
  }
  // array
  if (s.startsWith('[')){
    return parseArray(raw, lines, startIdx);
  }
  // inline table
  if (s.startsWith('{')){
    return parseInlineTable(s, lineNo);
  }
  // basic string
  if (s.startsWith('"')){
    return parseBasicString(s, lineNo);
  }
  // literal string
  if (s.startsWith("'")){
    return parseLiteralString(s, lineNo);
  }
  // boolean
  if (s === 'true' || s === 'false') return { value: s === 'true', lines: 0 };
  // datetime-ish
  const dt = parseDatetime(s);
  if (dt !== undefined) return { value: dt, lines: 0 };
  // number
  const num = parseNumber(s);
  if (num !== undefined) return { value: num, lines: 0 };
  throw TomlError('Could not parse value: ' + truncate(s), lineNo, 1);
}

function parseBasicString(s, lineNo){
  if (s.length < 2 || s[s.length-1] !== '"') throw TomlError('Unterminated string', lineNo, 1);
  const inner = s.slice(1, -1);
  let out = '', i = 0;
  while (i < inner.length){
    if (inner[i] === '\\'){
      const e = inner[i+1];
      const map = {n:'\n',t:'\t',r:'\r','"':'"','\\':'\\',b:'\b',f:'\f'};
      if (map[e] !== undefined){ out += map[e]; i += 2; continue; }
      if (e === 'u'){ out += String.fromCodePoint(parseInt(inner.slice(i+2,i+6),16)); i += 6; continue; }
      if (e === 'U'){ out += String.fromCodePoint(parseInt(inner.slice(i+2,i+10),16)); i += 10; continue; }
      throw TomlError('Invalid escape \\'+e, lineNo, 1);
    }
    out += inner[i]; i++;
  }
  return { value: out, lines: 0 };
}

function parseLiteralString(s, lineNo){
  if (s.length < 2 || s[s.length-1] !== "'") throw TomlError("Unterminated literal string", lineNo, 1);
  return { value: s.slice(1, -1), lines: 0 };
}

function parseMultilineString(raw, lines, startIdx, delim, allowEscapes){
  // raw is the remainder of the first line after "key ="
  let buf = raw;
  let consumed = 0;
  // The opening delim may be followed by content; TOML trims a leading newline right after """
  let text = '';
  // Combine current remainder + subsequent lines until closing delim
  let firstBuf = buf.slice(delim.length);
  // trim immediate newline
  if (firstBuf.startsWith('\n')) firstBuf = firstBuf.slice(1);
  else if (firstBuf.startsWith('\r\n')) firstBuf = firstBuf.slice(2);
  let pending = firstBuf;
  let idx = startIdx + 1;
  let all = pending;
  // if closing delim already in firstBuf
  let closePos = all.indexOf(delim);
  while (closePos === -1 && idx < lines.length){
    all += '\n' + lines[idx];
    consumed++;
    idx++;
    closePos = all.indexOf(delim);
  }
  if (closePos === -1) throw TomlError('Unterminated multiline string', startIdx+1, 1);
  text = all.slice(0, closePos);
  // line-ending backslash continuation
  text = text.replace(/\\\r?\n\s*/g, '');
  if (allowEscapes){
    // process escapes (basic)
    let out = '', i = 0;
    while (i < text.length){
      if (text[i] === '\\'){
        const e = text[i+1];
        const map = {n:'\n',t:'\t',r:'\r','"':'"','\\':'\\',b:'\b',f:'\f'};
        if (map[e] !== undefined){ out += map[e]; i += 2; continue; }
        if (e === 'u'){ out += String.fromCodePoint(parseInt(text.slice(i+2,i+6),16)); i += 6; continue; }
        i++; continue;
      }
      out += text[i]; i++;
    }
    text = out;
  }
  return { value: text, lines: consumed };
}

function parseArray(raw, lines, startIdx){
  // gather until balanced ]
  let all = raw, consumed = 0, depth = 0, idx = startIdx;
  let inStr = null;
  function balance(text){
    let d = 0, inS = null, j = 0;
    while (j < text.length){
      const c = text[j];
      if (inS){ if (c === '\\'){ j+=2; continue; } if (c === inS) inS = null; j++; continue; }
      if (c === '"' || c === "'"){ inS = c; j++; continue; }
      if (c === '[') d++;
      else if (c === ']'){ d--; if (d === 0) return j; }
      j++;
    }
    return -1;
  }
  let closeIdx = balance(all);
  while (closeIdx === -1 && idx + 1 < lines.length){
    idx++; consumed++;
    all += '\n' + stripComment(lines[idx]).trim();
    closeIdx = balance(all);
  }
  if (closeIdx === -1) throw TomlError('Unterminated array', startIdx+1, 1);
  const body = all.slice(1, closeIdx).trim();
  const arr = [];
  if (body){
    // split by commas at top level
    const items = splitTopLevel(body, ',');
    for (const item of items){
      const it = item.trim();
      if (!it) continue;
      // recursively parse each element (single-line for simplicity)
      const r = parseValue(it, [it], 0);
      arr.push(r.value);
    }
  }
  return { value: arr, lines: consumed };
}

function parseInlineTable(s, lineNo){
  if (s[s.length-1] !== '}') throw TomlError('Unterminated inline table', lineNo, 1);
  const body = s.slice(1, -1).trim();
  const obj = {};
  if (!body) return { value: obj, lines: 0 };
  const items = splitTopLevel(body, ',');
  for (const item of items){
    const it = item.trim();
    if (!it) continue;
    const eq = findEquals(it);
    if (eq === -1) throw TomlError('Inline table entry missing "=": ' + it, lineNo, 1);
    const kp = it.slice(0, eq).trim();
    const vp = it.slice(eq+1).trim();
    const path = parseKeyPath(kp, lineNo);
    if (!path) throw TomlError('Bad key in inline table', lineNo, 1);
    const r = parseValue(vp, [vp], 0);
    setDeepLocal(obj, path, r.value);
  }
  return { value: obj, lines: 0 };
}
function setDeepLocal(obj, path, val){
  let o = obj;
  for (let k = 0; k < path.length - 1; k++){ if (o[path[k]] === undefined) o[path[k]] = {}; o = o[path[k]]; }
  o[path[path.length-1]] = val;
}

function splitTopLevel(s, sep){
  const out = []; let cur = '', depth = 0, inStr = null, i = 0;
  while (i < s.length){
    const c = s[i];
    if (inStr){ cur += c; if (c === '\\'){ cur += s[i+1]||''; i+=2; continue;} if (c === inStr) inStr = null; i++; continue; }
    if (c === '"' || c === "'"){ inStr = c; cur += c; i++; continue; }
    if (c === '[' || c === '{'){ depth++; cur += c; i++; continue; }
    if (c === ']' || c === '}'){ depth--; cur += c; i++; continue; }
    if (c === sep && depth === 0){ out.push(cur); cur = ''; i++; continue; }
    cur += c; i++;
  }
  if (cur.trim()) out.push(cur);
  return out;
}

function parseNumber(s){
  // integer with underscores / hex / oct / bin
  if (/^[-+]?[0-9]([0-9_]*[0-9])?$/.test(s)){
    return parseInt(s.replace(/_/g,''), 10);
  }
  if (/^0x[0-9A-Fa-f_]+$/.test(s)) return parseInt(s.replace(/_/g,''), 16);
  if (/^0o[0-7_]+$/.test(s)) return parseInt(s.replace(/_/g,'').replace('0o',''), 8);
  if (/^0b[01_]+$/.test(s)) return parseInt(s.replace(/_/g,'').replace('0b',''), 2);
  // float
  if (/^[-+]?([0-9_]+\.[0-9_]*|[0-9_]*\.[0-9_]+)([eE][-+]?[0-9]+)?([eE][-+]?[0-9]+)?$/.test(s) ||
      /^[-+]?[0-9_]+[eE][-+]?[0-9]+$/.test(s)){
    const f = parseFloat(s.replace(/_/g,''));
    if (!isNaN(f)) return f;
  }
  if (s === 'inf' || s === '+inf') return Infinity;
  if (s === '-inf') return -Infinity;
  if (s === 'nan' || s === '+nan' || s === '-nan') return NaN;
  return undefined;
}

function parseDatetime(s){
  // 2026-01-02 / 2026-01-02T15:04:05Z / 15:04:05 / with offset
  if (/^\d{4}-\d{2}-\d{2}([Tt ]\d{2}:\d{2}:\d{2}(\.\d+)?(Z|[+-]\d{2}:\d{2})?)?$/.test(s)) return s;
  if (/^\d{2}:\d{2}:\d{2}(\.\d+)?$/.test(s)) return s;
  if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
  return undefined;
}

// ---------- render ----------
function highlightJson(json){
  return json.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/("(?:\\.|[^"\\])*")(\s*:)?/g, (m, str, colon) => colon ? `<span class="toml-key">${str}</span>${colon}` : `<span class="toml-str">${str}</span>`)
    .replace(/\b(-?\d[\d.eE+-]*)\b/g, '<span class="toml-num">$1</span>')
    .replace(/\b(true|false)\b/g, '<span class="toml-bool">$1</span>');
}

function validate(){
  errors_global = [];
  const inp = $('#input').value;
  $('#output').innerHTML = '';
  if (!inp.trim()){ $('#status').innerHTML = `<span style="color:var(--gz-accent)">${t('empty')}</span>`; return; }
  let result;
  try {
    result = parseToml(inp);
    const json = JSON.stringify(result.data, null, 2);
    window._tomlOut = json;
    $('#output').innerHTML = highlightJson(json.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'));
    // re-highlight properly
    $('#output').innerHTML = highlightJson(json);
    $('#status').innerHTML = `<span style="color:var(--gz-success)">${t('valid')} · ${result.keys} ${t('keys')} / ${result.tables} ${t('tables')}</span>`;
  } catch(e){
    const errs = e.errors || [{line:0, col:0, msg: e.message}];
    let html = `<div class="err-list">`;
    errs.forEach(er => {
      const loc = er.line ? `<span class="ln">${t('line')} ${er.line}${er.col?':'+t('col')+' '+er.col:''}</span>` : '<span class="ln">—</span>';
      html += `<div class="row err">${loc}<span class="msg">${t('error')}: ${er.msg}</span></div>`;
    });
    html += '</div>';
    $('#output').innerHTML = html;
    $('#status').innerHTML = `<span style="color:var(--gz-accent)">${t('invalid')} · ${errs.length} ${t('error')}(s)</span>`;
    window._tomlOut = null;
  }
}

function doCopy(){ if (window._tomlOut != null) copyText(window._tomlOut); }
