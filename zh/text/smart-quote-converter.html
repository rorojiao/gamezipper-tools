<script>
GZI18n.register({
  en: {
    toolTitle: 'Smart Quote & Typography Converter',
    toolDesc: 'Convert straight quotes to curly quotes, em-dashes to en-dashes, three dots to ellipsis — instantly. Perfect for Word, blog posts and professional publishing.',

    metaSingular: 'change',

  },
  zh: {
    toolTitle: '智能引号 / 排版转换器',
    toolDesc: '将直引号转为弯引号、连字符转为长破折号、三个点转为省略号 — 即时转换。适合 Word、博客和出版级排版。',
    lblIn: '输入文本',
    lblOut: '转换输出',
    convert: '转换',
    example: '加载示例',
    clear: '清空',
    copy: '复制',
    pillsTitle: '试试插入：',
    step1: '粘贴包含直引号或 ASCII 破折号的文本',
    step2: '选择要应用的排版转换（引号、破折号、省略号）',
    step3: '点击转换按钮或自动转换',
    step4: '复制排版好的输出到文档或 CMS',
    metaSingular: '处替换',
    metaPlural: '处替换'
  }
});

const { $, copyText, t } = GZ;

const SAMPLE_EXAMPLES = {
  to: '"Hello," she said. "It\'s me."\n\nThe years 2010-2020 were great -- really great.\n\nWait... what did you mean by that?',
  from: '\u201cHello,\u201d she said. \u201cIt\u2019s me.\u201d\n\nThe years 2010\u20132020 were great \u2014 really great.\n\nWait\u2026 what did you mean by that?'
};

// Map straight -> curly
const QUOTE_MAP_TO = [
  [/\u201c|\u201d|\u2018|\u2019/g, ''], // ensure idempotent
  [/(\u201c|\u201d|")/g, '\u201c'], // left double will be replaced below
  [/"/g, '\u201c'], // we'll do a smarter pass below
];

// Smart typographic conversions (straight -> curly)
function convertToSmart(text, opts) {
  let out = text;

  // Quotes: do a two-pass — first identify opening vs closing based on context
  if (opts.quotes) {
    // Walk through the text and replace " and ' with smart quotes based on whether they open or close
    const chars = Array.from(out);
    let inDouble = false;
    let inSingle = false;
    for (let i = 0; i < chars.length; i++) {
      const c = chars[i];
      if (c === '"') {
        chars[i] = inDouble ? '\u201d' : '\u201c';
        inDouble = !inDouble;
      } else if (c === "'") {
        // Apostrophe when surrounded by letters (like don't) stays as right-single \u2019
        const prev = chars[i - 1] || '';
        const next = chars[i + 1] || '';
        const isApostrophe = /[A-Za-z]/.test(prev) && /[A-Za-z]/.test(next);
        if (isApostrophe) {
          chars[i] = '\u2019';
        } else {
          chars[i] = inSingle ? '\u2019' : '\u2018';
          inSingle = !inSingle;
        }
      }
    }
    out = chars.join('');
  }

  if (opts.dashes) {
    // Three hyphens -> em-dash
    out = out.replace(/---/g, '\u2014');
    // Two hyphens -> em-dash
    out = out.replace(/--/g, '\u2014');
    // Hyphen between digits (or word boundary digit) -> en-dash (e.g. 2010-2020, pp 5-10)
    out = out.replace(/(\d)\s*-\s*(\d)/g, '$1\u2013$2');
    // Space hyphen space -> em-dash (with thin spaces if you want, but standard for now)
    out = out.replace(/\s-\s/g, ' \u2014 ');
  }

  if (opts.ellipsis) {
    out = out.replace(/\.\.\./g, '\u2026');
    // Already-unicode ellipsis stays as-is
  }

  if (opts.bullets) {
    // * item at line start -> bullet
    out = out.replace(/(^|\n)\s*\*\s+/g, '$1\u2022 ');
  }

  return out;
}

// Reverse: curly -> straight
function convertFromSmart(text, opts) {
  let out = text;
  if (opts.quotes) {
    out = out.replace(/[\u201c\u201d]/g, '"');
    out = out.replace(/[\u2018\u2019]/g, "'");
  }
  if (opts.dashes) {
    out = out.replace(/\u2014/g, '--');
    out = out.replace(/\u2013/g, '-');
  }
  if (opts.ellipsis) {
    out = out.replace(/\u2026/g, '...');
  }
  if (opts.bullets) {
    out = out.replace(/\u2022\s*/g, '* ');
  }
  return out;
}

function getOpts() {
  return {
    quotes: $('#opt-quotes').checked,
    dashes: $('#opt-dashes').checked,
    ellipsis: $('#opt-ellipsis').checked,
    bullets: $('#opt-bullets').checked,
  };
}

function doConvert() {
  const inp = $('#input').value;
  const dir = $('#dir').value;
  const opts = getOpts();
  const out = dir === 'to' ? convertToSmart(inp, opts) : convertFromSmart(inp, opts);
  $('#output').value = out;

  // Count changes
  let changes = 0;
  if (out.length === inp.length) {
    for (let i = 0; i < out.length; i++) if (out[i] !== inp[i]) changes++;
  } else {
    changes = Math.abs(out.length - inp.length);
  }
  const meta = changes === 1 ? `1 ${t('metaSingular')}` : `${changes} ${t('metaPlural')}`;
  $('#meta').textContent = changes > 0 ? `\u2713 ${meta}` : '';
}

function loadExample() {
  const dir = $('#dir').value;
  $('#input').value = SAMPLE_EXAMPLES[dir];
  doConvert();
}

function doClear() {
  $('#input').value = '';
  $('#output').value = '';
  $('#meta').textContent = '';
}

function buildPills() {
  const pills = [
    { char: '\u201c \u201d', label: 'curly double' },
    { char: '\u2018 \u2019', label: 'curly single' },
    { char: '\u2014', label: 'em-dash' },
    { char: '\u2013', label: 'en-dash' },
    { char: '\u2026', label: 'ellipsis' },
    { char: '\u2022', label: 'bullet' },
  ];
  $('#pills').innerHTML = pills.map(p => `<span class="sqc-pill" data-chars="${p.char}">${p.char} &nbsp;<em style="opacity:.6">${p.label}</em></span>`).join('');
  $('#pills').querySelectorAll('.sqc-pill').forEach(el => {
    el.addEventListener('click', () => {
      const chars = el.getAttribute('data-chars');
      $('#input').value += chars;
      doConvert();
    });
  });
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="doConvert()">${t('convert')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="copyText($('#output').value)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

['#opt-quotes','#opt-dashes','#opt-ellipsis','#opt-bullets','#dir'].forEach(s => $(s).addEventListener('change', doConvert));
$('#input').addEventListener('input', doConvert);

buildPills();

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],

    {icon:'\ud83d\udcdd', href:'/text/text-to-handwriting.html', name:'Handwriting'},
    {icon:'\ud83d\udcdd', href:'/text/markdown-to-html.html', name:'Markdown to HTML'},
    {icon:'\ud83d\udd10', href:'/text/text-encryptor.html', name:'Text Encryptor'},
  ]
});
</script>
