<style>
.q-card{background:var(--glass2);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:12px;position:relative}
.q-card h3{margin:0 0 10px;font-size:.95em}
.q-card h3 span{cursor:pointer;opacity:.5;font-size:.8em;float:right}
.q-card h3 span:hover{opacity:1;color:var(--gz-accent)}
.q-input{width:100%;background:var(--glass);border:1px solid var(--border);color:var(--fg);border-radius:8px;padding:8px 12px;font-size:.9em;margin-bottom:8px}
.opt-row{display:flex;gap:8px;align-items:center;margin:4px 0}
.opt-row input[type=text]{flex:1;background:var(--glass);border:1px solid var(--border);color:var(--fg);border-radius:6px;padding:5px 8px;font-size:.85em}
.opt-row input[type=radio]{accent-color:var(--accent);width:18px;height:18px}
.opt-row button{background:none;border:none;color:var(--gz-accent);cursor:pointer;font-size:1em;padding:2px 6px}
.add-btn{font-size:.85em;cursor:pointer;color:var(--accent);background:none;border:1px dashed var(--border);border-radius:8px;padding:6px 14px}
.add-btn:hover{background:var(--glass2)}
.quiz-mode{max-width:640px;margin:0 auto}
.quiz-q{background:var(--glass2);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:16px}
.quiz-q h2{font-size:1.1em;margin:0 0 14px}
.quiz-opt{display:block;padding:10px 14px;margin:6px 0;border-radius:8px;border:1px solid var(--border);background:var(--glass);color:var(--fg);cursor:pointer;text-align:left;font-size:.92em;width:100%;transition:all .15s}
.quiz-opt:hover{border-color:var(--accent);background:var(--glass2)}
.quiz-opt.selected{border-color:var(--accent);background:rgba(78,205,196,.15)}
.quiz-opt.correct{border-color:#00d672;background:rgba(0,214,114,.15)}
.quiz-opt.wrong{border-color:#e94560;background:rgba(233,69,96,.15)}
.progress-bar{height:6px;background:var(--glass);border-radius:3px;margin-bottom:16px;overflow:hidden}
.progress-bar .fill{height:100%;background:var(--accent);border-radius:3px;transition:width .3s}
.score-card{text-align:center;padding:30px;background:var(--glass2);border:1px solid var(--border);border-radius:16px}
.score-card .big{font-size:3em;font-weight:900;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
</style>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div id="editor"></div>
    <div id="quizArea" style="display:none"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Quiz Maker',
    toolDesc: 'Create custom quizzes with multiple-choice questions, take them interactively, and get instant scores — free, no signup.',
    addQ: '+ Add Question',
    startQuiz: '▶ Start Quiz',
    backEdit: '← Back to Editor',
    q: 'Q',
    option: 'Option',
    correct: 'Mark correct answer',
    step1: 'Add questions with 2-4 answer options each',
    step2: 'Mark the correct answer with the radio button',
    step3: 'Click Start Quiz to take it interactively',
    step4: 'Review your score and try again to improve',
  },
  zh: {
    toolTitle: '测验制作器',
    toolDesc: '创建自定义多选一测验题目，交互式答题并即时评分 — 免费无需注册。',
    addQ: '+ 添加题目',
    startQuiz: '▶ 开始测验',
    backEdit: '← 返回编辑',
    q: '题',
    option: '选项',
    correct: '标记正确答案',
    step1: '添加题目，每题 2-4 个选项',
    step2: '用单选按钮标记正确答案',
    step3: '点击「开始测验」交互式答题',
    step4: '查看分数并重试提高成绩',
  }
});

const { $, copyText, t } = GZ;
let questions = [];
let qCounter = 0;

function addQuestion(preset) {
  const id = qCounter++;
  const q = preset || {text:'',options:['','','',''],correct:0};
  if (!q.options[2] && !q.options[3]) q.options = q.options.slice(0,2);
  questions.push(q);
  renderEditor();
}

function renderEditor() {
  const editor = $('#editor');
  editor.innerHTML = '';
  questions.forEach((q, qi) => {
    const card = document.createElement('div');
    card.className = 'q-card';
    card.innerHTML = `<h3>${t('q')}${qi+1} <span onclick="removeQuestion(${qi})">✕</span></h3>
      <input type="text" class="q-input" placeholder="Question text" value="${q.text}" oninput="questions[${qi}].text=this.value">
      <div id="opts-${qi}"></div>
      <button class="add-btn" onclick="addOption(${qi})">+ ${t('option')}</button>`;
    editor.appendChild(card);
    const optsDiv = card.querySelector(`#opts-${qi}`);
    q.options.forEach((opt, oi) => {
      const row = document.createElement('div');
      row.className = 'opt-row';
      row.innerHTML = `<input type="radio" name="correct-${qi}" ${oi===q.correct?'checked':''} onchange="questions[${qi}].correct=${oi}" title="${t('correct')}"><input type="text" value="${opt}" placeholder="${t('option')} ${oi+1}" oninput="questions[${qi}].options[${oi}]=this.value"><button onclick="removeOption(${qi},${oi})">✕</button>`;
      optsDiv.appendChild(row);
    });
  });
  editor.innerHTML += `<button class="add-btn" onclick="addQuestion()">${t('addQ')}</button>`;
}

function removeQuestion(qi) { questions.splice(qi,1); renderEditor(); }

function addOption(qi) {
  if (questions[qi].options.length >= 6) return;
  questions[qi].options.push('');
  renderEditor();
}

function removeOption(qi, oi) {
  if (questions[qi].options.length <= 2) return;
  questions[qi].options.splice(oi,1);
  if (questions[qi].correct >= questions[qi].options.length) questions[qi].correct = 0;
  renderEditor();
}

function startQuiz() {
  if (!questions.some(q => q.text.trim())) { alert('Please add at least one question'); return; }
  $('#editor').style.display = 'none';
  $('#quizArea').style.display = 'block';
  $('#toolbar').style.display = 'none';
  let current = 0, score = 0, answers = [];
  const total = questions.length;

  function renderQuestion() {
    const q = questions[current];
    const area = $('#quizArea');
    area.innerHTML = `
      <div class="quiz-mode">
        <div class="progress-bar"><div class="fill" style="width:${(current/total)*100}%"></div></div>
        <div style="font-size:.85em;opacity:.7;margin-bottom:8px">${t('q')}${current+1} / ${total}</div>
        <div class="quiz-q"><h2>${q.text || '(untitled question)'}</h2>
          ${q.options.map((opt, i) => `<button class="quiz-opt" onclick="selectAnswer(${i})">${opt || '(empty)'}</button>`).join('')}
        </div>
      </div>`;
  }

  window.selectAnswer = function(i) {
    const correct = questions[current].correct;
    const btns = document.querySelectorAll('.quiz-opt');
    btns.forEach((btn, idx) => {
      btn.onclick = null;
      if (idx === correct) btn.classList.add('correct');
      if (idx === i && i !== correct) btn.classList.add('wrong');
    });
    if (i === correct) score++;
    answers.push({q: current, selected: i, correct: i === correct});
    setTimeout(() => {
      current++;
      if (current < total) renderQuestion();
      else showResults();
    }, 800);
  };

  function showResults() {
    const pct = Math.round((score/total)*100);
    const emoji = pct >= 80 ? '🎉' : pct >= 50 ? '👍' : '💪';
    $('#quizArea').innerHTML = `
      <div class="quiz-mode">
        <div class="score-card">
          <div class="big">${emoji} ${score}/${total}</div>
          <p style="font-size:1.2em;margin:12px 0">${pct}% ${pct>=80?'Excellent!':pct>=50?'Good job!':'Keep trying!'}</p>
          <button class="gz-btn" onclick="startQuiz()">${t('startQuiz').replace('Start ','Retry ')}</button>
          <button class="gz-btn gz-btn-secondary" onclick="backToEdit()">${t('backEdit')}</button>
        </div>
      </div>`;
  }

  renderQuestion();
}

window.backToEdit = function() {
  $('#editor').style.display = 'block';
  $('#quizArea').style.display = 'none';
  $('#toolbar').style.display = 'flex';
};

function loadSample() {
  questions = [
    {text:'What is the capital of France?',options:['London','Paris','Berlin','Madrid'],correct:1},
    {text:'Which planet is closest to the Sun?',options:['Venus','Earth','Mercury','Mars'],correct:2},
    {text:'What does HTML stand for?',options:['HyperText Markup Language','High Tech Modern Language','HyperTransfer Markup Language','Home Tool Markup Language'],correct:0},
    {text:'What year was the World Wide Web invented?',options:['1985','1989','1993','1995'],correct:1},
  ];
  qCounter = questions.length;
  renderEditor();
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="startQuiz()">${t('startQuiz')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadSample()">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="copyText(JSON.stringify(questions,null,2))">📋 JSON</button>`;

// Load sample by default
loadSample();

GZ.renderToolPage({
  category: 'fun',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🎯', href:'/fun/name-picker.html', name:'Name Picker'},
    {icon:'🎲', href:'/fun/dice-roller.html', name:'Dice Roller'},
    {icon:'🧩', href:'/fun/word-search.html', name:'Word Search'},
    {icon:'🃏', href:'/fun/bingo.html', name:'Bingo'},
  ]
});
</script>

</body>
