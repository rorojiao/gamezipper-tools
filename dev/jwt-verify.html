const { $, copyText, t } = GZ;

let decodeOnly = false;

const SUPPORTED = ['HS256','HS384','HS512'];
const SHA = {'HS256':'SHA-256','HS384':'SHA-384','HS512':'SHA-512'};

function b64urlDecode(str){
  str = str.replace(/-/g,'+').replace(/_/g,'/');
  while(str.length % 4) str += '=';
  return atob(str);
}
function b64urlToBytes(str){
  const bin = b64urlDecode(str);
  const len = bin.length;
  const bytes = new Uint8Array(len);
  for(let i=0;i<len;i++) bytes[i] = bin.charCodeAt(i);
  return bytes;
}
function strToBytes(s){ return new TextEncoder().encode(s); }

function highlightJSON(json){
  return json.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/("(\\u[\da-fA-F]{4}|\\[^u]|[^\\"])*"\s*:)/g,'<span class="jk">$1</span>')
    .replace(/:\s*("(\\u[\da-fA-F]{4}|\\[^u]|[^\\"])*")/g,': <span class="js">$1</span>')
    .replace(/:\s*(-?\d+(\.\d+)?([eE][+-]?\d+)?)/g,': <span class="jn">$1</span>')
    .replace(/:\s*(true|false)/g,': <span class="jb">$1</span>')
    .replace(/:\s*(null)/g,': <span class="jnu">$1</span>');
}

function prettyHeader(obj){ return highlightJSON(JSON.stringify(obj,null,2)); }
function decodeClaims(s){ try{ return JSON.parse(b64urlDecode(s)); }catch(e){ return null; } }

function timeClaim(obj, key){
  if(typeof obj[key] !== 'number') return null;
  return new Date(obj[key]*1000);
}

async function verifyHMAC(signingInput, sigBytes, alg, secret){
  const keyData = strToBytes(secret);
  const key = await crypto.subtle.importKey('raw', keyData, {name:'HMAC', hash:SHA[alg]}, false, ['sign']);
  const mac = new Uint8Array(await crypto.subtle.sign('HMAC', key, strToBytes(signingInput)));
  if(mac.length !== sigBytes.length) return false;
  let diff = 0;
  for(let i=0;i<mac.length;i++) diff |= mac[i] ^ sigBytes[i];
  return diff === 0;
}

async function doVerify(){
  const raw = $('#input').value.trim();
  if(!raw){ $('#status').innerHTML=''; $('#output').innerHTML=''; return; }
  const parts = raw.split('.');
  if(parts.length !== 3){
    $('#status').innerHTML = `<span style="color:var(--gz-accent)">${t('invalid')} — expected 3 parts, got ${parts.length}.</span>`;
    $('#output').innerHTML='';
    return;
  }
  const [h,p,s] = parts;
  const header = decodeClaims(h);
  const payload = decodeClaims(p);
  if(!header || !payload){
    $('#status').innerHTML = `<span style="color:var(--gz-accent)">${t('invalid')} — header or payload is not valid JSON.</span>`;
    $('#output').innerHTML='';
    return;
  }
  const alg = header.alg || 'none';

  // Claims analysis
  const now = Date.now();
  const claims = [];
  const exp = timeClaim(payload,'exp');
  const nbf = timeClaim(payload,'nbf');
  const iat = timeClaim(payload,'iat');
  if(exp){
    const ok = now < exp.getTime();
    claims.push(`<span class="jwt-claim ${ok?'ok':'bad'}">${t(ok?'notExpired':'expired')} · ${exp.toISOString()}</span>`);
  } else {
    claims.push(`<span class="jwt-claim warn">${t('noExp')}</span>`);
  }
  if(nbf){
    const ok = now >= nbf.getTime();
    claims.push(`<span class="jwt-claim ${ok?'ok':'bad'}">${t(ok?'notExpired':'notYetValid')} · ${nbf.toISOString()}</span>`);
  }
  if(iat){
    claims.push(`<span class="jwt-claim ok">${t('issuedAt')} · ${iat.toISOString()}</span>`);
  }

  // Signature verification
  let sigState = '';
  let canVerify = SUPPORTED.includes(alg);
  if(decodeOnly){
    sigState = `<span class="jwt-claim warn">Decode-only — signature not checked</span>`;
  } else if(!canVerify){
    sigState = `<span class="jwt-claim warn">${t('algoUnsupported')}</span>`;
  } else {
    const secret = $('#secret').value;
    if(!secret){
      sigState = `<span class="jwt-claim warn">${t('noSecret')}</span>`;
    } else {
      try{
        const sigBytes = b64urlToBytes(s);
        const ok = await verifyHMAC(h + '.' + p, sigBytes, alg, secret);
        sigState = `<span class="jwt-claim ${ok?'ok':'bad'}">${t(ok?'sigValid':'sigInvalid')} · ${alg}</span>`;
      }catch(e){
        sigState = `<span class="jwt-claim bad">${t('sigInvalid')} · ${e.message}</span>`;
      }
    }
  }

  const sigPreview = s.length > 40 ? s.slice(0,40) + '…' : s;

  $('#output').innerHTML = `
    <div class="jwtpart"><h4>${t('header')} · alg=${alg}</h4><div class="jwt-json">${prettyHeader(header)}</div></div>
    <div class="jwtpart"><h4>${t('payload')}</h4><div class="jwt-json">${prettyHeader(payload)}</div></div>
    <div class="jwtpart"><h4>${t('signature')}</h4><div class="jwt-json">${sigPreview}</div></div>
    <div class="jwtpart"><h4>Claims &amp; status</h4>${sigState} ${claims.join(' ')}</div>`;

  $('#status').innerHTML = decodeOnly || !canVerify
    ? `<span style="color:var(--text2)">Decoded · ${alg}</span>`
    : (sigState.includes('ok') ? `<span style="color:var(--gz-success)">${t('sigValid')}</span>` : `<span style="color:var(--gz-accent)">Check status above</span>`);
}

function loadExample(){
  // A real HS256 token signed with secret "gamezipper-secret":
  $('#input').value = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiIxMjM0NTY3ODkwIiwibmFtZSI6IkdhbWVaaXBwZXIiLCJpYXQiOjE3MTAwMDAwMDAsImV4cCI6OTk5OTk5OTk5OSwiYWRtaW4iOnRydWV9.jj4Aa9Bc-fKE PLACEHOLDER';
  // Provide a properly-formed example header/payload (signature will not match — that is expected in decode-only)
  const enc = b => btoa(JSON.stringify(b)).replace(/=/g,'').replace(/\+/g,'-').replace(/\//g,'_');
  const header = enc({alg:'HS256',typ:'JWT'});
  const payload = enc({sub:'1234567890',name:'GameZipper',iat:1710000000,exp:9999999999,admin:true});
  // compute a real signature so example verifies with the right secret
  $('#input').value = header + '.' + payload + '.';
  // We'll compute the signature client-side and append
  (async () => {
    const secret = 'gamezipper-secret';
    const key = await crypto.subtle.importKey('raw', strToBytes(secret), {name:'HMAC',hash:'SHA-256'}, false, ['sign']);
    const mac = new Uint8Array(await crypto.subtle.sign('HMAC', key, strToBytes(header+'.'+payload)));
    let bin=''; for(const b of mac) bin += String.fromCharCode(b);
    const sig = btoa(bin).replace(/=/g,'').replace(/\+/g,'-').replace(/\//g,'_');
    $('#input').value = header + '.' + payload + '.' + sig;
    $('#secret').value = secret;
    doVerify();
  })();
}

$('#input').addEventListener('input', doVerify);

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="doVerify()">${t('verify')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#input').value='';doVerify()">${t('clear')}</button>`;

$('#opts').innerHTML = `
  <label style="flex:1 1 100%">${t('secret')}: <input id="secret" class="secret" type="text" placeholder="your-hmac-secret" oninput="doVerify()"></label>
  <label><input type="checkbox" onchange="decodeOnly=this.checked;$('#secret').disabled=this.checked;doVerify()"> ${t('decodeOnly')}</label>`;

  ]
});
</script>
