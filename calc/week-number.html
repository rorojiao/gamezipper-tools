<script>

  en: {
    toolTitle: 'Week Number Calculator',

    step2: 'The ISO week number appears prominently in the hero card',

  },
  zh: {
    toolTitle: '周数计算器',
    toolDesc: '查找任意日期的 ISO 周数。查看当前周、年中第几天、ISO 周日期和剩余周数。',
    dateLabel: '日期：',
    today: '今天',
    weekLabel: 'ISO 周',
    weekOf: '/ {year} 年共 {total} 周',
    statDayOfYear: '年中第几天',
    statDayOfWeek: '星期',
    statQuarter: '季度',
    statWeeksLeft: '剩余周数',
    statDaysLeft: '剩余天数',
    statIsoDate: 'ISO 周日期',
    statIsLeap: '闰年',
    yes: '是',
    no: '否',
    weekdays: ['星期日','星期一','星期二','星期三','星期四','星期五','星期六'],
    step1: '使用日期选择器选择任意日期（默认为今天）',
    step2: 'ISO 周数即时显示在顶部大卡片中',
    step3: '下方显示年中第几天、季度、剩余周数和 ISO 周日期',
    step4: '点击「今天」返回当前日期',
  }
});

const { $, t } = GZ;

function getISOWeek(date) {
  // ISO 8601: week starts Monday, first week has first Thursday
  const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
  const dayNum = d.getUTCDay() || 7;
  d.setUTCDate(d.getUTCDate() + 4 - dayNum);
  const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
  const weekNum = Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
  return { week: weekNum, year: d.getUTCFullYear() };
}

function getISOWeekDate(date) {
  const { week, year } = getISOWeek(date);
  const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
  const dayNum = d.getUTCDay() || 7;
  return `${year}-W${String(week).padStart(2,'0')}-${dayNum}`;
}

function getTotalWeeks(year) {
  // a year has 53 weeks if Jan 1 is Thursday, or if leap year and Jan 1 is Wednesday
  const jan1 = new Date(year, 0, 1);
  const jan1Day = jan1.getDay();
  const isLeap = (year % 4 === 0 && year % 100 !== 0) || year % 400 === 0;
  if (jan1Day === 4 || (jan1Day === 3 && isLeap)) return 53;
  return 52;
}

function getDayOfYear(date) {
  const start = new Date(date.getFullYear(), 0, 0);
  const diff = date - start;
  return Math.floor(diff / 86400000);
}

function isLeapYear(year) {
  return (year % 4 === 0 && year % 100 !== 0) || year % 400 === 0;
}

function calculate() {
  const dateStr = $('#date-input').value;
  if (!dateStr) return;
  const date = new Date(dateStr + 'T00:00:00');
  const { week, year } = getISOWeek(date);
  const totalWeeks = getTotalWeeks(year);
  const dayOfYear = getDayOfYear(date);
  const dayOfWeek = date.getDay();
  const quarter = Math.floor(date.getMonth() / 3) + 1;
  const daysInYear = isLeapYear(year) ? 366 : 365;
  const daysLeft = daysInYear - dayOfYear;
  const weeksLeft = totalWeeks - week;

  $('#week-num').textContent = week;
  $('#week-label').textContent = t('weekLabel');
  $('#week-date').innerHTML = t('weekOf').replace('{total}', totalWeeks).replace('{year}', year);

  const weekdays = t('weekdays');
  $('#stat-grid').innerHTML = `
    <div class="stat-cell"><div class="num">${dayOfYear}</div><div class="lbl">${t('statDayOfYear')}</div></div>
    <div class="stat-cell"><div class="num">${weekdays[dayOfWeek]}</div><div class="lbl">${t('statDayOfWeek')}</div></div>
    <div class="stat-cell"><div class="num">Q${quarter}</div><div class="lbl">${t('statQuarter')}</div></div>
    <div class="stat-cell"><div class="num">${getISOWeekDate(date)}</div><div class="lbl">${t('statIsoDate')}</div></div>
    <div class="stat-cell"><div class="num">${weeksLeft}</div><div class="lbl">${t('statWeeksLeft')}</div></div>
    <div class="stat-cell"><div class="num">${daysLeft}</div><div class="lbl">${t('statDaysLeft')}</div></div>
    <div class="stat-cell"><div class="num">${isLeapYear(year) ? t('yes') : t('no')}</div><div class="lbl">${t('statIsLeap')}</div></div>`;
}

function setToday() {
  const now = new Date();
  $('#date-input').value = now.toISOString().split('T')[0];
  calculate();
}

// init
const today = new Date();
$('#date-input').value = today.toISOString().split('T')[0];
$('#date-input').addEventListener('input', calculate);
$('#today-btn').addEventListener('click', setToday);
$('#today-btn').textContent = t('today');
$('#lbl-date').textContent = t('dateLabel');

$('#toolbar').innerHTML = `<button class="gz-btn gz-btn-secondary" onclick="setToday()">${t('today')}</button>`;

calculate();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',

    {icon:'⏰', href:'/calc/days-until.html', name:'Days Until'},
    {icon:'🎯', href:'/calc/countdown-timer.html', name:'Countdown'},
  ]
});
</script>
