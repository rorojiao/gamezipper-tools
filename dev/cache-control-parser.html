<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What does Cache-Control: max-age=3600 mean?", "acceptedAnswer": {"@type": "Answer", "text": "It tells every cache (browser, CDN, proxy) that the response is fresh for 3600 seconds (1 hour) from the time it was received. After that the cached copy is considered stale and must be revalidated."}}, {"@type": "Question", "name": "What is the difference between no-cache and no-store?", "acceptedAnswer": {"@type": "Answer", "text": "no-store forbids storing the response anywhere — the strongest cache prevention. no-cache allows storage but forces the cache to revalidate with the origin (via ETag or Last-Modified) before serving a copy."}}, {"@type": "Question", "name": "What does immutable do?", "acceptedAnswer": {"@type": "Answer", "text": "immutable tells the browser that the resource will never change during its freshness lifetime, so even a hard reload (Ctrl+R) should not trigger a conditional request. Pair it with long max-age on fingerprinted assets."}}, {"@type": "Question", "name": "How is the freshness lifetime computed?", "acceptedAnswer": {"@type": "Answer", "text": "The browser uses s-maxage for shared caches if present, otherwise max-age. If neither is set it falls back to the Expires header minus the Date header. This tool replicates RFC 7234 logic and also shows a human-readable TTL."}}]}</script>

<script>
GZI18n.register({
  en: {

    toolDesc: 'Parse and validate HTTP Cache-Control and related caching headers. Shows directives, freshness lifetime, TTL in plain English and warns about conflicting values — pure browser, no network calls.',
    parse: 'Parse',
    lblCc: 'Cache-Control',

  },
  zh: {

    toolDesc: '解析和校验 HTTP Cache-Control 及相关缓存头部。显示指令、新鲜期、TTL（中英文）并提示冲突值 — 纯浏览器，无网络请求。',
    parse: '解析',
    lblCc: 'Cache-Control',
    lblExpires: 'Expires',
    lblDate: 'Date（服务器）',
    lblEtag: 'ETag',
    lblVary: 'Vary',
    lblOut: '解析结果',
    empty: '在左侧粘贴 Cache-Control 值，然后点击「解析」。',
    directives: '指令',
    freshLife: '新鲜期',
    seconds: '秒',
    humanTtl: '有效 TTL',
    cacheTags: '可缓存性',
    invalid: '⚠ 无效指令：',
    step1: '粘贴响应中的 Cache-Control 头部值',
    step2: '可选填 Expires、Date、ETag 和 Vary',
    step3: '点击「解析」分解每个指令',
    step4: '查看 TTL、可缓存性标签和警告',
  }
});

const { $, copyText, t } = GZ;

const BOOL_DIRECTIVES = ['public','private','no-cache','no-store','no-transform','must-revalidate','proxy-revalidate','immutable','only-if-cached','stale-while-revalidate','stale-if-error'];
const SEC_DIRECTIVES = ['max-age','s-maxage','stale-while-revalidate','stale-if-error'];

function humanDuration(sec){
  if(sec == null || isNaN(sec)) return '—';
  if(sec <= 0) return '0 (already stale)';
  const units = [['year',31536000],['day',86400],['hour',3600],['minute',60],['second',1]];
  const parts = [];
  for(const [name,s] of units){
    const n = Math.floor(sec/s);
    if(n>0){ parts.push(`${n} ${name}${n>1?'s':''}`); sec -= n*s; }
    if(parts.length>=2) break;
  }
  return parts.join(' ') || 'less than a second';
}

function parseCacheControl(raw){
  const out = { valid:true, errors:[], bools:[], secs:{}, ext:{} };
  if(!raw || !raw.trim()){ out.empty = true; return out; }
  const tokens = raw.split(',').map(s=>s.trim()).filter(Boolean);
  for(const tok of tokens){
    const eq = tok.indexOf('=');
    let key, val;
    if(eq >= 0){ key = tok.slice(0,eq).trim().toLowerCase(); val = tok.slice(eq+1).trim().replace(/^"|"$/g,''); }
    else { key = tok.toLowerCase(); val = true; }
    if(BOOL_DIRECTIVES.includes(key) && val === true){ out.bools.push(key); }
    else if(SEC_DIRECTIVES.includes(key)){
      const n = parseInt(val,10);
      if(isNaN(n) || n<0){ out.valid=false; out.errors.push(key+'='+val); }
      else out.secs[key] = n;
    }
    else if(val === true){ out.valid=false; out.errors.push(tok); }
    else out.ext[key] = val;
  }
  return out;
}

function computeFreshness(cc, expiresStr, dateStr){
  // shared cache TTL
  if(cc.secs['s-maxage'] != null) return { shared:cc.secs['s-maxage'], source:'s-maxage' };
  if(cc.secs['max-age'] != null) return { shared:cc.secs['max-age'], private:cc.secs['max-age'], source:'max-age' };
  if(expiresStr){
    const exp = Date.parse(expiresStr);
    if(!isNaN(exp)){
      const base = dateStr && !isNaN(Date.parse(dateStr)) ? Date.parse(dateStr) : Date.now();
      const diff = Math.round((exp - base)/1000);
      return { shared:diff, private:diff, source:'Expires' };
    }
  }
  return { shared:null, private:null, source:'heuristic' };
}

function doParse(){
  const ccRaw = $('#cc').value;
  const expires = $('#expires').value.trim();
  const date = $('#date').value.trim();
  const etag = $('#etag').value.trim();
  const vary = $('#vary').value.trim();
  if(!ccRaw && !expires && !etag && !vary){
    $('#output').innerHTML = `<span style="color:var(--text3)">${t('empty')}</span>`;
    $('#status').innerHTML = '';
    return;
  }
  const cc = parseCacheControl(ccRaw);
  const ttl = computeFreshness(cc, expires, date);

  let html = '';

  // Cacheability tags
  const tags = [];
  if(cc.bools.includes('no-store')) tags.push(`<span class="tag warn">no-store</span>`);
  else if(cc.bools.includes('no-cache')) tags.push(`<span class="tag warn">no-cache (revalidate)</span>`);
  else if(cc.bools.includes('private')) tags.push(`<span class="tag info">private</span>`);
  else if(cc.bools.includes('public')) tags.push(`<span class="tag ok">public</span>`);
  if(cc.bools.includes('immutable')) tags.push(`<span class="tag ok">immutable</span>`);
  if(cc.bools.includes('must-revalidate')) tags.push(`<span class="tag info">must-revalidate</span>`);
  if(cc.secs['stale-while-revalidate'] != null) tags.push(`<span class="tag info">SWR ${cc.secs['stale-while-revalidate']}s</span>`);

  html += `<div><b>${t('cacheTags')}:</b> ${tags.length ? tags.join('') : '<span class="tag">default (heuristic)</span>'}</div>`;

  // TTL box
  const ttlSec = ttl.shared;
  html += `<div class="ttl"><b>${t('humanTtl')}:</b> ${ttl.source === 'heuristic' ? 'no explicit cache TTL — cache may use heuristic freshness' : humanDuration(ttlSec)}<br>
    <b>${t('freshLife')}:</b> ${ttlSec == null ? '—' : ttlSec + ' ' + t('seconds')} &nbsp;<span style="color:var(--text3)">(${ttl.source})</span></div>`;

  // Directives table
  html += `<div style="margin-top:10px"><b>${t('directives')}</b></div><div class="directives">`;
  cc.bools.forEach(b => html += `<span class="k">${b}</span><span class="v">true</span>`);
  Object.entries(cc.secs).forEach(([k,v]) => html += `<span class="k">${k}</span><span class="v">${v} ${t('seconds')} (${humanDuration(v)})</span>`);
  Object.entries(cc.ext).forEach(([k,v]) => html += `<span class="k">${k}</span><span class="v">${v}</span>`);
  if(etag) html += `<span class="k">ETag</span><span class="v">${escapeHtml(etag)} — enables conditional revalidation</span>`;
  if(vary) html += `<span class="k">Vary</span><span class="v">${escapeHtml(vary)} — separate cache entries per listed header</span>`;
  if(expires && ttl.source !== 'Expires') html += `<span class="k">Expires</span><span class="v">${escapeHtml(expires)}</span>`;
  html += `</div>`;

  // Errors
  if(cc.errors.length){
    html += `<div style="margin-top:10px;color:var(--gz-accent)">${t('invalid')} ${cc.errors.map(escapeHtml).join(', ')}</div>`;
  }
  // Conflict warnings
  if(cc.bools.includes('no-store') && (cc.secs['max-age'] != null || cc.secs['s-maxage'] != null)){
    html += `<div style="margin-top:6px;color:var(--gz-accent)">⚠ no-store combined with max-age is contradictory.</div>`;
  }
  if(cc.bools.includes('public') && cc.bools.includes('private')){
    html += `<div style="margin-top:6px;color:var(--gz-accent)">⚠ public and private are mutually exclusive.</div>`;
  }
  $('#output').innerHTML = html;
  $('#status').innerHTML = cc.valid && !cc.errors.length
    ? `<span style="color:var(--gz-success)">✓ Parsed · ${cc.bools.length + Object.keys(cc.secs).length + Object.keys(cc.ext).length} directive(s)</span>`
    : `<span style="color:var(--gz-accent)">⚠ Parsed with ${cc.errors.length} error(s)</span>`;
}

function escapeHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function loadExample(){
  $('#cc').value = 'public, max-age=3600, s-maxage=86400, stale-while-revalidate=604800, immutable';
  $('#expires').value = '';
  $('#etag').value = '"v1.2.3-abc"';
  $('#vary').value = 'Accept-Encoding';
  doParse();
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="doParse()">${t('parse')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="['cc','expires','date','etag','vary'].forEach(id=>\$('#'+id).value='');doParse()">${t('clear')}</button>`;

['cc','expires','date','etag','vary'].forEach(id => $('#'+id).addEventListener('input', doParse));

    {icon:'🔐', href:'/dev/jwt.html', name:'JWT Decoder'},
    {icon:'🔗', href:'/dev/url-parser.html', name:'URL Parser'},
  ]
});
</script>
