    toolDesc: '通过移除空白、注释和冗余字符压缩 CSS。显示精确字节节省 — 100% 浏览器本地运行。',
    original: '原始',
    minified: '压缩后',
    saved: '节省',

    after: '压缩后',
    step1: '在输入区粘贴或输入 CSS',
    step2: '点击「压缩」即时压缩 CSS',
    step3: '查看字节节省和压缩率',
    step4: '点击「复制」将压缩后的 CSS 复制到剪贴板',
  }
});

const { $, copyText, t } = GZ;

function minifyCSS(css) {
  let out = css;
  // Remove comments
  out = out.replace(/\/\*[\s\S]*?\*\//g, '');
  // Remove leading/trailing whitespace per rule block
  out = out.replace(/^\s+|\s+$/g, '');
  // Collapse whitespace
  out = out.replace(/\s+/g, ' ');
  // Remove space before { , ; : }
  out = out.replace(/\s*([{},;:>])\s*/g, '$1');
  // Restore space after colon for selectors media queries — not needed for values
  // Remove trailing semicolons before }
  out = out.replace(/;}/g, '}');
  // Remove last semicolon
  out = out.replace(/;+\s*}/g, '}');
  // Trim
  out = out.trim();
  // Unit optimizations
  out = out.replace(/(\D)0px/g, '$10');
  out = out.replace(/(\D)0\.(\d+)/g, '$1.$2');
  return out;
}

function doMinify() {
  const inp = $('#input').value;
  if (!inp.trim()) { $('#output').textContent = ''; $('#stats').innerHTML = ''; return; }
  const result = minifyCSS(inp);
  $('#output').textContent = result;
  const before = new Blob([inp]).size;
  const after = new Blob([result]).size;
  const saved = before - after;
  const pct = before > 0 ? ((saved / before) * 100).toFixed(1) : '0';
  $('#stats').innerHTML = `<span>${t('before')}: <b>${before.toLocaleString()}</b> bytes</span><span>${t('after')}: <b>${after.toLocaleString()}</b> bytes</span><span>${t('saved')}: <b>${saved.toLocaleString()}</b> bytes (${pct}%)</span>`;
}

function loadExample() {
  $('#input').value = `/* Button styles */

  padding: 10px 20px;
  margin: 0px;
  font-size: 16px;
  color: #ffffff;
  background-color: #007bff;
  border: none;
  border-radius: 4px;
  cursor: pointer;
  transition: background-color 0.2s ease;
}

.btn:hover {
  background-color: #0056b3;
}

/* Primary variant */
.btn-primary {
  background-color: #28a745;
}`;
  doMinify();
}

function doClear() { $('#input').value = ''; $('#output').textContent = ''; $('#stats').innerHTML = ''; }

$('#input').addEventListener('input', doMinify);

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="doMinify()">${t('format')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;
