<style>
.gz-controls{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.gz-controls label{font-size:.8em;opacity:.8;display:block;margin-bottom:2px}
.gz-controls input[type=range],.gz-controls input[type=color],.gz-controls input[type=number],.gz-controls select{width:100%}
#preview-area{background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:40px 24px;margin-bottom:16px}
.bar-wrap{margin-bottom:20px}
.bar-label{font-size:.85em;margin-bottom:4px;display:flex;justify-content:space-between}
.bar-outer{border-radius:var(--radius);overflow:hidden;background:var(--track)}
.bar-inner{border-radius:var(--radius);height:100%;transition:width .4s ease;display:flex;align-items:center;justify-content:flex-end;padding-right:8px;font-size:.75em;color:#fff;white-space:nowrap}
.bar-inner.striped{background-image:linear-gradient(45deg,rgba(255,255,255,.15) 25%,transparent 25%,transparent 50%,rgba(255,255,255,.15) 50%,rgba(255,255,255,.15) 75%,transparent 75%,transparent);background-size:var(--stripe-size) var(--stripe-size)}
.bar-inner.striped.animated{animation:stripe-move 1s linear infinite}
@keyframes stripe-move{0%{background-position:0 0}100%{background-position:var(--stripe-size) 0}}
#output-code{white-space:pre-wrap;word-break:break-all;font-family:monospace;font-size:.8em;line-height:1.5;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px;max-height:300px;overflow:auto}

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="gz-controls" id="controls"></div>
    <div id="preview-area"></div>
    <div id="output-code"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'CSS Progress Bar Generator',
    toolDesc: 'Design beautiful CSS progress bars with live preview — colors, height, animation, stripes and labels. Copy production-ready code.',
    value: 'Value (%)',
    height: 'Height (px)',
    borderRadius: 'Border Radius (px)',
    fillColor: 'Fill Color',
    trackColor: 'Track Color',
    showLabel: 'Show Label',
    striped: 'Striped',
    animated: 'Animated Stripes',
    showMulti: 'Show Multiple Bars',
    barLabel: 'Progress',
    step1: 'Adjust the sliders to customize your progress bar',
    step2: 'Toggle stripes, animation and labels as needed',
    step3: 'Preview the result in real time',
    step4: 'Copy the generated CSS + HTML code into your project',
  },
  zh: {
    toolTitle: 'CSS 进度条生成器',
    toolDesc: '可视化设计精美的 CSS 进度条 — 自定义颜色、高度、动画、条纹和标签，一键复制生产可用代码。',
    value: '进度值 (%)',
    height: '高度 (px)',
    borderRadius: '圆角 (px)',
    fillColor: '填充颜色',
    trackColor: '轨道颜色',
    showLabel: '显示标签',
    striped: '条纹效果',
    animated: '动画条纹',
    showMulti: '显示多个示例',
    barLabel: '进度',
    step1: '调整滑块自定义进度条样式',
    step2: '切换条纹、动画和标签',
    step3: '实时预览效果',
    step4: '复制生成的 CSS + HTML 代码到你的项目',
  }
});

const { $, copyText, t } = GZ;
let cfg = { value: 65, height: 24, radius: 12, fill: '#4ecdc4', track: '#e0e0e0', showLabel: true, striped: false, animated: false, multi: false };

function renderControls() {
  $('#controls').innerHTML = `
    <div><label>${t('value')}</label><input type="range" id="c-val" min="0" max="100" value="${cfg.value}" oninput="cfg.value=+this.value;render()"></div>
    <div><label>${t('height')}</label><input type="range" id="c-h" min="4" max="60" value="${cfg.height}" oninput="cfg.height=+this.value;render()"></div>
    <div><label>${t('borderRadius')}</label><input type="range" id="c-r" min="0" max="30" value="${cfg.radius}" oninput="cfg.radius=+this.value;render()"></div>
    <div><label>${t('fillColor')}</label><input type="color" id="c-fill" value="${cfg.fill}" oninput="cfg.fill=this.value;render()"></div>
    <div><label>${t('trackColor')}</label><input type="color" id="c-track" value="${cfg.track}" oninput="cfg.track=this.value;render()"></div>
    <div><label>${t('showLabel')} <input type="checkbox" id="c-lbl" ${cfg.showLabel?'checked':''} onchange="cfg.showLabel=this.checked;render()"></label></div>
    <div><label>${t('striped')} <input type="checkbox" id="c-str" ${cfg.striped?'checked':''} onchange="cfg.striped=this.checked;render()"></label></div>
    <div><label>${t('animated')} <input type="checkbox" id="c-ani" ${cfg.animated?'checked':''} onchange="cfg.animated=this.checked;render()"></label></div>
    <div><label>${t('showMulti')} <input type="checkbox" id="c-multi" ${cfg.multi?'checked':''} onchange="cfg.multi=this.checked;render()"></label></div>
  `;
}

function barHTML(val, fill, label) {
  const cls = (cfg.striped ? ' striped' : '') + (cfg.animated ? ' animated' : '');
  const lbl = cfg.showLabel ? `<div class="bar-label"><span>${label || t('barLabel')}</span><span>${val}%</span></div>` : '';
  return `<div class="bar-wrap">${lbl}<div class="bar-outer" style="height:${cfg.height}px;background:${cfg.track};border-radius:${cfg.radius}px"><div class="bar-inner${cls}" style="width:${val}%;background:${fill};border-radius:${cfg.radius}px;--stripe-size:${cfg.height}px"></div></div></div>`;
}

function genCode() {
  const val = cfg.value, h = cfg.height, r = cfg.radius;
  const stripedCSS = cfg.striped ? `\nbackground-image: linear-gradient(45deg,rgba(255,255,255,.15) 25%,transparent 25%,transparent 50%,rgba(255,255,255,.15) 50%,rgba(255,255,255,.15) 75%,transparent 75%,transparent);\nbackground-size: ${h}px ${h}px;` : '';
  const animCSS = cfg.animated ? `\n@keyframes progress-stripe {\n  0% { background-position: 0 0; }\n  100% { background-position: ${h}px 0; }\n}\n.progress-bar { animation: progress-stripe 1s linear infinite; }` : '';
  return `<style>
.progress-track {
  height: ${h}px;
  background: ${cfg.track};
  border-radius: ${r}px;
  overflow: hidden;
}
.progress-bar {
  height: 100%;
  width: ${val}%;
  background: ${cfg.fill};
  border-radius: ${r}px;
  transition: width 0.4s ease;${stripedCSS}
}${animCSS}
</style>

<div class="progress-track">
  <div class="progress-bar"></div>
</div>`;
}

function render() {
  const area = $('#preview-area');
  let html = barHTML(cfg.value, cfg.fill);
  if (cfg.multi) {
    html += barHTML(25, '#ff6b6b', 'Storage');
    html += barHTML(82, '#ffd93d', 'Bandwidth');
    html += barHTML(50, '#6bcb77', 'CPU');
  }
  area.innerHTML = html;
  $('#output-code').textContent = genCode();
}

$('#toolbar').innerHTML = `<button class="gz-btn" onclick="copyText($('#output-code').textContent)">${t('copy')}</button>`;

renderControls();
render();

GZ.renderToolPage({
  category: 'css',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🔘', href:'/css-tools/border-radius.html', name:'Border Radius'},
    {icon:'🔲', href:'/css-tools/shadow.html', name:'Box Shadow'},
    {icon:'🎨', href:'/css-tools/gradient.html', name:'Gradient'},
    {icon:'📐', href:'/css-tools/clamp.html', name:'Clamp()'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
