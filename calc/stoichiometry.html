<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is stoichiometry?", "acceptedAnswer": {"@type": "Answer", "text": "Stoichiometry is the part of chemistry that calculates the quantities of reactants and products in chemical reactions. It uses the mole concept and balanced equations to convert between mass, moles and number of particles."}}, {"@type": "Question", "name": "How do I convert grams to moles?", "acceptedAnswer": {"@type": "Answer", "text": "Divide the mass in grams by the molar mass of the substance in g/mol. Moles = mass (g) ÷ molar mass (g/mol). For example, 36 g of water (molar mass 18.015 g/mol) equals about 2 moles."}}, {"@type": "Question", "name": "What is Avogadro's number?", "acceptedAnswer": {"@type": "Answer", "text": "Avogadro's number is 6.022 × 10²³ particles per mole. One mole of any substance contains exactly this many atoms, molecules or formula units."}}, {"@type": "Question", "name": "How are molecules and atoms different here?", "acceptedAnswer": {"@type": "Answer", "text": "Molecules (or formula units) count the whole chemical units. Atoms counts every individual atom, which equals molecules multiplied by the total number of atoms in one formula unit. For H2O, 1 molecule contains 3 atoms."}}]}</script>

    lblFormula: '化学式',
    lblValue: '数量',
    lblUnit: '单位',
    btnCalc: '转换',
    resMoles: '摩尔 (mol)',
    resGrams: '质量 (g)',
    resMolecules: '分子数',
    resAtoms: '原子数',
    resMolar: '摩尔质量 (g/mol)',
    note: '<b>阿伏伽德罗常数：</b>每摩尔 6.022 × 10²³ 个微粒。 &nbsp; <b>公式：</b>mol = g ÷ M &nbsp;·&nbsp; 分子数 = mol × N<sub>A</sub> &nbsp;·&nbsp; 原子数 = 分子数 × 每式单元的原子数。',
    step1: '输入化学式（如 H2SO4、NaCl、C6H12O6）',
    step2: '输入数量并选择单位（克、摩尔或分子数）',
    step3: '点击「转换」查看所有等价数量',
    step4: '通过摩尔质量和阿伏伽德罗说明验证结果',
  }
});

const { $, t } = GZ;
const NA = 6.02214076e23;

// Atomic masses
const ATOMIC = {
  H:1.008, He:4.0026, Li:6.94, Be:9.0122, B:10.81, C:12.011, N:14.007, O:15.999, F:18.998, Ne:20.180,
  Na:22.990, Mg:24.305, Al:26.982, Si:28.085, P:30.974, S:32.06, Cl:35.45, Ar:39.948, K:39.098, Ca:40.078,
  Sc:44.956, Ti:47.867, V:50.942, Cr:51.996, Mn:54.938, Fe:55.845, Co:58.933, Ni:58.693, Cu:63.546, Zn:65.38,
  Ga:69.723, Ge:72.63, As:74.922, Se:78.971, Br:79.904, Kr:83.798, Rb:85.468, Sr:87.62, Y:88.906, Zr:91.224,
  Nb:92.906, Mo:95.95, Tc:98, Ru:101.07, Rh:102.91, Pd:106.42, Ag:107.87, Cd:112.41, In:114.82, Sn:118.71,
  Sb:121.76, Te:127.60, I:126.90, Xe:131.29, Cs:132.91, Ba:137.33, La:138.91, Ce:140.12, Pr:140.91, Nd:144.24,
  Pm:145, Sm:150.36, Eu:151.96, Gd:157.25, Tb:158.93, Dy:162.50, Ho:164.93, Er:167.26, Tm:168.93, Yb:173.05,
  Lu:174.97, Hf:178.49, Ta:180.95, W:183.84, Re:186.21, Os:190.23, Ir:192.22, Pt:195.08, Au:196.97, Hg:200.59,
  Tl:204.38, Pb:207.2, Bi:208.98, Po:209, At:210, Rn:222, Fr:223, Ra:226, Ac:227, Th:232.04, Pa:231.04, U:238.03
};

function parseFormula(formula) {
  formula = formula.replace(/[·•*]/g, '.').replace(/\s+/g, '').replace(/[\[\]]/g, m => m === '[' ? '(' : ')');
  const segs = []; let depth = 0, cur = '';
  for (const ch of formula) {
    if (ch === '(') depth++;
    if (ch === ')') depth--;
    if (ch === '.' && depth === 0) { segs.push(cur); cur = ''; }
    else cur += ch;
  }
  segs.push(cur);
  const counts = {};
  for (const seg of segs) {
    if (!seg) continue;
    const m = seg.match(/^(\d+)/);
    const mult = m ? parseInt(m[1], 10) : 1;
    const rest = m ? seg.slice(m[1].length) : seg;
    const c = parseSegment(rest);
    for (const k in c) counts[k] = (counts[k] || 0) + c[k] * mult;
  }
  return counts;
}

function parseSegment(s) {
  let i = 0; const len = s.length;
  function readNumber() { let n=''; while(i<len && /[0-9]/.test(s[i])){n+=s[i];i++;} return n===''?1:parseInt(n,10); }
  function parseGroup() {
    const counts = {};
    while (i < len) {
      const ch = s[i];
      if (ch === '(') { i++; const inner = parseGroup(); if(s[i]!==')') throw new Error('Missing ")"'); i++; const m=readNumber(); for(const k in inner) counts[k]=(counts[k]||0)+inner[k]*m; }
      else if (ch === ')') break;
      else if (/[A-Z]/.test(ch)) {
        let sym=ch; i++;
        if(i<len && /[a-z]/.test(s[i])){sym+=s[i];i++;}
        if(ATOMIC[sym]===undefined) throw new Error('Unknown element: '+sym);
        const m=readNumber(); counts[sym]=(counts[sym]||0)+m;
      } else throw new Error('Invalid character');
    }
    return counts;
  }
  const r = parseGroup();
  if (i < len) throw new Error('Invalid formula');
  return r;
}

function fmtSci(n) {
  if (!isFinite(n)) return '—';
  if (n === 0) return '0';
  const abs = Math.abs(n);
  if (abs >= 1e6 || abs < 1e-3) {
    return n.toExponential(4).replace('e+',' × 10^').replace('e-',' × 10^-');
  }
  return parseFloat(n.toPrecision(6)).toString();
}

function calculate() {
  $('#err').textContent = '';
  const formula = $('#formula').value.trim();
  const value = parseFloat($('#value').value);
  const unit = $('#unit').value;
  if (!formula) { $('#err').textContent = t('lblFormula') + ' ?'; $('#results').style.display='none'; return; }
  if (isNaN(value)) { $('#err').textContent = t('lblValue') + ' ?'; $('#results').style.display='none'; return; }

  try {
    const counts = parseFormula(formula);
    let molarMass = 0, atomsPerUnit = 0;
    for (const el in counts) { molarMass += counts[el] * ATOMIC[el]; atomsPerUnit += counts[el]; }

    // Convert input to moles
    let moles;
    if (unit === 'grams') moles = value / molarMass;
    else if (unit === 'moles') moles = value;
    else moles = value / NA;

    const grams = moles * molarMass;
    const molecules = moles * NA;
    const atoms = molecules * atomsPerUnit;

    const items = [
      {lbl: t('resMoles'), val: fmtSci(moles)},
      {lbl: t('resGrams'), val: fmtSci(grams)},
      {lbl: t('resMolar'), val: molarMass.toFixed(3)},
      {lbl: t('resMolecules'), val: fmtSci(molecules), full: true},
      {lbl: t('resAtoms'), val: fmtSci(atoms), full: true},
    ];
    $('#results').innerHTML = items.map(it => `<div class="result-item${it.full?' full':''}"><div class="val">${it.val}</div><div class="lbl">${it.lbl}</div></div>`).join('');
    $('#results').style.display = 'grid';
    $('#note').innerHTML = t('note');
  } catch (e) {
    $('#err').textContent = '✗ ' + e.message;
    $('#results').style.display='none';
  }
}

$('#formula').addEventListener('input', calculate);
$('#value').addEventListener('input', calculate);
$('#unit').addEventListener('change', calculate);
calculate();

  ]
});
</script>
