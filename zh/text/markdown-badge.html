<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">

    <div class="gz-form" id="form"></div>
    <div class="gz-preview"><img id="preview" alt="badge preview"></div>
    <div id="codes"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>

</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Markdown Badge Generator',
    toolDesc: 'Build custom shields.io-style badges for your README — label, message, color, style and logo with a live preview, then copy Markdown, HTML or the URL.',
    lblLabel: 'Label (left)',
    lblMessage: 'Message (right)',
    lblColor: 'Color',
    lblStyle: 'Style',
    lblLogo: 'Logo name (optional)',
    lblLogoColor: 'Logo color (optional)',
    lblLink: 'Link URL (optional)',
    example: 'Load Example', clear: 'Reset',
    copyMd: 'Copy Markdown', copyHtml: 'Copy HTML', copyUrl: 'Copy URL',
    step1: 'Type a label (left side) and a message (right side)',
    step2: 'Pick a color and a style, and optionally add a logo',
    step3: 'Watch the live preview update instantly',
    step4: 'Copy the Markdown, HTML or raw URL into your README',
  },
  zh: {
    toolTitle: 'Markdown 徽章生成器',
    toolDesc: '为你的 README 制作自定义 shields.io 风格徽章 — 标签、信息、颜色、样式和图标实时预览，可复制 Markdown、HTML 或链接。',
    lblLabel: '标签（左侧）',
    lblMessage: '信息（右侧）',
    lblColor: '颜色',
    lblStyle: '样式',
    lblLogo: '图标名称（可选）',
    lblLogoColor: '图标颜色（可选）',
    lblLink: '链接 URL（可选）',
    example: '加载示例', clear: '重置',
    copyMd: '复制 Markdown', copyHtml: '复制 HTML', copyUrl: '复制 URL',
    step1: '输入标签（左侧）和信息（右侧）',
    step2: '选择颜色和样式，可选添加图标',
    step3: '实时预览会即时更新',
    step4: '复制 Markdown、HTML 或原始 URL 到你的 README',
  }
});

const { $, copyText, t } = GZ;
const BASE = 'https://img.shields.io/badge/';
const STYLES = ['flat','flat-square','for-the-badge','plastic','social'];
const SWATCHES = ['brightgreen','green','yellowgreen','yellow','orange','red','blue','lightgrey','success','important','critical','informational','inactive','blueviolet','ff69b4','9cf'];

let s = { label:'build', message:'passing', color:'brightgreen', style:'flat', logo:'', logoColor:'', link:'' };

$('#form').innerHTML = `
  <div class="gz-row">
    <div><label>${t('lblLabel')}</label><input type="text" id="i-label" value="${s.label}" oninput="s.label=this.value;update()"></div>
    <div><label>${t('lblMessage')}</label><input type="text" id="i-msg" value="${s.message}" oninput="s.message=this.value;update()"></div>
  </div>
  <div class="gz-row">
    <div>
      <label>${t('lblColor')}</label>
      <input type="text" id="i-color" value="${s.color}" oninput="s.color=this.value;update()">
      <div class="gz-swatches">${SWATCHES.map(c=>`<div class="gz-swatch" style="background:${/^#|[a-z]/.test(c)&&c.length>4?c:(c)}" title="${c}" onclick="s.color='${c}';$('#i-color').value='${c}';update()"></div>`).join('')}</div>
    </div>
    <div><label>${t('lblStyle')}</label>
      <select id="i-style" onchange="s.style=this.value;update()">
        ${STYLES.map(st=>`<option value="${st}">${st}</option>`).join('')}
      </select>
    </div>
  </div>
  <div class="gz-row">
    <div><label>${t('lblLogo')}</label><input type="text" id="i-logo" placeholder="react, github, npm ..." oninput="s.logo=this.value;update()"></div>
    <div><label>${t('lblLogoColor')}</label><input type="text" id="i-logocolor" placeholder="white" oninput="s.logoColor=this.value;update()"></div>
  </div>
  <div><label>${t('lblLink')}</label><input type="text" id="i-link" placeholder="https://..." oninput="s.link=this.value;update()"></div>
`;

function escUrl(s){ return encodeURIComponent(s).replace(/-/g,'--'); }
function buildURL(){
  const label = escUrl(s.label||'');
  const msg = escUrl(s.message||'');
  let url = BASE + label + '-' + msg + '-' + escUrl(s.color||'blue');
  const params = [];
  if(s.style && s.style!=='flat') params.push('style='+s.style);
  if(s.logo) params.push('logo='+encodeURIComponent(s.logo));
  if(s.logoColor) params.push('logoColor='+encodeURIComponent(s.logoColor));
  if(params.length) url += '?' + params.join('&');
  return url;
}

function update(){
  const url = buildURL();
  $('#preview').src = url;
  $('#preview').alt = (s.label||'') + ' ' + (s.message||'');
  const md = `[![${(s.label+' '+s.message).trim()}](${url})](${s.link||''})`
    .replace(/\]\(\)$/,']'); // clean empty link
  const mdOut = s.link ? `[![${(s.label+' '+s.message).trim()}](${url})](${s.link})` : `![${(s.label+' '+s.message).trim()}](${url})`;
  const html = s.link
    ? `<a href="${s.link}"><img src="${url}" alt="${(s.label+' '+s.message).trim()}"></a>`
    : `<img src="${url}" alt="${(s.label+' '+s.message).trim()}">`;
  $('#codes').innerHTML = `
    <div class="gz-code-row"><textarea id="c-md" readonly>${mdOut}</textarea><button class="gz-btn" onclick="copyText($('#c-md').value)">${t('copyMd')}</button></div>
    <div class="gz-code-row"><textarea id="c-html" readonly>${html}</textarea><button class="gz-btn gz-btn-secondary" onclick="copyText($('#c-html').value)">${t('copyHtml')}</button></div>
    <div class="gz-code-row"><textarea id="c-url" readonly>${url}</textarea><button class="gz-btn gz-btn-secondary" onclick="copyText($('#c-url').value)">${t('copyUrl')}</button></div>`;
}

function loadExample(){
  s = { label:'tests', message:'92% covered', color:'success', style:'flat', logo:'jest', logoColor:'white', link:'https://example.com' };
  $('#i-label').value=s.label; $('#i-msg').value=s.message; $('#i-color').value=s.color;
  $('#i-style').value=s.style; $('#i-logo').value=s.logo; $('#i-logocolor').value=s.logoColor; $('#i-link').value=s.link;
  update();
}

function doClear(){
  s = { label:'build', message:'passing', color:'brightgreen', style:'flat', logo:'', logoColor:'', link:'' };
  $('#i-label').value=s.label; $('#i-msg').value=s.message; $('#i-color').value=s.color;
  $('#i-style').value=s.style; $('#i-logo').value=''; $('#i-logocolor').value=''; $('#i-link').value='';
  update();
}

$('#toolbar').innerHTML = `
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

update();

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📄', href:'/text/markdown.html', name:'Markdown Preview'},
    {icon:'🏆', href:'/text/github-readme.html', name:'GitHub README Generator'},
    {icon:'🖼️', href:'/image/favicon-generator.html', name:'Favicon Generator'},
    {icon:'🏷️', href:'/dev/license-generator.html', name:'License Generator'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
