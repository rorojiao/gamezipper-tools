// Generate Standard/Slant/Shadow from simplified block versions
function renderText(text, fontName) {
  const upperText = text.toUpperCase();
  const font = fontName === 'mini' ? FONTS.mini : FONTS.block;
  const height = font['A'].length;
  const lines = new Array(height).fill('');

  for (const ch of upperText) {
    const charData = font[ch] || font[' '] || font['A'].map(() => ' '.repeat(font['A'][0].length));
    for (let i = 0; i < height; i++) {
      lines[i] += (charData[i] || ' '.repeat(font['A'][0].length)) + (fontName === 'mini' ? '' : ' ');
    }
  }

  // Apply style transformations
  if (fontName === 'shadow') {
    return lines.map(l => l + '\n' + l.replace(/#/g, '░')).join('\n');
  }
  if (fontName === 'slant') {
    return lines.map((l, i) => ' '.repeat(height - 1 - i) + l.replace(/#/g, '/')).join('\n');
  }
  if (fontName === 'standard') {
    return lines.map(l => l.replace(/#/g, '█')).join('\n');
  }
  return lines.join('\n');
}

function generate() {
  const text = $('#inputText').value || 'Hello';
  const font = $('#font').value;
  const result = renderText(text, font);
