<script>
GZI18n.register({
  en: {
    toolTitle: 'Spin the Wheel — Random Picker',
    toolDesc: 'Add your options, spin the wheel, and let fate decide. Perfect for giveaways, decisions, classroom picks and game nights.',
    step1: 'Type your options in the text area, one per line',
    step2: 'Click the Spin button or click the wheel itself',
    step3: 'Watch the wheel spin and land on a random choice',
    step4: 'Results are saved in the history below',
    spin: '🎰 Spin!',
    clearHistory: 'Clear History',
    noEntries: 'Add at least 2 options to spin the wheel',
    result: 'Result will appear here',
    historyTitle: 'Spin History',
  },
  zh: {
    toolTitle: '转盘随机选择器',
    toolDesc: '输入选项，转动转盘，让命运来决定！适合抽奖、决策、课堂点名和游戏之夜。',
    step1: '在文本框中输入选项，每行一个',
    step2: '点击"旋转"按钮或直接点击转盘',
    step3: '观看转盘旋转，最终停在一个随机选项上',
    step4: '结果会保存在下方的历史记录中',
    spin: '🎰 旋转！',
    clearHistory: '清除历史',
    noEntries: '请至少输入 2 个选项才能旋转转盘',
    result: '结果将显示在这里',
    historyTitle: '旋转历史',
  }
});

const { $, t } = GZ;
const canvas = $('#wheel');
const ctx = canvas.getContext('2d');
let items = [];
let spinning = false;
let currentAngle = 0;
let history = [];

const COLORS = ['#e94560','#4ecdc4','#ff6b6b','#45b7d1','#f9c80e','#6c5ce7','#00b894','#fd79a8','#0984e3','#e17055','#00cec9','#fab1a0'];

function getItems() {
  return $('#entries').value.split('\n').map(s => s.trim()).filter(Boolean);
}

function drawWheel() {
  items = getItems();
  const n = items.length;
  const cx = 200, cy = 200, r = 195;
  ctx.clearRect(0, 0, 400, 400);
  if (n === 0) {
    ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.fillStyle = '#222'; ctx.fill();
    ctx.fillStyle = '#666'; ctx.font = '16px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText(t('noEntries'), cx, cy);
    return;
  }
  const arc = Math.PI * 2 / n;
  for (let i = 0; i < n; i++) {
    const startAngle = currentAngle + i * arc;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, r, startAngle, startAngle + arc);
    ctx.fillStyle = COLORS[i % COLORS.length];
    ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,.2)'; ctx.lineWidth = 2; ctx.stroke();
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(startAngle + arc / 2);
    ctx.fillStyle = '#fff';
    ctx.font = n > 20 ? '11px sans-serif' : n > 12 ? '13px sans-serif' : '14px sans-serif';
    ctx.textAlign = 'right';
    const label = items[i].length > 18 ? items[i].slice(0, 16) + '…' : items[i];
    ctx.fillText(label, r - 12, 5);
    ctx.restore();
  }
}

function spin() {
  if (spinning) return;
  items = getItems();
  if (items.length < 2) { alert(t('noEntries')); return; }
  spinning = true;
  $('#spinBtn').disabled = true;
  const n = items.length;
  const arc = Math.PI * 2 / n;
  const targetIndex = Math.floor(Math.random() * n);
  const targetAngle = -(targetIndex * arc + arc / 2 - Math.PI / 2);
  const totalSpin = Math.PI * 2 * (6 + Math.random() * 4);
  const finalAngle = targetAngle + totalSpin;
  const startAngle = currentAngle;
  const duration = 4000 + Math.random() * 2000;
  const startTime = performance.now();

  function easeOut(t) { return 1 - Math.pow(1 - t, 4); }

  function animate(now) {
    const elapsed = now - startTime;
    const progress = Math.min(elapsed / duration, 1);
    currentAngle = startAngle + (finalAngle - startAngle) * easeOut(progress);
    drawWheel();
    if (progress < 1) {
      requestAnimationFrame(animate);
    } else {
      spinning = false;
      $('#spinBtn').disabled = false;
      const winner = items[targetIndex];
      $('#result').textContent = '🎉 ' + winner;
      history.unshift({ winner, time: new Date().toLocaleTimeString() });
      if (history.length > 20) history.pop();
      renderHistory();
    }
  }
  requestAnimationFrame(animate);
}

function renderHistory() {
  if (history.length === 0) { $('#history').innerHTML = ''; return; }
  let html = `<h3 style="margin-bottom:8px">${t('historyTitle')}</h3>`;
  history.forEach((h, i) => {
    html += `<div class="history-item"><span>#${i + 1}: ${h.winner}</span><span style="opacity:.6">${h.time}</span></div>`;
  });
  $('#history').innerHTML = html;
}

function clearHistory() { history = []; renderHistory(); $('#result').textContent = t('result'); }

$('#entries').addEventListener('input', drawWheel);
canvas.addEventListener('click', spin);

// Initialize
$('#spinBtn').textContent = t('spin');
document.querySelector('.controls .gz-btn-secondary').textContent = t('clearHistory');
$('#result').textContent = t('result');
$('#entries').value = 'Pizza\nSushi\nBurger\nTacos\nPasta\nSalad';
drawWheel();

GZ.renderToolPage({
  category: 'fun',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🎡', href:'/fun/decision-wheel.html', name:'Decision Wheel'},
    {icon:'🎲', href:'/fun/dice-roller.html', name:'Dice Roller'},
    {icon:'🪙', href:'/fun/coin-flipper.html', name:'Coin Flipper'},
    {icon:'🎯', href:'/fun/name-picker.html', name:'Name Picker'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
