function pool() {
  if (currentCat === 'all') {
    let arr = [];
    Object.values(LETTERS).forEach(a => arr = arr.concat(a));
    return arr;
  }
  return LETTERS[currentCat] || [];
}

function newLetter() {
  const p = pool();
  if (!p.length) return;
  let next;
  let guard = 0;
  do { next = p[Math.floor(Math.random()*p.length)]; guard++; }
  while (next.body === currentLetter && p.length > 1 && guard < 10);
  currentLetter = next.body;
  $('#lorContent').textContent = currentLetter;
  const toneKey = 'meta' + next.tone.split(' ')[0];
  $('#lorMeta').innerHTML = '<span class="chip" id="toneChip">' + (t(toneKey) || next.tone) + '</span>';
  updateFavBtn();
}

function copyCurrent() {
  if (!currentLetter) return;
  GZ.copyText(currentLetter);
  showToast(t('btnCopy') + ' ✓');
}

function downloadTxt() {
  if (!currentLetter) return;
  const blob = new Blob([currentLetter], {type:'text/plain;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'letter-of-recommendation.txt';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function isFav() { return favs.some(f => f.body === currentLetter); }
function updateFavBtn() { $('#btnFav').innerHTML = isFav() ? '❤️' : '🤍'; }

function toggleFav() {
  if (!currentLetter) return;
  if (isFav()) { favs = favs.filter(f => f.body !== currentLetter); }
  else { favs.unshift({body: currentLetter, savedAt: Date.now()}); }
  localStorage.setItem('gz_lor_favs', JSON.stringify(favs));
  updateFavBtn();
  renderFavs();
}

function renderFavs() {
  const box = $('#favList');
  if (!favs.length) { box.innerHTML = ''; return; }
  box.innerHTML = `<h3 style="text-align:center;margin:8px 0">${t('favTitle')}</h3>` + favs.map((f,i) =>
    `<div class="fav-item"><span class="txt">${f.body.split('\\n')[0].slice(0,80)}...</span><button onclick="removeFav(${i})" title="${t('remove')}">${t('remove')}</button></div>`
  ).join('');
}

function removeFav(i) {
  favs.splice(i,1);
  localStorage.setItem('gz_lor_favs', JSON.stringify(favs));
  updateFavBtn();
  renderFavs();
}

function showToast(msg) {
  let tt = document.querySelector('.lor-toast');
  if (!tt) {
    tt = document.createElement('div');
    tt.className = 'lor-toast';
    document.body.appendChild(tt);
  }
  tt.textContent = msg;
  tt.classList.add('show');
  clearTimeout(tt._tm);
  tt._tm = setTimeout(() => tt.classList.remove('show'), 1800);
}

const catBtnContainer = $('#catBtns');
CATS.forEach(c => {
  const btn = document.createElement('button');
  btn.textContent = t('cat_' + c);
  btn.className = c === currentCat ? 'active' : '';
  btn.onclick = () => {
    currentCat = c;
    catBtnContainer.querySelectorAll('button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    newLetter();
  };
  catBtnContainer.appendChild(btn);
});

$('#btnNew').textContent = t('btnNew');
$('#btnCopy').textContent = t('btnCopy');
$('#btnDownload').textContent = t('btnDownload');
$('#btnFav').textContent = t('btnFav');
$('#lorDisclaimer').textContent = t('disclaimer');
newLetter();
renderFavs();

});
