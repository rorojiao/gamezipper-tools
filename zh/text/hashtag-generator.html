<script>
GZI18n.register({
  en:{
    toolTitle:'Hashtag Generator',
    toolDesc:'Generate relevant hashtags from your text or keywords for Instagram, TikTok, Twitter and LinkedIn.',
    platform:'Platform',maxTags:'Max tags',
    instagram:'Instagram (30)',tiktok:'TikTok (5)',twitter:'Twitter (3)',linkedin:'LinkedIn (5)',all:'All',
    step1:'Enter your topic, text or keywords in the input area',
    step2:'Select your target platform for optimized hashtag count',
    step3:'Click Generate to create hashtags from your text',
    step4:'Click Copy All to copy hashtags to clipboard',
    inputPh:'Enter your topic, caption, or keywords...',
    tagsLabel:'tags',
  },
  zh:{
    toolTitle:'话题标签生成器',
    toolDesc:'从文本或关键词生成相关话题标签，适用于 Instagram、TikTok、Twitter 和 LinkedIn。',
    platform:'平台',maxTags:'最大标签数',
    instagram:'Instagram (30)',tiktok:'TikTok (5)',twitter:'Twitter (3)',linkedin:'LinkedIn (5)',all:'全部',
    step1:'在输入区输入主题、文本或关键词',
    step2:'选择目标平台以优化标签数量',
    step3:'点击生成从文本中创建标签',
    step4:'点击复制全部将标签复制到剪贴板',
    inputPh:'输入主题、文案或关键词...',
    tagsLabel:'个标签',
  }
});
const {$,copyText,t}=GZ;
let platform='all';
const LIMITS={all:50,instagram:30,tiktok:5,twitter:3,linkedin:5};
const PLATFORMS=['all','instagram','tiktok','twitter','linkedin'];

// Common stop words to exclude
const STOP_WORDS=new Set(['the','a','an','and','or','but','in','on','at','to','for','of','with','by','is','it','this','that','from','are','was','were','be','been','being','have','has','had','do','does','did','will','would','could','should','may','might','shall','can','need','must','not','no','so','if','as','my','me','we','you','they','he','she','its','our','your','their','i','am','than','then','also','just','about','up','out','how','what','which','who','when','where','why','all','each','every','both','few','more','most','other','some','such','only','own','same','too','very','into','over','after','before','between','under','again','there','here','these','those']);

// Popular hashtag prefixes
const PREFIXES=['best','top','free','love','insta','follow','like','share','trending','viral','popular','daily','new','photo','video','life','style','art','design','creative','beautiful','amazing','inspiration','motivation','happy','fun','explore','discover','community'];

let tags=[];

function generateTags(){
  const text=$('#input').value.trim();
  if(!text){tags=[];renderTags();return;}
  const words=text.toLowerCase().replace(/[^a-z0-9\u4e00-\u9fff\s]/g,' ').split(/\s+/).filter(w=>w.length>1&&!STOP_WORDS.has(w));
  const unique=[...new Set(words)];
  const limit=LIMITS[platform];
  const result=[];
  // Primary: from input words
  unique.forEach(w=>{if(result.length<limit)result.push(w);});
  // Add camelCase combinations
  for(let i=0;i<unique.length-1&&result.length<limit;i++){
    const combo=unique[i]+unique[i+1].charAt(0).toUpperCase()+unique[i+1].slice(1);
    result.push(combo);
  }
  // Add prefixed versions
  unique.forEach(w=>{
    if(result.length>=limit)return;
    PREFIXES.slice(0,5).forEach(p=>{if(result.length<limit)result.push(p+w);});
  });
  tags=[...new Set(result)].slice(0,limit);
  renderTags();
}

function renderTags(){
  $('#tags').innerHTML=tags.map((tag,i)=>`<span class="tag" onclick="copyText('#${tag}')">#${tag}<span class="remove" onclick="event.stopPropagation();removeTag(${i})">✕</span></span>`).join('');
  $('#tagCount').textContent=tags.length+' '+t('tagsLabel');
}

function removeTag(i){tags.splice(i,1);renderTags();}

function copyAll(){copyText(tags.map(t=>'#'+t).join(' '));}

function loadExample(){
  $('#input').value='travel photography beautiful sunset beach vacation adventure nature landscape explore wanderlust';
  generateTags();
}

function setPlatform(p){
  platform=p;
  document.querySelectorAll('#platforms button').forEach(b=>b.classList.toggle('active',b.dataset.p===p));
}

$('#input').placeholder=t('inputPh');
$('#platforms').innerHTML=PLATFORMS.map(p=>`<button data-p="${p}" class="${p==='all'?'active':''}" onclick="setPlatform('${p}')">${t(p)}</button>`).join('');
$('#toolbar').innerHTML=`<button class="gz-btn" onclick="generateTags()">${t('generate')}</button><button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button><button class="gz-btn" onclick="copyAll()">${t('copy')}</button><button class="gz-btn gz-btn-secondary" onclick="$('#input').value='';tags=[];renderTags()">${t('clear')}</button>`;

$('#input').addEventListener('input',generateTags);

GZ.renderToolPage({category:'text',titleKey:'toolTitle',descKey:'toolDesc',howToSteps:['step1','step2','step3','step4'],related:[
  {icon:'🔗',href:'/text/slug.html',name:'Slug Generator'},
  {icon:'😊',href:'/text/emoji-picker.html',name:'Emoji Picker'},
  {icon:'📝',href:'/text/word-counter.html',name:'Word Counter'},
]});
</script>
