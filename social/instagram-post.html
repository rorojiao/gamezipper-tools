<script>
GZI18n.register({
  en: {
    toolTitle: 'Instagram Post Generator & Mockup',
    toolDesc: 'Create realistic Instagram post mockups — customize profile, image, caption, likes and download as PNG. Perfect for design previews and social media mockups.',
    lblUser: 'Username', lblAvatar: 'Avatar (URL or initials)', lblVerified: 'Verified Badge',
    lblImage: 'Image URL', lblCaption: 'Caption (use # for hashtags)',
    lblLikes: 'Likes', lblTime: 'Posted',
    lblBg: 'Card background',
    step1: 'Enter a username, avatar URL or initials, and toggle the verified badge',
    step2: 'Paste an image URL (any https:// link) for the post photo',
    step3: 'Write a caption with hashtags — they will be highlighted automatically',
    step4: 'Click Download PNG to save the mockup to your device',
  },
  zh: {
    toolTitle: 'Instagram 帖子生成器 & 预览',
    toolDesc: '创建逼真的 Instagram 帖子截图 — 自定义用户名、头像、图片、文案、点赞数，下载为 PNG。适合设计预览和社交媒体打样。',
    lblUser: '用户名', lblAvatar: '头像（URL 或首字母）', lblVerified: '认证徽章',
    lblImage: '图片链接', lblCaption: '文案（用 # 添加话题标签）',
    lblLikes: '点赞数', lblTime: '发布时间',
    lblBg: '卡片背景',
    step1: '输入用户名、头像 URL 或首字母，可选择认证徽章',
    step2: '粘贴一个图片链接（任何 https:// 链接）作为帖子图片',
    step3: '编辑文案，使用 # 添加话题标签，会自动高亮',
    step4: '点击「下载 PNG」将截图保存到你的设备',
  }
});

const { $, copyText, t } = GZ;

function update() {
  const user = $('#user').value || 'username';
  $('#igUser').innerHTML = user + ($('#verified').value === '1' ? '<span class="verified">✓</span>' : '');
  $('#igCapUser').textContent = user;

  const av = $('#avatar').value.trim();
  if (av) {
    if (/^https?:\/\//i.test(av)) {
      $('#igAvatarInner').innerHTML = '<img src="'+av.replace(/"/g,'&quot;')+'" onerror="this.remove()">';
    } else {
      $('#igAvatarInner').textContent = av.substring(0,2).toUpperCase();
    }
  } else {
    $('#igAvatarInner').textContent = user.substring(0,2).toUpperCase();
  }

  const url = $('#imgUrl').value.trim();
  const wrap = $('#igImageWrap');
  if (url) {
    wrap.innerHTML = '<img src="'+url.replace(/"/g,'&quot;')+'" onerror="this.remove()">';
  } else {
    wrap.innerHTML = '<span class="placeholder" id="igImgPlaceholder">📷 Add an image URL</span>';
  }

  const cap = $('#caption').value;
  const capHtml = cap.replace(/(#[\w_]+)/g, '<span class="hashtag">$1</span>');
  $('#igCapText').innerHTML = capHtml;

  const likes = parseInt($('#likes').value) || 0;
  $('#igLikes').textContent = likes.toLocaleString() + ' likes';

  const timeMap = {now:'NOW', '1m':'1 MINUTE AGO','5m':'5 MINUTES AGO','1h':'1 HOUR AGO','2h':'2 HOURS AGO','1d':'1 DAY AGO','2d':'2 DAYS AGO','1w':'1 WEEK AGO'};
  $('#igTime').textContent = timeMap[$('#time').value] || '1 HOUR AGO';
}

function setBg(bg) {
  $('#post').style.background = bg;
  document.querySelectorAll('.ig-color-swatch').forEach(s => s.classList.toggle('active', s.dataset.bg === bg));
}

function downloadPNG() {
  // Use html2canvas via CDN
  if (typeof html2canvas === 'undefined') {
    const s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js';
    s.onload = () => doDownload();
    document.head.appendChild(s);
  } else {
    doDownload();
  }
  function doDownload() {
    html2canvas($('#post'), {backgroundColor: null, scale: 2}).then(canvas => {
      canvas.toBlob(blob => {
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'instagram-post.png';
        a.click();
        setTimeout(() => URL.revokeObjectURL(a.href), 1000);
      });
    });
  }
}

['#user','#avatar','#verified','#imgUrl','#caption','#likes','#time'].forEach(sel => {
  $(sel).addEventListener('input', update);
  $(sel).addEventListener('change', update);
});
document.querySelectorAll('.ig-color-swatch').forEach(s => {
  s.addEventListener('click', () => setBg(s.dataset.bg));
});

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="downloadPNG()">⬇️ Download PNG</button>
  <button class="gz-btn gz-btn-secondary" onclick="copyText($('#caption').value)">📋 Copy Caption</button>
  <button class="gz-btn gz-btn-secondary" onclick="copyText($('#user').value + ' — ' + $('#likes').value + ' likes')">📋 Copy Stats</button>`;

update();
GZ.renderToolPage({
  category: 'social',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🐦', href:'/social/tweet-generator.html', name:'Tweet Generator'},
    {icon:'💬', href:'/social/whatsapp-chat.html', name:'WhatsApp Chat'},
    {icon:'🖼️', href:'/social/og-image-generator.html', name:'OG Image Generator'},
    {icon:'🎬', href:'/social/youtube-thumb.html', name:'YouTube Thumb'},
  ]
});
</script>
