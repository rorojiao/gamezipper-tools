<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="input-row">
      <input type="text" id="domain" placeholder="example.com" value="google.com">
      <select id="dns-type">
        <option value="A" selected>A (IPv4)</option>
        <option value="AAAA">AAAA (IPv6)</option>
        <option value="MX">MX (Mail)</option>
        <option value="NS">NS (Nameserver)</option>
        <option value="TXT">TXT (Text)</option>
        <option value="CNAME">CNAME</option>
        <option value="SOA">SOA</option>
        <option value="CAA">CAA</option>
      </select>
      <button class="gz-btn" id="btn-lookup" onclick="doLookup()">🔍 <span id="lbl-lookup"></span></button>
    </div>
    <div class="dns-type-btns" id="quick-types"></div>
    <div id="status" class="status-msg"></div>
    <table id="result-table" style="display:none">
      <thead><tr><th id="th-type"></th><th id="th-name"></th><th id="th-ttl"></th><th id="th-data"></th></tr></thead>
      <tbody id="result-body"></tbody>
    </table>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'DNS Lookup Tool',
    toolDesc: 'Query DNS records (A, AAAA, MX, NS, TXT, CNAME, SOA) for any domain using DNS-over-HTTPS. Free, instant, no signup — perfect for debugging DNS issues.',
    lookup: 'Lookup',
    type: 'Type',
    name: 'Name',
    ttl: 'TTL',
    data: 'Data',
    querying: 'Querying...',
    noResults: 'No records found',
    error: 'Error: ',
    enterDomain: 'Please enter a domain name',
    step1: 'Enter a domain name (e.g., example.com) in the input field',
    step2: 'Select the DNS record type you want to query',
    step3: 'Click Lookup to query DNS-over-HTTPS resolvers',
    step4: 'Review the results in the table below',
  },
  zh: {
    toolTitle: 'DNS 查询工具',
    toolDesc: '通过 DNS-over-HTTPS 查询任意域名的 DNS 记录（A、AAAA、MX、NS、TXT、CNAME、SOA）。免费、即时、无需注册 — 调试 DNS 问题的利器。',
    lookup: '查询',
    type: '类型',
    name: '名称',
    ttl: 'TTL',
    data: '数据',
    querying: '查询中...',
    noResults: '未找到记录',
    error: '错误：',
    enterDomain: '请输入域名',
    step1: '在输入框中输入域名（如 example.com）',
    step2: '选择要查询的 DNS 记录类型',
    step3: '点击「查询」通过 DNS-over-HTTPS 解析器查询',
    step4: '在下方表格中查看结果',
  }
});

const { $, t } = GZ;
const DOH_ENDPOINTS = [
  'https://dns.google/resolve',
  'https://cloudflare-dns.com/dns-query'
];

const TYPE_MAP = {1:'A',28:'AAAA',15:'MX',2:'NS',16:'TXT',5:'CNAME',6:'SOA',257:'CAA'};

async function doLookup() {
  const domain = $('#domain').value.trim().replace(/^https?:\/\//, '').replace(/\/.*$/, '');
  if (!domain) { $('#status').innerHTML = `<span style="color:var(--gz-accent)">${t('enterDomain')}</span>`; return; }

  const rtype = $('#dns-type').value;
  $('#status').innerHTML = `<span style="color:var(--text2)">${t('querying')}</span>`;
  $('#result-table').style.display = 'none';
  $('#btn-lookup').disabled = true;

  let data = null;
  for (const endpoint of DOH_ENDPOINTS) {
    try {
      const url = `${endpoint}?name=${encodeURIComponent(domain)}&type=${rtype}`;
      const resp = await fetch(url, { headers: { 'Accept': 'application/dns-json' } });
      if (resp.ok) {
        data = await resp.json();
        break;
      }
    } catch(e) { /* try next */ }
  }

  $('#btn-lookup').disabled = false;

  if (!data) {
    $('#status').innerHTML = `<span style="color:var(--gz-accent)">${t('error')}network error</span>`;
    return;
  }

  const answers = (data.Answer || data.Authority || []).filter(a => {
    if (rtype === 'CNAME') return TYPE_MAP[a.type] === 'CNAME' || TYPE_MAP[a.type] === 'A';
    return true;
  });

  if (answers.length === 0) {
    $('#status').innerHTML = `<span style="color:var(--text2)">${t('noResults')}</span>`;
    return;
  }

  const body = answers.map(a => {
    let displayData = a.data;
    return `<tr><td>${TYPE_MAP[a.type] || rtype}</td><td>${a.name}</td><td>${a.TTL}s</td><td>${displayData}</td></tr>`;
  }).join('');

  $('#result-body').innerHTML = body;
  $('#result-table').style.display = 'table';
  $('#status').innerHTML = `<span style="color:var(--gz-success)">✓ ${answers.length} record${answers.length !== 1 ? 's' : ''}</span>`;
}

// Quick type buttons
const quickTypes = ['A','AAAA','MX','NS','TXT','CNAME','SOA','CAA'];
$('#quick-types').innerHTML = quickTypes.map(ty =>
  `<button class="gz-btn gz-btn-secondary" onclick="quickType('${ty}')">${ty}</button>`
).join('');

function quickType(ty) {
  $('#dns-type').value = ty;
  doLookup();
}

$('#domain').addEventListener('keydown', (e) => { if (e.key === 'Enter') doLookup(); });

$('#lbl-lookup').textContent = t('lookup');
$('#th-type').textContent = t('type');
$('#th-name').textContent = t('name');
$('#th-ttl').textContent = t('ttl');
$('#th-data').textContent = t('data');

GZ.renderToolPage({
  category: 'network',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🌐', href:'/network/http-headers-checker.html', name:'HTTP Headers Checker'},
    {icon:'📡', href:'/dev/api-tester.html', name:'API Tester'},
    {icon:'🔑', href:'/dev/api-key-generator.html', name:'API Key Generator'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
