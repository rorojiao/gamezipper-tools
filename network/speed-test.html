  },
  zh: {

    toolDesc: '在浏览器中测试你的网络下载速度、上传速度、延迟和抖动 — 免费、即时。无需安装应用或注册。',
    start: '开始测试',

    upload: '上传',
    latency: '延迟',
    jitter: '抖动',
    ms: 'ms',
    testing: '正在测试下载速度...',
    testingUpload: '正在测试上传速度...',
    testingLatency: '正在测量延迟...',
    done: '测试完成！',
    step1: '关闭其他标签页和下载任务以获得最准确的结果',
    step2: '点击「开始测试」启动测速',
    step3: '测试过程中实时查看仪表盘更新',
    step4: '查看下载、上传、延迟和抖动的测试结果',
  }
});

const { $, t } = GZ;
let testing = false;

const ARC_LEN = 597; // 2 * PI * 95
const MAX_SPEED = 200; // Mbps cap for gauge

function setGauge(speed, label) {
  const pct = Math.min(speed / MAX_SPEED, 1);
  $('#gauge-arc').style.strokeDashoffset = ARC_LEN * (1 - pct);
  $('#gauge-value').textContent = speed.toFixed(1);
  $('#gauge-label').textContent = label;
}

function log(msg) {
  const time = new Date().toLocaleTimeString();
  $('#log').innerHTML += `[${time}] ${msg}<br>`;
  $('#log').scrollTop = $('#log').scrollHeight;
}

async function measureLatency() {
  $('#gauge-label').textContent = t('testingLatency');
  log('⏱ ' + t('testingLatency'));
  const pings = [];
  for (let i = 0; i < 10; i++) {
    const start = performance.now();
    try {
      await fetch(`https://cloudflare-dns.com/dns-query?_=${Date.now()}-${i}`, {
        headers: { 'Accept': 'application/dns-json' },
        cache: 'no-store'
      });
      pings.push(performance.now() - start);
    } catch(e) { /* skip */ }
    await sleep(100);
  }
  if (pings.length < 2) return { avg: 0, jitter: 0 };
  pings.sort((a, b) => a - b);
  pings = pings.slice(1, -1); // trim extremes
  const avg = pings.reduce((s, v) => s + v, 0) / pings.length;
  let jitter = 0;
  for (let i = 1; i < pings.length; i++) jitter += Math.abs(pings[i] - pings[i - 1]);
  jitter /= Math.max(1, pings.length - 1);
  return { avg: Math.round(avg), jitter: Math.round(jitter) };
}

async function measureDownload() {
  log('⬇ ' + t('testing'));
  const urls = [
    'https://speed.cloudflare.com/__down?bytes=5000000',
    'https://speed.hetzner.de/5MB.bin',
    'https://speedtest-sgp1.digitalocean.com/5mb.test',
  ];
  let bestSpeed = 0;
  for (const url of urls) {
    try {
      const start = performance.now();
      const resp = await fetch(url + '?_=' + Date.now(), { cache: 'no-store' });
      if (!resp.ok) continue;
      const reader = resp.body.getReader();
      let received = 0;
      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        received += value.length;
        const elapsed = (performance.now() - start) / 1000;
        const mbps = (received * 8) / (elapsed * 1000000);
        if (mbps > bestSpeed) bestSpeed = mbps;
        setGauge(mbps, '↓ DL');
      }
    } catch(e) { /* try next */ }
    if (bestSpeed > 0) break;
  }
  return Math.round(bestSpeed * 10) / 10;
}

async function measureUpload() {
  log('⬆ ' + t('testingUpload'));
  const payload = new Uint8Array(2000000); // 2MB
  crypto.getRandomValues(payload.subarray(0, 1024)); // just seed some
  const url = 'https://speed.cloudflare.com/__up';
  try {
    const start = performance.now();
    const resp = await fetch(url, {
      method: 'POST',
      body: payload,
      cache: 'no-store'
    });
    const elapsed = (performance.now() - start) / 1000;
    const mbps = (payload.length * 8) / (elapsed * 1000000);
    setGauge(mbps, '↑ UL');
    return Math.round(mbps * 10) / 10;
  } catch(e) {
    log('Upload test failed (CORS or network)');
    return 0;
  }
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

async function runTest() {
  if (testing) return;
  testing = true;
  $('#btn-start').disabled = true;
  $('#btn-start').textContent = '⏳ Testing...';
  $('#stat-download').textContent = '—';
  $('#stat-upload').textContent = '—';
  $('#stat-latency').textContent = '—';
  $('#stat-jitter').textContent = '—';
  $('#log').innerHTML = '';
  setGauge(0, 'INIT');

  const { avg, jitter } = await measureLatency();
  $('#stat-latency').textContent = avg + ' ' + t('ms');
  $('#stat-jitter').textContent = jitter + ' ' + t('ms');
  log(`✓ Latency: ${avg}ms, Jitter: ${jitter}ms`);

  const dl = await measureDownload();
  $('#stat-download').textContent = dl;
  log(`✓ Download: ${dl} Mbps`);
  setGauge(dl, '↓ DL');

  const ul = await measureUpload();
  $('#stat-upload').textContent = ul;
  log(`✓ Upload: ${ul} Mbps`);
  setGauge(dl > ul ? dl : ul, t('done').toUpperCase().replace('!', ''));

  log(t('done'));
  $('#btn-start').disabled = false;
  $('#btn-start').innerHTML = '🔄 <span id="lbl-start">' + t('start') + '</span>';
  testing = false;
}

$('#btn-start').addEventListener('click', runTest);

$('#lbl-start').textContent = t('start');
$('#lbl-download').textContent = t('download');
$('#lbl-upload').textContent = t('upload');
$('#lbl-latency').textContent = t('latency');
$('#lbl-jitter').textContent = t('jitter');

});
</script>
