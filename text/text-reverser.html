<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="gz-split">
      <div><label id="lbl-in"></label><textarea id="input" rows="10" spellcheck="false"></textarea></div>
      <div><label id="lbl-out"></label><textarea id="output" rows="10" readonly></textarea></div>
    </div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Text Reverser',
    toolDesc: 'Reverse any text instantly — flip characters, words or lines with one click.',
    reverseChars: 'Reverse Characters',
    reverseWords: 'Reverse Words',
    reverseLines: 'Reverse Lines',
    reverseWordOrder: 'Reverse Word Order',
    step1: 'Paste or type your text in the input area',
    step2: 'Choose a reversal mode from the toolbar',
    step3: 'The reversed text appears instantly in the output',
    step4: 'Click Copy to copy the result to clipboard',
  },
  zh: {
    toolTitle: '文字反转工具',
    toolDesc: '即时反转文字 — 支持字符、单词或整行翻转，一键操作。',
    reverseChars: '反转字符',
    reverseWords: '反转单词',
    reverseLines: '反转行',
    reverseWordOrder: '反转词序',
    step1: '在输入区粘贴或输入文本',
    step2: '从工具栏选择反转模式',
    step3: '反转后的文本即时显示在输出区',
    step4: '点击「复制」将结果复制到剪贴板',
  }
});

const { $, copyText, t } = GZ;
let mode = 'chars';

function doReverse() {
  const inp = $('#input').value;
  if (!inp) { $('#output').value = ''; return; }
  let result = '';
  switch (mode) {
    case 'chars':
      result = [...inp].reverse().join('');
      break;
    case 'words':
      result = inp.split(/(\s+)/).map(w => /^\s+$/.test(w) ? w : [...w].reverse().join('')).join('');
      break;
    case 'lines':
      result = inp.split('\n').reverse().join('\n');
      break;
    case 'wordOrder':
      result = inp.split('\n').map(line => line.split(/\s+/).reverse().join(' ')).join('\n');
      break;
  }
  $('#output').value = result;
}

function setMode(m) {
  mode = m;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('gz-btn'));
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.add('gz-btn-secondary'));
  document.querySelector(`[data-mode="${m}"]`).classList.remove('gz-btn-secondary');
  document.querySelector(`[data-mode="${m}"]`).classList.add('gz-btn');
  doReverse();
}

$('#toolbar').innerHTML = `
  <button class="gz-btn mode-btn" data-mode="chars" onclick="setMode('chars')">${t('reverseChars')}</button>
  <button class="gz-btn gz-btn-secondary mode-btn" data-mode="words" onclick="setMode('words')">${t('reverseWords')}</button>
  <button class="gz-btn gz-btn-secondary mode-btn" data-mode="lines" onclick="setMode('lines')">${t('reverseLines')}</button>
  <button class="gz-btn gz-btn-secondary mode-btn" data-mode="wordOrder" onclick="setMode('wordOrder')">${t('reverseWordOrder')}</button>
  <button class="gz-btn" onclick="copyText($('#output').value)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#input').value='';$('#output').value=''">${t('clear')}</button>`;

$('#input').addEventListener('input', doReverse);

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🙃', href:'/text/flip-text.html', name:'Flip Text'},
    {icon:'🔁', href:'/text/reverse-lines.html', name:'Reverse Lines'},
    {icon:'↕️', href:'/text/sort-lines.html', name:'Sort Lines'},
    {icon:'🔤', href:'/text/case-converter.html', name:'Case Converter'},
  ]
});
</script>
