    detailNeg: 'To write <b>%1</b> in scientific notation, move the decimal point <b>%2</b> place(s) to the right so the coefficient is between 1 and 10. That gives <b>%3</b>.',
    detailZero: '<b>0</b> in any notation is just <b>0</b>.',
    step1: 'Type a decimal number or a value in scientific notation (e.g. 4.5E6)',
    step2: 'Click Convert',
    step3: 'See the result in decimal, scientific, engineering and E-notation',
    step4: 'Click any result value to copy it',
  },
  zh: {
    toolTitle: '科学记数法转换器',
    toolDesc: '在十进制、科学记数法、工程记数法和 E 记数法之间互相转换，附分步说明。',
    lblNum: '数字（十进制或科学记数法，如 4.5E6 或 0.00042）',
    btnCalc: '转换',
    lblDecimal: '十进制',
    lblSci: '科学记数法',
    lblEng: '工程记数法',
    lblE: 'E 记数法',
    copyHint: '💡 点击任意结果即可复制',
    detailPos: '要把 <b>%1</b> 写成科学记数法，将小数点向左移动 <b>%2</b> 位，使系数在 1 到 10 之间，得到 <b>%3</b>。',
    detailNeg: '要把 <b>%1</b> 写成科学记数法，将小数点向右移动 <b>%2</b> 位，使系数在 1 到 10 之间，得到 <b>%3</b>。',
    detailZero: '<b>0</b> 在任何记数法中都是 <b>0</b>。',
    step1: '输入十进制数字或科学记数法（如 4.5E6）',
    step2: '点击「转换」',
    step3: '查看十进制、科学记数法、工程记数法和 E 记数法的结果',
    step4: '点击任意结果值即可复制',
  }
});

const { $, t, copyText } = GZ;

function copy(el) {
  const text = el.textContent;
  if (copyText) copyText(text);
}

// Parse input that may be decimal or scientific (3E6, 3e6, 3×10^6, 3*10^6)
function parseInput(str) {
  str = str.trim().replace(/,/g, '');
  if (!str) return null;
  // Handle ×10^, *10^, x10^ forms
  const m = str.match(/^([+-]?[\d.]+)\s*[x×*]\s*10\^?\s*([+-]?\d+)$/i);
  if (m) {
    const base = parseFloat(m[1]);
    const exp = parseInt(m[2], 10);
    return { coef: base, exp };
  }
  // Handle E notation
  const m2 = str.match(/^([+-]?[\d.]+)[eE]([+-]?\d+)$/);
  if (m2) {
    const base = parseFloat(m2[1]);
    const exp = parseInt(m2[2], 10);
    return { coef: base, exp };
  }
  const n = Number(str);
  if (!isFinite(n)) return null;
  return { coef: n, exp: 0 };
}

// Normalize a {coef, exp} into scientific: coef in [1,10), exp adjusted
function toScientific(c, e) {
  if (c === 0) return { coef: 0, exp: 0 };
  let coef = c, exp = e;
  const sign = coef < 0 ? -1 : 1;
  coef = Math.abs(coef);
  if (coef >= 10) {
    while (coef >= 10) { coef /= 10; exp++; }
  } else if (coef < 1) {
    while (coef < 1) { coef *= 10; exp--; }
  }
  return { coef: sign * coef, exp };
}

function toEngineering(c, e) {
  const s = toScientific(c, e);
  let coef = s.coef, exp = s.exp;
  while (exp % 3 !== 0) { coef *= 10; exp--; }
  return { coef, exp };
}

// Produce full decimal string from scientific {coef, exp} for big numbers
function toDecimalString(c, e) {
  const s = toScientific(c, e);
  let coef = s.coef, exp = s.exp;
  if (coef === 0) return '0';
  const neg = coef < 0;
  coef = Math.abs(coef);
  // Round coef to remove floating noise: keep up to 15 significant digits
  let coefStr = coef.toPrecision(15).replace(/\.?0+$/, '');
  const [intPart, decPart = ''] = coefStr.split('.');
  const digits = intPart + decPart;
  const decPos = intPart.length + exp; // position of decimal point from left of digits
  let out;
  if (decPos <= 0) {
    out = '0.' + '0'.repeat(-decPos) + digits;
  } else if (decPos >= digits.length) {
    out = digits + '0'.repeat(decPos - digits.length);
  } else {
    out = digits.slice(0, decPos) + '.' + digits.slice(decPos);
  }
  out = out.replace(/\.?0+$/, '');
  return (neg ? '-' : '') + out;
}

function fmtSci(s) {
  if (s.coef === 0) return '0';
  return s.coef.toPrecision(4).replace(/\.?0+$/, '') + ' × 10' + superscript(s.exp);
}
function fmtEng(s) {
  if (s.coef === 0) return '0';
  return s.coef.toPrecision(4).replace(/\.?0+$/, '') + ' × 10' + superscript(s.exp);
}
function fmtE(s) {
  if (s.coef === 0) return '0';
  return s.coef.toPrecision(4).replace(/\.?0+$/, '') + 'E' + s.exp;
}
function superscript(k) {
  const map = {'0':'⁰','1':'¹','2':'²','3':'³','4':'⁴','5':'⁵','6':'⁶','7':'⁷','8':'⁸','9':'⁹','-':'⁻'};
  return String(k).split('').map(c => map[c] || c).join('');
}

function convert() {
  const parsed = parseInput($('#num').value);
  if (!parsed) { $('#result').style.display = 'none'; return; }

  const dec = toDecimalString(parsed.coef, parsed.exp);
  const sci = toScientific(parsed.coef, parsed.exp);
  const eng = toEngineering(parsed.coef, parsed.exp);

  $('#result').style.display = '';
  $('#result-decimal').textContent = dec;
  $('#result-sci').textContent = fmtSci(sci);
  $('#result-eng').textContent = fmtEng(eng);
  $('#result-e').textContent = fmtE(sci);
  $('#copy-hint').textContent = t('copyHint');

  let detail;
  if (sci.coef === 0) {
    detail = t('detailZero');
  } else if (sci.exp >= 0) {
    detail = t('detailPos').replace('%1', dec).replace('%2', sci.exp).replace('%3', fmtSci(sci));
  } else {
    detail = t('detailNeg').replace('%1', dec).replace('%2', -sci.exp).replace('%3', fmtSci(sci));
  }
  $('#detail').innerHTML = detail;
}

$('#btn-calc').textContent = t('btnCalc');
convert();

});
</script>
