<script>
GZI18n.register({en:{toolTitle:'Whitespace Visualizer',toolDesc:'Reveal invisible spaces, tabs, line endings, non-breaking spaces, zero-width Unicode and control characters. Count, inspect and clean them privately.',sample:'Load tricky sample',clean:'Clean invisible',normalize:'Normalize whitespace',copy:'Copy cleaned text',clear:'Clear',showSpaces:'Show regular spaces',input:'Input text',output:'Visible whitespace',characters:'Characters',spaces:'Spaces',tabs:'Tabs',lines:'Line breaks',nbsp:'NBSP',zero:'Zero-width',controls:'Controls',placeholder:'Paste text, code or data with suspicious invisible characters…',step1:'Paste text, code, CSV or copied content into the input area',step2:'Inspect colored markers for spaces, tabs, newlines, NBSP and zero-width marks',step3:'Use Clean Invisible to remove hidden marks or Normalize to standardize whitespace',step4:'Copy the cleaned text when the counts and visible layout look correct'},zh:{toolTitle:'空白字符可视化工具',toolDesc:'显示不可见的空格、制表符、换行、不可断行空格、零宽 Unicode 和控制字符。可本地统计、检查和清理。',sample:'加载问题示例',clean:'清理不可见字符',normalize:'规范化空白',copy:'复制清理文本',clear:'清空',showSpaces:'显示普通空格',input:'输入文本',output:'可见空白',characters:'字符',spaces:'空格',tabs:'制表符',lines:'换行',nbsp:'不换行空格',zero:'零宽字符',controls:'控制字符',placeholder:'粘贴含有可疑不可见字符的文本、代码或数据……',step1:'将文本、代码、CSV 或复制的内容粘贴到输入区',step2:'通过彩色标记检查空格、制表符、换行、NBSP 和零宽字符',step3:'使用「清理不可见字符」删除隐藏标记，或规范化全部空白',step4:'确认计数和可见布局正确后复制清理后的文本'}});
const {$,t,copyText}=GZ;let cleaned='';
const esc=s=>s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
function analyze(s){const c={characters:[...s].length,spaces:(s.match(/ /g)||[]).length,tabs:(s.match(/\t/g)||[]).length,lines:(s.match(/\r\n|\r|\n/g)||[]).length,nbsp:(s.match(/\u00a0/g)||[]).length,zero:(s.match(/[\u200b-\u200f\u2060\ufeff]/g)||[]).length,controls:(s.match(/[\u0000-\u0008\u000b\u000c\u000e-\u001f\u007f]/g)||[]).length};$('#stats').innerHTML=Object.entries(c).map(([k,v])=>`<div class="ws-stat"><b>${v}</b><span>${t(k)}</span></div>`).join('');return c}
function visualize(s){let out='';for(let i=0;i<s.length;i++){const ch=s[i],n=s[i+1];if(ch==='\r'&&n==='\n'){out+='<span class="ws-mark ws-line">↵ CRLF</span>\n';i++}else if(ch==='\n')out+='<span class="ws-mark ws-line">↵ LF</span>\n';else if(ch==='\r')out+='<span class="ws-mark ws-line">↵ CR</span>\n';else if(ch==='\t')out+='<span class="ws-mark ws-tab">→ TAB</span>';else if(ch===' ')out+= $('#show-space').checked?'<span class="ws-mark ws-space">·</span>':' ';else if(ch==='\u00a0')out+='<span class="ws-mark ws-nbsp">⍽ NBSP</span>';else if(/[\u200b-\u200f\u2060\ufeff]/.test(ch))out+=`<span class="ws-mark ws-zero">[${codeName(ch)}]</span>`;else if(/[\u0000-\u0008\u000b\u000c\u000e-\u001f\u007f]/.test(ch))out+=`<span class="ws-mark ws-control">[${codeName(ch)}]</span>`;else out+=esc(ch)}return out||'<span style="color:var(--text3)">—</span>'}
function codeName(ch){const n=ch.codePointAt(0);return 'U+'+n.toString(16).toUpperCase().padStart(4,'0')}
function update(){const s=$('#input').value;analyze(s);$('#output').innerHTML=visualize(s);cleaned=s.replace(/[\u200b-\u200f\u2060\ufeff]/g,'').replace(/[\u0000-\u0008\u000b\u000c\u000e-\u001f\u007f]/g,'')}
function labels(){$('#sample').textContent=t('sample');$('#clean').textContent=t('clean');$('#normalize').textContent=t('normalize');$('#copy').textContent=t('copy');$('#clear').textContent=t('clear');$('#show-space-label').textContent=t('showSpaces');$('#input-label').textContent=t('input');$('#output-label').textContent=t('output');$('#input').placeholder=t('placeholder')}
$('#input').oninput=update;$('#show-space').onchange=update;$('#sample').onclick=()=>{$('#input').value='first  line\twith tab\r\nNBSP:\u00a0here\nzero\u200bwidth\ufeffmark\nend';update()};$('#clean').onclick=()=>{$('#input').value=cleaned;update()};$('#normalize').onclick=()=>{$('#input').value=$('#input').value.replace(/\r\n?/g,'\n').replace(/\u00a0/g,' ').replace(/[\u200b-\u200f\u2060\ufeff]/g,'').replace(/[^\S\n]+/g,' ').replace(/ *\n */g,'\n');update()};$('#copy').onclick=()=>copyText(cleaned);$('#clear').onclick=()=>{$('#input').value='';update()};labels();update();
GZ.renderToolPage({category:'text',titleKey:'toolTitle',descKey:'toolDesc',howToSteps:['step1','step2','step3','step4'],related:[{icon:'👁️',href:'/text/zero-width-remover.html',name:'Zero Width Remover'},{icon:'🧹',href:'/text/remove-spaces.html',name:'Remove Spaces'},{icon:'↩️',href:'/text/remove-line-breaks.html',name:'Remove Line Breaks'},{icon:'🔤',href:'/dev/unicode-inspector.html',name:'Unicode Inspector'}]});
</script><script src="/tools-result-rec.js?v=20260707v520" defer></script></body></html>
