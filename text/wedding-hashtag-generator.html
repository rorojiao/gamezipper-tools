<script>
GZI18n.register({
  en: {
    toolTitle: 'Wedding Hashtag Generator',
    toolDesc: 'Create the perfect custom wedding hashtag for Instagram, TikTok and Pinterest. Enter the couple names and date — get 25+ unique hashtag ideas instantly.',
    styleRomantic: '💕 Romantic',
    stylePunny: '😄 Punny',
    styleAll: '✨ All Styles',
    copy: 'Copy',
    copied: 'Copied!',
    generate: 'Regenerate',
    step1: 'Enter both partners\' first names (and optional last name)',
    step2: 'Optionally add the wedding date for date-themed tags',
    step3: 'Pick a style — romantic, punny, or all of them',
    step4: 'Click any Copy button to grab your favorite hashtag',
  },
  zh: {
    toolTitle: '婚礼话题标签生成器',
    toolDesc: '为 Instagram、TikTok 和 Pinterest 创建完美定制婚礼话题标签。输入姓名和日期 — 立即获得 25+ 独特标签灵感。',
    styleRomantic: '💕 浪漫',
    stylePunny: '😄 谐音',
    styleAll: '✨ 全部',
    copy: '复制',
    copied: '已复制！',
    generate: '重新生成',
    step1: '输入双方名字（可加姓氏）',
    step2: '可选输入婚礼日期，生成日期相关标签',
    step3: '选择风格 — 浪漫、谐音或全部',
    step4: '点击任意「复制」按钮即可使用标签',
  }
});

const ROMANTIC = [
  (a,b) => `#${a}And${b}Forever`,
  (a,b) => `#${a}Meets${b}`,
  (a,b) => `#${b}Meets${a}`,
  (a,b) => `#${a}Loves${b}`,
  (a,b) => `#${b}And${a}TieTheKnot`,
  (a,b) => `#Forever${a}And${b}`,
  (a,b) => `#${a}And${b}SayIDo`,
  (a,b) => `#${a}Weds${b}`,
  (a,b) => `#${b}Weds${a}`,
  (a,b) => `#${a}And${b}BecomeUs`,
  (a,b) => `#The${a}${b}Wedding`,
  (a,b) => `#${a}${b}WeddingDay`,
  (a,b) => `#${a}Plus${b}EqualsLove`,
  (a,b) => `#${a}And${b}4Ever`,
  (a,b) => `#${a}${b}GetHitched`,
  (a,b) => `#Love${a}Love${b}`,
  (a,b) => `#${a}X${b}Forever`,
  (a,b) => `#${a}And${b}InLove`,
  (a,b) => `#${a}${b}Forevermore`,
  (a,b) => `#${a}MyPerson${b}`,
  (a,b) => `#${a}And${b}ToHaveAndToHold`,
  (a,b) => `#${a}Heart${b}`,
  (a,b) => `#${a}And${b}AtLast`,
  (a,b) => `#${a}And${b}HappilyEverAfter`,
  (a,b) => `#${a}And${b}UnitedAsOne`,
];

const PUNNY = [
  (a,b) => `#${a}And${b}AreFinallySynced`,
  (a,b) => `#${a}${b}BetterTogether`,
  (a,b) => `#${a}And${b}MadeForEachOther`,
  (a,b) => `#${a}ClickedWith${b}`,
  (a,b) => `#${a}And${b}FinallyFriended`,
  (a,b) => `#${a}And${b}MergedAccounts`,
  (a,b) => `#${a}And${b}SwipeRight`,
  (a,b) => `#${a}And${b}InStitch`,
  (a,b) => `#${a}Weds${b}TheDeal`,
  (a,b) => `#${a}And${b}AreKindredSpice`,
  (a,b) => `#${a}And${b}AreADynamicDuo`,
  (a,b) => `#${a}${b}TiedTheNot`,
  (a,b) => `#${a}And${b}AreAtTheAltarNatives`,
  (a,b) => `#${a}And${b}ArePairrenthood`,
  (a,b) => `#${a}And${b}InLoveSquared`,
  (a,b) => `#${a}And${b}AreAPerfectMatch`,
  (a,b) => `#${a}And${b}DoingTheChaChaForever`,
  (a,b) => `#${a}And${b}AreARealCatch`,
  (a,b) => `#${a}And${b}FoundTheirForever`,
  (a,b) => `#${a}And${b}FinallyInLove`,
];

const DATE_TEMPLATES = [
  (a,b,d) => `#${a}And${b}${d}`,
  (a,b,d) => `#${d}${a}${b}`,
  (a,b,d) => `#${a}${b}Wedding${d}`,
  (a,b,d) => `#${a}And${b}GetMarried${d}`,
  (a,b,d) => `#${a}${b}${d}Forever`,
  (a,b,d) => `#${d}I_do`,
  (a,b,d) => `#The${d}Wedding`,
];

const { $, $$, t } = GZ;
let activeStyle = 'all';

function getDateStr() {
  const v = $('#date').value;
  if (!v) return '';
  const d = new Date(v);
  if (isNaN(d)) return '';
  const yr = d.getFullYear();
  const mm = String(d.getMonth() + 1).padStart(2, '0');
  const dd = String(d.getDate()).padStart(2, '0');
  return `${yr}${mm}${dd}`;
}

function getDateYear() {
  const v = $('#date').value;
  if (!v) return '';
  const d = new Date(v);
  if (isNaN(d)) return '';
  return String(d.getFullYear());
}

function capitalize(s) {
  return s.charAt(0).toUpperCase() + s.slice(1).toLowerCase();
}

function generate() {
  const p1 = capitalize(($('#p1').value || 'Alex').trim());
  const p2 = capitalize(($('#p2').value || 'Jordan').trim());
  const dateStr = getDateStr();
  const yr = getDateYear();
  const tags = new Set();
  
  let sources = [];
  if (activeStyle === 'romantic' || activeStyle === 'all') sources = sources.concat(ROMANTIC);
  if (activeStyle === 'punny' || activeStyle === 'all') sources = sources.concat(PUNNY);
  
  sources.forEach(fn => {
    const tag = fn(p1, p2);
    if (tag.length <= 30 && /^[A-Za-z0-9#]+$/.test(tag)) tags.add(tag);
  });
  
  if (dateStr) {
    DATE_TEMPLATES.forEach(fn => tags.add(fn(p1, p2, dateStr)));
    if (yr) {
      tags.add(`#${p1}And${p2}SayIDoIn${yr}`);
      tags.add(`#${yr}WeddingOf${p1}And${p2}`);
      tags.add(`#${p1}And${p2}${yr}`);
    }
  }
  
  // Convert to array and sort by length (shorter first)
  const list = [...tags].sort((a, b) => a.length - b.length);
  $('#count').textContent = `${list.length} unique hashtag ideas generated`;
  $('#list').innerHTML = list.map(tag => `
    <div class="wh-item">
      <div>
        <div class="wh-hash">${tag}</div>
        <div class="wh-meta">${tag.length} chars</div>
      </div>
      <button class="wh-copy" data-tag="${tag}">${t('copy')}</button>
    </div>`).join('');
  
  $$('.wh-copy').forEach(b => b.addEventListener('click', () => {
    GZ.copyText(b.dataset.tag);
  }));
}

function renderStyles() {
  const styles = [
    { id: 'all', key: 'styleAll' },
    { id: 'romantic', key: 'styleRomantic' },
    { id: 'punny', key: 'stylePunny' },
  ];
  $('#styles').innerHTML = styles.map(s => 
    `<button class="wh-style${s.id === activeStyle ? ' active' : ''}" data-s="${s.id}">${t(s.key)}</button>`
  ).join('');
  $$('#styles .wh-style').forEach(b => b.addEventListener('click', () => {
    activeStyle = b.dataset.s;
    renderStyles();
    generate();
  }));
}

['p1', 'p2', 'date'].forEach(id => $('#' + id).addEventListener('input', generate));
renderStyles();
generate();

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="generate()">${t('generate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="let a=$('#list').querySelectorAll('.wh-hash');let t=Array.from(a).map(x=>x.textContent).join('\\n');GZ.copyText(t)">Copy All</button>`;

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'#️⃣', href:'/text/hashtag-generator.html', name:'Hashtag Generator'},
    {icon:'🏷️', href:'/text/youtube-tag-generator.html', name:'YouTube Tag Generator'},
    {icon:'💼', href:'/text/business-name-generator.html', name:'Business Name'},
    {icon:'🆔', href:'/text/username-generator.html', name:'Username Generator'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
