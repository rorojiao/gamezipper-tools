<script>
GZI18n.register({
  en: {

    toolDesc: '在浏览器中构建交互式家谱。添加家庭成员，连接配偶、父母和子女，拖拽重新排版，最后下载为 PNG 图片。无需注册 — 数据仅保存在你的设备上。',
    addPerson: '添加成员', name: '姓名', gender: '性别', male: '男', female: '女', other: '其他',
    birth: '出生年份', death: '去世年份（可选）', addBtn: '添加成员',
    relationship: '关系连接', addSpouse: '连接配偶', addChild: '连接子女', addParent: '连接父母', cancel: '取消',
    emptyHint: '← 添加第一位家庭成员，开始构建你的家谱',
    step1: '输入姓名、性别和年份，然后点击「添加成员」',
    step2: '点击某个成员将其选中（卡片变为金色）',
    step3: '点击「连接配偶 / 子女 / 父母」，再点击相关成员完成连接',
    step4: '拖拽任意卡片重新排版，然后点击「下载 PNG」保存家谱',
    promptSpouse: '点击另一个人，连接为配偶',
    promptChild: '点击要连接为子女的人',
    promptParent: '点击要连接为父母的人',
    needSelect: '请先选中一位成员（点击其卡片）',
    noSelfLink: '不能将一个人连接到自己',
    alreadyLinked: '这两个人已经连接',
    relDone: '✓ 已添加关系',
    download: '下载 PNG',
  }
});

const { $, t } = GZ;
let nextId = 1;
const people = new Map(); // id -> {id,name,gender,birth,death,x,y}
const links = new Set();  // "a-b" spouse, "parent-child" parent
let selectedId = null;
let linkMode = null; // 'spouse' | 'child' | 'parent'
let dragId = null, dragOff = {x:0,y:0};

function uid() { return 'p' + (nextId++); }

function addPersonFromForm() {
  const name = $('#in-name').value.trim();
  if (!name) { $('#in-name').focus(); return; }
  const gender = $('#in-gender').value;
  const birth = $('#in-birth').value.trim();
  const death = $('#in-death').value.trim();
  // place new person near center, offset for each new
  const n = people.size;
  const x = 80 + (n % 5) * 170;
  const y = 60 + Math.floor(n/5) * 180;
  const id = uid();
  people.set(id, {id, name, gender, birth, death, x, y});
  $('#in-name').value = ''; $('#in-birth').value = ''; $('#in-death').value = '';
  $('#in-name').focus();
  render();
}

function renderNode(p) {
  const el = document.createElement('div');
  el.className = 'ft-node ' + p.gender + (p.id === selectedId ? ' selected' : '');
  el.style.left = p.x + 'px'; el.style.top = p.y + 'px';
  el.dataset.id = p.id;
  const avatar = p.gender === 'female' ? '👩' : p.gender === 'male' ? '👨' : '🧑';
  const dates = (p.birth || p.death) ? `${p.birth||'?'} – ${p.death||''}` : '';
  el.innerHTML = `<div class="ft-avatar">${avatar}</div><div class="ft-name">${escapeHtml(p.name)}</div>${dates?`<div class="ft-dates">${dates}</div>`:''}<button class="ft-del" onclick="delPerson(event,'${p.id}')">✕</button>`;
  el.addEventListener('mousedown', (e) => onNodeDown(e, p.id));
  el.addEventListener('click', (e) => { if (!justDragged) onNodeClick(p.id); });
  $('#canvas').appendChild(el);
}

function escapeHtml(s){ return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function renderLinks() {
  const svg = $('#svg');
  svg.innerHTML = '';
  // spouse: horizontal midline; parent-child: bottom of parent → top of child
  [...links].forEach(l => {
    const [a, type, b] = l.split('|');
    const pa = people.get(a), pb = people.get(b);
    if (!pa || !pb) return;
    if (type === 'spouse') {
      const x1 = pa.x+70, y1 = pa.y+45, x2 = pb.x+70, y2 = pb.y+45;
      svg.innerHTML += `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="#ffd93d" stroke-width="3" stroke-dasharray="0"/>`;
    } else if (type === 'parent') {
      // a is parent, b is child
      const x1 = a===l.split('|')[0] ? pa.x+70 : pa.x+70;
      const y1 = pa.y + 110; // bottom of parent
      const x2 = pb.x + 70;
      const y2 = pb.y; // top of child
      const midY = (y1 + y2) / 2;
      svg.innerHTML += `<path d="M${x1},${y1} L${x1},${midY} L${x2},${midY} L${x2},${y2}" stroke="#4ecdc4" stroke-width="2.5" fill="none"/>`;
    }
  });
}

function render() {
  // remove existing nodes
  [...$('#canvas').querySelectorAll('.ft-node')].forEach(n => n.remove());
  $('#empty-hint').style.display = people.size ? 'none' : 'block';
  people.forEach(renderNode);
  renderLinks();
}

let justDragged = false;
function onNodeDown(e, id) {
  if (e.button !== 0 && e.type !== 'touchstart') return;
  if (e.target.classList.contains('ft-del')) return;
  e.preventDefault();
  dragId = id;
  const p = people.get(id);
  const cw = $('.ft-canvas-wrap');
  const rect = cw.getBoundingClientRect();
  const scale = 1;
  const cx = (e.touches ? e.touches[0].clientX : e.clientX);
  const cy = (e.touches ? e.touches[0].clientY : e.clientY);
  dragOff = { x: (cx - rect.left + cw.scrollLeft) - p.x, y: (cy - rect.top + cw.scrollTop) - p.y };
  justDragged = false;
  document.addEventListener('mousemove', onDragMove);
  document.addEventListener('mouseup', onDragUp);
  document.addEventListener('touchmove', onDragMove, {passive:false});
  document.addEventListener('touchend', onDragUp);
}
function onDragMove(e) {
  if (!dragId) return;
  e.preventDefault();
  justDragged = true;
  const p = people.get(dragId);
  const cw = $('.ft-canvas-wrap');
  const rect = cw.getBoundingClientRect();
  const cx = (e.touches ? e.touches[0].clientX : e.clientX);
  const cy = (e.touches ? e.touches[0].clientY : e.clientY);
  p.x = Math.max(0, Math.min(1460, cx - rect.left + cw.scrollLeft - dragOff.x));
  p.y = Math.max(0, Math.min(1080, cy - rect.top + cw.scrollTop - dragOff.y));
  const el = document.querySelector(`.ft-node[data-id="${dragId}"]`);
  if (el) { el.style.left = p.x + 'px'; el.style.top = p.y + 'px'; }
  renderLinks();
}
function onDragUp() {
  dragId = null;
  document.removeEventListener('mousemove', onDragMove);
  document.removeEventListener('mouseup', onDragUp);
  document.removeEventListener('touchmove', onDragMove);
  document.removeEventListener('touchend', onDragUp);
  setTimeout(() => justDragged = false, 50);
}

function onNodeClick(id) {
  if (linkMode) {
    if (!selectedId) { setSelected(id); return; }
    if (selectedId === id) { cancelMode(); return; }
    addRelationship(selectedId, id, linkMode);
    cancelMode();
  } else {
    setSelected(id);
  }
}
function setSelected(id) { selectedId = id; render(); updateRelStatus(); }
function updateRelStatus() {
  const st = $('#rel-status');
  if (!selectedId) { st.textContent = ''; return; }
  const p = people.get(selectedId);
  if (linkMode) {
    const prompts = {spouse:'promptSpouse', child:'promptChild', parent:'promptParent'};
    st.textContent = t(prompts[linkMode]) + ' (selected: ' + p.name + ')';
  } else {
    st.textContent = '✓ ' + p.name;
  }
}

function setMode(mode) {
  if (!selectedId) { alert(t('needSelect')); return; }
  linkMode = mode;
  updateRelStatus();
}
function cancelMode() { linkMode = null; updateRelStatus(); }

function addRelationship(a, b, type) {
  if (a === b) { alert(t('noSelfLink')); return; }
  let key;
  if (type === 'spouse') key = a < b ? `${a}|spouse|${b}` : `${b}|spouse|${a}`;
  else if (type === 'child') key = `${a}|parent|${b}`; // a is parent
  else if (type === 'parent') key = `${b}|parent|${a}`; // b is parent, a is child
  if (links.has(key)) { alert(t('alreadyLinked')); return; }
  links.add(key);
  GZ.showToast(t('relDone'));
  render();
}

function delPerson(e, id) {
  e.stopPropagation(); e.preventDefault();
  people.delete(id);
  [...links].forEach(l => { if (l.startsWith(id+'|') || l.endsWith('|'+id)) links.delete(l); });
  if (selectedId === id) selectedId = null;
  render();
}

function downloadPNG() {
  // Use SVG foreignObject approach: render canvas content into an SVG and rasterize
  const cw = $('.ft-canvas-wrap');
  const canvas = $('#canvas');
  // find bounding box of nodes
  let maxX = 1600, maxY = 1200;
  people.forEach(p => { maxX = Math.max(maxX, p.x+160); maxY = Math.max(maxY, p.y+150); });
  // Build a foreignObject SVG
  const svgStr = `<svg xmlns="http://www.w3.org/2000/svg" width="${maxX}" height="${maxY}" viewBox="0 0 ${maxX} ${maxY}">
    <rect width="100%" height="100%" fill="#0d1424"/>
    ${$('#svg').innerHTML}
    ${[...canvas.querySelectorAll('.ft-node')].map(el => {
      const left = parseFloat(el.style.left), top = parseFloat(el.style.top);
      const border = el.classList.contains('female') ? '#ff8fb1' : el.classList.contains('male') ? '#5fb3ff' : '#4ecdc4';
      const avatar = el.querySelector('.ft-avatar')?.textContent || '';
      const name = el.querySelector('.ft-name')?.textContent || '';
      const dates = el.querySelector('.ft-dates')?.textContent || '';
      return `<g transform="translate(${left},${top})">
        <rect width="140" height="${dates?95:75}" rx="12" fill="#1a1a2e" stroke="${border}" stroke-width="2"/>
        <text x="70" y="32" font-size="28" text-anchor="middle">${avatar}</text>
        <text x="70" y="58" font-size="13" font-weight="bold" fill="#fff" text-anchor="middle">${escapeHtml(name)}</text>
        ${dates?`<text x="70" y="78" font-size="10" fill="#888" text-anchor="middle" font-family="monospace">${dates}</text>`:''}
      </g>`;
    }).join('')}
  </svg>`;
  const blob = new Blob([svgStr], {type:'image/svg+xml;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const img = new Image();
  img.onload = () => {
    const c = document.createElement('canvas');
    c.width = maxX; c.height = maxY;
    const ctx = c.getContext('2d');
    ctx.drawImage(img, 0, 0);
    c.toBlob(b => {
      const a = document.createElement('a');
      a.href = URL.createObjectURL(b); a.download = 'family-tree.png'; a.click();
      URL.revokeObjectURL(a.href);
    });
    URL.revokeObjectURL(url);
  };
  img.onerror = () => { alert('Export failed — try fewer special characters in names'); URL.revokeObjectURL(url); };
  img.src = url;
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="downloadPNG()">📥 ${t('download')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="seedExample()">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="clearAll()">${t('clear')}</button>`;

function seedExample() {
  clearAll();
  const grandpa = uid(); people.set(grandpa, {id:grandpa,name:'Robert Smith',gender:'male',birth:'1930',death:'2010',x:600,y:30});
  const grandma = uid(); people.set(grandma, {id:grandma,name:'Mary Smith',gender:'female',birth:'1935',death:'2015',x:780,y:30});
  links.add(`${grandpa}|spouse|${grandma}`);
  const dad = uid(); people.set(dad, {id:dad,name:'John Smith',gender:'male',birth:'1960',x:480,y:240});
  const mom = uid(); people.set(mom, {id:mom,name:'Linda Smith',gender:'female',birth:'1962',x:660,y:240});
  links.add(`${dad}|spouse|${mom}`);
  links.add(`${grandpa}|parent|${dad}`);
  links.add(`${grandma}|parent|${dad}`);
  const me = uid(); people.set(me, {id:me,name:'Alex Smith',gender:'male',birth:'1990',x:380,y:440});
  const sis = uid(); people.set(sis, {id:sis,name:'Emma Smith',gender:'female',birth:'1992',x:580,y:440});
  links.add(`${dad}|parent|${me}`); links.add(`${mom}|parent|${me}`);
  links.add(`${dad}|parent|${sis}`); links.add(`${mom}|parent|${sis}`);
  render();
}
function clearAll() { people.clear(); links.clear(); selectedId = null; linkMode = null; render(); updateRelStatus(); }

// Enter-key submit
$('#in-name').addEventListener('keydown', e => { if (e.key === 'Enter') addPersonFromForm(); });

GZ.renderToolPage({
  category: 'fun',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
