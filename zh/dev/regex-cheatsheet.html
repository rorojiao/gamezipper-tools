<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"What is a regular expression?","acceptedAnswer":{"@type":"Answer","text":"A regular expression (regex) is a sequence of characters that defines a search pattern. They're used for string matching, validation, search-and-replace and parsing in nearly every programming language and text editor."}},{"@type":"Question","name":"What's the difference between greedy and lazy quantifiers?","acceptedAnswer":{"@type":"Answer","text":"Greedy quantifiers (like *, +, ?) match as much text as possible. Lazy quantifiers (*?, +?, ??) match as little as possible. For example, on '<a>tag</a>', the pattern '<.*>' is greedy and matches the whole string, while '<.*?>' is lazy and matches just '<a>'."}},{"@type":"Question","name":"What is a lookahead in regex?","acceptedAnswer":{"@type":"Answer","text":"A lookahead (?=pattern) checks that what follows matches the pattern without including it in the match. Negative lookahead (?!pattern) checks that what follows does NOT match. For example, 'q(?=u)' matches 'q' only when followed by 'u'."}},{"@type":"Question","name":"Are regex patterns the same across languages?","acceptedAnswer":{"@type":"Answer","text":"Most basic regex features are universal. However, advanced features like lookbehind, atomic groups and named groups may have differences. JavaScript, Python, Java, PCRE (PHP) and .NET each have their own extensions."}}]}</script>

const patterns = [
{category:'common',items:[

{name:'Date (MM/DD/YYYY)',desc:'US date format',regex:'(?:0[1-9]|1[0-2])\\/(?:0[1-9]|[12]\\d|3[01])\\/\\d{4}',tags:['date']},
{name:'Date (DD/MM/YYYY)',desc:'European date format',regex:'(?:0[1-9]|[12]\\d|3[01])\\/(?:0[1-9]|1[0-2])\\/\\d{4}',tags:['date']},
{name:'Time (24-hour)',desc:'HH:MM or HH:MM:SS',regex:'(?:[01]\\d|2[0-3]):[0-5]\\d(?::[0-5]\\d)?',tags:['time']},
{name:'Time (12-hour)',desc:'Match 1:00 PM, 12:30 am etc.',regex:'(?:1[0-2]|0?[1-9]):[0-5]\\d\\s?(?:[apAP][mM])?',tags:['time']},
]},
{category:'web',items:[
{name:'HTML tag',desc:'Match opening/closing HTML tags',regex:'<\\/?[a-z][a-zA-Z0-9]*(?:\\s[^>]*)?\\/?>',tags:['html','web']},
{name:'Hex color code',desc:'Match #RGB and #RRGGBB',regex:'#(?:[0-9a-fA-F]{3}){1,2}\\b',tags:['color','css']},

{name:'Twitter handle',desc:'Match @username',regex:'@([A-Za-z0-9_]{1,15})',tags:['social']},
{name:'Hashtag',desc:'Match #hashtag',regex:'#([\\w一-龥]+)',tags:['social']},
{name:'YouTube video ID',desc:'Match YouTube video IDs',regex:'(?:youtube\\.com\\/(?:[^\\/]+\\/)*[^\\/]+|youtu\\.be\\/)([\\w-]{11})',tags:['social','media']},
{name:'Slug (URL-safe)',desc:'Match URL slugs',regex:'^[a-z0-9]+(?:-[a-z0-9]+)*$',tags:['web','url']},

const quickRef = [
{sym:'.',desc:'Any character',example:'a.c → abc, a1c'},
{sym:'\\d',desc:'Digit 0-9',example:'\\d+ → 42'},
{sym:'\\w',desc:'Word char [a-zA-Z0-9_]',example:'\\w+ → hello_42'},
{sym:'\\s',desc:'Whitespace',example:'\\s+ → space, tab, NL'},
{sym:'^',desc:'Start of string',example:'^Hello'},
{sym:'$',desc:'End of string',example:'world$'},
{sym:'*',desc:'Zero or more',example:'ab* → a, ab, abb'},
{sym:'+',desc:'One or more',example:'ab+ → ab, abb'},
{sym:'?',desc:'Zero or one',example:'colou?r'},
{sym:'{n}',desc:'Exactly n',example:'\\d{4}'},
{sym:'{n,m}',desc:'Between n and m',example:'\\d{2,4}'},
{sym:'[abc]',desc:'Any of a/b/c',example:'[aeiou]'},
{sym:'[^abc]',desc:'Not a/b/c',example:'[^0-9]'},
{sym:'(?:)',desc:'Non-capturing group',example:'(?:ab)+'},
{sym:'()',desc:'Capturing group',example:'(\\w+)\\s(\\w+)'},
{sym:'(?=)',desc:'Positive lookahead',example:'q(?=u)'},
{sym:'(?!)',desc:'Negative lookahead',example:'q(?!u)'},
{sym:'|',desc:'Alternation',example:'cat|dog'},
{sym:'\\b',desc:'Word boundary',example:'\\bcat\\b'},
{sym:'\\',desc:'Escape special char',example:'\\.'},
];

function renderPatterns() {
const q = $('#searchBox').value.toLowerCase().trim();
const container = $('#patterns');
container.innerHTML = patterns.map(cat => {
const items = cat.items.filter(item => {
if (!q) return true;
return item.name.toLowerCase().includes(q) ||
item.desc.toLowerCase().includes(q) ||
item.regex.toLowerCase().includes(q) ||
item.tags.some(t => t.includes(q));
});
if (items.length === 0) return '';
return `<div class="cat-section">
<div class="cat-title">${cat.category.toUpperCase()}</div>
<div class="pattern-grid">
${items.map(item => `
<div class="pattern-card" onclick="copyText('${item.regex.replace(/'/g, "\\'")}'); GZ.showToast('Pattern copied!')">
<div class="name">${item.name}</div>
<div class="desc">${item.desc}</div>
<div class="regex">${item.regex}</div>
<div class="tags">${item.tags.map(t => `<span class="tag">#${t}</span>`).join('')}</div>
</div>`).join('')}
</div></div>`;
}).join('');
}

function testRegex() {
const pattern = $('#regexPattern').value;
const text = $('#regexText').value;
if (!pattern) { $('#matchesInfo').textContent = ''; $('#regexResult').value = ''; return; }
try {
const flags = 'g' + ($('#regexPattern').dataset.caseInsensitive === 'true' ? 'i' : '');
const re = new RegExp(pattern, flags);
const matches = [];
let m;
let count = 0;
const safeText = text.slice(0, 5000);
while ((m = re.exec(safeText)) !== null) {
matches.push(m[0]);
count++;
if (m.index === re.lastIndex) re.lastIndex++;
if (count > 1000) break;
}
$('#matchesInfo').textContent = `Found ${count} match${count !== 1 ? 'es' : ''}`;
$('#regexResult').value = matches.slice(0, 100).join('\n');
} catch (e) {
$('#matchesInfo').textContent = 'Error: ' + e.message;
$('#regexResult').value = '';
}
}

function renderQuickRef() {
$('#quickRef').innerHTML = quickRef.map(q => `
<div class="quick-ref-item" onclick="GZ.copyText('${q.sym.replace(/\\/g, '\\\\')}')" title="Click to copy">
<span>${q.desc}</span>
<code>${q.sym}</code>
</div>`).join('');
}

$('#searchBox').placeholder = t('searchPlaceholder');
$('#regexResult').placeholder = t('resultPlaceholder');

$('#regexPattern').addEventListener('input', testRegex);
$('#regexText').addEventListener('input', testRegex);

renderPatterns();
renderQuickRef();

]
});
