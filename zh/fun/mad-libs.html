<script>
GZI18n.register({
  en: {
    toolTitle: 'Mad Libs Generator',
    toolDesc: 'Fill in nouns, verbs, adjectives and more to create hilarious fill-in-the-blank stories. Multiple templates, instant laughs — free, no signup.',
    generateBtn: '✨ Generate Story',
    randomBtn: '🎲 Random Words',

    step4: 'Copy your story and share the laughs',
  },
  zh: {

    toolDesc: '填入名词、动词、形容词等，生成爆笑的填空故事。多个模板，即时乐趣 — 免费无需注册。',
    generateBtn: '✨ 生成故事',
    randomBtn: '🎲 随机填词',
    clearBtn: '🧹 清空',
    copyBtn: '📋 复制故事',
    storyTitle: '你的故事',
    fillHint: '填入所有词语，然后点击生成！',
    step1: '从下拉菜单选择一个故事模板',
    step2: '填入所要求的词（名词、动词、形容词等）',
    step3: '点击生成故事，查看爆笑结果',
    step4: '复制你的故事，分享快乐',
  }
});

// Each story: parts (array of {type, label}) and template function
const STORIES = {
  en: [
    { name:'A Day at the Beach', parts:['noun','adjective','verb','body part','adverb','animal','noun','adjective','verb'],
      tmpl:p=>`One ${p[1]} day, I went to the beach with my ${p[0]}. We decided to ${p[2]} in the ${p[3]} water. Suddenly, a ${p[4]} ${p[5]} jumped out and stole our ${p[6]}! Everyone was so ${p[7]}, we had to ${p[8]} all the way home.`
    },
    { name:'Space Adventure', parts:['adjective','noun','number','verb','planet','adverb','animal','emotion','verb'],
      tmpl:p=>`Last night I dreamed of a ${p[0]} journey to ${p[4]}. I packed my ${p[1]} and ${p[2]} snacks. When I arrived, I began to ${p[3]} ${p[5]}. A friendly ${p[6]} greeted me with ${p[7]}. Then we decided to ${p[8]} together until the stars went out.`
    },
    { name:'The Monster Under the Bed', parts:['adjective','monster name','sound','body part','adverb','food','verb','emotion','noun'],
      tmpl:p=>`There is a ${p[0]} ${p[1]} living under my bed. Every night it makes a loud ${p[2]} with its ${p[3]}. It ${p[4]} eats all my ${p[5]}. I tried to ${p[6]} it away but it just looked at me with ${p[7]}. Now we are best friends and share my ${p[8]}.`
    },
    { name:'First Day of School', parts:['adjective','subject','teacher name','verb','animal','adverb','food','emotion','noun'],
      tmpl:p=>`On my first day I felt ${p[0]}. My favorite ${p[1]} class is taught by ${p[2]}. We learned how to ${p[3]} like a ${p[4]}. At lunch I ate ${p[6]} ${p[5]} and felt ${p[7]}. I can't wait to bring my ${p[8]} tomorrow!`
    },
    { name:'The Cooking Disaster', parts:['adjective','ingredient','kitchen item','verb','temperature','animal','adverb','emotion','dish'],
      tmpl:p=>`I tried to cook a ${p[0]} meal using ${p[1]} and a ${p[2]}. I set the oven to ${p[4]} and started to ${p[3]}. Suddenly my pet ${p[5]} jumped on the counter ${p[6]}! I felt ${p[7]} but somehow the ${p[8]} turned out amazing.`
    },
  ],
  zh: [
    { name:'海边的一天', parts:['名词','形容词','动词','身体部位','副词','动物','名词','形容词','动词'],
      tmpl:p=>`一个${p[1]}的日子，我和我的${p[0]}一起去海边。我们决定在${p[3]}的海水里${p[2]}。突然，一只${p[4]}的${p[5]}跳了出来，偷走了我们的${p[6]}！大家都很${p[7]}，只好一路${p[8]}回家。`
    },
    { name:'太空冒险', parts:['形容词','名词','数字','动词','星球','副词','动物','情绪','动词'],
      tmpl:p=>`昨晚我梦到一次${p[0]}的${p[4]}之旅。我带上${p[1]}和${p[2]}份零食。到达后，我开始${p[5]}地${p[3]}。一只友好的${p[6]}带着${p[7]}迎接了我。然后我们一起${p[8]}，直到星星熄灭。`
    },
    { name:'床底下的怪物', parts:['形容词','怪物名','声音','身体部位','副词','食物','动词','情绪','名词'],
      tmpl:p=>`我的床底下住着一只${p[0]}的${p[1]}。每晚它都用${p[3]}发出响亮的${p[2]}。它${p[4]}吃掉我所有的${p[5]}。我试着把它${p[6]}走，但它只是带着${p[7]}看着我。现在我们是好朋友了，一起分享我的${p[8]}。`
    },
    { name:'开学第一天', parts:['形容词','科目','老师名','动词','动物','副词','食物','情绪','名词'],
      tmpl:p=>`开学第一天我感觉很${p[0]}。我最喜欢的${p[1]}课是${p[2]}老师教的。我们学了如何像${p[4]}一样${p[3]}。午餐我吃了${p[6]}，${p[5]}地感觉到了${p[7]}。我迫不及待地想把我的${p[8]}带来！`
    },
  ],
};

const WORD_BANK = {
  en:{'noun':['dog','mountain','banana','robot','cloud','pizza','dragon','sock','volcano','spoon'],
      'adjective':['fluffy','enormous','sparkly','grumpy','wobbly','tiny','magnetic','sneaky','glorious','sticky'],
      'verb':['gallop','whisper','juggle','somersault','wiggle','teleport','sizzle','moonwalk','snore','explode'],
      'body part':['elbow','tongue','kneecap','nostril','toe','earlobe','spine','eyebrow'],
      'adverb':['awkwardly','gracefully','suspiciously','enthusiastically','sideways','upside-down','clumsily','frantically'],
      'animal':['platypus','penguin','sloth','flamingo','hedgehog','narwhal','llama','octopus'],
      'planet':['Mars','Jupiter','Pluto','Saturn','Neptune','Venus'],
      'monster name':['Grumbletooth','Snozzlewart','Blibberfuzz','Snarlymcpants','Wobblebeast'],
      'teacher name':['Mr. Wigglebottom','Dr. Pickles','Mrs. Thundercloud','Professor Sprinkles'],
      'subject':['math','art','science','gym','music'],
      'food':['spaghetti','donuts','pickles','marshmallows','tacos','cupcakes','popcorn','noodles'],
      'emotion':['joy','confusion','glee','panic','envy','pride'],
      'dish':['soup','cake','smoothie','casserole','stew','pudding'],
      'ingredient':['cheese','tofu','chocolate','garlic','broccoli','jelly'],
      'kitchen item':['blender','spatula','frying pan','whisk','toaster'],
      'temperature':['500 degrees','absolute zero','lukewarm','volcano-hot'],
      'number':['42','7','99','1,000','3.5'],
  },
};

const { $, t, copyText } = GZ;
let currentLang = 'en';
let currentStory = STORIES.en[0];

function getLang() { return (GZI18n.getLang && GZI18n.getLang().startsWith('zh')) ? 'zh' : 'en'; }

function populateStories() {
  currentLang = getLang();
  const stories = STORIES[currentLang] || STORIES.en;
  $('#storySel').innerHTML = stories.map((s,i) => `<option value="${i}">${s.name}</option>`).join('');
  currentStory = stories[0];
  renderFields();
  renderStoryPreview();
}

function renderFields() {
  const labels = {
    en:{noun:'noun',verb:'verb',adjective:'adjective',adverb:'adverb','body part':'body part',animal:'animal',planet:'planet','monster name':'monster name','teacher name':'teacher name',subject:'subject',food:'food',emotion:'emotion',dish:'dish',ingredient:'ingredient','kitchen item':'kitchen item',temperature:'temperature',number:'number'},
    zh:{noun:'名词',verb:'动词',adjective:'形容词',adverb:'副词','body part':'身体部位',animal:'动物',planet:'星球','monster name':'怪物名','teacher name':'老师名',subject:'科目',food:'食物',emotion:'情绪',dish:'菜品',ingredient:'食材','kitchen item':'厨具',temperature:'温度',number:'数字'},
  };
  const lbl = labels[currentLang];
  $('#fields').innerHTML = currentStory.parts.map((type,i) =>
    `<div class="ml-field"><label><span class="num">${i+1}.</span> ${lbl[type]||type}</label><input type="text" data-i="${i}" data-type="${type}" placeholder="${lbl[type]||type}"></div>`).join('');
  $('#fields').querySelectorAll('input').forEach(el => el.addEventListener('input', renderStoryPreview));
}

function getWords() {
  return Array.from($('#fields').querySelectorAll('input')).map(el => ({ val: el.value.trim(), type: el.dataset.type }));
}

function renderStoryPreview() {
  const words = getWords();
  const allFilled = words.every(w => w.val);
  if (!allFilled) {
    $('#story').innerHTML = `<span style="opacity:.6">${t('fillHint')}</span>`;
    return;
  }
  $('#story').innerHTML = currentStory.tmpl(words.map(w => `<span class="filled">${w.val}</span>`));
}

function generate() {
  const words = getWords();
  const empty = $('#fields').querySelector('input');
  for (const el of $('#fields').querySelectorAll('input')) { if (!el.value.trim()) { el.focus(); return; } }
  $('#story').innerHTML = currentStory.tmpl(words.map(w => `<span class="filled">${w.val}</span>`));
}

function randomFill() {
  const bank = WORD_BANK.en;
  $('#fields').querySelectorAll('input').forEach(el => {
    const type = el.dataset.type;
    const list = bank[type] || ['surprise'];
    el.value = list[Math.floor(Math.random()*list.length)];
  });
  renderStoryPreview();
}

function clearFields() {
  $('#fields').querySelectorAll('input').forEach(el => el.value = '');
  renderStoryPreview();
}

function copyStory() {
  const words = getWords();
  if (!words.every(w => w.val)) return;
  const txt = currentStory.tmpl(words.map(w => w.val));
  copyText(txt);
}

$('#storySel').addEventListener('change', () => {
  const stories = STORIES[currentLang] || STORIES.en;
  currentStory = stories[+$('#storySel').value];
  renderFields();
  renderStoryPreview();
});

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="generate()">${t('generateBtn')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="randomFill()">${t('randomBtn')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="clearFields()">${t('clearBtn')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="copyStory()">${t('copyBtn')}</button>`;
populateStories();

GZ.renderToolPage({
  category: 'fun',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🎭', href:'/fun/truth-or-dare.html', name:'Truth or Dare'},
    {icon:'🤔', href:'/fun/would-you-rather.html', name:'Would You Rather'},
    {icon:'📖', href:'/fun/story-generator.html', name:'Story Generator'},
    {icon:'💬', href:'/fun/quote-generator.html', name:'Quote Generator'},
  ]
});
</script>
