const { $, copyText, t } = GZ;

function buildForm() {
  const u = $('#unit').value;
  const ulen = u === 'ft' ? 'ft' : 'm';
  $('#lbl-length').innerHTML = `${t('length')}<input type="number" id="length" min="1" step="0.1" value="100" oninput="autoCalc()">`;
  $('#lbl-unit').innerHTML = `${t('unit')}<select id="unitSel" onchange="syncUnit(this.value)"><option value="ft">Feet (ft)</option><option value="m">Meters (m)</option></select>`;
  $('#lbl-spacing').innerHTML = `${t('spacing')} (${ulen})<input type="number" id="spacing" min="1" step="0.1" value="8" oninput="autoCalc()">`;
  $('#lbl-height').innerHTML = `${t('height')} (${ulen})<input type="number" id="height" min="0.5" step="0.1" value="6" oninput="autoCalc()">`;
  $('#lbl-rails').innerHTML = `${t('rails')}<select id="rails" onchange="autoCalc()"><option value="2">2</option><option value="3" selected>3</option><option value="4">4</option></select>`;
  $('#lbl-picketW').innerHTML = `${t('picketW')} (in)<input type="number" id="picketW" min="0.5" step="0.1" value="5.5" oninput="autoCalc()">`;
  $('#lbl-picketGap').innerHTML = `${t('picketGap')} (in)<input type="number" id="picketGap" min="0" step="0.1" value="0.5" oninput="autoCalc()">`;
  $('#lbl-pPost').innerHTML = `${t('pPost')} ($)<input type="number" id="pPost" min="0" step="0.1" value="8" oninput="autoCalc()">`;
  $('#lbl-pRail').innerHTML = `${t('pRail')} ($/${ulen})<input type="number" id="pRail" min="0" step="0.01" value="1.5" oninput="autoCalc()">`;
  $('#lbl-pPicket').innerHTML = `${t('pPicket')} ($)<input type="number" id="pPicket" min="0" step="0.01" value="2" oninput="autoCalc()">`;
  $('#lbl-pConcrete').innerHTML = `${t('pConcrete')}<input type="number" id="pConcrete" min="0" step="0.1" value="2" oninput="autoCalc()">`;
  $('#lbl-waste').innerHTML = `${t('waste')}<input type="number" id="waste" min="0" max="50" step="1" value="10" oninput="autoCalc()">`;
  $('#lbl-gates').innerHTML = `${t('gates')}<input type="number" id="gates" min="0" step="1" value="1" oninput="autoCalc()">`;
  $('#lbl-pGate').innerHTML = `${t('pGate')} ($)<input type="number" id="pGate" min="0" step="1" value="120" oninput="autoCalc()">`;
  // Sync select
  $('#unitSel').value = u;
}

function syncUnit(v) {
  $('#unit').value = v;
  buildForm();
  autoCalc();
}

function autoCalc() {
  const L = parseFloat($('#length').value);
  const spacing = parseFloat($('#spacing').value);
  const height = parseFloat($('#height').value);
  const rails = parseInt($('#rails').value);
  const picketW = parseFloat($('#picketW').value);
  const picketGap = parseFloat($('#picketGap').value);
  const pPost = parseFloat($('#pPost').value);
  const pRail = parseFloat($('#pRail').value);
  const pPicket = parseFloat($('#pPicket').value);
  const concretePer = parseFloat($('#pConcrete').value);
  const wastePct = parseFloat($('#waste').value) || 0;
  const gates = parseInt($('#gates').value) || 0;
  const pGate = parseFloat($('#pGate').value);
  if (!L || !spacing) return;

  const wasteMul = 1 + wastePct / 100;
  // Posts: number of gaps rounded up + 1 corner post. For closed perimeter (loop), gaps exactly equals L/spacing.
  const posts = Math.ceil(L / spacing) + 1;
  const postCount = Math.ceil(posts * wasteMul);
  // Rails: total length = L * rails
  const railLen = L * rails;
  const railLenAdj = railLen * wasteMul;
  // Pickets: count by perimeter length / (picket width + gap), converting inches to feet or meters
  const u = $('#unit').value;
  const unitScale = u === 'ft' ? 12 : 39.3701; // inches per unit
  const picketSpacingIn = (picketW + picketGap) / unitScale * (u === 'ft' ? 1 : 1);
  // picket count = L / (width + gap) in same unit
  const picketPitchUnit = (picketW + picketGap) / unitScale;
  const picketCount = Math.ceil(L / picketPitchUnit * wasteMul);
  // Concrete
  const concreteBags = Math.ceil(postCount * concretePer);
  // Costs
  const postCost = postCount * pPost;
  const railCost = railLenAdj * pRail;
  const picketCost = picketCount * pPicket;
  const gateCost = gates * pGate;
  // Concrete price: assume $5 per 60lb bag average if not specified
  const concreteCost = concreteBags * 5;
  const total = postCost + railCost + picketCost + concreteCost + gateCost;

  $('#total').textContent = '$' + Math.round(total).toLocaleString();
  $('#list').innerHTML = `
    <div class="gz-fn-item"><strong>${postCount}</strong><span>${t('posts')}</span></div>
    <div class="gz-fn-item"><strong>${Math.round(railLenAdj)} ${u}</strong><span>${t('rails')}</span></div>
    <div class="gz-fn-item"><strong>${picketCount}</strong><span>${t('pickets')}</span></div>
    <div class="gz-fn-item"><strong>${concreteBags}</strong><span>${t('concrete')}</span></div>
    <div class="gz-fn-item"><strong>${gates}</strong><span>${t('gates')}</span></div>
  `;
}

function applyPreset(name) {
  switch (name) {
    case '4':
      $('#length').value = 50; $('#spacing').value = 8; $('#height').value = 4;
      $('#rails').value = '2'; $('#picketGap').value = 2; autoCalc();
      break;
    case '6':
      $('#length').value = 100; $('#spacing').value = 8; $('#height').value = 6;
      $('#rails').value = '3'; $('#picketGap').value = 0.5; autoCalc();
      break;
    case '8':
      $('#length').value = 150; $('#spacing').value = 6; $('#height').value = 8;
      $('#rails').value = '3'; $('#picketGap').value = 0; autoCalc();
      break;
    case 'chain':
      $('#length').value = 200; $('#spacing').value = 10; $('#height').value = 4;
      $('#rails').value = '1'; $('#picketGap').value = 2; autoCalc();
      break;
  }
}

// Labels
$('#sec-dim').textContent = t('dimensions');
$('#sec-price').textContent = t('prices');
$('#totalLabel').textContent = t('totalCost');
$('#presets').innerHTML = `
  <button class="gz-fn-preset" onclick="applyPreset('4')">🪴 ${t('preset4')}</button>
  <button class="gz-fn-preset" onclick="applyPreset('6')">🏡 ${t('preset6')}</button>
  <button class="gz-fn-preset" onclick="applyPreset('8')">🔒 ${t('preset8')}</button>
  <button class="gz-fn-preset" onclick="applyPreset('chain')">⛓️ ${t('presetChain')}</button>`;

// Hidden unit state
const unitHolder = document.createElement('input');
unitHolder.type = 'hidden';
unitHolder.id = 'unit';
unitHolder.value = 'ft';
document.querySelector('.gz-tool-area').insertBefore(unitHolder, $('#presets'));

buildForm();

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="autoCalc()">${t('calculate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="buildForm();autoCalc()">${t('clear')}</button>`;

autoCalc();

GZ.renderToolPage({

    {icon:'🎨', href:'/calc/paint-calculator.html', name:'Paint'},
    {icon:'🟫', href:'/calc/tile-calculator.html', name:'Tile'},
    {icon:'📐', href:'/calc/square-footage.html', name:'Square Footage'},
  ]
});
</script>
