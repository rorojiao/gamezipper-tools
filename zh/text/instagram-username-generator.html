<script>

    step4: "点击任一用户名即可复制，然后在 Instagram 上验证",
  }
});

const { $, copyText, t } = GZ;
let currentStyle = "aesthetic";

document.querySelectorAll(".tu-pill").forEach(p => {
  p.addEventListener("click", () => {
    document.querySelectorAll(".tu-pill").forEach(x => x.classList.remove("active"));
    p.classList.add("active");
    currentStyle = p.dataset.style;
  });
});

// Instagram rules: 1-30 chars, [a-z0-9._], no consecutive dots/underscores, no leading/trailing dot
function clean(s){ return (s||"").toLowerCase().replace(/[^a-z0-9._]/g,""); }
function valid(u){
  if (u.length < 1 || u.length > 30) return false;
  if (!/^[a-z0-9._]+$/.test(u)) return false;
  if (u.startsWith(".") || u.endsWith(".")) return false;
  if (u.startsWith("_") || u.endsWith("_")) return false;
  if (u.includes("..") || u.includes("__")) return false;
  return true;
}

const AESTHETIC = ["moon","star","cloud","honey","velvet","lunar","daisy","peach","ivory","pixel","rose","sage","dusk","dawn","wisp","fern","fawn","mauve","ocean","ember"];
const COOL = ["vibes","hustle","grind","mode","sauce","king","queen","boss","mafia","squad","crew","legend","rebel","wild","fury"];
const BUSINESS = ["official","hq","co","studio","pro","works","labs","group","co","agency","house","co","team"];
const TRAVEL = ["wander","globe","roam","voyage","journey","tours","trips","explorer","trails","compass","atlas","horizon","passport","nomad"];
const FITNESS = ["fit","strong","train","lift","run","active","pump","sweat","grind","core","power","athletics","beast","ripped"];
const NUMS = ["","","","","01","02","07","11","21","99","23","365"];

function pick(a){ return a[Math.floor(Math.random()*a.length)]; }
function randInt(n){ return Math.floor(Math.random()*n); }

function buildOne(base, kw, style){
  base = clean(base) || "user";
  kw = clean(kw.split(",")[0]||"");
  const r = Math.random();
  let u = "";
  if (style === "cool"){
    if (r < 0.33) u = base + pick(COOL);
    else if (r < 0.66) u = pick(COOL) + base;
    else u = base + "_" + pick(COOL);
  } else if (style === "business"){
    const w = kw || pick(BUSINESS);
    if (r < 0.5) u = base + "." + w;
    else if (r < 0.8) u = base + "_" + w;
    else u = base + w;
  } else if (style === "travel"){
    const w = kw || pick(TRAVEL);
    if (r < 0.4) u = base + "_" + w;
    else if (r < 0.7) u = w + "_" + base;
    else u = base + "." + w;
  } else if (style === "fitness"){
    const w = kw || pick(FITNESS);
    if (r < 0.4) u = base + "_" + w;
    else if (r < 0.7) u = base + w;
    else u = w + base;
  } else { // aesthetic
    const w = kw || pick(AESTHETIC);
    if (r < 0.3) u = base + "." + w;
    else if (r < 0.6) u = w + "." + base;
    else if (r < 0.85) u = base + "_" + w;
    else u = base + w;
  }
  // Optionally add small number
  if (Math.random() < 0.18 && u.length < 26) u = u + pick(NUMS).replace(/^$/, "");
  u = clean(u);
  if (u.length < 3) u = (u + pick(AESTHETIC)).substring(0,30);
  if (u.startsWith(".") || u.startsWith("_")) u = u.substring(1);
  if (u.endsWith(".") || u.endsWith("_")) u = u.slice(0,-1);
  if (u.length > 30) u = u.substring(0,30);
  if (u.length > 0 && (u.endsWith(".") || u.endsWith("_"))) u = u.slice(0,-1);
  return u;
}

function generate(){
  const base = $("#base").value.trim();
  const kw = $("#kw").value.trim();
  const count = parseInt($("#count").value);
  const results = $("#results");
  results.innerHTML = "";
  const used = new Set();
  let attempts = 0;
  while (results.children.length < count && attempts < count*10){
    attempts++;
    const u = buildOne(base, kw, currentStyle);
    if (!valid(u) || used.has(u)) continue;
    used.add(u);
    const card = document.createElement("div");
    card.className = "tu-card";
    card.innerHTML = `<span class="tu-name">@${u}</span><div style="display:flex;align-items:center;gap:8px"><span class="tu-meta">${u.length} chars</span><button class="gz-btn gz-btn-secondary">📋</button></div>`;
    card.querySelector("button").onclick = (e)=>{e.stopPropagation();copyText(u);};
    card.addEventListener("click", ()=>copyText(u));
    results.appendChild(card);
  }
  if (results.children.length === 0){
    results.innerHTML = `<div style="opacity:.6;padding:20px;text-align:center">${base? "Try a different base word":"Enter a name to start"}</div>`;
  }
}

$("#toolbar").innerHTML = `
  <button class="gz-btn" onclick="generate()">✨ Generate</button>
  <button class="gz-btn gz-btn-secondary" onclick="generate()">🔄 Regenerate</button>
  <button class="gz-btn gz-btn-secondary" onclick="document.getElementById('results').innerHTML=''">🗑️ Clear</button>`;

});
generate();
</script>
