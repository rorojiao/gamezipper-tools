<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"What does unshorten mean?","acceptedAnswer":{"@type":"Answer","text":"Unshortening (or expanding) a URL means following all HTTP redirects from a short link like bit.ly/abc to its final destination URL. This reveals where the link actually goes before you click it."}},{"@type":"Question","name":"Which shorteners are supported?","acceptedAnswer":{"@type":"Answer","text":"All of them — bit.ly, tinyurl.com, t.co (Twitter), goo.gl, ow.ly, is.gd, buff.ly, rebrand.ly, cutt.ly and hundreds of others. The tool follows redirects on any URL, not just known shorteners."}},{"@type":"Question","name":"Is it safe to check suspicious links here?","acceptedAnswer":{"@type":"Answer","text":"Yes. The tool uses public CORS proxies to fetch only HTTP headers (not page content), so your browser never directly visits the destination. This is safer than clicking the link yourself, though you should still scan the final URL for phishing indicators."}},{"@type":"Question","name":"Why do some URLs fail to expand?","acceptedAnswer":{"@type":"Answer","text":"Some shorteners or destinations block cross-origin requests (CORS), require JavaScript redirects, or are behind login walls. In those cases the tool shows the last reachable hop. Try a different URL or check manually."}}]}</script>

<script>

  },
  zh: {

    toolDesc: '查看短链接到底指向哪里。粘贴 bit.ly、tinyurl、t.co 或任何短链接，跟随完整的重定向链到达最终目标 — 比盲目点击更安全。',
    placeholder: '粘贴短链接，例如 https://bit.ly/3xyz…',
    unshorten: '展开链接',
    clear: '清空',
    loading: '正在跟随重定向…',
    finalDest: '最终目标',
    redirectChain: '重定向链',
    corsWarn: '⚠ 部分重定向因浏览器 CORS 限制无法跟随。链中显示的是最后可达的 URL。完整链路可能需要服务端支持。',
    noRedirects: '该 URL 不会重定向 — 它已经是最终目标。',
    invalidUrl: '请输入以 http:// 或 https:// 开头的有效 URL',
    error: '无法展开此 URL。短链服务可能已下线或阻止了跨域请求。',
    step: '跳转',
    step1: '在输入框中粘贴短链接（bit.ly、tinyurl、t.co 等）',
    step2: '点击「展开链接」开始跟随重定向',
    step3: '逐跳查看完整的重定向链',
    step4: '查看最终目标 URL 并在访问前核实',
  }
});

const { $, copyText, t } = GZ;

$('#url-input').placeholder = t('placeholder');
$('#btn-unshorten').textContent = t('unshorten');
$('#btn-clear').textContent = t('clear');

function statusClass(code){
  if(code >= 200 && code < 300) return 'gz-good';
  if(code >= 300 && code < 400) return 'gz-warn';
  return 'gz-bad';
}
function statusBg(code){
  if(code >= 200 && code < 300) return 'background:#4caf50;color:#fff';
  if(code >= 300 && code < 400) return 'background:#f5a623;color:#000';
  return 'background:#e94560;color:#fff';
}

async function unshorten(){
  const url = $('#url-input').value.trim();
  $('#result').innerHTML = '';
  $('#cors-warn').style.display = 'none';
  if(!url || !/^https?:\/\//i.test(url)){
    $('#result').innerHTML = `<div class="gz-warn">${t('invalidUrl')}</div>`;
    return;
  }
  $('#loader').classList.add('show');
  $('#loader-text').textContent = t('loading');

  const chain = [{ url, status: null, note: 'START' }];
  let current = url;
  let corsBlocked = false;
  const MAX_HOPS = 12;

  try {
    for(let i = 0; i < MAX_HOPS; i++){
      // Use a CORS proxy to fetch headers only
      const proxyUrl = 'https://corsproxy.io/?url=' + encodeURIComponent(current);
      let resp;
      try {
        resp = await fetch(proxyUrl, { method: 'GET', redirect: 'manual' });
      } catch(e){
        // fallback: allorigins
        try {
          resp = await fetch('https://api.allorigins.win/get?url=' + encodeURIComponent(current));
        } catch(e2){
          corsBlocked = true;
          break;
        }
      }
      // corsproxy with redirect:manual returns an opaque response on cross-origin redirect,
      // so we fall back to following normally and inspecting response.url
      if(!resp || resp.type === 'opaque'){
        // try normal fetch via proxy
        try {
          const r2 = await fetch('https://corsproxy.io/?url=' + encodeURIComponent(current));
          if(r2.ok || r2.redirected){
            const finalUrl = r2.url ? r2.url.replace('https://corsproxy.io/?url=', '') : current;
            if(finalUrl && finalUrl !== current){
              chain.push({ url: finalUrl, status: r2.status, note: '→' });
              current = finalUrl;
              continue;
            }
          }
        } catch(e3){}
        corsBlocked = true;
        break;
      }
      const status = resp.status;
      const loc = resp.headers.get('location');
      chain[chain.length - 1].status = status;
      if(status >= 300 && status < 400 && loc){
        const next = new URL(loc, current).href;
        chain.push({ url: next, status: null, note: status + ' →' });
        current = next;
      } else {
        break; // final destination reached
      }
    }
  } catch(err){
    corsBlocked = true;
  }

  $('#loader').classList.remove('show');

  if(corsBlocked && chain.length === 1){
    // Try simpler approach: just resolve via allorigins raw
    try {
      const r = await fetch('https://api.allorigins.win/raw?url=' + encodeURIComponent(url));
      if(r.redirected || r.ok){
        const fu = r.url && r.url !== url ? r.url : url;
        chain.push({ url: fu, status: r.status, note: 'FINAL' });
      }
    } catch(e){
      $('#result').innerHTML = `<div class="gz-warn">${t('error')}</div>`;
      return;
    }
  }

  if(corsBlocked){
    $('#cors-warn').style.display = '';
    $('#cors-warn').textContent = t('corsWarn');
  }

  renderResult(chain);
}

function renderResult(chain){
  if(chain.length <= 1){
    $('#result').innerHTML = `<div class="gz-warn">${t('noRedirects')}</div>`;
    return;
  }
  const final = chain[chain.length - 1];
  const stepsHtml = chain.map((s, i) => {
    const st = s.status ? `<span class="status" style="${statusBg(s.status)}">${s.status}</span>` : `<span style="opacity:.5;font-size:.8em">${s.note||''}</span>`;
    return `<div class="gz-chain-step"><span class="arrow">${i===0?'🔗':'↳'}</span><span class="url">${escapeHtml(s.url)}</span>${st}</div>`;
  }).join('');

  $('#result').innerHTML = `
    <div class="gz-final">
      <div class="gz-final-label">${t('finalDest')}</div>
      <div class="gz-final-url"><a href="${escapeHtml(final.url)}" target="_blank" rel="noopener nofollow" style="color:var(--gz-accent)">${escapeHtml(final.url)}</a></div>
      <div style="margin-top:8px"><button class="gz-btn gz-btn-secondary" onclick="copyText('${final.url.replace(/'/g,"\\'")}')">${t('clear').length? '📋 Copy':''}</button></div>
    </div>
    <h3 style="margin:18px 0 8px;font-size:1em">${t('redirectChain')} (${chain.length} ${t('step')})</h3>
    <div class="gz-chain">${stepsHtml}</div>`;
}

function escapeHtml(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

$('#btn-unshorten').addEventListener('click', unshorten);
$('#btn-clear').addEventListener('click', () => { $('#url-input').value=''; $('#result').innerHTML=''; $('#cors-warn').style.display='none'; });
$('#url-input').addEventListener('keydown', e => { if(e.key === 'Enter') unshorten(); });

    {icon:'✅', href:'/dev/http-status-codes.html', name:'HTTP Status'},
  ]
});
</script>
