<script>
GZI18n.register({
  en: {
    toolTitle: 'Vignette Image',
    toolDesc: 'Add a vignette effect to any photo online. Dark or light, adjustable size, feather and intensity. Great for portraits and moody photos. Free and browser-based.',
    selectBtn: 'Select Image',

  zh: {
    toolTitle: '图片暗角工具',
    toolDesc: '在线为照片添加暗角（晕影）效果。支持暗角或亮角，可调整大小、羽化和强度。适合人像和氛围照片。免费，浏览器本地处理。',
    selectBtn: '选择图片',
    dropzone: '拖拽图片到此处或点击上传',
    amount: '强度',
    size: '大小',
    feather: '羽化',
    color: '暗角颜色',
    shape: '形状',
    ellipse: '椭圆',
    circle: '圆形',
    downloadPng: '下载 PNG',
    downloadJpg: '下载 JPG',
    newImage: '换张图片',
    step1: '上传或拖拽图片到页面',
    step2: '拖动「强度」设置暗角强弱',
    step3: '调整大小和羽化，选择暗色或亮色',
    step4: '下载添加暗角后的图片为 PNG 或 JPG',
  }
});

const { $, t } = GZ;
let origImg = null;
let dims = { w: 0, h: 0 };
const canvas = $('#canvas');
const ctx = canvas.getContext('2d');

function loadImage(file){
  const r=new FileReader();
  r.onload=e=>{origImg=new Image();origImg.onload=()=>{
    const maxSide=1600;let s=1;
    if(Math.max(origImg.width,origImg.height)>maxSide)s=maxSide/Math.max(origImg.width,origImg.height);
    dims.w=Math.round(origImg.width*s);dims.h=Math.round(origImg.height*s);
    $('#controls').style.display='block';$('#dropzone').style.display='none';render();
  };origImg.src=e.target.result;};
  r.readAsDataURL(file);
}

function hexToRgb(hex){const n=parseInt(hex.slice(1),16);return {r:(n>>16)&255,g:(n>>8)&255,b:n&255};}

function render(){
  if(!origImg)return;
  const w=dims.w,h=dims.h;
  canvas.width=w;canvas.height=h;
  ctx.drawImage(origImg,0,0,w,h);

  const amount=+$('#amount').value/100;
  if(amount<=0)return;
  const sizePct=+$('#size').value/100;       // 0 = tiny bright center, 1 = reaches corner
  const featherPct=+$('#feather').value/100;  // 0 = hard, 1 = very soft
  const rgb=hexToRgb($('#color').value);
  const shape=$('#shape').value;

  const cx=w/2,cy=h/2;
  // inner radius (fully transparent) and outer radius (full vignette color)
  const corner=Math.sqrt(cx*cx+cy*cy);
  const inner=corner*(0.15+sizePct*0.7);
  const outer=Math.max(inner+1, corner*(0.9+featherPct*0.25));

  let grad;
  if(shape==='circle'){grad=ctx.createRadialGradient(cx,cy,inner,cx,cy,outer);}
  else{
    // ellipse: scale x by aspect using a radial then we approximate with elliptical via scaling transform
    grad=ctx.createRadialGradient(cx,cy,inner,cx,cy,outer);
  }
  grad.addColorStop(0,`rgba(${rgb.r},${rgb.g},${rgb.b},0)`);
  grad.addColorStop(1,`rgba(${rgb.r},${rgb.g},${rgb.b},${amount})`);
  ctx.fillStyle=grad;
  if(shape==='ellipse'){
    // ellipse vignette: draw radial then it's circular; to make elliptical matching frame, scale
    ctx.save();
    ctx.translate(cx,cy);
    ctx.scale(w/Math.max(w,h), h/Math.max(w,h));
    ctx.translate(-cx,-cy);
    ctx.fillRect(-w,-h,w*3,h*3);
    ctx.restore();
  } else {
    ctx.fillRect(0,0,w,h);
  }
}

function download(type){
  if(!origImg)return;
  const a=document.createElement('a');
  a.href=canvas.toDataURL(type==='jpg'?'image/jpeg':'image/png',0.92);
  a.download='vignette.'+(type==='jpg'?'jpg':'png');a.click();
}

function upd(){['amount','size','feather'].forEach(id=>{$('#'+id+'-val').textContent=$('#'+id).value+'%';});render();}
['amount','size','feather'].forEach(id=>$('#'+id).addEventListener('input',upd));
$('#color').addEventListener('input',render);
$('#shape').addEventListener('change',render);

$('#select-btn').textContent=t('selectBtn');$('#dropzone-text').textContent=t('dropzone');
$('#lbl-amount').textContent=t('amount');$('#lbl-size').textContent=t('size');$('#lbl-feather').textContent=t('feather');
$('#lbl-color').textContent=t('color');$('#lbl-shape').textContent=t('shape');
$('#opt-ellipse').textContent=t('ellipse');$('#opt-circle').textContent=t('circle');

$('#dropzone').onclick=()=>$('#file-input').click();
$('#file-input').onchange=e=>{if(e.target.files[0])loadImage(e.target.files[0]);};
['dragover'].forEach(ev=>$('#dropzone').addEventListener(ev,e=>{e.preventDefault();$('#dropzone').classList.add('dragover');}));
['dragleave','drop'].forEach(ev=>$('#dropzone').addEventListener(ev,e=>{e.preventDefault();$('#dropzone').classList.remove('dragover');}));
$('#dropzone').addEventListener('drop',e=>{if(e.dataTransfer.files[0])loadImage(e.dataTransfer.files[0]);});

$('#toolbar').innerHTML=`
  <button class="gz-btn" onclick="download('png')">${t('downloadPng')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="download('jpg')">${t('downloadJpg')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="document.getElementById('dropzone').style.display='block';document.getElementById('controls').style.display='none';">${t('newImage')}</button>`;

  category: 'image',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',

    {icon:'🌑', href:'/image/drop-shadow.html', name:'Drop Shadow'},
    {icon:'🖼️', href:'/image/add-border.html', name:'Add Border'},

    {icon:'🖤', href:'/image/grayscale.html', name:'Grayscale'},

});
