const { $, copyText, t } = GZ;

// Simple LCS-based diff algorithm
function diff(oldLines, newLines) {
  const m = oldLines.length, n = newLines.length;
  // Build LCS table
  const dp = [];
  for (let i = 0; i <= m; i++) {
    dp[i] = [];
    for (let j = 0; j <= n; j++) {
      if (i === 0 || j === 0) dp[i][j] = 0;
      else if (oldLines[i-1] === newLines[j-1]) dp[i][j] = dp[i-1][j-1] + 1;
      else dp[i][j] = Math.max(dp[i-1][j], dp[i][j-1]);
    }
  }
  
  // Backtrack to find diff
  const result = [];
  let i = m, j = n;
  while (i > 0 || j > 0) {
    if (i > 0 && j > 0 && oldLines[i-1] === newLines[j-1]) {
      result.unshift({ type: 'same', oldIdx: i, newIdx: j, text: oldLines[i-1] });
      i--; j--;
    } else if (j > 0 && (i === 0 || dp[i][j-1] >= dp[i-1][j])) {
      result.unshift({ type: 'add', newIdx: j, text: newLines[j-1] });
      j--;
    } else {
      result.unshift({ type: 'remove', oldIdx: i, text: oldLines[i-1] });
      i--;
    }
  }
  return result;
}

function doCompare() {
  const oldText = $('#inputLeft').value;
  const newText = $('#inputRight').value;
  
  if (!oldText && !newText) return;
  
  const oldLines = oldText.split('\n');
  const newLines = newText.split('\n');
  const result = diff(oldLines, newLines);
  
  // Stats
  let addCount = 0, rmCount = 0, sameCount = 0;
  result.forEach(r => {
    if (r.type === 'add') addCount++;
    else if (r.type === 'remove') rmCount++;
    else sameCount++;
  });
  
  $('#diffStats').innerHTML = `
    <div class="diff-stat"><div class="dot dot-add"></div> ${t('added')}: <strong>${addCount}</strong></div>
    <div class="diff-stat"><div class="dot dot-rm"></div> ${t('removed')}: <strong>${rmCount}</strong></div>
    <div class="diff-stat"><div class="dot dot-ch"></div> ${t('unchanged')}: <strong>${sameCount}</strong></div>
    <div class="diff-stat">Total: <strong>${result.length}</strong> lines</div>
  `;
  
  // Render diff
  const container = $('#diffContainer');
  let leftHtml = '', rightHtml = '';
  let leftLn = 0, rightLn = 0;
  
  result.forEach(r => {
    const esc = r.text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    if (r.type === 'same') {
      leftLn++; rightLn++;
      leftHtml += `<div class="diff-line same"><span class="ln">${leftLn}</span><span class="content">${esc}</span></div>`;
      rightHtml += `<div class="diff-line same"><span class="ln">${rightLn}</span><span class="content">${esc}</span></div>`;
    } else if (r.type === 'remove') {
      leftLn++;
      leftHtml += `<div class="diff-line removed"><span class="ln">${leftLn}</span><span class="content">- ${esc}</span></div>`;
      rightHtml += `<div class="diff-line" style="background:rgba(255,107,107,.08)"><span class="ln"></span><span class="content"></span></div>`;
    } else {
      rightLn++;
      leftHtml += `<div class="diff-line" style="background:rgba(0,214,114,.08)"><span class="ln"></span><span class="content"></span></div>`;
      rightHtml += `<div class="diff-line added"><span class="ln">${rightLn}</span><span class="content">+ ${esc}</span></div>`;
    }
  });
  
  container.innerHTML = `
    <div class="diff-pane">
      <div class="diff-header"><span>${t('lblLeft')}</span><span>${oldLines.length} lines</span></div>
      <div class="diff-body">${leftHtml}</div>
    </div>
    <div class="diff-pane">
      <div class="diff-header"><span>${t('lblRight')}</span><span>${newLines.length} lines</span></div>
      <div class="diff-body">${rightHtml}</div>
    </div>
  `;
}

function loadExample() {
  $('#inputLeft').value = `function greet(name) {
  console.log("Hello, " + name);
  return true;
}

const users = ["Alice", "Bob", "Charlie"];
users.forEach(greet);`;

  $('#inputRight').value = `function greet(name, greeting = "Hello") {
  console.log(greeting + ", " + name + "!");
  return true;
}

const users = ["Alice", "Bob", "Charlie", "Diana"];
users.forEach(user => greet(user));

// Added logging
console.log("Done!");`;

  doCompare();
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="doCompare()">${t('compare')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')||'Example'}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#inputLeft').value='';$('#inputRight').value='';$('#diffContainer').innerHTML='';$('#diffStats').innerHTML=''">${t('clear')}</button>`;

// Auto-compare on input (debounced)
let timer;
function debounceCompare() {
  clearTimeout(timer);
  timer = setTimeout(doCompare, 500);
}
$('#inputLeft').addEventListener('input', debounceCompare);
$('#inputRight').addEventListener('input', debounceCompare);
