<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is screen resolution?", "acceptedAnswer": {"@type": "Answer", "text": "Screen resolution refers to the number of pixels displayed on your screen, expressed as width × height (e.g., 1920×1080). It determines the sharpness and detail of images and text on your display."}}, {"@type": "Question", "name": "What is the difference between screen resolution and viewport size?", "acceptedAnswer": {"@type": "Answer", "text": "Screen resolution is the total pixel count of your physical display. Viewport size is the area of the browser window available for content, which is smaller than the screen resolution due to browser chrome, toolbars, and scrollbars."}}, {"@type": "Question", "name": "What is device pixel ratio (DPR)?", "acceptedAnswer": {"@type": "Answer", "text": "DPR is the ratio of physical pixels to CSS pixels on your device. A DPR of 2 means each CSS pixel uses 2×2 physical pixels, making content appear sharper on high-DPI (Retina) displays."}}, {"@type": "Question", "name": "Why do I need to test screen resolution?", "acceptedAnswer": {"@type": "Answer", "text": "Knowing your screen resolution and viewport helps with responsive web design, debugging CSS layouts, and ensuring your website looks good on all devices. This tool shows all relevant display metrics instantly."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="info-grid" id="infoGrid"></div>
    <div class="breakpoint-list" id="breakpoints"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Screen Resolution Tester',
    toolDesc: 'Check your screen resolution, viewport size, device pixel ratio, and CSS breakpoints instantly.',
    screenRes: 'Screen Resolution',
    viewport: 'Viewport Size',
    pixelRatio: 'Device Pixel Ratio',
    colorDepth: 'Color Depth',
    orientation: 'Orientation',
    touchSupport: 'Touch Support',
    cookies: 'Cookies Enabled',
    breakpoint: 'Active Breakpoint',
    breakpointList: 'CSS Breakpoints',
    step1: 'Open this page on the device you want to test',
    step2: 'View your screen resolution and viewport size',
    step3: 'Check which CSS breakpoint is currently active',
    step4: 'Resize the browser window to see how breakpoints change',
  },
  zh: {
    toolTitle: '屏幕分辨率测试工具',
    toolDesc: '即时查看屏幕分辨率、视口大小、设备像素比和 CSS 断点信息。',
    screenRes: '屏幕分辨率',
    viewport: '视口大小',
    pixelRatio: '设备像素比',
    colorDepth: '色彩深度',
    orientation: '屏幕方向',
    touchSupport: '触屏支持',
    cookies: 'Cookie 已启用',
    breakpoint: '当前断点',
    breakpointList: 'CSS 断点列表',
    step1: '在要测试的设备上打开此页面',
    step2: '查看屏幕分辨率和视口大小',
    step3: '检查当前激活的 CSS 断点',
    step4: '调整浏览器窗口大小，观察断点变化',
  }
});

const { $, t } = GZ;

const breakpoints = [
  { name: 'xs', min: 0, max: 575, color: '#e74c3c', label: 'Extra Small' },
  { name: 'sm', min: 576, max: 767, color: '#e67e22', label: 'Small' },
  { name: 'md', min: 768, max: 991, color: '#f1c40f', label: 'Medium' },
  { name: 'lg', min: 992, max: 1199, color: '#2ecc71', label: 'Large' },
  { name: 'xl', min: 1200, max: 1399, color: '#3498db', label: 'Extra Large' },
  { name: 'xxl', min: 1400, max: Infinity, color: '#9b59b6', label: '2X Large' },
];

function getActiveBreakpoint() {
  const w = window.innerWidth;
  return breakpoints.find(bp => w >= bp.min && w <= bp.max) || breakpoints[breakpoints.length - 1];
}

function getOrientation() {
  if (screen.orientation) return screen.orientation.type.includes('portrait') ? 'Portrait' : 'Landscape';
  return window.innerHeight > window.innerWidth ? 'Portrait' : 'Landscape';
}

function render() {
  const vw = window.innerWidth;
  const vh = window.innerHeight;
  const sw = screen.width;
  const sh = screen.height;
  const dpr = window.devicePixelRatio || 1;
  const realW = Math.round(sw * dpr);
  const realH = Math.round(sh * dpr);
  const active = getActiveBreakpoint();

  const cards = [
    { label: t('screenRes'), value: `${realW} × ${realH}`, detail: `CSS: ${sw} × ${sh} @ ${dpr}x DPR` },
    { label: t('viewport'), value: `${vw} × ${vh}`, detail: `Document: ${document.documentElement.clientWidth} × ${document.documentElement.clientHeight}` },
    { label: t('pixelRatio'), value: `${dpr}x`, detail: `${realW * realH} total pixels` },
    { label: t('colorDepth'), value: `${screen.colorDepth}-bit`, detail: `${Math.pow(2, screen.colorDepth).toLocaleString()} colors` },
    { label: t('orientation'), value: getOrientation(), detail: `Angle: ${screen.orientation?.angle ?? 'N/A'}°` },
    { label: t('touchSupport'), value: ('ontouchstart' in window) ? 'Yes' : 'No', detail: `Points: ${navigator.maxTouchPoints || 0}` },
    { label: t('breakpoint'), value: active.name.toUpperCase(), detail: active.label },
    { label: t('cookies'), value: navigator.cookieEnabled ? 'Yes' : 'No', detail: `UA: ${navigator.userAgent.substring(0, 40)}...` },
  ];

  $('#infoGrid').innerHTML = cards.map(c => `
    <div class="info-card">
      <div class="label">${c.label}</div>
      <div class="value">${c.value}</div>
      <div class="detail">${c.detail}</div>
    </div>`).join('');

  // Breakpoint list
  let bpHtml = `<h3 style="margin:0 0 12px;font-size:1em">${t('breakpointList')}</h3>`;
  for (const bp of breakpoints) {
    const isActive = bp.name === active.name;
    bpHtml += `<div class="bp-row${isActive ? ' active-bp' : ''}">
      <span class="bp-name" style="color:${bp.color}">● ${bp.name.toUpperCase()}</span>
      <span class="bp-range">${bp.max === Infinity ? `${bp.min}px+` : `${bp.min}px – ${bp.max}px`}</span>
      <span>${bp.label}</span>
      ${isActive ? '<span style="font-weight:700">◀ ACTIVE</span>' : ''}
    </div>`;
  }
  $('#breakpoints').innerHTML = bpHtml;
}

$('#toolbar').innerHTML = `<button class="gz-btn" onclick="render()">${t('format') || 'Refresh'}</button>`;

render();
window.addEventListener('resize', render);

GZ.renderToolPage({
  category: 'dev',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🖥️', href:'/dev/browser-info-tool.html', name:'Browser Info'},
    {icon:'📐', href:'/css-tools/responsive-tester.html', name:'Responsive Tester'},
    {icon:'🔍', href:'/dev/http-headers-checker.html', name:'HTTP Headers'},
    {icon:'📊', href:'/dev/json.html', name:'JSON Formatter'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
