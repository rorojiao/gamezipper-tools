<script>
GZI18n.register({
  en: {
    toolTitle: 'Bcrypt Password Verifier',
    toolDesc: 'Check if a plaintext password matches a bcrypt hash. Free, secure, 100% browser-based — no data uploaded.',
    hashLabel: 'Bcrypt Hash',
    passLabel: 'Password to Check',
    verify: 'Verify',
    clear: 'Clear',
    copy: 'Copy Hash',
    match: '✓ MATCH — password is correct',
    nomatch: '✗ NO MATCH — password does not match',
    error: '⚠ Invalid hash format',
    enterBoth: 'Enter a hash and password to verify',
    computing: 'Computing…',
    infoAlgorithm: 'Algorithm',
    infoVersion: 'Version',
    infoCost: 'Cost Factor',
    infoSalt: 'Salt (22 chars)',
    infoHash: 'Hash (31 chars)',
    step1: 'Paste your bcrypt hash (starts with $2a$, $2b$ or $2y$)',
    step2: 'Enter the plaintext password you want to verify',
    step3: 'Click Verify — the tool checks locally with bcrypt.compareSync',
    step4: 'A green MATCH or red NO MATCH result appears instantly',
  },
  zh: {
    toolTitle: 'Bcrypt 密码验证器',
    toolDesc: '检查明文密码是否匹配 bcrypt 哈希值。免费、安全、100% 浏览器本地运行 — 不上传任何数据。',
    hashLabel: 'Bcrypt 哈希',
    passLabel: '待验证密码',
    verify: '验证',
    clear: '清空',
    copy: '复制哈希',
    match: '✓ 匹配 — 密码正确',
    nomatch: '✗ 不匹配 — 密码错误',
    error: '⚠ 无效的哈希格式',
    enterBoth: '请输入哈希和密码以验证',
    computing: '计算中…',
    infoAlgorithm: '算法',
    infoVersion: '版本',
    infoCost: '成本因子',
    infoSalt: '盐值（22字符）',
    infoHash: '哈希（31字符）',
    step1: '粘贴 bcrypt 哈希（以 $2a$、$2b$ 或 $2y$ 开头）',
    step2: '输入要验证的明文密码',
    step3: '点击「验证」— 工具使用 bcrypt.compareSync 本地检查',
    step4: '即时显示绿色「匹配」或红色「不匹配」结果',
  }
});

const { $, copyText, t } = GZ;
const result = $('#result');
const hashInfo = $('#hash-info');

function parseHash(hash) {
  // $2a$10$22charsalt31charhash
  const m = hash.match(/^\$(2a|2b|2y)\$(\d{2})\$(.{22})(.{31})$/);
  if (!m) return null;
  return { version: m[1], cost: m[2], salt: m[3], hashPart: m[4] };
}

function doVerify() {
  const hash = $('#hash-input').value.trim();
  const pass = $('#pass-input').value;
  if (!hash || !pass) {
    result.className = 'gz-result idle';
    result.textContent = t('enterBoth');
    hashInfo.style.display = 'none';
    return;
  }
  const parsed = parseHash(hash);
  if (!parsed) {
    result.className = 'gz-result error';
    result.textContent = t('error');
    hashInfo.style.display = 'none';
    return;
  }
  result.className = 'gz-result idle';
  result.textContent = t('computing');
  // show parsed info
  hashInfo.style.display = 'grid';
  hashInfo.innerHTML = `
    <div class="cell"><div class="lbl">${t('infoAlgorithm')}</div><div class="val">bcrypt</div></div>
    <div class="cell"><div class="lbl">${t('infoVersion')}</div><div class="val">$${parsed.version}</div></div>
    <div class="cell"><div class="lbl">${t('infoCost')}</div><div class="val">${parsed.cost}</div></div>
    <div class="cell"><div class="lbl">${t('infoSalt')}</div><div class="val" style="font-size:.8em">${parsed.salt}</div></div>`;
  // defer so UI updates
  setTimeout(() => {
    try {
      const match = bcryptjs.compareSync(pass, hash);
      result.className = 'gz-result ' + (match ? 'match' : 'nomatch');
      result.textContent = match ? t('match') : t('nomatch');
    } catch(e) {
      result.className = 'gz-result error';
      result.textContent = t('error') + ': ' + e.message;
    }
  }, 50);
}

function doClear() {
  $('#hash-input').value = '';
  $('#pass-input').value = '';
  result.className = 'gz-result idle';
  result.textContent = '';
  hashInfo.style.display = 'none';
}

$('#hash-input').addEventListener('input', () => { result.className='gz-result idle'; result.textContent=''; });
$('#pass-input').addEventListener('input', () => { result.className='gz-result idle'; result.textContent=''; });

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="doVerify()">${t('verify')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="copyText($('#hash-input').value)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

GZ.renderToolPage({
  category: 'dev',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🔒', href:'/dev/bcrypt-generator.html', name:'Bcrypt Generator'},
    {icon:'🛡️', href:'/dev/argon2.html', name:'Argon2'},
    {icon:'#️⃣', href:'/dev/hash-generator.html', name:'Hash Generator'},
    {icon:'🔑', href:'/dev/api-key-generator.html', name:'API Key Gen'},
  ]
});
</script>
