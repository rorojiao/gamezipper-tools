  zh:{

    lblIn:'CSV 输入',
    lblOut:'XML 输出',
    convert:'转换',
    copy:'复制',
    example:'示例',
    clear:'清除',
    rootlbl:'根元素：',
    rowlbl:'记录元素：',
    attr:'值作为属性',
    done:'✓ 转换完成 — {n} 条记录',
    empty:'粘贴 CSV 进行转换',
    invalidName:'元素名必须以字母或下划线开头',
    step1:'在输入框中粘贴 CSV（首行为表头）',
    step2:'设置根元素和记录元素名，可选切换属性模式',
    step3:'点击「转换」生成 XML',
    step4:'复制结果或下载为 .xml 文件',
  }
});
const {$,t,copyText}=GZ;

function parseCSV(text,delim){
  delim=delim||',';
  const rows=[];let row=[];let field='';let inQ=false;
  for(let i=0;i<text.length;i++){
    const c=text[i];
    if(inQ){
      if(c==='"'){
        if(text[i+1]==='"'){field+='"';i++;}
        else inQ=false;
      } else field+=c;
    } else {
      if(c==='"')inQ=true;
      else if(c===delim){row.push(field);field='';}
      else if(c==='\n'){row.push(field);rows.push(row);row=[];field='';}
      else if(c==='\r'){/* skip */}
      else field+=c;
    }
  }
  if(field.length||row.length){row.push(field);rows.push(row);}
  return rows.filter(r=>r.length&&!(r.length===1&&r[0]===''));
}

function safeTag(name){
  let n=String(name||'field').trim().replace(/[^a-zA-Z0-9_\-:.]/g,'_');
  n=n.replace(/^([0-9\-:.])/, '_$1');
  if(!n)n='field';
  return n;
}
function esc(s){
  return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function doConvert(){
  const inp=$('#input').value;
  if(!inp.trim()){$('#output').value='';$('#status').innerHTML=`<span style="color:var(--gz-text-muted)">${t('empty')}</span>`;return;}
  let root=$('#rootName').value.trim()||'records';
  let rec=$('#rowName').value.trim()||'record';
  if(!/^[A-Za-z_]/.test(root)||!/^[A-Za-z_]/.test(rec)){$('#status').innerHTML=`<span style="color:var(--gz-accent)">${t('invalidName')}</span>`;return;}
  root=safeTag(root);rec=safeTag(rec);
  const rows=parseCSV(inp,',');
  if(rows.length<1){$('#status').innerHTML=`<span style="color:var(--gz-text-muted)">${t('empty')}</span>`;return;}
  const headers=rows[0].map((h,i)=>safeTag(h)||('col'+i));
  const asAttr=$('#attrChk').checked;
  let xml=`<?xml version="1.0" encoding="UTF-8"?>\n<${root}>\n`;
  for(let r=1;r<rows.length;r++){
    xml+=`  <${rec}`;
    const cells=rows[r];
    if(asAttr){
      let attrs='',inner='';
      headers.forEach((h,i)=>{const v=cells[i]||'';if(v!=='')attrs+=` ${h}="${esc(v)}"`;});
      xml+=attrs+` />\n`;
    } else {
      xml+=`>\n`;
      headers.forEach((h,i)=>{const v=cells[i]||'';xml+=`    <${h}>${esc(v)}</${h}>\n`;});
      xml+=`  </${rec}>\n`;
    }
  }
  xml+=`</${root}>`;
  $('#output').value=xml;
  $('#status').innerHTML=`<span style="color:var(--gz-success)">${t('done').replace('{n}',rows.length-1)}</span>`;
}

function download(){
  const out=$('#output').value;if(!out)return;
  const blob=new Blob([out],{type:'application/xml'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='converted.xml';a.click();
  URL.revokeObjectURL(url);
}

function loadExample(){
  $('#input').value=`id,name,email,role
1,Alice,alice@example.com,Admin
2,Bob,bob@example.com,Editor
3,Cleo,cleo@example.com,Viewer`;
  doConvert();
}

$('#lbl-in').textContent=t('lblIn');
$('#lbl-out').textContent=t('lblOut');
$('#opt-root').textContent=t('rootlbl');
$('#opt-row').textContent=t('rowlbl');
$('#opt-attr').textContent=t('attr');

$('#toolbar').innerHTML=`
  <button class="gz-btn" onclick="doConvert()">${t('convert')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="copyText($('#output').value)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="download()">📥 XML</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#input').value=\'\';$(\'#output\').value=\'\';$(\'#status\').innerHTML=\'\'">${t('clear')}</button>`;
$('#input').addEventListener('input',doConvert);
$('#rootName').addEventListener('input',doConvert);
$('#rowName').addEventListener('input',doConvert);
$('#attrChk').addEventListener('change',doConvert);

]});
