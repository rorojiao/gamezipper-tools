name: Deploy to GitHub Pages

# ═══════════════════════════════════════════════════════════════════
# PLAN-D: Schedule-only deployment (2026-07-06)
# ═══════════════════════════════════════════════════════════════════
# See gamezipper.com/.github/workflows/pages.yml for full rationale.
#
#   - gamezipper.com:   cron '7 */2 * * *'
#   - gamezipper-tools: cron '37 */2 * * *'  ← this repo (30 min apart)
# ═══════════════════════════════════════════════════════════════════

on:
  schedule:
    - cron: '37 */2 * * *'  # every 2 hours at minute 37
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    continue-on-error: true
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          error_count: 30
          reporting_interval: 5000
          timeout: 600000
      - name: Retry on failure
        if: failure()
        uses: actions/deploy-pages@v4
        with:
          error_count: 30
          reporting_interval: 5000
          timeout: 600000
