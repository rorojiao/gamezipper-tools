<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"What is text-shadow in CSS?","acceptedAnswer":{"@type":"Answer","text":"text-shadow adds shadow effects to text. The syntax is text-shadow: x-offset y-offset blur-radius color. You can stack multiple shadows by separating them with commas — useful for neon, 3D and layered glow effects."}},{"@type":"Question","name":"How do I make a neon glow text effect?","acceptedAnswer":{"@type":"Answer","text":"Stack multiple blurred shadows of the same bright color with increasing blur radius. For example: text-shadow: 0 0 5px #ff00de, 0 0 10px #ff00de, 0 0 20px #ff00de, 0 0 40px #ff00de; — this produces a smooth neon glow."}},{"@type":"Question","name":"Can I add multiple text shadows?","acceptedAnswer":{"@type":"Answer","text":"Yes. Separate each shadow with a comma. The first shadow renders on top. This lets you combine a sharp drop shadow with a soft glow, or build 3D extruded text by stacking offset shadows."}},{"@type":"Question","name":"Does text-shadow work on all browsers?","acceptedAnswer":{"@type":"Answer","text":"Yes — text-shadow is supported by every modern browser including Chrome, Firefox, Safari and Edge. No vendor prefixes are needed."}}]}</script>

<div class="gz-container">

<script>
GZI18n.register({
  en: {
    toolTitle: 'CSS Text Shadow Generator',
    toolDesc: 'Visually design text-shadow effects — neon glow, 3D extrude, retro outline and layered shadows. Stack multiple layers and copy the CSS in one click.',
    addLayer: '+ Add layer', remove: '✕', presetNeon: 'Neon', preset3D: '3D',
    presetRetro: 'Retro', presetGlow: 'Soft glow', presetOutline: 'Outline',
    resetAll: 'Reset', liveText: 'Live text', step1: 'Edit the preview text in the input field.',
    step2: 'Adjust X, Y, blur and color for each shadow layer.',
    step3: 'Add layers or pick a preset (Neon, 3D, Retro, Glow, Outline).',
    step4: 'Click Copy to grab the ready-to-paste CSS text-shadow property.',
  },
  zh: {
    toolTitle: 'CSS 文字阴影生成器',
    toolDesc: '可视化设计 text-shadow 效果 — 霓虹光、3D 凸出、复古描边和多层阴影。叠加多个图层，一键复制 CSS 代码。',
    addLayer: '+ 添加图层', remove: '✕', presetNeon: '霓虹', preset3D: '3D',
    presetRetro: '复古', presetGlow: '柔光', presetOutline: '描边',
    resetAll: '重置', liveText: '实时文字', step1: '在输入框中编辑预览文字。',
    step2: '为每个阴影图层调整 X、Y、模糊和颜色。',
    step3: '添加图层或选择预设（霓虹、3D、复古、柔光、描边）。',
    step4: '点击「复制」即可获取可直接粘贴的 CSS text-shadow 属性。',
  }
});

const { $, copyText, t } = GZ;

let layers = [
  { x: 2, y: 2, blur: 4, color: '#000000' },
  { x: 0, y: 0, blur: 12, color: '#4ecdc4' },
];

const PRESETS = {
  neon: [
    { x: 0, y: 0, blur: 5, color: '#ff00de' },
    { x: 0, y: 0, blur: 10, color: '#ff00de' },
    { x: 0, y: 0, blur: 20, color: '#ff00de' },
    { x: 0, y: 0, blur: 40, color: '#ff00de' },
  ],
  threeD: Array.from({length: 6}, (_, i) => ({ x: i+1, y: i+1, blur: 0, color: i === 5 ? '#888' : '#aaa' })),
  retro: [
    { x: 3, y: 3, blur: 0, color: '#ff6b6b' },
    { x: 6, y: 6, blur: 0, color: '#ffd93d' },
  ],
  glow: [
    { x: 0, y: 0, blur: 8, color: '#4ecdc4' },
    { x: 0, y: 0, blur: 18, color: '#4ecdc4' },
  ],
  outline: [
    { x: -1, y: -1, blur: 0, color: '#000' },
    { x: 1, y: -1, blur: 0, color: '#000' },
    { x: -1, y: 1, blur: 0, color: '#000' },
    { x: 1, y: 1, blur: 0, color: '#000' },
  ],
};

function shadowStr(l) { return `${l.x}px ${l.y}px ${l.blur}px ${l.color}`; }

function buildCSS() {
  if (!layers.length) return 'text-shadow: none;';
  return 'text-shadow: ' + layers.map(shadowStr).join(', ') + ';';
}

function render() {
  $('#preview').style.textShadow = layers.length ? layers.map(shadowStr).join(', ') : 'none';
  $('#preview').textContent = $('#liveText').value || ' ';
  $('#code').textContent = buildCSS();
}

function renderLayers() {
  $('#layers').innerHTML = layers.map((l, i) => `
    <div class="ts-layer">
      <div class="ts-layer-head">
        <span>Layer ${i+1}</span>
        <button onclick="removeLayer(${i})" title="remove">${t('remove')}</button>
      </div>
      <div class="ts-grid">
        <div><label>X (px)</label><input type="number" value="${l.x}" oninput="updateLayer(${i},'x',this.value)"></div>
        <div><label>Y (px)</label><input type="number" value="${l.y}" oninput="updateLayer(${i},'y',this.value)"></div>
        <div><label>Blur (px)</label><input type="number" value="${l.blur}" min="0" oninput="updateLayer(${i},'blur',this.value)"></div>
        <div><label>Color</label><div class="ts-color-row"><input type="color" value="${l.color}" oninput="updateLayer(${i},'color',this.value)"><input type="text" value="${l.color}" oninput="updateLayer(${i},'color',this.value)" style="flex:1"></div></div>
      </div>
    </div>`).join('');
}

function updateLayer(i, key, val) {
  layers[i][key] = key === 'color' ? val : parseFloat(val) || 0;
  render();
}

function addLayer() {
  layers.push({ x: 0, y: 4, blur: 6, color: '#4ecdc4' });
  renderLayers(); render();
}

function removeLayer(i) {
  layers.splice(i, 1);
  renderLayers(); render();
}

function applyPreset(name) {
  layers = JSON.parse(JSON.stringify(PRESETS[name]));
  renderLayers(); render();
}

$('#liveText').addEventListener('input', render);

$('#controls').innerHTML = `
  <button class="gz-btn" onclick="copyText($('#code').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="applyPreset('neon')">${t('presetNeon')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="applyPreset('threeD')">${t('preset3D')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="applyPreset('retro')">${t('presetRetro')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="applyPreset('glow')">${t('presetGlow')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="applyPreset('outline')">${t('presetOutline')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="layers=[];renderLayers();render()">${t('resetAll')}</button>`;

$('#addLayerBtn').textContent = t('addLayer');

renderLayers(); render();

GZ.renderToolPage({
  category: 'dev',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🌫️', href:'/dev/css-filter-generator.html', name:'CSS Filter'},
    {icon:'📐', href:'/dev/css-units.html', name:'CSS Units'},
    {icon:'✨', href:'/dev/css-minifier.html', name:'CSS Minifier'},
    {icon:'🎨', href:'/color/palette.html', name:'Palette'},
  ]
});
</script>
