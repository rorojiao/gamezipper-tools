<script>
GZI18n.register({

  zh: {

    toolDesc: '在线创建精美贺卡 — 生日、圣诞、情人节、感谢等。自定义文字和颜色，下载为 PNG。免费、无需注册。',
    title2: '贺卡标题',
    subtitle: '副标题 / 祝福语',
    bgColor: '背景色',
    textColor: '文字颜色',
    accentColor: '强调色',
    download: '📥 下载 PNG',
    randomize: '🎲 随机风格',
    step1: '选择贺卡模板（生日、圣诞等）',
    step2: '编辑标题和祝福语文字',
    step3: '选择背景色、文字色和强调色',
    step4: '点击下载 PNG 保存贺卡',
    tpl_birthday: '🎂 生日',
    tpl_christmas: '🎄 圣诞',
    tpl_valentine: '💝 情人节',
    tpl_thankyou: '🙏 感谢',
    tpl_congrats: '🎉 恭喜',
    tpl_newyear: '🎆 新年',
    tpl_mothers: '🌸 母亲节',
    tpl_fathers: '👔 父亲节',
    tpl_anniversary: '💍 纪念日',
    tpl_custom: '✨ 自定义',
  }
});
const { $, t, copyText } = GZ;
const TEMPLATES = {
  birthday:   {emoji:'🎂',title:'Happy Birthday!',sub:'Wishing you an amazing year ahead!',bg:'#FFF0F5',text:'#D63384',accent:'#FF69B4'},
  christmas:  {emoji:'🎄',title:'Merry Christmas!',sub:'May your holidays be merry and bright!',bg:'#0B3D2E',text:'#FFFFFF',accent:'#FF4444'},
  valentine:  {emoji:'💝',title:'Be My Valentine',sub:'You make my heart skip a beat!',bg:'#FFE0EC',text:'#C71585',accent:'#FF1493'},
  thankyou:   {emoji:'🙏',title:'Thank You!',sub:'Your kindness means the world to me.',bg:'#F0F8FF',text:'#2F4F4F',accent:'#4682B4'},
  congrats:   {emoji:'🎉',title:'Congratulations!',sub:'You did it! So proud of you!',bg:'#FFFACD',text:'#8B6914',accent:'#FFD700'},
  newyear:    {emoji:'🎆',title:'Happy New Year!',sub:'May all your dreams come true!',bg:'#1A1A2E',text:'#E94560',accent:'#F0E68C'},
  mothers:    {emoji:'🌸',title:'Happy Mother\'s Day',sub:'Thank you for everything, Mom!',bg:'#FFF0F5',text:'#C71585',accent:'#FFB6C1'},
  fathers:    {emoji:'👔',title:'Happy Father\'s Day',sub:'You\'re the best, Dad!',bg:'#F0F8FF',text:'#2F4F4F',accent:'#4682B4'},
  anniversary:{emoji:'💍',title:'Happy Anniversary!',sub:'Here\'s to many more years together!',bg:'#FFF5EE',text:'#8B4513',accent:'#CD853F'},
  custom:     {emoji:'✨',title:'Your Title Here',sub:'Your message goes here...',bg:'#F5F5F5',text:'#333333',accent:'#4a9eff'},
};
let state = { template:'birthday', title:'', sub:'', bg:'#FFF0F5', text:'#D63384', accent:'#FF69B4' };
function loadTemplate(key){
  const tpl = TEMPLATES[key];
  state.template = key;
  state.title = tpl.title;
  state.sub = tpl.sub;
  state.bg = tpl.bg;
  state.text = tpl.text;
  state.accent = tpl.accent;
}
function renderCanvas(){
  const c = $('#gcCanvas');
  const ctx = c.getContext('2d');
  const W = c.width, H = c.height;
  // Background
  ctx.fillStyle = state.bg;
  ctx.fillRect(0,0,W,H);
  // Decorative border
  ctx.strokeStyle = state.accent;
  ctx.lineWidth = 8;
  ctx.strokeRect(20,20,W-40,H-40);
  // Inner border
  ctx.lineWidth = 2;
  ctx.globalAlpha = .5;
  ctx.strokeRect(34,34,W-68,H-68);
  ctx.globalAlpha = 1;
  // Emoji
  const tpl = TEMPLATES[state.template];
  ctx.font = '120px serif';
  ctx.textAlign = 'center';
  ctx.fillStyle = state.accent;
  ctx.fillText(tpl.emoji, W/2, 250);
  // Title
  ctx.fillStyle = state.text;
  ctx.font = 'bold 42px Georgia, serif';
  wrapText(ctx, state.title, W/2, 380, W-100, 52);
  // Subtitle
  ctx.font = '24px Georgia, serif';
  ctx.globalAlpha = .85;
  wrapText(ctx, state.sub, W/2, 520, W-120, 36);
  ctx.globalAlpha = 1;
  // Footer line
  ctx.strokeStyle = state.accent;
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(W/2-60, H-80);
  ctx.lineTo(W/2+60, H-80);
  ctx.stroke();
  // Footer text
  ctx.font = '14px sans-serif';
  ctx.fillStyle = state.text;
  ctx.globalAlpha = .6;
  ctx.fillText('Made with GameZipper Tools', W/2, H-55);
  ctx.globalAlpha = 1;
}
function wrapText(ctx,text,x,y,maxWidth,lineHeight){
  if(!text)return;
  const words = text.split(' ');
  let line = '', lineY = y;
  for(let n=0;n<words.length;n++){
    const testLine = line + words[n] + ' ';
    const metrics = ctx.measureText(testLine);
    if(metrics.width > maxWidth && n>0){
      ctx.fillText(line.trim(), x, lineY);
      line = words[n] + ' ';
      lineY += lineHeight;
    } else {
      line = testLine;
    }
  }
  ctx.fillText(line.trim(), x, lineY);
}
function downloadPNG(){
  const c = $('#gcCanvas');
  const link = document.createElement('a');
  link.download = 'greeting-card-'+state.template+'.png';
  link.href = c.toDataURL('image/png');
  link.click();
  $('#status').innerHTML = '<span style="color:var(--gz-success)">✓ '+t('download').replace('📥 ','')+'</span>';
}
function randomize(){
  const bgs = ['#FFE4E1','#E0F7FA','#F0FFF0','#FFFACD','#E6E6FA','#FFE4B5','#F5DEB3','#F0FFFF','#FFEFD5','#F8F8FF'];
  const accents = ['#FF69B4','#FF6347','#4169E1','#32CD32','#FFD700','#9370DB','#00CED1','#FF8C00','#DC143C','#20B2AA'];
  const texts = ['#333333','#8B0000','#000080','#2F4F4F','#800080','#006400','#4B0082','#8B4513','#191970','#556B2F'];
  state.bg = bgs[Math.floor(Math.random()*bgs.length)];
  state.accent = accents[Math.floor(Math.random()*accents.length)];
  state.text = texts[Math.floor(Math.random()*texts.length)];
  syncControls();
  renderCanvas();
}
function syncControls(){
  $('#ctrl-title').value = state.title;
  $('#ctrl-sub').value = state.sub;
  $('#ctrl-bg').value = state.bg;
  $('#ctrl-text').value = state.text;
  $('#ctrl-accent').value = state.accent;
}
// Build template buttons
let tplHtml = '';
for(const[key,val]of Object.entries(TEMPLATES)){
  tplHtml += `<div class="gc-tpl ${key==='birthday'?'active':''}" data-tpl="${key}" onclick="selectTpl('${key}')">${t('tpl_'+key)}</div>`;
}
$('#templates').innerHTML = tplHtml;
function selectTpl(key){
  document.querySelectorAll('.gc-tpl').forEach(el=>el.classList.toggle('active',el.dataset.tpl===key));
  loadTemplate(key);
  syncControls();
  renderCanvas();
}
$('#controls').innerHTML = `
  <label>${t('title2')}: <input type="text" id="ctrl-title" value="${state.title}" oninput="state.title=this.value;renderCanvas()" style="width:200px"></label>
  <label>${t('subtitle')}: <input type="text" id="ctrl-sub" value="${state.sub}" oninput="state.sub=this.value;renderCanvas()" style="width:200px"></label>
  <label>${t('bgColor')}: <input type="color" id="ctrl-bg" value="${state.bg}" onchange="state.bg=this.value;renderCanvas()"></label>
  <label>${t('textColor')}: <input type="color" id="ctrl-text" value="${state.text}" onchange="state.text=this.value;renderCanvas()"></label>
  <label>${t('accentColor')}: <input type="color" id="ctrl-accent" value="${state.accent}" onchange="state.accent=this.value;renderCanvas()"></label>
  <button class="gz-btn gz-btn-secondary" onclick="randomize()">${t('randomize')}</button>
  <button class="gz-btn" onclick="downloadPNG()">${t('download')}</button>
`;
loadTemplate('birthday');
syncControls();
renderCanvas();
GZ.renderToolPage({
  category: 'image',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [

    {icon:'✍️', href:'/image/signature-generator.html', name:'Signature'},
    {icon:'😂', href:'/image/meme-generator.html', name:'Meme Gen'},
    {icon:'🐦', href:'/image/tweet-to-image.html', name:'Tweet to Img'},
  ]
});
</script>
