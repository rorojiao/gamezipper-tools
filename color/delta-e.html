<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is Delta E (ΔE)?", "acceptedAnswer": {"@type": "Answer", "text": "Delta E (ΔE) is a metric that quantifies the perceptual difference between two colors. A ΔE of 0 means the colors are identical, while higher values indicate a more noticeable difference. It is calculated in the CIELAB color space so the distance matches human vision."}}, {"@type": "Question", "name": "What Delta E value is acceptable?", "acceptedAnswer": {"@type": "Answer", "text": "As a rule of thumb: ΔE ≤ 1.0 is imperceptible to most people, ΔE 1-2 is a very close match, ΔE 2-10 is noticeable at a glance, and ΔE above 10 is a clearly different color. For professional print work a target of ΔE ≤ 2 is common."}}, {"@type": "Question", "name": "What is the difference between CIE76, CIE94 and CIEDE2000?", "acceptedAnswer": {"@type": "Answer", "text": "CIE76 is the simplest Euclidean distance in LAB space. CIE94 adds weighting for lightness, chroma and hue to better match perception. CIEDE2000 is the most accurate modern formula with additional corrections for hue rotation and is the industry standard for color matching."}}]}</script>

// --- Color conversions ---
function hexToRgb(hex){hex=hex.replace('#','');if(hex.length===3)hex=hex.split('').map(c=>c+c).join('');const n=parseInt(hex,16);return{r:(n>>16)&255,g:(n>>8)&255,b:n&255};}
function rgbToHex(r,g,b){return'#'+[r,g,b].map(x=>Math.round(x).toString(16).padStart(2,'0')).join('').toUpperCase();}

function srgbToLinear(c){c/=255;return c<=0.04045?c/12.92:Math.pow((c+0.055)/1.055,2.4);}
function rgbToXyz(r,g,b){
  const R=srgbToLinear(r),G=srgbToLinear(g),B=srgbToLinear(b);
  return{x:(R*0.4124564+G*0.3575761+B*0.1804375)*100,y:(R*0.2126729+G*0.7151522+B*0.0721750)*100,z:(R*0.0193339+G*0.1191920+B*0.9503041)*100};
}
function xyzToLab(x,y,z){
  x/=95.047;y/=100;z/=108.883;
  const f=c=>c>0.008856?Math.cbrt(c):(7.787*c+16/116);
  const fx=f(x),fy=f(y),fz=f(z);
  return{l:116*fy-16,a:500*(fx-fy),b:200*(fy-fz)};
}
function rgbToLab(r,g,b){const{x,y,z}=rgbToXyz(r,g,b);return xyzToLab(x,y,z);}

// --- Delta E formulas ---
function de76(l1,a1,b1,l2,a2,b2){return Math.sqrt((l1-l2)**2+(a1-a2)**2+(b1-b2)**2);}

function de94(l1,a1,b1,l2,a2,b2){
  const dL=l1-l2,C1=Math.sqrt(a1*a1+b1*b1),C2=Math.sqrt(a2*a2+b2*b2),dC=C1-C2;
  const da=a1-a2,db=b1-b2,dH=Math.sqrt(Math.max(0,da*da+db*db-dC*dC));
  const SL=1,SC=1+0.045*C1,SH=1+0.015*C1;
  return Math.sqrt((dL/SL)**2+(dC/SC)**2+(dH/SH)**2);
}

function de2000(l1,a1,b1,l2,a2,b2){
  const rad=Math.PI/180,C1=Math.sqrt(a1*a1+b1*b1),C2=Math.sqrt(a2*a2+b2*b2),Cm=(C1+C2)/2;
  const G=0.5*(1-Math.sqrt(Cm**7/(Cm**7+25**7)));
  const a1p=a1*(1+G),a2p=a2*(1+G);
  const C1p=Math.sqrt(a1p*a1p+b1*b1),C2p=Math.sqrt(a2p*a2p+b2*b2);
  const h1p=Math.atan2(b1,a1p)*180/Math.PI+(a1p===0&&b1===0?360:0);
  const h2p=Math.atan2(b2,a2p)*180/Math.PI+(a2p===0&&b2===0?360:0);
  const dLp=l2-l1,dCp=C2p-C1p;
  let dhp=h2p-h1p;
  if(Math.abs(dhp)<=180){}else if(dhp>180)dhp-=360;else if(dhp<-180)dhp+=360;
  const dHp=2*Math.sqrt(C1p*C2p)*Math.sin(dhp*rad/2);
  const Lm=(l1+l2)/2,Cpm=(C1p+C2p)/2;
  let hpm=(h1p+h2p)/2;
  if(Math.abs(h1p-h2p)>180){if(h1p+h2p<360)hpm+=180;else hpm-=180;}
  const T=1-0.17*Math.cos((hpm-30)*rad)+0.24*Math.cos(2*hpm*rad)+0.32*Math.cos((3*hpm+6)*rad)-0.20*Math.cos((4*hpm-63)*rad);
  const dTheta=30*Math.exp(-Math.pow((hpm-275)/25,2));
  const RC=2*Math.sqrt(Cpm**7/(Cpm**7+25**7));
  const SL=1+0.015*(Lm-50)**2/Math.sqrt(20+(Lm-50)**2);
  const SC=1+0.045*Cpm,SH=1+0.015*Cpm*T;
  const RT=-Math.sin(2*dTheta*rad)*RC;
  const kL=kC=kH=1;
  return Math.sqrt((dLp/(kL*SL))**2+(dCp/(kC*SC))**2+(dHp/(kH*SH))**2+RT*(dCp/(kC*SC))*(dHp/(kH*SH)));
}

function rating(dE){
  if(dE<=1)return isZh?['完全一致','🟢']:['Imperceptible','🟢'];
  if(dE<=2)return isZh?['非常接近','🟢']:['Very close','🟢'];
  if(dE<=5)return isZh?['轻微差异','🟡']:['Slight difference','🟡'];
  if(dE<=10)return isZh?['明显可见','🟠']:['Noticeable','🟠'];
  return isZh?['差异很大','🔴']:['Clearly different','🔴'];
}

function calc(){
  let h1=$('#hex1').value.trim(),h2=$('#hex2').value.trim();
  if(!/^#?[0-9a-f]{3,6}$/i.test(h1)||!/^#?[0-9a-f]{3,6}$/i.test(h2)){return;}
  const r1=hexToRgb(h1),r2=hexToRgb(h2);
  const l1=rgbToLab(r1.r,r1.g,r1.b),l2=rgbToLab(r2.r,r2.g,r2.b);
  $('#sw1').style.background=h1;$('#sw2').style.background=h2;
  $('#cmp1').style.background=h1;$('#cmp2').style.background=h2;
  $('#lab1').textContent=`LAB: ${l1.l.toFixed(1)}, ${l1.a.toFixed(1)}, ${l1.b.toFixed(1)}`;
  $('#lab2').textContent=`LAB: ${l2.l.toFixed(1)}, ${l2.a.toFixed(1)}, ${l2.b.toFixed(1)}`;
  const e76=de76(l1.l,l1.a,l1.b,l2.l,l2.a,l2.b);
  const e94=de94(l1.l,l1.a,l1.b,l2.l,l2.a,l2.b);
  const e2000=de2000(l1.l,l1.a,l1.b,l2.l,l2.a,l2.b);
  $('#dE2000').textContent=e2000.toFixed(2);
  const[v,col]=rating(e2000);
  $('#verdict').innerHTML=`<span style="color:var(--accent)">${col} ${v}</span>`;
  const methods=[['CIE76',e76],['CIE94',e94],['CIEDE2000',e2000]];
  $('#methodRows').innerHTML=methods.map(([m,v])=>{const[rr,cc]=rating(v);return`<tr><td><b>${m}</b></td><td style="font-family:monospace">${v.toFixed(2)}</td><td>${cc} ${rr}</td></tr>`;}).join('');
  $('#note').innerHTML=isZh
    ?`<b>评分参考：</b>ΔE ≤ 1 几乎无法察觉 · 1–2 非常接近 · 2–10 可察觉 · >10 明显不同。<br>本工具使用 sRGB→XYZ (D65)→LAB 转换，所有计算在浏览器本地完成。`
    :`<b>Rating guide:</b> ΔE ≤ 1 imperceptible · 1–2 very close · 2–10 noticeable · >10 clearly different.<br>Conversion path: sRGB → XYZ (D65) → CIELAB. All math runs locally in your browser.`;
}

$('#pick1').oninput=e=>{$('#hex1').value=e.target.value.toUpperCase();calc();};
$('#pick2').oninput=e=>{$('#hex2').value=e.target.value.toUpperCase();calc();};
$('#hex1').oninput=e=>{const v=e.target.value.trim();if(/^#?[0-9a-f]{6}$/i.test(v)){$('#pick1').value=v.startsWith('#')?v:'#'+v;calc();}};
$('#hex2').oninput=e=>{const v=e.target.value.trim();if(/^#?[0-9a-f]{6}$/i.test(v)){$('#pick2').value=v.startsWith('#')?v:'#'+v;calc();}};

$('#toolbar').innerHTML=`

  <button class="gz-btn gz-btn-secondary" id="btnExample">${t('example')}</button>`;
$('#btnSwap').onclick=()=>{const a=$('#hex1').value,b=$('#hex2').value;$('#hex1').value=b;$('#hex2').value=a;$('#pick1').value=b;$('#pick2').value=a;calc();};
$('#btnExample').onclick=()=>{$('#hex1').value='#E74C3C';$('#hex2').value='#C0392B';$('#pick1').value='#E74C3C';$('#pick2').value='#C0392B';calc();};

calc();

</script>
