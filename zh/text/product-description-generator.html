<script>
GZI18n.register({
  en: {
    toolTitle: 'Product Description Generator',
    toolDesc: 'Generate SEO-optimized product descriptions for e-commerce. Professional copy for Shopify, Amazon, WooCommerce and more.',
    btnGenerate: 'Generate Description',
    btnCopy: 'Copy',
    btnClear: 'Clear',
    lblName: 'Product Name',
    lblCat: 'Category',
    lblFeatures: 'Key Features (one per line)',
    lblAudience: 'Target Audience',
    lblPrice: 'Price',
    lblTone: 'Tone & Style',
    lblOut: 'Generated Description',
    step1: 'Enter your product name and category',
    step2: 'List key features and target audience',
    step3: 'Select a tone and click Generate',
    step4: 'Copy the description and use it in your store',
    faq1q: 'How does the Product Description Generator work?',
    faq1a: 'Enter your product name, category, key features and tone. The tool uses templates and copywriting formulas to generate professional, SEO-friendly product descriptions instantly.',
    faq2q: 'Is this tool free?',
    faq2a: 'Yes, completely free with no signup required. All generation happens in your browser.',
    faq3q: 'Can I use the generated descriptions commercially?',
    faq3a: 'Yes. You own all generated content and can use it for any commercial purpose.',
  },
  zh: {
    toolTitle: '产品描述生成器',
    toolDesc: '为电商生成 SEO 优化的产品描述，适用于 Shopify、亚马逊、WooCommerce 等平台。',
    btnGenerate: '生成描述',
    btnCopy: '复制',
    btnClear: '清空',
    lblName: '产品名称',
    lblCat: '类目',
    lblFeatures: '核心卖点（每行一个）',
    lblAudience: '目标受众',
    lblPrice: '价格',
    lblTone: '语气风格',
    lblOut: '生成的描述',
    step1: '输入产品名称和类目',
    step2: '列出核心卖点和目标受众',
    step3: '选择语气风格并点击生成',
    step4: '复制描述并用于你的店铺',
    faq1q: '产品描述生成器如何工作？',
    faq1a: '输入产品名称、类目、核心卖点和语气，工具使用模板和文案公式即时生成专业的 SEO 友好产品描述。',
    faq2q: '这个工具免费吗？',
    faq2a: '是的，完全免费，无需注册。所有生成过程在浏览器中完成。',
    faq3q: '可以商用吗？',
    faq3a: '可以。你拥有所有生成内容的完整权利，可用于任何商业用途。',
  }
});

const { $, copyText, t } = GZ;
let selectedTone = 'professional';

document.querySelectorAll('#tone-btns button').forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll('#tone-btns button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedTone = btn.dataset.tone;
  };
});

const toneOpeners = {
  professional: [
    'Introducing the', 'Discover the', 'Elevate your experience with the',
    'Meet the', 'Upgrade your setup with the', 'Experience premium quality with the',
    'The', 'Professional-grade performance meets elegant design in the',
    'Redefine your standards with the',
  ],
  casual: [
    'Say hello to the', 'Check out the', 'You\'re going to love the',
    'Get ready for the', 'Finally, the', 'Here\'s the thing about the',
    'Let\'s talk about the', 'Meet your new favorite:',
  ],
  luxury: [
    'Indulge in the exquisite', 'Luxuriate in the craftsmanship of the',
    'Experience unparalleled elegance with the', 'The art of perfection: introducing the',
    'Crafted for the discerning: the', 'Sophistication redefined — the',
    'Timeless elegance meets modern innovation in the',
  ],
  fun: [
    'Hold onto your hats — the', 'Get excited about the', 'Drum roll please... introducing the',
    'The wait is over! Meet the', 'Ready to level up? Check out the',
    'Oh boy, you\'re gonna flip for the', 'Warning: awesomeness ahead — the',
  ],
  minimal: [
    'The', 'Simple. Effective.', 'Less is more.',
    'Designed with purpose.', 'Pure function. Pure form.',
  ]
};

const toneClosers = {
  professional: ['Order now and experience the difference.', 'Backed by our satisfaction guarantee.', 'Professional quality you can trust.'],
  casual: ['Grab yours today!', 'Trust us, you won\'t regret it.', 'What are you waiting for?'],
  luxury: ['An investment in excellence.', 'Because you deserve nothing less.', 'Exclusively crafted for those who demand the finest.'],
  fun: ['Go on, treat yourself!', 'Your future self will thank you.', 'Adventure awaits!'],
  minimal: ['Available now.', 'Designed for you.', ''],
};

function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function generate() {
  const name = $('#prod-name').value.trim();
  if (!name) { alert('Please enter a product name'); return; }
  const cat = $('#prod-cat').value;
  const featuresRaw = $('#prod-features').value.trim();
  const features = featuresRaw ? featuresRaw.split('\n').map(f => f.trim()).filter(Boolean) : [];
  const audience = $('#prod-audience').value.trim();
  const price = $('#prod-price').value.trim();

  const openers = toneOpeners[selectedTone] || toneOpeners.professional;
  const closers = toneClosers[selectedTone] || toneClosers.professional;

  let desc = pick(openers) + ' ' + name + '.';

  if (features.length > 0) {
    desc += '\n\n';
    if (selectedTone === 'minimal') {
      desc += features.join('. ') + '.';
    } else {
      desc += (selectedTone === 'fun' ? 'Here\'s what makes it awesome:\n' :
               selectedTone === 'luxury' ? 'Meticulously designed with:\n' :
               selectedTone === 'casual' ? 'Here\'s why you\'ll love it:\n' :
               'Key features include:\n');
      features.forEach(f => {
        desc += `\n• ${f}`;
      });
    }
  }

  if (audience) {
    desc += '\n\n' + (selectedTone === 'luxury' ?
      `Discerning ${audience} will appreciate the attention to detail.` :
      selectedTone === 'fun' ?
      `Perfect for ${audience} who want to have a great time!` :
      selectedTone === 'casual' ?
      `Great for ${audience} looking for something reliable.` :
      selectedTone === 'minimal' ?
      `Designed for ${audience}.` :
      `Ideal for ${audience} seeking quality and performance.`);
  }

  if (price) {
    desc += '\n\n' + (selectedTone === 'luxury' ?
      `An investment at ${price}.` :
      selectedTone === 'fun' ?
      `All this for just ${price}!` :
      selectedTone === 'casual' ?
      `Yours for ${price}.` :
      `Available for ${price}.`);
  }

  const closer = pick(closers);
  if (closer) desc += '\n\n' + closer;

  $('#output').textContent = desc;
}

function clearAll() {
  $('#prod-name').value = '';
  $('#prod-features').value = '';
  $('#prod-audience').value = '';
  $('#prod-price').value = '';
  $('#output').textContent = '';
}

GZ.renderToolPage({
  toolbar: [
    { label: t('btnGenerate'), action: generate },
    { label: t('btnCopy'), action: () => copyText($('#output').textContent) },
    { label: t('btnClear'), action: clearAll },
  ],
  howto: [t('step1'), t('step2'), t('step3'), t('step4')],
  faq: [
    { q: t('faq1q'), a: t('faq1a') },
    { q: t('faq2q'), a: t('faq2a') },
    { q: t('faq3q'), a: t('faq3a') },
  ],
  related: ['ai-prompt-generator', 'blog-title-generator', 'email-subject-tester', 'headline-analyzer', 'meta-tag-generator']
});

$('#lbl-name').textContent = t('lblName');
$('#lbl-cat').textContent = t('lblCat');
$('#lbl-features').textContent = t('lblFeatures');
$('#lbl-audience').textContent = t('lblAudience');
$('#lbl-price').textContent = t('lblPrice');
$('#lbl-tone').textContent = t('lblTone');
$('#lbl-out').textContent = t('lblOut');
</script>
</body>
