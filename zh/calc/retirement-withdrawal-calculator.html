<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is the 4% rule for retirement withdrawals?", "acceptedAnswer": {"@type": "Answer", "text": "The 4% rule comes from the Trinity Study: withdraw 4% of your starting portfolio in year one, then adjust that dollar amount for inflation each following year. Historically this gave a balanced stock/bond portfolio a high probability of lasting 30 years. A $1,000,000 portfolio would start at $40,000 per year."}}, {"@type": "Question", "name": "Is 4% a safe withdrawal rate?", "acceptedAnswer": {"@type": "Answer", "text": "4% is a reasonable starting point for a 30-year retirement with a roughly 60/40 stock-bond mix, but it is not guaranteed. Some planners now suggest 3.5% for early retirees or longer horizons (40+ years), or for more conservative portfolios. This calculator lets you test any rate and see how long the money lasts."}}, {"@type": "Question", "name": "What is a FIRE number?", "acceptedAnswer": {"@type": "Answer", "text": "Your FIRE (Financial Independence Retire Early) number is the nest egg you need to retire. A common rule of thumb is 25 times your annual expenses, since 1 ÷ 0.04 = 25. For example, $40,000 of annual spending implies a FIRE number of $1,000,000."}}, {"@type": "Question", "name": "How does inflation affect retirement withdrawals?", "acceptedAnswer": {"@type": "Answer", "text": "Even at 3% inflation, the cost of living roughly doubles every 24 years. This calculator increases your withdrawal each year by your assumed inflation rate, so the projections stay realistic. Earning a return above inflation (the real return) is what keeps the portfolio growing."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>

      <div class="rw-field"><label id="lbl-rate"></label><input type="number" id="rate" value="7" min="0" step="0.1">%</div>
      <div class="rw-field"><label id="lbl-infl"></label><input type="number" id="infl" value="3" min="0" step="0.1">%</div>
      <div class="rw-field"><label id="lbl-wr"></label><input type="number" id="wr" value="4" min="0.1" step="0.1">%</div>
      <div class="rw-field"><label id="lbl-years"></label><input type="number" id="years" value="30" min="1" max="60" step="1"></div>
    </div>
    <div class="rw-result">
      <div class="rw-top">
        <div class="rw-big"><div class="num" id="v-annual">—</div><div class="lbl" id="l-annual"></div></div>
        <div class="rw-big"><div class="num" id="v-monthly">—</div><div class="lbl" id="l-monthly"></div></div>
        <div class="rw-big"><div class="num" id="v-lasts">—</div><div class="lbl" id="l-lasts"></div></div>
      </div>
      <div class="rw-status" id="status"></div>
      <table class="rw-table"><thead><tr><th id="th-year"></th><th id="th-start"></th><th id="th-withdraw"></th><th id="th-end"></th></tr></thead><tbody id="tbody"></tbody></table>

<script>
GZI18n.register({
  en: {
    toolTitle: 'Retirement Withdrawal Calculator',
    toolDesc: 'Test the 4% rule, find your safe annual withdrawal, and see how many years your nest egg lasts as it grows and erodes with inflation. Includes a year-by-year table and your FIRE number. Free and private.',
    lblNest: 'Starting nest egg',
    lblRate: 'Expected annual return',
    lblInfl: 'Annual inflation',
    lblWr: 'Initial withdrawal rate',
    lblYears: 'Horizon (years)',
    lAnnual: 'Year-1 withdrawal',
    lMonthly: 'Monthly (year 1)',
    lLasts: 'Portfolio lasts',
    thYear: 'Year', thStart: 'Start balance', thWithdraw: 'Withdrawal', thEnd: 'End balance',
    step1: 'Enter your current or projected nest egg.',
    step2: 'Set your expected investment return and inflation rate.',
    step3: 'Pick your withdrawal rate — try 4% for the classic rule, 3.5% to be safer.',
    step4: 'Read how long the money lasts and review the year-by-year table.',
  },
  zh: {
    toolTitle: '退休取款计算器',
    toolDesc: '测试 4% 法则，计算安全年取款额，查看退休金在增长与通胀侵蚀下能维持多少年。含逐年明细表和你的 FIRE 数字。免费、私密。',
    lblNest: '初始退休金',
    lblRate: '预期年化收益率',
    lblInfl: '年通胀率',
    lblWr: '初始取款比例',
    lblYears: '年限（年）',
    lAnnual: '首年取款额',
    lMonthly: '月取款（首年）',
    lLasts: '退休金可维持',
    thYear: '年份', thStart: '年初余额', thWithdraw: '取款额', thEnd: '年末余额',
    step1: '输入你当前或预期的退休金金额。',
    step2: '设置预期投资收益率和通胀率。',
    step3: '选择取款比例 — 经典法则试 4%，更稳妥可用 3.5%。',
    step4: '查看退休金能维持多少年，并逐年查看明细表。',
  }
});

const { $, t } = GZ;
const money = n => '$' + Math.round(n).toLocaleString('en-US');
const lang = () => GZI18n.getLang();

function calc() {
  const nest = +$('#nest').value || 0;
  const ret = (+$('#rate').value || 0) / 100;
  const infl = (+$('#infl').value || 0) / 100;
  const wr = (+$('#wr').value || 0) / 100;
  const horizon = +$('#years').value || 1;

  const firstWithdraw = nest * wr;
  $('#v-annual').textContent = money(firstWithdraw);
  $('#v-monthly').textContent = money(firstWithdraw / 12);

  // Year-by-year simulation
  let bal = nest;
  let withdraw = firstWithdraw;
  const rows = [];
  let depletedYear = 0;
  for (let y = 1; y <= horizon; y++) {
    const startBal = bal;
    let w = Math.min(withdraw, bal); // can't withdraw more than remains
    bal = bal - w;
    bal = bal * (1 + ret); // growth on remaining balance
    rows.push({ y, start: startBal, w, end: Math.max(0, bal) });
    if (bal <= 0 && !depletedYear) { depletedYear = y; }
    withdraw = withdraw * (1 + infl); // inflate withdrawal
    if (bal <= 0) break;
  }

  if (depletedYear) {
    $('#v-lasts').textContent = depletedYear + ' yrs';
    $('#status').textContent = lang()==='zh' ? '⚠ 按当前设定，退休金约 ' + depletedYear + ' 年后用尽 — 建议降低取款比例或延长工作年限。' : '⚠ At this rate your portfolio runs out in about ' + depletedYear + ' years — consider a lower withdrawal rate or working longer.';
    $('#status').style.background = 'rgba(233,69,96,.12)'; $('#status').style.color = '#ff7a90';
  } else {
    $('#v-lasts').textContent = '✓ ' + horizon + '+ yrs';
    $('#status').textContent = lang()==='zh' ? '✓ 按当前设定，退休金可维持 ' + horizon + ' 年以上 — 末年余额约 ' + money(bal) + '。' : '✓ At this rate your portfolio lasts ' + horizon + '+ years with about ' + money(bal) + ' left at the end.';
    $('#status').style.background = 'rgba(0,214,114,.12)'; $('#status').style.color = '#00d672';
  }

  // Render table (show up to 10 rows, then last)
  const tbody = $('#tbody'); tbody.innerHTML = '';
  const showRows = rows.length <= 12 ? rows : [...rows.slice(0,10), rows[rows.length-1]];
  showRows.forEach((r, i) => {
    const sep = (rows.length > 12 && i === showRows.length-1) ? 'border-top:2px solid var(--accent);' : '';
    tbody.insertAdjacentHTML('beforeend', `<tr style="${sep}"><td>${r.y}</td><td>${money(r.start)}</td><td>${money(r.w)}</td><td>${money(r.end)}</td></tr>`);
  });

  $('#note').innerHTML = (lang()==='zh'
    ? '💡 参考：按 4% 法则，所需 FIRE 数字 ≈ 年支出 × 25。本工具结果为确定性估算，不含市场波动与税收，仅供规划参考。'
    : '💡 Reference: under the 4% rule your FIRE number ≈ annual spending × 25. This tool is a deterministic estimate and does not model market volatility or taxes — use it for planning only.');
}

['nest','rate','infl','wr','years'].forEach(id => $('#'+id).addEventListener('input', calc));
calc();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'👴', href:'/calc/retirement-calculator.html', name:'Retirement Calculator'},
    {icon:'💰', href:'/calc/savings-goal-calculator.html', name:'Savings Goal'},
    {icon:'📈', href:'/calc/investment-calculator.html', name:'Investment Calculator'},
    {icon:'✨', href:'/calc/compound-interest-calculator.html', name:'Compound Interest'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
