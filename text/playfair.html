<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"What is the Playfair cipher?","acceptedAnswer":{"@type":"Answer","text":"The Playfair cipher, invented in 1854 by Charles Wheatstone and named after Lord Playfair, is a classical digraph substitution cipher. It encrypts pairs of letters (digraphs) using a 5x5 key square built from a secret keyword, so it has 600 possible digraph substitutions instead of just 26 single-letter ones - making simple frequency analysis much harder."}},{"@type":"Question","name":"How does the Playfair 5x5 key square work?","acceptedAnswer":{"@type":"Answer","text":"The 25-cell square holds the alphabet with I and J merged into one cell. The keyword (deduplicated) is written first, then the remaining letters of the alphabet fill the rest. The square determines how each pair of plaintext letters is mapped to a ciphertext pair using row, column and rectangle rules."}},{"@type":"Question","name":"What are the three Playfair rules?","acceptedAnswer":{"@type":"Answer","text":"For each letter pair: (1) Same row - replace each letter with the letter to its right (wrapping). (2) Same column - replace each with the letter below (wrapping). (3) Rectangle - replace each letter with the letter in its row but in the other letter's column. Decryption reverses the direction (left / up)."}},{"@type":"Question","name":"Why does Playfair need letter pairs and padding?","acceptedAnswer":{"@type":"Answer","text":"Playfair encrypts digraphs, so the plaintext is split into pairs. If a pair has two identical letters (e.g. LL), an X (or Q) is inserted between them. If the final group has only one letter, an X is appended. This tool handles padding automatically and removes it on decryption."}}]}</script>

const { $, copyText, t } = GZ;

// Build a 5x5 key square from a keyword (I/J merged)
function buildSquare(keyword) {
  const seen = new Set();
  const square = [];
  const norm = keyword.toUpperCase().replace(/J/g, 'I').replace(/[^A-Z]/g, '');
  for (const ch of norm) {
    if (!seen.has(ch)) { seen.add(ch); square.push(ch); }
  }
  for (let c = 65; c <= 90; c++) {
    const ch = String.fromCharCode(c);
    if (ch === 'J') continue;
    if (!seen.has(ch)) { seen.add(ch); square.push(ch); }
  }
  return square; // length 25
}

function findPos(square, ch) {
  const idx = square.indexOf(ch === 'J' ? 'I' : ch);
  return [Math.floor(idx / 5), idx % 5];
}

function at(square, r, c) {
  return square[((r % 5) + 5) % 5 * 5 + ((c % 5) + 5) % 5];
}

function process(text, square, encrypt) {
  const dir = encrypt ? 1 : -1;
  // prepare letters only
  const cleaned = text.toUpperCase().replace(/J/g, 'I').replace(/[^A-Z]/g, '');
  // build pairs with padding
  const pairs = [];
  let i = 0;
  while (i < cleaned.length) {
    const a = cleaned[i];
    let b = cleaned[i + 1];
    if (!b) { pairs.push([a, 'X']); i += 1; }
    else if (a === b) { pairs.push([a, 'X']); i += 1; }
    else { pairs.push([a, b]); i += 2; }
  }
  let out = '';
  for (const [a, b] of pairs) {
    const [ra, ca] = findPos(square, a);
    const [rb, cb] = findPos(square, b);
    let na, nb;
    if (ra === rb) {
      // same row
      na = at(square, ra, ca + dir);
      nb = at(square, rb, cb + dir);
    } else if (ca === cb) {
      // same column
      na = at(square, ra + dir, ca);
      nb = at(square, rb + dir, cb);
    } else {
      // rectangle
      na = at(square, ra, cb);
      nb = at(square, rb, ca);
    }
    out += na + nb;
  }
  return out;
}

function renderSquare(square) {
  const el = $('#keySquare');
  el.innerHTML = square.map(ch => `<div class="pf-cell">${ch}</div>`).join('');
}

function run() {
  const key = $('#keyInput').value;
  const text = $('#input').value;
  const mode = $('#mode').value;
  const preserve = $('#preserveCase').checked;

  if (!/[A-Za-z]/.test(key)) {
    $('#output').value = '';
    $('#keySquare').innerHTML = '';
    $('#info').innerHTML = `<span style="color:var(--danger)">${t('needKey')}</span>`;
    return;
  }
  const square = buildSquare(key);
  renderSquare(square);

  let result = process(text, square, mode === 'encrypt');
  if (preserve) {
    // attempt to map case from input letters
    const inLetters = text.replace(/[^A-Za-z]/g, '').split('');
    // result may include padding X; map case position-by-position over input letters
    let ri = 0;
    let cased = '';
    for (let k = 0; k < result.length; k++) {
      const rch = result[k];
      const src = inLetters[ri];
      if (src && src === src.toUpperCase() && src !== src.toLowerCase()) {
        cased += rch;
      } else if (src && src === src.toLowerCase()) {
        cased += rch.toLowerCase();
      } else {
        cased += rch; // padding char — keep upper
      }
      ri++;
    }
    result = cased;
  }
  // group into blocks of 2 for readability when not preserving case
  if (!preserve) {
    result = result.match(/.{1,2}/g).join(' ');
  }
  $('#output').value = result;
  $('#info').innerHTML = t('infoIntro');
}

$('#keyInput').addEventListener('input', run);
$('#mode').addEventListener('change', run);
$('#input').addEventListener('input', run);
$('#preserveCase').addEventListener('change', run);

$('#toolbar').innerHTML = `
