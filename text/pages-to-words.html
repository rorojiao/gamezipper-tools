<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"How many words are on a page?","acceptedAnswer":{"@type":"Answer","text":"A standard page with 12pt Times New Roman font, double-spaced, 1-inch margins contains approximately 250-300 words. Single-spaced, the same page holds about 500 words. This varies by font choice and formatting."}},{"@type":"Question","name":"How do you convert pages to words?","acceptedAnswer":{"@type":"Answer","text":"Multiply the number of pages by the average words per page. For double-spaced 12pt Times New Roman, use 275 words per page. For single-spaced, use 500 words per page. Our calculator does this automatically with your chosen settings."}},{"@type":"Question","name":"What is 5 pages in words?","acceptedAnswer":{"@type":"Answer","text":"5 double-spaced pages (12pt Times New Roman, 1-inch margins) is approximately 1,375 words. 5 single-spaced pages is about 2,500 words. Use the calculator for precise estimates with your specific formatting."}},{"@type":"Question","name":"Does this work for handwritten pages too?","acceptedAnswer":{"@type":"Answer","text":"Yes. A handwritten single-spaced page typically contains 150-200 words, and double-spaced about 100 words. Adjust the words-per-page setting accordingly for handwritten work."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="p2w-controls">
      <label><span id="lbl-pages"></span><input type="number" id="pages" value="5" min="0" step="0.5" oninput="calcWords()"></label>
      <label><span id="lbl-font"></span>
        <select id="font" onchange="calcWords()">
          <option value="times">Times New Roman</option>
          <option value="arial">Arial</option>
          <option value="calibri">Calibri</option>
          <option value="courier">Courier New</option>
          <option value="georgia">Georgia</option>
        </select>
      </label>
      <label><span id="lbl-size"></span>
        <select id="size" onchange="calcWords()">
          <option value="10">10pt</option>
          <option value="11">11pt</option>
          <option value="12" selected>12pt</option>
          <option value="14">14pt</option>
        </select>
      </label>
      <label><span id="lbl-spacing"></span>
        <select id="spacing" onchange="calcWords()">
          <option value="1" >Single</option>
          <option value="1.5">1.5 lines</option>
          <option value="2" selected>Double</option>
        </select>
      </label>
    </div>
    <div class="p2w-result">
      <div class="big" id="word-count">1,375</div>
      <div class="sub" id="word-sub"></div>
    </div>
    <div class="p2w-grid">
      <div class="p2w-card"><div class="val" id="char-count">0</div><div class="lbl" id="char-lbl"></div></div>
      <div class="p2w-card"><div class="val" id="para-count">0</div><div class="lbl" id="para-lbl"></div></div>
      <div class="p2w-card"><div class="val" id="read-time">0m</div><div class="lbl" id="read-lbl"></div></div>
      <div class="p2w-card"><div class="val" id="speak-time">0m</div><div class="lbl" id="speak-lbl"></div></div>
    </div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Pages to Words Calculator',
    toolDesc: 'Convert pages to estimated word count instantly. Perfect for essays, research papers and assignments. Adjust font, size and spacing for accurate results.',
    pages: 'Number of Pages',
    font: 'Font',
    fontSize: 'Font Size',
    spacing: 'Line Spacing',
    approxWords: 'approximate word count',
    characters: 'Characters',
    paragraphs: 'Paragraphs',
    readingTime: 'Reading Time',
    speakingTime: 'Speaking Time',
    step1: 'Enter the number of pages you need to write',
    step2: 'Select your font, font size and line spacing',
    step3: 'See the estimated word count instantly',
    step4: 'Plan your essay or assignment with confidence',
    wordsResult: 'words',
    subText: '{words} words across {pages} pages',
  },
  zh: {
    toolTitle: '页数转字数计算器',
    toolDesc: '即时将页数转换为估算字数。适合论文、研究报告和作业。可调整字体、字号和行距，获取准确结果。',
    pages: '页数',
    font: '字体',
    fontSize: '字号',
    spacing: '行距',
    approxWords: '估算字数',
    characters: '字符数',
    paragraphs: '段落数',
    readingTime: '阅读时间',
    speakingTime: '朗读时间',
    step1: '输入你需要写的页数',
    step2: '选择字体、字号和行距',
    step3: '即时查看估算字数',
    step4: '有计划地撰写论文或作业',
    wordsResult: '字',
    subText: '约 {words} 字，共 {pages} 页',
  }
});

const { $, t } = GZ;

// Base words per page (12pt, double-spaced, 1-inch margins)
const FONT_FACTOR = { times: 1.0, arial: 0.88, calibri: 0.92, courier: 0.75, georgia: 0.95 };
const SIZE_FACTOR = { '10': 1.25, '11': 1.1, '12': 1.0, '14': 0.82 };
const BASE_WPP_DOUBLE = 275; // standard double-spaced 12pt TNR

function calcWords() {
  const pages = parseFloat($('#pages').value) || 0;
  const font = $('#font').value;
  const size = $('#size').value;
  const spacing = parseFloat($('#spacing').value);

  const wpp = BASE_WPP_DOUBLE * (2 / spacing) * FONT_FACTOR[font] * SIZE_FACTOR[size];
  const words = Math.round(pages * wpp);
  const chars = Math.round(words * 5.1); // avg 5.1 chars per English word incl. space
  const paragraphs = Math.max(1, Math.round(words / 75));
  const readMin = Math.ceil(words / 200);
  const speakMin = Math.ceil(words / 130);

  $('#word-count').textContent = words.toLocaleString();
  $('#word-sub').textContent = t('approxWords');
  $('#char-count').textContent = chars.toLocaleString();
  $('#para-count').textContent = paragraphs.toLocaleString();
  $('#read-time').textContent = readMin + 'm';
  $('#speak-time').textContent = speakMin + 'm';
}

$('#lbl-pages').textContent = t('pages');
$('#lbl-font').textContent = t('font');
$('#lbl-size').textContent = t('fontSize');
$('#lbl-spacing').textContent = t('spacing');
$('#char-lbl').textContent = t('characters');
$('#para-lbl').textContent = t('paragraphs');
$('#read-lbl').textContent = t('readingTime');
$('#speak-lbl').textContent = t('speakingTime');
calcWords();

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📄', href:'/text/words-to-pages.html', name:'Words to Pages'},
    {icon:'📝', href:'/text/word-counter.html', name:'Word Counter'},
    {icon:'⏱️', href:'/text/reading-time-calculator.html', name:'Reading Time'},
    {icon:'📊', href:'/text/letter-counter.html', name:'Letter Counter'},
  ]
});
</script>
