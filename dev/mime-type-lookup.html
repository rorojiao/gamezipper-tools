<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is a MIME type?", "acceptedAnswer": {"@type": "Answer", "text": "A MIME type (Multipurpose Internet Mail Extensions) is a standardized label that describes the format of a file or data. Browsers and servers use MIME types in the Content-Type header to know how to handle content, e.g. text/html for HTML pages or image/png for PNG images."}}, {"@type": "Question", "name": "How do I find the MIME type for a file extension?", "acceptedAnswer": {"@type": "Answer", "text": "Type the extension (e.g. pdf, mp4, json) in the search box and the matching MIME type appears instantly. Switch to MIME-to-extension mode to search in the opposite direction."}}, {"@type": "Question", "name": "What is the difference between application/octet-stream and a specific MIME type?", "acceptedAnswer": {"@type": "Answer", "text": "application/octet-stream is a generic binary type used as a fallback when the server does not know the specific format. Browsers typically offer to download such files instead of displaying them. Always use the specific MIME type when known."}}, {"@type": "Question", "name": "Are these MIME types standard?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. The list follows IANA registered MIME types and common de-facto standards. Some entries have multiple valid types — for example .js can be text/javascript (modern) or application/javascript (legacy)."}}]}</script>

const CATEGORIES = ['image','video','audio','document','archive','code','font','data'];
let activeCat = '';
let searchTerm = '';
let mode = 'ext'; // 'ext' or 'mime'

function escapeHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function renderCats() {
  const c = $('#cats');
  const all = `<div class="mt-cat ${!activeCat?'active':''}" data-cat="">${t('all')}</div>`;
  const cats = CATEGORIES.map(cat => `<div class="mt-cat ${activeCat===cat?'active':''}" data-cat="${cat}">${cat}</div>`).join('');
  c.innerHTML = all + cats;
  c.querySelectorAll('.mt-cat').forEach(el => {
    el.addEventListener('click', () => { activeCat = el.dataset.cat; renderCats(); renderGrid(); });
  });
}

function renderGrid() {
  const filtered = TYPES.filter(item => {
    if (activeCat && item.cat !== activeCat) return false;
    if (searchTerm) {
      const q = searchTerm.toLowerCase().replace(/^\./,'');
      if (mode === 'ext') return item.ext.toLowerCase().includes('.' + q) || item.ext.toLowerCase() === '.' + q;
      return item.mime.toLowerCase().includes(q);
    }
    return true;
  }).filter((item, idx, self) => idx === self.findIndex(i => i.ext === item.ext && i.mime === item.mime));

  $('#count').textContent = `${filtered.length} ${t('results')}`;
  $('#grid').innerHTML = filtered.map((item, idx) => `
    <div class="mt-row">
      <div class="mt-ext">${escapeHtml(item.ext)}</div>
      <div class="mt-mime">${escapeHtml(item.mime)}</div>
      <button class="mt-copy" data-copy="${idx}">📋</button>
    </div>
  `).join('');

  $('#grid').querySelectorAll('[data-copy]').forEach(btn => {
    btn.addEventListener('click', () => {
      const item = filtered[+btn.dataset.copy];
      const text = mode === 'ext' ? item.mime : item.ext;
      copyText(text);
      const orig = btn.innerHTML;
      btn.innerHTML = `✓`;
      setTimeout(() => btn.innerHTML = orig, 1200);
    });
  });
}

function updateMode() {
  $('#mode-ext').classList.toggle('active', mode === 'ext');
  $('#mode-mime').classList.toggle('active', mode === 'mime');
  $('#search').placeholder = mode === 'ext' ? t('searchExt') : t('searchMime');
}

$('#mode-ext').addEventListener('click', () => { mode='ext'; searchTerm=''; $('#search').value=''; updateMode(); renderGrid(); });
$('#mode-mime').addEventListener('click', () => { mode='mime'; searchTerm=''; $('#search').value=''; updateMode(); renderGrid(); });
$('#search').addEventListener('input', e => { searchTerm = e.target.value; renderGrid(); });

updateMode();
renderCats();
renderGrid();
