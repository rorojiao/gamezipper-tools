<script>
GZI18n.register({
  en: {
    toolTitle: 'Leetspeak Converter (1337 / h4x0r Generator)',
    toolDesc: 'Turn plain text into leetspeak with three intensity levels — basic, intermediate and advanced. Great for gamer tags, usernames and hacker-style flair. Free, instant, browser-only.',
    level: 'Level', basic: 'Basic', intermediate: 'Intermediate', advanced: 'Advanced',
    step1: 'Type or paste text into the input area',
    step2: 'Pick a leet level (basic / intermediate / advanced)',
    step3: 'See the converted leetspeak appear instantly',
    step4: 'Copy the result for your gamer tag or username',
  },
  zh: {
    toolTitle: 'Leetspeak 转换器（1337 / h4x0r 生成器）',
    toolDesc: '将普通文本转为 leetspeak，提供基础、中级和高级三种强度。适合游戏 ID、用户名和黑客风格文字。免费、即时、浏览器本地运行。',
    level: '等级', basic: '基础', intermediate: '中级', advanced: '高级',
    step1: '在输入区输入或粘贴文本',
    step2: '选择一个 leet 等级（基础/中级/高级）',
    step3: '即时查看转换后的 leetspeak',
    step4: '复制结果用于游戏 ID 或用户名',
  }
});

const { $, copyText, t } = GZ;
let level = 'basic';

const LEET = {
  basic: { a:'4', e:'3', l:'1', o:'0', s:'5', t:'7', i:'1', b:'8', g:'9' },
  intermediate: { a:'4', b:'8', c:'(', d:'|)', e:'3', g:'9', h:'#', i:'!', l:'1', o:'0', s:'5', t:'7', z:'2', k:'X', m:'/\\/' },
  advanced: { a:'@', b:'|3', c:'<', d:'|)', e:'3', f:'|=', g:'6', h:'#', i:'!', j:'_|', k:'|<', l:'|_', m:'/\\/\\', n:'|\\|', o:'0', p:'|*', q:'0,', r:'|2', s:'$', t:'7', u:'|_|', v:'\\/', w:'\\/\\/', x:'><', y:'`/', z:'2' }
};

function convert() {
  const inp = $('#input').value;
  if (!inp) { $('#output').textContent = ''; return; }
  const map = LEET[level];
  let out = '';
  for (const ch of inp) {
    const lc = ch.toLowerCase();
    out += map[lc] !== undefined ? map[lc] : ch;
  }
  $('#output').textContent = out;
}

function setLevel(l) {
  level = l;
  $$('.level-btn').forEach(b => b.classList.toggle('active', b.dataset.level === l));
  convert();
}

function loadExample() {
  $('#input').value = 'Hello World! I am a leet hacker.';
  convert();
}

function doClear() { $('#input').value = ''; $('#output').textContent = ''; }

$('#input').addEventListener('input', convert);

$('#toolbar').innerHTML = `
  <span style="font-size:.85em">${t('level')}:</span>
  <button class="gz-btn gz-btn-secondary level-btn active" data-level="basic" onclick="setLevel('basic')">${t('basic')}</button>
  <button class="gz-btn gz-btn-secondary level-btn" data-level="intermediate" onclick="setLevel('intermediate')">${t('intermediate')}</button>
  <button class="gz-btn gz-btn-secondary level-btn" data-level="advanced" onclick="setLevel('advanced')">${t('advanced')}</button>
  <span style="flex:1"></span>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

GZ.renderToolPage({
  category: 'text',

  ]
});
