<script>

  zh: {

    toolDesc: '将工单标题转为规范的 Git 分支名。支持 feature/、bugfix/、hotfix/、工单号前缀、kebab-case 和长度限制 — 复制后用 git checkout -b 创建分支。',
    generate: '复制',
    step1: '输入工单标题（如 "Add user login page"）',

    step3: '选择格式和最大词数',
    step4: '点击复制，然后运行 git checkout -b <分支名>',
  }
});

const { $, $$, t } = GZ;

function slugify(text, maxWords) {
  // Tokenize, drop stop words from head AND tail, then truncate to maxWords.
  // After truncating, trim trailing stop words again so the slug never ends in "with" / "the" / "a".
  const STOP = new Set('a an the of to in on at by for with from and or but is are was were be been being this that these those it its as into via per'.split(' '));
  let words = (text || '')
    .toLowerCase()
    .normalize('NFKD')
    .replace(/[\u0300-\u036f]/g, '')
    .replace(/[^a-z0-9\s-]/g, ' ')
    .trim()
    .split(/[\s_-]+/)
    .filter(Boolean);
  // Drop leading stop words
  while (words.length > 1 && STOP.has(words[0])) words.shift();
  // Truncate to maxWords FIRST
  words = words.slice(0, maxWords);
  // THEN trim any trailing stop word left at the cut
  while (words.length > 1 && STOP.has(words[words.length - 1])) words.pop();
  return words.join('-');
}

function generate() {
  const title = $('#title-input').value;
  const ticket = ($('#ticket-input').value || '').trim().toUpperCase().replace(/[^A-Z0-9-]/g, '-').replace(/-+/g, '-').replace(/^-|-$/g, '');
  const type = $('#type-select').value;
  const format = $('#format-select').value;
  const maxWords = +$('#maxwords-input').value || 5;
  const slug = slugify(title, maxWords);

  let branch = '';
  switch (format) {
    case 'type-slug':
      branch = (type ? type + '/' : '') + slug;
      break;
    case 'ticket-slug':
      branch = (ticket ? ticket + '-' : '') + slug;
      break;
    case 'slug':
      branch = slug;
      break;
    case 'ticket_type-slug':
      branch = (ticket ? ticket + '_' : '') + (type ? type + '-' : '') + slug;
      break;
    case 'type-ticket-slug':
    default:
      branch = (type ? type + '/' : '') + (ticket ? ticket + '-' : '') + slug;
      break;
  }
  branch = branch.replace(/\/-/g, '/').replace(/-+$/g, '');
  $('#output').textContent = branch || '(enter a title)';
}

['title-input', 'ticket-input', 'type-select', 'format-select', 'maxwords-input'].forEach(id => {
  $('#' + id).addEventListener('input', generate);
  $('#' + id).addEventListener('change', generate);
});

$('#copy-btn').addEventListener('click', () => {
  const out = $('#output').textContent;
  if (out && out !== '(enter a title)') GZ.copyText(out);
});

$('#copy-btn').textContent = t('generate');
generate();

});
</script>
