    catGeneral: '通用', lblTopic: '你的主题',
    selected: '已选:', total: '总计:', clickToToggle: '点击任意标签切换选择',
    step1: '输入你的主题或关键词（例如 "AI 工具"）',

const { $, copyText, t } = GZ;

// Curated hashtag pools by category
const POOLS = {
  general: ['trending','viral','daily','share','follow','lifestyle','fun','love','happy','mood','weekend','goals'],
  tech: ['tech','technology','coding','programming','developer','startup','saas','nocode','productivity','innovation','geek','code','devlife'],
  ai: ['ai','artificialintelligence','machinelearning','ml','deeplearning','llm','chatgpt','genai','gpt','automation','neuralnetworks','promptengineering'],
  business: ['business','entrepreneur','startup','b2b','saas','founder','leadership','smallbusiness','ceo','growth','strategy','sales'],
  marketing: ['marketing','digitalmarketing','seo','contentmarketing','socialmedia','branding','growth','copywriting','emailmarketing','ppc','ads','marketingtips'],
  fitness: ['fitness','gym','workout','fitfam','training','exercise','muscle','cardio','lifting','crossfit','personaltrainer','homeworkout'],
  health: ['health','wellness','mentalhealth','healthcare','nutrition','wellbeing','selfcare','meditation','healthy','mindfulness','doctor','publichealth'],
  food: ['food','foodie','recipe','cooking','foodphotography','instafood','chef','homemade','yummy','delicious','baking','mealprep'],
  travel: ['travel','wanderlust','adventure','explore','travelgram','vacation','tourism','roadtrip','backpacking','travelblogger','nature','bucketlist'],
  photography: ['photography','photooftheday','photo','photographer','naturephotography','portrait','landscape','streetphotography','blackandwhite','canon','nikon','capture'],
  design: ['design','graphicdesign','ui','ux','webdesign','branding','logo','typography','illustration','figma','designer','creative'],
  music: ['music','musician','producer','songwriter','hiphop','rap','pop','rock','newmusic','playlist','vinyl','live'],
  gaming: ['gaming','gamer','videogames','esports','twitch','streamer','ps','xbox','nintendo','pcgaming','indiegame','retrogaming'],
  sports: ['sports','football','soccer','nba','nfl','baseball','tennis','athlete','olympics','sportslife','workout','fitness'],
  fashion: ['fashion','style','ootd','outfit','streetwear','fashionista','model','vintage','designer','sustainablefashion','mensfashion','womensfashion'],
  beauty: ['beauty','makeup','skincare','beautyblogger','mua','cosmetics','lipstick','glowup','beautytips','naturalbeauty','haircare','nails'],
  finance: ['finance','investing','stocks','money','trading','crypto','personalfinance','wealth','budgeting','financialfreedom','retirement','millionaire'],
  crypto: ['crypto','bitcoin','ethereum','blockchain','defi','nft','web3','btc','eth','cryptocurrency','hodl','altcoin'],
  education: ['education','learning','students','teacher','school','college','university','edtech','study','onlinelearning','knowledge','academics'],
  books: ['books','booklover','reading','bookworm','bookstagram','kindle','literature','novel','fiction','nonfiction','author','bookrecommendations'],
  movies: ['movies','film','cinema','movienight','hollywood','netflix','director','actor','review','documentary','animation','tv'],
  art: ['art','artist','artwork','painting','drawing','sketch','illustration','digitalart','watercolor','creative','gallery','fineart'],
  nature: ['nature','naturelovers','outdoors','wildlife','hiking','mountains','ocean','forest','sunset','landscape','earth','conservation'],
  motivation: ['motivation','inspiration','motivational','mindset','success','hustle','grindset','goals','mindset','growthmindset','positivity','selfimprovement'],
  lifestyle: ['lifestyle','life','love','daily','vibes','aesthetic','minimal','selfcare','wellness','mindful','slowliving','happy'],
};

let currentList = [];
let selected = new Set();

function slugify(s){
  return s.toLowerCase().replace(/[^a-z0-9]+/g,'').slice(0, 30);
}

function generate(){
  const topic = $('#topic').value.trim();
  const cat = $('#cat').value;
  const pool = POOLS[cat] || POOLS.general;
  // Topic-derived custom hashtags
  const topicTags = [];
  if (topic){
    // Multi-word topic: take first word + whole phrase
    const words = topic.split(/\s+/).filter(Boolean);
    if (words.length){
      // camel-case combined
      const camel = words.map(w => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase()).join('');
      topicTags.push('#' + camel);
      // lower
      topicTags.push('#' + words.join('').toLowerCase().replace(/[^a-z0-9]/g,''));
      // first word
      if (words[0].length >= 3) topicTags.push('#' + words[0].toLowerCase().replace(/[^a-z0-9]/g,''));
      // last word
      if (words.length > 1 && words[words.length-1].length >= 3) topicTags.push('#' + words[words.length-1].toLowerCase().replace(/[^a-z0-9]/g,''));
    }
  }
  // Curated pool — pick 18 by hashing the topic so it changes per refresh
  const seed = (topic + cat).split('').reduce((a,c)=>a + c.charCodeAt(0), 0);
  const shuffled = [...pool].map((t,i)=> ({t, k: (i*97 + seed*31) % 9973}));
  shuffled.sort((a,b)=>a.k - b.k);
  const curated = shuffled.slice(0, 18).map(x => '#' + x.t);
  // Merge, dedupe
  const merged = [...new Set([...topicTags, ...curated])].slice(0, 22);
  currentList = merged;
  // Reset selection — auto-select top 2 (Twitter best practice)
  selected = new Set(merged.slice(0, Math.min(2, merged.length)));
  render();
}

function render(){
  const pills = $('#pills');
  pills.innerHTML = currentList.map(tag => {
    const isSel = selected.has(tag);
    return `<div class="x-pill ${isSel ? 'selected' : ''}" data-tag="${tag}"><span class="hash">#</span>${tag.replace(/^#/,'')}</div>`;
  }).join('');
  pills.querySelectorAll('.x-pill').forEach(el => {
    el.addEventListener('click', () => {
      const tag = el.getAttribute('data-tag');
      if (selected.has(tag)) selected.delete(tag); else selected.add(tag);
      render();
    });
  });
  const out = selected.size ? [...selected].join(' ') : '(click any tag above to select it)';
  $('#out').textContent = out;
  $('#meta').innerHTML = `<span><b>${selected.size}</b> ${t('selected')}</span><span><b>${currentList.length}</b> ${t('total')}</span><span style="opacity:.75">${t('clickToToggle')}</span>`;
}

function doCopySelected(){
  if (!selected.size) return;
  copyText([...selected].join(' '));
}
function doCopyAll(){
  copyText(currentList.join(' '));
}
function doRefresh(){
  generate();
}
function doClear(){
  $('#topic').value = '';
  selected = new Set();
  currentList = [];
  render();
}

$('#topic').addEventListener('input', generate);
$('#cat').addEventListener('change', generate);
$('#btnCopy').addEventListener('click', doCopySelected);
$('#btnAll').addEventListener('click', doCopyAll);
$('#btnRefresh').addEventListener('click', doRefresh);
$('#btnClear').addEventListener('click', doClear);

generate();
