<script>
GZI18n.register({
  en: {
    toolTitle: 'ICO Converter — PNG/JPG to ICO Favicon',
    toolDesc: 'Convert PNG, JPG, GIF or WebP images into multi-size ICO favicon files. Generate 16–256px favicons instantly — 100% in your browser, no upload.',
    dropLabel: 'Click or drag an image here (PNG, JPG, GIF, WebP)',
    sizesLabel: 'Select favicon sizes',
    generate: 'Generate & Download ICO',
    download: 'Download ICO',
    step1: 'Click the drop zone or drag an image onto it',
    step2: 'Tick the favicon sizes you need (16, 32, 48, 64, 128, 256px)',
    step3: 'Click Generate & Download ICO to save a multi-size .ico file',
    step4: 'Upload the favicon.ico to your website root and link it in HTML',
  },
  zh: {
    toolTitle: 'ICO 转换器 — PNG/JPG 转 ICO 网站图标',
    toolDesc: '将 PNG、JPG、GIF 或 WebP 图片转换为多尺寸 ICO 网站图标文件。即时生成 16–256px 网站图标 — 完全浏览器本地处理，无需上传。',
    dropLabel: '点击或拖拽图片到此（PNG、JPG、GIF、WebP）',
    sizesLabel: '选择图标尺寸',
    generate: '生成并下载 ICO',
    download: '下载 ICO',
    step1: '点击拖放区或将图片拖入',
    step2: '勾选所需的图标尺寸（16、32、48、64、128、256px）',
    step3: '点击「生成并下载 ICO」保存多尺寸 .ico 文件',
    step4: '将 favicon.ico 上传到网站根目录并在 HTML 中引用',
  }
});

const { $, t } = GZ;
const SIZES = [16, 32, 48, 64, 128, 256];
let selected = [16, 32, 48];
let srcImg = null;
let srcName = 'favicon';

// Build size checkboxes
$('#sizes').innerHTML = SIZES.map(s =>
  `<label><input type="checkbox" value="${s}" ${selected.includes(s)?'checked':''}> ${s}×${s}</label>`
).join('');
$('#sizes').querySelectorAll('input').forEach(cb => {
  cb.addEventListener('change', () => {
    selected = [...$('#sizes').querySelectorAll('input:checked')].map(c => +c.value).sort((a,b)=>a-b);
    $('#lbl-sizes').textContent = `${t('sizesLabel')} (${selected.join(', ')})`;
  });
});

$('#drop-label').textContent = t('dropLabel');
$('#btn-go').textContent = t('generate');
$('#lbl-sizes').textContent = `${t('sizesLabel')} (${selected.join(', ')})`;

$('#drop').addEventListener('click', () => $('#file').click());
$('#drop').addEventListener('dragover', e => { e.preventDefault(); $('#drop').classList.add('drag'); });
$('#drop').addEventListener('dragleave', () => $('#drop').classList.remove('drag'));
$('#drop').addEventListener('drop', e => {
  e.preventDefault(); $('#drop').classList.remove('drag');
  if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
});
$('#file').addEventListener('change', e => { if (e.target.files[0]) handleFile(e.target.files[0]); });

function handleFile(file) {
  srcName = file.name.replace(/\.[^.]+$/, '');
  const r = new FileReader();
  r.onload = ev => {
    const img = new Image();
    img.onload = () => {
      srcImg = img;
      $('#toolbar').style.display = '';
      renderPreview();
      $('#status').innerHTML = `<span style="color:var(--gz-success)">✓ ${file.name} — ${img.width}×${img.height}px</span>`;
    };
    img.src = ev.target.result;
  };
  r.readAsDataURL(file);
}

function makePng(img, size) {
  const c = document.createElement('canvas');
  c.width = c.height = size;
  const ctx = c.getContext('2d');
  ctx.imageSmoothingEnabled = true;
  ctx.imageSmoothingQuality = 'high';
  // Preserve aspect ratio with transparent bg (cover square)
  const scale = Math.max(size / img.width, size / img.height);
  const w = img.width * scale, h = img.height * scale;
  ctx.drawImage(img, (size - w) / 2, (size - h) / 2, w, h);
  // PNG dataURL -> Uint8Array
  const dataUrl = c.toDataURL('image/png');
  const bin = atob(dataUrl.split(',')[1]);
  const arr = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
  return arr;
}

function renderPreview() {
  if (!srcImg) return;
  $('#preview').innerHTML = SIZES.map(s =>
    `<div class="pv"><img src="${scaleTo(srcImg, s)}" width="${Math.min(s,96)}" height="${Math.min(s,96)}"><div class="sz">${s}×${s}</div></div>`
  ).join('');
}
function scaleTo(img, size) {
  const c = document.createElement('canvas');
  c.width = c.height = size;
  const ctx = c.getContext('2d');
  ctx.imageSmoothingQuality = 'high';
  const scale = Math.max(size / img.width, size / img.height);
  const w = img.width * scale, h = img.height * scale;
  ctx.drawImage(img, (size - w) / 2, (size - h) / 2, w, h);
  return c.toDataURL('image/png');
}

function buildIco() {
  const sizes = selected.length ? [...selected].sort((a,b)=>a-b) : [32];
  const pngs = sizes.map(s => makePng(srcImg, s));
  // ICONDIR: 6 bytes, ICONDIRENTRY: 16 bytes each, then PNG blobs
  const headerLen = 6 + sizes.length * 16;
  let totalPng = pngs.reduce((s, p) => s + p.length, 0);
  const buf = new Uint8Array(headerLen + totalPng);
  const dv = new DataView(buf.buffer);
  // ICONDIR
  dv.setUint16(0, 0, true);      // reserved
  dv.setUint16(2, 1, true);      // type = icon
  dv.setUint16(4, sizes.length, true); // count
  let offset = headerLen;
  sizes.forEach((s, i) => {
    const b = 6 + i * 16;
    dv.setUint8(b, s >= 256 ? 0 : s);     // width
    dv.setUint8(b + 1, s >= 256 ? 0 : s); // height
    dv.setUint8(b + 2, 0);                // color count (0 = 256+)
    dv.setUint8(b + 3, 0);                // reserved
    dv.setUint16(b + 4, 1, true);         // planes
    dv.setUint16(b + 6, 32, true);        // bit count
    dv.setUint32(b + 8, pngs[i].length, true); // size
    dv.setUint32(b + 12, offset, true);        // offset
    buf.set(pngs[i], offset);
    offset += pngs[i].length;
  });
  return buf;
}

$('#btn-go').addEventListener('click', () => {
  if (!srcImg) return;
  const ico = buildIco();
  const blob = new Blob([ico], { type: 'image/x-icon' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = (srcName || 'favicon') + '.ico';
  a.click();
  URL.revokeObjectURL(url);
  $('#status').innerHTML = `<span style="color:var(--gz-success)">✓ ${t('download')} (${selected.join(',')}px) — ${(blob.size/1024).toFixed(1)} KB</span>`;
});

</script>
