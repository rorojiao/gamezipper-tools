.ar-row .lbl{opacity:.8}
.ar-row .val{font-weight:600}
.ar-section-title{font-size:.8em;text-transform:uppercase;letter-spacing:.05em;opacity:.6;margin:14px 0 8px;font-weight:600}
.ar-preset{display:inline-block;padding:6px 12px;margin:3px;border-radius:8px;background:var(--glass2);border:1px solid var(--border);font-size:.8em;cursor:pointer;transition:.2s}
.ar-preset:hover{background:var(--accent);color:#fff}

<script type="application/ld+json">{"@context":"https://schema.org","@type":"WebApplication","name":"AdSense Revenue Calculator","description":"Free Google AdSense revenue calculator. Estimate your website ad earnings from pageviews, CTR, CPC and RPM. See daily, monthly and yearly projected ad income.","url":"https://tools.gamezipper.com/calc/adsense-revenue-calculator.html","applicationCategory":"Utility","operatingSystem":"Web Browser","offers":{"@type":"Offer","price":"0"}}</script>
<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"How is Google AdSense revenue calculated?","acceptedAnswer":{"@type":"Answer","text":"AdSense revenue = Pageviews × (CTR / 100) × CPC. Alternatively, Revenue = Pageviews × (RPM / 1000). CTR is your click-through rate (clicks per pageview), CPC is cost per click, and RPM is revenue per thousand pageviews."}},{"@type":"Question","name":"What is a good AdSense RPM?","acceptedAnswer":{"@type":"Answer","text":"Typical AdSense RPMs range from $1 to $20+ depending on niche. Finance, insurance and legal niches often see $10-$30 RPM. Tech and education average $3-$10. Entertainment and gaming usually $1-$3. High-traffic sites in high-CPC niches earn the most."}},{"@type":"Question","name":"What CTR and CPC should I use?","acceptedAnswer":{"@type":"Answer","text":"A typical AdSense CTR is between 1% and 3%. CPC varies widely by niche: $0.20-$1 for low-paying niches (gaming, entertainment), $1-$5 for mid-tier (tech, health), and $5-$20+ for high-paying niches (finance, law, insurance). Use your actual AdSense data for best results."}},{"@type":"Question","name":"Is my AdSense data private?","acceptedAnswer":{"@type":"Answer","text":"Yes. This calculator runs entirely in your browser. No data is uploaded to any server — your pageview and earnings inputs stay private."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="ar-grid">
      <div class="ar-card" id="input-card"></div>
      <div class="ar-card" id="info-card"></div>
    </div>
    <div class="ar-result" id="results"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'AdSense Revenue Calculator',
    toolDesc: 'Estimate your Google AdSense ad earnings. Enter pageviews, CTR and CPC (or RPM) to see projected daily, monthly and yearly revenue. Free and private — runs in your browser.',
    monthlyPageviews: 'Monthly pageviews',
    ctr: 'Click-through rate (CTR)',
    cpc: 'Cost per click (CPC)',
    rpm: 'Or enter RPM directly',
    niche: 'Niche preset',
    dailyRevenue: 'Daily revenue',
    monthlyRevenue: 'Monthly revenue',
    yearlyRevenue: 'Yearly revenue',
    estimatedClicks: 'Estimated monthly clicks',
    effectiveRPM: 'Effective RPM',
    step1: 'Enter your monthly pageviews',
    step2: 'Set your CTR (typically 1-3%)',
    step3: 'Enter your CPC or use a niche preset',
    step4: 'See projected daily, monthly and yearly ad revenue',
  },
  zh: {
    toolTitle: 'Google AdSense 广告收入计算器',
    toolDesc: '估算你的 Google AdSense 广告收入。输入页面浏览量、点击率和每次点击费用（或 RPM），查看每日、每月和每年的预期广告收入。免费且私密 — 浏览器本地运行。',
    monthlyPageviews: '每月页面浏览量',
    ctr: '点击率 (CTR)',
    cpc: '每次点击费用 (CPC)',
    rpm: '或直接输入 RPM',
    niche: '行业预设',
    dailyRevenue: '每日收入',
    monthlyRevenue: '每月收入',
    yearlyRevenue: '每年收入',
    estimatedClicks: '预计每月点击量',
    effectiveRPM: '有效 RPM',
    step1: '输入每月页面浏览量',
    step2: '设置点击率（通常 1-3%）',
    step3: '输入每次点击费用或使用行业预设',
    step4: '查看每日、每月和每年的预期广告收入',
  }
});

const { $, t } = GZ;

const cur = (n) => {
  const lang = GZI18n.getLang ? GZI18n.getLang() : 'en';
  try { return new Intl.NumberFormat(lang === 'zh' ? 'zh-CN' : 'en-US', {style:'currency', currency:'USD', maximumFractionDigits:2}).format(n); }
  catch(e) { return '$' + n.toFixed(2); }
};

const niches = [
  {name:'🎯 Finance / Insurance', ctr:2.5, cpc:3.50},
  {name:'⚖️ Legal', ctr:2.0, cpc:4.00},
  {name:'💻 Technology', ctr:2.0, cpc:1.50},
  {name:'📚 Education', ctr:2.0, cpc:1.20},
  {name:'🏥 Health', ctr:2.5, cpc:2.00},
  {name:'🎮 Gaming', ctr:1.5, cpc:0.50},
  {name:'🎬 Entertainment', ctr:1.5, cpc:0.40},
  {name:'📰 News', ctr:1.5, cpc:0.60},
  {name:'🏠 Real Estate', ctr:2.0, cpc:2.50},
  {name:'🛒 E-commerce', ctr:2.0, cpc:1.00},
];

$('#input-card').innerHTML = `
  <div class="ar-field">
    <label>${t('monthlyPageviews')}</label>
    <input type="number" id="pageviews" value="50000" min="0" step="1000">
  </div>
  <div class="ar-field">
    <label>${t('ctr')}</label>
    <div class="input-wrap">
      <input type="number" id="ctr" value="2" min="0" max="100" step="0.1">
      <span class="suffix">%</span>
    </div>
  </div>
  <div class="ar-field">
    <label>${t('cpc')}</label>
    <div class="input-wrap">
      <span class="prefix">$</span>
      <input type="number" id="cpc" class="has-prefix" value="1.00" min="0" step="0.01">
    </div>
  </div>
  <div class="ar-field">
    <label>${t('niche')}</label>
    <div id="presets">${niches.map((n,i)=>`<span class="ar-preset" onclick="applyPreset(${i})">${n.name}</span>`).join('')}</div>
  </div>
`;

$('#info-card').innerHTML = `
  <h3 style="margin:0 0 14px;font-size:1.05em">ℹ️ How it works</h3>
  <p style="font-size:.9em;line-height:1.6;opacity:.85">
    This calculator estimates your <strong>Google AdSense revenue</strong>.
    Revenue = Pageviews × (CTR ÷ 100) × CPC. RPM = Revenue ÷ Pageviews × 1000.
  </p>
  <div style="margin-top:14px;padding:12px 14px;background:var(--glass2);border-radius:10px;font-size:.85em;line-height:1.55;opacity:.85">
    <strong>💡 Typical ranges:</strong><br>
    • CTR: 1-3% (display ads)<br>
    • CPC: $0.20 - $5.00 (niche dependent)<br>
    • RPM: $1 - $25+ per 1,000 pageviews
  </div>
  <div style="margin-top:12px;font-size:.85em;line-height:1.6;opacity:.75">
    <strong>Formulas:</strong><br>
    • Clicks = Pageviews × CTR%<br>
    • Revenue = Clicks × CPC<br>
    • RPM = (Revenue ÷ Pageviews) × 1000<br>
    • Daily = Monthly ÷ 30.42<br>
    • Yearly = Monthly × 12
  </div>
`;

function applyPreset(i) {
  const n = niches[i];
  $('#ctr').value = n.ctr;
  $('#cpc').value = n.cpc.toFixed(2);
  calculate();
}

function calculate() {
  const pv = parseFloat($('#pageviews').value) || 0;
  const ctr = (parseFloat($('#ctr').value) || 0) / 100;
  const cpc = parseFloat($('#cpc').value) || 0;

  const clicks = pv * ctr;
  const monthly = clicks * cpc;
  const daily = monthly / 30.42;
  const yearly = monthly * 12;
  const rpm = pv > 0 ? (monthly / pv) * 1000 : 0;

  $('#results').innerHTML = `
    <div class="ar-section-title">${t('monthlyRevenue')}</div>
    <div class="ar-big"><span class="currency">$</span>${monthly.toFixed(2).replace(/\\B(?=(\\d{3})+(?!\\d))/g, ',')}</div>
    <div class="ar-breakdown">
      <div class="ar-row"><span class="lbl">${t('dailyRevenue')}</span><span class="val">${cur(daily)}</span></div>
      <div class="ar-row highlight"><span>${t('monthlyRevenue')}</span><span>${cur(monthly)}</span></div>
      <div class="ar-row"><span class="lbl">${t('yearlyRevenue')}</span><span class="val">${cur(yearly)}</span></div>
    </div>
    <div class="ar-section-title">${t('estimatedClicks')} & ${t('effectiveRPM')}</div>
    <div class="ar-breakdown">
      <div class="ar-row"><span class="lbl">${t('estimatedClicks')}</span><span class="val">${Math.round(clicks).toLocaleString()}</span></div>
      <div class="ar-row"><span class="lbl">${t('effectiveRPM')}</span><span class="val">${cur(rpm)}</span></div>
    </div>`;
}

calculate();
$('#pageviews').addEventListener('input', calculate);
$('#ctr').addEventListener('input', calculate);
$('#cpc').addEventListener('input', calculate);

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1', 'step2', 'step3', 'step4'],
  related: [
    {icon: '📺', href: '/calc/youtube-revenue-calculator.html', name: 'YouTube Revenue'},
    {icon: '📈', href: '/calc/cpm-calculator.html', name: 'CPM Calculator'},
    {icon: '📊', href: '/calc/ctr-calculator.html', name: 'CTR Calculator'},
    {icon: '💰', href: '/calc/budget-planner.html', name: 'Budget Planner'},
  ]
});
</script>
