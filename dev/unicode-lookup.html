const { $, t } = GZ;

// Named HTML entities for common characters (clean, unambiguous set)
const NAMED = {'&':'amp','<':'lt','>':'gt','"':'quot',"'":'apos','\u00A0':'nbsp','\u00A9':'copy','\u00AE':'reg','\u2122':'trade','\u20AC':'euro','\u00A3':'pound','\u00A5':'yen','\u00A2':'cent','\u00A7':'sect','\u00B6':'para','\u00B0':'deg','\u00B1':'plusmn','\u00D7':'times','\u00F7':'divide','\u00BC':'frac14','\u00BD':'frac12','\u00BE':'frac34','\u00AB':'laquo','\u00BB':'raquo','\u2013':'ndash','\u2014':'mdash','\u2018':'lsquo','\u2019':'rsquo','\u201C':'ldquo','\u201D':'rdquo','\u2026':'hellip','\u2190':'larr','\u2191':'uarr','\u2192':'rarr','\u2193':'darr','\u2194':'harr','\u21D2':'rArr','\u21D4':'hArr','\u221E':'infin','\u2260':'ne','\u2264':'le','\u2265':'ge','\u2211':'sum','\u220F':'prod','\u222B':'int','\u221A':'radic','\u2202':'part','\u2207':'nabla','\u2208':'isin','\u2209':'notin','\u2229':'cap','\u222A':'cup','\u2227':'and','\u2228':'or','\u00AC':'not','\u2282':'sub','\u2283':'sup','\u2286':'sube','\u2287':'supe','\u2295':'oplus','\u2297':'otimes','\u22A5':'perp','\u2605':'star','\u2606':'staro','\u2660':'spades','\u2663':'clubs','\u2665':'hearts','\u2666':'diams','\u25CA':'loz','\u2022':'bull','\u2032':'prime','\u2033':'Prime','\u2039':'lsaquo','\u203A':'rsaquo','\u2122':'trade','\u20AC':'euro','\uFB01':'fnof','\uFB02':'fnof'};

// Major Unicode blocks (start, end, name) — abbreviated but covers the common ranges
const BLOCKS = [
  [0x0000,0x007F,'Basic Latin'],[0x0080,0x00FF,'Latin-1 Supplement'],[0x0100,0x017F,'Latin Extended-A'],
  [0x0180,0x024F,'Latin Extended-B'],[0x0250,0x02AF,'IPA Extensions'],[0x02B0,0x02FF,'Spacing Modifier Letters'],
  [0x0300,0x036F,'Combining Diacritical Marks'],[0x0370,0x03FF,'Greek and Coptic'],[0x0400,0x04FF,'Cyrillic'],
  [0x0530,0x058F,'Armenian'],[0x0590,0x05FF,'Hebrew'],[0x0600,0x06FF,'Arabic'],[0x0700,0x074F,'Syriac'],
  [0x0750,0x077F,'Arabic Supplement'],[0x0780,0x07BF,'Thaana'],[0x0900,0x097F,'Devanagari'],
  [0x0980,0x09FF,'Bengali'],[0x0A00,0x0A7F,'Gurmukhi'],[0x0A80,0x0AFF,'Gujarati'],[0x0B80,0x0BFF,'Tamil'],
  [0x0E00,0x0E7F,'Thai'],[0x0E80,0x0EFF,'Lao'],[0x0F00,0x0FFF,'Tibetan'],[0x1000,0x109F,'Myanmar'],
  [0x10A0,0x10FF,'Georgian'],[0x1100,0x11FF,'Hangul Jamo'],[0x1200,0x137F,'Ethiopic'],[0x13A0,0x13FF,'Cherokee'],
  [0x1400,0x167F,'Unified Canadian Aboriginal Syllabics'],[0x1680,0x169F,'Ogham'],[0x16A0,0x16FF,'Runic'],
  [0x1700,0x171F,'Tagalog'],[0x1780,0x17FF,'Khmer'],[0x1800,0x18AF,'Mongolian'],
  [0x2000,0x206F,'General Punctuation'],[0x2070,0x209F,'Superscripts and Subscripts'],[0x20A0,0x20CF,'Currency Symbols'],
  [0x20D0,0x20FF,'Combining Diacritical Marks for Symbols'],[0x2100,0x214F,'Letterlike Symbols'],[0x2150,0x218F,'Number Forms'],
  [0x2190,0x21FF,'Arrows'],[0x2200,0x22FF,'Mathematical Operators'],[0x2300,0x23FF,'Miscellaneous Technical'],
  [0x2400,0x243F,'Control Pictures'],[0x2460,0x24FF,'Enclosed Alphanumerics'],[0x2500,0x257F,'Box Drawing'],
  [0x2580,0x259F,'Block Elements'],[0x25A0,0x25FF,'Geometric Shapes'],[0x2600,0x26FF,'Miscellaneous Symbols'],
  [0x2700,0x27BF,'Dingbats'],[0x2800,0x28FF,'Braille Patterns'],[0x2E80,0x2EFF,'CJK Radicals Supplement'],
  [0x2F00,0x2FDF,'Kangxi Radicals'],[0x3000,0x303F,'CJK Symbols and Punctuation'],[0x3040,0x309F,'Hiragana'],
  [0x30A0,0x30FF,'Katakana'],[0x3100,0x312F,'Bopomofo'],[0x3130,0x318F,'Hangul Compatibility Jamo'],
  [0x3200,0x32FF,'Enclosed CJK Letters and Months'],[0x3400,0x4DBF,'CJK Unified Ideographs Extension A'],
  [0x4E00,0x9FFF,'CJK Unified Ideographs'],[0xA000,0xA48F,'Yi Syllables'],[0xAC00,0xD7AF,'Hangul Syllables'],
  [0xD800,0xDBFF,'High Surrogates'],[0xDC00,0xDFFF,'Low Surrogates'],[0xE000,0xF8FF,'Private Use Area'],
  [0xF900,0xFAFF,'CJK Compatibility Ideographs'],[0xFB00,0xFB4F,'Alphabetic Presentation Forms'],
  [0xFB50,0xFDFF,'Arabic Presentation Forms-A'],[0xFE00,0xFE0F,'Variation Selectors'],[0xFE20,0xFE2F,'Combining Half Marks'],
  [0xFE30,0xFE4F,'CJK Compatibility Forms'],[0xFE50,0xFE6F,'Small Form Variants'],[0xFE70,0xFEFF,'Arabic Presentation Forms-B'],
  [0xFF00,0xFFEF,'Halfwidth and Fullwidth Forms'],[0xFFF0,0xFFFF,'Specials'],
  [0x1F000,0x1F02F,'Mahjong Tiles'],[0x1F300,0x1F5FF,'Miscellaneous Symbols and Pictographs'],
  [0x1F600,0x1F64F,'Emoticons'],[0x1F680,0x1F6FF,'Transport and Map Symbols'],[0x1F900,0x1F9FF,'Supplemental Symbols and Pictographs'],
  [0x1FA00,0x1FA6F,'Chess Symbols'],[0x1FA70,0x1FAFF,'Symbols and Pictographs Extended-A'],
];

function blockOf(cp){
  for(const [s,e,n] of BLOCKS){ if(cp>=s && cp<=e) return n; }
  return cp <= 0x10FFFF ? 'Supplementary' : 'Unknown';
}

// Heuristic category + short name
function describe(cp, ch){
  const b = blockOf(cp);
  let cat = '';
  if(cp < 0x20 || cp === 0x7F) cat = 'Control';
  else if(cp === 0x20) cat = 'Space (separator)';
  else if(/[0-9]/.test(ch)) cat = 'Decimal digit (Nd)';
  else if(/[A-Za-z]/.test(ch)) cat = 'Latin letter (L)';
  else if(/[\u3400-\u9FFF\uF900-\uFAFF]/.test(ch)) cat = 'CJK ideograph (Lo)';
  else if(/[\u3040-\u309F]/.test(ch)) cat = 'Hiragana (Lo)';
  else if(/[\u30A0-\u30FF]/.test(ch)) cat = 'Katakana (Lo)';
  else if(/[\uAC00-\uD7AF]/.test(ch)) cat = 'Hangul syllable (Lo)';
  else if(/[\u0600-\u06FF]/.test(ch)) cat = 'Arabic letter (Lo)';
  else if(/\s/.test(ch)) cat = 'Whitespace (Zs)';
  else if(/[\u2000-\u206F]/.test(ch)) cat = 'Punctuation (P)';
  else if(/[!-/:-@\[-`{-~]/.test(ch)) cat = 'Punctuation / symbol (P/Sm)';
  else if(cp >= 0x1F000) cat = 'Emoji / pictograph (So)';
  else cat = 'Symbol';
  return `${cat} · ${b}`;
}

function utf8Bytes(cp){
  const out = [];
  if(cp < 0x80) out.push(cp);
  else if(cp < 0x800){ out.push(0xC0|(cp>>6), 0x80|(cp&0x3F)); }
  else if(cp < 0x10000){ out.push(0xE0|(cp>>12), 0x80|((cp>>6)&0x3F), 0x80|(cp&0x3F)); }
  else { out.push(0xF0|(cp>>18), 0x80|((cp>>12)&0x3F), 0x80|((cp>>6)&0x3F), 0x80|(cp&0x3F)); }
  return out.map(b=>b.toString(16).toUpperCase().padStart(2,'0')).join(' ');
}

function entityFor(ch, cp){
  if(NAMED[ch]) return '&'+NAMED[ch]+';';
  return '&#'+cp+';';
}

function resolveSearch(v){
  // returns a codepoint number if the query looks like one, else null
  v = v.trim();
  if(!v) return null;
  let m = v.match(/^(?:u\+|\\u|0x)?([0-9a-fA-F]{1,6})$/);
  if(m && /^0x/i.test(v) || /^(u\+|\\u)/i.test(v)) return parseInt(m[1],16);
  if(m && v.length <= 6 && /^[0-9a-fA-F]+$/.test(v) && parseInt(v,16) >= 0x20 && parseInt(v,16) <= 0x10FFFF) return parseInt(v,16);
  if(/^[0-9]+$/.test(v)){ const n = parseInt(v,10); if(n>=0 && n<=0x10FFFF) return n; }
  return null;
}

function render(){
  const text = $('#ul-input').value;
  const q = $('#ul-search').value.trim().toLowerCase();
  const body = $('#ul-body');

  // Build char list (array of {cp, ch})
  const chars = [];
  const cpQuery = resolveSearch(q);
  if(cpQuery !== null){
    // single-codepoint lookup mode
    try {
      const ch = String.fromCodePoint(cpQuery);
      chars.push({cp:cpQuery, ch});
    } catch(e){}
  } else {
    for(const ch of [...text]){
      const cp = ch.codePointAt(0);
      chars.push({cp, ch});
      if(ch.codePointAt(0) > 0xFFFF){ /* skip lone surrogate of the pair */ }
    }
  }

  // filter (only when not in codepoint-lookup mode)
  let rows = chars;
  if(cpQuery === null && q){
    rows = chars.filter(c => {
      if(c.ch === q) return true;
      const name = describe(c.cp, c.ch).toLowerCase();
      const hex = c.cp.toString(16).toUpperCase();
      return name.includes(q) || ('u+'+hex).includes(q) || hex.includes(q.toUpperCase());
    });
  }

  if(!rows.length){
    body.innerHTML = `<tr><td colspan="7" class="ul-empty">${t('empty')}</td></tr>`;
  } else {
    body.innerHTML = rows.map(c => {
      const hex = c.cp.toString(16).toUpperCase().padStart(c.cp>0xFFFF?5:4,'0');
      const dec = c.cp;
      const utf16 = c.cp > 0xFFFF
        ? (0xD800 + ((c.cp-0x10000)>>10)).toString(16).toUpperCase() + ' ' + (0xDC00 + ((c.cp-0x10000)&0x3FF)).toString(16).toUpperCase()
        : hex;
      const disp = c.cp < 0x20 ? '·' : c.ch;
      const ent = entityFor(c.ch, c.cp);
      return `<tr>
        <td class="ch">${c.cp < 0x20 ? '<span style="opacity:.5">'+disp+'</span>' : disp}</td>
        <td class="cp">U+${hex}</td>
        <td class="mono">${dec.toLocaleString()}</td>
        <td class="mono">${utf8Bytes(c.cp)}</td>
        <td class="mono">${utf16}</td>
        <td class="mono">${ent.replace(/&/g,'&amp;')}</td>
        <td>${describe(c.cp, c.ch)}</td>
      </tr>`;
    }).join('');
  }
  $('#ul-count').textContent = `${rows.length} / ${chars.length}`;
}

$('#ul-input').addEventListener('input', ()=>{ $('#ul-search').value=''; render(); });
$('#ul-search').addEventListener('input', render);

});
document.querySelectorAll('[id-lang]').forEach(el=>{ const k=el.getAttribute('id-lang'); if(el.tagName==='TEXTAREA') el.placeholder=t(k); else el.textContent=t(k); });
render();
</script>
