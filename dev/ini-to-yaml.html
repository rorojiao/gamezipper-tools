let autoType = true;
const { $, copyText, t } = GZ;

function needsYamlQuote(s) {
  if (s === '') return true;
  // Quote if contains special chars or starts with indicator chars
  if (/[:#\[\]{}&*!|>'"%@`,"]/.test(s)) return true;
  if (/^\s|\s$/.test(s)) return true;
  if (/^[?&*!|>%@`"',#\-]/.test(s)) return true;
  // looks like number/bool/null (to keep as string when autoType off)
  if (/^(true|false|null|yes|no|~)$/i.test(s)) return true;
  if (/^-?\d+(\.\d+)?([eE][+-]?\d+)?$/.test(s)) return true;
  return false;
}

function yamlScalar(value) {
  if (autoType) {
    if (/^-?\d+$/.test(value)) return value; // integer as-is
    if (/^-?\d+\.\d+([eE][+-]?\d+)?$/.test(value)) return value;
    if (value === 'true' || value === 'false') return value;
    if (value === 'null') return value;
  }
  // Otherwise treat as string — quote if necessary
  if (needsYamlQuote(value)) {
    return '"' + value.replace(/\\/g,'\\\\').replace(/"/g,'\\"') + '"';
  }
  return value;
}

function parseINI(text) {
  const sections = {};
  let currentSection = null;
  const rootKeys = [];
  const lines = text.split(/\r?\n/);
  for (let raw of lines) {
    let line = raw.trim();
    if (!line) continue;
    if (line.startsWith(';') || line.startsWith('#')) continue;
    const secMatch = line.match(/^\[(.+)\]$/);
    if (secMatch) {
      currentSection = secMatch[1].trim();
      if (!sections[currentSection]) sections[currentSection] = [];
      continue;
    }
    const eqIdx = line.indexOf('=');
    if (eqIdx === -1) continue;
    const key = line.substring(0, eqIdx).trim();
    let value = line.substring(eqIdx + 1).trim();
    if (value.startsWith('"') && value.endsWith('"') && value.length >= 2) {
      value = value.substring(1, value.length - 1);
    } else {
      const cmt = value.search(/\s+[;#]/);
      if (cmt !== -1) value = value.substring(0, cmt).trim();
    }
    const pair = { key, value };
    if (currentSection) sections[currentSection].push(pair);
    else rootKeys.push(pair);
  }
  return { sections, rootKeys };
}

function toYAML(text) {
  const { sections, rootKeys } = parseINI(text);
  let out = '';
  for (const { key, value } of rootKeys) {
    out += `${key}: ${yamlScalar(value)}\n`;
  }
  if (rootKeys.length && Object.keys(sections).length) out += '\n';
  const secNames = Object.keys(sections);
  secNames.forEach((sec, idx) => {
    out += `${sec}:\n`;
    for (const { key, value } of sections[sec]) {
      out += `  ${key}: ${yamlScalar(value)}\n`;
    }
    if (idx < secNames.length - 1) out += '\n';
  });
  return out.trimEnd();
}

function doConvert() {
  const inp = $('#input').value.trim();
  if (!inp) { $('#output').textContent = ''; $('#status').innerHTML = ''; return; }
  try {
    const yaml = toYAML(inp);
    $('#output').textContent = yaml;
    const lineCount = yaml.split('\n').length;
    $('#status').innerHTML = `<span style="color:var(--gz-success)">${t('valid')}</span> <span style="opacity:.7">(${lineCount} lines)</span>`;
  } catch(e) {
    $('#status').innerHTML = `<span style="color:var(--gz-accent)">Error: ${e.message}</span>`;
    $('#output').textContent = '';
  }
}

function loadExample() {

  doConvert();
}

function doClear() { $('#input').value = ''; $('#output').textContent = ''; $('#status').innerHTML = ''; }

$('#input').addEventListener('input', doConvert);
