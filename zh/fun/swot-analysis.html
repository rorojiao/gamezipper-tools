<script>
GZI18n.register({
  en: {
    toolTitle: 'SWOT Analysis Generator',
    toolDesc: 'Build a free SWOT analysis online. List your Strengths, Weaknesses, Opportunities and Threats, then export as PNG, Markdown or PDF.',
    strengths: 'Strengths', weaknesses: 'Weaknesses', opportunities: 'Opportunities', threats: 'Threats',
    sTag: 'Internal · Helpful', wTag: 'Internal · Harmful', oTag: 'External · Helpful', tTag: 'External · Harmful',
    sHint: 'What do you do well?\nUnique assets?\nAdvantages?',
    wHint: 'What can you improve?\nResource gaps?\nDisadvantages?',
    oHint: 'Market trends?\nNew tech?\nPartnerships?',
    tHint: 'Competitors?\nRegulations?\nRisks?',
    titlePh: 'Project / company name (optional)',
    downloadPNG: 'Download PNG', copyMd: 'Copy Markdown', print: 'Print / PDF', clear: 'Clear', example: 'Example',
    step1: 'Enter an optional title at the top for your project or company',
    step2: 'Type your points into each of the four quadrants — one per line',
    step3: 'Click Download PNG for an image, or Copy Markdown for docs',
    step4: 'Use Print to save your SWOT as a PDF',
  },
  zh: {
    toolTitle: 'SWOT 分析图生成器',
    toolDesc: '在线免费制作 SWOT 分析图。填写优势、劣势、机会和威胁，可导出 PNG、Markdown 或 PDF。',
    strengths: '优势 Strengths', weaknesses: '劣势 Weaknesses', opportunities: '机会 Opportunities', threats: '威胁 Threats',
    sTag: '内部 · 有利', wTag: '内部 · 不利', oTag: '外部 · 有利', tTag: '外部 · 不利',
    sHint: '你擅长什么？\n独特资源？\n竞争优势？',
    wHint: '需要改进什么？\n资源缺口？\n不利因素？',
    oHint: '市场趋势？\n新技术？\n合作机会？',
    tHint: '竞争对手？\n法规变化？\n潜在风险？',
    titlePh: '项目 / 公司名称（可选）',
    downloadPNG: '下载 PNG', copyMd: '复制 Markdown', print: '打印 / PDF', clear: '清空', example: '示例',
    step1: '在顶部为项目或公司填写一个可选标题',
    step2: '在四个象限中输入要点，每行一条',
    step3: '点击「下载 PNG」获取图片，或「复制 Markdown」用于文档',
    step4: '使用「打印」将 SWOT 保存为 PDF',
  }
});

const { $, copyText, t, showToast } = GZ;
const Q = [
  {key:'s', cls:'q-s', icon:'💪', nameKey:'strengths', tagKey:'sTag', hintKey:'sHint'},
  {key:'w', cls:'q-w', icon:'⚠️', nameKey:'weaknesses', tagKey:'wTag', hintKey:'wHint'},
  {key:'o', cls:'q-o', icon:'🌟', nameKey:'opportunities', tagKey:'oTag', hintKey:'oHint'},
  {key:'t', cls:'q-t', icon:'🚨', nameKey:'threats', tagKey:'tTag', hintKey:'tHint'},
];

function buildGrid() {
  $('#grid').innerHTML = Q.map(q => `
    <div class="swot-quadrant ${q.cls}">
      <h3><span>${q.icon}</span><span>${t(q.nameKey)}</span> <span class="swot-tag">${t(q.tagKey)}</span></h3>
      <textarea id="qa-${q.key}" placeholder="${t(q.hintKey).replace(/\n/g,'&#10;')}"></textarea>
    </div>`).join('');
}

function lines(id) { return $('#'+id).value.split('\n').map(s => s.trim()).filter(Boolean); }

function loadExample() {
  const ex = {
    s: ['Strong brand recognition','Skilled engineering team','Proprietary technology','Loyal customer base'],
    w: ['Limited marketing budget','Slow customer support','No mobile app yet','High staff turnover'],
    o: ['Growing demand for AI tools','Expansion into APAC markets','Strategic partnership with X','New subscription tier'],
    t: ['New low-cost competitor','Stricter data privacy laws','Economic downturn','Key supplier risk'],
  };
  Q.forEach(q => { $('#qa-'+q.key).value = ex[q.key].join('\n'); });
  $('#title-input').value = 'GameZipper Inc. — 2026 Strategy';
}

function clearAll() { Q.forEach(q => $('#qa-'+q.key).value = ''); $('#title-input').value=''; }

function copyMarkdown() {
  const title = $('#title-input').value.trim() || 'SWOT Analysis';
  const data = {s: lines('qa-s'), w: lines('qa-w'), o: lines('qa-o'), t: lines('qa-t')};
  const cell = arr => arr.length ? arr.map(x => '• ' + x).join('  \n') : '—';
  const md = `# ${title}\n\n| ${t('strengths')} | ${t('weaknesses')} |\n|---|---|\n| ${cell(data.s).replace(/\n/g,'<br>')} | ${cell(data.w).replace(/\n/g,'<br>')} |\n\n| ${t('opportunities')} | ${t('threats')} |\n|---|---|\n| ${cell(data.o).replace(/\n/g,'<br>')} | ${cell(data.t).replace(/\n/g,'<br>')} |\n`;
  copyText(md); showToast(t('copied') || '✓ Copied');
}

function downloadPNG() {
  const title = $('#title-input').value.trim() || t('toolTitle');
  const data = {s: lines('qa-s'), w: lines('qa-w'), o: lines('qa-o'), t: lines('qa-t')};
  const W = 1600, H = 1100, pad = 40, gap = 24;
  const cv = document.createElement('canvas');
  cv.width = W; cv.height = H;
  const ctx = cv.getContext('2d');
  ctx.fillStyle = '#ffffff'; ctx.fillRect(0,0,W,H);
  ctx.fillStyle = '#1a1a2e'; ctx.font = 'bold 44px Arial'; ctx.textAlign = 'center';
  ctx.fillText(title, W/2, 70);
  ctx.font = '20px Arial'; ctx.fillStyle = '#888';
  ctx.fillText('SWOT Analysis · tools.gamezipper.com', W/2, 100);
  const cols = [['s','#2e7d32','💪'],['w','#c62828','⚠️'],['o','#1565c0','🌟'],['t','#ef6c00','🚨']];
  const labels = {s:t('strengths'),w:t('weaknesses'),o:t('opportunities'),t:t('threats')};
  const qw = (W - pad*2 - gap)/2, qh = (H - 140 - pad - gap)/2;
  const pos = {s:[pad,140], w:[pad+qw+gap,140], o:[pad,140+qh+gap], t:[pad+qw+gap,140+qh+gap]};
  cols.forEach(([k,col,ic]) => {
    const [x,y] = pos[k];
    ctx.fillStyle = col + '18'; roundRect(ctx, x, y, qw, qh, 16, true);
    ctx.strokeStyle = col + '80'; ctx.lineWidth = 2; roundRect(ctx, x, y, qw, qh, 16, false, true);
    ctx.fillStyle = col; ctx.font = 'bold 28px Arial'; ctx.textAlign = 'left';
    ctx.fillText(ic + '  ' + labels[k], x + 22, y + 44);
    ctx.font = '20px Arial'; ctx.fillStyle = '#333';
    let ly = y + 86;
    (data[k].length ? data[k] : ['—']).forEach(line => {
      const wrapped = wrapText(ctx, '• ' + line, qw - 44);
      wrapped.forEach(w => { ctx.fillText(w, x + 22, ly); ly += 30; });
    });
  });
  const link = document.createElement('a');
  link.download = 'swot-analysis.png';
  link.href = cv.toDataURL('image/png');
  link.click();
}
function roundRect(ctx,x,y,w,h,r,fill,stroke){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();if(fill)ctx.fill();if(stroke)ctx.stroke();}
function wrapText(ctx,text,maxW){const words=text.split(' ');const lines=[];let cur='';words.forEach(w=>{const test=cur?cur+' '+w:w;if(ctx.measureText(test).width>maxW&&cur){lines.push(cur);cur=w;}else cur=test;});if(cur)lines.push(cur);return lines.length?lines:[text];}

buildGrid();
$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="downloadPNG()">🖼️ ${t('downloadPNG')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="copyMarkdown()">📋 ${t('copyMd')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="window.print()">🖨️ ${t('print')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="clearAll()">${t('clear')}</button>`;
$('#title-input').placeholder = t('titlePh');

GZ.renderToolPage({
  category: 'fun',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🎯', href:'/fun/eisenhower-matrix.html', name:'Eisenhower Matrix'},
    {icon:'⚖️', href:'/fun/decision-matrix.html', name:'Decision Matrix'},
    {icon:'🐟', href:'/fun/fishbone-diagram.html', name:'Fishbone Diagram'},
    {icon:'🗂️', href:'/fun/kanban-board.html', name:'Kanban Board'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
