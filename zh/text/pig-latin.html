const VOWELS = /[aeiouAEIOU]/;

function isVowel(ch) {
  return /[aeiouAEIOU]/.test(ch);
}

function engToPigLatin(token) {
  // Match pattern: optional prefix (non-letters), word letters, optional suffix (non-letters)
  const m = token.match(/^([^\p{L}]*)(\p{L}+)([^\p{L}]*)$/u);
  if (!m) return token;
  const [, pre, word, suf] = m;
  if (!word) return token;
  // Capture original capitalization
  const isCap = /^\p{Lu}/u.test(word);
  let lower = word.toLowerCase();

  // Find first vowel (only a, e, i, o, u — not y)
  let firstVowel = -1;
  for (let i = 0; i < lower.length; i++) {
    if (isVowel(lower[i])) { firstVowel = i; break; }
  }
  let result;
  if (firstVowel === 0) {
    result = lower + 'yay';
  } else if (firstVowel > 0) {
    const head = lower.substring(0, firstVowel);
    const tail = lower.substring(firstVowel);
    result = tail + head + 'ay';
  } else {
    // No vowel at all (e.g. "rhythm", "sky") — append 'ay'
    result = lower + 'ay';
  }
  if (isCap) result = result.charAt(0).toUpperCase() + result.substring(1);
  return pre + result + suf;
}

function pigToEnglish(token) {
  const m = token.match(/^([^\p{L}]*)(\p{L}+)([^\p{L}]*)$/u);
  if (!m) return token;
  const [, pre, word, suf] = m;
  if (!word) return token;
  const lower = word.toLowerCase();
  let result;
  if (lower.endsWith('yay')) {
    // Vowel-starting: strip 'yay'
    result = lower.substring(0, lower.length - 3);
  } else if (lower.endsWith('ay')) {
    const stem = lower.substring(0, lower.length - 2);
    // Find first vowel in stem
    let i = 0;
    while (i < stem.length && !isVowel(stem[i])) i++;
    if (i === 0 || i >= stem.length) {
      result = stem;
    } else {
      // The cluster before the first vowel was originally at the end
      // and the rest (starting with the vowel) was originally at the start
      const cluster = stem.substring(0, i);
      const rest = stem.substring(i);
      result = rest + cluster;
    }
  } else {
    return token;
  }
  if (/^\p{Lu}/u.test(word)) result = result.charAt(0).toUpperCase() + result.substring(1);
  return pre + result + suf;
}

function translateText(text, mode) {
  // Split preserving whitespace and punctuation
  return text.replace(/[^\s]+/g, tok => {
    if (mode === 'e2p') return engToPigLatin(tok);
    return pigToEnglish(tok);
  });
}
