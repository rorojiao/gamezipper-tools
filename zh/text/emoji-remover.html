<script>
GZI18n.register({
  en: {
    toolTitle: 'Emoji Remover',
    toolDesc: 'Strip all emojis, emoticons and symbols from text instantly. Paste, clean, copy.',
    removedCount: 'Emojis removed',
    charBefore: 'Characters before',
    charAfter: 'Characters after',

    optionMath: 'Keep math symbols',
    optionArrows: 'Keep arrows',
    step1: 'Paste or type text containing emojis in the input area',
    step2: 'Click "Remove Emojis" to strip all emoji characters',
    step3: 'Optionally toggle options to preserve specific symbol categories',
    step4: 'Copy the clean text to clipboard',
  },
  zh: {
    toolTitle: 'Emoji 移除工具',
    toolDesc: '即时移除文本中所有 Emoji、表情符号和特殊符号。粘贴、清除、复制。',
    removedCount: '移除的 Emoji 数',
    charBefore: '处理前字符数',
    charAfter: '处理后字符数',
    optionCurrency: '保留货币符号',
    optionMath: '保留数学符号',
    optionArrows: '保留箭头符号',
    step1: '在输入区粘贴或输入包含 Emoji 的文本',
    step2: '点击「移除 Emoji」清除所有表情字符',
    step3: '可选择保留特定符号类别（如货币、数学符号）',
    step4: '复制干净的文本到剪贴板',
  }
});

const { $, copyText, t } = GZ;
let keepCurrency = false, keepMath = false, keepArrows = false;

function removeEmojis(text) {
  let result = text;
  // Remove emoji using Unicode ranges
  result = result.replace(/[\u{1F600}-\u{1F64F}]/gu, ''); // Emoticons
  result = result.replace(/[\u{1F300}-\u{1F5FF}]/gu, ''); // Misc Symbols and Pictographs
  result = result.replace(/[\u{1F680}-\u{1F6FF}]/gu, ''); // Transport and Map
  result = result.replace(/[\u{1F1E0}-\u{1F1FF}]{2}/gu, ''); // Flags (regional indicators)
  result = result.replace(/[\u{2600}-\u{26FF}]/gu, ''); // Misc symbols
  result = result.replace(/[\u{2700}-\u{27BF}]/gu, ''); // Dingbats
  result = result.replace(/[\u{FE00}-\u{FE0F}]/gu, ''); // Variation selectors
  result = result.replace(/[\u{1F900}-\u{1F9FF}]/gu, ''); // Supplemental Symbols A
  result = result.replace(/[\u{1FA00}-\u{1FA6F}]/gu, ''); // Chess Symbols
  result = result.replace(/[\u{1FA70}-\u{1FAFF}]/gu, ''); // Symbols and Pictographs A
  result = result.replace(/[\u{1F000}-\u{1F02F}]/gu, ''); // Mahjong, Dominos
  result = result.replace(/[\u{238C}-\u{2454}]/gu, ''); // Misc
  result = result.replace(/[\u{20D0}-\u{20FF}]/gu, ''); // Combining Diacritical Marks for Symbols
  result = result.replace(/[\u{2300}-\u{23FF}]/gu, ''); // Misc Technical (most are symbols)
  result = result.replace(/[\u{2B50}-\u{2B55}]/gu, ''); // Stars etc
  result = result.replace(/[\u{2934}-\u{2935}]/gu, ''); // Arrows
  result = result.replace(/[\u{25AA}-\u{25FE}]/gu, ''); // Geometric shapes
  result = result.replace(/[\u{200D}]/gu, ''); // ZWJ
  result = result.replace(/[\u{E0020}-\u{E007F}]/gu, ''); // Tags
  result = result.replace(/(?:^|\s)[;:][\-]?[)D] ?/g, ' '); // Basic text emoticons
  result = result.replace(/(?:^|\s)[)D][\-]?[:;] ?/g, ' ');

  if (!keepCurrency) {
    result = result.replace(/[\u{20A0}-\u{20CF}]/gu, '');
    result = result.replace(/[¥€£₹₽₩₺₴₦₫₱¢]/g, '');
  }
  if (!keepMath) {
    result = result.replace(/[\u{2200}-\u{22FF}]/gu, '');
    result = result.replace(/[±×÷≠≈∞∑∏√∂∫]/g, '');
  }
  if (!keepArrows) {
    result = result.replace(/[\u{2190}-\u{21FF}]/gu, '');
    result = result.replace(/[←↑→↓↔↕⇐⇑⇒⇓⇔⇕]/g, '');
  }
  // Clean up extra spaces
  result = result.replace(/  +/g, ' ').trim();
  return result;
}

function processText() {
  const inp = $('#input').value;
  if (!inp) { $('#output').value = ''; $('#stats').innerHTML = ''; return; }
  const cleaned = removeEmojis(inp);
  $('#output').value = cleaned;
  const removed = inp.length - cleaned.length;
  $('#stats').innerHTML = `<span>${t('charBefore')}: ${inp.length}</span><span>${t('charAfter')}: ${cleaned.length}</span><span>${t('removedCount')}: ${removed >= 0 ? removed : 0}</span>`;
}

function loadExample() {
  $('#input').value = 'Hello 👋 World! 🌍 I love 🍕 and ☕. Let\'s code 🚀 together 💪✨ Great job! 🎉🏆⭐';
  processText();
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="processText()">${t('format')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="copyText($('#output').value)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#input').value='';$('#output').value='';$('#stats').innerHTML=''">${t('clear')}</button>
  <label style="display:inline-flex;align-items:center;gap:4px;font-size:.85em;cursor:pointer"><input type="checkbox" id="optCur" onchange="keepCurrency=this.checked;processText()"> ${t('optionCurrency')}</label>
  <label style="display:inline-flex;align-items:center;gap:4px;font-size:.85em;cursor:pointer"><input type="checkbox" id="optMath" onchange="keepMath=this.checked;processText()"> ${t('optionMath')}</label>
  <label style="display:inline-flex;align-items:center;gap:4px;font-size:.85em;cursor:pointer"><input type="checkbox" id="optArr" onchange="keepArrows=this.checked;processText()"> ${t('optionArrows')}</label>`;

$('#input').addEventListener('input', processText);

    {icon:'🧹', href:'/text/remove-duplicates.html', name:'Remove Duplicates'},
    {icon:'⬜', href:'/text/remove-empty-lines.html', name:'Remove Empty Lines'},
    {icon:'🔤', href:'/text/case-converter.html', name:'Case Converter'},
  ]
});
</script>
