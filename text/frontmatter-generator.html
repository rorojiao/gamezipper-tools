<script>
GZI18n.register({
  en: {
    toolTitle: 'YAML Front Matter Generator',
    toolDesc: 'Generate clean YAML front matter for Markdown blog posts. Works with Jekyll, Hugo, Eleventy (11ty), Astro, Gatsby, Hexo and more. Title, date, tags, categories, draft, layout and custom fields — free, browser-only.',
    stBasic: 'Basic Fields',
    stTaxo: 'Taxonomy',
    stCustom: 'Custom Fields',
    lblTitle: 'title', lblDesc: 'description', lblDate: 'date', lblAuthor: 'author', lblSlug: 'slug', lblDraft: 'draft', lblLayout: 'layout',
    lblTags: 'tags', lblCats: 'categories',
    addCustom: '+ Add Custom Field', remove: '✕', key: 'key', value: 'value',
    outLabel: 'Generated Front Matter',
    copy: 'Copy YAML', copyMd: 'Copy with --- wrapper', download: 'Download .md',
    note: '💡 Paste this at the very top of your Markdown file (before any content). Jekyll/Hugo/Eleventy will read these fields automatically. Add a blank line after the closing --- before your content.',
    s1: 'Fill in the basic fields — title, date, author, slug',
    s2: 'Add tags and categories by typing and pressing Enter or comma',
    s3: 'Optionally add custom key/value fields',
    s4: 'Copy the YAML and paste at the top of your .md file',
    rMd: 'Markdown Editor', rMdHtml: 'Markdown → HTML', rMdToc: 'Markdown TOC', rMdTable: 'Markdown Table', rMdLint: 'Markdown Linter', rSlug: 'Slug Generator'
  },
  zh: {
    toolTitle: 'YAML Front Matter 生成器',
    toolDesc: '为 Markdown 博客文章生成干净的 YAML front matter。兼容 Jekyll、Hugo、Eleventy（11ty）、Astro、Gatsby、Hexo 等。支持 title、date、tags、categories、draft、layout 和自定义字段 — 免费，浏览器本地运行。',
    stBasic: '基础字段',
    stTaxo: '分类标签',
    stCustom: '自定义字段',
    lblTitle: '标题 title', lblDesc: '描述 description', lblDate: '日期 date', lblAuthor: '作者 author', lblSlug: '路径 slug', lblDraft: '草稿 draft', lblLayout: '布局 layout',
    lblTags: '标签 tags', lblCats: '分类 categories',
    addCustom: '+ 添加自定义字段', remove: '✕', key: '键', value: '值',
    outLabel: '生成的 Front Matter',
    copy: '复制 YAML', copyMd: '复制带 --- 包裹', download: '下载 .md',
    note: '💡 将此内容粘贴到 Markdown 文件最顶部（任何正文之前）。Jekyll/Hugo/Eleventy 会自动读取这些字段。在结尾 --- 后空一行再写正文。',
    s1: '填写基础字段 — title、date、author、slug',
    s2: '输入并按回车或逗号添加 tags 和 categories',
    s3: '可选添加自定义键值字段',
    s4: '复制 YAML，粘贴到 .md 文件顶部',
    rMd: 'Markdown 编辑器', rMdHtml: 'Markdown → HTML', rMdToc: 'Markdown 目录', rMdTable: 'Markdown 表格', rMdLint: 'Markdown Linter', rSlug: 'Slug 生成器'
  }
});

const { $, copyText, t } = GZ;
let tags=['javascript','tutorial'];
let cats=['coding'];
let customs=[{k:'hero_image',v:'/img/hero.jpg'},{k:'weight',v:'5'}];

/* ---------- YAML escaper ---------- */
function yamlVal(v){
  v=String(v);
  if(v==='')return '""';
  // strings needing quotes
  if(/^[\d.\-+]/.test(v)||/[:#?@,&*!|>'"%{}[\]]/.test(v)||/^(true|false|null|yes|no|on|off)$/i.test(v)||v.includes('\n')){
    return '"'+v.replace(/\\/g,'\\\\').replace(/"/g,'\\"')+'"';
  }
  return v;
}

function generate(){
  const out=[];
  const title=$('#fTitle').value.trim();
  const desc=$('#fDesc').value.trim();
  const date=$('#fDate').value;
  const author=$('#fAuthor').value.trim();
  const slug=$('#fSlug').value.trim();
  const draft=$('#fDraft').value;
  const layout=$('#fLayout').value.trim();
  if(title)out.push('title: '+yamlVal(title));
  if(desc)out.push('description: '+yamlVal(desc));
  if(date)out.push('date: '+date+'T00:00:00+00:00');
  if(author)out.push('author: '+yamlVal(author));
  if(slug)out.push('slug: '+slug);
  if(layout)out.push('layout: '+yamlVal(layout));
  out.push('draft: '+draft);
  if(tags.length)out.push('tags:\n'+tags.map(tg=>'  - '+yamlVal(tg)).join('\n'));
  if(cats.length)out.push('categories:\n'+cats.map(c=>'  - '+yamlVal(c)).join('\n'));
  customs.forEach(c=>{
    if(c.k.trim())out.push(c.k.trim()+': '+yamlVal(c.v));
  });
  $('#output').textContent='---\n'+out.join('\n')+'\n---';
}

/* ---------- Chip input ---------- */
function renderChips(containerId,arr){
  const c=$('#'+containerId);
  c.innerHTML=arr.map((v,i)=>`<span class="chip">${esc(v)}<span class="x" onclick="removeChip('${containerId}',${i})">✕</span></span>`).join('')+
    `<input type="text" class="chip-input" placeholder="${containerId==='tagChips'?'tag, …':'category, …'}" onkeydown="chipKey(event,'${containerId}')">`;
  const inp=c.querySelector('.chip-input');
  inp.focus();
  inp.onblur=()=>{if(inp.value.trim()){arr.push(inp.value.trim());renderChips(containerId,arr);generate();}};
}
function esc(s){return(s||'').replace(/</g,'&lt;');}
function removeChip(id,i){
  const arr=id==='tagChips'?tags:cats;
  arr.splice(i,1);renderChips(id,arr);generate();
}
function chipKey(e,id){
  const arr=id==='tagChips'?tags:cats;
  if(e.key==='Enter'||e.key===','){
    e.preventDefault();
    const v=e.target.value.trim();
    if(v){arr.push(v.replace(/,$/, ''));renderChips(id,arr);generate();}
  }
}

/* ---------- Custom fields ---------- */
function renderCustoms(){
  $('#customFields').innerHTML=customs.map((c,i)=>`
    <div class="custom-row">
      <input type="text" data-i="${i}" data-f="k" value="${esc(c.k)}" placeholder="${t('key')}">
      <input type="text" data-i="${i}" data-f="v" value="${esc(c.v)}" placeholder="${t('value')}">
      <button class="rm" onclick="removeCustom(${i})">✕</button>
    </div>`).join('');
  document.querySelectorAll('#customFields input').forEach(el=>{
    el.oninput=()=>{customs[+el.dataset.i][el.dataset.f]=el.value;generate();};
  });
}
function addCustom(){customs.push({k:'',v:''});renderCustoms();}
function removeCustom(i){customs.splice(i,1);renderCustoms();generate();}

/* ---------- Toolbar ---------- */
function downloadMd(){
  const blob=new Blob(['---\n'+$('#output').textContent.replace(/^---\n/,'').replace(/\n---$/,'')+'\n---\n\n# '+$('#fTitle').value+'\n\nWrite your content here.\n'],{type:'text/markdown'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=($('#fSlug').value||'post')+'.md';
  document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(url);
}

/* ---------- Init ---------- */
$('#fDate').value=new Date().toISOString().slice(0,10);
['fTitle','fDesc','fDate','fAuthor','fSlug','fDraft','fLayout'].forEach(id=>{$('#'+id).oninput=generate;$('#'+id).onchange=generate;});
$('#stBasic').textContent=t('stBasic');
$('#stTaxo').textContent=t('stTaxo');
$('#stCustom').textContent=t('stCustom');
$('#lblTitle').textContent=t('lblTitle');
$('#lblDesc').textContent=t('lblDesc');
$('#lblDate').textContent=t('lblDate');
$('#lblAuthor').textContent=t('lblAuthor');
$('#lblSlug').textContent=t('lblSlug');
$('#lblDraft').textContent=t('lblDraft');
$('#lblLayout').textContent=t('lblLayout');
$('#lblTags').textContent=t('lblTags');
$('#lblCats').textContent=t('lblCats');
$('#addCustomBtn').textContent=t('addCustom');
$('#addCustomBtn').onclick=addCustom;
$('#outLabel').textContent=t('outLabel');
$('#note').textContent=t('note');

$('#toolbar').innerHTML=`
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="downloadMd()">${t('download')}</button>`;

renderChips('tagChips',tags);
renderChips('catChips',cats);
renderCustoms();
generate();

GZ.renderToolPage({
  category:'text',
  titleKey:'toolTitle',
  descKey:'toolDesc',
  howToSteps:['s1','s2','s3','s4'],
  related:[
    {icon:'✍️',href:'/text/markdown-editor.html',nameKey:'rMd'},
    {icon:'📄',href:'/text/markdown-to-html.html',nameKey:'rMdHtml'},
    {icon:'📑',href:'/text/markdown-toc.html',nameKey:'rMdToc'},
    {icon:'📊',href:'/text/markdown-table.html',nameKey:'rMdTable'},
    {icon:'🔍',href:'/text/markdown-linter.html',nameKey:'rMdLint'},
    {icon:'🔗',href:'/text/slug.html',nameKey:'rSlug'}
  ]
});
</script>
