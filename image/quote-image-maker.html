<script>
GZI18n.register({
  en: {
    toolTitle: 'Quote Image Maker',
    toolDesc: 'Turn any text or quote into a beautiful shareable image. 8 templates, custom fonts, colors, gradients and backgrounds. Download PNG — perfect for Instagram, Pinterest and Twitter.',
    download: '⬇️ Download PNG',
    randomQuote: '🎲 Random Quote',
    lblQuote: 'Quote text',
    lblAuthor: 'Author (optional)',
    lblTemplate: 'Background template',
    lblSize: 'Image size',
    lblFont: 'Font family',
    lblTextcolor: 'Text color',
    lblFontsize: 'Font size',
    lblLibrary: 'Or pick a famous quote',
    step1: 'Type your quote and author in the text fields',
    step2: 'Pick a background template, font and text color',
    step3: 'Adjust font size and choose an image size preset',
    step4: 'Click Download PNG to save your shareable quote image',
  },
  zh: {
    toolTitle: '名言图片生成器',
    toolDesc: '将任意文字或名言转换为精美的可分享图片。8 种模板、自定义字体、颜色、渐变和背景。下载 PNG — 适用于 Instagram、Pinterest 和 Twitter。',
    download: '⬇️ 下载 PNG',
    randomQuote: '🎲 随机名言',
    lblQuote: '名言文字',
    lblAuthor: '作者（可选）',
    lblTemplate: '背景模板',
    lblSize: '图片尺寸',
    lblFont: '字体',
    lblTextcolor: '文字颜色',
    lblFontsize: '字体大小',
    lblLibrary: '或选择经典名言',
    step1: '在文本框中输入你的名言和作者',
    step2: '选择背景模板、字体和文字颜色',
    step3: '调整字体大小并选择图片尺寸预设',
    step4: '点击「下载 PNG」保存可分享的名言图片',
  }
});

const { $, t } = GZ;
const canvas = $('#quote-canvas');
const ctx = canvas.getContext('2d');

const TEMPLATES = [
  { id: 'sunset', name: '🌅 Sunset', type: 'gradient', stops: [['#ff7e5f', 0], ['#feb47b', 1]] },
  { id: 'ocean', name: '🌊 Ocean', type: 'gradient', stops: [['#2193b0', 0], ['#6dd5ed', 1]] },
  { id: 'dark', name: '🌑 Dark', type: 'solid', color: '#1a1a2e' },
  { id: 'purple', name: '🟣 Purple', type: 'gradient', stops: [['#8E2DE2', 0], ['#4A00E0', 1]] },
  { id: 'forest', name: '🌲 Forest', type: 'gradient', stops: [['#11998e', 0], ['#38ef7d', 1]] },
  { id: 'cherry', name: '🌸 Cherry', type: 'gradient', stops: [['#eb3349', 0], ['#f45c43', 1]] },
  { id: 'mint', name: '🌿 Mint', type: 'gradient', stops: [['#00b09b', 0], ['#96c93d', 1]] },
  { id: 'cream', name: '🤍 Cream', type: 'solid', color: '#f5f0e6', defaultText: '#222' },
];

const FAMOUS_QUOTES = [
  { q: 'The only way to do great work is to love what you do.', a: '— Steve Jobs' },
  { q: 'In the middle of difficulty lies opportunity.', a: '— Albert Einstein' },
  { q: 'Be the change you wish to see in the world.', a: '— Mahatma Gandhi' },
  { q: 'Success is not final, failure is not fatal: it is the courage to continue that counts.', a: '— Winston Churchill' },
  { q: 'The journey of a thousand miles begins with a single step.', a: '— Lao Tzu' },
  { q: 'Whether you think you can or you think you can\'t, you\'re right.', a: '— Henry Ford' },
  { q: 'Life is what happens when you\'re busy making other plans.', a: '— John Lennon' },
  { q: 'The future belongs to those who believe in the beauty of their dreams.', a: '— Eleanor Roosevelt' },
  { q: 'It does not matter how slowly you go as long as you do not stop.', a: '— Confucius' },
  { q: 'Believe you can and you\'re halfway there.', a: '— Theodore Roosevelt' },
  { q: 'The best time to plant a tree was 20 years ago. The second best time is now.', a: '— Chinese Proverb' },
  { q: 'Your time is limited, so don\'t waste it living someone else\'s life.', a: '— Steve Jobs' },
];

let currentTemplate = 'sunset';
let bgImage = null;

function getTemplate(id) { return TEMPLATES.find(t => t.id === id); }

function wrapText(text, x, y, maxWidth, lineHeight) {
  const words = text.split(' ');
  const lines = [];
  let line = '';
  for (const w of words) {
    const test = line ? line + ' ' + w : w;
    if (ctx.measureText(test).width > maxWidth && line) {
      lines.push(line);
      line = w;
    } else {
      line = test;
    }
  }
  if (line) lines.push(line);
  // Hard wrap long words
  const final = [];
  for (const l of lines) {
    if (ctx.measureText(l).width <= maxWidth) final.push(l);
    else {
      let cur = '';
      for (const ch of l) {
        if (ctx.measureText(cur + ch).width > maxWidth && cur) {
          final.push(cur); cur = ch;
        } else cur += ch;
      }
      if (cur) final.push(cur);
    }
  }
  const startY = y - (final.length - 1) * lineHeight / 2;
  final.forEach((l, i) => ctx.fillText(l, x, startY + i * lineHeight));
  return final.length;
}

function draw() {
  const w = canvas.width, h = canvas.height;
  const tpl = getTemplate(currentTemplate);

  // Background
  if (bgImage) {
    // Cover-fit the image
    const ir = bgImage.width / bgImage.height;
    const cr = w / h;
    let dw, dh, dx, dy;
    if (ir > cr) { dh = h; dw = h * ir; dx = (w - dw) / 2; dy = 0; }
    else { dw = w; dh = w / ir; dx = 0; dy = (h - dh) / 2; }
    ctx.drawImage(bgImage, dx, dy, dw, dh);
    // Darken overlay
    ctx.fillStyle = 'rgba(0,0,0,0.35)';
    ctx.fillRect(0, 0, w, h);
  } else if (tpl.type === 'gradient') {
    const g = ctx.createLinearGradient(0, 0, w, h);
    tpl.stops.forEach(([col, pos]) => g.addColorStop(pos, col));
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, w, h);
  } else {
    ctx.fillStyle = tpl.color;
    ctx.fillRect(0, 0, w, h);
  }

  // Quote
  const quote = $('#quote-text').value.trim() || 'Your quote here';
  const author = $('#author-text').value.trim();
  const fontFam = $('#font-family').value;
  const fontSize = parseInt($('#font-size').value);
  let color = $('#text-color').value;
  if (!bgImage && tpl.defaultText && color.toLowerCase() === '#ffffff') {
    color = tpl.defaultText;
    $('#text-color').value = tpl.defaultText;
  }

  const padX = w * 0.1;
  const maxW = w - padX * 2;

  // Draw quote marks decoration
  ctx.fillStyle = color;
  ctx.globalAlpha = 0.25;
  ctx.font = `bold ${fontSize * 2.5}px Georgia, serif`;
  ctx.textAlign = 'left';
  ctx.textBaseline = 'middle';
  ctx.fillText('"', padX - 10, h * 0.3);
  ctx.globalAlpha = 1;

  // Main quote text
  ctx.font = `bold ${fontSize}px ${fontFam}`;
  ctx.fillStyle = color;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.shadowColor = 'rgba(0,0,0,0.5)';
  ctx.shadowBlur = 8;
  ctx.shadowOffsetY = 2;
  const lineH = fontSize * 1.3;
  const lineCount = wrapText(quote, w / 2, h / 2 - (author ? fontSize * 0.6 : 0), maxW, lineH);

  // Author
  if (author) {
    ctx.font = `italic ${fontSize * 0.5}px ${fontFam}`;
    ctx.globalAlpha = 0.85;
    ctx.fillText(author, w / 2, h / 2 + (lineCount * lineH) / 2 + fontSize * 0.3);
    ctx.globalAlpha = 1;
  }
  ctx.shadowBlur = 0;
  ctx.shadowOffsetY = 0;
}

function download() {
  draw();
  const link = document.createElement('a');
  link.download = 'quote-image.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
}

function applySize() {
  const [w, h] = $('#size-preset').value.split(',').map(Number);
  canvas.width = w;
  canvas.height = h;
  draw();
}

function renderTemplates() {
  $('#template-row').innerHTML = TEMPLATES.map(tpl =>
    `<button data-id="${tpl.id}" class="${tpl.id === currentTemplate ? 'active' : ''}">${tpl.name}</button>`
  ).join('');
  document.querySelectorAll('#template-row button').forEach(btn => {
    btn.onclick = () => {
      document.querySelectorAll('#template-row button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentTemplate = btn.dataset.id;
      bgImage = null;
      draw();
    };
  });
}

function renderQuoteLibrary() {
  $('#quote-library').innerHTML = FAMOUS_QUOTES.slice(0, 8).map((q, i) =>
    `<button data-idx="${i}">"${q.q.substring(0, 60)}${q.q.length > 60 ? '…' : ''}" — ${q.a.replace('— ', '')}</button>`
  ).join('');
  document.querySelectorAll('#quote-library button').forEach(btn => {
    btn.onclick = () => {
      const q = FAMOUS_QUOTES[+btn.dataset.idx];
      $('#quote-text').value = q.q;
      $('#author-text').value = q.a;
      draw();
    };
  });
}

function pickRandomQuote() {
  const q = FAMOUS_QUOTES[Math.floor(Math.random() * FAMOUS_QUOTES.length)];
  $('#quote-text').value = q.q;
  $('#author-text').value = q.a;
  draw();
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" id="btn-random">${t('randomQuote')}</button>
  <button class="gz-btn gz-btn-secondary" id="btn-upload">📁 <span id="lbl-upload">Background</span></button>
  <button class="gz-btn" id="btn-download">${t('download')}</button>`;

$('#lbl-quote').textContent = t('lblQuote');
$('#lbl-author').textContent = t('lblAuthor');
$('#lbl-template').textContent = t('lblTemplate');
$('#lbl-size').textContent = t('lblSize');
$('#lbl-font').textContent = t('lblFont');
$('#lbl-textcolor').textContent = t('lblTextcolor');
$('#lbl-fontsize').textContent = t('lblFontsize');
$('#lbl-library').textContent = t('lblLibrary');

['quote-text','author-text','font-family','text-color','font-size'].forEach(id => {
  $('#' + id).addEventListener('input', draw);
});
$('#size-preset').addEventListener('change', applySize);

$('#btn-random').onclick = pickRandomQuote;
$('#btn-download').onclick = download;

$('#btn-upload').onclick = () => {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = 'image/*';
  input.onchange = e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      const img = new Image();
      img.onload = () => {
        bgImage = img;
        document.querySelectorAll('#template-row button').forEach(b => b.classList.remove('active'));
        draw();
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  };
  input.click();
};

renderTemplates();
renderQuoteLibrary();
draw();

GZ.renderToolPage({
  category: 'image',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {href:'/image/text-to-image.html',icon:'🖼️',name:'Text to Image'},
    {href:'/image/poster-maker.html',icon:'🖼️',name:'Poster Maker'},
    {href:'/social/og-image-generator.html',icon:'🖼️',name:'OG Image Generator'},
    {href:'/image/banner-maker.html',icon:'📢',name:'Banner Maker'},
  ]
});
</script>
