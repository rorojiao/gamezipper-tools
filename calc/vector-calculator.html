<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is the dot product of two vectors?", "acceptedAnswer": {"@type": "Answer", "text": "The dot product of vectors a and b is the sum of the products of their corresponding components: a1*b1 + a2*b2 + a3*b3. It produces a single scalar and equals |a||b|cos(theta), where theta is the angle between them."}}, {"@type": "Question", "name": "What is the cross product?", "acceptedAnswer": {"@type": "Answer", "text": "The cross product is defined only for 3D vectors. It returns a new vector perpendicular to both inputs with magnitude |a||b|sin(theta). The direction follows the right-hand rule."}}, {"@type": "Question", "name": "How do you find the angle between two vectors?", "acceptedAnswer": {"@type": "Answer", "text": "Use the formula theta = arccos( (a · b) / (|a| |b|) ). First compute the dot product and both magnitudes, divide, then take the inverse cosine. The result is between 0 and 180 degrees."}}, {"@type": "Question", "name": "Does this calculator support 2D vectors?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. Toggle between 2D and 3D mode. In 2D mode the cross product is shown as a scalar (the z-component), which is the signed area of the parallelogram formed by the two vectors."}}]}</script>

<script>
GZI18n.register({
  en: {
    toolTitle: 'Vector Calculator (2D & 3D)',
    toolDesc: 'Compute vector magnitude, dot product, cross product, angle between vectors, distance, unit vector and scalar multiplication with step-by-step work. Free and browser-based.',
    dim2: '2D',
    dim3: '3D',
    mag: 'Magnitude  |v₁|',
    add: 'Add  v₁ + v₂',
    sub: 'Subtract  v₁ − v₂',
    dot: 'Dot product  v₁ · v₂',
    cross: 'Cross product  v₁ × v₂',
    angle: 'Angle between',
    dist: 'Distance  |v₁ − v₂|',
    unit: 'Unit vector  v̂₁',
    scale: 'Scalar mult  k·v₁',
    needV2: 'This operation needs a second vector v₂.',
    divZero: 'Cannot normalize the zero vector.',
    lblK: 'Scalar k =',
    result: 'Result',
    steps: 'Steps',
    step1: 'Pick 2D or 3D mode and enter the components of v₁ (and v₂ where needed)',
    step2: 'Choose an operation — unary ops ignore v₂',
    step3: 'For scalar multiplication, set the scalar k',
    step4: 'Read the result and the step-by-step calculation',
  },
  zh: {
    toolTitle: '向量计算器（2D & 3D）',
    toolDesc: '计算向量模长、点积、叉积、夹角、距离、单位向量和标量乘法，附分步过程。免费、浏览器本地运行。',
    dim2: '2D',
    dim3: '3D',
    mag: '模长  |v₁|',
    add: '加法  v₁ + v₂',
    sub: '减法  v₁ − v₂',
    dot: '点积  v₁ · v₂',
    cross: '叉积  v₁ × v₂',
    angle: '夹角',
    dist: '距离  |v₁ − v₂|',
    unit: '单位向量  v̂₁',
    scale: '标量乘法  k·v₁',
    needV2: '此运算需要第二个向量 v₂。',
    divZero: '不能对零向量求单位向量。',
    lblK: '标量 k =',
    result: '结果',
    steps: '步骤',
    step1: '选择 2D 或 3D 模式，输入 v₁ 的分量（需要时还有 v₂）',
    step2: '选择运算 — 一元运算忽略 v₂',
    step3: '标量乘法时设置标量 k',
    step4: '查看结果和分步计算',
  }
});

const { $, copyText, t } = GZ;
let dim = 3;
let currentOp = 'mag';

function fmt(n){
  if(Math.abs(n) < 1e-12) n = 0;
  if(Number.isInteger(n)) return String(n);
  return (Math.round(n*1e6)/1e6).toString();
}
function vecStr(v){
  if(dim===2) return `⟨${fmt(v[0])}, ${fmt(v[1])}⟩`;
  return `⟨${fmt(v[0])}, ${fmt(v[1])}, ${fmt(v[2])}⟩`;
}
function mag(v){
  if(dim===2) return Math.hypot(v[0], v[1]);
  return Math.hypot(v[0], v[1], v[2]);
}
function dot(a,b){
  let s=0; for(let i=0;i<dim;i++) s += a[i]*b[i]; return s;
}
function cross3(a,b){
  return [a[1]*b[2]-a[2]*b[1], a[2]*b[0]-a[0]*b[2], a[0]*b[1]-a[1]*b[0]];
}

function render(valueText, expr, steps){
  $('#result').innerHTML = `<div class="res-box">
    <div style="font-size:.8em;color:var(--text2)">${expr}</div>
    <div class="big">${valueText}</div>
    ${steps ? `<div class="steplist"><strong>${t('steps')}:</strong><br>${steps}</div>` : ''}
  </div>`;
}

function compute(op){
  currentOp = op;
  document.querySelectorAll('#opgrid button').forEach(b=>b.classList.toggle('active', b.dataset.op===op));
  const unary = ['mag','unit'].includes(op);
  $('#v2row').style.display = unary||op==='scale' ? 'none':'flex';
  $('#krow').style.display = op==='scale'?'flex':'none';

  const a = [+$('#x1').value||0, +$('#y1').value||0].concat(dim===3?[+$('#z1').value||0]:[]);
  const b = [+$('#x2').value||0, +$('#y2').value||0].concat(dim===3?[+$('#z2').value||0]:[]);

  if(op==='mag'){
    const m = mag(a);
    const sq = dim===2?`${fmt(a[0])}² + ${fmt(a[1])}²`:`${fmt(a[0])}² + ${fmt(a[1])}² + ${fmt(a[2])}²`;
    render(`|v₁| = ${fmt(Math.round(m*1e6)/1e6)}`, `|v₁|`, `|v₁| = √(${sq}) = √${fmt(a[0]*a[0]+a[1]*a[1]+(dim===3?a[2]*a[2]:0))} = <strong>${fmt(Math.round(m*1e6)/1e6)}</strong>`);
  } else if(op==='add'){
    const r = a.map((x,i)=>x+b[i]);
    render(vecStr(r), 'v₁ + v₂', `(${vecStr(a)}) + (${vecStr(b)}) = <strong>${vecStr(r)}</strong>`);
  } else if(op==='sub'){
    const r = a.map((x,i)=>x-b[i]);
    render(vecStr(r), 'v₁ − v₂', `(${vecStr(a)}) − (${vecStr(b)}) = <strong>${vecStr(r)}</strong>`);
  } else if(op==='dot'){
    const d = dot(a,b);
    const terms = a.map((x,i)=>`${fmt(x)}·${fmt(b[i])}`).join(' + ');
    render(String(fmt(Math.round(d*1e6)/1e6)), 'v₁ · v₂', `${terms} = <strong>${fmt(Math.round(d*1e6)/1e6)}</strong><br>Also equals |v₁||v₂|cos θ`);
  } else if(op==='cross'){
    if(dim===2){
      // 2D cross product scalar = x1*y2 - y1*x2
      const cz = a[0]*b[1]-a[1]*b[0];
      render(String(fmt(Math.round(cz*1e6)/1e6)), 'v₁ × v₂ (z-component)', `2D: ${fmt(a[0])}·${fmt(b[1])} − ${fmt(a[1])}·${fmt(b[0])} = <strong>${fmt(Math.round(cz*1e6)/1e6)}</strong> (signed area)`);
    } else {
      const c = cross3(a,b);
      const ix = `${fmt(a[1])}·${fmt(b[2])} − ${fmt(a[2])}·${fmt(b[1])}`;
      const iy = `${fmt(a[2])}·${fmt(b[0])} − ${fmt(a[0])}·${fmt(b[2])}`;
      const iz = `${fmt(a[0])}·${fmt(b[1])} − ${fmt(a[1])}·${fmt(b[0])}`;
      render(vecStr(c), 'v₁ × v₂', `i(${ix}) = ${fmt(c[0])}<br>j(${iy}) = ${fmt(c[1])}<br>k(${iz}) = ${fmt(c[2])}<br>⇒ <strong>${vecStr(c)}</strong>`);
    }
  } else if(op==='angle'){
    const ma = mag(a), mb = mag(b);
    if(ma===0||mb===0){ $('#result').innerHTML=`<div class="err">${t('divZero')}</div>`; return; }
    const cos = dot(a,b)/(ma*mb);
    const c = Math.max(-1, Math.min(1, cos));
    const rad = Math.acos(c);
    const deg = rad*180/Math.PI;
    render(`${fmt(Math.round(deg*1e6)/1e6)}° (${fmt(Math.round(rad*1e6)/1e6)} rad)`, 'angle(v₁, v₂)', `cos θ = (v₁·v₂)/(|v₁||v₂|) = ${fmt(Math.round(dot(a,b)*1e6)/1e6)}/(${fmt(Math.round(ma*1e6)/1e6)}·${fmt(Math.round(mb*1e6)/1e6)}) = ${fmt(Math.round(c*1e6)/1e6)}<br>θ = arccos(${fmt(Math.round(c*1e6)/1e6)}) = <strong>${fmt(Math.round(deg*1e6)/1e6)}°</strong>`);
  } else if(op==='dist'){
    const r = a.map((x,i)=>x-b[i]);
    const m = mag(r);
    const sq = r.map(v=>`${fmt(v)}²`).join(' + ');
    render(String(fmt(Math.round(m*1e6)/1e6)), '|v₁ − v₂|', `Δ = ${vecStr(r)}<br>|Δ| = √(${sq}) = <strong>${fmt(Math.round(m*1e6)/1e6)}</strong>`);
  } else if(op==='unit'){
    const m = mag(a);
    if(m===0){ $('#result').innerHTML=`<div class="err">${t('divZero')}</div>`; return; }
    const u = a.map(v=>v/m);
    render(vecStr(u), 'v̂₁ (unit vector)', `v̂₁ = v₁/|v₁| = (${vecStr(a)})/${fmt(Math.round(m*1e6)/1e6)} = <strong>${vecStr(u)}</strong>`);
  } else if(op==='scale'){
    const k = +$('#k').value||0;
    const r = a.map(v=>v*k);
    render(vecStr(r), 'k · v₁', `${fmt(k)} · (${vecStr(a)}) = <strong>${vecStr(r)}</strong>`);
  }
}

function setDim(d){
  dim = d;
  document.querySelectorAll('#dimtoggle button').forEach(b=>b.classList.toggle('active', +b.dataset.d===d));
  $('#z1wrap').style.display = d===3?'inline':'none';
  $('#z2wrap').style.display = d===3?'inline':'none';
  compute(currentOp);
}

$('#dimtoggle').innerHTML = `<button data-d="2" onclick="setDim(2)">${t('dim2')}</button><button data-d="3" onclick="setDim(3)">${t('dim3')}</button>`;

const ops = [['mag','|v|'],['add','+'],['sub','−'],['dot','·'],['cross','×'],['angle','∠'],['dist','|Δ|'],['unit','v̂'],['scale','k·v']];
$('#opgrid').innerHTML = ops.map(([k,_])=>`<button data-op="${k}" onclick="compute('${k}')">${t(k)}</button>`).join('');
$('#lbl-k').textContent = t('lblK');
['x1','y1','z1','x2','y2','z2','k'].forEach(id=>{ const el=$('#'+id); if(el) el.addEventListener('input', ()=>compute(currentOp)); });

setDim(3);
compute('mag');
</script>

</script>
