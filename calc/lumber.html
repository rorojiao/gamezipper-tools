.form-group{display:flex;flex-direction:column;gap:4px}
.form-group label{font-weight:600;font-size:.85em}
.form-group input,.form-group select{padding:10px;border-radius:8px;border:1px solid var(--border);background:var(--glass);color:var(--text);font-size:1em}
.boards-section{margin-top:12px}
.board-row{display:grid;grid-template-columns:1fr 1fr 1fr 1fr 1fr auto;gap:8px;align-items:end;margin-bottom:8px}
.board-row input,.board-row select{padding:8px;border-radius:8px;border:1px solid var(--border);background:var(--glass);color:var(--text);font-size:.95em}
.board-row button{padding:8px 12px;border-radius:8px;border:none;background:var(--gz-accent);color:#fff;cursor:pointer;font-size:.9em}
.btn-row{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap}
.btn-row button{padding:8px 16px;border-radius:8px;border:1px solid var(--border);background:var(--glass);color:var(--text);cursor:pointer}
.btn-row button.primary{background:var(--gz-accent);color:#fff;border-color:var(--gz-accent)}
.result-box{background:var(--glass2);border:1px solid var(--border);border-radius:12px;padding:20px;margin-top:16px;display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px}
.result-item{text-align:center}
.result-item .label{font-size:.8em;color:var(--text2);margin-bottom:4px}

.note{margin-top:14px;padding:12px;background:var(--glass);border:1px solid var(--border);border-radius:10px;font-size:.85em;color:var(--text2)}
.subsection-title{font-weight:700;margin:14px 0 6px;color:var(--text)}
</style>
<script type="application/ld+json">{"@context":"https://schema.org","@type":"WebApplication","name":"Lumber Calculator","description":"Calculate board feet, linear feet and total cost for any lumber project. Supports 2x4, 2x6 and dimensional lumber.","url":"https://tools.gamezipper.com/calc/lumber.html","applicationCategory":"Utility","operatingSystem":"Web Browser","offers":{"@type":"Offer","price":"0"}}</script>
<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is a board foot in lumber?", "acceptedAnswer": {"@type": "Answer", "text": "A board foot is a volume measurement equal to 144 cubic inches (12in x 12in x 1in). The formula is: board feet = (thickness in × width in × length ft) / 12. Board feet are used to price hardwood and larger dimensional lumber."}}, {"@type": "Question", "name": "Why is a 2x4 actually 1.5 x 3.5 inches?", "acceptedAnswer": {"@type": "Answer", "text": "Dimensional lumber is sized by its rough-sawn dimensions before drying and planing. After surfacing, a 2x4 shrinks to 1.5 x 3.5 inches. Always use actual (surfaced) dimensions for board foot calculations of dimensional lumber."}}, {"@type": "Question", "name": "How do I convert linear feet to board feet?", "acceptedAnswer": {"@type": "Answer", "text": "Linear feet only counts length. To convert to board feet, multiply linear feet by the cross-section area in square feet. For a 2x4 (1.5 x 3.5 in = 5.25 sq in = 0.0365 sq ft), one linear foot = 0.0365 board feet."}}, {"@type": "Question", "name": "How much extra lumber should I buy?", "acceptedAnswer": {"@type": "Answer", "text": "Add 10-15% extra to your order for cuts, mistakes, defects and future repairs. For framing projects, 15% is standard. For fine woodworking with selective grain, 20% is safer."}}]}</script>
<link rel="alternate" hreflang="en" href="https://tools.gamezipper.com/calc/lumber.html">
<link rel="alternate" hreflang="zh" href="https://tools.gamezipper.com/zh/calc/lumber.html">

</head>
<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="form-grid">
      <div class="form-group"><label id="lbl-priceMode"></label>
        <select id="priceMode"><option value="bf" selected>Price per Board Foot</option><option value="lf">Price per Linear Foot</option></select>
      </div>
    </div>
    <div class="subsection-title" id="boards-title"></div>
    <div class="boards-section" id="boardsContainer"></div>
    <div class="btn-row">
      <button id="btn-add-board"></button>
      <button class="primary" id="btn-calc"></button>
    </div>
    <div class="result-box" id="resultBox"></div>
    <div class="note" id="note"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Lumber Calculator',
    toolDesc: 'Calculate board feet, linear feet and total cost for any lumber project. Mix 2x4s, 2x6s, sheet goods and custom sizes — free and instant.',
    priceMode: 'Pricing Method',
    boardsTitle: 'Boards',
    species: 'Lumber type / label',
    thickness: 'Thickness (in)',
    width: 'Width (in)',
    length: 'Length (ft)',
    qty: 'Qty',
    unitPrice: 'Unit Price ($)',
    addBoard: '+ Add Board',
    calculate: 'Calculate',
    totalBF: 'Total Board Feet',
    totalLF: 'Total Linear Feet',
    pieces: 'Total Pieces',
    totalCost: 'Total Cost',
    avgCostPerBF: 'Avg per Board Foot',
    note: 'Tip: Use actual surfaced dimensions for accuracy — a 2x4 is 1.5 x 3.5 in, a 2x6 is 1.5 x 5.5 in, a 2x8 is 1.5 x 7.25 in, a 2x10 is 1.5 x 9.25 in, a 2x12 is 1.5 x 11.25 in. Add 10-15% extra for waste.',
    step1: 'Pick whether you price by board foot or linear foot',
    step2: 'Add each board size with thickness, width, length and quantity',
    step3: 'Enter the unit price for each line',
    step4: 'Get total board feet, linear feet, pieces and cost',
  },
  zh: {
    toolTitle: '木材（板英尺）计算器',
    toolDesc: '计算任意木材项目的板英尺、线性英尺和总费用。混合 2x4、2x6、板材和自定义尺寸 — 免费即时。',
    priceMode: '计价方式',
    boardsTitle: '板材',
    species: '木材类型 / 备注',
    thickness: '厚度（英寸）',
    width: '宽度（英寸）',
    length: '长度（英尺）',
    qty: '数量',
    unitPrice: '单价（$）',
    addBoard: '+ 添加板材',
    calculate: '计算',
    totalBF: '总板英尺',
    totalLF: '总线性英尺',
    pieces: '总件数',
    totalCost: '总费用',
    avgCostPerBF: '每板英尺均价',
    note: '提示：请使用刨光后的实际尺寸 — 2x4 为 1.5 x 3.5 英寸，2x6 为 1.5 x 5.5 英寸，2x8 为 1.5 x 7.25 英寸，2x10 为 1.5 x 9.25 英寸，2x12 为 1.5 x 11.25 英寸。建议多备 10-15% 损耗。',
    step1: '选择按板英尺还是线性英尺计价',
    step2: '逐行添加板材的厚、宽、长和数量',
    step3: '输入每行的单价',
    step4: '获取总板英尺、线性英尺、件数和总费用',
  }
});

const { $, t } = GZ;

$('#lbl-priceMode').textContent = t('priceMode');
$('#boards-title').textContent = t('boardsTitle');
$('#btn-add-board').textContent = t('addBoard');
$('#btn-calc').textContent = t('calculate');

function addBoard(species, t_, w, l, qty, price) {
  const c = $('#boardsContainer');
  const row = document.createElement('div');
  row.className = 'board-row';
  row.innerHTML = `
    <input type="text" placeholder="${t('species')}" class="b-species" value="${species || ''}">
    <input type="number" placeholder="${t('thickness')}" class="b-thick" min="0" step="0.0625" value="${t_ !== undefined ? t_ : 1.5}">
    <input type="number" placeholder="${t('width')}" class="b-width" min="0" step="0.0625" value="${w !== undefined ? w : 3.5}">
    <input type="number" placeholder="${t('length')}" class="b-length" min="0" step="0.5" value="${l !== undefined ? l : 8}">
    <input type="number" placeholder="${t('qty')}" class="b-qty" min="1" step="1" value="${qty !== undefined ? qty : 10}">
    <input type="number" placeholder="${t('unitPrice')}" class="b-price" min="0" step="0.01" value="${price !== undefined ? price : 0.5}">
    <button onclick="this.parentElement.remove();calculate()">&times;</button>`;
  c.appendChild(row);
}

function calculate() {
  const mode = $('#priceMode').value;
  let totalBF = 0, totalLF = 0, pieces = 0, totalCost = 0;

  document.querySelectorAll('#boardsContainer .board-row').forEach(row => {
    const thick = parseFloat(row.querySelector('.b-thick').value) || 0;
    const width = parseFloat(row.querySelector('.b-width').value) || 0;
    const len = parseFloat(row.querySelector('.b-length').value) || 0;
    const qty = parseInt(row.querySelector('.b-qty').value) || 0;
    const price = parseFloat(row.querySelector('.b-price').value) || 0;

    const bfEach = (thick * width * len) / 12;
    const lfEach = len;
    const bfTotal = bfEach * qty;
    const lfTotal = lfEach * qty;

    totalBF += bfTotal;
    totalLF += lfTotal;
    pieces += qty;

    if (mode === 'bf') {
      totalCost += bfTotal * price;
    } else {
      totalCost += lfTotal * price;
    }
  });

  const avgPerBF = totalBF > 0 ? totalCost / totalBF : 0;

  $('#resultBox').innerHTML = `
    <div class="result-item"><div class="label">${t('totalBF')}</div><div class="val" style="font-size:2.2em">${totalBF.toFixed(2)}</div></div>
    <div class="result-item"><div class="label">${t('totalLF')}</div><div class="val">${totalLF.toFixed(1)} ft</div></div>
    <div class="result-item"><div class="label">${t('pieces')}</div><div class="val">${pieces}</div></div>
    <div class="result-item"><div class="label">${t('avgCostPerBF')}</div><div class="val">$${avgPerBF.toFixed(2)}</div></div>
    <div class="result-item"><div class="label">${t('totalCost')}</div><div class="val">$${totalCost.toFixed(2)}</div></div>`;
  $('#note').textContent = t('note');
}

addBoard('2x4 Stud', 1.5, 3.5, 8, 10, 0.5);
addBoard('2x6 Joist', 1.5, 5.5, 12, 4, 0.75);
calculate();

$('#btn-add-board').onclick = () => { addBoard(); calculate(); };
$('#btn-calc').onclick = calculate;
$('#priceMode').addEventListener('change', calculate);

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🪵', href:'/calc/deck-calculator.html', name:'Deck Calculator'},
    {icon:'🧱', href:'/calc/concrete.html', name:'Concrete'},
    {icon:'🏠', href:'/calc/roofing-calculator.html', name:'Roofing'},
    {icon:'📐', href:'/calc/square-footage.html', name:'Square Footage'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
