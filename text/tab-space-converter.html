    inputLabel: '输入文本',
    outputLabel: '转换结果',
    mode: '模式',
    tabToSpace: 'Tab → 空格',
    spaceToTab: '空格 → Tab',
    tabWidth: 'Tab 宽度',
    leadingOnly: '仅缩进（行首空白）',
    example: '示例',
    copy: '复制',
    clear: '清空',
    result: (n, m) => `✓ ${m === 't2s' ? 'Tab → 空格' : '空格 → Tab'}：${n} 处替换`,
    step1: '在输入区粘贴文本或代码',
    step2: '选择转换模式和 Tab 宽度',
    step3: '切换「仅缩进」模式仅转换行首空白',
    step4: '点击「复制」将转换结果复制到剪贴板',
  }
});

let convMode = 't2s';
let tabWidth = 4;
let leadingOnly = false;
let count = 0;
const { $, copyText, t } = GZ;

function convertLine(line) {
  if (leadingOnly) {
    // extract leading whitespace
    const match = line.match(/^(\s*)(.*)$/s);
    const lead = match[1];
    const rest = match[2];
    let newLead;
    if (convMode === 't2s') {
      const before = (lead.match(/\t/g) || []).length;
      newLead = lead.replace(/\t/g, ' '.repeat(tabWidth));
      count += before;
    } else {
      // spaces to tabs, every N spaces becomes a tab
      const before = Math.floor([...lead].filter(c => c === ' ').length / tabWidth);
      newLead = lead.replace(new RegExp(' '.repeat(tabWidth), 'g'), '\t');
      count += before;
    }
    return newLead + rest;
  }
  // all whitespace
  if (convMode === 't2s') {
    count += (line.match(/\t/g) || []).length;
    return line.replace(/\t/g, ' '.repeat(tabWidth));
  }
  count += (line.match(new RegExp(' '.repeat(tabWidth), 'g')) || []).length;
  return line.replace(new RegExp(' '.repeat(tabWidth), 'g'), '\t');
}

function doConvert() {
  const raw = $('#input').value;
  if (!raw) { $('#output').textContent = ''; $('#status').innerHTML = ''; return; }
  count = 0;
  const lines = raw.split(/\r?\n/);
  const out = lines.map(convertLine);
  $('#output').textContent = out.join('\n');
  $('#status').innerHTML = `<span style="color:var(--gz-success)">${t('result', count, convMode)}</span>`;
}

function loadExample() {
  // example with tabs for t2s
  $('#input').value = 'function add(a, b) {\n\treturn a + b;\n}\n\nconst result = add(1, 2);';
  doConvert();
}

function doClear() { $('#input').value = ''; $('#output').textContent = ''; $('#status').innerHTML = ''; }

$('#input').addEventListener('input', doConvert);

$('#controls').innerHTML = `
  <label>${t('mode')}:
    <select id="modeSel" onchange="convMode=this.value;doConvert()">
      <option value="t2s">${t('tabToSpace')}</option>
      <option value="s2t">${t('spaceToTab')}</option>
    </select>
  </label>
  <label>${t('tabWidth')}: <input type="number" id="widthInput" value="4" min="1" max="16" oninput="tabWidth=Math.max(1,+this.value||4);doConvert()"></label>
  <label><input type="checkbox" id="leadingChk" onchange="leadingOnly=this.checked;doConvert()"> ${t('leadingOnly')}</label>`;

$('#toolbar').innerHTML = `
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

$('#lbl-in').textContent = t('inputLabel');
$('#lbl-out').textContent = t('outputLabel');
