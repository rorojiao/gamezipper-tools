<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"What is a water footprint?","acceptedAnswer":{"@type":"Answer","text":"Your water footprint is the total volume of freshwater you use directly (showers, flushing, laundry) and indirectly (the water needed to produce your food, clothes and goods). The global average is about 3,800 liters per person per day."}},{"@type":"Question","name":"How much water does a 10-minute shower use?","acceptedAnswer":{"@type":"Answer","text":"A standard showerhead uses about 9 liters per minute, so a 10-minute shower uses roughly 90 liters. A low-flow showerhead uses about 7 liters per minute, saving about 20 liters per shower."}},{"@type":"Question","name":"Which foods use the most water to produce?","acceptedAnswer":{"@type":"Answer","text":"Beef is the most water-intensive food at about 15,400 liters per kg, followed by nuts (9,000 L/kg), chicken (4,300 L/kg), and eggs (3,300 L/kg). Plant foods like vegetables and grains use far less water per kilogram."}},{"@type":"Question","name":"How can I reduce my water footprint?","acceptedAnswer":{"@type":"Answer","text":"Eat less meat (especially beef), take shorter showers, fix leaks, run full loads of laundry, choose water-efficient appliances, and reduce food waste — wasted food means wasted virtual water."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="gz-section-title" id="sec-household"></div>
    <div class="gz-field"><label id="lbl-shower"></label><input type="number" id="shower" value="10" min="0" step="1" oninput="calc()"></div>
    <div class="gz-field"><label id="lbl-toilet"></label><input type="number" id="toilet" value="5" min="0" step="1" oninput="calc()"></div>
    <div class="gz-field"><label id="lbl-laundry"></label><input type="number" id="laundry" value="3" min="0" step="1" oninput="calc()"></div>
    <div class="gz-field"><label id="lbl-dishes"></label><input type="number" id="dishes" value="2" min="0" step="1" oninput="calc()"></div>
    <div class="gz-section-title" id="sec-diet"></div>
    <div class="gz-field"><label id="lbl-meat"></label><input type="number" id="meat" value="150" min="0" step="10" oninput="calc()"></div>
    <div class="gz-field"><label id="lbl-dairy"></label><input type="number" id="dairy" value="200" min="0" step="10" oninput="calc()"></div>
    <div class="gz-field"><label id="lbl-grains"></label><input type="number" id="grains" value="300" min="0" step="10" oninput="calc()"></div>
    <div class="gz-result" id="result"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Water Footprint Calculator',
    toolDesc: 'Estimate your daily and annual water footprint. Add your shower time, toilet flushes, laundry, dishes and diet — see how you compare to the global average. Free, browser-only.',
    secHousehold: '🏠 Direct Water Use (daily)',
    secDiet: '🍽️ Diet (daily intake, grams)',
    shower: 'Shower time (minutes/day)',
    toilet: 'Toilet flushes (per day)',
    laundry: 'Laundry machine loads (per week)',
    dishes: 'Dishwasher or hand-wash sessions (per day)',
    meat: 'Meat intake (grams/day)',
    dairy: 'Dairy (milk, cheese) intake (grams/day)',
    grains: 'Grains, vegetables & fruits (grams/day)',
    dailyTotal: 'Daily Water Footprint',
    annualTotal: 'Annual Water Footprint',
    breakdown: 'Breakdown',
    compareAvg: 'Global Average',
    compareYou: 'You',
    liters: 'liters',
    m3: 'm³',
    step1: 'Enter your daily shower time and toilet flushes',
    step2: 'Add weekly laundry loads and daily dishwashing',
    step3: 'Enter your daily diet intake in grams',
    step4: 'See your daily and annual water footprint instantly',
  },
  zh: {
    toolTitle: '水足迹计算器',
    toolDesc: '估算你每天和每年的水足迹。输入淋浴时间、冲厕次数、洗衣、洗碗和饮食 — 查看与全球平均值的对比。免费、浏览器本地运行。',
    secHousehold: '🏠 直接用水（每日）',
    secDiet: '🍽️ 饮食（每日摄入，克）',
    shower: '淋浴时长（分钟/天）',
    toilet: '冲厕次数（次/天）',
    laundry: '洗衣次数（次/周）',
    dishes: '洗碗次数（次/天）',
    meat: '肉类摄入（克/天）',
    dairy: '乳制品摄入（克/天）',
    grains: '谷物蔬菜水果（克/天）',
    dailyTotal: '每日水足迹',
    annualTotal: '每年水足迹',
    breakdown: '明细',
    compareAvg: '全球平均',
    compareYou: '你',
    liters: '升',
    m3: '立方米',
    step1: '输入每日淋浴时间和冲厕次数',
    step2: '添加每周洗衣次数和每日洗碗次数',
    step3: '输入每日饮食摄入量（克）',
    step4: '即时查看你的每日和每年水足迹',
  }
});

const { $, t } = GZ;

$('#sec-household').textContent = t('secHousehold');
$('#sec-diet').textContent = t('secDiet');
$('#lbl-shower').textContent = t('shower');
$('#lbl-toilet').textContent = t('toilet');
$('#lbl-laundry').textContent = t('laundry');
$('#lbl-dishes').textContent = t('dishes');
$('#lbl-meat').textContent = t('meat');
$('#lbl-dairy').textContent = t('dairy');
$('#lbl-grains').textContent = t('grains');

function calc() {
  const shower = (parseFloat($('#shower').value)||0) * 9;        // 9 L/min
  const toilet = (parseFloat($('#toilet').value)||0) * 6;         // 6 L/flush
  const laundry = (parseFloat($('#laundry').value)||0) * 60 / 7;  // 60 L/load, per day
  const dishes = (parseFloat($('#dishes').value)||0) * 30;        // 30 L/session
  const meat = (parseFloat($('#meat').value)||0) / 1000 * 15400;  // 15400 L/kg beef avg
  const dairy = (parseFloat($('#dairy').value)||0) / 1000 * 1000; // 1000 L/kg dairy avg
  const grains = (parseFloat($('#grains').value)||0) / 1000 * 1500; // 1500 L/kg plant avg
  const total = shower + toilet + laundry + dishes + meat + dairy + grains;
  const annual = total * 365;
  const avg = 3800;
  const ratio = Math.min(100, (total / avg) * 100);

  $('#result').innerHTML = `
    <div class="gz-result-big">
      <div class="num">${Math.round(total).toLocaleString()}</div>
      <div class="lbl">${t('liters')} / ${t('dailyTotal')}</div>
    </div>
    <div class="gz-breakdown">
      <div class="gz-breakdown-row"><span>🚿 ${t('shower')}</span><span>${Math.round(shower)} L</span></div>
      <div class="gz-breakdown-row"><span>🚽 ${t('toilet')}</span><span>${Math.round(toilet)} L</span></div>
      <div class="gz-breakdown-row"><span>👕 ${t('laundry')}</span><span>${Math.round(laundry)} L</span></div>
      <div class="gz-breakdown-row"><span>🍽️ ${t('dishes')}</span><span>${Math.round(dishes)} L</span></div>
      <div class="gz-breakdown-row"><span>🥩 ${t('meat')}</span><span>${Math.round(meat)} L</span></div>
      <div class="gz-breakdown-row"><span>🥛 ${t('dairy')}</span><span>${Math.round(dairy)} L</span></div>
      <div class="gz-breakdown-row"><span>🌾 ${t('grains')}</span><span>${Math.round(grains)} L</span></div>
    </div>
    <div class="gz-compare">
      <div>
        <div>${t('compareYou')}</div>
        <div style="font-size:1.3rem;font-weight:700;color:var(--accent)">${Math.round(total).toLocaleString()} L</div>
        <div class="gz-bar"><div style="width:${ratio}%"></div></div>
      </div>
      <div>
        <div>${t('compareAvg')}</div>
        <div style="font-size:1.3rem;font-weight:700">3,800 L</div>
        <div class="gz-bar"><div style="width:100%;background:var(--text2)"></div></div>
      </div>
    </div>
    <div class="gz-result-big" style="margin-top:14px">
      <div class="num" style="font-size:1.6rem">${Math.round(annual/1000).toLocaleString()} ${t('m3')}</div>
      <div class="lbl">${t('annualTotal')}</div>
    </div>`;
}

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🌱', href:'/calc/carbon-footprint-calculator.html', name:'Carbon Footprint'},
    {icon:'💧', href:'/calc/water-bill-calculator.html', name:'Water Bill'},
    {icon:'⚡', href:'/calc/ev-savings-calculator.html', name:'EV Savings'},
    {icon:'🌿', href:'/calc/carbon-footprint.html', name:'Eco Footprint'},
  ]
});

calc();
</script>
<script src="/tools-result-rec.js?v=20260707v520" defer></script>
</body>
</html>
