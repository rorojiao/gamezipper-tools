<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"How is an Ethereum gas fee calculated?","acceptedAnswer":{"@type":"Answer","text":"Transaction fee equals gas used multiplied by the gas price in gwei. Divide by one billion to convert gwei to ETH, then multiply by the ETH market price for a fiat estimate."}},{"@type":"Question","name":"How much gas does an ETH transfer use?","acceptedAnswer":{"@type":"Answer","text":"A standard ETH transfer typically uses 21,000 gas. ERC-20 transfers, swaps, NFT actions and smart-contract calls consume more because they execute additional code."}},{"@type":"Question","name":"What is gwei?","acceptedAnswer":{"@type":"Answer","text":"Gwei is one billionth of an ether: 1 gwei = 0.000000001 ETH. Ethereum gas prices are quoted in gwei because the numbers are easier to read."}},{"@type":"Question","name":"Does this show the live network gas price?","acceptedAnswer":{"@type":"Answer","text":"No. Enter the gas price and ETH price you want to model. The tool is local, private and can compare any mainnet, historical or Layer 2 scenario."}}]}</script>

<script>
GZI18n.register({"en":{"toolTitle":"Ethereum Gas Fee Estimator","toolDesc":"Convert gas units and gwei into ETH and USD for transfers, swaps, NFTs and smart-contract calls.","gasUnits":"Gas limit / gas used","gasPrice":"Gas price (gwei)","ethPrice":"ETH price (USD)","l2Factor":"L2 cost vs mainnet (%)","presets":"Transaction presets","ethTransfer":"ETH transfer","tokenTransfer":"ERC-20 transfer","swap":"DEX swap","nft":"NFT mint / trade","contract":"Contract deploy","ethFee":"Network fee (ETH)","usdFee":"Estimated fee (USD)","gweiTotal":"Total fee (gwei)","l2Fee":"Estimated L2 fee","perHundred":"Transactions per $100","baseCost":"Cost per 1,000 gas","reset":"Reset","note":"Enter a gas price from your wallet or block explorer. Actual fees depend on gas used, base fee, priority tip, L2 data charges and network conditions.","step1":"Choose a transaction preset or enter a custom gas limit","step2":"Enter the gas price in gwei and the current ETH price","step3":"Optionally set an estimated Layer 2 cost percentage","step4":"Review the fee in ETH, USD and gwei instantly"},"zh":{"toolTitle":"以太坊 Gas 费用估算器","toolDesc":"将 Gas 用量和 Gwei 换算为 ETH 与美元，适用于转账、Swap、NFT 和智能合约调用。","gasUnits":"Gas 上限 / 实际用量","gasPrice":"Gas 单价（Gwei）","ethPrice":"ETH 价格（美元）","l2Factor":"L2 成本占主网比例（%）","presets":"交易类型预设","ethTransfer":"ETH 转账","tokenTransfer":"ERC-20 代币转账","swap":"DEX 兑换","nft":"NFT 铸造 / 交易","contract":"部署合约","ethFee":"网络费用（ETH）","usdFee":"预估费用（美元）","gweiTotal":"总费用（Gwei）","l2Fee":"预估 L2 费用","perHundred":"100 美元可执行交易数","baseCost":"每 1,000 Gas 成本","reset":"重置","note":"请从钱包或区块浏览器输入 Gas 单价。实际费用取决于 Gas 用量、基础费、优先小费、L2 数据费和网络状况。","step1":"选择交易类型预设或输入自定义 Gas 上限","step2":"输入 Gwei 单价和当前 ETH 价格","step3":"可选设置 Layer 2 费用相对主网的比例","step4":"即时查看 ETH、美元和 Gwei 费用"}});
const { $, t } = GZ;
function text(id,key){const el=$(id);if(el)el.textContent=t(key)}
function num(id,fallback=0){const n=parseFloat($(id).value);return Number.isFinite(n)?n:fallback}
function money(n,currency){try{return new Intl.NumberFormat(undefined,{style:'currency',currency:currency||'USD',maximumFractionDigits:Math.abs(n)<1?8:2}).format(n)}catch(e){return (currency||'$')+' '+n.toLocaleString(undefined,{maximumFractionDigits:8})}}

[['#l-units','gasUnits'],['#l-gwei','gasPrice'],['#l-eth','ethPrice'],['#l-l2','l2Factor'],['#k-ethfee','ethFee'],['#k-usd','usdFee'],['#k-total','gweiTotal'],['#k-l2fee','l2Fee'],['#k-hundred','perHundred'],['#k-base','baseCost'],['#reset','reset'],['#note','note']].forEach(x=>text(...x));
const presetData=[['ethTransfer',21000],['tokenTransfer',65000],['swap',150000],['nft',220000],['contract',800000]],p=$('#presets');presetData.forEach(x=>{const b=document.createElement('button');b.textContent=t(x[0])+' · '+x[1].toLocaleString();b.onclick=()=>{$('#units').value=x[1];calculate()};p.appendChild(b)});
function calculate(){const units=Math.max(0,num('#units')),gwei=Math.max(0,num('#gwei')),ethPrice=Math.max(0,num('#ethprice')),l2=Math.max(0,num('#l2'))/100,totalGwei=units*gwei,eth=totalGwei/1e9,usd=eth*ethPrice,l2usd=usd*l2;$('#v-ethfee').textContent=eth.toLocaleString(undefined,{maximumFractionDigits:9})+' ETH';$('#v-usd').textContent=money(usd,'USD');$('#v-total').textContent=totalGwei.toLocaleString(undefined,{maximumFractionDigits:2});$('#v-l2fee').textContent=money(l2usd,'USD');$('#v-hundred').textContent=usd>0?Math.floor(100/usd).toLocaleString():'∞';$('#v-base').textContent=money(gwei*1000/1e9*ethPrice,'USD')}
['#units','#gwei','#ethprice','#l2'].forEach(id=>$(id).addEventListener('input',calculate));$('#reset').onclick=()=>{$('#units').value=21000;$('#gwei').value=20;$('#ethprice').value=3000;$('#l2').value=10;calculate()};calculate();

GZ.renderToolPage({category:'calc',titleKey:'toolTitle',descKey:'toolDesc',howToSteps:['step1','step2','step3','step4'],related:[{"icon":"₿","href":"/calc/satoshi-to-usd.html","name":"Satoshi to USD"},{"icon":"💹","href":"/calc/crypto-profit-calculator.html","name":"Crypto Profit Calculator"},{"icon":"⚖️","href":"/calc/impermanent-loss-calculator.html","name":"Impermanent Loss Calculator"},{"icon":"🪙","href":"/calc/staking-yield-calculator.html","name":"Staking Yield Calculator"}]});
</script>
