<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"How is the due date calculated?","acceptedAnswer":{"@type":"Answer","text":"The standard method (Naegele's rule) adds 280 days (40 weeks) to the first day of your last menstrual period. If you know the conception date, we add 266 days (38 weeks)."}},{"@type":"Question","name":"How accurate is the due date estimate?","acceptedAnswer":{"@type":"Answer","text":"Only about 5% of babies are born on their exact due date. Most arrive within two weeks of it. An ultrasound in the first trimester provides the most accurate dating."}},{"@type":"Question","name":"What are the three trimesters?","acceptedAnswer":{"@type":"Answer","text":"First trimester: weeks 1-12. Second trimester: weeks 13-26. Third trimester: weeks 27-40. A full-term pregnancy is 37-42 weeks."}},{"@type":"Question","name":"Is this calculator a substitute for medical advice?","acceptedAnswer":{"@type":"Answer","text":"No. This tool provides an estimate for informational purposes only. Always consult your healthcare provider for prenatal care and medical guidance."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-form">
      <div class="mode-toggle">
        <button id="mode-lmp" class="active" onclick="setMode('lmp')"></button>
        <button id="mode-conception" onclick="setMode('conception')"></button>
      </div>
      <div>
        <label id="lbl-date"></label>
        <input type="date" id="dateInput">
      </div>
      <div>
        <label id="lbl-cycle"></label>
        <select id="cycle">
          <option value="28">28</option>
          <option value="21">21</option>
          <option value="24">24</option>
          <option value="26">26</option>
          <option value="30">30</option>
          <option value="32">32</option>
          <option value="35">35</option>
          <option value="38">38</option>
          <option value="40">40</option>
        </select>
      </div>
      <button class="gz-btn" onclick="calculate()" id="btn-calc"></button>
    </div>
    <div class="result-card" id="result" style="display:none">
      <div class="label" id="result-due-label"></div>
      <div class="big" id="result-due"></div>
      <div class="countdown" id="result-countdown"></div>
      <div class="label" id="result-countdown-label"></div>
      <div class="result-grid">
        <div class="result-item"><div class="val" id="result-weeks"></div><div class="lbl" id="result-weeks-label"></div></div>
        <div class="result-item"><div class="val" id="result-trimester"></div><div class="lbl" id="result-trimester-label"></div></div>
        <div class="result-item"><div class="val" id="result-conceived"></div><div class="lbl" id="result-conceived-label"></div></div>
        <div class="result-item"><div class="val" id="result-elapsed"></div><div class="lbl" id="result-elapsed-label"></div></div>
      </div>
      <div class="trimester-bar"><div class="t1"></div><div class="t2"></div><div class="t3"></div></div>
      <div class="trimester-labels"><span>T1</span><span>T2</span><span>T3</span></div>
      <div class="progress-marker"><div class="progress-fill" id="progress-fill"></div></div>
    </div>
    <div id="status"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Pregnancy Due Date Calculator',
    toolDesc: 'Estimate your baby\u2019s due date from your last period or conception date. See weeks pregnant, trimesters and countdown. Free and private.',
    modeLMP: 'Last Period (LMP)',
    modeConception: 'Conception Date',
    date: 'Date',
    cycleLength: 'Cycle Length (days)',
    calculate: 'Calculate',
    dueDate: 'Estimated Due Date',
    daysRemaining: 'days to go',
    weeksPregnant: 'Weeks Pregnant',
    trimester: 'Trimester',
    conceptionDate: 'Conception Date',
    daysElapsed: 'Days Pregnant',
    babyBorn: '🎉 Your baby may have arrived!',
    step1: 'Select whether you know your last period date or conception date',
    step2: 'Enter the date',
    step3: 'Adjust cycle length if needed (for LMP mode)',
    step4: 'Click Calculate to see your due date and pregnancy timeline',
  },
  zh: {
    toolTitle: '预产期计算器',
    toolDesc: '根据末次月经或受孕日期估算预产期，查看怀孕周数、孕期阶段和倒计时。免费、私密。',
    modeLMP: '末次月经 (LMP)',
    modeConception: '受孕日期',
    date: '日期',
    cycleLength: '月经周期（天）',
    calculate: '计算',
    dueDate: '预产期',
    daysRemaining: '天后',
    weeksPregnant: '怀孕周数',
    trimester: '孕期阶段',
    conceptionDate: '受孕日期',
    daysElapsed: '怀孕天数',
    babyBorn: '🎉 宝宝可能已经出生了！',
    step1: '选择输入末次月经日期或受孕日期',
    step2: '输入日期',
    step3: '如需要，调整月经周期长度（LMP模式）',
    step4: '点击「计算」查看预产期和孕期时间线',
  }
});

let mode = 'lmp';
const { $, t } = GZ;

function setMode(m) {
  mode = m;
  $('#mode-lmp').classList.toggle('active', m === 'lmp');
  $('#mode-conception').classList.toggle('active', m === 'conception');
  $('#lbl-cycle').style.display = m === 'lmp' ? '' : 'none';
  $('#cycle').style.display = m === 'lmp' ? '' : 'none';
  calculate();
}

const today = new Date().toISOString().split('T')[0];
$('#dateInput').value = today;
const todayMinus280 = new Date(); todayMinus280.setDate(todayMinus280.getDate() - 280);
$('#dateInput').valueAsDate = todayMinus280;

function calculate() {
  const dateStr = $('#dateInput').value;
  if (!dateStr) { $('#result').style.display = 'none'; return; }
  const inputDate = new Date(dateStr);
  let lmpDate, conceptionDate, dueDate;
  if (mode === 'lmp') {
    const cycle = parseInt($('#cycle').value) || 28;
    lmpDate = inputDate;
    const adj = cycle - 28;
    conceptionDate = new Date(lmpDate);
    conceptionDate.setDate(conceptionDate.getDate() + 14 + adj);
    dueDate = new Date(lmpDate);
    dueDate.setDate(dueDate.getDate() + 280 + adj);
  } else {
    conceptionDate = inputDate;
    lmpDate = new Date(inputDate);
    lmpDate.setDate(lmpDate.getDate() - 14);
    dueDate = new Date(conceptionDate);
    dueDate.setDate(dueDate.getDate() + 266);
  }
  const now = new Date();
  now.setHours(0,0,0,0);
  const daysPreg = Math.floor((now - lmpDate) / 86400000);
  const weeksPreg = Math.floor(daysPreg / 7);
  const dayOfWeek = daysPreg % 7;
  let trimester;
  if (weeksPreg < 13) trimester = '1';
  else if (weeksPreg < 27) trimester = '2';
  else trimester = '3';
  const daysRemaining = Math.ceil((dueDate - now) / 86400000);
  const pct = Math.max(0, Math.min(100, (daysPreg / 280) * 100));

  $('#result').style.display = 'block';
  $('#result-due').textContent = dueDate.toLocaleDateString('en-US', { weekday:'long', year:'numeric', month:'long', day:'numeric' });
  if (daysRemaining > 0) {
    $('#result-countdown').textContent = daysRemaining;
    $('#result-countdown-label').textContent = t('daysRemaining');
  } else {
    $('#result-countdown').textContent = '🎉';
    $('#result-countdown-label').textContent = t('babyBorn');
  }
  $('#result-weeks').textContent = weeksPreg + 'w ' + dayOfWeek + 'd';
  $('#result-trimester').textContent = trimester + ' / 3';
  $('#result-conceived').textContent = conceptionDate.toLocaleDateString('en-US', { year:'numeric', month:'short', day:'numeric' });
  $('#result-elapsed').textContent = daysPreg;
  $('#progress-fill').style.width = pct + '%';
}

$('#dateInput').addEventListener('input', calculate);
$('#cycle').addEventListener('change', calculate);
calculate();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🎂', href:'/calc/age-calculator.html', name:'Age Calculator'},
    {icon:'📅', href:'/calc/date-calculator.html', name:'Date Calculator'},
    {icon:'📈', href:'/calc/baby-growth-chart.html', name:'Baby Growth'},
    {icon:'🌸', href:'/calc/ovulation-calculator.html', name:'Ovulation'},
  ]
});
</script>
<script src="/tools-result-rec.js?v=20260707v520" defer></script>
</body>
</html>
