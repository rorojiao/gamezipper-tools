const { $, copyText, t } = GZ;

function parseNums(text) {
  return text.split(/[\n,]+/).map(s => s.trim()).filter(s => s !== '').map(s => {
    const n = parseFloat(s);
    if (isNaN(n)) throw { bad: s };
    return n;
  });
}

function fmt(n, dp=4) {
  if (!isFinite(n)) return '∞';
  const f = parseFloat(n.toFixed(dp));
  return String(f);
}

function strengthLabel(r) {
  const a = Math.abs(r);
  let s;
  if (a >= 0.9) s = t('strPerfect');
  else if (a >= 0.7) s = t('strStrong');
  else if (a >= 0.4) s = t('strModerate');
  else if (a >= 0.2) s = t('strWeak');
  else s = t('strNone');
  const dir = r >= 0 ? t('positive') : t('negative');
  return s + ' (' + dir + ')';
}

function calc() {
  const out = $('#output');
  document.getElementById('lbl-x').textContent = t('lblX');
  document.getElementById('lbl-y').textContent = t('lblY');
  document.getElementById('lbl-pred').textContent = t('predLabel');
  let xs, ys;
  try {
    xs = parseNums($('#inX').value);
    ys = parseNums($('#inY').value);
  } catch (e) {
    out.innerHTML = `<div class="lr-eq"><p style="color:var(--gz-accent,#e94560)">${t('errNum')}</p></div>`;
    return;
  }
  if (xs.length !== ys.length || xs.length < 2) {
    out.innerHTML = `<div class="lr-eq"><p style="color:var(--gz-accent,#e94560)">${t('errCount')}</p></div>`;
    drawPlot([], null, null, null);
    return;
  }
  const n = xs.length;
  const sumX = xs.reduce((a,b)=>a+b,0);
  const sumY = ys.reduce((a,b)=>a+b,0);
  const meanX = sumX / n, meanY = sumY / n;
  let sxy = 0, sxx = 0, syy = 0;
  for (let i=0;i<n;i++){
    const dx = xs[i]-meanX, dy = ys[i]-meanY;
    sxy += dx*dy; sxx += dx*dx; syy += dy*dy;
  }
  if (sxx === 0) {
    out.innerHTML = `<div class="lr-eq"><p style="color:var(--gz-accent,#e94560)">All x values are identical — cannot fit a line (slope undefined).</p></div>`;
    drawPlot(xs, ys, null, null);
    return;
  }
  const m = sxy / sxx;
  const b = meanY - m * meanX;
  const r = sxy / Math.sqrt(sxx * syy);
  const r2 = r * r;
  // standard error of estimate
  let sse = 0;
  for (let i=0;i<n;i++){ const pred = m*xs[i]+b; sse += (ys[i]-pred)*(ys[i]-pred); }
  const se = n > 2 ? Math.sqrt(sse / (n - 2)) : 0;

  const predX = parseFloat($('#inPred').value);
  let predY = '', predText = '';
  if (!isNaN(predX)) { predY = m*predX + b; predText = `${t('predicted')} (x=${fmt(predX,2)}): <b>y = ${fmt(predY)}</b>`; }

  const sign = b >= 0 ? '+' : '−';
  const eqStr = `y = ${fmt(m)}x ${sign} ${fmt(Math.abs(b))}`;

  out.innerHTML = `
    <div class="lr-eq">
      <div style="font-size:.8em;color:var(--text2,#aaa);text-transform:uppercase;letter-spacing:.05em">${t('equation')}</div>
      <div class="formula">${eqStr}</div>
      ${predText ? `<div class="pred">${predText}</div>` : ''}
      <div class="lr-strength">${t('strength')}: <b style="color:var(--text,#eee)">${strengthLabel(r)}</b></div>
    </div>
    <div class="lr-results">
      <div class="lr-stat"><span>${t('slope')}</span><b>${fmt(m)}</b></div>
      <div class="lr-stat"><span>${t('intercept')}</span><b>${fmt(b)}</b></div>
      <div class="lr-stat"><span>${t('correlation')}</span><b>${fmt(r)}</b></div>
      <div class="lr-stat"><span>${t('rSquared')}</span><b>${fmt(r2)}</b></div>
      <div class="lr-stat"><span>${t('stdError')}</span><b>${fmt(se)}</b></div>
      <div class="lr-stat"><span>${t('n')}</span><b>${n}</b></div>
      <div class="lr-stat"><span>${t('meanX')}</span><b>${fmt(meanX)}</b></div>
      <div class="lr-stat"><span>${t('meanY')}</span><b>${fmt(meanY)}</b></div>
    </div>
    <div class="lr-steps">
      <span><b>${t('stepMeans')}:</b> x̄ = ${fmt(meanX)},  ȳ = ${fmt(meanY)}</span>
      <span><b>${t('stepSlope')}:</b> m = ${fmt(sxy)} / ${fmt(sxx)} = <b>${fmt(m)}</b></span>
      <span><b>${t('stepIntercept')}:</b> b = ${fmt(meanY)} − ${fmt(m)}·${fmt(meanX)} = <b>${fmt(b)}</b></span>
    </div>
    <p class="lr-hint">${t('hint')}</p>`;

  drawPlot(xs, ys, m, b);
}

function drawPlot(xs, ys, m, b) {
  const canvas = $('#plot');
  const dpr = window.devicePixelRatio || 1;
  const W = canvas.clientWidth, H = canvas.clientHeight;
  canvas.width = W*dpr; canvas.height = H*dpr;
  const ctx = canvas.getContext('2d');
  ctx.setTransform(dpr,0,0,dpr,0,0);
  ctx.clearRect(0,0,W,H);
  const padL=44, padR=18, padT=16, padB=36;

  if (xs.length < 2) {
    ctx.fillStyle='rgba(255,255,255,0.4)'; ctx.font='14px system-ui'; ctx.textAlign='center';
    ctx.fillText('Enter data to see the scatter plot', W/2, H/2);
    return;
  }

  // compute ranges incl. regression line
  let xMin=Math.min(...xs), xMax=Math.max(...xs), yMin=Math.min(...ys), yMax=Math.max(...ys);
  if (m !== null && isFinite(m)) {
    const y1 = m*xMin+b, y2 = m*xMax+b;
    yMin = Math.min(yMin, y1, y2); yMax = Math.max(yMax, y1, y2);
  }
  const xPad = (xMax-xMin)*0.1 + 1e-9, yPad = (yMax-yMin)*0.1 + 1e-9;
  xMin-=xPad; xMax+=xPad; yMin-=yPad; yMax+=yPad;
  if (xMin===xMax){ xMin-=1; xMax+=1; }
  if (yMin===yMax){ yMin-=1; yMax+=1; }

  const px = x => padL + (x-xMin)/(xMax-xMin)*(W-padL-padR);
  const py = y => padT + (yMax-y)/(yMax-yMin)*(H-padT-padB);

  // nice grid step
  function niceStep(range, count){ const raw=range/count; const mag=Math.pow(10,Math.floor(Math.log10(raw))); const norm=raw/mag; let step; if(norm<1.5)step=1; else if(norm<3)step=2; else if(norm<7)step=5; else step=10; return step*mag; }
  const stepX = niceStep(xMax-xMin, 8), stepY = niceStep(yMax-yMin, 6);

  // grid + labels
  ctx.strokeStyle='rgba(255,255,255,0.06)'; ctx.fillStyle='rgba(255,255,255,0.4)'; ctx.font='10px system-ui';
  ctx.lineWidth=1;
  for (let gx=Math.ceil(xMin/stepX)*stepX; gx<=xMax; gx+=stepX){
    ctx.beginPath(); ctx.moveTo(px(gx),padT); ctx.lineTo(px(gx),H-padB); ctx.stroke();
    ctx.textAlign='center'; ctx.fillText(fmt(gx,2), px(gx), H-padB+14);
  }
  for (let gy=Math.ceil(yMin/stepY)*stepY; gy<=yMax; gy+=stepY){
    ctx.beginPath(); ctx.moveTo(padL,py(gy)); ctx.lineTo(W-padR,py(gy)); ctx.stroke();
    ctx.textAlign='right'; ctx.fillText(fmt(gy,2), padL-6, py(gy)+3);
  }
  // axes
  ctx.strokeStyle='rgba(255,255,255,0.3)'; ctx.lineWidth=1.5;
  if (yMin<=0&&yMax>=0){ ctx.beginPath(); ctx.moveTo(padL,py(0)); ctx.lineTo(W-padR,py(0)); ctx.stroke(); }
  if (xMin<=0&&xMax>=0){ ctx.beginPath(); ctx.moveTo(px(0),padT); ctx.lineTo(px(0),H-padB); ctx.stroke(); }

  // regression line
  if (m !== null && isFinite(m)) {
    ctx.strokeStyle='#ff6b6b'; ctx.lineWidth=2.5;
    const x1=xMin, y1=m*x1+b, x2=xMax, y2=m*x2+b;
    ctx.beginPath(); ctx.moveTo(px(x1),py(y1)); ctx.lineTo(px(x2),py(y2)); ctx.stroke();
  }

  // points
  ctx.fillStyle='#4ecdc4';
  for (let i=0;i<xs.length;i++){
    ctx.beginPath(); ctx.arc(px(xs[i]),py(ys[i]),5,0,Math.PI*2); ctx.fill();
  }
}

function loadExample() {
  const ex = [
    [[1,2,3,4,5,6,7,8],[2.1,3.9,6.1,7.8,10.2,11.9,14.1,15.8]],
    [[10,20,30,40,50,60],[25,18,14,10,7,4]],
    [[5,8,12,15,18,22,25,28,32],[12,15,20,22,28,30,35,38,42]],
  ];
  const e = ex[Math.floor(Math.random()*ex.length)];
  $('#inX').value = e[0].join('\n');
  $('#inY').value = e[1].join('\n');
  calc();
}
function doClear(){ $('#inX').value=''; $('#inY').value=''; $('#output').innerHTML=''; drawPlot([],null,null,null); }

['inX','inY','inPred'].forEach(id=>document.getElementById(id).addEventListener('input', calc));
window.addEventListener('resize', calc);

$('#toolbar').innerHTML = `

  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

calc();
