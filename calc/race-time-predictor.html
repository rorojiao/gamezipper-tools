<script type="application/ld+json">{"@context":"https://schema.org","@type":"WebApplication","name":"Race Time Predictor","description":"Predict equivalent race times for 5K, 10K, half marathon, marathon and more from a recent race result using the Riegel formula.","url":"https://tools.gamezipper.com/calc/race-time-predictor.html","applicationCategory":"Utility","operatingSystem":"Web Browser","offers":{"@type":"Offer","price":"0"}}</script>
<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "How accurate is the race time predictor?", "acceptedAnswer": {"@type": "Answer", "text": "The Riegel formula is a well-established statistical model that is reasonably accurate when predicting from a race of similar or shorter distance. Predictions get less reliable for large jumps (e.g. predicting a marathon from a 1-mile time) because endurance becomes more important than speed."}}, {"@type": "Question", "name": "What is the Riegel formula?", "acceptedAnswer": {"@type": "Answer", "text": "T2 = T1 × (D2 / D1)^1.06. It was published by Pete Riegel in 1977 and states that as race distance increases, your pace slows by a predictable power-law factor."}}, {"@type": "Question", "name": "What is the best race to use as input?", "acceptedAnswer": {"@type": "Answer", "text": "Use a recent race of similar distance to your target, run on a flat course with good conditions. A race run within the last 2-3 months at 5K-to-half-marathon distance gives the most reliable predictions."}}, {"@type": "Question", "name": "Is my running data stored?", "acceptedAnswer": {"@type": "Answer", "text": "No. All calculations happen entirely in your browser. No race times or personal data are sent to any server."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-form" id="form">
      <div>
        <label id="lbl-distance"></label>
        <select id="distance">
          <option value="1">1 Mile</option>
          <option value="3.10686">5K</option>
          <option value="6.21371">10K</option>
          <option value="13.1094">Half Marathon</option>
          <option value="26.2188">Marathon</option>
        </select>
      </div>
      <div>
        <label id="lbl-time"></label>
        <input type="text" id="time" value="25:00" placeholder="HH:MM:SS or MM:SS">
      </div>
      <button class="gz-btn" onclick="calculate()" id="btn-calc"></button>
    </div>
    <div class="result-card" id="result" style="display:none">
      <table class="predict-table">
        <thead><tr><th id="th-dist"></th><th id="th-time"></th><th id="th-pace"></th></tr></thead>
        <tbody id="tbody"></tbody>
      </table>
      <p class="note" id="note"></p>
    </div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Race Time Predictor',
    toolDesc: 'Predict equivalent finish times for common race distances from one recent race result using the Riegel formula.',
    lblDistance: 'Recent Race Distance',
    lblTime: 'Finish Time (HH:MM:SS or MM:SS)',
    btnCalc: 'Predict Race Times',
    thDist: 'Distance',
    thTime: 'Predicted Time',
    thPace: 'Pace per Mile',
    note: 'Predictions use the Riegel formula T2 = T1 × (D2/D1)^1.06. Long-distance predictions assume you have done the appropriate endurance training.',
    step1: 'Pick the distance of a recent race you completed',
    step2: 'Enter your finish time in HH:MM:SS or MM:SS format',
    step3: 'Click Predict Race Times to see equivalent finishes for 1 mile through marathon',
    step4: 'Use the per-mile pace to plan your training paces',
  },
  zh: {
    toolTitle: '比赛成绩预测器',
    toolDesc: '根据一次近期比赛成绩，用 Riegel 公式预测其他常见比赛距离的等效成绩。',
    lblDistance: '最近一次比赛距离',
    lblTime: '完赛时间（HH:MM:SS 或 MM:SS）',
    btnCalc: '预测比赛成绩',
    thDist: '距离',
    thTime: '预测时间',
    thPace: '每英里配速',
    note: '使用 Riegel 公式 T2 = T1 × (D2/D1)^1.06 进行预测。长距离预测假定你已完成相应的耐力训练。',
    step1: '选择你最近完成的一场比赛距离',
    step2: '按 HH:MM:SS 或 MM:SS 格式输入完赛时间',
    step3: '点击「预测比赛成绩」查看从 1 英里到马拉松的等效成绩',
    step4: '参考每英里配速规划训练配速',
  }
});

const { $, t } = GZ;

const RACES = [
  {label:'1 Mile', d:1},
  {label:'5K', d:3.10686},
  {label:'10K', d:6.21371},
  {label:'Half Marathon', d:13.1094},
  {label:'Marathon', d:26.2188},
];

function parseTime(s) {
  s = String(s).trim();
  const parts = s.split(':').map(p => parseInt(p, 10));
  if (parts.some(isNaN)) return null;
  let sec = 0;
  if (parts.length === 3) sec = parts[0]*3600 + parts[1]*60 + parts[2];
  else if (parts.length === 2) sec = parts[0]*60 + parts[1];
  else if (parts.length === 1) sec = parts[0];
  else return null;
  return sec;
}

function fmtTime(sec) {
  if (!isFinite(sec) || sec < 0) return '—';
  sec = Math.round(sec);
  const h = Math.floor(sec/3600);
  const m = Math.floor((sec%3600)/60);
  const s = sec%60;
  const pad = n => String(n).padStart(2,'0');
  return h > 0 ? `${h}:${pad(m)}:${pad(s)}` : `${m}:${pad(s)}`;
}

function calculate() {
  const d1 = parseFloat($('#distance').value);
  const t1 = parseTime($('#time').value);
  if (!t1 || t1 <= 0 || !d1) {
    $('#result').style.display = 'none';
    return;
  }
  const rows = RACES.map(r => {
    const t2 = t1 * Math.pow(r.d / d1, 1.06);
    const pace = t2 / r.d;
    return `<tr><td class="dist">${r.label}</td><td class="time">${fmtTime(t2)}</td><td class="time">${fmtTime(pace)}</td></tr>`;
  }).join('');
  $('#tbody').innerHTML = rows;
  $('#note').textContent = t('note');
  $('#result').style.display = '';
}

$('#th-dist').textContent = ''; $('#th-time').textContent = ''; $('#th-pace').textContent = ''; // placeholders filled on render
$('#btn-calc').textContent = t('btnCalc');
calculate();
['thDist','thTime','thPace'].forEach((k,i) => {
  const ids = ['th-dist','th-time','th-pace'];
  $('#' + ids[i]).textContent = t(k);
});

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🏃', href:'/calc/pace-calculator.html', name:'Pace Calc'},
    {icon:'❤️', href:'/calc/heart-rate-zones.html', name:'Heart Rate Zones'},
    {icon:'🏃', href:'/calc/bmi-calculator.html', name:'BMI Calc'},
    {icon:'⏱️', href:'/calc/timer-stopwatch.html', name:'Stopwatch'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
