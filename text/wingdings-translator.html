  },
  zh: {
    toolTitle: 'Wingdings 符号翻译器',
    toolDesc: '将文字转换为 Wingdings 符号，或反向解码。一键在普通文字和 Wingdings 符号间互转，浏览器本地运行。',
    inputLabel: '文本输入',
    outEncode: 'Wingdings 输出',
    outDecode: '解码文本',
    encode: '编码 → Wingdings',
    decode: '解码 → 文本',
    switchDir: '切换',
    step1: '在输入区输入或粘贴文字',
    step2: '选择方向 — 编码为 Wingdings 或解码 Wingdings 为文本',
    step3: '输出随输入实时更新',
    step4: '点击「复制」复制结果，或「切换」反转方向',
  }
});

const { $, copyText, t } = GZ;

// Standard Wingdings mapping (printable ASCII → Wingdings Unicode PUA)
// Each Wingdings character maps to a Unicode Private Use Area codepoint.
// Source: official Wingdings font glyph indices shifted to Unicode PUA F0XX range.
const WINGDINGS_MAP = {
  ' ':0xA0,'!':0x21,'"':0x93,'#':0x23,'$':0xA2,'%':0xA5,'&':0xB6,"'":0xA8,
  '(':0x7B,')':0x7D,'*':0xA9,'+':0xB1,',':0xAB,'-':0x2D,'.':0xB7,'/':0xA6,
  '0':0xC6,'1':0xD8,'2':0xC7,'3':0xC8,'4':0xC9,'5':0xCA,'6':0xCB,'7':0xCC,
  '8':0xCD,'9':0xCE,':':0xBA,';':0xBB,'<':0xC1,'=':0xBD,'>':0xC0,'?':0xBF,
  '@':0xA7,'A':0xA1,'B':0xA2,'C':0xA3,'D':0xA4,'E':0xA5,'F':0xA6,'G':0xA8,
  'H':0xA9,'I':0xAB,'J':0xAC,'K':0xAD,'L':0xAE,'M':0xAF,'N':0xB1,'O':0xB2,
  'P':0xB3,'Q':0xB4,'R':0xB5,'S':0xB6,'T':0xB7,'U':0xB8,'V':0xB9,'W':0xBA,
  'X':0xBB,'Y':0xBC,'Z':0xBD,'[':0xC4,'\\':0xDC,']':0xC5,'^':0xB0,'_':0xDF,
  '`':0xA2,'a':0xE2,'b':0xE0,'c':0xE1,'d':0xDF,'e':0xE6,'f':0xE3,'g':0xE4,
  'h':0xE5,'i':0xE8,'j':0xE7,'k':0xEA,'l':0xE9,'m':0xEB,'n':0xEE,'o':0xED,
  'p':0xF0,'q':0xEF,'r':0xF1,'s':0xF2,'t':0xF3,'u':0xF5,'v':0xF4,'w':0xF6,
  'x':0xF7,'y':0xF8,'z':0xF9,'{':0xFB,'|':0xFA,'}':0xFC,'~':0xFD
};

// Reverse map for decoding
const REVERSE_MAP = {};
for (const [k, v] of Object.entries(WINGDINGS_MAP)) REVERSE_MAP[v] = k;

let direction = 'encode';

function toWingdings(text) {
  let out = '';
  for (const ch of text) {
    if (WINGDINGS_MAP[ch] !== undefined) {
      out += String.fromCharCode(WINGDINGS_MAP[ch]);
    } else {
      out += ch;
    }
  }
  return out;
}

function fromWingdings(text) {
  let out = '';
  for (const ch of text) {
    const code = ch.charCodeAt(0);
    if (REVERSE_MAP[code] !== undefined) {
      out += REVERSE_MAP[code];
    } else if (code === 0x20 || code === 0xA0) {
      out += ' ';
    } else {
      out += ch;
    }
  }
  return out;
}

function doConvert() {
  const inp = $('#input').value;
  if (direction === 'encode') {
    $('#output').textContent = toWingdings(inp);
    $('label#lbl-out').textContent = t('outEncode');
  } else {
    $('#output').textContent = fromWingdings(inp);
    $('label#lbl-out').textContent = t('outDecode');
  }
}

function switchDir() {
  direction = direction === 'encode' ? 'decode' : 'encode';
  const cur = $('#input').value;
  const out = $('#output').textContent;
  // Swap: output becomes input
  $('#input').value = out;
  doConvert();
}

function loadExample() {
  direction = 'encode';
  $('#input').value = 'Hello World! 123';
  doConvert();
}

function doClear() { $('#input').value=''; $('#output').textContent=''; }

$('#input').addEventListener('input', doConvert);

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="switchDir()">${t('switchDir')} ↔</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

    {icon:'✒️', href:'/text/cursive-text-generator.html', name:'Cursive Text'},

});

loadExample();
</script>
