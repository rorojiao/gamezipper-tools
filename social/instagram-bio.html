<script>
GZI18n.register({
  en: {
    toolTitle: 'Instagram Bio Generator',
    toolDesc: 'Create eye-catching Instagram bios with emojis, line breaks and hashtags. Pick a style and customize.',
    lblStyle: 'Choose a Style',
    lblName: 'Your Name / Brand',
    styleAesthetic: '✨ Aesthetic',
    styleFunny: '😂 Funny',
    styleMotivational: '💪 Motivational',
    styleProfessional: '💼 Professional',
    styleCreative: '🎨 Creative',
    styleMinimal: '🤍 Minimal',
    step1: 'Select a bio style template from the options above',
    step2: 'Enter your name or brand for personalization',
    step3: 'Edit the bio text to match your personality',
    step4: 'Copy the bio and paste it into your Instagram profile',
  },
  zh: {
    toolTitle: 'Instagram 简介生成器',
    toolDesc: '创建引人注目的 Instagram 个人简介，支持 Emoji、换行和话题标签。选择风格，自由定制。',
    lblStyle: '选择风格',
    lblName: '你的名字 / 品牌',
    styleAesthetic: '✨ 唯美',
    styleFunny: '😂 搞笑',
    styleMotivational: '💪 励志',
    styleProfessional: '💼 专业',
    styleCreative: '🎨 创意',
    styleMinimal: '🤍 极简',
    step1: '从上方选择一个简介风格模板',
    step2: '输入你的名字或品牌以个性化',
    step3: '编辑简介文本以匹配你的个性',
    step4: '复制简介并粘贴到你的 Instagram 个人资料中',
  }
});

const { $, copyText, t } = GZ;

const templates = {
  aesthetic: [
    '🌙 chasing sunsets\n☕ coffee addict\n📍 {name}\n✨ living my best life',
    '🌸 soft life era\n🦋 becoming who I am\n💫 {name}\n🌙 dreamer',
    '🍃 grounded & growing\n🤍 {name}\n📖 poetry in motion\n🎧 music lover',
  ],
  funny: [
    '🥔 I\'m basically a potato\n🛌 professional napper\n😂 {name}\n🍟 will work for food',
    '🧠 brain.exe has stopped\n🎮 loading personality...\n🤪 {name}\n💀 professionally unhinged',
    '📱 1% battery, 100% vibes\n🍕 pizza is my love language\n🙄 {name}\n🛑 send help',
  ],
  motivational: [
    '💪 no excuses, just results\n🔥 building my empire\n📈 {name}\n⭐ dream big, work hard',
    '🌟 progress not perfection\n🎯 focused on growth\n💡 {name}\n🚀 the best is yet to come',
    '🏔️ climb your own mountain\n💪 stronger every day\n🦁 {name}\n✨ prove them wrong',
  ],
  professional: [
    '💼 {name}\n📊 helping brands grow\n📧 DM for collabs\n🌐 link below',
    '🎯 {name} | Founder\n📈 Marketing & Growth\n🤝 let\'s connect\n👇 work with me',
    '✅ {name}\n🎓 [Your Field] Expert\n💡 Sharing insights daily\n📩 business inquiries below',
  ],
  creative: [
    '🎨 making the world colorful\n📸 {name}\n🎵 my life is art\n🎬 stay creative',
    '✏️ words are my weapon\n🎭 {name}\n🎪 born to create\n🌈 spreading joy',
    '🪄 turning ideas into reality\n🎬 {name} | storyteller\n🌟 creating magic daily\n💫 imagination has no limits',
  ],
  minimal: [
    '{name}\n🌿\n✨',
    '{name} | 📍\n\n─ ─ ─',
    '{name}\n.\n.',
  ],
};

const styles = [
  {key:'aesthetic', icon:'styleAesthetic'},
  {key:'funny', icon:'styleFunny'},
  {key:'motivational', icon:'styleMotivational'},
  {key:'professional', icon:'styleProfessional'},
  {key:'creative', icon:'styleCreative'},
  {key:'minimal', icon:'styleMinimal'},
];

let currentStyle = 'aesthetic';

function buildTemplates() {
  const container = $('#templates');
  container.innerHTML = '';
  styles.forEach(s => {
    const btn = document.createElement('div');
    btn.className = 'bio-tpl' + (s.key === currentStyle ? ' active' : '');
    btn.textContent = t(s.icon);
    btn.onclick = () => { currentStyle = s.key; loadTemplate(); buildTemplates(); };
    container.appendChild(btn);
  });
}

function loadTemplate() {
  const list = templates[currentStyle] || templates.aesthetic;
  const tpl = list[Math.floor(Math.random() * list.length)];
  const name = $('#nameInput').value || '{name}';
  $('#input').value = tpl.replace(/\{name\}/g, name);
  updatePreview();
}

function updatePreview() {
  const text = $('#input').value;
  $('#preview').textContent = text;
}

$('#input').addEventListener('input', updatePreview);
$('#nameInput').addEventListener('input', () => {
  const name = $('#nameInput').value || '{name}';
  const text = $('#input').value.replace(/.*/, (m) => m);
  // Auto-refresh template with new name
  const list = templates[currentStyle] || templates.aesthetic;
  const tpl = list[Math.floor(Math.random() * list.length)];
  $('#input').value = tpl.replace(/\{name\}/g, name);
  updatePreview();
});

buildTemplates();
loadTemplate();

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="loadTemplate()">🔄 Generate New</button>
  <button class="gz-btn" onclick="copyText($('#input').value)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#input').value='';updatePreview()">${t('clear')}</button>`;

GZ.renderToolPage({
  category: 'social',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📸', href:'/social/instagram-post.html', name:'Instagram Post'},
    {icon:'🐦', href:'/social/twitter-counter.html', name:'Twitter Counter'},
    {icon:'😊', href:'/text/emoji-picker.html', name:'Emoji Picker'},
    {icon:'🏷️', href:'/text/hashtag-generator.html', name:'Hashtag Generator'},
  ]
});
</script>
