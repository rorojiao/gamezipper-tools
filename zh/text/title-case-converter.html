    style: '风格：',
    inputLabel: '你的文本',
    outputLabel: '标题大小写结果',
    exceptions: '自定义例外词（始终小写，除非首尾词）：',
    example: '示例',
    clear: '清除',

const { $, copyText, t } = GZ;

const SMALL_WORDS_AP = new Set(['a','an','the','and','but','or','for','nor','as','at','by','for','from','in','into','near','of','on','onto','to','with']);
const SMALL_WORDS_CHICAGO = new Set(['a','an','the','and','but','or','for','nor','as','at','by','for','from','in','into','near','of','on','onto','to','with','up','down','out','over','under','about','above','across','after','against','along','among','around','before','behind','below','beneath','beside','between','beyond','during','except','inside','outside','through','toward','towards','upon','within','without','via','vs','versus']);
const SMALL_WORDS_APA = new Set(['a','an','the','and','but','or','for','nor','as','at','by','for','from','in','into','near','of','on','onto','to','with','vs','etc']);

function getSmallSet(){
  const s=$('#style').value;
  if(s==='chicago')return SMALL_WORDS_CHICAGO;
  if(s==='apa')return SMALL_WORDS_APA;
  if(s==='first')return new Set();
  if(s==='sentence')return null; // sentence case handled differently
  return SMALL_WORDS_AP; // ap
}

function isWordBoundary(ch){return /[\s\u2000-\u206f\uff00-\uffef.,;:!?'"\-()[]{}/<>]/.test(ch);}

function toTitleCase(text){
  const style=$('#style').value;
  if(style==='sentence')return toSentenceCase(text);
  const small=getSmallSet();
  const excStr=$('#exceptions').value.trim();
  const exceptions=excStr?new Set(excStr.split(/[,，;；\s]+/).filter(Boolean)):$excSet();
  const words=text.split(/(\s+)/);
  const result=[];
  let wordIdx=0;
  const nonSpaceWords=words.filter(w=>w.trim());
  const totalNonSpace=nonSpaceWords.length;
  let nonSpaceCount=0;
  for(let i=0;i<words.length;i++){
    const w=words[i];
    if(!w.trim()){result.push(w);continue;}
    nonSpaceCount++;
    const lower=w.toLowerCase();
    const isFirst=nonSpaceCount===1;
    const isLast=nonSpaceCount===totalNonSpace;
    // Check exception first
    if(exceptions.has(lower)||exceptions.has(w)){
      result.push(lower);
    }else if(style!=='first'&&small.has(lower)&&!isFirst&&!isLast){
      result.push(lower);
    }else{
      result.push(capitalizeWord(w));
    }
  }
  return result.join('');
}

function $excSet(){return new Set();}

function capitalizeWord(w){
  // Handle words starting with special chars
  let out='';
  let found=false;
  for(let i=0;i<w.length;i++){
    const ch=w[i];
    if(!found&&/[a-zA-Z]/.test(ch)){
      out+=ch.toUpperCase();
      found=true;
    }else{
      out+=ch;
    }
  }
  if(!found)return w;
  return out;
}

function toSentenceCase(text){
  let result='';
  let capitalizeNext=true;
  for(let i=0;i<text.length;i++){
    const ch=text[i];
    if(/[.!?]/.test(ch)){
      result+=ch;
      capitalizeNext=true;
    }else if(capitalizeNext&&/[a-zA-Z]/.test(ch)){
      result+=ch.toUpperCase();
      capitalizeNext=false;
    }else{
      result+=ch.toLowerCase();
    }
  }
  return result;
}

function convert(){
  const inp=$('#input').value;
  if(!inp){$('#output').textContent='';return;}
  $('#output').textContent=toTitleCase(inp);
}

function loadExample(){
  $('#input').value='the quick brown fox jumps over the lazy dog: a tale of two cities';
  convert();
}

function doClear(){$('#input').value='';$('#output').textContent='';}

$('#input').addEventListener('input',convert);

$('#toolbar').innerHTML=`
  <button class="gz-btn" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;
