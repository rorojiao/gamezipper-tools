<script type="module">
const pdfjsLib = await import('https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.min.mjs');
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.worker.min.mjs';

GZI18n.register({
  en: {
    toolTitle: 'PDF Viewer — Read PDFs Online',
    toolDesc: 'Drag and drop any PDF to view it instantly in your browser. Navigate pages, zoom in/out — no upload, no signup, 100% private.',
    step1: 'Drag and drop a PDF file onto the page, or click to browse',
    step2: 'Use Previous / Next buttons to navigate pages',
    step3: 'Type a page number to jump directly to any page',
    step4: 'Click ✕ to close and view another PDF',
    dropHere: 'Drop PDF here or click to browse',
    of: 'of',
  },
  zh: {
    toolTitle: 'PDF 在线查看器',
    toolDesc: '拖放任意 PDF 文件即可在浏览器中即时查看。翻页、缩放 — 无需上传、无需注册、完全私密。',
    step1: '拖放 PDF 文件到页面上，或点击浏览文件',
    step2: '使用"上一页/下一页"按钮翻页',
    step3: '输入页码可直接跳转到指定页面',
    step4: '点击 ✕ 关闭当前 PDF，查看其他文件',
    dropHere: '拖放 PDF 到这里，或点击选择文件',
    of: '/',
  }
});

const { $, t } = GZ;
let pdfDoc = null;
let currentPage = 1;
let totalPages = 0;

$('#dropText').textContent = t('dropHere');

const dz = $('#dropZone');
const fi = $('#fileInput');

dz.addEventListener('click', () => fi.click());
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('dragover'); });
dz.addEventListener('dragleave', () => dz.classList.remove('dragover'));
dz.addEventListener('drop', e => {
  e.preventDefault(); dz.classList.remove('dragover');
  const file = e.dataTransfer.files[0];
  if (file && file.type === 'application/pdf') loadPdf(file);
});
fi.addEventListener('change', () => { if (fi.files[0]) loadPdf(fi.files[0]); });

async function loadPdf(file) {
  const arrayBuffer = await file.arrayBuffer();
  pdfDoc = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
  totalPages = pdfDoc.numPages;
  currentPage = 1;
  $('#fileName').textContent = file.name;
  $('#pdfControls').style.display = 'flex';
  dz.style.display = 'none';
  renderPage(currentPage);
}

async function renderPage(num) {
  if (!pdfDoc) return;
  const page = await pdfDoc.getPage(num);
  const viewport = page.getViewport({ scale: 1.5 });
  const canvas = document.createElement('canvas');
  canvas.width = viewport.width;
  canvas.height = viewport.height;
  const ctx = canvas.getContext('2d');
  await page.render({ canvasContext: ctx, viewport }).promise;
  $('#pdfViewer').innerHTML = '';
  $('#pdfViewer').appendChild(canvas);
  $('#pageInfo').textContent = `${num} ${t('of')} ${totalPages}`;
  $('#prevBtn').disabled = num <= 1;
  $('#nextBtn').disabled = num >= totalPages;
}

window.prevPage = () => { if (currentPage > 1) renderPage(--currentPage); };
window.nextPage = () => { if (currentPage < totalPages) renderPage(++currentPage); };
window.closePdf = () => {
  pdfDoc = null; currentPage = 1; totalPages = 0;
  $('#pdfViewer').innerHTML = '';
  $('#pdfControls').style.display = 'none';
  dz.style.display = 'flex';
  fi.value = '';
};

GZ.renderToolPage({
  category: 'convert',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📄', href:'/convert/pdf-merger.html', name:'PDF Merger'},
    {icon:'🖼️', href:'/convert/pdf-to-image.html', name:'PDF to Image'},
    {icon:'🗜️', href:'/convert/pdf-compressor.html', name:'PDF Compressor'},
    {icon:'💧', href:'/convert/pdf-watermark.html', name:'PDF Watermark'},
  ]
});
</script>
