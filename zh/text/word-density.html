GZI18n.register({

    toolDesc: '分析任意文本的关键词密度 — 单字、二元组、三元组、四元组频率，附带百分比和分布条。SEO 文案和内容审计必备。',
    analyze: '🔍 分析',
    clear: '🗑️ 清空',
    copy: '📋 复制报告',
    example: '📝 示例',
    lblMinLen: '最小词长',
    lblMinCount: '最少出现次数',
    lblStop: '忽略停用词',
    lblCase: '区分大小写',
    lblInput: '将文本粘贴到下方：',
    rank: '排名',
    term: '词组',
    count: '次数',
    density: '密度',
    bar: '分布',
    totalWords: '总词数',
    uniqueWords: '唯一词数',
    sentences: '句子数',
    topTerm: '最高频词',
    noResults: '无匹配结果 — 请降低最小词长或最小出现次数。',
    step1: '将文章、博客或任意文本粘贴到输入区',
    step2: '调整最小词长、最少出现次数和停用词设置',
    step3: '在 1-gram、2-gram、3-gram、4-gram 标签间切换',
    step4: '点击「复制报告」将密度表导出为 CSV',
  }
});

const { $, copyText, t } = GZ;
let currentN = 1;
let lastTable = [];

const STOP = new Set('a an the and or but if then else when while for to of in on at by from as is are was were be been being have has had do does did this that these those it its i you he she we they me him her us them my your his their our what which who whom not no nor so too very can will just dont don should now'.split(/\s+/));

$('#toolbar').innerHTML = `<button class="gz-btn" id="btn-analyze">${t('analyze')}</button><button class="gz-btn gz-btn-secondary" id="btn-example">${t('example')}</button><button class="gz-btn gz-btn-secondary" id="btn-copy">${t('copy')}</button><button class="gz-btn gz-btn-secondary" id="btn-clear">${t('clear')}</button>`;

['#lbl-minlen','#lbl-mincount','#lbl-stop','#lbl-case','#lbl-input','#th-rank','#th-term','#th-count','#th-dens','#th-bar','#title','#desc'].forEach(s => {});
$('#lbl-minlen').textContent = t('lblMinLen');
$('#lbl-mincount').textContent = t('lblMinCount');
$('#lbl-stop').textContent = t('lblStop');
$('#lbl-case').textContent = t('lblCase');
$('#lbl-input').textContent = t('lblInput');
$('#th-rank').textContent = t('rank');
$('#th-term').textContent = t('term');
$('#th-count').textContent = t('count');
$('#th-dens').textContent = t('density');
$('#th-bar').textContent = t('bar');

document.querySelectorAll('.density-tabs button').forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll('.density-tabs button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentN = parseInt(btn.dataset.n);
    analyze();
  };
});

function tokenize(text, caseSens) {
  return text
    .replace(/[‘’“”]/g, '')
    .split(/[^A-Za-z0-9\u00C0-\u024F\u4E00-\u9FFF]+/u)
    .filter(w => w.length > 0);
}

function ngrams(tokens, n) {
  if (n === 1) return tokens.map((w, i) => ({ key: w, idx: i }));
  const out = [];
  for (let i = 0; i + n <= tokens.length; i++) {
    out.push({ key: tokens.slice(i, i + n).join(' '), idx: i });
  }
  return out;
}

function analyze() {
  const raw = $('#input').value.trim();
  if (!raw) { $('#tbody').innerHTML = ''; $('#summary').innerHTML = ''; lastTable = []; return; }
  const minLen = parseInt($('#minlen').value) || 1;
  const minCount = parseInt($('#mincount').value) || 1;
  const skipStop = $('#stop').checked;
  const caseSens = $('#case-sensitive').checked;

  const tokens = tokenize(raw, caseSens).map(w => caseSens ? w : w.toLowerCase());

  const summaryTokens = tokens.length;
  const unique = new Set(tokens);
  const sentenceMatches = raw.match(/[^.!?]+[.!?]+/g) || (raw ? [raw] : []);
  const sentences = sentenceMatches.length;

  // Build n-gram counts
  const items = ngrams(tokens, currentN).filter(it => {
    if (currentN === 1) {
      if (it.key.length < minLen) return false;
      if (skipStop && STOP.has(it.key.toLowerCase())) return false;
    } else {
      const parts = it.key.split(' ');
      if (parts.some(p => p.length < minLen)) return false;
      if (skipStop && parts.every(p => STOP.has(p.toLowerCase()))) return false;
    }
    return true;
  });

  const counts = new Map();
  for (const it of items) {
    counts.set(it.key, (counts.get(it.key) || 0) + 1);
  }

  const total = items.length;
  const rows = [];
  counts.forEach((c, k) => {
    if (c >= minCount) {
      const dens = total ? (c * 100 / total) : 0;
      rows.push({ term: k, count: c, density: dens });
    }
  });
  rows.sort((a, b) => b.count - a.count || a.term.localeCompare(b.term));

  const topTerm = rows[0] ? rows[0].term : '—';
  $('#summary').innerHTML = `
    <div class="summary-card"><div class="label">${t('totalWords')}</div><div class="val">${summaryTokens}</div></div>
    <div class="summary-card"><div class="label">${t('uniqueWords')}</div><div class="val">${unique.size}</div></div>
    <div class="summary-card"><div class="label">${t('sentences')}</div><div class="val">${sentences}</div></div>
    <div class="summary-card"><div class="label">${t('topTerm')}</div><div class="val" style="font-size:1em">${topTerm.slice(0, 24)}${topTerm.length > 24 ? '…' : ''}</div></div>`;

  const maxCount = rows[0] ? rows[0].count : 1;
  if (rows.length === 0) {
    $('#tbody').innerHTML = `<tr><td colspan="5" style="text-align:center;padding:20px;color:var(--text2)">${t('noResults')}</td></tr>`;
    lastTable = [];
  } else {
    $('#tbody').innerHTML = rows.slice(0, 200).map((r, i) => {
      const pct = r.density.toFixed(2);
      const w = (r.count / maxCount * 100).toFixed(1);
      return `<tr>
        <td>${i + 1}</td>
        <td>${r.term}</td>
        <td>${r.count}</td>
        <td>${pct}%</td>
        <td class="bar-cell"><span class="bar" style="width:${w}%"></span></td>
      </tr>`;
    }).join('');
    lastTable = [['#','Term','Count','Density %'].join(',')].concat(rows.slice(0, 500).map((r, i) => [i+1, JSON.stringify(r.term), r.count, r.density.toFixed(3)].join(',')));
  }
}

$('#btn-analyze').onclick = analyze;
$('#input').addEventListener('input', () => { if ($('#input').value.length > 20) analyze(); });
$('#btn-clear').onclick = () => { $('#input').value = ''; $('#tbody').innerHTML = ''; $('#summary').innerHTML = ''; lastTable = []; };
$('#btn-copy').onclick = () => { if (lastTable.length) copyText(lastTable.join('\n')); };
$('#btn-example').onclick = () => {
  $('#input').value = 'Search engine optimization is the practice of improving the quality and quantity of website traffic from search engines. SEO targets unpaid traffic rather than direct or paid traffic. The best SEO practice is to write high quality content that satisfies user intent. Quality content is the foundation of good search engine optimization. Good SEO starts with research, not tricks. Modern search engines reward useful, original content. The best search engine optimization strategies focus on the user first. Avoid black hat SEO tricks because they can hurt rankings. SEO is a long term investment, not a quick fix.';
  analyze();
};

  descKey: 'toolDesc',

    {href:'/text/keyword-density.html',icon:'📊',name:'Keyword Density'},
    {href:'/seo/keyword-density.html',icon:'🔎',name:'SEO Keyword Density'},
    {href:'/text/headline-analyzer.html',icon:'📰',name:'Headline Analyzer'},
  ]
});
</script>
