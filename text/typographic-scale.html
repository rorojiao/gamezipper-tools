.gz-control label{font-size:.85em;color:var(--text2);font-weight:600}
.gz-control select,.gz-control input{background:var(--glass);border:1px solid var(--border);border-radius:8px;padding:6px 10px;color:var(--text);font-size:.9em}
.scale-preview{background:var(--glass);border:1px solid var(--border);border-radius:12px;padding:20px;margin-top:16px}
.scale-row{display:flex;align-items:baseline;gap:12px;padding:6px 0;border-bottom:1px solid var(--border)}
.scale-row:last-child{border-bottom:none}
.scale-label{font-size:.75em;color:var(--text2);min-width:60px;font-weight:600}
.scale-size{font-size:.8em;color:var(--accent);min-width:70px;font-weight:600}
.code-output{background:var(--glass2);border:1px solid var(--border);border-radius:8px;padding:12px;margin-top:16px;font-family:monospace;font-size:.8em;white-space:pre-wrap;word-break:break-all;max-height:400px;overflow:auto}

<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"What is a typographic scale?","acceptedAnswer":{"@type":"Answer","text":"A typographic scale is a sequence of font sizes based on a consistent ratio, creating visual harmony and hierarchy in web and print design."}},{"@type":"Question","name":"What ratio should I use?","acceptedAnswer":{"@type":"Answer","text":"Popular ratios include the Golden Ratio (1.618), Major Third (1.25), Perfect Fourth (1.333) and Minor Third (1.2). Each creates a different level of contrast between heading levels."}},{"@type":"Question","name":"Can I export the CSS?","acceptedAnswer":{"@type":"Answer","text":"Yes, you can copy the generated CSS with custom properties and font-size declarations for your project."}},{"@type":"Question","name":"What is the base font size?","acceptedAnswer":{"@type":"Answer","text":"The default base is 16px (the browser default), but you can change it to any value to match your design system."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px">
      <div class="gz-control"><label id="lbl-ratio"></label>
        <select id="sel-ratio">
          <option value="1.067">Minor Second (1.067)</option>
          <option value="1.125">Major Second (1.125)</option>
          <option value="1.2">Minor Third (1.200)</option>
          <option value="1.25" selected>Major Third (1.250)</option>
          <option value="1.333">Perfect Fourth (1.333)</option>
          <option value="1.414">Augmented Fourth (1.414)</option>
          <option value="1.5">Perfect Fifth (1.500)</option>
          <option value="1.618">Golden Ratio (1.618)</option>
          <option value="custom">Custom...</option>
        </select>
      </div>
      <div class="gz-control"><label id="lbl-base"></label>
        <input type="number" id="inp-base" value="16" min="8" max="48" step="1">
      </div>
      <div class="gz-control"><label id="lbl-steps"></label>
        <input type="number" id="inp-steps" value="6" min="1" max="12" step="1">
      </div>
      <div class="gz-control"><label id="lbl-unit"></label>
        <select id="sel-unit">
          <option value="px">px</option>
          <option value="rem">rem</option>
          <option value="em">em</option>
        </select>
      </div>
    </div>
    <div id="custom-ratio" style="display:none;margin-bottom:12px">
      <div class="gz-control"><label id="lbl-custom"></label>
        <input type="number" id="inp-custom" value="1.25" min="1.01" max="3" step="0.01">
      </div>
    </div>
    <div class="scale-preview" id="preview"></div>
    <div class="code-output" id="code-output"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Typographic Scale Generator',
    toolDesc: 'Generate modular type scales for consistent web typography. Preview sizes with Golden Ratio, Major Third and more popular ratios.',
    ratio: 'Scale Ratio',
    baseSize: 'Base Font Size (px)',
    stepsUp: 'Steps Up',
    unit: 'Output Unit',
    customRatio: 'Custom Ratio',
    generate: 'Generate',
    copyCSS: 'Copy CSS',
    example: 'Example',
    step1: 'Choose a scale ratio or enter a custom value',
    step2: 'Set the base font size (default 16px)',
    step3: 'Select number of steps and output unit',
    step4: 'Preview the scale and copy the CSS code',
  },
  zh: {
    toolTitle: '排版比例尺生成器',
    toolDesc: '为一致的网页排版生成模块化比例尺。使用黄金比例、大三度等流行比例预览字号。',
    ratio: '比例系数',
    baseSize: '基准字号 (px)',
    stepsUp: '向上步数',
    unit: '输出单位',
    customRatio: '自定义比例',
    generate: '生成',
    copyCSS: '复制 CSS',
    example: '示例',
    step1: '选择比例系数或输入自定义值',
    step2: '设置基准字号（默认 16px）',
    step3: '选择步数和输出单位',
    step4: '预览比例尺并复制 CSS 代码',
  }
});

const { $, copyText, t } = GZ;

const labels = ['h6','h5','h4','h3','h2','h1','display','hero'];
const sampleText = 'The quick brown fox';

$('#sel-ratio').addEventListener('change', function() {
  $('#custom-ratio').style.display = this.value === 'custom' ? '' : 'none';
  generate();
});

$('#lbl-ratio').textContent = t('ratio');
$('#lbl-base').textContent = t('baseSize');
$('#lbl-steps').textContent = t('stepsUp');
$('#lbl-unit').textContent = t('unit');
$('#lbl-custom').textContent = t('customRatio');

['inp-base','inp-steps','inp-custom','sel-unit'].forEach(id => {
  $(`#${id}`).addEventListener('change', generate);
  $(`#${id}`).addEventListener('input', generate);
});

function generate() {
  const ratioVal = $('#sel-ratio').value === 'custom' ? parseFloat($('#inp-custom').value) : parseFloat($('#sel-ratio').value);
  const base = parseFloat($('#inp-base').value) || 16;
  const steps = parseInt($('#inp-steps').value) || 6;
  const unit = $('#sel-unit').value;

  const sizes = [];
  // Steps down
  for (let i = -2; i <= steps; i++) {
    const px = base * Math.pow(ratioVal, i);
    const displayVal = unit === 'rem' ? (px / 16).toFixed(3) : unit === 'em' ? (px / base).toFixed(3) : px.toFixed(1);
    sizes.push({ step: i, px, display: displayVal, label: i <= 0 ? 'base' + (i < 0 ? i : '') : labels[Math.min(i - 1, labels.length - 1)] });
  }

  // Preview
  let previewHTML = '';
  sizes.slice().reverse().forEach(s => {
    const clampedPx = Math.min(s.px, 120);
    previewHTML += `<div class="scale-row">
      <span class="scale-label">${s.label}</span>
      <span class="scale-size">${s.display}${unit}</span>
      <span style="font-size:${clampedPx}px;line-height:1.2;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${sampleText}</span>
    </div>`;
  });
  $('#preview').innerHTML = previewHTML;

  // CSS
  let css = ':root {\n';
  sizes.forEach(s => {
    css += `  --font-${s.label}: ${s.display}${unit}; /* ${s.px.toFixed(1)}px */\n`;
  });
  css += '}\n\n';
  sizes.forEach(s => {
    if (s.step > 0) {
      const tag = s.step <= 6 ? `h${7 - s.step}` : (s.step === 7 ? '.display' : '.hero');
      css += `${tag} {\n  font-size: var(--font-${s.label});\n}\n\n`;
    }
  });
  $('#code-output').textContent = css;
}

function copyCSS() {
  copyText($('#code-output').textContent);
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="generate()">${t('generate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="copyCSS()">${t('copyCSS')}</button>
`;

generate();

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🔤', href:'/text/google-fonts.html', name:'Google Fonts'},
    {icon:'📏', href:'/dev/rem-px.html', name:'REM ↔ PX'},
    {icon:'📐', href:'/css-tools/clamp.html', name:'CSS Clamp'},
    {icon:'📏', href:'/css-tools/line-height.html', name:'Line Height'},
  ]
});
</script>
<script>new Image().src="https://site-analytics.gamezipper.com/hit?s=tools.gamezipper.com&p="+encodeURIComponent(location.pathname);</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
