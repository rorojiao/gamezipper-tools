<script type="application/ld+json">{"@context":"https://schema.org","@type":"WebApplication","name":"WCAG Contrast Checker","description":"Check color contrast ratios for WCAG AA and AAA accessibility compliance. Enter foreground and background colors to see pass/fail for normal text, large text and UI components. Free, browser-only.","url":"https://tools.gamezipper.com/color/wcag-contrast.html","applicationCategory":"Utility","operatingSystem":"Web Browser","offers":{"@type":"Offer","price":"0"}}</script>
<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is a good WCAG contrast ratio?", "acceptedAnswer": {"@type": "Answer", "text": "WCAG AA requires a contrast ratio of at least 4.5:1 for normal text and 3:1 for large text (18pt or 14pt bold). WCAG AAA requires 7:1 for normal text and 4.5:1 for large text. Non-text UI components and graphical objects need at least 3:1."}}, {"@type": "Question", "name": "How is the contrast ratio calculated?", "acceptedAnswer": {"@type": "Answer", "text": "The ratio is calculated using the relative luminance of each color. The formula is (L1+0.05)/(L2+0.05) where L1 is the lighter and L2 is the darker relative luminance. Relative luminance accounts for how the human eye perceives different colors."}}, {"@type": "Question", "name": "What counts as large text for WCAG?", "acceptedAnswer": {"@type": "Answer", "text": "Large text is defined as at least 18pt (24px) regular, or 14pt (18.66px) bold. Large text has a lower contrast threshold (3:1 for AA, 4.5:1 for AAA) because larger characters are easier to read at lower contrast."}}, {"@type": "Question", "name": "Does this tool check AA or AAA compliance?", "acceptedAnswer": {"@type": "Answer", "text": "This tool checks both WCAG 2.1 AA and AAA levels simultaneously. For each color pair you test, you see pass or fail for normal text, large text, and UI components at both conformance levels."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="inputs">
      <div class="field">
        <label id="lbl-fg"></label>
        <input type="color" id="fg-color" value="#333333">
        <input type="text" id="fg-hex" value="#333333" maxlength="7">
      </div>
      <div class="field">
        <label id="lbl-bg"></label>
        <input type="color" id="bg-color" value="#FFFFFF">
        <input type="text" id="bg-hex" value="#FFFFFF" maxlength="7">
      </div>
    </div>
    <div id="ratio"></div>
    <div id="preview"><span>The quick brown fox jumps</span> <span class="lg">Large Heading</span> <span class="sm">small text sample</span></div>
    <div class="result-grid" id="results"></div>
    <div id="status"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'WCAG Contrast Checker',
    toolDesc: 'Test foreground/background color pairs against WCAG 2.1 AA and AAA standards. Get instant pass/fail for normal text, large text, and UI components.',
    fg: 'Foreground (Text)',
    bg: 'Background',
    ratio: 'Contrast Ratio',
    step1: 'Pick or type a foreground (text) HEX color',
    step2: 'Pick or type a background HEX color',
    step3: 'Read the contrast ratio and pass/fail badges',
    step4: 'Adjust colors until you reach AA or AAA compliance',
  },
  zh: {
    toolTitle: 'WCAG 颜色对比度检查器',
    toolDesc: '测试前景色/背景色组合是否符合 WCAG 2.1 AA 和 AAA 标准，即时查看普通文本、大号文本和 UI 组件的通过/失败状态。',
    fg: '前景色（文字）',
    bg: '背景色',
    ratio: '对比度',
    step1: '选择或输入前景色（文字）的 HEX 值',
    step2: '选择或输入背景色的 HEX 值',
    step3: '查看对比度数值和通过/失败标记',
    step4: '调整颜色直到达到 AA 或 AAA 标准',
  }
});
const { $, copyText, t } = GZ;

function hex2rgb(hex){
  hex = hex.replace('#','').trim();
  if(hex.length===3) hex = hex.split('').map(c=>c+c).join('');
  if(!/^[0-9a-f]{6}$/i.test(hex)) return null;
  return [parseInt(hex.slice(0,2),16),parseInt(hex.slice(2,4),16),parseInt(hex.slice(4,6),16)];
}
function relLum(rgb){
  const a = rgb.map(c=>{ c/=255; return c<=0.03928? c/12.92 : Math.pow((c+0.055)/1.055,2.4); });
  return 0.2126*a[0]+0.7152*a[1]+0.0722*a[2];
}
function contrast(fgHex, bgHex){
  const fg=hex2rgb(fgHex), bg=hex2rgb(bgHex);
  if(!fg||!bg) return null;
  const l1=relLum(fg), l2=relLum(bg);
  const light=Math.max(l1,l2), dark=Math.min(l1,l2);
  return (light+0.05)/(dark+0.05);
}

function render(){
  const fg=$('#fg-hex').value, bg=$('#bg-hex').value;
  $('#fg-color').value = fg.length===7?fg:'#333333';
  $('#bg-color').value = bg.length===7?bg:'#ffffff';
  const r = contrast(fg,bg);
  if(!r){ $('#ratio').innerHTML='—'; $('#results').innerHTML=''; return; }
  const ratioStr = r.toFixed(2)+':1';
  $('#ratio').innerHTML = `<span style="color:var(--text2)">${t('ratio')}:</span> ${ratioStr}`;
  $('#preview').style.color = fg;
  $('#preview').style.background = bg;
  const checks = [
    {label:'Normal Text (AA)', req:4.5, r},
    {label:'Normal Text (AAA)', req:7, r},
    {label:'Large Text (AA)', req:3, r},
    {label:'Large Text (AAA)', req:4.5, r},
    {label:'UI Components (AA)', req:3, r},
  ];
  $('#results').innerHTML = checks.map(c=>{
    const ok = r>=c.req;
    return `<div class="rc"><h4>${c.label}</h4><span class="tag ${ok?'pass':'fail'}">${ok?'PASS':'FAIL'}</span> <span style="font-size:.8em;color:var(--text2)">need ≥${c.req}:1</span></div>`;
  }).join('');
}

function syncFg(src){
  if(src==='color'){ $('#fg-hex').value=$('#fg-color').value.toUpperCase(); }
  else { const v=$('#fg-hex').value.toUpperCase(); if(/#[0-9A-F]{6}/.test(v)) $('#fg-color').value=v; }
  render();
}
function syncBg(src){
  if(src==='color'){ $('#bg-hex').value=$('#bg-color').value.toUpperCase(); }
  else { const v=$('#bg-hex').value.toUpperCase(); if(/#[0-9A-F]{6}/.test(v)) $('#bg-color').value=v; }
  render();
}

$('#fg-color').addEventListener('input',()=>syncFg('color'));
$('#fg-hex').addEventListener('input',()=>syncFg('text'));
$('#bg-color').addEventListener('input',()=>syncBg('color'));
$('#bg-hex').addEventListener('input',()=>syncBg('text'));
$('#lbl-fg').textContent = t('fg');
$('#lbl-bg').textContent = t('bg');

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="copyText(($('#ratio').textContent.match(/[\\d.]+:[\\d]+/)||[''])[0])">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="swap()">⇄ Swap</button>`;
function swap(){
  const f=$('#fg-hex').value, b=$('#bg-hex').value;
  $('#fg-hex').value=b; $('#bg-hex').value=f;
  $('#fg-color').value=b; $('#bg-color').value=f;
  render();
}

render();

GZ.renderToolPage({
  category: 'color',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🎨', href:'/color/picker.html', name:'Color Picker'},
    {icon:'👁️', href:'/color/contrast.html', name:'Contrast Checker'},
    {icon:'🌈', href:'/color/tints-shades.html', name:'Tints & Shades'},
    {icon:'🔍', href:'/color/color-name-finder.html', name:'Color Name Finder'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
