<script>

    step3: 'Optionally filter by gender',

  zh: {
    toolTitle: '宠物名字生成器',
    toolDesc: '为你的宠物找到完美的名字。选择动物类型、风格和性别 — 即时获取 25+ 个可爱、酷炫或搞笑的宠物名。免费私密。',
    lblAnimal: '动物',
    lblStyle: '风格',
    lblGender: '性别',
    anDog: '🐕 狗', anCat: '🐈 猫', anBird: '🐦 鸟', anRabbit: '🐰 兔',
    anFish: '🐟 鱼', anHamster: '🐹 仓鼠', anReptile: '🦎 爬宠', anHorse: '🐎 马', anAny: '🐾 任意',
    stCute: '🍼 可爱', stCool: '😎 酷', stFood: '🍩 食物', stRoyal: '👑 皇家',
    stNature: '🌿 自然', stFunny: '😂 搞笑', stPop: '⭐ 流行',
    gMale: '♂ 公', gFemale: '♀ 母', gAny: '✨ 任意',
    btnGenerate: '🎲 换一批',
    emptyHint: '点击「换一批」生成名字 →',
    step1: '选择宠物类型，或选「任意」获取通用灵感',
    step2: '选择风格 — 可爱、酷、食物、皇家、自然、搞笑或流行',
    step3: '可选按性别筛选',
    step4: '点击任一名字复制，再点「换一批」获取新一批',
  }
});

const { $, copyText, t, showToast } = GZ;

const NAMES = {
  cute: ['Mochi','Luna','Pixel','Toffee','Sprout','Coco','Button','Bubbles','Pip','Noodle','Muffin','Pebble','Biscuit','Waffle','Pickles','Socks','Marshmallow','Pumpkin','Cinnamon','Dumpling','Honey','Jellybean','Olive','Peanut','Sprinkle','Truffle','Whiskers','Snickerdoodle','Boba','Cupcake'],
  cool: ['Shadow','Diesel','Bandit','Maverick','Blaze','Rogue','Onyx','Raven','Storm','Rebel','Tank','Vader','Ghost','Hunter','Phoenix','Ranger','Ace','Dash','Fang','Kong','Nitro','Rocco','Saber','Thor','Venom','Zeus','Diesel','Jett','Loki','Maverick'],
  food: ['Mochi','Latte','Tofu','Boba','Waffle','Pancake','Muffin','Cinnamon','Pickle','Olive','Pepper','Ginger','Biscotti','Truffle','Sundae','Nacho','Pepperoni','Mango','Coconut','Espresso','Matcha','Churro','Taco','Sushi','Bagel','Snickers','Caramel','Marshmallow','Nutmeg','Saffron'],
  royal: ['Duke','Duchess','King','Queen','Prince','Princess','Baron','Regent','Caesar','Cleo','Windsor','Arthur','Eleanor','Henry','Victoria','Edward','Boudica','Maximus','Sultan','Empress','Sire','Lord','Lady','Sir Lancelot','Guinevere','Napoleon','Cleopatra','Charlemagne','Catherine','Ramses'],
  nature: ['Willow','River','Sage','Cedar','Maple','Aspen','Birch','Storm','Cloud','Dawn','Dusk','Frost','Hazel','Ivy','Jade','Luna','Meadow','Moss','Pebble','Rain','Sky','Stone','Sunny','Thunder','Violet','Breeze','Flint','Hawk','Indigo','Jasmine'],
  funny: ['Sir Waggington','Chairman Meow','Bark Obama','Hairy Paw-ter','Jude Paw','Meowly Cyrus','Purrlock Holmes','Boba Fett','Luke Skybarker','Snoop Dogg','Dogzilla','Mary Poppins','Winnie the Poodle','Bilbo Waggins','Pico de Gato','Anderson Poop','Kanye Westie','Benedict Cumberbatch','Furry Potter','Woofy Allen','Meow Zedong','Catrick Swayze','Leonardo DiCatzio','Brad PITT','Bark Twain','Santa Paws','Julius Sneezer','Vincent van Gogh-dog','Hairy Styles','Meowie Mandel'],
  pop: ['Yoda','Gollum','Frodo','Gandalf','Hermione','Groot','Pikachu','Nala','Simba','Bagheera','Totoro','Gizmo','Stitch','Elsa','Olaf','Mulan','Mushu','Haku','Jiji','Kirby','Sonic','Zelda','Link','Mario','Luigi','Peach','Bowser','Dobby','Hedwig','Crookshanks']
};

const ANIMALS = ['dog','cat','bird','rabbit','fish','hamster','reptile','horse','any'];
const STYLES = ['cute','cool','food','royal','nature','funny','pop'];
const GENDERS = ['any','male','female'];
let animal = 'any', style = 'cute', gender = 'any';

const pick = a => a[Math.floor(Math.random()*a.length)];
const female = n => /(a|y|ie|ella|ine|is|ah|een)$/.test(n.toLowerCase()) || ['Luna','Elsa','Coco','Bella','Lily','Stella','Nala','Cleo','Eleanor','Victoria','Guinevere','Cleopatra','Catherine','Mulan','Peach','Elsa','Hermione'].includes(n);
const male = n => !female(n);

function makeList() {
  let pool = [...NAMES[style]];
  if (gender === 'female') pool = pool.filter(female);
  else if (gender === 'male') pool = pool.filter(male);
  // shuffle + unique
  const set = [...new Set(pool)].sort(() => Math.random() - 0.5);
  const emoji = {dog:'🐕',cat:'🐈',bird:'🐦',rabbit:'🐰',fish:'🐟',hamster:'🐹',reptile:'🦎',horse:'🐎',any:'🐾'}[animal];
  if (!set.length) { $('#results').innerHTML = `<div class="png-empty">${t('emptyHint')}</div>`; return; }
  $('#results').innerHTML = set.slice(0, 24).map(n => `
    <div class="png-card" data-name="${n}" title="Click to copy ${n}">
      <div class="png-emoji">${emoji}</div>
      <div class="png-name">${n}</div>
    </div>`).join('');
}

function buildPills(containerId, items, currentRef, keyPrefix, setter) {
  const c = $('#' + containerId);
  c.innerHTML = items.map((it, i) => `<button class="png-pill${i === 0 ? ' active' : ''}" data-v="${it}">${t(keyPrefix + it.charAt(0).toUpperCase() + it.slice(1))}</button>`).join('');
  c.addEventListener('click', e => {
    const b = e.target.closest('.png-pill'); if (!b) return;
    c.querySelectorAll('.png-pill').forEach(x => x.classList.remove('active'));
    b.classList.add('active'); setter(b.dataset.v); makeList();
  });
}

buildPills('animals', ANIMALS, animal, 'an', v => animal = v);
buildPills('styles', STYLES, style, 'st', v => style = v);
buildPills('genders', GENDERS, gender, 'g', v => gender = v);

$('#results').addEventListener('click', e => {
  const card = e.target.closest('.png-card'); if (!card) return;
  copyText(card.dataset.name); showToast('✓ ' + card.dataset.name);
});

$('#toolbar').innerHTML = `<button class="gz-btn" id="btn-gen">${t('btnGenerate')}</button>`;
$('#btn-gen').onclick = makeList;

makeList();

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1', 'step2', 'step3', 'step4'],
  related: [
    {icon:'👤', href:'/text/random-name-generator.html', name:'Random Name'},
    {icon:'🆔', href:'/text/username-generator.html', name:'Username'},
    {icon:'📱', href:'/text/app-name-generator.html', name:'App Name'},
    {icon:'🎯', href:'/text/tagline-generator.html', name:'Tagline'},
  ]
});
</script>
