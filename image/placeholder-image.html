<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is a placeholder image?", "acceptedAnswer": {"@type": "Answer", "text": "A placeholder image is a temporary image used in design mockups, prototypes, and layouts to represent where the final image will appear. It typically shows the dimensions and any custom text."}}, {"@type": "Question", "name": "What sizes are commonly used?", "acceptedAnswer": {"@type": "Answer", "text": "Common sizes: 1920x1080 (HD hero), 1200x630 (social share), 800x600 (product), 400x300 (thumbnail), 256x256 (avatar), 16x16 (favicon). You can enter any custom dimensions."}}, {"@type": "Question", "name": "Can I generate transparent placeholders?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. Set the background color to transparent (toggle the checkbox) and download as PNG. The placeholder will have only the text overlay with a see-through background."}}, {"@type": "Question", "name": "What image formats are supported?", "acceptedAnswer": {"@type": "Answer", "text": "PNG (lossless, supports transparency), JPG (smaller file, no transparency), and SVG (vector, scalable, perfect for web). Download in any format with one click."}}]}</script>

<script>
GZI18n.register({
  en: {
    toolTitle: 'Placeholder Image Generator',
    toolDesc: 'Generate custom placeholder images for mockups, wireframes, and prototypes. Any size, color, text, and format. Free and instant.',
    width: 'Width (px)',
    height: 'Height (px)',
    presets: 'Common Sizes',
    text: 'Custom Text (optional)',
    bgColor: 'Background',
    fgColor: 'Text Color',
    fontSize: 'Font Size (0 = auto)',
    format: 'Format',
    transparent: 'Transparent background (PNG only)',
    download: 'Download',
    copyUrl: 'Copy Data URL',
    autoText: 'auto',
    copied: 'Copied!',
    step1: 'Set the width and height in pixels',
    step2: 'Optionally add custom text or pick a preset size',
    step3: 'Choose colors, font size, and format',
    step4: 'Click Download to save the placeholder image',
  },
  zh: {
    toolTitle: '占位图生成器',
    toolDesc: '为设计稿、原型和线框图生成自定义占位图片。任意尺寸、颜色、文字和格式，免费即时生成。',
    width: '宽度 (px)',
    height: '高度 (px)',
    presets: '常用尺寸',
    text: '自定义文字（可选）',
    bgColor: '背景色',
    fgColor: '文字颜色',
    fontSize: '字号 (0 = 自动)',
    format: '格式',
    transparent: '透明背景（仅 PNG）',
    download: '下载',
    copyUrl: '复制 Data URL',
    autoText: '自动',
    copied: '已复制！',
    step1: '设置宽度和高度（像素）',
    step2: '可选：添加自定义文字或选择常用尺寸',
    step3: '选择颜色、字号和格式',
    step4: '点击「下载」保存占位图',
  }
});

const { $, copyText, t } = GZ;

var PRESETS = [
  {label:'16:9 HD', w:1920, h:1080},
  {label:'Social', w:1200, h:630},
  {label:'Square', w:1080, h:1080},
  {label:'4:3', w:800, h:600},
  {label:'Avatar', w:256, h:256},
  {label:'Thumb', w:400, h:300},
  {label:'Story', w:1080, h:1920},
  {label:'Banner', w:728, h:90},
];

function buildPresets() {
  $('#presets').innerHTML = PRESETS.map(function(p, i) {
    return '<button data-i="' + i + '">' + p.label + ' ' + p.w + '×' + p.h + '</button>';
  }).join('');
  $('#presets').querySelectorAll('button').forEach(function(b) {
    b.onclick = function() {
      var p = PRESETS[+b.dataset.i];
      $('#width').value = p.w;
      $('#height').value = p.h;
      render();
    };
  });
}

$('#lbl-w').textContent = t('width');
$('#lbl-h').textContent = t('height');
$('#lbl-presets').textContent = t('presets');
$('#lbl-text').textContent = t('text');
$('#lbl-bg').textContent = t('bgColor');
$('#lbl-fg').textContent = t('fgColor');
$('#lbl-fontsize').textContent = t('fontSize');
$('#lbl-format').textContent = t('format');
$('#lbl-transparent').textContent = t('transparent');
$('#btn-download').textContent = t('download');
$('#btn-copy').textContent = t('copyUrl');

function render() {
  var w = parseInt($('#width').value) || 1;
  var h = parseInt($('#height').value) || 1;
  w = Math.max(1, Math.min(4096, w));
  h = Math.max(1, Math.min(4096, h));

  var canvas = $('#canvas');
  canvas.width = w; canvas.height = h;
  var ctx = canvas.getContext('2d');

  var transparent = $('#transparent').checked;
  var bg = $('#bgColor').value;
  var fg = $('#fgColor').value;

  if (transparent) {
    ctx.clearRect(0, 0, w, h);
  } else {
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, w, h);
  }

  // Text overlay
  var txt = $('#text').value.trim();
  var displayText = txt || (w + ' × ' + h);
  var fontSize = parseInt($('#fontSize').value) || 0;
  if (fontSize === 0) {
    // Auto-size based on smaller dimension
    fontSize = Math.max(10, Math.min(w, h) / 8);
  }
  ctx.fillStyle = fg;
  ctx.font = 'bold ' + fontSize + 'px -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  // Shrink font if text overflows
  while (fontSize > 8 && ctx.measureText(displayText).width > w * 0.92) {
    fontSize -= 2;
    ctx.font = 'bold ' + fontSize + 'px -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif';
  }
  ctx.fillText(displayText, w / 2, h / 2);

  // If transparent + text empty, draw nothing extra
  if (transparent && !txt) {
    ctx.clearRect(0, 0, w, h);
  }

  // Generate data URL info
  var format = $('#format').value;
  var mime = format === 'jpg' ? 'image/jpeg' : 'image/png';
  try {
    var url = canvas.toDataURL(mime, 0.92);
    window._lastUrl = url;
    window._lastFormat = format;
    var sizeKb = Math.round(url.length * 0.75 / 1024);
    $('#data-url-info').innerHTML = '<strong>' + format.toUpperCase() + '</strong> · ' + w + '×' + h + ' · ~' + sizeKb + ' KB';
  } catch(e) {
    $('#data-url-info').textContent = 'Preview only (download for full size)';
  }

  $('#status').innerHTML = '';
}

function download() {
  render();
  var format = $('#format').value;
  if (format === 'svg') {
    downloadSvg();
    return;
  }
  var url = window._lastUrl;
  if (!url) return;
  var link = document.createElement('a');
  var w = $('#width').value, h = $('#height').value;
  link.download = 'placeholder-' + w + 'x' + h + '.' + format;
  link.href = url;
  link.click();
}

function downloadSvg() {
  var w = parseInt($('#width').value) || 1;
  var h = parseInt($('#height').value) || 1;
  var transparent = $('#transparent').checked;
  var bg = $('#bgColor').value;
  var fg = $('#fgColor').value;
  var txt = $('#text').value.trim() || (w + ' × ' + h);
  var fontSize = parseInt($('#fontSize').value) || Math.max(10, Math.min(w, h) / 8);
  var escTxt = txt.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  var bgRect = transparent ? '' : '<rect width="' + w + '" height="' + h + '" fill="' + bg + '"/>';
  var svg = '<?xml version="1.0" encoding="UTF-8"?>\n<svg xmlns="http://www.w3.org/2000/svg" width="' + w + '" height="' + h + '" viewBox="0 0 ' + w + ' ' + h + '">' + bgRect + '<text x="50%" y="50%" font-family="sans-serif" font-weight="bold" font-size="' + fontSize + '" fill="' + fg + '" text-anchor="middle" dominant-baseline="middle">' + escTxt + '</text></svg>';
  var blob = new Blob([svg], { type: 'image/svg+xml' });
  var url = URL.createObjectURL(blob);
  var link = document.createElement('a');
  link.download = 'placeholder-' + w + 'x' + h + '.svg';
  link.href = url;
  link.click();
  setTimeout(function() { URL.revokeObjectURL(url); }, 1000);
}

function copyUrl() {
  render();
  if (window._lastUrl) {
    copyText(window._lastUrl);
    $('#status').innerHTML = '<span style="color:var(--gz-success)">✓ ' + t('copied') + '</span>';
  }
}

$('#btn-download').onclick = download;
$('#btn-copy').onclick = copyUrl;

['width','height','text','bgColor','fgColor','fontSize','format','transparent'].forEach(function(id) {
  var el = $('#' + id);
  el.addEventListener('input', render);
  el.addEventListener('change', render);
});

buildPresets();
render();

GZ.renderToolPage({
  category: 'image',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🔳', href:'/image/qrcode-generator.html', name:'QR Code Generator'},
    {icon:'🎨', href:'/image/favicon-generator.html', name:'Favicon Generator'},
    {icon:'📐', href:'/image/resizer.html', name:'Image Resizer'},
    {icon:'✂️', href:'/image/cropper.html', name:'Image Cropper'},
  ]
});
</script>
<script src="/tools-result-rec.js?v=20260707v520" defer></script>
</body>
