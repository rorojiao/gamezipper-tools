    lblTemplates: '1. 选择提示词模板',
    lblResult: '生成的提示词',
    subject: '主题 / 内容',
    subjectPh: '例如：夜晚的未来东京街头',
    style: '风格',
    stylePh: '例如：赛博朋克、照片写实、油画',
    mood: '氛围 / 情绪',
    moodPh: '例如：神秘、充满活力、平静',
    detail: '额外细节',
    detailPh: '例如：霓虹灯、雨后倒影、两个行人',
    copy: '复制',
    generate: '生成',
    clear: '清空',
    random: '随机',
    fieldRequired: '请填写主题字段',
    promptCopied: '✓ 提示词已复制！',
    step1: '选择符合目标的模板（艺术、写作、代码、营销…）',
    step2: '填写字段：主题、风格、氛围和任何额外细节',
    step3: '点击「生成」构建一条调优的、可直接粘贴的提示词',
    step4: '复制并粘贴到 ChatGPT、Midjourney、DALL·E 或任何其他 AI 工具',
  }
});

const { $, copyText, t } = GZ;

const TEMPLATES = [
  {
    id: 'image-art',
    emoji: '🎨',
    en: { name: 'Image / Art (Midjourney, DALL·E)', desc: 'Detailed image prompt with style, lighting, composition' },
    zh: { name: '图片 / 艺术（Midjourney, DALL·E）', desc: '带风格、光影、构图的详细图片提示词' },
    platforms: ['Midjourney', 'DALL·E', 'Stable Diffusion', 'Flux'],
    build: (s, st, m, d) => `${s}, ${st} style, ${m} mood, ${d ? d + ', ' : ''}highly detailed, 8k, professional lighting, cinematic composition, masterpiece`
  },
  {
    id: 'writing-story',
    emoji: '📖',
    en: { name: 'Creative Writing / Story', desc: 'Story starter with setting, character, conflict' },
    zh: { name: '创意写作 / 故事', desc: '包含场景、角色、冲突的故事开头' },
    platforms: ['ChatGPT', 'Claude', 'Gemini'],
    build: (s, st, m, d) => `Write a ${st} story about ${s}. The tone should be ${m}. ${d ? 'Key details: ' + d + '. ' : ''}Include vivid sensory descriptions, dialogue, and a clear narrative arc. Begin with a strong opening hook.`
  },
  {
    id: 'code-helper',
    emoji: '💻',
    en: { name: 'Code Helper', desc: 'Programming task with language, style, requirements' },
    zh: { name: '代码助手', desc: '编程任务，包含语言、风格、需求' },
    platforms: ['ChatGPT', 'Claude', 'Copilot'],
    build: (s, st, m, d) => `Act as an expert ${st} developer. ${s}. ${d ? 'Requirements: ' + d + '. ' : ''}Write clean, well-commented code following best practices. Include error handling and a brief explanation of the approach.`
  },
  {
    id: 'marketing-copy',
    emoji: '📣',
    en: { name: 'Marketing Copy', desc: 'Persuasive copy for product, email, ad' },
    zh: { name: '营销文案', desc: '用于产品、邮件、广告的说服性文案' },
    platforms: ['ChatGPT', 'Claude', 'Gemini'],
    build: (s, st, m, d) => `Write ${st} marketing copy for ${s}. The tone should feel ${m}. ${d ? 'Include these points: ' + d + '. ' : ''}Make it punchy, benefit-focused, and include a clear call to action. Target length: 150-200 words.`
  },
  {
    id: 'blog-post',
    emoji: '📝',
    en: { name: 'Blog Post Outline', desc: 'SEO-friendly blog structure with H2/H3' },
    zh: { name: '博客文章大纲', desc: 'SEO 友好的博客结构，含 H2/H3' },
    platforms: ['ChatGPT', 'Claude', 'Gemini'],
    build: (s, st, m, d) => `Create a detailed blog post outline about ${s}. Writing style: ${st}. Tone: ${m}. ${d ? 'Cover these points: ' + d + '. ' : ''}Include a compelling title (under 60 chars), meta description (under 155 chars), 5-7 H2 sections with H3 sub-points, and a conclusion with a call to action.`
  },
  {
    id: 'social-post',
    emoji: '🐦',
    en: { name: 'Social Media Post', desc: 'Engaging post for Twitter, LinkedIn, Instagram' },
    zh: { name: '社交媒体帖子', desc: '适合 Twitter、LinkedIn、Instagram 的吸引人帖子' },
    platforms: ['ChatGPT', 'Claude'],
    build: (s, st, m, d) => `Write a ${st} social media post about ${s}. The vibe should be ${m}. ${d ? 'Mention: ' + d + '. ' : ''}Keep it concise, scroll-stopping, and include 3-5 relevant hashtags. Add a hook in the first line.`
  },
  {
    id: 'email',
    emoji: '📧',
    en: { name: 'Email Draft', desc: 'Professional email with subject and body' },
    zh: { name: '邮件起草', desc: '专业的邮件，含主题和正文' },
    platforms: ['ChatGPT', 'Claude', 'Gemini'],
    build: (s, st, m, d) => `Write a ${st} email about ${s}. The tone should be ${m}. ${d ? 'Key points to cover: ' + d + '. ' : ''}Include a clear subject line, a polite greeting, concise body (under 200 words), and a professional sign-off.`
  },
  {
    id: 'productivity',
    emoji: '⚡',
    en: { name: 'Productivity / Plan', desc: 'Action plan with steps and timeline' },
    zh: { name: '效率 / 计划', desc: '带步骤和时间线的行动计划' },
    platforms: ['ChatGPT', 'Claude', 'Gemini'],
    build: (s, st, m, d) => `Create a detailed action plan for ${s}. Style: ${st}. ${d ? 'Constraints: ' + d + '. ' : ''}Break it into 5-7 clear, ordered steps with concrete tasks, estimated time, and measurable success criteria. Use bullet points.`
  }
];

const STYLES = ['photorealistic','cinematic','oil painting','watercolor','anime','3D render','pixel art','cyberpunk','minimalist','vintage','comic book','low poly','isometric','portrait','documentary'];
const MOODS  = ['dramatic','serene','mysterious','energetic','melancholic','epic','dreamy','cozy','dark','uplifting','nostalgic','whimsical','tense','romantic','playful'];
const SUBJECTS = ['a cat astronaut floating in space','a hidden cafe in a rainy alley','a vintage typewriter on a wooden desk','a young wizard reading a glowing book','a magical forest at twilight','a futuristic city with flying cars','a tiny dragon sleeping on a mushroom','a robot painting a self-portrait','a pirate ship in a stormy sea','an ancient temple covered in vines'];
const DETAILS = ['golden hour lighting, soft bokeh, ultra detailed, sharp focus','studio lighting, dark background, rim light, high contrast','pastel colors, soft shadows, dreamy atmosphere','rain reflections, neon signs, misty, blade runner vibes','sunbeams through trees, dust particles, peaceful','snow falling, soft blue tones, quiet mood'];

let currentTemplate = TEMPLATES[0];

function renderTemplates() {
  const lang = GZI18n.getLang();
  document.getElementById('templateGrid').innerHTML = TEMPLATES.map(tpl => {
    const info = tpl[lang] || tpl.en;
    const active = tpl.id === currentTemplate.id ? ' style="border-color:var(--accent);background:rgba(78,205,196,0.1)"' : '';
    return `<button class="ai-template"${active} onclick="selectTemplate('${tpl.id}')"><span class="ai-emoji">${tpl.emoji}</span><span class="ai-name">${info.name}</span><span class="ai-desc">${info.desc}</span></button>`;
  }).join('');
}

function selectTemplate(id) {
  currentTemplate = TEMPLATES.find(t => t.id === id);
  renderTemplates();
  renderFields();
  generate();
}

function renderFields() {
  const tpl = currentTemplate;
  const lang = GZI18n.getLang();
  const info = tpl[lang] || tpl.en;
  document.getElementById('fieldsArea').innerHTML = `
    <label><span>${t('subject')} *</span><input type="text" id="fSubject" placeholder="${t('subjectPh')}" oninput="generate()"></label>
    <label><span>${t('style')}</span>
      <input type="text" id="fStyle" list="styleList" placeholder="${t('stylePh')}" oninput="generate()">
      <datalist id="styleList">${STYLES.map(s => `<option value="${s}">`).join('')}</datalist>
    </label>
    <label><span>${t('mood')}</span>
      <input type="text" id="fMood" list="moodList" placeholder="${t('moodPh')}" oninput="generate()">
      <datalist id="moodList">${MOODS.map(s => `<option value="${s}">`).join('')}</datalist>
    </label>
    <label><span>${t('detail')}</span><textarea id="fDetail" rows="2" placeholder="${t('detailPh')}" oninput="generate()"></textarea></label>
    <label><span>Platforms</span><input type="text" value="${tpl.platforms.join(', ')}" disabled style="opacity:.6"></label>
  `;
  // Pre-fill style/mood with sensible defaults
  document.getElementById('fStyle').value = STYLES[0];
  document.getElementById('fMood').value = MOODS[0];
}

function randomize() {
  document.getElementById('fSubject').value = SUBJECTS[Math.floor(Math.random() * SUBJECTS.length)];
  document.getElementById('fStyle').value = STYLES[Math.floor(Math.random() * STYLES.length)];
  document.getElementById('fMood').value = MOODS[Math.floor(Math.random() * MOODS.length)];
  document.getElementById('fDetail').value = DETAILS[Math.floor(Math.random() * DETAILS.length)];
  generate();
}

function generate() {
  const s = document.getElementById('fSubject')?.value.trim();
  const st = document.getElementById('fStyle')?.value.trim() || 'cinematic';
  const m = document.getElementById('fMood')?.value.trim() || 'dramatic';
  const d = document.getElementById('fDetail')?.value.trim();
  const out = document.getElementById('promptResult');
  if (!s) { out.textContent = '— ' + t('fieldRequired') + ' —'; return; }
  out.textContent = currentTemplate.build(s, st, m, d);
}

function doClear() {
  ['fSubject','fStyle','fMood','fDetail'].forEach(id => { const el = document.getElementById(id); if (el) el.value = ''; });
  document.getElementById('promptResult').textContent = '';
}

document.getElementById('toolbar').innerHTML = `
  <button class="gz-btn" onclick="randomize()">🎲 ${t('random')}</button>
  <button class="gz-btn" onclick="generate()">✨ ${t('generate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="copyText(document.getElementById('promptResult').textContent)">📋 ${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

renderTemplates();
renderFields();

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📝', href:'/text/fancy-text.html', name:'Fancy Text'},
    {icon:'✨', href:'/text/hashtag-generator.html', name:'Hashtag Generator'},
    {icon:'📧', href:'/text/email-extractor.html', name:'Email Extractor'},
    {icon:'🔤', href:'/text/case-converter.html', name:'Case Converter'},
  ]
});
</script>
