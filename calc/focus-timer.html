<script>
GZI18n.register({
  en: {
    toolTitle: 'Focus Timer',
    toolDesc: 'Deep work focus timer with Pomodoro, 52/17 and custom sessions. Ambient white noise, session stats and break reminders — beat distractions, 100% in your browser.',
    pomodoro: 'Pomodoro 25/5',
    deep: '52/17 Deep Work',
    ultradian: '90-min Ultradian',
    custom: 'Custom',
    focusLabel: 'FOCUS',
    breakLabel: 'BREAK',
    start: 'Start',
    pause: 'Pause',
    resume: 'Resume',
    reset: 'Reset',
    skip: 'Skip',
    focusDone: 'Focus sessions',
    sessionsLbl: 'Total rounds',
    minutesLbl: 'Minutes focused',
    whiteNoise: '🌧 White Noise',
    brownNoise: '🌧 Brown Noise',
    tick: '⏱ Tick',
    off: '🔇 Off',
    step1: 'Pick a focus preset or set custom durations',
    step2: 'Press Start to begin your focus session',
    step3: 'Optionally turn on ambient white noise to block distractions',
    step4: 'Take the scheduled break when the chime sounds',
  },
  zh: {
    toolTitle: '专注计时器',
    toolDesc: '深度工作专注计时器，支持番茄钟、52/17 法则和自定义时长。内置白噪音、会话统计和休息提醒 — 远离干扰，浏览器本地运行。',
    pomodoro: '番茄 25/5',
    deep: '52/17 深度工作',
    ultradian: '90 分钟超日节律',
    custom: '自定义',
    focusLabel: '专注',
    breakLabel: '休息',
    start: '开始',
    pause: '暂停',
    resume: '继续',
    reset: '重置',
    skip: '跳过',
    focusDone: '专注次数',
    sessionsLbl: '总轮数',
    minutesLbl: '专注分钟',
    whiteNoise: '🌧 白噪音',
    brownNoise: '🌧 棕噪音',
    tick: '⏱ 滴答',
    off: '🔇 关闭',
    step1: '选择一个专注模式或自定义时长',
    step2: '点击「开始」进入专注会话',
    step3: '可选开启白噪音屏蔽干扰',
    step4: '听到提示音时按计划休息',
  }
});

const { $, t } = GZ;

const PRESETS = {
  pomodoro: { focus: 25, break: 5, label: 'pomodoro' },
  deep:     { focus: 52, break: 17, label: 'deep' },
  ultradian:{ focus: 90, break: 20, label: 'ultradian' },
  custom:   { focus: 45, break: 10, label: 'custom' },
};

let state = {
  preset: 'pomodoro',
  mode: 'focus',
  remaining: 25 * 60,
  running: false,
  sessions: 0,
  focusCount: 0,
  totalMinutes: 0,
  intervalId: null,
  noise: 'off',
};

function loadStats() {
  try {
    const s = JSON.parse(localStorage.getItem('gz_focus_stats') || '{}');
    state.focusCount = s.focusCount || 0;
    state.totalMinutes = s.totalMinutes || 0;
    state.sessions = s.sessions || 0;
  } catch(e) {}
}
function saveStats() {
  localStorage.setItem('gz_focus_stats', JSON.stringify({
    focusCount: state.focusCount, totalMinutes: state.totalMinutes, sessions: state.sessions
  }));
}

function fmt(sec) {
  const m = Math.floor(sec/60), s = sec%60;
  return String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
}

function render() {
  const p = PRESETS[state.preset];
  const total = (state.mode === 'focus' ? p.focus : p.break) * 60;
  const progress = (1 - state.remaining/total) * 100;
  $('#circle').style.setProperty('--progress', progress);
  $('#circle').style.setProperty('--ring-color', state.mode === 'focus' ? 'var(--gz-accent,#4ecdc4)' : '#ff6b6b');
  $('#time').textContent = fmt(state.remaining);
  $('#phase-label').textContent = state.mode === 'focus' ? t('focusLabel') : t('breakLabel');
  $('#phase-wrap').className = 'timer-display phase-' + state.mode;
  $('#start-btn').textContent = state.running ? t('pause') : (state.remaining < total ? t('resume') : t('start'));
  $('#stat-focus').textContent = state.focusCount;
  $('#stat-sessions').textContent = state.sessions;
  $('#stat-minutes').textContent = state.totalMinutes;
  $('#stat-focus-lbl').textContent = t('focusDone');
  $('#stat-sessions-lbl').textContent = t('sessionsLbl');
  $('#stat-minutes-lbl').textContent = t('minutesLbl');
  document.title = (state.running ? fmt(state.remaining) + ' · ' : '') + t('toolTitle');
  // update preset buttons
  document.querySelectorAll('#presets button').forEach(b => {
    b.classList.toggle('active', b.dataset.p === state.preset);
  });
  document.querySelectorAll('#noise-row button').forEach(b => {
    b.classList.toggle('active', b.dataset.n === state.noise);
  });
}

function toggleTimer() {
  state.running = !state.running;
  if (state.running) {
    if (state.noise !== 'off') startNoise(state.noise);
    state.intervalId = setInterval(tick, 1000);
  } else {
    stopNoise();
    clearInterval(state.intervalId);
  }
  render();
}

function tick() {
  state.remaining--;
  if (state.remaining <= 0) {
    playChime();
    const p = PRESETS[state.preset];
    if (state.mode === 'focus') {
      state.focusCount++;
      state.totalMinutes += p.focus;
      state.sessions++;
      state.mode = 'break';
      state.remaining = p.break * 60;
    } else {
      state.mode = 'focus';
      state.remaining = p.focus * 60;
    }
    saveStats();
    if (state.noise !== 'off') startNoise(state.noise);
  }
  render();
}

function resetTimer() {
  state.running = false;
  clearInterval(state.intervalId);
  stopNoise();
  const p = PRESETS[state.preset];
  state.mode = 'focus';
  state.remaining = p.focus * 60;
  render();
}

function skipPhase() {
  const p = PRESETS[state.preset];
  if (state.mode === 'focus') {
    state.mode = 'break';
    state.remaining = p.break * 60;
  } else {
    state.mode = 'focus';
    state.remaining = p.focus * 60;
  }
  render();
}

function setPreset(key) {
  state.preset = key;
  resetTimer();
}

// Audio
let audioCtx = null, noiseNode = null;
function ensureCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function startNoise(type) {
  stopNoise();
  const ctx = ensureCtx();
  const bufferSize = 2 * ctx.sampleRate;
  const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
  const data = buffer.getChannelData(0);
  if (type === 'brown') {
    let last = 0;
    for (let i=0;i<bufferSize;i++){const w=Math.random()*2-1;last=(last+0.02*w)/1.02;data[i]=last*3.5;}
  } else if (type === 'white') {
    for (let i=0;i<bufferSize;i++) data[i] = Math.random()*2-1;
  } else if (type === 'tick') {
    // tick handled separately with oscillator interval
  }
  if (type === 'tick') {
    state.tickId = setInterval(()=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.frequency.value=1000;o.connect(g);g.connect(ctx.destination);
      g.gain.setValueAtTime(0.08,ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.05);
      o.start();o.stop(ctx.currentTime+0.05);
    },1000);
    return;
  }
  noiseNode = ctx.createBufferSource();
  noiseNode.buffer = buffer; noiseNode.loop = true;
  const gain = ctx.createGain();
  gain.gain.value = type === 'brown' ? 0.15 : 0.08;
  noiseNode.connect(gain); gain.connect(ctx.destination);
  noiseNode.start();
}
function stopNoise() {
  if (noiseNode) { try { noiseNode.stop(); } catch(e){} noiseNode = null; }
  if (state.tickId) { clearInterval(state.tickId); state.tickId = null; }
}
function setNoise(type) {
  if (state.noise === type) type = 'off';
  state.noise = type;
  if (state.running && type !== 'off') startNoise(type); else stopNoise();
  render();
}
function playChime() {
  const ctx = ensureCtx();
  [880, 1100].forEach((freq,i) => {
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.frequency.value = freq; o.type = 'sine';
    o.connect(g); g.connect(ctx.destination);
    g.gain.setValueAtTime(0, ctx.currentTime + i*0.15);
    g.gain.linearRampToValueAtTime(0.2, ctx.currentTime + i*0.15 + 0.02);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i*0.15 + 0.6);
    o.start(ctx.currentTime + i*0.15); o.stop(ctx.currentTime + i*0.15 + 0.6);
  });
}

// Build presets & noise buttons
$('#presets').innerHTML = Object.keys(PRESETS).map(k =>
  `<button data-p="${k}" onclick="setPreset('${k}')">${t(PRESETS[k].label)}</button>`
).join('');
$('#noise-row').innerHTML = ['whiteNoise','brownNoise','tick','off'].map(k => {
  const v = k === 'off' ? 'off' : k.replace('Noise','').toLowerCase();
  return `<button data-n="${v}" onclick="setNoise('${v}')">${t(k)}</button>`;
}).join('');
$('#start-btn').textContent = t('start');
$('#reset-btn').textContent = t('reset');
$('#skip-btn').textContent = t('skip');

loadStats();
render();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🍅', href:'/calc/pomodoro.html', name:'Pomodoro Timer'},
    {icon:'🔥', href:'/calc/streak-counter.html', name:'Habit Streak'},
    {icon:'⏱️', href:'/calc/tabata-timer.html', name:'Tabata Timer'},
    {icon:'⏰', href:'/calc/alarm-clock.html', name:'Alarm Clock'},
  ]
});
</script>
