<script>
GZI18n.register({"en":{"toolTitle":"Satoshi to USD Converter","toolDesc":"Convert sats to BTC and fiat instantly. Set any Bitcoin market price; calculations stay entirely in your browser.","sats":"Satoshis (sats)","btcPrice":"Bitcoin price","currency":"Fiat currency","btc":"Bitcoin (BTC)","fiat":"Fiat value","mbtc":"MilliBitcoin (mBTC)","ubtc":"MicroBitcoin (μBTC)","oneUsd":"Sats per 1 unit of fiat","preset":"Quick amounts","reset":"Reset","note":"Price note: enter the current, historical or target BTC price you want to use. No market API is called.","step1":"Enter the number of satoshis (sats) you want to convert","step2":"Set the Bitcoin market price and choose a fiat currency","step3":"Read the BTC, fiat, mBTC and μBTC values instantly","step4":"Use a quick preset or change any value to recalculate automatically"},"zh":{"toolTitle":"聪（Satoshi）兑美元转换器","toolDesc":"即时将聪换算为 BTC 和法币。可设置任意比特币市场价格，全部计算仅在浏览器中进行。","sats":"聪（sats）数量","btcPrice":"比特币价格","currency":"法币币种","btc":"比特币（BTC）","fiat":"法币价值","mbtc":"毫比特币（mBTC）","ubtc":"微比特币（μBTC）","oneUsd":"每 1 单位法币对应的聪","preset":"快捷数量","reset":"重置","note":"价格说明：请输入当前、历史或目标 BTC 价格。本工具不会调用市场行情 API。","step1":"输入要换算的聪（sats）数量","step2":"设置比特币市场价格并选择法币币种","step3":"即时查看 BTC、法币、mBTC 和 μBTC 结果","step4":"使用快捷预设或修改任意值自动重新计算"}});
const { $, t } = GZ;
function text(id,key){const el=$(id);if(el)el.textContent=t(key)}
function num(id,fallback=0){const n=parseFloat($(id).value);return Number.isFinite(n)?n:fallback}
function money(n,currency){try{return new Intl.NumberFormat(undefined,{style:'currency',currency:currency||'USD',maximumFractionDigits:Math.abs(n)<1?8:2}).format(n)}catch(e){return (currency||'$')+' '+n.toLocaleString(undefined,{maximumFractionDigits:8})}}

[['#l-sats','sats'],['#l-price','btcPrice'],['#l-currency','currency'],['#k-btc','btc'],['#k-fiat','fiat'],['#k-mbtc','mbtc'],['#k-ubtc','ubtc'],['#k-one','oneUsd'],['#reset','reset'],['#note','note']].forEach(x=>text(...x));
const p=$('#presets');[1,1000,100000,1000000,100000000].forEach(n=>{const b=document.createElement('button');b.textContent=n.toLocaleString()+' sats';b.onclick=()=>{$('#sats').value=n;calculate()};p.appendChild(b)});
function calculate(){const sats=Math.max(0,num('#sats')),price=Math.max(0,num('#price')),cur=$('#currency').value;const btc=sats/1e8;$('#v-btc').textContent=btc.toLocaleString(undefined,{maximumFractionDigits:8});$('#v-fiat').textContent=money(btc*price,cur);$('#v-mbtc').textContent=(btc*1000).toLocaleString(undefined,{maximumFractionDigits:8});$('#v-ubtc').textContent=(btc*1e6).toLocaleString(undefined,{maximumFractionDigits:4});$('#v-one').textContent=price>0?Math.round(1e8/price).toLocaleString():'—'}
['#sats','#price','#currency'].forEach(id=>$(id).addEventListener('input',calculate));$('#reset').onclick=()=>{$('#sats').value=100000;$('#price').value=60000;$('#currency').value='USD';calculate()};calculate();

GZ.renderToolPage({category:'calc',titleKey:'toolTitle',descKey:'toolDesc',howToSteps:['step1','step2','step3','step4'],related:[{"icon":"₿","href":"/calc/crypto-profit-calculator.html","name":"Crypto Profit Calculator"},{"icon":"📈","href":"/calc/crypto-dca-calculator.html","name":"Crypto DCA Calculator"},{"icon":"💱","href":"/convert/crypto-converter.html","name":"Crypto Converter"},{"icon":"🪙","href":"/calc/staking-yield-calculator.html","name":"Staking Yield Calculator"}]});
</script>
