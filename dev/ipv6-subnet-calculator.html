const { $, copyText, t } = GZ;

/* ---- IPv6 parsing & formatting ---- */
function parseIPv6(str) {
  str = str.trim();
  if (!str) return null;
  // Handle :: shorthand
  const halves = str.split('::');
  if (halves.length > 2) return null; // only one :: allowed

  let left = halves[0] ? halves[0].split(':') : [];
  let right = halves.length === 2 ? (halves[1] ? halves[1].split(':') : []) : null;

  // Validate groups
  const allGroups = [...left];
  if (right !== null) allGroups.push(...right);
  for (const g of allGroups) {
    if (g === '') return null;
    if (!/^[0-9a-fA-F]{1,4}$/.test(g)) return null;
  }

  if (right !== null) {
    const missing = 8 - left.length - right.length;
    if (missing < 1) return null; // :: used unnecessarily or too many groups
    const groups = [];
    for (const g of left) groups.push(parseInt(g, 16));
    for (let i = 0; i < missing; i++) groups.push(0);
    for (const g of right) groups.push(parseInt(g, 16));
    return groups;
  } else {
    if (left.length !== 8) return null;
    return left.map(g => parseInt(g, 16));
  }
}

function expandIPv6(groups) {
  return groups.map(g => g.toString(16).padStart(4, '0')).join(':');
}

function compressIPv6(groups) {
  const hex = groups.map(g => g.toString(16));
  // Find longest run of zeros
  let bestStart = -1, bestLen = 0;
  let curStart = -1, curLen = 0;
  for (let i = 0; i < 8; i++) {
    if (groups[i] === 0) {
      if (curStart === -1) curStart = i;
      curLen++;
      if (curLen > bestLen) { bestLen = curLen; bestStart = curStart; }
    } else {
      curStart = -1; curLen = 0;
    }
  }
  if (bestLen < 2) return hex.join(':');
  const before = hex.slice(0, bestStart);
  const after = hex.slice(bestStart + bestLen);
  return (before.length ? before.join(':') : '') + '::' + (after.length ? after.join(':') : '');
}

function applyPrefix(groups, prefix) {
  // Return a new array with bits after `prefix` zeroed out
  const result = groups.slice();
  const fullBits = prefix;
  const remainingGroups = Math.ceil(fullBits / 16);
  // Zero out bits within the last group touched
  if (fullBits % 16 !== 0) {
    const bitsToKeep = fullBits % 16;
    const mask = (0xFFFF << (16 - bitsToKeep)) & 0xFFFF;
    result[Math.floor(fullBits / 16)] = result[Math.floor(fullBits / 16)] & mask;
  }
  // Zero remaining groups
  const startZero = Math.ceil(fullBits / 16);
  for (let i = startZero; i < 8; i++) result[i] = 0;
  return result;
}

function flipGroups(groups) {
  // Flip last bit of first byte (universal/local)
  const result = groups.slice();
  result[0] = result[0] ^ 0x0200;
  return result;
}

function macToEUI64(mac) {
  const parts = mac.split(/[:\-]/);
  if (parts.length !== 6) return null;
  const bytes = parts.map(p => parseInt(p, 16));
  if (bytes.some(b => isNaN(b) || b < 0 || b > 255)) return null;
  // Insert FFFE in the middle
  const eui = [bytes[0], bytes[1], bytes[2], 0xFF, 0xFE, bytes[3], bytes[4], bytes[5]];
  // Flip the U/L bit (bit 1 of first byte)
  eui[0] ^= 0x02;
  // Convert to 4 groups of 16-bit
  const groups = [];
  for (let i = 0; i < 8; i += 2) groups.push((eui[i] << 8) | eui[i + 1]);
  return groups;
}

function bigNumberStr(hostBits) {
  if (hostBits <= 0) return '1';
  // 2^hostBits as string
  if (hostBits > 308) return '≈ 3.4 × 10³⁸ (340 undecillion)';
  const n = BigInt(1) << BigInt(hostBits);
  return n.toString();
}

function calculate() {
  $('#err').textContent = '';
  $('#results').innerHTML = '';
  const addrStr = $('#addr').value.trim();
  const prefixVal = parseInt($('#prefix').value);
  const macStr = $('#mac').value.trim();

  if (!addrStr) { $('#err').textContent = t('errInvalid'); return; }
  if (isNaN(prefixVal) || prefixVal < 0 || prefixVal > 128) { $('#err').textContent = t('errPrefix'); return; }

  const groups = parseIPv6(addrStr);
  if (!groups) { $('#err').textContent = t('errInvalid'); return; }

  const expanded = expandIPv6(groups);
  const compressed = compressIPv6(groups);
  const subnetGroups = applyPrefix(groups, prefixVal);
  const subnetExpanded = expandIPv6(subnetGroups);
  const subnetCompressed = compressIPv6(subnetGroups);

  // Range: first = subnet, last = subnet with host bits all 1
  const lastGroups = subnetGroups.slice();
  const hostBits = 128 - prefixVal;
  if (hostBits > 0) {
    // Set all host bits to 1
    const prefixFullGroups = Math.floor(prefixVal / 16);
    const bitsInPartialGroup = prefixVal % 16;
    if (bitsInPartialGroup > 0) {
      const lowBits = 16 - bitsInPartialGroup;
      lastGroups[prefixFullGroups] = lastGroups[prefixFullGroups] | ((1 << lowBits) - 1);
    }
    for (let i = prefixFullGroups + (bitsInPartialGroup > 0 ? 1 : 0); i < 8; i++) lastGroups[i] = 0xFFFF;
    // Edge: prefix=0
    if (prefixVal === 0) for (let i = 0; i < 8; i++) lastGroups[i] = 0xFFFF;
  }

  const rows = [];
  rows.push([t('expanded'), expanded]);
  rows.push([t('compressed'), compressed]);
  rows.push([t('subnetId'), subnetCompressed + ' (expanded: ' + subnetExpanded + ')']);
  rows.push([t('rangeStart'), subnetCompressed]);
  rows.push([t('rangeEnd'), compressIPv6(lastGroups)]);
  rows.push([t('bitsHost'), hostBits + ' bit(s)']);
  rows.push([t('total'), bigNumberStr(hostBits)]);

  // EUI-64
  if (macStr) {
    const euiGroups = macToEUI64(macStr);
    if (euiGroups) {
      const euiHex = euiGroups.map(g => g.toString(16).padStart(4, '0')).join(':');
      rows.push([t('eui64'), euiHex]);
      // Combine prefix + EUI-64
      const prefixGroups = subnetGroups.slice();
      for (let i = 4; i < 8; i++) prefixGroups[i] = euiGroups[i - 4];
      rows.push([t('eui64Full'), compressIPv6(prefixGroups)]);
    }
  }

  let html = '<div class="result-card">';
  for (const [label, value] of rows) {
    html += `<div class="result-row"><span class="result-label">${label}</span><span class="result-value">${value} <span class="copy-link" onclick="copyText('${value.replace(/'/g, "\\'")}')">${t('copy')}</span></span></div>`;
  }
  html += '</div>';
  $('#results').innerHTML = html;
}

function loadExample() {
  $('#addr').value = '2001:db8:acad:1::1';
  $('#prefix').value = '64';
  $('#mac').value = '00:1A:2B:3C:4D:5E';
  calculate();
}

function doClear() {
  $('#addr').value = ''; $('#prefix').value = '64'; $('#mac').value = '';
  $('#results').innerHTML = ''; $('#err').textContent = '';
}

$('#addr').addEventListener('keydown', e => { if (e.key === 'Enter') calculate(); });
$('#prefix').addEventListener('keydown', e => { if (e.key === 'Enter') calculate(); });

$('#toolbar').innerHTML = `

</script>
