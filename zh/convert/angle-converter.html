</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Angle Converter',
    toolDesc: 'Convert between degrees (°), radians (rad), gradians (gon), turns, arcminutes, arcseconds and milliradians — instantly, free and private.',
    swap: 'Swap',
    clear: 'Clear',
    copy: 'Copy',
    step1: 'Enter an angle value in the input field',
    step2: 'Pick the source unit (From)',
    step3: 'Pick the target unit (To)',
    step4: 'The result and conversion factor update instantly',
  },
  zh: {
    toolTitle: '角度单位转换器',
    toolDesc: '在度 (°)、弧度 (rad)、梯度 (gon)、转、角分、角秒和毫弧度之间即时免费转换，结果精确且私密。',
    swap: '交换',
    clear: '清除',
    copy: '复制',
    step1: '在输入框中输入角度值',
    step2: '选择源单位（从）',
    step3: '选择目标单位（到）',
    step4: '结果和换算系数即时更新',
  }
});

const { $, copyText, t } = GZ;

// Base unit: radians
const UNITS = [
  { id: 'deg',  label: 'Degree (°)',          zh: '度 (°)',         factor: Math.PI/180 },
  { id: 'rad',  label: 'Radian (rad)',         zh: '弧度 (rad)',     factor: 1 },
  { id: 'grad', label: 'Gradian / Gon (gon)',  zh: '梯度 / 冈 (gon)',factor: Math.PI/200 },
  { id: 'turn', label: 'Turn / Revolution',    zh: '转 / 圈',         factor: 2*Math.PI },
  { id: 'arcmin', label: 'Arcminute (′)',      zh: '角分 (′)',       factor: Math.PI/10800 },
  { id: 'arcsec', label: 'Arcsecond (″)',      zh: '角秒 (″)',       factor: Math.PI/648000 },
  { id: 'mrad', label: 'Milliradian (mrad)',   zh: '毫弧度 (mrad)',  factor: 0.001 },
  { id: 'degmin', label: 'Degree + Arcmin DMS', zh: '度.分 (DMS)',   factor: Math.PI/180 },
];

const lang = GZI18n.getLang();
const opts = UNITS.map(u => `<option value="${u.id}">${lang === 'zh' ? u.zh : u.label}</option>`).join('');

$('#converter').innerHTML = `
  <div class="gz-converter-row">
    <input type="number" id="inputVal" placeholder="0" step="any" oninput="convert()">
    <select id="fromUnit" onchange="convert()">${opts}</select>
  </div>
  <div class="gz-converter-row" style="justify-content:center">
    <button class="gz-btn gz-btn-secondary" onclick="swapUnits()">⇅ ${t('swap')}</button>
  </div>
  <div class="gz-converter-row">
    <input type="text" id="outputVal" readonly>
    <select id="toUnit" onchange="convert()">${opts}</select>
  </div>
  <div id="formulaDisplay" style="margin-top:8px;font-size:.85em;opacity:.7"></div>
`;

$('#fromUnit').value = 'deg';
$('#toUnit').value = 'rad';

function fmt(n) {
  if (!isFinite(n)) return '';
  return parseFloat(n.toPrecision(12)).toString();
}

function convert() {
  const val = parseFloat($('#inputVal').value);
  if (isNaN(val)) { $('#outputVal').value = ''; $('#formulaDisplay').textContent = ''; return; }
  const from = UNITS.find(u => u.id === $('#fromUnit').value);
  const to = UNITS.find(u => u.id === $('#toUnit').value);
  const inRad = val * from.factor;
  const result = inRad / to.factor;
  $('#outputVal').value = fmt(result);
  const ratio = from.factor / to.factor;
  const fromLabel = lang === 'zh' ? from.zh : from.label;
  const toLabel = lang === 'zh' ? to.zh : to.label;
  $('#formulaDisplay').textContent = `1 ${from.id} = ${fmt(ratio)} ${to.id}`;
}

function swapUnits() {
  const f = $('#fromUnit').value;
  $('#fromUnit').value = $('#toUnit').value;
  $('#toUnit').value = f;
  convert();
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="copyText($('#outputVal').value)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#inputVal').value='';$('#outputVal').value='';$('#formulaDisplay').textContent=''">${t('clear')}</button>
`;

convert();

GZ.renderToolPage({
  category: 'convert',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📐', href:'/calc/trigonometry-calculator.html', name:'Trigonometry'},
    {icon:'📏', href:'/convert/length-converter.html', name:'Length'},
    {icon:'🔢', href:'/convert/number-base.html', name:'Number Base'},
    {icon:'📐', href:'/calc/area-calculator.html', name:'Area Calculator'},
  ]
});
</script>
