<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"What is a permutation?","acceptedAnswer":{"@type":"Answer","text":"A permutation (nPr) is the number of ways to arrange r items from a set of n, where order matters. The formula is nPr = n! / (n - r)!. For example, P(5,3) = 60 ways to arrange 3 items from 5."}},{"@type":"Question","name":"What is a combination?","acceptedAnswer":{"@type":"Answer","text":"A combination (nCr) is the number of ways to choose r items from a set of n, where order does not matter. The formula is nCr = n! / (r! × (n - r)!). For example, C(5,3) = 10 ways to pick 3 items from 5."}},{"@type":"Question","name":"What does repetition mean?","acceptedAnswer":{"@type":"Answer","text":"With repetition, the same item can be chosen multiple times. The formulas become nPr_repeated = n^r and nCr_repeated = (n + r - 1)! / (r! × (n - 1)!). Without repetition is the standard case where each item is used at most once."}},{"@type":"Question","name":"How large a number can this handle?","acceptedAnswer":{"@type":"Answer","text":"JavaScript numbers handle integers up to 2^53 - 1 (about 9 quadrillion) precisely. For larger results, the calculator automatically uses BigInt to give exact values. Factorials of n > 1000 are usually astronomical and are returned in scientific notation."}}]}</script>

<script>
GZI18n.register({
  en: {
    toolTitle: 'Permutation & Combination Calculator',
    toolDesc: 'Compute nPr, nCr, factorials and binomial coefficients online. With or without repetition, step-by-step breakdown, large number support via BigInt.',
    step1: 'Pick a tab: Permutation (nPr), Combination (nCr), Factorial (n!), or Binomial coefficient',
    step2: 'Enter n (total items) and r (selected items) as non-negative integers',
    step3: 'Toggle "Allow repetition" if items can be chosen more than once',
    step4: 'Read the exact result and step-by-step breakdown on the right',
  },
  zh: {
    toolTitle: '排列与组合计算器',
    toolDesc: '在线计算 nPr、nCr、阶乘和二项式系数。支持可重复/不可重复、详细步骤分解，大数使用 BigInt 保证精度。',
    step1: '选择标签：排列(nPr)、组合(nCr)、阶乘(n!)或二项式系数',
    step2: '输入 n（总项数）和 r（选取数），必须是非负整数',
    step3: '若允许重复选择，勾选「允许重复」',
    step4: '在右侧查看精确结果和详细计算步骤',
  }
});

const { $, copyText, t } = GZ;
let activeTab = 'perm';

function bigFactorial(n) {
  if (n < 0) throw new Error('n must be non-negative');
  if (n > 100000) throw new Error('n is too large (max 100,000)');
  let r = 1n;
  for (let i = 2n; i <= BigInt(n); i++) r *= i;
  return r;
}

function formatNumber(n) {
  if (typeof n === 'bigint') {
    const s = n.toString();
    if (s.length <= 30) return s;
    // Scientific notation for big numbers
    const exp = s.length - 1;
    const mantissa = s[0] + '.' + s.substring(1, 6);
    return `${mantissa}e${exp}  (≈ ${s.length} digits)`;
  }
  if (n > 1e15) return n.toExponential(6);
  return n.toLocaleString();
}

function calculate() {
  const err = $('#err');
  err.textContent = '';
  try {
    if (activeTab === 'fact') {
      const n = parseInt($('#f-n').value);
      if (isNaN(n) || n < 0) throw new Error('Enter a non-negative integer');
      if (n > 100000) throw new Error('n must be ≤ 100,000');
      const r = bigFactorial(n);
      $('#result-text').textContent = `${n}! = `;
      $('#result-value').textContent = formatNumber(r);
      $('#steps-formula').innerHTML = '<b>Step:</b> ' + n + '! = 1 × 2 × 3 × … × ' + n;
      let steps = `n = ${n}\n\nFactorial: ${n}! = 1 × 2 × 3 × ... × ${n}\n`;
      if (n <= 20) {
        let s = '= ';
        for (let i = 1; i <= n; i++) s += (i === 1 ? '' : ' × ') + i;
        s += '\n= ' + formatNumber(r);
        steps = s;
      } else {
        steps += `\n= ${formatNumber(r)}`;
      }
      $('#steps').textContent = steps;
      return;
    }

    const n = parseInt($('#f-n').value);
    const r = parseInt($('#f-r').value);
    if (isNaN(n) || isNaN(r)) throw new Error('Enter integers for n and r');
    if (n < 0) throw new Error('n must be non-negative');
    if (r < 0) throw new Error('r must be non-negative');
    if (n > 10000) throw new Error('n must be ≤ 10,000');

    const repetition = $('#repetition').checked;
    let result, formula, steps;

    if (activeTab === 'perm') {
      if (!repetition && r > n) throw new Error(`r (${r}) cannot exceed n (${n}) without repetition`);
      if (repetition) {
        result = BigInt(n) ** BigInt(r);
        formula = `<b>Formula:</b> nPr (with repetition) = n<sup>r</sup> = ${n}<sup>${r}</sup>`;
        steps = `n = ${n}, r = ${r}, repetition = YES\n\nnPr = n^r = ${n}^${r}\n    = ${formatNumber(result)}`;
      } else {
        result = bigFactorial(n) / bigFactorial(n - r);
        formula = `<b>Formula:</b> nPr = n! ÷ (n − r)! = ${n}! ÷ (${n-r})!`;
        steps = `n = ${n}, r = ${r}\n\nnPr = n! / (n-r)!\n    = ${n}! / (${n-r})!\n    = ${formatNumber(result)}`;
      }
      $('#result-text').textContent = `P(${n}, ${r}) = `;
    } else if (activeTab === 'comb') {
      if (!repetition && r > n) throw new Error(`r (${r}) cannot exceed n (${n}) without repetition`);
      if (repetition) {
        // C(n+r-1, r) = (n+r-1)! / (r! * (n-1)!)
        const nn = n + r - 1;
        result = bigFactorial(nn) / (bigFactorial(r) * bigFactorial(n - 1));
        formula = `<b>Formula:</b> nCr (with repetition) = (n + r − 1)! ÷ (r! × (n − 1)!)`;
        steps = `n = ${n}, r = ${r}, repetition = YES\n\nnCr(rep) = C(n + r - 1, r)\n        = C(${nn}, ${r})\n        = (${nn})! / (${r}! × ${n-1}!)\n        = ${formatNumber(result)}`;
      } else {
        result = bigFactorial(n) / (bigFactorial(r) * bigFactorial(n - r));
        formula = `<b>Formula:</b> nCr = n! ÷ (r! × (n − r)!)`;
        steps = `n = ${n}, r = ${r}\n\nnCr = n! / (r! × (n-r)!)\n    = ${n}! / (${r}! × ${n-r}!)\n    = ${formatNumber(result)}`;
      }
      $('#result-text').textContent = `C(${n}, ${r}) = `;
    } else if (activeTab === 'binom') {
      // Same as nCr but with more detail
      if (r > n) throw new Error(`r (${r}) cannot exceed n (${n})`);
      result = bigFactorial(n) / (bigFactorial(r) * bigFactorial(n - r));
      formula = `<b>Formula:</b> C(n, k) = n! ÷ (k! × (n − k)!)`;
      steps = `n = ${n}, k = ${r}\n\nC(n, k) = binomial coefficient\n       = ${n}! / (${r}! × ${n-r}!)\n       = ${formatNumber(result)}`;
      $('#result-text').textContent = `C(${n}, ${r}) = `;
    }

    $('#steps-formula').innerHTML = formula;
    $('#steps').textContent = steps;
    $('#result-value').textContent = formatNumber(result);
  } catch(e) {
    $('#result-value').textContent = '—';
    $('#steps').textContent = 'Enter valid values to see the breakdown.';
    err.textContent = '⚠ ' + e.message;
  }
}

function renderTab() {
  const t = activeTab;
  const cardTitle = $('#card-title');
  const cardFormula = $('#card-formula');
  const cardInputs = $('#card-inputs');
  const repChk = $('#repetition');
  const repLabel = repChk.parentElement;

  if (t === 'perm') {
    cardTitle.textContent = 'Permutation (nPr)';
    cardFormula.innerHTML = '<b>Formula:</b> nPr = n! ÷ (n − r)!';
    repLabel.style.display = '';
  } else if (t === 'comb') {
    cardTitle.textContent = 'Combination (nCr)';
    cardFormula.innerHTML = '<b>Formula:</b> nCr = n! ÷ (r! × (n − r)!)';
    repLabel.style.display = '';
  } else if (t === 'fact') {
    cardTitle.textContent = 'Factorial (n!)';
    cardFormula.innerHTML = '<b>Formula:</b> n! = 1 × 2 × 3 × … × n';
    repLabel.style.display = 'none';
  } else if (t === 'binom') {
    cardTitle.textContent = 'Binomial Coefficient C(n, k)';
    cardFormula.innerHTML = '<b>Formula:</b> C(n, k) = n! ÷ (k! × (n − k)!)';
    repLabel.style.display = 'none';
  }

  if (t === 'fact') {
    cardInputs.innerHTML = `<div class="pc-input"><label>n<input type="number" id="f-n" value="5" min="0" max="100000" step="1"></label></div><div></div>`;
  } else {
    cardInputs.innerHTML = `<div class="pc-input"><label>n (total items)<input type="number" id="f-n" value="10" min="0" max="10000" step="1"></label></div><div class="pc-input"><label>r (selected items)<input type="number" id="f-r" value="3" min="0" max="10000" step="1"></label></div>`;
  }

  if (t === 'fact') { $('#f-n').addEventListener('input', calculate); }
  else { $('#f-n').addEventListener('input', calculate); $('#f-r').addEventListener('input', calculate); }
  $('#repetition').addEventListener('change', calculate);
  calculate();
}

function loadExample() {
  // Active tab: perm
  document.querySelector('[data-tab="perm"]').click();
  $('#f-n').value = 10;
  $('#f-r').value = 3;
  calculate();
}

function doClear() {
  if (activeTab === 'fact') $('#f-n').value = 0;
  else { $('#f-n').value = 0; $('#f-r').value = 0; }
  calculate();
}

// Wire tab clicks
document.querySelectorAll('.pc-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.pc-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    activeTab = tab.dataset.tab;
    renderTab();
  });
});

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn" onclick="copyText($('#result-value').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🔢', href:'/calc/prime-number.html', name:'Prime Number'},
    {icon:'🧮', href:'/calc/fraction-calculator.html', name:'Fraction Calculator'},
    {icon:'📊', href:'/calc/statistics-calculator.html', name:'Statistics Calculator'},
    {icon:'⚖️', href:'/calc/bmi-calculator.html', name:'BMI Calculator'},
  ]
});

renderTab();
</script>
