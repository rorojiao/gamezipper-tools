<script type="application/ld+json">{"@context":"https://schema.org","@type":"WebApplication","name":"Carpet Calculator","description":"Calculate carpet for one or many rooms with stairs. Get square feet, square yards and total cost — free and instant.","url": "https://tools.gamezipper.com/zh/calc/carpet-calculator.html","applicationCategory":"Utility","operatingSystem":"Web Browser","offers":{"@type":"Offer","price":"0"}}</script>
<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "How is carpet measured and sold?", "acceptedAnswer": {"@type": "Answer", "text": "In the US, carpet is sold by the square yard. Most rolls come 12 feet wide, so carpet is often calculated by linear feet of a 12-foot roll. Internationally it is sold by the square meter."}}, {"@type": "Question", "name": "How much extra carpet should I add for waste?", "acceptedAnswer": {"@type": "Answer", "text": "Add 10% extra for rectangular rooms and 20% extra for rooms with odd shapes, alcoves, or pattern matching. This covers cutting, seams, seams matching and future repairs."}}, {"@type": "Question", "name": "How much carpet do I need for stairs?", "acceptedAnswer": {"@type": "Answer", "text": "A typical straight staircase with 13-14 steps needs about 40-50 square feet (4-5 square yards) of carpet. Wider or winding stairs need more. Add the stair carpet area to your room totals."}}, {"@type": "Question", "name": "Should I add carpet padding separately?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. Padding is sold by the same area as carpet. Most installers add padding cost per square yard separately, typically $0.50 - $2.00 per sq ft installed."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="form-grid">
      <div class="form-group"><label id="lbl-units"></label>
        <select id="units"><option value="ft">Feet (ft)</option><option value="m">Meters (m)</option></select>
      </div>
      <div class="form-group"><label id="lbl-waste"></label>
        <input type="number" id="waste" value="10" min="0" max="50" step="1">
      </div>
      <div class="form-group"><label id="lbl-price"></label>
        <input type="number" id="price" value="4" min="0" step="0.1">
      </div>
      <div class="form-group"><label id="lbl-stairs"></label>
        <input type="number" id="stairs" value="0" min="0" step="1">
      </div>
    </div>
    <div class="subsection-title" id="rooms-title"></div>
    <div class="rooms-section" id="roomsContainer"></div>
    <div class="btn-row">
      <button id="btn-add-room"></button>
      <button class="primary" id="btn-calc"></button>
    </div>
    <div class="result-box" id="resultBox"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Carpet Calculator',
    toolDesc: 'Calculate carpet for one or many rooms plus stairs. Get square feet, square yards and total cost — including waste allowance — free and instant.',
    units: 'Units',
    waste: 'Extra Waste (%)',
    price: 'Price per sq unit',
    stairs: 'Number of Stairs',
    roomsTitle: 'Rooms',
    roomName: 'Room name',
    width: 'Width',
    length: 'Length',
    addRoom: '+ Add Room',
    calculate: 'Calculate Carpet',
    totalArea: 'Total Room Area',
    stairArea: 'Stair Carpet Area',
    totalCarpet: 'Total Carpet Needed',
    squareYards: 'Square Yards',
    totalCost: 'Estimated Cost',
    step1: 'Choose feet or meters as your unit',
    step2: 'Add each room with its width and length',
    step3: 'Enter the number of stairs (about 3.5 sq ft each)',
    step4: 'Get square feet, square yards and total cost — always buy 10% extra',
  },
  zh: {
    toolTitle: '地毯用量计算器',
    toolDesc: '计算一个或多个房间加楼梯的地毯用量。即时获取平方英尺、平方码和总价（含损耗余量） — 免费即时。',
    units: '单位',
    waste: '额外损耗（%）',
    price: '每平方单位价格',
    stairs: '楼梯数量',
    roomsTitle: '房间',
    roomName: '房间名称',
    width: '宽',
    length: '长',
    addRoom: '+ 添加房间',
    calculate: '计算地毯',
    totalArea: '房间总面积',
    stairArea: '楼梯地毯面积',
    totalCarpet: '所需地毯总量',
    squareYards: '平方码',
    totalCost: '预估费用',
    step1: '选择英尺或米为单位',
    step2: '添加每个房间的宽和长',
    step3: '输入楼梯数量（每级约 3.5 平方英尺）',
    step4: '获取平方英尺、平方码和总价 — 通常需多备 10%',
  }
});

const { $, t } = GZ;

$('#lbl-units').textContent = t('units');
$('#lbl-waste').textContent = t('waste');
$('#lbl-price').textContent = t('price');
$('#lbl-stairs').textContent = t('stairs');
$('#rooms-title').textContent = t('roomsTitle');
$('#btn-add-room').textContent = t('addRoom');
$('#btn-calc').textContent = t('calculate');

let roomCount = 0;
function addRoom(name, w, l) {
  roomCount++;
  const c = $('#roomsContainer');
  const row = document.createElement('div');
  row.className = 'room-row';
  row.innerHTML = `
    <input type="text" placeholder="${t('roomName')}" class="room-n" value="${name || ('Room ' + roomCount)}">
    <input type="number" placeholder="${t('width')}" class="room-w" min="0" step="0.1" value="${w !== undefined ? w : ''}">
    <input type="number" placeholder="${t('length')}" class="room-l" min="0" step="0.1" value="${l !== undefined ? l : ''}">
    <span style="line-height:2.5;font-size:.85em;color:var(--text2)">× <span class="room-num">${roomCount}</span></span>
    <button onclick="this.parentElement.remove();calculate()">&times;</button>`;
  c.appendChild(row);
}

function calculate() {
  const units = $('#units').value;
  const waste = parseFloat($('#waste').value) || 0;
  const price = parseFloat($('#price').value) || 0;
  const stairs = parseInt($('#stairs').value) || 0;

  const areaUnit = units === 'ft' ? 'ft²' : 'm²';
  const sqYdLabel = t('squareYards');

  let roomArea = 0;
  document.querySelectorAll('#roomsContainer .room-row').forEach(row => {
    const w = parseFloat(row.querySelector('.room-w').value) || 0;
    const l = parseFloat(row.querySelector('.room-l').value) || 0;
    roomArea += w * l;
  });

  // Each straight stair ~ 18in x 10in tread+riser ≈ 1.25 sq ft; we use 3.5 sq ft for safer estimate (includes nosing & wrap)
  const stairAreaPerUnit = units === 'ft' ? 3.5 : 0.325;
  const stairArea = stairs * stairAreaPerUnit;

  const baseArea = roomArea + stairArea;
  const totalArea = baseArea * (1 + waste / 100);
  // Square yards: 1 yd² = 9 ft². For meters, use square meters as is and convert to yards (1 m² ≈ 1.196 yd²)
  let sqYards;
  if (units === 'ft') {
    sqYards = totalArea / 9;
  } else {
    sqYards = totalArea * 1.19599;
  }
  const cost = totalArea * price;

  $('#resultBox').innerHTML = `
    <div class="result-item"><div class="label">${t('totalArea')}</div><div class="val">${roomArea.toFixed(1)} ${areaUnit}</div></div>
    <div class="result-item"><div class="label">${t('stairArea')}</div><div class="val">${stairArea.toFixed(1)} ${areaUnit}</div></div>
    <div class="result-item"><div class="label">${t('totalCarpet')}</div><div class="val" style="font-size:2.2em">${totalArea.toFixed(1)} ${areaUnit}</div></div>
    <div class="result-item"><div class="label">${sqYdLabel}</div><div class="val">${sqYards.toFixed(2)}</div></div>
    <div class="result-item"><div class="label">${t('totalCost')}</div><div class="val">${cost.toFixed(2)}</div></div>`;
}

addRoom('Living Room', 14, 16);
addRoom('Bedroom', 12, 12);
calculate();

$('#btn-add-room').onclick = () => { addRoom(); calculate(); };
$('#btn-calc').onclick = calculate;
['units','waste','price','stairs'].forEach(id => $('#' + id).addEventListener('input', calculate));

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🎨', href:'/calc/paint-calculator.html', name:'Paint Calculator'},
    {icon:'🟫', href:'/calc/tile-calculator.html', name:'Tile Calculator'},
    {icon:'🪟', href:'/calc/wallpaper-calculator.html', name:'Wallpaper'},
    {icon:'📏', href:'/calc/square-footage.html', name:'Square Footage'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
