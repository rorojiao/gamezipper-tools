const { $, t } = GZ;

// 2024 federal tax brackets (single / MFJ / HoH)
const BRACKETS = {
  single: [
    [11600, 0.10], [47150, 0.12], [100525, 0.22],
    [191950, 0.24], [243725, 0.32], [609350, 0.35], [Infinity, 0.37]
  ],
  mfj: [
    [23200, 0.10], [94300, 0.12], [201050, 0.22],
    [383900, 0.24], [487450, 0.32], [731200, 0.35], [Infinity, 0.37]
  ],
  hoh: [
    [16550, 0.10], [63100, 0.12], [100500, 0.22],
    [191950, 0.24], [243700, 0.32], [609350, 0.35], [Infinity, 0.37]
  ]
};

const STD_DEDUCTION = { single: 14600, mfj: 29200, hoh: 21900 };
const SS_WAGE_BASE_2024 = 168600;
const QBI_THRESHOLD = { single: 191950, mfj: 383900, hoh: 191950 };

function fmt(n) {
  if (!Number.isFinite(n)) n = 0;
  const sign = n < 0 ? '-' : '';
  n = Math.abs(n);
  return sign + '$' + n.toLocaleString('en-US', { maximumFractionDigits: 0 });
}

function fedTax(taxable, status) {
  if (taxable <= 0) return 0;
  const brackets = BRACKETS[status] || BRACKETS.single;
  let tax = 0, prev = 0;
  for (const [cap, rate] of brackets) {
    if (taxable <= cap) {
      tax += (taxable - prev) * rate;
      return tax;
    }
    tax += (cap - prev) * rate;
    prev = cap;
  }
  return tax;
}

function calc() {
  const gross = Math.max(0, Number($('#gross').value) || 0);
  const expenses = Math.max(0, Number($('#expenses').value) || 0);
  const filing = $('#filing').value;
  const stateRate = Math.max(0, Math.min(15, Number($('#stateTax').value) || 0)) / 100;
  const sepIra = Math.max(0, Number($('#sepIra').value) || 0);
  const healthIns = Math.max(0, Number($('#healthIns').value) || 0);

  // 1. Net profit from Schedule C
  const netProfit = Math.max(0, gross - expenses);

  // 2. Self-employment tax
  const seBase = netProfit * 0.9235;
  const ssTax = Math.min(seBase, SS_WAGE_BASE_2024) * 0.124;
  const medTax = seBase * 0.029;
  const seTax = ssTax + medTax;
  const seDeduct = seTax / 2;

  // 3. AGI: net profit - half SE tax - retirement - health insurance
  const agi = Math.max(0, netProfit - seDeduct - sepIra - healthIns);

  // 4. Standard deduction
  const stdDed = STD_DEDUCTION[filing] || STD_DEDUCTION.single;

  // 5. QBI: 20% of (net profit - half SE tax - retirement - health), only if taxable income below threshold
  const qbiBase = Math.max(0, netProfit - seDeduct - sepIra - healthIns);
  const preQbiTaxable = Math.max(0, agi - stdDed);
  const qbiAvailable = preQbiTaxable < (QBI_THRESHOLD[filing] || QBI_THRESHOLD.single);
  // QBI deduction is the lesser of 20% of QBI or 20% of (taxable income before QBI)
  let qbiDed = qbiAvailable ? Math.min(qbiBase * 0.20, preQbiTaxable * 0.20) : 0;
  // Phase-out above threshold (simplified — full phase-out if very high)
  // For simplicity we apply full deduction if below threshold; if above, taper to 0 at 2x threshold
  if (preQbiTaxable >= QBI_THRESHOLD[filing]) {
    const thr = QBI_THRESHOLD[filing];
    const phaseRange = thr; // simplified phase-out over the same range
    const over = Math.min(phaseRange, preQbiTaxable - thr);
    const phaseFraction = 1 - (over / phaseRange);
    qbiDed = qbiDed * phaseFraction;
  }

  // 6. Taxable income
  const taxable = Math.max(0, agi - stdDed - qbiDed);

  // 7. Federal income tax from brackets
  const fedTaxAmt = fedTax(taxable, filing);

  // 8. State tax (on AGI - std ded, simplified)
  const stateTaxAmt = Math.max(0, (agi - stdDed) * stateRate);

  // 9. Total tax
  const totalTax = seTax + fedTaxAmt + stateTaxAmt;

  // 10. Net take-home (gross - expenses - total tax)
  const takeHome = Math.max(0, gross - expenses - totalTax);

  // 11. Effective rate
  const effRate = gross > 0 ? (totalTax / gross * 100) : 0;

  // 12. Quarterly estimated payments (split evenly across 4 quarters)
  const qtr = totalTax / 4;

  // Render metrics
  $('#m-netprofit').textContent = fmt(netProfit);
  $('#m-setax').textContent = fmt(seTax);
  $('#m-incometax').textContent = fmt(fedTaxAmt);
  $('#m-qbi').textContent = '-' + fmt(qbiDed);
  $('#m-statetax').textContent = fmt(stateTaxAmt);
  $('#m-takehome').textContent = fmt(takeHome);

  $('#q1-amt').textContent = fmt(qtr);
  $('#q2-amt').textContent = fmt(qtr);
  $('#q3-amt').textContent = fmt(qtr);
  $('#q4-amt').textContent = fmt(qtr);

  // Bar chart: how gross income is allocated
  const segments = [
    { label: 'Take-home', val: takeHome, color: '#10b981' },
    { label: 'SE tax', val: seTax, color: '#ef4444' },
    { label: 'Fed income tax', val: fedTaxAmt, color: '#f59e0b' },
    { label: 'State tax', val: stateTaxAmt, color: '#8b5cf6' },
    { label: 'Expenses', val: expenses, color: '#6b7280' }
  ];
  const totalBar = gross > 0 ? gross : 1;
  $('#bar').innerHTML = segments.map(s =>
    `<div class="tnc-bar-seg" style="width:${(s.val / totalBar * 100).toFixed(2)}%;background:${s.color}">${s.val > 0 && (s.val / totalBar) > 0.06 ? Math.round(s.val / totalBar * 100) + '%' : ''}</div>`
  ).join('');
  $('#legend').innerHTML = segments.map(s =>
    `<span><i style="background:${s.color}"></i>${s.label} (${fmt(s.val)})</span>`
  ).join('');

  // Detailed table
  const rows = [
    [t('rowGross'), fmt(gross)],
    [t('rowExpenses'), '-' + fmt(expenses)],
    [t('rowNet'), fmt(netProfit)],
    [t('rowSeBase'), fmt(seBase)],
    [t('rowSs'), fmt(ssTax)],
    [t('rowMed'), fmt(medTax)],
    [t('rowSeTotal'), fmt(seTax)],
    [t('rowSeDeduct'), '-' + fmt(seDeduct)],
    [t('rowRetire'), sepIra > 0 ? '-' + fmt(sepIra) : '$0'],
    [t('rowHealth'), healthIns > 0 ? '-' + fmt(healthIns) : '$0'],
    [t('rowAdj'), fmt(agi)],
    [t('rowStd'), '-' + fmt(stdDed)],
    [t('rowQbiDed'), qbiDed > 0 ? '-' + fmt(qbiDed) : '$0'],
    [t('rowTaxable'), fmt(taxable)],
    [t('rowFedTax'), fmt(fedTaxAmt)],
    [t('rowStateTax'), fmt(stateTaxAmt)],
    [t('rowTotalTax'), fmt(totalTax)],
    [t('rowEffective'), effRate.toFixed(1) + '%'],
    [t('rowTakehome'), fmt(takeHome)]
  ];
  $('#tbody').innerHTML = rows.map((r, i) =>
    `<tr class="${i === rows.length - 1 || i === 16 ? 'total' : ''}"><td>${r[0]}</td><td>${r[1]}</td></tr>`
  ).join('');

  $('#note').textContent = t('note');
  $('#results').style.display = 'block';
}
