<script>
GZI18n.register({
  en: {

    toolDesc: '用麦克风测量环境声音声压级。实时 dB(A) 读数、峰值/平均/最小统计和动态图表 — 100% 浏览器本地运行。',
    live: '实时声压级',
    stats: '统计数据',
    peak: '峰值',
    min: '最小',
    avg: '平均 (10s)',
    now: '当前',
    reference: '常见噪音级别',
    start: '开始',
    stop: '停止',
    reset: '重置',
    statusReady: '点击「开始」测量声音级别',
    statusLive: '监听中… 请发出声音',
    statusError: '麦克风被拒绝或不可用',
    tip: '提示：浏览器分贝计能准确反映相对响度变化，但并未校准到真实的 SPL 参考值。可用于声音对比或噪音监测 — 合规测量请使用认证的声级计。',
    ref1: '30 dB — 耳语、安静的卧室',
    ref2: '60 dB — 正常对话',
    ref3: '70 dB — 吸尘器、闹钟',
    ref4: '85 dB — 嘈杂交通（听力损伤临界值）',
    ref5: '100 dB — 演唱会、电钻',
    ref6: '120 dB — 痛阈',
    step1: '点击「开始」并允许麦克风权限',
    step2: '发出声音，观察实时分贝读数',
    step3: '查看本次会话的峰值、平均和最小值',
    step4: '点击「重置」清除统计数据',
  }
});

const { $, t } = GZ;
let stream = null, audioCtx = null, analyser = null, source = null;
let rafId = null, peakDb = -100, minDb = 200, samples = [], recent = [];

const startBtn = $('#startBtn');
const stopBtn = $('#stopBtn');
const resetBtn = $('#resetBtn');
const statusEl = $('#status');
const statusTextEl = $('#statusText');
const pulseEl = $('#pulse');
const deviceSelect = $('#deviceSelect');
const chart = $('#chart');
const chartCtx = chart.getContext('2d');

startBtn.textContent = t('start');
stopBtn.textContent = t('stop');
resetBtn.textContent = t('reset');
$('#lblLive').textContent = t('live');
$('#lblStats').textContent = t('stats');
$('#lblPeak').textContent = t('peak');
$('#lblMin').textContent = t('min');
$('#lblAvg').textContent = t('avg');
$('#lblNow').textContent = t('now');
$('#lblRef').textContent = t('reference');
$('#tip').innerHTML = '💡 ' + t('tip');
$('#refList').innerHTML = [t('ref1'),t('ref2'),t('ref3'),t('ref4'),t('ref5'),t('ref6')].map(x => '• ' + x).join('<br>');

setStatus('statusReady', 'dm-warn');

function setStatus(key, cls) {
  statusEl.className = 'dm-status show ' + cls;
  statusEl.textContent = t(key);
  statusTextEl.textContent = t(key);
}

function resizeChart() {
  const dpr = window.devicePixelRatio || 1;
  const r = chart.getBoundingClientRect();
  chart.width = r.width * dpr;
  chart.height = r.height * dpr;
  chartCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
window.addEventListener('resize', resizeChart);

async function listDevices() {
  try {
    const list = await navigator.mediaDevices.enumerateDevices();
    const mics = list.filter(d => d.kind === 'audioinput');
    deviceSelect.innerHTML = mics.map((d, i) => `<option value="${d.deviceId}">${d.label || ('Mic ' + (i + 1))}</option>`).join('');
  } catch (e) {}
}

// A-weighting relative response in dB for a given frequency
function aWeight(f) {
  // Standard A-weighting transfer function
  const f2 = f * f;
  const num = Math.pow(12194, 2) * f2 * f2;
  const den = (f2 + 20.6 * 20.6) * Math.sqrt((f2 + 107.7 * 107.7) * (f2 + 737.9 * 737.9)) * (f2 + Math.pow(12194, 2));
  const Ra = num / den;
  return 20 * Math.log10(Ra) + 2.0;
}

async function start() {
  try {
    const constraints = {
      audio: {
        deviceId: deviceSelect.value ? { exact: deviceSelect.value } : undefined,
        echoCancellation: false, noiseSuppression: false, autoGainControl: false
      }
    };
    stream = await navigator.mediaDevices.getUserMedia(constraints);
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    source = audioCtx.createMediaStreamSource(stream);
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 2048;
    analyser.smoothingTimeConstant = 0.4;
    source.connect(analyser);

    resizeChart();
    startBtn.disabled = true;
    stopBtn.disabled = false;
    setStatus('statusLive', 'dm-ok');
    pulseEl.classList.add('active');

    listDevices();
    draw();
  } catch (e) {
    setStatus('statusError', 'dm-err');
  }
}

function draw() {
  if (!analyser) return;
  const freq = new Uint8Array(analyser.frequencyBinCount);
  analyser.getByteFrequencyData(freq);
  const sampleRate = audioCtx.sampleRate;
  const binHz = sampleRate / 2 / freq.length;

  // Compute A-weighted SPL estimate
  // Convert byte (0..255) to dBFS, weight, sum as energy
  let energy = 0;
  for (let i = 1; i < freq.length; i++) {
    const f = i * binHz;
    if (f < 20 || f > 20000) continue;
    const dbFs = (freq[i] / 255) * 70 - 70; // 0..255 -> -70..0 dBFS approx
    const w = aWeight(f);
    const p = Math.pow(10, (dbFs + w) / 10);
    energy += p;
  }
  const dbFsTotal = 10 * Math.log10(energy + 1e-12);
  // Map dBFS to approximate SPL: offset so noise floor ~30 dB, loud ~100 dB
  const spl = Math.max(20, Math.min(130, dbFsTotal + 100));

  $('#liveDb').textContent = spl.toFixed(1);
  $('#now2').textContent = spl.toFixed(1);
  const barPct = Math.max(0, Math.min(100, (spl - 20) * 100 / 100));
  $('#bar').style.width = barPct + '%';

  if (spl > peakDb) peakDb = spl;
  if (spl < minDb) minDb = spl;
  samples.push(spl);
  recent.push(spl);
  if (recent.length > Math.round(audioCtx.sampleRate / analyser.fftSize * 10)) recent.shift();

  $('#peak').textContent = peakDb.toFixed(1);
  $('#min').textContent = minDb === 200 ? '—' : minDb.toFixed(1);
  const avg = recent.reduce((a, b) => a + b, 0) / recent.length;
  $('#avg').textContent = avg.toFixed(1);

  // Draw scrolling chart (last ~5s)
  const w = chart.width / (window.devicePixelRatio || 1);
  const h = chart.height / (window.devicePixelRatio || 1);
  chartCtx.fillStyle = '#0a0a1a';
  chartCtx.fillRect(0, 0, w, h);
  // gridlines
  chartCtx.strokeStyle = 'rgba(255,255,255,.06)';
  chartCtx.lineWidth = 1;
  for (let db = 30; db <= 120; db += 30) {
    const y = h - ((db - 20) / 100) * h;
    chartCtx.beginPath();
    chartCtx.moveTo(0, y);
    chartCtx.lineTo(w, y);
    chartCtx.stroke();
    chartCtx.fillStyle = 'rgba(255,255,255,.3)';
    chartCtx.font = '9px monospace';
    chartCtx.fillText(db, 3, y - 2);
  }
  const view = samples.slice(-Math.floor(w / 2));
  chartCtx.beginPath();
  for (let i = 0; i < view.length; i++) {
    const x = (i / Math.max(1, view.length - 1)) * w;
    const y = h - ((view[i] - 20) / 100) * h;
    if (i === 0) chartCtx.moveTo(x, y); else chartCtx.lineTo(x, y);
  }
  chartCtx.strokeStyle = '#4ecdc4';
  chartCtx.lineWidth = 1.5;
  chartCtx.stroke();

  rafId = requestAnimationFrame(draw);
}

function stop() {
  if (stream) stream.getTracks().forEach(tr => tr.stop());
  stream = null;
  if (rafId) cancelAnimationFrame(rafId);
  if (audioCtx) { audioCtx.close(); audioCtx = null; }
  startBtn.disabled = false;
  stopBtn.disabled = true;
  pulseEl.classList.remove('active');
  $('#bar').style.width = '0%';
  setStatus('statusReady', 'dm-warn');
}

function reset() {
  samples = []; recent = []; peakDb = -100; minDb = 200;
  $('#peak').textContent = '—';
  $('#min').textContent = '—';
  $('#avg').textContent = '—';
}

startBtn.addEventListener('click', start);
stopBtn.addEventListener('click', stop);
resetBtn.addEventListener('click', reset);
deviceSelect.addEventListener('change', () => { if (stream) { stop(); start(); } });
if (navigator.mediaDevices) listDevices();

GZ.renderToolPage({
  category: 'dev',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🎤', href:'/dev/microphone-test.html', name:'Microphone Test'},
    {icon:'🎚️', href:'/dev/audio-tuner.html', name:'Audio Tuner'},
    {icon:'📊', href:'/dev/spectrogram.html', name:'Spectrogram'},
    {icon:'🎶', href:'/dev/bpm-detector.html', name:'BPM Detector'},
  ]
});
</script>
