const { $, t } = GZ;

const STATE_KEY = 'gz-partnership-data-v1';
let state = {
  pName: '', bizPurpose: '', effDate: new Date().toISOString().slice(0,10),
  p1Name: '', p1Addr: '', p1Contrib: '', p1Share: 50,
  p2Name: '', p2Addr: '', p2Contrib: '', p2Share: 50,
  bizAddr: '', termYears: 0, authority: '', banking: '',
  withdrawNotice: 90, jurisdiction: '',
};

function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function nl2br(s){return esc(s).replace(/\n/g,'<br>');}
function loadState(){ try{const r=localStorage.getItem(STATE_KEY); if(r) state=Object.assign(state, JSON.parse(r));}catch(e){} }
function saveState(){ try{localStorage.setItem(STATE_KEY, JSON.stringify(state));}catch(e){} }
function bind(name){ return e => { state[name]=e.target.value; saveState(); renderPreview(); }; }

function downloadPDF(){
  const css='body{font-family:Georgia,"Times New Roman",serif;color:#222;padding:40px 48px;font-size:12.5px;line-height:1.7}h1{text-align:center;font-size:22px;margin:0 0 4px;text-transform:uppercase;letter-spacing:1px}h2{font-size:14px;margin:16px 0 6px}.leg-sub{text-align:center;color:#555;font-size:11px;margin-bottom:18px}p{margin:0 0 9px;text-align:justify}table{width:100%;border-collapse:collapse;margin:6px 0 12px;font-size:11.5px}table th,table td{border:1px solid #ccc;padding:5px 8px;text-align:left}table th{background:#f4f4f4}.leg-sig{margin-top:30px;display:grid;grid-template-columns:1fr 1fr;gap:24px}.leg-sig .line{border-top:1px solid #333;margin-top:36px;padding-top:4px;font-size:11px;color:#555}';
  const w=window.open('','_blank','width=860,height=1100');
  w.document.write(`<!DOCTYPE html><html><head><meta charset="utf-8"><title>Partnership Agreement</title><style>${css}</style></head><body>${$('#preview').innerHTML}</body></html>\n`);
  w.document.close();
  setTimeout(()=>{try{w.focus();w.print();}catch(e){}},300);
