<div class="gz-container">

<script>
GZI18n.register({
  en: {
    toolTitle: 'CSS Filter Generator',
    toolDesc: 'Visually build CSS filter chains with live preview — blur, brightness, contrast, grayscale, hue-rotate, sepia and more. Copy the filter property in one click.',
    blur: 'Blur', brightness: 'Brightness', contrast: 'Contrast',
    grayscale: 'Grayscale', hueRotate: 'Hue Rotate', invert: 'Invert',
    opacity: 'Opacity', saturate: 'Saturate', sepia: 'Sepia',
    presets: 'Presets', resetAll: 'Reset all', uploadImage: 'Upload image',
    sampleImg: 'Sample image', step1: 'Drag the sliders to add filter effects — values update the preview instantly.',
    step2: 'Click a preset (Vintage, B&W, Vibrant, Cold, Warm) for quick looks.',
    step3: 'Upload your own image or use the built-in sample to test filters.',
    step4: 'Click Copy to grab the ready-to-paste CSS filter property.',
  },
  zh: {
    toolTitle: 'CSS 滤镜生成器',
    toolDesc: '可视化构建 CSS filter 滤镜链，支持实时预览 — 模糊、亮度、对比度、灰度、色相旋转、棕褐色等。一键复制 CSS 代码。',
    blur: '模糊', brightness: '亮度', contrast: '对比度',
    grayscale: '灰度', hueRotate: '色相旋转', invert: '反相',
    opacity: '透明度', saturate: '饱和度', sepia: '棕褐色',
    presets: '预设', resetAll: '全部重置', uploadImage: '上传图片',
    sampleImg: '示例图片', step1: '拖动滑块添加滤镜效果 — 数值实时反映到预览图。',
    step2: '点击预设按钮（复古、黑白、鲜艳、冷色、暖色）快速套用风格。',
    step3: '可上传你自己的图片，或使用内置示例图来测试滤镜。',
    step4: '点击「复制」即可获取可直接粘贴的 CSS filter 属性。',
  }
});

const { $, copyText, t } = GZ;

// Filter definitions: key, label-key, min, max, step, default, unit, css-fn-name
const FILTERS = [
  { key: 'blur', label: 'blur', min: 0, max: 20, step: 0.1, def: 0, unit: 'px' },
  { key: 'brightness', label: 'brightness', min: 0, max: 200, step: 1, def: 100, unit: '%' },
  { key: 'contrast', label: 'contrast', min: 0, max: 200, step: 1, def: 100, unit: '%' },
  { key: 'grayscale', label: 'grayscale', min: 0, max: 100, step: 1, def: 0, unit: '%' },
  { key: 'hueRotate', label: 'hueRotate', min: 0, max: 360, step: 1, def: 0, unit: 'deg' },
  { key: 'invert', label: 'invert', min: 0, max: 100, step: 1, def: 0, unit: '%' },
  { key: 'opacity', label: 'opacity', min: 0, max: 100, step: 1, def: 100, unit: '%' },
  { key: 'saturate', label: 'saturate', min: 0, max: 200, step: 1, def: 100, unit: '%' },
  { key: 'sepia', label: 'sepia', min: 0, max: 100, step: 1, def: 0, unit: '%' },
];
const CSS_FN = { blur:'blur', brightness:'brightness', contrast:'contrast', grayscale:'grayscale', hueRotate:'hue-rotate', invert:'invert', opacity:'opacity', saturate:'saturate', sepia:'sepia' };
const DEFAULTS = {}; FILTERS.forEach(f => DEFAULTS[f.key] = f.def);

const PRESETS = [
  { name: 'Vintage', zh: '复古', vals: { sepia: 45, contrast: 95, brightness: 105, saturate: 110 } },
  { name: 'B&W', zh: '黑白', vals: { grayscale: 100, contrast: 110 } },
  { name: 'Vibrant', zh: '鲜艳', vals: { saturate: 165, contrast: 115 } },
  { name: 'Cold', zh: '冷色', vals: { hueRotate: 200, saturate: 120, brightness: 102 } },
  { name: 'Warm', zh: '暖色', vals: { sepia: 25, saturate: 130, brightness: 105 } },
  { name: 'Dreamy', zh: '梦幻', vals: { blur: 1.2, brightness: 110, saturate: 130, contrast: 95 } },
  { name: 'Noir', zh: '黑色电影', vals: { grayscale: 100, contrast: 135, brightness: 92 } },
  { name: 'Invert', zh: '反相', vals: { invert: 100 } },
];

const SAMPLE_IMG = 'https://images.unsplash.com/photo-1506744038136-46273834b3fb?w=600&q=80';

function getVals() {
  const v = {};
  FILTERS.forEach(f => v[f.key] = parseFloat($('#slider-' + f.key).value));
  return v;
}

function buildFilter(vals) {
  return FILTERS.map(f => {
    const v = vals[f.key];
    if (v === f.def) return null;
    return `${CSS_FN[f.key]}(${v}${f.unit})`;
  }).filter(Boolean).join(' ');
}

function render() {
  const vals = getVals();
  const filter = buildFilter(vals);
  $('#preview').style.filter = filter || 'none';
  $('#code').textContent = filter ? `filter: ${filter};` : 'filter: none;';
}

function setVals(vals) {
  FILTERS.forEach(f => {
    const el = $('#slider-' + f.key);
    el.value = vals[f.key] !== undefined ? vals[f.key] : f.def;
    $('#val-' + f.key).textContent = el.value + f.unit;
  });
  render();
}

function resetAll() {
  FILTERS.forEach(f => {
    const el = $('#slider-' + f.key);
    el.value = f.def;
    $('#val-' + f.key).textContent = f.def + f.unit;
  });
  render();
}

// Build sliders
$('#sliders').innerHTML = FILTERS.map(f => `
  <div class="fg-slider">
    <label>${t(f.label)}<span class="v" id="val-${f.key}">${f.def}${f.unit}</span></label>
    <input type="range" id="slider-${f.key}" min="${f.min}" max="${f.max}" step="${f.step}" value="${f.def}" oninput="$('#val-${f.key}').textContent=this.value+'${f.unit}';render()">
  </div>`).join('');

// Build presets
$('#presets').innerHTML = '<div style="width:100%;font-weight:700;font-size:.85em;margin-bottom:6px;color:var(--text2)">' + t('presets') + '</div>' + PRESETS.map((p, i) =>
  `<button onclick="setVals(${JSON.stringify(p.vals).replace(/"/g, '&quot;')})">${GZI18n.getLang()==='zh'?p.zh:p.name}</button>`).join('');

// Sample image buttons
const sampleBtns = [
  { id: 's1', url: 'https://images.unsplash.com/photo-1506744038136-46273834b3fb?w=600&q=80' },
  { id: 's2', url: 'https://images.unsplash.com/photo-1518837695005-2083093ee35b?w=600&q=80' },
  { id: 's3', url: 'https://images.unsplash.com/photo-1544005313-94ddf0286df2?w=600&q=80' },
];
$('#samples').innerHTML = '<button class="active" onclick="setImage(this,\'' + SAMPLE_IMG + '\')">' + t('sampleImg') + ' 1</button>' +
  '<button onclick="setImage(this,\'https://images.unsplash.com/photo-1518837695005-2083093ee35b?w=600&q=80\')">' + t('sampleImg') + ' 2</button>' +
  '<button onclick="setImage(this,\'https://images.unsplash.com/photo-1544005313-94ddf0286df2?w=600&q=80\')">' + t('sampleImg') + ' 3</button>' +
  '<button onclick="document.getElementById(\'fileInput\').click()">' + t('uploadImage') + '</button>' +
  '<input type="file" id="fileInput" accept="image/*" style="display:none" onchange="handleUpload(this)">';

function setImage(btn, url) {
  $('#preview').src = url;
  $('#samples').querySelectorAll('button').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
}

function handleUpload(input) {
  const file = input.files[0];
  if (!file) return;
  const url = URL.createObjectURL(file);
  $('#preview').src = url;
  $('#samples').querySelectorAll('button').forEach(b => b.classList.remove('active'));
}

$('#preview').src = SAMPLE_IMG;

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="copyText($('#code').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="resetAll()">${t('resetAll')}</button>`;

render();

GZ.renderToolPage({
  category: 'dev',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📐', href:'/dev/css-units.html', name:'CSS Units'},
    {icon:'✨', href:'/dev/css-minifier.html', name:'CSS Minifier'},
    {icon:'🎯', href:'/color/picker.html', name:'Color Picker'},
    {icon:'🎨', href:'/color/palette.html', name:'Palette'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
