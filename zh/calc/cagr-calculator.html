<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is CAGR?", "acceptedAnswer": {"@type": "Answer", "text": "CAGR (Compound Annual Growth Rate) measures the mean annual growth rate of an investment over a specified time period, assuming profits are reinvested. It smooths out volatility and gives a single annualized percentage that represents steady growth."}}, {"@type": "Question", "name": "How is CAGR calculated?", "acceptedAnswer": {"@type": "Answer", "text": "CAGR = (Ending Value / Beginning Value)^(1 / Years) - 1. For example, if an investment grows from $10,000 to $15,000 over 3 years, CAGR = (15000/10000)^(1/3) - 1 = 14.47% per year."}}, {"@type": "Question", "name": "What is a good CAGR?", "acceptedAnswer": {"@type": "Answer", "text": "For context, the S&P 500 has historically averaged about 10% CAGR before inflation. A CAGR above 10% is generally considered strong. Individual stocks or sectors may have much higher or lower CAGRs, and past performance does not guarantee future results."}}, {"@type": "Question", "name": "What is the difference between CAGR and average annual return?", "acceptedAnswer": {"@type": "Answer", "text": "Average annual return simply adds yearly returns and divides by the number of years. CAGR accounts for compounding and is always lower than or equal to the average when returns vary. CAGR is the more accurate measure of investment performance because it reflects geometric rather than arithmetic growth."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="cg-hero">
      <div class="lbl" id="heroLbl"></div>
      <div class="big" id="cagrVal">0.00%</div>
      <div class="sub" id="heroSub"></div>
    </div>
    <div class="cg-grid">
      <div class="cg-card">
        <h3>📊 <span id="lblInputs"></span></h3>
        <div class="cg-field"><label id="lblBegin"></label><input type="number" id="begin" value="10000" min="0" step="100"></div>
        <div class="cg-field"><label id="lblEnd"></label><input type="number" id="end" value="15000" min="0" step="100"></div>
        <div class="cg-field"><label id="lblYears"></label><input type="number" id="years" value="3" min="0.1" step="0.5"></div>
        <div class="cg-field"><label id="lblCurrency"></label><input type="text" id="currency" value="$" maxlength="3"></div>
      </div>
      <div class="cg-card">
        <h3>📈 <span id="lblStats"></span></h3>
        <div class="cg-stats">
          <div class="cg-stat"><div class="l" id="lTotalReturn"></div><div class="v" id="totalReturn">0%</div></div>
          <div class="cg-stat"><div class="l" id="lAbsGain"></div><div class="v" id="absGain">$0</div></div>
          <div class="cg-stat"><div class="l" id="lMultiple"></div><div class="v" id="multiple">1x</div></div>
          <div class="cg-stat"><div class="l" id="lAnnualized"></div><div class="v" id="annualized">$0</div></div>
        </div>
        <div class="cg-explain" id="explain"></div>
      </div>
    </div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'CAGR Calculator',
    toolDesc: 'Calculate the Compound Annual Growth Rate (CAGR) of any investment. Enter your beginning value, ending value, and time period to see annualized returns, total growth, and investment multiples.',
    inputs: 'Investment Details', stats: 'Results',
    begin: 'Beginning value', end: 'Ending value', years: 'Number of years', currency: 'Currency symbol',
    heroLbl: 'Compound Annual Growth Rate', heroSub: 'Per year, compounded',
    totalReturn: 'Total Return', absGain: 'Absolute Gain', multiple: 'Growth Multiple', annualized: 'Avg Annual Value',
    copy: '📋 Copy Results', reset: '🔄 Reset', example: '🧪 Load Example',
    step1: 'Enter the initial value of your investment',
    step2: 'Enter the current or final value',
    step3: 'Enter the number of years (supports decimals like 2.5)',
    step4: 'Read the CAGR, total return, and growth multiple instantly',
  },
  zh: {
    toolTitle: '复合年增长率 (CAGR) 计算器',
    toolDesc: '计算任意投资的复合年增长率 (CAGR)。输入初始价值、终值和时间周期，即时查看年化收益率、总增长和投资倍数。',
    inputs: '投资详情', stats: '计算结果',
    begin: '初始价值', end: '终止价值', years: '年数', currency: '货币符号',
    heroLbl: '复合年增长率', heroSub: '每年复利计算',
    totalReturn: '总收益率', absGain: '绝对收益', multiple: '增长倍数', annualized: '年均增值',
    copy: '📋 复制结果', reset: '🔄 重置', example: '🧪 加载示例',
    step1: '输入投资的初始价值',
    step2: '输入当前或最终价值',
    step3: '输入年数（支持小数，如 2.5）',
    step4: '即时查看 CAGR、总收益率和增长倍数',
  }
});

const { $, copyText, t } = GZ;
const isZh = GZI18n.getLang() === 'zh';

$('#lblInputs').textContent = t('inputs');
$('#lblStats').textContent = t('stats');
$('#lblBegin').textContent = t('begin');
$('#lblEnd').textContent = t('end');
$('#lblYears').textContent = t('years');
$('#lblCurrency').textContent = t('currency');
$('#heroLbl').textContent = t('heroLbl');
$('#heroSub').textContent = t('heroSub');
$('#lTotalReturn').textContent = t('totalReturn');
$('#lAbsGain').textContent = t('absGain');
$('#lMultiple').textContent = t('multiple');
$('#lAnnualized').textContent = t('annualized');

function fmt(n, dec=0) { return '$' + (n||0).toLocaleString(undefined, { minimumFractionDigits: dec, maximumFractionDigits: dec }); }

function calc() {
  const begin = +$('#begin').value || 0;
  const end = +$('#end').value || 0;
  const years = +$('#years').value || 0;

  if (begin <= 0 || years <= 0) {
    $('#cagrVal').textContent = '—';
    ['totalReturn','absGain','multiple','annualized'].forEach(id => $('#' + id).textContent = '—');
    $('#explain').textContent = isZh ? '请输入有效的初始价值和年数。' : 'Enter valid beginning value and years.';
    return;
  }

  let cagr;
  if (end > 0) {
    cagr = Math.pow(end / begin, 1 / years) - 1;
  } else {
    cagr = -1;
  }
  const totalReturn = (end - begin) / begin;
  const absGain = end - begin;
  const multiple = end / begin;

  $('#cagrVal').textContent = (cagr * 100).toFixed(2) + '%';
  $('#cagrVal').className = cagr >= 0 ? 'big' : 'big';
  $('#cagrVal').style.color = cagr >= 0 ? '#00d672' : '#e94560';

  const retEl = $('#totalReturn');
  retEl.textContent = (totalReturn * 100).toFixed(1) + '%';
  retEl.className = totalReturn >= 0 ? 'v' : 'v neg';

  $('#absGain').textContent = (absGain >= 0 ? '+' : '') + fmt(Math.abs(absGain));
  $('#absGain').className = absGain >= 0 ? 'v' : 'v neg';
  $('#multiple').textContent = multiple.toFixed(2) + 'x';
  $('#annualized').textContent = fmt((begin + end) / 2);

  $('#explain').innerHTML = isZh
    ? `公式：<code>CAGR = (终值 / 初始值)<sup>(1/年数)</sup> − 1</code><br>
       即 <code>(${fmt(end)} / ${fmt(begin)})<sup>(1/${years})</sup> − 1 = <b>${(cagr*100).toFixed(2)}%</b></code><br><br>
       ${multiple.toFixed(2)} 倍增长意味着初始投资 ${fmt(begin)} 在 ${years} 年后变为 ${fmt(end)}。`
    : `Formula: <code>CAGR = (End / Begin)<sup>(1/Years)</sup> − 1</code><br>
       That's <code>(${fmt(end)} / ${fmt(begin)})<sup>(1/${years})</sup> − 1 = <b>${(cagr*100).toFixed(2)}%</b></code><br><br>
       A ${multiple.toFixed(2)}x multiple means your ${fmt(begin)} grew to ${fmt(end)} over ${years} years.`;
}

['begin','end','years','currency'].forEach(id => $('#' + id).addEventListener('input', calc));

$('#toolbar').innerHTML = `
  <button class="gz-btn gz-btn-secondary" id="btnCopy">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" id="btnExample">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" id="btnReset">${t('reset')}</button>`;

$('#btnCopy').onclick = () => copyText(`${t('toolTitle')}\nCAGR: ${$('#cagrVal').textContent}\n${t('totalReturn')}: ${$('#totalReturn').textContent}\n${t('absGain')}: ${$('#absGain').textContent}\n${t('multiple')}: ${$('#multiple').textContent}`);
$('#btnExample').onclick = () => { $('#begin').value = 10000; $('#end').value = 18500; $('#years').value = 4; calc(); };
$('#btnReset').onclick = () => { $('#begin').value = 0; $('#end').value = 0; $('#years').value = 1; calc(); };

calc();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📈', href:'/calc/compound-interest.html', name:'Compound Interest'},
    {icon:'💰', href:'/calc/investment-calculator.html', name:'Investment Calculator'},
    {icon:'📊', href:'/calc/stock-return.html', name:'Stock Return'},
    {icon:'💵', href:'/calc/roi.html', name:'ROI Calculator'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
