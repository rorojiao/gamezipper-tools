<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="gz-split">
      <div>
        <div class="calc-group">
          <label id="lbl-views"></label>
          <input type="number" id="views" value="100000" min="0" step="1000">
        </div>
        <div class="calc-group">
          <label id="lbl-cpm"></label>
          <input type="number" id="cpm" value="7.50" min="0" step="0.10">
          <input type="range" id="cpm-range" min="0.25" max="50" step="0.25" value="7.50">
        </div>
        <div class="calc-group">
          <label id="lbl-ctr"></label>
          <input type="number" id="ctr" value="5" min="0" max="100" step="0.5">
          <span style="font-size:.8em;color:var(--gz-muted)">%</span>
        </div>
        <div class="calc-group">
          <label id="lbl-niche"></label>
          <select id="niche">
            <option value="entertainment">Entertainment</option>
            <option value="gaming">Gaming</option>
            <option value="tech" selected>Tech / Software</option>
            <option value="finance">Finance / Business</option>
            <option value="education">Education</option>
            <option value="health">Health / Fitness</option>
            <option value="beauty">Beauty / Fashion</option>
            <option value="cooking">Cooking / Food</option>
            <option value="travel">Travel / Vlog</option>
            <option value="music">Music</option>
            <option value="sports">Sports</option>
            <option value="news">News / Politics</option>
          </select>
        </div>
        <div class="calc-group">
          <label id="lbl-subs"></label>
          <input type="number" id="subs" value="0" min="0" step="1000">
        </div>
      </div>
      <div>
        <div class="result-card">
          <div class="value" id="est-revenue">$0.00</div>
          <div class="label" id="lbl-rev"></div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
          <div class="result-card">
            <div class="value" style="font-size:1.4em" id="est-rpm">$0.00</div>
            <div class="label" id="lbl-rpm"></div>
          </div>
          <div class="result-card">
            <div class="value" style="font-size:1.4em" id="est-daily">$0.00</div>
            <div class="label" id="lbl-daily"></div>
          </div>
          <div class="result-card">
            <div class="value" style="font-size:1.4em" id="est-monthly">$0.00</div>
            <div class="label" id="lbl-monthly"></div>
          </div>
          <div class="result-card">
            <div class="value" style="font-size:1.4em" id="est-yearly">$0.00</div>
            <div class="label" id="lbl-yearly"></div>

</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'YouTube CPM & Revenue Calculator',
    toolDesc: 'Estimate YouTube ad revenue based on views, CPM, niche and engagement. Calculate CPM, RPM and monthly earnings.',
    lblViews: 'Monthly Views',
    lblCpm: 'CPM (Cost Per 1,000 Impressions)',
    lblCtr: 'Ad CTR (Click-Through Rate)',
    lblNiche: 'Content Niche',
    lblSubs: 'Subscriber Count',
    lblRev: 'Estimated Monthly Revenue',
    lblRpm: 'RPM (Per 1,000 Views)',
    lblDaily: 'Daily Revenue',
    lblMonthly: 'Monthly Revenue',
    lblYearly: 'Yearly Revenue',
    breakdown: 'Revenue Breakdown',
    adRevenue: 'Ad Revenue (55%)',
    youtubeCut: 'YouTube Cut (45%)',
    totalGross: 'Total Gross',
    step1: 'Enter your monthly view count',
    step2: 'Set your CPM or choose a niche for estimates',
    step3: 'Adjust CTR and subscriber count for accuracy',
    step4: 'Review estimated revenue, RPM and projections',
  },
  zh: {
    toolTitle: 'YouTube CPM 收入计算器',
    toolDesc: '根据播放量、CPM、内容领域和互动率估算 YouTube 广告收入。计算 CPM、RPM 和月收入。',
    lblViews: '月播放量',
    lblCpm: 'CPM（每千次展示费用）',
    lblCtr: '广告点击率 CTR',
    lblNiche: '内容领域',
    lblSubs: '订阅者数量',
    lblRev: '预估月收入',
    lblRpm: 'RPM（每千次播放收入）',
    lblDaily: '日收入',
    lblMonthly: '月收入',
    lblYearly: '年收入',
    breakdown: '收入明细',
    adRevenue: '广告收入 (55%)',
    youtubeCut: 'YouTube 分成 (45%)',
    totalGross: '总收入（税前）',
    step1: '输入每月播放量',
    step2: '设置 CPM 或选择内容领域获取估算值',
    step3: '调整 CTR 和订阅者数量以提高准确性',
    step4: '查看预估收入、RPM 和年度预测',
  }
});

const { $, copyText, t } = GZ;

const NICHE_CPM = {
  entertainment: 2.50, gaming: 2.00, tech: 10.00, finance: 20.00,
  education: 6.00, health: 8.00, beauty: 5.00, cooking: 4.50,
  travel: 5.50, music: 1.80, sports: 3.50, news: 4.00
};

function calculate() {
  const views = parseFloat($('#views').value) || 0;
  const cpm = parseFloat($('#cpm').value) || 0;
  const ctr = parseFloat($('#ctr').value) || 5;

  const grossRevenue = (views / 1000) * cpm;
  const creatorRevenue = grossRevenue * 0.55;
  const youtubeCut = grossRevenue * 0.45;
  const rpm = views > 0 ? (creatorRevenue / views) * 1000 : 0;
  const daily = creatorRevenue / 30;
  const monthly = creatorRevenue;
  const yearly = creatorRevenue * 12;

  $('#est-revenue').textContent = '$' + creatorRevenue.toFixed(2);
  $('#est-rpm').textContent = '$' + rpm.toFixed(2);
  $('#est-daily').textContent = '$' + daily.toFixed(2);
  $('#est-monthly').textContent = '$' + monthly.toFixed(2);
  $('#est-yearly').textContent = '$' + yearly.toFixed(2);

  $('#breakdown').innerHTML = `
    <strong>${t('breakdown')}</strong>
    <table>
      <tr><th>${t('totalGross')}</th><td>$${grossRevenue.toFixed(2)}</td></tr>
      <tr><th>${t('adRevenue')}</th><td style="color:var(--gz-success)">$${creatorRevenue.toFixed(2)}</td></tr>
      <tr><th>${t('youtubeCut')}</th><td style="color:var(--gz-accent)">$${youtubeCut.toFixed(2)}</td></tr>
    </table>`;
}

function setupLabels() {
  $('#lbl-views').textContent = t('lblViews');
  $('#lbl-cpm').textContent = t('lblCpm');
  $('#lbl-ctr').textContent = t('lblCtr');
  $('#lbl-niche').textContent = t('lblNiche');
  $('#lbl-subs').textContent = t('lblSubs');
  $('#lbl-rev').textContent = t('lblRev');
  $('#lbl-rpm').textContent = t('lblRpm');
  $('#lbl-daily').textContent = t('lblDaily');
  $('#lbl-monthly').textContent = t('lblMonthly');
  $('#lbl-yearly').textContent = t('lblYearly');
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="calculate()">${t('format')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="calculate()">${t('example')}</button>`;

$('#cpm-range').addEventListener('input', function() { $('#cpm').value = this.value; calculate(); });
$('#niche').addEventListener('change', function() {
  const niche = this.value;
  if (NICHE_CPM[niche]) { $('#cpm').value = NICHE_CPM[niche]; $('#cpm-range').value = NICHE_CPM[niche]; }
  calculate();
});

['views', 'cpm', 'ctr', 'subs'].forEach(id => {
  $('#' + id).addEventListener('input', calculate);
});

setupLabels();
calculate();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'💰', href:'/calc/youtube-revenue.html', name:'YouTube Revenue'},
    {icon:'💵', href:'/calc/profit-margin.html', name:'Profit Margin'},
    {icon:'📊', href:'/calc/compound-interest.html', name:'Compound Interest'},
    {icon:'📈', href:'/calc/roi.html', name:'ROI Calculator'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
