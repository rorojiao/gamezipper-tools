    copied: '已复制',

const { $, copyText, showToast, t } = GZ;

// Compact English stopword list
const STOP = new Set('a about above after again against all am an and any are aren\'t as at be because been before being below between both but by can can\'t cannot could couldn\'t did didn\'t do does doesn\'t doing don\'t down during each few for from further had hadn\'t has hasn\'t have haven\'t having he he\'d he\'ll he\'s her here here\'s hers herself him himself his how how\'s i i\'d i\'ll i\'m i\'ve if in into is isn\'t it it\'s its itself let\'s me more most mustn\'t my myself no nor not of off on once only or other ought our ours ourselves out over own same shan\'t she she\'d she\'ll she\'s should shouldn\'t so some such than that that\'s the their theirs them themselves then there there\'s these they they\'d they\'ll they\'re they\'ve this those through to too under until up very was wasn\'t we we\'d we\'ll we\'re we\'ve were weren\'t what what\'s when when\'s where where\'s which while who who\'s whom why why\'s with won\'t would wouldn\'t you you\'d you\'ll you\'re you\'ve your yours yourself yourselves'.split(' '));

function isWord(w){ return /^[a-z][a-z'-]{1,}$/i.test(w); }

function tokenize(text){
  return (text.toLowerCase().match(/[a-z][a-z'-]+/gi) || []).filter(w => !STOP.has(w.toLowerCase()) && w.length > 2);
}

function splitSentences(text){ return text.split(/[.!?]+/).map(s=>s.trim()).filter(s=>s); }

function yake(text){
  const sentences = splitSentences(text);
  const sentsTokens = sentences.map(s => (s.match(/[a-z][a-z'-]+/gi) || []));
  const totalSents = Math.max(1, sentsTokens.length);
  const words = sentsTokens.flat();
  if(words.length === 0) return { single:[], phrases:[], maxFreq:1 };

  // mean + std of frequency
  const freq = {};
  for(const w of words){ const lw = w.toLowerCase(); freq[lw] = (freq[lw]||0)+1; }
  const freqVals = Object.values(freq);
  const mean = freqVals.reduce((a,b)=>a+b,0)/freqVals.length;
  const std = Math.sqrt(freqVals.reduce((a,b)=>a+(b-mean)**2,0)/freqVals.length) || 1;
  const maxFreq = Math.max(...freqVals);

  // TF (mean/std normalization) feature
  // casing feature: capitalized occurrences / total
  // position feature: based on first sentence index
  // positionSentence: occurrences across sentences / max sentences
  const posCount = {}; // first sentence index where word appears
  const sentCount = {}; // how many sentences contain the word
  sentsTokens.forEach((toks, si) => {
    for(const w of toks){
      const lw = w.toLowerCase();
      if(posCount[lw] === undefined) posCount[lw] = si;
      if(!sentCount[lw]) sentCount[lw] = new Set();
      sentCount[lw].add(si);
    }
  });

  // casing: count capitalized occurrences
  const casing = {};
  for(const w of words){
    const lw = w.toLowerCase();
    const isCap = /^[A-Z]/.test(w);
    if(isCap) casing[lw] = (casing[lw]||0)+1;
  }

  const scored = [];
  for(const lw in freq){
    if(STOP.has(lw)) continue;   // exclude stopwords from candidates
    const tf = freq[lw];
    const tfNorm = tf / (mean + std);              // feature D (frequency)
    const cas = casing[lw] ? Math.log(casing[lw]) + tf / maxFreq : 1; // feature A (casing)
    const posFeat = Math.log(Math.log(3 + posCount[lw]));             // feature B (position)
    const sentFeat = sentCount[lw].size / totalSents;                  // feature C (sentence spread)
    // YAKE composite score (lower = better)
    const score = (cas * posFeat) / (tfNorm * (1 + sentFeat));
    scored.push({ word: lw, score, freq: tf });
  }
  scored.sort((a,b)=> a.score - b.score);

  // Extract keyphrases: sequences of candidate keywords (top 40%) adjacent in text
  const topWords = new Set(scored.slice(0, Math.max(8, Math.floor(scored.length*0.4))).map(s=>s.word));
  const phrases = {};
  for(const sent of sentences){
    const toks = sent.match(/[a-z][a-z'-]+/gi) || [];
    let cur = [];
    for(let i=0;i<toks.length;i++){
      const lw = toks[i].toLowerCase();
      if(topWords.has(lw) && !STOP.has(lw)){
        cur.push(lw);
      } else {
        if(cur.length >= 2 && cur.length <= 4){
          const ph = cur.join(' ');
          phrases[ph] = (phrases[ph]||0)+1;
        }
        cur = [];
      }
    }
    if(cur.length >= 2 && cur.length <= 4){ const ph = cur.join(' '); phrases[ph] = (phrases[ph]||0)+1; }
  }
  const phraseList = Object.entries(phrases).map(([p,c])=>({phrase:p, count:c})).sort((a,b)=>b.count-a.count).slice(0,12);

  return { single: scored, phrases: phraseList, maxFreq };
}

function doExtract(){
  const text = $('#input').value.trim();
  if(text.length < 30){ $('#output').innerHTML = `<div style="padding:24px;text-align:center;color:var(--text2)">${t('noText')}</div>`; return; }
  const lang = GZI18n.getLang();
  const topN = +$('#topN').value;
  $('#nVal').textContent = topN;
  const wantPhrases = $('#phrases').checked;
  const r = yake(text);
  if(r.single.length === 0){ $('#output').innerHTML = `<div style="padding:24px;text-align:center;color:var(--text2)">${t('noText')}</div>`; return; }

  const top = r.single.slice(0, topN);
  const minScore = top[top.length-1].score || 1;
  const maxScore = top[0].score || 1;
  const range = (maxScore - minScore) || 1;

  const rows = top.map((k,i) => {
    const pct = Math.round(((maxScore - k.score) / range) * 100);
    const rankCls = i===0?'':(i<3?'r2':'r3');
    const rankStyle = i>=3 ? 'background:var(--glass);color:var(--text2);border:1px solid var(--border)' : '';
    return `<div class="ke-keyword" onclick="copyKw('${k.word}')">
      <div class="ke-rank ${rankCls}" style="${rankStyle}">${i+1}</div>
      <div class="ke-kw">${k.word}</div>
      <div class="ke-bar"><div class="ke-barfill" style="width:${Math.max(8,pct)}%"></div></div>
      <div class="ke-score">×${k.freq}</div>
    </div>`;
  }).join('');

  let phraseHtml = '';
  if(wantPhrases && r.phrases.length){
    phraseHtml = `<div class="ke-phrases"><div style="font-size:.85rem;color:var(--text2);margin:14px 0 6px">${t('keyphrases')}</div><div>${r.phrases.map(p=>`<span class="ke-tag" onclick="copyKw('${p.phrase.replace(/'/g,"\\'")}')">${p.phrase} <span style="opacity:.5">(${p.count})</span></span>`).join('')}</div></div>`;
  }

  // word cloud
  const cloudSizes = top.slice(0, Math.min(25, top.length)).map(k => {
    const pct = ((maxScore - k.score) / range);
    const sz = Math.round(0.9 + pct * 1.8); // em
    return `<span style="font-size:${sz}em;color:hsl(${Math.round(180+pct*120)},70%,${60+Math.round(pct*15)}%)" onclick="copyKw('${k.word}')">${k.word}</span>`;
  }).join(' ');

  $('#output').innerHTML = `
    <div style="font-size:.85rem;color:var(--text2);margin-bottom:8px">${t('result')} (${top.length})</div>
    ${rows}
    ${phraseHtml}
    <div style="font-size:.85rem;color:var(--text2);margin:14px 0 6px">${t('wordCloud')}</div>
    <div class="ke-cloud">${cloudSizes}</div>
  `;
}

function copyKw(w){ copyText(w); showToast(t('copied') + ': ' + w); }

function loadExample(){
  $('#input').value = "Artificial intelligence is transforming how developers write and ship software. Modern AI coding assistants can generate boilerplate code, suggest completions, and even write entire functions from a natural language description. However, developers must carefully review AI-generated code for security vulnerabilities, licensing issues and subtle logic errors. The best workflow pairs human judgment with AI speed: let the assistant draft, then a senior engineer reviews, tests and refines. Many teams now treat AI tools as junior pair programmers rather than autonomous agents. As these tools improve, prompt engineering and code review skills become just as important as traditional debugging.";
  doExtract();
}

$('#input').addEventListener('input', doExtract);

</script>
