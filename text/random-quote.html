.quote-tag{display:inline-block;margin-top:14px;padding:3px 12px;border-radius:999px;background:rgba(255,255,255,.06);font-size:.72em;text-transform:uppercase;letter-spacing:.1em;color:var(--text2)}
.cat-row{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:18px 0 8px}
.cat-row button{padding:7px 14px;border-radius:999px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:.82em;cursor:pointer;transition:all .2s}
.cat-row button:hover{border-color:var(--accent);color:var(--text)}
.cat-row button.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.quote-nav{display:flex;justify-content:center;gap:10px;margin-top:18px;flex-wrap:wrap}
.counter{text-align:center;font-size:.8em;color:var(--text2);margin-top:14px}

  zh: {

const { $, copyText, t, showToast } = GZ;

const QUOTES = {
  inspire: [
    ['The only way to do great work is to love what you do.', 'Steve Jobs'],
    ['Believe you can and you\'re halfway there.', 'Theodore Roosevelt'],
    ['The future belongs to those who believe in the beauty of their dreams.', 'Eleanor Roosevelt'],
    ['It does not matter how slowly you go as long as you do not stop.', 'Confucius'],
    ['Everything you\'ve ever wanted is on the other side of fear.', 'George Addair'],
    ['Hardships often prepare ordinary people for an extraordinary destiny.', 'C.S. Lewis'],
    ['Start where you are. Use what you have. Do what you can.', 'Arthur Ashe'],
    ['The man who moves a mountain begins by carrying away small stones.', 'Confucius'],
    ['Your time is limited, so don\'t waste it living someone else\'s life.', 'Steve Jobs'],
    ['The best time to plant a tree was 20 years ago. The second best time is now.', 'Chinese Proverb'],
    ['Either you run the day, or the day runs you.', 'Jim Rohn'],
    ['Quality is not an act, it is a habit.', 'Aristotle'],
  ],

    ['Success is not final, failure is not fatal: it is the courage to continue that counts.', 'Winston Churchill'],
    ['Don\'t watch the clock; do what it does. Keep going.', 'Sam Levenson'],

    ['Whether you think you can or you think you can\'t, you\'re right.', 'Henry Ford'],
    ['The harder you work for something, the greater you\'ll feel when you achieve it.', 'Anonymous'],
    ['Push yourself, because no one else is going to do it for you.', 'Anonymous'],
    ['Great things never come from comfort zones.', 'Anonymous'],
    ['Dream it. Wish it. Do it.', 'Anonymous'],
    ['Don\'t stop when you\'re tired. Stop when you\'re done.', 'Marilyn vos Savant'],
    ['Wake up with determination. Go to bed with satisfaction.', 'George Lorimer'],
    ['Do something today that your future self will thank you for.', 'Sean Patrick Flanery'],
    ['Little things make big days.', 'Isabel Marant'],
  ],
  wisdom: [
    ['Knowing yourself is the beginning of all wisdom.', 'Aristotle'],
    ['The only true wisdom is in knowing you know nothing.', 'Socrates'],
    ['In the middle of difficulty lies opportunity.', 'Albert Einstein'],
    ['The unexamined life is not worth living.', 'Socrates'],
    ['We suffer more often in imagination than in reality.', 'Seneca'],
    ['He who has a why to live can bear almost any how.', 'Friedrich Nietzsche'],
    ['Happiness is not something ready made. It comes from your own actions.', 'Dalai Lama'],
    ['The mind is everything. What you think you become.', 'Buddha'],
    ['Yesterday I was clever, so I wanted to change the world. Today I am wise, so I am changing myself.', 'Rumi'],

    ['Common sense is like deodorant. The people who need it most never use it.', 'Anonymous'],

    ['If at first you don\'t succeed, then skydiving definitely isn\'t for you.', 'Steven Wright'],
    ['I used to be indecisive, but now I\'m not so sure.', 'Tommy Cooper'],
    ['Behind every great man is a woman rolling her eyes.', 'Jim Carrey'],
    ['I haven\'t failed. I\'ve just found 10,000 ways that won\'t work.', 'Thomas Edison'],
    ['Always borrow money from a pessimist. He won\'t expect it back.', 'Oscar Wilde'],

  ],
  success: [
    ['Success usually comes to those who are too busy to be looking for it.', 'Henry David Thoreau'],
    ['The way to get started is to quit talking and begin doing.', 'Walt Disney'],
    ['Success is walking from failure to failure with no loss of enthusiasm.', 'Winston Churchill'],
    ['Opportunities don\'t happen. You create them.', 'Chris Grosser'],
    ['Try not to become a person of success, but rather a person of value.', 'Albert Einstein'],
    ['I find that the harder I work, the more luck I seem to have.', 'Thomas Jefferson'],
    ['Success is not the key to happiness. Happiness is the key to success.', 'Albert Schweitzer'],
    ['If you really look closely, most overnight successes took a long time.', 'Steve Jobs'],
    ['The road to success and the road to failure are almost exactly the same.', 'Colin R. Davis'],
    ['Don\'t be afraid to give up the good to go for the great.', 'John D. Rockefeller'],
    ['All progress takes place outside the comfort zone.', 'Michael John Bobak'],
  ],
  love: [
    ['Where there is love there is life.', 'Mahatma Gandhi'],
    ['Love all, trust a few, do wrong to none.', 'William Shakespeare'],
    ['The best thing to hold onto in life is each other.', 'Audrey Hepburn'],
    ['To love and be loved is to feel the sun from both sides.', 'David Viscott'],
    ['We accept the love we think we deserve.', 'Stephen Chbosky'],
    ['Love isn\'t something you find. Love is something that finds you.', 'Loretta Young'],
    ['Being deeply loved by someone gives you strength, while loving someone deeply gives you courage.', 'Lao Tzu'],
    ['The greatest happiness of life is the conviction that we are loved.', 'Victor Hugo'],
    ['A loving heart is the truest wisdom.', 'Charles Dickens'],
    ['Love is composed of a single soul inhabiting two bodies.', 'Aristotle'],
  ],
};

let currentCat = 'all';
let currentQuote = null;
let count = 0;

function pool() {
  if (currentCat === 'all') return Object.keys(QUOTES).flatMap(k => QUOTES[k].map(q => [...q, k]));
  return QUOTES[currentCat].map(q => [...q, currentCat]);
}

function catLabel(k) { return t(k === 'all' ? 'all' : k); }

function drawQuote() {
  const arr = pool();
  let pick = arr[Math.floor(Math.random() * arr.length)];
  // avoid immediate repeat if possible
  if (arr.length > 1 && currentQuote && pick[0] === currentQuote[0]) {
    pick = arr[(arr.indexOf(pick) + 1) % arr.length];
  }
  currentQuote = pick;
  count++;
  const card = $('#card');
  card.classList.remove('flip');
  void card.offsetWidth;
  card.classList.add('flip');
  $('#qtext').textContent = pick[0];
  $('#qauthor').textContent = pick[1];
  $('#qtag').textContent = catLabel(pick[2]);
  $('#counter').textContent = count + ' ' + t('quotes');
}

function tweet() {
  if (!currentQuote) return;
  const text = `"${currentQuote[0]}" — ${currentQuote[1]}`;
  window.open('https://twitter.com/intent/tweet?text=' + encodeURIComponent(text), '_blank');
}

function copyQ() {
  if (!currentQuote) return;
  copyText(`"${currentQuote[0]}" — ${currentQuote[1]}`);
  showToast(t('copied') || 'Copied');
}

function buildCats() {
  const cats = ['all', 'inspire', 'motivate', 'wisdom', 'funny', 'success', 'love'];
  $('#cats').innerHTML = cats.map(k =>
    `<button class="${k===currentCat?'active':''}" onclick="setCat('${k}')">${t(k==='all'?'all':k)}</button>`
  ).join('');
}

function setCat(k) { currentCat = k; buildCats(); drawQuote(); }

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="drawQuote()">${t('generate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="copyQ()">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="tweet()">${t('tweet')}</button>`;

buildCats();
drawQuote();

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [

</script>
