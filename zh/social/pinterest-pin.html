.pin-img{width:100%;aspect-ratio:2/3;object-fit:cover;display:block;background:linear-gradient(135deg,#ffe1e1,#e0e7ff)}
.pin-img-ph{width:100%;aspect-ratio:2/3;display:flex;align-items:center;justify-content:center;text-align:center;font-size:16px;font-weight:700;color:#888;background:linear-gradient(135deg,#fde2e4,#cdd5ff);padding:20px}
.pin-overlay{position:relative}
.pin-title-ov{position:absolute;left:14px;right:14px;bottom:14px;color:#fff;font-size:20px;font-weight:700;text-shadow:0 2px 8px rgba(0,0,0,.7);line-height:1.25}
.pin-title{font-size:17px;font-weight:700;padding:10px 16px 4px;line-height:1.3}

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="ctrl" id="controls"></div>
    <div class="pin-wrap"><div class="pin-card" id="pin-preview"></div></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Pinterest Pin Generator',
    toolDesc: 'Create realistic Pinterest pin mockups for content planning and design — customize image, title, description, board and download as a 2:3 PNG.',
    account: 'Account Name',
    avatar: 'Avatar Color',
    board: 'Board',
    imgurl: 'Image URL (2:3 recommended)',
    title: 'Pin Title',
    desc2: 'Pin Description',
    overlay: 'Title overlay on image',
    downloads: 'Downloads',
    download: 'Download PNG',
    clear: 'Reset',
    step1: 'Enter the account name and pick an avatar color',
    step2: 'Paste an image URL or keep the placeholder',
    step3: 'Write a catchy title and description',
    step4: 'Download the Pinterest pin as a PNG image',
  },
  zh: {
    toolTitle: 'Pinterest Pin 生成器',
    toolDesc: '创建逼真的 Pinterest Pin 截图 — 自定义图片、标题、描述、画板，下载为 2:3 比例 PNG 图片。',
    account: '账号名称',
    avatar: '头像颜色',
    board: '画板',
    imgurl: '图片 URL（推荐 2:3）',
    title: 'Pin 标题',
    desc2: 'Pin 描述',
    overlay: '标题覆盖在图片上',
    downloads: '下载量',
    download: '下载 PNG',
    clear: '重置',
    step1: '输入账号名称并选择头像颜色',
    step2: '粘贴图片 URL 或使用占位图',
    step3: '编写吸引人的标题和描述',
    step4: '下载 Pinterest Pin 为 PNG 图片',
  }
});

const { $, copyText, t } = GZ;

let cfg = {
  account: 'gamezipper',
  color: '#e60023',
  board: 'Free Online Tools',
  imgurl: 'https://images.unsplash.com/photo-1611162617474-5b21e879e113?w=600&q=80',
  title: '990+ Free Online Tools That Run Right In Your Browser',
  desc: 'No signup, no upload. JSON formatters, color tools, image utilities and more. Save this pin so you can find it later! ✨',
  overlay: true,
  downloads: 1280
};

function formatNum(n) {
  n = +n || 0;
  if (n >= 1000000) return (n/1000000).toFixed(1)+'M';
  if (n >= 1000) return (n/1000).toFixed(1)+'k';
  return n.toString();
}

function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escAttr(s) { return escHtml(s).replace(/"/g,'&quot;'); }

function buildControls() {
  const c = $('#controls');
  c.innerHTML = `
    <label>${t('account')}<input type="text" id="cAcc" value="${escAttr(cfg.account)}"></label>
    <label>${t('avatar')}<input type="color" id="cColor" value="${escAttr(cfg.color)}" style="min-height:36px;height:36px;width:60px"></label>
    <label>${t('board')}<input type="text" id="cBoard" value="${escAttr(cfg.board)}"></label>
    <label>${t('imgurl')}<input type="text" id="cImg" value="${escAttr(cfg.imgurl)}" placeholder="https://..." style="min-width:300px"></label>
    <label>${t('title')}<input type="text" id="cTitle" value="${escAttr(cfg.title)}" style="min-width:340px"></label>
    <label>${t('desc2')}<textarea id="cDesc" rows="3" style="min-width:340px">${escHtml(cfg.desc)}</textarea></label>
    <label>${t('downloads')}<input type="number" id="cDl" value="${cfg.downloads}" min="0"></label>
    <label>${t('overlay')}<input type="checkbox" id="cOv" ${cfg.overlay?'checked':''}></label>
  `;
  const map = {cAcc:'account',cBoard:'board',cImg:'imgurl',cTitle:'title',cDesc:'desc'};
  Object.keys(map).forEach(id=>$('#'+id).oninput=e=>{cfg[map[id]]=e.target.value;render()});
  $('#cColor').oninput=e=>{cfg.color=e.target.value;render()};
  $('#cDl').oninput=e=>{cfg.downloads=+e.target.value||0;render()};
  $('#cOv').onchange=e=>{cfg.overlay=e.target.checked;render()};
}

function render() {
  const acc = cfg.account.replace(/^@/,'');
  const img = cfg.imgurl.trim();
  const initial = (acc[0]||'?').toUpperCase();
  $('#pin-preview').innerHTML = `
    <div class="pin-top">
      <div class="pin-ava" style="background:${escAttr(cfg.color)}">${escHtml(initial)}</div>
      <div class="pin-handle">${escHtml(acc)||'username'}</div>
      <button class="pin-save">Save</button>
    </div>
    <div class="pin-overlay">
      ${img
        ? `<img class="pin-img" src="${escAttr(img)}" onerror="this.outerHTML='<div class=\\'pin-img-ph\\'>${escHtml(cfg.title)||'Pin image'}</div>'">`
        : `<div class="pin-img-ph">${escHtml(cfg.title)||'Your pin title here'}</div>`}
      ${cfg.overlay && cfg.title ? `<div class="pin-title-ov">${escHtml(cfg.title)}</div>` : ''}
    </div>
    ${!cfg.overlay || !cfg.title ? `<div class="pin-title">${escHtml(cfg.title)||'Pin title'}</div>` : ''}
    ${cfg.desc?`<div class="pin-desc">${escHtml(cfg.desc)}</div>`:''}
    <div class="pin-bot">
      <span class="ic">⬇</span><span>${formatNum(cfg.downloads)}</span>
      <span class="ic" style="margin-left:auto">📤</span>
      <span class="ic">⋯</span>
    </div>
  `;
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" id="dlBtn">${t('download')}</button>
  <button class="gz-btn gz-btn-secondary" id="resetBtn">${t('clear')}</button>
`;

$('#resetBtn').onclick = () => {
  Object.assign(cfg, { account:'username', board:'', imgurl:'', title:'', desc:'', downloads:0 });
  buildControls(); render();
};

$('#dlBtn').onclick = async () => {
  try {
    if (typeof html2canvas !== 'undefined') {
      const canvas = await html2canvas($('#pin-preview'), { backgroundColor: null, scale: 2, useCORS: true, allowTaint: true });
      const a = document.createElement('a');
      a.href = canvas.toDataURL('image/png');
      a.download = 'pinterest-pin.png';
      a.click();
    }
  } catch(e) { console.error(e); }
};

const h2c = document.createElement('script');
h2c.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
document.head.appendChild(h2c);

buildControls();
render();

GZ.renderToolPage({
  category: 'social',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📸', href:'/social/instagram-post.html', name:'Instagram Post'},
    {icon:'🐦', href:'/social/tweet-generator.html', name:'Tweet Generator'},
    {icon:'🟠', href:'/social/reddit-post.html', name:'Reddit Post'},
    {icon:'▶️', href:'/social/youtube-thumb.html', name:'YouTube Thumbnail'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
