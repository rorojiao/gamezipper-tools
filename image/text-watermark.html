<script>

    upload: '\u4e0a\u4f20\u56fe\u7247',

    text: '\u6c34\u5370\u6587\u5b57',
    size: '\u5b57\u4f53\u5927\u5c0f',
    opacity: '\u900f\u660e\u5ea6',
    color: '\u989c\u8272',

    pos: '\u4f4d\u7f6e',
    rotate: '\u65cb\u8f6c',
    tile: '\u5e73\u94fa\u6a21\u5f0f',
    step1: '\u4e0a\u4f20\u56fe\u7247\u6216\u5c06\u56fe\u7247\u62d6\u5165\u753b\u5e03',
    step2: '\u8f93\u5165\u6c34\u5370\u6587\u5b57\uff08\u5982 \u00a9 \u4f60\u7684\u540d\u5b57\uff09',
    step3: '\u8c03\u6574\u5b57\u4f53\u3001\u5927\u5c0f\u3001\u989c\u8272\u3001\u900f\u660e\u5ea6\u548c\u4f4d\u7f6e',
    step4: '\u70b9\u51fb\u201c\u4e0b\u8f7d\u201d\u4fdd\u5b58\u52a0\u6c34\u5370\u540e\u7684\u56fe\u7247',
  }
});
const { $, t } = GZ;
const canvas = $('#canvas');
const ctx = canvas.getContext('2d');
let img = null;

function setLabels() {
  $('#lbl-text').textContent = t('text');
  $('#lbl-size').textContent = t('size') + ': ' + $('#size').value + 'px';
  $('#lbl-opacity').textContent = t('opacity') + ': ' + $('#opacity').value + '%';
  $('#lbl-color').textContent = t('color');
  $('#lbl-font').textContent = t('font');
  $('#lbl-pos').textContent = t('pos');
  $('#lbl-rotate').textContent = t('rotate') + ': ' + $('#rotate').value + '\u00b0';
  $('#lbl-tile').textContent = t('tile');
  $('#empty').textContent = t('empty');
}

function loadImage(file) {
  const reader = new FileReader();
  reader.onload = e => {
    img = new Image();
    img.onload = () => {
      const maxW = 1400;
      let w = img.width, h = img.height;
      if (w > maxW) { h = h * maxW / w; w = maxW; }
      canvas.width = w; canvas.height = h;
      canvas.style.display = 'block';
      $('#empty').style.display = 'none';
      render();
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function render() {
  setLabels();
  if (!img) return;
  ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
  const text = $('#wmtext').value || '';
  if (!text) return;
  const size = +$('#size').value;
  const opacity = +$('#opacity').value / 100;
  const color = $('#color').value;
  const font = $('#font').value;
  const pos = $('#pos').value;
  const rotate = +$('#rotate').value;
  const tile = $('#tile').value === '1';
  ctx.font = `bold ${size}px ${font}`;
  ctx.fillStyle = color;
  ctx.globalAlpha = opacity;
  ctx.textBaseline = 'middle';
  if (tile) {
    ctx.save();
    ctx.translate(canvas.width/2, canvas.height/2);
    ctx.rotate(-Math.PI/6);
    const metrics = ctx.measureText(text + '    ');
    const stepX = metrics.width;
    const stepY = size * 2.2;
    for (let y = -canvas.height; y < canvas.height; y += stepY) {
      for (let x = -canvas.width; x < canvas.width; x += stepX) {
        ctx.fillText(text + '    ', x, y);
      }
    }
    ctx.restore();
  } else {
    const m = ctx.measureText(text);
    const pad = 20;
    let x, y;
    const w = canvas.width, h = canvas.height;
    if (pos[0]==='t') y = pad + size/2;
    else if (pos[0]==='m') y = h/2;
    else y = h - pad - size/2;
    if (pos[1]==='l') x = pad;
    else if (pos[1]==='c') x = w/2 - m.width/2;
    else x = w - pad - m.width;
    ctx.save();
    if (rotate !== 0) {
      ctx.translate(x + m.width/2, y);
      ctx.rotate(rotate * Math.PI/180);
      ctx.textAlign = 'center';
      ctx.fillText(text, 0, 0);
    } else {
      ctx.fillText(text, x, y);
    }
    ctx.restore();
  }
  ctx.globalAlpha = 1;
}

$('#fileinput').addEventListener('change', e => { if (e.target.files[0]) loadImage(e.target.files[0]); });
$('#stage').addEventListener('dragover', e => e.preventDefault());
$('#stage').addEventListener('drop', e => { e.preventDefault(); if (e.dataTransfer.files[0]) loadImage(e.dataTransfer.files[0]); });

function doUpload() { $('#fileinput').click(); }
function doDownload() {
  if (!img) return;
  const a = document.createElement('a');
  a.download = 'watermarked.png';
  a.href = canvas.toDataURL('image/png');
  a.click();
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="doUpload()">${t('upload')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doDownload()">${t('download')}</button>`;
setLabels();

GZ.renderToolPage({

});
