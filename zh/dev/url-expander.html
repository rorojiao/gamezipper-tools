const { $, $$, t, copyText, showToast } = GZ;
const MAX_HOPS = 15;

async function expandUrl(startUrl) {
  const hops = [];
  let current = startUrl;
  let prev = null;
  for (let i = 0; i < MAX_HOPS; i++) {
    let res;
    try {
      res = await fetch(current, { method: 'HEAD', redirect: 'manual', mode: 'cors' });
    } catch (e) {
      // Try GET as fallback
      try {
        res = await fetch(current, { method: 'GET', redirect: 'manual', mode: 'cors' });
      } catch (e2) {
        if (hops.length === 0) throw e2;
        break;
      }
    }
    const status = res.status;
    const statusText = res.statusText || '';
    const location = res.headers.get('Location') || res.headers.get('location') || '';
    hops.push({ url: current, status, statusText, location });
    const sc = Math.floor(status / 100);
    if (sc === 3 && location) {
      // Resolve relative
      try {
        const next = new URL(location, current).toString();
        if (next === current) break;
        current = next;
      } catch (e) { break; }
    } else {
      break;
    }
  }
  return { hops, finalUrl: hops.length ? hops[hops.length - 1].url : startUrl };
}

function statusClass(s) { const c = Math.floor(s / 100); return c === 2 ? 's2' : c === 3 ? 's3' : c === 4 || c === 5 ? 's4' : ''; }

function renderResult(result) {
  const { hops, finalUrl } = result;
  const totalHops = hops.length;
  const finalHop = hops[hops.length - 1];
  const finalStatus = finalHop ? finalHop.status : 0;
  const redirected = totalHops > 1;

  let html = `<div class="summary">
    <div class="summary-card"><div class="num">${totalHops}</div><div class="lbl">${t('hopsLabel')}</div></div>
    <div class="summary-card"><div class="num">${finalStatus}</div><div class="lbl">${t('statusLabel')}</div></div>
    <div class="summary-card"><div class="num">${redirected ? '✓' : '—'}</div><div class="lbl">${t('finalLabel')}</div></div>
  </div>
  <h3 style="margin:18px 0 8px;font-size:1rem">${t('finalLabel')}</h3>
  <div style="word-break:break-all;padding:12px;background:var(--glass2);border:1px solid var(--border);border-radius:10px;font-family:monospace;font-size:.9em">${escHtml(finalUrl)}</div>
  <h3 style="margin:18px 0 8px;font-size:1rem">${t('hopsLabel')}</h3>
  <div class="hop-list">`;
  hops.forEach((h, i) => {
    const cls = statusClass(h.status);
    html += `<div class="hop ${i === hops.length - 1 ? 'hop-final' : ''}">
      <span class="hop-num">#${i + 1}</span>
      <span class="hop-status ${cls}">${h.status}</span>
      <span class="hop-url">${escHtml(h.url)}</span>
    </div>`;
  });
  html += `</div>`;
  $('#output').innerHTML = html;
}

function escHtml(s) { return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

async function doExpand() {
  const raw = $('#input').value.trim();
  if (!raw) return;
  let url;
  try { url = new URL(raw); if (url.protocol !== 'http:' && url.protocol !== 'https:') throw 0; }
  catch (e) { $('#output').innerHTML = `<div style="color:var(--gz-accent);margin-top:12px">${t('errorInvalid')}</div>`; return; }

  $('#output').innerHTML = '<div style="margin-top:12px;opacity:.7">⏳ Following redirects…</div>';
  try {
    const result = await expandUrl(url.toString());
    renderResult(result);
  } catch (e) {
    $('#output').innerHTML = `<div style="color:var(--gz-accent);margin-top:12px">${t('errorCORS')}<br><small style="opacity:.6">${escHtml(e.message || String(e))}</small></div>`;
  }
}

function copyFinal() {
  const card = $('#output .summary');
  if (!card) return;
  const text = $('#output div[style*="monospace"]').textContent || '';
  if (text) copyText(text);
}

function loadExample() {
  $('#input').value = 'https://bit.ly/3example';
  doExpand();
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="doExpand()">${t('expand')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="copyFinal()">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#input').value='';$('#output').innerHTML=''">${t('clear')}</button>`;
