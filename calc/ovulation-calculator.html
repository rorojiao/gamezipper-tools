<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "How is the ovulation date calculated?", "acceptedAnswer": {"@type": "Answer", "text": "Ovulation usually happens about 14 days before your next period. We estimate it by adding your cycle length minus the luteal phase to the first day of your last menstrual period (LMP)."}}, {"@type": "Question", "name": "What is the fertile window?", "acceptedAnswer": {"@type": "Answer", "text": "Your fertile window is the roughly 6 days each cycle when pregnancy is possible: the 5 days before ovulation plus the day of ovulation. Sperm can survive up to 5 days, while the egg lives about 24 hours."}}, {"@type": "Question", "name": "How accurate is this calculator?", "acceptedAnswer": {"@type": "Answer", "text": "This tool gives an estimate based on averages. Real ovulation varies between cycles and between people. For precise tracking use ovulation predictor kits, basal body temperature charting, or consult a healthcare provider."}}, {"@type": "Question", "name": "Is my data private?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. All calculations run entirely in your browser. No dates or personal information are ever sent to any server."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-form" id="form">
      <div>
        <label id="lbl-lmp"></label>
        <input type="date" id="lmp">
      </div>
      <div>
        <label id="lbl-cycle"></label>
        <input type="number" id="cycle" value="28" min="21" max="45">
      </div>
      <div>
        <label id="lbl-luteal"></label>
        <input type="number" id="luteal" value="14" min="9" max="16">
      </div>
      <button class="gz-btn" onclick="calculate()" id="btn-calc"></button>
    </div>
    <div class="result-card" id="result" style="display:none">
      <div class="big" id="result-ovulation"></div>

      <div class="result-grid">
        <div class="result-item"><div class="val" id="result-fertile"></div><div class="lbl" id="result-fertile-label"></div></div>
        <div class="result-item"><div class="val" id="result-nextperiod"></div><div class="lbl" id="result-nextperiod-label"></div></div>
        <div class="result-item"><div class="val" id="result-duedate"></div><div class="lbl" id="result-duedate-label"></div></div>
        <div class="result-item"><div class="val" id="result-gestage"></div><div class="lbl" id="result-gestage-label"></div></div>
      </div>

    </div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Ovulation Calculator',
    toolDesc: 'Find your ovulation date, fertile window, next period and estimated due date from your last menstrual period and cycle length.',
    lblLmp: 'First Day of Last Period (LMP)',
    lblCycle: 'Cycle Length (days)',
    lblLuteal: 'Luteal Phase (days)',
    btnCalc: 'Calculate Ovulation Date',
    resultLabel: 'Estimated Ovulation Date',
    fertile: 'Fertile Window',
    nextPeriod: 'Next Period Starts',
    dueDate: 'Estimated Due Date (if pregnant)',
    gestAge: 'Gestational Age Today',
    note: '💡 <b>Tip:</b> Your fertile window is about 5 days before ovulation to 1 day after. For the best chance of conception, have intercourse every 1-2 days during this window. This estimate is based on averages — real cycles vary. For medical advice, consult your doctor.',
    step1: 'Enter the first day of your last menstrual period',
    step2: 'Set your average cycle length (typically 28 days)',
    step3: 'Adjust the luteal phase if known (default 14 days)',
    step4: 'Click Calculate to see your ovulation date, fertile window and due date',
  },
  zh: {
    toolTitle: '排卵期计算器',
    toolDesc: '根据末次月经日期和月经周期，预测排卵日、易孕期、下次月经日和预产期。',
    lblLmp: '末次月经第一天',
    lblCycle: '月经周期（天）',
    lblLuteal: '黄体期（天）',
    btnCalc: '计算排卵日',
    resultLabel: '预计排卵日',
    fertile: '易孕窗口',
    nextPeriod: '下次月经开始日',
    dueDate: '预产期（如怀孕）',
    gestAge: '今日孕周',
    note: '💡 <b>小贴士：</b>易孕期约为排卵前 5 天到排卵后 1 天。为提高受孕几率，建议在此期间每 1-2 天同房一次。本结果基于平均值估算，实际周期因人而异。如有健康疑问请咨询医生。',
    step1: '输入末次月经的第一天',
    step2: '填写平均月经周期（通常为 28 天）',
    step3: '如已知黄体期可调整（默认 14 天）',
    step4: '点击「计算排卵日」查看排卵日、易孕窗口和预产期',
  }
});

const { $, t } = GZ;

function fmt(d) {
  return d.toLocaleDateString(undefined, { weekday: 'short', year: 'numeric', month: 'short', day: 'numeric' });
}
function addDays(d, n) { const x = new Date(d); x.setDate(x.getDate() + n); return x; }

function calculate() {
  const lmpStr = $('#lmp').value;
  if (!lmpStr) return;
  const lmp = new Date(lmpStr + 'T00:00:00');
  const cycle = Math.max(21, Math.min(45, parseInt($('#cycle').value, 10) || 28));
  const luteal = Math.max(9, Math.min(16, parseInt($('#luteal').value, 10) || 14));

  // Ovulation = LMP + cycle - luteal
  const ovulation = addDays(lmp, cycle - luteal);
  const fertileStart = addDays(ovulation, -5);
  const fertileEnd = addDays(ovulation, 1);
  const nextPeriod = addDays(lmp, cycle);
  // Due date = LMP + 280 days (Naegele's rule)
  const dueDate = addDays(lmp, 280);

  // Gestational age today (in weeks+days), based on LMP
  const today = new Date(); today.setHours(0,0,0,0);
  const daysSince = Math.floor((today - lmp) / 86400000);
  let gestStr = '—';
  if (daysSince >= 0 && daysSince <= 300) {
    const w = Math.floor(daysSince / 7);
    const d = daysSince % 7;
    gestStr = `${w}w ${d}d`;
  }

  $('#result').style.display = '';
  $('#result-ovulation').textContent = fmt(ovulation);
  $('#result-label').textContent = t('resultLabel');
  $('#result-fertile').textContent = fmt(fertileStart) + ' – ' + fertileEnd.getDate();
  $('#result-fertile-label').textContent = t('fertile');
  $('#result-nextperiod').textContent = fmt(nextPeriod);
  $('#result-nextperiod-label').textContent = t('nextPeriod');
  $('#result-duedate').textContent = fmt(dueDate);
  $('#result-duedate-label').textContent = t('dueDate');
  $('#result-gestage').textContent = gestStr;
  $('#result-gestage-label').textContent = t('gestAge');
  $('#note').innerHTML = t('note');
}

// Default LMP to ~2 weeks ago
(function setDefaultLmp() {
  const d = new Date(); d.setDate(d.getDate() - 14);
  $('#lmp').value = d.toISOString().slice(0, 10);
})();

$('#btn-calc').textContent = t('btnCalc');
calculate();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📅', href:'/calc/date-calculator.html', name:'Date Calc'},
    {icon:'🎂', href:'/calc/age-calculator.html', name:'Age Calc'},
    {icon:'⚖️', href:'/calc/bmi-calculator.html', name:'BMI Calc'},
    {icon:'🗓️', href:'/calc/pregnancy-due-date.html', name:'Due Date'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
