<style>
.toolbar-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;align-items:center}
.title-input{flex:1;min-width:180px;padding:8px 12px;background:var(--glass2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:1em}
.tier-container{background:var(--glass2);border:1px solid var(--border);border-radius:12px;padding:8px;margin-bottom:12px;overflow:hidden}
.tier-row{display:grid;grid-template-columns:120px 1fr;gap:6px;margin-bottom:6px;align-items:stretch;min-height:64px}
.tier-row:last-child{margin-bottom:0}
.tier-label{display:flex;align-items:center;justify-content:center;font-weight:900;font-size:1.6em;border-radius:8px;cursor:pointer;position:relative;color:#000;user-select:none}
.tier-label input.tier-name{position:absolute;inset:6px;border:none;background:transparent;color:inherit;font:inherit;font-weight:900;text-align:center;outline:none}
.tier-label input.tier-color{position:absolute;bottom:2px;right:2px;width:18px;height:18px;border:none;background:transparent;padding:0;cursor:pointer}
.tier-cells{flex:1;display:flex;flex-wrap:wrap;gap:6px;padding:6px;background:var(--glass);border-radius:8px;min-height:64px;border:1px dashed var(--border)}
.tier-cell-empty{flex:1;display:flex;align-items:center;justify-content:center;color:var(--text2);font-size:.85em;min-width:60px}
.tier-item{background:var(--glass2);border:1px solid var(--border);border-radius:6px;padding:6px 10px;font-size:.85em;cursor:grab;display:flex;align-items:center;gap:4px;user-select:none;max-width:180px}
.tier-item:active{cursor:grabbing}
.tier-item .x{opacity:.4;cursor:pointer;padding:0 4px;font-size:1.1em;line-height:1}
.tier-item .x:hover{opacity:1;color:var(--accent)}
.tier-item input.item-label{border:none;background:transparent;color:inherit;font:inherit;width:auto;min-width:40px;max-width:140px;outline:none}
.pool-section{margin-top:12px;padding:12px;background:var(--glass);border:1px solid var(--border);border-radius:12px}
.pool-section h3{margin:0 0 8px;font-size:.95em}
.item-input-row{display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap}
.item-input-row input{flex:1;min-width:120px;padding:8px 12px;background:var(--glass2);border:1px solid var(--border);border-radius:8px;color:var(--text)}
.tier-actions{display:flex;gap:6px;flex-wrap:wrap}
.tier-actions button{font-size:.8em;padding:6px 10px}
.dl-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.dl-row button{flex:1;min-width:140px}
</style>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="toolbar-row">
      <input type="text" class="title-input" id="listTitle" placeholder="My Tier List">
      <button class="gz-btn" id="add-tier">➕ Add Tier</button>
      <button class="gz-btn gz-btn-secondary" id="clear-all">🗑️ Clear All</button>
    </div>
    <div class="tier-container" id="tiers"></div>
    <div class="pool-section">
      <h3 id="pool-title">📥 Item Pool (drag items into tiers above)</h3>
      <div class="item-input-row">
        <input type="text" id="new-item" placeholder="Type an item and press Enter…">
        <button class="gz-btn" id="add-item">Add</button>
        <button class="gz-btn gz-btn-secondary" id="bulk-add">📋 Bulk Add (one per line)</button>
      </div>
      <div class="tier-cells" id="pool"></div>
    </div>
    <div class="dl-row">
      <button class="gz-btn" id="dl-png">⬇️ Download PNG</button>
      <button class="gz-btn gz-btn-secondary" id="dl-json">⬇️ Export JSON</button>
      <button class="gz-btn gz-btn-secondary" id="copy-json">📋 Copy JSON</button>
    </div>
    <canvas id="export-canvas" style="display:none"></canvas>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Tier List Maker',
    toolDesc: 'Create, customize and share tier lists. Drag items into S, A, B, C, D, F tiers, edit tier names and colors, save as PNG image, and auto-save to your browser. Free, no signup.',
    addItem: 'Add',
    addTier: 'Add Tier',
    clearAll: 'Clear All',
    bulkAdd: 'Bulk Add (one per line)',
    poolTitle: '📥 Item Pool (drag items into tiers above)',
    step1: 'Type items in the input box and press Enter or click Add',
    step2: 'Drag items from the pool into a tier row',
    step3: 'Click a tier label to rename it, and use the color picker to recolor it',
    step4: 'Click Download PNG to save your tier list as a high-resolution image',
  },
  zh: {
    toolTitle: '层级榜单制作器',
    toolDesc: '创建、定制和分享层级榜单。拖动项目到 S、A、B、C、D、F 层级，编辑层级名称和颜色，保存为 PNG 图片，自动保存到浏览器。免费，无需注册。',
    addItem: '添加',
    addTier: '添加层级',
    clearAll: '清空',
    bulkAdd: '批量添加（每行一项）',
    poolTitle: '📥 项目池（拖动项目到上方层级）',
    step1: '在输入框中输入项目，按回车或点击「添加」',
    step2: '从项目池拖动项目到某个层级行',
    step3: '点击层级标签可重命名，使用颜色选择器可重新上色',
    step4: '点击「下载 PNG」将层级榜保存为高分辨率图片',
  }
});

const { $, t } = GZ;
$('#pool-title').textContent = t('poolTitle');

const DEFAULT_TIERS = [
  { name: 'S', color: '#ff7f7f' },
  { name: 'A', color: '#ffbf7f' },
  { name: 'B', color: '#ffdf7f' },
  { name: 'C', color: '#7fff7f' },
  { name: 'D', color: '#7fbfff' },
  { name: 'F', color: '#bf7fff' },
];

let state = loadState() || { title: 'My Tier List', tiers: DEFAULT_TIERS.map(t => ({...t})), items: [], pool: ['Mario','Zelda','Metroid','Halo','Elden Ring','Minecraft','Fortnite','Pokemon','Final Fantasy'] };

function saveState() { localStorage.setItem('gz-tierlist', JSON.stringify(state)); }
function loadState() { try { return JSON.parse(localStorage.getItem('gz-tierlist')); } catch(e) { return null; } }

function renderTiers() {
  const wrap = $('#tiers');
  wrap.innerHTML = '';
  state.tiers.forEach((tier, ti) => {
    const row = document.createElement('div');
    row.className = 'tier-row';
    row.dataset.tier = ti;
    row.innerHTML = `
      <div class="tier-label" style="background:${tier.color}">
        <input class="tier-name" value="${tier.name.replace(/"/g, '&quot;')}" maxlength="12">
        <input class="tier-color" type="color" value="${tier.color}">
      </div>
      <div class="tier-cells" data-tier="${ti}"></div>
    `;
    const cells = row.querySelector('.tier-cells');
    const items = state.items.filter(it => it.tier === ti);
    if (items.length === 0) {
      const empty = document.createElement('div');
      empty.className = 'tier-cell-empty';
      empty.textContent = '↓ drop here';
      cells.appendChild(empty);
    } else {
      items.forEach(it => cells.appendChild(makeItemEl(it)));
    }
    cells.addEventListener('dragover', e => { e.preventDefault(); cells.style.background = 'var(--accent)'; cells.style.opacity = '.3'; });
    cells.addEventListener('dragleave', () => { cells.style.background = ''; cells.style.opacity = ''; });
    cells.addEventListener('drop', e => {
      e.preventDefault();
      cells.style.background = ''; cells.style.opacity = '';
      const id = e.dataTransfer.getData('text/plain');
      const it = state.items.find(x => x.id === id);
      if (it) { it.tier = ti; saveState(); renderTiers(); }
    });
    row.querySelector('.tier-name').addEventListener('input', e => { tier.name = e.target.value || tier.name; saveState(); });
    row.querySelector('.tier-color').addEventListener('input', e => { tier.color = e.target.value; saveState(); row.querySelector('.tier-label').style.background = tier.color; });
    wrap.appendChild(row);
  });
  renderPool();
}

function renderPool() {
  const pool = $('#pool');
  pool.innerHTML = '';
  const inPool = state.pool.map(text => ({ id: 'p_' + text + '_' + Math.random().toString(36).slice(2,6), text, tier: -1 }));
  // also include any state.items with tier === null/-1 not in pool (safety)
  inPool.forEach(it => pool.appendChild(makeItemEl(it, true)));
  // Drag setup
  pool.addEventListener('dragover', e => e.preventDefault());
  pool.addEventListener('drop', e => {
    e.preventDefault();
    const id = e.dataTransfer.getData('text/plain');
    const it = state.items.find(x => x.id === id);
    if (it) { it.tier = null; saveState(); renderTiers(); }
  }, { once: false });
  pool.ondragover = (e) => e.preventDefault();
}

function makeItemEl(it, isPool = false) {
  const el = document.createElement('div');
  el.className = 'tier-item';
  el.draggable = true;
  el.dataset.id = it.id;
  el.innerHTML = `<input class="item-label" value="${(it.text || '').replace(/"/g, '&quot;')}"><span class="x" title="Remove">×</span>`;
  el.querySelector('.item-label').addEventListener('input', e => { it.text = e.target.value; if (isPool) { state.pool = state.pool.map(p => p === it.text ? e.target.value : p); } saveState(); });
  el.querySelector('.x').addEventListener('click', e => { e.stopPropagation();
    if (isPool) { state.pool = state.pool.filter(p => p !== it.text && p !== el.querySelector('.item-label').value); }
    state.items = state.items.filter(x => x.id !== it.id);
    saveState(); renderTiers();
  });
  el.addEventListener('dragstart', e => { e.dataTransfer.setData('text/plain', it.id); e.dataTransfer.effectAllowed = 'move'; });
  return el;
}

function addItem(text) {
  text = (text || '').trim(); if (!text) return;
  state.pool.push(text);
  saveState();
  renderPool();
}

$('#add-item').onclick = () => { addItem($('#new-item').value); $('#new-item').value = ''; $('#new-item').focus(); };
$('#new-item').addEventListener('keydown', e => { if (e.key === 'Enter') { addItem($('#new-item').value); $('#new-item').value = ''; } });
$('#bulk-add').onclick = () => {
  const v = prompt('Paste items, one per line:');
  if (v) { v.split(/\r?\n/).forEach(line => addItem(line)); }
};
$('#add-tier').onclick = () => { state.tiers.push({ name: 'X', color: '#aaaaaa' }); saveState(); renderTiers(); };
$('#clear-all').onclick = () => { if (confirm('Clear all items and reset to default tiers?')) { localStorage.removeItem('gz-tierlist'); state = { title: 'My Tier List', tiers: DEFAULT_TIERS.map(t => ({...t})), items: [], pool: [] }; saveState(); renderTiers(); $('#listTitle').value = state.title; } };
$('#listTitle').addEventListener('input', e => { state.title = e.target.value; saveState(); });

$('#dl-json').onclick = () => {
  const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob); a.download = 'tier-list.json'; a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 2000);
};
$('#copy-json').onclick = () => {
  navigator.clipboard.writeText(JSON.stringify(state, null, 2));
};

$('#dl-png').onclick = () => {
  const c = $('#export-canvas');
  const ctx = c.getContext('2d');
  const padding = 24, labelW = 140, rowH = 70, titleH = 56, width = 1100;
  const rows = state.tiers.length;
  const totalH = titleH + padding + rows * rowH + padding;
  c.width = width; c.height = totalH;
  ctx.fillStyle = getComputedStyle(document.body).getPropertyValue('--glass2') || '#1a1a2e';
  ctx.fillRect(0, 0, width, totalH);
  // Title
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 32px system-ui, sans-serif';
  ctx.textBaseline = 'middle';
  ctx.fillText(state.title || 'Tier List', padding, titleH/2);
  // Rows
  state.tiers.forEach((tier, ti) => {
    const y = titleH + padding + ti * rowH;
    ctx.fillStyle = tier.color;
    ctx.fillRect(padding, y, labelW, rowH - 8);
    ctx.fillStyle = '#000';
    ctx.font = 'bold 36px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(tier.name, padding + labelW/2, y + (rowH-8)/2);
    ctx.textAlign = 'left';
    // Items
    const itemsX = padding + labelW + 8;
    const itemsW = width - itemsX - padding;
    ctx.fillStyle = 'rgba(255,255,255,0.04)';
    ctx.fillRect(itemsX, y, itemsW, rowH - 8);
    ctx.fillStyle = '#fff';
    ctx.font = '20px system-ui, sans-serif';
    let cx = itemsX + 12, cy = y + (rowH-8)/2;
    const its = state.items.filter(it => it.tier === ti);
    its.forEach(it => {
      const label = it.text;
      const w = Math.min(itemsW - 24, ctx.measureText(label).width + 24);
      if (cx + w > itemsX + itemsW - 8) { cx = itemsX + 12; cy += 30; }
      ctx.fillStyle = 'rgba(255,255,255,0.08)';
      ctx.fillRect(cx, cy - 14, w, 26);
      ctx.fillStyle = '#fff';
      ctx.fillText(label, cx + 12, cy);
      cx += w + 6;
    });
  });
  c.toBlob(b => {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(b); a.download = 'tier-list.png'; a.click();
    setTimeout(() => URL.revokeObjectURL(a.href), 2000);
  }, 'image/png');
};

$('#listTitle').value = state.title;
renderTiers();

GZ.renderToolPage({
  category: 'fun',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {href:'/fun/wheel-of-names.html',icon:'🎡',name:'Wheel of Names'},
    {href:'/fun/random-picker.html',icon:'🎲',name:'Random Picker'},
    {href:'/fun/tournament-bracket.html',icon:'🏆',name:'Tournament Bracket'},
    {href:'/fun/decision-maker.html',icon:'🤔',name:'Decision Maker'},
  ]
});
</script>
<script src="/tools-result-rec.js?v=20260707v520" defer></script>
</body>
