.gz-input-row input,.gz-input-row select{background:var(--glass2);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:8px 10px;font-size:.95em}
.gz-input-row input{width:130px}
.uv-gauge{height:14px;border-radius:8px;background:linear-gradient(90deg,#2db52d 0 16%,#f7e400 16% 33%,#f78104 33% 50%,#f6042a 50% 66%,#6c4ce0 66% 83%,#7b4124 83% 100%);position:relative;margin:6px 0 18px}
.uv-marker{position:absolute;top:-6px;width:4px;height:26px;background:#fff;box-shadow:0 0 0 2px #000;border-radius:2px;transform:translateX(-50%)}
.result-card{padding:16px 18px;background:var(--glass2);border:1px solid var(--border);border-radius:14px;margin-bottom:12px}
.result-card .big{font-size:1.8rem;font-weight:900}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px}

.tip{background:var(--glass);border-left:4px solid var(--accent);padding:10px 12px;border-radius:8px;margin:8px 0;font-size:.88em}

<script type="application/ld+json">{"@context":"https://schema.org","@type":"WebApplication","name":"UV Index Calculator","description":"Estimate sunburn time and safe sun exposure from UV index, skin type and SPF. Includes protection recommendations and vitamin D guidance.","url":"https://tools.gamezipper.com/calc/uv-index-calculator.html","applicationCategory":"Utility","operatingSystem":"Web Browser","offers":{"@type":"Offer","price":"0"}}</script>
<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"What does the UV Index mean?","acceptedAnswer":{"@type":"Answer","text":"The UV Index measures the strength of sunburn-producing ultraviolet radiation on a 0-11+ scale. 0-2 is low, 3-5 moderate, 6-7 high, 8-10 very high, and 11+ extreme. Higher values mean faster sunburn risk."}},{"@type":"Question","name":"How is sunburn time calculated?","acceptedAnswer":{"@type":"Answer","text":"The calculator uses the standard Fitzpatrick MED (Minimal Erythemal Dose) model. Each skin type has a baseline burn time at UV index 10; the actual burn time is scaled inversely with the UV index and divided by SPF."}},{"@type":"Question","name":"What skin types are supported?","acceptedAnswer":{"@type":"Answer","text":"The tool supports the six Fitzpatrick skin types from Type I (very fair, always burns) to Type VI (deeply pigmented, rarely burns). Each type has a different baseline sunburn threshold."}},{"@type":"Question","name":"How does SPF affect sunburn time?","acceptedAnswer":{"@type":"Answer","text":"SPF (Sun Protection Factor) multiplies your safe exposure time. SPF 30 lets you stay in the sun roughly 30 times longer before burning, assuming correct application and reapplication every 2 hours."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>

  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="gz-input-row" id="input-row"></div>

  </div>

</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'UV Index Calculator',
    toolDesc: 'Estimate your sunburn time and safe sun exposure from UV index, skin type and SPF. Get protection tips and vitamin D guidance.',
    uvLabel: 'UV Index (0–11+)',
    skinLabel: 'Your skin type',
    spfLabel: 'SPF (sunscreen)',
    calc: 'Calculate',
    burnTime: 'Estimated sunburn time',
    safeTime: 'Safe sun exposure',
    minUnit: 'min',
    hours: 'hours',
    risk: 'Risk level',
    riskLevels: ['Low','Low','Low','Moderate','Moderate','Moderate','High','High','Very High','Very High','Very High','Extreme'],
    riskTips: {
      'Low': 'Minimal protection required. Safe to be outside.',
      'Moderate': 'Wear sunglasses, hat, and seek shade during midday.',
      'High': 'Reduce sun exposure 10am–4pm. Use SPF 30+ sunscreen.',
      'Very High': 'Take extra precautions. Avoid midday sun, SPF 50+ recommended.',
      'Extreme': 'Avoid being outside during midday. Full protective clothing essential.'
    },
    skinTypes: {
      '1': 'Type I — Very fair, always burns',
      '2': 'Type II — Fair, burns easily',
      '3': 'Type III — Medium, burns moderately',
      '4': 'Type IV — Olive, burns minimally',
      '5': 'Type V — Brown, rarely burns',
      '6': 'Type VI — Dark, almost never burns'
    },
    vitD: 'Vitamin D time (hands & face)',
    reapply: 'Reapply sunscreen every 2 hours or after swimming.',
    errUV: 'Please enter a UV index between 0 and 16',
    step1: 'Enter the current UV Index (0 to 11+) for your location',
    step2: 'Select your Fitzpatrick skin type from I (fair) to VI (dark)',
    step3: 'Add the SPF number of your sunscreen, or 1 if none',
    step4: 'Get sunburn time, safe exposure window, risk level and sun-safety tips',
  },
  zh: {
    toolTitle: '紫外线指数计算器',
    toolDesc: '根据紫外线指数、肤质和防晒霜 SPF 估算晒伤时间和安全日晒时长，提供防护建议和维生素 D 指导。',
    uvLabel: '紫外线指数（0–11+）',
    skinLabel: '您的肤质',
    spfLabel: '防晒霜 SPF',
    calc: '计算',
    burnTime: '预估晒伤时间',
    safeTime: '安全日晒时长',
    minUnit: '分钟',
    hours: '小时',
    risk: '风险等级',
    riskLevels: ['低','低','低','中等','中等','中等','高','高','极高','极高','极高','极端'],
    riskTips: {
      '低': '基本无需防护，可放心在户外活动。',
      '中等': '建议佩戴太阳镜、帽子，正午时段尽量在阴凉处。',
      '高': '上午 10 点至下午 4 点减少日晒，使用 SPF 30+ 防晒霜。',
      '极高': '加强防护，避免正午阳光，推荐 SPF 50+。',
      '极端': '避免正午外出，必须穿长袖防护衣物。'
    },
    skinTypes: {
      '1': '类型 I — 极白皙，总是晒伤',
      '2': '类型 II — 白皙，易晒伤',
      '3': '类型 III — 中等肤色，中度晒伤',
      '4': '类型 IV — 橄榄色，较少晒伤',
      '5': '类型 V — 棕色，极少晒伤',
      '6': '类型 VI — 深色，几乎不晒伤'
    },
    vitD: '维生素 D 合成时长（双手+脸部）',
    reapply: '每 2 小时或游泳后补涂防晒霜。',
    errUV: '请输入 0 到 16 之间的紫外线指数',
    step1: '输入您所在地区当前的紫外线指数（0 到 11+）',
    step2: '从 I（白皙）到 VI（深色）选择您的菲兹帕特里克（Fitzpatrick）肤质',
    step3: '填写防晒霜的 SPF 值，如未涂抹则填 1',
    step4: '获得晒伤时间、安全日晒时长、风险等级和防护建议',
  }
});

const { $, t } = GZ;

// MED (Minimal Erythemal Dose) in minutes at UV index 10, by Fitzpatrick type
const MED_BASE = { '1': 5, '2': 10, '3': 15, '4': 25, '5': 40, '6': 60 };

function riskLevel(uv) {
  const idx = Math.min(Math.round(uv), 11);
  return t('riskLevels')[idx];
}

function formatMin(min) {
  if (!isFinite(min) || min <= 0) return '—';
  if (min < 60) return `${Math.round(min)} ${t('minUnit')}`;
  const h = Math.floor(min / 60);
  const m = Math.round(min % 60);
  return `${h} ${t('hours')} ${m} ${t('minUnit')}`;
}

function calc() {
  const uv = parseFloat($('#uv').value);
  if (!isFinite(uv) || uv < 0 || uv > 16) {
    $('#output').innerHTML = `<div class="tip" style="border-left-color:var(--gz-accent)">${t('errUV')}</div>`;
    return;
  }
  const skin = $('#skin').value;
  const spf = Math.max(1, parseInt($('#spf').value) || 1);
  const med = MED_BASE[skin];

  // Burn time scales inversely with UV (UV 10 = baseline), then × SPF
  let burnMin = uv <= 0 ? Infinity : (med * 10 / uv) * spf;
  // Safe exposure: 70% of burn time (cautious)
  const safeMin = isFinite(burnMin) ? burnMin * 0.7 : Infinity;
  // Vitamin D time: short exposure sufficient, ~25% of burn time, capped
  let vitDMin;
  if (uv <= 0) vitDMin = Infinity;
  else vitDMin = Math.min(med * 10 / uv * 0.25, 30); // typically 5-30 min

  const risk = riskLevel(uv);
  const tip = t('riskTips')[risk] || '';
  const markerPct = Math.min(uv / 11, 1) * 100;

  $('#output').innerHTML = `
    <div class="uv-gauge"><div class="uv-marker" style="left:${markerPct}%"></div></div>
    <div class="result-card">
      <div class="lbl" style="color:var(--text2);font-size:.85em">${t('burnTime')}</div>
      <div class="big" style="color:var(--gz-accent)">${formatMin(burnMin)}</div>
      <div class="lbl" style="margin-top:6px;color:var(--text2);font-size:.85em">${t('safeTime')}: <b style="color:var(--text)">${formatMin(safeMin)}</b></div>
    </div>
    <div class="stat-grid">
      <div class="stat-cell"><div class="num">${uv}</div><div class="lbl">UV Index</div></div>
      <div class="stat-cell"><div class="num" style="font-size:1.1em">${risk}</div><div class="lbl">${t('risk')}</div></div>
      <div class="stat-cell"><div class="num">${formatMin(vitDMin)}</div><div class="lbl">${t('vitD')}</div></div>
    </div>
    <div class="tip"><b>${risk}:</b> ${tip}</div>
    <div class="tip" style="border-left-color:var(--accent2)">☀️ ${t('reapply')}</div>`;
}

$('#input-row').innerHTML = `
  <label><b>${t('uvLabel')}:</b>
    <input id="uv" type="number" min="0" max="16" step="0.1" value="7">
  </label>
  <label><b>${t('skinLabel')}:</b>
    <select id="skin">
      ${Object.entries(t('skinTypes')).map(([k,v]) => `<option value="${k}">${v}</option>`).join('')}
    </select>
  </label>
  <label><b>${t('spfLabel')}:</b>
    <input id="spf" type="number" min="1" max="100" value="30">
  </label>`;

['uv','skin','spf'].forEach(id => $('#'+id).addEventListener('input', calc));

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="calc()">${t('calc')}</button>`;

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🌡️', href:'/calc/wind-chill.html', name:'Wind Chill'},
    {icon:'💧', href:'/calc/water-intake.html', name:'Water Intake'},
    {icon:'❤️', href:'/calc/heart-rate-zones.html', name:'Heart Rate Zones'},
    {icon:'🧴', href:'/calc/bmi-calculator.html', name:'BMI Calculator'},
  ]
});

calc();
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
