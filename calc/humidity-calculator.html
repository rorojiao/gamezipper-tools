<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is relative humidity?", "acceptedAnswer": {"@type": "Answer", "text": "Relative humidity (RH) is the percentage of water vapor present in the air compared to the maximum amount the air could hold at that temperature. 100% RH means the air is fully saturated and condensation begins."}}, {"@type": "Question", "name": "What is absolute humidity?", "acceptedAnswer": {"@type": "Answer", "text": "Absolute humidity is the actual mass of water vapor per unit volume of air, typically measured in grams per cubic meter (g/m³). Unlike relative humidity, it does not change with temperature."}}, {"@type": "Question", "name": "What is the dew point?", "acceptedAnswer": {"@type": "Answer", "text": "The dew point is the temperature at which air becomes saturated and water vapor begins to condense into dew or fog. A higher dew point means more moisture in the air and a muggier feel."}}, {"@type": "Question", "name": "How is dew point calculated?", "acceptedAnswer": {"@type": "Answer", "text": "This calculator uses the Magnus formula, an empirically derived approximation that is accurate to within 0.4°C for temperatures between -40°C and 50°C. It relates saturation vapor pressure to temperature."}}]}</script>

<script>
GZI18n.register({
  en: {
    toolTitle: 'Humidity Calculator',
    toolDesc: 'Calculate dew point, absolute humidity, vapor pressure and more from temperature and relative humidity. Uses the Magnus formula for accuracy.',
    temp: 'Air Temperature',
    rh: 'Relative Humidity (%)',
    unit: 'Temperature Unit',
    dewPoint: 'Dew Point',
    absoluteHumidity: 'Absolute Humidity',
    vaporPressure: 'Vapor Pressure',
    saturationPressure: 'Saturation Vapor Pressure',
    mixingRatio: 'Mixing Ratio',
    comfort: 'Comfort Level',
    dry: 'Dry — may need humidification',
    comfortable: 'Comfortable',
    humid: 'Humid — may feel muggy',
    veryHumid: 'Very humid — oppressive',
    step1: 'Enter the current air temperature',
    step2: 'Enter the relative humidity percentage',
    step3: 'Choose Celsius or Fahrenheit',
    step4: 'Review dew point, absolute humidity and comfort rating',
  },
  zh: {
    toolTitle: '湿度计算器',
    toolDesc: '根据温度和相对湿度计算露点、绝对湿度、蒸汽压等。使用 Magnus 公式保证精度。',
    temp: '空气温度',
    rh: '相对湿度 (%)',
    unit: '温度单位',
    dewPoint: '露点',
    absoluteHumidity: '绝对湿度',
    vaporPressure: '蒸汽压',
    saturationPressure: '饱和蒸汽压',
    mixingRatio: '混合比',
    comfort: '舒适度',
    dry: '干燥 — 可能需要加湿',
    comfortable: '舒适',
    humid: '潮湿 — 可能感到闷热',
    veryHumid: '非常潮湿 — 闷热难耐',
    step1: '输入当前空气温度',
    step2: '输入相对湿度百分比',
    step3: '选择摄氏或华氏',
    step4: '查看露点、绝对湿度和舒适度评级',
  }
});

const { $, t } = GZ;

// Magnus formula coefficients
function saturationVaporPressure(T) {
  // T in Celsius, returns hPa
  const a = 17.625, b = 243.04;
  return 6.1094 * Math.exp((a * T) / (b + T));
}

function calc() {
  let tempC = parseFloat($('#temp').value);
  const rh = parseFloat($('#rh').value);
  const unit = $('#unit').value;
  if (isNaN(tempC) || isNaN(rh)) { $('#result').innerHTML = ''; return; }
  if (unit === 'imperial') tempC = (tempC - 32) * 5 / 9;

  const es = saturationVaporPressure(tempC); // saturation vapor pressure hPa
  const e = es * rh / 100; // actual vapor pressure hPa
  // Dew point via Magnus
  const a = 17.625, b = 243.04;
  const gamma = Math.log(e / 6.1094);
  const dewC = (b * gamma) / (a - gamma);
  // Absolute humidity g/m³
  const absHum = (e * 100) / (461.5 * (tempC + 273.15));
  // Mixing ratio g/kg
  const mixingRatio = 622 * e / (1013.25 - e);
  // Display temps
  const tempDisp = (val) => unit === 'imperial' ? (val * 9/5 + 32).toFixed(1) + ' °F' : val.toFixed(1) + ' °C';

  let comfort;
  if (dewC < 10) comfort = t('dry');
  else if (dewC < 16) comfort = t('comfortable');
  else if (dewC < 21) comfort = t('humid');
  else comfort = t('veryHumid');

  $('#result').innerHTML = `
    <div class="hum-card"><span class="lbl">${t('dewPoint')}</span><span class="val">${tempDisp(dewC)}</span></div>
    <div class="hum-card"><span class="lbl">${t('absoluteHumidity')}</span><span class="val">${absHum.toFixed(1)} g/m³</span></div>
    <div class="hum-card"><span class="lbl">${t('vaporPressure')}</span><span class="val">${e.toFixed(1)} hPa</span></div>
    <div class="hum-card"><span class="lbl">${t('saturationPressure')}</span><span class="val">${es.toFixed(1)} hPa</span></div>
    <div class="hum-card"><span class="lbl">${t('mixingRatio')}</span><span class="val">${mixingRatio.toFixed(1)} g/kg</span></div>
    <div class="hum-card" style="grid-column:1/-1"><span class="lbl">${t('comfort')}</span><span class="val" style="font-size:1.2rem">${comfort}</span></div>
  `;
}

['temp','rh','unit'].forEach(id => $('#' + id).addEventListener('input', calc));

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🌡️', href:'/calc/heat-index-calculator.html', name:'Heat Index'},
    {icon:'❄️', href:'/calc/wind-chill.html', name:'Wind Chill'},
    {icon:'💧', href:'/calc/dew-point-calculator.html', name:'Dew Point'},
    {icon:'⚡', href:'/calc/lightning-distance-calculator.html', name:'Lightning Distance'},
  ]
});
calc();
</script>
