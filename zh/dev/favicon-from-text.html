<script>
GZI18n.register({
  en: {
    toolTitle: 'Favicon From Text',
    toolDesc: 'Generate a beautiful favicon from any text, letter or emoji. Customize font, colors, shape and corner radius, preview at all sizes, and download as PNG, ICO or SVG — 100% in your browser.',
    lblText: 'Text / Emoji',
    lblFont: 'Font family',
    lblWeight: 'Font weight',
    lblShape: 'Background shape',
    lblBg: 'Background color',
    lblFg: 'Text color',
    lblRadius: 'Corner radius',
    lblRotation: 'Rotation',
    step1: 'Type 1-3 characters or paste an emoji',
    step2: 'Pick a font, color, shape and corner radius',
    step3: 'Preview at sizes 16, 32, 48, 64, 128, 192, 256, 512',
    step4: 'Click Download to get PNG, ICO or SVG',
  },
  zh: {
    toolTitle: '文字 Favicon 生成器',
    toolDesc: '从任意文字、字母或 Emoji 生成漂亮的网站图标。可自定义字体、颜色、形状和圆角，跨尺寸预览，导出为 PNG、ICO 或 SVG — 100% 浏览器本地运行。',
    lblText: '文字 / Emoji',
    lblFont: '字体',
    lblWeight: '字重',
    lblShape: '背景形状',
    lblBg: '背景色',
    lblFg: '文字颜色',
    lblRadius: '圆角',
    lblRotation: '旋转',
    step1: '输入 1-3 个字符或粘贴一个 Emoji',
    step2: '选择字体、颜色、形状和圆角',
    step3: '在 16、32、48、64、128、192、256、512 尺寸预览',
    step4: '点击下载获取 PNG、ICO 或 SVG',
  }
});

const { $, t } = GZ;
$('#lbl-text').textContent = t('lblText');
$('#lbl-font').textContent = t('lblFont');
$('#lbl-weight').textContent = t('lblWeight');
$('#lbl-shape').textContent = t('lblShape');
$('#lbl-bg').textContent = t('lblBg');
$('#lbl-fg').textContent = t('lblFg');
$('#lbl-radius').textContent = t('lblRadius');
$('#lbl-rotation').textContent = t('lblRotation');

function drawOn(canvas, size) {
  const ctx = canvas.getContext('2d');
  const text = $('#text').value || 'G';
  const font = $('#font').value;
  const weight = $('#weight').value;
  const shape = $('#shape').value;
  const bg = $('#bg').value;
  const fg = $('#fg').value;
  const radius = parseInt($('#radius').value);
  const rotation = parseInt($('#rotation').value) * Math.PI / 180;

  ctx.clearRect(0, 0, size, size);
  // Background
  if (shape !== 'none') {
    ctx.fillStyle = bg;
    if (shape === 'circle') {
      ctx.beginPath();
      ctx.arc(size/2, size/2, size/2, 0, Math.PI * 2);
      ctx.fill();
    } else if (shape === 'hex') {
      ctx.beginPath();
      for (let i = 0; i < 6; i++) {
        const a = Math.PI/6 + i * Math.PI/3;
        const x = size/2 + Math.cos(a) * size/2 * 0.95;
        const y = size/2 + Math.sin(a) * size/2 * 0.95;
        if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
      }
      ctx.closePath();
      ctx.fill();
    } else if (shape === 'rounded' || shape === 'square') {
      const r = shape === 'rounded' ? Math.min(radius, 50) / 100 * size * 0.4 : 0;
      ctx.beginPath();
      ctx.moveTo(r, 0);
      ctx.lineTo(size - r, 0);
      ctx.quadraticCurveTo(size, 0, size, r);
      ctx.lineTo(size, size - r);
      ctx.quadraticCurveTo(size, size, size - r, size);
      ctx.lineTo(r, size);
      ctx.quadraticCurveTo(0, size, 0, size - r);
      ctx.lineTo(0, r);
      ctx.quadraticCurveTo(0, 0, r, 0);
      ctx.closePath();
      ctx.fill();
    }
  }

  // Text
  ctx.save();
  ctx.translate(size/2, size/2);
  ctx.rotate(rotation);
  ctx.fillStyle = fg;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  const fontSize = Math.max(8, size * 0.6);
  ctx.font = `${weight} ${fontSize}px ${font}`;
  ctx.fillText(text, 0, 0);
  ctx.restore();
}

function render() {
  drawOn($('#big'), 512);
  document.querySelectorAll('#sizes canvas').forEach(c => drawOn(c, parseInt(c.width)));
  $('#bgTxt').value = $('#bg').value;
  $('#fgTxt').value = $('#fg').value;
}

['#text','#font','#weight','#shape','#bg','#fg','#radius','#rotation'].forEach(s => {
  $(s).addEventListener('input', render);
  $(s).addEventListener('change', render);
});
$('#bgTxt').addEventListener('change', () => { $('#bg').value = $('#bgTxt').value; render(); });
$('#fgTxt').addEventListener('change', () => { $('#fg').value = $('#fgTxt').value; render(); });

function downloadBlob(blob, name) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = name;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(() => URL.revokeObjectURL(a.href), 2000);
}

$('#dl-png').onclick = () => {
  $('#big').toBlob(b => downloadBlob(b, 'favicon-512.png'), 'image/png');
};
$('#dl-ico').onclick = () => {
  // Build a 32x32 PNG-encoded ICO
  const c = document.createElement('canvas');
  c.width = 32; c.height = 32;
  drawOn(c, 32);
  c.toBlob(async (pngBlob) => {
    const pngBuf = await pngBlob.arrayBuffer();
    const ico = new Uint8Array(6 + 16 + pngBuf.byteLength);
    const dv = new DataView(ico.buffer);
    dv.setUint16(0, 0, true); dv.setUint16(2, 1, true); dv.setUint16(4, 1, true);
    dv.setUint8(6, 32); dv.setUint8(7, 32); dv.setUint8(8, 0); dv.setUint8(9, 0);
    dv.setUint16(10, 1, true); dv.setUint16(12, 32, true);
    dv.setUint32(14, pngBuf.byteLength, true);
    dv.setUint32(18, 22, true);
    ico.set(new Uint8Array(pngBuf), 22);
    downloadBlob(new Blob([ico], { type: 'image/x-icon' }), 'favicon.ico');
  }, 'image/png');
};
$('#dl-svg').onclick = () => {
  const text = $('#text').value || 'G';
  const font = $('#font').value;
  const weight = $('#weight').value;
  const shape = $('#shape').value;
  const bg = $('#bg').value;
  const fg = $('#fg').value;
  const radius = parseInt($('#radius').value);
  const rotation = parseInt($('#rotation').value);

  let bgShape = '';
  if (shape === 'circle') bgShape = `<circle cx="256" cy="256" r="256" fill="${bg}"/>`;
  else if (shape === 'square') bgShape = `<rect width="512" height="512" fill="${bg}"/>`;
  else if (shape === 'rounded') bgShape = `<rect width="512" height="512" rx="${Math.min(radius*2, 200)}" ry="${Math.min(radius*2, 200)}" fill="${bg}"/>`;
  else if (shape === 'hex') {
    const pts = [];
    for (let i = 0; i < 6; i++) {
      const a = Math.PI/6 + i * Math.PI/3;
      pts.push(`${256 + Math.cos(a) * 243},${256 + Math.sin(a) * 243}`);
    }
    bgShape = `<polygon points="${pts.join(' ')}" fill="${bg}"/>`;
  }
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  ${bgShape}
  <text x="256" y="256" font-family="${font}" font-size="320" font-weight="${weight}" fill="${fg}" text-anchor="middle" dominant-baseline="central" transform="rotate(${rotation} 256 256)">${text.replace(/[<>&"']/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;',"'":'&apos;'}[c]))}</text>
</svg>`;
  downloadBlob(new Blob([svg], { type: 'image/svg+xml' }), 'favicon.svg');
};

render();

GZ.renderToolPage({

  titleKey: 'toolTitle',
  descKey: 'toolDesc',

    {href:'/image/placeholder-image.html',icon:'🖼️',name:'Placeholder Image'},
  ]
});
</script>
