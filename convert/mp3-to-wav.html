const { $, t } = GZ;
let audioBuffer = null;
let fileName = 'audio';

$('#drop').addEventListener('click', () => $('#file').click());
$('#drop').addEventListener('dragover', e => { e.preventDefault(); $('#drop').classList.add('drag'); });
$('#drop').addEventListener('dragleave', () => $('#drop').classList.remove('drag'));
$('#drop').addEventListener('drop', e => {
  e.preventDefault();
  $('#drop').classList.remove('drag');
  if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
});
$('#file').addEventListener('change', e => { if (e.target.files[0]) handleFile(e.target.files[0]); });

function handleFile(file) {
  if (!file.type.includes('audio') && !file.name.toLowerCase().endsWith('.mp3')) {
    $('#status').innerHTML = `<span style="color:var(--gz-accent)">${t('noFile')}</span>`;
    return;
  }
  fileName = file.name.replace(/\.[^.]+$/, '');
  const url = URL.createObjectURL(file);
  $('#player').src = url;
  $('#player').style.display = 'block';
  $('#drop-text').textContent = file.name + ' (' + (file.size / 1024 / 1024).toFixed(2) + ' MB)';
  $('#controls').style.display = 'flex';
  const reader = new FileReader();
  reader.onload = async e => {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      audioBuffer = await ctx.decodeAudioData(e.target.buffer.slice(0));
      const dur = audioBuffer.duration;
      const m = Math.floor(dur / 60);
      const s = Math.floor(dur % 60).toString().padStart(2, '0');
      $('#stats').innerHTML = `<span>${t('duration')}: ${m}:${s}</span><span>${t('channels')}: ${audioBuffer.numberOfChannels}</span><span>${t('loaded')}: ✓</span>`;
    } catch (err) {
      $('#status').innerHTML = `<span style="color:var(--gz-accent)">Decode error: ${err.message}</span>`;
    }
  };
  reader.readAsArrayBuffer(file);
}

function audioBufferToWav(buffer, targetRate) {
  const numChannels = buffer.numberOfChannels;
  const sampleRate = targetRate || buffer.sampleRate;
  const numFrames = Math.round(buffer.duration * sampleRate);
  const bytesPerSample = 2;
  const blockAlign = numChannels * bytesPerSample;
  const byteRate = sampleRate * blockAlign;
  const dataSize = numFrames * blockAlign;
  const bufferSize = 44 + dataSize;
  const ab = new ArrayBuffer(bufferSize);
  const view = new DataView(ab);
  const writeStr = (off, s) => { for (let i = 0; i < s.length; i++) view.setUint8(off + i, s.charCodeAt(i)); };
  writeStr(0, 'RIFF'); view.setUint32(4, 36 + dataSize, true);
  writeStr(8, 'WAVE'); writeStr(12, 'fmt ');
  view.setUint32(16, 16, true); view.setUint16(20, 1, true);
  view.setUint16(22, numChannels, true); view.setUint32(24, sampleRate, true);
  view.setUint32(28, byteRate, true); view.setUint16(32, blockAlign, true);
  view.setUint16(34, 16, true); writeStr(36, 'data'); view.setUint32(40, dataSize, true);
  // Resample if needed
  const channels = [];
  for (let ch = 0; ch < numChannels; ch++) {
    const src = buffer.getChannelData(ch);
    if (sampleRate === buffer.sampleRate) {
      channels.push(src);
    } else {
      const out = new Float32Array(numFrames);
      const ratio = buffer.sampleRate / sampleRate;
      for (let i = 0; i < numFrames; i++) {
        const pos = i * ratio;
        const i0 = Math.floor(pos), i1 = Math.min(i0 + 1, src.length - 1);
        const frac = pos - i0;
        out[i] = src[i0] * (1 - frac) + src[i1] * frac;
      }
      channels.push(out);
    }
  }
  let offset = 44;
  for (let i = 0; i < numFrames; i++) {
    for (let ch = 0; ch < numChannels; ch++) {
      let s = Math.max(-1, Math.min(1, channels[ch][i]));
      view.setInt16(offset, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
      offset += 2;
    }
  }
  return new Blob([ab], { type: 'audio/wav' });
}

function convert() {
  if (!audioBuffer) { $('#status').innerHTML = `<span style="color:var(--gz-accent)">${t('noFile')}</span>`; return; }
  $('#status').innerHTML = `<span style="color:var(--text2)">${t('converting')}</span>`;
  setTimeout(() => {
    try {
      const rate = +$('#sample-rate').value;
      const blob = audioBufferToWav(audioBuffer, rate);
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = fileName + '.wav';
      document.body.appendChild(a); a.click(); a.remove();
      setTimeout(() => URL.revokeObjectURL(url), 1000);
      $('#status').innerHTML = `<span style="color:var(--gz-success)">${t('done')} (${(blob.size / 1024 / 1024).toFixed(2)} MB)</span>`;
    } catch (err) {
      $('#status').innerHTML = `<span style="color:var(--gz-accent)">Error: ${err.message}</span>`;
    }
  }, 50);
}

function reset() {
  audioBuffer = null;
  $('#file').value = '';
  $('#player').src = '';
  $('#player').style.display = 'none';
  $('#controls').style.display = 'none';
  $('#stats').innerHTML = '';
  $('#status').innerHTML = '';
  $('#drop-text').textContent = t('dropText');
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="convert()">${t('convert')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="reset()">${t('clear')}</button>`;

$('#controls').innerHTML = `

    <option value="8000">8000 Hz</option>
    <option value="16000">16000 Hz</option>

    <option value="44100" selected>44100 Hz (CD)</option>
    <option value="48000">48000 Hz</option>

$('#drop-text').textContent = t('dropText');
