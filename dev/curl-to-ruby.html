const { $, copyText, t } = GZ;
let target = 'nethttp';

/* ---- shared curl parser ---- */
function tokenizeCurl(input){
  const raw = input.replace(/^\s*curl\s+/i,'').replace(/\\\n/g,' ').replace(/\\\r\n/g,' ').trim();
  const tokens=[]; let cur=''; let q=null;
  for(let i=0;i<raw.length;i++){
    const c=raw[i];
    if(q){ if(c===q){q=null;continue;} cur+=c; }
    else if(c==='"'||c==="'"){q=c;}
    else if(c===' '||c==='\t'||c==='\n'||c==='\r'){ if(cur){tokens.push(cur);cur='';} }
    else {cur+=c;}
  }
  if(cur)tokens.push(cur);
  return tokens;
}
function parseCurl(input){
  const r={url:'',method:null,headers:{},data:null,cookies:null,user:null,insecure:false,location:false};
  const toks=tokenizeCurl(input);
  for(let i=0;i<toks.length;i++){
    const a=toks[i];
    const next=()=>toks[++i];
    if(a==='-X'||a==='--request'){r.method=next();continue;}
    if(a==='-H'||a==='--header'){const h=next();const idx=h.indexOf(':');if(idx>-1){r.headers[h.slice(0,idx).trim()]=h.slice(idx+1).trim();}continue;}
    if(a==='-d'||a==='--data'||a==='--data-raw'||a==='--data-binary'||a==='--data-ascii'){r.data=next();continue;}
    if(a==='--data-urlencode'){r.data=(r.data?r.data+'&':'')+next();continue;}
    if(a==='-b'||a==='--cookie'){r.cookies=next();continue;}
    if(a==='-u'||a==='--user'){r.user=next();continue;}
    if(a==='-A'||a==='--user-agent'){r.headers['User-Agent']=next();continue;}
    if(a==='-e'||a==='--referer'){r.headers['Referer']=next();continue;}
    if(a==='-L'||a==='--location'){r.location=true;continue;}
    if(a==='-k'||a==='--insecure'){r.insecure=true;continue;}
    if(a==='-I'||a==='--head'){r.method='HEAD';continue;}
    if(a==='--url'){r.url=next();continue;}
    if(a.startsWith('-')){ continue; }
    if(!r.url && (a.startsWith('http://')||a.startsWith('https://')||a.startsWith('www.')||a.startsWith('$'))){r.url=a.replace(/^\$/,'');continue;}
    if(!r.url && /^[a-z0-9.-]+\.[a-z]{2,}/i.test(a)){r.url='https://'+a;continue;}
    if(!r.url){r.url=a;}
  }
  return r;
}

/* Ruby string literal - prefer single quotes, escape only backslash and single quote */
function rbStr(s){
  s = String(s);
  if(/[#\\]/.test(s)){
    /* use double quotes, escape */
    return '"' + s.replace(/\\/g,'\\\\').replace(/"/g,'\\"').replace(/#\{/g,'\\#{') + '"';
  }
  return "'" + s.replace(/\\/g,'\\\\').replace(/'/g,"\\'") + "'";
}

function parseRubyUrl(url){
  try{
    const u = new URL(url);
    return {
      scheme: u.protocol.replace(':',''),
      host: u.host,
      port: u.port || (u.protocol==='https:'?'443':'80'),
      path: u.pathname || '/',
      use_ssl: u.protocol==='https:'
    };
  }catch(e){
    return {scheme:'https',host:'api.example.com',port:'443',path:'/',use_ssl:true};
  }
}

function genNetHttp(c){
  const method = (c.method || (c.data !== null ? 'POST' : 'GET')).toUpperCase();
  const url = c.url || 'https://api.example.com/endpoint';
  const headers = {...c.headers};
  if(c.cookies && !headers['Cookie']) headers['Cookie'] = c.cookies;
  const parts = parseRubyUrl(url);

  const L = [];
  L.push('require \'net/http\'');
  if(parts.use_ssl) L.push('require \'uri\'');
  if(c.data !== null){
    /* detect json */
    try { JSON.parse(c.data); if(!headers['Content-Type'] && !headers['content-type']) headers['Content-Type']='application/json'; } catch(e){}
  }
  L.push('');
  L.push('uri = URI.parse(' + rbStr(url) + ')');
  L.push('http = Net::HTTP.new(uri.host, uri.port)');
  if(parts.use_ssl){
    L.push('http.use_ssl = true');
    if(c.insecure) L.push('http.verify_mode = OpenSSL::SSL::VERIFY_NONE');
  }
  L.push('');
  L.push('request = Net::HTTP::' + method.charAt(0) + method.slice(1).toLowerCase() + '.new(uri)');
  if(Object.keys(headers).length){
    for(const k of Object.keys(headers)){
      L.push('request[' + rbStr(k) + '] = ' + rbStr(headers[k]));
    }
  }
  if(c.user){
    const up = c.user.split(':');
    L.push('request.basic_auth(' + rbStr(up[0]||'') + ', ' + rbStr(up.slice(1).join(':')||'') + ')');
  }
  if(c.data !== null){
    L.push('request.body = ' + rbStr(c.data));
  }
  L.push('');
  L.push('response = http.request(request)');
  L.push('puts response.code');
  L.push('puts response.body');
  return L.join('\n');
}

function genHttparty(c){
  const method = (c.method || (c.data !== null ? 'post' : 'get')).toLowerCase();
  const url = c.url || 'https://api.example.com/endpoint';
  const headers = {...c.headers};
  if(c.cookies && !headers['Cookie']) headers['Cookie'] = c.cookies;

  let isJson = false;
  if(c.data !== null){
    try { JSON.parse(c.data); isJson = true; if(!headers['Content-Type'] && !headers['content-type']) headers['Content-Type']='application/json'; } catch(e){}
  }

  const L = [];
  L.push('require \'httparty\'');
  L.push('');
  L.push('headers = {');
  for(const k of Object.keys(headers)){
    L.push('  ' + rbStr(k) + ' => ' + rbStr(headers[k]) + ',');
  }
  L.push('}');
  L.push('');

  const opts = [];
  if(c.user){
    const up = c.user.split(':');
    opts.push('  :basic_auth => { :username => ' + rbStr(up[0]||'') + ', :password => ' + rbStr(up.slice(1).join(':')||'') + ' },');
  }
  if(c.data !== null){
    if(isJson){
      opts.push('  :body => ' + rbStr(c.data) + ',');
    } else {
      opts.push('  :body => ' + rbStr(c.data) + ',');
    }
  }

  L.push('response = HTTParty.' + method + '(' + rbStr(url) + ', {');
  L.push('  :headers => headers,');
  L.push(...opts);
  L.push('})');
  L.push('');
  L.push('puts response.code');
  L.push('puts response.body');
  return L.join('\n');
}

function convert(){
  const inp = $('#input').value.trim();
  if(!inp){$('#output').textContent='';$('#status').innerHTML='';return;}
  let c;
  try{ c = parseCurl(inp); }catch(e){ $('#output').textContent='';$('#status').innerHTML='<span style="color:var(--gz-accent)">⚠ '+e.message+'</span>'; return; }
  let code='';
  if(target==='nethttp') code=genNetHttp(c);
  else code=genHttparty(c);
  $('#output').textContent = code;
  const parts=[];
  if(c.method)parts.push(c.method);
  if(c.user)parts.push('🔐 Basic Auth');
  if(c.data!==null)parts.push('📦 body');
  if(Object.keys(c.headers).length)parts.push(Object.keys(c.headers).length+' header(s)');
  $('#status').innerHTML='<span style="color:var(--gz-success)">✓ '+t('lblOut')+(parts.length?' — '+parts.join(' · '):'')+'</span>';
}
window.convert=convert;

  -d '{"name":"Alice","email":"alice@example.com","role":"admin"}' \\
  --compressed`;
  convert();
}

  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
