<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"What is a CSS particle background?","acceptedAnswer":{"@type":"Answer","text":"A CSS particle background creates floating dots that drift across the screen using absolutely positioned divs animated with @keyframes. It adds visual depth without JavaScript libraries like particles.js."}},{"@type":"Question","name":"Does this need JavaScript?","acceptedAnswer":{"@type":"Answer","text":"No. The animation is pure CSS using @keyframes. A small inline JavaScript helper generates the random positions, but you can also hardcode the particles for a fully CSS-only version."}},{"@type":"Question","name":"Will this affect my page performance?","acceptedAnswer":{"@type":"Answer","text":"CSS animations run on the GPU and are very performant. For best results, keep the particle count under 50 and use transform-based animations (translate, scale) rather than top/left changes."}},{"@type":"Question","name":"Can I use this as a hero section background?","acceptedAnswer":{"@type":"Answer","text":"Yes. The particle container uses position:absolute to fill its parent. Place it inside a hero section with position:relative and the particles will float behind your content."}}]}</script>

<script>
GZI18n.register({
  en: {
    toolTitle: 'CSS Particle Background Generator',
    toolDesc: 'Generate an animated CSS particle background with floating dots. Customize count, size, color and speed — get clean CSS + HTML.',
    particleCount: 'Particle Count',
    speed: 'Float Speed (seconds)',
    minSize: 'Min Size (px)',
    maxSize: 'Max Size (px)',
    particleColor: 'Particle Color',
    bgColor: 'Background Color',
    opacity: 'Max Opacity',
    step1: 'Set the number of particles',
    step2: 'Choose particle and background colors',
    step3: 'Adjust size range and float speed',
    step4: 'Copy the CSS and HTML to your project',
  },
  zh: {
    toolTitle: 'CSS 粒子背景生成器',
    toolDesc: '生成动画 CSS 粒子背景，浮动的小圆点。自定义数量、大小、颜色和速度 — 获取干净的 CSS + HTML。',
    particleCount: '粒子数量',
    speed: '浮动速度（秒）',
    minSize: '最小尺寸（px）',
    maxSize: '最大尺寸（px）',
    particleColor: '粒子颜色',
    bgColor: '背景颜色',
    opacity: '最大透明度',
    step1: '设置粒子数量',
    step2: '选择粒子和背景颜色',
    step3: '调整尺寸范围和浮动速度',
    step4: '复制 CSS 和 HTML 到你的项目',
  }
});

const { $, copyText, t } = GZ;

function generate() {
  var count = parseInt($('#opt-count').value) || 25;
  var speed = parseInt($('#opt-speed').value) || 8;
  var minSize = parseInt($('#opt-minsize').value) || 3;
  var maxSize = parseInt($('#opt-maxsize').value) || 10;
  var pColor = $('#opt-pcolor').value || '#4ecdc4';
  var bgColor = $('#opt-bgcolor').value || '#0a0a1a';
  var maxOpacity = parseFloat($('#opt-opacity').value) || 0.8;

  // Update preview
  var previewHTML = [];
  for (var i = 0; i < count; i++) {
    var left = Math.random() * 100;
    var top = Math.random() * 100;
    var size = minSize + Math.random() * (maxSize - minSize);
    var delay = Math.random() * speed;
    var dur = speed + Math.random() * 4;
    var drift = (Math.random() * 60 - 30).toFixed(0);
    var op = (0.2 + Math.random() * (maxOpacity - 0.2)).toFixed(2);
    previewHTML.push('<span class="gz-particle-demo" style="left:' + left + '%;top:' + top + '%;width:' + size.toFixed(0) + 'px;height:' + size.toFixed(0) + 'px;background:' + pColor + ';opacity:' + op + ';animation-delay:' + delay.toFixed(2) + 's;animation-duration:' + dur.toFixed(1) + 's;--drift:' + drift + 'px"></span>');
  }
  // Override animation with drift support
  var oldStyle = document.getElementById('gz-particle-style');
  if (oldStyle) oldStyle.remove();
  var styleEl = document.createElement('style');
  styleEl.id = 'gz-particle-style';
  styleEl.textContent = '@keyframes gz-float-dyn { 0%,100% { transform: translateY(0) translateX(0); } 50% { transform: translateY(-80px) translateX(var(--drift,20px)); } } .gz-particle-demo { animation-name: gz-float-dyn !important; }';
  document.head.appendChild(styleEl);
  $('#preview-box').style.background = bgColor;
  $('#preview-box').innerHTML = '<div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#fff;font-size:1.3rem;font-weight:bold;z-index:0;text-shadow:0 2px 10px rgba(0,0,0,0.5)">✨ Particle BG</div>' + previewHTML.join('');

  // Generate code
  var lines = [];
  lines.push('<!-- HTML -->');
  lines.push('<div class="particles-bg">');
  for (var i = 0; i < count; i++) {
    var left = (Math.random() * 100).toFixed(1);
    var top = (Math.random() * 100).toFixed(1);
    var size = Math.round(minSize + Math.random() * (maxSize - minSize));
    var delay = (Math.random() * speed).toFixed(2);
    var dur = (speed + Math.random() * 4).toFixed(1);
    var drift = Math.round(Math.random() * 60 - 30);
    var op = (0.2 + Math.random() * (maxOpacity - 0.2)).toFixed(2);
    lines.push('  <span class="particle" style="left:' + left + '%;top:' + top + '%;width:' + size + 'px;height:' + size + 'px;animation-delay:' + delay + 's;animation-duration:' + dur + 's;--drift:' + drift + 'px;opacity:' + op + '"></span>');
  }
  lines.push('</div>');
  lines.push('');
  lines.push('/* CSS */');
  lines.push('.particles-bg {');
  lines.push('  position: absolute;');
  lines.push('  top: 0; left: 0; width: 100%; height: 100%;');
  lines.push('  background: ' + bgColor + ';');
  lines.push('  overflow: hidden;');
  lines.push('  pointer-events: none;');
  lines.push('}');
  lines.push('');
  lines.push('.particle {');
  lines.push('  position: absolute;');
  lines.push('  border-radius: 50%;');
  lines.push('  background: ' + pColor + ';');
  lines.push('  animation: float ' + speed + 's ease-in-out infinite;');
  lines.push('}');
  lines.push('');
  lines.push('@keyframes float {');
  lines.push('  0%, 100% { transform: translateY(0) translateX(0); opacity: 0.3; }');
  lines.push('  50% { transform: translateY(-80px) translateX(var(--drift, 20px)); opacity: ' + maxOpacity + '; }');
  lines.push('}');

  $('#output').textContent = lines.join('\n');
}

$('#options').innerHTML = [
  '<div class="gz-opt">',
    '<label>' + t('particleCount') + '</label>',
    '<input type="number" id="opt-count" value="25" min="5" max="80">',
    '<label style="margin-top:8px">' + t('speed') + '</label>',
    '<input type="number" id="opt-speed" value="8" min="2" max="30">',
  '</div>',
  '<div class="gz-opt">',
    '<label>' + t('minSize') + '</label>',
    '<input type="number" id="opt-minsize" value="3" min="1" max="20">',
    '<label style="margin-top:8px">' + t('maxSize') + '</label>',
    '<input type="number" id="opt-maxsize" value="10" min="2" max="40">',
    '<label style="margin-top:8px">' + t('opacity') + '</label>',
    '<input type="number" id="opt-opacity" value="0.8" min="0.1" max="1" step="0.1">',
  '</div>',
  '<div class="gz-opt">',
    '<label>' + t('particleColor') + '</label>',
    '<input type="color" id="opt-pcolor" value="#4ecdc4">',
    '<label style="margin-top:8px">' + t('bgColor') + '</label>',
    '<input type="color" id="opt-bgcolor" value="#0a0a1a">',
  '</div>'
].join('\n');

$('#toolbar').innerHTML = [
  '<button class="gz-btn" onclick="generate()">' + t('generate') + '</button>',
  '<button class="gz-btn" onclick="copyText($(\'#output\').textContent)">' + t('copy') + '</button>'
].join('');

document.querySelectorAll('#options input').forEach(function(el) {
  el.addEventListener('input', generate);
  el.addEventListener('change', generate);
});

GZ.renderToolPage({
  category: 'css',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🎉', href:'/css-tools/css-confetti.html', name:'CSS Confetti'},
    {icon:'⌨️', href:'/css-tools/css-typewriter.html', name:'CSS Typewriter'},
    {icon:'🎲', href:'/css-tools/css-3d-cube.html', name:'3D Cube'},
    {icon:'✨', href:'/css-tools/animation.html', name:'CSS Animation'},
  ]
});

generate();
</script>
<script src="/tools-result-rec.js" defer></script>
