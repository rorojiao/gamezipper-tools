    step4: '所有数据保留在浏览器中 — 不上传任何内容',
    browserName: '浏览器',
    version: '版本',
    engine: '渲染引擎',
    os: '操作系统',
    platform: '平台',
    userAgent: 'User Agent',
    language: '语言',
    languages: '语言列表',
    screenRes: '屏幕分辨率',
    viewport: '视口大小',
    pixelRatio: '设备像素比',
    colorDepth: '色深',
    cpuCores: 'CPU 核心数（逻辑）',
    memory: '设备内存',
    touchSupport: '触控支持',
    onlineStatus: '在线状态',
    cookiesEnabled: 'Cookie 已启用',
    doNotTrack: '请勿追踪',
    timezone: '时区',
    features: '浏览器功能',
    detectionComplete: '✓ 检测完成',
  }
});

const { $, copyText, t } = GZ;

function detectBrowser() {
  const ua = navigator.userAgent;
  let name = 'Unknown', version = '', engine = 'Unknown';
  if (/Edg\//.test(ua)) { name = 'Microsoft Edge'; version = (ua.match(/Edg\/([\d.]+)/)||[])[1]||''; engine = 'Blink'; }
  else if (/OPR\//.test(ua) || /Opera/.test(ua)) { name = 'Opera'; version = (ua.match(/OPR\/([\d.]+)/)||ua.match(/Opera\/([\d.]+)/)||[])[1]||''; engine='Blink'; }
  else if (/Chrome\//.test(ua) && !/Chromium/.test(ua)) { name = 'Google Chrome'; version = (ua.match(/Chrome\/([\d.]+)/)||[])[1]||''; engine = 'Blink'; }
  else if (/Chromium\//.test(ua)) { name = 'Chromium'; version = (ua.match(/Chromium\/([\d.]+)/)||[])[1]||''; engine='Blink'; }
  else if (/Firefox\//.test(ua)) { name = 'Mozilla Firefox'; version = (ua.match(/Firefox\/([\d.]+)/)||[])[1]||''; engine = 'Gecko'; }
  else if (/Safari\//.test(ua) && !/Chrome/.test(ua)) { name = 'Safari'; version = (ua.match(/Version\/([\d.]+)/)||[])[1]||''; engine = 'WebKit'; }
  else if (/MSIE|Trident/.test(ua)) { name = 'Internet Explorer'; version = (ua.match(/(?:MSIE |rv:)([\d.]+)/)||[])[1]||''; engine='Trident'; }
  return { name, version, engine };
}

function detectOS() {
  const ua = navigator.userAgent;
  const p = navigator.platform || '';
  if (/Windows NT 10/.test(ua)) return 'Windows 10/11';
  if (/Windows NT 6\.3/.test(ua)) return 'Windows 8.1';
  if (/Windows NT 6\.2/.test(ua)) return 'Windows 8';
  if (/Windows NT 6\.1/.test(ua)) return 'Windows 7';
  if (/Windows/.test(ua)) return 'Windows';
  if (/iPhone|iPad|iPod/.test(ua) || /Macintosh/.test(ua) && /Mobile/.test(ua)) return (/iPad/.test(ua) ? 'iPadOS' : 'iOS');
  if (/Mac OS X/.test(ua)) return 'macOS ' + ((ua.match(/Mac OS X ([\d_]+)/)||[])[1]||'').replace(/_/g,'.');
  if (/Android/.test(ua)) return 'Android ' + ((ua.match(/Android ([\d.]+)/)||[])[1]||'');
  if (/Linux/.test(ua) || /X11/.test(ua)) return 'Linux';
  return p || 'Unknown';
}

function featureBadge(enabled, label) {
  return `<span class="feature-badge ${enabled ? 'feature-yes' : 'feature-no'}">${enabled ? '✓' : '✗'} ${label}</span>`;
}

function renderInfo() {
  const b = detectBrowser();
  const os = detectOS();
  const tz = Intl.DateTimeFormat().resolvedOptions().timeZone || 'Unknown';
  const lang = navigator.language || 'Unknown';
  const langs = (navigator.languages || [lang]).join(', ');
  const sr = `${screen.width} × ${screen.height}`;
  const vp = `${window.innerWidth} × ${window.innerHeight}`;
  const pr = (window.devicePixelRatio || 1).toString() + '×';
  const cd = screen.colorDepth + '-bit';
  const cores = navigator.hardwareConcurrency || 'Unknown';
  const mem = navigator.deviceMemory ? navigator.deviceMemory + ' GB' : 'Unknown';
  const touch = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
  const online = navigator.onLine;
  const cookies = navigator.cookieEnabled;
  const dnt = navigator.doNotTrack === '1' || navigator.doNotTrack === 'yes' || window.doNotTrack === '1';
  const ua = navigator.userAgent;

  const rows = [
    { label: t('browserName'), value: b.name },
    { label: t('version'), value: b.version || '—' },
    { label: t('engine'), value: b.engine },
    { label: t('os'), value: os },
    { label: t('platform'), value: navigator.platform || '—' },
    { label: t('language'), value: lang },
    { label: t('languages'), value: langs },
    { label: t('screenRes'), value: sr },
    { label: t('viewport'), value: vp },
    { label: t('pixelRatio'), value: pr },
    { label: t('colorDepth'), value: cd },
    { label: t('cpuCores'), value: cores },
    { label: t('memory'), value: mem },
    { label: t('touchSupport'), value: touch ? '✓ ' + (navigator.maxTouchPoints||1) + ' points' : '✗' },
    { label: t('onlineStatus'), value: online ? '🟢 Online' : '🔴 Offline' },
    { label: t('cookiesEnabled'), value: cookies ? '✓ Yes' : '✗ No' },
    { label: t('doNotTrack'), value: dnt ? '✓ Enabled' : '✗ Disabled' },
    { label: t('timezone'), value: tz },
    { label: t('userAgent'), value: ua },
  ];

  const features = [
    featureBadge(true, 'JavaScript'),
    featureBadge(cookies, 'Cookies'),
    featureBadge('serviceWorker' in navigator, 'Service Worker'),
    featureBadge('WebSocket' in window, 'WebSocket'),
    featureBadge(!!window.WebGLRenderingContext, 'WebGL'),
    featureBadge('WebAssembly' in window, 'WebAssembly'),
    featureBadge(!!navigator.geolocation, 'Geolocation'),
    featureBadge(!!navigator.mediaDevices, 'Media Devices'),
    featureBadge(touch, 'Touch'),
    featureBadge('Notification' in window, 'Notifications'),
    featureBadge(!!window.crypto && !!window.crypto.subtle, 'Web Crypto'),
    featureBadge('indexedDB' in window, 'IndexedDB'),
    featureBadge('share' in navigator, 'Web Share'),
    featureBadge(dnt, 'Do Not Track'),
  ];

  $('#browser-info').innerHTML = `
    <div class="info-grid">${rows.map(r => `
      <div class="info-card">
        <div class="label">${r.label}</div>
        <div class="value">${r.value}</div>
      </div>`).join('')}</div>
    <h3 style="margin:18px 0 6px;font-size:1.05em">${t('features')}</h3>
    <div>${features.join('')}</div>`;
  $('#status').innerHTML = `<span style="color:var(--gz-success);margin-top:12px;display:inline-block">${t('detectionComplete')}</span>`;

  return `${t('browserName')}: ${b.name} ${b.version}\n${t('engine')}: ${b.engine}\n${t('os')}: ${os}\n${t('platform')}: ${navigator.platform||'—'}\n${t('language')}: ${lang}\n${t('screenRes')}: ${sr}\n${t('viewport')}: ${vp}\n${t('pixelRatio')}: ${pr}\n${t('colorDepth')}: ${cd}\n${t('cpuCores')}: ${cores}\n${t('memory')}: ${mem}\n${t('touchSupport')}: ${touch}\n${t('onlineStatus')}: ${online}\n${t('cookiesEnabled')}: ${cookies}\n${t('doNotTrack')}: ${dnt}\n${t('timezone')}: ${tz}\n\n${t('userAgent')}:\n${ua}`;
}

let reportText = renderInfo();

window.addEventListener('resize', () => { reportText = renderInfo(); });

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="copyText(reportText)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="reportText=renderInfo()">${t('refresh')||'↻'}</button>`;
