<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"How do you calculate percent change?","acceptedAnswer":{"@type":"Answer","text":"To calculate percent change, subtract the original value from the new value, divide by the original value, then multiply by 100. The formula is: ((New Value - Old Value) / Old Value) × 100."}},{"@type":"Question","name":"What is the difference between percent increase and percent decrease?","acceptedAnswer":{"@type":"Answer","text":"Percent increase is when the new value is larger than the original (positive result), and percent decrease is when the new value is smaller (negative result). The same formula works for both — the sign of the result tells you which one."}},{"@type":"Question","name":"Why is my percent change so large when starting from a small number?","acceptedAnswer":{"@type":"Answer","text":"Percent change is relative to the original value. Going from 1 to 5 is a 400% increase even though the absolute difference is only 4. Small starting values produce large percentage changes, which is normal."}},{"@type":"Question","name":"Can percent change be over 100%?","acceptedAnswer":{"@type":"Answer","text":"Yes. Percent change can be any value. A 200% increase means the value tripled (new = old × 3). A -100% change means the value dropped to zero."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="field">
      <label id="lbl-old"></label>
      <input type="number" id="oldVal" step="any" oninput="recalc()">
    </div>
    <div class="field">
      <label id="lbl-new"></label>
      <input type="number" id="newVal" step="any" oninput="recalc()">
    </div>
    <div id="result"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Percent Change Calculator',
    toolDesc: 'Calculate the percentage increase or decrease between two values. Free, instant, no signup.',
    lblOld: 'Original value',
    lblNew: 'New value',
    result: 'Percent change',
    increase: 'Increase',
    decrease: 'Decrease',
    noChange: 'No change',
    absDiff: 'Absolute difference',
    newOverOld: 'New value as % of original',
    multiplier: 'Multiplier (× original)',
    formula: 'Formula: ((New - Original) / |Original|) × 100',
    clear: 'Clear',
    example: 'Example',
    step1: 'Enter the original (starting) value',
    step2: 'Enter the new (ending) value',
    step3: 'Read the percent change — green for increase, red for decrease',
    step4: 'See the absolute difference, ratio and multiplier too',
  },
  zh: {
    toolTitle: '百分比变化计算器',
    toolDesc: '计算两个数值之间的增减百分比。免费、即时、无需注册。',
    lblOld: '原值',
    lblNew: '新值',
    result: '百分比变化',
    increase: '增长',
    decrease: '减少',
    noChange: '无变化',
    absDiff: '绝对差值',
    newOverOld: '新值占原值的百分比',
    multiplier: '倍数（× 原值）',
    formula: '公式：((新值 - 原值) / |原值|) × 100',
    clear: '清除',
    example: '示例',
    step1: '输入原始（起始）数值',
    step2: '输入新的（结束）数值',
    step3: '查看百分比变化 — 绿色表示增长，红色表示减少',
    step4: '还可查看绝对差值、比值和倍数',
  }
});

const { $, t } = GZ;

function fmt(n) {
  if (!isFinite(n)) return '—';
  return n.toFixed(4).replace(/\.?0+$/, '');
}

function recalc() {
  const oldV = parseFloat($('#oldVal').value);
  const newV = parseFloat($('#newVal').value);
  const out = $('#result');
  if (isNaN(oldV) || isNaN(newV)) { out.innerHTML = ''; return; }
  if (oldV === 0) {
    out.innerHTML = `<div class="result-card"><div style="color:var(--gz-accent)">⚠ ${t('lblOld')} = 0</div></div>`;
    return;
  }
  const diff = newV - oldV;
  const pct = (diff / Math.abs(oldV)) * 100;
  const ratio = newV / oldV;
  const cls = pct > 0 ? 'result-up' : (pct < 0 ? 'result-down' : '');
  const label = pct > 0 ? t('increase') : (pct < 0 ? t('decrease') : t('noChange'));
  const sign = pct > 0 ? '+' : '';
  out.innerHTML = `
    <div class="result-card">
      <div style="color:var(--text2);font-size:.85em">${t('result')} · ${label}</div>
      <div class="result-big ${cls}">${sign}${fmt(pct)}%</div>
      <div class="result-row"><span>${t('absDiff')}</span><span>${fmt(diff)}</span></div>
      <div class="result-row"><span>${t('newOverOld')}</span><span>${fmt(ratio*100)}%</span></div>
      <div class="result-row"><span>${t('multiplier')}</span><span>×${fmt(ratio)}</span></div>
      <div class="formula">${t('formula')}</div>
    </div>`;
}

$('#toolbar').innerHTML = `
  <button class="gz-btn gz-btn-secondary" onclick="$('#oldVal').value='';$('#newVal').value='';recalc()">${t('clear')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>`;

function loadExample() {
  $('#oldVal').value = 80;
  $('#newVal').value = 100;
  recalc();
}

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'%', href:'/calc/percentage-calculator.html', name:'Percentage Calculator'},
    {icon:'🏷️', href:'/calc/percent-off-calculator.html', name:'Percent Off'},
    {icon:'📏', href:'/calc/percent-error-calculator.html', name:'Percent Error'},
    {icon:'📈', href:'/calc/compound-interest-calculator.html', name:'Compound Interest'},
  ]
});
</script>
