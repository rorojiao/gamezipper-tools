<script>
GZI18n.register({
  en: {
    toolTitle: 'Photo Filter Editor',
    toolDesc: 'Apply filters to your photos online. Adjust brightness, contrast, saturation, blur and more with live preview. Free, private \u2014 no upload.',
    upload: 'Upload Photo',
    download: 'Download',
    reset: 'Reset',
    empty: 'Click \u201cUpload Photo\u201d or drag an image here',
    brightness: 'Brightness',
    contrast: 'Contrast',
    saturate: 'Saturation',
    grayscale: 'Grayscale',
    sepia: 'Sepia',
    blur: 'Blur',
    hueRotate: 'Hue Rotate',
    invert: 'Invert',
    presetOriginal: 'Original',
    presetVintage: 'Vintage',
    presetBW: 'B&W',
    presetVivid: 'Vivid',
    presetCool: 'Cool',
    presetWarm: 'Warm',
    presetDreamy: 'Dreamy',
    presetNoir: 'Noir',

    step2: 'Pick a preset filter or adjust sliders manually',
    step3: 'See the filtered result update in real time',
    step4: 'Click Download to save the filtered image as PNG',
  },
  zh: {
    toolTitle: '\u7167\u7247\u6ee4\u955c\u7f16\u8f91\u5668',
    toolDesc: '\u5728\u7ebf\u4e3a\u7167\u7247\u5e94\u7528\u6ee4\u955c\u3002\u8c03\u6574\u4eae\u5ea6\u3001\u5bf9\u6bd4\u5ea6\u3001\u9971\u548c\u5ea6\u3001\u6a21\u7cca\u7b49\uff0c\u5b9e\u65f6\u9884\u89c8\u3002\u514d\u8d39\u3001\u79c1\u5bc6 \u2014 \u4e0d\u4e0a\u4f20\u3002',
    upload: '\u4e0a\u4f20\u7167\u7247',
    download: '\u4e0b\u8f7d',
    reset: '\u91cd\u7f6e',
    empty: '\u70b9\u51fb\u201c\u4e0a\u4f20\u7167\u7247\u201d\u6216\u5c06\u56fe\u7247\u62d6\u5165\u6b64\u5904',
    brightness: '\u4eae\u5ea6',
    contrast: '\u5bf9\u6bd4\u5ea6',
    saturate: '\u9971\u548c\u5ea6',
    grayscale: '\u7070\u5ea6',
    sepia: '\u68d5\u8910',
    blur: '\u6a21\u7cca',
    hueRotate: '\u8272\u76f8\u65cb\u8f6c',
    invert: '\u53cd\u8272',
    presetOriginal: '\u539f\u56fe',
    presetVintage: '\u590d\u53e4',
    presetBW: '\u9ed1\u767d',
    presetVivid: '\u9c9c\u8273',
    presetCool: '\u51b7\u8272',
    presetWarm: '\u6696\u8272',
    presetDreamy: '\u68a6\u5e7b',
    presetNoir: '\u9ed1\u8272\u7535\u5f71',
    step1: '\u70b9\u51fb\u201c\u4e0a\u4f20\u7167\u7247\u201d\u6216\u5c06\u56fe\u7247\u62d6\u5165\u753b\u5e03\u533a\u57df',
    step2: '\u9009\u62e9\u9884\u8bbe\u6ee4\u955c\u6216\u624b\u52a8\u8c03\u6574\u6ed1\u5757',
    step3: '\u5b9e\u65f6\u67e5\u770b\u6ee4\u955c\u6548\u679c',
    step4: '\u70b9\u51fb\u201c\u4e0b\u8f7d\u201d\u5c06\u6ee4\u955c\u540e\u7684\u56fe\u7247\u4fdd\u5b58\u4e3a PNG',
  }
});
const { $, t } = GZ;
const filters = [
  {key:'brightness',def:100,min:0,max:200,unit:'%'},
  {key:'contrast',def:100,min:0,max:200,unit:'%'},
  {key:'saturate',def:100,min:0,max:200,unit:'%'},
  {key:'grayscale',def:0,min:0,max:100,unit:'%'},
  {key:'sepia',def:0,min:0,max:100,unit:'%'},
  {key:'blur',def:0,min:0,max:20,unit:'px'},
  {key:'hueRotate',def:0,min:0,max:360,unit:'deg'},
  {key:'invert',def:0,min:0,max:100,unit:'%'},
];
const presets = {
  Original:{brightness:100,contrast:100,saturate:100,grayscale:0,sepia:0,blur:0,hueRotate:0,invert:0},
  Vintage:{brightness:110,contrast:90,saturate:80,grayscale:0,sepia:40,blur:0,hueRotate:0,invert:0},
  'B&W':{brightness:105,contrast:110,saturate:0,grayscale:100,sepia:0,blur:0,hueRotate:0,invert:0},
  Vivid:{brightness:105,contrast:120,saturate:150,grayscale:0,sepia:0,blur:0,hueRotate:0,invert:0},
  Cool:{brightness:100,contrast:105,saturate:110,grayscale:0,sepia:0,blur:0,hueRotate:200,invert:0},
  Warm:{brightness:105,contrast:105,saturate:120,grayscale:0,sepia:25,blur:0,hueRotate:0,invert:0},
  Dreamy:{brightness:115,contrast:90,saturate:120,grayscale:0,sepia:10,blur:1,hueRotate:0,invert:0},
  Noir:{brightness:95,contrast:140,saturate:0,grayscale:100,sepia:0,blur:0,hueRotate:0,invert:0},
};
const presetKeys = ['Original','Vintage','B&W','Vivid','Cool','Warm','Dreamy','Noir'];
const canvas = $('#canvas');
const ctx = canvas.getContext('2d');
let img = null;

function buildControls() {
  $('#controls').innerHTML = filters.map(f => `
    <label><span>${t(f.key)} <span class="v" id="v-${f.key}">${f.def}${f.unit}</span></span>
      <input type="range" id="r-${f.key}" min="${f.min}" max="${f.max}" value="${f.def}" oninput="onSlider('${f.key}','${f.unit}')">
    </label>`).join('');
}

function buildPresets() {
  const labels = {Original:'presetOriginal',Vintage:'presetVintage','B&W':'presetBW',Vivid:'presetVivid',Cool:'presetCool',Warm:'presetWarm',Dreamy:'presetDreamy',Noir:'presetNoir'};
  $('#presets').innerHTML = presetKeys.map(k => `<button onclick="applyPreset('${k}')">${t(labels[k])}</button>`).join('');
}

function onSlider(key, unit) {
  const v = $('#r-'+key).value;
  $('#v-'+key).textContent = v + unit;
  render();
}

function applyPreset(name) {
  const p = presets[name];
  filters.forEach(f => {
    $('#r-'+f.key).value = p[f.key];
    $('#v-'+f.key).textContent = p[f.key] + f.unit;
  });
  render();
}

function buildFilter() {
  return filters.map(f => {
    const v = $('#r-'+f.key).value;
    const fn = f.key==='hueRotate'?'hue-rotate':f.key;
    return `${fn}(${v}${f.unit})`;
  }).join(' ');
}

function render() {
  if (!img) return;
  ctx.filter = buildFilter();
  ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
}

function loadImage(file) {
  const reader = new FileReader();
  reader.onload = e => {
    img = new Image();
    img.onload = () => {
      const maxW = 1200;
      let w = img.width, h = img.height;
      if (w > maxW) { h = h * maxW / w; w = maxW; }
      canvas.width = w; canvas.height = h;
      canvas.style.display = 'block';
      $('#empty').style.display = 'none';
      render();
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

$('#fileinput').addEventListener('change', e => { if (e.target.files[0]) loadImage(e.target.files[0]); });
$('#stage').addEventListener('dragover', e => { e.preventDefault(); });
$('#stage').addEventListener('drop', e => { e.preventDefault(); if (e.dataTransfer.files[0]) loadImage(e.dataTransfer.files[0]); });

function doUpload() { $('#fileinput').click(); }
function doDownload() {
  if (!img) return;
  const a = document.createElement('a');
  a.download = 'filtered-photo.png';
  a.href = canvas.toDataURL('image/png');
  a.click();
}
function doReset() { applyPreset('Original'); }

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="doUpload()">${t('upload')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doDownload()">${t('download')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doReset()">${t('reset')}</button>`;
$('#empty').textContent = t('empty');
buildControls();
buildPresets();

GZ.renderToolPage({
  category: 'image',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'\ud83d\uddbc\ufe0f', href:'/image/image-resizer.html', name:'Image Resizer'},
    {icon:'\ud83d\udcf7', href:'/image/image-compressor.html', name:'Image Compressor'},
    {icon:'\u2728', href:'/image/before-after-image.html', name:'Before/After Slider'},
    {icon:'\ud83c\udfa8', href:'/image/color-picker.html', name:'Color Picker'},
  ]
});
</script>
