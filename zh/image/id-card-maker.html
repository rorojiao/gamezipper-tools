<script>
GZI18n.register({
  en: {
    toolTitle: 'ID Card Maker',
    toolDesc: 'Create free ID cards online — employee, student, member or event badges. Add a photo, name, role, ID number and expiry, pick a template, then download a print-ready PNG. No signup — runs entirely in your browser.',
    template: 'Template', company: 'Company / Org', name: 'Full Name', role: 'Role / Title',
    idNum: 'ID Number', expiry: 'Expiry Date', accentColor: 'Accent Color', photo: 'Photo (optional)',
    step1: 'Choose a template (Corporate, School, Event, Minimal or Dark)',
    step2: 'Fill in the organization, name, role, ID number and expiry date',
    step3: 'Upload a profile photo and pick an accent color',
    step4: 'Click Download PNG to save a print-ready CR80-size ID card',
  },
  zh: {
    toolTitle: 'ID 卡片制作器',
    toolDesc: '在线制作免费 ID 卡 — 员工、学生、会员或活动证件。添加照片、姓名、职位、ID 编号和有效期，选择模板，下载可打印的 PNG。无需注册 — 完全在浏览器中运行。',
    template: '模板', company: '公司 / 机构', name: '姓名', role: '职位 / 头衔',
    idNum: 'ID 编号', expiry: '有效期', accentColor: '强调色', photo: '照片（可选）',
    step1: '选择模板（企业、学校、活动、极简或深色）',
    step2: '填写机构、姓名、职位、ID 编号和有效期',
    step3: '上传头像照片并选择强调色',
    step4: '点击「下载 PNG」保存可打印的 CR80 尺寸 ID 卡',
  }
});

const { $, t } = GZ;
let currentTpl = 'corporate';
let photoDataUrl = null;

function setTpl(tpl) {
  currentTpl = tpl;
  document.querySelectorAll('.tpl-btn').forEach(b => b.classList.toggle('active', b.dataset.tpl === tpl));
  render();
}

function escapeHtml(s){ return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function render() {
  const card = $('#card');
  card.className = 'id-card t-' + currentTpl;
  card.style.setProperty('--ac1', $('#f-color').value);
  $('#c-co').textContent = $('#f-co').value || 'YOUR ORG';
  $('#c-name').textContent = $('#f-name').value || 'Full Name';
  $('#c-role').textContent = $('#f-role').value;
  $('#c-num').textContent = 'ID: ' + ($('#f-num').value || '—');
  $('#c-exp').textContent = $('#f-exp').value ? ('Valid thru: ' + $('#f-exp').value) : '';
  if (photoDataUrl) {
    $('#photo').innerHTML = `<img src="${photoDataUrl}" alt="">`;
  } else {
    $('#photo').textContent = '👤';
  }
}

function loadPhoto(e) {
  const f = e.target.files[0]; if (!f) return;
  const r = new FileReader();
  r.onload = () => { photoDataUrl = r.result; render(); };
  r.readAsDataURL(f);
}

function downloadPNG() {
  const card = $('#card');
  const cardClone = card.cloneNode(true);
  cardClone.style.setProperty('--ac1', $('#f-color').value);
  const wrap = document.createElement('div');
  wrap.style.cssText = 'position:absolute;left:-99999px;top:0;width:320px';
  wrap.appendChild(cardClone);
  document.body.appendChild(wrap);
  const data = new XMLSerializer().serializeToString(cardClone);
  document.body.removeChild(wrap);
  // 320x204 -> 960x612 at 3x for ~300 DPI (CR80 = 3.375"x2.125" at 284 DPI)
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="960" height="612" viewBox="0 0 320 204">
    <foreignObject width="320" height="204">${data.replace(/xmlns="[^"]*"/,'')}</foreignObject>
  </svg>`;
  const blob = new Blob([svg], {type:'image/svg+xml;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const img = new Image();
  img.onload = () => {
    const c = document.createElement('canvas');
    c.width = 960; c.height = 612;
    const ctx = c.getContext('2d');
    ctx.drawImage(img, 0, 0, 960, 612);
    c.toBlob(b => {
      const a = document.createElement('a');
      a.href = URL.createObjectURL(b);
      a.download = ($('#f-name').value || 'id-card').replace(/\s+/g,'-').toLowerCase() + '-id-card.png';
      a.click();
      URL.revokeObjectURL(a.href);
    });
    URL.revokeObjectURL(url);
  };
  img.onerror = () => { alert('Export failed — try a simpler photo or template'); URL.revokeObjectURL(url); };
  img.src = url;
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="downloadPNG()">📥 ${t('download')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="render()">${t('example')}</button>`;

render();

GZ.renderToolPage({
  category: 'image',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'💼', href:'/image/business-card-maker.html', name:'Business Card Maker'},
    {icon:'⭐', href:'/image/favicon-generator.html', name:'Favicon Generator'},
    {icon:'💦', href:'/image/watermark.html', name:'Watermark Tool'},
    {icon:'📐', href:'/image/resizer.html', name:'Image Resizer'},
  ]
});
</script>
