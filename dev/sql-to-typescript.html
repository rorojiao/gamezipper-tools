    exportInterfaces: '导出接口',

    inlineComments: '行内类型注释',
    ok: n => `✓ 生成 ${n} 个接口`,
    noTable: '未找到 CREATE TABLE 语句。',
    step1: '粘贴一条或多条 CREATE TABLE 语句',
    step2: '选择导出、后缀、日期类型和注释选项',
    step3: '将生成的接口复制到你的 TypeScript 项目',

const { $, copyText, t } = GZ;

function mapType(sqlType){
  const u = sqlType.toUpperCase();
  if (/^(INT|INTEGER|BIGINT|SMALLINT|TINYINT|MEDIUMINT|SERIAL|BIGSERIAL|BIT)\b/.test(u)) return 'number';
  if (/^(DECIMAL|NUMERIC|FLOAT|DOUBLE|REAL|DEC)\b/.test(u)) return 'number';
  if (/^(BOOL|BOOLEAN)\b/.test(u)) return 'boolean';
  if (/^(DATE|DATETIME|TIMESTAMP|TIME|INTERVAL|YEAR)\b/.test(u)) {
    return $('#optDate').checked ? 'string' : 'Date';
  }
  if (/^(BLOB|BINARY|VARBINARY|BYTEA|IMAGE)\b/.test(u)) return 'Uint8Array';
  if (/^(JSON|JSONB)\b/.test(u)) return 'unknown';
  if (/^ENUM\b/.test(u)) return 'string';
  return 'string';
}

function pascal(s){
  return s.replace(/[^a-zA-Z0-9]+/g,'_').split('_').filter(Boolean)
    .map(w => w.charAt(0).toUpperCase()+w.slice(1).toLowerCase()).join('');
}

// Find table bodies by scanning with paren-depth balance so nested parens like
// DECIMAL(10,2), VARCHAR(255), ENUM('a','b') don't break extraction.
function extractTables(sql){
  const tables = [];
  const re = /CREATE\s+TABLE\s+(?:IF\s+NOT\s+EXISTS\s+)?[`"\[]?([a-zA-Z0-9_.\->]+)[`"\]]?\s*\(/gi;
  let m;
  while ((m = re.exec(sql))){
    const name = m[1].split('.').pop().replace(/[`"\[\]]/g,'');
    const start = re.lastIndex; // index just after the opening (
    let depth = 1, i = start, inStr = null;
    while (i < sql.length && depth > 0){
      const ch = sql[i];
      if (inStr){ if (ch === inStr && sql[i-1] !== '\\') inStr = null; }
      else if (ch === "'" || ch === '"' || ch === '`') inStr = ch;
      else if (ch === '(') depth++;
      else if (ch === ')') depth--;
      i++;
    }
    tables.push({ name, body: sql.slice(start, i - 1) });
  }
  return tables;
}

// Split column list on top-level commas, respecting parens and string quotes.
function splitCols(body){
  const cols = [];
  let depth = 0, inStr = null, cur = '';
  for (let i = 0; i < body.length; i++){
    const ch = body[i];
    if (inStr){ cur += ch; if (ch === inStr && body[i-1] !== '\\') inStr = null; continue; }
    if (ch === "'" || ch === '"' || ch === '`'){ inStr = ch; cur += ch; continue; }
    if (ch === '(') depth++;
    else if (ch === ')') depth--;
    if (ch === ',' && depth === 0){ cols.push(cur); cur = ''; }
    else cur += ch;
  }
  if (cur.trim()) cols.push(cur);
  return cols;
}

function parseTables(sql){
  sql = sql.replace(/--[^\n]*/g,'').replace(/\/\*[\s\S]*?\*\//g,'');
  const tables = [];
  for (const tb of extractTables(sql)){
    const outCols = [];
    for (let raw of splitCols(tb.body)){
      const c = raw.trim();
      if (!c) continue;
      const upper = c.toUpperCase();
      // skip table-level constraints
      if (/^(PRIMARY\s+KEY|FOREIGN\s+KEY|CONSTRAINT|UNIQUE|KEY|INDEX|CHECK)\b/.test(upper)) continue;
      const cm = c.match(/^[`"\[]?([a-zA-Z_][a-zA-Z0-9_$]*)[`"\]]?\s+([a-zA-Z]+(?:\s*\([^)]*\))?)/);
      if (!cm) continue;
      const colName = cm[1];
      const fullType = cm[2].trim();
      const typeBase = fullType.replace(/\s*\(.*\)/,'').trim();
      const tsType = mapType(typeBase);
      const isPK = /\bPRIMARY\s+KEY\b/i.test(c);
      const isAuto = /\b(AUTO_INCREMENT|SERIAL|GENERATED\s+.*AS\s+IDENTITY)\b/i.test(c);
      // PRIMARY KEY columns are implicitly NOT NULL in SQL.
      const isNullable = !isPK && !/NOT\s+NULL/i.test(c);
      outCols.push({ name: colName, tsType, isNullable, isPK, isAuto, typeBase });
    }
    tables.push({ name: tb.name, className: pascal(tb.name), cols: outCols });
  }
  return tables;
}

function convert(){
  const inp = $('#input').value;
  if (!inp.trim()){ $('#output').innerHTML=''; $('#status').innerHTML=''; return; }
  const tables = parseTables(inp);
  if (!tables.length){
    $('#status').innerHTML = `<span style="color:var(--gz-accent)">${t('noTable')}</span>`;
    $('#output').innerHTML = `<span style="color:var(--gz-accent)">${t('noTable')}</span>`;
    return;
  }
  const exportKw = $('#optExport').checked ? 'export ' : '';
  const suffix = $('#optSuffix').checked ? 'Entity' : '';
  const showComment = $('#optComment').checked;
  let out = '';
  for (const tb of tables){
    const ifaceName = tb.className + suffix;
    out += `${exportKw}interface ${ifaceName} {\n`;
    for (const c of tb.cols){
      const optional = c.isNullable ? '?' : '';
      const safeKey = /^[a-zA-Z_$][a-zA-Z0-9_$]*$/.test(c.name) ? c.name : `"${c.name}"`;
      const comment = showComment ? `  // ${c.typeBase}${c.isPK?' (PK)':''}${c.isAuto?' (auto)':''}${c.isNullable?' (nullable)':''}\n` : '';
      out += `${comment}  ${safeKey}${optional}: ${c.tsType};\n`;
    }
    out += '}\n\n';
  }
  $('#output').textContent = out.trim()+'\n';
  $('#status').innerHTML = `<span style="color:var(--gz-success)">${t('ok')(tables.length)}</span>`;
}

  bio TEXT,
  created_at TIMESTAMP DEFAULT NOW(),
  avatar_url VARCHAR(500)
);

CREATE TABLE products (
  id BIGINT PRIMARY KEY AUTO_INCREMENT,
  sku VARCHAR(64) NOT NULL,
  name VARCHAR(200) NOT NULL,
  price DECIMAL(10,2) NOT NULL,
  in_stock INT DEFAULT 0,
  metadata JSON,
  image BLOB
);`;
  convert();
}

function doClear(){ $('#input').value=''; $('#output').textContent=''; $('#status').innerHTML=''; }

$('#input').addEventListener('input', convert);

$('#toolbar').innerHTML = `
