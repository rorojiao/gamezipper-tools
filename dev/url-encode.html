<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="gz-split">
      <div><label id="lbl-in"></label><textarea id="input" spellcheck="false"></textarea></div>
      <div><label id="lbl-out"></label><textarea id="output" spellcheck="false" readonly></textarea></div>
    </div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'URL Encoder / Decoder',
    toolDesc: 'Encode or decode URLs, query parameters and special characters. Supports encodeURIComponent and encodeURI.',
    encComponent: 'encodeURIComponent',
    encURI: 'encodeURI',
    step1: 'Enter a URL or text in the input area',
    step2: 'Click Encode to percent-encode special characters',
    step3: 'Click Decode to convert percent-encoded strings back',
    step4: 'Choose between encodeURIComponent (default) and encodeURI modes',
  },
  zh: {
    toolTitle: 'URL Encode / Decode',
    toolDesc: 'Encode或Decode URL、查询Parameters和特殊字符。Support encodeURIComponent 和 encodeURI。',
    encComponent: 'encodeURIComponent',
    encURI: 'encodeURI',
    step1: '在Input areaInput URL 或Text',
    step2: 'Click"Encode"对特殊字符进行百分号Encode',
    step3: 'Click"Decode"将百分号Encode转回原文',
    step4: '可Select encodeURIComponent（默认）或 encodeURI 模式',
  }
});

const { $, copyText, t } = GZ;
let encType = 'component';

function doEncode() {
  try { $('#output').value = encType === 'component' ? encodeURIComponent($('#input').value) : encodeURI($('#input').value); }
  catch(e) { $('#output').value = 'Error: ' + e.message; }
}
function doDecode() {
  try { $('#output').value = encType === 'component' ? decodeURIComponent($('#input').value) : decodeURI($('#input').value); }
  catch(e) { $('#output').value = 'Error: ' + e.message; }
}
function loadExample() {
  $('#input').value = 'https://example.com/search?q=hello world&lang=中文&tag=a+b#section';
  doEncode();
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="doEncode()">${t('encode')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doDecode()">${t('decode')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <select class="gz-select" onchange="encType=this.value">
    <option value="component">${t('encComponent')}</option>
    <option value="uri">${t('encURI')}</option>
  </select>
  <button class="gz-btn" onclick="copyText($('#output').value)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#input').value='';$('#output').value=''">${t('clear')}</button>`;

GZ.renderToolPage({
  category: 'dev',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🔐', href:'/dev/base64.html', name:'Base64'},
    {icon:'📋', href:'/dev/json.html', name:'JSON Formatter'},
    {icon:'🏷️', href:'/dev/html-encode.html', name:'HTML Encode'},
    {icon:'#️⃣', href:'/dev/hash.html', name:'Hash Generator'},
  ]
});
</script>
