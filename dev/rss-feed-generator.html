  },

    toolDesc: '为博客或网站生成 RSS 2.0 XML 订阅源。添加频道信息和条目，即时获取有效的 XML — 100% 浏览器本地运行。',

    itemsSection: '订阅条目',
    addItem: '+ 添加条目',
    removeItem: '删除',
    generate: '生成',
    copy: '复制',
    download: '下载',
    clear: '清空',
    outputLabel: 'RSS XML 输出',
    chTitleLabel: '标题',
    chLinkLabel: '链接',
    chDescLabel: '描述',
    chLangLabel: '语言',
    itemTitle: '条目标题',
    itemLink: '条目链接',
    itemDesc: '描述',
    itemDate: '发布日期',
    itemGuid: 'GUID（可选）',
    itemEnclosure: '附件 URL（可选）',
    step1: '输入频道标题、链接和描述',
    step2: '添加条目，包含标题、链接、描述和日期',
    step3: '可选添加附件 URL 以支持播客',
    step4: '点击「生成」，然后复制或下载 RSS XML',
  }
});

const { $, copyText, t } = GZ;
let items = [{title:'First Post', link:'https://example.com/post-1', desc:'This is my first blog post.', date:new Date().toISOString(), guid:'', enclosure:''}];

function escapeXml(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&apos;');
}

function fmtRfc822(dateStr) {
  if (!dateStr) return '';
  try {
    const d = new Date(dateStr);
    return d.toUTCString();
  } catch(e) { return dateStr; }
}

function renderItems() {
  const container = $('#itemList');
  container.innerHTML = '';
  items.forEach((item, i) => {
    const block = document.createElement('div');
    block.className = 'item-block';
    block.innerHTML = `
      <div class="item-header">
        <span>Item ${i + 1}</span>
        <button class="gz-btn gz-btn-secondary" onclick="removeItem(${i})">${t('removeItem')}</button>
      </div>
      <div class="field-row"><label style="min-width:120px">${t('itemTitle')}</label><input type="text" value="${escapeAttr(item.title)}" onchange="items[${i}].title=this.value;generate()"></div>
      <div class="field-row"><label style="min-width:120px">${t('itemLink')}</label><input type="text" value="${escapeAttr(item.link)}" onchange="items[${i}].link=this.value;generate()"></div>
      <div class="field-row"><label style="min-width:120px">${t('itemDesc')}</label><textarea onchange="items[${i}].desc=this.value;generate()" rows="2">${escapeHtml(item.desc)}</textarea></div>
      <div class="field-row"><label style="min-width:120px">${t('itemDate')}</label><input type="datetime-local" value="${toDateTimeLocal(item.date)}" onchange="items[${i}].date=new Date(this.value).toISOString();generate()"></div>
      <div class="field-row"><label style="min-width:120px">${t('itemGuid')}</label><input type="text" value="${escapeAttr(item.guid)}" onchange="items[${i}].guid=this.value;generate()"></div>
      <div class="field-row"><label style="min-width:120px">${t('itemEnclosure')}</label><input type="text" value="${escapeAttr(item.enclosure)}" onchange="items[${i}].enclosure=this.value;generate()" placeholder="https://example.com/audio.mp3"></div>`;
    container.appendChild(block);
  });
}

function escapeAttr(s) {
  return (s || '').replace(/"/g,'&quot;').replace(/</g,'&lt;');
}
function escapeHtml(s) {
  return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function toDateTimeLocal(iso) {
  if (!iso) return '';
  try {
    const d = new Date(iso);
    const off = d.getTimezoneOffset();
    const local = new Date(d.getTime() - off * 60000);
    return local.toISOString().slice(0, 16);
  } catch(e) { return ''; }
}

function addItem() {
  items.push({title:'', link:'', desc:'', date:new Date().toISOString(), guid:'', enclosure:''});
  renderItems();
  generate();
}

function removeItem(idx) {
  items.splice(idx, 1);
  renderItems();
  generate();
}

function generate() {
  const chTitle = $('#chTitle').value || 'Untitled';
  const chLink = $('#chLink').value || '';
  const chDesc = $('#chDesc').value || '';
  const chLang = $('#chLang').value || 'en';

  let xml = `<?xml version="1.0" encoding="UTF-8"?>\n<rss version="2.0">\n  <channel>\n    <title>${escapeXml(chTitle)}</title>\n    <link>${escapeXml(chLink)}</link>\n    <description>${escapeXml(chDesc)}</description>\n    <language>${escapeXml(chLang)}</language>\n    <lastBuildDate>${new Date().toUTCString()}</lastBuildDate>\n    <generator>GameZipper Tools RSS Generator</generator>\n`;

  items.forEach(item => {
    if (!item.title && !item.link && !item.desc) return;
    xml += `    <item>\n`;
    xml += `      <title>${escapeXml(item.title)}</title>\n`;
    xml += `      <link>${escapeXml(item.link)}</link>\n`;
    xml += `      <description>${escapeXml(item.desc)}</description>\n`;
    if (item.date) xml += `      <pubDate>${fmtRfc822(item.date)}</pubDate>\n`;
    xml += `      <guid>${escapeXml(item.guid || item.link)}</guid>\n`;
    if (item.enclosure) {
      xml += `      <enclosure url="${escapeXml(item.enclosure)}" type="${guessMime(item.enclosure)}" />\n`;
    }
    xml += `    </item>\n`;
  });

  xml += `  </channel>\n</rss>`;
  $('#output').textContent = xml;
}

function guessMime(url) {
  const ext = (url || '').split('.').pop().toLowerCase();
  const map = {mp3:'audio/mpeg', m4a:'audio/mp4', ogg:'audio/ogg', wav:'audio/wav', mp4:'video/mp4', webm:'video/webm', pdf:'application/pdf'};
  return map[ext] || 'application/octet-stream';
}

function downloadFeed() {
  const xml = $('#output').textContent;
  if (!xml) return;
  const blob = new Blob([xml], {type:'application/rss+xml'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'rss.xml';
  a.click();
  URL.revokeObjectURL(a.href);
}

$('#ch-title').textContent = t('channelInfo');
$('#items-title').textContent = t('itemsSection');
$('#btn-add-item').textContent = t('addItem');
$('#lbl-ch-title').textContent = t('chTitleLabel');
$('#lbl-ch-link').textContent = t('chLinkLabel');
$('#lbl-ch-desc').textContent = t('chDescLabel');
$('#lbl-ch-lang').textContent = t('chLangLabel');
$('#lbl-out').textContent = t('outputLabel');

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="generate()">${t('generate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="downloadFeed()">${t('download')}</button>`;

['chTitle','chLink','chDesc','chLang'].forEach(id => {
  $('#' + id).addEventListener('input', generate);
});

renderItems();
generate();

    {icon:'📰', href:'/dev/json.html', name:'JSON Formatter'},
    {icon:'🌐', href:'/dev/index.html', name:'Dev Tools'},
  ]
});
</script>
