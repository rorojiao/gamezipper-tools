GZI18n.register({en:{toolTitle:'Image DPI Checker',toolDesc:'Check an image’s pixel dimensions, embedded DPI/PPI, aspect ratio, megapixels and printable size at 72, 96, 150 and 300 PPI. JPG and PNG metadata is read locally — no upload.',choose:'Choose Image',clear:'Clear',dropTitle:'Drop a JPG, PNG or other image here',dropSub:'or click to select — your image stays on this device',pixels:'Pixel dimensions',dpi:'Embedded DPI / PPI',ratio:'Aspect ratio',mega:'Megapixels',size:'File size',print:'Print size',at:'at',inch:'inches',cm:'cm',unknown:'Not embedded',unsupported:'Could not read this image. Try a JPG, PNG, WebP, GIF or BMP file.',step1:'Drop an image into the upload area or click Choose Image',step2:'Review pixel dimensions, aspect ratio, megapixels and embedded DPI metadata',step3:'Compare estimated print sizes at 72, 96, 150 and 300 PPI',step4:'Use 300 PPI for sharp close-viewed prints, or 150 PPI for many large-format prints'},zh:{toolTitle:'图片 DPI 检查器',toolDesc:'检查图片的像素尺寸、内嵌 DPI/PPI、宽高比、百万像素，以及 72、96、150 和 300 PPI 下的打印尺寸。JPG 和 PNG 元数据仅在本地读取，不上传。',choose:'选择图片',clear:'清空',dropTitle:'将 JPG、PNG 或其他图片拖到这里',dropSub:'或点击选择 — 图片始终保留在本设备',pixels:'像素尺寸',dpi:'内嵌 DPI / PPI',ratio:'宽高比',mega:'百万像素',size:'文件大小',print:'打印尺寸',at:'分辨率',inch:'英寸',cm:'厘米',unknown:'未嵌入',unsupported:'无法读取此图片。请尝试 JPG、PNG、WebP、GIF 或 BMP 文件。',step1:'将图片拖到上传区域，或点击「选择图片」',step2:'查看像素尺寸、宽高比、百万像素和内嵌 DPI 元数据',step3:'比较 72、96、150 和 300 PPI 下的预计打印尺寸',step4:'近距离观看的清晰印刷建议使用 300 PPI，大幅面印刷通常可使用 150 PPI'}});
const {$,t}=GZ;function gcd(a,b){while(b)[a,b]=[b,a%b];return a}function fs(n){if(n<1024)return n+' B';if(n<1048576)return(n/1024).toFixed(1)+' KB';return(n/1048576).toFixed(2)+' MB'}
function pngDpi(v){if(v.length<33||String.fromCharCode(...v.slice(1,4))!=='PNG')return null;for(let i=8;i+12<v.length;){const len=(v[i]<<24)|(v[i+1]<<16)|(v[i+2]<<8)|v[i+3],type=String.fromCharCode(...v.slice(i+4,i+8));if(type==='pHYs'&&len>=9){const x=((v[i+8]<<24)|(v[i+9]<<16)|(v[i+10]<<8)|v[i+11])>>>0,y=((v[i+12]<<24)|(v[i+13]<<16)|(v[i+14]<<8)|v[i+15])>>>0,unit=v[i+16];return unit===1?{x:x*.0254,y:y*.0254}:null}i+=12+len}return null}
function jpgDpi(v){if(v[0]!==255||v[1]!==216)return null;let i=2;while(i+10<v.length){if(v[i]!==255){i++;continue}const mark=v[i+1],len=(v[i+2]<<8)+v[i+3];if(mark===224&&String.fromCharCode(...v.slice(i+4,i+9))==='JFIF\0'){const unit=v[i+11],x=(v[i+12]<<8)+v[i+13],y=(v[i+14]<<8)+v[i+15];return unit===1?{x,y}:unit===2?{x:x*2.54,y:y*2.54}:null}if(!len)break;i+=2+len}return null}
async function handle(file){if(!file)return;try{const buf=await file.arrayBuffer(),v=new Uint8Array(buf),dpi=pngDpi(v)||jpgDpi(v);const url=URL.createObjectURL(file),img=new Image();img.onload=()=>{const w=img.naturalWidth,h=img.naturalHeight,g=gcd(w,h),val=dpi?`${dpi.x.toFixed(0)} × ${dpi.y.toFixed(0)}`:t('unknown');let html=`<img class="dpi-preview" src="${url}" alt="Image preview"><div class="dpi-grid"><div class="dpi-card">${t('pixels')}<b>${w} × ${h}</b></div><div class="dpi-card">${t('dpi')}<b>${val}</b></div><div class="dpi-card">${t('ratio')}<b>${w/g}:${h/g}</b></div><div class="dpi-card">${t('mega')}<b>${(w*h/1e6).toFixed(2)} MP</b></div><div class="dpi-card">${t('size')}<b>${fs(file.size)}</b></div></div><h3 style="margin-top:18px">${t('print')}</h3><div class="dpi-grid">`;[72,96,150,300].forEach(p=>{const wi=w/p,hi=h/p;html+=`<div class="dpi-card">${t('at')} ${p} PPI<b>${wi.toFixed(2)} × ${hi.toFixed(2)} ${t('inch')}</b><small>${(wi*2.54).toFixed(1)} × ${(hi*2.54).toFixed(1)} ${t('cm')}</small></div>`});$('#output').innerHTML=html+'</div>';$('#status').textContent=''};img.onerror=()=>{$('#status').textContent=t('unsupported');URL.revokeObjectURL(url)};img.src=url}catch(e){$('#status').textContent=t('unsupported')}}
const drop=$('#drop');drop.onclick=()=>$('#file').click();$('#file').onchange=e=>handle(e.target.files[0]);['dragenter','dragover'].forEach(x=>drop.addEventListener(x,e=>{e.preventDefault();drop.classList.add('drag')}));['dragleave','drop'].forEach(x=>drop.addEventListener(x,e=>{e.preventDefault();drop.classList.remove('drag')}));drop.addEventListener('drop',e=>handle(e.dataTransfer.files[0]));$('#drop-title').textContent=t('dropTitle');$('#drop-sub').textContent=t('dropSub');$('#toolbar').innerHTML=`<button class="gz-btn" onclick="$('#file').click()">${t('choose')}</button><button class="gz-btn gz-btn-secondary" onclick="$('#output').innerHTML='';$('#status').textContent='';$('#file').value=''">${t('clear')}</button>`;GZ.renderToolPage({category:'image',titleKey:'toolTitle',descKey:'toolDesc',howToSteps:['step1','step2','step3','step4'],related:[{icon:'📐',href:'/image/resizer.html',name:'Image Resizer'},{icon:'📦',href:'/image/compressor.html',name:'Image Compressor'},{icon:'🔍',href:'/dev/file-metadata-viewer.html',name:'File Metadata'},{icon:'✂️',href:'/image/cropper.html',name:'Image Cropper'}]});
</script><script src="/tools-result-rec.js?v=20260707v520" defer></script></body></html>
