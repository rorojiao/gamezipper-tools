<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"How much rent can I afford?","acceptedAnswer":{"@type":"Answer","text":"A common rule is to spend no more than 30% of your gross monthly income on rent and housing costs. Some lenders use a stricter 25-28% rule for comfort. This calculator shows both the 30% guideline and the 50/30/20 budget recommendation so you can pick what works for your situation."}},{"@type":"Question","name":"What is the 30% rule for rent?","acceptedAnswer":{"@type":"Answer","text":"The 30% rule says your monthly rent (plus basic utilities) should not exceed 30% of your gross monthly income. For example, if you earn $5,000 a month before tax, aim for rent of about $1,500 or less."}},{"@type":"Question","name":"What is the 50/30/20 budget rule?","acceptedAnswer":{"@type":"Answer","text":"The 50/30/20 rule splits after-tax income into three buckets: 50% for needs (rent, food, utilities, insurance), 30% for wants, and 20% for savings and debt repayment. Under this rule, rent should fit inside the 50% needs bucket alongside other essentials."}},{"@type":"Question","name":"Should I use gross or net income to calculate rent?","acceptedAnswer":{"@type":"Answer","text":"The classic 30% rule uses gross (before-tax) income. The 50/30/20 rule uses net (after-tax) income. This calculator lets you input either annual or monthly gross income and shows how the rules compare."}}]}</script>

<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>

  </div>
  <div class="gz-tool-area">

    <div class="calc-grid">
      <div class="result-card" id="inputs"></div>
      <div class="result-card" id="results"></div>
    </div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Rent Affordability Calculator',
    toolDesc: 'How much rent can I afford? Estimate your ideal monthly rent using the 30% rule and 50/30/20 budget — instant, private and free.',
    income: 'Gross income',
    incomeFreq: 'Income frequency',
    monthly: 'Monthly',
    annual: 'Annual',
    netIncome: 'Net (after-tax) income (same frequency)',
    incomePct: 'Income used',
    monthlyIncome: 'Gross monthly income',
    monthlyNet: 'Net monthly income',
    rule30: 'Max rent (30% rule)',
    rule25: 'Comfortable rent (25% rule)',
    rule5030: 'Max rent in 50/30/20 needs bucket',
    recRange: 'Recommended rent range',
    rentPct: 'Rent share of gross income',
    step1: 'Enter your gross income (monthly or annual)',
    step2: 'Optionally add your net (after-tax) income',
    step3: 'Pick the income frequency',
    step4: 'Read your recommended rent range under each rule',
    rule30Help: 'Up to 30% of gross income for rent + utilities.',
    rule25Help: 'Safer 25% of gross income — leaves room for savings.',
    rule50Help: 'Half of net income for all needs (rent + food + utilities).',
  },
  zh: {
    toolTitle: '租金可负担性计算器',
    toolDesc: '我能负担多少房租？用 30% 法则和 50/30/20 预算估算理想月租 — 即时、私密、免费。',
    income: '税前收入',
    incomeFreq: '收入频率',
    monthly: '每月',
    annual: '每年',
    netIncome: '税后净收入（相同频率）',
    incomePct: '已用收入比例',
    monthlyIncome: '月度税前收入',
    monthlyNet: '月度税后收入',
    rule30: '最高房租（30% 法则）',
    rule25: '舒适房租（25% 法则）',
    rule5030: '50/30/20 必需开销桶内最高房租',
    recRange: '建议房租范围',
    rentPct: '房租占税前收入比例',
    step1: '输入税前收入（月或年）',
    step2: '可选填税后净收入',
    step3: '选择收入频率',
    step4: '查看每种法则下的建议房租',
    rule30Help: '不超过税前收入的 30%（含水电）。',
    rule25Help: '更稳健的 25% — 留出储蓄空间。',
    rule50Help: '税后收入的一半用于全部必需开销。',
  }
});

const { $, t } = GZ;
const money = n => '$' + Math.round(n).toLocaleString();

$('#inputs').innerHTML = `
  <div class="field"><label>${t('income')}</label><input type="number" id="income" value="65000" min="0" step="1000"></div>
  <div class="field"><label>${t('incomeFreq')}</label><select id="freq"><option value="annual">${t('annual')}</option><option value="monthly">${t('monthly')}</option></select></div>
  <div class="field"><label>${t('netIncome')}</label><input type="number" id="net" value="50000" min="0" step="1000"></div>
`;
document.querySelectorAll('#inputs input,#inputs select').forEach(i => i.addEventListener('input', recalc));

function recalc() {
  const inc = +$('#income').value || 0;
  const freq = $('#freq').value;
  const net = +$('#net').value || 0;
  const moGross = freq === 'annual' ? inc / 12 : inc;
  const moNet = freq === 'annual' ? net / 12 : net;

  const rule30 = moGross * 0.30;
  const rule25 = moGross * 0.25;
  // 50/30/20: rent should fit in the 50% needs bucket of net income; assume rent is ~60% of needs
  const rule50 = moNet * 0.50 * 0.60;
  const rentPct = moGross > 0 ? rule30 / moGross * 100 : 0;

  const tiers = [
    {label: '10%', w: 10},
    {label: '20%', w: 10},
    {label: '30%', w: 10},
    {label: '40%', w: 10},
    {label: '50%+', w: 60},
  ];

  $('#results').innerHTML = `
    <div class="result-big">${money(rule30)}<span style="font-size:.45em;opacity:.7;font-weight:500"> / ${t('monthly')}</span></div>
    <div style="margin:6px 0 12px;font-size:.85em;opacity:.8">${t('rule30')}</div>
    <div class="bar-track"><div class="bar-fill" style="width:30%"></div></div>
    <div class="tier"><span>0%</span><span>30%</span><span>100%</span></div>
    <div class="result-row"><span>${t('monthlyIncome')}</span><span class="v">${money(moGross)}</span></div>
    ${moNet > 0 ? `<div class="result-row"><span>${t('monthlyNet')}</span><span class="v">${money(moNet)}</span></div>` : ''}
    <div style="margin-top:14px"></div>
    <div class="result-row"><span>${t('rule25')}<div style="font-size:.75em;opacity:.6;font-weight:400">${t('rule25Help')}</div></span><span class="v">${money(rule25)}</span></div>
    <div class="result-row"><span>${t('rule30')}<div style="font-size:.75em;opacity:.6;font-weight:400">${t('rule30Help')}</div></span><span class="v">${money(rule30)}</span></div>
    ${moNet > 0 ? `<div class="result-row"><span>${t('rule5030')}<div style="font-size:.75em;opacity:.6;font-weight:400">${t('rule50Help')}</div></span><span class="v">${money(rule50)}</span></div>` : ''}
    <div class="result-row" style="border-top:2px solid var(--border);padding-top:12px;margin-top:8px"><span>${t('recRange')}</span><span class="v">${money(rule25)} – ${money(rule30)}</span></div>
  `;
}
recalc();

$('#toolbar').innerHTML = `<button class="gz-btn gz-btn-secondary" onclick="document.querySelectorAll('#inputs input').forEach(i=>i.value='');recalc()">Clear</button>`;

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🏠', href:'/calc/home-affordability-calculator.html', name:'Home Affordability'},
    {icon:'🏘️', href:'/calc/rent-vs-buy.html', name:'Rent vs Buy'},
    {icon:'🧾', href:'/calc/bill-splitter.html', name:'Bill Splitter'},
    {icon:'💰', href:'/calc/budget-planner.html', name:'Budget Planner'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
