let answer = '', currentRow = 0, currentCol = 0, guesses = [], gameOver = false;
let stats = { played: 0, wins: 0, streak: 0 };
const MAX_GUESSES = 6, WORD_LEN = 5;

function newGame() {
  answer = WORDS[Math.floor(Math.random() * WORDS.length)];
  currentRow = 0; currentCol = 0; guesses = []; gameOver = false;
  $('#game-message').innerHTML = '';
  $('#new-game-btn').style.display = 'none';
  renderBoard();
  renderKeyboard();
  updateStats();
}

function renderBoard() {
  const el = $('#board');
  let html = '';
  for (let r = 0; r < MAX_GUESSES; r++) {
    html += '<div class="row">';
    for (let c = 0; c < WORD_LEN; c++) {
      const letter = guesses[r] ? guesses[r][c] : '';
      html += `<div class="cell" id="cell-${r}-${c}">${letter}</div>`;
    }
    html += '</div>';
  }
  el.innerHTML = html;
}

function renderKeyboard() {
  const rows = ['QWERTYUIOP','ASDFGHJKL','ZXCVBNM'];
  const keyStates = {};
  guesses.forEach(g => {
    const result = evaluate(g);
    g.split('').forEach((c, i) => {
      const s = result[i];
      if (s === 'correct') keyStates[c] = 'correct';
      else if (s === 'present' && keyStates[c] !== 'correct') keyStates[c] = 'present';
      else if (!keyStates[c]) keyStates[c] = 'absent';
    });
  });

  const el = $('#keyboard');
  el.innerHTML = rows.map((row, ri) => {
    let keys = row.split('').map(c => {
      const cls = keyStates[c] || '';
      return `<button class="kb-key ${cls}" onclick="pressKey('${c}')">${c}</button>`;
    });
    if (ri === 2) {
      keys.unshift(`<button class="kb-key wide" onclick="pressKey('ENTER')">ENTER</button>`);
      keys.push(`<button class="kb-key wide" onclick="pressKey('BACK')">⌫</button>`);
    }
    return `<div class="kb-row">${keys.join('')}</div>`;
  }).join('');
}

function evaluate(guess) {
  const result = Array(WORD_LEN).fill('absent');
  const ansArr = answer.split('');
  const gArr = guess.split('');

  // First pass: correct
  for (let i = 0; i < WORD_LEN; i++) {
    if (gArr[i] === ansArr[i]) {
      result[i] = 'correct';
      ansArr[i] = null;
      gArr[i] = null;
    }
  }
  // Second pass: present
  for (let i = 0; i < WORD_LEN; i++) {
    if (gArr[i] === null) continue;
    const idx = ansArr.indexOf(gArr[i]);
    if (idx !== -1) {
      result[i] = 'present';
      ansArr[idx] = null;
    }
  }
  return result;
}

function revealRow(row, guess) {
  const result = evaluate(guess);
  for (let i = 0; i < WORD_LEN; i++) {
    const cell = $(`#cell-${row}-${i}`);
    setTimeout(() => {
      cell.classList.add('flip');
      setTimeout(() => {
        cell.classList.add(result[i]);
      }, 200);
    }, i * 200);
  }
}

window.pressKey = function(key) {
  if (gameOver) return;
  key = key.toUpperCase();

  if (key === 'ENTER') {
    if (currentCol < WORD_LEN) {
      $('#game-message').innerHTML = `<div style="color:var(--text3);font-size:.9em;padding:4px">${t('notEnough')}</div>`;
      return;
    }
    const guess = guesses[currentRow];
    revealRow(currentRow, guess);
    setTimeout(() => {
      if (guess === answer) {
        gameOver = true;
        stats.played++; stats.wins++; stats.streak++;
        $('#game-message').innerHTML = `<div class="game-msg win">${t('youWin')}</div>`;
        $('#new-game-btn').style.display = 'inline-block';
        updateStats();
      } else if (currentRow >= MAX_GUESSES - 1) {
        gameOver = true;
        stats.played++; stats.streak = 0;
        $('#game-message').innerHTML = `<div class="game-msg lose">${t('youLose')} <strong>${answer.toUpperCase()}</strong></div>`;
        $('#new-game-btn').style.display = 'inline-block';
        updateStats();
      }
    }, WORD_LEN * 200 + 300);
    currentRow++;
    currentCol = 0;
    renderKeyboard();
    return;
  }

  if (key === 'BACK' || key === 'BACKSPACE') {
    if (currentCol > 0) {
      currentCol--;
      const guess = guesses[currentRow] || '';
      guesses[currentRow] = guess.substring(0, currentCol);
      const cell = $(`#cell-${currentRow}-${currentCol}`);
      if (cell) cell.textContent = '';
    }
    return;
  }

  if (/^[A-Z]$/.test(key) && currentCol < WORD_LEN) {
    if (!guesses[currentRow]) guesses[currentRow] = '';
    guesses[currentRow] += key;
    const cell = $(`#cell-${currentRow}-${currentCol}`);
    if (cell) cell.textContent = key;
    currentCol++;
  }
};

document.addEventListener('keydown', e => {
  if (e.ctrlKey || e.metaKey || e.altKey) return;
  if (e.key === 'Enter') pressKey('ENTER');
  else if (e.key === 'Backspace') pressKey('BACK');
  else if (/^[a-zA-Z]$/.test(e.key)) pressKey(e.key);
});

function updateStats() {
  const wr = stats.played ? Math.round(stats.wins / stats.played * 100) : 0;
  $('#played-display').innerHTML = `${t('played')}: <strong>${stats.played}</strong>`;
  $('#win-rate-display').innerHTML = `${t('winRate')}: <strong>${wr}%</strong>`;
  $('#streak-display').innerHTML = `${t('streak')}: <strong>${stats.streak}</strong>`;
}

$('#new-game-btn').textContent = t('newGame');
$('#new-game-btn').addEventListener('click', newGame);

newGame();
