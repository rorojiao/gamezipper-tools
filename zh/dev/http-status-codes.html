<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What are HTTP status codes?", "acceptedAnswer": {"@type": "Answer", "text": "HTTP status codes are 3-digit numbers returned by a web server in response to a client request. They indicate whether the request succeeded, failed, or requires further action. Codes are grouped into five classes: 1xx informational, 2xx success, 3xx redirection, 4xx client errors, and 5xx server errors."}}, {"@type": "Question", "name": "What is the difference between 401 and 403?", "acceptedAnswer": {"@type": "Answer", "text": "401 Unauthorized means the request lacks valid authentication credentials — the user must log in. 403 Forbidden means the server understood the request but refuses to authorize it — the user is authenticated but does not have permission to access the resource."}}, {"@type": "Question", "name": "What does HTTP 301 vs 302 mean?", "acceptedAnswer": {"@type": "Answer", "text": "301 Moved Permanently indicates the resource has permanently moved to a new URL — browsers and search engines cache this. 302 Found indicates a temporary redirect — the original URL should still be used. For SEO, use 301 for permanent moves."}}, {"@type": "Question", "name": "What causes HTTP 500 errors?", "acceptedAnswer": {"@type": "Answer", "text": "500 Internal Server Error is a generic server-side error. Common causes include: unhandled exceptions in server code, database connection failures, syntax errors in server-side scripts, missing files, permission issues, or running out of memory. Check server error logs for details."}}]}</script>

<script>
GZI18n.register({
  en: {
    toolTitle: 'HTTP Status Codes Reference',
    toolDesc: 'Complete searchable list of HTTP status codes with descriptions and troubleshooting tips. 1xx informational, 2xx success, 3xx redirect, 4xx client errors, 5xx server errors.',
    searchPh: 'Search by code or name (e.g. 404, Not Found)...',
    all: 'All Codes',
    c1: '1xx Info',
    c2: '2xx Success',
    c3: '3xx Redirect',
    c4: '4xx Client Error',
    c5: '5xx Server Error',
    codes: 'codes',
    tip: 'Tip',
    step1: 'Search by code number or name in the search box',
    step2: 'Filter by status class using the category buttons',
    step3: 'Read the description and troubleshooting tip',
    step4: 'Click related network tools to inspect real responses',
  },
  zh: {
    toolTitle: 'HTTP 状态码参考',
    toolDesc: '完整的 HTTP 状态码可搜索列表，包含描述和故障排查提示。1xx 信息、2xx 成功、3xx 重定向、4xx 客户端错误、5xx 服务器错误。',
    searchPh: '按代码或名称搜索（如 404、Not Found）…',
    all: '全部',
    c1: '1xx 信息',
    c2: '2xx 成功',
    c3: '3xx 重定向',
    c4: '4xx 客户端错误',
    c5: '5xx 服务器错误',
    codes: '个状态码',
    tip: '提示',
    step1: '在搜索框中按代码或名称搜索',
    step2: '使用分类按钮按状态类别筛选',
    step3: '阅读描述和故障排查提示',
    step4: '点击相关网络工具检查真实响应',
  }
});

const { $, t } = GZ;

const CODES = [
  // 1xx
  {code:100, cls:'c1', name:'Continue', desc:'The server has received the request headers and the client should proceed to send the request body.', tip:'Used for large uploads — client sends Expect: 100-continue header first.'},
  {code:101, cls:'c1', name:'Switching Protocols', desc:'The requester has asked the server to switch protocols and the server has agreed.', tip:'Commonly used when upgrading from HTTP to WebSocket.'},
  {code:102, cls:'c1', name:'Processing', desc:'The server has received and is processing the request, but no response is available yet.', tip:'Sent during long-running WebDAV operations to prevent timeouts.'},
  {code:103, cls:'c1', name:'Early Hints', desc:'Allows the server to hint resources to the client before the final response.', tip:'Use to preload critical CSS/JS while the server prepares the page.'},
  // 2xx
  {code:200, cls:'c2', name:'OK', desc:'The request succeeded. The result depends on the HTTP method used.', tip:'Standard success response for GET, POST, PUT, DELETE.'},
  {code:201, cls:'c2', name:'Created', desc:'The request succeeded and a new resource was created.', tip:'Include a Location header pointing to the newly created resource.'},
  {code:202, cls:'c2', name:'Accepted', desc:'The request has been accepted for processing but not completed.', tip:'Used for async jobs — return a job ID for status polling.'},
  {code:204, cls:'c2', name:'No Content', desc:'The request succeeded but there is no content to return.', tip:'Common for DELETE and PUT — the response body must be empty.'},
  {code:206, cls:'c2', name:'Partial Content', desc:'The server is delivering only part of the resource due to a Range header.', tip:'Used for video streaming and resumable downloads.'},
  // 3xx
  {code:301, cls:'c3', name:'Moved Permanently', desc:'The resource has permanently moved to a new URL.', tip:'Use for SEO — search engines update their index to the new URL.'},
  {code:302, cls:'c3', name:'Found', desc:'The resource is temporarily under a different URL.', tip:'For temporary redirects. Use 307 to preserve the HTTP method.'},
  {code:303, cls:'c3', name:'See Other', desc:'The response can be found under a different URL using GET.', tip:'Common after POST/PUT — redirect to a confirmation page.'},
  {code:304, cls:'c3', name:'Not Modified', desc:'The resource has not been modified since the version specified by the client.', tip:'Sent in response to conditional requests with If-Modified-Since/If-None-Match.'},
  {code:307, cls:'c3', name:'Temporary Redirect', desc:'Like 302 but preserves the original HTTP method.', tip:'A POST stays a POST, unlike 302 which may convert to GET.'},
  {code:308, cls:'c3', name:'Permanent Redirect', desc:'Like 301 but preserves the original HTTP method.', tip:'Use for permanent redirects where the method must not change.'},
  // 4xx
  {code:400, cls:'c4', name:'Bad Request', desc:'The server cannot process the request due to a client error (malformed syntax).', tip:'Validate input on the client AND server. Return a clear error message.'},
  {code:401, cls:'c4', name:'Unauthorized', desc:'Authentication is required and has failed or not been provided.', tip:'Different from 403 — the user must authenticate first.'},
  {code:403, cls:'c4', name:'Forbidden', desc:'The server understood the request but refuses to authorize it.', tip:'User is authenticated but lacks permission. Check ACLs and roles.'},
  {code:404, cls:'c4', name:'Not Found', desc:'The requested resource could not be found.', tip:'Check the URL, route definition, and that the resource exists.'},
  {code:405, cls:'c4', name:'Method Not Allowed', desc:'The request method is not supported for this resource.', tip:'Return an Allow header listing valid methods.'},
  {code:408, cls:'c4', name:'Request Timeout', desc:'The server timed out waiting for the request.', tip:'Client took too long to send the full request.'},
  {code:409, cls:'c4', name:'Conflict', desc:'The request conflicts with the current state of the server.', tip:'Common with version mismatches or duplicate resources.'},
  {code:410, cls:'c4', name:'Gone', desc:'The resource is no longer available and will not be available again.', tip:'Use for deleted content — search engines will remove it from index.'},
  {code:418, cls:'c4', name:'I\'m a Teapot', desc:'The server refuses to brew coffee because it is, permanently, a teapot.', tip:'April Fools\' joke from RFC 2324 — sometimes used for Easter eggs.'},
  {code:422, cls:'c4', name:'Unprocessable Entity', desc:'The server understands the content type but cannot process the semantic errors.', tip:'Validation errors — return field-level error details.'},
  {code:429, cls:'c4', name:'Too Many Requests', desc:'The user has sent too many requests in a given time (rate limiting).', tip:'Include Retry-After header and implement exponential backoff.'},
  // 5xx
  {code:500, cls:'c5', name:'Internal Server Error', desc:'A generic error message for unexpected server failures.', tip:'Check server logs. Never expose stack traces to users.'},
  {code:501, cls:'c5', name:'Not Implemented', desc:'The server does not support the functionality required.', tip:'Server does not recognize the HTTP method.'},
  {code:502, cls:'c5', name:'Bad Gateway', desc:'The server acting as a gateway received an invalid response from upstream.', tip:'Reverse proxy cannot reach the backend. Check upstream service.'},
  {code:503, cls:'c5', name:'Service Unavailable', desc:'The server is currently unavailable (overloaded or maintenance).', tip:'Return Retry-After header. Common during deployments.'},
  {code:504, cls:'c5', name:'Gateway Timeout', desc:'The upstream server failed to respond in time.', tip:'Backend too slow — check slow queries, external API timeouts.'},
  {code:511, cls:'c5', name:'Network Authentication Required', desc:'The client must authenticate to gain network access (captive portal).', tip:'Used by public Wi-Fi hotspots and hotel networks.'},
];

const CATS = [
  {key:'', label:'all', color:''},
  {key:'c1', label:'c1', color:'rgba(162,155,254,.3)'},
  {key:'c2', label:'c2', color:'rgba(0,214,114,.3)'},
  {key:'c3', label:'c3', color:'rgba(255,165,2,.3)'},
  {key:'c4', label:'c4', color:'rgba(255,71,87,.3)'},
  {key:'c5', label:'c5', color:'rgba(255,107,129,.3)'},
];

let activeCat = '';
let searchTerm = '';

function escapeHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function renderCats() {
  const c = $('#cats');
  c.innerHTML = CATS.map(cat => {
    const active = activeCat === cat.key;
    const style = active && cat.color ? `style="background:${cat.color};border-color:transparent"` : '';
    return `<div class="rl-cat hs-cat ${active?'active':''}" data-cat="${cat.key}" ${style}>${t(cat.label)}</div>`;
  }).join('');
  c.querySelectorAll('.hs-cat').forEach(el => {
    el.addEventListener('click', () => { activeCat = el.dataset.cat; renderCats(); renderGrid(); });
  });
}

function renderGrid() {
  const filtered = CODES.filter(c => {
    if (activeCat && c.cls !== activeCat) return false;
    if (searchTerm) {
      const q = searchTerm.toLowerCase();
      return String(c.code).includes(q) || c.name.toLowerCase().includes(q) || c.desc.toLowerCase().includes(q);
    }
    return true;
  });
  $('#count').textContent = `${filtered.length} ${t('codes')}`;
  $('#grid').innerHTML = filtered.map(c => `
    <div class="hs-card">
      <div class="hs-code ${c.cls}">${c.code}</div>
      <div class="hs-body">
        <div class="hs-name">${escapeHtml(c.name)}</div>
        <div class="hs-desc">${escapeHtml(c.desc)}</div>
        <div class="hs-tip"><b>${t('tip')}:</b> ${escapeHtml(c.tip)}</div>
      </div>
    </div>
  `).join('');
}

$('#search').placeholder = t('searchPh');
$('#search').addEventListener('input', e => { searchTerm = e.target.value; renderGrid(); });

renderCats();
renderGrid();

GZ.renderToolPage({
  category: 'dev',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🌐', href:'/network/http-headers-checker.html', name:'HTTP Headers'},
    {icon:'🔍', href:'/network/website-status-checker.html', name:'Website Status'},
    {icon:'⚡', href:'/network/speed-test.html', name:'Speed Test'},
    {icon:'🔌', href:'/network/port-checker.html', name:'Port Checker'},
  ]
});
</script>
