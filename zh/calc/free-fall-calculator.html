<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is free fall?", "acceptedAnswer": {"@type": "Answer", "text": "Free fall is motion under gravity alone with no air resistance. An object accelerates downward at g (9.81 m/s² on Earth). The kinematic equations d = ½gt² and v = gt describe distance, velocity and time."}}, {"@type": "Question", "name": "How fast does an object fall after a given height?", "acceptedAnswer": {"@type": "Answer", "text": "Final velocity v = √(2gh) when dropped from rest, where h is the height fallen and g is 9.81 m/s². For example, dropping from 20 m gives v = √(2 × 9.81 × 20) ≈ 19.8 m/s."}}, {"@type": "Question", "name": "Does this include air resistance?", "acceptedAnswer": {"@type": "Answer", "text": "No. This calculator uses the ideal vacuum model with constant gravitational acceleration. Real falling objects reach terminal velocity due to air drag, which depends on shape, mass and surface area."}}, {"@type": "Question", "name": "What is the value of g on other planets?", "acceptedAnswer": {"@type": "Answer", "text": "Gravity differs by body: Earth 9.81 m/s², Moon 1.62, Mars 3.71, Jupiter 24.79, Sun 274. Change the gravity field to calculate free fall anywhere in the solar system."}}]}</script>

</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Free Fall Calculator',
    toolDesc: 'Solve free fall problems for distance, final velocity or fall time under gravity. Enter any two of height, velocity or time and instantly get the third with the kinematic equations h = ½gt² and v = gt. Great physics homework helper.',
    lblH: 'Distance / height (h)',
    lblV: 'Final velocity (v)',
    lblT: 'Fall time (t)',
    lblG: 'Gravity (g)',
    rH: 'Distance fallen',
    rV: 'Final velocity',
    rT: 'Fall time',
    example: 'Example',
    clear: 'Clear',
    formulas: 'Formulas: h = ½gt² · v = gt · v² = 2gh · t = v/g · h = v²/(2g)',
    errInputs: 'Enter any two of height, velocity and time (plus gravity).',
    step1: 'Enter gravity (Earth = 9.81 m/s², or change it)',
    step2: 'Fill any two of distance, velocity or time',
    step3: 'Leave the unknown field blank',
    step4: 'The calculator instantly solves for the missing value',
  },
  zh: {
    toolTitle: '自由落体计算器',
    toolDesc: '求解自由落体的距离、末速度或下落时间。输入高度、速度、时间中的任意两项，即时算出第三项，附运动学公式 h = ½gt² 和 v = gt。物理作业好帮手。',
    lblH: '距离 / 高度 (h)',
    lblV: '末速度 (v)',
    lblT: '下落时间 (t)',
    lblG: '重力加速度 (g)',
    rH: '下落距离',
    rV: '末速度',
    rT: '下落时间',
    example: '示例',
    clear: '清空',
    formulas: '公式：h = ½gt² · v = gt · v² = 2gh · t = v/g · h = v²/(2g)',
    errInputs: '请输入高度、速度、时间中的任意两项（及重力）。',
    step1: '输入重力（地球=9.81 m/s²，可修改）',
    step2: '填写距离、速度或时间中的任意两项',
    step3: '未知项留空',
    step4: '计算器即时算出缺失的值',
  }
});

const { $, t } = GZ;

$('#lbl-h span:first-child').textContent = t('lblH');
$('#lbl-v span:first-child').textContent = t('lblV');
$('#lbl-t span:first-child').textContent = t('lblT');
$('#lbl-g span:first-child').textContent = t('lblG');
$('#r-h').textContent = t('rH');
$('#r-v').textContent = t('rV');
$('#r-t').textContent = t('rT');
$('#formulas').textContent = t('formulas');

function num(id) { const v = $('#' + id).value; return v === '' ? null : parseFloat(v); }
function fmt(n) {
  if (!isFinite(n)) return '—';
  const abs = Math.abs(n);
  if (abs !== 0 && (abs < 0.001 || abs >= 1e6)) return n.toExponential(3);
  return n.toLocaleString(undefined, { maximumFractionDigits: 4 });
}

function calc() {
  let h = num('h'), v = num('v'), tm = num('t');
  const g = num('g');
  if (g === null || g <= 0) { $('#results').style.display = 'none'; return; }
  const filled = [h, v, tm].filter(x => x !== null).length;
  if (filled < 2) { $('#results').style.display = 'none'; return; }
  // Solve based on which pair is known
  if (v === null && h !== null) v = Math.sqrt(2 * g * h);
  else if (v === null && tm !== null) v = g * tm;
  if (tm === null && v !== null) tm = v / g;
  if (h === null && v !== null) h = (v * v) / (2 * g);
  $('#out-h').textContent = h !== null && isFinite(h) ? fmt(h) + ' m' : '—';
  $('#out-v').textContent = v !== null && isFinite(v) ? fmt(v) + ' m/s' : '—';
  $('#out-t').textContent = tm !== null && isFinite(tm) ? fmt(tm) + ' s' : '—';
  $('#results').style.display = 'block';
}

['h', 'v', 't', 'g'].forEach(id => $('#' + id).addEventListener('input', calc));

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="$('#g').value='9.81';$('#h').value='20';$('#v').value='';$('#t').value='';calc()">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="['h','v','t','g'].forEach(id=>document.getElementById(id).value='');calc()">${t('clear')}</button>`;

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1', 'step2', 'step3', 'step4'],
  related: [
    { icon: '🎯', href: '/calc/projectile-motion-calculator.html', name: 'Projectile Motion' },
    { icon: '🔄', href: '/calc/newtons-second-law-calculator.html', name: 'Newton\'s 2nd Law' },
    { icon: '🪨', href: '/calc/density-calculator.html', name: 'Density' },
    { icon: '⏱️', href: '/calc/pendulum-calculator.html', name: 'Pendulum' },
  ]
});
</script>
