const { $, copyText, t } = GZ;

function unescapePropValue(str) {
  let s = String(str);
  s = s.replace(/\\u([0-9a-fA-F]{4})/g, (_, hex) => String.fromCharCode(parseInt(hex, 16)));
  s = s.replace(/\\n/g, '\n');
  s = s.replace(/\\r/g, '\r');
  s = s.replace(/\\t/g, '\t');
  s = s.replace(/\\\\/g, '\\');
  return s;
}

function unescapePropKey(str) {
  let s = String(str);
  s = s.replace(/\\u([0-9a-fA-F]{4})/g, (_, hex) => String.fromCharCode(parseInt(hex, 16)));
  s = s.replace(/\\([=: \t#])/g, '$1');
  s = s.replace(/\\\\/g, '\\');
  return s;
}

function parseProperties(text) {
  // Join line continuations (backslash at end of line)
  const joined = text.replace(/\\\r?\n/g, '');
  const lines = joined.split('\n');
  const props = {};
  let count = 0;
  for (const rawLine of lines) {
    let line = rawLine;
    const trimmed = line.trim();
    if (!trimmed || trimmed.startsWith('#') || trimmed.startsWith('!')) continue;
    // Find first unescaped =, : or whitespace
    let sepIdx = -1, sepChar = '';
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (c === '\\') { i++; continue; }
      if (c === '=' || c === ':') { sepIdx = i; sepChar = c; break; }
      if (/\s/.test(c) && i > 0) {
        // whitespace separator only if followed by key continuation
        // check if there is a non-ws after
        let j = i;
        while (j < line.length && /\s/.test(line[j])) j++;
        if (j < line.length) { sepIdx = i; sepChar = ' '; break; }
      }
    }
    let key, val;
    if (sepIdx >= 0) {
      key = line.substring(0, sepIdx).trim();
      val = line.substring(sepIdx + 1).trim();
    } else {
      key = line.trim();
      val = '';
    }
    key = unescapePropKey(key);
    val = unescapePropValue(val);
    props[key] = val;
    count++;
  }
  return { props, count };
}

function autoType(val) {
  if (val === 'true') return true;
  if (val === 'false') return false;
  if (val === 'null') return null;
  if (val === '') return '';
  if (/^-?\d+$/.test(val) && Math.abs(parseInt(val, 10)) <= Number.MAX_SAFE_INTEGER) return parseInt(val, 10);
  if (/^-?\d+\.\d+(?:[eE][+-]?\d+)?$/.test(val)) {
    const n = parseFloat(val);
    if (isFinite(n)) return n;
  }
  return val;
}

function setDeep(obj, segments, value, arrayMode) {
  let cur = obj;
  for (let i = 0; i < segments.length; i++) {
    const seg = segments[i];
    const isLast = i === segments.length - 1;
    const nextSeg = segments[i + 1];
    const wantArray = arrayMode && /^\d+$/.test(nextSeg);
    if (isLast) {
      cur[seg] = value;
    } else {
      if (cur[seg] == null || typeof cur[seg] !== 'object') cur[seg] = wantArray ? [] : {};
      cur = cur[seg];
    }
  }
}

function syntaxHighlight(json) {
  return json.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/("(\\u[\da-fA-F]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(\.\d+)?([eE][+-]?\d+)?)/g, m => {
      let c = 'json-number';
      if (/^"/.test(m)) c = /:$/.test(m) ? 'json-key' : 'json-string';
      else if (/true|false/.test(m)) c = 'json-bool';
      else if (/null/.test(m)) c = 'json-null';
      return `<span class="${c}">${m}</span>`;
    });
}

function convert() {
  const inp = $('#input').value;
  if (!inp.trim()) return;
  const { props, count } = parseProperties(inp);
  const autoTypeOn = $('#autoType').checked;
  const arrayMode = $('#arrayMode').checked;
  const indentSel = $('#indent').value;
  const indent = indentSel === 'tab' ? '\t' : parseInt(indentSel, 10);

  const result = {};
  Object.keys(props).forEach(key => {
    const val = autoTypeOn ? autoType(props[key]) : props[key];
    const segments = key.split('.');
    setDeep(result, segments, val, arrayMode);
  });

  const json = JSON.stringify(result, null, indent);
  $('#output').innerHTML = syntaxHighlight(json);
  $('#status').innerHTML = `<span style="color:var(--gz-success)">${t('valid', count)}</span>`;
  window._result = json;
}

function loadExample() {
  $('#input').value = `# Application configuration
app.name=MyApp
app.version=2.1.0
app.debug=true
server.host=localhost
server.port=8080
server.timeout=30000
database.url=jdbc:postgresql://db:5432/app
features.0=auth
features.1=cache
features.2=metrics`;
  convert();
}

function downloadResult() {
  if (!window._result) return;
  const blob = new Blob([window._result], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'config.json';
  a.click();
  URL.revokeObjectURL(a.href);
}

function doClear() { $('#input').value = ''; $('#output').textContent = ''; $('#status').innerHTML = ''; window._result = ''; }

$('#lbl-autotype').textContent = t('lblAutotype');
$('#lbl-array').textContent = t('lblArray');
$('#lbl-indent').textContent = t('lblIndent');
$('#lbl-in').textContent = t('lblIn');
$('#lbl-out').textContent = t('lblOut');

$('#input').addEventListener('input', convert);

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="convert()">${t('convert')}</button>
  <button class="gz-btn" onclick="copyText(window._result)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="downloadResult()">${t('download')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

</script>
