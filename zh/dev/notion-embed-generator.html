const { $, copyText, t, showToast } = GZ;

function escapeHtml(s){return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function escapeAttr(s){return (s||'').replace(/"/g,'&quot;');}

// Provider detection → normalized embed URL
function detectProvider(url){
  let u;
  try { u = new URL(url); } catch(e){ return {name:t('unknown'), embed:url}; }
  const h = u.hostname.replace(/^www\./,'');
  const path = u.pathname;
  const vid = u.searchParams.get('v');

  if (h.endsWith('youtube.com') || h==='youtu.be'){
    const id = h==='youtu.be' ? path.slice(1) : (vid || (path.startsWith('/embed/')?path.slice(7):''));
    if (id) return {name:'YouTube', embed:`https://www.youtube.com/embed/${id}`};
  }
  if (h.endsWith('vimeo.com')){
    const id = path.split('/').filter(Boolean)[0];
    if (id && /^\d+$/.test(id)) return {name:'Vimeo', embed:`https://player.vimeo.com/video/${id}`};
  }
  if (h.endsWith('figma.com')) return {name:'Figma', embed:`https://www.figma.com/embed?embed_host=share&url=${encodeURIComponent(url)}`};
  if (h.endsWith('loom.com')){ const id = path.match(/share\/([a-f0-9]+)/); if(id) return {name:'Loom', embed:`https://www.loom.com/embed/${id[1]}`}; }
  if (h.endsWith('codepen.io')){ const m = path.match(/\/pen\/([^/]+)/); if(m) return {name:'CodePen', embed:`https://codepen.io/embed${u.pathname}`}; }
  if (h.endsWith('open.spotify.com')) return {name:'Spotify', embed:`https://open.spotify.com${path}`};
  if (h.endsWith('soundcloud.com')) return {name:'SoundCloud', embed:`https://w.soundcloud.com/player/?url=${encodeURIComponent(url)}&color=%23ff5500`};
  if (h==='player.twitch.tv' || h.endsWith('twitch.tv')) return {name:'Twitch', embed:`https://player.twitch.tv?parent=${location.hostname||'localhost'}&channel=${path.split('/')[1]||''}`};
  if (h.endsWith('wistia.com') || h.endsWith('wi.st')){ const m=url.match(/\/medias\/([a-z0-9]+)/i); if(m) return {name:'Wistia', embed:`https://fast.wistia.net/embed/iframe/${m[1]}`}; }
  if (h.endsWith('dailymotion.com')){ const m=path.match(/\/video\/([^_]+)/); if(m) return {name:'Dailymotion', embed:`https://www.dailymotion.com/embed/video/${m[1]}`}; }
  if (h.endsWith('google.com') && path.startsWith('/maps')) return {name:'Google Maps', embed:`https://www.google.com/maps${path}${u.search}&output=embed`};
  if (h.endsWith('maps.google.com')) return {name:'Google Maps', embed:`https://maps.google.com/maps${path}${u.search}&output=embed`};
  if (h.endsWith('docs.google.com')){ const type = path.includes('/document/')?'document':path.includes('/spreadsheets/')?'spreadsheets':path.includes('/presentation/')?'presentation':'document'; return {name:'Google '+type.charAt(0).toUpperCase()+type.slice(1), embed:url.replace(/\/edit.*$/,'/preview').split('?')[0]+'/preview'}; }
  if (h.endsWith('airtable.com')) return {name:'Airtable', embed:url.replace(/\/tbl\//,'/embed/tbl/').replace(/\?view=/,'?view=')};
  if (h.endsWith('typeform.com')){ const m=path.match(/to\/([^/]+)/); if(m) return {name:'Typeform', embed:`https://form.typeform.com/to/${m[1]}`}; }
  if (h.endsWith('github.com')){ const g=path.match(/^\/([^/]+)\/([^/]+)/); if(g) return {name:'GitHub', embed:`https://github.com/${g[1]}/${g[2]}`}; }
  return {name:t('unknown'), embed:url};
}

function generate(){
  const url = $('#url').value.trim();
  const results = $('#results');
  if (!url){ results.innerHTML = `<p style="color:var(--text2)">${escapeHtml(t('empty'))}</p>`; $('#detected').value=''; return; }
  const w = parseInt($('#w').value)||100;
  const h = parseInt($('#h').value)||420;
  const {name, embed} = detectProvider(url);
  $('#detected').value = name;

  const iframe = `<iframe src="${escapeAttr(embed)}" width="${w}%" height="${h}" style="border:0;border-radius:8px;overflow:hidden" loading="lazy" allowfullscreen></iframe>`;
  const bookmark = `<a href="${escapeAttr(url)}">${escapeHtml(name)}</a>`;

  results.innerHTML = `
    <div class="code-block">
      <div class="code-label"><span>${escapeHtml(t('embedUrl'))}</span><button class="gz-btn gz-btn-secondary" data-copy="${escapeAttr(embed)}">${t('copy')}</button></div>
      <pre>${escapeHtml(embed)}</pre>
    </div>
    <div class="code-block">
      <div class="code-label"><span>${escapeHtml(t('iframe'))}</span><button class="gz-btn gz-btn-secondary" data-copy="${escapeAttr(iframe)}">${t('copy')}</button></div>
      <pre>${escapeHtml(iframe)}</pre>
    </div>
    <div class="code-block">
      <div class="code-label"><span>${escapeHtml(t('bookmarklet'))}</span><button class="gz-btn gz-btn-secondary" data-copy="${escapeAttr(bookmark)}">${t('copy')}</button></div>
      <pre>${escapeHtml(bookmark)}</pre>
    </div>
    <div style="font-size:.82rem;font-weight:700;margin:4px 0">${escapeHtml(t('preview'))}:</div>
    <div class="preview-box" id="prev-box"></div>`;
  // live preview (may be blocked by provider — that's expected)
  const pv = document.createElement('iframe');
  pv.src = embed; pv.style.cssText='border:0;width:100%;height:'+h+'px;border-radius:8px';
  pv.setAttribute('loading','lazy');
  $('#prev-box').appendChild(pv);

  results.querySelectorAll('[data-copy]').forEach(btn=>{
    btn.addEventListener('click', ()=>{ copyText(btn.getAttribute('data-copy')); showToast(t('copied')); });
  });
}

$('#gen-btn').addEventListener('click', generate);
$('#url').addEventListener('keydown', e=>{ if(e.key==='Enter') generate(); });

</script>
