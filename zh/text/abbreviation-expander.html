const { $, copyText, t } = GZ;

const ABBR = {
  'ASAP':'As Soon As Possible','FYI':'For Your Information','FAQ':'Frequently Asked Questions',

  'CRM':'Customer Relationship Management','ERP':'Enterprise Resource Planning','BI':'Business Intelligence',

  'kWh':'kilowatt-hour','V':'volt','A':'ampere','Hz':'hertz','dB':'decibel',
  'AM':'Ante Meridiem','PM':'Post Meridiem','EST':'Eastern Standard Time','PST':'Pacific Standard Time',

let expandMode = 'append';
let caseSensitive = false;

$('#options').innerHTML = `
  <label class="opt"><input type="radio" name="mode" value="replace" onchange="expandMode='replace';expand()"> ${t('optReplace')}</label>
  <label class="opt"><input type="radio" name="mode" value="append" checked onchange="expandMode='append';expand()"> ${t('optAppend')}</label>
  <label class="opt"><input type="radio" name="mode" value="prepend" onchange="expandMode='prepend';expand()"> ${t('optPrepend')}</label>
  <label class="opt"><input type="checkbox" id="caseSens" onchange="caseSensitive=this.checked;expand()"> ${t('optCase')}</label>`;

function escapeRegex(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }

function expand() {
  const text = $('#input').value;
  if (!text) { $('#output').innerHTML = ''; $('#count').innerHTML = ''; return; }

  const keys = Object.keys(ABBR).sort((a, b) => b.length - a.length);
  const flags = caseSensitive ? 'g' : 'gi';
  let count = 0;
  let result = text;

  const parts = [{text: result, expanded: false}];
  keys.forEach(abbr => {
    const pattern = new RegExp('\\b' + escapeRegex(abbr) + '\\b', flags);
    for (let i = 0; i < parts.length; i++) {
      if (parts[i].expanded) continue;
      const seg = parts[i].text;
      if (!pattern.test(seg)) continue;
      pattern.lastIndex = 0;
      const newParts = [];
      let lastIndex = 0;
      let m;
      const localPattern = new RegExp('\\b' + escapeRegex(abbr) + '\\b', flags);
      while ((m = localPattern.exec(seg)) !== null) {
        if (m.index > lastIndex) newParts.push({text: seg.slice(lastIndex, m.index), expanded: parts[i].expanded});
        const matched = m[0];
        let replacement;
        if (expandMode === 'replace') replacement = ABBR[abbr];
        else if (expandMode === 'append') replacement = `${matched} (${ABBR[abbr]})`;
        else replacement = `${ABBR[abbr]} (${matched})`;
        newParts.push({text: replacement, expanded: true, highlight: true});
        count++;
        lastIndex = m.index + matched.length;
      }
      if (lastIndex < seg.length) newParts.push({text: seg.slice(lastIndex), expanded: parts[i].expanded});
      if (newParts.length > 0) {
        parts.splice(i, 1, ...newParts);
        i += newParts.length - 1;
      }
    }
  });

  $('#output').innerHTML = parts.map(p =>
    p.highlight ? `<mark>${escapeHtml(p.text)}</mark>` : escapeHtml(p.text)
  ).join('');

  $('#count').innerHTML = count > 0 ? `<span>${count}</span> ${t('expanded')}` : '';
}

function escapeHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

$('#input').placeholder = t('ph');
$('#input').addEventListener('input', expand);

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#input').value='';expand()">${t('clear')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#input').value='The CEO announced that the new API will launch ASAP. Our CTO confirmed the SQL database migration is on track. Please review the FAQ and RSVP by EOD. The NASA team uses AI and ML for data analysis. Send the PDF to HR and update the CRM.';expand()">${t('example')}</button>`;
