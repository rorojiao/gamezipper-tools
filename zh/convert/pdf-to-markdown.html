GZI18n.register({en:{toolTitle:'PDF to Markdown Converter',toolDesc:'Convert any PDF to clean Markdown. Extract headings, lists, paragraphs and tables — runs 100% in your browser via pdf.js. No upload, no signup.',dropTtl:'Click to upload or drag a PDF here',dropSub:'Your file is processed locally — never uploaded',outLabel:'Markdown Output',prevLabel:'Rendered Preview',meta:'No file loaded',download:'Download .md',copy:'Copy',clear:'Clear',working:'Reading PDF…',done:'✓ Converted {n} pages',noText:'No extractable text found in this PDF (it may be a scanned image).',ph:'Markdown output will appear here after you upload a PDF.',step1:'Click the upload box or drag a PDF onto it',step2:'The tool extracts text, headings and lists in your browser',step3:'Review the Markdown output and rendered preview',step4:'Click Copy or Download .md to save the result'},
zh:{toolTitle:'PDF 转 Markdown 转换器',toolDesc:'将任意 PDF 转换为干净的 Markdown。提取标题、列表、段落和表格 — 100% 浏览器本地运行（基于 pdf.js）。无需上传、无需注册。',dropTtl:'点击上传或将 PDF 拖到此处',dropSub:'文件在本地处理 — 绝不上传',outLabel:'Markdown 输出',prevLabel:'渲染预览',meta:'未加载文件',download:'下载 .md',copy:'复制',clear:'清空',working:'正在读取 PDF…',done:'✓ 已转换 {n} 页',noText:'此 PDF 中未找到可提取的文字（可能是扫描图片）。',ph:'上传 PDF 后，Markdown 输出将显示在此处。',step1:'点击上传框或将 PDF 拖入',step2:'工具在浏览器中提取文字、标题和列表',step3:'查看 Markdown 输出和渲染预览',step4:'点击「复制」或「下载 .md」保存结果'}});
const {$,t,copyText}=GZ;
const drop=$('#drop'),fileInput=$('#file'),output=$('#output'),preview=$('#preview'),meta=$('#meta'),status=$('#status');
output.dataset.placeholder=t('ph');
if(window.pdfjsLib)pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.worker.min.js';
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function inlineMd(s){return esc(s).replace(/`([^`]+)`/g,'<code>$1</code>').replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>').replace(/\*([^*]+)\*/g,'<em>$1</em>').replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2">$1</a>');}
function mdToHtml(md){
  const lines=md.split('\n');let h='',inCode=false,code=[],list=null;
  const closeList=()=>{if(list){h+='</'+list+'>';list=null;}};
  for(const line of lines){
    if(/^```/.test(line)){closeList();if(inCode){h+='<pre><code>'+esc(code.join('\n'))+'</code></pre>';code=[];}inCode=!inCode;continue;}
    if(inCode){code.push(line);continue;}
    if(line.includes('|')&&/^\|.*\|/.test(line)&&/^\|[\s:|-]+\|$/.test(lines[lines.indexOf(line)+1]||'')){closeList();continue;}
    let m;
    if((m=line.match(/^(#{1,6})\s+(.*)$/))){closeList();h+='<h'+m[1].length+'>'+inlineMd(m[2])+'</h'+m[1].length+'>';}
    else if((m=line.match(/^\s*[-*+]\s+(.*)$/))){if(list!=='ul'){closeList();list='ul';h+='<ul>';}h+='<li>'+inlineMd(m[1])+'</li>';}
    else if((m=line.match(/^\s*\d+\.\s+(.*)$/))){if(list!=='ol'){closeList();list='ol';h+='<ol>';}h+='<li>'+inlineMd(m[1])+'</li>';}
    else if(/^>\s?/.test(line)){closeList();h+='<blockquote>'+inlineMd(line.replace(/^>\s?/,''))+'</blockquote>';}
    else if(line.trim()===''){closeList();}
    else if(line.trim()){closeList();h+='<p>'+inlineMd(line)+'</p>';}
  }
  closeList();if(inCode)h+='<pre><code>'+esc(code.join('\n'))+'</code></pre>';
  return h;
}
function itemsToMarkdown(items){
  const lines=items.map(it=>({text:it.str,fontSize:it.transform&&it.transform[3]?Math.abs(it.transform[3]):0,x:it.transform?it.transform[4]:0,y:it.transform?it.transform[5]:0,hasEOL:it.hasEOL})).filter(l=>l.text.trim()||l.hasEOL);
  if(!lines.length)return'';
  const fontSizes=lines.map(l=>l.fontSize).filter(s=>s>0);
  const medianSize=fontSizes.sort((a,b)=>a-b)[Math.floor(fontSizes.length/2)]||10;
  const bodySize=medianSize;
  let md='';
  let currentLine='';
  let prevY=null;
  let lastFontSize=bodySize;
  const flushLine=()=>{
    const txt=currentLine.replace(/\s+$/,'').trim();
    if(!txt){currentLine='';return;}
    const sz=lastFontSize;
    if(sz>=bodySize*1.6){md+='# '+txt+'\n\n';}
    else if(sz>=bodySize*1.35){md+='## '+txt+'\n\n';}
    else if(sz>=bodySize*1.18){md+='### '+txt+'\n\n';}
    else if(/^[-•◦▪]\s+/.test(txt)){md+='- '+txt.replace(/^[-•◦▪]\s+/,'')+'\n';}
    else if(/^\d+[.)]\s+/.test(txt)){md+=txt.replace(/^(\d+)[.)]\s+/,'$1. ')+'\n';}
    else{md+=txt+'\n\n';}
    currentLine='';
  };
  for(const ln of lines){
    if(prevY!==null&&Math.abs(ln.y-prevY)>bodySize*0.8&&currentLine){flushLine();}
    if(ln.text.trim()){currentLine+=(currentLine?' ':'')+ln.text.trim();lastFontSize=ln.fontSize||bodySize;}
    if(ln.hasEOL){flushLine();}
    prevY=ln.y;
  }
  if(currentLine)flushLine();
  return md.replace(/\n{3,}/g,'\n\n').trim();
}
async function handleFile(f){
  if(!f||f.type!=='application/pdf'&&!(f.name||'').toLowerCase().endsWith('.pdf'))return;
  status.textContent=t('working');output.value='';preview.innerHTML='';
  try{
    const buf=await f.arrayBuffer();
    const pdf=await pdfjsLib.getDocument({data:buf}).promise;
    let allMd='';
    for(let p=1;p<=pdf.numPages;p++){
      const page=await pdf.getPage(p);
      const content=await page.getTextContent();
      const md=itemsToMarkdown(content.items);
      if(md){allMd+=(pdf.numPages>1?`\n\n<!-- Page ${p} -->\n\n`:'')+md+'\n\n';}
    }
    if(!allMd.trim()){status.innerHTML='<span style="color:var(--gz-accent)">'+t('noText')+'</span>';meta.textContent=f.name;return;}
    output.value=allMd.trim();
    preview.innerHTML=mdToHtml(allMd.trim());
    meta.textContent=f.name+' · '+pdf.numPages+' '+(GZI18n.getLang()==='zh'?'页':'pages')+' · '+(f.size/1024).toFixed(1)+' KB';
    status.innerHTML='<span style="color:var(--gz-success)">'+t('done').replace('{n}',pdf.numPages)+'</span>';
  }catch(e){
    console.error(e);
    status.innerHTML='<span style="color:var(--gz-accent)">'+(e.message||String(e))+'</span>';
  }
}
function download(){if(!output.value.trim())return;const blob=new Blob([output.value],{type:'text/markdown'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='document.md';a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000);}
drop.addEventListener('click',()=>fileInput.click());
fileInput.addEventListener('change',e=>{if(e.target.files[0])handleFile(e.target.files[0]);});
['dragenter','dragover'].forEach(ev=>drop.addEventListener(ev,e=>{e.preventDefault();drop.classList.add('drag');}));
['dragleave','drop'].forEach(ev=>drop.addEventListener(ev,e=>{e.preventDefault();drop.classList.remove('drag');}));
drop.addEventListener('drop',e=>{const f=e.dataTransfer.files[0];if(f)handleFile(f);});
output.addEventListener('input',()=>{preview.innerHTML=mdToHtml(output.value);});
$('#drop-ttl').textContent=t('dropTtl');$('#drop-sub').textContent=t('dropSub');
$('#out-label').textContent=t('outLabel');$('#prev-label').textContent=t('prevLabel');
$('#toolbar').innerHTML='<button class="gz-btn" onclick="copyText(output.value)">📋 '+t('copy')+'</button><button class="gz-btn gz-btn-secondary" onclick="download()">⬇ '+t('download')+'</button><button class="gz-btn gz-btn-secondary" onclick="output.value=\'\';preview.innerHTML=\'\';meta.textContent=\''+t('meta')+'\';status.textContent=\'\'">'+t('clear')+'</button>';
