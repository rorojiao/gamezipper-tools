<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is the 50/30/20 budget rule?", "acceptedAnswer": {"@type": "Answer", "text": "The 50/30/20 rule is a popular budgeting framework: allocate 50% of after-tax income to needs (housing, food, utilities, transport), 30% to wants (entertainment, dining out, hobbies), and 20% to savings and debt repayment. It's a simple guideline popularized by Senator Elizabeth Warren."}}, {"@type": "Question", "name": "How do I know if my budget is healthy?", "acceptedAnswer": {"@type": "Answer", "text": "A healthy budget keeps total expenses below your income, with ideally 20% or more going to savings. If your needs exceed 50% of income, look for ways to reduce fixed costs. The calculator shows your actual percentages alongside the recommended 50/30/20 targets."}}, {"@type": "Question", "name": "Should I use gross or net (after-tax) income?", "acceptedAnswer": {"@type": "Answer", "text": "Use net (after-tax) income — your actual take-home pay. The 50/30/20 rule is designed for after-tax money. If you enter gross income, your percentages will look higher than reality and the savings recommendation will be misleading."}}, {"@type": "Question", "name": "Is my financial data stored or shared?", "acceptedAnswer": {"@type": "Answer", "text": "No. All budget calculations happen entirely in your browser. No income figures, expenses, or personal financial data are ever sent to any server. The tool is completely private and works offline."}}]}</script>

<script>
GZI18n.register({
  en: {
    toolTitle: 'Monthly Budget Calculator',
    toolDesc: 'Plan your monthly budget with the 50/30/20 rule. Enter your income and expense categories — see savings rate and where your money goes. Free, instant, private.',
    incomeLabel: 'Monthly net (after-tax) income ($)',
    housing: '🏠 Housing / Rent', food: '🍜 Food & Groceries', transport: '🚗 Transport',
    utilities: '💡 Utilities', insurance: '🛡️ Insurance', debt: '💳 Debt payments',
    savings: '💰 Savings & Investments', entertainment: '🎬 Entertainment', other: '📦 Other',
    totalExp: 'Total expenses', remaining: 'Remaining / Surplus', savingsRate: 'Savings rate',
    ruleTitle: '50/30/20 Breakdown (needs / wants / savings)',
    needs: 'Needs', wants: 'Wants', sav: 'Savings',
    step1: 'Enter your monthly net (after-tax) income',
    step2: 'Fill in each expense category (housing, food, transport, etc.)',
    step3: 'See total expenses, surplus, and your savings rate instantly',
    step4: 'Compare your split to the 50/30/20 rule bar below',
  },
  zh: {
    toolTitle: '月度预算计算器',
    toolDesc: '使用 50/30/20 法则规划月度预算。输入收入和支出类别 — 查看储蓄率和资金去向。免费、即时、隐私安全。',
    incomeLabel: '月税后净收入 ($)',
    housing: '🏠 房租 / 住房', food: '🍜 餐饮 / 食品', transport: '🚗 交通',
    utilities: '💡 水电网络', insurance: '🛡️ 保险', debt: '💳 还贷',
    savings: '💰 储蓄 / 投资', entertainment: '🎬 娱乐', other: '📦 其他',
    totalExp: '总支出', remaining: '结余 / 盈余', savingsRate: '储蓄率',
    ruleTitle: '50/30/20 分配（必需 / 想要 / 储蓄）',
    needs: '必需', wants: '想要', sav: '储蓄',
    step1: '输入每月税后净收入',
    step2: '填写各项支出类别（住房、餐饮、交通等）',
    step3: '立即查看总支出、结余和储蓄率',
    step4: '与下方的 50/30/20 法则条形图对比',
  }
});

const { $, t } = GZ;

const CATS = ['housing','food','transport','utilities','insurance','debt','savings','entertainment','other'];
const NEEDS = ['housing','food','transport','utilities','insurance'];
const WANTS = ['entertainment','other'];

function money(n) { return '$' + Math.round(n).toLocaleString(); }
function pct(n) { return (Math.max(0, n) * 100).toFixed(1) + '%'; }

function renderCats() {
  const defaults = {housing:1200, food:500, transport:300, utilities:200, insurance:150, debt:200, savings:800, entertainment:250, other:200};
  $('#cats').innerHTML = CATS.map(c => `<div class="bc-cat">
    <label>${t(c)}</label>
    <input type="number" id="cat-${c}" value="${defaults[c]}" min="0" step="50" data-cat="${c}">
    <span class="pct" id="pct-${c}">—</span>
  </div>`).join('');
  CATS.forEach(c => $('#cat-'+c).addEventListener('input', calc));
}

function calc() {
  const income = Math.max(0, +$('#income').value || 0);
  const vals = {};
  let total = 0;
  CATS.forEach(c => { vals[c] = Math.max(0, +$('#cat-'+c).value || 0); total += vals[c]; });
  const savings = vals.savings;
  const needsTotal = NEEDS.reduce((s,c) => s + vals[c], 0);
  const wantsTotal = WANTS.reduce((s,c) => s + vals[c], 0);
  const remain = income - total;
  const rate = income > 0 ? savings / income : 0;

  CATS.forEach(c => {
    const p = income > 0 ? vals[c] / income : 0;
    $('#pct-'+c).textContent = pct(p);
  });

  $('#val-total').textContent = money(total);
  $('#val-remain').textContent = (remain >= 0 ? '' : '−') + money(Math.abs(remain));
  $('#val-remain').style.color = remain >= 0 ? 'var(--success)' : 'var(--accent)';
  $('#val-rate').textContent = pct(rate);

  // 50/30/20 bar
  const nPct = income > 0 ? (needsTotal / income) * 100 : 0;
  const wPct = income > 0 ? (wantsTotal / income) * 100 : 0;
  const sPct = income > 0 ? (savings / income) * 100 : 0;
  $('#bar').innerHTML = `
    <div style="width:${Math.min(nPct,100)}%;background:#6366f1">${nPct>8?Math.round(nPct)+'%':''}</div>
    <div style="width:${Math.min(wPct,100)}%;background:#f59e0b">${wPct>8?Math.round(wPct)+'%':''}</div>
    <div style="width:${Math.min(sPct,100)}%;background:#10b981">${sPct>8?Math.round(sPct)+'%':''}</div>`;
  $('#legends').innerHTML = `
    <span><i style="background:#6366f1"></i>${t('needs')}: ${money(needsTotal)} (${Math.round(nPct)}%)</span>
    <span><i style="background:#f59e0b"></i>${t('wants')}: ${money(wantsTotal)} (${Math.round(wPct)}%)</span>
    <span><i style="background:#10b981"></i>${t('sav')}: ${money(savings)} (${Math.round(sPct)}%)</span>
    <span style="opacity:.6">Target: 50% / 30% / 20%</span>`;
}

$('#lbl-income').textContent = t('incomeLabel');
$('#lbl-total').textContent = t('totalExp');
$('#lbl-remain').textContent = t('remaining');
$('#lbl-rate').textContent = t('savingsRate');
$('#rule-title').textContent = t('ruleTitle');
$('#income').addEventListener('input', calc);

renderCats();
calc();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🎯', href:'/calc/savings-goal-calculator.html', name:'Savings Goal'},
    {icon:'💸', href:'/calc/compound-interest-calculator.html', name:'Compound Interest'},
    {icon:'📊', href:'/calc/budget-planner.html', name:'Budget Planner'},
    {icon:'💰', href:'/calc/salary-calculator.html', name:'Salary Calculator'},
  ]
});
</script>

</body>
