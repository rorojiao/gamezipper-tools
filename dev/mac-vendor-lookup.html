<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"What is a MAC address?","acceptedAnswer":{"@type":"Answer","text":"A MAC (Media Access Control) address is a unique hardware identifier assigned to a network interface card (NIC). It is 48 bits long (6 bytes) and is usually written as six groups of two hex digits, e.g. 00:1A:2B:3C:4D:5E."}},{"@type":"Question","name":"How does vendor lookup work?","acceptedAnswer":{"@type":"Answer","text":"The first 3 bytes (24 bits) of a MAC address are the Organizationally Unique Identifier (OUI), assigned by the IEEE Registration Authority. Each OUI is registered to a specific manufacturer (e.g. Apple, Cisco, Samsung), which this tool uses to identify the vendor."}},{"@type":"Question","name":"What is the locally-administered vs universal bit?","acceptedAnswer":{"@type":"Answer","text":"The second-least-significant bit of the first byte is the locally-administered address (L/A) flag. If it is 1, the MAC is locally administered (e.g. virtual machines, randomised mobile MACs) and has no IEEE vendor assignment. The opposite bit is the Unicast/Multicast flag."}},{"@type":"Question","name":"Is my MAC address uploaded anywhere?","acceptedAnswer":{"@type":"Answer","text":"No. The IEEE OUI registry is embedded inside this page, so the lookup runs entirely in your browser. The MAC is never sent to a server or logged."}}]}</script>

// Mozilla MAID randomised prefix block 2637120000 – 2637120FFF (used by iOS private relay etc.)
// Locally administered + universal flag detection uses the first byte bits

function row(key, val) {
  return `<div class="decode-row"><span class="key">${key}</span><span class="val">${val}</span></div>`;
}

function lookupVendor(oui6) {
  // try 3-byte OUI (6 hex)
  if (OUI[oui6]) return OUI[oui6];
  return null;
}

$('#app').innerHTML = `
  <div class="gz-field" style="margin-bottom:12px">
    <input type="text" id="mac" class="mac-input" placeholder="${t('placeholder')}" autocomplete="off" spellcheck="false" autocapitalize="characters"
      oninput="this.value=this.value.toUpperCase().replace(/[^A-F0-9:.\-]/g,'')">
  </div>
  <div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:8px">
    <button class="gz-btn" onclick="lookup()" style="font-size:1.05em;padding:12px 24px">${t('check')}</button>
    <button class="gz-btn gz-btn-ghost" onclick="loadSample()" style="padding:12px 18px;font-size:.95em">${t('sample')}</button>
  </div>
  <div id="result" style="margin-top:14px"></div>
`;

function loadSample() {
  $('#mac').value = '00:1A:2B:3C:4D:5E';
  lookup();
}

function lookup() {
  let raw = $('#mac').value.trim().toUpperCase();
  $('#result').innerHTML = '';
  // strip separators
  const clean = raw.replace(/[:.\-\s]/g, '');
  if (!/^[0-9A-F]{12}$/.test(clean)) {
    $('#result').innerHTML = `<div style="color:#e74c3c;padding:12px;text-align:center;background:var(--glass);border-radius:12px">${t('invalid')}</div>`;
    return;
  }

  // Decode byte 0 flags
  const b0 = parseInt(clean.substring(0, 2), 16);
  const isMulticast = (b0 & 0x01) === 1;
  const isLocal = ((b0 >> 1) & 0x01) === 1;

  const oui6 = clean.substring(0, 6);
  const vendor = !isLocal ? (lookupVendor(oui6) || t('notFound')) : t('notFound');

  // Notations
  const colon = clean.match(/.{2}/g).join(':');
  const dash = clean.match(/.{2}/g).join('-');
  const dot = clean.match(/.{4}/g).join('.');
  const rawn = clean;

  // colored display
  let colors = [];
  for (let i = 0; i < 6; i++) {
    let bg = (i < 3) ? '#9b59b6' : '#4ecdc4';
    colors.push(`<span style="color:#fff;background:${bg};border-radius:4px;padding:2px 4px">${clean.substring(i*2, i*2+2)}</span>`);
    if (i < 5) colors.push('<span style="color:var(--text3)">:</span>');
  }

  const notationRow = (label, val) => `
    <div class="decode-row"><span class="key">${label}</span>
      <span class="val notation" onclick="copyTo('${val}')" title="click to copy">${val} <button class="copy-btn" onclick="event.stopPropagation();copyTo('${val}')">copy</button></span>
    </div>`;

  $('#result').innerHTML = `
    <div class="mac-display">${colors.join('')}</div>
    <div style="background:var(--glass);border:1px solid var(--border);border-radius:16px;padding:4px 16px;margin-bottom:14px">
      ${row(t('checksum'), `<span class="check-valid check-ok">${t('valid')}</span>`)}
      ${row(t('oui'), oui6)}
      ${row(t('vendor'), vendor)}
      ${row(t('type'), `${isMulticast ? t('multicast') : t('unicast')} · ${isLocal ? t('local') : t('universal')}`)}
    </div>
    <div style="background:var(--glass);border:1px solid var(--border);border-radius:16px;padding:4px 16px">
      <div style="padding:10px 16px;color:var(--text2);font-weight:600;border-bottom:1px solid var(--border)">${t('notations')}</div>
      ${notationRow(t('colon'), colon)}
      ${notationRow(t('dash'), dash)}
      ${notationRow(t('dot'), dot)}
      ${notationRow(t('raw'), rawn)}
    </div>
  `;
}

function copyTo(s) {
  try { navigator.clipboard.writeText(s); } catch (e) {}
}

window.lookup = lookup;
window.loadSample = loadSample;
window.copyTo = copyTo;
