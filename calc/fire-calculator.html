<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is the FIRE number?", "acceptedAnswer": {"@type": "Answer", "text": "Your FIRE number is the portfolio size at which you can theoretically retire. The popular 4% rule multiplies your annual expenses by 25 — so if you spend $40,000 a year, your FIRE number is $1,000,000."}}, {"@type": "Question", "name": "What is the 4% rule?", "acceptedAnswer": {"@type": "Answer", "text": "The 4% rule (Trinity study) suggests you can withdraw 4% of a balanced stock/bond portfolio in the first year of retirement and adjust for inflation each year, with a high probability of the portfolio lasting 30+ years."}}, {"@type": "Question", "name": "Does this FIRE calculator include inflation?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. You can set both the nominal investment return and an inflation rate. The tool reports results in today's purchasing power so the numbers stay meaningful over long horizons."}}, {"@type": "Question", "name": "Is my financial data private?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. All calculations happen in your browser. Nothing is uploaded, stored on a server, or sent anywhere. Close the tab and the inputs are gone."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="gz-opts">
      <div class="gz-opt"><label id="lblSavings"></label><input type="number" id="savings" value="50000" min="0" step="1000"></div>
      <div class="gz-opt"><label id="lblAnnual"></label><input type="number" id="annual" value="12000" min="0" step="500"></div>
      <div class="gz-opt"><label id="lblExp"></label><input type="number" id="expenses" value="40000" min="1" step="1000"></div>
      <div class="gz-opt"><label id="lblReturn"></label><input type="number" id="returnRate" value="7" min="0" max="30" step="0.1"></div>
      <div class="gz-opt"><label id="lblInflation"></label><input type="number" id="inflation" value="3" min="0" max="20" step="0.1"></div>
      <div class="gz-opt"><label id="lblRule"></label><input type="number" id="withdrawRate" value="4" min="1" max="10" step="0.1"></div>
    </div>
    <div class="gz-cards" id="cards"></div>
    <div id="status"></div>
    <div class="gz-tl" id="timeline"></div>
    <div class="gz-note" id="note"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'FIRE Calculator (Financial Independence)',
    toolDesc: 'Find your FIRE number and how many years until you can retire. Models savings, expenses, investment return, inflation and a custom safe-withdrawal rate — 100% in your browser.',
    calculate: 'Calculate',
    reset: 'Reset',
    savings: 'Current savings ($)',
    annual: 'Annual contribution ($)',
    expenses: 'Annual expenses ($)',
    returnRate: 'Investment return (%/yr)',
    inflation: 'Inflation (%/yr)',
    withdrawRate: 'Safe withdrawal rate (%)',
    fireNumber: 'FIRE Number',
    yearsToFire: 'Years to FIRE',
    fireDate: 'Target year',
    savingsRate: 'Savings rate',
    never: 'Never (raise contributions)',
    year: 'Year',
    balance: 'Balance',
    fireGoal: 'FIRE goal',
    note: 'Educational estimate only. Real retirement planning should account for taxes, Social Security/pension income, healthcare, sequence-of-returns risk and lifestyle changes. Consult a fiduciary advisor.',
    step1: 'Enter your current savings and annual contribution',
    step2: 'Set annual expenses (drives your FIRE number)',
    step3: 'Adjust return, inflation and withdrawal rate',
    step4: 'Read your FIRE number and years to retirement',
  },
  zh: {
    toolTitle: 'FIRE 财务自由计算器',
    toolDesc: '计算你的 FIRE 目标金额以及距离退休还需多少年。建模储蓄、支出、投资回报、通胀和安全提取率 — 100% 浏览器本地运行。',
    calculate: '计算',
    reset: '重置',
    savings: '当前储蓄（$）',
    annual: '每年投入（$）',
    expenses: '每年支出（$）',
    returnRate: '投资回报（%/年）',
    inflation: '通胀率（%/年）',
    withdrawRate: '安全提取率（%）',
    fireNumber: 'FIRE 目标金额',
    yearsToFire: '距离 FIRE 年数',
    fireDate: '目标年份',
    savingsRate: '储蓄率',
    never: '永远无法达到（请增加投入）',
    year: '年份',
    balance: '余额',
    fireGoal: 'FIRE 目标',
    note: '仅作教育性估算。真实的退休规划应考虑税收、社保/养老金、医疗、收益顺序风险和生活方式变化。请咨询持牌理财顾问。',
    step1: '输入当前储蓄和每年投入',
    step2: '设置每年支出（决定 FIRE 目标金额）',
    step3: '调整回报率、通胀率和提取率',
    step4: '查看 FIRE 目标金额和距离退休的年数',
  }
});

const { $, t } = GZ;
const moneyFmt = new Intl.NumberFormat('en-US',{style:'currency',currency:'USD',maximumFractionDigits:0});

function fmt(n){ return moneyFmt.format(Math.round(n)); }

function calc(){
  const savings = Math.max(0, +$('#savings').value || 0);
  const annual  = Math.max(0, +$('#annual').value || 0);
  const exp     = Math.max(1, +$('#expenses').value || 1);
  const rNom    = (+$('#returnRate').value || 0) / 100;
  const infl    = (+$('#inflation').value || 0) / 100;
  const swr     = Math.max(0.005, (+$('#withdrawRate').value || 4) / 100);

  // real (inflation-adjusted) return
  const rReal = (1 + rNom) / (1 + infl) - 1;
  // FIRE number grows with inflation in nominal terms, but in real terms (today's $) it's fixed
  const fireNumber = exp / swr; // in today's purchasing power

  // Simulate year by year, real terms
  let balance = savings;
  let year = 0;
  const rows = [];
  const maxYears = 100;
  while(year < maxYears){
    rows.push({year, balance});
    if(balance >= fireNumber) break;
    year++;
    balance = balance * (1 + rReal) + annual;
  }
  const reached = balance >= fireNumber;

  // cards
  const savingsRate = (annual / (annual + exp)) * 100;
  $('#cards').innerHTML =
    `<div class="gz-card highlight"><div class="big">${fmt(fireNumber)}</div><div class="cap">${t('fireNumber')}</div></div>`+
    `<div class="gz-card"><div class="big">${reached ? year : '∞'}</div><div class="cap">${t('yearsToFire')}</div></div>`+
    `<div class="gz-card"><div class="big">${reached ? (new Date().getFullYear()+year) : '—'}</div><div class="cap">${t('fireDate')}</div></div>`+
    `<div class="gz-card"><div class="big">${isFinite(savingsRate)?savingsRate.toFixed(0)+'%':'—'}</div><div class="cap">${t('savingsRate')}</div></div>`;

  // status
  $('#status').innerHTML = reached
    ? `<span style="color:var(--gz-success,#00d672)">✓ ${t('yearsToFire')}: ${year} · ${t('fireNumber')}: ${fmt(fireNumber)}</span>`
    : `<span style="color:var(--gz-accent2,#ff6b6b)">${t('never')}</span>`;

  // timeline (every year, capped at 50 rows)
  const showRows = rows.slice(0, 50);
  $('#timeline').innerHTML =
    `<div class="gz-tl-row gz-tl-head"><div>${t('year')}</div><div>${t('balance')}</div><div>${t('fireGoal')}</div></div>`+
    showRows.map(r=>{
      const pct = (r.balance / fireNumber) * 100;
      return `<div class="gz-tl-row"><div>+${r.year}</div><div>${fmt(r.balance)} <span style="opacity:.5">(${pct.toFixed(0)}%)</span></div><div style="opacity:.6">${fmt(fireNumber)}</div></div>`;
    }).join('');

  $('#note').textContent = t('note');
}

function reset(){
  $('#savings').value=50000; $('#annual').value=12000; $('#expenses').value=40000;
  $('#returnRate').value=7; $('#inflation').value=3; $('#withdrawRate').value=4;
  calc();
}

// labels
$('#lblSavings').textContent = t('savings');
$('#lblAnnual').textContent = t('annual');
$('#lblExp').textContent = t('expenses');
$('#lblReturn').textContent = t('returnRate');
$('#lblInflation').textContent = t('inflation');
$('#lblRule').textContent = t('withdrawRate');

['savings','annual','expenses','returnRate','inflation','withdrawRate'].forEach(id=>{
  $('#'+id).addEventListener('input', calc);
});

$('#toolbar').innerHTML =
  `<button class="gz-btn" onclick="calc()">${t('calculate')}</button>`+
  `<button class="gz-btn gz-btn-secondary" onclick="reset()">${t('reset')}</button>`;

calc();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'💰', href:'/calc/compound-interest.html', name:'Compound Interest'},
    {icon:'🏦', href:'/calc/mortgage-calculator.html', name:'Mortgage Calculator'},
    {icon:'👵', href:'/calc/retirement-calculator.html', name:'Retirement Calculator'},
    {icon:'🎯', href:'/calc/savings-goal-calculator.html', name:'Savings Goal'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
