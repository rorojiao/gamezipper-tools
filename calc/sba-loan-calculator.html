<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"What is the difference between an SBA 7(a) loan and an SBA 504 loan?","acceptedAnswer":{"@type":"Answer","text":"SBA 7(a) is a flexible lender loan that can finance working capital, acquisitions, equipment and real estate. SBA 504 is primarily for owner-occupied real estate and major fixed assets and commonly combines a bank first lien, a CDC/SBA debenture and a borrower contribution."}},{"@type":"Question","name":"How does this calculator estimate the SBA guarantee fee?","acceptedAnswer":{"@type":"Answer","text":"For 7(a), the calculator estimates the guaranteed portion using an editable guarantee percentage and applies the entered upfront fee rate to that portion. For 504, it applies the entered program fee rate to the CDC/SBA debenture. Actual fees vary by SBA fiscal-year notices, maturity, loan size and lender."}},{"@type":"Question","name":"What is DSCR for an SBA loan?","acceptedAnswer":{"@type":"Answer","text":"Debt-service coverage ratio equals annual net operating income or available business cash flow divided by annual loan payments. A DSCR above 1.0 means projected cash flow exceeds debt service; many lenders prefer a cushion around 1.15 to 1.25 or more, depending on the loan."}},{"@type":"Question","name":"Does an SBA 504 loan always require 10% down?","acceptedAnswer":{"@type":"Answer","text":"Ten percent is a common base borrower contribution, but startups, special-purpose properties and other situations may require a larger contribution. The calculator keeps the bank, CDC and borrower percentages editable so you can model the proposed structure."}},{"@type":"Question","name":"Is this an official SBA approval or quote?","acceptedAnswer":{"@type":"Answer","text":"No. This is an educational estimate, not an SBA or lender quote. Rates, fees, eligibility, collateral, required equity and underwriting terms must be confirmed with an   en:{toolTitle:'SBA Loan Calculator — 7(a) & 504',toolDesc:'Compare SBA 7(a) and 504 financing. Estimate monthly payments, SBA guarantee or CDC fees, borrower contribution, DSCR, total interest and amortization.',hProgram:'Program & project',lProgram:'SBA program',lProject:'Total project / use of proceeds',lCashflow:'Annual cash flow available for debt service',lTerm:'Bank / 7(a) term (years)',hSeven:'SBA 7(a) assumptions',lDown7:'Borrower contribution (%)',lRate7:'7(a) interest rate (%)',lGuarantee:'SBA guaranteed portion (%)',lFee7:'Upfront guarantee fee rate (%)',hFive:'SBA 504 capital stack',lBankShare:'Bank first-lien share (%)',lCdcShare:'CDC / SBA share (%)',lBankRate:'Bank interest rate (%)',lCdcRate:'CDC effective rate (%)',lCdcTerm:'CDC term (years)',lFee504:'CDC / program fee rate (%)',calculate:'Calculate SBA financing',example:'Load example',hResults:'Financing estimate',sLoan:'Total financed',sMonthly:'Combined monthly payment',sEquity:'Borrower contribution',sFee:'Estimated upfront / program fee',sDscr:'Debt-service coverage ratio',sInterest:'Total scheduled interest',hSchedule:'Combined amortization schedule',thMonth:'Month',thPayment:'Payment',thPrincipal:'Principal',thInterest:'Interest',thBalance:'Balance',splitSeven:'7(a) lender loan',splitGuaranteed:'Estimated SBA-guaranteed portion',splitBank:'Bank first lien',splitCdc:'CDC / SBA debenture',splitEquity:'Borrower equity',note:'Educational estimate only. SBA guarantee and program fees can change by fiscal year, loan size and maturity; lenders may finance some fees. Confirm rates, fee notices, eligibility and contribution requirements with an SBA-approved lender or CDC.',step1:'Select SBA 7(a) or SBA 504 and enter the total project amount.',step2:'Enter the proposed term, rates, borrower contribution and editable SBA fee assumptions.',step3:'Add annual cash flow to estimate the debt-service coverage ratio.',step4:'Review the capital stack, combined payment, fees, interest and amortization schedule.'},
  zh:{toolTitle:'SBA 贷款计算器 — 7(a) 与 504',toolDesc:'比较 SBA 7(a) 和 504 融资，估算月供、SBA 担保费或 CDC 费用、借款人出资、DSCR、总利息和摊还计划。',hProgram:'项目与贷款计划',lProgram:'SBA 计划',lProject:'项目总额 / 资金用途总额',lCashflow:'年度可用于偿债的现金流',lTerm:'银行 / 7(a) 期限（年）',hSeven:'SBA 7(a) 假设',lDown7:'借款人出资比例 (%)',lRate7:'7(a) 利率 (%)',lGuarantee:'SBA 担保部分 (%)',lFee7:'前期担保费率 (%)',hFive:'SBA 504 资金结构',lBankShare:'银行第一顺位占比 (%)',lCdcShare:'CDC / SBA 占比 (%)',lBankRate:'银行利率 (%)',lCdcRate:'CDC 有效利率 (%)',lCdcTerm:'CDC 期限（年）',lFee504:'CDC / 项目费率 (%)',calculate:'计算 SBA 融资',example:'载入示例',hResults:'融资估算',sLoan:'融资总额',sMonthly:'合计月供',sEquity:'借款人出资',sFee:'预计前期 / 项目费用',sDscr:'偿债覆盖率（DSCR）',sInterest:'计划总利息',hSchedule:'合并摊还计划',thMonth:'月份',thPayment:'月供',thPrincipal:'本金',thInterest:'利息',thBalance:'余额',splitSeven:'7(a) 贷款机构贷款',splitGuaranteed:'预计 SBA 担保部分',splitBank:'银行第一顺位贷款',splitCdc:'CDC / SBA 债券',splitEquity:'借款人权益资金',note:'仅供教育估算。SBA 担保费和项目费可能随财政年度、贷款规模及期限变化，贷款机构也可能允许将部分费用计入融资。请向 SBA 批准的贷款机构或 CDC 确认利率、费用通知、资格和出资要求。',step1:'选择 SBA 7(a) 或 SBA 504，并输入项目总额。',step2:'输入拟议期限、利率、借款人出资和可编辑的 SBA 费用假设。',step3:'填写年度现金流以估算偿债覆盖率。',step4:'查看资金结构、合计月供、费用、利息和摊还计划。'}
});
const {$,t}=GZ;
const money=n=>'$'+(Number.isFinite(n)?n:0).toLocaleString('en-US',{maximumFractionDigits:0});
function pmt(p,annual,months){if(months<=0)return 0;const r=annual/1200;return r===0?p/months:p*r/(1-Math.pow(1+r,-months))}
function leg(principal,annual,months){return{balance:principal,rate:annual/1200,payment:pmt(principal,annual,months),months}}
function calc(){
  const program=$('#program').value,project=Math.max(0,+$('#project').value||0),cashflow=Math.max(0,+$('#cashflow').value||0),term=Math.max(1,Math.round(+$('#term').value||1));let legs=[],equity=0,fee=0,financed=0,split=[];
  if(program==='7a'){
    equity=project*Math.min(100,Math.max(0,+$('#down7').value||0))/100;financed=Math.max(0,project-equity);const guarantee=financed*Math.min(100,Math.max(0,+$('#guarantee').value||0))/100;fee=guarantee*Math.max(0,+$('#fee7').value||0)/100;legs=[leg(financed,Math.max(0,+$('#rate7').value||0),term*12)];split=[[t('splitSeven'),financed],[t('splitGuaranteed'),guarantee],[t('splitEquity'),equity]];
  }else{
    let bankPct=Math.min(100,Math.max(0,+$('#bankShare').value||0)),cdcPct=Math.min(100-bankPct,Math.max(0,+$('#cdcShare').value||0)),equityPct=Math.max(0,100-bankPct-cdcPct);const bank=project*bankPct/100,cdc=project*cdcPct/100;equity=project*equityPct/100;financed=bank+cdc;fee=cdc*Math.max(0,+$('#fee504').value||0)/100;legs=[leg(bank,Math.max(0,+$('#bankRate').value||0),term*12),leg(cdc,Math.max(0,+$('#cdcRate').value||0),Math.max(10,Math.round(+$('#cdcTerm').value||25))*12)];split=[[t('splitBank'),bank],[t('splitCdc'),cdc],[t('splitEquity'),equity]];
  }
  const monthly=legs.reduce((s,l)=>s+l.payment,0),annualDebt=monthly*12,dscr=annualDebt>0?cashflow/annualDebt:0,maxMonths=Math.max(...legs.map(l=>l.months),0);let rows=[],totalInterest=0;
  for(let m=1;m<=maxMonths;m++){let paid=0,principal=0,interest=0,balance=0;legs.forEach(l=>{if(m>l.months||l.balance<=.005){balance+=Math.max(0,l.balance);return}const i=l.balance*l.rate,p=Math.min(l.balance,Math.max(0,l.payment-i)),actual=i+p;l.balance-=p;if(l.balance<.005)l.balance=0;paid+=actual;principal+=p;interest+=i;balance+=l.balance;totalInterest+=i});rows.push([m,paid,principal,interest,balance])}
  $('#loan').textContent=money(financed);$('#monthly').textContent=money(monthly);$('#equity').textContent=money(equity);$('#fee').textContent=money(fee);$('#dscr').textContent=dscr.toFixed(2)+'×';$('#interest').textContent=money(totalInterest);$('#dscrBox').classList.toggle('warn',dscr>0&&dscr<1.25);$('#dscrBox').classList.toggle('good',dscr>=1.25);$('#split').innerHTML=split.map(x=>`<div><b>${money(x[1])}</b>${x[0]}</div>`).join('');$('#schedule').innerHTML=rows.map(x=>`<tr><td>${x[0]}</td><td>${money(x[1])}</td><td>${money(x[2])}</td><td>${money(x[3])}</td><td>${money(x[4])}</td></tr>`).join('');
}
function toggleProgram(){const seven=$('#program').value==='7a';$('#sevenFields').classList.toggle('hidden',!seven);$('#fiveFields').classList.toggle('hidden',seven);calc()}
function labels(){['hProgram','lProgram','lProject','lCashflow','lTerm','hSeven','lDown7','lRate7','lGuarantee','lFee7','hFive','lBankShare','lCdcShare','lBankRate','lCdcRate','lCdcTerm','lFee504','calculate','example','hResults','sLoan','sMonthly','sEquity','sFee','sDscr','sInterest','hSchedule','thMonth','thPayment','thPrincipal','thInterest','thBalance','note'].forEach(id=>$('#'+id).textContent=t(id))}
labels();$('#program').addEventListener('change',toggleProgram);$('#calculate').onclick=calc;$('#example').onclick=()=>{$('#project').value=500000;$('#cashflow').value=110000;$('#term').value=10;if($('#program').value==='7a'){$('#down7').value=10;$('#rate7').value=9.75;$('#guarantee').value=75;$('#fee7').value=3.75}else{$('#bankShare').value=50;$('#cdcShare').value=40;$('#bankRate').value=8.25;$('#cdcRate').value=6.35;$('#cdcTerm').value=25;$('#fee504').value=2.65}calc()};

toggleProgram();
