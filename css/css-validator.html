function isValidProp(p) {
  if (VALID_PROPS.has(p)) return true;
  if (/^--/.test(p)) return true; // CSS custom property
  if (/^(-webkit-|-moz-|-ms-|-o-|-apple-)/.test(p)) return true; // vendor prefix
  return false;
}

function validateCSS(css) {
  const issues = [];
  const lines = css.split('\n');
  let braceDepth = 0;
  let inComment = false;
  let pendingSelector = '';
  let ruleStartLine = 0;

  // First pass: brace balance + comment tracking
  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];
    let j = 0;
    while (j < line.length) {
      if (inComment) {
        const end = line.indexOf('*/', j);
        if (end === -1) { j = line.length; continue; }
        inComment = false; j = end + 2; continue;
      }
      if (line[j] === '/' && line[j+1] === '*') { inComment = true; j += 2; continue; }
      if (line[j] === '{') {
        braceDepth++;
        if (braceDepth > 1) issues.push({type:'warn', msg:`Nested rule detected at depth ${braceDepth} — ensure this is intended (CSS nesting)`, line:i+1});
        j++; continue;
      }
      if (line[j] === '}') {
        braceDepth--;
        if (braceDepth < 0) { issues.push({type:'error', msg:`Unexpected closing brace "}" — no matching "{"`, line:i+1}); braceDepth = 0; }
        j++; continue;
      }
      j++;
    }
  }
  if (braceDepth > 0) issues.push({type:'error', msg:`${braceDepth} unclosed brace(s) "{" — missing "}"`});

  // Second pass: property validation per rule
  const cleanCSS = css.replace(/\/\*[\s\S]*?\*\//g, ''); // strip comments
  const rules = cleanCSS.split('}');
  for (const rule of rules) {
    const openIdx = rule.indexOf('{');
    if (openIdx === -1) continue;
    const body = rule.substring(openIdx + 1);
    const decls = body.split(';');
    // Compute line offset (rough)
    const beforeRule = cleanCSS.substring(0, cleanCSS.indexOf(rule));
    const baseLine = beforeRule.split('\n').length;
    for (let k = 0; k < decls.length; k++) {
      const decl = decls[k].trim();
      if (!decl) continue;
      const colonIdx = decl.indexOf(':');
      if (colonIdx === -1) {
        issues.push({type:'warn', msg:`Missing colon in "${decl.length > 40 ? decl.substring(0,40)+'…' : decl}" — expected property: value`, line: baseLine});
        continue;
      }
      const prop = decl.substring(0, colonIdx).trim();
      const val = decl.substring(colonIdx + 1).trim();
      if (!val) {
        issues.push({type:'warn', msg:`Property "${prop}" has no value`, line: baseLine});
        continue;
      }
      if (!isValidProp(prop.toLowerCase())) {
        issues.push({type:'warn', msg:`Unknown CSS property "${prop}" — may be invalid or a typo`, line: baseLine});
      }
    }
  }

  // Detect duplicate semicolons ;;;
  const dupSemis = (css.match(/;{2,}/g) || []);
  if (dupSemis.length) issues.push({type:'warn', msg:`Found ${dupSemis.length} duplicate semicolon(s) (;;) — unnecessary`});

  return issues;
}

function doValidate() {
  const inp = $('#input').value;
  if (!inp.trim()) { $('#output').innerHTML = ''; return; }
  const issues = validateCSS(inp);
  if (issues.length === 0) {
    $('#output').innerHTML = `<div class="ok">${t('noErrors')}</div>`;
    return;
  }
  const errors = issues.filter(i => i.type === 'error').length;
  const warns = issues.filter(i => i.type === 'warn').length;
  let html = `<div style="margin-bottom:10px"><b class="err">${errors} errors</b> · <b class="warn">${warns} warnings</b> · ${issues.length} ${t('errorsFound')}</div>`;
  issues.forEach(i => {
    html += `<div class="issue ${i.type==='warn'?'warn':''}"><span class="${i.type==='error'?'err':'warn'}">${i.type === 'error' ? '✗' : '⚠'}</span> ${escapeHtml(i.msg)} <span class="loc">(line ${i.line || '?'})</span></div>`;
  });
  $('#output').innerHTML = html;
}

function escapeHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
