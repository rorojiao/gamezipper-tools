function formatSQL(sql) {
  const keywords = ['SELECT','FROM','WHERE','AND','OR','ORDER BY','GROUP BY','HAVING','LIMIT','JOIN','LEFT JOIN','RIGHT JOIN','INNER JOIN','ON','AS','IN','NOT','IS','NULL','LIKE','BETWEEN','INSERT INTO','UPDATE','DELETE','CREATE TABLE','DROP','SET','VALUES','DISTINCT','COUNT','SUM','AVG','MIN','MAX','CASE','WHEN','THEN','ELSE','END','ASC','DESC','UNION'];

  let formatted = sql.trim();
  // Normalize whitespace
  formatted = formatted.replace(/\s+/g, ' ');

  // Add newlines before major keywords
  const major = ['SELECT','FROM','WHERE','ORDER BY','GROUP BY','HAVING','LIMIT','LEFT JOIN','RIGHT JOIN','INNER JOIN','JOIN','ON'];
  major.forEach(kw => {
    const regex = new RegExp('\\b' + kw.replace(/ /g, '\\s+') + '\\b', 'gi');
    formatted = formatted.replace(regex, '\n' + kw.toUpperCase());
  });

  // Indent sub-keywords
  const sub = ['AND','OR','LEFT JOIN','RIGHT JOIN','INNER JOIN','ON'];
  sub.forEach(kw => {
    const regex = new RegExp('\\n' + kw.replace(/ /g, '\\s+'), 'gi');
    formatted = formatted.replace(regex, '\n  ' + kw.toUpperCase());
  });

  // Uppercase keywords
  keywords.forEach(kw => {
    const regex = new RegExp('\\b' + kw.replace(/ /g, '\\s+') + '\\b', 'gi');
    // Only uppercase standalone keywords not already handled
  });

  return formatted.trim();
}

function parseSimpleSelect(sql) {
  const startTime = performance.now();

  try {
    let query = sql.trim();

    // Normalize
    query = query.replace(/;\s*$/, '');

    // Handle SELECT *
    const selectMatch = query.match(/^SELECT\s+(.+?)\s+FROM\s+(\w+)(?:\s+(.*))?$/i);
    if (!selectMatch) {
      throw new Error('Only SELECT queries are supported. Example: SELECT * FROM users WHERE age > 30');
    }

    let selectPart = selectMatch[1].trim();
    let tableName = selectMatch[2].trim().toLowerCase();
    let rest = selectMatch[3] || '';

    if (!DB[tableName]) {
      throw new Error(`Table "${tableName}" not found. Available: users, orders`);
    }

    let data = [...DB[tableName]];
    let columns = null;

    // Parse SELECT columns
    if (selectPart === '*') {
      columns = null; // all columns
    } else {
      columns = selectPart.split(',').map(c => {
        const parts = c.trim().split(/\s+[Aa][Ss]\s+/);
        return { expr: parts[0].trim(), alias: parts[1]?.trim() || parts[0].trim() };
      });
    }

    // Parse WHERE
    let whereMatch = rest.match(/WHERE\s+(.+?)(?:\s+ORDER|\s+GROUP|\s+LIMIT|$)/i);
    if (whereMatch) {
      const condition = whereMatch[1].trim();
      data = applyWhere(data, condition);
    }

    // Parse ORDER BY
    let orderMatch = rest.match(/ORDER\s+BY\s+(\w+)(?:\s+(ASC|DESC))?(?:\s+LIMIT|\s+GROUP|$)/i);
    if (orderMatch) {
      const col = orderMatch[1];
      const dir = (orderMatch[2] || 'ASC').toUpperCase();
      data.sort((a, b) => {
        const va = a[col], vb = b[col];
        if (typeof va === 'number') return dir === 'ASC' ? va - vb : vb - va;
        return dir === 'ASC' ? String(va).localeCompare(String(vb)) : String(vb).localeCompare(String(va));
      });
    }

    // Parse LIMIT
    let limitMatch = rest.match(/LIMIT\s+(\d+)/i);
    if (limitMatch) {
      data = data.slice(0, parseInt(limitMatch[1]));
    }

    // Build result
    const elapsed = performance.now() - startTime;

    if (columns) {
      // Handle aggregate functions
      const hasAgg = columns.some(c => /^(COUNT|SUM|AVG|MIN|MAX)\(/i.test(c.expr));
      if (hasAgg) {
        const aggResult = {};
        columns.forEach(c => {
          const aggMatch = c.expr.match(/^(COUNT|SUM|AVG|MIN|MAX)\((.+?)\)$/i);
          if (aggMatch) {
            const fn = aggMatch[1].toUpperCase();
            const field = aggMatch[2].trim();
            const key = c.alias;
            if (fn === 'COUNT') aggResult[key] = data.length;
            else if (fn === 'SUM') aggResult[key] = data.reduce((s, r) => s + (Number(r[field]) || 0), 0);
            else if (fn === 'AVG') aggResult[key] = data.length ? Math.round(data.reduce((s, r) => s + (Number(r[field]) || 0), 0) / data.length * 100) / 100 : 0;
            else if (fn === 'MIN') aggResult[key] = Math.min(...data.map(r => r[field]));
            else if (fn === 'MAX') aggResult[key] = Math.max(...data.map(r => r[field]));
          } else {
            aggResult[c.alias] = data[0]?.[c.expr] || null;
          }
        });
        renderTable([aggResult]);
      } else {
        const projected = data.map(row => {
          const obj = {};
          columns.forEach(c => { obj[c.alias] = row[c.expr]; });
          return obj;
        });
        renderTable(projected);
      }
    } else {
      renderTable(data);
    }

    const rowCount = data.length;
    $('#result-info').textContent = `${rowCount} ${rowCount === 1 ? t('row') : t('rows')} ${t('inMs')} ${elapsed.toFixed(1)}ms`;

  } catch(e) {
    $('#result-area').innerHTML = `<div class="error-msg">${t('error')}: ${e.message}</div>`;
    $('#result-info').textContent = '';
  }
}

function applyWhere(data, condition) {
  // Simple condition parser: field op value [AND/OR field op value ...]
  const parts = condition.split(/\s+(AND|OR)\s+/i);
  return data.filter(row => {
    let result = null;
    for (let i = 0; i < parts.length; i += 2) {
      const cond = parts[i].trim();
      const bool = evaluateCondition(row, cond);
      if (result === null) {
        result = bool;
      } else {
        const op = parts[i - 1]?.toUpperCase();
        result = op === 'OR' ? result || bool : result && bool;
      }
    }
    return result;
  });
}

function evaluateCondition(row, cond) {
  // Parse: field op value
  const match = cond.match(/^(\w+)\s*(>=|<=|!=|<>|=|>|<|LIKE|IN)\s*(.+)$/i);
  if (!match) return true;
  const field = match[1];
  const op = match[2].toUpperCase();
  let val = match[3].trim().replace(/^['"]|['"]$/g, '');

  const rowVal = row[field];
  if (rowVal === undefined) return false;

  if (op === '=') return String(rowVal) === val || (typeof rowVal === 'number' && rowVal === Number(val));
  if (op === '!=' || op === '<>') return String(rowVal) !== val && rowVal !== Number(val);
  if (op === '>') return typeof rowVal === 'number' ? rowVal > Number(val) : String(rowVal) > val;
  if (op === '<') return typeof rowVal === 'number' ? rowVal < Number(val) : String(rowVal) < val;
  if (op === '>=') return typeof rowVal === 'number' ? rowVal >= Number(val) : String(rowVal) >= val;
  if (op === '<=') return typeof rowVal === 'number' ? rowVal <= Number(val) : String(rowVal) <= val;
  if (op === 'LIKE') {
    const pattern = val.replace(/%/g, '.*').replace(/_/g, '.');
    return new RegExp('^' + pattern + '$', 'i').test(String(rowVal));
  }
  return false;
}

function renderTable(data) {
  if (!data.length) {
    $('#result-area').innerHTML = `<div style="padding:12px;color:var(--text3)">${t('noResults')}</div>`;
    return;
  }
  const keys = Object.keys(data[0]);
  let html = '<table class="sql-table"><thead><tr>';
  keys.forEach(k => html += `<th>${k}</th>`);
  html += '</tr></thead><tbody>';
  data.forEach(row => {
    html += '<tr>';
    keys.forEach(k => html += `<td>${row[k] !== undefined ? row[k] : ''}</td>`);
    html += '</tr>';
  });
  html += '</tbody></table>';
  $('#result-area').innerHTML = html;
}

function loadExample() {
