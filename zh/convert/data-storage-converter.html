<script>
GZI18n.register({
  en: {
    toolTitle: 'Data Storage Converter',
    toolDesc: 'Convert between bytes, KB, MB, GB, TB, PB and bits instantly. Switch between binary (1024) and decimal (1000) units.',
    inputValue: 'Value',
    unit: 'Unit',
    baseMode: 'Unit System',
    step1: 'Enter the data size value you want to convert',
    step2: 'Pick the source unit (bytes, KB, MB, GB, etc.)',
    step3: 'Choose Binary (1024) for RAM and Windows, or Decimal (1000) for disk and SI',
    step4: 'Copy any result with one click',
    hint: 'Pick 1024 for memory/RAM and Windows file sizes, 1000 for hard drives, SSDs and network speeds (SI).',
    copyVal: 'Copy',
  },
  zh: {
    toolTitle: '数据存储单位转换器',
    toolDesc: '即时在字节、KB、MB、GB、TB、PB 和比特之间转换。可在二进制（1024）和十进制（1000）之间切换。',
    inputValue: '数值',
    unit: '单位',
    baseMode: '进制',
    step1: '输入要转换的数据大小',
    step2: '选择源单位（字节、KB、MB、GB 等）',
    step3: '选择二进制（1024）用于内存/Windows，或十进制（1000）用于硬盘/SI',
    step4: '一键复制任意结果',
    hint: '内存、RAM 和 Windows 文件大小用 1024；硬盘、SSD 和网速（SI）用 1000。',
    copyVal: '复制',
  }
});

const UNITS = [
  { id: 'bit',   label: 'Bit (b)',           zhLabel: '比特 (b)',        factor: 1/8 },
  { id: 'B',     label: 'Byte (B)',          zhLabel: '字节 (B)',        factor: 1 },
  { id: 'KB',    label: 'KB / KiB',          zhLabel: 'KB / KiB',        factor: 'kilo' },
  { id: 'MB',    label: 'MB / MiB',          zhLabel: 'MB / MiB',        factor: 'mega' },
  { id: 'GB',    label: 'GB / GiB',          zhLabel: 'GB / GiB',        factor: 'giga' },
  { id: 'TB',    label: 'TB / TiB',          zhLabel: 'TB / TiB',        factor: 'tera' },
  { id: 'PB',    label: 'PB / PiB',          zhLabel: 'PB / PiB',        factor: 'peta' },
  { id: 'EB',    label: 'EB / EiB',          zhLabel: 'EB / EiB',        factor: 'exa' },
];

const lang = GZI18n.getLang();
const { $, copyText, t } = GZ;

const unitSel = $('#input-unit');
UNITS.forEach(u => {
  const opt = document.createElement('option');
  opt.value = u.id;
  opt.textContent = lang === 'zh' ? u.zhLabel : u.label;
  if (u.id === 'MB') opt.selected = true;
  unitSel.appendChild(opt);
});

function getBytes(value, unitId, base) {
  const u = UNITS.find(x => x.id === unitId);
  if (u.factor === 'kilo') return value * base;
  if (u.factor === 'mega') return value * base * base;
  if (u.factor === 'giga') return value * base * base * base;
  if (u.factor === 'tera') return value * Math.pow(base, 4);
  if (u.factor === 'peta') return value * Math.pow(base, 5);
  if (u.factor === 'exa')  return value * Math.pow(base, 6);
  return value * u.factor; // bit or byte
}

function formatNum(n) {
  if (!isFinite(n)) return '—';
  if (n === 0) return '0';
  const abs = Math.abs(n);
  if (abs >= 1e15 || abs < 1e-4) return n.toExponential(4);
  if (abs >= 1) return n.toLocaleString(undefined, { maximumFractionDigits: 6 });
  return n.toPrecision(6);
}

function convert() {
  const value = parseFloat($('#input-value').value);
  const unitId = unitSel.value;
  const base = parseInt($('#base-mode').value, 10);
  if (isNaN(value)) { $('#grid').innerHTML = ''; $('#status').textContent = ''; return; }
  const bytes = getBytes(value, unitId, base);
  const grid = $('#grid');
  grid.innerHTML = '';
  UNITS.forEach(u => {
    let v;
    if (u.id === 'bit') v = bytes * 8;
    else if (u.id === 'B') v = bytes;
    else {
      const exp = { KB:1, MB:2, GB:3, TB:4, PB:5, EB:6 }[u.id];
      v = bytes / Math.pow(base, exp);
    }
    const cell = document.createElement('div');
    cell.className = 'conv-cell';
    const label = lang === 'zh' ? u.zhLabel : u.label;
    cell.innerHTML = `<span class="u">${label}</span><span class="v" title="${formatNum(v)}">${formatNum(v)}</span>`;
    cell.style.cursor = 'pointer';
    cell.onclick = () => copyText(formatNum(v));
    grid.appendChild(cell);
  });
  $('#status').innerHTML = `<span style="color:var(--text3);font-size:0.8rem">${value} ${unitId} = ${formatNum(bytes)} B (${base === 1024 ? 'binary' : 'decimal'})</span>`;
}

$('#input-value').addEventListener('input', convert);
unitSel.addEventListener('change', convert);
$('#base-mode').addEventListener('change', convert);

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="copyText($('#grid').textContent)">${t('copyVal')}</button>`;

$('#hint').textContent = t('hint');

GZ.renderToolPage({
  category: 'convert',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🔢', href:'/convert/number-base.html', name:'Number Base'},
    {icon:'📊', href:'/convert/csv-to-json.html', name:'CSV to JSON'},
    {icon:'📏', href:'/convert/unit.html', name:'Unit Converter'},
    {icon:'🎨', href:'/convert/color.html', name:'Color Converter'},
  ]
});

convert();
</script>
