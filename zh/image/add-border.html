<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div id="dropzone">
      <div class="drop-icon">🖼️</div>
      <p id="dropzone-text"></p>
      <button class="gz-btn" id="select-btn"></button>
      <input type="file" id="file-input" accept="image/png,image/jpeg,image/webp,image/gif,image/bmp">
    </div>
    <div id="controls">
      <div class="field-row">
        <label id="lbl-width"></label>
        <input type="range" id="width" min="0" max="200" value="20">
        <span class="val" id="width-val">20</span>
      </div>
      <div class="field-row">
        <label id="lbl-padding"></label>
        <input type="range" id="padding" min="0" max="150" value="0">
        <span class="val" id="padding-val">0</span>
      </div>
      <div class="field-row">
        <label id="lbl-radius"></label>
        <input type="range" id="radius" min="0" max="200" value="0">
        <span class="val" id="radius-val">0</span>
      </div>
      <div class="field-row">
        <label id="lbl-color"></label>
        <input type="color" id="color" value="#000000">
        <div class="chk"><input type="checkbox" id="transparent-bg"><label for="transparent-bg" id="lbl-transparent"></label></div>
      </div>
      <div id="canvas-wrap"><canvas id="canvas"></canvas></div>
    </div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>

<script>
GZI18n.register({
  en: {
    toolTitle: 'Add Border to Image',
    toolDesc: 'Add a border or frame to any image online. Adjustable width, color, padding and corner radius. Free and browser-based, no upload.',
    selectBtn: 'Select Image',
    dropzone: 'Drop an image here or click to upload',
    width: 'Border Width',
    padding: 'Padding',
    radius: 'Corner Radius',
    color: 'Border Color',
    transparent: 'Transparent outside (PNG)',
    downloadPng: 'Download PNG',
    downloadJpg: 'Download JPG',
    newImage: 'New Image',
    step1: 'Upload or drag and drop an image',
    step2: 'Drag Border Width and pick a color',
    step3: 'Optionally add padding or round the corners',
    step4: 'Download the framed image as PNG or JPG',
  },
  zh: {
    toolTitle: '图片加边框工具',
    toolDesc: '在线为图片添加边框或相框。可调整宽度、颜色、内边距和圆角半径。免费，浏览器本地处理，无需上传。',
    selectBtn: '选择图片',
    dropzone: '拖拽图片到此处或点击上传',
    width: '边框宽度',
    padding: '内边距',
    radius: '圆角半径',
    color: '边框颜色',
    transparent: '外部透明（PNG）',
    downloadPng: '下载 PNG',
    downloadJpg: '下载 JPG',
    newImage: '换张图片',
    step1: '上传或拖拽图片到页面',
    step2: '拖动边框宽度并选择颜色',
    step3: '可选添加内边距或圆角',
    step4: '下载加边框后的图片为 PNG 或 JPG',
  }
});

const { $, t } = GZ;
let origImg = null;
let dims = { w: 0, h: 0 };
const canvas = $('#canvas');
const ctx = canvas.getContext('2d');

function loadImage(file){
  const r=new FileReader();
  r.onload=e=>{origImg=new Image();origImg.onload=()=>{
    const maxSide=1600;let s=1;
    if(Math.max(origImg.width,origImg.height)>maxSide)s=maxSide/Math.max(origImg.width,origImg.height);
    dims.w=Math.round(origImg.width*s);dims.h=Math.round(origImg.height*s);
    $('#controls').style.display='block';$('#dropzone').style.display='none';render();
  };origImg.src=e.target.result;};
  r.readAsDataURL(file);
}

function roundedPath(c,x,y,w,h,r){
  r=Math.max(0,Math.min(r,Math.min(w,h)/2));
  c.beginPath();c.moveTo(x+r,y);
  c.arcTo(x+w,y,x+w,y+h,r);c.arcTo(x+w,y+h,x,y+h,r);
  c.arcTo(x,y+h,x,y,r);c.arcTo(x,y,x+w,y,r);c.closePath();
}

function render(){
  if(!origImg)return;
  const w=dims.w,h=dims.h;
  const bw=+$('#width').value, pad=+$('#padding').value, radius=+$('#radius').value;
  const outW=w+bw*2+pad*2, outH=h+bw*2+pad*2;
  canvas.width=outW;canvas.height=outH;
  ctx.clearRect(0,0,outW,outH);
  // outer fill
  if(!$('#transparent-bg').checked){ctx.fillStyle=$('#color').value;ctx.fillRect(0,0,outW,outH);}
  else{
    // draw border ring only (so corners outside radius are transparent), then padding area transparent
    ctx.save();
    roundedPath(ctx,0,0,outW,outH,radius);
    ctx.clip();
    ctx.fillStyle=$('#color').value;ctx.fillRect(0,0,outW,outH);
    ctx.restore();
  }
  // clip outer to radius for the whole frame
  // image area: inset by bw+pad, optionally with rounded corners (radius minus bw, min 0)
  const imgX=bw+pad, imgY=bw+pad;
  ctx.save();
  roundedPath(ctx,imgX,imgY,w,h,Math.max(0,radius-bw));
  ctx.clip();
  ctx.drawImage(origImg,imgX,imgY,w,h);
  ctx.restore();
}

function download(type){
  if(!origImg)return;
  const a=document.createElement('a');
  a.href=canvas.toDataURL(type==='jpg'?'image/jpeg':'image/png',0.92);
  a.download='image-with-border.'+(type==='jpg'?'jpg':'png');a.click();
}

['width','padding','radius'].forEach(id=>$('#'+id).addEventListener('input',()=>{$('#'+id+'-val').textContent=$('#'+id).value;render();}));
$('#color').addEventListener('input',render);
$('#transparent-bg').onchange=render;

$('#select-btn').textContent=t('selectBtn');$('#dropzone-text').textContent=t('dropzone');
$('#lbl-width').textContent=t('width');$('#lbl-padding').textContent=t('padding');
$('#lbl-radius').textContent=t('radius');$('#lbl-color').textContent=t('color');$('#lbl-transparent').textContent=t('transparent');

$('#dropzone').onclick=()=>$('#file-input').click();
$('#file-input').onchange=e=>{if(e.target.files[0])loadImage(e.target.files[0]);};
['dragover'].forEach(ev=>$('#dropzone').addEventListener(ev,e=>{e.preventDefault();$('#dropzone').classList.add('dragover');}));
['dragleave','drop'].forEach(ev=>$('#dropzone').addEventListener(ev,e=>{e.preventDefault();$('#dropzone').classList.remove('dragover');}));
$('#dropzone').addEventListener('drop',e=>{if(e.dataTransfer.files[0])loadImage(e.dataTransfer.files[0]);});

$('#toolbar').innerHTML=`
  <button class="gz-btn" onclick="download('png')">${t('downloadPng')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="download('jpg')">${t('downloadJpg')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="document.getElementById('dropzone').style.display='block';document.getElementById('controls').style.display='none';">${t('newImage')}</button>`;

GZ.renderToolPage({
  category: 'image',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🔘', href:'/image/round-corners.html', name:'Round Corners'},
    {icon:'⭕', href:'/image/circle-cropper.html', name:'Circle Cropper'},
    {icon:'🔠', href:'/image/add-text-to-image.html', name:'Add Text to Image'},
    {icon:'🔄', href:'/image/image-rotator.html', name:'Image Rotator'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
