<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"What is the difference between em, rem and px?","acceptedAnswer":{"@type":"Answer","text":"px (pixels) is an absolute unit. em is relative to the font-size of the parent element. rem is relative to the root (html) font-size, which is typically 16px. rem is best for global scaling and accessibility."}},{"@type":"Question","name":"What is vw and vh in CSS?","acceptedAnswer":{"@type":"Answer","text":"vw (viewport width) and vh (viewport height) are units relative to the browser viewport size. 1vw = 1% of viewport width, 1vh = 1% of viewport height. They are perfect for responsive layouts and full-screen elements."}},{"@type":"Question","name":"Why should I use rem instead of px?","acceptedAnswer":{"@type":"Answer","text":"Using rem units makes your design more accessible and responsive. When users change the browser base font-size for accessibility, rem-based typography scales accordingly. This improves readability for users with visual impairments."}},{"@type":"Question","name":"How do I convert px to em?","acceptedAnswer":{"@type":"Answer","text":"Divide the pixel value by the parent's font-size. For example, if the parent has font-size: 16px, then 24px = 24/16 = 1.5em. Use the tool above to convert instantly with custom base font size."}}]}</script>

<script>
GZI18n.register({
en:{
toolTitle:'CSS Unit Converter',
toolDesc:'Convert between CSS units (px, em, rem, vw, vh, %, pt, in) with live preview and custom base font size.',
lblBase:'Base font-size (px)',
lblVw:'Viewport width (px)',
lblVh:'Viewport height (px)',
lblPreview:'Live preview (text scales to your px value):',
refTitle:'Common Typography Reference',
btnExample:'Example (16px)',
btnClear:'Clear',
btnCopyTable:'Copy Reference Table',
step1:'Enter a value in any unit field — all other units update instantly',
step2:'Adjust the base font-size and viewport dimensions to match your design',
step3:'Watch the live preview box scale to match the px value',
step4:'Reference table at the bottom shows common typography conversions',
},
zh:{
toolTitle:'CSS 单位转换器',
toolDesc:'在 CSS 单位之间转换（px、em、rem、vw、vh、%、pt、in），支持实时预览和自定义基准字号。',
lblBase:'基准字号 (px)',
lblVw:'视口宽度 (px)',
lblVh:'视口高度 (px)',
lblPreview:'实时预览（文本按 px 值缩放）：',
refTitle:'常见排版参考',
btnExample:'示例 (16px)',
btnClear:'清空',
btnCopyTable:'复制参考表',
step1:'在任意单位输入框中输入值 — 其他单位即时更新',
step2:'调整基准字号和视口尺寸以匹配设计',
step3:'观察预览框按 px 值缩放',
step4:'底部参考表显示常见排版转换',
}
});

const { $, t } = GZ;
const units = ['px','em','rem','pct','vw','vh','pt','in'];
let lastEdited = null;

// Build reference table once
const refBody = $('#ref-body');
const refData = [12,14,16,18,20,24,32,40,48,64];
refBody.innerHTML = refData.map(px => {
const rem = (px/16).toFixed(3);
const em = (px/16).toFixed(3);
const pt = (px*0.75).toFixed(2);
const pct = (px/16*100).toFixed(1);
return `<tr><td>${px}px</td><td>${rem}rem</td><td>${em}em</td><td>${pt}pt</td><td>${pct}%</td></tr>`;
}).join('');

function getConfig() {
return {
basePx: parseFloat($('#basePx').value) || 16,
viewportW: parseFloat($('#viewportW').value) || 1280,
viewportH: parseFloat($('#viewportH').value) || 720
};
}

function convert(from) {
const cfg = getConfig();
const v = parseFloat($('#' + from).value);
if (isNaN(v)) {
units.filter(u => u !== from).forEach(u => $('#u-' + u).value = '');
$('#preview').style.fontSize = '16px';
return;
}

// Normalize to px first
let px = 0;
if (from === 'px') px = v;
else if (from === 'em') px = v * cfg.basePx;
else if (from === 'rem') px = v * cfg.basePx;
else if (from === 'pct') px = v * cfg.basePx / 100;
else if (from === 'vw') px = v * cfg.viewportW / 100;
else if (from === 'vh') px = v * cfg.viewportH / 100;
else if (from === 'pt') px = v * 1.3333333;
else if (from === 'in') px = v * 96;

// Now convert px to all other units
const out = {
px: px,
em: px / cfg.basePx,
rem: px / cfg.basePx,
pct: px / cfg.basePx * 100,
vw: px / cfg.viewportW * 100,
vh: px / cfg.viewportH * 100,
pt: px / 1.3333333,
in: px / 96
};

units.forEach(u => {
if (u !== from) {
const val = out[u];
$('#u-' + u).value = (val < 0.0001 && val !== 0) ? val.toExponential(3) : (Math.round(val * 10000) / 10000);
}
});

// Update preview
const displayPx = Math.max(8, Math.min(200, px));
$('#preview').style.fontSize = displayPx + 'px';
}

// Wire inputs
units.forEach(u => {
$('#u-' + u).addEventListener('input', () => convert('u-' + u));
});
$('#basePx').addEventListener('input', () => {
if (lastEdited) convert(lastEdited);
});
$('#viewportW').addEventListener('input', () => {
if (lastEdited === 'u-vw' || lastEdited === 'u-vh') convert(lastEdited);
});
$('#viewportH').addEventListener('input', () => {
if (lastEdited === 'u-vw' || lastEdited === 'u-vh') convert(lastEdited);
});
// Track which field was last edited
document.querySelectorAll('.unit-row input').forEach(inp => {
inp.addEventListener('focus', e => { lastEdited = e.target.id; });
});

function loadExample() {
$('#u-px').value = 16;
convert('u-px');
}
function doClear() {
units.forEach(u => $('#u-' + u).value = '');
$('#preview').style.fontSize = '16px';
}

$('#toolbar').innerHTML = `
<button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('btnExample')}</button>
<button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('btnClear')}</button>
<button class="gz-btn gz-btn-secondary" onclick="GZ.copyText(document.querySelector('.ref-table').outerText)">${t('btnCopyTable')}</button>`;

GZ.renderToolPage({
category:'dev',
titleKey:'toolTitle',
descKey:'toolDesc',
howToSteps:['step1','step2','step3','step4'],
related:[
{icon:'📏',href:'/dev/rem-px.html',name:'REM ↔ PX'},
{icon:'📐',href:'/css-tools/clamp.html',name:'CSS Clamp'},
{icon:'🔢',href:'/convert/number-base.html',name:'Number Base'},
{icon:'🎨',href:'/color/hex-rgb.html',name:'HEX ↔ RGB'},
]
});
</script>
<script src="/tools-result-rec.js" defer></script>
