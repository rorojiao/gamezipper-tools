<script type="application/ld+json">{"@context":"https://schema.org","@type":"WebApplication","name":"Picture Hanging Calculator","description":"Free picture hanging calculator. Find the exact nail height and picture frame spacing for a gallery wall. Enter frame size, eye level and wall width — runs in your browser.","url": "https://tools.gamezipper.com/zh/calc/picture-hanging-calculator.html","applicationCategory":"Utility","operatingSystem":"Web Browser","offers":{"@type":"Offer","price":"0"}}</script>
<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"At what height should I hang a picture?","acceptedAnswer":{"@type":"Answer","text":"The standard rule is to hang the center of the picture at eye level, about 145 cm (57 inches) from the floor. Adjust the nail height based on the frame height and where the wire or hook sits."}},{"@type":"Question","name":"How do I calculate the nail position for a picture?","acceptedAnswer":{"@type":"Answer","text":"Subtract the distance from the top of the frame to the hanging wire/hook from the nail height. Nail height = eye level (57 in) + half the frame height − distance from top to wire."}},{"@type":"Question","name":"How much space should I leave between picture frames?","acceptedAnswer":{"@type":"Answer","text":"For a gallery wall, 5–8 cm (2–3 inches) between frames is standard. This calculator divides the available wall width evenly so every gap is identical."}},{"@type":"Question","name":"Does this work in inches and centimeters?","acceptedAnswer":{"@type":"Answer","text":"Yes. Pick your unit (in or cm) at the top. All inputs and outputs use the same unit so you can measure and mark with one tape measure."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="mode-tabs">
      <button class="mode-tab active" id="tab-single" onclick="setMode('single')"></button>
      <button class="mode-tab" id="tab-gallery" onclick="setMode('gallery')"></button>
    </div>
    <div class="gz-form" id="form">
      <div class="form-row">
        <div>
          <label id="lbl-unit"></label>
          <select id="unit">
            <option value="in">inches</option>
            <option value="cm">cm</option>
          </select>
        </div>
        <div>
          <label id="lbl-eyelevel"></label>
          <input type="number" id="eyelevel" value="57" min="0" step="0.5">
        </div>
      </div>
      <div id="single-fields">
        <div class="form-row">
          <div>
            <label id="lbl-frame-h"></label>
            <input type="number" id="frame-h" value="18" min="0" step="0.1">
          </div>
          <div>
            <label id="lbl-wire"></label>
            <input type="number" id="wire" value="2" min="0" step="0.1">
          </div>
        </div>
      </div>
      <div id="gallery-fields" style="display:none">
        <div class="form-row">
          <div>
            <label id="lbl-wall-w"></label>
            <input type="number" id="wall-w" value="120" min="0" step="0.1">
          </div>
          <div>
            <label id="lbl-frame-count"></label>
            <input type="number" id="frame-count" value="3" min="1" max="20" step="1">
          </div>
        </div>
        <div class="form-row">
          <div>
            <label id="lbl-gframe-w"></label>
            <input type="number" id="gframe-w" value="16" min="0" step="0.1">
          </div>
          <div>
            <label id="lbl-gframe-h"></label>
            <input type="number" id="gframe-h" value="20" min="0" step="0.1">
          </div>
        </div>
        <div>
          <label id="lbl-gwire"></label>
          <input type="number" id="gwire" value="2" min="0" step="0.1">
        </div>
      </div>
      <button class="gz-btn" onclick="calculate()" id="btn-calc"></button>
    </div>
    <div class="result-card" id="result">
      <div class="big" id="result-main"></div>
      <div class="sub" id="result-sub"></div>
      <div class="result-grid" id="result-grid"></div>
      <div class="diagram" id="diagram"></div>
    </div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Picture Hanging & Frame Spacing Calculator',
    toolDesc: 'Find the perfect nail height for one picture, or evenly space frames on a gallery wall. Enter frame sizes and eye level — runs in your browser.',
    single: 'Single Picture',
    gallery: 'Gallery Wall',
    lblUnit: 'Unit',
    lblEyelevel: 'Eye Level (center height)',
    lblFrameH: 'Frame Height',
    lblWire: 'Wire Drop (top of frame to wire)',
    lblWallW: 'Wall Width',
    lblFrameCount: 'Number of Frames',
    lblGframeW: 'Frame Width',
    lblGframeH: 'Frame Height',
    lblGwire: 'Wire Drop (top to wire)',
    btnCalc: 'Calculate',
    nailHeight: 'Nail Height from Floor',
    spacing: 'Gap Between Frames',
    sideMargin: 'Side Margin',
    measureFromFloor: 'from floor',
    step1: 'Choose Single Picture or Gallery Wall mode',
    step2: 'Set the unit (inches or cm) and your eye-level height',
    step3: 'Enter the frame height and the wire drop (distance from top of frame to the taut wire)',
    step4: 'Read the nail height and mark your wall — for galleries, use the spacing and side margins',
  },
  zh: {
    toolTitle: '挂画高度 & 画廊墙间距计算器',
    toolDesc: '计算单幅画的精准钉子高度，或在画廊墙上均匀排布多幅画框。输入画框尺寸和视线高度 — 浏览器本地运行。',
    single: '单幅画',
    gallery: '画廊墙',
    lblUnit: '单位',
    lblEyelevel: '视线高度（画面中心高度）',
    lblFrameH: '画框高度',
    lblWire: '挂线下垂（画框顶部到拉紧的挂线）',
    lblWallW: '墙面宽度',
    lblFrameCount: '画框数量',
    lblGframeW: '画框宽度',
    lblGframeH: '画框高度',
    lblGwire: '挂线下垂（顶部到挂线）',
    btnCalc: '计算',
    nailHeight: '钉子距地高度',
    spacing: '画框间距',
    sideMargin: '两侧留白',
    measureFromFloor: '距地面',
    step1: '选择「单幅画」或「画廊墙」模式',
    step2: '设置单位（英寸或厘米）和视线高度',
    step3: '输入画框高度和挂线下垂（画框顶部到拉紧挂线的距离）',
    step4: '读取钉子高度并在墙上标记 — 画廊模式可使用间距和两侧留白',
  }
});

const { $, t } = GZ;
let mode = 'single';

['tab-single','tab-gallery'].forEach(id => $('#'+id).textContent = t(id==='tab-single'?'single':'gallery'));
$('#lbl-unit').textContent = t('lblUnit');
$('#lbl-eyelevel').textContent = t('lblEyelevel');
$('#lbl-frame-h').textContent = t('lblFrameH');
$('#lbl-wire').textContent = t('lblWire');
$('#lbl-wall-w').textContent = t('lblWallW');
$('#lbl-frame-count').textContent = t('lblFrameCount');
$('#lbl-gframe-w').textContent = t('lblGframeW');
$('#lbl-gframe-h').textContent = t('lblGframeH');
$('#lbl-gwire').textContent = t('lblGwire');
$('#btn-calc').textContent = t('btnCalc');

function setMode(m) {
  mode = m;
  $('#tab-single').classList.toggle('active', m==='single');
  $('#tab-gallery').classList.toggle('active', m==='gallery');
  $('#single-fields').style.display = m==='single' ? '' : 'none';
  $('#gallery-fields').style.display = m==='gallery' ? '' : 'none';
  calculate();
}

function calculate() {
  const u = $('#unit').value;
  const suffix = u === 'in' ? '"' : ' cm';
  const eye = parseFloat($('#eyelevel').value) || 0;

  if (mode === 'single') {
    const fh = parseFloat($('#frame-h').value) || 0;
    const wire = parseFloat($('#wire').value) || 0;
    // center of frame at eye level; nail sits above center by (fh/2 - wire)
    const nail = eye + fh/2 - wire;
    $('#result-main').textContent = nail.toFixed(1) + suffix;
    $('#result-sub').textContent = t('nailHeight') + ' (' + t('measureFromFloor') + ')';
    $('#result-grid').innerHTML = `
      <div class="result-item"><div class="val">${eye.toFixed(1)}${suffix}</div><div class="lbl">${t('lblEyelevel')}</div></div>
      <div class="result-item"><div class="val">${(fh/2).toFixed(1)}${suffix}</div><div class="lbl">½ ${t('lblFrameH')}</div></div>
      <div class="result-item"><div class="val">${wire.toFixed(1)}${suffix}</div><div class="lbl">${t('lblWire')}</div></div>
      <div class="result-item"><div class="val">${(eye - fh/2).toFixed(1)}${suffix}</div><div class="lbl">Frame Bottom</div></div>`;
    drawSingleDiagram(nail, eye, fh, wire, suffix);
  } else {
    const ww = parseFloat($('#wall-w').value) || 0;
    const n = Math.max(1, parseInt($('#frame-count').value) || 1);
    const fw = parseFloat($('#gframe-w').value) || 0;
    const fh = parseFloat($('#gframe-h').value) || 0;
    const wire = parseFloat($('#gwire').value) || 0;
    const totalFrameW = n * fw;
    const gapSpace = ww - totalFrameW;
    const gap = n > 1 ? gapSpace / (n + 1) : gapSpace / 2;
    const nail = eye + fh/2 - wire;
    $('#result-main').textContent = gap.toFixed(1) + suffix;
    $('#result-sub').textContent = t('spacing') + ' · ' + t('nailHeight') + ' = ' + nail.toFixed(1) + suffix;
    $('#result-grid').innerHTML = `
      <div class="result-item"><div class="val">${nail.toFixed(1)}${suffix}</div><div class="lbl">${t('nailHeight')}</div></div>
      <div class="result-item"><div class="val">${gap.toFixed(1)}${suffix}</div><div class="lbl">${t('spacing')}</div></div>
      <div class="result-item"><div class="val">${(ww - totalFrameW - gap*(n-1)).toFixed(1)}${suffix}</div><div class="lbl">${t('sideMargin')}</div></div>
      <div class="result-item"><div class="val">${n}</div><div class="lbl">${t('lblFrameCount')}</div></div>`;
    drawGalleryDiagram(ww, n, fw, gap, suffix);
  }
}

function drawSingleDiagram(nail, eye, fh, wire, suffix) {
  const scale = 5;
  const floorY = 240;
  const cx = 200;
  const eyeY = floorY - eye*scale;
  const topY = floorY - (eye + fh/2)*scale;
  const botY = floorY - (eye - fh/2)*scale;
  const nailY = floorY - nail*scale;
  $('#diagram').innerHTML = `
    <svg viewBox="0 0 400 260" width="400">
      <rect x="0" y="${floorY}" width="400" height="6" fill="#4a5568"/>
      <text x="6" y="${floorY+18}" font-size="11" fill="#888">Floor</text>
      <rect x="${cx-60}" y="${topY}" width="120" height="${botY-topY}" fill="none" stroke="var(--accent)" stroke-width="2" rx="3"/>
      <line x1="${cx-70}" y1="${eyeY}" x2="${cx+70}" y2="${eyeY}" stroke="var(--accent2)" stroke-dasharray="4 3"/>
      <text x="${cx+74}" y="${eyeY+4}" font-size="11" fill="var(--accent2)">Eye ${eye.toFixed(0)}${suffix}</text>
      <circle cx="${cx}" cy="${nailY}" r="4" fill="var(--accent)"/>
      <line x1="${cx-50}" y1="${nailY}" x2="${cx+50}" y2="${nailY}" stroke="#888" stroke-dasharray="2 2"/>
      <text x="${cx+54}" y="${nailY+4}" font-size="11" fill="var(--accent)">Nail ${nail.toFixed(1)}${suffix}</text>
    </svg>`;
}

function drawGalleryDiagram(ww, n, fw, gap, suffix) {
  const scale = Math.min(360/ww, 4);
  const startX = 20;
  const y = 60;
  let svg = `<svg viewBox="0 0 400 130" width="400">`;
  for (let i=0;i<n;i++) {
    const x = startX + gap*scale + i*(fw+gap)*scale;
    svg += `<rect x="${x}" y="${y}" width="${fw*scale}" height="50" fill="none" stroke="var(--accent)" stroke-width="2" rx="2"/>`;
  }
  svg += `<text x="${startX + gap*scale/2 - 8}" y="${y+30}" font-size="10" fill="#888">${gap.toFixed(0)}${suffix}</text>`;
  svg += `</svg>`;
  $('#diagram').innerHTML = svg;
}

calculate();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🖼️', href:'/image/photo-frame.html', name:'Photo Frame'},
    {icon:'📐', href:'/convert/unit.html', name:'Unit Converter'},
    {icon:'📏', href:'/calc/aspect-ratio.html', name:'Aspect Ratio'},
    {icon:'🧮', href:'/calc/percentage-calculator.html', name:'Percentage'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
