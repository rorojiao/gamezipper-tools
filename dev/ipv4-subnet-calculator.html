<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is CIDR notation?", "acceptedAnswer": {"@type": "Answer", "text": "CIDR (Classless Inter-Domain Routing) notation appends a suffix to an IP address, like 192.168.1.0/24. The number after the slash is the count of network bits. A /24 network has 256 total addresses and 254 usable host addresses."}}, {"@type": "Question", "name": "How many usable hosts are in a subnet?", "acceptedAnswer": {"@type": "Answer", "text": "For a CIDR prefix length p, the total addresses are 2^(32-p). The number of usable hosts is 2^(32-p) - 2, because the first address is the network address and the last is the broadcast address. A /30 has 2 usable hosts, a /24 has 254."}}, {"@type": "Question", "name": "What is the difference between network address and broadcast address?", "acceptedAnswer": {"@type": "Answer", "text": "The network address is the first IP in a subnet and identifies the subnet itself. The broadcast address is the last IP and is used to send a packet to every host in the subnet. Neither can be assigned to a device."}}, {"@type": "Question", "name": "How do I find the subnet mask from a CIDR?", "acceptedAnswer": {"@type": "Answer", "text": "A CIDR prefix p creates a 32-bit mask where the first p bits are 1 and the rest are 0. For example /24 is 255.255.255.0, /16 is 255.255.0.0, and /30 is 255.255.255.252. This tool computes it automatically."}}]}</script>

<script>

    ip: 'IP 地址',
    cidr: 'CIDR 前缀',
    calc: '计算',
    clear: '清除',
    example: '示例',
    errIp: '请输入有效的 IPv4 地址（例如 192.168.1.0）。',
    network: '网络地址',
    broadcast: '广播地址',
    mask: '子网掩码',
    wildcard: '通配符掩码',
    firstHost: '第一个可用主机',
    lastHost: '最后一个可用主机',
    hostCount: '可用主机数',
    totalAddr: '地址总数',
    ipClass: 'IP 类别',
    binary: '二进制',
    cidrNotation: 'CIDR 表示法',
    ipType: 'IP 类型',
    private: '私有',
    public: '公有',
    copy: '复制',
    step1: '输入 IPv4 地址，例如 192.168.1.10',
    step2: '从下拉菜单选择 CIDR 前缀长度（0–32）',
    step3: '查看网络地址、广播地址、掩码和主机范围',
    step4: '通过二进制分解验证位级计算',
  }
});

const { $, copyText, t } = GZ;

// Build CIDR dropdown
(function(){
  let opts = '';
  for (let i = 32; i >= 0; i--) {
    const hosts = i >= 31 ? (i === 32 ? 1 : 0) : Math.pow(2, 32 - i) - 2;
    let label = '/' + i;
    if (i === 32) label += ' (single host)';
    else if (i === 31) label += ' (point-to-point)';
    else if (i === 30) label += ' (2 hosts)';
    else if (i === 24) label += ' (254 hosts)';
    else if (i === 16) label += ' (65,534 hosts)';
    else if (i === 8) label += ' (16M hosts)';
    else label += ' (' + hosts.toLocaleString() + ' hosts)';
    opts += `<option value="${i}" ${i===24?'selected':''}>${label}</option>`;
  }
  $('#cidr').innerHTML = opts;
})();

function ipToInt(ip) {
  const parts = ip.split('.');
  if (parts.length !== 4) return null;
  let n = 0;
  for (const p of parts) {
    if (!/^\d+$/.test(p)) return null;
    const v = parseInt(p, 10);
    if (v < 0 || v > 255) return null;
    n = (n << 8) | v;
  }
  // Force unsigned
  return n >>> 0;
}

function intToIp(n) {
  return [(n >>> 24) & 255, (n >>> 16) & 255, (n >>> 8) & 255, n & 255].join('.');
}

function intToBinary(n) {
  let s = '';
  for (let i = 3; i >= 0; i--) {
    const octet = (n >>> (i * 8)) & 255;
    s += octet.toString(2).padStart(8, '0');
    if (i > 0) s += '.';
  }
  return s;
}

function getIpClass(firstOctet) {
  if (firstOctet < 128) return 'A';
  if (firstOctet < 192) return 'B';
  if (firstOctet < 224) return 'C';
  if (firstOctet < 240) return 'D (multicast)';
  return 'E (reserved)';
}

function isPrivate(ipInt) {
  const o1 = (ipInt >>> 24) & 255;
  const o2 = (ipInt >>> 16) & 255;
  if (o1 === 10) return true;
  if (o1 === 172 && o2 >= 16 && o2 <= 31) return true;
  if (o1 === 192 && o2 === 168) return true;
  if (o1 === 127) return true; // loopback
  return false;
}

function calc() {
  const ipStr = $('#ip').value.trim();
  const errEl = $('#err');
  errEl.textContent = '';
  $('#result').innerHTML = '';
  if (!ipStr) { errEl.textContent = t('errIp'); return; }
  const ipInt = ipToInt(ipStr);
  if (ipInt === null) { errEl.textContent = t('errIp'); return; }

  const cidr = parseInt($('#cidr').value, 10);
  const mask = cidr === 0 ? 0 : ((0xFFFFFFFF << (32 - cidr)) >>> 0);
  const wildcard = (~mask) >>> 0;
  const network = (ipInt & mask) >>> 0;
  const broadcast = (network | wildcard) >>> 0;
  const total = Math.pow(2, 32 - cidr);
  let firstHost, lastHost, usable;
  if (cidr === 32) { firstHost = network; lastHost = network; usable = 1; }
  else if (cidr === 31) { firstHost = network; lastHost = broadcast; usable = 2; }
  else { firstHost = network + 1; lastHost = broadcast - 1; usable = total - 2; }

  const firstOctet = (ipInt >>> 24) & 255;
  const ipClass = getIpClass(firstOctet);
  const ipType = isPrivate(ipInt) ? t('private') : t('public');

  $('#result').innerHTML = `
    <div class="result-grid">
      <div class="result-item host-count">
        <div class="lbl">${t('hostCount')}</div>
        <div class="val">${usable.toLocaleString()}</div>
        <div class="sub">${t('totalAddr')}: ${total.toLocaleString()}</div>
      </div>
      <div class="result-item">
        <div class="lbl">${t('cidrNotation')}</div>
        <div class="val">${intToIp(network)}/${cidr}</div>
      </div>
      <div class="result-item">
        <div class="lbl">${t('ipClass')}</div>
        <div class="val">${ipClass}</div>
        <div class="sub">${ipType}</div>
      </div>
      <div class="result-item hl">
        <div class="lbl">${t('network')}</div>
        <div class="val">${intToIp(network)}</div>
        <div class="sub">${intToBinary(network)}</div>
      </div>
      <div class="result-item hl">
        <div class="lbl">${t('broadcast')}</div>
        <div class="val">${intToIp(broadcast)}</div>
        <div class="sub">${intToBinary(broadcast)}</div>
      </div>
      <div class="result-item">
        <div class="lbl">${t('mask')}</div>
        <div class="val">${intToIp(mask)}</div>
        <div class="sub">${intToBinary(mask)}</div>
      </div>
      <div class="result-item">
        <div class="lbl">${t('wildcard')}</div>
        <div class="val">${intToIp(wildcard)}</div>
        <div class="sub">${intToBinary(wildcard)}</div>
      </div>
      <div class="result-item">
        <div class="lbl">${t('firstHost')}</div>
        <div class="val">${intToIp(firstHost)}</div>
      </div>
      <div class="result-item">
        <div class="lbl">${t('lastHost')}</div>
        <div class="val">${intToIp(lastHost)}</div>
      </div>
      <div class="result-item" style="grid-column:1/-1">
        <div class="lbl">${t('binary')} (${intToIp(ipInt)})</div>
        <div class="val">${intToBinary(ipInt)}</div>
      </div>
    </div>`;
}

function clearAll() {
  $('#ip').value = ''; $('#err').textContent = ''; $('#result').innerHTML = '';
}
function loadExample() { $('#ip').value = '192.168.1.10'; $('#cidr').value = '24'; calc(); }

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="calc()">${t('calc')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="clearAll()">${t('clear')}</button>`;

$('#ip').addEventListener('input', calc);
$('#cidr').addEventListener('change', () => { if ($('#ip').value.trim()) calc(); });

  category: 'dev',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',

  ]
});
</script>
