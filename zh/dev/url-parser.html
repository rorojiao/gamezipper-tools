    search: '查询字符串',
    hash: '哈希',
    origin: '源',
    host: '主机',
    queryParams: '查询参数',
    noQuery: '无查询参数',
    invalidUrl: 'URL 无效 — 请输入合法的绝对 URL（如 https://example.com）',
    copyValue: '复制值',
    value: '值',
    step1: '将任意绝对 URL 粘贴到上方输入框',
    step2: '查看解析后的组件表格和查询参数',

const { $, copyText, t } = GZ;

function escapeHtml(s) {
  if (s == null) return '';
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function parseUrl() {
  const url = $('#urlInput').value.trim();
  const output = $('#output');
  if (!url) { output.innerHTML = ''; return; }
  let u;
  try {
    u = new URL(url);
  } catch (e) {
    output.innerHTML = `<div class="url-error">${t('invalidUrl')}<br><small>${escapeHtml(e.message)}</small></div>`;
    return;
  }
  const rows = [
    [t('protocol'), u.protocol],
    [t('username'), u.username || '—'],
    [t('password'), u.password || '—'],
    [t('hostname'), u.hostname],
    [t('port'), u.port || '(default)'],
    [t('host'), u.host],
    [t('origin'), u.origin],
    [t('pathname'), u.pathname],
    [t('search'), u.search || '—'],
    [t('hash'), u.hash || '—'],
  ];
  let html = '<div class="url-ok">✓ ' + t('value') + ': ' + escapeHtml(u.href) + '</div>';
  html += '<table class="url-table"><tbody>';
  for (const [k, v] of rows) {
    html += `<tr><th>${escapeHtml(k)}</th><td>${escapeHtml(v)}</td></tr>`;
  }
  html += '</tbody></table>';
  html += `<h3 style="margin-top:18px;font-size:1rem">${t('queryParams')}</h3>`;
  const params = [...u.searchParams.entries()];
  if (!params.length) {
    html += `<div style="opacity:.7;font-size:.85em;padding:8px 0">${t('noQuery')}</div>`;
  } else {
    html += '<div class="query-list">';
    for (const [k, v] of params) {
      const encV = encodeURIComponent(v);
      html += `<div class="query-row"><div class="k">${escapeHtml(k)}</div><div class="v" data-v="${encV}">${escapeHtml(v)}</div><button onclick="copyText(decodeURIComponent(this.previousElementSibling.dataset.v))">${t('copy')}</button></div>`;
    }
    html += '</div>';
  }
  output.innerHTML = html;
}

function loadExample() {
  $('#urlInput').value = 'https://user:pass@www.example.com:8080/blog/post/2026?lang=zh&sort=desc&page=2#comments';
  parseUrl();
}

function clearAll() {
  $('#urlInput').value = '';
  $('#output').innerHTML = '';
}

$('#urlInput').addEventListener('input', parseUrl);

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="clearAll()">${t('clear')}</button>`;
