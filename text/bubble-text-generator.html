const { $, copyText, t } = GZ;

// White circled: lowercase U+24D0 (ⓐ..ⓩ), uppercase U+24B6 (Ⓐ..Ⓩ)
// Black circled: lowercase U+24D0 has no black set, so we use uppercase U+24B6 for "black"
// Actually: circled latin small letter = U+24D0..U+24E9 (a-z)
//           circled latin capital letter = U+24B6..U+24CF (A-Z)
// Negative (black) circled: U+24EB (1), U+2460.. for digits; for letters we use U+1F150 (🅐) block for capitals
// Black lowercase letters do not exist in Unicode. We approximate.

function toWhiteCircle(str){
  let out='';
  for(const ch of str){
    const c = ch.charCodeAt(0);
    if(c>=65 && c<=90){ out += String.fromCharCode(c - 65 + 0x24B6); } // A-Z -> Ⓐ-Ⓩ
    else if(c>=97 && c<=122){ out += String.fromCharCode(c - 97 + 0x24D0); } // a-z -> ⓐ-ⓩ
    else if(c>=48 && c<=57){ out += String.fromCharCode(c - 48 + 0x2460); } // 0-9 -> ①..⑨⑩ (approx)
    else { out += ch; }
  }
  return out;
}

function toBlackCircle(str){
  let out='';
  for(const ch of str){
    const c = ch.charCodeAt(0);
    // U+1F150 = 🅐 (NEGATIVE CIRCLED LATIN CAPITAL LETTER A)
    if(c>=65 && c<=90){ out += String.fromCharCode(c - 65 + 0x1F150); }
    // No negative circled lowercase in Unicode — fall back to white lowercase
    else if(c>=97 && c<=122){ out += String.fromCharCode(c - 97 + 0x24D0); }
    else if(c>=48 && c<=57){
      // negative circled digits: ⓪(U+24EA) ①..⑨ are actually black-on-white already
      if(c===48){ out += '\u24EA'; } else { out += String.fromCharCode(c - 49 + 0x2776); } // ❶..❾ alternative
    }
    else { out += ch; }
  }
  return out;
}

function render(){
  const input = $('#input').value || t('sampleText');
  const styles = [
    {label: t('whiteLabel'), result: toWhiteCircle(input)},
    {label: t('blackLabel'), result: toBlackCircle(input)},
  ];
  let html='';
  for(const s of styles){
    html += `<div class="bubble-row"><span class="label">${escapeHtml(s.label)}</span><span class="out">${escapeHtml(s.result)}</span><button class="gz-btn gz-btn-tool copy-btn" data-text="${escapeAttr(s.result)}">${t('copy')}</button></div>`;
  }
  $('#output').innerHTML = html;
  $('#output').querySelectorAll('.copy-btn').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      copyText(btn.dataset.text);
      const orig = btn.textContent;
      btn.textContent = t('copied');
      setTimeout(()=>{btn.textContent = orig;}, 1200);
    });
  });
}

function escapeHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function escapeAttr(s){return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

$('#input').addEventListener('input', render);

$('#toolbar').innerHTML = `<button class="gz-btn" id="btn-clear">${t('clear')}</button>`;
$('#btn-clear').addEventListener('click', ()=>{$('#input').value='';render();$('#input').focus();});

render();
