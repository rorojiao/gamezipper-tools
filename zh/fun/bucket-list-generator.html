let activeCat = 'all';
let saved = [];
try { saved = JSON.parse(localStorage.getItem('gz-bucket-list') || '[]'); } catch(e) { saved = []; }

function persist(){ localStorage.setItem('gz-bucket-list', JSON.stringify(saved)); }

function isZh(){ return GZI18n.current === 'zh'; }

function renderCats(){
  $('#cats').innerHTML = CATS.map(c=>`<button data-c="${c.id}" class="${c.id===activeCat?'active':''}">${c.ic} ${isZh()?c.zh:c.en}</button>`).join('');
  $('#cats').querySelectorAll('button').forEach(b => b.onclick = () => { activeCat = b.dataset.c; renderCats(); renderIdeas(); });
}

function getFilteredIdeas(){
  let list = IDEAS.filter(g => Array.isArray(g));
  if(activeCat !== 'all') list = list.filter(g => g[3] === activeCat);
  return list;
}

function renderIdeas(){
  const list = getFilteredIdeas();
  const zh = isZh();
  if(!list.length){ $('#ideaList').innerHTML = `<div class="bl-empty">${t('emptyIdeas')}</div>`; return; }
  $('#ideaList').innerHTML = list.map((g,idx) => {
    const [ic,en,zh2,cat] = g;
    const key = en;
    const isSaved = saved.includes(key);
    return `<div class="bl-idea ${isSaved?'saved':''}">
      <span class="ic">${ic}</span>
      <span class="txt">${zh?zh2:en}</span>
      <button data-k="${escapeAttr(key)}" data-i="${idx}">${isSaved?'✓':t('add')}</button>
    </div>`;
  }).join('');
  $('#ideaList').querySelectorAll('button').forEach(b => b.onclick = () => {
    const k = unescapeAttr(b.dataset.k);
    if(saved.includes(k)){ saved = saved.filter(x=>x!==k); }
    else { saved.push(k); }
    persist(); renderIdeas(); renderSaved(); updateExport();
  });
  $('#lblIdeas').innerHTML = `${t('ideas')} <span class="cnt">${list.length}</span>`;
}

function renderSaved(){
  const zh = isZh();
  if(!saved.length){ $('#savedList').innerHTML = `<div class="bl-empty">${t('emptySaved')}</div>`; $('#lblSaved').innerHTML = `${t('saved')} <span class="cnt">0</span>`; return; }
  const lookup = {};
  IDEAS.filter(g=>Array.isArray(g)).forEach(g => { lookup[g[1]] = g; });
  $('#savedList').innerHTML = saved.map((k,i) => {
    const g = lookup[k];
    if(!g) return '';
    const [ic,en,zh2,cat] = g;
    return `<div class="bl-idea saved">
      <span class="ic">${ic}</span>
      <span class="txt">${i+1}. ${zh?zh2:en}</span>
      <button data-k="${escapeAttr(k)}">${t('remove')}</button>
    </div>`;
  }).join('');
  $('#savedList').querySelectorAll('button').forEach(b => b.onclick = () => {
    const k = unescapeAttr(b.dataset.k);
    saved = saved.filter(x=>x!==k);
    persist(); renderIdeas(); renderSaved(); updateExport();
  });
  $('#lblSaved').innerHTML = `${t('saved')} <span class="cnt">${saved.length}</span>`;
}

function updateExport(){
  const zh = isZh();
  const lookup = {};
  IDEAS.filter(g=>Array.isArray(g)).forEach(g => { lookup[g[1]] = g; });
  if(!saved.length){ $('#export').value = ''; $('#export').placeholder = t('emptySaved'); return; }
  const lines = saved.map((k,i) => {
    const g = lookup[k];
    const txt = g ? (zh?g[2]:g[1]) : k;
    return `${i+1}. [ ] ${txt}`;
  });
  $('#export').value = (zh?'我的愿望清单':'My Bucket List') + '\n' + new Date().toLocaleDateString() + '\n\n' + lines.join('\n');
}

function escapeAttr(s){ return s.replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function unescapeAttr(s){ return s.replace(/&quot;/g,'"').replace(/&#39;/g,"'"); }

$('#actions').innerHTML = `
  <button class="gz-btn gz-btn-secondary" id="btnShuffle">${t('shuffle')}</button>
  <button class="gz-btn" id="btnExport">${t('export')}</button>
  <button class="gz-btn gz-btn-secondary" id="btnClear">${t('clear')}</button>`;
$('#btnShuffle').onclick = () => {
  // shuffle the IDEAS array in place
  for(let i=IDEAS.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [IDEAS[i],IDEAS[j]] = [IDEAS[j],IDEAS[i]];
  }
  renderIdeas();
};
$('#btnExport').onclick = () => { updateExport(); if($('#export').value) copyText($('#export').value); };
$('#btnClear').onclick = () => { if(confirm('Clear all saved items?')) { saved = []; persist(); renderIdeas(); renderSaved(); updateExport(); } };

renderCats();
renderIdeas();
renderSaved();
updateExport();
