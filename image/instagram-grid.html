<script>
GZI18n.register({
  en: {
    toolTitle: 'Instagram Grid Maker',
    toolDesc: 'Split any image into a perfect Instagram grid (3x1, 3x2, 3x3). Preview, download tiles and create seamless puzzle posts. Free, browser-only.',
    gridSize: 'Grid Size',
    upload: 'Click or drop an image here',
    uploadHint: 'PNG, JPG, WebP — processed in your browser',
    downloadAll: '📥 Download All (ZIP)',
    clear: 'Clear',
    step1: 'Upload a high-resolution image (square works best)',
    step2: 'Choose your grid size — 3×3 is the Instagram standard',
    step3: 'Preview the split tiles in grid layout',
    step4: 'Download all tiles and post in reverse order',
    grid3x1: '3×1 (3 tiles)',
    grid3x2: '3×2 (6 tiles)',
    grid3x3: '3×3 (9 tiles)',
  },
  zh: {
    toolTitle: 'Instagram 九宫格分割器',
    toolDesc: '将任意图片分割为完美的 Instagram 网格（3×1、3×2、3×3）。预览、下载切片并创建无缝拼图帖子。免费，浏览器本地运行。',
    gridSize: '网格大小',
    upload: '点击或拖拽图片到此处',
    uploadHint: 'PNG、JPG、WebP — 浏览器本地处理',
    downloadAll: '📥 全部下载 (ZIP)',
    clear: '清除',
    step1: '上传一张高分辨率图片（方形效果最佳）',
    step2: '选择网格大小 — 3×3 是 Instagram 标准',
    step3: '预览网格布局中的切片',
    step4: '下载所有切片并按倒序发布',
    grid3x1: '3×1（3 张）',
    grid3x2: '3×2（6 张）',
    grid3x3: '3×3（9 张）',
  }
});
const { $, t } = GZ;
let state = { gridRows:3, img:null, tiles:[] };
const TILE_SIZE = 1080; // Instagram square size
function handleFile(file){
  if(!file || !file.type.startsWith('image/'))return;
  const reader = new FileReader();
  reader.onload = e=>{
    const img = new Image();
    img.onload = ()=>{
      state.img = img;
      splitImage();
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}
function splitImage(){
  if(!state.img)return;
  const img = state.img;
  const cols = 3;
  const rows = state.gridRows;
  // Crop to 3:rows aspect ratio centered
  const targetRatio = cols / rows;
  const imgRatio = img.width / img.height;
  let cropW, cropH, cropX, cropY;
  if(imgRatio > targetRatio){
    cropH = img.height;
    cropW = cropH * targetRatio;
    cropX = (img.width - cropW) / 2;
    cropY = 0;
  } else {
    cropW = img.width;
    cropH = cropW / targetRatio;
    cropX = 0;
    cropY = (img.height - cropH) / 2;
  }
  const tileW = cropW / cols;
  const tileH = cropH / rows;
  state.tiles = [];
  for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){
      const canvas = document.createElement('canvas');
      canvas.width = TILE_SIZE;
      canvas.height = TILE_SIZE;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = '#fff';
      ctx.fillRect(0,0,TILE_SIZE,TILE_SIZE);
      ctx.drawImage(img, cropX+c*tileW, cropY+r*tileH, tileW, tileH, 0, 0, TILE_SIZE, TILE_SIZE);
      state.tiles.push({ canvas, row:r, col:c, index: r*cols+c });
    }
  }
  renderGrid();
}
function renderGrid(){
  if(state.tiles.length===0)return;
  const cols = 3;
  const rows = state.gridRows;
  const gridClass = 'ig-grid ig-grid-'+rows;
  let html = '<div class="'+gridClass+'">';
  // Display in grid order (row by row, top to bottom)
  for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){
      const tile = state.tiles.find(t=>t.row===r && t.col===c);
      if(tile){
        html += '<div style="position:relative">';
        html += '<img src="'+tile.canvas.toDataURL('image/jpeg',0.92)+'">';
        // Post order number (reverse: bottom-right first)
        const postOrder = (rows*cols) - tile.index;
        html += '<span style="position:absolute;top:4px;left:4px;background:rgba(0,0,0,.7);color:#fff;font-size:11px;padding:2px 6px;border-radius:4px">Post #'+postOrder+'</span>';
        html += '</div>';
      }
    }
  }
  html += '</div>';
  $('#grid-container').innerHTML = html;
  $('#status').innerHTML = '<span style="color:var(--gz-success)">✓ '+state.tiles.length+' tiles ready — post in reverse order (bottom-right first)</span>';
}
async function downloadAll(){
  if(state.tiles.length===0)return;
  // Download each tile individually (no ZIP lib needed)
  for(let i=state.tiles.length-1;i>=0;i--){
    const tile = state.tiles[i];
    const postOrder = state.tiles.length - tile.index;
    setTimeout(()=>{
      const link = document.createElement('a');
      link.download = 'instagram-tile-'+String(postOrder).padStart(2,'0')+'.jpg';
      link.href = tile.canvas.toDataURL('image/jpeg',0.92);
      link.click();
    }, (state.tiles.length-1-i) * 300);
  }
  const lang = GZI18n.getLang();
  $('#status').innerHTML = '<span style="color:var(--gz-success)">✓ '+(lang==='zh'?'正在下载 '+state.tiles.length+' 张切片...':'Downloading '+state.tiles.length+' tiles...')+'</span>';
}
function clearAll(){
  state.img = null;
  state.tiles = [];
  $('#grid-container').innerHTML = '';
  $('#status').innerHTML = '';
  $('#fileInput').value = '';
}
$('#controls').innerHTML = `
  <label>${t('gridSize')}: <select id="ctrl-grid" onchange="state.gridRows=+this.value;if(state.img)splitImage()">
    <option value="1">${t('grid3x1')}</option>
    <option value="2">${t('grid3x2')}</option>
    <option value="3" selected>${t('grid3x3')}</option>
  </select></label>
  <button class="gz-btn" onclick="downloadAll()">${t('downloadAll')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="clearAll()">${t('clear')}</button>
`;
$('#dropzone').innerHTML = `<p style="font-size:1.1em;margin:0 0 8px">📸 ${t('upload')}</p><p style="opacity:.6;font-size:.85em;margin:0">${t('uploadHint')}</p>
<input type="file" id="fileInput" accept="image/*" style="display:none">`;
$('#dropzone').onclick = ()=>$('#fileInput').click();
$('#fileInput').onchange = e=>handleFile(e.target.files[0]);
$('#dropzone').ondragover = e=>{e.preventDefault();$('#dropzone').style.borderColor='var(--gz-accent)';};
$('#dropzone').ondragleave = e=>{$('#dropzone').style.borderColor='var(--border)';};
$('#dropzone').ondrop = e=>{
  e.preventDefault();
  $('#dropzone').style.borderColor='var(--border)';
  if(e.dataTransfer.files[0])handleFile(e.dataTransfer.files[0]);
};
GZ.renderToolPage({
  category: 'image',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'✂️', href:'/image/image-splitter.html', name:'Image Splitter'},
    {icon:'📐', href:'/image/aspect-ratio-visualizer.html', name:'Aspect Ratio'},
    {icon:'📱', href:'/image/social-media-resizer.html', name:'Social Resizer'},
    {icon:'🖼️', href:'/image/photo-collage.html', name:'Photo Collage'},
  ]
});
</script>
