<script>
GZI18n.register({
  en: {
    toolTitle: 'Video Trimmer',
    toolDesc: 'Trim and cut video clips online for free. Set start and end points with visual timeline, preview and download — runs entirely in your browser.',
    dropText: 'Drop video file here or click to browse',
    lblStart: 'Start',
    lblEnd: 'End',
    download: 'Download Trimmed Video',
    reset: 'Load New Video',
    processing: 'Processing… this may take a moment for long videos',
    done: '✓ Download ready!',
    noVideo: 'Please upload a video first',
    step1: 'Upload a video file (MP4, WebM, MOV)',
    step2: 'Drag the start and end sliders to select your clip',
    step3: 'Click Preview to review the trimmed section',
    step4: 'Click Download to save the trimmed video as WebM',
  },
  zh: {
    toolTitle: '视频裁剪工具',
    toolDesc: '在线裁剪视频，可视化时间线设置起止点，即时预览和下载 — 完全浏览器本地处理。',
    dropText: '拖拽视频文件到此处或点击选择',
    lblStart: '起始',
    lblEnd: '结束',
    download: '下载裁剪后的视频',
    reset: '加载新视频',
    processing: '处理中… 长视频可能需要较长时间',
    done: '✓ 下载已准备！',
    noVideo: '请先上传视频文件',
    step1: '上传视频文件（MP4、WebM、MOV）',
    step2: '拖动起始和结束滑块选择片段',
    step3: '点击预览按钮查看裁剪效果',
    step4: '点击下载按钮保存裁剪后的视频（WebM 格式）',
  }
});

const { $, t } = GZ;

$('#drop-text').textContent = t('dropText');
$('#lbl-start').textContent = t('lblStart');
$('#lbl-end').textContent = t('lblEnd');
$('#download-btn').textContent = t('download');
$('#reset-btn').textContent = t('reset');

const video = $('#video');
let videoURL = null, duration = 0, isPreviewing = false;

const drop = $('#video-drop');
drop.onclick = () => $('#file-input').click();
drop.ondragover = e => { e.preventDefault(); drop.classList.add('dragover'); };
drop.ondragleave = () => drop.classList.remove('dragover');
drop.ondrop = e => { e.preventDefault(); drop.classList.remove('dragover'); if (e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]); };
$('#file-input').onchange = function() { if (this.files[0]) loadFile(this.files[0]); };

function loadFile(file) {
  if (videoURL) URL.revokeObjectURL(videoURL);
  videoURL = URL.createObjectURL(file);
  video.src = videoURL;
  video.onloadedmetadata = () => {
    duration = video.duration;
    $('#start-slider').max = duration;
    $('#end-slider').max = duration;
    $('#start-slider').value = 0;
    $('#end-slider').value = duration;
    drop.style.display = 'none';
    $('#editor').style.display = 'block';
    $('#timeline').style.display = 'block';
    $('#trim-ui').style.display = 'flex';
    updateTimeline();
    $('#duration-display').textContent = fmt(0) + ' → ' + fmt(duration) + ' (' + fmt(duration) + ')';
  };
}

function fmt(s) {
  const m = Math.floor(s / 60);
  const sec = (s % 60).toFixed(1);
  return m + ':' + (sec < 10 ? '0' : '') + sec;
}

function updateTimeline() {
  const start = parseFloat($('#start-slider').value);
  const end = parseFloat($('#end-slider').value);
  if (start >= end) return;
  const tl = $('#timeline');
  const fill = $('#timeline-fill');
  fill.style.left = (start / duration * 100) + '%';
  fill.style.width = ((end - start) / duration * 100) + '%';
  $('#duration-display').textContent = fmt(start) + ' → ' + fmt(end) + ' (' + fmt(end - start) + ')';
}

$('#start-slider').oninput = function() {
  if (parseFloat(this.value) >= parseFloat($('#end-slider').value)) {
    this.value = parseFloat($('#end-slider').value) - 0.1;
  }
  updateTimeline();
  video.currentTime = parseFloat(this.value);
};

$('#end-slider').oninput = function() {
  if (parseFloat(this.value) <= parseFloat($('#start-slider').value)) {
    this.value = parseFloat($('#start-slider').value) + 0.1;
  }
  updateTimeline();
  video.currentTime = parseFloat(this.value);
};

$('#play-btn').onclick = () => {
  video.currentTime = parseFloat($('#start-slider').value);
  video.play();
  isPreviewing = true;
};

video.ontimeupdate = () => {
  if (isPreviewing && video.currentTime >= parseFloat($('#end-slider').value)) {
    video.pause();
    isPreviewing = false;
  }
};

$('#stop-btn').onclick = () => {
  video.pause();
  isPreviewing = false;
};

$('#download-btn').onclick = async () => {
  if (!videoURL) { $('#status').textContent = t('noVideo'); return; }
  const start = parseFloat($('#start-slider').value);
  const end = parseFloat($('#end-slider').value);
  if (start >= end) return;

  $('#status').textContent = t('processing');
  video.currentTime = start;
  await new Promise(r => { video.onseeked = r; });

  const canvas = document.createElement('canvas');
  canvas.width = video.videoWidth || 640;
  canvas.height = video.videoHeight || 360;
  const cctx = canvas.getContext('2d');

  const stream = canvas.captureStream(30);

  // Try to capture audio from the video
  try {
    const vidEl = video.cloneNode();
    vidEl.src = videoURL;
    vidEl.currentTime = start;
    await new Promise(r => { vidEl.onseeked = r; });
    const audioCtx = new AudioContext();
    const source = audioCtx.createMediaElementSource(vidEl);
    const dest = audioCtx.createMediaStreamDestination();
    source.connect(dest);
    source.connect(audioCtx.destination);
    dest.stream.getAudioTracks().forEach(t => stream.addTrack(t));
    vidEl.play();
  } catch(e) {
    // Audio capture may fail, continue without audio
  }

  const mimeType = MediaRecorder.isTypeSupported('video/webm;codecs=vp9,opus')
    ? 'video/webm;codecs=vp9,opus'
    : MediaRecorder.isTypeSupported('video/webm;codecs=vp8,opus')
      ? 'video/webm;codecs=vp8,opus'
      : 'video/webm';

  const rec = new MediaRecorder(stream, { mimeType, videoBitsPerSecond: 5000000 });
  const chunks = [];
  rec.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
  rec.onstop = () => {
    const blob = new Blob(chunks, { type: 'video/webm' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'trimmed_video.webm';
    a.click();
    URL.revokeObjectURL(a.href);
    $('#status').textContent = t('done');
  };

  rec.start();
  video.play();
  isPreviewing = true;

  function drawFrame() {
    if (video.currentTime >= end || video.paused || video.ended) {
      video.pause();
      isPreviewing = false;
      rec.stop();
      return;
    }
    cctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    requestAnimationFrame(drawFrame);
  }
  drawFrame();
};

$('#reset-btn').onclick = () => {
  video.pause();
  isPreviewing = false;
  if (videoURL) URL.revokeObjectURL(videoURL);
  videoURL = null;
  video.src = '';
  duration = 0;
  $('#editor').style.display = 'none';
  drop.style.display = '';
  $('#status').textContent = '';
  $('#file-input').value = '';
};

GZ.renderToolPage({
  category: 'convert',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🎬', href:'/convert/video-to-gif.html', name:'Video to GIF'},
    {icon:'🎵', href:'/convert/audio-trimmer.html', name:'Audio Trimmer'},
    {icon:'🖥️', href:'/convert/screen-recorder.html', name:'Screen Recorder'},
    {icon:'🗜️', href:'/convert/gif-compressor.html', name:'GIF Compressor'},
  ]
});
</script>
