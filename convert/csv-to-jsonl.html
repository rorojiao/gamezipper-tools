  },
  zh: {
    toolTitle: 'CSV 转 JSONL 转换器',
    toolDesc: '将 CSV 数据转换为 JSON Lines（JSONL / NDJSON）。首行作为键名，正确处理引号字段 — 非常适合数据管道和大数据工作流。',
    convert: '转换',
    autoType: '自动类型推断',
    delimiter: '分隔符',
    step1: '在输入区粘贴您的 CSV 数据（需包含表头行）',
    step2: '选择分隔符并勾选自动类型推断',
    step3: '点击「转换」生成 JSONL 输出',
    step4: '点击「下载」保存为 .jsonl 文件',
  }
});

const { $, copyText, t } = GZ;
let autoType = false, delim = ',';

function parseCSV(text, delimiter) {
  const rows = [];
  let row = [], field = '', inQuotes = false;
  const d = delimiter;
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    if (inQuotes) {
      if (c === '"') {
        if (text[i+1] === '"') { field += '"'; i++; }
        else { inQuotes = false; }
      } else { field += c; }
    } else {
      if (c === '"') { inQuotes = true; }
      else if (c === d) { row.push(field); field = ''; }
      else if (c === '\n') { row.push(field); rows.push(row); row = []; field = ''; }
      else if (c === '\r') { /* skip */ }
      else { field += c; }
    }
  }
  if (field !== '' || row.length > 0) { row.push(field); rows.push(row); }
  return rows.filter(r => r.length > 0 && !(r.length === 1 && r[0] === ''));
}

function autoConvert(val) {
  if (val === 'null') return null;
  if (val === 'true') return true;
  if (val === 'false') return false;
  if (val === '') return '';
  if (/^-?\d+$/.test(val)) return parseInt(val, 10);
  if (/^-?\d+\.\d+$/.test(val)) return parseFloat(val);
  return val;
}

function doConvert() {
  const inp = $('#input').value.trim();
  if (!inp) { $('#output').textContent = ''; $('#status').innerHTML = ''; return; }
  try {
    const rows = parseCSV(inp, delim);
    if (rows.length < 1) throw new Error('No data found');
    const headers = rows[0].map(h => h.trim());
    const dataRows = rows.slice(1);
    const records = dataRows.map(row => {
      const obj = {};
      headers.forEach((h, i) => {
        const val = row[i] !== undefined ? row[i] : '';
        obj[h] = autoType ? autoConvert(val) : val;
      });
      return obj;
    });
    const lines = records.map(r => JSON.stringify(r));
    $('#output').textContent = lines.join('\n');
    $('#status').innerHTML = `<span style="color:var(--gz-success)">✓ ${records.length} JSONL record${records.length!==1?'s':''} from ${headers.length} column${headers.length!==1?'s':''}</span>`;
  } catch(e) {
    $('#output').innerHTML = `<span style="color:var(--gz-accent)">${e.message}</span>`;
    $('#status').innerHTML = `<span style="color:var(--gz-accent)">✗ Error</span>`;
  }
}

function doDownload() {
  const text = $('#output').textContent;
  if (!text) return;
  const blob = new Blob([text], {type: 'application/x-ndjson'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'data.jsonl';
  a.click();
  URL.revokeObjectURL(a.href);
}

function loadExample() {
  $('#input').value = 'name,age,city,active\nAlice,30,"New York",true\nBob,25,"Los Angeles",false\n"Charlie, Jr.",35,"Chicago, IL",true';
  doConvert();
}

function doClear() { $('#input').value = ''; $('#output').textContent = ''; $('#status').innerHTML = ''; }

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="doConvert()">${t('convert')}</button>
  <label class="gz-check"><input type="checkbox" id="opt-type" ${autoType?'checked':''} onchange="autoType=this.checked;doConvert()"> ${t('autoType')}</label>
  <select class="gz-select" onchange="delim=this.value;doConvert()">
    <option value=",">Comma (,)</option>
    <option value=";">Semicolon (;)</option>
    <option value="\t">Tab</option>
    <option value="|">Pipe (|)</option>
  </select>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doDownload()">⬇ .jsonl</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;
