<script>
GZI18n.register({
  en: {

    toolDesc: 'See how extra monthly, yearly or lump-sum payments shorten your loan and save thousands in interest. Free amortization schedule with CSV export.',

  },
  zh: {

    toolDesc: '查看每月、每年或一次性额外还款能缩短多少贷款期限、节省多少利息。免费摊销表，支持 CSV 导出。',
    amount: '贷款金额',
    rate: '年利率 (%)',
    term: '贷款期限 (年)',
    extra: '每月额外还款',
    yearly: '每年额外还款',
    lump: '一次性提前还款',
    calc: '计算',
    csv: '导出 CSV',
    origMonthly: '原月供',
    newMonthly: '新月供',
    origPayoff: '原还清时间',
    newPayoff: '新还清时间',
    timeSaved: '节省时间',
    origInterest: '原利息总额',
    newInterest: '新利息总额',
    interestSaved: '节省利息',
    month: '月',
    payment: '月供',
    principal: '本金',
    interest: '利息',
    balance: '剩余本金',
    step1: '输入贷款金额、利率和期限',
    step2: '添加每月、每年或一次性额外还款',
    step3: '点击「计算」查看节省的利息和缩短的时间',
    step4: '查看完整摊销表并导出为 CSV',
  }
});

const { $, t } = GZ;

function fmt(n) { return n.toLocaleString('en-US', { maximumFractionDigits: 0 }); }
function fmtMoney(n) { return '$' + fmt(n); }
function monthsToYMo(m) { return Math.floor(m/12) + 'y ' + (m%12) + 'm'; }

function simulate(principal, ratePct, years, extra, yearly, lumpMonth) {
  const r = ratePct / 100 / 12;
  const totalMonths = years * 12;
  const baseMonthly = r === 0 ? principal / totalMonths : principal * r / (1 - Math.pow(1+r, -totalMonths));
  let bal = principal - (lumpMonth === 0 ? lumpMonth : 0);
  if (lumpMonth === 0) bal = principal;
  let basePay = baseMonthly;
  let totalIntOrig = 0, totalIntNew = 0;
  let origBal = principal, newBal = principal;
  let newPay = baseMonthly + extra;
  let origMonth = 0, newMonth = 0;
  let origDone = false, newDone = false;
  let lumpApplied = false;
  const rows = [];
  for (let m = 1; m <= totalMonths + 360; m++) {
    if (!origDone) {
      const interest = origBal * r;
      const principalPaid = Math.min(basePay - interest, origBal);
      origBal -= principalPaid;
      totalIntOrig += interest;
      origMonth++;
      if (origBal <= 0) origDone = true;
    }
    if (!newDone) {
      let curExtra = extra;
      if (yearly > 0 && m % 12 === 0) curExtra += yearly;
      if (!lumpApplied && lumpMonth > 0 && m === lumpMonth) { newBal -= parseFloat($('#lump').value); lumpApplied = true; }
      else if (!lumpApplied && lumpMonth === 0 && m === 1) { newBal -= parseFloat($('#lump').value); lumpApplied = true; }
      const interest = newBal * r;
      const principalPaid = Math.min(newPay + curExtra - interest, newBal);
      newBal -= principalPaid;
      totalIntNew += interest;
      newMonth++;
      if (newBal <= 0) newDone = true;
    }
    if (origDone && newDone) break;
  }
  return { origMonth, newMonth, totalIntOrig, totalIntNew, baseMonthly, newPay: newPay + extra };
}

function render() {
  const principal = parseFloat($('#amount').value) || 0;
  const rate = parseFloat($('#rate').value) || 0;
  const years = parseInt($('#term').value) || 0;
  const extra = parseFloat($('#extra').value) || 0;
  const yearly = parseFloat($('#yearly').value) || 0;
  const lump = parseFloat($('#lump').value) || 0;
  const result = simulate(principal, rate, years, extra, yearly, lump > 0 ? 1 : -1);
  const savedMonths = result.origMonth - result.newMonth;
  const savedInterest = result.totalIntOrig - result.totalIntNew;
  $('#summary').innerHTML = `
    <div class="lp-card"><div class="lbl">${t('origMonthly')}</div><div class="num">${fmtMoney(result.baseMonthly)}</div></div>
    <div class="lp-card"><div class="lbl">${t('newMonthly')}</div><div class="num">${fmtMoney(result.newPay)}</div></div>
    <div class="lp-card"><div class="lbl">${t('origPayoff')}</div><div class="num">${monthsToYMo(result.origMonth)}</div></div>
    <div class="lp-card"><div class="lbl">${t('newPayoff')}</div><div class="num">${monthsToYMo(result.newMonth)}</div></div>
    <div class="lp-card save"><div class="lbl">${t('timeSaved')}</div><div class="num">${monthsToYMo(savedMonths)}</div></div>
    <div class="lp-card"><div class="lbl">${t('origInterest')}</div><div class="num">${fmtMoney(result.totalIntOrig)}</div></div>
    <div class="lp-card"><div class="lbl">${t('newInterest')}</div><div class="num">${fmtMoney(result.totalIntNew)}</div></div>
    <div class="lp-card save"><div class="lbl">${t('interestSaved')}</div><div class="num">${fmtMoney(savedInterest)}</div></div>
  `;
  // Build detailed schedule
  const r = rate / 100 / 12;
  let bal = principal - lump;
  if (lump > 0) bal -= lump;
  const totalMonths = years * 12;
  const baseMonthly = r === 0 ? principal / totalMonths : principal * r / (1 - Math.pow(1+r, -totalMonths));
  const newMonthly = baseMonthly + extra;
  let cumSaved = 0;
  const rows = [];
  let origBal = principal;
  for (let m = 1; m <= totalMonths; m++) {
    if (origBal <= 0.01) break;
    const origInt = origBal * r;
    const origPr = Math.min(baseMonthly - origInt, origBal);
    origBal -= origPr;
    if (bal <= 0.01) continue;
    let curExtra = extra;
    if (yearly > 0 && m % 12 === 0) curExtra += yearly;
    const newInt = bal * r;
    const newPr = Math.min(newMonthly + curExtra - newInt, bal);
    const newPay = newInt + newPr;
    cumSaved += ((baseMonthly - (origInt + origPr))) ;
    const oldRemaining = origBal;
    bal -= newPr;
    rows.push({ m, pay: newPay, pr: newPr, int: newInt, bal: Math.max(0, bal), origBal: Math.max(0, oldRemaining) });
  }
  const maxRow = Math.min(rows.length, 360);
  let tableHTML = '<table class="lp-table"><thead><tr><th>' + t('month') + '</th><th>' + t('payment') + '</th><th>' + t('principal') + '</th><th>' + t('interest') + '</th><th>' + t('balance') + '</th></tr></thead><tbody>';
  rows.slice(0, maxRow).forEach((r, i) => {
    tableHTML += `<tr><td>${r.m}</td><td>${fmtMoney(r.pay)}</td><td>${fmtMoney(r.pr)}</td><td>${fmtMoney(r.int)}</td><td>${fmtMoney(r.bal)}</td></tr>`;
  });
  tableHTML += '</tbody></table>';
  $('#tableWrap').innerHTML = tableHTML;
  // Chart
  const w = 600, h = 180;
  const maxBal = principal;
  const stepX = w / Math.max(rows.length, 1);
  let pathO = '', pathN = '';
  rows.forEach((r, i) => { pathO += (i===0?'M':'L') + (i*stepX).toFixed(1) + ',' + (h - (r.origBal/maxBal)*h).toFixed(1) + ' '; pathN += (i===0?'M':'L') + (i*stepX).toFixed(1) + ',' + (h - (r.bal/maxBal)*h).toFixed(1) + ' '; });
  $('#chart').innerHTML = '<svg viewBox="0 0 ' + w + ' ' + h + '" style="width:100%;height:200px"><path d="' + pathO + '" fill="none" stroke="#f59e0b" stroke-width="2" opacity="0.6"/><path d="' + pathN + '" fill="none" stroke="#10b981" stroke-width="2.5"/><text x="10" y="20" fill="#f59e0b" font-size="11">Original</text><text x="10" y="38" fill="#10b981" font-size="11">With Prepayment</text></svg>';
  window._lastRows = rows;
  window._lastSummary = { principal, rate, years, extra, yearly, lump };
}

$('#calcBtn').addEventListener('click', render);
$('#csvBtn').addEventListener('click', () => {
  if (!window._lastRows) { render(); }
  const csv = 'Month,Payment,Principal,Interest,Balance\n' + window._lastRows.map(r => `${r.m},${r.pr.toFixed(2)},${r.pr.toFixed(2)},${r.int.toFixed(2)},${r.bal.toFixed(2)}`).join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'loan-prepayment.csv';
  a.click();
  URL.revokeObjectURL(a.href);
});

render();

GZ.renderToolPage({

    {icon:'💰', href:'/calc/mortgage-calculator.html', name:'Mortgage'},
  ]
});
</script>
