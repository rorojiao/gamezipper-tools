<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is a .env file?", "acceptedAnswer": {"@type": "Answer", "text": "A .env (dotenv) file stores environment variables for your application — API keys, database URLs, feature flags and secrets. It is loaded at startup by libraries like Node.js dotenv, Python python-dotenv and Ruby dotenv."}}, {"@type": "Question", "name": "How do I create a .env file online?", "acceptedAnswer": {"@type": "Answer", "text": "Add your key-value pairs using the editor rows, pick a framework preset to auto-fill common variables, then click Download to save a ready-to-use .env file. You can also paste existing JSON or KEY=VALUE text to import it."}}, {"@type": "Question", "name": "Should I commit my .env file to Git?", "acceptedAnswer": {"@type": "Answer", "text": "Never commit a real .env file with secrets. Add .env to your .gitignore and provide a .env.example template with placeholder values instead. This tool can generate an example template with masked values."}}, {"@type": "Question", "name": "Is my .env data sent to a server?", "acceptedAnswer": {"@type": "Answer", "text": "No. Everything runs 100% in your browser. Your keys and values never leave your device."}}]}</script>

<script>
GZI18n.register({
  en: {
    toolTitle: '.env File Generator & Editor',
    toolDesc: 'Create and validate .env files visually. Framework presets, JSON/KEY=VALUE import, example-template mode with masked secrets, and download. Free and private.',
    presets: 'Framework presets',
    key: 'Key',
    value: 'Value',
    addRow: '+ Add variable',
    importJson: 'Import JSON',
    importKv: 'Import KEY=VALUE',
    generate: 'Generate',
    download: 'Download .env',
    downloadExample: 'Download .env.example',
    exampleMode: 'Example template (mask values)',
    rowsCount: (n) => `${n} variable${n===1?'':'s'}`,
    step1: 'Pick a framework preset or add variables manually',
    step2: 'Toggle example-template mode to mask secret values',
    step3: 'Click Generate to preview the .env output',
    step4: 'Download .env or .env.example with masked placeholders',
  },
  zh: {
    toolTitle: '.env 文件生成器 / 编辑器',
    toolDesc: '可视化创建和验证 .env 文件。框架预设、JSON/KEY=VALUE 导入、掩码示例模板和下载。免费且私密。',
    presets: '框架预设',
    key: '键名',
    value: '值',
    addRow: '+ 添加变量',
    importJson: '导入 JSON',
    importKv: '导入 KEY=VALUE',
    generate: '生成',
    download: '下载 .env',
    downloadExample: '下载 .env.example',
    exampleMode: '示例模板（掩码值）',
    rowsCount: (n) => `${n} 个变量`,
    step1: '选择框架预设或手动添加变量',
    step2: '切换示例模板模式以掩码密钥值',
    step3: '点击生成预览 .env 输出',
    step4: '下载 .env 或带占位符的 .env.example',
  }
});

const { $, copyText, t } = GZ;
let exampleMode = false;

const PRESETS = {
  'Node.js': [
    {k:'NODE_ENV', v:'development'},
    {k:'PORT', v:'3000'},
    {k:'DATABASE_URL', v:'postgresql://user:pass@localhost:5432/db'},
    {k:'JWT_SECRET', v:'your-super-secret-key'},
    {k:'API_KEY', v:''},
  ],
  'Next.js': [
    {k:'NEXT_PUBLIC_API_URL', v:'http://localhost:3000/api'},
    {k:'NEXT_PUBLIC_GA_ID', v:''},
    {k:'DATABASE_URL', v:''},
    {k:'AUTH_SECRET', v:''},
  ],
  'Django': [
    {k:'DEBUG', v:'True'},
    {k:'SECRET_KEY', v:'django-insecure-change-me'},
    {k:'DATABASE_URL', v:'postgres://user:pass@localhost:5432/mydb'},
    {k:'ALLOWED_HOSTS', v:'localhost,127.0.0.1'},
  ],
  'Laravel': [
    {k:'APP_NAME', v:'Laravel'},
    {k:'APP_ENV', v:'local'},
    {k:'APP_KEY', v:''},
    {k:'APP_DEBUG', v:'true'},
    {k:'DB_CONNECTION', v:'mysql'},
    {k:'DB_HOST', v:'127.0.0.1'},
  ],
  'Docker': [
    {k:'COMPOSE_PROJECT_NAME', v:'myapp'},
    {k:'MYSQL_ROOT_PASSWORD', v:''},
    {k:'REDIS_PASSWORD', v:''},
    {k:'TZ', v:'UTC'},
  ],
  'Python': [
    {k:'PYTHONPATH', v:'.'},
    {k:'FLASK_APP', v:'app.py'},
    {k:'FLASK_ENV', v:'development'},
    {k:'DATABASE_URL', v:'sqlite:///app.db'},
  ],
};

let rows = [{k:'', v:''}];

function renderRows() {
  $('#rows-container').innerHTML = rows.map((r, i) => `
    <div class="env-row">
      <input type="text" value="${escAttr(r.k)}" placeholder="${t('key')}" oninput="updateRow(${i},'k',this.value)">
      <input type="text" value="${escAttr(r.v)}" placeholder="${t('value')}" oninput="updateRow(${i},'v',this.value)">
      <button class="env-del" onclick="delRow(${i})">✕</button>
    </div>`).join('');
}

window.updateRow = function(i, field, val) { rows[i][field] = val; };
window.delRow = function(i) { rows.splice(i, 1); if (rows.length === 0) rows.push({k:'',v:''}); renderRows(); };
window.addRow = function() { rows.push({k:'', v:''}); renderRows(); };

function loadPreset(name) {
  rows = PRESETS[name].map(x => ({k:x.k, v:x.v}));
  renderRows();
  generate();
}

function maskValue(v) {
  if (!v) return '';
  if (v.length <= 3) return '***';
  if (v.length <= 8) return v.slice(0, 2) + '***';
  return v.slice(0, 3) + '***' + v.slice(-2);
}

function formatValue(v) {
  const finalV = exampleMode ? maskValue(v) : v;
  // Quote if value contains spaces, #, =, or special chars
  if (finalV === '') return '';
  if (/[\s#="'$`]/.test(finalV)) {
    return '"' + finalV.replace(/\\/g, '\\\\').replace(/"/g, '\\"') + '"';
  }
  return finalV;
}

function generate() {
  // Filter out empty-key rows
  const valid = rows.filter(r => r.k.trim());
  let out = '';
  if (exampleMode) out += '# .env.example — copy to .env and fill in real values\n\n';
  for (const r of valid) {
    const key = r.k.trim().toUpperCase().replace(/[^A-Z0-9_]/g, '_');
    const val = formatValue(r.v);
    out += `${key}=${val}\n`;
  }
  $('#output').textContent = out || '# Add variables above to generate .env content';
  $('#status').innerHTML = `<span style="color:var(--gz-success)">✓ ${t('rowsCount')(valid.length)}</span>`;
}

function importText(mode) {
  const text = window.prompt(mode === 'json' ? 'Paste JSON object:' : 'Paste KEY=VALUE lines:');
  if (!text) return;
  try {
    if (mode === 'json') {
      const obj = JSON.parse(text);
      rows = Object.entries(obj).map(([k, v]) => ({k, v: String(v)}));
    } else {
      rows = text.split('\n').filter(l => l.trim() && !l.trim().startsWith('#')).map(line => {
        const eq = line.indexOf('=');
        if (eq === -1) return {k: line.trim(), v: ''};
        let k = line.slice(0, eq).trim();
        let v = line.slice(eq + 1).trim();
        // strip surrounding quotes
        if ((v.startsWith('"') && v.endsWith('"')) || (v.startsWith("'") && v.endsWith("'"))) v = v.slice(1, -1);
        return {k, v};
      });
    }
    if (rows.length === 0) rows.push({k:'', v:''});
    renderRows();
    generate();
  } catch(e) {
    alert('Parse error: ' + e.message);
  }
}

function downloadEnv(filename) {
  generate();
  const content = $('#output').textContent;
  const blob = new Blob([content], {type: 'text/plain'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
  URL.revokeObjectURL(a.href);
}

function escAttr(s) { return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

$('#presets').innerHTML = Object.keys(PRESETS).map(name =>
  `<button class="preset-btn" onclick="loadPreset('${name}')">${name}</button>`).join('');

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="addRow()">${t('addRow')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="importText('json')">${t('importJson')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="importText('kv')">${t('importKv')}</button>
  <label style="display:flex;align-items:center;gap:6px;font-size:.88em;cursor:pointer;margin-left:auto">
    <input type="checkbox" onchange="exampleMode=this.checked;generate()"> ${t('exampleMode')}
  </label>
  <button class="gz-btn" onclick="generate()">${t('generate')}</button>
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="downloadEnv('.env')">${t('download')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="downloadEnv('.env.example')">${t('downloadExample')}</button>`;

renderRows();
generate();

GZ.renderToolPage({
  category: 'dev',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📄', href:'/dev/yaml-formatter.html', name:'YAML Formatter'},
    {icon:'🔧', href:'/dev/toml-formatter.html', name:'TOML Formatter'},
    {icon:'📝', href:'/dev/ini-formatter.html', name:'INI Formatter'},
    {icon:'🔑', href:'/dev/password-generator.html', name:'Password Generator'},
  ]
});
</script>

</body>
