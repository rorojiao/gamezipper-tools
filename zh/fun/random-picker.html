<script>
GZI18n.register({
  en: {
    toolTitle: 'Random List Picker',
    toolDesc: 'Pick random items from a list instantly. Perfect for giveaways, team assignments, classroom picks and decision making.',
    inputLabel: 'Enter items (one per line)',
    resultLabel: 'Result',
    pickCount: 'Pick',
    items: 'items',
    pickBtn: '🎲 Pick!',
    noDuplicates: 'No duplicates',
    sortResult: 'Sort result',
    emptyMsg: 'Click Pick to select random items',
    step1: 'Enter your items in the text area (one per line)',
    step2: 'Set how many items to pick',
    step3: 'Toggle no-duplicates and sort options',
    step4: 'Click Pick to get your random selection',
  },
  zh: {
    toolTitle: '随机列表抽取器',
    toolDesc: '即时从列表中随机抽取项目。适合抽奖、分组、课堂点名和决策。',
    inputLabel: '输入项目（每行一个）',
    resultLabel: '结果',
    pickCount: '抽取',
    items: '个',
    pickBtn: '🎲 抽取！',
    noDuplicates: '不重复',
    sortResult: '排序结果',
    emptyMsg: '点击抽取按钮随机选择项目',
    step1: '在文本框中输入项目（每行一个）',
    step2: '设置抽取数量',
    step3: '切换不重复和排序选项',
    step4: '点击抽取获取随机选择结果',
  }
});

const { $, copyText, t } = GZ;

function buildToolbar() {
  $('#toolbar').innerHTML = `
    <label>${t('pickCount')} <input type="number" id="inp-count" min="1" max="999" value="1" style="width:60px"> ${t('items')}</label>
    <label><input type="checkbox" id="inp-nodup" checked> ${t('noDuplicates')}</label>
    <label><input type="checkbox" id="inp-sort"> ${t('sortResult')}</label>
    <button class="gz-btn" onclick="doPick()">${t('pickBtn')}</button>`;
  $('#lbl-in').textContent = t('inputLabel');
  $('#lbl-out').textContent = t('resultLabel');
  $('#empty-msg').textContent = t('emptyMsg');
}

function secureRandom(max) {
  const arr = new Uint32Array(1);
  crypto.getRandomValues(arr);
  return arr[0] % max;
}

function doPick() {
  const raw = $('#input').value.trim();
  if (!raw) return;
  const items = raw.split('\n').map(s => s.trim()).filter(Boolean);
  if (!items.length) return;
  const count = Math.min(items.length, Math.max(1, +$('#inp-count').value));
  const noDup = $('#inp-nodup').checked;
  const sort = $('#inp-sort').checked;

  let picked = [];
  if (noDup) {
    const pool = [...items];
    for (let i = 0; i < count && pool.length; i++) {
      const idx = secureRandom(pool.length);
      picked.push(pool.splice(idx, 1)[0]);
    }
  } else {
    for (let i = 0; i < count; i++) {
      picked.push(items[secureRandom(items.length)]);
    }
  }

  if (sort) picked.sort();

  const area = $('#result-area');
  if (picked.length === 1) {
    area.innerHTML = `<div class="picked">${picked[0]}</div><div style="margin-top:8px"><button class="gz-btn gz-btn-secondary" style="font-size:.8em" onclick="copyText('${picked[0].replace(/'/g,"\\'")}')">📋 Copy</button></div>`;
  } else {
    area.innerHTML = picked.map(p => `<span class="picked all">${p}</span>`).join('') +
      `<div style="margin-top:12px"><button class="gz-btn gz-btn-secondary" style="font-size:.8em" onclick="copyText(this.dataset.t)" data-t="${picked.join('\n').replace(/"/g,'&quot;')}">📋 Copy All</button></div>`;
  }
}

buildToolbar();

GZ.renderToolPage({
  category: 'fun',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🎲', href:'/fun/dice-roller.html', name:'Dice Roller'},
    {icon:'🎰', href:'/fun/wheel-of-names.html', name:'Spin Wheel'},
    {icon:'🪙', href:'/fun/coin-flip.html', name:'Coin Flip'},
    {icon:'📋', href:'/text/remove-duplicates.html', name:'Remove Duplicates'},
  ]
});
</script>
