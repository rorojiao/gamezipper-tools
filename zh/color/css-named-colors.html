const CATEGORIES = {
  all: 'All', red: 'Red/Pink', blue: 'Blue', green: 'Green', yellow: 'Yellow/Orange',

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `rgb(${r}, ${g}, ${b})`;
}

function hexToHsl(hex) {
  let r = parseInt(hex.slice(1,3),16)/255, g = parseInt(hex.slice(3,5),16)/255, b = parseInt(hex.slice(5,7),16)/255;
  const max = Math.max(r,g,b), min = Math.min(r,g,b);
  let h, s, l = (max+min)/2;
  if (max === min) { h = s = 0; }
  else {
    const d = max - min;
    s = l > 0.5 ? d/(2-max-min) : d/(max+min);
    switch(max) {
      case r: h = (g-b)/d + (g<b?6:0); break;
      case g: h = (b-r)/d + 2; break;
      case b: h = (r-g)/d + 4; break;
    }
    h /= 6;
  }
  return `hsl(${Math.round(h*360)}, ${Math.round(s*100)}%, ${Math.round(l*100)}%)`;
}

function getColorCategory(name, hex) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  const luma = (0.299*r + 0.587*g + 0.114*b);
  if (luma < 80) return 'dark';
  if (luma > 200) return 'light';
  if (name.includes('red') || name.includes('pink') || name.includes('salmon') || name.includes('coral')) return 'red';
  if (name.includes('blue')) return 'blue';
  if (name.includes('green')) return 'green';
  if (name.includes('yellow') || name.includes('orange') || name.includes('gold')) return 'yellow';
  if (name.includes('purple') || name.includes('violet') || name.includes('magenta') || name.includes('orchid') || name.includes('plum')) return 'purple';
  if (name.includes('gray') || name.includes('grey') || name.includes('slate')) return 'gray';
  if (name.includes('brown') || name.includes('tan') || name.includes('chocolate') || name.includes('sienna')) return 'brown';
  if (name.includes('white') || name.includes('snow') || name.includes('ivory')) return 'white';
  return 'all';
}

let currentFilter = 'all';

function renderColors() {
  const search = $('#searchInput').value.toLowerCase().trim();
  const filtered = COLORS.filter(([name, hex]) => {
    if (currentFilter !== 'all' && getColorCategory(name, hex) !== currentFilter) return false;
    if (!search) return true;
    return name.includes(search) || hex.toLowerCase().includes(search);
  });

  $('#colorGrid').innerHTML = filtered.map(([name, hex]) => `
    <div class="color-card" onclick="showDetail('${name}','${hex}')">
      <div class="color-swatch" style="background:${hex}"></div>
      <div class="color-info">
        <div class="color-name">${name}</div>
        <div class="color-hex">${hex.toUpperCase()}</div>
      </div>
    </div>
  `).join('');
}

  const rgb = hexToRgb(hex);
  const hsl = hexToHsl(hex);
  $('#detailBox').innerHTML = `

    <h3 style="text-transform:capitalize;margin-bottom:12px">${name}</h3>
    <div class="detail-row"><span>HEX</span><span>${hex.toUpperCase()} <button class="gz-btn gz-btn-secondary" onclick="copyText('${hex.toUpperCase()}')">${t('copy')}</button></span></div>
    <div class="detail-row"><span>RGB</span><span>${rgb} <button class="gz-btn gz-btn-secondary" onclick="copyText('${rgb}')">${t('copy')}</button></span></div>
    <div class="detail-row"><span>HSL</span><span>${hsl} <button class="gz-btn gz-btn-secondary" onclick="copyText('${hsl}')">${t('copy')}</button></span></div>
    <div class="detail-row"><span>Name</span><span>${name} <button class="gz-btn gz-btn-secondary" onclick="copyText('${name}')">${t('copy')}</button></span></div>
    <button class="gz-btn" style="width:100%;margin-top:16px" onclick="closeDetail({target:null})">Close</button>
  `;
  $('#detail').classList.add('show');
}

function closeDetail(e) {
  if (e && e.target && e.target.id !== 'detail') return;
  $('#detail').classList.remove('show');
}

function setFilter(cat) {
  currentFilter = cat;

  renderColors();
}
