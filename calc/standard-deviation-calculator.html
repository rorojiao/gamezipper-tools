<script type="application/ld+json">{"@context":"https://schema.org","@type":"WebApplication","name":"Standard Deviation Calculator","description":"Free standard deviation calculator. Paste any list of numbers to get population standard deviation, sample standard deviation, variance, mean and range with a step-by-step formula.","url":"https://tools.gamezipper.com/calc/standard-deviation-calculator.html","applicationCategory":"Utility","operatingSystem":"Web Browser","offers":{"@type":"Offer","price":"0"}}</script>
<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"What is the standard deviation formula?","acceptedAnswer":{"@type":"Answer","text":"Population SD: sigma = sqrt( sum((x - mean)^2) / N ). Sample SD: s = sqrt( sum((x - mean)^2) / (N - 1) ). You square the difference of each value from the mean, average those squares, then take the square root."}},{"@type":"Question","name":"What is the difference between sample and population standard deviation?","acceptedAnswer":{"@type":"Answer","text":"Population standard deviation divides by N (use it when your data is the entire group). Sample standard deviation divides by N-1 (Bessel's correction) and is used when your data is a sample of a larger population, giving an unbiased estimate."}},{"@type":"Question","name":"When should I divide by N vs N-1?","acceptedAnswer":{"@type":"Answer","text":"Divide by N when you have every member of the population you care about. Divide by N-1 when you have a sample and want to estimate the spread of the whole population. Most real datasets (test scores, survey responses) are samples, so use sample SD."}},{"@type":"Question","name":"What does a high standard deviation mean?","acceptedAnswer":{"@type":"Answer","text":"A high standard deviation means the values are spread out far from the mean (more variability). A low standard deviation means the values cluster tightly around the mean. Standard deviation is in the same units as the original data."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">

  </div>

    <div class="sd-result" id="result">

      <div id="resultMeta" style="color:var(--text2);font-size:.9rem"></div>

</div>
<script>
GZI18n.register({
  en:{
    toolTitle:'Standard Deviation Calculator',
    toolDesc:'Calculate the standard deviation of any list of numbers. Get both sample (s) and population (σ) standard deviation, variance, mean and range, with a step-by-step breakdown of the formula.',
    sample:'Sample (N−1)',
    population:'Population (N)',
    copy:'Copy',clear:'Clear',example:'Example',
    cellMean:'Mean',cellVar:'Variance',cellRange:'Range',cellCount:'Count (N)',cellSum:'Sum',
    cellPopSD:'Population σ',cellSampleSD:'Sample s',
    placeholder:'Enter numbers separated by commas, spaces or new lines',
    formulaHead:'Formula: SD = √( Σ(x − mean)² / (N or N−1) )',
    step:'Step',
    stepMean:'Mean = sum ÷ N',
    stepSq:'Square each deviation (x − mean)²',
    stepSum:'Sum the squared deviations',
    stepDivide:'Divide by',
    stepRoot:'Take the square root',
    needMore:'Enter at least 2 numbers (3+ recommended for sample SD).',
    step1:'Enter your numbers separated by commas, spaces or new lines',
    step2:'Choose Sample (N−1) for a sample or Population (N) for the whole group',
    step3:'Read the standard deviation and supporting stats',
    step4:'Expand the formula breakdown to see each step',
  },
  zh:{
    toolTitle:'标准差计算器',
    toolDesc:'计算任意数字列表的标准差。同时给出样本标准差（s）和总体标准差（σ）、方差、平均值和极差，并提供逐步公式分解。',
    sample:'样本（N−1）',
    population:'总体（N）',
    copy:'复制',clear:'清空',example:'示例',
    cellMean:'平均值',cellVar:'方差',cellRange:'极差',cellCount:'个数 (N)',cellSum:'总和',
    cellPopSD:'总体 σ',cellSampleSD:'样本 s',
    placeholder:'输入数字，可用逗号、空格或换行分隔',
    formulaHead:'公式：SD = √( Σ(x − 平均值)² / (N 或 N−1) )',
    step:'步骤',
    stepMean:'平均值 = 总和 ÷ N',
    stepSq:'计算每个离差平方 (x − 平均值)²',
    stepSum:'将离差平方求和',
    stepDivide:'除以',
    stepRoot:'开平方',
    needMore:'至少输入 2 个数字（样本标准差建议 3 个以上）。',
    step1:'输入数字，可用逗号、空格或换行分隔',
    step2:'选择「样本（N−1）」或「总体（N）」',
    step3:'查看标准差及相关统计量',
    step4:'展开公式分解查看每一步',
  }
});

const { $, copyText, t } = GZ;
let mode='sample';

function fmt(n){ if(!isFinite(n)) return String(n); const r=Math.round(n*1e8)/1e8; return r.toLocaleString('en-US',{maximumFractionDigits:8}); }

function parse(){ return $('#input').value.split(/[\s,;]+/).map(s=>parseFloat(s)).filter(n=>!isNaN(n)); }

function calc(){
  const nums=parse();
  const N=nums.length;
  if(N<2){ $('#resultBig').textContent='—'; $('#resultMeta').textContent=t('needMore'); $('#grid').innerHTML=''; $('#formula').textContent=t('formulaHead'); return; }
  const sum=nums.reduce((a,b)=>a+b,0);
  const mean=sum/N;
  const sq=nums.map(x=>Math.pow(x-mean,2));
  const sumSq=sq.reduce((a,b)=>a+b,0);
  const popVar=sumSq/N;
  const sampleVar=N>1?sumSq/(N-1):0;
  const popSD=Math.sqrt(popVar);
  const sampleSD=Math.sqrt(sampleVar);
  const range=Math.max(...nums)-Math.min(...nums);

  const isSample=mode==='sample';
  const showSD=isSample?sampleSD:popSD;
  const showVar=isSample?sampleVar:popVar;
  const divBy=isSample?(N-1):N;

  $('#resultBig').textContent=fmt(showSD);
  $('#resultMeta').textContent=isSample?t('cellSampleSD'):t('cellPopSD');
  $('#grid').innerHTML=
    `<div class="sd-cell"><div class="lbl">${t('cellMean')}</div><div class="val">${fmt(mean)}</div></div>`+
    `<div class="sd-cell"><div class="lbl">${t('cellVar')}</div><div class="val">${fmt(showVar)}</div></div>`+
    `<div class="sd-cell"><div class="lbl">${t('cellRange')}</div><div class="val">${fmt(range)}</div></div>`+
    `<div class="sd-cell"><div class="lbl">${t('cellCount')}</div><div class="val">${N}</div></div>`+
    `<div class="sd-cell"><div class="lbl">${t('cellSum')}</div><div class="val">${fmt(sum)}</div></div>`+
    `<div class="sd-cell"><div class="lbl">${isSample?t('cellPopSD'):t('cellSampleSD')}</div><div class="val">${fmt(isSample?popSD:sampleSD)}</div></div>`;

  // formula breakdown (limit rows shown for huge inputs)
  const rows=nums.slice(0,12).map((x,i)=>`<div>${fmt(x)} − ${fmt(mean)} = ${fmt(x-mean)}  →  (${fmt(x-mean)})² = <b>${fmt(sq[i])}</b></div>`).join('');
  const more=nums.length>12?`<div style="opacity:.7">… ${nums.length-12} more rows hidden</div>`:'';
  $('#formula').innerHTML=
    `<div>${t('formulaHead')}</div>`+
    `<div style="margin-top:8px">${t('step')} 1 — ${t('stepMean')}: ${fmt(sum)} / ${N} = <b>${fmt(mean)}</b></div>`+
    `<div style="margin-top:6px">${t('step')} 2 — ${t('stepSq')}:</div>`+
    rows+more+
    `<div style="margin-top:6px">${t('step')} 3 — ${t('stepSum')}: Σ = <b>${fmt(sumSq)}</b></div>`+
    `<div>${t('step')} 4 — ${t('stepDivide')} ${divBy}: ${fmt(sumSq)} / ${divBy} = <b>${fmt(showVar)}</b></div>`+
    `<div>${t('step')} 5 — ${t('stepRoot')}: √${fmt(showVar)} = <b>${fmt(showSD)}</b></div>`;
}

$('#btn-sample').addEventListener('click',()=>{mode='sample';$('#btn-sample').classList.add('active');$('#btn-pop').classList.remove('active');calc();});
$('#btn-pop').addEventListener('click',()=>{mode='population';$('#btn-pop').classList.add('active');$('#btn-sample').classList.remove('active');calc();});
$('#input').addEventListener('input',calc);

function loadExample(){ $('#input').value='2, 4, 4, 4, 5, 5, 7, 9'; calc(); }

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="calc()">↻ Recalc</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="copyText($('#resultBig').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#input').value='';calc()">${t('clear')}</button>`;

$('#btn-sample').textContent=t('sample');
$('#btn-pop').textContent=t('population');
$('#input').placeholder=t('placeholder');

GZ.renderToolPage({
  category:'calc',
  titleKey:'toolTitle',
  descKey:'toolDesc',
  howToSteps:['step1','step2','step3','step4'],
  related:[
    {icon:'📊',href:'/calc/statistics-calculator.html',name:'Statistics Calculator'},
    {icon:'📈',href:'/calc/linear-regression.html',name:'Linear Regression'},
    {icon:'ⁿ√',href:'/calc/cube-root-calculator.html',name:'Root Calculator'},
    {icon:'🔢',href:'/calc/z-score-calculator.html',name:'Z-Score Calculator'},
  ]
});
calc();
</script>
<script src="/tools-result-rec.js?v=20260707v520" defer></script>
</body>
