<script type="application/ld+json">{"@context":"https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is Lorem Picsum?", "acceptedAnswer": {"@type": "Answer", "text": "Lorem Picsum is a free placeholder image service that serves real photographs from Unsplash. Instead of grey boxes with text, you get real images at any size — perfect for design mockups, dev layouts and demo content."}}, {"@type": "Question", "name": "Can I lock a specific image?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. Use a /seed/{name} segment in the URL. The same seed always returns the same image, so your mockup is reproducible. Change the seed to swap the photo without touching the rest of the URL."}}, {"@type": "Question", "name": "Does it support blur and grayscale?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. Append ?blur=1-10 for blur, ?grayscale to convert to greyscale, or combine both with ?grayscale&blur=2. The query parameters are documented on the official Picsum site and work in all our generated URLs."}}, {"@type": "Question", "name": "Are the images royalty free?", "acceptedAnswer": {"@type": "Answer", "text": "Lorem Picsum images come from Unsplash and are released under the Unsplash License — free for commercial and non-commercial use, no attribution required. Always check the latest license terms on picsum.photos before shipping production work."}}]}</script>

<div class="opt"><label id="lbl-w">Width (px)</label><input type="number" id="w" value="600" min="1" max="5000"></div>
<div class="opt"><label id="lbl-h">Height (px)</label><input type="number" id="h" value="400" min="0" max="5000"></div>
<div class="opt"><label id="lbl-seed">Seed (optional)</label><input type="text" id="seed" value="" placeholder="random"></div>
<div class="opt"><label id="lbl-id">Specific ID (optional)</label><input type="number" id="id" value="" min="0" max="1084" placeholder="0-1084"></div>
<div class="opt"><label id="lbl-blur">Blur (0-10)</label><input type="number" id="blur" value="0" min="0" max="10"></div>
<div class="opt"><label id="lbl-gray">Grayscale</label><select id="gray"><option value="">Off</option><option value="?grayscale">On</option></select></div>
<div class="opt"><label id="lbl-ext">Format</label><select id="ext"><option value="">JPG (default)</option><option value=".webp">WebP</option></select></div>

<script>
GZI18n.register({
en:{
toolTitle:'Lorem Picsum Image URL Builder',
toolDesc:'Generate Lorem Picsum URLs with custom size, seed, blur, grayscale and format. Live preview grid, copy URL or HTML/Markdown snippet.',
lblW:'Width (px)', lblH:'Height (px)', lblSeed:'Seed (optional)', lblId:'Specific ID (optional)',
lblBlur:'Blur (0-10)', lblGray:'Grayscale', lblExt:'Format', lblCount:'Preview count',
lblMd:'HTML & Markdown snippet',
btnExample:'Random preset', btnCopyUrl:'Copy URL', btnCopyMd:'Copy snippet', btnNewSeed:'New random seed',
step1:'Set width, height and any optional parameters (seed, blur, grayscale, format)',
step2:'The URL is generated live — copy the URL or the HTML/Markdown snippet',
step3:'Use the preview grid to test the look of multiple seeds at once',
step4:'Drop the snippet into your mockup, README or dev layout',
},
zh:{
toolTitle:'Lorem Picsum 图片 URL 生成器',
toolDesc:'使用自定义尺寸、种子、模糊、灰度和格式生成 Lorem Picsum URL。实时预览网格，一键复制 URL 或 HTML/Markdown 片段。',
lblW:'宽度 (px)', lblH:'高度 (px)', lblSeed:'种子（可选）', lblId:'指定 ID（可选）',
lblBlur:'模糊 (0-10)', lblGray:'灰度', lblExt:'格式', lblCount:'预览数量',
lblMd:'HTML & Markdown 片段',
btnExample:'随机预设', btnCopyUrl:'复制 URL', btnCopyMd:'复制片段', btnNewSeed:'换新种子',
step1:'设置宽高和任意可选参数（种子、模糊、灰度、格式）',
step2:'URL 实时生成 — 复制 URL 或 HTML/Markdown 片段',
step3:'使用预览网格同时测试多个种子的效果',
step4:'将片段放入你的 mockup、README 或开发布局中',
}
});

const { $, t } = GZ;
let currentSeeds = [];

function buildUrl(w, h, seed, id, blur, gray, ext) {
  let url = 'https://picsum.photos';
  if (id !== '' && !isNaN(+id) && +id >= 0) {
    url += '/id/' + id + '/' + w + (h ? '/' + h : '');
  } else if (seed) {
    url += '/seed/' + encodeURIComponent(seed) + '/' + w + (h ? '/' + h : '');
  } else {
    url += '/' + w + (h ? '/' + h : '');
  }
  const params = [];
  if (gray) params.push(gray.replace('?', ''));
  if (blur > 0) params.push('blur=' + blur);
  if (ext) params.push(ext.replace('.', ''));
  if (params.length) url += '?' + params.join('&');
  return url;
}

function randomSeed() {
  return Math.random().toString(36).slice(2, 8);
}

function update() {
  const w = +$('#w').value || 600;
  const h = +$('#h').value || 400;
  const seed = $('#seed').value.trim();
  const id = $('#id').value;
  const blur = +$('#blur').value || 0;
  const gray = $('#gray').value;
  const ext = $('#ext').value;
  const count = Math.min(20, Math.max(1, +$('#count').value || 6));

  const url = buildUrl(w, h, seed, id, blur, gray, ext);
  $('#urlOut').textContent = url;
  const snip = `<img src="${url}" alt="Placeholder" width="${w}"${h ? ' height="' + h + '"' : ''} loading="lazy">`;
  const md = `![Placeholder](${url})`;
  $('#snippet').textContent = snip + '\n\n' + md;

  // Preview grid
  currentSeeds = [];
  const grid = $('#grid');
  grid.innerHTML = '';
  for (let i = 0; i < count; i++) {
    const s = seed ? (seed + '-' + i) : (randomSeed() + '-' + i);
    currentSeeds.push(s);
    const testUrl = (id && i === 0) ? buildUrl(w, h, '', id, blur, gray, ext) : buildUrl(w, h, s, '', blur, gray, ext);
    const div = document.createElement('div');
    div.className = 'item';
    div.innerHTML = `<img src="${testUrl}" alt="" loading="lazy" onerror="this.style.background='var(--bg2)';this.alt='Image failed'"><div class="meta">${s}<br>${w}×${h}</div>`;
    grid.appendChild(div);
  }
}

['w','h','seed','id','blur','gray','ext','count'].forEach(id => {
  $('#' + id).addEventListener('input', update);
  $('#' + id).addEventListener('change', update);
});

function copyUrl() { GZ.copyText($('#urlOut').textContent); }
function copyMd() { GZ.copyText($('#snippet').textContent); }
function newSeed() { $('#seed').value = ''; $('#id').value = ''; update(); }
function loadExample() { $('#w').value = 800; $('#h').value = 600; $('#seed').value = 'gamezipper'; $('#blur').value = 0; $('#count').value = 6; update(); }

$('#toolbar').innerHTML = `
<button class="gz-btn" onclick="copyUrl()">${t('btnCopyUrl')}</button>
<button class="gz-btn gz-btn-secondary" onclick="copyMd()">${t('btnCopyMd')}</button>
<button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('btnExample')}</button>
<button class="gz-btn gz-btn-secondary" onclick="newSeed()">${t('btnNewSeed')}</button>`;

GZ.renderToolPage({
category:'image',
titleKey:'toolTitle',
descKey:'toolDesc',
howToSteps:['step1','step2','step3','step4'],
related:[
{icon:'🖼️',href:'/image/placeholder.html',name:'Placeholder Image'},
{icon:'🖼️',href:'/image/image-to-base64.html',name:'Image to Base64'},
{icon:'📦',href:'/image/compressor.html',name:'Image Compressor'},
{icon:'🖼️',href:'/image/image-to-favicon.html',name:'Image to Favicon'},
]
});
</script>
