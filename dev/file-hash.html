x[i+5],5,3593408605);d=k(d,a,b,c,x[i+10],9,38016083);c=k(c,d,a,b,x[i+15],14,3634488961);b=k(b,c,d,a,x[i+4],20,3889429448);a=k(a,b,c,d,x[i+9],5,568446438);d=k(d,a,b,c,x[i+14],9,3275163606);c=k(c,d,a,b,x[i+3],14,4107603335);b=k(b,c,d,a,x[i+8],20,1163531501);a=k(a,b,c,d,x[i+13],5,2850285829);d=k(d,a,b,c,x[i+2],9,4243563512);c=k(c,d,a,b,x[i+7],14,1735328473);b=k(b,c,d,a,x[i+12],20,2368359562);a=m(a,b,c,d,x[i+5],4,4294588738);d=m(d,a,b,c,x[i+8],11,2272392833);c=m(c,d,a,b,x[i+11],16,1839030562);b=m(b,c,d,a,x[i+14],23,4259657740);a=m(a,b,c,d,x[i+1],4,2763975236);d=m(d,a,b,c,x[i+4],11,1272893353);c=m(c,d,a,b,x[i+7],16,4139469664);b=m(b,c,d,a,x[i+10],23,3200236656);a=m(a,b,c,d,x[i+13],4,681279174);d=m(d,a,b,c,x[i],11,3936430074);c=m(c,d,a,b,x[i+3],16,3572445317);b=m(b,c,d,a,x[i+6],23,76029189);a=m(a,b,c,d,x[i+9],4,3654602809);d=m(d,a,b,c,x[i+12],11,3873151461);c=m(c,d,a,b,x[i+15],16,530742520);b=m(b,c,d,a,x[i+2],23,3299628645);a=n(a,b,c,d,x[i],6,4096336452);d=n(d,a,b,c,x[i+7],10,1126891415);c=n(c,d,a,b,x[i+14],15,2878612391);b=n(b,c,d,a,x[i+5],21,4237533241);a=n(a,b,c,d,x[i+12],6,1700485571);d=n(d,a,b,c,x[i+3],10,2399980690);c=n(c,d,a,b,x[i+10],15,4293915773);b=n(b,c,d,a,x[i+1],21,2240044497);a=n(a,b,c,d,x[i+8],6,1873313359);d=n(d,a,b,c,x[i+15],10,4264355552);c=n(c,d,a,b,x[i+6],15,2734768916);b=n(b,c,d,a,x[i+13],21,1309151649);a=n(a,b,c,d,x[i+4],6,4149444226);d=n(d,a,b,c,x[i+11],10,3174756917);c=n(c,d,a,b,x[i+2],15,718787259);b=n(b,c,d,a,x[i+9],21,3951481745);a=h(a,e);b=h(b,f);c=h(c,g);d=h(d,j)}return(p(a)+p(b)+p(c)+p(d)).toLowerCase()}

function bufToHex(buf) {
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

function formatSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1048576) return (bytes/1024).toFixed(1) + ' KB';
  return (bytes/1048576).toFixed(1) + ' MB';
}

async function hashFile(file) {
  const info = $('#file-info');
  info.style.display = 'block';
  info.textContent = t('fileInfo').replace('{name}', file.name).replace('{size}', formatSize(file.size));

  const buf = await file.arrayBuffer();
  const results = $('#hash-results');
  results.innerHTML = '';

  // MD5 (use text, not buffer - for small files)
  const text = await file.text();
  const md5Val = md5(text);
  addHashRow(results, 'MD5', md5Val);

  for (const algo of ALGOS) {
    const hash = await crypto.subtle.digest(algo, buf);
    addHashRow(results, algo, bufToHex(hash));
  }
}

function addHashRow(container, label, value) {
  const row = document.createElement('div');
  row.className = 'hash-row';
  row.innerHTML = `<label>${label}</label><code>${value}</code>`;
  const btn = document.createElement('button');
  btn.className = 'gz-btn gz-btn-secondary';
  btn.textContent = t('copy');
  btn.style.fontSize = '.75em';
  btn.onclick = () => copyText(value);
  row.appendChild(btn);
  container.appendChild(row);
}

async function hashText() {
  const text = $('#text-input').value;
  if (!text) { $('#text-hash-results').innerHTML = ''; return; }
  const results = $('#text-hash-results');
  results.innerHTML = '';
  addHashRow(results, 'MD5', md5(text));
  const enc = new TextEncoder();
  for (const algo of ALGOS) {
    const hash = await crypto.subtle.digest(algo, enc.encode(text));
    addHashRow(results, algo, bufToHex(hash));
  }
}

const dz = $('#drop-zone');
dz.addEventListener('click', () => $('#file-input').click());
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('dragover'); });
dz.addEventListener('dragleave', () => dz.classList.remove('dragover'));
dz.addEventListener('drop', e => {
  e.preventDefault(); dz.classList.remove('dragover');
  if (e.dataTransfer.files.length) hashFile(e.dataTransfer.files[0]);
});
$('#file-input').addEventListener('change', e => {
  if (e.target.files.length) hashFile(e.target.files[0]);
});
$('#text-input').addEventListener('input', hashText);
$('#drop-text').textContent = t('dropText');

$('#toolbar').innerHTML = `
  <button class="gz-btn gz-btn-secondary" onclick="$('#file-input').click()">${t('example').includes('Example')||t('example').includes('示例')?t('example').replace(/Example|示例/,'Browse File').replace(/示例/,'浏览文件'):'Browse File'}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#file-info').style.display='none';$('#hash-results').innerHTML='';$('#text-hash-results').innerHTML='';$('#text-input').value='';">${t('clear')}</button>`;

$('#lbl-text-hash').textContent = t('lblTextHash');
$('#drop-text').textContent = t('dropText');
