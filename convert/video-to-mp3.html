const { $, t } = GZ;

let originalFile = null;
let videoURL = null;
let processedBlob = null;
let outName = '';

const fileInput = $('#fileInput');
const dropzone = $('#drop');
const controls = $('#controls');
const preview = $('#preview');
const extractBtn = $('#extractBtn');
const downloadBtn = $('#downloadBtn');
const dzText = $('#dz-text');

['dragover','dragenter'].forEach(ev => dropzone.addEventListener(ev, e => { e.preventDefault(); dropzone.classList.add('drag'); }));
['dragleave','drop'].forEach(ev => dropzone.addEventListener(ev, e => { e.preventDefault(); dropzone.classList.remove('drag'); }));

function fmtSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024*1024) return (bytes/1024).toFixed(1) + ' KB';
  return (bytes/1024/1024).toFixed(2) + ' MB';
}
function sCard(num, lbl) { return `<div class="v2m-stat"><div class="num" style="${lbl===t('file')?'font-size:.8rem':''}">${num}</div><div class="lbl">${lbl}</div></div>`; }

function loadFile(file) {
  if (!file.type.startsWith('video/') && !/\.(mp4|mov|webm|mkv|avi|m4v|ogv)$/i.test(file.name)) { alert('Please select a video file'); return; }
  originalFile = file;
  if (videoURL) URL.revokeObjectURL(videoURL);
  videoURL = URL.createObjectURL(file);
  const video = $('#video');
  video.src = videoURL;
  video.onloadedmetadata = () => {
    $('#videoStats').innerHTML = [
      sCard(file.name, t('file')),
      sCard(video.duration.toFixed(1) + ' ' + t('sec'), t('duration')),
      sCard(fmtSize(file.size), t('size')),
      sCard(video.videoWidth + '×' + video.videoHeight, t('videoInfo')),
    ].join('');
  };
  dzText.textContent = file.name;
  controls.style.display = 'grid';
  preview.style.display = 'block';
  $('#resultWrap').style.display = 'none';
  $('#audioOut').src = '';
}

async function decodeVideo(file, trimSec) {
  const arrayBuf = await file.arrayBuffer();
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  let buffer;
  try {
    buffer = await ctx.decodeAudioData(arrayBuf.slice(0));
  } catch (e) {
    await ctx.close();
    throw new Error(t('noAudio'));
  }
  const targetRate = parseInt($('#sampleRate').value, 10) || buffer.sampleRate;
  const targetChannels = parseInt($('#channels').value, 10);
  const chCount = targetChannels === 0 ? buffer.numberOfChannels : Math.min(targetChannels, buffer.numberOfChannels);
  let src = buffer;
  let totalSamples = buffer.length;
  if (trimSec > 0) totalSamples = Math.min(buffer.length, Math.floor(trimSec * buffer.sampleRate));
  const outLength = Math.ceil(totalSamples * targetRate / buffer.sampleRate);
  const out = new (window.OfflineAudioContext || window.webkitOfflineAudioContext)(chCount, outLength, targetRate);
  const node = out.createBufferSource();
  const trimmed = ctx.createBuffer(buffer.numberOfChannels, totalSamples, buffer.sampleRate);
  for (let c = 0; c < buffer.numberOfChannels; c++) {
    trimmed.getChannelData(c).set(buffer.getChannelData(c).subarray(0, totalSamples));
  }
  node.buffer = trimmed;
  node.connect(out.destination);
  node.start();
  const rendered = await out.startRendering();
  await ctx.close();
  return rendered;
}

function bufferToWav(audioBuffer) {
  const numCh = audioBuffer.numberOfChannels;
  const sampleRate = audioBuffer.sampleRate;
  const length = audioBuffer.length * numCh * 2 + 44;
  const buffer = new ArrayBuffer(length);
  const view = new DataView(buffer);
  const channels = [];
  for (let i = 0; i < numCh; i++) channels.push(audioBuffer.getChannelData(i));
  let offset = 0;
  const writeStr = s => { for (let i = 0; i < s.length; i++) view.setUint8(offset++, s.charCodeAt(i)); };
  writeStr('RIFF'); view.setUint32(offset, length - 8, true); offset += 4;
  writeStr('WAVE'); writeStr('fmt '); view.setUint32(offset, 16, true); offset += 4;
  view.setUint16(offset, 1, true); offset += 2;
  view.setUint16(offset, numCh, true); offset += 2;
  view.setUint32(offset, sampleRate, true); offset += 4;
  view.setUint32(offset, sampleRate * numCh * 2, true); offset += 4;
  view.setUint16(offset, numCh * 2, true); offset += 2;
  view.setUint16(offset, 16, true); offset += 2;
  writeStr('data'); view.setUint32(offset, length - 44, true); offset += 4;
  for (let i = 0; i < audioBuffer.length; i++) {
    for (let c = 0; c < numCh; c++) {
      let s = Math.max(-1, Math.min(1, channels[c][i]));
      view.setInt16(offset, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
      offset += 2;
    }
  }
  return new Blob([buffer], { type: 'audio/wav' });
}

async function encodeLossy(audioBuffer, mimeType) {
  return new Promise((resolve, reject) => {
    const arr = [];
    const ctx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: audioBuffer.sampleRate });
    const dest = ctx.createMediaStreamDestination();
    const src = ctx.createBufferSource();
    src.buffer = audioBuffer;
    src.connect(dest);
    let rec;
    try { rec = new MediaRecorder(dest.stream, { mimeType, audioBitsPerSecond: 96000 }); }
    catch (e) { ctx.close(); return reject(new Error('unsupported')); }
    rec.ondataavailable = e => { if (e.data.size) arr.push(e.data); };
    rec.onstop = () => { ctx.close(); resolve(new Blob(arr, { type: mimeType })); };
    rec.onerror = e => { ctx.close(); reject(e); };
    src.start();
    rec.start();
    src.onended = () => setTimeout(() => { if (rec.state !== 'inactive') rec.stop(); }, 120);
  });
}

extractBtn.addEventListener('click', async () => {
  if (!originalFile) { alert(t('noFile')); return; }
  extractBtn.disabled = true;
  $('#progWrap').style.display = 'block';
  $('#progFill').style.width = '30%';
  extractBtn.textContent = t('extracting');
  try {
    const trimSec = parseInt($('#trim').value, 10);
    const fmt = $('#format').value;
    const rendered = await decodeVideo(originalFile, trimSec);
    $('#progFill').style.width = '70%';
    let blob, ext;
    if (fmt === 'wav') { blob = bufferToWav(rendered); ext = 'wav'; }
    else if (fmt === 'webm') {
      try { blob = await encodeLossy(rendered, 'audio/webm;codecs=opus'); ext = 'webm'; }
      catch (e) { blob = bufferToWav(rendered); ext = 'wav'; }
    } else {
      try { blob = await encodeLossy(rendered, 'audio/ogg;codecs=vorbis'); ext = 'ogg'; }
      catch (e) {
        try { blob = await encodeLossy(rendered, 'audio/webm;codecs=opus'); ext = 'webm'; }
        catch (e2) { blob = bufferToWav(rendered); ext = 'wav'; }
      }
    }
    processedBlob = blob;
    outName = originalFile.name.replace(/\.[^.]+$/, '') + '.' + ext;
    $('#audioOut').src = URL.createObjectURL(blob);
    $('#resultHead').textContent = t('resultHead');
    $('#outStats').innerHTML = [
      sCard(outName, t('file')),
      sCard(rendered.duration.toFixed(1) + ' ' + t('sec'), t('duration')),
      sCard(fmtSize(blob.size), t('size')),
      sCard((rendered.sampleRate/1000).toFixed(1) + ' kHz', t('rateLbl')),
      sCard(rendered.numberOfChannels === 1 ? 'Mono' : 'Stereo', t('chanLbl')),
    ].join('');
    $('#resultWrap').style.display = 'block';
    $('#progFill').style.width = '100%';
    setTimeout(() => $('#progWrap').style.display = 'none', 500);
  } catch (e) {
    alert(e.message);
    $('#progWrap').style.display = 'none';
  } finally {
    extractBtn.disabled = false;
    extractBtn.textContent = t('extract');
  }
});

downloadBtn.addEventListener('click', () => {
  if (!processedBlob) return;
  const a = document.createElement('a');
  a.href = URL.createObjectURL(processedBlob);
  a.download = outName;
  a.click();
});
