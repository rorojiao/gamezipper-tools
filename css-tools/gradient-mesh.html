<script>
GZI18n.register({
en:{
toolTitle:'CSS Gradient Mesh Generator',
toolDesc:'Design organic mesh gradient backgrounds with multiple color blobs — perfect for hero sections, landing pages and social media banners.',
lblBase:'Base Color', lblBlobs:'Color Blobs', lblAdd:'Add Blob',
copyCss:'Copy CSS', randomize:'🎲 Randomize',
step1:'Pick a base color for the background',
step2:'Adjust each blob color, position and size',
step3:'Click a preset above for instant inspiration',
step4:'Copy the generated CSS and use it on your site',
},
zh:{
toolTitle:'CSS 渐变网格生成器',
toolDesc:'使用多个色斑设计有机的渐变网格背景 — 完美适用于 hero 区、落地页和社交媒体横幅。',
lblBase:'底色', lblBlobs:'色斑', lblAdd:'添加色斑',
copyCss:'复制 CSS', randomize:'🎲 随机',
step1:'选择背景底色',
step2:'调整每个色斑的颜色、位置和大小',
step3:'点击上方预设获取灵感',
step4:'复制生成的 CSS 用于你的网站',
}
});

const { $, copyText, t } = GZ;
let blobs = [
{ color: '#ff006e', x: 20, y: 30, size: 40 },
{ color: '#8338ec', x: 70, y: 20, size: 35 },
{ color: '#3a86ff', x: 50, y: 70, size: 45 },
{ color: '#06ffa5', x: 80, y: 80, size: 30 }
];

const presetSets = [
{ name:'Sunset', base:'#1a1a2e', blobs:[{color:'#ff006e',x:20,y:30,size:40},{color:'#fb5607',x:70,y:20,size:35},{color:'#ffbe0b',x:50,y:75,size:45}]},
{ name:'Ocean', base:'#0a2540', blobs:[{color:'#00d4ff',x:30,y:30,size:40},{color:'#0066ff',x:75,y:25,size:35},{color:'#00ffaa',x:60,y:75,size:40}]},
{ name:'Aurora', base:'#0d1b2a', blobs:[{color:'#7209b7',x:25,y:25,size:45},{color:'#3a86ff',x:75,y:30,size:40},{color:'#06ffa5',x:50,y:80,size:50}]},
{ name:'Candy', base:'#fff5f7', blobs:[{color:'#ff85a1',x:30,y:30,size:50},{color:'#ffafcc',x:70,y:70,size:45},{color:'#a2d2ff',x:50,y:50,size:40}]},
{ name:'Forest', base:'#1a2e1a', blobs:[{color:'#52b788',x:25,y:30,size:45},{color:'#2d6a4f',x:75,y:25,size:40},{color:'#95d5b2',x:55,y:75,size:40}]},
{ name:'Neon', base:'#0a0a1a', blobs:[{color:'#ff006e',x:20,y:25,size:40},{color:'#3a86ff',x:80,y:30,size:40},{color:'#06ffa5',x:50,y:80,size:45}]},
{ name:'Fire', base:'#1a0500', blobs:[{color:'#ff4500',x:30,y:25,size:45},{color:'#ff8c00',x:75,y:30,size:40},{color:'#ffd700',x:55,y:80,size:40}]},
{ name:'Bubblegum', base:'#ffe5f1', blobs:[{color:'#ff70a6',x:30,y:30,size:45},{color:'#ff9770',x:70,y:70,size:40},{color:'#70d6ff',x:50,y:50,size:40}]},
];

function update() {
const base = $('#baseColor').value;
const gradients = blobs.map(b => `radial-gradient(circle at ${b.x}% ${b.y}%, ${b.color} 0%, transparent ${b.size}%)`).join(', ');
const css = `background: ${base};\nbackground-image: ${gradients};`;
$('#preview').style.cssText = `background-color: ${base}; background-image: ${gradients};`;
$('#codeOut').textContent = `.gradient-mesh {\n  background-color: ${base};\n  background-image: ${gradients};\n  /* Add background-blend-mode for richer colors */\n}`;
renderBlobs();
}

function renderBlobs() {
const list = $('#blobList');
list.innerHTML = blobs.map((b, i) => `
<div class="blob-row">
<div class="blob-header">
<span class="blob-label">Blob ${i + 1}</span>
<input type="color" value="${b.color}" data-idx="${i}" data-prop="color">
${blobs.length > 1 ? `<button class="blob-del" data-del="${i}">✕</button>` : ''}
</div>
<div class="blob-controls">
<label>X: <input type="number" min="0" max="100" value="${b.x}" data-idx="${i}" data-prop="x"></label>
<label>Y: <input type="number" min="0" max="100" value="${b.y}" data-idx="${i}" data-prop="y"></label>
<label>Size: <input type="number" min="10" max="100" value="${b.size}" data-idx="${i}" data-prop="size"></label>
</div>
</div>`).join('');
list.querySelectorAll('input').forEach(inp => {
inp.addEventListener('input', e => {
const idx = +e.target.dataset.idx;
const prop = e.target.dataset.prop;
blobs[idx][prop] = e.target.type === 'color' ? e.target.value : +e.target.value;
update();
});
});
list.querySelectorAll('[data-del]').forEach(btn => {
btn.addEventListener('click', () => {
const idx = +btn.dataset.del;
blobs.splice(idx, 1);
update();
});
});
}

$('#baseColor').addEventListener('input', e => { $('#baseColor').value = e.target.value; update(); });
$('#lblBase').textContent = t('lblBase');
$('#lblBlobs').textContent = t('lblBlobs');
$('#lblAdd').textContent = t('lblAdd');
$('#addBlob').addEventListener('click', () => {
if (blobs.length < 8) {
const colors = ['#ff006e','#8338ec','#3a86ff','#06ffa5','#ffbe0b','#fb5607','#ff70a6','#7209b7'];
blobs.push({ color: colors[blobs.length % colors.length], x: 50, y: 50, size: 35 });
update();
}
});

$('#presets').innerHTML = presetSets.map((p, i) => `<div class="preset" data-idx="${i}" title="${p.name}" style="background-color:${p.base};background-image:${p.blobs.map(b => `radial-gradient(circle at ${b.x}% ${b.y}%, ${b.color} 0%, transparent ${b.size}%)`).join(', ')}"></div>`).join('');
$('#presets').querySelectorAll('.preset').forEach(el => {
el.addEventListener('click', () => {
const p = presetSets[+el.dataset.idx];
$('#baseColor').value = p.base;
blobs = p.blobs.map(b => ({...b}));
update();
});
});

$('#toolbar').innerHTML = `
<button class="gz-btn" onclick="copyText($('#codeOut').textContent)">${t('copyCss')}</button>
<button class="gz-btn gz-btn-secondary" id="randomBtn">${t('randomize')}</button>`;
$('#randomBtn').addEventListener('click', () => {
const palette = ['#ff006e','#8338ec','#3a86ff','#06ffa5','#ffbe0b','#fb5607','#ff70a6','#7209b7','#ff8500','#06d6a0'];
const base = palette[Math.floor(Math.random() * palette.length)];
const count = 3 + Math.floor(Math.random() * 2);
$('#baseColor').value = base;
blobs = [];
for (let i = 0; i < count; i++) {
blobs.push({ color: palette[Math.floor(Math.random() * palette.length)], x: Math.floor(Math.random()*90+5), y: Math.floor(Math.random()*90+5), size: 30 + Math.floor(Math.random()*25) });
}
update();
});

update();

GZ.renderToolPage({
category: 'css',
titleKey: 'toolTitle',
descKey: 'toolDesc',
howToSteps: ['step1','step2','step3','step4'],
related: [
{icon:'🌈', href:'/css-tools/gradient.html', name:'CSS Gradient'},
{icon:'🎬', href:'/css-tools/gradient-animator.html', name:'Gradient Animator'},
{icon:'🪟', href:'/css-tools/backdrop-filter.html', name:'Backdrop Filter'},
{icon:'📐', href:'/css-tools/pattern.html', name:'Pattern'},
]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
