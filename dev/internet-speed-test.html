<body>
<div class="gz-container">

<script>
GZI18n.register({
  en: {
    toolTitle: 'Internet Speed Test',
    toolDesc: 'Measure your download speed, latency (ping), jitter and effective connection type right in the browser. No app, no upload to our servers.',
    start: 'Start Test',
    stop: 'Stop',
    running: 'Testing…',
    speedLabel: 'Download speed',
    pingLbl: 'Latency (ping)',
    jitterLbl: 'Jitter',
    effLbl: 'Effective type',
    ispLbl: 'Connection',
    step1: 'Close streaming apps and big downloads for the most accurate result',
    step2: 'Click Start Test — downloads run for several seconds',
    step3: 'Watch the live gauge and per-tile stats update in real time',
    step4: 'Compare ping, jitter and effective type to gauge quality',
    logStart: '→ Starting speed test…',
    logPing: '→ Measuring latency…',
    logPingDone: (n)=>`→ Latency: ${n} ms`,
    logDown: '→ Measuring download speed…',
    logDownChunk: (n)=>`→ Chunk ${n} done`,
    logDone: (n)=>`✓ Done — ${n} Mbps`,
    logAbort: '⏹ Test stopped',
    logErr: (e)=>`✗ Error: ${e}`,
    na: 'n/a',
    finished: 'Test complete',
  },
  zh: {
    toolTitle: '网速测试 / Internet Speed Test',
    toolDesc: '在浏览器中测量下载速度、延迟（Ping）、抖动和有效连接类型。无需安装应用，不上传到我们的服务器。',
    start: '开始测试',
    stop: '停止',
    running: '测试中…',
    speedLabel: '下载速度',
    pingLbl: '延迟（Ping）',
    jitterLbl: '抖动',
    effLbl: '有效类型',
    ispLbl: '连接',
    step1: '关闭视频流和大下载以获得最准确的结果',
    step2: '点击「开始测试」— 下载会持续数秒',
    step3: '实时观察仪表盘和各项数据更新',
    step4: '对比 Ping、抖动和有效类型评估网络质量',
    logStart: '→ 开始测速…',
    logPing: '→ 测量延迟…',
    logPingDone: (n)=>`→ 延迟：${n} 毫秒`,
    logDown: '→ 测量下载速度…',
    logDownChunk: (n)=>`→ 第 ${n} 块完成`,
    logDone: (n)=>`✓ 完成 — ${n} Mbps`,
    logAbort: '⏹ 测试已停止',
    logErr: (e)=>`✗ 错误：${e}`,
    na: '—',
    finished: '测试完成',
  }
});

const { $, t } = GZ;
const ENDPOINT = 'https://speed.cloudflare.com/__down?bytes=';
const CHUNK_BYTES = 10 * 1024 * 1024; // 10 MB per chunk
const CHUNK_COUNT = 8;                 // up to 80 MB total
const PING_COUNT = 6;
let running = false;
let abortCtrl = null;

function setGauge(mbps){
  const v = Math.max(0, Math.min(mbps, 1000));
  // 0 Mbps = full offset (345.6), 1000 Mbps = zero offset
  const frac = Math.min(v/1000, 1);
  const off = 345.6 * (1 - frac);
  document.getElementById('gaugeArc').setAttribute('stroke-dashoffset', off.toFixed(1));
  $('#speedVal').textContent = v < 10 ? v.toFixed(1) : Math.round(v);
}

function logLine(s){
  const div = document.createElement('div');
  div.textContent = s;
  $('#log').appendChild(div);
  $('#log').scrollTop = $('#log').scrollHeight;
}
function clearLog(){ $('#log').innerHTML = ''; }

async function measurePing(){
  const samples = [];
  for (let i = 0; i < PING_COUNT && running; i++){
    const a = performance.now();
    try {
      await fetch(ENDPOINT + '0&cb=' + Math.random(), {cache:'no-store', signal: abortCtrl.signal});
      samples.push(performance.now() - a);
    } catch(e){ if(e.name==='AbortError') return null; }
  }
  if(!samples.length) return null;
  samples.sort((a,b)=>a-b);
  const median = samples[Math.floor(samples.length/2)];
  // jitter = mean absolute difference between consecutive samples
  let jd=0,c=0;
  for(let i=1;i<samples.length;i++){ jd+=Math.abs(samples[i]-samples[i-1]); c++; }
  const jitter = c? jd/c : 0;
  return {median, jitter};
}

async function measureDownload(){
  let totalBytes = 0;
  let startTime = performance.now();
  let lastUpdate = startTime;
  for(let i=0; i<CHUNK_COUNT && running; i++){
    try{
      const resp = await fetch(ENDPOINT + CHUNK_BYTES + '&cb=' + Math.random(), {cache:'no-store', signal: abortCtrl.signal});
      const reader = resp.body.getReader();
      while(true){
        const {done, value} = await reader.read();
        if(done) break;
        totalBytes += value.length;
        const now = performance.now();
        if(now - lastUpdate > 120){
          const mbps = (totalBytes*8) / ((now-startTime)/1000) / 1e6;
          setGauge(mbps);
          lastUpdate = now;
        }
      }
      logLine(t('logDownChunk')(i+1));
    }catch(e){ if(e.name==='AbortError') break; else { logLine(t('logErr')(e.message)); break; } }
  }
  const elapsed = (performance.now()-startTime)/1000;
  return (totalBytes*8) / elapsed / 1e6; // Mbps
}

function fillConnectionInfo(){
  const c = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
  if(c){
    $('#effVal').textContent = (c.effectiveType || t('na')).toUpperCase();
    $('#ispVal').textContent = c.downlink ? (c.downlink + ' Mbps') : t('na');
  } else {
    $('#effVal').textContent = t('na');
    $('#ispVal').textContent = t('na');
  }
}

async function runTest(){
  if(running){ stopTest(); return; }
  running = true; abortCtrl = new AbortController();
  $('#toolbar').querySelector('button').textContent = t('stop');
  clearLog(); setGauge(0);
  $('#pingVal').textContent='—'; $('#jitterVal').textContent='—';
  logLine(t('logStart'));

  // 1. latency
  logLine(t('logPing'));
  const p = await measurePing();
  if(!running){ finishAborted(); return; }
  if(p){
    $('#pingVal').textContent = Math.round(p.median);
    $('#jitterVal').textContent = Math.round(p.jitter);
    logLine(t('logPingDone')(Math.round(p.median)));
  }

  // 2. download
  logLine(t('logDown'));
  const mbps = await measureDownload();
  if(!running){ finishAborted(); return; }
  setGauge(mbps);
  logLine(t('logDone')(mbps<10?mbps.toFixed(1):Math.round(mbps)));
  $('#status').innerHTML = `<span style="color:var(--gz-success,#00d672)">${t('finished')}: ${mbps<10?mbps.toFixed(1):Math.round(mbps)} Mbps</span>`;
  running = false;
  $('#toolbar').querySelector('button').textContent = t('start');
}

function stopTest(){
  if(abortCtrl) abortCtrl.abort();
  running = false;
}
function finishAborted(){
  logLine(t('logAbort'));
  $('#toolbar').querySelector('button').textContent = t('start');
}

fillConnectionInfo();

$('#toolbar').innerHTML = `<button class="gz-btn" onclick="runTest()">${t('start')}</button>`;

GZ.renderToolPage({
  category: 'dev',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📡', href:'/dev/my-ip-address.html', name:'My IP Address'},
    {icon:'🌐', href:'/dev/browser-info.html', name:'Browser Info'},
    {icon:'⚡', href:'/dev/web-vitals.html', name:'Web Vitals'},
    {icon:'🔒', href:'/dev/ssl-checker.html', name:'SSL Checker'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
