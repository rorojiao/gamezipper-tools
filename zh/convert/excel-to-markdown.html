    right: '右对齐',
    default: '默认',
    dropText: '📁 点击上传或拖放 .xlsx / .xls / .csv 文件',
    fileLoaded: '✓ 已加载：{name}（{rows} 行 × {cols} 列）',
    step1: '上传 Excel 文件或粘贴 CSV/TSV 数据',
    step2: '选择列对齐方式 — 左、中、右或默认',
    step3: '点击「转换」生成 Markdown 表格',
    step4: '将 Markdown 复制到 README 或文档中',

let alignMode = 'default';
let lastRows = null;

const { $, copyText, t } = GZ;

function escMd(s) {
  return String(s == null ? '' : s).replace(/\|/g,'\\|').replace(/\n/g,'<br>');
}

function parseDelimited(text) {
  const delim = text.includes('\t') ? '\t' : ',';
  const rows = [];
  let cur = [], field = '', inQ = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    if (inQ) {
      if (c === '"') {
        if (text[i+1] === '"') { field += '"'; i++; }
        else inQ = false;
      } else field += c;
    } else {
      if (c === '"') inQ = true;
      else if (c === delim) { cur.push(field); field = ''; }
      else if (c === '\n') { cur.push(field); rows.push(cur); cur = []; field = ''; }
      else if (c === '\r') { /* skip */ }
      else field += c;
    }
  }
  if (field || cur.length) { cur.push(field); rows.push(cur); }
  return rows.filter(r => r.some(c => c !== ''));
}

function alignStr() {
  if (alignMode === 'left') return ':---';
  if (alignMode === 'center') return ':---:';
  if (alignMode === 'right') return '---:';
  return '---';
}

function buildMarkdown(rows) {
  if (!rows || !rows.length) return '';
  const [header, ...body] = rows;
  const cols = header.length;
  const al = alignStr();
  let md = '| ' + header.map(escMd).join(' | ') + ' |\n';
  md += '| ' + Array(cols).fill(al).join(' | ') + ' |\n';
  body.forEach(r => {
    const cells = [];
    for (let i = 0; i < cols; i++) cells.push(escMd(r[i] != null ? r[i] : ''));
    md += '| ' + cells.join(' | ') + ' |\n';
  });
  return md.trimEnd();
}

function renderPreview(md) {
  const lines = md.split('\n');
  if (lines.length < 2) { $('#preview').innerHTML = ''; return; }
  const header = lines[0].split('|').map(s => s.trim()).filter(s => s !== '');
  const body = lines.slice(2).map(line => line.split('|').map(s => s.trim()).filter(s => s !== ''));
  let html = '<table><thead><tr>' + header.map(h => `<th>${h}</th>`).join('') + '</tr></thead><tbody>';
  body.forEach(r => { html += '<tr>' + r.map(c => `<td>${c}</td>`).join('') + '</tr>'; });
  html += '</tbody></table>';
  $('#preview').innerHTML = html;
}

function doConvert() {
  const text = $('#input').value.trim();
  if (!text && !lastRows) return;
  const rows = lastRows || parseDelimited(text);
  if (!rows.length) return;
  const md = buildMarkdown(rows);
  $('#output').textContent = md;
  renderPreview(md);
}

function doDownload() {
  const md = $('#output').textContent;
  if (!md) return;
  const blob = new Blob([md], {type:'text/markdown'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'table.md';
  a.click();
  URL.revokeObjectURL(a.href);
}

function handleFile(file) {
  const reader = new FileReader();
  const isExcel = /\.(xlsx|xls|xlsm|ods)$/i.test(file.name);
  if (isExcel && typeof XLSX !== 'undefined') {
    reader.onload = e => {
      try {
        const wb = XLSX.read(e.target.result, {type:'array'});
        const ws = wb.Sheets[wb.SheetNames[0]];
        const data = XLSX.utils.sheet_to_json(ws, {header:1, raw:false});
        lastRows = data;
        $('#input').value = data.map(r => r.join('\t')).join('\n');
        const msg = t('fileLoaded').replace('{name}', file.name).replace('{rows}', data.length).replace('{cols}', data[0]?data[0].length:0);
        $('#status-bar').innerHTML = `<span style="color:var(--gz-success)">${msg}</span>`;
        doConvert();
      } catch(err) {
        $('#status-bar').innerHTML = `<span style="color:var(--gz-accent)">Error: ${err.message}</span>`;
      }
    };
    reader.readAsArrayBuffer(file);
  } else {
    reader.onload = e => {
      $('#input').value = e.target.result;
      lastRows = null;
      doConvert();
    };
    reader.readAsText(file);
  }
}

$('#input').addEventListener('input', () => { lastRows = null; doConvert(); });

const dz = $('#dropZone');
dz.textContent = t('dropText');
dz.addEventListener('click', () => $('#fileInput').click());
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('dragover'); });
dz.addEventListener('dragleave', () => dz.classList.remove('dragover'));
dz.addEventListener('drop', e => {
  e.preventDefault();
  dz.classList.remove('dragover');
  if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
});

$('#toolbar').innerHTML = `
  <input type="file" id="fileInput" accept=".xlsx,.xls,.xlsm,.ods,.csv,.tsv,.txt" style="display:none" onchange="if(this.files[0])handleFile(this.files[0])">
  <button class="gz-btn" onclick="doConvert()">${t('convert')}</button>
  <select class="gz-select" id="alignSelect" onchange="alignMode=this.value;doConvert()">
    <option value="default">${t('default')}</option>
    <option value="left">${t('left')}</option>
    <option value="center">${t('center')}</option>
    <option value="right">${t('right')}</option>
  </select>
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doDownload()">${t('download')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#input').value='';$('#output').textContent='';$('#preview').innerHTML='';lastRows=null">${t('clear')}</button>`;
$('#alignSelect').value = alignMode;

});
