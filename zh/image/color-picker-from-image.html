<style>
.cp-drop{border:2px dashed var(--border);border-radius:14px;padding:36px 20px;text-align:center;cursor:pointer;background:var(--glass2);transition:border-color .15s}
.cp-drop:hover,.cp-drop.over{border-color:var(--accent)}
.cp-drop input{display:none}
.cp-stage{position:relative;display:none;background:repeating-conic-gradient(#2a2a3a 0% 25%,#1a1a2a 0% 50%) 50%/16px 16px;border:1px solid var(--border);border-radius:12px;overflow:hidden;max-width:100%;margin:0 auto}
.cp-stage canvas{display:block;max-width:100%;height:auto;cursor:crosshair;image-rendering:pixelated}
.cp-loupe{position:absolute;width:120px;height:120px;border:3px solid var(--accent);border-radius:50%;pointer-events:none;display:none;box-shadow:0 0 0 9999px rgba(0,0,0,.4);background-repeat:no-repeat;overflow:hidden}
.cp-loupe canvas{display:block;width:120px;height:120px;image-rendering:pixelated}
.cp-loupe::after{content:'';position:absolute;left:50%;top:50%;width:14px;height:14px;transform:translate(-50%,-50%);border:2px solid #fff;box-shadow:0 0 0 1px #000;border-radius:2px}
.cp-current{display:flex;gap:14px;align-items:center;background:var(--glass);border:1px solid var(--border);border-radius:14px;padding:16px;margin-top:14px;flex-wrap:wrap}
.cp-swatch{width:88px;height:88px;border-radius:14px;border:2px solid var(--border);flex-shrink:0;background:repeating-conic-gradient(#2a2a3a 0% 25%,#1a1a2a 0% 50%) 50%/10px 10px;position:relative;overflow:hidden}
.cp-swatch-inner{position:absolute;inset:0}
.cp-formats{flex:1;min-width:200px;display:flex;flex-direction:column;gap:6px}
.cp-fmt-row{display:flex;align-items:center;gap:8px;font-family:monospace;font-size:.92rem}
.cp-fmt-row .k{color:var(--text2);font-size:.75rem;width:36px}
.cp-fmt-row .v{flex:1;color:var(--accent);font-weight:700;word-break:break-all}
.cp-fmt-row button{padding:4px 10px;font-size:.74rem;background:var(--glass2);border:1px solid var(--border);color:var(--text);border-radius:8px;cursor:pointer}
.cp-fmt-row button:hover{border-color:var(--accent);color:var(--accent)}
.cp-history{margin-top:14px}
.cp-history h4{font-size:.85rem;color:var(--text2);margin:0 0 8px;font-weight:600}
.cp-hist-items{display:flex;flex-wrap:wrap;gap:6px}
.cp-hist-item{width:38px;height:38px;border-radius:8px;border:1px solid var(--border);cursor:pointer;position:relative}
.cp-hist-item:hover{transform:scale(1.1)}
.cp-coord{font-family:monospace;font-size:.78rem;color:var(--text2);margin-top:6px}
.cp-empty{color:var(--text2);text-align:center;padding:20px;font-size:.85rem}
.cp-toolbar{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;align-items:center}
.cp-zoom{display:flex;align-items:center;gap:6px;font-size:.8rem;color:var(--text2)}
.cp-zoom input{width:120px}
</style>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="cp-drop" id="drop">
      <input type="file" id="file" accept="image/*">
      <div id="drop-label" style="font-size:1rem;font-weight:600">📁</div>
      <div id="drop-hint" style="font-size:.82rem;color:var(--text2);margin-top:6px"></div>
    </div>
    <div class="cp-toolbar" id="toolbar" style="display:none">
      <button class="gz-btn gz-btn-secondary" id="btn-reupload"></button>
      <div class="cp-zoom">
        <span id="zoom-lbl"></span>
        <input type="range" id="zoom" min="1" max="8" step="0.5" value="4">
        <span id="zoom-val">4×</span>
      </div>
    </div>
    <div class="cp-stage" id="stage">
      <canvas id="canvas"></canvas>
      <div class="cp-loupe" id="loupe"><canvas id="loupe-canvas" width="11" height="11"></canvas></div>
    </div>
    <div class="cp-current" id="current" style="display:none">
      <div class="cp-swatch"><div class="cp-swatch-inner" id="swatch"></div></div>
      <div class="cp-formats">
        <div class="cp-fmt-row"><span class="k">HEX</span><span class="v" id="hex">#000000</span><button onclick="cpCopy('hex')">📋</button></div>
        <div class="cp-fmt-row"><span class="k">RGB</span><span class="v" id="rgb">rgb(0, 0, 0)</span><button onclick="cpCopy('rgb')">📋</button></div>
        <div class="cp-fmt-row"><span class="k">HSL</span><span class="v" id="hsl">hsl(0, 0%, 0%)</span><button onclick="cpCopy('hsl')">📋</button></div>
        <div class="cp-coord" id="coord"></div>
      </div>
    </div>
    <div class="cp-history" id="history" style="display:none">
      <h4 id="hist-title"></h4>
      <div class="cp-hist-items" id="hist-items"></div>
    </div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>

<script>
GZI18n.register({
  en: {
    toolTitle: 'Color Picker From Image',
    toolDesc: 'Upload an image and click any pixel to capture its exact color in HEX, RGB and HSL. Magnifier loupe, color history and copy-to-clipboard — runs entirely in your browser.',
    dropHint: 'Click to upload or drag and drop an image (PNG, JPG, WebP, GIF, SVG, AVIF)',
    reupload: 'Upload new image',
    zoomLbl: 'Loupe zoom:',
    coord: 'Pixel at (x, y)',
    historyTitle: 'Picked colors (click to reselect):',
    pickedColor: 'Picked',
    step1: 'Click the upload box or drag an image onto it',
    step2: 'Move your mouse over the image to preview the magnified loupe',
    step3: 'Click a pixel to capture its color in HEX, RGB and HSL',
    step4: 'Use the copy buttons or click a saved swatch in history',
  },
  zh: {
    toolTitle: '图片取色器',
    toolDesc: '上传图片后点击任意像素，即可获取精确的 HEX、RGB 和 HSL 颜色值。带放大镜、颜色历史和一键复制 — 完全浏览器本地运行。',
    dropHint: '点击上传或拖拽图片到此处（PNG、JPG、WebP、GIF、SVG、AVIF）',
    reupload: '重新上传',
    zoomLbl: '放大倍数：',
    coord: '像素坐标 (x, y)',
    historyTitle: '已取颜色（点击可重新选择）：',
    pickedColor: '已取色',
    step1: '点击上传框或将图片拖拽到此处',
    step2: '在图片上移动鼠标查看放大镜预览',
    step3: '点击像素即可捕获 HEX、RGB 和 HSL 颜色',
    step4: '使用复制按钮，或点击历史记录中的色块',
  }
});

const { $, copyText, showToast, t } = GZ;

let img = null;
let zoom = 4;
const history = [];
const canvas = $('#canvas');
const ctx = canvas.getContext('2d', { willReadFrequently: true });
const loupe = $('#loupe');
const loupeCanvas = $('#loupe-canvas');
const loupeCtx = loupeCanvas.getContext('2d');

// Update static labels
$('#drop-hint').textContent = t('dropHint');
$('#btn-reupload').textContent = t('reupload');
$('#zoom-lbl').textContent = t('zoomLbl');
$('#hist-title').textContent = t('historyTitle');

// File handling
$('#drop').addEventListener('click', () => $('#file').click());
$('#btn-reupload').addEventListener('click', () => $('#file').click());
$('#file').addEventListener('change', e => { if(e.target.files[0]) loadImage(e.target.files[0]); });
$('#drop').addEventListener('dragover', e => { e.preventDefault(); $('#drop').classList.add('over'); });
$('#drop').addEventListener('dragleave', () => $('#drop').classList.remove('over'));
$('#drop').addEventListener('drop', e => {
  e.preventDefault();
  $('#drop').classList.remove('over');
  if(e.dataTransfer.files[0]) loadImage(e.dataTransfer.files[0]);
});

function loadImage(file){
  if(!file.type.startsWith('image/')){ showToast(t('dropHint')); return; }
  const reader = new FileReader();
  reader.onload = ev => {
    const tmp = new Image();
    tmp.onload = () => {
      img = tmp;
      // Cap canvas size to keep things responsive but preserve detail
      const maxDim = 1000;
      let w = img.naturalWidth, h = img.naturalHeight;
      if(w > maxDim || h > maxDim){ const s = maxDim / Math.max(w, h); w = Math.round(w*s); h = Math.round(h*s); }
      canvas.width = w; canvas.height = h;
      ctx.drawImage(img, 0, 0, w, h);
      $('#drop').style.display = 'none';
      $('#toolbar').style.display = 'flex';
      $('#stage').style.display = 'block';
      $('#current').style.display = 'flex';
      $('#history').style.display = 'block';
    };
    tmp.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}

// Loupe zoom
$('#zoom').addEventListener('input', e => {
  zoom = parseFloat(e.target.value);
  $('#zoom-val').textContent = zoom + '×';
});

// Mouse interactions
canvas.addEventListener('mousemove', e => {
  if(!img) return;
  const rect = canvas.getBoundingClientRect();
  const sx = canvas.width / rect.width;
  const sy = canvas.height / rect.height;
  const x = Math.floor((e.clientX - rect.left) * sx);
  const y = Math.floor((e.clientY - rect.top) * sy);
  if(x < 0 || y < 0 || x >= canvas.width || y >= canvas.height){ loupe.style.display = 'none'; return; }
  // Update loupe
  const half = Math.floor(11 / 2);
  loupeCtx.clearRect(0, 0, 11, 11);
  loupeCtx.drawImage(canvas, x - half, y - half, 11, 11, 0, 0, 11, 11);
  loupe.style.display = 'block';
  const size = 120;
  loupe.style.width = size + 'px';
  loupe.style.height = size + 'px';
  loupeCanvas.style.width = size + 'px';
  loupeCanvas.style.height = size + 'px';
  // Position loupe near cursor but within stage
  const stageRect = $('#stage').getBoundingClientRect();
  let lx = e.clientX - stageRect.left + 16;
  let ly = e.clientY - stageRect.top + 16;
  if(lx + size > stageRect.width) lx = e.clientX - stageRect.left - size - 16;
  if(ly + size > stageRect.height) ly = e.clientY - stageRect.top - size - 16;
  loupe.style.left = lx + 'px';
  loupe.style.top = ly + 'px';
});

canvas.addEventListener('mouseleave', () => { loupe.style.display = 'none'; });

canvas.addEventListener('click', e => {
  if(!img) return;
  const rect = canvas.getBoundingClientRect();
  const sx = canvas.width / rect.width;
  const sy = canvas.height / rect.height;
  const x = Math.floor((e.clientX - rect.left) * sx);
  const y = Math.floor((e.clientY - rect.top) * sy);
  if(x < 0 || y < 0 || x >= canvas.width || y >= canvas.height) return;
  try {
    const data = ctx.getImageData(x, y, 1, 1).data;
    setCurrentColor(data[0], data[1], data[2], x, y);
  } catch(err){
    showToast('Could not read pixel (image may be cross-origin).');
  }
});

function setCurrentColor(r, g, b, x, y){
  const hex = rgbToHex(r, g, b);
  const rgb = 'rgb('+r+', '+g+', '+b+')';
  const hsl = rgbToHslStr(r, g, b);
  $('#hex').textContent = hex;
  $('#rgb').textContent = rgb;
  $('#hsl').textContent = hsl;
  $('#swatch').style.background = hex;
  $('#coord').textContent = t('coord') + ' (' + x + ', ' + y + ')';
  // Add to history (avoid duplicates)
  if(!history.find(c => c.hex === hex)){
    history.unshift({ hex, rgb, hsl, r, g, b });
    if(history.length > 24) history.pop();
    renderHistory();
  }
}

function renderHistory(){
  $('#hist-items').innerHTML = history.map((c, i) =>
    '<div class="cp-hist-item" style="background:'+c.hex+'" title="'+c.hex+'" onclick="cpReselect('+i+')"></div>'
  ).join('');
}

window.cpReselect = function(i){
  const c = history[i];
  if(!c) return;
  $('#hex').textContent = c.hex;
  $('#rgb').textContent = c.rgb;
  $('#hsl').textContent = c.hsl;
  $('#swatch').style.background = c.hex;
};

window.cpCopy = function(kind){
  const v = $('#' + kind).textContent;
  copyText(v);
};

function rgbToHex(r, g, b){
  return '#' + [r, g, b].map(n => n.toString(16).padStart(2, '0')).join('').toUpperCase();
}

function rgbToHslStr(r, g, b){
  r /= 255; g /= 255; b /= 255;
  const max = Math.max(r, g, b), min = Math.min(r, g, b);
  let h, s, l = (max + min) / 2;
  if(max === min){ h = s = 0; }
  else {
    const d = max - min;
    s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
    switch(max){
      case r: h = (g - b) / d + (g < b ? 6 : 0); break;
      case g: h = (b - r) / d + 2; break;
      case b: h = (r - g) / d + 4; break;
    }
    h /= 6;
  }
  return 'hsl(' + Math.round(h * 360) + ', ' + Math.round(s * 100) + '%, ' + Math.round(l * 100) + '%)';
}

GZ.renderToolPage({
  category: 'image',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🎨', href:'/color/picker.html', name:'Color Picker'},
    {icon:'🌈', href:'/image/color-extractor.html', name:'Color Extractor'},
    {icon:'🔄', href:'/color/hex-rgb.html', name:'HEX ↔ RGB'},
    {icon:'👁️', href:'/color/contrast.html', name:'Contrast Checker'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
