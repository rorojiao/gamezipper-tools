<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"What is a URL redirect?","acceptedAnswer":{"@type":"Answer","text":"A URL redirect is an HTTP response (status code 3xx) that tells the browser or client the requested resource has moved to a different URL. The response includes a Location header pointing to the new URL. The most common codes are 301 (Moved Permanently — passes SEO link equity), 302 (Found — temporary), 307 (Temporary Redirect — preserves request method), and 308 (Permanent Redirect — preserves request method). Following these hops one by one is called following the redirect chain."}},{"@type":"Question","name":"Why do too many redirects hurt SEO?","acceptedAnswer":{"@type":"Answer","text":"Each redirect adds latency and dilutes a small amount of PageRank. A chain of 4-5 redirects is common and acceptable, but 7+ hops materially slow page load and crawl budget. Search engines may also stop following the chain at a certain depth, which means your final URL may not receive the full link equity from the original. The ideal is a single 301 redirect from old to new."}},{"@type":"Question","name":"What is a redirect loop?","acceptedAnswer":{"@type":"Answer","text":"A redirect loop occurs when URL A redirects to URL B and URL B redirects back to URL A — or when a longer cycle exists (A → B → C → A). Browsers detect this and show an error like 'ERR_TOO_MANY_REDIRECTS' or 'This webpage has a redirect loop'. This checker stops at 20 hops to avoid infinite loops and flags any time the same URL appears twice in the chain."}},{"@type":"Question","name":"Can this tool follow redirects on any URL?","acceptedAnswer":{"@type":"Answer","text":"This tool can trace any publicly accessible HTTP/HTTPS URL that allows CORS-friendly redirects. The browser's fetch API follows redirects server-side by default, but we use the redirect: 'manual' option to inspect each hop individually. Some servers may block cross-origin fetches, in which case the chain stops at the blocked hop. URLs behind authentication or that require cookies are not supported."}},{"@type":"Question","name":"What is the difference between 301 and 302 redirects?","acceptedAnswer":{"@type":"Answer","text":"301 (Moved Permanently) tells search engines the page has permanently moved to the new URL and passes roughly 90-99% of link equity. 302 (Found) signals a temporary redirect and historically passed less equity, though Google now treats 302 like 301 for SEO purposes in many cases. For permanent moves use 301; for A/B testing or maintenance use 302. 307 and 308 are modern equivalents that also preserve the HTTP request method (GET stays GET, POST stays POST) — important for form submissions."}}]}</script>

const { $, t, copyText } = GZ;

const MAX_HOPS = 20;

function statusClass(code) {
  if (!code) return 's0';
  const c = Math.floor(code / 100);
  if (c === 2) return 's2';
  if (c === 3) return 's3';
  if (c === 4) return 's4';
  if (c === 5) return 's5';
  return 's0';
}

function statusText(code) {
  if (code === 301) return t('s301');
  if (code === 302) return t('s302');
  if (code === 303) return t('s303');
  if (code === 307) return t('s307');
  if (code === 308) return t('s308');
  if (code && code >= 300 && code < 400) return t('sOther') + ' (' + code + ')';
  if (code) return code + '';
  return '—';
}

function shortUrl(u) {
  try {
    const parsed = new URL(u);
    const path = parsed.pathname.length > 40 ? parsed.pathname.slice(0, 40) + '…' : parsed.pathname;
    return parsed.host + path + (parsed.search ? '?' + parsed.search.slice(0, 20) : '');
  } catch (e) {
    return u.length > 80 ? u.slice(0, 80) + '…' : u;
  }
}

async function traceUrl(startUrl) {
  const hops = [];
  let currentUrl = startUrl;
  const startTime = performance.now();
  const seen = new Set();

  for (let i = 0; i < MAX_HOPS; i++) {
    if (seen.has(currentUrl)) {
      hops.push({ url: currentUrl, status: 0, server: '', location: '', ms: 0, error: 'loop', isLoop: true });
      break;
    }
    seen.add(currentUrl);

    const hopStart = performance.now();
    let res;
    try {
      res = await fetch(currentUrl, { method: 'GET', redirect: 'manual', mode: 'cors', credentials: 'omit', cache: 'no-store' });
    } catch (err) {
      // Try no-cors for opaque hops
      try {
        res = await fetch(currentUrl, { method: 'GET', redirect: 'manual', mode: 'no-cors', credentials: 'omit', cache: 'no-store' });
        if (res.type === 'opaque') {
          hops.push({ url: currentUrl, status: 0, server: '', location: '', ms: Math.round(performance.now() - hopStart), error: 'opaque' });
          break;
        }
      } catch (err2) {
        hops.push({ url: currentUrl, status: 0, server: '', location: '', ms: Math.round(performance.now() - hopStart), error: 'network' });
        break;
      }
    }

    const ms = Math.round(performance.now() - hopStart);
    const status = res.status;
    const server = res.headers.get('server') || res.headers.get('Server') || '';
    const location = res.headers.get('location') || res.headers.get('Location') || '';
    const contentType = res.headers.get('content-type') || res.headers.get('Content-Type') || '';
    const via = res.headers.get('via') || res.headers.get('Via') || '';

    hops.push({ url: currentUrl, status, server, location, contentType, via, ms });

    if (status >= 300 && status < 400 && location) {
      // Resolve relative location
      try {
        currentUrl = new URL(location, currentUrl).href;
      } catch (e) {
        hops.push({ url: currentUrl, status, server, location, ms, error: 'bad-location' });
        break;
      }
    } else {
      // Final hop
      break;
    }
  }

  return { hops, totalMs: Math.round(performance.now() - startTime) };
}

function renderChain(hops, totalMs) {
  const chain = $('#chain');
  chain.innerHTML = '';

  if (hops.length === 0) {
    chain.innerHTML = '<div class="urc-error">No hops returned.</div>';
    return;
  }

  hops.forEach((hop, i) => {
    const div = document.createElement('div');
    div.className = 'urc-hop';

    let statusText2 = statusText(hop.status);
    if (hop.error === 'loop') statusText2 = '🔁 Loop';
    else if (hop.error === 'network') statusText2 = t('sError');
    else if (hop.error === 'opaque') statusText2 = t('sBlocked');
    else if (hop.error === 'bad-location') statusText2 = t('sOther') + ' (bad location)';

    const isFinal = i === hops.length - 1 && !hop.error && (!hop.location || hop.status < 300 || hop.status >= 400);

    const headerHtml = `
      <div class="urc-hop-header">
        <span class="urc-hop-num">${i + 1}</span>
        <span class="urc-status ${statusClass(hop.status)}">${hop.status || (hop.error === 'opaque' ? 'CORS' : '?')}</span>
        <span class="urc-url">${escapeHtml(shortUrl(hop.url))}</span>
        <span style="color:var(--text2);font-size:.78rem">${hop.ms}ms</span>
      </div>
    `;

    const metaRows = [];
    if (hop.server) metaRows.push(`<div><strong>${t('serverHdr')}</strong><code>${escapeHtml(hop.server)}</code></div>`);
    if (hop.location) metaRows.push(`<div><strong>${t('locationHdr')}</strong><code>${escapeHtml(hop.location)}</code></div>`);
    if (hop.contentType) metaRows.push(`<div><strong>${t('sizeHdr')}</strong><code>${escapeHtml(hop.contentType.slice(0, 60))}</code></div>`);
    if (hop.via) metaRows.push(`<div><strong>${t('viaHdr')}</strong><code>${escapeHtml(hop.via)}</code></div>`);

    const metaHtml = metaRows.length ? `<div class="urc-meta">${metaRows.join('')}</div>` : '';
    div.innerHTML = headerHtml + metaHtml;

    if (hop.error === 'loop') {
      div.style.borderColor = '#ef4444';
      div.innerHTML += `<div style="color:#ef4444;font-weight:700;font-size:.85rem">${t('loopWarn')}</div>`;
    }

    chain.appendChild(div);

    // Arrow between hops
    if (i < hops.length - 1 && hops[i].location && !hops[i].error) {
      const arrow = document.createElement('div');
      arrow.className = 'urc-arrow';
      arrow.textContent = '↓';
      chain.appendChild(arrow);
    }
  });

  // Summary
  $('#m-hops').textContent = hops.length;
  $('#m-time').textContent = totalMs + 'ms';
  const last = hops[hops.length - 1];
  $('#m-final').textContent = last ? shortUrl(last.url) : '—';
  $('#m-final').style.fontSize = last && last.url.length > 30 ? '.85rem' : '1.4rem';
  $('#m-status').textContent = last ? (last.status || 'CORS') : '—';

  // Warnings
  const loop = hops.some(h => h.error === 'loop');
  const longChain = hops.length > 5;
  let note = '';
  if (loop) note = t('loopWarn');
  else if (longChain) note = t('chainWarn');
  else note = t('okNote');
  $('#note').textContent = note;
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[c]);
}

async function check() {
  const url = $('#url').value.trim();
  if (!url) return;
  const btn = $('#btnCheck');
  btn.disabled = true;
  btn.textContent = '⏳ Tracing…';
  $('#results').style.display = 'block';
  $('#chain').innerHTML = '<div style="text-align:center;padding:20px;color:var(--text2)">⏳ Tracing redirect chain…</div>';

  try {
    let normalized = url;
    if (!/^https?:\/\//i.test(normalized)) normalized = 'https://' + normalized;
    const { hops, totalMs } = await traceUrl(normalized);
    renderChain(hops, totalMs);
  } catch (err) {
    $('#chain').innerHTML = `<div class="urc-error">Error: ${escapeHtml(err.message)}</div>`;
  } finally {
    btn.disabled = false;
    btn.textContent = t('btnCheck');
  }
}

$('#btnCheck').addEventListener('click', check);
$('#btnReset').addEventListener('click', () => {
  $('#url').value = 'https://github.com';
  $('#results').style.display = 'none';
});
$('#url').addEventListener('keydown', e => { if (e.key === 'Enter') check(); });
document.querySelectorAll('.urc-presets button').forEach(b => {
  b.addEventListener('click', () => { $('#url').value = b.dataset.url; check(); });
});

  $('#lbl-finalstatus').textContent = t('lblFinalStatus');
  $('#h-chain').textContent = t('hChain');
  $('#btnCheck').textContent = t('btnCheck');
  $('#btnReset').textContent = t('btnReset');
}
