<script>
GZI18n.register({
  en: {
    toolTitle: 'Palindrome Checker',
    toolDesc: 'Check if any text is a palindrome, view character counts and find the longest palindromic substring.',
    optCase: 'Ignore case',
    optPunct: 'Ignore punctuation',
    optSpaces: 'Ignore spaces',
    example: 'Load Example',

    step2: 'Toggle options to ignore case, spaces or punctuation',
    step3: 'View real-time result, reversed text and longest palindrome',
    step4: 'Browse all palindromic substrings found in your text',
  },
  zh: {
    toolTitle: '回文检测器',
    toolDesc: '检查任意文本是否为回文，查看字符统计和最长回文子串。',
    optCase: '忽略大小写',
    optPunct: '忽略标点',
    optSpaces: '忽略空格',
    example: '加载示例',
    clear: '清空',
    isPal: '✓ 是回文！',
    notPal: '✗ 不是回文',
    statsChars: '字符数',
    statsReversed: '反转后',
    statsLength: '长度',
    statsLongest: '最长',
    mirrors: '找到的所有回文',
    longestFound: '最长回文子串',
    none: '无 — 未找到回文子串',
    step1: '在输入框中输入或粘贴任意文本',
    step2: '切换选项以忽略大小写、空格或标点',
    step3: '查看实时结果、反转文本和最长回文',
    step4: '浏览文本中所有回文子串',
  }
});

const { $, t } = GZ;

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function normalize(text) {
  let s = text;
  if ($('#ignoreCase').checked) s = s.toLowerCase();
  if ($('#ignorePunct').checked) s = s.replace(/[^\w\s一-鿿]/g, '');
  if ($('#ignoreSpaces').checked) s = s.replace(/\s+/g, '');
  return s;
}

function findLongestPalindrome(s) {
  if (s.length < 2) return '';
  let best = '';
  function expand(l, r) {
    while (l >= 0 && r < s.length && s[l] === s[r]) {
      const sub = s.substring(l, r + 1);
      if (sub.length > best.length) best = sub;
      l--; r++;
    }
  }
  for (let i = 0; i < s.length; i++) {
    expand(i, i);
    expand(i, i + 1);
  }
  return best;
}

function findAllPalindromes(s) {
  const found = new Set();
  if (s.length < 2) return [];
  function expand(l, r) {
    while (l >= 0 && r < s.length && s[l] === s[r]) {
      if (r - l + 1 >= 2) found.add(s.substring(l, r + 1));
      l--; r++;
    }
  }
  for (let i = 0; i < s.length; i++) {
    expand(i, i);
    expand(i, i + 1);
  }
  return [...found].sort((a, b) => b.length - a.length);
}

function check() {
  const raw = $('#input').value;
  const s = normalize(raw);
  const stats = $('#stats');
  const result = $('#result');
  const mirrors = $('#mirrors');
  const mirrorsList = $('#mirrorsList');
  const reversed = [...s].reverse().join('');
  const isPal = s.length > 0 && s === reversed;
  const longest = s ? findLongestPalindrome(s) : '';
  stats.innerHTML = `
    <div class="pal-stat"><div class="num">${s.length}</div><div class="label">${t('statsChars')}</div></div>
    <div class="pal-stat"><div class="num" style="font-size:.95em;word-break:break-all">${escapeHtml(reversed) || '—'}</div><div class="label">${t('statsReversed')}</div></div>
    <div class="pal-stat"><div class="num">${longest.length}</div><div class="label">${t('statsLongest')}</div></div>`;
  if (!raw) {
    result.innerHTML = '';
    mirrors.style.display = 'none';
    return;
  }
  result.innerHTML = `<div class="pal-result ${isPal ? 'is-pal' : 'not-pal'}">${isPal ? t('isPal') : t('notPal')}</div>`;
  if (s.length >= 2) {
    const all = findAllPalindromes(s);
    if (all.length) {
      const top = all.slice(0, 20);
      mirrors.style.display = 'block';
      let html = longest ? `<div style="padding:6px 10px;background:rgba(0,214,114,.08);border-radius:6px;margin-bottom:8px;font-family:monospace;font-size:.9em"><b>${t('longestFound')}:</b> "${escapeHtml(longest)}" (${longest.length})</div>` : '';
      html += top.map(p => `<div class="pal-mirror-row"><div class="txt">"${escapeHtml(p)}"</div><div class="len">${p.length}</div></div>`).join('');
      mirrorsList.innerHTML = html;
    } else {
      mirrors.style.display = 'none';
    }
  } else {
    mirrors.style.display = 'none';
  }
}

function loadExample() {
  $('#input').value = 'A man, a plan, a canal: Panama';
  check();
}

function clearAll() {
  $('#input').value = '';
  $('#stats').innerHTML = '';
  $('#result').innerHTML = '';
  $('#mirrors').style.display = 'none';
}

['#input','#ignoreCase','#ignorePunct','#ignoreSpaces'].forEach(sel => {
  $(sel).addEventListener('input', check);
  if (sel !== '#input') $(sel).addEventListener('change', check);
});

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="clearAll()">${t('clear')}</button>`;

$('#lbl-case').textContent = t('optCase');
$('#lbl-punct').textContent = t('optPunct');
$('#lbl-spaces').textContent = t('optSpaces');
$('#lbl-mirrors').textContent = t('mirrors');

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],

    {icon:'🔁', href:'/text/reverse-lines.html', name:'Reverse Lines'},
    {icon:'🔍', href:'/dev/regex.html', name:'Regex Tester'},
    {icon:'📊', href:'/text/diff.html', name:'Text Diff'},
    {icon:'🔢', href:'/text/letter-counter.html', name:'Letter Counter'},
  ]
});
</script>
