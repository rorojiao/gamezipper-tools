<style>
.preview-tabs{display:flex;gap:4px;margin-bottom:16px;flex-wrap:wrap}
.preview-tab{padding:8px 16px;border:1px solid var(--border);border-radius:8px;background:var(--glass2);cursor:pointer;font-size:.85em;transition:all .2s}
.preview-tab.active{background:var(--accent);color:#000;border-color:var(--accent)}
.preview-card{border-radius:12px;overflow:hidden;border:1px solid var(--border);background:var(--glass);max-width:520px}
.preview-card .card-img{width:100%;aspect-ratio:1.91/1;background:var(--glass2);display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:.9em;overflow:hidden}
.preview-card .card-img img{width:100%;height:100%;object-fit:cover}
.preview-card .card-body{padding:12px 14px}
.preview-card .card-domain{font-size:.75em;color:var(--text3);text-transform:uppercase;letter-spacing:.5px}
.preview-card .card-title{font-size:.95em;font-weight:600;margin:4px 0;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.preview-card .card-desc{font-size:.8em;color:var(--text2);line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.twitter-card{border-radius:12px;overflow:hidden;border:1px solid var(--border);background:var(--glass);max-width:520px}
.twitter-card .card-img{width:100%;aspect-ratio:2/1;background:var(--glass2);display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:.9em;overflow:hidden}
.twitter-card .card-img img{width:100%;height:100%;object-fit:cover}
.twitter-card .card-body{padding:10px 14px}
.twitter-card .card-title{font-size:.95em;font-weight:600;margin:0 0 2px;line-height:1.3}
.twitter-card .card-desc{font-size:.8em;color:var(--text2);line-height:1.4}
.twitter-card .card-domain{font-size:.75em;color:var(--text3)}
.linkedin-card{border-radius:4px;overflow:hidden;border:1px solid var(--border);background:var(--glass);max-width:520px}
.linkedin-card .card-img{width:100%;aspect-ratio:1.91/1;background:var(--glass2);display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:.9em;overflow:hidden}
.linkedin-card .card-img img{width:100%;height:100%;object-fit:cover}
.linkedin-card .card-body{padding:10px 14px;background:var(--glass)}
.linkedin-card .card-title{font-size:.85em;font-weight:600;margin:0 0 2px;line-height:1.3}
.linkedin-card .card-domain{font-size:.7em;color:var(--text3)}
.fields-grid{display:grid;gap:10px}
.field-group{display:flex;flex-direction:column;gap:4px}
.field-group label{font-size:.8em;font-weight:600;color:var(--text2)}
.field-group input,.field-group textarea{background:var(--glass);border:1px solid var(--border);border-radius:8px;padding:8px 10px;color:var(--text);font-size:.9em}
.field-group input:focus,.field-group textarea:focus{outline:none;border-color:var(--accent)}
.char-count{font-size:.7em;color:var(--text3);text-align:right}
</style>

<body>
<div class="gz-container">
<div class="gz-tool-header">
<h1 id="title"></h1>
<p class="desc" id="desc"></p>
</div>
<div class="gz-tool-area">
<div class="gz-split">
<div>
<div class="fields-grid">
<div class="field-group">
<label id="lbl-url"></label>
<input type="url" id="f-url" value="https://example.com/page" oninput="updatePreview()">
</div>
<div class="field-group">
<label id="lbl-title"></label>
<input type="text" id="f-title" maxlength="100" value="My Awesome Website" oninput="updatePreview();updateCount('f-title','cnt-title',65)">
<div class="char-count"><span id="cnt-title">17</span>/65</div>
</div>
<div class="field-group">
<label id="lbl-desc"></label>
<textarea id="f-desc" rows="3" maxlength="300" oninput="updatePreview();updateCount('f-desc','cnt-desc',155)">Discover amazing free online tools for developers, designers, and creators. No signup required.</textarea>
<div class="char-count"><span id="cnt-desc">92</span>/155</div>
</div>
<div class="field-group">
<label id="lbl-img"></label>
<input type="url" id="f-img" value="https://tools.gamezipper.com/shared/og-image.png" oninput="updatePreview()">
</div>
<div class="field-group">
<label id="lbl-sitename"></label>
<input type="text" id="f-sitename" value="Example.com" oninput="updatePreview()">
</div>
<div class="field-group">
<label id="lbl-type"></label>
<select id="f-type" class="gz-select" onchange="updatePreview()">
<option value="website">website</option>
<option value="article">article</option>
<option value="product">product</option>
</select>
</div>
</div>
</div>
<div>
<div class="preview-tabs">
<button class="preview-tab active" onclick="switchTab('facebook',this)">📘 Facebook</button>
<button class="preview-tab" onclick="switchTab('twitter',this)">🐦 Twitter</button>
<button class="preview-tab" onclick="switchTab('linkedin',this)">💼 LinkedIn</button>
</div>
<div id="preview-area"></div>
<div style="margin-top:16px">
<div class="gz-toolbar" id="toolbar"></div>
<div id="meta-output" style="margin-top:10px"></div>
</div>
</div>
</div>
</div>
<div class="gz-howto"><h2></h2><ol></ol></div>
<div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
en:{
toolTitle:'Open Graph Preview',
toolDesc:'Preview how your website looks when shared on Facebook, Twitter, and LinkedIn with real-time OG tag visualization.',
lblUrl:'Page URL',
lblTitle:'Title',
lblDesc:'Description',
lblImg:'Image URL (1200×630 recommended)',
lblSitename:'Site Name',
lblType:'OG Type',
btnGenerate:'Generate Meta Tags',
btnCopy:'Copy Tags',
btnClear:'Clear',
metaTags:'Generated Meta Tags',
step1:'Enter your page URL, title, description, and image URL',
step2:'See real-time previews for Facebook, Twitter, and LinkedIn',
step3:'Click Generate Meta Tags to get the complete HTML code',
step4:'Copy the tags and paste them into your HTML <head> section',
},
zh:{
toolTitle:'Open Graph 预览',
toolDesc:'实时预览网站在 Facebook、Twitter 和 LinkedIn 分享时的显示效果，可视化 OG 标签。',
lblUrl:'页面 URL',
lblTitle:'标题',
lblDesc:'描述',
lblImg:'图片 URL（推荐 1200×630）',
lblSitename:'站点名称',
lblType:'OG 类型',
btnGenerate:'生成 Meta 标签',
btnCopy:'复制标签',
btnClear:'清空',
metaTags:'生成的 Meta 标签',
step1:'输入页面 URL、标题、描述和图片 URL',
step2:'实时查看 Facebook、Twitter 和 LinkedIn 的预览效果',
step3:'点击「生成 Meta 标签」获取完整的 HTML 代码',
step4:'复制标签并粘贴到 HTML <head> 部分',
}
});

const { $, copyText, t } = GZ;
let currentTab = 'facebook';

function updateCount(fieldId, countId, max) {
const len = document.getElementById(fieldId).value.length;
document.getElementById(countId).textContent = len;
document.getElementById(countId).style.color = len > max ? '#e94560' : '';
}

function escapeHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function getVals() {
return {
url: $('#f-url').value || 'https://example.com',
title: $('#f-title').value || 'Untitled',
desc: $('#f-desc').value || '',
img: $('#f-img').value || '',
sitename: $('#f-sitename').value || '',
type: $('#f-type').value || 'website',
};
}

function getDomain(url) {
try { return new URL(url).hostname; } catch(e) { return url; }
}

function switchTab(tab, btn) {
currentTab = tab;
document.querySelectorAll('.preview-tab').forEach(b => b.classList.remove('active'));
btn.classList.add('active');
updatePreview();
}

function updatePreview() {
const v = getVals();
const domain = getDomain(v.url);
const area = $('#preview-area');
const hasImg = v.img && v.img.startsWith('http');

if (currentTab === 'facebook') {
area.innerHTML = `<div class="preview-card">
<div class="card-img">${hasImg ? `<img src="${escapeHtml(v.img)}" onerror="this.parentElement.textContent='Image not found'">` : 'No image set'}</div>
<div class="card-body">
<div class="card-domain">${escapeHtml(domain.toUpperCase())}</div>
<div class="card-title">${escapeHtml(v.title)}</div>
<div class="card-desc">${escapeHtml(v.desc)}</div>
</div>
</div>`;
} else if (currentTab === 'twitter') {
area.innerHTML = `<div class="twitter-card">
<div class="card-img">${hasImg ? `<img src="${escapeHtml(v.img)}" onerror="this.parentElement.textContent='Image not found'">` : 'No image set'}</div>
<div class="card-body">
<div class="card-title">${escapeHtml(v.title)}</div>
<div class="card-desc">${escapeHtml(v.desc)}</div>
<div class="card-domain">${escapeHtml(domain)}</div>
</div>
</div>`;
} else {
area.innerHTML = `<div class="linkedin-card">
<div class="card-img">${hasImg ? `<img src="${escapeHtml(v.img)}" onerror="this.parentElement.textContent='Image not found'">` : 'No image set'}</div>
<div class="card-body">
<div class="card-title">${escapeHtml(v.title)}</div>
<div class="card-domain">${escapeHtml(domain)}</div>
</div>
</div>`;
}
}

function generateTags() {
const v = getVals();
let tags = `<!-- Open Graph Meta Tags -->
<meta property="og:url" content="${v.url}">
<meta property="og:type" content="${v.type}">
<meta property="og:title" content="${v.title}">
<meta property="og:description" content="${v.desc}">
<meta property="og:image" content="${v.img}">
${v.sitename ? `<meta property="og:site_name" content="${v.sitename}">` : ''}
<!-- Twitter Card Meta Tags -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="${v.title}">
<meta name="twitter:description" content="${v.desc}">
<meta name="twitter:image" content="${v.img}">`;
$('#meta-output').innerHTML = `<h3 style="margin:0 0 8px;font-size:.9em">${t('metaTags')}</h3><pre style="background:var(--glass);border:1px solid var(--border);border-radius:8px;padding:12px;font-size:.8em;overflow-x:auto;white-space:pre-wrap">${escapeHtml(tags)}</pre>`;
}

$('#toolbar').innerHTML = `
<button class="gz-btn" onclick="generateTags()">${t('btnGenerate')}</button>
<button class="gz-btn gz-btn-secondary" onclick="copyText($('#meta-output').textContent)">${t('btnCopy')}</button>`;

updatePreview();
updateCount('f-title','cnt-title',65);
updateCount('f-desc','cnt-desc',155);

GZ.renderToolPage({
category:'seo',
titleKey:'toolTitle',
descKey:'toolDesc',
howToSteps:['step1','step2','step3','step4'],
related:[
{icon:'🖼️',href:'/seo/open-graph-generator.html',name:'OG Generator'},
{icon:'👁️',href:'/seo/serp-preview.html',name:'SERP Preview'},
{icon:'🏷️',href:'/seo/meta-tag-generator.html',name:'Meta Tag Generator'},
{icon:'🖼️',href:'/social/og-meta.html',name:'OG Meta Debug'},
]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
