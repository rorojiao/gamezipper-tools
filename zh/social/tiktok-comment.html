<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>

  <div class="gz-tool-area">

    <div class="ctrl" id="controls"></div>
    <div class="tt-card" id="tt-preview"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'TikTok Comment Generator',
    toolDesc: 'Create realistic TikTok comment mockups for thumbnails and design — customize username, comment, likes, replies and download as PNG.',
    username: 'Username (@)',
    avatarColor: 'Avatar Color',
    content: 'Comment Text',
    time: 'Time',
    likes: 'Likes',
    replies: 'Replies',
    pinned: 'Pinned',
    hearted: 'Liked by creator ❤️',
    download: 'Download PNG',
    clear: 'Reset',
    step1: 'Enter the username and pick an avatar color',
    step2: 'Type the comment text',
    step3: 'Customize likes, replies, pinned and heart status',
    step4: 'Download the TikTok comment as a PNG image',
  },
  zh: {
    toolTitle: 'TikTok 评论生成器',
    toolDesc: '创建逼真的 TikTok 评论截图 — 自定义用户名、评论内容、点赞数，下载为 PNG 图片。',
    username: '用户名 (@)',
    avatarColor: '头像颜色',
    content: '评论文本',
    time: '时间',
    likes: '点赞',
    replies: '回复',
    pinned: '置顶',
    hearted: '创作者点赞 ❤️',
    download: '下载 PNG',
    clear: '重置',
    step1: '输入用户名并选择头像颜色',
    step2: '输入评论文本',
    step3: '自定义点赞、回复数、置顶和红心状态',
    step4: '下载 TikTok 评论为 PNG 图片',
  }
});

const { $, copyText, t } = GZ;

let cfg = {
  name: 'viral.clips',
  color: '#fe2c55',
  content: 'bro this is literally the best site I have ever seen 😭😭 the tools are free AND run in the browser?? taken 🫶🫶',
  time: '2d',
  likes: 48200,
  replies: 124,
  pinned: true,
  hearted: true
};

function formatNum(n) {
  n = +n || 0;
  if (n >= 1000000) return (n/1000000).toFixed(1)+'M';
  if (n >= 1000) return (n/1000).toFixed(1)+'K';
  return n.toString();
}

function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escAttr(s) { return escHtml(s).replace(/"/g,'&quot;'); }

function buildControls() {
  const c = $('#controls');
  c.innerHTML = `
    <label>${t('username')}<input type="text" id="cName" value="${escAttr(cfg.name)}"></label>
    <label>${t('avatarColor')}<input type="color" id="cColor" value="${escAttr(cfg.color)}" style="min-height:36px;height:36px;width:60px"></label>
    <label>${t('content')}<textarea id="cContent" rows="3" style="min-width:300px">${escHtml(cfg.content)}</textarea></label>
    <label>${t('time')}<input type="text" id="cTime" value="${escAttr(cfg.time)}"></label>
    <label>${t('likes')}<input type="number" id="cLikes" value="${cfg.likes}" min="0"></label>
    <label>${t('replies')}<input type="number" id="cReplies" value="${cfg.replies}" min="0"></label>
    <label>${t('pinned')}<input type="checkbox" id="cPinned" ${cfg.pinned?'checked':''}></label>
    <label>${t('hearted')}<input type="checkbox" id="cHearted" ${cfg.hearted?'checked':''}></label>
  `;
  const map = {cName:'name',cContent:'content',cTime:'time'};
  Object.keys(map).forEach(id=>$('#'+id).oninput=e=>{cfg[map[id]]=e.target.value;render()});
  $('#cColor').oninput=e=>{cfg.color=e.target.value;render()};
  const nums={cLikes:'likes',cReplies:'replies'};
  Object.keys(nums).forEach(id=>$('#'+id).oninput=e=>{cfg[nums[id]]=+e.target.value||0;render()});
  $('#cPinned').onchange=e=>{cfg.pinned=e.target.checked;render()};
  $('#cHearted').onchange=e=>{cfg.hearted=e.target.checked;render()};
}

function render() {
  const u = cfg.name.replace(/^@/,'');
  const initial = (u[0]||'?').toUpperCase();
  $('#tt-preview').innerHTML = `
    ${cfg.pinned?`<div class="tt-pinned">📌 Pinned by creator</div>`:''}
    <div class="tt-comment">
      <div class="tt-ava" style="background:${escAttr(cfg.color)}">${escHtml(initial)}</div>
      <div class="tt-main">
        <div class="tt-name">${escHtml(u)||'username'}${cfg.hearted?'<span class="tt-badge">✓</span>':''}<span class="tt-creator"> · ${escHtml(cfg.time)}</span></div>
        <div class="tt-text">${escHtml(cfg.content)||'(comment)'}</div>
        <div class="tt-meta">
          <span class="tt-time">${escHtml(cfg.time)}</span>
          <span class="tt-replies">↩ ${t('replies')} (${formatNum(cfg.replies)})</span>
        </div>
      </div>
      <div class="tt-like">
        <span class="${cfg.hearted?'h':''}">${cfg.hearted?'❤':'🤍'}</span>
        <span>${formatNum(cfg.likes)}</span>
      </div>
    </div>
  `;
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" id="dlBtn">${t('download')}</button>
  <button class="gz-btn gz-btn-secondary" id="resetBtn">${t('clear')}</button>
`;

$('#resetBtn').onclick = () => {
  Object.assign(cfg, { name:'username', content:'', time:'1d', likes:0, replies:0, pinned:false });
  buildControls(); render();
};

$('#dlBtn').onclick = async () => {
  try {
    if (typeof html2canvas !== 'undefined') {
      const canvas = await html2canvas($('#tt-preview'), { backgroundColor: null, scale: 2 });
      const a = document.createElement('a');
      a.href = canvas.toDataURL('image/png');
      a.download = 'tiktok-comment.png';
      a.click();
    }
  } catch(e) { console.error(e); }
};

const h2c = document.createElement('script');
h2c.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
document.head.appendChild(h2c);

buildControls();
render();

GZ.renderToolPage({
  category: 'social',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'▶️', href:'/social/youtube-comment.html', name:'YouTube Comment'},
    {icon:'🐦', href:'/social/tweet-generator.html', name:'Tweet Generator'},
    {icon:'🟠', href:'/social/reddit-post.html', name:'Reddit Post'},
    {icon:'📸', href:'/social/instagram-post.html', name:'Instagram Post'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
