<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"What is a Web App Manifest?","acceptedAnswer":{"@type":"Answer","text":"A Web App Manifest is a JSON file (usually manifest.json) that tells browsers how your Progressive Web App should behave when installed on a device. It includes the app name, icons, theme color, start URL, display mode (standalone, fullscreen, etc.) and other metadata required by the W3C spec."}},{"@type":"Question","name":"What icons do I need for a PWA?","acceptedAnswer":{"@type":"Answer","text":"The W3C spec requires at least one 192×192 px and one 512×512 px PNG icon with purpose 'any'. For best device support, also provide 'maskable' variants and Apple touch icon (180×180). This tool generates a list of icon entries you can paste into your project and create separately."}},{"@type":"Question","name":"Do I need HTTPS for a PWA?","acceptedAnswer":{"@type":"Answer","text":"Yes. PWAs require HTTPS for the service worker to register and for the install prompt to appear. localhost is exempt for development. Free options like Let's Encrypt, Cloudflare or Vercel/Netlify give you HTTPS for free."}},{"@type":"Question","name":"Is my data sent to a server?","acceptedAnswer":{"@type":"Answer","text":"No. All generation runs entirely in your browser using JavaScript. The manifest.json output is never uploaded. You can copy or download it locally and host it on your own site."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>

    <div class="wm-wrap">
      <div class="wm-col">
        <h3>⚙️ Manifest Configuration</h3>
        <div class="wm-form">
          <div class="wm-form-section">
            <h4>Identity</h4>
            <div class="wm-row"><label for="f-name">Name *</label><input type="text" id="f-name" value="My Awesome App"></div>
            <div class="wm-row"><label for="f-short">Short name *</label><input type="text" id="f-short" value="MyApp" maxlength="12"></div>
            <div class="wm-row"><label for="f-desc">Description</label><textarea id="f-desc" rows="2">A fast, modern Progressive Web App for everyday use.</textarea></div>
          </div>
          <div class="wm-form-section">
            <h4>Display & Start</h4>
            <div class="wm-row"><label for="f-start">Start URL</label><input type="url" id="f-start" value="/"></div>
            <div class="wm-row"><label for="f-scope">Scope</label><input type="url" id="f-scope" value="/"></div>
            <div class="wm-row"><label for="f-display">Display</label>
              <select id="f-display">
                <option value="standalone" selected>Standalone (no browser UI)</option>
                <option value="fullscreen">Fullscreen</option>
                <option value="minimal-ui">Minimal UI</option>
                <option value="browser">Browser (default)</option>
              </select>
            </div>
            <div class="wm-row"><label for="f-orient">Orientation</label>
              <select id="f-orient">
                <option value="any" selected>Any</option>
                <option value="natural">Natural</option>
                <option value="landscape">Landscape</option>
                <option value="portrait">Portrait</option>
                <option value="portrait-primary">Portrait primary</option>
                <option value="landscape-primary">Landscape primary</option>
              </select>
            </div>
          </div>
          <div class="wm-form-section">
            <h4>Theme & Colors</h4>
            <div class="wm-row"><label for="f-bg">Background color</label><input type="color" id="f-bg" value="#ffffff"> <input type="text" id="f-bg-t" value="#ffffff" style="flex:1"></div>
            <div class="wm-row"><label for="f-theme">Theme color</label><input type="color" id="f-theme" value="#0066ff"> <input type="text" id="f-theme-t" value="#0066ff" style="flex:1"></div>
            <div class="wm-row"><label for="f-lang">Lang</label><input type="text" id="f-lang" value="en-US"></div>
            <div class="wm-row"><label for="f-dir">Direction</label>
              <select id="f-dir">
                <option value="auto" selected>auto</option>
                <option value="ltr">ltr</option>
                <option value="rtl">rtl</option>
              </select>
            </div>
          </div>
          <div class="wm-form-section">
            <h4>Icons</h4>
            <div class="wm-row"><label for="f-icon-base">Base URL</label><input type="url" id="f-icon-base" value="/icons/"></div>
            <div class="wm-row"><label>Standard (any)</label>
              <div style="flex:1;display:flex;flex-wrap:wrap;gap:6px">
                <label><input type="checkbox" class="wm-icon-size" data-size="48" checked> 48</label>
                <label><input type="checkbox" class="wm-icon-size" data-size="72" checked> 72</label>
                <label><input type="checkbox" class="wm-icon-size" data-size="96" checked> 96</label>
                <label><input type="checkbox" class="wm-icon-size" data-size="128" checked> 128</label>
                <label><input type="checkbox" class="wm-icon-size" data-size="144" checked> 144</label>
                <label><input type="checkbox" class="wm-icon-size" data-size="152"> 152</label>
                <label><input type="checkbox" class="wm-icon-size" data-size="192" checked> 192*</label>
                <label><input type="checkbox" class="wm-icon-size" data-size="256"> 256</label>
                <label><input type="checkbox" class="wm-icon-size" data-size="384"> 384</label>
                <label><input type="checkbox" class="wm-icon-size" data-size="512" checked> 512*</label>
              </div>
            </div>
            <div class="wm-row"><label>Maskable</label>
              <label><input type="checkbox" id="f-maskable" checked> Add maskable variants for 192 and 512</label>
            </div>
            <div class="wm-row"><label>Type</label>
              <select id="f-icon-type">
                <option value="image/png" selected>image/png</option>
                <option value="image/svg+xml">image/svg+xml</option>
                <option value="image/webp">image/webp</option>
              </select>
            </div>
          </div>
          <div class="wm-form-section">
            <h4>Shortcuts & Screenshots</h4>
            <div class="wm-row"><label for="f-shortcuts">Shortcuts (JSON)</label><textarea id="f-shortcuts" rows="3" placeholder='[{"name":"Home","url":"/"}]'>[]</textarea></div>
            <div class="wm-row"><label for="f-screenshots">Screenshots</label><textarea id="f-screenshots" rows="2" placeholder='[{"src":"/screenshot1.png","sizes":"1280x720"}]'>[]</textarea></div>
            <div class="wm-row"><label for="f-categories">Categories</label><input type="text" id="f-categories" placeholder="productivity, utilities"></div>
            <div class="wm-row"><label for="f-id">App ID</label><input type="text" id="f-id" placeholder="/?source=pwa"></div>
          </div>
        </div>
      </div>
      <div class="wm-col">
        <h3>📄 Generated manifest.json</h3>
        <textarea id="output" spellcheck="false" readonly></textarea>
        <div class="wm-status" id="status"></div>

        <div class="wm-validation" id="validation">
          <h4>✅ W3C Spec Validation</h4>
          <div id="validation-body">Validating…</div>
        </div>
      </div>
    </div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Web App Manifest Generator',
    toolDesc: 'Build a W3C-compliant PWA manifest.json visually — name, icons, theme color, display mode, shortcuts and screenshots. Live preview with built-in spec validation.',
    step1: 'Fill in the app identity (name, short name, description)',
    step2: 'Pick display mode, theme colors and orientation',
    step3: 'Select the icon sizes you need (192 and 512 are required by spec)',
    step4: 'Copy or download the manifest.json and link it from your <head> with <link rel="manifest" href="/manifest.json">',
  },
  zh: {
    toolTitle: 'Web App Manifest 生成器',
    toolDesc: '可视化生成符合 W3C 规范的 PWA manifest.json 文件 — 名称、图标、主题色、显示模式、快捷方式和截图。实时预览并内置规范校验。',
    step1: '填写应用身份信息（名称、短名称、描述）',
    step2: '选择显示模式、主题颜色和方向',
    step3: '选择需要的图标尺寸（规范要求至少 192 和 512）',
    step4: '复制或下载 manifest.json，并在 <head> 中通过 <link rel="manifest" href="/manifest.json"> 引入',
  }
});

const { $, copyText, t, showToast } = GZ;

function getFormData() {
  return {
    name: $('#f-name').value.trim(),
    short_name: $('#f-short').value.trim(),
    description: $('#f-desc').value.trim(),
    start_url: $('#f-start').value.trim() || '/',
    scope: $('#f-scope').value.trim() || '/',
    display: $('#f-display').value,
    orientation: $('#f-orient').value,
    background_color: $('#f-bg-t').value.trim() || '#ffffff',
    theme_color: $('#f-theme-t').value.trim() || '#0066ff',
    lang: $('#f-lang').value.trim() || 'en-US',
    dir: $('#f-dir').value,
    icon_base: $('#f-icon-base').value.trim() || '/icons/',
    icon_type: $('#f-icon-type').value,
    maskable: $('#f-maskable').checked,
    icons: Array.from(document.querySelectorAll('.wm-icon-size:checked')).map(c => parseInt(c.dataset.size)),
    shortcuts: (() => { try { return JSON.parse($('#f-shortcuts').value || '[]'); } catch(e) { return []; } })(),
    screenshots: (() => { try { return JSON.parse($('#f-screenshots').value || '[]'); } catch(e) { return []; } })(),
    categories: $('#f-categories').value.split(',').map(s => s.trim()).filter(Boolean),
    id: $('#f-id').value.trim()
  };
}

function buildManifest(d) {
  const m = {};
  m.name = d.name;
  m.short_name = d.short_name;
  if (d.description) m.description = d.description;
  m.start_url = d.start_url;
  m.scope = d.scope;
  m.display = d.display;
  m.orientation = d.orientation;
  m.background_color = d.background_color;
  m.theme_color = d.theme_color;
  m.lang = d.lang;
  m.dir = d.dir;
  m.id = d.id || d.start_url;
  // Icons
  m.icons = d.icons.map(size => {
    const icon = { src: `${d.icon_base.replace(/\/$/, '/')}icon-${size}x${size}.${d.icon_type === 'image/svg+xml' ? 'svg' : 'png'}`, sizes: `${size}x${size}`, type: d.icon_type };
    return icon;
  });
  if (d.maskable) {
    [192, 512].forEach(size => {
      if (d.icons.includes(size)) {
        m.icons.push({ src: `${d.icon_base.replace(/\/$/, '/')}icon-maskable-${size}x${size}.${d.icon_type === 'image/svg+xml' ? 'svg' : 'png'}`, sizes: `${size}x${size}`, type: d.icon_type, purpose: 'maskable' });
      }
    });
  }
  if (d.shortcuts && d.shortcuts.length) m.shortcuts = d.shortcuts;
  if (d.screenshots && d.screenshots.length) m.screenshots = d.screenshots;
  if (d.categories && d.categories.length) m.categories = d.categories;
  return m;
}

function validate(m) {
  const issues = [];
  if (!m.name) issues.push({l:'err', t:'Missing required field: name'});
  if (!m.short_name) issues.push({l:'err', t:'Missing required field: short_name'});
  if (!m.start_url) issues.push({l:'err', t:'Missing required field: start_url'});
  if (!m.icons || m.icons.length === 0) issues.push({l:'err', t:'At least one icon is required'});
  if (m.icons) {
    const sizes = m.icons.flatMap(i => i.sizes.split(' ').map(s => parseInt(s)));
    if (!sizes.includes(192)) issues.push({l:'warn', t:'Spec recommends a 192×192 icon'});
    if (!sizes.includes(512)) issues.push({l:'warn', t:'Spec recommends a 512×512 icon'});
    if (!m.icons.some(i => i.purpose === 'maskable' || i.purpose === 'any maskable')) issues.push({l:'warn', t:'No maskable icon — install prompt may show cropping'});
  }
  if (!m.theme_color) issues.push({l:'warn', t:'No theme_color — browser UI may flash'});
  if (!m.background_color) issues.push({l:'warn', t:'No background_color — first paint may flash'});
  if (!m.display) issues.push({l:'err', t:'Missing display mode'});
  if (m.short_name && m.short_name.length > 12) issues.push({l:'warn', t:'short_name should be ≤ 12 characters for some launchers'});
  return issues;
}

function render() {
  const d = getFormData();
  const m = buildManifest(d);
  const json = JSON.stringify(m, null, 2);
  $('#output').value = json;
  // Status
  $('#status').innerHTML = `<span class="ok">✓ ${Object.keys(m).length} top-level fields, ${m.icons.length} icons</span>`;
  $('#status').className = 'wm-status ok';
  // Validation
  const issues = validate(m);
  const vb = $('#validation-body');
  if (issues.length === 0) {
    vb.innerHTML = '<div class="ok">✓ Manifest passes all W3C spec checks</div>';
  } else {
    const counts = { err: 0, warn: 0 };
    issues.forEach(i => counts[i.l]++);
    vb.innerHTML = `<div style="margin-bottom:6px"><span class="${counts.err?'err':'ok'}">${counts.err} error${counts.err!==1?'s':''}</span> · <span class="warn">${counts.warn} warning${counts.warn!==1?'s':''}</span></div><ul>${issues.map(i => `<li class="${i.l}">${i.l==='err'?'✗':'⚠'} ${i.t}</li>`).join('')}</ul>`;
  }
}

function loadExample() {
  $('#f-name').value = 'TaskFlow';
  $('#f-short').value = 'TaskFlow';
  $('#f-desc').value = 'A lightning-fast todo list that works offline';
  $('#f-start').value = '/';
  $('#f-scope').value = '/';
  $('#f-display').value = 'standalone';
  $('#f-orient').value = 'any';
  $('#f-bg-t').value = '#0f172a';
  $('#f-theme-t').value = '#3b82f6';
  $('#f-lang').value = 'en-US';
  $('#f-icon-base').value = '/icons/';
  $('#f-icon-type').value = 'image/png';
  $('#f-maskable').checked = true;
  $('#f-categories').value = 'productivity, utilities';
  $('#f-shortcuts').value = '[{"name":"New Task","url":"/new","icons":[{"src":"/icons/new.png","sizes":"96x96"}]}]';
  $('#f-screenshots').value = '[{"src":"/screenshot1.png","sizes":"1280x720","type":"image/png","form_factor":"wide"}]';
  document.querySelectorAll('.wm-icon-size').forEach(c => {
    const s = parseInt(c.dataset.size);
    c.checked = [48,72,96,128,144,192,256,512].includes(s);
  });
  render();
}

function downloadManifest() {
  const text = $('#output').value;
  const blob = new Blob([text], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'manifest.json';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('Downloaded manifest.json');
}

function doClear() {
  document.querySelectorAll('.wm-form input, .wm-form textarea, .wm-form select').forEach(el => {
    if (el.type === 'checkbox') el.checked = false;
    else el.value = '';
  });
  $('#output').value = '';
  $('#status').textContent = '';
}

// Wire sync between color picker and text
function syncColor(pickerId, textId) {
  $(`#${pickerId}`).addEventListener('input', e => { $(`#${textId}`).value = e.target.value; render(); });
  $(`#${textId}`).addEventListener('input', e => {
    if (/^#[0-9a-fA-F]{6}$/.test(e.target.value)) { $(`#${pickerId}`).value = e.target.value; }
    render();
  });
}
syncColor('f-bg','f-bg-t');
syncColor('f-theme','f-theme-t');

// Wire all form changes
document.querySelectorAll('.wm-form input, .wm-form textarea, .wm-form select').forEach(el => {
  el.addEventListener('input', render);
  el.addEventListener('change', render);
});

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn" onclick="copyText($('#output').value)">${t('copy')}</button>
  <button class="gz-btn wm-download" onclick="downloadManifest()">⬇ Download</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

GZ.renderToolPage({
  category: 'dev',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🤖', href:'/seo/robots-txt-generator.html', name:'robots.txt Generator'},
    {icon:'🗺️', href:'/seo/sitemap-generator.html', name:'Sitemap Generator'},
    {icon:'🏷️', href:'/seo/meta-tag-generator.html', name:'Meta Tag Generator'},
    {icon:'🌐', href:'/dev/htaccess.html', name:'.htaccess Generator'},
  ]
});

loadExample();
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
