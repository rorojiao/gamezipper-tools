.br-wrap{max-width:440px;margin:0 auto;text-align:center}
.br-techniques{display:flex;gap:6px;justify-content:center;margin-bottom:20px;flex-wrap:wrap}

.br-btn:hover{opacity:.88}
.br-btn.secondary{background:var(--glass2);color:var(--text);border:1px solid var(--border)}
.br-info{background:var(--glass);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:16px;text-align:left;font-size:.85em;line-height:1.6}
.br-info h3{font-size:.95em;margin-bottom:8px;color:var(--accent)}
.br-pattern{display:inline-flex;gap:4px;margin:8px 0;flex-wrap:wrap}
.br-pattern span{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:6px;font-size:.75em;font-weight:600}

<body>
<div class="gz-container">
  <div class="gz-tool-header"><h1 id="title"></h1><p class="desc" id="desc"></p></div>
  <div class="gz-tool-area">

      <div class="br-cycle" id="cycle"></div>

<script>
GZI18n.register({
  en: {
    toolTitle: 'Breathing Exercise',
    toolDesc: 'Free guided breathing exercise tool with animated visual guide. Practice Box Breathing, 4-7-8 Relaxing Breath, Coherent Breathing and more — reduce stress in your browser.',
    inhale: 'Inhale',
    hold: 'Hold',
    exhale: 'Exhale',
    holdEmpty: 'Hold',
    start: 'Start',
    stop: 'Stop',
    reset: 'Reset',
    cycles: 'cycles',
    todayCycles: 'Today',
    totalCycles: 'Total',
    step1: 'Choose a breathing technique from the buttons above',
    step2: 'Press Start and follow the expanding and contracting orb',
    step3: 'Inhale as the orb grows, exhale as it shrinks',
    step4: 'Complete 4-8 cycles for a calming effect',
  },
  zh: {
    toolTitle: '呼吸训练工具',
    toolDesc: '免费引导式呼吸训练工具，带动画视觉引导。练习方块呼吸、4-7-8 放松呼吸、共振呼吸等 — 在浏览器中随时随地减压。',
    inhale: '吸气',
    hold: '屏息',
    exhale: '呼气',
    holdEmpty: '保持',
    start: '开始',
    stop: '停止',
    reset: '重置',
    cycles: '次',
    todayCycles: '今日',
    totalCycles: '总计',
    step1: '从上方按钮中选择一种呼吸法',
    step2: '点击「开始」并跟随圆球的膨胀和收缩',
    step3: '圆球膨胀时吸气，收缩时呼气',
    step4: '完成 4-8 个循环即可达到放松效果',
  }
});

const { $, t } = GZ;

const techniques = {
  box:     { name: 'Box 4-4-4-4',     phases: [['inhale',4],['hold',4],['exhale',4],['holdEmpty',4]], desc_en: 'Used by Navy SEALs to stay calm under pressure. Equal inhale, hold, exhale and hold — forming a perfect square.', desc_zh: '美国海豹突击队使用的减压呼吸法。吸气、屏息、呼气、保持各 4 秒，形成完美的方形节奏。' },
  relax:   { name: '4-7-8 Breath',     phases: [['inhale',4],['hold',7],['exhale',8]], desc_en: 'Dr. Andrew Weil\'s natural tranquilizer. A longer exhale activates the parasympathetic nervous system for deep relaxation.', desc_zh: 'Andrew Weil 博士发明的天然镇定呼吸法。较长的呼气激活副交感神经系统，带来深度放松。' },
  coherent:{ name: 'Coherent 5-5',     phases: [['inhale',5],['exhale',5]], desc_en: 'Also called resonant breathing. Five seconds in, five seconds out — balances the nervous system at about 6 breaths per minute.', desc_zh: '又称共振呼吸。5 秒吸、5 秒呼 — 以每分钟约 6 次的频率平衡神经系统。' },
  deep:    { name: 'Deep 4-6',         phases: [['inhale',4],['exhale',6]], desc_en: 'Simple diaphragmatic breathing with a longer exhale. Great for beginners and bedtime relaxation.', desc_zh: '简单的腹式呼吸，呼气更长。适合初学者和睡前放松。' },
};

let currentTech = 'box';
let running = false;
let phaseIdx = 0;
let phaseStart = 0;
let cycleCount = 0;
let rafId = null;
let stats = JSON.parse(localStorage.getItem('gz-breath-stats') || '{"today":0,"date":"","total":0}');

function todayKey() { return new Date().toISOString().slice(0,10); }

function getCurrentPhases() { return techniques[currentTech].phases; }

function setOrbState(phase) {
  const orb = $('#orb');
  orb.classList.remove('expanded','contracted');
  const sec = getCurrentPhases()[phase][0];
  if (sec === 'inhale') {
    orb.classList.add('expanded');
  } else if (sec === 'exhale') {
    orb.classList.add('contracted');
  } else if (sec === 'hold') {
    // keep expanded (after inhale)
    orb.classList.add('expanded');
  } else {
    // holdEmpty - keep contracted
    orb.classList.add('contracted');
  }
  // set transition duration to match phase
  const dur = getCurrentPhases()[phase][1];
  orb.style.transitionDuration = dur + 's';
}

function updatePhase() {
  if (!running) return;
  const phases = getCurrentPhases();
  const [type, dur] = phases[phaseIdx];
  const now = Date.now();
  const elapsed = (now - phaseStart) / 1000;
  const remaining = Math.ceil(dur - elapsed);
  $('#phase').textContent = `${t(type)} — ${remaining}s`;
  $('#orbText').textContent = remaining;
  if (elapsed >= dur) {
    // move to next phase
    phaseIdx++;
    if (phaseIdx >= phases.length) {
      phaseIdx = 0;
      cycleCount++;
      logCycle();
    }
    phaseStart = Date.now();
    setOrbState(phaseIdx);
  }
  $('#cycle').textContent = `${t('cycles')}: ${cycleCount}`;
  rafId = requestAnimationFrame(updatePhase);
}

function logCycle() {
  if (stats.date !== todayKey()) { stats.date = todayKey(); stats.today = 0; }
  stats.today++;
  stats.total++;
  localStorage.setItem('gz-breath-stats', JSON.stringify(stats));
  updateStats();
}

function start() {
  if (running) return;
  running = true;
  phaseIdx = 0;
  phaseStart = Date.now();
  cycleCount = 0;
  setOrbState(0);
  rafId = requestAnimationFrame(updatePhase);
  renderControls();
}
function stop() {
  running = false;
  if (rafId) cancelAnimationFrame(rafId);
  $('#orb').classList.remove('expanded','contracted');
  $('#orbText').textContent = '';
  $('#phase').textContent = '';
  renderControls();
}
function reset() {
  stop();
  cycleCount = 0;
  $('#cycle').textContent = '';
}

function renderControls() {
  $('#controls').innerHTML = running
    ? `<button class="br-btn secondary" onclick="stop()">${t('stop')}</button>`
    : `<button class="br-btn" onclick="start()">${t('start')}</button><button class="br-btn secondary" onclick="reset()">${t('reset')}</button>`;
}

function updateStats() {
  $('#stats').innerHTML = `
    <div class="br-stat"><div class="v">${stats.date===todayKey()?stats.today:0}</div><div class="k">${t('todayCycles')}</div></div>
    <div class="br-stat"><div class="v">${stats.total}</div><div class="k">${t('totalCycles')}</div></div>`;
}

function renderInfo() {
  const tech = techniques[currentTech];
  const lang = GZI18n.getLang();
  const desc = lang === 'zh' ? tech.desc_zh : tech.desc_en;
  const patternHTML = tech.phases.map(([type,sec]) => {
    const color = type==='inhale'?'#00d672':type==='exhale'?'#ffa500':'#61afef';
    return `<span style="background:${color}33;color:${color};border:1px solid ${color}66">${sec}s</span>`;
  }).join('');
  $('#info').innerHTML = `<h3>${tech.name}</h3><p>${desc}</p><div class="br-pattern">${patternHTML}</div>`;
}

function switchTech(key) {
  if (running) stop();
  currentTech = key;
  document.querySelectorAll('.br-techniques button').forEach(b => b.classList.toggle('active', b.dataset.k === key));
  renderInfo();
}

// init
$('#techniques').innerHTML = Object.entries(techniques).map(([k,v]) =>
  `<button data-k="${k}" onclick="switchTech('${k}')" class="${k==='box'?'active':''}">${v.name}</button>`).join('');
renderControls();
renderInfo();
updateStats();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🧘', href:'/calc/meditation-timer.html', name:'Meditation Timer'},
    {icon:'🍅', href:'/calc/pomodoro.html', name:'Pomodoro Timer'},
    {icon:'📚', href:'/calc/study-timer.html', name:'Study Timer'},
    {icon:'😴', href:'/calc/sleep-calculator.html', name:'Sleep Calculator'},
  ]
});
</script>
<script src="/tools-result-rec.js?v=20260707v520" defer></script>
</body>
