const { $, t } = GZ;

let currentMode = 1;

function fmt(n) {
  if (!isFinite(n)) return '—';
  return '$' + n.toLocaleString('en-US', { maximumFractionDigits: 0 });
}
function fmtShort(n) {
  if (!isFinite(n)) return '—';
  if (Math.abs(n) >= 1e6) return '$' + (n/1e6).toFixed(1) + 'M';
  if (Math.abs(n) >= 1e3) return '$' + (n/1e3).toFixed(1) + 'k';
  return '$' + Math.round(n);
}

function simulate(principal, monthly, annualRate, months) {
  const r = annualRate / 100 / 12;
  const rows = [];
  let bal = principal;
  let totalContrib = principal;
  let totalInt = 0;
  let lastYearBal = principal;
  let yearContrib = 0;
  let yearInt = 0;
  for (let m = 1; m <= months; m++) {
    const interest = bal * r;
    bal = bal + interest + monthly;
    totalContrib += monthly;
    totalInt += interest;
    yearContrib += monthly;
    yearInt += interest;
    if (m % 12 === 0) {
      const yr = m / 12;
      rows.push({
        year: yr,
        start: lastYearBal,
        contrib: yearContrib,
        interest: yearInt,
        end: bal
      });
      lastYearBal = bal;
      yearContrib = 0;
      yearInt = 0;
    }
  }
  return { finalBal: bal, totalContrib, totalInt, rows };
}

function monthsToGoal(goal, principal, monthly, rate) {
  if (principal >= goal) return 0;
  if (monthly <= 0 && rate <= 0) return Infinity;
  const r = rate / 100 / 12;
  // Future value with monthly contributions: FV = P*(1+r)^n + PMT*((1+r)^n-1)/r
  // Solve for n: (1+r)^n = (FV*r + PMT) / (P*r + PMT)
  if (r === 0) {
    return Math.ceil((goal - principal) / monthly);
  }
  const num = goal * r + monthly;
  const den = principal * r + monthly;
  if (den <= 0) return Infinity;
  const ratio = num / den;
  if (ratio <= 0) return Infinity;
  const n = Math.log(ratio) / Math.log(1 + r);
  return Math.ceil(n);
}

function monthlyToGoal(goal, principal, years, rate) {
  const r = rate / 100 / 12;
  const n = years * 12;
  if (n === 0) return goal - principal;
  if (r === 0) return (goal - principal) / n;
  // PMT = (FV - P*(1+r)^n) * r / ((1+r)^n - 1)
  const fvPrincipal = principal * Math.pow(1+r, n);
  const f = Math.pow(1+r, n);
  return (goal - fvPrincipal) * r / (f - 1);
}

function setMode(m) {
  currentMode = m;
  document.querySelectorAll('.mode-tabs button').forEach(b => b.classList.toggle('active', +b.dataset.mode === m));
  [1,2,3].forEach(n => $('#mode-' + n).classList.toggle('active', n === m));
  calc();
}

function renderChart(rows) {
  const max = Math.max(...rows.map(r => r.end), 1);
  $('#chart').innerHTML = rows.map(r => {
    const h = Math.max(2, (r.end / max) * 100);
    return `<div class="bar" style="height:${h}%" data-tip="Y${r.year}: ${fmt(r.end)}"></div>`;
  }).join('');
  $('#table').innerHTML = `
    <thead><tr><th>${t('year')}</th><th>${t('startBal')}</th><th>${t('contrib')}</th><th>${t('interest')}</th><th>${t('endBal')}</th></tr></thead>
    <tbody>${rows.map(r => `<tr><td>${r.year}</td><td>${fmt(r.start)}</td><td>${fmt(r.contrib)}</td><td>${fmt(r.interest)}</td><td>${fmt(r.end)}</td></tr>`).join('')}</tbody>`;
}

function calc() {
  let rows = [], summary = [];
  if (currentMode === 1) {
    const goal = +$('#m1-goal').value;
    const start = +$('#m1-current').value;
    const monthly = +$('#m1-monthly').value;
    const rate = +$('#m1-rate').value;
    const months = monthsToGoal(goal, start, monthly, rate);
    if (!isFinite(months)) {
      $('#m1-time').textContent = '∞';
      $('#m1-date').textContent = '—';
    } else if (months === 0) {
      $('#m1-time').textContent = '✓';
      $('#m1-date').textContent = 'Already reached';
    } else {
      const yrs = Math.floor(months / 12);
      const rem = months % 12;
      $('#m1-time').textContent = yrs + 'y ' + rem + 'm  (' + months + ' ' + t('m1Reach') + ')';
      const d = new Date();
      d.setMonth(d.getMonth() + months);
      $('#m1-date').textContent = t('m1Date') + ' ' + d.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
    }
    // Simulate 50 years max for chart
    const sim = simulate(start, monthly, rate, Math.min(isFinite(months) ? months : 600, 600));
    summary = [
      { v: fmt(sim.totalContrib), l: t('totalContrib') },
      { v: fmt(sim.totalInt), l: t('totalInterest') },
      { v: fmt(sim.finalBal), l: t('finalBal') },
    ];
    rows = sim.rows;
  } else if (currentMode === 2) {
    const goal = +$('#m2-goal').value;
    const start = +$('#m2-current').value;
    const years = +$('#m2-years').value;
    const rate = +$('#m2-rate').value;
    const monthly = monthlyToGoal(goal, start, years, rate);
    $('#m2-monthly').textContent = fmt(monthly);
    $('#m2-total').textContent = t('m2Total') + ' ' + fmt(monthly * years * 12);
    const sim = simulate(start, monthly, rate, years * 12);
    summary = [
      { v: fmt(monthly), l: t('resultMonthly') },
      { v: fmt(sim.totalContrib - start), l: t('totalContrib') },
      { v: fmt(sim.totalInt), l: t('totalInterest') },
      { v: fmt(sim.finalBal), l: t('finalBal') },
    ];
    rows = sim.rows;
  } else {
    const start = +$('#m3-start').value;
    const monthly = +$('#m3-monthly').value;
    const years = +$('#m3-years').value;
    const rate = +$('#m3-rate').value;
    const sim = simulate(start, monthly, rate, years * 12);
    $('#m3-future').textContent = fmt(sim.finalBal);
    $('#m3-interest').textContent = t('m3Interest') + ' ' + fmt(sim.totalInt);
    summary = [
      { v: fmt(sim.totalContrib - start), l: t('totalContrib') },
      { v: fmt(sim.totalInt), l: t('totalInterest') },
      { v: fmt(sim.finalBal), l: t('finalBal') },
    ];
    rows = sim.rows;
  }
  // Update correct summary
  const sumId = '#m' + currentMode + '-summary';
  $(sumId).innerHTML = summary.map(s => `<div class="sg-sum"><div class="v">${s.v}</div><div class="l">${s.l}</div></div>`).join('');
  renderChart(rows);
}

['m1-goal','m1-current','m1-monthly','m1-rate','m2-goal','m2-current','m2-years','m2-rate','m3-start','m3-monthly','m3-years','m3-rate'].forEach(id => {
