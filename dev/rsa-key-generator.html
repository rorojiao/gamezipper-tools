document.querySelectorAll('[data-i18n]').forEach(el => el.textContent = GZ.t(el.dataset.i18n));
const { $, copyText, t } = GZ;
$('#privacyNote').textContent = t('privacyNote');

function abToPem(ab, label) {
  const bytes = new Uint8Array(ab);
  let bin = '';
  bytes.forEach(b => bin += String.fromCharCode(b));
  const b64 = btoa(bin);
  const lines = b64.match(/.{1,64}/g).join('\n');
  return `-----BEGIN ${label}-----\n${lines}\n-----END ${label}-----`;
}

function download(filename, content) {
  const blob = new Blob([content], { type: 'application/x-pem-file' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 100);
}

let lastPub = '', lastPriv = '';

async function generateKeys() {
  $('#status').className = 'status';
  $('#status').textContent = t('generating');
  $('#output').innerHTML = '';
  try {
    const bits = +$('#keySize').value;
    const start = performance.now();
    const keyPair = await crypto.subtle.generateKey(
      { name: 'RSA-OAEP', modulusLength: bits, publicExponent: new Uint8Array([1, 0, 1]), hash: 'SHA-256' },
      true,
      ['encrypt', 'decrypt']
    );
    const elapsed = ((performance.now() - start) / 1000).toFixed(2);

    const pubSpki = await crypto.subtle.exportKey('spki', keyPair.publicKey);
    const privPkcs8 = await crypto.subtle.exportKey('pkcs8', keyPair.privateKey);
    const pubPem = abToPem(pubSpki, 'PUBLIC KEY');
    const privPem = abToPem(privPkcs8, 'PRIVATE KEY');
    lastPub = pubPem; lastPriv = privPem;

    $('#output').innerHTML = `
      <div class="key-block">
        <h3>🔓 ${t('publicKey')} <button class="gz-btn gz-btn-secondary" style="font-size:.7em;padding:3px 8px" onclick="copyText(lastPub)">📋 ${t('copy')}</button></h3>
        <textarea readonly spellcheck="false">${pubPem}</textarea>
        <div style="margin-top:6px"><button class="gz-btn gz-btn-secondary" style="font-size:.75em;padding:4px 10px" onclick="download('public.pem', lastPub)">⬇️ ${t('downloadPub')}</button></div>
      </div>
      <div class="key-block">
        <h3>🔐 ${t('privateKey')} <button class="gz-btn gz-btn-secondary" style="font-size:.7em;padding:3px 8px" onclick="copyText(lastPriv)">📋 ${t('copy')}</button></h3>
        <textarea readonly spellcheck="false">${privPem}</textarea>
        <div style="margin-top:6px"><button class="gz-btn gz-btn-secondary" style="font-size:.75em;padding:4px 10px" onclick="download('private.pem', lastPriv)">⬇️ ${t('downloadPriv')}</button></div>
      </div>
      <p class="note">⚠️ ${t('warning')}</p>`;
    $('#status').className = 'status ok';
    $('#status').textContent = `${t('done')} — RSA-${bits} in ${elapsed}s`;
  } catch(e) {
    $('#status').className = 'status err';
    $('#status').textContent = `${t('err')}: ${e.message}`;
  }
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="generateKeys()">🔑 ${t('generate')}</button>`;
