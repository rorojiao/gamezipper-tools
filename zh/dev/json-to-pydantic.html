<script>
GZI18n.register({
  en:{toolTitle:'JSON to Pydantic Model Converter',toolDesc:'Generate Pydantic BaseModel classes from JSON for FastAPI, data validation and typed Python projects.',root:'root class',alias:'Field aliases',optional:'Optional for null',v2:'Pydantic v2 imports',inputLabel:'JSON input',outputLabel:'Pydantic models',convert:'Convert',download:'Download .py',valid:'Valid JSON',invalid:'Invalid JSON',step1:'Paste a JSON object or array into the input area.',step2:'Choose a root class name and alias / Optional options.',step3:'Click Convert to generate nested Pydantic models.',step4:'Copy or download the Python code and add it to your project.'},
  zh:{toolTitle:'JSON 转 Pydantic 模型转换器',toolDesc:'从 JSON 生成 Pydantic BaseModel 类，适用于 FastAPI、数据校验和类型化 Python 项目。',root:'根类名',alias:'Field 别名',optional:'null 生成 Optional',v2:'Pydantic v2 导入',inputLabel:'JSON 输入',outputLabel:'Pydantic 模型',convert:'转换',download:'下载 .py',valid:'JSON 有效',invalid:'JSON 无效',step1:'在输入区粘贴 JSON 对象或数组。',step2:'选择根类名以及别名 / Optional 选项。',step3:'点击「转换」生成嵌套 Pydantic 模型。',step4:'复制或下载 Python 代码并添加到项目中。'}
});
const {$,copyText,t}=GZ;
const pyKeywords=new Set('False None True and as assert async await break class continue def del elif else except finally for from global if import in is lambda nonlocal not or pass raise return try while with yield'.split(' '));
function pascal(s){return String(s||'Model').replace(/[^a-zA-Z0-9]+/g,' ').trim().split(/\s+/).map(w=>w?w[0].toUpperCase()+w.slice(1):'').join('').replace(/^\d+/,'')||'Model'}
function snake(s){let out=String(s||'field').replace(/([a-z0-9])([A-Z])/g,'$1_$2').replace(/[^a-zA-Z0-9]+/g,'_').replace(/^_+|_+$/g,'').toLowerCase(); if(!out)out='field'; if(/^\d/.test(out))out='field_'+out; if(pyKeywords.has(out))out+='_'; return out}
function singular(name){return name.replace(/ies$/,'y').replace(/s$/,'')||name}
function uniq(arr){return [...new Set(arr)]}
function typeRank(t){return t==='Any'?9:t.includes('Union')?8:t.includes('List')?7:1}
function buildModels(value, rootName){
  const classes=[]; const seen=new Map();
  function infer(v, name){
    if(v===null) return 'None';
    if(Array.isArray(v)){
      if(!v.length) return 'List[Any]';
      const types=uniq(v.slice(0,20).map((x,i)=>infer(x, singular(name)||('Item'+i))).filter(Boolean));
      const clean=types.includes('None')?types.filter(x=>x!=='None'):types;
      const base=clean.length===1?clean[0]:'Union['+clean.sort((a,b)=>typeRank(a)-typeRank(b)).join(', ')+']';
      return types.includes('None')?`List[Optional[${base}]]`:`List[${base}]`;
    }
    if(typeof v==='object'){
      const cls=pascal(name); generateClass(v, cls); return cls;
    }
    if(typeof v==='boolean')return 'bool';
    if(typeof v==='number')return Number.isInteger(v)?'int':'float';
    if(typeof v==='string')return 'str';
    return 'Any';
  }
  function signature(obj){return JSON.stringify(Object.keys(obj||{}).sort())}
  function generateClass(obj, cls){
    const sig=cls+':'+signature(obj); if(seen.has(sig))return seen.get(sig); seen.set(sig,cls);
    const fields=[];
    for(const [key,val] of Object.entries(obj||{})){
      const field=snake(key); const original=key; let type=infer(val, pascal(singular(key)));
      if(val===null) type=$('#optOptional').checked?'Optional[Any]':'Any';
      const needsAlias=$('#optAlias').checked&&(field!==original||/[^a-zA-Z0-9_]/.test(original));
      fields.push({field,original,type,needsAlias,nullable:val===null});
    }
    let lines=[`class ${cls}(BaseModel):`];
    if(!fields.length) lines.push('    pass');
    fields.forEach(f=>{lines.push(`    ${f.field}: ${f.type}${f.needsAlias?` = Field(alias=${JSON.stringify(f.original)})`:''}`)});
    classes.push({cls,code:lines.join('\n')}); return cls;
  }
  if(Array.isArray(value)){
    const first=value.find(x=>x&&typeof x==='object'&&!Array.isArray(x))||{};
    generateClass(first, pascal(rootName));
  }else if(value&&typeof value==='object') generateClass(value,pascal(rootName));
  else generateClass({value},pascal(rootName));
  return classes;
}
function convert(){
  const raw=$('#input').value.trim(); if(!raw){$('#output').textContent='';$('#status').textContent='';return}
  try{
    const data=JSON.parse(raw); const root=pascal($('#rootName').value||'RootModel'); const models=buildModels(data,root);
    const useField=models.some(m=>/Field\(/.test(m.code));
    const imports=['Any','List','Optional','Union'];
    let code='from __future__ import annotations\n\nfrom typing import '+imports.join(', ')+'\nfrom pydantic import BaseModel'+(useField?', Field':'')+'\n\n\n';
    code+=models.map(m=>m.code).join('\n\n')+'\n';
    $('#output').textContent=code; $('#status').innerHTML=`<span style="color:var(--gz-success)">✓ ${t('valid')} • ${models.length} model(s)</span>`;
  }catch(e){$('#output').textContent=e.message; $('#status').innerHTML=`<span style="color:var(--gz-accent)">✗ ${t('invalid')}: ${e.message}</span>`}
}
function loadExample(){
  $('#input').value=JSON.stringify({id:123,userName:'Ada Lovelace',email:'ada@example.com',active:true,profile:{created_at:'2026-07-07',score:98.5},roles:['admin','editor'],address:null},null,2); convert();
}
function downloadPy(){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([$('#output').textContent||''],{type:'text/x-python'}));a.download=(snake($('#rootName').value)||'models')+'.py';a.click();URL.revokeObjectURL(a.href)}
$('#input').addEventListener('input',convert);
$('#lbl-root').textContent=t('root');$('#lbl-alias').textContent=t('alias');$('#lbl-optional').textContent=t('optional');$('#lbl-v2').textContent=t('v2');$('#lbl-in').textContent=t('inputLabel');$('#lbl-out').textContent=t('outputLabel');
$('#toolbar').innerHTML=`<button class="gz-btn" onclick="convert()">${t('convert')}</button><button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button><button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button><button class="gz-btn gz-btn-secondary" onclick="downloadPy()">${t('download')}</button><button class="gz-btn gz-btn-secondary" onclick="$('#input').value='';convert()">${t('clear')}</button>`;
GZ.renderToolPage({category:'dev',titleKey:'toolTitle',descKey:'toolDesc',howToSteps:['step1','step2','step3','step4'],related:[{icon:'🐍',href:'/dev/json-to-python.html',name:'JSON to Python'},{icon:'🛡️',href:'/dev/json-to-zod.html',name:'JSON to Zod'},{icon:'☕',href:'/dev/json-to-java.html',name:'JSON to Java'},{icon:'🔷',href:'/convert/json-to-go.html',name:'JSON to Go'}]});
loadExample();
</script>
