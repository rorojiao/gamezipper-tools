const { $, t } = GZ;

// Top 200 most common passwords (subset, full list too big)
const COMMON = new Set(['password','123456','12345678','qwerty','abc123','111111','123456789','1234567','password1','12345','1234567890','000000','iloveyou','1234','dragon','sunshine','princess','letmein','welcome','monkey','football','shadow','superman','michael','ninja','mustang','jessica','charlie','ashley','bailey','passw0rd','master','654321','qazwsx','michael1','football1','baseball','iloveyou1','pokemon','soccer','computer','killer','pepper','daniel','joshua','starwars','123123','11111111','trustno1','jordan','hunter','andrew','sophie','diamond','tigger','summer','1990','1991','1992','harley','george','ginger','andrea','matthew','jennifer','amanda','lovely','jessica','peanut','joshua','maggie','buster','thomas','robert','daniel','hannah','william','ranger','cookie','flower','charlie','fucker','samantha','chicken','merlin','guitar','scooter','wilson','pepper','41joshua','delta','nathan','junior','pumpkin','elizabeth','dallas','hunter','joshua','thunder','chicken','qwert','asdfgh','zxcvbn','admin','root','toor','test','guest','login','welcome1','qwerty123','password123','1q2w3e4r','zaq12wsx','asdf','1q2w3e','aaaaaa','abc','abcdef','admin123','pass','changeme']);
const SEQUENCES = ['abcdefghijklmnopqrstuvwxyz','0123456789','qwertyuiopasdfghjklzxcvbnm','`1234567890-=','qwerty','asdfgh','zxcvbn'];

$('#pw-input').placeholder = t('placeholder');
$('#lbl-show').textContent = t('show');

$('#show-pw').addEventListener('change', e => {
  $('#pw-input').type = e.target.checked ? 'text' : 'password';
});
$('#pw-input').type = 'password';
$('#show-pw').checked = false;

function charsetSize(pw){
  let s = 0;
  if(/[a-z]/.test(pw)) s += 26;
  if(/[A-Z]/.test(pw)) s += 26;
  if(/[0-9]/.test(pw)) s += 10;
  if(/[^a-zA-Z0-9]/.test(pw)) s += 33;
  return s;
}

function entropyBits(pw, cs){
  if(cs === 0) return 0;
  return Math.round(pw.length * Math.log2(cs));
}

function crackTime(entropy){
  // 1e10 guesses/sec (offline fast GPU)
  const guesses = Math.pow(2, entropy) / 2;
  const seconds = guesses / 1e10;
  return humanTime(seconds);
}

function humanTime(s){
  if(s < 1) return t('instantly');
  if(s < 60) return Math.round(s) + ' ' + t('seconds');
  if(s < 3600) return Math.round(s/60) + ' ' + t('minutes');
  if(s < 86400) return Math.round(s/3600) + ' ' + t('hours');
  if(s < 31536000) return Math.round(s/86400) + ' ' + t('days');
  if(s < 31536000*100) return Math.round(s/31536000) + ' ' + t('years');
  if(s < 31536000*1e9) return Math.round(s/31536000/100) + ' ' + t('centuries');
  return t('forever');
}

function hasSequence(pw){
  const lower = pw.toLowerCase();
  for(const seq of SEQUENCES){
    for(let i = 0; i + 3 <= seq.length; i++){
      if(lower.includes(seq.substring(i, i+4))) return true;
    }
    // reverse
    for(let i = seq.length; i - 3 >= 0; i--){
      if(lower.includes(seq.substring(i-3, i).split('').reverse().join(''))) return true;
    }
  }
  return false;
}

function tooManyRepeats(pw){
  let maxRun = 1, run = 1;
  for(let i = 1; i < pw.length; i++){
    if(pw[i] === pw[i-1]){ run++; maxRun = Math.max(maxRun, run); }
    else run = 1;
  }
  return maxRun >= 4;
}

function analyze(){
  const pw = $('#pw-input').value;
  const tips = $('#tips');
  if(!pw){
    $('#meter-fill').style.width = '0%';
    $('#meter-label').textContent = '';
    $('#stats').innerHTML = '';
    $('#checks').innerHTML = '';
    tips.style.display = 'none';
    return;
  }
  const cs = charsetSize(pw);
  const ent = entropyBits(pw, cs);
  const ct = crackTime(ent);
  const hasUpper = /[A-Z]/.test(pw);
  const hasLower = /[a-z]/.test(pw);
  const hasNum = /[0-9]/.test(pw);
  const hasSym = /[^a-zA-Z0-9]/.test(pw);
  const isCommon = COMMON.has(pw.toLowerCase());
  const hasSeq = hasSequence(pw);
  const repeats = tooManyRepeats(pw);

  // Score 0-100
  let score = 0;
  if(pw.length >= 8) score += 15;
  if(pw.length >= 12) score += 20;
  if(pw.length >= 16) score += 15;
  if(hasLower) score += 8;
  if(hasUpper) score += 10;
  if(hasNum) score += 10;
  if(hasSym) score += 17;
  // entropy bonus
  if(ent >= 50) score += 5;
  // penalties
  if(isCommon) score -= 60;
  if(hasSeq) score -= 15;
  if(repeats) score -= 10;
  if(pw.length < 8) score -= 20;
  score = Math.max(0, Math.min(100, score));

  let labelKey, color;
  if(isCommon || score < 20){ labelKey = 'veryWeak'; color = '#e94560'; }
  else if(score < 40){ labelKey = 'weak'; color = '#f5a623'; }
  else if(score < 60){ labelKey = 'fair'; color = '#ffd700'; }
  else if(score < 75){ labelKey = 'good'; color = '#8bc34a'; }
  else if(score < 90){ labelKey = 'strong'; color = '#4caf50'; }
  else { labelKey = 'veryStrong'; color = '#00d672'; }

  $('#meter-fill').style.width = score + '%';
  $('#meter-fill').style.background = color;
  $('#meter-label').textContent = t('score') + ': ' + t(labelKey);
  $('#meter-label').style.color = color;

  $('#stats').innerHTML = `
    <div class="gz-stat"><div class="gz-stat-v">${ent} <span style="font-size:.6em">bits</span></div><div class="gz-stat-l">${t('entropy')}</div></div>
    <div class="gz-stat"><div class="gz-stat-v">${pw.length}</div><div class="gz-stat-l">${t('length')}</div></div>
    <div class="gz-stat"><div class="gz-stat-v">${cs}</div><div class="gz-stat-l">${t('charset')}</div></div>
    <div class="gz-stat"><div class="gz-stat-v" style="font-size:1em">${ct}</div><div class="gz-stat-l">${t('crackTime')}</div></div>`;

  const checks = [
    { ok: pw.length >= 12, okMsg: t('lenOk'), badMsg: t('lenBad') },
    { ok: hasUpper, okMsg: t('upperOk'), badMsg: t('upperBad') },
    { ok: hasLower, okMsg: t('lowerOk'), badMsg: t('lowerBad') },
    { ok: hasNum, okMsg: t('numberOk'), badMsg: t('numberBad') },
    { ok: hasSym, okMsg: t('symbolOk'), badMsg: t('symbolBad') },
    { ok: !isCommon, okMsg: null, badMsg: t('commonBad') },
    { ok: !hasSeq, okMsg: null, badMsg: t('seqBad') },
    { ok: !repeats, okMsg: null, badMsg: t('repeatBad') },
  ];
  $('#checks').innerHTML = checks.map(c => {
    if(c.ok && c.okMsg) return `<div class="gz-check"><span class="ic gz-good">✓</span><span>${c.okMsg}</span></div>`;
    if(!c.ok) return `<div class="gz-check"><span class="ic gz-bad">✗</span><span class="gz-bad">${c.badMsg}</span></div>`;
    return '';
  }).join('');

  // Tips
  const tipItems = checks.filter(c => !c.ok).map(c => `<li>${c.badMsg}</li>`);
  if(tipItems.length){
    tips.style.display = '';
    tips.innerHTML = `<strong>${t('tipsTitle')}</strong><ul>${tipItems.join('')}</ul>`;
  } else {
    tips.style.display = 'none';
  }
}

$('#pw-input').addEventListener('input', analyze);
