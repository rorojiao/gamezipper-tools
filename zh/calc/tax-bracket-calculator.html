<script>
GZI18n.register({
  en: {
    toolTitle: 'Tax Bracket Calculator (US 2025)',
    toolDesc: 'Estimate your US federal income tax with 2025 brackets. Enter taxable income and filing status to see marginal rate, effective rate, tax owed, and take-home. Free, instant, private.',
    incomeLabel: 'Taxable income ($)',
    statusLabel: 'Filing status',
    taxOwed: 'federal tax owed',
    takeHome: 'take-home after federal tax',
    marginal: 'Marginal rate',
    effective: 'Effective rate',
    step1: 'Enter your taxable income (after deductions) in dollars',
    step2: 'Select your filing status (single, married, head of household)',
    step3: 'See total tax owed, marginal rate, and effective rate instantly',
    step4: 'Review the bracket breakdown table to see how each chunk is taxed',
    note: '⚠️ Estimates only — federal income tax on taxable income. Excludes state tax, FICA (Social Security + Medicare ~7.65%), capital gains, and credits. Standard deduction 2025: $15,000 single / $30,000 MFJ. Consult a tax professional for filing.',
  },
  zh: {
    toolTitle: '美国联邦税率计算器（2025）',
    toolDesc: '使用 2025 税率档次估算美国联邦所得税。输入应税收入和申报身份，查看边际税率、有效税率、应纳税额和税后收入。免费、即时、隐私安全。',
    incomeLabel: '应税收入（美元 $）',
    statusLabel: '申报身份',
    taxOwed: '应纳联邦税',
    takeHome: '税后收入',
    marginal: '边际税率',
    effective: '有效税率',
    step1: '输入您的应税收入（扣除后）金额（美元）',
    step2: '选择申报身份（单身、已婚、户主）',
    step3: '立即查看总税额、边际税率和有效税率',
    step4: '查看税率档次明细表，了解每档如何计税',
    note: '⚠️ 仅供参考 — 仅计算联邦所得税（基于应税收入）。不包含州税、FICA（社保+医保约 7.65%）、资本利得和税收抵免。2025 标准扣除：单身 $15,000 / 夫妻合报 $30,000。报税请咨询专业税务师。',
  }
});

const { $, t } = GZ;

// 2025 federal tax brackets
const BRACKETS = {
  single: [[11925,0.10],[48475,0.12],[103350,0.22],[197300,0.24],[250525,0.32],[626350,0.35],[Infinity,0.37]],
  mfj:    [[23850,0.10],[96950,0.12],[206700,0.22],[394600,0.24],[501050,0.32],[751600,0.35],[Infinity,0.37]],
  mfs:    [[11925,0.10],[48475,0.12],[103350,0.22],[197300,0.24],[250525,0.32],[626350,0.35],[Infinity,0.37]],
  hoh:    [[17000,0.10],[64850,0.12],[103350,0.22],[197300,0.24],[250500,0.32],[626350,0.35],[Infinity,0.37]],
};

function fmt(n) { return '$' + Math.round(n).toLocaleString(); }
function pct(n) { return (n * 100).toFixed(1) + '%'; }

function calc() {
  const income = Math.max(0, parseFloat($('#income').value) || 0);
  const status = $('#status').value;
  const brackets = BRACKETS[status];
  let prev = 0;
  let totalTax = 0;
  const rows = [];
  for (const [cap, rate] of brackets) {
    if (income <= prev) { rows.push({rate, lo: prev, hi: cap, tax: 0, active: false, empty: true}); continue; }
    const taxableInBracket = Math.min(income, cap) - prev;
    const tax = taxableInBracket * rate;
    totalTax += tax;
    const active = income > prev && income <= cap;
    rows.push({rate, lo: prev, hi: cap, tax, active, taxableInBracket});
    prev = cap;
    if (income <= cap) {
      // remaining brackets empty
      for (const [c2, r2] of brackets.slice(brackets.indexOf([cap, rate]) + 1)) {
        rows.push({rate: r2, lo: cap, hi: c2, tax: 0, active: false, empty: true});
        cap = c2;
      }
      break;
    }
  }
  const marginal = rows.find(r => r.active);
  const marginalRate = marginal ? marginal.rate : 0;
  const effective = income > 0 ? totalTax / income : 0;
  const takeHome = income - totalTax;

  $('#bigResult').textContent = fmt(totalTax);
  $('#subResult').textContent = t('taxOwed');
  $('#grid').innerHTML = [
    {num: fmt(takeHome), lbl: t('takeHome')},
    {num: pct(marginalRate), lbl: t('marginal')},
    {num: pct(effective), lbl: t('effective')},
  ].map(c => `<div class="tb-tile"><div class="num">${c.num}</div><div class="lbl">${c.lbl}</div></div>`).join('');

  $('#bracketBody').innerHTML = rows.map(r => {
    const range = r.hi === Infinity ? `≥ $${r.lo.toLocaleString()}` : `$${r.lo.toLocaleString()} – $${r.hi.toLocaleString()}`;
    return `<tr class="${r.active ? 'active' : ''}">
      <td>${pct(r.rate)}</td>
      <td>${range}</td>
      <td>${r.tax > 0 ? fmt(r.tax) : '—'}</td>
    </tr>`;
  }).join('');

  $('#note').textContent = t('note');
}

$('#income').addEventListener('input', calc);
$('#status').addEventListener('change', calc);
calc();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [

    {icon:'🧮', href:'/calc/sales-tax-calculator.html', name:'Sales Tax'},
  ]
});
</script>
