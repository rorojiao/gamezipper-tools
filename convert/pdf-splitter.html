<script>
GZI18n.register({
  en:{

  zh:{

    toolDesc:'在线拆分 PDF — 提取指定页码范围、按单页拆分或平均分成 N 份。基于 pdf-lib 100% 浏览器本地处理，无需上传。',
    dropText:'拖拽 PDF 文件到此处或点击选择',
    noFile:'请先选择一个 PDF 文件',
    loadError:'无法加载 PDF：',
    pages:'页',
    modeRangeTitle:'📋 提取页码范围',
    modeRangeDesc:'从指定页（如 1-3, 5）创建新 PDF',
    modeEachTitle:'📄 每页单独拆分',
    modeEachDesc:'每一页都生成一个独立的 PDF',
    modePartsTitle:'🔢 平均分成 N 份',
    modePartsDesc:'将文档平均拆分成 N 个大小相近的 PDF',
    rangesLabel:'页码范围（从 1 开始）：',
    rangesHint:'示例：1-5  ·  2,4,6  ·  1-3, 7, 10-12',
    partsLabel:'拆分份数：',
    splitBtn:'拆分 PDF',
    split:'拆分',
    download:'下载',
    invalidRange:'范围格式无效。请使用 1-5 或单个数字，逗号分隔。',
    pageOutOfRange:'页码 {n} 超出范围（1–{max}）。',
    partMustBeGreater:'拆分份数至少为 2',
    extracted:'已提取',
    splitEach:'已拆分为',
    singlePages:'个单页 PDF',
    parts:'份',
    step1:'拖拽或点击选择一个 PDF 文件',
    step2:'选择拆分方式：页码范围、按页拆分或 N 等份',
    step3:'输入页码范围或拆分份数',
    step4:'点击「拆分」并下载生成的 PDF',
  }
});
const {$,t}=GZ;
let pdfFile=null, pdfBytes=null, pdfDoc=null, mode='range';

function formatSize(b){if(b<1024)return b+' B';if(b<1048576)return(b/1024).toFixed(1)+' KB';return(b/1048576).toFixed(1)+' MB';}

const dz=$('#dropZone');
dz.addEventListener('click',()=>$('#fileInput').click());
$('#fileInput').addEventListener('change',e=>{if(e.target.files[0])loadFile(e.target.files[0]);e.target.value='';});
dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('dragover');});
dz.addEventListener('dragleave',()=>dz.classList.remove('dragover'));
dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('dragover');if(e.dataTransfer.files[0])loadFile(e.dataTransfer.files[0]);});
$('#dropText').textContent=t('dropText');

async function loadFile(file){
  if(file.type!=='application/pdf'&& !file.name.toLowerCase().endsWith('.pdf')){alert(t('noFile'));return;}
  try{
    pdfFile=file;
    pdfBytes=await file.arrayBuffer();
    pdfDoc=await PDFLib.PDFDocument.load(pdfBytes);
    $('#fileName').textContent=file.name;
    $('#fileMeta').textContent=`${formatSize(file.size)} · ${pdfDoc.getPageCount()} ${t('pages')}`;
    $('#afterLoad').style.display='block';
    $('#dropZone').style.display='none';
    $('#results').innerHTML='';
  }catch(e){alert(t('loadError')+e.message);}
}

function resetFiles(){
  pdfFile=null;pdfBytes=null;pdfDoc=null;
  $('#afterLoad').style.display='none';
  $('#dropZone').style.display='block';
}

function setMode(m){
  mode=m;
  $('#modeRange').classList.toggle('active',m==='range');
  $('#modeEach').classList.toggle('active',m==='each');
  $('#modeParts').classList.toggle('active',m==='parts');
  $('#rangeControls').style.display=m==='range'?'block':'none';
  $('#partsControls').style.display=m==='parts'?'block':'none';
}

function parseRanges(str){
  const parts=str.split(',').map(s=>s.trim()).filter(Boolean);
  if(!parts.length)throw new Error(t('invalidRange'));
  const out=[];
  for(const p of parts){
    const m=p.match(/^(\d+)(?:-(\d+))?$/);
    if(!m)throw new Error(t('invalidRange'));
    const a=+m[1], b=m[2]?+m[2]:a;
    if(a<1||b<1||b<a)throw new Error(t('invalidRange'));
    for(let i=a;i<=b;i++)out.push(i);
  }
  return out;
}

function downloadBytes(bytes,name){
  const blob=new Blob([bytes],{type:'application/pdf'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=name;a.click();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
}

async function doSplit(){
  if(!pdfDoc){alert(t('noFile'));return;}
  const total=pdfDoc.getPageCount();
  try{
    if(mode==='range'){
      const pages=parseRanges($('#ranges').value);
      for(const p of pages){
        if(p<1||p>total)throw new Error(t('pageOutOfRange').replace('{n}',p).replace('{max}',total));
      }
      const out=await PDFLib.PDFDocument.create();
      const copied=await out.copyPages(pdfDoc,pages.map(p=>p-1));
      copied.forEach(p=>out.addPage(p));
      const bytes=await out.save();
      const base=pdfFile.name.replace(/\.pdf$/i,'');
      downloadBytes(bytes,`${base}_extracted.pdf`);
      $('#results').innerHTML=`<div class="row"><span class="pages">✓ ${t('extracted')} ${pages.length} ${t('pages')}</span></div>`;
    }else if(mode==='each'){
      const base=pdfFile.name.replace(/\.pdf$/i,'');
      $('#results').innerHTML='';
      for(let i=0;i<total;i++){
        const out=await PDFLib.PDFDocument.create();
        const [pg]=await out.copyPages(pdfDoc,[i]);
        out.addPage(pg);
        const bytes=await out.save();
        const num=String(i+1).padStart(String(total).length,'0');
        const name=`${base}_page_${num}.pdf`;
        const blobUrl=URL.createObjectURL(new Blob([bytes],{type:'application/pdf'}));
        const row=document.createElement('div');
        row.className='row';
        row.innerHTML=`<span class="pages">📄 ${name}</span>`;
        const btn=document.createElement('button');
        btn.className='gz-btn';btn.textContent=t('download');
        btn.onclick=()=>downloadBytes(bytes,name);
        row.appendChild(btn);
        $('#results').appendChild(row);
      }
      // also auto-download first
      GZ.showToast(`✓ ${t('splitEach')} ${total} ${t('singlePages')}`);
    }else if(mode==='parts'){
      const n=Math.max(2,parseInt($('#partsCount').value)||2);
      const per=Math.ceil(total/n);
      const base=pdfFile.name.replace(/\.pdf$/i,'');
      $('#results').innerHTML='';
      for(let part=0;part<n;part++){
        const start=part*per, end=Math.min(start+per,total);
        if(start>=end)break;
        const out=await PDFLib.PDFDocument.create();
        const idxs=[];
        for(let i=start;i<end;i++)idxs.push(i);
        const copied=await out.copyPages(pdfDoc,idxs);
        copied.forEach(p=>out.addPage(p));
        const bytes=await out.save();
        const name=`${base}_part_${part+1}.pdf`;
        const row=document.createElement('div');
        row.className='row';
        row.innerHTML=`<span class="pages">📄 ${name} (${end-start} ${t('pages')})</span>`;
        const btn=document.createElement('button');
        btn.className='gz-btn';btn.textContent=t('download');
        btn.onclick=()=>downloadBytes(bytes,name);
        row.appendChild(btn);
        $('#results').appendChild(row);
      }
      GZ.showToast(`✓ ${t('splitEach')} ${n} ${t('parts')}`);
    }
  }catch(e){alert(e.message);}
}

// Mode card labels
$('#modeRangeTitle').textContent=t('modeRangeTitle');
$('#modeRangeDesc').textContent=t('modeRangeDesc');
$('#modeEachTitle').textContent=t('modeEachTitle');
$('#modeEachDesc').textContent=t('modeEachDesc');
$('#modePartsTitle').textContent=t('modePartsTitle');
$('#modePartsDesc').textContent=t('modePartsDesc');
$('#rangesLabel').textContent=t('rangesLabel');
$('#rangesHint').textContent=t('rangesHint');
$('#partsLabel').textContent=t('partsLabel');
$('#ranges').placeholder='1-3, 5, 8-10';

$('#toolbar').innerHTML=`<button class="gz-btn" onclick="doSplit()">${t('splitBtn')}</button>`;

GZ.renderToolPage({category:'convert',titleKey:'toolTitle',descKey:'toolDesc',howToSteps:['step1','step2','step3','step4'],related:[

  {icon:'🗜️',href:'/convert/pdf-compressor.html',name:'PDF Compressor'},
  {icon:'📄',href:'/convert/image-to-pdf.html',name:'Image to PDF'},
]});
</script>
