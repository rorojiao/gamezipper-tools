<script>
GZI18n.register({
  en: {
    toolTitle: 'Crypto Currency Converter',
    toolDesc: 'Convert between Bitcoin, Ethereum, and 50+ cryptocurrencies. Live rates in USD, EUR, GBP, CHF, JPY and CNY. Includes 24h change and market cap.',
    lblAmount: 'Amount', lblFrom: 'From', lblTo: 'To', lblResult: 'Result', lblRate: 'Current Rate',
    step1: 'Pick a From coin and a To coin (crypto-to-crypto or crypto-to-fiat)',
    step2: 'Enter the amount you want to convert',
    step3: 'See the live converted value and current exchange rate',
    step4: 'Click Refresh to fetch the latest prices from CoinGecko',
  },
  zh: {
    toolTitle: '加密货币转换器',
    toolDesc: '在比特币、以太坊和 50+ 加密货币之间转换。支持 USD、EUR、GBP、CHF、JPY、CNY 实时汇率，附 24 小时涨跌和市值。',
    lblAmount: '金额', lblFrom: '从', lblTo: '到', lblResult: '结果', lblRate: '当前汇率',
    step1: '选择「从」币种和「到」币种（加密货币之间或加密货币对法币）',
    step2: '输入要转换的金额',
    step3: '查看实时转换结果和当前汇率',
    step4: '点击「刷新」从 CoinGecko 获取最新价格',
  }
});

const { $, t, copyText } = GZ;

const COINS = [
  // Major
  {id:'bitcoin', sym:'BTC', name:'Bitcoin'},
  {id:'ethereum', sym:'ETH', name:'Ethereum'},
  {id:'tether', sym:'USDT', name:'Tether'},
  {id:'binancecoin', sym:'BNB', name:'BNB'},
  {id:'solana', sym:'SOL', name:'Solana'},
  {id:'ripple', sym:'XRP', name:'XRP'},
  {id:'usd-coin', sym:'USDC', name:'USD Coin'},
  {id:'cardano', sym:'ADA', name:'Cardano'},
  {id:'dogecoin', sym:'DOGE', name:'Dogecoin'},
  {id:'tron', sym:'TRX', name:'TRON'},
  {id:'shiba-inu', sym:'SHIB', name:'Shiba Inu'},
  {id:'avalanche-2', sym:'AVAX', name:'Avalanche'},
  {id:'chainlink', sym:'LINK', name:'Chainlink'},
  {id:'polkadot', sym:'DOT', name:'Polkadot'},
  {id:'polygon', sym:'MATIC', name:'Polygon'},
  {id:'litecoin', sym:'LTC', name:'Litecoin'},
  {id:'bitcoin-cash', sym:'BCH', name:'Bitcoin Cash'},
  {id:'uniswap', sym:'UNI', name:'Uniswap'},
  {id:'stellar', sym:'XLM', name:'Stellar'},
  {id:'cosmos', sym:'ATOM', name:'Cosmos'},
  {id:'monero', sym:'XMR', name:'Monero'},
  {id:'ethereum-classic', sym:'ETC', name:'Ethereum Classic'},
  {id:'near', sym:'NEAR', name:'NEAR Protocol'},
  {id:'aptos', sym:'APT', name:'Aptos'},
  {id:'sui', sym:'SUI', name:'Sui'},
  {id:'arbitrum', sym:'ARB', name:'Arbitrum'},
  {id:'optimism', sym:'OP', name:'Optimism'},
  {id:'filecoin', sym:'FIL', name:'Filecoin'},
  {id:'hedera-hashgraph', sym:'HBAR', name:'Hedera'},
  {id:'vechain', sym:'VET', name:'VeChain'},
  {id:'algorand', sym:'ALGO', name:'Algorand'},
  {id:'fantom', sym:'FTM', name:'Fantom'},
  {id:'the-graph', sym:'GRT', name:'The Graph'},
  {id:'aave', sym:'AAVE', name:'Aave'},
  {id:'maker', sym:'MKR', name:'Maker'},
  {id:'the-sandbox', sym:'SAND', name:'The Sandbox'},
  {id:'decentraland', sym:'MANA', name:'Decentraland'},
  {id:'axie-infinity', sym:'AXS', name:'Axie Infinity'},
  {id:'tezos', sym:'XTZ', name:'Tezos'},
  {id:'eos', sym:'EOS', name:'EOS'},
  {id:'theta', sym:'THETA', name:'Theta'},
  {id:'flow', sym:'FLOW', name:'Flow'},
  {id:'chiliz', sym:'CHZ', name:'Chiliz'},
  {id:'curve-dao-token', sym:'CRV', name:'Curve DAO'},
  {id:'compound', sym:'COMP', name:'Compound'},
  {id:'dai', sym:'DAI', name:'Dai'},
  {id:'true-usd', sym:'TUSD', name:'TrueUSD'},
  {id:'wrapped-bitcoin', sym:'WBTC', name:'Wrapped Bitcoin'},
  {id:'kaspa', sym:'KAS', name:'Kaspa'},
  {id:'toncoin', sym:'TON', name:'Toncoin'},
  {id:'pepe', sym:'PEPE', name:'Pepe'},
  {id:'floki', sym:'FLOKI', name:'Floki'},
  {id:'bonk', sym:'BONK', name:'Bonk'},
  {id:'ondo', sym:'ONDO', name:'Ondo'},
  {id:'jupiter', sym:'JUP', name:'Jupiter'},
  {id:'worldcoin', sym:'WLD', name:'Worldcoin'},
  {id:'notcoin', sym:'NOT', name:'Notcoin'},
];

const FIATS = [
  {id:'usd', sym:'USD', name:'US Dollar'},
  {id:'eur', sym:'EUR', name:'Euro'},
  {id:'gbp', sym:'GBP', name:'British Pound'},
  {id:'chf', sym:'CHF', name:'Swiss Franc'},
  {id:'jpy', sym:'JPY', name:'Japanese Yen'},
  {id:'cny', sym:'CNY', name:'Chinese Yuan'},
];

let prices = {};
let meta = {};

function populateSelects() {
  const opts = (list) => list.map(c => `<option value="${c.id}">${c.sym} — ${c.name}</option>`).join('');
  $('#fromCoin').innerHTML = '<optgroup label="Crypto">' + opts(COINS) + '</optgroup><optgroup label="Fiat">' + opts(FIATS) + '</optgroup>';
  $('#toCoin').innerHTML = '<optgroup label="Fiat">' + opts(FIATS) + '</optgroup><optgroup label="Crypto">' + opts(COINS) + '</optgroup>';
  $('#fromCoin').value = 'bitcoin';
  $('#toCoin').value = 'usd';
}

async function fetchPrices() {
  $('#status').textContent = '⏳ Loading latest rates...';
  try {
    const ids = COINS.map(c => c.id).join(',');
    const vs = FIATS.map(f => f.id).join(',');
    const res = await fetch(`https://api.coingecko.com/api/v3/simple/price?ids=${ids}&vs_currencies=${vs}&include_24hr_change=true&include_market_cap=true`);
    if (!res.ok) throw new Error('Rate limited or API error');
    prices = await res.json();
    // Fetch top 15 for table
    const res2 = await fetch('https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=15&page=1&sparkline=false&price_change_percentage=24h');
    if (res2.ok) {
      const arr = await res2.json();
      meta = {};
      arr.forEach(c => { meta[c.id] = {rank:c.market_cap_rank, change:c.price_change_percentage_24h, cap:c.market_cap}; });
    }
    $('#status').textContent = '✅ Last updated: ' + new Date().toLocaleTimeString();
    compute();
    renderTable();
    renderTicker();
  } catch (e) {
    $('#status').innerHTML = '<span style="color:var(--gz-accent)">⚠️ Could not fetch live rates (' + e.message + '). The CoinGecko API may be rate-limiting your IP. Try again in a minute.</span>';
  }
}

function getRate(coinId, fiatId) {
  if (coinId === fiatId) return 1;
  if (FIATS.find(f => f.id === coinId) && FIATS.find(f => f.id === fiatId)) {
    // fiat to fiat, use usd pivot
    const a = (prices['bitcoin'] || {})[coinId];
    const b = (prices['bitcoin'] || {})[fiatId];
    if (a && b) return a / b;
    return null;
  }
  if (FIATS.find(f => f.id === fiatId) && !FIATS.find(f => f.id === coinId)) {
    // crypto to fiat
    return (prices[coinId] || {})[fiatId] || null;
  }
  if (FIATS.find(f => f.id === coinId) && !FIATS.find(f => f.id === fiatId)) {
    // fiat to crypto
    const p = (prices[fiatId === 'usd' ? 'bitcoin' : fiatId] || {})['usd'];
    const target = (prices[coinId] || {})['usd'];
    if (p && target) return 1 / (target / p);
    return null;
  }
  // crypto to crypto via usd
  const a = (prices[coinId] || {})['usd'];
  const b = (prices[fiatId || 'usd'] || {})['usd'];
  if (a && b) return a / b;
  return null;
}

function symFor(id) {
  return (COINS.find(c => c.id === id) || FIATS.find(f => f.id === id) || {}).sym || id.toUpperCase();
}

function compute() {
  const amt = parseFloat($('#amount').value) || 0;
  const from = $('#fromCoin').value;
  const to = $('#toCoin').value;
  const r = getRate(from, to);
  if (r === null) {
    $('#result').value = '—';
    $('#rateBig').textContent = 'Rate not available';
    $('#rateSub').textContent = '';
    return;
  }
  const result = amt * r;
  $('#result').value = result.toLocaleString(undefined, {maximumFractionDigits: 8}) + ' ' + symFor(to);
  $('#rateBig').textContent = `1 ${symFor(from)} = ${r.toLocaleString(undefined, {maximumFractionDigits: 8})} ${symFor(to)}`;
  const m = meta[from] || meta[to];
  if (m) $('#rateSub').textContent = `Rank #${m.rank} • Cap $${(m.cap/1e9).toFixed(2)}B • 24h: ${m.change >= 0 ? '+' : ''}${m.change.toFixed(2)}%`;
  else $('#rateSub').textContent = '';
}

function renderTable() {
  const tbody = $('#rateTable tbody');
  tbody.innerHTML = '';
  COINS.forEach(c => {
    if (!meta[c.id]) return;
    const p = (prices[c.id] || {}).usd;
    if (!p) return;
    const ch = meta[c.id].change;
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td><strong>${c.sym}</strong> ${c.name}</td>
      <td>$${p.toLocaleString(undefined, {maximumFractionDigits: p < 1 ? 6 : 2})}</td>
      <td class="${ch >= 0 ? 'cc-up' : 'cc-down'}">${ch >= 0 ? '+' : ''}${ch.toFixed(2)}%</td>
      <td>#${meta[c.id].rank}</td>`;
    tbody.appendChild(tr);
  });
}

function renderTicker() {
  const tickCoins = COINS.slice(0, 12);
  $('#ticker').innerHTML = tickCoins.map(c => {
    const p = (prices[c.id] || {}).usd;
    const ch = meta[c.id] ? meta[c.id].change : 0;
    if (!p) return '';
    return `<div class="cc-tick"><span class="sym">${c.sym}</span> $${p.toLocaleString(undefined, {maximumFractionDigits: p < 1 ? 4 : 2})} <span class="${ch >= 0 ? 'cc-up' : 'cc-down'}">${ch >= 0 ? '+' : ''}${ch.toFixed(1)}%</span></div>`;
  }).join('');
}

$('#fromCoin').addEventListener('change', compute);
$('#toCoin').addEventListener('change', compute);
$('#amount').addEventListener('input', compute);

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="fetchPrices()">🔄 Refresh Rates</button>
  <button class="gz-btn gz-btn-secondary" onclick="copyText($('#result').value)">📋 Copy Result</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#amount').value=1;$('#fromCoin').value='bitcoin';$('#toCoin').value='usd';compute()">🔄 Reset</button>`;

populateSelects();
GZ.renderToolPage({
  category: 'convert',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'💱', href:'/convert/currency-converter.html', name:'Currency Converter'},
    {icon:'💰', href:'/calc/crypto-profit-calculator.html', name:'Crypto Profit'},
    {icon:'📊', href:'/calc/profit-margin.html', name:'Profit Margin'},
    {icon:'⏰', href:'/convert/epoch-converter.html', name:'Epoch Converter'},
  ]
});
fetchPrices();
</script>
