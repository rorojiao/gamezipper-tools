// Minimal TOML parser
function parseToml(str) {
  const result = {};
  let current = result;
  let currentPath = [];
  const lines = str.split('\n');

  function setNested(obj, path, value) {
    let target = obj;
    for (let i = 0; i < path.length - 1; i++) {
      if (!(path[i] in target)) target[path[i]] = {};
      target = target[path[i]];
    }
    target[path[path.length - 1]] = value;
  }

  function getOrCreate(obj, path) {
    let target = obj;
    for (const key of path) {
      if (!(key in target)) target[key] = {};
      target = target[key];
    }
    return target;
  }

  for (const line of lines) {
    const trimmed = line.trim();
    if (!trimmed || trimmed.startsWith('#')) continue;

    // Table header [xxx.yyy]
    const tableMatch = trimmed.match(/^\[([^\]]+)\]$/);
    if (tableMatch) {
      currentPath = tableMatch[1].split('.').map(k => k.trim());
      current = getOrCreate(result, currentPath);
      continue;
    }

    // Array of tables [[xxx]]
    const arrTableMatch = trimmed.match(/^\[\[([^\]]+)\]\]$/);
    if (arrTableMatch) {
      const path = arrTableMatch[1].split('.').map(k => k.trim());
      let target = result;
      for (let i = 0; i < path.length - 1; i++) {
        if (!(path[i] in target)) target[path[i]] = {};
        target = target[path[i]];
      }
      const lastKey = path[path.length - 1];
      if (!Array.isArray(target[lastKey])) target[lastKey] = [];
      const newObj = {};
      target[lastKey].push(newObj);
      current = newObj;
      currentPath = path;
      continue;
    }

    // Key = value
    const kvMatch = trimmed.match(/^([a-zA-Z0-9_-]+(?:\.[a-zA-Z0-9_-]+)*)\s*=\s*(.+)$/);
    if (kvMatch) {
      const keyPath = kvMatch[1].split('.');
      const rawVal = kvMatch[2].trim();
      let value;

      // Parse value
      if (rawVal === 'true') value = true;
      else if (rawVal === 'false') value = false;
      else if (/^-?\d+$/.test(rawVal)) value = parseInt(rawVal, 10);
      else if (/^-?\d+\.\d+(?:[eE][+-]?\d+)?$/.test(rawVal)) value = parseFloat(rawVal);
      else if (/^".*"$/.test(rawVal)) value = rawVal.slice(1, -1).replace(/\\"/g, '"');
      else if (/^'.*'$/.test(rawVal)) value = rawVal.slice(1, -1); // literal string
      else if (/^\[/.test(rawVal)) {
        // Array
        try {
          const arrStr = rawVal.replace(/(\w+)\s*=/g, '"$1":')
            .replace(/'/g, '"');
          value = JSON.parse(arrStr);
        } catch(e) {
          // Manual array parse
          const inner = rawVal.slice(1, -1).trim();
          if (!inner) { value = []; }
          else {
            value = inner.split(',').map(v => {
              v = v.trim();
              if (v === 'true') return true;
              if (v === 'false') return false;
              if (/^-?\d+$/.test(v)) return parseInt(v);
              if (/^-?\d+\.\d+/.test(v)) return parseFloat(v);
              if (/^".*"$/.test(v)) return v.slice(1,-1);
              if (/^'.*'$/.test(v)) return v.slice(1,-1);
              return v;
            });
          }
        }
      }
      else if (/^\{/.test(rawVal)) {
        // Inline table
        try { value = JSON.parse(rawVal.replace(/(\w+)\s*=/g, '"$1":').replace(/'/g, '"')); }
        catch(e) { value = rawVal; }
      }
      else { value = rawVal; }

      if (keyPath.length === 1) {
        current[keyPath[0]] = value;
      } else {
        setNested(current, keyPath, value);
      }
    }
  }
  return result;
}

function syntaxHighlight(json) {
  return json.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/("(\\u[\da-fA-F]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(\.\d+)?([eE][+-]?\d+)?)/g, m => {
      let c = 'toml-num';
      if (/^"/.test(m)) c = /:$/.test(m) ? 'toml-key' : 'toml-str';
      else if (/true|false/.test(m)) c = 'toml-bool';
      return `<span class="${c}">${m}</span>`;
    });
}

function doConvert() {
  const inp = $('#input').value.trim();
  if (!inp) return;
  try {
    const obj = parseToml(inp);
    const json = JSON.stringify(obj, null, 2);
    $('#output').innerHTML = syntaxHighlight(json);
    $('#status').innerHTML = `<span style="color:var(--gz-success)">${t('valid')}</span>`;
  } catch(e) {
    $('#status').innerHTML = `<span style="color:var(--gz-accent)">${t('invalid')}: ${e.message}</span>`;
    $('#output').innerHTML = `<span style="color:var(--gz-accent)">${e.message}</span>`;
  }
}

function doClear() { $('#input').value = ''; $('#output').innerHTML = ''; $('#status').innerHTML = ''; }

}
