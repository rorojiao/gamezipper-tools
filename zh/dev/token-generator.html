<script>
GZI18n.register({
  en:{toolTitle:'Token Generator',toolDesc:'Generate secure random tokens, API keys, bearer tokens, UUIDs and secrets using browser Web Crypto. Private, instant and configurable.',type:'Token Type',hex:'Hex',base64url:'Base64URL',uuid:'UUID v4',api:'API key',numeric:'Numeric PIN',alpha:'Alphabetic',length:'Length',count:'Count',prefix:'Prefix',separator:'Separator',generate:'Generate Tokens',copyAll:'Copy All',clear:'Clear',copy:'Copy',entropy:'Approx. entropy',format:'Format',items:'Tokens',note:'Tip: store secrets safely. This page does not save or transmit generated tokens.',step1:'Choose a token type such as Base64URL, hex, UUID or API key',step2:'Set the length, count and optional prefix/separator',step3:'Click Generate Tokens to create cryptographically random values',step4:'Copy individual tokens or copy the entire batch'},
  zh:{toolTitle:'Token 令牌生成器',toolDesc:'使用浏览器 Web Crypto 生成安全随机令牌、API Key、Bearer Token、UUID 和密钥。私密、即时、可配置。',type:'令牌类型',hex:'十六进制',base64url:'Base64URL',uuid:'UUID v4',api:'API Key',numeric:'数字 PIN',alpha:'字母',length:'长度',count:'数量',prefix:'前缀',separator:'分隔符',generate:'生成令牌',copyAll:'复制全部',clear:'清空',copy:'复制',entropy:'约熵值',format:'格式',items:'令牌数',note:'提示：请安全保存密钥。本页面不会保存或传输生成的令牌。',step1:'选择令牌类型，如 Base64URL、十六进制、UUID 或 API Key',step2:'设置长度、数量以及可选的前缀/分隔符',step3:'点击“生成令牌”创建密码学安全随机值',step4:'复制单个令牌或复制整批结果'}
});
const {$,copyText,t}=GZ;let last=[];
$('#form').innerHTML=`<div><label>${t('type')}</label><select id="kind"><option value="base64url">${t('base64url')}</option><option value="hex">${t('hex')}</option><option value="uuid">${t('uuid')}</option><option value="api">${t('api')}</option><option value="numeric">${t('numeric')}</option><option value="alpha">${t('alpha')}</option></select></div><div><label>${t('length')}</label><input id="len" type="number" min="4" max="256" value="32"></div><div><label>${t('count')}</label><input id="count" type="number" min="1" max="100" value="10"></div><div><label>${t('prefix')}</label><input id="prefix" value="gz_live"></div><div><label>${t('separator')}</label><input id="sep" value="_"></div>`;
function bytes(n){const a=new Uint8Array(n);crypto.getRandomValues(a);return a;}
function hex(n){return [...bytes(Math.ceil(n/2))].map(b=>b.toString(16).padStart(2,'0')).join('').slice(0,n);}
function b64url(n){let s='';for(const b of bytes(Math.ceil(n*3/4)+2))s+=String.fromCharCode(b);return btoa(s).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'').slice(0,n);}
function pick(chars,n){const a=bytes(n);let out='';for(const b of a)out+=chars[b%chars.length];return out;}
function uuid(){if(crypto.randomUUID)return crypto.randomUUID();const a=bytes(16);a[6]=(a[6]&15)|64;a[8]=(a[8]&63)|128;const h=[...a].map(b=>b.toString(16).padStart(2,'0')).join('');return `${h.slice(0,8)}-${h.slice(8,12)}-${h.slice(12,16)}-${h.slice(16,20)}-${h.slice(20)}`;}
function make(){const kind=$('#kind').value,len=Math.max(4,Math.min(256,+$('#len').value||32)),pre=$('#prefix').value.trim(),sep=$('#sep').value;switch(kind){case'hex':return hex(len);case'uuid':return uuid();case'api':return [pre||'key',b64url(len)].join(sep||'_');case'numeric':return pick('0123456789',len);case'alpha':return pick('abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ',len);default:return b64url(len);}}
function generate(){const count=Math.max(1,Math.min(100,+$('#count').value||10));last=Array.from({length:count},make);render();}
function entropy(){const kind=$('#kind').value,len=+$('#len').value||32;const bits={hex:4,base64url:6,numeric:3.32,alpha:5.7,api:6,uuid:122}[kind]||6;return Math.round((kind==='uuid'?1:len)*bits);}
function escapeHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function render(){const kind=$('#kind').value;$('#stats').innerHTML=`<div class="tok-stat"><strong>${entropy()} bit</strong>${t('entropy')}</div><div class="tok-stat"><strong>${escapeHtml(kind)}</strong>${t('format')}</div><div class="tok-stat"><strong>${last.length}</strong>${t('items')}</div>`;$('#results').innerHTML=last.map((v,i)=>`<div class="tok-card"><span class="tok-value">${escapeHtml(v)}</span><button class="gz-btn gz-btn-secondary" onclick="copyText(last[${i}])">${t('copy')}</button></div>`).join('');$('#note').textContent=t('note');}
function clearAll(){last=[];render();}
$('#toolbar').innerHTML=`<button class="gz-btn" onclick="generate()">${t('generate')}</button><button class="gz-btn" onclick="copyText(last.join('\\n'))">${t('copyAll')}</button><button class="gz-btn gz-btn-secondary" onclick="clearAll()">${t('clear')}</button>`;
['kind','len','count','prefix','sep'].forEach(id=>$('#'+id).addEventListener('input',()=>{if(last.length)generate();else render();}));
GZ.renderToolPage({category:'dev',titleKey:'toolTitle',descKey:'toolDesc',howToSteps:['step1','step2','step3','step4'],related:[{icon:'🔑',href:'/dev/password-generator.html',name:'Password Generator'},{icon:'🔐',href:'/dev/password-strength-checker.html',name:'Password Strength Checker'},{icon:'🆔',href:'/dev/uuid.html',name:'UUID Generator'},{icon:'🎫',href:'/dev/jwt.html',name:'JWT Decoder'}]});
generate();
</script>
