<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"What is an MX record?","acceptedAnswer":{"@type":"Answer","text":"An MX (Mail Exchange) record tells email servers where to deliver mail for a domain. Each MX record has a priority (lower number = higher priority) and a mail server hostname."}},{"@type":"Question","name":"Why would I check MX records?","acceptedAnswer":{"@type":"Answer","text":"You check MX records to verify email is routing correctly, troubleshoot email delivery failures, confirm a domain can receive email, or verify a migration to Google Workspace, Microsoft 365 or another provider."}},{"@type":"Question","name":"What does MX priority mean?","acceptedAnswer":{"@type":"Answer","text":"MX priority is a number where lower means higher priority. Email is first delivered to the server with the lowest priority number. If that server is unavailable, the next priority server is tried. For example, priority 5 is tried before priority 10."}}]}</script>

<div class="gz-container">

<script>
GZI18n.register({
  en: {
    toolTitle: 'MX Record Lookup',
    toolDesc: 'Find mail server (MX) records for any domain with priority. Check email routing, verify mail server configuration and troubleshoot delivery.',
    btnLookup: 'Lookup',
    loading: 'Looking up MX records...',
    noRecords: 'No MX records found for this domain. The domain may not be configured to receive email.',
    fetchError: 'Failed to fetch MX records. Please check the domain and try again.',
    enterDomain: 'Please enter a domain name.',
    priority: 'Priority',
    mailServer: 'Mail Server',
    ttl: 'TTL',
    recordsFound: 'MX records',
    primary: 'Primary',
    backup: 'Backup',
    examples: 'Try',
    step1: 'Enter a domain name (e.g. gmail.com)',
    step2: 'Click Lookup to query the MX records',
    step3: 'Review the priority and mail server hostname for each record',
    step4: 'The lowest priority number is the primary mail server',
  },
  zh: {
    toolTitle: 'MX 记录查询',
    toolDesc: '查询任意域名的邮件服务器（MX）记录及优先级。检查邮件路由、验证邮件服务器配置并排查投递问题。',
    btnLookup: '查询',
    loading: '正在查询 MX 记录...',
    noRecords: '未找到该域名的 MX 记录。该域名可能未配置接收邮件。',
    fetchError: '获取 MX 记录失败，请检查域名后重试。',
    enterDomain: '请输入域名。',
    priority: '优先级',
    mailServer: '邮件服务器',
    ttl: 'TTL',
    recordsFound: '条 MX 记录',
    primary: '主服务器',
    backup: '备用',
    examples: '试试',
    step1: '输入域名（如 gmail.com）',
    step2: '点击「查询」获取 MX 记录',
    step3: '查看每条记录的优先级和邮件服务器主机名',
    step4: '优先级数字最小的是主邮件服务器',
  }
});

const { $, copyText, t } = GZ;

async function doLookup() {
  let domain = $('#domain').value.trim();
  const output = $('#output');
  if (!domain) { output.innerHTML = `<div class="mx-error">${t('enterDomain')}</div>`; return; }
  domain = domain.replace(/^https?:\/\//, '').replace(/\/.*$/, '').replace(/^www\./, '');
  output.innerHTML = `<div class="mx-loading">${t('loading')}</div>`;

  try {
    const res = await fetch(`https://cloudflare-dns.com/dns-query?name=${encodeURIComponent(domain)}&type=MX`, {
      headers: { 'Accept': 'application/dns-json' }
    });
    const data = await res.json();
    const answers = (data.Answer || []).filter(a => a.type === 15);
    if (answers.length === 0) {
      output.innerHTML = `<div class="mx-error">${t('noRecords')}</div>`;
      return;
    }
    // Sort by priority
    answers.sort((a, b) => {
      const pa = parseInt(a.data.match(/^(\d+)\s/)?.[1] || '999');
      const pb = parseInt(b.data.match(/^(\d+)\s/)?.[1] || '999');
      return pa - pb;
    });

    let html = `<div class="mx-stats"><div class="mx-stat"><div class="num">${answers.length}</div><div class="lbl">${t('recordsFound')}</div></div></div>`;
    html += '<table class="mx-table"><thead><tr><th>' + t('priority') + '</th><th>' + t('mailServer') + '</th><th>' + t('ttl') + '</th></tr></thead><tbody>';
    answers.forEach((r, idx) => {
      const parts = r.data.match(/^(\d+)\s+(.+)$/);
      const prio = parts ? parts[1] : '?';
      const host = parts ? parts[2] : r.data;
      const badge = idx === 0 ? ` <span class="mx-badge">${t('primary')}</span>` : '';
      html += `<tr><td><span class="mx-priority">${prio}</span>${badge}</td><td>${host}</td><td>${r.TTL}s</td></tr>`;
    });
    html += '</tbody></table>';
    output.innerHTML = html;
  } catch (e) {
    output.innerHTML = `<div class="mx-error">${t('fetchError')}<br><small>${e.message}</small></div>`;
  }
}

$('#domain').addEventListener('keydown', e => { if (e.key === 'Enter') doLookup(); });

$('#examples').innerHTML = `<span style="color:var(--text2);font-size:.8rem;align-self:center">${t('examples')}:</span>` +
  ['gmail.com', 'outlook.com', 'github.com', 'apple.com'].map(d =>
    `<button onclick="document.getElementById('domain').value='${d}';doLookup()">${d}</button>`
  ).join('');

GZ.renderToolPage({

    {icon:'📧', href:'/dev/email-header.html', name:'Email Header Analyzer'},
  ]
});
</script>
