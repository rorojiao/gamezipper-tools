<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is profit margin?", "acceptedAnswer": {"@type": "Answer", "text": "Profit margin is the percentage of revenue that remains as profit after all costs are deducted. It is calculated as (Profit / Revenue) × 100. A 20% margin means 20 cents of every dollar earned is profit."}}, {"@type": "Question", "name": "What is a good profit margin?", "acceptedAnswer": {"@type": "Answer", "text": "It varies by industry. Software/SaaS often targets 20-40%, retail 2-10%, restaurants 3-9%, consulting 15-30%. Generally, 10% is average, 20% is good, and 20%+ is excellent for most businesses."}}, {"@type": "Question", "name": "What is the difference between gross margin and net margin?", "acceptedAnswer": {"@type": "Answer", "text": "Gross margin only deducts the cost of goods sold (COGS) from revenue. Net margin deducts all expenses including COGS, operating costs, taxes, and interest. Net margin is always lower than gross margin."}}, {"@type": "Question", "name": "How do I calculate markup from margin?", "acceptedAnswer": {"@type": "Answer", "text": "Markup % = Margin / (1 - Margin). For example, a 30% margin converts to 30/0.70 = 42.9% markup. A 50% margin = 100% markup. Markup is always higher than margin for the same profit."}}]}</script>

  </div>

</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Profit Margin Calculator',
    toolDesc: 'Calculate profit margin, net profit, markup and ROI from revenue and cost. Compare with industry benchmarks. Free, private, browser-based.',
    revenue: 'Revenue / Selling Price ($)',
    cost: 'Cost / COGS ($)',
    additionalCosts: 'Other Expenses ($)',
    profit: 'Net Profit',
    grossProfit: 'Gross Profit',
    marginPct: 'Profit Margin',
    grossMarginPct: 'Gross Margin',
    markupPct: 'Markup',
    roi: 'ROI (Return)',
    calculate: 'Calculate',
    clear: 'Clear',
    formulaTitle: 'Formulas',
    f1: 'Profit = Revenue − Cost − Other Expenses',
    f2: 'Margin % = (Profit / Revenue) × 100',
    f3: 'Markup % = (Profit / Cost) × 100',
    f4: 'Gross Margin % = ((Revenue − COGS) / Revenue) × 100',
    benchmarkTitle: 'Average Industry Profit Margins',
    step1: 'Enter your total revenue or selling price',
    step2: 'Enter your cost of goods sold (COGS)',
    step3: 'Optionally add other operating expenses',
    step4: 'Compare your margin with industry benchmarks',
  },
  zh: {
    toolTitle: '利润率计算器',
    toolDesc: '从营收和成本计算利润率、净利润、加价率和 ROI。对比行业基准。免费、私密、浏览器本地运行。',
    revenue: '营收 / 售价 ($)',
    cost: '成本 / 销货成本 ($)',
    additionalCosts: '其他费用 ($)',
    profit: '净利润',
    grossProfit: '毛利',
    marginPct: '利润率',
    grossMarginPct: '毛利率',
    markupPct: '加价率',
    roi: '投资回报率',
    calculate: '计算',
    clear: '清除',
    formulaTitle: '公式',
    f1: '利润 = 营收 − 成本 − 其他费用',
    f2: '利润率 % = (利润 / 营收) × 100',
    f3: '加价率 % = (利润 / 成本) × 100',
    f4: '毛利率 % = ((营收 − 销货成本) / 营收) × 100',
    benchmarkTitle: '各行业平均利润率参考',
    step1: '输入总营收或售价',
    step2: '输入销货成本（COGS）',
    step3: '可选填其他运营费用',
    step4: '将你的利润率与行业基准对比',
  }
});

const { $, t } = GZ;

const BENCHMARKS = [
  {industry:'Software / SaaS', margin:'25-40%'},
  {industry:'Consulting', margin:'15-30%'},
  {industry:'Retail', margin:'2-10%'},
  {industry:'Restaurants', margin:'3-9%'},
  {industry:'E-commerce', margin:'5-15%'},
  {industry:'Manufacturing', margin:'8-15%'},
  {industry:'Real Estate', margin:'15-25%'},
  {industry:'Construction', margin:'5-10%'},
  {industry:'Automotive', margin:'3-8%'},
  {industry:'Healthcare', margin:'10-20%'},
];

function fmt(n) {
  if (!isFinite(n)) return '$0.00';
  return '$' + Math.abs(n).toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2});
}
function pct(n) {
  if (!isFinite(n)) return '0%';
  return n.toFixed(1) + '%';
}

function calculate() {
  const revenue = parseFloat($('#revenue').value) || 0;
  const cogs = parseFloat($('#cost').value) || 0;
  const other = parseFloat($('#expenses').value) || 0;
  const grossProfit = revenue - cogs;
  const netProfit = grossProfit - other;
  const margin = revenue > 0 ? (netProfit / revenue) * 100 : 0;
  const grossMargin = revenue > 0 ? (grossProfit / revenue) * 100 : 0;
  const markup = cogs > 0 ? (netProfit / cogs) * 100 : 0;
  const roi = cogs > 0 ? (netProfit / (cogs + other)) * 100 : 0;

  $('#result-grid').innerHTML = `
    <div class="result-card highlight"><div class="label">${t('marginPct')}</div><div class="value">${pct(margin)}</div></div>
    <div class="result-card"><div class="label">${t('profit')}</div><div class="value">${fmt(netProfit)}</div></div>
    <div class="result-card"><div class="label">${t('grossMarginPct')}</div><div class="value">${pct(grossMargin)}</div></div>
    <div class="result-card"><div class="label">${t('grossProfit')}</div><div class="value">${fmt(grossProfit)}</div></div>
    <div class="result-card"><div class="label">${t('markupPct')}</div><div class="value">${pct(markup)}</div></div>
    <div class="result-card"><div class="label">${t('roi')}</div><div class="value">${pct(roi)}</div></div>`;

  $('#formula-box').innerHTML = `<strong>${t('formulaTitle')}:</strong><br><code>${t('f1')}</code><br><code>${t('f2')}</code><br><code>${t('f3')}</code><br><code>${t('f4')}</code>`;
}

function renderBenchmark() {
  const rows = BENCHMARKS.map(b => `<tr><td>${b.industry}</td><td><strong>${b.margin}</strong></td></tr>`).join('');
  $('#benchmark-box').innerHTML = `<h3>${t('benchmarkTitle')}</h3><table><thead><tr><th>${t('benchmarkTitle').includes('行业') ? '行业' : 'Industry'}</th><th>${t('marginPct')}</th></tr></thead><tbody>${rows}</tbody></table>`;
}

$('#input-grid').innerHTML = `
  <div class="field">
    <label>${t('revenue')}</label>
    <input type="number" id="revenue" placeholder="0.00" step="0.01" value="10000">
  </div>
  <div class="field">
    <label>${t('cost')}</label>
    <input type="number" id="cost" placeholder="0.00" step="0.01" value="6000">
  </div>
  <div class="field" style="grid-column:1/-1">
    <label>${t('additionalCosts')}</label>
    <input type="number" id="expenses" placeholder="0.00" step="0.01" value="0">
  </div>`;

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="calculate()">${t('calculate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#revenue').value='';$('#cost').value='';$('#expenses').value='';calculate()">${t('clear')}</button>`;

document.addEventListener('input', e => {
  if (['revenue','cost','expenses'].includes(e.target.id)) calculate();
});

renderBenchmark();
calculate();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📈', href:'/calc/markup-calculator.html', name:'Markup'},
    {icon:'🏷️', href:'/calc/sales-tax-calculator.html', name:'Sales Tax'},
    {icon:'💰', href:'/calc/discount-calculator.html', name:'Discount'},
    {icon:'📊', href:'/calc/break-even-calculator.html', name:'Break Even'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
