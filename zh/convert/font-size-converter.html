<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "How many pixels are in a point (pt)?", "acceptedAnswer": {"@type": "Answer", "text": "At the standard CSS ratio of 96 pixels per inch, 1 point equals 4/3 pixels (about 1.333 px). So 12 pt = 16 px. To convert pt to px, multiply by 96/72."}}, {"@type": "Question", "name": "What is the difference between em and rem?", "acceptedAnswer": {"@type": "Answer", "text": "em is relative to the font size of the parent element, so it compounds when nested. rem (root em) is always relative to the root (html) font size, which keeps scaling predictable. Both use the same numeric value relative to their reference size."}}, {"@type": "Question", "name": "What is the default browser base font size?", "acceptedAnswer": {"@type": "Answer", "text": "Most browsers default to a 16px root font size, which equals 1em, 1rem and 100%. Setting a value of 1.5rem at 16px base produces 24px."}}, {"@type": "Question", "name": "How do I convert percent to pixels?", "acceptedAnswer": {"@type": "Answer", "text": "Percent in font-size is relative to the parent font size. Multiply the percent by the base font size and divide by 100. At a 16px base, 150% = 16 × 1.5 = 24px."}}]}</script>

<div class="gz-container">
  <div class="gz-tool-header">

  </div>

</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Font Size Converter',
    toolDesc: 'Convert between pixels (px), points (pt), em, rem and percent for CSS and print. Set a custom base (root) font size — free and private.',
    swap: 'Swap',
    clear: 'Clear',
    copy: 'Copy',
    baseLabel: 'Base / root font size',
    allUnits: 'All units for this value',
    preview: 'Preview',
    step1: 'Set your base (root) font size in px (default 16)',
    step2: 'Enter a font size value',
    step3: 'Pick the source unit (From) and target unit (To)',
    step4: 'See the conversion plus a live preview of every unit',
  },
  zh: {
    toolTitle: '字号单位转换器',
    toolDesc: '在像素 (px)、磅 (pt)、em、rem 和百分比之间转换，适用于 CSS 和印刷设计。可自定义基准（根）字号 — 免费且私密。',
    swap: '交换',
    clear: '清除',
    copy: '复制',
    baseLabel: '基准 / 根字号',
    allUnits: '该值对应的所有单位',
    preview: '预览',
    step1: '设置基准（根）字号（默认 16px）',
    step2: '输入一个字号值',
    step3: '选择源单位（从）和目标单位（到）',
    step4: '查看换算结果及所有单位的实时预览',
  }
});

const { $, copyText, t } = GZ;

/*
  Base unit: pixels.
  At CSS standard 96 px = 1 inch = 72 pt, so 1 pt = 96/72 px = 1.333... px.
  em / rem / % are relative to the base (root) font size in px.
*/
const PT_TO_PX = 96 / 72;
const UNITS = [
  { id: 'px', label: 'Pixels (px)',     zh: '像素 (px)' },
  { id: 'pt', label: 'Points (pt)',     zh: '磅 (pt)' },
  { id: 'em', label: 'em',              zh: 'em' },
  { id: 'rem',label: 'rem',             zh: 'rem' },
  { id: 'pc', label: 'Picas (pc)',      zh: '派卡 (pc)' },
  { id: 'pct',label: 'Percent (%)',     zh: '百分比 (%)' },
];

function toPx(val, id, base) {
  switch (id) {
    case 'px':  return val;
    case 'pt':  return val * PT_TO_PX;
    case 'em':
    case 'rem': return val * base;
    case 'pc':  return val * PT_TO_PX * 12;   // 1 pica = 12 pt
    case 'pct': return val / 100 * base;
  }
  return NaN;
}
function fromPx(px, id, base) {
  switch (id) {
    case 'px':  return px;
    case 'pt':  return px / PT_TO_PX;
    case 'em':
    case 'rem': return px / base;
    case 'pc':  return px / (PT_TO_PX * 12);
    case 'pct': return px / base * 100;
  }
  return NaN;
}

const lang = GZI18n.getLang();
const opts = UNITS.map(u => `<option value="${u.id}">${lang === 'zh' ? u.zh : u.label}</option>`).join('');

$('#converter').innerHTML = `
  <div class="gz-base-row">
    <span>${t('baseLabel')}:</span>
    <input type="number" id="baseSize" value="16" min="1" step="any" oninput="convert()">
    <span>px</span>
  </div>
  <div class="gz-converter-row">
    <input type="number" id="inputVal" placeholder="16" step="any" oninput="convert()">
    <select id="fromUnit" onchange="convert()">${opts}</select>
  </div>
  <div class="gz-converter-row" style="justify-content:center">
    <button class="gz-btn gz-btn-secondary" onclick="swapUnits()">⇅ ${t('swap')}</button>
  </div>
  <div class="gz-converter-row">
    <input type="text" id="outputVal" readonly>
    <select id="toUnit" onchange="convert()">${opts}</select>
  </div>
  <div class="fs-table" id="allUnits"><h3 style="margin:2px 0 6px;font-size:1em">${t('allUnits')}</h3></div>
  <div class="fs-preview" id="previewWrap"><div id="preview" style="font-size:16px">Aa — The quick brown fox 123</div></div>
`;

$('#fromUnit').value = 'px';
$('#toUnit').value = 'rem';

function fmt(n) {
  if (!isFinite(n)) return '';
  // 4 decimals then trim
  return parseFloat(n.toFixed(6)).toString();
}

function convert() {
  const base = parseFloat($('#baseSize').value);
  const baseOk = isFinite(base) && base > 0 ? base : 16;
  const val = parseFloat($('#inputVal').value);
  if (isNaN(val)) {
    $('#outputVal').value = '';
    $('#allUnits').innerHTML = `<h3 style="margin:2px 0 6px;font-size:1em">${t('allUnits')}</h3>`;
    $('#preview').style.fontSize = baseOk + 'px';
    return;
  }
  const fromId = $('#fromUnit').value;
  const toId = $('#toUnit').value;
  const px = toPx(val, fromId, baseOk);
  const result = fromPx(px, toId, baseOk);
  $('#outputVal').value = fmt(result);

  // Build all-units table
  let rows = `<h3 style="margin:2px 0 6px;font-size:1em">${t('allUnits')} (${fmt(val)} ${fromId})</h3>`;
  rows += '<table><thead><tr><th>Unit</th><th>Value</th></tr></thead><tbody>';
  UNITS.forEach(u => {
    rows += `<tr><td>${u.label}</td><td>${fmt(fromPx(px, u.id, baseOk))} ${u.id}</td></tr>`;
  });
  rows += '</tbody></table>';
  $('#allUnits').innerHTML = rows;

  // Live preview at the computed px size
  $('#preview').style.fontSize = Math.max(0, px) + 'px';
}

function swapUnits() {
  const f = $('#fromUnit').value;
  $('#fromUnit').value = $('#toUnit').value;
  $('#toUnit').value = f;
  convert();
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="copyText($('#outputVal').value)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#inputVal').value='';convert()">${t('clear')}</button>
`;

convert();

GZ.renderToolPage({
  category: 'convert',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🎨', href:'/css-tools/line-height.html', name:'Line Height'},
    {icon:'🔤', href:'/convert/font-converter.html', name:'Font Converter'},
    {icon:'📐', href:'/css-tools/aspect-ratio.html', name:'Aspect Ratio'},
    {icon:'📏', href:'/convert/length-converter.html', name:'Length'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
