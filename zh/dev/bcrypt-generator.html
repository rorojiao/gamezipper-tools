<script>
GZI18n.register({
  en: {
    toolTitle: 'Bcrypt Password Hash Generator',
    toolDesc: 'Generate and verify bcrypt password hashes with adjustable cost factor. All processing happens locally in your browser.',
    generate: '🔒 Generate Hash',
    verify: '✓ Verify Password',
    passwordLabel: 'Password',
    costLabel: 'Cost Factor',
    hashOutput: 'Generated Hash',
    genSection: 'Generate Hash',
    verifySection: 'Verify Hash',
    verifyPassLabel: 'Password to Verify',
    verifyHashLabel: 'Bcrypt Hash',
    match: '✓ Password matches!',
    noMatch: '✗ Password does NOT match',
    copied: '✓ Copied!',
    copy: '📋 Copy Hash',
    timeTaken: 'Hash generated in {ms}ms',
    step1: 'Enter a password and adjust the cost factor (4-15)',
    step2: 'Click Generate Hash to create a bcrypt hash',
    step3: 'Use the Verify section to check a password against a hash',
    step4: 'Copy the hash for use in your application',
  },
  zh: {
    toolTitle: 'Bcrypt 密码哈希生成器',
    toolDesc: '生成和验证 bcrypt 密码哈希，可调节 cost 因子。所有处理在浏览器本地完成。',
    generate: '🔒 生成哈希',
    verify: '✓ 验证密码',
    passwordLabel: '密码',
    costLabel: 'Cost 因子',
    hashOutput: '生成的哈希',
    genSection: '生成哈希',
    verifySection: '验证哈希',
    verifyPassLabel: '待验证密码',
    verifyHashLabel: 'Bcrypt 哈希',
    match: '✓ 密码匹配！',
    noMatch: '✗ 密码不匹配',
    copied: '✓ 已复制！',
    copy: '📋 复制哈希',
    timeTaken: '哈希生成耗时 {ms}ms',
    step1: '输入密码并调整 cost 因子（4-15）',
    step2: '点击「生成哈希」创建 bcrypt 哈希',
    step3: '使用验证区域检查密码与哈希是否匹配',
    step4: '复制哈希值用于你的应用程序',
  }
});

const { $, copyText, t } = GZ;

$('#gen-title').textContent=t('genSection');
$('#verify-title').textContent=t('verifySection');
$('#lbl-password').textContent=t('passwordLabel');
$('#lbl-cost').textContent=t('costLabel');
$('#lbl-hash-out').textContent=t('hashOutput');
$('#lbl-verify-pass').textContent=t('verifyPassLabel');
$('#lbl-verify-hash').textContent=t('verifyHashLabel');
$('#btn-hash').textContent=t('generate');
$('#btn-verify').textContent=t('verify');

$('#cost').addEventListener('input', function(){ $('#cost-val').textContent=this.value; });

$('#btn-hash').addEventListener('click', function(){
  const pass=$('#password').value;
  if(!pass) return;
  const cost=parseInt($('#cost').value);
  const salt=bcryptjs.genSaltSync(cost);
  const start=performance.now();
  const hash=bcryptjs.hashSync(pass, salt);
  const elapsed=Math.round(performance.now()-start);
  $('#hash-output').textContent=hash;
  $('#hash-time').textContent=t('timeTaken').replace('{ms}',elapsed);
});

$('#btn-verify').addEventListener('click', function(){
  const pass=$('#verify-password').value;
  const hash=$('#verify-hash').value.trim();
  if(!pass||!hash){ $('#verify-result').innerHTML=''; return; }
  try{
    const match=bcryptjs.compareSync(pass, hash);
    $('#verify-result').innerHTML=`<div id="verify-result" class="${match?'match':'no-match'}">${match?t('match'):t('noMatch')}</div>`;
  }catch(e){
    $('#verify-result').innerHTML=`<div class="no-match">✗ Invalid hash format</div>`;
  }
});

$('#toolbar').innerHTML=`
  <button class="gz-btn gz-btn-secondary" onclick="copyText(document.getElementById('hash-output').textContent)">${t('copy')}</button>`;

GZ.renderToolPage({
  category:'dev',
  titleKey:'toolTitle',
  descKey:'toolDesc',
  howToSteps:['step1','step2','step3','step4'],
  related:[
    {icon:'🔑',href:'/dev/hash.html',name:'Hash Generator'},
    {icon:'🔐',href:'/dev/password-generator.html',name:'Password Generator'},
    {icon:'🛡️',href:'/dev/password-strength-checker.html',name:'Password Strength'},
    {icon:'🔏',href:'/dev/hmac.html',name:'HMAC Generator'},
  ]
});
</script>
