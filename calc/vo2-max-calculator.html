<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"What is VO2 max?","acceptedAnswer":{"@type":"Answer","text":"VO2 max is the maximum volume of oxygen (in milliliters) your body can use per kilogram of body weight per minute during maximal exercise. It is the gold-standard measure of cardiovascular fitness and aerobic endurance."}},{"@type":"Question","name":"What is a good VO2 max?","acceptedAnswer":{"@type":"Answer","text":"For men aged 20-29, a VO2 max above 50 is excellent and above 56 is elite. For women the same age, above 43 is excellent and above 49 is elite. Values decline with age — use the rating table on this page to see your category."}},{"@type":"Question","name":"How accurate is the Cooper 12-minute run test?","acceptedAnswer":{"@type":"Answer","text":"The Cooper test estimates VO2 max within about ±5 mL/kg/min of a lab measurement. It works best for trained runners. The 1.5-mile run and resting-heart-rate formulas are rougher estimates — useful for tracking personal progress, not for clinical decisions."}},{"@type":"Question","name":"How can I improve my VO2 max?","acceptedAnswer":{"@type":"Answer","text":"High-intensity interval training (HIIT), tempo runs, and consistent aerobic exercise at 70-85% of max heart rate can raise VO2 max by 10-25% over 8-12 weeks. Genetics sets the ceiling, but most people are far from theirs."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="tabs" id="tabs"></div>
    <div id="inputs"></div>
    <div id="result"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>

</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'VO2 Max Calculator',
    toolDesc: 'Estimate your cardiovascular fitness (VO2 max) using the Cooper 12-min run, the 1.5-mile run, or resting heart rate.',
    tabCooper: 'Cooper 12-min run',
    tabMile: '1.5-mile run',
    tabRestingHR: 'Resting heart rate',
    lblAge: 'Age (years)',
    lblSex: 'Sex',
    lblMale: 'Male',
    lblFemale: 'Female',
    lblWeight: 'Body weight (kg)',
    lblDistance: 'Distance covered in 12 minutes (m)',
    lblTime: 'Time to run 1.5 miles (min:sec, e.g. 11:30)',
    lblMin: 'Minutes',
    lblSec: 'Seconds',
    lblRestHR: 'Resting heart rate (bpm)',
    lblMaxHR: 'Max heart rate (bpm) — leave blank to estimate 220−age',
    rating: 'Fitness rating',
    methodNote: 'Method',
    clear: 'Clear',
    step1: 'Pick a method above — Cooper run, 1.5-mile run or resting HR',
    step2: 'Enter your age, sex and the test value',
    step3: 'See your VO2 max and fitness category',
    step4: 'Compare against the age and sex rating table',
  },
  zh: {
    toolTitle: 'VO2 Max 计算器',
    toolDesc: '使用 Cooper 12 分钟跑、1.5 英里跑或静息心率估算你的心肺耐力（VO2 max）。',
    tabCooper: 'Cooper 12 分钟跑',
    tabMile: '1.5 英里跑',
    tabRestingHR: '静息心率法',
    lblAge: '年龄（岁）',
    lblSex: '性别',
    lblMale: '男',
    lblFemale: '女',
    lblWeight: '体重（公斤）',
    lblDistance: '12 分钟内跑的距离（米）',
    lblTime: '跑 1.5 英里的时间（分:秒，如 11:30）',
    lblMin: '分钟',
    lblSec: '秒',
    lblRestHR: '静息心率（次/分）',
    lblMaxHR: '最大心率（次/分）— 留空自动估算 220−年龄',
    rating: '体能等级',
    methodNote: '方法',
    clear: '清除',
    step1: '在上方选择方法 — Cooper 跑、1.5 英里跑或静息心率',
    step2: '输入年龄、性别和测试值',
    step3: '查看 VO2 max 和体能等级',
    step4: '对照年龄和性别评级表',
  }
});

const { $, t } = GZ;
let currentTab = 'cooper';

// VO2 max rating tables — [excellent, good, fair, poor] lower thresholds by age & sex
const RATINGS = {
  male: {
    '20-29':[50,42,35,30], '30-39':[49,40,33,28], '40-49':[48,38,32,26],
    '50-59':[45,35,28,25], '60-69':[42,32,26,22], '70+':[40,28,23,18],
  },
  female: {
    '20-29':[43,36,32,28], '30-39':[40,33,30,26], '40-49':[38,30,27,24],
    '50-59':[35,28,25,21], '60-69':[33,25,23,20], '70+':[31,24,21,17],
  }
};

function ageBand(age) {
  if (age < 30) return '20-29';
  if (age < 40) return '30-39';
  if (age < 50) return '40-49';
  if (age < 60) return '50-59';
  if (age < 70) return '60-69';
  return '70+';
}

function rateVO2(vo2, age, sex) {
  const band = ageBand(age);
  const cut = (RATINGS[sex] || RATINGS.male)[band];
  if (vo2 >= cut[0]) return {label: 'Excellent', cls: 'r-excellent'};
  if (vo2 >= cut[1]) return {label: 'Good', cls: 'r-good'};
  if (vo2 >= cut[2]) return {label: 'Above Average', cls: 'r-good'};
  if (vo2 >= cut[3]) return {label: 'Average', cls: 'r-fair'};
  return {label: 'Below Average', cls: 'r-poor'};
}

function renderTabs() {
  $('#tabs').innerHTML = `
    <div class="tab ${currentTab==='cooper'?'active':''}" onclick="switchTab('cooper')">${t('tabCooper')}</div>
    <div class="tab ${currentTab==='mile'?'active':''}" onclick="switchTab('mile')">${t('tabMile')}</div>
    <div class="tab ${currentTab==='rhr'?'active':''}" onclick="switchTab('rhr')">${t('tabRestingHR')}</div>`;
}

function switchTab(tab) { currentTab = tab; renderTabs(); renderInputs(); recalc(); }

function renderInputs() {
  const base = `
    <div class="field"><label>${t('lblAge')}</label><input type="number" id="age" value="30" min="10" max="100" oninput="recalc()"></div>
    <div class="field"><label>${t('lblSex')}</label>
      <select id="sex" onchange="recalc()"><option value="male">${t('lblMale')}</option><option value="female">${t('lblFemale')}</option></select>
    </div>`;
  let extra = '';
  if (currentTab === 'cooper') {
    extra = `<div class="field"><label>${t('lblDistance')}</label><input type="number" id="dist" value="2400" min="1" oninput="recalc()"></div>`;
  } else if (currentTab === 'mile') {
    extra = `
      <div style="display:flex;gap:10px;align-items:flex-end">
        <div class="field" style="flex:1"><label>${t('lblMin')}</label><input type="number" id="mmin" value="11" min="0" oninput="recalc()"></div>
        <div class="field" style="flex:1"><label>${t('lblSec')}</label><input type="number" id="msec" value="30" min="0" max="59" oninput="recalc()"></div>
      </div>`;
  } else {
    extra = `
      <div class="field"><label>${t('lblRestHR')}</label><input type="number" id="rhr" value="60" min="30" max="120" oninput="recalc()"></div>
      <div class="field"><label>${t('lblMaxHR')}</label><input type="number" id="mhr" placeholder="${t('lblMaxHR')}" oninput="recalc()"></div>`;
  }
  $('#inputs').innerHTML = base + extra;
}

function recalc() {
  const age = parseInt($('#age').value);
  const sex = $('#sex').value;
  const out = $('#result');
  if (isNaN(age) || age < 10 || age > 100) { out.innerHTML = ''; return; }
  let vo2 = NaN, methodName = '';
  if (currentTab === 'cooper') {
    const d = parseFloat($('#dist').value);
    if (isNaN(d) || d <= 0) { out.innerHTML = ''; return; }
    // Cooper 1968: VO2max = (distance_m - 504.9) / 44.73
    vo2 = (d - 504.9) / 44.73;
    methodName = t('tabCooper');
  } else if (currentTab === 'mile') {
    const min = parseFloat($('#mmin').value) || 0;
    const sec = parseFloat($('#msec').value) || 0;
    const totalMin = min + sec/60;
    if (totalMin <= 0) { out.innerHTML = ''; return; }
    // Cooper 1.5-mile: VO2max = (483 / time_min) + 3.5
    vo2 = (483 / totalMin) + 3.5;
    methodName = t('tabMile');
  } else {
    const rhr = parseFloat($('#rhr').value);
    if (isNaN(rhr) || rhr < 30) { out.innerHTML = ''; return; }
    const mhr = parseFloat($('#mhr').value) || (220 - age);
    if (mhr <= rhr) { out.innerHTML = ''; return; }
    // Uth-Sørensen-Overgaard-Pedersen: VO2max ≈ 15 × (HRmax / HRrest)
    vo2 = 15 * (mhr / rhr);
    methodName = t('tabRestingHR');
  }
  vo2 = Math.max(0, vo2);
  const r = rateVO2(vo2, age, sex);
  out.innerHTML = `
    <div class="result-card">
      <div style="color:var(--text2);font-size:.9em">${t('rating')} · ${t('methodNote')}: ${methodName}</div>
      <div class="vo2-big">${vo2.toFixed(1)}</div>
      <div class="vo2-unit">mL O₂ / kg / min</div>
      <div class="rating-pill ${r.cls}">${r.label}</div>
      <div class="scale">
        <div class="scale-bar"></div>
        <div style="display:flex;justify-content:space-between;color:var(--text3);font-size:.78em">
          <span>Below Avg</span><span>Average</span><span>Above Avg</span><span>Good</span><span>Excellent</span>
        </div>
      </div>
    </div>`;
}

window.switchTab = switchTab;
window.recalc = recalc;

$('#toolbar').innerHTML = `<button class="gz-btn gz-btn-secondary" onclick="renderInputs();recalc()">${t('clear')}</button>`;

renderTabs();
renderInputs();
recalc();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'❤️', href:'/calc/heart-rate-zones.html', name:'Heart Rate Zones'},
    {icon:'⚖️', href:'/calc/bmi-calculator.html', name:'BMI Calculator'},
    {icon:'🔥', href:'/calc/bmr-calculator.html', name:'BMR Calculator'},
    {icon:'🏃', href:'/calc/pace-calculator.html', name:'Pace Calculator'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
