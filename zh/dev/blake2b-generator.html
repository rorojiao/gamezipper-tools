<script src="https://cdn.jsdelivr.net/npm/blakejs@1.2.1/dist/blake2s.min.js"></script>
<script>
GZI18n.register({
  en: {
    toolTitle: 'BLAKE2 Hash Generator',
    toolDesc: 'Generate BLAKE2b and BLAKE2s hashes — faster than SHA-256, as secure as SHA-3. Pure JavaScript, runs entirely in your browser. No data sent anywhere.',
    step1: 'Type or paste text in the input area',
    step2: 'Choose hash variant (BLAKE2b-512 is default)',
    step3: 'Hash is computed automatically as you type',
    step4: 'Click Copy to copy the hash value',
  },
  zh: {
    toolTitle: 'BLAKE2 哈希生成器',
    toolDesc: '生成 BLAKE2b 和 BLAKE2s 哈希 — 比 SHA-256 更快，与 SHA-3 一样安全。纯 JavaScript 实现，完全在浏览器中运行，不上传任何数据。',
    step1: '在输入区输入或粘贴文本',
    step2: '选择哈希变体（默认 BLAKE2b-512）',
    step3: '哈希值会随输入自动计算',
    step4: '点击"复制"复制哈希值',
  }
});

const { $, copyText, t } = GZ;

function hex(arr) { return Array.from(arr).map(b => b.toString(16).padStart(2,'0')).join(''); }

function doHash() {
  const text = $('#input').value;
  const variant = $('#variant').value;
  if (!text) { $('#results').innerHTML = ''; return; }
  const bytes = new TextEncoder().encode(text);
  let hashes = [];
  if (variant === 's256') {
    hashes.push(['BLAKE2s-256', hex(blake2s(bytes))]);
  } else {
    const len = parseInt(variant);
    hashes.push(['BLAKE2b-' + variant, hex(blake2b(bytes, len / 8))]);
    hashes.push(['BLAKE2b-512', hex(blake2b(bytes))]);
  }
  $('#results').innerHTML = hashes.map(([name, val]) =>
    `<div class="hash-row"><strong>${name}</strong><code>${val}</code><button class="gz-btn" onclick="copyText('${val}')" style="padding:4px 10px;font-size:.8em">${t('copy')}</button></div>`
  ).join('');
}

function loadExample() { $('#input').value = 'The quick brown fox jumps over the lazy dog'; doHash(); }

$('#toolbar').innerHTML = `
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#input').value=\'\';$(\'#results\').innerHTML=\'\'">${t('clear')}</button>`;

$('#input').addEventListener('input', doHash);
$('#variant').addEventListener('change', doHash);

GZ.renderToolPage({
  category: 'dev',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],

  ]
});
</script>
