<script>
GZI18n.register({
  en: {
    toolTitle: 'Image to Data URI Converter',
    toolDesc: 'Convert any image to a Data URI string for embedding in HTML, CSS and JSON. Supports PNG, JPG, WebP, GIF, SVG.',
    lblDrop: 'Drop an image here or click to upload',
    lblFname: 'File Name',
    lblFtype: 'MIME Type',
    lblFsize: 'Original Size',
    lblUriSize: 'Data URI Size',
    lblDims: 'Dimensions',
    copyRaw: '📋 Copy Data URI',
    copyCss: '📋 Copy CSS background',
    copyImg: '📋 Copy <img> tag',
    copied: 'Copied!',
    step1: 'Drop or select an image file',
    step2: 'The image is converted to a base64 Data URI',
    step3: 'View stats: file size, Data URI size, dimensions',
    step4: 'Copy as raw URI, CSS background or HTML img tag',
  },
  zh: {
    toolTitle: '图片转 Data URI 转换器',
    toolDesc: '将任意图片转换为 Data URI 字符串，可直接嵌入 HTML、CSS 和 JSON。支持 PNG、JPG、WebP、GIF、SVG。',
    lblDrop: '拖拽图片到此处或点击上传',
    lblFname: '文件名',
    lblFtype: 'MIME 类型',
    lblFsize: '原始大小',
    lblUriSize: 'Data URI 大小',
    lblDims: '尺寸',
    copyRaw: '📋 复制 Data URI',
    copyCss: '📋 复制 CSS 背景',
    copyImg: '📋 复制 <img> 标签',
    copied: '已复制！',
    step1: '拖拽或选择图片文件',
    step2: '图片自动转换为 base64 Data URI',
    step3: '查看统计：文件大小、URI 大小、尺寸',
    step4: '复制为原始 URI、CSS 背景或 HTML img 标签',
  }
});

const { $, copyText, t } = GZ;

let currentUri = '';

function formatSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024*1024) return (bytes/1024).toFixed(1) + ' KB';
  return (bytes/(1024*1024)).toFixed(2) + ' MB';
}

function handleFile(file) {
  if (!file || !file.type.startsWith('image/')) return;
  
  const reader = new FileReader();
  reader.onload = (e) => {
    const dataUri = e.target.result;
    currentUri = dataUri;
    
    // Show preview
    $('#preview').innerHTML = `<img src="${dataUri}" alt="preview">`;
    
    // Show stats
    $('#stats').style.display = 'flex';
    $('#statName').textContent = file.name;
    $('#statType').textContent = file.type;
    $('#statSize').textContent = formatSize(file.size);
    $('#statUriSize').textContent = formatSize(dataUri.length);
    
    const img = new Image();
    img.onload = () => {
      $('#statDims').textContent = img.width + ' × ' + img.height;
    };
    img.src = dataUri;
    
    // Show output
    $('#output').style.display = 'block';
    $('#output').textContent = dataUri;
    
    // Show actions
    $('#actions').style.display = 'block';
  };
  reader.readAsDataURL(file);
}

// Drop zone
const dropZone = $('#dropZone');
dropZone.addEventListener('click', () => $('#fileInput').click());
dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', (e) => {
  e.preventDefault();
  dropZone.classList.remove('dragover');
  if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
});
$('#fileInput').addEventListener('change', (e) => {
  if (e.target.files.length) handleFile(e.target.files[0]);
});

// Copy buttons
$('#btnCopy').textContent = t('copyRaw');
$('#btnCopy').addEventListener('click', () => {
  copyText(currentUri);
  $('#btnCopy').textContent = t('copied');
  setTimeout(() => $('#btnCopy').textContent = t('copyRaw'), 1500);
});

$('#btnCopyCss').textContent = t('copyCss');
$('#btnCopyCss').addEventListener('click', () => {
  const css = `background-image: url("${currentUri}");`;
  copyText(css);
  $('#btnCopyCss').textContent = t('copied');
  setTimeout(() => $('#btnCopyCss').textContent = t('copyCss'), 1500);
});

$('#btnCopyImg').textContent = t('copyImg');
$('#btnCopyImg').addEventListener('click', () => {
  const html = `<img src="${currentUri}" alt="image">`;
  copyText(html);
  $('#btnCopyImg').textContent = t('copied');
  setTimeout(() => $('#btnCopyImg').textContent = t('copyImg'), 1500);
});

$('#toolbar').innerHTML = `<button class="gz-btn gz-btn-secondary" onclick="$('#fileInput').click()">${t('example')||'Upload'}</button>`;

GZ.renderToolPage({
  category: 'dev',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🖼️', href:'/image/image-to-base64.html', name:'Image to Base64'},
    {icon:'🔗', href:'/convert/svg-to-data-uri.html', name:'SVG to Data URI'},
    {icon:'🖼️', href:'/convert/base64-to-image.html', name:'Base64 to Image'},
    {icon:'📄', href:'/dev/base64.html', name:'Base64 Encoder'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
