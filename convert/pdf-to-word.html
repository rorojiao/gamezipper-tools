<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

GZI18n.register({
  en: {
    toolTitle: 'PDF to Word Converter',
    toolDesc: 'Convert PDF files to editable Word (.docx) documents — text and headings preserved. 100% browser-based, no upload, no signup.',
    chooseFile: 'Choose PDF file or drag it here',
    info: 'Supports .pdf • Max ~50 MB • Processed locally in your browser',
    convert: 'Convert to Word',
    download: '⬇ Download .docx',
    converting: 'Converting…',
    done: '✓ Done! Click download to save your Word document.',
    noFile: 'Please choose a PDF file first.',
    error: 'Error: ',
    previewTitle: 'Preview (extracted text)',
    step1: 'Click the drop zone or drag your PDF file onto it',
    step2: 'Click "Convert to Word" to extract text from every page',
    step3: 'Preview the extracted content in the panel below',
    step4: 'Click "Download .docx" to save the editable Word document',
  },
  zh: {
    toolTitle: 'PDF 转 Word 转换器',
    toolDesc: '将 PDF 文件转换为可编辑的 Word (.docx) 文档 — 保留文字和标题结构。100% 浏览器本地处理，无需上传、无需注册。',
    chooseFile: '选择 PDF 文件或拖拽到此处',
    info: '支持 .pdf • 最大约 50 MB • 浏览器本地处理',
    convert: '转换为 Word',
    download: '⬇ 下载 .docx',
    converting: '转换中…',
    done: '✓ 完成！点击下载按钮保存 Word 文档。',
    noFile: '请先选择一个 PDF 文件。',
    error: '错误：',
    previewTitle: '预览（提取的文本）',
    step1: '点击上传区域或将 PDF 文件拖拽到此处',
    step2: '点击「转换为 Word」提取每一页的文字',
    step3: '在下方面板预览提取的内容',
    step4: '点击「下载 .docx」保存可编辑的 Word 文档',
  }
});

const { $, t } = GZ;
let currentFile = null;
let docxBlob = null;

$('#dropLabel').textContent = t('chooseFile');
$('#dropInfo').textContent = t('info');

const drop = $('#drop');
drop.addEventListener('click', () => $('#file').click());
drop.addEventListener('dragover', e => { e.preventDefault(); drop.classList.add('dragover'); });
drop.addEventListener('dragleave', () => drop.classList.remove('dragover'));
drop.addEventListener('drop', e => { e.preventDefault(); drop.classList.remove('dragover'); if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]); });
$('#file').addEventListener('change', e => { if (e.target.files[0]) handleFile(e.target.files[0]); });

function handleFile(f) {
  if (!f || f.type !== 'application/pdf') { $('#status').innerHTML = `<span style="color:var(--accent)">${t('noFile')}</span>`; return; }
  currentFile = f;
  docxBlob = null;
  drop.querySelector('.icon').textContent = '📄';
  $('#dropLabel').textContent = f.name;
  $('#dropInfo').textContent = (f.size / 1024 / 1024).toFixed(2) + ' MB';
  $('#preview').style.display = 'none';
  $('#status').innerHTML = '';
}

async function convert() {
  if (!currentFile) { $('#status').innerHTML = `<span style="color:var(--accent)">${t('noFile')}</span>`; return; }
  const prog = $('#progress'); prog.style.display = 'block'; prog.querySelector('div').style.width = '0%';
  $('#status').innerHTML = `<span style="opacity:.7">${t('converting')}</span>`;
  try {
    const buf = await currentFile.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({ data: buf }).promise;
    const paras = [];
    const previewParts = [];
    for (let i = 1; i <= pdf.numPages; i++) {
      const page = await pdf.getPage(i);
      const tc = await page.getTextContent();
      let lastY = null, lineText = '', fontSize = 12;
      const lineBlocks = [];
      tc.items.forEach(it => {
        const y = it.transform[5];
        const fs = it.height || 12;
        if (lastY !== null && Math.abs(y - lastY) > 3) { lineBlocks.push({ text: lineText.trim(), size: fontSize }); lineText = ''; }
        lineText += it.str;
        if (fs > fontSize) fontSize = fs;
        lastY = y;
      });
      if (lineText.trim()) lineBlocks.push({ text: lineText.trim(), size: fontSize });
      lineBlocks.forEach(lb => {
        if (!lb.text) return;
        const isHeading = lb.size >= 16;
        const isSubHeading = lb.size >= 13 && lb.size < 16;
        if (isHeading) paras.push(new docx.TextRun({ text: lb.text, bold: true, size: 32, break: 1 }));
        else if (isSubHeading) paras.push(new docx.TextRun({ text: lb.text, bold: true, size: 26, break: 1 }));
        else paras.push(new docx.TextRun({ text: lb.text, size: 22, break: 1 }));
        previewParts.push((isHeading ? '## ' : isSubHeading ? '### ' : '') + lb.text);
      });
      paras.push(new docx.TextRun({ break: 1 }));
      previewParts.push('');
      prog.querySelector('div').style.width = (i / pdf.numPages * 100) + '%';
    }
    const doc = new docx.Document({ sections: [{ properties: {}, children: [new docx.Paragraph({ children: paras })] }] });
    docxBlob = await docx.Packer.toBlob(doc);
    const preview = $('#preview');
    preview.style.display = 'block';
    preview.innerHTML = `<div class="p2w-fname">${t('previewTitle')}</div>` + previewParts.join('\n').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/\n/g,'<br>');
    $('#status').innerHTML = `<span style="color:var(--gz-success)">${t('done')}</span>`;
    setTimeout(() => prog.style.display = 'none', 500);
  } catch (e) {
    prog.style.display = 'none';
    $('#status').innerHTML = `<span style="color:var(--accent)">${t('error')}${e.message}</span>`;
  }
}

function download() {
  if (!docxBlob) return;
  const a = document.createElement('a');
  a.href = URL.createObjectURL(docxBlob);
  a.download = currentFile.name.replace(/\.pdf$/i, '') + '.docx';
  a.click();
  URL.revokeObjectURL(a.href);
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="convert()">${t('convert')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="download()">${t('download')}</button>`;

GZ.renderToolPage({
  category: 'convert',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📝', href:'/convert/word-to-pdf.html', name:'Word to PDF'},
    {icon:'📄', href:'/convert/pdf-to-text.html', name:'PDF to Text'},
    {icon:'🖼️', href:'/convert/pdf-to-jpg.html', name:'PDF to JPG'},
    {icon:'📊', href:'/convert/csv-to-excel.html', name:'CSV to Excel'},
  ]
});
</script>
