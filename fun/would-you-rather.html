.wyr-tags{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
.wyr-tag{padding:5px 14px;border-radius:20px;border:1px solid var(--gz-border);background:var(--gz-glass2);font-size:.82em;cursor:pointer;transition:all .15s;color:var(--gz-text2)}
.wyr-tag:hover{color:var(--gz-text)}
.wyr-tag.active{background:var(--gz-accent);color:#fff;border-color:var(--gz-accent)}
.wyr-share{font-size:.82em;color:var(--gz-text2)}
@media(max-width:600px){.wyr-cards{grid-template-columns:1fr;gap:10px}.wyr-vs{margin:0 auto}}

<script>
GZI18n.register({
  en: {
    toolTitle: 'Would You Rather?',
    toolDesc: 'Hundreds of hilarious and tricky dilemmas. Pick a side, see how others voted, and challenge your friends. Free, no signup.',
    round: 'Round',
    nextBtn: '➡️ Next Question',
    skipBtn: '⏭️ Skip',
    shareBtn: '🔗 Share',
    all: 'All',
    food: '🍔 Food',
    travel: '✈️ Travel',
    funny: '😂 Funny',
    hard: '🤔 Hard',
    step1: 'Browse the dilemma shown on the two cards',
    step2: 'Click the card (A or B) that you would rather choose',
    step3: 'See simulated vote percentages and pick the next one',
    step4: 'Use tags to filter by category — share favorites with friends',
    shareHint: '💡 Tip: use the Share button to copy the dilemma for friends',
  },
  zh: {
    toolTitle: '你会选哪个？',
    toolDesc: '数百个搞笑又烧脑的两难选择。选择你的答案，看看大家的投票，和朋友一起挑战。免费无需注册。',
    round: '第',
    nextBtn: '➡️ 下一题',
    skipBtn: '⏭️ 跳过',
    shareBtn: '🔗 分享',
    all: '全部',
    food: '🍔 美食',
    travel: '✈️ 旅行',
    funny: '😂 搞笑',
    hard: '🤔 烧脑',
    step1: '浏览两张卡片上的两难问题',
    step2: '点击你更愿意选择的卡片（A 或 B）',
    step3: '查看模拟投票比例，继续下一题',
    step4: '使用标签筛选分类 — 把有趣的分享给朋友',
    shareHint: '💡 提示：使用分享按钮复制问题给朋友',
  }
});

const QUESTIONS = [
  {a:'Have super speed',b:'Have super strength',cat:'hard'},
  {a:'Always be 10 minutes late',b:'Always be 20 minutes early',cat:'hard'},
  {a:'Lose all your photos',b:'Lose all your messages',cat:'hard'},
  {a:'Never use social media again',b:'Never watch TV again',cat:'hard'},
  {a:'Have the ability to fly',b:'Be invisible at will',cat:'hard'},
  {a:'Only eat sweet food',b:'Only eat salty food',cat:'food'},
  {a:'Never eat pizza again',b:'Never eat burgers again',cat:'food'},
  {a:'Eat only spicy food',b:'Eat only bland food',cat:'food'},
  {a:'Give up coffee forever',b:'Give up chocolate forever',cat:'food'},
  {a:'Cook every meal',b:'Eat out every meal',cat:'food'},
  {a:'Travel to the past',b:'Travel to the future',cat:'travel'},
  {a:'Visit every country',b:'Live in one dream city',cat:'travel'},
  {a:'Go camping in the mountains',b:'Relax on a tropical beach',cat:'travel'},
  {a:'Never travel by plane again',b:'Never travel by car again',cat:'travel'},
  {a:'Backpack around the world',b:'Luxury cruise once a year',cat:'travel'},
  {a:'Speak every language',b:'Play every instrument',cat:'hard'},
  {a:'Have unlimited money',b:'Have unlimited time',cat:'hard'},
  {a:'Be the funniest person alive',b:'Be the smartest person alive',cat:'hard'},
  {a:'Always know the truth',b:'Never be lied to',cat:'hard'},
  {a:'Live without music',b:'Live without movies',cat:'hard'},
  {a:'Fight 100 duck-sized horses',b:'Fight 1 horse-sized duck',cat:'funny'},
  {a:'Have fingers for toes',b:'Have toes for fingers',cat:'funny'},
  {a:'Always have a song stuck in your head',b:'Always have an itch you can\'t reach',cat:'funny'},
  {a:'Sneeze every 5 minutes',b:'Hiccup every 10 minutes',cat:'funny'},
  {a:'Wear wet socks all day',b:'Have a pebble in your shoe all day',cat:'funny'},
  {a:'Be a famous singer',b:'Be a famous actor',cat:'hard'},
  {a:'Read minds',b:'See the future',cat:'hard'},
  {a:'Win the lottery once',b:'Earn double your salary forever',cat:'hard'},
  {a:'Be able to breathe underwater',b:'Be able to walk through walls',cat:'hard'},
  {a:'Have a rewind button for life',b:'Have a pause button for life',cat:'hard'},
  {a:'Only drink water forever',b:'Only drink soda forever',cat:'food'},
  {a:'Eat a live bug',b:'Swim with sharks',cat:'funny'},
  {a:'Have free WiFi for life',b:'Have free food for life',cat:'hard'},
  {a:'Be a kid again',b:'Fast-forward 20 years',cat:'hard'},
  {a:'Lose your phone',b:'Lose your keys',cat:'hard'},
  {a:'Be trapped in a video game',b:'Be trapped in a horror movie',cat:'funny'},
  {a:'Never feel pain',b:'Never feel sadness',cat:'hard'},
  {a:'Always be hot',b:'Always be cold',cat:'hard'},
  {a:'Have a personal chef',b:'Have a personal driver',cat:'hard'},
  {a:'Give up your smartphone',b:'Give up your computer',cat:'hard'},
  {a:'Travel to space',b:'Travel to the bottom of the ocean',cat:'travel'},
  {a:'Live in a treehouse',b:'Live in an underground bunker',cat:'funny'},
  {a:'Have one true best friend',b:'Have a hundred casual friends',cat:'hard'},
  {a:'Be able to talk to animals',b:'Be able to talk to ghosts',cat:'funny'},
  {a:'Have a third arm',b:'Have a third eye',cat:'funny'},
  {a:'Only eat breakfast food',b:'Only eat dessert',cat:'food'},
  {a:'Live without internet for a year',b:'Live without AC for a year',cat:'hard'},
  {a:'Be the worst player on a winning team',b:'Be the best player on a losing team',cat:'hard'},
  {a:'Have perfect memory',b:'Have perfect focus',cat:'hard'},
];

const { $, t, copyText } = GZ;
let currentQ = null;
let voted = false;
let filter = 'all';
let count = 0;

function renderTags() {
  const cats = ['all','hard','food','travel','funny'];
  $('#tags').innerHTML = cats.map(c => `<span class="wyr-tag${c===filter?' active':''}" data-cat="${c}">${t(c)}</span>`).join('');
  $('#tags').querySelectorAll('.wyr-tag').forEach(el => {
    el.addEventListener('click', () => { filter = el.dataset.cat; renderTags(); nextQuestion(); });
  });
}

function pickQuestion() {
  const pool = filter === 'all' ? QUESTIONS : QUESTIONS.filter(q => q.cat === filter);
  const p = pool.length ? pool : QUESTIONS;
  return p[Math.floor(Math.random() * p.length)];
}

function nextQuestion() {
  voted = false;
  count++;
  currentQ = pickQuestion();
  $('#txtA').textContent = currentQ.a;
  $('#txtB').textContent = currentQ.b;
  $('#pctA').textContent = '';
  $('#pctB').textContent = '';
  $('#cardA').className = 'wyr-card';
  $('#cardB').className = 'wyr-card';
  $('#barFill').style.width = '0';
  $('#counter').innerHTML = `${t('round')} <b>${count}</b>`;
}

function vote(side) {
  if (voted || !currentQ) return;
  voted = true;
  // Simulated stats — weighted by length so shorter/funnier options trend higher
  const wa = Math.max(20, Math.min(80, 50 + Math.round((currentQ.b.length - currentQ.a.length) * 1.5) + Math.floor(Math.random()*20-10)));
  const wb = 100 - wa;
  const pick = side === 'a';
  $('#cardA').classList.add('voted', pick ? 'picked' : 'lost');
  $('#cardB').classList.add('voted', !pick ? 'picked' : 'lost');
  $('#pctA').textContent = wa + '%';
  $('#pctB').textContent = wb + '%';
  $('#barFill').style.width = wa + '%';
}

function shareQuestion() {
  if (!currentQ) return;
  copyText(`Would You Rather:\nA) ${currentQ.a}\nB) ${currentQ.b}`);
}

$('#cardA').addEventListener('click', () => vote('a'));
$('#cardB').addEventListener('click', () => vote('b'));

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="nextQuestion()">${t('nextBtn')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="nextQuestion()">${t('skipBtn')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="shareQuestion()">${t('shareBtn')}</button>`;
$('#shareHint').textContent = t('shareHint');
renderTags();
nextQuestion();

GZ.renderToolPage({
  category: 'fun',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🎭', href:'/fun/truth-or-dare.html', name:'Truth or Dare'},
    {icon:'🙈', href:'/fun/never-have-i-ever.html', name:'Never Have I Ever'},
    {icon:'🎡', href:'/fun/decision-wheel.html', name:'Decision Wheel'},
    {icon:'🎱', href:'/fun/magic-8-ball.html', name:'Magic 8-Ball'},
  ]
});
</script>

</body>
