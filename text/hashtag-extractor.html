<script>
GZI18n.register({
  en: {
    toolTitle: 'Hashtag Extractor',
    toolDesc: 'Extract all hashtags from any text. Paste Instagram captions, tweets, or blog posts — get a clean deduplicated hashtag list with frequency counts.',
    inputPlaceholder: 'Paste your text with hashtags here...\n\ne.g. Loving the sunset today! #sunset #nature #photography #beautiful',
    output: 'Extracted Hashtags',
    extract: 'Extract',
    sortAlpha: 'Sort A-Z',
    sortFreq: 'Sort by Frequency',
    copyAll: 'Copy All',
    copySpace: 'Copy (space-sep)',
    copyComma: 'Copy (comma-sep)',
    clear: 'Clear',
    copied: 'Copied!',
    found: 'Found',
    unique: 'unique',
    total: 'total occurrences',
    step1: 'Paste text containing hashtags into the left input area',
    step2: 'Click Extract — hashtags appear instantly on the right',
    step3: 'Sort alphabetically or by frequency as needed',
    step4: 'Click Copy All to copy the hashtag list',
  },
  zh: {
    toolTitle: '话题标签提取器',
    toolDesc: '从任意文本中提取所有话题标签。粘贴 Instagram 文案、推文或博客文章 — 获取去重后的标签列表及频率统计。',
    inputPlaceholder: '在此粘贴包含话题标签的文本...\n\n例如：今天的日落太美了！#日落 #自然 #摄影 #美景',
    output: '提取的标签',
    extract: '提取',
    sortAlpha: '按字母排序',
    sortFreq: '按频率排序',
    copyAll: '全部复制',
    copySpace: '复制（空格分隔）',
    copyComma: '复制（逗号分隔）',
    clear: '清除',
    copied: '已复制！',
    found: '找到',
    unique: '个唯一',
    total: '次出现',
    step1: '在左侧输入区粘贴包含标签的文本',
    step2: '点击「提取」— 标签即时显示在右侧',
    step3: '按需按字母或频率排序',
    step4: '点击「全部复制」复制标签列表',
  }
});

const { $, copyText, t } = GZ;
let currentHashtags = [];
let currentSortMode = 'freq';

function extractHashtags() {
  const text = $('#input').value;
  const matches = text.match(/#[\w\u00C0-\u024f\u4e00-\u9fff\u3040-\u309f\u30a0-\u30ff\uac00-\ud7af]+/g) || [];
  
  // Count frequency
  const freq = {};
  matches.forEach(m => {
    const tag = m.toLowerCase();
    freq[tag] = (freq[tag] || 0) + 1;
  });
  
  currentHashtags = Object.entries(freq).map(([tag, count]) => ({tag, count}));
  sortAndRender();
}

function sortAndRender() {
  if (currentSortMode === 'alpha') {
    currentHashtags.sort((a, b) => a.tag.localeCompare(b.tag));
  } else {
    currentHashtags.sort((a, b) => b.count - a.count || a.tag.localeCompare(b.tag));
  }
  renderResults();
}

function renderResults() {
  if (!currentHashtags.length) {
    $('#output').innerHTML = '';
    $('#stats').textContent = '';
    return;
  }
  
  const total = currentHashtags.reduce((s, h) => s + h.count, 0);
  $('#stats').textContent = `${t('found')} ${currentHashtags.length} ${t('unique')}, ${total} ${t('total')}`;
  
  const html = currentHashtags.map(h => `
    <div style="display:inline-flex;align-items:center;gap:4px;padding:4px 10px;margin:3px;background:var(--glass);border:1px solid var(--border);border-radius:20px;cursor:pointer;font-size:.85em" onclick="copyText('${h.tag}');flashTag(this)">
      <span style="color:var(--gz-accent)">${h.tag}</span>
      ${h.count > 1 ? `<span style="background:var(--gz-accent);color:#fff;border-radius:10px;padding:1px 6px;font-size:.75em">${h.count}</span>` : ''}
    </div>`).join('');
  $('#output').innerHTML = html;
}

window.flashTag = function(el) {
  const orig = el.style.borderColor;
  el.style.borderColor = 'var(--gz-accent)';
  el.style.transform = 'scale(1.05)';
  setTimeout(() => { el.style.borderColor = orig; el.style.transform = ''; }, 400);
};

function copyAll(mode) {
  if (!currentHashtags.length) return;
  const sep = mode === 'comma' ? ', ' : ' ';
  const text = currentHashtags.map(h => h.tag).join(sep);
  copyText(text);
  flashCopied();
}

function flashCopied() {
  const btns = document.querySelectorAll('#toolbar .gz-btn');
  btns.forEach(b => { if (b.dataset.copied) { const orig = b.textContent; b.textContent = t('copied'); setTimeout(() => b.textContent = orig, 1200); } });
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="extractHashtags()">${t('extract')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="currentSortMode='alpha';sortAndRender()">${t('sortAlpha')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="currentSortMode='freq';sortAndRender()">${t('sortFreq')}</button>
  <button class="gz-btn" data-copied="1" onclick="copyAll('space')">${t('copySpace')}</button>
  <button class="gz-btn gz-btn-secondary" data-copied="1" onclick="copyAll('comma')">${t('copyComma')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#input').value='';currentHashtags=[];renderResults()">${t('clear')}</button>`;

$('#input').placeholder = t('inputPlaceholder');
$('#input').addEventListener('input', extractHashtags);

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],

    {icon:'📊', href:'/text/emoji-counter.html', name:'Emoji Counter'},
    {icon:'📧', href:'/text/extract-contacts.html', name:'Contact Extractor'},
    {icon:'🔍', href:'/text/word-frequency.html', name:'Word Freq'},
  ]
});
</script>
