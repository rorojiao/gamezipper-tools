.preset-btns{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}

<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "How do I add two binary numbers?", "acceptedAnswer": {"@type": "Answer", "text": "Align the two numbers bit by bit from the right. Add each column, then add any carry from the previous column (just like decimal addition). The carry rule is: 0+0=0, 0+1=1, 1+1=10 (write 0 carry 1), 1+1+1=11 (write 1 carry 1). Example: 1011 (11) + 1101 (13) = 11000 (24)."}}, {"@type": "Question", "name": "How does binary subtraction work?", "acceptedAnswer": {"@type": "Answer", "text": "You can subtract directly or use the two's complement trick: 1) Find the two's complement of the subtrahend (invert bits and add 1). 2) Add it to the minuend. 3) Discard the carry. Negative results are returned in two's complement form."}}, {"@type": "Question", "name": "What is two's complement?", "acceptedAnswer": {"@type": "Answer", "text": "Two's complement is the most common way to represent signed integers in binary. To get the two's complement of a number, invert all its bits and add 1. For example, the 8-bit two's complement of 5 (00000101) is 251 (11111011), which represents -5. The highest bit is the sign bit."}}, {"@type": "Question", "name": "Can I do bitwise operations in this calculator?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. Switch to Bitwise mode to compute AND, OR, XOR, NOT, left shift (<<) and right shift (>>) between two binary numbers. The calculator automatically limits the result to a fixed bit width and shows it in binary, decimal, hex and octal."}}, {"@type": "Question", "name": "What is the largest binary number this calculator handles?", "acceptedAnswer": {"@type": "Answer", "text": "The calculator handles up to 64 bits, which is more than enough for any unsigned integer JavaScript can represent natively (2^53 - 1). For values larger than that it operates as if it were a BigInt-like string, which is exact for addition/subtraction and approximate for multiplication/division."}}]}</script>

<script>
GZI18n.register({
  en: {
    toolTitle: 'Binary Calculator',
    toolDesc: 'Do math directly in binary (base-2). Add, subtract, multiply, divide, plus bitwise AND, OR, XOR, NOT and shifts. Convert results to binary, decimal, hex and octal instantly.',
    tabArith: 'Arithmetic', tabBitwise: 'Bitwise',
    opAdd: '+', opSub: '−', opMul: '×', opDiv: '÷', opMod: 'mod',
    opAnd: 'AND', opOr: 'OR', opXor: 'XOR', opShl: '<<', opShr: '>>', opNot: 'NOT (A)',
    preset: 'Preset:',
    convTitle: 'Result in all number systems',
    bitsTitle: 'Bit visualization',
    stepsTitle: 'Working steps',
    bitsLabelSigned: 'Signed (two\'s complement)',
    bitsLabelUnsigned: 'Unsigned',
    errInvalid: 'Invalid binary (only 0 and 1)',
    errDivZero: 'Cannot divide by zero',
    resultLabel: 'Result',
    step1: 'Pick arithmetic (+, −, ×, ÷, mod) or bitwise (AND, OR, XOR, <<, >>, NOT)',
    step2: 'Type binary numbers in A and B (only 0 and 1)',
    step3: 'See the result in binary, decimal, hex and octal',
    step4: 'Copy the value or use the bit visualization for teaching',
    reset: 'Reset',
  },
  zh: {
    toolTitle: '二进制计算器',
    toolDesc: '直接以二进制（base-2）进行数学运算。加减乘除、位运算 AND/OR/XOR/NOT/移位，结果同时显示二进制、十进制、十六进制和八进制。',
    tabArith: '算术', tabBitwise: '位运算',
    opAdd: '+', opSub: '−', opMul: '×', opDiv: '÷', opMod: '取模',
    opAnd: '与 AND', opOr: '或 OR', opXor: '异或 XOR', opShl: '左移 <<', opShr: '右移 >>', opNot: '取反 NOT (A)',
    preset: '预设：',
    convTitle: '结果在所有进制下的表示',
    bitsTitle: '位可视化',
    stepsTitle: '运算步骤',
    bitsLabelSigned: '有符号（补码）',
    bitsLabelUnsigned: '无符号',
    errInvalid: '无效的二进制（只能含 0 和 1）',
    errDivZero: '不能除以零',
    resultLabel: '结果',
    step1: '选择算术（+ − × ÷ mod）或位运算（AND OR XOR << >> NOT）',
    step2: '在 A 和 B 中输入二进制数（仅 0 和 1）',
    step3: '查看结果的二进制、十进制、十六进制和八进制',
    step4: '复制结果或将位可视化用于教学演示',
    reset: '重置',
  }
});

const { $, t } = GZ;

let op = '+';
let mode = 'arith';
const ARITH = ['+', '-', '*', '/', 'mod'];
const BITW = ['AND', 'OR', 'XOR', '<<', '>>', 'NOT'];

function isBinary(s) { return /^[01]+$/.test(s.trim()); }

function toBigInt(bin) { return BigInt('0b' + (bin || '0')); }
function toBin(big, bits) {
  let s = big.toString(2);
  if (s.length < bits) s = s.padStart(bits, '0');
  // Don't truncate if larger — show full
  return s;
}

function calculate() {
  const aStr = $('#input-a').value.trim();
  const bStr = $('#input-b').value.trim();
  const errA = $('#err-a'), errB = $('#err-b');
  errA.textContent = ''; errB.textContent = '';
  $('#input-a').classList.remove('invalid');
  $('#input-b').classList.remove('invalid');
  if (!isBinary(aStr)) { errA.textContent = t('errInvalid'); $('#input-a').classList.add('invalid'); return; }
  if (mode === 'arith' || (mode === 'bitwise' && op !== 'NOT')) {
    if (!isBinary(bStr)) { errB.textContent = t('errInvalid'); $('#input-b').classList.add('invalid'); return; }
  }
  let a, b, result, opName, steps = '';
  if (mode === 'arith') {
    a = toBigInt(aStr);
    b = toBigInt(bStr);
    if (op === '+') { result = a + b; opName = 'a + b'; }
    else if (op === '-') { result = a - b; opName = 'a − b'; }
    else if (op === '*') { result = a * b; opName = 'a × b'; }
    else if (op === '/') { if (b === 0n) { errB.textContent = t('errDivZero'); $('#input-b').classList.add('invalid'); return; } result = a / b; opName = 'a ÷ b'; }
    else if (op === 'mod') { if (b === 0n) { errB.textContent = t('errDivZero'); $('#input-b').classList.add('invalid'); return; } result = a % b; opName = 'a mod b'; }
    steps = `${aStr} (${a})\n${op} ${bStr} (${b})\n= ${result.toString(2)} (${result})`;
  } else {
    // Bitwise
    if (op === 'NOT') {
      a = toBigInt(aStr);
      const bits = Math.max(8, aStr.length);
      const mask = (1n << BigInt(bits)) - 1n;
      result = (~a) & mask;
      opName = '~a';
      steps = `~${aStr} (invert ${bits} bits)\n= ${result.toString(2).padStart(bits, '0')}`;
    } else {
      a = toBigInt(aStr);
      b = toBigInt(bStr);
      const bits = Math.max(aStr.length, bStr.length);
      if (op === 'AND') { result = a & b; opName = 'a AND b'; }
      else if (op === 'OR') { result = a | b; opName = 'a OR b'; }
      else if (op === 'XOR') { result = a ^ b; opName = 'a XOR b'; }
      else if (op === '<<') { result = a << b; opName = 'a << b'; bits = aStr.length + Number(b); }
      else if (op === '>>') { result = a >> b; opName = 'a >> b'; }
      steps = `${aStr.padStart(8, ' ')}\n${op} ${bStr.padStart(8, ' ')}\n= ${result.toString(2)}`;
    }
  }
  const rBin = result.toString(2);
  const rDec = result.toString();
  const rHex = result.toString(16).toUpperCase();
  const rOct = result.toString(8);
  $('#result-main').textContent = rBin || '0';
  $('#base-grid').innerHTML = [
    { l: 'Binary (2)', v: rBin || '0' },
    { l: 'Decimal (10)', v: rDec || '0' },
    { l: 'Hex (16)', v: rHex || '0' },
    { l: 'Octal (8)', v: rOct || '0' },
  ].map(c => `<div class="base-card"><div class="lab">${c.l}</div><div class="val">${c.v}</div></div>`).join('');
  const bits = Math.max(8, rBin.length);
  $('#bits-val').textContent = rBin.padStart(bits, '0').match(/.{1,4}/g).join(' ');
  $('#steps').textContent = steps;
}

function setOp(o) {
  op = o;
  document.querySelectorAll('.op-tabs button').forEach(b => b.classList.toggle('active', b.dataset.op === o));
  $('#op-symbol').textContent = (o === 'mod' ? '%' : o === 'AND' ? '&' : o === 'OR' ? '|' : o === 'XOR' ? '^' : o === '<<' ? '<<' : o === '>>' ? '>>' : o === 'NOT' ? '~' : o);
  if (o === 'NOT') {
    $('#input-b').value = '0'; $('#input-b').disabled = true;
  } else {
    $('#input-b').disabled = false;
  }
  calculate();
}

function setMode(m) {
  mode = m;
  document.querySelectorAll('.op-tabs .mode-btn').forEach(b => b.classList.toggle('active', b.dataset.mode === m));
  renderOps();
  if (m === 'arith') setOp('+');
  else setOp('AND');
}

function renderOps() {
  const tabs = $('#op-tabs');
  tabs.innerHTML = `<button class="mode-btn${mode==='arith'?' active':''}" data-mode="arith">${t('tabArith')}</button><button class="mode-btn${mode==='bitwise'?' active':''}" data-mode="bitwise">${t('tabBitwise')}</button>`;
  const ops = mode === 'arith' ? ARITH : BITW;
  for (const o of ops) {
    const btn = document.createElement('button');
    btn.className = (mode === 'bitwise' ? 'bitwise' : '') + (op === o ? ' active' : '');
    btn.dataset.op = o;
    btn.textContent = t('op' + (o === '+' ? 'Add' : o === '-' ? 'Sub' : o === '*' ? 'Mul' : o === '/' ? 'Div' : o === 'mod' ? 'Mod' : o === 'AND' ? 'And' : o === 'OR' ? 'Or' : o === 'XOR' ? 'Xor' : o === '<<' ? 'Shl' : o === '>>' ? 'Shr' : 'Not'));
    btn.onclick = () => setOp(o);
    tabs.appendChild(btn);
  }
  tabs.querySelectorAll('.mode-btn').forEach(b => b.onclick = () => setMode(b.dataset.mode));
}

function buildPresets() {
  const ps = [
    { a: '1011', b: '1101', l: '11 + 13' },
    { a: '1111', b: '0001', l: '15 − 1' },
    { a: '101', b: '11', l: '5 × 3' },
    { a: '1100', b: '10', l: '12 ÷ 2' },
    { a: '1010', b: '1100', l: '10 AND 12' },
    { a: '1111', b: '0011', l: '15 OR 3' },
  ];
  $('#presets').innerHTML = `<span style="font-size:.78em;opacity:.7;align-self:center">${t('preset')}</span>` + ps.map(p => `<button data-a="${p.a}" data-b="${p.b}">${p.l}</button>`).join('');
  $('#presets').querySelectorAll('button').forEach(b => b.onclick = () => {
    $('#input-a').value = b.dataset.a; $('#input-b').value = b.dataset.b; calculate();
  });
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="GZ.copyText($('#result-main').textContent)">📋 ${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#input-a').value='1011';$('#input-b').value='1101';setOp('+')">🔄 ${t('reset')}</button>`;

$('#input-a').addEventListener('input', calculate);
$('#input-b').addEventListener('input', calculate);

renderOps();
buildPresets();
$('#conv-title').textContent = t('convTitle');
$('#bits-title').textContent = t('bitsTitle');
$('#steps-title').textContent = t('stepsTitle');
$('#result-label').textContent = t('resultLabel');
$('#bits-label').textContent = t('bitsLabelUnsigned');
calculate();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🔢', href:'/convert/number-base.html', name:'Number Base'},
    {icon:'🔤', href:'/convert/number-to-words.html', name:'Number to Words'},
    {icon:'🏛️', href:'/convert/roman-numeral.html', name:'Roman Numeral'},
    {icon:'🧮', href:'/calc/scientific-calculator.html', name:'Scientific Calc'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
