<style>
.aa-tabs{display:flex;gap:6px;flex-wrap:wrap;margin:1rem 0 0.5rem}
.aa-tab{padding:8px 16px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;font-size:.85rem;font-weight:600;transition:all .15s}
.aa-tab.active{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border-color:transparent}
.aa-form{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin:1rem 0}

.aa-field{display:flex;flex-direction:column;gap:6px}
.aa-field label{font-size:.78rem;color:var(--text2);font-weight:600;text-transform:uppercase;letter-spacing:.4px}
.aa-field input,.aa-field select{padding:10px 12px;background:var(--glass2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:.95em;font-family:inherit}
.aa-field input:focus,.aa-field select:focus{outline:none;border-color:var(--accent)}
.aa-tiles{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px;margin:1.2rem 0}
.aa-tile{background:linear-gradient(135deg,var(--glass),var(--glass2));border:1px solid var(--border);border-radius:14px;padding:18px;text-align:center}
.aa-tile.highlight{background:linear-gradient(135deg,rgba(78,205,196,.18),rgba(199,121,255,.12));border-color:var(--accent)}
.aa-tile .num{font-size:1.8em;font-weight:800;color:var(--accent);line-height:1.1;font-family:monospace}
.aa-tile .lbl{font-size:.7rem;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-top:6px;font-weight:600}
.aa-table{margin-top:1rem;background:var(--glass);border:1px solid var(--border);border-radius:12px;padding:14px}
.aa-table h3{margin:0 0 10px;font-size:1rem}
.aa-table table{width:100%;border-collapse:collapse;font-size:.85em;font-family:monospace}
.aa-table th{background:var(--glass2);padding:6px 10px;text-align:right;font-weight:700;color:var(--accent)}
.aa-table th:first-child{text-align:left}
.aa-table td{padding:5px 10px;border-bottom:1px solid var(--border);text-align:right}
.aa-table td:first-child{text-align:left;font-weight:600}
.aa-formula{background:var(--glass2);border-left:3px solid var(--accent);padding:10px 14px;border-radius:6px;font-size:.85em;margin:1rem 0;color:var(--text2);line-height:1.7;font-family:monospace;overflow-x:auto}
.aa-tip{background:var(--glass2);border-left:3px solid var(--accent);padding:10px 14px;border-radius:6px;font-size:.85em;margin:1rem 0 0;color:var(--text2);line-height:1.7}
</style>
<script type="application/ld+json">{"@context":"https://schema.org","@type":"WebApplication","name":"APR / APY Calculator","description":"Convert APR to APY and APY to APR with daily, monthly, quarterly or annual compounding. Free, browser-based.","url":"https://tools.gamezipper.com/calc/apr-apy-calculator.html","applicationCategory":"Utility","operatingSystem":"Web Browser","offers":{"@type":"Offer","price":"0"}}</script>
<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is the difference between APR and APY?", "acceptedAnswer": {"@type": "Answer", "text": "APR (Annual Percentage Rate) is the simple yearly interest rate, ignoring compounding. APY (Annual Percentage Yield) is the effective yearly rate that includes the effect of intra-year compounding. APY is always greater than or equal to APR for the same nominal rate."}}, {"@type": "Question", "name": "How do I convert APR to APY?", "acceptedAnswer": {"@type": "Answer", "text": "APY = (1 + APR / n) ^ n − 1, where n is the number of compounding periods per year. For monthly compounding (n=12), a 5% APR becomes (1 + 0.05/12)^12 − 1 ≈ 5.116% APY. For daily compounding (n=365) it becomes about 5.126% APY."}}, {"@type": "Question", "name": "Which one should I use to compare savings accounts?", "acceptedAnswer": {"@type": "Answer", "text": "Always use APY. Banks are required by US law (Truth in Savings Act) to quote APY on deposit accounts because it reflects what you will actually earn. APR is more useful for loans, where compounding is usually on the unpaid balance."}}, {"@type": "Question", "name": "Why does compounding frequency matter?", "acceptedAnswer": {"@type": "Answer", "text": "More frequent compounding produces a higher APY for the same APR, because interest starts earning interest sooner. A 5% APR compounded daily is worth about 0.011% more per year than the same rate compounded annually — small per year, but meaningful over a decade."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="aa-tabs" id="tabs">
      <button class="aa-tab active" data-mode="apr2apy">APR → APY</button>
      <button class="aa-tab" data-mode="apy2apr">APY → APR</button>
    </div>

    <div class="aa-form">
      <div class="aa-field">
        <label id="lblRate"></label>
        <input type="number" id="rate" value="5" step="0.01" min="0" max="100">
      </div>
      <div class="aa-field">
        <label id="lblCompound"></label>
        <select id="compound">
          <option value="365">Daily (365× / year)</option>
          <option value="12" selected>Monthly (12× / year)</option>
          <option value="24">Semi-monthly (24× / year)</option>
          <option value="52">Weekly (52× / year)</option>
          <option value="4">Quarterly (4× / year)</option>
          <option value="2">Semi-annually (2× / year)</option>
          <option value="1">Annually (1× / year)</option>
          <option value="continuous">Continuous</option>
        </select>
      </div>
    </div>

    <div class="aa-tiles" id="tiles"></div>

    <div class="aa-formula" id="formula"></div>

    <div class="aa-table" id="compTable"></div>

    <div class="aa-tip" id="tip"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'APR / APY Calculator',
    toolDesc: 'Convert between APR (Annual Percentage Rate) and APY (Annual Percentage Yield) with daily, monthly, quarterly, semi-annual, annual or continuous compounding. Perfect for comparing savings, CDs, money market and loan offers.',
    apr2apy: 'APR → APY',
    apy2apr: 'APY → APR',
    rateLabel: 'Rate (%)',
    compoundLabel: 'Compounding',
    apr: 'APR',
    apy: 'APY',
    diff: 'Difference (APY − APR)',
    effectiveAnnual: 'Effective annual rate',
    nominal: 'Nominal annual rate',
    period: 'Periods / year',
    formula: 'Formula',
    apr2apyFormula: 'APY = (1 + APR / n)^n − 1',
    apy2aprFormula: 'APR = n × ((1 + APY)^(1/n) − 1)',
    continuousApr2Apy: 'APY = e^APR − 1',
    continuousApy2Apr: 'APR = ln(1 + APY)',
    comparison: 'Comparison across compounding frequencies',
    freq: 'Frequency',
    periods: 'Periods',
    tip: 'Tip: APY > APR for any compounding other than annual. When comparing savings, CDs or money market accounts, always use APY — it reflects what you will actually earn.',
    step1: 'Enter a rate and pick the compounding frequency',
    step2: 'The tool instantly converts APR to APY (or APY to APR)',
    step3: 'See a comparison table across all common frequencies',
    step4: 'Use APY for deposit accounts and APR for loans',
  },
  zh: {
    toolTitle: 'APR / APY 转换计算器',
    toolDesc: '在年化利率百分比 (APR) 和年化收益率 (APY) 之间互转，支持日、月、季、半年、年和连续复利。适合比较储蓄、定期存单、货币市场和贷款产品。',
    apr2apy: 'APR → APY',
    apy2apr: 'APY → APR',
    rateLabel: '利率 (%)',
    compoundLabel: '复利方式',
    apr: 'APR',
    apy: 'APY',
    diff: '差额 (APY − APR)',
    effectiveAnnual: '有效年化收益率',
    nominal: '名义年化利率',
    period: '每年期数',
    formula: '公式',
    apr2apyFormula: 'APY = (1 + APR / n)^n − 1',
    apy2aprFormula: 'APR = n × ((1 + APY)^(1/n) − 1)',
    continuousApr2Apy: 'APY = e^APR − 1',
    continuousApy2Apr: 'APR = ln(1 + APY)',
    comparison: '不同复利频率对比',
    freq: '频率',
    periods: '每年期数',
    tip: '提示：除按年复利外，APY 始终高于 APR。比较储蓄、CD 或货币市场账户时，请使用 APY — 它反映你实际能赚到的收益。',
    step1: '输入利率并选择复利频率',
    step2: '工具即时转换 APR 和 APY',
    step3: '查看所有常见频率的对比表',
    step4: '存款账户看 APY，贷款看 APR',
  }
});

const { $, t } = GZ;
let mode = 'apr2apy';

document.getElementById('lblRate').textContent = t('rateLabel');
document.getElementById('lblCompound').textContent = t('compoundLabel');

document.querySelectorAll('.aa-tab').forEach(b => b.addEventListener('click', () => {
  document.querySelectorAll('.aa-tab').forEach(x => x.classList.remove('active'));
  b.classList.add('active');
  mode = b.dataset.mode;
  calc();
}));
['rate','compound'].forEach(id => document.getElementById(id).addEventListener('input', calc));
['rate','compound'].forEach(id => document.getElementById(id).addEventListener('change', calc));

const FREQS = [
  {label:'Daily', n:365},
  {label:'Monthly', n:12},
  {label:'Quarterly', n:4},
  {label:'Semi-annually', n:2},
  {label:'Annually', n:1},
  {label:'Continuous', n:'continuous'},
];

function apr2apy(apr, n) {
  if (n === 'continuous') return Math.exp(apr / 100) - 1;
  return Math.pow(1 + (apr / 100) / n, n) - 1;
}
function apy2apr(apy, n) {
  if (n === 'continuous') return Math.log(1 + apy / 100) * 100;
  return n * (Math.pow(1 + apy / 100, 1 / n) - 1) * 100;
}

function calc() {
  const rate = parseFloat(document.getElementById('rate').value) || 0;
  const compound = document.getElementById('compound').value;
  const n = compound === 'continuous' ? 'continuous' : parseInt(compound);
  const tiles = document.getElementById('tiles');
  const formula = document.getElementById('formula');
  const compTable = document.getElementById('compTable');
  const tip = document.getElementById('tip');

  let aprVal, apyVal;
  if (mode === 'apr2apy') {
    aprVal = rate;
    apyVal = apr2apy(rate, n) * 100;
  } else {
    apyVal = rate;
    aprVal = apy2apr(rate, n);
  }
  const diff = apyVal - (mode === 'apr2apy' ? rate : aprVal);

  tiles.innerHTML = `
    <div class="aa-tile ${mode==='apr2apy'?'':'highlight'}"><div class="num">${aprVal.toFixed(4)}%</div><div class="lbl">${t('apr')}</div></div>
    <div class="aa-tile ${mode==='apr2apy'?'highlight':''}"><div class="num">${apyVal.toFixed(4)}%</div><div class="lbl">${t('apy')}</div></div>
    <div class="aa-tile"><div class="num">${diff >= 0 ? '+' : ''}${diff.toFixed(4)}%</div><div class="lbl">${t('diff')}</div></div>
    <div class="aa-tile"><div class="num">${n === 'continuous' ? '∞' : n}</div><div class="lbl">${t('period')}</div></div>
  `;

  let formulaText = '';
  if (n === 'continuous') {
    formulaText = mode === 'apr2apy' ? t('continuousApr2Apy') : t('continuousApy2Apr');
  } else {
    formulaText = mode === 'apr2apy' ? t('apr2apyFormula') : t('apy2aprFormula');
  }
  formula.innerHTML = '<strong>' + t('formula') + ':</strong> ' + formulaText;

  // comparison table
  let rows = '';
  for (const f of FREQS) {
    let a, p;
    if (mode === 'apr2apy') {
      a = rate;
      p = apr2apy(rate, f.n) * 100;
    } else {
      p = rate;
      a = apy2apr(rate, f.n);
    }
    rows += `<tr><td>${f.label}</td><td>${f.n === 'continuous' ? '∞' : f.n}</td><td>${a.toFixed(4)}%</td><td>${p.toFixed(4)}%</td></tr>`;
  }
  compTable.innerHTML = `
    <h3>📊 ${t('comparison')}</h3>
    <table>
      <tr><th>${t('freq')}</th><th>${t('periods')}</th><th>${t('apr')}</th><th>${t('apy')}</th></tr>
      ${rows}
    </table>
    <p class="aa-tip" style="margin-top:10px">${t('tip')}</p>
  `;
  tip.style.display = 'none';
}

calc();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📈', href:'/calc/compound-interest.html', name:'Compound Interest'},
    {icon:'💸', href:'/calc/loan-prepayment.html', name:'Loan Prepayment'},
    {icon:'🏦', href:'/calc/loan-calculator.html', name:'Loan Calculator'},
    {icon:'💰', href:'/calc/savings-goal-calculator.html', name:'Savings Goal'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
