// Drop zone
const dropZone = $('#drop-zone');
const fileInput = $('#file-input');

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('dragover'); addFiles(e.dataTransfer.files); });
fileInput.addEventListener('change', e => { addFiles(e.target.files); fileInput.value = ''; });

function addFiles(files) {
  for (const f of files) {
    if (!f.type.startsWith('image/')) continue;
    if (frameList.length >= 100) break;
    const img = new Image();
    img.onload = () => {
      frameList.push({ img, name: f.name });
      renderFrames();
    };
    img.src = URL.createObjectURL(f);
  }
}

function renderFrames() {
  const container = $('#frames');
  container.innerHTML = '';
  frameList.forEach((frame, i) => {
    const card = document.createElement('div');
    card.className = 'frame-card';
    card.draggable = true;
    card.innerHTML = `<img src="${frame.img.src}" alt="Frame ${i+1}"><div class="info"><span class="idx">#${i+1}</span><button class="remove" title="Remove">×</button></div>`;
    card.querySelector('.remove').addEventListener('click', e => { e.stopPropagation(); frameList.splice(i, 1); renderFrames(); });
    // Drag reorder
    card.addEventListener('dragstart', e => { e.dataTransfer.setData('text/plain', i); card.classList.add('dragging'); });
    card.addEventListener('dragend', () => card.classList.remove('dragging'));
    card.addEventListener('dragover', e => e.preventDefault());
    card.addEventListener('drop', e => {
      e.preventDefault();
      const from = +e.dataTransfer.getData('text/plain');
      const to = i;
      if (from !== to) { const [item] = frameList.splice(from, 1); frameList.splice(to, 0, item); renderFrames(); }
    });
    container.appendChild(card);
  });
}

// GIF Encoder (simple LZW-based)
function generateGIF() {
  if (frameList.length < 2) return alert('Please add at least 2 images.');
  const progress = $('#progress');
  const fill = $('#progress-fill');
  progress.style.display = 'block';
  fill.style.width = '0%';

  const delay = Math.max(20, +$('#delay').value);
  const targetW = +$('#gif-width').value;
  const loopCount = +$('#loop-count').value;
  const quality = +$('#quality').value;

  // Calculate dimensions
  let w, h;
  if (targetW > 0) {
    w = targetW;
    const firstImg = frameList[0].img;
    h = Math.round(firstImg.naturalHeight / firstImg.naturalWidth * w);
  } else {
    w = frameList[0].img.naturalWidth;
    h = frameList[0].img.naturalHeight;
  }
  // Cap at 1200px
  if (w > 1200) { const ratio = 1200 / w; w = 1200; h = Math.round(h * ratio); }
  w = Math.max(1, w); h = Math.max(1, h);

  // Use canvas to get pixel data for each frame
  const canvas = document.createElement('canvas');
  canvas.width = w; canvas.height = h;
  const ctx = canvas.getContext('2d');

  // Build palette and frames
  const allFrames = [];
  let globalPalette = null;

  // Simple quantize: collect all pixels, use median cut
  const allPixels = [];
  for (const frame of frameList) {
    ctx.clearRect(0, 0, w, h);
    ctx.drawImage(frame.img, 0, 0, w, h);
    const data = ctx.getImageData(0, 0, w, h).data;
    const pixels = [];
    for (let i = 0; i < data.length; i += 4) {
      pixels.push([data[i], data[i+1], data[i+2]]);
    }
    allFrames.push(pixels);
  }

  // Simple palette: sample pixels and build 256-color palette
  const palette = buildPalette(allFrames, 256);
  globalPalette = palette;

  // Map each frame to indexed
  const indexed = allFrames.map((pixels, fi) => {
    fill.style.width = ((fi + 1) / allFrames.length * 50) + '%';
    return pixels.map(p => findClosest(p, palette));
  });

  // Build GIF binary
  const bytes = [];
  const push = (...b) => bytes.push(...b);
  const pushLE = (v, n) => { for (let i = 0; i < n; i++) push(v & 0xff, v >> 8); };

  // Header
  push(0x47, 0x49, 0x46, 0x38, 0x39, 0x61); // GIF89a
  pushLE(w, 2); pushLE(h, 2);
  push(0xF7, 0, 0); // GCT flag, 256 colors, bg=0, aspect=0

  // Global Color Table
  for (let i = 0; i < 256; i++) {
    if (i < palette.length) push(...palette[i]);
    else push(0, 0, 0);
  }

  // Netscape extension for looping
  push(0x21, 0xFF, 0x0B);
  push(...[0x4E, 0x45, 0x54, 0x53, 0x43, 0x41, 0x50, 0x45, 0x32, 0x2E, 0x30]); // NETSCAPE2.0
  push(0x03, 0x01);
  push(loopCount & 0xff, loopCount >> 8);
  push(0x00);

  // Frames
  indexed.forEach((frameData, fi) => {
    fill.style.width = (50 + (fi + 1) / indexed.length * 50) + '%';
    // Graphic Control Extension
    push(0x21, 0xF9, 0x04, 0x00);
    push(delay / 10 & 0xff, (delay / 10) >> 8);
    push(0x00, 0x00); // transparent none

    // Image Descriptor
    push(0x2C);
    pushLE(0, 2); pushLE(0, 2); pushLE(w, 2); pushLE(h, 2);
    push(0x00); // no local color table

    // LZW Minimum Code Size
    const minCode = Math.max(2, Math.ceil(Math.log2(palette.length)));
    push(minCode);

    // LZW compress
    const lzwData = lzwEncode(frameData, minCode);
    // Write sub-blocks
    let pos = 0;
    while (pos < lzwData.length) {
      const chunk = lzwData.slice(pos, pos + 255);
      push(chunk.length, ...chunk);
      pos += 255;
    }
    push(0x00); // block terminator
  });

  push(0x3B); // Trailer

  const blob = new Blob([new Uint8Array(bytes)], { type: 'image/gif' });
  const url = URL.createObjectURL(blob);

  const sizeKB = (blob.size / 1024).toFixed(1);
  const sizeMB = (blob.size / 1048576).toFixed(2);
  const sizeStr = blob.size > 1048576 ? `${sizeMB} MB` : `${sizeKB} KB`;

  $('#preview').innerHTML = `<img src="${url}" alt="Generated GIF"><p style="margin-top:8px;font-size:.85em;opacity:.7">${frameList.length} ${t('frames')} · ${sizeStr}</p>`;
  $('#output').innerHTML = `<a href="${url}" download="animation.gif" class="gz-btn">${t('download')}</a>`;
  progress.style.display = 'none';
}

function buildPalette(allFrames, maxColors) {
  // Sample pixels uniformly
  const samples = [];
  const totalPixels = allFrames.reduce((s, f) => s + f.length, 0);
  const step = Math.max(1, Math.floor(totalPixels / 10000));
  let idx = 0;
  for (const frame of allFrames) {
    for (const p of frame) {
      if (idx % step === 0) samples.push(p);
      idx++;
    }
  }
  // Median cut
  return medianCut(samples, maxColors);
}

function medianCut(colors, target) {
  if (colors.length === 0) return [[0,0,0]];
  let boxes = [colors];
  while (boxes.length < target) {
    let bestIdx = -1, bestRange = -1;
    for (let i = 0; i < boxes.length; i++) {
      if (boxes[i].length < 2) continue;
      const ranges = [0,1,2].map(c => {
        const vals = boxes[i].map(p => p[c]);
        return Math.max(...vals) - Math.min(...vals);
      });
      const maxR = Math.max(...ranges);
      if (maxR > bestRange) { bestRange = maxR; bestIdx = i; }
    }
    if (bestIdx === -1) break;
    const box = boxes[bestIdx];
    const ranges = [0,1,2].map(c => { const vals = box.map(p => p[c]); return Math.max(...vals) - Math.min(...vals); });
    const ch = ranges.indexOf(Math.max(...ranges));
    box.sort((a, b) => a[ch] - b[ch]);
    const mid = Math.floor(box.length / 2);
    boxes.splice(bestIdx, 1, box.slice(0, mid), box.slice(mid));
  }
  return boxes.map(box => {
    const n = box.length;
    if (n === 0) return [0, 0, 0];
    const r = Math.round(box.reduce((s, p) => s + p[0], 0) / n);
    const g = Math.round(box.reduce((s, p) => s + p[1], 0) / n);
    const b = Math.round(box.reduce((s, p) => s + p[2], 0) / n);
    return [r, g, b];
  });
}

function findClosest(pixel, palette) {
  let best = 0, bestDist = Infinity;
  for (let i = 0; i < palette.length; i++) {
    const dr = pixel[0] - palette[i][0], dg = pixel[1] - palette[i][1], db = pixel[2] - palette[i][2];
    const d = dr*dr + dg*dg + db*db;
    if (d < bestDist) { bestDist = d; best = i; }
  }
  return best;
}

function lzwEncode(indexStream, minCodeSize) {
  const clearCode = 1 << minCodeSize;
  const eoiCode = clearCode + 1;
  let codeSize = minCodeSize + 1;
  let nextCode = eoiCode + 1;
  const codeLimit = 4096;

  // Initialize dictionary
  let dict = new Map();
  for (let i = 0; i < clearCode; i++) dict.set(String(i), i);

  const output = [];
  let buffer = 0, bitsInBuffer = 0;

  function writeBits(code, size) {
    buffer |= code << bitsInBuffer;
    bitsInBuffer += size;
    while (bitsInBuffer >= 8) {
      output.push(buffer & 0xFF);
      buffer >>= 8;
      bitsInBuffer -= 8;
    }
  }

  writeBits(clearCode, codeSize);

  let current = String(indexStream[0]);
  for (let i = 1; i < indexStream.length; i++) {
    const next = String(indexStream[i]);
    const combined = current + ',' + next;
    if (dict.has(combined)) {
      current = combined;
    } else {
      writeBits(dict.get(current), codeSize);
      if (nextCode < codeLimit) {
        dict.set(combined, nextCode++);
        if (nextCode > (1 << codeSize) && codeSize < 12) codeSize++;
      } else {
        writeBits(clearCode, codeSize);
        dict = new Map();
        for (let j = 0; j < clearCode; j++) dict.set(String(j), j);
        nextCode = eoiCode + 1;
        codeSize = minCodeSize + 1;
      }
      current = next;
    }
  }
  writeBits(dict.get(current), codeSize);
  writeBits(eoiCode, codeSize);
  if (bitsInBuffer > 0) output.push(buffer & 0xFF);

  return output;
}
