<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"What are CSS animations?","acceptedAnswer":{"@type":"Answer","text":"CSS animations allow elements to gradually change from one style to another using @keyframes rules. You can change CSS properties like transform, opacity, color, and position over time."}},{"@type":"Question","name":"How do I create a CSS animation?","acceptedAnswer":{"@type":"Answer","text":"Choose a preset or customize your own keyframes using this generator. Set the duration, timing function, delay, and iteration count, then copy the generated CSS code."}},{"@type":"Question","name":"What is the difference between animation and transition?","acceptedAnswer":{"@type":"Answer","text":"CSS transitions animate between two states triggered by user actions (like hover). CSS animations use @keyframes and can run automatically with multiple steps and loop infinitely."}},{"@type":"Question","name":"Can I use custom keyframes?","acceptedAnswer":{"@type":"Answer","text":"Yes! Select 'Custom' preset and define your own transform and opacity values at 0%, 50%, and 100% keyframes to create unique animations."}}]}</script>

      <div class="gz-anim-box" id="animTarget">A</div>

  </div>

<script>
GZI18n.register({
  en: {
    toolTitle: 'CSS Animation Generator',
    toolDesc: 'Create CSS keyframe animations with visual preview. Choose presets or customize transform, opacity and timing properties.',
    duration: 'Duration (s)',
    timing: 'Timing Function',
    delay: 'Delay (s)',
    iterations: 'Iterations',
    direction: 'Direction',
    copyCode: 'Copy CSS',
    play: '▶ Play',
    stop: '⏹ Stop',
    presets: 'Presets',
    step1: 'Choose an animation preset or create a custom animation',
    step2: 'Adjust duration, timing function, delay and iterations',
    step3: 'Click Play to preview the animation in real-time',
    step4: 'Copy the generated CSS code and @keyframes into your project',
  },
  zh: {
    toolTitle: 'CSS 动画生成器',
    toolDesc: '可视化创建 CSS 关键帧动画。选择预设或自定义变换、透明度和时间属性。',
    duration: '持续时间（秒）',
    timing: '时间函数',
    delay: '延迟（秒）',
    iterations: '重复次数',
    direction: '方向',
    copyCode: '复制 CSS',
    play: '▶ 播放',
    stop: '⏹ 停止',
    presets: '预设动画',
    step1: '选择一个动画预设或创建自定义动画',
    step2: '调整持续时间、时间函数、延迟和重复次数',
    step3: '点击播放实时预览动画效果',
    step4: '将生成的 CSS 代码和 @keyframes 复制到你的项目中',
  }
});

const { $, copyText, t } = GZ;

const TIMINGS = ['linear','ease','ease-in','ease-out','ease-in-out','cubic-bezier(0.68,-0.55,0.27,1.55)'];
const DIRECTIONS = ['normal','reverse','alternate','alternate-reverse'];

const presetAnimations = {
  fade: { name:'Fade In', kf:'@keyframes fadeIn {\n  from { opacity: 0; }\n  to { opacity: 1; }\n}', anim:'fadeIn' },
  fadeOut: { name:'Fade Out', kf:'@keyframes fadeOut {\n  from { opacity: 1; }\n  to { opacity: 0; }\n}', anim:'fadeOut' },
  slideUp: { name:'Slide Up', kf:'@keyframes slideUp {\n  from { transform: translateY(40px); opacity: 0; }\n  to { transform: translateY(0); opacity: 1; }\n}', anim:'slideUp' },
  slideLeft: { name:'Slide Left', kf:'@keyframes slideLeft {\n  from { transform: translateX(40px); opacity: 0; }\n  to { transform: translateX(0); opacity: 1; }\n}', anim:'slideLeft' },
  bounce: { name:'Bounce', kf:'@keyframes bounce {\n  0%, 100% { transform: translateY(0); }\n  50% { transform: translateY(-30px); }\n}', anim:'bounce' },
  rotate: { name:'Rotate', kf:'@keyframes rotate {\n  from { transform: rotate(0deg); }\n  to { transform: rotate(360deg); }\n}', anim:'rotate' },
  scale: { name:'Scale Pulse', kf:'@keyframes scalePulse {\n  0%, 100% { transform: scale(1); }\n  50% { transform: scale(1.2); }\n}', anim:'scalePulse' },
  shake: { name:'Shake', kf:'@keyframes shake {\n  0%, 100% { transform: translateX(0); }\n  25% { transform: translateX(-10px); }\n  75% { transform: translateX(10px); }\n}', anim:'shake' },
  flip: { name:'Flip', kf:'@keyframes flip {\n  0% { transform: perspective(400px) rotateY(0); }\n  100% { transform: perspective(400px) rotateY(360deg); }\n}', anim:'flip' },
  float: { name:'Float', kf:'@keyframes float {\n  0%, 100% { transform: translateY(0); }\n  50% { transform: translateY(-15px); }\n}', anim:'float' },
};

let currentPreset = 'bounce';
let duration = 1;
let timing = 'ease';
let delay = 0;
let iterations = 'infinite';
let direction = 'normal';
let dynStyle = document.createElement('style');
dynStyle.id = 'dyn-anim-style';
document.head.appendChild(dynStyle);

function renderPresets() {
  $('#presets').innerHTML = Object.entries(presetAnimations).map(([k,v]) =>
    `<button class="gz-preset-btn${k===currentPreset?' active':''}" onclick="currentPreset='${k}';renderPresets();update()">${v.name}</button>`
  ).join('');
}

function renderControls() {
  $('#controls').innerHTML = `
    <label>${t('duration')}<input type="range" min="0.1" max="5" step="0.1" value="${duration}" oninput="duration=+this.value;update()"><span>${duration}s</span></label>
    <label>${t('timing')}<select onchange="timing=this.value;update()">${TIMINGS.map(t2=>`<option${t2===timing?' selected':''}>${t2}</option>`).join('')}</select></label>
    <label>${t('delay')}<input type="number" min="0" max="10" step="0.1" value="${delay}" onchange="delay=+this.value;update()"></label>
    <label>${t('iterations')}<select onchange="iterations=this.value;update()"><option value="infinite"${iterations==='infinite'?' selected':''}>infinite</option>${[1,2,3,4,5,10].map(n=>`<option${iterations==n?' selected':''}>${n}</option>`).join('')}</select></label>
    <label>${t('direction')}<select onchange="direction=this.value;update()">${DIRECTIONS.map(d=>`<option${d===direction?' selected':''}>${d}</option>`).join('')}</select></label>
  `;
}

function update() {
  const preset = presetAnimations[currentPreset];
  const kf = preset.kf;
  const animName = preset.anim;
  dynStyle.textContent = kf;

  const box = $('#animTarget');
  box.style.animation = 'none';
  void box.offsetHeight;
  const iterVal = iterations === 'infinite' ? 'infinite' : iterations;
  box.style.animation = `${animName} ${duration}s ${timing} ${delay}s ${iterVal} ${direction}`;

  const css = `${kf}\n\n.animated-element {\n  animation: ${animName} ${duration}s ${timing} ${delay}s ${iterVal} ${direction};\n}`;
  $('#codeOutput').textContent = css;
}

function doStop() {
  const box = $('#animTarget');
  box.style.animation = 'none';
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="update()">${t('play')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doStop()">${t('stop')}</button>
  <button class="gz-btn" onclick="copyText($('#codeOutput').textContent)">${t('copyCode')}</button>`;

renderPresets();
renderControls();
update();

GZ.renderToolPage({
  category: 'css',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📐', href:'/css-tools/flexbox.html', name:'Flexbox'},
    {icon:'🌈', href:'/css-tools/gradient.html', name:'Gradient'},
    {icon:'🔲', href:'/css-tools/shadow.html', name:'Box Shadow'},
    {icon:'📐', href:'/css-tools/grid.html', name:'CSS Grid'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
