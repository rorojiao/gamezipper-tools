<script>
GZI18n.register({
  en: {
    toolTitle: 'Skeleton Screen Generator',
    toolDesc: 'Generate CSS skeleton loading screens with shimmer animation. Choose from card, list, profile and article layouts.',
    type: 'Layout type',
    base: 'Base color',
    highlight: 'Highlight color',
    radius: 'Border radius (px)',
    speed: 'Animation speed (s)',
    htmlLabel: 'HTML',
    cssLabel: 'CSS',
    copyHTML: 'Copy HTML',
    copyCSS: 'Copy CSS',
    step1: 'Choose a skeleton layout type',
    step2: 'Customize colors, radius and animation speed',
    step3: 'Preview the shimmer effect live',
    step4: 'Copy the HTML and CSS to your project',
  },
  zh: {
    toolTitle: '骨架屏生成器',
    toolDesc: '生成带闪烁动画的 CSS 骨架屏。支持卡片、列表、个人资料和文章等多种布局。',
    type: '布局类型',
    base: '基础颜色',
    highlight: '高亮颜色',
    radius: '圆角半径（px）',
    speed: '动画速度（秒）',
    htmlLabel: 'HTML',
    cssLabel: 'CSS',
    copyHTML: '复制 HTML',
    copyCSS: '复制 CSS',
    step1: '选择骨架屏布局类型',
    step2: '自定义颜色、圆角和动画速度',
    step3: '实时预览闪烁效果',
    step4: '复制 HTML 和 CSS 到你的项目',
  }
});

const { $, copyText, t } = GZ;

function getTemplates(type) {
  const base = $('#baseColor').value;
  const hl = $('#highlightColor').value;
  const r = $('#radius').value;
  const sp = $('#speed').value;
  const bg = `linear-gradient(90deg, ${base} 25%, ${hl} 37%, ${base} 63%)`;
  const style = `background:${bg};background-size:400% 100%;animation:sk-shimmer ${sp}s ease infinite;border-radius:${r}px`;

  switch(type) {
    case 'card':
      return {
        html: `<div class="sk-card">
  <div class="sk-img"></div>
  <div class="sk-line" style="width:80%;height:16px"></div>
  <div class="sk-line" style="width:60%;height:12px"></div>
  <div class="sk-line" style="width:90%;height:12px"></div>
</div>`,
        lines: [
          {cls:'sk-img', w:'100%', h:'140px'},
          {cls:'sk-line', w:'80%', h:'16px'},
          {cls:'sk-line', w:'60%', h:'12px'},
          {cls:'sk-line', w:'90%', h:'12px'},
        ]
      };
    case 'list':
      return {
        html: `<div class="sk-list">
  <div class="sk-item"><div class="sk-avatar"></div><div><div class="sk-line" style="width:120px;height:12px"></div><div class="sk-line" style="width:80px;height:10px"></div></div></div>
  <div class="sk-item"><div class="sk-avatar"></div><div><div class="sk-line" style="width:140px;height:12px"></div><div class="sk-line" style="width:90px;height:10px"></div></div></div>
</div>`,
        items: 2
      };
    case 'profile':
      return {
        html: `<div class="sk-profile" style="text-align:center">
  <div class="sk-avatar" style="width:80px;height:80px;margin:0 auto 12px"></div>
  <div class="sk-line" style="width:160px;height:16px;margin:0 auto"></div>
  <div class="sk-line" style="width:120px;height:12px;margin:8px auto"></div>
</div>`,
        profile: true
      };
    case 'article':
      return {
        html: `<div class="sk-article">
  <div class="sk-line" style="width:60%;height:24px;margin-bottom:16px"></div>
  <div class="sk-line" style="width:100%"></div>
  <div class="sk-line" style="width:100%"></div>
  <div class="sk-line" style="width:95%"></div>
  <div class="sk-line" style="width:88%"></div>
  <div class="sk-line" style="width:100%"></div>
  <div class="sk-line" style="width:70%"></div>
</div>`
      };
    case 'table':
      return {
        html: `<div class="sk-table-row" style="display:flex;gap:12px;padding:8px 0">
  <div class="sk-line" style="width:40px;height:40px;border-radius:50%"></div>
  <div class="sk-line" style="width:120px;height:14px;align-self:center"></div>
  <div class="sk-line" style="width:80px;height:14px;align-self:center"></div>
  <div class="sk-line" style="width:60px;height:14px;align-self:center"></div>
</div>`
      };
  }
}

function render() {
  const type = $('#type').value;
  const base = $('#baseColor').value;
  const hl = $('#highlightColor').value;
  const r = $('#radius').value;
  const sp = $('#speed').value;

  // Inject dynamic style
  let styleEl = document.getElementById('sk-dynamic-style');
  if (!styleEl) {
    styleEl = document.createElement('style');
    styleEl.id = 'sk-dynamic-style';
    document.head.appendChild(styleEl);
  }
  const cssRules = `
#skeleton-preview .sk-line,#skeleton-preview .sk-img,#skeleton-preview .sk-avatar{
  background:linear-gradient(90deg, ${base} 25%, ${hl} 37%, ${base} 63%);
  background-size:400% 100%;
  animation:sk-shimmer ${sp}s ease infinite;
  border-radius:${r}px;
}
#skeleton-preview .sk-img{height:140px;margin-bottom:12px}
#skeleton-preview .sk-avatar{width:40px;height:40px;border-radius:50%}
#skeleton-preview .sk-line{height:12px;margin-bottom:8px}
#skeleton-preview .sk-item{display:flex;gap:12px;margin-bottom:16px;align-items:center}
`;
  styleEl.textContent = cssRules + '\n@keyframes sk-shimmer{0%{background-position:100% 0}100%{background-position:-100% 0}}';

  const tmpl = getTemplates(type);
  $('#skeleton-preview').innerHTML = tmpl.html;

  // Output code
  const cssOut = `.sk-line {
  background: linear-gradient(90deg, ${base} 25%, ${hl} 37%, ${base} 63%);
  background-size: 400% 100%;
  animation: sk-shimmer ${sp}s ease infinite;
  border-radius: ${r}px;
  height: 12px;
  margin-bottom: 8px;
}
.sk-img { height: 140px; margin-bottom: 12px; }
.sk-avatar { width: 40px; height: 40px; border-radius: 50%; }

@keyframes sk-shimmer {
  0% { background-position: 100% 0; }
  100% { background-position: -100% 0; }
}`;
  $('#css-output').textContent = cssOut;
  $('#html-output').textContent = tmpl.html;
}

['type','baseColor','highlightColor','radius','speed'].forEach(id => $('#' + id).addEventListener('input', render));

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="copyText(document.getElementById('html-output').textContent)">${t('copyHTML')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="copyText(document.getElementById('css-output').textContent)">${t('copyCSS')}</button>
`;

render();

GZ.renderToolPage({
  category: 'css',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'✨', href:'/css/glassmorphism.html', name:'Glassmorphism'},
    {icon:'🌈', href:'/css/aurora-gradient.html', name:'Aurora Gradient'},
    {icon:'🎨', href:'/css/animation.html', name:'CSS Animation'},
    {icon:'🧊', href:'/css-tools/css-3d-transform.html', name:'3D Transform'},
  ]
});
</script>
