<script>
GZI18n.register({
  en: {
    toolTitle: 'Roof Pitch Calculator',
    toolDesc: 'Convert roof pitch (X-in-12) to degrees, slope percent, and the surface-area multiplier, and compute total roof area from the building footprint. Includes rafter length and a labeled diagram. Ideal for shingles, underlayment, and material take-offs. Free, browser-based.',
    lblRise: 'Rise (inches)',
    lblRun: 'Run (inches)',
    lblFlength: 'Building length (ft)',
    lblFwidth: 'Building width (ft)',
    calc: 'Calculate',
    clear: 'Clear',
    nAngle: 'Roof angle',
    nPitch: 'Pitch ratio',
    nSlope: 'Slope percent',
    nMult: 'Slope multiplier',
    nRafter: 'Rafter length per 12" run',
    nFootprint: 'Footprint area (flat)',
    nArea: 'Roof surface area (both slopes)',
    note: 'Angle = atan(rise ÷ run). Slope multiplier = √(1 + (rise/run)²). Roof area = footprint × multiplier (this covers both roof planes if the footprint is the full building). Standard pitches: 4/12 ≈ 18.4°, 6/12 ≈ 26.6°, 9/12 ≈ 36.9°, 12/12 = 45°. Add 10-15% waste for shingles and underlayment.',
    step1: 'Enter the rise and run of the roof (inches)',
    step2: 'Add the building footprint length and width (feet)',
    step3: 'Read the angle, slope percent, multiplier, and rafter length',
    step4: 'Use the roof surface area to plan shingles and materials',
  },
  zh: {
    toolTitle: '屋顶坡度计算器',
    toolDesc: '将屋顶坡度（X/12）换算为角度、坡度百分比和表面积系数，并根据建筑占地面积计算屋顶总面积。包含椽条长度和示意图。适用于瓦片、防水层和材料预算。免费、浏览器本地运行。',
    lblRise: '垂直升起（英寸）',
    lblRun: '水平跨度（英寸）',
    lblFlength: '建筑长度（英尺）',
    lblFwidth: '建筑宽度（英尺）',
    calc: '计算',
    clear: '清空',
    nAngle: '屋顶角度',
    nPitch: '坡度比',
    nSlope: '坡度百分比',
    nMult: '坡度系数',
    nRafter: '每 12" 跨度的椽条长度',
    nFootprint: '占地面积（平面）',
    nArea: '屋顶表面积（双坡）',
    note: '角度 = atan(升起 ÷ 跨度)。坡度系数 = √(1 + (升起/跨度)²)。屋顶面积 = 占地面积 × 系数（若占地面积为整栋建筑，则覆盖两个坡面）。常见坡度：4/12 ≈ 18.4°，6/12 ≈ 26.6°，9/12 ≈ 36.9°，12/12 = 45°。瓦片和防水层建议增加 10-15% 损耗。',
    step1: '输入屋顶的升起和跨度（英寸）',
    step2: '输入建筑占地的长和宽（英尺）',
    step3: '查看角度、坡度百分比、系数和椽条长度',
    step4: '用屋顶表面积规划瓦片和材料',
  }
});

const { $, t } = GZ;

function fmt(n, u) {
  if (!isFinite(n)) return '—';
  const s = n.toLocaleString(undefined, { maximumFractionDigits: 3 });
  return s + (u ? ' ' + u : '');
}

function gcd(a, b) { return b ? gcd(b, a % b) : a; }

function drawDiagram(rise, run, angle) {
  // ASCII triangle: base = run, height = rise
  const baseBar = '═'.repeat(28);
  const r = Math.min(2, Math.max(1, Math.round(rise / run * 3)));
  const slopeChar = Math.round(angle);
  let lines = [];
  lines.push('           /│');
  for (let i = 0; i < 2; i++) lines.push('          / │');
  lines.push(`   slope /  │ rise = ${rise}"`);
  lines.push('       /    │');
  lines.push('      /─────┘');
  lines.push(`      run = ${run}"   (angle ${angle.toFixed(1)}°)`);
  return lines.join('\n');
}

function calc() {
  const rise = parseFloat($('#rise').value);
  const run = parseFloat($('#run').value);
  const fLength = parseFloat($('#flength').value);
  const fWidth = parseFloat($('#fwidth').value);

  if (!isFinite(rise) || !isFinite(run) || rise < 0 || run <= 0) {
    $('#results').style.display = 'none';
    return;
  }

  const ratio = rise / run;
  const angleRad = Math.atan(ratio);
  const angleDeg = angleRad * 180 / Math.PI;
  const slopePct = ratio * 100;
  const multiplier = Math.sqrt(1 + ratio * ratio);
  // rafter length for a 12" run reference
  const rafter = run === 12 ? 12 * multiplier : 12 * (Math.sqrt(1 + (rise/Math.max(run,1))**2));

  // Footprint & roof area
  let footprint = 0, roofArea = 0;
  if (isFinite(fLength) && isFinite(fWidth) && fLength > 0 && fWidth > 0) {
    footprint = fLength * fWidth;
    // multiplier accounts for one slope plane; total roof = footprint × multiplier (both planes)
    roofArea = footprint * multiplier;
  }

  // Express as standard X-in-12 pitch convention (run normalized to 12)
  const pitchRise12 = (rise / run) * 12;
  const pitchStr = `${+(pitchRise12.toFixed(2))}/12`;

  $('#out-angle').textContent = fmt(angleDeg) + '°';
  $('#out-pitch').textContent = pitchStr;
  $('#out-slope').textContent = fmt(slopePct) + '%';
  $('#out-mult').textContent = fmt(multiplier, '×');
  $('#out-rafter').textContent = fmt(rafter, '"');
  $('#out-footprint').textContent = footprint > 0 ? fmt(footprint, 'ft²') : '—';
  $('#out-area').textContent = roofArea > 0 ? fmt(roofArea, 'ft²') : '—';
  $('#n-angle').textContent = t('nAngle');
  $('#n-pitch').textContent = t('nPitch');
  $('#n-slope').textContent = t('nSlope');
  $('#n-mult').textContent = t('nMult');
  $('#n-rafter').textContent = t('nRafter');
  $('#n-footprint').textContent = t('nFootprint');
  $('#n-area').textContent = t('nArea');

  $('#diagram').textContent = drawDiagram(rise, run, angleDeg);

  $('#results').style.display = 'block';
}

['rise','run','flength','fwidth'].forEach(id => $('#' + id).addEventListener('input', calc));

['lbl-rise','lbl-run','lbl-flength','lbl-fwidth'].forEach((id, i) => {
  $('#' + id).textContent = t(['lblRise','lblRun','lblFlength','lblFwidth'][i]);
});
$('#note').textContent = t('note');

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="calc()">${t('calc')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="['rise','run','flength','fwidth'].forEach(id=>document.getElementById(id).value='0');calc()">${t('clear')}</button>`;

calc();

GZ.renderToolPage({

    {icon:'📐', href:'/calc/triangle-calculator.html', name:'Triangle'},

});
</script>
