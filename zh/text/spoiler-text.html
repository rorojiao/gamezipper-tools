<script>
GZI18n.register({
  en: {
    toolTitle: 'Spoiler Text Generator',
    toolDesc: 'Hide text behind spoiler tags for Reddit, Discord, Markdown and HTML. Generate >!spoiler!<, ||spoiler||, blurred HTML and Unicode black bars — one click copy.',
    lblIn: 'Type or paste the text to hide',
    lblOut: 'Spoiler formats (click Copy)',
    clear: 'Clear',
    copy: 'Copy',
    copied: '✓ Copied!',
    sampleText: 'The cake is a lie',
    redditLabel: 'Reddit spoiler',
    discordLabel: 'Discord spoiler',
    htmlLabel: 'HTML blurred (CSS)',
    blackBarLabel: 'Unicode black bar',
    step1: 'Type or paste the text you want to hide',
    step2: 'Browse the spoiler formats for each platform',
    step3: 'Click Copy next to the format you need',
    step4: 'Paste into Reddit, Discord, your website, etc.',
  },
  zh: {
    toolTitle: '剧透文字生成器',
    toolDesc: '为 Reddit、Discord、Markdown 和 HTML 生成剧透遮挡文字。支持 >!剧透!<、||剧透||、HTML 模糊和 Unicode 黑条 — 一键复制。',
    lblIn: '输入或粘贴要隐藏的文字',
    lblOut: '剧透格式（点击复制）',
    clear: '清空',
    copy: '复制',
    copied: '✓ 已复制！',
    sampleText: '蛋糕是个谎言',
    redditLabel: 'Reddit 剧透',
    discordLabel: 'Discord 剧透',
    htmlLabel: 'HTML 模糊（CSS）',
    blackBarLabel: 'Unicode 黑条',
    step1: '输入或粘贴你想隐藏的文字',
    step2: '浏览各平台的剧透格式',
    step3: '点击所需格式旁的「复制」按钮',
    step4: '粘贴到 Reddit、Discord、网站等',
  }
});

const { $, copyText, t } = GZ;

function render(){
  const input = ($('#input').value || t('sampleText')).trim();
  const formats = [
    {label: t('redditLabel'), tag: 'Reddit', result: '>!' + input + '!<'},
    {label: t('discordLabel'), tag: 'Discord', result: '||' + input + '||'},
    {label: t('htmlLabel'), tag: 'HTML', result: '<span style="filter:blur(6px);cursor:pointer" onclick="this.style.filter=\'none\'">' + escapeHtml(input) + '</span>'},
    {label: t('blackBarLabel'), tag: 'Unicode', result: input.split('').map(c=>'\u2588').join('')},
  ];
  let html = '';
  for(const f of formats){
    html += `<div class="result-box"><div class="result-label">${escapeHtml(f.label)}<span class="platform-tag">${escapeHtml(f.tag)}</span></div><div class="result-text">${escapeHtml(f.result)}</div><button class="gz-btn gz-btn-tool" style="margin-top:8px" data-text="${escapeAttr(f.result)}">${t('copy')}</button></div>`;
  }
  $('#output').innerHTML = html;
  $('#output').querySelectorAll('button[data-text]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      copyText(btn.dataset.text);
      const orig = btn.textContent;
      btn.textContent = t('copied');
      setTimeout(()=>{btn.textContent = orig;}, 1200);
    });
  });
}

function escapeHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function escapeAttr(s){return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

$('#input').addEventListener('input', render);

$('#toolbar').innerHTML = `<button class="gz-btn" id="btn-clear">${t('clear')}</button>`;
$('#btn-clear').addEventListener('click', ()=>{$('#input').value='';render();$('#input').focus();});

render();

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🤫', href:'/text/discord-spoiler.html', name:'Discord Spoiler'},
    {icon:'✨', href:'/text/fancy-text-generator.html', name:'Fancy Text'},
    {icon:'̶', href:'/text/strikethrough-text-generator.html', name:'Strikethrough'},
    {icon:'🔤', href:'/text/wingdings-translator.html', name:'Wingdings'},
  ]
});
</script>
