<script>

  zh: {

    toolDesc: '将 JSON 数据转换为整洁、结构化的 XML 格式，支持语法高亮。',
    rootElement: '根元素',
    jsonValid: '✓ JSON 有效 — 已转换为 XML',
    jsonInvalid: '✗ JSON 无效',
    step1: '在输入区粘贴或输入 JSON 数据',
    step2: '可选修改根元素名称',
    step3: '点击「转换」生成 XML 输出',
    step4: '点击「复制」将 XML 结果复制到剪贴板',
  }
});

const { $, copyText, t } = GZ;

$('#toolbar').innerHTML = `
  <label>${t('rootElement')}: <input id="rootName" class="gz-select" value="root" style="width:80px"></label>
  <button class="gz-btn" onclick="doConvert()">${t('convert')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>
`;

function escapeXml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&apos;');
}

function jsonToXml(obj, indent, tagName) {
  const pad = '  '.repeat(indent);
  let xml = '';

  if (obj === null || obj === undefined) {
    xml += `${pad}<${tagName}/>\n`;
  } else if (typeof obj === 'object' && Array.isArray(obj)) {
    for (const item of obj) {
      xml += jsonToXml(item, indent, tagName);
    }
  } else if (typeof obj === 'object') {
    xml += `${pad}<${tagName}>\n`;
    for (const [key, val] of Object.entries(obj)) {
      const safeKey = /^[a-zA-Z_][a-zA-Z0-9_]*$/.test(key) ? key : '_' + key.replace(/[^a-zA-Z0-9_]/g, '_');
      if (val === null || val === undefined) {
        xml += `${pad}  <${safeKey}/>\n`;
      } else if (typeof val === 'object' && Array.isArray(val)) {
        const childKey = safeKey.replace(/s$/, '');
        for (const item of val) {
          xml += jsonToXml(item, indent + 1, childKey);
        }
      } else if (typeof val === 'object') {
        xml += jsonToXml(val, indent + 1, safeKey);
      } else {
        const escaped = escapeXml(String(val));
        xml += `${pad}  <${safeKey}>${escaped}</${safeKey}>\n`;
      }
    }
    xml += `${pad}</${tagName}>\n`;
  } else {
    xml += `${pad}<${tagName}>${escapeXml(String(obj))}</${tagName}>\n`;
  }
  return xml;
}

function highlightXml(xml) {
  return xml
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/(&lt;\/?)([\w:-]+)/g, '$1<span class="xml-tag">$2</span>')
    .replace(/(&lt;\?[^?]*\?&gt;)/g, '<span class="xml-decl">$1</span>')
    .replace(/(&gt;)([^&<]+)(&lt;)/g, '$1<span class="xml-text">$2</span>$3');
}

function doConvert() {
  const inp = $('#input').value.trim();
  if (!inp) return;
  try {
    const obj = JSON.parse(inp);
    const root = $('#rootName').value.trim() || 'root';
    let xml = '<?xml version="1.0" encoding="UTF-8"?>\n';
    xml += jsonToXml(obj, 0, root);
    $('#output').innerHTML = highlightXml(xml);
    $('#status').innerHTML = `<span style="color:var(--gz-success)">${t('jsonValid')}</span>`;
  } catch(e) {
    $('#status').innerHTML = `<span style="color:var(--gz-accent)">${t('jsonInvalid')}: ${e.message}</span>`;
    $('#output').textContent = '';
  }
}

function loadExample() {
  $('#input').value = JSON.stringify({
    bookstore: {
      name: "GameZipper Books",
      location: "Internet",
      books: [
        { title: "Web Development 101", author: "Alice", price: 29.99, available: true },
        { title: "CSS Mastery", author: "Bob", price: 39.99, available: false }
      ]
    }
  }, null, 2);
  doConvert();
}

function doClear() {
  $('#input').value = '';
  $('#output').textContent = '';
  $('#status').innerHTML = '';
}

$('#input').addEventListener('input', function() {
  // Auto-convert on valid input
  try { JSON.parse(this.value); doConvert(); } catch(e) {}
});
