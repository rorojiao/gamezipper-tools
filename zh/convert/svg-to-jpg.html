<script>
GZI18n.register({
  en: {
    toolTitle: 'SVG to JPG Converter',
    toolDesc: 'Convert SVG files or SVG markup to JPG images. Set the output width, background color and quality, then download a crisp JPG — all in your browser, no upload.',
    dropText: 'Drop an .svg file here or click to choose',
    file: 'Upload file',
    code: 'Paste code',
    width: 'Output width (px)',
    height: 'Height',
    bg: 'Background color',
    quality: 'JPEG quality',
    convert: 'Convert to JPG',
    statusWorking: 'Converting…',
    statusDone: '✓ Converted to JPG',
    statusErr: '✗ Error: ',
    errNoInput: 'Please upload an SVG file or paste SVG code',
    step1: 'Upload an .svg file or switch to "Paste code" and enter your SVG markup',
    step2: 'Set the output width, background color and JPEG quality',
    step3: 'Click Convert to JPG — the SVG renders on a canvas',
    step4: 'Download the JPG file',
  },
  zh: {
    toolTitle: 'SVG 转 JPG 转换器',
    toolDesc: '将 SVG 文件或 SVG 代码转换为 JPG 图片。设置输出宽度、背景色和质量，下载高清 JPG — 完全浏览器本地运行，无需上传。',
    dropText: '拖入 .svg 文件或点击选择',
    file: '上传文件',
    code: '粘贴代码',
    width: '输出宽度（像素）',
    height: '高度',
    bg: '背景颜色',
    quality: 'JPEG 质量',
    convert: '转换为 JPG',
    statusWorking: '正在转换…',
    statusDone: '✓ 已转换为 JPG',
    statusErr: '✗ 错误：',
    errNoInput: '请上传 SVG 文件或粘贴 SVG 代码',
    step1: '上传 .svg 文件，或切换到「粘贴代码」输入 SVG 标记',
    step2: '设置输出宽度、背景色和 JPEG 质量',
    step3: '点击「转换为 JPG」— SVG 将在画布上渲染',
    step4: '下载 JPG 文件',
  }
});

const { $, t } = GZ;
let sourceFile = null, sourceUrl = null, outputUrl = null;

$('#dropText').textContent = t('dropText');

['dragenter','dragover'].forEach(ev => $('#dropzone').addEventListener(ev, e => { e.preventDefault(); $('#dropzone').classList.add('dragover'); }));
['dragleave','drop'].forEach(ev => $('#dropzone').addEventListener(ev, e => { e.preventDefault(); $('#dropzone').classList.remove('dragover'); }));
$('#dropzone').addEventListener('drop', e => { if (e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]); });
$('#fileIn').addEventListener('change', e => { if (e.target.files[0]) loadFile(e.target.files[0]); });
$('#bg').addEventListener('input', e => $('#bgText').value = e.target.value);
$('#bgText').addEventListener('input', e => { if (/^#?[0-9a-fA-F]{3,8}$/.test(e.target.value)) { const v = e.target.value.startsWith('#') ? e.target.value : '#' + e.target.value; $('#bg').value = v; } });

function switchTab(tab) {
  $('#tab-file').classList.toggle('active', tab === 'file');
  $('#tab-code').classList.toggle('active', tab === 'code');
  $('#pane-file').style.display = tab === 'file' ? 'block' : 'none';
  $('#pane-code').style.display = tab === 'code' ? 'block' : 'none';
}

function loadFile(file) {
  sourceFile = file;
  if (sourceUrl) URL.revokeObjectURL(sourceUrl);
  sourceUrl = URL.createObjectURL(file);
  $('#dropText').textContent = file.name + ' (' + (file.size / 1024).toFixed(1) + ' KB)';
}

function getSvgSource() {
  const fileMode = $('#pane-file').style.display !== 'none';
  if (fileMode) {
    if (!sourceUrl) return null;
    return fetch(sourceUrl).then(r => r.text());
  } else {
    const code = $('#svgCode').value.trim();
    return Promise.resolve(code || null);
  }
}

function dimsFromSvg(svgText, targetW) {
  let w = null, h = null, ratio = null;
  const wm = svgText.match(/<svg[^>]*\swidth\s*=\s*"([^"]+)"/i);
  const hm = svgText.match(/<svg[^>]*\sheight\s*=\s*"([^"]+)"/i);
  const vm = svgText.match(/<svg[^>]*\sviewBox\s*=\s*"([^"]+)"/i);
  if (wm) w = parseFloat(wm[1]);
  if (hm) h = parseFloat(hm[1]);
  if (vm) {
    const parts = vm[1].trim().split(/[\s,]+/).map(parseFloat);
    if (parts.length === 4) { ratio = parts[2] / parts[3]; if (!w) w = parts[2]; if (!h) h = parts[3]; }
  }
  if (w && h) ratio = w / h;
  const outW = Math.max(16, Math.min(8192, targetW));
  let outH;
  if (ratio) outH = Math.round(outW / ratio);
  else if (h && w) outH = Math.round(outW * (h / w));
  else outH = 600;
  return { w: outW, h: Math.max(16, Math.min(8192, outH)) };
}

async function convert() {
  $('#status').textContent = t('statusWorking');
  $('#status').className = 'sj-status';
  try {
    const svgText = await getSvgSource();
    if (!svgText || !/<svg[\s\S]*<\/svg>/i.test(svgText)) {
      $('#status').textContent = t('errNoInput');
      $('#status').className = 'sj-status err';
      return;
    }
    const targetW = parseInt($('#width').value, 10) || 1024;
    const { w, h } = dimsFromSvg(svgText, targetW);
    $('#height').value = h + ' px';
    const blob = new Blob([svgText], { type: 'image/svg+xml;charset=utf-8' });
    const svgUrl = URL.createObjectURL(blob);
    const img = await new Promise((resolve, reject) => {
      const im = new Image();
      im.onload = () => resolve(im);
      im.onerror = () => reject(new Error('SVG render failed'));
      im.src = svgUrl;
    });
    const canvas = document.createElement('canvas');
    canvas.width = w; canvas.height = h;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = $('#bgText').value || '#ffffff';
    ctx.fillRect(0, 0, w, h);
    ctx.drawImage(img, 0, 0, w, h);
    URL.revokeObjectURL(svgUrl);
    const q = (parseInt($('#quality').value, 10) || 92) / 100;
    const jpgBlob = await new Promise(resolve => canvas.toBlob(resolve, 'image/jpeg', q));
    if (outputUrl) URL.revokeObjectURL(outputUrl);
    outputUrl = URL.createObjectURL(jpgBlob);
    $('#preview').innerHTML = `<img src="${outputUrl}" alt="result"><div style="color:var(--text2);font-size:.8rem;margin-top:6px">${w}×${h} · ${(jpgBlob.size/1024).toFixed(1)} KB</div>`;
    $('#status').textContent = t('statusDone');
    $('#status').className = 'sj-status ok';
  } catch (e) {
    $('#status').textContent = t('statusErr') + e.message;
    $('#status').className = 'sj-status err';
  }
}

function download() {
  if (!outputUrl) return;
  const base = (sourceFile?.name || 'image').replace(/\.[^.]+$/, '');
  const a = document.createElement('a');
  a.href = outputUrl;
  a.download = base + '.jpg';
  document.body.appendChild(a); a.click(); a.remove();
}

function loadExample() {
  switchTab('code');
  $('#svgCode').value = '<svg xmlns="http://www.w3.org/2000/svg" width="240" height="240" viewBox="0 0 240 240">\n  <defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1">\n    <stop offset="0" stop-color="#4ecdc4"/><stop offset="1" stop-color="#7c5cff"/>\n  </linearGradient></defs>\n  <rect width="240" height="240" rx="40" fill="url(#g)"/>\n  <text x="120" y="135" font-family="Arial" font-size="80" font-weight="bold" fill="#fff" text-anchor="middle">GZ</text>\n</svg>';
}

$('#toolbar').innerHTML = `<button class="gz-btn" onclick="convert()">${t('convert')}</button><button class="gz-btn" onclick="download()">${t('download')}</button><button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>`;

GZ.renderToolPage({
  category: 'convert',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🖼️', href:'/image/svg-to-png.html', name:'SVG to PNG'},
    {icon:'🔗', href:'/convert/svg-to-data-uri.html', name:'SVG to Data URI'},
    {icon:'🖼️', href:'/convert/webp-converter.html', name:'WebP Converter'},
    {icon:'📄', href:'/convert/html-to-pdf.html', name:'HTML to PDF'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
