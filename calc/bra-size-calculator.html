<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "How do I measure my bra size at home?", "acceptedAnswer": {"@type": "Answer", "text": "Measure your band size snugly around your ribcage directly under the bust. Round to the nearest even number. Then measure your bust at the fullest point with a soft tape, keeping it level and not too tight. The difference (bust minus band) determines the cup size."}}, {"@type": "Question", "name": "What is a sister size?", "acceptedAnswer": {"@type": "Answer", "text": "Sister sizes are equivalent cup volumes on different band sizes. For example, 34C has sister sizes 32D and 36B. If a bra feels tight in the band, go up a band and down a cup. If the band rides up, go down a band and up a cup."}}, {"@type": "Question", "name": "Why are bra sizes different in US, UK and EU?", "acceptedAnswer": {"@type": "Answer", "text": "US, UK, EU and Japanese systems use different size increments. UK and US cup letters are the same (A, B, C, D, DD, E, F, FF, G...). EU uses cm-based band numbers (65, 70, 75...) instead of inches. Japan uses cm-based band and cup in cm. This calculator converts between all four."}}]}</script>

<body>
<div class="gz-container">

<script>
GZI18n.register({
  en: {
    toolTitle: 'Bra Size Calculator',
    toolDesc: 'Find your correct bra size in US, UK, EU and Japanese sizing from your bust and band measurements.',
    cm: 'Centimeters (cm)',
    inches: 'Inches (in)',
    band: 'Band size (under bust)',
    bust: 'Bust size (fullest point)',
    system: 'Size system',
    yourSize: 'Your recommended size',
    sisterSize: 'Sister sizes (same cup volume)',
    us: 'US/CA',
    uk: 'UK',
    eu: 'EU',
    jp: 'Japan',
    infoTitle: 'How to measure & fit tips',
    tip1: '📏 <strong>Band:</strong> Measure snugly around ribcage under bust, exhale normally',
    tip2: '📐 <strong>Bust:</strong> Measure at fullest point with soft tape, level and relaxed',
    tip3: '🔄 <strong>Try sister sizes</strong> if the fit is close but not perfect',
    tip4: '✅ <strong>Band check:</strong> Should sit level, not ride up — should fit 2 fingers under',
    tip5: '💧 <strong>Cup check:</strong> No spillover or wrinkling, all breast tissue contained',
    tip6: '👗 <strong>Strap check:</strong> Should not dig in or slip — most support comes from band',
    step1: 'Take your under-bust (band) measurement snugly',
    step2: 'Take your bust measurement at the fullest point',
    step3: 'Pick your size system (US/UK/EU/JP)',
    step4: 'Read your recommended size and sister sizes for fit alternatives',
  },
  zh: {
    toolTitle: '文胸尺码计算器',
    toolDesc: '通过胸围和下胸围测量，在美、英、欧、日四种尺码系统中找到你的正确文胸尺码。',
    cm: '厘米 (cm)',
    inches: '英寸 (in)',
    band: '下胸围（紧贴肋骨下沿）',
    bust: '胸围（最丰满处）',
    system: '尺码系统',
    yourSize: '推荐尺码',
    sisterSize: '姐妹尺码（等罩杯容量）',
    us: '美/加',
    uk: '英',
    eu: '欧',
    jp: '日本',
    infoTitle: '测量方法与试穿建议',
    tip1: '📏 <strong>下胸围：</strong>沿肋骨下沿紧贴测量，正常呼气',
    tip2: '📐 <strong>胸围：</strong>在最丰满处水平放松测量',
    tip3: '🔄 <strong>尝试姐妹尺码</strong>如果合身度接近但不完美',
    tip4: '✅ <strong>下围检查：</strong>应保持水平，不上移 — 应能放入 2 指',
    tip5: '💧 <strong>罩杯检查：</strong>无溢出或褶皱，所有胸部组织包含在内',
    tip6: '👗 <strong>肩带检查：</strong>不应勒紧或滑落 — 主要支撑来自下围',
    step1: '紧贴测量下胸围（紧贴肋骨）',
    step2: '在最丰满处测量胸围',
    step3: '选择尺码系统（美/英/欧/日）',
    step4: '查看推荐尺码和姐妹尺码作为合身替代方案',
  }
});

const { $, t } = GZ;
let unit = 'cm';

$('#u-cm').textContent = t('cm');
$('#u-in').textContent = t('inches');
$('#lbl-band').textContent = t('band');
$('#lbl-bust').textContent = t('bust');
$('#lbl-sys').textContent = t('system');
$('#info-title').textContent = t('infoTitle');

// Cup letter mapping for US/UK (similar but UK goes A, B, C, D, DD, E, F, FF, G, GG, H, HH, J, JJ, K)
// Difference in inches -> cup
// 0 = AA, 1 = A, 2 = B, 3 = C, 4 = D, 5 = DD (US) / DD (UK), 6 = DDD (US) / E (UK), 7 = G (UK) / F (US)
const usCups = ['AA','A','B','C','D','DD','DDD','G','H','I','J','K'];
const ukCups = ['AA','A','B','C','D','DD','E','F','FF','G','GG','H','HH','J','JJ','K'];
const euBand = ['60','65','70','75','80','85','90','95','100','105','110','115','120'];
const jpBand = ['60','65','70','75','80','85','90','95','100','105','110'];

function getBandCM() {
  let v = parseFloat($('#band').value) || 0;
  return unit === 'in' ? v * 2.54 : v;
}
function getBustCM() {
  let v = parseFloat($('#bust').value) || 0;
  return unit === 'in' ? v * 2.54 : v;
}

function roundToEven(n) {
  // Round band to nearest even inch
  return Math.round(n / 2) * 2;
}

function calc() {
  const bandCM = getBandCM();
  const bustCM = getBustCM();
  if (bandCM <= 0 || bustCM <= 0) { $('#result').innerHTML = '<div class="size">—</div>'; $('#sizes').innerHTML = ''; return; }
  const bandIn = bandCM / 2.54;
  const bustIn = bustCM / 2.54;
  // US band: round band in to nearest even number
  const usBand = roundToEven(bandIn);
  // Cup difference
  const diff = bustIn - usBand;
  // Map to cup index (0.5" step)
  let cupIdx = Math.max(0, Math.round(diff - 0) * 2 + Math.floor(diff));
  // Simpler: 1" = A, 2" = B, 3" = C, etc. We use the standard: 0=AA, 1=A, 2=B, 3=C, 4=D, 5=DD, 6=DDD
  cupIdx = Math.max(0, Math.round(diff));
  const usCup = usCups[Math.min(cupIdx, usCups.length - 1)];
  const usSize = `${usBand}${usCup}`;

  // UK
  const ukBand = usBand;
  const ukCup = ukCups[Math.min(cupIdx, ukCups.length - 1)];
  const ukSize = `${ukBand}${ukCup}`;

  // EU band: convert inches to nearest even cm
  const euBandVal = roundToEven(bandCM);
  const euSize = `${euBandVal}${usCup}`;

  // JP: 80A format (band + A cup system, A=10cm difference)
  const jpBandVal = roundToEven(bandCM);
  // JP uses cm difference, ~2.5cm per cup. Use cm diff / 2.5
  const jpDiff = bustCM - jpBandVal;
  const jpCupIdx = Math.max(0, Math.round(jpDiff / 2.5));
  const jpCups = ['A','B','C','D','E','F','G','H','I','J'];
  const jpCup = jpCups[Math.min(jpCupIdx, jpCups.length - 1)];
  const jpSize = `${jpBandVal}${jpCup}`;

  // Sister sizes
  const sisterSizes = [];
  for (let d = -2; d <= 2; d += 2) {
    if (d === 0) continue;
    const newBand = usBand + d;
    const newCupIdx = cupIdx - d / 2;
    if (newCupIdx < 0 || newCupIdx >= usCups.length) continue;
    sisterSizes.push(`${newBand}${usCups[newCupIdx]}`);
  }

  $('#size-main').textContent = usSize;
  $('#size-lbl').textContent = t('yourSize') + ' (US)';
  $('#sister').textContent = sisterSizes.length ? t('sisterSize') + ': ' + sisterSizes.join(' · ') : '';

  $('#sizes').innerHTML = `
    <div class="size-card"><div class="country">${t('us')}</div><div class="val">${usSize}</div></div>
    <div class="size-card"><div class="country">${t('uk')}</div><div class="val">${ukSize}</div></div>
    <div class="size-card"><div class="country">${t('eu')}</div><div class="val">${euSize}</div></div>
    <div class="size-card"><div class="country">${t('jp')}</div><div class="val">${jpSize}</div></div>
  `;

  $('#tips').innerHTML = [
    t('tip1'), t('tip2'), t('tip3'),
    t('tip4'), t('tip5'), t('tip6')
  ].map(x => `<div class="bra-tip">${x}</div>`).join('');
}

function setUnit(u) {
  unit = u;
  document.querySelectorAll('#unit-tabs .bra-tab').forEach(b => b.classList.remove('active'));
  document.querySelector(`#unit-tabs .bra-tab[data-u="${u}"]`).classList.add('active');
  if (u === 'cm') { $('#band').value = 80; $('#bust').value = 95; }
  else { $('#band').value = 32; $('#bust').value = 38; }
  calc();
}

document.querySelectorAll('#unit-tabs .bra-tab').forEach(btn => {
  btn.addEventListener('click', () => setUnit(btn.dataset.u));
});
$('#system').addEventListener('change', calc);

calc();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'👟', href:'/convert/shoe-size.html', name:'Shoe Size'},
    {icon:'💍', href:'/convert/ring-size.html', name:'Ring Size'},
    {icon:'⚖️', href:'/calc/bmi-calculator.html', name:'BMI Calculator'},
    {icon:'🔥', href:'/calc/tdee-calculator.html', name:'TDEE Calculator'},
  ]
});
</script>
<script src="/tools-result-rec.js?v=20260707v520" defer></script>
</body>
