<div class="gz-container">

        <h3>🔢 Square Root Calculator</h3>
        <div class="sr-formula"><b>Formula:</b> √x = y where y × y = x</div>
        <div class="sr-inputs">
          <div class="sr-input"><label>Number (x)<input type="number" id="f-num" value="144" step="any"></label></div>
          <div class="sr-input"><label>Root degree (n) — 2 = √, 3 = ∛<input type="number" id="f-root" value="2" min="1" step="1"></label></div>
        </div>
        <div class="sr-err" id="err"></div>
        <div class="sr-result">
          <div class="sr-result-text" id="result-text">Result</div>

      </div>
      <div class="sr-card">
        <h3>📝 All Roots</h3>
        <table class="sr-table" id="roots-table">
          <tr><th>Operation</th><th>Result</th></tr>
          <tr><td>√ (square root)</td><td id="r-sqrt">—</td></tr>
          <tr><td>∛ (cube root)</td><td id="r-cbrt">—</td></tr>
          <tr><td>x² (squared)</td><td id="r-sq">—</td></tr>
          <tr><td>x³ (cubed)</td><td id="r-cube">—</td></tr>
        </table>
        <div class="sr-steps" id="steps">Enter a number to see the breakdown.</div>

</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Square Root Calculator',
    toolDesc: 'Calculate the square root, cube root or any nth root of a number instantly. Handles negative numbers (imaginary), decimals and large numbers. Step-by-step breakdown — free, private and browser-based.',
    step1: 'Enter the number you want to find the root of',
    step2: 'Optionally change the root degree (2 for square root, 3 for cube root, etc.)',
    step3: 'The result and all related roots update instantly',
    step4: 'Use Copy to copy the result to your clipboard',
  },
  zh: {
    toolTitle: '平方根计算器',
    toolDesc: '即时计算数字的平方根、立方根或任意 n 次方根。支持负数（虚数）、小数和大数。提供逐步分解 — 免费、私密、浏览器本地运行。',
    step1: '输入你想求根的数字',
    step2: '可选：修改根的次数（2 为平方根，3 为立方根等）',
    step3: '结果和所有相关根即时更新',
    step4: '点击「复制」将结果复制到剪贴板',
  }
});

const { $, copyText, t } = GZ;

function fmt(n) {
  if (!isFinite(n)) return '∞';
  if (isNaN(n)) return '—';
  return parseFloat(n.toFixed(10)).toString();
}

function calculate() {
  const err = $('#err');
  err.textContent = '';
  const x = parseFloat($('#f-num').value);
  const rootN = parseInt($('#f-root').value);

  if (isNaN(x)) { err.textContent = '⚠ Enter a valid number'; return; }
  if (isNaN(rootN) || rootN < 1) { err.textContent = '⚠ Root degree must be ≥ 1'; return; }

  // All roots table
  if (x >= 0) {
    $('#r-sqrt').textContent = fmt(Math.sqrt(x));
  } else {
    $('#r-sqrt').textContent = fmt(Math.sqrt(-x)) + 'i';
  }
  $('#r-cbrt').textContent = fmt(Math.cbrt(x));
  $('#r-sq').textContent = fmt(x * x);
  $('#r-cube').textContent = fmt(x * x * x);

  // Main result: nth root
  let result, resultText, steps;
  const sign = x < 0 ? '−' : '';
  const absX = Math.abs(x);

  if (x < 0 && rootN % 2 === 0) {
    // Even root of negative = imaginary
    const real = Math.pow(absX, 1 / rootN);
    result = fmt(real) + 'i';
    resultText = `${rootN === 2 ? '√' : rootN + '√'}(${sign}${absX}) =`;
    steps = `Input: ${x}\nRoot: ${rootN}\n\nEven root of a negative number = imaginary result\n|${x}|^(1/${rootN}) = ${fmt(absX)}^(1/${rootN}) = ${fmt(real)}\nResult: ${fmt(real)}i`;
  } else {
    const val = x < 0 ? -Math.pow(absX, 1/rootN) : Math.pow(x, 1/rootN);
    result = fmt(val);
    const symbol = rootN === 2 ? '√' : rootN === 3 ? '∛' : rootN + '√';
    resultText = `${symbol}(${fmt(x)}) =`;
    steps = `Input: ${x}\nRoot degree: ${rootN}\n\n${symbol}${x} = ${x}^(1/${rootN})\n         = ${fmt(val)}\n`;
    // Verification
    const verify = Math.pow(val, rootN);
    steps += `\nCheck: (${fmt(val)})^${rootN} = ${fmt(verify)}`;
    if (Math.abs(verify - x) < 0.001) steps += ' ✓';
  }

  $('#result-text').textContent = resultText;
  $('#result-value').textContent = result;
  $('#steps').textContent = steps;
}

function loadExample() { $('#f-num').value = 1728; $('#f-root').value = 3; calculate(); }
function doClear() { $('#f-num').value = ''; $('#f-root').value = 2; calculate(); }

$('#f-num').addEventListener('input', calculate);
$('#f-root').addEventListener('input', calculate);

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn" onclick="copyText($('#result-value').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🔢', href:'/calc/exponent-calculator.html', name:'Exponent Calculator'},
    {icon:'📊', href:'/calc/mean-median-mode-calculator.html', name:'Mean Median Mode'},
    {icon:'📈', href:'/calc/standard-deviation-calculator.html', name:'Standard Deviation'},
    {icon:'🧮', href:'/calc/factorial-calculator.html', name:'Factorial Calculator'},
  ]
});

calculate();
</script>
