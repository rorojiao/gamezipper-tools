      <div id="path-jsonpath" class="path-row"><span style="font-size:.75em;opacity:.6;width:60px">JSONPath:</span><code></code><button class="gz-btn" style="padding:2px 8px;font-size:.7em" onclick="copyText(this.previousElementSibling.textContent)">Copy</button></div>
      <div id="path-value" class="path-row"><span style="font-size:.75em;opacity:.6;width:60px">value:</span><code></code><button class="gz-btn" style="padding:2px 8px;font-size:.7em" onclick="copyText(this.previousElementSibling.textContent)">Copy</button></div>

<script>
GZI18n.register({
  en: {
    toolTitle: 'JSON Path Finder & Explorer',
    toolDesc: 'Explore any JSON structure and find the path to any value. Click nodes to get JSONPath, dot-notation and bracket-notation paths.',
    inputLabel: 'JSON Input',
    treeLabel: 'JSON Tree (click a node)',
    step1: 'Paste or type your JSON data in the input area',
    step2: 'The tree view renders automatically on the right',
    step3: 'Click any node in the tree to select it',
    step4: 'Copy the path in dot, bracket or JSONPath format',
  },
  zh: {
    toolTitle: 'JSON 路径查找器',
    toolDesc: '探索 JSON 结构并找到任意值的路径。点击节点获取 JSONPath、点号路径和方括号路径。',
    inputLabel: 'JSON 输入',
    treeLabel: 'JSON 树形结构（点击节点）',
    step1: '在输入区粘贴或输入 JSON 数据',
    step2: '右侧自动渲染树形视图',
    step3: '点击树中的任意节点选中',
    step4: '以点号、方括号或 JSONPath 格式复制路径',
  }
});

const { $, copyText, t } = GZ;

$('#lbl-in').textContent = t('inputLabel');
$('#lbl-tree').textContent = t('treeLabel');

let parsed = null;

function parseAndRender() {
  const inp = $('#input').value.trim();
  if (!inp) { $('#tree').innerHTML = ''; $('#path-output').style.display = 'none'; return; }
  try {
    parsed = JSON.parse(inp);
    $('#tree').innerHTML = '';
    renderTree(parsed, [], $('#tree'));
    $('#status').innerHTML = `<span style="color:var(--gz-success)">✓ Valid JSON — ${typeof parsed === 'object' ? (Array.isArray(parsed) ? parsed.length + ' items' : Object.keys(parsed).length + ' keys') : 'primitive value'}</span>`;
  } catch(e) {
    $('#tree').innerHTML = `<span style="color:var(--gz-accent)">${e.message}</span>`;
    $('#status').innerHTML = `<span style="color:var(--gz-accent)">✗ Invalid JSON</span>`;
    $('#path-output').style.display = 'none';
  }
}

function renderTree(obj, path, parent, depth = 0) {
  if (depth > 50) return;

  if (obj === null) {
    const span = mkNode('null', path, 'val-null');
    parent.appendChild(span);
    return;
  }

  if (typeof obj !== 'object') {
    const cls = typeof obj === 'string' ? 'val-str' : typeof obj === 'number' ? 'val-num' : typeof obj === 'boolean' ? 'val-bool' : '';
    const display = typeof obj === 'string' ? `"${obj.length > 80 ? obj.slice(0,80) + '…' : obj}"` : String(obj);
    const span = mkNode(display, path, cls);
    parent.appendChild(span);
    return;
  }

  const isArray = Array.isArray(obj);
  const entries = isArray ? obj.map((v, i) => [i, v]) : Object.entries(obj);
  const open = isArray ? '[' : '{';
  const close = isArray ? ']' : '}';

  if (entries.length === 0) {
    const span = mkNode(open + close, path, 'bracket');
    parent.appendChild(span);
    return;
  }

  // Collapsible container
  const container = document.createElement('div');
  container.style.marginLeft = depth > 0 ? '16px' : '0';

  const toggle = document.createElement('span');
  toggle.className = 'bracket';
  toggle.style.cursor = 'pointer';
  toggle.textContent = '▾ ' + open;
  toggle.onclick = () => {
    const body = container.querySelector('.tree-body');
    const collapsed = body.style.display === 'none';
    body.style.display = collapsed ? '' : 'none';
    toggle.textContent = (collapsed ? '▾ ' : '▸ ') + open;
  };
  container.appendChild(toggle);

  const body = document.createElement('div');
  body.className = 'tree-body';
  body.style.marginLeft = '12px';

  entries.forEach(([key, val]) => {
    const line = document.createElement('div');
    const keySpan = document.createElement('span');
    keySpan.className = 'key';
    keySpan.textContent = typeof key === 'number' ? `${key}: ` : `"${key}": `;
    line.appendChild(keySpan);
    const childPath = [...path, key];
    renderTree(val, childPath, line, depth + 1);
    body.appendChild(line);
  });

  container.appendChild(body);

  const closeSpan = document.createElement('span');
  closeSpan.className = 'bracket';
  closeSpan.textContent = close;
  container.appendChild(closeSpan);

  parent.appendChild(container);
}

function mkNode(text, path, cls) {
  const span = document.createElement('span');
  span.className = 'node ' + cls;
  span.textContent = text;
  span.onclick = (e) => {
    e.stopPropagation();
    document.querySelectorAll('#tree .node.selected').forEach(n => n.classList.remove('selected'));
    span.classList.add('selected');
    showPath(path);
  };
  span.dataset.path = JSON.stringify(path);
  return span;
}

function showPath(path) {
  const po = $('#path-output');
  po.style.display = '';

  const dotPath = path.map(k => typeof k === 'number' ? `[${k}]` : /^[a-zA-Z_$][a-zA-Z0-9_$]*$/.test(k) ? k : `['${k}']`).join('.').replace(/\.\[/g, '[');
  const bracketPath = path.map(k => `['${k}']`).join('');
  const jsonPath = '$' + path.map(k => typeof k === 'number' ? `[${k}]` : /^[a-zA-Z_$][a-zA-Z0-9_$]*$/.test(k) ? '.' + k : `['${k}']`).join('');

  let value = parsed;
  for (const k of path) { value = value[k]; }
  const valueStr = typeof value === 'object' ? JSON.stringify(value, null, 2).slice(0, 200) : String(value);

  po.querySelector('#path-dot code').textContent = dotPath || '(root)';
  po.querySelector('#path-bracket code').textContent = bracketPath || '(root)';
  po.querySelector('#path-jsonpath code').textContent = jsonPath || '$';
  po.querySelector('#path-value code').textContent = valueStr.length > 200 ? valueStr.slice(0, 200) + '…' : valueStr;
}

function loadExample() {
  $('#input').value = JSON.stringify({
    "name": "GameZipper Tools",
    "version": "2.0",
    "config": {
      "theme": "dark",
      "languages": ["en", "zh", "ja"],
      "features": {
        "seo": true,
        "analytics": true,
        "categories": 12
      }
    },
    "tools": [
      {"id": "json", "name": "JSON Formatter", "users": 50000},
      {"id": "base64", "name": "Base64 Encoder", "users": 35000}
    ],
    "stats": {"totalTools": 528, "dailyUsers": 12000}
  }, null, 2);
  parseAndRender();
}

function doClear() {
  $('#input').value = '';
  $('#tree').innerHTML = '';
  $('#path-output').style.display = 'none';
  $('#status').innerHTML = '';
}

$('#input').addEventListener('input', parseAndRender);

$('#toolbar').innerHTML = `
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example') || 'Example'}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear') || 'Clear'}</button>`;

GZ.renderToolPage({
  category: 'dev',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📋', href:'/dev/json.html', name:'JSON Formatter'},
    {icon:'🌳', href:'/dev/json-tree.html', name:'JSON Tree'},
    {icon:'🧭', href:'/dev/jsonpath.html', name:'JSONPath Tester'},
  ]
});
</script>
