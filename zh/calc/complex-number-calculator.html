<script>
GZI18n.register({

    step4: 'Read the result in rectangular, polar and exponential form, plus the steps',
  },
  zh: {
    toolTitle: '复数计算器',
    toolDesc: '复数加减乘除，以及共轭、模、辐角、幂和平方根。附分步过程 — 免费、浏览器本地运行。',
    add: '加法  z₁ + z₂',
    sub: '减法  z₁ − z₂',
    mul: '乘法  z₁ · z₂',
    div: '除法  z₁ ÷ z₂',
    conj: '共轭  z̄₁',
    mod: '模  |z₁|',
    arg: '辐角  arg(z₁)',
    pow: '幂  z₁ⁿ',
    sqrt: '平方根  √z₁',
    lblN: '指数 n =',
    needZ2: '此运算需要第二个复数 z₂。',
    divZero: '不能除以零。',
    result: '结果',
    steps: '步骤',
    rectForm: '直角坐标形式',
    polarForm: '极坐标形式',
    expForm: '指数形式',
    conjResult: 'z₁ 的共轭复数将虚部取反。',
    modStep: '|z₁| = √(a² + b²) = √(%1² + %2²)',
    argStep: 'arg(z₁) = atan2(b, a) = atan2(%2, %1)',
    sqrtStep: '使用极坐标形式 r·e^(iθ) 计算主平方根 → √r·e^(iθ/2)。',
    step1: '输入 z₁ 的实部和虚部（双数运算还需 z₂）',
    step2: '从按钮网格选择运算 — 一元运算会忽略 z₂',
    step3: '幂运算时设置指数 n 并选择 z₁ⁿ',
    step4: '查看直角坐标、极坐标和指数形式的结果，以及步骤',
  }
});

const { $, copyText, t } = GZ;
let currentOp = 'add';

// ---- complex helpers ----
function fmt(n){
  if(Math.abs(n) < 1e-12) n = 0;
  if(Number.isInteger(n)) return String(n);
  return (Math.round(n*1e6)/1e6).toString();
}
function rect(a,b){ // to string a + bi
  if(b===0) return fmt(a);
  if(a===0) return b===1?'i':b===-1?'-i':fmt(b)+'i';
  const sign = b<0?' − ':' + ';
  const bi = Math.abs(b)===1?'i':fmt(Math.abs(b))+'i';
  return fmt(a)+sign+bi;
}
function polar(a,b){
  const r = Math.hypot(a,b);
  const th = Math.atan2(b,a);
  const deg = th*180/Math.PI;
  const rS = fmt(Math.round(r*1e6)/1e6);
  const thR = fmt(Math.round(th*1e6)/1e6);
  const thD = fmt(Math.round(deg*1e6)/1e6);
  return `${rS} · (cos ${thR} + i sin ${thR})  ≈  ${rS} ∠ ${thD}°`;
}
function expForm(a,b){
  const r = Math.hypot(a,b);
  const th = Math.atan2(b,a);
  return `${fmt(Math.round(r*1e6)/1e6)}·e^(i·${fmt(Math.round(th*1e6)/1e6)})`;
}
// multiply complex
function cmul(a,b,c,d){ return [a*c - b*d, a*d + b*c]; }
// power integer
function cpowInt(a,b,n){
  let ra=1, rb=0;
  // handle negative via inverse
  let neg = n<0;
  let m = Math.abs(n);
  let base = [a,b];
  for(let i=0;i<m;i++){ [ra,rb] = cmul(ra,rb,base[0],base[1]); }
  if(neg){
    const denom = a*a+b*b;
    ra = ra/denom; rb = -rb/denom;
  }
  return [ra,rb];
}

function getZ1(){ return [+$('#r1').value||0, +$('#i1').value||0]; }
function getZ2(){ return [+$('#r2').value||0, +$('#i2').value||0]; }

function render(ra,rb, steps){
  $('#result').innerHTML = `<div class="res-box">
    <div style="font-size:.8em;color:var(--text2)">${t('result')}</div>
    <div class="big">${rect(ra,rb)}</div>
    <div class="sub"><strong>${t('rectForm')}:</strong> <code>${rect(ra,rb)}</code></div>
    <div class="sub"><strong>${t('polarForm')}:</strong> <code>${polar(ra,rb)}</code></div>
    <div class="sub"><strong>${t('expForm')}:</strong> <code>${expForm(ra,rb)}</code></div>
    ${steps ? `<div class="steplist"><strong>${t('steps')}:</strong><br>${steps}</div>` : ''}
  </div>`;
}

function compute(op){
  currentOp = op;
  document.querySelectorAll('#opgrid button').forEach(b=>b.classList.toggle('active', b.dataset.op===op));
  const unary = ['conj','mod','arg','sqrt'].includes(op);
  $('#z2row').style.display = unary ? 'none':'flex';
  $('#prow').style.display = op==='pow'?'flex':'none';

  let [a,b] = getZ1();
  let steps = '';
  let ra, rb;

  if(op==='add'){
    let [c,d] = getZ2();
    ra = a+c; rb = b+d;
    steps = `(${rect(a,b)}) + (${rect(c,d)}) = (${fmt(a)}+${fmt(c)}) + (${fmt(b)}+${fmt(d)})i = <strong>${rect(ra,rb)}</strong>`;
  } else if(op==='sub'){
    let [c,d] = getZ2();
    ra = a-c; rb = b-d;
    steps = `(${rect(a,b)}) − (${rect(c,d)}) = (${fmt(a)}−${fmt(c)}) + (${fmt(b)}−${fmt(d)})i = <strong>${rect(ra,rb)}</strong>`;
  } else if(op==='mul'){
    let [c,d] = getZ2();
    [ra,rb] = cmul(a,b,c,d);
    steps = `(${rect(a,b)})(${rect(c,d)}) = ${fmt(a)}·${fmt(c)} + ${fmt(a)}·${fmt(d)}i + ${fmt(b)}i·${fmt(c)} + ${fmt(b)}i·${fmt(d)}i²<br>
      = (${fmt(a*c)} − ${fmt(b*d)}) + (${fmt(a*d)} + ${fmt(b*c)})i  &nbsp; [since i² = −1] = <strong>${rect(ra,rb)}</strong>`;
  } else if(op==='div'){
    let [c,d] = getZ2();
    const denom = c*c + d*d;
    if(denom === 0){ $('#result').innerHTML = `<div class="err">${t('divZero')}</div>`; return; }
    // multiply num and denom by conjugate of z2
    const [nr,ni] = cmul(a,b,c,-d);
    ra = nr/denom; rb = ni/denom;
    steps = `(${rect(a,b)}) ÷ (${rect(c,d)}) = ((${rect(a,b)})(${rect(c,-d)})) ÷ ((${rect(c,d)})(${rect(c,-d)}))<br>
      = ${rect(nr,ni)} ÷ ${fmt(denom)} = <strong>${rect(ra,rb)}</strong>`;
  } else if(op==='conj'){
    ra = a; rb = -b;
    steps = t('conjResult') + ` → ${rect(a,b)} → <strong>${rect(ra,rb)}</strong>`;
  } else if(op==='mod'){
    const r = Math.hypot(a,b);
    $('#result').innerHTML = `<div class="res-box">
      <div style="font-size:.8em;color:var(--text2)">${t('result')}</div>
      <div class="big">|z₁| = ${fmt(Math.round(r*1e6)/1e6)}</div>
      <div class="steplist"><strong>${t('steps')}:</strong><br>${t('modStep').replace('%1',fmt(a)).replace('%2',fmt(b))} = <strong>${fmt(Math.round(r*1e6)/1e6)}</strong></div></div>`;
    return;
  } else if(op==='arg'){
    const th = Math.atan2(b,a);
    const deg = th*180/Math.PI;
    $('#result').innerHTML = `<div class="res-box">
      <div style="font-size:.8em;color:var(--text2)">${t('result')}</div>
      <div class="big">arg(z₁) = ${fmt(Math.round(th*1e6)/1e6)} rad ≈ ${fmt(Math.round(deg*1e6)/1e6)}°</div>
      <div class="steplist"><strong>${t('steps')}:</strong><br>${t('argStep').replace('%1',fmt(a)).replace('%2',fmt(b))} = <strong>${fmt(Math.round(th*1e6)/1e6)} rad</strong></div></div>`;
    return;
  } else if(op==='pow'){
    const n = +$('#pwr').value||0;
    if(Number.isInteger(n)){
      [ra,rb] = cpowInt(a,b,n);
      steps = `z₁${n>=0?'ⁿ':'ⁿ'} = z₁ repeated multiply (${n<0?'reciprocal · ':''}${Math.abs(n)}×) → <strong>${rect(ra,rb)}</strong>`;
    } else {
      // fractional power via De Moivre
      const r = Math.hypot(a,b);
      const th = Math.atan2(b,a);
      const rn = Math.pow(r, n);
      ra = rn*Math.cos(n*th); rb = rn*Math.sin(n*th);
      steps = `Using De Moivre: r^n·(cos(nθ) + i sin(nθ)), r=${fmt(Math.round(r*1e6)/1e6)}, θ=${fmt(Math.round(th*1e6)/1e6)} → <strong>${rect(ra,rb)}</strong>`;
    }
  } else if(op==='sqrt'){
    // principal sqrt
    const r = Math.hypot(a,b);
    const th = Math.atan2(b,a);
    const sr = Math.sqrt(r);
    ra = sr*Math.cos(th/2); rb = sr*Math.sin(th/2);
    steps = t('sqrtStep') + `<br>r=${fmt(Math.round(r*1e6)/1e6)}, √r=${fmt(Math.round(sr*1e6)/1e6)}, θ=${fmt(Math.round(th*1e6)/1e6)} → <strong>${rect(ra,rb)}</strong>`;
  }
  if(ra===undefined){ $('#result').innerHTML=''; return; }
  render(ra, rb, steps);
}

const ops = [['add','➕'],['sub','➖'],['mul','✖️'],['div','➗'],['conj','z̄'],['mod','|z|'],['arg','arg'],['pow','zⁿ'],['sqrt','√z']];
$('#opgrid').innerHTML = ops.map(([k,_])=>`<button data-op="${k}" onclick="compute('${k}')">${t(k)}</button>`).join('');

$('#lbl-n').textContent = t('lblN');
['r1','i1','r2','i2','pwr'].forEach(id=>$('#'+id).addEventListener('input', ()=>compute(currentOp)));

compute('add');
</script>
