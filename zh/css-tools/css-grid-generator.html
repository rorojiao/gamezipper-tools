<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="controls" id="controls">
      <div class="ctrl"><label id="lbl-cols"></label><input type="number" id="cols" value="3" min="1" max="12"></div>
      <div class="ctrl"><label id="lbl-rows"></label><input type="number" id="rows" value="3" min="1" max="12"></div>
      <div class="ctrl"><label id="lbl-gap"></label><input type="number" id="gap" value="10" min="0" max="50"></div>
      <div class="ctrl"><label id="lbl-unit"></label><select id="unit"><option value="fr">fr</option><option value="px">px</option><option value="%">%</option><option value="auto">auto</option></select></div>
      <div class="ctrl"><label id="lbl-height"></label><input type="text" id="height" value="auto" placeholder="auto / 100vh / 500px"></div>
    </div>
    <div class="grid-preview" id="grid-preview"></div>
    <div class="tab-btns">
      <button class="active" data-tab="css">CSS</button>
      <button data-tab="html">HTML</button>
    </div>
    <div class="code-output" id="code-output"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'CSS Grid Generator',
    toolDesc: 'Design CSS Grid layouts visually — set rows, columns, gap and units. Preview in real time and copy production-ready CSS + HTML code.',
    copyCss: '📋 Copy CSS',
    copyHtml: '📋 Copy HTML',
    reset: '🔄 Reset',
    lblCols: 'Columns',
    lblRows: 'Rows',
    lblGap: 'Gap (px)',
    lblUnit: 'Column Unit',
    lblHeight: 'Container Height',
    step1: 'Set columns, rows, gap and unit',
    step2: 'Preview the grid layout in real time',
    step3: 'Switch between CSS and HTML tabs',
    step4: 'Copy the generated code to your project',
  },
  zh: {
    toolTitle: 'CSS Grid 布局生成器',
    toolDesc: '可视化设计 CSS Grid 布局 — 设置行数、列数、间距和单位。实时预览并复制生产可用的 CSS + HTML 代码。',
    copyCss: '📋 复制 CSS',
    copyHtml: '📋 复制 HTML',
    reset: '🔄 重置',
    lblCols: '列数',
    lblRows: '行数',
    lblGap: '间距 (px)',
    lblUnit: '列单位',
    lblHeight: '容器高度',
    step1: '设置列数、行数、间距和单位',
    step2: '实时预览网格布局',
    step3: '切换 CSS 和 HTML 标签页',
    step4: '将生成的代码复制到项目中',
  }
});

const { $, copyText, t } = GZ;

$('#toolbar').innerHTML = `<button class="gz-btn" id="btn-copy-css">${t('copyCss')}</button><button class="gz-btn secondary" id="btn-copy-html">${t('copyHtml')}</button><button class="gz-btn secondary" id="btn-reset">${t('reset')}</button>`;
$('#lbl-cols').textContent = t('lblCols');
$('#lbl-rows').textContent = t('lblRows');
$('#lbl-gap').textContent = t('lblGap');
$('#lbl-unit').textContent = t('lblUnit');
$('#lbl-height').textContent = t('lblHeight');

let activeTab = 'css';

function generateCode() {
  const cols = parseInt($('#cols').value) || 3;
  const rows = parseInt($('#rows').value) || 3;
  const gap = parseInt($('#gap').value) || 0;
  const unit = $('#unit').value;
  const height = $('#height').value || 'auto';

  const colTemplate = Array(cols).fill(`1${unit}`).join(' ');
  const rowTemplate = Array(rows).fill('auto').join(' ');

  const css = `.grid-container {
  display: grid;
  grid-template-columns: ${colTemplate};
  grid-template-rows: ${rowTemplate};
  gap: ${gap}px;
  height: ${height};
}

.grid-item {
  /* Your item styles here */
}`;

  const html = `<div class="grid-container">
${Array(rows * cols).fill(0).map((_, i) => `  <div class="grid-item">Item ${i + 1}</div>`).join('\n')}
</div>`;

  // Update preview
  const grid = $('#grid-preview');
  grid.style.gridTemplateColumns = colTemplate;
  grid.style.gridTemplateRows = rowTemplate;
  grid.style.gap = gap + 'px';
  grid.style.height = height === 'auto' ? 'auto' : height;
  grid.style.minHeight = '300px';

  grid.innerHTML = Array(rows * cols).fill(0).map((_, i) =>
    `<div class="grid-cell"><span class="cell-label">${i + 1}</span></div>`
  ).join('');

  // Show code
  if (activeTab === 'css') {
    $('#code-output').textContent = css;
  } else {
    $('#code-output').textContent = html;
  }

  return { css, html };
}

// Tab switching
document.querySelectorAll('.tab-btns button').forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll('.tab-btns button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeTab = btn.dataset.tab;
    generateCode();
  };
});

// Live update
['cols','rows','gap','unit','height'].forEach(id => {
  const el = document.getElementById(id);
  el.oninput = el.onchange = generateCode;
});

$('#btn-copy-css').onclick = () => { const {css} = generateCode(); copyText(css); };
$('#btn-copy-html').onclick = () => { const {html} = generateCode(); copyText(html); };
$('#btn-reset').onclick = () => {
  $('#cols').value = 3; $('#rows').value = 3; $('#gap').value = 10; $('#unit').value = 'fr'; $('#height').value = 'auto';
  generateCode();
};

// Generate on load
generateCode();

GZ.renderToolPage({
  category: 'css-tools',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {href:'/css-tools/flexbox.html',icon:'📐',name:'Flexbox Generator'},
    {href:'/css-tools/box-shadow.html',icon:'📦',name:'Box Shadow Generator'},
    {href:'/css-tools/gradient.html',icon:'🌈',name:'Gradient Generator'},
    {href:'/css-tools/button.html',icon:'🔘',name:'Button Generator'},
  ]
});
</script>
