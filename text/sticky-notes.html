<style>
.sticky-board{position:relative;min-height:480px;background:repeating-linear-gradient(45deg,var(--glass2),var(--glass2) 20px,var(--glass) 20px,var(--glass) 40px);border-radius:12px;padding:20px;border:1px solid var(--border);overflow:hidden}
.sticky-toolbar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px;align-items:center}
.sticky-toolbar .swatches{display:flex;gap:6px}
.swatch{width:28px;height:28px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .15s}
.swatch:hover{transform:scale(1.15)}
.swatch.active{border-color:#fff;box-shadow:0 0 0 2px var(--gz-accent)}
.sticky{display:flex;flex-direction:column;position:absolute;width:200px;min-height:160px;padding:14px 12px 10px;border-radius:6px;box-shadow:0 4px 14px rgba(0,0,0,.18);font-family:'Comic Sans MS','Marker Felt',sans-serif;color:#222;cursor:move;user-select:none;transition:box-shadow .2s}
.sticky:hover{box-shadow:0 6px 20px rgba(0,0,0,.25)}
.sticky textarea{flex:1;width:100%;border:none;background:transparent;resize:none;font-family:inherit;font-size:.92rem;color:#222;line-height:1.4;min-height:80px;outline:none}
.sticky .sticky-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.sticky .sticky-head .del{background:transparent;border:none;cursor:pointer;color:#555;font-size:1.1rem;line-height:1;padding:0 4px;opacity:.5}
.sticky .sticky-head .del:hover{opacity:1;color:#c00}
.sticky.yellow{background:#fff9a8}.sticky.pink{background:#ffb3d9}.sticky.blue{background:#a8d8ff}
.sticky.green{background:#b6f0c2}.sticky.purple{background:#dab6fc}.sticky.orange{background:#ffc499}
.sticky-empty{text-align:center;color:var(--text2);padding:80px 20px;font-size:.95rem}
</style>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="sticky-toolbar">
      <button class="gz-btn" id="addBtn">+ <span id="addLbl"></span></button>
      <span style="opacity:.6;font-size:.85rem" id="colorLbl"></span>
      <div class="swatches" id="swatches">
        <div class="swatch active" data-color="yellow" style="background:#fff9a8"></div>
        <div class="swatch" data-color="pink" style="background:#ffb3d9"></div>
        <div class="swatch" data-color="blue" style="background:#a8d8ff"></div>
        <div class="swatch" data-color="green" style="background:#b6f0c2"></div>
        <div class="swatch" data-color="purple" style="background:#dab6fc"></div>
        <div class="swatch" data-color="orange" style="background:#ffc499"></div>
      </div>
      <span style="flex:1"></span>
      <span id="counter" style="font-size:.85rem;opacity:.7"></span>
      <button class="gz-btn gz-btn-secondary" id="clearBtn">🗑️ <span id="clearLbl"></span></button>
    </div>
    <div class="sticky-board" id="board">
      <div class="sticky-empty" id="empty">📝 <span id="emptyLbl"></span></div>
    </div>
  </div>

<script>
GZI18n.register({
  en: {
    toolTitle: 'Sticky Notes',
    toolDesc: 'Drag-and-drop virtual sticky notes for quick ideas, todos and reminders — auto-saved locally.',
    add: 'New Note', clear: 'Clear All', empty: 'Click "New Note" to start writing',
    colorLbl: 'Color:',
    counter: (n) => `${n} note${n!==1?'s':''}`,
    step1: 'Click "New Note" to add a sticky note to the board',
    step2: 'Type your idea, todo or reminder inside the note',
    step3: 'Click and drag the note to reposition it anywhere on the board',
    step4: 'Use the color swatches to recolor notes, "Clear All" to reset',
  },
  zh: {
    toolTitle: '便签工具',
    toolDesc: '可拖拽的虚拟便签板，记录灵感、待办和提醒 — 自动保存到本地。',
    add: '新建便签', clear: '清空全部', empty: '点击「新建便签」开始书写',
    colorLbl: '颜色：',
    counter: (n) => `${n} 张便签`,
    step1: '点击「新建便签」在便签板上添加便签',
    step2: '在便签中输入想法、待办或提醒',
    step3: '点击并拖动便签，重新放置在便签板的任何位置',
    step4: '使用颜色样本重新着色便签，「清空全部」可重置',
  }
});

const { $, t } = GZ;
const STORAGE_KEY = 'gz-sticky-v1';
let notes = [];
let activeColor = 'yellow';
let zCounter = 1;
let drag = null;

function load() {
  try { notes = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); } catch(e) { notes = []; }
}
function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(notes)); }
function uid() { return 'n' + Date.now().toString(36) + Math.random().toString(36).slice(2, 5); }

function addNote() {
  const board = $('#board');
  const bw = board.clientWidth, bh = board.clientHeight;
  const x = 30 + Math.random() * Math.max(0, bw - 240);
  const y = 30 + Math.random() * Math.max(0, bh - 200);
  notes.push({
    id: uid(),
    text: '',
    color: activeColor,
    x, y,
    z: ++zCounter
  });
  save(); render();
  setTimeout(() => {
    const el = document.querySelector(`[data-id="${notes[notes.length-1].id}"] textarea`);
    if (el) el.focus();
  }, 30);
}

function delNote(id) {
  notes = notes.filter(n => n.id !== id);
  save(); render();
}

function clearAll() {
  if (notes.length === 0) return;
  if (!confirm('Delete all sticky notes?')) return;
  notes = [];
  save(); render();
}

function updateText(id, txt) {
  const n = notes.find(x => x.id === id);
  if (n) { n.text = txt; save(); }
}
function setColor(id, c) {
  const n = notes.find(x => x.id === id);
  if (n) { n.color = c; save(); render(); }
}
function bringToFront(id) {
  const n = notes.find(x => x.id === id);
  if (n) { n.z = ++zCounter; save(); }
}

function startDrag(e, id) {
  if (e.target.tagName === 'TEXTAREA' || e.target.tagName === 'BUTTON') return;
  e.preventDefault();
  const n = notes.find(x => x.id === id);
  if (!n) return;
  const el = document.querySelector(`[data-id="${id}"]`);
  bringToFront(id);
  const rect = el.getBoundingClientRect();
  const board = $('#board').getBoundingClientRect();
  drag = {
    id, el,
    dx: e.clientX - rect.left,
    dy: e.clientY - rect.top,
    boardX: board.left, boardY: board.top,
    boardW: board.width, boardH: board.height
  };
  document.body.style.cursor = 'grabbing';
}
function onMove2(e) {
  if (!drag) return;
  const p = e.touches ? e.touches[0] : e;
  const x = p.clientX - drag.dx - drag.boardX;
  const y = p.clientY - drag.dy - drag.boardY;
  const el = drag.el;
  el.style.left = Math.max(0, Math.min(x, drag.boardW - el.offsetWidth)) + 'px';
  el.style.top = Math.max(0, Math.min(y, drag.boardH - el.offsetHeight)) + 'px';
}
function onUp() {
  if (!drag) return;
  const n = notes.find(x => x.id === drag.id);
  if (n) {
    n.x = parseInt(drag.el.style.left) || 0;
    n.y = parseInt(drag.el.style.top) || 0;
    save();
  }
  drag = null;
  document.body.style.cursor = '';
}

function render() {
  const board = $('#board');
  // remove old
  [...board.querySelectorAll('.sticky')].forEach(el => el.remove());
  if (notes.length === 0) {
    $('#empty').style.display = 'block';
  } else {
    $('#empty').style.display = 'none';
  }
  notes.sort((a, b) => a.z - b.z);
  notes.forEach(n => {
    const el = document.createElement('div');
    el.className = 'sticky ' + n.color;
    el.dataset.id = n.id;
    el.style.left = n.x + 'px';
    el.style.top = n.y + 'px';
    el.style.zIndex = n.z;
    el.innerHTML = `
      <div class="sticky-head">
        <span style="font-size:.7rem;opacity:.6">${n.color}</span>
        <button class="del" data-del="${n.id}">×</button>
      </div>
      <textarea placeholder="..." spellcheck="false">${escapeHtml(n.text)}</textarea>`;
    el.addEventListener('mousedown', e => startDrag(e, n.id));
    el.addEventListener('touchstart', e => startDrag(e, n.id), {passive: false});
    el.addEventListener('click', () => bringToFront(n.id));
    el.addEventListener('dblclick', () => {
      // cycle color on dblclick
      const order = ['yellow','pink','blue','green','purple','orange'];
      const nx = order[(order.indexOf(n.color) + 1) % order.length];
      setColor(n.id, nx);
    });
    board.appendChild(el);
  });
  // bind textareas
  board.querySelectorAll('.sticky textarea').forEach(ta => {
    ta.addEventListener('input', e => updateText(nearestId(ta), e.target.value));
    ta.addEventListener('mousedown', e => e.stopPropagation());
    ta.addEventListener('touchstart', e => e.stopPropagation());
  });
  board.querySelectorAll('[data-del]').forEach(b => {
    b.addEventListener('click', e => { e.stopPropagation(); delNote(b.dataset.del); });
    b.addEventListener('mousedown', e => e.stopPropagation());
  });
  $('#counter').textContent = t('counter')(notes.length);
}

function nearestId(el) {
  return el.closest('.sticky').dataset.id;
}
function escapeHtml(s) { return s.replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c])); }

$('#addBtn').addEventListener('click', addNote);
$('#clearBtn').addEventListener('click', clearAll);
$('#swatches').addEventListener('click', e => {
  if (e.target.classList.contains('swatch')) {
    document.querySelectorAll('.swatch').forEach(s => s.classList.toggle('active', s === e.target));
    activeColor = e.target.dataset.color;
  }
});
document.addEventListener('mousemove', onMove2);
document.addEventListener('touchmove', onMove2, {passive: false});
document.addEventListener('mouseup', onUp);
document.addEventListener('touchend', onUp);

$('#addLbl').textContent = t('add');
$('#clearLbl').textContent = t('clear');
$('#emptyLbl').textContent = t('empty');
$('#colorLbl').textContent = t('colorLbl');

load(); render();

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📝', href:'/text/notepad.html', name:'Online Notepad'},
    {icon:'✅', href:'/text/todo.html', name:'To-Do List'},
    {icon:'🌱', href:'/fun/habit-tracker.html', name:'Habit Tracker'},
    {icon:'🧠', href:'/text/bionic.html', name:'Bionic Reading'},
  ]
});
</script>

</body>
