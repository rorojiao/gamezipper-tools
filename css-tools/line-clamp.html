<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is CSS line-clamp?", "acceptedAnswer": {"@type": "Answer", "text": "CSS line-clamp truncates text after a set number of lines and adds an ellipsis (...). It uses a combination of display:-webkit-box, -webkit-box-orient:vertical, -webkit-line-clamp and overflow:hidden. The line-clamp property is now part of the CSS Overflow Module and supported in all modern browsers."}}, {"@type": "Question", "name": "Is -webkit-line-clamp still needed in 2026?", "acceptedAnswer": {"@type": "Answer", "text": "The standard line-clamp property is supported in Chrome 111+, Firefox 114+, Safari 17.4+. For maximum compatibility you can still use -webkit-line-clamp alongside it. Most production sites use the -webkit- prefix because it works everywhere including older browsers, and it is what the spec is based on."}}, {"@type": "Question", "name": "Why is my line-clamp not working?", "acceptedAnswer": {"@type": "Answer", "text": "All four declarations are required: display:-webkit-box, -webkit-box-orient:vertical, -webkit-line-clamp:N and overflow:hidden. If you forget overflow:hidden the text will still show in full. Also make sure no other display rule (like flex or grid) overrides the -webkit-box value on the same element."}}, {"@type": "Question", "name": "Can I change the ellipsis color or style?", "acceptedAnswer": {"@type": "Answer", "text": "The ellipsis inherits the text color. To color it differently, wrap the clamped text in a span and use a pseudo-element, or apply color to the container. The standard line-clamp does not yet support custom truncation characters, so most developers style the whole text color instead."}}]}</script>

<script>
GZI18n.register({
  en: {
    toolTitle: 'CSS Line Clamp Generator',
    toolDesc: 'Truncate text to any number of lines with an ellipsis using CSS line-clamp. Live preview, browser support info, and copy-ready -webkit-line-clamp code.',
    lblControls: 'Controls',
    lblLines: 'Number of lines',
    lblWidth: 'Container width',
    lblFont: 'Font size',
    lblLineH: 'Line height',
    lblText: 'Sample text',
    lblPreview: 'Live preview',
    lblOutput: 'Generated CSS',
    copy: 'Copy CSS',
    reset: 'Reset',
    infoHtml: '<b>✅ Works in all modern browsers.</b> Chrome 111+, Firefox 114+, Safari 17.4+ support the standard <code>line-clamp</code> property. The <code>-webkit-line-clamp</code> prefix works everywhere including older browsers.',
    sampleText: 'The quick brown fox jumps over the lazy dog. Pack my box with five dozen liquor jugs. How vexingly quick daft zebras jump! Lorem ipsum dolor sit amet, consectetur adipiscing elit, sed do eiusmod tempor incididunt ut labore et dolore magna aliqua.',
    step1: 'Set how many lines of text should be visible',
    step2: 'Adjust container width, font size and line height to match your layout',
    step3: 'Watch the live preview update with the ellipsis',
    step4: 'Copy the generated CSS class into your stylesheet',
  },
  zh: {
    toolTitle: 'CSS Line Clamp 生成器',
    toolDesc: '使用 CSS line-clamp 将文本截断为指定行数并显示省略号。实时预览、浏览器兼容性说明和可复制的 -webkit-line-clamp 代码。',
    lblControls: '控件',
    lblLines: '显示行数',
    lblWidth: '容器宽度',
    lblFont: '字体大小',
    lblLineH: '行高',
    lblText: '示例文本',
    lblPreview: '实时预览',
    lblOutput: '生成的 CSS',
    copy: '复制 CSS',
    reset: '重置',
    infoHtml: '<b>✅ 所有现代浏览器均支持。</b> Chrome 111+、Firefox 114+、Safari 17.4+ 支持标准 <code>line-clamp</code> 属性。<code>-webkit-line-clamp</code> 前缀兼容所有浏览器，包括旧版本。',
    sampleText: '敏捷的棕色狐狸跳过了懒狗。Lorem ipsum dolor sit amet, consectetur adipiscing elit, sed do eiusmod tempor incididunt ut labore et dolore magna aliqua. 这是一段用于演示文本截断的示例内容，足够长以便触发省略号效果。',
    step1: '设置要显示的文本行数',
    step2: '调整容器宽度、字体大小和行高以匹配你的布局',
    step3: '实时预览将自动更新省略号',
    step4: '复制生成的 CSS 类到你的样式表',
  }
});

const { $, copyText, t } = GZ;
const ids = ['lines','width','font','lh'];
ids.forEach(id => $('#'+id).addEventListener('input', update));

$('#sampleText').value = t('sampleText');
$('#sampleText').addEventListener('input', update);

function update() {
  const lines = +$('#lines').value;
  const width = +$('#width').value;
  const font = +$('#font').value;
  const lh = +$('#lh').value;
  const text = $('#sampleText').value || t('sampleText');

  $('#linesV').textContent = lines;
  $('#widthV').textContent = width;
  $('#fontV').textContent = font;
  $('#lhV').textContent = lh;

  const box = $('#previewBox');
  box.style.width = width + 'px';
  box.style.fontSize = font + 'px';
  box.style.lineHeight = lh;

  const el = $('#clampedEl');
  el.style.webkitLineClamp = lines;
  el.style.lineClamp = lines;
  el.textContent = text;

  const maxH = (font * lh * lines).toFixed(2);
  let out = `<span class="sel">.truncate</span> {\n`;
  out += `  <span class="prop">display</span>: <span class="val">-webkit-box</span>;\n`;
  out += `  <span class="prop">-webkit-box-orient</span>: <span class="val">vertical</span>;\n`;
  out += `  <span class="prop">-webkit-line-clamp</span>: <span class="val">${lines}</span>; <span class="com">/* also: line-clamp: ${lines}; */</span>\n`;
  out += `  <span class="prop">overflow</span>: <span class="val">hidden</span>;\n`;
  out += `  <span class="com">/* max-height fallback for older browsers: ${maxH}px */</span>\n`;
  out += `}`;
  $('#output').innerHTML = out;
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#lines').value=3;$('#width').value=320;$('#font').value=16;$('#lh').value=1.5;$('#sampleText').value=GZI18n.getLang()==='zh'?'敏捷的棕色狐狸跳过了懒狗。Lorem ipsum dolor sit amet, consectetur adipiscing elit, sed do eiusmod tempor incididunt ut labore et dolore magna aliqua.':'The quick brown fox jumps over the lazy dog. Pack my box with five dozen liquor jugs. How vexingly quick daft zebras jump!';update()">${t('reset')}</button>`;

['lblControls','lblLines','lblWidth','lblFont','lblLineH','lblText','lblPreview','lblOutput'].forEach(k => $('#'+k.replace('lbl','lbl')).textContent = t(k));
$('#infoBox').innerHTML = t('infoHtml');

update();

GZ.renderToolPage({
  category: 'css',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'↕️', href:'/css-tools/line-height.html', name:'Line Height'},
    {icon:'📏', href:'/css-tools/clamp-generator.html', name:'Clamp()'},
    {icon:'↩️', href:'/text/text-wrap.html', name:'Text Wrap'},
    {icon:'✂️', href:'/text/text-truncator.html', name:'Text Truncator'},
  ]
});
</script>
