function L(k){ return (GZI18n.current==='zh' ? LABELS.zh[k] : LABELS.en[k]) || k; }

function renderFilters(){
  $('#fWho').innerHTML = `<option value="">${t('all')}</option>` + WHO.map(w=>`<option value="${w}">${L(w)}</option>`).join('');
  $('#fOcc').innerHTML = `<option value="">${t('all')}</option>` + OCC.map(o=>`<option value="${o}">${L(o)}</option>`).join('');
  $('#fBudget').innerHTML = `<option value="">${t('all')}</option>` + BUDGETS.map(b=>`<option value="${b.id}">${L(b.id)}</option>`).join('');
  $('#fInterest').innerHTML = `<option value="">${t('all')}</option>` + INTERESTS.map(i=>`<option value="${i}">${L(i)}</option>`).join('');
}

function priceLabel(p){
  if(p < 15) return L('u15');
  if(p < 30) return L('u30');
  if(p < 60) return L('u60');
  if(p < 100) return L('u100');
  if(p < 200) return L('u200');
  return L('o200');
}
function budgetMatch(price, bid){
  if(!bid) return true;
  const b = BUDGETS.find(x=>x.id===bid);
  return price <= b.max;
}

function update(){
  const w = $('#fWho').value, o = $('#fOcc').value, b = $('#fBudget').value, i = $('#fInterest').value;
  const filtered = GIFTS.filter(g => {
    const [ic,en,zh,ed,zd,price,whos,occs,ints] = g;
    if(w && !whos.includes(w)) return false;
    if(o && !occs.includes(o)) return false;
    if(!budgetMatch(price, b)) return false;
    if(i && i !== 'any' && !ints.includes(i) && !ints.includes('any')) return false;
    return true;
  });
  $('#count').textContent = t('countResults', filtered.length);
  if(!filtered.length){
    $('#grid').innerHTML = `<div class="gi-empty">😔 No gifts match all filters — try relaxing one filter.</div>`;
    return;
  }
  const isZh = GZI18n.current === 'zh';
  $('#grid').innerHTML = filtered.map(g => {
    const [ic,en,zh,ed,zd,price,whos,occs,ints] = g;
    return `<div class="gi-card">
      <div class="ic">${ic}</div>
      <h3>${isZh?zh:en}</h3>
      <p>${isZh?zd:ed}</p>
      <span class="price">$${price}</span>
      <span class="tag">${priceLabel(price)}</span>
    </div>`;
  }).join('');
}

['fWho','fOcc','fBudget','fInterest'].forEach(id => $('#'+id).addEventListener('change', update));

$('#lblWho').textContent = t('who');
$('#lblOcc').textContent = t('occasion');
$('#lblBudget').textContent = t('budget');
$('#lblInterest').textContent = t('interest');

$('#toolbar').innerHTML = `<button class="gz-btn gz-btn-secondary" id="btnReset">${t('reset')}</button>`;
$('#btnReset').onclick = () => { $('#fWho').value='';$('#fOcc').value='';$('#fBudget').value='';$('#fInterest').value='';update(); };

renderFilters();
update();
