// Common CSS properties (subset for typo detection; full list would be huge)
const KNOWN_PROPS = new Set([

function lineOf(text, idx) {
  return text.substring(0, idx).split('\n').length;
}

function validate(css) {
  const issues = [];
  if (!css.trim()) return issues;

  // strip comments
  const cleaned = css.replace(/\/\*[\s\S]*?\*\//g, m => ' '.repeat(m.length));

  // brace balance
  let depth = 0;
  for (let i = 0; i < cleaned.length; i++) {
    const c = cleaned[i];
    if (c === '{') depth++;
    else if (c === '}') {
      depth--;
      if (depth < 0) {
        issues.push({ type: 'error', msg: 'Unexpected closing brace } with no matching {', line: lineOf(css, i) });
        depth = 0;
      }
    }
  }
  if (depth > 0) {
    issues.push({ type: 'error', msg: `${depth} unclosed brace(s) { — check your selectors`, line: lineOf(css, cleaned.length) });
  }

  // parse rules: {selector { ... }}
  const ruleRe = /([^{}]+?)\s*\{([^{}]*)\}/g;
  let m;
  let ruleCount = 0, propCount = 0;
  const seenSelectors = new Map();
  while ((m = ruleRe.exec(cleaned)) !== null) {
    ruleCount++;
    const selector = m[1].trim();
    const body = m[2];
    const ruleIdx = m.index;

    if (!selector) {
      issues.push({ type: 'error', msg: 'Empty selector before {', line: lineOf(css, ruleIdx) });
    } else {
      // duplicate selectors
      if (seenSelectors.has(selector)) {
        issues.push({ type: 'warn', msg: `Duplicate selector "${selector}" (first seen at line ${seenSelectors.get(selector)})`, line: lineOf(css, ruleIdx) });
      } else {
        seenSelectors.set(selector, lineOf(css, ruleIdx));
      }
    }

    // parse declarations inside body
    const declRe = /([a-zA-Z-][a-zA-Z0-9-]*)\s*:\s*([^;]+?)(?:;|$)/g;
    let dm;
    let lastEnd = 0;
    while ((dm = declRe.exec(body)) !== null) {
      propCount++;
      const prop = dm[1].toLowerCase();
      const val = dm[2].trim();
      // unknown property
      const cleanProp = prop.replace(/^-(webkit|moz|ms|o)-/, '');
      if (!KNOWN_PROPS.has(prop) && !KNOWN_PROPS.has(cleanProp) && !prop.startsWith('--')) {
        issues.push({ type: 'warn', msg: `Unknown or misspelled property "${prop}"`, line: lineOf(css, ruleIdx + m[0].indexOf(dm[0])) });
      }
      // empty value
      if (!val) {
        issues.push({ type: 'error', msg: `Empty value for property "${prop}"`, line: lineOf(css, ruleIdx + m[0].indexOf(dm[0])) });
      }
      lastEnd = dm.index + dm[0].length;
    }
    // check for stray non-empty content after last declaration
    const tail = body.substring(lastEnd).trim();
    if (tail && !/^[\s;]+$/.test(tail)) {
      issues.push({ type: 'warn', msg: `Possible malformed declaration in rule for "${selector}"`, line: lineOf(css, ruleIdx + m[0].indexOf(tail)) });
    }
  }

  // detect missing colons (e.g., "color red" instead of "color: red")
  const declLineRe = /^\s*([a-zA-Z-][a-zA-Z0-9-]*)\s+([^:;{}]+?)\s*;/gm;
  while ((m = declLineRe.exec(cleaned)) !== null) {
    issues.push({ type: 'error', msg: `Missing colon in declaration: "${m[1]} ${m[2]}" (should be "${m[1]}: ${m[2]}")`, line: lineOf(css, m.index) });
  }

  // 0 with no unit (only on non-zero values) - skip
  // !important usage
  const impRe = /!important/gi;
  let impCount = 0;
  while ((m = impRe.exec(cleaned)) !== null) {
    impCount++;
    if (impCount <= 2) {
      issues.push({ type: 'info', msg: `Use of !important at line ${lineOf(css, m.index)}. Overuse makes CSS hard to maintain.`, line: lineOf(css, m.index) });
    }
  }

  // shorthand redundancy
  const marginRe = /margin\s*:\s*([^;]+);/g;
  while ((m = marginRe.exec(cleaned)) !== null) {
    const v = m[1].trim().split(/\s+/);
    if (v.length === 4 && v[0] === v[2] && v[1] === v[3]) {
      issues.push({ type: 'info', msg: `margin can be simplified to 2 values: "${v[0]} ${v[1]}"`, line: lineOf(css, m.index) });
    }
  }

  return issues;
}

function render() {
  const css = $('#css-in').value;
  const out = $('#output');
  if (!css.trim()) {
    out.innerHTML = `<div class="v-msg">${t('example') || ''}</div>`;
    return;
  }
  const issues = validate(css);
  const errCount = issues.filter(i => i.type === 'error').length;
  const warnCount = issues.filter(i => i.type === 'warn').length;
  const infoCount = issues.filter(i => i.type === 'info').length;
  const score = Math.max(0, 100 - errCount * 15 - warnCount * 5 - infoCount * 1);
  const scoreClass = errCount === 0 ? 'ok' : 'err';

  let html2 = `<div class="v-stats">
    <div class="v-stat err"><div class="num">${errCount}</div><div class="lbl">${t('errors')}</div></div>
    <div class="v-stat warn"><div class="num">${warnCount}</div><div class="lbl">${t('warnings')}</div></div>
    <div class="v-stat info"><div class="num">${infoCount}</div><div class="lbl">${t('info')}</div></div>
    <div class="v-stat ${scoreClass}"><div class="num">${score}</div><div class="lbl">${t('score')}</div></div>
  </div>`;

  if (issues.length === 0) {
    html2 += `<div class="v-summary ok">${t('noIssues')}</div>`;
  } else {
    html2 += '<ul class="v-issues">';
    for (const i of issues) {
      html2 += `<li class="v-issue ${i.type}"><span class="lbl">${i.type}</span>${escapeHtml(i.msg)}<div class="loc">Line ${i.line}</div></li>`;
    }
    html2 += '</ul>';
  }
  out.innerHTML = html2;
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
