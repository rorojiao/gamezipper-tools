};

const SVGNS = 'http://www.w3.org/2000/svg';

function parseData(text) {
  const lines = text.split('\n').map(l => l.trim()).filter(l => l);
  const result = [];
  for (const line of lines) {
    const m = line.match(/^([^,]+),\s*([\d.\-eE]+)\s*$/);
    if (m) result.push([m[1].trim(), parseFloat(m[2])]);
  }
  return result;
}

function createSVG(w, h) {
  const svg = document.createElementNS(SVGNS, 'svg');
  svg.setAttribute('xmlns', SVGNS);
  svg.setAttribute('viewBox', `0 0 ${w} ${h}`);
  svg.setAttribute('width', w);
  svg.setAttribute('height', h);
  svg.setAttribute('style', 'background:#fff;border-radius:8px;display:block');
  const bg = document.createElementNS(SVGNS, 'rect');
  bg.setAttribute('width', w); bg.setAttribute('height', h); bg.setAttribute('fill', '#ffffff');
  svg.appendChild(bg);
  return svg;
}

function renderTitle(svg, title, w) {
  if (!title) return 0;
  const txt = document.createElementNS(SVGNS, 'text');
  txt.setAttribute('x', w/2); txt.setAttribute('y', 30);
  txt.setAttribute('text-anchor', 'middle');
  txt.setAttribute('font-size', '20');
  txt.setAttribute('font-weight', '700');
  txt.setAttribute('fill', '#1f2937');
  txt.setAttribute('font-family', 'sans-serif');
  txt.textContent = title;
  svg.appendChild(txt);
  return 50;
}

function renderBarV(svg, data, colors, w, h, startY) {
  if (!data.length) return;
  const padding = { top: startY + 20, right: 40, bottom: 60, left: 60 };
  const innerW = w - padding.left - padding.right;
  const innerH = h - padding.top - padding.bottom;
  const maxV = Math.max(...data.map(d => d[1]), 0);
  const barW = innerW / data.length * 0.7;
  const gap = innerW / data.length * 0.3;

  // Y axis
  const axis = document.createElementNS(SVGNS, 'line');
  axis.setAttribute('x1', padding.left); axis.setAttribute('y1', padding.top);
  axis.setAttribute('x2', padding.left); axis.setAttribute('y2', padding.top + innerH);
  axis.setAttribute('stroke', '#d1d5db'); axis.setAttribute('stroke-width', '1');
  svg.appendChild(axis);
  // X axis
  const xaxis = document.createElementNS(SVGNS, 'line');
  xaxis.setAttribute('x1', padding.left); xaxis.setAttribute('y1', padding.top + innerH);
  xaxis.setAttribute('x2', padding.left + innerW); xaxis.setAttribute('y2', padding.top + innerH);
  xaxis.setAttribute('stroke', '#d1d5db'); xaxis.setAttribute('stroke-width', '1');
  svg.appendChild(xaxis);

  // Gridlines
  for (let i = 0; i <= 4; i++) {
    const y = padding.top + (innerH / 4) * i;
    const gl = document.createElementNS(SVGNS, 'line');
    gl.setAttribute('x1', padding.left); gl.setAttribute('y1', y);
    gl.setAttribute('x2', padding.left + innerW); gl.setAttribute('y2', y);
    gl.setAttribute('stroke', '#f3f4f6'); gl.setAttribute('stroke-dasharray', '3 3');
    svg.appendChild(gl);
    const lbl = document.createElementNS(SVGNS, 'text');
    lbl.setAttribute('x', padding.left - 8); lbl.setAttribute('y', y + 4);
    lbl.setAttribute('text-anchor', 'end'); lbl.setAttribute('font-size', '11');
    lbl.setAttribute('fill', '#6b7280'); lbl.setAttribute('font-family', 'sans-serif');
    lbl.textContent = (maxV * (1 - i/4)).toFixed(0);
    svg.appendChild(lbl);
  }

  data.forEach((d, i) => {
    const x = padding.left + (innerW / data.length) * i + gap/2;
    const barH = (d[1] / maxV) * innerH;
    const y = padding.top + innerH - barH;
    const rect = document.createElementNS(SVGNS, 'rect');
    rect.setAttribute('x', x); rect.setAttribute('y', y);
    rect.setAttribute('width', barW); rect.setAttribute('height', barH);
    rect.setAttribute('fill', colors[i % colors.length]);
    rect.setAttribute('rx', '3');
    svg.appendChild(rect);
    // Value
    const vTxt = document.createElementNS(SVGNS, 'text');
    vTxt.setAttribute('x', x + barW/2); vTxt.setAttribute('y', y - 5);
    vTxt.setAttribute('text-anchor', 'middle'); vTxt.setAttribute('font-size', '11');
    vTxt.setAttribute('fill', '#374151'); vTxt.setAttribute('font-weight', '600');
    vTxt.setAttribute('font-family', 'sans-serif');
    vTxt.textContent = d[1].toString();
    svg.appendChild(vTxt);
    // Label
    const lTxt = document.createElementNS(SVGNS, 'text');
    lTxt.setAttribute('x', x + barW/2); lTxt.setAttribute('y', padding.top + innerH + 18);
    lTxt.setAttribute('text-anchor', 'middle'); lTxt.setAttribute('font-size', '12');
    lTxt.setAttribute('fill', '#374151'); lTxt.setAttribute('font-family', 'sans-serif');
    lTxt.textContent = d[0].length > 12 ? d[0].slice(0,10) + '…' : d[0];
    svg.appendChild(lTxt);
    // Rotated label if long
    if (d[0].length > 6) {
      lTxt.setAttribute('transform', `rotate(-30 ${x + barW/2} ${padding.top + innerH + 18})`);
      lTxt.setAttribute('text-anchor', 'end');
    }
  });
}

function renderBarH(svg, data, colors, w, h, startY) {
  if (!data.length) return;
  const padding = { top: startY + 20, right: 60, bottom: 30, left: 100 };
  const innerW = w - padding.left - padding.right;
  const innerH = h - padding.top - padding.bottom;
  const maxV = Math.max(...data.map(d => d[1]), 0);
  const rowH = innerH / data.length;
  const barH = rowH * 0.6;

  data.forEach((d, i) => {
    const y = padding.top + rowH * i + (rowH - barH)/2;
    const barW = (d[1] / maxV) * innerW;
    const rect = document.createElementNS(SVGNS, 'rect');
    rect.setAttribute('x', padding.left); rect.setAttribute('y', y);
    rect.setAttribute('width', barW); rect.setAttribute('height', barH);
    rect.setAttribute('fill', colors[i % colors.length]);
    rect.setAttribute('rx', '3');
    svg.appendChild(rect);
    // Label left
    const lTxt = document.createElementNS(SVGNS, 'text');
    lTxt.setAttribute('x', padding.left - 8); lTxt.setAttribute('y', y + barH/2 + 4);
    lTxt.setAttribute('text-anchor', 'end'); lTxt.setAttribute('font-size', '12');
    lTxt.setAttribute('fill', '#374151'); lTxt.setAttribute('font-family', 'sans-serif');
    lTxt.textContent = d[0].length > 14 ? d[0].slice(0,12)+'…' : d[0];
    svg.appendChild(lTxt);
    // Value right
    const vTxt = document.createElementNS(SVGNS, 'text');
    vTxt.setAttribute('x', padding.left + barW + 6); vTxt.setAttribute('y', y + barH/2 + 4);
    vTxt.setAttribute('font-size', '11'); vTxt.setAttribute('fill', '#374151');
    vTxt.setAttribute('font-weight', '600'); vTxt.setAttribute('font-family', 'sans-serif');
    vTxt.textContent = d[1].toString();
    svg.appendChild(vTxt);
  });
}

function renderPie(svg, data, colors, w, h, startY, isDonut) {
  if (!data.length) return;
  const cx = w / 2, cy = (h + startY) / 2;
  const radius = Math.min(w, h - startY) / 2 - 30;
  const total = data.reduce((s, d) => s + Math.abs(d[1]), 0) || 1;
  let angle = -Math.PI / 2;

  data.forEach((d, i) => {
    const slice = (Math.abs(d[1]) / total) * Math.PI * 2;
    const x1 = cx + Math.cos(angle) * radius;
    const y1 = cy + Math.sin(angle) * radius;
    const x2 = cx + Math.cos(angle + slice) * radius;
    const y2 = cy + Math.sin(angle + slice) * radius;
    const large = slice > Math.PI ? 1 : 0;
    let path = `M ${cx} ${cy} L ${x1} ${y1} A ${radius} ${radius} 0 ${large} 1 ${x2} ${y2} Z`;
    if (isDonut) {
      const inner = radius * 0.55;
      const ix1 = cx + Math.cos(angle + slice) * inner;
      const iy1 = cy + Math.sin(angle + slice) * inner;
      const ix2 = cx + Math.cos(angle) * inner;
      const iy2 = cy + Math.sin(angle) * inner;
      path = `M ${x1} ${y1} A ${radius} ${radius} 0 ${large} 1 ${x2} ${y2} L ${ix1} ${iy1} A ${inner} ${inner} 0 ${large} 0 ${ix2} ${iy2} Z`;
    }
    const p = document.createElementNS(SVGNS, 'path');
    p.setAttribute('d', path);
    p.setAttribute('fill', colors[i % colors.length]);
    p.setAttribute('stroke', '#fff'); p.setAttribute('stroke-width', '2');
    svg.appendChild(p);

    // Label
    if (slice > 0.1) {
      const labelAngle = angle + slice / 2;
      const lx = cx + Math.cos(labelAngle) * (radius * 0.7);
      const ly = cy + Math.sin(labelAngle) * (radius * 0.7);
      const pct = (Math.abs(d[1]) / total * 100).toFixed(0) + '%';
      const t = document.createElementNS(SVGNS, 'text');
      t.setAttribute('x', lx); t.setAttribute('y', ly);
      t.setAttribute('text-anchor', 'middle');
      t.setAttribute('dominant-baseline', 'middle');
      t.setAttribute('fill', '#fff'); t.setAttribute('font-size', '11');
      t.setAttribute('font-weight', '700'); t.setAttribute('font-family', 'sans-serif');
      t.textContent = pct;
      svg.appendChild(t);
    }

    // Legend
    const lx = 20; const ly = startY + 30 + i * 22;
    const leg = document.createElementNS(SVGNS, 'rect');
    leg.setAttribute('x', lx); leg.setAttribute('y', ly);
    leg.setAttribute('width', 14); leg.setAttribute('height', 14);
    leg.setAttribute('fill', colors[i % colors.length]);
    leg.setAttribute('rx', '2');
    svg.appendChild(leg);
    const lt = document.createElementNS(SVGNS, 'text');
    lt.setAttribute('x', lx + 20); lt.setAttribute('y', ly + 11);
    lt.setAttribute('font-size', '12'); lt.setAttribute('fill', '#1f2937');
    lt.setAttribute('font-family', 'sans-serif');
    lt.textContent = `${d[0]}: ${d[1]}`;
    svg.appendChild(lt);

    angle += slice;
  });
}

function renderLine(svg, data, colors, w, h, startY, isArea) {
  if (!data.length) return;
  const padding = { top: startY + 20, right: 40, bottom: 50, left: 60 };
  const innerW = w - padding.left - padding.right;
  const innerH = h - padding.top - padding.bottom;
  const maxV = Math.max(...data.map(d => d[1]), 0);

  // Gridlines
  for (let i = 0; i <= 4; i++) {
    const y = padding.top + (innerH / 4) * i;
    const gl = document.createElementNS(SVGNS, 'line');
    gl.setAttribute('x1', padding.left); gl.setAttribute('y1', y);
    gl.setAttribute('x2', padding.left + innerW); gl.setAttribute('y2', y);
    gl.setAttribute('stroke', '#f3f4f6'); gl.setAttribute('stroke-dasharray', '3 3');
    svg.appendChild(gl);
    const lbl = document.createElementNS(SVGNS, 'text');
    lbl.setAttribute('x', padding.left - 8); lbl.setAttribute('y', y + 4);
    lbl.setAttribute('text-anchor', 'end'); lbl.setAttribute('font-size', '11');
    lbl.setAttribute('fill', '#6b7280'); lbl.setAttribute('font-family', 'sans-serif');
    lbl.textContent = (maxV * (1 - i/4)).toFixed(0);
    svg.appendChild(lbl);
  }

  const points = data.map((d, i) => {
    const x = padding.left + (innerW / (data.length - 1 || 1)) * i;
    const y = padding.top + innerH - (d[1] / maxV) * innerH;
    return [x, y];
  });

  if (isArea) {
    const areaPath = `M ${points[0][0]} ${padding.top + innerH} L ${points.map(p => p.join(' ')).join(' L ')} L ${points[points.length-1][0]} ${padding.top + innerH} Z`;
    const a = document.createElementNS(SVGNS, 'path');
    a.setAttribute('d', areaPath);
    a.setAttribute('fill', colors[0]);
    a.setAttribute('fill-opacity', '0.3');
    svg.appendChild(a);
  }

  // Line
  const linePath = 'M ' + points.map(p => p.join(' ')).join(' L ');
  const line = document.createElementNS(SVGNS, 'path');
  line.setAttribute('d', linePath);
  line.setAttribute('fill', 'none');
  line.setAttribute('stroke', colors[0]);
  line.setAttribute('stroke-width', '3');
  line.setAttribute('stroke-linejoin', 'round');
  line.setAttribute('stroke-linecap', 'round');
  svg.appendChild(line);

  // Points + labels
  points.forEach((p, i) => {
    const dot = document.createElementNS(SVGNS, 'circle');
    dot.setAttribute('cx', p[0]); dot.setAttribute('cy', p[1]); dot.setAttribute('r', 5);
    dot.setAttribute('fill', '#fff'); dot.setAttribute('stroke', colors[0]);
    dot.setAttribute('stroke-width', '2');
    svg.appendChild(dot);
    // Value
    const vTxt = document.createElementNS(SVGNS, 'text');
    vTxt.setAttribute('x', p[0]); vTxt.setAttribute('y', p[1] - 12);
    vTxt.setAttribute('text-anchor', 'middle'); vTxt.setAttribute('font-size', '10');
    vTxt.setAttribute('fill', '#374151'); vTxt.setAttribute('font-weight', '600');
    vTxt.setAttribute('font-family', 'sans-serif');
    vTxt.textContent = data[i][1].toString();
    svg.appendChild(vTxt);
    // Label
    const lTxt = document.createElementNS(SVGNS, 'text');
    lTxt.setAttribute('x', p[0]); lTxt.setAttribute('y', padding.top + innerH + 18);
    lTxt.setAttribute('text-anchor', 'middle'); lTxt.setAttribute('font-size', '11');
    lTxt.setAttribute('fill', '#374151'); lTxt.setAttribute('font-family', 'sans-serif');
    lTxt.textContent = data[i][0].length > 10 ? data[i][0].slice(0,8)+'…' : data[i][0];
    svg.appendChild(lTxt);
  });
}

function renderRadar(svg, data, colors, w, h, startY) {
  if (!data.length || data.length < 3) return;
  const cx = w/2, cy = (h + startY)/2;
  const radius = Math.min(w, h - startY) / 2 - 60;
  const maxV = Math.max(...data.map(d => d[1]), 0);
  const angle = (Math.PI * 2) / data.length;
  const points = data.map((d, i) => {
    const r = (d[1] / maxV) * radius;
    return [cx + Math.cos(-Math.PI/2 + angle * i) * r, cy + Math.sin(-Math.PI/2 + angle * i) * r];
  });
  // Grid (concentric polygons)
  for (let level = 1; level <= 4; level++) {
    const r = (level / 4) * radius;
    const pts = [];
    for (let i = 0; i < data.length; i++) {
      pts.push([cx + Math.cos(-Math.PI/2 + angle * i) * r, cy + Math.sin(-Math.PI/2 + angle * i) * r].join(','));
    }
    const poly = document.createElementNS(SVGNS, 'polygon');
    poly.setAttribute('points', pts.join(' '));
    poly.setAttribute('fill', 'none'); poly.setAttribute('stroke', '#e5e7eb');
    poly.setAttribute('stroke-dasharray', '2 2');
    svg.appendChild(poly);
  }
  // Data polygon
  const dataPoly = document.createElementNS(SVGNS, 'polygon');
  dataPoly.setAttribute('points', points.map(p => p.join(',')).join(' '));
  dataPoly.setAttribute('fill', colors[0]);
  dataPoly.setAttribute('fill-opacity', '0.4');
  dataPoly.setAttribute('stroke', colors[0]);
  dataPoly.setAttribute('stroke-width', '2');
  svg.appendChild(dataPoly);
  // Axis lines + labels
  data.forEach((d, i) => {
    const x = cx + Math.cos(-Math.PI/2 + angle * i) * radius;
    const y = cy + Math.sin(-Math.PI/2 + angle * i) * radius;
    const ax = document.createElementNS(SVGNS, 'line');
    ax.setAttribute('x1', cx); ax.setAttribute('y1', cy);
    ax.setAttribute('x2', x); ax.setAttribute('y2', y);
    ax.setAttribute('stroke', '#e5e7eb');
    svg.appendChild(ax);
    const lt = document.createElementNS(SVGNS, 'text');
    lt.setAttribute('x', x); lt.setAttribute('y', y);
    lt.setAttribute('text-anchor', Math.cos(-Math.PI/2 + angle * i) > 0.1 ? 'start' : (Math.cos(-Math.PI/2 + angle * i) < -0.1 ? 'end' : 'middle'));
    lt.setAttribute('dy', Math.sin(-Math.PI/2 + angle * i) > 0.1 ? '14' : (Math.sin(-Math.PI/2 + angle * i) < -0.1 ? '-6' : '4'));
    lt.setAttribute('font-size', '11'); lt.setAttribute('fill', '#374151');
    lt.setAttribute('font-family', 'sans-serif');
    lt.textContent = d[0];
    svg.appendChild(lt);
  });
}

let lastRendered = null;
function generate() {
  const data = parseData($('#data').value);
  if (!data.length) {
    $('#preview').innerHTML = '<div style="color:#9ca3af;padding:40px">No valid data</div>';
    lastRendered = null;
    return;
  }
  const w = +$('#width').value || 700;
  const h = +$('#height').value || 450;
  const type = $('#chartType').value;
  const colors = THEMES[$('#theme').value];
  const title = $('#chartTitle').value;

  const svg = createSVG(w, h);
  const startY = renderTitle(svg, title, w);

  if (type === 'bar-v') renderBarV(svg, data, colors, w, h, startY);
  else if (type === 'bar-h') renderBarH(svg, data, colors, w, h, startY);
  else if (type === 'pie') renderPie(svg, data, colors, w, h, startY, false);
  else if (type === 'donut') renderPie(svg, data, colors, w, h, startY, true);
  else if (type === 'line') renderLine(svg, data, colors, w, h, startY, false);
  else if (type === 'area') renderLine(svg, data, colors, w, h, startY, true);
  else if (type === 'scatter') renderLine(svg, data, colors, w, h, startY, false);
  else if (type === 'radar') renderRadar(svg, data, colors, w, h, startY);

  $('#preview').innerHTML = '';
  $('#preview').appendChild(svg);
  lastRendered = svg;
}

function downloadPNG() {
  if (!lastRendered) return;
  const svgData = new XMLSerializer().serializeToString(lastRendered);
  const svgBlob = new Blob([svgData], {type: 'image/svg+xml;charset=utf-8'});
  const url = URL.createObjectURL(svgBlob);
  const img = new Image();
  const w = +$('#width').value || 700;
  const h = +$('#height').value || 450;
  img.onload = function() {
    const canvas = document.createElement('canvas');
    canvas.width = w * 2; canvas.height = h * 2;
    const ctx = canvas.getContext('2d');
    ctx.scale(2, 2);
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, w, h);
    ctx.drawImage(img, 0, 0);
    canvas.toBlob(function(blob) {
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'chart.png';
      a.click();
      showToast('Downloaded!');
    }, 'image/png');
    URL.revokeObjectURL(url);
  };
  img.src = url;
}

function downloadSVG() {
  if (!lastRendered) return;
  const svgData = new XMLSerializer().serializeToString(lastRendered);
  const blob = new Blob([svgData], {type: 'image/svg+xml'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'chart.svg';
  a.click();
  showToast('Downloaded!');
}
