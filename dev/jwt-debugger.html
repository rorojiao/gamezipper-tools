const { $, copyText, t } = GZ;

function b64UrlDecode(str) {
  str = str.replace(/-/g, '+').replace(/_/g, '/');
  while (str.length % 4) str += '=';
  return atob(str);
}

function b64UrlEncode(str) {
  return btoa(str).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
}

function formatTimestamp(ts) {
  if (!ts || isNaN(ts)) return '—';
  const d = new Date(ts * 1000);
  return d.toLocaleString() + ' (' + Math.round((Date.now()/1000 - ts) / 86400) + ' days ago)';
}

function formatFuture(ts) {
  if (!ts || isNaN(ts)) return '—';
  const d = new Date(ts * 1000);
  const diff = ts - Date.now()/1000;
  const days = Math.round(diff / 86400);
  return d.toLocaleString() + (days > 0 ? ` (in ${days} days)` : ` (${Math.abs(days)} days ago)`);
}

function decode() {
  const token = $('#token-input').value.trim();
  if (!token) return;

  const parts = token.split('.');
  if (parts.length < 2) {
    alert('Invalid JWT: must have at least 2 parts separated by dots');
    return;
  }

  try {
    const header = JSON.parse(b64UrlDecode(parts[0]));
    const payload = JSON.parse(b64UrlDecode(parts[1]));

    // Show header
    $('#header-section').style.display = '';
    $('#hdr-title').textContent = t('headerPart');
    $('#header-json').textContent = JSON.stringify(header, null, 2);

    // Show payload
    $('#payload-section').style.display = '';
    $('#pay-title').textContent = t('payloadPart');
    $('#payload-json').textContent = JSON.stringify(payload, null, 2);

    // Show claims
    $('#claims-section').style.display = '';
    $('#claims-title').textContent = t('claimsTitle');
    const claims = [
      [t('algo'), header.alg || '—'],
      [t('typ'), header.typ || '—'],
      [t('issuer'), payload.iss || '—'],
      [t('subject'), payload.sub || '—'],
      [t('audience'), payload.aud || '—'],
      [t('issuedAt'), payload.iat ? formatTimestamp(payload.iat) : '—'],
      [t('expires'), payload.exp ? formatFuture(payload.exp) : '—'],
      [t('notBefore'), payload.nbf ? formatFuture(payload.nbf) : '—'],
      [t('jwtId'), payload.jti || '—'],
    ];
    $('#claims-list').innerHTML = claims.map(([k,v]) =>
      `<div class="claim-row"><span class="claim-key">${k}</span><span class="claim-val">${v}</span></div>`
    ).join('');

    // Health check
    $('#status-section').style.display = '';
    $('#status-title').textContent = t('statusTitle');
    let statusHtml = '';
    const now = Math.floor(Date.now()/1000);

    if (payload.exp) {
      if (now > payload.exp) {
        statusHtml += `<div><span class="status-badge status-err">${t('expired')}</span></div>`;
      } else {
        statusHtml += `<div><span class="status-badge status-ok">${t('valid')}</span></div>`;
      }
    } else {
      statusHtml += `<div><span class="status-badge status-warn">${t('noExp')}</span></div>`;
    }

    if (payload.nbf && now < payload.nbf) {
      statusHtml += `<div><span class="status-badge status-err">${t('notYetValid')}</span></div>`;
    }

    $('#status-list').innerHTML = statusHtml;

  } catch (e) {
    alert('Failed to decode JWT: ' + e.message);
  }
}

async function verifySignature() {
  const token = $('#token-input').value.trim();
  const secret = $('#secret-input').value;
  if (!token) return;

  const parts = token.split('.');
  if (parts.length < 3) {
    alert('Cannot verify: JWT must have 3 parts for signature verification');
    return;
  }

  try {
    const header = JSON.parse(b64UrlDecode(parts[0]));
    const alg = (header.alg || '').toUpperCase();
    let algName;
    if (alg === 'HS256') algName = 'SHA-256';
    else if (alg === 'HS384') algName = 'SHA-384';
    else if (alg === 'HS512') algName = 'SHA-512';
    else {
      alert('Unsupported algorithm: ' + header.alg + '. Only HS256, HS384, HS512 are supported.');
      return;
    }

    const encoder = new TextEncoder();
    const key = await crypto.subtle.importKey('raw', encoder.encode(secret), { name: 'HMAC', hash: algName }, false, ['sign']);
    const data = encoder.encode(parts[0] + '.' + parts[1]);
    const sig = await crypto.subtle.sign('HMAC', key, data);
    const expected = b64UrlEncode(String.fromCharCode(...new Uint8Array(sig)));

    $('#status-section').style.display = '';
    $('#status-title').textContent = t('statusTitle');
    const existing = $('#status-list').innerHTML;
    const result = expected === parts[2]
      ? `<div><span class="status-badge status-ok">${t('sigValid')}</span></div>`
      : `<div><span class="status-badge status-err">${t('sigInvalid')}</span></div>`;
    $('#status-list').innerHTML = existing + result;

  } catch(e) {
    alert('Verification failed: ' + e.message);
  }
}

function clearAll() {
  $('#token-input').value = '';
  $('#secret-input').value = '';
  ['#header-section','#payload-section','#claims-section','#status-section'].forEach(s => $(s).style.display='none');
}
