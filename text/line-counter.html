const { $, copyText, t } = GZ;

const commentPatterns = {
  none: { line: [] },
  auto: { line: [], multi: [['/*','*/'],['<!--','-->']], shebang: true },
  javascript: { line: ['//'], multi: [['/*','*/']], shebang: true },
  python: { line: ['#'], multi: [['"""','"""'],["'''","'''"]], shebang: true },
  css: { line: [], multi: [['/*','*/']] },
  html: { line: [], multi: [['<!--','-->']] },
  java: { line: ['//'], multi: [['/*','*/'],['/**','*/']], shebang: true },
  c: { line: ['//'], multi: [['/*','*/']], shebang: true },
  cpp: { line: ['//'], multi: [['/*','*/']], shebang: true },
  ruby: { line: ['#'], multi: [['=begin','=end']], shebang: true },
  php: { line: ['//','#'], multi: [['/*','*/']], shebang: true },
  shell: { line: ['#'], shebang: true },
  sql: { line: ['--'], multi: [['/*','*/']] },
  go: { line: ['//'], multi: [['/*','*/']] },
  rust: { line: ['//'], multi: [['/*','*/']] },
  swift: { line: ['//'], multi: [['/*','*/']] },
};

let currentLang = 'auto';

function detectLanguage(text) {
  if (/<[a-z][\s\S]*?>/i.test(text) && /<\/[a-z]+>/i.test(text)) return 'html';
  if (/\{(.*?)\}/.test(text) && /(--[a-z]|#[a-f0-9]{3,6}|@media)/i.test(text)) return 'css';
  if (/(function |const |let |var |=>|import |export |require\()/.test(text)) return 'javascript';
  if (/(def |class |import |from |elif |print\()/.test(text)) return 'python';
  if (/(\bpublic\b|\bprivate\b|\bclass\b|\bvoid\b|System\.out)/.test(text)) return 'java';
  if (/(#include|printf|scanf|int main)/.test(text)) return 'c';
  if (/(std::|cout|cin|namespace)/.test(text)) return 'cpp';
  if (/(def |end|puts|require |gem )/.test(text)) return 'ruby';
  if (/<\?php/.test(text)) return 'php';
  if (/^(SELECT|INSERT|UPDATE|DELETE|CREATE|ALTER|DROP)/im.test(text.trim())) return 'sql';
  if (/^(package|func |fmt\.|go )/.test(text.trim())) return 'go';
  if (/^(fn |let mut|impl |use )/.test(text.trim())) return 'rust';
  return 'auto';
}

function isCommentLine(line, lang) {
  const trimmed = line.trim();
  if (!trimmed) return false;
  const patterns = commentPatterns[lang] || commentPatterns.auto;
  // Shebang
  if (patterns.shebang && trimmed.startsWith('#!')) return true;
  // Line comments
  for (const prefix of patterns.line || []) {
    if (trimmed.startsWith(prefix)) return true;
  }
  // Multi-line block comment start/end detection
  // For simplicity, we detect single-line block comments
  for (const [start, end] of patterns.multi || []) {
    if (trimmed.startsWith(start) && trimmed.endsWith(end)) return true;
    if (trimmed.startsWith(start) || trimmed.endsWith(end)) return true;
    // Lines fully inside block comments (very rough heuristic)
    if (trimmed === start || trimmed === end) return true;
  }
  return false;
}

function analyze(text) {
  if (!text.trim()) return { total:0, code:0, blank:0, comment:0, words:0, chars:0, sentences:0, bytes:0 };
  const lines = text.split('\n');
  const lang = currentLang === 'auto' ? detectLanguage(text) : currentLang;
  let code = 0, blank = 0, comment = 0;

  let inBlock = false;
  const patterns = commentPatterns[lang] || commentPatterns.auto;
  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];
    const trimmed = line.trim();
    if (!trimmed) { blank++; continue; }
    // Check shebang
    if (patterns.shebang && trimmed.startsWith('#!')) { comment++; continue; }
    // Check line comments
    let isComment = false;
    for (const prefix of patterns.line || []) {
      if (trimmed.startsWith(prefix)) { isComment = true; break; }
    }
    if (isComment) { comment++; continue; }
    // Check multi-line comments
    for (const [start, end] of patterns.multi || []) {
      if (inBlock) {
        if (trimmed.includes(end)) inBlock = false;
        comment++; isComment = true; break;
      }
      if (trimmed.includes(start)) {
        isComment = true; comment++;
        if (!trimmed.includes(end) || trimmed.indexOf(end) < trimmed.indexOf(start)) inBlock = true;
        break;
      }
    }
    if (!isComment) code++;
  }

  const words = text.trim() ? text.trim().split(/\s+/).length : 0;
  const sentences = text.trim() ? (text.match(/[.!?。！？]+/g) || []).length || (words > 0 ? 1 : 0) : 0;

  return {
    total: lines.length,
    code, blank, comment, words,
    chars: text.length,
    sentences,
    bytes: new Blob([text]).size,
  };
}

function renderStats(stats) {
  const items = [
    { key: 'totalLines', value: stats.total, primary: true },
    { key: 'codeLines', value: stats.code },
    { key: 'blankLines', value: stats.blank },
    { key: 'commentLines', value: stats.comment },
    { key: 'words', value: stats.words },
    { key: 'chars', value: stats.chars },
    { key: 'sentences', value: stats.sentences },
    { key: 'bytes', value: stats.bytes },
  ];
  $('#statsGrid').innerHTML = items.map(item => `
    <div class="stat-card ${item.primary ? 'primary' : ''}">
      <div class="stat-value">${item.value.toLocaleString()}</div>
      <div class="stat-label">${t(item.key)}</div>
    </div>`).join('');

  // Composition bars
  if (stats.total > 0) {
    const codePct = (stats.code / stats.total * 100).toFixed(1);
    const blankPct = (stats.blank / stats.total * 100).toFixed(1);
    const commentPct = (stats.comment / stats.total * 100).toFixed(1);
    $('#compositionBars').innerHTML = `
      <div style="font-size:.85em;margin:16px 0 8px;font-weight:600">${t('composition')}</div>
      <div style="display:flex;gap:8px;font-size:.75em;margin-bottom:8px">
        <span style="color:#4ecdc4">■ ${t('codeLines')}: ${codePct}%</span>
        <span style="color:#888">■ ${t('blankLines')}: ${blankPct}%</span>
        <span style="color:#ffd93d">■ ${t('commentLines')}: ${commentPct}%</span>
      </div>
      <div style="display:flex;height:24px;border-radius:6px;overflow:hidden;background:#111">
        <div style="width:${codePct}%;background:#4ecdc4;transition:width .3s"></div>
        <div style="width:${blankPct}%;background:#555;transition:width .3s"></div>
        <div style="width:${commentPct}%;background:#ffd93d;transition:width .3s"></div>
      </div>`;
  } else {
    $('#compositionBars').innerHTML = '';
  }
}

function loadExample() {
  $('#textInput').value = `// Line Counter Example
// A sample JavaScript file

/**
 * Calculate the factorial of a number
 * @param {number} n - The number
 * @returns {number} The factorial
 */
function factorial(n) {
  if (n <= 1) return 1;
  return n * factorial(n - 1);
}

// Main function
function main() {
  const numbers = [1, 2, 3, 4, 5];

  for (const num of numbers) {
    const result = factorial(num);
    console.log(\`factorial(\${num}) = \${result}\`);
  }

  /* Print summary
     Total calculations: 5 */
  console.log('Done!');
}

main();`;
  doAnalyze();
}

function doAnalyze() {
  const text = $('#textInput').value;
  const stats = analyze(text);
  renderStats(stats);
}

  $('#textInput').value = '';

</script>
