<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is an SVG text file?", "acceptedAnswer": {"@type": "Answer", "text": "SVG (Scalable Vector Graphics) stores text as vector paths rather than pixels, so it stays crisp at any size. The text remains editable in design tools like Figma, Illustrator and Inkscape."}}, {"@type": "Question", "name": "Can I use my own font?", "acceptedAnswer": {"@type": "Answer", "text": "The dropdown lists the common web-safe fonts available on your system. The font name is written into the SVG so any viewer that has the same font renders identically."}}, {"@type": "Question", "name": "How do gradients and strokes work?", "acceptedAnswer": {"@type": "Answer", "text": "You can pick a solid fill or a two-stop linear gradient, set the angle, and add an optional stroke (outline) with its own color and width. The preview updates instantly as you change any value."}}, {"@type": "Question", "name": "Does this tool upload my text?", "acceptedAnswer": {"@type": "Answer", "text": "No. All rendering happens locally in your browser using the SVG DOM. Your text never leaves your computer."}}]}</script>

    <div class="ctrl"><label id="lbl-stroke"></label><input type="color" id="stroke" value="#000000"> <span id="lbl-sw"></span><input type="range" id="stroke-w" min="0" max="10" value="0" step="0.5" style="max-width:120px"><span id="sw-v">0</span></div>

<script>
GZI18n.register({
  en: {
    toolTitle: 'Text to SVG Generator',
    toolDesc: 'Convert text into a downloadable SVG file. Adjust font, size, weight, color, gradient, stroke and letter spacing — then download a clean scalable vector. 100% browser-based.',
    text: 'Text',
    font: 'Font',
    size: 'Font size',
    weight: 'Weight',
    style: 'Style',
    mode: 'Fill mode',
    solid: 'Solid color',
    gradient: 'Gradient',
    gradStops: 'Gradient',
    angle: 'Angle',
    color: 'Fill color',
    stroke: 'Stroke',
    strokeWidth: 'Width',
    letter: 'Letter spacing',
    preview: 'Preview',
    step1: 'Type your text in the Text field',
    step2: 'Choose font, size, weight and italic style',
    step3: 'Pick solid color or two-stop gradient and optional stroke',
    step4: 'Click Download SVG to save the scalable file',
    download: 'Download SVG',
    copyCode: 'Copy SVG code',
    copied: 'Copied!',
    example: 'Example',
  },
  zh: {
    toolTitle: '文字转 SVG 生成器',
    toolDesc: '将文字转换为可下载的 SVG 文件。可调节字体、字号、粗细、颜色、渐变、描边和字间距 — 下载干净的可缩放矢量图。100% 浏览器本地运行。',
    text: '文字',
    font: '字体',
    size: '字号',
    weight: '粗细',
    style: '样式',
    mode: '填充模式',
    solid: '纯色',
    gradient: '渐变',
    gradStops: '渐变',
    angle: '角度',
    color: '填充色',
    stroke: '描边',
    strokeWidth: '宽度',
    letter: '字间距',
    preview: '预览',
    step1: '在「文字」框中输入你的文字',
    step2: '选择字体、字号、粗细和斜体样式',
    step3: '选择纯色或两色渐变，可选描边',
    step4: '点击「下载 SVG」保存可缩放文件',
    download: '下载 SVG',
    copyCode: '复制 SVG 代码',
    copied: '已复制！',
    example: '示例',
  }
});

const { $, copyText, t } = GZ;
$('#lbl-text').textContent = t('text');
$('#lbl-font').textContent = t('font');
$('#lbl-size').textContent = t('size');
$('#lbl-weight').textContent = t('weight');
$('#lbl-style').textContent = t('style');
$('#lbl-mode').textContent = t('mode');
$('#opt-solid').textContent = t('solid');
$('#opt-grad').textContent = t('gradient');
$('#lbl-color').textContent = t('color');
$('#lbl-grad').textContent = t('gradStops');
$('#lbl-angle').textContent = t('angle');
$('#lbl-stroke').textContent = t('stroke');
$('#lbl-sw').textContent = t('strokeWidth');
$('#lbl-letter').textContent = t('letter');
$('#lbl-prev').textContent = t('preview');

function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function build() {
  const text = $('#text').value || ' ';
  const font = $('#font').value;
  const size = +$('#size').value;
  const weight = $('#weight').value;
  const style = $('#style').value;
  const mode = $('#mode').value;
  const color = $('#color').value;
  const g1 = $('#grad1').value, g2 = $('#grad2').value, ang = +$('#angle').value;
  const stroke = $('#stroke').value, sw = +$('#stroke-w').value;
  const letter = +$('#letter').value;
  $('#size-v').textContent = size;
  $('#sw-v').textContent = sw;
  $('#letter-v').textContent = letter;
  $('#solid-row').style.display = mode === 'solid' ? 'flex' : 'none';
  $('#grad-row').style.display = mode === 'gradient' ? 'flex' : 'none';

  const pad = Math.ceil(size * 0.2);
  const width = Math.max(40, Math.ceil(text.length * size * 0.65) + pad * 2 + letter * text.length);
  const height = size + pad * 2;
  const rad = (ang - 90) * Math.PI / 180;
  const x1 = (50 + Math.cos(rad) * 50).toFixed(2);
  const y1 = (50 + Math.sin(rad) * 50).toFixed(2);
  const x2 = (50 - Math.cos(rad) * 50).toFixed(2);
  const y2 = (50 - Math.sin(rad) * 50).toFixed(2);

  let fill;
  let defs = '';
  if (mode === 'gradient') {
    defs = `<defs><linearGradient id="gz-grad" x1="${x1}%" y1="${y1}%" x2="${x2}%" y2="${y2}%"><stop offset="0%" stop-color="${g1}"/><stop offset="100%" stop-color="${g2}"/></linearGradient></defs>`;
    fill = 'url(#gz-grad)';
  } else {
    fill = color;
  }
  const strokeAttr = sw > 0 ? ` stroke="${stroke}" stroke-width="${sw}" paint-order="stroke fill"` : '';
  const letterAttr = letter !== 0 ? ` letter-spacing="${letter}"` : '';

  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${width}" height="${height}" viewBox="0 0 ${width} ${height}">${defs}<text x="${pad}" y="${pad + size * 0.78}" font-family="${esc(font)}, sans-serif" font-size="${size}" font-weight="${weight}" font-style="${style}" fill="${fill}"${strokeAttr}${letterAttr}>${esc(text)}</text></svg>`;
  $('#preview').innerHTML = svg;
  return svg;
}

['text','font','size','weight','style','mode','color','grad1','grad2','angle','stroke','stroke-w','letter'].forEach(id => {
  const el = $('#' + id);
  el.addEventListener('input', build);
  el.addEventListener('change', build);
});

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="downloadSvg()">⬇ ${t('download')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="copySvg()">📋 ${t('copyCode')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="document.getElementById('text').value='Hello';build()">${t('example')}</button>`;

window.downloadSvg = () => {
  const svg = build();
  const blob = new Blob([svg], { type: 'image/svg+xml' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = ($('#text').value || 'text').replace(/[^A-Za-z0-9_-]+/g, '_').slice(0, 40) + '.svg';
  a.click();
};
window.copySvg = () => {
  copyText(build());
  const s = $('#lbl-prev'); const o = s.textContent;
  s.textContent = '✓ ' + t('copied');
  setTimeout(() => s.textContent = o, 1500);
};

GZ.renderToolPage({
  category: 'convert',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🎨', href:'/text/text-banner.html', name:'Text Banner'},
    {icon:'✨', href:'/text/fancy-text-generator.html', name:'Fancy Text'},
    {icon:'🌈', href:'/image/gradient-image.html', name:'Gradient Image'},
    {icon:'🖼️', href:'/image/svg-icon-generator.html', name:'SVG Icon'},
  ]
});
</script>
