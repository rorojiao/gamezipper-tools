<script>
GZI18n.register({
  en: {
    toolTitle: 'JSON to Plain Text Converter',
    toolDesc: 'Extract readable plain text from any JSON document. Show keys, paths, values, and choose custom separators. Free, browser-based.',
    convert: 'Convert',
    step1: 'Paste your JSON data in the input area',
    step2: 'Choose options: show keys, paths, values, separator and depth',
    step3: 'Click Convert to extract plain text output',
    step4: 'Copy the result to use in documents, emails or reports',
  },
  zh: {
    toolTitle: 'JSON 转纯文本转换器',
    toolDesc: '从任意 JSON 文档提取可读的纯文本。可显示键、路径、值，并选择自定义分隔符。免费，浏览器本地运行。',
    convert: '转换',
    step1: '在输入区粘贴 JSON 数据',
    step2: '选择选项：显示键、路径、值、分隔符和深度',
    step3: '点击「转换」提取纯文本输出',
    step4: '复制结果用于文档、邮件或报告',
  }
});

const { $, copyText, t } = GZ;

function flatten(obj, prefix='', depth=0, maxDepth=10) {
  if (depth > maxDepth) return [];
  const results = [];
  if (obj === null) {
    results.push({path: prefix, key: prefix.split('.').pop() || 'root', value: 'null', type: 'null'});
  } else if (Array.isArray(obj)) {
    if (obj.length === 0) {
      results.push({path: prefix, key: prefix.split('.').pop() || 'root', value: '[]', type: 'array'});
    } else {
      obj.forEach((v, i) => {
        const newPath = prefix ? `${prefix}[${i}]` : `[${i}]`;
        results.push(...flatten(v, newPath, depth + 1, maxDepth));
      });
    }
  } else if (typeof obj === 'object') {
    const keys = Object.keys(obj);
    if (keys.length === 0) {
      results.push({path: prefix, key: prefix.split('.').pop() || 'root', value: '{}', type: 'object'});
    } else {
      keys.forEach(k => {
        const newPath = prefix ? `${prefix}.${k}` : k;
        results.push(...flatten(obj[k], newPath, depth + 1, maxDepth));
      });
    }
  } else {
    results.push({
      path: prefix,
      key: prefix.split('.').pop() || 'root',
      value: String(obj),
      type: typeof obj
    });
  }
  return results;
}

function getSeparator() {
  const sel = $('#separator').value;
  if (sel === 'newline') return '\n';
  if (sel === 'space') return ' ';
  if (sel === 'comma') return ', ';
  if (sel === 'semicolon') return '; ';
  if (sel === 'tab') return '\t';
  if (sel === 'custom') return $('#customSep').value || '\n';
  return '\n';
}

function doConvert() {
  const inp = $('#input').value.trim();
  if (!inp) {
    $('#output').textContent = '';
    $('#status').textContent = '';
    return;
  }
  try {
    const obj = JSON.parse(inp);
    const showKey = $('#showKey').checked;
    const showPath = $('#showPath').checked;
    const showVal = $('#showVal').checked;
    const sep = getSeparator();
    const maxDepth = parseInt($('#maxDepth').value) || 10;
    const items = flatten(obj, '', 0, maxDepth);
    const lines = items.map(item => {
      const parts = [];
      if (showPath && item.path) parts.push(item.path);
      else if (showKey && item.key) parts.push(item.key);
      if (showVal) parts.push(item.value);
      return parts.join(': ');
    });
    const result = lines.join(sep);
    $('#output').textContent = result;
    $('#status').innerHTML = `<span style="color:var(--gz-success)">✓ Extracted ${items.length} entries</span>`;
  } catch(e) {
    $('#output').innerHTML = `<span style="color:var(--gz-accent)">✗ Invalid JSON: ${e.message}</span>`;
    $('#status').innerHTML = `<span style="color:var(--gz-accent)">Error parsing JSON</span>`;
  }
}

function loadExample() {
  $('#input').value = JSON.stringify({
    "name": "GameZipper Tools",
    "version": "1.0.0",
    "active": true,
    "downloads": 50000,
    "tags": ["free", "online", "browser"],
    "author": {
      "name": "Hermes",
      "email": "hermes@gamezipper.com"
    },
    "rating": null
  }, null, 2);
  doConvert();
}

function doClear() {
  $('#input').value = '';
  $('#output').textContent = '';
  $('#status').textContent = '';
}

['input','showKey','showPath','showVal','separator','customSep','maxDepth'].forEach(id => {
  $('#' + id).addEventListener('input', doConvert);
  $('#' + id).addEventListener('change', doConvert);
});

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="doConvert()">${t('convert')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

GZ.renderToolPage({
  category: 'dev',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📋', href:'/dev/json.html', name:'JSON Formatter'},
    {icon:'🌳', href:'/dev/json-tree.html', name:'JSON Tree Viewer'},
    {icon:'📊', href:'/dev/json-statistics.html', name:'JSON Statistics'},
    {icon:'🔍', href:'/dev/json-validator.html', name:'JSON Validator'},
  ]
});
</script>
