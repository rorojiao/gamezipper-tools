const {$,t,copyText}=GZ;

// Minimal CSV parser supporting quoted fields and embedded commas/newlines
function parseCSV(text){
  const rows=[];let row=[];let field='';let inQuotes=false;
  for(let i=0;i<text.length;i++){
    const c=text[i];
    if(inQuotes){
      if(c==='"'){
        if(text[i+1]==='"'){field+='"';i++;}
        else inQuotes=false;
      } else field+=c;
    } else {
      if(c==='"') inQuotes=true;
      else if(c===','){row.push(field);field='';}
      else if(c==='\n'){row.push(field);rows.push(row);row=[];field='';}
      else if(c==='\r'){/* skip */}
      else field+=c;
    }
  }
  if(field!==''||row.length){row.push(field);rows.push(row);}
  return rows.filter(r=>r.length>1||(r.length===1&&r[0].trim()!==''));
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function doCompare(){
  const a=$('#csvA').value.trim(), b=$('#csvB').value.trim();
  if(!a||!b){alert(t('emptyBoth'));return;}
  const rowsA=parseCSV(a), rowsB=parseCSV(b);
  const hasHeader=$('#hasHeader').checked;
  const ignoreOrder=$('#ignoreOrder').checked;
  const hideSame=$('#hideSame').checked;
  let headers=[], dataA, dataB;
  if(hasHeader){
    headers=rowsA[0]||[];
    dataA=rowsA.slice(1); dataB=rowsB.slice(1);
    if((rowsB[0]||[]).length!==headers.length){
      // mismatch — still proceed with A headers
    }
  } else {
    const maxLen=Math.max(rowsA[0]?.length||0, rowsB[0]?.length||0, 1);
    headers=Array.from({length:maxLen},(_,i)=>`Col ${i+1}`);
    dataA=rowsA; dataB=rowsB;
  }
  // key column auto = first column
  let keyIdx=parseInt($('#keyCol').value);
  if(isNaN(keyIdx)||keyIdx<0) keyIdx=0;

  const rows=[];
  if(ignoreOrder){
    const mapA=new Map(), mapB=new Map();
    dataA.forEach(r=>mapA.set(r[keyIdx]??'', r));
    dataB.forEach(r=>mapB.set(r[keyIdx]??'', r));
    const keys=new Set([...mapA.keys(), ...mapB.keys()]);
    keys.forEach(k=>{
      const ra=mapA.get(k), rb=mapB.get(k);
      if(ra&&!rb) rows.push({type:'removed', key:k, a:ra, b:null});
      else if(!ra&&rb) rows.push({type:'added', key:k, a:null, b:rb});
      else{
        const cellChanges=[];
        const len=Math.max(ra.length, rb.length);
        let changed=false;
        for(let i=0;i<len;i++){
          const va=ra[i]??'', vb=rb[i]??'';
          if(va!==vb){changed=true; cellChanges.push(i);}
        }
        rows.push({type:changed?'changed':'same', key:k, a:ra, b:rb, cellChanges});
      }
    });
  } else {
    const len=Math.max(dataA.length, dataB.length);
    for(let i=0;i<len;i++){
      const ra=dataA[i], rb=dataB[i];
      if(ra&&!rb) rows.push({type:'removed', key:i, a:ra, b:null});
      else if(!ra&&rb) rows.push({type:'added', key:i, a:null, b:rb});
      else{
        const len2=Math.max(ra.length, rb.length);
        let changed=false;const cellChanges=[];
        for(let j=0;j<len2;j++){
          if((ra[j]??'')!==(rb[j]??'')){changed=true;cellChanges.push(j);}
        }
        rows.push({type:changed?'changed':'same', key:ra[keyIdx]??i, a:ra, b:rb, cellChanges});
      }
    }
  }
  renderDiff(rows, headers, hideSame);
}

function renderDiff(rows, headers, hideSame){
  const counts={added:0,removed:0,changed:0,same:0};
  rows.forEach(r=>counts[r.type]++);
  $('#stats').innerHTML=`
    <div class="diff-stat added"><span class="n">${counts.added}</span>${t('added')}</div>
    <div class="diff-stat removed"><span class="n">${counts.removed}</span>${t('removed')}</div>
    <div class="diff-stat changed"><span class="n">${counts.changed}</span>${t('changed')}</div>
    <div class="diff-stat same"><span class="n">${counts.same}</span>${t('same')}</div>`;
  const visible=hideSame?rows.filter(r=>r.type!=='same'):rows;
  let html='<thead><tr><th>#</th><th>↕</th>';
  headers.forEach(h=>html+=`<th>${esc(h)}</th>`);
  html+='</tr></thead><tbody>';
  visible.forEach((r,i)=>{
    html+=`<tr class="${r.type}"><td>${i+1}</td><td><span class="tag ${r.type}">${t(r.type)}</span></td>`;
    const len=Math.max(r.a?.length||0, r.b?.length||0, headers.length);
    for(let j=0;j<Math.max(headers.length,len);j++){
      const va=r.a?r.a[j]??'':'', vb=r.b?r.b[j]??'':'';
      if(r.type==='changed'&&r.cellChanges.includes(j)){
        html+=`<td><span class="cell-del">${esc(va)}</span> → <span class="cell-add">${esc(vb)}</span></td>`;
      } else if(r.type==='removed'){
        html+=`<td>${esc(va)}</td>`;
      } else if(r.type==='added'){
        html+=`<td>${esc(vb)}</td>`;
      } else {
        html+=`<td>${esc(vb||va)}</td>`;
      }
    }
    html+='</tr>';
  });
  html+='</tbody>';
  $('#diffTable').innerHTML=html;
  $('#diffWrap').style.display='block';
}

function exportDiff(){
  const a=$('#csvA').value.trim(), b=$('#csvB').value.trim();
  if(!a||!b){alert(t('emptyBoth'));return;}
  // re-run to populate last results
  if(!$('#diffTable').innerHTML) doCompare();
  const rows=$('#diffTable').querySelectorAll('tbody tr');
  if(!rows.length) return;
  const headers=['#','type',...Array.from($('#diffTable').querySelectorAll('thead th')).slice(2).map(th=>th.textContent)];
  const lines=[headers.map(h=>`"${h.replace(/"/g,'""')}"`).join(',')];
  rows.forEach(r=>{
    const cells=Array.from(r.querySelectorAll('td')).map(td=>{
      // strip tags for export — use textContent with arrows stripped
      return `"${td.textContent.replace(/"/g,'""')}"`;
    });
    lines.push(cells.join(','));
  });
  copyText(lines.join('\n'));
  GZ.showToast('✓ CSV copied');
}

}
