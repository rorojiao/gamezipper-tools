    step4: '再次应用 ROT13 即可还原为原文',
  }
});

const { $, copyText, t } = GZ;

function rot13(str) {
  return [...str].map(ch => {
    const code = ch.charCodeAt(0);
    if (code >= 65 && code <= 90) return String.fromCharCode(((code - 65 + 13) % 26) + 65);
    if (code >= 97 && code <= 122) return String.fromCharCode(((code - 97 + 13) % 26) + 97);
    return ch;
  }).join('');
}

function update() {
  const inp = $('#input').value;
  $('#output').textContent = rot13(inp);
}

function loadExample() {
  $('#input').value = 'The quick brown fox jumps over the lazy dog';
  update();
}

function doClear() { $('#input').value = ''; $('#output').textContent = ''; }

$('#input').addEventListener('input', update);

$('#toolbar').innerHTML = `
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;
