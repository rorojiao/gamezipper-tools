<script>

  zh: {

    modeList: '列表转分隔',
    modeNum: '数字格式化',

    outDelim: '输出分隔符',
    trim: '修剪空格',

    sort: '字母排序',

    clear: '清空',
    copy: '复制',
    items: '项',
    unique: '唯一',
    result: '结果',
    step1: '选择模式：将列表合并为逗号分隔的一行，或为数字添加千分位。',
    step2: '将文本或数字粘贴到左侧框中。',
    step3: '调整输出分隔符和选项（修剪、去重、加引号、排序）。',
    step4: '点击「复制」将结果复制到剪贴板。',
  }
});

const { $, copyText, t } = GZ;
let mode = 'list';

function getOutDelim() { return $('#outDelim').value; }
function getInDelim() { return $('#inDelim').value; }

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function convert() {
  const raw = $('#input').value;
  let result = '';
  let count = 0, unique = 0;

  if (mode === 'num') {
    // Number formatting: add thousand separators (always a plain comma — standard for numbers)
    const parts = raw.split(/[\n,]+/).map(x => x.trim()).filter(Boolean);
    const out = parts.map(p => {
      const neg = p.startsWith('-');
      let [intPart, decPart] = p.replace(/^-/, '').split('.');
      intPart = intPart.replace(/\D/g, '') || '0';
      const grouped = intPart.replace(/\B(?=(\d{3})+(?!\d))/g, ',');
      let s = grouped;
      if (decPart !== undefined) s += '.' + decPart.replace(/\D/g, '');
      return neg ? '-' + s : s;
    });
    result = out.join('\n');
    count = parts.length; unique = new Set(parts).size;
  } else {
    let delim = getInDelim();
    if (delim === 'auto') delim = /[\r\n]/.test(raw) ? 'newline' : (/\t/.test(raw) ? 'tab' : 'auto');
    let items;
    if (delim === 'newline') items = raw.split(/\r?\n/);
    else if (delim === 'space') items = raw.split(/\s+/);
    else if (delim === 'tab') items = raw.split(/\t/);
    else if (delim === 'comma') items = raw.split(/,/);
    else if (delim === 'semicolon') items = raw.split(/;/);
    else items = raw.split(/[\r\n]+|[,;\t]|\s{2,}/); // auto

    if ($('#trim').checked) items = items.map(s => s.trim());
    if ($('#dropEmpty').checked) items = items.filter(s => s !== '');
    if ($('#dedupe').checked) { const seen = new Set(); items = items.filter(s => seen.has(s) ? false : (seen.add(s), true)); }
    if ($('#sort').checked) items = items.slice().sort((a,b) => a.localeCompare(b));
    if ($('#quote').checked) items = items.map(s => '"' + s.replace(/"/g,'\\"') + '"');

    let outDelim = getOutDelim();
    if (outDelim === '\\t') outDelim = '\t';
    else if (outDelim === '\\n') outDelim = '\n';
    result = items.join(outDelim);
    count = items.length; unique = new Set(items).size;
  }

  $('#output').textContent = result;
  const uTag = ($('#dedupe').checked || unique < count) ? ` · ${unique} ${t('unique')}` : '';
  $('#stats').textContent = `${count} ${t('items')}${uTag}`;
}

function loadSample() {
  if (mode === 'num') $('#input').value = '1234567\n89234501\n45\n1000000.55\n-9876543';
  else $('#input').value = 'apple\nbanana\ncherry\napple\ndate\n';
  convert();
}

$('#input').addEventListener('input', convert);

$('#toolbar').innerHTML = `
  <select class="gz-select" id="modeSel" onchange="mode=this.value;convert()">
    <option value="list">${t('modeList')}</option>
    <option value="num">${t('modeNum')}</option>
  </select>
  <button class="gz-btn" onclick="convert()">${t('modeList').split(' ')[0]} →</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadSample()">${t('sample')}</button>
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#input').value='';convert()">${t('clear')}</button>`;

$('#opts').innerHTML = `
  <label>${t('inDelim')}: <select class="gz-select" id="inDelim" onchange="convert()">
    <option value="auto">auto</option><option value="newline">newline</option>
    <option value="space">space</option><option value="tab">tab</option>
    <option value="comma">comma</option><option value="semicolon">semicolon</option>
  </select></label>
  <label>${t('outDelim')}: <select class="gz-select" id="outDelim" onchange="convert()">
    <option value=", ">comma + space</option><option value=",">comma</option>
    <option value=";">semicolon</option><option value="|">pipe |</option>
    <option value=" ">space</option><option value="\\t">tab</option><option value="\\n">newline</option>
  </select></label>
  <label><input type="checkbox" id="trim" checked> ${t('trim')}</label>
  <label><input type="checkbox" id="dedupe"> ${t('dedupe')}</label>
  <label><input type="checkbox" id="dropEmpty" checked> ${t('dropEmpty')}</label>
  <label><input type="checkbox" id="quote"> ${t('quote')}</label>
  <label><input type="checkbox" id="sort"> ${t('sort')}</label>`;

['trim','dedupe','dropEmpty','quote','sort'].forEach(id => $('#' + id).addEventListener('change', convert));

convert();

    {icon:'🔡', href:'/text/case-converter.html', name:'Case'},
  ]
});
</script>
