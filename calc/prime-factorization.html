  zh: {

    toolDesc: '将任意数字分解为质因数（含指数）。即时查看因数个数、因数之和和全部因数列表。',
    lblNum: '要分解的数字',
    btnCalc: '分解质因数',
    resultLabel: '质因数分解结果',
    count: '质因数个数（含重复）',
    divisorCount: '约数（因数）个数',
    sumDiv: '约数之和',
    isPrime: '是否为质数',
    yes: '是',
    no: '否',
    detailIntro: '根据算术基本定理，每个大于 1 的整数都有唯一的质因数分解。',
    divisorsList: '全部约数：',
    step1: '输入任意大于 1 的整数',
    step2: '点击「分解质因数」',
    step3: '查看带指数的质因数分解形式',
    step4: '查看约数个数、约数之和和全部约数列表',
  }
});

const { $, t } = GZ;

function factorizeN(n) {
  const factors = [];
  let x = n;
  for (let p = 2n; p * p <= x; p++) {
    while (x % p === 0n) { factors.push(p); x /= p; }
  }
  if (x > 1n) factors.push(x);
  return factors;
}

function superscript(k) {
  const map = {'0':'⁰','1':'¹','2':'²','3':'³','4':'⁴','5':'⁵','6':'⁶','7':'⁷','8':'⁸','9':'⁹'};
  return String(k).split('').map(c => map[c] || c).join('');
}

function formatFactors(factors) {
  // group with exponents
  const grouped = {};
  factors.forEach(f => grouped[f] = (grouped[f] || 0) + 1);
  return Object.keys(grouped).map(k => {
    const e = grouped[k];
    return e > 1 ? k + superscript(e) : k;
  }).join(' × ');
}

function allDivisors(factors) {
  // generate divisors from prime factorization
  const grouped = {};
  factors.forEach(f => grouped[f] = (grouped[f] || 0) + 1);
  let divs = [1n];
  for (const [p, exp] of Object.entries(grouped)) {
    const pe = BigInt(p);
    const newDivs = [];
    let power = 1n;
    for (let e = 0; e <= exp; e++) {
      for (const d of divs) newDivs.push(d * power);
      power *= pe;
    }
    divs = newDivs;
  }
  divs.sort((a, b) => a < b ? -1 : a > b ? 1 : 0);
  return divs;
}

function factorize() {
  const raw = $('#num').value.trim();
  if (raw === '') return;
  let n;
  try { n = BigInt(raw); } catch (e) { return; }
  if (n < 2n) return;

  const factors = factorizeN(n);
  const grouped = {};
  factors.forEach(f => grouped[f] = (grouped[f] || 0) + 1);
  const expStr = formatFactors(factors);

  $('#result').style.display = '';
  $('#result-factors').textContent = raw + ' = ' + expStr;
  $('#result-label').textContent = t('resultLabel');

  $('#result-count').textContent = factors.length;
  $('#result-count-label').textContent = t('count');

  const divs = allDivisors(factors);
  $('#result-divisorcount').textContent = divs.length.toString();
  $('#result-divisorcount-label').textContent = t('divisorCount');

  const sumDiv = divs.reduce((a, b) => a + b, 0n);
  $('#result-sumdiv').textContent = sumDiv.toString();
  $('#result-sumdiv-label').textContent = t('sumDiv');

  const isP = factors.length === 1;
  $('#result-isprime').textContent = isP ? t('yes') : t('no');
  $('#result-isprime-label').textContent = t('isPrime');

  $('#detail').innerHTML = '<b>' + t('detailIntro') + '</b>';

  const divsStr = divs.map(d => d.toString()).slice(0, 200).map(d => `<span class="divisor-chip">${d}</span>`).join('');
  $('#divisors').innerHTML = '<b style="width:100%;text-align:center;margin-bottom:4px">' + t('divisorsList') + '</b>' + divsStr;
}

$('#btn-calc').textContent = t('btnCalc');
factorize();
