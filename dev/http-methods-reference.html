<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"What are HTTP methods?","acceptedAnswer":{"@type":"Answer","text":"HTTP methods (also called verbs) indicate the desired action to be performed on a resource. The most common are GET (retrieve), POST (create), PUT (replace), PATCH (modify), and DELETE (remove). They are defined in the HTTP specification (RFC 7231)."}},{"@type":"Question","name":"What is the difference between PUT and PATCH?","acceptedAnswer":{"@type":"Answer","text":"PUT replaces an entire resource with a new representation — you send the full object. PATCH applies a partial modification — you send only the fields that should change. PATCH is more bandwidth-efficient for small updates."}},{"@type":"Question","name":"What does idempotent mean?","acceptedAnswer":{"@type":"Answer","text":"An HTTP method is idempotent if making the same request multiple times produces the same result as making it once. GET, PUT, and DELETE are idempotent. POST is not — sending it twice may create two resources."}},{"@type":"Question","name":"Is GET a safe method?","acceptedAnswer":{"@type":"Answer","text":"Yes. Safe methods (GET, HEAD, OPTIONS) do not modify server state — they only retrieve data. This allows browsers and caches to prefetch or cache GET responses safely."}}]}</script>

<script>
GZI18n.register({
  en: {
    toolTitle: 'HTTP Methods Reference',
    toolDesc: 'Complete HTTP request methods — GET, POST, PUT, PATCH, DELETE, HEAD, OPTIONS. Learn safe, idempotent and cacheable properties.',
    safe: 'Safe',
    idempotent: 'Idempotent',
    cacheable: 'Cacheable',
    body: 'Body',
    yes: 'Yes',
    no: 'No',
    example: 'Example',
    step1: 'Browse all standard HTTP request methods',
    step2: 'Check the property badges — Safe, Idempotent, Cacheable, Body',
    step3: 'Read the description to learn when to use each method',
    step4: 'See the example request to understand the format',
  },
  zh: {
    toolTitle: 'HTTP 请求方法参考',
    toolDesc: '完整的 HTTP 请求方法 — GET、POST、PUT、PATCH、DELETE、HEAD、OPTIONS。了解安全、幂等和可缓存属性。',
    safe: '安全',
    idempotent: '幂等',
    cacheable: '可缓存',
    body: '请求体',
    yes: '是',
    no: '否',
    example: '示例',
    step1: '浏览所有标准 HTTP 请求方法',
    step2: '查看属性标签 — 安全、幂等、可缓存、请求体',
    step3: '阅读描述了解每种方法的使用场景',
    step4: '查看示例请求了解格式',
  }
});

const { t } = GZ;

const METHODS = [
  {m:'GET',color:'#00d672',safe:true,idem:true,cache:true,body:false,d:'Retrieve a representation of the specified resource. GET requests should only fetch data and must not change server state.',ex:'GET /api/users/42 HTTP/1.1\nHost: example.com\nAccept: application/json'},
  {m:'POST',color:'#61afef',safe:false,idem:false,cache:false,body:true,d:'Submit data to be processed. Typically used to create a new resource. The body contains the payload (form data, JSON, etc.).',ex:'POST /api/users HTTP/1.1\nHost: example.com\nContent-Type: application/json\n\n{"name":"Alice","email":"alice@example.com"}'},
  {m:'PUT',color:'#ffd93d',safe:false,idem:true,cache:false,body:true,d:'Replace the entire target resource with the provided representation. If the resource exists, it is overwritten; if not, it may be created.',ex:'PUT /api/users/42 HTTP/1.1\nHost: example.com\nContent-Type: application/json\n\n{"name":"Alice","email":"alice@new.com"}'},
  {m:'PATCH',color:'#ff9f43',safe:false,idem:false,cache:false,body:true,d:'Apply partial modifications to a resource. Only the fields included in the body are changed; others remain untouched.',ex:'PATCH /api/users/42 HTTP/1.1\nHost: example.com\nContent-Type: application/json\n\n{"email":"alice@new.com"}'},
  {m:'DELETE',color:'#e94560',safe:false,idem:true,cache:false,body:false,d:'Remove the specified resource. Idempotent — deleting the same resource twice has the same effect as deleting once.',ex:'DELETE /api/users/42 HTTP/1.1\nHost: example.com'},
  {m:'HEAD',color:'#c0c0c0',safe:true,idem:true,cache:true,body:false,d:'Identical to GET but the server returns only the response headers — no body. Useful for checking metadata without downloading content.',ex:'HEAD /api/users/42 HTTP/1.1\nHost: example.com'},
  {m:'OPTIONS',color:'#a29bfe',safe:true,idem:true,cache:false,body:false,d:'Describe the communication options for the target resource. Commonly used in CORS preflight requests to check allowed methods.',ex:'OPTIONS /api/users HTTP/1.1\nHost: example.com\nOrigin: https://app.example.com\nAccess-Control-Request-Method: POST'},
  {m:'TRACE',color:'#888',safe:true,idem:true,cache:false,body:false,d:'Perform a message loop-back test along the path to the target resource. Mostly used for debugging — often disabled for security.',ex:'TRACE /api/users HTTP/1.1\nHost: example.com'},
  {m:'CONNECT',color:'#888',safe:false,idem:false,cache:false,body:false,d:'Establish a tunnel to the server identified by the target resource. Primarily used with HTTPS proxies (TLS tunneling).',ex:'CONNECT example.com:443 HTTP/1.1\nHost: example.com:443'},
];

function badge(label, val) {
  return `<span class="hm-prop ${val?'yes':'no'}">${label} ${val?t('yes'):t('no')}</span>`;
}

let html = '';
for (const m of METHODS) {
  html += `<div class="hm-card">
    <div class="hm-head">
      <span class="hm-method" style="background:${m.color}">${m.m}</span>
      <div class="hm-props">
        ${badge(t('safe'),m.safe)}
        ${badge(t('idempotent'),m.idem)}
        ${badge(t('cacheable'),m.cache)}
        ${badge(t('body'),m.body)}
      </div>
    </div>
    <div class="hm-desc">${m.d}</div>
    <div class="hm-example"><b style="opacity:.6">${t('example')}:</b>\n${m.ex.replace(/</g,'&lt;')}</div>
  </div>`;
}
document.getElementById('output').innerHTML = html;

GZ.renderToolPage({
  category: 'dev',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📊', href:'/dev/http-status-codes.html', name:'HTTP Status Codes'},
    {icon:'📋', href:'/dev/mime-type-reference.html', name:'MIME Types'},
    {icon:'🌐', href:'/dev/url-parser.html', name:'URL Parser'},
    {icon:'🔗', href:'/dev/api-tester.html', name:'API Tester'},
  ]
});
</script>
