<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="w2h-drop" id="drop">
      <div class="icon">📝➡️🌐</div>
      <div id="dropLabel"></div>
      <div class="w2h-info" id="dropInfo"></div>
      <input type="file" id="file" accept=".docx,.doc" hidden>
    </div>
    <div class="w2h-toggle" id="toggle">
      <button class="active" data-mode="code" id="btnCode"></button>
      <button data-mode="preview" id="btnPreview"></button>
    </div>
    <div class="gz-split">
      <div><label id="lbl-out"></label><div class="gz-output" id="w2h-output"></div></div>
      <div id="previewWrap" style="display:none"><label id="lbl-rendered"></label><div class="gz-output" id="w2h-rendered"></div></div>
    </div>

  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>

</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Word to HTML Converter',
    toolDesc: 'Convert Word documents (.docx) to clean, semantic HTML — headings, lists, links and tables preserved. 100% browser-based, no upload, no signup.',
    chooseFile: 'Choose .docx file or drag it here',
    info: 'Supports .docx • Converted locally with Mammoth.js',
    copy: 'Copy HTML',
    download: '⬇ Download .html',
    clear: 'Clear',
    codeMode: 'HTML Code',
    previewMode: 'Preview',
    output: 'HTML Output',
    rendered: 'Rendered Preview',
    noFile: 'Please choose a .docx file.',
    error: 'Error: ',
    success: '✓ Converted successfully!',
    step1: 'Click the drop zone or drag your .docx file onto it',
    step2: 'The tool auto-converts the document to clean HTML',
    step3: 'Toggle between HTML source code and rendered preview',
    step4: 'Click Copy to copy HTML or Download to save as .html',
  },
  zh: {
    toolTitle: 'Word 转 HTML 转换器',
    toolDesc: '将 Word 文档 (.docx) 转换为干净、语义化的 HTML — 保留标题、列表、链接和表格。100% 浏览器本地处理，无需上传、无需注册。',
    chooseFile: '选择 .docx 文件或拖拽到此处',
    info: '支持 .docx • 使用 Mammoth.js 本地转换',
    copy: '复制 HTML',
    download: '⬇ 下载 .html',
    clear: '清空',
    codeMode: 'HTML 代码',
    previewMode: '预览',
    output: 'HTML 输出',
    rendered: '渲染预览',
    noFile: '请选择一个 .docx 文件。',
    error: '错误：',
    success: '✓ 转换成功！',
    step1: '点击上传区域或将 .docx 文件拖拽到此处',
    step2: '工具会自动将文档转换为干净的 HTML',
    step3: '在 HTML 源代码和渲染预览之间切换',
    step4: '点击「复制」复制 HTML 或「下载」保存为 .html 文件',
  }
});

const { $, copyText, t } = GZ;
let htmlResult = '';
let mode = 'code';

$('#dropLabel').textContent = t('chooseFile');
$('#dropInfo').textContent = t('info');
$('#btnCode').textContent = t('codeMode');
$('#btnPreview').textContent = t('previewMode');
$('#lbl-out').textContent = t('output');
$('#lbl-rendered').textContent = t('rendered');

const drop = $('#drop');
drop.addEventListener('click', () => $('#file').click());
drop.addEventListener('dragover', e => { e.preventDefault(); drop.classList.add('dragover'); });
drop.addEventListener('dragleave', () => drop.classList.remove('dragover'));
drop.addEventListener('drop', e => { e.preventDefault(); drop.classList.remove('dragover'); if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]); });
$('#file').addEventListener('change', e => { if (e.target.files[0]) handleFile(e.target.files[0]); });

async function handleFile(f) {
  if (!f) return;
  if (!/\.(docx|doc)$/i.test(f.name)) { $('#status').innerHTML = `<span style="color:var(--accent)">${t('noFile')}</span>`; return; }
  $('#status').innerHTML = `<span style="opacity:.7">…</span>`;
  try {
    const arrayBuffer = await f.arrayBuffer();
    const result = await mammoth.convertToHtml({ arrayBuffer });
    htmlResult = result.value;
    renderOutput();
    drop.querySelector('.icon').textContent = '📄';
    $('#dropLabel').textContent = f.name;
    $('#dropInfo').textContent = (f.size / 1024).toFixed(1) + ' KB';
    $('#status').innerHTML = `<span style="color:var(--gz-success)">${t('success')}</span>`;
  } catch (e) {
    $('#status').innerHTML = `<span style="color:var(--accent)">${t('error')}${e.message}</span>`;
  }
}

function renderOutput() {
  $('#w2h-output').textContent = htmlResult;
  $('#w2h-rendered').innerHTML = htmlResult;
}

function setMode(m) {
  mode = m;
  $('#btnCode').classList.toggle('active', m === 'code');
  $('#btnPreview').classList.toggle('active', m === 'preview');
  $('#w2h-output').parentElement.style.display = m === 'code' ? '' : 'none';
  $('#previewWrap').style.display = m === 'preview' ? '' : 'none';
}

$('#btnCode').addEventListener('click', () => setMode('code'));
$('#btnPreview').addEventListener('click', () => setMode('preview'));

function doDownload() {
  if (!htmlResult) return;
  const full = `<!DOCTYPE html>\n<html lang="en">\n<head>\n<meta charset="UTF-8">\n<meta name="viewport" content="width=device-width,initial-scale=1">\n<title>Converted Document</title>\n</head>\n<body>\n${htmlResult}\n</body>\n</html>`;
  const blob = new Blob([full], { type: 'text/html' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'converted.html';
  a.click();
  URL.revokeObjectURL(a.href);
}

function doClear() { htmlResult = ''; renderOutput(); $('#status').innerHTML = ''; $('#dropLabel').textContent = t('chooseFile'); $('#dropInfo').textContent = t('info'); }

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="copyText(htmlResult)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doDownload()">${t('download')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

setMode('code');

GZ.renderToolPage({
  category: 'convert',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📄', href:'/convert/word-to-pdf.html', name:'Word to PDF'},
    {icon:'📥', href:'/convert/pdf-to-word.html', name:'PDF to Word'},
    {icon:'📋', href:'/convert/markdown-to-html.html', name:'Markdown to HTML'},
    {icon:'🔧', href:'/dev/html-formatter.html', name:'HTML Formatter'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
