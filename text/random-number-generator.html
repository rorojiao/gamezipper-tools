<script>
GZI18n.register({
  en: {
    toolTitle: 'Random Number Generator',
    toolDesc: 'Generate random numbers between any range. Pick single numbers or batches, allow or exclude duplicates, sort and export — free, instant, browser-only.',
    min: 'Minimum',
    max: 'Maximum',
    count: 'How many',
    sort: 'Sort',
    unique: 'Duplicates',
    none: 'No sorting',
    ascending: 'Ascending',
    descending: 'Descending',
    allowDupes: 'Allow duplicates',
    noDupes: 'No duplicates',
    step1: 'Enter your minimum and maximum range values',
    step2: 'Set how many numbers to generate',
    step3: 'Choose whether to allow duplicates and how to sort',
    step4: 'Click Generate and copy the results',
    generated: 'numbers generated',
  },
  zh: {
    toolTitle: '随机数生成器',
    toolDesc: '生成任意范围内的随机数。可生成单个或批量随机数，允许或排除重复，支持排序和导出 — 免费、即时、浏览器本地运行。',
    min: '最小值',
    max: '最大值',
    count: '生成数量',
    sort: '排序',
    unique: '重复',
    none: '不排序',
    ascending: '升序',
    descending: '降序',
    allowDupes: '允许重复',
    noDupes: '不重复',
    step1: '输入最小值和最大值范围',
    step2: '设置要生成多少个随机数',
    step3: '选择是否允许重复和排序方式',
    step4: '点击「生成」并复制结果',
    generated: '个随机数已生成',
  }
});

const { $, copyText, t } = GZ;

$('#lbl-min').textContent = t('min');
$('#lbl-max').textContent = t('max');
$('#lbl-count').textContent = t('count');
$('#lbl-sort').textContent = t('sort');
$('#lbl-unique').textContent = t('unique');
$('#sort').innerHTML = `<option value="none">${t('none')}</option><option value="asc">${t('ascending')}</option><option value="desc">${t('descending')}</option>`;
$('#unique').innerHTML = `<option value="false">${t('allowDupes')}</option><option value="true">${t('noDupes')}</option>`;

function secureRandomInt(min, max) {
  const range = max - min + 1;
  if (range <= 0) return min;
  if (window.crypto && window.crypto.getRandomValues) {
    const maxUint32 = 0xFFFFFFFF;
    const limit = maxUint32 - (maxUint32 % range);
    const arr = new Uint32Array(1);
    let val;
    do { window.crypto.getRandomValues(arr); val = arr[0]; } while (val >= limit);
    return min + (val % range);
  }
  return min + Math.floor(Math.random() * range);
}

function generate() {
  let min = parseInt($('#min').value);
  let max = parseInt($('#max').value);
  let count = parseInt($('#count').value);
  const unique = $('#unique').value === 'true';
  const sort = $('#sort').value;
  if (isNaN(min) || isNaN(max)) { $('#output').innerHTML = '<span style="color:var(--gz-accent)">Please enter valid min and max values.</span>'; return; }
  if (min > max) { [min, max] = [max, min]; $('#min').value = min; $('#max').value = max; }
  if (isNaN(count) || count < 1) count = 1;
  if (count > 10000) count = 10000;
  const range = max - min + 1;
  if (unique && count > range) count = range;
  const results = [];
  const used = new Set();
  let attempts = 0;
  while (results.length < count && attempts < count * 100 + 1000) {
    const n = secureRandomInt(min, max);
    if (unique) { if (!used.has(n)) { used.add(n); results.push(n); } }
    else results.push(n);
    attempts++;
  }
  if (sort === 'asc') results.sort((a, b) => a - b);
  if (sort === 'desc') results.sort((a, b) => b - a);

  if (count <= 100) {
    $('#output').innerHTML = results.map(n => `<span class="result-num">${n}</span>`).join('');
  } else {
    $('#output').textContent = results.join(', ');
  }
  $('#status').innerHTML = `<span style="color:var(--gz-success)">✓ ${results.length} ${t('generated')}</span>`;
  return results.join(', ');
}

let lastResult = '';
const origGenerate = generate;
generate = function() { lastResult = origGenerate(); return lastResult; };

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="generate()">${t('generate')||'🎲 Generate'}</button>
  <button class="gz-btn gz-btn-secondary" onclick="copyText(lastResult)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="if($('#min').value=1,$('#max').value=10,$('#count').value=1,generate())">${t('example')}</button>`;

generate();

    {icon:'🔑', href:'/dev/password-generator.html', name:'Password Generator'},
    {icon:'🪙', href:'/fun/coin-flip-stats.html', name:'Coin Flip'},
  ]
});
</script>
