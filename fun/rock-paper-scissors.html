<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="gz-rps-mode"><label id="lbl-mode"></label> <select id="mode"><option value="fair">Fair (random)</option><option value="smart">Smart (counter-pick)</option></select></div>
    <div class="gz-rps-arena">
      <div class="gz-rps-side">
        <div class="gz-rps-label" id="lbl-you"></div>
        <div class="gz-rps-hand" id="playerHand">✊</div>
      </div>
      <div class="gz-rps-vs">VS</div>
      <div class="gz-rps-side">
        <div class="gz-rps-label" id="lbl-ai"></div>
        <div class="gz-rps-hand" id="aiHand">✊</div>
      </div>
    </div>
    <div class="gz-rps-result" id="result"></div>
    <div class="gz-rps-actions">
      <button class="gz-rps-btn" onclick="play('rock')" aria-label="Rock">✊</button>
      <button class="gz-rps-btn" onclick="play('paper')" aria-label="Paper">✋</button>
      <button class="gz-rps-btn" onclick="play('scissors')" aria-label="Scissors">✌️</button>
    </div>
    <div class="gz-rps-stats">
      <div class="gz-rps-stat"><strong id="stWin">0</strong><span id="lbl-win"></span></div>
      <div class="gz-rps-stat"><strong id="stLose">0</strong><span id="lbl-lose"></span></div>
      <div class="gz-rps-stat"><strong id="stDraw">0</strong><span id="lbl-draw"></span></div>
      <div class="gz-rps-stat"><strong id="stRate">0%</strong><span id="lbl-rate"></span></div>

  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Rock Paper Scissors',
    toolDesc: 'Play the classic Rock Paper Scissors game online against a smart AI. Track wins, losses, draws and your win rate — runs in your browser.',
    you: 'You',
    ai: 'AI',
    mode: 'AI Mode',
    win: 'You Win!',
    lose: 'You Lose!',
    draw: "It's a Draw!",
    wins: 'Wins',
    losses: 'Losses',
    draws: 'Draws',
    winRate: 'Win Rate',
    reset: 'Reset Stats',
    step1: 'Pick the AI difficulty — Fair or Smart',
    step2: 'Click Rock, Paper or Scissors to play a round',
    step3: 'Watch the hands shake and reveal the result',
    step4: 'Track your win rate, streak and overall record',
    beat: 'beats',
    beatenBy: 'is beaten by',
    rockBeats: 'Rock crushes Scissors',
    paperBeats: 'Paper covers Rock',
    scissorsBeats: 'Scissors cut Paper',
    streakHot: '🔥 {n}-win streak!',
    streakCold: '❄️ {n}-loss streak',
  },
  zh: {
    toolTitle: '石头剪刀布',
    toolDesc: '在线玩经典石头剪刀布，对战智能 AI。追踪胜、负、平和胜率 — 浏览器本地运行。',
    you: '你',
    ai: '电脑',
    mode: 'AI 难度',
    win: '你赢了！',
    lose: '你输了！',
    draw: '平局！',
    wins: '胜利',
    losses: '失败',
    draws: '平局',
    winRate: '胜率',
    reset: '重置统计',
    step1: '选择 AI 难度 — 公平或智能',
    step2: '点击石头、剪刀或布进行一回合',
    step3: '观看手势摇晃并揭晓结果',
    step4: '追踪胜率、连胜和总战绩',
    beat: '击败',
    beatenBy: '被击败',
    rockBeats: '石头砸碎剪刀',
    paperBeats: '布包住石头',
    scissorsBeats: '剪刀剪断布',
    streakHot: '🔥 {n} 连胜！',
    streakCold: '❄️ {n} 连败',
  }
});

const { $, copyText, t } = GZ;

const HANDS = {
  rock:     { emoji: '✊', zh: '石头', name: 'Rock' },
  paper:    { emoji: '✋', zh: '布',   name: 'Paper' },
  scissors: { emoji: '✌️', zh: '剪刀', name: 'Scissors' },
};
// rock beats scissors, paper beats rock, scissors beats paper
const BEATS = { rock: 'scissors', paper: 'rock', scissors: 'paper' };
const COUNTER = { rock: 'paper', paper: 'scissors', scissors: 'rock' };

let stats = { win: 0, lose: 0, draw: 0, streak: 0 }; // streak positive = win streak, negative = lose streak
let lastPlayerMove = null;
try {
  const saved = JSON.parse(localStorage.getItem('gz_rps_stats') || 'null');
  if (saved) stats = saved;
} catch (e) {}

function saveStats() {
  try { localStorage.setItem('gz_rps_stats', JSON.stringify(stats)); } catch (e) {}
}

function pickAIMove(playerMove) {
  const mode = $('#mode').value;
  if (mode === 'smart' && lastPlayerMove && Math.random() < 0.55) {
    // counter the player's most likely repeat
    return COUNTER[lastPlayerMove];
  }
  const keys = Object.keys(HANDS);
  return keys[Math.floor(Math.random() * 3)];
}

function play(move) {
  $('#playerHand').textContent = '✊';
  $('#aiHand').textContent = '✊';
  $('#playerHand').classList.remove('shake');
  $('#aiHand').classList.remove('shake');
  void $('#playerHand').offsetWidth; // reflow
  void $('#aiHand').offsetWidth;
  $('#playerHand').classList.add('shake');
  $('#aiHand').classList.add('shake');
  $('#result').textContent = '...';
  $('#result').className = 'gz-rps-result';
  setTimeout(() => {
    const aiMove = pickAIMove(move);
    $('#playerHand').textContent = HANDS[move].emoji;
    $('#aiHand').textContent = HANDS[aiMove].emoji;
    judge(move, aiMove);
    lastPlayerMove = move;
  }, 420);
}

function judge(p, a) {
  const r = $('#result');
  if (p === a) {
    stats.draw++;
    r.textContent = '🤝 ' + t('draw');
    r.className = 'gz-rps-result draw';
  } else if (BEATS[p] === a) {
    stats.win++;
    stats.streak = stats.streak >= 0 ? stats.streak + 1 : 1;
    r.textContent = '🎉 ' + t('win');
    r.className = 'gz-rps-result win';
  } else {
    stats.lose++;
    stats.streak = stats.streak <= 0 ? stats.streak - 1 : -1;
    r.textContent = '💀 ' + t('lose');
    r.className = 'gz-rps-result lose';
  }
  saveStats();
  renderStats();
}

function renderStats() {
  $('#stWin').textContent = stats.win;
  $('#stLose').textContent = stats.lose;
  $('#stDraw').textContent = stats.draw;
  const total = stats.win + stats.lose + stats.draw;
  const rate = total === 0 ? 0 : Math.round((stats.win / total) * 100);
  $('#stRate').textContent = rate + '%';
  let s = '';
  if (stats.streak >= 2) s = t('streakHot').replace('{n}', stats.streak);
  else if (stats.streak <= -2) s = t('streakCold').replace('{n}', -stats.streak);
  $('#streak').textContent = s;
}

function resetStats() {
  stats = { win: 0, lose: 0, draw: 0, streak: 0 };
  lastPlayerMove = null;
  saveStats();
  renderStats();
  $('#result').textContent = '';
  $('#playerHand').textContent = '✊';
  $('#aiHand').textContent = '✊';
}

// Labels
$('#lbl-mode').textContent = t('mode') + ':';
$('#lbl-you').textContent = t('you');
$('#lbl-ai').textContent = t('ai');
$('#lbl-win').textContent = t('wins');
$('#lbl-lose').textContent = t('losses');
$('#lbl-draw').textContent = t('draws');
$('#lbl-rate').textContent = t('winRate');

$('#toolbar').innerHTML = `<button class="gz-btn gz-btn-secondary" onclick="resetStats()">${t('reset')}</button>`;

// Keyboard shortcuts: R / P / S
document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
  const k = e.key.toLowerCase();
  if (k === 'r') play('rock');
  else if (k === 'p') play('paper');
  else if (k === 's') play('scissors');
});

renderStats();

GZ.renderToolPage({
  category: 'fun',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🪙', href:'/fun/coin-flipper.html', name:'Coin Flipper'},
    {icon:'🎲', href:'/fun/dice-roller.html', name:'Dice Roller'},
    {icon:'⭕', href:'/fun/tic-tac-toe.html', name:'Tic Tac Toe'},
    {icon:'🧠', href:'/fun/trivia-quiz.html', name:'Trivia Quiz'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
