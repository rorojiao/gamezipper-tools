let lastIdx = -1;
function pickFortune() {
  const lang = GZI18n.getLang();
  const arr = FORTUNES[lang] || FORTUNES.en;
  let idx;
  do { idx = Math.floor(Math.random() * arr.length); } while (arr.length > 1 && idx === lastIdx);
  lastIdx = idx;
  return arr[idx];
}

function pickLucky() {
  const set = new Set();
  while (set.size < 6) set.add(1 + Math.floor(Math.random() * 49));
  return [...set].sort((a, b) => a - b);
}

function crack() {
  const cookie = $('#cookie');
  cookie.classList.add('cracking');
  setTimeout(() => cookie.classList.remove('cracking'), 500);
  const lang = GZI18n.getLang();
  const fortune = pickFortune();
  const nums = pickLucky();
  const words = lang === 'zh' ? FORTUNES.words_zh : FORTUNES.words_en;
  const word = words[Math.floor(Math.random() * words.length)];
  $('#quote').textContent = fortune;
  $('#luckyNums').innerHTML = nums.map(n => `<span class="lucky-num">${n}</span>`).join('');
  $('#luckyWord').innerHTML = `${t('wordLabel')}: <b>${word}</b>`;
  const paper = $('#paper');
  paper.classList.remove('show');
  void paper.offsetWidth; // reflow to restart animation
  paper.classList.add('show');
}

$('#toolbar').innerHTML = `
