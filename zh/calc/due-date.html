<script type="application/ld+json">{"@context":"https://schema.org","@type":"WebApplication","name":"Pregnancy Due Date Calculator","description":"Calculate your pregnancy due date and week-by-week timeline. Enter your last menstrual period or conception date to estimate your due date, current week, and trimester. Free, browser-only.","url": "https://tools.gamezipper.com/zh/calc/due-date.html","applicationCategory":"Utility","operatingSystem":"Web Browser","offers":{"@type":"Offer","price":"0"}}</script>
<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "How is the due date calculated?", "acceptedAnswer": {"@type": "Answer", "text": "The due date is calculated using Naegele's rule: add 280 days (40 weeks) to the first day of your last menstrual period (LMP). If you know your conception date, add 266 days (38 weeks) to that date."}}, {"@type": "Question", "name": "How accurate is the due date estimate?", "acceptedAnswer": {"@type": "Answer", "text": "Only about 5% of babies are born on their exact due date. Most are born within two weeks before or after. The estimate is most accurate when based on an early ultrasound, but LMP-based calculation is a reliable starting point."}}, {"@type": "Question", "name": "What are the three trimesters?", "acceptedAnswer": {"@type": "Answer", "text": "The first trimester spans weeks 1-13, the second trimester spans weeks 14-27, and the third trimester spans weeks 28-40. Each trimester marks different developmental milestones for the baby."}}, {"@type": "Question", "name": "Can I use IVF transfer date instead?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. For IVF, if you had a Day 5 embryo transfer, add 261 days to the transfer date. For a Day 3 transfer, add 263 days. This gives the same due date as a natural conception calculation."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="mode-toggle">
      <button class="active" id="btn-lmp" onclick="switchMode('lmp')"></button>
      <button id="btn-conception" onclick="switchMode('conception')"></button>
      <button id="btn-ivf" onclick="switchMode('ivf')"></button>
    </div>
    <div class="field-row">
      <label id="lbl-date"></label>
      <input type="date" id="inputDate">
    </div>
    <div class="field-row" id="cycleRow">
      <label id="lbl-cycle"></label>
      <input type="number" id="cycleLen" value="28" min="20" max="45" style="max-width:100px">
      <span id="lbl-days"></span>
    </div>
    <div class="field-row" id="ivfRow" style="display:none">
      <label id="lbl-ivf-type"></label>
      <select id="ivfType" style="max-width:200px">
        <option value="5">Day 5 Transfer</option>
        <option value="3">Day 3 Transfer</option>
      </select>
    </div>
    <div id="results"></div>
    <div id="status"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Pregnancy Due Date Calculator',
    toolDesc: 'Estimate your due date, current pregnancy week, and trimester from your LMP, conception date, or IVF transfer. Free, browser-only.',
    lmpMode: 'Last Period (LMP)',
    conceptionMode: 'Conception Date',
    ivfMode: 'IVF Transfer',
    dateLabel: 'First Day of Last Period',
    conceptionDateLabel: 'Conception Date',
    ivfDateLabel: 'IVF Transfer Date',
    cycleLabel: 'Cycle Length',
    daysLabel: 'days',
    ivfTypeLabel: 'Transfer Type',
    dueDate: 'Estimated Due Date',
    currentWeek: 'Current Week',
    trimester: 'Trimester',
    daysPregnant: 'Days Pregnant',
    weeksLeft: 'Weeks Remaining',
    conceptionDate: 'Conception Date',
    firstTrimester: '1st Trimester (Wk 1-13)',
    secondTrimester: '2nd Trimester (Wk 14-27)',
    thirdTrimester: '3rd Trimester (Wk 28-40)',
    disclaimer: 'This estimate is for informational purposes only. Always consult your healthcare provider.',
    step1: 'Choose your calculation method (LMP, Conception, or IVF)',
    step2: 'Enter the relevant date',
    step3: 'Adjust cycle length if needed (LMP mode)',
    step4: 'View your due date, current week, and trimester',
  },
  zh: {
    toolTitle: '预产期计算器',
    toolDesc: '根据末次月经、受孕日期或 IVF 移植日估算预产期、当前孕周和孕期。免费、浏览器本地运行。',
    lmpMode: '末次月经（LMP）',
    conceptionMode: '受孕日期',
    ivfMode: 'IVF 移植',
    dateLabel: '末次月经首日',
    conceptionDateLabel: '受孕日期',
    ivfDateLabel: 'IVF 移植日期',
    cycleLabel: '月经周期',
    daysLabel: '天',
    ivfTypeLabel: '移植类型',
    dueDate: '预计预产期',
    currentWeek: '当前孕周',
    trimester: '孕期阶段',
    daysPregnant: '已孕天数',
    weeksLeft: '剩余周数',
    conceptionDate: '受孕日期',
    firstTrimester: '孕早期（第 1-13 周）',
    secondTrimester: '孕中期（第 14-27 周）',
    thirdTrimester: '孕晚期（第 28-40 周）',
    disclaimer: '此估算仅供参考，请始终咨询您的医疗保健提供者。',
    step1: '选择计算方式（末次月经、受孕或 IVF）',
    step2: '输入相关日期',
    step3: '如需要，调整月经周期长度（LMP 模式）',
    step4: '查看预产期、当前孕周和孕期阶段',
  }
});

const { $, t } = GZ;
let mode = 'lmp';

function switchMode(m) {
  mode = m;
  $('#btn-lmp').classList.toggle('active', m === 'lmp');
  $('#btn-conception').classList.toggle('active', m === 'conception');
  $('#btn-ivf').classList.toggle('active', m === 'ivf');
  $('#cycleRow').style.display = m === 'lmp' ? '' : 'none';
  $('#ivfRow').style.display = m === 'ivf' ? '' : 'none';
  const labels = {lmp: 'dateLabel', conception: 'conceptionDateLabel', ivf: 'ivfDateLabel'};
  $('#lbl-date').textContent = t(labels[m]);
  calculate();
}

function parseDate(str) {
  if (!str) return null;
  const d = new Date(str + 'T00:00:00');
  return isNaN(d) ? null : d;
}

function fmtDate(d) {
  return d.toLocaleDateString(undefined, {year:'numeric', month:'long', day:'numeric', weekday:'long'});
}

function addDays(d, n) {
  const r = new Date(d);
  r.setDate(r.getDate() + n);
  return r;
}

function calculate() {
  const inputDate = parseDate($('#inputDate').value);
  if (!inputDate) {
    $('#results').innerHTML = '';
    return;
  }

  let dueDate, conceptionDate;

  if (mode === 'lmp') {
    const cycleLen = +$('#cycleLen').value || 28;
    const cycleAdj = cycleLen - 28; // adjust for cycle length
    dueDate = addDays(inputDate, 280 + cycleAdj);
    conceptionDate = addDays(inputDate, 14 + cycleAdj);
  } else if (mode === 'conception') {
    conceptionDate = inputDate;
    dueDate = addDays(inputDate, 266);
  } else { // ivf
    const transferDay = +$('#ivfType').value;
    conceptionDate = addDays(inputDate, -transferDay + 14);
    dueDate = addDays(inputDate, transferDay === 5 ? 261 : 263);
  }

  const today = new Date();
  today.setHours(0,0,0,0);
  const daysPregnant = Math.floor((today - inputDate) / 86400000);
  const weeksPregnant = Math.floor(daysPregnant / 7);
  const daysIntoWeek = daysPregnant % 7;

  let trimester, trimesterLabel;
  if (weeksPregnant < 14) { trimester = 1; trimesterLabel = t('firstTrimester'); }
  else if (weeksPregnant < 28) { trimester = 2; trimesterLabel = t('secondTrimester'); }
  else { trimester = 3; trimesterLabel = t('thirdTrimester'); }

  const weeksLeft = Math.max(0, 40 - weeksPregnant);
  const isPast = weeksPregnant > 40;

  // Timeline progress
  const weekPct = Math.min(100, Math.max(0, (weeksPregnant / 40) * 100));
  const t1End = 13/40*100;
  const t2End = 27/40*100;

  let statusText = '';
  if (daysPregnant < 0) {
    statusText = '';
  } else if (isPast) {
    statusText = `👶 ${weeksPregnant} weeks — past due date!`;
  } else if (weeksPregnant >= 37) {
    statusText = `👶 ${weeksPregnant}w${daysIntoWeek}d — full term!`;
  } else if (weeksPregnant >= 1) {
    statusText = `👶 ${weeksPregnant}w${daysIntoWeek}d pregnant`;
  }

  $('#results').innerHTML = `
    <div class="result-card">
      <div class="result-label">${t('dueDate')}</div>
      <div class="result-big">${fmtDate(dueDate)}</div>
      ${statusText ? `<div style="text-align:center;font-size:.9em;margin-top:4px">${statusText}</div>` : ''}
    </div>
    <div class="result-card">
      <div class="result-grid">
        <div class="result-item"><div class="val">${weeksPregnant >= 0 ? weeksPregnant + 'w' + daysIntoWeek + 'd' : '—'}</div><div class="lbl">${t('currentWeek')}</div></div>
        <div class="result-item"><div class="val">${trimester}</div><div class="lbl">${t('trimester')}</div></div>
        <div class="result-item"><div class="val">${daysPregnant >= 0 ? daysPregnant : '—'}</div><div class="lbl">${t('daysPregnant')}</div></div>
        <div class="result-item"><div class="val">${weeksLeft > 0 ? weeksLeft : '0'}</div><div class="lbl">${t('weeksLeft')}</div></div>
        <div class="result-item"><div class="val" style="font-size:.95em">${fmtDate(conceptionDate)}</div><div class="lbl">${t('conceptionDate')}</div></div>
      </div>
    </div>
    <div class="result-card">
      <div style="font-size:.85em;margin-bottom:8px;opacity:.7">${t('trimester')} Timeline</div>
      <div class="timeline">
        <div class="t1" style="flex:${t1End}">T1</div>
        <div class="t2" style="flex:${t2End-t1End}">T2</div>
        <div class="t3" style="flex:${100-t2End}">T3</div>
      </div>
      <div style="position:relative;height:0">
        <div style="position:absolute;left:${Math.min(98, weekPct)}%;top:-20px;transform:translateX(-50%);font-size:1.2em">📍</div>
      </div>
      <div class="legend">
        <span><span class="dot" style="background:#4caf50"></span>${t('firstTrimester')}</span>
        <span><span class="dot" style="background:#2196f3"></span>${t('secondTrimester')}</span>
        <span><span class="dot" style="background:#ff9800"></span>${t('thirdTrimester')}</span>
      </div>
    </div>
    <div class="disclaimer">${t('disclaimer')}</div>`;
}

// Set default date to today - 8 weeks for demo
const defaultDate = new Date();
defaultDate.setDate(defaultDate.getDate() - 56);
$('#inputDate').value = defaultDate.toISOString().split('T')[0];

// Setup labels
$('#btn-lmp').textContent = t('lmpMode');
$('#btn-conception').textContent = t('conceptionMode');
$('#btn-ivf').textContent = t('ivfMode');
$('#lbl-date').textContent = t('dateLabel');
$('#lbl-cycle').textContent = t('cycleLabel');
$('#lbl-days').textContent = t('daysLabel');
$('#lbl-ivf-type').textContent = t('ivfTypeLabel');

$('#inputDate').addEventListener('input', calculate);
$('#cycleLen').addEventListener('input', calculate);
$('#ivfType').addEventListener('change', calculate);

calculate();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📅', href:'/calc/date-calculator.html', name:'Date Calc'},
    {icon:'💤', href:'/calc/sleep-cycle-calculator.html', name:'Sleep Cycle'},
    {icon:'💊', href:'/calc/medication-tracker.html', name:'Med Tracker'},
    {icon:'🧮', href:'/calc/index.html', name:'All Calculators'},
  ]
});
</script>
<script src="/tools-result-rec.js?v=20260707v520" defer></script>
</body>
