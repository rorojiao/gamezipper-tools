<div class="gz-container">

</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Bingo Card Generator',
    toolDesc: 'Create free custom printable bingo cards with your own words or numbers. Perfect for classrooms, parties, vocabulary review and team-building events.',
    wordsLabel: 'Your items (one per line, min 24):',
    cardCount: 'Number of cards:',
    cardSize: 'Card size:',
    titleText: 'Card title:',
    generate: 'Generate Cards',
    print: 'Print All',
    clear: 'Clear',
    example: 'Example',
    previewTitle: 'Generated Cards',
    callList: 'Call Sheet (Caller Reference)',
    free: 'FREE',
    defaultTitle: 'BINGO',
    step1: 'Enter 24+ words, numbers, or phrases (one per line)',
    step2: 'Choose card count (1-100) and size (3x3 or 5x5)',
    step3: 'Click Generate Cards to create unique randomized cards',
    step4: 'Click Print to print all cards or save as PDF',
  },
  zh: {
    toolTitle: '宾果卡片生成器',
    toolDesc: '使用自己的文字或数字免费创建可打印的宾果卡片。适合课堂教学、派对、词汇复习和团建活动。',
    wordsLabel: '内容项（每行一个，至少24个）：',
    cardCount: '卡片数量：',
    cardSize: '卡片大小：',
    titleText: '卡片标题：',
    generate: '生成卡片',
    print: '全部打印',
    clear: '清空',
    example: '示例',
    previewTitle: '已生成卡片',
    callList: '叫号表（主持人参考）',
    free: '免费',
    defaultTitle: '宾果',
    step1: '输入24个以上的词语、数字或短语（每行一个）',
    step2: '选择卡片数量（1-100）和大小（3x3 或 5x5）',
    step3: '点击"生成卡片"创建随机排列的唯一卡片',
    step4: '点击"全部打印"打印所有卡片或保存为PDF',
  }
});

const { $, copyText, t } = GZ;
let currentCards = [];
let callItems = [];

const exampleWords = `Apple\nBanana\nCherry\nDragon Fruit\nElderberry\nFig\nGrape\nHoneydew\nKiwi\nLemon\nMango\nNectarine\nOrange\nPapaya\nQuince\nRaspberry\nStrawberry\nTomato\nUgli Fruit\nVanilla\nWatermelon\nXigua\nYellow Plum\nZucchini\nCoconut\nBlueberry\nPeach\nPlum\nPear\nApricot`;

$('#settings').innerHTML = `
  <div class="bc-row"><label>${t('wordsLabel')}</label></div>
  <textarea class="bc-textarea" id="wordsInput" spellcheck="false" placeholder="One item per line..."></textarea>
  <div class="bc-row">
    <label>${t('titleText')}</label>
    <input class="bc-input" id="titleInput" value="BINGO" maxlength="20">
  </div>
  <div class="bc-row">
    <label>${t('cardSize')}</label>
    <select class="bc-input" id="sizeSelect">
      <option value="3">3×3 (9 spaces)</option>
      <option value="5" selected>5×5 (25 spaces, standard)</option>
    </select>
  </div>
  <div class="bc-row">
    <label>${t('cardCount')}</label>
    <select class="bc-input" id="countSelect">
      <option value="1">1 card</option>
      <option value="4" selected>4 cards</option>
      <option value="10">10 cards</option>
      <option value="20">20 cards</option>
      <option value="50">50 cards</option>
      <option value="100">100 cards</option>
    </select>
  </div>
`;

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="generateCards()">${t('generate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn" onclick="window.print()">${t('print')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function generateCards() {
  const raw = $('#wordsInput').value.trim();
  if (!raw) { $('#status').innerHTML = '<span style="color:var(--accent)">⚠ Please enter at least 24 items.</span>'; return; }
  const words = raw.split('\n').map(w => w.trim()).filter(w => w);
  const size = parseInt($('#sizeSelect').value);
  const needed = size === 3 ? 8 : 24;
  if (words.length < needed) {
    $('#status').innerHTML = `<span style="color:var(--accent)">⚠ Need at least ${needed} items, you have ${words.length}.</span>`;
    return;
  }
  const count = parseInt($('#countSelect').value);
  const title = $('#titleInput').value.trim() || t('defaultTitle');
  const letters = size === 5 ? ['B','I','N','G','O'] : size === 3 ? ['A','B','C'] : [];
  currentCards = [];
  callItems = [...words];

  let html = `<div class="bc-preview-title">${t('previewTitle')} (${count})</div>`;
  for (let c = 0; c < count; c++) {
    const shuffled = shuffle(words).slice(0, needed);
    currentCards.push(shuffled);
    let cellIdx = 0;
    let grid = '';
    const totalCells = size * size;
    const freeCenter = size === 5 || size === 3;
    for (let i = 0; i < totalCells; i++) {
      const isCenter = freeCenter && i === Math.floor(totalCells / 2);
      if (isCenter) {
        grid += `<div class="bc-cell bc-cell-free">${t('free')}</div>`;
      } else {
        grid += `<div class="bc-cell">${shuffled[cellIdx++]}</div>`;
      }
    }
    let header = letters.length ? letters.map(l => `<div class="bc-cell bc-cell-header">${l}</div>`).join('') : '';
    html += `<div class="bc-card">
      <div class="bc-card-title">${title} — #${c + 1}</div>
      <div class="bc-grid" style="grid-template-columns:repeat(${size},1fr)">${header}${grid}</div>
    </div>`;
  }

  // Call sheet
  html += `<div class="bc-call-list"><h3>${t('callList')} (${words.length} items)</h3><div class="bc-call-words">${words.map(w => `<span>${w}</span>`).join('')}</div></div>`;
  $('#output').innerHTML = html;
  $('#status').innerHTML = `<span style="color:var(--success)">✓ ${count} cards generated.</span>`;
}

function loadExample() {
  $('#wordsInput').value = exampleWords;
  generateCards();
}

function doClear() {
  $('#wordsInput').value = '';
  $('#output').innerHTML = '';
  $('#status').innerHTML = '';
  currentCards = [];
}

GZ.renderToolPage({
  category: 'fun',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🎲', href:'/fun/bingo.html', name:'Bingo Caller'},
    {icon:'📋', href:'/fun/word-search.html', name:'Word Search'},
    {icon:'🔤', href:'/fun/crossword-maker.html', name:'Crossword Maker'},
    {icon:'🎯', href:'/fun/quiz-maker.html', name:'Quiz Maker'},
  ]
});
</script>
