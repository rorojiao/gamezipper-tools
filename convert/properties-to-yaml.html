// Decode standard .properties escape sequences
function decodeEscapes(s) {
  let out = '';
  for (let i = 0; i < s.length; i++) {
    const c = s[i];
    if (c === '\\' && i + 1 < s.length) {
      const n = s[i + 1];
      if (n === 'n') { out += '\n'; i++; }
      else if (n === 't') { out += '\t'; i++; }
      else if (n === 'r') { out += '\r'; i++; }
      else if (n === 'f') { out += '\f'; i++; }
      else if (n === 'u') {
        const hex = s.substr(i + 2, 4);
        if (/^[0-9a-fA-F]{4}$/.test(hex)) { out += String.fromCharCode(parseInt(hex, 16)); i += 5; }
        else { out += c; }
      } else { out += n; i++; }
    } else out += c;
  }
  return out;
}

// Parse a .properties key segment allowing \ to escape separators
function parseKey(s) {
  const segments = [];
  let cur = '';
  for (let i = 0; i < s.length; i++) {
    const c = s[i];
    if (c === '\\' && i + 1 < s.length) {
      cur += s[i + 1]; i++;
    } else if (c === '.') {
      segments.push(cur); cur = '';
    } else cur += c;
  }
  segments.push(cur);
  return segments;
}

function parseProperties(text) {
  const result = {};
  // Normalize continuation lines (trailing backslash) BEFORE splitting
  const merged = text.replace(/\\\r?\n\s*/g, '');
  const lines = merged.split('\n');
  let count = 0;
  for (const rawLine of lines) {
    let line = rawLine.replace(/\s+$/, '');
    // Skip blank or comment lines
    if (!line.trim()) continue;
    const firstChar = line.trim()[0];
    if (firstChar === '#' || firstChar === '!') continue;
    // Strip leading whitespace on logical line
    line = line.replace(/^\s+/, '');
    // Find first unescaped = : or whitespace
    let sepIdx = -1, sepChar = '';
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (c === '\\' && i + 1 < line.length) { i++; continue; }
      if (c === '=' || c === ':') { sepIdx = i; sepChar = c; break; }
      if (/\s/.test(c)) { sepIdx = i; sepChar = ' '; break; }
    }
    let keyRaw, valRaw;
    if (sepIdx === -1) {
      keyRaw = line; valRaw = '';
    } else {
      keyRaw = line.slice(0, sepIdx);
      valRaw = line.slice(sepIdx + 1);
      // For whitespace separator, allow optional follow-up = or :
      if (sepChar === ' ') {
        valRaw = valRaw.replace(/^[=:]\s?/, '');
      } else {
        valRaw = valRaw.replace(/^\s+/, '');
      }
    }
    // Decode leading-space escapes in value (\ before space)
    valRaw = valRaw.replace(/^\\ /, ' ');
    const key = decodeEscapes(keyRaw);
    let value = decodeEscapes(valRaw);
    // Try to coerce numbers/booleans if value is unquoted
    if (/^-?\d+$/.test(value)) value = parseInt(value, 10);
    else if (/^-?\d*\.\d+$/.test(value)) value = parseFloat(value);
    else if (value === 'true') value = true;
    else if (value === 'false') value = false;

    const segments = parseKey(key);
    let node = result;
    for (let i = 0; i < segments.length - 1; i++) {
      const seg = segments[i];
      if (node[seg] === undefined || node[seg] === null || typeof node[seg] !== 'object') {
        node[seg] = {};
      }
      node = node[seg];
    }
    node[segments[segments.length - 1]] = value;
    count++;
  }
  return { result, count };
}

function convert() {
  const inp = $('#input').value;
  if (!inp.trim()) { $('#output').innerHTML = ''; $('#status').innerHTML = ''; return; }
  try {
    const { result, count } = parseProperties(inp);
    const fmt = $('#format').value;
    let outStr;
    if (fmt === 'json') {
      outStr = JSON.stringify(result, null, 2);
    } else {
      outStr = jsyaml.dump(result, { indent: 2, lineWidth: 120, noRefs: true });
    }
    $('#output').textContent = outStr;
    $('#status').innerHTML = `<span style="color:var(--gz-success)">${t('valid')} (${count} keys)</span>`;
  } catch (e) {
    $('#status').innerHTML = `<span style="color:var(--gz-accent)">✗ ${e.message}</span>`;
    $('#output').innerHTML = `<span style="color:var(--gz-accent)">${e.message}</span>`;
  }
}
