<script>
GZI18n.register({
  en: {
    toolTitle: 'Color Scheme Generator',
    toolDesc: 'Pick a base color and instantly generate complementary, analogous, triadic, tetradic, split-complementary and monochromatic palettes. Copy as CSS, SCSS, Tailwind or JSON.',
    copy: 'Copy',
    copied: '✓ Copied',
    step1: 'Click the color box or type a hex code to pick your base color',
    step2: 'Switch between Complementary, Analogous, Triadic and other harmony tabs',
    step3: 'Click any swatch to copy its hex code',
    step4: 'Use the export dropdown to copy the whole palette as CSS, SCSS or Tailwind',
  },
  zh: {
    toolTitle: '配色方案生成器',
    toolDesc: '选择一个基础色，即可生成互补色、相邻色、三色、四色、分裂互补色和单色调色板。支持复制为 CSS、SCSS、Tailwind 或 JSON。',
    copy: '复制',
    copied: '✓ 已复制',
    step1: '点击颜色框或输入十六进制色值选择基础色',
    step2: '在「互补色」「相邻色」「三色」等标签之间切换',
    step3: '点击任意色块复制其十六进制色值',
    step4: '通过导出下拉框可将整个配色复制为 CSS、SCSS 或 Tailwind',
  }
});
const { $, t, copyText } = GZ;
const SCHEMES = {
  complementary:{en:'Complementary',zh:'互补色',angles:[0,180]},
  analogous:{en:'Analogous',zh:'相邻色',angles:[0,30,60,-30,-60]},
  triadic:{en:'Triadic',zh:'三色',angles:[0,120,240]},
  tetradic:{en:'Tetradic',zh:'四色',angles:[0,90,180,270]},
  split:{en:'Split-Comp',zh:'分裂互补',angles:[0,150,210]},
  mono:{en:'Monochrome',zh:'单色调',angles:[0,0,0,0,0]},
};
let activeScheme = 'complementary';
function hexToHsl(hex) {
  hex = hex.replace('#','');
  const r = parseInt(hex.substr(0,2),16)/255, g = parseInt(hex.substr(2,2),16)/255, b = parseInt(hex.substr(4,2),16)/255;
  const mx = Math.max(r,g,b), mn = Math.min(r,g,b);
  let h, s, l = (mx+mn)/2;
  if (mx === mn) { h = s = 0; }
  else {
    const d = mx - mn;
    s = l > .5 ? d/(2-mx-mn) : d/(mx+mn);
    if (mx === r) h = (g-b)/d + (g<b?6:0);
    else if (mx === g) h = (b-r)/d + 2;
    else h = (r-g)/d + 4;
    h *= 60;
  }
  return [h, s*100, l*100];
}
function hslToHex(h,s,l) {
  s/=100; l/=100;
  const c = (1 - Math.abs(2*l - 1)) * s;
  const x = c * (1 - Math.abs(((h/60)%2) - 1));
  const m = l - c/2;
  let r,g,b;
  if (h<60){r=c;g=x;b=0;} else if (h<120){r=x;g=c;b=0;} else if (h<180){r=0;g=c;b=x;}
  else if (h<240){r=0;g=x;b=c;} else if (h<300){r=x;g=0;b=c;} else {r=c;g=0;b=x;}
  const toHex = v => Math.round((v+m)*255).toString(16).padStart(2,'0');
  return '#' + toHex(r) + toHex(g) + toHex(b);
}
function genPalette(hex) {
  const [h,s,l] = hexToHsl(hex);
  const angles = SCHEMES[activeScheme].angles;
  return angles.map((a, i) => {
    if (activeScheme === 'mono') {
      const ls = [Math.max(15,l-25), Math.max(25,l-12), l, Math.min(80,l+12), Math.min(92,l+25)];
      return hslToHex(h, s, ls[i]);
    }
    return hslToHex((h + a + 360) % 360, s, l);
  });
}
function renderPalette() {
  const hex = $('#hex-input').value;
  const palette = genPalette(hex);
  $('#palette').innerHTML = palette.map(c =>
    `<div class="swatch" onclick="copyText('${c}');flashCopy('${c}')">
      <div class="color" style="background:${c}"></div>
      <div class="meta">${c.toUpperCase()}</div>
    </div>`).join('');
  renderExport(palette);
}
function flashCopy(c) {
  const orig = event.currentTarget.querySelector('.meta').textContent;
  event.currentTarget.querySelector('.meta').textContent = t('copied');
  setTimeout(() => { if (event.currentTarget) event.currentTarget.querySelector('.meta').textContent = orig; }, 900);
}
function renderExport(palette) {
  const fmt = $('#export-fmt').value;
  let code = '';
  if (fmt === 'css') code = ':root{\n' + palette.map((c,i)=>`  --color-${i+1}: ${c};`).join('\n') + '\n}';
  else if (fmt === 'scss') code = palette.map((c,i)=>`$color-${i+1}: ${c};`).join('\n');
  else if (fmt === 'tailwind') code = '// tailwind.config.js → theme.extend.colors\n' + palette.map((c,i)=>`  color${i+1}: '${c}',`).join('\n');
  else code = JSON.stringify(palette.map(c=>c.toUpperCase()), null, 2);
  $('#export-code').textContent = code;
}
function renderTabs() {
  const lang = GZI18n.getLang();
  $('#scheme-tabs').innerHTML = Object.entries(SCHEMES).map(([k,v]) =>
    `<button class="${k===activeScheme?'active':''}" onclick="setScheme('${k}')">${lang==='zh'?v.zh:v.en}</button>`).join('');
}
function setScheme(k){ activeScheme = k; renderTabs(); renderPalette(); }
$('#base-color').addEventListener('input', e => { $('#hex-input').value = e.target.value; renderPalette(); });
$('#hex-input').addEventListener('input', e => {
  const v = e.target.value;
  if (/^#?[0-9a-fA-F]{6}$/.test(v)) {
    const hex = v.startsWith('#') ? v : '#' + v;
    $('#base-color').value = hex;
    renderPalette();
  }
});
$('#export-fmt').addEventListener('change', renderPalette);
$('#export-head').innerHTML = `<span style="font-weight:700">${GZI18n.getLang()==='zh'?'导出':'Export'}</span><button class="gz-btn gz-btn-secondary" onclick="copyText($('#export-code').textContent)">${t('copy')}</button>`;
renderTabs(); renderPalette();
GZ.renderToolPage({
  category: 'color',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🌈', href:'/color/palette.html', name:'Palette Generator'},
    {icon:'🎨', href:'/css-tools/gradient.html', name:'Gradient Generator'},
    {icon:' HEX', href:'/color/hex-rgb.html', name:'HEX / RGB'},
    {icon:'🧪', href:'/color/mixer.html', name:'Color Mixer'},
  ]
});
</script>
