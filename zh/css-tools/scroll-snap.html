<script>
GZI18n.register({
  en: {
    toolTitle: 'CSS Scroll Snap Generator',
    toolDesc: 'Generate CSS scroll snap containers with live preview. Customize snap type, alignment and copy production-ready CSS.',
    direction: 'Direction',
    horizontal: 'Horizontal',
    vertical: 'Vertical',
    strictness: 'Strictness',
    mandatory: 'Mandatory',
    proximity: 'Proximity',
    alignment: 'Snap Align',
    start: 'Start',
    center: 'Center',
    end: 'End',
    itemCount: 'Items',
    gap: 'Gap (px)',
    generate: 'Update',
    copy: 'Copy CSS',
    step1: 'Choose horizontal or vertical direction',
    step2: 'Select mandatory or proximity strictness',
    step3: 'Adjust alignment, items and gap',
    step4: 'Copy the generated CSS code',
  },
  zh: {
    toolTitle: 'CSS Scroll Snap 生成器',
    toolDesc: '可视化生成 CSS scroll snap 容器。自定义吸附类型、对齐方式，复制生产可用 CSS。',
    direction: '方向',
    horizontal: '水平',
    vertical: '垂直',
    strictness: '严格度',
    mandatory: '强制',
    proximity: '接近',
    alignment: '对齐方式',
    start: '起始',
    center: '居中',
    end: '末尾',
    itemCount: '项目数',
    gap: '间距 (px)',
    generate: '更新',
    copy: '复制 CSS',
    step1: '选择水平或垂直方向',
    step2: '选择强制或接近严格度',
    step3: '调整对齐、项目数和间距',
    step4: '复制生成的 CSS 代码',
  }
});

const { $, copyText, t } = GZ;

const colors = ['#ff6b6b','#4ecdc4','#45b7d1','#96ceb4','#ffeaa7','#dfe6e9','#a29bfe','#fd79a8','#00b894','#e17055','#6c5ce7','#fab1a0'];

$('#controls').innerHTML = `
  <label>${t('direction')}<select id="dir"><option value="x">${t('horizontal')}</option><option value="y">${t('vertical')}</option></select></label>
  <label>${t('strictness')}<select id="strict"><option value="mandatory">${t('mandatory')}</option><option value="proximity">${t('proximity')}</option></select></label>
  <label>${t('alignment')}<select id="align"><option value="start">${t('start')}</option><option value="center">${t('center')}</option><option value="end">${t('end')}</option></select></label>
  <label>${t('itemCount')}<input type="number" id="items" value="6" min="3" max="12" /></label>
  <label>${t('gap')}<input type="number" id="gap" value="16" min="0" max="60" /></label>`;

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="update()">${t('generate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="copyText($('#code-output').textContent)">${t('copy')}</button>`;

function update() {
  const dir = $('#dir').value;
  const strict = $('#strict').value;
  const align = $('#align').value;
  const count = parseInt($('#items').value) || 6;
  const gap = parseInt($('#gap').value) || 16;

  const track = $('#snap-track');
  const container = $('#preview-container');

  // Reset classes
  track.className = 'snap-track' + (dir === 'y' ? ' vertical' : '');
  track.style.gap = gap + 'px';
  track.innerHTML = '';

  for (let i = 0; i < count; i++) {
    const item = document.createElement('div');
    item.className = 'snap-item';
    item.style.background = colors[i % colors.length];
    item.textContent = `Slide ${i + 1}`;
    track.appendChild(item);
  }

  // Apply scroll snap styles
  const snapType = `${dir} ${strict}`;
  container.style.scrollSnapType = snapType;
  track.style.scrollSnapType = 'none';

  const items = track.querySelectorAll('.snap-item');
  items.forEach(item => {
    item.style.scrollSnapAlign = align;
  });

  // Generate code
  const code = `.snap-container {
  overflow: auto;
  scroll-snap-type: ${snapType};
}

.snap-track {
  display: flex;
  ${dir === 'y' ? 'flex-direction: column;\n  max-height: 500px;' : ''}
  gap: ${gap}px;
  padding: 16px;
}

.snap-item {
  ${dir === 'x' ? 'min-width: 200px;' : 'min-height: 180px;'}
  scroll-snap-align: ${align};
  flex-shrink: 0;
}`;

  $('#code-output').textContent = code;
}

// Bind events
['dir','strict','align','items','gap'].forEach(id => {
  const el = document.getElementById(id);
  if (el) el.addEventListener('change', update);
  if (el && el.type === 'number') el.addEventListener('input', update);
});

update();

GZ.renderToolPage({
  category: 'css',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📐', href:'/css-tools/flexbox.html', name:'Flexbox Generator'},
    {icon:'🔲', href:'/css-tools/grid.html', name:'CSS Grid'},
    {icon:'📱', href:'/css-tools/media-query.html', name:'Media Query'},
    {icon:'📐', href:'/css-tools/container-query.html', name:'Container Query'},
  ]
});
</script>
