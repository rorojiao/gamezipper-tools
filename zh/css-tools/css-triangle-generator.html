<script>
GZI18n.register({
  en: {
    toolTitle: 'CSS Triangle Generator',
    toolDesc: 'Generate CSS triangles in any direction with custom size and color. Get clean, ready-to-paste HTML and CSS code — perfect for tooltips, arrows and decorative shapes.',
    directionLabel: 'Direction',
    size: 'Size (px)',
    color: 'Color',
    cssCode: 'Generated Code',
    copy: 'Copy',
    copied: 'Copied!',
    step1: 'Pick a direction (up, down, left, right)',
    step2: 'Adjust the size and color',
    step3: 'Copy the generated HTML or CSS code',
    step4: 'Paste into your project and customize further'
  },
  zh: {
    toolTitle: 'CSS 三角形生成器',
    toolDesc: '生成任意方向、尺寸和颜色的 CSS 三角形。直接复制可用的 HTML 和 CSS 代码 — 非常适合工具提示、箭头和装饰图形。',
    directionLabel: '方向',
    size: '尺寸 (px)',
    color: '颜色',
    cssCode: '生成代码',
    copy: '复制',
    copied: '已复制！',
    step1: '选择方向（上、下、左、右）',
    step2: '调整尺寸和颜色',
    step3: '复制生成的 HTML 或 CSS 代码',
    step4: '粘贴到项目中并进一步定制'
  }
});

const { $, t, copyText } = GZ;
let currentDir = 'down';
let currentTab = 'html';

const DIR_MAP = {
  up:    { name: 'up',    top: 0,    right: 'hidden', bottom: 'color', left: 'hidden' },
  down:  { name: 'down',  top: 'color', right: 'hidden', bottom: 0,    left: 'hidden' },
  left:  { name: 'left',  top: 'hidden', right: 'color', bottom: 'hidden', left: 0   },
  right: { name: 'right', top: 'hidden', right: 0,    bottom: 'hidden', left: 'color' }
};

function generate() {
  const size = Math.max(1, Math.min(500, parseInt($('#size').value) || 50));
  const color = $('#color').value;
  const dir = DIR_MAP[currentDir];
  const borderWidth = size / 2;
  let css;
  if (currentDir === 'up') {
    css = `width: 0; height: 0;\nborder-left: ${borderWidth}px solid transparent;\nborder-right: ${borderWidth}px solid transparent;\nborder-bottom: ${size}px solid ${color};`;
  } else if (currentDir === 'down') {
    css = `width: 0; height: 0;\nborder-left: ${borderWidth}px solid transparent;\nborder-right: ${borderWidth}px solid transparent;\nborder-top: ${size}px solid ${color};`;
  } else if (currentDir === 'left') {
    css = `width: 0; height: 0;\nborder-top: ${borderWidth}px solid transparent;\nborder-bottom: ${borderWidth}px solid transparent;\nborder-right: ${size}px solid ${color};`;
  } else {
    css = `width: 0; height: 0;\nborder-top: ${borderWidth}px solid transparent;\nborder-bottom: ${borderWidth}px solid transparent;\nborder-left: ${size}px solid ${color};`;
  }
  const tri = $('#triangle');
  tri.style.cssText = css;
  tri.dataset.css = `.triangle {\n  ${css}\n}`;
  tri.dataset.html = `<div class="triangle"></div>`;
  updateCode();
}

function updateCode() {
  const tri = $('#triangle');
  $('#code-block').textContent = currentTab === 'html' ? tri.dataset.html : tri.dataset.css;
}

document.querySelectorAll('.direction-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.direction-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentDir = btn.dataset.dir;
    generate();
  });
});

document.querySelectorAll('.code-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.code-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentTab = tab.dataset.tab;
    updateCode();
  });
});

$('#size').addEventListener('input', generate);
$('#color').addEventListener('input', generate);

$('#toolbar').innerHTML = `<button class="gz-btn" onclick="copyCode()">${t('copy')}</button>`;
function copyCode() {
  const tri = $('#triangle');
  copyText(currentTab === 'html' ? tri.dataset.html : tri.dataset.css);
}

generate();

GZ.renderToolPage({
  category: 'css',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'⭐', href:'/css-tools/box-shadow.html', name:'Box Shadow'},
    {icon:'🎨', href:'/css-tools/gradient.html', name:'CSS Gradient'},
    {icon:'🔲', href:'/css-tools/border-radius.html', name:'Border Radius'},
    {icon:'✨', href:'/css-tools/neumorphism-generator.html', name:'Neumorphism'},
  ]
});
</script>
