<script>
GZI18n.register({
  en:{
    toolTitle:'Cube Root Calculator',
    toolDesc:'Find the cube root ∛ of any number, plus square root, 4th root, 5th root and any nth root. Works for positive and negative numbers with a step-by-step breakdown.',
    lblNum:'Number x',
    lblNth:'Root n',
    cubeRoot:'Cube root',sqrtRoot:'Square root',nthRoot:'Nth root',
    calculate:'⚡ Calculate',copy:'Copy',clear:'Clear',
    resultFor:'result for',
    ofNth:'-th root of',
    invalidNum:'Enter a valid number.',
    invalidNth:'n must be an integer ≥ 2.',
    invalidEvenNeg:'Even roots of negative numbers are not real. Use an odd root instead.',
    formulaCube:'Cube root: ∛x = x^(1/3) = sign(x) · |x|^(1/3)',
    formulaSqrt:'Square root: √x = x^(1/2)',
    formulaNth:'Nth root: ⁿ√x = x^(1/n)',
    stepRaise:'Step 1 — Raise x to the power 1/n',
    stepCheck:'Step 2 — Verify by raising the result back to n',
    step1:'Enter the number x you want the root of',
    step2:'Choose cube root, square root or custom nth root',
    step3:'Press Calculate to get the exact answer',
    step4:'Check the verification step below the result',
  },
  zh:{
    toolTitle:'立方根计算器',
    toolDesc:'计算任意数的立方根 ∛，以及平方根、四次根、五次根和任意 n 次根。支持正负数，附逐步解析。',
    lblNum:'数字 x',
    lblNth:'根次 n',
    cubeRoot:'立方根',sqrtRoot:'平方根',nthRoot:'n 次根',
    calculate:'⚡ 计算',copy:'复制',clear:'清空',
    resultFor:'结果（',
    ofNth:' 次根）',
    invalidNum:'请输入有效数字。',
    invalidNth:'n 必须是 ≥ 2 的整数。',
    invalidEvenNeg:'负数的偶数次根在实数范围内无定义，请改用奇数次根。',
    formulaCube:'立方根：∛x = x^(1/3) = sign(x) · |x|^(1/3)',
    formulaSqrt:'平方根：√x = x^(1/2)',
    formulaNth:'n 次根：ⁿ√x = x^(1/n)',
    stepRaise:'步骤 1 — 将 x 开 1/n 次方',
    stepCheck:'步骤 2 — 将结果自乘 n 次验证',
    step1:'输入要求根的数字 x',
    step2:'选择立方根、平方根或自定义 n 次根',
    step3:'点击「计算」得到精确结果',
    step4:'查看下方的验证步骤',
  }
});

const { $, copyText, t } = GZ;
let mode='cube';

function fmt(n){
  if(!isFinite(n)) return n>0?'∞':'-∞';
  if(Number.isInteger(n)) return n.toString();
  return (Math.round(n*1e12)/1e12).toLocaleString('en-US',{maximumFractionDigits:12});
}
function card(lbl,val){return `<div class="cr-card"><div class="lbl">${lbl}</div><div class="val">${val}</div></div>`;}
function realNthRoot(x,n){
  if(n%2===1 && x<0) return -Math.pow(-x,1/n);
  if(x<0) return NaN;
  return Math.pow(x,1/n);
}

function calc(){
  const elB=$('#resultBig'),elM=$('#resultMeta'),grid=$('#grid'),f=$('#formula');
  const x=parseFloat($('#numInput').value);
  if(isNaN(x)){elB.textContent='—';elM.textContent=t('invalidNum');grid.innerHTML='';f.textContent='';return;}
  let n,symbol,label,formulaTxt;
  if(mode==='cube'){n=3;symbol='∛';label=t('cubeRoot');formulaTxt=t('formulaCube');}
  else if(mode==='sqrt'){n=2;symbol='√';label=t('sqrtRoot');formulaTxt=t('formulaSqrt');}
  else {
    n=parseInt($('#nthInput').value);
    if(isNaN(n)||n<2){elB.textContent='—';elM.textContent=t('invalidNth');grid.innerHTML='';f.textContent='';return;}
    symbol=`${n}√`.replace('√','√');
    label=`${n}-${t('nthRoot')}`;
    formulaTxt=t('formulaNth');
  }
  if(n%2===0 && x<0){elB.textContent='—';elM.textContent=t('invalidEvenNeg');grid.innerHTML='';f.textContent=formulaTxt;return;}
  const root=realNthRoot(x,n);
  const verify=Math.pow(root,n);
  elB.textContent=`${symbol}${fmt(x)} = ${fmt(root)}`;
  elM.textContent=`${t('resultFor')} ${label}`;
  // show 2,3,4,5,6 roots as reference when x>=0 or odd roots only
  let cards='';
  for(const k of [2,3,4,5,6]){
    if(k%2===0 && x<0) continue;
    cards+=card(`${k}√`,fmt(realNthRoot(x,k)));
  }
  grid.innerHTML=cards;
  f.innerHTML=
    `<div>${formulaTxt}</div>`+
    `<div style="margin-top:8px">${t('stepRaise')}: ${fmt(x)}^(1/${n}) = <b>${fmt(root)}</b></div>`+
    `<div>${t('stepCheck')}: (${fmt(root)})^${n} = <b>${fmt(verify)}</b> ${Math.abs(verify-x)<1e-9?'✓':'(rounding)'}</div>`;
}

document.querySelectorAll('#tabs .cr-tab').forEach(tab=>{
  tab.addEventListener('click',()=>{
    document.querySelectorAll('#tabs .cr-tab').forEach(x=>x.classList.remove('active'));
    tab.classList.add('active');
    mode=tab.dataset.mode;
    $('#nthWrap').style.display=mode==='nth'?'block':'none';
    calc();
  });
});
$('#calcBtn').addEventListener('click',calc);
$('#numInput').addEventListener('input',calc);
$('#nthInput').addEventListener('input',calc);
$('#numInput').addEventListener('keydown',e=>{if(e.key==='Enter')calc();});

$('#toolbar').innerHTML=`
  <button class="gz-btn" onclick="calc()">${t('calculate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="copyText($('#resultBig').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#numInput').value='';calc()">${t('clear')}</button>`;
$('#lbl-num').textContent=t('lblNum');
$('#lbl-nth').textContent=t('lblNth');

GZ.renderToolPage({
  category:'calc',
  titleKey:'toolTitle',
  descKey:'toolDesc',
  howToSteps:['step1','step2','step3','step4'],
  related:[
    {icon:'🪵',href:'/calc/logarithm-calculator.html',name:'Logarithm Calculator'},
    {icon:'❗',href:'/calc/factorial-calculator.html',name:'Factorial Calculator'},
    {icon:'🔬',href:'/calc/scientific-notation-converter.html',name:'Scientific Notation'},
    {icon:'🧮',href:'/calc/scientific-calculator.html',name:'Scientific Calculator'},
  ]
});
calc();
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
