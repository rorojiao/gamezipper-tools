<script>
GZI18n.register({
  en: {
    toolTitle: 'Semantic Version Checker',
    toolDesc: 'Validate, compare, parse and sort semantic versions (semver). Supports prerelease, build metadata and bulk sorting.',
    validate: 'Validate',
    compare: 'Compare',
    sort: 'Sort Versions',
    run: 'Run',
    step1: 'Enter a semver string to validate and see its breakdown',
    step2: 'Enter two versions to compare which is greater',
    step3: 'Paste a list of versions to sort them in ascending order',
    step4: 'Prerelease tags (alpha, beta, rc) are supported',
    valid: 'Valid Semver',
    invalid: 'Invalid Semver',
    major: 'Major',
    minor: 'Minor',
    patch: 'Patch',
    prerelease: 'Prerelease',
    build: 'Build',
    greater: 'is greater than',
    less: 'is less than',
    equal: 'is equal to',
    sortedAsc: 'Sorted (ascending)',
    sortedDesc: 'Sorted (descending)',
  },
  zh: {
    toolTitle: '语义版本号检查器',
    toolDesc: '验证、比较、解析和排序语义版本号 (semver)。支持预发布标签、构建元数据和批量排序。',
    validate: '验证',
    compare: '比较',
    sort: '排序',
    run: '运行',
    step1: '输入版本号验证并查看各部分解析',
    step2: '输入两个版本比较大小',
    step3: '粘贴多个版本号进行升序排列',
    step4: '支持预发布标签（alpha、beta、rc）',
    valid: '有效的 Semver',
    invalid: '无效的 Semver',
    major: '主版本',
    minor: '次版本',
    patch: '修订号',
    prerelease: '预发布',
    build: '构建',
    greater: '大于',
    less: '小于',
    equal: '等于',
    sortedAsc: '升序排列',
    sortedDesc: '降序排列',
  }
});

const { $, copyText, t } = GZ;

const SEMVER_RE = /^v?(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)(?:-([\w][\w.]*(?:-[\w][\w.]*)*))?(?:\+([\w][\w.]*(?:-[\w][\w.]*)*))?$/;

function parseSemver(str) {
  const m = str.trim().match(SEMVER_RE);
  if (!m) return null;
  return { major: +m[1], minor: +m[2], patch: +m[3], prerelease: m[4] || '', build: m[5] || '' };
}

function cmpSemver(a, b) {
  if (a.major !== b.major) return a.major - b.major;
  if (a.minor !== b.minor) return a.minor - b.minor;
  if (a.patch !== b.patch) return a.patch - b.patch;
  // prerelease comparison
  if (!a.prerelease && !b.prerelease) return 0;
  if (!a.prerelease) return 1;
  if (!b.prerelease) return -1;
  const pa = a.prerelease.split('.');
  const pb = b.prerelease.split('.');
  for (let i = 0; i < Math.max(pa.length, pb.length); i++) {
    const va = pa[i], vb = pb[i];
    if (va === undefined) return -1;
    if (vb === undefined) return 1;
    const na = /^\d+$/.test(va) ? +va : va;
    const nb = /^\d+$/.test(vb) ? +vb : vb;
    if (typeof na === 'number' && typeof nb === 'number') { if (na !== nb) return na - nb; }
    else { const sa = String(na), sb = String(nb); if (sa !== sb) return sa < sb ? -1 : 1; }
  }
  return 0;
}

function doValidate() {
  const val = $('#validate-input').value.trim();
  const box = $('#validate-result');
  if (!val) { box.style.display = 'none'; return; }
  const parsed = parseSemver(val);
  box.style.display = 'block';
  if (!parsed) {
    box.innerHTML = `<span class="badge badge-invalid">${t('invalid')}</span>`;
    return;
  }
  box.innerHTML = `
    <span class="badge badge-valid">${t('valid')}</span>
    <div class="breakdown">
      <div class="breakdown-item"><div class="label">${t('major')}</div><div class="value">${parsed.major}</div></div>
      <div class="breakdown-item"><div class="label">${t('minor')}</div><div class="value">${parsed.minor}</div></div>
      <div class="breakdown-item"><div class="label">${t('patch')}</div><div class="value">${parsed.patch}</div></div>
      ${parsed.prerelease ? `<div class="breakdown-item"><div class="label">${t('prerelease')}</div><div class="value">${parsed.prerelease}</div></div>` : ''}
      ${parsed.build ? `<div class="breakdown-item"><div class="label">${t('build')}</div><div class="value">${parsed.build}</div></div>` : ''}
    </div>`;
}

function doCompare() {
  const a = $('#ver-a').value.trim();
  const b = $('#ver-b').value.trim();
  const box = $('#compare-result');
  const sym = $('#compare-symbol');
  if (!a || !b) { box.style.display = 'none'; sym.textContent = '?'; return; }
  const pa = parseSemver(a);
  const pb = parseSemver(b);
  box.style.display = 'block';
  if (!pa || !pb) {
    sym.textContent = '⚠️';
    box.innerHTML = `<span class="badge badge-invalid">${!pa ? a : b}: ${t('invalid')}</span>`;
    return;
  }
  const cmp = cmpSemver(pa, pb);
  if (cmp > 0) { sym.innerHTML = '&gt;'; sym.style.color = '#61afef'; box.innerHTML = `<span class="badge badge-gt">${a} ${t('greater')} ${b}</span>`; }
  else if (cmp < 0) { sym.innerHTML = '&lt;'; sym.style.color = '#d19a66'; box.innerHTML = `<span class="badge badge-lt">${a} ${t('less')} ${b}</span>`; }
  else { sym.textContent = '='; sym.style.color = '#c678dd'; box.innerHTML = `<span class="badge badge-eq">${a} ${t('equal')} ${b}</span>`; }
}

function doSort() {
  const text = $('#sort-input').value.trim();
  const box = $('#sort-result');
  if (!text) { box.style.display = 'none'; return; }
  const lines = text.split('\n').map(l => l.trim()).filter(Boolean);
  const parsed = lines.map(l => ({ raw: l, semver: parseSemver(l) })).filter(x => x.semver);
  if (parsed.length === 0) { box.style.display = 'block'; box.innerHTML = `<span class="badge badge-invalid">${t('invalid')}</span>`; return; }
  parsed.sort((a, b) => cmpSemver(a.semver, b.semver));
  box.style.display = 'block';
  box.innerHTML = `
    <strong>${t('sortedAsc')}:</strong>
    <pre style="font-family:monospace;margin:8px 0 0;padding:8px;background:var(--glass2);border-radius:8px;font-size:.85em">${parsed.map(x => x.raw).join('\n')}</pre>
    <button class="gz-btn gz-btn-secondary" style="margin-top:8px" onclick="copyText('${parsed.map(x=>x.raw).join('\\n')}')">${t('copy')}</button>`;
}

$('#toolbar').innerHTML = `
  <button class="gz-btn gz-btn-secondary" onclick="$('#validate-input').value='2.3.1-alpha.1+build.42';doValidate()">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#ver-a').value='2.0.0';$('#ver-b').value='2.0.0-beta.3';doCompare()">Compare Example</button>`;

// Add section headers
$('#lbl-validate').textContent = `🔍 ${t('validate')}`;
$('#lbl-compare').textContent = `⚖️ ${t('compare')}`;
$('#lbl-sort').textContent = `📊 ${t('sort')}`;

GZ.renderToolPage({
  category: 'dev',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🆔', href:'/dev/uuid.html', name:'UUID Generator'},
    {icon:'⏰', href:'/dev/timestamp.html', name:'Timestamp'},
    {icon:'📋', href:'/dev/json.html', name:'JSON Formatter'},
  ]
});
</script>
