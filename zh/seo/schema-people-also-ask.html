<script>
GZI18n.register({
  en: {
    toolTitle: 'FAQ Schema Generator (People Also Ask)',
    toolDesc: 'Generate FAQPage JSON-LD schema for Google rich results. Create valid structured data for FAQ pages to earn expandable rich snippets.',
    question: 'Question',
    answer: 'Answer',
    addQA: '+ Add Q&A',
    removeAll: 'Remove All',
    copy: 'Copy JSON-LD',
    copied: 'Copied!',
    jsonOutput: 'JSON-LD Output',
    preview: 'Rich Snippet Preview',
    step1: 'Add your questions and answers using the form',
    step2: 'Click Add Q&A to include more FAQ entries (minimum 3 recommended)',
    step3: 'The JSON-LD code generates automatically on the right',
    step4: 'Copy the code and paste it into your page inside a script tag',
    placeholderQ: 'Type the question here...',
    placeholderA: 'Type the answer here...',
  },
  zh: {
    toolTitle: 'FAQ 架构生成器（People Also Ask）',
    toolDesc: '为 Google 富媒体搜索结果生成 FAQPage JSON-LD 架构。创建有效的结构化数据，获取可展开的富媒体摘要。',
    question: '问题',
    answer: '回答',
    addQA: '+ 添加问答',
    removeAll: '全部删除',
    copy: '复制 JSON-LD',
    copied: '已复制！',
    jsonOutput: 'JSON-LD 输出',
    preview: '富媒体摘要预览',
    step1: '使用表单添加问题和回答',
    step2: '点击"添加问答"增加更多 FAQ 条目（建议至少3条）',
    step3: 'JSON-LD 代码会自动在右侧生成',
    step4: '复制代码并粘贴到网页的 script 标签中',
    placeholderQ: '在此输入问题...',
    placeholderA: '在此输入回答...',
  }
});

const { $, t, copyText } = GZ;

const defaultFAQs = [
  { q: 'What is structured data?', a: 'Structured data is a standardized format for providing information about a page and classifying its content, helping search engines understand what your page is about.' },
  { q: 'How long does it take for schema to show in Google?', a: 'After adding schema markup, Google typically processes it within a few days to weeks during the next crawl cycle. Use Google Search Console to request indexing for faster results.' },
  { q: 'Is FAQ schema still supported in 2026?', a: 'Yes, FAQ rich results are still supported for authoritative government and health websites. For other sites, the schema is still valid structured data even if rich snippets are not always shown.' },
];

let faqs = JSON.parse(JSON.stringify(defaultFAQs));

function escapeHtml(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderList() {
  const list = $('#faqList');
  list.innerHTML = faqs.map((faq, i) => `
    <div class="faq-item">
      <div class="faq-item-head">
        <span class="faq-item-num">Q${i+1}</span>
        ${faqs.length > 1 ? `<button class="faq-remove" onclick="removeFAQ(${i})" title="Remove">&times;</button>` : ''}
      </div>
      <label>${t('question')}</label>
      <input type="text" value="${escapeHtml(faq.q)}" oninput="updateFAQ(${i},'q',this.value)" placeholder="${t('placeholderQ')}">
      <label>${t('answer')}</label>
      <textarea oninput="updateFAQ(${i},'a',this.value)" placeholder="${t('placeholderA')}">${escapeHtml(faq.a)}</textarea>
    </div>
  `).join('');
  generate();
}

function updateFAQ(index, field, value) {
  faqs[index][field] = value;
  generate();
}

function removeFAQ(index) {
  faqs.splice(index, 1);
  renderList();
}

function addFAQ() {
  faqs.push({ q: '', a: '' });
  renderList();
}

function removeAll() {
  faqs = [{ q: '', a: '' }];
  renderList();
}

function generate() {
  const valid = faqs.filter(f => f.q.trim() && f.a.trim());
  const schema = {
    '@context': 'https://schema.org',
    '@type': 'FAQPage',
    mainEntity: valid.map(f => ({
      '@type': 'Question',
      name: f.q.trim(),
      acceptedAnswer: { '@type': 'Answer', text: f.a.trim() }
    }))
  };
  const jsonStr = JSON.stringify(schema, null, 2);
  const wrapped = '<script type="application/ld+json">\n' + jsonStr + '\n<\/script>';
  $('#output').textContent = wrapped;

  // Preview
  $('#preview').innerHTML = valid.length ? valid.map(f =>
    `<details open><summary>${escapeHtml(f.q)}</summary><p>${escapeHtml(f.a)}</p></details>`
  ).join('') : '<p style="color:#999;text-align:center">Add questions to preview...</p>';
}

function doCopy() {
  copyText($('#output').textContent);
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="addFAQ()">${t('addQA')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="removeAll()">${t('removeAll')}</button>
  <button class="gz-btn gz-btn-success" onclick="doCopy()">${t('copy')}</button>`;

renderList();

GZ.renderToolPage({
  category: 'seo',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📋', href:'/seo/faq-schema-generator.html', name:'FAQ Schema'},
    {icon:'🏗️', href:'/seo/schema-generator.html', name:'Schema Generator'},
    {icon:'✅', href:'/seo/schema-validator.html', name:'Schema Validator'},
    {icon:'🔍', href:'/seo/google-serp-preview.html', name:'SERP Preview'},
  ]
});
</script>
