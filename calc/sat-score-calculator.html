    rankGreat: '优秀的分数！在全美前 50 大学中有竞争力。',
    rankElite: '精英分数！可冲刺常春藤和顶尖大学。',
  }
});

const { $, t } = GZ;

// Estimate section score (200-800) from raw correct/total ratio
function sectionScore(correct, total) {
  correct = Math.max(0, Math.min(correct, total));
  total = Math.max(1, total);
  const ratio = correct / total;
  // Map ratio 0 -> 200, 1 -> 800 with slight curve (harder to get perfect)
  const score = Math.round(200 + ratio * 600);
  return Math.max(200, Math.min(800, score));
}

function getPercentile(total) {
  // Approximate percentile mapping for SAT total scores
  if (total >= 1570) return '99+';
  if (total >= 1530) return '99';
  if (total >= 1480) return '98';
  if (total >= 1450) return '97';
  if (total >= 1410) return '95';
  if (total >= 1380) return '93';
  if (total >= 1350) return '90';
  if (total >= 1310) return '87';
  if (total >= 1280) return '83';
  if (total >= 1240) return '78';
  if (total >= 1200) return '74';
  if (total >= 1160) return '68';
  if (total >= 1120) return '61';
  if (total >= 1080) return '54';
  if (total >= 1050) return '50';
  if (total >= 1010) return '43';
  if (total >= 970) return '35';
  if (total >= 920) return '25';
  if (total >= 870) return '15';
  if (total >= 810) return '8';
  if (total >= 750) return '3';
  return '<3';
}

function calcSAT() {
  const rwCorrect = parseInt($('#rw-correct').value) || 0;
  const rwTotal = parseInt($('#rw-total').value) || 96;
  const mCorrect = parseInt($('#m-correct').value) || 0;
  const mTotal = parseInt($('#m-total').value) || 58;

  const rwScore = sectionScore(rwCorrect, rwTotal);
  const mathScore = sectionScore(mCorrect, mTotal);
  const total = rwScore + mathScore;
  const pct = getPercentile(total);

  $('#rw-score').textContent = rwScore;
  $('#math-score').textContent = mathScore;
  $('#total-score').textContent = total;
  $('#percentile').textContent = pct + '%';

  let rankKey = 'rankBelow';
  if (total >= 1450) rankKey = 'rankElite';
  else if (total >= 1300) rankKey = 'rankGreat';
  else if (total >= 1200) rankKey = 'rankGood';
  else if (total >= 1050) rankKey = 'rankAvg';
  $('#rank-text').textContent = t(rankKey);
}

$('#sec-rw').textContent = t('secRW');
$('#sec-math').textContent = t('secMath');
$('#lbl-rw-correct').textContent = t('correctAns');
$('#lbl-rw-total').textContent = t('totalAns');
$('#lbl-m-correct').textContent = t('correctAns');
$('#lbl-m-total').textContent = t('totalAns');
$('#total-lbl').textContent = t('totalScore');
$('#rw-lbl').textContent = t('rwScore');
$('#math-lbl').textContent = t('mathScore');
$('#pct-lbl').textContent = t('percentile');
calcSAT();
