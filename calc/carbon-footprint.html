const { $, t } = GZ;

function sel(id, label, options) {
  return `<div><label>${t(label)}</label><select id="${id}">${options.map(o=>`<option value="${o[0]}">${t(o[1])}</option>`).join('')}</select></div>`;
}

$('#form').innerHTML = `
  <h3 style="margin:0">${t('transport')}</h3>
  ${sel('transport','transportQ',[['carDaily','carDaily'],['carSome','carSome'],['public','public'],['bikeWalk','bikeWalk'],['remote','remote']])}
  ${sel('flights','flights',[['none','none2'],['short','short'],['long','long'],['both','both']])}
  <h3 style="margin:0">${t('energy')}</h3>
  ${sel('energy','energyQ',[['low','low'],['medium','medium'],['high','high'],['green','green']])}
  <div><label>${t('household')}</label><input type="number" id="household" value="2" min="1" max="10"></div>
  <h3 style="margin:0">${t('food')}</h3>
  ${sel('food','foodQ',[['meatDaily','meatDaily'],['meatSome','meatSome'],['vegetarian','vegetarian'],['vegan','vegan']])}
  <h3 style="margin:0">${t('lifestyle')}</h3>
  ${sel('lifestyle','lifestyleQ',[['heavy','heavy'],['average','average'],['minimal','minimal']])}
  <button class="gz-btn" onclick="calc()" style="font-size:1.1em;padding:12px">${t('calculate')}</button>
`;

// CO2 factors in tonnes/year
const transportF = {carDaily:3.5,carSome:2.0,public:0.8,bikeWalk:0.1,remote:0.2};
const flightF = {none:0,short:0.7,long:2.5,both:4.0};
const energyF = {low:3.5,medium:2.2,high:1.2,green:0.5};
const foodF = {meatDaily:3.3,meatSome:2.0,vegetarian:1.5,vegan:1.0};
const lifestyleF = {heavy:3.0,average:1.5,minimal:0.7};

window.calc = function() {
  const tr = transportF[$('#transport').value];
  const fl = flightF[$('#flights').value];
  const hh = Math.max(1, parseInt($('#household').value) || 2);
  const en = energyF[$('#energy').value] / hh;
  const fd = foodF[$('#food').value];
  const ls = lifestyleF[$('#lifestyle').value];
  const total = tr + fl + en + fd + ls;
  const items = [
    {val:tr, label:t('transportE'), color:'#e94560'},
    {val:fl, label:t('flightsE'), color:'#61afef'},
    {val:en, label:t('homeEnergy'), color:'#f5a623'},
    {val:fd, label:t('foodE'), color:'#00d672'},
    {val:ls, label:t('lifestyleE'), color:'#c678dd'},
  ];
  const max = Math.max(...items.map(i=>i.val), 1);
  const diff = total - 4.7;
  const diffLabel = diff > 0 ? `${t('above')} ` : `${t('below')} `;

  $('#result').innerHTML = `
    <div class="result-box">
      <div class="big-num">${total.toFixed(1)}</div>
      <div class="unit">${t('tonnesPerYear')}</div>
      <div style="margin-top:8px;font-size:.85em;color:var(--text2)">${diffLabel}${Math.abs(diff).toFixed(1)} ${t('comparedTo')} (${t('globalAvg')})</div>
    </div>
    <div class="breakdown">
      ${items.map(i=>`<div class="breakdown-item"><div class="val">${i.val.toFixed(1)}</div><div class="lbl">${i.label}</div></div>`).join('')}
    </div>
    <div class="bar-chart">
      ${items.map(i=>`<div class="bar" style="height:${(i.val/max*100).toFixed(0)}%;background:${i.color}"><div class="bar-val">${i.val.toFixed(1)}</div><span>${i.label}</span></div>`).join('')}
    </div>
    <div class="tips">
      <h3>${t('tipsTitle')}</h3>
      <ul>
        <li>${t('tip1')}</li>
        <li>${t('tip2')}</li>
        <li>${t('tip3')}</li>
        <li>${t('tip4')}</li>
        <li>${t('tip5')}</li>
      </ul>
    </div>
  `;
};

$('#lbl-in')?.remove();
$('#lbl-out')?.remove();

GZ.renderToolPage({

  descKey: 'toolDesc',
