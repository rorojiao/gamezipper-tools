<script>
GZI18n.register({
  en: {
    toolTitle: 'Pangram Checker',
    toolDesc: 'Check if your sentence is a pangram — contains every letter A–Z. See missing letters, letter frequency and famous pangram examples.',
    ph: 'Type or paste a sentence to check…',
    lblIn: 'Your text',
    step1: 'Type or paste a sentence into the input box',
    step2: 'See instantly if it is a pangram (uses all 26 letters)',
    step3: 'Green letters are found; red letters are missing',
    step4: 'Click a famous pangram example to load it',
    isPangram: '✓ This is a pangram!',
    notPangram: '✗ Not a pangram yet',
    missing: 'Missing letters',
    allFound: 'All 26 letters found',
    perfectPangram: 'Perfect pangram (each letter once)!',
    lettersUsed: 'Letters used',
    totalLetters: 'Total letters (A–Z)',
    uniqueLetters: 'Unique letters',
    examplesTitle: 'Famous Pangrams (click to load)',
    exFox: 'The quick brown fox jumps over the lazy dog',
    exSphinx: 'Sphinx of black quartz, judge my vow',
    exPack: 'Pack my box with five dozen liquor jugs',
    exTwo: 'Two driven jocks help fax my big quiz',
    exCwm: 'Cwm fjord bank glyphs vext quiz (perfect)',
    exJack: 'Jackdaws love my big sphinx of quartz',
    freqTitle: 'Letter frequency',
  },
  zh: {
    toolTitle: '全字母句检查器（Pangram）',
    toolDesc: '检查你的句子是否为全字母句（包含 A–Z 全部 26 个字母）。查看缺失字母、字母频率和经典全字母句示例。',
    ph: '输入或粘贴一个句子来检查…',
    lblIn: '你的文本',
    step1: '在输入框中输入或粘贴一个句子',
    step2: '即时查看它是否为全字母句（包含全部 26 个字母）',
    step3: '绿色字母已出现，红色字母缺失',
    step4: '点击经典全字母句示例来加载',
    isPangram: '✓ 这是一个全字母句！',
    notPangram: '✗ 还不是全字母句',
    missing: '缺失字母',
    allFound: '全部 26 个字母均已出现',
    perfectPangram: '完美全字母句（每个字母仅一次）！',
    lettersUsed: '使用的字母',
    totalLetters: '字母总数（A–Z）',
    uniqueLetters: '不同字母数',
    examplesTitle: '经典全字母句（点击加载）',
    exFox: '敏捷的棕色狐狸跳过了懒狗',
    exSphinx: '黑石英斯芬克斯，评判我的誓言',
    exPack: '用五打酒壶装满我的箱子',
    exTwo: '两个卖力骑手帮我传真大测验',
    exCwm: 'Cwm fjord bank glyphs vext quiz（完美）',
    exJack: '寒鸦喜爱我的大石英斯芬克斯',
    freqTitle: '字母频率',
  }
});

const { $, copyText, t } = GZ;

const ALPHABET = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');

function check() {
  const text = $('#input').value;
  const upper = text.toUpperCase();
  const found = {};
  let totalAlpha = 0;

  ALPHABET.forEach(l => { found[l] = 0; });
  for (const ch of upper) {
    if (ch >= 'A' && ch <= 'Z') { found[ch]++; totalAlpha++; }
  }

  const foundCount = ALPHABET.filter(l => found[l] > 0).length;
  const missingLetters = ALPHABET.filter(l => found[l] === 0);
  const isPangram = foundCount === 26;
  const isPerfect = isPangram && ALPHABET.every(l => found[l] === 1);

  // Result box
  const result = $('#result');
  result.style.display = 'block';
  result.className = 'result-box ' + (isPangram ? 'pangram' : 'not-pangram');
  result.innerHTML = `
    <div class="result-icon">${isPangram ? '🎉' : '📝'}</div>
    <div class="result-text" style="color:${isPangram?'var(--gz-success,#00d672)':'var(--gz-accent,#e94560)'}">${isPangram ? t('isPangram') : t('notPangram')}</div>
    ${isPangram && isPerfect ? `<div class="result-detail" style="color:var(--accent);font-weight:600">⭐ ${t('perfectPangram')}</div>` : ''}
    ${!isPangram && missingLetters.length ? `<div class="result-detail">${t('missing')}: <b style="color:var(--gz-accent,#e94560)">${missingLetters.join(' ')}</b></div>` : ''}
    <div class="stat-row">
      <span>${t('uniqueLetters')}: <b>${foundCount}/26</b></span>
      <span>${t('totalLetters')}: <b>${totalAlpha}</b></span>
    </div>`;

  // Alphabet grid
  $('#alpha-grid').innerHTML = ALPHABET.map(l =>
    `<div class="alpha-cell ${found[l]>0?'found':'missing'}" title="${found[l]} occurrences">${l}</div>`
  ).join('');

  // Frequency grid
  if (totalAlpha > 0) {
    $('#freq-section').style.display = 'block';
    $('#freq-title').textContent = t('freqTitle');
    $('#freq-grid').innerHTML = ALPHABET.map(l =>
      `<div class="alpha-cell ${found[l]>0?'found':'missing'}" style="font-size:.75rem;flex-direction:column">${l}<span style="font-size:.65rem;opacity:.8">${found[l]}</span></div>`
    ).join('');
  } else {
    $('#freq-section').style.display = 'none';
  }
}

// Examples
const examples = [
  ['fox', t('exFox'), 'The quick brown fox jumps over the lazy dog'],
  ['sphinx', t('exSphinx'), 'Sphinx of black quartz, judge my vow'],
  ['pack', t('exPack'), 'Pack my box with five dozen liquor jugs'],
  ['two', t('exTwo'), 'Two driven jocks help fax my big quiz'],
  ['cwm', t('exCwm'), 'Cwm fjord bank glyphs vext quiz'],
  ['jack', t('exJack'), 'Jackdaws love my big sphinx of quartz'],
];

$('#examples').innerHTML = `
  <h3>${t('examplesTitle')}</h3>
  ${examples.map(([id, label, text]) =>
    `<div class="example-item" onclick="loadExample(this.dataset.t)" data-t="${text.replace(/"/g,'&quot;')}"><span class="tag">★</span>${label}</div>`
  ).join('')}`;

function loadExample(text) { $('#input').value = text; check(); }
window.loadExample = loadExample;

$('#input').placeholder = t('ph');
$('#input').addEventListener('input', check);

$('#toolbar').innerHTML = `
  <button class="gz-btn gz-btn-secondary" onclick="$('#input').value='';check()">${t('clear')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample('The quick brown fox jumps over the lazy dog')">${t('example')}</button>`;

// Load default example
$('#input').value = 'The quick brown fox jumps over the lazy dog';
check();

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🔢', href:'/text/letter-counter.html', name:'Letter Counter'},
    {icon:'🔤', href:'/text/case-converter.html', name:'Case Converter'},
    {icon:'🔄', href:'/text/anagram-solver.html', name:'Anagram Solver'},
    {icon:'✋', href:'/text/nato-phonetic.html', name:'NATO Phonetic'},
  ]
});
</script>
