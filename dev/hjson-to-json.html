const { $, copyText, t } = GZ;
let indent = 2;

function syntaxHighlight(json) {
  return json.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/("(\\u[\da-fA-F]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(\.\d+)?([eE][+-]?\d+)?)/g, m => {
      let c = 'json-number';
      if (/^"/.test(m)) c = /:$/.test(m) ? 'json-key' : 'json-string';
      else if (/true|false/.test(m)) c = 'json-bool';
      else if (/null/.test(m)) c = 'json-null';
      return `<span class="${c}">${m}</span>`;
    });
}

/* Minimal HJSON parser */
function parseHJSON(text) {
  let pos = 0;
  const src = text;

  function skipWS() {
    while (pos < src.length) {
      const c = src[pos];
      if (c === ' ' || c === '\t' || c === '\r' || c === '\n') { pos++; }
      else if (c === '#') { while (pos < src.length && src[pos] !== '\n') pos++; }
      else if (c === '/' && src[pos+1] === '/') { while (pos < src.length && src[pos] !== '\n') pos++; }
      else if (c === '/' && src[pos+1] === '*') {
        pos += 2;
        while (pos < src.length && !(src[pos] === '*' && src[pos+1] === '/')) pos++;
        pos += 2;
      }
      else break;
    }
  }

  function parseValue() {
    skipWS();
    if (pos >= src.length) throw new Error('Unexpected end of input');
    const c = src[pos];
    if (c === '{') return parseObject();
    if (c === '[') return parseArray();
    if (c === '"') return parseQuotedString();
    if (c === "'") return parseSingleQuotedString();
    return parseUnquotedOrLiteral();
  }

  function parseObject() {
    const obj = {};
    pos++; // skip {
    skipWS();
    while (pos < src.length && src[pos] !== '}') {
      skipWS();
      if (pos >= src.length || src[pos] === '}') break;
      let key;
      if (src[pos] === '"' || src[pos] === "'") {
        key = src[pos] === '"' ? parseQuotedString() : parseSingleQuotedString();
      } else {
        key = parseUnquotedKey();
      }
      skipWS();
      if (src[pos] !== ':') throw new Error('Expected ":" at position ' + pos);
      pos++; // skip :
      const val = parseValue();
      obj[key] = val;
      skipWS();
      if (src[pos] === ',') pos++;
      skipWS();
    }
    if (pos < src.length && src[pos] === '}') pos++;
    return obj;
  }

  function parseArray() {
    const arr = [];
    pos++; // skip [
    skipWS();
    while (pos < src.length && src[pos] !== ']') {
      const val = parseValue();
      arr.push(val);
      skipWS();
      if (src[pos] === ',') pos++;
      skipWS();
    }
    if (pos < src.length && src[pos] === ']') pos++;
    return arr;
  }

  function parseQuotedString() {
    pos++; // skip "
    let result = '';
    while (pos < src.length && src[pos] !== '"') {
      if (src[pos] === '\\' && pos + 1 < src.length) {
        const next = src[pos+1];
        if (next === 'n') result += '\n';
        else if (next === 't') result += '\t';
        else if (next === 'r') result += '\r';
        else if (next === '"') result += '"';
        else if (next === '\\') result += '\\';
        else result += next;
        pos += 2;
      } else {
        result += src[pos]; pos++;
      }
    }
    pos++; // skip closing "
    return result;
  }

  function parseSingleQuotedString() {
    pos++; // skip '
    let result = '';
    while (pos < src.length && src[pos] !== "'") {
      result += src[pos]; pos++;
    }
    pos++; // skip closing '
    return result;
  }

  function parseUnquotedKey() {
    let result = '';
    while (pos < src.length && /[\w\-.$]/.test(src[pos])) {
      result += src[pos]; pos++;
    }
    return result;
  }

  function parseUnquotedOrLiteral() {
    let result = '';
    while (pos < src.length && src[pos] !== '\n' && src[pos] !== ',' && src[pos] !== '}' && src[pos] !== ']') {
      result += src[pos]; pos++;
    }
    result = result.trim();
    if (result === 'true') return true;
    if (result === 'false') return false;
    if (result === 'null') return null;
    if (/^-?\d+$/.test(result)) return parseInt(result, 10);
    if (/^-?\d+\.\d+([eE][+-]?\d+)?$/.test(result)) return parseFloat(result);
    return result;
  }

  skipWS();
  const result = parseValue();
  return result;
}

function doConvert() {
  const inp = $('#input').value.trim();
  if (!inp) { $('#output').textContent = ''; $('#status').innerHTML = ''; return; }
  try {
    const obj = parseHJSON(inp);
    const formatted = JSON.stringify(obj, null, indent === 0 ? undefined : indent);
    if (indent === 0) {
      $('#output').textContent = JSON.stringify(obj);
    } else {
      $('#output').innerHTML = syntaxHighlight(formatted);
    }
    $('#status').innerHTML = `<span style="color:var(--gz-success)">✓ Valid JSON generated</span>`;
  } catch(e) {
    $('#output').innerHTML = `<span style="color:var(--gz-accent)">${e.message}</span>`;
    $('#status').innerHTML = `<span style="color:var(--gz-accent)">✗ Error: ${e.message}</span>`;
  }
}

function doDownload() {
  const text = $('#output').textContent;
  if (!text) return;
  const blob = new Blob([text], {type: 'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'data.json';
  a.click();
  URL.revokeObjectURL(a.href);
}

function loadExample() {
  $('#input').value = `# HJSON example — comments allowed!
{
  name: GameZipper
  version: 1.0
  description: "Free online tools"
  active: true

  // Array with unquoted values
  tags: [
    json
    yaml
    toml
  ]

  config: {
    port: 3000
    debug: false
  }
}`;
  doConvert();
}

function doClear() { $('#input').value = ''; $('#output').textContent = ''; $('#status').innerHTML = ''; }

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="doConvert()">${t('convert')}</button>
  <select class="gz-select" onchange="indent=+this.value;doConvert()">

  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doDownload()">⬇ .json</button>
