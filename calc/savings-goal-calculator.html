<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="sg-tabs" id="modeTabs" style="display:flex;gap:6px;margin-bottom:14px">
      <div class="sf-tab active" data-mode="amount" style="flex:1;padding:8px;background:var(--glass);border:1px solid var(--border);border-radius:8px;cursor:pointer;font-size:.85rem;font-weight:600;text-align:center" id="tab-amount">How much per month?</div>
      <div class="sf-tab" data-mode="time" style="flex:1;padding:8px;background:var(--glass);border:1px solid var(--border);border-radius:8px;cursor:pointer;font-size:.85rem;font-weight:600;text-align:center" id="tab-time">How long will it take?</div>
    </div>
    <div class="sg-wrap">
      <div class="sg-card">
        <h3>🎯 Goal Details</h3>
        <div class="sg-field"><label id="lbl-goal">Savings goal ($)</label><input type="number" id="goal" value="50000" min="0" step="100"></div>
        <div class="sg-field"><label id="lbl-start">Current savings ($)</label><input type="number" id="start" value="5000" min="0" step="100"></div>
        <div class="sg-field" id="monthsField"><label id="lbl-months">Time frame (months)</label><input type="number" id="months" value="36" min="1" step="1"></div>
        <div class="sg-field" id="depositField" style="display:none"><label id="lbl-deposit">Monthly deposit ($)</label><input type="number" id="deposit" value="500" min="0" step="10"></div>
        <div class="sg-field"><label id="lbl-apy">Annual interest rate (APY %)</label><input type="number" id="apy" value="4.5" min="0" max="100" step="0.1"></div>
      </div>
      <div class="sg-card">
        <h3>📊 Results</h3>
        <div class="sg-result">
          <div class="big" id="bigVal">$0</div>
          <div class="lbl" id="bigLbl">per month</div>
        </div>
        <div class="sg-row"><span class="lbl" id="lbl-total-deposits">Total deposits</span><span class="val" id="totalDeposits">$0</span></div>
        <div class="sg-row"><span class="lbl" id="lbl-interest-earned">Interest earned</span><span class="val" id="interestEarned">$0</span></div>
        <div class="sg-row"><span class="lbl" id="lbl-final-balance">Final balance</span><span class="val" id="finalBalance">$0</span></div>
        <div class="sg-row"><span class="lbl" id="lbl-end-date">Target date</span><span class="val" id="endDate">—</span></div>
        <div class="sg-chart" id="chart"></div>
      </div>
    </div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Savings Goal Calculator',
    toolDesc: 'Calculate exactly how much to save each month to reach your goal — or how long it will take at your current rate. Includes compound interest. Free, browser-only.',
    goal: 'Savings goal ($)', start: 'Current savings ($)',
    months: 'Time frame (months)', deposit: 'Monthly deposit ($)',
    apy: 'Annual interest rate (APY %)',
    totalDeposits: 'Total deposits', interestEarned: 'Interest earned',
    finalBalance: 'Final balance', endDate: 'Target date',
    perMonth: 'per month', monthsTime: 'months to reach goal',
    step1: 'Enter your savings goal amount and current savings balance',
    step2: 'Choose your mode: find the monthly deposit needed, or how long it takes',
    step3: 'Set your APY (4-5% for high-yield savings, 7-10% for investing)',
    step4: 'Review the chart to see your balance grow month by month',
  },
  zh: {
    toolTitle: '储蓄目标计算器',
    toolDesc: '精确计算每月需要存多少钱才能达成储蓄目标，或按当前速度需要多久。包含复利计算。免费、浏览器本地运行。',
    goal: '储蓄目标（$）', start: '现有存款（$）',
    months: '时间期限（月）', deposit: '每月存款（$）',
    apy: '年利率（APY %）',
    totalDeposits: '累计存入', interestEarned: '利息收益',
    finalBalance: '最终余额', endDate: '达成日期',
    perMonth: '每月需存', monthsTime: '个月达成目标',
    step1: '输入你的储蓄目标金额和现有存款余额',
    step2: '选择模式：计算每月需存多少，或需要多长时间',
    step3: '设置年化收益率（高息储蓄 4-5%，投资 7-10%）',
    step4: '查看图表了解每月余额增长情况',
  }
});

const { $, t } = GZ;
let mode = 'amount';

function fmt(n){ return '$'+n.toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:0}); }

function calc(){
  const goal = parseFloat($('#goal').value)||0;
  const start = parseFloat($('#start').value)||0;
  const apy = parseFloat($('#apy').value)||0;
  const r = apy/100/12;
  let months, monthlyDeposit, balanceSeries=[];

  if(mode==='amount'){
    months = parseInt($('#months').value)||1;
    // M = (FV - PV*(1+r)^n) * r / ((1+r)^n - 1)
    const fvPV = start*Math.pow(1+r,months);
    let M;
    if(r===0){
      M = (goal-start)/months;
    } else {
      M = (goal - fvPV) * r / (Math.pow(1+r,months)-1);
    }
    monthlyDeposit = Math.max(0,M);
    $('#bigVal').textContent = fmt(monthlyDeposit);
    $('#bigLbl').textContent = t('perMonth');
  } else {
    monthlyDeposit = parseFloat($('#deposit').value)||0;
    // solve for months: iterate
    let bal = start; months = 0;
    balanceSeries.push(bal);
    while(bal<goal && months<1200){
      bal = bal*(1+r) + monthlyDeposit;
      months++;
      balanceSeries.push(bal);
      if(months>=1200) break;
    }
    $('#bigVal').textContent = months>=1200 ? '∞' : months;
    $('#bigLbl').textContent = t('monthsTime');
  }

  // build full series for chart
  if(mode==='amount' || balanceSeries.length<2){
    balanceSeries = [];
    let bal = start;
    balanceSeries.push(bal);
    for(let i=1;i<=months;i++){
      bal = bal*(1+r) + monthlyDeposit;
      balanceSeries.push(Math.min(bal,goal*1.05));
    }
  }

  let totalDep = start + monthlyDeposit*months;
  let finalBal = balanceSeries[balanceSeries.length-1];
  let interest = finalBal - totalDep;

  $('#totalDeposits').textContent = fmt(totalDep);
  $('#interestEarned').textContent = fmt(Math.max(0,interest));
  $('#finalBalance').textContent = fmt(finalBal);
  const dt = new Date();
  dt.setMonth(dt.getMonth()+months);
  $('#endDate').textContent = dt.toLocaleDateString();

  // chart
  const maxVal = Math.max(goal, finalBal, 1);
  const points = Math.min(balanceSeries.length, 24);
  const step = Math.max(1, Math.floor(balanceSeries.length/points));
  let bars='';
  let xaxis='';
  const sampled=[];
  for(let i=0;i<balanceSeries.length;i+=step){ sampled.push(balanceSeries[i]); }
  if(sampled[sampled.length-1]!==balanceSeries[balanceSeries.length-1]) sampled.push(balanceSeries[balanceSeries.length-1]);
  sampled.forEach((v,i)=>{
    const h = Math.max(2, (v/maxVal)*130);
    bars += `<div class="sg-barcol" style="height:${h}px" title="${fmt(v)}"></div>`;
  });
  $('#chart').innerHTML = `<div class="sg-bar">${bars}</div><div class="sg-xaxis"><span>Now</span><span>${months} mo</span></div>`;
}

['goal','start','months','deposit','apy'].forEach(id=>{
  $('#'+id).addEventListener('input',calc);
  $('#'+id).addEventListener('change',calc);
});

$('#tab-amount').addEventListener('click',()=>{
  mode='amount';
  $('#tab-amount').style.background='linear-gradient(135deg,var(--accent),var(--accent2))';
  $('#tab-amount').style.color='#fff';
  $('#tab-time').style.background='var(--glass)';
  $('#tab-time').style.color='var(--text)';
  $('#monthsField').style.display='block';
  $('#depositField').style.display='none';
  calc();
});
$('#tab-time').addEventListener('click',()=>{
  mode='time';
  $('#tab-time').style.background='linear-gradient(135deg,var(--accent),var(--accent2))';
  $('#tab-time').style.color='#fff';
  $('#tab-amount').style.background='var(--glass)';
  $('#tab-amount').style.color='var(--text)';
  $('#monthsField').style.display='none';
  $('#depositField').style.display='block';
  calc();
});

calc();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🏦', href:'/calc/compound-interest-calculator.html', name:'Compound Interest'},
    {icon:'💰', href:'/calc/retirement-calculator.html', name:'Retirement'},
    {icon:'🚨', href:'/calc/emergency-fund-calculator.html', name:'Emergency Fund'},
    {icon:'📈', href:'/calc/roi.html', name:'ROI Calculator'},
  ]
});
</script>
<script src="/tools-result-rec.js?v=20260707v520" defer></script>
</body>
