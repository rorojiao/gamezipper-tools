/* Lightweight YAML 1.2 parser */
function parseYAML(src) {
  src = src.replace(/^\uFEFF/, '').replace(/\r\n?/g, '\n');
  const lines = src.split('\n');
  while (lines.length && lines[lines.length - 1] === '') lines.pop();
  let pos = 0;
  function err(msg, line, col) { throw { message: msg, line: line, col: col }; }

  function parseBlock(indent) {
    const result = {};
    let arr = null;
    let i = pos;
    while (i < lines.length) {
      const raw = lines[i];
      if (raw === '' || /^\s*#/.test(raw)) { i++; pos = i; continue; }
      const m = raw.match(/^(\s*)(.*)$/);
      const lineIndent = m[1].length;
      if (lineIndent < indent) break;
      if (lineIndent > indent) err('Unexpected indentation', i + 1, lineIndent + 1);
      const content = m[2];
      if (content === '' || /^\s*#/.test(content)) { i++; pos = i; continue; }

      if (/^-\s/.test(content) || content === '-') {
        if (arr === null) { if (Object.keys(result).length > 0) err('Mix of map and sequence', i + 1, 1); arr = []; }
        const itemBody = content === '-' ? '' : content.replace(/^-\s?/, '');
        if (itemBody === '' || /^[-\s]/.test(itemBody)) {
          i++; pos = i;
          let childIndent = indent;
          while (i < lines.length) {
            const r2 = lines[i];
            if (r2 === '' || /^\s*#/.test(r2)) { i++; pos = i; continue; }
            const mi = r2.match(/^(\s*)(.*)$/);
            if (mi[1].length <= indent) break;
            childIndent = mi[1].length; break;
          }
          arr.push(parseBlock(childIndent));
        } else {
          const kv = itemBody.match(/^([^:]+?):(\s|$)/);
          if (kv) {
            const key = unquoteKey(kv[1].trim());
            const rest = itemBody.substring(kv[1].length + 1).trim();
            const obj = {};
            if (rest === '' || rest === '|' || rest === '>' || rest === '|+' || rest === '|-') {
              const block = readMultiline(rest, i, indent + 2);
              i = block.next; obj[key] = block.value;
            } else { obj[key] = parseScalar(rest); i++; }
            pos = i; arr.push(obj);
          } else { arr.push(parseScalar(itemBody)); i++; pos = i; }
        }
        continue;
      }

      const kv = content.match(/^([^:#]+?):(\s|$)/);
      if (!kv) {
        if (i === 0 && Object.keys(result).length === 0 && arr === null) return parseScalar(content);
        err('Expected key:value pair', i + 1, 1);
      }
      if (arr !== null) err('Mix of map and sequence', i + 1, 1);
      const key = unquoteKey(kv[1].trim());
      const rest = content.substring(kv[1].length + 1).trim();
      if (rest === '' || rest === '|' || rest === '>' || rest === '|+' || rest === '|-') {
        const block = readMultiline(rest, i, indent + 2);
        i = block.next; result[key] = block.value;
      } else { result[key] = parseScalar(rest); i++; }
      pos = i;
    }
    pos = i;
    return arr !== null ? arr : result;
  }

  function unquoteKey(s) {
    if ((s[0]==='"' && s[s.length-1]==='"') || (s[0]==="'" && s[s.length-1]==="'")) return s.substring(1, s.length-1);
    return s;
  }

  function parseScalar(s) {
    s = s.replace(/\s+#.*$/, '').trim();
    if (s === '' || s === '~' || s === 'null') return null;
    if (s === 'true' || s === 'True' || s === 'TRUE') return true;
    if (s === 'false' || s === 'False' || s === 'FALSE') return false;
    if (/^-?\d+$/.test(s)) return parseInt(s, 10);
    if (/^-?\d+\.\d+([eE][+-]?\d+)?$/.test(s)) return parseFloat(s);
    if ((s[0]==='"' && s[s.length-1]==='"') || (s[0]==="'" && s[s.length-1]==="'"))
      return s.substring(1, s.length-1).replace(/\\n/g,'\n').replace(/\\t/g,'\t').replace(/\\"/g,'"');
    return s;
  }

  function readMultiline(style, lineIdx, childIndent) {
    let i = lineIdx + 1;
    const collected = [];
    while (i < lines.length) {
      const r = lines[i];
      if (r === '') { collected.push(''); i++; continue; }
      const m = r.match(/^(\s*)(.*)$/);
      if (m[1].length < childIndent && m[2] !== '') break;
      if (m[1].length < childIndent && m[2] === '') { i++; continue; }
      collected.push(r.substring(childIndent)); i++;
    }
    let text = collected.join('\n');
    if (text.endsWith('\n')) text = text.substring(0, text.length - 1);
    if (style === '>') return { value: text.replace(/\n/g, ' '), next: i };
    return { value: text, next: i };
  }

  pos = 0;
  if (lines.length === 0) return {};
  let topIndent = -1;
  for (let k = 0; k < lines.length; k++) {
    const r = lines[k];
    if (r === '' || /^\s*#/.test(r)) continue;
    const mm = r.match(/^(\s*)\S/);
    if (mm) { topIndent = mm[1].length; break; }
  }
  if (topIndent < 0) return {};
  return parseBlock(topIndent);
}

/* Stats helper */
function countStats(obj, depth) {
  depth = depth || 0;
  let keys = 0, maxDepth = depth;
  if (obj && typeof obj === 'object') {
    if (Array.isArray(obj)) {
      for (const item of obj) {
        const s = countStats(item, depth + 1);
        keys += s.keys; maxDepth = Math.max(maxDepth, s.maxDepth);
      }
    } else {
      const k = Object.keys(obj);
      keys += k.length;
      for (const key of k) {
        const s = countStats(obj[key], depth + 1);
        keys += s.keys; maxDepth = Math.max(maxDepth, s.maxDepth);
      }
    }
  }
  return { keys, maxDepth };
}

function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function doValidate() {
  const inp = $('#input').value;
  if (!inp.trim()) { $('#output').innerHTML = ''; $('#status').innerHTML = ''; return; }
  try {
    const obj = parseYAML(inp);
    const lineCount = inp.split('\n').length;
    const stats = countStats(obj);
    $('#output').textContent = JSON.stringify(obj, null, 2);
    $('#status').innerHTML = `<span style="color:var(--gz-success)">${t('valid')}</span> &nbsp;|&nbsp; ${lineCount} ${t('lines')} &nbsp;|&nbsp; ${stats.keys} ${t('keys')} &nbsp;|&nbsp; ${t('depth')}: ${stats.maxDepth}`;
  } catch(e) {
    let info = `<span style="color:var(--gz-accent)">${t('invalid')}: ${escHtml(e.message || 'parse error')}</span>`;
    if (e.line) info += ` <span style="opacity:.7">(Line ${e.line}, Col ${e.col || 1})</span>`;
    $('#status').innerHTML = info;
    // Show input with error line highlighted
    const allLines = inp.split('\n');
    const highlighted = allLines.map((line, idx) => {
      const escaped = escHtml(line);
      if (e.line && idx === e.line - 1) {
        return `<span class="err-line">${idx + 1}: ${escaped}</span>`;
      }
      return `${idx + 1}: ${escaped}`;
    }).join('\n');
    $('#output').innerHTML = highlighted;
  }
}
