const { $, copyText, t } = GZ;

function parseInline(text) {
  // strip markdown emphasis markers, keep readable text
  return text.replace(/`([^`]+)`/g, '$1')
    .replace(/\*\*([^*]+)\*\*/g, '$1')
    .replace(/__([^_]+)__/g, '$1')
    .replace(/\*([^*]+)\*/g, '$1')
    .replace(/_([^_]+)_/g, '$1')
    .replace(/\[([^\]]+)\]\(([^)\s]+)\)/g, '$1')
    .trim();
}

function extractLinks(text) {
  const links = [];
  const re = /\[([^\]]+)\]\(([^)\s]+)\)/g;
  let m;
  while ((m = re.exec(text)) !== null) links.push({ text: m[1], url: m[2] });
  return links;
}

function mdToBlocks(md) {
  const lines = md.replace(/\r/g, '').split('\n');
  const blocks = [];
  let i = 0;
  while (i < lines.length) {
    let line = lines[i];
    if (/^\s*$/.test(line)) { i++; continue; }
    // code fence
    if (/^```/.test(line)) {
      const lang = line.replace(/^```/, '').trim();
      const code = [];
      i++;
      while (i < lines.length && !/^```/.test(lines[i])) { code.push(lines[i]); i++; }
      i++;
      blocks.push({ type: 'code', lang: lang || null, content: code.join('\n') });
      continue;
    }
    // horizontal rule
    if (/^(\s*[-*_]){3,}\s*$/.test(line)) { blocks.push({ type: 'hr' }); i++; continue; }
    // heading
    const h = line.match(/^(#{1,6})\s+(.*)$/);
    if (h) { blocks.push({ type: 'heading', level: h[1].length, text: parseInline(h[2]) }); i++; continue; }
    // blockquote
    if (/^>\s?/.test(line)) {
      const quote = [];
      while (i < lines.length && /^>\s?/.test(lines[i])) { quote.push(lines[i].replace(/^>\s?/, '')); i++; }
      blocks.push({ type: 'blockquote', text: parseInline(quote.join(' ')) });
      continue;
    }
    // unordered list
    if (/^\s*[-*+]\s+/.test(line)) {
      const items = [];
      while (i < lines.length && /^\s*[-*+]\s+/.test(lines[i])) { items.push(parseInline(lines[i].replace(/^\s*[-*+]\s+/, ''))); i++; }
      blocks.push({ type: 'list', ordered: false, items });
      continue;
    }
    // ordered list
    if (/^\s*\d+\.\s+/.test(line)) {
      const items = [];
      while (i < lines.length && /^\s*\d+\.\s+/.test(lines[i])) { items.push(parseInline(lines[i].replace(/^\s*\d+\.\s+/, ''))); i++; }
      blocks.push({ type: 'list', ordered: true, items });
      continue;
    }
    // paragraph
    const para = [line];
    i++;
    while (i < lines.length && !/^\s*$/.test(lines[i]) && !/^(#{1,6}\s|>|```|[-*+]\s|\d+\.\s|(\s*[-*_]){3,})/.test(lines[i])) { para.push(lines[i]); i++; }
    const text = para.join(' ');
    const block = { type: 'paragraph', text: parseInline(text) };
    const links = extractLinks(text);
    if (links.length) block.links = links;
    blocks.push(block);
  }
  return blocks;
}

function buildTree(blocks) {
  const root = { type: 'document', level: 0, children: [] };
  const stack = [root];
  for (const b of blocks) {
    if (b.type === 'heading') {
      while (stack.length > 1 && stack[stack.length - 1].level >= b.level) stack.pop();
      const node = { type: 'heading', level: b.level, text: b.text, children: [] };
      stack[stack.length - 1].children.push(node);
      stack.push(node);
    } else {
      stack[stack.length - 1].children.push(b);
    }
  }
  return root;
}

function syntaxHighlight(json) {
  return json.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/("(\\u[\da-fA-F]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(\.\d+)?([eE][+-]?\d+)?)/g, m => {
      let c = 'json-number';
      if (/^"/.test(m)) c = /:$/.test(m) ? 'json-key' : 'json-string';
      else if (/true|false/.test(m)) c = 'json-bool';
      else if (/null/.test(m)) c = 'json-null';
      return `<span class="${c}">${m}</span>`;
    });
}

function convert() {
  const md = $('#input').value.trim();
  if (!md) { $('#output').innerHTML = ''; $('#status').innerHTML = ''; return; }
  const blocks = mdToBlocks(md);
  const tree = $('#opt-struct').value === 'tree';
  const result = tree ? buildTree(blocks) : blocks;
  const json = JSON.stringify(result, null, 2);
  $('#output').innerHTML = syntaxHighlight(json);
  $('#status').innerHTML = `<span style="color:var(--gz-success)">✓ ${blocks.length} blocks parsed (${json.length} bytes)</span>`;
}

  convert();
}
