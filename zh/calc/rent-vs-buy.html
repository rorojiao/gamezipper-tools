<div class="gz-container">

<script>
GZI18n.register({
  en: {
    toolTitle: 'Rent vs Buy Calculator',
    toolDesc: 'Compare total cost of renting vs buying a home. Includes mortgage, taxes, insurance, maintenance, opportunity cost, and home appreciation.',

    step4: 'See total cost comparison and net worth impact',
  },
  zh: {
    toolTitle: '租房 vs 买房计算器',
    toolDesc: '比较租房与买房的总成本，含按揭、税费、保险、维护、机会成本和房产增值。',
    lblHome: '房屋总价 (美元)',
    lblDown: '首付比例 (%)',
    lblRate: '按揭利率 (%)',
    lblYears: '持有年限 (年)',
    lblRent: '月租金 (美元)',
    lblRentInc: '年租金涨幅 (%)',
    lblApprec: '房产增值率 (%)',
    lblInvest: '投资回报率 (%)',
    calc: '计算',
    reset: '重置',
    buyTotal: '买房总成本',
    rentTotal: '租房总成本',
    buyNetWorth: '买房净财富',
    rentNetWorth: '租房投资价值',
    winner: '最优选择',
    rec: '建议',
    recBuy: '买房胜出',
    recRent: '租房胜出',
    breakEven: '收支平衡',
    years: '年',
    mortgage: '按揭还款',
    rentTotalLbl: '租金总额',
    taxes: '房产税',
    insurance: '保险',
    maintenance: '维护 (1%/年)',
    closing: '交易成本',
    selling: '出售成本',
    opportunity: '机会成本',
    appreciation: '房产增值',
    netEquity: '期末净权益',
    netCost: '净总成本',
    netWorth: '净财富影响',
    step1: '输入您考虑的房屋总价和首付比例',
    step2: '填写月租金、租金涨幅和持有年限',
    step3: '设置按揭利率、房产增值率和股市回报',
    step4: '查看总成本对比和净财富影响',
  }
});

const { $, t } = GZ;
const fmt = n => {
  const sign = n < 0 ? '−' : '';
  return sign + '$' + Math.abs(n).toLocaleString('en-US', {maximumFractionDigits: 0});
};

function calc() {
  const homePrice = +$('#home').value || 0;
  const downPct = +$('#down').value || 0;
  const rate = (+$('#rate').value || 0) / 100;
  const years = +$('#years').value || 1;
  const monthlyRent = +$('#rent').value || 0;
  const rentInc = (+$('#rentInc').value || 0) / 100;
  const apprec = (+$('#apprec').value || 0) / 100;
  const invest = (+$('#invest').value || 0) / 100;
  const downPayment = homePrice * (downPct / 100);
  const loanAmount = homePrice - downPayment;
  // Mortgage monthly payment
  const monthlyRate = rate / 12;
  const numPayments = years * 12;
  const monthlyMortgage = loanAmount * (monthlyRate * Math.pow(1 + monthlyRate, numPayments)) / (Math.pow(1 + monthlyRate, numPayments) - 1);
  const totalMortgage = monthlyMortgage * numPayments;
  const interestPaid = totalMortgage - loanAmount;
  const propertyTax = homePrice * 0.012 * years; // 1.2%/yr
  const insurance = homePrice * 0.004 * years; // 0.4%/yr
  const maintenance = homePrice * 0.01 * years; // 1%/yr
  const closingCost = homePrice * 0.04; // 4% upfront
  const sellingCost = homePrice * Math.pow(1 + apprec, years) * 0.07; // 7% when selling
  // Opportunity cost: down payment + closing cost invested in market
  const oppCost = (downPayment + closingCost) * (Math.pow(1 + invest, years) - 1);
  // Home appreciation
  const finalHomeValue = homePrice * Math.pow(1 + apprec, years);
  const equity = finalHomeValue - (loanAmount - (loanAmount - (totalMortgage - interestPaid))) - sellingCost;
  const totalBuyCost = totalMortgage + propertyTax + insurance + maintenance + closingCost + sellingCost + oppCost - finalHomeValue;

  // Rent calculation
  let totalRent = 0;
  let currentRent = monthlyRent;
  for (let y = 1; y <= years; y++) {
    totalRent += currentRent * 12;
    currentRent *= (1 + rentInc);
  }
  // What renter does with down payment: invest in market
  const rentInvestValue = (downPayment + closingCost) * Math.pow(1 + invest, years);
  const totalRentCost = totalRent; // + opportunity cost of investing monthly savings
  // For fair comparison: renter also pays no maintenance, taxes, etc. — they invest the difference.
  // Simplified: rent total cost = rent + renter insurance (~0)

  const buyNetWorth = finalHomeValue - (loanAmount - (loanAmount - (totalMortgage - interestPaid))) - sellingCost;
  // Net worth from buying = equity in home
  // For renter: down payment grown + monthly difference (mortgage - rent) saved & invested? — skip for simplicity, use invested down payment

  const diff = totalRentCost - totalBuyCost;
  const isBuyBetter = totalBuyCost < totalRentCost;
  const winner = isBuyBetter ? '🏠 ' + t('recBuy') : '🔑 ' + t('recRent');
  const winnerAmount = fmt(Math.abs(diff));

  // Chart
  const chartW = 720, chartH = 240, padX = 50, padY = 30;
  const data = [];
  for (let y = 0; y <= years; y++) {
    let r = 0;
    let curR = monthlyRent;
    for (let yy = 1; yy <= y; yy++) {
      r += curR * 12;
      curR *= (1 + rentInc);
    }
    const mortgagePaid = monthlyMortgage * 12 * y;
    const taxPaid = homePrice * 0.012 * y;
    const insPaid = homePrice * 0.004 * y;
    const maintPaid = homePrice * 0.01 * y;
    const homeVal = homePrice * Math.pow(1 + apprec, y);
    const remainingLoan = loanAmount - (mortgagePaid - (mortgagePaid - loanAmount * (monthlyRate * y * 12) / (1 + monthlyRate) - mortgagePaid));
    // Simpler: cumulative
    const buyCumul = mortgagePaid + taxPaid + insPaid + maintPaid + (y === 0 ? 0 : closingCost) - homeVal;
    data.push({ year: y, rent: r, buy: buyCumul });
  }
  const allVals = data.flatMap(d => [d.rent, d.buy]).map(v => Math.abs(v));
  const maxV = Math.max(...allVals, 1);
  const minV = Math.min(...allVals, 0);
  const range = maxV - minV || 1;

  const points = (key, color) => data.map((d, i) => {
    const x = padX + (i / (years || 1)) * (chartW - padX * 2);
    const y = chartH - padY - ((d[key] - minV) / range) * (chartH - padY * 2);
    return [x, y];
  });
  const pathStr = key => points(key).map((p, i) => (i === 0 ? 'M' : 'L') + p[0].toFixed(1) + ',' + p[1].toFixed(1)).join(' ');

  $('#result').innerHTML = `
    <div class="gz-result-grid">
      <div class="gz-result-card buy"><div class="label">${t('buyTotal')}</div><div class="value">${fmt(totalBuyCost)}</div></div>
      <div class="gz-result-card rent"><div class="label">${t('rentTotal')}</div><div class="value">${fmt(totalRentCost)}</div></div>
      <div class="gz-result-card winner"><div class="label">${t('winner')}</div><div class="value">${winner} ${winnerAmount}</div></div>
    </div>
    <div class="chart-box">
      <svg class="chart-svg" viewBox="0 0 ${chartW} ${chartH}" preserveAspectRatio="none">
        <path d="${pathStr('rent')}" fill="none" stroke="#ff9d5b" stroke-width="2.5" stroke-dasharray="6,3"/>
        <path d="${pathStr('buy')}" fill="none" stroke="#5b9cff" stroke-width="2.5"/>
        <text x="${chartW - 100}" y="20" font-size="11" fill="#5b9cff" font-weight="700">━━ Buy Cost</text>
        <text x="${chartW - 100}" y="36" font-size="11" fill="#ff9d5b" font-weight="700">┄┄ Rent Cost</text>
      </svg>
    </div>
    <div class="compare-tbl">
      <h3>📊 Cost Breakdown (over ${years} years)</h3>
      <table>
        <thead><tr><th>Item</th><th>Buy</th><th>Rent</th></tr></thead>
        <tbody>
          <tr class="${totalMortgage < totalRent ? 'winner-buy' : 'winner-rent'}">
            <td>${t('mortgage')}</td><td class="col-buy">${fmt(totalMortgage)}</td><td class="col-rent">—</td>
          </tr>
          <tr><td>${t('rentTotalLbl')}</td><td class="col-buy">—</td><td class="col-rent">${fmt(totalRent)}</td></tr>
          <tr><td>${t('taxes')}</td><td class="col-buy">${fmt(propertyTax)}</td><td class="col-rent">—</td></tr>
          <tr><td>${t('insurance')}</td><td class="col-buy">${fmt(insurance)}</td><td class="col-rent">—</td></tr>
          <tr><td>${t('maintenance')}</td><td class="col-buy">${fmt(maintenance)}</td><td class="col-rent">—</td></tr>
          <tr><td>${t('closing')}</td><td class="col-buy">${fmt(closingCost)}</td><td class="col-rent">—</td></tr>
          <tr><td>${t('selling')}</td><td class="col-buy">${fmt(sellingCost)}</td><td class="col-rent">—</td></tr>
          <tr><td>${t('opportunity')}</td><td class="col-buy">${fmt(oppCost)}</td><td class="col-rent">${fmt(rentInvestValue - downPayment - closingCost)}</td></tr>
          <tr class="winner-${isBuyBetter ? 'buy' : 'rent'}"><td><strong>${t('netCost')}</strong></td><td class="col-buy"><strong>${fmt(totalBuyCost)}</strong></td><td class="col-rent"><strong>${fmt(totalRentCost)}</strong></td></tr>
          <tr class="winner-${isBuyBetter ? 'buy' : 'rent'}"><td><strong>${t('netWorth')}</strong></td><td class="col-buy"><strong>${fmt(finalHomeValue - (loanAmount - (totalMortgage - interestPaid)) - sellingCost)}</strong></td><td class="col-rent"><strong>${fmt(rentInvestValue)}</strong></td></tr>
        </tbody>
      </table>
    </div>
    <div class="tip-box">💡 <strong>${t('rec')}:</strong> ${isBuyBetter ? t('recBuy') : t('recRent')} ${winnerAmount} over ${years} ${t('years')}. ${isBuyBetter ? 'Buying builds equity and benefits from appreciation. Consider a fixed-rate mortgage and a 6+ month emergency reserve.' : 'Renting offers flexibility and the chance to invest the down payment in higher-return assets. Re-evaluate when rent exceeds 30% of income or you plan to stay 5+ years.'}</div>
  `;
}

function reset() {
  $('#home').value = 400000;
  $('#down').value = 20;
  $('#rate').value = 6.5;
  $('#years').value = 10;
  $('#rent').value = 2200;
  $('#rentInc').value = 3;
  $('#apprec').value = 3;
  $('#invest').value = 7;
  calc();
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="calc()">${t('calc')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="reset()">${t('reset')}</button>`;

calc();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🏦', href:'/calc/loan-calculator.html', name:'Loan Calculator'},
    {icon:'🏠', href:'/fortune/mortgage.html', name:'Mortgage Calculator'},
    {icon:'📈', href:'/calc/compound-interest.html', name:'Compound Interest'},
    {icon:'📊', href:'/calc/inflation-calculator.html', name:'Inflation Calculator'},
  ]
});
</script>
