let quizQuestions = [];
let currentQ = 0;
let score = 0;
let answered = false;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startQuiz() {
  let pool = selectedCat === 'all' ? questions : questions.filter(q => q.c === selectedCat);
  pool = shuffle(pool);
  quizQuestions = pool.slice(0, 10);
  currentQ = 0;
  score = 0;
  answered = false;
  $('#setup').classList.add('hidden');
  $('#result-area').classList.add('hidden');
  $('#quiz-area').classList.remove('hidden');
  showQuestion();
}

function showQuestion() {
  answered = false;
  const q = quizQuestions[currentQ];
  $('#q-progress').textContent = `${t('question')} ${currentQ + 1} / 10`;
  $('#q-score').textContent = `${t('score')}: ${score}`;
  $('#q-num').textContent = `${currentQ + 1}/10`;
  $('#q-text').textContent = q.q;
  $('#next-btn').classList.add('hidden');
  const optsEl = $('#opts');
  optsEl.innerHTML = '';
  q.o.forEach((opt, i) => {
    const btn = document.createElement('div');
    btn.className = 'opt-btn';
    btn.textContent = opt;
    btn.onclick = () => selectAnswer(i, btn);
    optsEl.appendChild(btn);
  });
}

function selectAnswer(idx, btn) {
  if (answered) return;
  answered = true;
  const q = quizQuestions[currentQ];
  const opts = $('#opts').children;
  for (let i = 0; i < opts.length; i++) opts[i].classList.add('disabled');
  if (idx === q.a) {
    btn.classList.add('correct');
    score++;
  } else {
    btn.classList.add('wrong');
    opts[q.a].classList.add('correct');
  }
  $('#q-score').textContent = `${t('score')}: ${score}`;
  if (currentQ < 9) {
    $('#next-btn').classList.remove('hidden');
    $('#next-btn').textContent = t('next');
  } else {
    setTimeout(showResult, 1200);
  }
}

function nextQ() {
  currentQ++;
  showQuestion();
}

function showResult() {
  $('#quiz-area').classList.add('hidden');
  const r = $('#result-area');
  r.classList.remove('hidden');
  const pct = Math.round(score / 10 * 100);
  let msg = pct >= 90 ? t('excellent') : pct >= 70 ? t('great') : pct >= 50 ? t('good') : t('keepTrying');
  r.innerHTML = `<h2>${t('yourResult')}</h2><div class="big-score">${score} ${t('outOf')}</div><p>${msg}</p><p style="opacity:.7">${pct}% correct</p><button class="gz-btn" onclick="resetQuiz()" style="margin-top:16px">${t('playAgain')}</button>`;
}

function resetQuiz() {
  $('#result-area').classList.add('hidden');
  $('#quiz-area').classList.add('hidden');
  $('#setup').classList.remove('hidden');
}
