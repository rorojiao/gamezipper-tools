<script>
GZI18n.register({
  en: {
    toolTitle: 'Blog Post Idea Generator',
    toolDesc: 'Generate 20+ creative blog post ideas instantly. Enter your niche and get proven content frameworks — how-tos, listicles, comparisons and more.',
    placeholder: 'Enter your niche/topic (e.g., fitness, digital marketing, gardening)...',
    generate: 'Generate Ideas',
    copy: 'Copy',
    anyFormat: 'Any Format',
    step1: 'Enter your blog niche or topic keyword',
    step2: 'Optionally filter by content format (How-To, Listicle, etc.)',
    step3: 'Click Generate to get 20+ fresh content ideas',
    step4: 'Click Copy on any idea to save it for your editorial calendar',
  },
  zh: {
    toolTitle: '博客文章创意生成器',
    toolDesc: '即时生成 20+ 博客文章创意。输入您的领域，获取经过验证的内容框架——教程、列表、对比等。',
    placeholder: '输入您的领域/主题（如健身、数字营销、园艺）...',
    generate: '生成创意',
    copy: '复制',
    anyFormat: '所有格式',
    step1: '输入您的博客领域或主题关键词',
    step2: '可选择按内容格式筛选（教程、列表等）',
    step3: '点击「生成创意」获取 20+ 新内容创意',
    step4: '点击任意创意的「复制」将其保存到编辑日历',
  }
});

const { $, copyText, t } = GZ;

const TEMPLATES = {
  howto: {
    label: { en: 'How-To', zh: '教程' },
    templates: [
      'How to {topic} in 2026: The Complete Guide',
      'How to {topic} for Beginners (Step by Step)',
      'How to Master {topic} in 30 Days',
      'How to {topic} Without Spending a Fortune',
      'How to {topic}: 10 Proven Strategies That Work',
      'The Ultimate Guide to {topic} for Beginners',
      '{topic}: A Step-by-Step Tutorial',
      'How to Get Started with {topic} Today',
    ]
  },
  listicle: {
    label: { en: 'Listicle', zh: '列表' },
    templates: [
      '10 {topic} Tips That Actually Work',
      '7 Common {topic} Mistakes (And How to Fix Them)',
      '15 Best {topic} Tools and Resources',
      '21 {topic} Ideas You Haven\'t Tried Yet',
      '5 Signs You\'re Doing {topic} Wrong',
      '20 {topic} Trends to Watch in 2026',
      '12 {topic} Myths Debunked',
      '8 {topic} Hacks to Save You Time',
    ]
  },
  comparison: {
    label: { en: 'Comparison', zh: '对比' },
    templates: [
      '{topic}: Free vs Paid — Which Is Better?',
      'Traditional vs Modern {topic}: What Wins?',
      'Best {topic} Tools: A Head-to-Head Comparison',
      '{topic} in 2025 vs 2026: What Changed?',
      'DIY vs Professional {topic}: Cost & Quality Compared',
    ]
  },
  question: {
    label: { en: 'Q&A', zh: '问答' },
    templates: [
      'What Is {topic}? A Beginner\'s Guide',
      'Why Is {topic} Important in 2026?',
      'When Is the Best Time to Start {topic}?',
      'Is {topic} Worth It? An Honest Review',
      'What Nobody Tells You About {topic}',
      'Can You Really Succeed at {topic}? Here\'s the Truth',
    ]
  },
  case: {
    label: { en: 'Case Study', zh: '案例' },
    templates: [
      'How I Grew My {topic} from Zero to Success',
      'Case Study: {topic} That Generated 10x ROI',
      'Behind the Scenes: My {topic} Journey',
      'From Failure to Success in {topic}: Lessons Learned',
      'How [Brand] Nailed {topic} (And What You Can Learn)',
    ]
  },
  opinion: {
    label: { en: 'Opinion', zh: '观点' },
    templates: [
      'The Future of {topic}: My Predictions for 2026',
      'Why Most People Fail at {topic} (And How to Succeed)',
      'The Ugly Truth About {topic} Nobody Talks About',
      'Why {topic} Is Harder Than You Think',
      'Unpopular Opinion: {topic} Doesn\'t Have to Be Complicated',
    ]
  },
};

const TYPE_LABELS = {
  howto: { en: 'How-To Guide', zh: '教程' },
  listicle: { en: 'Listicle', zh: '列表文章' },
  comparison: { en: 'Comparison', zh: '对比文章' },
  question: { en: 'Q&A', zh: '问答' },
  case: { en: 'Case Study', zh: '案例研究' },
  opinion: { en: 'Opinion', zh: '观点文章' },
};

function fillTemplate(template, topic) {
  const t2 = topic || GZI18n.getLang() === 'zh' ? (topic || '你的主题') : (topic || 'your topic');
  return template.replace(/\{topic\}/g, topic || 'your topic');
}

function populateFormat() {
  const lang = GZI18n.getLang();
  $('#format').innerHTML = `<option value="any">${t('anyFormat')}</option>` +
    Object.entries(TEMPLATES).map(([k,v]) => `<option value="${k}">${lang === 'zh' ? v.label.zh : v.label.en}</option>`).join('');
}

function generate() {
  const topic = $('#topic').value.trim() || (GZI18n.getLang() === 'zh' ? '你的主题' : 'your topic');
  const fmt = $('#format').value;
  const lang = GZI18n.getLang();

  let ideas = [];
  const formats = fmt === 'any' ? Object.keys(TEMPLATES) : [fmt];

  formats.forEach(f => {
    TEMPLATES[f].templates.forEach(t2 => {
      ideas.push({ text: fillTemplate(t2, topic), type: f });
    });
  });

  // Shuffle
  for (let i = ideas.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [ideas[i], ideas[j]] = [ideas[j], ideas[i]];
  }

  const shown = ideas.slice(0, 20);

  $('#ideaList').innerHTML = shown.map((idea, i) => {
    const typeLabel = lang === 'zh' ? TYPE_LABELS[idea.type].zh : TYPE_LABELS[idea.type].en;
    return `<div class="idea-card">
      <span class="idea-num">${i+1}</span>
      <div class="idea-text">${idea.text}<span class="idea-type">${typeLabel}</span></div>
      <button class="gz-btn gz-btn-secondary" onclick="copyText('${idea.text.replace(/'/g, "\\'")}')">${t('copy')}</button>
    </div>`;
  }).join('');
}

$('#topic').setAttribute('placeholder', t('placeholder'));
$('#topic').addEventListener('keydown', e => { if (e.key === 'Enter') generate(); });
$('#format').addEventListener('change', generate);

$('#toolbar').innerHTML = `<button class="gz-btn" onclick="generate()">${t('generate')}</button>`;

populateFormat();
generate();

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'✨', href:'/text/blog-title-generator.html', name:'Blog Title Gen'},
    {icon:'📝', href:'/text/cta-generator.html', name:'CTA Generator'},
    {icon:'🏷️', href:'/text/slug-generator.html', name:'Slug Generator'},
    {icon:'📊', href:'/seo/keyword-density.html', name:'Keyword Density'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
