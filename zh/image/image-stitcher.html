<script>
GZI18n.register({
  en: {

    toolDesc: 'Stitch images together horizontally or vertically. Merge, combine and join multiple images into one — free and browser-based.',

  },
  zh: {
    toolTitle: '图片拼接工具',
    toolDesc: '将多张图片水平或垂直拼接为一张 — 合并、组合和连接图片，免费且完全浏览器本地处理。',
    addImages: '添加图片',
    clearAll: '清空',
    stitch: '拼接图片',
    download: '下载',
    direction: '方向',
    horizontal: '水平',
    vertical: '垂直',
    spacing: '间距',
    px: '像素',
    bgColor: '背景色',
    format: '格式',
    resize: '缩放模式',
    resizeNone: '保持原始',
    resizeFit: '适配最大',
    dropHere: '拖拽图片到此处或点击"添加图片"',
    noImages: '请至少添加 2 张图片。',
    done: '拼接完成！大小：',
    step1: '点击"添加图片"或拖拽 PNG/JPG/WebP 文件',
    step2: '拖动缩略图调整图片顺序',
    step3: '选择方向、间距和输出格式',
    step4: '点击"拼接图片"并下载结果',
  }
});

const { $, copyText, t } = GZ;
let images = [];

const fileInput = $('#fileInput');
const thumbs = $('#thumbs');
const canvas = $('#canvas');
const ctx = canvas.getContext('2d');

function renderThumbs() {
  thumbs.innerHTML = '';
  if (images.length === 0) {
    thumbs.innerHTML = `<p style="color:var(--text2);text-align:center;width:100%;padding:20px">${t('dropHere')}</p>`;
    return;
  }
  images.forEach((img, i) => {
    const div = document.createElement('div');
    div.className = 'thumb';
    div.draggable = true;
    div.dataset.index = i;
    div.innerHTML = `<img src="${img.url}" alt="Image ${i+1}"><button class="rm" title="Remove">×</button><span class="idx">${i+1}</span>`;
    div.querySelector('.rm').onclick = (e) => { e.stopPropagation(); URL.revokeObjectURL(img.url); images.splice(i, 1); renderThumbs(); };
    div.ondragstart = (e) => { e.dataTransfer.setData('text/plain', i); div.style.opacity = '0.4'; };
    div.ondragend = () => div.style.opacity = '1';
    div.ondragover = (e) => e.preventDefault();
    div.ondrop = (e) => { e.preventDefault(); e.stopPropagation(); const from = parseInt(e.dataTransfer.getData('text/plain')); if (from !== i) { const item = images.splice(from, 1)[0]; images.splice(i, 0, item); renderThumbs(); } };
    thumbs.appendChild(div);
  });
}

fileInput.onchange = (e) => {
  for (const file of e.target.files) {
    if (!file.type.startsWith('image/')) continue;
    const url = URL.createObjectURL(file);
    const imgEl = new Image();
    images.push({ url, img: imgEl, loaded: false });
    imgEl.onload = () => { const last = images.find(f => f.url === url); if (last) last.loaded = true; };
    imgEl.src = url;
  }
  fileInput.value = '';
  renderThumbs();
};

thumbs.ondragover = (e) => { e.preventDefault(); thumbs.classList.add('dragover'); };
thumbs.ondragleave = () => thumbs.classList.remove('dragover');
thumbs.ondrop = (e) => {
  e.preventDefault(); thumbs.classList.remove('dragover');
  for (const file of e.dataTransfer.files) {
    if (!file.type.startsWith('image/')) continue;
    const url = URL.createObjectURL(file);
    const imgEl = new Image();
    images.push({ url, img: imgEl, loaded: false });
    imgEl.onload = () => { const item = images.find(f => f.url === url); if (item) item.loaded = true; };
    imgEl.src = url;
  }
  renderThumbs();
};

async function stitchImages() {
  if (images.length < 2) { alert(t('noImages')); return; }

  // Wait for all to load
  for (const item of images) {
    if (!item.loaded) {
      await new Promise(r => { item.img.onload = () => { item.loaded = true; r(); }; item.img.onerror = r; });
    }
  }

  const horizontal = document.getElementById('dirSelect').value === 'h';
  const spacing = parseInt(document.getElementById('spacingInput').value) || 0;
  const bgColor = document.getElementById('bgColor').value || '#000000';
  const format = document.getElementById('formatSelect').value;
  const resizeMode = document.getElementById('resizeMode').value;

  // Calculate dimensions
  const imgs = images.map(i => i.img);
  let totalW, totalH;

  if (resizeMode === 'fit') {
    // Resize all to match largest dimension
    const maxH = Math.max(...imgs.map(i => i.naturalHeight));
    const maxW = Math.max(...imgs.map(i => i.naturalWidth));
    if (horizontal) {
      totalW = imgs.reduce((s, i) => s + Math.round(i.naturalWidth * (maxH / i.naturalHeight)), 0) + spacing * (imgs.length - 1);
      totalH = maxH;
    } else {
      totalW = maxW;
      totalH = imgs.reduce((s, i) => s + Math.round(i.naturalHeight * (maxW / i.naturalWidth)), 0) + spacing * (imgs.length - 1);
    }
  } else {
    if (horizontal) {
      totalW = imgs.reduce((s, i) => s + i.naturalWidth, 0) + spacing * (imgs.length - 1);
      totalH = Math.max(...imgs.map(i => i.naturalHeight));
    } else {
      totalW = Math.max(...imgs.map(i => i.naturalWidth));
      totalH = imgs.reduce((s, i) => s + i.naturalHeight, 0) + spacing * (imgs.length - 1);
    }
  }

  canvas.width = totalW;
  canvas.height = totalH;
  ctx.fillStyle = bgColor;
  ctx.fillRect(0, 0, totalW, totalH);

  let offset = 0;
  for (const img of imgs) {
    let drawW, drawH;
    if (resizeMode === 'fit') {
      if (horizontal) {
        drawH = totalH;
        drawW = Math.round(img.naturalWidth * (totalH / img.naturalHeight));
      } else {
        drawW = totalW;
        drawH = Math.round(img.naturalHeight * (totalW / img.naturalWidth));
      }
    } else {
      drawW = img.naturalWidth;
      drawH = img.naturalHeight;
    }

    if (horizontal) {
      ctx.drawImage(img, offset, 0, drawW, drawH);
      offset += drawW + spacing;
    } else {
      ctx.drawImage(img, 0, offset, drawW, drawH);
      offset += drawH + spacing;
    }
  }

  const mimeType = format === 'jpg' ? 'image/jpeg' : 'image/png';
  const quality = format === 'jpg' ? 0.92 : undefined;
  const url = canvas.toDataURL(mimeType, quality);
  const result = $('#result');
  result.src = url;
  result.hidden = false;

  canvas.toBlob((blob) => {
    const sizeKB = (blob.size / 1024).toFixed(1);
    $('#status').innerHTML = `<span style="color:var(--gz-success)">${t('done')}${totalW}×${totalH} (${sizeKB} KB)</span>`;
  }, mimeType, quality);
}

function download() {
  const result = $('#result');
  if (!result.src) return;
  const format = document.getElementById('formatSelect').value;
  const a = document.createElement('a');
  a.href = result.src;
  a.download = `stitched-image.${format}`;
  a.click();
}

function clearAll() {
  images.forEach(i => URL.revokeObjectURL(i.url));
  images = [];
  $('#result').hidden = true;
  $('#status').textContent = '';
  renderThumbs();
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="$('#fileInput').click()">${t('addImages')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="clearAll()">${t('clearAll')}</button>`;

$('#controls').innerHTML = `
  <label>${t('direction')}: <select id="dirSelect"><option value="h">${t('horizontal')}</option><option value="v">${t('vertical')}</option></select></label>
  <label>${t('spacing')}: <input type="number" id="spacingInput" value="0" min="0" max="200">${t('px')}</label>
  <label>${t('bgColor')}: <input type="color" id="bgColor" value="#000000"></label>
  <label>${t('format')}: <select id="formatSelect"><option value="png">PNG</option><option value="jpg">JPG</option></select></label>
  <label>${t('resize')}: <select id="resizeMode"><option value="none">${t('resizeNone')}</option><option value="fit">${t('resizeFit')}</option></select></label>
  <button class="gz-btn" onclick="stitchImages()">${t('stitch')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="download()">${t('download')}</button>`;

renderThumbs();

GZ.renderToolPage({
  category: 'image',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🖼️', href:'/image/photo-collage.html', name:'Photo Collage'},
    {icon:'✂️', href:'/image/image-splitter.html', name:'Image Splitter'},
    {icon:'📐', href:'/image/resizer.html', name:'Image Resizer'},
    {icon:'🔄', href:'/image/rotator.html', name:'Image Rotator'},
  ]
});
</script>
