<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is a real hourly wage?", "acceptedAnswer": {"@type": "Answer", "text": "Your real hourly wage is what you actually earn per hour of your life devoted to work, after subtracting taxes, commute time, work-related expenses and the unpaid hours your job demands. It is usually much lower than salary divided by 40 hours."}}, {"@type": "Question", "name": "How is real hourly wage calculated?", "acceptedAnswer": {"@type": "Answer", "text": "Start with your gross annual salary, subtract income tax and job-related expenses (commute, work clothes, childcare, meals bought at work) to get your net earnings. Then divide by the total hours you spend on work each year, including commute and decompression time. The result is your true hourly rate."}}, {"@type": "Question", "name": "Why is my real wage lower than my official hourly rate?", "acceptedAnswer": {"@type": "Answer", "text": "Taxes take a chunk off the top, unpaid commute time inflates your real hours, and job expenses (gas, transit, professional clothing, bought lunches, childcare) reduce your take-home. Many people find their real wage is 30-50% lower than the headline number."}}, {"@type": "Question", "name": "How can I use my real hourly wage?", "acceptedAnswer": {"@type": "Answer", "text": "Compare job offers on equal footing, decide whether a side hustle or overtime is worth it, and judge purchases in hours of your life rather than dollars. If your real wage is $18/hour, a $540 purchase costs you 30 hours of work — which reframes whether it is worth it."}}]}</script>

<script>
GZI18n.register({
  en: {
    toolTitle: 'Real Hourly Wage Calculator',
    toolDesc: 'Find your true hourly rate. Enter your salary, then subtract taxes, commute time and job-related expenses to see what your job really pays per hour of your life.',
    job: 'Income & Time', result: 'Your Real Wage',
    salary: 'Annual salary ($)', workHours: 'Work hours per week', tax: 'Effective tax rate (%)',
    secTime: 'Time the job really takes', commuteH: 'Commute hours per day (round trip)', commuteDays: 'Commute days per week',
    extraH: 'Extra unpaid hours/week (prep, decompression, emails)',
    secCosts: 'Job-related costs (per month)',
    commuteCost: 'Commute cost (gas, transit, parking)', clothes: 'Work clothes & grooming', meals: 'Meals & coffee bought at work', childcare: 'Childcare needed for work', otherCost: 'Other work expenses',
    real: 'Your real hourly wage', vsNominal: 'vs nominal rate', keep: 'Net of gross', nominal: 'Nominal rate', netYearly: 'Net yearly', totalHours: 'Total hours/year', expenses: 'Yearly work costs',
    example: '🧪 Example', reset: '🔄 Reset', copy: '📋 Copy',
    hintWorkHours: 'Official paid hours per week (typically 40).',
    hintTax: 'Federal + state + payroll taxes. US average is ~22-30%.',
    hintCommuteH: 'Total round-trip commute time, both ways.',
    hintExtraH: 'Time spent preparing, answering emails, or unwinding because of work.',
    hintCommuteCost: 'Fuel, transit passes, parking, tolls — monthly total.',
    note: '💡 Think in hours, not dollars: a purchase worth $540 costs you $540 ÷ real wage hours of your life.',
    step1: 'Enter your annual salary, weekly work hours and effective tax rate',
    step2: 'Add commute time and any unpaid hours your job demands each week',
    step3: 'List monthly job-related costs: commute, clothes, meals, childcare and other',
    step4: 'Read your real hourly wage and compare it to your headline rate',
  },
  zh: {
    toolTitle: '真实时薪计算器',
    toolDesc: '计算你的真实时薪。输入年薪，扣除税费、通勤时间和工作相关支出，查看这份工作每小时的真正报酬。',
    job: '收入与时间', result: '你的真实时薪',
    salary: '年薪 (¥)', workHours: '每周工作小时', tax: '综合税率 (%)',
    secTime: '工作实际占用的时间', commuteH: '每日通勤时间（往返，小时）', commuteDays: '每周通勤天数',
    extraH: '每周额外无薪时间（准备、收尾、回邮件）',
    secCosts: '工作相关支出（每月）',
    commuteCost: '通勤费用（油费、车费、停车）', clothes: '职业着装与形象', meals: '工作餐与咖啡', childcare: '因工作需要的育儿费', otherCost: '其他工作支出',
    real: '你的真实时薪', vsNominal: '对比名义时薪', keep: '净收入占比', nominal: '名义时薪', netYearly: '净年收入', totalHours: '每年总小时', expenses: '年度工作成本',
    example: '🧪 示例', reset: '🔄 重置', copy: '📋 复制',
    hintWorkHours: '每周正式带薪工时（通常为 40）。',
    hintTax: '个税 + 社保 + 公积金等综合税率。',
    hintCommuteH: '往返通勤总时长（单程来回）。',
    hintExtraH: '为工作准备、回复邮件或下班后调整所花的时间。',
    hintCommuteCost: '油费、公交、停车费、过路费等每月总计。',
    note: '💡 用小时而非金钱思考：540 元的购物 = 540 ÷ 真实时薪 = 你生命中的若干小时。',
    step1: '输入年薪、每周工时和综合税率',
    step2: '添加通勤时间和工作每周占用的无薪时间',
    step3: '列出每月工作相关支出：通勤、着装、餐费、育儿等',
    step4: '查看你的真实时薪并与名义时薪对比',
  }
});

const { $, copyText, t } = GZ;
const isZh = GZI18n.getLang() === 'zh';

// Bind labels
const bind = (id, key) => { const el = $('#' + id); if (el) el.textContent = t(key); };
bind('lblJob','job'); bind('lblResult','result');
bind('lblSalary','salary'); bind('lblWorkHours','workHours'); bind('lblTax','tax');
bind('secTime','secTime'); bind('lblCommuteH','commuteH'); bind('lblCommuteDays','commuteDays'); bind('lblExtraH','extraH');
bind('secCosts','secCosts'); bind('lblCommuteCost','commuteCost'); bind('lblClothes','clothes'); bind('lblMeals','meals'); bind('lblChildcare','childcare'); bind('lblOtherCost','otherCost');
bind('lblReal','real'); bind('lblKeep','keep');
$('#hintWorkHours').textContent = t('hintWorkHours');
$('#hintTax').textContent = t('hintTax');
$('#hintCommuteH').textContent = t('hintCommuteH');
$('#hintExtraH').textContent = t('hintExtraH');
$('#hintCommuteCost').textContent = t('hintCommuteCost');
$('#note').textContent = t('note');

function fmt(n) {
  const sign = isZh ? '¥' : '$';
  return sign + (n || 0).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}
function fmt0(n) {
  const sign = isZh ? '¥' : '$';
  return sign + Math.round(n || 0).toLocaleString();
}

function calc() {
  const salary = +$('#salary').value || 0;
  const workHours = +$('#workHours').value || 0;
  const taxRate = (+$('#tax').value || 0) / 100;
  const commuteH = +$('#commuteH').value || 0;
  const commuteDays = +$('#commuteDays').value || 0;
  const extraH = +$('#extraH').value || 0;
  const monthlyCosts = (+$('#commuteCost').value || 0) + (+$('#clothes').value || 0) + (+$('#meals').value || 0) + (+$('#childcare').value || 0) + (+$('#otherCost').value || 0);
  const yearlyCosts = monthlyCosts * 12;

  const taxPaid = salary * taxRate;
  const netYearly = salary - taxPaid - yearlyCosts;
  const totalWeeklyHours = workHours + (commuteH * commuteDays) + extraH;
  const totalYearlyHours = totalWeeklyHours * 52;
  const nominalHours = workHours * 52;
  const realWage = totalYearlyHours > 0 ? netYearly / totalYearlyHours : 0;
  const nominalWage = nominalHours > 0 ? salary / nominalHours : 0;
  const keepPct = salary > 0 ? (netYearly / salary) * 100 : 0;

  $('#realWage').textContent = fmt(realWage) + (isZh ? '/时' : '/hr');
  $('#vsNominal').textContent = `${t('vsNominal')}: ${fmt(nominalWage)}${isZh ? '/时' : '/hr'}`;

  $('#breakdown').innerHTML = `
    <div class="rw-compare-row"><span class="k">${t('nominal')}</span><span class="v">${fmt(nominalWage)}</span></div>
    <div class="rw-compare-row negative"><span class="k">${isZh ? '税费' : 'Tax'} (${Math.round(taxRate*100)}%)</span><span class="v">-${fmt0(taxPaid)}</span></div>
    <div class="rw-compare-row negative"><span class="k">${t('expenses')}</span><span class="v">-${fmt0(yearlyCosts)}</span></div>
    <div class="rw-compare-row"><span class="k">${t('netYearly')}</span><span class="v">${fmt0(netYearly)}</span></div>
    <div class="rw-compare-row"><span class="k">${t('totalHours')}</span><span class="v">${Math.round(totalYearlyHours).toLocaleString()}</span></div>`;

  $('#keepPct').textContent = keepPct.toFixed(0) + '%';
  $('#keepBar').style.width = Math.max(0, Math.min(100, keepPct)) + '%';

  window._summary = `${t('real')}: ${fmt(realWage)} | ${t('nominal')}: ${fmt(nominalWage)} | ${t('keep')}: ${keepPct.toFixed(0)}%`;
}

function loadExample() {
  $('#salary').value = 85000; $('#workHours').value = 45; $('#tax').value = 26;
  $('#commuteH').value = 1.5; $('#commuteDays').value = 5; $('#extraH').value = 5;
  $('#commuteCost').value = 280; $('#clothes').value = 80; $('#meals').value = 200; $('#childcare').value = 0; $('#otherCost').value = 0;
  calc();
}
window.loadExample = loadExample;

function doReset() {
  $('#salary').value = 75000; $('#workHours').value = 40; $('#tax').value = 25;
  $('#commuteH').value = 1; $('#commuteDays').value = 5; $('#extraH').value = 3;
  $('#commuteCost').value = 200; $('#clothes').value = 60; $('#meals').value = 150; $('#childcare').value = 0; $('#otherCost').value = 0;
  calc();
}
window.doReset = doReset;

['salary','workHours','tax','commuteH','commuteDays','extraH','commuteCost','clothes','meals','childcare','otherCost'].forEach(id => {
  $('#' + id).addEventListener('input', calc);
});

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doReset()">${t('reset')}</button>
  <button class="gz-btn" onclick="copyText(window._summary)">${t('copy')}</button>`;

calc();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'💼', href:'/calc/freelancer-rate.html', name:'Freelancer Rate'},
    {icon:'💵', href:'/calc/paycheck-calculator.html', name:'Paycheck'},
    {icon:'🕒', href:'/calc/timesheet-calculator.html', name:'Timesheet'},
    {icon:'💬', href:'/calc/meeting-cost-calculator.html', name:'Meeting Cost'},
  ]
});
</script>
