<script>
GZI18n.register({
  en: {
    toolTitle: 'Domain Age Checker',
    toolDesc: 'Find out exactly how old any domain is — years, months, days since registration. Powered by RDAP. Free, instant, browser-based.',
    check: 'Check Age',
    checking: 'Querying RDAP...',
    years: 'years',
    months: 'months',
    days: 'days',
    error: 'Lookup Failed',
    notFound: 'Domain not registered or creation date unavailable',
    created: 'Registered On',
    updated: 'Last Updated',
    expires: 'Expires On',
    countdown: 'Days Until Expiry',
    registrar: 'Registrar',
    note: 'Domain age is read from the official RDAP (modern WHOIS) record. Some ccTLDs do not expose a creation date. Older domains can signal trust and stability but are not a guaranteed SEO ranking factor.',
    step1: 'Enter a domain name (e.g., example.com)',
    step2: 'Click "Check Age" to query the official RDAP service',
    step3: 'See the domain age in years, months and days',
    step4: 'Check the registration date and expiry countdown',
  },
  zh: {
    toolTitle: '域名年龄查询器',
    toolDesc: '精确查询任意域名的注册年龄 — 年、月、天。基于 RDAP 官方协议。免费、即时、浏览器本地运行。',
    check: '查询年龄',
    checking: '正在查询 RDAP...',
    years: '年',
    months: '月',
    days: '天',
    error: '查询失败',
    notFound: '域名未注册或无法获取创建日期',
    created: '注册日期',
    updated: '最后更新',
    expires: '到期日期',
    countdown: '距到期天数',
    registrar: '注册商',
    note: '域名年龄来自官方 RDAP（新版 WHOIS）记录。部分国家顶级域不公开创建日期。域名年龄可作为信任和稳定性的参考，但并非 SEO 排名的绝对因素。',
    step1: '输入域名（如 example.com）',
    step2: '点击「查询年龄」访问官方 RDAP 服务',
    step3: '查看域名的年、月、天年龄',
    step4: '查看注册日期和到期倒计时',
  }
});

const { $, t } = GZ;

function parseDomain(input) {
  let d = (input || '').trim().toLowerCase();
  d = d.replace(/^https?:\/\//, '').replace(/^www\./, '').replace(/\/.*$/, '').split(':')[0];
  return d;
}

function fmtDate(iso) {
  if (!iso) return '—';
  try {
    return new Date(iso).toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' });
  } catch { return iso; }
}

function diffParts(from, to) {
  let a = new Date(from), b = to ? new Date(to) : new Date();
  if (isNaN(a)) return null;
  let years = b.getFullYear() - a.getFullYear();
  let months = b.getMonth() - a.getMonth();
  let days = b.getDate() - a.getDate();
  if (days < 0) { months--; days += 30; }
  if (months < 0) { years--; months += 12; }
  if (years < 0) return null;
  return { years, months, days };
}

async function check() {
  const domain = parseDomain($('#domain').value);
  if (!domain || !domain.includes('.')) return;

  $('#result').innerHTML = `<div class="da-card" style="text-align:center;padding:30px"><div style="color:var(--text2)">${t('checking')}</div></div>`;

  try {
    const resp = await fetch('https://rdap.org/domain/' + encodeURIComponent(domain), {
      headers: { 'Accept': 'application/rdap+json' },
      redirect: 'follow',
      signal: AbortSignal.timeout(15000)
    });
    if (resp.status === 404) { renderNotFound(domain); return; }
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const data = await resp.json();
    renderFound(domain, data);
  } catch (e) {
    renderError(domain, e);
  }
}

function pickEvent(data, action) {
  const ev = (data.events || []).filter(e => e.eventAction === action);
  return ev.length ? ev[0].eventDate : null;
}

function entityName(entities, role) {
  const ent = (entities || []).find(e => (e.roles || []).includes(role));
  if (!ent) return null;
  if (ent.vcardArray && Array.isArray(ent.vcardArray[1])) {
    const fn = ent.vcardArray[1].find(v => v[0] === 'fn');
    if (fn && fn[3]) return fn[3];
  }
  return ent.handle || null;
}

function renderFound(domain, data) {
  const created = pickEvent(data, 'registration');
  const updated = pickEvent(data, 'last changed');
  const expires = pickEvent(data, 'expiration');
  const registrar = entityName(data.entities, 'registrar');

  if (!created) { renderNotFound(domain); return; }

  const diff = diffParts(created);
  const expDiff = expires ? diffParts(expires) : null;
  const daysToExpiry = expires ? Math.round((new Date(expires) - new Date()) / 86400000) : null;

  $('#result').innerHTML = `
    <div class="da-card">
      <div class="da-big">${diff.years}<span class="unit">${t('years')}</span> ${diff.months}<span class="unit">${t('months')}</span> ${diff.days}<span class="unit">${t('days')}</span></div>
      <div class="da-big-sub">${domain}</div>
      <div class="da-grid">
        <div class="da-metric"><div class="lbl">${t('years')}</div><div class="val">${diff.years}</div></div>
        <div class="da-metric"><div class="lbl">${t('months')}</div><div class="val">${diff.years * 12 + diff.months}</div></div>
        <div class="da-metric"><div class="lbl">${t('days')}</div><div class="val">${Math.floor((new Date() - new Date(created)) / 86400000)}</div></div>
      </div>
      <div class="da-detail">
        <div class="row"><span class="k">${t('created')}</span><span class="v">${fmtDate(created)}</span></div>
        <div class="row"><span class="k">${t('updated')}</span><span class="v">${fmtDate(updated)}</span></div>
        <div class="row"><span class="k">${t('expires')}</span><span class="v">${fmtDate(expires)}</span></div>
        <div class="row"><span class="k">${t('registrar')}</span><span class="v">${registrar || '—'}</span></div>
        ${daysToExpiry !== null ? `<div class="row"><span class="k">${t('countdown')}</span><span class="v" style="color:${daysToExpiry < 30 ? '#e94560' : 'var(--accent)'}">${daysToExpiry}</span></div>` : ''}
      </div>
      <div class="da-note">${t('note')}</div>
    </div>`;
}

function renderNotFound(domain) {
  $('#result').innerHTML = `
    <div class="da-card" style="text-align:center">
      <div style="font-size:1.2rem;font-weight:700;color:#e94560;margin-bottom:8px">${t('notFound')}</div>
      <div style="color:var(--text2);margin-bottom:12px">${domain}</div>
      <div class="da-note">${t('note')}</div>
    </div>`;
}

function renderError(domain, err) {
  $('#result').innerHTML = `
    <div class="da-card">
      <div style="font-size:1.2rem;font-weight:700;color:#e94560;margin-bottom:12px">${t('error')}</div>
      <div style="font-size:.85rem;color:var(--text2);margin-bottom:12px">${(err.message || String(err)).substring(0, 120)}</div>
      <div class="da-note">${t('note')}</div>
    </div>`;
}

function loadExample() {
  $('#domain').value = 'google.com';
  check();
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="check()">${t('check')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">Google.com</button>`;

$('#domain').addEventListener('keydown', e => { if (e.key === 'Enter') check(); });

GZ.renderToolPage({
  category: 'network',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🔍', href:'/network/whois-lookup.html', name:'WHOIS Lookup'},
    {icon:'🔒', href:'/network/ssl-certificate-checker.html', name:'SSL Checker'},
    {icon:'🌐', href:'/network/dns-lookup.html', name:'DNS Lookup'},
    {icon:'📊', href:'/network/website-status-checker.html', name:'Website Status'},
  ]
});
</script>
