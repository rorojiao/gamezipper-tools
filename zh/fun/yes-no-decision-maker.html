.yn-btn-primary:hover{opacity:.88}

.yn-history{margin-top:18px;font-size:.82em;color:var(--text2);line-height:1.8}

</style>

<div class="gz-container">

      <button data-mode="yn" class="active">Yes / No</button>
      <button data-mode="8ball">Magic 8-Ball</button>
      <button data-mode="custom">Custom</button>
    </div>
    <textarea id="custom" style="display:none;width:100%;max-width:480px;margin:0 auto 14px;padding:10px;border:1px solid var(--border);border-radius:10px;background:var(--glass2);color:var(--text);min-height:90px" placeholder=""></textarea>

        <div class="yn-triangle"><div class="yn-answer" id="answer">?</div></div>
      </div>

    <div class="yn-actions">

      <button class="yn-btn yn-btn-secondary" id="btnReset"></button>
    </div>

  </div>

</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Yes or No Decision Maker',
    toolDesc: 'Get an instant unbiased answer to any yes/no question. Includes Magic 8-Ball mode and customizable answer sets. Quick decisions for any dilemma.',
    qPlaceholder: 'Type your question (optional)…',
    customPlaceholder: 'Custom answers — one per line\nMaybe\nDefinitely\nAsk tomorrow',
    btnAsk: '🔮 Ask',
    btnReset: 'Reset',
    answerYes: 'YES',
    answerNo: 'NO',
    history: 'History',
    statYes: 'Yes: {n}',
    statNo: 'No: {n}',
    statTotal: 'Total: {n}',
    step1: 'Type your question (optional)',
    step2: 'Pick a mode — Yes/No, Magic 8-Ball or Custom',
    step3: 'Click the orb or the Ask button to draw',
    step4: 'Check the history and stats below to review past answers',
    _8ball: ['It is certain','It is decidedly so','Without a doubt','Yes definitely','You may rely on it','As I see it, yes','Most likely','Outlook good','Yes','Signs point to yes','Reply hazy try again','Ask again later','Better not tell you now','Cannot predict now','Concentrate and ask again',"Don't count on it",'My reply is no','My sources say no','Outlook not so good','Very doubtful'],
  },
  zh: {
    toolTitle: '是 / 否 决策器',
    toolDesc: '为任何是非问题立即给出无偏答案。包含魔法 8 号球模式和自定义答案集，助你快速决策。',
    qPlaceholder: '输入你的问题（可选）…',
    customPlaceholder: '自定义答案 — 每行一个\n也许\n一定\n明天再说',
    btnAsk: '🔮 抽取答案',
    btnReset: '重置',
    answerYes: '是',
    answerNo: '否',
    history: '历史记录',
    statYes: '是：{n}',
    statNo: '否：{n}',
    statTotal: '总计：{n}',
    step1: '输入你的问题（可选）',
    step2: '选择模式 — 是/否、魔法 8 号球或自定义',
    step3: '点击球体或「抽取答案」按钮',
    step4: '查看下方的统计和历史记录',
    _8ball: ['必定如此','完全可以','毫无疑问','是的，毫无疑问','放心吧','在我看来是的','很可能','前景看好','是','迹象表明是','答案模糊，再试一次','稍后再问','现在不便透露','目前无法预测','集中精神再问','别指望','我的回答是否','我的消息来源说否','前景不乐观','非常可疑'],
  }
});

const { $, t } = GZ;
let mode='yn';
let yes=0, no=0, history=[];

function cryptoRand(max){
  if(window.crypto && crypto.getRandomValues){
    const buf=new Uint32Array(1); crypto.getRandomValues(buf);
    return buf[0]/4294967296*max;
  }
  return Math.random()*max;
}

function answerText(){
  if(mode==='yn'){
    return Math.floor(cryptoRand(2))===0 ? t('answerYes') : t('answerNo');
  }
  if(mode==='8ball'){
    const arr=t('_8ball');
    return arr[Math.floor(cryptoRand(arr.length))];
  }
  // custom
  const list=$('#custom').value.split(/\n+/).map(s=>s.trim()).filter(s=>s);
  if(list.length===0) return '—';
  return list[Math.floor(cryptoRand(list.length))];
}

function ask(){
  const ans = answerText();
  if(ans==='—'){
    $('#answer').textContent='—';
    return;
  }
  $('#answer').textContent='';
  $('#orb').classList.remove('shake');
  void $('#orb').offsetWidth;
  $('#orb').classList.add('shake');
  setTimeout(()=>{ $('#answer').textContent=ans; }, 280);
  history.unshift({q:$('#q').value.trim(), a:ans, ts:new Date().toLocaleTimeString()});
  if(history.length>20) history.pop();
  // Stats only for yn mode
  if(mode==='yn'){
    if(ans===t('answerYes')) yes++; else no++;
    $('#stats').innerHTML = `
      <span class="yn-pill">${t('statYes').replace('{n}',yes)}</span>
      <span class="yn-pill">${t('statNo').replace('{n}',no)}</span>
      <span class="yn-pill">${t('statTotal').replace('{n}',yes+no)}</span>`;
  } else {
    $('#stats').innerHTML = `<span class="yn-pill">${t('statTotal').replace('{n}',history.length)}</span>`;
  }
  renderHistory();
}

function renderHistory(){
  if(history.length===0){ $('#history').innerHTML=''; return; }
  $('#history').innerHTML = `<b>${t('history')}:</b><br>`+history.slice(0,8).map(h=>`
    <div>${h.ts} — <span class="q">${escapeHtml(h.q||'—')}</span> → <b>${escapeHtml(h.a)}</b></div>`).join('');
}

function escapeHtml(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

function setMode(m){
  mode=m;
  document.querySelectorAll('.yn-mode button').forEach(b=>b.classList.toggle('active', b.dataset.mode===m));
  $('#custom').style.display = m==='custom'?'block':'none';
}

document.querySelectorAll('.yn-mode button').forEach(b=>b.addEventListener('click',()=>setMode(b.dataset.mode)));
$('#stage').addEventListener('click',ask);
$('#btnAsk').addEventListener('click',ask);
$('#btnReset').addEventListener('click',()=>{
  yes=0; no=0; history=[]; $('#q').value=''; $('#answer').textContent='?';
  $('#stats').innerHTML=''; $('#history').innerHTML='';
});

$('#q').placeholder=t('qPlaceholder');
$('#custom').placeholder=t('customPlaceholder');
$('#btnAsk').textContent=t('btnAsk');
$('#btnReset').textContent=t('btnReset');

GZ.renderToolPage({
  category: 'fun',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🎲', href:'/fun/dice-roller.html', name:'Dice Roller'},
    {icon:'🪙', href:'/fun/coin-flip-stats.html', name:'Coin Flip Stats'},
    {icon:'🎡', href:'/fun/wheel-of-names.html', name:'Wheel of Names'},
    {icon:'🥇', href:'/fun/random-name-picker.html', name:'Random Name Picker'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
