function generate(text) {
  const font = $('#fontSelect').value;
  const chars = FONTS[font] || FONTS.standard;
  const lines = text.toUpperCase().split('');
  if (!lines.length) { $('#output').textContent = ''; return; }
  const height = chars['A'] ? chars['A'].length : 5;
  const rows = [];
  for (let i = 0; i < height; i++) rows.push([]);
  for (const ch of lines) {
    const glyph = chars[ch] || chars['?'] || Array(height).fill('     ');
    for (let i = 0; i < height; i++) {
      rows[i].push(glyph[i] || '     ');
    }
  }
  let result = rows.map(r => r.join(' ')).join('\n');
  // Truncate lines wider than maxWidth
  const mw = parseInt($('#maxWidth').value) || 80;
  result = result.split('\n').map(l => l.length > mw ? l.substring(0, mw) + '...' : l).join('\n');
  $('#output').textContent = result;
}
