    toolDesc: '为网站、YouTube、Facebook 和 Twitter/X 制作自定义横幅。添加文字，选择颜色和渐变 — 即时下载 PNG。免费、无水印、无需注册。',
    download: '下载 PNG',

    lblGradient: '背景样式', lblColor1: '颜色 1', lblColor2: '颜色 2',
    lblTextColor: '文字颜色', lblAlign: '文字对齐',
    step1: '选择横幅尺寸或使用自定义尺寸',
    step2: '输入横幅主标题和可选副标题',
    step3: '选择渐变或纯色背景及文字颜色',
    step4: '点击「下载 PNG」保存横幅',
  }
});

const { $, t } = GZ;

function wrapLines(ctx,text,maxW){
  const words=text.split(' ');let line='';const lines=[];
  for(const w of words){const test=line?line+' '+w:w;if(ctx.measureText(test).width>maxW&&line){lines.push(line);line=w}else line=test}
  if(line)lines.push(line);
  return lines;
}

function render(){
  const c=$('#canvas'),ctx=c.getContext('2d');
  const [w,h]=$('#size').value.split('x').map(Number);
  c.width=w;c.height=h;
  const W=c.width,H=c.height;
  const gradType=$('#gradType').value;
  const c1=$('#color1').value,c2=$('#color2').value;
  const text=$('#bannerText').value||'Banner';
  const sub=$('#subText').value;
  const tc=$('#textColor').value;
  const align=$('#align').value;

  // Background
  if(gradType==='solid'){
    ctx.fillStyle=c1;
  } else {
    let grad;
    if(gradType==='diagonal')grad=ctx.createLinearGradient(0,0,W,H);
    else grad=ctx.createLinearGradient(0,0,W,0);
    grad.addColorStop(0,c1);grad.addColorStop(1,c2);
    ctx.fillStyle=grad;
  }
  ctx.fillRect(0,0,W,H);

  // Subtle pattern overlay
  ctx.fillStyle='rgba(255,255,255,0.04)';
  for(let i=0;i<W+H;i+=60){
    ctx.beginPath();ctx.arc(i%H*1.5,i,2,0,Math.PI*2);ctx.fill();
  }

  ctx.textAlign=align;
  const tx=align==='left'?W*0.08:align==='right'?W*0.92:W/2;
  ctx.textBaseline='middle';

  // Title
  ctx.fillStyle=tc;
  let fs=Math.min(H*0.22,72);
  ctx.font=`900 ${fs}px Arial Black, sans-serif`;
  const maxW=W*0.84;
  while(ctx.measureText(text).width>maxW&&fs>16){fs-=2;ctx.font=`900 ${fs}px Arial Black, sans-serif`}
  const titleLines=wrapLines(ctx,text,maxW);
  const cy=sub?H/2-20:H/2;
  titleLines.forEach((ln,i)=>{
    ctx.fillText(ln,tx,cy-(titleLines.length-1)*fs*0.55+i*fs*1.1);
  });

  // Subtitle
  if(sub){
    ctx.font=`300 ${Math.min(H*0.09,28)}px Verdana, sans-serif`;
    ctx.globalAlpha=0.85;
    const subLines=wrapLines(ctx,sub,maxW);
    subLines.forEach((ln,i)=>{
      ctx.fillText(ln,tx,H/2+fs*0.7+i*32);
    });
    ctx.globalAlpha=1;
  }
}

function downloadPNG(){
  const link=document.createElement('a');
  const name=($('#bannerText').value||'banner').replace(/[^a-zA-Z0-9]/g,'_').toLowerCase()||'banner';
  link.download=name+'-banner.png';
  link.href=$('#canvas').toDataURL('image/png');
  link.click();
}

$('#lbl-text').textContent=t('lblText');
$('#lbl-sub').textContent=t('lblSub');
$('#lbl-size').textContent=t('lblSize');
$('#lbl-gradient').textContent=t('lblGradient');
$('#lbl-color1').textContent=t('lblColor1');
$('#lbl-color2').textContent=t('lblColor2');
$('#lbl-text-color').textContent=t('lblTextColor');
$('#lbl-align').textContent=t('lblAlign');

['bannerText','subText','color1','color2','textColor'].forEach(id=>$('#'+id).addEventListener('input',render));
['size','gradType','align'].forEach(id=>$('#'+id).addEventListener('change',render));

render();

$('#toolbar').innerHTML=`
  <button class="gz-btn" onclick="downloadPNG()">${t('download')}</button>`;
