  {id:'lenny', key:'catLenny'}, {id:'happy', key:'catHappy'}, {id:'sad', key:'catSad'},
  {id:'angry', key:'catAngry'}, {id:'love', key:'catLove'}, {id:'shrug', key:'catShrug'},
  {id:'table', key:'catTable'}, {id:'animals', key:'catAnimals'}, {id:'weapons', key:'catWeapons'},
  {id:'dance', key:'catDance'}, {id:'magic', key:'catMagic'}, {id:'misc', key:'catMisc'},
];

function allFaces() {
  const arr = [];
  for (const cat in FACES) for (const f of FACES[cat]) arr.push({f, cat});
  return arr;
}
const TOTAL = allFaces().length;

function render() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  let list;
  if (currentCat === 'all') list = allFaces();
  else list = (FACES[currentCat]||[]).map(f => ({f, cat: currentCat}));
  if (q) list = list.filter(({f, cat}) => f.toLowerCase().includes(q) || cat.includes(q) || (catLabels[cat]||'').toLowerCase().includes(q));
  document.getElementById('count').textContent = t('count').replace('{n}', list.length).replace('{total}', TOTAL);
  document.getElementById('grid').innerHTML = list.map(({f}, i) =>
    `<div class="lf-face" onclick="copyFace(this, ${JSON.stringify(JSON.stringify(f)).slice(1,-1).replace(/"/g,'&quot;')})"><div class="glyph">${escapeHtml(f)}</div><div class="copied">${t('copied')}</div></div>`
  ).join('') || `<div style="color:var(--text2);grid-column:1/-1;text-align:center;padding:30px">—</div>`;
}

const catLabels = {};
CATS.forEach(c => catLabels[c.id] = t(c.key));

document.getElementById('cats').innerHTML = CATS.map(c =>
  `<button class="lf-cat ${c.id==='all'?'active':''}" data-cat="${c.id}">${c.id==='all'?'🌐 ':''}${t(c.key)}</button>`
).join('');

document.getElementById('search').placeholder = t('searchPh');

document.querySelectorAll('.lf-cat').forEach(b => b.addEventListener('click', () => {
  document.querySelectorAll('.lf-cat').forEach(x => x.classList.remove('active'));
  b.classList.add('active');
  currentCat = b.dataset.cat;
  render();
}));
document.getElementById('search').addEventListener('input', render);

function copyFace(el, face) {
  GZ.copyText(face);
  document.querySelectorAll('.lf-face.copied').forEach(x => x.classList.remove('copied'));
  el.classList.add('copied');
  setTimeout(() => el.classList.remove('copied'), 900);
}
function escapeHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

render();
