const { $, t } = GZ;

function analyze(pw){
  const len = pw.length;
  const hasLower = /[a-z]/.test(pw);
  const hasUpper = /[A-Z]/.test(pw);
  const hasDigit = /\d/.test(pw);
  const hasSymbol = /[^a-zA-Z0-9]/.test(pw);
  let pool = 0;
  if(hasLower) pool += 26;
  if(hasUpper) pool += 26;
  if(hasDigit) pool += 10;
  if(hasSymbol) pool += 33;
  const classes = (hasLower?1:0)+(hasUpper?1:0)+(hasDigit?1:0)+(hasSymbol?1:0);
  const entropy = len>0 && pool>0 ? len * Math.log2(pool) : 0;
  return { len, pool, classes, entropy, hasLower, hasUpper, hasDigit, hasSymbol };
}

function fmtTime(seconds){
  if(!isFinite(seconds) || seconds>1e18) return '∞';
  if(seconds < 1e-6) return '< 1μs';
  if(seconds < 1) return (seconds*1000).toFixed(1)+'ms';
  if(seconds < 60) return seconds.toFixed(1)+'s';
  if(seconds < 3600) return (seconds/60).toFixed(1)+' min';
  if(seconds < 86400) return (seconds/3600).toFixed(1)+' hours';
  if(seconds < 2592000) return (seconds/86400).toFixed(1)+' days';
  if(seconds < 31536000) return (seconds/2592000).toFixed(1)+' months';
  const years = seconds/31536000;
  if(years < 1000) return years.toFixed(0)+' years';
  if(years < 1e6) return (years/1000).toFixed(1)+'K years';
  if(years < 1e9) return (years/1e6).toFixed(1)+'M years';
  if(years < 1e12) return (years/1e9).toFixed(1)+'B years';
  return '> 1T years';
}

function strengthLabel(bits){
  if(bits < 28) return ['veryWeak','#e74c3c'];
  if(bits < 36) return ['weak','#e67e22'];
  if(bits < 60) return ['fair','#f1c40f'];
  if(bits < 80) return ['strong','#2ecc71'];
  if(bits < 128) return ['veryStrong','#27ae60'];
  return ['excellent','#16a085'];
}

function update(){
  const pw = $('#input-pw').value;
  const r = analyze(pw);
  const [lblKey, color] = strengthLabel(r.entropy);
  const pct = Math.min(100, (r.entropy / 128) * 100);
  $('#bar').style.width = pct+'%';
  $('#bar').style.background = color;
  $('#lbl-str').textContent = t(lblKey);
  $('#lbl-str').style.background = color;
  $('#lbl-str').style.color = '#fff';
  $('#stats').innerHTML = `
    <div class="pw-card"><div class="label">${t('entropy')}</div><div class="value">${r.entropy.toFixed(1)}<span style="font-size:0.5em;color:var(--text2)"> bits</span></div></div>
    <div class="pw-card"><div class="label">${t('length')}</div><div class="value">${r.len}</div></div>
    <div class="pw-card"><div class="label">${t('pool')}</div><div class="value">${r.pool}</div></div>
    <div class="pw-card"><div class="label">${t('classes')}</div><div class="value">${r.classes}/4</div></div>
    <div class="pw-card"><div class="label">${t('onlineThrottled')}</div><div class="value" style="font-size:1em">${fmtTime(Math.pow(2,r.entropy)/10)}</div></div>
    <div class="pw-card"><div class="label">${t('onlineFast')}</div><div class="value" style="font-size:1em">${fmtTime(Math.pow(2,r.entropy)/1000)}</div></div>
    <div class="pw-card"><div class="label">${t('offlineSlow')}</div><div class="value" style="font-size:1em">${fmtTime(Math.pow(2,r.entropy)/1e4)}</div></div>
    <div class="pw-card"><div class="label">${t('offlineFast')}</div><div class="value" style="font-size:1em">${fmtTime(Math.pow(2,r.entropy)/1e10)}</div></div>`;
  const chips = [];
  if(r.hasLower) chips.push(`<span class="pw-chip"><span class="ch ch-lower">a</span> ${t('charLow')}</span>`);
  if(r.hasUpper) chips.push(`<span class="pw-chip"><span class="ch ch-upper">A</span> ${t('charUp')}</span>`);
  if(r.hasDigit) chips.push(`<span class="pw-chip"><span class="ch ch-digit">1</span> ${t('charDig')}</span>`);
  if(r.hasSymbol) chips.push(`<span class="pw-chip"><span class="ch ch-symbol">@</span> ${t('charSym')}</span>`);
  $('#chips').innerHTML = chips.length ? chips.join('') : '<span style="color:var(--text2);font-size:0.85em">—</span>';
  const sugs = [];
  if(r.len < 12) sugs.push(t('s1'));
  if(r.classes < 4) sugs.push(t('s2'));
  if(r.len > 0 && /^(password|qwerty|admin|123|letmein|welcome|monkey|dragon|master)/i.test(pw)) sugs.push(t('s3'));
  if(r.len < 16) sugs.push(t('s4'));
  sugs.push(t('s5'));
  $('#sugg').innerHTML = sugs.map(s=>'<li>'+s+'</li>').join('');
}

function genStrong(){
  const chars = 'abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*()_+-=[]{}|;:,.<>?';
  const arr = new Uint32Array(20);
  crypto.getRandomValues(arr);
  let pw = '';
  for(let i=0;i<20;i++) pw += chars[arr[i] % chars.length];
  $('#input-pw').value = pw;
  $('#input-pw').type = 'text';
  $('#show').checked = true;
  update();
}

$('#input-pw').addEventListener('input', update);
