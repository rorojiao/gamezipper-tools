.full{grid-column:1/-1}

.result-card{background:var(--glass2);border:1px solid var(--border);border-radius:12px;padding:16px;text-align:center}
.result-card .val{font-size:1.6em;font-weight:700;color:var(--accent)}
.result-card .lbl{font-size:.8em;color:var(--text2);margin-top:4px}
.result-card.highlight{border-color:var(--accent);background:rgba(78,205,196,.08)}
.result-card.highlight .val{font-size:2em}
.breakdown-table{width:100%;border-collapse:collapse;margin-top:20px;font-size:.9em}
.breakdown-table th,.breakdown-table td{text-align:left;padding:10px 12px;border-bottom:1px solid var(--border)}
.breakdown-table th{color:var(--text2);font-weight:600}

.breakdown-table tr.total td{font-size:1.1em;color:var(--accent);border-top:2px solid var(--accent)}

<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is the true cost of an employee?", "acceptedAnswer": {"@type": "Answer", "text": "The true cost typically ranges from 1.25x to 1.4x the base salary. This includes employer payroll taxes (FICA, FUTA, SUTA), health insurance, retirement contributions, paid time off, workers comp, and overhead."}}, {"@type": "Question", "name": "What payroll taxes do employers pay?", "acceptedAnswer": {"@type": "Answer", "text": "In the US, employers pay 7.65% FICA (Social Security + Medicare), 6% FUTA (on first $7,000), state unemployment (varies by state, typically 2-5%), and state-specific taxes."}}, {"@type": "Question", "name": "How much do benefits cost per employee?", "acceptedAnswer": {"@type": "Answer", "text": "Benefits typically cost 20-40% of salary. Health insurance averages $7,000-$15,000/year per employee. 401(k) match is commonly 3-6% of salary. Add PTO, life insurance, and other perks."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-form" id="form"></div>
    <div id="result"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>

</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Employee Cost Calculator',
    toolDesc: 'Calculate the true cost of an employee including salary, taxes, benefits, insurance and overhead. Full employer cost breakdown.',
    calculate: '💼 Calculate',
    baseSalary: 'Annual Base Salary ($)',
    payFrequency: 'Pay Frequency',
    annually: 'Annually',
    monthly: 'Monthly',
    hourly: 'Hourly Rate × Hours/Year',
    fica: 'FICA Tax (7.65%)',
    futa: 'FUTA Tax Rate (%)',
    suta: 'State Unemployment Rate (%)',
    healthIns: 'Health Insurance ($/year)',
    retirement: '401(k) Match (% of salary)',
    pto: 'Paid Time Off (days/year)',
    workersComp: 'Workers Comp (% of salary)',
    overhead: 'Office & Overhead (% of salary)',
    benefits: 'Other Benefits ($/year)',
    totalAnnual: 'Total Annual Cost',
    totalMonthly: 'Monthly Cost',
    costMultiplier: 'Cost Multiplier',
    salary: 'Base Salary',
    taxes: 'Payroll Taxes',
    insurance: 'Insurance & Benefits',
    overheadE: 'Overhead',
    total: 'Total',
    item: 'Item',
    amount: 'Amount ($)',
    step1: 'Enter the employee\'s base salary',
    step2: 'Adjust payroll tax rates for your state',
    step3: 'Add benefits costs (health insurance, 401k match)',
    step4: 'Click Calculate to see the full cost breakdown',
  },
  zh: {
    toolTitle: '员工成本计算器',
    toolDesc: '计算员工的真实成本，包含工资、税费、福利、保险和间接费用，提供完整的雇主成本明细。',
    calculate: '💼 计算',
    baseSalary: '年度基本薪资（$）',
    payFrequency: '薪资频率',
    annually: '年薪',
    monthly: '月薪',
    hourly: '时薪 × 年工时',
    fica: 'FICA 税率 (7.65%)',
    futa: 'FUTA 税率 (%)',
    suta: '州失业税率 (%)',
    healthIns: '健康保险（$/年）',
    retirement: '401(k) 匹配（% 薪资）',
    pto: '带薪假期（天/年）',
    workersComp: '工伤险（% 薪资）',
    overhead: '办公与间接费用（% 薪资）',
    benefits: '其他福利（$/年）',
    totalAnnual: '年度总成本',
    totalMonthly: '月度成本',
    costMultiplier: '成本倍数',
    salary: '基本薪资',
    taxes: '薪资税费',
    insurance: '保险与福利',
    overheadE: '间接费用',
    total: '合计',
    item: '项目',
    amount: '金额（$）',
    step1: '输入员工的基本薪资',
    step2: '根据你所在的州调整薪资税率',
    step3: '添加福利成本（健康保险、401k 匹配）',
    step4: '点击「计算」查看完整成本明细',
  }
});

const { $, t } = GZ;

$('#form').innerHTML = `
  <div class="full"><label>${t('baseSalary')}</label><input type="number" id="salary" value="75000" min="0" step="1000"></div>
  <div class="full"><label>${t('payFrequency')}</label><select id="freq"><option value="annual">${t('annually')}</option><option value="monthly">${t('monthly')}</option><option value="hourly">${t('hourly')}</option></select></div>
  <div><label>${t('fica')}</label><input type="number" id="fica" value="7.65" step="0.01" min="0" max="100"></div>
  <div><label>${t('futa')}</label><input type="number" id="futa" value="0.6" step="0.01" min="0" max="100"></div>
  <div><label>${t('suta')}</label><input type="number" id="suta" value="2.7" step="0.01" min="0" max="100"></div>
  <div><label>${t('healthIns')}</label><input type="number" id="health" value="8000" step="100" min="0"></div>
  <div><label>${t('retirement')}</label><input type="number" id="retire" value="4" step="0.5" min="0" max="100"></div>
  <div><label>${t('pto')}</label><input type="number" id="pto" value="15" step="1" min="0" max="365"></div>
  <div><label>${t('workersComp')}</label><input type="number" id="wc" value="1.5" step="0.1" min="0" max="100"></div>
  <div><label>${t('overhead')}</label><input type="number" id="overhead" value="15" step="1" min="0" max="100"></div>
  <div><label>${t('benefits')}</label><input type="number" id="other" value="2000" step="100" min="0"></div>
  <div class="full"><button class="gz-btn" onclick="calc()" style="font-size:1.1em;padding:12px;width:100%">${t('calculate')}</button></div>
`;

window.calc = function() {
  let salary = parseFloat($('#salary').value) || 0;
  const freq = $('#freq').value;
  if (freq === 'monthly') salary *= 12;
  if (freq === 'hourly') salary = salary * (parseFloat($('#salary').value) ? 2080 : 0);

  const fica = salary * (parseFloat($('#fica').value) || 0) / 100;
  const futa = Math.min(salary, 7000) * (parseFloat($('#futa').value) || 0) / 100;
  const suta = salary * (parseFloat($('#suta').value) || 0) / 100;
  const taxTotal = fica + futa + suta;

  const healthIns = parseFloat($('#health').value) || 0;
  const retireMatch = salary * (parseFloat($('#retire').value) || 0) / 100;
  const ptoCost = salary * (parseFloat($('#pto').value) || 0) / 260;
  const wcCost = salary * (parseFloat($('#wc').value) || 0) / 100;
  const otherBenefits = parseFloat($('#other').value) || 0;
  const benefitsTotal = healthIns + retireMatch + ptoCost + wcCost + otherBenefits;

  const overheadCost = salary * (parseFloat($('#overhead').value) || 0) / 100;

  const total = salary + taxTotal + benefitsTotal + overheadCost;
  const multiplier = salary > 0 ? (total / salary).toFixed(2) : '0';

  const fmt = n => '$' + n.toLocaleString('en-US', {minimumFractionDigits:0, maximumFractionDigits:0});

  $('#result').innerHTML = `
    <div class="result-grid">
      <div class="result-card highlight"><div class="val">${fmt(total)}</div><div class="lbl">${t('totalAnnual')}</div></div>
      <div class="result-card"><div class="val">${fmt(total/12)}</div><div class="lbl">${t('totalMonthly')}</div></div>
      <div class="result-card"><div class="val">${multiplier}×</div><div class="lbl">${t('costMultiplier')}</div></div>
      <div class="result-card"><div class="val">${fmt(salary)}</div><div class="lbl">${t('salary')}</div></div>
    </div>
    <table class="breakdown-table">
      <thead><tr><th>${t('item')}</th><th>${t('amount')}</th></tr></thead>
      <tbody>
        <tr><td>${t('salary')}</td><td>${fmt(salary)}</td></tr>
        <tr><td>FICA (SS + Medicare)</td><td>${fmt(fica)}</td></tr>
        <tr><td>FUTA</td><td>${fmt(futa)}</td></tr>
        <tr><td>${t('suta')}</td><td>${fmt(suta)}</td></tr>
        <tr><td>${t('healthIns')}</td><td>${fmt(healthIns)}</td></tr>
        <tr><td>401(k) Match</td><td>${fmt(retireMatch)}</td></tr>
        <tr><td>${t('pto')} (cost)</td><td>${fmt(ptoCost)}</td></tr>
        <tr><td>${t('workersComp')}</td><td>${fmt(wcCost)}</td></tr>
        <tr><td>${t('benefits')}</td><td>${fmt(otherBenefits)}</td></tr>
        <tr><td>${t('overheadE')}</td><td>${fmt(overheadCost)}</td></tr>
        <tr class="total"><td>${t('total')}</td><td>${fmt(total)}</td></tr>
      </tbody>
    </table>
  `;
};

$('#lbl-in')?.remove();
$('#lbl-out')?.remove();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {href:'/calc/salary-calculator.html',icon:'💼',name:'Salary Calculator'},
    {href:'/calc/freelancer-rate.html',icon:'🧑‍💻',name:'Freelancer Rate Calculator'},
    {href:'/calc/paypal-fee-calculator.html',icon:'💸',name:'PayPal Fee Calculator'},
    {href:'/calc/stripe-fee-calculator.html',icon:'💳',name:'Stripe Fee Calculator'},
  ]
});
</script>
</body>
</html>
