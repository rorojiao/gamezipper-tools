<script>
GZI18n.register({
  en: {
    toolTitle: 'LinkedIn Post Preview',
    toolDesc: 'Preview how your LinkedIn post will look in the feed. Pixel-accurate mock with avatar, headline, content, image and reactions. Free, browser-based, no signup.',
    lblName: 'Author name',
    lblHeadline: 'Headline (under the name)',
    lblBody: 'Post content',
    lblAvatar: 'Avatar image (optional)',
    lblPhoto: 'Post image (optional)',
    lblAvatarbg: 'Avatar color',
    lblLikes: 'Likes',
    lblComments: 'Comments',
    previewHeading: 'Live Preview',
    example: 'Example',
    clear: 'Clear',
    like: '👍 Like',
    comment: '💬 Comment',
    repost: '🔁 Repost',
    send: '✈️ Send',
    now: 'now',
    promote: 'Promote',
    seeMore: '…see more',
    bodyGood: '✓ Length is fine (LinkedIn shows full post)',
    bodyWarn: '⚠ Above 210 chars — feed will show "…see more"',
    step1: 'Fill in the author name, headline and post content',
    step2: 'Optionally upload an avatar and post image',
    step3: 'See the live LinkedIn feed preview on the right',
    step4: 'Tweak the hook (first 2 lines) to maximize scroll-stopping power',
  },
  zh: {
    toolTitle: 'LinkedIn 帖子预览',
    toolDesc: '预览 LinkedIn 帖子在信息流中的显示效果。像素级还原头像、姓名、职位、正文、图片和互动数据。免费、浏览器本地运行、无需注册。',
    lblName: '作者姓名',
    lblHeadline: '标题（姓名下方）',
    lblBody: '帖子正文',
    lblAvatar: '头像（可选）',
    lblPhoto: '帖子配图（可选）',
    lblAvatarbg: '头像底色',
    lblLikes: '点赞数',
    lblComments: '评论数',
    previewHeading: '实时预览',
    example: '示例',
    clear: '清除',
    like: '👍 赞',
    comment: '💬 评论',
    repost: '🔁 转发',
    send: '✈️ 私信',
    now: '刚刚',
    promote: '推广',
    seeMore: '…展开',
    bodyGood: '✓ 长度合适（LinkedIn 显示完整帖子）',
    bodyWarn: '⚠ 超过 210 字符 — 信息流将显示「…展开」',
    step1: '填写作者姓名、标题和正文内容',
    step2: '可选上传头像和帖子配图',
    step3: '右侧实时预览 LinkedIn 信息流效果',
    step4: '优化前两行钩子文案，提升停留率',
  }
});

const { $, t } = GZ;

let avatarUrl = null;
let photoUrl = null;

function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmtCount(n) {
  if (n >= 1000000) return (n/1000000).toFixed(1) + 'M';
  if (n >= 1000) return (n/1000).toFixed(1) + 'K';
  return String(n);
}

function render() {
  const name = $('#name').value.trim() || 'Your Name';
  const headline = $('#headline').value.trim() || 'Your headline · Company';
  const body = $('#body').value || '';
  const likes = parseInt($('#likes').value, 10) || 0;
  const comments = parseInt($('#comments').value, 10) || 0;
  const avatarBg = $('#avatarBg').value;
  const TRUNC = 210;

  // Counter
  const counter = $('#bodyCount');
  if (body.length > TRUNC) { counter.className = 'counter warn'; counter.textContent = `${body.length} chars — ${t('bodyWarn')}`; }
  else { counter.className = 'counter good'; counter.textContent = `${body.length} chars — ${t('bodyGood')}`; }

  let bodyHtml = esc(body);
  if (body.length > TRUNC) {
    bodyHtml = esc(body.slice(0, TRUNC)) + `<span class="see">${t('seeMore')}</span>`;
  }
  // linkify #hashtags and @mentions
  bodyHtml = bodyHtml.replace(/(^|\s)(#[\w\u0080-\uffff]+)/g, '$1<span class="see">$2</span>');
  bodyHtml = bodyHtml.replace(/(^|\s)(@[\w.\-]+)/g, '$1<span class="see">$2</span>');

  const initials = name.split(/\s+/).map(w => w[0] || '').slice(0,2).join('').toUpperCase() || 'U';
  const avatarHtml = avatarUrl
    ? `<img class="ava" src="${avatarUrl}" alt="">`
    : `<div class="ava placeholder" style="background:${avatarBg}">${esc(initials)}</div>`;
  const photoHtml = photoUrl
    ? `<img class="li-img" src="${photoUrl}" alt="">`
    : `<div class="li-img placeholder">📷 No image — your post will show as text only</div>`;

  // reaction pile
  const pileHtml = `<span class="pile">
    <span style="background:#0a66c2">👍</span>
    <span style="background:#df704d">❤</span>
    <span style="background:#f5bb54">💡</span>
  </span>`;

  $('#preview').innerHTML = `
    <div class="li-head">
      ${avatarHtml}
      <div class="meta">
        <div class="name">${esc(name)} <span class="verified" title="Verified">✓</span> <span style="font-size:12px;color:rgba(0,0,0,.6) font-weight:400">· 1st</span></div>
        <div class="headline">${esc(headline)}</div>
        <div class="time">${t('now')} · 🌐</div>
      </div>
      <div class="dots">⋯</div>
    </div>
    <div class="li-body">${bodyHtml || '<span style="color:#999">Your post content will appear here…</span>'}</div>
    ${photoHtml}
    <div class="li-reactions">${pileHtml} ${fmtCount(likes)} · ${fmtCount(comments)} comments</div>
    <div class="li-actions">
      <button>👍 <span>${t('like')}</span></button>
      <button>💬 <span>${t('comment')}</span></button>
      <button>🔁 <span>${t('repost')}</span></button>
      <button>✈️ <span>${t('send')}</span></button>
    </div>
  `;
}

['name','headline','body','likes','comments','avatarBg'].forEach(id => $('#' + id).addEventListener('input', render));

$('#avatar').addEventListener('change', e => {
  const f = e.target.files[0];
  if (avatarUrl) URL.revokeObjectURL(avatarUrl);
  avatarUrl = f ? URL.createObjectURL(f) : null;
  render();
});
$('#photo').addEventListener('change', e => {
  const f = e.target.files[0];
  if (photoUrl) URL.revokeObjectURL(photoUrl);
  photoUrl = f ? URL.createObjectURL(f) : null;
  render();
});

function loadExample() {
  $('#name').value = 'Sarah Chen';
  $('#headline').value = 'Product Marketing Lead at Northbeam · B2B SaaS';
  $('#body').value = 'Hot take: most B2B landing pages lose 80% of visitors in the first 5 seconds. 📉\n\nThe problem isn\'t your copy. It\'s that visitors can\'t answer one question fast enough:\n\n"What\'s in it for me?"\n\nFix it in three steps:\n1️⃣ Lead with the outcome, not the feature\n2️⃣ Show proof above the fold\n3️⃣ Cut every adjective that doesn\'t earn its keep\n\nWhat\'s the #1 thing that makes YOU bounce from a landing page?';
  $('#likes').value = 487;
  $('#comments').value = 73;
  render();
}

function clearAll() {
  ['name','headline','body'].forEach(id => $('#' + id).value = '');
  $('#likes').value = 0;
  $('#comments').value = 0;
  if (avatarUrl) { URL.revokeObjectURL(avatarUrl); avatarUrl = null; }
  if (photoUrl) { URL.revokeObjectURL(photoUrl); photoUrl = null; }
  $('#avatar').value = '';
  $('#photo').value = '';
  render();
}

$('#toolbar').innerHTML = `<button class="gz-btn" onclick="loadExample()">${t('example')}</button><button class="gz-btn gz-btn-secondary" onclick="clearAll()">${t('clear')}</button>`;
$('#lbl-name').textContent = t('lblName');
$('#lbl-headline').textContent = t('lblHeadline');
$('#lbl-body').textContent = t('lblBody');
$('#lbl-avatar').textContent = t('lblAvatar');
$('#lbl-photo').textContent = t('lblPhoto');
$('#lbl-avatarbg').textContent = t('lblAvatarbg');
$('#lbl-likes').textContent = t('lblLikes');
$('#lbl-comments').textContent = t('lblComments');
$('#previewHeading').textContent = t('previewHeading');
render();

GZ.renderToolPage({
  category: 'seo',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'💼', href:'/social/linkedin-post.html', name:'LinkedIn Post Generator'},
    {icon:'👁️', href:'/seo/open-graph-preview.html', name:'OG Preview'},
    {icon:'🔍', href:'/seo/serp-preview.html', name:'Google SERP Preview'},
    {icon:'🔎', href:'/seo/bing-serp-preview.html', name:'Bing SERP Preview'},
  ]
});
</script>
