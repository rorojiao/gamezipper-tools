.sd-steps b{color:var(--accent)}

.sd-seg{display:inline-flex;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:3px;margin:8px 0}
.sd-seg button{padding:6px 14px;border:none;background:transparent;color:var(--text2);font-family:inherit;font-size:.85em;cursor:pointer;border-radius:5px}
.sd-seg button.active{background:var(--accent);color:#fff}
</style>
<script type="application/ld+json">{"@context":"https://schema.org","@type":"WebApplication","name":"Standard Deviation Calculator","description":"Free online Standard Deviation Calculator. Enter numbers and instantly get population and sample standard deviation, variance, mean, count and sum. Step-by-step breakdown — private, browser-based.","url":"https://tools.gamezipper.com/calc/standard-deviation-calculator.html","applicationCategory":"Utility","operatingSystem":"Web Browser","offers":{"@type":"Offer","price":"0"}}</script>
<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"What is standard deviation?","acceptedAnswer":{"@type":"Answer","text":"Standard deviation measures how spread out a set of numbers is from the mean. A low standard deviation means the numbers are close to the average; a high standard deviation means they are spread out over a wider range."}},{"@type":"Question","name":"What is the difference between population and sample standard deviation?","acceptedAnswer":{"@type":"Answer","text":"Population standard deviation (σ) divides the squared deviations by N (total count) and is used when your data represents the entire population. Sample standard deviation (s) divides by N − 1 (Bessel's correction) and is used when your data is a sample of a larger population."}},{"@type":"Question","name":"What is variance?","acceptedAnswer":{"@type":"Answer","text":"Variance is the square of the standard deviation. It represents the average of the squared differences from the mean."}},{"@type":"Question","name":"How is standard deviation calculated?","acceptedAnswer":{"@type":"Answer","text":"1) Calculate the mean. 2) Subtract the mean from each number and square the result. 3) Find the average of those squared differences (this is the variance). 4) Take the square root of the variance to get the standard deviation."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div>
      <label style="font-size:.85em;font-weight:500" id="lbl-input">Enter numbers (separated by commas, spaces, or new lines)</label>
      <textarea class="sd-input" id="input" spellcheck="false" placeholder="e.g. 2, 4, 4, 4, 5, 5, 7, 9"></textarea>
    </div>
    <div class="sd-err" id="err"></div>
    <div class="sd-seg" id="mode-seg">
      <button class="active" data-mode="sample">Sample (N−1)</button>
      <button data-mode="population">Population (N)</button>
    </div>
    <div class="sd-grid">
      <div class="sd-card">
        <h3>📊 Results</h3>
        <div class="sd-results" id="results">
          <div class="sd-stat sd-stat-highlight"><div class="sd-stat-label">Std Deviation</div><div class="sd-stat-value" id="r-sd">—</div></div>
          <div class="sd-stat sd-stat-highlight"><div class="sd-stat-label">Variance</div><div class="sd-stat-value" id="r-var">—</div></div>
          <div class="sd-stat"><div class="sd-stat-label">Mean</div><div class="sd-stat-value" id="r-mean">—</div></div>
          <div class="sd-stat"><div class="sd-stat-label">Count (N)</div><div class="sd-stat-value" id="r-count">—</div></div>
          <div class="sd-stat"><div class="sd-stat-label">Sum</div><div class="sd-stat-value" id="r-sum">—</div></div>
          <div class="sd-stat"><div class="sd-stat-label">Min / Max</div><div class="sd-stat-value" id="r-mm">—</div></div>
        </div>
      </div>
      <div class="sd-card">
        <h3>📝 Step-by-Step</h3>
        <div class="sd-steps" id="steps">Enter numbers to see the breakdown.</div>
      </div>
    </div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Standard Deviation Calculator',
    toolDesc: 'Calculate population and sample standard deviation, variance, mean and more from any set of numbers. Step-by-step breakdown — free, private and browser-based.',
    step1: 'Type or paste your numbers separated by commas, spaces, or new lines',
    step2: 'Choose Sample (N−1) or Population (N) mode using the toggle',
    step3: 'The standard deviation, variance and other stats update instantly',
    step4: 'Use Copy to copy the result to your clipboard',
  },
  zh: {
    toolTitle: '标准差计算器',
    toolDesc: '从任意数字集合中计算总体标准差和样本标准差、方差、平均值等。提供逐步分解 — 免费、私密、浏览器本地运行。',
    step1: '输入或粘贴数字，用逗号、空格或换行分隔',
    step2: '使用切换按钮选择样本(N−1)或总体(N)模式',
    step3: '标准差、方差和其他统计数据即时更新',
    step4: '点击「复制」将结果复制到剪贴板',
  }
});

const { $, copyText, t } = GZ;
let mode = 'sample';

function fmt(n) {
  if (!isFinite(n)) return '∞';
  return parseFloat(n.toFixed(8)).toString();
}

function parse() {
  const raw = $('#input').value.trim();
  if (!raw) return [];
  return raw.split(/[\s,;]+/).map(s => parseFloat(s)).filter(n => !isNaN(n));
}

function calculate() {
  const nums = parse();
  if (nums.length === 0) {
    ['sd','var','mean','count','sum','mm'].forEach(k => $('#r-' + k).textContent = '—');
    $('#steps').textContent = 'Enter numbers to see the breakdown.';
    return;
  }
  if (mode === 'sample' && nums.length < 2) {
    $('#err').textContent = '⚠ Sample standard deviation requires at least 2 values';
    return;
  }
  $('#err').textContent = '';
  const n = nums.length;
  const sum = nums.reduce((a, b) => a + b, 0);
  const mean = sum / n;
  const sqDiff = nums.map(v => (v - mean) ** 2);
  const divisor = mode === 'sample' ? n - 1 : n;
  const variance = sqDiff.reduce((a, b) => a + b, 0) / divisor;
  const sd = Math.sqrt(variance);
  const min = Math.min(...nums);
  const max = Math.max(...nums);

  $('#r-sd').textContent = fmt(sd);
  $('#r-var').textContent = fmt(variance);
  $('#r-mean').textContent = fmt(mean);
  $('#r-count').textContent = n;
  $('#r-sum').textContent = fmt(sum);
  $('#r-mm').textContent = `${fmt(min)} / ${fmt(max)}`;

  let steps = `Numbers: ${nums.map(fmt).join(', ')}\n`;
  steps += `Count (N) = ${n}\n`;
  steps += `Sum = ${fmt(sum)}\n`;
  steps += `Mean = ${fmt(sum)} ÷ ${n} = ${fmt(mean)}\n\n`;
  steps += `Squared deviations from mean:\n`;
  steps += nums.map(v => `  (${fmt(v)} − ${fmt(mean)})² = ${fmt((v - mean) ** 2)}`).join('\n');
  steps += `\n\nSum of squared deviations = ${fmt(sqDiff.reduce((a,b)=>a+b,0))}\n`;
  steps += `Divisor = ${mode === 'sample' ? 'N − 1 = ' + (n-1) : 'N = ' + n}\n`;
  steps += `Variance = ${fmt(sqDiff.reduce((a,b)=>a+b,0))} ÷ ${divisor} = ${fmt(variance)}\n`;
  steps += `Std Dev = √${fmt(variance)} = ${fmt(sd)}\n`;

  $('#steps').textContent = steps;
}

function loadExample() { $('#input').value = '2, 4, 4, 4, 5, 5, 7, 9'; calculate(); }
function doClear() { $('#input').value = ''; calculate(); }

$('#input').addEventListener('input', calculate);
document.querySelectorAll('#mode-seg button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('#mode-seg button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    mode = btn.dataset.mode;
    calculate();
  });
});

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn" onclick="copyText($('#r-sd').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📊', href:'/calc/mean-median-mode-calculator.html', name:'Mean Median Mode'},
    {icon:'📈', href:'/calc/statistics-calculator.html', name:'Statistics Calculator'},
    {icon:'🧮', href:'/calc/percentage-calculator.html', name:'Percentage Calculator'},
    {icon:'🔢', href:'/calc/permutation.html', name:'Permutation / Combination'},
  ]
});

calculate();
</script>
<script src="/tools-result-rec.js?v=20260707v520" defer></script>
</body>
</html>
