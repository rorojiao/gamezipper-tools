    step3: '点击「计算」查看精确的大整数结果和实时黄金比例',

const { $, copyText, t } = GZ;

// BigInt helpers for exact large Fibonacci numbers
function fibBig(n) {
  if (n < 0) return -1n;
  if (n === 0) return 0n;
  let a = 0n, b = 1n;
  for (let i = 2; i <= n; i++) {
    const c = a + b;
    a = b;
    b = c;
  }
  return b;
}

let mode = 'n';
let startIdx = 0; // 0 = (0,1), 1 = (1,1), 2 = (1,2)

function getStart() {
  if (startIdx === 1) return [1n, 1n];
  if (startIdx === 2) return [1n, 2n];
  return [0n, 1n];
}

function nthAt(idx) {
  // returns the value at position idx in the chosen start sequence
  const [a0, a1] = getStart();
  if (idx === 0) return a0;
  if (idx === 1) return a1;
  let a = a0, b = a1;
  for (let i = 2; i <= idx; i++) {
    const c = a + b;
    a = b;
    b = c;
  }
  return b;
}

function fmtNum(big) {
  const s = big.toString();
  return s;
}

function setStatus(html) { $('#status').innerHTML = html; }
function clearStatus() { setStatus(''); }

function doCalc() {
  const raw = $('#val').value.trim();
  if (!raw) { setStatus(`<span style="color:var(--gz-accent)">${t('errPositive')}</span>`); return; }
  const val = Number(raw);
  if (!Number.isFinite(val) || !Number.isInteger(val) || val < 0) {
    setStatus(`<span style="color:var(--gz-accent)">${t('errPositive')}</span>`); return;
  }
  if (mode === 'n') {
    if (val > 10000) { setStatus(`<span style="color:var(--gz-accent)">${t('errTooBig')}</span>`); return; }
    const v = fibBig(val);
    let ratioHtml = '';
    if (val >= 2) {
      const ratio = Number(fibBig(val)) / Number(fibBig(val - 1));
      ratioHtml = `<div class="ratio-box">${t('goldenRatio')} = <b>${ratio.toFixed(15)}</b> ${val >= 30 ? '(≈ 1.6180339887498948)' : ''}</div>`;
    }
    $('#output').innerHTML = `<div class="fib-big">F(${val}) = ${fmtNum(v)}</div>${ratioHtml}`;
    setStatus(`<span style="color:var(--gz-success)">✓ ${v.toString().length} digits</span>`);
  } else if (mode === 'seq') {
    if (val > 5000) { setStatus(`<span style="color:var(--gz-accent)">${t('errTooBig')}</span>`); return; }
    const arr = [];
    for (let i = 0; i < val; i++) arr.push(nthAt(i));
    $('#output').textContent = arr.map(fmtNum).join(', ');
    setStatus(`<span style="color:var(--gz-success)">✓ ${arr.length} ${t('count')}</span>`);
  } else if (mode === 'max') {
    if (!Number.isFinite(val) || val <= 0) { setStatus(`<span style="color:var(--gz-accent)">${t('errNum')}</span>`); return; }
    const max = BigInt(Math.floor(val));
    const arr = [];
    let i = 0;
    while (true) {
      const v = nthAt(i);
      if (v > max) break;
      arr.push(v);
      i++;
      if (arr.length > 5000) break;
    }
    $('#output').textContent = arr.map(fmtNum).join(', ');
    setStatus(`<span style="color:var(--gz-success)">✓ ${arr.length} ${t('count')}</span>`);
  }
}

function loadExample() {
  mode = 'n';
  startIdx = 0;
  $('#mode').value = 'n';
  $('#start').value = '0';
  $('#start').style.display = 'inline-block';
  $('#val').value = '100';
  doCalc();
}

function onModeChange() {
  mode = $('#mode').value;
  $('#val').value = mode === 'seq' ? '20' : mode === 'max' ? '1000' : '10';
  $('#val').focus();
  clearStatus();
}

$('#mode-row').innerHTML = `
  <label><b>${t('valueLabel')}:</b></label>
  <input id="val" type="number" min="0" max="10000" value="10" inputmode="numeric">
  <select id="mode" onchange="onModeChange()">
    <option value="n">${t('modeN')}</option>
    <option value="seq">${t('modeSeq')}</option>
    <option value="max">${t('modeMax')}</option>
  </select>
  <label style="font-size:.8em;color:var(--text2)">${t('startLabel')}:</label>
  <select id="start" onchange="startIdx=+this.value;clearStatus()">
    <option value="0">${t('start0')}</option>
    <option value="1">${t('start1')}</option>
    <option value="2">${t('start2')}</option>
  </select>
  <button class="gz-btn" onclick="doCalc()">${t('calc')}</button>`;

$('#val').addEventListener('keydown', e => { if (e.key === 'Enter') doCalc(); });

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="doCalc()">${t('calc')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">F(100)</button>
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>

</script>
