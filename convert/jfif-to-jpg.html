<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is a JFIF file?", "acceptedAnswer": {"@type": "Answer", "text": "JFIF (JPEG File Interchange Format) is a minimal header wrapper around JPEG image data. It is the same image compression as JPG but some cameras and browsers save with the .jfif extension. Converting to .jpg makes the file more widely compatible."}}, {"@type": "Question", "name": "Can I convert multiple JFIF files at once?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. Drag and drop several .jfif files at once and each is converted to .jpg in your browser. A download link appears for every converted file."}}, {"@type": "Question", "name": "Are my images uploaded to a server?", "acceptedAnswer": {"@type": "Answer", "text": "No. All conversion happens entirely in your browser using the Canvas API. Your images never leave your computer."}}, {"@type": "Question", "name": "Does converting JFIF to JPG reduce quality?", "acceptedAnswer": {"@type": "Answer", "text": "Because JFIF already contains JPEG-compressed data, re-encoding to JPG uses the same compression. You can choose a quality from 60% to 100%; 90% is visually lossless for most photos."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div id="drop-area" style="border:2px dashed var(--gz-border);border-radius:12px;padding:40px 20px;text-align:center;cursor:pointer;margin-bottom:16px;transition:background .2s,border-color .2s">
      <div style="font-size:3em;line-height:1">🖼️</div>
      <div id="drop-hint" style="margin-top:12px"></div>
      <input type="file" id="file-input" accept=".jfif,.jpeg,.jpg,image/jpeg" multiple style="display:none">
    </div>
    <div style="margin-bottom:12px">
      <label id="qlbl" style="font-size:.9em;margin-right:8px"></label>
      <select id="quality" class="gz-select">
        <option value="0.6">60%</option>
        <option value="0.75">75%</option>
        <option value="0.85">85%</option>
        <option value="0.9" selected>90%</option>
        <option value="0.95">95%</option>
        <option value="1">100%</option>
      </select>
    </div>
    <div id="status"></div>
    <div id="results" class="gz-related-grid"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'JFIF to JPG Converter',
    toolDesc: 'Convert JFIF images to JPG (JPEG) format online. Batch convert multiple .jfif files — 100% in your browser, free, no upload, no signup.',
    dropHint: 'Click or drag & drop .jfif files here',
    quality: 'Quality',
    step1: 'Click the drop area or drag your .jfif files onto it',
    step2: 'Choose output quality (default 90% is near-lossless)',
    step3: 'Each file is converted to .jpg in your browser instantly',
    step4: 'Click the download button on each result to save',
    converted: 'Converted',
    download: 'Download JPG',
    errConvert: 'Failed to convert',
    clear: 'Clear',
  },
  zh: {
    toolTitle: 'JFIF 转 JPG 转换器',
    toolDesc: '在线将 JFIF 图像转换为 JPG（JPEG）格式。支持批量转换多个 .jfif 文件 — 100% 浏览器本地运行，免费、无需上传、无需注册。',
    dropHint: '点击或拖放 .jfif 文件到此处',
    quality: '质量',
    step1: '点击拖放区或将 .jfif 文件拖入',
    step2: '选择输出质量（默认 90% 接近无损）',
    step3: '每个文件在浏览器中即时转换为 .jpg',
    step4: '点击每个结果上的下载按钮保存',
    converted: '已转换',
    download: '下载 JPG',
    errConvert: '转换失败',
    clear: '清空',
  }
});

const { $, t } = GZ;

$('#drop-hint').textContent = t('dropHint');
$('#qlbl').textContent = t('quality');

const drop = $('#drop-area');
const fileInput = $('#file-input');

drop.addEventListener('click', () => fileInput.click());
drop.addEventListener('dragover', e => { e.preventDefault(); drop.style.borderColor = 'var(--gz-accent)'; drop.style.background = 'var(--gz-hover,#f6f6f6)'; });
drop.addEventListener('dragleave', () => { drop.style.borderColor = 'var(--gz-border)'; drop.style.background = ''; });
drop.addEventListener('drop', e => {
  e.preventDefault();
  drop.style.borderColor = 'var(--gz-border)'; drop.style.background = '';
  handleFiles(e.dataTransfer.files);
});
fileInput.addEventListener('change', () => handleFiles(fileInput.files));

function handleFiles(files) {
  const arr = Array.from(files).filter(f => /\.(jfif|jpe?g)$/i.test(f.name));
  if (!arr.length) { $('#status').innerHTML = `<span style="color:var(--gz-accent)">⚠️ No .jfif/.jpg files selected.</span>`; return; }
  $('#status').innerHTML = `<span style="color:var(--gz-success)">⏳ ${t('converted')} 0/${arr.length}…</span>`;
  const q = parseFloat($('#quality').value);
  let done = 0;
  arr.forEach(file => convertOne(file, q, () => {
    done++;
    $('#status').innerHTML = `<span style="color:var(--gz-success)">✓ ${t('converted')} ${done}/${arr.length}</span>`;
  }));
}

function convertOne(file, q, cb) {
  const reader = new FileReader();
  reader.onload = () => {
    const img = new Image();
    img.onload = () => {
      const c = document.createElement('canvas');
      c.width = img.naturalWidth; c.height = img.naturalHeight;
      c.getContext('2d').drawImage(img, 0, 0);
      c.toBlob(blob => {
        const url = URL.createObjectURL(blob);
        const base = file.name.replace(/\.(jfif|jpe?g)$/i, '');
        const a = document.createElement('a');
        a.href = url; a.download = base + '.jpg';
        const card = document.createElement('div');
        card.style.cssText = 'border:1px solid var(--gz-border);border-radius:10px;padding:10px;text-align:center';
        card.innerHTML = `<img src="${url}" style="max-width:100%;max-height:120px;border-radius:6px;margin-bottom:8px"><div style="font-size:.8em;margin-bottom:6px;word-break:break-all">${base}.jpg</div>`;
        const btn = document.createElement('button');
        btn.className = 'gz-btn'; btn.textContent = '⬇ ' + t('download');
        btn.onclick = () => a.click();
        card.appendChild(btn);
        $('#results').appendChild(card);
        cb();
      }, 'image/jpeg', q);
    };
    img.onerror = () => { $('#results').appendChild(errorCard(file.name)); cb(); };
    img.src = reader.result;
  };
  reader.onerror = () => { $('#results').appendChild(errorCard(file.name)); cb(); };
  reader.readAsDataURL(file);
}

function errorCard(name) {
  const d = document.createElement('div');
  d.style.cssText = 'border:1px solid var(--gz-accent);border-radius:10px;padding:10px;text-align:center;color:var(--gz-accent)';
  d.textContent = '⚠ ' + t('errConvert') + ': ' + name;
  return d;
}

$('#toolbar').innerHTML = `<button class="gz-btn gz-btn-secondary" onclick="document.getElementById('file-input').click()">📁 ${t('dropHint').split(' ')[0]}</button><button class="gz-btn gz-btn-secondary" onclick="()=>{document.getElementById('results').innerHTML='';document.getElementById('status').innerHTML='';document.getElementById('file-input').value=''}">${t('clear')}</button>`;

GZ.renderToolPage({
  category: 'convert',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🖼️', href:'/convert/webp-to-jpg.html', name:'WEBP to JPG'},
    {icon:'📷', href:'/convert/png-to-jpg.html', name:'PNG to JPG'},
    {icon:'🏞️', href:'/convert/heic-to-jpg.html', name:'HEIC to JPG'},
    {icon:'🎞️', href:'/convert/avif-to-jpg.html', name:'AVIF to JPG'},
  ]
});
</script>
<script src="/tools-result-rec.js?v=20260707v520" defer></script>
</body>
</html>
