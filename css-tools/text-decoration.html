<style>
.gz-split{grid-template-columns:1fr 1fr}
.ctrl{margin-bottom:12px}
.ctrl label{display:block;font-size:.85rem;color:var(--text2);margin-bottom:4px}
.ctrl select,.ctrl input[type="number"],.ctrl input[type="color"]{width:100%;padding:8px;border:1px solid var(--border);border-radius:8px;background:var(--glass);color:var(--text)}

.preview-box{background:var(--glass);border:1px solid var(--border);border-radius:16px;padding:40px 24px;min-height:200px;display:flex;align-items:center;justify-content:center;font-size:2rem;font-weight:600;text-align:center}
.code-box{background:var(--glass);border:1px solid var(--border);border-radius:12px;padding:16px;font-family:monospace;font-size:.85em;white-space:pre-wrap;word-break:break-all;margin-top:12px;position:relative}
.preset-btns{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.preset-btns button{padding:6px 12px;border-radius:8px;border:1px solid var(--border);background:var(--glass);cursor:pointer;color:var(--text);font-size:.8rem}
.preset-btns button:hover{background:var(--accent);color:#fff}

<script type="application/ld+json">{"@context":"https://schema.org","@type":"WebApplication","name":"CSS Text Decoration Generator","description":"Generate CSS text-decoration properties visually. Customize underline, overline, line-through styles with color, thickness and wavy effects.","url":"https://tools.gamezipper.com/css-tools/text-decoration.html","applicationCategory":"Utility","operatingSystem":"Web Browser","offers":{"@type":"Offer","price":"0"}}</script>
<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"What is CSS text-decoration?","acceptedAnswer":{"@type":"Answer","text":"CSS text-decoration is a shorthand property that sets text-decoration-line, text-decoration-color, text-decoration-style and text-decoration-thickness in one declaration."}},{"@type":"Question","name":"How do I make a wavy underline in CSS?","acceptedAnswer":{"@type":"Answer","text":"Use text-decoration-style: wavy combined with text-decoration-line: underline. You can also set a custom color and thickness."}},{"@type":"Question","name":"Can I use text-decoration-offset?","acceptedAnswer":{"@type":"Answer","text":"Yes, text-underline-offset controls the distance of the underline from the text. It works in all modern browsers."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="preset-btns" id="presets"></div>
    <div class="gz-split">
      <div>
        <div class="ctrl"><label id="lbl-line"></label><select id="deco-line"><option value="underline">underline</option><option value="overline">overline</option><option value="line-through">line-through</option><option value="underline overline">underline overline</option><option value="underline line-through">underline line-through</option></select></div>
        <div class="ctrl"><label id="lbl-style"></label><select id="deco-style"><option value="solid">solid</option><option value="wavy">wavy</option><option value="dotted">dotted</option><option value="dashed">dashed</option><option value="double">double</option></select></div>
        <div class="ctrl"><label id="lbl-color"></label><input type="color" id="deco-color" value="#e94560"></div>
        <div class="ctrl"><label id="lbl-thickness"></label><input type="number" id="deco-thickness" value="2" min="1" max="20"></div>
        <div class="ctrl"><label id="lbl-offset"></label><input type="number" id="deco-offset" value="4" min="0" max="30"></div>
        <div class="ctrl"><label id="lbl-text"></label><input type="text" id="preview-text" value="Hello, World!" style="width:100%;padding:8px;border:1px solid var(--border);border-radius:8px;background:var(--glass);color:var(--text)"></div>
      </div>
      <div>
        <div class="preview-box" id="preview">Hello, World!</div>
        <div class="code-box" id="code-output"></div>
        <div class="gz-toolbar" id="toolbar" style="margin-top:8px"></div>
      </div>
    </div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'CSS Text Decoration Generator',
    toolDesc: 'Design CSS text-decoration effects visually — underline, overline, line-through with color, thickness, wavy style and offset.',
    lineLabel: 'Decoration Line',
    styleLabel: 'Decoration Style',
    colorLabel: 'Decoration Color',
    thicknessLabel: 'Thickness (px)',
    offsetLabel: 'Underline Offset (px)',
    textLabel: 'Preview Text',
    copy: 'Copy CSS',
    copied: 'Copied!',
    preset1: 'Wavy Red',
    preset2: 'Thick Yellow',
    preset3: 'Dotted Green',
    preset4: 'Double Blue',
    preset5: 'Strikethrough',
    preset6: 'Overline Accent',
    step1: 'Choose a decoration line: underline, overline or line-through',
    step2: 'Pick a style: solid, wavy, dotted, dashed or double',
    step3: 'Adjust color, thickness and offset',
    step4: 'Preview live and copy the CSS code',
  },
  zh: {
    toolTitle: 'CSS 文本装饰生成器',
    toolDesc: '可视化设计 CSS 文本装饰效果 — 下划线、上划线、删除线，支持颜色、粗细、波浪样式和偏移。',
    lineLabel: '装饰线类型',
    styleLabel: '装饰线样式',
    colorLabel: '装饰线颜色',
    thicknessLabel: '粗细（px）',
    offsetLabel: '下划线偏移（px）',
    textLabel: '预览文字',
    copy: '复制 CSS',
    copied: '已复制！',
    preset1: '红色波浪',
    preset2: '粗黄线',
    preset3: '绿色点线',
    preset4: '蓝色双线',
    preset5: '删除线',
    preset6: '上划线',
    step1: '选择装饰线类型：下划线、上划线或删除线',
    step2: '选择样式：实线、波浪、点线、虚线或双线',
    step3: '调整颜色、粗细和偏移',
    step4: '实时预览并复制 CSS 代码',
  }
});

const { $, copyText, t } = GZ;

function update() {
  const line = $('#deco-line').value;
  const style = $('#deco-style').value;
  const color = $('#deco-color').value;
  const thickness = $('#deco-thickness').value;
  const offset = $('#deco-offset').value;
  const text = $('#preview-text').value || 'Hello, World!';

  const preview = $('#preview');
  preview.textContent = text;
  preview.style.textDecoration = `${line} ${style} ${color}`;
  preview.style.textDecorationThickness = thickness + 'px';
  preview.style.textUnderlineOffset = offset + 'px';

  const css = `text-decoration: ${line} ${style} ${color};\ntext-decoration-thickness: ${thickness}px;\ntext-underline-offset: ${offset}px;`;
  $('#code-output').textContent = css;
}

function applyPreset(line, style, color, thickness, offset) {
  $('#deco-line').value = line;
  $('#deco-style').value = style;
  $('#deco-color').value = color;
  $('#deco-thickness').value = thickness;
  $('#deco-offset').value = offset;
  update();
}

$('#presets').innerHTML = `
  <button onclick="applyPreset('underline','wavy','#e94560',2,4)">${t('preset1')}</button>
  <button onclick="applyPreset('underline','solid','#f5c542',4,6)">${t('preset2')}</button>
  <button onclick="applyPreset('underline','dotted','#00d672',2,4)">${t('preset3')}</button>
  <button onclick="applyPreset('underline','double','#61afef',2,5)">${t('preset4')}</button>
  <button onclick="applyPreset('line-through','solid','#e94560',2,0)">${t('preset5')}</button>
  <button onclick="applyPreset('overline','solid','#c678dd',2,4)">${t('preset6')}</button>`;

$('#lbl-line').textContent = t('lineLabel');
$('#lbl-style').textContent = t('styleLabel');
$('#lbl-color').textContent = t('colorLabel');
$('#lbl-thickness').textContent = t('thicknessLabel');
$('#lbl-offset').textContent = t('offsetLabel');
$('#lbl-text').textContent = t('textLabel');

['deco-line','deco-style','deco-color','deco-thickness','deco-offset','preview-text'].forEach(id => {
  document.getElementById(id).addEventListener('input', update);
});

$('#toolbar').innerHTML = `<button class="gz-btn" onclick="copyText($('#code-output').textContent)">${t('copy')}</button>`;

update();

GZ.renderToolPage({
  category: 'css',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'✏️', href:'/css-tools/text-shadow.html', name:'Text Shadow'},
    {icon:'✏️', href:'/css-tools/text-stroke.html', name:'Text Outline'},
    {icon:'🌈', href:'/css-tools/gradient-text.html', name:'Gradient Text'},
    {icon:'↕️', href:'/css-tools/line-height.html', name:'Line Height'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
