<div class="gz-container">

    <h1 id="title"></h1>

  </div>
  <div class="gz-tool-area">

        <button class="tab active" data-tab="html">HTML</button>

        <textarea class="code-editor" id="htmlCode" spellcheck="false"></textarea>
      </div>
      <div class="editor-box" id="cssBox">
        <textarea class="code-editor" id="cssCode" spellcheck="false"></textarea>
      </div>
      <div class="editor-box" id="jsBox">
        <textarea class="code-editor" id="jsCode" spellcheck="false"></textarea>

  </div>

</div>
<script>
GZI18n.register({
  en:{
    toolTitle:'HTML/CSS/JS Code Editor',
    toolDesc:'Write HTML, CSS, and JavaScript with instant live preview. Free online code playground — no setup, no sign-up, runs entirely in your browser.',
    run:'Run', clear:'Clear', loadExample:'Load Example', autoRun:'Auto-run',
    step1:'Write your HTML code in the HTML tab',
    step2:'Add styling in the CSS tab',
    step3:'Add interactivity in the JavaScript tab',
    step4:'Click Run or enable Auto-run to see live results in the preview panel',
  },
  zh:{
    toolTitle:'HTML/CSS/JS 代码编辑器',
    toolDesc:'在线编写 HTML、CSS 和 JavaScript 并实时预览。免费代码沙盒——无需配置、无需注册，完全在浏览器中运行。',
    run:'运行', clear:'清空', loadExample:'加载示例', autoRun:'自动运行',
    step1:'在 HTML 标签页中编写 HTML 代码',
    step2:'在 CSS 标签页中添加样式',
    step3:'在 JavaScript 标签页中添加交互逻辑',
    step4:'点击「运行」或开启「自动运行」在预览面板中查看实时效果',
  }
});
const{$,t}=GZ;
let autoRun=false;

// Load saved code
$('#htmlCode').value=localStorage.getItem('gz-code-html')||'<div class="card">\n  <h1>Hello World! 👋</h1>\n  <p>Start editing to see live results.</p>\n  <button onclick="changeColor()">Click Me</button>\n</div>';
$('#cssCode').value=localStorage.getItem('gz-code-css')||'.card {\n  font-family: system-ui, sans-serif;\n  text-align: center;\n  padding: 40px;\n  margin: 20px;\n  border-radius: 12px;\n  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);\n  color: white;\n}\nbutton {\n  padding: 12px 24px;\n  font-size: 16px;\n  border: none;\n  border-radius: 8px;\n  background: white;\n  color: #764ba2;\n  cursor: pointer;\n  font-weight: bold;\n}\nbutton:hover { opacity: 0.9; }';
$('#jsCode').value=localStorage.getItem('gz-code-js')||'function changeColor() {\n  const colors = ["#667eea", "#f093fb", "#4facfe", "#43e97b", "#fa709a"];\n  const card = document.querySelector(".card");\n  card.style.background = `linear-gradient(135deg, ${colors[Math.floor(Math.random()*colors.length)]}, ${colors[Math.floor(Math.random()*colors.length)]})`;\n}';

// Tab switching
document.querySelectorAll('.tab').forEach(tab=>{
  tab.addEventListener('click',()=>{
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    document.querySelectorAll('.editor-box').forEach(b=>b.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById(tab.dataset.tab+'Box').classList.add('active');
  });
});

// Tab key support in textareas
document.querySelectorAll('.code-editor').forEach(te=>{
  te.addEventListener('keydown',e=>{
    if(e.key==='Tab'){
      e.preventDefault();
      const s=te.selectionStart,en=te.selectionEnd;
      te.value=te.value.substring(0,s)+'  '+te.value.substring(en);
      te.selectionStart=te.selectionEnd=s+2;
      if(autoRun)debouncedRun();
    }
  });
  te.addEventListener('input',()=>{
    localStorage.setItem('gz-code-'+te.id.replace('Code',''),te.value);
    if(autoRun)debouncedRun();
  });
});

let debounceTimer;
function debouncedRun(){clearTimeout(debounceTimer);debounceTimer=setTimeout(runCode,500)}

function runCode(){
  const html=$('#htmlCode').value;
  const css=$('#cssCode').value;
  const js=$('#jsCode').value;
  const doc=`<!DOCTYPE html><html><head><style>${css}</style></head><body>${html}<scr`+`ipt>${js}</scr`+`ipt></body></html>`;
  const frame=$('#preview');
  frame.srcdoc=doc;
}

function clearAll(){
  $('#htmlCode').value='';$('#cssCode').value='';$('#jsCode').value='';
  localStorage.removeItem('gz-code-html');localStorage.removeItem('gz-code-css');localStorage.removeItem('gz-code-js');
  runCode();
}

function loadExample(){
  $('#htmlCode').value='<div class="app">\n  <h2>🎨 Color Palette</h2>\n  <div class="palette" id="palette"></div>\n  <button onclick="generate()">Generate New</button>\n</div>';
  $('#cssCode').value='.app { font-family: system-ui; text-align: center; padding: 20px; }\n.palette { display: flex; gap: 8px; justify-content: center; margin: 20px 0; flex-wrap: wrap; }\n.swatch { width: 60px; height: 60px; border-radius: 12px; cursor: pointer; transition: transform 0.2s; }\n.swatch:hover { transform: scale(1.1); }\nbutton { padding: 10px 20px; border: none; border-radius: 8px; background: #333; color: #fff; font-size: 14px; cursor: pointer; }';
  $('#jsCode').value='function generate() {\n  const p = document.getElementById("palette");\n  p.innerHTML = "";\n  for (let i = 0; i < 5; i++) {\n    const c = "#" + Math.floor(Math.random()*16777215).toString(16).padStart(6,"0");\n    const d = document.createElement("div");\n    d.className = "swatch";\n    d.style.background = c;\n    d.title = c;\n    d.onclick = () => navigator.clipboard.writeText(c);\n    p.appendChild(d);\n  }\n}\ngenerate();';
  runCode();
}

$('#toolbar').innerHTML=`<button class="gz-btn" onclick="runCode()">${t('run')}</button><button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('loadExample')}</button><button class="gz-btn gz-btn-secondary" onclick="clearAll()">${t('clear')}</button><label style="display:flex;align-items:center;gap:4px;cursor:pointer;font-size:.9em"><input type="checkbox" onchange="autoRun=this.checked"> ${t('autoRun')}</label>`;

GZ.renderToolPage({
  category:'dev',
  titleKey:'toolTitle',
  descKey:'toolDesc',
  howToSteps:['step1','step2','step3','step4'],
  related:[
    {icon:'🔧',href:'/dev/html-formatter.html',name:'HTML Formatter'},
    {icon:'🎨',href:'/dev/css-validator.html',name:'CSS Validator'},
    {icon:'⚡',href:'/dev/js-formatter.html',name:'JS Formatter'},
    {icon:'📝',href:'/text/html-playground.html',name:'HTML Playground'},
  ]
});
runCode();
</script>
<script src="/tools-result-rec.js" defer></script>
