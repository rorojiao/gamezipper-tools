.sl-item{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:6px;transition:background .15s}

.sl-item .chk{width:18px;height:18px;cursor:pointer}

.sl-progress .bar{height:6px;background:var(--border);border-radius:3px;overflow:hidden;margin-top:6px}
.sl-progress .bar div{height:100%;background:linear-gradient(90deg,var(--gz-accent),var(--gz-accent2));transition:width .3s}

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="sl-progress" id="progress"></div>
    <div class="sl-wrap">
      <div class="sl-input-card">
        <h3 id="lbl-add"></h3>
        <div class="sl-row">
          <input type="text" id="i-name" class="name" placeholder="Apples" data-i18n-placeholder="ph-name">
          <input type="text" id="i-qty" class="qty" placeholder="6" data-i18n-placeholder="ph-qty">
          <select id="i-cat" class="cat">
            <option>Produce</option><option>Dairy</option><option>Bakery</option><option>Meat</option><option>Seafood</option><option>Frozen</option><option>Pantry</option><option>Beverages</option><option>Snacks</option><option>Household</option><option>Personal Care</option><option>Other</option>
          </select>
          <input type="text" id="i-note" class="note" placeholder="Honeycrisp" data-i18n-placeholder="ph-note">
        </div>
        <div class="sl-row">
          <button class="gz-btn" id="btn-add">➕ <span id="lbl-add-btn"></span></button>
          <button class="gz-btn gz-btn-secondary" id="btn-clear-checked">✓ <span id="lbl-clear-checked"></span></button>
          <button class="gz-btn gz-btn-secondary" id="btn-clear-all">🗑️ <span id="lbl-clear-all"></span></button>
        </div>
      </div>
      <div class="sl-list-card" id="list"></div>
    </div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Shopping List Maker',
    toolDesc: 'Build a grocery list organized by category. Check items off, see progress, export or print — 100% in-browser.',
    add: 'Add Item',
    addBtn: 'Add to list',
    clearChecked: 'Clear checked',
    clearAll: 'Clear all',
    empty: 'No items yet. Add your first item above!',
    export: 'Export',
    print: 'Print',
    phName: 'Item name',
    phQty: 'Qty',
    phNote: 'Note (optional)',
    progress: 'progress',
    step1: 'Type an item, pick a category (Produce, Dairy, etc.), add quantity and optional note',
    step2: 'Click Add to list — items are auto-grouped by category for faster shopping',
    step3: 'Tap the checkbox next to items as you drop them in your cart',
    step4: 'Use Export to copy a plain-text list, or Print for a paper version',
  },
  zh: {
    toolTitle: '购物清单生成器',
    toolDesc: '按类别整理购物清单。勾选完成项、查看进度、导出或打印 — 100% 浏览器本地运行。',
    add: '添加项目',
    addBtn: '加入清单',
    clearChecked: '清除已勾选',
    clearAll: '全部清除',
    empty: '暂无项目。在上方添加第一项！',
    export: '导出',
    print: '打印',
    phName: '商品名称',
    phQty: '数量',
    phNote: '备注（可选）',
    progress: '已完成',
    step1: '输入商品名称，选择类别（果蔬、乳制品等），添加数量和备注',
    step2: '点击「加入清单」— 商品自动按类别分组，方便按货架顺序购物',
    step3: '放入购物车后点击复选框标记完成',
    step4: '使用「导出」复制纯文本清单，或「打印」纸质版',
  }
});

const { $, copyText, t } = GZ;

const STORAGE_KEY = 'gz-shopping-list-v1';
let items = [];

function loadItems() {
  try { items = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); } catch { items = []; }
}
function saveItems() { localStorage.setItem(STORAGE_KEY, JSON.stringify(items)); }

function addItem() {
  const name = $('#i-name').value.trim();
  const qty = $('#i-qty').value.trim();
  const cat = $('#i-cat').value;
  const note = $('#i-note').value.trim();
  if (!name) { $('#i-name').focus(); return; }
  items.push({ id: Date.now() + Math.random(), name, qty, cat, note, checked: false });
  saveItems();
  $('#i-name').value = ''; $('#i-qty').value = ''; $('#i-note').value = '';
  $('#i-name').focus();
  render();
}

function toggleItem(id) {
  const it = items.find(x => x.id === id);
  if (it) { it.checked = !it.checked; saveItems(); render(); }
}
function deleteItem(id) {
  items = items.filter(x => x.id !== id);
  saveItems(); render();
}
function clearChecked() {
  items = items.filter(x => !x.checked);
  saveItems(); render();
}
function clearAll() {
  if (!items.length) return;
  if (!confirm('Clear all items?')) return;
  items = [];
  saveItems(); render();
}

function exportText() {
  if (!items.length) return;
  const byCat = {};
  items.forEach(it => { (byCat[it.cat] = byCat[it.cat] || []).push(it); });
  let out = '🛒 SHOPPING LIST\n' + '='.repeat(30) + '\n\n';
  Object.keys(byCat).sort().forEach(cat => {
    out += cat.toUpperCase() + '\n';
    byCat[cat].forEach(it => {
      out += '  [' + (it.checked ? '✓' : ' ') + '] ' + (it.qty ? it.qty + ' × ' : '') + it.name + (it.note ? ' (' + it.note + ')' : '') + '\n';
    });
    out += '\n';
  });
  copyText(out.trim());
}

function renderProgress() {
  const total = items.length;
  const done = items.filter(x => x.checked).length;
  if (!total) { $('#progress').innerHTML = ''; return; }
  const pct = Math.round(done / total * 100);
  $('#progress').innerHTML = `<strong>${done}/${total}</strong> ${t('progress')} — ${pct}%<div class="bar"><div style="width:${pct}%"></div></div>`;
}

function render() {
  renderProgress();
  const list = $('#list');
  if (!items.length) { list.innerHTML = `<div class="sl-empty">${t('empty')}</div>`; return; }
  const byCat = {};
  items.forEach(it => { (byCat[it.cat] = byCat[it.cat] || []).push(it); });
  const cats = Object.keys(byCat).sort();
  let html = '';
  cats.forEach(cat => {
    html += `<div class="sl-group"><h4>${cat} (${byCat[cat].length})</h4>`;
    byCat[cat].forEach(it => {
      html += `<div class="sl-item${it.checked ? ' checked' : ''}">
        <input type="checkbox" class="chk" ${it.checked ? 'checked' : ''} onchange="toggleItem(${it.id})">
        <span class="name">${escapeHtml(it.name)}</span>
        ${it.qty ? `<span class="qty">${escapeHtml(it.qty)}</span>` : ''}
        ${it.note ? `<span class="note">— ${escapeHtml(it.note)}</span>` : ''}
        <button class="del" onclick="deleteItem(${it.id})" title="Delete">✕</button>
      </div>`;
    });
    html += '</div>';
  });
  list.innerHTML = html;
}

function escapeHtml(s) { return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

$('#btn-add').onclick = addItem;
$('#btn-clear-checked').onclick = clearChecked;
$('#btn-clear-all').onclick = clearAll;
$('#i-name').addEventListener('keydown', e => { if (e.key === 'Enter') addItem(); });

$('#toolbar').innerHTML = `
  <button class="gz-btn gz-btn-secondary" onclick="exportText()">📋 ${t('export')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="window.print()">🖨️ ${t('print')}</button>`;

loadItems();
render();

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'✅', href:'/text/checklist.html', name:'Checklist'},
    {icon:'📝', href:'/text/todo.html', name:'To-Do List'},
    {icon:'🛒', href:'/text/grocery-list-maker.html', name:'Grocery List'},
    {icon:'📋', href:'/text/notepad.html', name:'Notepad'},
  ]
});
</script>

</body>
