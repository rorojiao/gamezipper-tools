<script>
GZI18n.register({
  en:{
    htmlEncTitle:'HTML Entity Encoder/Decoder',htmlEncDesc:'Encode special characters to HTML entities or decode HTML entities back to text.',
    htmlEncStep1:'Paste text or HTML entities in the input',
    htmlEncStep2:'Click Encode or Decode',
    htmlEncStep3:'Copy the result',
    encodeAll:'Encode All',
    htmlExample:'<div class="hello">\n  <p>Tom & Jerry\'s "Adventure" © 2024</p>\n  <span>Price: 5 < 10 > 3</span>\n</div>',
  },
  zh:{
    htmlEncTitle:'HTML 实体编解码',htmlEncDesc:'将特殊字符编码为 HTML 实体，或将 HTML 实体解码回文本。',
    htmlEncStep1:'在输入区域粘贴文本或HTML实体',
    htmlEncStep2:'点击编码或解码',
    htmlEncStep3:'复制结果',
    encodeAll:'全部编码',
    htmlExample:'<div class="hello">\n  <p>Tom & Jerry\'s "Adventure" © 2024</p>\n  <span>Price: 5 < 10 > 3</span>\n</div>',
  }
});
const {t,$}=GZ;

function htmlEncode(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function htmlEncodeAll(s){
  return s.split('').map(c=>{
    const code=c.charCodeAt(0);
    if(code>127||'&<>"\' '.includes(c))return'&#'+code+';';
    return c;
  }).join('');
}

function htmlDecode(s){
  const el=document.createElement('textarea');
  el.innerHTML=s;
  return el.value;
}

function doEncode(){$('#output').value=htmlEncode($('#input').value)}
function doEncodeAll(){$('#output').value=htmlEncodeAll($('#input').value)}
function doDecode(){$('#output').value=htmlDecode($('#input').value)}
function loadExample(){$('#input').value=t('htmlExample');doEncode()}

$('#lbl-in').textContent=t('input');
$('#lbl-out').textContent=t('output');

$('#toolbar').innerHTML=`
  <button class="gz-btn" onclick="doEncode()">${t('encode')}</button>
  <button class="gz-btn" onclick="doDecode()">${t('decode')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doEncodeAll()">${t('encodeAll')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="GZ.copyText($('#output').value)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#input').value='';$('#output').value=''">${t('clear')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>`;
