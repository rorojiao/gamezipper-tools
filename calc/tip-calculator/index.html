<!DOCTYPE html>
<html lang="en">
<head>
<title>Tip Calculator - Split Bill & Tip Calculator | GameZipper Tools</title>

<meta property="og:description" content="Split bills and calculate tips with per-person breakdowns. Free online tool.">

<meta property="og:image" content="https://tools.gamezipper.com/shared/og-image.png">

{"@context":"https://schema.org","@type":"WebApplication","name":"Tip Calculator","description":"Free online tip and bill splitter calculator.","url":"https://tools.gamezipper.com/calc/tip-calculator/","applicationCategory":"Utility","operatingSystem":"Web Browser","offers":{"@type":"Offer","price":"0"}}

<style>
input[type="number"]{background:rgba(0,0,0,0.3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 16px;color:var(--text);font-size:1.1rem;width:100%;touch-action:manipulation}
input[type="number"]:focus{outline:none;border-color:var(--accent)}
.slider-wrap{margin:1rem 0}
.slider-wrap input[type="range"]{width:100%;-webkit-appearance:none;height:6px;background:var(--glass2);border-radius:3px;outline:none}
.slider-wrap input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;width:24px;height:24px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));cursor:pointer;box-shadow:0 0 10px var(--accent-glow)}
.slider-label{display:flex;justify-content:space-between;color:var(--text2);font-size:0.85rem;margin-bottom:4px}
.quick-btns{display:flex;gap:8px;margin:0.5rem 0 1rem;flex-wrap:wrap}
.quick-btns button{padding:8px 16px;border-radius:20px;border:1px solid var(--border);background:var(--glass2);color:var(--text2);cursor:pointer;font-size:0.85rem;transition:all 0.15s;touch-action:manipulation}
.quick-btns button:hover,.quick-btns button.active{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border-color:transparent}
.result-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-top:1.5rem}
.result-box{background:var(--glass2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:16px;text-align:center}
.result-box .val{font-size:1.6rem;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.result-box .lbl{color:var(--text2);font-size:0.75rem;margin-top:4px;text-transform:uppercase;letter-spacing:0.5px}
.people-ctrl{display:flex;align-items:center;gap:12px;justify-content:center;margin:1rem 0}
.people-ctrl button{width:36px;height:36px;border-radius:50%;border:1px solid var(--border);background:var(--glass2);color:var(--text);font-size:1.2rem;cursor:pointer;touch-action:manipulation}
.people-ctrl span{font-size:1.2rem;font-weight:700;min-width:60px;text-align:center}
label{color:var(--text2);font-size:0.85rem;display:block;margin-bottom:4px;font-weight:600}
</style>
</head>
<body>
<div class="gz-container">
<div class="gz-tool-header">
<h1>💰 Tip Calculator</h1>
<p class="desc">Calculate tips and split bills easily</p>
</div>
<div class="gz-tool-area">
<label>Bill Amount ($)</label>
<input type="number" id="bill" placeholder="0.00" min="0" step="0.01" oninput="calc()">
<div class="slider-wrap">
<div class="slider-label"><span>Tip Percentage</span><span id="tipPctLabel">15%</span></div>
<input type="range" id="tipSlider" min="0" max="50" value="15" oninput="calc()">
</div>
<div class="quick-btns">
<button onclick="setTip(15)">15%</button>
<button onclick="setTip(18)">18%</button>
<button onclick="setTip(20)">20%</button>
<button onclick="setTip(25)">25%</button>
</div>
<label>Split Between</label>
<div class="people-ctrl">
<button onclick="changePeople(-1)">−</button>
<span id="peopleLabel">1 person</span>
<button onclick="changePeople(1)">+</button>
</div>
<div class="result-grid">
<div class="result-box"><div class="val" id="tipAmt">$0.00</div><div class="lbl">Tip Amount</div></div>
<div class="result-box"><div class="val" id="total">$0.00</div><div class="lbl">Total</div></div>
<div class="result-box"><div class="val" id="perPerson">$0.00</div><div class="lbl">Per Person</div></div>
</div>
</div>
</div>
<script>
GZ.renderHeader('calc');GZ.renderFooter();
new Image().src="https://site-analytics.cap.1ktower.com/hit?s=tools.gamezipper.com&p="+encodeURIComponent(location.pathname);
let people=1;
function setTip(pct){document.getElementById('tipSlider').value=pct;calc()}
function changePeople(d){people=Math.max(1,Math.min(20,people+d));document.getElementById('peopleLabel').textContent=people+(people===1?' person':' people');calc()}
function calc(){const bill=parseFloat(document.getElementById('bill').value)||0;const pct=parseFloat(document.getElementById('tipSlider').value)||0;document.getElementById('tipPctLabel').textContent=pct+'%';const tip=bill*pct/100;const total=bill+tip;document.getElementById('tipAmt').textContent='$'+tip.toFixed(2);document.getElementById('total').textContent='$'+total.toFixed(2);document.getElementById('perPerson').textContent='$'+(total/people).toFixed(2)}
</script>
</body>
</html>
