<script>
GZI18n.register({
  en: {
    toolTitle: 'Wake-on-LAN Magic Packet Generator',
    toolDesc: 'Generate Wake-on-LAN magic packets from a MAC address. Create the hex payload to wake up remote computers over the network.',
    macLabel: 'MAC Address',
    outputLabel: 'Magic Packet (Hex)',
    note: 'A magic packet is 6 bytes of 0xFF followed by the MAC address repeated 16 times (102 bytes total). To send it, use a WoL utility or router feature.',
    invalidMac: '✗ Invalid MAC address. Use format: 00:1A:2B:3C:4D:5E',
    generate: 'Generate',
    step1: 'Enter the target device MAC address (e.g. 00:1A:2B:3C:4D:5E)',
    step2: 'Click Generate to create the magic packet hex',
    step3: 'Copy the hex payload',
    step4: 'Send it using a WoL utility, router feature, or command-line tool',
  },
  zh: {
    toolTitle: '局域网唤醒魔术包生成器',
    toolDesc: '通过 MAC 地址生成局域网唤醒（WoL）魔术包。生成十六进制数据包，用于远程唤醒网络中的计算机。',
    macLabel: 'MAC 地址',
    outputLabel: '魔术包（十六进制）',
    note: '魔术包由 6 字节的 0xFF 和重复 16 次的 MAC 地址组成（共 102 字节）。使用 WoL 工具或路由器功能发送。',
    invalidMac: '✗ MAC 地址无效。格式：00:1A:2B:3C:4D:5E',
    generate: '生成',
    step1: '输入目标设备的 MAC 地址（如 00:1A:2B:3C:4D:5E）',
    step2: '点击生成创建魔术包十六进制数据',
    step3: '复制十六进制数据包',
    step4: '使用 WoL 工具、路由器功能或命令行工具发送',
  }
});

const { $, copyText, t } = GZ;

$('#lbl-mac').textContent = t('macLabel');
$('#lbl-out').textContent = t('outputLabel');
$('#note').textContent = t('note');

function parseMac(str) {
  const cleaned = str.trim().replace(/[\s:\-.]/g, '');
  if (!/^[0-9A-Fa-f]{12}$/.test(cleaned)) return null;
  return cleaned.toUpperCase().match(/.{2}/g);
}

function generate() {
  const macStr = $('#macInput').value;
  const macBytes = parseMac(macStr);
  if (!macBytes) {
    $('#output').innerHTML = `<span style="color:var(--gz-accent)">${t('invalidMac')}</span>`;
    return;
  }
  // Build magic packet: 6 x 0xFF + 16 x MAC
  const sync = Array(6).fill('FF');
  const payload = [...sync, ...Array(16).fill(macBytes).flat()];
  const hexStr = payload.join(' ');
  const bytes = payload.length;
  $('#output').textContent = hexStr + '\n\n(' + bytes + ' bytes)';
}

$('#macInput').addEventListener('input', () => {
  if (parseMac($('#macInput').value)) generate();
});

$('#macInput').addEventListener('keypress', (e) => {
  if (e.key === 'Enter') generate();
});

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="generate()">${t('generate')}</button>
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>`;

GZ.renderToolPage({

  ]
});
</script>
