<script>

    partnerA: '新郎/新娘 1', partnerB: '新郎/新娘 2', date: '婚礼日期', time: '仪式时间（如 16:00）',
    venue: '场地与城市', rsvp: 'RSVP 信息（如 3月1日前回执 → name@email.com）',
    msg: '个人寄语（可选）',
    styleClassic: '经典', styleModern: '现代', styleRustic: '田园', styleMinimal: '极简', styleFloral: '花语', styleElegant: '典雅',
    together: '— 谨此偕同双方家人 —',
    request: '诚挚邀请您出席我们的婚礼',
    and: '与',
    downloadPNG: '🖼 下载 PNG', downloadPDF: '🖨 下载 PDF', reset: '重置',
    step1: '从 6 种请柬风格中选择一种',
    step2: '填写新人姓名、日期、时间和场地',
    step3: '可选添加个人寄语和 RSVP 详情',
    step4: '下载高分辨率 PNG 或打印为 PDF',
  }
});

const { $, copyText, t } = GZ;
const STYLES = ['classic','modern','rustic','minimal','floral','elegant'];
let currentStyle = 'classic';

function formatDate(d) {
  if (!d) return '';
  const dt = new Date(d);
  if (isNaN(dt)) return d;
  const lang = (typeof GZI18n !== 'undefined' && GZI18n.getLang && GZI18n.getLang() === 'zh') ? 'zh' : 'en';
  if (lang === 'zh') {
    return `${dt.getFullYear()}年${dt.getMonth() + 1}月${dt.getDate()}日`;
  }
  const months = ['JANUARY','FEBRUARY','MARCH','APRIL','MAY','JUNE','JULY','AUGUST','SEPTEMBER','OCTOBER','NOVEMBER','DECEMBER'];
  return `${months[dt.getMonth()]} ${dt.getDate()}, ${dt.getFullYear()}`;
}

function render() {
  const a = $('#partnerA').value.trim() || 'Partner One';
  const b = $('#partnerB').value.trim() || 'Partner Two';
  const date = formatDate($('#date').value);
  const time = $('#time').value.trim();
  const venue = $('#venue').value.trim();
  const rsvp = $('#rsvp').value.trim();
  const msg = $('#msg').value.trim();

  const card = $('#card');
  card.className = 'wi-card ' + currentStyle;
  let html = `<div class="wi-tag">${t('together')}</div>`;
  if (msg) html += `<div style="font-size:.85em;font-style:italic;opacity:.7;margin-bottom:6px;max-width:90%">${msg.replace(/</g,'&lt;')}</div>`;
  html += `<div class="wi-names">${a.replace(/</g,'&lt;')}</div>`;
  html += `<div class="wi-and">${t('and')}</div>`;
  html += `<div class="wi-names">${b.replace(/</g,'&lt;')}</div>`;
  if (date) html += `<div class="wi-date">${date}</div>`;
  if (time) html += `<div class="wi-venue">${t('request')} · ${time.replace(/</g,'&lt;')}</div>`;
  if (venue) html += `<div class="wi-venue">${venue.replace(/</g,'&lt;')}</div>`;
  if (rsvp) html += `<div class="wi-venue" style="margin-top:14px">RSVP: ${rsvp.replace(/</g,'&lt;')}</div>`;
  card.innerHTML = html;
}

function renderStyles() {
  $('#styles').innerHTML = STYLES.map(s => `<button class="wi-style-btn${s === currentStyle ? ' active' : ''}" data-s="${s}">${t('style' + s[0].toUpperCase() + s.slice(1))}</button>`).join('');
  document.querySelectorAll('.wi-style-btn').forEach(btn => {
    btn.onclick = () => { currentStyle = btn.dataset.s; renderStyles(); render(); };
  });
}

function downloadPNG() {
  const w = 1040, h = 1456; // 2x of 520x728
  const c = document.createElement('canvas');
  c.width = w; c.height = h;
  const ctx = c.getContext('2d');
  const card = $('#card');
  const cs = getComputedStyle(card);
  // Background
  const styles = {
    classic: ['#fef8f0','#fff'],
    modern: ['#1a1a2e','#16213e'],
    rustic: ['#8b6f47','#c9a96e'],
    minimal: ['#ffffff','#ffffff'],
    floral: ['#ffe4ec','#ffffff'],
    elegant: ['#000000','#2c2c2c'],
  }[currentStyle];
  if (currentStyle === 'floral') {
    const grd = ctx.createRadialGradient(w/2, 0, 0, w/2, 0, h);
    grd.addColorStop(0, styles[0]);
    grd.addColorStop(0.7, styles[1]);
    ctx.fillStyle = grd;
  } else if (currentStyle === 'minimal') {
    ctx.fillStyle = styles[0];
  } else {
    const grd = ctx.createLinearGradient(0, 0, w, h);
    grd.addColorStop(0, styles[0]);
    grd.addColorStop(1, styles[1]);
    ctx.fillStyle = grd;
  }
  ctx.fillRect(0, 0, w, h);
  if (currentStyle === 'minimal') {
    ctx.strokeStyle = '#222';
    ctx.lineWidth = 12;
    ctx.strokeRect(36, 36, w-72, h-72);
  }
  if (currentStyle === 'elegant') {
    ctx.strokeStyle = '#d4af37';
    ctx.lineWidth = 2;
    ctx.strokeRect(40, 40, w-80, h-80);
  }

  const colors = {
    classic: { main: '#8b4513', sub: '#3a2718', accent: '#c9a96e' },
    modern: { main: '#ffffff', sub: '#ffffff', accent: '#e94560' },
    rustic: { main: '#ffffff', sub: '#ffffff', accent: '#ffffff' },
    minimal: { main: '#222', sub: '#666', accent: '#666' },
    floral: { main: '#7d3a5b', sub: '#c2557f', accent: '#c2557f' },
    elegant: { main: '#d4af37', sub: '#d4af37', accent: '#d4af37' },
  }[currentStyle];

  // Text rendering
  const cx = w/2;
  let y = 220;
  ctx.textAlign = 'center';
  ctx.fillStyle = colors.accent;
  ctx.font = '24px Georgia, serif';
  ctx.fillText(t('together').replace(/—/g,''), cx, y);
  y += 80;
  const a = $('#partnerA').value.trim() || 'Partner One';
  const b = $('#partnerB').value.trim() || 'Partner Two';
  const date = formatDate($('#date').value);
  const time = $('#time').value.trim();
  const venue = $('#venue').value.trim();
  const rsvp = $('#rsvp').value.trim();
  const msg = $('#msg').value.trim();

  if (msg) {
    ctx.font = 'italic 22px Georgia, serif';
    ctx.fillStyle = colors.sub;
    ctx.globalAlpha = 0.7;
    const lines = wrapText(ctx, msg, w - 200);
    for (const line of lines) {
      ctx.fillText(line, cx, y);
      y += 32;
    }
    ctx.globalAlpha = 1;
    y += 24;
  }
  ctx.font = '64px Georgia, serif';
  ctx.fillStyle = colors.main;
  ctx.fillText(a, cx, y);
  y += 80;
  ctx.font = 'italic 32px Georgia, serif';
  ctx.fillStyle = colors.sub;
  ctx.fillText(t('and'), cx, y);
  y += 60;
  ctx.font = '64px Georgia, serif';
  ctx.fillStyle = colors.main;
  ctx.fillText(b, cx, y);
  y += 100;
  if (date) {
    ctx.font = '36px Georgia, serif';
    ctx.fillStyle = colors.main;
    ctx.fillText(date, cx, y);
    y += 56;
  }
  if (time) {
    ctx.font = '24px Georgia, serif';
    ctx.fillStyle = colors.sub;
    ctx.fillText(`${t('request')} · ${time}`, cx, y);
    y += 40;
  }
  if (venue) {
    ctx.font = '24px Georgia, serif';
    ctx.fillStyle = colors.sub;
    ctx.fillText(venue, cx, y);
    y += 40;
  }
  if (rsvp) {
    y += 24;
    ctx.font = '22px Georgia, serif';
    ctx.fillStyle = colors.sub;
    ctx.fillText('RSVP: ' + rsvp, cx, y);
  }

  if (currentStyle === 'floral') {
    ctx.font = '64px serif';
    ctx.globalAlpha = 0.5;
    ctx.fillStyle = '#c2557f';
    ctx.textAlign = 'right';
    ctx.fillText('🌸', w - 80, 120);
    ctx.textAlign = 'left';
    ctx.fillText('🌷', 80, h - 80);
  }

  // Footer
  ctx.textAlign = 'center';
  ctx.font = '14px sans-serif';
  ctx.fillStyle = colors.sub;
  ctx.globalAlpha = 0.45;
  ctx.fillText('Created with GameZipper Tools', cx, h - 40);
  ctx.globalAlpha = 1;

  const url = c.toDataURL('image/png');
  const a2 = document.createElement('a');
  a2.href = url; a2.download = 'wedding-invitation.png'; a2.click();
}

function wrapText(ctx, text, maxWidth) {
  const words = text.split(' ');
  const lines = [];
  let line = '';
  for (const word of words) {
    const test = line + word + ' ';
    if (ctx.measureText(test).width > maxWidth && line) {
      lines.push(line.trim());
      line = word + ' ';
    } else line = test;
  }
  if (line) lines.push(line.trim());
  return lines;
}

function downloadPDF() {
  const card = $('#card');
  const w = window.open('', '_blank');
  w.document.write(`<!DOCTYPE html><html><head><title>Wedding Invitation</title>
    <style>
    body{margin:0;padding:24px;background:#f5f5f5;display:flex;justify-content:center;align-items:center;min-height:100vh}
    .frame{width:520px;aspect-ratio:5/7;box-shadow:0 8px 32px rgba(0,0,0,.2)}
    @media print{body{background:#fff;padding:0}.frame{box-shadow:none}}
    </style></head><body><div class="frame">${card.outerHTML}</div></body></html>`);
  w.document.close();
  setTimeout(() => w.print(), 400);
}

function reset() {
  ['#partnerA','#partnerB','#date','#time','#venue','#rsvp','#msg'].forEach(s => $(s).value = '');
  currentStyle = 'classic';
  renderStyles();
  render();
}

function init() {
  $('#lblA').textContent = t('partnerA');
  $('#lblB').textContent = t('partnerB');
  $('#lblDate').textContent = t('date');
  $('#lblTime').textContent = t('time');
  $('#lblVenue').textContent = t('venue');
  $('#lblRsvp').textContent = t('rsvp');
  $('#lblMsg').textContent = t('msg');
  $('#partnerA').placeholder = 'Emma';
  $('#partnerB').placeholder = 'Liam';
  $('#time').placeholder = '4:00 PM';
  $('#venue').placeholder = 'The Grand Garden, San Francisco';
  $('#rsvp').placeholder = 'by 1 March → rsvp@example.com';
  $('#msg').placeholder = 'After ten wonderful years together…';

  ['#partnerA','#partnerB','#date','#time','#venue','#rsvp','#msg'].forEach(s => $(s).addEventListener('input', render));

  $('#toolbar').innerHTML = `
    <button class="gz-btn" onclick="downloadPNG()">${t('downloadPNG')}</button>
    <button class="gz-btn gz-btn-secondary" onclick="downloadPDF()">${t('downloadPDF')}</button>
    <button class="gz-btn gz-btn-secondary" onclick="reset()">${t('reset')}</button>`;

  renderStyles();
  render();
}

init();

</script>
