.cmp-stage{background:var(--glass);border:1px solid var(--border);border-radius:18px;padding:24px;margin-bottom:18px;text-align:center}
.cmp-readout{margin-bottom:16px}
.cmp-heading{font-size:3.2rem;font-weight:900;font-family:monospace;color:var(--accent);line-height:1;display:block}
.cmp-cardinal{font-size:1.4rem;font-weight:800;color:var(--text);margin-top:6px;letter-spacing:2px}
.cmp-cardinal .sub{color:var(--text2);font-size:.85rem;font-weight:600;margin-left:8px}
.cmp-dial{position:relative;width:300px;height:300px;max-width:100%;margin:8px auto 14px;border-radius:50%;background:radial-gradient(circle at 50% 40%,rgba(255,255,255,.06),rgba(0,0,0,.35));border:2px solid var(--border);box-shadow:inset 0 0 30px rgba(0,0,0,.4)}
.cmp-rose{position:absolute;inset:0;transform-origin:50% 50%;transition:transform .12s ease-out}
.cmp-tick{position:absolute;top:8px;left:50%;width:2px;height:14px;background:rgba(255,255,255,.3);transform-origin:50% 142px}
.cmp-tick.major{height:22px;background:rgba(255,255,255,.6);width:3px}
.cmp-label{position:absolute;font-size:1.4rem;font-weight:900;color:var(--text);transform:translate(-50%,-50%)}
.cmp-label.n{top:32px;left:50%;color:#ff4757}
.cmp-label.s{top:calc(100% - 32px);left:50%}
.cmp-label.e{top:50%;left:calc(100% - 32px)}
.cmp-label.w{top:50%;left:32px}
.cmp-needle{position:absolute;top:50%;left:50%;width:8px;height:108px;transform:translate(-50%,-50%);transform-origin:50% 50%;transition:transform .12s ease-out}
.cmp-needle .n-half{position:absolute;top:0;left:0;width:100%;height:50%;background:linear-gradient(180deg,#ff4757,#c0392b);clip-path:polygon(50% 0,100% 100%,0 100%);border-radius:2px}
.cmp-needle .s-half{position:absolute;bottom:0;left:0;width:100%;height:50%;background:linear-gradient(0deg,rgba(255,255,255,.85),rgba(200,200,200,.6));clip-path:polygon(50% 100%,100% 0,0 0);border-radius:2px}
.cmp-pivot{position:absolute;top:50%;left:50%;width:18px;height:18px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#fff,#888);transform:translate(-50%,-50%);box-shadow:0 2px 6px rgba(0,0,0,.5);z-index:3}
.cmp-arrow{position:absolute;top:14px;left:50%;transform:translateX(-50%);color:var(--accent);font-size:1.2rem;font-weight:900;z-index:4}
.cmp-actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:6px}
.cmp-notice{background:rgba(255,165,2,.12);border:1px solid rgba(255,165,2,.35);border-radius:12px;padding:14px;color:#ffd166;font-size:.88rem;line-height:1.55;display:none;text-align:left}
.cmp-notice.show{display:block}
.cmp-tip{background:var(--glass2);border:1px solid var(--border);border-radius:12px;padding:14px;color:var(--text2);font-size:.85rem;line-height:1.65}
.cmp-tip strong{color:var(--text)}
.cmp-deg-strip{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-top:14px;font-family:monospace;font-size:.78rem}
.cmp-deg-strip span{padding:5px 10px;background:var(--glass2);border:1px solid var(--border);border-radius:6px;color:var(--text2)}
.cmp-deg-strip span.on{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border-color:transparent}

<script>
GZI18n.register({
  en: {
    toolTitle: 'Online Compass',
    toolDesc: 'Turn your phone into a free digital compass. Live magnetic heading in degrees, cardinal direction (N / NE / E / SE / S / SW / W / NW) and a smooth rotating needle. No app install.',
    requestPerm: '🔑 Enable Motion Sensors',

    step1: 'On iPhone, tap "Enable Motion Sensors" and allow access',
    step2: 'Hold your phone flat, away from metal objects and magnets',
    step3: 'The red half of the needle points to magnetic north',
    step4: 'Read your heading in degrees and cardinal direction at the top',
  },
  zh: {
    toolTitle: '在线指南针',
    toolDesc: '把手机变成免费数字指南针。实时显示磁方位角度、八方位（北 / 东北 / 东 / 东南 / 南 / 西南 / 西 / 西北）和流畅旋转的指针。无需安装应用。',
    requestPerm: '🔑 开启运动传感器',
    permDenied: '已拒绝运动传感器权限。点击「开启运动传感器」重试。',
    noSensor: '未检测到磁力计/方向传感器。此指南针适用于带内置磁力传感器的手机和平板。请在移动设备上打开此页面。',
    tipText: '<strong>📱 推荐在手机上使用。</strong> 手机平放，远离金属和磁铁。如指针跳动，可将手机画"8 字"校准磁力计。',
    N:'北', NNE:'东北偏北', NE:'东北', ENE:'东北偏东', E:'东', ESE:'东南偏东', SE:'东南', SSE:'东南偏南',
    S:'南', SSW:'西南偏南', SW:'西南', WSW:'西南偏西', W:'西', WNW:'西北偏西', NW:'西北', NNW:'西北偏北',
    cardinalSub: '磁北方向',
    step1: 'iPhone 用户请点击「开启运动传感器」并允许访问',
    step2: '手机平放，远离金属物体和磁铁',
    step3: '指针红色一端指向磁北方向',
    step4: '在顶部读取你的方位角度和方向',
  }
});

const { $, t } = GZ;
let listening = false;

function showNotice(key){ const n=$('#notice'); n.textContent=t(key); n.classList.add('show'); }
function hideNotice(){ $('#notice').classList.remove('show'); }

function cardinalFromDeg(deg){
  // deg = 0..359 from north, clockwise
  const dirs = ['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];
  const idx = Math.round(deg / 22.5) % 16;
  return t(dirs[idx]);
}

let smoothedHeading = 0;
function shortestAngleDiff(a, b){
  let d = a - b;
  while(d > 180) d -= 360;
  while(d < -180) d += 360;
  return d;
}

function updateUI(heading){
  listening = true;
  hideNotice();
  // smoothing for stability
  smoothedHeading += shortestAngleDiff(heading, smoothedHeading) * 0.35;
  const h = (smoothedHeading + 360) % 360;
  $('#heading').textContent = Math.round(h) + '°';
  $('#cardinal').textContent = cardinalFromDeg(h);
  $('#cardinal-sub').textContent = t('cardinalSub');
  // rose rotates so N stays under the actual north direction; top arrow = where you face
  $('#rose').style.transform = `rotate(${-h}deg)`;
  // needle points north (red half toward N). Since rose already rotates -h, needle stays fixed pointing up.
  // We keep needle pointing up (north) so it visually aligns with the rose's N label.
  // Update degree strip active state
  document.querySelectorAll('#strip span').forEach(s => {
    s.classList.toggle('on', Math.abs(parseInt(s.dataset.d) - Math.round(h/45)*45) < 23);
  });
}

function onAbsolute(e){
  if(e.absolute === false) return; // not absolute, skip
  if(e.alpha == null) return;
  // alpha is compass direction clockwise from north on most Androids in absolute mode
  const heading = (360 - e.alpha) % 360;
  updateUI(heading);
}

function onWebkit(e){
  // iOS provides webkitCompassHeading directly (degrees from north, clockwise)
  if(e.webkitCompassHeading == null) return;
  updateUI(e.webkitCompassHeading);
}

async function requestPermission(){
  const needPerm = (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function');
  if(needPerm){
    try{
      const res = await DeviceOrientationEvent.requestPermission();
      if(res === 'granted'){ startListening(); }
      else { showNotice('permDenied'); }
    }catch(err){ showNotice('permDenied'); }
  } else {
    startListening();
  }
}

function startListening(){
  hideNotice();
  if(!('DeviceOrientationEvent' in window)){ showNotice('noSensor'); return; }
  window.addEventListener('deviceorientationabsolute', onAbsolute, true);
  window.addEventListener('deviceorientation', onWebkit, true);
  setTimeout(() => { if(!listening){ showNotice('noSensor'); } }, 900);
}

// Build degree strip
$('#strip').innerHTML = [0,45,90,135,180,225,270,315].map(d => `<span data-d="${d}">${d}°</span>`).join('');

$('#tip').innerHTML = t('tipText');
$('#toolbar').innerHTML = '';

const isIOS = (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function');
if(isIOS){
  $('#perm-btn').style.display = '';
  $('#perm-btn').textContent = t('requestPerm');
  $('#perm-btn').onclick = requestPermission;
  $('#notice').textContent = t('requestPerm');
  $('#notice').classList.add('show');
} else {
  startListening();
}
