const { $, copyText, t } = GZ;

// Standard namespace UUIDs (RFC 4122 Appendix C)
const NAMESPACES = {
  dns:  '6ba7b810-9dad-11d1-80b4-00c04fd430c8',
  url:  '6ba7b811-9dad-11d1-80b4-00c04fd430c8',
  oid:  '6ba7b812-9dad-11d1-80b4-00c04fd430c8',
  x500: '6ba7b814-9dad-11d1-80b4-00c04fd430c8',
};

let version = 5;
let nsMode = 'dns';
let batchMode = false;

function parseUuidStr(uuidStr) {
  // Returns 16-byte Uint8Array or throws
  const hex = uuidStr.replace(/[^0-9a-fA-F]/g, '');
  if (hex.length !== 32) throw new Error('Invalid UUID (expected 32 hex digits)');
  const bytes = new Uint8Array(16);
  for (let i = 0; i < 16; i++) bytes[i] = parseInt(hex.substr(i*2, 2), 16);
  return bytes;
}

function bytesToUuid(bytes) {
  const hex = [];
  for (let i = 0; i < bytes.length; i++) hex.push(bytes[i].toString(16).padStart(2, '0'));
  const h = hex.join('');
  return h.substr(0,8) + '-' + h.substr(8,4) + '-' + h.substr(12,4) + '-' + h.substr(16,4) + '-' + h.substr(20,12);
}

async function generateUuid(nsStr, nameStr, ver) {
  const nsBytes = parseUuidStr(nsStr);
  const nameBytes = new TextEncoder().encode(nameStr);
  const combined = new Uint8Array(nsBytes.length + nameBytes.length);
  combined.set(nsBytes, 0);
  combined.set(nameBytes, nsBytes.length);

  const algo = ver === 3 ? 'MD5' : 'SHA-1';
  const hashBuf = await crypto.subtle.digest(algo, combined);
  const hash = new Uint8Array(hashBuf);

  // RFC 4122 §4.3: set version and variant bits
  hash[6] = (hash[6] & 0x0f) | (ver << 4);
  hash[8] = (hash[8] & 0x3f) | 0x80;

  return bytesToUuid(hash.subarray(0, 16));
}

async function doGenerate() {
  const nsStr = $('#namespace').value.trim();
  const output = $('#output');
  output.innerHTML = '';
  if (!nsStr) { output.innerHTML = '<span style="color:var(--gz-accent)">⚠ Please enter a namespace UUID</span>'; return; }

  let names;
  if (batchMode) {
    names = $('#names').value.split('\n').map(s => s.trim()).filter(s => s.length > 0);
  } else {
    const n = $('#name').value;
    if (!n) { output.innerHTML = '<span style="color:var(--gz-accent)">⚠ Please enter a name</span>'; return; }
    names = [n];
  }
  if (names.length === 0) { output.innerHTML = '<span style="color:var(--gz-accent)">⚠ Please enter at least one name</span>'; return; }

  try {
    parseUuidStr(nsStr); // validate
  } catch(e) {
    output.innerHTML = '<span style="color:var(--gz-accent)">⚠ ' + e.message + '</span>';
    return;
  }

  const results = [];
  for (const name of names) {
    try {
      const uuid = await generateUuid(nsStr, name, version);
      results.push({ name, uuid });
    } catch(e) {
      output.innerHTML = '<span style="color:var(--gz-accent)">⚠ ' + e.message + '</span>';
      return;
    }
  }

  output.innerHTML = results.map(r =>
    `<div class="uuid-row"><span class="uuid-val">${r.uuid}</span>${r.name ? `<span style="color:var(--text3);font-size:.8rem">${r.name.replace(/</g,'&lt;')}</span>` : ''}<button class="gz-btn gz-btn-secondary" style="padding:2px 8px;font-size:.75rem" onclick="copyText('${r.uuid}')">${t('copy')}</button></div>`
  ).join('');
}

function setVersion(v) { version = v; document.querySelectorAll('.gz-ver-btn').forEach(b => b.classList.toggle('active', +b.dataset.ver === v)); doGenerate(); }
function setNs(m) {
  nsMode = m;
  document.querySelectorAll('.gz-ns-btn').forEach(b => b.classList.toggle('active', b.dataset.ns === m));
  if (NAMESPACES[m]) $('#namespace').value = NAMESPACES[m];
  doGenerate();
}
function toggleBatch() {
  batchMode = !batchMode;
  $('#name').style.display = batchMode ? 'none' : '';
  $('#name-list').style.display = batchMode ? 'block' : 'none';
  doGenerate();
}

function loadExample() {
  nsMode = 'dns'; version = 5;
  $('#namespace').value = NAMESPACES.dns;
  $('#name').value = 'example.com';
  document.querySelectorAll('.gz-ver-btn').forEach(b => b.classList.toggle('active', +b.dataset.ver === 5));
  document.querySelectorAll('.gz-ns-btn').forEach(b => b.classList.toggle('active', b.dataset.ns === 'dns'));
  doGenerate();
}

$('#lbl-ns').textContent = t('lblNs');
$('#lbl-name').textContent = t('lblName');
$('#lbl-count').innerHTML = `${t('lblCount')}: <label style="margin-left:8px"><input type="radio" name="batch" checked onchange="toggleBatch()"> ${t('modeSingle')}</label> <label><input type="radio" name="batch" onchange="toggleBatch()"> ${t('modeBatch')}</label>`;

$('#namespace').value = NAMESPACES.dns;
$('#name').value = 'example.com';

function copyAllResults() {
  const vals = [...document.querySelectorAll('.uuid-val')].map(e => e.textContent);
  if (vals.length) copyText(vals.join('\n'));
}

});

$('#namespace').addEventListener('input', doGenerate);
$('#name').addEventListener('input', doGenerate);
$('#names').addEventListener('input', doGenerate);

// Initial generate
doGenerate();
</script>
