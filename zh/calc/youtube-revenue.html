<script>
GZI18n.register({
  en: {
    toolTitle: 'YouTube Revenue Calculator',
    toolDesc: 'Estimate YouTube ad revenue from views, niche and audience region. Calculate CPM, RPM, daily / monthly / yearly earnings with regional CPM benchmarks.',
    lblViews: 'Views (per period)', lblNiche: 'Content niche', lblRegion: 'Audience region', lblPeriod: 'Time period',
    lblMonthly: 'Earnings over time',
    lblRegions: 'CPM by region (USD)',
    daily: 'Daily', monthly: 'Monthly', yearly: 'Yearly', per: 'per',
    earnedViews: 'Monetized views (after ad-block & non-skips)', cpm: 'CPM (advertiser cost)', rpm: 'RPM (your revenue per 1000 views)',
    totalEarnings: 'Total earnings', adShare: 'YouTube keeps 45%, you get 55%',
    period: 'Period', views: 'Views', earnings: 'Earnings',
    tip: 'Tip: The biggest revenue levers are audience region (US/UK viewers pay 5-10x more than India/Brazil) and niche (finance/business CPMs are 4-5x entertainment). Targeting English-speaking countries and high-CPM niches is usually the fastest path to scaling YouTube revenue.',
    step1: 'Enter your average daily/monthly/yearly views',
    step2: 'Pick the content niche that best matches your channel',
    step3: 'Choose the dominant audience region (where most viewers are from)',
    step4: 'See your projected earnings, CPM/RPM and how much YouTube takes',
  },
  zh: {
    toolTitle: 'YouTube 收入计算器',
    toolDesc: '根据观看量、内容方向和受众地区估算 YouTube 广告收入。计算 CPM、RPM 以及每日/每月/每年的收入，含各地区 CPM 对比。',
    lblViews: '观看量 (每周期)', lblNiche: '内容方向', lblRegion: '受众地区', lblPeriod: '时间周期',
    lblMonthly: '各周期收入',
    lblRegions: '各地区 CPM (美元)',
    daily: '每日', monthly: '每月', yearly: '每年', per: '/',
    earnedViews: '可变现观看 (扣除广告拦截)', cpm: 'CPM (广告主成本)', rpm: 'RPM (每千次播放收入)',
    totalEarnings: '总收入', adShare: 'YouTube 抽成 45%，创作者得 55%',
    period: '周期', views: '观看量', earnings: '收入',
    tip: '提示：影响收入最大的两个杠杆是受众地区（美英观众比印度/巴西高 5-10 倍）和内容方向（金融/商业 CPM 是娱乐的 4-5 倍）。',
    step1: '输入平均每天/每月/每年的观看量',
    step2: '选择最匹配的内容方向',
    step3: '选择主要的受众地区',
    step4: '查看估算收入、CPM/RPM 和 YouTube 抽成',
  }
});

const { $, t } = GZ;

// Niche CPM multipliers (relative to base)
const NICHE = {
  finance: 12, tech: 9, health: 8, education: 7, beauty: 6,
  gaming: 4, entertainment: 3, music: 2.5, kids: 1.5, food: 5, travel: 6, shorts: 0.07, other: 4
};
// Region base CPM (USD)
const REGION = {
  us: 9, uk: 8, ca: 7, au: 7, de: 6, no: 9, jp: 5, kr: 4, br: 1.5, in: 0.8, global: 3.5
};
const REGION_LABELS = {
  us: '🇺🇸 United States', uk: '🇬🇧 United Kingdom', ca: '🇨🇦 Canada', au: '🇦🇺 Australia',
  de: '🇩🇪 Germany', no: '🇳🇴 Norway', jp: '🇯🇵 Japan', kr: '🇰🇷 South Korea',
  br: '🇧🇷 Brazil', in: '🇮🇳 India', global: '🌍 Global Avg'
};
const NICHE_LABELS = {
  finance: '💰 Finance / Business', tech: '💻 Tech / Software', health: '🏥 Health / Fitness',
  education: '🎓 Education', beauty: '💄 Beauty / Fashion', gaming: '🎮 Gaming',
  entertainment: '🎬 Entertainment / Vlog', music: '🎵 Music', kids: '🧒 Kids / Family',
  food: '🍔 Food / Cooking', travel: '✈️ Travel', shorts: '📱 YouTube Shorts', other: '📊 Other / General'
};

function fmt(n){
  return '$' + n.toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2});
}
function fmtInt(n){
  return Math.round(n).toLocaleString();
}

function calc(){
  const views = +$('#views').value;
  const niche = $('#niche').value;
  const region = $('#region').value;
  const period = $('#period').value;

  // Base CPM = region base * niche factor
  let cpm = REGION[region] * NICHE[niche];
  // YouTube takes 45%, so creator RPM ≈ CPM * 0.55
  let rpm = cpm * 0.55;
  // Ad-blocker / non-skipped rate ≈ 65% monetized
  let monetizedRate = niche === 'shorts' ? 0.95 : 0.65;
  const monetized = views * monetizedRate;
  const earnings = (monetized / 1000) * rpm;
  const youTubeTakes = earnings * (45/55);
  const advertiserPaid = (monetized / 1000) * cpm;

  const summary = [
    { num: fmt(earnings), lbl: t('totalEarnings') + ' (' + t(period) + ')', big: true },
    { num: fmt(rpm.toFixed(2)), lbl: t('rpm') },
    { num: fmt(cpm.toFixed(2)), lbl: t('cpm') },
    { num: fmtInt(monetized), lbl: t('earnedViews') },
    { num: fmtInt(views), lbl: t('views') },
    { num: fmt(youTubeTakes), lbl: t('adShare') }
  ];
  $('#summary').innerHTML = summary.map(s => `<div class="yt-tile ${s.big?'big':''}"><div class="num">${s.num}</div><div class="lbl">${s.lbl}</div></div>`).join('');

  // Earnings over different periods
  const daily = earnings;
  const monthly = daily * 30;
  const yearly = daily * 365;
  $('#period-table').innerHTML = `
    <thead><tr><th>${t('period')}</th><th style="text-align:right">${t('views')}</th><th style="text-align:right">${t('earnings')}</th></tr></thead>
    <tbody>
      <tr><td>${t('daily')}</td><td style="text-align:right">${fmtInt(views)}</td><td>${fmt(daily)}</td></tr>
      <tr><td>${t('monthly')}</td><td style="text-align:right">${fmtInt(views * 30)}</td><td>${fmt(monthly)}</td></tr>
      <tr><td>${t('yearly')}</td><td style="text-align:right">${fmtInt(views * 365)}</td><td>${fmt(yearly)}</td></tr>
    </tbody>
  `;

  // Regions
  const regions = Object.keys(REGION).map(k => ({
    k, cpm: REGION[k] * NICHE[niche], rpm: REGION[k] * NICHE[niche] * 0.55
  })).sort((a, b) => b.rpm - a.rpm);
  $('#regions').innerHTML = regions.map(r => `
    <div class="yt-region-card">
      <div>
        <div class="name">${REGION_LABELS[r.k]}</div>
        <div style="font-size:.75em;color:var(--text2)">CPM: ${fmt(r.cpm.toFixed(2))}</div>
      </div>
      <div class="cpm">${fmt(r.rpm.toFixed(2))}</div>
    </div>
  `).join('');

  $('#tip').textContent = t('tip');
}

['views','niche','region','period'].forEach(id => {
  document.getElementById(id).addEventListener('input', calc);
  document.getElementById(id).addEventListener('change', calc);
});

$('#lbl-views').textContent = t('lblViews');
$('#lbl-niche').textContent = t('lblNiche');
$('#lbl-region').textContent = t('lblRegion');
$('#lbl-period').textContent = t('lblPeriod');
$('#lbl-monthly').textContent = t('lblMonthly');
$('#lbl-regions').textContent = t('lblRegions');

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🪙', href:'/calc/crypto-profit-calculator.html', name:'Crypto Profit'},
    {icon:'📺', href:'/text/youtube-tag-generator.html', name:'YouTube Tags'},
    {icon:'📺', href:'/text/youtube-title-checker.html', name:'YouTube Title'},
    {icon:'💰', href:'/calc/roi.html', name:'ROI'},
  ]
});

calc();
</script>
