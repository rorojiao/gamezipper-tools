const { $, t, copyText, showToast } = GZ;

const FIELDS = {
  book: ['authors','year','title','edition','publisher','city','isbn'],
  journal: ['authors','year','title','journal','volume','issue','pages','doi'],
  website: ['authors','date','title','site','url','access'],
  newspaper: ['authors','date','title','publisher','pages','url','access'],
};

// Helpers
function parseAuthors(str){
  return (str || '').split('\n').map(s => s.trim()).filter(Boolean).map(line => {
    const m = line.match(/^(.+?),\s*(.+)$/);
    if (m) return { last: m[1].trim(), first: m[2].trim() };
    const parts = line.split(/\s+/);
    if (parts.length >= 2) return { last: parts[parts.length-1], first: parts.slice(0,-1).join(' ') };
    return { last: line, first: '' };
  });
}
function initials(name){
  return name.split(/[\s.-]+/).filter(Boolean).map(p => p[0].toUpperCase()+'.').join(' ');
}
// Style-specific author formatting
function fmtAuthors(authors, style){
  if (!authors.length) return '';
  if (style === 'apa') {
    const fmt = a => `${a.last}, ${initials(a.first)}`;
    if (authors.length === 1) return fmt(authors[0]);
    if (authors.length === 2) return `${fmt(authors[0])}, & ${fmt(authors[1])}`;
    if (authors.length <= 20) {
      const all = authors.map(fmt);
      return all.slice(0,-1).join(', ') + ', & ' + all[all.length-1];
    }
    return authors.slice(0,19).map(fmt).join(', ') + ' . . . ' + fmt(authors[authors.length-1]);
  }
  if (style === 'mla') {
    const fmt = a => `${a.last}, ${a.first}`;
    if (authors.length === 1) return fmt(authors[0]);
    if (authors.length === 2) return `${fmt(authors[0])}, and ${authors[1].first} ${authors[1].last}`;
    if (authors.length >= 3) return `${fmt(authors[0])}, et al.`;
  }
  if (style === 'chicago') {
    const fmt = (a, idx) => idx === 0 ? `${a.last}, ${a.first}` : `${a.first} ${a.last}`;
    if (authors.length === 1) return fmt(authors[0], 0);
    if (authors.length === 2) return `${fmt(authors[0],0)}, and ${fmt(authors[1],1)}`;
    if (authors.length === 3) return `${fmt(authors[0],0)}, ${fmt(authors[1],1)}, and ${fmt(authors[2],1)}`;
    return `${fmt(authors[0],0)} et al.`;
  }
  if (style === 'harvard') {
    const fmt = a => `${a.last}, ${initials(a.first)}`;
    if (authors.length === 1) return fmt(authors[0]);
    if (authors.length === 2) return `${fmt(authors[0])} and ${fmt(authors[1])}`;
    if (authors.length >= 3) return authors.slice(0,3).map(fmt).join(', ') + ' et al.';
  }
  return '';
}
function escapeHTML(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function italic(s){ return `<i>${escapeHTML(s)}</i>`; }

function buildCitation(d, style){
  const authors = fmtAuthors(d.authors || [], style);
  const st = d.sourceType;
  if (st === 'book') {
    const ed = d.edition ? ` (${d.edition} ed.).` : '.';
    const yr = d.year ? ` (${d.year}).` : '';
    const pub = [d.city, d.publisher].filter(Boolean).join(': ') + '.';
    const isbn = d.isbn ? ` ISBN ${d.isbn}.` : '';
    if (style === 'mla') {
      return `${authors}. ${italic(d.title)}.` + (d.edition ? ` ${d.edition} ed.,` : '') + ` ${[d.publisher, d.year].filter(Boolean).join(', ')}.` + isbn;
    }
    return [authors, yr, `${italic(d.title)}${ed}`, pub + isbn].filter(Boolean).join(' ');
  }
  if (st === 'journal') {
    const yr = d.year ? ` (${d.year}).` : '.';
    const vol = d.volume ? italic(d.volume) : '';
    const iss = d.issue ? `(${d.issue})` : '';
    const pages = d.pages ? `, ${d.pages}.` : '.';
    const doi = d.doi ? ` https://doi.org/${d.doi.replace(/^https?:\/\/doi\.org\//i,'')}` : '';
    if (style === 'mla') {
      return `${authors}. "${d.title}." ${italic(d.journal || '')}, ` + `vol. ${d.volume||''}, no. ${d.issue||''}, ${d.year||''}, pp. ${d.pages||''}.` + doi;
    }
    if (style === 'chicago') {
      return `${authors}. "${d.title}." ${italic(d.journal||'')} ${d.volume||''}` + (d.issue?`, no. ${d.issue}`:'') + ` (${d.year||''}): ${d.pages||''}.` + doi;
    }
    return [authors, yr, `"${d.title}."`, `${italic(d.journal||'')}, ${vol}${iss}${pages}` + doi].filter(Boolean).join(' ');
  }
  if (st === 'website') {
    const date = d.date || '';
    if (style === 'mla') {
      return `${authors || italic(d.site||'')}. "${d.title}." ${italic(d.site||'')}, ${date}, ${d.url||''}.` + (d.access?` Accessed ${d.access}.`:'');
    }
    if (style === 'chicago') {
      return `${authors || d.site||''}. "${d.title}." ${italic(d.site||'')}. ${date}. ${d.url||''}.`;
    }
    // APA / Harvard
    const yr = date ? ` (${date}).` : ' (n.d.).';
    const siteBit = d.site ? `${italic(d.site)}. ` : '';
    return [authors, yr, `"${d.title}."`, siteBit + (d.url||'')].filter(Boolean).join(' ') + (d.access?` Retrieved ${d.access}, from ` + (d.url||'') : '');
  }
  if (st === 'newspaper') {
    if (style === 'mla') {
      return `${authors}. "${d.title}." ${italic(d.publisher||'')}, ${d.date||''}, ${d.pages||''}.` + (d.url?` ${d.url}.`:'');
    }
    return `${authors}. (${d.date||d.year||''}). "${d.title}." ${italic(d.publisher||'')}${d.pages?', pp. '+d.pages+'.':'.'} ${d.url||''}`;
  }
  return '';
}

let currentSource = 'book';
let savedList = [];
try { savedList = JSON.parse(localStorage.getItem('bg-list') || '[]'); } catch(e){ savedList = []; }

function renderForm(){
  const fields = FIELDS[currentSource];
  $('#form').innerHTML = fields.map(f => {
    const lbl = t('f' + f.charAt(0).toUpperCase() + f.slice(1));
    const isLong = f === 'authors';
    const tag = isLong ? 'textarea' : 'input';
    const extra = isLong ? ' rows="2"' : '';
    return `<div class="bg-field"><label>${lbl}</label><${tag} id="f-${f}" data-f="${f}" oninput="updatePreview()"${extra}></${tag}></div>`;
  }).join('');
}

function readForm(){
  const d = { sourceType: currentSource };
  FIELDS[currentSource].forEach(f => {
    const el = $('#f-'+f);
    if (el) {
      const v = el.value.trim();
      if (f === 'authors') d.authors = parseAuthors(v);
      else d[f] = v;
    }
  });
  return d;
}

function updatePreview(){
  const d = readForm();
  const style = $('#style').value;
  const out = buildCitation(d, style);
  $('#preview').innerHTML = out ? escapeHTML(out).replace(/&lt;i&gt;/g,'<i>').replace(/&lt;\/i&gt;/g,'</i>') : '—';
}
window.updatePreview = updatePreview;

function loadExample(){
  currentSource = $('#sourceType').value;
  const ex = {
    book: { authors: 'Gladwell, Malcolm', year: '2008', title: 'Outliers: The Story of Success', edition: '1st', publisher: 'Little, Brown and Company', city: 'New York', isbn: '9780316017930' },
    journal: { authors: 'Smith, Jane\nDoe, John', year: '2023', title: 'Effects of caffeine on memory recall', journal: 'Journal of Cognitive Science', volume: '45', issue: '2', pages: '112-128', doi: '10.1000/jcs.2023.001' },
    website: { authors: 'National Geographic', date: '2024-03-15', title: 'Why coral reefs matter', site: 'National Geographic', url: 'https://www.nationalgeographic.com/environment/article/coral-reefs', access: '2026-06-25' },
    newspaper: { authors: 'Lee, Samantha', date: '2026-05-10', title: 'City unveils new climate plan', publisher: 'The Daily Chronicle', pages: 'A1-A3', url: 'https://example.com/news/climate-plan' },
  };
  const data = ex[currentSource];
  FIELDS[currentSource].forEach(f => {
    const el = $('#f-'+f);
    if (el && data[f] !== undefined) el.value = data[f];
  });
  updatePreview();
}

function renderList(){
  if (!savedList.length) {
    $('#list').innerHTML = `<div class="bg-list-empty">${t('listEmpty')}</div>`;
    $('#listActions').style.display = 'none';
    return;
  }
  const style = $('#style').value;
  const sorted = savedList.slice().sort((a,b) => {
    const an = (a.authors[0]?.last || a.title || '').toLowerCase();
    const bn = (b.authors[0]?.last || b.title || '').toLowerCase();
    return an.localeCompare(bn);
  });
  $('#list').innerHTML = sorted.map((d, i) => {
    const cit = buildCitation(d, style);
    const pretty = cit.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/&lt;i&gt;/g,'<i>').replace(/&lt;\/i&gt;/g,'</i>');
    const typeLbl = { book:'📕', journal:'📄', website:'🌐', newspaper:'📰' }[d.sourceType] || '📚';
    return `<div class="bg-item">
      <div class="num">${i+1}</div>
      <div class="body">${pretty}<div class="meta">${typeLbl} ${d.sourceType} • ${style.toUpperCase()}</div></div>
      <div class="actions">
        <button onclick="copyItem('${(cit.replace(/'/g,"\\'")).replace(/"/g,'&quot;')}')" title="Copy">📋</button>
        <button onclick="removeItem('${d.id}')" title="Remove">🗑</button>
      </div>
    </div>`;
  }).join('');
  $('#listActions').style.display = '';
}
window.copyItem = function(text){ copyText(text); showToast('✓ Copied'); };
window.removeItem = function(id){
  savedList = savedList.filter(d => d.id !== id);
  localStorage.setItem('bg-list', JSON.stringify(savedList));
  renderList();
};

$('#sourceType').onchange = function(){ currentSource = this.value; renderForm(); updatePreview(); };
$('#style').onchange = function(){ updatePreview(); renderList(); };
$('#btnAdd').onclick = function() {
  const d = readForm();
  if (!d.title && !d.authors.length) { showToast('⚠ Fill at least a title or author'); return; }
  d.id = 'c' + Date.now() + Math.random().toString(36).slice(2,7);
  savedList.push(d);
  localStorage.setItem('bg-list', JSON.stringify(savedList));
  renderList();
  showToast('✓ Added to list');
  // reset form
  FIELDS[currentSource].forEach(f => { const el = $('#f-'+f); if (el) el.value=''; });
  updatePreview();
};
$('#btnCopy').onclick = function() {
  const d = readForm();
  const cit = buildCitation(d, $('#style').value);
  if (!cit) return;
  copyText(cit);
  showToast('✓ Copied');
};
$('#btnExample').onclick = loadExample;
$('#btnReset').onclick = function() {
  FIELDS[currentSource].forEach(f => { const el = $('#f-'+f); if (el) el.value=''; });
  updatePreview();
};
$('#btnExport').onclick = function() {
  if (!savedList.length) return;
  const style = $('#style').value;
  const sorted = savedList.slice().sort((a,b) => {
    const an = (a.authors[0]?.last || a.title || '').toLowerCase();
    const bn = (b.authors[0]?.last || b.title || '').toLowerCase();
    return an.localeCompare(bn);
  });
  const out = sorted.map(d => buildCitation(d, style)).join('\n\n');
  copyText(out);
  showToast('✓ List copied to clipboard');
};
$('#btnClear').onclick = function() {
  if (!confirm('Clear the whole bibliography list?')) return;
  savedList = [];
  localStorage.removeItem('bg-list');
  renderList();
};

  $('#lbl-source').textContent = t('lblSource');

  renderForm();

}
