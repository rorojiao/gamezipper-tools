<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "How do you play Mastermind?", "acceptedAnswer": {"@type": "Answer", "text": "The computer secretly picks a sequence of colored pegs. On each turn you place a row of colored pegs as your guess and press Check. You get black pegs for each correct color in the correct position, and white pegs for a correct color in the wrong position. Crack the full code within the turn limit to win."}}, {"@type": "Question", "name": "What do the black and white feedback pegs mean?", "acceptedAnswer": {"@type": "Answer", "text": "A black peg means one of your guessed pegs is the right color AND in the right position. A white peg means a peg is the right color but in the wrong position. The feedback never tells you which specific peg is correct, only how many — that is the puzzle."}}, {"@type": "Question", "name": "How many guesses do I get?", "acceptedAnswer": {"@type": "Answer", "text": "You get 10 guesses for a 4-peg code, 12 for a 5-peg code, and 14 for a 6-peg code. Each guess gives you feedback to logically deduce the secret before you run out of turns."}}, {"@type": "Question", "name": "Can colors repeat in the secret code?", "acceptedAnswer": {"@type": "Answer", "text": "By default colors do not repeat, which makes the puzzle friendlier for beginners. You can toggle Allow duplicate colors in the difficulty settings for a much harder classic Mastermind challenge."}}]}</script>

<body>
<div class="gz-container">

            <option value="4" selected>4</option>

            <option value="6">6</option>
          </select>
        </label>
        <label><input type="checkbox" id="dupChk" onchange="newGame()"> <span id="lblDup"></span></label>
      </div>
      <div class="mm-board" id="board"></div>

      <div class="mm-palette" id="palette"></div>
      <div style="display:flex;gap:8px">
        <button class="gz-btn" id="btnCheck" onclick="checkRow()">✓ <span id="lblCheck"></span></button>
        <button class="gz-btn gz-btn-secondary" id="btnClear" onclick="clearRow()">↺ <span id="lblClear"></span></button>

<script>
GZI18n.register({
  en: {
    toolTitle: 'Mastermind Code Breaker',
    toolDesc: 'Crack the secret color code using logic and deduction. Get black and white peg feedback on every guess.',
    btnNew: '↻ New Game',
    lblPegs: 'Pegs',
    lblDup: 'Allow duplicate colors',
    lblCheck: 'Check',
    lblClear: 'Clear row',
    msgTurn: 'Place your pegs and press Check',
    msgWin: (n) => `🎉 Cracked it in ${n} ${n===1?'guess':'guesses'}!`,
    msgLose: (c) => `Out of guesses! The code was ${c}.`,
    step1: 'Click a color in the palette, then click a peg slot to place it',
    step2: 'Fill the whole row, then press Check to get feedback',
    step3: 'Black peg = right color & position · White peg = right color, wrong spot',
    step4: 'Deduce the secret code before you run out of guesses',
  },
  zh: {
    toolTitle: 'Mastermind 破译大师',
    toolDesc: '运用逻辑与推理破解秘密颜色密码。每次猜测都会得到黑色和白色提示钉的反馈。',
    btnNew: '↻ 新游戏',
    lblPegs: '钉数',
    lblDup: '允许颜色重复',
    lblCheck: '检查',
    lblClear: '清空',
    msgTurn: '放置彩钉后点击「检查」',
    msgWin: (n) => `🎉 你用 ${n} 次猜中了密码！`,
    msgLose: (c) => `机会用完了！密码是 ${c}。`,
    step1: '点击调色板中的颜色，再点击钉位放置',
    step2: '填满整行后点击「检查」获取反馈',
    step3: '黑钉 = 颜色与位置都对 · 白钉 = 颜色对但位置错',
    step4: '在机会用完前推理出完整密码',
  }
});

const { $, t } = GZ;
const COLORS = [
  {h:'#e94560',n:'R'},{h:'#00d672',n:'G'},{h:'#61afef',n:'B'},
  {h:'#ffc107',n:'Y'},{h:'#9b59b6',n:'P'},{h:'#ff9800',n:'O'},
  {h:'#00bcd4',n:'C'},{h:'#795548',n:'N'},
];
let pegs = 4, allowDup = false, secret = [], current = [], rows = [], maxGuesses = 10, over = false;

function rnd(n){ const a=new Uint32Array(1); (window.crypto&&crypto.getRandomValues?crypto.getRandomValues(a):a[0]=Math.random()*4294967296); return a[0]%n; }

function newGame(){
  pegs = +$('#pegSel').value;
  allowDup = $('#dupChk').checked;
  maxGuesses = pegs===4?10:pegs===5?12:14;
  const pool = COLORS.slice(0, Math.min(8, Math.max(pegs+2, 6)));
  secret = [];
  const avail = pool.slice();
  for(let i=0;i<pegs;i++){
    if(allowDup){ secret.push(pool[rnd(pool.length)]); }
    else { const idx = rnd(avail.length); secret.push(avail.splice(idx,1)[0]); }
  }
  current = new Array(pegs).fill(null);
  rows = []; over = false;
  renderPalette(pool);
  renderBoard();
  $('#msg').textContent = t('msgTurn'); $('#msg').className = 'mm-msg';
}

function renderPalette(pool){
  $('#palette').innerHTML = pool.map(c =>
    `<div class="mm-color" style="background:${c.h}" onclick="pickColor('${c.n}')" title="${c.n}"></div>`).join('');
}

let picked = null;
function pickColor(n){ picked = n; }

function setPeg(i){
  if(over) return;
  if(!picked) return;
  current[i] = COLORS.find(c=>c.n===picked);
  renderBoard();
}

function clearRow(){ if(over) return; current = new Array(pegs).fill(null); renderBoard(); }

function renderBoard(){
  let html = '';
  // past rows
  for(const r of rows){
    html += `<div class="mm-row"><div class="mm-pegs">${r.guess.map(p=>`<div class="mm-peg" style="background:${p?p.h:'transparent'}"></div>`).join('')}</div><div class="mm-feedback">${renderFB(r.fb)}</div></div>`;
  }
  // active row
  if(!over){
    html += `<div class="mm-row active"><div class="mm-pegs">${current.map((p,i)=>`<div class="mm-peg ${p?'':'empty'}" ${p?`style="background:${p.h}"`:''} onclick="setPeg(${i})">${p?'':'+'}</div>`).join('')}</div><div class="mm-feedback">${renderFB(new Array(pegs).fill('n'))}</div></div>`;
  }
  $('#board').innerHTML = html;
}

function renderFB(fb){
  return fb.map(f=>`<div class="mm-fb ${f}"></div>`).join('');
}

function checkRow(){
  if(over) return;
  if(current.some(p=>!p)) return;
  let black = 0, white = 0;
  const g = current.map(p=>p.n), s = secret.map(p=>p.n);
  const gRem = [], sRem = [];
  for(let i=0;i<pegs;i++){ if(g[i]===s[i]){ black++; } else { gRem.push(g[i]); sRem.push(s[i]); } }
  for(const c of gRem){ const idx = sRem.indexOf(c); if(idx>=0){ white++; sRem.splice(idx,1); } }
  const fb = [];
  for(let i=0;i<black;i++) fb.push('b');
  for(let i=0;i<white;i++) fb.push('w');
  while(fb.length < pegs) fb.push('n');
  rows.push({guess:current.slice(), fb});
  const tries = rows.length;
  if(black === pegs){
    over = true;
    $('#msg').textContent = t('msgWin', tries); $('#msg').className = 'mm-msg win';
  } else if(tries >= maxGuesses){
    over = true;
    $('#msg').textContent = t('msgLose', secret.map(p=>p.n).join(' ')); $('#msg').className = 'mm-msg lose';
  } else {
    current = new Array(pegs).fill(null);
    $('#msg').textContent = t('msgTurn'); $('#msg').className = 'mm-msg';
  }
  renderBoard();
}

$('#toolbar').innerHTML = `<button class="gz-btn gz-btn-secondary" onclick="newGame()">${t('btnNew')}</button>`;
$('#lblPegs').textContent = GZI18n.getLang()==='zh'?'钉数':'Pegs';
$('#lblDup').textContent = t('lblDup');
$('#lblCheck').textContent = t('lblCheck');
$('#lblClear').textContent = t('lblClear');

GZ.renderToolPage({
  category: 'fun',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🔢', href:'/fun/guess-the-number.html', name:'Guess the Number'},
    {icon:'🧩', href:'/fun/nonogram.html', name:'Nonogram'},
    {icon:'🟦', href:'/fun/sudoku.html', name:'Sudoku'},
    {icon:'🧠', href:'/fun/trivia-quiz.html', name:'Trivia Quiz'},
  ]
});
newGame();
</script>
