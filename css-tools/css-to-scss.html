const { $, copyText, t } = GZ;

function convertCssToScss(css) {
  // Step 1: Parse CSS rules
  const rules = [];
  let cleaned = css.replace(/\/\*[\s\S]*?\*\//g, '').trim();

  // Extract rules: selector { props }
  const ruleRegex = /([^{}]+)\{([^{}]*)\}/g;
  let m;
  while ((m = ruleRegex.exec(cleaned)) !== null) {
    const selectors = m[1].trim().split(',').map(s => s.trim()).filter(Boolean);
    const props = m[2].trim();
    if (selectors.length && props) {
      rules.push({ selectors, props });
    }
  }

  if (!rules.length) return css;

  // Step 2: Find repeated values → extract as variables
  const valueCounts = {};
  rules.forEach(r => {
    r.props.split(';').forEach(p => {
      const colonIdx = p.indexOf(':');
      if (colonIdx < 0) return;
      const val = p.slice(colonIdx + 1).trim();
      if (val && val.length > 2 && /^#|^rgba|^hsl|^rgb|^\d+px$|^\d+rem$|^\d+em$/.test(val)) {
        valueCounts[val] = (valueCounts[val] || 0) + 1;
      }
    });
  });

  const variables = {};
  let varCounter = 0;
  Object.entries(valueCounts).forEach(([val, count]) => {
    if (count >= 2) {
      varCounter++;
      let name = '';
      // Try to infer name from first property using this value
      for (const r of rules) {
        for (const p of r.props.split(';')) {
          const ci = p.indexOf(':');
          if (ci < 0) continue;
          if (p.slice(ci + 1).trim() === val) {
            const prop = p.slice(0, ci).trim();
            if (prop === 'color') name = 'text-color';
            else if (prop === 'background-color' || prop === 'background') name = 'bg-color';
            else if (prop === 'font-size') name = 'font-size';
            else if (prop === 'font-family') name = 'font-family';
            else if (prop === 'border-color') name = 'border-color';
            else if (prop === 'border-radius') name = 'border-radius';
            else if (prop === 'margin') name = 'margin';
            else if (prop === 'padding') name = 'padding';
            else name = prop.replace(/[^a-z0-9]/g, '-');
            break;
          }
        }
        if (name) break;
      }
      if (!name) name = `value-${varCounter}`;
      const uniqueName = name + (variables[name] ? '-' + varCounter : '');
      variables[val] = `$${uniqueName}`;
    }
  });

  // Step 3: Build nesting tree
  const tree = {};
  rules.forEach(r => {
    const selector = r.selectors[0]; // handle first selector for nesting
    const parts = selector.split(/\s+/);

    // Replace variable values in props
    let processedProps = r.props;
    Object.entries(variables).forEach(([val, varName]) => {
      processedProps = processedProps.split(val).join(varName);
    });

    let node = tree;
    for (let i = 0; i < parts.length; i++) {
      const part = parts[i];
      if (!node[part]) node[part] = { __props: '', __children: {} };
      if (i === parts.length - 1) {
        node[part].__props = processedProps;
      }
      node = node[part].__children;
    }
  });

  // Step 4: Generate SCSS output
  let output = '';

  // Variables
  if (Object.keys(variables).length) {
    output += '// Variables\n';
    Object.entries(variables).forEach(([val, name]) => {
      output += `${name}: ${val};\n`;
    });
    output += '\n';
  }

  function renderNode(node, indent) {
    let result = '';
    const pad = '  '.repeat(indent);
    Object.entries(node).forEach(([sel, data]) => {
      if (!data.__props && Object.keys(data.__children).length === 0) return;
      result += `${pad}${sel} {\n`;
      if (data.__props) {
        data.__props.split(';').filter(p => p.trim()).forEach(p => {
          result += `${pad}  ${p.trim()};\n`;
        });
      }
      if (Object.keys(data.__children).length) {
        if (data.__props) result += '\n';
        result += renderNode(data.__children, indent + 1);
      }
      result += `${pad}}\n`;
    });
    return result;
  }

  output += renderNode(tree, 0);
  return output;
}
