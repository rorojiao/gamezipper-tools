<script>
GZI18n.register({
  en: {
    toolTitle: 'Color Shades and Tints',
    toolDesc: 'Generate 11 lighter tints (with white) and 11 darker shades (with black) from any color. Click any swatch to copy HEX.',
    tints: '🔆 Tints (lighter)',
    shades: '🌑 Shades (darker)',
    randomize: 'Randomize',
    step1: 'Pick a base color using the color picker or paste a HEX value',
    step2: 'The 11 tints and 11 shades are generated instantly with 10% increments',
    step3: 'Click any swatch to copy its HEX value to your clipboard',
    step4: 'Use the result in Tailwind CSS, Material UI or your design system',
  },
  zh: {
    toolTitle: '颜色明暗生成器',
    toolDesc: '从任意颜色生成 11 个更亮的浅色（加白）和 11 个更深的暗色（加黑）。点击任意色板复制 HEX。',
    tints: '🔆 浅色（加白）',
    shades: '🌑 暗色（加黑）',
    randomize: '随机',
    step1: '使用颜色选择器或粘贴 HEX 值选择基础颜色',
    step2: '即时生成 11 个浅色和 11 个暗色，每步 10%',
    step3: '点击任意色板将其 HEX 值复制到剪贴板',
    step4: '将结果用于 Tailwind CSS、Material UI 或你的设计系统',
  }
});

const { $, copyText, t } = GZ;

function normalizeHex(v) {
  if (!v) return '#000000';
  v = v.trim();
  if (!v.startsWith('#')) v = '#' + v;
  if (/^#[0-9a-fA-F]{3}$/.test(v)) v = '#' + v[1]+v[1]+v[2]+v[2]+v[3]+v[3];
  if (!/^#[0-9a-fA-F]{6}$/.test(v)) return null;
  return v.toUpperCase();
}
function hexToRgb(hex) {
  hex = hex.replace('#', '');
  return { r: parseInt(hex.slice(0,2),16), g: parseInt(hex.slice(2,4),16), b: parseInt(hex.slice(4,6),16) };
}
function rgbToHex({r,g,b}) {
  const h = n => Math.max(0, Math.min(255, Math.round(n))).toString(16).padStart(2,'0');
  return '#' + (h(r) + h(g) + h(b)).toUpperCase();
}
function blend(c1, c2, t) {
  return { r: c1.r*(1-t)+c2.r*t, g: c1.g*(1-t)+c2.g*t, b: c1.b*(1-t)+c2.b*t };
}
function relLuminance({r,g,b}) {
  const f = c => { c/=255; return c<=0.03928 ? c/12.92 : Math.pow((c+0.055)/1.055, 2.4); };
  return 0.2126*f(r)+0.7152*f(g)+0.0722*f(b);
}

function makeStep(base, white, ratio, name) {
  const mixed = blend(base, white, ratio);
  const hex = rgbToHex(mixed);
  const lum = relLuminance(mixed);
  const textColor = lum > 0.5 ? '#000' : '#fff';
  return { hex, name, ratio, textColor };
}

function render() {
  const baseHex = normalizeHex($('#c1-hex').value) || '#000000';
  $('#c1').value = baseHex;
  const base = hexToRgb(baseHex);
  const white = { r: 255, g: 255, b: 255 };
  const black = { r: 0, g: 0, b: 0 };

  const tints = $('#tints');
  tints.innerHTML = '';
  for (let i = 1; i <= 11; i++) {
    const step = makeStep(base, white, i*0.1, `+${i*10}% White`);
    const d = document.createElement('div');
    d.className = 'cst-step';
    d.style.background = step.hex;
    d.style.color = step.textColor;
    d.innerHTML = `<span class="pct">${(i*10)}%</span><div class="name">${step.name}</div><div class="hex">${step.hex}</div>`;
    d.title = 'Click to copy HEX';
    d.onclick = () => copyText(step.hex);
    tints.appendChild(d);
  }

  const shades = $('#shades');
  shades.innerHTML = '';
  for (let i = 1; i <= 11; i++) {
    const step = makeStep(base, black, i*0.1, `+${i*10}% Black`);
    const d = document.createElement('div');
    d.className = 'cst-step';
    d.style.background = step.hex;
    d.style.color = step.textColor;
    d.innerHTML = `<span class="pct">${(i*10)}%</span><div class="name">${step.name}</div><div class="hex">${step.hex}</div>`;
    d.title = 'Click to copy HEX';
    d.onclick = () => copyText(step.hex);
    shades.appendChild(d);
  }
}

$('#c1').addEventListener('input', e => { $('#c1-hex').value = e.target.value.toUpperCase(); render(); });
$('#c1-hex').addEventListener('input', render);
$('#btn-randomize').onclick = () => {
  const r = Math.floor(Math.random()*16777215).toString(16).padStart(6,'0');
  $('#c1-hex').value = '#' + r.toUpperCase();
  render();
};

render();

  ]
});
</script>
