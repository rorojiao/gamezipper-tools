<style>
.log-field{margin-bottom:1rem}
.log-field label{display:block;font-size:.85rem;color:var(--text2);font-weight:600;margin-bottom:6px}
.log-field input{width:100%;background:var(--glass2);border:1px solid var(--border);color:var(--text);padding:12px;border-radius:var(--radius-sm);font-size:1.2rem;font-weight:700;font-family:monospace}
.log-row{display:flex;gap:10px;flex-wrap:wrap}
.log-row>div{flex:1;min-width:130px}
.log-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1rem}
.log-tab{padding:8px 16px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;font-size:.85rem;font-weight:600;transition:all .15s}
.log-tab.active{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border-color:transparent}
.log-result{padding:1.4rem;background:var(--glass);border:1px solid var(--border);border-radius:var(--radius);text-align:center;margin-bottom:1rem}

<script type="application/ld+json">{"@context":"https://schema.org","@type":"WebApplication","name":"Logarithm Calculator","description":"Calculate logarithms with any base: ln (natural log), log10, log2 and custom base. Free online logarithm calculator with the change-of-base formula and step-by-step results.","url": "https://tools.gamezipper.com/zh/calc/logarithm-calculator.html","applicationCategory":"Utility","operatingSystem":"Web Browser","offers":{"@type":"Offer","price":"0"}}</script>
<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"What is a logarithm?","acceptedAnswer":{"@type":"Answer","text":"A logarithm answers the question: to what power must the base be raised to get this number? log base b of x = n means b raised to the n equals x. For example log₂ 8 = 3 because 2³ = 8."}},{"@type":"Question","name":"What are ln and log?","acceptedAnswer":{"@type":"Answer","text":"ln is the natural logarithm with base e (≈ 2.71828). log without a base usually means log base 10 (common logarithm). This calculator shows both along with log base 2 and any custom base."}},{"@type":"Question","name":"What is the change-of-base formula?","acceptedAnswer":{"@type":"Answer","text":"log base b of x equals ln(x) / ln(b), or equivalently log₁₀(x) / log₁₀(b). This lets you compute a logarithm in any base using a calculator that only has ln or log buttons."}},{"@type":"Question","name":"Can you take the log of a negative number?","acceptedAnswer":{"@type":"Answer","text":"Not as a real number. The logarithm is only defined for positive inputs when working with real numbers. The log of zero is negative infinity, and the log of a negative number is a complex number."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="log-tabs" id="tabs">
      <button class="log-tab active" data-base="e">ln (base e)</button>
      <button class="log-tab" data-base="10">log₁₀</button>
      <button class="log-tab" data-base="2">log₂</button>
      <button class="log-tab" data-base="custom">custom</button>
    </div>
    <div class="log-row">
      <div class="log-field">
        <label id="lbl-num"></label>
        <input type="number" id="numInput" step="any" value="100">
      </div>
      <div class="log-field" id="baseWrap" style="display:none">
        <label id="lbl-base"></label>
        <input type="number" id="baseInput" step="any" value="2">
      </div>
    </div>
    <button class="gz-btn gz-btn-primary" id="calcBtn" style="width:100%;padding:14px;font-size:1.05rem;margin-bottom:1rem">⚡ Calculate</button>
    <div class="log-result" id="result">
      <div class="log-big" id="resultBig">—</div>
      <div class="log-meta" id="resultMeta"></div>
    </div>
    <div class="log-formula" id="formula"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en:{
    toolTitle:'Logarithm Calculator',
    toolDesc:'Compute logarithms in any base — natural log (ln), common log (log₁₀), binary log (log₂), or a custom base. Shows the change-of-base formula step by step.',
    lblNum:'Number x',
    lblBase:'Base b',
    calculate:'⚡ Calculate',copy:'Copy',clear:'Clear',
    resultFor:'result for',
    baseE:'base e (ln)',
    base10:'base 10 (log₁₀)',
    base2:'base 2 (log₂)',
    baseCustom:'base',
    formulaText:'Change-of-base formula: log_b(x) = ln(x) / ln(b)',
    stepNum:'Step',
    stepLn:'ln(x)',
    stepLnb:'ln(base)',
    stepDivide:'Divide',
    invalidNum:'Enter a positive number (log of zero or a negative number is undefined in real numbers).',
    invalidBase:'Base must be a positive number other than 1.',
    enterNum:'Enter a number and press Calculate.',
    step1:'Choose a base: ln, log₁₀, log₂, or custom',
    step2:'Enter the number x you want the logarithm of',
    step3:'Press Calculate to get the exact result',
    step4:'Read the change-of-base breakdown below',
  },
  zh:{
    toolTitle:'对数计算器',
    toolDesc:'计算任意底数的对数 — 自然对数 (ln)、常用对数 (log₁₀)、以 2 为底的对数 (log₂)，或自定义底数。逐步显示换底公式。',
    lblNum:'数字 x',
    lblBase:'底数 b',
    calculate:'⚡ 计算',copy:'复制',clear:'清空',
    resultFor:'结果（',
    baseE:'以 e 为底，即 ln）',
    base10:'以 10 为底，即 log₁₀）',
    base2:'以 2 为底，即 log₂）',
    baseCustom:'以该数为底）',
    formulaText:'换底公式：log_b(x) = ln(x) / ln(b)',
    stepNum:'步骤',
    stepLn:'ln(x)',
    stepLnb:'ln(底数)',
    stepDivide:'相除',
    invalidNum:'请输入正数（零或负数的对数在实数范围内无定义）。',
    invalidBase:'底数必须是正数且不能为 1。',
    enterNum:'输入数字后点击计算。',
    step1:'选择底数：ln、log₁₀、log₂ 或自定义',
    step2:'输入要求对数的数字 x',
    step3:'点击「计算」得到精确结果',
    step4:'查看下方的换底公式分解',
  }
});

const { $, copyText, t } = GZ;
let mode='e';

function fmt(n){ if(!isFinite(n)) return n>0?'∞':'-∞'; const r=Math.round(n*1e10)/1e10; return r.toLocaleString('en-US',{maximumFractionDigits:10}); }

function baseLabel(){
  if(mode==='e') return t('baseE');
  if(mode==='10') return t('base10');
  if(mode==='2') return t('base2');
  return t('baseCustom')+' '+$('#baseInput').value;
}
function currentBase(){
  if(mode==='e') return Math.E;
  if(mode==='10') return 10;
  if(mode==='2') return 2;
  return parseFloat($('#baseInput').value);
}

function calc(){
  const x=parseFloat($('#numInput').value);
  const b=currentBase();
  const el=$('#resultBig'),meta=$('#resultMeta'),f=$('#formula');
  if(isNaN(x)){ el.textContent='—'; meta.textContent=t('enterNum'); f.textContent=t('formulaText'); return; }
  if(x<=0){ el.textContent='—'; meta.textContent=t('invalidNum'); f.textContent=t('formulaText'); return; }
  if(mode==='custom' && (isNaN(b)||b<=0||b===1)){ el.textContent='—'; meta.textContent=t('invalidBase'); f.textContent=t('formulaText'); return; }
  const lnx=Math.log(x);
  const lnb=Math.log(b);
  const res=lnx/lnb;
  el.textContent=fmt(res);
  meta.textContent=`log(${fmt(x)}) — ${t('resultFor')} ${baseLabel()}`;
  f.innerHTML=
    `<div>${t('formulaText')}</div>`+
    `<div style="margin-top:8px">${t('stepNum')} 1 — ${t('stepLn')}: ln(${fmt(x)}) = <b>${fmt(lnx)}</b></div>`+
    `<div>${t('stepNum')} 2 — ${t('stepLnb')}: ln(${fmt(b)}) = <b>${fmt(lnb)}</b></div>`+
    `<div>${t('stepNum')} 3 — ${t('stepDivide')}: ${fmt(lnx)} / ${fmt(lnb)} = <b>${fmt(res)}</b></div>`;
}

document.querySelectorAll('.log-tab').forEach(tab=>{
  tab.addEventListener('click',()=>{
    document.querySelectorAll('.log-tab').forEach(x=>x.classList.remove('active'));
    tab.classList.add('active');
    mode=tab.dataset.base;
    $('#baseWrap').style.display = mode==='custom'?'block':'none';
    calc();
  });
});

$('#calcBtn').addEventListener('click',calc);
$('#numInput').addEventListener('input',calc);
$('#baseInput').addEventListener('input',calc);
$('#numInput').addEventListener('keydown',e=>{if(e.key==='Enter')calc();});

$('#toolbar').innerHTML=`
  <button class="gz-btn" onclick="calc()">${t('calculate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="copyText($('#resultBig').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#numInput').value='';calc()">${t('clear')}</button>`;
$('#lbl-num').textContent=t('lblNum');
$('#lbl-base').textContent=t('lblBase');

GZ.renderToolPage({
  category:'calc',
  titleKey:'toolTitle',
  descKey:'toolDesc',
  howToSteps:['step1','step2','step3','step4'],
  related:[
    {icon:'%',href:'/calc/percent-error-calculator.html',name:'Percent Error Calculator'},
    {icon:'🔬',href:'/calc/scientific-notation-calculator.html',name:'Scientific Notation'},
    {icon:'🔢',href:'/calc/factorial-calculator.html',name:'Factorial Calculator'},
    {icon:'📐',href:'/calc/equation-solver.html',name:'Equation Solver'},
  ]
});
calc();
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
