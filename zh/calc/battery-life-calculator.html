<script>
GZI18n.register({
  en: {
    toolTitle: 'Battery Life Calculator',
    toolDesc: 'Estimate how long any battery will last — phone, laptop, IoT device, EV, RC car or Arduino project. Enter capacity (mAh/Ah/Wh), device load (mA/A/W), voltage and efficiency to get runtime in hours, plus mAh↔Wh conversion and charge-time estimate. Free, browser-based.',
    lblCap: 'Battery capacity',
    lblCapunit: 'Capacity unit',
    lblVoltage: 'Battery voltage (V)',
    lblLoad: 'Device load',
    lblLoadunit: 'Load unit',
    lblEff: 'Efficiency (%)',
    clear: 'Clear',
    nHours: 'Estimated runtime',
    nWh: 'Energy (Wh)',
    nAh: 'Capacity (Ah)',
    nDrawa: 'Effective current draw',
    nChargetime: 'Approx. full charge time (1C rate)',
    formulas: 'Runtime = Ah ÷ A · Wh = mAh × V ÷ 1000 · Effective Ah = capacity × efficiency% · Charge time ≈ Ah ÷ charge A × 1.4',
    step1: 'Enter your battery capacity and pick the unit (mAh, Ah or Wh)',
    step2: 'Enter the nominal voltage (3.7V Li-ion, 1.5V AA, 12V lead-acid, etc.)',
    step3: 'Enter your device current or power draw',
    step4: 'Adjust efficiency for real-world runtime — 80% is a good default',
  },
  zh: {
    toolTitle: '电池续航时间计算器',
    toolDesc: '估算任意电池（手机、笔记本、IoT 设备、电动车、遥控车或 Arduino 项目）的续航时间。输入容量（mAh/Ah/Wh）、负载（mA/A/W）、电压和效率，即可得到续航小时数、mAh↔Wh 换算和充电时间估算。免费、浏览器本地运行。',
    lblCap: '电池容量',
    lblCapunit: '容量单位',
    lblVoltage: '电池电压 (V)',
    lblLoad: '设备负载',
    lblLoadunit: '负载单位',
    lblEff: '效率 (%)',
    clear: '清空',
    nHours: '预计续航',
    nWh: '能量 (Wh)',
    nAh: '容量 (Ah)',
    nDrawa: '有效电流',
    nChargetime: '大约满充时间（1C 充电率）',
    formulas: '续航 = Ah ÷ A · Wh = mAh × V ÷ 1000 · 有效 Ah = 容量 × 效率% · 充电时间 ≈ Ah ÷ 充电电流 A × 1.4',
    step1: '输入电池容量并选择单位（mAh、Ah 或 Wh）',
    step2: '输入标称电压（如 3.7V 锂电池、1.5V AA、12V 铅酸）',
    step3: '输入设备电流或功率消耗',
    step4: '调整效率以贴近实际续航 — 80% 是不错的默认值',
  }
});

const { $, t } = GZ;

$('#lbl-cap').textContent = t('lblCap');
$('#lbl-capunit').textContent = t('lblCapunit');
$('#lbl-voltage').textContent = t('lblVoltage');
$('#lbl-load').textContent = t('lblLoad');
$('#lbl-loadunit').textContent = t('lblLoadunit');
$('#lbl-eff').textContent = t('lblEff');
$('#formulas').textContent = t('formulas');
$('#n-hours').textContent = t('nHours');
$('#n-wh').textContent = t('nWh');
$('#n-ah').textContent = t('nAh');
$('#n-drawa').textContent = t('nDrawa');
$('#n-chargetime').textContent = t('nChargetime');

function fmt(n, u) {
  if (!isFinite(n)) return '—';
  const abs = Math.abs(n);
  if (abs !== 0 && (abs < 0.001 || abs >= 1e6)) return n.toExponential(3) + (u ? ' ' + u : '');
  return n.toLocaleString(undefined, { maximumFractionDigits: 4 }) + (u ? ' ' + u : '');
}

function fmtDuration(h) {
  if (!isFinite(h) || h <= 0) return '—';
  const totalMin = Math.round(h * 60);
  const days = Math.floor(totalMin / 1440);
  const hrs = Math.floor((totalMin % 1440) / 60);
  const mins = totalMin % 60;
  const parts = [];
  if (days) parts.push(days + 'd');
  if (hrs) parts.push(hrs + 'h');
  if (mins && !days) parts.push(mins + 'm');
  return parts.join(' ') || '0h';
}

function calc() {
  const cap = parseFloat($('#cap').value);
  const capUnit = $('#capunit').value;
  const V = parseFloat($('#voltage').value);
  const load = parseFloat($('#load').value);
  const loadUnit = $('#loadunit').value;
  const eff = parseFloat($('#eff').value) / 100;

  if (!isFinite(cap) || !isFinite(load) || cap <= 0 || load <= 0 || !isFinite(V) || V <= 0) {
    $('#big-time').textContent = '—';
    ['hours','wh','ah','drawa','chargetime'].forEach(k => $('#out-' + k).textContent = '—');
    return;
  }

  // Normalize capacity to Ah and Wh
  let ah, wh;
  if (capUnit === 'mah') { ah = cap / 1000; wh = ah * V; }
  else if (capUnit === 'ah') { ah = cap; wh = ah * V; }
  else { wh = cap; ah = wh / V; }

  // Normalize load to A and W
  let aDraw, wDraw;
  if (loadUnit === 'ma') { aDraw = load / 1000; wDraw = aDraw * V; }
  else if (loadUnit === 'a') { aDraw = load; wDraw = aDraw * V; }
  else { wDraw = load; aDraw = wDraw / V; }

  const effAh = ah * eff;
  const runtimeH = aDraw > 0 ? effAh / aDraw : Infinity;
  const chargeTimeH = ah / aDraw * 1.4; // approx at same current as draw, 1C rate

  $('#big-time').textContent = fmtDuration(runtimeH);
  $('#out-hours').textContent = fmt(runtimeH, 'h') + '  (' + fmtDuration(runtimeH) + ')';
  $('#out-wh').textContent = fmt(wh, 'Wh');
  $('#out-ah').textContent = fmt(ah, 'Ah');
  $('#out-drawa').textContent = fmt(aDraw, 'A') + '  /  ' + fmt(wDraw, 'W');
  $('#out-chargetime').textContent = fmt(chargeTimeH, 'h');
}

['cap','capunit','voltage','load','loadunit','eff'].forEach(id => {
  const el = $('#' + id);
  el.addEventListener('input', calc);
  el.addEventListener('change', calc);
});

$('#toolbar').innerHTML = `
  <button class="gz-btn gz-btn-secondary" onclick="['cap','load'].forEach(id=>document.getElementById(id).value='');calc()">${t('clear')}</button>`;

calc();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🔋', href:'/dev/battery-status.html', name:'Battery Status'},
    {icon:'⚡', href:'/calc/ohms-law-calculator.html', name:"Ohm's Law"},
    {icon:'⚡', href:'/calc/wattage-calculator.html', name:'Wattage'},
    {icon:'⚡', href:'/calc/electricity-cost.html', name:'Electricity Cost'},
  ]
});
</script>
