<script>
GZI18n.register({
  en:{toolTitle:'Award Certificate Maker',toolDesc:'Create custom printable award certificates. Add recipient, achievement, date and signature. Choose elegant designs — perfect for schools and workplaces. Free.',orgName:'Organization Name',recipientName:'Recipient Name',awardTitle:'Certificate Title',achievement:'Achievement / Description',date:'Date',sig1:'Signature 1 (Name/Title)',sig2:'Signature 2 (Name/Title)',template:'Template',print:'🖨️ Print',gold:'Gold',blue:'Blue',green:'Green',certOf:'Certificate of',presentedTo:'This certificate is proudly presented to',defaultTitle:'Achievement',step1:'Enter your organization name and the certificate title (e.g. Excellence)',step2:'Type the recipient name and describe their achievement',step3:'Add the date and optional signature lines',step4:'Choose a color template and click Print'},
  zh:{toolTitle:'获奖证书生成器',toolDesc:'创建可打印的自定义获奖证书。添加收件人、成就、日期和签名。选择精美设计 — 适合学校和公司。免费。',orgName:'机构名称',recipientName:'获奖人姓名',awardTitle:'证书标题',achievement:'成就 / 描述',date:'日期',sig1:'签名 1（姓名/职务）',sig2:'签名 2（姓名/职务）',template:'模板',print:'🖨️ 打印',gold:'金色',blue:'蓝色',green:'绿色',certOf:'荣誉证书',presentedTo:'谨此颁发给',defaultTitle:'成就',step1:'输入机构名称和证书标题（如优秀奖）',step2:'输入获奖人姓名并描述其成就',step3:'添加日期和可选的签名栏',step4:'选择颜色模板并点击打印'}
});
const{$,t}=GZ;

function render(){
  const org=$('#f-org').value||'Your Organization';
  const title=$('#f-title').value||t('defaultTitle');
  const name=$('#f-name').value||'Recipient Name';
  const achieve=$('#f-achieve').value;
  const date=$('#f-date').value||new Date().toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'});
  const sig1=$('#f-sig1').value;
  const sig2=$('#f-sig2').value;
  const tpl=$('#f-tpl').value;
  const card=$('#ac-card');
  card.className='ac-card '+tpl;
  card.innerHTML=`
    <div style="font-size:13px;text-transform:uppercase;letter-spacing:2px;opacity:.6">${org}</div>
    <div class="ac-title">${t('certOf')}</div>
    <div class="ac-award-text" style="font-size:24px;font-weight:bold;color:${tpl==='gold'?'#d4af37':tpl==='blue'?'#1a5276':'#1e8449'}">${title}</div>
    <div class="ac-presented">${t('presentedTo')}</div>
    <div class="ac-name">${name}</div>
    ${achieve?`<div class="ac-award-text">${achieve}</div>`:''}
    <div class="ac-sign-row">
      <div class="ac-sign"><div class="ac-sign-label">${t('date')}</div><div style="margin-top:3px">${date}</div></div>
      ${sig1?`<div class="ac-sign"><div style="font-style:italic;font-size:16px;margin-bottom:2px">${sig1.split('(')[0]}</div><div class="ac-sign-label">${sig1.includes('(')?sig1.match(/\(([^)]+)\)/)?.[1]||'':'':''}</div></div>`:''}
      ${sig2?`<div class="ac-sign"><div style="font-style:italic;font-size:16px;margin-bottom:2px">${sig2.split('(')[0]}</div><div class="ac-sign-label">${sig2.includes('(')?sig2.match(/\(([^)]+)\)/)?.[1]||'':'':''}</div></div>`:''}
    </div>`;
}

$('#form').innerHTML=`
  <div><label>${t('orgName')}</label><input id="f-org" oninput="render()" placeholder="Lincoln High School"></div>
  <div><label>${t('awardTitle')}</label><input id="f-title" oninput="render()" placeholder="Excellence"></div>
  <div><label>${t('recipientName')}</label><input id="f-name" oninput="render()" placeholder="Jane Smith"></div>
  <div><label>${t('date')}</label><input id="f-date" type="date" oninput="render()"></div>
  <div style="grid-column:1/-1"><label>${t('achievement')}</label><textarea id="f-achieve" oninput="render()" rows="2" placeholder="For outstanding academic achievement and dedication throughout the school year."></textarea></div>
  <div><label>${t('sig1')}</label><input id="f-sig1" oninput="render()" placeholder="John Doe (Principal)"></div>
  <div><label>${t('sig2')}</label><input id="f-sig2" oninput="render()" placeholder="Jane Roe (Teacher)"></div>
  <div><label>${t('template')}</label><select id="f-tpl" onchange="render()"><option value="gold">${t('gold')}</option><option value="blue">${t('blue')}</option><option value="green">${t('green')}</option></select></div>`;

$('#toolbar').innerHTML=`<button class="gz-btn" onclick="window.print()">${t('print')}</button>`;

render();
