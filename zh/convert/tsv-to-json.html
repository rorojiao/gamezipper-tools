  zh: {

    convert: '转换',
    format: '格式化',
    outputMode: '输出',

    jsonl: 'JSONL',
    autoType: '自动类型推断',

    errEmpty: '请先粘贴 TSV 数据',
    errNoRows: '未找到数据行',
    step1: '在输入区粘贴 TSV 数据（制表符分隔）',
    step2: '切换 JSON 数组或 JSONL 输出模式',

let mode = 'array';
let autoType = true;
const { $, copyText, t } = GZ;

function parseTSVLine(line) {
  const fields = [];
  let current = '';
  let inQuotes = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (inQuotes) {
      if (ch === '"') {
        if (line[i + 1] === '"') { current += '"'; i++; }
        else inQuotes = false;
      } else current += ch;
    } else {
      if (ch === '"') inQuotes = true;
      else if (ch === '\t') { fields.push(current); current = ''; }
      else current += ch;
    }
  }
  fields.push(current);
  return fields;
}

function parseTSV(text) {
  const lines = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n').split('\n').filter(l => l.length > 0);
  return lines.map(parseTSVLine);
}

function autoDetect(v) {
  if (!autoType) return v;
  if (v === '') return '';
  if (v === 'null' || v === 'NULL' || v === '\\N') return null;
  if (v === 'true' || v === 'True' || v === 'TRUE') return true;
  if (v === 'false' || v === 'False' || v === 'FALSE') return false;
  if (/^-?\d+$/.test(v)) { const n = parseInt(v, 10); if (Math.abs(n) < 1e15) return n; }
  if (/^-?\d+\.\d+([eE][+-]?\d+)?$/.test(v)) { const n = parseFloat(v); if (isFinite(n)) return n; }
  return v;
}

function syntaxHighlight(json) {
  return json.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/("(\\u[\da-fA-F]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(\.\d+)?([eE][+-]?\d+)?)/g, m => {
      let c = 'json-number';
      if (/^"/.test(m)) c = /:$/.test(m) ? 'json-key' : 'json-string';
      else if (/true|false/.test(m)) c = 'json-bool';
      else if (/null/.test(m)) c = 'json-null';
      return `<span class="${c}">${m}</span>`;
    });
}

function doConvert() {
  const inp = $('#input').value.trim();
  if (!inp) { $('#status').innerHTML = `<span style="color:var(--gz-accent)">${t('errEmpty')}</span>`; return; }
  try {
    const rows = parseTSV(inp);
    if (rows.length === 0) { $('#status').innerHTML = `<span style="color:var(--gz-accent)">${t('errNoRows')}</span>`; return; }
    const headers = rows[0];
    const dataRows = rows.slice(1);
    let result;
    if (mode === 'array') {
      const arr = dataRows.map(row => {
        const obj = {};
        headers.forEach((h, i) => { obj[h || `col${i}`] = autoDetect(row[i] ?? ''); });
        return obj;
      });
      result = JSON.stringify(arr, null, 2);
    } else {
      result = dataRows.map(row => {
        const obj = {};
        headers.forEach((h, i) => { obj[h || `col${i}`] = autoDetect(row[i] ?? ''); });
        return obj;
      }).map(o => JSON.stringify(o)).join('\n');
    }
    $('#output').innerHTML = syntaxHighlight(result);
    $('#output').dataset.raw = result;
    $('#status').innerHTML = `<span style="color:var(--gz-success)">${t('converted')} — ${dataRows.length} ${t('rows')}</span>`;
  } catch(e) {
    $('#status').innerHTML = `<span style="color:var(--gz-accent)">✗ ${e.message}</span>`;
  }
}

function downloadResult() {
  const raw = $('#output').dataset.raw || '';
  if (!raw) return;
  const blob = new Blob([raw], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = mode === 'array' ? 'converted.json' : 'converted.jsonl';
  a.click();
  URL.revokeObjectURL(a.href);
}

function loadExample() {
  $('#input').value = 'name\tage\tcity\tactive\nAlice\t30\tNew York\ttrue\nBob\t25\tLondon\tfalse\nCharlie\t35\tTokyo\ttrue';
  doConvert();
}

function doClear() { $('#input').value = ''; $('#output').innerHTML = ''; $('#output').dataset.raw = ''; $('#status').innerHTML = ''; }

$('#input').addEventListener('input', doConvert);

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="doConvert()">${t('convert')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')||'Example'}</button>
  <div class="gz-toggle-group" id="mode-toggle">
    <button class="active" data-mode="array" onclick="mode='array';updateToggle()">${t('jsonArr')}</button>
    <button data-mode="jsonl" onclick="mode='jsonl';updateToggle()">${t('jsonl')}</button>
  </div>
  <label style="display:inline-flex;align-items:center;gap:4px;font-size:.85em;cursor:pointer">
    <input type="checkbox" ${autoType?'checked':''} onchange="autoType=this.checked;doConvert()"> ${t('autoType')}
  </label>
  <button class="gz-btn" onclick="copyText($('#output').dataset.raw||'')">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="downloadResult()">${t('download')||'⬇ Download'}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

function updateToggle() {
  document.querySelectorAll('#mode-toggle button').forEach(b => {
    b.classList.toggle('active', b.dataset.mode === mode);
  });
  doConvert();
}

</script>
