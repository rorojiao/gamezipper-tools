const { $, copyText, t } = GZ;
let escapeUnicode = false;
let arrayBracket = false;
let sortKeys = false;

function escapePropKey(s) {
  return String(s).replace(/([\\=: \t#])/g, '\\$1');
}

function escapePropValue(s) {
  let out = String(s);
  if (escapeUnicode) {
    out = out.replace(/[\u0080-\uFFFF]/g, ch => {
      const cp = ch.codePointAt(0);
      if (cp > 0xFFFF) {
        // surrogate pair
        const hi = 0xD800 + ((cp - 0x10000) >> 10);
        const lo = 0xDC00 + ((cp - 0x10000) & 0x3FF);
        return '\\u' + hi.toString(16).padStart(4,'0') + '\\u' + lo.toString(16).padStart(4,'0');
      }
      return '\\u' + cp.toString(16).padStart(4,'0');
    });
  }
  out = out.replace(/\\/g, '\\\\').replace(/([\n\r])/g, m => m === '\n' ? '\\n' : '\\r');
  out = out.replace(/([:=#])/g, '\\$1');
  // leading-space escape
  if (out.startsWith(' ')) out = '\\' + out;
  return out;
}

function flatten(obj, prefix, lines) {
  if (obj === null || obj === undefined) {
    lines.push(escapePropKey(prefix) + '=' + 'null');
    return;
  }
  if (Array.isArray(obj)) {
    if (obj.length === 0) { lines.push(escapePropKey(prefix) + '='); return; }
    obj.forEach((item, i) => {
      const k = arrayBracket ? `${prefix}[${i}]` : `${prefix}.${i}`;
      flatten(item, k, lines);
    });
    return;
  }
  if (typeof obj === 'object') {
    const keys = Object.keys(obj);
    if (sortKeys) keys.sort();
    if (keys.length === 0) { lines.push(escapePropKey(prefix) + '='); return; }
    keys.forEach(k => {
      const childKey = prefix ? `${prefix}.${k}` : k;
      flatten(obj[k], childKey, lines);
    });
    return;
  }
  // primitive
  lines.push(escapePropKey(prefix) + '=' + escapePropValue(obj));
}

function doConvert() {
  const inp = $('#input').value.trim();
  if (!inp) { $('#output').textContent = ''; $('#status').innerHTML = ''; return; }
  let obj;
  try {
    obj = JSON.parse(inp);
  } catch (e) {
    $('#output').innerHTML = `<span style="color:var(--gz-accent)">${t('invalid')}${esc(e.message)}</span>`;
    $('#status').innerHTML = '';
    return;
  }
  const lines = [];
  flatten(obj, '', lines);
  $('#output').textContent = lines.join('\n');
  $('#status').innerHTML = `<span style="color:var(--gz-success)">${t('valid')} — ${lines.length} ${lines.length===1?'key':'keys'}</span>`;
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

}

function doClear() { $('#input').value = ''; $('#output').textContent = ''; $('#status').innerHTML = ''; }

$('#input').addEventListener('input', doConvert);

$('#opt-unicode').addEventListener('change', e => { escapeUnicode = e.target.checked; doConvert(); });
$('#opt-bracket').addEventListener('change', e => { arrayBracket = e.target.checked; doConvert(); });
