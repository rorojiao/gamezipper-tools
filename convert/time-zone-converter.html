<script>
GZI18n.register({
  en: {
    toolTitle: 'Time Zone Converter',
    toolDesc: 'Convert any time between two time zones instantly with DST support. Free online world clock covering 400+ IANA zones — UTC, EST, PST, GMT, IST, CET, JST and more.',
    lblFrom: 'From time zone',
    lblTo: 'To time zone',
    lblTime: 'Date & time',
    btnSwap: '⇄ Swap zones',
    btnNow: 'Use current time',
    worldTitle: '🌍 World clock right now',
    step1: 'Select the source time zone and pick a date & time',
    step2: 'Choose the target time zone to convert to',
    step3: 'Use Swap to flip direction, or "Use current time" for now',
    step4: 'Check the world clock grid for major cities at a glance',
  },
  zh: {
    toolTitle: '时区转换器',
    toolDesc: '即时在任意两个时区之间转换时间，自动处理夏令时。免费在线世界时钟，覆盖 400+ IANA 时区 — UTC、EST、PST、GMT、IST、CET、JST 等。',
    lblFrom: '源时区',
    lblTo: '目标时区',
    lblTime: '日期与时间',
    btnSwap: '⇄ 交换时区',
    btnNow: '使用当前时间',
    worldTitle: '🌍 当前世界时钟',
    step1: '选择源时区并填写日期和时间',
    step2: '选择要转换的目标时区',
    step3: '点击「交换时区」反向转换，或使用「当前时间」',
    step4: '查看世界时钟网格，了解主要城市的当前时间',
  }
});

const { $, t } = GZ;
// Curated popular zones (first) + all IANA zones from browser
const POPULAR = ['UTC','America/New_York','America/Chicago','America/Denver','America/Los_Angeles','America/Anchorage','Pacific/Honolulu','Europe/London','Europe/Paris','Europe/Berlin','Europe/Madrid','Europe/Moscow','Asia/Dubai','Asia/Kolkata','Asia/Bangkok','Asia/Shanghai','Asia/Hong_Kong','Asia/Tokyo','Asia/Seoul','Asia/Singapore','Australia/Sydney','Pacific/Auckland','America/Sao_Paulo','America/Mexico_City','America/Toronto'];
let allZones = [];
try { allZones = Intl.supportedValuesOf('timeZone'); } catch (e) { allZones = POPULAR.concat([]); }
const combined = Array.from(new Set(POPULAR.concat(allZones)));
function fillSelect(sel) {
  sel.innerHTML = combined.map(z => `<option value="${z}">${z.replace(/_/g,' ')}</option>`).join('');
}
fillSelect($('#from-tz'));
fillSelect($('#to-tz'));
$('#from-tz').value = Intl.DateTimeFormat().resolvedOptions().timeZone || 'UTC';
$('#to-tz').value = 'UTC';

function pad(n) { return String(n).padStart(2, '0'); }

function localInputISO(tz) {
  // Build a datetime-local string in the target tz
  const parts = new Intl.DateTimeFormat('en-US', { timeZone: tz, year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit', hour12: false }).formatToParts(new Date());
  const o = {};
  parts.forEach(p => { if (p.type !== 'literal') o[p.type] = p.value; });
  return `${o.year}-${o.month}-${o.day}T${o.hour === '24' ? '00' : o.hour}:${o.minute}`;
}

function parseLocalInTZ(isoStr, tz) {
  // Convert "YYYY-MM-DDTHH:mm" interpreted in tz into a UTC ms epoch
  const [d, t] = isoStr.split('T');
  const [y, mo, da] = d.split('-').map(Number);
  const [h, mi] = t.split(':').map(Number);
  // Get the tz offset at that wall-clock time by trial: build candidate UTC, format back, adjust
  // Approximation: try UTC epoch with various offsets
  // Use the offset that matches when we format
  const baseUTC = Date.UTC(y, mo - 1, da, h, mi, 0);
  // find offset (in minutes) by iterating the wall-clock: compute tz offset at baseUTC, then subtract
  const offsetMin = tzOffsetMinutes(baseUTC, tz);
  return baseUTC - offsetMin * 60000;
}

function tzOffsetMinutes(epoch, tz) {
  const dtf = new Intl.DateTimeFormat('en-US', { timeZone: tz, year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false });
  const parts = dtf.formatToParts(new Date(epoch));
  const o = {};
  parts.forEach(p => { if (p.type !== 'literal') o[p.type] = p.value; });
  const asUTC = Date.UTC(o.year, o.month - 1, o.day, o.hour === '24' ? 0 : o.hour, o.minute, o.second);
  return Math.round((asUTC - epoch) / 60000);
}

function formatInTZ(epoch, tz) {
  return new Intl.DateTimeFormat('en-US', { timeZone: tz, weekday: 'short', year: 'numeric', month: 'short', day: '2-digit', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false }).format(new Date(epoch));
}
function offsetStr(epoch, tz) {
  const m = tzOffsetMinutes(epoch, tz);
  const sign = m >= 0 ? '+' : '-';
  const am = Math.abs(m);
  return `UTC${sign}${pad(Math.floor(am/60))}:${pad(am%60)}`;
}

function convert() {
  const fromTz = $('#from-tz').value;
  const toTz = $('#to-tz').value;
  const iso = $('#from-time').value;
  if (!iso) return;
  const epoch = parseLocalInTZ(iso, fromTz);
  $('#from-display').textContent = formatInTZ(epoch, fromTz);
  $('#from-offset').textContent = offsetStr(epoch, fromTz);
  $('#to-display').textContent = formatInTZ(epoch, toTz);
  $('#to-offset').textContent = offsetStr(epoch, toTz);
  const diffMin = (tzOffsetMinutes(epoch, toTz) - tzOffsetMinutes(epoch, fromTz));
  const h = diffMin / 60;
  const sign = h >= 0 ? '+' : '';
  $('#diff').textContent = `⏱ ${sign}${h.toFixed(1)} h difference`;
}

function setNow() {
  $('#from-time').value = localInputISO($('#from-tz').value);
  convert();
}

function swap() {
  const a = $('#from-tz').value, b = $('#to-tz').value;
  $('#from-tz').value = b;
  $('#to-tz').value = a;
  // re-localize the input time into the new source tz
  $('#from-time').value = localInputISO(b);
  convert();
}

function renderWorldClock() {
  const cities = [
    ['UTC','UTC'],['New York','America/New_York'],['Los Angeles','America/Los_Angeles'],
    ['London','Europe/London'],['Paris','Europe/Paris'],['Berlin','Europe/Berlin'],
    ['Moscow','Europe/Moscow'],['Dubai','Asia/Dubai'],['Mumbai','Asia/Kolkata'],
    ['Singapore','Asia/Singapore'],['Beijing','Asia/Shanghai'],['Tokyo','Asia/Tokyo'],
    ['Sydney','Australia/Sydney'],['Honolulu','Pacific/Honolulu']
  ];
  const now = Date.now();
  $('#world-grid').innerHTML = cities.map(([c, z]) => {
    const dtf = new Intl.DateTimeFormat('en-US', { timeZone: z, hour: '2-digit', minute: '2-digit', hour12: false });
    const df = new Intl.DateTimeFormat('en-US', { timeZone: z, month: 'short', day: '2-digit', weekday: 'short' });
    return `<div class="world-item"><div class="city">${c}</div><div class="time">${dtf.format(now)}</div><div class="date">${df.format(now)}</div></div>`;
  }).join('');
}

$('#btn-swap').textContent = t('btnSwap');
$('#btn-now').textContent = t('btnNow');
$('#lbl-from').textContent = t('lblFrom');
$('#lbl-to').textContent = t('lblTo');
$('#lbl-time').textContent = t('lblTime');
$('#world-title').textContent = t('worldTitle');
$('#btn-swap').onclick = swap;
$('#btn-now').onclick = setNow;
$('#from-tz').addEventListener('change', () => { $('#from-time').value = localInputISO($('#from-tz').value); convert(); });
$('#to-tz').addEventListener('change', convert);
$('#from-time').addEventListener('input', convert);

setNow();
renderWorldClock();
setInterval(renderWorldClock, 30000);

GZ.renderToolPage({
  category: 'convert',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'⏰', href:'/dev/timestamp.html', name:'Timestamp Converter'},
    {icon:'📅', href:'/calc/date-calculator.html', name:'Date Calculator'},
    {icon:'⏲️', href:'/calc/alarm-clock.html', name:'Alarm Clock'},
    {icon:'⏱️', href:'/calc/hours-calculator.html', name:'Hours Calculator'},
  ]
});
</script>
