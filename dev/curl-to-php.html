let target = 'curl';

/* ---- shared curl parser ---- */
function tokenizeCurl(input){
  const raw = input.replace(/^\s*curl\s+/i,'').replace(/\\\n/g,' ').replace(/\\\r\n/g,' ').trim();
  const tokens=[]; let cur=''; let q=null;
  for(let i=0;i<raw.length;i++){
    const c=raw[i];
    if(q){ if(c===q){q=null;continue;} cur+=c; }
    else if(c==='"'||c==="'"){q=c;}
    else if(c===' '||c==='\t'||c==='\n'||c==='\r'){ if(cur){tokens.push(cur);cur='';} }
    else {cur+=c;}
  }
  if(cur)tokens.push(cur);
  return tokens;
}
function parseCurl(input){
  const r={url:'',method:null,headers:{},data:null,cookies:null,user:null,insecure:false,location:false};
  const toks=tokenizeCurl(input);
  for(let i=0;i<toks.length;i++){
    const a=toks[i];
    const next=()=>toks[++i];
    if(a==='-X'||a==='--request'){r.method=next();continue;}
    if(a==='-H'||a==='--header'){const h=next();const idx=h.indexOf(':');if(idx>-1){r.headers[h.slice(0,idx).trim()]=h.slice(idx+1).trim();}continue;}
    if(a==='-d'||a==='--data'||a==='--data-raw'||a==='--data-binary'||a==='--data-ascii'){r.data=next();continue;}
    if(a==='--data-urlencode'){r.data=(r.data?r.data+'&':'')+next();continue;}
    if(a==='-b'||a==='--cookie'){r.cookies=next();continue;}
    if(a==='-u'||a==='--user'){r.user=next();continue;}
    if(a==='-A'||a==='--user-agent'){r.headers['User-Agent']=next();continue;}
    if(a==='-e'||a==='--referer'){r.headers['Referer']=next();continue;}
    if(a==='-L'||a==='--location'){r.location=true;continue;}
    if(a==='-k'||a==='--insecure'){r.insecure=true;continue;}
    if(a==='-I'||a==='--head'){r.method='HEAD';continue;}
    if(a==='--url'){r.url=next();continue;}
    if(a.startsWith('-')){ continue; }
    if(!r.url && (a.startsWith('http://')||a.startsWith('https://')||a.startsWith('www.')||a.startsWith('$'))){r.url=a.replace(/^\$/,'');continue;}
    if(!r.url && /^[a-z0-9.-]+\.[a-z]{2,}/i.test(a)){r.url='https://'+a;continue;}
    if(!r.url){r.url=a;}
  }
  return r;
}

/* PHP single-quoted string */
function phpStr(s){
  s = String(s);
  return "'" + s.replace(/\\/g,'\\\\').replace(/'/g,"\\'") + "'";
}

function genPhpCurl(c){
  const method = (c.method || (c.data !== null ? 'POST' : 'GET')).toUpperCase();
  const url = c.url || 'https://api.example.com/endpoint';
  const headers = {...c.headers};
  if(c.cookies && !headers['Cookie']) headers['Cookie'] = c.cookies;

  const L = [];
  L.push('<?php');
  L.push('');
  L.push('$ch = curl_init();');
  L.push('');
  L.push('curl_setopt($ch, CURLOPT_URL, ' + phpStr(url) + ');');
  L.push('curl_setopt($ch, CURLOPT_RETURNTRANSFER, true);');
  L.push('curl_setopt($ch, CURLOPT_CUSTOMREQUEST, ' + phpStr(method) + ');');

  if(c.location) L.push('curl_setopt($ch, CURLOPT_FOLLOWLOCATION, true);');

  /* headers */
  const hkeys = Object.keys(headers);
  if(hkeys.length){
    const headerLines = hkeys.map(k => phpStr(k + ': ' + headers[k]));
    L.push('');
    L.push('curl_setopt($ch, CURLOPT_HTTPHEADER, array(');
    for(const i of headerLines) L.push('    ' + i + ',');
    L.push('));');
  }

  /* body */
  if(c.data !== null){
    L.push('');
    L.push('curl_setopt($ch, CURLOPT_POSTFIELDS, ' + phpStr(c.data) + ');');
  }

  /* basic auth */
  if(c.user){
    L.push('');
    L.push('curl_setopt($ch, CURLOPT_USERPWD, ' + phpStr(c.user) + ');');
  }

  L.push('');
  L.push('$response = curl_exec($ch);');
  L.push('$httpCode = curl_getinfo($ch, CURLINFO_HTTP_CODE);');
  L.push('');
  L.push('if (curl_errno($ch)) {');
  L.push('    echo \'Error:\' . curl_error($ch);');
  L.push('} else {');
  L.push('    echo $httpCode . "\\n";');
  L.push('    echo $response;');
  L.push('}');
  L.push('');
  L.push('curl_close($ch);');
  return L.join('\n');
}

function genGuzzle(c){
  const method = (c.method || (c.data !== null ? 'POST' : 'GET')).toLowerCase();
  const url = c.url || 'https://api.example.com/endpoint';
  const headers = {...c.headers};
  if(c.cookies && !headers['Cookie']) headers['Cookie'] = c.cookies;

  /* check if json body */
  let isJson = false;
  if(c.data !== null){
    try { JSON.parse(c.data); isJson = true; delete headers['Content-Type']; delete headers['content-type']; } catch(e){}
  }

  const L = [];
  L.push('<?php');
  L.push('');
  L.push('require \'vendor/autoload.php\';');
  L.push('');
  L.push('use GuzzleHttp\\Client;');
  L.push('');
  L.push('$client = new Client([' + (c.insecure ? '\\\'verify\' => false,' : '') + ']);');
  L.push('');
  L.push('try {');
  L.push('    $response = $client->' + method + '(' + phpStr(url) + ', [');

  const opts = [];
  if(Object.keys(headers).length){
    opts.push('        \'headers\' => [');
    for(const k of Object.keys(headers)) opts.push('            ' + phpStr(k) + ' => ' + phpStr(headers[k]) + ',');
    opts.push('        ],');
  }

  if(c.user){
    const parts = c.user.split(':');
    opts.push('        \'auth\' => [' + phpStr(parts[0]||'') + ', ' + phpStr(parts.slice(1).join(':')||'') + '],');
  }

  if(c.data !== null){
    if(isJson){
      opts.push('        \'json\' => json_decode(' + phpStr(c.data) + ', true),');
    } else {
      opts.push('        \'body\' => ' + phpStr(c.data) + ',');
    }
  }

  L.push(...opts);
  L.push('    ]);');
  L.push('');
  L.push('    echo $response->getStatusCode() . "\\n";');
  L.push('    echo $response->getBody();');
  L.push('} catch (\\GuzzleHttp\\Exception\\RequestException $e) {');
  L.push('    echo \'Error: \' . $e->getMessage();');
  L.push('}');
  return L.join('\n');
}

function convert(){
  const inp = $('#input').value.trim();
  if(!inp){$('#output').textContent='';$('#status').innerHTML='';return;}
  let c;
  try{ c = parseCurl(inp); }catch(e){ $('#output').textContent='';$('#status').innerHTML='<span style="color:var(--gz-accent)">⚠ '+e.message+'</span>'; return; }
  let code='';
  if(target==='curl') code=genPhpCurl(c);
  else code=genGuzzle(c);
  $('#output').textContent = code;
  const parts=[];
  if(c.method)parts.push(c.method);
  if(c.user)parts.push('🔐 Basic Auth');
  if(c.data!==null)parts.push('📦 body');
  if(Object.keys(c.headers).length)parts.push(Object.keys(c.headers).length+' header(s)');
  $('#status').innerHTML='<span style="color:var(--gz-success)">✓ '+t('lblOut')+(parts.length?' — '+parts.join(' · '):'')+'</span>';
}
window.convert=convert;
