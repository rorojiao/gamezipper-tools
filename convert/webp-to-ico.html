    dropHere: '将 WebP 拖到这里或点击上传',
    optBgLbl: '使用纯色背景（去除透明）',
    bgColorLbl: '背景色',

    downloaded: '✓ ICO 文件已下载',
    noWebp: '请选择 WebP 文件。',
    noSize: '请至少选择一个尺寸。',
    step1: '拖入或选择一个 WebP 文件',
    step2: '勾选需要的图标尺寸',
    step3: '可选启用纯色背景以去除透明',
    step4: '点击「下载 ICO」— 保存多尺寸网站图标',

const { $, t } = GZ;
const SIZES = [16, 24, 32, 48, 64, 128, 256];
const DEFAULT_SIZES = new Set([16, 32, 48]);
let webpUrl = null, webpImg = null, fileName = 'favicon';
let activeSizes = new Set(DEFAULT_SIZES);

function renderSizeGrid() {
  const grid = $('#size-grid');
  grid.innerHTML = '';
  SIZES.forEach(s => {
    const card = document.createElement('div');
    card.className = 'size-card' + (activeSizes.has(s) ? ' active' : '');
    const preview = document.createElement('div');
    preview.className = 'preview';
    const img = document.createElement('img');
    img.style.width = Math.min(s, 56) + 'px';
    img.style.height = Math.min(s, 56) + 'px';
    img.alt = `${s}×${s}`;
    if (webpUrl) img.src = webpUrl;
    preview.appendChild(img);
    card.appendChild(preview);
    const lbl = document.createElement('div');
    lbl.className = 'lbl'; lbl.textContent = `${s} × ${s}`;
    card.appendChild(lbl);
    const chk = document.createElement('div');
    chk.className = 'chk';
    card.appendChild(chk);
    card.onclick = () => {
      if (activeSizes.has(s)) activeSizes.delete(s); else activeSizes.add(s);
      renderSizeGrid();
    };
    grid.appendChild(card);
  });
}

async function rasterize(size, useBg, bgColor) {
  const canvas = document.createElement('canvas');
  canvas.width = size; canvas.height = size;
  const ctx = canvas.getContext('2d');
  if (useBg) { ctx.fillStyle = bgColor; ctx.fillRect(0, 0, size, size); }
  if (!webpImg) return canvas;
  const iw = webpImg.naturalWidth, ih = webpImg.naturalHeight;
  const scale = Math.min(size / iw, size / ih);
  const dw = iw * scale, dh = ih * scale;
  ctx.drawImage(webpImg, (size - dw) / 2, (size - dh) / 2, dw, dh);
  return canvas;
}

async function buildIco(images) {
  const header = new Uint8Array(6);
  const dv = new DataView(header.buffer);
  dv.setUint16(0, 0, true);
  dv.setUint16(2, 1, true);
  dv.setUint16(4, images.length, true);
  const entries = [], blobs = [];
  let offset = 6 + images.length * 16;
  for (const im of images) {
    const entry = new Uint8Array(16);
    const edv = new DataView(entry.buffer);
    edv.setUint8(0, im.size >= 256 ? 0 : im.size);
    edv.setUint8(1, im.size >= 256 ? 0 : im.size);
    edv.setUint8(2, 0); edv.setUint8(3, 0);
    edv.setUint16(4, 1, true); edv.setUint16(6, 32, true);
    edv.setUint32(8, im.pngBytes.length, true);
    edv.setUint32(12, offset, true);
    entries.push(entry); blobs.push(im.pngBytes);
    offset += im.pngBytes.length;
  }
  const total = 6 + entries.length * 16 + blobs.reduce((a, b) => a + b.length, 0);
  const out = new Uint8Array(total);
  let o = 0;
  out.set(header, o); o += header.length;
  entries.forEach(e => { out.set(e, o); o += e.length; });
  blobs.forEach(b => { out.set(b, o); o += b.length; });
  return out;
}

function handleFile(file) {
  if (!file) return;
  const isWebp = file.type === 'image/webp' || /\.webp$/i.test(file.name);
  if (!isWebp) { $('#status').textContent = '⚠️ ' + t('noWebp'); return; }
  fileName = file.name.replace(/\.webp$/i, '') || 'favicon';
  webpUrl = URL.createObjectURL(file);
  webpImg = new Image();
  webpImg.onload = () => {
    $('#drop-area').style.display = 'none';
    $('#editor').style.display = 'block';
    renderSizeGrid();
  };
  webpImg.onerror = () => { $('#status').textContent = '⚠️ Could not decode WebP.'; };
  webpImg.src = webpUrl;
}

async function downloadIco() {
  if (!webpImg) return;
  if (activeSizes.size === 0) { alert(t('noSize')); return; }
  const useBg = $('#optBg').checked;
  const bgColor = $('#bgColor').value;
  $('#status').textContent = '⏳ Rendering...';
  const sizes = Array.from(activeSizes).sort((a, b) => a - b);
  const images = [];
  for (const s of sizes) {
    const canvas = await rasterize(s, useBg, bgColor);
    const blob = await new Promise(res => canvas.toBlob(res, 'image/png'));
    const bytes = new Uint8Array(await blob.arrayBuffer());
    images.push({ size: s, pngBytes: bytes });
  }
  const ico = await buildIco(images);
  const outBlob = new Blob([ico], { type: 'image/x-icon' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(outBlob);
  a.download = `${fileName}.ico`;
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 5000);
  $('#status').textContent = `✓ ${t('downloaded')} (${sizes.join(', ')} px)`;
}

$('#optBg').onchange = () => { $('#bgRow').style.display = $('#optBg').checked ? 'flex' : 'none'; };
$('#download-ico').onclick = downloadIco;
$('#reset').onclick = () => {
  if (webpUrl) URL.revokeObjectURL(webpUrl);
  webpUrl = null; webpImg = null;
  $('#editor').style.display = 'none';
  $('#drop-area').style.display = 'block';
  $('#status').textContent = '';
  $('#file-input').value = '';
  $('#drop-text').textContent = t('dropHere');
};

$('#drop-area').onclick = () => $('#file-input').click();
$('#file-input').onchange = e => { if (e.target.files[0]) handleFile(e.target.files[0]); };
$('#drop-area').ondragover = e => { e.preventDefault(); $('#drop-area').classList.add('drag'); };
$('#drop-area').ondragleave = () => $('#drop-area').classList.remove('drag');
$('#drop-area').ondrop = e => { e.preventDefault(); $('#drop-area').classList.remove('drag'); if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]); };

$('#drop-text').textContent = t('dropHere');
$('#optBgLbl').textContent = t('optBgLbl');
$('#bgColorLbl').textContent = t('bgColorLbl');
$('#dlLbl').textContent = t('dlLbl');
$('#resetLbl').textContent = t('resetLbl');

GZ.renderToolPage({
  category: 'convert',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🖼️', href:'/convert/webp-converter.html', name:'WebP Converter'},

</script>
