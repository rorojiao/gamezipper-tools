<script>
GZI18n.register({
  en: {
    toolTitle: 'Typewriter Effect Generator',
    toolDesc: 'Turn any text into a typing animation. Adjust speed, cursor style, sound and loop — then copy the HTML/CSS/JS to paste into your website. Free, no signup.',
    text: 'Text to type',
    speed: 'Speed (ms per char)',
    cursor: 'Cursor style',
    sound: 'Typing sound',
    loop: 'Loop',
    play: '▶ Play',
    stop: '■ Stop',
    copy: 'Copy code',
    codeTitle: 'Generated code',
    step1: 'Type the text you want to animate',
    step2: 'Adjust speed (ms per character) and pick a cursor style',
    step3: 'Toggle typing sound and loop, then click Play to preview',
    step4: 'Click Copy code and paste it into your HTML page',
  },
  zh: {
    toolTitle: '打字机效果生成器',
    toolDesc: '将任意文字转换为打字动画。可调节速度、光标样式、音效和循环 — 然后复制 HTML/CSS/JS 代码粘贴到你的网站。免费，无需注册。',
    text: '要打字的文本',
    speed: '速度（每字符毫秒）',
    cursor: '光标样式',
    sound: '打字音效',
    loop: '循环',
    play: '▶ 播放',
    stop: '■ 停止',
    copy: '复制代码',
    codeTitle: '生成的代码',
    step1: '输入要打字动画展示的文字',
    step2: '调整速度（每字符毫秒）并选择光标样式',
    step3: '开启音效和循环后点击「播放」预览',
    step4: '点击「复制代码」并粘贴到你的 HTML 页面中',
  }
});
const { $, t, copyText } = GZ;
$('#lbl-text').textContent = t('text');
$('#lbl-speed').textContent = t('speed');
$('#lbl-cursor').textContent = t('cursor');
$('#lbl-sound').textContent = t('sound');
$('#lbl-loop').textContent = t('loop');
$('#code-title').textContent = t('codeTitle');
$('#copy-code').textContent = t('copy');
let timer = null, audioCtx = null, pos = 0;
const CURSOR = {block:'▮', bar:'|', underscore:'_', none:''};
function tickSound() {
  if (!$('#sound-toggle').checked) return;
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.frequency.value = 1800 + Math.random()*400; o.type = 'square';
    g.gain.value = 0.04; o.connect(g); g.connect(audioCtx.destination);
    o.start(); o.stop(audioCtx.currentTime + 0.025);
  } catch(e){}
}
function stop() { if (timer) { clearInterval(timer); timer = null; } }
function play() {
  stop();
  const text = $('#src-text').value;
  const speed = Math.max(10, +$('#speed').value || 80);
  const loop = $('#loop-toggle').checked;
  pos = 0;
  const c = CURSOR[$('#cursor-sel').value];
  function step() {
    pos++;
    if (pos > text.length) {
      if (loop) { pos = 0; return; }
      stop();
      $('#preview').innerHTML = escapeHtml(text) + (c ? `<span class="cursor">${c==='|'?'&nbsp;':c}</span>` : '');
      return;
    }
    $('#preview').innerHTML = escapeHtml(text.slice(0, pos)) + (c ? `<span class="cursor">${c==='|'?'&nbsp;':c}</span>` : '');
    tickSound();
  }
  step();
  timer = setInterval(step, speed);
}
function escapeHtml(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function genCode() {
  const text = $('#src-text').value.replace(/`/g,'\\`').replace(/\$/g,'\\$');
  const speed = +$('#speed').value || 80;
  const cursor = $('#cursor-sel').value;
  const loop = $('#loop-toggle').checked ? 'true' : 'false';
  return `<!-- HTML -->
<div id="typewriter"><span id="tw-text"></span><span id="tw-cursor">${CURSOR[cursor]}</span></div>

<style>
#typewriter{font-family:'Courier New',monospace;font-size:1.4rem;color:#00ff88}
#tw-cursor{animation:tw-blink 1s steps(2) infinite}
@keyframes tw-blink{50%{opacity:0}}
</style>

<script>
(function(){
  const text = \`${text}\`;
  const speed = ${speed};
  const loop = ${loop};
  const el = document.getElementById('tw-text');
  let i = 0;
  (function type(){
    if(i <= text.length){ el.textContent = text.slice(0,i); i++; setTimeout(type, speed); }
    else if(loop){ i = 0; setTimeout(type, speed * 4); }
  })();
})();
<` + `/script>`;
}
function updateCode() { $('#code-out').textContent = genCode(); }
$('#copy-code').addEventListener('click', () => copyText($('#code-out').textContent));
$('#toolbar').innerHTML = `<button class="gz-btn" onclick="play()">${t('play')}</button><button class="gz-btn gz-btn-secondary" onclick="stop()">${t('stop')}</button>`;
['src-text','speed','cursor-sel','loop-toggle'].forEach(id => $('#'+id).addEventListener('input', updateCode));
updateCode();
GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'⚡', href:'/text/speed-reader.html', name:'Speed Reader'},
    {icon:'📖', href:'/text/bionic.html', name:'Bionic Reading'},
    {icon:'✍️', href:'/text/handwriting.html', name:'Handwriting'},
    {icon:'🎨', href:'/text/ascii-art.html', name:'ASCII Art'},
  ]
});
</script>

</body>
