const { $, t } = GZ;

// Standard Code 39 character table — verified against python-barcode 0.16.1
// (https://github.com/WhyNotHugo/python-barcode), which renders production-grade barcodes.
// Each value is exactly 9 chars of N (narrow) / W (wide).
// Bar/space alternate: indices 0,2,4,6,8 are BARS; 1,3,5,7 are SPACES.
// Every pattern contains exactly 3 wide elements (the "3-of-9" rule).
const TABLE = {
  '0':'NNNWWNWNN','1':'WNNWNNNNW','2':'NNWWNNNNW','3':'WNWWNNNNN','4':'NNNWWNNNW',
  '5':'WNNWWNNNN','6':'NNWWWNNNN','7':'NNNWNNWNW','8':'WNNWNNWNN','9':'NNWWNNWNN',
  'A':'WNNNNWNNW','B':'NNWNNWNNW','C':'WNWNNWNNN','D':'NNNNWWNNW','E':'WNNNWWNNN',
  'F':'NNWNWWNNN','G':'NNNNNWWNW','H':'WNNNNWWNN','I':'NNWNNWWNN','J':'NNNNWWWNN',
  'K':'WNNNNNNWW','L':'NNWNNNNWW','M':'WNWNNNNWN','N':'NNNNWNNWW','O':'WNNNWNNWN',
  'P':'NNWNWNNWN','Q':'NNNNNNWWW','R':'WNNNNNWWN','S':'NNWNNNWWN','T':'NNNNWNWWN',
  'U':'WWNNNNNNW','V':'NWWNNNNNW','W':'WWWNNNNNN','X':'NWNNWNNNW','Y':'WWNNWNNNN',
  'Z':'NWWNWNNNN',
  '-':'NWNNNNWNW','.':'WWNNNNWNN',' ':'NWWNNNWNN','*':'NWNNWNWNN','$':'NWNWNWNNN',
  '/':'NWNWNNNWN','+':'NWNNNWNWN','%':'NNNWNWNWN',
};

let opts = {
  fullAscii: true,
  showText: true,
  barColor: '#000000',
  bgColor: '#ffffff',
  barHeight: 90,
  narrowW: 2,
};

const textInput = $('#text-input');

function escapeHtml(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function buildBarcodeString(text) {
  // Normalize: full ascii mode uppercases lowercase letters
  let s = text.toUpperCase();
  if (!opts.fullAscii) {
    // standard mode: same set (Code 39 base is already uppercase-only)
  }
  // Validate every char is in TABLE
  for (let i = 0; i < s.length; i++) {
    if (!(s[i] in TABLE)) {
      return { error: s[i] };
    }
  }
  // Wrap with * start/stop
  return { pattern: '*' + s + '*', display: s };
}

function drawBarcode() {
  const text = textInput.value;
  const status = $('#status');
  textInput.classList.remove('invalid');
  if (!text.trim()) {
    status.innerHTML = `<span style="opacity:.6">${t('needText')}</span>`;
    clearCanvas();
    return;
  }
  const result = buildBarcodeString(text);
  if (result.error) {
    textInput.classList.add('invalid');
    status.innerHTML = `<span style="color:var(--gz-accent,#e94560)">${t('invalidChar').replace('{c}', escapeHtml(result.error))}</span>`;
    clearCanvas();
    return;
  }

  const pattern = result.pattern;
  const n = opts.narrowW;
  const w = n * 2.5; // wide:narrow ratio ~2.5:1 (industry standard 2-3)

  // Compute total width
  let totalW = 0;
  for (let i = 0; i < pattern.length; i++) {
    const def = TABLE[pattern[i]];
    // 9 elements + 1 inter-character space (narrow)
    for (let e = 0; e < 9; e++) totalW += (def[e] === 'W' ? w : n);
    totalW += n; // inter-char gap
  }
  totalW -= n; // remove trailing inter-char gap

  const padX = 20, padY = 16;
  const textH = opts.showText ? 22 : 0;
  const canvasW = Math.ceil(totalW + padX * 2);
  const canvasH = Math.ceil(opts.barHeight + padY * 2 + textH);

  const canvas = $('#barcode-canvas');
  canvas.width = canvasW;
  canvas.height = canvasH;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = opts.bgColor;
  ctx.fillRect(0, 0, canvasW, canvasH);

  // Draw bars
  let x = padX;
  ctx.fillStyle = opts.barColor;
  for (let i = 0; i < pattern.length; i++) {
    const def = TABLE[pattern[i]];
    for (let e = 0; e < 9; e++) {
      const width = def[e] === 'W' ? w : n;
      if (e % 2 === 0) {
        // bar
        ctx.fillRect(x, padY, width, opts.barHeight);
      }
      x += width;
    }
    x += n; // inter-character space
  }

  // Draw human-readable text
  if (opts.showText) {
    ctx.fillStyle = opts.barColor;
    ctx.font = '14px monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    ctx.fillText(result.display, canvasW / 2, padY + opts.barHeight + 4);
  }

  status.innerHTML = `<span style="color:var(--gz-success,#00d672)">${t('generated')}</span>`;
}

function clearCanvas() {
  const canvas = $('#barcode-canvas');
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  canvas.width = 0; canvas.height = 0;
}

function downloadPng() {
  const canvas = $('#barcode-canvas');
  if (!canvas.width) return;
  const link = document.createElement('a');
  link.download = 'code39-barcode.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
}

function loadExample() {
  textInput.value = 'GAMEZIPPER-2026';
  drawBarcode();
}

function doClear() { textInput.value = ''; drawBarcode(); }

// Options UI
$('#opts').innerHTML = `
  <div class="full"><label><input type="checkbox" id="opt-fullascii" ${opts.fullAscii?'checked':''}> ${t('fullAscii')}</label></div>
  <div class="full"><label><input type="checkbox" id="opt-showtext" ${opts.showText?'checked':''}> ${t('showText')}</label></div>
  <div><label>${t('barColor')}</label><input type="color" id="opt-barcolor" value="${opts.barColor}"></div>
  <div><label>${t('bgColor')}</label><input type="color" id="opt-bgcolor" value="${opts.bgColor}"></div>
  <div><label>${t('barHeight')}</label><input type="number" id="opt-height" value="${opts.barHeight}" min="30" max="300"></div>
  <div><label>${t('narrowWidth')}</label><input type="number" id="opt-narrow" value="${opts.narrowW}" min="1" max="6"></div>`;
document.getElementById('opt-fullascii').addEventListener('change', e => { opts.fullAscii = e.target.checked; drawBarcode(); });
document.getElementById('opt-showtext').addEventListener('change', e => { opts.showText = e.target.checked; drawBarcode(); });
document.getElementById('opt-barcolor').addEventListener('input', e => { opts.barColor = e.target.value; drawBarcode(); });
document.getElementById('opt-bgcolor').addEventListener('input', e => { opts.bgColor = e.target.value; drawBarcode(); });
document.getElementById('opt-height').addEventListener('input', e => { opts.barHeight = Math.max(30, +e.target.value || 90); drawBarcode(); });
document.getElementById('opt-narrow').addEventListener('input', e => { opts.narrowW = Math.max(1, +e.target.value || 2); drawBarcode(); });

textInput.addEventListener('input', drawBarcode);

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="drawBarcode()">${t('generate')}</button>
  <button class="gz-btn" onclick="downloadPng()">${t('download')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

  ]
});
</script>
