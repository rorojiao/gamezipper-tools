<script>
GZI18n.register({
  en: {

    remove: 'X',

    step2: 'Click Shuffle Description to cycle through 25+ responsibilities and requirements',
    step3: 'Tap Copy Description to grab it, or Save to keep a custom version for later',
    step4: 'Edit the saved descriptions to match your specific role - stored privately',
  },
  zh: {
    toolTitle: '岗位描述生成器',
    toolDesc: '为 30+ 岗位生成清晰、专业的职位描述，覆盖工程、市场、销售、运营等。选择角色、随机切换职责、要求和福利，定制后下载。免费、无需注册。',
    cat_all: '全部岗位',
    cat_engineering: '工程',
    cat_marketing: '市场',
    cat_sales: '销售',
    cat_design: '设计',
    cat_operations: '运营',
    cat_customer: '客户支持',
    cat_finance: '财务',
    btnNew: '换一组描述',
    btnCopy: '复制描述',
    btnFav: '收藏',
    favTitle: '我收藏的描述',
    remove: 'X',
    step1: '选择岗位类别或保留"全部岗位"以跨部门混合',
    step2: '点击"换一组描述"在该岗位中循环 25+ 职责、要求和福利',
    step3: '点击"复制描述"获取，或"收藏"保存自定义版本以备后用',
    step4: '编辑收藏的描述以匹配具体岗位 — 数据仅保存在你的浏览器中',
  }
});

const { $, t, showToast } = GZ;

const JDS = {
  confidence: [
    "I am capable, strong, and ready for today.",
    "I trust my instincts and my decisions.",
    "I grow more confident with every challenge I face.",
    "I am enough, exactly as I am.",
    "My voice matters and my opinions count.",
    "I radiate confidence and grace under pressure.",
    "I am proud of how far I have come.",
    "Mistakes are proof I am trying and growing.",
  ],
  motivation: [
    "Today I choose progress over perfection.",
    "Small steps every day lead to big results.",
    "I have the energy and focus to achieve my goals.",
    "I turn obstacles into stepping stones.",
    "My potential is limitless when I take action.",
    "I am unstoppable when I believe in myself.",
    "Discipline today builds the freedom I want tomorrow.",
    "Every effort I make is an investment in my future.",
  ],
  love: [
    "I am worthy of love, starting with my own.",
    "I treat myself with kindness and patience.",
    "I forgive myself and grow from every experience.",
    "My heart is open to giving and receiving love.",
    "I honor my needs and set healthy boundaries.",
    "I am complete and whole on my own.",
    "I deserve the same compassion I give others.",
    "Today I choose to be my own best friend.",
  ],
  anxiety: [
    "I breathe in calm and exhale tension.",
    "This feeling is temporary and I am safe right now.",
    "I release what I cannot control.",
    "With every breath, I feel more grounded.",
    "I have survived every hard day so far, and I will again.",
    "My mind is quiet, clear, and at peace.",
    "I allow myself to rest without guilt.",
    "I am stronger than my anxious thoughts.",
  ],
  success: [
    "Success flows to me naturally and abundantly.",
    "I attract opportunities that align with my goals.",
    "I am focused, disciplined, and destined to succeed.",
    "My hard work is paying off in ways I cannot yet see.",
    "I turn ideas into action and action into results.",
    "Abundance and prosperity are drawn to me.",
    "I am prepared for the success I am creating.",
    "Each day I move closer to the life I envision.",
  ],
};
const CATS = ['all','confidence','motivation','love','anxiety','success'];
let currentCat = 'all';
let currentText = '';
let favs = [];
try { favs = JSON.parse(localStorage.getItem('gz_jd_favs') || '[]'); } catch(e){ favs = []; }

function pool() {
  if (currentCat === 'all') {
    let arr = [];
    Object.values(JDS).forEach(a => arr = arr.concat(a));
    return arr;
  }
  return JDS[currentCat] || [];
}

function newJd() {
  const p = pool();
  if (!p.length) return;
  let next;
  let guard = 0;
  do { next = p[Math.floor(Math.random()*p.length)]; guard++; }
  while (next === currentText && p.length > 1 && guard < 10);
  currentText = next;
  $('#affirmText').textContent = currentText;
  updateFavBtn();
}

function copyCurrent() {
  if (!currentText) return;
  GZ.copyText(currentText);
  showToast(t('btnCopy') + ' ✓');
}

function isFav() { return favs.includes(currentText); }
function updateFavBtn() { $('#btnFav').innerHTML = isFav() ? '❤️' : '🤍'; }

function toggleFav() {
  if (!currentText) return;
  if (isFav()) { favs = favs.filter(f => f !== currentText); }
  else { favs.unshift(currentText); }
  localStorage.setItem('gz_jd_favs', JSON.stringify(favs));
  updateFavBtn();
  renderFavs();
}

function renderFavs() {
  const box = $('#favList');
  if (!favs.length) { box.innerHTML = ''; return; }
  box.innerHTML = `<h3 style="text-align:center;margin:8px 0">${t('favTitle')}</h3>` + favs.map((f,i) =>
    `<div class="fav-item"><span class="txt">${f}</span><button onclick="removeFav(${i})" title="${t('remove')}">${t('remove')}</button></div>`
  ).join('');
}

function removeFav(i) {
  favs.splice(i,1);
  localStorage.setItem('gz_jd_favs', JSON.stringify(favs));
  updateFavBtn();
  renderFavs();
}

const catBtnContainer = $('#catBtns');
CATS.forEach(c => {
  const btn = document.createElement('button');
  btn.textContent = t('cat_' + c);
  btn.className = c === currentCat ? 'active' : '';
  btn.onclick = () => {
    currentCat = c;
    catBtnContainer.querySelectorAll('button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    newJd();
  };
  catBtnContainer.appendChild(btn);
});

$('#btnNew').textContent = t('btnNew');
$('#btnCopy').textContent = t('btnCopy');
$('#btnFav').textContent = t('btnFav');
newJd();
renderFavs();

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],

    {icon:'📝', href:'/text/bio-generator.html', name:'Bio Generator'},
  ]
});
</script>
