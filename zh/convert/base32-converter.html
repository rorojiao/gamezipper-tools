<script>
GZI18n.register({
  en: {
    toolTitle: 'Base32 Encoder / Decoder',
    toolDesc: 'Convert text to Base32 and decode Base32 back to text. Supports RFC 4648 standard and Base32hex alphabets. Case-insensitive decoding.',

  zh: {

    toolDesc: '将文本编码为 Base32，或将 Base32 解码为文本。支持 RFC 4648 标准和 Base32hex 字母表，解码不区分大小写。',
    step1: '在输入区输入或粘贴文本',
    step2: '选择编码或解码模式',
    step3: '选择标准或 Base32hex 字母表',
    step4: '结果实时更新，点击「复制」即可使用',
    mode: '模式：',
    variant: '字母表：',
    encodeLabel: '文本输入',
    decodeLabel: 'Base32 输入',
    encodeOut: 'Base32 输出',
    decodeOut: '解码文本',
    example: '示例',
    clear: '清除',
    copy: '复制',
    invalid: '无效 Base32：仅允许 A-Z、2-7（hex 为 0-9、A-V）和 = 填充符',
    swap: '互换',
  }
});
const { $, copyText, t } = GZ;

const ALPHA_STD='ABCDEFGHIJKLMNOPQRSTUVWXYZ234567';
const ALPHA_HEX='0123456789ABCDEFGHIJKLMNOPQRSTUV';

function getAlpha(){
  return $('#variant').value==='hex'?ALPHA_HEX:ALPHA_STD;
}

function encodeBase32(bytes){
  const alpha=getAlpha();
  let bits=0,value=0,output='';
  for(let i=0;i<bytes.length;i++){
    value=(value<<8)|bytes[i];
    bits+=8;
    while(bits>=5){
      output+=alpha[(value>>>(bits-5))&31];
      bits-=5;
    }
  }
  if(bits>0){
    output+=alpha[(value<<(5-bits))&31];
  }
  while(output.length%8!==0)output+='=';
  return output;
}

function decodeBase32(str){
  const alpha=getAlpha().toUpperCase();
  str=str.toUpperCase().replace(/\s/g,'').replace(/=+$/,'');
  let bits=0,value=0;
  const output=[];
  for(const ch of str){
    const idx=alpha.indexOf(ch);
    if(idx<0)throw new Error(t('invalid'));
    value=(value<<5)|idx;
    bits+=5;
    if(bits>=8){
      output.push((value>>>(bits-8))&0xFF);
      bits-=8;
    }
  }
  return new Uint8Array(output);
}

function process(){
  const inp=$('#input').value;
  if(!inp){$('#output').textContent='';$('#status').textContent='';return;}
  const mode=$('#mode').value;
  try{
    if(mode==='encode'){
      const bytes=new TextEncoder().encode(inp);
      const result=encodeBase32(bytes);
      $('#output').textContent=result;
      $('#status').innerHTML=`<span style="color:var(--gz-success)">✓ ${result.length} chars</span>`;
    }else{
      const bytes=decodeBase32(inp);
      const result=new TextDecoder('utf-8',{fatal:false}).decode(bytes);
      $('#output').textContent=result;
      $('#status').innerHTML=`<span style="color:var(--gz-success)">✓ ${bytes.length} bytes decoded</span>`;
    }
  }catch(e){
    $('#output').textContent='';
    $('#status').innerHTML=`<span style="color:var(--gz-accent)">${e.message}</span>`;
  }
}

function onModeChange(){
  const mode=$('#mode').value;
  $('#lbl-in').textContent=mode==='encode'?t('encodeLabel'):t('decodeLabel');
  $('#lbl-out').textContent=mode==='encode'?t('encodeOut'):t('decodeOut');
  // swap input and output
  const out=$('#output').textContent;
  if(out)$('#input').value=out;
  process();
}

function loadExample(){
  const mode=$('#mode').value;
  $('#input').value=mode==='encode'?'Hello, GameZipper!':'JBSWY3DPEHPK3PXP';
  process();
}

function doSwap(){
  const out=$('#output').textContent;
  $('#mode').value=$('#mode').value==='encode'?'decode':'encode';
  onModeChange();
}

function doClear(){$('#input').value='';$('#output').textContent='';$('#status').textContent='';}

['input','variant'].forEach(id=>$('#'+id).addEventListener('input',process));

$('#toolbar').innerHTML=`
  <button class="gz-btn" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doSwap()">${t('swap')}</button>
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

$('#lbl-mode').textContent=t('mode');
$('#lbl-variant').textContent=t('variant');
$('#lbl-in').textContent=t('encodeLabel');
$('#lbl-out').textContent=t('encodeOut');

    {icon:'🔗',href:'/dev/base64url.html',name:'Base64URL'},
  ]
});
