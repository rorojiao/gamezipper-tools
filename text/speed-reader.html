        <select class="mini" id="color-select">
          <option value="#6c5ce7">Purple</option>

      </label>
    </div>
    <div style="margin-top:14px">
      <label id="lbl-paste" style="font-size:.85rem;color:var(--text2);font-weight:600;display:block;margin-bottom:6px"></label>
      <textarea id="text-input" rows="6" spellcheck="false" style="width:100%"></textarea>

<script>
GZI18n.register({
  en: {
    toolTitle: 'Speed Reader (RSVP)',
    toolDesc: 'Read faster with RSVP — words flash one at a time. Adjustable 100-1200 WPM, chunk size, font and color.',
    speed: 'Speed',
    chunk: 'Words/chunk:',
    font: 'Font:',
    color: 'Focus color:',
    paste: 'Paste your text here:',
    step1: 'Paste any text into the box below the reader',
    step2: 'Adjust speed with the slider (try 400 WPM to start)',
    step3: 'Press Play — keep your eyes on the highlighted character',
    step4: 'Pause anytime and use Reset to start over',
    empty: 'Paste text above to start reading',
    finished: '✓ Finished',
    pause: 'Paused',
  },
  zh: {
    toolTitle: '快速阅读器（RSVP）',
    toolDesc: '使用 RSVP 速读法 — 文字逐字闪现。可调 100-1200 字/分钟、单次显示词数、字体和颜色。',
    speed: '速度',
    chunk: '单次词数：',
    font: '字体：',
    color: '焦点颜色：',
    paste: '在此粘贴文本：',
    step1: '将任意文本粘贴到下方输入框',
    step2: '用滑块调整速度（建议从 400 字/分钟开始）',
    step3: '按播放，保持视线在紫色高亮字符上',
    step4: '可随时暂停，或按重置从头开始',
    empty: '请在上方粘贴文本开始阅读',
    finished: '✓ 已读完',
    pause: '已暂停',
  }
});

const { $, t } = GZ;
let words = [];
let pos = 0;
let timer = null;
let playing = false;

const DEFAULT_TEXT = "Speed reading is any of many techniques that people use to try to improve their ability to read quickly. RSVP shows words one at a time at the same point on screen, eliminating the time your eyes would normally spend moving between words. Practice regularly and you will quickly increase your reading speed while maintaining comprehension. Try increasing the words-per-minute a little each day.";

$('#text-input').value = DEFAULT_TEXT;
$('#word-display').style.fontFamily = 'Georgia, serif';
words = tokenize(DEFAULT_TEXT);

function tokenize(text) {
  return text.split(/\s+/).filter(w => w.length > 0);
}

function focusChar(word) {
  // Choose focus char — ~40% into word, max index 5
  const len = word.length;
  if (len <= 1) return 0;
  const idx = Math.min(Math.floor(len * 0.4), 5);
  return idx;
}

function renderWord() {
  if (words.length === 0) {
    $('#word-display').textContent = t('empty');
    $('#stat-pos').textContent = '0 / 0';
    $('#stat-eta').textContent = '⏱ 0s';
    $('#progress').style.width = '0%';
    return;
  }
  if (pos >= words.length) {
    $('#word-display').innerHTML = `<span style="color:var(--success)">${t('finished')}</span>`;
    $('#progress').style.width = '100%';
    $('#stat-pos').textContent = `${words.length} / ${words.length}`;
    $('#stat-eta').textContent = '⏱ 0s';
    stop();
    return;
  }
  const chunk = parseInt($('#chunk-size').value, 10);
  const slice = words.slice(pos, pos + chunk);
  const joined = slice.join(' ');
  const focusIdx = focusChar(slice[0]);
  const before = joined.slice(0, focusIdx);
  const char = joined.slice(focusIdx, focusIdx + 1);
  const after = joined.slice(focusIdx + 1);
  $('#word-display').innerHTML = `${before}<span class="focus-char">${char}</span>${after}`;
  const pct = (pos / words.length) * 100;
  $('#progress').style.width = pct + '%';
  $('#stat-pos').textContent = `${pos + 1} / ${words.length}`;
  const wpm = parseInt($('#speed-slider').value, 10);
  const remaining = words.length - pos;
  const seconds = Math.ceil((remaining / wpm) * 60);
  const mm = Math.floor(seconds / 60);
  const ss = seconds % 60;
  $('#stat-eta').textContent = `⏱ ${mm > 0 ? mm + 'm ' : ''}${ss}s`;
  $('#stat-wpm').textContent = `📊 ${wpm} WPM`;
}

function tick() {
  const chunk = parseInt($('#chunk-size').value, 10);
  pos += chunk;
  renderWord();
  if (pos >= words.length) { stop(); return; }
  scheduleNext();
}

function scheduleNext() {
  if (!playing) return;
  const wpm = parseInt($('#speed-slider').value, 10);
  const chunk = parseInt($('#chunk-size').value, 10);
  const interval = (60000 / wpm) * chunk;
  timer = setTimeout(tick, interval);
}

function play() {
  if (words.length === 0) {
    words = tokenize($('#text-input').value);
    if (words.length === 0) return;
    pos = 0;
  }
  if (pos >= words.length) pos = 0;
  playing = true;
  renderWord();
  scheduleNext();
}

function pause() {
  playing = false;
  if (timer) { clearTimeout(timer); timer = null; }
}

function stop() {
  playing = false;
  if (timer) { clearTimeout(timer); timer = null; }
}

function reset() {
  stop();
  pos = 0;
  renderWord();
}

$('#play-btn').addEventListener('click', play);
$('#pause-btn').addEventListener('click', () => { pause(); });
$('#reset-btn').addEventListener('click', reset);
$('#text-input').addEventListener('input', () => {
  words = tokenize($('#text-input').value);
  pos = 0;
  stop();
  renderWord();
});
$('#speed-slider').addEventListener('input', e => {
  $('#speed-val').textContent = e.target.value + ' WPM';
  if (playing) { if (timer) clearTimeout(timer); scheduleNext(); }
  renderWord();
});
$('#chunk-size').addEventListener('change', () => { renderWord(); });
$('#font-select').addEventListener('change', e => { $('#word-display').style.fontFamily = e.target.value; });
$('#color-select').addEventListener('change', e => {
  document.documentElement.style.setProperty('--accent', e.target.value);
  renderWord();
});

$('#lbl-chunk').textContent = t('chunk');
$('#lbl-font').textContent = t('font');
$('#lbl-color').textContent = t('color');
$('#lbl-paste').textContent = t('paste');
renderWord();

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📊', href:'/text/reading-time.html', name:'Reading Time'},
    {icon:'📝', href:'/text/word-counter.html', name:'Word Counter'},
    {icon:'📖', href:'/text/bionic.html', name:'Bionic Reading'},
    {icon:'✍️', href:'/text/handwriting.html', name:'Handwriting'},
  ]
});
</script>

</body>
