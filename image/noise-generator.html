<script>

  zh: {

    toolDesc: '为背景、胶片颗粒、Hero 区和设计稿生成可定制的噪点纹理。下载为 PNG 或 SVG。',
    lblW: '宽度 (px)',
    lblH: '高度 (px)',
    lblType: '类型',
    lblDens: '密度',
    lblBlend: '混合模式',
    lblBg: '背景色',
    lblC1: '颜色 1',
    lblC2: '颜色 2',
    btnGen: '生成',
    btnPng: '下载 PNG',
    btnSvg: '下载 SVG',
    btnRand: '随机',
    pixels: (w, h) => `${w} × ${h} 像素`,
    step1: '设置画布尺寸、类型（单色/彩色/双色）和密度',
    step2: '选择背景色和颜色节点',
    step3: '点击「生成」渲染噪点纹理',
    step4: '下载为 PNG（带透明）或 SVG（无限缩放）',
  }
});

const { $, t } = GZ;

function hex2rgb(hex) {
  const m = hex.replace('#','').match(/.{1,2}/g);
  return [parseInt(m[0],16), parseInt(m[1],16), parseInt(m[2],16)];
}
function rgb2hex(r,g,b) {
  return '#' + [r,g,b].map(x => x.toString(16).padStart(2,'0')).join('');
}
function mix(c1, c2, t) {
  const a = hex2rgb(c1), b = hex2rgb(c2);
  return rgb2hex(Math.round(a[0]+(b[0]-a[0])*t), Math.round(a[1]+(b[1]-a[1])*t), Math.round(a[2]+(b[2]-a[2])*t));
}
function hash(n) {
  let x = Math.sin(n) * 43758.5453;
  return x - Math.floor(x);
}

function generate() {
  const w = Math.max(50, Math.min(1200, +$('#f-w').value));
  const h = Math.max(50, Math.min(1200, +$('#f-h').value));
  const type = $('#f-type').value;
  const dens = +$('#f-dens').value / 100;
  const bg = $('#f-bg').value;
  const c1 = $('#f-c1').value;
  const c2 = $('#f-c2').value;
  const canvas = $('#canvas');
  canvas.width = w; canvas.height = h;
  const ctx = canvas.getContext('2d');
  // background
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, w, h);
  // noise
  const img = ctx.createImageData(w, h);
  const d = img.data;
  const step = Math.max(1, Math.floor(1 / dens));
  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      const i = (y * w + x) * 4;
      const n = hash(x * 12.9898 + y * 78.233);
      if (type === 'mono') {
        const v = Math.floor(n * 255);
        d[i] = v; d[i+1] = v; d[i+2] = v; d[i+3] = Math.floor(n * 255);
      } else if (type === 'color') {
        d[i] = Math.floor(hash(n * 7.31) * 255);
        d[i+1] = Math.floor(hash(n * 13.7) * 255);
        d[i+2] = Math.floor(hash(n * 23.1) * 255);
        d[i+3] = Math.floor(n * 255);
      } else { // duotone
        const col = mix(c1, c2, n);
        const rgb = hex2rgb(col);
        d[i] = rgb[0]; d[i+1] = rgb[1]; d[i+2] = rgb[2];
        d[i+3] = Math.floor(n * 255);
      }
    }
  }
  ctx.putImageData(img, 0, 0);
  $('#stats').innerHTML = `<span><strong>${t('pixels')(w, h)}</strong></span><span>${type}</span><span>${Math.round(dens*100)}%</span>`;
}

function downloadPng() {
  const a = document.createElement('a');
  a.download = 'noise.png';
  a.href = $('#canvas').toDataURL('image/png');
  a.click();
}

function downloadSvg() {
  const w = +$('#f-w').value, h = +$('#f-h').value;
  const type = $('#f-type').value;
  const bg = $('#f-bg').value;
  // generate noise as SVG <rect> per "high noise" pixel (sparse for SVG size)
  const dens = +$('#f-dens').value / 100;
  const rects = [];
  const step = Math.max(2, Math.floor(8 / Math.max(0.2, dens)));
  for (let y = 0; y < h; y += step) {
    for (let x = 0; x < w; x += step) {
      const n = hash(x * 12.9898 + y * 78.233);
      if (n < dens) {
        const a = (n * 0.6).toFixed(2);
        let fill = '#fff';
        if (type === 'mono') fill = `rgba(255,255,255,${a})`;
        else if (type === 'color') fill = `rgb(${Math.floor(hash(n*7.3)*255)},${Math.floor(hash(n*13.7)*255)},${Math.floor(hash(n*23.1)*255)})`;
        else fill = mix($('#f-c1').value, $('#f-c2').value, n);
        rects.push(`<rect x="${x}" y="${y}" width="${step}" height="${step}" fill="${fill}" opacity="${a}"/>`);
      }
    }
  }
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}" viewBox="0 0 ${w} ${h}"><rect width="${w}" height="${h}" fill="${bg}"/><g>${rects.join('')}</g></svg>`;
  const blob = new Blob([svg], { type: 'image/svg+xml' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.download = 'noise.svg';
  a.href = url;
  a.click();
  URL.revokeObjectURL(url);
}

function randomize() {
  const types = ['mono','color','duotone'];
  $('#f-type').value = types[Math.floor(Math.random()*3)];
  $('#f-dens').value = 20 + Math.floor(Math.random()*60);
  $('#f-bg').value = '#' + Math.floor(Math.random()*0xffffff).toString(16).padStart(6,'0');
  $('#f-c1').value = '#ffffff';
  $('#f-c2').value = '#000000';
  generate();
}

// init labels
['w','h','type','dens','blend','bg','c1','c2'].forEach(k => {
  const map = { w:'lblW', h:'lblH', type:'lblType', dens:'lblDens', blend:'lblBlend', bg:'lblBg', c1:'lblC1', c2:'lblC2' };
  const lbl = $('#' + map[k]); if (lbl) lbl.textContent = t(map[k]);
});
$('#btn-gen').textContent = t('btnGen');
$('#btn-png').textContent = t('btnPng');
$('#btn-svg').textContent = t('btnSvg');
$('#btn-rand').textContent = t('btnRand');

$('#btn-gen').onclick = generate;
$('#btn-png').onclick = downloadPng;
$('#btn-svg').onclick = downloadSvg;
$('#btn-rand').onclick = randomize;
['f-w','f-h','f-type','f-dens','f-bg','f-c1','f-c2'].forEach(id => $('#'+id).addEventListener('change', generate));

generate();

    {icon:'📐', href:'/css-tools/svg-pattern.html', name:'SVG Pattern'},

});
</script>
