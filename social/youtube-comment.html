<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="ctrl" id="controls"></div>
    <div class="yt-card" id="yt-preview"></div>
  </div>

</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'YouTube Comment Generator',
    toolDesc: 'Create realistic YouTube comment mockups for thumbnails and design — customize name, comment, likes and download as PNG.',
    displayName: 'Channel Name',
    avatar: 'Avatar Initial',
    avatarColor: 'Avatar Color',
    content: 'Comment Text',
    time: 'Time',
    likes: 'Likes',
    replies: 'Replies',
    pinned: 'Pinned',
    hearted: 'Hearted by creator ❤️',
    download: 'Download PNG',
    clear: 'Clear',
    step1: 'Enter the channel name and pick an avatar color',
    step2: 'Type the comment text',
    step3: 'Customize likes, replies, pinned and heart status',
    step4: 'Download the YouTube comment as a PNG image',
  },
  zh: {
    toolTitle: 'YouTube 评论生成器',
    toolDesc: '创建逼真的 YouTube 评论截图 — 自定义频道名、评论内容、点赞数，下载为 PNG 图片。',
    displayName: '频道名称',
    avatar: '头像字母',
    avatarColor: '头像颜色',
    content: '评论文本',
    time: '时间',
    likes: '点赞',
    replies: '回复',
    pinned: '置顶',
    hearted: '创作者点赞 ❤️',
    download: '下载 PNG',
    clear: '清除',
    step1: '输入频道名称并选择头像颜色',
    step2: '输入评论文本',
    step3: '自定义点赞、回复数、置顶和红心状态',
    step4: '下载 YouTube 评论为 PNG 图片',
  }
});

const { $, copyText, t } = GZ;

let cfg = {
  name: '@GameZipperTools',
  avatar: 'G',
  color: '#ff0000',
  content: 'This is exactly the tool I was looking for! 🎉 Saved me so much time. The best part is everything runs right in the browser — no signup needed. Already shared it with my whole team!\n\nKeep up the amazing work! 👏',
  time: '3 weeks ago',
  likes: 4820,
  replies: 37,
  pinned: true,
  hearted: true
};

function formatNum(n) {
  if (n >= 1000000) return (n/1000000).toFixed(1)+'M';
  if (n >= 1000) return (n/1000).toFixed(1)+'K';
  return n.toString();
}

function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function buildControls() {
  const c = $('#controls');
  c.innerHTML = `
    <label>${t('displayName')}<input type="text" id="cName" value="${escHtml(cfg.name)}"></label>
    <label>${t('avatar')}<input type="text" id="cAvatar" value="${escHtml(cfg.avatar)}" style="width:60px;text-align:center" maxlength="2"></label>
    <label>${t('avatarColor')}<input type="color" id="cColor" value="${cfg.color}" style="min-height:36px;height:36px;width:60px"></label>
    <label>${t('content')}<textarea id="cContent" rows="4" style="min-width:280px">${escHtml(cfg.content)}</textarea></label>
    <label>${t('time')}<input type="text" id="cTime" value="${escHtml(cfg.time)}"></label>
    <label>${t('likes')}<input type="number" id="cLikes" value="${cfg.likes}" min="0"></label>
    <label>${t('replies')}<input type="number" id="cReplies" value="${cfg.replies}" min="0"></label>
    <label>${t('pinned')}<input type="checkbox" id="cPinned" ${cfg.pinned?'checked':''}></label>
    <label>${t('hearted')}<input type="checkbox" id="cHearted" ${cfg.hearted?'checked':''}></label>
  `;
  const map = {cName:'name',cContent:'content',cAvatar:'avatar',cTime:'time'};
  Object.keys(map).forEach(id=>$('#'+id).oninput=e=>{cfg[map[id]]=e.target.value;render()});
  $('#cColor').oninput=e=>{cfg.color=e.target.value;render()};
  const nums={cLikes:'likes',cReplies:'replies'};
  Object.keys(nums).forEach(id=>$('#'+id).oninput=e=>{cfg[nums[id]]=+e.target.value||0;render()});
  $('#cPinned').onchange=e=>{cfg.pinned=e.target.checked;render()};
  $('#cHearted').onchange=e=>{cfg.hearted=e.target.checked;render()};
}

function render() {
  $('#yt-preview').innerHTML = `
    ${cfg.pinned?`<div class="yt-pin">📌 <span>Pinned by creator</span></div>`:''}
    <div class="yt-comment">
      <div class="yt-avatar" style="background:${cfg.color}">${escHtml(cfg.avatar||'?')}</div>
      <div style="flex:1;min-width:0">
        <div class="yt-name">@${escHtml(cfg.name.replace(/^@/,''))}<span class="yt-time">${escHtml(cfg.time)}</span></div>
        <div class="yt-text">${escHtml(cfg.content)}</div>
        <div class="yt-actions">
          <span class="yt-vote"><span>👍 ${formatNum(cfg.likes)}</span><span>👎</span></span>
          <span>💬 ${t('replies')} ${formatNum(cfg.replies)}</span>
          ${cfg.hearted?'<span class="yt-heart">❤️</span>':''}
        </div>
      </div>
    </div>
  `;
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" id="dlBtn">${t('download')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="cfg.content='';cfg.likes=0;cfg.replies=0;buildControls();render()">${t('clear')}</button>
`;

$('#dlBtn').onclick = async () => {
  try {
    if (typeof html2canvas !== 'undefined') {
      const canvas = await html2canvas($('#yt-preview'), { backgroundColor: null, scale: 2 });
      const a = document.createElement('a');
      a.href = canvas.toDataURL('image/png');
      a.download = 'youtube-comment.png';
      a.click();
    }
  } catch(e) { console.error(e); }
};

const h2c = document.createElement('script');
h2c.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
document.head.appendChild(h2c);

buildControls();
render();

GZ.renderToolPage({
  category: 'social',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🐦', href:'/social/tweet-generator.html', name:'Tweet Generator'},
    {icon:'📘', href:'/social/facebook-post.html', name:'Facebook Post'},
    {icon:'🖼️', href:'/social/youtube-thumb.html', name:'YouTube Thumbnail'},
    {icon:'✈️', href:'/social/telegram-chat.html', name:'Telegram Chat'},
  ]
});
</script>

</body>
