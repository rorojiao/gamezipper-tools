<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="form-grid">
      <div class="fg"><label id="lbl-name"></label><input id="appName" value="My PWA App"></div>
      <div class="fg"><label id="lbl-short"></label><input id="shortName" value="MyPWA"></div>
      <div class="fg"><label id="lbl-desc2"></label><input id="appDesc" value="A Progressive Web Application"></div>
      <div class="fg"><label id="lbl-start"></label><input id="startUrl" value="/"></div>
      <div class="fg"><label id="lbl-display"></label>
        <select id="displayMode">
          <option value="standalone" selected>standalone</option>
          <option value="fullscreen">fullscreen</option>
          <option value="minimal-ui">minimal-ui</option>
          <option value="browser">browser</option>
        </select>
      </div>
      <div class="fg"><label id="lbl-orient"></label>
        <select id="orientation">
          <option value="any" selected>any</option>
          <option value="portrait">portrait</option>
          <option value="landscape">landscape</option>
        </select>
      </div>
      <div class="fg"><label id="lbl-theme"></label><div style="display:flex;align-items:center"><input id="themeColor" type="color" value="#4ecdc4"><span class="color-preview" id="themePreview" style="background:#4ecdc4"></span></div></div>
      <div class="fg"><label id="lbl-bg"></label><div style="display:flex;align-items:center"><input id="bgColor" type="color" value="#ffffff"><span class="color-preview" id="bgPreview" style="background:#ffffff"></span></div></div>
    </div>
    <div id="output"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'PWA Manifest Generator',
    toolDesc: 'Generate a complete manifest.json for Progressive Web Apps — name, icons, theme, display mode, shortcuts and more.',
    lblName: 'App Name',
    lblShort: 'Short Name',
    lblDesc: 'Description',
    lblStart: 'Start URL',
    lblDisplay: 'Display Mode',
    lblOrient: 'Orientation',
    lblTheme: 'Theme Color',
    lblBg: 'Background Color',
    generate: 'Generate',
    copy: 'Copy',
    clear: 'Reset',
    step1: 'Fill in your app name, colors and display settings',
    step2: 'Click Generate to create the manifest.json',
    step3: 'Copy the JSON and add it to your project root',
  },
  zh: {
    toolTitle: 'PWA Manifest 生成器',
    toolDesc: '为渐进式 Web 应用生成完整的 manifest.json — 名称、图标、主题色、显示模式等。',
    lblName: '应用名称',
    lblShort: '短名称',
    lblDesc: '描述',
    lblStart: '启动 URL',
    lblDisplay: '显示模式',
    lblOrient: '屏幕方向',
    lblTheme: '主题色',
    lblBg: '背景色',
    generate: '生成',
    copy: '复制',
    clear: '重置',
    step1: '填写应用名称、颜色和显示设置',
    step2: '点击「生成」创建 manifest.json',
    step3: '复制 JSON 并添加到项目根目录',
  }
});

const { $, copyText, t } = GZ;

$('#lbl-name').textContent = t('lblName');
$('#lbl-short').textContent = t('lblShort');
$('#lbl-desc2').textContent = t('lblDesc');
$('#lbl-start').textContent = t('lblStart');
$('#lbl-display').textContent = t('lblDisplay');
$('#lbl-orient').textContent = t('lblOrient');
$('#lbl-theme').textContent = t('lblTheme');
$('#lbl-bg').textContent = t('lblBg');

$('#themeColor').addEventListener('input', e => {
  $('#themePreview').style.background = e.target.value;
});
$('#bgColor').addEventListener('input', e => {
  $('#bgPreview').style.background = e.target.value;
});

function generate() {
  const name = $('#appName').value.trim();
  const shortName = $('#shortName').value.trim();
  const desc = $('#appDesc').value.trim();
  const startUrl = $('#startUrl').value.trim();
  const display = $('#displayMode').value;
  const orient = $('#orientation').value;
  const themeColor = $('#themeColor').value;
  const bgColor = $('#bgColor').value;

  const manifest = {
    name: name || 'My PWA App',
    short_name: shortName || 'MyPWA',
    description: desc || '',
    start_url: startUrl || '/',
    display: display,
    orientation: orient,
    theme_color: themeColor,
    background_color: bgColor,
    icons: [
      { src: 'icons/icon-192.png', sizes: '192x192', type: 'image/png' },
      { src: 'icons/icon-512.png', sizes: '512x512', type: 'image/png' },
      { src: 'icons/icon-maskable-192.png', sizes: '192x192', type: 'image/png', purpose: 'maskable' },
      { src: 'icons/icon-maskable-512.png', sizes: '512x512', type: 'image/png', purpose: 'maskable' }
    ]
  };

  $('#output').textContent = JSON.stringify(manifest, null, 2);
}

function doReset() {
  $('#appName').value = 'My PWA App';
  $('#shortName').value = 'MyPWA';
  $('#appDesc').value = 'A Progressive Web Application';
  $('#startUrl').value = '/';
  $('#displayMode').value = 'standalone';
  $('#orientation').value = 'any';
  $('#themeColor').value = '#4ecdc4';
  $('#bgColor').value = '#ffffff';
  $('#themePreview').style.background = '#4ecdc4';
  $('#bgPreview').style.background = '#ffffff';
  $('#output').textContent = '';
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="generate()">${t('generate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doReset()">${t('clear')}</button>`;

generate();

GZ.renderToolPage({
  category: 'dev',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3'],
  related: [
    {icon:'📋', href:'/dev/json.html', name:'JSON Formatter'},
    {icon:'📱', href:'/image/favicon-generator.html', name:'Favicon Generator'},
    {icon:'📱', href:'/image/app-icon-generator.html', name:'App Icon Generator'},
    {icon:'🚀', href:'/dev/coming-soon.html', name:'Coming Soon Page'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
