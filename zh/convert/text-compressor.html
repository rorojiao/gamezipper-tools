const { $, copyText, t } = GZ;
let mode = 'compress';
let lastBlob = null;
const ALGOS = [
  { id: 'gzip', label: 'GZip', ext: 'gz', mime: 'application/gzip' },
  { id: 'deflate', label: 'Deflate', ext: 'deflate', mime: 'application/octet-stream' },
  { id: 'deflate-raw', label: 'Deflate (raw)', ext: 'deflate', mime: 'application/octet-stream' },
  { id: 'br', label: 'Brotli', ext: 'br', mime: 'application/brotli' },
];

function supported() {
  return typeof CompressionStream !== 'undefined' && typeof DecompressionStream !== 'undefined';
}

function bytesToBase64(bytes) {
  let bin = '';
  const chunk = 0x8000;
  for (let i = 0; i < bytes.length; i += chunk) {
    bin += String.fromCharCode.apply(null, bytes.subarray(i, i + chunk));
  }
  return btoa(bin);
}
function base64ToBytes(b64) {
  const clean = b64.trim().replace(/\s+/g, '');
  const bin = atob(clean);
  const out = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) out[i] = bin.charCodeAt(i);
  return out;
}

function fmtBytes(b) {
  if (b === 0) return '0 B';
  const u = ['B','KB','MB','GB'];
  const i = Math.floor(Math.log(b) / Math.log(1024));
  return (b / Math.pow(1024, i)).toFixed(i === 0 ? 0 : 2) + ' ' + u[i];
}

async function compress(text, algo) {
  const cs = new CompressionStream(algo);
  const writer = cs.writable.getWriter();
  const data = new TextEncoder().encode(text);
  writer.write(data);
  writer.close();
  const chunks = [];
  const reader = cs.readable.getReader();
  let total = 0;
  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    chunks.push(value); total += value.length;
  }
  const out = new Uint8Array(total);
  let off = 0;
  for (const c of chunks) { out.set(c, off); off += c.length; }
  return out;
}

async function decompress(bytes, algo) {
  const ds = new DecompressionStream(algo);
  const writer = ds.writable.getWriter();
  writer.write(bytes);
  writer.close();
  const chunks = [];
  const reader = ds.readable.getReader();
  let total = 0;
  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    chunks.push(value); total += value.length;
  }
  const out = new Uint8Array(total);
  let off = 0;
  for (const c of chunks) { out.set(c, off); off += c.length; }
  return new TextDecoder().decode(out);
}

function getAlgo() { return $('#algo').value; }
function getOutMode() { return document.querySelector('input[name=outmode]:checked').value; }

async function run() {
  if (!supported()) { alert(t('noStreamSupport')); return; }
  const inp = $('#input').value;
  if (!inp.trim()) { alert(t('emptyInput')); return; }
  const algo = getAlgo();
  try {
    if (mode === 'compress') {
      const originalBytes = new TextEncoder().encode(inp);
      const compressed = await compress(inp, algo);
      const b64 = bytesToBase64(compressed);
      $('#output').value = b64;
      lastBlob = new Blob([compressed], { type: ALGOS.find(a => a.id === algo).mime });
      const ratio = originalBytes.length > 0 ? Math.round((1 - compressed.length / originalBytes.length) * 100) : 0;
      const saved = ratio >= 0 ? fmtBytes(originalBytes.length - compressed.length) : '-' + fmtBytes(compressed.length - originalBytes.length);
      $('#stats').innerHTML = t('statLine')
        .replace('{orig}', fmtBytes(originalBytes.length))
        .replace('{comp}', fmtBytes(compressed.length))
        .replace('{ratio}', ratio)
        .replace('{saved}', saved);
      $('#stats').style.display = 'block';
    } else {
      const bytes = base64ToBytes(inp);
      const text = await decompress(bytes, algo);
      $('#output').value = text;
      const decompressedBytes = new TextEncoder().encode(text);
      $('#stats').innerHTML = t('statLineDe')
        .replace('{orig}', fmtBytes(bytes.length))
        .replace('{comp}', fmtBytes(decompressedBytes.length));
      $('#stats').style.display = 'block';
    }
  } catch (e) {
    alert(t('invalidInput') + '\n' + e.message);
  }
}

function download() {
  if (!lastBlob) return;
  const algo = getAlgo();
  const meta = ALGOS.find(a => a.id === algo);
  const url = URL.createObjectURL(lastBlob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'compressed.' + meta.ext;
  document.body.appendChild(a); a.click();
  setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 200);
}

function clearAll() { $('#input').value = ''; $('#output').value = ''; $('#stats').style.display = 'none'; lastBlob = null; }

function swap() { $('#input').value = $('#output').value; $('#output').value = ''; $('#stats').style.display = 'none'; lastBlob = null; }

function loadExample() {
  if (mode === 'compress') {
    $('#input').value = `Compression reduces file size by encoding data more efficiently. ` +
      `GZip and Brotli are widely used for HTTP responses, log files and text payloads. ` +
      `Brotli often outperforms GZip on text by 15-25%. `.repeat(10);
  } else {
    // pre-compressed base64 of "Hello, World!" using gzip
    $('#input').value = 'H4sIAAAAAAAAA/NIzcnJVwjPL8pJUQQAoxFkJUAAAA=';
    $('#algo').value = 'gzip';
  }
}

function updateUI() {
  $('#tab-compress').classList.toggle('active', mode === 'compress');
  $('#tab-decompress').classList.toggle('active', mode === 'decompress');
  $('#lbl-in').textContent = t(mode === 'compress' ? 'inputLbl' : 'inputLblDe');
  $('#lbl-out').textContent = t(mode === 'compress' ? 'outputLbl' : 'outputLblDe');
  $('#input').placeholder = mode === 'compress' ? 'Paste text to compress...' : 'Paste base64 here or drop .gz/.br file...';
  renderToolbar();
  $('#stats').style.display = 'none';
  $('#output').value = '';
  lastBlob = null;
}

function renderToolbar() {
  const parts = [];
  parts.push(`<button class="gz-btn" onclick="run()">${t(mode === 'compress' ? 'run' : 'runDe')}</button>`);
  parts.push(`<button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('loadExample')}</button>`);
  parts.push(`<button class="gz-btn" onclick="copyText($('#output').value)">${t('copy')}</button>`);
  if (mode === 'compress') parts.push(`<button class="gz-btn gz-btn-secondary" onclick="download()">${t('download')}</button>`);
  parts.push(`<button class="gz-btn gz-btn-secondary" onclick="swap()">${t('swap')}</button>`);
  parts.push(`<button class="gz-btn gz-btn-secondary" onclick="clearAll()">${t('clear')}</button>`);
  $('#toolbar').innerHTML = parts.join('');
}

// Wire UI
$('#optRow').innerHTML = `
  <label>${t('algorithm')}:
    <select id="algo">
      ${ALGOS.map(a => `<option value="${a.id}">${a.label}</option>`).join('')}
    </select>
  </label>
  <label>${t('outputMode')}:
    <label style="font-weight:normal"><input type="radio" name="outmode" value="base64" checked> ${t('modeBase64')}</label>
  </label>`;
$('#tab-compress').onclick = () => { mode = 'compress'; updateUI(); };
$('#tab-decompress').onclick = () => { mode = 'decompress'; updateUI(); };
$('#tab-compress').textContent = t('tabCompress');
$('#tab-decompress').textContent = t('tabDecompress');
$('#note').textContent = t('note');

// Drag & drop support for decompress
const ta = $('#input');
['dragover','dragenter'].forEach(ev => ta.addEventListener(ev, e => { e.preventDefault(); ta.style.outline = '2px solid var(--gz-accent,#e94560)'; }));
['dragleave','drop'].forEach(ev => ta.addEventListener(ev, e => { e.preventDefault(); ta.style.outline = ''; }));
ta.addEventListener('drop', async e => {
  const f = e.dataTransfer.files[0];
  if (!f) return;
  const buf = new Uint8Array(await f.arrayBuffer());
  $('#input').value = bytesToBase64(buf);
  const n = f.name.toLowerCase();
  if (n.endsWith('.br')) $('#algo').value = 'br';
  else if (n.endsWith('.gz')) $('#algo').value = 'gzip';
  mode = 'decompress'; updateUI();
  $('#input').value = bytesToBase64(buf);
});

GZ.renderToolPage({
  category: 'convert',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3'],
  related: [
    {icon:'🗜️', href:'/convert/zip-tool.html', name:'ZIP Tool'},
    {icon:'🔐', href:'/dev/base64.html', name:'Base64'},
    {icon:'🗜️', href:'/convert/gif-compressor.html', name:'GIF Compressor'},
    {icon:'📄', href:'/convert/pdf-compressor.html', name:'PDF Compressor'},
  ]
});

updateUI();
</script>
