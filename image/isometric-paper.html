<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"What is isometric graph paper used for?","acceptedAnswer":{"@type":"Answer","text":"Isometric graph paper is used for drawing 3D objects, technical illustrations, game design maps, pixel art planning, architecture sketches and engineering diagrams. The equilateral triangle grid makes it easy to draw objects in 3D perspective."}},{"@type":"Question","name":"Is this isometric paper generator free?","acceptedAnswer":{"@type":"Answer","text":"Yes, completely free with no signup. Generate and download unlimited isometric graph paper."}},{"@type":"Question","name":"What paper sizes are supported?","acceptedAnswer":{"@type":"Answer","text":"You can choose A4, A3, Letter, or Legal paper sizes. The grid is scaled to fit your selected paper with proper margins."}},{"@type":"Question","name":"Can I download the isometric paper as an image?","acceptedAnswer":{"@type":"Answer","text":"Yes. Click Download PNG to save the graph paper as a high-resolution image, or use your browser's print-to-PDF for a vector-quality PDF."}}]}</script>

<script>
GZI18n.register({
  en:{toolTitle:'Isometric Graph Paper Generator',toolDesc:'Create free printable isometric graph paper. Customize spacing, line color and paper size. Download as PNG or print as PDF for 3D drawing and design.',spacing:'Spacing',lineColor:'Line Color',paperSize:'Paper',bgColor:'Background',generate:'Generate',download:'⬇️ PNG',print:'🖨️ Print',step1:'Choose your paper size (A4, A3, Letter or Legal)',step2:'Adjust the triangle grid spacing in pixels',step3:'Pick a line color and background color',step4:'Click Download PNG or Print to save your graph paper'},
  zh:{toolTitle:'等距方格纸生成器',toolDesc:'创建免费可打印的等距方格纸。自定义间距、线条颜色和纸张大小。下载 PNG 或打印为 PDF，适合 3D 绘图和设计。',spacing:'间距',lineColor:'线条颜色',paperSize:'纸张',bgColor:'背景色',generate:'生成',download:'⬇️ PNG',print:'🖨️ 打印',step1:'选择纸张大小（A4、A3、Letter 或 Legal）',step2:'调整三角形网格间距（像素）',step3:'选择线条颜色和背景色',step4:'点击下载 PNG 或打印保存方格纸'}
});
const{$,t}=GZ;
const SIZES={a4:{w:595,h:842},a3:{w:842,h:1190},letter:{w:612,h:792},legal:{w:612,h:1008}};

function draw(){
  const size=SIZES[$('#paper-sel').value];
  const spacing=Math.max(8,+$('#spacing').value);
  const lineColor=$('#line-color').value;
  const bgColor=$('#bg-color').value;
  const c=$('#canvas');
  c.width=size.w;c.height=size.h;
  const ctx=c.getContext('2d');
  ctx.fillStyle=bgColor;ctx.fillRect(0,0,c.width,c.height);
  ctx.strokeStyle=lineColor;ctx.lineWidth=0.5;
  const hSpacing=spacing;
  const vSpacing=spacing*0.866; // sin(60°)
  // Draw isometric grid - 3 sets of lines at 30°, 150°, and 90°
  for(let y=0;y<c.height+vSpacing;y+=vSpacing){
    for(let x=-c.width;x<c.width*2;x+=hSpacing*2){
      // Lines going up-right (30°)
      ctx.beginPath();
      ctx.moveTo(x,y);
      ctx.lineTo(x+c.height/Math.tan(Math.PI/3),y-c.height);
      ctx.stroke();
      // Lines going up-left (150°)
      ctx.beginPath();
      ctx.moveTo(x+hSpacing,y);
      ctx.lineTo(x+hSpacing-c.height/Math.tan(Math.PI/3),y-c.height);
      ctx.stroke();
    }
  }
  // Vertical lines
  for(let x=0;x<c.width;x+=hSpacing){
    ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,c.height);ctx.stroke();
  }
}

function downloadPNG(){
  const link=document.createElement('a');
  link.download='isometric-graph-paper.png';
  link.href=$('#canvas').toDataURL('image/png');
  link.click();
}

$('#options').innerHTML=`
  <label>${t('paperSize')}: <select id="paper-sel" class="gz-select" onchange="draw()"><option value="a4">A4</option><option value="a3">A3</option><option value="letter" selected>Letter</option><option value="legal">Legal</option></select></label>
  <label>${t('spacing')}: <input type="number" id="spacing" value="25" min="8" max="60" style="width:60px" onchange="draw()"></label>
  <label>${t('lineColor')}: <input type="color" id="line-color" value="#333333" onchange="draw()"></label>
  <label>${t('bgColor')}: <input type="color" id="bg-color" value="#ffffff" onchange="draw()"></label>`;

$('#toolbar').innerHTML=`
  <button class="gz-btn" onclick="draw()">${t('generate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="downloadPNG()">${t('download')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="window.print()">${t('print')}</button>`;

draw();
GZ.renderToolPage({
  category:'image',titleKey:'toolTitle',descKey:'toolDesc',
  howToSteps:['step1','step2','step3','step4'],
  related:[
    {icon:'📝',href:'/image/dot-grid-paper.html',name:'Dot Grid Paper'},
    {icon:'🎨',href:'/image/pixel-art-editor.html',name:'Pixel Art Editor'},
    {icon:'🖼️',href:'/image/placeholder-image.html',name:'Placeholder Image'},
  ]
});
</script>
