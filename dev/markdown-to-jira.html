function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function mdToJira(md) {
  const lines = md.split('\n');
  const out = [];
  let inCodeBlock = false;
  let codeLang = '';
  let codeLines = [];
  let inTable = false;
  let tableRows = [];

  function flushTable() {
    if (tableRows.length === 0) return;
    const headers = tableRows[0];
    const separator = headers.map(() => '---');
    out.push('| ' + headers.join(' | ') + ' |');
    out.push('| ' + separator.join(' | ') + ' |');
    for (let i = 1; i < tableRows.length; i++) {
      const row = tableRows[i];
      const padded = headers.map((_, j) => (row[j] || '').trim());
      out.push('| ' + padded.join(' | ') + ' |');
    }
    tableRows = [];
    inTable = false;
  }

  function inlineConvert(text) {
    // Inline code first (protect from other replacements)
    const codeSnippets = [];
    text = text.replace(/`([^`]+)`/g, (m, code) => {
      codeSnippets.push(code);
      return `{{CODE${codeSnippets.length - 1}}}`;
    });
    // Links: [text](url)
    text = text.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '[$1|$2]');
    // Images: ![alt](url)
    text = text.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '!$2!');
    // Bold: **text** or __text__
    text = text.replace(/\*\*([^*]+)\*\*/g, '*$1*');
    text = text.replace(/__([^_]+)__/g, '*$1*');
    // Italic: *text* or _text_  (but not bold markers)
    text = text.replace(/(^|[^*])\*([^*\n]+)\*(?!\*)/g, '$1_$2_');
    text = text.replace(/(^|[^_])_([^_\n]+)_(?!_)/g, '$1_$2_');
    // Strikethrough: ~~text~~
    text = text.replace(/~~([^~]+)~~/g, '-$1-');
    // Restore code snippets
    text = text.replace(/\{\{CODE(\d+)\}\}/g, (m, i) => '{{' + codeSnippets[parseInt(i)] + '}}');
    return text;
  }

  for (let i = 0; i < lines.length; i++) {
    let line = lines[i];

    // Code block fence
    if (/^```/.test(line.trim())) {
      if (!inCodeBlock) {
        flushTable();
        inCodeBlock = true;
        codeLang = line.trim().replace(/^```/, '').trim();
        codeLines = [];
      } else {
        out.push('{code:' + (codeLang || 'java') + '}');
        out.push(...codeLines);
        out.push('{code}');
        inCodeBlock = false;
        codeLang = '';
        codeLines = [];
      }
      continue;
    }
    if (inCodeBlock) { codeLines.push(line); continue; }

    // Table detection
    if (line.trim().startsWith('|') && line.trim().endsWith('|')) {
      inTable = true;
      const cells = line.trim().replace(/^\||\|$/g, '').split('|').map(c => c.trim());
      // Skip separator row
      if (cells.every(c => /^:?-{2,}:?$|^$/.test(c))) continue;
      tableRows.push(cells);
      continue;
    } else if (inTable) {
      flushTable();
    }

    // Headings
    const headingMatch = line.match(/^(#{1,6})\s+(.*)/);
    if (headingMatch) {
      const level = headingMatch[1].length;
      out.push('h' + level + '. ' + inlineConvert(headingMatch[2]));
      continue;
    }

    // Horizontal rule
    if (/^(-{3,}|\*{3,}|_{3,})\s*$/.test(line)) {
      out.push('----');
      continue;
    }

    // Blockquote
    if (/^>\s?/.test(line)) {
      out.push('bq. ' + inlineConvert(line.replace(/^>\s?/, '')));
      continue;
    }

    // Unordered list
    if (/^(\s*)[-*+]\s+/.test(line)) {
      const indent = (line.match(/^(\s*)/) || [''])[0].length;
      const level = Math.floor(indent / 2) + 1;
      const content = line.replace(/^(\s*)[-*+]\s+/, '');
      out.push('*'.repeat(level) + ' ' + inlineConvert(content));
      continue;
    }

    // Ordered list
    if (/^(\s*)\d+\.\s+/.test(line)) {
      const indent = (line.match(/^(\s*)/) || [''])[0].length;
      const level = Math.floor(indent / 2) + 1;
      const content = line.replace(/^(\s*)\d+\.\s+/, '');
      out.push('#'.repeat(level) + ' ' + inlineConvert(content));
      continue;
    }

    // Empty line
    if (line.trim() === '') { out.push(''); continue; }

    // Regular paragraph
    out.push(inlineConvert(line));
  }

  // Flush remaining
  if (inCodeBlock) {
    out.push('{code:' + (codeLang || 'java') + '}');
    out.push(...codeLines);
    out.push('{code}');
  }
  flushTable();

  return out.join('\n');
}

function doConvert() {
  const inp = $('#input').value;
  if (!inp.trim()) { $('#status').innerHTML = `<span style="color:var(--gz-accent)">${t('errEmpty')}</span>`; return; }
  try {
    const result = mdToJira(inp);
    $('#output').textContent = result;
    $('#output').dataset.raw = result;
    $('#status').innerHTML = `<span style="color:var(--gz-success)">${t('converted')} — ${result.length} ${t('chars')}</span>`;
  } catch(e) {
    $('#status').innerHTML = `<span style="color:var(--gz-accent)">✗ ${e.message}</span>`;
  }
}
