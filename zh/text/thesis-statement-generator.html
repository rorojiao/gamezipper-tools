<script>
GZI18n.register({
  en: {
    toolTitle: 'Thesis Statement Generator',
    toolDesc: 'Generate a strong, focused thesis statement for any essay in seconds. Argumentative, analytical and expository templates — free, browser-based, no signup.',
    typeArg: 'Argumentative', typeArgD: 'Take a debatable position',
    typeAna: 'Analytical', typeAnaD: 'Break down & evaluate',
    typeExp: 'Expository', typeExpD: 'Explain or inform',
    lblTopic: 'Topic / Subject',
    lblStance: 'Your stance or opinion (optional)',
    lblPoints: 'Key points or reasons (one per line, optional)',
    lblAudience: 'Audience',
    phTopic: 'e.g. social media, renewable energy, school uniforms',
    phStance: 'e.g. should be regulated, is essential, harms teens',
    phPoints: 'e.g. improves mental health\nreduces screen time\nbuilds community',
    lblOut: 'Your Thesis Statement',
    audGeneral: 'General academic', audCollege: 'College / university', audHigh: 'High school', audExpert: 'Expert / professional',
    btnGenerate: 'Generate Thesis', btnCopy: 'Copy', btnExample: 'Example', btnClear: 'Clear',
    emptyHint: 'Fill in the topic and click Generate Thesis to see your statement here.',
    tipArg: '<strong>Argumentative tip:</strong> Make sure your stance is debatable — someone should be able to disagree.',
    tipAna: '<strong>Analytical tip:</strong> List the specific parts or aspects you will examine in the body of the essay.',
    tipExp: '<strong>Expository tip:</strong> Stay neutral. The goal is to inform, not to persuade.',
    step1: 'Pick a thesis type (Argumentative, Analytical, or Expository)',
    step2: 'Type your topic, optional stance and key points',
    step3: 'Click Generate Thesis to assemble your statement',
    step4: 'Read the tips, refine the wording, and copy it into your essay',
  },
  zh: {
    toolTitle: '论文论点生成器',
    toolDesc: '几秒内为任意论文生成强有力、聚焦的论点陈述。支持议论型、分析型和阐释型模板 — 免费、浏览器本地运行、无需注册。',
    typeArg: '议论型', typeArgD: '提出可争议立场',
    typeAna: '分析型', typeAnaD: '拆解并评估',
    typeExp: '阐释型', typeExpD: '说明或告知',
    lblTopic: '主题 / 话题',
    lblStance: '你的立场或观点（可选）',
    lblPoints: '关键论点或理由（每行一个，可选）',
    lblAudience: '受众',
    phTopic: '如：社交媒体、可再生能源、校服',
    phStance: '如：应被监管、至关重要、危害青少年',
    phPoints: '如：改善心理健康\n减少屏幕时间\n建立社区',
    lblOut: '你的论点陈述',
    audGeneral: '普通学术', audCollege: '大学', audHigh: '高中', audExpert: '专家 / 专业',
    btnGenerate: '生成论点', btnCopy: '复制', btnExample: '示例', btnClear: '清空',
    emptyHint: '填写主题并点击「生成论点」即可在此查看你的陈述。',
    tipArg: '<strong>议论型提示：</strong>确保你的立场可被争论 — 应当有人能够提出反对。',
    tipAna: '<strong>分析型提示：</strong>列出你将在正文部分具体考察的部分或方面。',
    tipExp: '<strong>阐释型提示：</strong>保持中立。目标是告知，而不是说服。',
    step1: '选择论点类型（议论型、分析型或阐释型）',
    step2: '输入主题，可选立场和关键论点',
    step3: '点击「生成论点」生成陈述',
    step4: '阅读提示，润色措辞，复制到论文中',
  }
});

const { $, copyText, t } = GZ;
let currentType = 'argumentative';

const TEMPLATES = {
  argumentative: [
    (topic, stance, points, audience) => `${cap(topic)} ${stance ? 'should ' + stance.replace(/^should\s+/i,'') : 'deserves careful reconsideration'}${points ? ' because ' + joinPoints(points) : ', given the substantial impact it has on everyday life.'}`,
    (topic, stance) => `Although ${topic} is often overlooked, it ${stance ? 'must be ' + stance.replace(/^must be\s+/i,'') : 'warrants serious attention'} because the consequences of inaction are too significant to ignore.`,
    (topic, stance, points) => `The widespread belief that ${topic} is harmless is mistaken; in reality, ${stance || 'it poses real risks'}${points ? ', as evidenced by ' + joinPoints(points) : ''}.`,
    (topic, stance, points) => `${cap(topic)} ${stance || 'demands a balanced approach'}: ${points ? joinPoints(points, true) : 'weighing both benefits and drawbacks before reaching a conclusion'}.`,
  ],
  analytical: [
    (topic, stance, points) => `An analysis of ${topic} reveals ${points ? joinPoints(points, false, true) : 'several interconnected factors'} that shape its overall meaning and significance.`,
    (topic, stance, points) => `${cap(topic)} can be understood through ${points ? joinPoints(points, false, true) : 'its underlying themes and patterns'}, which together illuminate its deeper implications.`,
    (topic, stance, points) => `By examining ${points ? joinPoints(points, false, true) : 'the key components'} of ${topic}, this essay demonstrates how each element contributes to the whole.`,
    (topic, stance, points) => `The meaning of ${topic} emerges from the interplay of ${points ? joinPoints(points, false, true) : 'form, content and context'}, which this analysis will explore in detail.`,
  ],
  expository: [
    (topic, stance, points) => `${cap(topic)} is best understood by exploring ${points ? joinPoints(points, false, true) : 'its history, key features and current relevance'}.`,
    (topic, stance, points) => `This essay explains ${topic}, focusing on ${points ? joinPoints(points, false, true) : 'what it is, how it works and why it matters'}.`,
    (topic, stance, points) => `Understanding ${topic} requires looking at ${points ? joinPoints(points, false, true) : 'its origins, development and present-day impact'}.`,
    (topic, stance, points) => `${cap(topic)} can be defined as ${stance || 'a multifaceted concept'} whose importance lies in ${points ? joinPoints(points, false, true) : 'its widespread influence'}.`,
  ],
};

function cap(s){ if(!s) return s; s=s.trim(); return s.charAt(0).toUpperCase()+s.slice(1); }

function joinPoints(points, asList=false, lowerStart=false){
  const arr = points.split(/\n+/).map(s=>s.trim()).filter(Boolean).map(s=>{
    s = s.replace(/^[-*•]\s*/,'').replace(/\.$/,'');
    if(lowerStart && /^[A-Z]/.test(s) && !/^[A-Z]{2,}/.test(s)) s = s.charAt(0).toLowerCase()+s.slice(1);
    return s;
  }).filter(Boolean);
  if(arr.length===0) return '';
  if(arr.length===1) return arr[0];
  if(arr.length===2) return arr[0]+' and '+arr[1];
  return arr.slice(0,-1).join(', ')+', and '+arr[arr.length-1];
}

function pickTemplate(type){
  const arr = TEMPLATES[type];
  return arr[Math.floor(Math.random()*arr.length)];
}

function generate(){
  const topic = $('#topic').value.trim();
  if(!topic){ $('#output').innerHTML = `<em style="color:var(--text2)">${t('emptyHint')}</em>`; $('#tips').innerHTML=''; return; }
  const stance = $('#stance').value.trim();
  const points = $('#points').value.trim();
  const tpl = pickTemplate(currentType);
  let result = tpl(topic, stance, points);
  // Clean up double spaces and odd artifacts
  result = result.replace(/\s{2,}/g,' ').replace(/\s+\./g,'.').replace(/^\s+/,'');
  // Ensure terminal period
  if(!/[.!?]$/.test(result)) result += '.';
  $('#output').textContent = result;
  $('#tips').innerHTML = t('tipArg').split(':')[0] === currentType.charAt(0).toUpperCase() ? t('tipArg') : (currentType==='analytical'?t('tipAna'):(currentType==='expository'?t('tipExp'):t('tipArg')));
}

function loadExample(){
  $('#topic').value = 'social media';
  $('#stance').value = 'be more strictly regulated';
  $('#points').value = 'protects teenagers from cyberbullying\nreduces the spread of misinformation\nimproves users\' mental health';
  $('#audience').value = 'college';
  generate();
}

function doClear(){ $('#topic').value=''; $('#stance').value=''; $('#points').value=''; $('#output').textContent=''; $('#tips').innerHTML=''; }

// Build type buttons
const typeDefs = [
  {id:'argumentative', lbl:'typeArg', desc:'typeArgD'},
  {id:'analytical', lbl:'typeAna', desc:'typeAnaD'},
  {id:'expository', lbl:'typeExp', desc:'typeExpD'},
];
$('#types').innerHTML = typeDefs.map(td => `<button data-type="${td.id}" class="${td.id==='argumentative'?'active':''}">${t(td.lbl)}<small>${t(td.desc)}</small></button>`).join('');
$('#types').querySelectorAll('button').forEach(b => {
  b.addEventListener('click', () => {
    $('#types').querySelectorAll('button').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    currentType = b.dataset.type;
    if($('#topic').value.trim()) generate();
    else { $('#tips').innerHTML = currentType==='argumentative'?t('tipArg'):(currentType==='analytical'?t('tipAna'):t('tipExp')); }
  });
});

// Audience select
$('#audience').innerHTML = ['audGeneral','audCollege','audHigh','audExpert'].map(k=>`<option value="${k.replace('aud','').toLowerCase()}">${t(k)}</option>`).join('');

// Labels and placeholders
$('#lbl-topic').textContent = t('lblTopic');
$('#lbl-stance').textContent = t('lblStance');
$('#lbl-points').textContent = t('lblPoints');
$('#lbl-audience').textContent = t('lblAudience');
$('#lbl-out').textContent = t('lblOut');
$('#topic').placeholder = t('phTopic');
$('#stance').placeholder = t('phStance');
$('#points').placeholder = t('phPoints');
$('#tips').innerHTML = t('tipArg');
$('#output').innerHTML = `<em style="color:var(--text2)">${t('emptyHint')}</em>`;

// Toolbar
$('#toolbar').innerHTML = `
  <button class="gz-btn" id="btn-gen">${t('btnGenerate')}</button>
  <button class="gz-btn gz-btn-secondary" id="btn-ex">${t('btnExample')}</button>
  <button class="gz-btn gz-btn-secondary" id="btn-cp">${t('btnCopy')}</button>
  <button class="gz-btn gz-btn-secondary" id="btn-cl">${t('btnClear')}</button>`;
$('#btn-gen').addEventListener('click', generate);
$('#btn-ex').addEventListener('click', loadExample);
$('#btn-cp').addEventListener('click', () => { const txt = $('#output').textContent; if(txt && !txt.includes(t('emptyHint'))) copyText(txt); });
$('#btn-cl').addEventListener('click', doClear);
$('#topic').addEventListener('keydown', e => { if(e.key==='Enter'){ e.preventDefault(); generate(); }});

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📝', href:'/text/outline-generator.html', name:'Essay Outline'},
    {icon:'🔄', href:'/text/paraphraser.html', name:'Paraphraser'},
    {icon:'📑', href:'/text/citation-generator.html', name:'Citation Gen'},
    {icon:'📖', href:'/text/readability-checker.html', name:'Readability'},
  ]
});
</script>
