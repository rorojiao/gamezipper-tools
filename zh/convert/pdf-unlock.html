<script>
GZI18n.register({
  en: {
    toolTitle: 'PDF Unlock — Remove PDF Password',
    toolDesc: 'Decrypt a password-protected PDF and save it without a password. Uses the owner password with pdf-lib — all in your browser, no upload, no signup.',
    infoBox: '🔓 <b>How it works:</b> You need the password to decrypt the PDF. The tool will remove the encryption layer so the file opens without a password. All decryption runs locally with pdf-lib.',

    noFile: 'Please choose a PDF file first.',

    wrongPwd: 'Wrong password. Please try again.',
    notEncrypted: 'This PDF is not password-protected. It has been re-saved without changes.',
    error: 'Error: ',
    download: '⬇ Download unlocked PDF',
    step1: 'Drop or browse a password-protected PDF',
    step2: 'Enter the user or owner password',
    step3: 'Click "Unlock PDF" to decrypt the file',
    step4: 'Download the unlocked PDF — opens without a password',
  },
  zh: {
    toolTitle: 'PDF 解锁工具 — 移除 PDF 密码',
    toolDesc: '解密受密码保护的 PDF 并保存为无密码版本。使用所有者密码和 pdf-lib 在浏览器本地完成 — 无需上传、无需注册。',
    infoBox: '🔓 <b>工作原理：</b>你需要密码才能解密 PDF。工具会移除加密层，让文件可以无密码打开。所有解密在本地使用 pdf-lib 完成。',
    warning: '⚠️ <b>只能解锁你拥有或有权编辑的 PDF。</b>移除非自有文件的 DRM 或密码可能违反版权或当地法律。',
    chooseFile: '拖入或选择受密码保护的 PDF',
    info: '支持加密的 .pdf • 最大约 50 MB • 浏览器本地解密',
    pwd: 'PDF 密码',
    pwdSub: '输入用于打开 PDF 的用户或所有者密码',
    unlock: '🔓 解锁 PDF',
    clear: '清空',
    success: '✓ 解锁完成！点击下载保存无密码的 PDF。',
    working: '解密中…',
    noFile: '请先选择 PDF 文件。',
    noPwd: '请输入 PDF 密码。',
    wrongPwd: '密码错误，请重试。',
    notEncrypted: '此 PDF 没有密码保护，已原样保存。',
    error: '错误：',
    download: '⬇ 下载解锁后的 PDF',
    step1: '拖入或选择受密码保护的 PDF',
    step2: '输入用户或所有者密码',
    step3: '点击「解锁 PDF」解密文件',
    step4: '下载解锁后的 PDF — 无需密码即可打开',
  }
});

const { $, t } = GZ;
let currentFile = null, outBlob = null, outName = '';

$('#dropLabel').textContent = t('chooseFile');
$('#dropInfo').textContent = t('info');
$('#lblPwd').textContent = t('pwd');
$('#lblPwdSub').textContent = t('pwdSub');
$('#pwd').placeholder = '••••••••';

const drop = $('#drop');
drop.addEventListener('click', () => $('#file').click());
drop.addEventListener('dragover', e => { e.preventDefault(); drop.classList.add('dragover'); });
drop.addEventListener('dragleave', () => drop.classList.remove('dragover'));
drop.addEventListener('drop', e => { e.preventDefault(); drop.classList.remove('dragover'); if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]); });
$('#file').addEventListener('change', e => { if (e.target.files[0]) handleFile(e.target.files[0]); });

function handleFile(f) {
  if (!f || f.type !== 'application/pdf') { $('#status').innerHTML = `<span style="color:var(--accent)">${t('noFile')}</span>`; return; }
  currentFile = f;
  outBlob = null;
  drop.querySelector('.icon').textContent = '📄';
  $('#dropLabel').textContent = f.name;
  $('#dropInfo').textContent = (f.size / 1024).toFixed(1) + ' KB · ' + t('chooseFile');
  $('#status').innerHTML = '';
  $('#pwd').value = '';
}

async function unlockPDF() {
  if (!currentFile) { $('#status').innerHTML = `<span style="color:var(--accent)">${t('noFile')}</span>`; return; }
  const pwd = $('#pwd').value;
  if (!pwd) { $('#status').innerHTML = `<span style="color:var(--accent)">${t('noPwd')}</span>`; return; }
  $('#status').innerHTML = `<span style="opacity:.7">${t('working')}</span>`;
  try {
    const bytes = await currentFile.arrayBuffer();
    let doc;
    try {
      doc = await PDFLib.PDFDocument.load(bytes, { ignoreEncryption: false });
      // If load succeeds without password, the PDF isn't encrypted.
      $('#status').innerHTML = `<span style="color:var(--gz-success)">${t('notEncrypted')}</span>`;
      outBlob = new Blob([bytes], { type: 'application/pdf' });
      outName = currentFile.name.replace(/\.pdf$/i, '') + '-unlocked.pdf';
      downloadBlob();
      return;
    } catch (e1) {
      // Try with password
      try {
        doc = await PDFLib.PDFDocument.load(bytes, { password: pwd });
      } catch (e2) {
        $('#status').innerHTML = `<span style="color:var(--accent)">${t('wrongPwd')}</span>`;
        return;
      }
    }
    // Re-save without password
    const out = await doc.save();
    outBlob = new Blob([out], { type: 'application/pdf' });
    outName = currentFile.name.replace(/\.pdf$/i, '') + '-unlocked.pdf';
    $('#status').innerHTML = `<span style="color:var(--gz-success)">${t('success')}</span>`;
    downloadBlob();
  } catch (e) {
    $('#status').innerHTML = `<span style="color:var(--accent)">${t('error')}${e.message}</span>`;
  }
}

function downloadBlob() {
  if (!outBlob) return;
  const a = document.createElement('a');
  a.href = URL.createObjectURL(outBlob);
  a.download = outName;
  a.textContent = t('download') + ' (' + outName + ')';
  a.style.marginLeft = '8px';
  a.style.color = 'var(--accent)';
  a.style.textDecoration = 'underline';
  // remove any previous link
  const old = $('#status').querySelector('a');
  if (old) old.remove();
  $('#status').appendChild(a);
}

function clearAll() {
  currentFile = null; outBlob = null;
  $('#file').value = '';
  drop.querySelector('.icon').textContent = '🔓';
  $('#dropLabel').textContent = t('chooseFile');
  $('#dropInfo').textContent = t('info');
  $('#pwd').value = '';
  $('#status').innerHTML = '';
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="unlockPDF()">${t('unlock')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="clearAll()">${t('clear')}</button>
`;

GZ.renderToolPage({
  category: 'convert',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🔒', href:'/convert/pdf-password-protect.html', name:'PDF Password Protector'},
    {icon:'🔍', href:'/convert/pdf-page-count.html', name:'PDF Page Count'},

    {icon:'✂️', href:'/convert/pdf-splitter.html', name:'PDF Splitter'},
  ]
});
</script>
