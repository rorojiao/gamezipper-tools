<body>
<div class="gz-container">

  <div class="gz-tool-area">

    <div class="gz-toolbar" id="toolbar"></div>

      <div><label id="lbl-in"></label><textarea id="input" spellcheck="false"></textarea></div>

<script>
GZI18n.register({
  en: {
    toolTitle: 'Binary Translator',
    toolDesc: 'Convert text to binary and binary back to text instantly. Supports binary, hex, octal and decimal output formats.',
    textToBin: 'Text → Binary',
    binToText: 'Binary → Text',
    textToHex: 'Text → Hex',
    textToOct: 'Text → Octal',
    textToDec: 'Text → Decimal',
    convert: 'Convert',
    copy: 'Copy',
    clear: 'Clear',
    example: 'Example',
    lblIn: 'Input',
    lblOut: 'Output',
    charCount: 'characters',
    byteCount: 'bytes',
    step1: 'Choose conversion mode (Text to Binary, Hex, etc.)',
    step2: 'Type or paste your text or binary string',
    step3: 'Click Convert and copy the result',
  },
  zh: {
    toolTitle: '二进制翻译器',
    toolDesc: '即时将文本转换为二进制或将二进制转回文本。支持二进制、十六进制、八进制和十进制输出格式。',
    textToBin: '文本 → 二进制',
    binToText: '二进制 → 文本',
    textToHex: '文本 → 十六进制',
    textToOct: '文本 → 八进制',
    textToDec: '文本 → 十进制',
    convert: '转换',
    copy: '复制',
    clear: '清空',
    example: '示例',
    lblIn: '输入',
    lblOut: '输出',
    charCount: '字符',
    byteCount: '字节',
    step1: '选择转换模式（文本转二进制、十六进制等）',
    step2: '输入或粘贴文本或二进制字符串',
    step3: '点击「转换」并复制结果',
  }
});

const { $, copyText, t } = GZ;
let mode = 'text2bin';

const modes = [
  {id:'text2bin', key:'textToBin'},
  {id:'bin2text', key:'binToText'},
  {id:'text2hex', key:'textToHex'},
  {id:'text2oct', key:'textToOct'},
  {id:'text2dec', key:'textToDec'},
];

function renderModes() {
  let html = '';
  modes.forEach(m => {
    html += `<button class="${mode===m.id?'active':''}" onclick="setMode('${m.id}')">${t(m.key)}</button>`;
  });
  $('#modeTabs').innerHTML = html;
}

function setMode(m) {
  mode = m;
  renderModes();
}

function textToBin(text) {
  return [...text].map(c => c.charCodeAt(0).toString(2).padStart(8,'0')).join(' ');
}

function textToHex(text) {
  return [...text].map(c => c.charCodeAt(0).toString(16).padStart(2,'0').toUpperCase()).join(' ');
}

function textToOct(text) {
  return [...text].map(c => c.charCodeAt(0).toString(8).padStart(3,'0')).join(' ');
}

function textToDec(text) {
  return [...text].map(c => c.charCodeAt(0).toString(10)).join(' ');
}

function binToText(bin) {
  try {
    return bin.trim().split(/\s+/).map(b => String.fromCharCode(parseInt(b, 2))).join('');
  } catch(e) { return 'Invalid binary input'; }
}

function doConvert() {
  const inp = $('#input').value;
  if (!inp.trim()) { $('#output').textContent = ''; $('#info').textContent = ''; return; }
  let result = '';
  switch(mode) {
    case 'text2bin': result = textToBin(inp); break;
    case 'bin2text': result = binToText(inp); break;
    case 'text2hex': result = textToHex(inp); break;
    case 'text2oct': result = textToOct(inp); break;
    case 'text2dec': result = textToDec(inp); break;
  }
  $('#output').textContent = result;
  const encoder = new TextEncoder();
  const bytes = encoder.encode(inp);
  $('#info').textContent = `${inp.length} ${t('charCount')} · ${bytes.length} ${t('byteCount')}`;
}

function loadExample() {
  $('#input').value = 'Hello, World! 你好世界';
  doConvert();
}

function doClear() {
  $('#input').value = '';
  $('#output').textContent = '';
  $('#info').textContent = '';
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="doConvert()">${t('convert')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

$('#input').addEventListener('input', doConvert);
renderModes();

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3'],
  related: [
    {icon:'🔢', href:'/convert/number-base.html', name:'Number Base Converter'},
    {icon:'🔐', href:'/dev/base64.html', name:'Base64'},
    {icon:'🔢', href:'/text/text-to-binary.html', name:'Text to Binary'},
    {icon:'📊', href:'/dev/ascii-binary-hex-converter.html', name:'ASCII/Binary/Hex'},
  ]
});
</script>
