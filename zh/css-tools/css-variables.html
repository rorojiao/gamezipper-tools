<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What are CSS custom properties?", "acceptedAnswer": {"@type": "Answer", "text": "CSS custom properties (also called CSS variables) are entities defined by CSS authors that contain specific values to be reused throughout a document. They are declared with a double-dash prefix (like --main-color) and accessed using the var() function (var(--main-color))."}}, {"@type": "Question", "name": "How are CSS variables different from preprocessor variables?", "acceptedAnswer": {"@type": "Answer", "text": "Unlike Sass or Less variables, CSS custom properties are live and can be updated at runtime with JavaScript. They follow normal CSS inheritance and cascade rules, and can be redefined in media queries or by other selectors to support theming."}}, {"@type": "Question", "name": "Can I export the variables as a JSON or design token file?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. The generator can output the variables as a ready-to-paste :root CSS block, a JSON token file, or a SCSS map. Click the Copy button to grab whichever format you need."}}, {"@type": "Question", "name": "Do CSS variables work in all browsers?", "acceptedAnswer": {"@type": "Answer", "text": "CSS custom properties are supported in all modern browsers — Chrome, Firefox, Safari, Edge — and have been stable since 2017. They do not work in Internet Explorer 11."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="cv-presets" id="presets"></div>
    <div class="cv-layout">
      <div class="cv-panel">
        <h3 id="lbl-vars">Variables</h3>
        <div id="var-list"></div>
        <button class="cv-add" id="add-btn">+ Add Variable</button>
        <h3 style="margin-top:18px" id="lbl-preview">Live Preview</h3>
        <div class="preview-box">
          <h4>Sample card with your variables</h4>
          <div class="preview-row">
            <button class="preview-btn">Primary Button</button>
            <button class="preview-btn" style="background:var(--cv-secondary,#ff6b6b)">Secondary</button>
          </div>
          <div class="preview-row" style="margin-top:10px">
            <div class="preview-card">
              <strong style="color:var(--cv-text,#fff)">Card title</strong>
              <p style="color:var(--cv-text-muted,#aaa);font-size:.85rem;margin:4px 0 0">This card uses your custom properties.</p>
            </div>
          </div>

      </div>
      <div class="cv-panel">
        <h3 id="lbl-output">Generated CSS</h3>
        <div class="cv-presets" id="format-tabs"></div>
        <textarea id="output" readonly></textarea>
        <div class="cv-presets" style="margin-top:10px">
          <button class="cv-preset" id="btn-copy" style="background:var(--accent);color:#fff;border:none">📋 Copy</button>
          <button class="cv-preset" id="btn-download" style="background:var(--accent2);color:#fff;border:none">⬇ Download</button>
        </div>
      </div>
    </div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'CSS Variables Generator',
    toolDesc: 'Visually create CSS custom properties (variables) for design systems, themes and component libraries. Live preview with one-click export to :root CSS, JSON or SCSS.',
    addVar: 'Add Variable',
    copy: 'Copy',
    download: 'Download',
    format: 'Format',
    fmtRoot: ':root CSS',
    fmtJson: 'JSON tokens',
    fmtScss: 'SCSS map',
    theme: 'Theme',
    themeDark: 'Dark Theme',
    themeLight: 'Light Theme',
    themeNeon: 'Neon Theme',
    themePastel: 'Pastel Theme',
    themeMono: 'Monochrome',
    lblVars: 'Variables',
    lblPreview: 'Live Preview',
    lblOutput: 'Generated CSS',
    step1: 'Click a preset theme or start with the default dark palette',
    step2: 'Edit variable names, values and colors in the left panel',
    step3: 'Watch the live preview update as you type',
    step4: 'Switch format (CSS / JSON / SCSS) and copy or download the result',
  },
  zh: {
    toolTitle: 'CSS 变量生成器',
    toolDesc: '可视化创建 CSS 自定义属性（变量），适用于设计系统、主题和组件库。实时预览，一键导出为 :root CSS、JSON 或 SCSS。',
    addVar: '添加变量',
    copy: '复制',
    download: '下载',
    format: '格式',
    fmtRoot: ':root CSS',
    fmtJson: 'JSON 令牌',
    fmtScss: 'SCSS 映射',
    theme: '主题',
    themeDark: '深色主题',
    themeLight: '浅色主题',
    themeNeon: '霓虹主题',
    themePastel: '柔色主题',
    themeMono: '单色',
    lblVars: '变量',
    lblPreview: '实时预览',
    lblOutput: '生成的 CSS',
    step1: '点击预设主题或使用默认深色调色板开始',
    step2: '在左侧面板编辑变量名、值和颜色',
    step3: '输入时实时预览会自动更新',
    step4: '切换格式（CSS / JSON / SCSS）并复制或下载结果',
  }
});

const { $, copyText, t } = GZ;
$('#lbl-vars').textContent = t('lblVars');
$('#lbl-preview').textContent = t('lblPreview');
$('#lbl-output').textContent = t('lblOutput');
$('#add-btn').textContent = '+ ' + t('addVar');

const PRESETS = {
  dark: { name: 'themeDark', vars: [
    {n:'--cv-primary',v:'#4ecdc4',type:'color'},{n:'--cv-secondary',v:'#ff6b6b',type:'color'},
    {n:'--cv-bg',v:'#0a0a1a',type:'color'},{n:'--cv-surface',v:'#1a1a2e',type:'color'},
    {n:'--cv-text',v:'#ffffff',type:'color'},{n:'--cv-text-muted',v:'#a0a0b0',type:'color'},
    {n:'--cv-border',v:'#2a2a3e',type:'color'},{n:'--cv-radius',v:'8px',type:'text'},
    {n:'--cv-spacing',v:'16px',type:'text'},{n:'--cv-font',v:'system-ui, sans-serif',type:'text'},
  ]},
  light: { name: 'themeLight', vars: [
    {n:'--cv-primary',v:'#2563eb',type:'color'},{n:'--cv-secondary',v:'#dc2626',type:'color'},
    {n:'--cv-bg',v:'#ffffff',type:'color'},{n:'--cv-surface',v:'#f9fafb',type:'color'},
    {n:'--cv-text',v:'#111827',type:'color'},{n:'--cv-text-muted',v:'#6b7280',type:'color'},
    {n:'--cv-border',v:'#e5e7eb',type:'color'},{n:'--cv-radius',v:'12px',type:'text'},
    {n:'--cv-spacing',v:'16px',type:'text'},{n:'--cv-font',v:'system-ui, sans-serif',type:'text'},
  ]},
  neon: { name: 'themeNeon', vars: [
    {n:'--cv-primary',v:'#ff00ff',type:'color'},{n:'--cv-secondary',v:'#00ffff',type:'color'},
    {n:'--cv-bg',v:'#000000',type:'color'},{n:'--cv-surface',v:'#0a0014',type:'color'},
    {n:'--cv-text',v:'#e0e0ff',type:'color'},{n:'--cv-text-muted',v:'#9090c0',type:'color'},
    {n:'--cv-border',v:'#3300ff',type:'color'},{n:'--cv-radius',v:'4px',type:'text'},
    {n:'--cv-spacing',v:'20px',type:'text'},{n:'--cv-font',v:'"Courier New", monospace',type:'text'},
  ]},
  pastel: { name: 'themePastel', vars: [
    {n:'--cv-primary',v:'#ffb3ba',type:'color'},{n:'--cv-secondary',v:'#bae1ff',type:'color'},
    {n:'--cv-bg',v:'#fff5f7',type:'color'},{n:'--cv-surface',v:'#ffffff',type:'color'},
    {n:'--cv-text',v:'#5c4d4d',type:'color'},{n:'--cv-text-muted',v:'#9b8585',type:'color'},
    {n:'--cv-border',v:'#ffe0e6',type:'color'},{n:'--cv-radius',v:'16px',type:'text'},
    {n:'--cv-spacing',v:'14px',type:'text'},{n:'--cv-font',v:'"Segoe UI", sans-serif',type:'text'},
  ]},
  mono: { name: 'themeMono', vars: [
    {n:'--cv-primary',v:'#000000',type:'color'},{n:'--cv-secondary',v:'#666666',type:'color'},
    {n:'--cv-bg',v:'#ffffff',type:'color'},{n:'--cv-surface',v:'#fafafa',type:'color'},
    {n:'--cv-text',v:'#000000',type:'color'},{n:'--cv-text-muted',v:'#666666',type:'color'},
    {n:'--cv-border',v:'#000000',type:'color'},{n:'--cv-radius',v:'0',type:'text'},
    {n:'--cv-spacing',v:'12px',type:'text'},{n:'--cv-font',v:'Georgia, serif',type:'text'},
  ]},
};

let vars = JSON.parse(JSON.stringify(PRESETS.dark.vars));
let format = 'root';

function renderPresets() {
  $('#presets').innerHTML = Object.entries(PRESETS).map(([k, p]) =>
    `<div class="cv-preset" data-k="${k}">${t(p.name)}</div>`
  ).join('');
  $$('#presets .cv-preset').forEach(el => el.addEventListener('click', () => {
    vars = JSON.parse(JSON.stringify(PRESETS[el.getAttribute('data-k')].vars));
    renderList();
  }));
}

function renderFormats() {
  const fmts = [['root',t('fmtRoot')],['json',t('fmtJson')],['scss',t('fmtScss')]];
  $('#format-tabs').innerHTML = fmts.map(([k,n]) => `<div class="cv-preset" data-f="${k}" style="${format===k?'background:var(--accent);color:#fff;border-color:var(--accent)':''}">${n}</div>`).join('');
  $$('#format-tabs .cv-preset').forEach(el => el.addEventListener('click', () => {
    format = el.getAttribute('data-f');
    renderFormats();
    renderOutput();
  }));
}

function renderList() {
  $('#var-list').innerHTML = vars.map((v, i) => {
    const swatch = v.type === 'color' ? `<input type="color" class="sw" value="${v.v}" data-i="${i}">` : '<div class="sw" style="background:var(--glass2)"></div>';
    return `<div class="cv-var">
      <input type="text" data-i="${i}" data-f="n" value="${v.n}" placeholder="--name">
      ${swatch}
      <input type="text" data-i="${i}" data-f="v" value="${v.v}" placeholder="value">
      <button data-i="${i}" data-act="del" title="Remove">✕</button>
    </div>`;
  }).join('');
  $$('#var-list input').forEach(inp => {
    inp.addEventListener('input', e => {
      const i = parseInt(e.target.getAttribute('data-i'));
      const f = e.target.getAttribute('data-f');
      vars[i][f] = e.target.value;
      if (f === 'v' && e.target.type === 'color') vars[i].v = e.target.value;
      if (vars[i].type !== 'color' && /^#([0-9a-f]{3}|[0-9a-f]{6})$/i.test(e.target.value)) {
        vars[i].type = 'color';
      }
      renderOutput();
      applyPreview();
    });
    inp.addEventListener('change', e => {
      renderList();
    });
  });
  $$('#var-list button').forEach(b => b.addEventListener('click', () => {
    const i = parseInt(b.getAttribute('data-i'));
    vars.splice(i, 1);
    renderList();
    renderOutput();
    applyPreview();
  }));
  applyPreview();
}

function applyPreview() {
  const root = document.documentElement;
  for (const v of vars) {
    if (v.n.startsWith('--cv-')) {
      root.style.setProperty(v.n, v.v);
    }
  }
}

function renderOutput() {
  let txt = '';
  if (format === 'root') {
    txt = ':root {\n' + vars.map(v => `  ${v.n}: ${v.v};`).join('\n') + '\n}';
  } else if (format === 'json') {
    const obj = {};
    for (const v of vars) {
      const key = v.n.replace(/^--/, '').replace(/-/g, '.');
      obj[key] = { value: v.v, type: v.type };
    }
    txt = JSON.stringify(obj, null, 2);
  } else if (format === 'scss') {
    txt = vars.map(v => `${v.n.replace(/^--/, '$')}: ${v.v};`).join('\n');
  }
  $('#output').value = txt;
}

function $$(s, p) { return [...((p || document).querySelectorAll(s))]; }

$('#add-btn').addEventListener('click', () => {
  vars.push({n:'--new-var',v:'#000000',type:'color'});
  renderList();
  renderOutput();
});

$('#btn-copy').addEventListener('click', () => copyText($('#output').value));
$('#btn-download').addEventListener('click', () => {
  const ext = format === 'json' ? 'json' : (format === 'scss' ? 'scss' : 'css');
  const mime = format === 'json' ? 'application/json' : 'text/css';
  const blob = new Blob([$('#output').value], { type: mime });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'css-variables.' + ext;
  a.click();
  URL.revokeObjectURL(a.href);
});

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="$('#add-btn').click()">${t('addVar')}</button>`;

renderPresets();
renderFormats();
renderList();
renderOutput();

GZ.renderToolPage({
  category: 'css',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🌈', href:'/css-tools/gradient.html', name:'CSS Gradient'},
    {icon:'🎨', href:'/css-tools/css-formatter.html', name:'CSS Formatter'},
    {icon:'✨', href:'/css-tools/animation.html', name:'CSS Animation'},
    {icon:'🔲', href:'/css-tools/grid.html', name:'CSS Grid'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
