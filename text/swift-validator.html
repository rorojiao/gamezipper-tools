<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is the difference between SWIFT and BIC?", "acceptedAnswer": {"@type": "Answer", "text": "There is no difference. SWIFT code and BIC (Bank Identifier Code) are two names for the same ISO 9362 standard code used to identify banks worldwide. The SWIFT network assigns them, while BIC is the official ISO term."}}, {"@type": "Question", "name": "What is the structure of a SWIFT/BIC code?", "acceptedAnswer": {"@type": "Answer", "text": "A BIC is 8 or 11 characters: 4 letters for the bank code, 2 letters for the ISO 3166 country code, 2 alphanumeric characters for the location code, and an optional 3-character branch code. An 8-character code (or one ending in XXX) refers to the bank's primary office."}}, {"@type": "Question", "name": "Does this tool verify that a bank really exists?", "acceptedAnswer": {"@type": "Answer", "text": "No. This tool validates the format, length, character rules and ISO country code of a SWIFT/BIC. To confirm that a specific bank is active on the SWIFT network you need an online directory lookup, which cannot be done purely in the browser."}}, {"@type": "Question", "name": "Is my banking data uploaded anywhere?", "acceptedAnswer": {"@type": "Answer", "text": "No. All validation runs locally in your browser. The codes you paste never leave your device, so this is safe to use with real BIC codes."}}]}</script>

<script>

    toolDesc: '验证 SWIFT/BIC 银行识别码 — 检查 8 或 11 位格式，校验 ISO 国家代码，并解析银行、国家、地点和分行组件。支持批量验证，100% 浏览器本地运行。',
    validate: '验证',
    format: '转为大写',
    example: '示例',
    clear: '清除',
    lblIn: '每行输入一个 SWIFT/BIC 代码',
    valid: '✓ BIC 有效',
    invalid: '✗ BIC 无效',
    eight: '8 位 BIC（总行）',
    eleven: '11 位 BIC（具体分行）',
    bank: '银行代码',
    country: '国家',
    location: '地点',
    branch: '分行',
    errLen: 'BIC 必须为 8 或 11 位',
    errBank: '银行代码（前 4 位）必须全为字母',
    errCountry: 'ISO 国家代码无效（第 5-6 位）',
    errLoc: '地点代码（第 7-8 位）必须为字母或数字',
    errBranch: '分行代码（第 9-11 位）必须为字母或数字',
    primary: '总行（XXX）',
    step1: '粘贴一个或多个 SWIFT/BIC 代码（每行一个）',
    step2: '点击「验证」检查格式、长度和 ISO 国家',

    step4: '点击 ⧉ 复制任意值',
  }

const { $, copyText, t } = GZ;

// ISO 3166-1 alpha-2 country codes
const COUNTRIES = ('AD AE AF AG AI AL AM AO AQ AR AS AT AU AW AX AZ BA BB BD BE BF BG BH BI BJ BL BM BN BO BQ BR BS BT BV BW BY BZ '+
'CA CC CD CF CG CH CI CK CL CM CN CO CR CU CV CW CX CY CZ DE DJ DK DM DO DZ EC EE EG EH ER ES ET FI FJ FK FM FO FR GA GB GD GE GF GG GH GI GL GM GN GP GQ GR GS GT GU GW GY HK HM HN HR HT HU ID IE IL IM IN IO IQ IR IS IT JE JM JO JP KE KG KH KI KM KN KP KR KW KY KZ LA LB LC LI LK LR LS LT LU LV LY MA MC MD ME MF MG MH MK ML MM MN MO MP MQ MR MS MT MU MV MW MX MY MZ NA NC NE NF NG NI NL NO NP NR NU NZ OM PA PE PF PG PH PK PL PM PN PR PS PT PW PY QA RE RO RS RU RW SA SB SC SD SE SG SH SI SJ SK SL SM SN SO SR SS ST SV SX SY SZ TC TD TF TG TH TJ TK TL TM TN TO TR TT TV TW TZ UA UG UM US UY UZ VA VC VE VG VI VN VU WF WS YE YT ZA ZM ZW').split(' ');

function countryName(cc){
  const map = {US:'United States',DE:'Germany',GB:'United Kingdom',FR:'France',CH:'Switzerland',CN:'China',JP:'Japan',HK:'Hong Kong',SG:'Singapore',NL:'Netherlands'};
  return map[cc] || cc;
}
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function analyze(raw){
  const code = raw.replace(/[^A-Za-z0-9]/g,'').toUpperCase();
  if(code.length!==8 && code.length!==11) return {raw, valid:false, msg:t('errLen')};
  const bank = code.slice(0,4), cc = code.slice(4,6), loc = code.slice(6,8), branch = code.slice(8,11);
  if(!/^[A-Z]{4}$/.test(bank)) return {raw, valid:false, msg:t('errBank')};
  if(!/^[A-Z]{2}$/.test(cc) || COUNTRIES.indexOf(cc)===-1) return {raw, valid:false, msg:t('errCountry')};
  if(!/^[A-Z0-9]{2}$/.test(loc)) return {raw, valid:false, msg:t('errLoc')};
  if(branch && !/^[A-Z0-9]{3}$/.test(branch)) return {raw, valid:false, msg:t('errBranch')};
  return {raw, code, valid:true, bank, cc, loc, branch, len: code.length};
}

function doValidate(){
  const lines = $('#input').value.split('\n').map(s=>s.trim().toUpperCase()).filter(Boolean);
  if(!lines.length){ $('#output').innerHTML=''; $('#status').textContent=''; return; }
  const cards = lines.map(line=>{
    const r = analyze(line);
    const cls = r.valid ? 'ok' : 'bad';
    const icon = r.valid ? '✅' : '❌';
    let body = '';
    if(r.valid){
      const btype = r.len===8 ? t('eight') : (r.branch==='XXX' ? t('eleven')+' · '+t('primary') : t('eleven'));
      body = `<div class="res-row"><span>${t('bank')}:</span><code>${esc(r.bank)}</code><button onclick="copyText('${r.bank}')">⧉</button></div>`
           + `<div class="res-row"><span>${t('country')}:</span><code>${esc(r.cc)} · ${esc(countryName(r.cc))}</code><button onclick="copyText('${r.cc}')">⧉</button></div>`
           + `<div class="res-row"><span>${t('location')}:</span><code>${esc(r.loc)}</code><button onclick="copyText('${r.loc}')">⧉</button></div>`
           + (r.branch ? `<div class="res-row"><span>${t('branch')}:</span><code>${esc(r.branch)}</code><button onclick="copyText('${r.branch}')">⧉</button></div>` : '')
           + `<div class="res-row" style="color:var(--text)">${esc(btype)}</div>`;
    } else {
      body = `<div class="res-row" style="color:var(--text2)">${esc(r.msg)}</div>`;
    }
    const label = r.valid ? `${t('valid')} · ${esc(r.code)}` : `${t('invalid')} · ${esc(line.replace(/[^A-Za-z0-9]/g,'').toUpperCase())}`;
    return `<div class="res-card ${cls}"><div class="res-head">${icon} ${esc(label)}</div>${body}</div>`;
  });
  $('#output').innerHTML = cards.join('');
  const valid = lines.map(analyze).filter(r=>r.valid).length;
  $('#status').innerHTML = `<span style="color:var(--text2)">✓ ${valid}/${lines.length} ${t('valid')}</span>`;
}

function doFormat(){
  const lines = $('#input').value.split('\n').map(s=>s.trim().toUpperCase()).filter(Boolean);
  $('#input').value = lines.join('\n');
  doValidate();
}

function loadExample(){
  $('#input').value = 'DEUTDEFF\nCHASUS33\nBOFAUS3N\nHSBCGB22\nBARCGB20XXX\nDEUTDEFF500\nBAD CODE 1\nXYZ1234';
  doValidate();
}
function doClear(){ $('#input').value=''; $('#output').innerHTML=''; $('#status').textContent=''; }

$('#lbl-in').textContent = t('lblIn');
$('#input').addEventListener('input', doValidate);

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="doValidate()">${t('validate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doFormat()">${t('format')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

});
</script>
