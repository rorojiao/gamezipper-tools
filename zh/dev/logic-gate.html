<script>
GZI18n.register({
  en: {
    toolTitle: 'Logic Gate Calculator & Truth Table Generator',
    toolDesc: 'Generate instant truth tables for AND, OR, NOT, NAND, NOR, XOR and XNOR gates with 2 to 4 inputs. Perfect for digital logic, electronics and computer science homework — free and browser-based.',
    lblGate: 'Logic gate',
    lblInputs: 'Number of inputs',
    note: 'Read 1 as TRUE (HIGH) and 0 as FALSE (LOW). For {n} inputs there are {rows} possible combinations.',
    step1: 'Pick the logic gate you want to analyze',
    step2: 'Choose how many inputs the gate has (2, 3 or 4)',
    step3: 'Read the equation and the full truth table below',
    step4: 'Use the result to verify your circuit or homework',
  },
  zh: {
    toolTitle: '逻辑门计算器与真值表生成器',
    toolDesc: '即时生成 AND、OR、NOT、NAND、NOR、XOR、XNOR 逻辑门的真值表，支持 2-4 个输入。适合数字逻辑、电子学和计算机科学作业 — 免费浏览器本地运行。',
    lblGate: '逻辑门',
    lblInputs: '输入数量',
    note: '1 表示真（高电平），0 表示假（低电平）。{n} 个输入共有 {rows} 种组合。',
    step1: '选择要分析的逻辑门',
    step2: '选择门的输入数量（2、3 或 4）',
    step3: '查看下方的逻辑等式和完整真值表',
    step4: '用结果验证你的电路或作业',
  }
});

const { $, t } = GZ;

function gateFn(gate, bits) {
  // bits is array of 0/1
  switch(gate) {
    case 'AND':  return bits.every(b => b === 1) ? 1 : 0;
    case 'OR':   return bits.some(b => b === 1) ? 1 : 0;
    case 'NOT':  return bits[0] === 1 ? 0 : 1;
    case 'NAND': return bits.every(b => b === 1) ? 0 : 1;
    case 'NOR':  return bits.some(b => b === 1) ? 0 : 1;
    case 'XOR':  return bits.reduce((a,b)=>a^b,0);
    case 'XNOR': return bits.reduce((a,b)=>a^b,0) === 1 ? 0 : 1;
  }
  return 0;
}

function symbols(gate, n) {
  const vars = ['A','B','C','D'].slice(0, n);
  const v = vars.join(', ');
  const exprMap = {
    AND: `A · B${n>2?' · C':''}${n>3?' · D':''}`,
    OR:  `A + B${n>2?' + C':''}${n>3?' + D':''}`,
    NOT: `Ā`,
    NAND:`A · B${n>2?' · C':''}${n>3?' · D':''}  (then NOT)`,
    NOR: `A + B${n>2?' + C':''}${n>3?' + D':''}  (then NOT)`,
    XOR: n===2 ? 'A ⊕ B' : `A ⊕ B${n>2?' ⊕ C':''}${n>3?' ⊕ D':''}`,
    XNOR:n===2 ? 'A ⊕ B  (then NOT)' : `A ⊕ B${n>2?' ⊕ C':''}${n>3?' ⊕ D':''}  (then NOT)`,
  };
  const out = gate === 'NOT' ? 'NOT A' : gate;
  return `${out}(${v}) &nbsp;&nbsp;→&nbsp;&nbsp; ${exprMap[gate]}`;
}

function generate() {
  const gate = $('#gate').value;
  let n = parseInt($('#inputs').value, 10);
  if (gate === 'NOT') n = 1;
  $('#inputs').disabled = (gate === 'NOT');
  if (gate === 'NOT') $('#inputs').value = '2';

  $('#eq').innerHTML = `<b>Y</b> = ${symbols(gate, n)}`;

  const headers = ['A','B','C','D'].slice(0, n).concat(['Y']);
  const rows = 1 << n;
  let body = '';
  for (let r = 0; r < rows; r++) {
    const bits = [];
    for (let i = n - 1; i >= 0; i--) bits.push((r >> i) & 1);
    const y = gateFn(gate, bits);
    const cells = bits.map(b => `<td>${b}</td>`).join('');
    body += `<tr>${cells}<td class="out-${y}">${y}</td></tr>`;
  }
  $('#table').innerHTML = `<thead><tr>${headers.map(h=>`<th>${h}</th>`).join('')}</tr></thead><tbody>${body}</tbody>`;

  $('#note').innerHTML = t('note').replace('{n}', n).replace('{rows}', rows);
}

$('#gate').addEventListener('change', generate);
$('#inputs').addEventListener('change', generate);
generate();

  ]
});
</script>
