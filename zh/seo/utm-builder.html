<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-field">
      <label id="lbl-url"></label>
      <input type="url" id="url-input" placeholder="https://example.com/landing-page">
    </div>
    <div class="gz-presets" id="presets"></div>
    <div class="gz-utm-params">
      <div class="gz-field">
        <label>utm_source <span style="color:var(--gz-accent)">*</span></label>
        <input type="text" id="utm_source" placeholder="google">
        <div class="hint" id="hint-source"></div>
      </div>
      <div class="gz-field">
        <label>utm_medium <span style="color:var(--gz-accent)">*</span></label>
        <input type="text" id="utm_medium" placeholder="cpc">
        <div class="hint" id="hint-medium"></div>
      </div>
      <div class="gz-field">
        <label>utm_campaign <span style="color:var(--gz-accent)">*</span></label>
        <input type="text" id="utm_campaign" placeholder="spring_sale">
        <div class="hint" id="hint-campaign"></div>
      </div>
      <div class="gz-field">
        <label>utm_term</label>
        <input type="text" id="utm_term" placeholder="running+shoes">
        <div class="hint" id="hint-term"></div>
      </div>
      <div class="gz-field" style="grid-column:1/-1">
        <label>utm_content</label>
        <input type="text" id="utm_content" placeholder="logolink">
        <div class="hint" id="hint-content"></div>
      </div>
    </div>
    <div id="result-box">
      <span class="label" id="lbl-result"></span>
      <span id="result-text"></span>
    </div>
    <div class="gz-toolbar" id="toolbar"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle:'UTM Builder',
    toolDesc:'Generate trackable URLs with UTM parameters for Google Analytics campaigns.',
    lblUrl:'Website URL',
    hintSource:'Identifies the traffic source (e.g., google, facebook, newsletter)',
    hintMedium:'Marketing medium (e.g., cpc, email, social, banner)',
    hintCampaign:'Campaign name (e.g., spring_sale, product_launch)',
    hintTerm:'Paid search keywords (optional)',
    hintContent:'Differentiate similar links (optional)',
    lblResult:'Generated URL',
    presetGoogle:'Google Ads',
    presetFacebook:'Facebook',
    presetEmail:'Email',
    presetTwitter:'Twitter/X',
    presetLinkedIn:'LinkedIn',
    presetTikTok:'TikTok',
    step1:'Enter your destination website URL',
    step2:'Fill in UTM parameters (source, medium, campaign are required)',
    step3:'Use presets for quick common configurations',
    step4:'Copy the generated URL and use it in your campaigns',
  },
  zh:{
    toolTitle:'UTM 链接构建器',
    toolDesc:'生成带 UTM 追踪参数的 URL，用于 Google Analytics 营销活动追踪。',
    lblUrl:'网站 URL',
    hintSource:'流量来源（如 google、facebook、newsletter）',
    hintMedium:'营销媒介（如 cpc、email、social、banner）',
    hintCampaign:'活动名称（如 spring_sale、product_launch）',
    hintTerm:'付费搜索关键词（可选）',
    hintContent:'区分相似链接的内容标识（可选）',
    lblResult:'生成的 URL',
    presetGoogle:'Google 广告',
    presetFacebook:'Facebook',
    presetEmail:'邮件',
    presetTwitter:'Twitter/X',
    presetLinkedIn:'LinkedIn',
    presetTikTok:'TikTok',
    step1:'输入目标网站 URL',
    step2:'填写 UTM 参数（source、medium、campaign 为必填）',
    step3:'使用预设快速配置常见场景',
    step4:'复制生成的 URL 用于营销活动',
  }
});

const { $, copyText, t } = GZ;

$('#lbl-url').textContent = t('lblUrl');
$('#hint-source').textContent = t('hintSource');
$('#hint-medium').textContent = t('hintMedium');
$('#hint-campaign').textContent = t('hintCampaign');
$('#hint-term').textContent = t('hintTerm');
$('#hint-content').textContent = t('hintContent');
$('#lbl-result').textContent = t('lblResult');

const presets = [
  {label:t('presetGoogle'), source:'google', medium:'cpc', campaign:''},
  {label:t('presetFacebook'), source:'facebook', medium:'social', campaign:''},
  {label:t('presetEmail'), source:'newsletter', medium:'email', campaign:''},
  {label:t('presetTwitter'), source:'twitter', medium:'social', campaign:''},
  {label:t('presetLinkedIn'), source:'linkedin', medium:'social', campaign:''},
  {label:t('presetTikTok'), source:'tiktok', medium:'social', campaign:''},
];

$('#presets').innerHTML = presets.map((p,i) =>
  `<button onclick="applyPreset(${i})">${p.label}</button>`
).join('');

function applyPreset(i) {
  const p = presets[i];
  $('#utm_source').value = p.source;
  $('#utm_medium').value = p.medium;
  $('#utm_campaign').value = p.campaign;
  $('#utm_campaign').focus();
  buildURL();
}

function buildURL() {
  let url = $('#url-input').value.trim();
  const params = [];
  ['utm_source','utm_medium','utm_campaign','utm_term','utm_content'].forEach(k => {
    const v = $('#'+k).value.trim();
    if (v) params.push(k+'='+encodeURIComponent(v));
  });
  if (!url) { $('#result-text').textContent = ''; return; }
  const sep = url.includes('?') ? '&' : '?';
  const result = params.length ? url + sep + params.join('&') : url;
  $('#result-text').textContent = result;
}

['url-input','utm_source','utm_medium','utm_campaign','utm_term','utm_content'].forEach(id => {
  $('#'+id).addEventListener('input', buildURL);
});

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="copyText($('#result-text').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="clearAll()">${t('clear')}</button>`;

function clearAll() {
  ['url-input','utm_source','utm_medium','utm_campaign','utm_term','utm_content'].forEach(id => $('#'+id).value='');
  $('#result-text').textContent = '';
}

GZ.renderToolPage({
  category: 'seo',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🏷️', href:'/seo/meta-tag-generator.html', name:'Meta Tag Generator'},
    {icon:'🖼️', href:'/seo/open-graph-generator.html', name:'OG Generator'},
    {icon:'👁️', href:'/seo/serp-preview.html', name:'SERP Preview'},
    {icon:'🗺️', href:'/seo/sitemap-generator.html', name:'Sitemap Generator'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
