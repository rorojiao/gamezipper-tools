<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is a CSS reset?", "acceptedAnswer": {"@type": "Answer", "text": "A CSS reset is a set of CSS rules that strip away default browser styling, creating a consistent baseline across different browsers. This eliminates unexpected spacing, font, and layout differences so you can build your design from a clean slate."}}, {"@type": "Question", "name": "Which CSS reset preset should I use?", "acceptedAnswer": {"@type": "Answer", "text": "Modern Reset is recommended for most new projects — it covers box-sizing, margin/padding normalization, font resets, and responsive images. Normalize-Style is ideal if you want to preserve some useful browser defaults while fixing inconsistencies. Minimal is great for lightweight projects that only need the bare essentials."}}, {"@type": "Question", "name": "What's the difference between CSS reset and normalize?", "acceptedAnswer": {"@type": "Answer", "text": "A CSS reset strips all default browser styling to a blank slate, removing margins, paddings, and font styles. CSS Normalize (like normalize.css) preserves useful defaults and only fixes cross-browser inconsistencies. Resets give you full control; normalizes give you a better starting point without removing everything."}}]}</script>

<script>
GZI18n.register({
  en: {
    toolTitle: 'CSS Reset Generator',
    toolDesc: 'Generate custom CSS reset stylesheets. Choose a preset or toggle individual reset options to build your perfect baseline.',
    presets: 'Presets',
    modernReset: 'Modern Reset',
    normalizeStyle: 'Normalize-Style',
    minimal: 'Minimal',
    boxSizing: 'Box-sizing: border-box',
    marginPadding: 'Margin & padding reset',
    fontReset: 'Font reset (system-ui)',
    listStyle: 'List-style reset',
    borderReset: 'Border reset',
    imgVerticalAlign: 'Image responsive & vertical-align',
    buttonInherit: 'Button/input inherit font',
    smoothScrolling: 'Smooth scrolling',
    rootFontSize: 'Root font-size 62.5%',
    generate: 'Generate',
    copy: 'Copy',
    copied: 'Copied!',
    clear: 'Clear',
    step1: 'Choose a preset or toggle individual CSS reset options',
    step2: 'The CSS code is auto-generated as you change options',
    step3: 'Click Copy to copy the reset CSS to your clipboard',
    step4: 'Paste the code into your project stylesheet',
  },
  zh: {
    toolTitle: 'CSS Reset 生成器',
    toolDesc: '生成自定义 CSS 重置样式表。选择预设或切换各项重置选项，构建你的完美基线样式。',
    presets: '预设方案',
    modernReset: '现代重置',
    normalizeStyle: 'Normalize 风格',
    minimal: '最小化',
    boxSizing: 'Box-sizing: border-box',
    marginPadding: '外边距与内边距重置',
    fontReset: '字体重置 (system-ui)',
    listStyle: '列表样式重置',
    borderReset: '边框重置',
    imgVerticalAlign: '图片响应式与垂直对齐',
    buttonInherit: '按钮/输入框继承字体',
    smoothScrolling: '平滑滚动',
    rootFontSize: '根字体大小 62.5%',
    generate: '生成',
    copy: '复制',
    copied: '已复制！',
    clear: '清空',
    step1: '选择预设方案或切换各项 CSS 重置选项',
    step2: '更改选项时 CSS 代码会自动生成',
    step3: '点击「复制」将重置 CSS 复制到剪贴板',
    step4: '将代码粘贴到项目样式表中使用',
  }
});

const { $, copyText, t } = GZ;

const optionKeys = ['boxSizing','marginPadding','fontReset','listStyle','borderReset','imgVerticalAlign','buttonInherit','smoothScrolling','rootFontSize'];

const cssRules = {
  boxSizing: '*, *::before, *::after {\n  box-sizing: border-box;\n}',
  marginPadding: 'body, h1, h2, h3, h4, h5, h6, p, ul, ol, figure, dl, dd {\n  margin: 0;\n  padding: 0;\n}',
  fontReset: 'body {\n  font-family: system-ui, -apple-system, sans-serif;\n  line-height: 1.5;\n}',
  listStyle: 'ul, ol {\n  list-style: none;\n}',
  borderReset: 'img, fieldset, button {\n  border: 0;\n}',
  imgVerticalAlign: 'img {\n  max-width: 100%;\n  height: auto;\n  display: block;\n  vertical-align: middle;\n}',
  buttonInherit: 'button, input, textarea, select {\n  font: inherit;\n  color: inherit;\n}',
  smoothScrolling: 'html {\n  scroll-behavior: smooth;\n}',
  rootFontSize: 'html {\n  font-size: 62.5%;\n}'
};

const presets = {
  modern: ['boxSizing','marginPadding','fontReset','listStyle','borderReset','imgVerticalAlign','buttonInherit','smoothScrolling'],
  normalize: ['boxSizing','marginPadding','fontReset','borderReset','imgVerticalAlign','buttonInherit'],
  minimal: ['boxSizing','marginPadding']
};

function buildOptions() {
  const container = $('#options');
  container.innerHTML = optionKeys.map(key =>
    `<label><input type="checkbox" data-opt="${key}" checked> ${t(key)}</label>`
  ).join('');
  container.querySelectorAll('input[type=checkbox]').forEach(cb => {
    cb.addEventListener('change', generate);
  });
}

function buildPresets() {
  const container = $('#presets');
  container.innerHTML = `
    <span style="font-weight:600;margin-right:4px">${t('presets')}:</span>
    <button class="gz-preset-btn active" data-preset="modern">${t('modernReset')}</button>
    <button class="gz-preset-btn" data-preset="normalize">${t('normalizeStyle')}</button>
    <button class="gz-preset-btn" data-preset="minimal">${t('minimal')}</button>`;
  container.querySelectorAll('.gz-preset-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      applyPreset(btn.dataset.preset);
      container.querySelectorAll('.gz-preset-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    });
  });
}

function applyPreset(name) {
  const active = presets[name] || [];
  $('#options').querySelectorAll('input[type=checkbox]').forEach(cb => {
    cb.checked = active.includes(cb.dataset.opt);
  });
  generate();
}

function generate() {
  const checked = [];
  $('#options').querySelectorAll('input[type=checkbox]:checked').forEach(cb => {
    checked.push(cb.dataset.opt);
  });
  if (checked.length === 0) {
    $('#output').value = '';
    return;
  }
  const parts = checked.map(key => cssRules[key]);
  $('#output').value = '/* CSS Reset */\n\n' + parts.join('\n\n') + '\n';
}

function doCopy() {
  const text = $('#output').value;
  if (!text) return;
  copyText(text);
  const btn = $('#copyBtn');
  btn.textContent = t('copied');
  setTimeout(() => { btn.textContent = t('copy'); }, 1500);
}

function doClear() {
  $('#options').querySelectorAll('input[type=checkbox]').forEach(cb => { cb.checked = false; });
  $('#output').value = '';
  document.querySelectorAll('.gz-preset-btn').forEach(b => b.classList.remove('active'));
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" id="copyBtn" onclick="doCopy()">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

buildPresets();
buildOptions();
applyPreset('modern');

GZ.renderToolPage({
  category: 'css',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🌈', href:'/css-tools/gradient.html', name:'CSS Gradient'},
    {icon:'🔲', href:'/css-tools/shadow.html', name:'Box Shadow'},
    {icon:'📦', href:'/css-tools/minify.html', name:'CSS Minifier'},
    {icon:'📐', href:'/css-tools/flexbox.html', name:'Flexbox Generator'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
