.ctrl input,.ctrl select{width:100%;padding:6px 8px;background:var(--glass);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:.85rem}
.preview-box{display:flex;align-items:center;justify-content:center;min-height:250px;background:var(--glass);border:1px solid var(--border);border-radius:16px;padding:40px;position:relative}
.code-box{position:relative;background:var(--glass);border:1px solid var(--border);border-radius:12px;padding:16px;margin-top:16px}
.code-box pre{white-space:pre-wrap;word-break:break-all;font-size:.8rem;line-height:1.5;max-height:300px;overflow:auto;margin:0}

/* Tooltip demo styles */

.ttip .t{visibility:hidden;opacity:0;position:absolute;z-index:10;padding:8px 14px;border-radius:6px;font-size:.8rem;font-weight:400;white-space:nowrap;transition:opacity .25s,visibility .25s,transform .25s}
.ttip:hover .t{visibility:visible;opacity:1}
.ttip .t::after{content:'';position:absolute;border-width:6px;border-style:solid}
</style>

<script>
GZI18n.register({
  en: {
    toolTitle: 'CSS Tooltip Generator',
    toolDesc: 'Design custom CSS tooltips with live preview — position, arrow, colors, animation and delay. Copy production-ready code.',
    step1: 'Customize tooltip position, colors and animation',
    step2: 'Edit the tooltip text in the preview area',
    step3: 'Copy the generated HTML and CSS code',
    step4: 'Paste into your project — no JavaScript needed',
  },
  zh: {
    toolTitle: 'CSS 提示框生成器',
    toolDesc: '可视化设计 CSS 提示框 — 位置、箭头、颜色、动画和延迟。复制生产可用代码。',
    step1: '自定义提示框位置、颜色和动画',
    step2: '在预览区编辑提示框文本',
    step3: '复制生成的 HTML 和 CSS 代码',
    step4: '粘贴到项目中 — 无需 JavaScript',
  }
});

const { $, copyText, t } = GZ;

const state = {
  position: 'top',
  bg: '#333333',
  color: '#ffffff',
  radius: 6,
  padding: '8px 14px',
  fontSize: 13,
  fontWeight: 400,
  arrow: true,
  animation: 'fade',
  delay: 0,
  text: 'Tooltip text here',
  triggerText: 'Hover me'
};

function posStyles(p) {
  const map = {
    top:    {b:'bottom:calc(100% + 10px);left:50%;transform:translateX(-50%)',a:'top:100%;left:50%;transform:translateX(-50%);border-color:VAR_BG transparent transparent transparent'},
    bottom: {b:'top:calc(100% + 10px);left:50%;transform:translateX(-50%)',a:'bottom:100%;left:50%;transform:translateX(-50%);border-color:transparent transparent VAR_BG transparent'},
    left:   {b:'right:calc(100% + 10px);top:50%;transform:translateY(-50%)',a:'left:100%;top:50%;transform:translateY(-50%);border-color:transparent transparent transparent VAR_BG'},
    right:  {b:'left:calc(100% + 10px);top:50%;transform:translateY(-50%)',a:'right:100%;top:50%;transform:translateY(-50%);border-color:transparent VAR_BG transparent transparent'},
  };
  return map[p] || map.top;
}

function animCSS(a) {
  if (a === 'fade') return 'opacity:0;transition:opacity .25s';
  if (a === 'scale') return 'opacity:0;transform:translateX(-50%) scale(0.8);transition:opacity .2s,transform .2s';
  if (a === 'slide') return 'opacity:0;transform:translateX(-50%) translateY(6px);transition:opacity .2s,transform .2s';
  return '';
}
function animHover(a, p) {
  if (a === 'fade') return 'opacity:1';
  if (a === 'scale') return 'opacity:1;transform:translateX(-50%) scale(1)';
  if (a === 'slide') {
    const dir = p==='top'?'translateY(-6px)':p==='bottom'?'translateY(6px)':'translateX(-50%)';
    return `opacity:1;transform:${dir}`;
  }
  return '';
}

function update() {
  const tip = $('#tipEl');
  const demo = $('#demo');
  const pos = posStyles(state.position);
  const bg = state.bg;
  const clr = state.color;
  const baseTf = pos.b.split('transform:')[1] || '';

  tip.style.cssText = `
    visibility:hidden;opacity:0;position:absolute;z-index:10;
    padding:${state.padding};border-radius:${state.radius}px;
    font-size:${state.fontSize}px;font-weight:${state.fontWeight};
    background:${bg};color:${clr};white-space:nowrap;
    ${pos.b.replace('transform:'+baseTf,'')};
    ${state.delay?'transition-delay:'+state.delay+'s;':''}
    ${animCSS(state.animation).replace('translateX(-50%)',baseTf||'translateX(-50%)')}
  `;
  tip.textContent = state.text;
  demo.childNodes[0].textContent = state.triggerText + ' ';

  // Arrow
  if (state.arrow) {
    tip.innerHTML = state.text + `<span style="content:'';position:absolute;${pos.a.replace(/VAR_BG/g,bg)};border-width:6px;border-style:solid"></span>`;
  }

  // hover
  const hovRule = `
    .ttip:hover .t{visibility:visible;opacity:1${state.delay?';transition-delay:'+state.delay+'s':''}${animHover(state.animation,state.position)?';'+animHover(state.animation,state.position).replace('transform:','transform:'):'',''}}`;

  // Generate code
  const cssCode = `.tooltip {
  position: relative;
  display: inline-block;
  cursor: pointer;
}

.tooltip .tooltip-text {
  visibility: hidden;
  opacity: 0;
  position: absolute;
  z-index: 10;
  padding: ${state.padding};
  border-radius: ${state.radius}px;
  font-size: ${state.fontSize}px;
  font-weight: ${state.fontWeight};
  background: ${bg};
  color: ${clr};
  white-space: nowrap;
  ${pos.b};
  ${state.delay ? 'transition-delay: ' + state.delay + 's;' : ''}
  transition: opacity 0.25s, visibility 0.25s;
}

.tooltip:hover .tooltip-text {
  visibility: visible;
  opacity: 1;${state.delay ? '\n  transition-delay: ' + state.delay + 's;' : ''}
}${state.arrow ? `

.tooltip .tooltip-text::after {
  content: '';
  position: absolute;
  ${pos.a.replace(/VAR_BG/g, bg)};
  border-width: 6px;
  border-style: solid;
}` : ''}`;

  const htmlCode = `<span class="tooltip">
  ${state.triggerText}
  <span class="tooltip-text">${state.text}</span>
</span>`;

  $('#codeOut').textContent = `/* CSS */\n${cssCode}\n\n<!-- HTML -->\n${htmlCode}`;
}

function buildControls() {
  $('#controls').innerHTML = `
    <div><label>Position</label>
      <select onchange="state.position=this.value;update()">
        <option value="top">Top</option><option value="bottom">Bottom</option>
        <option value="left">Left</option><option value="right">Right</option>
      </select></div>
    <div><label>Background</label><input type="color" value="${state.bg}" onchange="state.bg=this.value;update()"></div>
    <div><label>Text Color</label><input type="color" value="${state.color}" onchange="state.color=this.value;update()"></div>
    <div><label>Border Radius</label><input type="range" min="0" max="24" value="${state.radius}" onchange="state.radius=+this.value;update()"></div>
    <div><label>Font Size</label><input type="number" min="10" max="24" value="${state.fontSize}" onchange="state.fontSize=+this.value;update()"></div>
    <div><label>Animation</label>
      <select onchange="state.animation=this.value;update()">
        <option value="fade">Fade</option><option value="scale">Scale</option><option value="slide">Slide</option><option value="none">None</option>
      </select></div>
    <div><label>Delay (s)</label><input type="number" min="0" max="3" step="0.1" value="${state.delay}" onchange="state.delay=+this.value;update()"></div>
    <div><label>Tooltip Text</label><input type="text" value="${state.text}" onchange="state.text=this.value;update()"></div>
    <div><label>Trigger Text</label><input type="text" value="${state.triggerText}" onchange="state.triggerText=this.value;update()"></div>
  `;
}

buildControls();
update();

GZ.renderToolPage({
  category: 'css',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🔲', href:'/css-tools/shadow.html', name:'Box Shadow'},
    {icon:'🔘', href:'/css-tools/border-radius.html', name:'Border Radius'},
    {icon:'✏️', href:'/css-tools/text-shadow.html', name:'Text Shadow'},
    {icon:'🎨', href:'/css-tools/button.html', name:'Button'},
  ]
});
</script>
