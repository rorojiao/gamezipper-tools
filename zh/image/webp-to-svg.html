<script>

    clear: '清空全部',

    widthLabel: 'SVG 宽度（px）',

    embed: '以 base64 嵌入',
    download: '下载',
    remove: '移除',
    empty: '还没有文件 — 转换后的 SVG 将显示在此处。',
    step1: '将一个或多个 .webp 文件拖放到上传区',
    step2: '设置 SVG 宽度（像素），高度自动按比例缩放',
    step3: '点击每张卡片上的「下载」，或「下载全部」批量保存',
    step4: '所有处理 100% 本地完成 — 图片永不离开浏览器',
  }
});

const { $, t, downloadBlob } = GZ;
let files = []; // {name, dataUrl, w, h, size}
let svgWidth = 0; // 0 = natural
let keepAspect = true;

function fmtBytes(n){ if(n<1024) return n+' B'; if(n<1048576) return (n/1024).toFixed(1)+' KB'; return (n/1048576).toFixed(2)+' MB'; }

function readFile(file){
  return new Promise((res,rej)=>{
    const r = new FileReader();
    r.onload = () => {
      const img = new Image();
      img.onload = () => res({ name: file.name, dataUrl: r.result, w: img.naturalWidth, h: img.naturalHeight, size: file.size });
      img.onerror = rej;
      img.src = r.result;
    };
    r.onerror = rej;
    r.readAsDataURL(file);
  });
}

function buildSVG(f){
  const w = svgWidth > 0 ? svgWidth : f.w;
  const h = keepAspect && f.w ? Math.round(w * f.h / f.w) : f.h;
  return `<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}" viewBox="0 0 ${f.w} ${f.h}"><image href="${f.dataUrl}" width="${f.w}" height="${f.h}"/></svg>`;
}

function svgSize(f){
  const svg = buildSVG(f);
  return new Blob([svg]).size;
}

function render(){
  if(!files.length){ $('#grid').innerHTML=''; $('#empty').style.display='block'; return; }
  $('#empty').style.display='none';
  $('#grid').innerHTML = files.map((f,i)=>{
    const out = svgSize(f);
    return `<div class="ws-card">
      <img src="${f.dataUrl}" alt="${f.name}">
      <div class="ws-name">${f.name}</div>
      <div class="ws-meta">${f.w}×${f.h} · WebP ${fmtBytes(f.size)} → SVG ${fmtBytes(out)}</div>
      <div class="btns">
        <button class="gz-btn" onclick="dlOne(${i})">${t('download')}</button>
        <button class="gz-btn gz-btn-secondary" onclick="rm(${i})">${t('remove')}</button>
      </div>
    </div>`;
  }).join('');
}

function dlSVG(svg, filename){
  const blob = new Blob([svg],{type:'image/svg+xml;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=> URL.revokeObjectURL(url), 2000);
}

function dlOne(i){
  const f = files[i]; if(!f) return;
  dlSVG(buildSVG(f), f.name.replace(/\.webp$/i,'')+'.svg');
}

function dlAll(){
  files.forEach((f,i)=> setTimeout(()=> dlOne(i), i*120));
}

function rm(i){ files.splice(i,1); render(); }

async function handleFiles(list){
  for(const file of list){
    if(!/webp/i.test(file.type) && !/\.webp$/i.test(file.name)) continue;
    try{ const obj = await readFile(file); files.push(obj); }catch(e){}
  }
  render();
}

const drop = $('#drop');
drop.addEventListener('click', ()=> $('#file').click());
drop.addEventListener('dragover', e=>{ e.preventDefault(); drop.classList.add('over'); });
drop.addEventListener('dragleave', ()=> drop.classList.remove('over'));
drop.addEventListener('drop', e=>{ e.preventDefault(); drop.classList.remove('over'); handleFiles(e.dataTransfer.files); });
$('#file').addEventListener('change', e=> handleFiles(e.target.files));

$('#opts').innerHTML = `
  <label>${t('widthLabel')}: <input type="number" id="w" min="0" step="1" value="0" style="width:80px;padding:5px 8px;border-radius:6px;border:1px solid var(--border);background:var(--glass2);color:var(--text)"></label>
  <label><input type="checkbox" id="ka" checked> ${t('keepAspect')}</label>`;
$('#w').addEventListener('input', e=>{ svgWidth = Math.max(0, +e.target.value||0); render(); });
$('#ka').addEventListener('change', e=>{ keepAspect = e.target.checked; render(); });

$('#empty').textContent = t('empty');
$('#drop-hint').textContent = t('dropHint');
$('#drop-sub').textContent = t('dropSub');

$('#toolbar').innerHTML = `
  <button class="gz-btn gz-btn-secondary" onclick="clearAll()">${t('clear')}</button>
  <button class="gz-btn" onclick="dlAll()">${t('downloadAll')}</button>`;

function clearAll(){ files=[]; $('#file').value=''; render(); }
