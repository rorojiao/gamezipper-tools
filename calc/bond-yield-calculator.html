<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is current yield?", "acceptedAnswer": {"@type": "Answer", "text": "Current yield is the annual coupon payment divided by the current bond price, expressed as a percentage. It tells you the income return you would earn over the next year based on what you pay for the bond today. It ignores capital gains or losses and the time value of money."}}, {"@type": "Question", "name": "What is yield to maturity (YTM)?", "acceptedAnswer": {"@type": "Answer", "text": "Yield to maturity is the total annualized return you would earn if you bought the bond at today's price and held it until it matures, receiving all coupons and the face value. It accounts for both coupon income and any capital gain or loss. YTM is the internal rate of return of the bond's cash flows."}}, {"@type": "Question", "name": "What is the difference between YTM and coupon rate?", "acceptedAnswer": {"@type": "Answer", "text": "The coupon rate is fixed at issuance and determines the cash payout as a percentage of face value. YTM reflects the actual return based on the price you pay. When a bond trades at a discount (below face value), YTM is higher than the coupon rate; at a premium, YTM is lower than the coupon rate."}}, {"@type": "Question", "name": "How is yield to call (YTC) different from YTM?", "acceptedAnswer": {"@type": "Answer", "text": "Some bonds can be redeemed (called) by the issuer before maturity at a call price. Yield to call is the return if the bond is called at the earliest call date rather than held to maturity. Callable bonds often show both YTM and YTC so investors can see the worst-case (yield to worst) return."}}]}</script>

<script>
GZI18n.register({
  en: {
    toolTitle: 'Bond Yield Calculator',
    toolDesc: 'Calculate current yield, yield to maturity (YTM) and yield to call (YTC) for any coupon bond. Enter face value, coupon rate, current price, years to maturity and payment frequency — instant results, pure browser, no signup.',
    inputs: 'Bond Details', stats: 'Yield Results',
    face: 'Face value (par)', coupon: 'Coupon rate (% annual)', price: 'Current price', years: 'Years to maturity', freq: 'Coupon frequency',
    heroLbl: 'Yield to Maturity (YTM)', heroSub: 'Annualized total return to maturity',
    current: 'Current Yield', ytm: 'Yield to Maturity', ytc: 'Yield to Call', annual: 'Annual Coupon', discount: 'Price vs Par', payments: 'Total Coupons',
    copy: '📋 Copy Results', reset: '🔄 Reset', example: '🧪 Load Example',
    nA: 'N/A',
    step1: 'Enter the bond face value (usually $1,000)',
    step2: 'Enter the annual coupon rate and current market price',
    step3: 'Set the years to maturity and payment frequency',
    step4: 'Read the current yield, YTM, YTC and annual income',
  },
  zh: {
    toolTitle: '债券收益率计算器',
    toolDesc: '计算任意附息债券的当期收益率、到期收益率 (YTM) 和赎回收益率 (YTC)。输入面值、票面利率、当前价格、到期年限和付息频率 — 即时出结果，纯浏览器运行，无需注册。',
    inputs: '债券详情', stats: '收益率结果',
    face: '面值（票面）', coupon: '票面利率（年化 %）', price: '当前价格', years: '到期年限', freq: '付息频率',
    heroLbl: '到期收益率 (YTM)', heroSub: '持有到期的年化总收益',
    current: '当期收益率', ytm: '到期收益率', ytc: '赎回收益率', annual: '年度票息', discount: '价格对比面值', payments: '付息总期数',
    copy: '📋 复制结果', reset: '🔄 重置', example: '🧪 加载示例',
    nA: '不适用',
    step1: '输入债券面值（通常为 1000）',
    step2: '输入票面利率和当前市场价格',
    step3: '设置到期年限和付息频率',
    step4: '查看当期收益率、YTM、YTC 和年度票息收入',
  }
});

const { $, copyText, t } = GZ;
const isZh = GZI18n.getLang() === 'zh';

$('#lblInputs').textContent = t('inputs');
$('#lblStats').textContent = t('stats');
$('#lblFace').textContent = t('face');
$('#lblCoupon').textContent = t('coupon');
$('#lblPrice').textContent = t('price');
$('#lblYears').textContent = t('years');
$('#lblFreq').textContent = t('freq');
$('#heroLbl').textContent = t('heroLbl');
$('#heroSub').textContent = t('heroSub');
$('#lCurrent').textContent = t('current');
$('#lYTM').textContent = t('ytm');
$('#lYTC').textContent = t('ytc');
$('#lAnnual').textContent = t('annual');
$('#lDiscount').textContent = t('discount');
$('#lPremium').textContent = t('payments');

function fmt(n, dec=0) { return '$' + (n||0).toLocaleString(undefined, {minimumFractionDigits:dec, maximumFractionDigits:dec}); }

// NPV of bond cash flows at rate y (per period). n = periods left, c = coupon per period, f = face, p = price
function bondNPV(c, f, n, y) {
  if (y === 0) return c * n + f;
  const yf = Math.pow(1 + y, -n);
  return c * (1 - yf) / y + f * yf;
}

// Newton-Raphson IRR for a stream: solve price = bondNPV(...) for per-period y
function solveYield(c, f, n, price, periodsPerYear) {
  if (n <= 0 || price <= 0 || f <= 0) return null;
  let y = (c * n + f - price) / price / n; // initial guess per period
  for (let i = 0; i < 100; i++) {
    const npv = bondNPV(c, f, n, y);
    const diff = npv - price;
    if (Math.abs(diff) < 1e-6) break;
    // derivative: dNPV/dy
    let d = 0;
    for (let k = 1; k <= n; k++) d -= k * c / Math.pow(1+y, k+1);
    d -= n * f / Math.pow(1+y, n+1);
    if (Math.abs(d) < 1e-12) break;
    y -= diff / d;
    if (y <= -0.999) y = -0.99;
  }
  // annualize as Bond-Equivalent Yield (periodic rate × frequency) — the standard
  // market convention for quoting YTM (e.g. semi-annual yield × 2)
  return y * periodsPerYear;
}

function calc() {
  const face = +$('#face').value || 0;
  const couponPct = +$('#coupon').value || 0;
  const price = +$('#price').value || 0;
  const years = +$('#years').value || 0;
  const freq = +$('#freq').value || 1;

  if (face <= 0 || price <= 0 || years <= 0) {
    $('#ytmVal').textContent = '—';
    ['current','ytm','ytc','annual','discount','payments'].forEach(id => $('#'+id).textContent = '—');
    $('#note').textContent = isZh ? '请输入有效的面值、价格和年限。' : 'Enter a valid face value, price and years.';
    return;
  }

  const periodsPerYear = freq;
  const n = Math.round(years * periodsPerYear);
  const couponPerPeriod = face * (couponPct/100) / periodsPerYear;
  const annualCoupon = face * (couponPct/100);

  const currentYield = (annualCoupon / price) * 100;
  const ytm = solveYield(couponPerPeriod, face, n, price, periodsPerYear);
  // YTC: assume callable at par in half the remaining life (illustrative)
  const callN = Math.max(1, Math.round(n / 2));
  const ytc = solveYield(couponPerPeriod, face, callN, price, periodsPerYear);

  $('#ytmVal').textContent = (ytm !== null ? (ytm*100).toFixed(2) : '0.00') + '%';
  $('#current').textContent = currentYield.toFixed(2) + '%';
  $('#ytm').textContent = (ytm !== null ? (ytm*100).toFixed(2) : '0.00') + '%';
  $('#ytc').textContent = (ytc !== null ? (ytc*100).toFixed(2) : t('nA')) + (ytc !== null ? '%' : '');
  $('#annual').textContent = fmt(annualCoupon);
  $('#discount').textContent = ((price/face - 1) * 100).toFixed(1) + '%';
  $('#payments').textContent = n;

  const vsPar = price > face ? (isZh ? '溢价交易' : 'trading at a premium')
              : price < face ? (isZh ? '折价交易' : 'trading at a discount')
              : (isZh ? '按面值交易' : 'trading at par');

  $('#note').innerHTML = isZh
    ? `当期收益率 = <code>年票息 ÷ 价格 = ${fmt(annualCoupon)} ÷ ${fmt(price)} = ${currentYield.toFixed(2)}%</code><br>
       YTM 用 Newton-Raphson 求解使现金流现值等于价格的折现率，再年化为 <code>${(ytm*100).toFixed(2)}%</code>。<br>
       该债券 <b>${vsPar}</b>，剩余 <code>${n}</code> 个付息期。`
    : `Current yield = <code>annual coupon ÷ price = ${fmt(annualCoupon)} ÷ ${fmt(price)} = ${currentYield.toFixed(2)}%</code><br>
       YTM is solved with Newton-Raphson (discount rate equating cash flows to price), annualized to <code>${(ytm*100).toFixed(2)}%</code>.<br>
       The bond is <b>${vsPar}</b> with <code>${n}</code> coupon periods remaining.`;
}

['face','coupon','price','years','freq'].forEach(id => $('#' + id).addEventListener('input', calc));
$('#freq').addEventListener('change', calc);

$('#toolbar').innerHTML = `
  <button class="gz-btn gz-btn-secondary" id="btnCopy">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" id="btnExample">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" id="btnReset">${t('reset')}</button>`;

$('#btnCopy').onclick = () => copyText(`${t('toolTitle')}\n${t('current')}: ${$('#current').textContent}\n${t('ytm')}: ${$('#ytm').textContent}\n${t('ytc')}: ${$('#ytc').textContent}\n${t('annual')}: ${$('#annual').textContent}`);
$('#btnExample').onclick = () => { $('#face').value = 1000; $('#coupon').value = 5; $('#price').value = 950; $('#years').value = 10; $('#freq').value = 2; calc(); };
$('#btnReset').onclick = () => { $('#face').value = 1000; $('#coupon').value = 0; $('#price').value = 1000; $('#years').value = 5; $('#freq').value = 2; calc(); };

calc();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📈', href:'/calc/compound-interest.html', name:'Compound Interest'},
    {icon:'💹', href:'/calc/investment-calculator.html', name:'Investment Calc'},
    {icon:'💵', href:'/calc/roi.html', name:'ROI Calculator'},
    {icon:'📊', href:'/calc/cagr-calculator.html', name:'CAGR Calculator'},
  ]
});
</script>

</body>
