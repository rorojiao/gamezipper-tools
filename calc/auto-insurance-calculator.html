<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"How is auto insurance calculated?","acceptedAnswer":{"@type":"Answer","text":"Auto insurance premiums are based on a combination of factors: your state minimums and chosen coverage limits, deductible amounts, the driver's age (young drivers under 25 and seniors over 70 pay substantially more), driving history (accidents and tickets raise rates), credit score (most states), vehicle type and value, where the car is kept (ZIP code), annual mileage, and selected add-ons like rental coverage or roadside assistance. Insurers combine these factors through a tiered rating algorithm; the calculator above uses the main ones and produces a defensible monthly estimate."}},{"@type":"Question","name":"What is the difference between liability and full coverage?","acceptedAnswer":{"@type":"Answer","text":"Liability covers damage you cause to others and their property — split into bodily injury and property damage limits (e.g. 100/300/100 means $100,000 per person, $300,000 per accident for injuries and $100,000 for property). Full coverage adds collision (your car after a crash, regardless of fault) and comprehensive (theft, weather, vandalism, animal strikes). Lenders require both when you finance a vehicle. State-minimum liability covers only what your state legally requires and is the cheapest option — usually inadequate if you cause a serious crash."}},{"@type":"Question","name":"How can I lower my car insurance premium?","acceptedAnswer":{"@type":"Answer","text":"Common discounts include bundling auto with home or renters (5% to 25%), maintaining a clean driving record, paying annually instead of monthly, raising your deductible from $500 to $1,000, having good credit, completing a defensive driving course, telematics / usage-based programs that track safe driving, low-mileage discounts, and student-driver discounts (good grades, driver training). The calculator's bundle-savings row estimates a 15% bundling discount on the full-coverage scenario."}},{"@type":"Question","name":"What is PIP and do I need it?","acceptedAnswer":{"@type":"Answer","text":"Personal Injury Protection (PIP) pays medical expenses, lost wages and essential services for you and your passengers after an accident regardless of fault. PIP is required in no-fault states like Florida, Michigan, New Jersey, New York, Massachusetts, Hawaii, Kentucky, Minnesota, North Dakota, Utah and Pennsylvania. In at-fault states, PIP is optional but still useful — especially if you don't have strong health insurance — because it pays out quickly without waiting for liability determination."}},{"@type":"Question","name":"How often should I shop for car insurance?","acceptedAnswer":{"@type":"Answer","text":"Insurance industry data shows about 30% of drivers save $400+ per year by switching. Most experts recommend shopping every 12 months at renewal, comparing at least 3 to 5 quotes from different carriers. Ask about rate increases at renewal (some states ban 'price optimization' — where loyal customers get larger increases than new ones). Compare identical coverage limits and deductibles, not just the bottom-line price."}}]}</script>

const fmt2 = n => '$' + n.toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2});
const fmt  = n => '$' + Math.round(n).toLocaleString('en-US');
const pct  = n => (n*100).toFixed(1) + '%';

// Base rates per coverage (annual $, ~median US)
const BASE_RATES = { liab: 580, coll: 950, comp: 380, um: 95, pip: 220, rental: 60 };

function ageMult(age) {
  if (age < 25) return 1.95 - (25-age)*0.07;
  if (age > 70) return 1 + (age-70)*0.04;
  if (age >= 50) return 0.92;
  return 1.0;
}

function calc() {
  const age = +$('#age').value || 35;
  const gender = $('#gender').value;
  const miles = +$('#miles').value || 12000;
  const hist = +$('#history').value;
  const credit = +$('#credit').value;
  const vType = +$('#vehicleType').value;
  const val = +$('#vehicleValue').value || 28000;
  const liabLimit = $('#liab-limit').value;
  const dedColl = +$('#ded-coll').value || 500;
  const dedComp = +$('#ded-comp').value || 500;
  const covLiab = $('#cov-liab').checked;
  const covColl = $('#cov-coll').checked;
  const covComp = $('#cov-comp').checked;
  const covUm = $('#cov-um').checked;
  const covPip = $('#cov-pip').checked;
  const covRental = $('#cov-rental').checked;
  const pipLim = +$('#pip-limit').value || 5000;

  const mult = {
    age: ageMult(age),
    gender: gender==='m' ? 1.08 : (age<25 ? 0.95 : 1.0),
    miles: miles > 15000 ? 1.12 : miles > 10000 ? 1.05 : miles < 6000 ? 0.92 : 1.0,
    hist: 1 + hist*0.18,
    credit: credit,
    vehicle: vType,
    value: Math.max(0.7, Math.min(1.6, val/28000)),
    garaging: 1.05  // generic
  };

  // Liability scales with limit
  let liabMult = 1.0;
  if (liabLimit === 'state') liabMult = 0.65;
  else if (liabLimit === '25/50/25') liabMult = 0.85;
  else if (liabLimit === '50/100/50') liabMult = 1.0;
  else if (liabLimit === '100/300/100') liabMult = 1.3;
  else if (liabLimit === '250/500/250') liabMult = 1.55;

  // Deductible factor — lower deductible = higher premium
  const dedMult = (d) => d <= 250 ? 1.25 : d <= 500 ? 1.0 : d <= 1000 ? 0.86 : d <= 2000 ? 0.74 : 0.65;

  // PIP scales with limit
  const pipMult = pipLim <= 2500 ? 0.85 : pipLim <= 5000 ? 1.0 : pipLim <= 10000 ? 1.15 : 1.3;

  // Compute annual rates
  const annual = {
    liab: covLiab ? BASE_RATES.liab * mult.age * mult.gender * mult.hist * mult.credit * mult.garaging * liabMult * mult.vehicle : 0,
    coll: covColl ? BASE_RATES.coll * mult.age * mult.hist * mult.credit * dedMult(dedColl) * mult.vehicle * mult.value : 0,
    comp: covComp ? BASE_RATES.comp * mult.hist * mult.credit * dedMult(dedComp) * mult.vehicle * mult.value : 0,
    um:   covUm   ? BASE_RATES.um   * mult.age * mult.hist * mult.credit * mult.garaging : 0,
    pip:  covPip  ? BASE_RATES.pip  * mult.age * mult.hist * pipMult : 0,
    rental: covRental ? BASE_RATES.rental * mult.vehicle : 0,
  };

  const annualTotal = Object.values(annual).reduce((s,v)=>s+v, 0);
  const monthlyTotal = annualTotal / 12;

  // State-minimum baseline: liability only
  const stateMinAnnual = BASE_RATES.liab * liabMult * mult.age * mult.gender * mult.credit * mult.garaging * 0.55;

  // Discount scenarios
  const bundleSave = annualTotal * 0.15;
  const dedupMonthlyDelta = (BASE_RATES.coll * (1 - dedMult(1000)) + BASE_RATES.comp * (1 - dedMult(1000))) * mult.age * mult.hist * mult.credit * mult.vehicle * mult.value;
  const dedupSave = Math.max(0, dedupMonthlyDelta * 0.8);
  const paidSave = monthlyTotal * 12 * 0.04;  // 4% for annual payment vs monthly
  const totalSave = bundleSave + dedupSave + paidSave;

  // Render summary
  $('#m-monthly').textContent = fmt2(monthlyTotal);
  $('#m-annual').textContent = fmt(annualTotal);
  $('#m-vs-state').textContent = (monthlyTotal === 0 ? '$0' : '+' + fmt(monthlyTotal - stateMinAnnual/12));

  // Table
  const tbody = $('#tbody');
  tbody.innerHTML = '';
  const labels = { liab: t('liab'), coll: t('coll'), comp: t('comp'), um: t('um'), pip: t('pip'), rental: 'Rental' };
  let hasRental = covRental;
  ['liab','coll','comp','um','pip'].concat(hasRental ? ['rental'] : []).forEach(k => {
    const v = annual[k];
    if (v <= 0) return;
    const tr = document.createElement('tr');
    tr.innerHTML = '<td>'+labels[k]+'</td><td>'+fmt2(v/12)+'</td><td>'+fmt(v)+'</td><td>'+pct(v/annualTotal)+'</td>';
    tbody.appendChild(tr);
  });
  const tr = document.createElement('tr');
  tr.className = 'total';
  tr.innerHTML = '<td>Total</td><td>'+fmt2(monthlyTotal)+'</td><td>'+fmt(annualTotal)+'</td><td>100%</td>';
  tbody.appendChild(tr);

  // Discounts
  $('#d-bundle').textContent = '-' + fmt(bundleSave) + '/yr';
  $('#d-dedup').textContent = '-' + fmt(dedupSave) + '/yr';
  $('#d-paid').textContent = '-' + fmt(paidSave) + '/yr';
  $('#d-total').textContent = '-' + fmt(totalSave) + '/yr';

  $('#results').style.display = 'block';
}
