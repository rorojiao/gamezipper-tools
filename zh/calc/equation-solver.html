const { $, copyText, t } = GZ;

function fmt(n) {
  if (Number.isInteger(n)) return n.toString();
  return parseFloat(n.toFixed(8)).toString();
}

function solve() {
  const a = parseFloat($('#ca').value);
  const b = parseFloat($('#cb').value);
  const c = parseFloat($('#cc').value);

  if (isNaN(a) || isNaN(b) || isNaN(c)) { showError(t('errEmpty')); return; }
  if (a === 0) { showError(t('notQuadratic')); return; }
  hideError();

  const D = b * b - 4 * a * c;
  const vx = -b / (2 * a);
  const vy = a * vx * vx + b * vx + c;

  // Roots
  let rootsHTML = '';
  if (D > 0) {
    const x1 = (-b + Math.sqrt(D)) / (2 * a);
    const x2 = (-b - Math.sqrt(D)) / (2 * a);
    rootsHTML = `
      <div class="eq-root"><div class="lbl">${t('root1')}</div><div class="val">${fmt(x1)}</div></div>
      <div class="eq-root"><div class="lbl">${t('root2')}</div><div class="val">${fmt(x2)}</div></div>`;
  } else if (D === 0) {
    const x = -b / (2 * a);
    rootsHTML = `
      <div class="eq-root" style="grid-column:1/-1"><div class="lbl">${t('oneRoot')}</div><div class="val">${fmt(x)}</div></div>`;
  } else {
    const real = -b / (2 * a);
    const imag = Math.sqrt(-D) / (2 * a);
    rootsHTML = `
      <div class="eq-root"><div class="lbl">${t('root1')}</div><div class="val">${fmt(real)} + ${fmt(Math.abs(imag))}i</div></div>
      <div class="eq-root"><div class="lbl">${t('root2')}</div><div class="val">${fmt(real)} − ${fmt(Math.abs(imag))}i</div></div>`;
  }
  $('#roots').innerHTML = rootsHTML;

  // Properties
  const nature = D > 0 ? t('twoReal') : D === 0 ? t('oneReal') : t('twoComplex');
  $('#props').innerHTML = `
    <div class="eq-prop"><div class="lbl">${t('discriminant')}</div><div class="val">${fmt(D)}</div></div>
    <div class="eq-prop"><div class="lbl">${t('vertex')}</div><div class="val">(${fmt(vx)}, ${fmt(vy)})</div></div>
    <div class="eq-prop"><div class="lbl">${t('axisOfSymmetry')}</div><div class="val">x = ${fmt(vx)}</div></div>
    <div class="eq-prop"><div class="lbl">${t('yIntercept')}</div><div class="val">(${fmt(c)})</div></div>
    <div class="eq-prop" style="grid-column:1/-1"><div class="lbl">${t('nature')}</div><div class="val">${nature}</div></div>`;
  $('#results').style.display = 'block';

  // Steps
  const op = b >= 0 ? '+' : '−';
  let html = `<div class="step-title">${t('stepsTitle')}</div>`;
  html += `<div class="step-line">${t('Given') || 'Given'}: ${a}x² ${b >= 0 ? '+ ' + b : '− ' + Math.abs(b)}x ${c >= 0 ? '+ ' + c : '− ' + Math.abs(c)} = 0</div>`;
  html += `<div class="step-line">a = ${a}, b = ${b}, c = ${c}</div>`;
  html += `<div class="step-line" style="margin-top:8px">Δ = b² − 4ac = (${b})² − 4(${a})(${c}) = <span class="step-highlight">${fmt(D)}</span></div>`;
  html += `<div class="step-line" style="margin-top:8px">x = (−b ± √Δ) / 2a</div>`;
  html += `<div class="step-line">x = (${-b} ± √${fmt(D)}) / ${2 * a}</div>`;
  if (D >= 0) {
    html += `<div class="step-line">x = (${-b} ± ${fmt(Math.sqrt(Math.abs(D)))}) / ${2 * a}</div>`;
    const x1 = (-b + Math.sqrt(D)) / (2 * a);
    const x2 = (-b - Math.sqrt(D)) / (2 * a);
    if (D > 0) {
      html += `<div class="step-line" style="margin-top:4px">x₁ = <span class="step-highlight">${fmt(x1)}</span></div>`;
      html += `<div class="step-line">x₂ = <span class="step-highlight">${fmt(x2)}</span></div>`;
    } else {
      html += `<div class="step-line" style="margin-top:4px">x = <span class="step-highlight">${fmt(x1)}</span> (repeated root)</div>`;
    }
  } else {
    const real = -b / (2 * a);
    const imag = Math.sqrt(-D) / (2 * a);
    html += `<div class="step-line">√(${fmt(D)}) = <span class="eq-imaginary">${fmt(Math.sqrt(-D))}i</span></div>`;
    html += `<div class="step-line" style="margin-top:4px">x₁ = <span class="step-highlight">${fmt(real)} + ${fmt(imag)}i</span></div>`;
    html += `<div class="step-line">x₂ = <span class="step-highlight">${fmt(real)} − ${fmt(imag)}i</span></div>`;
  }
  $('#steps').innerHTML = html;
  $('#steps').style.display = 'block';

  // Graph
  drawGraph(a, b, c, vx, vy, D);
  $('#graph-box').style.display = 'block';
}

function drawGraph(a, b, c, vx, vy, D) {
  const canvas = $('#graph');
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  canvas.width = canvas.offsetWidth * dpr;
  canvas.height = 250 * dpr;
  ctx.scale(dpr, dpr);
  const W = canvas.offsetWidth, H = 250;

  ctx.fillStyle = '#1a1a2e';
  ctx.fillRect(0, 0, W, H);

  // Determine range
  let xMin, xMax;
  if (D >= 0) {
    const x1 = (-b + Math.sqrt(D)) / (2 * a);
    const x2 = (-b - Math.sqrt(D)) / (2 * a);
    const mn = Math.min(x1, x2, vx);
    const mx = Math.max(x1, x2, vx);
    const pad = Math.max((mx - mn) * 0.5, 1);
    xMin = mn - pad; xMax = mx + pad;
  } else {
    const pad = Math.max(Math.abs(vx) * 2, 4);
    xMin = vx - pad; xMax = vx + pad;
  }

  const f = x => a * x * x + b * x + c;
  const yMin = Math.min(vy, f(xMin), f(xMax));
  const yMax = Math.max(f(xMin), f(xMax), vy);
  const yPad = Math.max((yMax - yMin) * 0.3, 1);
  const yLo = yMin - yPad, yHi = yMax + yPad;

  const toX = x => (x - xMin) / (xMax - xMin) * W;
  const toY = y => H - (y - yLo) / (yHi - yLo) * H;

  // Grid
  ctx.strokeStyle = 'rgba(255,255,255,0.06)';
  ctx.lineWidth = 1;
  for (let i = 0; i <= 10; i++) {
    const x = i * W / 10;
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
    const y = i * H / 10;
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }

  // Axes
  ctx.strokeStyle = 'rgba(255,255,255,0.25)';
  ctx.lineWidth = 1.5;
  if (xMin <= 0 && xMax >= 0) {
    const x0 = toX(0);
    ctx.beginPath(); ctx.moveTo(x0, 0); ctx.lineTo(x0, H); ctx.stroke();
  }
  if (yLo <= 0 && yHi >= 0) {
    const y0 = toY(0);
    ctx.beginPath(); ctx.moveTo(0, y0); ctx.lineTo(W, y0); ctx.stroke();
  }

  // Parabola
  ctx.strokeStyle = '#e94560';
  ctx.lineWidth = 2.5;
  ctx.beginPath();
  for (let px = 0; px <= W; px++) {
    const x = xMin + (px / W) * (xMax - xMin);
    const y = f(x);
    const sy = toY(y);
    px === 0 ? ctx.moveTo(px, sy) : ctx.lineTo(px, sy);
  }
  ctx.stroke();

  // Vertex
  ctx.fillStyle = '#ffd93d';
  ctx.beginPath();
  ctx.arc(toX(vx), toY(vy), 5, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#ffd93d';
  ctx.font = '11px monospace';
  ctx.fillText(`(${fmt(vx)}, ${fmt(vy)})`, toX(vx) + 8, toY(vy) - 8);

  // Roots
  if (D >= 0) {
    ctx.fillStyle = '#00d672';
    const x1 = (-b + Math.sqrt(D)) / (2 * a);
    const x2 = (-b - Math.sqrt(D)) / (2 * a);
    [x1, x2].forEach(rx => {
      ctx.beginPath();
      ctx.arc(toX(rx), toY(0), 4, 0, Math.PI * 2);
      ctx.fill();
    });
  }
}

function showError(msg) { $('#error').textContent = msg; $('#error').style.display = 'block'; $('#results').style.display='none'; $('#graph-box').style.display='none'; $('#steps').style.display='none'; }
function hideError() { $('#error').style.display = 'none'; }
function doClear() { $('#ca').value=''; $('#cb').value=''; $('#cc').value=''; $('#results').style.display='none'; $('#graph-box').style.display='none'; $('#steps').style.display='none'; hideError(); }

['ca','cb','cc'].forEach(id => {
  $('#'+id).addEventListener('keydown', e => { if (e.key === 'Enter') solve(); });
});

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="solve()">${t('solve')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;
