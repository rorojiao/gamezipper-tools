.note{background:var(--glass2);border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:12px;padding:14px 16px;margin-top:18px;text-align:left;font-size:.85rem;line-height:1.55;color:var(--text2)}
.note b{color:var(--text)}
</style>

<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "How much extra flooring should I buy for waste?", "acceptedAnswer": {"@type": "Answer", "text": "Add 5% for straight-laid rectangular rooms, 10% for diagonal patterns or rooms with lots of corners, and 15% for tile with intricate layouts or matching grout lines. Always round up to full boxes since opened boxes are hard to return."}}, {"@type": "Question", "name": "How do I calculate square feet for flooring?", "acceptedAnswer": {"@type": "Answer", "text": "Multiply the length by the width of each room in feet to get square feet, then sum every room and area. Subtract large built-ins, but keep the area under cabinets since flooring usually runs underneath."}}, {"@type": "Question", "name": "How many boxes of laminate or vinyl plank do I need?", "acceptedAnswer": {"@type": "Answer", "text": "Divide your total square footage (including waste) by the square-foot coverage printed on one box, then round up to the next whole box. A typical laminate box covers 18–24 sq ft, while vinyl plank boxes often cover 20–30 sq ft."}}, {"@type": "Question", "name": "Is my data stored?", "acceptedAnswer": {"@type": "Answer", "text": "No. Every calculation happens entirely in your browser. No room sizes, prices or measurements are ever sent to a server."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-form" id="form">
      <div>
        <label id="lbl-rooms"></label>
        <div class="rooms" id="rooms"></div>
        <div class="add-room" id="add-room">+ <span id="add-room-text"></span></div>
      </div>
      <div class="two-col">
        <div>
          <label id="lbl-waste"></label>
          <input type="number" id="waste" value="10" min="0" max="50" step="1">
        </div>
        <div>
          <label id="lbl-unit"></label>
          <select id="unit">
            <option value="ft" selected>ft (sq ft)</option>
            <option value="m">m (sq m)</option>
          </select>
        </div>
      </div>
      <div class="two-col">
        <div>
          <label id="lbl-coverage"></label>
          <input type="number" id="coverage" value="20" min="0.1" step="0.1">
        </div>
        <div>
          <label id="lbl-boxprice"></label>
          <input type="number" id="boxprice" value="45" min="0" step="0.5">
        </div>
      </div>
      <button class="gz-btn" onclick="calculate()" id="btn-calc"></button>
    </div>
    <div class="result-card" id="result" style="display:none">
      <div class="big" id="result-boxes"></div>
      <div class="label" id="result-label"></div>
      <div class="result-grid">
        <div class="result-item"><div class="val" id="result-area"></div><div class="lbl" id="result-area-label"></div></div>
        <div class="result-item"><div class="val" id="result-need"></div><div class="lbl" id="result-need-label"></div></div>
        <div class="result-item"><div class="val" id="result-extra"></div><div class="lbl" id="result-extra-label"></div></div>
        <div class="result-item"><div class="val" id="result-cost"></div><div class="lbl" id="result-cost-label"></div></div>
      </div>
      <div class="note" id="note"></div>
    </div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Flooring Calculator',
    toolDesc: 'Calculate how many boxes of laminate, vinyl plank, hardwood, tile or carpet you need for any room.',
    lblRooms: 'Room Dimensions (length × width)',
    addRoom: 'Add another room',
    lblWaste: 'Waste / Overage (%)',
    lblUnit: 'Measurement Unit',
    lblCoverage: 'Coverage per Box (sq ft)',
    lblBoxprice: 'Price per Box ($)',
    btnCalc: 'Calculate Flooring Needed',
    resultLabel: 'Boxes of Flooring to Buy',
    area: 'Total Floor Area',
    need: 'Area with Waste',
    extra: 'Extra Boxes (Waste)',
    cost: 'Estimated Material Cost',
    rm: 'Room', length:'Length', width:'Width',
    note: '💡 <b>Pro tip:</b> Always buy full boxes and keep 1 spare box for future repairs. Opened boxes usually cannot be returned. Diagonal installations and pattern-matching tile may need 15%+ waste.',
    step1: 'Measure the length and width of each room and add extra rooms as needed',
    step2: 'Set the waste percentage (5% straight lay, 10% diagonal, 15% pattern tile)',
    step3: 'Enter the coverage printed on one flooring box and the box price',
    step4: 'Click Calculate to see how many boxes to buy and the total cost',
  },
  zh: {
    toolTitle: '地板材料计算器',
    toolDesc: '计算任意房间需要多少箱强化地板、SPC 锁扣地板、实木地板、瓷砖或地毯。',
    lblRooms: '房间尺寸（长 × 宽）',
    addRoom: '添加另一个房间',
    lblWaste: '损耗 / 备用（%）',
    lblUnit: '计量单位',
    lblCoverage: '每箱覆盖面积（平方英尺）',
    lblBoxprice: '每箱价格（美元）',
    btnCalc: '计算所需地板',
    resultLabel: '需要购买的地板箱数',
    area: '地板总面积',
    need: '含损耗面积',
    extra: '备用箱数',
    cost: '预估材料费',
    rm: '房间', length:'长', width:'宽',
    note: '💡 <b>小贴士：</b>务必按整箱购买，并保留 1 箱备用以便日后修补。拆封的箱子通常无法退货。斜铺和需要拼花的瓷砖损耗可能需要 15% 以上。',
    step1: '测量每个房间的长和宽，可添加多个房间',
    step2: '设置损耗比例（直铺 5%、斜铺 10%、拼花瓷砖 15%）',
    step3: '填写地板包装上标注的每箱覆盖面积和每箱价格',
    step4: '点击「计算所需地板」查看需购买箱数和总价',
  }
});

const { $, t } = GZ;
const cur = '$';
let roomCount = 1;

function money(v){ return cur + v.toLocaleString(undefined,{maximumFractionDigits:2}); }

function renderRooms(){
  const wrap = $('#rooms');
  wrap.innerHTML = '';
  for(let i=0;i<roomCount;i++){
    const div = document.createElement('div');
    div.className = 'room-row';
    div.innerHTML = `
      <div><label style="font-size:.75rem">${t('rm')} ${i+1} · ${t('length')}</label><input type="number" class="rm-len" value="${i===0?12:10}" min="0" step="0.1"></div>
      <div><label style="font-size:.75rem">${t('rm')} ${i+1} · ${t('width')}</label><input type="number" class="rm-wid" value="${i===0?12:10}" min="0" step="0.1"></div>
      ${roomCount>1 ? `<button class="rm-btn" onclick="removeRoom(${i})" title="remove">✕</button>` : '<span></span>'}`;
    wrap.appendChild(div);
  }
}

function removeRoom(i){
  if(roomCount<=1) return;
  roomCount--;
  renderRooms();
  calculate();
}

function calculate(){
  const lens = [...document.querySelectorAll('.rm-len')].map(e=>Math.max(0,parseFloat(e.value)||0));
  const wids = [...document.querySelectorAll('.rm-wid')].map(e=>Math.max(0,parseFloat(e.value)||0));
  const waste = Math.max(0, parseFloat($('#waste').value)||0);
  const coverage = Math.max(0.01, parseFloat($('#coverage').value)||1);
  const boxprice = Math.max(0, parseFloat($('#boxprice').value)||0);
  const isM = $('#unit').value === 'm';

  let area = 0;
  for(let i=0;i<lens.length;i++) area += lens[i]*wids[i];

  const areaWithWaste = area * (1 + waste/100);
  const boxes = Math.ceil(areaWithWaste / coverage);
  const exactBoxes = area / coverage;
  const extraBoxes = boxes - Math.ceil(exactBoxes);
  const totalCost = boxes * boxprice;
  const unit = isM ? 'm²' : 'sq ft';

  $('#result').style.display = '';
  $('#result-boxes').textContent = boxes;
  $('#result-label').textContent = t('resultLabel');
  $('#result-area').textContent = area.toLocaleString(undefined,{maximumFractionDigits:1}) + ' ' + unit;
  $('#result-area-label').textContent = t('area');
  $('#result-need').textContent = areaWithWaste.toLocaleString(undefined,{maximumFractionDigits:1}) + ' ' + unit;
  $('#result-need-label').textContent = t('need');
  $('#result-extra').textContent = extraBoxes;
  $('#result-extra-label').textContent = t('extra');
  $('#result-cost').textContent = money(totalCost);
  $('#result-cost-label').textContent = t('cost');
  $('#note').innerHTML = t('note');
}

$('#add-room').addEventListener('click', ()=>{ roomCount++; renderRooms(); calculate(); });
$('#add-room-text').textContent = t('addRoom');
$('#btn-calc').textContent = t('btnCalc');
$('#unit').addEventListener('change', ()=>{
  const isM = $('#unit').value === 'm';
  $('#coverage').value = isM ? 2 : 20;
  calculate();
});
renderRooms();
calculate();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📐', href:'/calc/aspect-ratio.html', name:'Aspect Ratio'},
    {icon:'🏠', href:'/calc/prorated-rent-calculator.html', name:'Prorated Rent'},
    {icon:'🧱', href:'/calc/asphalt-calculator.html', name:'Asphalt Calc'},
    {icon:'🖼️', href:'/calc/image-file-size.html', name:'Image Size'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
