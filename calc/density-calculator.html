<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is the formula for density?", "acceptedAnswer": {"@type": "Answer", "text": "Density ρ = mass ÷ volume (ρ = m/V). Rearrangements: mass = ρ × V, and volume = m ÷ ρ. The SI unit of density is kg/m³ but g/cm³ is common for solids and liquids."}}, {"@type": "Question", "name": "What is the density of water?", "acceptedAnswer": {"@type": "Answer", "text": "Pure water has a density of about 1.00 g/cm³ (1000 kg/m³) at 4°C. Ice is less dense (0.917 g/cm³), which is why it floats. Seawater averages 1.025 g/cm³ due to dissolved salts."}}, {"@type": "Question", "name": "How do I convert g/cm³ to kg/m³?", "acceptedAnswer": {"@type": "Answer", "text": "Multiply by 1000: 1 g/cm³ = 1000 kg/m³. So iron at 7.87 g/cm³ equals 7870 kg/m³. The reverse conversion (kg/m³ to g/cm³) divides by 1000."}}, {"@type": "Question", "name": "Can I use this for gases and liquids?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. The same formula ρ = m/V applies to solids, liquids and gases. Gas densities are much lower (air ≈ 0.001225 g/cm³) and change with temperature and pressure."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>

  <div class="gz-tool-area">
    <div class="gz-d-grid">
      <div class="gz-d-field">
        <label><span id="lbl-rho"></span><span class="gz-mat-link"></span></label>
        <input type="number" id="rho" min="0" step="any" placeholder="—">
        <select id="rho-u">
          <option value="1">g/cm³</option>
          <option value="1000">kg/m³</option>
          <option value="1">g/mL</option>
          <option value="16.0185">lb/ft³</option>
        </select>
      </div>
      <div class="gz-d-field">
        <label><span id="lbl-m"></span></label>
        <input type="number" id="m" min="0" step="any" placeholder="—">
        <select id="m-u">
          <option value="1">g</option>
          <option value="1000">kg</option>
          <option value="0.001">mg</option>
          <option value="453.592">lb</option>
        </select>
      </div>
      <div class="gz-d-field">
        <label><span id="lbl-v"></span></label>
        <input type="number" id="v" min="0" step="any" placeholder="—">
        <select id="v-u">
          <option value="1">cm³</option>
          <option value="1">mL</option>
          <option value="1000">L</option>
          <option value="1e6">m³</option>
          <option value="16.3871">in³</option>
        </select>
      </div>
    </div>
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="gz-d-result" id="results" style="display:none">
      <div class="row"><span class="name" id="r-rho"></span><span class="val" id="out-rho"></span></div>
      <div class="row"><span class="name" id="r-m"></span><span class="val" id="out-m"></span></div>
      <div class="row"><span class="name" id="r-v"></span><span class="val" id="out-v"></span></div>
    </div>
    <div class="gz-materials" id="materials"></div>
    <div class="gz-formulas" id="formulas"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Density Calculator',
    toolDesc: 'Solve for density (ρ), mass or volume with the formula ρ = m/V. Enter any two values and instantly get the third. Supports g/cm³, kg/m³, g/mL, lb/ft³ plus common material densities — built for chemistry, physics and material science.',
    lblRho: 'Density (ρ)',
    lblM: 'Mass (m)',
    lblV: 'Volume (V)',
    rRho: 'Density',
    rM: 'Mass',
    rV: 'Volume',
    example: 'Water Example',
    clear: 'Clear',
    materials: 'Common densities (g/cm³): water 1.00 · ice 0.917 · aluminum 2.70 · iron 7.87 · copper 8.96 · gold 19.32 · mercury 13.53 · air 0.001225',
    formulas: 'Formulas: ρ = m/V · m = ρ × V · V = m/ρ',
    errInputs: 'Enter any two of density, mass and volume.',
    step1: 'Pick units for density, mass and volume',
    step2: 'Enter any two of the three values',
    step3: 'Leave the unknown field blank',
    step4: 'Read the calculated result with units',
  },
  zh: {
    toolTitle: '密度计算器',
    toolDesc: '用公式 ρ = m/V 求解密度、质量或体积。输入任意两项，即时算出第三项。支持 g/cm³、kg/m³、g/mL、lb/ft³，并附带常见材料密度 — 适用于化学、物理和材料科学。',
    lblRho: '密度 (ρ)',
    lblM: '质量 (m)',
    lblV: '体积 (V)',
    rRho: '密度',
    rM: '质量',
    rV: '体积',
    example: '水的示例',
    clear: '清空',
    materials: '常见密度 (g/cm³)：水 1.00 · 冰 0.917 · 铝 2.70 · 铁 7.87 · 铜 8.96 · 金 19.32 · 水银 13.53 · 空气 0.001225',
    formulas: '公式：ρ = m/V · m = ρ × V · V = m/ρ',
    errInputs: '请输入密度、质量、体积中的任意两项。',
    step1: '选择密度、质量、体积的单位',
    step2: '填写三项中的任意两项',
    step3: '未知项留空',
    step4: '查看带单位的计算结果',
  }
});

const { $, t } = GZ;

$('#lbl-rho').textContent = t('lblRho');
$('#lbl-m').textContent = t('lblM');
$('#lbl-v').textContent = t('lblV');
$('#r-rho').textContent = t('rRho');
$('#r-m').textContent = t('rM');
$('#r-v').textContent = t('rV');
$('#materials').textContent = t('materials');
$('#formulas').textContent = t('formulas');

function num(id) { const v = $('#' + id).value; return v === '' ? null : parseFloat(v); }
function fmt(n) {
  if (!isFinite(n)) return '—';
  const abs = Math.abs(n);
  if (abs !== 0 && (abs < 0.0001 || abs >= 1e7)) return n.toExponential(3);
  return n.toLocaleString(undefined, { maximumFractionDigits: 4 });
}

function calc() {
  // Convert everything to base units: density g/cm³, mass g, volume cm³
  let rho = num('rho'), m = num('m'), v = num('v');
  const rhoU = parseFloat($('#rho-u').value), mU = parseFloat($('#m-u').value), vU = parseFloat($('#v-u').value);
  const rhoB = rho !== null ? rho * rhoU : null;       // g/cm³
  const mB = m !== null ? m * mU : null;               // g
  const vB = v !== null ? v * vU : null;               // cm³
  const filled = [rhoB, mB, vB].filter(x => x !== null).length;
  if (filled < 2) { $('#results').style.display = 'none'; return; }
  if (rhoB === null && mB !== null && vB !== null && vB !== 0) { const r = mB / vB; rho = r / rhoU; }
  if (mB === null && rhoB !== null && vB !== null) { const mm = rhoB * vB; m = mm / mU; }
  if (vB === null && rhoB !== null && mB !== null && rhoB !== 0) { const vv = mB / rhoB; v = vv / vU; }
  $('#out-rho').textContent = rho !== null && isFinite(rho) ? fmt(rho) + ' ' + $('#rho-u').selectedOptions[0].textContent.trim() : '—';
  $('#out-m').textContent = m !== null && isFinite(m) ? fmt(m) + ' ' + $('#m-u').selectedOptions[0].textContent.trim() : '—';
  $('#out-v').textContent = v !== null && isFinite(v) ? fmt(v) + ' ' + $('#v-u').selectedOptions[0].textContent.trim() : '—';
  $('#results').style.display = 'block';
}

['rho', 'm', 'v', 'rho-u', 'm-u', 'v-u'].forEach(id => $('#' + id).addEventListener('input', calc));

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="$('#rho-u').value='1';$('#m-u').value='1';$('#v-u').value='1';$('#rho').value='1';$('#m').value='100';$('#v').value='';calc()">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="['rho','m','v'].forEach(id=>document.getElementById(id).value='');calc()">${t('clear')}</button>`;

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1', 'step2', 'step3', 'step4'],
  related: [
    { icon: '🎯', href: '/calc/projectile-motion-calculator.html', name: 'Projectile Motion' },
    { icon: '🔄', href: '/calc/newtons-second-law-calculator.html', name: 'Newton\'s 2nd Law' },
    { icon: '🪂', href: '/calc/free-fall-calculator.html', name: 'Free Fall' },
    { icon: '🧪', href: '/calc/molar-mass.html', name: 'Molar Mass' },
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
