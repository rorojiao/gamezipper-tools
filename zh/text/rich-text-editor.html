</style>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div id="rte-toolbar"></div>
    <div id="editor" contenteditable="true"></div>
    <div id="html-output">
      <div id="output-label"><span id="output-title"></span>
        <div style="display:flex;gap:6px">
          <div id="mode-tabs">
            <button class="active" onclick="switchOutputMode('html',this)">HTML</button>
            <button onclick="switchOutputMode('md',this)">Markdown</button>
          </div>
          <button class="gz-btn gz-btn-secondary" style="font-size:.75em;padding:4px 12px" onclick="copyOutput()">📋 Copy</button>
        </div>
      </div>
      <textarea id="output-area" readonly></textarea>
    </div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Rich Text Editor',
    toolDesc: 'Free online WYSIWYG rich text editor with formatting toolbar. Export as clean HTML or Markdown — no signup needed.',
    outputTitle: 'Output',
    step1: 'Type your content in the editor area above',
    step2: 'Use the toolbar to format text (bold, italic, headings, lists, etc.)',
    step3: 'Switch between HTML and Markdown output modes',
    step4: 'Copy the output to use in your project',
    step5: 'Insert links, images, and tables with toolbar buttons',
  },
  zh: {
    toolTitle: '富文本编辑器',
    toolDesc: '免费在线所见即所得富文本编辑器，支持格式工具栏。导出为 HTML 或 Markdown — 无需注册。',
    outputTitle: '输出',
    step1: '在编辑区域中输入内容',
    step2: '使用工具栏格式化文本（粗体、斜体、标题、列表等）',
    step3: '在 HTML 和 Markdown 输出模式间切换',
    step4: '复制输出内容到你的项目中使用',
    step5: '使用工具栏插入链接、图片和表格',
  }
});

const { $, copyText, t } = GZ;
let outputMode = 'html';
const editor = $('#editor');

const buttons = [
  {cmd:'bold',icon:'𝗕',title:'Bold'},
  {cmd:'italic',icon:'𝘐',title:'Italic'},
  {cmd:'underline',icon:'U̲',title:'Underline'},
  {cmd:'strikeThrough',icon:'S̶',title:'Strikethrough'},
  'sep',
  {cmd:'formatBlock',val:'H1',icon:'H1',title:'Heading 1'},
  {cmd:'formatBlock',val:'H2',icon:'H2',title:'Heading 2'},
  {cmd:'formatBlock',val:'H3',icon:'H3',title:'Heading 3'},
  {cmd:'formatBlock',val:'P',icon:'¶',title:'Paragraph'},
  'sep',
  {cmd:'insertUnorderedList',icon:'• List',title:'Bullet List'},
  {cmd:'insertOrderedList',icon:'1. List',title:'Numbered List'},
  'sep',
  {cmd:'justifyLeft',icon:'⬅',title:'Align Left'},
  {cmd:'justifyCenter',icon:'⬌',title:'Center'},
  {cmd:'justifyRight',icon:'➡',title:'Align Right'},
  'sep',
  {cmd:'createLink',icon:'🔗',title:'Insert Link',prompt:true},
  {cmd:'insertImage',icon:'🖼️',title:'Insert Image',prompt:true},
  {action:'table',icon:'📊',title:'Insert Table'},
  {cmd:'formatBlock',val:'BLOCKQUOTE',icon:'❝',title:'Blockquote'},
  'sep',
  {cmd:'undo',icon:'↩',title:'Undo'},
  {cmd:'redo',icon:'↪',title:'Redo'},
  {action:'clearFormat',icon:'🚫',title:'Clear Formatting'},
];

const toolbar = $('#rte-toolbar');
buttons.forEach(b => {
  if (b === 'sep') {
    const s = document.createElement('div');
    s.className = 'sep';
    toolbar.appendChild(s);
    return;
  }
  const btn = document.createElement('button');
  btn.innerHTML = b.icon;
  btn.title = b.title;
  btn.onclick = () => {
    if (b.action === 'table') {
      insertTable();
    } else if (b.action === 'clearFormat') {
      document.execCommand('removeFormat');
    } else if (b.prompt) {
      const url = prompt(b.title === 'Insert Link' ? 'Enter URL:' : 'Enter image URL:');
      if (url) document.execCommand(b.cmd, false, url);
    } else {
      document.execCommand(b.cmd, false, b.val || null);
    }
    updateOutput();
  };
  toolbar.appendChild(btn);
});

function insertTable() {
  const rows = Math.max(1, parseInt(prompt('Rows:', '3')) || 3);
  const cols = Math.max(1, parseInt(prompt('Columns:', '3')) || 3);
  let html = '<table style="border-collapse:collapse;width:100%;margin:8px 0">';
  for (let r = 0; r < rows; r++) {
    html += '<tr>';
    for (let c = 0; c < cols; c++) {
      const tag = r === 0 ? 'th' : 'td';
      html += `<${tag} style="border:1px solid #ddd;padding:8px">${r === 0 ? 'Header' : 'Cell'}</${tag}>`;
    }
    html += '</tr>';
  }
  html += '</table><p><br></p>';
  document.execCommand('insertHTML', false, html);
  updateOutput();
}

function htmlToMarkdown(html) {
  let md = html;
  md = md.replace(/<h1[^>]*>(.*?)<\/h1>/gi, '# $1\n\n');
  md = md.replace(/<h2[^>]*>(.*?)<\/h2>/gi, '## $1\n\n');
  md = md.replace(/<h3[^>]*>(.*?)<\/h3>/gi, '### $1\n\n');
  md = md.replace(/<strong>(.*?)<\/strong>/gi, '**$1**');
  md = md.replace(/<b>(.*?)<\/b>/gi, '**$1**');
  md = md.replace(/<em>(.*?)<\/em>/gi, '*$1*');
  md = md.replace(/<i>(.*?)<\/i>/gi, '*$1*');
  md = md.replace(/<u>(.*?)<\/u>/gi, '<u>$1</u>');
  md = md.replace(/<strike>(.*?)<\/strike>/gi, '~~$1~~');
  md = md.replace(/<s>(.*?)<\/s>/gi, '~~$1~~');
  md = md.replace(/<a href="(.*?)"[^>]*>(.*?)<\/a>/gi, '[$2]($1)');
  md = md.replace(/<img[^>]*src="(.*?)"[^>]*alt="(.*?)"[^>]*\/?>/gi, '![$2]($1)');
  md = md.replace(/<img[^>]*src="(.*?)"[^>]*\/?>/gi, '![]($1)');
  md = md.replace(/<li[^>]*>(.*?)<\/li>/gi, '- $1\n');
  md = md.replace(/<\/?[uo]l[^>]*>/gi, '\n');
  md = md.replace(/<blockquote[^>]*>(.*?)<\/blockquote>/gi, '> $1\n\n');
  md = md.replace(/<br\s*\/?>/gi, '\n');
  md = md.replace(/<\/p>/gi, '\n\n');
  md = md.replace(/<p[^>]*>/gi, '');
  md = md.replace(/<[^>]+>/g, '');
  md = md.replace(/&amp;/g, '&').replace(/&lt;/g, '<').replace(/&gt;/g, '>').replace(/&quot;/g, '"').replace(/&#39;/g, "'");
  md = md.replace(/\n{3,}/g, '\n\n');
  return md.trim();
}

function updateOutput() {
  const html = editor.innerHTML;
  if (outputMode === 'html') {
    $('#output-area').value = html;
  } else {
    $('#output-area').value = htmlToMarkdown(html);
  }
}

function switchOutputMode(mode, btn) {
  outputMode = mode;
  document.querySelectorAll('#mode-tabs button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  updateOutput();
}

function copyOutput() { copyText($('#output-area').value); }

editor.addEventListener('input', updateOutput);

// Load example content
editor.innerHTML = `<h1>Welcome to Rich Text Editor ✨</h1>
<p>This is a <strong>free online WYSIWYG editor</strong> that works entirely in your browser.</p>
<h2>Features</h2>
<ul>
  <li><strong>Bold</strong>, <em>italic</em>, and <u>underline</u> formatting</li>
  <li>Multiple heading levels (H1, H2, H3)</li>
  <li>Bullet and numbered lists</li>
  <li>Insert links, images, and tables</li>
  <li>Export as HTML or Markdown</li>
</ul>
<blockquote>This tool processes everything locally — your data never leaves your browser.</blockquote>
<p>Start editing above! ↑</p>`;
updateOutput();

$('#output-title').textContent = t('outputTitle');

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4','step5'],
  related: [
    {icon:'📄', href:'/dev/markdown-to-html.html', name:'Markdown to HTML'},
    {icon:'📑', href:'/dev/html-to-markdown.html', name:'HTML to Markdown'},
    {icon:'🌐', href:'/text/html-playground.html', name:'HTML Playground'},
    {icon:'📝', href:'/text/word-counter.html', name:'Word Counter'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
