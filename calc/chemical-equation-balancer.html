// Parse a compound formula into element->count map
function parseFormula(formula) {
  const counts = {};
  let i = 0;
  function parseGroup(depth) {
    const local = {};
    while (i < formula.length) {
      const ch = formula[i];
      if (ch === '(') { i++; const sub = parseGroup(depth+1); mergeInto(local, sub); }
      else if (ch === ')') { i++; break; }
      else if (/[A-Z]/.test(ch)) {
        let elem = ch; i++;
        if (i < formula.length && /[a-z]/.test(formula[i])) { elem += formula[i]; i++; }
        let numStr = '';
        while (i < formula.length && /[0-9]/.test(formula[i])) { numStr += formula[i]; i++; }
        const num = numStr ? parseInt(numStr) : 1;
        local[elem] = (local[elem] || 0) + num;
      } else { i++; }
    }
    // Apply multiplier after closing paren
    if (depth > 0) {
      let numStr = '';
      while (i < formula.length && /[0-9]/.test(formula[i])) { numStr += formula[i]; i++; }
      if (numStr) { const m = parseInt(numStr); for (const k in local) local[k] *= m; }
    }
    return local;
  }
  function mergeInto(a, b) { for (const k in b) a[k] = (a[k] || 0) + b[k]; }
  const result = parseGroup(0);
  return result;
}

function gcd(a, b) { a = Math.abs(a); b = Math.abs(b); while (b) { [a, b] = [b, a % b]; } return a || 1; }

function balance() {
  const input = $('#eqInput').value.trim().replace(/\s+/g, '').replace(/→|->|⟶/g, '=').replace(/·|\./g, '');
  $('#status').innerHTML = '';
  $('#balanced').innerHTML = '';
  if (!input || !input.includes('=')) { $('#status').innerHTML = `<span style="color:var(--text2)">${t('enterEq')}</span>`; return; }

  const [left, right] = input.split('=');
  const reactants = left.split('+').filter(s => s);
  const products = right.split('+').filter(s => s);
  if (!reactants.length || !products.length) { $('#status').innerHTML = `<span style="color:var(--gz-accent)">${t('error')}</span>`; return; }

  try {
    const compounds = [...reactants, ...products];
    const matrices = compounds.map(parseFormula);

    // Collect all elements
    const elementSet = new Set();
    matrices.forEach(m => Object.keys(m).forEach(e => elementSet.add(e)));
    const elements = [...elementSet].sort();

    // Build coefficient matrix: rows=elements, cols=compounds. Reactants positive, products negative.
    const rows = elements.length, cols = compounds.length;
    const A = [];
    for (let r = 0; r < rows; r++) {
      A.push([]);
      for (let c = 0; c < cols; c++) {
        const count = matrices[c][elements[r]] || 0;
        A[r].push(c < reactants.length ? count : -count);
      }
    }

    // Solve homogeneous system Ax = 0 using Gauss elimination with fractions
    // Represent as integer fractions using BigInt-free rational (enough for typical equations)
    // We'll use fraction-free Gaussian elimination to find null space
    const coeffs = solveNullSpace(A, rows, cols);
    if (!coeffs) throw new Error('nosol');

    // Build display
    let html = '';
    reactants.forEach((f, idx) => {
      const coef = coeffs[idx];
      if (coef > 1) html += `<span class="coef">${coef}</span>`;
      html += formulaHTML(f);
      if (idx < reactants.length - 1) html += ' + ';
    });
    html += ` <span class="arrow">→</span> `;
    products.forEach((f, idx) => {
      const coef = coeffs[reactants.length + idx];
      if (coef > 1) html += `<span class="coef">${coef}</span>`;
      html += formulaHTML(f);
      if (idx < products.length - 1) html += ' + ';
    });
    $('#balanced').innerHTML = html;

  } catch (e) {
    $('#status').innerHTML = `<span style="color:var(--gz-accent)">${t('error')}</span>`;
  }
}

function formulaHTML(f) {
  return f.replace(/(\d+)/g, '<sub>$1</sub>');
}

// Find integer null-space vector of matrix A (rows x cols)
function solveNullSpace(A, rows, cols) {
  // Augmented Gaussian elimination using exact integer arithmetic
  // Copy matrix
  let M = A.map(r => [...r]);
  let pivotCols = [];
  let pr = 0;

  for (let pc = 0; pc < cols && pr < rows; pc++) {
    // Find pivot
    let pivot = -1;
    for (let r = pr; r < rows; r++) { if (M[r][pc] !== 0) { pivot = r; break; } }
    if (pivot === -1) continue;
    [M[pr], M[pivot]] = [M[pivot], M[pr]];
    pivotCols.push(pc);
    // Eliminate
    for (let r = 0; r < rows; r++) {
      if (r === pr) continue;
      if (M[r][pc] !== 0) {
        const factor = M[r][pc];
        const pivotVal = M[pr][pc];
        for (let c = 0; c < cols; c++) {
          M[r][c] = M[r][c] * pivotVal - M[pr][c] * factor;
        }
      }
    }
    pr++;
  }

  // Find free variable
  const freeCols = [];
  for (let c = 0; c < cols; c++) if (!pivotCols.includes(c)) freeCols.push(c);
  if (freeCols.length === 0) return null; // Only trivial solution

  // Set first free variable = 1, back-substitute
  const fc = freeCols[0];
  let x = new Array(cols).fill(0);
  x[fc] = 1;

  // For each pivot row, solve for pivot variable
  for (let r = pivotCols.length - 1; r >= 0; r--) {
    const pcol = pivotCols[r];
    let sum = 0;
    for (let c = 0; c < cols; c++) {
      if (c !== pcol) sum += M[r][c] * x[c];
    }
    if (M[r][pcol] === 0) return null;
    x[pcol] = -sum / M[r][pcol];
  }

  // Convert to integers
  // Find LCM of denominators
  let denominators = x.map(v => {
    if (Number.isInteger(v)) return 1;
    const str = v.toString();
    const dotIdx = str.indexOf('.');
    if (dotIdx === -1) return 1;
    return Math.pow(10, str.length - dotIdx - 1);
  });
  let lcmVal = 1;
  denominators.forEach(d => { lcmVal = lcmVal * d / gcd(lcmVal, d); });

  x = x.map(v => Math.round(v * lcmVal));

  // Make all positive and reduce by GCD
  if (x.some(v => v < 0)) {
    const negCount = x.filter(v => v < 0).length;
    if (negCount > x.length / 2) x = x.map(v => -v);
    else if (x.filter(v => v < 0).length === x.filter(v => v > 0).length) {
      // Check: should all be same sign ideally
      if (x[0] < 0) x = x.map(v => -v);
    }
  }
  // If still has mixed signs, flip
  if (x.some(v => v < 0) && x.some(v => v > 0)) {
    x = x.map(v => Math.abs(v));
  }
  const g = x.reduce((a, b) => gcd(a, b));
  x = x.map(v => v / g);

  // Validate: all elements must balance
  for (let r = 0; r < rows; r++) {
    let s = 0;
    for (let c = 0; c < cols; c++) s += A[r][c] * x[c];
    if (Math.abs(s) > 0.0001) return null;
  }
  if (x.some(v => v <= 0)) return null;
  return x;
}
