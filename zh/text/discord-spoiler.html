<script>
GZI18n.register({
  en: {
    toolTitle: 'Discord Spoiler Text Generator',
    toolDesc: 'Wrap any text in ||spoiler tags|| so it appears as a blacked-out bar on Discord. Generate single-word, sentence, and multi-line spoilers — copy & paste instantly.',

  zh: {

    toolDesc: '将任意文字用 ||剧透标签|| 包裹，在 Discord 中显示为黑色遮挡条。支持单词、整句和多行剧透 — 一键复制粘贴。',
    lblIn: '输入或粘贴你的文字',
    lblOut: '剧透结果（点击复制）',
    clear: '清空',
    copy: '复制',
    copied: '✓ 已复制！',
    sampleText: '凶手是管家！',
    wordLabel: '每个单词单独剧透',
    lineLabel: '整段剧透',
    eachLineLabel: '每行单独剧透',
    wordModeLabel: '首单词剧透',
    previewLabel: 'Discord 预览（点击查看）',
    step1: '输入或粘贴你想隐藏的文字',
    step2: '在输出区浏览各种剧透模式',
    step3: '点击所需样式旁的「复制」按钮',
    step4: '粘贴到 Discord 消息中 — 它会显示为黑色遮挡条',
  }
});

const { $, copyText, t } = GZ;

function spoil(str){ return '||' + str + '||'; }

function render(){
  const input = $('#input').value || t('sampleText');
  const trimmed = input.trim();
  const styles = [];
  // whole input
  styles.push({label: t('lineLabel'), result: spoil(trimmed)});
  // each word
  styles.push({label: t('wordLabel'), result: trimmed.split(/\s+/).map(spoil).join(' ')});
  // each line
  if(trimmed.includes('\n')){
    styles.push({label: t('eachLineLabel'), result: trimmed.split('\n').map(spoil).join('\n')});
  }
  // first word only
  const parts = trimmed.split(/(\s+)/);
  if(parts.length > 1){
    let firstWordIdx = parts.findIndex(p => /\S/.test(p));
    if(firstWordIdx >= 0){
      const arr = parts.slice();
      arr[firstWordIdx] = spoil(arr[firstWordIdx]);
      styles.push({label: t('wordModeLabel'), result: arr.join('')});
    }
  }
  let html = `<div class="tip"><strong>${t('previewLabel')}</strong></div>`;
  html += `<div class="preview-bar"><code>${escapeHtml(spoil(trimmed))}</code></div>`;
  for(const s of styles){
    html += `<div class="result-box"><div class="result-label">${escapeHtml(s.label)}</div><div class="result-text">${escapeHtml(s.result)}</div><button class="gz-btn gz-btn-tool" style="margin-top:8px" data-text="${escapeAttr(s.result)}">${t('copy')}</button></div>`;
  }
  $('#output').innerHTML = html;
  $('#output').querySelectorAll('button[data-text]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      copyText(btn.dataset.text);
      const orig = btn.textContent;
      btn.textContent = t('copied');
      setTimeout(()=>{btn.textContent = orig;}, 1200);
    });
  });
}

function escapeHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function escapeAttr(s){return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

$('#input').addEventListener('input', render);

$('#toolbar').innerHTML = `<button class="gz-btn" id="btn-clear">${t('clear')}</button>`;
$('#btn-clear').addEventListener('click', ()=>{$('#input').value='';render();$('#input').focus();});

render();

GZ.renderToolPage({

});
