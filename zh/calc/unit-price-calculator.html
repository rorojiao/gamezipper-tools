<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"How do I calculate unit price?","acceptedAnswer":{"@type":"Answer","text":"Divide the total price by the total quantity. For example, if a 500g bag of rice costs $4.00, the unit price is $4.00 ÷ 500 = $0.008 per gram, or $0.80 per 100g."}},{"@type":"Question","name":"Why should I compare unit prices?","acceptedAnswer":{"@type":"Answer","text":"Unit prices let you compare products of different sizes and brands fairly. A larger package is not always cheaper per unit — the unit price reveals the true best value."}},{"@type":"Question","name":"What units are supported?","acceptedAnswer":{"@type":"Answer","text":"The calculator supports grams, kilograms, milliliters, liters, ounces, pounds, pieces, items, rolls, sheets and more. All items using the same unit type are compared side by side."}},{"@type":"Question","name":"Is my shopping data private?","acceptedAnswer":{"@type":"Answer","text":"Yes. All calculations happen entirely in your browser. No prices or product data are sent to any server."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">

  <div class="gz-tool-area">

    <div id="items"></div>

  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Unit Price Calculator',
    toolDesc: 'Compare product prices per unit to find the best deal. Enter price and quantity for each item — see the cheapest option highlighted instantly. Free, browser-based.',
    itemName: 'Product name',
    price: 'Price',
    quantity: 'Qty',
    unit: 'Unit',
    unitPrice: 'Unit Price',
    addRow: '+ Add item',
    bestDeal: '🏆 Best deal',
    currency: 'Currency',
    step1: 'Enter the product name (optional) for each item',
    step2: 'Input the price and quantity, then select a unit',
    step3: 'The cheapest unit price is highlighted in green',
    step4: 'Add more rows to compare as many products as you like',
  },
  zh: {
    toolTitle: '单价计算器',
    toolDesc: '比较产品单价，找到最划算的选择。输入每件商品的价格和数量 — 最便宜的选项会自动高亮。免费、浏览器本地运行。',
    itemName: '商品名称',
    price: '价格',
    quantity: '数量',
    unit: '单位',
    unitPrice: '单价',
    addRow: '+ 添加商品',
    bestDeal: '🏆 最划算',
    currency: '货币',
    step1: '为每件商品输入名称（可选）',
    step2: '输入价格和数量，然后选择单位',
    step3: '最低单价会以绿色高亮显示',
    step4: '添加更多行，比较任意数量的商品',
  }
});

let currency = '$';
let rows = [
  {name: '', price: '', qty: '', unit: 'g'},
  {name: '', price: '', qty: '', unit: 'g'},
];
const { $, t } = GZ;

const UNITS = [
  {v:'g',label_en:'grams (g)',label_zh:'克 (g)'},
  {v:'kg',label_en:'kilograms (kg)',label_zh:'千克 (kg)'},
  {v:'mg',label_en:'milligrams (mg)',label_zh:'毫克 (mg)'},
  {v:'ml',label_en:'milliliters (ml)',label_zh:'毫升 (ml)'},
  {v:'l',label_en:'liters (L)',label_zh:'升 (L)'},
  {v:'oz',label_en:'ounces (oz)',label_zh:'盎司 (oz)'},
  {v:'lb',label_en:'pounds (lb)',label_zh:'磅 (lb)'},
  {v:'pcs',label_en:'pieces',label_zh:'个'},
  {v:'roll',label_en:'rolls',label_zh:'卷'},
  {v:'sheet',label_en:'sheets',label_zh:'张'},
  {v:'box',label_en:'boxes',label_zh:'盒'},
  {v:'pack',label_en:'packs',label_zh:'包'},
];

const CONV = {mg:0.001, g:1, kg:1000, ml:1, l:1000, oz:28.3495, lb:453.592, pcs:1, roll:1, sheet:1, box:1, pack:1};
const isWeight = u => ['mg','g','kg','oz','lb'].includes(u);
const isVolume = u => ['ml','l'].includes(u);
const isCount = u => !isWeight(u) && !isVolume(u);

function unitLabel(u) {
  const lang = GZI18n.getLang ? GZI18n.getLang() : 'en';
  const found = UNITS.find(x => x.v === u);
  if (!found) return u;
  return lang === 'zh' ? found.label_zh : found.label_en;
}

function toBase(qty, unit) {
  const f = CONV[unit] || 1;
  return qty * f;
}

function canCompare(u1, u2) {
  if (isWeight(u1) && isWeight(u2)) return true;
  if (isVolume(u1) && isVolume(u2)) return true;
  if (isCount(u1) && isCount(u2) && u1 === u2) return true;
  return u1 === u2;
}

function calc() {
  const items = rows.map(r => {
    const p = parseFloat(r.price);
    const q = parseFloat(r.qty);
    if (isNaN(p) || isNaN(q) || q <= 0 || p < 0) return null;
    return {...r, unitPrice: p / toBase(q, r.unit), base: toBase(q, r.unit)};
  });

  // Find the common comparable group
  let bestIdx = -1;
  let bestPrice = Infinity;
  const firstValid = items.findIndex(x => x !== null);
  if (firstValid >= 0) {
    const refUnit = items[firstValid].unit;
    items.forEach((item, i) => {
      if (item && canCompare(refUnit, item.unit) && item.unitPrice < bestPrice) {
        bestPrice = item.unitPrice;
        bestIdx = i;
      }
    });
  }

  // Render results
  const resultDivs = document.querySelectorAll('.up-result');
  items.forEach((item, i) => {
    const el = resultDivs[i];
    if (!el) return;
    if (!item) { el.textContent = '—'; el.className = 'up-result'; return; }
    const per = isWeight(item.unit) ? '/ 100g' : isVolume(item.unit) ? '/ 100ml' : '/ ' + unitLabel(item.unit);
    const pricePer100 = isWeight(item.unit) || isVolume(item.unit) ? item.unitPrice * 100 : item.unitPrice;
    el.textContent = currency + pricePer100.toFixed(4) + per;
    el.className = 'up-result' + (i === bestIdx ? ' up-best' : '');
  });

  $('#status').innerHTML = bestIdx >= 0 ? `<span style="color:var(--gz-success)">${t('bestDeal')}: ${currency}${bestPrice.toFixed(6)}</span>` : '';
}

function renderRows() {
  const html = rows.map((r, i) => `
    <div class="up-row">
      <input type="text" placeholder="${t('itemName')}" value="${r.name}" oninput="rows[${i}].name=this.value">
      <input type="number" placeholder="${t('price')}" step="0.01" value="${r.price}" oninput="rows[${i}].price=this.value;calc()">
      <input type="number" placeholder="${t('quantity')}" step="0.01" value="${r.qty}" oninput="rows[${i}].qty=this.value;calc()">
      <select onchange="rows[${i}].unit=this.value;calc()">
        ${UNITS.map(u => `<option value="${u.v}" ${u.v===r.unit?'selected':''}>${unitLabel(u.v)}</option>`).join('')}
      </select>
      <div class="up-result">—</div>
      <div class="up-del" onclick="delRow(${i})">✕</div>
    </div>
  `).join('');
  $('#items').innerHTML = html;
  calc();
}

function addRow() {
  rows.push({name:'', price:'', qty:'', unit: rows[rows.length-1]?.unit || 'g'});
  renderRows();
}

function delRow(i) {
  if (rows.length <= 2) return;
  rows.splice(i, 1);
  renderRows();
}

renderRows();

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="addRow()">${t('addRow')}</button>
  <label style="font-size:.85em;display:inline-flex;align-items:center;gap:4px">${t('currency')}: <input type="text" value="$" style="width:30px;text-align:center" onchange="currency=this.value||'$';calc()"></label>`;

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'💰', href:'/calc/tip-calculator.html', name:'Tip Calculator'},
    {icon:'🏷️', href:'/calc/discount-calculator.html', name:'Discount Calculator'},
    {icon:'📊', href:'/calc/percentage-calculator.html', name:'Percentage Calc'},
    {icon:'🧮', href:'/convert/unit.html', name:'Unit Converter'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
