<script>
GZI18n.register({
  en: {
    toolTitle: 'Free Poster Maker',
    toolDesc: 'Design eye-catching posters online for free. Add a title, subtitle and body text — choose colors, fonts and layouts. Download a print-ready PNG. No signup, no watermark.',
    download: 'Download PNG',
    lblTitle: 'Title', lblSubtitle: 'Subtitle', lblBody: 'Body Text', lblFooter: 'Footer / Website',
    lblTheme: 'Color Theme', lblLayout: 'Layout', lblEmoji: 'Emoji / Symbol',
    step1: 'Enter your poster title, subtitle and body text',
    step2: 'Choose a color theme and layout style',
    step3: 'Add an emoji or symbol for visual impact',
    step4: 'Click Download PNG to save your poster',
  },
  zh: {
    toolTitle: '免费海报制作工具',
    toolDesc: '免费在线设计吸睛海报。添加标题、副标题和正文 — 选择颜色、字体和布局。下载可打印的 PNG，无水印、无需注册。',
    download: '下载 PNG',
    lblTitle: '标题', lblSubtitle: '副标题', lblBody: '正文', lblFooter: '页脚 / 网址',
    lblTheme: '配色主题', lblLayout: '布局', lblEmoji: '表情符号',
    step1: '输入海报标题、副标题和正文内容',
    step2: '选择配色主题和布局风格',
    step3: '添加表情符号增加视觉冲击力',
    step4: '点击「下载 PNG」保存海报',
  }
});

const { $, t } = GZ;

const themes={
  vibrant:{bg:'#0d9488',accent:'#fbbf24',text:'#ffffff',shape:'#115e59'},
  sunset:{bg:'#ea580c',accent:'#fef3c7',text:'#ffffff',shape:'#9a3412'},
  ocean:{bg:'#1e40af',accent:'#60a5fa',text:'#ffffff',shape:'#1e3a8a'},
  forest:{bg:'#166534',accent:'#fde047',text:'#ffffff',shape:'#14532d'},
  royal:{bg:'#6b21a8',accent:'#e9d5ff',text:'#ffffff',shape:'#581c87'},
  dark:{bg:'#0a0a1a',accent:'#4ecdc4',text:'#ffffff',shape:'#1a1a2e'},
  minimal:{bg:'#f8fafc',accent:'#0f172a',text:'#1e293b',shape:'#e2e8f0'},
  fire:{bg:'#dc2626',accent:'#fef3c7',text:'#ffffff',shape:'#7f1d1d'},
};

function wrapLines(ctx,text,maxW){
  const words=text.split(' ');let line='';const lines=[];
  for(const w of words){const test=line?line+' '+w:w;if(ctx.measureText(test).width>maxW&&line){lines.push(line);line=w}else line=test}
  if(line)lines.push(line);
  return lines;
}

function render(){
  const c=$('#canvas'),ctx=c.getContext('2d');
  const W=c.width,H=c.height;
  const th=themes[$('#theme').value];
  const layout=$('#layout').value;
  const title=$('#pTitle').value||'Title';
  const subtitle=$('#pSubtitle').value;
  const body=$('#pBody').value;
  const footer=$('#pFooter').value;
  const emoji=$('#emoji').value;

  // Background
  const grad=ctx.createLinearGradient(0,0,W,H);
  grad.addColorStop(0,th.shape);
  grad.addColorStop(0.5,th.bg);
  grad.addColorStop(1,th.shape);
  ctx.fillStyle=grad;
  ctx.fillRect(0,0,W,H);

  // Decorative shapes
  ctx.fillStyle=th.accent;
  ctx.globalAlpha=0.1;
  ctx.beginPath();ctx.arc(W*0.85,H*0.15,200,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(W*0.1,H*0.9,250,0,Math.PI*2);ctx.fill();
  ctx.globalAlpha=1;

  ctx.textAlign='center';ctx.textBaseline='middle';

  // Determine content center
  let cy=layout==='top'?H*0.22:layout==='bottom'?H*0.72:H/2;

  // Emoji
  let y=cy-180;
  if(emoji){
    ctx.font='100px sans-serif';
    ctx.fillText(emoji,W/2,y);
    y+=90;
  }

  // Accent bar
  ctx.fillStyle=th.accent;
  ctx.fillRect(W/2-80,y-50,160,6);
  y+=10;

  // Title
  ctx.fillStyle=th.text;
  let fs=80;
  ctx.font=`900 ${fs}px Arial Black, sans-serif`;
  while(ctx.measureText(title).width>W*0.82&&fs>32){fs-=2;ctx.font=`900 ${fs}px Arial Black, sans-serif`}
  const titleLines=wrapLines(ctx,title,W*0.82);
  titleLines.forEach((ln,i)=>{ctx.fillText(ln,W/2,y+i*fs*1.05);});
  y+=titleLines.length*fs*1.05+20;

  // Subtitle
  if(subtitle){
    ctx.font=`300 36px Georgia, serif`;
    ctx.fillStyle=th.accent;
    const subLines=wrapLines(ctx,subtitle,W*0.78);
    subLines.forEach((ln,i)=>ctx.fillText(ln,W/2,y+i*42));
    y+=subLines.length*42+25;
  }

  // Body
  if(body){
    ctx.font=`400 26px Verdana, sans-serif`;
    ctx.fillStyle=th.text;
    ctx.globalAlpha=0.85;
    const bodyLines=wrapLines(ctx,body,W*0.72);
    bodyLines.forEach((ln,i)=>ctx.fillText(ln,W/2,y+i*34));
    ctx.globalAlpha=1;
    y+=bodyLines.length*34+30;
  }

  // Footer
  if(footer){
    ctx.font=`700 24px Verdana, sans-serif`;
    ctx.fillStyle=th.accent;
    ctx.fillText(footer,W/2,H-60);
  }
}

function downloadPNG(){
  const link=document.createElement('a');
  const name=($('#pTitle').value||'poster').replace(/[^a-zA-Z0-9]/g,'_').toLowerCase()||'poster';
  link.download=name+'-poster.png';
  link.href=$('#canvas').toDataURL('image/png');
  link.click();
}

$('#lbl-title').textContent=t('lblTitle');
$('#lbl-subtitle').textContent=t('lblSubtitle');
$('#lbl-body').textContent=t('lblBody');
$('#lbl-footer').textContent=t('lblFooter');
$('#lbl-theme').textContent=t('lblTheme');
$('#lbl-layout').textContent=t('lblLayout');
$('#lbl-emoji').textContent=t('lblEmoji');

['pTitle','pSubtitle','pBody','pFooter','emoji'].forEach(id=>$('#'+id).addEventListener('input',render));
$('#theme').addEventListener('change',render);
$('#layout').addEventListener('change',render);

render();

$('#toolbar').innerHTML=`
  <button class="gz-btn" onclick="downloadPNG()">${t('download')}</button>`;

GZ.renderToolPage({
  category: 'image',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],

    {icon:'🎫', href:'/image/flyer-maker.html', name:'Flyer Maker'},
    {icon:'🏆', href:'/image/certificate-generator.html', name:'Certificate Generator'},
    {icon:'📊', href:'/fun/gantt-chart.html', name:'Gantt Chart Maker'},
  ]
});
</script>
