<script>
GZI18n.register({
  en: {
    toolTitle: 'Cursive Text Generator',
    toolDesc: 'Convert your text into beautiful cursive and script styles. Copy and paste fancy cursive text for social media, bios, and messages.',
    input: 'Type or paste your text',
    clickToCopy: 'Click to copy',
    step1: 'Type or paste the text you want to convert',
    step2: 'Browse the generated cursive styles below',
    step3: 'Click on any style to copy it to your clipboard',
    step4: 'Paste the cursive text wherever you want',
    styles: [
      {name:'Bold Script',id:'boldScript'},
      {name:'Math Script Bold',id:'mathBoldScript'},
      {name:'Math Script',id:'mathScript'},
      {name:'Bold Fraktur',id:'boldFraktur'},
      {name:'Fraktur',id:'fraktur'},
      {name:'Monospace',id:'monospace'},
      {name:'Double-Struck',id:'doubleStruck'},
      {name:'Sans Bold Italic',id:'sansBoldItalic'},
    ],
  },
  zh: {
    toolTitle: '草书文字生成器',
    toolDesc: '将文字转换为优美的草书和手写风格。复制粘贴华丽的草书文字，用于社交媒体、个人简介和消息。',
    input: '输入或粘贴您的文字',
    clickToCopy: '点击复制',
    step1: '输入或粘贴要转换的文字',
    step2: '浏览下方生成的草书样式',
    step3: '点击任意样式复制到剪贴板',
    step4: '将草书文字粘贴到任何地方',
    styles: [
      {name:'粗体手写',id:'boldScript'},
      {name:'数学粗手写体',id:'mathBoldScript'},
      {name:'数学手写体',id:'mathScript'},
      {name:'粗哥特体',id:'boldFraktur'},
      {name:'哥特体',id:'fraktur'},
      {name:'等宽字体',id:'monospace'},
      {name:'双线体',id:'doubleStruck'},
      {name:'无衬线粗斜体',id:'sansBoldItalic'},
    ],
  }
});

const { $, copyText, t } = GZ;

$('#input').placeholder = t('input');

const styleMap = {
  boldScript: { upper: 0x1D4D0, lower: 0x1D4EA },
  mathBoldScript: { upper: 0x1D4D0, lower: 0x1D4EA },
  mathScript: { upper: 0x1D49C, lower: 0x1D4B6 },
  boldFraktur: { upper: 0x1D56C, lower: 0x1D586 },
  fraktur: { upper: 0x1D504, lower: 0x1D51E },
  monospace: { upper: 0x1D670, lower: 0x1D68A },
  doubleStruck: { upper: 0x1D538, lower: 0x1D552 },
  sansBoldItalic: { upper: 0x1D63C, lower: 0x1D656 },
};

function convertChar(ch, style) {
  const m = styleMap[style];
  if (!m) return ch;
  const code = ch.charCodeAt(0);
  if (code >= 65 && code <= 90) return String.fromCodePoint(m.upper + (code - 65));
  if (code >= 97 && code <= 122) return String.fromCodePoint(m.lower + (code - 97));
  return ch;
}

function convertText(text, style) {
  return [...text].map(ch => convertChar(ch, style)).join('');
}

function updateResults() {
  const text = $('#input').value;
  const results = $('#results');
  if (!text) { results.innerHTML = ''; return; }
  const styles = t('styles');
  results.innerHTML = styles.map(s => {
    const converted = convertText(text, s.id);
    return `<div class="result-box" onclick="copyText(this.querySelector('.style-text').textContent)">
      <div class="style-name">${s.name}</div>
      <div class="style-text">${converted.replace(/</g,'&lt;')}</div>
      <div class="copy-hint">${t('clickToCopy')}</div>
    </div>`;
  }).join('');
}

$('#input').addEventListener('input', updateResults);

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [

    {icon:'🎨', href:'/text/3d-text.html', name:'3D Text'},
    {icon:'🔤', href:'/text/case-converter.html', name:'Case Converter'},
  ]
});
</script>
