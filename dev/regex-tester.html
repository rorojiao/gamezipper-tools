<script>
GZI18n.register({
  en: {
    toolTitle: 'Regex Tester & Debugger',
    toolDesc: 'Test and debug JavaScript regular expressions with live match highlighting, capture groups, flags and a built-in cheat sheet. Free, private, browser-only.',
    pattern: 'Regular Expression Pattern',
    testText: 'Test Text',
    output: 'Highlighted Matches',
    cheatSheet: 'Regex Cheat Sheet',
    matches: 'matches found',
    noMatches: 'No matches found',
    match: 'Match',
    groups: 'Groups',
    index: 'Index',
    step1: 'Enter your regex pattern in the input field',
    step2: 'Toggle flags (g, i, m, s, u) as needed',
    step3: 'Type or paste test text in the test area',
    step4: 'View highlighted matches and capture group details below',
    csDot: 'Any character except newline',
    csD: 'Any digit (0-9)',
    csW: 'Any word character (a-z, A-Z, 0-9, _)',
    csS: 'Any whitespace character',
    csClass: 'Any of the characters a, b, or c',
    csNeg: 'Any character except a, b, or c',
    csStar: 'Zero or more of the preceding',
    csPlus: 'One or more of the preceding',
    csQ: 'Zero or one of the preceding (optional)',
    csRange: 'Between n and m of the preceding',
    csStart: 'Start of string (or line with m flag)',
    csEnd: 'End of string (or line with m flag)',
  },
  zh: {
    toolTitle: '正则表达式测试器',
    toolDesc: '测试和调试 JavaScript 正则表达式，支持实时高亮匹配、捕获组、标志和速查表。免费、私密、浏览器本地运行。',
    pattern: '正则表达式模式',
    testText: '测试文本',
    output: '高亮匹配结果',
    cheatSheet: '正则表达式速查表',
    matches: '个匹配',
    noMatches: '未找到匹配',
    match: '匹配',
    groups: '分组',
    index: '位置',
    step1: '在输入框中输入正则表达式模式',
    step2: '根据需要切换标志（g、i、m、s、u）',
    step3: '在测试区域输入或粘贴测试文本',
    step4: '在下方查看高亮匹配和捕获组详情',
    csDot: '除换行符外的任意字符',
    csD: '任意数字 (0-9)',
    csW: '任意单词字符 (a-z, A-Z, 0-9, _)',
    csS: '任意空白字符',
    csClass: 'a、b 或 c 中的任意一个',
    csNeg: '除 a、b、c 外的任意字符',
    csStar: '前一个字符出现零次或多次',
    csPlus: '前一个字符出现一次或多次',
    csQ: '前一个字符出现零次或一次（可选）',
    csRange: '前一个字符出现 n 到 m 次',
    csStart: '字符串开头（带 m 标志时为行首）',
    csEnd: '字符串结尾（带 m 标志时为行尾）',
  }
});

const { $, t } = GZ;
let flags = { g: true, i: true, m: true, s: false, u: false, y: false };

function escHtml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function getFlagsStr() {
  return Object.keys(flags).filter(f => flags[f]).join('');
}

function updateFlagsDisplay() {
  const fs = getFlagsStr();
  $('#flags-display').textContent = fs;
  $('#flags-row').innerHTML = '';
  for (const f of ['g','i','m','s','u','y']) {
    const btn = document.createElement('button');
    btn.className = 'flag-btn' + (flags[f] ? ' active' : '');
    btn.textContent = f;
    btn.onclick = () => { flags[f] = !flags[f]; updateFlagsDisplay(); runRegex(); };
    $('#flags-row').appendChild(btn);
  }
}

function runRegex() {
  const pattern = $('#pattern').value;
  const text = $('#test-text').value;
  const errEl = $('#regex-error');
  const patEl = $('#pattern');
  errEl.textContent = '';
  patEl.classList.remove('error');

  if (!pattern) {
    $('#highlight-output').textContent = text;
    $('#match-info').innerHTML = '';
    return;
  }

  let regex;
  try {
    regex = new RegExp(pattern, getFlagsStr());
  } catch(e) {
    errEl.textContent = '⚠ ' + e.message;
    patEl.classList.add('error');
    $('#highlight-output').textContent = text;
    $('#match-info').innerHTML = '';
    return;
  }

  const matches = [];
  if (flags.g) {
    let m;
    let count = 0;
    while ((m = regex.exec(text)) !== null) {
      matches.push({ match: m[0], index: m.index, groups: m.slice(1), named: m.groups });
      count++;
      if (m.index === regex.lastIndex) regex.lastIndex++;
      if (count > 1000) break;
    }
  } else {
    const m = regex.exec(text);
    if (m) matches.push({ match: m[0], index: m.index, groups: m.slice(1), named: m.groups });
  }

  if (matches.length === 0) {
    $('#highlight-output').textContent = text;
    $('#match-info').innerHTML = `<span style="color:var(--text2)">${t('noMatches')}</span>`;
    return;
  }

  let html = '';
  let lastIdx = 0;
  for (const m of matches) {
    html += escHtml(text.substring(lastIdx, m.index));
    html += `<span class="match-highlight">${escHtml(m.match)}</span>`;
    lastIdx = m.index + m.match.length;
  }
  html += escHtml(text.substring(lastIdx));
  $('#highlight-output').innerHTML = html;

  let tableHtml = `<p style="color:var(--gz-success)">✓ ${matches.length} ${t('matches')}</p>`;
  tableHtml += '<table><thead><tr><th>#</th><th>' + t('match') + '</th><th>' + t('groups') + '</th><th>' + t('index') + '</th></tr></thead><tbody>';
  matches.slice(0, 50).forEach((m, i) => {
    const groupStr = m.groups.length > 0 ? m.groups.map((g, j) => g !== undefined ? escHtml(g) : '—').join(' | ') : '—';
    tableHtml += `<tr><td>${i + 1}</td><td>${escHtml(m.match.substring(0, 40))}</td><td>${groupStr}</td><td>${m.index}</td></tr>`;
  });
  tableHtml += '</tbody></table>';
  $('#match-info').innerHTML = tableHtml;
}

$('#pattern').addEventListener('input', runRegex);
$('#test-text').addEventListener('input', runRegex);

$('#lbl-pattern').textContent = t('pattern');
$('#lbl-test').textContent = t('testText');
$('#lbl-output').textContent = t('output');
$('#lbl-cheat').textContent = t('cheatSheet');
$('#cs-dot').textContent = t('csDot');
$('#cs-d').textContent = t('csD');
$('#cs-w').textContent = t('csW');
$('#cs-s').textContent = t('csS');
$('#cs-class').textContent = t('csClass');
$('#cs-neg').textContent = t('csNeg');
$('#cs-star').textContent = t('csStar');
$('#cs-plus').textContent = t('csPlus');
$('#cs-q').textContent = t('csQ');
$('#cs-range').textContent = t('csRange');
$('#cs-start').textContent = t('csStart');
$('#cs-end').textContent = t('csEnd');

updateFlagsDisplay();
runRegex();

GZ.renderToolPage({
  category: 'dev',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [

    {icon:'🔗', href:'/dev/url-encode.html', name:'URL Encode'},
    {icon:'📊', href:'/dev/sql.html', name:'SQL Formatter'},
  ]
});
</script>
