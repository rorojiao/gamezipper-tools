const { $, copyText, t } = GZ;
let mode = 'preview';

function escapeHtml(s) {
  if (s == null) return '';
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function toMrkdwn(md) {
  let s = md;
  s = s.replace(/^######\s+(.*)$/gm, '*$1*');
  s = s.replace(/^#####\s+(.*)$/gm, '*$1*');
  s = s.replace(/^####\s+(.*)$/gm, '*$1*');
  s = s.replace(/^###\s+(.*)$/gm, '*$1*');
  s = s.replace(/^##\s+(.*)$/gm, '*$1*');
  s = s.replace(/^#\s+(.*)$/gm, '*$1*');
  s = s.replace(/\*\*\*(.+?)\*\*\*/g, '*_$1_*');
  s = s.replace(/\*\*(.+?)\*\*/g, '*$1*');
  s = s.replace(/__(.+?)__/g, '*$1*');
  s = s.replace(/(?<!\*)\*(?!\*)(.+?)(?<!\*)\*(?!\*)/g, '_$1_');
  s = s.replace(/(?<!_)_([^_]+?)_(?!_)/g, '_$1_');
  s = s.replace(/~~(.+?)~~/g, '~$1~');
  s = s.replace(/\[([^\]]+)\]\((https?:\/\/[^\)]+)\)/g, '<$2|$1>');
  s = s.replace(/```(\w+)?\n([\s\S]*?)```/g, '```\n$2```');
  return s;
}

function toMarkdown(slackText) {
  let s = slackText;
  s = s.replace(/\*([^*\n]+)\*/g, '**$1**');
  s = s.replace(/(?<![\w*])_([^_\n]+)_(?![\w*])/g, '*$1*');
  s = s.replace(/~([^~\n]+)~/g, '~~$1~~');
  s = s.replace(/<((?:https?:\/\/)[^|>]+)\|([^>]+)>/g, '[$2]($1)');
  s = s.replace(/<(https?:\/\/[^>]+)>/g, '$1');
  return s;
}

function renderPreview(text) {
  let s = text;
  s = s.replace(/```(\w+)?\n([\s\S]*?)```/g, (_, lang, code) => `<span class="codeblock">${escapeHtml(code)}</span>`);
  s = s.replace(/```([\s\S]*?)```/g, (_, code) => `<span class="codeblock">${escapeHtml(code)}</span>`);
  s = s.replace(/^&gt;\s?(.*)$/gm, '<span class="blockquote">$1</span>');
  s = s.replace(/^>\s?(.*)$/gm, '<span class="blockquote">$1</span>');
  s = s.replace(/`([^`\n]+)`/g, '<span class="code">$1</span>');
  s = s.replace(/\*([^*\n]+)\*/g, '<span class="bold">$1</span>');
  s = s.replace(/_([^_\n]+)_/g, '<span class="italic">$1</span>');
  s = s.replace(/~([^~\n]+)~/g, '<span class="strike">$1</span>');
  s = s.replace(/&lt;((?:https?:\/\/)[^|&gt;]+)\|([^&gt;]+)&gt;/g, '<a class="link" href="$1" target="_blank" rel="noopener">$2</a>');
  s = s.replace(/&lt;((?:https?:\/\/)[^&gt;]+)&gt;/g, '<a class="link" href="$1" target="_blank" rel="noopener">$1</a>');
  s = s.replace(/<@([A-Z0-9]+)>/g, '<span class="mention">@user</span>');
  s = s.replace(/<#(C[A-Z0-9]+)\|([^&]+)>/g, '<span class="channel">#$2</span>');
  s = s.replace(/(^|\s)(#[a-z0-9_\-]+)/g, '$1<span class="channel">$2</span>');
  s = s.replace(/(^|\s)(@[a-z0-9._\-]+)/g, '$1<span class="mention">$2</span>');
  s = s.replace(/\n/g, '<br>');
  return s;
}

function update() {
  const raw = $('#input').value;
  const out = $('#output');
  if (mode === 'preview') {
    const asMrkdwn = toMrkdwn(raw);
    out.innerHTML = renderPreview(asMrkdwn);
  } else {
    const asMd = toMarkdown(raw);
    $('#input').value = asMd;
    out.innerHTML = renderPreview(toMrkdwn(asMd));
    mode = 'preview';
  }
}

function setMode(m) {
  if (m === mode) return;
  if (m === 'mrkdwn') {
    const converted = toMrkdwn($('#input').value);
    $('#input').value = converted;
    $('#output').innerHTML = renderPreview(converted);
  } else if (m === 'md') {
    const converted = toMarkdown($('#input').value);
    $('#input').value = converted;
    $('#output').innerHTML = renderPreview(toMrkdwn(converted));
  }
  mode = 'preview';
}

function doCopyMrkdwn() {
  copyText(toMrkdwn($('#input').value));
}

function doClear() { $('#input').value = ''; $('#output').innerHTML = ''; }

function loadExample() {
  $('#input').value = `# Daily Standup — *June 7, 2026*

Hey <!channel>! Quick updates for today:

**Alice** _completed_ the auth refactor
**Bob** is working on <https://gamezipper.com|new dashboard>
**Carol** will review PRs

> Reminder: standup at 10:00 in <#C1234|general>

~~Old deadline~~ New deadline: \`2026-06-15\`

\`\`\`
git pull origin main
npm install
npm run dev
\`\`\``;
  update();
}

document.getElementById('lbl-in').textContent = t('inputLabel');
document.getElementById('lbl-out').textContent = t('outputLabel');

$('#input').addEventListener('input', update);

$('#toolbar').innerHTML = `
  <button class="gz-btn gz-btn-secondary" onclick="setMode('mrkdwn')">${t('toMrkdwn')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="setMode('md')">${t('toMd')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn" onclick="doCopyMrkdwn()">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

$('#cheatsheet').innerHTML = `
  <h2 style="font-size:1.05rem;margin:18px 0 10px">${t('cheatsheetTitle')}</h2>
  <div class="cheatsheet">
    <div class="cheat-card"><div class="name">Bold</div><code>*text*</code><div class="ex">renders as <b>text</b></div></div>
    <div class="cheat-card"><div class="name">Italic</div><code>_text_</code><div class="ex">renders as <i>text</i></div></div>
    <div class="cheat-card"><div class="name">Strikethrough</div><code>~text~</code><div class="ex">renders as <s>text</s></div></div>
    <div class="cheat-card"><div class="name">Inline code</div><code>\`text\`</code><div class="ex">monospace highlight</div></div>

    <div class="cheat-card"><div class="name">Link</div><code>&lt;url|text&gt;</code><div class="ex">clickable link</div></div>
    <div class="cheat-card"><div class="name">Mention user</div><code>@username</code><div class="ex">notifies the user</div></div>
    <div class="cheat-card"><div class="name">Channel</div><code>#channel</code><div class="ex">links to a channel</div></div>
    <div class="cheat-card"><div class="name">Quote</div><code>&gt; text</code><div class="ex">blockquote style</div></div>
  </div>`;

update();

</script>
