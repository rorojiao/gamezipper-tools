<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"What is a Tabata workout?","acceptedAnswer":{"@type":"Answer","text":"Tabata is a high-intensity interval training (HIIT) protocol created by Dr. Izumi Tabata. The classic format is 20 seconds of maximum-effort work followed by 10 seconds of rest, repeated for 8 rounds — a total of 4 minutes per exercise."}},{"@type":"Question","name":"How do I use the Tabata timer?","acceptedAnswer":{"@type":"Answer","text":"Pick a preset or customize your work/rest durations, number of rounds and prep countdown, then press Start. The timer will announce each work and rest phase with a visual ring and audio beeps, automatically advancing through all rounds."}},{"@type":"Question","name":"Does the timer work without internet?","acceptedAnswer":{"@type":"Answer","text":"Yes. The Tabata timer runs entirely in your browser using JavaScript. Once the page has loaded, it works offline. Your custom settings are saved locally so you don't have to re-enter them next time."}},{"@type":"Question","name":"Will I hear sound cues between intervals?","acceptedAnswer":{"@type":"Answer","text":"Yes. A short beep plays 3 seconds before each phase change and a longer tone marks the start of work, rest and the end of the workout. Make sure your device is not muted."}},{"@type":"Question","name":"Can I change the work and rest times?","acceptedAnswer":{"@type":"Answer","text":"Absolutely. Click Settings to adjust work seconds, rest seconds, number of rounds, cycles, rest between cycles and a prep countdown. You can also pick from built-in presets like classic Tabata, HIIT, EMOM and 30/30."}}]}</script>

<script>
GZI18n.register({
  en: {
    toolTitle: 'Tabata Timer',
    toolDesc: 'Free Tabata & HIIT interval timer — 20 seconds work, 10 seconds rest, 8 rounds. Customize intervals, rounds, cycles and audio cues. Works offline in your browser.',
    work: 'WORK',
    rest: 'REST',
    prep: 'GET READY',
    done: 'WORKOUT COMPLETE',
    start: 'Start',
    pause: 'Pause',
    resume: 'Resume',
    reset: 'Reset',
    round: 'Round',
    cycle: 'Cycle',
    total: 'Total',
    lblWork: 'Work (sec)',
    lblRest: 'Rest (sec)',
    lblRounds: 'Rounds per cycle',
    lblCycles: 'Cycles',
    lblRestCycle: 'Rest between cycles (sec)',

    roundLbl: 'Round',

    p45: '45/15',

    step3: 'Give max effort during WORK and recover during REST — the ring fills up as time runs down',
    step4: 'When you hear the final beep, your workout is complete',
  },
  zh: {
    toolTitle: 'Tabata 计时器',
    toolDesc: '免费 Tabata 与 HIIT 间歇训练计时器 — 20 秒训练，10 秒休息，8 轮。可自定义时长、轮数、循环和音频提示，浏览器离线运行。',
    work: '训练',
    rest: '休息',
    prep: '准备开始',
    done: '训练完成',
    start: '开始',
    pause: '暂停',
    resume: '继续',
    reset: '重置',
    round: '轮',
    cycle: '循环',
    total: '总时长',
    lblWork: '训练（秒）',
    lblRest: '休息（秒）',
    lblRounds: '每循环轮数',
    lblCycles: '循环数',
    lblRestCycle: '循环间休息（秒）',
    lblPrep: '预备倒计时（秒）',
    roundLbl: '当前轮',
    cycleLbl: '当前循环',
    totalLbl: '总时长',
    pClassic: '经典 Tabata',
    pHiit: 'HIIT 30/30',
    pEmom: 'EMOM 60',
    p45: '45/15',
    step1: '选择预设（经典、HIIT、EMOM）或点击「⚙」自定义时长',
    step2: '点击「开始」 — 如设置了预备倒计时将先倒数',
    step3: '训练阶段全力以赴，休息阶段恢复 — 圆环随时间倒计填满',
    step4: '听到最终提示音时，训练完成',
  }
});

const { $, t } = GZ;
const CIRCUM = 2 * Math.PI * 125;

let CFG = { work: 20, rest: 10, rounds: 8, cycles: 1, restCycle: 0, prep: 10 };
try { const s = localStorage.getItem('gz-tabata'); if (s) Object.assign(CFG, JSON.parse(s)); } catch(e) {}

const PRESETS = {
  classic: { work: 20, rest: 10, rounds: 8, cycles: 1, restCycle: 0, prep: 10 },
  hiit:    { work: 30, rest: 30, rounds: 8, cycles: 1, restCycle: 0, prep: 10 },
  emom:    { work: 60, rest: 0,  rounds: 1, cycles: 10, restCycle: 0, prep: 10 },
  p45:     { work: 45, rest: 15, rounds: 8, cycles: 1, restCycle: 0, prep: 10 },
};

let state = {
  phase: 'idle',   // idle | prep | work | rest | restCycle | done
  remaining: CFG.work,
  total: CFG.work,
  round: 1,
  cycle: 1,
  running: false,
  timer: null,
};

// Audio
let actx = null;
function beep(freq, dur, vol) {
  try {
    if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)();
    const o = actx.createOscillator();
    const g = actx.createGain();
    o.frequency.value = freq || 880;
    o.type = 'sine';
    g.gain.value = vol || 0.18;
    o.connect(g); g.connect(actx.destination);
    o.start();
    g.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + (dur || 0.18));
    o.stop(actx.currentTime + (dur || 0.18));
  } catch(e) {}
}
function cueWork(){ beep(880, 0.25, 0.22); }
function cueRest(){ beep(440, 0.25, 0.22); }
function cueEnd(){ beep(660, 0.12, 0.2); setTimeout(()=>beep(880, 0.4, 0.25), 140); }
function cueCountdown(){ beep(660, 0.08, 0.12); }

function fmt(sec) {
  sec = Math.max(0, Math.ceil(sec));
  const m = Math.floor(sec / 60);
  const s = sec % 60;
  return String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
}

function totalWorkoutTime() {
  const per = CFG.work * CFG.rounds + CFG.rest * Math.max(0, CFG.rounds - 1);
  const between = CFG.restCycle * Math.max(0, CFG.cycles - 1);
  return CFG.prep + per * CFG.cycles + between;
}

function render() {
  const phase = state.phase;
  const labelMap = { idle: t('work'), prep: t('prep'), work: t('work'), rest: t('rest'), restCycle: t('rest'), done: t('done') };
  $('#mode').textContent = labelMap[phase] || t('work');
  $('#mode').className = 'tab-mode ' + (phase === 'rest' || phase === 'restCycle' ? 'rest' : phase === 'work' ? 'work' : phase === 'prep' ? 'prep' : phase === 'done' ? 'done' : '');
  $('#time').textContent = fmt(state.remaining);
  $('#ring').className = 'tab-ring ' + (phase === 'rest' || phase === 'restCycle' ? 'rest' : phase === 'prep' ? 'prep' : 'work');
  const offset = CIRCUM * (1 - (state.total > 0 ? state.remaining / state.total : 0));
  $('#arc').style.strokeDashoffset = offset;
  $('#round').textContent = phase === 'idle' ? '' : (t('round') + ' ' + state.round + ' / ' + CFG.rounds);
  $('#metaRound').textContent = state.round + '/' + CFG.rounds;
  $('#metaCycle').textContent = state.cycle + '/' + CFG.cycles;
  $('#metaTotal').textContent = fmt(totalWorkoutTime());
  document.title = (state.running ? fmt(state.remaining) + ' · ' : '') + (labelMap[phase] || '') + ' — Tabata Timer';
  $('#btnStart').textContent = state.running ? t('pause') : (state.phase === 'idle' || state.phase === 'done' ? t('start') : t('resume'));
}

function setPhase(p, total) {
  state.phase = p;
  state.total = total;
  state.remaining = total;
  render();
}

function tick() {
  if (!state.running) return;
  state.remaining--;
  if (state.remaining === 3 || state.remaining === 2 || state.remaining === 1) cueCountdown();
  if (state.remaining <= 0) advance();
  else render();
}

function advance() {
  const ph = state.phase;
  if (ph === 'prep') {
    setPhase('work', CFG.work);
    cueWork();
    return;
  }
  if (ph === 'work') {
    // either rest, restCycle, or next round
    if (CFG.rest > 0 && state.round < CFG.rounds) {
      setPhase('rest', CFG.rest);
      cueRest();
      return;
    }
    // end of cycle: either restCycle or next cycle or done
    if (state.cycle < CFG.cycles) {
      if (CFG.restCycle > 0) {
        // mark round at end of cycle, then advance
        state.round = CFG.rounds;
        setPhase('restCycle', CFG.restCycle);
        cueRest();
        return;
      }
      nextCycle();
      return;
    }
    finish();
    return;
  }
  if (ph === 'rest') {
    state.round++;
    setPhase('work', CFG.work);
    cueWork();
    return;
  }
  if (ph === 'restCycle') {
    nextCycle();
    return;
  }
}

function nextCycle() {
  state.cycle++;
  state.round = 1;
  setPhase('work', CFG.work);
  cueWork();
}

function finish() {
  state.running = false;
  if (state.timer) { clearInterval(state.timer); state.timer = null; }
  setPhase('done', 0);
  state.remaining = 0;
  cueEnd();
  render();
}

function start() {
  if (state.phase === 'done' || state.phase === 'idle') {
    state.phase = CFG.prep > 0 ? 'prep' : 'work';
    state.total = CFG.prep > 0 ? CFG.prep : CFG.work;
    state.remaining = state.total;
    state.round = 1;
    state.cycle = 1;
    if (state.phase === 'work') cueWork();
  }
  state.running = true;
  // unlock audio on user gesture
  if (!actx) { try { actx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e){} }
  if (actx && actx.state === 'suspended') actx.resume();
  if (state.timer) clearInterval(state.timer);
  state.timer = setInterval(tick, 1000);
  render();
}

function pause() {
  state.running = false;
  if (state.timer) { clearInterval(state.timer); state.timer = null; }
  render();
}

function reset() {
  state.running = false;
  if (state.timer) { clearInterval(state.timer); state.timer = null; }
  state.phase = 'idle';
  state.round = 1;
  state.cycle = 1;
  state.total = CFG.work;
  state.remaining = CFG.work;
  render();
}

function toggleSettings(){ $('#settings').classList.toggle('open'); }

function applyPreset(key) {
  Object.assign(CFG, PRESETS[key]);
  saveCfg();
  syncInputs();
  reset();
  document.querySelectorAll('.tab-chip').forEach(c => c.classList.toggle('active', c.dataset.preset === key));
}

function saveCfg(){ try { localStorage.setItem('gz-tabata', JSON.stringify(CFG)); } catch(e){} }

function syncInputs() {
  $('#setWork').value = CFG.work;
  $('#setRest').value = CFG.rest;
  $('#setRounds').value = CFG.rounds;
  $('#setCycles').value = CFG.cycles;
  $('#setRestCycle').value = CFG.restCycle;
  $('#setPrep').value = CFG.prep;
}

function readInputs() {
  CFG.work = Math.max(5, +$('#setWork').value || 20);
  CFG.rest = Math.max(0, +$('#setRest').value || 0);
  CFG.rounds = Math.max(1, +$('#setRounds').value || 8);
  CFG.cycles = Math.max(1, +$('#setCycles').value || 1);
  CFG.restCycle = Math.max(0, +$('#setRestCycle').value || 0);
  CFG.prep = Math.max(0, +$('#setPrep').value || 0);
  saveCfg();
  document.querySelectorAll('.tab-chip').forEach(c => c.classList.remove('active'));
  reset();
}

// Labels
$('#lblWork').textContent = t('lblWork');
$('#lblRest').textContent = t('lblRest');
$('#lblRounds').textContent = t('lblRounds');
$('#lblCycles').textContent = t('lblCycles');
$('#lblRestCycle').textContent = t('lblRestCycle');
$('#lblPrep').textContent = t('lblPrep');
$('#metaRoundLbl').textContent = t('roundLbl');
$('#metaCycleLbl').textContent = t('cycleLbl');
$('#metaTotalLbl').textContent = t('totalLbl');

// Presets
$('#presets').innerHTML = [
  ['classic', t('pClassic')],
  ['hiit', t('pHiit')],
  ['p45', t('p45')],
  ['emom', t('pEmom')],
].map(([k,n]) => `<button class="tab-chip" data-preset="${k}">${n}</button>`).join('');
document.querySelectorAll('.tab-chip').forEach(c => c.addEventListener('click', () => applyPreset(c.dataset.preset)));

// Wire controls
$('#btnStart').addEventListener('click', () => state.running ? pause() : start());
$('#btnReset').addEventListener('click', reset);
$('#btnSettings').addEventListener('click', toggleSettings);
['#setWork','#setRest','#setRounds','#setCycles','#setRestCycle','#setPrep'].forEach(s => $(s).addEventListener('change', readInputs));

syncInputs();
reset();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🍅', href:'/calc/pomodoro.html', name:'Pomodoro Timer'},
    {icon:'⏱️', href:'/calc/timer-stopwatch.html', name:'Timer & Stopwatch'},
    {icon:'🏋️', href:'/calc/one-rep-max.html', name:'One Rep Max'},
    {icon:'❤️', href:'/calc/heart-rate-zones.html', name:'Heart Rate Zones'},
    {icon:'🏃', href:'/calc/race-time-predictor.html', name:'Race Time Predictor'},
  ]
});
</script>
