<script>
GZI18n.register({
  en: {
    toolTitle: 'Band Name Generator',
    toolDesc: 'Create cool band, music group and DJ names by genre — rock, metal, pop, hip-hop, EDM, indie, punk and country. Add an optional keyword and get 20 fresh band name ideas every click. Free, private, no signup.',
    gRock: '🎸 Rock', gMetal: '🤘 Metal', gPop: '🎤 Pop', gHipHop: '🎧 Hip-Hop', gEDM: '🎛️ EDM', gIndie: '🍂 Indie', gPunk: '🦺 Punk', gCountry: '🤠 Country', gDJ: '💿 DJ',
    lblKeyword: 'Optional keyword (a place, animal, mood…)',
    phKeyword: 'e.g. midnight',
    btnGen: 'Generate 20 band names',
    btnClear: 'Clear',
    copied: 'Copied!',
    step1: 'Pick a music genre — Rock, Metal, Pop, Hip-Hop, EDM and more',
    step2: 'Optionally add a keyword to flavor the names',
    step3: 'Click Generate to get 20 fresh band name ideas',
    step4: 'Click the copy icon on any name to grab it',
  },
  zh: {
    toolTitle: '乐队名字生成器',
    toolDesc: '按音乐风格生成乐队、音乐组合和 DJ 名字 — 摇滚、金属、流行、嘻哈、电音、独立、朋克和乡村。可添加关键词，每次点击获得 20 个全新乐队名创意。免费、私密、无需注册。',
    gRock: '🎸 摇滚', gMetal: '🤘 金属', gPop: '🎤 流行', gHipHop: '🎧 嘻哈', gEDM: '🎛️ 电音', gIndie: '🍂 独立', gPunk: '🦺 朋克', gCountry: '🤠 乡村', gDJ: '💿 DJ',
    lblKeyword: '可选关键词（地点、动物、情绪…）',
    phKeyword: '例如：midnight',
    btnGen: '生成 20 个乐队名',
    btnClear: '清空',
    copied: '已复制！',
    step1: '选择音乐风格 — 摇滚、金属、流行、嘻哈、电音等',
    step2: '可选添加关键词为名字增添风味',
    step3: '点击「生成」获得 20 个全新乐队名创意',
    step4: '点击任意名字旁的复制按钮即可获取',
  }
});

const { $, t, showToast } = GZ;
const pick = a => a[Math.floor(Math.random() * a.length)];
const cap = s => s ? s.charAt(0).toUpperCase() + s.slice(1).toLowerCase() : s;

const GENRES = {
  rock:    { pre:['Black','Wild','Broken','Electric','Savage','Midnight','Rebel','Crimson','Iron','Velvet','Lost','Neon','Holy','Dirty','Golden'], noun:['Kings','Wolves','Roads','Hearts','Riot','Thunder','Vipers','Saints','Outlaws','Crows','Roses','Stones','Flames','Riders','Echoes'] },
  metal:   { pre:['Blood','Doom','Skull','Dark','Infernal','Cursed','Brutal','Eternal','Frozen','Venom','Grave','Spectral','Wretched','Savage','Hollow'], noun:['Requiem','Legion','Throne','Abyss','Oath','Harvest','Sanctum','Wraith','Tyrant','Crucible','Sepulcher','Bastion','Inquisition','Vortex','Catacomb'] },
  pop:     { pre:['Sweet','Golden','Neon','Honey','Starry','Pastel','Sunset','Crystal','Velvet','Glitter','Dreamy','Bubble','Cherry','Silver','Magic'], noun:['Hearts','Skies','Dreams','Lights','Waves','Echoes','Stars','Vibes','Hours','Days','Nights','Clouds','Mirage','Reverie','Fantasy'] },
  hiphop:  { pre:['Lil','Big','Young','King','Chief','MC','DJ','Da','Young','Crown','True','Real','Cold','Fresh','Boss'], noun:['Flow','Vibes','Hustle','Mafia','Clique','Squad','Cartel','Dynasty','Empire','Kings','Profit','Legacy','Movement','Collective','Nation'] },
  edm:     { pre:['Neon','Cosmic','Hyper','Pixel','Quantum','Synth','Holo','Digital','Astro','Lunar','Volt','Plasma','Cyber','Chroma','Aero'], noun:['Pulse','Wave','Frequency','Bass','Drop','Horizon','Drift','Flux','Spectrum','Paradox','Vortex','Matrix','Cascade','Nebula','Overdrive'] },
  indie:   { pre:['Paper','Fox','Pine','Willow','Library','Cottage','Hazel','Wandering','Quiet','Soft','Pale','Faded','Dusty','Sunday','Autumn'], noun:['Caves','Gardens','Forests','Letters','Submarines','Sparrows','Moths','Postcards','Foxes','Tides','Valleys','Balconies','Lanterns','Comets','Kites'] },
  punk:    { pre:['No','Dead','Broken','Rotten','Anti','Cheap','Filthy','Loud','Brat','Sick','Vile','Rabid','Snotty','Crash','Smash'], noun:['Future','Radio','Generation','Kids','Prom','Suburb','Wreck','Casualty','Static','Outsiders','Delinquents','Wavelength','Heritage','Anthem','Riot'] },
  country: { pre:['Whiskey','Dusty','Lone','Wild','Old','Sweet','Rusty','Broken','Coyote','Riverside','Prairie','Saddle','Honey','Frontier','Cottonwood'], noun:['Roads','Rangers','Creek','Hollow','Saloons','Outlaws','Drifters','Harvest','Stomp','Choir','Ranch','Jubilee','Ramblers','Roundup','Wagons'] },
  dj:      { pre:['DJ','MC','Sir','Lady','Captain','Lord','Doctor','Princess','Master','Queen','Saint','Count','Madam','Commander','Prince'], noun:['Volt','Nova','Pulse','Beat','Spin','Wave','Groove','Bass','Flow','Rhythm','Tempo','Drop','Mix','Vibe','Storm'] },
};

let genre = 'rock';
const GENRE_LIST = [{id:'rock',key:'gRock'},{id:'metal',key:'gMetal'},{id:'pop',key:'gPop'},{id:'hiphop',key:'gHipHop'},{id:'edm',key:'gEDM'},{id:'indie',key:'gIndie'},{id:'punk',key:'gPunk'},{id:'country',key:'gCountry'},{id:'dj',key:'gDJ'}];
$('#genre-tabs').innerHTML = GENRE_LIST.map(g => `<button data-id="${g.id}" class="${g.id===genre?'active':''}">${t(g.key)}</button>`).join('');
document.querySelectorAll('#genre-tabs button').forEach(b => {
  b.addEventListener('click', () => {
    document.querySelectorAll('#genre-tabs button').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    genre = b.dataset.id;
    generate();
  });
});

function makeName() {
  const g = GENRES[genre];
  const kw = ($('#keyword').value || '').trim();
  const r = Math.random();
  if (kw && r < 0.3) return cap(kw) + ' ' + pick(g.noun);
  if (kw && r < 0.45) return pick(g.pre) + ' ' + cap(kw);
  if (kw && r < 0.55) return 'The ' + cap(kw) + ' ' + pick(g.noun);
  if (r < 0.7) return 'The ' + pick(g.pre) + ' ' + pick(g.noun);
  if (r < 0.85) return pick(g.pre) + ' ' + pick(g.noun);
  return pick(g.pre) + pick(g.noun);
}

function generate() {
  const seen = new Set();
  const names = [];
  let safety = 0;
  while (names.length < 20 && safety < 300) {
    const n = makeName();
    if (!seen.has(n.toLowerCase())) { seen.add(n.toLowerCase()); names.push(n); }
    safety++;
  }
  $('#grid').innerHTML = names.map(n => `
    <div class="bn-card">
      <span class="name">${n.replace(/</g,'&lt;')}</span>
      <button data-name="${n.replace(/"/g,'&quot;')}" title="copy">📋</button>
    </div>`).join('');
  document.querySelectorAll('#grid .bn-card button').forEach(b => {
    b.addEventListener('click', async () => {
      try { await navigator.clipboard.writeText(b.dataset.name.replace(/&quot;/g,'"')); showToast(t('copied')); }
      catch (e) { showToast(t('copied')); }
    });
  });
}

$('#lbl-keyword').textContent = t('lblKeyword');
$('#keyword').placeholder = t('phKeyword');
$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="generate()">${t('btnGen')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#keyword').value='';generate()">🧹 ${t('btnClear')}</button>`;
$('#keyword').addEventListener('input', generate);

generate();

GZ.renderToolPage({
  category: 'fun',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🎮', href:'/fun/gamertag-generator.html', name:'Gamertag Generator'},
    {icon:'🧙', href:'/fun/fantasy-name-generator.html', name:'Fantasy Name Generator'},
    {icon:'😎', href:'/fun/cool-nickname-generator.html', name:'Cool Nickname Generator'},
    {icon:'💕', href:'/fun/name-combiner.html', name:'Name Combiner'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
