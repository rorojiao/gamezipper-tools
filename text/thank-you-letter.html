<script>
GZI18n.register({

    step3: 'Click Generate to draft the letter',
    step4: 'Copy or download as PDF',
  },
  zh: {
    toolTitle: '感谢信生成器',
    toolDesc: '几秒内写一封真诚或专业的感谢信。选择场景、语气和长度，然后复制或下载 PDF。',
    lblOutput: '你的感谢信',
    occasion: '场景',
    tone: '语气',
    length: '长度',
    recipient: '收信人姓名',
    sender: '你的姓名',
    extra: '附加细节（可选）',
    occInterview: '求职面试后',
    occGift: '收到礼物',
    occHospitality: '款待 / 接待',
    occBusiness: '商务 / 合作',
    occCustomer: '客户服务',
    occDonation: '捐款 / 赞助',
    occMentor: '导师 / 教练',
    occTeacher: '老师 / 教授',
    occVolunteer: '志愿者帮助',
    occGeneral: '通用致谢',
    toneFormal: '正式',
    toneSemi: '半正式',
    toneWarm: '温暖友好',
    lenShort: '简短（1 段）',
    lenMedium: '中等（2 段）',
    lenLong: '长篇（3 段以上）',
    generate: '生成信件',
    copy: '复制',
    downloadPdf: '⬇ 下载 PDF',
    step1: '选择场景和语气',
    step2: '填写收信人、你的姓名和附加细节',
    step3: '点击「生成信件」起草',
    step4: '复制或下载为 PDF',
  }
});

const { $, copyText, t } = GZ;

const OPENINGS = {
  formal: ['Dear {recipient},', 'I hope this message finds you well.', 'I am writing to express my sincere gratitude for {topic}.'],
  semi:  ['Hi {recipient},', 'I wanted to take a moment to thank you for {topic}.', 'Your {kind} meant a great deal to me.'],
  warm:  ['Dear {recipient},', 'I just wanted to send you a quick note to say thank you so much for {topic}.', 'It really made my day (or week!) and I feel lucky to have you in my life.'],
};

const OCCASIONS = {
  interview:    {topic: 'taking the time to interview me for the {position} position', kind: 'thoughtful conversation', position: 'role'},
  gift:         {topic: 'the wonderful gift', kind: 'kindness and generosity', position: ''},
  hospitality:  {topic: 'your warm hospitality', kind: 'generosity in opening your home', position: ''},
  business:     {topic: 'our successful partnership', kind: 'professionalism and collaboration', position: ''},
  customer:     {topic: 'your outstanding service', kind: 'patience and attentiveness', position: ''},
  donation:     {topic: 'your generous donation', kind: 'support and generosity', position: ''},
  mentor:       {topic: 'your guidance and mentorship', kind: 'wisdom and encouragement', position: ''},
  teacher:      {topic: 'an incredible class / learning experience', kind: 'dedication to teaching', position: ''},
  volunteer:    {topic: 'volunteering your time', kind: 'selfless help', position: ''},
  general:      {topic: 'everything you have done', kind: 'thoughtfulness', position: ''},
};

const BODIES = {
  short: 'I am truly grateful for your {kind}.',
  medium: 'I am truly grateful for your {kind}.\n\nYour support has made a real difference, and I appreciate the time and energy you put into making it happen. I look forward to staying in touch and hope to return the favor someday.',
  long: 'I am truly grateful for your {kind}.\n\nYour support has made a real difference, and I appreciate the time and energy you put into making it happen. It is rare to find someone so generous, and I do not take it for granted.\n\nI would love the chance to reciprocate your kindness — whether that is helping you with a project of your own, recommending your work to others, or simply being there when you need a hand. Please don\'t hesitate to reach out anytime.\n\nOnce again, thank you from the bottom of my heart.',
};

const CLOSINGS = {
  formal: ['With sincere appreciation,', 'Warm regards,'],
  semi:  ['With thanks,', 'Best regards,', 'Many thanks,'],
  warm:  ['With love,', 'Thanks a million,', 'Hugs and gratitude,'],
};

function fillTemplate(str, vars) {
  return str.replace(/\{(\w+)\}/g, (_, k) => vars[k] || '');
}

function generate() {
  const occ = $('#occasion').value;
  const tone = $('#tone').value;
  const len = $('#length').value;
  const recipient = $('#recipient').value.trim() || 'there';
  const sender = $('#sender').value.trim() || 'A grateful friend';
  const extra = $('#extra').value.trim();
  const position = $('#extra').value.trim() || 'the role';

  const occData = OCCASIONS[occ] || OCCASIONS.general;
  const vars = {
    recipient,
    topic: extra || occData.topic,
    kind: occData.kind,
    position,
  };

  const open = OPENINGS[tone];
  const body = BODIES[len];
  const close = CLOSINGS[tone];

  const today = new Date().toLocaleDateString('en-US', {year:'numeric', month:'long', day:'numeric'});
  let letter = '';
  letter += today + '\n\n';
  letter += open[0].replace('{recipient}', recipient) + '\n\n';
  letter += open[1] + '\n\n';
  if (extra) {
    letter += open[2].replace('{topic}', extra) + ' ' + fillTemplate(occData.topic, vars) + '.\n\n';
  } else {
    letter += open[2] + '.\n\n';
  }
  letter += fillTemplate(body, vars) + '\n\n';
  letter += close[0] + '\n';
  letter += sender;

  $('#letterBox').textContent = letter;
}

function downloadPdf() {
  const text = $('#letterBox').textContent;
  const w = window.open('', '_blank');
  w.document.write(`<!DOCTYPE html><html><head><title>Thank You Letter</title>
    <style>body{font-family:Georgia,serif;line-height:1.7;padding:40px;color:#222;max-width:600px;margin:0 auto}h1{text-align:center}</style>
    </head><body><pre style="white-space:pre-wrap;font-family:Georgia,serif">${text}</pre>
    <script>window.onload=()=>{window.print();}<\/script></body></html>`);
  w.document.close();
}

$('#formGrid').innerHTML = `
  <label>${t('occasion')}<select id="occasion">
    <option value="interview">${t('occInterview')}</option>
    <option value="gift">${t('occGift')}</option>
    <option value="hospitality">${t('occHospitality')}</option>
    <option value="business">${t('occBusiness')}</option>
    <option value="customer">${t('occCustomer')}</option>
    <option value="donation">${t('occDonation')}</option>
    <option value="mentor">${t('occMentor')}</option>
    <option value="teacher">${t('occTeacher')}</option>
    <option value="volunteer">${t('occVolunteer')}</option>
    <option value="general" selected>${t('occGeneral')}</option>
  </select></label>
  <label>${t('tone')}<select id="tone">
    <option value="formal">${t('toneFormal')}</option>
    <option value="semi" selected>${t('toneSemi')}</option>
    <option value="warm">${t('toneWarm')}</option>
  </select></label>
  <label>${t('length')}<select id="length">
    <option value="short">${t('lenShort')}</option>
    <option value="medium" selected>${t('lenMedium')}</option>
    <option value="long">${t('lenLong')}</option>
  </select></label>
  <label>${t('recipient')}<input type="text" id="recipient" placeholder=""></label>
  <label>${t('sender')}<input type="text" id="sender" placeholder=""></label>
  <label class="full">${t('extra')}<textarea id="extra" placeholder=""></textarea></label>`;

$('#lblOutput').textContent = t('lblOutput');

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="generate()">${t('generate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="copyText($('#letterBox').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="downloadPdf()">${t('downloadPdf')}</button>`;

generate();

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],

    {icon:'✉️', href:'/text/email-writer.html', name:'Email Writer'},

    {icon:'📨', href:'/text/out-of-office-generator.html', name:'Out of Office'},
  ]
});
</script>
