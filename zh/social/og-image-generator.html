<script>

  en: {
    toolTitle: 'OG Image Generator',
    toolDesc: 'Generate beautiful 1200×630 Open Graph preview images for Facebook, Twitter, LinkedIn and Discord. Customize title, subtitle, brand, gradients, fonts and download as PNG — runs in your browser.',
    title: 'Title', sub: 'Subtitle', brand: 'Brand / Domain',

    title: '标题', sub: '副标题', brand: '品牌 / 域名',
    c1: '颜色 1', c2: '颜色 2', c3: '颜色 3（可选）',
    font: '字体', txtColor: '文字颜色', emoji: 'Emoji / 图标（可选）',
    accent: '强调色', solid: '纯色', pattern: '图案',
    dl: '下载 PNG', copy: '复制到剪贴板', reset: '重置',
    tip: '提示', tip1: '标题控制在 60 字符以内，移动端显示更佳',
    tip2: '使用三色渐变可获得层次感，单色容易显得单调',
    tip3: '文字与背景的高对比度可提升点击率',
    step1: '输入标题、副标题和品牌名 — 它们是主要焦点',
    step2: '选择渐变 / 纯色 / 图案背景及字体',
    step3: '1200×630 预览实时更新',
    step4: '点击「下载 PNG」并将其作为 og:image meta 标签使用',
  }
});

const { $, t, copyText, showToast } = GZ;
const PRESETS = [
  ['#4ecdc4','#7b2ff7','#ff6b6b'],['#ff6b6b','#ffd93d','#ff8c42'],
  ['#1a1a2e','#16213e','#0f3460'],['#0f0c29','#302b63','#24243e'],
  ['#ee0979','#ff6a00','#ffba00'],['#43cea2','#185a9d','#0f3460'],
  ['#f8b500','#fceabb','#f8b500'],['#11998e','#38ef7d','#11998e'],
  ['#614385','#516395','#614385'],['#02aab0','#00cdac','#02aab0'],
  ['#ff5f6d','#ffc371','#ff5f6d'],['#4568dc','#b06ab3','#4568dc'],
];
let bgMode = 'gradient';

const c = document.getElementById('ogCanvas');
const ctx = c.getContext('2d');

const presetsEl = $('#presets');
PRESETS.forEach((p, i) => {
  const d = document.createElement('div');
  d.className = 'og-preset' + (i === 0 ? ' active' : '');
  d.style.background = `linear-gradient(135deg, ${p[0]}, ${p[1]}, ${p[2]})`;
  d.addEventListener('click', () => {
    document.querySelectorAll('.og-preset').forEach(x => x.classList.remove('active'));
    d.classList.add('active');
    $('#c1').value = p[0]; $('#c2').value = p[1]; $('#c3').value = p[2];
    bgMode = 'gradient';
    document.querySelectorAll('.og-tab').forEach(x => x.classList.remove('active'));
    document.querySelector('.og-tab[data-bg="gradient"]').classList.add('active');
    document.getElementById('gradientGroup').style.display = '';
    document.getElementById('solidGroup').style.display = 'none';
    document.getElementById('patternGroup').style.display = 'none';
    draw();
  });
  presetsEl.appendChild(d);
});

document.querySelectorAll('.og-tab').forEach(b => b.addEventListener('click', () => {
  document.querySelectorAll('.og-tab').forEach(x => x.classList.remove('active'));
  b.classList.add('active');
  bgMode = b.dataset.bg;
  document.getElementById('gradientGroup').style.display = bgMode === 'gradient' ? '' : 'none';
  document.getElementById('solidGroup').style.display = bgMode === 'solid' ? '' : 'none';
  document.getElementById('patternGroup').style.display = bgMode === 'pattern' ? '' : 'none';
  draw();
}));

['ogTitle','ogSubtitle','ogBrand','c1','c2','c3','solidColor','pattern','font','textColor','emoji','accentColor'].forEach(id => {
  const el = document.getElementById(id);
  el.addEventListener('input', draw);
  el.addEventListener('change', draw);
});

function wrapText(text, maxWidth) {
  const words = text.split(/\s+/);
  const lines = [];
  let cur = '';
  for (const w of words) {
    const test = cur ? cur + ' ' + w : w;
    if (ctx.measureText(test).width > maxWidth && cur) {
      lines.push(cur); cur = w;
    } else { cur = test; }
  }
  if (cur) lines.push(cur);
  return lines;
}

function draw() {
  const W = 1200, H = 630;
  const c1 = $('#c1').value, c2 = $('#c2').value, c3 = $('#c3').value;
  const solid = $('#solidColor').value;
  const pattern = $('#pattern').value;
  const title = $('#ogTitle').value || 'Build Beautiful OG Images';
  const subtitle = $('#ogSubtitle').value;
  const brand = $('#ogBrand').value;
  const textColor = $('#textColor').value;
  const accentColor = $('#accentColor').value;
  const font = $('#font').value;
  const emoji = $('#emoji').value;

  ctx.clearRect(0, 0, W, H);

  if (bgMode === 'gradient') {
    const g = ctx.createLinearGradient(0, 0, W, H);
    g.addColorStop(0, c1); g.addColorStop(0.5, c2); g.addColorStop(1, c3);
    ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
  } else if (bgMode === 'solid') {
    ctx.fillStyle = solid; ctx.fillRect(0, 0, W, H);
  } else if (bgMode === 'pattern') {
    const g = ctx.createLinearGradient(0, 0, W, H);
    g.addColorStop(0, c1); g.addColorStop(1, c2);
    ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = 'rgba(255,255,255,0.08)';
    if (pattern === 'dots') {
      for (let x = 30; x < W; x += 50) for (let y = 30; y < H; y += 50) { ctx.beginPath(); ctx.arc(x, y, 6, 0, Math.PI * 2); ctx.fill(); }
    } else if (pattern === 'grid') {
      ctx.strokeStyle = 'rgba(255,255,255,0.08)'; ctx.lineWidth = 1;
      for (let x = 0; x < W; x += 40) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke(); }
      for (let y = 0; y < H; y += 40) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); }
    } else if (pattern === 'diagonal') {
      ctx.strokeStyle = 'rgba(255,255,255,0.1)'; ctx.lineWidth = 2;
      for (let i = -H; i < W; i += 30) { ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i + H, H); ctx.stroke(); }
    } else if (pattern === 'wave') {
      ctx.strokeStyle = 'rgba(255,255,255,0.15)'; ctx.lineWidth = 2;
      for (let y = 50; y < H; y += 30) {
        ctx.beginPath();
        for (let x = 0; x <= W; x += 10) {
          ctx.lineTo(x, y + Math.sin((x + y) / 30) * 8);
        }
        ctx.stroke();
      }
    }
  }

  // Decorative shapes
  ctx.fillStyle = 'rgba(255,255,255,0.06)';
  ctx.beginPath(); ctx.arc(W - 80, 80, 160, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(60, H - 60, 110, 0, Math.PI * 2); ctx.fill();

  // Accent bar
  ctx.fillStyle = accentColor;
  ctx.fillRect(80, 180, 96, 8);

  // Emoji
  if (emoji) {
    ctx.font = '90px Inter, sans-serif';
    ctx.textBaseline = 'top';
    ctx.fillText(emoji, 80, 80);
  }

  // Title
  let titleFont = '700 86px ';
  if (font === 'Georgia') titleFont = '700 86px Georgia, serif';
  else if (font === 'Courier') titleFont = '700 80px "Courier New", monospace';
  else if (font === 'Impact') titleFont = '700 110px Impact, Charcoal, sans-serif';
  else titleFont = '800 86px Inter, -apple-system, sans-serif';

  ctx.fillStyle = textColor;
  ctx.font = titleFont;
  ctx.textBaseline = 'top';
  const titleLines = wrapText(title, W - 160);
  let yT = 220;
  titleLines.slice(0, 3).forEach((line) => {
    ctx.fillText(line, 80, yT);
    yT += 96;
  });

  // Subtitle
  if (subtitle) {
    let subFont = '500 30px Inter, sans-serif';
    if (font === 'Georgia') subFont = '400 32px Georgia, serif';
    else if (font === 'Courier') subFont = '400 28px "Courier New", monospace';
    else if (font === 'Impact') subFont = '500 32px Inter, sans-serif';
    else subFont = '500 30px Inter, sans-serif';
    ctx.font = subFont;
    ctx.fillStyle = textColor;
    ctx.globalAlpha = 0.85;
    const subLines = wrapText(subtitle, W - 160);
    subLines.slice(0, 2).forEach((line) => {
      ctx.fillText(line, 80, yT + 10);
      yT += 40;
    });
    ctx.globalAlpha = 1;
  }

  // Brand
  if (brand) {
    ctx.font = '600 24px Inter, sans-serif';
    ctx.fillStyle = textColor;
    ctx.globalAlpha = 0.7;
    ctx.fillText('🌐 ' + brand, 80, H - 80);
    ctx.globalAlpha = 1;
  }
}

$('#downloadBtn').addEventListener('click', () => {
  c.toBlob(b => {
    const url = URL.createObjectURL(b);
    const a = document.createElement('a');
    a.href = url; a.download = 'og-image.png'; a.click();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
    showToast('✓ PNG saved');
  });
});
$('#copyBtn').addEventListener('click', () => {
  c.toBlob(b => {
    try {
      navigator.clipboard.write([new ClipboardItem({ 'image/png': b })]).then(() => showToast('✓ ' + t('copy'))).catch(() => showToast('✗ Clipboard not supported'));
    } catch (e) { showToast('✗ Clipboard not supported'); }
  });
});
$('#resetBtn').addEventListener('click', () => {
  $('#ogTitle').value = 'Build Beautiful OG Images';
  $('#ogSubtitle').value = 'Free online generator — no signup, no watermark';
  $('#ogBrand').value = 'gamezipper.com';
  $('#emoji').value = '🎨';
  $('#c1').value = '#4ecdc4'; $('#c2').value = '#7b2ff7'; $('#c3').value = '#ff6b6b';
  $('#textColor').value = '#ffffff'; $('#accentColor').value = '#ffffff';
  draw();
});

// Labels
$('#lblTitle').textContent = t('title');
$('#lblSub').textContent = t('sub');
$('#lblBrand').textContent = t('brand');
$('#lblC1').textContent = t('c1');
$('#lblC2').textContent = t('c2');
$('#lblC3').textContent = t('c3');
$('#lblFont').textContent = t('font');
$('#lblTxtColor').textContent = t('txtColor');
$('#lblEmoji').textContent = t('emoji');
$('#lblAccent').textContent = t('accent');
$('#lblSolid').textContent = t('solid');
$('#lblPattern').textContent = t('pattern');
$('#lblDl').textContent = t('dl');
$('#lblCopy').textContent = t('copy');
$('#lblReset').textContent = t('reset');
$('#lblTip').textContent = t('tip');
$('#tip1').textContent = t('tip1');
$('#tip2').textContent = t('tip2');
$('#tip3').textContent = t('tip3');

draw();
GZ.renderToolPage({
  category: 'social',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [

    {icon:'👁️', href:'/seo/open-graph-preview.html', name:'OG Preview'},
    {icon:'🐦', href:'/social/tweet-generator.html', name:'Tweet Generator'},
    {icon:'🎬', href:'/social/youtube-thumb.html', name:'YT Thumbnail'},
  ]

</script>
