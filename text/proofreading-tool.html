<script>
GZI18n.register({
  en: {
    toolTitle: 'Proofreading & Text Polish',
    toolDesc: 'Find grammar errors, typos, repeated words, capitalization issues and style problems in your text. Free, instant, browser-based.',
    check: '🔍 Check Text',
    clear: '🗑️ Clear',
    copy: '📋 Copy Fixed',
    lblInput: 'Paste your text here',
    words: 'Words',
    sentences: 'Sentences',
    issues: 'Issues Found',
    score: 'Score',
    issueFound: 'issues found',
    noIssues: '✅ No issues found — your text looks great!',
    step1: 'Paste or type your text in the input area',
    step2: 'Click "Check Text" to analyze',
    step3: 'Review the highlighted issues in your text',
    step4: 'Click "Fix" on individual issues or manually correct',
    spelling: 'Spelling',
    grammar: 'Grammar',
    style: 'Style',
    punctuation: 'Punctuation',
    capitalization: 'Capitalization',
    fix: 'Fix',
    noText: 'Please enter some text to check',
  },
  zh: {
    toolTitle: '校对与文本润色工具',
    toolDesc: '检查文本中的语法错误、拼写错误、重复词、大小写问题和风格问题。免费即时，浏览器本地运行。',
    check: '🔍 检查文本',
    clear: '🗑️ 清空',
    copy: '📋 复制修正文本',
    lblInput: '在此粘贴文本',
    words: '单词',
    sentences: '句子',
    issues: '问题数',
    score: '评分',
    issueFound: '个问题',
    noIssues: '✅ 未发现问题 — 你的文本看起来很棒！',
    step1: '在输入框中粘贴或输入文本',
    step2: '点击「检查文本」进行分析',
    step3: '查看文本中高亮显示的问题',
    step4: '点击单独问题的「修复」或手动修改',
    spelling: '拼写',
    grammar: '语法',
    style: '风格',
    punctuation: '标点',
    capitalization: '大小写',
    fix: '修复',
    noText: '请输入要检查的文本',
  }
});

const { $, copyText, t } = GZ;

$('#toolbar').innerHTML = `<button class="gz-btn" id="btn-check">${t('check')}</button><button class="gz-btn secondary" id="btn-copy">${t('copy')}</button><button class="gz-btn secondary" id="btn-clear">${t('clear')}</button>`;
$('#lbl-in').textContent = t('lblInput');

// Common confusions
const homophones = {
  'their are': {fix: "they're are → they are", msg: "Did you mean 'there are'?", type:'grammar'},
  'your welcome': {fix: "your welcome → you're welcome", msg: "Did you mean 'you're welcome'?", type:'grammar'},
  'its a': {fix: "its a → it's a", msg: "Did you mean 'it's a' (it is)?", type:'grammar'},
  ' alot ': {fix: " alot  →  a lot ", msg: "'alot' is not a word — should be 'a lot'", type:'spelling'},
  'could of': {fix: 'could of → could have', msg: "'could of' should be 'could have'", type:'grammar'},
  'should of': {fix: 'should of → should have', msg: "'should of' should be 'should have'", type:'grammar'},
  'would of': {fix: 'would of → would have', msg: "'would of' should be 'would have'", type:'grammar'},
  'definately': {fix: 'definately → definitely', msg: 'Common misspelling: definitely', type:'spelling'},
  'seperate': {fix: 'seperate → separate', msg: 'Common misspelling: separate', type:'spelling'},
  'occured': {fix: 'occured → occurred', msg: 'Common misspelling: occurred', type:'spelling'},
  'recieve': {fix: 'recieve → receive', msg: 'Common misspelling: receive (i before e except after c)', type:'spelling'},
  'untill': {fix: 'untill → until', msg: 'Common misspelling: until', type:'spelling'},
  'accomodate': {fix: 'accomodate → accommodate', msg: 'Common misspelling: accommodate (double c, double m)', type:'spelling'},
  'neccessary': {fix: 'neccessary → necessary', msg: 'Common misspelling: necessary (one c, double s)', type:'spelling'},
  'goverment': {fix: 'goverment → government', msg: 'Common misspelling: government', type:'spelling'},
  'wierd': {fix: 'wierd → weird', msg: 'Common misspelling: weird', type:'spelling'},
  'teh ': {fix: 'teh  → the ', msg: 'Typo: "teh" → "the"', type:'spelling'},
  'hte ': {fix: 'hte  → the ', msg: 'Typo: "hte" → "the"', type:'spelling'},
  'i ': {fix: 'i  → I ', msg: 'Pronoun "I" should be capitalized', type:'capitalization'},
  ' .': {fix: ' . → .', msg: 'Extra space before period', type:'punctuation'},
  ' ,': {fix: ' , → ,', msg: 'Extra space before comma', type:'punctuation'},
  '  ': {fix: '  → ', msg: 'Double space detected', type:'punctuation'},
};

function checkText() {
  const text = $('#input').value;
  if (!text.trim()) { GZ.showToast(t('noText')); return; }
  const issues = [];
  const lower = text.toLowerCase();

  // Check homophones and common errors
  for (const [pattern, info] of Object.entries(homophones)) {
    const idx = lower.indexOf(pattern.toLowerCase().trim());
    if (idx !== -1) {
      // Find all occurrences
      let searchFrom = 0;
      while (true) {
        const foundAt = lower.indexOf(pattern.toLowerCase().trim(), searchFrom);
        if (foundAt === -1) break;
        issues.push({...info, pos: foundAt, len: pattern.trim().length});
        searchFrom = foundAt + 1;
      }
    }
  }

  // Repeated words (e.g., "the the")
  const words = text.split(/\s+/);
  const repeated = [];
  for (let i = 1; i < words.length; i++) {
    if (words[i].toLowerCase().replace(/[.,!?;:]/g,'') === words[i-1].toLowerCase().replace(/[.,!?;:]/g,'') && words[i].length > 0) {
      issues.push({msg: `Repeated word: "${words[i]}"`, type:'grammar', fix: `Remove duplicate "${words[i]}"`});
    }
  }

  // Double punctuation
  if (/[.!?]{2,}/.test(text.replace(/\.\.\./g,''))) {
    issues.push({msg:'Double punctuation detected', type:'punctuation', fix:'Remove duplicate punctuation'});
  }

  // Very long sentences (>40 words)
  const sentences = text.split(/[.!?]+/).filter(s=>s.trim());
  sentences.forEach(s => {
    const wc = s.trim().split(/\s+/).length;
    if (wc > 40) {
      issues.push({msg:`Very long sentence (${wc} words) — consider breaking it up`, type:'style'});
    }
  });

  // Passive voice
  const passiveMatch = text.match(/\b(is|are|was|were|been|being)\s+(\w+ed|\w+en)\b/gi);
  if (passiveMatch) {
    passiveMatch.forEach(m => {
      issues.push({msg:`Possible passive voice: "${m}"`, type:'style'});
    });
  }

  // Stats
  const wordCount = text.trim().split(/\s+/).filter(w=>w).length;
  const sentenceCount = sentences.length;
  const score = Math.max(0, 100 - issues.length * 5);

  $('#stats').innerHTML = `
    <div class="stats-row">
      <div class="stat"><div class="num">${wordCount}</div><div class="lbl">${t('words')}</div></div>
      <div class="stat"><div class="num">${sentenceCount}</div><div class="lbl">${t('sentences')}</div></div>
      <div class="stat"><div class="num">${issues.length}</div><div class="lbl">${t('issues')}</div></div>
      <div class="stat"><div class="num">${score}</div><div class="lbl">${t('score')}</div></div>
    </div>
  `;

  // Show highlighted text
  let html = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  // Simple highlight for common patterns
  html = html.replace(/\b(is|are|was|were|been|being)\s+(\w+ed|\w+en)\b/gi, '<span class="h-style">$&</span>');
  html = html.replace(/  +/g, '<span class="h-punct">$&</span>');
  $('#highlighted').style.display = 'block';
  $('#highlighted').innerHTML = html;

  // Show issues
  if (issues.length === 0) {
    $('#issues').innerHTML = `<div style="text-align:center;padding:20px;color:var(--accent)">${t('noIssues')}</div>`;
  } else {
    $('#issues').innerHTML = issues.map((issue, i) => `
      <div class="issue">
        <span class="type type-${issue.type}">${t(issue.type)}</span>
        <span class="msg">${issue.msg}${issue.fix ? `<br><small style="color:var(--accent)">💡 ${issue.fix}</small>` : ''}</span>
      </div>
    `).join('');
  }
}

$('#btn-check').onclick = checkText;
$('#btn-copy').onclick = () => { copyText($('#input').value); };
$('#btn-clear').onclick = () => { $('#input').value=''; $('#issues').innerHTML=''; $('#stats').innerHTML=''; $('#highlighted').style.display='none'; };

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {href:'/text/grammar.html',icon:'📝',name:'Grammar Checker'},
    {href:'/text/spelling.html',icon:'✏️',name:'Spelling Checker'},
    {href:'/text/readability-checker.html',icon:'📖',name:'Readability Score'},
    {href:'/text/word-counter.html',icon:'📝',name:'Word Counter'},
  ]
});
</script>
