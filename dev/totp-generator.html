  },
  zh: {

    toolDesc: '从密钥生成 TOTP 两步验证码。兼容 Google Authenticator 和 Authy。',
    algorithm: '算法',
    digits: '位数',
    period: '周期',
    generate: '生成验证码',
    copy: '复制验证码',
    secondsLeft: '秒后刷新',
    warningMsg: '⚠️ 安全提示：您的密钥完全在浏览器中处理，不会发送到任何服务器。对于高安全级别的账户，建议使用专用验证器 App。',
    step1: '输入 2FA 设置中提供的 Base32 密钥',
    step2: '选择算法（默认 SHA-1）、位数（6）和周期（30秒）',
    step3: '点击生成验证码获取 TOTP 码',
    step4: '复制验证码并在有效期内使用',
  }

const { $, copyText, t } = GZ;

function buildToolbar() {
  $('#toolbar').innerHTML = `
    <label>${t('algorithm')} <select id="inp-algo">
      <option value="SHA-1">SHA-1</option>
      <option value="SHA-256">SHA-256</option>
      <option value="SHA-512">SHA-512</option>
    </select></label>
    <label>${t('digits')} <select id="inp-digits">
      <option value="6">6</option>
      <option value="8">8</option>
    </select></label>
    <label>${t('period')} <select id="inp-period">
      <option value="30">30s</option>
      <option value="60">60s</option>
    </select></label>
    <button class="gz-btn" onclick="startGenerating()">${t('generate')}</button>
    <button class="gz-btn gz-btn-secondary" onclick="copyCode()">${t('copy')}</button>`;
  $('#warning').textContent = t('warningMsg');
}

let currentCode = '', interval = null;

function base32Decode(str) {
  const alphabet = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ234567';
  str = str.replace(/[\s=-]+/g, '').toUpperCase();
  let bits = '', bytes = [];
  for (const ch of str) {
    const val = alphabet.indexOf(ch);
    if (val === -1) continue;
    bits += val.toString(2).padStart(5, '0');
  }
  for (let i = 0; i + 8 <= bits.length; i += 8) {
    bytes.push(parseInt(bits.substring(i, i + 8), 2));
  }
  return new Uint8Array(bytes);
}

async function generateTOTP() {
  const secret = $('#secret-input').value.trim();
  if (!secret) { $('#code-display').textContent = '------'; return; }

  const algo = $('#inp-algo').value;
  const digits = +$('#inp-digits').value;
  const period = +$('#inp-period').value;

  const key = base32Decode(secret);
  const epoch = Math.floor(Date.now() / 1000);
  const counter = Math.floor(epoch / period);

  // Convert counter to 8-byte buffer
  const counterBuf = new ArrayBuffer(8);
  const counterView = new DataView(counterBuf);
  counterView.setBigUint64(0, BigInt(counter));

  // HMAC
  const cryptoKey = await crypto.subtle.importKey('raw', key, { name: 'HMAC', hash: algo }, false, ['sign']);
  const hmac = new Uint8Array(await crypto.subtle.sign('HMAC', cryptoKey, counterBuf));

  // Dynamic truncation
  const offset = hmac[hmac.length - 1] & 0x0f;
  const binary = ((hmac[offset] & 0x7f) << 24) | (hmac[offset + 1] << 16) | (hmac[offset + 2] << 8) | hmac[offset + 3];
  const otp = binary % Math.pow(10, digits);

  currentCode = otp.toString().padStart(digits, '0');
  $('#code-display').textContent = currentCode;

  // Timer
  const remaining = period - (epoch % period);
  const pct = (remaining / period) * 100;
  $('#timer-bar').style.width = pct + '%';
  $('#timer-bar').style.background = remaining <= 5 ? '#e94560' : '#4ecdc4';
  $('#timer-text').textContent = `${remaining} ${t('secondsLeft')}`;
}

function startGenerating() {
  if (interval) clearInterval(interval);
  generateTOTP();
  interval = setInterval(generateTOTP, 1000);
}

function copyCode() {
  if (currentCode) copyText(currentCode);
}

// Auto-generate if secret is present
$('#secret-input').addEventListener('input', () => {
  if ($('#secret-input').value.trim()) startGenerating();
});
