<script>
GZI18n.register({
  en: {
    toolTitle: 'JavaScript Playground',
    toolDesc: 'Write and run JavaScript code instantly in your browser with live console output. Pure client-side — no server, no signup.',
    run: '▶ Run',
    clear: '🗑 Clear',
    copyCode: '📋 Copy Code',
    example: 'Example',
    step1: 'Write or paste your JavaScript code in the editor',
    step2: 'Click the Run button or press Ctrl+Enter to execute',
    step3: 'View console output and return values in the console panel',
    step4: 'Use console.log(), console.warn(), console.error() for output',
    step5: 'Click Example to load a starter snippet',
  },
  zh: {
    toolTitle: 'JavaScript 在线运行',
    toolDesc: '在浏览器中即时编写和运行 JavaScript 代码，实时查看控制台输出。纯前端执行，无需服务器，无需注册。',
    run: '▶ 运行',
    clear: '🗑 清空',
    copyCode: '📋 复制代码',
    example: '示例',
    step1: '在编辑器中编写或粘贴 JavaScript 代码',
    step2: '点击「运行」按钮或按 Ctrl+Enter 执行',
    step3: '在控制台面板中查看输出和返回值',
    step4: '使用 console.log()、console.warn()、console.error() 输出',
    step5: '点击「示例」按钮加载入门代码',
  }
});

const { $, copyText, t } = GZ;
const consoleEl = $('#console-output');
const inputEl = $('#js-input');

function appendLine(text, cls) {
  const div = document.createElement('div');
  div.className = 'log-line' + (cls ? ' ' + cls : '');
  div.textContent = text;
  consoleEl.appendChild(div);
  consoleEl.scrollTop = consoleEl.scrollHeight;
}

function clearConsole() { consoleEl.innerHTML = ''; }

function runCode() {
  clearConsole();
  const code = inputEl.value;
  if (!code.trim()) return;
  const logs = [];
  const fakeConsole = {
    log: (...a) => { appendLine(a.map(v => typeof v === 'object' ? JSON.stringify(v, null, 2) : String(v)).join(' ')); },
    warn: (...a) => { appendLine(a.map(v => typeof v === 'object' ? JSON.stringify(v, null, 2) : String(v)).join(' '), 'log-warn'); },
    error: (...a) => { appendLine(a.map(v => typeof v === 'object' ? JSON.stringify(v, null, 2) : String(v)).join(' '), 'log-error'); },
    info: (...a) => { appendLine(a.map(v => typeof v === 'object' ? JSON.stringify(v, null, 2) : String(v)).join(' '), 'log-info'); },
    table: (d) => { appendLine(JSON.stringify(d, null, 2)); },
    clear: () => clearConsole(),
  };
  try {
    const fn = new Function('console', code);
    const result = fn(fakeConsole);
    if (result !== undefined) {
      appendLine('← ' + (typeof result === 'object' ? JSON.stringify(result, null, 2) : String(result)), 'log-result');
    }
  } catch(e) {
    appendLine(e.toString(), 'log-error');
  }
}

function loadExample() {
  inputEl.value = `// 🎉 Welcome to JavaScript Playground!
// Write any JS code and hit Run (Ctrl+Enter)

function fibonacci(n) {
  if (n <= 1) return n;
  let a = 0, b = 1;
  for (let i = 2; i <= n; i++) {
    [a, b] = [b, a + b];
  }
  return b;
}

console.log("First 15 Fibonacci numbers:");
const fibs = [];
for (let i = 0; i < 15; i++) fibs.push(fibonacci(i));
console.log(fibs.join(', '));

console.warn("This is a warning example");
console.info("ℹ️ Tip: Use Ctrl+Enter to run");

// The last expression is shown as the return value
fibs.reduce((sum, n) => sum + n, 0);`;
  runCode();
}

function doClear() { inputEl.value = ''; clearConsole(); }

inputEl.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') { e.preventDefault(); runCode(); }
  if (e.key === 'Tab') {
    e.preventDefault();
    const s = inputEl.selectionStart, end = inputEl.selectionEnd;
    inputEl.value = inputEl.value.substring(0, s) + '  ' + inputEl.value.substring(end);
    inputEl.selectionStart = inputEl.selectionEnd = s + 2;
  }
});

inputEl.addEventListener('input', () => {
  const lines = inputEl.value.split('\n').length;
  $('#line-count').textContent = `Ln ${lines}`;
});

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="runCode()">${t('run')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="copyText($('#js-input').value)">${t('copyCode')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

GZ.renderToolPage({
  category: 'dev',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4','step5'],
  related: [
    {icon:'🌐', href:'/text/html-playground.html', name:'HTML Playground'},
    {icon:'🎨', href:'/css-tools/css-playground.html', name:'CSS Playground'},
    {icon:'📝', href:'/dev/json.html', name:'JSON Formatter'},
    {icon:'⚡', href:'/dev/regex.html', name:'Regex Tester'},
  ]
});

loadExample();
</script>
