<script>
GZI18n.register({
  en: {

    toolDesc: 'Compress files into a ZIP archive or extract ZIP files online. Drag, drop and download — 100% in your browser, no upload.',
    tabCompress: '🗜️ Compress to ZIP',
    tabExtract: '📂 Extract ZIP',
    dropCompress: 'Drag and drop files here to compress',

    toolDesc: '在线将文件压缩为 ZIP 或解压 ZIP 文件。拖放即可处理 — 100% 浏览器本地运行，无需上传。',
    tabCompress: '🗜️ 压缩为 ZIP',
    tabExtract: '📂 解压 ZIP',
    dropCompress: '拖放文件到此处进行压缩',
    dropExtract: '拖放 .zip 文件到此处进行解压',
    orClick: '或点击选择文件',
    acceptMultiple: '可选择多个文件',
    acceptZip: '仅接受 .zip 文件',
    createZip: '生成 ZIP',
    extractAll: '全部解压',
    clear: '清空',
    download: '下载',
    remove: '✕',
    noFiles: '尚未添加文件',
    processing: '处理中…',
    zipReady: '✓ ZIP 文件已生成',
    statsCompress: '<b>{n}</b> 个文件 · 原始：<b>{orig}</b> → 压缩后：<b>{comp}</b> · 节省 <b>{ratio}%</b>',
    statsExtract: '已解压 <b>{n}</b> 个文件 · 解压后总大小：<b>{size}</b>',
    invalidZip: '请拖放有效的 .zip 文件',
    step1c: '切换到「压缩」模式，拖放一个或多个文件',
    step2c: '点击「生成 ZIP」，浏览器会将它们打包为一个 .zip 文件',
    step3c: '下载压缩包 — 文件不会上传到任何服务器',
    step1e: '切换到「解压」模式，拖放一个 .zip 文件',
    step2e: '浏览内容并下载任意单个文件',
    step3e: '或点击「全部解压」一次性下载所有文件',
  }
});

const { $, copyText, t } = GZ;
let mode = 'compress';
let pendingFiles = [];      // compress mode: array of File
let extractedEntries = [];  // extract mode: array of {name, size, data: Uint8Array}
let lastZipBlob = null;

function fmtBytes(b) {
  if (b === 0) return '0 B';
  const u = ['B','KB','MB','GB','TB'];
  const i = Math.floor(Math.log(b) / Math.log(1024));
  return (b / Math.pow(1024, i)).toFixed(i === 0 ? 0 : 1) + ' ' + u[i];
}

function updateUI() {
  $('#dropIcon').textContent = mode === 'compress' ? '🗜️' : '📂';
  $('#dropText').textContent = t(mode === 'compress' ? 'dropCompress' : 'dropExtract');
  $('#hintText').textContent = t(mode === 'compress' ? 'acceptMultiple' : 'acceptZip');
  $('#fileInput').accept = mode === 'extract' ? '.zip,application/zip,application/x-zip-compressed' : '';
  $('#fileInput').multiple = mode === 'compress';
  $('#tab-compress').classList.toggle('active', mode === 'compress');
  $('#tab-extract').classList.toggle('active', mode === 'extract');
  renderList();
  renderToolbar();
}

function renderToolbar() {
  const parts = [];
  if (mode === 'compress') {
    if (pendingFiles.length) {
      parts.push(`<button class="gz-btn" onclick="createZip()">${t('createZip')}</button>`);
    }
  } else {
    if (extractedEntries.length) {
      parts.push(`<button class="gz-btn" onclick="extractAll()">${t('extractAll')}</button>`);
    }
  }
  if (pendingFiles.length || extractedEntries.length) {
    parts.push(`<button class="gz-btn gz-btn-secondary" onclick="clearAll()">${t('clear')}</button>`);
  }
  $('#toolbar').innerHTML = parts.join('');
}

function renderList() {
  const list = $('#fileList');
  if (mode === 'compress') {
    if (!pendingFiles.length) { list.innerHTML = ''; $('#stats').style.display = 'none'; return; }
    list.innerHTML = pendingFiles.map((f, i) => `
      <li>
        <span>📄</span>
        <span class="fic" title="${escapeAttr(f.name)}">${escapeHtml(f.name)}</span>
        <span class="fsize-in">${fmtBytes(f.size)}</span>
        <button class="rm" title="${t('remove')}" onclick="removeFile(${i})">${t('remove')}</button>
      </li>`).join('');
  } else {
    if (!extractedEntries.length) { list.innerHTML = ''; $('#stats').style.display = 'none'; return; }
    list.innerHTML = extractedEntries.map((e, i) => `
      <li>
        <span>${e.dir ? '📁' : '📄'}</span>
        <span class="fic" title="${escapeAttr(e.name)}">${escapeHtml(e.name)}</span>
        <span class="fsize-in">${e.dir ? '—' : fmtBytes(e.size)}</span>
        ${e.dir ? '' : `<button class="dl" onclick="downloadEntry(${i})">${t('download')}</button>`}
      </li>`).join('');
  }
}

function escapeHtml(s) { return String(s).replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
function escapeAttr(s) { return escapeHtml(s).replace(/"/g, '&quot;'); }

function removeFile(i) { pendingFiles.splice(i, 1); renderList(); renderToolbar(); }
function clearAll() {
  pendingFiles = [];
  extractedEntries = [];
  lastZipBlob = null;
  $('#fileInput').value = '';
  renderList(); renderToolbar();
}

async function handleFiles(files) {
  if (mode === 'compress') {
    for (const f of files) pendingFiles.push(f);
    renderList(); renderToolbar();
  } else {
    const zipFile = Array.from(files).find(f => f.name.toLowerCase().endsWith('.zip') || f.type.includes('zip'));
    if (!zipFile) { alert(t('invalidZip')); return; }
    await extractZip(zipFile);
  }
}

async function extractZip(file) {
  showProgress(true);
  try {
    const buf = new Uint8Array(await file.arrayBuffer());
    // fflate's unzipSync is synchronous; show pseudo-progress before/after
    $('#progressBar').style.width = '40%';
    // Yield to let the bar repaint, then run the (potentially heavy) sync call
    await new Promise(r => setTimeout(r, 30));
    $('#progressBar').style.width = '70%';
    const result = fflate.unzipSync(buf);
    extractedEntries = [];
    let totalSize = 0;
    for (const [name, data] of Object.entries(result)) {
      const isDir = name.endsWith('/');
      extractedEntries.push({ name, size: isDir ? 0 : data.byteLength, data: isDir ? null : data, dir: isDir });
      totalSize += data.byteLength;
    }
    extractedEntries.sort((a, b) => a.name.localeCompare(b.name));
    $('#progressBar').style.width = '100%';
    $('#stats').innerHTML = t('statsExtract').replace('{n}', extractedEntries.filter(e => !e.dir).length)
      .replace('{size}', fmtBytes(totalSize));
    $('#stats').style.display = 'block';
    renderList(); renderToolbar();
  } catch (e) {
    alert(t('invalidZip') + '\n' + e.message);
  }
  showProgress(false);
}

function downloadEntry(i) {
  const e = extractedEntries[i];
  if (!e || e.dir) return;
  const blob = new Blob([e.data], { type: 'application/octet-stream' });
  triggerDownload(blob, e.name.split('/').pop());
}

function extractAll() {
  extractedEntries.filter(e => !e.dir).forEach((e, idx) => {
    setTimeout(() => downloadEntry(extractedEntries.indexOf(e)), idx * 150);
  });
}

async function createZip() {
  if (!pendingFiles.length) return;
  showProgress(true);
  try {
    const obj = {};
    const nameCount = {};
    let totalOrig = 0;
    for (let i = 0; i < pendingFiles.length; i++) {
      const f = pendingFiles[i];
      totalOrig += f.size;
      $('#progressBar').style.width = Math.round(((i + 0.5) / pendingFiles.length) * 80) + '%';
      // Avoid duplicate names by suffixing
      let name = f.name;
      if (nameCount[name] !== undefined) {
        const dot = name.lastIndexOf('.');
        nameCount[name]++;
        name = dot > 0 ? name.slice(0, dot) + ' (' + nameCount[name] + ')' + name.slice(dot)
                       : name + ' (' + nameCount[name] + ')';
      } else {
        nameCount[name] = 0;
      }
      obj[name] = new Uint8Array(await f.arrayBuffer());
    }
    // fflate.zipSync is synchronous; allow a paint tick first
    await new Promise(r => setTimeout(r, 20));
    const zipped = fflate.zipSync(obj, { level: 6 });
    lastZipBlob = new Blob([zipped], { type: 'application/zip' });
    $('#progressBar').style.width = '100%';
    const compSize = lastZipBlob.size;
    const ratio = totalOrig > 0 ? Math.max(0, Math.round((1 - compSize / totalOrig) * 100)) : 0;
    $('#stats').innerHTML = t('statsCompress')
      .replace('{n}', pendingFiles.length)
      .replace('{orig}', fmtBytes(totalOrig))
      .replace('{comp}', fmtBytes(compSize))
      .replace('{ratio}', ratio);
    $('#stats').style.display = 'block';
    triggerDownload(lastZipBlob, makeZipName());
    renderToolbar();
  } catch (e) {
    alert('Error: ' + e.message);
  }
  showProgress(false);
}

function makeZipName() {
  const d = new Date();
  const pad = n => String(n).padStart(2, '0');
  return `archive-${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}-${pad(d.getHours())}${pad(d.getMinutes())}.zip`;
}

function triggerDownload(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 200);
}

function showProgress(on) {
  $('#progress').style.display = on ? 'block' : 'none';
  if (on) $('#progressBar').style.width = '0%';
}

// Wire up events
$('#tab-compress').onclick = () => { mode = 'compress'; clearAll(); updateUI(); };
$('#tab-extract').onclick = () => { mode = 'extract'; clearAll(); updateUI(); };

$('#dropZone').onclick = () => $('#fileInput').click();
$('#fileInput').onchange = (e) => { if (e.target.files.length) handleFiles(e.target.files); };

const dz = $('#dropZone');
['dragenter','dragover'].forEach(ev => dz.addEventListener(ev, e => { e.preventDefault(); dz.classList.add('dragover'); }));
['dragleave','drop'].forEach(ev => dz.addEventListener(ev, e => { e.preventDefault(); dz.classList.remove('dragover'); }));
dz.addEventListener('drop', e => {
  if (e.dataTransfer.files.length) handleFiles(e.dataTransfer.files);
});

$('#tab-compress').textContent = t('tabCompress');
$('#tab-extract').textContent = t('tabExtract');

GZ.renderToolPage({
  category: 'convert',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1c','step2c','step3c'],
  related: [
    {icon:'📄', href:'/convert/pdf-merger.html', name:'PDF Merger'},
    {icon:'🗜️', href:'/convert/gif-compressor.html', name:'GIF Compressor'},
    {icon:'🔐', href:'/dev/base64.html', name:'Base64'},
    {icon:'📄', href:'/convert/pdf-compressor.html', name:'PDF Compressor'},
  ]
});

updateUI();
</script>
