<script>
GZI18n.register({
  en: {
    toolTitle: 'Braille Translator',
    toolDesc: 'Convert text to Unicode braille characters and braille back to text. Grade 1 (uncontracted) braille for education and accessibility.',
    lblText: 'Text → Braille',
    lblBraille: 'Braille → Text',
    toBraille: 'To Braille',

    copy: 'Copy',

    example: 'Example',
    info: 'Braille uses a 6-dot cell. Each dot position (1–6) maps to a binary code. Letters a–j share their pattern with digits 1–0 (preceded by the number sign ⠼). Capital letters are preceded by ⠠.',
    step1: 'Type or paste text in the left field to convert to braille',
    step2: 'Or paste braille characters in the right field to decode',
    step3: 'Use Copy to copy the braille to your clipboard',
    step4: 'Great for education, accessibility testing, and learning braille',
  },
  zh: {
    toolTitle: '盲文翻译器',
    toolDesc: '将文字转换为 Unicode 盲文字符，或将盲文转换回文字。支持一级（非缩写）盲文，适合教育和无障碍。',
    lblText: '文字 → 盲文',
    lblBraille: '盲文 → 文字',
    toBraille: '转盲文',
    toText: '转文字',
    copy: '复制',
    clear: '清空',
    example: '示例',
    info: '盲文使用 6 点单元格，每个点位置（1–6）映射到一个二进制代码。字母 a–j 与数字 1–0 共享模式（数字前加 ⠼ 符号）。大写字母前加 ⠠。',
    step1: '在左侧输入文字转换为盲文',
    step2: '或在右侧粘贴盲文字符进行解码',
    step3: '使用「复制」将盲文复制到剪贴板',
    step4: '适合教育、无障碍测试和学习盲文',
  }
});

const { $, copyText, t } = GZ;

// Unicode braille: U+2800 + 6-bit pattern
// Dots: 1(top-left),2,3(bottom-left),4(top-right),5,6(bottom-right)
// Standard mapping
const brailleMap = {
  ' ':'⠀','a':'⠁','b':'⠃','c':'⠉','d':'⠙','e':'⠑','f':'⠋','g':'⠛','h':'⠓','i':'⠊','j':'⠚',
  'k':'⠅','l':'⠇','m':'⠍','n':'⠝','o':'⠕','p':'⠏','q':'⠟','r':'⠗','s':'⠎','t':'⠞',
  'u':'⠥','v':'⠧','w':'⠺','x':'⠭','y':'⠽','z':'⠵',
  '.':'⠲',',':'⠂',';':'⠆',':':'⠒','!':'⠮','?':'⠦','(':'⠷',')':'⠾','-':'⠤','\'':'⠄','"':'⠶',
  '#':'⠼','@':'⠈','*':'⠡','/':'⠌','+':'⠖','=':'⠶',
};
const reverseMap = {};
for (const [k,v] of Object.entries(brailleMap)) reverseMap[v] = k;

// Number indicator
const NUM_SIGN = '⠼';
const CAP_SIGN = '⠠';
const numToLetter = {'0':'j','1':'a','2':'b','3':'c','4':'d','5':'e','6':'f','7':'g','8':'h','9':'i'};
const letterToNum = {};
for (const [k,v] of Object.entries(numToLetter)) letterToNum[v] = k;

function textToBraille(text) {
  let result = '';
  let inNumber = false;
  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    const lower = ch.toLowerCase();
    if (/[0-9]/.test(ch)) {
      if (!inNumber) { result += NUM_SIGN; inNumber = true; }
      result += brailleMap[numToLetter[ch]] || ch;
    } else {
      inNumber = false;
      if (/[a-z]/i.test(ch)) {
        if (ch === ch.toUpperCase() && lower !== ch) {
          result += CAP_SIGN;
        }
        result += brailleMap[lower] || ch;
      } else {
        result += brailleMap[ch] || ch;
      }
    }
  }
  return result;
}

function brailleToText(braille) {
  let result = '';
  let inNumber = false;
  let nextUpper = false;
  for (let i = 0; i < braille.length; i++) {
    const ch = braille[i];
    if (ch === NUM_SIGN) { inNumber = true; continue; }
    if (ch === CAP_SIGN) { nextUpper = true; continue; }
    if (ch === '⠀' || ch === ' ') { result += ' '; inNumber = false; nextUpper = false; continue; }
    const mapped = reverseMap[ch];
    if (!mapped) { result += ch; inNumber = false; nextUpper = false; continue; }
    if (inNumber && letterToNum[mapped]) {
      result += letterToNum[mapped];
    } else {
      inNumber = false;
      result += nextUpper ? mapped.toUpperCase() : mapped;
      nextUpper = false;
    }
  }
  return result;
}

$('#textInput').addEventListener('input', function() {
  const text = this.value;
  $('#brailleInput').value = textToBraille(text);
  $('#preview').textContent = textToBraille(text);
});

$('#brailleInput').addEventListener('input', function() {
  const braille = this.value;
  $('#textInput').value = brailleToText(braille);
  $('#preview').textContent = braille;
});

$('#info').textContent = t('info');

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="copyText($('#brailleInput').value)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

function loadExample() {
  $('#textInput').value = 'Hello World 2026';
  $('#textInput').dispatchEvent(new Event('input'));
}
function doClear() {
  $('#textInput').value = '';
  $('#brailleInput').value = '';
  $('#preview').textContent = '';
}

  ]
});
</script>
