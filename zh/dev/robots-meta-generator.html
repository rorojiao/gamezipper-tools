<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity": [{"@type":"Question","name":"What is a robots meta tag?","acceptedAnswer":{"@type":"Answer","text":"A robots meta tag is an HTML <meta> element that tells search engines how to crawl and index a specific page. Unlike robots.txt which applies to a whole site, robots meta tags are page-level controls."}}, {"@type":"Question","name":"What is the difference between noindex and nofollow?","acceptedAnswer":{"@type":"Answer","text":"noindex tells search engines not to include the page in their index (it won't appear in search results). nofollow tells them not to follow the links on that page to other pages. They can be combined: noindex, nofollow hides both the page and its outbound link equity."}}, {"@type":"Question","name":"Should I use noindex on every page?","acceptedAnswer":{"@type":"Answer","text":"No. Only use noindex on pages you don't want in search results: admin pages, internal search results, thank-you pages, draft content, staging environments. Indexable pages like articles, products and home pages should remain indexable."}}, {"@type":"Question","name":"Is robots meta tag the same as robots.txt?","acceptedAnswer":{"@type":"Answer","text":"No. robots.txt is a file at the site root that controls crawling for entire directories. The robots meta tag is per-page. Use robots.txt to block crawling of /admin/ and robots meta tag to hide a single thank-you page."}}]}</script>

<div class="gz-container">

          <label><input type="radio" name="index" value="index" checked> index — allow indexing</label>
          <label><input type="radio" name="index" value="noindex"> noindex — block from index</label>
        </div>
      </div>
      <div class="rm-option">
        <h3>🔗 Link Following</h3>
        <div class="opts">
          <label><input type="radio" name="follow" value="follow" checked> follow — follow links</label>
          <label><input type="radio" name="follow" value="nofollow"> nofollow — block link equity</label>
        </div>
      </div>
      <div class="rm-option">
        <h3>📦 Snippets</h3>
        <div class="opts">
          <label><input type="radio" name="snippet" value="all" checked> all — show snippet + thumbnail</label>
          <label><input type="radio" name="snippet" value="snippet"> snippet — text only</label>
          <label><input type="radio" name="snippet" value="nosnippet"> nosnippet — no snippet</label>
        </div>
      </div>
      <div class="rm-option">
        <h3>🖼️ Image Indexing</h3>
        <div class="opts">
          <label><input type="checkbox" id="noimageindex"> noimageindex — block images</label>
        </div>
      </div>
      <div class="rm-option">
        <h3>🗄️ Cache / Archive</h3>
        <div class="opts">
          <label><input type="checkbox" id="noarchive"> noarchive — no cached copy</label>
          <label><input type="checkbox" id="nocache"> nocache — no cache + no archive</label>
          <label><input type="checkbox" id="unavailable_after"> unavailable_after — expires</label>
        </div>
      </div>
      <div class="rm-option">
        <h3>🌐 Translate</h3>
        <div class="opts">
          <label><input type="radio" name="translate" value="all" checked> all — allow translation</label>
          <label><input type="radio" name="translate" value="notranslate"> notranslate</label>
        </div>
      </div>
      <div class="rm-option">
        <h3>📊 Max Snippet</h3>
        <div class="opts">
          <label><input type="number" id="max-snippet" value="-1" min="-1" max="320"> chars (-1 = no limit, 0 = none)</label>
        </div>
      </div>
      <div class="rm-option">
        <h3>🖼️ Max Image Preview</h3>
        <div class="opts">
          <select id="max-image-preview">
            <option value="">none</option>
            <option value="standard" selected>standard</option>
            <option value="large">large</option>
            <option value="none">none (no preview)</option>
          </select>
        </div>
      </div>
      <div class="rm-option">
        <h3>🎬 Max Video Preview</h3>
        <div class="opts">
          <select id="max-video-preview">
            <option value="">none</option>
            <option value="-1" selected>-1 (full)</option>
            <option value="0">0 (none)</option>
            <option value="1">1 second</option>
            <option value="2">2 seconds</option>
            <option value="3">3 seconds</option>

    <div class="rm-field">

    </div>
    <div class="rm-field">
      <label id="lbl-googlebot">Optional: Googlebot-specific tag (for Google only)</label>
      <div><label><input type="checkbox" id="googlebot-enabled"> Generate separate googlebot meta tag</label></div>

<script>
GZI18n.register({
  en: {
    toolTitle: 'Robots Meta Tag Generator',
    toolDesc: 'Visually build robots meta tags to control how Google and other search engines crawl, index and display your pages.',
    expires: 'Unavailable After (YYYY-MM-DD or ISO 8601, optional)',
    googlebot: 'Optional: Googlebot-specific tag (for Google only)',
    output: 'Generated Robots Meta Tags',
    presetIndexable: 'Indexable page (default)',
    presetNoIndex: 'Noindex page (admin/thanks)',
    presetNoFollow: 'Nofollow (links don\'t pass equity)',
    presetNoArchive: 'Noarchive (no Google cache)',
    presetArticle: 'Article (index, follow, large preview)',
    step1: 'Pick a preset or configure each option',
    step2: 'Adjust indexing, following, snippets and cache controls',
    step3: 'Add Googlebot-specific directives if needed',
    step4: 'Copy the generated meta tags into your page <head>',
  },
  zh: {
    toolTitle: 'Robots 元标签生成器',
    toolDesc: '可视化生成 robots 元标签，控制 Google 和其他搜索引擎如何抓取、索引和展示你的页面。',
    expires: '失效时间（YYYY-MM-DD 或 ISO 8601，可选）',
    googlebot: '可选：Googlebot 专用标签（仅对 Google 生效）',
    output: '生成的 Robots 元标签',
    presetIndexable: '可索引页面（默认）',
    presetNoIndex: '禁止索引页面（管理/感谢页）',
    presetNoFollow: '禁止跟随（链接不传递权重）',
    presetNoArchive: '禁止存档（无 Google 缓存）',
    presetArticle: '文章（索引、跟随、大预览）',
    step1: '选择预设或自定义每个选项',
    step2: '调整索引、跟随、摘要和缓存控制',
    step3: '如需可添加 Googlebot 专用指令',
    step4: '将生成的 meta 标签复制到页面 <head>',
  }
});

const { t, $, copyText } = GZ;

function getRadio(name) {
  const els = document.querySelectorAll(`input[name="${name}"]:checked`);
  return els.length ? els[0].value : '';
}

function build() {
  const index = getRadio('index');
  const follow = getRadio('follow');
  const snippet = getRadio('snippet');
  const translate = getRadio('translate');
  const noimage = $('#noimageindex').checked;
  const noarchive = $('#noarchive').checked;
  const nocache = $('#nocache').checked;
  const useExpires = $('#unavailable_after').checked;
  const expires = $('#expires-input').value.trim();
  const googlebotEnabled = $('#googlebot-enabled').checked;
  const maxSnippet = $('#max-snippet').value;
  const maxImage = $('#max-image-preview').value;
  const maxVideo = $('#max-video-preview').value;

  // Build main directive
  const parts = [];
  parts.push(index);
  parts.push(follow);
  if (snippet && snippet !== 'all') parts.push(snippet);
  if (noimage) parts.push('noimageindex');
  if (noarchive) parts.push('noarchive');
  if (nocache) parts.push('nocache');
  if (translate === 'notranslate') parts.push('notranslate');
  if (maxSnippet !== '' && maxSnippet !== '-1') parts.push(`max-snippet:${maxSnippet}`);
  if (maxImage) parts.push(`max-image-preview:${maxImage}`);
  if (maxVideo) parts.push(`max-video-preview:${maxVideo}`);
  if (useExpires && expires) parts.push(`unavailable_after:${expires}`);

  const mainTag = `<meta name="robots" content="${parts.join(', ')}">`;
  let output = mainTag;
  if (googlebotEnabled) {
    const gParts = [...parts];
    // Googlebot-specific: replace 'robots' tag settings with 'googlebot'
    output += '\n' + `<meta name="googlebot" content="${gParts.join(', ')}">`;
  }
  $('#rmoutput').value = output;
}

function applyPreset(preset) {
  if (preset === 'indexable') {
    document.querySelector('input[name="index"][value="index"]').checked = true;
    document.querySelector('input[name="follow"][value="follow"]').checked = true;
    document.querySelector('input[name="snippet"][value="all"]').checked = true;
    $('#noimageindex').checked = false;
    $('#noarchive').checked = false;
    $('#nocache').checked = false;
    document.querySelector('input[name="translate"][value="all"]').checked = true;
    $('#max-snippet').value = -1;
    $('#max-image-preview').value = 'standard';
    $('#max-video-preview').value = '-1';
    $('#googlebot-enabled').checked = false;
  } else if (preset === 'noindex') {
    document.querySelector('input[name="index"][value="noindex"]').checked = true;
    document.querySelector('input[name="follow"][value="follow"]').checked = true;
    document.querySelector('input[name="snippet"][value="all"]').checked = true;
    $('#noimageindex').checked = false;
    $('#noarchive').checked = false;
    $('#nocache').checked = false;
    document.querySelector('input[name="translate"][value="all"]').checked = true;
    $('#googlebot-enabled').checked = false;
  } else if (preset === 'nofollow') {
    document.querySelector('input[name="index"][value="index"]').checked = true;
    document.querySelector('input[name="follow"][value="nofollow"]').checked = true;
    document.querySelector('input[name="snippet"][value="all"]').checked = true;
    $('#googlebot-enabled').checked = false;
  } else if (preset === 'noarchive') {
    document.querySelector('input[name="index"][value="index"]').checked = true;
    document.querySelector('input[name="follow"][value="follow"]').checked = true;
    document.querySelector('input[name="snippet"][value="all"]').checked = true;
    $('#noarchive').checked = true;
    $('#googlebot-enabled').checked = false;
  } else if (preset === 'article') {
    document.querySelector('input[name="index"][value="index"]').checked = true;
    document.querySelector('input[name="follow"][value="follow"]').checked = true;
    document.querySelector('input[name="snippet"][value="all"]').checked = true;
    $('#noimageindex').checked = false;
    $('#noarchive').checked = false;
    $('#nocache').checked = false;
    document.querySelector('input[name="translate"][value="all"]').checked = true;
    $('#max-snippet').value = -1;
    $('#max-image-preview').value = 'large';
    $('#max-video-preview').value = '-1';
    $('#googlebot-enabled').checked = false;
  }
  build();
}

// Wire up all inputs
document.querySelectorAll('input, select').forEach(el => {
  if (el.id === 'expires-input') return; // handled by checkbox
  if (el.type === 'radio' || el.type === 'checkbox' || el.tagName === 'SELECT' || el.type === 'number') {
    el.addEventListener('change', build);
    if (el.type === 'number') el.addEventListener('input', build);
  }
});
$('#expires-input').addEventListener('input', build);

$('#lbl-expires').textContent = t('expires');
$('#lbl-googlebot').textContent = t('googlebot');
$('#lbl-out').textContent = t('output');

$('#presets').innerHTML = `
  <button class="gz-btn gz-btn-secondary" onclick="applyPreset('indexable')">${t('presetIndexable')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="applyPreset('noindex')">${t('presetNoIndex')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="applyPreset('nofollow')">${t('presetNoFollow')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="applyPreset('noarchive')">${t('presetNoArchive')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="applyPreset('article')">${t('presetArticle')}</button>`;

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="copyText($('#rmoutput').value)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#rmoutput').value=''">${t('clear')}</button>`;

GZ.renderToolPage({
  category: 'dev',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📘', href:'/dev/og-meta-generator.html', name: 'OG Meta Generator'},
    {icon:'🐦', href:'/dev/twitter-card-generator.html', name: 'Twitter Card Generator'},
    {icon:'🤖', href:'/seo/robots-txt-validator.html', name: 'Robots.txt Validator'},
    {icon:'📊', href:'/seo/google-serp-preview.html', name: 'Google SERP Preview'},
  ]
});

build();
</script>
<script src="/tools-result-rec.js?v=20260707v520" defer></script>
</body>
