<script type="application/ld+json">{"@context":"https://schema.org","@type":"WebApplication","name":"Coffee-to-Water Ratio Calculator","description":"Get the exact grams of coffee and water for any brew method — drip, espresso, French press, pour over, AeroPress, cold brew and more.","url":"https://tools.gamezipper.com/calc/coffee-to-water.html","applicationCategory":"Utility","operatingSystem":"Web Browser","offers":{"@type":"Offer","price":"0"}}</script>
<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is the golden coffee-to-water ratio?", "acceptedAnswer": {"@type": "Answer", "text": "The Specialty Coffee Association (SCA) recommends a 1:18 ratio (1 gram of coffee per 18 grams of water) for a balanced brew. Stronger brews use 1:15, and lighter brews use up to 1:17. The classic 'golden ratio' is 1:16."}}, {"@type": "Question", "name": "How many grams of coffee per cup?", "acceptedAnswer": {"@type": "Answer", "text": "For a standard 8 oz (240 ml, ~240 g) cup at 1:16, use about 15 grams (2 tablespoons) of ground coffee. A 12 oz mug needs ~22 g, and a 16 oz travel mug needs ~30 g."}}, {"@type": "Question", "name": "Why measure coffee in grams instead of scoops?", "acceptedAnswer": {"@type": "Answer", "text": "Coffee density varies a lot by roast and grind size, so a 'scoop' can be 5–12 grams. Weighing in grams is consistent and reproducible — that is why specialty baristas always use a scale."}}, {"@type": "Question", "name": "What ratio should I use for espresso?", "acceptedAnswer": {"@type": "Answer", "text": "Espresso uses a much tighter brew ratio — typically 1:2 (e.g. 18 g of coffee in, 36 g of espresso out in 25–30 seconds). Cold brew concentrates use 1:4 to 1:8 for a strong base you dilute before drinking."}}]}</script>

      <div class="cw-row">

      </div>
      <div>
        <label id="lbl-ratio"></label>
        <div style="display:flex;gap:8px;align-items:center">
          <input type="number" id="ratioCoffee" value="1" min="0.1" step="0.1" style="width:90px">
          <span style="font-weight:800;color:var(--accent)">:</span>
          <input type="number" id="ratioWater" value="16" min="0.1" step="0.1" style="width:90px">

    <div class="cw-ratio">

      <div class="cw-card"><div class="lbl" id="l-coffee"></div><div class="val" id="out-coffee"></div><div class="sub" id="sub-coffee"></div></div>
      <div class="cw-card"><div class="lbl" id="l-water"></div><div class="val" id="out-water"></div><div class="sub" id="sub-water"></div></div>
    </div>

<script>
GZI18n.register({
  en: {
    toolTitle: 'Coffee-to-Water Ratio Calculator',
    toolDesc: 'Get the exact grams of coffee and water for drip, espresso, French press, pour over, AeroPress, cold brew and more — the perfect brew ratio every time.',
    lblMethod: 'Brew method',
    lblTarget: 'I want to set',
    lblAmount: 'Amount',
    lblRatio: 'Brew ratio (coffee : water)',
    lblStrength: 'Strength',
    optWater: 'Final brew volume (g / ml)',
    optCoffee: 'Coffee dose (g)',
    optCups: 'Number of cups (8 oz each)',
    strengthLight: 'Light',
    strengthNormal: 'Normal',
    strengthStrong: 'Strong',
    outCoffee: 'Coffee needed',
    outWater: 'Water needed',
    step1: 'Pick your brew method — it loads the recommended ratio',
    step2: 'Choose what you want to set: total water, coffee dose, or number of cups',
    step3: 'Enter your amount and pick a strength',
    step4: 'Read the exact grams of coffee and water to use',
  },
  zh: {
    toolTitle: '咖啡粉水比计算器',
    toolDesc: '为滴滤、意式、法压、手冲、爱乐压、冷萃、摩卡壶等冲煮方式提供精确的咖啡粉和水用量 — 每次都得到完美的粉水比。',
    lblMethod: '冲煮方式',
    lblTarget: '我要设定',
    lblAmount: '数量',
    lblRatio: '粉水比 (咖啡 : 水)',
    lblStrength: '浓度',
    optWater: '最终冲煮液量 (g / ml)',
    optCoffee: '咖啡粉用量 (g)',
    optCups: '杯数 (每杯 240ml)',
    strengthLight: '清淡',
    strengthNormal: '标准',
    strengthStrong: '浓郁',
    outCoffee: '所需咖啡粉',
    outWater: '所需水量',
    step1: '选择冲煮方式 — 自动加载推荐粉水比',
    step2: '选择你要设定的量：总水量、咖啡粉或杯数',
    step3: '输入数量并选择浓度',
    step4: '查看精确的咖啡粉和水的用量',
  }
});

const { t } = GZ;
const lang = GZI18n.getLang();

// Brew method presets: {ratioCoffee, ratioWater, notes}
const METHODS = [
  { id:'drip',       en:'Drip / Filter',       zh:'滴滤 / 滤纸',     rc:1, rw:17,  noteEn:'A 1:17 ratio produces a clean, balanced cup. A paper filter removes oils for a bright taste.', noteZh:'1:17 比例冲出干净平衡的咖啡。滤纸吸附油脂，口感明亮。' },
  { id:'pour',       en:'Pour Over',            zh:'手冲',           rc:1, rw:16,  noteEn:'The classic 1:16 golden ratio. Bloom 30s with 2x coffee weight in water, then pour in spirals.', noteZh:'经典的 1:16 黄金比例。先用 2 倍咖啡重量的水闷蒸 30 秒，再螺旋注水。' },
  { id:'french',     en:'French Press',         zh:'法压壶',         rc:1, rw:15,  noteEn:'A 1:15 ratio gives a full-bodied brew. Steep 4 minutes, then press slowly.', noteZh:'1:15 比例口感饱满。浸泡 4 分钟后缓慢下压。' },
  { id:'espresso',   en:'Espresso',             zh:'意式浓缩',       rc:1, rw:2,   noteEn:'A 1:2 brew ratio pulls a double shot in 25–30s (e.g. 18g in → 36g out).', noteZh:'1:2 粉水比在 25–30 秒内萃出一份双份浓缩（如 18g 进 → 36g 出）。' },
  { id:'aeropress',  en:'AeroPress',            zh:'爱乐压',         rc:1, rw:14,  noteEn:'A 1:14 ratio is rich and syrupy. Invert for 90s, then press for 30s.', noteZh:'1:14 比例浓郁顺滑。倒置浸泡 90 秒，再下压 30 秒。' },
  { id:'moka',       en:'Moka Pot',             zh:'摩卡壶',         rc:1, rw:10,  noteEn:'A 1:10 ratio yields a strong, espresso-like brew. Use medium-fine grind.', noteZh:'1:10 比例冲出类似意式的浓咖啡。建议中细研磨。' },
  { id:'cold',       en:'Cold Brew Concentrate',zh:'冷萃浓缩',       rc:1, rw:5,   noteEn:'A 1:5 ratio makes a concentrate — steep 16–24h, then dilute 1:1 with water or milk.', noteZh:'1:5 比例制作浓缩液 — 浸泡 16–24 小时，再按 1:1 加水或牛奶稀释。' },
  { id:'percolator', en:'Percolator',           zh:'渗滤壶',         rc:1, rw:15,  noteEn:'A 1:15 ratio suits stovetop percolators. Avoid re-cycling the brew too long or it turns bitter.', noteZh:'1:15 比例适合炉灶渗滤壶。避免反复循环太久否则会变苦。' },
  { id:'turkish',    en:'Turkish',              zh:'土耳其咖啡',     rc:1, rw:12,  noteEn:'A 1:12 ratio with extra-fine powder. Simmer (never boil) 3 times in a cezve.', noteZh:'1:12 比例搭配极细粉。在 cezve 中加热至将沸（勿滚煮）反复 3 次。' },
];

const STRENGTHS = { light: 1.2, normal: 1.0, strong: 0.85 }; // multiplier on water ratio (lower rw = stronger)
const CUP_ML = 240; // 1 cup = 8 oz

function fillMethodOptions() {
  const sel = document.getElementById('method');
  sel.innerHTML = METHODS.map((m,i) => `<option value="${i}">${lang==='zh'?m.zh:m.en}</option>`).join('');
}

function loadMethodPreset() {
  const m = METHODS[+document.getElementById('method').value];
  // strength multiplier
  const st = document.querySelector('.cw-strength button.active').dataset.s;
  const mult = STRENGTHS[st];
  document.getElementById('ratioCoffee').value = m.rc;
  document.getElementById('ratioWater').value = Math.round(m.rw * mult * 10) / 10;
}

function fmtG(g) {
  if (g >= 1000) return (g/1000).toFixed(2) + ' kg';
  return (Math.round(g * 10) / 10).toLocaleString() + ' g';
}

function fmtVol(ml) {
  if (ml >= 1000) return (ml/1000).toFixed(2) + ' L';
  return Math.round(ml).toLocaleString() + ' ml';
}

function render() {
  const target = document.getElementById('target').value;
  const amount = parseFloat(document.getElementById('amount').value) || 0;
  const rc = parseFloat(document.getElementById('ratioCoffee').value) || 1;
  const rw = parseFloat(document.getElementById('ratioWater').value) || 1;
  const m = METHODS[+document.getElementById('method').value];
  const st = document.querySelector('.cw-strength button.active').dataset.s;

  let water = 0, coffee = 0;
  if (target === 'water') {
    water = amount;
    coffee = water * rc / rw;
  } else if (target === 'coffee') {
    coffee = amount;
    water = coffee * rw / rc;
  } else { // cups
    water = amount * CUP_ML;
    coffee = water * rc / rw;
  }
  // Update label of amount field
  const lbl = document.getElementById('lbl-amount');
  if (target === 'water') lbl.textContent = lang==='zh' ? '冲煮液量 (g / ml)' : 'Brew volume (g / ml)';
  else if (target === 'coffee') lbl.textContent = lang==='zh' ? '咖啡粉 (g)' : 'Coffee dose (g)';
  else lbl.textContent = lang==='zh' ? '杯数 (每杯 240ml)' : 'Number of cups (8 oz each)';

  document.getElementById('out-coffee').textContent = fmtG(coffee);
  document.getElementById('out-water').textContent = fmtVol(water);
  document.getElementById('r-coffee').textContent = fmtG(coffee).replace(' g','').replace(' kg','');
  document.getElementById('r-water').textContent = Math.round(water);
  document.getElementById('sub-coffee').textContent = lang==='zh' ? `约 ${coffee>0?(coffee/15).toFixed(1):0} 汤匙` : `~${coffee>0?(coffee/15).toFixed(1):0} tbsp`;
  document.getElementById('sub-water').textContent = lang==='zh' ? `约 ${(water/CUP_ML).toFixed(1)} 杯 (240ml)` : `~${(water/CUP_ML).toFixed(1)} cups (8 oz)`;
  document.getElementById('r-summary').textContent = lang==='zh'
    ? `粉水比 ${rc}:${rw} · ${(coffee>0&&water>0?(water/coffee).toFixed(2):0)} g/g · ${(lang==='zh'?'强度':'strength')}: ${st==='light'?'清淡':st==='strong'?'浓郁':'标准'}`
    : `Ratio ${rc}:${rw} · ${(coffee>0&&water>0?(water/coffee).toFixed(2):0)} g/g · ${st} strength`;
  document.getElementById('note').innerHTML = lang==='zh' ? `<b>💡 ${m.zh}小贴士：</b> ${m.noteZh}` : `<b>💡 ${m.en} tip:</b> ${m.noteEn}`;
  document.getElementById('ratio-hint').textContent = lang==='zh' ? `(= 1:${(rw/rc).toFixed(1)})` : `(= 1:${(rw/rc).toFixed(1)})`;
}

// Set up labels for selects (these set textContent via id)
function setupLabels() {
  document.getElementById('lbl-method').textContent = t('lblMethod');
  document.getElementById('lbl-target').textContent = t('lblTarget');
  document.getElementById('lbl-ratio').textContent = t('lblRatio');
  document.getElementById('lbl-strength').textContent = t('lblStrength');
  document.getElementById('opt-water').textContent = t('optWater');
  document.getElementById('opt-coffee').textContent = t('optCoffee');
  document.getElementById('opt-cups').textContent = t('optCups');
  document.getElementById('btn-light').textContent = t('strengthLight');
  document.getElementById('btn-normal').textContent = t('strengthNormal');
  document.getElementById('btn-strong').textContent = t('strengthStrong');
  document.getElementById('l-coffee').textContent = t('outCoffee');
  document.getElementById('l-water').textContent = t('outWater');
}

fillMethodOptions();
setupLabels();
loadMethodPreset();

document.getElementById('method').addEventListener('change', () => { loadMethodPreset(); render(); });
document.getElementById('target').addEventListener('change', render);
document.getElementById('amount').addEventListener('input', render);
['ratioCoffee','ratioWater'].forEach(id => document.getElementById(id).addEventListener('input', render));

document.querySelectorAll('.cw-strength button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.cw-strength button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    loadMethodPreset();
    render();
  });
});

render();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'☕', href:'/calc/coffee-caffeine.html', name:'Caffeine Calculator'},
    {icon:'💧', href:'/calc/water-intake.html', name:'Water Intake'},
    {icon:'📏', href:'/convert/cooking-converter.html', name:'Cooking Converter'},
    {icon:'🧮', href:'/calc/percentage-calculator.html', name:'Percentage'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
