<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="bf-grid">
      <div class="bf-form">
        <h3>📏 Measurements</h3>
        <div class="seg">
          <button id="unitM" class="active" onclick="setUnit('metric')">Metric (cm/kg)</button>
          <button id="unitI" onclick="setUnit('imperial')">Imperial (in/lb)</button>
        </div>
        <div class="seg">
          <button id="sexM" class="active" onclick="setSex('male')">♂ Male</button>
          <button id="sexF" onclick="setSex('female')">♀ Female</button>
        </div>
        <label>Age <span id="ageU">years</span></label>
        <input type="number" id="age" value="30" min="10" max="100">
        <div class="row">
          <div>
            <label>Height <span id="heightU">cm</span></label>
            <input type="number" id="height" value="175" min="100" max="250">
          </div>
          <div>
            <label>Weight <span id="weightU">kg</span></label>
            <input type="number" id="weight" value="70" min="30" max="300">
          </div>
        </div>
        <label>Neck <span id="neckU">cm</span> <span style="font-size:.7em">circumference</span></label>
        <input type="number" id="neck" value="38" min="20" max="80">
        <label>Waist <span id="waistU">cm</span> <span style="font-size:.7em">at navel</span></label>
        <input type="number" id="waist" value="85" min="40" max="200">
        <div id="hipRow" style="display:none">
          <label>Hip <span id="hipU">cm</span> <span style="font-size:.7em">widest point</span></label>
          <input type="number" id="hip" value="95" min="40" max="200">
        </div>
      </div>
      <div class="bf-result">
        <h3>📊 Result</h3>
        <div class="bf-big" id="bfResult">—</div>
        <div class="bf-cat"><span class="badge" id="bfCat">—</span></div>
        <div class="bf-bar">
          <div class="bf-bar-fill" id="bfBar" style="width:0%"></div>
          <div class="bf-bar-marker" id="bfMarker" style="left:0%"></div>
        </div>
        <div class="bf-stats">
          <div class="bf-stat"><div class="v" id="leanMass">—</div><div class="l">Lean mass</div></div>
          <div class="bf-stat"><div class="v" id="fatMass">—</div><div class="l">Fat mass</div></div>
          <div class="bf-stat"><div class="v" id="bmiVal">—</div><div class="l">BMI</div></div>
          <div class="bf-stat"><div class="v" id="idealWeight">—</div><div class="l">Ideal weight</div></div>
        </div>
        <div class="bf-methods">
          <h4>🔬 Method comparison</h4>
          <div class="bf-method-row"><span>US Navy (circumference)</span><span id="bfNavy">—</span></div>
          <div class="bf-method-row"><span>BMI-based (Deurenberg)</span><span id="bfBMI">—</span></div>
          <div class="bf-method-row"><span>Waist-to-Height</span><span id="bfWHtR">—</span></div>
        </div>
      </div>
    </div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Body Fat Calculator',
    toolDesc: 'Estimate body fat percentage using the US Navy circumference method, BMI formula, and waist-to-height ratio. Includes lean mass, fat mass, BMI and ideal weight.',
    step1: 'Choose metric or imperial units and select your sex',
    step2: 'Enter age, height, weight, neck, waist (and hip for women)',
    step3: 'The result updates instantly with category and method comparison',
    step4: 'Compare US Navy, BMI-based and waist-to-height estimates',
  },
  zh: {
    toolTitle: '体脂率计算器',
    toolDesc: '使用美国海军围度法、BMI 公式和腰高比估算体脂率。包含瘦体重、脂肪量、BMI 和理想体重。',
    step1: '选择公制或英制，并选择性别',
    step2: '输入年龄、身高、体重、颈围、腰围（女性还需臀围）',
    step3: '结果会即时更新并显示分类和方法对比',
    step4: '对比 US Navy、BMI 法和腰高比的估算',
  }
});

const { $, t } = GZ;

let unit = 'metric';
let sex = 'male';

function setUnit(u) {
  unit = u;
  $('#unitM').classList.toggle('active', u === 'metric');
  $('#unitI').classList.toggle('active', u === 'imperial');
  if (u === 'metric') {
    $('#ageU').textContent = 'years';
    $('#heightU').textContent = 'cm';
    $('#weightU').textContent = 'kg';
    $('#neckU').textContent = 'cm';
    $('#waistU').textContent = 'cm';
    $('#hipU').textContent = 'cm';
  } else {
    $('#ageU').textContent = 'years';
    $('#heightU').textContent = 'in';
    $('#weightU').textContent = 'lb';
    $('#neckU').textContent = 'in';
    $('#waistU').textContent = 'in';
    $('#hipU').textContent = 'in';
  }
  calculate();
}

function setSex(s) {
  sex = s;
  $('#sexM').classList.toggle('active', s === 'male');
  $('#sexF').classList.toggle('active', s === 'female');
  $('#hipRow').style.display = s === 'female' ? 'block' : 'none';
  calculate();
}

function toMetric() {
  if (unit === 'imperial') {
    return {
      height: $('#height').value * 2.54,
      weight: $('#weight').value * 0.453592,
      neck: $('#neck').value * 2.54,
      waist: $('#waist').value * 2.54,
      hip: $('#hip').value * 2.54
    };
  }
  return {
    height: +$('#height').value,
    weight: +$('#weight').value,
    neck: +$('#neck').value,
    waist: +$('#waist').value,
    hip: +$('#hip').value
  };
}

function bfNavy(m, sex) {
  if (sex === 'male') {
    if (m.waist - m.neck <= 0) return null;
    return 86.010 * Math.log10(m.waist - m.neck) - 70.041 * Math.log10(m.height) + 36.76;
  } else {
    if (m.waist + m.hip - m.neck <= 0) return null;
    return 163.205 * Math.log10(m.waist + m.hip - m.neck) - 97.684 * Math.log10(m.height) - 78.387;
  }
}

function bfBMI(m, age, sex) {
  const bmi = m.weight / Math.pow(m.height/100, 2);
  return 1.20 * bmi + 0.23 * age - (sex === 'male' ? 16.2 : 5.4);
}

function bfWHtR(m) {
  const ratio = m.waist / m.height;
  // Approximate conversion: WHtR 0.5 ≈ 25% body fat
  return Math.max(0, Math.min(60, ratio * 50));
}

function bmiCategory(bmi) {
  if (bmi < 18.5) return ['Underweight', '#3498db'];
  if (bmi < 25) return ['Normal', '#26de81'];
  if (bmi < 30) return ['Overweight', '#ffd93d'];
  return ['Obese', '#ff6b6b'];
}

function bfCategory(pct, sex) {
  if (sex === 'male') {
    if (pct < 6) return ['Essential', '#3498db'];
    if (pct < 14) return ['Athletic', '#26de81'];
    if (pct < 18) return ['Fitness', '#4ecdc4'];
    if (pct < 25) return ['Average', '#ffd93d'];
    return ['High', '#ff6b6b'];
  } else {
    if (pct < 14) return ['Essential', '#3498db'];
    if (pct < 21) return ['Athletic', '#26de81'];
    if (pct < 25) return ['Fitness', '#4ecdc4'];
    if (pct < 32) return ['Average', '#ffd93d'];
    return ['High', '#ff6b6b'];
  }
}

function idealWeightDevine(heightCm, sex) {
  // Devine formula
  const inches = heightCm / 2.54;
  const over5ft = Math.max(0, inches - 60);
  return sex === 'male' ? 50 + 2.3 * over5ft : 45.5 + 2.3 * over5ft;
}

function calculate() {
  const m = toMetric();
  const age = +$('#age').value;
  if (!m.height || !m.weight || !m.neck || !m.waist) return;
  
  const navy = bfNavy(m, sex);
  const bmiBF = bfBMI(m, age, sex);
  const whtr = bfWHtR(m);
  const bmi = m.weight / Math.pow(m.height/100, 2);
  
  // Use Navy as primary if available
  let primary = navy;
  if (primary === null || primary < 2 || primary > 60) {
    primary = bmiBF;
  }
  
  const [cat, color] = bfCategory(primary, sex);
  $('#bfResult').textContent = primary.toFixed(1) + ' %';
  const catEl = $('#bfCat');
  catEl.textContent = cat;
  catEl.style.background = color;
  catEl.style.color = '#000';
  
  // Bar (0-50%)
  const pct = Math.max(0, Math.min(100, primary * 2));
  $('#bfBar').style.width = pct + '%';
  $('#bfMarker').style.left = pct + '%';
  
  // Stats
  const leanMass = m.weight * (1 - primary/100);
  const fatMass = m.weight * (primary/100);
  $('#leanMass').textContent = (unit === 'imperial' ? (leanMass * 2.2046).toFixed(1) + ' lb' : leanMass.toFixed(1) + ' kg');
  $('#fatMass').textContent = (unit === 'imperial' ? (fatMass * 2.2046).toFixed(1) + ' lb' : fatMass.toFixed(1) + ' kg');
  $('#bmiVal').textContent = bmi.toFixed(1);
  const ideal = idealWeightDevine(m.height, sex);
  $('#idealWeight').textContent = (unit === 'imperial' ? (ideal * 2.2046).toFixed(0) + ' lb' : ideal.toFixed(0) + ' kg');
  
  // Methods
  $('#bfNavy').textContent = navy !== null ? navy.toFixed(1) + '%' : 'N/A';
  $('#bfBMI').textContent = bmiBF.toFixed(1) + '%';
  $('#bfWHtR').textContent = whtr.toFixed(1) + '%';
}

['#age','#height','#weight','#neck','#waist','#hip'].forEach(s => {
  $(s).addEventListener('input', calculate);
});

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="document.querySelectorAll('.bf-form input').forEach(i=>i.value='');$('#age').value=30;$('#height').value=175;$('#weight').value=70;$('#neck').value=38;$('#waist').value=85;$('#hip').value=95;calculate();">Reset</button>`;

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'⚖️', href:'/calc/bmi-calculator.html', name:'BMI Calculator'},
    {icon:'🔥', href:'/calc/tdee-calculator.html', name:'TDEE Calculator'},
    {icon:'🍎', href:'/calc/calorie-calculator.html', name:'Calorie Calculator'},
    {icon:'💼', href:'/calc/body-fat.html', name:'Body Fat'},
  ]
});
calculate();
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
