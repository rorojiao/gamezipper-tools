<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "How many bricks do I need per square foot of wall?", "acceptedAnswer": {"@type": "Answer", "text": "For a standard single-skin (4-inch) wall using a modular brick (3-5/8 x 2-1/4 in face with 3/8 in mortar joint) you need about 7 bricks per square foot. A double-skin (9-inch) wall needs roughly 14 bricks per square foot. Our calculator does this automatically once you enter the wall and brick dimensions."}}, {"@type": "Question", "name": "How is the brick count calculated?", "acceptedAnswer": {"@type": "Answer", "text": "The wall area (length x height) is divided by the face area of one brick including the mortar joint (brick width + joint) x (brick height + joint). The result is multiplied by the number of wythes (wall thickness in brick layers) and a wastage factor (typically 5-10%) to allow for cuts and breakage."}}, {"@type": "Question", "name": "What wastage percentage should I add?", "acceptedAnswer": {"@type": "Answer", "text": "Most masons add 5% for simple straight walls and 10-15% for walls with many cuts, curves, openings or pattern work. The default of 5% is a safe minimum — you can change it in the calculator."}}, {"@type": "Question", "name": "What are common brick sizes?", "acceptedAnswer": {"@type": "Answer", "text": "Standard US modular brick is 7-5/8 x 3-5/8 x 2-1/4 in. Standard UK brick is 215 x 102.5 x 65 mm. Queen size is about 7-5/8 x 2-3/4 x 2-3/4 in and King size is roughly 9-5/8 x 2-3/4 x 2-3/4 in. Pick a preset or enter your own dimensions."}}]}</script>

<body>
<div class="gz-container">

      <div><label id="lbl-wh"></label><input type="number" id="wh" value="8" min="0" step="0.1"></div>
      <div><label id="lbl-wt"></label>
        <select id="wt">
          <option value="1" id="opt-single"></option>
          <option value="2" id="opt-double"></option>
        </select>
      </div>
      <div><label id="lbl-unit"></label>
        <select id="unit">
          <option value="ft">ft</option>
          <option value="m">m</option>
          <option value="in">in</option>
          <option value="cm">cm</option>
        </select>
      </div>
    </div>
    <div class="bc-form">
      <div><label id="lbl-bsize"></label>
        <select id="bsize">
          <option value="us-standard">US Standard (7-5/8 x 2-1/4 in)</option>
          <option value="us-modular">US Modular (7-5/8 x 2-1/4 in)</option>
          <option value="us-queen">US Queen (7-5/8 x 2-3/4 in)</option>
          <option value="us-king">US King (9-5/8 x 2-3/4 in)</option>
          <option value="uk">UK Standard (215 x 65 mm)</option>
          <option value="custom" id="opt-custom"></option>
        </select>
      </div>
      <div><label id="lbl-bl"></label><input type="number" id="bl" value="7.625" min="0" step="0.001"></div>
      <div><label id="lbl-bh"></label><input type="number" id="bh" value="2.25" min="0" step="0.001"></div>
      <div><label id="lbl-joint"></label><input type="number" id="joint" value="0.375" min="0" step="0.01"></div>
      <div><label id="lbl-waste"></label><input type="number" id="waste" value="5" min="0" max="100" step="0.5">%</div>
    </div>

      <div class="bc-cost">

            <span id="priceSym">$</span>
            <input type="number" id="price" value="0.5" min="0" step="0.01">
            <span style="font-size:.82em;color:var(--text2)" id="lbl-per"></span>

<script>
GZI18n.register({
  en: {
    toolTitle: 'Brick Calculator',
    toolDesc: 'Calculate exactly how many bricks you need for any wall. Choose brick size, mortar joint, wastage and get cost estimate instantly.',
    lblWl: 'Wall length',
    lblWh: 'Wall height',
    lblWt: 'Wall thickness',
    optSingle: 'Single skin (1 brick)',
    optDouble: 'Double skin (2 bricks)',
    lblUnit: 'Unit',
    lblBsize: 'Brick size preset',
    optCustom: 'Custom size',
    lblBl: 'Brick length',
    lblBh: 'Brick height',
    lblJoint: 'Mortar joint',
    lblWaste: 'Wastage',
    lblPrice: 'Price per brick',
    lblPer: '/ brick',
    bigResult: 'bricks needed',
    tileArea: 'Wall area',
    tilePerSf: 'Bricks / unit²',
    tileTotal: 'Total bricks',
    tileWithWaste: 'With wastage',
    tileCost: 'Estimated cost',
    tileCubes: 'Cubes / pallets',
    step1: 'Enter the wall length and height in your chosen unit.',
    step2: 'Pick the wall thickness (single or double skin) and a brick size preset.',
    step3: 'Adjust the mortar joint and wastage percentage to suit your project.',
    step4: 'Enter the price per brick to see the total material cost estimate.',
  },
  zh: {
    toolTitle: '砖块计算器',
    toolDesc: '精确计算任意墙体需要多少块砖。可选择砖块尺寸、灰缝厚度、损耗率，并即时给出成本估算。',
    lblWl: '墙体长度',
    lblWh: '墙体高度',
    lblWt: '墙体厚度',
    optSingle: '单层（1 块砖厚）',
    optDouble: '双层（2 块砖厚）',
    lblUnit: '单位',
    lblBsize: '砖块尺寸预设',
    optCustom: '自定义尺寸',
    lblBl: '砖长',
    lblBh: '砖高',
    lblJoint: '灰缝厚度',
    lblWaste: '损耗率',
    lblPrice: '每块砖价格',
    lblPer: '/ 块',
    bigResult: '块砖',
    tileArea: '墙面面积',
    tilePerSf: '每单位² 砖数',
    tileTotal: '基础砖数',
    tileWithWaste: '含损耗',
    tileCost: '估算成本',
    tileCubes: '砖笼 / 托盘',
    step1: '输入墙体长度和高度，选择单位。',
    step2: '选择墙体厚度（单层或双层）和砖块尺寸预设。',
    step3: '根据工程情况调整灰缝厚度和损耗率。',
    step4: '输入每块砖价格即可查看总材料成本估算。',
  }
});

const { $, t } = GZ;

const BRICK_PRESETS = {
  'us-standard': { bl: 7.625, bh: 2.25 },
  'us-modular':  { bl: 7.625, bh: 2.25 },
  'us-queen':    { bl: 7.625, bh: 2.75 },
  'us-king':     { bl: 9.625, bh: 2.75 },
  'uk':          { bl: 8.46,  bh: 2.56 }, // 215mm/65mm in inches (unit-agnostic calc handles metric too)
};

const UNIT_TO_INCH = { in: 1, ft: 12, cm: 0.393701, m: 39.3701 };
const UNIT_LABEL = { in: 'in²', ft: 'ft²', cm: 'cm²', m: 'm²' };
const UNIT_AREA_FACTOR = { // ft²→in² is 144, m²→in² etc. We convert everything to inches internally.
  in: 1, ft: 144, cm: 0.155001, m: 1550.0031
};

function applyPreset(name){
  const p = BRICK_PRESETS[name];
  $('#bsize').value = name;
  $('#bl').value = p.bl;
  $('#bh').value = p.bh;
  calc();
}

function calc(){
  const wl = parseFloat($('#wl').value) || 0;
  const wh = parseFloat($('#wh').value) || 0;
  const wythes = parseInt($('#wt').value, 10) || 1;
  const unit = $('#unit').value;
  const bl = parseFloat($('#bl').value) || 0;
  const bh = parseFloat($('#bh').value) || 0;
  const joint = parseFloat($('#joint').value) || 0;
  const wastePct = Math.max(0, parseFloat($('#waste').value) || 0);
  const price = parseFloat($('#price').value) || 0;

  if (wl <= 0 || wh <= 0 || bl <= 0 || bh <= 0) {
    $('#bigResult').textContent = '—';
    $('#subResult').textContent = '';
    $('#grid').innerHTML = '';
    $('#costOut').textContent = '';
    return;
  }

  // Convert wall dims to inches
  const wlIn = wl * UNIT_TO_INCH[unit];
  const whIn = wh * UNIT_TO_INCH[unit];
  const wallAreaIn = wlIn * whIn;

  // Brick face + mortar joint (assume joint added once to length and once to height)
  const brickFaceIn = (bl + joint) * (bh + joint);
  if (brickFaceIn <= 0) return;

  const baseCount = wallAreaIn / brickFaceIn;
  const perUnitArea = baseCount / (wl * wh); // bricks per square unit (original)
  const totalBase = baseCount * wythes;
  const totalWithWaste = totalBase * (1 + wastePct / 100);
  const roundedUp = Math.ceil(totalWithWaste);
  const cost = roundedUp * price;

  // Update currency symbol hint (price input shows $/£/€ — keep simple)
  $('#bigResult').textContent = roundedUp.toLocaleString();
  $('#subResult').textContent = t('bigResult');
  const tiles = [
    { num: (wl*wh).toLocaleString(undefined,{maximumFractionDigits:2}) + ' ' + UNIT_LABEL[unit], lbl: t('tileArea') },
    { num: perUnitArea.toLocaleString(undefined,{maximumFractionDigits:2}), lbl: t('tilePerSf') },
    { num: Math.ceil(totalBase).toLocaleString(), lbl: t('tileTotal') },
    { num: roundedUp.toLocaleString(), lbl: t('tileWithWaste') },
    { num: '$' + cost.toLocaleString(undefined,{maximumFractionDigits:2}), lbl: t('tileCost') },
    { num: Math.ceil(roundedUp / 500).toLocaleString(), lbl: t('tileCubes') },
  ];
  $('#grid').innerHTML = tiles.map(x => `<div class="bc-tile"><div class="num">${x.num}</div><div class="lbl">${x.lbl}</div></div>`).join('');
  $('#costOut').textContent = '$' + cost.toLocaleString(undefined,{maximumFractionDigits:2});
}

const presets = [
  { lbl: '🧱 US Standard Wall', bsize: 'us-standard' },
  { lbl: '👑 Queen Brick', bsize: 'us-queen' },
  { lbl: '🇬🇧 UK Standard Wall', bsize: 'uk' },
];
function renderPresets(){
  $('#presets').innerHTML = presets.map((p,i) => `<div class="bc-preset" onclick="applyPreset('${p.bsize}')">${p.lbl}</div>`).join('');
}
window.applyPreset = applyPreset;

['wl','wh','wt','unit','bl','bh','joint','waste','price'].forEach(id => {
  $('#'+id).addEventListener('input', calc);
  $('#'+id).addEventListener('change', calc);
});
$('#bsize').addEventListener('change', function(){
  const v = this.value;
  if (BRICK_PRESETS[v]) {
    $('#bl').value = BRICK_PRESETS[v].bl;
    $('#bh').value = BRICK_PRESETS[v].bh;
  }
  calc();
});

function init(){
  $('#lbl-wl').textContent = t('lblWl');
  $('#lbl-wh').textContent = t('lblWh');
  $('#lbl-wt').textContent = t('lblWt');
  $('#lbl-unit').textContent = t('lblUnit');
  $('#lbl-bsize').textContent = t('lblBsize');
  $('#lbl-bl').textContent = t('lblBl');
  $('#lbl-bh').textContent = t('lblBh');
  $('#lbl-joint').textContent = t('lblJoint');
  $('#lbl-waste').textContent = t('lblWaste');
  $('#lbl-price').textContent = t('lblPrice');
  $('#lbl-per').textContent = t('lblPer');
  $('#opt-single').textContent = t('optSingle');
  $('#opt-double').textContent = t('optDouble');
  $('#opt-custom').textContent = t('optCustom');
  renderPresets();
  calc();
}

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🧱', href:'/calc/concrete.html', name:'Concrete Calc'},
    {icon:'📐', href:'/calc/square-footage.html', name:'Square Footage'},
    {icon:'🪨', href:'/calc/gravel-calculator.html', name:'Gravel Calc'},
    {icon:'🪵', href:'/calc/lumber.html', name:'Lumber Calc'},
  ]
});
init();
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
