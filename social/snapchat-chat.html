<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">

  </div>

<script>
GZI18n.register({
  en: {
    toolTitle: 'Snapchat Chat Generator',
    toolDesc: 'Create realistic Snapchat chat mockups for design and fun — customize friend, messages and download as PNG.',
    friendName: 'Friend Name',
    avatar: 'Avatar (emoji)',
    message: 'Message',
    direction: 'Direction',
    incoming: 'Incoming',
    outgoing: 'Outgoing',
    addMessage: 'Add Message',
    clear: 'Clear All',
    download: 'Download PNG',
    newSnap: '📸 New Snap',
    active: 'Active Now',
    step1: 'Enter the friend name and avatar emoji',
    step2: 'Type a message and choose Incoming or Outgoing',
    step3: 'Click Add Message to build the conversation',
    step4: 'Download the Snapchat chat as a PNG image',
  },
  zh: {
    toolTitle: 'Snapchat 聊天生成器',
    toolDesc: '创建逼真的 Snapchat 聊天截图 — 自定义好友、消息，下载为 PNG 图片。',
    friendName: '好友名称',
    avatar: '头像（emoji）',
    message: '消息',
    direction: '方向',
    incoming: '收到',
    outgoing: '发送',
    addMessage: '添加消息',
    clear: '全部清除',
    download: '下载 PNG',
    newSnap: '📸 新 Snap',
    active: '当前活跃',
    step1: '输入好友名称和头像 emoji',
    step2: '输入消息并选择收到或发送',
    step3: '点击「添加消息」构建对话',
    step4: '下载 Snapchat 聊天为 PNG 图片',
  }
});

const { $, copyText, t } = GZ;

let cfg = {
  name: 'Snap Friend',
  avatar: '😎',
  messages: [
    {dir:'in', text:'Streak? 🔥'},
    {dir:'out', text:'Always! Don\'t forget 😤'},
    {dir:'in', text:'Haha gotchu 👻'},
  ]
};

function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function buildControls() {
  const c = $('#controls');
  c.innerHTML = `
    <label>${t('friendName')}<input type="text" id="cName" value="${escHtml(cfg.name)}"></label>
    <label>${t('avatar')}<input type="text" id="cAvatar" value="${escHtml(cfg.avatar)}" style="width:60px;text-align:center"></label>
    <label>${t('message')}<textarea id="cMsg" rows="2" style="min-width:240px"></textarea></label>
    <label>${t('direction')}<select id="cDir"><option value="in">${t('incoming')}</option><option value="out">${t('outgoing')}</option></select></label>
  `;
  $('#cName').oninput=e=>{cfg.name=e.target.value;render()};
  $('#cAvatar').oninput=e=>{cfg.avatar=e.target.value;render()};
}

function addMessage() {
  const text = $('#cMsg').value.trim();
  if (!text) return;
  cfg.messages.push({dir:$('#cDir').value, text});
  $('#cMsg').value = '';
  render();
}

function delMsg(i) { cfg.messages.splice(i,1); render(); }

function render() {
  $('#sc-preview').innerHTML = `
    <div class="sc-head">
      <div class="sc-avatar">${escHtml(cfg.avatar||'?')}</div>
      <div class="sc-info">
        <div class="sc-name">${escHtml(cfg.name)}</div>
        <div class="sc-status">${t('active')}</div>
      </div>
      <span class="sc-ghost">👻</span>
    </div>
    <div class="sc-body">
      ${cfg.messages.map((m,i)=>`
        <div class="sc-bubble sc-${m.dir}" title="click to delete" onclick="delMsg(${i})">${escHtml(m.text)}</div>
      `).join('')}
    </div>
    <div style="padding:10px 16px;background:#fafafa;border-top:1px solid #eee;display:flex;align-items:center;gap:8px">
      <div style="flex:1;background:#f0f0f0;border-radius:20px;padding:9px 14px;color:#999;font-size:13px">${t('message')}…</div>
      <div style="width:32px;height:32px;border-radius:50%;background:#fffc00;display:flex;align-items:center;justify-content:center;font-size:16px">📸</div>
    </div>
  `;
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="addMessage()">${t('addMessage')}</button>
  <button class="gz-btn" id="dlBtn">${t('download')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="cfg.messages=[];render()">${t('clear')}</button>
`;

$('#dlBtn').onclick = async () => {
  try {
    if (typeof html2canvas !== 'undefined') {
      const canvas = await html2canvas($('#sc-preview'), { backgroundColor: null, scale: 2 });
      const a = document.createElement('a');
      a.href = canvas.toDataURL('image/png');
      a.download = 'snapchat-chat.png';
      a.click();
    }
  } catch(e) { console.error(e); }
};

const h2c = document.createElement('script');
h2c.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
document.head.appendChild(h2c);

buildControls();
render();

GZ.renderToolPage({
  category: 'social',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'✈️', href:'/social/telegram-chat.html', name:'Telegram Chat'},
    {icon:'💬', href:'/social/whatsapp-chat.html', name:'WhatsApp Chat'},
    {icon:'📷', href:'/social/instagram-story.html', name:'Instagram Story'},
    {icon:'🎬', href:'/social/youtube-comment.html', name:'YouTube Comment'},
  ]
});
</script>
