<div class="gz-container">

  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="gz-split">

        <div class="field"><label id="lbl-style"></label><div class="chips" id="style-chips"></div></div>
        <div class="field"><label id="lbl-light"></label><div class="chips" id="light-chips"></div></div>
        <div class="field"><label id="lbl-camera"></label><div class="chips" id="camera-chips"></div></div>
        <div class="field"><label id="lbl-mood"></label><div class="chips" id="mood-chips"></div></div>
        <div class="field"><label id="lbl-color"></label><div class="chips" id="color-chips"></div></div>
      </div>
      <div>
        <label id="lbl-out" style="font-weight:600;display:block;margin-bottom:8px"></label>
        <div class="gz-output" id="output"></div>
        <div style="margin-top:14px">
          <div class="field"><label id="lbl-ar"></label>
            <select id="ar"><option>1:1</option><option>16:9</option><option>9:16</option><option>4:3</option><option>3:2</option><option>2:3</option><option>21:9</option><option>3:1</option></select>
          </div>
          <div class="field"><label id="lbl-ver"></label>
            <select id="ver"><option value="6">v6</option><option value="6.1">v6.1</option><option value="7">v7</option><option value="niji 6">Niji v6</option></select>
          </div>
          <div class="field"><label id="lbl-stylize"></label>
            <div class="range-row"><input id="stylize" type="range" min="0" max="1000" value="100" step="50"><span class="rv" id="stylize-v">100</span></div>
          </div>
          <div class="field"><label id="lbl-chaos"></label>
            <div class="range-row"><input id="chaos" type="range" min="0" max="100" value="0" step="5"><span class="rv" id="chaos-v">0</span></div>
          </div>
          <div class="field"><label id="lbl-weird"></label>
            <div class="range-row"><input id="weird" type="range" min="0" max="3000" value="0" step="100"><span class="rv" id="weird-v">0</span></div>
          </div>
          <div class="field"><label id="lbl-seed"></label><input id="seed" type="number" min="0" placeholder="optional, e.g. 42"></div>
        </div>
      </div>
    </div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Midjourney Prompt Builder',
    toolDesc: 'Build optimized /imagine prompts for Midjourney v6, v6.1, v7 and Niji. Combine subject, style, lighting, camera, mood and parameters (--ar, --stylize, --chaos, --weird, --seed). Free, browser-only.',
    lblIn: 'Composition', lblOut: 'Generated prompt',
    lblSubject: 'Subject', lblStyle: 'Art style', lblLight: 'Lighting', lblCamera: 'Camera / shot', lblMood: 'Mood', lblColor: 'Color palette',
    lblAr: 'Aspect ratio (--ar)', lblVer: 'Model version (--v)', lblStylize: 'Stylize (--stylize)', lblChaos: 'Chaos (--chaos)', lblWeird: 'Weird (--weird)', lblSeed: 'Seed (--seed, optional)',
    empty: 'Describe your subject on the left — your /imagine prompt appears here.',
    step1: 'Type the main subject of your image',
    step2: 'Click chips to add style, lighting, camera, mood and color cues',
    step3: 'Tune parameters: aspect ratio, version, stylize, chaos, weird, seed',
    step4: 'Copy the prompt and paste it into the Midjourney Discord bot or web app',
  },
  zh: {
    toolTitle: 'Midjourney 提示词构建器',
    toolDesc: '为 Midjourney v6、v6.1、v7 和 Niji 构建优化的 /imagine 提示词。组合主体、风格、光线、镜头、情绪和参数（--ar、--stylize、--chaos、--weird、--seed）。免费，浏览器本地运行。',
    lblIn: '画面构成', lblOut: '生成的提示词',
    lblSubject: '主体', lblStyle: '艺术风格', lblLight: '光线', lblCamera: '镜头 / 构图', lblMood: '情绪', lblColor: '配色',
    lblAr: '宽高比 (--ar)', lblVer: '模型版本 (--v)', lblStylize: '风格化 (--stylize)', lblChaos: '混乱度 (--chaos)', lblWeird: '怪异度 (--weird)', lblSeed: '随机种子 (--seed，可选)',
    empty: '在左侧描述你的主体 — 你的 /imagine 提示词将出现在这里。',
    step1: '输入图像的主要主体',
    step2: '点击标签添加风格、光线、镜头、情绪和配色提示',
    step3: '调整参数：宽高比、版本、风格化、混乱度、怪异度、种子',
    step4: '复制提示词并粘贴到 Midjourney Discord 机器人或网页应用',
  }
});

const { $, copyText, t } = GZ;

const CHIPS = {
  'style-chips':  ['photorealistic','cinematic','anime','oil painting','watercolor','cyberpunk','fantasy art','minimalist','3D render','pixel art','concept art','art deco','studio ghibli','vaporwave','surrealism','isometric'],
  'light-chips':  ['golden hour','soft natural light','neon glow','dramatic lighting','backlit','volumetric lighting','moonlight','studio lighting','rim light','chiaroscuro'],
  'camera-chips': ['wide angle','close-up','macro','aerial view','low angle','bird\'s eye view','portrait shot','fisheye','tilt-shift','shallow depth of field','35mm film','shot on Hasselblad'],
  'mood-chips':   ['serene','mysterious','epic','melancholic','joyful','tense','dreamy','ominous','nostalgic','whimsical'],
  'color-chips':  ['pastel colors','monochrome','vibrant','muted tones','neon palette','warm tones','cool tones','sepia','high contrast','duotone'],
};

const picked = { style:[], light:[], camera:[], mood:[], color:[] };

Object.keys(CHIPS).forEach(key => {
  const container = $('#' + key);
  CHIPS[key].forEach(label => {
    const b = document.createElement('button');
    b.textContent = label;
    b.onclick = () => {
      const arr = picked[key.replace('-chips','')];
      const i = arr.indexOf(label);
      if (i >= 0) { arr.splice(i, 1); b.classList.remove('on'); } else { arr.push(label); b.classList.add('on'); }
      render();
    };
    container.appendChild(b);
  });
});

function render() {
  const subj = $('#subject').value.trim();
  if (!subj) { $('#output').textContent = t('empty'); return; }
  const parts = [subj];
  if (picked.style.length)  parts.push(picked.style.join(', '));
  if (picked.light.length)  parts.push(picked.light.join(', '));
  if (picked.camera.length) parts.push(picked.camera.join(', '));
  if (picked.mood.length)   parts.push(picked.mood.join(', '));
  if (picked.color.length)  parts.push(picked.color.join(', '));
  const ver = $('#ver').value;
  const isNiji = ver.startsWith('niji');
  const params = [];
  params.push('--ar ' + $('#ar').value);
  if (isNiji) params.push('--niji ' + ver.replace('niji ','')); else params.push('--v ' + ver);
  const st = +$('#stylize').value; if (st !== 100) params.push('--stylize ' + st);
  const ch = +$('#chaos').value; if (ch > 0) params.push('--chaos ' + ch);
  const we = +$('#weird').value; if (we > 0) params.push('--weird ' + we);
  const seed = $('#seed').value.trim(); if (seed) params.push('--seed ' + seed);
  $('#output').textContent = '/imagine prompt: ' + parts.join(' -- ') + ' ' + params.join(' ');
}

$('#subject').addEventListener('input', render);
['ar','ver','stylize','chaos','weird','seed'].forEach(id => {
  $('#' + id).addEventListener('input', () => {
    const vSpan = $('#' + id + '-v');
    if (vSpan) vSpan.textContent = $('#' + id).value;
    render();
  });
});

function loadExample() {
  $('#subject').value = 'a lone astronaut discovering an ancient alien library';
  picked.style = ['cinematic','concept art']; picked.light = ['volumetric lighting','dramatic lighting'];
  picked.camera = ['wide angle']; picked.mood = ['mysterious','epic']; picked.color = ['muted tones'];
  ['style','light','camera','mood','color'].forEach(k => {
    const c = $('#' + k + '-chips');
    [...c.children].forEach(b => b.classList.toggle('on', picked[k].includes(b.textContent)));
  });
  $('#ar').value = '16:9'; $('#ver').value = '6';
  $('#stylize').value = 250; $('#stylize-v').textContent = 250;
  $('#chaos').value = 15; $('#chaos-v').textContent = 15;
  $('#weird').value = 0; $('#weird-v').textContent = 0;
  render();
}

function doClear() {
  $('#subject').value = ''; $('#seed').value = '';
  Object.keys(picked).forEach(k => picked[k] = []);
  document.querySelectorAll('.chips button').forEach(b => b.classList.remove('on'));
  render();
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="render()">${t('generate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

render();

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🖼️', href:'/text/sd-prompt-builder.html', name:'Stable Diffusion Prompts'},
    {icon:'🧠', href:'/dev/system-prompt-builder.html', name:'System Prompt Builder'},
    {icon:'🤖', href:'/text/ai-image-prompt-generator.html', name:'AI Image Prompts'},
    {icon:'🎨', href:'/text/ascii-art.html', name:'ASCII Art'},
  ]
});
</script>
<script src="/tools-result-rec.js?v=20260707v520" defer></script>
</body>
