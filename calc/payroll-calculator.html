<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"How is gross pay calculated?","acceptedAnswer":{"@type":"Answer","text":"For hourly employees, gross pay = hourly rate x regular hours + (overtime hours x hourly rate x 1.5). For salaried employees, gross pay per period = annual salary divided by the number of pay periods per year."}},{"@type":"Question","name":"What is FICA tax?","acceptedAnswer":{"@type":"Answer","text":"FICA is the combined Social Security (6.2% up to a yearly wage cap) and Medicare (1.45%, plus 0.9% additional on high earnings) tax. Both employer and employee each pay 7.65% in standard FICA taxes."}},{"@type":"Question","name":"How accurate is this payroll calculator?","acceptedAnswer":{"@type":"Answer","text":"This tool gives a simplified US federal estimate using standard deductions and a flat bracket approximation. It does not account for state taxes, local taxes, 401(k) deductions, benefits or garnishments. Use it for quick estimates, not official paychecks."}},{"@type":"Question","name":"Is my payroll data private?","acceptedAnswer":{"@type":"Answer","text":"Yes. All calculations happen entirely in your browser. Nothing is uploaded, stored, or shared with any server."}}]}</script>

          </div>
          <div class="pay-field" id="fHours">

            <input type="number" id="hours" value="40" min="0" step="0.5">
          </div>
          <div class="pay-field" id="fOT">

            <input type="number" id="ot" value="0" min="0" step="0.5">
          </div>
          <div class="pay-field">
            <label id="lblPayFreq"></label>
            <select id="freq">
              <option value="52" id="optWeekly"></option>
              <option value="26" id="optBiweekly"></option>
              <option value="24" id="optSemimonthly"></option>
              <option value="12" id="optMonthly" selected></option>
              <option value="1" id="optAnnual"></option>
            </select>
          </div>
          <div class="pay-field">
            <label id="lblAllow"></label>
            <input type="number" id="allowances" value="0" min="0" step="1">

      <div class="pay-card" id="resultCard">

          <div class="r-item highlight"><div class="lab" id="rLabNet"></div><div class="val" id="rNet">—</div></div>
          <div class="r-item"><div class="lab" id="rLabGross"></div><div class="val" id="rGross">—</div></div>
          <div class="r-item"><div class="lab" id="rLabTax"></div><div class="val" id="rTax">—</div></div>
          <div class="r-item"><div class="lab" id="rLabEmp"></div><div class="val" id="rEmp">—</div></div>

<script>
GZI18n.register({
  en: {
    toolTitle: 'Payroll Calculator',
    toolDesc: 'Calculate gross pay, overtime, taxes and net take-home pay for hourly or salaried employees. Estimate employer cost and FICA withholding in seconds.',

    step2: 'Set regular hours, overtime hours and dependents',
    step3: 'Pick your pay frequency (weekly, bi-weekly, monthly, etc.)',
    step4: 'Click Calculate to see gross pay, taxes withheld, net pay and employer cost',
  },
  zh: {
    toolTitle: '工资计算器',
    toolDesc: '计算时薪或月薪员工的毛收入、加班费、税费和净到手工资。即时估算雇主成本和社保预扣。',
    hInputs: '员工薪资信息',
    hResult: '计算结果',
    typeHourly: '时薪',
    typeSalary: '年薪',
    lblRate: '时薪（$）',
    lblSalaryRate: '年薪（$）',
    lblHours: '每周常规工时',
    lblHoursSal: '每周工时',
    lblOT: '每周加班工时',
    lblPayFreq: '发薪周期',
    lblAllow: '受抚养人数量',
    calcBtn: '计算工资',
    rLabNet: '每期净工资',
    rLabGross: '每期毛工资',
    rLabTax: '每期总税额',
    rLabEmp: '每期雇主成本',
    rLabAnnual: '年净收入',
    optWeekly: '每周',
    optBiweekly: '双周',
    optSemimonthly: '半月',
    optMonthly: '每月',
    optAnnual: '每年',
    bdGross: '毛工资',
    bdOT: '加班溢价',
    bdSS: '社会安全税（6.2%）',
    bdMed: '医疗保险税（1.45%）',
    bdFed: '联邦所得税（估算）',
    bdNet: '净工资',
    bdEmpFica: '雇主 FICA（7.65%）',
    bdEmpCost: '雇主总成本',

  }
});

const { $, t } = GZ;
let type = 'hourly';

function setType(tp){
  type = tp;
  $('#btnHourly').classList.toggle('active', tp==='hourly');
  $('#btnSalary').classList.toggle('active', tp==='salary');
  if(tp==='hourly'){
    $('#lblRate').textContent = t('lblRate');
    $('#rate').value = 25;
    $('#fHours').style.display = '';
    $('#fOT').style.display = '';
  } else {
    $('#lblRate').textContent = t('lblSalaryRate');
    $('#rate').value = 52000;
    $('#fHours').style.display = '';
    $('#fOT').style.display = 'none';
  }
  recalc();
}

function money(n){ return '$' + n.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}); }

function recalc(){
  const rate = +$('#rate').value || 0;
  const hours = +$('#hours').value || 0;
  const ot = type==='hourly' ? (+$('#ot').value || 0) : 0;
  const freq = +$('#freq').value;
  const allow = +$('#allowances').value || 0;

  let weeklyGross, weeklyOT;
  if(type==='hourly'){
    weeklyGross = rate * hours;
    weeklyOT = ot * rate * 1.5;
  } else {
    weeklyGross = rate / 52;
    weeklyOT = 0;
  }
  const weeklyTotal = weeklyGross + weeklyOT;
  const annualGross = weeklyTotal * 52;

  // FICA
  const ss = annualGross * 0.062; // simplified, ignores wage cap
  const med = annualGross * 0.0145;
  // Federal income tax — simplified effective rate
  const stdDed = 15000;
  const taxable = Math.max(0, annualGross - stdDed - allow*2000);
  // crude progressive brackets (single 2025)
  let fed = 0;
  const brackets = [[11925,0.10],[48475,0.12],[103350,0.22],[197300,0.24],[250525,0.32],[626350,0.35],[Infinity,0.37]];
  let prev = 0;
  for(const [cap,r] of brackets){
    if(taxable > prev){
      fed += (Math.min(taxable,cap) - prev) * r;
      prev = cap;
    } else break;
  }

  const annualTax = ss + med + fed;
  const annualNet = annualGross - annualTax;
  const employerFica = annualGross * 0.0765;
  const employerCost = annualGross + employerFica;

  const perPeriod = (annual) => annual / freq;

  $('#rNet').textContent = money(perPeriod(annualNet));
  $('#rGross').textContent = money(perPeriod(annualGross));
  $('#rTax').textContent = money(perPeriod(annualTax));
  $('#rEmp').textContent = money(perPeriod(employerCost));
  $('#rAnnual').textContent = money(annualNet);

  const bd = $('#breakTable');
  bd.innerHTML = '';
  const rows = [
    [t('bdGross'), perPeriod(annualGross)],
    [t('bdOT'), perPeriod(weeklyOT*52)],
    [t('bdSS'), perPeriod(ss)],
    [t('bdMed'), perPeriod(med)],
    [t('bdFed'), perPeriod(fed)],
    [t('bdNet'), perPeriod(annualNet)],
    [t('bdEmpFica'), perPeriod(employerFica)],
    [t('bdEmpCost'), perPeriod(employerCost)],
  ];
  rows.forEach(([lab,val])=>{
    const tr = document.createElement('tr');
    const td1 = document.createElement('td'); td1.textContent = lab;
    const td2 = document.createElement('td'); td2.textContent = money(val);
    tr.appendChild(td1); tr.appendChild(td2);
    bd.appendChild(tr);
  });
}

// Init
$('#hInputs').querySelector('span').textContent = t('hInputs');
$('#hResult').querySelector('span').textContent = t('hResult');
$('#btnHourly').textContent = t('typeHourly');
$('#btnSalary').textContent = t('typeSalary');
$('#lblHours').textContent = t('lblHours');
$('#lblOT').textContent = t('lblOT');
$('#lblPayFreq').textContent = t('lblPayFreq');
$('#lblAllow').textContent = t('lblAllow');
$('#calcBtn').textContent = t('calcBtn');
$('#rLabNet').textContent = t('rLabNet');
$('#rLabGross').textContent = t('rLabGross');
$('#rLabTax').textContent = t('rLabTax');
$('#rLabEmp').textContent = t('rLabEmp');
$('#rLabAnnual').textContent = t('rLabAnnual');
$('#optWeekly').textContent = t('optWeekly');
$('#optBiweekly').textContent = t('optBiweekly');
$('#optSemimonthly').textContent = t('optSemimonthly');
$('#optMonthly').textContent = t('optMonthly');
$('#optAnnual').textContent = t('optAnnual');
$('#note').textContent = t('note');
setType('hourly');

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🏦', href:'/calc/salary-calculator.html', name:'Salary Calculator'},
    {icon:'⏰', href:'/calc/overtime-calculator.html', name:'Overtime Calculator'},

    {icon:'📊', href:'/calc/tax-calculator.html', name:'Tax Calculator'},

});
</script>
