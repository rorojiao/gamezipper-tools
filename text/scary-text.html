<script>
GZI18n.register({
  en: {
    toolTitle: 'Scary Text Generator 💀',
    toolDesc: 'Create creepy, cursed and horror glitch text with blood-drip zalgo effects. Perfect for Halloween, scary bios and horror posts — adjust intensity and copy & paste anywhere.',
    intensity: 'Creepiness',
    step1: 'Type or paste your text in the input box',
    step2: 'Drag the Creepiness slider for more or less distortion',
    step3: 'Click Copy next to the scary style you like',
    step4: 'Paste into Instagram, TikTok, Discord, YouTube and more',
  },
  zh: {
    toolTitle: '恐怖文字生成器 💀',
    toolDesc: '生成诡异、诅咒和恐怖故障文字，附带滴血 zalgo 效果。适合万圣节、恐怖简介和恐怖帖子 — 调节强度，复制粘贴到任何平台。',
    intensity: '恐怖程度',
    step1: '在输入框中输入或粘贴文字',
    step2: '拖动「恐怖程度」滑块调节扭曲程度',
    step3: '点击复制按钮复制喜欢的恐怖风格',
    step4: '粘贴到 Instagram、TikTok、Discord、YouTube 等平台',
  }
});

const { $, $$, t } = GZ;

// Combining marks for creepy effect
const ABOVE = ['\u030D','\u030E','\u0304','\u0305','\u033F','\u0311','\u0306','\u0310','\u0352','\u0357','\u0351','\u0307','\u0308','\u030A','\u034A','\u034B','\u034C','\u0303','\u0302','\u030C','\u0340','\u0341'];
const BELOW = ['\u0316','\u0317','\u0318','\u0319','\u031C','\u031D','\u031E','\u031F','\u0320','\u0324','\u0325','\u0326','\u0329','\u032A','\u032B','\u032C','\u032D','\u032E','\u032F','\u0330','\u0331','\u0332','\u0333','\u0339','\u033A','\u033B','\u033C'];
const MID = ['\u0335','\u0336','\u0337','\u0338','\u0334','\u035C','\u035D','\u035E'];

function zalgo(str, intensity) {
  let out = '';
  for (const ch of str) {
    if (!/[a-zA-Z0-9]/.test(ch)) { out += ch; continue; }
    out += ch;
    for (let i = 0; i < intensity; i++) {
      out += ABOVE[Math.floor(Math.random() * ABOVE.length)];
      if (Math.random() > 0.4) out += BELOW[Math.floor(Math.random() * BELOW.length)];
      if (Math.random() > 0.7) out += MID[Math.floor(Math.random() * MID.length)];
    }
  }
  return out;
}

function bloodDrip(str) {
  const drip = ['\u0331','\u0323','\u0324','\u0325'];
  return [...str].map(c => /[a-zA-Z]/.test(c) ? c + drip[Math.floor(Math.random()*drip.length)] : c).join('');
}

function cursed(str, intensity) {
  return [...str].map(c => {
    if (!/[a-zA-Z]/.test(c)) return c;
    let r = c;
    for (let i = 0; i < intensity; i++) r += MID[Math.floor(Math.random()*MID.length)] + BELOW[Math.floor(Math.random()*BELOW.length)];
    return r;
  }).join('');
}

function ghost(str) {
  return [...str].map(c => c === ' ' ? ' ~ ' : c).join('') + ' 👻💀';
}

function vampire(str) {
  return `🩸 ${str} 🦇🩸`;
}

function graveyard(str) {
  return `⚰️ ${str} ⚰️🪦`;
}

const STYLES = [
  { name: 'Cursed Zalgo', fn: (s,n) => zalgo(s,n) },
  { name: 'Blood Drip 🩸', fn: (s,n) => bloodDrip(s) + zalgo('',n) },
  { name: 'Possessed', fn: (s,n) => cursed(s,n) },
  { name: 'Ghost 👻', fn: s => ghost(s) },
  { name: 'Vampire 🦇', fn: s => vampire(s) },
  { name: 'Graveyard ⚰️', fn: s => graveyard(s) },
  { name: 'Demonic Heavy', fn: (s,n) => zalgo(s,n*2) },
  { name: 'Cursed + Blood', fn: (s,n) => bloodDrip(zalgo(s,n)) },
  { name: 'Skull Spaced', fn: s => [...s].map(c => c === ' ' ? ' 💀 ' : c).join('') + ' 💀' },
  { name: 'Nightmare', fn: (s,n) => 'ⁿⁱᵍʰᵗᵐᵃʳᵉ ' + zalgo(s,n) + ' 😈' },
];

$('#lbl-intensity').textContent = t('intensity');
$('#intensity').addEventListener('input', e => { $('#int-val').textContent = e.target.value; render(); });

function render() {
  const text = $('#input').value;
  const n = +$('#intensity').value;
  $('#grid').innerHTML = STYLES.map((s,i) =>
    `<div class="sc-row"><div class="name">${s.name}</div><div class="out" data-i="${i}"></div><button class="cp" data-i="${i}">${t('copy')}</button></div>`
  ).join('');
  STYLES.forEach((s,i) => {
    try { const el = $$('.sc-row .out[data-i="'+i+'"]')[0]; el.textContent = s.fn(text, n); } catch(e) {}
  });
  $$('.sc-row .cp').forEach(btn => btn.addEventListener('click', () => {
    const out = $$('.sc-row .out[data-i="'+btn.dataset.i+'"]')[0].textContent;
    GZ.copyText(out);
  }));
}

$('#input').addEventListener('input', render);

$('#toolbar').innerHTML = `
  <button class="gz-btn gz-btn-secondary" onclick="$('#input').value='BOO';render()">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#input').value='';render()">${t('clear')}</button>`;

$('#input').value = 'Scary';
render();

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🌀', href:'/text/zalgo.html', name:'Zalgo Text'},
    {icon:'🔥', href:'/text/fire-text.html', name:'Fire Text'},
    {icon:'✨', href:'/text/fancy-text.html', name:'Fancy Text'},
    {icon:'ⓞ', href:'/text/bubble-text.html', name:'Bubble Text'},
  ]
});
</script>
