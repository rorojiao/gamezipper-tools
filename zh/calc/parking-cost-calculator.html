<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"How do I calculate parking cost?","acceptedAnswer":{"@type":"Answer","text":"Multiply the hourly rate by the number of hours parked. For example, $3/hour for 4 hours = $12 total. Many garages also offer daily max rates, so check for caps."}},{"@type":"Question","name":"Is monthly parking cheaper than daily?","acceptedAnswer":{"@type":"Answer","text":"Usually yes. Monthly parking passes typically cost 50-70% less than paying daily rates for a full month. This calculator helps you compare both options."}},{"@type":"Question","name":"What is a daily max rate?","acceptedAnswer":{"@type":"Answer","text":"A daily max rate is the highest amount a parking garage will charge in a single day, regardless of how many hours you stay. If the hourly rate would exceed the daily max, you only pay the daily max."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="calc-row">
      <div class="calc-group">
        <label id="lbl-hours"></label>
        <input type="number" id="hours" value="8" min="0" max="744" step="0.5">
      </div>
      <div class="calc-group">
        <label id="lbl-days"></label>
        <input type="number" id="days" value="22" min="0" max="365" step="1">
      </div>
    </div>
    <div class="calc-row">
      <div class="calc-group">
        <label id="lbl-hourly-rate"></label>
        <input type="number" id="hourlyRate" value="3" min="0" step="0.25">
      </div>
      <div class="calc-group">
        <label id="lbl-daily-max"></label>
        <input type="number" id="dailyMax" value="18" min="0" step="0.5">
      </div>
    </div>
    <div class="calc-row">
      <div class="calc-group">
        <label id="lbl-weekly-rate"></label>
        <input type="number" id="weeklyRate" value="75" min="0" step="1">
      </div>
      <div class="calc-group">
        <label id="lbl-monthly-rate"></label>
        <input type="number" id="monthlyRate" value="200" min="0" step="5">
      </div>
    </div>
    <button class="gz-btn" id="btnCalc" style="width:100%"></button>
    <div class="result-box" id="results" style="display:none">
      <div class="result-big">
        <div class="label" id="lbl-total"></div>
        <div class="amount" id="totalCost">$0</div>
      </div>
      <div class="result-row"><span class="result-label" id="r-per-day"></span><span class="result-value" id="perDay">$0</span></div>
      <div class="result-row"><span class="result-label" id="r-per-hour-avg"></span><span class="result-value" id="perHourAvg">$0</span></div>
      <div class="result-row"><span class="result-label" id="r-savings"></span><span class="result-value" id="savings" style="color:#10b981">$0</span></div>
    </div>
    <div class="compare-grid" id="compareGrid" style="display:none">
      <div class="compare-card"><div class="period" id="cp-daily"></div><div class="cost" id="cpDailyCost">$0</div></div>
      <div class="compare-card"><div class="period" id="cp-weekly"></div><div class="cost" id="cpWeeklyCost">$0</div></div>
      <div class="compare-card"><div class="period" id="cp-monthly"></div><div class="cost" id="cpMonthlyCost">$0</div></div>
      <div class="compare-card"><div class="period" id="cp-annual"></div><div class="cost" id="cpAnnualCost">$0</div></div>
    </div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Parking Cost Calculator',
    toolDesc: 'Calculate and compare parking costs — hourly, daily, weekly, and monthly. Find the cheapest parking option for your needs.',
    hoursPerDay: 'Hours Per Day',
    daysPerMonth: 'Days Per Month',
    hourlyRate: 'Hourly Rate ($)',
    dailyMax: 'Daily Max Rate ($)',
    weeklyRate: 'Weekly Rate ($)',
    monthlyRate: 'Monthly Pass ($)',
    calculate: 'Calculate & Compare',
    totalCost: 'Monthly Cost (Pay-Per-Use)',
    perDayCost: 'Cost Per Day',
    avgHourlyCost: 'Avg Cost Per Hour',
    bestOptionSavings: 'Best Option Saves',
    dailyCost: 'Daily Cost',
    weeklyCost: 'Weekly Cost',
    monthlyCost: 'Monthly Cost',
    annualCost: 'Annual Cost',
    step1: 'Enter hours per day and days per month you park',
    step2: 'Enter the hourly rate and daily max',
    step3: 'Enter weekly and monthly pass rates if available',
    step4: 'Compare options to find the cheapest plan',
  },
  zh: {
    toolTitle: '停车费计算器',
    toolDesc: '计算并对比停车费用 — 按小时、天、周和月费率。找到最省钱的停车方案。',
    hoursPerDay: '每天停车小时数',
    daysPerMonth: '每月停车天数',
    hourlyRate: '小时费率（$）',
    dailyMax: '每日封顶价（$）',
    weeklyRate: '周费率（$）',
    monthlyPass: '月卡价格（$）',
    calculate: '计算并对比',
    totalCost: '月度费用（按次付费）',
    perDayCost: '每天费用',
    avgHourlyCost: '平均每小时费用',
    bestOptionSavings: '最优方案节省',
    dailyCost: '每天费用',
    weeklyCost: '每周费用',
    monthlyCost: '每月费用',
    annualCost: '年度费用',
    step1: '输入每天停车小时数和每月停车天数',
    step2: '输入小时费率和每日封顶价',
    step3: '如果有的话，输入周费率和月卡价格',
    step4: '对比各方案，找到最便宜的选项',
  }
});

const { $, t } = GZ;

$('#lbl-hours').textContent = t('hoursPerDay');
$('#lbl-days').textContent = t('daysPerMonth');
$('#lbl-hourly-rate').textContent = t('hourlyRate');
$('#lbl-daily-max').textContent = t('dailyMax');
$('#lbl-weekly-rate').textContent = t('weeklyRate');
$('#lbl-monthly-rate').textContent = t('monthlyRate');
$('#btnCalc').textContent = t('calculate');

function fmt(n) { return '$' + n.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2}); }

$('#btnCalc').addEventListener('click', () => {
  const hrs = parseFloat($('#hours').value) || 0;
  const days = parseFloat($('#days').value) || 0;
  const hRate = parseFloat($('#hourlyRate').value) || 0;
  const dMax = parseFloat($('#dailyMax').value) || Infinity;
  const wRate = parseFloat($('#weeklyRate').value) || 0;
  const mRate = parseFloat($('#monthlyRate').value) || 0;

  // Daily cost (with daily max)
  const dailyCost = Math.min(hrs * hRate, dMax);
  const monthlyPayPerUse = dailyCost * days;
  const weeklyCost = wRate || dailyCost * 5;
  const monthlyFromWeekly = weeklyCost * 4.33;

  // Find best monthly option
  const monthlyOptions = [monthlyPayPerUse, monthlyFromWeekly, mRate || Infinity].filter(v => v > 0 && isFinite(v));
  const bestMonthly = Math.min(...monthlyOptions);

  // Annual costs
  const annualPayPerUse = monthlyPayPerUse * 12;
  const annualWeekly = monthlyFromWeekly * 12;
  const annualMonthly = (mRate || Infinity) * 12;
  const bestAnnual = Math.min(annualPayPerUse, annualWeekly, isFinite(annualMonthly) ? annualMonthly : Infinity);

  // Savings
  const worstMonthly = Math.max(...monthlyOptions.filter(v => isFinite(v)));
  const savings = worstMonthly - bestMonthly;

  $('#results').style.display = '';
  $('#compareGrid').style.display = '';
  $('#lbl-total').textContent = t('totalCost');
  $('#totalCost').textContent = fmt(monthlyPayPerUse);
  $('#perDay').textContent = fmt(dailyCost);
  $('#perHourAvg').textContent = fmt(hrs > 0 ? dailyCost / hrs : 0);
  $('#savings').textContent = savings > 0 ? fmt(savings) + '/mo' : '—';
  $('#r-per-day').textContent = t('perDayCost');
  $('#r-per-hour-avg').textContent = t('avgHourlyCost');
  $('#r-savings').textContent = t('bestOptionSavings');

  // Compare cards
  $('#cp-daily').textContent = t('dailyCost');
  $('#cpDailyCost').textContent = fmt(dailyCost);
  $('#cp-weekly').textContent = t('weeklyCost');
  $('#cpWeeklyCost').textContent = fmt(weeklyCost);
  $('#cp-monthly').textContent = t('monthlyCost');
  $('#cpMonthlyCost').textContent = fmt(bestMonthly);
  $('#cp-annual').textContent = t('annualCost');
  $('#cpAnnualCost').textContent = fmt(isFinite(bestAnnual) ? bestAnnual : 0);
});

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'⛽', href:'/calc/fuel-cost-calculator.html', name:'Fuel Cost Calculator'},
    {icon:'💰', href:'/calc/budget-planner.html', name:'Budget Planner'},
    {icon:'🏷️', href:'/calc/discount-calculator.html', name:'Discount Calculator'},
    {icon:'🏦', href:'/calc/loan-calculator.html', name:'Loan Calculator'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
