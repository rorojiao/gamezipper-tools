.ec-field{display:flex;flex-direction:column;gap:6px}
.ec-field label{font-size:.85em;color:var(--text2);font-weight:600}
.ec-field input,.ec-field select{padding:10px 12px;font-size:1em;border:1px solid var(--border);border-radius:8px;background:var(--glass);color:var(--text);width:100%}
.ec-mode{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.ec-mode button{font-size:.85em}
.ec-mode button.active{background:var(--accent);color:#1a1a2e}
.ec-results{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin:14px 0}

.ec-preset{background:var(--glass2);border:1px solid var(--border);border-radius:20px;padding:6px 12px;font-size:.82em;cursor:pointer;transition:all .2s}
.ec-preset:hover{background:var(--accent);color:#1a1a2e}
.ec-preset .pwr{color:var(--text2);font-size:.85em}
.ec-breakdown{margin-top:14px;background:var(--glass2);border:1px solid var(--border);border-radius:12px;padding:16px}
.ec-breakdown h4{margin:0 0 10px;font-size:1em}
.ec-breakdown table{width:100%;border-collapse:collapse;font-size:.9em}
.ec-breakdown th,.ec-breakdown td{padding:8px 10px;text-align:left;border-bottom:1px solid var(--border)}
.ec-breakdown th{color:var(--text2);font-weight:600;font-size:.85em}
.ec-breakdown td.val{text-align:right;font-weight:700;color:var(--accent)}
.ec-info{margin:14px 0;background:var(--glass2);border:1px solid var(--border);border-radius:12px;padding:14px;font-size:.85em;color:var(--text2)}
</style>

<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "How is electricity cost calculated?", "acceptedAnswer": {"@type": "Answer", "text": "Cost = (Watts × Hours per day) / 1000 × Days × Rate per kWh. For example, a 100W bulb running 5 hours a day at $0.15/kWh costs (100×5/1000) × 30 × 0.15 = $2.25 per month."}}, {"@type": "Question", "name": "What is a typical electricity rate per kWh?", "acceptedAnswer": {"@type": "Answer", "text": "In the US the average is about $0.16/kWh, in the UK £0.30, and in the EU around €0.25. Rates vary by region, time of use, and provider — check your utility bill for the exact figure."}}, {"@type": "Question", "name": "How can I reduce my electricity bill?", "acceptedAnswer": {"@type": "Answer", "text": "Switch to LED lighting, use smart power strips to stop vampire draw, run dishwashers and washing machines with full loads, set your AC 1-2°C higher in summer, and run high-wattage appliances during off-peak hours."}}, {"@type": "Question", "name": "Do appliances use power when turned off?", "acceptedAnswer": {"@type": "Answer", "text": "Yes — most modern electronics draw 0.5 to 5 watts in standby. Vampire load can add 5-10% to a typical household bill, which is why smart strips and unplugging idle devices can help."}}]}</script>

  <div class="gz-tool-area">

      <table>
        <thead><tr><th id="thPeriod">Period</th><th id="thHours">Hours</th><th id="thEnergy">Energy (kWh)</th><th id="thCost">Cost</th></tr></thead>
        <tbody id="bdBody"></tbody>
      </table>
    </div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    ecTitle: 'Electricity Cost Calculator',
    ecDesc: 'Calculate how much any appliance costs to run per day, month, or year. Enter wattage, daily usage hours, and your local kWh rate.',
    fromWatts: 'From Watts', fromKwh: 'From kWh',
    power: 'Power (Watts)', dailyUse: 'Hours per day', rate: 'Rate per kWh', monthlyKwh: 'Monthly kWh', days: 'Days per month',
    currency: '$',
    perDay: 'Per day', perWeek: 'Per week', perMonth: 'Per month', perYear: 'Per year',
    energyUse: 'Energy use', totalCost: 'Total cost',
    presetsTitle: '⚡ Common Appliances',
    bdTitle: '📊 Detailed Breakdown',
    thPeriod: 'Period', thHours: 'Hours', thEnergy: 'Energy (kWh)', thCost: 'Cost',
    formula: 'Formula: kWh = (Watts × Hours) ÷ 1000, then Cost = kWh × Rate',
    ecStep1: 'Pick a calculation mode — from watts + hours, or directly from kWh',
    ecStep2: 'Enter your appliance wattage (or kWh) and your local electricity rate',
    ecStep3: 'See daily, weekly, monthly and yearly energy cost estimates',
    ecStep4: 'Click a preset to quickly load a common appliance',
    p1:['LED Bulb 10W',10],p2:['Incandescent 60W',60],p3:['Laptop',50],p4:['Desktop PC',200],p5:['Gaming Console',150],p6:['TV 55" LED',80],p7:['Refrigerator',150],p8:['Microwave',1000],p9:['Hair Dryer',1800],p10:['Space Heater',1500],p11:['AC (window)',1000],p12:['Dishwasher',1800],
  },
  zh: {
    ecTitle: '电费计算器',
    ecDesc: '计算任何电器每天、每月、每年的运行电费。输入功率、每日使用小时数和当地电价。',
    fromWatts: '从瓦数计算', fromKwh: '从 kWh 计算',
    power: '功率（瓦）', dailyUse: '每日小时数', rate: '每度电价', monthlyKwh: '每月 kWh', days: '每月天数',
    currency: '¥',
    perDay: '每天', perWeek: '每周', perMonth: '每月', perYear: '每年',
    energyUse: '耗电', totalCost: '总费用',
    presetsTitle: '⚡ 常见电器',
    bdTitle: '📊 详细明细',
    thPeriod: '周期', thHours: '小时', thEnergy: '电量 (kWh)', thCost: '费用',
    formula: '公式：kWh = (瓦数 × 小时) ÷ 1000，费用 = kWh × 单价',
    ecStep1: '选择计算模式 —— 从瓦数 + 小时数，或直接输入 kWh',
    ecStep2: '输入电器功率（或 kWh）和当地电价',
    ecStep3: '查看每日、每周、每月、每年的电费估算',
    ecStep4: '点击预设快速加载常见电器',
    p1:['LED 灯泡 10W',10],p2:['白炽灯 60W',60],p3:['笔记本',50],p4:['台式电脑',200],p5:['游戏主机',150],p6:['55寸电视',80],p7:['冰箱',150],p8:['微波炉',1000],p9:['吹风机',1800],p10:['电暖器',1500],p11:['窗式空调',1000],p12:['洗碗机',1800],
  }
});

const {t,$} = GZ;

let mode = 'watts';
let state = { watts:100, hours:8, rate:0.16, monthlyKwh:300, days:30 };

function renderModeRow(){
  $('#modeRow').innerHTML = `
    <button class="gz-btn ${mode==='watts'?'active':''}" onclick="setMode('watts')">${t('fromWatts')}</button>
    <button class="gz-btn gz-btn-secondary ${mode==='kwh'?'active':''}" onclick="setMode('kwh')">${t('fromKwh')}</button>
  `;
}
function setMode(m){mode=m;renderModeRow();renderForm();calc();}
window.setMode = setMode;

function renderForm(){
  if(mode==='watts'){
    $('#form').innerHTML = `
      <div class="ec-field"><label>${t('power')}</label><input type="number" id="watts" min="0" step="1" value="${state.watts}"></div>
      <div class="ec-field"><label>${t('dailyUse')}</label><input type="number" id="hours" min="0" step="0.5" value="${state.hours}"></div>
      <div class="ec-field"><label>${t('rate')}</label><input type="number" id="rate" min="0" step="0.01" value="${state.rate}"></div>
      <div class="ec-field"><label>${t('days')}</label><input type="number" id="days" min="1" max="31" value="${state.days}"></div>
    `;
    ['watts','hours','rate','days'].forEach(k=>{ $('#'+k).addEventListener('input', e=>{ state[k]=+e.target.value||0; calc(); }); });
  } else {
    $('#form').innerHTML = `
      <div class="ec-field"><label>${t('monthlyKwh')}</label><input type="number" id="monthlyKwh" min="0" step="1" value="${state.monthlyKwh}"></div>
      <div class="ec-field"><label>${t('rate')}</label><input type="number" id="rate" min="0" step="0.01" value="${state.rate}"></div>
    `;
    ['monthlyKwh','rate'].forEach(k=>{ $('#'+k).addEventListener('input', e=>{ state[k]=+e.target.value||0; calc(); }); });
  }
}

function calc(){
  let kWhPerDay, hoursPerDay, daysPerMonth = 30;
  if(mode==='watts'){
    state.watts = +$('#watts').value||0;
    state.hours = +$('#hours').value||0;
    state.rate = +$('#rate').value||0;
    state.days = +$('#days').value||30;
    daysPerMonth = state.days;
    kWhPerDay = (state.watts * state.hours) / 1000;
    hoursPerDay = state.hours;
  } else {
    state.monthlyKwh = +$('#monthlyKwh').value||0;
    state.rate = +$('#rate').value||0;
    kWhPerDay = state.monthlyKwh / 30;
    hoursPerDay = 0;
  }
  const cur = t('currency');
  const costDay = kWhPerDay * state.rate;
  const costWeek = costDay * 7;
  const costMonth = costDay * daysPerMonth;
  const costYear = costDay * 365;
  const kWhWeek = kWhPerDay * 7;
  const kWhMonth = kWhPerDay * daysPerMonth;
  const kWhYear = kWhPerDay * 365;

  $('#results').innerHTML = `
    <div class="ec-result"><div class="val">${cur}${costDay.toFixed(2)}</div><div class="lbl">${t('perDay')}</div></div>
    <div class="ec-result"><div class="val">${cur}${costWeek.toFixed(2)}</div><div class="lbl">${t('perWeek')}</div></div>
    <div class="ec-result highlight"><div class="val">${cur}${costMonth.toFixed(2)}</div><div class="lbl">${t('perMonth')}</div></div>
    <div class="ec-result"><div class="val">${cur}${costYear.toFixed(2)}</div><div class="lbl">${t('perYear')}</div></div>
    <div class="ec-result"><div class="val">${kWhPerDay.toFixed(2)}</div><div class="lbl">kWh / ${t('perDay')}</div></div>
    <div class="ec-result"><div class="val">${kWhMonth.toFixed(1)}</div><div class="lbl">kWh / ${t('perMonth')}</div></div>
  `;

  const fmt = (h, k, c) => `<tr><td>${h}</td><td>${(h==='Per day'?hoursPerDay.toFixed(1):(h==='Per week'?hoursPerDay*7:hoursPerDay*30))}</td><td>${k.toFixed(2)}</td><td class="val">${cur}${c.toFixed(2)}</td></tr>`;
  $('#bdBody').innerHTML = `
    <tr><td>${t('perDay')}</td><td>${mode==='watts'?hoursPerDay.toFixed(1):'—'}</td><td>${kWhPerDay.toFixed(3)}</td><td class="val">${cur}${costDay.toFixed(2)}</td></tr>
    <tr><td>${t('perWeek')}</td><td>${mode==='watts'?(hoursPerDay*7).toFixed(1):'—'}</td><td>${kWhWeek.toFixed(2)}</td><td class="val">${cur}${costWeek.toFixed(2)}</td></tr>
    <tr><td>${t('perMonth')}</td><td>${mode==='watts'?(hoursPerDay*daysPerMonth).toFixed(1):'—'}</td><td>${kWhMonth.toFixed(2)}</td><td class="val">${cur}${costMonth.toFixed(2)}</td></tr>
    <tr><td>${t('perYear')}</td><td>${mode==='watts'?(hoursPerDay*365).toFixed(1):'—'}</td><td>${kWhYear.toFixed(1)}</td><td class="val">${cur}${costYear.toFixed(2)}</td></tr>
  `;
}

function renderPresets(){
  const presets = [];
  for(let i=1;i<=12;i++){
    const p = t('p'+i);
    if(p)presets.push({name:p[0], watts:p[1]});
  }
  $('#presets').innerHTML = presets.map(p=>`<div class="ec-preset" onclick="loadPreset(${p.watts})">${p.name} <span class="pwr">${p.watts}W</span></div>`).join('');
}
function loadPreset(watts){
  mode='watts';
  state.watts=watts;state.hours=8;state.rate=0.16;state.days=30;
  renderModeRow();renderForm();calc();
}
window.loadPreset = loadPreset;

$('#formula').textContent = t('formula');
renderModeRow();renderForm();renderPresets();calc();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'ecTitle',
  descKey: 'ecDesc',
  howToSteps: ['ecStep1','ecStep2','ecStep3','ecStep4'],
  related: [
    {icon:'⛽', href:'/calc/fuel-cost-calculator.html', name:'Fuel Cost'},
    {icon:'💡', href:'/calc/unit-price.html', name:'Unit Price'},
    {icon:'🏠', href:'/calc/savings-goal-calculator.html', name:'Savings Goal'},
    {icon:'📊', href:'/calc/bill-splitter.html', name:'Bill Splitter'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
