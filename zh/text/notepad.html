</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Online Notepad',
    toolDesc: 'Free online notepad with auto-save, multiple tabs, and download. Write and organize notes directly in your browser — no signup required.',
    newTab: 'New',
    download: 'Download',
    clear: 'Clear',
    clearAll: 'Clear All',
    wordCount: 'words',
    charCount: 'chars',
    lineCount: 'lines',
    saved: '✓ Auto-saved',
    placeholder: 'Start typing your note here…',
    step1: 'Click + to create a new note tab',
    step2: 'Type or paste your text — it auto-saves to your browser',
    step3: 'Switch between tabs to manage multiple notes',
    step4: 'Click Download to save any note as a .txt file',
  },
  zh: {
    toolTitle: '在线记事本',
    toolDesc: '免费在线记事本，支持自动保存、多标签和下载。直接在浏览器中编写和管理笔记 — 无需注册。',
    newTab: '新建',
    download: '下载',
    clear: '清除',
    clearAll: '清除全部',
    wordCount: '词',
    charCount: '字符',
    lineCount: '行',
    saved: '✓ 已自动保存',
    placeholder: '在此输入笔记内容…',
    step1: '点击 + 创建新的笔记标签',
    step2: '输入或粘贴文本 — 自动保存到浏览器',
    step3: '在标签之间切换管理多个笔记',
    step4: '点击「下载」将笔记保存为 .txt 文件',
  }
});

const { $, t } = GZ;
const STORAGE_KEY = 'gz-notepad-tabs';
let tabs = [];
let activeTab = 0;

function loadTabs() {
  try {
    const data = localStorage.getItem(STORAGE_KEY);
    if (data) {
      const parsed = JSON.parse(data);
      if (Array.isArray(parsed) && parsed.length > 0) {
        tabs = parsed;
        return;
      }
    }
  } catch(e) {}
  tabs = [{ name: t('newTab') + ' 1', content: '' }];
}

function saveTabs() {
  // Save current textarea content first
  if (tabs[activeTab]) {
    tabs[activeTab].content = $('#notepad').value;
  }
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(tabs));
  } catch(e) {}
}

function renderTabs() {
  const container = $('#note-tabs');
  container.innerHTML = tabs.map((tab, i) =>
    `<div class="note-tab${i === activeTab ? ' active' : ''}" onclick="switchTab(${i})">` +
    `<span>${tab.name}</span>` +
    (tabs.length > 1 ? `<span class="close-tab" onclick="event.stopPropagation();closeTab(${i})">✕</span>` : '') +
    `</div>`
  ).join('') +
  `<div class="note-tab" onclick="addTab()" style="font-weight:700">+ ${t('newTab')}</div>`;
}

function switchTab(i) {
  // Save current
  if (tabs[activeTab]) tabs[activeTab].content = $('#notepad').value;
  activeTab = i;
  $('#notepad').value = tabs[i].content;
  renderTabs();
  updateStats();
}

function addTab() {
  if (tabs[activeTab]) tabs[activeTab].content = $('#notepad').value;
  const idx = tabs.length + 1;
  tabs.push({ name: t('newTab') + ' ' + idx, content: '' });
  activeTab = tabs.length - 1;
  $('#notepad').value = '';
  renderTabs();
  saveTabs();
  $('#notepad').focus();
}

function closeTab(i) {
  if (tabs.length <= 1) return;
  tabs.splice(i, 1);
  if (activeTab >= tabs.length) activeTab = tabs.length - 1;
  if (activeTab < 0) activeTab = 0;
  $('#notepad').value = tabs[activeTab].content;
  renderTabs();
  saveTabs();
  updateStats();
}

function updateStats() {
  const text = $('#notepad').value;
  const chars = text.length;
  const words = text.trim() ? text.trim().split(/\s+/).length : 0;
  const lines = text ? text.split('\n').length : 0;
  $('#note-stats').textContent = `${words} ${t('wordCount')} · ${chars} ${t('charCount')} · ${lines} ${t('lineCount')}`;
}

function doClear() {
  $('#notepad').value = '';
  tabs[activeTab].content = '';
  saveTabs();
  updateStats();
}

function doClearAll() {
  if (!confirm('Clear all notes?')) return;
  tabs = [{ name: t('newTab') + ' 1', content: '' }];
  activeTab = 0;
  $('#notepad').value = '';
  renderTabs();
  saveTabs();
  updateStats();
}

function doDownload() {
  const text = $('#notepad').value;
  const blob = new Blob([text], { type: 'text/plain' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = (tabs[activeTab].name || 'note') + '.txt';
  a.click();
  URL.revokeObjectURL(a.href);
}

let saveTimeout;
$('#notepad').addEventListener('input', function() {
  updateStats();
  clearTimeout(saveTimeout);
  saveTimeout = setTimeout(() => {
    saveTabs();
    $('#note-save-status').textContent = t('saved');
    setTimeout(() => { $('#note-save-status').textContent = ''; }, 2000);
  }, 500);
});

$('#notepad').placeholder = t('placeholder');

// Init
loadTabs();
activeTab = Math.min(activeTab, tabs.length - 1);
$('#notepad').value = tabs[activeTab].content;
renderTabs();
updateStats();

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="doDownload()">📥 ${t('download')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">↺ ${t('clear')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClearAll()">🗑️ ${t('clearAll')}</button>`;

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📝', href:'/text/word-counter.html', name:'Word Counter'},
    {icon:'📝', href:'/text/markdown.html', name:'Markdown Preview'},
    {icon:'🔤', href:'/text/case-converter.html', name:'Case Converter'},
    {icon:'🔍', href:'/text/find-replace.html', name:'Find & Replace'},
  ]
});
</script>
