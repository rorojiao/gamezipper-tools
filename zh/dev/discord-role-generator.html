<script>

    permBits: '权限位',

    roleJson: '角色 JSON',
    botCode: 'Discord.js 代码',
    step1: '输入角色名称并选择颜色',
    step2: '勾选权限或使用预设',

const { $, copyText, t } = GZ;

// Discord permission flags (Discord.js v14 PermissionsBitField)
const PERMS = {
  general: [
    ['CREATE_INSTANT_INVITE', 1n<<0, 'Create Invite'],
    ['KICK_MEMBERS', 1n<<1, 'Kick Members'],
    ['BAN_MEMBERS', 1n<<2, 'Ban Members'],
    ['ADMINISTRATOR', 1n<<3, 'Administrator'],
    ['MANAGE_CHANNELS', 1n<<4, 'Manage Channels'],
    ['MANAGE_GUILD', 1n<<5, 'Manage Server'],
    ['ADD_REACTIONS', 1n<<6, 'Add Reactions'],
    ['VIEW_AUDIT_LOG', 1n<<7, 'View Audit Log'],
    ['PRIORITY_SPEAKER', 1n<<8, 'Priority Speaker'],
    ['STREAM', 1n<<9, 'Video'],
    ['VIEW_CHANNEL', 1n<<10, 'View Channels'],
    ['SEND_MESSAGES', 1n<<11, 'Send Messages'],
    ['SEND_TTS_MESSAGES', 1n<<12, 'Send TTS Messages'],
    ['MANAGE_MESSAGES', 1n<<13, 'Manage Messages'],
    ['EMBED_LINKS', 1n<<14, 'Embed Links'],
    ['ATTACH_FILES', 1n<<15, 'Attach Files'],
    ['READ_MESSAGE_HISTORY', 1n<<16, 'Read Message History'],
    ['MENTION_EVERYONE', 1n<<17, 'Mention @everyone'],
    ['USE_EXTERNAL_EMOJIS', 1n<<18, 'Use External Emojis'],
    ['VIEW_GUILD_INSIGHTS', 1n<<19, 'View Server Insights'],
    ['CONNECT', 1n<<20, 'Connect'],
    ['SPEAK', 1n<<21, 'Speak'],
    ['MUTE_MEMBERS', 1n<<22, 'Mute Members'],
    ['DEAFEN_MEMBERS', 1n<<23, 'Deafen Members'],
    ['MOVE_MEMBERS', 1n<<24, 'Move Members'],
    ['USE_VAD', 1n<<25, 'Use Voice Activity'],
    ['CHANGE_NICKNAME', 1n<<26, 'Change Nickname'],
    ['MANAGE_NICKNAMES', 1n<<27, 'Manage Nicknames'],
    ['MANAGE_ROLES', 1n<<28, 'Manage Roles'],
    ['MANAGE_WEBHOOKS', 1n<<29, 'Manage Webhooks'],
    ['MANAGE_EMOJIS', 1n<<30, 'Manage Emojis'],
    ['USE_APPLICATION_COMMANDS', 1n<<31, 'Use Application Commands'],
    ['REQUEST_TO_SPEAK', 1n<<32, 'Request to Speak'],
    ['MANAGE_EVENTS', 1n<<33, 'Manage Events'],
    ['MANAGE_THREADS', 1n<<34, 'Manage Threads'],
    ['USE_PUBLIC_THREADS', 1n<<45, 'Use Public Threads'],
    ['CREATE_PUBLIC_THREADS', 1n<<35, 'Create Public Threads'],
    ['USE_PRIVATE_THREADS', 1n<<46, 'Use Private Threads'],
    ['CREATE_PRIVATE_THREADS', 1n<<36, 'Create Private Threads'],
    ['USE_EXTERNAL_STICKERS', 1n<<37, 'Use External Stickers'],
    ['SEND_MESSAGES_IN_THREADS', 1n<<38, 'Send Messages in Threads'],
    ['USE_EMBEDDED_ACTIVITIES', 1n<<39, 'Use Activities'],
    ['MODERATE_MEMBERS', 1n<<40, 'Moderate Members (Timeout)'],
    ['VIEW_CREATOR_MONETIZATION_ANALYTICS', 1n<<41, 'View Monetization Analytics'],
    ['USE_SOUNDBOARD', 1n<<42, 'Use Soundboard'],
    ['CREATE_GUILD_EXPRESSIONS', 1n<<43, 'Create Expressions'],
    ['CREATE_EVENTS', 1n<<44, 'Create Events'],
    ['USE_EXTERNAL_SOUNDS', 1n<<47, 'Use External Sounds'],
    ['SEND_VOICE_MESSAGES', 1n<<46, 'Send Voice Messages'],
  ],
  text: [
  ],
  voice: [
  ],
};

let state = { name:'Moderator', color:'#5865F2', mentionable:true, hoist:false, perms:new Set() };

function buildConfig(){
  const permHtml = Object.entries(PERMS).map(([cat, items]) =>
    `<div class="cat-header">${cat.charAt(0).toUpperCase()+cat.slice(1)}</div>
     <div class="perm-grid">${items.map(([key,val,label])=>`<label class="perm-item"><input type="checkbox" data-key="${key}" data-val="${val}" ${state.perms.has(val)?'checked':''} onchange="togglePerm(this)"> ${label}</label>`).join('')}</div>`
  ).join('');

  $('#config').innerHTML = `
  <div class="field"><label>${t('roleName')}</label><input id="f-name" value="${state.name}" oninput="state.name=this.value;generate()"></div>
  <div class="field"><label>${t('color')} <span class="color-swatch" id="swatch" style="background:${state.color}"></span></label><input type="color" id="f-color" value="${state.color}" oninput="state.color=this.value;document.getElementById('swatch').style.background=this.value;generate()" style="width:60px;height:36px;padding:2px"></div>
  <div style="margin-bottom:10px">
    <label class="perm-item" style="display:flex"><input type="checkbox" id="f-mention" ${state.mentionable?'checked':''} onchange="state.mentionable=this.checked;generate()"> ${t('mentionable')}</label>
    <label class="perm-item" style="display:flex;margin-top:4px"><input type="checkbox" id="f-hoist" ${state.hoist?'checked':''} onchange="state.hoist=this.checked;generate()"> ${t('hoist')}</label>
  </div>
  <div class="field">
    <label>${t('preset')}</label>
    <select id="f-preset" onchange="applyPreset(this.value)">
      <option value="">— ${t('preset')} —</option>
      <option value="admin">${t('pAdmin')}</option>
      <option value="mod">${t('pModerator')}</option>
      <option value="member">${t('pMember')}</option>
      <option value="bot">${t('pBot')}</option>
      <option value="none">${t('pNone')}</option>
    </select>
  </div>
  <div style="margin-bottom:6px">
    <button class="gz-btn gz-btn-sm gz-btn-secondary" onclick="selectAllPerms(true)">${t('selectAll')}</button>
    <button class="gz-btn gz-btn-sm gz-btn-secondary" onclick="selectAllPerms(false)">${t('deselectAll')}</button>
  </div>
  <div class="cat-header">${t('permissions')}</div>
  ${permHtml}`;
}

function togglePerm(el){
  const val = BigInt(el.dataset.val);
  if(el.checked) state.perms.add(val); else state.perms.delete(val);
  generate();
}

function selectAllPerms(on){
  document.querySelectorAll('.perm-item input[type=checkbox][data-key]').forEach(el => {
    el.checked = on;
    const val = BigInt(el.dataset.val);
    if(on) state.perms.add(val); else state.perms.delete(val);
  });
  generate();
}

function applyPreset(p){
  state.perms = new Set();
  const M = (k) => { const item = PERMS.general.find(([key])=>key===k); if(item) state.perms.add(item[1]); };
  if(p==='admin'){ M('ADMINISTRATOR'); }
  else if(p==='mod'){ ['KICK_MEMBERS','BAN_MEMBERS','MANAGE_MESSAGES','MANAGE_CHANNELS','MANAGE_ROLES','VIEW_AUDIT_LOG','DEAFEN_MEMBERS','MOVE_MEMBERS','MUTE_MEMBERS','MODERATE_MEMBERS','MANAGE_THREADS'].forEach(M); }
  else if(p==='member'){ ['VIEW_CHANNEL','SEND_MESSAGES','EMBED_LINKS','ATTACH_FILES','READ_MESSAGE_HISTORY','ADD_REACTIONS','USE_EXTERNAL_EMOJIS','CONNECT','SPEAK','USE_VAD','CHANGE_NICKNAME','STREAM','USE_APPLICATION_COMMANDS'].forEach(M); }
  else if(p==='bot'){ ['MANAGE_CHANNELS','MANAGE_ROLES','MANAGE_WEBHOOKS','VIEW_AUDIT_LOG','SEND_MESSAGES','EMBED_LINKS','ATTACH_FILES','READ_MESSAGE_HISTORY','USE_APPLICATION_COMMANDS','MANAGE_MESSAGES','MANAGE_THREADS'].forEach(M); }
  // refresh checkboxes
  document.querySelectorAll('.perm-item input[type=checkbox][data-key]').forEach(el => {
    el.checked = state.perms.has(BigInt(el.dataset.val));
  });
  generate();
}

function generate(){
  const bits = [...state.perms].reduce((a,b)=>a|b, 0n);
  const bitsStr = bits.toString();
  const colorInt = parseInt(state.color.slice(1), 16);
  const permNames = [...state.perms].map(v => {
    const found = PERMS.general.find(([_,val])=>val===v);
    return found ? found[0] : '';
  }).filter(Boolean);

  const roleJson = JSON.stringify({
    name: state.name,
    color: state.color,
    permissions: bitsStr,
    mentionable: state.mentionable,
    hoist: state.hoist,
  }, null, 2);

  const permFlagsStr = permNames.length ? `[${permNames.map(n=>'PermissionFlagsBits.'+n).join(', ')}]` : '[]';

  const botCode = `// Discord.js v14
const { SlashCommandBuilder, PermissionFlagsBits } = require('discord.js');

// Create the role
const role = await interaction.guild.roles.create({
  name: '${state.name}',
  color: ${colorInt},
  permissions: ${permFlagsStr.length>2 ? permFlagsStr : '[PermissionFlagsBits.ViewChannel].filter(()=>false) // none'},
  mentionable: ${state.mentionable},
  hoist: ${state.hoist},
  reason: 'Created via GameZipper Role Generator'
});

console.log('Created role:', role.name, 'ID:', role.id);`;

  const preview = `<span class="role-preview" style="background:${state.color};color:#fff">${state.mentionable?'@':''}${state.name}</span>`;

  $('#output').innerHTML = preview + `
    <div style="margin-top:12px"><strong>${t('permInt')}</strong></div>
    <div class="token-row" style="display:flex;gap:8px;align-items:center;padding:6px 10px;border-radius:6px;background:var(--gz-bg-soft,#f7f7f7);margin:6px 0">
      <code style="flex:1;font-size:1.1em">${bitsStr}</code>
      <button class="gz-btn gz-btn-sm" onclick="copyText('${bitsStr}')">${t('copy')}</button>
    </div>
    <div style="margin-top:12px"><strong>${t('roleJson')}</strong></div>
    <pre style="background:var(--gz-bg-soft,#f7f7f7);padding:10px;border-radius:6px;font-size:.85em;overflow:auto">${roleJson.replace(/</g,'&lt;')}</pre>
    <button class="gz-btn gz-btn-sm" style="margin:4px 0" onclick='copyText(${JSON.stringify(roleJson)})'>${t('copy')} JSON</button>
    <div style="margin-top:12px"><strong>${t('botCode')}</strong></div>
    <pre style="background:var(--gz-bg-soft,#f7f7f7);padding:10px;border-radius:6px;font-size:.85em;overflow:auto">${botCode.replace(/</g,'&lt;')}</pre>
    <button class="gz-btn gz-btn-sm" style="margin:4px 0" onclick='copyText(${JSON.stringify(botCode)})'>${t('copy')} Code</button>`;
}

buildConfig();
applyPreset('mod');

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="generate()">${t('generate')}</button>`;

GZ.renderToolPage({
  category: 'dev',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🔗', href:'/dev/discord-webhook.html', name:'Discord Webhook'},
    {icon:'🎨', href:'/social/discord-embed.html', name:'Discord Embed'},
    {icon:'✏️', href:'/social/discord-font.html', name:'Discord Font'},
    {icon:'🤖', href:'/dev/webhook-tester.html', name:'Webhook Tester'},
  ]
});
</script>
