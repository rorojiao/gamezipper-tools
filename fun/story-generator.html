const { $, t, copyText, showToast } = GZ;

const TEMPLATES = [

    inputs: [
      { id: 'time', label: 'Time of day', ex: 'Tuesday' },
      { id: 'name', label: 'A name', ex: 'Zorp' },
      { id: 'adj1', label: 'Adjective', ex: 'shiny' },
      { id: 'noun1', label: 'Noun', ex: 'gummy bears' },
      { id: 'verb1', label: 'Verb', ex: 'investigate' },

    name: 'School Day',
    story: 'On a {adj1} Monday morning, {name} woke up late and ran to school wearing a {noun1} on their head.\nThe teacher, Mr. {name2}, asked them to {verb1} the alphabet backwards while holding a {noun2}.\nFor lunch, the cafeteria served {food} mixed with {food2}, which tasted like {adj2} {noun3}.',
    inputs: [
      { id: 'adj1', label: 'Adjective', ex: 'foggy' },
      { id: 'name', label: 'Student name', ex: 'Bella' },
      { id: 'noun1', label: 'Noun', ex: 'helmet' },
      { id: 'name2', label: 'Teacher last name', ex: 'Wobbles' },
      { id: 'verb1', label: 'Verb', ex: 'sing' },
      { id: 'noun2', label: 'Noun', ex: 'toaster' },
      { id: 'food', label: 'A food', ex: 'pizza' },
      { id: 'food2', label: 'Another food', ex: 'ice cream' },
      { id: 'adj2', label: 'Adjective', ex: 'soggy' },
      { id: 'noun3', label: 'Noun (plural)', ex: 'shoes' },
    ]
  },
  {
    id: 'detective',
    emoji: '🔍',
    name: 'Detective Mystery',
    story: 'Detective {name} arrived at the {adj1} mansion in the rain.\nThe victim was found holding a {noun1} and wearing {number} pairs of {noun2}.\n"The killer must have {verb1} the {noun3} and escaped through the {adj2} window!" shouted the butler.\nIt turned out the real culprit was a {animal} with a {noun4}.',
    inputs: [
      { id: 'name', label: 'Detective name', ex: 'Sherlock Hoots' },
      { id: 'adj1', label: 'Adjective', ex: 'haunted' },
      { id: 'noun1', label: 'Noun', ex: 'rubber duck' },
      { id: 'number', label: 'Number', ex: '17' },
      { id: 'noun2', label: 'Clothing (plural)', ex: 'mittens' },
      { id: 'verb1', label: 'Verb (past)', ex: 'painted' },
      { id: 'noun3', label: 'Noun', ex: 'ceiling' },
      { id: 'adj2', label: 'Adjective', ex: 'sparkly' },
      { id: 'animal', label: 'An animal', ex: 'penguin' },
      { id: 'noun4', label: 'Noun', ex: 'spatula' },
    ]
  },
  {
    id: 'cooking',
    emoji: '🍳',
    name: 'Cooking Disaster',
    story: 'Chef {name} was preparing a {adj1} feast for the {event} party.\nThe recipe called for {number} cups of {noun1}, two {noun2}, and a pinch of {adj2} {noun3}.\nAfter {verb1} everything into a {container}, the kitchen started to {verb2} and the {animal} ran away with the {food}.',
    inputs: [
      { id: 'name', label: 'Chef name', ex: 'Giuseppe' },
      { id: 'adj1', label: 'Adjective', ex: 'gourmet' },
      { id: 'event', label: 'Event/holiday', ex: 'birthday' },
      { id: 'number', label: 'Number', ex: '42' },
      { id: 'noun1', label: 'Ingredient', ex: 'flour' },
      { id: 'noun2', label: 'Noun (plural)', ex: 'pickles' },
      { id: 'adj2', label: 'Adjective', ex: 'dusty' },

      { id: 'verb1', label: 'Verb (past)', ex: 'blended' },
      { id: 'container', label: 'Container', ex: 'waffle iron' },

  {

    story: 'Long ago, in the kingdom of {place}, a {adj1} wizard named {name} sought the legendary {noun1}.\nArmed with a {weapon} and a {adj2} map, they crossed the {terrain} and {verb1} past {number} {creature}s.\nAt last, they found the {noun2} inside a {adj3} {container} guarded by a {creature2} who liked to {verb2}.',
    inputs: [
      { id: 'place', label: 'Place name', ex: 'Glitterdale' },
      { id: 'adj1', label: 'Adjective', ex: 'whimsical' },
      { id: 'name', label: 'Hero name', ex: 'Elara' },
      { id: 'noun1', label: 'Noun', ex: 'golden pickle' },
      { id: 'weapon', label: 'A weapon', ex: 'spoon' },
      { id: 'adj2', label: 'Adjective', ex: 'squiggly' },
      { id: 'terrain', label: 'Terrain', ex: 'swamp of jellybeans' },
      { id: 'verb1', label: 'Verb (past)', ex: 'sneaked' },
      { id: 'number', label: 'Number', ex: '99' },
      { id: 'creature', label: 'Creature (plural)', ex: 'troll' },
      { id: 'noun2', label: 'Noun', ex: 'scroll' },
      { id: 'adj3', label: 'Adjective', ex: 'glowing' },
      { id: 'container', label: 'Container', ex: 'treasure chest' },
      { id: 'creature2', label: 'Creature', ex: 'three-headed goat' },
      { id: 'verb2', label: 'Verb', ex: 'jig' },
    ]
  },
];

const VALUES = {
  adj: ['fluffy','tiny','sparkly','soggy','grumpy','fancy','bouncy','crispy','wobbly','dizzy'],
  noun: ['sock','pickle','goblin','cactus','pancake','umbrella','dinosaur','bubble','donut','wizard'],
  verb: ['dance','whisper','sprint','juggle','moonwalk','hiccup','giggle','teleport','meow','boogie'],
  name: ['Zorp','Bella','Coco','Maximus','Bartholomew','Trixie','Hiro','Dumbledore','Pickle','Sandy'],
  animal: ['cat','axolotl','panda','otter','narwhal','capybara','platypus','llama','sloth','gecko'],
  food: ['pizza','cheese','broccoli','waffles','ice cream','tacos','sushi','popcorn','lasagna','dumplings'],
  place: ['Atlantis','Hogwarts','Wonderland','Narnia','Middle-earth','Mordor','Shangri-La','Gotham'],
};

let currentTpl = TEMPLATES[0];
let values = {};

function getValue(id, input) {
  if (values[id]) return values[id];
  return input.ex;
}

function randomWord(label) {
  const l = label.toLowerCase();
  if (/adj/.test(l)) return VALUES.adj[Math.floor(Math.random()*VALUES.adj.length)];
  if (/verb/.test(l)) return VALUES.verb[Math.floor(Math.random()*VALUES.verb.length)];
  if (/noun/.test(l)) return VALUES.noun[Math.floor(Math.random()*VALUES.noun.length)];
  if (/name/.test(l) && !/food/.test(l)) return VALUES.name[Math.floor(Math.random()*VALUES.name.length)];
  if (/animal|creature/.test(l)) return VALUES.animal[Math.floor(Math.random()*VALUES.animal.length)];
  if (/food/.test(l)) return VALUES.food[Math.floor(Math.random()*VALUES.food.length)];
  if (/place/.test(l)) return VALUES.place[Math.floor(Math.random()*VALUES.place.length)];
  if (/number/.test(l)) return String(Math.floor(Math.random()*100)+1);
  if (/time/.test(l)) return ['Monday','midnight','noon','dusk','3am','dawn'][Math.floor(Math.random()*6)];
  if (/event/.test(l)) return ['birthday','wedding','anniversary','graduation','picnic','costume'][Math.floor(Math.random()*6)];
  if (/planet/.test(l)) return ['Zorpox','Blipp','Wubble','Quasar-7','Jupiter-2','Nibiru'][Math.floor(Math.random()*6)];
  if (/weapon/.test(l)) return ['spoon','rubber chicken','banana','foam sword','rolled-up newspaper','spatula'][Math.floor(Math.random()*6)];
  if (/terrain/.test(l)) return ['enchanted forest','crystal desert','frozen tundra','lava swamp','rainbow canyon'][Math.floor(Math.random()*6)];
  if (/container/.test(l)) return ['cauldron','bucket','teapot','fishbowl','cookie jar','locker'][Math.floor(Math.random()*6)];
  if (/clothing/.test(l)) return ['mittens','rain boots','berets','cape','onesie','overalls'][Math.floor(Math.random()*6)];
  if (/ingredient/.test(l)) return ['flour','sugar','cinnamon','chocolate','ketchup','mustard'][Math.floor(Math.random()*6)];
  return VALUES.noun[Math.floor(Math.random()*VALUES.noun.length)];
}

function renderTemplates() {
  $('#templates').innerHTML = TEMPLATES.map(tpl => `
    <div class="ml-tpl-card ${tpl.id===currentTpl.id?'active':''}" data-id="${tpl.id}" onclick="selectTpl('${tpl.id}')">
      <span class="emoji">${tpl.emoji}</span>
      <div class="name">${tpl.name}</div>
      <div class="blanks">${tpl.inputs.length} ${t('blanks')}</div>
    </div>`).join('');
}

function renderInputs() {
  $('#inputs').innerHTML = currentTpl.inputs.map(inp => `
    <label>
      ${inp.label}
      <input type="text" data-id="${inp.id}" placeholder="e.g. ${inp.ex}" value="${values[inp.id]||''}">
    </label>`).join('');
  document.querySelectorAll('#inputs input').forEach(el => {
    el.addEventListener('input', e => {
      values[e.target.dataset.id] = e.target.value;
    });
  });
}

function selectTpl(id) {
  currentTpl = TEMPLATES.find(t => t.id===id);
  values = {};
  renderTemplates();
  renderInputs();
  $('#story').textContent = '…';
  $('#story').classList.add('empty');
  $('#stats').textContent = '';
}

function generateStory() {
  const story = currentTpl.story;
  const rendered = story.replace(/\{(\w+)\}/g, (m, key) => {
    const inp = currentTpl.inputs.find(i => i.id===key);
    if (!inp) return m;
    const v = values[key] || inp.ex;
    if (!values[key]) return `<span class="ml-blank missed">${v}</span>`;
    return `<span class="ml-blank">${v}</span>`;
  });
  $('#story').innerHTML = rendered;
  $('#story').classList.remove('empty');
  const total = currentTpl.inputs.length;
  const filled = currentTpl.inputs.filter(i => values[i.id] && values[i.id].trim()).length;
  $('#stats').innerHTML = `<span>${t('filled')}: <b>${filled}</b> ${t('of')} <b>${total}</b></span>`;
}

function randomizeAll() {
  currentTpl.inputs.forEach(inp => {
    values[inp.id] = randomWord(inp.label);
  });
  renderInputs();
  generateStory();
}

function clearAll() {
  values = {};
  renderInputs();
  $('#story').textContent = '…';
  $('#story').classList.add('empty');
  $('#stats').textContent = '';
}

$('#lbl-pick').textContent = t('lblPick');
$('#lbl-input').textContent = t('lblInput');
$('#lbl-story').textContent = t('lblStory');

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="generateStory()">${t('generate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="randomizeAll()">${t('randomize')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="copyText($('#story').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="clearAll()">${t('clear')}</button>`;

renderTemplates();
renderInputs();

GZ.renderToolPage({
  category: 'fun',

  descKey: 'toolDesc',

    {icon:'🎯', href:'/fun/decision-wheel.html', name:'Decision Wheel'},
    {icon:'⚡', href:'/fun/reaction-time.html', name:'Reaction Time'},
    {icon:'⌨️', href:'/fun/typing-test.html', name:'Typing Test'},
  ]
});
</script>
