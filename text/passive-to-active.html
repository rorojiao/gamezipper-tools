<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is passive voice?", "acceptedAnswer": {"@type": "Answer", "text": "Passive voice is a sentence structure where the subject receives the action instead of performing it. For example, 'The ball was thrown by John' is passive; the active version is 'John threw the ball.'"}}, {"@type": "Question", "name": "Why should I use active voice?", "acceptedAnswer": {"@type": "Answer", "text": "Active voice makes writing clearer, more direct, and more engaging. It reduces word count, improves readability, and is preferred in academic, business, and creative writing."}}, {"@type": "Question", "name": "How does the converter work?", "acceptedAnswer": {"@type": "Answer", "text": "The tool detects common passive voice patterns (was/were/is/are/been + past participle) and restructures sentences to place the actor before the verb. Complex sentences are flagged for manual review."}}, {"@type": "Question", "name": "Is the conversion always perfect?", "acceptedAnswer": {"@type": "Answer", "text": "The tool handles common passive voice patterns accurately. For complex sentences with implied actors or unusual structures, it provides suggestions that you should review before using."}}]}</script>

    step1: '在输入区粘贴文本',
    step2: '点击「转换」检测并转换被动语态',
    step3: '检查标记的句子和建议的转换',
    step4: '复制改进后的文本到剪贴板',
  }
});

const { $, copyText, t } = GZ;

const BE_VERBS = /\b(am|is|are|was|were|be|been|being)\b/i;
const PAST_PARTICIPLE = /\b\w+ed\b|\b\w+en\b|\b(written|taken|given|driven|risen|spoken|broken|chosen|frozen|stolen|worn|torn|sworn|born|drawn|grown|known|shown|thrown|blown|flown|overdone|undone|misunderstood|understood|stood|withstood|become|come|overcome|run|begun|won|spun|clung|stung|wrung|swung|sung|rung|hung|dug|stuck|struck|lit|spat|sat|shut|split|spread|bet|burst|cast|cost|cut|hit|hurt|let|put|quit|rid|set|shed|bet|knit|thrust|upset|wet)\b/i;

function detectPassiveSentences(text) {
  const sentences = text.match(/[^.!?]*[.!?]+/g) || [text];
  const results = [];
  for (const s of sentences) {
    const trimmed = s.trim();
    if (!trimmed) continue;
    const isPassive = BE_VERBS.test(trimmed) && PAST_PARTICIPLE.test(trimmed);
    if (isPassive) {
      results.push({ original: trimmed, converted: convertToActive(trimmed) });
    }
  }
  return results;
}

function convertToActive(sentence) {
  let result = sentence;
  // Pattern: "X was [verb]ed by Y" -> "Y [verb]ed X"
  const pattern1 = /(.+?)\s+(was|were|is|are|am|been|being)\s+(\w+ed|\w+en|written|taken|given|driven|risen|spoken|broken|chosen|frozen|stolen|worn|torn|sworn|born|drawn|grown|known|shown|thrown|blown|flown|understood|stood|become|come|run|begun|won|sung|rung|hung|dug|stuck|struck|lit|sat|shut|split|spread|set|put|cut|hit|hurt|let|bet|cast|cost|rid|shed|knit|thrust|upset|wet|quit)\s+by\s+(.+?)([.!?]*)$/i;
  const m1 = result.match(pattern1);
  if (m1) {
    const subject = m1[1].trim();
    const verb = m1[3];
    const actor = m1[4].trim();
    const punct = m1[5] || '';
    const actorLower = actor.toLowerCase();
    if (actorLower === 'me') return `I ${verb} ${subject.toLowerCase()}${punct}`;
    if (actorLower === 'him') return `He ${verb} ${subject.toLowerCase()}${punct}`;
    if (actorLower === 'her') return `She ${verb} ${subject.toLowerCase()}${punct}`;
    if (actorLower === 'them') return `They ${verb} ${subject.toLowerCase()}${punct}`;
    if (actorLower === 'us') return `We ${verb} ${subject.toLowerCase()}${punct}`;
    if (actorLower === 'it') return `It ${verb} ${subject.toLowerCase()}${punct}`;
    return `${actor} ${verb} ${subject.toLowerCase()}${punct}`;
  }

  // Pattern without "by": "X was [verb]ed" -> "[Someone] [verb]ed X"
  const pattern2 = /(.+?)\s+(was|were|is|are|am|been|being)\s+(\w+ed|\w+en|written|taken|given|driven|risen|spoken|broken|chosen|frozen|stolen|worn|torn|sworn|born|drawn|grown|known|shown|thrown|blown|flown|understood|stood|become|come|run|begun|won|sung|rung|hung|dug|stuck|struck|lit|sat|shut|split|spread|set|put|cut|hit|hurt|let|bet|cast|cost|rid|shed|knit|thrust|upset|wet|quit)\b(.+?)([.!?]*)$/i;
  const m2 = result.match(pattern2);
  if (m2) {
    const subject = m2[1].trim();
    const verb = m2[3];
    const rest = m2[4] ? m2[4].trim() : '';
    const punct = m2[5] || '';
    return `[Someone] ${verb} ${subject.toLowerCase()}${rest ? ' ' + rest : ''}${punct}`;
  }

  return sentence + ' [review needed]';
}

function processText() {
  const inp = $('#input').value;
  if (!inp) { $('#output').value = ''; $('#stats').innerHTML = ''; $('#results').innerHTML = ''; return; }
  const found = detectPassiveSentences(inp);
  let output = inp;
  let converted = 0;
  let review = 0;
  for (const item of found) {
    output = output.replace(item.original, item.converted);
    if (item.converted.includes('[review needed]') || item.converted.includes('[Someone]')) review++;
    else converted++;
  }
  $('#output').value = output;
  $('#stats').innerHTML = `<span>${t('sentencesFound')}: ${found.length}</span><span>${t('convertedCount')}: ${converted}</span><span>${t('manualReview')}: ${review}</span>`;
  if (found.length > 0) {
    let html = '';
    for (const item of found) {
      html += `<div class="passive-sentence"><div class="original">${escapeHtml(item.original)}</div><div class="converted">→ ${escapeHtml(item.converted)}</div></div>`;
    }
    $('#results').innerHTML = html;
  } else {
    $('#results').innerHTML = '';
  }
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function loadExample() {
  $('#input').value = 'The book was written by the author in just two weeks. The cake was eaten by the children before the party started. The project was completed on time. The email was sent by the manager yesterday. Mistakes were made during the process.';
  processText();
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="processText()">${t('format')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="copyText($('#output').value)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#input').value='';$('#output').value='';$('#stats').innerHTML='';$('#results').innerHTML=''">${t('clear')}</button>`;

$('#input').addEventListener('input', processText);
