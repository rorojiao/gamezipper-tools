<script>
GZI18n.register({
  en: {
    toolTitle: 'Free Invitation Maker',
    toolDesc: 'Create online invitations for weddings, birthdays, parties and corporate events. Pick a template, add your event title, date, time and venue. Download a print-ready PNG invitation — free, no signup, no watermark.',
    download: 'Download PNG',

  },
  zh: {
    toolTitle: '免费邀请函制作工具',
    toolDesc: '在线制作婚礼、生日、派对和企业活动的邀请函。选择模板，填写活动标题、日期、时间和地点。下载可打印的 PNG 邀请函 — 免费、无水印、无需注册。',
    download: '下载 PNG',
    lblTitle: '主标题', lblEvent: '活动 / 姓名', lblDate: '日期',
    lblTime: '时间', lblLoc: '地点', lblRsvp: 'RSVP / 页脚',
    lblTheme: '主题', lblOrient: '方向', lblC1: '背景色', lblC2: '强调色',
    step1: '选择匹配活动主题的模板',
    step2: '填写主标题、活动名称、日期、时间和地点',
    step3: '可在纵向和横向之间切换',
    step4: '选择颜色后下载 PNG',
  }
});

const { $, t } = GZ;

const THEME_PRESETS = {
  elegant: ['#1a1a2e','#c9a961'],
  modern: ['#0f4c75','#3282b8'],
  botanical: ['#2d4a2b','#7fb069'],
  festive: ['#fc5185','#feca57'],
  minimal: ['#f5f5f5','#222'],
  bold: ['#fc5185','#364fc7'],
};

function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);
  ctx.arcTo(x,y,x+w,y,r);
  ctx.closePath();
}

function drawBotanical(ctx,W,H,accent){
  ctx.strokeStyle=accent;ctx.lineWidth=2;ctx.globalAlpha=0.4;
  // Top-left vine
  for(let i=0;i<6;i++){
    ctx.beginPath();
    ctx.moveTo(30,30+i*22);
    ctx.bezierCurveTo(80,30+i*22, 80,80+i*22, 130,30+i*22);
    ctx.stroke();
    ctx.beginPath();ctx.ellipse(70,50+i*22,12,5,Math.PI/4,0,Math.PI*2);ctx.stroke();
  }
  // Bottom-right vine
  for(let i=0;i<6;i++){
    ctx.beginPath();
    ctx.moveTo(W-30,H-30-i*22);
    ctx.bezierCurveTo(W-80,H-30-i*22, W-80,H-80-i*22, W-130,H-30-i*22);
    ctx.stroke();
    ctx.beginPath();ctx.ellipse(W-70,H-50-i*22,12,5,-Math.PI/4,0,Math.PI*2);ctx.stroke();
  }
  ctx.globalAlpha=1;
}

function drawDecorative(ctx,W,H,theme,accent){
  if(theme==='elegant'){
    // Corner flourishes
    ctx.strokeStyle=accent;ctx.lineWidth=2.5;
    [[40,40,1,1],[W-40,40,-1,1],[40,H-40,1,-1],[W-40,H-40,-1,-1]].forEach(([x,y,sx,sy])=>{
      ctx.beginPath();
      ctx.moveTo(x,y);ctx.lineTo(x+sx*40,y);
      ctx.moveTo(x,y);ctx.lineTo(x,y+sy*40);
      ctx.moveTo(x,y);ctx.quadraticCurveTo(x+sx*30,y+sy*30,x+sx*60,y+sy*15);
      ctx.stroke();
    });
  } else if(theme==='botanical'){
    drawBotanical(ctx,W,H,accent);
  } else if(theme==='festive'){
    ctx.fillStyle=accent;ctx.globalAlpha=0.3;
    for(let i=0;i<40;i++){
      const x=Math.random()*W, y=Math.random()*H, s=3+Math.random()*7;
      ctx.save();ctx.translate(x,y);ctx.rotate(Math.random()*Math.PI*2);
      ctx.fillRect(-s/2,-s/2,s,s);ctx.restore();
    }
    ctx.globalAlpha=1;
  } else if(theme==='modern'){
    // Diagonal accent bars
    ctx.fillStyle=accent;ctx.globalAlpha=0.15;
    ctx.save();ctx.translate(W/2,H/2);ctx.rotate(-Math.PI/8);
    ctx.fillRect(-W,-20,W*2,8);ctx.fillRect(-W,10,W*2,4);
    ctx.restore();ctx.globalAlpha=1;
  } else if(theme==='bold'){
    // Color blocks
    ctx.fillStyle=accent;ctx.globalAlpha=0.85;
    ctx.fillRect(0,0,W,8);ctx.fillRect(0,H-8,W,8);
    ctx.fillRect(0,0,8,H);ctx.fillRect(W-8,0,8,H);
    ctx.globalAlpha=1;
  }
}

function render(){
  const c=$('#canvas'),ctx=c.getContext('2d');
  const orient=$('#orient').value;
  const [W,H]=orient==='portrait'?[800,1100]:[1100,800];
  c.width=W;c.height=H;
  const theme=$('#theme').value;
  const [pc1,pc2]=THEME_PRESETS[theme];
  const bg=$('#color1').value, accent=$('#color2').value;
  const isLight = theme==='minimal';

  // BG
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);

  // Border frame (except bold)
  if(theme!=='bold'){
    ctx.strokeStyle=accent;ctx.lineWidth=3;
    roundRect(ctx,40,40,W-80,H-80,8);ctx.stroke();
  }

  // Decorations
  drawDecorative(ctx,W,H,theme,accent);

  const cx=W/2;
  ctx.textAlign='center';ctx.textBaseline='middle';

  // YOU'RE INVITED / heading
  ctx.fillStyle=accent;
  ctx.font=`${isLight?500:600} ${Math.min(W,H)*0.045}px Georgia, serif`;
  const headingText=$('#title').value||'';
  ctx.fillText(headingText.toUpperCase(), cx, H*0.18);

  // divider
  ctx.strokeStyle=accent;ctx.lineWidth=1.5;ctx.globalAlpha=0.6;
  ctx.beginPath();ctx.moveTo(cx-40,H*0.22);ctx.lineTo(cx+40,H*0.22);ctx.stroke();
  ctx.beginPath();ctx.arc(cx,H*0.22,3,0,Math.PI*2);ctx.fillStyle=accent;ctx.fill();
  ctx.globalAlpha=1;

  // Event / names (large)
  ctx.fillStyle=isLight?'#222':'#fff';
  let ev=$('#event').value||'';
  let fs=Math.min(W,H)*0.085;
  ctx.font=`italic 700 ${fs}px Georgia, serif`;
  while(ctx.measureText(ev).width>W-200&&fs>24){fs-=4;ctx.font=`italic 700 ${fs}px Georgia, serif`;}
  ctx.fillText(ev, cx, H*0.36);

  // DATE label
  ctx.fillStyle=accent;
  ctx.font=`600 ${Math.min(W,H)*0.025}px Verdana, sans-serif`;
  ctx.fillText('— DATE —', cx, H*0.48);
  ctx.fillStyle=isLight?'#333':'#fff';
  ctx.font=`400 ${Math.min(W,H)*0.04}px Verdana, sans-serif`;
  ctx.fillText($('#date').value||'', cx, H*0.53);

  // TIME
  ctx.fillStyle=accent;
  ctx.font=`600 ${Math.min(W,H)*0.025}px Verdana, sans-serif`;
  ctx.fillText('— TIME —', cx, H*0.61);
  ctx.fillStyle=isLight?'#333':'#fff';
  ctx.font=`400 ${Math.min(W,H)*0.04}px Verdana, sans-serif`;
  ctx.fillText($('#time').value||'', cx, H*0.66);

  // LOCATION
  ctx.fillStyle=accent;
  ctx.font=`600 ${Math.min(W,H)*0.025}px Verdana, sans-serif`;
  ctx.fillText('— VENUE —', cx, H*0.74);
  ctx.fillStyle=isLight?'#333':'#fff';
  ctx.font=`400 ${Math.min(W,H)*0.032}px Verdana, sans-serif`;
  const loc=$('#loc').value||'';
  // wrap location
  const words=loc.split(' ');let line='';const lines=[];const maxW=W-220;
  for(const w of words){const test=line?line+' '+w:w;if(ctx.measureText(test).width>maxW&&line){lines.push(line);line=w}else line=test;}
  if(line)lines.push(line);
  let y=H*0.785;
  lines.slice(0,3).forEach(ln=>{ctx.fillText(ln,cx,y);y+=Math.min(W,H)*0.035;});

  // RSVP footer
  if($('#rsvp').value){
    ctx.fillStyle=accent;ctx.globalAlpha=0.8;
    ctx.font=`italic 400 ${Math.min(W,H)*0.022}px Georgia, serif`;
    ctx.fillText($('#rsvp').value, cx, H-70);
    ctx.globalAlpha=1;
  }
}

function downloadPNG(){
  const link=document.createElement('a');
  const name=($('#event').value||'invitation').replace(/[^a-zA-Z0-9]/g,'_').toLowerCase().slice(0,30)||'invitation';
  link.download=name+'-invitation.png';
  link.href=$('#canvas').toDataURL('image/png');
  link.click();
}

$('#lbl-title').textContent=t('lblTitle');
$('#lbl-event').textContent=t('lblEvent');
$('#lbl-date').textContent=t('lblDate');
$('#lbl-time').textContent=t('lblTime');
$('#lbl-loc').textContent=t('lblLoc');
$('#lbl-rsvp').textContent=t('lblRsvp');
$('#lbl-theme').textContent=t('lblTheme');
$('#lbl-orient').textContent=t('lblOrient');
$('#lbl-c1').textContent=t('lblC1');
$('#lbl-c2').textContent=t('lblC2');

['title','event','date','time','loc','rsvp','color1','color2'].forEach(id=>$('#'+id).addEventListener('input',render));
['theme','orient'].forEach(id=>$('#'+id).addEventListener('change',()=>{
  const [a,b]=THEME_PRESETS[$('#theme').value];
  $('#color1').value=a;$('#color2').value=b;render();
}));

render();

$('#toolbar').innerHTML=`
  <button class="gz-btn" onclick="downloadPNG()">${t('download')}</button>`;

GZ.renderToolPage({
  category: 'image',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🎂', href:'/image/birthday-card.html', name:'Birthday Card'},
    {icon:'🖼️', href:'/image/poster-maker.html', name:'Poster Maker'},
    {icon:'🎫', href:'/image/flyer-maker.html', name:'Flyer Maker'},
    {icon:'💌', href:'/image/bio-link.html', name:'Bio Link Maker'},
  ]
});
</script>
