function render(query) {
  const q = (query || '').trim().toLowerCase();
  const lang = GZI18n.getLang();
  const matches = q ? CUR.filter(c =>
    c[1].toLowerCase().includes(q) ||
    c[2].toLowerCase().includes(q) ||
    c[4].toLowerCase().includes(q) ||
    c[3].includes(query.trim()) ||
    c[5].includes(query.trim())
  ) : CUR;
  if (!matches.length) { $('#results').innerHTML = `<div class="empty">${t('noResults')}</div>`; return; }
  $('#results').innerHTML = `<table class="cur-table"><thead><tr>
    <th>${t('symbol')}</th><th>${t('code')}</th><th>${t('currency')}</th><th>${t('country')}</th>
  </tr></thead><tbody>` + matches.map(c =>
    `<tr>
      <td><span class="sym" onclick="cp(this,'${c[0].replace(/'/g,"\\'")}')">${c[0]}</span></td>
      <td><span class="code" onclick="cp(this,'${c[1]}')">${c[1]}</span></td>
      <td>${lang==='zh'?c[3]:c[2]}</td>
      <td class="country">${lang==='zh'?c[5]:c[4]}</td>
    </tr>`).join('') + '</tbody></table>';
}

function cp(el, txt) {
  copyText(txt);
  showToast(t('copied'));
  const orig = el.textContent;
  el.dataset.orig = el.dataset.orig || orig;
  el.textContent = '✓';
  setTimeout(() => { el.textContent = el.dataset.orig; }, 700);
}
