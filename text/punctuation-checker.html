    issuesFound: (n) => n === 0 ? '✓ 未发现标点问题' : `发现 ${n} 个问题`,
    doubleSpace: '双空格',
    spaceBefore: '标点前有空格',
    noSpaceAfter: '标点后无空格',
    repeated: '重复的标点符号',
    missingPeriod: '句子可能缺少句号',
    ellipsisDots: '三个点应为 … （省略号）',
    smartQuote: '直引号（建议改为弯引号）',
  }
});

const { $, copyText, t } = GZ;

function findIssues(text) {
  const issues = [];
  // Double spaces
  let m;
  const ds = new RegExp(/ {2,}/g);
  while ((m = ds.exec(text)) !== null) issues.push({ type: 'doubleSpace', idx: m.index, len: m[0].length, frag: m[0] });
  // Space before punctuation
  const sb = new RegExp(/\s+([,.;:!?])/g);
  while ((m = sb.exec(text)) !== null) issues.push({ type: 'spaceBefore', idx: m.index, len: m[0].length, frag: m[0] });
  // No space after punctuation (but not at end)
  const na = new RegExp(/([,;:])(?=[^\s\d])/g);
  while ((m = na.exec(text)) !== null) issues.push({ type: 'noSpaceAfter', idx: m.index, len: m[0].length, frag: m[0] });
  // Repeated punctuation ,, ;; !! ?? ..
  const rp = new RegExp(/([,;!?])\1{1,}/g);
  while ((m = rp.exec(text)) !== null) issues.push({ type: 'repeated', idx: m.index, len: m[0].length, frag: m[0] });
  // Three dots
  const td = new RegExp(/\.{3,}/g);
  while ((m = td.exec(text)) !== null) issues.push({ type: 'ellipsisDots', idx: m.index, len: m[0].length, frag: m[0] });
  // Straight quotes
  const sq = new RegExp(/["']/g);
  while ((m = sq.exec(text)) !== null) issues.push({ type: 'smartQuote', idx: m.index, len: 1, frag: m[0] });
  // Missing period at end of line (heuristic)
  const lines = text.split(/\n/);
  let off = 0;
  for (const line of lines) {
    const trimmed = line.trim();
    if (trimmed.length > 20 && /[a-zA-Z0-9)]$/.test(trimmed) && !/[.!?…:)]$/.test(trimmed)) {
      issues.push({ type: 'missingPeriod', idx: off + line.length - 1, len: 1, frag: trimmed.slice(-15) });
    }
    off += line.length + 1;
  }
  // Sort by index, then remove overlaps (keep first)
  issues.sort((a, b) => a.idx - b.idx);
  const filtered = [];
  let lastEnd = -1;
  for (const it of issues) {
    if (it.idx >= lastEnd) { filtered.push(it); lastEnd = it.idx + it.len; }
  }
  return filtered;
}

function highlight(text, issues) {
  let html = '';
  let cur = 0;
  for (const it of issues) {
    html += escapeHtml(text.slice(cur, it.idx));
    html += `<span class="iss" title="${escapeAttr(t(it.type))}">${escapeHtml(text.slice(it.idx, it.idx + it.len))}</span>`;
    cur = it.idx + it.len;
  }
  html += escapeHtml(text.slice(cur));
  return html;
}

function escapeHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escapeAttr(s) { return escapeHtml(s).replace(/"/g,'&quot;'); }

function applyFixes(text) {
  let r = text;
  r = r.replace(/ {2,}/g, ' ');                       // double spaces
  r = r.replace(/\s+([,.;:!?])/g, '$1');              // space before punct
  r = r.replace(/([,;:])(?=[^\s\d])/g, '$1 ');        // no space after
  r = r.replace(/([,;!?])\1+/g, '$1');                // repeated marks
  r = r.replace(/\.{3,}/g, '…');                      // ellipsis
  // curly quotes (basic)
  r = r.replace(/"([^"]*)"/g, '\u201C$1\u201D');
  r = r.replace(/\b'\b/g, '\u2019');
  return r;
}

function analyze() {
  const text = $('#input').value;
  const out = $('#output');
  const issuesList = $('#issues');
  const stats = $('#stats');

  if (!text.trim()) {
    out.textContent = '';
    issuesList.innerHTML = '';
    stats.innerHTML = '';
    return;
  }

  const issues = findIssues(text);
  out.innerHTML = highlight(text, issues);

  stats.innerHTML = `<span class="stat">${t('issuesFound', issues.length)}</span>
    <span class="stat">${text.split(/\s+/).filter(Boolean).length} words</span>
    <span class="stat">${text.length} chars</span>`;

  if (issues.length === 0) {
    issuesList.innerHTML = '';
  } else {
    issuesList.innerHTML = issues.slice(0, 50).map(it =>
      `<li>⚠️ <strong>${escapeHtml(t(it.type))}</strong> — <code>${escapeHtml(it.frag.replace(/\n/g,'\\n'))}</code></li>`
    ).join('') + (issues.length > 50 ? `<li>…and ${issues.length - 50} more</li>` : '');
  }
}

function doApply() {
  const text = $('#input').value;
  if (!text.trim()) return;
  $('#input').value = applyFixes(text);
  analyze();
}

function loadExample() {
  $('#input').value = `Hello world ,how are you??  I am fine,but  this text has issues...
The quick brown fox jumps over the lazy dog
Did you see "the movie" yesterday`;
  analyze();
}

function doClear() { $('#input').value = ''; $('#output').textContent = ''; $('#issues').innerHTML = ''; $('#stats').innerHTML = ''; }

$('#input').addEventListener('input', analyze);

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="doApply()">${t('apply')}</button>
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

</script>
