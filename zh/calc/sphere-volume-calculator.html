<script>
GZI18n.register({
  en:{toolTitle:'Sphere Volume Calculator',toolDesc:'Calculate the volume and surface area of a sphere using V = ⁴⁄₃πr³ and A = 4πr². Enter radius or diameter — results in cubic units, liters, and gallons.',
    step1:'Enter the radius OR diameter of the sphere',step2:'Select your preferred unit (mm, cm, m, in, ft, etc.)',step3:'The other field updates automatically',step4:'View volume, surface area, and capacity conversions instantly',
    lblR:'Radius (r)',lblD:'Diameter (d)',hResult:'📊 Results',
    volume:'Volume',surfArea:'Surface area',circumference:'Great circle circumference',crossArea:'Cross-sectional area',
    capLiters:'Capacity (liters)',capGalUS:'Capacity (US gallons)',capGalUK:'Capacity (UK gallons)'},
  zh:{toolTitle:'球体体积计算器',toolDesc:'使用 V = ⁴⁄₃πr³ 和 A = 4πr² 计算球体的体积和表面积。输入半径或直径，即时获得立方单位、升和加仑的结果。',
    step1:'输入球体的半径或直径',step2:'选择单位（毫米、厘米、米、英寸、英尺等）',step3:'另一个字段会自动更新',step4:'即时查看体积、表面积和容量换算',
    lblR:'半径 (r)',lblD:'直径 (d)',hResult:'📊 计算结果',
    volume:'体积',surfArea:'表面积',circumference:'大圆周长',crossArea:'截面积',
    capLiters:'容量（升）',capGalUS:'容量（美制加仑）',capGalUK:'容量（英制加仑）'}
});
const{$,t}=GZ;
const PI=Math.PI;
const round=(v,d=4)=>{if(!isFinite(v))return'—';const p=Math.pow(10,d);return(Math.round(v*p)/p).toString();};
const UNITS={mm:0.001,cm:0.01,m:1,in:0.0254,ft:0.3048,yd:0.9144,km:1000};
function compute(src){
  const unitEl=src==='r'?$('#unitR'):$('#unitD');
  const u=unitEl.value;
  let r;
  if(src==='r'){r=(parseFloat($('#radius').value)||0)*UNITS[u];$('#diameter').value=round(r*2/UNITS[u],4);$('#unitD').value=u;}
  else{r=(parseFloat($('#diameter').value)||0)/2*UNITS[u];$('#radius').value=round(r/UNITS[u],4);$('#unitR').value=u;}
  const volM3=(4/3)*PI*r*r*r;
  const surfM2=4*PI*r*r;
  const circM=2*PI*r;
  const crossM2=PI*r*r;
  const liters=volM3*1000;
  const galUS=volM3/0.00378541;
  const galUK=volM3/0.00454609;
  const cu=u+'³',sq=u+'²';
  const fromM3=v=>v/Math.pow(UNITS[u],3);
  const fromM2=v=>v/Math.pow(UNITS[u],2);
  const fromM=v=>v/UNITS[u];
  $('#resultOut').innerHTML=`
    <div class="row"><span class="k">${t('volume')}</span><span class="v">${round(fromM3(volM3))} ${cu}</span></div>
    <div class="row"><span class="k">${t('capLiters')}</span><span class="v">${round(liters,2)} L</span></div>
    <div class="row"><span class="k">${t('capGalUS')}</span><span class="v">${round(galUS,2)} gal</span></div>
    <div class="row"><span class="k">${t('capGalUK')}</span><span class="v">${round(galUK,2)} gal</span></div>
    <div class="row"><span class="k">${t('surfArea')}</span><span class="v">${round(fromM2(surfM2))} ${sq}</span></div>
    <div class="row"><span class="k">${t('circumference')}</span><span class="v">${round(fromM(circM))} ${u}</span></div>
    <div class="row"><span class="k">${t('crossArea')}</span><span class="v">${round(fromM2(crossM2))} ${sq}</span></div>
  `;
}
$('#radius').addEventListener('input',()=>compute('r'));
$('#diameter').addEventListener('input',()=>compute('d'));
$('#unitR').addEventListener('change',()=>compute('r'));
$('#unitD').addEventListener('change',()=>compute('d'));
$('#toolbar').innerHTML=`<button class="gz-btn" onclick="compute('r')">${t('calculate')}</button><button class="gz-btn gz-btn-secondary" onclick="$('#radius').value=5;$('#unitR').value='cm';compute('r')">${t('example')}</button><button class="gz-btn gz-btn-secondary" onclick="GZ.copyText($('#resultOut').innerText)">${t('copy')}</button>`;
compute('r');
GZ.renderToolPage({
  category:'calc',titleKey:'toolTitle',descKey:'toolDesc',
  howToSteps:['step1','step2','step3','step4'],
  related:[
    {icon:'🥫',href:'/calc/cylinder-volume-calculator.html',name:'Cylinder Volume'},
    {icon:'🍦',href:'/calc/cone-volume-calculator.html',name:'Cone Volume'},
    {icon:'🔵',href:'/calc/circle-calculator.html',name:'Circle Calculator'},
    {icon:'📦',href:'/calc/volume-calculator.html',name:'Volume Calculator'}
  ]
});
</script>
