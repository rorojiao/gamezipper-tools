<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="gz-split">
      <div><label id="lbl-in"></label><textarea id="input" spellcheck="false"></textarea></div>
      <div><label id="lbl-out"></label><textarea id="output" spellcheck="false" readonly></textarea></div>
    </div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Base64 Encoder / Decoder',
    toolDesc: 'Encode text to Base64 or decode Base64 strings back to text. Supports UTF-8.',
    step1: 'Enter text or Base64 string in the input area',
    step2: 'Click Encode to convert text → Base64',
    step3: 'Click Decode to convert Base64 → text',
    step4: 'Copy the result with the Copy button',
  },
  zh: {
    toolTitle: 'Base64 Encode / Decode',
    toolDesc: 'Encode text to Base64 or decode Base64 strings to text，supports UTF-8。',
    step1: 'Enter text or Base64 strings in the input area',
    step2: 'Click"Encode"to convert text to Base64',
    step3: 'Click"Decode"将 Base64 to text',
    step4: 'Click"复制"copy the result',
  }
});

const { $, copyText, t } = GZ;

function doEncode() {
  try { $('#output').value = btoa(unescape(encodeURIComponent($('#input').value))); }
  catch(e) { $('#output').value = 'Error: ' + e.message; }
}
function doDecode() {
  try { $('#output').value = decodeURIComponent(escape(atob($('#input').value.trim()))); }
  catch(e) { $('#output').value = 'Error: ' + e.message; }
}
function loadExample() {
  $('#input').value = 'Hello, GameZipper Tools! Hello World 🎮';
  doEncode();
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="doEncode()">${t('encode')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doDecode()">${t('decode')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn" onclick="copyText($('#output').value)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#input').value='';$('#output').value=''">${t('clear')}</button>`;

GZ.renderToolPage({
  category: 'dev',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🔗', href:'/dev/url-encode.html', name:'URL Encode'},
    {icon:'📋', href:'/dev/json.html', name:'JSON Formatter'},
    {icon:'#️⃣', href:'/dev/hash.html', name:'Hash Generator'},
    {icon:'🔑', href:'/dev/jwt.html', name:'JWT Decoder'},
  ]
});
</script>
