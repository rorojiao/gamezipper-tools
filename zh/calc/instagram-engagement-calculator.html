<script>
GZI18n.register({
  en: {
    toolTitle: 'Instagram Engagement Rate Calculator',
    toolDesc: 'Calculate your Instagram engagement rate with likes, comments, saves and shares. Compare with industry benchmarks.',
    lblFollowers: 'Total Followers',
    lblPosts: 'Number of Posts Analyzed',
    lblLikes: 'Total Likes',
    lblComments: 'Total Comments',
    lblSaves: 'Total Saves',
    lblShares: 'Total Shares',
    lblTotalEng: 'Total Engagement',
    lblAvgPost: 'Avg Engagement / Post',
    excellent: 'Excellent',
    good: 'Good',
    average: 'Average',
    belowAvg: 'Below Average',
    benchmarks: 'Engagement Rate Benchmarks by Follower Count',
    step1: 'Enter your Instagram follower count',
    step2: 'Input total likes, comments, saves and shares',
    step3: 'Specify the number of posts being analyzed',
    step4: 'Review your engagement rate and compare with benchmarks',
  },
  zh: {
    toolTitle: 'Instagram 互动率计算器',
    toolDesc: '计算 Instagram 互动率，包含点赞、评论、收藏和分享数据，并与行业基准对比。',
    lblFollowers: '粉丝总数',
    lblPosts: '分析帖子数量',
    lblLikes: '总点赞数',
    lblComments: '总评论数',
    lblSaves: '总收藏数',
    lblShares: '总分享数',
    lblTotalEng: '总互动量',
    lblAvgPost: '每帖平均互动',
    excellent: '优秀',
    good: '良好',
    average: '一般',
    belowAvg: '低于平均',
    benchmarks: '按粉丝数分类的互动率基准',
    step1: '输入 Instagram 粉丝数量',
    step2: '输入总点赞、评论、收藏和分享数',
    step3: '指定分析的帖子数量',
    step4: '查看互动率并与行业基准对比',
  }
});

const { $, copyText, t } = GZ;

function getRating(rate, followers) {
  let thresholds;
  if (followers < 10000) thresholds = [1, 3, 5];
  else if (followers < 100000) thresholds = [0.8, 2, 4];
  else if (followers < 1000000) thresholds = [0.5, 1.5, 3];
  else thresholds = [0.3, 1, 2];

  if (rate >= thresholds[2]) return { text: t('excellent'), cls: 'excellent' };
  if (rate >= thresholds[1]) return { text: t('good'), cls: 'good' };
  if (rate >= thresholds[0]) return { text: t('average'), cls: 'average' };
  return { text: t('belowAvg'), cls: 'low' };
}

function calculate() {
  const followers = parseFloat($('#followers').value) || 0;
  const posts = parseFloat($('#posts').value) || 1;
  const likes = parseFloat($('#likes').value) || 0;
  const comments = parseFloat($('#comments').value) || 0;
  const saves = parseFloat($('#saves').value) || 0;
  const shares = parseFloat($('#shares').value) || 0;

  const totalEng = likes + comments + saves + shares;
  const rate = followers > 0 ? (totalEng / followers) * 100 : 0;
  const perPost = totalEng / Math.max(posts, 1);

  const rating = getRating(rate, followers);

  // Update gauge
  const maxRate = 10;
  const pct = Math.min(rate / maxRate, 1);
  const circumference = 2 * Math.PI * 70;
  const dash = pct * circumference;
  const color = rating.cls === 'excellent' ? '#00d672' : rating.cls === 'good' ? '#7bed9f' : rating.cls === 'average' ? '#ffa502' : '#ff6348';
  $('#gauge-arc').setAttribute('stroke-dasharray', `${dash} ${circumference}`);
  $('#gauge-arc').setAttribute('stroke', color);
  $('#gauge-pct').textContent = rate.toFixed(2) + '%';
  $('#gauge-pct').style.color = color;
  $('#gauge-label').textContent = rating.text;

  $('#total-engagement').textContent = totalEng.toLocaleString();
  $('#avg-per-post').textContent = Math.round(perPost).toLocaleString();

  $('#benchmark').innerHTML = `
    <strong>${t('benchmarks')}</strong>
    <table>
      <tr><th>< 10K</th><td class="average">1-3%</td><td class="good">3-5%</td><td class="excellent">5%+</td></tr>
      <tr><th>10K-100K</th><td class="average">0.8-2%</td><td class="good">2-4%</td><td class="excellent">4%+</td></tr>
      <tr><th>100K-1M</th><td class="average">0.5-1.5%</td><td class="good">1.5-3%</td><td class="excellent">3%+</td></tr>
      <tr><th>1M+</th><td class="average">0.3-1%</td><td class="good">1-2%</td><td class="excellent">2%+</td></tr>
    </table>`;
}

function setupLabels() {
  $('#lbl-followers').textContent = t('lblFollowers');
  $('#lbl-posts').textContent = t('lblPosts');
  $('#lbl-likes').textContent = t('lblLikes');
  $('#lbl-comments').textContent = t('lblComments');
  $('#lbl-saves').textContent = t('lblSaves');
  $('#lbl-shares').textContent = t('lblShares');
  $('#lbl-total-eng').textContent = t('lblTotalEng');
  $('#lbl-avg-post').textContent = t('lblAvgPost');
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="calculate()">${t('format')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="calculate()">${t('example')}</button>`;

['followers', 'posts', 'likes', 'comments', 'saves', 'shares'].forEach(id => {
  $('#' + id).addEventListener('input', calculate);
});

setupLabels();
calculate();

GZ.renderToolPage({

    {icon:'📈', href:'/calc/roi.html', name:'ROI Calculator'},
  ]
});
</script>
