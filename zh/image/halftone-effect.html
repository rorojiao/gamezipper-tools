<script>
GZI18n.register({
  en: {
    toolTitle: 'Halftone Effect Generator',
    toolDesc: 'Turn photos into halftone dot patterns and pop-art. Adjust dot size, angle and colors — free and private.',
    dropText: 'Drop a photo here or click to upload',
    size: 'Dot Size',
    angle: 'Angle',
    contrast: 'Contrast',
    ink: 'Ink',
    paper: 'Paper',
    download: '⬇ Download PNG',
    original: 'Original',
    result: 'Halftone',
    step1: 'Upload a photo (JPG, PNG, WebP)',
    step2: 'Adjust dot size, angle and contrast',
    step3: 'Pick ink and paper colors for a pop-art look',
    step4: 'Download the halftone result as PNG',
  },
  zh: {
    toolTitle: '半色调效果生成器',
    toolDesc: '将照片转换为半色调网点和波普艺术。调整网点大小、角度和颜色 — 免费且隐私。',
    dropText: '拖放照片到此处或点击上传',
    size: '网点大小',
    angle: '角度',
    contrast: '对比度',
    ink: '墨色',
    paper: '底色',
    download: '⬇ 下载 PNG',
    original: '原图',
    result: '半色调',
    step1: '上传照片（JPG、PNG、WebP）',
    step2: '调整网点大小、角度和对比度',
    step3: '选择墨色和底色，打造波普风格',
    step4: '下载半色调结果为 PNG',
  }
});

const { $, t } = GZ;
let imgData = null, origCanvas, resCanvas, origCtx, resCtx;

$('#drop-text').textContent = t('dropText');
$('#lbl-size').textContent = t('size');
$('#lbl-angle').textContent = t('angle');
$('#lbl-contrast').textContent = t('contrast');
$('#lbl-ink').textContent = t('ink');
$('#lbl-paper').textContent = t('paper');
$('#btn-download').textContent = t('download');
$('#lbl-orig').textContent = t('original');
$('#lbl-res').textContent = t('result');

const drop = $('#drop'), fileInput = $('#fileInput');
drop.addEventListener('click', () => fileInput.click());
drop.addEventListener('dragover', e => { e.preventDefault(); drop.classList.add('dragover'); });
drop.addEventListener('dragleave', () => drop.classList.remove('dragover'));
drop.addEventListener('drop', e => { e.preventDefault(); drop.classList.remove('dragover'); if (e.dataTransfer.files.length) loadImage(e.dataTransfer.files[0]); });
fileInput.addEventListener('change', e => { if (e.target.files.length) loadImage(e.target.files[0]); });

function loadImage(file) {
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      const maxW = 600; let w = img.width, h = img.height;
      if (w > maxW) { h = Math.round(h * maxW / w); w = maxW; }
      origCanvas = $('#original'); resCanvas = $('#result');
      origCanvas.width = w; origCanvas.height = h;
      resCanvas.width = w; resCanvas.height = h;
      origCtx = origCanvas.getContext('2d'); resCtx = resCanvas.getContext('2d');
      origCtx.drawImage(img, 0, 0, w, h);
      imgData = origCtx.getImageData(0, 0, w, h);
      drop.style.display = 'none';
      $('#controls').style.display = 'flex';
      $('#preview').style.display = 'grid';
      applyHalftone();
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function hexToRgb(hex) {
  const n = parseInt(hex.slice(1), 16);
  return [(n >> 16) & 255, (n >> 8) & 255, n & 255];
}

function applyHalftone() {
  if (!imgData) return;
  const w = imgData.width, h = imgData.height;
  const cell = parseInt($('#dotSize').value);
  const angle = parseInt($('#angle').value) * Math.PI / 180;
  const contrast = parseInt($('#contrast').value) / 100;
  const [inkR, inkG, inkB] = hexToRgb($('#inkColor').value);
  const [paperR, paperG, paperB] = hexToRgb($('#paperColor').value);

  // Fill paper background
  resCtx.fillStyle = $('#paperColor').value;
  resCtx.fillRect(0, 0, w, h);
  resCtx.fillStyle = $('#inkColor').value;

  const cos = Math.cos(angle), sin = Math.sin(angle);
  const maxR = cell / 2;

  // Sample grayscale at each grid point
  for (let cy = 0; cy < h + cell; cy += cell) {
    for (let cx = 0; cx < w + cell; cx += cell) {
      // Rotate sample center
      const rx = cx * cos - cy * sin;
      const ry = cx * sin + cy * cos;
      const sx = Math.round(rx), sy = Math.round(ry);
      if (sx < 0 || sx >= w || sy < 0 || sy >= h) continue;
      const idx = (sy * w + sx) * 4;
      let g = 0.299 * imgData.data[idx] + 0.587 * imgData.data[idx+1] + 0.114 * imgData.data[idx+2];
      // Apply contrast around midpoint
      g = Math.max(0, Math.min(255, (g - 128) * contrast + 128));
      // Darker => bigger dot
      const t = 1 - g / 255; // 0 bright .. 1 dark
      const r = Math.sqrt(Math.max(0, t)) * maxR;
      if (r > 0.3) {
        resCtx.beginPath();
        resCtx.arc(cx, cy, r, 0, Math.PI * 2);
        resCtx.fill();
      }
    }
  }
}

['dotSize','angle','contrast','inkColor','paperColor'].forEach(id => $('#' + id).addEventListener('input', applyHalftone));

$('#btn-download').addEventListener('click', () => {
  if (!resCanvas) return;
  const a = document.createElement('a');
  a.href = resCanvas.toDataURL('image/png');
  a.download = 'halftone.png'; a.click();
});

  titleKey: 'toolTitle',
  descKey: 'toolDesc',

    {icon:'🖼️', href:'/image/duotone-generator.html', name:'Duotone'},
  ]
});
</script>
