.month-view td .daynum{font-weight:700;display:block}
.month-view td .hol{font-size:.7em;color:var(--gz-accent);margin-top:2px}
.month-view td .note{font-size:.7em;color:var(--text2);margin-top:2px;background:var(--glass);border-radius:4px;padding:1px 4px;word-break:break-word}

<script>
GZI18n.register({
  en: {
    toolTitle: '2026 Printable Calendar',
    toolDesc: 'Free printable 2026 calendar — yearly grid or full month view with US holidays, today highlight and personal notes. Print or save as PDF.',
    year: 'Year',
    viewYear: '🗓 Year',
    viewMonth: '📅 Month',
    prevMonth: '‹',
    nextMonth: '›',
    print: '🖨 Print / PDF',
    clearNotes: '🗑 Clear Notes',
    step1: 'Pick a year (2026 by default) using the dropdown',
    step2: 'Toggle between Year grid and Month view',
    step3: 'Click any date in Month view to add a personal note',
    step4: 'Click Print to print or save the calendar as PDF',
    notePrompt: 'Add a note for {d} (leave empty to delete):',
    months: ['January','February','March','April','May','June','July','August','September','October','November','December'],
    monthsShort: ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'],
    dow: ['S','M','T','W','T','F','S'],
    dowFull: ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'],
    holidays2026: {
      '1-1':'New Year\'s Day','1-19':'MLK Day','2-16':'Presidents Day','5-25':'Memorial Day',
      '7-4':'Independence Day','9-7':'Labor Day','10-12':'Columbus Day','11-11':'Veterans Day',
      '11-26':'Thanksgiving','12-25':'Christmas Day'
    }
  },
  zh: {
    toolTitle: '2026 年可打印日历',
    toolDesc: '免费 2026 年日历 — 全年网格或单月视图，标注美国节假日、今日高亮和个人备注。可打印或保存为 PDF。',
    year: '年份',
    viewYear: '🗓 全年',
    viewMonth: '📅 单月',
    prevMonth: '‹',
    nextMonth: '›',
    print: '🖨 打印 / PDF',
    clearNotes: '🗑 清除备注',
    step1: '使用下拉框选择年份（默认 2026）',
    step2: '在「全年」和「单月」视图之间切换',
    step3: '在单月视图中点击任意日期可添加备注',
    step4: '点击「打印」打印日历或保存为 PDF',
    notePrompt: '为 {d} 添加备注（留空则删除）：',
    months: ['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'],
    monthsShort: ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'],
    dow: ['日','一','二','三','四','五','六'],
    dowFull: ['周日','周一','周二','周三','周四','周五','周六'],
    holidays2026: {
      '1-1':'元旦','1-19':'马丁·路德·金日','2-16':'总统日','5-25':'阵亡将士纪念日',
      '7-4':'独立日','9-7':'劳动节','10-12':'哥伦布日','11-11':'退伍军人节',
      '11-26':'感恩节','12-25':'圣诞节'
    }
  }
});

const { $, t } = GZ;
let curYear = 2026, curMonth = 0, mode = 'year';
const notes = JSON.parse(localStorage.getItem('gz-cal-notes') || '{}');

function holKey(y,m,d){ return y===2026 ? `${m+1}-${d}` : null; }
function isToday(y,m,d){ const n=new Date(); return y===n.getFullYear()&&m===n.getMonth()&&d===n.getDate(); }

function renderYear() {
  const ms = t('months'), ds = t('dow');
  let html = `<div class="year-grid">`;
  for (let m=0;m<12;m++){
    html += `<div class="mini-month" onclick="switchMonth(${m})"><h4>${ms[m]} ${curYear}</h4><table><tr>${ds.map(d=>`<th>${d}</th>`).join('')}</tr>`;
    const first = new Date(curYear,m,1).getDay();
    const dim = new Date(curYear,m+1,0).getDate();
    let cell=0;
    html += '<tr>';
    for(let i=0;i<first;i++){html+='<td></td>';cell++;}
    for(let d=1;d<=dim;d++){
      const cls = isToday(curYear,m,d)?'today':(holKey(curYear,m,d)&&t('holidays2026')[holKey(curYear,m,d)]?'hol':'');
      html += `<td${cls?' class="'+cls+'"':''}>${d}</td>`;
      cell++;
      if(cell%7===0&&d<dim) html+='</tr><tr>';
    }
    while(cell%7!==0){html+='<td></td>';cell++;}
    html += '</tr></table></div>';
  }
  html += '</div>';
  $('#calRoot').innerHTML = html;
}

function renderMonth() {
  const ms = t('months'), ds = t('dowFull');
  const first = new Date(curYear,curMonth,1).getDay();
  const dim = new Date(curYear,curMonth+1,0).getDate();
  const pdim = new Date(curYear,curMonth,0).getDate();
  let html = `<div class="month-view"><h3 style="text-align:center;font-size:1.4rem;margin-bottom:12px">${ms[curMonth]} ${curYear}</h3><table><tr>${ds.map(d=>`<th>${d}</th>`).join('')}</tr><tr>`;
  let cell=0;
  for(let i=first-1;i>=0;i--){html+=`<td class="out">${pdim-i}</td>`;cell++;}
  const hs = t('holidays2026');
  for(let d=1;d<=dim;d++){
    const hk = holKey(curYear,curMonth,d);
    const hol = hk && hs[hk] ? hs[hk] : '';
    const noteKey = `${curYear}-${curMonth}-${d}`;
    const note = notes[noteKey]||'';
    const cls = isToday(curYear,curMonth,d)?'today':'';
    html += `<td${cls?' class="'+cls+'"':''} onclick="editNote('${noteKey}')"><span class="daynum">${d}</span>`;
    if(hol) html += `<div class="hol">${hol}</div>`;
    if(note) html += `<div class="note">${esc(note)}</div>`;
    html += '</td>';
    cell++;
    if(cell%7===0&&d<dim) html+='</tr><tr>';
  }
  let nd=1;
  while(cell%7!==0){html+=`<td class="out">${nd++}</td>`;cell++;}
  html += '</tr></table></div>';
  $('#calRoot').innerHTML = html;
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function switchMonth(m){curMonth=m;mode='month';render();}

function editNote(key){
  const cur = notes[key]||'';
  const val = prompt(t('notePrompt').replace('{d}', key), cur);
  if(val===null) return;
  if(val.trim()){ notes[key]=val.trim(); } else { delete notes[key]; }
  localStorage.setItem('gz-cal-notes', JSON.stringify(notes));
  renderMonth();
}

function render(){
  if(mode==='year') renderYear(); else renderMonth();
  updateToolbar();
}

function updateToolbar(){
  $('#toolbar').innerHTML = `
    <select class="gz-select" onchange="curYear=+this.value;render()">
      ${[2024,2025,2026,2027,2028].map(y=>`<option value="${y}"${y===curYear?' selected':''}>${y}</option>`).join('')}
    </select>
    <button class="gz-btn${mode==='year'?'':' gz-btn-secondary'}" onclick="mode='year';render()">${t('viewYear')}</button>
    <button class="gz-btn${mode==='month'?'':' gz-btn-secondary'}" onclick="mode='month';render()">${t('viewMonth')}</button>
    ${mode==='month'?`<button class="gz-btn gz-btn-secondary" onclick="curMonth=(curMonth+11)%12;render()">${t('prevMonth')}</button><button class="gz-btn gz-btn-secondary" onclick="curMonth=(curMonth+1)%12;render()">${t('nextMonth')}</button>`:''}
    <button class="gz-btn" onclick="window.print()">${t('print')}</button>
    <button class="gz-btn gz-btn-secondary" onclick="if(confirm('Clear all notes?')){Object.keys(notes).forEach(k=>delete notes[k]);localStorage.removeItem('gz-cal-notes');render()}">${t('clearNotes')}</button>`;
}

render();

GZ.renderToolPage({
  category: 'fun',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📅', href:'/calc/date-calculator.html', name:'Date Calc'},
    {icon:'📅', href:'/calc/days-between-dates.html', name:'Days Between'},
    {icon:'📅', href:'/fun/countdown.html', name:'Countdown'},
    {icon:'📅', href:'/calc/week-number.html', name:'Week Number'},
  ]
});
</script>
