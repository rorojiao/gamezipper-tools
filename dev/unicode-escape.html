<script>

  },
  zh: {

    toolDesc: '在文本与 \\uXXXX / \\xXX 转义序列之间互转，支持 JavaScript、JSON、Java、Python、UTF-8 十六进制和 HTML 实体。',
    modeEnc: '编码 → 转义',
    modeDec: '解码 → 文本',
    asciiOnly: '仅转义非 ASCII 字符',
    escapeQuotes: '转义引号和反斜杠',
    lowerHex: '小写十六进制',
    step1: '在输入框输入或粘贴文本（或已转义的文本）',
    step2: '选择「编码」将文本转为 \\uXXXX 转义，或「解码」将转义还原为文本',
    step3: '使用复选框控制哪些字符需要转义',
    step4: '点击「复制」复制结果，或在下方查看每个字符的码位',
  }

const { $, copyText, t } = GZ;
let mode = 'enc';           // 'enc' | 'dec'
let asciiOnly = true;
let escapeMeta = false;
let lowerHex = true;

const HEX = n => (lowerHex ? n.toString(16) : n.toString(16).toUpperCase());

function pad(n, w) { return n.toString(16).padStart(w, lowerHex ? '0' : '0').toUpperCase(); }

function encode(str) {
  let out = '';
  for (const ch of str) {
    const cp = ch.codePointAt(0);
    if (escapeMeta && (ch === '"' || ch === "'" || ch === '\\')) { out += '\\' + ch; continue; }
    if (asciiOnly && cp <= 0x7F) {
      if (ch === '\n') out += escapeMeta ? '\\n' : ch;
      else if (ch === '\r') out += escapeMeta ? '\\r' : ch;
      else if (ch === '\t') out += escapeMeta ? '\\t' : ch;
      else out += ch;
    } else if (cp <= 0xFF) {
      out += '\\x' + pad(cp, 2);
    } else if (cp <= 0xFFFF) {
      out += '\\u' + pad(cp, 4);
    } else {
      out += '\\u' + pad(((cp - 0x10000) >> 10) + 0xD800, 4) + '\\u' + pad(((cp - 0x10000) & 0x3FF) + 0xDC00, 4);
    }
  }
  return out;
}

function decode(str) {
  // Recognise \uXXXX, \u{...}, \UXXXXXXXX, \xXX, \n \r \t \b \f \v \0 \\ \" \' and bare UTF-8
  let out = '';
  let i = 0;
  let ok = true;
  const controlMap = {n:'\n', r:'\r', t:'\t', b:'\b', f:'\f', v:'\v', '0':'\0'};
  while (i < str.length) {
    const c = str[i];
    if (c === '\\') {
      const next = str[i + 1];
      if (next === 'u' && str[i + 2] === '{') {
        const end = str.indexOf('}', i + 3);
        if (end === -1) { out += str.slice(i); ok = false; break; }
        const cp = parseInt(str.slice(i + 3, end), 16);
        if (!isNaN(cp)) out += String.fromCodePoint(cp); else ok = false;
        i = end + 1;
      } else if (next === 'u') {
        const hex = str.substr(i + 2, 4);
        if (/^[0-9a-fA-F]{4}$/.test(hex)) {
          out += String.fromCharCode(parseInt(hex, 16));
          i += 6;
        } else { out += c; i++; }
      } else if (next === 'U') {
        const hex = str.substr(i + 2, 8);
        if (/^[0-9a-fA-F]{8}$/.test(hex)) {
          out += String.fromCodePoint(parseInt(hex, 16));
          i += 10;
        } else { out += c; i++; }
      } else if (next === 'x') {
        const hex = str.substr(i + 2, 2);
        if (/^[0-9a-fA-F]{2}$/.test(hex)) {
          out += String.fromCharCode(parseInt(hex, 16));
          i += 4;
        } else { out += c; i++; }
      } else if (controlMap[next] !== undefined) {
        out += controlMap[next]; i += 2;
      } else if (next === '\\') { out += '\\'; i += 2; }
      else if (next === '"' || next === "'") { out += next; i += 2; }
      else { out += c; i++; }
    } else {
      out += c; i++;
    }
  }
  return { text: out, ok };
}

function renderCp(str) {
  const limit = 48;
  const chars = Array.from(str).slice(0, limit);
  if (!chars.length) { $('#cpgrid').innerHTML = ''; return; }
  $('#cpgrid').innerHTML = chars.map(ch => {
    const cp = ch.codePointAt(0);
    const display = cp < 32 ? '·' : ch;
    return `<div class="cp"><div class="ch">${cp===32?'␣':escapeHtml(display)}</div><div class="hex">U+${cp.toString(16).toUpperCase().padStart(4,'0')}</div><div class="dec">${cp}</div></div>`;
  }).join('') + (Array.from(str).length > limit ? `<div class="cp"><div class="ch">…</div><div class="hex">${Array.from(str).length}+</div></div>` : '');
}

function escapeHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function run() {
  const inp = $('#input').value;
  if (!inp) { $('#output').textContent = ''; $('#status').innerHTML = ''; $('#cpgrid').innerHTML = ''; return; }
  try {
    if (mode === 'enc') {
      const res = encode(inp);
      $('#output').textContent = res;
      $('#status').innerHTML = `<span style="color:var(--gz-success)">✓ ${res.length} chars</span>`;
      renderCp(inp);
    } else {
      const { text, ok } = decode(inp);
      $('#output').textContent = text;
      $('#status').innerHTML = ok
        ? `<span style="color:var(--gz-success)">✓ decoded ${text.length} chars</span>`
        : `<span style="color:var(--gz-accent)">⚠ decoded with some unrecognised sequences</span>`;
      renderCp(text);
    }
  } catch (e) {
    $('#output').textContent = '';
    $('#status').innerHTML = `<span style="color:var(--gz-accent)">✗ ${e.message}</span>`;
  }
}

function loadExample() {
  $('#input').value = 'Hello 世界 🌍\nEmoji: 😀';
  run();
}

function doClear() { $('#input').value=''; run(); }

function swapMode(m) { mode = m; run(); updateToolbar(); }

function updateToolbar() {
  $('#toolbar').innerHTML = `
    <button class="gz-btn${mode==='enc'?'':''}" onclick="swapMode('enc')" style="${mode==='enc'?'background:var(--accent);color:#000':''}">${t('modeEnc')}</button>
    <button class="gz-btn" onclick="swapMode('dec')" style="${mode==='dec'?'background:var(--accent);color:#000':''}">${t('modeDec')}</button>
    <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>
    <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
    <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;
  $('#opts').innerHTML = `
    <label><input type="checkbox" ${asciiOnly?'checked':''} onchange="asciiOnly=this.checked;run()"> ${t('asciiOnly')}</label>
    <label><input type="checkbox" ${escapeMeta?'checked':''} onchange="escapeMeta=this.checked;run()"> ${t('escapeQuotes')}</label>
    <label><input type="checkbox" ${lowerHex?'checked':''} onchange="lowerHex=this.checked;run()"> ${t('lowerHex')}</label>`;
}

$('#input').addEventListener('input', run);
updateToolbar();
run();
