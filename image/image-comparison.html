<div class="gz-container">
  <div class="gz-tool-header">

    <p class="desc" id="desc"></p>

      </div>

      </div>

  </div>

</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Image Comparison Slider',
    toolDesc: 'Compare two images with an interactive before/after slider. Drag to reveal differences — perfect for designers and photographers.',
    dropBefore: 'Drop Before image here',
    dropAfter: 'Drop After image here',
    before: 'Before',
    after: 'After',
    step1: 'Upload or drag a Before image into the left drop zone',
    step2: 'Upload or drag an After image into the right drop zone',
    step3: 'Drag the slider handle left and right to compare',
    step4: 'Click Download Comparison to save the result',
  },
  zh: {
    toolTitle: '图片对比滑块工具',
    toolDesc: '使用交互式前后对比滑块比较两张图片。拖动滑块查看差异 — 适合设计师和摄影师。',
    dropBefore: '拖拽「之前」图片到此处',
    dropAfter: '拖拽「之后」图片到此处',
    before: '之前',
    after: '之后',
    step1: '上传或拖拽「之前」图片到左侧区域',
    step2: '上传或拖拽「之后」图片到右侧区域',
    step3: '拖动滑块左右对比查看差异',
    step4: '点击「下载对比结果」保存',
  }
});

const { $, t } = GZ;

$('#lbl-before').textContent = t('dropBefore');
$('#lbl-after').textContent = t('dropAfter');
$('#label-before-text').textContent = t('before');
$('#label-after-text').textContent = t('after');

const beforeEl = $('#drop-before'), afterEl = $('#drop-after');
const fileBefore = $('#file-before'), fileAfter = $('#file-after');
const imgBefore = $('#img-before'), imgAfter = $('#img-after');
const container = $('#compare-container');
let sliderPct = 50, dragging = false;

function setupDrop(el, input, img) {
  el.onclick = () => input.click();
  el.addEventListener('dragover', e => { e.preventDefault(); el.style.borderColor = 'var(--gz-accent)'; });
  el.addEventListener('dragleave', () => { el.style.borderColor = ''; });
  el.addEventListener('drop', e => { e.preventDefault(); el.style.borderColor = ''; if(e.dataTransfer.files.length) loadImage(e.dataTransfer.files[0], img, el); });
  input.addEventListener('change', e => { if(e.target.files.length) loadImage(e.target.files[0], img, el); });
}

function loadImage(file, img, el) {
  const reader = new FileReader();
  reader.onload = e => {
    img.src = e.target.result;
    el.innerHTML = `<div style="font-size:.85em;opacity:.7">✓ ${file.name}</div>`;
    checkBothLoaded();
  };
  reader.readAsDataURL(file);
}

setupDrop(beforeEl, fileBefore, imgBefore);
setupDrop(afterEl, fileAfter, imgAfter);

function checkBothLoaded() {
  let count = 0;
  if (imgBefore.src) count++;
  if (imgAfter.src) count++;
  if (count === 2) {
    imgBefore.onload = () => showComparison();
    if (imgBefore.complete && imgAfter.complete) showComparison();
  }
}

function showComparison() {
  container.style.display = 'block';
  $('#labels-row').style.display = 'flex';
  beforeEl.style.display = 'none';
  afterEl.style.display = 'none';
  setSlider(50);
  updateToolbar();
}

function setSlider(pct) {
  sliderPct = Math.max(0, Math.min(100, pct));
  imgAfter.style.clipPath = `inset(0 ${100 - sliderPct}% 0 0)`;
  $('#slider-line').style.left = sliderPct + '%';
  $('#slider-handle').style.left = sliderPct + '%';
}

container.addEventListener('mousedown', e => { dragging = true; moveSlider(e); });
container.addEventListener('touchstart', e => { dragging = true; moveSlider(e.touches[0]); }, { passive: true });
document.addEventListener('mousemove', e => { if(dragging) moveSlider(e); });
document.addEventListener('touchmove', e => { if(dragging) moveSlider(e.touches[0]); }, { passive: true });
document.addEventListener('mouseup', () => { dragging = false; });
document.addEventListener('touchend', () => { dragging = false; });

function moveSlider(e) {
  const rect = container.getBoundingClientRect();
  const pct = ((e.clientX - rect.left) / rect.width) * 100;
  setSlider(pct);
}

function downloadComparison() {
  const c = document.createElement('canvas');
  const w = imgBefore.naturalWidth;
  const h = imgBefore.naturalHeight;
  c.width = w; c.height = h;
  const cx = c.getContext('2d');
  cx.drawImage(imgBefore, 0, 0, w, h);
  const splitX = Math.round(w * sliderPct / 100);
  cx.save();
  cx.beginPath();
  cx.rect(splitX, 0, w - splitX, h);
  cx.clip();
  cx.drawImage(imgAfter, 0, 0, w, h);
  cx.restore();
  // Draw line
  cx.strokeStyle = '#fff';
  cx.lineWidth = 3;
  cx.beginPath();
  cx.moveTo(splitX, 0);
  cx.lineTo(splitX, h);
  cx.stroke();
  const a = document.createElement('a');
  a.href = c.toDataURL('image/png');
  a.download = 'image-comparison.png';
  a.click();
}

function resetTool() {
  container.style.display = 'none';
  $('#labels-row').style.display = 'none';
  beforeEl.style.display = '';
  afterEl.style.display = '';
  beforeEl.innerHTML = `<div style="font-size:1.5em">🖼️</div><div>${t('dropBefore')}</div>`;
  afterEl.innerHTML = `<div style="font-size:1.5em">🖼️</div><div>${t('dropAfter')}</div>`;
  imgBefore.src = ''; imgAfter.src = '';
  fileBefore.value = ''; fileAfter.value = '';
  updateToolbar();
}

function updateToolbar() {
  const active = container.style.display === 'block';
  $('#toolbar').innerHTML = active ? `
    <button class="gz-btn" onclick="downloadComparison()">💾 Download Comparison</button>
    <button class="gz-btn gz-btn-secondary" onclick="resetTool()">🔄 New Images</button>` : '';
}

updateToolbar();

GZ.renderToolPage({
  category: 'image',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🎨', href:'/image/filters.html', name:'Image Filters'},
    {icon:'🔒', href:'/image/censor.html', name:'Image Censor'},
    {icon:'🔍', href:'/image/exif-viewer.html', name:'EXIF Viewer'},
  ]
});
</script>

</body>
