<script>
GZI18n.register({
  en: {
    toolTitle: 'XML Sitemap Generator',
    toolDesc: 'Paste your URLs and instantly generate a valid XML sitemap with lastmod, changefreq and priority. Download sitemap.xml — free, no signup, 100% in-browser.',
    generate: 'Generate',
    download: 'Download XML',
    example: 'Example',
    clear: 'Clear',
    copy: 'Copy',
    freq: 'Change freq:',
    priority: 'Priority:',
    lastmod: 'Lastmod:',
    inputLabel: 'URLs (one per line)',
    outputLabel: 'Sitemap XML',
    urlCount: (n) => `${n} URL${n !== 1 ? 's' : ''} found`,
    step1: 'Paste your page URLs in the input area, one per line',
    step2: 'Set changefreq, priority and optional lastmod date',
    step3: 'Click Generate to create the sitemap XML',
    step4: 'Download the file or copy it to your clipboard',
  },
  zh: {
    toolTitle: 'XML 站点地图生成器',
    toolDesc: '粘贴 URL 即时生成有效的 XML 站点地图，包含 lastmod、changefreq 和 priority。下载 sitemap.xml — 免费、无需注册、100% 浏览器本地运行。',
    generate: '生成',
    download: '下载 XML',
    example: '示例',
    clear: '清空',
    copy: '复制',
    freq: '更新频率：',
    priority: '优先级：',
    lastmod: '最后修改：',
    inputLabel: 'URL 列表（每行一个）',
    outputLabel: '站点地图 XML',
    urlCount: (n) => `找到 ${n} 个 URL`,
    step1: '在输入区粘贴页面 URL，每行一个',
    step2: '设置更新频率、优先级和可选的最后修改日期',
    step3: '点击「生成」创建站点地图 XML',
    step4: '下载文件或复制到剪贴板',
  }
});

const { $, copyText, t } = GZ;

// Set today's date as default lastmod
$('#lastmod').value = new Date().toISOString().split('T')[0];

function escapeXml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&apos;');
}

function generate() {
  const input = $('#input').value.trim();
  if (!input) { $('#output').textContent = ''; $('#url-count').textContent = ''; return; }

  const urls = input.split('\n').map(u => u.trim()).filter(u => u && /^https?:\/\//.test(u)).slice(0, 500);
  const freq = $('#changefreq').value;
  const priority = $('#priority').value;
  const lastmod = $('#lastmod').value;

  let xml = '<?xml version="1.0" encoding="UTF-8"?>\n';
  xml += '<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">\n';

  urls.forEach(url => {
    xml += '  <url>\n';
    xml += `    <loc>${escapeXml(url)}</loc>\n`;
    if (lastmod) xml += `    <lastmod>${lastmod}</lastmod>\n`;
    xml += `    <changefreq>${freq}</changefreq>\n`;
    xml += `    <priority>${priority}</priority>\n`;
    xml += '  </url>\n';
  });

  xml += '</urlset>';

  $('#output').textContent = xml;
  $('#url-count').textContent = t('urlCount')(urls.length);
  $('#status').innerHTML = `<span style="color:var(--gz-success)">✓ ${t('urlCount')(urls.length)}</span>`;
}

function downloadXML() {
  const xml = $('#output').textContent;
  if (!xml) return;
  const blob = new Blob([xml], { type: 'application/xml' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'sitemap.xml';
  a.click();
}

function loadExample() {
  $('#input').value = [
    'https://example.com/',
    'https://example.com/about',
    'https://example.com/products',
    'https://example.com/blog',
    'https://example.com/contact'
  ].join('\n');
  generate();
}

function doClear() { $('#input').value = ''; $('#output').textContent = ''; $('#url-count').textContent = ''; $('#status').innerHTML = ''; }

$('#input').addEventListener('input', generate);

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="generate()">${t('generate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="downloadXML()">${t('download')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

$('#lbl-freq').textContent = t('freq');
$('#lbl-priority').textContent = t('priority');
$('#lbl-lastmod').textContent = t('lastmod');

GZ.renderToolPage({
  category: 'dev',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🔍', href:'/seo/meta-tag-generator.html', name:'Meta Tag Generator'},
    {icon:'📋', href:'/dev/robots-txt-validator.html', name:'robots.txt Validator'},
    {icon:'📄', href:'/seo/faq-schema-generator.html', name:'FAQ Schema'},
    {icon:'🔗', href:'/seo/canonical-tag-generator.html', name:'Canonical Tag'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
