<script type="application/ld+json">{"@context":"https://schema.org","@type":"WebApplication","name":"GST Calculator","description":"Free online GST calculator. Calculate GST inclusive and exclusive prices for 5%, 12%, 18%, and 28% tax slabs. Instant results for Indian GST rates.","url": "https://tools.gamezipper.com/zh/calc/gst-calculator.html","applicationCategory":"Utility","operatingSystem":"Web Browser","offers":{"@type":"Offer","price":"0"}}</script>
<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"What is GST?","acceptedAnswer":{"@type":"Answer","text":"GST (Goods and Services Tax) is a comprehensive indirect tax levied on the supply of goods and services in India. It replaced multiple cascading taxes and has four main rate slabs: 5%, 12%, 18%, and 28%."}},{"@type":"Question","name":"How do I calculate GST from an inclusive price?","acceptedAnswer":{"@type":"Answer","text":"To extract GST from an inclusive price: Original Price = Inclusive Price × (100 / (100 + GST Rate)). The GST amount = Inclusive Price - Original Price."}},{"@type":"Question","name":"What are the GST tax slabs in India?","acceptedAnswer":{"@type":"Answer","text":"The four main GST slabs are 5% (essential items), 12% (standard goods), 18% (most goods and services), and 28% (luxury items and sin goods). There are also special rates of 0.25% and 3%."}},{"@type":"Question","name":"Is this GST calculator accurate?","acceptedAnswer":{"@type":"Answer","text":"Yes. This calculator uses standard GST formulas for both inclusive and exclusive calculations. It supports all standard GST rates including CGST, SGST, and IGST components."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="radio-group" id="modeGroup"></div>
    <div class="calc-row">
      <label id="lblAmt"></label>
      <input type="number" id="amount" value="1000" min="0" step="0.01">
    </div>
    <div class="calc-row">
      <label id="lblRate"></label>
      <select id="rate">
        <option value="5">5%</option>
        <option value="12">12%</option>
        <option value="18" selected>18%</option>
        <option value="28">28%</option>
        <option value="0.25">0.25%</option>
        <option value="3">3%</option>
      </select>
    </div>
    <div class="gz-btn-group">
      <button class="gz-btn" id="calcBtn" onclick="calculate()"></button>
      <button class="gz-btn gz-btn-secondary" id="clearBtn" onclick="clearAll()"></button>
    </div>
    <div class="result-box" id="results" style="display:none">
      <div class="result-row"><span id="rOriginal"></span><span id="vOriginal"></span></div>
      <div class="result-row"><span id="rCGST"></span><span id="vCGST"></span></div>
      <div class="result-row"><span id="rSGST"></span><span id="vSGST"></span></div>
      <div class="result-row"><span id="rTotalGST"></span><span id="vTotalGST"></span></div>
      <div class="result-row"><span id="rTotal"></span><span id="vTotal"></span></div>
    </div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en:{
    toolTitle:'GST Calculator',
    toolDesc:'Calculate GST inclusive and exclusive prices instantly. Supports all Indian GST tax slabs (5%, 12%, 18%, 28%) with CGST/SGST breakdown.',
    addGST:'Add GST to price', removeGST:'Remove GST from price',
    amount:'Amount (₹)', gstRate:'GST Rate',
    calculate:'Calculate', clear:'Clear',
    originalPrice:'Original Price', cgst:'CGST (½ GST)', sgst:'SGST (½ GST)',
    totalGST:'Total GST', totalAmount:'Total Amount',
    step1:'Choose whether to add GST to a price or extract GST from an inclusive price',
    step2:'Enter the amount in Indian Rupees (₹)',
    step3:'Select the applicable GST rate (5%, 12%, 18%, or 28%)',
    step4:'Click Calculate to see the CGST, SGST, and total breakdown',
  },
  zh:{
    toolTitle:'GST 计算器',
    toolDesc:'即时计算含税和不含税价格。支持所有印度 GST 税率档次（5%、12%、18%、28%），自动分解 CGST/SGST。',
    addGST:'添加 GST 到价格', removeGST:'从价格中去除 GST',
    amount:'金额 (₹)', gstRate:'GST 税率',
    calculate:'计算', clear:'清空',
    originalPrice:'原始价格', cgst:'CGST (½ GST)', sgst:'SGST (½ GST)',
    totalGST:'GST 总额', totalAmount:'含税总价',
    step1:'选择是添加 GST 到价格还是从含税价格中提取 GST',
    step2:'输入金额（印度卢比 ₹）',
    step3:'选择适用的 GST 税率（5%、12%、18% 或 28%）',
    step4:'点击「计算」查看 CGST、SGST 和总额明细',
  }
});
const{$,t}=GZ;
let mode='add';

function updateLabels(){
  $('#lblAmt').textContent=t('amount');
  $('#lblRate').textContent=t('gstRate');
  $('#calcBtn').textContent=t('calculate');
  $('#clearBtn').textContent=t('clear');
  const mg=$('#modeGroup');
  mg.innerHTML=`
    <label><input type="radio" name="mode" value="add" ${mode==='add'?'checked':''} onchange="mode=this.value"> ${t('addGST')}</label>
    <label><input type="radio" name="mode" value="remove" ${mode==='remove'?'checked':''} onchange="mode=this.value"> ${t('removeGST')}</label>`;
  $('#rOriginal').textContent=t('originalPrice');
  $('#rCGST').textContent=t('cgst');
  $('#rSGST').textContent=t('sgst');
  $('#rTotalGST').textContent=t('totalGST');
  $('#rTotal').textContent=t('totalAmount');
}

function fmt(n){return '₹'+n.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,',')}

function calculate(){
  const amt=parseFloat($('#amount').value)||0;
  const rate=parseFloat($('#rate').value)||18;
  let original,gst,total;
  if(mode==='add'){original=amt;gst=amt*rate/100;total=amt+gst}
  else{total=amt;original=amt*(100/(100+rate));gst=total-original}
  const half=gst/2;
  $('#vOriginal').textContent=fmt(original);
  $('#vCGST').textContent=fmt(half);
  $('#vSGST').textContent=fmt(half);
  $('#vTotalGST').textContent=fmt(gst);
  $('#vTotal').textContent=fmt(total);
  $('#results').style.display='block';
}

function clearAll(){$('#amount').value='';$('#results').style.display='none'}

updateLabels();
calculate();

GZ.renderToolPage({
  category:'calc',
  titleKey:'toolTitle',
  descKey:'toolDesc',
  howToSteps:['step1','step2','step3','step4'],
  related:[
    {icon:'💰',href:'/calc/tax-calculator.html',name:'Tax'},
    {icon:'🏦',href:'/calc/mortgage.html',name:'Mortgage'},
    {icon:'💵',href:'/calc/profit-margin.html',name:'Profit Margin'},
    {icon:'🧮',href:'/calc/percentage-calculator.html',name:'Percentage'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
