const { $, copyText, t } = GZ;

// Keywords that trigger a newline (placed at depth+1)
const NL_KEYWORDS = new Set(['SELECT','FROM','WHERE','AND','OR','ON','INNER','LEFT','RIGHT','FULL','JOIN','CROSS','GROUP','ORDER','HAVING','LIMIT','OFFSET','UNION','INSERT','INTO','VALUES','UPDATE','SET','DELETE','CREATE','TABLE','INDEX','VIEW','DROP','ALTER','ADD','COLUMN','CONSTRAINT','PRIMARY','KEY','FOREIGN','REFERENCES','NOT','NULL','DEFAULT','UNIQUE','CHECK','AS','DISTINCT','CASE','WHEN','THEN','ELSE','END','BEGIN','COMMIT','ROLLBACK','WITH','RECURSIVE','RETURNING','WINDOW','OVER','PARTITION']);

function tokenizeSQL(src){
  const tokens = [];
  let i = 0, n = src.length;
  while (i < n){
    const c = src[i];
    // Whitespace
    if (/\s/.test(c)){ i++; continue; }
    // Line comment --
    if (c === '-' && src[i+1] === '-'){
      let e = src.indexOf('\n', i); if (e === -1) e = n;
      tokens.push({type:'comment', val: src.slice(i, e).trim()});
      i = e; continue;
    }
    // Block comment /* */
    if (c === '/' && src[i+1] === '*'){
      let e = src.indexOf('*/', i+2); if (e === -1) e = n; else e += 2;
      tokens.push({type:'comment', val: src.slice(i, e).trim()});
      i = e; continue;
    }
    // String literal
    if (c === "'" || c === '"' || c === '`'){
      const q = c; let j = i+1;
      while (j < n){
        if (src[j] === q){ if (src[j+1] === q){ j += 2; continue; } j++; break; }
        j++;
      }
      tokens.push({type:'string', val: src.slice(i, j)});
      i = j; continue;
    }
    // Number
    if (/[0-9]/.test(c) || (c === '.' && /[0-9]/.test(src[i+1]))){
      let j = i;
      while (j < n && /[0-9.]/.test(src[j])) j++;
      tokens.push({type:'number', val: src.slice(i, j)});
      i = j; continue;
    }
    // Identifier or keyword
    if (/[A-Za-z_@#]/.test(c)){
      let j = i;
      while (j < n && /[A-Za-z0-9_@$#]/.test(src[j])) j++;
      const word = src.slice(i, j);
      const up = word.toUpperCase();
      tokens.push({type: NL_KEYWORDS.has(up) ? 'keyword' : (up === word ? 'word' : 'word'), val: word, up: up});
      i = j; continue;
    }
    // Punctuation
    if ('(),;'.includes(c)){
      tokens.push({type:'punct', val: c});
      i++; continue;
    }
    // Operators
    tokens.push({type:'op', val: c});
    i++;
  }
  return tokens;
}

function beautifySQL(src, opts){
  const tokens = tokenizeSQL(src);
  const indent = opts.indent;
  const pad = d => '\n' + ' '.repeat(d * indent);
  let depth = 0;
  let out = '';
  let firstKeyword = true;

  for (let k = 0; k < tokens.length; k++){
    const tok = tokens[k];
    const next = tokens[k+1];
    if (tok.type === 'comment'){
      out += pad(depth) + tok.val;
      continue;
    }
    if (tok.type === 'keyword'){
      const kw = opts.uppercase ? tok.up : (tok.up === tok.val.toUpperCase() ? tok.up : tok.up);
      // Major clause keywords → newline + indent
      if (['SELECT','FROM','WHERE','GROUP','ORDER','HAVING','LIMIT','OFFSET','UNION','INSERT','INTO','VALUES','UPDATE','SET','DELETE','CREATE','DROP','ALTER','WITH','RETURNING','WINDOW'].includes(tok.up)){
        if (!firstKeyword || out) out += pad(depth);
        out += kw;
      } else if (['JOIN','INNER','LEFT','RIGHT','FULL','CROSS'].includes(tok.up)){
        depth = 1;
        out += pad(depth) + kw;
      } else if (['AND','OR','ON'].includes(tok.up)){
        out += pad(depth + 1) + kw;
      } else if (['CASE','WHEN','THEN','ELSE','END'].includes(tok.up)){
        if (tok.up === 'END') { depth = Math.max(0, depth-1); out += pad(depth) + kw; }
        else { out += pad(depth) + kw; if (tok.up === 'CASE' || tok.up === 'WHEN') depth++; }
      } else {
        out += ' ' + kw;
      }
      firstKeyword = false;
      continue;
    }
    if (tok.type === 'string' || tok.type === 'number' || tok.type === 'word'){
      if (out && !out.endsWith('(') && !out.endsWith('\n')) out += ' ';
      out += tok.val;
      continue;
    }
    if (tok.type === 'punct'){
      if (tok.val === '('){ out += '('; depth++; }
      else if (tok.val === ')'){ depth = Math.max(0, depth-1); out += ')'; }
      else if (tok.val === ','){ out += ',' + pad(depth + 1).slice(0, -1); out += ' '; }
      else if (tok.val === ';'){ out += ';' + pad(0); depth = 0; firstKeyword = true; }
      continue;
    }
    if (tok.type === 'op'){
      out += ' ' + tok.val + ' ';
      continue;
    }
  }
  return out.replace(/\n\s*\n/g, '\n').replace(/ {2,}/g, ' ').trim() + '\n';
}

function minifySQL(src){
  return src.replace(/--[^\n]*/g, '').replace(/\/\*[\s\S]*?\*\//g, '').replace(/\s+/g, ' ').trim();
}

const SQL_FUNCS = new Set(['COUNT','SUM','AVG','MIN','MAX','COALESCE','CONCAT','SUBSTRING','LENGTH','UPPER','LOWER','TRIM','REPLACE','ROUND','CEIL','FLOOR','ABS','NOW','CURRENT_DATE','CURRENT_TIMESTAMP','DATE','EXTRACT','CAST','CONVERT','ROW_NUMBER','RANK','DENSE_RANK','LEAD','LAG','NTILE','FIRST_VALUE','LAST_VALUE']);

function highlight(sql){
  const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  let out = '';
  const n = sql.length;
  let i = 0;
  while (i < n){
    const c = sql[i];
    if (c === '-' && sql[i+1] === '-'){
      let e = sql.indexOf('\n', i); if (e === -1) e = n;
      out += '<span class="sql-com">'+esc(sql.slice(i, e))+'</span>'; i = e; continue;
    }
    if (c === '/' && sql[i+1] === '*'){
      let e = sql.indexOf('*/', i+2); if (e === -1) e = n; else e += 2;
      out += '<span class="sql-com">'+esc(sql.slice(i, e))+'</span>'; i = e; continue;
    }
    if (c === "'" || c === '"' || c === '`'){
      const q = c; let j = i+1;
      while (j < n){ if (sql[j] === q){ if (sql[j+1] === q){ j += 2; continue; } j++; break; } j++; }
      out += '<span class="sql-str">'+esc(sql.slice(i, j))+'</span>'; i = j; continue;
    }
    if (/[0-9]/.test(c)){
      let j = i; while (j < n && /[0-9.]/.test(sql[j])) j++;
      out += '<span class="sql-num">'+esc(sql.slice(i, j))+'</span>'; i = j; continue;
    }
    if (/[A-Za-z_@#]/.test(c)){
      let j = i; while (j < n && /[A-Za-z0-9_@$#]/.test(sql[j])) j++;
      const w = sql.slice(i, j); const up = w.toUpperCase();
      if (NL_KEYWORDS.has(up)) out += '<span class="sql-kw">'+esc(up)+'</span>';
      else if (SQL_FUNCS.has(up)) out += '<span class="sql-fn">'+esc(up)+'</span>';
      else out += esc(w);
      i = j; continue;
    }
    out += esc(c); i++;
  }
  return out;
}

function getOpts(){
  return {
    indent: parseInt($('#ind').value, 10) || 2,
    uppercase: $('#uc').checked,
  };
}

function doBeautify(){
  const inp = $('#input').value;
  if (!inp.trim()){ $('#status').innerHTML = '<span style="color:var(--gz-accent)">'+t('empty')+'</span>'; $('#output').innerHTML=''; return; }
  const out = beautifySQL(inp, getOpts());
  $('#output').innerHTML = highlight(out);
  window._sqlOut = out;
  $('#status').innerHTML = '<span style="color:var(--gz-success)">'+t('done')+' · '+out.split('\n').length+' lines</span>';
}

function doMinify(){
  const inp = $('#input').value;
  if (!inp.trim()){ $('#status').innerHTML = '<span style="color:var(--gz-accent)">'+t('empty')+'</span>'; $('#output').innerHTML=''; return; }
  const out = minifySQL(inp);
  window._sqlOut = out;
  $('#output').innerHTML = highlight(out);
  $('#status').innerHTML = '<span style="color:var(--gz-success)">'+t('minified')+' · '+out.length+' chars</span>';
}

function doCopy(){ if (window._sqlOut != null) copyText(window._sqlOut); }

function doDownload(){
  if (window._sqlOut == null) return;
  const blob = new Blob([window._sqlOut], {type:'application/sql'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'query.sql';
  a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href), 1000);
}

function loadExample(){
  $('#input').value = 'SELECT u.id,u.name,COUNT(o.id) AS order_count FROM users u LEFT JOIN orders o ON o.user_id=u.id WHERE u.status=\'active\' AND u.created_at>\'2024-01-01\' GROUP BY u.id,u.name HAVING COUNT(o.id)>0 ORDER BY order_count DESC LIMIT 10;';
  doBeautify();
}
