<body>
<div class="gz-container">

  <div class="gz-tool-area">

          <option value="stats">AP Statistics</option>
          <option value="psych">AP Psychology</option>
          <option value="csp">AP Computer Science Principles</option>
          <option value="csa">AP Computer Science A</option>

      </label>
    </div>
    <div class="ap-section" id="mc-section">
      <h3 id="sec-mc"></h3>
      <div class="ap-inputs">
        <label><span id="lbl-mc-correct"></span><input type="number" id="mc-correct" value="0" min="0" oninput="calcAP()"></label>
        <label><span id="lbl-mc-total"></span><input type="number" id="mc-total" value="45" min="1" oninput="calcAP()"></label>
      </div>
    </div>
    <div class="ap-section">
      <h3 id="sec-frq"></h3>
      <div class="ap-inputs">
        <label><span id="lbl-frq-1"></span><input type="number" id="frq-1" value="0" min="0" max="10" step="0.5" oninput="calcAP()"></label>
        <label><span id="lbl-frq-2"></span><input type="number" id="frq-2" value="0" min="0" max="10" step="0.5" oninput="calcAP()"></label>
        <label><span id="lbl-frq-3"></span><input type="number" id="frq-3" value="0" min="0" max="10" step="0.5" oninput="calcAP()"></label>
      </div>
    </div>
    <div class="ap-result">
      <div class="ap-score-big" id="ap-score">1</div>
      <div class="ap-score-label" id="score-label"></div>
    </div>
    <div class="ap-detail" id="detail"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>

<script>
GZI18n.register({
  en: {
    toolTitle: 'AP Score Calculator',
    toolDesc: 'Estimate your AP exam score (1-5) for AP Calculus, Biology, Chemistry, US History, Statistics and more. Enter your correct answers to get a projected score — no signup required.',
    subject: 'AP Subject',
    secMC: 'Multiple Choice Section',
    secFRQ: 'Free Response (FRQ) — out of 10 points each',
    mcCorrect: 'Correct Answers',
    mcTotal: 'Total Questions',
    frq1: 'FRQ 1 Score',
    frq2: 'FRQ 2 Score',
    frq3: 'FRQ 3 Score',
    step1: 'Select your AP subject from the dropdown',
    step2: 'Enter your correct multiple-choice answers',
    step3: 'Enter your estimated FRQ scores (0-10 each)',
    step4: 'See your projected AP score from 1 to 5',
    score1: 'Score 1 — No recommendation',
    score2: 'Score 2 — Possibly qualified',
    score3: 'Score 3 — Qualified (passing)',
    score4: 'Score 4 — Well qualified',
    score5: 'Score 5 — Extremely well qualified',
    detailAbout: 'Based on your inputs, you answered <span>{mcCorrect}</span> of <span>{mcTotal}</span> multiple-choice questions correctly and scored <span>{frqTotal}</span>/30 on FRQs. Your composite percentage is <span>{pct}%</span>, projecting an AP score of <span>{score}</span>.',
  },
  zh: {
    toolTitle: 'AP 分数计算器',
    toolDesc: '估算你的 AP 考试分数（1-5），支持 AP 微积分、生物、化学、美国历史、统计等。输入正确答题数，获取预测分数 — 无需注册。',
    subject: 'AP 科目',
    secMC: '选择题部分',
    secFRQ: '简答题（FRQ）— 每题满分 10 分',
    mcCorrect: '正确题数',
    mcTotal: '总题数',
    frq1: 'FRQ 1 分数',
    frq2: 'FRQ 2 分数',
    frq3: 'FRQ 3 分数',
    step1: '从下拉菜单选择你的 AP 科目',
    step2: '输入选择题的正确答题数',
    step3: '输入估算的 FRQ 分数（每题 0-10 分）',
    step4: '查看你 1-5 的预测 AP 分数',
    score1: '1 分 — 不推荐',
    score2: '2 分 — 可能合格',
    score3: '3 分 — 合格（通过）',
    score4: '4 分 — 良好合格',
    score5: '5 分 — 极度合格',
    detailAbout: '根据你的输入，选择题答对 <span>{mcCorrect}</span> / <span>{mcTotal}</span> 题，FRQ 得分 <span>{frqTotal}</span>/30。综合百分比为 <span>{pct}%</span>，预测 AP 分数为 <span>{score}</span> 分。',
  }
});

const { $, t } = GZ;

// Subject configs: { mcTotal, mcWeight, frqWeight, thresholds: [score2%, score3%, score4%, score5%] }
const SUBJECTS = {
  calcab:       { mcTotal: 45, mcWeight: 0.5,  frqWeight: 0.5,  th: [0.30, 0.42, 0.58, 0.70] },
  calcbc:       { mcTotal: 45, mcWeight: 0.5,  frqWeight: 0.5,  th: [0.35, 0.48, 0.60, 0.72] },
  bio:          { mcTotal: 60, mcWeight: 0.5,  frqWeight: 0.5,  th: [0.30, 0.42, 0.55, 0.68] },
  chem:         { mcTotal: 60, mcWeight: 0.5,  frqWeight: 0.5,  th: [0.30, 0.42, 0.55, 0.68] },
  physics:      { mcTotal: 50, mcWeight: 0.5,  frqWeight: 0.5,  th: [0.28, 0.40, 0.52, 0.65] },
  ushistory:    { mcTotal: 55, mcWeight: 0.4,  frqWeight: 0.6,  th: [0.30, 0.42, 0.55, 0.68] },
  worldhistory: { mcTotal: 55, mcWeight: 0.4,  frqWeight: 0.6,  th: [0.30, 0.42, 0.55, 0.68] },
  stats:        { mcTotal: 40, mcWeight: 0.5,  frqWeight: 0.5,  th: [0.30, 0.42, 0.55, 0.68] },
  psych:        { mcTotal: 100, mcWeight: 0.667, frqWeight: 0.333, th: [0.32, 0.45, 0.58, 0.70] },
  csp:          { mcTotal: 70, mcWeight: 0.7,  frqWeight: 0.3,  th: [0.35, 0.48, 0.60, 0.72] },
  csa:          { mcTotal: 40, mcWeight: 0.5,  frqWeight: 0.5,  th: [0.32, 0.45, 0.58, 0.70] },
  lang:         { mcTotal: 45, mcWeight: 0.45, frqWeight: 0.55, th: [0.30, 0.42, 0.55, 0.68] },
  lit:          { mcTotal: 55, mcWeight: 0.45, frqWeight: 0.55, th: [0.30, 0.42, 0.55, 0.68] },
};

function loadSubject() {
  const subj = SUBJECTS[$('#subject').value];
  $('#mc-total').value = subj.mcTotal;
  calcAP();
}

function calcAP() {
  const key = $('#subject').value;
  const subj = SUBJECTS[key];
  const mcCorrect = Math.max(0, parseInt($('#mc-correct').value) || 0);
  const mcTotal = Math.max(1, parseInt($('#mc-total').value) || subj.mcTotal);
  const frq1 = Math.max(0, Math.min(10, parseFloat($('#frq-1').value) || 0));
  const frq2 = Math.max(0, Math.min(10, parseFloat($('#frq-2').value) || 0));
  const frq3 = Math.max(0, Math.min(10, parseFloat($('#frq-3').value) || 0));
  const frqTotal = frq1 + frq2 + frq3;

  const mcPct = mcCorrect / mcTotal;
  const frqPct = frqTotal / 30;
  const composite = mcPct * subj.mcWeight + frqPct * subj.frqWeight;

  let score = 1;
  if (composite >= subj.th[3]) score = 5;
  else if (composite >= subj.th[2]) score = 4;
  else if (composite >= subj.th[1]) score = 3;
  else if (composite >= subj.th[0]) score = 2;

  $('#ap-score').textContent = score;
  $('#score-label').textContent = t('score' + score);

  $('#detail').innerHTML = t('detailAbout')
    .replace('{mcCorrect}', mcCorrect)
    .replace('{mcTotal}', mcTotal)
    .replace('{frqTotal}', frqTotal.toFixed(1))
    .replace('{pct}', Math.round(composite * 100))
    .replace('{score}', score);
}

$('#lbl-subject').textContent = t('subject');
$('#sec-mc').textContent = t('secMC');
$('#sec-frq').textContent = t('secFRQ');
$('#lbl-mc-correct').textContent = t('mcCorrect');
$('#lbl-mc-total').textContent = t('mcTotal');
$('#lbl-frq-1').textContent = t('frq1');
$('#lbl-frq-2').textContent = t('frq2');
$('#lbl-frq-3').textContent = t('frq3');
calcAP();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🎓', href:'/calc/sat-score-calculator.html', name:'SAT Score Calculator'},
    {icon:'📊', href:'/calc/gpa-calculator.html', name:'GPA Calculator'},
    {icon:'📐', href:'/calc/grade-calculator.html', name:'Grade Calculator'},
    {icon:'📅', href:'/calc/date-calculator.html', name:'Date Calculator'},
  ]
});
</script>

</body>
