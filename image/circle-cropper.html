<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "How do I crop an image into a circle?", "acceptedAnswer": {"@type": "Answer", "text": "Upload your image, choose the 'Circle' shape, then click Download. The tool creates a perfectly round crop of the image with transparent areas outside the circle. You can also add a colored background, padding, or a thin border."}}, {"@type": "Question", "name": "What's the difference between circle, rounded square and oval?", "acceptedAnswer": {"@type": "Answer", "text": "A circle is a perfect round crop. A rounded square is a square with curved corners — you can adjust the corner radius from 0% (sharp) to 50% (full circle). An oval is an ellipse with adjustable width and height ratio."}}, {"@type": "Question", "name": "Will the cropped area be sharp?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. The cropping uses HTML5 Canvas with anti-aliasing enabled, so the edge of the circle is smooth and pixel-perfect. The result is a high-quality PNG that looks sharp at any size."}}, {"@type": "Question", "name": "Can I use this for profile pictures?", "acceptedAnswer": {"@type": "Answer", "text": "Yes — circle cropping is the standard shape for profile pictures on social media, including Instagram, X (Twitter), LinkedIn, Facebook, GitHub and Discord. Upload your photo, click Circle, then download the result and upload to your platform."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">

  <div class="gz-tool-area">

        <label id="lbl-file"></label>
        <input type="file" id="file" accept="image/*">
      </div>
    </div>
    <div class="ic-shapes" id="shapeRow"></div>
    <div class="ic-controls" id="optControls">
      <div>
        <label id="lbl-radius"></label>
        <input type="range" id="radius" min="0" max="50" value="50">
      </div>
      <div>
        <label id="lbl-padding"></label>
        <input type="range" id="padding" min="0" max="50" value="0">
      </div>
      <div>
        <label id="lbl-bg"></label>
        <select id="bgType">
          <option value="transparent">Transparent</option>
          <option value="white">White</option>
          <option value="black">Black</option>
          <option value="color">Custom color</option>
        </select>
      </div>
      <div>

        <input type="color" id="bgColor" value="#4ecdc4">
      </div>
      <div>

      </div>

        <div class="ic-info" id="srcInfo"></div>
      </div>
      <div class="ic-pane">
        <h3 id="lbl-result"></h3>

        <div class="ic-info" id="dstInfo"></div>
      </div>

<script>
GZI18n.register({
  en: {
    toolTitle: 'Image Circle Cropper',
    toolDesc: 'Crop any image into a perfect circle, rounded square or oval. Customize radius, padding, background, and border. Free and runs in your browser.',
    circle: '⭕ Circle', rounded: '▢ Rounded', oval: '⬭ Oval',
    lblRadius: 'Corner radius %', lblPadding: 'Padding %', lblBg: 'Background', lblBgColor: 'BG color', lblBorder: 'Border (px)', lblBorderColor: 'Border color', lblSize: 'Output size (px)',
    lblFile: 'Choose image', lblOriginal: '📥 Original', lblResult: '✨ Cropped Result',
    upload: '📤 Upload Image', sample: '🎨 Try Sample', download: '💾 Download PNG', reset: '🔄 Reset',
    step1: 'Upload any image — JPG, PNG, WebP or GIF',
    step2: 'Choose a shape: circle, rounded square or oval',
    step3: 'Adjust radius, padding, background, and border',
    step4: 'Download the result as a transparent PNG',
    ready: 'Upload an image to start',
  },
  zh: {
    toolTitle: '图片圆形裁剪工具',
    toolDesc: '将任意图片裁剪为完美的圆形、圆角矩形或椭圆。可自定义半径、内边距、背景和边框。',
    circle: '⭕ 圆形', rounded: '▢ 圆角矩形', oval: '⬭ 椭圆',
    lblRadius: '圆角半径 %', lblPadding: '内边距 %', lblBg: '背景', lblBgColor: '背景色', lblBorder: '边框 (px)', lblBorderColor: '边框颜色', lblSize: '输出尺寸 (px)',
    lblFile: '选择图片', lblOriginal: '📥 原图', lblResult: '✨ 裁剪结果',
    upload: '📤 上传图片', sample: '🎨 示例图片', download: '💾 下载 PNG', reset: '🔄 重置',
    step1: '上传任意图片 — JPG、PNG、WebP 或 GIF',
    step2: '选择形状：圆形、圆角矩形或椭圆',
    step3: '调整半径、内边距、背景和边框',
    step4: '将结果下载为透明 PNG',
    ready: '请上传图片开始',
  }
});

const { $, t } = GZ;
let srcImg = null;
let shape = 'circle';

function buildShapeUI() {
  $('#shapeRow').innerHTML = [
    { id: 'circle', key: 'circle' },
    { id: 'rounded', key: 'rounded' },
    { id: 'oval', key: 'oval' },
  ].map(s => `<button class="gz-btn ${shape===s.id?'':'gz-btn-secondary'} ${shape===s.id?'active':''}" onclick="setShape('${s.id}')">${t(s.key)}</button>`).join('');
}

function setShape(s) {
  shape = s;
  buildShapeUI();
  process();
}

function process() {
  if (!srcImg) return;
  const src = $('#srcCanvas');
  const dst = $('#dstCanvas');
  const w = srcImg.naturalWidth, h = srcImg.naturalHeight;
  const size = +$('#outSize').value || 512;
  const padding = +$('#padding').value;
  const radius = +$('#radius').value;
  const outSize = size;
  src.width = w; src.height = h;
  const sCtx = src.getContext('2d');
  sCtx.clearRect(0, 0, w, h);
  sCtx.drawImage(srcImg, 0, 0);
  $('#srcInfo').textContent = `${w}×${h} px`;

  // Output canvas
  dst.width = outSize; dst.height = outSize;
  const dCtx = dst.getContext('2d');
  dCtx.clearRect(0, 0, outSize, outSize);

  // Background
  const bgType = $('#bgType').value;
  if (bgType === 'transparent') {
    dst.classList.add('transparent');
  } else {
    dst.classList.remove('transparent');
    dst.classList.add('circle');
    if (bgType === 'white') dCtx.fillStyle = '#ffffff';
    else if (bgType === 'black') dCtx.fillStyle = '#000000';
    else if (bgType === 'color') dCtx.fillStyle = $('#bgColor').value;
    dCtx.fillRect(0, 0, outSize, outSize);
  }

  // Compute source rectangle
  const srcSide = Math.min(w, h);
  const padPx = (padding / 100) * srcSide;
  const sx = (w - srcSide) / 2 + padPx * (w / srcSide);
  const sy = (h - srcSide) / 2 + padPx * (h / srcSide);
  const sw = srcSide - 2 * padPx;
  const sh = srcSide - 2 * padPx;

  // Clip path
  dCtx.save();
  dCtx.beginPath();
  if (shape === 'circle') {
    dCtx.arc(outSize/2, outSize/2, outSize/2, 0, Math.PI*2);
  } else if (shape === 'oval') {
    dCtx.ellipse(outSize/2, outSize/2, outSize/2, outSize/2 * 0.75, 0, 0, Math.PI*2);
  } else if (shape === 'rounded') {
    const r = (radius / 100) * (outSize / 2);
    dCtx.moveTo(r, 0);
    dCtx.lineTo(outSize - r, 0);
    dCtx.quadraticCurveTo(outSize, 0, outSize, r);
    dCtx.lineTo(outSize, outSize - r);
    dCtx.quadraticCurveTo(outSize, outSize, outSize - r, outSize);
    dCtx.lineTo(r, outSize);
    dCtx.quadraticCurveTo(0, outSize, 0, outSize - r);
    dCtx.lineTo(0, r);
    dCtx.quadraticCurveTo(0, 0, r, 0);
    dCtx.closePath();
  }
  dCtx.clip();
  dCtx.drawImage(srcImg, sx, sy, sw, sh, 0, 0, outSize, outSize);
  dCtx.restore();

  // Border
  const bw = +$('#borderWidth').value;
  if (bw > 0) {
    dCtx.save();
    dCtx.strokeStyle = $('#borderColor').value;
    dCtx.lineWidth = bw * 2; // outer + inner
    dCtx.beginPath();
    if (shape === 'circle') {
      dCtx.arc(outSize/2, outSize/2, outSize/2 - bw/2, 0, Math.PI*2);
    } else if (shape === 'oval') {
      dCtx.ellipse(outSize/2, outSize/2, outSize/2 - bw/2, outSize/2 * 0.75 - bw/2, 0, 0, Math.PI*2);
    } else {
      const r = (radius / 100) * (outSize / 2);
      const m = bw/2;
      dCtx.moveTo(r, m);
      dCtx.lineTo(outSize - r, m);
      dCtx.quadraticCurveTo(outSize - m, m, outSize - m, r);
      dCtx.lineTo(outSize - m, outSize - r);
      dCtx.quadraticCurveTo(outSize - m, outSize - m, outSize - r, outSize - m);
      dCtx.lineTo(r, outSize - m);
      dCtx.quadraticCurveTo(m, outSize - m, m, outSize - r);
      dCtx.lineTo(m, r);
      dCtx.quadraticCurveTo(m, m, r, m);
      dCtx.closePath();
    }
    dCtx.stroke();
    dCtx.restore();
  }

  $('#dstInfo').textContent = `${outSize}×${outSize} px`;
}

function loadImage(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      srcImg = img;
      process();
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function loadSample() {
  // Build a colorful sample image
  const c = document.createElement('canvas');
  c.width = 600; c.height = 600;
  const ctx = c.getContext('2d');
  const grad = ctx.createLinearGradient(0, 0, 600, 600);
  grad.addColorStop(0, '#ff6b6b');
  grad.addColorStop(0.5, '#ffd93d');
  grad.addColorStop(1, '#4ecdc4');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, 600, 600);
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.font = 'bold 200px sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('GZ', 300, 300);
  const url = c.toDataURL('image/png');
  const img = new Image();
  img.onload = () => { srcImg = img; process(); };
  img.src = url;
}

function downloadResult() {
  const c = $('#dstCanvas');
  if (!c.width) return;
  c.toBlob(blob => {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'circle-crop.png';
    a.click();
    setTimeout(() => URL.revokeObjectURL(a.href), 1000);
  }, 'image/png');
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="$('#file').click()">${t('upload')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadSample()">${t('sample')}</button>
  <button class="gz-btn" onclick="downloadResult()">${t('download')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="srcImg=null;$('#srcCanvas').getContext('2d').clearRect(0,0,9999,9999);$('#dstCanvas').getContext('2d').clearRect(0,0,9999,9999);$('#srcInfo').textContent='';$('#dstInfo').textContent=''">${t('reset')}</button>`;

$('#file').addEventListener('change', e => loadImage(e.target.files[0]));
['radius','padding','bgType','bgColor','borderWidth','borderColor','outSize'].forEach(id => {
  $('#' + id).addEventListener('input', process);
  $('#' + id).addEventListener('change', process);
});

buildShapeUI();

GZ.renderToolPage({
  category: 'image',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'✂️', href:'/image/cropper.html', name:'Image Cropper'},
    {icon:'📐', href:'/image/resizer.html', name:'Image Resizer'},
    {icon:'🔄', href:'/image/image-rotate-flip.html', name:'Image Rotate/Flip'},
    {icon:'🟣', href:'/image/background-remover.html', name:'Background Remover'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
