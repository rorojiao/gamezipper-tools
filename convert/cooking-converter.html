<script>
GZI18n.register({
  en: {
    toolTitle: 'Cooking Measurement Converter',
    toolDesc: 'Convert cooking measurements — cups, tablespoons, teaspoons, fluid ounces, milliliters, liters, grams, ounces, pounds, Fahrenheit and Celsius. Includes common ingredient weight conversion.',
    catVolume: 'Volume',
    catWeight: 'Weight',
    catTemp: 'Temperature',

    cupUS: 'Cup (US)',
    cupUK: 'Cup (UK)',
    tbspUS: 'Tablespoon (US)',
    tspUS: 'Teaspoon (US)',
    flOzUS: 'Fluid Ounce (US)',
    pintUS: 'Pint (US)',
    quartUS: 'Quart (US)',
    gallonUS: 'Gallon (US)',
    ml: 'Milliliter',
    l: 'Liter',
    dl: 'Deciliter',
    g: 'Gram',
    kg: 'Kilogram',
    oz: 'Ounce (weight)',
    lb: 'Pound',
    f: 'Fahrenheit',
    c: 'Celsius',
    k: 'Kelvin',
    step1: 'Choose a category: Volume, Weight, Temperature or Ingredients',
    step2: 'Enter a value and select the source unit',
    step3: 'Pick the target unit to see the conversion',
    step4: 'Click any ingredient card for instant gram/cup conversion',
  },
  zh: {
    toolTitle: '烹饪度量单位转换器',
    toolDesc: '烹饪单位互转 — 杯、汤匙、茶匙、液量盎司、毫升、升、克、盎司、磅、华氏度和摄氏度。含常见食材重量转换。',
    catVolume: '体积',
    catWeight: '重量',
    catTemp: '温度',
    catIng: '食材',
    cupUS: '杯 (美制)',
    cupUK: '杯 (英制)',
    tbspUS: '汤匙 (美制)',
    tspUS: '茶匙 (美制)',
    flOzUS: '液量盎司 (美制)',
    pintUS: '品脱 (美制)',
    quartUS: '夸脱 (美制)',
    gallonUS: '加仑 (美制)',
    ml: '毫升',
    l: '升',
    dl: '分升',
    g: '克',
    kg: '千克',
    oz: '盎司 (重量)',
    lb: '磅',
    f: '华氏度',
    c: '摄氏度',
    k: '开尔文',
    step1: '选择类别：体积、重量、温度或食材',
    step2: '输入数值并选择源单位',
    step3: '选择目标单位查看转换结果',
    step4: '点击任意食材卡片可即时显示克/杯转换',
  }
});

const { $, t } = GZ;

// All conversions to a base unit (ml for volume, g for weight, K for temperature)
const UNITS = {
  volume: {
    'cupUS': { name: 'cupUS', factor: 236.588 },
    'cupUK': { name: 'cupUK', factor: 284.131 },
    'tbspUS': { name: 'tbspUS', factor: 14.787 },
    'tspUS': { name: 'tspUS', factor: 4.929 },
    'flOzUS': { name: 'flOzUS', factor: 29.574 },
    'pintUS': { name: 'pintUS', factor: 473.176 },
    'quartUS': { name: 'quartUS', factor: 946.353 },
    'gallonUS': { name: 'gallonUS', factor: 3785.41 },
    'ml': { name: 'ml', factor: 1 },
    'l': { name: 'l', factor: 1000 },
    'dl': { name: 'dl', factor: 100 }
  },
  weight: {
    'g': { name: 'g', factor: 1 },
    'kg': { name: 'kg', factor: 1000 },
    'oz': { name: 'oz', factor: 28.3495 },
    'lb': { name: 'lb', factor: 453.592 }
  },
  temp: {
    'c': { name: 'c' },
    'f': { name: 'f' },
    'k': { name: 'k' }
  }
};

let currentCat = 'volume';

const INGREDIENTS = [
  { name: 'All-Purpose Flour', perCupG: 125, emoji: '🌾' },
  { name: 'Bread Flour', perCupG: 130, emoji: '🍞' },
  { name: 'Cake Flour', perCupG: 115, emoji: '🥧' },
  { name: 'Whole Wheat Flour', perCupG: 130, emoji: '🌾' },
  { name: 'Granulated Sugar', perCupG: 200, emoji: '🍬' },
  { name: 'Brown Sugar (packed)', perCupG: 220, emoji: '🍯' },
  { name: 'Powdered Sugar', perCupG: 120, emoji: '☁️' },
  { name: 'Honey', perCupG: 340, emoji: '🍯' },
  { name: 'Maple Syrup', perCupG: 322, emoji: '🍁' },
  { name: 'Butter', perCupG: 227, emoji: '🧈' },
  { name: 'Water', perCupG: 240, emoji: '💧' },
  { name: 'Milk (whole)', perCupG: 240, emoji: '🥛' },
  { name: 'Heavy Cream', perCupG: 240, emoji: '🥛' },
  { name: 'Yogurt', perCupG: 245, emoji: '🥄' },
  { name: 'Olive Oil', perCupG: 216, emoji: '🫒' },
  { name: 'Vegetable Oil', perCupG: 218, emoji: '🛢️' },
  { name: 'Cocoa Powder', perCupG: 75, emoji: '🍫' },
  { name: 'Rolled Oats', perCupG: 90, emoji: '🥣' },
  { name: 'Rice (uncooked)', perCupG: 185, emoji: '🍚' },
  { name: 'Quinoa (uncooked)', perCupG: 170, emoji: '🌾' },
  { name: 'Pasta (dry)', perCupG: 100, emoji: '🍝' },
  { name: 'Salt (table)', perCupG: 292, emoji: '🧂' },
  { name: 'Baking Soda', perCupG: 220, emoji: '🧪' },
  { name: 'Baking Powder', perCupG: 230, emoji: '🥄' },
  { name: 'Yeast (dry)', perCupG: 96, emoji: '🍞' },
  { name: 'Cinnamon (ground)', perCupG: 124, emoji: '🌶️' },
  { name: 'Vanilla Extract', perCupG: 208, emoji: '🌿' },
  { name: 'Almonds (whole)', perCupG: 143, emoji: '🌰' },
  { name: 'Chocolate Chips', perCupG: 170, emoji: '🍫' },
  { name: 'Raisins', perCupG: 165, emoji: '🍇' }
];

function convertTemp(val, from, to) {
  let celsius;
  if (from === 'c') celsius = val;
  else if (from === 'f') celsius = (val - 32) * 5/9;
  else if (from === 'k') celsius = val - 273.15;
  if (to === 'c') return celsius;
  if (to === 'f') return celsius * 9/5 + 32;
  if (to === 'k') return celsius + 273.15;
}

function convert() {
  const amt = +$('#amount').value || 0;
  const fromU = $('#fromUnit').value;
  const toU = $('#toUnit').value;
  let result;
  if (currentCat === 'temp') {
    result = convertTemp(amt, fromU, toU);
  } else {
    const units = UNITS[currentCat];
    const fromFactor = units[fromU].factor;
    const toFactor = units[toU].factor;
    result = amt * fromFactor / toFactor;
  }
  $('#result').value = (typeof result === 'number' ? result.toFixed(4).replace(/\.?0+$/, '') : result);

  // Build "all conversions" list
  const units = UNITS[currentCat];
  let html = `<h3>📋 All Conversions from ${amt} ${units[fromU] ? t(units[fromU].name) : t(fromU)}</h3>`;
  Object.entries(units).forEach(([key, unit]) => {
    if (key === fromU) return;
    let val;
    if (currentCat === 'temp') {
      val = convertTemp(amt, fromU, key);
    } else {
      val = amt * units[fromU].factor / unit.factor;
    }
    const display = (typeof val === 'number' ? (val < 0.01 ? val.toFixed(6) : val < 1 ? val.toFixed(4) : val.toFixed(3).replace(/\.?0+$/, '')) : val);
    html += `<div class="result-item"><div class="name">${t(unit.name)}</div><div class="val">${display}</div></div>`;
  });
  $('#resultList').innerHTML = html;
}

function buildTabs() {
  const cats = [
    { id: 'volume', label: t('catVolume') },
    { id: 'weight', label: t('catWeight') },
    { id: 'temp', label: t('catTemp') }
  ];
  const html = cats.map(c => `<button class="${c.id === currentCat ? 'active' : ''}" data-cat="${c.id}">${c.label}</button>`).join('') +
    `<button data-cat="ing">🧺 ${t('catIng')}</button>`;
  $('#catTabs').innerHTML = html;
  document.querySelectorAll('#catTabs button').forEach(btn => {
    btn.addEventListener('click', () => {
      currentCat = btn.dataset.cat;
      buildTabs();
      if (currentCat === 'ing') {
        showIngredients();
      } else {
        buildUnitSelects();
        convert();
      }
    });
  });
}

function buildUnitSelects() {
  const units = UNITS[currentCat];
  const keys = Object.keys(units);
  const fromVal = $('#fromUnit').value || keys[0];
  const toVal = $('#toUnit').value || keys[1] || keys[0];
  const opts = keys.map(k => `<option value="${k}">${t(units[k].name)}</option>`).join('');
  $('#fromUnit').innerHTML = opts;
  $('#toUnit').innerHTML = opts;
  $('#fromUnit').value = keys.includes(fromVal) ? fromVal : keys[0];
  $('#toUnit').value = keys.includes(toVal) ? toVal : (keys[1] || keys[0]);
  // Show normal UI
  $('.conv-row').style.display = '';
  $('#resultList').style.display = '';
}

function showIngredients() {
  $('.conv-row').style.display = 'none';
  $('#resultList').style.display = 'none';
  let html = `<h3 style="margin:0 0 12px">🧺 ${t('catIng')} — Cup → Grams</h3>`;
  html += `<div class="ingredient-grid">${INGREDIENTS.map(ing => `
    <div class="ing-card" onclick="alert('${ing.emoji} ${ing.name}\\n\\n1 US cup = ${ing.perCupG} g\\n\\n1 tablespoon ≈ ${(ing.perCupG/16).toFixed(1)} g\\n1 teaspoon ≈ ${(ing.perCupG/48).toFixed(1)} g\\n100 g = ${(100/ing.perCupG).toFixed(3)} cups\\n\\nQuick convert: 1 cup of ${ing.name.toLowerCase()} weighs ${ing.perCupG} g.')">
      <div class="ing-name">${ing.emoji} ${ing.name}</div>
      <div class="ing-convert">1 cup = ${ing.perCupG} g</div>
    </div>
  `).join('')}</div>`;
  $('#resultList').innerHTML = html;
  $('#resultList').style.display = '';
}

function reset() {
  $('#amount').value = 1;
  convert();
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="convert()">Convert</button>
  <button class="gz-btn gz-btn-secondary" onclick="reset()">Reset</button>`;

buildTabs();
buildUnitSelects();
convert();

GZ.renderToolPage({
  category: 'convert',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📏', href:'/convert/unit.html', name:'Unit Converter'},
    {icon:'🌡️', href:'/convert/data-size.html', name:'Data Size'},
    {icon:'💱', href:'/convert/currency-converter.html', name:'Currency'},
    {icon:'⏰', href:'/convert/timezone.html', name:'Time Zone'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
