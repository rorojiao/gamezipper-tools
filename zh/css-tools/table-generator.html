<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-settings" id="settings"></div>
    <div class="gz-toolbar" id="toolbar"></div>
    <div id="preview"></div>
    <div id="code-output">
      <textarea id="code" readonly spellcheck="false"></textarea>
    </div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>

</div>
<script>
GZI18n.register({
  en:{
    toolTitle:'HTML Table Generator',
    toolDesc:'Create HTML tables with custom rows, columns, styles and CSS. Edit cells live, preview and copy the code.',
    rows:'Rows',
    cols:'Columns',
    header:'Header Row',
    borderW:'Border Width',
    borderC:'Border Color',
    headerBg:'Header BG',
    padding:'Cell Padding',
    align:'Text Align',
    alignLeft:'Left',
    alignCenter:'Center',
    alignRight:'Right',
    inlineCSS:'Inline CSS',
    generate:'Generate',
    step1:'Set the number of rows and columns',
    step2:'Configure border, padding and style options',
    step3:'Click on cells in the preview to edit content',
    step4:'Copy the generated HTML code to your project',
  },
  zh:{
    toolTitle:'HTML 表格生成器',
    toolDesc:'创建自定义行数、列数、样式和 CSS 的 HTML 表格。实时编辑单元格，预览并复制代码。',
    rows:'行数',
    cols:'列数',
    header:'表头行',
    borderW:'边框宽度',
    borderC:'边框颜色',
    headerBg:'表头背景',
    padding:'单元格间距',
    align:'对齐方式',
    alignLeft:'左对齐',
    alignCenter:'居中',
    alignRight:'右对齐',
    inlineCSS:'内联 CSS',
    generate:'生成',
    step1:'设置行数和列数',
    step2:'配置边框、间距和样式选项',
    step3:'点击预览中的单元格编辑内容',
    step4:'复制生成的 HTML 代码到项目中',
  }
});

const { $, copyText, t } = GZ;

let cells = [];
function initCells(r, c) {
  const newCells = [];
  for (let i = 0; i < r; i++) {
    newCells[i] = [];
    for (let j = 0; j < c; j++) {
      newCells[i][j] = (cells[i] && cells[i][j]) ? cells[i][j] : '';
    }
  }
  cells = newCells;
}

$('#settings').innerHTML = `
  <div class="gz-field"><label>${t('rows')}</label><input type="number" id="s-rows" value="3" min="1" max="50"></div>
  <div class="gz-field"><label>${t('cols')}</label><input type="number" id="s-cols" value="3" min="1" max="20"></div>
  <div class="gz-field">
    <label>${t('header')}</label>
    <div class="gz-check"><input type="checkbox" id="s-header" checked></div>
  </div>
  <div class="gz-field"><label>${t('borderW')}</label><input type="number" id="s-border-w" value="1" min="0" max="10"> </div>
  <div class="gz-field"><label>${t('borderC')}</label><input type="color" id="s-border-c" value="#cccccc"></div>
  <div class="gz-field"><label>${t('headerBg')}</label><input type="color" id="s-header-bg" value="#f0f0f0"></div>
  <div class="gz-field"><label>${t('padding')}</label><input type="number" id="s-padding" value="8" min="0" max="40"></div>
  <div class="gz-field">
    <label>${t('align')}</label>
    <select id="s-align">
      <option value="left">${t('alignLeft')}</option>
      <option value="center">${t('alignCenter')}</option>
      <option value="right">${t('alignRight')}</option>
    </select>
  </div>
  <div class="gz-field">
    <label>${t('inlineCSS')}</label>
    <div class="gz-check"><input type="checkbox" id="s-inline" checked></div>
  </div>`;

function getSettings() {
  return {
    rows: parseInt($('#s-rows').value) || 3,
    cols: parseInt($('#s-cols').value) || 3,
    header: $('#s-header').checked,
    borderW: parseInt($('#s-border-w').value) || 1,
    borderC: $('#s-border-c').value,
    headerBg: $('#s-header-bg').value,
    padding: parseInt($('#s-padding').value) || 8,
    align: $('#s-align').value,
    inline: $('#s-inline').checked,
  };
}

function generate() {
  const s = getSettings();
  initCells(s.rows, s.cols);

  // Preview
  let html = '<table>';
  const startRow = s.header ? 0 : 0;
  for (let i = 0; i < s.rows; i++) {
    html += '<tr>';
    for (let j = 0; j < s.cols; j++) {
      const tag = (s.header && i === 0) ? 'th' : 'td';
      const style = s.inline ? ` style="border:${s.borderW}px solid ${s.borderC};padding:${s.padding}px;text-align:${s.align}${(s.header && i===0)?';background:'+s.headerBg:''}"` : '';
      const val = cells[i][j] || ((s.header && i===0) ? `Header ${j+1}` : `Cell ${i+1}-${j+1}`);
      html += `<${tag}${style} class="gz-edit-cell" contenteditable="true" data-r="${i}" data-c="${j}">${val}</${tag}>`;
    }
    html += '</tr>';
  }
  html += '</table>';
  $('#preview').innerHTML = html;

  // Add editable listeners
  document.querySelectorAll('.gz-edit-cell').forEach(el => {
    el.addEventListener('blur', function() {
      const r = parseInt(this.dataset.r);
      const c = parseInt(this.dataset.c);
      cells[r][c] = this.textContent;
      generateCode();
    });
  });

  generateCode();
}

function generateCode() {
  const s = getSettings();
  let code = '';
  if (!s.inline) {
    code += `<style>\ntable { border-collapse: collapse; }\n`;
    code += `th, td { border: ${s.borderW}px solid ${s.borderC}; padding: ${s.padding}px; text-align: ${s.align}; }\n`;
    if (s.header) code += `th { background: ${s.headerBg}; }\n`;
    code += `</style>\n\n`;
  }

  code += '<table';
  if (!s.inline) code += '>';
  else {
    code += ` style="border-collapse:collapse">`;
  }

  for (let i = 0; i < s.rows; i++) {
    code += '\n  <tr>';
    for (let j = 0; j < s.cols; j++) {
      const tag = (s.header && i === 0) ? 'th' : 'td';
      const val = cells[i][j] || ((s.header && i===0) ? `Header ${j+1}` : `Cell ${i+1}-${j+1}`);
      if (s.inline) {
        let style = `border:${s.borderW}px solid ${s.borderC};padding:${s.padding}px;text-align:${s.align}`;
        if (s.header && i===0) style += `;background:${s.headerBg}`;
        code += `\n    <${tag} style="${style}">${val}</${tag}>`;
      } else {
        code += `\n    <${tag}>${val}</${tag}>`;
      }
    }
    code += '\n  </tr>';
  }
  code += '\n</table>';

  $('#code').value = code;
}

// Auto-regenerate on settings change
['s-rows','s-cols','s-header','s-border-w','s-border-c','s-header-bg','s-padding','s-align','s-inline'].forEach(id => {
  const el = $('#'+id);
  el.addEventListener('change', generate);
  el.addEventListener('input', generate);
});

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="generate()">${t('generate')}</button>
  <button class="gz-btn" onclick="copyText($('#code').value)">${t('copy')}</button>`;

generate();

GZ.renderToolPage({
  category: 'css',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🌈', href:'/css-tools/gradient.html', name:'CSS Gradient'},
    {icon:'🔲', href:'/css-tools/shadow.html', name:'Box Shadow'},
    {icon:'📐', href:'/css-tools/flexbox.html', name:'Flexbox'},
    {icon:'📦', href:'/css-tools/minify.html', name:'CSS Minifier'},
  ]
});
</script>
<script src="/tools-result-rec.js?v=20260707v520" defer></script>
</body>
