    toolDesc: '即时将 INI 配置文件转换为 JSON。支持段落、键值对、注释、引号和自动类型推断。',
    inputLabel: 'INI 输入',

    copy: '复制 JSON',
    clear: '清空',
    example: '示例',
    valid: '✓ 转换成功',
    step1: '在输入区粘贴 INI 内容',
    step2: 'JSON 输出会实时自动生成',
    step3: '切换「自动类型推断」控制数字/布尔值检测',
    step4: '点击「复制 JSON」将结果复制到剪贴板',

let autoType = true;
const { $, copyText, t } = GZ;

function syntaxHighlight(json) {
  return json.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/("(\\u[\da-fA-F]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(\.\d+)?([eE][+-]?\d+)?)/g, m => {
      let c = 'json-number';
      if (/^"/.test(m)) c = /:$/.test(m) ? 'json-key' : 'json-string';
      else if (/true|false/.test(m)) c = 'json-bool';
      else if (/null/.test(m)) c = 'json-null';
      return `<span class="${c}">${m}</span>`;
    });
}

function parseINI(text) {
  const result = {};
  let currentSection = result;
  const lines = text.split(/\r?\n/);
  for (let raw of lines) {
    let line = raw.trim();
    if (!line) continue;
    if (line.startsWith(';') || line.startsWith('#')) continue;
    // Section header
    const secMatch = line.match(/^\[(.+)\]$/);
    if (secMatch) {
      const secName = secMatch[1].trim();
      if (!result[secName]) result[secName] = {};
      currentSection = result[secName];
      continue;
    }
    // Key-value
    const eqIdx = line.indexOf('=');
    if (eqIdx === -1) continue;
    const key = line.substring(0, eqIdx).trim();
    let value = line.substring(eqIdx + 1).trim();
    // Strip inline comments ( ; or # after a space, but not inside quotes )
    if (value.startsWith('"') && value.endsWith('"') && value.length >= 2) {
      value = value.substring(1, value.length - 1);
    } else {
      // remove trailing inline comment
      const cmt = value.search(/\s+[;#]/);
      if (cmt !== -1) value = value.substring(0, cmt).trim();
    }
    if (autoType) {
      if (/^-?\d+$/.test(value)) value = parseInt(value, 10);
      else if (/^-?\d+\.\d+([eE][+-]?\d+)?$/.test(value)) value = parseFloat(value);
      else if (value === 'true') value = true;
      else if (value === 'false') value = false;
      else if (value === 'null') value = null;
    }
    currentSection[key] = value;
  }
  return result;
}

function doConvert() {
  const inp = $('#input').value.trim();
  if (!inp) { $('#output').textContent = ''; $('#status').innerHTML = ''; return; }
  try {
    const obj = parseINI(inp);
    const json = JSON.stringify(obj, null, 2);
    $('#output').innerHTML = syntaxHighlight(json);
    const keys = Object.keys(obj).length;
    $('#status').innerHTML = `<span style="color:var(--gz-success)">${t('valid')}</span> <span style="opacity:.7">(${keys} top-level keys)</span>`;
  } catch(e) {
    $('#status').innerHTML = `<span style="color:var(--gz-accent)">Error: ${e.message}</span>`;
    $('#output').textContent = '';
  }
}

function loadExample() {
  $('#input').value = `; Application configuration

port = 5432
name = myapp_prod

host = 127.0.0.1
port = 6379
ttl = 3600
enabled = true

[logging]
level = info
format = json
max_file_size = 10485760`;
  doConvert();
}

function doClear() { $('#input').value = ''; $('#output').textContent = ''; $('#status').innerHTML = ''; }

$('#input').addEventListener('input', doConvert);

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="doConvert()">${t('convert')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <label style="display:inline-flex;align-items:center;gap:6px;font-size:.85em;cursor:pointer">
    <input type="checkbox" id="autoTypeChk" checked onchange="autoType=this.checked;doConvert()"> ${t('autoType')}
  </label>
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;
