const { $, copyText, t } = GZ;
let imgData=null;
let sampleLoaded=false;

function quantize(pixels,numColors){
  // Simple median-cut quantization
  if(pixels.length===0)return[];
  const buckets=[pixels.slice()];
  while(buckets.length<numColors){
    // find bucket with largest range
    let maxRange=-1,maxIdx=0,maxChannel=0;
    for(let i=0;i<buckets.length;i++){
      if(buckets[i].length<2)continue;
      for(let ch=0;ch<3;ch++){
        let min=255,max=0;
        for(const p of buckets[i]){if(p[ch]<min)min=p[ch];if(p[ch]>max)max=p[ch];}
        const range=max-min;
        if(range>maxRange){maxRange=range;maxIdx=i;maxChannel=ch;}
      }
    }
    if(maxRange<=0)break;
    const bucket=buckets[maxIdx];
    bucket.sort((a,b)=>a[maxChannel]-b[maxChannel]);
    const mid=Math.floor(bucket.length/2);
    buckets[maxIdx]=bucket.slice(0,mid);
    buckets.push(bucket.slice(mid));
  }
  return buckets.map(b=>{
    if(b.length===0)return null;
    let r=0,g=0,bl=0;
    for(const p of b){r+=p[0];g+=p[1];bl+=p[2];}
    return {
      r:Math.round(r/b.length),
      g:Math.round(g/b.length),
      b:Math.round(bl/b.length),
      count:b.length,
      total:pixels.length
    };
  }).filter(Boolean).sort((a,b)=>b.count-a.count);
}

function rgbToHex(r,g,b){return '#'+[r,g,b].map(x=>x.toString(16).padStart(2,'0').toUpperCase()).join('');}
function rgbToHsl(r,g,b){
  r/=255;g/=255;b/=255;
  const max=Math.max(r,g,b),min=Math.min(r,g,b);
  let h,s,l=(max+min)/2;
  if(max===min){h=s=0;}
  else{const d=max-min;s=l>.5?d/(2-max-min):d/(max+min);switch(max){case r:h=(g-b)/d+(g<b?6:0);break;case g:h=(b-r)/d+2;break;case b:h=(r-g)/d+4;break;}h/=6;}
  return [Math.round(h*360),Math.round(s*100),Math.round(l*100)];
}

function extract(){
  if(!imgData)return;
  const data=imgData.data;
  const step=+$('#quality').value*4;
  const pixels=[];
  for(let i=0;i<data.length;i+=step){
    // skip near-transparent pixels
    if(data[i+3]<128)continue;
    pixels.push([data[i],data[i+1],data[i+2]]);
  }
  const numColors=+$('#colorCount').value;
  const result=quantize(pixels,numColors);
  renderPalette(result);
}

function renderPalette(colors){
  const html=colors.map(c=>{
    const hex=rgbToHex(c.r,c.g,c.b);
    const pct=(c.count/c.total*100).toFixed(1);
    const[h,s,l]=rgbToHsl(c.r,c.g,c.b);
    return `<div class="swatch-card" onclick="copyText('${hex}');GZ.showToast(t('copied'))">
      <div class="swatch-color" style="background:${hex}"></div>
      <div class="swatch-info">
        <div class="hex">${hex}</div>
        <div class="rgb">rgb(${c.r}, ${c.g}, ${c.b})</div>
        <div class="rgb">hsl(${h}, ${s}%, ${l}%)</div>
        <div class="pct">${pct}%</div>
      </div>
    </div>`;
  }).join('');
  $('#palette').innerHTML=html||'<p style="opacity:.6;padding:20px">No colors extracted yet.</p>';
}

function reextract(){if(imgData)extract();}

function loadImage(file){
  const reader=new FileReader();
  reader.onload=e=>{
    const img=new Image();
    img.onload=()=>{
      const canvas=document.createElement('canvas');
      const maxDim=200;
      let w=img.width,h=img.height;
      if(w>maxDim||h>maxDim){
        const scale=maxDim/Math.max(w,h);
        w=Math.round(w*scale);h=Math.round(h*scale);
      }
      canvas.width=w;canvas.height=h;
      const ctx=canvas.getContext('2d');
      ctx.drawImage(img,0,0,w,h);
      imgData=ctx.getImageData(0,0,w,h);
      $('#preview').src=e.target.result;
      $('#preview').style.display='block';
      extract();
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}

const dz=$('#dropZone');
dz.addEventListener('click',()=>$('#fileInput').click());
dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('dragover');});
dz.addEventListener('dragleave',()=>dz.classList.remove('dragover'));
dz.addEventListener('drop',e=>{
  e.preventDefault();dz.classList.remove('dragover');
  if(e.dataTransfer.files[0])loadImage(e.dataTransfer.files[0]);
});
$('#fileInput').addEventListener('change',e=>{if(e.target.files[0])loadImage(e.target.files[0]);});

function loadSample(){
  const canvas=document.createElement('canvas');
  canvas.width=180;canvas.height=120;
  const ctx=canvas.getContext('2d');
  const grad=ctx.createLinearGradient(0,0,180,120);
  grad.addColorStop(0,'#e94560');
  grad.addColorStop(0.5,'#f9d423');
  grad.addColorStop(1,'#00d672');
  ctx.fillStyle=grad;ctx.fillRect(0,0,180,120);
  ctx.fillStyle='#1a1a2e';ctx.beginPath();ctx.arc(90,60,25,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#61afef';ctx.fillRect(10,90,40,25);
  imgData=ctx.getImageData(0,0,180,120);
  $('#preview').src=canvas.toDataURL();
  $('#preview').style.display='block';
  extract();
}

function copyAll(){
  const cards=document.querySelectorAll('.swatch-info .hex');
  const hexes=Array.from(cards).map(c=>c.textContent).join('\n');
  copyText(hexes);
  GZ.showToast(t('copyAll'));
}

function doClear(){
  $('#preview').style.display='none';
  $('#palette').innerHTML='';
  $('#fileInput').value='';
  imgData=null;
}

$('#toolbar').innerHTML=`
