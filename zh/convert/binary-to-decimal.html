<script>
GZI18n.register({
  en: {
    toolTitle: 'Binary ⇄ Decimal Converter',
    toolDesc: 'Convert binary to decimal, decimal to binary, and see hex & octal simultaneously. Multi-line batch conversion supported — free and private.',
    convert: 'Convert',
    bin2dec: 'Binary → Decimal',
    dec2bin: 'Decimal → Binary',
    base2: 'Binary',
    base10: 'Decimal',
    base16: 'Hex',
    base8: 'Octal',
    step1: 'Choose conversion direction (binary→decimal or decimal→binary)',
    step2: 'Enter your number(s) in the input area',
    step3: 'Results show instantly in binary, decimal, hex, and octal',
    step4: 'Copy any result you need',
    invalid: '✗ Invalid {mode} number: {val}',
    valid: '✓ Converted {n} number(s)',
  },
  zh: {
    toolTitle: '二进制 ⇄ 十进制转换器',
    toolDesc: '二进制转十进制、十进制转二进制，同时显示十六进制和八进制。支持多行批量转换 — 免费且私密。',
    convert: '转换',
    bin2dec: '二进制 → 十进制',
    dec2bin: '十进制 → 二进制',
    base2: '二进制',
    base10: '十进制',
    base16: '十六进制',
    base8: '八进制',
    step1: '选择转换方向（二进制→十进制 或 十进制→二进制）',
    step2: '在输入区输入数字',
    step3: '结果即时显示二进制、十进制、十六进制和八进制',
    step4: '复制你需要的结果',
    invalid: '✗ 无效的{mode}数字：{val}',
    valid: '✓ 转换了 {n} 个数字',
  }
});

const { $, copyText, t } = GZ;
let mode = 'bin2dec';

function convert() {
  const input = $('#input').value.trim();
  if (!input) return;
  const lines = input.split('\n').filter(l => l.trim() !== '');
  let html = '';
  let count = 0;

  lines.forEach(line => {
    const val = line.trim();
    let decimal, error = null;

    if (mode === 'bin2dec') {
      if (!/^[01]+$/.test(val)) {
        html += `<div class="result-row"><span class="base">${t('base2')}:</span><span class="val" style="color:var(--gz-accent)">${t('invalid').replace('{mode}', t('base2')).replace('{val}', val)}</span></div>`;
        return;
      }
      // Use BigInt for large binary numbers
      if (val.length > 53) {
        let result = 0n;
        for (let i = 0; i < val.length; i++) {
          result = result * 2n + (val[i] === '1' ? 1n : 0n);
        }
        decimal = result;
      } else {
        decimal = parseInt(val, 2);
      }
    } else {
      if (!/^-?\d+$/.test(val)) {
        html += `<div class="result-row"><span class="base">${t('base10')}:</span><span class="val" style="color:var(--gz-accent)">${t('invalid').replace('{mode}', t('base10')).replace('{val}', val)}</span></div>`;
        return;
      }
      decimal = val.length > 15 ? BigInt(val) : parseInt(val, 10);
    }

    const isBigInt = typeof decimal === 'bigint';
    const decStr = decimal.toString();
    const binStr = isBigInt ? decimal.toString(2) : decimal.toString(2);
    const hexStr = isBigInt ? decimal.toString(16).toUpperCase() : decimal.toString(16).toUpperCase();
    const octStr = isBigInt ? decimal.toString(8) : decimal.toString(8);

    html += `<div class="result-row"><span class="base">${t('base10')}:</span><span class="val">${decStr}</span></div>`;
    html += `<div class="result-row"><span class="base">${t('base2')}:</span><span class="val">${binStr}</span></div>`;
    html += `<div class="result-row"><span class="base">${t('base16')}:</span><span class="val">${hexStr}</span></div>`;
    html += `<div class="result-row"><span class="base">${t('base8')}:</span><span class="val">${octStr}</span></div>`;
    html += `<hr style="border:0;border-top:1px solid var(--border);margin:8px 0">`;
    count++;
  });

  $('#output').innerHTML = html;
  $('#status').innerHTML = `<span style="color:var(--gz-success)">${t('valid').replace('{n}', count)}</span>`;
}

function loadExample() {
  if (mode === 'bin2dec') {
    $('#input').value = '1010\n11111111\n1000000000\n101100101';
  } else {
    $('#input').value = '10\n255\n512\n357';
  }
  convert();
}

function doClear() { $('#input').value = ''; $('#output').innerHTML = ''; $('#status').innerHTML = ''; }

$('#input').addEventListener('input', convert);

$('#dir-toggle').innerHTML = `
  <button class="gz-btn active" id="btn-bin2dec" onclick="setMode('bin2dec')">${t('bin2dec')}</button>
  <button class="gz-btn" id="btn-dec2bin" onclick="setMode('dec2bin')">${t('dec2bin')}</button>`;

window.setMode = function(m) {
  mode = m;
  $('#btn-bin2dec').classList.toggle('active', m === 'bin2dec');
  $('#btn-dec2bin').classList.toggle('active', m === 'dec2bin');
  convert();
};

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="convert()">${t('convert')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

GZ.renderToolPage({
  category: 'convert',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],

    {icon:'🔤', href:'/convert/text-binary-hex.html', name:'Text/Binary/Hex'},

    {icon:'🧮', href:'/calc/binary-calculator.html', name:'Binary Calculator'},
  ]
});
</script>
