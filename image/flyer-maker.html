<script>
GZI18n.register({
  en: {
    toolTitle: 'Free Flyer Maker',
    toolDesc: 'Create professional event flyers online for free. Add event name, date, time and location — choose stylish themes and download a share-ready PNG. No signup, no watermark.',
    download: 'Download PNG',
    lblEvent: 'Event Name', lblTagline: 'Tagline', lblDate: 'Date', lblTime: 'Time',
    lblLocation: 'Location / Address', lblDesc: 'Description', lblTheme: 'Theme', lblEmoji: 'Emoji',
    step1: 'Enter your event name, tagline, date, time and location',
    step2: 'Add a short description to entice attendees',
    step3: 'Choose a theme that matches your event vibe',
    step4: 'Click Download PNG to share your flyer on social media',
  },
  zh: {
    toolTitle: '免费传单制作工具',
    toolDesc: '免费在线制作专业活动传单。添加活动名称、日期、时间和地点 — 选择精美主题，下载可直接分享的 PNG。无水印、无需注册。',
    download: '下载 PNG',
    lblEvent: '活动名称', lblTagline: '标语', lblDate: '日期', lblTime: '时间',
    lblLocation: '地点 / 地址', lblDesc: '描述', lblTheme: '主题', lblEmoji: '表情符号',
    step1: '输入活动名称、标语、日期、时间和地点',
    step2: '添加简短描述吸引参与者',
    step3: '选择与活动氛围相符的主题',
    step4: '点击「下载 PNG」在社交媒体分享传单',
  }
});

const { $, t } = GZ;

const themes={
  party:{bg:'#1a0033',accent:'#ff00ff',accent2:'#00ffff',text:'#ffffff'},
  elegant:{bg:'#1a1a1a',accent:'#d4af37',accent2:'#f5e6c8',text:'#ffffff'},
  sale:{bg:'#dc2626',accent:'#fef3c7',accent2:'#fde047',text:'#ffffff'},
  nature:{bg:'#1a3c1a',accent:'#86efac',accent2:'#fde047',text:'#ffffff'},
  tech:{bg:'#0a1929',accent:'#38bdf8',accent2:'#818cf8',text:'#ffffff'},
  retro:{bg:'#3d1f00',accent:'#f97316',accent2:'#fbbf24',text:'#fef3c7'},
};

function wrapLines(ctx,text,maxW){
  const words=text.split(' ');let line='';const lines=[];
  for(const w of words){const test=line?line+' '+w:w;if(ctx.measureText(test).width>maxW&&line){lines.push(line);line=w}else line=test}
  if(line)lines.push(line);
  return lines;
}

function render(){
  const c=$('#canvas'),ctx=c.getContext('2d');
  const W=c.width,H=c.height;
  const th=themes[$('#theme').value];
  const event=$('#eventName').value||'Event';
  const tagline=$('#tagline').value;
  const date=$('#date').value;
  const time=$('#time').value;
  const location=$('#location').value;
  const desc=$('#desc2').value;
  const emoji=$('#emoji').value;

  // Background gradient
  const grad=ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,th.bg);
  grad.addColorStop(1,th.bg);
  ctx.fillStyle=grad;
  ctx.fillRect(0,0,W,H);

  // Decorative top band
  ctx.fillStyle=th.accent;
  ctx.globalAlpha=0.9;
  ctx.fillRect(0,0,W,12);
  ctx.fillRect(0,H-12,W,12);
  ctx.globalAlpha=1;

  // Glowing circles
  ctx.fillStyle=th.accent;
  ctx.globalAlpha=0.08;
  ctx.beginPath();ctx.arc(W*0.8,H*0.15,160,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=th.accent2;
  ctx.beginPath();ctx.arc(W*0.15,H*0.85,200,0,Math.PI*2);ctx.fill();
  ctx.globalAlpha=1;

  ctx.textAlign='center';ctx.textBaseline='middle';
  let y=120;

  // Emoji
  if(emoji){
    ctx.font='90px sans-serif';
    ctx.fillText(emoji,W/2,y);
    y+=80;
  }

  // Tagline
  if(tagline){
    ctx.font='400 30px Georgia, serif';
    ctx.fillStyle=th.accent2;
    ctx.fillText(tagline.toUpperCase(),W/2,y);
    y+=50;
  }

  // Divider
  ctx.fillStyle=th.accent;
  ctx.fillRect(W/2-60,y,120,4);
  y+=40;

  // Event name (big)
  ctx.fillStyle=th.text;
  let fs=72;
  ctx.font=`900 ${fs}px Arial Black, sans-serif`;
  while(ctx.measureText(event).width>W*0.85&&fs>30){fs-=2;ctx.font=`900 ${fs}px Arial Black, sans-serif`}
  const evLines=wrapLines(ctx,event,W*0.85);
  evLines.forEach((ln,i)=>ctx.fillText(ln,W/2,y+i*fs*1.05));
  y+=evLines.length*fs*1.05+35;

  // Date & Time badges
  if(date||time){
    const bw=280,bh=70;
    const bx=W/2-bw/2;
    ctx.fillStyle=th.accent;
    ctx.globalAlpha=0.15;
    ctx.fillRect(bx,y-10,bw,bh);
    ctx.globalAlpha=1;
    ctx.fillStyle=th.text;
    ctx.font='700 26px Verdana, sans-serif';
    if(date&&time)ctx.fillText(`${date}  •  ${time}`,W/2,y+25);
    else if(date)ctx.fillText(date,W/2,y+25);
    else ctx.fillText(time,W/2,y+25);
    y+=bh+20;
  }

  // Location
  if(location){
    ctx.font='400 24px Verdana, sans-serif';
    ctx.fillStyle=th.accent2;
    const locLines=wrapLines(ctx,'📍 '+location,W*0.8);
    locLines.forEach((ln,i)=>ctx.fillText(ln,W/2,y+i*32));
    y+=locLines.length*32+25;
  }

  // Description
  if(desc){
    ctx.font='300 22px Verdana, sans-serif';
    ctx.fillStyle=th.text;
    ctx.globalAlpha=0.8;
    const descLines=wrapLines(ctx,desc,W*0.75);
    descLines.forEach((ln,i)=>ctx.fillText(ln,W/2,y+i*30));
    ctx.globalAlpha=1;
  }
}

function downloadPNG(){
  const link=document.createElement('a');
  const name=($('#eventName').value||'flyer').replace(/[^a-zA-Z0-9]/g,'_').toLowerCase()||'flyer';
  link.download=name+'-flyer.png';
  link.href=$('#canvas').toDataURL('image/png');
  link.click();
}

$('#lbl-event').textContent=t('lblEvent');
$('#lbl-tagline').textContent=t('lblTagline');
$('#lbl-date').textContent=t('lblDate');
$('#lbl-time').textContent=t('lblTime');
$('#lbl-location').textContent=t('lblLocation');
$('#lbl-desc').textContent=t('lblDesc');
$('#lbl-theme').textContent=t('lblTheme');
$('#lbl-emoji').textContent=t('lblEmoji');

['eventName','tagline','date','time','location','desc2','emoji'].forEach(id=>$('#'+id).addEventListener('input',render));
$('#theme').addEventListener('change',render);

render();

$('#toolbar').innerHTML=`
  <button class="gz-btn" onclick="downloadPNG()">${t('download')}</button>`;

GZ.renderToolPage({
  category: 'image',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🖼️', href:'/image/poster-maker.html', name:'Poster Maker'},
    {icon:'🎨', href:'/image/logo-maker.html', name:'Logo Maker'},
    {icon:'📢', href:'/image/banner-maker.html', name:'Banner Maker'},
    {icon:'🏆', href:'/image/certificate-generator.html', name:'Certificate Generator'},
  ]
});
</script>
