const { $, copyText, t } = GZ;
let pyStyle = 'dict';

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// Convert a JS value (from JSON.parse) into Python literal representation
function pyLit(v) {
  if (v === null) return 'None';
  if (v === true) return 'True';
  if (v === false) return 'False';
  if (typeof v === 'number') return Number.isFinite(v) ? String(v) : 'None';
  if (typeof v === 'string') return JSON.stringify(v);
  if (Array.isArray(v)) {
    if (!v.length) return '[]';
    const items = v.map(pyLit);
    // align if all scalars and short
    if (items.every(x => !x.startsWith('{') && !x.startsWith('[')) && items.join(', ').length <= 60) {
      return '[' + items.join(', ') + ']';
    }
    return '[\n' + items.map(x => '    ' + x).join(',\n') + '\n]';
  }
  if (typeof v === 'object') {
    const keys = Object.keys(v);
    if (!keys.length) return '{}';
    const entries = keys.map(k => `'${k}': ${pyLit(v[k])}`);
    if (entries.join(', ').length <= 60) return '{' + entries.join(', ') + '}';
    return '{\n' + entries.map(x => '    ' + x).join(',\n') + '\n}';
  }
  return 'None';
}

// TypedDict / dataclass type inference
function typeName(v) {
  if (v === null || v === undefined) return 'Optional[Any]';
  if (typeof v === 'boolean') return 'bool';
  if (typeof v === 'number') return Number.isInteger(v) ? 'int' : 'float';
  if (typeof v === 'string') return 'str';
  if (Array.isArray(v)) return v.length ? 'List[' + typeName(v[0]) + ']' : 'List[Any]';
  if (typeof v === 'object') return 'dict';
  return 'Any';
}

function pascalCase(s) {
  return s.replace(/(^|[_\W])(\w)/g, (_, __, c) => c.toUpperCase()).replace(/s$/, '');
}

function toTypedDict(obj, name) {
  let out = `from typing import TypedDict\n\n\nclass ${name}(TypedDict):\n`;
  const keys = Object.keys(obj);
  if (!keys.length) return out + '    pass';
  out += keys.map(k => `    ${k}: ${typeName(obj[k])}`).join('\n');
  out += `\n\n\n# data = ${pyLit(obj)}`;
  return out;
}

function toDataclass(obj, name) {
  const imports = ['from dataclasses import dataclass'];
  const typeSet = new Set();
  Object.values(obj).forEach(v => {
    const tn = typeName(v);
    if (tn.includes('Optional')) typeSet.add('Optional');
    if (tn.includes('List')) typeSet.add('List');
    if (tn.includes('Any')) typeSet.add('Any');
  });
  let typingImports = [];
  if (typeSet.has('Optional')) typingImports.push('Optional');
  if (typeSet.has('List')) typingImports.push('List');
  if (typeSet.has('Any')) typingImports.push('Any');
  if (typingImports.length) imports.push(`from typing import ${typingImports.join(', ')}`);

  let out = imports.join('\n') + '\n\n\n@dataclass\nclass ' + name + ':\n';
  const keys = Object.keys(obj);
  if (!keys.length) return out + '    pass';
  out += keys.map(k => `    ${k}: ${typeName(obj[k])}`).join('\n');
  out += `\n\n\n# data = ${name}(\n`;
  out += keys.map(k => `    ${k}=${pyLit(obj[k])}`).join(',\n');
  out += '\n)';
  return out;
}

function highlight(code) {
  // Tokenizer approach — avoids re-matching inside our own generated markup.
  const tokenRe = /('(?:\\.|[^'\\])*'|"(?:\\.|[^"\\])*")|(@?[\w.]+)|(\s+)|([^\s'"\w.@]+)/g;
  let out = '', last = 0, m;
  while ((m = tokenRe.exec(code)) !== null) {
    const [full, str, word, ws, punct] = m;
    if (str) {
      const isKey = /^\s*:/.test(code.substring(tokenRe.lastIndex));
      out += `<span class="${isKey ? 'py-key' : 'py-str'}">${esc(str)}</span>`;
    } else if (word) {
      let cls = null;
      if (word === 'True' || word === 'False') cls = 'py-bool';
      else if (word === 'None') cls = 'py-none';
      else if (/^(class|from|import|def|return)$/.test(word) || word === '@dataclass') cls = 'py-kw';
      else if (/^-?\d/.test(word) && !isNaN(parseFloat(word))) cls = 'py-num';
      if (cls) out += `<span class="${cls}">${esc(word)}</span>`;
      else out += esc(word);
    } else {
      out += esc(full);
    }
    last = tokenRe.lastIndex;
  }
  out += esc(code.substring(last));
  return out;
}

function convert() {
  const inp = $('#input').value.trim();
  if (!inp) { $('#output').innerHTML = ''; $('#status').innerHTML = ''; return; }
  let parsed;
  try {
    parsed = JSON.parse(inp);
    $('#status').innerHTML = `<span style="color:var(--gz-success)">${t('validJson')}</span>`;
  } catch (e) {
    $('#status').innerHTML = `<span style="color:var(--gz-accent)">${t('invalidJson')}: ${esc(e.message)}</span>`;
    $('#output').innerHTML = '';
    return;
  }
  let code;
  const rootIsArray = Array.isArray(parsed);
  const root = rootIsArray ? (parsed[0] || {}) : parsed;
  if (pyStyle === 'typed' && root && typeof root === 'object' && !Array.isArray(root)) {
    code = toTypedDict(root, 'MyModel');
  } else if (pyStyle === 'dataclass' && root && typeof root === 'object' && !Array.isArray(root)) {
    code = toDataclass(root, 'MyModel');
  } else {
    code = pyLit(parsed);
  }
  if (rootIsArray && (pyStyle === 'typed' || pyStyle === 'dataclass')) {
    code = `# Converted from a JSON array — using the first element as the model.\n\n` + code;
  }
  $('#output').innerHTML = highlight(code);
}

  }, null, 2);
  convert();
}
