<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"How many steps are in 1 kilometer?","acceptedAnswer":{"@type":"Answer","text":"On average, 1 kilometer equals about 1,312 steps for a woman and 1,209 steps for a man. The exact number depends on your stride length, which is influenced by your height, walking speed, and terrain."}},{"@type":"Question","name":"How is stride length calculated from height?","acceptedAnswer":{"@type":"Answer","text":"A common estimate is stride length ≈ 0.413 × height for women and 0.415 × height for men. You can also measure it manually by walking 10 normal steps, measuring the distance, and dividing by 10."}},{"@type":"Question","name":"How are calories burned calculated from steps?","acceptedAnswer":{"@type":"Answer","text":"The calculator uses MET-based estimation: calories ≈ steps × stride length (m) × body weight (kg) × 0.0005. Actual burn varies with walking speed, incline, age, and fitness level — for precise data use a fitness tracker."}},{"@type":"Question","name":"Is 10,000 steps a day a good goal?","acceptedAnswer":{"@type":"Answer","text":"10,000 steps (≈8 km / 5 miles) is a widely cited target for active adults. Health benefits begin at lower counts — research shows even 7,000-8,000 daily steps significantly reduce mortality risk. Choose a goal you can sustain."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="sk-input">
      <label><span id="lbl-steps"></span><input type="number" id="steps" min="0" placeholder="10000" oninput="calc()"></label>
      <label><span id="lbl-height"></span><input type="number" id="height" min="0" placeholder="170" oninput="calc()"></label>
      <label><span id="lbl-weight"></span><input type="number" id="weight" min="0" placeholder="70" oninput="calc()"></label>
      <label><span id="lbl-unit"></span><select id="unit" onchange="calc()">
        <option value="metric">cm / kg</option>
        <option value="imperial">ft·in / lbs</option>
      </select></label>
    </div>
    <div id="result"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Steps to KM Converter',
    toolDesc: 'Convert your step count to kilometers, miles, and estimated calories burned.',
    steps: 'Steps',
    height: 'Height (cm)',
    weight: 'Weight (kg)',
    unit: 'Units',
    calcBtn: 'Convert',
    clear: 'Clear',
    kilometers: 'Kilometers',
    miles: 'Miles',
    meters: 'Meters',
    calories: 'Calories Burned',
    strideUsed: 'Stride length used',
    note: 'Stride length is auto-estimated from your height (≈0.414 × height). For better accuracy, walk 10 normal steps, measure the start-to-end distance, and enter that as a custom stride.',
    step1: 'Enter your daily step count',
    step2: 'Enter your height and weight (improves accuracy)',
    step3: 'Pick metric or imperial units',
    step4: 'Read distance in km, miles, meters, and calories',
  },
  zh: {
    toolTitle: '步数转公里计算器',
    toolDesc: '将你的步数换算为公里、英里和估算消耗热量。',
    steps: '步数',
    height: '身高 (cm)',
    weight: '体重 (kg)',
    unit: '单位',
    calcBtn: '换算',
    clear: '清空',
    kilometers: '公里',
    miles: '英里',
    meters: '米',
    calories: '消耗热量',
    strideUsed: '所用步幅',
    note: '步幅由身高自动估算（≈0.414 × 身高）。如需更精确，请走 10 步测量距离后输入。',
    step1: '输入你的每日步数',
    step2: '输入身高和体重（提高准确度）',
    step3: '选择公制或英制',
    step4: '查看公里、英里、米和热量',
  }
});

const { $, t } = GZ;

$('#lbl-steps').textContent  = t('steps');
$('#lbl-height').textContent = t('height');
$('#lbl-weight').textContent = t('weight');
$('#lbl-unit').textContent   = t('unit');

function calc() {
  const steps = parseInt($('#steps').value, 10) || 0;
  let height = parseFloat($('#height').value) || 170;
  let weight = parseFloat($('#weight').value) || 70;
  const u = $('#unit').value;
  // Imperial → metric
  if (u === 'imperial') {
    // height in inches → cm
    height *= 2.54;
    weight *= 0.453592;
  }
  const strideCm = 0.414 * height; // cm per step
  const totalM = steps * strideCm / 100;
  const km = totalM / 1000;
  const miles = km * 0.621371;
  // MET-based calorie estimate: ~0.0005 kcal per (kg·m)
  const cal = totalM * weight * 0.0005;

  if (steps <= 0) { $('#result').innerHTML=''; return; }
  $('#result').innerHTML = `
    <div class="sk-grid">
      <div class="sk-card"><div class="v">${km.toFixed(2)}</div><div class="l">${t('kilometers')}</div></div>
      <div class="sk-card"><div class="v">${miles.toFixed(2)}</div><div class="l">${t('miles')}</div></div>
      <div class="sk-card"><div class="v">${Math.round(totalM).toLocaleString()}</div><div class="l">${t('meters')}</div></div>
      <div class="sk-card"><div class="v">${Math.round(cal)}</div><div class="l">${t('calories')}</div></div>
    </div>
    <p class="sk-note">${t('strideUsed')}: <strong>${strideCm.toFixed(1)} cm</strong><br>${t('note')}</p>`;
}

function doClear() {
  ['steps','height','weight'].forEach(id => $('#' + id).value = '');
  $('#result').innerHTML = '';
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="calc()">${t('calcBtn')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🏃', href:'/calc/heart-rate-max-calculator.html', name:'Heart Rate Max'},
    {icon:'💧', href:'/calc/water-intake.html', name:'Water Intake'},
    {icon:'🚶', href:'/calc/bmr-calculator.html', name:'BMR'},
    {icon:'🔥', href:'/calc/calorie-burner-calculator.html', name:'Calorie Burner'},
  ]
});
</script>
<script src="/tools-result-rec.js?v=20260707v520" defer></script>
</body>
