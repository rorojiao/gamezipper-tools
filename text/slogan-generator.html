<script>
GZI18n.register({
  en: {
    toolTitle: 'Slogan Generator',
    toolDesc: 'Create catchy business slogans and taglines from any keyword. 12 proven formula styles, instant results — free and private.',
    ph: 'Enter your brand, product or keyword (e.g. coffee, gym, app)',
    generate: 'Generate Slogans',
    step1: 'Type your brand name, product or keyword',
    step2: 'Click Generate Slogans for 16 fresh ideas',
    step3: 'Click Generate again for a new batch',
    step4: 'Copy any slogan with one click',
    enterKw: 'Please enter a keyword first.',
    formula: 'Formula',
    copied: 'Copied!',
  },
  zh: {
    toolTitle: '标语 / 广告语生成器',
    toolDesc: '从任意关键词生成朗朗上口的商业标语和广告语。12 种经典公式，即时出结果 — 免费且私密。',
    ph: '输入品牌、产品或关键词（如咖啡、健身房、App）',
    generate: '生成标语',
    step1: '输入品牌名、产品或关键词',
    step2: '点击「生成标语」获取 16 条创意',
    step3: '再次点击生成新一轮标语',
    step4: '一键复制任意标语',
    enterKw: '请先输入关键词。',
    formula: '公式',
    copied: '已复制！',
  }
});

const { $, copyText, t, showToast } = GZ;

const TEMPLATES = [
  // Benefit
  '{x}, done right.',
  'The {x} you can trust.',
  'Better {x}, every day.',
  '{x} that actually works.',
  'Your {x}, simplified.',
  // Action / command
  'Get more from your {x}.',
  'Experience {x} like never before.',
  'Discover the future of {x}.',
  'Start your {x} journey today.',
  'Take your {x} further.',
  // Quality / superlative
  'The world\'s best {x}.',
  'Premium {x} for everyone.',
  'Where {x} meets excellence.',
  'The smart way to {x}.',
  'Next-level {x}, today.',
  // Emotion
  'Love your {x}.',
  '{x} you\'ll fall in love with.',
  'Feel good about your {x}.',
  'Make every {x} moment count.',
  'Happiness is great {x}.',
  // Question
  'Ready for better {x}?',
  'Why settle for ordinary {x}?',
  'Looking for the perfect {x}?',
  'Tired of bad {x}?',
  // Comparison / contrast
  'Not just {x}. Better {x}.',
  'Less hassle, more {x}.',
  '{x} reimagined.',
  'The new standard in {x}.',
  // Short punchy
  'Just {x}.',
  '{x}. Always.',
  'Pure {x}.',
  '{x} first.',
  'Think {x}.',
];

function titleCase(s) { return s.replace(/\b\w/g, c => c.toUpperCase()); }

function pick(arr, n) {
  const copy = [...arr];
  const out = [];
  for (let i = 0; i < n && copy.length; i++) {
    out.push(copy.splice(Math.floor(Math.random() * copy.length), 1)[0]);
  }
  return out;
}

function generate() {
  let kw = $('#keyword').value.trim();
  if (!kw) { $('#keyword').focus(); showToast(t('enterKw')); return; }
  const lower = kw.toLowerCase();
  const Title = titleCase(lower);
  const chosen = pick(TEMPLATES, 16);
  $('#output').innerHTML = chosen.map(tpl => {
    const slogan = tpl.replace(/\{x\}/g, lower);
    const display = tpl.replace(/\{x\}/g, Title);
    const esc = display.replace(/'/g, "\\'");
    return `<div class="slogan">
      <div><span class="txt">${display}</span><span class="tag">${t('formula')}</span></div>
      <button class="gz-btn gz-btn-secondary" onclick="copySlogan('${esc}')">${t('copy')}</button>
    </div>`;
  }).join('');
}

function copySlogan(s) {
  copyText(s);
  showToast(t('copied'));
}

$('#keyword').placeholder = t('ph');
$('#gen-btn').textContent = t('generate');
$('#keyword').addEventListener('keydown', e => { if (e.key === 'Enter') generate(); });

$('#toolbar').innerHTML = `<button class="gz-btn gz-btn-secondary" onclick="generate()">↻ ${t('generate')}</button>`;

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'✨', href:'/text/tagline-generator.html', name:'Tagline Generator'},
    {icon:'🏷️', href:'/text/brand-name-generator.html', name:'Brand Name Generator'},
    {icon:'🏢', href:'/text/business-name-generator.html', name:'Business Name'},
    {icon:'🎯', href:'/text/blog-title-generator.html', name:'Blog Title Generator'},
  ]
});
generate();
</script>
