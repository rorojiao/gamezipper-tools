<script type="application/ld+json">{"@context":"https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is ROI?", "acceptedAnswer": {"@type": "Answer", "text": "ROI (Return on Investment) measures the gain or loss of an investment relative to its cost. It's calculated as (Net Profit / Cost) × 100%. A positive ROI means profit; a negative ROI means a loss."}}, {"@type": "Question", "name": "What is annualized ROI?", "acceptedAnswer": {"@type": "Answer", "text": "Annualized ROI scales a multi-year ROI to a yearly rate, so you can fairly compare investments held for different lengths of time. The formula is ((1 + ROI) ^ (1/years) - 1) × 100%."}}, {"@type": "Question", "name": "What is a good ROI?", "acceptedAnswer": {"@type": "Answer", "text": "It depends on the asset class. Stock market averages 7-10% annually long-term. Real estate averages 8-12% with leverage. Marketing campaigns aim for at least 5:1 ratio (500% ROI). Crypto can be 100%+ in bull markets or -90% in bear."}}, {"@type": "Question", "name": "Is ROI the same as profit?", "acceptedAnswer": {"@type": "Answer", "text": "No. Profit is an absolute dollar amount (Final value - Initial cost). ROI is a percentage that measures efficiency relative to the cost, so you can compare investments of different sizes fairly."}}]}</script>

      <div class="field"><label data-i18n="final"></label><input type="number" id="final" value="13500" step="any"></div>

      <div class="card"><div class="v" id="profit">$0</div><div class="l" data-i18n="profit"></div></div>

<script>
GZI18n.register({
  en: {
    toolTitle: 'ROI Calculator',
    toolDesc: 'Calculate Return on Investment, annualized ROI, profit, payback period and gain multiple. Useful for stocks, real estate, marketing and business.',
    initial: 'Initial investment',
    final: 'Final value',
    years: 'Investment period (years)',
    roi: 'Total ROI',
    annRoi: 'Annualized ROI',
    profit: 'Net profit',
    multiple: 'Money multiple',
    payback: 'Payback indicator',
    ratio: 'Profit ratio',
    step1: 'Enter the initial amount you invested (cost)',
    step2: 'Enter the final value of the investment',
    step3: 'Set the holding period in years (use 0.5 for 6 months, etc.)',
    step4: 'Read the ROI, annualized ROI, profit, multiple and payback indicator',
  },
  zh: {
    toolTitle: 'ROI 投资回报率计算器',
    toolDesc: '计算投资回报率、年化回报、净利润、回本指标和投资倍数。适合股票、房地产、营销和商业投资。',
    initial: '初始投资',
    final: '最终价值',
    years: '投资周期（年）',
    roi: '总回报率',
    annRoi: '年化回报率',
    profit: '净利润',
    multiple: '投资倍数',
    payback: '回本指标',
    ratio: '收益比',
    step1: '输入你的初始投资金额',
    step2: '输入投资的最终价值',
    step3: '设置持有年限（0.5 代表 6 个月）',
    step4: '查看总回报、年化回报、净利润、倍数和回本指标',
  }
});

document.querySelectorAll('[data-i18n]').forEach(el => el.textContent = GZ.t(el.dataset.i18n));
const { $, t } = GZ;
const fmt = n => '$' + (Math.round(n * 100) / 100).toLocaleString(undefined, {minimumFractionDigits: 0, maximumFractionDigits: 2});
const pct = n => (n * 100).toFixed(2) + '%';

function calc() {
  const init = +$('#initial').value || 0;
  const fin = +$('#final').value || 0;
  const years = Math.max(0.001, +$('#years').value || 1);
  const profit = fin - init;
  const roi = init > 0 ? profit / init : 0;
  const annRoi = init > 0 && fin >= 0 ? (Math.pow(fin/init, 1/years) - 1) : 0;
  const multiple = init > 0 ? fin / init : 0;
  const ratio = init > 0 ? fin / init : 0;
  const payback = profit > 0 && years > 0 ? (init / (profit / years)) : Infinity;
  const roiEl = $('#roi');
  roiEl.textContent = pct(roi);
  roiEl.className = 'v ' + (roi >= 0 ? 'pos' : 'neg');
  const arEl = $('#annRoi');
  arEl.textContent = pct(annRoi);
  arEl.className = 'v ' + (annRoi >= 0 ? 'pos' : 'neg');
  $('#profit').textContent = (profit >= 0 ? '+' : '') + fmt(profit);
  $('#profit').className = 'v ' + (profit >= 0 ? 'pos' : 'neg');
  $('#multi').textContent = multiple.toFixed(2) + '×';
  $('#ratio').textContent = (init > 0 ? (fin / init).toFixed(2) : '0');
  $('#payback').textContent = isFinite(payback) ? payback.toFixed(2) + ' yrs' : '∞';
  $('#lblInit').textContent = fmt(init);
  $('#lblFinal').textContent = fmt(fin);
  // bars: scale both to max(init, fin)
  const max = Math.max(init, fin, 1);
  document.querySelector('.bar.invest > span').style.width = (init / max * 100) + '%';
  document.querySelector('.bar.return > span').style.width = (fin / max * 100) + '%';
}

['#initial','#final','#years'].forEach(s => $(s).addEventListener('input', calc));

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📈', href:'/calc/compound-interest.html', name:'Compound Interest'},
    {icon:'💼', href:'/calc/profit-margin.html', name:'Profit Margin'},
    {icon:'🏖️', href:'/calc/retirement-calculator.html', name:'Retirement'},
    {icon:'🏷️', href:'/calc/discount-calculator.html', name:'Discount'},
  ]
});
calc();
</script>
