const { $, copyText, t } = GZ;
let provider = 'postgresql';
let addMap = false;

const typeMap = {
  postgresql: {
    'serial': 'Int @default(autoincrement())',
    'bigserial': 'BigInt @default(autoincrement())',
    'int': 'Int', 'integer': 'Int', 'int4': 'Int',
    'bigint': 'BigInt', 'int8': 'BigInt',
    'smallint': 'Int', 'int2': 'Int',
    'decimal': 'Decimal', 'numeric': 'Decimal',
    'real': 'Float', 'float4': 'Float',
    'double': 'Float', 'float8': 'Float', 'double precision': 'Float',
    'varchar': 'String', 'character varying': 'String', 'text': 'String', 'char': 'String',
    'uuid': 'String @default(uuid())',
    'boolean': 'Boolean', 'bool': 'Boolean',
    'timestamp': 'DateTime', 'timestamptz': 'DateTime', 'timestamp with time zone': 'DateTime',
    'date': 'DateTime', 'time': 'String',
    'json': 'Json', 'jsonb': 'Json',
    'bytea': 'Bytes',
  },
  mysql: {
    'int': 'Int', 'integer': 'Int',
    'bigint': 'BigInt',
    'tinyint': 'Int', 'smallint': 'Int', 'mediumint': 'Int',
    'decimal': 'Decimal', 'numeric': 'Decimal',
    'float': 'Float', 'double': 'Float',
    'varchar': 'String', 'text': 'String', 'char': 'String',
    'longtext': 'String', 'mediumtext': 'String', 'tinytext': 'String',
    'boolean': 'Boolean', 'bool': 'Boolean', 'tinyint(1)': 'Boolean',
    'datetime': 'DateTime', 'timestamp': 'DateTime',
    'date': 'DateTime', 'time': 'String',
    'json': 'Json',
    'blob': 'Bytes',
    'enum': 'String',
  },
  sqlite: {
    'integer': 'Int', 'int': 'Int',
    'text': 'String', 'varchar': 'String', 'char': 'String',
    'real': 'Float', 'double': 'Float', 'float': 'Float',
    'numeric': 'Decimal', 'decimal': 'Decimal',
    'boolean': 'Boolean', 'bool': 'Boolean',
    'datetime': 'DateTime', 'date': 'DateTime',
    'blob': 'Bytes',
    'json': 'Json',
  }
};

function toPascalCase(str) {
  return str.replace(/(^|[_\s])([a-z])/g, (_, sep, c) => c.toUpperCase());
}

function toCamelCase(str) {
  const pascal = toPascalCase(str);
  return pascal.charAt(0).toLowerCase() + pascal.slice(1);
}

function mapType(sqlType, provider) {
  const map = typeMap[provider] || typeMap.postgresql;
  const normalized = sqlType.toLowerCase().replace(/\(\d+\)/g, '').trim();
  return map[normalized] || 'String';
}

function parseCreateTable(sql) {
  const tables = [];
  const tableRegex = /CREATE\s+TABLE\s+(?:IF\s+NOT\s+EXISTS\s+)?[`"\[]?(\w+)[`"\]]?\s*\(([\s\S]*?)\)\s*;/gi;
  let match;
  while ((match = tableRegex.exec(sql)) !== null) {
    const tableName = match[1];
    const body = match[2];
    const columns = [];
    const constraints = [];

    // Split by commas at top level
    let depth = 0;
    let current = '';
    for (const char of body) {
      if (char === '(') depth++;
      if (char === ')') depth--;
      if (char === ',' && depth === 0) {
        processLine(current.trim(), columns, constraints);
        current = '';
      } else {
        current += char;
      }
    }
    if (current.trim()) processLine(current.trim(), columns, constraints);

    tables.push({ name: tableName, columns, constraints });
  }
  return tables;
}

function processLine(line, columns, constraints) {
  if (!line) return;
  const upper = line.toUpperCase();

  // Primary key constraint
  if (upper.startsWith('PRIMARY KEY')) {
    const m = line.match(/PRIMARY\s+KEY\s*\(([^)]+)\)/i);
    if (m) constraints.push({ type: 'pk', columns: m[1].split(',').map(s => s.trim().replace(/[`"\[\]]/g, '')) });
    return;
  }
  // Foreign key constraint
  if (upper.startsWith('FOREIGN KEY') || upper.startsWith('CONSTRAINT') && upper.includes('FOREIGN KEY')) {
    const m = line.match(/FOREIGN\s+KEY\s*\(([^)]+)\)\s*REFERENCES\s+[`"\[]?(\w+)[`"\]]?\s*\(([^)]+)\)/i);
    if (m) constraints.push({ type: 'fk', column: m[1].trim().replace(/[`"\[\]]/g, ''), refTable: m[2], refColumn: m[3].trim().replace(/[`"\[\]]/g, '') });
    return;
  }
  // Unique constraint
  if (upper.startsWith('UNIQUE') || (upper.startsWith('CONSTRAINT') && upper.includes('UNIQUE'))) {
    const m = line.match(/UNIQUE\s*\(([^)]+)\)/i);
    if (m) constraints.push({ type: 'unique', columns: m[1].split(',').map(s => s.trim().replace(/[`"\[\]]/g, '')) });
    return;
  }
  // Index
  if (upper.startsWith('INDEX') || upper.startsWith('KEY')) return;
  // Check constraint
  if (upper.startsWith('CHECK') || upper.startsWith('CONSTRAINT')) return;

  // Regular column definition
  const colMatch = line.match(/^[`"\[]?(\w+)[`"\]]?\s+(\w+)(\([^)]+\))?(.*)$/);
  if (colMatch) {
    const [, name, type, size, rest] = colMatch;
    const attrs = rest || '';
    columns.push({
      name: name.replace(/[`"\[\]]/g, ''),
      sqlType: type + (size || ''),
      isPrimaryKey: /PRIMARY\s+KEY/i.test(attrs) || type.toLowerCase() === 'serial' || type.toLowerCase() === 'bigserial',
      isNotNull: /NOT\s+NULL/i.test(attrs),
      isUnique: /UNIQUE/i.test(attrs),
      default: (attrs.match(/DEFAULT\s+([^,\s]+)/i) || [])[1],
      isAutoIncrement: /AUTO_?INCREMENT/i.test(attrs) || type.toLowerCase() === 'serial' || type.toLowerCase() === 'bigserial',
    });
  }
}

function convertSQLToPrisma(sql) {
  const tables = parseCreateTable(sql);
  if (tables.length === 0) throw new Error('No CREATE TABLE statements found');

  let output = `// Prisma schema generated from SQL\n`;
  output += `// Provider: ${provider}\n\n`;
  output += `generator client {\n  provider = "prisma-client-js"\n}\n\n`;
  output += `datasource db {\n  provider = "${provider}"\n  url      = env("DATABASE_URL")\n}\n\n`;

  const stats = { models: tables.length, fields: 0, relations: 0 };

  tables.forEach(table => {
    const modelName = toPascalCase(table.name);
    output += `model ${modelName} {\n`;

    // Find PK columns
    const pkConstraint = table.constraints.find(c => c.type === 'pk');
    const pkCols = pkConstraint ? pkConstraint.columns : [];

    // Columns
    table.columns.forEach(col => {
      stats.fields++;
      const fieldName = toCamelCase(col.name);
      let prismaType = mapType(col.sqlType, provider);

      // Handle auto-increment for PK
      const isPK = col.isPrimaryKey || pkCols.includes(col.name);
      if (isPK && (col.isAutoIncrement || /serial/i.test(col.sqlType))) {
        if (provider === 'postgresql') prismaType = 'Int @default(autoincrement())';
        else prismaType = 'Int @default(autoincrement())';
      }

      // Handle default values
      if (col.default) {
        const dv = col.default.toUpperCase();
        if (dv === 'NOW()' || dv === 'CURRENT_TIMESTAMP') {
          prismaType += ' @default(now())';
        } else if (dv === 'TRUE' || dv === 'FALSE') {
          prismaType += ` @default(${col.default})`;
        } else if (/^-?\d+\.?\d*$/.test(col.default)) {
          prismaType += ` @default(${col.default})`;
        } else {
          prismaType += ` @default("${col.default.replace(/['"]/g, '')}")`;
        }
      }

      if (isPK) prismaType += ' @id';
      if (col.isUnique) prismaType += ' @unique';

      const mapAttr = addMap && fieldName !== col.name ? ` @map("${col.name}")` : '';
      output += `  ${fieldName}  ${prismaType}${mapAttr}\n`;
    });

    // Relations (foreign keys)
    table.constraints.filter(c => c.type === 'fk').forEach(fk => {
      stats.relations++;
      const refModel = toPascalCase(fk.refTable);
      const fieldName = toCamelCase(fk.refTable);
      const mapAttr = addMap ? ` @map("${fk.column}")` : '';
      // Check if the FK column also exists as a regular column — if so, skip duplicate
      output += `  ${fieldName}  ${refModel}? @relation(fields: [${toCamelCase(fk.column)}], references: [id])${mapAttr}\n`;
    });

    // Table map
    const tableMap = addMap ? `  @@map("${table.name}")\n` : '';
    output += tableMap;
    output += `}\n\n`;
  });

  return { code: output.trim(), stats };
}

function doConvert() {
  const inp = $('#input').value.trim();
  if (!inp) { $('#output').textContent = ''; $('#status').innerHTML = ''; return; }
  try {
    const { code, stats } = convertSQLToPrisma(inp);
    $('#output').textContent = code;
    const badges = [
      `<span class="stat-badge">📊 ${stats.models} models</span>`,
      `<span class="stat-badge">📝 ${stats.fields} fields</span>`,
      stats.relations ? `<span class="stat-badge">🔗 ${stats.relations} relations</span>` : '',
    ].join('');
    $('#status').innerHTML = `<span style="color:var(--gz-success)">✓ Converted</span> ${badges}`;
  } catch(e) {
    $('#output').textContent = '';
    $('#status').innerHTML = `<span style="color:var(--gz-accent)">Error: ${e.message}</span>`;
  }
}

  email VARCHAR(255) UNIQUE NOT NULL,
  name VARCHAR(100),
  role VARCHAR(20) DEFAULT 'user',
  is_active BOOLEAN DEFAULT TRUE,
  created_at TIMESTAMP DEFAULT NOW(),
  updated_at TIMESTAMP DEFAULT NOW()
);

CREATE TABLE posts (
  id SERIAL PRIMARY KEY,
  title VARCHAR(200) NOT NULL,
  content TEXT,
  published BOOLEAN DEFAULT FALSE,
  view_count INTEGER DEFAULT 0,
  author_id INTEGER NOT NULL,
  created_at TIMESTAMP DEFAULT NOW(),
  FOREIGN KEY (author_id) REFERENCES users(id)
);

CREATE TABLE comments (
  id SERIAL PRIMARY KEY,
  body TEXT NOT NULL,
  post_id INTEGER NOT NULL,
  user_id INTEGER NOT NULL,
  FOREIGN KEY (post_id) REFERENCES posts(id),
  FOREIGN KEY (user_id) REFERENCES users(id)
);`;
  doConvert();
}
