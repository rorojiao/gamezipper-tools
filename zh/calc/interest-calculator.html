<script type="application/ld+json">{"@context":"https://schema.org","@type":"WebApplication","name":"Interest Calculator","description":"Free universal interest calculator. Calculate simple interest, compound interest and continuous compound interest. See interest earned, total amount and growth instantly — no signup.","url": "https://tools.gamezipper.com/zh/calc/interest-calculator.html","applicationCategory":"FinanceApplication","operatingSystem":"Web Browser","offers":{"@type":"Offer","price":"0"}}</script>
<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is simple interest?", "acceptedAnswer": {"@type": "Answer", "text": "Simple interest is calculated only on the original principal using the formula I = P × R × T. It does not compound over time. The total amount is A = P(1 + RT). Simple interest is common for short-term loans, car loans and some bonds."}}, {"@type": "Question", "name": "What is compound interest?", "acceptedAnswer": {"@type": "Answer", "text": "Compound interest is calculated on the principal plus accumulated interest. The formula is A = P(1 + r/n)^(nt) where r is annual rate, n is compounding periods per year, and t is years. Compounding makes your money grow exponentially over time."}}, {"@type": "Question", "name": "What is continuous compound interest?", "acceptedAnswer": {"@type": "Answer", "text": "Continuous compounding is the mathematical limit of compound interest as compounding frequency approaches infinity. The formula is A = Pe^(rt) where e is Euler's number (~2.718). Continuous compounding gives the maximum possible return for a given nominal rate."}}, {"@type": "Question", "name": "Is this interest calculator free?", "acceptedAnswer": {"@type": "Answer", "text": "Yes, this universal interest calculator is 100% free, runs entirely in your browser, and requires no signup. Your data never leaves your device."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="gz-mode-tabs" id="modeTabs">
      <button class="gz-mode-tab active" data-mode="simple">Simple</button>
      <button class="gz-mode-tab" data-mode="compound">Compound</button>
      <button class="gz-mode-tab" data-mode="continuous">Continuous</button>
    </div>
    <div style="max-width:520px;margin:0 auto">
      <div class="gz-input-row">
        <label id="lbl-principal"></label>
        <input type="number" id="principal" value="1000" min="0" step="any">
      </div>
      <div class="gz-input-row">
        <label id="lbl-rate"></label>
        <input type="number" id="rate" value="5" min="0" step="0.01">
      </div>
      <div class="gz-input-row" id="freqRow" style="display:none">
        <label id="lbl-freq"></label>
        <select id="freq">
          <option value="1">1 — Annually</option>
          <option value="4">4 — Quarterly</option>
          <option value="12" selected>12 — Monthly</option>
          <option value="365">365 — Daily</option>
        </select>
      </div>
      <div class="gz-input-row">
        <label id="lbl-time"></label>
        <input type="number" id="time" value="3" min="0" step="0.5">
      </div>
      <div class="gz-input-row">
        <label id="lbl-unit"></label>
        <select id="unit">
          <option value="years" selected>Years</option>
          <option value="months">Months</option>
        </select>
      </div>
      <div class="gz-result-box" id="result"></div>
    </div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Interest Calculator',
    toolDesc: 'Calculate simple, compound and continuous interest. Universal calculator for loans, savings and investments.',
    principal: 'Principal amount ($)',
    rate: 'Annual interest rate (%)',
    freq: 'Compounding frequency (per year)',
    time: 'Time period',
    unit: 'Time unit',
    calc: 'Calculate',
    interestLabel: 'Total interest',
    totalAmount: 'Total amount',
    simple: 'Simple',
    compound: 'Compound',
    continuous: 'Continuous',
    years: 'Years',
    months: 'Months',
    step1: 'Choose interest type: simple, compound or continuous',
    step2: 'Enter principal, rate and time period',
    step3: 'For compound interest, pick the compounding frequency',
    step4: 'See the interest earned and total amount instantly',
  },
  zh: {
    toolTitle: '利息计算器',
    toolDesc: '计算单利、复利和连续复利。适用于贷款、储蓄和投资的万能计算器。',
    principal: '本金（美元）',
    rate: '年利率（%）',
    freq: '复利频率（每年次数）',
    time: '时间',
    unit: '时间单位',
    calc: '计算',
    interestLabel: '总利息',
    totalAmount: '总金额',
    simple: '单利',
    compound: '复利',
    continuous: '连续复利',
    years: '年',
    months: '月',
    step1: '选择利息类型：单利、复利或连续复利',
    step2: '输入本金、利率和期限',
    step3: '对于复利，请选择复利频率',
    step4: '即时查看赚取的利息和总金额',
  }
});

const { $, t } = GZ;
let currentMode = 'simple';

function calc() {
  const p = parseFloat($('#principal').value) || 0;
  const r = (parseFloat($('#rate').value) || 0) / 100;
  let timeVal = parseFloat($('#time').value) || 0;
  const unit = $('#unit').value;
  const years = unit === 'years' ? timeVal : timeVal / 12;
  const freq = parseInt($('#freq').value) || 12;

  let total = 0, interest = 0, formula = '';
  if (currentMode === 'simple') {
    interest = p * r * years;
    total = p + interest;
    formula = `I = P × R × T = $${p} × ${(r*100).toFixed(2)}% × ${years} ${t('years')}`;
  } else if (currentMode === 'compound') {
    total = p * Math.pow(1 + r / freq, freq * years);
    interest = total - p;
    formula = `A = P(1 + r/n)^(nt) = $${p}(1 + ${r}/${freq})^(${freq}×${years})`;
  } else {
    total = p * Math.exp(r * years);
    interest = total - p;
    formula = `A = Pe^(rt) = $${p} × e^(${r}×${years})`;
  }

  $('#result').innerHTML = `
    <div style="text-align:center;margin-bottom:12px">
      <div style="font-size:.8rem;color:var(--text2)">${t('interestLabel')}</div>
      <div class="gz-result-big">$${interest.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})}</div>
    </div>
    <div class="gz-result-row"><span class="gz-result-label">${t('totalAmount')}</span><span class="gz-result-value">$${total.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})}</span></div>
    <div class="gz-result-row"><span class="gz-result-label">${t('simple') === 'Simple' ? 'Formula' : '公式'}</span><span class="gz-result-value" style="font-size:.78rem">${formula}</span></div>
  `;
}

function setMode(mode) {
  currentMode = mode;
  document.querySelectorAll('.gz-mode-tab').forEach(t => t.classList.toggle('active', t.dataset.mode === mode));
  $('#freqRow').style.display = mode === 'compound' ? 'flex' : 'none';
  calc();
}

document.querySelectorAll('.gz-mode-tab').forEach(t => t.addEventListener('click', () => setMode(t.dataset.mode)));
['principal','rate','time','unit','freq'].forEach(id => $('#' + id).addEventListener('input', calc));

$('#toolbar').innerHTML = `<button class="gz-btn" onclick="calc()">${t('calc')}</button>`;

calc();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'💰', href:'/calc/apy-calculator.html', name:'APY Calculator'},
    {icon:'💳', href:'/calc/apr-calculator.html', name:'APR Calculator'},
    {icon:'📈', href:'/calc/compound-interest.html', name:'Compound Interest'},
    {icon:'🏦', href:'/calc/loan-calculator.html', name:'Loan Calculator'},
  ]
});
</script>
<script src="/tools-result-rec.js?v=20260707v520" defer></script>
</body>
</html>
