<div class="gz-container">

<script>
GZI18n.register({
  en: {
    toolTitle: 'Word to PDF Converter',
    toolDesc: 'Convert Word documents (.docx) to PDF online — drag, drop, preview and save as PDF. 100% in your browser, no upload, no signup, no watermark.',
    dropHint: 'Drop your .docx file here or click to browse',
    dropSub: 'Supports .docx — files never leave your browser',
    chooseFile: 'Choose File',
    printPdf: '🖨️ Download as PDF',
    clear: 'Clear',
    pageSize: 'Page Size',
    orientation: 'Orientation',
    loading: 'Reading document...',
    empty: 'Your document preview will appear here',
    converting: 'Converting to PDF...',
    ready: '✓ Ready — click Download as PDF',
    error: 'Could not read this file. Make sure it is a valid .docx document.',
    words: 'words',
    size: 'size',
    step1: 'Drag and drop your .docx Word file (or click to browse)',
    step2: 'Wait a moment — the document is read and previewed locally',
    step3: 'Pick page size (A4, Letter, etc.) and orientation',
    step4: 'Click Download as PDF and choose "Save as PDF" in the print dialog',
  },
  zh: {
    toolTitle: 'Word 转 PDF 转换器',
    toolDesc: '在线将 Word 文档（.docx）转换为 PDF — 拖放、预览并保存为 PDF。100% 浏览器本地运行，无需上传、无需注册、无水印。',
    dropHint: '拖放 .docx 文件到此处或点击选择',
    dropSub: '支持 .docx — 文件始终保留在浏览器中',
    chooseFile: '选择文件',
    printPdf: '🖨️ 下载为 PDF',
    clear: '清空',
    pageSize: '页面大小',
    orientation: '方向',
    loading: '正在读取文档...',
    empty: '文档预览将显示在这里',
    converting: '正在转换为 PDF...',
    ready: '✓ 已就绪 — 点击下载为 PDF',
    error: '无法读取此文件，请确认是有效的 .docx 文档。',
    words: '字',
    size: '大小',
    step1: '拖放 .docx Word 文件（或点击选择）',
    step2: '稍等片刻 — 文档将在本地读取并预览',
    step3: '选择页面大小（A4、Letter 等）和方向',
    step4: '点击「下载为 PDF」，在打印对话框中选择「另存为 PDF」',
  }
});

const { $, t } = GZ;
let pageSize = 'A4';
let orientation = 'portrait';
let lastFileName = 'document';

const dropZone = $('#dropZone');
const fileInput = $('#fileInput');
const preview = $('#preview');

$('#dropHint').textContent = t('dropHint');
$('#dropSub').textContent = t('dropSub');
$('#emptyMsg').textContent = t('empty');

dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('dragover'); handleFile(e.dataTransfer.files[0]); });
fileInput.addEventListener('change', e => handleFile(e.target.files[0]));

async function handleFile(file) {
  if (!file) return;
  if (!/\.docx$/i.test(file.name) && file.type !== 'application/vnd.openxmlformats-officedocument.wordprocessingml.document') {
    $('#status').innerHTML = `<span style="color:var(--gz-accent)">${t('error')}</span>`;
    return;
  }
  $('#status').textContent = t('loading');
  lastFileName = file.name.replace(/\.[^.]+$/, '') || 'document';
  const sizeStr = formatSize(file.size);

  try {
    const arrayBuffer = await file.arrayBuffer();
    const result = await window.mammoth.convertToHtml({ arrayBuffer });
    const html = result.value || '<p style="color:#888;text-align:center">(empty document)</p>';
    preview.innerHTML = html;

    // word count
    const wordCount = (html.replace(/<[^>]+>/g, ' ').trim().match(/\S+/g) || []).length;
    $('#meta').innerHTML = `<span>📄 ${esc(file.name)}</span><span>📝 ${wordCount} ${t('words')}</span><span>💾 ${sizeStr}</span>`;
    $('#status').innerHTML = `<span style="color:var(--gz-success)">${t('ready')}</span>`;
  } catch (err) {
    console.error(err);
    $('#status').innerHTML = `<span style="color:var(--gz-accent)">${t('error')}</span>`;
    preview.innerHTML = `<div class="w2p-empty">${t('error')}</div>`;
  }
}

function doPrint() {
  if (preview.querySelector('.w2p-empty')) return;
  $('#status').textContent = t('converting');
  const frame = $('#printFrame');
  const doc = frame.contentWindow.document;
  const style = `
    @page{size:${pageSize} ${orientation};margin:18mm}
    body{font-family:Georgia,'Times New Roman',serif;color:#222;line-height:1.7;margin:0}
    h1,h2,h3,h4{font-family:-apple-system,'Segoe UI',Roboto,sans-serif;color:#111;line-height:1.3}
    h1{font-size:1.9em;border-bottom:2px solid #222;padding-bottom:6px}
    h2{font-size:1.5em}h3{font-size:1.2em}
    p{margin:.75em 0}
    ul,ol{padding-left:1.6em}li{margin:.3em 0}
    table{border-collapse:collapse;width:100%;margin:.8em 0}
    th,td{border:1px solid #bbb;padding:7px 11px;text-align:left;vertical-align:top}
    th{background:#eef2f7;font-weight:700}
    img{max-width:100%;height:auto}
    a{color:#1976d2}
    blockquote{border-left:4px solid #4ecdc4;background:#f6fbfa;padding:10px 16px;margin:.8em 0;color:#444}
    code{background:#f3f3f3;padding:2px 6px;border-radius:4px;font-family:Menlo,monospace;color:#c7254e}
  `;
  doc.open();
  doc.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>${esc(lastFileName)}</title><style>${style}</style></head><body>${preview.innerHTML}</body></html>`);
  doc.close();
  frame.onload = () => {
    frame.contentWindow.focus();
    frame.contentWindow.print();
    $('#status').innerHTML = `<span style="color:var(--gz-success)">${t('ready')}</span>`;
  };
  // Fallback if onload doesn't fire (already loaded)
  setTimeout(() => {
    try { frame.contentWindow.focus(); frame.contentWindow.print(); } catch(e){}
    $('#status').innerHTML = `<span style="color:var(--gz-success)">${t('ready')}</span>`;
  }, 600);
}

function doClear() {
  preview.innerHTML = `<div class="w2p-empty">${t('empty')}</div>`;
  $('#meta').innerHTML = '';
  $('#status').textContent = '';
  fileInput.value = '';
}

function formatSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / 1048576).toFixed(2) + ' MB';
}
function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="doPrint()">${t('printPdf')}</button>
  <select class="w2p-select" onchange="pageSize=this.value" aria-label="${t('pageSize')}">
    <option value="A4">A4</option>
    <option value="Letter">Letter</option>
    <option value="A3">A3</option>
    <option value="A5">A5</option>
    <option value="Legal">Legal</option>
  </select>
  <select class="w2p-select" onchange="orientation=this.value" aria-label="${t('orientation')}">
    <option value="portrait">📑 Portrait</option>
    <option value="landscape">📗 Landscape</option>
  </select>
  <button class="gz-btn gz-btn-secondary" onclick="fileInput.click()">📁 ${t('chooseFile')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

GZ.renderToolPage({
  category: 'convert',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📊', href:'/convert/excel-to-pdf.html', name:'Excel to PDF'},
    {icon:'🖼️', href:'/convert/image-to-pdf.html', name:'Image to PDF'},
    {icon:'📄', href:'/convert/html-to-pdf.html', name:'HTML to PDF'},
    {icon:'📄', href:'/convert/pdf-to-text.html', name:'PDF to Text'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
