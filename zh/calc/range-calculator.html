<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"How do I calculate the range?","acceptedAnswer":{"@type":"Answer","text":"The range is the difference between the maximum and minimum values in your data set. Formula: Range = Maximum − Minimum. For example, the range of 3, 7, 8, 12, 15 is 15 − 3 = 12."}},{"@type":"Question","name":"What is the midrange?","acceptedAnswer":{"@type":"Answer","text":"The midrange is the average of the maximum and minimum values: (Max + Min) ÷ 2. It gives a rough measure of the center of your data."}},{"@type":"Question","name":"What does a large range mean?","acceptedAnswer":{"@type":"Answer","text":"A large range means the data is spread out widely — the difference between the largest and smallest values is big. A small range means the numbers are clustered closely together."}},{"@type":"Question","name":"Is range the same as standard deviation?","acceptedAnswer":{"@type":"Answer","text":"No. Range only considers the two extreme values (max and min), while standard deviation considers how far every number is from the mean. Standard deviation is a more robust measure of spread."}}]}</script>

<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div>
      <label style="font-size:.85em;font-weight:500" id="lbl-input">Enter numbers (separated by commas, spaces, or new lines)</label>
      <textarea class="rg-input" id="input" spellcheck="false" placeholder="e.g. 3, 7, 8, 12, 15, 22, 30"></textarea>
    </div>
    <div class="rg-err" id="err"></div>
    <div class="rg-grid">
      <div class="rg-card">
        <h3>📊 Results</h3>
        <div class="rg-results" id="results">
          <div class="rg-stat rg-stat-highlight"><div class="rg-stat-label">Range</div><div class="rg-stat-value" id="r-range">—</div></div>
          <div class="rg-stat rg-stat-highlight"><div class="rg-stat-label">Midrange</div><div class="rg-stat-value" id="r-mid">—</div></div>
          <div class="rg-stat"><div class="rg-stat-label">Minimum</div><div class="rg-stat-value" id="r-min">—</div></div>
          <div class="rg-stat"><div class="rg-stat-label">Maximum</div><div class="rg-stat-value" id="r-max">—</div></div>
          <div class="rg-stat"><div class="rg-stat-label">Count</div><div class="rg-stat-value" id="r-count">—</div></div>
          <div class="rg-stat"><div class="rg-stat-label">Sum</div><div class="rg-stat-value" id="r-sum">—</div></div>
        </div>
      </div>

      </div>
    </div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Range Calculator',
    toolDesc: 'Calculate the range, midrange, minimum, maximum, count and sum of any set of numbers. Sorted output and step-by-step breakdown — free, private and browser-based.',
    step1: 'Type or paste your numbers separated by commas, spaces, or new lines',
    step2: 'The range and related statistics update instantly as you type',
    step3: 'View the range, midrange, min and max in the results panel',
    step4: 'Use Copy to copy the result to your clipboard',
  },
  zh: {
    toolTitle: '极差计算器',
    toolDesc: '计算任意数字集合的极差、中程数、最小值、最大值、个数和总和。排序输出和逐步分解 — 免费、私密、浏览器本地运行。',
    step1: '输入或粘贴数字，用逗号、空格或换行分隔',
    step2: '极差和相关统计数据会随输入即时更新',
    step3: '在结果面板查看极差、中程数、最小值和最大值',
    step4: '点击「复制」将结果复制到剪贴板',
  }
});

const { $, copyText, t } = GZ;

function fmt(n) {
  if (!isFinite(n)) return '∞';
  return parseFloat(n.toFixed(8)).toString();
}

function parse() {
  const raw = $('#input').value.trim();
  if (!raw) return [];
  return raw.split(/[\s,;]+/).map(s => parseFloat(s)).filter(n => !isNaN(n));
}

function calculate() {
  const err = $('#err');
  err.textContent = '';
  const nums = parse();
  if (nums.length === 0) {
    ['range','mid','min','max','count','sum'].forEach(k => $('#r-' + k).textContent = '—');
    $('#steps').textContent = 'Enter numbers to see the breakdown.';
    return;
  }
  if (nums.length === 1) {
    err.textContent = '⚠ Enter at least 2 numbers for a meaningful range';
  }
  const sorted = [...nums].sort((a, b) => a - b);
  const n = sorted.length;
  const min = sorted[0];
  const max = sorted[n - 1];
  const range = max - min;
  const midrange = (min + max) / 2;
  const sum = nums.reduce((a, b) => a + b, 0);

  $('#r-range').textContent = fmt(range);
  $('#r-mid').textContent = fmt(midrange);
  $('#r-min').textContent = fmt(min);
  $('#r-max').textContent = fmt(max);
  $('#r-count').textContent = n;
  $('#r-sum').textContent = fmt(sum);

  let steps = `Numbers: ${nums.map(fmt).join(', ')}\n`;
  steps += `Sorted:  ${sorted.map(fmt).join(', ')}\n\n`;
  steps += `Minimum = ${fmt(min)}\n`;
  steps += `Maximum = ${fmt(max)}\n\n`;
  steps += `Range = Max − Min\n      = ${fmt(max)} − ${fmt(min)}\n      = ${fmt(range)}\n\n`;
  steps += `Midrange = (Max + Min) ÷ 2\n         = (${fmt(max)} + ${fmt(min)}) ÷ 2\n         = ${fmt(midrange)}\n`;

  $('#steps').textContent = steps;
}

function loadExample() { $('#input').value = '12, 45, 67, 23, 89, 34, 56'; calculate(); }
function doClear() { $('#input').value = ''; calculate(); }

$('#input').addEventListener('input', calculate);

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn" onclick="copyText($('#r-range').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📊', href:'/calc/mean-median-mode-calculator.html', name:'Mean Median Mode'},
    {icon:'📈', href:'/calc/standard-deviation-calculator.html', name:'Standard Deviation'},
    {icon:'🧮', href:'/calc/percentage-difference-calculator.html', name:'Percentage Difference'},
    {icon:'🔢', href:'/calc/quartile-calculator.html', name:'Quartile Calculator'},
  ]
});

calculate();
</script>
