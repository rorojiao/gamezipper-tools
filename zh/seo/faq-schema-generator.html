<body>
<div class="gz-container">
  <div class="gz-tool-header"><h1 id="title"></h1><p class="desc" id="desc"></p></div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <p style="color:var(--text2);margin-bottom:10px">Enter one FAQ per block using this format: question on the first line, answer on the lines below. Separate blocks with a blank line.</p>
    <textarea id="input" rows="12" style="width:100%;margin-bottom:12px;background:rgba(0,0,0,.3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:1rem;color:var(--text)"></textarea>
    <textarea id="output" readonly rows="16" style="width:100%;background:rgba(0,0,0,.3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:1rem;color:var(--text)"></textarea>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({en:{toolTitle:'FAQ Schema Generator',toolDesc:'Convert FAQ content into FAQPage JSON-LD for knowledge base pages, product pages, and tool pages.',step1:'Write one question on the first line and the answer below it.',step2:'Separate each FAQ block with a blank line.',step3:'Copy the generated JSON-LD into your page head or template.'},zh:{toolTitle:'FAQ Schema 生成器',toolDesc:'把 FAQ 文案转换成 FAQPage JSON-LD，适合知识库页、产品页和工具页。',step1:'每个 FAQ 第一行写问题，下面写答案。',step2:'不同 FAQ 之间空一行。',step3:'把生成的 JSON-LD 复制到页面 head 或模板中。'}});
const {$,copyText,t}=GZ;
function gen(){
  const blocks=$('#input').value.split(/\n\s*\n+/).map(b=>b.trim()).filter(Boolean);
  const items=blocks.map(b=>{const lines=b.split('\n'); return {q:(lines.shift()||'').trim(), a:lines.join('\n').trim()};}).filter(x=>x.q&&x.a).map(x=>({"@type":"Question",name:x.q,acceptedAnswer:{"@type":"Answer",text:x.a}}));
  $('#output').value=JSON.stringify({"@context":"https://schema.org","@type":"FAQPage",mainEntity:items},null,2);
}
function example(){ $('#input').value='What does this tool do?\nIt converts FAQ content into valid FAQPage JSON-LD markup.\n\nHow many FAQ items can I add?\nAdd as many as you need. Each block becomes one Question object.'; gen(); }
$('#input').addEventListener('input',gen);
$('#toolbar').innerHTML=`<button class="gz-btn" onclick="gen()">Generate</button><button class="gz-btn gz-btn-secondary" onclick="example()">${t('example')}</button><button class="gz-btn" onclick="copyText($('#output').value)">${t('copy')}</button><button class="gz-btn gz-btn-secondary" onclick="$('#input').value='';gen()">${t('clear')}</button>`;
GZ.renderToolPage({category:'seo',titleKey:'toolTitle',descKey:'toolDesc',howToSteps:['step1','step2','step3'],related:[{icon:'🏷️',href:'/seo/meta-tag-generator.html',name:'Meta Tag Generator'},{icon:'🤖',href:'/seo/robots-txt-generator.html',name:'Robots.txt Generator'},{icon:'🖼️',href:'/seo/open-graph-generator.html',name:'Open Graph Generator'}]});
example();
</script>

</body>
