<script>
GZI18n.register({
  en: {
    toolTitle: 'WebP to PNG Converter',
    toolDesc: 'Convert WebP images to PNG format instantly in your browser. Free, private, no upload needed.',
    dropTitle: 'Drop WebP file here or click to browse',
    dropHint: 'Supports .webp files — processed locally in browser',
    download: 'Download PNG',
    convertAnother: 'Convert Another',
    fileName: 'File Name',
    origSize: 'Original Size',
    pngSize: 'PNG Size',
    dimensions: 'Dimensions',
    step1: 'Drag and drop a WebP image or click to browse',
    step2: 'The image is converted to PNG format instantly',
    step3: 'Preview the converted PNG image',
    step4: 'Click Download to save the PNG file',
  },
  zh: {
    toolTitle: 'WebP 转 PNG 转换器',
    toolDesc: '在浏览器中即时将 WebP 图片转换为 PNG 格式。免费、隐私、无需上传。',
    dropTitle: '拖放 WebP 文件到此处或点击浏览',
    dropHint: '支持 .webp 文件 — 在浏览器本地处理',
    download: '下载 PNG',
    convertAnother: '继续转换',
    fileName: '文件名',
    origSize: '原始大小',
    pngSize: 'PNG 大小',
    dimensions: '尺寸',
    step1: '拖放 WebP 图片或点击浏览',
    step2: '图片即时转换为 PNG 格式',
    step3: '预览转换后的 PNG 图片',
    step4: '点击「下载 PNG」保存文件',
  }
});

const { $, t } = GZ;
let pngBlob = null;

function formatSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / 1048576).toFixed(2) + ' MB';
}

function convertWebPToPNG(file) {
  if (!file || !file.type.includes('webp')) {
    alert('Please select a WebP image file.');
    return;
  }
  const reader = new FileReader();
  reader.onload = function(e) {
    const img = new Image();
    img.onload = function() {
      const canvas = document.createElement('canvas');
      canvas.width = img.naturalWidth;
      canvas.height = img.naturalHeight;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0);
      canvas.toBlob(function(blob) {
        pngBlob = blob;
        const url = URL.createObjectURL(blob);
        $('#preview').src = url;
        $('#dropzone').style.display = 'none';
        $('#result').style.display = '';
        $('#info-grid').innerHTML = `
          <div class="info-item"><div class="label">${t('fileName')}</div><div class="value">${file.name}</div></div>
          <div class="info-item"><div class="label">${t('dimensions')}</div><div class="value">${img.naturalWidth} × ${img.naturalHeight}</div></div>
          <div class="info-item"><div class="label">${t('origSize')}</div><div class="value">${formatSize(file.size)}</div></div>
          <div class="info-item"><div class="label">${t('pngSize')}</div><div class="value">${formatSize(blob.size)}</div></div>`;
      }, 'image/png');
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function downloadPNG() {
  if (!pngBlob) return;
  const a = document.createElement('a');
  a.href = URL.createObjectURL(pngBlob);
  a.download = 'converted.png';
  a.click();
  URL.revokeObjectURL(a.href);
}

function resetTool() {
  pngBlob = null;
  $('#preview').src = '';
  $('#result').style.display = 'none';
  $('#dropzone').style.display = '';
  $('#fileInput').value = '';
}

// Event handlers
const dz = $('#dropzone');
dz.addEventListener('click', () => $('#fileInput').click());
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('dragover'); });
dz.addEventListener('dragleave', () => dz.classList.remove('dragover'));
dz.addEventListener('drop', e => { e.preventDefault(); dz.classList.remove('dragover'); if (e.dataTransfer.files[0]) convertWebPToPNG(e.dataTransfer.files[0]); });
$('#fileInput').addEventListener('change', e => { if (e.target.files[0]) convertWebPToPNG(e.target.files[0]); });

$('#drop-title').textContent = t('dropTitle');
$('#drop-hint').textContent = t('dropHint');

$('#toolbar').innerHTML = `
  <button class="gz-btn" id="btn-download" onclick="downloadPNG()" style="display:none">${t('download')}</button>
  <button class="gz-btn gz-btn-secondary" id="btn-reset" onclick="resetTool()" style="display:none">${t('convertAnother')}</button>`;

// Show/hide buttons when result appears
const observer = new MutationObserver(() => {
  const show = $('#result').style.display !== 'none';
  $('#btn-download').style.display = show ? '' : 'none';
  $('#btn-reset').style.display = show ? '' : 'none';
});
observer.observe($('#result'), { attributes: true, attributeFilter: ['style'] });

GZ.renderToolPage({
  category: 'convert',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🔄', href:'/convert/webp-converter.html', name:'WebP Converter'},
    {icon:'🖼️', href:'/convert/png-to-jpg.html', name:'PNG to JPG'},
    {icon:'🔄', href:'/convert/heic-to-jpg.html', name:'HEIC to JPG'},
    {icon:'🗜️', href:'/image/compressor.html', name:'Image Compressor'},
  ]
});
</script>
