<script type="application/ld+json">{"@context":"https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is text density?", "acceptedAnswer": {"@type": "Answer", "text": "Text density is a measure of how much information is packed into a piece of writing, usually expressed as words per sentence or characters per sentence. Higher density means fewer but longer sentences (typical of academic or technical writing); lower density means shorter, more readable sentences (typical of marketing copy). Most style guides recommend an average of 15–20 words per sentence for general audiences."}}, {"@type": "Question", "name": "How does the heatmap work?", "acceptedAnswer": {"@type": "Answer", "text": "Each sentence is colored on a green-yellow-red scale based on its length in words. Short, readable sentences appear green; medium sentences are yellow; long, dense sentences (>30 words) are red. This makes it easy to scan a paragraph and spot sentences that may be too long or too short for the target audience."}}, {"@type": "Question", "name": "Why is sentence-length variation important?", "acceptedAnswer": {"@type": "Answer", "text": "Mixing sentence lengths keeps readers engaged. A paragraph of nothing-but-30-word sentences feels exhausting; a paragraph of nothing-but-3-word sentences feels choppy. The density chart highlights imbalance so you can vary your rhythm — short, medium, long, medium, short — for natural flow."}}, {"@type": "Question", "name": "Is my text kept private?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. All analysis runs locally in your browser using JavaScript. No sentence or word is ever sent to any server, and nothing is stored after you close the tab."}}]}</script>

<script>
GZI18n.register({
  en: {
    toolTitle: 'Text Density Analyzer',
    toolDesc: 'Visualize sentence density and content balance in any document with a heatmap. Spot long/short sentences, see paragraph weight distribution, and tune your writing rhythm — perfect for SEO editors and content writers.',
    lblIn: 'Text to analyze',
    analyze: 'Analyze',
    example: 'Load example',
    clear: 'Clear',
    hHeatmap: 'Sentence-level heatmap',
    hParas: 'Paragraph density',
    step1: 'Paste an article, blog post or any document',
    step2: 'Watch the heatmap and per-paragraph density update live as you type',
    step3: 'Look for color clusters — too much red means too many long sentences',
    step4: 'Edit your text or use the insights to balance sentence length',
    legShort: 'Short (≤8 words)',
    legMedium: 'Medium (9–22)',
    legLong: 'Long (23–35)',
    legVery: 'Very long (>35)',
    statWords: 'words',
    statSent: 'sentences',
    statParas: 'paragraphs',
    statAvg: 'avg words/sent',
    statLong: 'longest sent',
    statShort: 'shortest sent',
  },
  zh: {
    toolTitle: '文本密度分析器',
    toolDesc: '可视化任意文档的句子密度和内容平衡 — 热力图高亮长短句，查看段落权重分布，调整写作节奏。适合 SEO 编辑和内容作者。',
    lblIn: '要分析的文本',
    analyze: '分析',
    example: '加载示例',
    clear: '清空',
    hHeatmap: '句子级热力图',
    hParas: '段落密度',
    step1: '粘贴文章、博客或任意文档',
    step2: '实时查看热力图和段落密度随编辑更新',
    step3: '关注颜色聚集 — 红色过多说明长句太多',
    step4: '使用洞察平衡句子长度',
    legShort: '短句（≤8词）',
    legMedium: '中等（9–22）',
    legLong: '长句（23–35）',
    legVery: '超长（>35）',
    statWords: '词数',
    statSent: '句数',
    statParas: '段落数',
    statAvg: '平均词数/句',
    statLong: '最长句',
    statShort: '最短句',
  }
});

const { $, copyText, t } = GZ;

const STOPWORDS = new Set(['the','a','an','and','or','but','is','are','was','were','be','been','being','have','has','had','do','does','did','will','would','shall','should','may','might','must','can','could','of','in','on','at','to','for','with','by','from','as','into','through','during','before','after','above','below','between','out','off','over','under','again','further','then','once','here','there','when','where','why','how','all','any','both','each','few','more','most','other','some','such','no','nor','not','only','own','same','so','than','too','very','s','t','just','don','now']);

function splitSentences(text) {
  return text.replace(/\n+/g,' ').match(/[^.!?。！？]+[.!?。！？]+["')\]]*|[^.!?。！？]+$/g) || [];
}

function countWords(text) {
  const m = text.match(/[\w'\u00C0-\u024F\u4E00-\u9FFF]+/g);
  return m ? m.length : 0;
}

function colorForLen(n) {
  if (n <= 8) return '#00d672';
  if (n <= 22) return '#a5d90c';
  if (n <= 35) return '#f0c419';
  return '#ff6b6b';
}

function render() {
  const inp = $('#input').value;
  if (!inp.trim()) {
    $('#stats').innerHTML = '';
    $('#heatmap').innerHTML = '';
    $('#paragraphs').innerHTML = '';
    return;
  }

  const paragraphs = inp.split(/\n\s*\n+/);
  let totalWords = 0;
  let totalSents = 0;
  const allSents = [];

  paragraphs.forEach((p, pi) => {
    const sents = splitSentences(p);
    const pWords = sents.reduce((s, x) => s + countWords(x), 0);
    totalWords += pWords;
    totalSents += sents.length;
    sents.forEach(s => allSents.push({ text: s.trim(), len: countWords(s), pi }));
  });

  const avg = totalSents > 0 ? (totalWords / totalSents).toFixed(1) : '0';
  const longest = allSents.reduce((m, x) => x.len > m.len ? x : m, {len:0,text:''});
  const shortest = allSents.reduce((m, x) => (m.len === 0 || x.len < m.len) && x.len > 0 ? x : m, {len:0,text:''});

  $('#stats').innerHTML =
    `<div class="td-stat"><div class="v">${totalWords.toLocaleString()}</div><div class="l">${t('statWords')}</div></div>` +
    `<div class="td-stat"><div class="v">${totalSents}</div><div class="l">${t('statSent')}</div></div>` +
    `<div class="td-stat"><div class="v">${paragraphs.filter(p => p.trim()).length}</div><div class="l">${t('statParas')}</div></div>` +
    `<div class="td-stat"><div class="v">${avg}</div><div class="l">${t('statAvg')}</div></div>` +
    `<div class="td-stat"><div class="v">${longest.len}</div><div class="l">${t('statLong')}</div></div>` +
    `<div class="td-stat"><div class="v">${shortest.len || '—'}</div><div class="l">${t('statShort')}</div></div>`;

  // Heatmap
  $('#heatmap').innerHTML = allSents.map(s => {
    const c = colorForLen(s.len);
    return `<span class="td-sent" style="background:${c}33;color:${c};border:1px solid ${c}55" title="P${s.pi+1} • ${s.len} words">${escapeHtml(s.text)}</span>`;
  }).join(' ');

  $('#legend').innerHTML =
    `<span><i style="background:#00d672"></i>${t('legShort')}</span>` +
    `<span><i style="background:#a5d90c"></i>${t('legMedium')}</span>` +
    `<span><i style="background:#f0c419"></i>${t('legLong')}</span>` +
    `<span><i style="background:#ff6b6b"></i>${t('legVery')}</span>`;

  // Per-paragraph
  const maxW = Math.max(...paragraphs.map(p => p.trim() ? p.split(/[.!?。！？]+/).filter(Boolean).reduce((s,x) => s + countWords(x), 0) : 0), 1);
  $('#paragraphs').innerHTML = paragraphs.map((p, i) => {
    if (!p.trim()) return '';
    const sents = splitSentences(p);
    const w = sents.reduce((s, x) => s + countWords(x), 0);
    const pct = (w / maxW) * 100;
    const preview = p.trim().slice(0, 90) + (p.length > 90 ? '…' : '');
    return `<div class="td-para">
      <div class="txt"><b>P${i+1}.</b> ${escapeHtml(preview)}</div>
      <div class="bar"><i style="width:${pct}%"></i></div>
      <div class="meta">${sents.length} sent<br>${w} words</div>
    </div>`;
  }).join('');
}

function escapeHtml(s) {
  return s.replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' })[c]);
}

function loadExample() {
  $('#input').value = `Good writing is short sentences. Short sentences are easy to read.\n\nThe cat sat on the mat. It was a sunny day. The cat purred softly.\n\nHowever, sometimes we need longer sentences to convey complex ideas — like this one, which uses commas, clauses, and a dash to pack in more information than a short sentence could possibly hope to communicate without losing the reader entirely.\n\nShort again. Easy. Done.`;
  render();
}

function doClear() {
  $('#input').value = '';
  render();
}

$('#input').addEventListener('input', () => setTimeout(render, 150));

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="render()">${t('analyze')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📊', href:'/text/keyword-density.html', name:'Keyword Density'},
    {icon:'📈', href:'/text/word-frequency.html', name:'Word Frequency'},
    {icon:'📖', href:'/text/readability-score.html', name:'Readability Score'},
    {icon:'📝', href:'/text/word-counter.html', name:'Word Counter'},
  ]
});
</script>
