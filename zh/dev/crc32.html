<script>

  en: {

    toolDesc: 'Compute the CRC-32 (IEEE 802.3 / ZIP / PNG) checksum of any text or file — hex and decimal output, instant results.',
    lblDrop: 'Drop a file here or click to upload (file CRC32)',
    copy: 'Copy',

    step4: 'For security use SHA-256 instead — CRC32 is only for error detection',
  },
  zh: {
    toolTitle: 'CRC32 哈希计算器',
    toolDesc: '计算任意文本或文件的 CRC-32（IEEE 802.3 / ZIP / PNG）校验和 — 输出十六进制和十进制，即时计算。',
    lblDrop: '拖拽文件到此处或点击上传（计算文件 CRC32）',
    copy: '复制',
    clear: '清除',
    example: '示例',
    hex: 'CRC32（十六进制）',
    dec: 'CRC32（十进制）',
    bin: 'CRC32（二进制）',
    bytes: '输入字节数',
    step1: '在上方输入文本，或将文件拖到上传区',
    step2: '输入时即时更新 CRC-32 校验和',
    step3: '复制十六进制值用于代码、配置或链接',
    step4: '安全场景请改用 SHA-256 — CRC32 仅用于错误检测',
  }
});

const { $, copyText, t } = GZ;

// Build CRC-32 (IEEE 802.3, reflected) lookup table
const CRC_TABLE = (() => {
  const table = new Uint32Array(256);
  for (let i = 0; i < 256; i++) {
    let c = i;
    for (let k = 0; k < 8; k++) c = (c & 1) ? (0xEDB88320 ^ (c >>> 1)) : (c >>> 1);
    table[i] = c >>> 0;
  }
  return table;
})();

function crc32(bytes) {
  let crc = 0xFFFFFFFF;
  for (let i = 0; i < bytes.length; i++) crc = CRC_TABLE[(crc ^ bytes[i]) & 0xFF] ^ (crc >>> 8);
  return (crc ^ 0xFFFFFFFF) >>> 0;
}

function fmtResult(bytes) {
  const v = crc32(bytes);
  const hex = v.toString(16).padStart(8, '0').toUpperCase();
  const dec = v.toString(10);
  const bin = v.toString(2).padStart(32, '0');
  return `
    <div class="hash-row"><label>${t('hex')}</label><span class="val">${hex}</span>
      <button class="gz-btn gz-btn-secondary" onclick="GZ.copyText('${hex}')">${t('copy')}</button></div>
    <div class="hash-row"><label>${t('dec')}</label><span class="val">${dec}</span>
      <button class="gz-btn gz-btn-secondary" onclick="GZ.copyText('${dec}')">${t('copy')}</button></div>
    <div class="hash-row"><label>${t('bin')}</label><span class="val" style="font-size:.8em">${bin}</span></div>
    <div class="hash-row"><label>${t('bytes')}</label><span class="val">${bytes.length}</span></div>`;
}

function calcText() {
  const txt = $('#input').value;
  if (!txt) { $('#output').innerHTML = ''; return; }
  const bytes = new TextEncoder().encode(txt);
  $('#output').innerHTML = fmtResult(bytes);
}

$('#input').addEventListener('input', calcText);

const dz = $('#dropZone');
dz.addEventListener('click', () => $('#fileInput').click());
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('dragover'); });
dz.addEventListener('dragleave', () => dz.classList.remove('dragover'));
dz.addEventListener('drop', e => {
  e.preventDefault(); dz.classList.remove('dragover');
  const f = e.dataTransfer.files[0]; if (f) readFile(f);
});
$('#fileInput').addEventListener('change', e => { const f = e.target.files[0]; if (f) readFile(f); });

function readFile(f) {
  if (f.size > 50 * 1024 * 1024) { alert('File too large (>50MB).'); return; }
  const r = new FileReader();
  r.onload = () => { $('#output').innerHTML = fmtResult(new Uint8Array(r.result)); };
  r.readAsArrayBuffer(f);
}

$('#toolbar').innerHTML = `
  <button class="gz-btn gz-btn-secondary" onclick="$('#input').value='Hello, GameZipper!';calcText()">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#input').value='';$('#output').innerHTML='';$('#fileInput').value=''">${t('clear')}</button>`;

    {icon:'🔑', href:'/dev/base64.html', name:'Base64'},
  ]
});
