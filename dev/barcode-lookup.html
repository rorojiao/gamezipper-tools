function calcCheckDigit(digits) {
  // UPC/EAN check digit: sum of (odd positions *1) + (even positions *3), check = (10 - sum%10) % 10
  // Note: positions counted from left, 1-indexed, last digit excluded
  let sum = 0;
  for (let i = 0; i < digits.length; i++) {
    const d = parseInt(digits[i]);
    sum += (i % 2 === 0) ? d : d * 3;
  }
  return (10 - (sum % 10)) % 10;
}

function lookup() {
  let raw = $('#input').value.trim();
  const digits = raw.replace(/\D/g, '');
  if (!digits) { $('#result').innerHTML = `<p style="color:var(--text2);margin-top:14px">${t('enterBarcode')}</p>`; return; }

  let type = '', valid = false, checkDigit = '', calcCheck = '', country = '', companyPrefix = '', productCode = '', extra = '';

  if (/^97[89]/.test(digits) && digits.length === 13) {
    // ISBN-13
    type = 'ISBN-13';
    checkDigit = digits[12];
    calcCheck = calcCheckDigit(digits.slice(0, 12));
    valid = checkDigit === String(calcCheck);
    const isbn10core = digits.slice(3, 12);
    // Convert to ISBN-10
    let isbn10sum = 0;
    for (let i = 0; i < 9; i++) isbn10sum += parseInt(isbn10core[i]) * (10 - i);
    let isbn10check = (11 - (isbn10sum % 11)) % 11;
    let isbn10 = isbn10core + (isbn10check === 10 ? 'X' : isbn10check);
    extra = `ISBN-10: <span class="val">${isbn10}</span>`;
  } else if (digits.length === 13) {
    type = 'EAN-13';
    checkDigit = digits[12];
    calcCheck = calcCheckDigit(digits.slice(0, 12));
    valid = checkDigit === String(calcCheck);
    const prefix = digits.slice(0, 3);
    country = gs1Countries[prefix] || gs1Countries[digits.slice(0,2)] || 'Unknown';
    companyPrefix = digits.slice(0, 7);
    productCode = digits.slice(7, 12);
  } else if (digits.length === 12) {
    type = 'UPC-A';
    checkDigit = digits[11];
    // UPC-A check digit: odd*3 + even*1 (different from EAN-13)
    let sum = 0;
    for (let i = 0; i < 11; i++) sum += (i % 2 === 0 ? 3 : 1) * parseInt(digits[i]);
    calcCheck = (10 - (sum % 10)) % 10;
    valid = checkDigit === String(calcCheck);
    country = 'US/Canada';
    companyPrefix = digits.slice(0, 6);
    productCode = digits.slice(6, 11);
  } else if (digits.length === 8) {
    type = 'EAN-8';
    checkDigit = digits[7];
    calcCheck = calcCheckDigit(digits.slice(0, 7));
    valid = checkDigit === String(calcCheck);
    country = gs1Countries[digits.slice(0,3)] || 'Unknown';
    productCode = digits.slice(0, 7);
  } else {
    $('#result').innerHTML = `<div class="bl-result"><p style="color:var(--accent)">⚠ ${t('invalid')} — ${digits.length} digits. Expected 8 (EAN-8), 12 (UPC-A), or 13 (EAN-13/ISBN).</p></div>`;
    return;
  }

  const statusClass = valid ? 'bl-valid' : 'bl-invalid';
  const statusText = valid ? t('valid') : t('invalid');

  let html = `<div class="bl-result">`;
  html += `<div style="margin-bottom:12px"><span class="bl-type">${type}</span> <span class="${statusClass}" style="font-size:1.1em">${statusText}</span></div>`;
  html += `<div class="bl-row"><span class="key">${t('digits')}</span><span class="val">${digits}</span></div>`;
  html += `<div class="bl-row"><span class="key">${t('checkDigit')}</span><span class="val">${checkDigit}</span></div>`;
  html += `<div class="bl-row"><span class="key">${t('calculatedCheck')}</span><span class="val">${calcCheck} ${valid ? '✓' : '✗'}</span></div>`;
  if (country) html += `<div class="bl-row"><span class="key">${t('countryPrefix')}</span><span class="val">${country}</span></div>`;
  if (companyPrefix) html += `<div class="bl-row"><span class="key">${t('companyPrefix')}</span><span class="val">${companyPrefix}</span></div>`;
  if (productCode) html += `<div class="bl-row"><span class="key">${t('productCode')}</span><span class="val">${productCode}</span></div>`;
  if (extra) html += `<div class="bl-row"><span class="key">${t('isbnInfo')}</span><span class="val">${extra}</span></div>`;
  html += `</div>`;
  $('#result').innerHTML = html;
}
