<script>
GZI18n.register({
  en: {
    toolTitle: 'URL Slug Generator',
    toolDesc: 'Convert any text into clean, SEO-friendly URL slugs. Handles Unicode transliteration, stop word removal, and custom separators.',
    generate: 'Generate Slug',
    copy: 'Copy Slug',
    copied: 'Copied!',
    preview: 'URL Preview',
    chars: 'chars',
    words: 'words',
    step1: 'Enter your page title or text in the input box',
    step2: 'Configure options: lowercase, transliteration, separator',
    step3: 'The slug is generated instantly as you type',
    step4: 'Copy the slug and use it in your URL structure',
  },
  zh: {
    toolTitle: 'URL Slug 生成器',
    toolDesc: '将任意文本转换为简洁的 SEO 友好 URL Slug。支持 Unicode 音译、停用词移除和自定义分隔符。',
    generate: '生成 Slug',
    copy: '复制 Slug',
    copied: '已复制！',
    preview: 'URL 预览',
    chars: '字符',
    words: '词',
    step1: '在输入框中输入页面标题或文本',
    step2: '配置选项：小写、音译、分隔符',
    step3: '输入时即时生成 slug',
    step4: '复制 slug 并在 URL 结构中使用',
  }
});

const { $, copyText, t } = GZ;

const STOP_WORDS = new Set(['a','an','the','and','or','but','in','on','at','to','for','of','with','by','is','it','this','that','are','was','were','be','been','have','has','had','do','does','did','will','would','could','should','may','might','can','shall','not','no','nor','so','if','then','than','too','very','just','about','above','after','again','all','am','any','as','because','before','below','between','both','during','each','few','further','get','here','how','into','more','most','new','now','only','other','our','out','own','same','she','some','such','them','there','these','they','those','through','under','until','up','we','what','when','where','which','while','who','whom','why','you','your']);

// Unicode transliteration map (common characters)
const TRANSLIT = {
  'à':'a','á':'a','â':'a','ã':'a','ä':'a','å':'a','ā':'a',
  'è':'e','é':'e','ê':'e','ë':'e','ē':'e',
  'ì':'i','í':'i','î':'i','ï':'i','ī':'i',
  'ò':'o','ó':'o','ô':'o','õ':'o','ö':'o','ō':'o','ø':'o',
  'ù':'u','ú':'u','û':'u','ü':'u','ū':'u',
  'ñ':'n','ń':'n',
  'ç':'c','ć':'c',
  'ß':'ss','þ':'th','ð':'d',
  'ł':'l','ł':'l',
  'ś':'s','š':'s',
  'ź':'z','ž':'z','ż':'z',
  'æ':'ae','œ':'oe',
  'ý':'y','ÿ':'y',
  'đ':'d','ğ':'g','ķ':'k','ļ':'l','ņ':'n','ř':'r','ş':'s','ţ':'t','ŭ':'u',
  // Chinese
  '的':'de','一':'yi','是':'shi','了':'le','不':'bu','在':'zai','人':'ren','有':'you','我':'wo','他':'ta',
  // Japanese
  'の':'no','に':'ni','は':'ha','が':'ga','を':'wo','で':'de','と':'to',
  // Korean
  '은':'eun','는':'neun','이':'i','가':'ga','을':'eul','를':'reul',
  // Russian
  'а':'a','б':'b','в':'v','г':'g','д':'d','е':'e','ё':'yo','ж':'zh','з':'z','и':'i','й':'y',
  'к':'k','л':'l','м':'m','н':'n','о':'o','п':'p','р':'r','с':'s','т':'t','у':'u','ф':'f',
  'х':'kh','ц':'ts','ч':'ch','ш':'sh','щ':'shch','ъ':'','ы':'y','ь':'','э':'e','ю':'yu','я':'ya',
};

function transliterate(str) {
  return str.split('').map(c => {
    const lower = c.toLowerCase();
    if (TRANSLIT[lower]) {
      const t = TRANSLIT[lower];
      return c === lower ? t : t.charAt(0).toUpperCase() + t.slice(1);
    }
    // CJK characters - remove (can't reliably transliterate)
    if (/[\u4e00-\u9fff\u3040-\u30ff\uac00-\ud7af]/.test(c)) return '';
    return c;
  }).join('');
}

function generateSlug() {
  let text = $('#input').value;
  if (!text.trim()) {
    $('#slug-output').textContent = '';
    $('#preview').innerHTML = `<span style="opacity:.5">${t('preview')}</span>`;
    $('#stats').innerHTML = '';
    return;
  }

  const sep = $('#separator').value;
  const doLower = $('#lowercase').checked;
  const doTranslit = $('#transliterate').checked;
  const doStopWords = $('#removeStopWords').checked;
  const doTrimNumbers = $('#trimNumbers').checked;

  if (doTranslit) text = transliterate(text);

  // Remove special characters, keep alphanumeric and spaces/hyphens
  let slug = text.replace(/[^\w\s-]/g, ' ');

  if (doLower) slug = slug.toLowerCase();

  // Split into words
  let words = slug.split(/[\s-]+/).filter(Boolean);

  if (doStopWords) words = words.filter(w => !STOP_WORDS.has(w.toLowerCase()));
  if (doTrimNumbers) words = words.filter(w => !/^\d+$/.test(w));

  slug = words.join(sep);

  // Remove multiple consecutive separators
  if (sep) slug = slug.replace(new RegExp('\\' + sep + '+', 'g'), sep);
  slug = slug.replace(/^-+|-+$/g, '');

  $('#slug-output').textContent = slug;

  // URL preview
  const domain = 'https://example.com/blog/';
  const displaySlug = slug || 'your-post-title';
  $('#preview').innerHTML = `${t('preview')}: <span class="domain">${domain}</span><span class="slug">${displaySlug}</span>`;

  // Stats
  const charCount = slug.length;
  const wordCount = words.length;
  $('#stats').innerHTML = `
    <span>${charCount} ${t('chars')}</span>
    <span>${wordCount} ${t('words')}</span>
    <span>Separation: "${sep || 'none'}"</span>`;
}

$('#input').addEventListener('input', generateSlug);
['lowercase','transliterate','removeStopWords','trimNumbers'].forEach(id =>
  $('#'+id).addEventListener('change', generateSlug));
$('#separator').addEventListener('change', generateSlug);

$('#toolbar').innerHTML = `
  <button class="gz-btn gz-btn-secondary" onclick="$('#input').value='How to Write SEO-Friendly Blog Posts in 2026';generateSlug()">Example</button>
  <button class="gz-btn" onclick="copyText($('#slug-output').textContent)">${t('copy')}</button>`;

    {icon:'🔗', href:'/dev/url-parser.html', name:'URL Parser'},
  ]
});
</script>
