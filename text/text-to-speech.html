<style>
.tts-controls{display:flex;flex-wrap:wrap;gap:12px;align-items:center;margin:1rem 0}
.tts-controls label{color:var(--gz-text-muted);font-size:.85em;display:flex;align-items:center;gap:6px}
.tts-controls select,.tts-controls input[type=range]{background:var(--gz-surface);border:1px solid var(--gz-border);color:var(--gz-text);padding:6px 10px;border-radius:6px;font-size:.85em}
.tts-controls select{min-width:180px}
.tts-controls input[type=range]{width:100px}
.tts-status{margin-top:8px;padding:10px 14px;background:var(--gz-surface);border:1px solid var(--gz-border);border-radius:8px;font-size:.85em;color:var(--gz-text-muted);display:none}
.tts-status.active{display:block}
.wave{display:inline-flex;align-items:center;gap:2px;margin-left:8px}
.wave span{width:3px;background:var(--gz-accent);border-radius:2px;animation:wave 0.6s ease-in-out infinite}
.wave span:nth-child(2){animation-delay:.1s}
.wave span:nth-child(3){animation-delay:.2s}
.wave span:nth-child(4){animation-delay:.3s}
@keyframes wave{0%,100%{height:8px}50%{height:20px}}
</style>

<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"Does this tool record my voice?","acceptedAnswer":{"@type":"Answer","text":"No. This tool converts text to speech using your browser's built-in speech synthesis. It does not record or upload anything."}},{"@type":"Question","name":"What languages are supported?","acceptedAnswer":{"@type":"Answer","text":"The available languages depend on your browser and operating system. Most browsers support English, Chinese, Spanish, French, German, Japanese, and many more."}},{"@type":"Question","name":"Can I adjust the speed and pitch?","acceptedAnswer":{"@type":"Answer","text":"Yes. You can adjust the speech rate (speed) and pitch using the sliders. The tool also lets you choose from available voices."}},{"@type":"Question","name":"Does it work offline?","acceptedAnswer":{"@type":"Answer","text":"It depends on your browser. Some voices work offline (system voices), while others may require an internet connection."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <textarea id="input" spellcheck="false" rows="8" style="width:100%;padding:12px;font-size:1em;border:1px solid var(--gz-border);border-radius:8px;background:var(--gz-surface);color:var(--gz-text);resize:vertical" placeholder=""></textarea>
    <div class="tts-controls" id="controls"></div>
    <div class="tts-status" id="status"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en:{
    toolTitle:'Text to Speech',
    toolDesc:'Convert text to natural speech using your browser\'s built-in voice synthesis. Supports multiple languages, speeds and pitches.',
    voice:'Voice',rate:'Speed',pitch:'Pitch',
    speaking:'Speaking... <span class="wave"><span></span><span></span><span></span><span></span></span>',
    paused:'Paused',
    finished:'Finished',
    step1:'Type or paste your text in the input area',
    step2:'Choose a voice, adjust speed and pitch',
    step3:'Click Play to hear the text spoken aloud',
    step4:'Use Pause/Resume to control playback',
    inputPh:'Type or paste text here to convert to speech...',
  },
  zh:{
    toolTitle:'文字转语音',
    toolDesc:'使用浏览器内置语音合成将文字转换为自然语音。支持多种语言、语速和音调。',
    voice:'语音',rate:'语速',pitch:'音调',
    speaking:'正在朗读... <span class="wave"><span></span><span></span><span></span><span></span></span>',
    paused:'已暂停',
    finished:'已完成',
    step1:'在输入区输入或粘贴文本',
    step2:'选择语音，调整语速和音调',
    step3:'点击播放收听语音朗读',
    step4:'使用暂停/继续控制播放',
    inputPh:'在此输入或粘贴要转为语音的文本...',
  }
});
const {$,t}=GZ;
const synth=window.speechSynthesis;
let voices=[];
let utterance=null;
let rate=1,pitch=1,selectedVoice=null;

function loadVoices(){
  voices=synth.getVoices();
  if(!voices.length){setTimeout(loadVoices,100);return;}
  const sel=$('#voiceSelect');
  sel.innerHTML=voices.map((v,i)=>`<option value="${i}">${v.name} (${v.lang})</option>`).join('');
  // Try to select English or Chinese voice
  const preferred=voices.findIndex(v=>v.lang.startsWith('en'))||0;
  sel.value=preferred;
  selectedVoice=voices[preferred];
}

function speak(){
  const text=$('#input').value.trim();
  if(!text)return;
  synth.cancel();
  utterance=new SpeechSynthesisUtterance(text);
  if(selectedVoice)utterance.voice=selectedVoice;
  utterance.rate=rate;
  utterance.pitch=pitch;
  utterance.onend=()=>{$('#status').innerHTML=t('finished');setTimeout(()=>$('#status').classList.remove('active'),2000);};
  utterance.onerror=()=>{$('#status').classList.remove('active');};
  synth.speak(utterance);
  $('#status').innerHTML=t('speaking');
  $('#status').classList.add('active');
}

function pauseResume(){
  if(synth.paused){synth.resume();$('#status').innerHTML=t('speaking');}
  else if(synth.speaking){synth.pause();$('#status').innerHTML=t('paused');}
}

function stopSpeech(){synth.cancel();$('#status').classList.remove('active');}

function loadExample(){
  $('#input').value='Welcome to GameZipper Tools! This text-to-speech tool converts your text into natural-sounding speech right in your browser. Try adjusting the speed and pitch to customize the voice output.';
  speak();
}

$('#input').placeholder=t('inputPh');
$('#controls').innerHTML=`
  <label>${t('voice')}: <select id="voiceSelect" onchange="selectedVoice=voices[+this.value]"></select></label>
  <label>${t('rate')}: <input type="range" id="rateSlider" min="0.5" max="2" step="0.1" value="1" oninput="rate=+this.value;$('#rateVal').textContent=this.value"><span id="rateVal">1</span>x</label>
  <label>${t('pitch')}: <input type="range" id="pitchSlider" min="0.5" max="2" step="0.1" value="1" oninput="pitch=+this.value;$('#pitchVal').textContent=this.value"><span id="pitchVal">1</span></label>`;

$('#toolbar').innerHTML=`<button class="gz-btn" onclick="speak()">${t('play')||'▶ Play'}</button><button class="gz-btn gz-btn-secondary" onclick="pauseResume()">${t('pause')||'⏸ Pause'}</button><button class="gz-btn gz-btn-secondary" onclick="stopSpeech()">${t('stop')||'⏹ Stop'}</button><button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button><button class="gz-btn gz-btn-secondary" onclick="$('#input').value='';stopSpeech()">${t('clear')}</button>`;

loadVoices();
if(synth.onvoiceschanged!==undefined)synth.onvoiceschanged=loadVoices;

GZ.renderToolPage({category:'text',titleKey:'toolTitle',descKey:'toolDesc',howToSteps:['step1','step2','step3','step4'],related:[
  {icon:'📝',href:'/text/word-counter.html',name:'Word Counter'},
  {icon:'🔤',href:'/text/case-converter.html',name:'Case Converter'},
  {icon:'📖',href:'/text/bionic.html',name:'Bionic Reading'},
]});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
