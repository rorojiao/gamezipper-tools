const GENRES = ['Action','Comedy','Drama','Sci-Fi','Horror','Romance','Animation','Thriller'];
let activeGenres = new Set();
let history = [];

function decadeBucket(y) {
  if (y >= 2020) return '2020s';
  if (y >= 2010) return '2010s';
  if (y >= 2000) return '2000s';
  if (y >= 1990) return '1990s';
  return 'classic';
}

function buildFilters() {
  $('#genres').innerHTML = GENRES.map(g =>
    `<span class="genre-chip${activeGenres.has(g) ? ' active' : ''}" data-g="${g}">${g}</span>`
  ).join('');
  $('#genres').querySelectorAll('.genre-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      const g = chip.dataset.g;
      if (activeGenres.has(g)) { activeGenres.delete(g); chip.classList.remove('active'); }
      else { activeGenres.add(g); chip.classList.add('active'); }
    });
  });
}

function secureRandom(max) {
  const arr = new Uint32Array(1);
  crypto.getRandomValues(arr);
  return arr[0] % max;
}

function spin() {
  const decade = $('#decade').value;
  const minRating = +$('#rating').value || 0;
  const maxRuntime = +$('#runtime').value || 0;

  let pool = MOVIES.filter(m => {
    if (decade !== 'all' && decadeBucket(m.y) !== decade) return false;
    if (m.r < minRating) return false;
    if (maxRuntime && m.rt > maxRuntime) return false;
    if (activeGenres.size > 0 && !m.g.some(g => activeGenres.has(g))) return false;
    return true;
  });
  if (pool.length === 0) { $('#result').innerHTML = '<div class="empty" style="color:var(--accent)">No movies match these filters. Try relaxing them.</div>'; return; }

  const m = pool[secureRandom(pool.length)];
  history.unshift(m);
  if (history.length > 30) history.pop();
  renderResult(m);
  renderHistory();
  $('#historyWrap').style.display = 'block';
}

function emojiFor(genres) {
  if (genres.includes('Animation')) return '🎨';
  if (genres.includes('Horror')) return '👻';
  if (genres.includes('Romance')) return '💕';
  if (genres.includes('Sci-Fi')) return '🚀';
  if (genres.includes('Action')) return '💥';
  if (genres.includes('Thriller')) return '🔪';
  if (genres.includes('Comedy')) return '😂';
  return '🎬';
}

function renderResult(m) {
  $('#result').innerHTML = `
    <div class="movie-card">
      <span class="emoji">${emojiFor(m.g)}</span>
      <div class="title">${m.t}</div>
      <div class="meta">${m.y} · ${m.g.join(' / ')}</div>
      <div class="info">
        <div class="info-item">Rating<strong>⭐ ${m.r}/10</strong></div>
        <div class="info-item">Runtime<strong>⏱️ ${m.rt} min</strong></div>
        <div class="info-item">Year<strong>${m.y}</strong></div>
      </div>
    </div>`;
}

function renderHistory() {
  $('#history').innerHTML = history.map((m, i) => `<span class="h-item" data-i="${i}">${m.t} (${m.y})</span>`).join('');
  $('#history').querySelectorAll('.h-item').forEach(el => {
    el.addEventListener('click', () => renderResult(history[+el.dataset.i]));
  });
  $('#historyTitle').textContent = t('historyTitle') + ' (' + history.length + ')';
}

function clearHistory() {
  history = []; $('#historyWrap').style.display = 'none';
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="spin()">${t('spin')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="clearHistory()">${t('clearHistory')}</button>`;
