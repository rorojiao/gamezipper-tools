<script>
GZI18n.register({
  en: {
    toolTitle: 'Signature Generator',
    toolDesc: 'Draw your signature online with mouse or touch, customize ink color and thickness, then download as a transparent PNG.',
    inkColor: 'Ink Color',
    thickness: 'Thickness',
    bgWhite: 'White BG',
    clear: 'Clear',
    downloadPNG: 'Download PNG',
    downloadSVG: 'Download SVG',
    step1: 'Draw your signature on the canvas using mouse or touchscreen',
    step2: 'Adjust the ink color and line thickness as needed',
    step3: 'Toggle white background if you need a solid background',
    step4: 'Click Download PNG to save your signature image',
  },
  zh: {
    toolTitle: '电子签名生成器',
    toolDesc: '在线手写签名，支持鼠标和触屏，自定义墨水颜色和粗细，下载为透明背景 PNG。',
    inkColor: '墨水颜色',
    thickness: '粗细',
    bgWhite: '白色背景',
    clear: '清除',
    downloadPNG: '下载 PNG',
    downloadSVG: '下载 SVG',
    step1: '用鼠标或触屏在画布上绘制签名',
    step2: '根据需要调整墨水颜色和线条粗细',
    step3: '如需纯色背景，勾选「白色背景」',
    step4: '点击「下载 PNG」保存签名图片',
  }
});

const { $, copyText, t } = GZ;
const canvas = $('#sig-canvas');
const ctx = canvas.getContext('2d');
let drawing = false;
let paths = []; // store all strokes for redraw

function resizeCanvas() {
  const wrap = canvas.parentElement;
  const w = wrap.clientWidth;
  const ratio = window.devicePixelRatio || 1;
  canvas.style.width = w + 'px';
  canvas.style.height = Math.round(w * 0.375) + 'px';
  canvas.width = w * ratio;
  canvas.height = Math.round(w * 0.375) * ratio;
  ctx.scale(ratio, ratio);
  redraw();
}

function getPos(e) {
  const rect = canvas.getBoundingClientRect();
  const touch = e.touches ? e.touches[0] : e;
  return { x: touch.clientX - rect.left, y: touch.clientY - rect.top };
}

function startDraw(e) {
  e.preventDefault();
  drawing = true;
  const pos = getPos(e);
  paths.push({ color: $('#ink-color').value, width: parseInt($('#ink-thickness').value), points: [pos] });
}

function moveDraw(e) {
  if (!drawing) return;
  e.preventDefault();
  const pos = getPos(e);
  const current = paths[paths.length - 1];
  current.points.push(pos);
  redraw();
  // draw last segment
  const pts = current.points;
  if (pts.length >= 2) {
    ctx.beginPath();
    ctx.strokeStyle = current.color;
    ctx.lineWidth = current.width;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    const prev = pts[pts.length - 2];
    ctx.moveTo(prev.x, prev.y);
    ctx.lineTo(pos.x, pos.y);
    ctx.stroke();
  }
}

function endDraw(e) {
  if (!drawing) return;
  drawing = false;
}

function redraw() {
  const w = parseInt(canvas.style.width);
  const h = parseInt(canvas.style.height);
  ctx.clearRect(0, 0, w, h);
  for (const path of paths) {
    if (path.points.length < 2) continue;
    ctx.beginPath();
    ctx.strokeStyle = path.color;
    ctx.lineWidth = path.width;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.moveTo(path.points[0].x, path.points[0].y);
    for (let i = 1; i < path.points.length; i++) {
      ctx.lineTo(path.points[i].x, path.points[i].y);
    }
    ctx.stroke();
  }
}

function doClear() {
  paths = [];
  redraw();
}

function downloadPNG() {
  const bgWhite = $('#bg-white').checked;
  const tmpCanvas = document.createElement('canvas');
  tmpCanvas.width = canvas.width;
  tmpCanvas.height = canvas.height;
  const tmpCtx = tmpCanvas.getContext('2d');
  const ratio = window.devicePixelRatio || 1;
  tmpCtx.scale(ratio, ratio);
  if (bgWhite) {
    tmpCtx.fillStyle = '#ffffff';
    tmpCtx.fillRect(0, 0, tmpCanvas.width, tmpCanvas.height);
  }
  for (const path of paths) {
    if (path.points.length < 2) continue;
    tmpCtx.beginPath();
    tmpCtx.strokeStyle = path.color;
    tmpCtx.lineWidth = path.width;
    tmpCtx.lineCap = 'round';
    tmpCtx.lineJoin = 'round';
    tmpCtx.moveTo(path.points[0].x, path.points[0].y);
    for (let i = 1; i < path.points.length; i++) {
      tmpCtx.lineTo(path.points[i].x, path.points[i].y);
    }
    tmpCtx.stroke();
  }
  const a = document.createElement('a');
  a.href = tmpCanvas.toDataURL('image/png');
  a.download = 'signature.png';
  a.click();
}

canvas.addEventListener('mousedown', startDraw);
canvas.addEventListener('mousemove', moveDraw);
canvas.addEventListener('mouseup', endDraw);
canvas.addEventListener('mouseleave', endDraw);
canvas.addEventListener('touchstart', startDraw, { passive: false });
canvas.addEventListener('touchmove', moveDraw, { passive: false });
canvas.addEventListener('touchend', endDraw);

window.addEventListener('resize', resizeCanvas);
resizeCanvas();

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="downloadPNG()">📥 ${t('downloadPNG')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">↺ ${t('clear')}</button>`;

GZ.renderToolPage({
  category: 'image',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],

    {icon:'💦', href:'/image/watermark.html', name:'Watermark'},
    {icon:'🎨', href:'/image/pixel-art-editor.html', name:'Pixel Art'},
    {icon:'🖼️', href:'/image/placeholder.html', name:'Placeholder'},
  ]
});
</script>
