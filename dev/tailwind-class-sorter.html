  ['m-0','m-1','m-2','m-3','m-4','m-5','m-6','m-8','m-auto','mx-auto','my-auto','mt-0','mr-0','mb-0','ml-0','mt-1','mr-1','mb-1','ml-1','mt-2','mr-2','mb-2','ml-2','mt-4','mr-4','mb-4','ml-4','mt-8','mr-8','mb-8','ml-8','p-0','p-1','p-2','p-3','p-4','p-5','p-6','p-8','px-0','py-0','px-1','py-1','px-2','py-2','px-4','py-4','px-8','py-8','pt-0','pr-0','pb-0','pl-0','pt-1','pr-1','pb-1','pl-1','pt-2','pr-2','pb-2','pl-2','pt-4','pr-4','pb-4','pl-4','pt-8','pr-8','pb-8','pl-8'],

  ['appearance-none','cursor-auto','cursor-default','cursor-pointer','cursor-wait','cursor-text','cursor-move','cursor-help','cursor-not-allowed','outline-none','pointer-events-none','pointer-events-auto','resize','resize-none','resize-y','resize-x','select-none','select-text','select-all','select-auto','user-select-none'],

  ['fill-current','stroke-current','stroke-0','stroke-1','stroke-2'],
  // Misc
  ['sr-only','not-sr-only'],

// Build a map: class -> index
const orderMap = {};
TAILWIND_ORDER.forEach((group, gi) => group.forEach(c => { if(!(c in orderMap)) orderMap[c] = gi*1000 + group.indexOf(c); }));

// Variant prefixes like sm:, md:, lg:, hover:, focus:, dark:, etc.
const VARIANT_RE = /^([a-z]+:|sm:|md:|lg:|xl:|2xl:|hover:|focus:|focus-within:|focus-visible:|active:|group-hover:|group-focus:|disabled:|first:|last:|odd:|even:|dark:|placeholder:|motion-safe:|motion-reduce:|print:|rtl:|ltr:|open:|target:|checked:|default:|enabled:|indeterminate:|invalid:|optional:|required:|valid:)+(.+)$/;

function classRank(cls){
  // Strip variant prefix(es)
  let prefix = '';
  let base = cls;
  let m;
  while((m = base.match(VARIANT_RE))){
    prefix += m[1];
    base = m[3];
  }
  // Arbitrary value like w-[100px] — rank by prefix base
  let baseKey = base;
  const arb = base.match(/^([a-z]+(?:-[a-z]+)*)-\[.+\]$/);
  if(arb) baseKey = arb[1];
  const num = orderMap[base] ?? orderMap[baseKey];
  // Variant depth as minor sort
  const vdepth = (prefix.match(/:/g)||[]).length;
  if(num !== undefined) return num + vdepth*0.5;
  // Unknown → 1,000,000 + alphabetical
  return 1000000 + vdepth*1000 + base.charCodeAt(0);
}

function sortClasses(){
  const raw = $('#input').value.trim();
  if(!raw){ $('#output').textContent=''; $('#status').innerHTML=''; return; }
  let classes = raw.split(/\s+/).filter(Boolean);
  const originalCount = classes.length;
  if(dedup){
    const seen = new Set();
    classes = classes.filter(c => { if(seen.has(c)) return false; seen.add(c); return true; });
  }
  const removed = originalCount - classes.length;
  classes.sort((a,b) => {
    const ra = classRank(a), rb = classRank(b);
    if(ra !== rb) return ra - rb;
    return a.localeCompare(b);
  });
  $('#output').textContent = classes.join(' ');
  $('#status').innerHTML = `<span style="color:var(--gz-success)">${t('result',classes.length,removed)}</span>`;
}

function loadExample(){
  $('#input').value = 'text-white rounded-lg bg-blue-500 hover:bg-blue-600 flex items-center p-4 gap-4 font-bold text-lg shadow-md hover:shadow-lg transition';
  sortClasses();
}

function doClear(){ $('#input').value=''; $('#output').textContent=''; $('#status').innerHTML=''; }

$('#input').addEventListener('input', sortClasses);
