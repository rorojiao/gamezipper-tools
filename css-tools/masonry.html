<script>
GZI18n.register({
  en: {
    toolTitle: 'CSS Masonry Grid Generator',
    toolDesc: 'Generate Pinterest-style masonry layouts with CSS columns — custom gap, column count, responsive breakpoints and copy-ready code.',
    columns: 'Columns',
    gap: 'Gap (px)',
    items: 'Items',
    preview: 'Live Preview',
    generatedCode: 'Generated CSS Code',
    copy: 'Copy CSS',
    reset: 'Reset',
    step1: 'Adjust columns, gap and item count using the controls',
    step2: 'Preview the masonry layout in real time',
    step3: 'Click "Copy CSS" to get production-ready code',
    step4: 'Paste the code into your project',
  },
  zh: {
    toolTitle: 'CSS 瀑布流布局生成器',
    toolDesc: '使用 CSS columns 生成 Pinterest 风格瀑布流布局 — 自定义间距、列数、响应式断点，一键复制可用代码。',
    columns: '列数',
    gap: '间距 (px)',
    items: '项目数',
    preview: '实时预览',
    generatedCode: '生成的 CSS 代码',
    copy: '复制 CSS',
    reset: '重置',
    step1: '使用控件调整列数、间距和项目数',
    step2: '实时预览瀑布流布局效果',
    step3: '点击「复制 CSS」获取生产可用的代码',
    step4: '将代码粘贴到你的项目中',
  }
});

const { $, copyText, t } = GZ;
let cols = 3, gap = 16, itemCount = 12;

function update() {
  const preview = $('#masonry-preview');
  preview.style.setProperty('--m-gap', gap + 'px');
  preview.style.setProperty('--m-cols', cols);
  preview.style.columnCount = cols;
  preview.style.columnGap = gap + 'px';
  let html = '';
  const heights = [80,120,160,100,140,90,130,110,150,95,125,105,145,85,115,135];
  for (let i = 0; i < itemCount; i++) {
    html += `<div class="masonry-item" style="height:${heights[i % heights.length]}px">Item ${i + 1}</div>`;
  }
  preview.innerHTML = html;

  const css = `.masonry {
  column-count: ${cols};
  column-gap: ${gap}px;
}

.masonry-item {
  break-inside: avoid;
  margin-bottom: ${gap}px;
}

/* Responsive */
@media (max-width: 768px) {
  .masonry { column-count: ${Math.max(1, Math.ceil(cols / 2))}; }
}
@media (max-width: 480px) {
  .masonry { column-count: 1; }
}`;
  $('#code-output').textContent = css;
}

$('#controls').innerHTML = `
  <div class="ctrl-group"><label>${t('columns')}:</label><input type="range" id="col-slider" min="1" max="6" value="${cols}" oninput="cols=+this.value;$('#col-val').textContent=cols;update()"><span id="col-val">${cols}</span></div>
  <div class="ctrl-group"><label>${t('gap')}:</label><input type="range" id="gap-slider" min="0" max="40" value="${gap}" oninput="gap=+this.value;$('#gap-val').textContent=gap;update()"><span id="gap-val">${gap}</span></div>
  <div class="ctrl-group"><label>${t('items')}:</label><input type="range" id="item-slider" min="4" max="30" value="${itemCount}" oninput="itemCount=+this.value;$('#item-val').textContent=itemCount;update()"><span id="item-val">${itemCount}</span></div>
`;

$('#preview-label').textContent = t('preview');
$('#code-label').textContent = t('generatedCode');

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="copyText($('#code-output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="cols=3;gap=16;itemCount=12;update();$('#col-slider').value=3;$('#gap-slider').value=16;$('#item-slider').value=12;$('#col-val').textContent=3;$('#gap-val').textContent=16;$('#item-val').textContent=12">${t('reset')}</button>`;

GZ.renderToolPage({
  category: 'css',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📐', href:'/css-tools/grid.html', name:'CSS Grid'},
    {icon:'🔲', href:'/css-tools/flexbox.html', name:'Flexbox'},
    {icon:'🌈', href:'/css-tools/gradient.html', name:'Gradient'},
    {icon:'🔲', href:'/css-tools/border-radius.html', name:'Border Radius'},
  ]
});
update();
</script>
