function renderApps() {
  $('#apps').innerHTML = APPS.map(([id,label]) =>
    `<button data-app="${id}" class="${id===currentApp?'active':''}">${label}</button>`
  ).join('');
  $('#apps').querySelectorAll('button').forEach(b => b.onclick = () => {
    currentApp = b.dataset.app;
    renderApps();
    renderGrid();
  });
}

function osKeys(item) {
  const keys = currentOS === 'mac' ? item.m : item.w;
  // If mac list is missing, fall back to win
  return (keys && keys.length) ? keys : item.w;
}

function renderGrid() {
  const q = $('#search').value.trim().toLowerCase();
  const app = DB[currentApp];
  if (!app) { $('#grid').innerHTML = ''; return; }
  const html = app.map(cat => {
    const items = cat.items.filter(it => {
      if (!q) return true;
      const keys = osKeys(it).join(' ').toLowerCase();
      return it.d.toLowerCase().includes(q) || keys.includes(q) || cat.cat.toLowerCase().includes(q);
    });
    if (items.length === 0) return '';
    const rows = items.map(it => {
      const keys = osKeys(it);
      const keysHtml = keys.map(k => `<span class="sc-key">${k}</span>`).join('');
      const copyStr = keys.join(currentOS === 'mac' ? ' + ' : ' + ');
      return `<div class="sc-row">
        <span class="desc">${it.d}</span>
        <span class="sc-keys">${keysHtml}<button class="sc-copy" onclick="copyText('${copyStr.replace(/'/g,"\\'")}')">📋</button></span>
      </div>`;
    }).join('');
    return `<div class="sc-card"><h3>${cat.cat}</h3>${rows}</div>`;
  }).join('');
  $('#grid').innerHTML = html || `<div class="sc-empty">No shortcuts match "${q}".</div>`;
}

$('#search').placeholder = t('searchPh');
$('#search').addEventListener('input', renderGrid);

$('#os-toggle').querySelectorAll('button').forEach(b => b.onclick = () => {
  currentOS = b.dataset.os;
  $('#os-toggle').querySelectorAll('button').forEach(x => x.classList.remove('active'));
  b.classList.add('active');
  renderGrid();
});

$('#toolbar').innerHTML = `<button class="gz-btn gz-btn-secondary" onclick="$('#search').value='';renderGrid()">🧹 ${t('clear')||'Clear'}</button>`;

renderApps();
renderGrid();
