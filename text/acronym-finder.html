const CAT_LABELS = { tech:'Technology', business:'Business', chat:'Chat/Texting', medical:'Medical', gov:'Government', finance:'Finance', edu:'Education', general:'General' };

let mode = 'search';

function setMode(m) {
  mode = m;
  $('#mode-search').classList.toggle('active', m === 'search');
  $('#mode-expand').classList.toggle('active', m === 'expand');
  $('#searchInput').placeholder = m === 'search' ? t('placeholderSearch') : t('placeholderExpand');
  $('#expandResult').innerHTML = '';
  search();
}

function search() {
  const q = $('#searchInput').value.trim().toUpperCase();
  const results = $('#results');

  if (mode === 'expand') {
    results.innerHTML = '';
    if (!q) { $('#expandResult').innerHTML = ''; return; }
    const match = ACRONYMS.find(a => a.acro.toUpperCase() === q);
    if (match) {
      $('#expandResult').innerHTML = `<div class="expand-result"><div class="acro-big">${match.acro}</div><div class="expand-text">${match.expand}</div><span class="cat-tag">${CAT_LABELS[match.cat]}</span></div>`;
    } else {
      $('#expandResult').innerHTML = `<div class="empty">${t('notFound')}</div>`;
    }
    return;
  }

  let filtered = ACRONYMS;
  if (q) {
    filtered = ACRONYMS.filter(a =>
      a.acro.toUpperCase().includes(q) || a.expand.toUpperCase().includes(q)
    );
  }

  if (filtered.length === 0) {
    results.innerHTML = `<div class="empty">${t('notFound')}</div>`;
    return;
  }

  // Group by category
  const byCat = {};
  filtered.forEach(a => { (byCat[a.cat] = byCat[a.cat] || []).push(a); });

  let html = '';
  for (const [cat, items] of Object.entries(byCat).sort((a,b) => a[0].localeCompare(b[0]))) {
    html += `<div style="margin-top:20px"><h3 style="color:var(--accent);font-size:.95rem;margin:0 0 10px">${CAT_LABELS[cat]}</h3><div class="acronym-grid">`;
    html += items.map(a => `<div class="acronym-card" onclick="$('#searchInput').value='${a.acro}';setMode('expand')"><div class="acro">${a.acro}</div><div class="expand">${a.expand}</div><div class="cat">${CAT_LABELS[a.cat]}</div></div>`).join('');
    html += `</div></div>`;
  }
  results.innerHTML = html;
}

$('#searchInput').addEventListener('input', search);
search();
