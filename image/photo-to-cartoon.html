<script>
GZI18n.register({
  en: {
    toolTitle: 'Photo to Cartoon Converter',
    toolDesc: 'Turn photos into cartoon and comic-book art. Adjust edges, smoothing and saturation — free and private.',
    dropText: 'Drop a photo here or click to upload',
    edge: 'Edge Strength',
    smooth: 'Smoothness',
    sat: 'Saturation',
    apply: 'Apply Effect',
    download: '⬇ Download PNG',
    original: 'Original',
    result: 'Cartoon',
    processing: 'Processing…',
    step1: 'Upload a photo (JPG, PNG, WebP)',
    step2: 'Set edge strength, smoothness and saturation',
    step3: 'Click Apply Effect to cartoonify',
    step4: 'Download the cartoon as PNG',
  },
  zh: {
    toolTitle: '照片转卡通转换器',
    toolDesc: '将照片转换为卡通和漫画风格。调整边缘、平滑度和饱和度 — 免费且隐私。',
    dropText: '拖放照片到此处或点击上传',
    edge: '边缘强度',
    smooth: '平滑度',
    sat: '饱和度',
    apply: '应用效果',
    download: '⬇ 下载 PNG',
    original: '原图',
    result: '卡通',
    processing: '处理中…',
    step1: '上传照片（JPG、PNG、WebP）',
    step2: '设置边缘强度、平滑度和饱和度',
    step3: '点击「应用效果」卡通化',
    step4: '下载卡通图为 PNG',
  }
});

const { $, t } = GZ;
let imgData = null, origCanvas, resCanvas, origCtx, resCtx;

$('#drop-text').textContent = t('dropText');
$('#lbl-edge').textContent = t('edge');
$('#lbl-smooth').textContent = t('smooth');
$('#lbl-sat').textContent = t('sat');
$('#btn-apply').textContent = t('apply');
$('#btn-download').textContent = t('download');
$('#lbl-orig').textContent = t('original');
$('#lbl-res').textContent = t('result');

const drop = $('#drop'), fileInput = $('#fileInput');
drop.addEventListener('click', () => fileInput.click());
drop.addEventListener('dragover', e => { e.preventDefault(); drop.classList.add('dragover'); });
drop.addEventListener('dragleave', () => drop.classList.remove('dragover'));
drop.addEventListener('drop', e => { e.preventDefault(); drop.classList.remove('dragover'); if (e.dataTransfer.files.length) loadImage(e.dataTransfer.files[0]); });
fileInput.addEventListener('change', e => { if (e.target.files.length) loadImage(e.target.files[0]); });

function loadImage(file) {
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      const maxW = 600; let w = img.width, h = img.height;
      if (w > maxW) { h = Math.round(h * maxW / w); w = maxW; }
      origCanvas = $('#original'); resCanvas = $('#result');
      origCanvas.width = w; origCanvas.height = h;
      resCanvas.width = w; resCanvas.height = h;
      origCtx = origCanvas.getContext('2d'); resCtx = resCanvas.getContext('2d');
      origCtx.drawImage(img, 0, 0, w, h);
      imgData = origCtx.getImageData(0, 0, w, h);
      drop.style.display = 'none';
      $('#controls').style.display = 'flex';
      $('#preview').style.display = 'grid';
      applyCartoon();
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function applyCartoon() {
  if (!imgData) return;
  $('#status').textContent = t('processing');
  $('#btn-apply').disabled = true;
  setTimeout(() => {
    const w = imgData.width, h = imgData.height;
    const src = imgData.data;
    const edgeStr = +$('#edge').value / 100;
    const levels = +$('#smooth').value;       // color quantization levels
    const sat = +$('#sat').value / 100;
    const gray = new Uint8ClampedArray(w * h);
    for (let i = 0, p = 0; i < src.length; i += 4, p++) {
      gray[p] = 0.299 * src[i] + 0.587 * src[i+1] + 0.114 * src[i+2];
    }
    // Sobel edges
    const edges = new Uint8ClampedArray(w * h);
    for (let y = 1; y < h - 1; y++) {
      for (let x = 1; x < w - 1; x++) {
        const p = y * w + x;
        const gx = -gray[p-w-1] - 2*gray[p-1] - gray[p+w-1] + gray[p-w+1] + 2*gray[p+1] + gray[p+w+1];
        const gy = -gray[p-w-1] - 2*gray[p-w] - gray[p-w+1] + gray[p+w-1] + 2*gray[p+w] + gray[p+w+1];
        const mag = Math.sqrt(gx*gx + gy*gy);
        edges[p] = mag > 60 * (1 - edgeStr + 0.3) ? 0 : 255; // black edge or white
      }
    }
    const out = resCtx.createImageData(w, h);
    const step = 255 / Math.max(2, levels);
    for (let p = 0, i = 0; p < w * h; p++, i += 4) {
      let r = src[i], g = src[i+1], b = src[i+2];
      // Saturation via luminance interpolation
      const lum = 0.299*r + 0.587*g + 0.114*b;
      r = lum + (r - lum) * sat;
      g = lum + (g - lum) * sat;
      b = lum + (b - lum) * sat;
      // Posterize to flat regions
      r = Math.round(r / step) * step;
      g = Math.round(g / step) * step;
      b = Math.round(b / step) * step;
      // Apply edges
      if (edges[p] === 0) { r = g = b = 0; }
      out.data[i] = Math.max(0, Math.min(255, r));
      out.data[i+1] = Math.max(0, Math.min(255, g));
      out.data[i+2] = Math.max(0, Math.min(255, b));
      out.data[i+3] = 255;
    }
    resCtx.putImageData(out, 0, 0);
    $('#status').textContent = '';
    $('#btn-apply').disabled = false;
  }, 30);
}

$('#btn-apply').addEventListener('click', applyCartoon);
$('#btn-download').addEventListener('click', () => {
  if (!resCanvas) return;
  const a = document.createElement('a');
  a.href = resCanvas.toDataURL('image/png');
  a.download = 'cartoon.png'; a.click();
});

});
</script>
