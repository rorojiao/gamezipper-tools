<style>
.fk-form{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:14px}
.fk-form>div{display:flex;flex-direction:column;gap:4px}
.fk-form label{font-size:.8em;color:var(--text2);font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.fk-form input,.fk-form select{padding:10px 12px;border-radius:8px;border:1px solid var(--border);background:var(--glass2);color:var(--text);font-size:.95em;font-family:inherit}
.fk-tiles{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;margin:14px 0}
.fk-tile{background:linear-gradient(135deg,var(--glass),var(--glass2));border:1px solid var(--border);border-radius:12px;padding:14px;text-align:center}
.fk-tile .num{font-size:1.4em;font-weight:800;color:var(--accent);line-height:1.1}
.fk-tile .lbl{font-size:.7em;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-top:4px}
.fk-tile.highlight{background:linear-gradient(135deg,rgba(108,92,231,.25),rgba(168,85,247,.1));border-color:var(--accent)}
.fk-tile.contrib{background:linear-gradient(135deg,rgba(16,185,129,.15),rgba(16,185,129,.05));border-color:#10b981}
.fk-tile.contrib .num{color:#10b981}
.fk-tile.match{background:linear-gradient(135deg,rgba(245,158,11,.15),rgba(245,158,11,.05));border-color:#f59e0b}
.fk-tile.match .num{color:#f59e0b}
.fk-tile.gain{background:linear-gradient(135deg,rgba(59,130,246,.15),rgba(59,130,246,.05));border-color:#3b82f6}
.fk-tile.gain .num{color:#3b82f6}
.fk-chart{margin:14px 0;padding:14px;background:var(--glass);border:1px solid var(--border);border-radius:12px}
.fk-chart h3{margin:0 0 8px;font-size:1rem}
.fk-bars{display:flex;align-items:flex-end;gap:2px;height:160px;padding:8px 0;border-bottom:1px solid var(--border);position:relative;overflow-x:auto}
.fk-bars .bar{flex:1;min-width:6px;background:linear-gradient(180deg,var(--accent),rgba(108,92,231,.4));border-radius:3px 3px 0 0;position:relative;cursor:pointer;min-height:2px}
.fk-bars .bar:hover{filter:brightness(1.2)}
.fk-bars .bar .tip{position:absolute;bottom:100%;left:50%;transform:translateX(-50%);background:#000;color:#fff;padding:4px 8px;border-radius:4px;font-size:.7em;white-space:nowrap;opacity:0;transition:opacity .2s;pointer-events:none;z-index:10}
.fk-bars .bar:hover .tip{opacity:1}
.fk-bars .bar .match{background:linear-gradient(180deg,#f59e0b,rgba(245,158,11,.4))}
.fk-axis{display:flex;justify-content:space-between;font-size:.7em;color:var(--text2);padding-top:4px}
.fk-table{width:100%;border-collapse:collapse;font-size:.85em;margin:14px 0;font-family:monospace}
.fk-table th{text-align:right;padding:6px 8px;background:var(--glass2);color:var(--accent);font-weight:700;position:sticky;top:0}
.fk-table th:first-child{text-align:center;width:60px}
.fk-table td{padding:5px 8px;border-bottom:1px solid var(--border);text-align:right}
.fk-table td:first-child{text-align:center}
.fk-wrap{max-height:340px;overflow-y:auto;border:1px solid var(--border);border-radius:10px}
.fk-tip{background:var(--glass2);border-left:3px solid var(--accent);padding:8px 12px;border-radius:6px;font-size:.85em;margin:10px 0;color:var(--text2)}
.fk-legend{display:flex;gap:14px;font-size:.78em;color:var(--text2);margin-top:6px;flex-wrap:wrap}
.fk-legend .swatch{display:inline-block;width:10px;height:10px;border-radius:2px;margin-right:4px;vertical-align:middle}
</style>

<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is a 401(k) match?", "acceptedAnswer": {"@type": "Answer", "text": "An employer match is free money your company adds to your 401(k) based on a percentage of your own contributions. The most common formula is 100% match on the first 3% of salary, then 50% on the next 2% — a 4% total match for a 5% personal contribution. Always contribute at least enough to get the full match."}}, {"@type": "Question", "name": "How much should I contribute?", "acceptedAnswer": {"@type": "Answer", "text": "Most financial advisors recommend contributing 10-15% of pre-tax salary, including the employer match. The 2026 IRS limit is $24,500 for those under 50 (and $32,500 with catch-up contributions for 50+). This tool respects the IRS limit and warns if you exceed it."}}, {"@type": "Question", "name": "What return rate should I assume?", "acceptedAnswer": {"@type": "Answer", "text": "Historically, a diversified stock portfolio has returned 7-10% annually before inflation. A common planning assumption is 7% real (after inflation) or 9-10% nominal. Adjust this to be more conservative if you're close to retirement."}}, {"@type": "Question", "name": "Are my numbers private?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. All calculations run locally in your browser. Your salary, contribution rate, and projections never leave your device."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="fk-form">
      <div>
        <label id="lbl-age"></label>
        <input type="number" id="age" value="30" min="18" max="70">
      </div>
      <div>
        <label id="lbl-retire"></label>
        <input type="number" id="retire" value="65" min="50" max="80">
      </div>
      <div>
        <label id="lbl-salary"></label>
        <input type="number" id="salary" value="75000" min="0" step="1000">
      </div>
      <div>
        <label id="lbl-contrib"></label>
        <input type="number" id="contrib" value="10" min="0" max="100" step="0.5">
      </div>
      <div>
        <label id="lbl-match"></label>
        <input type="number" id="match" value="100" min="0" max="200" step="5">
      </div>
      <div>
        <label id="lbl-matchcap"></label>
        <input type="number" id="matchcap" value="5" min="0" max="15" step="0.5">
      </div>
      <div>
        <label id="lbl-current"></label>
        <input type="number" id="current" value="25000" min="0" step="1000">
      </div>
      <div>
        <label id="lbl-return"></label>
        <input type="number" id="ret" value="8" min="0" max="20" step="0.1">
      </div>
      <div>
        <label id="lbl-raise"></label>
        <input type="number" id="raise" value="3" min="0" max="10" step="0.1">
      </div>
    </div>
    <div class="fk-tip" id="tip"></div>
    <div class="fk-tiles" id="tiles"></div>
    <div class="fk-chart">
      <h3 id="chart-title"></h3>
      <div class="fk-bars" id="bars"></div>
      <div class="fk-axis"><span id="ax-start"></span><span id="ax-mid"></span><span id="ax-end"></span></div>
      <div class="fk-legend">
        <span><span class="swatch" style="background:var(--accent)"></span><span id="leg-balance"></span></span>
        <span><span class="swatch" style="background:#f59e0b"></span><span id="leg-match"></span></span>
      </div>
    </div>
    <div style="margin:14px 0">
      <h3 style="margin:0 0 8px;font-size:1rem" id="lbl-yearly"></h3>
      <div class="fk-wrap"><table class="fk-table" id="yearly"></table></div>
    </div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: '401(k) Calculator',
    toolDesc: 'Project your 401(k) retirement savings with employer match, contribution growth, salary increases, and tax-deferred compounding — year-by-year breakdown with chart.',
    lblAge: 'Current age',
    lblRetire: 'Retirement age',
    lblSalary: 'Annual salary ($)',
    lblContrib: 'Your contribution (%)',
    lblMatch: 'Employer match (%)',
    lblMatchcap: 'Match cap (% of salary)',
    lblCurrent: 'Current 401(k) balance ($)',
    lblReturn: 'Expected annual return (%)',
    lblRaise: 'Annual salary raise (%)',
    tip: 'Tip: The 2026 IRS contribution limit is $24,500 (under 50) or $32,500 (50+). Always contribute at least enough to get your full employer match — it is essentially free money.',
    tileFinal: 'Final balance',
    tileContrib: 'Your contributions',
    tileMatch: 'Employer match',
    tileGain: 'Investment growth',
    tileReturn: 'Total return',
    chartTitle: 'Year-by-year 401(k) growth',
    legBalance: 'Your balance',
    legMatch: 'Employer match',
    lblYearly: 'Year-by-year detail',
    yr: 'Year',
    yrAge: 'Age',
    yrSalary: 'Salary',
    yrYour: 'You contribute',
    yrMatch: 'Match',
    yrGrowth: 'Growth',
    yrBalance: 'End-of-year',
    step1: 'Enter your current age, salary, and 401(k) balance',
    step2: 'Set your contribution %, employer match and expected return',
    step3: 'See your final balance, contributions, employer match, and growth',
    step4: 'Scroll the year-by-year detail to see compounding at work',
  },
  zh: {
    toolTitle: '401(k) 退休储蓄计算器',
    toolDesc: '预测你的 401(k) 退休储蓄，含雇主匹配、缴费增长、薪资涨幅和复利 — 逐年明细与图表。',
    lblAge: '当前年龄',
    lblRetire: '退休年龄',
    lblSalary: '年薪 ($)',
    lblContrib: '个人缴费比例 (%)',
    lblMatch: '雇主匹配 (%)',
    lblMatchcap: '匹配上限 (% 工资)',
    lblCurrent: '当前余额 ($)',
    lblReturn: '预期年化收益 (%)',
    lblRaise: '年度涨薪 (%)',
    tip: '提示：2026 年 IRS 缴费上限为 24,500 美元（50 岁以下）或 32,500 美元（50 岁以上）。至少缴够拿满雇主匹配的钱 — 这就是免费的钱。',
    tileFinal: '最终余额',
    tileContrib: '个人缴费',
    tileMatch: '雇主匹配',
    tileGain: '投资收益',
    tileReturn: '总回报',
    chartTitle: '401(k) 逐年增长',
    legBalance: '你的余额',
    legMatch: '雇主匹配',
    lblYearly: '逐年明细',
    yr: '年份',
    yrAge: '年龄',
    yrSalary: '薪资',
    yrYour: '个人缴费',
    yrMatch: '匹配',
    yrGrowth: '增长',
    yrBalance: '年末余额',
    step1: '输入年龄、薪资和当前 401(k) 余额',
    step2: '设置缴费比例、雇主匹配和预期收益',
    step3: '查看最终余额、个人缴费、雇主匹配和投资收益',
    step4: '滚动逐年明细查看复利效果',
  }
});

const { $, t, formatMoney, formatPct } = (() => {
  const base = GZ;
  return {
    $: base.$, t: base.t,
    formatMoney: (n) => '$' + Math.round(n).toLocaleString('en-US'),
    formatPct: (n) => n.toFixed(1) + '%',
  };
})();

const IRS_LIMIT_2026 = 24500;

function calculate() {
  let age = +$('#age').value;
  const retire = +$('#retire').value;
  let salary = +$('#salary').value;
  let contribPct = +$('#contrib').value;
  const matchPct = +$('#match').value;
  const matchCap = +$('#matchcap').value;
  let balance = +$('#current').value;
  const annualReturn = +$('#ret').value / 100;
  const raise = +$('#raise').value / 100;
  const years = Math.max(0, retire - age);
  
  const rows = [];
  let totalContrib = 0, totalMatch = 0, totalGrowth = 0;

  // Year 0 = current state
  for (let y = 0; y < years; y++) {
    const year = new Date().getFullYear() + y;
    const ageY = age + y;
    // Apply contribution (IRS limit cap)
    let contrib = salary * (contribPct / 100);
    const cap = ageY >= 50 ? 32500 : IRS_LIMIT_2026;
    if (contrib > cap) contrib = cap;
    // Apply employer match
    const matchEligible = Math.min(contribPct, matchCap) / 100 * salary;
    const match = matchEligible * (matchPct / 100);
    // Growth
    const growth = balance * annualReturn;
    balance = balance + contrib + match + growth;
    totalContrib += contrib;
    totalMatch += match;
    totalGrowth += growth;
    rows.push({year, age: ageY, salary, contrib, match, growth, balance});
    // Salary raise next year
    salary = salary * (1 + raise);
  }
  
  const finalBalance = balance;
  const totalReturn = totalContrib + totalMatch + totalGrowth;
  const isMatched = (contribPct >= matchCap);
  
  // Render tiles
  $('#tiles').innerHTML = `
    <div class="fk-tile highlight"><div class="num">${formatMoney(finalBalance)}</div><div class="lbl">${t('tileFinal')}</div></div>
    <div class="fk-tile contrib"><div class="num">${formatMoney(totalContrib)}</div><div class="lbl">${t('tileContrib')}</div></div>
    <div class="fk-tile match"><div class="num">${formatMoney(totalMatch)}</div><div class="lbl">${t('tileMatch')}</div></div>
    <div class="fk-tile gain"><div class="num">${formatMoney(totalGrowth)}</div><div class="lbl">${t('tileGain')}</div></div>
    <div class="fk-tile"><div class="num">${formatPct(totalContrib > 0 ? (totalReturn/totalContrib-1)*100 : 0)}</div><div class="lbl">${t('tileReturn')}</div></div>
  `;
  
  // Chart bars
  const maxBal = Math.max(...rows.map(r => r.balance), 1);
  $('#bars').innerHTML = rows.map(r => {
    const barH = (r.balance / maxBal) * 100;
    const matchH = (r.match / maxBal) * 100;
    return `<div class="bar" style="height:${barH}%">
      <div class="tip">Y${r.year} (Age ${r.age}): ${formatMoney(r.balance)}</div>
      <div class="match" style="position:absolute;bottom:0;left:0;right:0;height:${(matchH/barH)*100 || 0}%;background:linear-gradient(180deg,#f59e0b,rgba(245,158,11,.4));border-radius:3px 3px 0 0"></div>
    </div>`;
  }).join('');
  
  $('#ax-start').textContent = rows.length ? rows[0].year : '—';
  $('#ax-mid').textContent = rows.length ? rows[Math.floor(rows.length/2)].year : '—';
  $('#ax-end').textContent = rows.length ? rows[rows.length-1].year : '—';
  $('#chart-title').textContent = t('chartTitle');
  $('#leg-balance').textContent = t('legBalance');
  $('#leg-match').textContent = t('legMatch');
  $('#lbl-yearly').textContent = t('lblYearly');
  
  // Yearly table
  let tableHtml = `<tr><th>${t('yr')}</th><th>${t('yrAge')}</th><th>${t('yrSalary')}</th><th>${t('yrYour')}</th><th>${t('yrMatch')}</th><th>${t('yrGrowth')}</th><th>${t('yrBalance')}</th></tr>`;
  rows.forEach(r => {
    tableHtml += `<tr>
      <td>${r.year}</td>
      <td>${r.age}</td>
      <td>${formatMoney(r.salary)}</td>
      <td>${formatMoney(r.contrib)}</td>
      <td>${formatMoney(r.match)}</td>
      <td>${formatMoney(r.growth)}</td>
      <td><b>${formatMoney(r.balance)}</b></td>
    </tr>`;
  });
  $('#yearly').innerHTML = tableHtml;
  
  // Tip
  let tip = t('tip');
  if (!isMatched && matchCap > 0) {
    tip += ' ⚠️ You are missing ' + (matchCap - contribPct).toFixed(1) + '% match — increase your contribution to get the full ' + matchCap + '% match.';
  }
  $('#tip').textContent = tip;
}

// Bind events
['age','retire','salary','contrib','match','matchcap','current','ret','raise'].forEach(id => {
  $('#'+id).addEventListener('input', calculate);
});

// Apply labels
$('#lbl-age').textContent = t('lblAge');
$('#lbl-retire').textContent = t('lblRetire');
$('#lbl-salary').textContent = t('lblSalary');
$('#lbl-contrib').textContent = t('lblContrib');
$('#lbl-match').textContent = t('lblMatch');
$('#lbl-matchcap').textContent = t('lblMatchcap');
$('#lbl-current').textContent = t('lblCurrent');
$('#lbl-return').textContent = t('lblReturn');
$('#lbl-raise').textContent = t('lblRaise');

calculate();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🏖️', href:'/calc/retirement-calculator.html', name:'Retirement Calculator'},
    {icon:'📊', href:'/calc/inflation-calculator.html', name:'Inflation'},
    {icon:'💰', href:'/calc/compound-interest.html', name:'Compound Interest'},
    {icon:'💵', href:'/calc/salary-calculator.html', name:'Salary Calculator'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
