<script>
GZI18n.register({
  en: {
    toolTitle: 'Meditation Timer',
    toolDesc: 'Free online meditation timer with ambient sounds, interval bells and session tracking. Set duration, add warm-up and interval chimes — no app needed.',
    start: 'Begin',
    pause: 'Pause',
    reset: 'Reset',
    preparing: 'Prepare',
    meditating: 'Breathe',
    done: 'Complete',
    lblWarmup: 'Warm-up (sec)',
    lblInterval: 'Interval chime (min)',
    lblBell: 'Bell sound',
    lblAmbient: 'Ambient sound',
    todaySessions: 'Today',
    totalSessions: 'Total',
    step1: 'Pick a duration from the preset buttons',
    step2: 'Optionally set warm-up time, interval chimes and ambient sounds',
    step3: 'Press Begin and settle into your meditation',
    step4: 'The bell rings when your session is complete',
  },
  zh: {
    toolTitle: '冥想计时器',
    toolDesc: '免费在线冥想计时器，支持环境音、间隔铃声和会话记录。设置时长、预备倒计时和间隔钟声 — 无需安装应用。',
    start: '开始',
    pause: '暂停',
    reset: '重置',
    preparing: '准备',
    meditating: '呼吸',
    done: '完成',
    lblWarmup: '预备（秒）',
    lblInterval: '间隔铃声（分钟）',
    lblBell: '钟声音效',
    lblAmbient: '环境音',
    todaySessions: '今日',
    totalSessions: '总计',
    step1: '从预设按钮中选择时长',
    step2: '可选设置预备时间、间隔铃声和环境音',
    step3: '点击「开始」进入冥想',
    step4: '冥想结束时自动响起钟声',
  }
});

const { $, t } = GZ;
let duration = 600; // seconds (10 min default)
let elapsed = 0;
let warmupLeft = 0;
let running = false;
let interval = null;
let ambient = 'none';
let audioCtx = null;
let ambientNode = null;
let stats = JSON.parse(localStorage.getItem('gz-med-stats') || '{"today":0,"date":"","total":0}');

function fmt(sec) {
  sec = Math.max(0, Math.floor(sec));
  const m = Math.floor(sec / 60);
  const s = sec % 60;
  return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

function todayKey() { return new Date().toISOString().slice(0,10); }

function ensureCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

function playBell() {
  ensureCtx();
  const type = $('#bellType').value;
  const freq = type === 'gong' ? 200 : type === 'chime' ? 880 : 440;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.frequency.value = freq;
  osc.type = type === 'gong' ? 'sine' : 'triangle';
  gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 3);
  osc.start();
  osc.stop(audioCtx.currentTime + 3);
}

function startAmbient() {
  if (ambient === 'none') return;
  ensureCtx();
  stopAmbient();
  // white noise based ambient
  const bufferSize = audioCtx.sampleRate * 2;
  const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) {
    data[i] = (Math.random() * 2 - 1) * 0.15;
  }
  const source = audioCtx.createBufferSource();
  source.buffer = buffer;
  source.loop = true;
  const filter = audioCtx.createBiquadFilter();
  filter.type = 'lowpass';
  filter.frequency.value = ambient === 'ocean' ? 400 : ambient === 'rain' ? 1200 : 800;
  const gain = audioCtx.createGain();
  gain.gain.value = 0.3;
  source.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination);
  source.start();
  ambientNode = { source, gain };
  // ocean wave effect
  if (ambient === 'ocean') {
    let phase = 0;
    const lfo = setInterval(() => {
      if (!ambientNode) return;
      phase += 0.05;
      gain.gain.value = 0.15 + Math.abs(Math.sin(phase)) * 0.25;
    }, 100);
    ambientNode.lfo = lfo;
  }
}

function stopAmbient() {
  if (ambientNode) {
    try { ambientNode.source.stop(); } catch(e){}
    if (ambientNode.lfo) clearInterval(ambientNode.lfo);
    ambientNode = null;
  }
}

function tick() {
  if (warmupLeft > 0) {
    warmupLeft--;
    if (warmupLeft <= 0) {
      playBell();
      $('#sub').textContent = t('meditating');
    }
  } else {
    elapsed++;
    const intervalMin = +$('#interval').value;
    if (intervalMin > 0 && elapsed > 0 && elapsed % (intervalMin * 60) === 0) {
      playBell();
    }
    if (elapsed >= duration) {
      playBell();
      complete();
      return;
    }
  }
  updateDisplay();
}

function updateDisplay() {
  if (warmupLeft > 0) {
    $('#time').textContent = fmt(warmupLeft);
    $('#sub').textContent = t('preparing');
  } else {
    $('#time').textContent = fmt(duration - elapsed);
    $('#sub').textContent = running ? t('meditating') : '';
  }
}

function complete() {
  pause();
  $('#sub').textContent = t('done');
  // log session
  if (stats.date !== todayKey()) { stats.date = todayKey(); stats.today = 0; }
  stats.today++;
  stats.total++;
  localStorage.setItem('gz-med-stats', JSON.stringify(stats));
  updateStats();
  $('#time').textContent = '00:00';
  $('#circle').classList.remove('running');
  stopAmbient();
}

function start() {
  if (running) return;
  ensureCtx();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  running = true;
  warmupLeft = +$('#warmup').value;
  if (warmupLeft > 0) playBell();
  startAmbient();
  $('#circle').classList.add('running');
  interval = setInterval(tick, 1000);
  renderControls();
  updateDisplay();
}

function pause() {
  running = false;
  clearInterval(interval);
  $('#circle').classList.remove('running');
  stopAmbient();
  renderControls();
}

function reset() {
  pause();
  elapsed = 0;
  warmupLeft = 0;
  $('#sub').textContent = '';
  updateDisplay();
  renderControls();
}

function renderControls() {
  $('#controls').innerHTML = running
    ? `<button class="med-btn" onclick="pause()">${t('pause')}</button><button class="med-btn secondary" onclick="reset()">${t('reset')}</button>`
    : `<button class="med-btn" onclick="start()">${t('start')}</button><button class="med-btn secondary" onclick="reset()">${t('reset')}</button>`;
}

function updateStats() {
  $('#stats').innerHTML = `
    <div class="med-stat"><div class="v">${stats.date===todayKey()?stats.today:0}</div><div class="k">${t('todaySessions')}</div></div>
    <div class="med-stat"><div class="v">${stats.total}</div><div class="k">${t('totalSessions')}</div></div>`;
}

function setPreset(min) {
  if (running) pause();
  duration = min * 60;
  elapsed = 0;
  warmupLeft = 0;
  updateDisplay();
  document.querySelectorAll('.med-presets button').forEach(b => b.classList.toggle('active', +b.dataset.min === min));
}

// init
const presets = [3,5,10,15,20,30];
$('#presets').innerHTML = presets.map(m => `<button data-min="${m}" onclick="setPreset(${m})" class="${m===10?'active':''}">${m}m</button>`).join('');
$('#lbl-warmup').textContent = t('lblWarmup');
$('#lbl-interval').textContent = t('lblInterval');
$('#lbl-bell').textContent = t('lblBell');
$('#lbl-ambient').textContent = t('lblAmbient');
$('#ambientBtns').querySelectorAll('button').forEach(b => {
  b.onclick = () => {
    ambient = b.dataset.s;
    $('#ambientBtns').querySelectorAll('button').forEach(x => x.classList.toggle('active', x === b));
    if (running) { stopAmbient(); startAmbient(); }
  };
});
renderControls();
updateDisplay();
updateStats();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🍅', href:'/calc/pomodoro.html', name:'Pomodoro Timer'},
    {icon:'📚', href:'/calc/study-timer.html', name:'Study Timer'},
    {icon:'⏰', href:'/calc/countdown-timer.html', name:'Countdown Timer'},
    {icon:'🌬️', href:'/calc/breathing-exercise.html', name:'Breathing Exercise'},
  ]
});
</script>
