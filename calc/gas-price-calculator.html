<style>
.gas-form{display:flex;flex-direction:column;gap:14px;max-width:480px;margin:0 auto}
.gas-form label{display:flex;flex-direction:column;gap:6px;font-size:.85em;color:var(--text2)}
.gas-form input,.gas-form select{padding:10px 12px;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:1em}
.gas-row{display:flex;gap:12px}

.gas-card{background:var(--glass);border:1px solid var(--border);border-radius:14px;padding:20px;text-align:center}
.gas-card .value{font-size:2rem;font-weight:800;color:var(--accent);line-height:1.1}
.gas-card .label{font-size:.8em;color:var(--text2);margin-top:4px}

<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"How do I calculate gas cost for a trip?","acceptedAnswer":{"@type":"Answer","text":"Multiply the trip distance by your car\u2019s fuel consumption rate, then multiply by the gas price. For example: a 300-mile trip at 25 MPG uses 12 gallons. At $3.50/gallon, the cost is 12 \u00d7 $3.50 = $42."}},{"@type":"Question","name":"How many gallons of gas will I use?","acceptedAnswer":{"@type":"Answer","text":"Gallons used = distance \u00f7 MPG. For a 400-mile trip in a car averaging 30 MPG, you would use 400 \u00f7 30 \u2248 13.3 gallons."}},{"@type":"Question","name":"What if my car uses liters per 100km?","acceptedAnswer":{"@type":"Answer","text":"Select metric mode. Enter distance in km, your car\u2019s consumption in L/100km, and the fuel price per liter. The calculator handles the conversion automatically."}},{"@type":"Question","name":"How accurate is the gas cost estimate?","acceptedAnswer":{"@type":"Answer","text":"The estimate assumes steady fuel efficiency. Real costs vary with traffic, speed, terrain, AC use, and vehicle condition. City driving typically uses 10-20% more fuel than highway driving."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="gas-form">
      <label><span id="lbl-distance"></span>
        <input type="number" id="distance" min="0" step="any" placeholder="300" oninput="calcGas()">
      </label>
      <div class="gas-row">
        <label><span id="lbl-eff"></span>
          <input type="number" id="efficiency" min="0" step="any" placeholder="25" oninput="calcGas()">
        </label>
        <label><span id="lbl-unit"></span>
          <select id="unitsel" onchange="calcGas()">
            <option value="mpg">MPG (mi/gal)</option>
            <option value="l100">L/100km</option>
          </select>
        </label>
      </div>
      <label><span id="lbl-price"></span>
        <input type="number" id="price" min="0" step="0.01" placeholder="3.50" oninput="calcGas()">
      </label>
    </div>
    <div id="result"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Gas Price Calculator',
    toolDesc: 'Estimate fuel cost for any trip. Enter distance, fuel efficiency and gas price to get total cost, gallons used and cost per mile.',
    distance: 'Trip distance (miles or km)',
    eff: 'Fuel efficiency',
    unit: 'Unit',
    price: 'Gas price (per gallon or liter)',
    calcBtn: 'Calculate',
    clearBtn: 'Clear',
    totalCost: 'Total fuel cost',
    gallonsUsed: 'Fuel used',
    costPerMile: 'Cost per mile',
    costPerKm: 'Cost per km',
    enterValues: 'Enter your trip details above to calculate fuel cost.',
    step1: 'Enter the total trip distance',
    step2: 'Enter your car\u2019s fuel efficiency (MPG or L/100km)',
    step3: 'Enter the current gas price per gallon or liter',
    step4: 'See total cost, fuel used and cost per mile instantly',
  },
  zh: {
    toolTitle: '\u6c7d\u6cb9\u4ef7\u683c\u8ba1\u7b97\u5668',
    toolDesc: '\u4f30\u7b97\u4efb\u610f\u884c\u7a0b\u7684\u71c3\u6cb9\u6210\u672c\u3002\u8f93\u5165\u8ddd\u79bb\u3001\u6cb9\u8017\u548c\u6cb9\u4ef7\uff0c\u5373\u53ef\u83b7\u5f97\u603b\u6210\u672c\u3001\u71c3\u6cb9\u6d88\u8017\u548c\u6bcf\u82f1\u91cc\u6210\u672c\u3002',
    distance: '\u884c\u7a0b\u8ddd\u79bb\uff08\u82f1\u91cc\u6216\u516c\u91cc\uff09',
    eff: '\u71c3\u6cb9\u6548\u7387',
    unit: '\u5355\u4f4d',
    price: '\u6c7d\u6cb9\u4ef7\u683c\uff08\u6bcf\u52a0\u4ed1\u6216\u6bcf\u5347\uff09',
    calcBtn: '\u8ba1\u7b97',
    clearBtn: '\u6e05\u9664',
    totalCost: '\u71c3\u6cb9\u603b\u6210\u672c',
    gallonsUsed: '\u71c3\u6cb9\u6d88\u8017',
    costPerMile: '\u6bcf\u82f1\u91cc\u6210\u672c',
    costPerKm: '\u6bcf\u516c\u91cc\u6210\u672c',
    enterValues: '\u8f93\u5165\u884c\u7a0b\u4fe1\u606f\u5373\u53ef\u8ba1\u7b97\u71c3\u6cb9\u6210\u672c\u3002',
    step1: '\u8f93\u5165\u603b\u884c\u7a0b\u8ddd\u79bb',
    step2: '\u8f93\u5165\u6c7d\u8f66\u71c3\u6cb9\u6548\u7387\uff08MPG \u6216 L/100km\uff09',
    step3: '\u8f93\u5165\u5f53\u524d\u6bcf\u52a0\u4ed1\u6216\u6bcf\u5347\u7684\u6c7d\u6cb9\u4ef7\u683c',
    step4: '\u5373\u65f6\u67e5\u770b\u603b\u6210\u672c\u3001\u71c3\u6cb9\u6d88\u8017\u548c\u6bcf\u82f1\u91cc\u6210\u672c',
  }
});
const { $, t } = GZ;

function calcGas() {
  const dist = parseFloat($('#distance').value);
  const eff = parseFloat($('#efficiency').value);
  const price = parseFloat($('#price').value);
  if (!dist || !eff || !price || dist <= 0 || eff <= 0 || price <= 0) {
    $('#result').innerHTML = `<p style="text-align:center;color:var(--text2);padding:20px">${t('enterValues')}</p>`;
    return;
  }
  const unit = $('#unitsel').value;
  let fuelUsed, perDistLabel, perDistVal, fuelLabel;
  if (unit === 'mpg') {
    fuelUsed = dist / eff;
    perDistVal = (fuelUsed * price) / dist;
    perDistLabel = t('costPerMile');
    fuelLabel = 'gal';
  } else {
    fuelUsed = (dist / 100) * eff;
    perDistVal = (fuelUsed * price) / dist;
    perDistLabel = t('costPerKm');
    fuelLabel = 'L';
  }
  const totalCost = fuelUsed * price;
  $('#result').innerHTML = `
    <div class="gas-result">
      <div class="gas-card primary"><div class="value">${totalCost.toFixed(2)}</div><div class="label">${t('totalCost')}</div></div>
      <div class="gas-card"><div class="value">${fuelUsed.toFixed(2)} ${fuelLabel}</div><div class="label">${t('gallonsUsed')}</div></div>
      <div class="gas-card"><div class="value">${perDistVal.toFixed(3)}</div><div class="label">${perDistLabel}</div></div>
    </div>`;
}

function doClear() {
  $('#distance').value = ''; $('#efficiency').value = ''; $('#price').value = '';
  $('#result').innerHTML = `<p style="text-align:center;color:var(--text2);padding:20px">${t('enterValues')}</p>`;
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="calcGas()">${t('calcBtn')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clearBtn')}</button>`;

$('#result').innerHTML = `<p style="text-align:center;color:var(--text2);padding:20px">${t('enterValues')}</p>`;

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'\ud83d\ude97', href:'/calc/mpg-calculator.html', name:'MPG Calculator'},
    {icon:'\u26fd', href:'/calc/fuel-cost-calculator.html', name:'Fuel Cost'},
    {icon:'\ud83d\ude98', href:'/calc/toll-calculator.html', name:'Toll Calculator'},
    {icon:'\ud83c\udf0d', href:'/calc/carbon-footprint.html', name:'Carbon Footprint'},
  ]
});
</script>
<script src="/tools-result-rec.js?v=20260707v520" defer></script>
</body>
</html>
