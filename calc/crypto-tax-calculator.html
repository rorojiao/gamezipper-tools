<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "How is crypto taxed in the US?", "acceptedAnswer": {"@type": "Answer", "text": "In the US, selling or trading cryptocurrency is a taxable event. Held under 1 year, gains are taxed as short-term capital gains at your ordinary income rate. Held over 1 year, gains are long-term at 0%, 15% or 20% based on income. This tool estimates both scenarios plus the 3.8% NIIT surcharge for higher earners."}}, {"@type": "Question", "name": "What is the difference between short-term and long-term crypto gains?", "acceptedAnswer": {"@type": "Answer", "text": "Short-term gains (held 1 year or less) are taxed at your ordinary income tax rate (10-37% in the US). Long-term gains (held over 1 year) enjoy lower rates of 0%, 15% or 20% depending on your taxable income and filing status."}}, {"@type": "Question", "name": "Does this calculator include state taxes?", "acceptedAnswer": {"@type": "Answer", "text": "The base calculation covers US federal capital gains tax and the NIIT surcharge. You can add an optional state tax rate to estimate your total liability, since state rates vary widely from 0% (Texas, Florida) to 13.3% (California)."}}, {"@type": "Question", "name": "Is my financial data stored anywhere?", "acceptedAnswer": {"@type": "Answer", "text": "No. All calculations happen entirely in your browser using JavaScript. No cost basis, sale price or income data is sent to any server."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-form" id="form">
      <div class="row2">
        <div>
          <label id="lbl-cost"></label>
          <input type="number" id="cost" value="10000" min="0" step="100">
        </div>
        <div>
          <label id="lbl-sale"></label>
          <input type="number" id="sale" value="25000" min="0" step="100">
        </div>
      </div>
      <div>
        <label id="lbl-held"></label>
        <select id="held">
          <option value="short" id="opt-short"></option>
          <option value="long" selected id="opt-long"></option>
        </select>
      </div>
      <div>
        <label id="lbl-income"></label>
        <select id="income">
          <option value="0">0% bracket (income ≤ $44,625)</option>
          <option value="15" selected>15% bracket ($44,626 – $492,300)</option>
          <option value="20">20% bracket (&gt; $492,300)</option>
          <option value="ord">Ordinary income (short-term)</option>
        </select>
      </div>
      <div>
        <label id="lbl-filing"></label>
        <select id="filing">
          <option value="10">10% — Single, low income</option>
          <option value="22" selected>22% — Single, middle income</option>
          <option value="24">24% — Single, upper-middle</option>
          <option value="32">32% — High earner</option>
          <option value="35">35% — Top bracket</option>
          <option value="37">37% — Highest bracket</option>
        </select>
      </div>
      <div>
        <label id="lbl-state"></label>
        <input type="number" id="state" value="0" min="0" max="50" step="0.1">
      </div>
      <button class="gz-btn" onclick="calculate()" id="btn-calc"></button>
    </div>
    <div class="result-card" id="result" style="display:none">
      <div class="big" id="result-tax"></div>
      <div class="label" id="result-label"></div>
      <div class="result-grid">
        <div class="result-item"><div class="val" id="r-gain"></div><div class="lbl" id="r-gain-label"></div></div>
        <div class="result-item"><div class="val" id="r-net"></div><div class="lbl" id="r-net-label"></div></div>
        <div class="result-item"><div class="val" id="r-rate"></div><div class="lbl" id="r-rate-label"></div></div>
        <div class="result-item"><div class="val" id="r-effective"></div><div class="lbl" id="r-effective-label"></div></div>
      </div>
      <div class="disclaimer" id="disclaimer"></div>
    </div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Crypto Tax Calculator',
    toolDesc: 'Estimate US capital gains tax on Bitcoin, Ethereum and any crypto sale. Enter cost basis, sale value and holding period — see short-term vs long-term tax, NIIT and net proceeds.',
    lblCost: 'Cost Basis (purchase price, $)',
    lblSale: 'Sale Proceeds ($)',
    lblHeld: 'Holding Period',
    lblIncome: 'Long-term Income Bracket',
    lblFiling: 'Ordinary Income Tax Rate (short-term)',
    lblState: 'State Tax Rate (%) — optional',
    optShort: 'Short-term (held 1 year or less)',
    optLong: 'Long-term (held over 1 year)',
    btnCalc: 'Calculate Crypto Tax',
    resultLabel: 'Estimated Federal Tax Owed',
    gain: 'Taxable Gain',
    net: 'Net After-Tax Proceeds',
    rate: 'Marginal Rate',
    effective: 'Effective Tax Rate',
    step1: 'Enter your cost basis (what you paid) and sale proceeds',
    step2: 'Pick short-term or long-term holding period',
    step3: 'Choose your income bracket to set the right rate',
    step4: 'Optionally add state tax, then click Calculate',
    disclaimer: '⚠️ Estimate only — not tax advice. Crypto tax rules vary by country and change often. Consult a tax professional before filing. NIIT (3.8%) applies to high-earning individuals.',
  },
  zh: {
    toolTitle: '加密货币税务计算器',
    toolDesc: '估算比特币、以太坊等加密货币出售时的美国资本利得税。输入成本基础、出售金额和持有期限 — 查看短期/长期税率、NIIT 和税后净收益。',
    lblCost: '成本基础（购入价，美元）',
    lblSale: '出售收入（美元）',
    lblHeld: '持有期限',
    lblIncome: '长期持有收入档位',
    lblFiling: '常规所得税率（短期持有）',
    lblState: '州税率（%）— 可选',
    optShort: '短期（持有 1 年及以内）',
    optLong: '长期（持有超过 1 年）',
    btnCalc: '计算加密税',
    resultLabel: '预估应缴联邦税',
    gain: '应税利得',
    net: '税后净收入',
    rate: '边际税率',
    effective: '有效税率',
    step1: '输入成本基础（你买入的价格）和出售收入',
    step2: '选择短期或长期持有期限',
    step3: '选择你的收入档位以确定适用税率',
    step4: '可选添加州税，然后点击「计算」',
    disclaimer: '⚠️ 仅供参考，不构成税务建议。各国加密税法差异较大且经常变化，报税前请咨询专业税务顾问。NIIT（3.8%）适用于高收入人群。',
  }
});

const { $, t } = GZ;

function calculate(){
  const cost = parseFloat($('#cost').value)||0;
  const sale = parseFloat($('#sale').value)||0;
  const held = $('#held').value;
  const income = $('#income').value;
  const filing = parseFloat($('#filing').value)/100;
  const statePct = (parseFloat($('#state').value)||0)/100;
  const gain = sale - cost;

  let fedRate;
  if(held==='short'){
    fedRate = income==='ord' ? filing : filing;
  } else {
    fedRate = income==='ord' ? 0.15 : parseFloat(income)/100;
  }
  // NIIT 3.8% kicks in for high earners — assume applies when gain is significant
  const niit = gain > 0 ? 0.038 : 0;
  const totalRate = fedRate + niit + statePct;
  const fedTax = Math.max(0, gain) * fedRate;
  const niitTax = Math.max(0, gain) * niit;
  const stateTax = Math.max(0, gain) * statePct;
  const totalTax = fedTax + niitTax + stateTax;
  const net = sale - totalTax;
  const effective = sale>0 ? (totalTax/sale*100) : 0;

  $('#result').style.display='';
  const sign = '$';
  $('#result-tax').textContent = sign + totalTax.toLocaleString(undefined,{maximumFractionDigits:0});
  $('#result-label').textContent = t('resultLabel') + (held==='short'?' · '+t('optShort'):' · '+t('optLong'));
  $('#r-gain').textContent = sign + Math.round(gain).toLocaleString();
  $('#r-gain-label').textContent = t('gain');
  $('#r-net').textContent = sign + Math.round(net).toLocaleString();
  $('#r-net-label').textContent = t('net');
  $('#r-rate').textContent = (totalRate*100).toFixed(1)+'%';
  $('#r-rate-label').textContent = t('rate')+' (fed '+(fedRate*100).toFixed(0)+'% + NIIT '+(niit*100).toFixed(1)+'% + state '+(statePct*100).toFixed(1)+'%)';
  $('#r-effective').textContent = effective.toFixed(2)+'%';
  $('#r-effective-label').textContent = t('effective');
  $('#disclaimer').textContent = t('disclaimer');
}

document.getElementById('opt-short').textContent=t('optShort');
document.getElementById('opt-long').textContent=t('optLong');
document.getElementById('btn-calc').textContent=t('btnCalc');
calculate();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🪙', href:'/calc/crypto-profit-calculator.html', name:'Crypto Profit'},
    {icon:'💹', href:'/calc/capital-gains-tax-calculator.html', name:'Capital Gains Tax'},
    {icon:'📈', href:'/calc/compound-interest-calculator.html', name:'Compound Interest'},
    {icon:'💵', href:'/calc/take-home-pay-calculator.html', name:'Take-Home Pay'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
