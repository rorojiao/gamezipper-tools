    toolDesc: '检测你的写作语气 — 正式、休闲、学术、说服或感性。查看正式度、情感、说服力和可读性评分，以及改进建议。100% 浏览器本地运行。',
    enterText: '粘贴邮件、论文、博客或消息',
    result: '语气分析',
    formality: '正式度', formalityL:'休闲', formalityR:'正式',
    emotion: '情感', emotionL:'中性', emotionR:'感性',
    persuasion: '说服力', persuasionL:'描述', persuasionR:'说服',
    objectivity: '客观性', objectivityL:'主观', objectivityR:'客观',
    complexity: '复杂度', complexityL:'简单', complexityR:'复杂',
    stats: '文本统计',
    sentences: '句子', words:'单词', avgLen:'平均句长', sylPerWord:'音节/词', readability:'可读性',
    suggestions: '改进建议',
    noText: '请输入至少两句话以分析语气。',
    toneFormal: '正式', toneCasual:'休闲', toneAcademic:'学术', tonePersuasive:'说服', toneConversational:'对话', toneTechnical:'技术', toneEmotional:'感性',
    step1: '在输入框中粘贴邮件、论文、博客或消息',
    step2: '分析会在输入时自动运行',
    step3: '查看主要语气结论和五个维度的评分',
    step4: '根据定制化建议调整你的语气',
  }
});

const { $, copyText, t } = GZ;

const CONTRACTIONS = /\b(can't|won't|don't|doesn't|didn't|isn't|aren't|wasn't|weren't|haven't|hasn't|hadn't|couldn't|wouldn't|shouldn't|mustn't|i'm|you're|he's|she's|it's|we're|they're|i've|you've|we've|they've|i'll|you'll|he'll|she'll|we'll|they'll|i'd|you'd|he'd|she'd|we'd|they'd|let's|that's|there's|here's|what's|who's|how's|gonna|wanna|gotta|kinda|sorta|yeah|ok|okay|yep|nope|lol|btw|tbh|imo|fyi|asap)\b/gi;
const SLANG = /\b(awesome|cool|dude|guy|guys|hey|hi|yo|sup|literally|basically|honestly|tbh|ngl|vibes|vibe|chill|dope|sick|fire|lowkey|highkey|ngl|ikr|smh|fomo|yolo)\b/gi;
const FIRST2 = /\b(i|me|my|mine|we|us|our|ours|you|your|yours)\b/gi;
const FORMAL_WORDS = /\b(furthermore|moreover|however|nevertheless|therefore|consequently|accordingly|subsequently|additionally|hence|thus|whereas|albeit|notwithstanding|regarding|concerning|aforementioned|hereby|herein|thereof|wherein|shall|may|whereas|pursuant)\b/gi;
const ACADEMIC_WORDS = /\b(research|study|analysis|data|hypothesis|methodology|significant|correlation|variable|factor|outcome|result|findings|conclusion|literature|empirical|theoretical|framework|paradigm|systematic|quantitative|qualitative|longitudinal)\b/gi;
const TECHNICAL_WORDS = /\b(api|function|algorithm|database|server|client|variable|parameter|interface|implementation|deployment|configuration|optimization|architecture|protocol|encryption|authentication|compile|runtime|framework|library|module|component|asynchronous)\b/gi;
const PERSUASIVE_WORDS = /\b(must|should|need|have to|ought|essential|crucial|vital|important|critical|imagine|discover|guaranteed|proven|exclusive|limited|now|today|instantly|finally|don't miss|you deserve|act now|free|bonus|save|win|best|top|number one)\b/gi;
const IMPERATIVES = /(?:^|[.!?\n]\s+)(go|do|try|start|stop|get|make|take|use|see|check|join|sign|download|buy|order|click|learn|discover|find|create|build|improve|boost|increase|save|get|win|enjoy|subscribe|follow|share|like)\b/gi;
const MODAL = /\b(should|must|ought|need to|have to|shall|will|would|could|might)\b/gi;
const RHETORICAL_Q = /\?\s*$/;
const EMOTION_LEX = /\b(love|hate|happy|sad|angry|excited|afraid|terrified|amazed|wonderful|terrible|awful|beautiful|horrible|joy|fear|rage|passion|thrilled|devastated|ecstatic|furious|delighted|anxious|worried|grateful|proud|ashamed)\b/gi;
const HEDGES = /\b(maybe|perhaps|might|possibly|seems|appears|suggests|indicates|likely|probably|roughly|approximately|arguably|presumably)\b/gi;
const NUMERALS = /\b\d+(\.\d+)?%?\b/g;

function sylCount(w){ w = w.toLowerCase().replace(/[^a-z]/g,''); if(!w) return 0; if(w.length<=3) return 1; w = w.replace(/(?:[^laeiouy]es|ed|[^laeiouy]e)$/,'').replace(/^y/,''); const m = w.match(/[aeiouy]{1,2}/g); return m ? m.length : 1; }

function analyze(text){
  const sents = text.split(/[.!?]+/).map(s=>s.trim()).filter(s=>s.length>0);
  const words = text.toLowerCase().match(/[a-z']+/gi) || [];
  if(words.length < 5) return null;
  const wordCount = words.length;
  const sentCount = Math.max(1, sents.length);
  const avgSentLen = wordCount / sentCount;
  const totalSyl = words.reduce((a,w)=>a+sylCount(w),0);
  const sylPerWord = totalSyl / wordCount;

  // Flesch reading ease
  const flesch = 206.835 - 1.015 * avgSentLen - 84.6 * sylPerWord;

  // Dimension scores 0-100
  const contractions = (text.match(CONTRACTIONS) || []).length;
  const slang = (text.match(SLANG) || []).length;
  const first2 = (text.match(FIRST2) || []).length;
  const formalW = (text.match(FORMAL_WORDS) || []).length;
  const academicW = (text.match(ACADEMIC_WORDS) || []).length;
  const techW = (text.match(TECHNICAL_WORDS) || []).length;
  const persuW = (text.match(PERSUASIVE_WORDS) || []).length;
  const imper = (text.toLowerCase().match(IMPERATIVES) || []).length;
  const modal = (text.match(MODAL) || []).length;
  const rhet = sents.filter(s=>/\?\s*$/.test(s)).length;
  const emotion = (text.match(EMOTION_LEX) || []).length;
  const hedges = (text.match(HEDGES) || []).length;
  const numerals = (text.match(NUMERALS) || []).length;

  const per100 = (n) => (n / wordCount) * 100;
  // Formality: high when formal words, long words, few contractions/slang/first-person
  let formality = 50;
  formality += Math.min(25, per100(formalW + academicW) * 8);
  formality -= Math.min(25, per100(contractions + slang) * 10);
  formality -= Math.min(15, per100(first2) * 4);
  formality += (sylPerWord - 1.4) * 20;
  formality = Math.max(0, Math.min(100, formality));

  // Emotion
  let emotionDim = 30 + Math.min(70, per100(emotion) * 14);
  emotionDim = Math.max(0, Math.min(100, emotionDim));

  // Persuasion
  let persuasion = 20 + per100(persuW + imper + modal) * 7 + rhet * 3;
  persuasion = Math.max(0, Math.min(100, persuasion));

  // Objectivity (high = fact/data, low = opinion)
  let objectivity = 50 + per100(numerals + techW) * 6 - per100(first2 + emotion) * 5 + hedges * 1;
  objectivity = Math.max(0, Math.min(100, objectivity));

  // Complexity
  let complexity = 50 + (avgSentLen - 15) * 1.5 + (sylPerWord - 1.4) * 30 + per100(academicW + techW) * 4;
  complexity = Math.max(0, Math.min(100, complexity));

  // Primary tone verdict
  let tone, emoji;
  if(academicW >= 2 && complexity > 55){ tone='toneAcademic'; emoji='🎓'; }
  else if(techW >= 3){ tone='toneTechnical'; emoji='⚙️'; }
  else if(persuasion > 55){ tone='tonePersuasive'; emoji='🎯'; }
  else if(emotionDim > 60){ tone='toneEmotional'; emoji='💜'; }
  else if(formality > 65){ tone='toneFormal'; emoji='🎩'; }
  else if(formality < 40){ tone='toneCasual'; emoji='😎'; }
  else { tone='toneConversational'; emoji='💬'; }

  // Suggestions
  const sugg = [];
  if(contractions > 0 && formality > 55) sugg.push(lang_zh() ? '检测到缩写词（如 don\'t、it\'s）。如需更正式，可展开为 do not、it is。' : 'Contractions detected (e.g. don\'t, it\'s). Expand to "do not", "it is" for a more formal tone.');
  if(first2 / wordCount > 0.04 && formality > 50) sugg.push(lang_zh() ? '第一/第二人称代词（I、you、we）较多。学术或正式写作中可减少使用。' : 'Heavy use of first/second-person pronouns (I, you, we). Reduce them in academic or formal writing.');
  if(avgSentLen > 25) sugg.push(lang_zh() ? `平均句长 ${avgSentLen.toFixed(1)} 词偏长。拆分为短句可提升可读性。` : `Average sentence length is ${avgSentLen.toFixed(1)} words — quite long. Split into shorter sentences to improve readability.`);
  if(sylPerWord > 1.8) sugg.push(lang_zh() ? '多音节词比例较高。考虑替换部分术语为常用词。' : 'High syllable-per-word ratio. Consider swapping some jargon for everyday words.');
  if(flesch < 30 && flesch > -200) sugg.push(lang_zh() ? `Flesch 可读性 ${flesch.toFixed(0)}，阅读难度较高（适合大学以上）。` : `Flesch readability ${flesch.toFixed(0)} — difficult (college-level). Simplify for a wider audience.`);
  if(persuasion > 55 && rhet > 0) sugg.push(lang_zh() ? '使用了反问句，说服力强。注意不要过度，否则可能显得激进。' : 'Rhetorical questions boost persuasiveness — but overuse can feel aggressive.');
  if(emotionDim > 65) sugg.push(lang_zh() ? '情感词较多。商务或技术场景中可适当降温。' : 'Emotionally charged vocabulary. Consider toning down for business or technical contexts.');
  if(sugg.length === 0) sugg.push(lang_zh() ? '语气平衡良好，没有明显问题。' : 'Your tone is well-balanced with no obvious issues.');

  return { tone, emoji, formality, emotionDim, persuasion, objectivity, complexity, flesch, avgSentLen, sylPerWord, wordCount, sentCount, sugg };
}
function lang_zh(){ return GZI18n.getLang() === 'zh'; }

function doAnalyze(){
  const text = $('#input').value.trim();
  if(text.length < 25){ $('#output').innerHTML = `<div style="padding:24px;text-align:center;color:var(--text2)">${t('noText')}</div>`; return; }
  const r = analyze(text);
  if(!r){ $('#output').innerHTML = `<div style="padding:24px;text-align:center;color:var(--text2)">${t('noText')}</div>`; return; }

  const dim = (name, val, leftK, rightK) => `
    <div class="ta-dim">
      <div class="nm">${t(name)}</div>
      <div class="ta-track"><div class="ta-marker" style="left:${Math.round(val)}%"></div></div>
      <div class="ta-meter"><span>${t(leftK)}</span><span>${t(rightK)}</span></div>
    </div>`;

  $('#output').innerHTML = `
    <div class="ta-primary">
      <div class="ta-emoji">${r.emoji}</div>
      <div class="ta-tone">${t(r.tone)}</div>
      <div class="ta-sub">${t('result')}</div>
    </div>
    <div class="ta-dims">
      ${dim('formality', r.formality, 'formalityL', 'formalityR')}
      ${dim('emotion', r.emotionDim, 'emotionL', 'emotionR')}
      ${dim('persuasion', r.persuasion, 'persuasionL', 'persuasionR')}
      ${dim('objectivity', r.objectivity, 'objectivityL', 'objectivityR')}
      ${dim('complexity', r.complexity, 'complexityL', 'complexityR')}
    </div>
    <div class="ta-stats">
      <div class="ta-stat"><div class="v">${r.sentCount}</div><div class="k">${t('sentences')}</div></div>
      <div class="ta-stat"><div class="v">${r.wordCount}</div><div class="k">${t('words')}</div></div>
      <div class="ta-stat"><div class="v">${r.avgSentLen.toFixed(1)}</div><div class="k">${t('avgLen')}</div></div>
      <div class="ta-stat"><div class="v">${r.sylPerWord.toFixed(2)}</div><div class="k">${t('sylPerWord')}</div></div>
      <div class="ta-stat"><div class="v">${r.flesch.toFixed(0)}</div><div class="k">${t('readability')}</div></div>
    </div>
    <div class="ta-sugg"><strong>${t('suggestions')}</strong><ul>${r.sugg.map(s=>`<li>${s}</li>`).join('')}</ul></div>
  `;
}

function loadExample(){
  $('#input').value = "You absolutely need to try this new approach today! It will transform the way you work, guaranteed. Don't miss out — click the button below to get started now. Imagine how much time you'll save. Honestly, it's amazing how simple it is, and honestly your friends will be jealous.";
  doAnalyze();
}
function doClear(){ $('#input').value=''; $('#output').innerHTML=''; }

$('#input').addEventListener('input', doAnalyze);

$('#toolbar').innerHTML = `
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;
