const { $, copyText, t } = GZ;

// ---- CSV parser (RFC 4180) ----
function parseCsv(text) {
  const rows = [];
  let row = [];
  let field = '';
  let inQuotes = false;
  let i = 0;
  while (i < text.length) {
    const ch = text[i];
    if (inQuotes) {
      if (ch === '"') {
        if (text[i+1] === '"') { field += '"'; i += 2; continue; }
        inQuotes = false; i++; continue;
      }
      field += ch; i++; continue;
    }
    if (ch === '"') { inQuotes = true; i++; continue; }
    if (ch === ',') { row.push(field); field = ''; i++; continue; }
    if (ch === '\r') {
      // handle CRLF or lone CR
      row.push(field); field = '';
      rows.push(row); row = [];
      if (text[i+1] === '\n') i += 2; else i++;
      continue;
    }
    if (ch === '\n') {
      row.push(field); field = '';
      rows.push(row); row = [];
      i++; continue;
    }
    field += ch; i++;
  }
  // last field/row
  if (field.length > 0 || row.length > 0 || inQuotes) {
    row.push(field);
    rows.push(row);
  }
  return rows.filter(r => !(r.length === 1 && r[0] === ''));
}

// ---- TSV parser (split by tab, lines by newline; backslash escapes are not interpreted) ----
function parseTsv(text) {
  return text.replace(/\r\n/g,'\n').replace(/\r/g,'\n').split('\n')
    .filter((line, idx, arr) => !(idx === arr.length - 1 && line === ''))
    .map(line => line.split('\t'));
}

function csvFieldNeedsQuote(s) {
  return /[",\n\r]/.test(s);
}
function csvEscape(s) {
  if (csvFieldNeedsQuote(s)) {
    return '"' + s.replace(/"/g,'""') + '"';
  }
  return s;
}
function rowToCsv(row) { return row.map(csvEscape).join(','); }
function rowToTsv(row) { return row.join('\t'); }

function convert() {
  const inp = $('#input').value;
  if (!inp) { $('#output').value=''; $('#status').textContent=''; return; }
  try {
    const dir = $('#dir').value;
    let rows;
    if (dir === 'tsv2csv') {
      rows = parseTsv(inp);
      $('#output').value = rows.map(rowToCsv).join('\n');
    } else {
      rows = parseCsv(inp);
      $('#output').value = rows.map(rowToTsv).join('\n');
    }
    $('#status').className = 'tc-status ok';
    $('#status').textContent = t('ok') + rows.length + ')';
  } catch (e) {
    $('#status').className = 'tc-status err';
    $('#status').textContent = t('err') + e.message;
    $('#output').value = '';
  }
}

function loadExample() {
  const dir = $('#dir').value;
  if (dir === 'tsv2csv') {
    // TSV with a field that needs CSV quoting
    $('#input').value = 'name\tage\tnote\nAlice\t30\t"Hello, world"\nBob, Jr.\t25\tSays "hi"\nCarol\t28\tLine1\nLine2';
  } else {
    $('#input').value = 'name,age,note\nAlice,30,"Hello, world"\n"Bob, Jr.",25,"Says ""hi"""\nCarol,28,"Line1\nLine2"';
  }
  convert();
}

function doClear() { $('#input').value=''; $('#output').value=''; $('#status').textContent=''; }

['input','dir','headerCheck'].forEach(id => {

  $('#' + id).addEventListener('change', convert);
