    tapStart: '点击或按空格开始',
    tapStop: '点击或按空格停止',
    inspect: '准备… 点击开始',
    notation: "记号：U/D = 上/下，L/R = 左/右，F/B = 前/后。撇号（'）表示逆时针，2 表示 180°。例如：R U R' U' 就是 sexy move。",
    step1: '选择打乱长度并点击「新打乱」',
    step2: '点击计时器或按空格开始复原',
    step3: '再次点击停止 — 成绩自动保存',
    step4: '在记录中查看最佳成绩、Ao5 和 Ao12',
    copied: '打乱公式已复制！',
    confirmClear: '确定删除所有复原记录？',
    none: '—',
    empty: '还没有记录 — 开始计时吧！',
  }
});

const { $, copyText, t } = GZ;

// ---- Scramble generation ----
const FACES = ['U','D','L','R','F','B'];
const SUFFIXES = ['', "'", '2'];
const AXIS = { U:0, D:0, L:1, R:1, F:2, B:2 };

function generateScramble(len) {
  len = len || 20;
  const moves = [];
  let lastAxis = -1, lastLastAxis = -1;
  for (let i = 0; i < len; i++) {
    let face, axis;
    do {
      face = FACES[Math.floor(Math.random() * 6)];
      axis = AXIS[face];
    } while (axis === lastAxis || (axis === lastLastAxis && axis === lastAxis));
    // simpler: avoid same axis as previous, and avoid same axis twice in a row pattern
    const suffix = SUFFIXES[Math.floor(Math.random() * 3)];
    moves.push(face + suffix);
    lastLastAxis = lastAxis;
    lastAxis = axis;
  }
  return moves;
}

function renderScramble() {
  const len = +$('#scramble-len').value;
  const moves = generateScramble(len);
  currentScramble = moves;
  $('#scramble').innerHTML = moves.map(m => `<span class="move">${m}</span>`).join(' ');
}
let currentScramble = [];

// ---- Timer ----
let timerState = 'idle'; // idle | ready | running
let startTime = 0;
let rafId = null;

function formatTime(ms) {
  if (ms == null) return '—';
  const totalSec = ms / 1000;
  const m = Math.floor(totalSec / 60);
  const s = Math.floor(totalSec % 60);
  const cs = Math.floor((ms % 1000) / 10);
  return (m > 0 ? String(m).padStart(2,'0') + ':' : '') + String(s).padStart(2,'0') + '.' + String(cs).padStart(2,'0');
}

function updateTimerDisplay() {
  if (timerState === 'running') {
    const elapsed = performance.now() - startTime;
    $('#time-text').textContent = formatTime(elapsed);
    rafId = requestAnimationFrame(updateTimerDisplay);
  }
}

function startTimer() {
  timerState = 'running';
  startTime = performance.now();
  $('#timer').classList.remove('ready');
  $('#timer').classList.add('running');
  $('#timer-hint').textContent = t('tapStop');
  updateTimerDisplay();
}

function stopTimer() {
  if (rafId) cancelAnimationFrame(rafId);
  const elapsed = performance.now() - startTime;
  $('#time-text').textContent = formatTime(elapsed);
  timerState = 'idle';
  $('#timer').classList.remove('running','ready');
  $('#timer-hint').textContent = t('tapStart');
  addSolve(elapsed, currentScramble.join(' '));
}

function resetTimer() {
  if (rafId) cancelAnimationFrame(rafId);
  timerState = 'idle';
  $('#timer').classList.remove('running','ready');
  $('#time-text').textContent = '00:00.00';
  $('#timer-hint').textContent = t('tapStart');
}

function handleTimerTap() {
  if (timerState === 'idle' || timerState === 'ready') {
    startTimer();
  } else if (timerState === 'running') {
    stopTimer();
    renderScramble();
  }
}

// ---- Solve history ----
const STORE_KEY = 'gz-cube-history';
function loadHistory() {
  try { return JSON.parse(localStorage.getItem(STORE_KEY) || '[]'); }
  catch (e) { return []; }
}
function saveHistory(h) {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(h)); } catch (e) {}
}
let history = loadHistory();

function avgOf(arr) {
  // Ao5/Ao12: drop min and max, average the middle
  if (arr.length < 5) return null;
  const sorted = arr.slice().sort((a, b) => a - b);
  const mid = sorted.slice(1, -1);
  return mid.reduce((a, b) => a + b, 0) / mid.length;
}

function computeStats() {
  if (history.length === 0) return null;
  const times = history.map(h => h.time);
  const best = Math.min(...times);
  const last = times[times.length - 1];
  const last5 = times.slice(-5);
  const last12 = times.slice(-12);
  const ao5 = avgOf(last5);
  const ao12 = avgOf(last12);
  const avg = times.reduce((a, b) => a + b, 0) / times.length;
  return { best, last, ao5, ao12, avg, count: times.length };
}

function addSolve(time, scramble) {
  history.push({ time, scramble, ts: Date.now() });
  if (history.length > 200) history = history.slice(-200);
  saveHistory(history);
  renderHistory();
}

function renderHistory() {
  const s = computeStats();
  if (!s) {
    $('#stats').innerHTML = '';
    $('#history-body').innerHTML = `<tr><td colspan="4" style="text-align:center;color:var(--text2);padding:18px">${t('empty')}</td></tr>`;
    return;
  }
  $('#stats').innerHTML = `
    <div class="cube-stat"><div class="num">${formatTime(s.best)}</div><div class="lbl">${t('best')}</div></div>
    <div class="cube-stat"><div class="num">${formatTime(s.last)}</div><div class="lbl">${t('last')}</div></div>
    <div class="cube-stat"><div class="num">${s.ao5 ? formatTime(s.ao5) : '—'}</div><div class="lbl">${t('ao5')}</div></div>
    <div class="cube-stat"><div class="num">${s.ao12 ? formatTime(s.ao12) : '—'}</div><div class="lbl">${t('ao12')}</div></div>
    <div class="cube-stat"><div class="num">${formatTime(s.avg)}</div><div class="lbl">${t('avg')}</div></div>
    <div class="cube-stat"><div class="num">${s.count}</div><div class="lbl">${t('solves')}</div></div>`;
  // history table (newest first)
  const rows = history.slice().reverse().map((h, i) => {
    const idx = history.length - i;
    const isBest = h.time === s.best;
    return `<tr><td>${idx}</td><td class="num${isBest ? ' best' : ''}">${formatTime(h.time)}</td><td class="num">${idx >= 5 ? formatTime(avgOf(history.slice(idx - 5, idx).map(x => x.time))) : '—'}</td><td style="font-family:monospace;font-size:.78rem;max-width:260px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${(h.scramble||'').replace(/"/g,'&quot;')}">${h.scramble || '—'}</td></tr>`;
  }).join('');
  $('#history-body').innerHTML = rows;
}

// Wire up
$('#btn-scramble').addEventListener('click', () => { renderScramble(); });
$('#btn-copy').addEventListener('click', () => { copyText(currentScramble.join(' ')); GZ.showToast(t('copied')); });
$('#btn-clear-hist').addEventListener('click', () => {
  if (confirm(t('confirmClear'))) { history = []; saveHistory(history); renderHistory(); }
});
$('#timer').addEventListener('click', handleTimerTap);
$('#scramble-len').addEventListener('change', renderScramble);

document.addEventListener('keydown', (e) => {
  if (e.code === 'Space') {
    // Don't intercept when focus is in a select
    if (e.target.tagName === 'SELECT' || e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
    e.preventDefault();
    handleTimerTap();
  }
});

// Labels
$('#lbl-scramble').textContent = t('scrambleLabel');
$('#lbl-gen').textContent = t('generate');
$('#lbl-copys').textContent = t('copyS');
$('#lbl-history').textContent = t('history');
$('#th-time').textContent = t('thTime');
$('#th-ao5').textContent = t('thAo5');
$('#th-scramble').textContent = t('thScramble');
$('#lbl-clear-hist').textContent = t('clearHist');
$('#timer-hint').textContent = t('tapStart');
$('#notation').textContent = t('notation');

renderScramble();
renderHistory();

GZ.renderToolPage({

    {icon:'🎲', href:'/convert/randomizer.html', name:'Random Number'},
  ]
});
</script>
