<script>
GZI18n.register({
  en: {
    toolTitle: 'Eisenhower Matrix (Urgent vs. Important)',
    toolDesc: 'Prioritize tasks with the free Eisenhower Matrix. Sort everything into Do, Schedule, Delegate and Delete, then export as PNG.',
    do: 'Do First', sched: 'Schedule', deleg: 'Delegate', del: 'Delete',
    doSub: 'Urgent + Important', schedSub: 'Important · Not Urgent', delegSub: 'Urgent · Not Important', delSub: 'Not Urgent · Not Important',
    taskPh: 'Type a task and press Enter…',
    add: 'Add', downloadPNG: 'Download PNG', print: 'Print / PDF', clear: 'Clear', example: 'Example',
    moveTo: 'Move to…', empty: 'No tasks yet',
    step1: 'Type a task in the input box and choose its quadrant',
    step2: 'Press Add (or Enter) to drop the task into the grid',
    step3: 'Use the ▾ on each task to move it between quadrants',
    step4: 'Download as PNG or print to keep your priority plan',
  },
  zh: {
    toolTitle: '艾森豪威尔矩阵（紧急 vs. 重要）',
    toolDesc: '用免费的艾森豪威尔矩阵规划任务优先级。把所有任务分到「立即做」「计划做」「委托做」「删除」四个象限，可导出 PNG。',
    do: '立即做', sched: '计划做', deleg: '委托做', del: '删除',
    doSub: '紧急 + 重要', schedSub: '重要 · 不紧急', delegSub: '紧急 · 不重要', delSub: '不紧急 · 不重要',
    taskPh: '输入任务并按回车…',
    add: '添加', downloadPNG: '下载 PNG', print: '打印 / PDF', clear: '清空', example: '示例',
    moveTo: '移到…', empty: '暂无任务',
    step1: '在输入框输入任务并选择所属象限',
    step2: '点击「添加」（或按回车）将任务放入网格',
    step3: '点击每条任务的 ▾ 可在象限之间移动',
    step4: '下载 PNG 或打印，保存你的优先级计划',
  }
});

const { $, t, showToast } = GZ;
const QUADS = [
  {id:'do', cls:'q-do', icon:'🔴', nameKey:'do', subKey:'doSub'},
  {id:'sched', cls:'q-sched', icon:'🔵', nameKey:'sched', subKey:'schedSub'},
  {id:'deleg', cls:'q-deleg', icon:'🟠', nameKey:'deleg', subKey:'delegSub'},
  {id:'del', cls:'q-del', icon:'⚪', nameKey:'del', subKey:'delSub'},
];
let tasks = [];

function render() {
  $('#grid').innerHTML = QUADS.map(q => {
    const items = tasks.filter(x => x.q === q.id);
    const list = items.length ? items.map(x => `
      <li class="e-item"><span>${esc(x.text)}</span>
        <select onchange="moveTask('${x.id}',this.value)" class="gz-select" style="padding:2px 6px;font-size:.78em">
          ${QUADS.map(o => `<option value="${o.id}"${o.id===q.id?' selected':''}>${t(o.nameKey)}</option>`).join('')}
        </select>
        <button class="e-del" onclick="delTask('${x.id}')" title="${t('clear')}">×</button>
      </li>`).join('') : `<li class="e-empty">${t('empty')}</li>`;
    return `<div class="e-q ${q.cls}"><h3><span>${q.icon} ${t(q.nameKey)}</span><span class="e-sub">${t(q.subKey)}</span></h3><ul class="e-list">${list}</ul></div>`;
  }).join('');
}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function uid(){return Math.random().toString(36).slice(2,9);}

function addTask() {
  const text = $('#task-input').value.trim();
  if (!text) return;
  tasks.push({id: uid(), text, q: $('#quad-select').value});
  $('#task-input').value = ''; render();
}
function moveTask(id, q) { tasks = tasks.map(x => x.id===id ? {...x, q} : x); render(); }
function delTask(id) { tasks = tasks.filter(x => x.id !== id); render(); }
function clearAll() { tasks = []; render(); }
function loadExample() {
  tasks = [
    {id:uid(),q:'do',text:'Fix production outage (billing down)'},
    {id:uid(),q:'do',text:'Reply to investor before EOD'},
    {id:uid(),q:'sched',text:'Plan Q3 product roadmap'},
    {id:uid(),q:'sched',text:'Write blog post on new feature'},
    {id:uid(),q:'deleg',text:'Schedule team 1:1 meetings'},
    {id:uid(),q:'deleg',text:'Order office supplies'},
    {id:uid(),q:'del',text:'Scroll social media feeds'},
    {id:uid(),q:'del',text:'Reorganize bookmarks folder'},
  ];
  render();
}

function downloadPNG() {
  const W = 1600, H = 1100, pad = 40, gap = 24;
  const cv = document.createElement('canvas'); cv.width=W; cv.height=H;
  const ctx = cv.getContext('2d');
  ctx.fillStyle='#fff'; ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#1a1a2e'; ctx.font='bold 42px Arial'; ctx.textAlign='center';
  ctx.fillText('Eisenhower Matrix', W/2, 66);
  ctx.font='18px Arial'; ctx.fillStyle='#888';
  ctx.fillText('Urgent vs. Important · tools.gamezipper.com', W/2, 96);
  const meta={do:['#c62828','🔴'],sched:['#1565c0','🔵'],deleg:['#ef6c00','🟠'],del:['#616161','⚪']};
  const labels={do:t('do'),sched:t('sched'),deleg:t('deleg'),del:t('del')};
  const subs={do:t('doSub'),sched:t('schedSub'),deleg:t('delegSub'),del:t('delSub')};
  const qw=(W-pad*2-gap)/2, qh=(H-130-pad-gap)/2;
  const pos={do:[pad,130],sched:[pad+qw+gap,130],deleg:[pad,130+qh+gap],del:[pad+qw+gap,130+qh+gap]};
  Object.entries(pos).forEach(([k,[x,y]])=>{
    const [col,ic]=meta[k];
    ctx.fillStyle=col+'18'; roundRect(ctx,x,y,qw,qh,16,true);
    ctx.strokeStyle=col+'80'; ctx.lineWidth=2; roundRect(ctx,x,y,qw,qh,16,false,true);
    ctx.fillStyle=col; ctx.font='bold 26px Arial'; ctx.textAlign='left';
    ctx.fillText(ic+' '+labels[k], x+22, y+42);
    ctx.font='15px Arial'; ctx.fillStyle='#888';
    ctx.fillText(subs[k], x+22, y+64);
    ctx.font='20px Arial'; ctx.fillStyle='#333';
    let ly=y+102;
    const items=tasks.filter(i=>i.q===k);
    (items.length?items:[{text:'—'}]).forEach(it=>{
      const wrapped=wrap(ctx,'• '+it.text,qw-44); wrapped.forEach(w=>{ctx.fillText(w,x+22,ly);ly+=28;});
    });
  });
  const link=document.createElement('a'); link.download='eisenhower-matrix.png'; link.href=cv.toDataURL('image/png'); link.click();
}
function roundRect(ctx,x,y,w,h,r,fill,stroke){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();if(fill)ctx.fill();if(stroke)ctx.stroke();}
function wrap(ctx,text,maxW){const words=text.split(' ');const lines=[];let cur='';words.forEach(w=>{const test=cur?cur+' '+w:w;if(ctx.measureText(test).width>maxW&&cur){lines.push(cur);cur=w;}else cur=test;});if(cur)lines.push(cur);return lines.length?lines:[text];}

$('#task-input').placeholder = t('taskPh');
$('#add-btn').textContent = t('add');
$('#quad-select').innerHTML = QUADS.map(q => `<option value="${q.id}">${q.icon} ${t(q.nameKey)}</option>`).join('');
$('#add-btn').onclick = addTask;
$('#task-input').addEventListener('keydown', e => { if (e.key === 'Enter') addTask(); });
$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="downloadPNG()">🖼️ ${t('downloadPNG')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="window.print()">🖨️ ${t('print')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="clearAll()">${t('clear')}</button>`;
render();

GZ.renderToolPage({
  category: 'fun',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🎯', href:'/fun/swot-analysis.html', name:'SWOT Analysis'},
    {icon:'⚖️', href:'/fun/decision-matrix.html', name:'Decision Matrix'},
    {icon:'🐟', href:'/fun/fishbone-diagram.html', name:'Fishbone Diagram'},
    {icon:'🗂️', href:'/fun/kanban-board.html', name:'Kanban Board'},
  ]
});
</script>
