<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is a cron expression?", "acceptedAnswer": {"@type": "Answer", "text": "A cron expression is a string of 5 or 6 fields separated by spaces that defines a schedule for recurring tasks. The fields represent minute, hour, day of month, month, day of week (and optionally seconds). It is widely used in Linux crontab, Jenkins, Kubernetes CronJobs and task schedulers."}}, {"@type": "Question", "name": "What does * * * * * mean in cron?", "acceptedAnswer": {"@type": "Answer", "text": "Five asterisks * * * * * means every minute. Each asterisk is a wildcard meaning every value for that field. For example, 0 * * * * means at minute 0 of every hour (hourly), and 0 0 * * * means at midnight every day (daily)."}}, {"@type": "Question", "name": "How do I run a cron job every day at 9am?", "acceptedAnswer": {"@type": "Answer", "text": "Use 0 9 * * *. This means: at minute 0, hour 9, every day of month, every month, every day of week. You can also select 9:00 AM Daily from the presets in this tool."}}, {"@type": "Question", "name": "What is the difference between 5-field and 6-field cron?", "acceptedAnswer": {"@type": "Answer", "text": "Standard Unix cron uses 5 fields (minute hour day month weekday). Some systems like Quartz Scheduler and Spring add a leading seconds field, making it 6 fields. This tool supports both formats — toggle the seconds field as needed."}}]}</script>

    everyWeek: '每周（周日）',

    everyYear: '每年（1 月 1 日）',
    weekdays: '工作日（周一至周五）',
    weekends: '周末',
    step1: '选择预设或手动编辑自定义字段',
    step2: '顶部的 cron 表达式实时更新',

const { $, copyText, t } = GZ;

const PRESETS = [
  {expr:'* * * * *', key:'everyMinute'},
  {expr:'*/5 * * * *', key:'every5Min'},
  {expr:'0 * * * *', key:'everyHour'},
  {expr:'0 0 * * *', key:'everyDay'},
  {expr:'0 0 * * 0', key:'everyWeek'},
  {expr:'0 0 1 * *', key:'everyMonth'},
  {expr:'0 0 1 1 *', key:'everyYear'},
  {expr:'0 9 * * 1-5', key:'weekdays'},
  {expr:'0 9 * * 0,6', key:'weekends'},
];

const MONTH_NAMES = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const DAY_NAMES = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

function describeCron(expr) {
  const parts = expr.trim().split(/\s+/);
  if (parts.length < 5) return 'Invalid expression';
  const [min, hour, dom, month, dow] = parts;

  // Common patterns
  if (min === '*' && hour === '*' && dom === '*' && month === '*' && dow === '*') return 'Every minute';
  if (min.startsWith('*/') && hour === '*') return `Every ${min.slice(2)} minutes`;
  if (min === '0' && hour === '*' && dom === '*' && month === '*' && dow === '*') return 'Every hour at minute 0';
  if (min === '0' && hour === '0' && dom === '*' && month === '*' && dow === '*') return 'Every day at midnight';
  if (min === '0' && hour !== '*' && dom === '*' && month === '*' && dow === '*') return `Every day at ${hour.padStart(2,'0')}:${min.padStart(2,'0')}`;
  if (min === '0' && hour !== '*' && dom === '*' && month === '*' && dow === '1-5') return `Weekdays at ${hour.padStart(2,'0')}:00`;
  if (min === '0' && hour !== '*' && dom === '*' && month === '*' && dow === '0,6') return `Weekends at ${hour.padStart(2,'0')}:00`;
  if (min === '0' && hour === '0' && dom === '1' && month === '*' && dow === '*') return 'On the 1st of every month at midnight';

  let desc = [];
  if (min === '*') desc.push('every minute');
  else if (min.startsWith('*/')) desc.push(`every ${min.slice(2)} minutes`);
  else desc.push(`at minute ${min}`);

  if (hour !== '*') {
    if (hour.startsWith('*/')) desc.push(`every ${hour.slice(2)} hours`);
    else desc.push(`at hour ${hour}`);
  }

  if (dom !== '*' && month !== '*' && dow !== '*') desc.push(`on ${dom} ${MONTH_NAMES[parseInt(month)-1] || month}`);
  else {
    if (dom !== '*') desc.push(`on day ${dom} of month`);
    if (month !== '*') desc.push(`in ${MONTH_NAMES[parseInt(month)-1] || month}`);
  }

  if (dow !== '*') {
    if (dow === '1-5') desc.push('Monday through Friday');
    else if (dow === '0,6') desc.push('Saturday and Sunday');
    else if (/^\d$/.test(dow)) desc.push(`on ${DAY_NAMES[parseInt(dow)] || dow}`);
    else desc.push(`on day-of-week ${dow}`);
  }

  return desc.join(', ');
}

function parseField(field, min, max) {
  const result = new Set();
  for (const part of field.split(',')) {
    if (part === '*') { for (let i = min; i <= max; i++) result.add(i); continue; }
    let step = 1;
    let range = part;
    const stepMatch = part.match(/^(.+)\/(\d+)$/);
    if (stepMatch) { range = stepMatch[1]; step = parseInt(stepMatch[2]); }
    if (range === '*') range = `${min}-${max}`;
    const [start, end] = range.split('-').map(n => parseInt(n));
    const s = isNaN(start) ? min : start;
    const e = isNaN(end) ? s : end;
    for (let i = s; i <= e; i += step) result.add(i);
  }
  return [...result];
}

function getNextRuns(expr, count = 5) {
  const parts = expr.trim().split(/\s+/);
  if (parts.length < 5) return [];
  const [minF, hourF, domF, monthF, dowF] = parts;
  const mins = parseField(minF, 0, 59);
  const hours = parseField(hourF, 0, 23);
  const doms = parseField(domF, 1, 31);
  const months = parseField(monthF, 1, 12);
  const dows = parseField(dowF, 0, 6);

  const results = [];
  let date = new Date();
  date.setSeconds(0, 0);
  date.setMinutes(date.getMinutes() + 1);
  const limit = new Date(Date.now() + 365 * 24 * 60 * 60 * 1000);

  while (results.length < count && date < limit) {
    const m = date.getMinutes();
    const h = date.getHours();
    const dom = date.getDate();
    const mon = date.getMonth() + 1;
    const dow = date.getDay();

    if (mins.includes(m) && hours.includes(h) && doms.includes(dom) && months.includes(mon) && dows.includes(dow)) {
      results.push(new Date(date));
      date.setMinutes(date.getMinutes() + 1);
      date.setMinutes(Math.ceil(date.getMinutes() / 1) * 1);
    } else {
      date.setMinutes(date.getMinutes() + 1);
    }
    // Safety: prevent infinite loop on bad expressions
    if (date > limit) break;
  }
  return results;
}

function updateDisplay(expr) {
  $('#cron-display').textContent = expr;
  $('#cron-desc').textContent = describeCron(expr);
  const fields = expr.trim().split(/\s+/);
  if (fields.length >= 5) {
    $('#f-minute').value = fields[0];
    $('#f-hour').value = fields[1];
    $('#f-dom').value = fields[2];
    $('#f-month').value = fields[3];
    $('#f-dow').value = fields[4];
  }
  const runs = getNextRuns(expr, 5);
  if (runs.length === 0) {
    $('#next-runs-list').innerHTML = '<li>Unable to compute (check expression validity)</li>';
  } else {
    $('#next-runs-list').innerHTML = runs.map(d =>
      `<li>${d.toLocaleString()}</li>`
    ).join('');
  }
}

function buildFromFields() {
  const expr = [$('#f-minute').value, $('#f-hour').value, $('#f-dom').value, $('#f-month').value, $('#f-dow').value].join(' ');
  updateDisplay(expr);
}

function setPreset(expr) { updateDisplay(expr); }

$('#presets').innerHTML = PRESETS.map((p, i) =>

).join('');

$('#toolbar').innerHTML = `<button class="gz-btn" onclick="copyText(document.getElementById('cron-display').textContent)">${t('copy')}</button>`;

$('#lbl-presets').textContent = t('presets');

$('#lbl-minute').textContent = t('minute');

updateDisplay('* * * * *');

</script>
