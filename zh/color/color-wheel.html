<script>
GZI18n.register({
  en: {
    toolTitle: 'Color Wheel & Harmony Generator',
    toolDesc: 'Pick a base color on the wheel and generate harmonious palettes — complementary, analogous, triadic and more.',
    complementary: 'Complementary',
    analogous: 'Analogous',
    triadic: 'Triadic',
    tetradic: 'Tetradic',
    split: 'Split-Comp.',
    monochromatic: 'Monochromatic',
    copied: 'Copied!',
    step1: 'Click anywhere on the color wheel to pick a base color',
    step2: 'Choose a harmony mode to generate a matching palette',
    step3: 'Click any color swatch to copy its HEX code',
    step4: 'Use the palette in your designs, websites or apps',
  },
  zh: {
    toolTitle: '色轮与配色生成器',
    toolDesc: '在色轮上选取基色，生成和谐的配色方案 — 互补色、类似色、三色、四色等。',
    complementary: '互补色',
    analogous: '类似色',
    triadic: '三色',
    tetradic: '四色',
    split: '分裂互补',
    monochromatic: '单色',
    copied: '已复制！',
    step1: '在色轮上点击选取基色',
    step2: '选择配色模式生成和谐的色板',
    step3: '点击任意色块复制 HEX 色值',
    step4: '将配色方案用于设计、网站或应用',
  }
});

const { $, copyText, t } = GZ;
const canvas = $('#wheel-canvas');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;
const cx = W / 2, cy = H / 2, R = W / 2 - 10;

let currentHue = 0, currentSat = 100, currentLight = 50;
let harmonyMode = 'complementary';

const harmonies = ['complementary','analogous','triadic','tetradic','split','monochromatic'];

// Draw color wheel
function drawWheel() {
  ctx.clearRect(0, 0, W, H);
  for (let angle = 0; angle < 360; angle += 0.5) {
    const startRad = (angle - 1) * Math.PI / 180;
    const endRad = (angle + 1) * Math.PI / 180;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, R, startRad, endRad);
    ctx.closePath();
    const gradient = ctx.createRadialGradient(cx, cy, 0, cx, cy, R);
    gradient.addColorStop(0, '#ffffff');
    gradient.addColorStop(0.5, `hsl(${angle}, 100%, 50%)`);
    gradient.addColorStop(1, `hsl(${angle}, 100%, 30%)`);
    ctx.fillStyle = gradient;
    ctx.fill();
  }
  // Draw indicator
  const indicatorAngle = (currentHue - 90) * Math.PI / 180;
  const indicatorR = R * 0.7;
  const ix = cx + Math.cos(indicatorAngle) * indicatorR;
  const iy = cy + Math.sin(indicatorAngle) * indicatorR;
  ctx.beginPath();
  ctx.arc(ix, iy, 10, 0, Math.PI * 2);
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 3;
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(ix, iy, 7, 0, Math.PI * 2);
  ctx.fillStyle = `hsl(${currentHue}, ${currentSat}%, ${currentLight}%)`;
  ctx.fill();
}

function hslToHex(h, s, l) {
  s /= 100; l /= 100;
  const a = s * Math.min(l, 1 - l);
  const f = n => {
    const k = (n + h / 30) % 12;
    const color = l - a * Math.max(Math.min(k - 3, 9 - k, 1), -1);
    return Math.round(255 * color).toString(16).padStart(2, '0');
  };
  return `#${f(0)}${f(8)}${f(4)}`;
}

function hslToRgb(h, s, l) {
  s /= 100; l /= 100;
  const a = s * Math.min(l, 1 - l);
  const f = n => {
    const k = (n + h / 30) % 12;
    return Math.round(255 * (l - a * Math.max(Math.min(k - 3, 9 - k, 1), -1)));
  };
  return { r: f(0), g: f(8), b: f(4) };
}

function getHarmonyColors() {
  const h = currentHue, s = currentSat, l = currentLight;
  switch (harmonyMode) {
    case 'complementary':
      return [{h,s,l},{h:(h+180)%360,s,l}];
    case 'analogous':
      return [{h:(h-30+360)%360,s,l},{h,s,l},{h:(h+30)%360,s,l}];
    case 'triadic':
      return [{h,s,l},{h:(h+120)%360,s,l},{h:(h+240)%360,s,l}];
    case 'tetradic':
      return [{h,s,l},{h:(h+90)%360,s,l},{h:(h+180)%360,s,l},{h:(h+270)%360,s,l}];
    case 'split':
      return [{h,s,l},{h:(h+150)%360,s,l},{h:(h+210)%360,s,l}];
    case 'monochromatic':
      return [{h,s,l:l+20},{h,s,l:l+10},{h,s,l},{h,s,l:l-10},{h,s,l:l-20}].map(c=>({...c,l:Math.max(10,Math.min(90,c.l))}));
    default:
      return [{h,s,l}];
  }
}

function updateUI() {
  drawWheel();
  const hex = hslToHex(currentHue, currentSat, currentLight);
  const rgb = hslToRgb(currentHue, currentSat, currentLight);
  $('#selected-swatch').style.background = hex;
  $('#color-values').innerHTML = `HEX: ${hex}<br>RGB: rgb(${rgb.r}, ${rgb.g}, ${rgb.b})<br>HSL: hsl(${Math.round(currentHue)}, ${currentSat}%, ${currentLight}%)`;

  const colors = getHarmonyColors();
  $('#palette').innerHTML = colors.map(c => {
    const ch = hslToHex(c.h, c.s, c.l);
    return `<div class="color-chip"><div class="color-swatch" style="background:${ch}" onclick="copyColor('${ch}')"></div><span class="color-hex">${ch}</span></div>`;
  }).join('');
}

function copyColor(hex) {
  copyText(hex);
  const btn = event.currentTarget;
  const old = btn.style.outline;
  btn.style.outline = '3px solid var(--accent)';
  setTimeout(() => btn.style.outline = old, 300);
}

// Click handler
canvas.addEventListener('click', e => {
  const rect = canvas.getBoundingClientRect();
  const scaleX = W / rect.width, scaleY = H / rect.height;
  const x = (e.clientX - rect.left) * scaleX;
  const y = (e.clientY - rect.top) * scaleY;
  const dx = x - cx, dy = y - cy;
  const dist = Math.sqrt(dx * dx + dy * dy);
  if (dist <= R) {
    let angle = Math.atan2(dy, dx) * 180 / Math.PI + 90;
    if (angle < 0) angle += 360;
    currentHue = Math.round(angle);
    currentSat = Math.round(40 + (dist / R) * 60);
    updateUI();
  }
});

// Render harmony buttons
$('#harmony-btns').innerHTML = harmonies.map(mode =>
  `<button class="harmony-btn${mode === harmonyMode ? ' active' : ''}" onclick="setHarmony('${mode}',this)">${t(mode)}</button>`
).join('');

window.setHarmony = function(mode, btn) {
  harmonyMode = mode;
  document.querySelectorAll('.harmony-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  updateUI();
};

window.copyColor = copyColor;
updateUI();

GZ.renderToolPage({
  category: 'color',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🎨', href:'/color/picker.html', name:'Color Picker'},
    {icon:'🌈', href:'/color/palette.html', name:'Palette Generator'},
    {icon:'👁️', href:'/color/contrast.html', name:'Contrast Checker'},
    {icon:'🎨', href:'/color/harmony.html', name:'Color Harmony'},
  ]
});
</script>
