<script>
GZI18n.register({
  en: {
    toolTitle: 'Curved Text Generator',
    toolDesc: 'Create curved text along a circular arc. Customize font, size, color, curve radius and direction — download as PNG.',
    enterText: 'Your text',
    fontSize: 'Font size',
    curveRadius: 'Curve radius',
    direction: 'Direction',
    top: 'Top (outside)',
    bottom: 'Bottom (inside)',
    bgColor: 'Background',
    textColor: 'Text color',
    transparent: 'Transparent',
    step1: 'Enter your text in the input field',
    step2: 'Adjust font size, curve radius and direction',
    step3: 'Pick text and background colors',
    step4: 'Click Download to save as PNG',
  },
  zh: {
    toolTitle: '弧形文字生成器',
    toolDesc: '沿圆弧创建弯曲文字，可自定义字体、大小、颜色、弧度半径和方向，下载为 PNG。',
    enterText: '输入文字',
    fontSize: '字体大小',
    curveRadius: '弧度半径',
    direction: '方向',
    top: '上方（外侧）',
    bottom: '下方（内侧）',
    bgColor: '背景色',
    textColor: '文字颜色',
    transparent: '透明',
    step1: '在输入框中输入文字',
    step2: '调整字体大小、弧度半径和方向',
    step3: '选择文字颜色和背景色',
    step4: '点击「下载」保存为 PNG',
  }
});

const { $, copyText, t } = GZ;
const canvas = $('#canvas');
const ctx = canvas.getContext('2d');

let text = 'GameZipper Tools';
let fontSize = 32;
let curveRadius = 200;
let direction = 'top';
let fontFamily = 'Arial';
let textColor = '#ffffff';
let bgColor = '#0f0f1a';
let transparentBg = false;

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  if (!transparentBg) {
    ctx.fillStyle = bgColor;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  }
  const cx = canvas.width / 2;
  const cy = canvas.height / 2;
  ctx.font = `bold ${fontSize}px ${fontFamily}`;
  ctx.fillStyle = textColor;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  const chars = text.split('');
  const totalAngle = chars.reduce((sum, ch) => sum + ctx.measureText(ch).width, 0) / curveRadius;
  let startAngle = direction === 'top' ? -Math.PI / 2 - totalAngle / 2 : Math.PI / 2 + totalAngle / 2;
  chars.forEach(ch => {
    const charWidth = ctx.measureText(ch).width;
    const charAngle = charWidth / curveRadius;
    const midAngle = startAngle + charAngle / 2;
    const r = direction === 'top' ? curveRadius : curveRadius;
    const x = cx + r * Math.cos(midAngle);
    const y = cy + r * Math.sin(midAngle);
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(midAngle + (direction === 'top' ? Math.PI / 2 : -Math.PI / 2));
    ctx.fillText(ch, 0, 0);
    ctx.restore();
    startAngle += charAngle;
  });
}

function download() {
  const link = document.createElement('a');
  link.download = 'curved-text.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="download()">${t('download')} PNG</button>`;

$('#controls').innerHTML = `
  <div class="full-width"><label>${t('enterText')}</label><input type="text" id="txt" value="${text}" oninput="text=this.value;draw()"></div>
  <div><label>${t('fontSize')}</label><input type="range" id="fs" min="12" max="80" value="${fontSize}" oninput="fontSize=+this.value;$('#fsVal').textContent=this.value;draw()"><span id="fsVal">${fontSize}</span>px</div>
  <div><label>${t('curveRadius')}</label><input type="range" id="cr" min="60" max="280" value="${curveRadius}" oninput="curveRadius=+this.value;$('#crVal').textContent=this.value;draw()"><span id="crVal">${curveRadius}</span>px</div>
  <div><label>${t('direction')}</label><select onchange="direction=this.value;draw()"><option value="top">${t('top')}</option><option value="bottom">${t('bottom')}</option></select></div>
  <div><label>Font</label><select onchange="fontFamily=this.value;draw()"><option>Arial</option><option>Georgia</option><option>Impact</option><option>Courier New</option><option>Verdana</option><option>Times New Roman</option><option>Comic Sans MS</option></select></div>
  <div><label>${t('textColor')}</label><input type="color" value="${textColor}" oninput="textColor=this.value;draw()"></div>
  <div><label>${t('bgColor')}</label><input type="color" value="${bgColor}" oninput="bgColor=this.value;draw()"></div>
  <div><label><input type="checkbox" onchange="transparentBg=this.checked;draw()"> ${t('transparent')}</label></div>`;

draw();

  category: 'text',

    {icon:'✨', href:'/text/fancy-text.html', name:'Fancy Text'},
    {icon:'🔄', href:'/text/text-reverser.html', name:'Text Reverser'},
  ]
});
</script>
