<script>
GZI18n.register({
  en: {
    toolTitle: 'Spirograph Generator',
    toolDesc: 'Draw mesmerizing spirograph and hypotrochoid curves — tweak radii, colors and download as PNG.',
    R: 'Outer R',
    r: 'Inner r',
    d: 'Pen offset',
    c1: 'Color 1',
    c2: 'Color 2',
    redraw: 'Redraw',
    download: 'Download PNG',
    randomize: 'Random',
    step1: 'Drag the Outer R slider to set the large circle radius',
    step2: 'Adjust Inner r and Pen offset to change the pattern shape',
    step3: 'Pick two colors for the gradient stroke',
    step4: 'Click Download PNG to save your artwork',
  },
  zh: {
    toolTitle: '万花尺 / 螺线规生成器',
    toolDesc: '绘制迷人的万花尺与内摆线曲线 — 调节半径、配色并下载为 PNG。',
    R: '外圆半径',
    r: '内圆半径',
    d: '笔尖偏移',
    c1: '颜色 1',
    c2: '颜色 2',
    redraw: '重绘',
    download: '下载 PNG',
    randomize: '随机',
    step1: '拖动「外圆半径」滑块设置大圆半径',
    step2: '调整内圆半径和笔尖偏移改变图案形状',
    step3: '选择两个颜色形成渐变描边',
    step4: '点击「下载 PNG」保存你的作品',
  }
});

const { $, t } = GZ;
['R','r','d','c1','c2'].forEach(k => $('#lbl-'+k).textContent = t(k));

const cv = $('#spiro'), ctx = cv.getContext('2d');
const gcd = (a,b) => b ? gcd(b, a%b) : a;

function hexToRgb(h){ const n=parseInt(h.slice(1),16); return [n>>16&255,n>>8&255,n&255]; }
function lerpColor(a,b,t){ const A=hexToRgb(a),B=hexToRgb(b); return `rgb(${Math.round(A[0]+(B[0]-A[0])*t)},${Math.round(A[1]+(B[1]-A[1])*t)},${Math.round(A[2]+(B[2]-A[2])*t)})`; }

function draw() {
  const R=+$('#R').value, r=+$('#r').value, d=+$('#d').value;
  const c1=$('#c1').value, c2=$('#c2').value;
  $('#vR').textContent=R; $('#vr').textContent=r; $('#vd').textContent=d;
  ctx.fillStyle='#0e0e1a'; ctx.fillRect(0,0,cv.width,cv.height);
  const cx=cv.width/2, cy=cv.height/2;
  const scale = Math.min(1, (cv.width/2 - 20) / (R + d));
  // number of revolutions until pattern closes
  const g = gcd(R, r);
  const revs = r / g;
  const turns = Math.min(revs, 200); // safety cap
  const steps = Math.max(2000, Math.floor(turns * 600));
  for (let i=0;i<=steps;i++){
    const t_ = (i/steps)*turns*2*Math.PI;
    const x = (R-r)*Math.cos(t_) + d*Math.cos(((R-r)/r)*t_);
    const y = (R-r)*Math.sin(t_) - d*Math.sin(((R-r)/r)*t_);
    const X = cx + x*scale, Y = cy + y*scale;
    if (i===0){ ctx.beginPath(); ctx.moveTo(X,Y); }
    else { ctx.lineTo(X,Y); }
  }
  const grad = ctx.createLinearGradient(0,0,cv.width,cv.height);
  grad.addColorStop(0,c1); grad.addColorStop(1,c2);
  ctx.strokeStyle = grad;
  ctx.lineWidth = 1.4;
  ctx.globalAlpha = 0.85;
  ctx.stroke();
  ctx.globalAlpha = 1;
}

function doDownload(){
  const a=document.createElement('a');
  a.download='spirograph.png';
  a.href=cv.toDataURL('image/png');
  a.click();
}
function doRandom(){
  $('#R').value = 80 + Math.floor(Math.random()*140);
  $('#r').value = 10 + Math.floor(Math.random()*120);
  $('#d').value = 10 + Math.floor(Math.random()*150);
  const hue1=Math.floor(Math.random()*360), hue2=(hue1+60+Math.floor(Math.random()*180))%360;
  $('#c1').value = hslToHex(hue1,80,60);
  $('#c2').value = hslToHex(hue2,80,60);
  draw();
}
function hslToHex(h,s,l){
  s/=100; l/=100;
  const k=n=>(n+h/30)%12;
  const a=s*Math.min(l,1-l);
  const f=n=>l-a*Math.max(-1,Math.min(k(n)-3,9-k(n),1));
  const toHex=v=>Math.round(v*255).toString(16).padStart(2,'0');
  return '#'+toHex(f(0))+toHex(f(8))+toHex(f(4));
}

['R','r','d','c1','c2'].forEach(id => $('#'+id).addEventListener('input', draw));

const presets = [[150,53,80],[120,37,60],[180,71,90],[100,29,70],[140,49,40],[200,103,95]];
$('#presets').innerHTML = presets.map((p,i)=>`<button onclick="applyPreset(${i})">Preset ${i+1}</button>`).join('');
function applyPreset(i){ const [R,r,d]=presets[i]; $('#R').value=R; $('#r').value=r; $('#d').value=d; draw(); }

$('#toolbar').innerHTML = `<button class="gz-btn" onclick="draw()">${t('redraw')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doRandom()">${t('randomize')}</button>
  <button class="gz-btn" onclick="doDownload()">${t('download')}</button>`;
draw();

    {icon:'🌀', href:'/css-tools/svg-blob.html', name:'SVG Blob'},
  ]
});
</script>
