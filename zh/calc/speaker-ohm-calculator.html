<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "How do I calculate speakers in series?", "acceptedAnswer": {"@type": "Answer", "text": "Add the impedance values together: R_total = R1 + R2 + R3 ... Two 8Ω speakers in series give a 16Ω load. Series wiring raises impedance and is safe for any amp rated for that value or lower."}}, {"@type": "Question", "name": "How do I calculate speakers in parallel?", "acceptedAnswer": {"@type": "Answer", "text": "For parallel, 1/R_total = 1/R1 + 1/R2 + ... Two 8Ω speakers in parallel give a 4Ω load. Identical speakers in parallel can be quickly calculated as R ÷ number of speakers."}}, {"@type": "Question", "name": "What happens if I run a 2 ohm load on a 4 ohm amp?", "acceptedAnswer": {"@type": "Answer", "text": "The amp will try to deliver roughly twice its rated current, which can overheat the output stage and trip protection or, in the worst case, damage the amp. Always check your amplifier's minimum-impedance spec before wiring."}}, {"@type": "Question", "name": "Can I mix 4 ohm and 8 ohm speakers?", "acceptedAnswer": {"@type": "Answer", "text": "Yes, but the lower-impedance speaker will draw more current and play louder. In parallel the total is below 4Ω; in series it is 12Ω. This calculator handles mixed values and shows the combined impedance automatically."}}]}</script>

<body>

<script>
GZI18n.register({
  en: {
    toolTitle: 'Speaker Ohm Calculator',
    toolDesc: 'Calculate total speaker impedance for series, parallel or mixed wiring. Add any number of 2Ω, 4Ω, 8Ω or 16Ω speakers, see the combined load, and check if your amplifier can safely drive it. Built for car audio, hi-fi and PA installers. Free, browser-based.',
    lblMode: 'Wiring mode',
    lblAmpmin: 'Amp min impedance',
    add: '+ Add speaker',
    del: '✕',
    clear: 'Clear',
    nCount: 'Number of speakers',
    nSeries: 'In series',
    nParallel: 'In parallel',
    nPer: 'Power per speaker (assuming 100W)',
    okMsg: '✓ Safe — load is at or above your amp minimum.',
    warnMsg: '⚠ Borderline — running below amp minimum, watch the temperature.',
    badMsg: '⚠ Unsafe — load is below amp minimum impedance and may damage the amp.',
    formulas: 'Series: R = R1 + R2 + ... · Parallel: 1/R = 1/R1 + 1/R2 + ... · Identical speakers parallel: R ÷ n',
    step1: 'Pick series or parallel wiring mode',
    step2: 'Add as many speakers as you need and enter each one\'s impedance in ohms',
    step3: 'Optionally enter your amplifier\'s minimum impedance to check compatibility',
    step4: 'Read the combined load and any safety warning',
  },
  zh: {
    toolTitle: '音箱欧姆计算器',
    toolDesc: '计算音箱在串联、并联或混联下的总阻抗。可添加任意数量的 2Ω、4Ω、8Ω 或 16Ω 音箱，查看合并后的负载，并检查放大器是否能安全驱动。专为汽车音响、Hi-Fi 和 PA 安装设计。免费、浏览器本地运行。',
    lblMode: '接线方式',
    lblAmpmin: '功放最小阻抗',
    add: '+ 添加音箱',
    del: '✕',
    clear: '清空',
    nCount: '音箱数量',
    nSeries: '串联总阻抗',
    nParallel: '并联总阻抗',
    nPer: '每只音箱功率（假设 100W）',
    okMsg: '✓ 安全 — 负载达到或高于功放最小阻抗。',
    warnMsg: '⚠ 接近极限 — 低于功放最小阻抗，注意温度。',
    badMsg: '⚠ 不安全 — 负载低于功放最小阻抗，可能损坏功放。',
    formulas: '串联：R = R1 + R2 + ... · 并联：1/R = 1/R1 + 1/R2 + ... · 同阻值音箱并联：R ÷ n',
    step1: '选择串联或并联接线方式',
    step2: '根据需要添加多个音箱，分别填入阻抗（欧姆）',
    step3: '可选：填入功放最小阻抗以检查兼容性',
    step4: '查看合并后的总阻抗和安全提示',
  }
});

const { $, t } = GZ;

$('#lbl-mode').textContent = t('lblMode');
$('#lbl-ampmin').textContent = t('lblAmpmin');
$('#formulas').textContent = t('formulas');
$('#n-count').textContent = t('nCount');
$('#n-series').textContent = t('nSeries');
$('#n-parallel').textContent = t('nParallel');
$('#n-per').textContent = t('nPer');

let speakers = [{v: 8}, {v: 8}];

function renderSpeakers() {
  $('#speakers').innerHTML = speakers.map((s, i) => `
    <div class="gz-so-row">
      <span style="opacity:.6;font-size:.85em;width:80px">Speaker ${i + 1}</span>
      <input type="number" min="0" step="any" value="${s.v}" data-i="${i}" class="gz-so-in">
      <span style="opacity:.6">Ω</span>
      <button class="del" data-del="${i}" title="${t('del')}">${t('del')}</button>
    </div>`).join('');

  document.querySelectorAll('.gz-so-in').forEach(el => {
    el.addEventListener('input', e => {
      const i = parseInt(e.target.dataset.i);
      speakers[i].v = parseFloat(e.target.value);
      calc();
    });
  });
  document.querySelectorAll('[data-del]').forEach(el => {
    el.addEventListener('click', e => {
      const i = parseInt(e.target.dataset.del);
      speakers.splice(i, 1);
      renderSpeakers();
      calc();
    });
  });
}

$('#add-btn').textContent = t('add');
$('#add-btn').addEventListener('click', () => {
  speakers.push({v: 8});
  renderSpeakers();
  calc();
});

function fmt(n, u) {
  if (!isFinite(n) || n <= 0) return '—';
  const abs = Math.abs(n);
  if (abs < 0.001 || abs >= 1e6) return n.toExponential(3) + (u ? ' ' + u : '');
  return n.toLocaleString(undefined, { maximumFractionDigits: 4 }) + (u ? ' ' + u : '');
}

function calc() {
  const vals = speakers.map(s => parseFloat(s.v)).filter(v => isFinite(v) && v > 0);
  const mode = $('#mode').value;
  const ampMin = parseFloat($('#ampmin').value);

  if (vals.length === 0) {
    $('#results').style.display = 'none';
    $('#warn').style.display = 'none';
    return;
  }

  const series = vals.reduce((a, b) => a + b, 0);
  const parallel = 1 / vals.reduce((a, b) => a + 1 / b, 0);
  const total = mode === 'series' ? series : parallel;

  $('#big-total').textContent = fmt(total, 'Ω');
  $('#out-count').textContent = vals.length;
  $('#out-series').textContent = fmt(series, 'Ω');
  $('#out-parallel').textContent = fmt(parallel, 'Ω');

  // Power distribution (assume amp delivers 100W total)
  if (mode === 'series') {
    const shares = vals.map((v, i) => `${fmt(100 * v / series, 'W')}`);
    $('#out-per').textContent = shares.join(' + ');
  } else {
    // In parallel all speakers see the same voltage but draw different current
    // proportional to 1/R. With 100W total: each gets 100 * (1/v_i) / sum(1/v)
    const invSum = vals.reduce((a, b) => a + 1 / b, 0);
    const shares = vals.map(v => fmt(100 * (1 / v) / invSum, 'W'));
    $('#out-per').textContent = shares.join(' + ');
  }

  $('#results').style.display = 'block';

  // Safety check
  const warn = $('#warn');
  if (isFinite(ampMin) && ampMin > 0) {
    if (total >= ampMin) {
      warn.className = 'gz-so-warn ok';
      warn.textContent = t('okMsg');
    } else if (total >= ampMin * 0.9) {
      warn.className = 'gz-so-warn warn';
      warn.textContent = t('warnMsg');
    } else {
      warn.className = 'gz-so-warn bad';
      warn.textContent = t('badMsg');
    }
    warn.style.display = 'block';
  } else {
    warn.style.display = 'none';
  }
}

$('#mode').addEventListener('change', calc);
$('#ampmin').addEventListener('input', calc);

$('#toolbar').innerHTML = `
  <button class="gz-btn gz-btn-secondary" onclick="speakers=[{v:8},{v:8}];renderSpeakers();calc()">${t('clear')}</button>`;

renderSpeakers();
calc();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'⚡', href:'/calc/ohms-law-calculator.html', name:"Ohm's Law"},
    {icon:'🎚️', href:'/dev/audio-tuner.html', name:'Audio Tuner'},
    {icon:'🎶', href:'/dev/bpm-detector.html', name:'BPM Detector'},
    {icon:'🔊', href:'/dev/decibel-meter.html', name:'Decibel Meter'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
