<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"What is Punycode?","acceptedAnswer":{"@type":"Answer","text":"Punycode is an encoding syntax that represents Unicode (international) text using only ASCII characters. It is used in internationalized domain names (IDNs) so that domains like café.com can be resolved by the DNS system as xn--caf-dma.com."}},{"@type":"Question","name":"How do I convert a domain to Punycode?","acceptedAnswer":{"@type":"Answer","text":"Type or paste your international domain name (e.g. 中国.cn or café.com) into the input field and click Encode. The tool outputs the ACE (ASCII-Compatible Encoding) form prefixed with xn-- using the browser built-in URL API."}},{"@type":"Question","name":"What does the xn-- prefix mean?","acceptedAnswer":{"@type":"Answer","text":"The xn-- prefix (called ACE — ASCII-Compatible Encoding) tells DNS resolvers that the label is a Punycode-encoded international domain name. Each label of a domain that contains non-ASCII characters gets its own xn-- prefix."}},{"@type":"Question","name":"Can I decode Punycode back to Unicode?","acceptedAnswer":{"@type":"Answer","text":"Yes. Paste an xn-- domain and click Decode. The tool uses the browser native URL API to convert the ACE form back to the original Unicode characters."}}]}</script>

<script>
GZI18n.register({
  en: {
    toolTitle: 'Punycode Converter (IDN Domain Encoder/Decoder)',
    toolDesc: 'Encode international domain names to Punycode (xn--) ACE form and decode them back. Uses the browser-native URL API — instant, free and 100% private.',
    encode: 'Encode → Punycode', decode: 'Decode → Unicode',
    noAscii: 'No non-ASCII characters found — domain is already pure ASCII.',
    notPunycode: 'No xn-- labels found. Paste a Punycode domain (e.g. xn--caf-dma.com) to decode.',
    step1: 'Type or paste one domain per line (e.g. café.com or 中国.cn)',
    step2: 'Click Encode to get the xn-- ACE form for DNS',
    step3: 'Or paste xn-- domains and click Decode to see Unicode',
    step4: 'Copy results for DNS config, SSL or WHOIS lookups',
  },
  zh: {
    toolTitle: 'Punycode 转换器（国际化域名编码/解码）',
    toolDesc: '将国际化域名编码为 Punycode（xn--）ACE 格式，或反向解码为 Unicode。使用浏览器原生 URL API — 即时、免费、100% 私密。',
    encode: '编码 → Punycode', decode: '解码 → Unicode',
    noAscii: '未找到非 ASCII 字符 — 该域名已经是纯 ASCII。',
    notPunycode: '未找到 xn-- 标签。请粘贴 Punycode 域名（如 xn--caf-dma.com）进行解码。',
    step1: '每行输入一个域名（如 café.com 或 中国.cn）',
    step2: '点击「编码」获取用于 DNS 的 xn-- ACE 格式',
    step3: '或粘贴 xn-- 域名后点击「解码」查看 Unicode',
    step4: '复制结果用于 DNS 配置、SSL 或 WHOIS 查询',
  }
});

const { $, copyText, t } = GZ;

function hasNonAscii(s) { return /[^\x00-\x7F]/.test(s); }

function encodeLabel(label) {
  if (!hasNonAscii(label)) return label;
  // Use URL constructor to encode the full hostname; for a single label we fake a URL
  try {
    const url = new URL('http://' + label + '.example');
    // hostname will have the label punycoded
    const host = url.hostname;
    // extract our label (before .example)
    return host.replace(/\.example$/, '');
  } catch (e) {
    return label;
  }
}

function decodeLabel(label) {
  if (label.indexOf('xn--') !== 0) return label;
  try {
    const url = new URL('http://' + label + '.example');
    return url.hostname.replace(/\.example$/, '');
  } catch (e) {
    return label;
  }
}

function encodeAll() {
  const lines = $('#input').value.split(/\r?\n/).map(l => l.trim()).filter(l => l);
  if (!lines.length) return;
  const out = lines.map(line => {
    // process each label of the domain
    const parts = line.split('.');
    const encoded = parts.map(encodeLabel).join('.');
    return encoded === line && !hasNonAscii(line) ? line + '   (' + t('noAscii') + ')' : encoded;
  });
  $('#output').textContent = out.join('\n');
  $('#status').innerHTML = `<span style="color:var(--gz-success)">✓ ${lines.length} ${t('rows').toLowerCase()}</span>`;
}

function decodeAll() {
  const lines = $('#input').value.split(/\r?\n/).map(l => l.trim()).filter(l => l);
  if (!lines.length) return;
  let any = false;
  const out = lines.map(line => {
    const parts = line.split('.');
    const decoded = parts.map(decodeLabel).join('.');
    if (decoded !== line) any = true;
    return decoded;
  });
  $('#output').textContent = (any ? out.join('\n') : lines.join('\n') + '\n(' + t('notPunycode') + ')');
  $('#status').innerHTML = any
    ? `<span style="color:var(--gz-success)">✓ ${lines.length} ${t('rows').toLowerCase()}</span>`
    : `<span style="color:var(--gz-accent)">${t('notPunycode')}</span>`;
}

function loadExample() {
  $('#input').value = 'café.com\n中国.cn\nmünchen.de\n日本.jp\nxn--mnchen-3ya.de';
  encodeAll();
}

function doClear() { $('#input').value = ''; $('#output').textContent = ''; $('#status').innerHTML = ''; }

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="encodeAll()">${t('encode')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="decodeAll()">${t('decode')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;
