.ig-full{grid-column:1/-1}
.ig-items{width:100%;border-collapse:collapse;margin:8px 0;font-size:.85rem}
.ig-items th{background:rgba(0,0,0,0.3);padding:6px;text-align:left;font-size:.78rem;color:var(--text2)}

.ig-preview .ig-bill p{margin:0;white-space:pre-wrap}
.ig-preview table{width:100%;border-collapse:collapse;margin-bottom:14px;font-size:.85rem}
.ig-preview th{background:#f5f5f5;padding:8px;text-align:left;border-bottom:2px solid #ddd}
.ig-preview td{padding:8px;border-bottom:1px solid #eee}
.ig-preview .num{text-align:right}

.ig-add-row{background:transparent;border:1px dashed var(--border);color:var(--text2);padding:6px 12px;border-radius:8px;cursor:pointer;font-size:.8rem;width:100%;margin-top:6px}
.ig-add-row:hover{color:var(--accent);border-color:var(--accent)}

<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "Is this invoice generator free to use?", "acceptedAnswer": {"@type": "Answer", "text": "Yes, this tool is 100% free with no signup required. You can create unlimited invoices and download them as PDFs at no cost."}}, {"@type": "Question", "name": "Can I add tax and discounts?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. Set a tax rate percentage in the settings and optionally apply a discount. The total is calculated automatically and shown in the preview."}}, {"@type": "Question", "name": "How do I save the invoice as a PDF?", "acceptedAnswer": {"@type": "Answer", "text": "Click the Download PDF button to open a print-ready view. Use your browser's Print dialog and select Save as PDF as the destination to download the file."}}, {"@type": "Question", "name": "Can I customize the invoice number and date?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. The invoice number, issue date and due date fields are all editable. The values appear on the printed invoice and in the live preview."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="ig-layout">
      <div id="form"></div>
      <div>
        <div id="preview" class="ig-preview"></div>
        <div class="gz-toolbar" id="toolbar" style="margin-top:12px"></div>
      </div>
    </div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>

</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Invoice Generator',
    toolDesc: 'Create professional invoices in seconds. Add your business info, line items, taxes, and totals — then download as PDF. No signup, fully private.',
    bizSec: 'Your Business', billSec: 'Bill To', invSec: 'Invoice Details', itemsSec: 'Line Items', notesSec: 'Notes / Terms',
    bizName: 'Business Name', bizAddr: 'Address', bizEmail: 'Email', bizPhone: 'Phone',
    billName: 'Customer Name', billAddr: 'Address', billEmail: 'Email',
    invNumber: 'Invoice #', invDate: 'Issue Date', invDue: 'Due Date', currency: 'Currency', taxRate: 'Tax Rate (%)', discount: 'Discount',
    desc: 'Description', qty: 'Qty', price: 'Unit Price', amount: 'Amount', action: '',
    addItem: '+ Add Line Item', notesPh: 'Thank you for your business. Payment is due within 30 days...',
    downloadPdf: '📥 Download PDF', saveDraft: '💾 Save Draft', clear: '🗑️ Clear', subtotal: 'Subtotal', tax: 'Tax', discountLbl: 'Discount', total: 'TOTAL',
    step1: 'Fill in your business info (left top) and customer info (Bill To)',
    step2: 'Set invoice number, date, due date, currency and tax rate',
    step3: 'Add line items — description, quantity and unit price',
    step4: 'Click Download PDF to save or print your invoice',
  },
  zh: {
    toolTitle: '发票生成器',
    toolDesc: '几秒内创建专业发票。添加商家信息、明细、税和总额 — 然后下载 PDF。无需注册、完全本地。',
    bizSec: '商家信息', billSec: '客户信息', invSec: '发票详情', itemsSec: '明细项目', notesSec: '备注 / 条款',
    bizName: '商家名称', bizAddr: '地址', bizEmail: '邮箱', bizPhone: '电话',
    billName: '客户名称', billAddr: '地址', billEmail: '邮箱',
    invNumber: '发票编号', invDate: '开具日期', invDue: '到期日期', currency: '货币', taxRate: '税率 (%)', discount: '折扣',
    desc: '描述', qty: '数量', price: '单价', amount: '金额', action: '',
    addItem: '+ 添加明细', notesPh: '感谢您的惠顾。请于 30 天内付款...',
    downloadPdf: '📥 下载 PDF', saveDraft: '💾 保存草稿', clear: '🗑️ 清空', subtotal: '小计', tax: '税', discountLbl: '折扣', total: '合计',
    step1: '填写商家信息（左上）和客户信息（Bill To）',
    step2: '设置发票编号、日期、到期日、货币和税率',
    step3: '添加明细项目 — 描述、数量、单价',
    step4: '点击「下载 PDF」保存或打印发票',
  }
});

const { $, $$, t } = GZ;
let lang = GZI18n.getLang();
const STATE_KEY = 'gz-invoice-data-v1';
let state = {
  biz: { name:'', addr:'', email:'', phone:'' },
  bill: { name:'', addr:'', email:'' },
  inv: { number:'INV-001', date:new Date().toISOString().slice(0,10), due:'', currency:'USD', tax:0, discount:0 },
  items: [{ desc:'', qty:1, price:0 }],
  notes: '',
};

function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmt(n,cur){return (cur||'USD')+ ' '+(+n||0).toFixed(2);}

function loadState(){ try{const r=localStorage.getItem(STATE_KEY); if(r) state=Object.assign(state, JSON.parse(r));}catch(e){} }
function saveState(){ try{localStorage.setItem(STATE_KEY, JSON.stringify(state));}catch(e){} }

function renderForm() {
  $('#form').innerHTML = `
    <div class="ig-section">
      <h3>${t('bizSec')}</h3>
      <div class="ig-grid">
        <div class="ig-full"><label>${t('bizName')}</label><input data-biz="name" value="${esc(state.biz.name)}" placeholder="Acme Inc."></div>
        <div class="ig-full"><label>${t('bizAddr')}</label><textarea data-biz="addr" rows="2" placeholder="123 Main St, City, Country">${esc(state.biz.addr)}</textarea></div>
        <div><label>${t('bizEmail')}</label><input data-biz="email" value="${esc(state.biz.email)}" placeholder="hello@acme.com"></div>
        <div><label>${t('bizPhone')}</label><input data-biz="phone" value="${esc(state.biz.phone)}" placeholder="+1 234 567 8900"></div>
      </div>
    </div>
    <div class="ig-section">
      <h3>${t('billSec')}</h3>
      <div class="ig-grid">
        <div class="ig-full"><label>${t('billName')}</label><input data-bill="name" value="${esc(state.bill.name)}" placeholder="Customer Name"></div>
        <div class="ig-full"><label>${t('billAddr')}</label><textarea data-bill="addr" rows="2">${esc(state.bill.addr)}</textarea></div>
        <div class="ig-full"><label>${t('billEmail')}</label><input data-bill="email" value="${esc(state.bill.email)}"></div>
      </div>
    </div>
    <div class="ig-section">
      <h3>${t('invSec')}</h3>
      <div class="ig-grid">
        <div><label>${t('invNumber')}</label><input data-inv="number" value="${esc(state.inv.number)}"></div>
        <div><label>${t('currency')}</label><select data-inv="currency">
          <option ${state.inv.currency==='USD'?'selected':''}>USD</option>
          <option ${state.inv.currency==='EUR'?'selected':''}>EUR</option>
          <option ${state.inv.currency==='CNY'?'selected':''}>CNY</option>
          <option ${state.inv.currency==='GBP'?'selected':''}>GBP</option>
          <option ${state.inv.currency==='JPY'?'selected':''}>JPY</option>
        </select></div>
        <div><label>${t('invDate')}</label><input data-inv="date" type="date" value="${esc(state.inv.date)}"></div>
        <div><label>${t('invDue')}</label><input data-inv="due" type="date" value="${esc(state.inv.due)}"></div>
        <div><label>${t('taxRate')}</label><input data-inv="tax" type="number" min="0" max="100" step="0.1" value="${state.inv.tax}"></div>
        <div><label>${t('discount')}</label><input data-inv="discount" type="number" min="0" step="0.01" value="${state.inv.discount}"></div>
      </div>
    </div>
    <div class="ig-section">
      <h3>${t('itemsSec')}</h3>
      <table class="ig-items">
        <thead><tr><th>${t('desc')}</th><th style="width:60px">${t('qty')}</th><th style="width:100px">${t('price')}</th><th style="width:90px" class="num">${t('amount')}</th><th style="width:24px"></th></tr></thead>
        <tbody id="igItems">
          ${state.items.map((it,i) => itemRow(it,i)).join('')}
        </tbody>
      </table>
      <button class="ig-add-row" onclick="addItem()">${t('addItem')}</button>
    </div>
    <div class="ig-section">
      <h3>${t('notesSec')}</h3>
      <textarea data-notes rows="3" style="width:100%;background:rgba(0,0,0,0.3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:.55rem .7rem;color:var(--text);font-size:.85rem;font-family:inherit" placeholder="${t('notesPh')}">${esc(state.notes)}</textarea>
    </div>`;
  bindForm();
}

function itemRow(it,i) {
  return `<tr>
    <td><input data-row="${i}" data-f="desc" value="${esc(it.desc)}" placeholder="Service / product"></td>
    <td><input data-row="${i}" data-f="qty" type="number" min="0" step="any" value="${it.qty}"></td>
    <td><input data-row="${i}" data-f="price" type="number" min="0" step="any" value="${it.price}"></td>
    <td class="num" id="igAm${i}">${(it.qty*it.price).toFixed(2)}</td>
    <td><button class="ig-del" onclick="delItem(${i})">✕</button></td>
  </tr>`;
}

function bindForm() {
  $$('#form input[data-biz],#form textarea[data-biz]').forEach(i => i.oninput = e => { state.biz[i.dataset.biz] = i.value; saveState(); renderPreview(); });
  $$('#form input[data-bill],#form textarea[data-bill]').forEach(i => i.oninput = e => { state.bill[i.dataset.bill] = i.value; saveState(); renderPreview(); });
  $$('#form input[data-inv],#form select[data-inv]').forEach(i => i.oninput = e => { state.inv[i.dataset.inv] = i.value; saveState(); renderPreview(); });
  $$('#form input[data-row]').forEach(i => i.oninput = e => {
    const idx = +i.dataset.row, f = i.dataset.f;
    state.items[idx][f] = f==='desc' ? i.value : (+i.value||0);
    $('#igAm'+idx).textContent = (state.items[idx].qty*state.items[idx].price).toFixed(2);
    saveState(); renderPreview();
  });
  $$('#form textarea[data-notes]').forEach(i => i.oninput = e => { state.notes = i.value; saveState(); renderPreview(); });
}

function addItem() { state.items.push({desc:'',qty:1,price:0}); saveState(); renderForm(); renderPreview(); }
function delItem(i) { state.items.splice(i,1); if(!state.items.length) state.items.push({desc:'',qty:1,price:0}); saveState(); renderForm(); renderPreview(); }

function renderPreview() {
  const b = state.biz, c = state.bill, v = state.inv;
  const sub = state.items.reduce((s,it) => s + (it.qty*it.price), 0);
  const taxAmt = sub * (+v.tax||0) / 100;
  const disc = +v.discount||0;
  const tot = Math.max(0, sub + taxAmt - disc);
  const cur = v.currency || 'USD';
  let html = `
    <div class="ig-head">
      <div>
        <h1>${lang==='zh'?'发票':'INVOICE'}</h1>
        <div class="ig-meta" style="margin-top:4px"><b>${esc(b.name||'Your Business')}</b>${b.addr?'<br>'+esc(b.addr).replace(/\n/g,'<br>'):''}${b.email?'<br>'+esc(b.email):''}${b.phone?' · '+esc(b.phone):''}</div>
      </div>
      <div class="ig-meta" style="text-align:right">
        <b>${esc(v.number||'')}</b>
        <div>${lang==='zh'?'开具日期':'Date'}: ${esc(v.date||'')}</div>
        ${v.due?`<div>${lang==='zh'?'到期日期':'Due'}: ${esc(v.due)}</div>`:''}
      </div>
    </div>
    <div class="ig-bill">
      <div>
        <h4>${lang==='zh'?'客户':'Bill To'}</h4>
        <p><b>${esc(c.name||'')}</b>${c.addr?'<br>'+esc(c.addr).replace(/\n/g,'<br>'):''}${c.email?'<br>'+esc(c.email):''}</p>
      </div>
      <div></div>
    </div>
    <table>
      <thead><tr><th>${t('desc')}</th><th class="num" style="width:60px">${t('qty')}</th><th class="num" style="width:100px">${t('price')}</th><th class="num" style="width:110px">${t('amount')}</th></tr></thead>
      <tbody>
        ${state.items.map(it => `<tr><td>${esc(it.desc||'—')}</td><td class="num">${it.qty}</td><td class="num">${fmt(it.price,cur)}</td><td class="num">${fmt(it.qty*it.price,cur)}</td></tr>`).join('')}
      </tbody>
    </table>
    <div class="ig-totals">
      <div class="row"><span>${t('subtotal')}</span><span>${fmt(sub,cur)}</span></div>
      ${v.tax>0?`<div class="row"><span>${t('tax')} (${v.tax}%)</span><span>${fmt(taxAmt,cur)}</span></div>`:''}
      ${disc>0?`<div class="row"><span>${t('discountLbl')}</span><span>-${fmt(disc,cur)}</span></div>`:''}
      <div class="row total"><span>${t('total')}</span><span>${fmt(tot,cur)}</span></div>
    </div>
    ${state.notes?`<div class="ig-notes"><b>${lang==='zh'?'备注':'Notes'}:</b><br>${esc(state.notes).replace(/\n/g,'<br>')}</div>`:''}`;
  $('#preview').innerHTML = html;
}

function downloadPDF() {
  const w = window.open('', '_blank', 'width=900,height=1100');
  const css = 'body{font-family:Helvetica,Arial,sans-serif;color:#222;padding:36px;font-size:13px;line-height:1.5}'+
    '.ig-head{display:flex;justify-content:space-between;border-bottom:2px solid #2563eb;padding-bottom:14px;margin-bottom:14px;align-items:start}'+
    'h1{color:#2563eb;font-size:30px;margin:0;text-transform:uppercase;letter-spacing:2px}'+
    '.ig-meta{font-size:11px;color:#555}.ig-meta b{display:block;color:#111}'+
    '.ig-bill{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}.ig-bill h4{margin:0 0 4px;font-size:10px;text-transform:uppercase;color:#666;letter-spacing:1px}.ig-bill p{margin:0;white-space:pre-wrap}'+
    'table{width:100%;border-collapse:collapse;margin-bottom:14px;font-size:12px}th{background:#f5f5f5;padding:8px;text-align:left;border-bottom:2px solid #ddd}td{padding:8px;border-bottom:1px solid #eee}.num{text-align:right}'+
    '.ig-totals{width:50%;margin-left:auto}.ig-totals .row{display:flex;justify-content:space-between;padding:3px 0}.ig-totals .row.total{font-size:15px;font-weight:700;color:#2563eb;border-top:2px solid #2563eb;padding-top:6px;margin-top:6px}'+
    '.ig-notes{margin-top:18px;padding-top:10px;border-top:1px solid #eee;font-size:11px;color:#555;white-space:pre-wrap}';
  w.document.write(`<!DOCTYPE html><html><head><meta charset="utf-8"><title>Invoice ${esc(state.inv.number||'')}</title><style>${css}</style></head><body>${$('#preview').innerHTML}</body></html>
`);
}
$('#input').addEventListener('input', renderInvoice);
$('#toolbar').innerHTML=`<button class="gz-btn" onclick="renderInvoice()">${t("renderInvoice")}</button><button class="gz-btn" onclick="copyText($('#output').value||$('#output').innerText)">${t("copy")}</button><button class="gz-btn gz-btn-secondary" onclick="$('#input').value=''">${t("clear")}</button>`;
GZ.renderToolPage({category:'convert',titleKey:'toolTitle',descKey:'toolDesc',howToSteps:['step1', 'step2', 'step3', 'step4', 'step1', 'step2', 'step3', 'step4'],related:[]});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
