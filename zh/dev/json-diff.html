<script>
GZI18n.register({
  en: {
    toolTitle: 'JSON Diff & Compare',
    toolDesc: 'Compare two JSON objects side by side — find added, removed and changed keys with color-coded diffs.',
    lblLeft: 'JSON A (Original)',
    lblRight: 'JSON B (Modified)',
    step1: 'Paste the original JSON in the left input',
    step2: 'Paste the modified JSON in the right input',
    step3: 'Click Compare to see highlighted differences',
    step4: 'Review color-coded results: green=added, red=removed, yellow=changed',
    noDiff: '✓ The two JSON objects are identical.',
    parseError: 'JSON parse error',
    diffCount: 'differences found',
  },
  zh: {
    toolTitle: 'JSON 对比工具',
    toolDesc: '并排对比两个 JSON 对象 — 用颜色标记新增、删除和变更的字段。',
    lblLeft: 'JSON A（原始）',
    lblRight: 'JSON B（修改后）',
    step1: '在左侧输入原始 JSON',
    step2: '在右侧输入修改后的 JSON',
    step3: '点击「对比」查看高亮差异',
    step4: '查看颜色标记的结果：绿色=新增，红色=删除，黄色=变更',
    noDiff: '✓ 两个 JSON 对象完全相同。',
    parseError: 'JSON 解析错误',
    diffCount: '处差异',
  }
});

const { $, copyText, t } = GZ;

function deepDiff(a, b, path = '') {
  const diffs = [];
  if (a === b) return diffs;
  if (typeof a !== typeof b || a === null || b === null || typeof a !== 'object') {
    if (a !== b) diffs.push({ type: 'change', path, oldVal: a, newVal: b });
    return diffs;
  }
  if (Array.isArray(a) !== Array.isArray(b)) {
    diffs.push({ type: 'change', path, oldVal: a, newVal: b });
    return diffs;
  }
  const allKeys = new Set([...Object.keys(a), ...Object.keys(b)]);
  for (const key of allKeys) {
    const p = path ? `${path}.${key}` : key;
    if (!(key in a)) diffs.push({ type: 'add', path: p, newVal: b[key] });
    else if (!(key in b)) diffs.push({ type: 'del', path: p, oldVal: a[key] });
    else diffs.push(...deepDiff(a[key], b[key], p));
  }
  return diffs;
}

function formatVal(v) {
  if (v === undefined) return 'undefined';
  if (typeof v === 'object') return JSON.stringify(v);
  return String(v);
}

function compare() {
  const $result = $('#result');
  const $legend = $('#legend');
  const v1 = $('#input1').value.trim();
  const v2 = $('#input2').value.trim();
  if (!v1 || !v2) { $result.style.display = 'none'; $legend.style.display = 'none'; return; }
  let a, b;
  try { a = JSON.parse(v1); } catch(e) { $result.style.display = 'block'; $result.innerHTML = `<span style="color:var(--gz-accent)">${t('parseError')} A: ${e.message}</span>`; $legend.style.display='none'; return; }
  try { b = JSON.parse(v2); } catch(e) { $result.style.display = 'block'; $result.innerHTML = `<span style="color:var(--gz-accent)">${t('parseError')} B: ${e.message}</span>`; $legend.style.display='none'; return; }

  const diffs = deepDiff(a, b);
  $result.style.display = 'block';
  $legend.style.display = 'flex';

  if (diffs.length === 0) {
    $result.innerHTML = `<span style="color:var(--gz-success)">${t('noDiff')}</span>`;
    $legend.style.display = 'none';
    return;
  }

  let html = `<div style="margin-bottom:8px;opacity:.8">${diffs.length} ${t('diffCount')}</div>`;
  for (const d of diffs) {
    const cls = d.type === 'add' ? 'diff-add' : d.type === 'del' ? 'diff-del' : 'diff-change';
    const prefix = d.type === 'add' ? '+' : d.type === 'del' ? '−' : '~';
    if (d.type === 'add') {
      html += `<div class="${cls}">${prefix} <strong>${d.path}</strong>: ${formatVal(d.newVal)}</div>`;
    } else if (d.type === 'del') {
      html += `<div class="${cls}">${prefix} <strong>${d.path}</strong>: ${formatVal(d.oldVal)}</div>`;
    } else {
      html += `<div class="${cls}">${prefix} <strong>${d.path}</strong>: ${formatVal(d.oldVal)} → ${formatVal(d.newVal)}</div>`;
    }
  }
  $result.innerHTML = html;
}

function loadExample() {
  $('#input1').value = JSON.stringify({"name":"GameZipper","version":"1.0","features":["tools","games"],"config":{"theme":"dark","lang":"en","debug":false}}, null, 2);
  $('#input2').value = JSON.stringify({"name":"GameZipper","version":"2.0","features":["tools","games","api"],"config":{"theme":"light","lang":"en"},"newField":true}, null, 2);
  compare();
}

function doClear() {
  $('#input1').value = '';
  $('#input2').value = '';
  $('#result').style.display = 'none';
  $('#legend').style.display = 'none';
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="compare()">${t('compare')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

$('#lbl-in').textContent = t('lblLeft');
$('#lbl-in2').textContent = t('lblRight');

    {icon:'📄', href:'/convert/csv-to-json.html', name:'CSV to JSON'},
  ]
});
</script>
