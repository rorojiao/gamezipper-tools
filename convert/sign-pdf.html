const { PDFDocument, rgb } = PDFLib;
const { $, t } = GZ;
let pdfBytes = null, pdfDoc = null, currentPage = 0, totalPages = 0;
let signatures = []; // {page, x, y, w, h, dataUrl}
let pageScales = {}; // page index -> render scale
const FONTS = [
  { key: 'cursive', name: 'font1', css: "'Brush Script MT','Segoe Script','Lucida Handwriting',cursive", size: 1.0 },
  { key: 'serif', name: 'font2', css: "Georgia,'Times New Roman',serif", size: 0.85 },
  { key: 'sans', name: 'font3', css: "'Segoe UI',Arial,sans-serif", size: 0.8 },
  { key: 'mono', name: 'font4', css: "'Courier New',monospace", size: 0.8 },
];
let currentFontIdx = 0;

// ---------- Drawing pad ----------
const canvas = $('#sigCanvas');
const ctx = canvas.getContext('2d');
let drawing = false, lastX = 0, lastY = 0;
function clearCanvas() {
  ctx.fillStyle = '#fff';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.strokeStyle = '#999';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(20, canvas.height - 20);
  ctx.lineTo(canvas.width - 20, canvas.height - 20);
  ctx.stroke();
  ctx.fillStyle = '#bbb';
  ctx.font = '11px sans-serif';
  ctx.fillText('✕', 18, canvas.height - 24);
}
clearCanvas();
function pos(e) {
  const r = canvas.getBoundingClientRect();
  const cx = e.touches ? e.touches[0].clientX : e.clientX;
  const cy = e.touches ? e.touches[0].clientY : e.clientY;
  return [(cx - r.left) * canvas.width / r.width, (cy - r.top) * canvas.height / r.height];
}
function startDraw(e) { e.preventDefault(); drawing = true; [lastX,lastY] = pos(e); }
function drawMove(e) {
  if (!drawing) return; e.preventDefault();
  const [x,y] = pos(e);
  ctx.strokeStyle = $('#drawColor').value;
  ctx.lineWidth = 2.6;
  ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  ctx.beginPath(); ctx.moveTo(lastX,lastY); ctx.lineTo(x,y); ctx.stroke();
  lastX = x; lastY = y;
}
function endDraw() { drawing = false; }
canvas.addEventListener('mousedown', startDraw);
canvas.addEventListener('mousemove', drawMove);
canvas.addEventListener('mouseup', endDraw);
canvas.addEventListener('mouseleave', endDraw);
canvas.addEventListener('touchstart', startDraw);
canvas.addEventListener('touchmove', drawMove);
canvas.addEventListener('touchend', endDraw);

// Trim white border when extracting
function trimmedDataUrl(srcCanvas) {
  const tmp = document.createElement('canvas');
  const w = srcCanvas.width, h = srcCanvas.height;
  const img = srcCanvas.getContext('2d').getImageData(0,0,w,h).data;
  let minX = w, minY = h, maxX = 0, maxY = 0, found = false;
  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      const a = img[(y*w+x)*4+3];
      const r = img[(y*w+x)*4], g = img[(y*w+x)*4+1], b = img[(y*w+x)*4+2];
      // non-white pixel (signature ink)
      if (r < 240 || g < 240 || b < 240) {
        if (x < minX) minX = x; if (x > maxX) maxX = x;
        if (y < minY) minY = y; if (y > maxY) maxY = y;
        found = true;
      }
    }
  }
  if (!found) return srcCanvas.toDataURL('image/png');
  const pad = 6;
  minX = Math.max(0, minX - pad); minY = Math.max(0, minY - pad);
  maxX = Math.min(w-1, maxX + pad); maxY = Math.min(h-1, maxY + pad);
  const nw = maxX - minX, nh = maxY - minY;
  tmp.width = nw; tmp.height = nh;
  tmp.getContext('2d').drawImage(srcCanvas, minX, minY, nw, nh, 0, 0, nw, nh);
  return tmp.toDataURL('image/png');
}

// ---------- Tabs ----------
function switchTab(mode) {
  $('#tabs').querySelectorAll('.tab').forEach(b => b.classList.toggle('active', b.dataset.mode === mode));
  $('#panel-draw').style.display = mode === 'draw' ? 'flex' : 'none';
  $('#panel-type').style.display = mode === 'type' ? 'flex' : 'none';
  $('#panel-upload').style.display = mode === 'upload' ? 'flex' : 'none';
}
$('#tabs').querySelectorAll('.tab').forEach(b => b.onclick = () => switchTab(b.dataset.mode));

// ---------- Font picker for type mode ----------
function renderFontPick() {
  const fp = $('#fontPick');
  fp.innerHTML = '';
  FONTS.forEach((f, i) => {
    const b = document.createElement('button');
    b.textContent = t(f.name);
    b.style.fontFamily = f.css;
    b.className = i === currentFontIdx ? 'active' : '';
    b.onclick = () => { currentFontIdx = i; renderFontPick(); $('#sigTypeInput').style.fontFamily = f.css; };
    fp.appendChild(b);
  });
  $('#sigTypeInput').style.fontFamily = FONTS[currentFontIdx].css;
}

// ---------- Build a signature data URL ----------
function sigFromText(text, color) {
  const f = FONTS[currentFontIdx];
  const c = document.createElement('canvas');
  const fontSize = 64;
  const tctx = c.getContext('2d');
  tctx.font = `${fontSize}px ${f.css}`;
  const metrics = tctx.measureText(text);
  const tw = Math.max(60, Math.ceil(metrics.width) + 20);
  const th = Math.round(fontSize * 1.4);
  c.width = tw; c.height = th;
  tctx.fillStyle = '#fff'; tctx.fillRect(0,0,tw,th);
  tctx.font = `${fontSize}px ${f.css}`;
  tctx.fillStyle = color; tctx.textBaseline = 'middle';
  tctx.fillText(text, 10, th/2 + 4);
  return trimmedDataUrl(c);
}

function sigFromCanvas() {
  // copy drawn canvas (without the baseline guide) — re-render on a temp canvas
  const tmp = document.createElement('canvas');
  tmp.width = canvas.width; tmp.height = canvas.height;
  const tctx = tmp.getContext('2d');
  tctx.fillStyle = '#fff'; tctx.fillRect(0,0,tmp.width,tmp.height);
  tctx.drawImage(canvas, 0, 0);
  return trimmedDataUrl(tmp);
}

// ---------- Place signature ----------
function addSignature(dataUrl, naturalW, naturalH) {
  const page = pdfDoc.getPage(currentPage);
  const { width: pw } = page.getSize();
  const scale = pw / 612; // 612 = standard letter width points
  const targetW = 180 * scale;
  const targetH = targetW * (naturalH / naturalW);
  signatures.push({
    page: currentPage,
    x: pw * 0.5 - targetW / 2,
    y: page.getSize().height * 0.3,
    w: targetW,
    h: targetH,
    dataUrl,
    naturalW, naturalH,
  });
  renderPage();
}

$('#placeSig').onclick = () => {
  const url = sigFromCanvas();
  if (!url) return;
  const img = new Image();
  img.onload = () => addSignature(url, img.width, img.height);
  img.src = url;
};
$('#placeSigType').onclick = () => {
  const txt = $('#sigTypeInput').value.trim();
  if (!txt) { alert(t('noSigErr')); return; }
  const url = sigFromText(txt, $('#typeColor').value);
  const img = new Image();
  img.onload = () => addSignature(url, img.width, img.height);
  img.src = url;
};
let uploadedSigUrl = null;
$('#sigImgInput').onchange = e => {
  const f = e.target.files[0]; if (!f) return;
  const r = new FileReader();
  r.onload = () => { uploadedSigUrl = r.result; };
  r.readAsDataURL(f);
};
$('#placeSigImg').onclick = () => {
  if (!uploadedSigUrl) { alert(t('noImgErr')); return; }
  const img = new Image();
  img.onload = () => addSignature(uploadedSigUrl, img.width, img.height);
  img.src = uploadedSigUrl;
};
$('#clearSig').onclick = clearCanvas;

// ---------- Render current page ----------
async function renderPage() {
  const wrap = $('#page-wrap');
  wrap.innerHTML = '';
  const page = pdfDoc.getPage(currentPage);
  const { width, height } = page.getSize();
  // Render a representative preview canvas (we don't have a full rasterizer; draw a styled placeholder that reflects real aspect ratio)
  const targetW = Math.min(680, width * 1.0);
  const scale = targetW / width;
  const c = document.createElement('canvas');
  c.width = Math.round(width);
  c.height = Math.round(height);
  const cx = c.getContext('2d');
  cx.fillStyle = '#fff'; cx.fillRect(0,0,c.width,c.height);
  // Draw faint header/footer to hint it is a page
  cx.fillStyle = '#e8e8e8';
  for (let i = 0; i < Math.floor(height/40); i++) {
    cx.fillRect(60, 80 + i*40, width - 120 - (i%3)*60, 6);
  }
  c.style.width = targetW + 'px';
  c.style.height = Math.round(height * scale) + 'px';
  wrap.appendChild(c);
  wrap.dataset.scale = scale;
  wrap.dataset.pw = width;
  wrap.dataset.ph = height;
  // Render existing signatures on this page
  signatures.filter(s => s.page === currentPage).forEach((s, idx) => {
    const realIdx = signatures.indexOf(s);
    const stamp = document.createElement('div');
    stamp.className = 'sig-stamp';
    stamp.style.left = (s.x * scale) + 'px';
    stamp.style.top = (s.y * scale) + 'px';
    stamp.style.width = (s.w * scale) + 'px';
    stamp.style.height = (s.h * scale) + 'px';
    const img = document.createElement('img');
    img.src = s.dataUrl;
    img.style.width = '100%'; img.style.height = '100%';
    img.style.pointerEvents = 'none';
    stamp.appendChild(img);
    const del = document.createElement('div');
    del.className = 'del'; del.textContent = '✕';
    del.onclick = (e) => { e.stopPropagation(); signatures.splice(realIdx, 1); renderPage(); };
    stamp.appendChild(del);
    const resize = document.createElement('div');
    resize.className = 'resize';
    stamp.appendChild(resize);
    enableDrag(stamp, scale, realIdx);
    enableResize(stamp, resize, scale, realIdx);
    wrap.appendChild(stamp);
  });
  $('#pageInfo').textContent = t('pageInfo').replace('{a}', currentPage + 1).replace('{b}', totalPages);
}

function enableDrag(el, scale, idx) {
  let startX, startY, origX, origY;
  el.onmousedown = (e) => {
    if (e.target.classList.contains('del') || e.target.classList.contains('resize')) return;
    e.preventDefault();
    startX = e.clientX; startY = e.clientY;
    origX = signatures[idx].x; origY = signatures[idx].y;
    const move = (ev) => {
      signatures[idx].x = Math.max(0, origX + (ev.clientX - startX) / scale);
      signatures[idx].y = Math.max(0, origY + (ev.clientY - startY) / scale);
      el.style.left = (signatures[idx].x * scale) + 'px';
      el.style.top = (signatures[idx].y * scale) + 'px';
    };
    const up = () => { document.removeEventListener('mousemove', move); document.removeEventListener('mouseup', up); };
    document.addEventListener('mousemove', move);
    document.addEventListener('mouseup', up);
  };
}
function enableResize(el, handle, scale, idx) {
  let startX, startY, origW, origH;
  handle.onmousedown = (e) => {
    e.preventDefault(); e.stopPropagation();
    startX = e.clientX; startY = e.clientY;
    origW = signatures[idx].w; origH = signatures[idx].h;
    const move = (ev) => {
      const nw = Math.max(40, origW + (ev.clientX - startX) / scale);
      const ratio = signatures[idx].naturalH / signatures[idx].naturalW;
      signatures[idx].w = nw;
      signatures[idx].h = nw * ratio;
      el.style.width = (nw * scale) + 'px';
      el.style.height = (signatures[idx].h * scale) + 'px';
    };
    const up = () => { document.removeEventListener('mousemove', move); document.removeEventListener('mouseup', up); };
    document.addEventListener('mousemove', move);
    document.addEventListener('mouseup', up);
  };
}

$('#prevPage').onclick = () => { if (currentPage > 0) { currentPage--; renderPage(); } };
$('#nextPage').onclick = () => { if (currentPage < totalPages - 1) { currentPage++; renderPage(); } };

// ---------- Load file ----------
async function loadFile(file) {
  if (!file || file.type !== 'application/pdf') { $('#status').textContent = '⚠️ Please select a PDF file.'; return; }
  pdfBytes = new Uint8Array(await file.arrayBuffer());
  try {
    pdfDoc = await PDFDocument.load(pdfBytes);
  } catch (e) {
    $('#status').textContent = '⚠️ Could not read PDF: ' + e.message;
    return;
  }
  totalPages = pdfDoc.getPageCount();
  currentPage = 0;
  signatures = [];
  $('#drop-area').style.display = 'none';
  $('#editor').style.display = 'block';
  $('#status').innerHTML = `<b>${file.name}</b> · ${totalPages} pages`;
  renderFontPick();
  await renderPage();
}

// ---------- Download ----------
async function downloadSigned() {
  if (!pdfDoc) return;
  const out = await PDFDocument.create();
  const pages = await out.copyPages(pdfDoc, pdfDoc.getPageIndices());
  pages.forEach(p => out.addPage(p));
  // Embed each signature onto its page
  for (const sig of signatures) {
    const pngBytes = await (await fetch(sig.dataUrl)).arrayBuffer();
    const img = await out.embedPng(new Uint8Array(pngBytes));
    const page = out.getPage(sig.page);
    // pdf-lib y-axis is bottom-up
    const { height } = page.getSize();
    page.drawImage(img, { x: sig.x, y: height - sig.y - sig.h, width: sig.w, height: sig.h });
  }
  const bytes = await out.save();
  const blob = new Blob([bytes], { type: 'application/pdf' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'signed.pdf';
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 5000);
  $('#status').innerHTML = `<span style="color:var(--gz-success,#00d672)">${t('downloaded')}</span>`;
}

$('#downloadBtn').onclick = downloadSigned;
$('#resetBtn').onclick = () => {
  pdfBytes = null; pdfDoc = null; signatures = []; totalPages = 0; currentPage = 0;
  $('#editor').style.display = 'none';
  $('#drop-area').style.display = 'block';

};

$('#drop-area').ondragleave = () => $('#drop-area').classList.remove('drag');

};
