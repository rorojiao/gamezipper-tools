<script>
GZI18n.register({
  en: {
    toolTitle: 'SHA-1 Hash Generator',
    toolDesc: 'Generate SHA-1 (160-bit) hashes from text instantly. Uses native Web Crypto API — fast, free and 100% browser-based. No signup, no server uploads.',
    step1: 'Enter or paste text in the input area',
    step2: 'SHA-1 hash is computed automatically as you type',
    step3: 'Click Copy to copy the 40-character hex hash',
    step4: 'Note: SHA-1 is broken for collisions — use SHA-256 for security',
  },
  zh: {
    toolTitle: 'SHA-1 哈希生成器',
    toolDesc: '即时从文本生成 SHA-1（160 位）哈希。使用原生 Web Crypto API — 快速、免费、100% 浏览器运行。无需注册，不上传到服务器。',
    step1: '在输入区输入或粘贴文本',
    step2: 'SHA-1 哈希会随输入自动计算',
    step3: '点击"复制"复制 40 位十六进制哈希值',
    step4: '注意：SHA-1 在碰撞方面已被攻破 — 安全用途请用 SHA-256',
  }
});

const { $, copyText, t } = GZ;

function hex(buf) { return [...new Uint8Array(buf)].map(b => b.toString(16).padStart(2,'0')).join(''); }

async function doHash() {
  const text = $('#input').value;
  if (!text) { $('#results').innerHTML = ''; return; }
  const buf = new TextEncoder().encode(text);
  const hash = await crypto.subtle.digest('SHA-1', buf);
  const hexVal = hex(hash);
  const b64 = btoa(String.fromCharCode(...new Uint8Array(hash)));
  $('#results').innerHTML = `
    <div class="hash-row"><strong>SHA-1 (hex)</strong><code>${hexVal}</code><button class="gz-btn" onclick="copyText('${hexVal}')" style="padding:4px 10px;font-size:.8em">${t('copy')}</button></div>
    <div class="hash-row"><strong>SHA-1 (Base64)</strong><code>${b64}</code><button class="gz-btn" onclick="copyText('${b64}')" style="padding:4px 10px;font-size:.8em">${t('copy')}</button></div>
    <div style="margin-top:8px;font-size:.78em;opacity:.6">${text.length} chars → 160-bit / 40 hex chars</div>`;
}

function loadExample() { $('#input').value = 'Hello, World!'; doHash(); }

$('#toolbar').innerHTML = `
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#input').value=\'\';$(\'#results\').innerHTML=\'\'">${t('clear')}</button>`;

$('#input').addEventListener('input', doHash);

GZ.renderToolPage({
  category: 'dev',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],

    {icon:'📦', href:'/dev/file-hash.html', name:'File Hash'},
  ]
});
</script>
