<script>
GZI18n.register({
  en: {
    toolTitle: 'Reaction Time Test',
    toolDesc: 'Measure your reflexes! Click the instant the screen turns green and see your reaction time in milliseconds. Free, instant, no signup.',
    lblLast: 'Last',
    lblBest2: 'Best',
    lblAvg: 'Average',
    lblAttempts: 'Attempts',
    idleMsg: 'Click here to start',
    idleSub: 'Then wait for green and click as fast as you can',
    waitMsg: 'Wait for green...',
    waitSub: 'Do NOT click yet',
    goMsg: 'CLICK!',
    goSub: 'As fast as you can',
    earlyMsg: 'Too early!',
    earlySub: 'Click to try again',
    resultMsg: 'ms — click to try again',
    step1: 'Click the large zone to begin',
    step2: 'The screen turns red — wait patiently',
    step3: 'The moment it turns green, click immediately',
    step4: 'See your time in milliseconds and beat your best',
  },
  zh: {
    toolTitle: '反应速度测试',
    toolDesc: '测试你的反应力！屏幕变绿时立刻点击，查看你的反应时间（毫秒）。免费、即时、无需注册。',
    lblLast: '上次',
    lblBest2: '最佳',
    lblAvg: '平均',
    lblAttempts: '次数',
    idleMsg: '点击此处开始',
    idleSub: '等待变绿后尽快点击',
    waitMsg: '等待变绿...',
    waitSub: '请先不要点击',
    goMsg: '点击！',
    goSub: '尽可能快',
    earlyMsg: '太早了！',
    earlySub: '点击重试',
    resultMsg: '毫秒 — 点击再试一次',
    step1: '点击大区域开始',
    step2: '屏幕变红 — 请耐心等待',
    step3: '变绿的瞬间立刻点击',
    step4: '查看毫秒反应时间并挑战最佳记录',
  }
});

const { $, t } = GZ;
let phase = 'idle'; // idle | wait | go | early | done
let startTime = 0;
let timer = null;
let history = [];
let best = null;

function setZone(cls, msg, sub) {
  const z = $('#zone');
  z.className = 'rt-zone ' + cls;
  z.innerHTML = `<div class="big">${msg}</div><div class="sub">${sub}</div>`;
}

function startTrial() {
  phase = 'wait';
  setZone('wait', t('waitMsg'), t('waitSub'));
  const delay = 1500 + Math.random() * 3500;
  timer = setTimeout(() => {
    phase = 'go';
    startTime = performance.now();
    setZone('go', t('goMsg'), t('goSub'));
  }, delay);
}

function recordResult(ms) {
  history.push(ms);
  if (best === null || ms < best) best = ms;
  $('#last-ms').textContent = Math.round(ms);
  $('#best-ms').textContent = Math.round(best);
  const avg = Math.round(history.reduce((a,b)=>a+b,0)/history.length);
  $('#avg-ms').textContent = avg;
  $('#attempts').textContent = history.length;
  renderHistory();
}

function renderHistory() {
  const colors = {fast:'#00d672',good:'#61afef',avg:'#d19a66',slow:'#ff4757'};
  $('#history').innerHTML = history.slice(-8).reverse().map(ms => {
    let cat,color;
    if (ms < 200){cat='⚡';color=colors.fast;}
    else if(ms<280){cat='✓';color=colors.good;}
    else if(ms<400){cat='~';color=colors.avg;}
    else{cat='…';color=colors.slow;}
    const pct = Math.min(100, (ms/600)*100);
    return `<div class="rt-bar"><span class="lab">${cat} ${Math.round(ms)}</span><span class="track"><span class="fill" style="width:${pct}%;background:${color}"></span></span><span class="val">${Math.round(ms)}ms</span></div>`;
  }).join('');
}

const zone = $('#zone');
zone.addEventListener('click', () => {
  if (phase === 'idle' || phase === 'done' || phase === 'early') {
    startTrial();
  } else if (phase === 'wait') {
    clearTimeout(timer);
    phase = 'early';
    setZone('early', t('earlyMsg'), t('earlySub'));
  } else if (phase === 'go') {
    const ms = performance.now() - startTime;
    recordResult(ms);
    phase = 'done';
    setZone('idle', `${Math.round(ms)} ${t('resultMsg')}`, t('idleSub'));
  }
});

setZone('idle', t('idleMsg'), t('idleSub'));

GZ.renderToolPage({
  category: 'fun',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🔢', href:'/fun/number-memory-test.html', name:'Number Memory'},
    {icon:'🧩', href:'/fun/sequence-memory-test.html', name:'Sequence Memory'},
    {icon:'⌨️', href:'/fun/typing-speed-test.html', name:'Typing Speed'},
    {icon:'🎮', href:'/fun/aim-trainer.html', name:'Aim Trainer'},
  ]
});
</script>
