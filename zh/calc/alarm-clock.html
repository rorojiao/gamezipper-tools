<body>
<div class="gz-container">
  <div class="gz-tool-header">

    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="clock-display">
      <div class="time" id="clockTime">00:00<span class="seconds">:00</span></div>
      <div class="date" id="clockDate"></div>
    </div>
    <div class="alarm-form">
      <label><span id="lbl-time"></span><input type="time" id="alarmTime" value="07:00"></label>
      <label><span id="lbl-label"></span><input type="text" id="alarmLabel" maxlength="50" placeholder=""></label>
      <label><span id="lbl-sound"></span>
        <select id="alarmSound">
          <option value="beep">Beep</option>
          <option value="bell">Bell</option>
          <option value="chime">Chime</option>
          <option value="digital">Digital</option>
          <option value="ring">Ring</option>
        </select>
      </label>
      <button class="gz-btn" id="addAlarmBtn"></button>
    </div>
    <div class="alarm-list" id="alarmList"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Online Alarm Clock',
    toolDesc: 'Set multiple alarms right in your browser. Choose custom sounds, add labels, and get notified at the right time. Free, no app needed.',
    lblTime: 'Time:',
    lblLabel: 'Label:',
    lblSound: 'Sound:',
    addAlarm: 'Set Alarm',
    dismiss: 'Dismiss',
    delete: 'Delete',
    snooze: 'Snooze 5min',
    alarmLabelPlaceholder: 'e.g. Wake up, Meeting...',
    step1: 'Set the alarm time using the time picker',
    step2: 'Optionally add a label and choose a sound',
    step3: 'Click Set Alarm to activate',
    step4: 'Keep this tab open — the alarm will ring at the set time',
    alarmFired: '⏰ Alarm!',
  },
  zh: {
    toolTitle: '在线闹钟',
    toolDesc: '在浏览器中设置多个闹钟。自定义铃声、添加标签，到点自动提醒。免费，无需安装应用。',
    lblTime: '时间:',
    lblLabel: '标签:',
    lblSound: '铃声:',
    addAlarm: '设置闹钟',
    dismiss: '关闭',
    delete: '删除',
    snooze: '贪睡 5分钟',
    alarmLabelPlaceholder: '例如：起床、开会...',
    step1: '使用时间选择器设置闹钟时间',
    step2: '可选：添加标签和选择铃声',
    step3: '点击设置闹钟激活',
    step4: '保持此标签页打开，闹钟将在设定时间响起',
    alarmFired: '⏰ 闹钟响了！',
  }
});

const { $, t } = GZ;
let alarms = [];
let audioCtx = null;

$('#lbl-time').textContent = t('lblTime');
$('#lbl-label').textContent = t('lblLabel');
$('#lbl-sound').textContent = t('lblSound');
$('#alarmLabel').placeholder = t('alarmLabelPlaceholder');
$('#addAlarmBtn').textContent = t('addAlarm');

function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playSound(type) {
  const ctx = getAudioCtx();
  const gain = ctx.createGain();
  gain.connect(ctx.destination);
  gain.gain.value = 0.3;

  const now = ctx.currentTime;
  const notes = {
    beep: [800, 800, 800],
    bell: [523, 659, 784],
    chime: [880, 1100, 1320],
    digital: [1000, 600, 1000],
    ring: [440, 550, 440],
  };
  const freqs = notes[type] || notes.beep;

  freqs.forEach((freq, i) => {
    const osc = ctx.createOscillator();
    osc.type = type === 'digital' ? 'square' : 'sine';
    osc.frequency.value = freq;
    osc.connect(gain);
    osc.start(now + i * 0.3);
    osc.stop(now + i * 0.3 + 0.2);
  });
}

function updateClock() {
  const now = new Date();
  const h = String(now.getHours()).padStart(2, '0');
  const m = String(now.getMinutes()).padStart(2, '0');
  const s = String(now.getSeconds()).padStart(2, '0');
  $('#clockTime').innerHTML = `${h}:${m}<span class="seconds">:${s}</span>`;

  const dateOpts = {weekday:'long',year:'numeric',month:'long',day:'numeric'};
  $('#clockDate').textContent = now.toLocaleDateString(lang === 'zh' ? 'zh-CN' : 'en-US', dateOpts);

  // Check alarms
  const timeStr = `${h}:${m}`;
  alarms.forEach(a => {
    if (a.active && !a.fired && a.time === timeStr && now.getSeconds() < 2) {
      a.fired = true;
      a.ringing = true;
      playSound(a.sound);
      // Repeat sound
      a.soundInterval = setInterval(() => playSound(a.sound), 1500);
      if (Notification.permission === 'granted') {
        new Notification(t('alarmFired'), {body: a.label || a.time, icon: '/favicon.svg'});
      }
      document.title = '⏰ ' + (a.label || a.time);
      renderAlarms();
    }
  });
}

function renderAlarms() {
  const list = $('#alarmList');
  if (alarms.length === 0) {
    list.innerHTML = `<p style="text-align:center;opacity:.5;padding:20px">${lang === 'zh' ? '暂无闹钟，点击上方设置闹钟' : 'No alarms set. Click "Set Alarm" above to add one.'}</p>`;
    return;
  }
  list.innerHTML = alarms.map((a, i) => `
    <div class="alarm-item ${a.ringing ? 'ringing' : ''}">
      <div class="alarm-time">${a.time}</div>
      <div class="alarm-label">${a.label || ''}</div>
      ${a.ringing ? `<button class="gz-btn" onclick="dismissAlarm(${i})">${t('dismiss')}</button><button class="gz-btn gz-btn-secondary" onclick="snoozeAlarm(${i})">${t('snooze')}</button>` : ''}
      <button class="gz-btn gz-btn-secondary" onclick="deleteAlarm(${i})">${t('delete')}</button>
    </div>
  `).join('');
}

window.deleteAlarm = function(i) {
  if (alarms[i].soundInterval) clearInterval(alarms[i].soundInterval);
  alarms.splice(i, 1);
  if (alarms.length === 0) document.title = 'Online Alarm Clock - GameZipper Tools';
  renderAlarms();
};

window.dismissAlarm = function(i) {
  if (alarms[i].soundInterval) clearInterval(alarms[i].soundInterval);
  alarms[i].ringing = false;
  alarms[i].active = false;
  document.title = 'Online Alarm Clock - GameZipper Tools';
  renderAlarms();
};

window.snoozeAlarm = function(i) {
  if (alarms[i].soundInterval) clearInterval(alarms[i].soundInterval);
  alarms[i].ringing = false;
  // Add 5 minutes
  const [h, m] = alarms[i].time.split(':').map(Number);
  const d = new Date(); d.setHours(h, m + 5);
  alarms[i].time = `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  alarms[i].fired = false;
  document.title = 'Online Alarm Clock - GameZipper Tools';
  renderAlarms();
};

$('#addAlarmBtn').onclick = () => {
  const time = $('#alarmTime').value;
  if (!time) return;
  alarms.push({
    time,
    label: $('#alarmLabel').value,
    sound: $('#alarmSound').value,
    active: true,
    fired: false,
    ringing: false,
    soundInterval: null,
  });
  $('#alarmLabel').value = '';
  renderAlarms();
};

// Request notification permission
if ('Notification' in window && Notification.permission === 'default') {
  Notification.requestPermission();
}

const lang = document.documentElement.lang === 'zh' ? 'zh' : 'en';

GZ.renderToolPage({
  related: [
    {icon:'📅', href:'/calc/date-calculator.html', name:'Date Calculator'},
  ]
});

updateClock();
setInterval(updateClock, 1000);
renderAlarms();
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
