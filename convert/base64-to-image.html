    decodeBtn: '解码图片',

    invalidBase64: '无效的 Base64 字符串，请检查输入内容。',
    format: '格式',
    size: '大小',
    dimensions: '尺寸',
    step1: '将 Base64 编码的图片字符串粘贴到文本框',
    step2: '点击「解码图片」将 Base64 转换为图片',
    step3: '预览解码后的图片，查看格式和大小信息',
    step4: '点击下载将图片保存到本地',
  }
});

const { $, copyText, t } = GZ;

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="decodeImage()">${t('decodeBtn')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>
`;

function detectMime(base64) {
  const prefix = base64.substring(0, 20);
  if (prefix.includes('iVBOR')) return 'image/png';
  if (prefix.includes('/9j/')) return 'image/jpeg';
  if (prefix.includes('R0lGOD')) return 'image/gif';
  if (prefix.includes('UklGR')) return 'image/webp';
  if (prefix.includes('PHN2Zy') || prefix.includes('PD94bW')) return 'image/svg+xml';
  if (prefix.includes('Qk')) return 'image/bmp';
  return 'image/png';
}

function decodeImage() {
  let val = $('#input').value.trim();
  if (!val) return;

  // Remove data URI prefix if present
  let mime = '';
  if (val.startsWith('data:')) {
    const match = val.match(/^data:(image\/[a-z+]+);base64,/i);
    if (match) {
      mime = match[1];
      val = val.replace(/^data:[^;]+;base64,/, '');
    }
  }

  if (!mime) mime = detectMime(val);

  try {
    const dataUrl = `data:${mime};base64,${val}`;
    const img = new Image();
    img.onload = function() {
      const ext = mime.split('/')[1] === 'jpeg' ? 'jpg' : mime.split('/')[1];
      // Calculate approximate size
      const byteSize = Math.round(val.length * 3 / 4);
      const sizeStr = byteSize < 1024 ? byteSize + ' B' : byteSize < 1048576 ? (byteSize/1024).toFixed(1) + ' KB' : (byteSize/1048576).toFixed(2) + ' MB';

      $('#preview').innerHTML = `
        <img src="${dataUrl}" alt="Decoded image">
        <div class="info-bar">
          <span>${t('format')}: ${mime}</span>
          <span>${t('dimensions')}: ${img.naturalWidth} × ${img.naturalHeight}</span>
          <span>${t('size')}: ${sizeStr}</span>
        </div>
        <div style="margin-top:12px">
          <button class="gz-btn" onclick="dlImage('${dataUrl}','decoded-image.${ext}')">${t('download')}</button>
        </div>
      `;
      $('#status').textContent = '✓ ' + t('format') + ': ' + mime + ' — ' + img.naturalWidth + '×' + img.naturalHeight;
    };
    img.onerror = function() {
      $('#status').innerHTML = `<span style="color:var(--gz-accent)">${t('invalidBase64')}</span>`;
      $('#preview').innerHTML = '';
    };
    img.src = dataUrl;
  } catch(e) {
    $('#status').innerHTML = `<span style="color:var(--gz-accent)">${t('invalidBase64')}</span>`;
    $('#preview').innerHTML = '';
  }
}

function dlImage(dataUrl, filename) {
  const a = document.createElement('a');
  a.href = dataUrl;
  a.download = filename;
  a.click();
}

function loadExample() {
  // A tiny 10x10 red PNG as base64
  $('#input').value = 'iVBORw0KGgoAAAANSUhEUgAAAAoAAAAKCAYAAACNMs+9AAAAFklEQVQYV2P4z8BQz0BhwEiKAqgZAhMBAD0kBwW+CSxsAAAAAElFTkSuQmCC';
  decodeImage();
}

function doClear() {
  $('#input').value = '';
  $('#preview').innerHTML = '';
  $('#status').textContent = '';
}
