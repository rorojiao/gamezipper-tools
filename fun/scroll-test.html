.sc-big{font-size:3.5rem;font-weight:800;font-family:monospace;color:var(--accent);line-height:1;text-shadow:0 2px 8px rgba(0,0,0,.4)}

.sc-stat{background:var(--glass);border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center}

.sc-rank{text-align:center;margin-top:14px;font-size:1.1rem;font-weight:600}
.sc-history{max-width:680px;margin:18px auto 0;background:var(--glass);border:1px solid var(--border);border-radius:12px;padding:14px}
.sc-history h3{margin:0 0 8px;font-size:.95rem}
.sc-history table{width:100%;border-collapse:collapse;font-size:.85em}
.sc-history td,.sc-history th{padding:6px 8px;border-bottom:1px solid var(--border);text-align:center}
.sc-history th{opacity:.65;font-weight:600}
.sc-ranks{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin-top:14px;font-size:.75em}
.sc-rank-pill{padding:4px 10px;border-radius:20px;border:1px solid var(--border);background:var(--glass)}

<script>
GZI18n.register({
  en: {
    toolTitle: 'Scroll Test — Mouse Scroll Wheel Speed Test',
    toolDesc: 'Measure your mouse scroll wheel speed in pixels per second with this free scroll test. Choose 5, 10 or 30 seconds, scroll as fast as you can, and see your total distance, speed and skill rank. Works with mouse wheel, touchpad and touch.',
    speed: 'Speed (px/s)', distance: 'Distance (px)', time: 'Time', history: 'Recent Attempts', mode: 'Mode', reset: '🔄 Reset',
    scrollToStart: 'Scroll here to start',
    scrollNow: 'KEEP SCROLLING!',
    timesUp: '⏰ Time\'s up!',
    subStart: 'Use your scroll wheel, touchpad or swipe to begin',
    subRun: 'Scroll as fast as you can!',
    subDone: 'Click Reset to try again',
    rankSlow: '🐢 Slow Poke', rankAvg: '🙂 Average', rankGood: '😎 Good', rankGreat: '🔥 Great', rankPro: '⚡ Pro', rankGod: '👑 Godlike',
    step1: 'Pick a test duration — 5s, 10s or 30s',
    step2: 'Scroll inside the test area to start the timer',
    step3: 'Keep scrolling as fast as you can until time runs out',
    step4: 'Check your scroll speed (px/s) and skill rank!',
  },
  zh: {
    toolTitle: '滚轮测试 — 鼠标滚轮速度测试',
    toolDesc: '用这款免费的滚轮测试来测量你的鼠标滚轮速度（像素/秒）。选择 5、10 或 30 秒，尽可能快地滚动，查看总滚动距离、速度和技能等级。支持鼠标滚轮、触摸板和触摸滑动。',
    speed: '速度 (px/s)', distance: '距离 (px)', time: '时间', history: '最近成绩', mode: '模式', reset: '🔄 重置',
    scrollToStart: '在此滚动开始',
    scrollNow: '继续滚动！',
    timesUp: '⏰ 时间到！',
    subStart: '使用滚轮、触摸板或滑动即可开始',
    subRun: '尽可能快地滚动！',
    subDone: '点击重置可再次挑战',
    rankSlow: '🐢 慢吞吞', rankAvg: '🙂 一般', rankGood: '😎 不错', rankGreat: '🔥 很棒', rankPro: '⚡ 高手', rankGod: '👑 神级',
    step1: '选择测试时长 — 5 秒、10 秒或 30 秒',
    step2: '在测试区域内滚动即可开始计时',
    step3: '在时间结束前尽可能快地滚动',
    step4: '查看滚轮速度（px/s）和技能等级！',
  }
});

const { $, copyText, t } = GZ;

const DURATIONS = [5, 10, 30];
let duration = 10;
let distance = 0;
let running = false;
let done = false;
let startTime = 0;
let rafId = null;
let history = [];

function rankFor(speed){
  if(speed < 1500) return t('rankSlow');
  if(speed < 2500) return t('rankAvg');
  if(speed < 4000) return t('rankGood');
  if(speed < 6000) return t('rankGreat');
  if(speed < 8000) return t('rankPro');
  return t('rankGod');
}
function rankColor(speed){
  if(speed<1500) return '#888'; if(speed<2500) return '#61afef'; if(speed<4000) return '#00d672';
  if(speed<6000) return '#ffb86c'; if(speed<8000) return '#e94560'; return '#bb86fc';
}
function fmtNum(n){ return n.toLocaleString(); }

function renderModes(){
  $('#modes').innerHTML = DURATIONS.map(d=>`<button data-d="${d}" class="${d===duration?'active':''}">${d}s</button>`).join('');
  $('#modes').querySelectorAll('button').forEach(b => b.onclick = () => {
    if(running) return;
    duration = +b.dataset.d; reset(); renderModes();
  });
}

// Build decorative scrolling content
function buildContent(){
  const labels = ['🖱️','⬆️','💨','⚡','🔥','✨','🌟','💫','⬇️','🏁'];
  let html = '';
  for(let i=0;i<60;i++){
    html += `<div class="sc-line">${labels[i%labels.length]} &nbsp; ${i+1}</div>`;
  }
  $('#content').innerHTML = html;
}

function reset(){
  running=false; done=false; distance=0; startTime=0;
  if(rafId) cancelAnimationFrame(rafId);
  $('#arena').className='sc-arena';
  $('#track').style.transform='translateY(0px)';
  $('#big').textContent='🖱️'; $('#big').style.color='';
  $('#sub').textContent=t('subStart');
  $('#hint').textContent=t('scrollToStart');
  $('#sSpeed').textContent='0'; $('#sDist').textContent='0'; $('#sTime').textContent='0.0s';
  $('#rank').textContent='';
}

function tick(){
  if(!running) return;
  const elapsed = (performance.now()-startTime)/1000;
  const remain = Math.max(0, duration-elapsed);
  $('#sTime').textContent = remain.toFixed(1)+'s';
  const speed = Math.round(distance/Math.max(elapsed,0.001));
  $('#sSpeed').textContent = fmtNum(speed);
  $('#sDist').textContent = fmtNum(Math.round(distance));
  $('#big').textContent = remain.toFixed(1);
  // move track visually (bounded)
  const offset = -(distance % 2000);
  $('#track').style.transform = `translateY(${offset}px)`;
  if(remain <= 0){ finish(); return; }
  rafId = requestAnimationFrame(tick);
}

function finish(){
  running=false; done=true;
  if(rafId) cancelAnimationFrame(rafId);
  const speed = Math.round(distance/duration);
  $('#arena').className='sc-arena done';
  $('#big').textContent = fmtNum(speed);
  $('#big').style.color = rankColor(speed);
  $('#sub').textContent = t('subDone');
  $('#hint').textContent = t('timesUp');
  $('#sSpeed').textContent = fmtNum(speed);
  $('#sTime').textContent = duration+'.0s';
  const rk = rankFor(speed);
  $('#rank').innerHTML = `<span style="color:${rankColor(speed)}">${rk}</span> · ${fmtNum(Math.round(distance))} px · ${fmtNum(speed)} px/s`;
  history.unshift({speed, distance: Math.round(distance), mode: duration+'s', ts: Date.now()});
  if(history.length>10) history.pop();
  renderHistory();
}

function renderHistory(){
  const tb = $('#histTable').querySelector('tbody');
  if(!history.length){ tb.innerHTML = `<tr><td colspan="4" style="opacity:.5">${t('subStart')}</td></tr>`; return; }
  tb.innerHTML = history.map((h,i)=>`<tr><td>${i+1}</td><td>${h.mode}</td><td style="color:${rankColor(h.speed)};font-weight:700">${fmtNum(h.speed)}</td><td>${fmtNum(h.distance)}</td></tr>`).join('');
}

const arena = $('#arena');
function onWheel(e){
  e.preventDefault();
  let delta = Math.abs(e.deltaY || 0);
  if(delta === 0) return;
  if(!running && !done){
    running=true; distance=delta;
    startTime=performance.now();
    $('#arena').className='sc-arena running';
    $('#big').textContent=delta.toFixed(0); $('#big').style.color='var(--accent)';
    $('#sub').textContent=t('subRun');
    $('#hint').textContent=t('scrollNow');
    rafId=requestAnimationFrame(tick);
  } else if(running){
    distance += delta;
  } else if(done){
    reset();
  }
}
arena.addEventListener('wheel', onWheel, {passive:false});

// touch support
let lastTouchY = 0;
arena.addEventListener('touchstart', (e) => { lastTouchY = e.touches[0].clientY; e.preventDefault(); }, {passive:false});
arena.addEventListener('touchmove', (e) => {
  const y = e.touches[0].clientY;
  const delta = Math.abs(lastTouchY - y) * 3; // amplify touch
  lastTouchY = y;
  if(delta === 0) return;
  if(!running && !done){
    running=true; distance=delta;
    startTime=performance.now();
    $('#arena').className='sc-arena running';
    $('#big').style.color='var(--accent)';
    $('#sub').textContent=t('subRun');
    $('#hint').textContent=t('scrollNow');
    rafId=requestAnimationFrame(tick);
  } else if(running){
    distance += delta;
  }
  e.preventDefault();
}, {passive:false});

$('#sub').textContent = t('subStart');
$('#hint').textContent = t('scrollToStart');
$('#lSpeed').textContent = t('speed');
$('#lDist').textContent = t('distance');
$('#lTime').textContent = t('time');
$('#lblHistory').textContent = t('history');
$('#hMode').textContent = t('mode'); $('#hSpeed').textContent = t('speed'); $('#hDist').textContent = t('distance');

$('#rankScale').innerHTML = [
  ['<1.5k',t('rankSlow'),'#888'],
  ['1.5-2.5k',t('rankAvg'),'#61afef'],
  ['2.5-4k',t('rankGood'),'#00d672'],
  ['4-6k',t('rankGreat'),'#ffb86c'],
  ['6-8k',t('rankPro'),'#e94560'],
  ['8k+',t('rankGod'),'#bb86fc'],
].map(([r,n,c])=>`<span class="sc-rank-pill" style="border-color:${c};color:${c}">${r} · ${n}</span>`).join('');

$('#toolbar').innerHTML = `<button class="gz-btn gz-btn-secondary" id="btnReset">${t('reset')}</button>`;
$('#btnReset').onclick = reset;

buildContent();
renderModes();
renderHistory();

GZ.renderToolPage({
  category: 'fun',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🖱️', href:'/fun/cps-test.html', name:'CPS Test'},
    {icon:'⌨️', href:'/fun/spacebar-test.html', name:'Spacebar Test'},
    {icon:'🖱️', href:'/fun/mouse-tester.html', name:'Mouse Tester'},
    {icon:'⚡', href:'/fun/reaction-time.html', name:'Reaction Time Test'},
  ]
});
</script>

</body>
