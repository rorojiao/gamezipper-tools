};

function luhn(num){
  let sum=0,alt=false;
  for(let i=num.length-1;i>=0;i--){
    let d=+num[i]; if(isNaN(d))continue;
    if(alt){d*=2; if(d>9)d-=9;} sum+=d; alt=!alt;
  }
  return sum%10===0;
}

function detectScheme(digits){
  for(const s of SCHEMES){ if(s.rx.test(digits)) return s; }
  return null;
}

function lookup(){
  const raw=$('#bin-input').value.replace(/\D/g,'');
  const res=$('#result'); const st=$('#status');
  if(raw.length<6){ res.innerHTML=''; st.innerHTML=`<span style="opacity:.7">${t('enterBin')}</span>`; return; }
  const scheme=detectScheme(raw);
  const bin6=raw.slice(0,6);
  const db=BIN_DB[bin6] || BIN_DB[raw.slice(0,8)] || null;
  let note='';
  const schemeName=db?db.s:(scheme?scheme.name:t('na'));
  const schemeIcon=scheme?scheme.icon:'💳';
  const country=db?COUNTRY[db.c]||db.c:(t('na'));
  const bank=db?db.b:(t('na'));
  if(!db) note=`<div style="margin-top:10px;font-size:.82em;opacity:.7">${t('noMatch')}</div>`;
  const fullLuhn = raw.length>=12 ? `<span class="${luhn(raw)?'status-ok':'status-bad'}">${luhn(raw)?t('valid'):t('invalid')}</span>` : `<span style="opacity:.6">${t('na')}</span>`;

  st.innerHTML='';
  res.innerHTML = `
    <div class="bin-card">
      <div class="scheme-badge" style="margin-bottom:6px">${schemeIcon} ${schemeName}</div>
      <div class="bin-row"><span class="k">${t('scheme')}</span><span class="v">${schemeName}</span></div>
      <div class="bin-row"><span class="k">${t('bank')}</span><span class="v">${bank}</span></div>
      <div class="bin-row"><span class="k">${t('country')}</span><span class="v">${country}</span></div>
      <div class="bin-row"><span class="k">BIN (6)</span><span class="v" style="font-family:monospace">${bin6}</span></div>
      <div class="bin-row"><span class="k">${t('luhnOk')}</span><span class="v">${fullLuhn}</span></div>
    </div>${note}`;
}

$('#bin-input').addEventListener('input', lookup);
