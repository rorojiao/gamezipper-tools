const { $, t } = GZ;
let currentTab = 'jsonld';

// Schema.org type definitions: required and recommended fields for Google Rich Results
const SCHEMA_DEFS = {
  'WebApplication': { required: ['name'], recommended: ['description','url','applicationCategory','operatingSystem','offers'] },
  'Article': { required: ['headline','datePublished','author'], recommended: ['image','dateModified','publisher'] },
  'NewsArticle': { required: ['headline','datePublished','dateModified','author'] , recommended: ['image','publisher'] },
  'BlogPosting': { required: ['headline','datePublished','author'], recommended: ['image','publisher'] },
  'Recipe': { required: ['name','recipeIngredient','recipeInstructions'], recommended: ['image','cookTime','prepTime','totalTime','nutrition','aggregateRating'] },
  'Product': { required: ['name'], recommended: ['image','description','brand','offers','aggregateRating','review'] },
  'Event': { required: ['name','startDate','location'], recommended: ['endDate','eventStatus','eventAttendanceMode','image','description','offers'] },
  'LocalBusiness': { required: ['name','address'], recommended: ['telephone','openingHoursSpecification','geo','image','priceRange','aggregateRating'] },
  'Organization': { required: ['name','url'], recommended: ['logo','sameAs','contactPoint','address'] },
  'FAQPage': { required: ['mainEntity'], recommended: [] },
  'HowTo': { required: ['name','step'], recommended: ['description','image','totalTime','estimatedCost','supply','tool'] },
  'BreadcrumbList': { required: ['itemListElement'], recommended: [] },
  'VideoObject': { required: ['name','uploadDate'], recommended: ['description','thumbnailUrl','contentUrl','embedUrl','duration'] },
  'Review': { required: ['itemReviewed','reviewRating','author'], recommended: ['datePublished','publisher'] },
  'Person': { required: ['name'], recommended: ['url','image','jobTitle','worksFor','sameAs'] },
  'SoftwareApplication': { required: ['name'], recommended: ['applicationCategory','operatingSystem','offers','aggregateRating'] },
  'Course': { required: ['name','description','provider'], recommended: ['image','totalTime'] },
  'JobPosting': { required: ['title','datePosted','description','hiringOrganization','jobLocation'], recommended: ['employmentType','baseSalary','validThrough'] },
  'Question': { required: ['name','acceptedAnswer'], recommended: [] },
  'AggregateRating': { required: ['ratingValue','reviewCount'], recommended: ['bestRating','worstRating'] },
};

function switchTab(tab) {
  currentTab = tab;
  $('#tab-jsonld').classList.toggle('active', tab === 'jsonld');
  $('#tab-microdata').classList.toggle('active', tab === 'microdata');
  $('#input').placeholder = tab === 'jsonld' ? t('inputJson') : t('inputMicro');
  // GZ doesn't expose lbl-in easily; set placeholder
}

function validate() {
  $('#output').innerHTML = '';
  $('#status').innerHTML = '';
  const input = $('#input').value.trim();
  if (!input) return;

  if (currentTab === 'jsonld') {
    validateJsonLd(input);
  } else {
    validateMicrodata(input);
  }
}

function validateJsonLd(input) {
  let data;
  try {
    data = JSON.parse(input);
  } catch(e) {
    renderError(t('errInvalidJson') + ': ' + e.message);
    return;
  }

  // Handle arrays
  const items = Array.isArray(data) ? data : [data];
  let allChecks = [];

  for (const item of items) {
    const checks = [];

    // Check @context
    if (!item['@context']) {
      checks.push({type:'warn', text: t('errNoContext')});
    } else {
      const ctx = String(item['@context']);
      if (ctx.includes('schema.org')) {
        checks.push({type:'pass', text: t('passContext')});
      } else {
        checks.push({type:'warn', text: 'Unexpected @context: ' + ctx});
      }
    }

    // Check @type
    const itemType = item['@type'];
    if (!itemType) {
      checks.push({type:'fail', text: t('errNoType')});
      allChecks.push({checks, schemaType: '(none)', defs: null, item: null});
      continue;
    }

    // @type can be string or array
    const types = Array.isArray(itemType) ? itemType : [itemType];
    let primaryType = types[0];
    // Strip namespace if present (e.g. schema.org/Article)
    if (primaryType.includes('/')) primaryType = primaryType.split('/').pop();

    const defs = SCHEMA_DEFS[primaryType];
    if (!defs) {
      checks.push({type:'warn', text: t('errUnknownType') + primaryType + ' (validation limited to known types)'});
    } else {
      checks.push({type:'pass', text: t('passType') + primaryType});
    }

    checks.push({type:'pass', text: t('passValid')});
    allChecks.push({checks, schemaType: primaryType, defs, item});
  }

  renderResults(allChecks);
}

function validateMicrodata(html) {
  // Simple microdata extraction: itemscope + itemprop
  const checks = [];
  try {
    const parser = new DOMParser();
    const doc = parser.parseFromString(html, 'text/html');
    const items = doc.querySelectorAll('[itemscope]');
    if (items.length === 0) {
      checks.push({type:'warn', text: 'No itemscope elements found. Microdata requires itemscope + itemprop attributes.'});
      renderResults([{checks, schemaType:'(none)', defs:null, item:null}]);
      return;
    }
    const allData = [];
    items.forEach(el => {
      const itemType = el.getAttribute('itemtype') || '';
      const typeName = itemType ? itemType.split('/').pop() : '(unknown)';
      const props = {};
      el.querySelectorAll('[itemprop]').forEach(p => {
        const name = p.getAttribute('itemprop');
        const val = p.getAttribute('content') || p.getAttribute('href') || p.textContent.trim();
        if (name) props[name] = val;
      });
      const defs = SCHEMA_DEFS[typeName];
      checks.push({type: defs ? 'pass' : 'warn', text: 'Found itemtype: ' + typeName + (defs ? ' ✓' : ' (not a validated type)')});
      allData.push({schemaType: typeName, defs, item: props});
    });
    renderResults(allData.map(d => ({checks: [], ...d})));
    // Prepend checks to first item
    if (allData.length > 0) {
      allData[0].checks = checks;
    }
    renderResults(allData.map(d => ({checks: d.checks || checks, schemaType: d.schemaType, defs: d.defs, item: d.item})));
  } catch(e) {
    renderError('Failed to parse HTML: ' + e.message);
  }
}

function renderResults(results) {
  let html = '';
  for (const r of results) {
    // Checks
    for (const c of r.checks) {
      html += `<div class="check-item check-${c.type==='pass'?'pass':c.type==='warn'?'warn':'fail'}">
        <span class="check-icon">${c.type==='pass'?'✓':c.type==='warn'?'⚠':'✗'}</span>
        <span class="check-text">${escapeHtml(c.text)}</span>
      </div>`;
    }

    if (r.defs && r.item) {
      // Summary
      const reqPresent = r.defs.required.filter(f => r.item[f] !== undefined);
      const reqMissing = r.defs.required.filter(f => r.item[f] === undefined);
      const recPresent = r.defs.recommended.filter(f => r.item[f] !== undefined);
      const recMissing = r.defs.recommended.filter(f => r.item[f] === undefined);
      const eligible = reqMissing.length === 0;

      html += `<div class="summary-box">
        <div class="summary-row"><span>📋 ${t('detectedType')}</span><strong>${escapeHtml(r.schemaType)}</strong></div>
        <div class="summary-row"><span>${t('requiredFields')}</span><span>${reqPresent.length}/${r.defs.required.length} ${t('present')}${reqMissing.length?', '+reqMissing.length+' '+t('missingRequired'):''}</span></div>
        <div class="summary-row"><span>${t('recommendedFields')}</span><span>${recPresent.length}/${r.defs.recommended.length} ${t('present')}</span></div>
        <div class="summary-row"><span>${t('richResultEligible')}</span><span style="color:${eligible?'var(--gz-success,#4ade80)':'var(--gz-danger,#ff6b6b)'};font-weight:600">${eligible?t('eligible'):t('notEligible')}</span></div>
      </div>`;

      // Required fields detail
      if (r.defs.required.length) {
        html += '<div style="margin-top:12px;font-size:.85rem;font-weight:600">Required Fields:</div><div class="prop-list">';
        for (const f of r.defs.required) {
          const has = r.item[f] !== undefined;
          html += `<div><span class="prop-name">${escapeHtml(f)}</span><span class="prop-required">${has?'✓':'✗ '+t('missingRequired')}</span></div>`;
        }
        html += '</div>';
      }
      // Recommended fields
      if (r.defs.recommended.length) {
        html += '<div style="margin-top:12px;font-size:.85rem;font-weight:600">Recommended Fields:</div><div class="prop-list">';
        for (const f of r.defs.recommended) {
          const has = r.item[f] !== undefined;
          html += `<div><span class="prop-name">${escapeHtml(f)}</span><span class="prop-recommended">${has?'✓':t('missingRequired')}</span></div>`;
        }
        html += '</div>';
      }
    }
  }
  $('#output').innerHTML = html || '<div style="padding:12px;color:var(--text2)">No issues found.</div>';
}

function renderError(msg) {
  $('#output').innerHTML = `<div class="check-item check-fail"><span class="check-icon">✗</span><span class="check-text">${escapeHtml(msg)}</span></div>`;
}

function escapeHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function loadExample() {
  switchTab('jsonld');
  $('#input').value = JSON.stringify({
    "@context": "https://schema.org",
    "@type": "FAQPage",
    "mainEntity": [{
      "@type": "Question",
      "name": "What is structured data?",
      "acceptedAnswer": { "@type": "Answer", "text": "Structured data is a standardized format for providing information about a page and classifying its content." }
    }]
  }, null, 2);
  validate();
}

function doClear() { $('#input').value = ''; $('#output').innerHTML = ''; $('#status').innerHTML = ''; }

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="validate()">${t('validate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

// Set initial placeholder
$('#input').placeholder = t('inputJson');

GZ.renderToolPage({
  category: 'dev',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',

    {icon:'✅', href:'/seo/schema-validator.html', name:'Schema Validator'},
    {icon:'👁️', href:'/seo/google-serp-preview.html', name:'SERP Preview'},
    {icon:'🗺️', href:'/seo/sitemap-generator.html', name:'Sitemap Gen'},
  ]
});
</script>
