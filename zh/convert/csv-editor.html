const { $, t, copyText } = GZ;
let grid = [], history = [], historyIdx = -1, selRow = -1, selCol = -1, hasHeaders = true;

function parseCSV(text, delim) {
  const rows = [], lines = text.split('\n');
  let current = [], field = '', inQuotes = false;
  const d = delim === '\\t' ? '\t' : delim;
  for (const line of lines) {
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (inQuotes) {
        if (c === '"' && line[i+1] === '"') { field += '"'; i++; }
        else if (c === '"') inQuotes = false;
        else field += c;
      } else {
        if (c === '"') inQuotes = true;
        else if (c === d) { current.push(field); field = ''; }
        else field += c;
      }
    }
    current.push(field); field = '';
    if (inQuotes) { field = current.pop() + '\n'; }
    else { rows.push(current); current = []; }
  }
  if (current.length) rows.push(current);
  return rows.filter(r => r.some(c => c.trim() !== ''));
}

function toCSV(rows, delim) {
  const d = delim === '\\t' ? '\t' : delim;
  return rows.map(r => r.map(c => {
    if (c.includes(d) || c.includes('"') || c.includes('\n')) return '"' + c.replace(/"/g,'""') + '"';
    return c;
  }).join(d)).join('\n');
}

function saveHistory() {
  history = history.slice(0, historyIdx + 1);
  history.push(JSON.parse(JSON.stringify(grid)));
  historyIdx = history.length - 1;
  if (history.length > 50) { history.shift(); historyIdx--; }
}

function undo() {
  if (historyIdx > 0) { historyIdx--; grid = JSON.parse(JSON.stringify(history[historyIdx])); renderTable(); }
}

function redo() {
  if (historyIdx < history.length - 1) { historyIdx++; grid = JSON.parse(JSON.stringify(history[historyIdx])); renderTable(); }
}

function renderTable() {
  const table = $('#csv-table');
  if (!grid.length) { table.innerHTML = ''; updateInfo(); return; }
  const cols = Math.max(...grid.map(r => r.length));
  grid.forEach(r => { while (r.length < cols) r.push(''); });
  let html = '<tr><th></th>';
  for (let c = 0; c < cols; c++) html += `<th>${String.fromCharCode(65 + c % 26)}${c >= 26 ? Math.floor(c/26) : ''}</th>`;
  html += '</tr>';
  for (let r = 0; r < grid.length; r++) {
    html += `<tr><td>${r + 1}</td>`;
    for (let c = 0; c < cols; c++) {
      html += `<td data-r="${r}" data-c="${c}">${escHtml(grid[r][c] || '')}</td>`;
    }
    html += '</tr>';
  }
  table.innerHTML = html;
  updateInfo();
}

function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function updateInfo() {
  const cols = grid.length ? Math.max(...grid.map(r => r.length)) : 0;
  $('#table-info').textContent = grid.length ? `${grid.length} ${t('rows')} × ${cols} ${t('cols')}` : '';
}

function loadCSV() {
  const text = $('#input').value.trim();
  if (!text) return;
  const delim = $('#delimiter-select').value;
  grid = parseCSV(text, delim);
  saveHistory();
  renderTable();
  $('#delimiter-row').style.display = 'flex';
}

function exportCSV() {
  if (!grid.length) return;
  const delim = $('#delimiter-select').value;
  const csv = toCSV(grid, delim);
  const blob = new Blob([csv], {type: 'text/csv'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'data.csv';
  a.click();
  URL.revokeObjectURL(a.href);
}

function loadExample() {
  $('#input').value = 'Name,Age,City,Occupation\nAlice,30,New York,Engineer\nBob,25,London,Designer\nCarol,35,Tokyo,Manager\nDavid,28,Paris,Developer\nEve,32,Berlin,Analyst';
  loadCSV();
}

// Cell editing
$('#csv-table').addEventListener('dblclick', e => {
  const td = e.target.closest('td[data-r]');
  if (!td) return;
  const r = +td.dataset.r, c = +td.dataset.c;
  td.classList.add('editing');
  const input = document.createElement('input');
  input.value = grid[r][c] || '';
  td.textContent = '';
  td.appendChild(input);
  input.focus();
  input.select();
  const finish = () => {
    grid[r][c] = input.value;
    td.classList.remove('editing');
    td.textContent = grid[r][c];
    saveHistory();
  };
  input.addEventListener('blur', finish);
  input.addEventListener('keydown', ev => {
    if (ev.key === 'Enter') { ev.preventDefault(); input.blur(); }
    if (ev.key === 'Escape') { input.value = grid[r][c]; input.blur(); }
    if (ev.key === 'Tab') { ev.preventDefault(); input.blur(); const nc = ev.shiftKey ? c - 1 : c + 1; if (nc >= 0 && nc < (grid[0]?.length||0)) { const ntd = $(`td[data-r="${r}"][data-c="${nc}"]`); if (ntd) ntd.dispatchEvent(new MouseEvent('dblclick',{bubbles:true})); } }
  });
});

// Context menu
let ctxR = -1, ctxC = -1;
$('#csv-table').addEventListener('contextmenu', e => {
  const td = e.target.closest('td[data-r]');
  if (!td) return;
  e.preventDefault();
  ctxR = +td.dataset.r; ctxC = +td.dataset.c;
  const menu = $('#context-menu');
  menu.style.display = 'block';
  menu.style.left = e.clientX + 'px';
  menu.style.top = e.clientY + 'px';
});
document.addEventListener('click', () => { $('#context-menu').style.display = 'none'; });
$('#context-menu').addEventListener('click', e => {
  const item = e.target.closest('[data-action]');
  if (!item) return;
  const action = item.dataset.action;
  const cols = grid[0]?.length || 0;
  switch(action) {
    case 'insert-row-above': grid.splice(ctxR, 0, new Array(cols).fill('')); break;
    case 'insert-row-below': grid.splice(ctxR + 1, 0, new Array(cols).fill('')); break;
    case 'insert-col-left': grid.forEach(r => r.splice(ctxC, 0, '')); break;
    case 'insert-col-right': grid.forEach(r => r.splice(ctxC + 1, 0, '')); break;
    case 'delete-row': if (grid.length > 1) grid.splice(ctxR, 1); break;
    case 'delete-col': if (cols > 1) grid.forEach(r => r.splice(ctxC, 1)); break;
    case 'clear-cell': grid[ctxR][ctxC] = ''; break;
    case 'add-row': grid.push(new Array(cols).fill('')); break;
  }
  saveHistory();
  renderTable();
});

// Search
let searchMatches = [], searchIdx = -1;
function doSearch(dir) {
  const q = $('#search-input').value.toLowerCase();
  if (!q || !grid.length) return;
  searchMatches = [];
  for (let r = 0; r < grid.length; r++)
    for (let c = 0; c < grid[r].length; c++)
      if (grid[r][c].toLowerCase().includes(q)) searchMatches.push([r, c]);
  $('#search-count').textContent = searchMatches.length ? `${searchMatches.length} found` : '0 found';
  if (searchMatches.length) {
    if (dir === 0) searchIdx = 0;
    else searchIdx = (searchIdx + (dir || 1) + searchMatches.length) % searchMatches.length;
    const [r, c] = searchMatches[searchIdx];
    const td = $(`td[data-r="${r}"][data-c="${c}"]`);
    if (td) { td.scrollIntoView({block:'center'}); td.style.background = 'var(--accent)'; td.style.color = '#fff'; setTimeout(() => { td.style.background = ''; td.style.color = ''; }, 1500); }
  }
}

// Find & Replace
function doReplace(all) {
  const find = $('#find-input').value, repl = $('#replace-input').value;
  if (!find || !grid.length) return;
  let count = 0;
  for (let r = 0; r < grid.length; r++)
    for (let c = 0; c < grid[r].length; c++) {
      if (grid[r][c].includes(find)) { if (all) { grid[r][c] = grid[r][c].replaceAll(find, repl); count++; } else { grid[r][c] = grid[r][c].replace(find, repl); count++; if (!all) break; } }
      if (!all && count) break;
    }
  if (count) { saveHistory(); renderTable(); }
}

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'z') { e.preventDefault(); undo(); }
  if ((e.ctrlKey || e.metaKey) && e.key === 'y') { e.preventDefault(); redo(); }
  if ((e.ctrlKey || e.metaKey) && e.key === 'f') { e.preventDefault(); $('#search-bar').classList.add('active'); $('#search-input').focus(); }
  if ((e.ctrlKey || e.metaKey) && e.key === 'h') { e.preventDefault(); $('#find-replace-bar').classList.add('active'); $('#find-input').focus(); }
});

  <button class="gz-btn gz-btn-secondary" onclick="grid.push(new Array(grid[0]?.length||1).fill(''));saveHistory();renderTable()">${t('addRow')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="grid.forEach(r=>r.push(''));saveHistory();renderTable()">${t('addCol')}</button>
`;
