    paragraphs: '包裹 <p> 标签',
    linebreaks: '转换换行为 <br>',
    boldItalic: '转换 *粗体* 和 _斜体_',
    autoLinks: '自动链接 URL',
    detectLists: '检测列表（- 或 * 项目）',
    fullPage: '完整 HTML 页面',
    step1: '在输入区粘贴纯文本',
    step2: '选择格式化选项',
    step3: '点击「转换」生成 HTML 代码',
    step4: '复制 HTML 或预览结果',

const { $, copyText, t } = GZ;
let opts = { paragraphs: true, linebreaks: false, boldItalic: true, autoLinks: true, detectLists: true, fullPage: false };

function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function textToHtml(text) {
  if (!text.trim()) return '';
  let html = text;

  // Split into blocks by double newlines
  let blocks = html.split(/\n{2,}/);
  let result = [];

  for (let block of blocks) {
    block = block.trim();
    if (!block) continue;

    let lines = block.split('\n');

    // Detect list block
    if (opts.detectLists && lines.every(l => /^[\s]*[-*•]\s/.test(l))) {
      let items = lines.map(l => {
        let item = l.replace(/^[\s]*[-*•]\s+/, '');
        item = applyInline(item);
        return `  <li>${item}</li>`;
      }).join('\n');
      result.push(`<ul>\n${items}\n</ul>`);
      continue;
    }

    // Detect numbered list
    if (opts.detectLists && lines.every(l => /^[\s]*\d+[.)]\s/.test(l))) {
      let items = lines.map(l => {
        let item = l.replace(/^[\s]*\d+[.)]\s+/, '');
        item = applyInline(item);
        return `  <li>${item}</li>`;
      }).join('\n');
      result.push(`<ol>\n${items}\n</ol>`);
      continue;
    }

    // Regular paragraph
    let content = lines.map(l => applyInline(l)).join(opts.linebreaks ? '<br>\n' : '\n');
    if (opts.paragraphs) {
      result.push(`<p>${content}</p>`);
    } else {
      result.push(content);
    }
  }

  let output = result.join('\n\n');

  if (opts.fullPage) {
    output = `<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Converted Document</title>
  <style>body{font-family:system-ui,sans-serif;max-width:720px;margin:40px auto;padding:0 20px;line-height:1.6;color:#333}</style>
</head>
<body>
${output}
</body>
</html>`;
  }

  return output;
}

function applyInline(text) {
  let s = esc(text);
  if (opts.boldItalic) {
    s = s.replace(/\*([^*]+)\*/g, '<strong>$1</strong>');
    s = s.replace(/_([^_]+)_/g, '<em>$1</em>');
  }
  if (opts.autoLinks) {
    s = s.replace(/(https?:\/\/[^\s<>&"]+)/g, '<a href="$1">$1</a>');
  }
  return s;
}

function doConvert() {
  const text = $('#input').value;
  if (!text.trim()) return;
  const html = textToHtml(text);
  $('#output').textContent = html;
  $('#preview').innerHTML = html;
  $('#preview-label').textContent = t('previewLabel');
}

function loadExample() {
  $('#input').value = `Welcome to My Website

This is a *simple example* of text that will be converted to HTML. You can use _italic text_ and *bold text* to emphasize important points.

Key Features

- Convert plain text to HTML paragraphs
- Auto-detect lists and format them
- Link URLs automatically like https://example.com
- Support for *bold* and _italic_ markup

1. First numbered item
2. Second numbered item
3. Third numbered item

Thank you for trying this tool!`;
  doConvert();
}

function doClear() {
  $('#input').value = '';
  $('#output').textContent = '';
  $('#preview').innerHTML = '';
  $('#preview-label').textContent = '';
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="doConvert()">${t('convert')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <label class="gz-check"><input type="checkbox" checked onchange="opts.paragraphs=this.checked;doConvert()"> ${t('paragraphs')}</label>
  <label class="gz-check"><input type="checkbox" onchange="opts.linebreaks=this.checked;doConvert()"> ${t('linebreaks')}</label>
  <label class="gz-check"><input type="checkbox" checked onchange="opts.boldItalic=this.checked;doConvert()"> ${t('boldItalic')}</label>
  <label class="gz-check"><input type="checkbox" checked onchange="opts.autoLinks=this.checked;doConvert()"> ${t('autoLinks')}</label>
  <label class="gz-check"><input type="checkbox" checked onchange="opts.detectLists=this.checked;doConvert()"> ${t('detectLists')}</label>
  <label class="gz-check"><input type="checkbox" onchange="opts.fullPage=this.checked;doConvert()"> ${t('fullPage')}</label>
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;
