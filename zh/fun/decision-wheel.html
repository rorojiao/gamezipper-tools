<script>
GZI18n.register({
  en: {
    toolTitle: 'Decision Wheel Spinner',
    toolDesc: 'Spin a customizable wheel to randomly pick an option. Add entries, set weights, and use it for giveaways, decisions, classroom picks and games.',
    lblList: 'Entries (one per line, optional weight: name:weight)',
    hint: 'Tip: use "Pizza:3" to give Pizza 3x the chance. Default weight is 1.',
    spin: 'Spin',
    reset: 'Reset',
    shuffle: 'Shuffle',
    remove: 'Remove Winner',
    entries: 'Entries',
    total: 'Total spins',
    step1: 'Add or edit the list of options, one per line',
    step2: 'Optionally add weights using "name:weight" syntax',
    step3: 'Click the center button or Spin to start the wheel',
    step4: 'The chosen option is highlighted and shown in a popup',
    winTitle: 'Winner',
    winClose: 'Spin Again',
  },
  zh: {
    toolTitle: '在线转盘选择器',
    toolDesc: '旋转可定制的转盘随机选择一项。可添加条目、设置权重，用于抽奖、决策、课堂点名和游戏。',
    lblList: '选项（每行一项，可选权重：名称:权重）',
    hint: '提示：使用 "披萨:3" 让披萨有 3 倍被抽中的概率，默认权重为 1。',
    spin: '开始旋转',
    reset: '重置',
    shuffle: '打乱顺序',
    remove: '移除胜者',
    entries: '选项数',
    total: '旋转次数',
    step1: '添加或编辑选项列表，每行一项',
    step2: '可使用 "名称:权重" 语法设置权重',
    step3: '点击中心按钮或「开始旋转」启动转盘',
    step4: '抽中的选项会高亮并弹窗显示',
    winTitle: '赢家',
    winClose: '再转一次',
  }
});

const { $, t } = GZ;
const COLORS = ['#6c5ce7','#a855f7','#10b981','#f59e0b','#ef4444','#3b82f6','#ec4899','#14b8a6','#f97316','#8b5cf6','#06b6d4','#84cc16','#eab308','#d946ef','#f43f5e','#22c55e'];
let items = [];
let rotation = 0;
let spinning = false;
let spins = 0;
let lastWinner = null;

function parseEntries() {
  const lines = $('#entries').value.split('\n').map(s => s.trim()).filter(Boolean);
  return lines.map(line => {
    const m = line.match(/^(.+?):(\d+(?:\.\d+)?)$/);
    if (m) return { name: m[1].trim(), weight: Math.max(0.01, parseFloat(m[2])) };
    return { name: line, weight: 1 };
  });
}

function drawWheel() {
  const c = $('#canvas');
  const ctx = c.getContext('2d');
  const w = c.width, h = c.height;
  const cx = w/2, cy = h/2, r = Math.min(cx,cy) - 4;
  ctx.clearRect(0,0,w,h);
  if (!items.length) {
    ctx.fillStyle = 'rgba(255,255,255,0.05)';
    ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = '#94a3b8';
    ctx.font = 'bold 18px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('Add entries ↓', cx, cy);
    return;
  }
  const total = items.reduce((s,it) => s+it.weight, 0);
  let start = -Math.PI/2;
  items.forEach((it, i) => {
    const angle = (it.weight/total) * Math.PI*2;
    const end = start + angle;
    ctx.beginPath();
    ctx.moveTo(cx,cy);
    ctx.arc(cx,cy,r,start,end);
    ctx.closePath();
    ctx.fillStyle = COLORS[i % COLORS.length];
    ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,0.25)';
    ctx.lineWidth = 1.5;
    ctx.stroke();
    // text
    const mid = (start+end)/2;
    const tx = cx + (r*0.65) * Math.cos(mid);
    const ty = cy + (r*0.65) * Math.sin(mid);
    ctx.save();
    ctx.translate(tx,ty);
    ctx.rotate(mid + Math.PI/2);
    ctx.textAlign = 'center';
    ctx.fillStyle = '#fff';
    const fs = Math.max(10, Math.min(16, 80 / items.length));
    ctx.font = `bold ${fs}px sans-serif`;
    const label = it.name.length > 14 ? it.name.slice(0,13)+'…' : it.name;
    ctx.fillText(label, 0, 0);
    ctx.restore();
    start = end;
  });
  // Outer ring
  ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2);
  ctx.strokeStyle = '#ffd93d'; ctx.lineWidth = 4; ctx.stroke();
}

function spin() {
  if (spinning || !items.length) return;
  spinning = true;
  $('#center').classList.add('spinning');
  $('#center').textContent = '…';
  $('#result').textContent = '…';
  const total = items.reduce((s,it) => s+it.weight, 0);
  const rand = Math.random() * total;
  let acc = 0, pickedIdx = 0;
  for (let i = 0; i < items.length; i++) {
    acc += items[i].weight;
    if (rand <= acc) { pickedIdx = i; break; }
  }
  // Compute target rotation: we want slice center to stop at top (-90deg / -PI/2)
  // Canvas pointer is at top; wheel is drawn starting at -PI/2.
  // Each slice i has cumulative angle from -PI/2.
  // Slice pickedIdx center angle: -PI/2 + sum(weights[0..pickedIdx-1])/total * 2PI + (weights[pickedIdx]/total)/2 * 2PI
  // Final canvas rotation needed (clockwise positive): targetAngle - currentSliceCenter = -PI/2 - sliceCenter + extra
  let cum = 0;
  for (let i = 0; i < pickedIdx; i++) cum += items[i].weight;
  const sliceCenterFrac = (cum + items[pickedIdx].weight/2) / total;
  const sliceCenterAngle = -Math.PI/2 + sliceCenterFrac * Math.PI*2;
  // We need to rotate the canvas so sliceCenter ends at -PI/2 (top).
  // We add full turns for dramatic spin, then add a random small offset.
  const extra = (Math.random() - 0.5) * (items[pickedIdx].weight/total) * Math.PI*2 * 0.8;
  const finalAngle = -sliceCenterAngle + extra;
  const spins_count = 5 + Math.floor(Math.random()*3);
  const newRotation = rotation + spins_count * Math.PI*2 + finalAngle - (rotation % (Math.PI*2));
  const c = $('#canvas');
  const start = performance.now();
  const duration = 4200;
  const startRot = rotation;
  function frame(t) {
    const elapsed = t - start;
    const p = Math.min(1, elapsed/duration);
    const eased = 1 - Math.pow(1-p, 4);
    const cur = startRot + (newRotation - startRot) * eased;
    c.style.transform = `rotate(${cur}rad)`;
    if (p < 1) requestAnimationFrame(frame);
    else {
      rotation = newRotation;
      spinning = false;
      $('#center').classList.remove('spinning');
      $('#center').textContent = 'SPIN';
      const winner = items[pickedIdx];
      lastWinner = winner;
      spins++;
      $('#result').textContent = '🎉 ' + winner.name;
      updateStats();
      $('#win-pick').textContent = winner.name;
      $('#overlay').classList.add('show');
    }
  }
  requestAnimationFrame(frame);
}

function updateStats() {
  $('#stats').innerHTML = `<span>${t('entries')}: <b>${items.length}</b></span><span>${t('total')}: <b>${spins}</b></span>`;
}

function shuffle() {
  for (let i = items.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [items[i],items[j]] = [items[j],items[i]];
  }
  $('#entries').value = items.map(it => it.weight===1 ? it.name : `${it.name}:${it.weight}`).join('\n');
  drawWheel();
}

function reset() {
  items = []; rotation = 0; spins = 0; lastWinner = null;
  $('#canvas').style.transform = 'rotate(0rad)';
  $('#entries').value = 'Pizza\nBurger\nSushi\nTacos\nSalad\nPasta';
  rebuildFromTextarea();
  $('#result').textContent = '…';
  updateStats();
}

function rebuildFromTextarea() {
  items = parseEntries();
  drawWheel();
  updateStats();
}

function removeWinner() {
  if (!lastWinner) return;
  const idx = items.findIndex(it => it.name === lastWinner.name);
  if (idx >= 0) {
    items.splice(idx, 1);
    $('#entries').value = items.map(it => it.weight===1 ? it.name : `${it.name}:${it.weight}`).join('\n');
    drawWheel();
    updateStats();
    showToast('✓ removed');
  }
  lastWinner = null;
  $('#result').textContent = '…';
}

$('#lbl-list').textContent = t('lblList');
$('#hint').textContent = t('hint');
$('#win-title').textContent = t('winTitle');
$('#win-close').textContent = t('winClose');

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="spin()">${t('spin')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="removeWinner()">${t('remove')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="shuffle()">${t('shuffle')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="reset()">${t('reset')}</button>`;

$('#center').addEventListener('click', spin);
$('#entries').addEventListener('input', rebuildFromTextarea);
$('#win-close').addEventListener('click', () => { $('#overlay').classList.remove('show'); });
$('#overlay').addEventListener('click', e => { if (e.target.id==='overlay') $('#overlay').classList.remove('show'); });

$('#entries').value = 'Pizza\nBurger\nSushi\nTacos\nSalad\nPasta';
rebuildFromTextarea();
updateStats();

GZ.renderToolPage({
  category: 'fun',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🎲', href:'/fun/quote-generator.html', name:'Quote Generator'},
    {icon:'🎲', href:'/convert/randomizer.html', name:'Random Picker'},
    {icon:'⚡', href:'/fun/reaction-time.html', name:'Reaction Time'},
    {icon:'⌨️', href:'/fun/typing-test.html', name:'Typing Test'},
  ]
});
</script>
