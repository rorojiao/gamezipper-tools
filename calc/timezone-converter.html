const { $, t } = GZ;

const POPULAR = [
  {zone:'UTC',label:'UTC (Coordinated Universal Time)'},
  {zone:'America/New_York',label:'New York (EST/EDT)'},
  {zone:'America/Los_Angeles',label:'Los Angeles (PST/PDT)'},
  {zone:'America/Chicago',label:'Chicago (CST/CDT)'},
  {zone:'America/Denver',label:'Denver (MST/MDT)'},
  {zone:'America/Toronto',label:'Toronto'},
  {zone:'America/Mexico_City',label:'Mexico City'},
  {zone:'America/Sao_Paulo',label:'São Paulo'},
  {zone:'America/Argentina/Buenos_Aires',label:'Buenos Aires'},
  {zone:'Europe/London',label:'London (GMT/BST)'},
  {zone:'Europe/Paris',label:'Paris (CET/CEST)'},
  {zone:'Europe/Berlin',label:'Berlin'},
  {zone:'Europe/Madrid',label:'Madrid'},
  {zone:'Europe/Moscow',label:'Moscow'},
  {zone:'Europe/Istanbul',label:'Istanbul'},
  {zone:'Africa/Cairo',label:'Cairo'},
  {zone:'Africa/Johannesburg',label:'Johannesburg'},
  {zone:'Africa/Lagos',label:'Lagos'},
  {zone:'Asia/Dubai',label:'Dubai'},
  {zone:'Asia/Tehran',label:'Tehran'},
  {zone:'Asia/Karachi',label:'Karachi'},
  {zone:'Asia/Kolkata',label:'New Delhi (IST)'},
  {zone:'Asia/Dhaka',label:'Dhaka'},
  {zone:'Asia/Bangkok',label:'Bangkok'},
  {zone:'Asia/Jakarta',label:'Jakarta'},
  {zone:'Asia/Shanghai',label:'Shanghai / Beijing (CST)'},
  {zone:'Asia/Hong_Kong',label:'Hong Kong'},
  {zone:'Asia/Taipei',label:'Taipei'},
  {zone:'Asia/Singapore',label:'Singapore'},
  {zone:'Asia/Seoul',label:'Seoul (KST)'},
  {zone:'Asia/Tokyo',label:'Tokyo (JST)'},
  {zone:'Australia/Sydney',label:'Sydney (AEDT/AEST)'},
  {zone:'Australia/Perth',label:'Perth (AWST)'},
  {zone:'Pacific/Auckland',label:'Auckland (NZST/NZDT)'},
  {zone:'Pacific/Honolulu',label:'Honolulu (HST)'},
];

function buildZoneOptions(sel) {
  const grouped = {};
  POPULAR.forEach(z => { grouped['★ Popular'] = grouped['★ Popular']||[]; grouped['★ Popular'].push(z); });
  // Full IANA list (if supported)
  let allZones = [];
  try { allZones = Intl.supportedValuesOf('timeZone'); } catch(e) {}
  allZones.forEach(z => { const region = z.split('/')[0]; grouped[region] = grouped[region]||[]; grouped[region].push({zone:z,label:z.replace(/_/g,' ')}); });
  let html = '';
  Object.keys(grouped).sort().forEach(region => {
    html += `<optgroup label="${region}">`;
    grouped[region].forEach(z => { html += `<option value="${z.zone}">${z.label} — ${z.zone}</option>`; });
    html += '</optgroup>';
  });
  sel.innerHTML = html;
}

function localTZ() {
  try { return Intl.DateTimeFormat().resolvedOptions().timeZone || 'UTC'; } catch(e) { return 'UTC'; }
}

function setNow() {
  const now = new Date();
  // Build value for datetime-local in the FROM zone
  const fromZone = $('#fromZone').value;
  const parts = new Intl.DateTimeFormat('en-CA', { timeZone: fromZone, year:'numeric', month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit', hour12:false }).formatToParts(now);
  const get = type => (parts.find(p=>p.type===type)||{}).value || '';
  const val = `${get('year')}-${get('month')}-${get('day')}T${get('hour')}:${get('minute')}`;
  $('#dt').value = val;
  convert();
}

function parseInZone(dtStr, zone) {
  // dtStr "YYYY-MM-DDTHH:MM" represents wall-clock time in `zone`.
  // Strategy: find UTC offset for that date by guessing and comparing.
  const [datePart, timePart] = dtStr.split('T');
  const [y,mo,d] = datePart.split('-').map(Number);
  const [h,mi] = timePart.split(':').map(Number);
  // Compute timestamp assuming zone is UTC first
  const base = Date.UTC(y, mo-1, d, h, mi, 0);
  // Find the offset the zone has at that instant (approximation)
  const probe = new Date(base);
  const fmt = new Intl.DateTimeFormat('en-US', { timeZone: zone, year:'numeric', month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit', hour12:false, timeZoneName:'shortOffset' });
  let offsetMin = 0;
  try {
    const p = fmt.formatToParts(probe);
    const tzName = (p.find(x=>x.type==='timeZoneName')||{}).value || 'GMT+0';
    const m = tzName.match(/GMT([+-])(\d{1,2})(?::?(\d{2}))?/);
    if (m) offsetMin = (m[1]==='-'?-1:1)*(parseInt(m[2],10)*60 + (parseInt(m[3]||'0',10)));
  } catch(e){}
  // If the formatted wall time in zone equals input, base is correct. Otherwise shift.
  const p2 = new Intl.DateTimeFormat('en-GB', { timeZone: zone, year:'numeric', month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit', hour12:false }).formatToParts(probe);
  const get = type => (p2.find(p=>p.type===type)||{}).value || '';
  const zoneY = +get('year'), zoneMo = +get('month'), zoneD = +get('day'), zoneH = +get('hour'), zoneMi = +get('minute');
  const diffMin = (zoneY-y)*525960 + (zoneMo-mo)*43800 + (zoneD-d)*1440 + (zoneH-h)*60 + (zoneMi-mi);
  return base - diffMin*60000;
}

function fmtInZone(ts, zone, withSeconds) {
  const opts = { timeZone: zone, year:'numeric', month:'short', day:'2-digit', hour:'2-digit', minute:'2-digit', hour12:false };
  if (withSeconds) opts.second = '2-digit';
  return new Intl.DateTimeFormat('en-GB', opts).format(new Date(ts));
}

function offsetStr(ts, zone) {
  try {
    const p = new Intl.DateTimeFormat('en-US', { timeZone: zone, timeZoneName:'longOffset' }).formatToParts(new Date(ts));
    return (p.find(x=>x.type==='timeZoneName')||{}).value || '';
  } catch(e){ return ''; }
}

function convert() {
  const dtStr = $('#dt').value;
  if (!dtStr) return;
  const fromZone = $('#fromZone').value;
  const toZone = $('#toZone').value;
  const ts = parseInZone(dtStr, fromZone);
  const toTime = fmtInZone(ts, toZone, true);
  const toOff = offsetStr(ts, toZone);
  const utcTime = fmtInZone(ts, 'UTC', true);
  $('#result-box').innerHTML = `
    <div class="tz-result-row"><span>${t('to')}</span><span class="val">${toTime}</span></div>
    <div class="tz-result-row"><span>Offset</span><span class="val">${toOff}</span></div>
    <div class="tz-result-row"><span>${t('utc')}</span><span class="tz-utc">${utcTime}</span></div>`;
  renderWorldClock();
}

function swapZones() {
  const a = $('#fromZone').value, b = $('#toZone').value;
  $('#fromZone').value = b;
  $('#toZone').value = a;
  setNow();
}

function renderWorldClock() {
  const dtStr = $('#dt').value;
  const fromZone = $('#fromZone').value;
  if (!dtStr) return;
  const ts = parseInZone(dtStr, fromZone);
  const zones = ['UTC','America/Los_Angeles','America/New_York','America/Sao_Paulo','Europe/London','Europe/Paris','Europe/Moscow','Asia/Dubai','Asia/Kolkata','Asia/Shanghai','Asia/Singapore','Asia/Tokyo','Australia/Sydney','Pacific/Auckland'];
  const names = {'UTC':'UTC','America/Los_Angeles':'Los Angeles','America/New_York':'New York','America/Sao_Paulo':'São Paulo','Europe/London':'London','Europe/Paris':'Paris','Europe/Moscow':'Moscow','Asia/Dubai':'Dubai','Asia/Kolkata':'New Delhi','Asia/Shanghai':'Shanghai','Asia/Singapore':'Singapore','Asia/Tokyo':'Tokyo','Australia/Sydney':'Sydney','Pacific/Auckland':'Auckland'};
  let html = '';
  zones.forEach(z => {
    const timePart = new Intl.DateTimeFormat('en-GB',{timeZone:z,hour:'2-digit',minute:'2-digit',hour12:false}).format(new Date(ts));
    const datePart = new Intl.DateTimeFormat('en-GB',{timeZone:z,weekday:'short',day:'2-digit',month:'short'}).format(new Date(ts));
    html += `<tr><td><strong>${names[z]}</strong></td><td style="font-family:monospace;font-size:.85rem">${z}</td><td class="val" style="color:var(--accent);font-weight:700;font-family:monospace">${timePart}</td><td style="color:var(--text2)">${datePart}</td></tr>`;
  });
  $('#grid-body').innerHTML = html;
}

function updateNowLine() {
  const now = new Date();
  const local = new Intl.DateTimeFormat('en-GB',{dateStyle:'medium',timeStyle:'second',hour12:false}).format(now);
  $('#now-line').innerHTML = `🕐 ${t('now')} <strong style="font-family:monospace">${local}</strong>`;
}

// init
buildZoneOptions($('#fromZone'));
buildZoneOptions($('#toZone'));
$('#fromZone').value = localTZ();
$('#toZone').value = 'UTC';
// try to pick better default target
if (localTZ() !== 'Asia/Shanghai') $('#toZone').value = 'Asia/Shanghai';

$('#lbl-from').textContent = t('from');
$('#lbl-to').textContent = t('to');
$('#lbl-datetime').textContent = t('datetime');
$('#swap-btn').textContent = t('swap');
$('#grid-title').textContent = t('gridTitle');
$('#th-city').textContent = t('city');
$('#th-zone').textContent = t('zone');
$('#th-time').textContent = t('time');
$('#th-date').textContent = t('date');

$('#fromZone').addEventListener('change', convert);
$('#toZone').addEventListener('change', convert);
$('#dt').addEventListener('input', convert);

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="setNow()">${GZ.t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="swapZones()">${t('swap')}</button>`;

setNow();
updateNowLine();
setInterval(updateNowLine, 1000);

GZ.renderToolPage({

</script>
