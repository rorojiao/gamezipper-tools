    toolDesc: '免费在线设计精美的可打印食谱卡片。添加食谱标题、食材、分步做法、准备和烹饪时间、份量和食物照片。6 种优雅主题可选，下载 4×6 可分享 PNG — 适用于美食博客、Pinterest、Instagram 和家庭菜谱。无注册、无水印，完全浏览器本地运行。',
    download: '下载 PNG',
    lblTitle: '食谱标题', lblSource: '作者 / 来源（可选）',
    lblPrep: '准备时间', lblCook: '烹饪时间',
    lblServings: '份量 / 产出', lblTheme: '卡片主题',
    lblIngredients: '食材（每行一条）',
    lblSteps: '做法步骤（每行一步）',
    lblNotes: '备注（可选）', lblPhoto: '食物照片（可选）',
    ingredients: '食材', instructions: '做法', notes: '备注',
    prep: '准备', cook: '烹饪', yields: '产出',
    step1: '输入食谱标题、作者、准备和烹饪时间、份量',
    step2: '列出食材（每行一条）和分步做法',
    step3: '选择卡片主题，可选上传食物照片',
    step4: '点击「下载 PNG」打印或分享你的食谱卡片',

const { $, t } = GZ;

const THEMES = [
  { bg:'#fbf7f0', panel:'#ffffff', accent:'#7a9e7e', text:'#3a3226', sub:'#7a6f5d', line:'#d9cdb8', label:'#fff' },
  { bg:'#1c1c28', panel:'#262636', accent:'#e94560', text:'#f4f4f8', sub:'#a8a8c0', line:'#3a3a52', label:'#fff' },
  { bg:'#e8dcc4', panel:'#f5ecd9', accent:'#8b5a2b', text:'#4a3520', sub:'#7a5d3a', line:'#c9b894', label:'#fff' },
  { bg:'#fff0f3', panel:'#ffffff', accent:'#d6336c', text:'#5a1d3a', sub:'#a85275', line:'#f4c2d1', label:'#fff' },
  { bg:'#eaf6f1', panel:'#ffffff', accent:'#2a9d8f', text:'#1f3a36', sub:'#4f7a72', line:'#bfe3d8', label:'#fff' },
  { bg:'#fff8db', panel:'#ffffff', accent:'#f59f00', text:'#5a4500', sub:'#8a6f1a', line:'#f0d97a', label:'#fff' },
];

let photoImg = null;

function render(){
  const c=$('#canvas'),ctx=c.getContext('2d');
  c.width=1200;c.height=1800;
  const W=c.width,H=c.height;
  const th=THEMES[+$('#cardTheme').value];
  // bg
  ctx.fillStyle=th.bg; ctx.fillRect(0,0,W,H);
  // outer margin
  const M=60;
  const cardX=M, cardY=M, cardW=W-M*2, cardH=H-M*2;
  // panel
  ctx.fillStyle=th.panel;
  roundRect(ctx,cardX,cardY,cardW,cardH,28); ctx.fill();
  // panel border
  ctx.strokeStyle=th.line; ctx.lineWidth=3;
  roundRect(ctx,cardX,cardY,cardW,cardH,28); ctx.stroke();

  const innerX=cardX+50, innerW=cardW-100;
  let y=cardY+55;

  // photo (top)
  const photoH=420;
  if(photoImg){
    ctx.save();
    roundRect(ctx,innerX,y,innerW,photoH,18); ctx.clip();
    const ir=photoImg.width/photoImg.height, cr=innerW/photoH;
    let dw,dh,dx,dy;
    if(ir>cr){ dh=photoH; dw=photoH*ir; dx=innerX+(innerW-dw)/2; dy=y; }
    else { dw=innerW; dh=innerW/ir; dx=innerX; dy=y+(photoH-dh)/2; }
    ctx.drawImage(photoImg,dx,dy,dw,dh);
    ctx.restore();
    y+=photoH+30;
  } else {
    // placeholder
    ctx.fillStyle=th.bg;
    roundRect(ctx,innerX,y,innerW,photoH,18); ctx.fill();
    ctx.strokeStyle=th.line; ctx.lineWidth=2;
    ctx.setLineDash([12,10]); roundRect(ctx,innerX,y,innerW,photoH,18); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle=th.sub; ctx.font='600 36px Verdana, sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('📸  Add a photo (optional)', innerX+innerW/2, y+photoH/2);
    y+=photoH+30;
  }

  // title
  ctx.fillStyle=th.text; ctx.textAlign='center'; ctx.textBaseline='top';
  ctx.font='900 64px Georgia, serif';
  const title=$('#recipeTitle').value||'Recipe';
  wrapCenter(ctx,title,innerW,68).forEach((ln,i)=>ctx.fillText(ln,innerX+innerW/2,y+i*72));
  y+=wrapCenter(ctx,title,innerW,68).length*72+8;

  // source
  const src=$('#recipeSource').value;
  if(src){
    ctx.fillStyle=th.sub; ctx.font='italic 28px Georgia, serif';
    ctx.fillText(src, innerX+innerW/2, y);
    y+=42;
  }

  // accent divider
  y+=8;
  ctx.strokeStyle=th.accent; ctx.lineWidth=4;
  ctx.beginPath(); ctx.moveTo(innerX+innerW/2-80,y); ctx.lineTo(innerX+innerW/2+80,y); ctx.stroke();
  // little diamond
  ctx.fillStyle=th.accent;
  ctx.save(); ctx.translate(innerX+innerW/2,y); ctx.rotate(Math.PI/4);
  ctx.fillRect(-7,-7,14,14); ctx.restore();
  y+=30;

  // meta strip: prep / cook / yields
  const metaY=y;
  const metaH=110;
  ctx.fillStyle=th.accent;
  roundRect(ctx,innerX,metaY,innerW,metaH,14); ctx.fill();
  const metas=[
    {l:t('prep'),v:$('#prepTime').value},
    {l:t('cook'),v:$('#cookTime').value},
    {l:t('yields'),v:$('#servings').value},
  ];
  const segW=innerW/3;
  metas.forEach((m,i)=>{
    const sx=innerX+segW*i+segW/2;
    ctx.fillStyle=th.label; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.font='700 22px Verdana, sans-serif';
    ctx.fillText(m.l.toUpperCase(), sx, metaY+metaH/2-22);
    ctx.font='700 32px Georgia, serif';
    ctx.fillText(m.v, sx, metaY+metaH/2+18);
    if(i<2){
      ctx.strokeStyle='rgba(255,255,255,0.35)'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.moveTo(innerX+segW*(i+1),metaY+20); ctx.lineTo(innerX+segW*(i+1),metaY+metaH-20); ctx.stroke();
    }
  });
  y=metaY+metaH+34;

  // two-column body
  const colGap=40;
  const colW=(innerW-colGap)/2;
  const bodyTop=y;
  // ingredients column
  drawSectionTitle(ctx,t('ingredients'),innerX,bodyTop,colW,th);
  const ingList=$('#ingredients').value.split('\n').map(s=>s.trim()).filter(Boolean);
  let iy=bodyTop+58;
  ctx.fillStyle=th.text; ctx.font='400 26px Verdana, sans-serif'; ctx.textAlign='left'; ctx.textBaseline='top';
  ingList.forEach(item=>{
    const lines=wrapLeft(ctx,'•  '+item,colW-20,26);
    lines.forEach(ln=>{ ctx.fillText(ln,innerX+6,iy); iy+=34; });
    iy+=4;
  });

  // instructions column
  const col2X=innerX+colW+colGap;
  drawSectionTitle(ctx,t('instructions'),col2X,bodyTop,colW,th);
  const stepList=$('#steps').value.split('\n').map(s=>s.trim()).filter(Boolean);
  let sy=bodyTop+58;
  ctx.textAlign='left'; ctx.textBaseline='top';
  stepList.forEach((s,i)=>{
    // numbered circle
    ctx.fillStyle=th.accent;
    ctx.beginPath(); ctx.arc(col2X+18,sy+16,17,0,Math.PI*2); ctx.fill();
    ctx.fillStyle=th.label; ctx.font='700 22px Verdana, sans-serif'; ctx.textAlign='center';
    ctx.fillText(String(i+1), col2X+18, sy+4);
    ctx.textAlign='left';
    ctx.fillStyle=th.text; ctx.font='400 25px Verdana, sans-serif';
    const lines=wrapLeft(ctx,s,colW-50,25);
    lines.forEach((ln,j)=>{ ctx.fillText(ln,col2X+44,sy+j*32); });
    sy+=Math.max(34,lines.length*32+8);
  });

  y=Math.max(iy,sy)+20;

  // notes
  const notes=$('#notes').value;
  if(notes){
    ctx.fillStyle=th.bg; 
    roundRect(ctx,innerX,y,innerW,90,12); ctx.fill();
    ctx.fillStyle=th.accent; ctx.font='700 22px Verdana, sans-serif'; ctx.textAlign='left'; ctx.textBaseline='top';
    ctx.fillText('★ '+t('notes').toUpperCase(), innerX+20, y+16);
    ctx.fillStyle=th.text; ctx.font='italic 26px Georgia, serif';
    ctx.fillText(notes, innerX+20, y+48);
  }
}

function drawSectionTitle(ctx,label,x,y,w,th){
  ctx.fillStyle=th.accent; ctx.font='700 30px Georgia, serif';
  ctx.textAlign='left'; ctx.textBaseline='top';
  ctx.fillText(label, x, y);
  ctx.strokeStyle=th.line; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(x,y+44); ctx.lineTo(x+w,y+44); ctx.stroke();
}
function wrapCenter(ctx,text,maxW,fs){
  ctx.font='900 '+fs+'px Georgia, serif';
  const words=text.split(' ');let line='';const lines=[];
  for(const w of words){const test=line?line+' '+w:w;if(ctx.measureText(test).width>maxW&&line){lines.push(line);line=w}else line=test}
  if(line)lines.push(line);
  return lines;
}
function wrapLeft(ctx,text,maxW,fs){
  ctx.font='400 '+fs+'px Verdana, sans-serif';
  const words=text.split(' ');let line='';const lines=[];
  for(const w of words){const test=line?line+' '+w:w;if(ctx.measureText(test).width>maxW&&line){lines.push(line);line=w}else line=test}
  if(line)lines.push(line);
  return lines;
}
function roundRect(ctx,x,y,w,h,r){
  r=Math.min(r,w/2,h/2);
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);
  ctx.arcTo(x,y,x+w,y,r);
  ctx.closePath();
}

function downloadPNG(){
  const link=document.createElement('a');
  const name=($('#recipeTitle').value||'recipe').replace(/[^a-zA-Z0-9]/g,'_').toLowerCase()||'recipe';
  link.download=name+'-recipe-card.png';
  link.href=$('#canvas').toDataURL('image/png');
  link.click();
}

function handlePhoto(e){
  const file=e.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=ev=>{
    const img=new Image();
    img.onload=()=>{ photoImg=img; render(); };
    img.src=ev.target.result;
  };
  reader.readAsDataURL(file);
}

$('#lbl-title').textContent=t('lblTitle');
$('#lbl-source').textContent=t('lblSource');
$('#lbl-prep').textContent=t('lblPrep');
$('#lbl-cook').textContent=t('lblCook');
$('#lbl-servings').textContent=t('lblServings');
$('#lbl-theme').textContent=t('lblTheme');
$('#lbl-ingredients').textContent=t('lblIngredients');
$('#lbl-steps').textContent=t('lblSteps');
$('#lbl-notes').textContent=t('lblNotes');
$('#lbl-photo').textContent=t('lblPhoto');

['recipeTitle','recipeSource','prepTime','cookTime','servings','ingredients','steps','notes'].forEach(id=>$('#'+id).addEventListener('input',render));
$('#cardTheme').addEventListener('change',render);
$('#photo').addEventListener('change',handlePhoto);

render();

$('#toolbar').innerHTML=`
  <button class="gz-btn" onclick="downloadPNG()">⬇️ ${t('download')}</button>`;

GZ.renderToolPage({

  titleKey: 'toolTitle',

  howToSteps: ['step1','step2','step3','step4'],

    {icon:'🖼️', href:'/image/poster-maker.html', name:'Poster Maker'},
    {icon:'🎂', href:'/image/birthday-card.html', name:'Birthday Card Maker'},
    {icon:'💌', href:'/image/invitation-maker.html', name:'Invitation Maker'},
  ]
});
</script>
