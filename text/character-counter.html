  </div>

    <textarea id="input" rows="10" spellcheck="false" style="width:100%" placeholder=""></textarea>

  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Character Counter',
    toolDesc: 'Count characters, words, sentences and paragraphs live as you type — plus reading and speaking time. Free, instant, private.',
    ph: 'Type or paste your text here — counts update live…',
    chars: 'Characters',
    charsNoSpace: 'Chars (no spaces)',
    words: 'Words',
    sentences: 'Sentences',
    paragraphs: 'Paragraphs',
    lines: 'Lines',
    readingTime: 'Reading time',
    speakingTime: 'Speaking time',
    step1: 'Type or paste your text into the box above',
    step2: 'Watch the live counts update instantly — no button needed',
    step3: 'Check the platform limits (Twitter, SMS, meta description)',
    step4: 'Use Clear to start over',
    limits: 'Platform limits',
    twitterLimit: 'X / Twitter post',
    smsLimit: 'SMS message',
    metaLimit: 'Meta description',
    titleLimit: 'SEO title tag',
    fbAdLimit: 'Facebook ad headline',
    gdAdLimit: 'Google ad headline',
  },
  zh: {
    toolTitle: '字符计数器',
    toolDesc: '输入即实时统计字符数、单词数、句子数和段落数，并估算阅读和朗读时间。免费、即时、私密。',
    ph: '在此输入或粘贴文本 — 计数实时更新…',
    chars: '字符数',
    charsNoSpace: '字符(不含空格)',
    words: '单词数',
    sentences: '句子数',
    paragraphs: '段落数',
    lines: '行数',
    readingTime: '阅读时间',
    speakingTime: '朗读时间',
    step1: '在上方输入框输入或粘贴文本',
    step2: '查看实时更新的计数 — 无需点击按钮',
    step3: '对照各平台限制（Twitter、短信、meta description）',
    step4: '点击「清空」重新开始',
    limits: '平台字符限制',
    twitterLimit: 'X / Twitter 推文',
    smsLimit: '短信',
    metaLimit: 'Meta description',
    titleLimit: 'SEO 标题标签',
    fbAdLimit: 'Facebook 广告标题',
    gdAdLimit: 'Google 广告标题',
  }
});

const { $, copyText, t } = GZ;

const LIMITS = [
  { key: 'twitterLimit', max: 280 },
  { key: 'smsLimit', max: 160 },
  { key: 'metaLimit', max: 160 },
  { key: 'titleLimit', max: 60 },
  { key: 'fbAdLimit', max: 40 },
  { key: 'gdAdLimit', max: 30 },
];

function fmtTime(seconds) {
  if (seconds < 1) return '< 1s';
  if (seconds < 60) return Math.round(seconds) + 's';
  const m = Math.floor(seconds / 60);
  const s = Math.round(seconds % 60);
  return m + 'm ' + s + 's';
}

function recalc() {
  const text = $('#input').value;
  const chars = text.length;
  const charsNoSpace = text.replace(/\s/g, '').length;
  const words = (text.trim().match(/\S+/g) || []).length;
  const sentences = (text.match(/[^.!?…]+[.!?…]+/g) || []).length + ((text.trim() && !/[.!?…]$/.test(text.trim())) ? 1 : 0);
  const paragraphs = (text.split(/\n\s*\n/).filter(p => p.trim()).length);
  const lines = text === '' ? 0 : text.split(/\n/).length;
  const readingSec = words / 225 * 60;
  const speakingSec = words / 140 * 60;

  $('#stats').innerHTML = [
    ['chars', chars],
    ['charsNoSpace', charsNoSpace],
    ['words', words],
    ['sentences', sentences],
    ['paragraphs', paragraphs],
    ['lines', lines],
    ['readingTime', fmtTime(readingSec)],
    ['speakingTime', fmtTime(speakingSec)],
  ].map(([k, v]) => `<div class="stat-card"><div class="num">${v}</div><div class="lab">${t(k)}</div></div>`).join('');

  $('#limits').innerHTML = '<div style="margin-bottom:8px;font-weight:600">' + t('limits') + '</div>' +
    LIMITS.map(L => {
      const pct = Math.min(100, (chars / L.max) * 100);
      const over = chars > L.max;
      return `<div class="lrow">
        <div class="nm">${t(L.key)}</div>
        <div class="bar${over ? ' over' : ''}"><div style="width:${pct}%"></div></div>
        <div class="pct">${chars}/${L.max}</div>
      </div>`;
    }).join('');
}

$('#input').placeholder = t('ph');
$('#input').addEventListener('input', recalc);

$('#toolbar').innerHTML = `
  <button class="gz-btn gz-btn-secondary" onclick="GZ.copyText($('#input').value)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#input').value='';recalc()">${t('clear')}</button>`;

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🔢', href:'/text/word-counter.html', name:'Word Counter'},
    {icon:'🔤', href:'/text/letter-counter.html', name:'Letter Counter'},
    {icon:'🐦', href:'/text/twitter-counter.html', name:'X / Twitter Counter'},
    {icon:'📝', href:'/text/words-to-pages.html', name:'Words to Pages'},
  ]
});
recalc();
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
