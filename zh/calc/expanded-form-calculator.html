<script>
GZI18n.register({
  en: {
    toolTitle: 'Expanded Form Calculator',
    toolDesc: 'Break any number into expanded form — 1234 becomes 1000 + 200 + 30 + 4. Supports decimals and large numbers. Free, instant, private.',

    step4: 'Great for homework, teaching place value, and number sense',
  },
  zh: {
    toolTitle: '数的展开式计算器',
    toolDesc: '将任何数字拆分为展开式 — 1234 变为 1000 + 200 + 30 + 4。支持小数和大数。免费、即时、隐私安全。',
    standard: '展开式',
    notation: '展开记数法',
    frac: '分数形式',
    chips: '每个数字的值',
    step1: '在输入框中输入或粘贴任意数字（如 4256.78）',
    step2: '展开式立即显示每个数字的值',
    step3: '查看展开记数法、分数形式和数字块',
    step4: '非常适合作业、教授数位和培养数字感',
  }
});

const { $, t } = GZ;
const SUB = ['₀','₁','₂','₃','₄','₅','₆','₇','₈','₉'];

function toSub(n) {
  return String(n).split('').map(d => d === '-' ? '₋' : SUB[+d] || d).join('');
}

function expand(numStr) {
  const neg = numStr.startsWith('-');
  const body = neg ? numStr.slice(1) : numStr;
  const [intPart, decPart] = body.split('.');
  const parts = [];
  const notation = [];
  const chips = [];
  // integer digits
  for (let i = 0; i < intPart.length; i++) {
    const digit = parseInt(intPart[i]);
    if (digit === 0) continue;
    const place = intPart.length - 1 - i;
    const value = digit * Math.pow(10, place);
    parts.push(value);
    notation.push(`(${digit} × 10${toSub(place)})`);
    chips.push(value);
  }
  // decimal digits
  if (decPart) {
    for (let i = 0; i < decPart.length; i++) {
      const digit = parseInt(decPart[i]);
      if (digit === 0) continue;
      const place = i + 1;
      const decVal = digit / Math.pow(10, place);
      parts.push(decVal);
      notation.push(`(${digit} × 1/${Math.pow(10, place)})`);
      chips.push(decVal);
    }
  }
  return {neg, parts, notation, chips, decPart};
}

function render() {
  const raw = $('#input').value.trim();
  $('#val-frac').parentElement.style.display = '';
  if (!raw || !/^-?\d+(\.\d+)?$/.test(raw.replace(/,/g,''))) {
    $('#result').style.display = 'none';
    return;
  }
  const cleaned = raw.replace(/,/g,'');
  const r = expand(cleaned);
  const sign = r.neg ? '−' : '';
  const standardStr = sign + r.parts.join(' + ');
  const notationStr = sign + r.notation.join(' + ');
  const fracStr = r.decPart ? standardStr.replace(/(\d+\.\d+)/g, m => {
    const [a,b] = m.split('.');
    return a + ' + ' + b.split('').map((d,i) => `${d}/${Math.pow(10,i+1)}`).join(' + ');
  }) : standardStr;

  $('#val-standard').textContent = standardStr;
  $('#val-notation').textContent = notationStr;
  $('#val-frac').textContent = r.decPart ? fracStr : '— (no decimals)';
  $('#val-frac').parentElement.style.display = r.decPart ? '' : 'none';
  $('#val-chips').innerHTML = r.chips.map(c => `<span class="ef-chip">${c}</span>`).join('');
  $('#result').style.display = 'block';
}

$('#lbl-standard').textContent = '';
$('#input').addEventListener('input', render);
$('#input').addEventListener('input', () => {
  $('#lbl-standard').textContent = t('standard');
  $('#lbl-notation').textContent = t('notation');
  $('#lbl-frac').textContent = t('frac');
  $('#lbl-chips').textContent = t('chips');
});

  ]
});
</script>
