<style>
.gantt-wrap{background:var(--glass2);border:1px solid var(--border);border-radius:16px;overflow:hidden;margin:16px 0}
.gantt-toolbar{display:flex;gap:8px;padding:12px;border-bottom:1px solid var(--border);flex-wrap:wrap;align-items:center}
.gantt-container{overflow-x:auto}
.gantt-table{width:100%;border-collapse:collapse;min-width:700px}
.gantt-table th,.gantt-table td{border-bottom:1px solid var(--border);padding:0;text-align:left;vertical-align:middle}
.gantt-table th{background:var(--glass);font-size:.8em;color:var(--gz-muted);padding:10px 12px;position:sticky;top:0;z-index:2}
.task-col{width:200px;min-width:200px}
.gantt-bar-cell{position:relative;height:40px;min-width:500px}
.gantt-bar{position:absolute;height:28px;top:6px;border-radius:6px;display:flex;align-items:center;padding:0 8px;font-size:.75em;color:#fff;font-weight:600;cursor:pointer;min-width:20px;transition:filter .15s;overflow:hidden;white-space:nowrap}
.gantt-bar:hover{filter:brightness(1.15)}
.gantt-bar .bar-label{overflow:hidden;text-overflow:ellipsis}
.task-name{padding:8px 12px;font-size:.9em;font-weight:500;display:flex;align-items:center;gap:6px}
.task-actions{opacity:0;transition:opacity .2s}
.task-row:hover .task-actions{opacity:1}
.task-row:hover{background:var(--glass)}
.day-header{text-align:center;font-size:.7em;padding:4px 2px;min-width:30px;position:relative}
.weekend{background:rgba(255,255,255,.03)}
.gantt-form{padding:12px;display:flex;gap:8px;flex-wrap:wrap;align-items:end;border-bottom:1px solid var(--border);background:var(--glass)}
.gantt-form input,.gantt-form select{padding:8px 10px;border:1px solid var(--border);border-radius:8px;background:var(--glass2);color:var(--gz-text);font-size:.85em}
.gantt-form label{font-size:.8em;color:var(--gz-muted);display:block;margin-bottom:3px}
.gantt-form .field{display:flex;flex-direction:column}
.today-line{position:absolute;top:0;bottom:0;width:2px;background:var(--gz-accent);z-index:1}
.progress-fill{height:4px;border-radius:2px;position:absolute;bottom:2px;left:4px;background:rgba(255,255,255,.5)}
.gantt-total{padding:12px;font-size:.85em;color:var(--gz-muted);border-top:1px solid var(--border);display:flex;gap:16px}
</style>

<div class="gz-container">
  <div class="gz-tool-header">

  </div>
  <div class="gz-tool-area">
    <div class="gantt-form" id="taskForm"></div>

      <div class="gantt-toolbar" id="toolbar"></div>

</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Gantt Chart Maker',
    toolDesc: 'Create professional Gantt charts for project planning. Add tasks, set timelines, visualize progress — free, no signup.',
    taskName: 'Task Name',
    startDate: 'Start Date',
    duration: 'Duration (days)',
    addTask: 'Add Task',
    exportPNG: 'Export PNG',
    clearAll: 'Clear All',
    delete: '✕',
    totalDays: 'Total Days',
    tasks: 'Tasks',
    projectSpan: 'Project Span',
    color: 'Color',
    step1: 'Enter a task name, start date, and duration in days',
    step2: 'Click "Add Task" to add it to the Gantt chart',
    step3: 'Tasks appear as colored bars on the timeline',
    step4: 'Export your chart as PNG using the toolbar button',
  },
  zh: {
    toolTitle: '甘特图制作工具',
    toolDesc: '创建专业的甘特图进行项目规划。添加任务、设置时间线、可视化进度 — 免费无需注册。',
    taskName: '任务名称',
    startDate: '开始日期',
    duration: '工期（天）',
    addTask: '添加任务',
    exportPNG: '导出 PNG',
    clearAll: '清空',
    delete: '✕',
    totalDays: '总天数',
    tasks: '任务数',
    projectSpan: '项目跨度',
    color: '颜色',
    step1: '输入任务名称、开始日期和工期天数',
    step2: '点击「添加任务」将其添加到甘特图',
    step3: '任务以彩色条形显示在时间线上',
    step4: '使用工具栏按钮导出为 PNG 图片',
  }
});

const { $, t } = GZ;
const STORAGE_KEY = 'gz-gantt-chart';
const COLORS = ['#4A90D9','#50C878','#FF6B6B','#FFB347','#9B59B6','#1ABC9C','#E74C3C','#3498DB','#F39C12','#2ECC71'];

let tasks = loadTasks();
let nextId = tasks.length ? Math.max(...tasks.map(t=>t.id)) + 1 : 1;

function loadTasks() {
  try { const s = localStorage.getItem(STORAGE_KEY); if (s) return JSON.parse(s); } catch(e) {}
  return [
    { id:1, name:'Research & Planning', start: '2026-06-15', days: 5, color: '#4A90D9' },
    { id:2, name:'Design Phase', start: '2026-06-20', days: 7, color: '#50C878' },
    { id:3, name:'Development', start: '2026-06-27', days: 14, color: '#FF6B6B' },
    { id:4, name:'Testing & QA', start: '2026-07-11', days: 5, color: '#FFB347' },
    { id:5, name:'Launch', start: '2026-07-16', days: 2, color: '#9B59B6' },
  ];
}

function saveTasks() { localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks)); }

function renderGantt() {
  if (!tasks.length) {
    $('#ganttContainer').innerHTML = '<div style="padding:40px;text-align:center;color:var(--gz-muted)">No tasks yet. Add a task above.</div>';
    $('#totalArea').innerHTML = '';
    return;
  }

  // Find date range
  let minDate = Infinity, maxDate = 0;
  tasks.forEach(t => {
    const s = new Date(t.start).getTime();
    const e = s + t.days * 86400000;
    if (s < minDate) minDate = s;
    if (e > maxDate) maxDate = e;
  });
  // Add padding
  minDate -= 3 * 86400000;
  maxDate += 3 * 86400000;
  const totalDays = Math.ceil((maxDate - minDate) / 86400000);
  const dayMs = 86400000;

  let html = '<table class="gantt-table"><thead><tr><th class="task-col">' + t('taskName') + '</th>';
  // Day headers (show every few days)
  for (let d = 0; d < totalDays; d++) {
    const date = new Date(minDate + d * dayMs);
    const isWeekend = date.getDay() === 0 || date.getDay() === 6;
    if (d % 7 === 0 || totalDays <= 30) {
      const label = totalDays <= 21 ? `${date.getDate()}` : `${date.getMonth()+1}/${date.getDate()}`;
      html += `<th class="day-header${isWeekend?' weekend':''}" colspan="${totalDays<=21?1:7}">${label}</th>`;
    }
    if (d % 7 === 0 && totalDays > 21) d += 6; // skip handled by colspan
  }
  html += '</tr></thead><tbody>';

  tasks.forEach(task => {
    const taskStart = new Date(task.start).getTime();
    const offset = (taskStart - minDate) / dayMs;
    const width = task.days;
    html += `<tr class="task-row">
      <td class="task-name">
        <span style="width:8px;height:8px;border-radius:50%;background:${task.color};display:inline-block"></span>
        ${esc(task.name)}
        <span class="task-actions" style="margin-left:auto;cursor:pointer" onclick="delTask(${task.id})">${t('delete')}</span>
      </td>
      <td class="gantt-bar-cell">`;
    if (offset >= 0 && offset < totalDays) {
      const leftPct = (offset / totalDays * 100);
      const widthPct = (width / totalDays * 100);
      html += `<div class="gantt-bar" style="left:${leftPct}%;width:${widthPct}%;background:${task.color}" title="${task.name}: ${task.days} days">
        <span class="bar-label">${task.days}d</span>
      </div>`;
    }
    html += '</td></tr>';
  });
  html += '</tbody></table>';
  $('#ganttContainer').innerHTML = html;

  const projectDays = Math.ceil((maxDate - minDate) / dayMs);
  $('#totalArea').innerHTML = `<span>${t('tasks')}: ${tasks.length}</span><span>${t('projectSpan')}: ${projectDays} ${t('totalDays').toLowerCase()}</span>`;
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function addTask() {
  const name = $('#task-name').value.trim();
  const start = $('#task-start').value;
  const days = parseInt($('#task-days').value) || 1;
  if (!name || !start) return;
  const colorIdx = tasks.length % COLORS.length;
  tasks.push({ id: nextId++, name, start, days, color: COLORS[colorIdx] });
  saveTasks(); renderGantt();
  $('#task-name').value = '';
  $('#task-days').value = '1';
}

function delTask(id) {
  tasks = tasks.filter(t => t.id !== id);
  saveTasks(); renderGantt();
}

function clearAll() { tasks = []; saveTasks(); renderGantt(); }

// Form
const today = new Date().toISOString().split('T')[0];
$('#taskForm').innerHTML = `
  <div class="field"><label>${t('taskName')}</label><input id="task-name" placeholder="My Task" style="min-width:180px"></div>
  <div class="field"><label>${t('startDate')}</label><input type="date" id="task-start" value="${today}"></div>
  <div class="field"><label>${t('duration')}</label><input type="number" id="task-days" value="1" min="1" style="width:80px"></div>
  <button class="gz-btn" onclick="addTask()">${t('addTask')}</button>`;

$('#task-name').addEventListener('keydown', e => { if (e.key === 'Enter') addTask(); });

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="exportPNG()">${t('exportPNG')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="clearAll()">${t('clearAll')}</button>`;

function exportPNG() {
  const el = $('#ganttContainer');
  const canvas = document.createElement('canvas');
  const w = Math.max(el.scrollWidth, 800);
  const h = Math.max(el.scrollHeight, 300);
  canvas.width = w * 2; canvas.height = h * 2;
  const ctx = canvas.getContext('2d');
  ctx.scale(2, 2);
  ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, w, h);

  // Draw tasks
  let y = 40;
  ctx.font = 'bold 12px sans-serif'; ctx.fillStyle = '#666';
  ctx.fillText(t('taskName'), 12, 25);
  const chartX = 180;
  const chartW = w - chartX - 20;

  let minDate = Infinity, maxDate = 0;
  tasks.forEach(task => {
    const s = new Date(task.start).getTime();
    const e = s + task.days * 86400000;
    if (s < minDate) minDate = s; if (e > maxDate) maxDate = e;
  });
  const totalMs = maxDate - minDate || 1;

  tasks.forEach(task => {
    ctx.font = '12px sans-serif'; ctx.fillStyle = '#333';
    ctx.fillText(task.name, 12, y + 18);
    const offset = (new Date(task.start).getTime() - minDate) / totalMs;
    const barW = (task.days * 86400000) / totalMs;
    ctx.fillStyle = task.color;
    ctx.beginPath();
    ctx.roundRect(chartX + offset * chartW, y + 4, barW * chartW, 22, 4);
    ctx.fill();
    ctx.fillStyle = '#fff'; ctx.font = 'bold 10px sans-serif';
    ctx.fillText(task.days + 'd', chartX + offset * chartW + 6, y + 19);
    y += 36;
  });

  const a = document.createElement('a');
  a.download = 'gantt-chart.png'; a.href = canvas.toDataURL('image/png'); a.click();
}

renderGantt();

GZ.renderToolPage({
  category: 'fun',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📋', href:'/fun/kanban-board.html', name:'Kanban Board'},
    {icon:'✅', href:'/text/checklist.html', name:'Checklist'},
    {icon:'🍅', href:'/calc/pomodoro.html', name:'Pomodoro Timer'},
    {icon:'📖', href:'/fun/study-planner.html', name:'Study Planner'},
  ]
});
</script>

</body>
