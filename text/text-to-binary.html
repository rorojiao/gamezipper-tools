<script>
GZI18n.register({
  en: {
    toolTitle: 'Text to Binary / Hex Converter',
    toolDesc: 'Convert text to binary, hexadecimal, octal, and decimal — or decode them back to text. Supports full Unicode/UTF-8.',
    encode: 'Encode (Text → Binary)',
    decode: 'Decode (Binary → Text)',
    step1: 'Choose Encode or Decode mode',
    step2: 'Type or paste your text (or binary/hex)',
    step3: 'Results appear instantly for all formats',
    step4: 'Click Copy on any output to copy it',
  },
  zh: {
    toolTitle: '文本转二进制/十六进制转换器',
    toolDesc: '将文本转换为二进制、十六进制、八进制和十进制，或反向解码。支持完整 Unicode/UTF-8。',
    encode: '编码（文本 → 二进制）',
    decode: '解码（二进制 → 文本）',
    step1: '选择「编码」或「解码」模式',
    step2: '输入或粘贴文本（或二进制/十六进制）',
    step3: '所有格式的结果即时显示',
    step4: '点击任意输出旁的「复制」按钮复制',
  }
});

const { $, copyText, t } = GZ;
let mode = 'encode';

function setMode(m) {
  mode = m;
  $('#btn-encode').classList.toggle('active', m === 'encode');
  $('#btn-decode').classList.toggle('active', m === 'decode');
  convert();
}

function textToBytes(text) {
  return new TextEncoder().encode(text);
}

function bytesToText(bytes) {
  return new TextDecoder().decode(new Uint8Array(bytes));
}

function convert() {
  const input = $('#input-area').value;
  if (!input) {
    $('#out-bin').textContent = '';
    $('#out-hex').textContent = '';
    $('#out-oct').textContent = '';
    $('#out-dec').textContent = '';
    return;
  }

  if (mode === 'encode') {
    const bytes = textToBytes(input);
    $('#out-bin').textContent = Array.from(bytes).map(b => b.toString(2).padStart(8, '0')).join(' ');
    $('#out-hex').textContent = Array.from(bytes).map(b => b.toString(16).padStart(2, '0').toUpperCase()).join(' ');
    $('#out-oct').textContent = Array.from(bytes).map(b => b.toString(8).padStart(3, '0')).join(' ');
    $('#out-dec').textContent = Array.from(bytes).join(' ');
  } else {
    // Try to decode from binary, hex, octal, or decimal
    try {
      let bytes = [];
      const cleaned = input.trim();
      // Detect format by content
      if (/^[01\s]+$/.test(cleaned)) {
        // Binary
        bytes = cleaned.split(/\s+/).map(s => parseInt(s, 2));
      } else if (/^[0-9a-fA-F\s]+$/.test(cleaned) && cleaned.split(/\s+/).some(s => s.length > 1)) {
        // Hex
        bytes = cleaned.split(/\s+/).map(s => parseInt(s, 16));
      } else if (/^[0-7\s]+$/.test(cleaned)) {
        // Octal
        bytes = cleaned.split(/\s+/).map(s => parseInt(s, 8));
      } else {
        // Decimal
        bytes = cleaned.split(/\s+/).map(s => parseInt(s, 10));
      }
      const text = bytesToText(bytes.filter(b => !isNaN(b)));
      $('#out-bin').textContent = text;
      $('#out-hex').textContent = bytes.map(b => b.toString(16).padStart(2, '0').toUpperCase()).join(' ');
      $('#out-oct').textContent = bytes.map(b => b.toString(8).padStart(3, '0')).join(' ');
      $('#out-dec').textContent = bytes.join(' ');
    } catch(e) {
      $('#out-bin').textContent = 'Error: ' + e.message;
    }
  }
}

$('#input-area').addEventListener('input', convert);

$('#btn-encode').textContent = t('encode');
$('#btn-decode').textContent = t('decode');

$('#toolbar').innerHTML = `
  <button class="gz-btn gz-btn-secondary" onclick="$('#input-area').value='';convert();">${t('clear')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#input-area').value='Hello World 🌍';convert();">${t('example')}</button>`;

    {icon:'🔤', href:'/dev/character-encoding.html', name:'Character Encoding'},
  ]
});
</script>
