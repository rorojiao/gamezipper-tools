<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is alliteration?", "acceptedAnswer": {"@type": "Answer", "text": "Alliteration is the repetition of the same initial consonant sound across two or more nearby words. Classic examples include 'Peter Piper picked a peck of pickled peppers' or 'big bad wolf'. It's widely used in poetry, tongue-twisters, brand naming and copywriting."}}, {"@type": "Question", "name": "Does this tool check sounds or just letters?", "acceptedAnswer": {"@type": "Answer", "text": "The tool checks both. It groups words by their first letter and also applies phonetic rules for tricky pairs like C/K/Q (treated as the same sound family), silent H, and vowel-starting words. The default heuristic is letter-based for accuracy across languages."}}, {"@type": "Question", "name": "How many words need to repeat for it to count as alliteration?", "acceptedAnswer": {"@type": "Answer", "text": "Most style guides require at least two nearby words starting with the same sound. The tool flags any group of two or more words beginning with the same letter or sound family that appear within a configurable window (default: same line / stanza)."}}, {"@type": "Question", "name": "Is my text kept private?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. All analysis runs in your browser using JavaScript. No text is sent to any server. You can paste unpublished poems, brand ideas or private documents safely."}}]}</script>

<script>
GZI18n.register({
  en: {
    toolTitle: 'Alliteration Checker',
    toolDesc: 'Find alliterations in any text — poetry, slogans, brand names, lyrics and prose. Detects repeated starting sounds and groups them by letter.',
    lblIn: 'Text to analyze',
    analyze: 'Analyze',
    example: 'Load example',
    clear: 'Clear',
    statWords: 'words',
    statAllits: 'alliteration groups',
    statStrongest: 'strongest streak',
    statDensity: 'alliteration density',
    badgeGroup: 'streak',
    noAllit: 'No alliteration detected. Try lowering the minimum streak or paste longer text.',
    step1: 'Paste a poem, slogan, brand name or paragraph into the input',
    step2: 'Pick the minimum streak length (2, 3, or 4 words in a row)',
    step3: 'Click Analyze — groups are shown by letter with positions',
    step4: 'Use the results to spot patterns, tighten copy or balance prose',
    sample: 'Peter Piper picked a peck of pickled peppers.\nA big bad wolf blew the brick house down.\nShe sells sea shells by the sea shore.\nUnique umbrellas unify the unending storm.\nSimple similes simply slip sideways.'
  },
  zh: {
    toolTitle: '押头韵检测器',
    toolDesc: '检测任意文本中的押头韵 — 诗歌、口号、品牌名、歌词和散文。按起始字母分组显示重复的首字母。',
    lblIn: '要分析的文本',
    analyze: '分析',
    example: '加载示例',
    clear: '清空',
    statWords: '词数',
    statAllits: '押韵组',
    statStrongest: '最长连续',
    statDensity: '押韵密度',
    badgeGroup: '连续',
    noAllit: '未检测到押头韵。尝试降低最小连续词数或粘贴更长文本。',
    step1: '粘贴诗歌、口号、品牌名或段落',
    step2: '选择最小连续词数（2、3 或 4 词一组）',
    step3: '点击分析 — 按字母分组并标注位置',
    step4: '使用结果发现模式、调整文案或平衡文章节奏',
    sample: 'Peter Piper 挑选了一堆腌辣椒。\n大坏狼吹倒了砖房。\n她在海边卖贝壳。\n独特的雨伞抵御无尽的风暴。'
  }
});

const { $, copyText, t } = GZ;

const COMMON = new Set(['a','an','the','of','in','on','at','to','for','and','or','but','is','it','as','by','this','that','with']);

function normalize(soundMode, w) {
  const lower = w.toLowerCase().replace(/^[^a-z\u00C0-\u024F\u4E00-\u9FFF]+/, '');
  if (!lower) return null;
  if (soundMode === 'sound') {
    // group C/K/Q sounds; strip silent h
    let c = lower[0];
    if ('ckq'.includes(c)) c = 'c';
    return c;
  }
  return lower[0];
}

function analyze() {
  const inp = $('#input').value;
  const minStreak = parseInt($('#minStreak').value, 10);
  const mode = $('#mode').value;
  const ignoreCommon = $('#ignoreCommon').checked;

  if (!inp.trim()) {
    $('#stats').innerHTML = '';
    $('#results').innerHTML = '';
    return;
  }

  // Tokenize: keep track of original word + its position in lines
  const lines = inp.split(/\n/);
  const tokens = []; // {word, raw, lineIdx, posInLine, norm, lineText}
  lines.forEach((line, li) => {
    const matches = line.matchAll(/\S+/g);
    let pos = 0;
    for (const m of matches) {
      const raw = m[0];
      const norm = normalize(mode === 'sound', raw);
      if (!norm) continue;
      tokens.push({
        raw,
        norm,
        lineIdx: li,
        start: m.index,
        end: m.index + raw.length,
        isCommon: COMMON.has(raw.toLowerCase())
      });
    }
  });

  const filtered = ignoreCommon ? tokens.filter(t => !t.isCommon) : tokens;

  // Find consecutive streaks (same norm across nearby tokens in the same line, with possible skip of common words? — we already filtered)
  const streaks = []; // {norm, items: [tokens], lines: [li]}
  let cur = null;
  for (let i = 0; i < filtered.length; i++) {
    const t = filtered[i];
    if (cur && cur.norm === t.norm) {
      cur.items.push(t);
      if (!cur.lines.includes(t.lineIdx)) cur.lines.push(t.lineIdx);
    } else {
      if (cur && cur.items.length >= minStreak) streaks.push(cur);
      cur = { norm: t.norm, items: [t], lines: [t.lineIdx] };
    }
  }
  if (cur && cur.items.length >= minStreak) streaks.push(cur);

  // Stats
  const totalWords = filtered.length;
  const groupCount = streaks.length;
  const longest = streaks.reduce((m, s) => Math.max(m, s.items.length), 0);
  const density = totalWords > 0 ? ((streaks.reduce((s, x) => s + x.items.length, 0) / totalWords) * 100).toFixed(1) : '0.0';

  $('#stats').innerHTML = `
    <div class="ac-stat"><div class="v">${totalWords}</div><div class="l">${t('statWords')}</div></div>
    <div class="ac-stat"><div class="v">${groupCount}</div><div class="l">${t('statAllits')}</div></div>
    <div class="ac-stat"><div class="v">${longest}</div><div class="l">${t('statStrongest')}</div></div>
    <div class="ac-stat"><div class="v">${density}%</div><div class="l">${t('statDensity')}</div></div>`;

  // Render results grouped by norm
  if (streaks.length === 0) {
    $('#results').innerHTML = `<div class="ac-empty">${t('noAllit')}</div>`;
    return;
  }

  // Group by norm letter
  const byNorm = {};
  streaks.forEach(s => {
    if (!byNorm[s.norm]) byNorm[s.norm] = [];
    byNorm[s.norm].push(s);
  });

  let html = '';
  Object.keys(byNorm).sort().forEach(norm => {
    const groups = byNorm[norm];
    html += `<div class="ac-group"><h3>Letter "${norm.toUpperCase()}" <span class="badge">${groups.length} ${t('badgeGroup')}${groups.length > 1 ? 's' : ''}</span></h3>`;
    groups.forEach(g => {
      html += `<div class="ac-words">` +
        g.items.map(it => `<span class="ac-word">${escapeHtml(it.raw)}<span class="pos">L${it.lineIdx + 1}</span></span>`).join('') +
        `</div>`;
    });
    html += `</div>`;
  });

  $('#results').innerHTML = html;
}

function escapeHtml(s) {
  return s.replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' })[c]);
}

function loadExample() {
  $('#input').value = t('sample');
  analyze();
}

function doClear() {
  $('#input').value = '';
  $('#stats').innerHTML = '';
  $('#results').innerHTML = '';
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="analyze()">${t('analyze')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

['#minStreak','#mode','#ignoreCommon'].forEach(s => $(s).addEventListener('change', analyze));
$('#input').addEventListener('input', () => setTimeout(analyze, 200));

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'\ud83d\udcd6', href:'/text/alliteration-generator.html', name:'Alliteration Generator'},
    {icon:'\ud83d\udcdd', href:'/text/word-counter.html', name:'Word Counter'},
    {icon:'\ud83d\udcdd', href:'/text/readability-score.html', name:'Readability Score'},
    {icon:'\ud83c\udfb6', href:'/text/lyric-formatter.html', name:'Lyric Formatter'},
  ]
});
</script>
