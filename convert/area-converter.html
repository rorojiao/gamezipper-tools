<script>
GZI18n.register({
  en: {
    toolTitle: 'Area Converter',
    toolDesc: 'Convert area units instantly — square meters, square feet, acres, hectares, square miles, square kilometers, square yards and Chinese mu.',
    step1: 'Enter the area value you want to convert',
    step2: 'Select the source unit from the dropdown',
    step3: 'All other units update live in the grid below',
    step4: 'Click any value card to copy it to clipboard',
  },
  zh: {
    toolTitle: '面积单位换算器',
    toolDesc: '即时换算面积单位 — 平方米、平方英尺、英亩、公顷、平方英里、平方千米、平方码和亩。',
    step1: '输入要换算的面积值',
    step2: '从下拉菜单选择原始单位',
    step3: '下方网格实时显示所有其他单位的结果',
    step4: '点击任意数值卡片即可复制到剪贴板',
  }
});
const { $, copyText, t } = GZ;
// All factors relative to 1 square meter
const UNITS = [
  {id:'m2',  name:'Square meter (m²)',    zh:'平方米 (m²)',     f:1},
  {id:'km2', name:'Square kilometer (km²)',zh:'平方千米 (km²)',  f:1e6},
  {id:'cm2', name:'Square centimeter (cm²)',zh:'平方厘米 (cm²)', f:1e-4},
  {id:'mm2', name:'Square millimeter (mm²)',zh:'平方毫米 (mm²)', f:1e-6},
  {id:'ft2', name:'Square foot (ft²)',    zh:'平方英尺 (ft²)',  f:0.09290304},
  {id:'in2', name:'Square inch (in²)',    zh:'平方英寸 (in²)',  f:0.00064516},
  {id:'yd2', name:'Square yard (yd²)',    zh:'平方码 (yd²)',    f:0.83612736},
  {id:'mi2', name:'Square mile (mi²)',    zh:'平方英里 (mi²)',  f:2589988.110336},
  {id:'acre',name:'Acre',                 zh:'英亩',            f:4046.8564224},
  {id:'ha',  name:'Hectare (ha)',         zh:'公顷',            f:10000},
  {id:'mu',  name:'Mu (亩)',              zh:'亩',              f:666.6666667},
  {id:'qing',name:'Qing (顷)',            zh:'顷',              f:66666.66667},
];
function fmt(v){
  if(v===0) return '0';
  const a=Math.abs(v);
  if(a!==0&&(a<1e-6||a>=1e9)) return v.toExponential(6);
  if(a>=1) return +(v.toPrecision(8)).toLocaleString('en-US',{maximumFractionDigits:6});
  return v.toPrecision(6);
}
function convert(){
  const val=parseFloat($('#inp-val').value)||0;
  const unit=$('#inp-unit').value;
  const factor=UNITS.find(u=>u.id===unit).f;
  const m2=val*factor;
  const lang=GZI18n.getLang();
  $('#grid').innerHTML=UNITS.map(u=>{
    const result=m2/u.f;
    const label=lang==='zh'?u.zh:u.name;
    return `<div class="conv-card" onclick="copyText('${fmt(result)}')"><label>${label}</label><div class="val">${fmt(result)}</div></div>`;
  }).join('');
}
$('#inp-val').addEventListener('input',convert);
$('#inp-unit').addEventListener('change',convert);
$('#inp-unit').innerHTML=UNITS.map(u=>`<option value="${u.id}">${u.name}</option>`).join('');
$('#inp-unit').value='m2';
$('#toolbar').innerHTML=`<button class="gz-btn" onclick="copyText($('#grid .conv-card:first-child .val').textContent)">${t('copy')}</button>`;
convert();
GZ.renderToolPage({
  category:'convert',
  titleKey:'toolTitle',
  descKey:'toolDesc',
  howToSteps:['step1','step2','step3','step4'],
  related:[

    {icon:'🧊',href:'/convert/volume-converter.html',name:'Volume Converter'},
    {icon:'⚡',href:'/convert/energy-converter.html',name:'Energy Converter'},
  ]
});
</script>
