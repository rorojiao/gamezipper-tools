<style>
.ga-layout{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:14px}
@media(max-width:880px){.ga-layout{grid-template-columns:1fr}}
.ga-card{background:var(--glass2);border:1px solid var(--border);border-radius:14px;padding:18px}
.ga-card h3{font-size:1rem;margin-bottom:12px;color:var(--accent)}
.ga-controls{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:14px}
.ga-controls>div{display:flex;flex-direction:column;gap:4px}
.ga-controls label{font-size:.78em;font-weight:600;color:var(--text2)}
.ga-controls input,.ga-controls select{padding:7px 9px;border-radius:8px;border:1px solid var(--border);background:var(--glass);color:var(--text);font-size:.9em}
#ga-grid{display:grid;gap:3px;background:#333;padding:3px;border-radius:8px}
#ga-grid .ga-cell{min-height:46px;background:#1a1a2e;border:1px solid #333;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:.75em;color:#aaa;cursor:pointer;transition:all .12s;text-align:center;padding:4px;font-weight:600}
#ga-grid .ga-cell:hover{border-color:var(--accent)}
#ga-grid .ga-cell.selected{outline:2px solid var(--accent);outline-offset:1px}
#ga-code{white-space:pre-wrap;word-break:break-all;font-family:monospace;font-size:.82em;line-height:1.5;background:rgba(0,0,0,.4);padding:14px;border-radius:8px;overflow:auto;max-height:380px;color:#9af}
#ga-preview{background:#fff;border-radius:8px;padding:8px;min-height:200px}
#ga-preview .ga-pr{background:#4ecdc4;color:#fff;border-radius:4px;padding:8px;font-size:.75em;font-family:sans-serif;font-weight:600;display:flex;align-items:center;justify-content:center}
.ga-palette{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.ga-pal{padding:4px 10px;border-radius:6px;font-size:.78em;cursor:pointer;font-weight:600;border:2px solid transparent}
</style>

<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is grid-template-areas?", "acceptedAnswer": {"@type": "Answer", "text": "grid-template-areas is a CSS property that lets you name regions of a grid and lay them out visually using ASCII-art-like strings. For example, \"header header\\nsidebar main\\nfooter footer\" creates a classic header-sidebar-main-footer layout without needing to calculate column or line numbers."}}, {"@type": "Question", "name": "How do I merge cells into a named region?", "acceptedAnswer": {"@type": "Answer", "text": "Click a cell to select it, then click adjacent cells to add them to the selection. Type a name (like header or sidebar) and press Enter — every selected cell becomes part of that named region. The tool automatically keeps regions rectangular and valid."}}, {"@type": "Question", "name": "Can I create responsive layouts?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. After building your desktop layout, click the Generate media queries toggle to get a ready-to-edit mobile breakpoint. You can also export the layout for tablet and phone widths by adjusting rows and columns then copying each variant."}}, {"@type": "Question", "name": "Does the generated CSS include column and row sizing?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. The output includes grid-template-columns, grid-template-rows and gap alongside grid-template-areas, so you can paste it directly into your stylesheet. You can switch between fr units, fixed pixels and auto sizing from the controls."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="ga-layout">
      <div class="ga-card">
        <h3 id="h-builder">Layout Builder</h3>
        <div class="ga-controls">
          <div><label id="lbl-rows">Rows</label><input type="number" id="num-rows" value="3" min="1" max="12"></div>
          <div><label id="lbl-cols">Columns</label><input type="number" id="num-cols" value="3" min="1" max="12"></div>
          <div><label id="lbl-gap">Gap (px)</label><input type="number" id="num-gap" value="10" min="0" max="60"></div>
          <div><label id="lbl-cols-unit">Col unit</label><select id="sel-cols-unit"><option value="1fr">1fr</option><option value="auto">auto</option><option value="minmax(0,1fr)">minmax(0,1fr)</option><option value="200px">200px</option></select></div>
          <div><label id="lbl-rows-unit">Row unit</label><select id="sel-rows-unit"><option value="auto">auto</option><option value="100px">100px</option><option value="1fr">1fr</option><option value="minmax(100px,auto)">minmax(100px,auto)</option></select></div>
        </div>
        <div class="ga-palette" id="palette"></div>
        <div id="ga-grid"></div>
        <div style="margin-top:10px;font-size:.8em;color:var(--text2)">💡 Click cells to select, then pick or type a name. Drag to paint multiple cells.</div>
        <div class="gz-toolbar" style="margin-top:10px">
          <input type="text" id="inp-name" placeholder="Region name (e.g. header)" style="flex:1;padding:6px 10px;border-radius:8px;border:1px solid var(--border);background:var(--glass);color:var(--text);font-size:.85em">
          <button class="gz-btn" id="btn-apply">Apply</button>
          <button class="gz-btn gz-btn-secondary" id="btn-clear-sel">Clear sel</button>
          <button class="gz-btn gz-btn-secondary" id="btn-reset">Reset</button>
        </div>
      </div>
      <div class="ga-card">
        <h3 id="h-output">CSS Output</h3>
        <div class="gz-toolbar" style="margin-bottom:10px">
          <label class="gz-check"><input type="checkbox" id="cb-media" checked> @media mobile</label>
          <button class="gz-btn" id="btn-copy">Copy CSS</button>
          <button class="gz-btn gz-btn-secondary" id="btn-html">Copy HTML</button>
        </div>
        <div id="ga-code"></div>

<script>
GZI18n.register({
  en: {
    toolTitle: 'CSS Grid Template Areas Generator',
    toolDesc: 'Build CSS Grid layouts visually by naming regions. Drag-select cells, assign names like header/sidebar/main, and copy production-ready grid-template-areas, columns, rows and gap CSS. Free, browser-only.',
    step1: 'Set the number of rows and columns for your grid',
    step2: 'Click or drag to select cells, then type a region name and Apply',
    step3: 'Pick column/row units and gap to match your design',
    step4: 'Copy the generated CSS (with optional mobile breakpoint) to your stylesheet',
  },
  zh: {
    toolTitle: 'CSS Grid 命名区域生成器',
    toolDesc: '通过命名区域可视化构建 CSS Grid 布局。拖选单元格、指定如 header/sidebar/main 等名称，复制生产可用的 grid-template-areas、列、行和间距 CSS。免费，浏览器本地运行。',
    step1: '设置网格的行数和列数',
    step2: '点击或拖动选择单元格，输入区域名称并应用',
    step3: '选择列/行单位和间距以匹配设计',
    step4: '复制生成的 CSS（含可选移动端断点）到样式表',
  }
});

const { $, copyText, t } = GZ;

const COLORS = ['#4ecdc4','#ff6b6b','#ffe66d','#a8e6cf','#ff8b94','#c7ceea','#ffa726','#ab47bc','#66bb6a','#42a5f5'];
let rows = 3, cols = 3, gap = 10;
// grid cells: 2D array [row][col] = name or '.'
let grid = [];
let selected = new Set(); // "r,c"
let isDragging = false;

function initGrid(r, c) {
  rows = r; cols = c;
  grid = Array.from({length:r}, () => Array(c).fill('.'));
  selected.clear();
  render();
}

function render() {
  // Palette of used names
  const names = [...new Set(grid.flat().filter(n => n !== '.'))];
  $('#palette').innerHTML = names.map((n,i)=>`<span class="ga-pal" style="background:${COLORS[i%COLORS.length]};color:#fff" onclick="document.getElementById('inp-name').value='${n}';paintSel('${n}')">${n}</span>`).join('') + (names.length?'':'<span style="font-size:.78em;color:var(--text2)">No regions yet — select cells and name them.</span>');
  // Grid
  const gw = $('#ga-grid');
  gw.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
  gw.innerHTML = '';
  for (let r=0; r<rows; r++) {
    for (let c=0; c<cols; c++) {
      const name = grid[r][c];
      const cell = document.createElement('div');
      cell.className = 'ga-cell' + (selected.has(r+','+c)?' selected':'');
      const nameIdx = names.indexOf(name);
      if (name !== '.') {
        cell.style.background = COLORS[nameIdx % COLORS.length];
        cell.style.color = '#fff';
        cell.textContent = name;
      } else {
        cell.textContent = '·';
      }
      cell.dataset.r = r; cell.dataset.c = c;
      cell.addEventListener('mousedown', e => { e.preventDefault(); isDragging = true; if(!e.shiftKey) selected.clear(); selected.add(r+','+c); render(); });
      cell.addEventListener('mouseenter', () => { if(isDragging){ selected.add(r+','+c); render(); } });
      gw.appendChild(cell);
    }
  }
  document.removeEventListener('mouseup', stopDrag);
  document.addEventListener('mouseup', stopDrag);
  renderCSS();
  renderPreview();
}

function stopDrag() { isDragging = false; }

window.paintSel = function(name) {
  if (!name || selected.size===0) return;
  selected.forEach(key => {
    const [r,c] = key.split(',').map(Number);
    grid[r][c] = name;
  });
  selected.clear();
  render();
};

$('#btn-apply').addEventListener('click', () => {
  const name = ($('#inp-name').value || '').trim().replace(/\s+/g,'-').toLowerCase();
  if (!name) return;
  paintSel(name);
  $('#inp-name').value = '';
});

$('#inp-name').addEventListener('keydown', e => { if(e.key==='Enter'){ e.preventDefault(); $('#btn-apply').click(); } });

$('#btn-clear-sel').addEventListener('click', () => { selected.clear(); render(); });
$('#btn-reset').addEventListener('click', () => initGrid(rows, cols));

['num-rows','num-cols','num-gap','sel-cols-unit','sel-rows-unit'].forEach(id => {
  $('#'+id).addEventListener('input', () => {
    const newR = Math.max(1, Math.min(12, +$('#num-rows').value || 1));
    const newC = Math.max(1, Math.min(12, +$('#num-cols').value || 1));
    gap = Math.max(0, Math.min(60, +$('#num-gap').value || 0));
    if (newR !== rows || newC !== cols) {
      // preserve existing where possible
      const newGrid = Array.from({length:newR}, (_,r) => Array.from({length:newC}, (_,c) => (grid[r] && grid[r][c]) ? grid[r][c] : '.'));
      grid = newGrid; rows = newR; cols = newC; selected.clear();
    }
    render();
  });
});

function renderCSS() {
  const colUnit = $('#sel-cols-unit').value;
  const rowUnit = $('#sel-rows-unit').value;
  const areas = grid.map(row => `"${row.map(c => c==='.'?'.':c).join(' ')}"`).join('\n    ');
  let css = `.grid-container {\n  display: grid;\n  grid-template-columns: repeat(${cols}, ${colUnit});\n  grid-template-rows: repeat(${rows}, ${rowUnit});\n  grid-template-areas:\n    ${areas};\n  gap: ${gap}px;\n}\n`;
  const names = [...new Set(grid.flat().filter(n => n !== '.'))];
  names.forEach(n => {
    css += `\n.${n} { grid-area: ${n}; }\n`;
  });
  if ($('#cb-media').checked) {
    css += `\n@media (max-width: 768px) {\n  .grid-container {\n    grid-template-columns: 1fr;\n    grid-template-areas:\n      ${names.map(n=>`"${n}"`).join('\n      ')};\n  }\n}\n`;
  }
  $('#ga-code').textContent = css;
}

function renderPreview() {
  const colUnit = $('#sel-cols-unit').value;
  const rowUnit = $('#sel-rows-unit').value;
  const names = [...new Set(grid.flat().filter(n => n !== '.'))];
  const areas = grid.map(row => `"${row.map(c => c==='.'?'.':c).join(' ')}"`).join(' ');
  const pv = $('#ga-preview');
  pv.style.display = 'grid';
  pv.style.gridTemplateColumns = `repeat(${cols}, ${colUnit==='auto'?'1fr':colUnit})`;
  pv.style.gridTemplateRows = `repeat(${rows}, ${rowUnit==='auto'?'60px':rowUnit})`;
  pv.style.gridTemplateAreas = areas;
  pv.style.gap = Math.max(4,gap)+'px';
  pv.innerHTML = names.map(n => `<div class="ga-pr" style="grid-area:${n}">${n}</div>`).join('');
}

$('#btn-copy').addEventListener('click', () => copyText($('#ga-code').textContent));
$('#btn-html').addEventListener('click', () => {
  const names = [...new Set(grid.flat().filter(n => n !== '.'))];
  const html = `<div class="grid-container">\n${names.map(n=>`  <div class="${n}">${n}</div>`).join('\n')}\n</div>`;
  copyText(html);
});
$('#cb-media').addEventListener('change', renderCSS);

// Initial classic layout
initGrid(3, 3);
grid[0][0]='header'; grid[0][1]='header'; grid[0][2]='header';
grid[1][0]='sidebar'; grid[1][1]='main'; grid[1][2]='main';
grid[2][0]='footer'; grid[2][1]='footer'; grid[2][2]='footer';
render();

GZ.renderToolPage({
  category: 'css',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📐', href:'/css-tools/grid.html', name:'CSS Grid Generator'},
    {icon:'🧊', href:'/css-tools/bento-grid.html', name:'Bento Grid'},
    {icon:'🔀', href:'/css-tools/flexbox.html', name:'Flexbox Generator'},
    {icon:'📱', href:'/css/responsive-design-tester.html', name:'Responsive Tester'},
  ]
});
</script>
<script src="/tools-result-rec.js?v=20260707v520" defer></script>
</body>
