// Parse top-level type/interface/enum declarations
function parseDeclarations(src) {
  const decls = [];
  // Remove comments
  const clean = src.replace(/\/\/[^\n]*/g, '').replace(/\/\*[\s\S]*?\*\//g, '');
  // enum
  const enumRe = /\benum\s+(\w+)\s*\{([^}]*)\}/g;
  let m;
  while ((m = enumRe.exec(clean)) !== null) {
    const name = m[1];
    const body = m[2];
    const members = body.split(',').map(s => s.trim()).filter(Boolean).map(mem => {
      const eq = mem.indexOf('=');
      if (eq >= 0) {
        const k = mem.slice(0, eq).trim();
        const v = mem.slice(eq + 1).trim();
        return { key: k, value: v };
      }
      return { key: mem, value: null };
    });
    decls.push({ kind: 'enum', name, members });
  }
  // interface and type alias
  const declRe = /\b(?:interface|type)\s+(\w+)(?:<[^>]*>)?\s*(?:extends\s+[\w,\s]+)?[={]/g;
  const matches = [];
  while ((m = declRe.exec(clean)) !== null) {
    matches.push({ name: m[1], index: m.index, end: m.index + m[0].length });
  }
  matches.forEach(dm => {
    // find matching closing brace (interface) or semicolon at depth 0 (type)
    let i = dm.end;
    let depth = 1;
    let isInterface = clean.slice(dm.index, dm.end).startsWith('interface');
    // Skip past the opening { or =
    while (i < clean.length && /[{=]/.test(clean[i]) === false) i++;
    const startChar = clean[i];
    i++;
    if (startChar === '{') {
      // object body
      while (i < clean.length && depth > 0) {
        if (clean[i] === '{' || clean[i] === '(' || clean[i] === '[') depth++;
        else if (clean[i] === '}' || clean[i] === ')' || clean[i] === ']') depth--;
        if (depth === 0) break;
        i++;
      }
      const body = clean.slice(dm.end, i);
      decls.push({ kind: isInterface ? 'interface' : 'type', name: dm.name, body });
    } else {
      // type alias with primitive/union/array RHS — read until ; or end
      while (i < clean.length && clean[i] !== ';') i++;
      const body = clean.slice(dm.end, i).trim();
      decls.push({ kind: 'typeAlias', name: dm.name, body });
    }
  });
  return decls;
}

// Convert a TS type expression to a Zod expression
function typeToZod(typeExpr, registry) {
  const t = typeExpr.trim();
  if (!t) return 'z.unknown()';
  // Union
  if (t.includes('|')) {
    const parts = splitTop(t, '|').map(p => typeToZod(p, registry));
    const nullPart = parts.findIndex(p => p === 'z.null()');
    if (nullPart >= 0) {
      const rest = parts.filter((_, i) => i !== nullPart);
      if (rest.length === 1) return rest[0].replace(/\)$/, '').replace(/^z\.(\w+)\(\)$/, 'z.$1().nullable()') + '';
      return `z.union([${rest.join(', ')}]).nullable()`;
    }
    if (parts.length === 1) return parts[0];
    // Use z.literal for literal unions, otherwise z.union
    const literals = parts.filter(p => p.startsWith('z.literal('));
    if (literals.length === parts.length) return `z.enum([${parts.map(p => p.match(/z\.literal\((.*)\)/)[1]).join(', ')}])`;
    return `z.union([${parts.join(', ')}])`;
  }
  // Intersection
  if (t.includes('&')) {
    const parts = splitTop(t, '&').map(p => typeToZod(p, registry));
    return `z.intersection(${parts.join(', ')})`;
  }
  // Array T[]
  if (t.endsWith('[]')) {
    const inner = t.slice(0, -2).trim();
    return `${typeToZod(inner, registry)}.array()`;
  }
  // Array<T>
  const arrMatch = t.match(/^Array<(.+)>$/);
  if (arrMatch) return `${typeToZod(arrMatch[1], registry)}.array()`;
  // Promise<T>
  const promMatch = t.match(/^Promise<(.+)>$/);
  if (promMatch) return `${typeToZod(promMatch[1], registry)}`;
  // Record<K, V>
  const recMatch = t.match(/^Record<(.+),\s*(.+)>$/);
  if (recMatch) return `z.record(${typeToZod(recMatch[1], registry)}, ${typeToZod(recMatch[2], registry)})`;
  // Tuple [A, B, C]
  if (t.startsWith('[') && t.endsWith(']')) {
    const inner = t.slice(1, -1).trim();
    if (inner) {
      const items = splitTop(inner, ',').map(p => typeToZod(p, registry));
      return `z.tuple([${items.join(', ')}])`;
    }
    return `z.array(z.unknown())`;
  }
  // Literals
  if (/^['"].*['"]$/.test(t)) return `z.literal(${t})`;
  if (/^-?\d+(\.\d+)?$/.test(t)) return `z.literal(${t})`;
  if (t === 'true' || t === 'false') return `z.literal(${t})`;
  // Primitives
  if (t === 'string') return 'z.string()';
  if (t === 'number') return 'z.number()';
  if (t === 'bigint') return 'z.bigint()';
  if (t === 'boolean') return 'z.boolean()';
  if (t === 'Date') return 'z.date()';
  if (t === 'null') return 'z.null()';
  if (t === 'undefined') return 'z.undefined()';
  if (t === 'void') return 'z.void()';
  if (t === 'any' || t === 'unknown') return 'z.unknown()';
  if (t === 'never') return 'z.never()';
  // Reference to another declared type
  if (registry[t]) return `${registry[t].schemaName}`;
  // Fallback: treat as unknown reference
  return `${t}Schema`;
}

// Split string at delimiter, respecting brackets/parens/generics
function splitTop(s, delim) {
  const out = [];
  let depth = 0, cur = '';
  let inStr = null;
  for (let i = 0; i < s.length; i++) {
    const c = s[i];
    if (inStr) {
      cur += c;
      if (c === inStr && s[i-1] !== '\\') inStr = null;
      continue;
    }
    if (c === '"' || c === "'" || c === '`') { inStr = c; cur += c; continue; }
    if (c === '(' || c === '[' || c === '{' || c === '<') depth++;
    if (c === ')' || c === ']' || c === '}' || c === '>') depth--;
    if (c === delim && depth === 0) { out.push(cur); cur = ''; continue; }
    cur += c;
  }
  if (cur.trim()) out.push(cur);
  return out.map(s => s.trim()).filter(Boolean);
}

// Parse an object body like "{ a: string; b?: number }" into field specs
function parseFields(body) {
  const fields = [];
  // Strip braces if present
  let inner = body.trim();
  if (inner.startsWith('{')) inner = inner.slice(1);
  if (inner.endsWith('}')) inner = inner.slice(0, -1);
  // Split on ; or newline at depth 0
  const parts = inner.split(/;|\n/).map(s => s.trim()).filter(Boolean);
  parts.forEach(part => {
    // Skip methods
    if (part.includes('(') && !part.includes(':')) return;
    const colonIdx = part.indexOf(':');
    if (colonIdx < 0) return;
    const keyPart = part.slice(0, colonIdx).trim();
    let typePart = part.slice(colonIdx + 1).trim();
    const optional = keyPart.endsWith('?');
    const key = optional ? keyPart.slice(0, -1).trim() : keyPart;
    // Remove quotes around key
    const cleanKey = key.replace(/^['"`]|['"`]$/g, '');
    fields.push({ key: cleanKey, type: typePart, optional });
  });
  return fields;
}

function camelCase(s) {
  return s.charAt(0).toLowerCase() + s.slice(1);
}

function convert() {
  const inp = $('#input').value.trim();
  if (!inp) { $('#output').textContent=''; $('#status').innerHTML=''; return; }
  try {
    const decls = parseDeclarations(inp);
    if (!decls.length) {
      $('#output').innerHTML = `<span style="color:var(--gz-accent)">${t('errParse')}: no interface/type/enum found</span>`;
      $('#status').innerHTML = `<span style="color:var(--gz-accent)">${t('errParse')}</span>`;
      return;
    }
    const useCamel = $('#cb-camel').checked;
    // Build registry of schema names
    const registry = {};
    decls.forEach(d => {
      registry[d.name] = { schemaName: (useCamel ? camelCase(d.name) : d.name) + 'Schema' };
    });
    const lines = [];
    lines.push('// Generated from TypeScript — Zod schemas');
    lines.push("import { z } from 'zod';");
    lines.push('');
    decls.forEach(d => {
      const schemaVar = registry[d.name].schemaName;
      if (d.kind === 'enum') {
        const values = d.members.map(m => m.value || `'${m.key}'`);
        lines.push(`export const ${schemaVar} = z.enum([${values.join(', ')}]);`);
        return;
      }
      if (d.kind === 'typeAlias') {
        const z = typeToZod(d.body, registry);
        lines.push(`export const ${schemaVar} = ${z};`);
        return;
      }
      // interface / type with object body
      const fields = parseFields(d.body);
      lines.push(`export const ${schemaVar} = z.object({`);
      const maxKeyLen = fields.reduce((mx, f) => Math.max(mx, f.key.length), 0);
      fields.forEach(f => {
        let z = typeToZod(f.type, registry);
        if (f.optional) {
          // ensure ends with .optional()
          if (!z.endsWith('()')) z = z.replace(/\)$/, '');
          z = z + '.optional()';
        }
        lines.push(`  ${f.key.padEnd(maxKeyLen)}: ${z},`);
      });
      lines.push('});');
      lines.push('');
      // Export inferred type
      lines.push(`export type ${d.name} = z.infer<typeof ${schemaVar}>;`);
      lines.push('');
    });
    const code = lines.join('\n').replace(/\n{3,}/g, '\n\n').trim();
    $('#output').innerHTML = highlight(code);
    $('#status').innerHTML = `<span style="color:var(--gz-success)">${t('ok').replace('{n}', decls.length)}</span>`;
  } catch(e) {
    $('#output').innerHTML = `<span style="color:var(--gz-accent)">${t('errParse')}: ${escapeHtml(e.message)}</span>`;
    $('#status').innerHTML = `<span style="color:var(--gz-accent)">${t('errParse')}</span>`;
  }
}

function highlight(code) {
  return code.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/(\/\/.*$)/gm, '<span class="ts-com">$1</span>')
    .replace(/('[^']*'|"[^"]*"|`[^`]*`)/g, '<span class="ts-str">$1</span>')
    .replace(/\b(import|export|from|const|type|interface|enum|extends|infer)\b/g, '<span class="ts-kw">$1</span>')
    .replace(/\b(string|number|boolean|bigint|symbol|undefined|null|void|any|unknown|never|Date)\b/g, '<span class="ts-type">$1</span>')
    .replace(/\b(z)\b/g, '<span class="ts-fn">$1</span>');
}

function escapeHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function loadExample() {
  $('#input').value =
    "interface User {\n" +
    "  id: number;\n" +
    "  name: string;\n" +
    "  email?: string;\n" +
    "  role: 'admin' | 'editor' | 'viewer';\n" +
    "  tags: string[];\n" +
    "  profile: {\n" +
    "    bio: string;\n" +
    "    avatarUrl?: string;\n" +
    "  };\n" +
    "  createdAt: Date;\n" +
    "}\n\n" +
    "enum Status {\n" +
    "  Active = 'active',\n" +
    "  Inactive = 'inactive',\n" +
    "  Pending = 'pending',\n" +
    "}";
  convert();
}

$('#input').addEventListener('input', convert);
