<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is a mission statement?", "acceptedAnswer": {"@type": "Answer", "text": "A mission statement explains what an organization does, who it serves, and how it serves them — all in one or two sentences. It guides decision-making and tells customers and employees why the company exists. Famous examples: Tesla ('To accelerate the advent of sustainable transport'), Google ('To organize the world\u2019s information and make it universally accessible and useful')."}}, {"@type": "Question", "name": "How does the mission statement generator work?", "acceptedAnswer": {"@type": "Answer", "text": "Enter your company name and pick an industry and tone. The tool combines proven mission-statement templates with industry-specific verbs, audiences, and outcomes to produce 10+ draft statements. Each click reshuffles for fresh angles you can copy, mix, and refine."}}, {"@type": "Question", "name": "What is the difference between a mission and a vision statement?", "acceptedAnswer": {"@type": "Answer", "text": "A mission statement describes what you do today (purpose, who you serve, how). A vision statement describes where you want to be in the future (the long-term impact or world you want to create). Mission = present; vision = future. Many companies have both."}}, {"@type": "Question", "name": "How long should a mission statement be?", "acceptedAnswer": {"@type": "Answer", "text": "Aim for one or two sentences, ideally under 25 words. The best mission statements are short, specific, and memorable. Avoid jargon, buzzwords, and overly broad language like 'to be the best'. Use this generator to get ideas, then edit down to the essential truth."}}]}</script>

<script>
GZI18n.register({
  en: {
    toolTitle: 'Mission Statement Generator',
    toolDesc: 'Create a clear, professional mission statement for your startup, nonprofit or company in seconds. Pick an industry and tone — get 10+ draft statements to copy, mix, and refine.',
    lblName: 'Company / Org name',
    phName: 'e.g. GameZipper, Acme Health, Brightwater',
    lblIndustry: 'Industry',
    lblTone: 'Tone',
    btnGen: 'Generate Statements',
    btnExample: 'Load Example',
    tip: 'Tip: a great mission statement answers — What do we do? Who do we serve? How? Aim for 1-2 sentences, under 25 words. Edit ruthlessly.',
    step1: 'Enter your company or organization name',
    step2: 'Pick an industry and a tone',
    step3: 'Click Generate for 10+ mission statement drafts',
    step4: 'Click a card to copy your favorite, then refine',
  },
  zh: {
    toolTitle: '使命宣言生成器',
    toolDesc: '几秒钟内为你的创业项目、非营利组织或公司创建一份清晰、专业的使命宣言。选择行业和语气 — 获得 10+ 份草稿，复制并润色。',
    lblName: '公司 / 组织名称',
    phName: '例如：GameZipper、Acme Health、Brightwater',
    lblIndustry: '行业',
    lblTone: '语气',
    btnGen: '生成使命宣言',
    btnExample: '加载示例',
    tip: '提示：好的使命宣言回答 — 我们做什么？服务谁？如何服务？建议 1-2 句，少于 25 字。反复精简。',
    step1: '输入你的公司或组织名称',
    step2: '选择行业和语气',
    step3: '点击「生成」获得 10+ 使命宣言草稿',
    step4: '点击卡片复制你喜欢的，然后润色',
  }
});

const { $, copyText, t, showToast } = GZ;

const VERBS = {
  tech: ['empower','equip','accelerate','simplify','connect','automate'],
  nonprofit: ['serve','support','protect','unite','uplift','champion'],
  education: ['educate','inspire','nurture','unlock','transform','teach'],
  health: ['heal','care for','improve','protect','restore','advance'],
  finance: ['empower','secure','enable','optimize','protect','grow'],
  retail: ['deliver','offer','bring','curate','provide','make'],
  food: ['craft','serve','nourish','deliver','brew','grow'],
  manufacturing: ['build','engineer','produce','manufacture','forge','deliver'],
  consulting: ['help','guide','advise','partner','transform','optimize'],
  general: ['help','empower','enable','connect','support','serve'],
};

const AUDIENCES = {
  tech: ['teams','builders','developers','businesses','people','creators'],
  nonprofit: ['communities','families','children','those in need','our community','the next generation'],
  education: ['learners','students','every learner','curious minds','young people','students everywhere'],
  health: ['patients','families','our community','every person','people everywhere','those who need care'],
  finance: ['individuals','families','businesses','investors','everyone','hard-working families'],
  retail: ['our customers','everyday shoppers','people','families','designers','busy people'],
  food: ['our community','food lovers','every table','our guests','families','people everywhere'],
  manufacturing: ['our customers','industries','businesses','partners','makers','builders'],
  consulting: ['our clients','organizations','leaders','teams','businesses','growing companies'],
  general: ['our customers','people','businesses','everyone','our community','our clients'],
};

const OUTCOMES = {
  tech: ['achieve more','work smarter','move faster','do their best work','build the future'],
  nonprofit: ['thrive','live with dignity','reach their full potential','build better lives','overcome challenges'],
  education: ['reach their potential','love learning','achieve their dreams','learn anything','grow with confidence'],
  health: ['live healthier lives','feel their best','live longer','live well','heal faster'],
  finance: ['build wealth','reach financial freedom','make confident decisions','secure their future','grow with confidence'],
  retail: ['find what they love','live better','save time','discover great products','enjoy every day'],
  food: ['enjoy great food','eat well','feel good','share moments','savor every bite'],
  manufacturing: ['build reliable products','operate efficiently','innovate faster','ship with confidence','scale without limits'],
  consulting: ['reach their goals','grow with confidence','make better decisions','win in their market','navigate change'],
  general: ['reach their goals','live better','achieve more','succeed','thrive'],
};

const TEMPLATES = {
  formal: [
    'The mission of {N} is to {V} {A} to {O}.',
    '{N} exists to {V} {A} as they {O}.',
    'At {N}, our mission is to {V} {A} so they can {O}.',
  ],
  inspirational: [
    'At {N}, we believe everyone deserves to {O}. That\u2019s why we {V} {A} every single day.',
    '{N} is on a mission to {V} {A} and help them {O}.',
    'We exist at {N} to {V} {A} — so they can {O}, today and for generations to come.',
  ],
  concise: [
    '{N}: we {V} {A} to help them {O}.',
    'Helping {A} {O} — that\u2019s what {N} is here for.',
    '{N} {V_plural} {A} so they can {O}.',
  ],
  customer: [
    'At {N}, we put {A} first — we {V} you so you can {O}.',
    '{N} is here for {A}: to {V} them, every step of the way to {O}.',
    'Everything {N} does serves one goal — to {V} {A} as they {O}.',
  ],
  bold: [
    '{N} is rewriting how {A} {O}. We {V} them — no exceptions.',
    '{N} exists for one reason: to {V} {A} and help them {O} like never before.',
    'We refuse to settle at {N}. We {V} {A} so they can {O} on their own terms.',
  ],
};

const ICONS = ['🎯','🚀','🌱','💼','⭐','🛡️','📈','💜','🌍','⚡'];

function pick(a){return a[Math.floor(Math.random()*a.length)];}
function shuffle(a){return a.slice().sort(()=>Math.random()-0.5);}

function verbBase(v){return v;}

function run(){
  const N = ($('#name').value.trim()) || (GZI18n.getLang()==='zh'?'我们':'We');
  const industry = $('#industry').value;
  const tone = $('#tone').value;
  const V = VERBS[industry] || VERBS.general;
  const A = AUDIENCES[industry] || AUDIENCES.general;
  const O = OUTCOMES[industry] || OUTCOMES.general;
  const templates = TEMPLATES[tone] || TEMPLATES.formal;

  const out = [];
  // 6 from chosen tone template
  for (let i=0;i<8;i++){
    const tpl = pick(templates);
    const v = pick(V), a = pick(A), o = pick(O);
    let text = tpl
      .replace(/\{N\}/g, N)
      .replace(/\{V\}/g, v)
      .replace(/\{V_plural\}/g, v + (v.endsWith('s')||v.endsWith('x')?'es':'s'))
      .replace(/\{A\}/g, a)
      .replace(/\{O\}/g, o);
    out.push({text, meta: tone, icon: pick(ICONS)});
  }
  // 3 from each other tone (mix for variety)
  Object.keys(TEMPLATES).filter(k=>k!==tone).forEach(tk => {
    const tpl = pick(TEMPLATES[tk]);
    const v = pick(V), a = pick(A), o = pick(O);
    const text = tpl
      .replace(/\{N\}/g, N)
      .replace(/\{V\}/g, v)
      .replace(/\{V_plural\}/g, v + (v.endsWith('s')||v.endsWith('x')?'es':'s'))
      .replace(/\{A\}/g, a)
      .replace(/\{O\}/g, o);
    out.push({text, meta: tk, icon: pick(ICONS)});
  });

  // Dedupe
  const seen = new Set(); const dedup = [];
  for (const r of out){
    const k = r.text.toLowerCase().replace(/\s+/g,' ');
    if (seen.has(k)) continue;
    seen.add(k); dedup.push(r);
  }
  for (let i=dedup.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[dedup[i],dedup[j]]=[dedup[j],dedup[i]];}
  window._list = dedup;
  $('#results').innerHTML = dedup.map((r,i)=>`
    <div class="ms-card" onclick="copyAt(${i})">
      <span class="icon">${r.icon}</span>
      <div class="body">
        <div class="title">${esc(r.text)}</div>
        <div class="meta">${r.meta}</div>
      </div>
      <button class="copy" id="bcopy${i}" onclick="event.stopPropagation();copyAt(${i})">${GZ.t('copy')}</button>
    </div>`).join('');
  $('#count').textContent = GZI18n.getLang()==='zh' ? `已生成 ${dedup.length} 条` : `${dedup.length} statements generated`;
}
function copyAt(i){copyText(window._list[i].text);}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

$('#btn-gen').textContent=t('btnGen');$('#btn-gen').addEventListener('click',run);
$('#btn-example').textContent=t('btnExample');
$('#btn-example').addEventListener('click',()=>{$('#name').value='Brightwater';$('#industry').value='nonprofit';$('#tone').value='inspirational';run();});
$('#name').placeholder=t('phName');
$('#lbl-name').textContent=t('lblName');
$('#lbl-industry').textContent=t('lblIndustry');
$('#lbl-tone').textContent=t('lblTone');
$('#tip').textContent=t('tip');
$('#name').addEventListener('keydown',e=>{if(e.key==='Enter')run();});

GZ.renderToolPage({
  category:'text',
  titleKey:'toolTitle',
  descKey:'toolDesc',
  howToSteps:['step1','step2','step3','step4'],
  related:[
    {icon:'🔒',href:'/text/nda-generator.html',name:'NDA Generator'},
    {icon:'🤝',href:'/text/independent-contractor-agreement.html',name:'Contractor Agmt'},
    {icon:'💼',href:'/text/business-name-generator.html',name:'Business Name'},
    {icon:'🎯',href:'/text/tagline-generator.html',name:'Tagline Gen'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
