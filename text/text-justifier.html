const { $, copyText, t } = GZ;

function wordWrap(text, width) {
  const paragraphs = text.split(/\n\s*\n/);
  return paragraphs.map(para => {
    const words = para.trim().split(/\s+/);
    const lines = [];
    let line = '';
    for (const w of words) {
      if (!line) line = w;
      else if (line.length + 1 + w.length <= width) line += ' ' + w;
      else { lines.push(line); line = w; }
    }
    if (line) lines.push(line);
    return lines;
  });
}

function fullJustify(lines, width) {
  return lines.map((line, i) => {
    if (i === lines.length - 1) return line;
    if (line.length >= width) return line;
    const words = line.split(' ');
    if (words.length === 1) return words[0].padEnd(width);
    const totalSpaces = width - words.reduce((s, w) => s + w.length, 0);
    const gaps = words.length - 1;
    const spacePer = Math.floor(totalSpaces / gaps);
    let extra = totalSpaces % gaps;
    let result = words[0];
    for (let g = 1; g < words.length; g++) {
      result += ' '.repeat(spacePer + (extra > 0 ? 1 : 0));
      extra--;
      result += words[g];
    }
    return result;
  }).join('\n');
}

function leftAlign(lines, width) {
  return lines.join('\n');
}

function rightAlign(lines, width) {
  return lines.map(l => l.padStart(width)).join('\n');
}

function centerAlign(lines, width) {
  return lines.map(l => {
    const pad = Math.floor((width - l.length) / 2);
    return ' '.repeat(Math.max(pad, 0)) + l;
  }).join('\n');
}

function process() {
  const text = $('#input').value;
  if (!text.trim()) { $('#output').innerHTML = ''; $('#status').innerHTML = ''; return; }
  const width = Math.max(10, parseInt($('#opt-width').value) || 72);
  const mode = $('#opt-mode').value;
  const paragraphs = wordWrap(text, width);
  const result = paragraphs.map(lines => {
    if (mode === 'full') return fullJustify(lines, width);
    if (mode === 'right') return rightAlign(lines, width);
    if (mode === 'center') return centerAlign(lines, width);
    return leftAlign(lines, width);
  }).join('\n\n');
  $('#output').textContent = result;
  $('#status').innerHTML = `<span style="color:var(--gz-success)">✓ ${width} chars wide, ${result.split('\n').length} lines</span>`;
}

  process();
}

function doClear() { $('#input').value = ''; $('#output').innerHTML = ''; $('#status').innerHTML = ''; }

$('#input').addEventListener('input', process);
