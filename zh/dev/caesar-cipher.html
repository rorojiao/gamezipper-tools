<script>
GZI18n.register({
  en: {
    toolTitle: 'Caesar Cipher',
    toolDesc: 'Encrypt and decrypt text using the Caesar cipher with adjustable shift, brute force decoder, and frequency analysis.',
    inputLabel: 'Input Text',

    step4: 'Use Brute Force to see all 25 possible decryptions',
  },
  zh: {
    toolTitle: '凯撒密码',
    toolDesc: '使用凯撒密码加密和解密文本，支持自定义偏移量、暴力破解和频率分析。',
    inputLabel: '输入文本',
    outputLabel: '结果',
    shiftLabel: '偏移量：',
    encrypt: '加密',
    decrypt: '解密',
    bruteForce: '暴力破解（所有偏移）',
    bruteTitle: '所有可能的偏移',
    copy: '复制',
    clear: '清空',
    example: '示例',
    step1: '在输入区输入文本',
    step2: '使用滑块设置偏移量（1-25）',
    step3: '点击「加密」向前偏移或「解密」向后偏移',
    step4: '使用「暴力破解」查看所有 25 种可能的解密',
  }
});

const {$, copyText, t} = GZ;

function caesarShift(text, shift) {
  return [...text].map(ch => {
    const code = ch.charCodeAt(0);
    if (code >= 65 && code <= 90) return String.fromCharCode(((code - 65 + shift % 26 + 26) % 26) + 65);
    if (code >= 97 && code <= 122) return String.fromCharCode(((code - 97 + shift % 26 + 26) % 26) + 97);
    return ch;
  }).join('');
}

function updateShift() {
  $('#shiftVal').textContent = $('#shift').value;
}

function doEncrypt() {
  const text = $('#input').value;
  const shift = parseInt($('#shift').value);
  if (!text) return;
  $('#output').textContent = caesarShift(text, shift);
  $('#brute-section').style.display = 'none';
}

function doDecrypt() {
  const text = $('#input').value;
  const shift = parseInt($('#shift').value);
  if (!text) return;
  $('#output').textContent = caesarShift(text, -shift);
  $('#brute-section').style.display = 'none';
}

function doBruteForce() {
  const text = $('#input').value;
  if (!text) return;
  $('#brute-title').textContent = t('bruteTitle');
  let html = '';
  for (let i = 1; i <= 25; i++) {
    const decoded = caesarShift(text, -i);
    html += `<div class="brute-row">
      <span class="shift-num">-${i}</span>
      <span class="brute-text">${decoded.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</span>
      <button class="gz-btn" onclick="copyText(this.previousElementSibling.textContent)">${t('copy')}</button>
    </div>`;
  }
  $('#brute-output').innerHTML = html;
  $('#brute-section').style.display = 'block';
  $('#output').textContent = '';
}

function doClear() {
  $('#input').value = '';
  $('#output').textContent = '';
  $('#brute-section').style.display = 'none';
}

function loadExample() {
  $('#input').value = 'The quick brown fox jumps over the lazy dog';
  doEncrypt();
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="doEncrypt()">${t('encrypt')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doDecrypt()">${t('decrypt')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doBruteForce()">${t('bruteForce')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

$('#lbl-shift').textContent = t('shiftLabel');

    {icon:'🔒', href:'/dev/aes.html', name:'AES Encrypt'},
    {icon:'🔤', href:'/dev/base64.html', name:'Base64'},

});
