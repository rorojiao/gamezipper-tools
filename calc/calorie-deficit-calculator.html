<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"What is a calorie deficit?","acceptedAnswer":{"@type":"Answer","text":"A calorie deficit means eating fewer calories than your body burns each day. When you maintain a deficit, your body uses stored fat for energy, leading to weight loss over time."}},{"@type":"Question","name":"How much of a calorie deficit is safe?","acceptedAnswer":{"@type":"Answer","text":"A deficit of 500 calories per day is generally considered safe and sustainable, leading to about 1 pound (0.45 kg) of weight loss per week. Deficits over 1000 calories per day should only be attempted under medical supervision."}},{"@type":"Question","name":"How many calories are in one pound of fat?","acceptedAnswer":{"@type":"Answer","text":"One pound of body fat contains approximately 3500 calories. To lose 1 pound per week, you need a daily deficit of about 500 calories (3500 ÷ 7 = 500)."}},{"@type":"Question","name":"What is TDEE?","acceptedAnswer":{"@type":"Answer","text":"TDEE (Total Daily Energy Expenditure) is the total number of calories your body burns each day, including your basal metabolic rate (BMR) plus all physical activity. It is the maintenance calorie level."}}]}</script>

<script>
GZI18n.register({
  en: {
    toolTitle: 'Calorie Deficit Calculator',
    toolDesc: 'Calculate your daily calorie deficit for safe, sustainable weight loss. Enter your stats and goal to see TDEE, target calories, macros and timeline.',

    goalPh: 'e.g. 68',
    enterValid: 'Please enter valid values for all fields.',

    step1: 'Enter your gender, age, weight and height',
    step2: 'Select your daily activity level',
    step3: 'Choose your weight loss rate (0.25–1 kg/week)',
    step4: 'See your TDEE, target calories, macros and timeline',
  },
  zh: {
    toolTitle: '热量缺口计算器',
    toolDesc: '计算每日热量缺口，安全可持续地减脂。输入数据和目标即可查看 TDEE、目标摄入、宏量营养素和时间线。',
    gender: '性别',
    male: '男', female: '女',
    age: '年龄', agePh: '岁',
    weight: '当前体重', weightPh: '如 75',
    height: '身高', heightPh: '如 175',
    unit: '单位制',
    metric: '公制 (kg/cm)',
    imperial: '英制 (lb/in)',
    activity: '活动水平',
    sedentary: '久坐 (几乎不运动)',
    light: '轻度 (每周 1-3 天)',
    moderate: '中度 (每周 3-5 天)',
    active: '活跃 (每周 6-7 天)',
    veryActive: '极度活跃 (每天高强度)',
    goalRate: '减脂目标',
    lose025: '每周减 0.25 kg (0.5 磅) — 温和',
    lose05: '每周减 0.5 kg (1 磅) — 标准',
    lose075: '每周减 0.75 kg (1.5 磅) — 进取',
    lose1: '每周减 1 kg (2 磅) — 激进',
    calculate: '计算',
    tdee: 'TDEE (维持热量)',
    bmr: 'BMR 基础代谢',
    target: '每日目标摄入',
    deficit: '每日热量缺口',
    protein: '蛋白质', carbs: '碳水', fat: '脂肪',
    timeToGoal: '达到目标所需时间',
    weeksToLose: '周减去',
    kcal: '千卡/天', g: '克',
    enterGoal: '目标体重 (可选)',
    goalPh: '如 68',
    enterValid: '请输入所有字段的有效值。',
    tooLow: '警告：此目标低于女性 1200 千卡或男性 1500 千卡。请在医生指导下进行。',
    step1: '输入性别、年龄、体重和身高',
    step2: '选择每日活动水平',
    step3: '选择减脂速度（每周 0.25–1 kg）',
    step4: '查看 TDEE、目标摄入、宏量营养素和时间线',
  }
});

const { $, t } = GZ;

const ACT = { sedentary: 1.2, light: 1.375, moderate: 1.55, active: 1.725, veryActive: 1.9 };
const DEFICITS = { lose025: 250, lose05: 500, lose075: 750, lose1: 1000 };

$('#app').innerHTML = `
  <div class="gz-field">
    <label>${t('gender')}</label>
    <div class="gz-radio-group">
      <label><input type="radio" name="gender" value="male" checked> ${t('male')}</label>
      <label><input type="radio" name="gender" value="female"> ${t('female')}</label>
    </div>
  </div>
  <div class="gz-field">
    <label>${t('unit')}</label>
    <select id="unit" onchange="toggleUnits()">
      <option value="metric">${t('metric')}</option>
      <option value="imperial">${t('imperial')}</option>
    </select>
  </div>
  <div style="display:flex;gap:12px;flex-wrap:wrap">
    <div class="gz-field" style="flex:1;min-width:120px">
      <label>${t('age')}</label>
      <input type="number" id="age" placeholder="${t('agePh')}" value="30">
    </div>
    <div class="gz-field" style="flex:1;min-width:120px">
      <label id="w-lbl">${t('weight')} (kg)</label>
      <input type="number" id="weight" placeholder="${t('weightPh')}" value="75">
    </div>
    <div class="gz-field" style="flex:1;min-width:120px">
      <label id="h-lbl">${t('height')} (cm)</label>
      <input type="number" id="height" placeholder="${t('heightPh')}" value="175">
    </div>
  </div>
  <div class="gz-field">
    <label>${t('activity')}</label>
    <select id="activity">
      <option value="sedentary">${t('sedentary')}</option>
      <option value="light">${t('light')}</option>
      <option value="moderate" selected>${t('moderate')}</option>
      <option value="active">${t('active')}</option>
      <option value="veryActive">${t('veryActive')}</option>
    </select>
  </div>
  <div class="gz-field">
    <label>${t('goalRate')}</label>
    <select id="goalRate">
      <option value="lose025">${t('lose025')}</option>
      <option value="lose05" selected>${t('lose05')}</option>
      <option value="lose075">${t('lose075')}</option>
      <option value="lose1">${t('lose1')}</option>
    </select>
  </div>
  <div class="gz-field">
    <label id="goal-lbl">${t('enterGoal')} (kg)</label>
    <input type="number" id="goalWeight" placeholder="${t('goalPh')}">
  </div>
  <button class="gz-btn" onclick="calc()" style="width:100%;max-width:400px;font-size:1.05em;padding:12px">${t('calculate')}</button>
  <div id="result"></div>
`;

function toggleUnits() {
  const u = $('#unit').value;
  if (u === 'metric') {
    $('#w-lbl').textContent = t('weight') + ' (kg)';
    $('#h-lbl').textContent = t('height') + ' (cm)';
    $('#goal-lbl').textContent = t('enterGoal') + ' (kg)';
  } else {
    $('#w-lbl').textContent = t('weight') + ' (lb)';
    $('#h-lbl').textContent = t('height') + ' (in)';
    $('#goal-lbl').textContent = t('enterGoal') + ' (lb)';
  }
}

function calc() {
  const gender = document.querySelector('input[name=gender]:checked').value;
  const unit = $('#unit').value;
  let age = +$('#age').value;
  let weight = +$('#weight').value;
  let height = +$('#height').value;
  const activity = $('#activity').value;
  const goalRate = $('#goalRate').value;
  let goalWeight = +$('#goalWeight').value;

  if (!age || !weight || !height || age < 1 || weight < 1 || height < 1) {
    $('#result').innerHTML = `<div class="warn">${t('enterValid')}</div>`;
    return;
  }

  // Convert to metric for calculations
  let wKg = unit === 'imperial' ? weight * 0.453592 : weight;
  let hCm = unit === 'imperial' ? height * 2.54 : height;
  if (goalWeight) goalWeight = unit === 'imperial' ? goalWeight * 0.453592 : goalWeight;

  // Mifflin-St Jeor
  let bmr;
  if (gender === 'male') {
    bmr = 10 * wKg + 6.25 * hCm - 5 * age + 5;
  } else {
    bmr = 10 * wKg + 6.25 * hCm - 5 * age - 161;
  }
  const tdee = Math.round(bmr * ACT[activity]);
  const deficit = DEFICITS[goalRate];
  const target = tdee - deficit;

  // Macros: 40% protein, 30% carbs, 30% fat
  const proteinCals = target * 0.30;
  const carbCals = target * 0.40;
  const fatCals = target * 0.30;
  const proteinG = Math.round(proteinCals / 4);
  const carbG = Math.round(carbCals / 4);
  const fatG = Math.round(fatCals / 9);

  let warn = '';
  const minCals = gender === 'male' ? 1500 : 1200;
  if (target < minCals) {
    warn = `<div class="warn">${t('tooLow')}</div>`;
  }

  let timeline = '';
  if (goalWeight && goalWeight < wKg) {
    const kgToLose = wKg - goalWeight;
    const kgPerWeek = { lose025: 0.25, lose05: 0.5, lose075: 0.75, lose1: 1.0 }[goalRate];
    const weeks = Math.ceil(kgToLose / kgPerWeek);
    timeline = `<div class="result-item"><div class="val">${weeks}</div><div class="lbl">${t('weeksToLose')} ${kgToLose.toFixed(1)} kg</div></div>`;
  }

  $('#result').innerHTML = `
    <div class="result-card">
      <div class="result-big">${target} <span style="font-size:1rem;color:var(--text2)">${t('kcal')}</span></div>
      <div class="lbl" style="color:var(--text2);font-size:.85em">${t('target')}</div>
      ${warn}
      <div class="result-grid">
        <div class="result-item"><div class="val">${tdee}</div><div class="lbl">${t('tdee')}</div></div>
        <div class="result-item"><div class="val">${Math.round(bmr)}</div><div class="lbl">${t('bmr')}</div></div>
        <div class="result-item"><div class="val">${deficit}</div><div class="lbl">${t('deficit')}</div></div>
        ${timeline}
      </div>
      <div style="margin-top:20px">
        <div style="font-weight:700;margin-bottom:6px">📊 Macros (40/30/30)</div>
        <div class="macro-bar">
          <div style="width:40%;background:#4ecdc4">${t('carbs')} ${carbG}${t('g')}</div>
          <div style="width:30%;background:#ff6b6b">${t('protein')} ${proteinG}${t('g')}</div>
          <div style="width:30%;background:#ffd93d;color:#333">${t('fat')} ${fatG}${t('g')}</div>
        </div>
      </div>
    </div>
  `;
}

$('#toolbar').innerHTML = ``;

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🔥', href:'/calc/tdee-calculator.html', name:'TDEE Calculator'},
    {icon:'🍎', href:'/calc/calorie-calculator.html', name:'Calorie Calculator'},
    {icon:'🥗', href:'/calc/macro-calculator.html', name:'Macro Calculator'},
    {icon:'⚖️', href:'/calc/bmi-calculator.html', name:'BMI Calculator'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
