<script>

  en: {

    step1: 'Paste your tab-separated (TSV) data in the input area',
    step2: 'Click Convert to generate CSV output',
    step3: 'Fields with commas or quotes are automatically wrapped in double quotes',
    step4: 'Copy or download the CSV result',
  },
  zh: {
    toolTitle: '制表符分隔 (TSV) 转 CSV 转换器',
    toolDesc: '即时将制表符分隔数据转换为标准 CSV。自动处理引号字段、特殊字符和表头 — 符合 RFC 4180 标准。100% 浏览器本地运行。',
    convert: '转换',
    done: '✓ 转换成功',
    step1: '在输入区粘贴制表符分隔 (TSV) 数据',
    step2: '点击「转换」生成 CSV 输出',
    step3: '包含逗号或引号的字段会自动用双引号包裹',
    step4: '复制或下载 CSV 结果',
  }
});

const { $, copyText, t } = GZ;

function parseTSVLine(line) {
  const fields = [];
  let cur = '';
  let inQuotes = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (inQuotes) {
      if (ch === '"' && line[i + 1] === '"') { cur += '"'; i++; }
      else if (ch === '"') { inQuotes = false; }
      else { cur += ch; }
    } else {
      if (ch === '"') { inQuotes = true; }
      else if (ch === '\t') { fields.push(cur); cur = ''; }
      else { cur += ch; }
    }
  }
  fields.push(cur);
  return fields;
}

function csvField(val) {
  if (/[",\n\r]/.test(val)) {
    return '"' + val.replace(/"/g, '""') + '"';
  }
  return val;
}

function doConvert() {
  const inp = $('#input').value;
  if (!inp.trim()) { $('#output').value = ''; $('#status').innerHTML = ''; return; }
  const lines = inp.split(/\r?\n/).filter(l => l.length > 0);
  const csvLines = lines.map(line => {
    const fields = parseTSVLine(line);
    return fields.map(csvField).join(',');
  });
  $('#output').value = csvLines.join('\n') + '\n';
  $('#status').innerHTML = `<span style="color:var(--gz-success)">${t('done')} — ${lines.length} ${lines.length === 1 ? 'row' : 'rows'}</span>`;
}

function loadExample() {
  $('#input').value = 'Name\tAge\tCity\tNotes\nAlice\t30\tNew York\tLikes coffee\nBob\t25\tLondon, UK\t"Enjoys ""coding"""\nCarol\t28\tTokyo\tNo issues';
  doConvert();
}

function doClear() { $('#input').value = ''; $('#output').value = ''; $('#status').innerHTML = ''; }

$('#input').addEventListener('input', doConvert);

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="doConvert()">${t('convert')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn" onclick="copyText($('#output').value)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;
