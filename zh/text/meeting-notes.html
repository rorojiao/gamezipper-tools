.sec-h{font-size:.85em;color:var(--text2);margin:14px 0 6px;font-weight:600;text-transform:uppercase;letter-spacing:.05em}
textarea.wide{width:100%;background:var(--glass2);border:1px solid var(--border2);color:var(--text);border-radius:8px;padding:10px;font-family:inherit;font-size:.92em;min-height:80px;resize:vertical}

.action-row button{background:var(--glass);border:1px solid var(--border);color:var(--text2);border-radius:6px;cursor:pointer;font-size:1em}

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="meeting-meta">
      <label>Title<input id="m-title" type="text"></label>
      <label>Date<input id="m-date" type="date"></label>
      <label style="grid-column:span 2">Attendees<input id="m-attendees" type="text" placeholder="Alice, Bob, Carol"></label>
    </div>
    <div class="sec-h" id="lblAgenda"></div>
    <textarea id="m-agenda" class="wide"></textarea>
    <div class="sec-h" id="lblDiscussion"></div>
    <textarea id="m-discussion" class="wide"></textarea>
    <div class="sec-h" id="lblDecisions"></div>
    <textarea id="m-decisions" class="wide"></textarea>
    <div class="sec-h" id="lblActions"></div>
    <div id="actions"></div>
    <button class="gz-btn gz-btn-secondary" id="addActionBtn" style="margin-top:6px"></button>
    <div class="sec-h" id="lblNext"></div>
    <textarea id="m-next" class="wide"></textarea>
    <div class="sec-h" id="lblPreview"></div>
    <div id="output"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Meeting Notes Maker',
    toolDesc: 'Capture structured meeting notes — agenda, discussion, decisions and action items with owners and due dates. Auto-saves locally. Export to Markdown or print.',
    lblAgenda: 'Agenda',
    lblDiscussion: 'Discussion / Notes',
    lblDecisions: 'Decisions',
    lblActions: 'Action Items',
    lblNext: 'Next Meeting',
    lblPreview: 'Markdown Preview',
    addAction: '➕ Add Action Item',
    task: 'Task',
    owner: 'Owner',
    due: 'Due date',
    exportMd: '📋 Export Markdown',
    copy: '📋 Copy',
    print: '🖨 Print',
    clear: '🗑 Clear',
    step1: 'Enter the meeting title, date and attendees',
    step2: 'Fill in agenda, discussion and decisions',
    step3: 'Add action items with owner and due date',
    step4: 'Export as Markdown, copy or print to PDF',
    saved: 'Auto-saved',
  },
  zh: {
    toolTitle: '会议笔记工具',
    toolDesc: '结构化记录会议 — 议程、讨论、决定和行动项（含负责人和截止日期）。本地自动保存，导出 Markdown 或打印。',
    lblAgenda: '议程',
    lblDiscussion: '讨论 / 笔记',
    lblDecisions: '决定',
    lblActions: '行动项',
    lblNext: '下次会议',
    lblPreview: 'Markdown 预览',
    addAction: '➕ 添加行动项',
    task: '任务',
    owner: '负责人',
    due: '截止日期',
    exportMd: '📋 导出 Markdown',
    copy: '📋 复制',
    print: '🖨 打印',
    clear: '🗑 清空',
    step1: '输入会议标题、日期和参与者',
    step2: '填写议程、讨论和决定',
    step3: '添加行动项，指定负责人和截止日期',
    step4: '导出为 Markdown、复制或打印为 PDF',
    saved: '已自动保存',
  }
});

const { $, copyText, t } = GZ;
const LS_KEY = 'gz-meeting-notes';
let actions = [];

function load() {
  try {
    const s = JSON.parse(localStorage.getItem(LS_KEY) || '{}');
    $('#m-title').value = s.title||'';
    $('#m-date').value = s.date||new Date().toISOString().slice(0,10);
    $('#m-attendees').value = s.attendees||'';
    $('#m-agenda').value = s.agenda||'';
    $('#m-discussion').value = s.discussion||'';
    $('#m-decisions').value = s.decisions||'';
    $('#m-next').value = s.next||'';
    actions = Array.isArray(s.actions)?s.actions:[];
  } catch { $('#m-date').value = new Date().toISOString().slice(0,10); }
  renderActions();
  updatePreview();
}

function save() {
  const s = {
    title: $('#m-title').value, date: $('#m-date').value, attendees: $('#m-attendees').value,
    agenda: $('#m-agenda').value, discussion: $('#m-discussion').value, decisions: $('#m-decisions').value,
    next: $('#m-next').value, actions
  };
  localStorage.setItem(LS_KEY, JSON.stringify(s));
  updatePreview();
}

function renderActions() {
  $('#actions').innerHTML = actions.map((a,i)=>`
    <div class="action-row">
      <input placeholder="${t('task')}" value="${esc(a.task)}" oninput="actions[${i}].task=this.value;save()">
      <input placeholder="${t('owner')}" value="${esc(a.owner)}" oninput="actions[${i}].owner=this.value;save()">
      <input type="date" value="${esc(a.due)}" oninput="actions[${i}].due=this.value;save()">
      <button onclick="actions.splice(${i},1);renderActions();save()">✕</button>
    </div>`).join('');
}

function esc(s){return String(s||'').replace(/"/g,'&quot;').replace(/</g,'&lt;')}

function addAction(){ actions.push({task:'',owner:'',due:''}); renderActions(); save(); }

function buildMd() {
  const title = $('#m-title').value || 'Meeting Notes';
  const date = $('#m-date').value;
  const att = $('#m-attendees').value;
  let md = `# ${title}\n\n`;
  if (date) md += `**Date:** ${date}\n\n`;
  if (att) md += `**Attendees:** ${att}\n\n`;
  md += `---\n\n`;
  const agenda = $('#m-agenda').value.trim();
  if (agenda) md += `## Agenda\n\n${agenda}\n\n`;
  const disc = $('#m-discussion').value.trim();
  if (disc) md += `## Discussion\n\n${disc}\n\n`;
  const dec = $('#m-decisions').value.trim();
  if (dec) md += `## Decisions\n\n${dec}\n\n`;
  if (actions.some(a=>a.task.trim())) {
    md += `## Action Items\n\n`;
    md += `| Task | Owner | Due |\n| --- | --- | --- |\n`;
    actions.filter(a=>a.task.trim()).forEach(a=>{ md += `| ${a.task.replace(/\|/g,'\\|')} | ${a.owner.replace(/\|/g,'\\|')} | ${a.due} |\n`; });
    md += '\n';
  }
  const next = $('#m-next').value.trim();
  if (next) md += `## Next Meeting\n\n${next}\n`;
  return md.trim();
}

function updatePreview(){ $('#output').textContent = buildMd(); }

['m-title','m-date','m-attendees','m-agenda','m-discussion','m-decisions','m-next'].forEach(id=>{
  document.addEventListener('input', e=>{ if(e.target.id===id) save(); });
});

$('#addActionBtn').textContent = t('addAction');
$('#addActionBtn').onclick = addAction;

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="copyText(buildMd())">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="const b=new Blob([buildMd()],{type:'text/markdown'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download='meeting-notes.md';a.click();URL.revokeObjectURL(u)">${t('exportMd')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="window.print()">${t('print')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="if(confirm('Clear all fields?')){['m-title','m-attendees','m-agenda','m-discussion','m-decisions','m-next'].forEach(id=>\$('#'+id).value='');actions=[];renderActions();save()}">${t('clear')}</button>`;

$('#lblAgenda').textContent = t('lblAgenda');
$('#lblDiscussion').textContent = t('lblDiscussion');
$('#lblDecisions').textContent = t('lblDecisions');
$('#lblActions').textContent = t('lblActions');
$('#lblNext').textContent = t('lblNext');
$('#lblPreview').textContent = t('lblPreview');

load();

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📝', href:'/text/daily-planner.html', name:'Daily Planner'},
    {icon:'📝', href:'/text/pomodoro-timer.html', name:'Pomodoro'},
    {icon:'📝', href:'/fun/kanban-board.html', name:'Kanban'},
    {icon:'📝', href:'/text/checklist.html', name:'Checklist'},
  ]
});
</script>
<script src="/tools-result-rec.js?v=20260707v520" defer></script>
</body>
</html>
