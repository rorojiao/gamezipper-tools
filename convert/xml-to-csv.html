const {$,t,copyText}=GZ;

function csvField(v,delim){
  v=(v==null?'':String(v));
  if(v.indexOf(delim)>=0||v.indexOf('"')>=0||v.indexOf('\n')>=0||v.indexOf('\r')>=0){
    return '"'+v.replace(/"/g,'""')+'"';
  }
  return v;
}

function flattenNode(node,prefix,res){
  // attributes
  if(node.attributes&&node.attributes.length){
    for(const a of node.attributes){
      res[(prefix?prefix+'/':'')+ '@'+a.name]=a.value;
    }
  }
  let hasElementChild=false;
  for(const child of node.children){
    hasElementChild=true;
    const key=(prefix?prefix+'/':'')+child.localName;
    const textKids=child.textContent;
    if(child.children.length){flattenNode(child,key,res);}
    else{
      // aggregate repeated siblings under same key with ';'
      if(res[key]!==undefined)res[key]+='; '+textKids;
      else res[key]=textKids;
    }
  }
  if(!hasElementChild&&node.childNodes.length){
    // text node only
    const txt=node.textContent;
    if(prefix)res[prefix]=txt;
  }
  return res;
}

function pickRecordName(doc){
  // find the element whose child has the most repeating same-name grandchildren
  const counts={};
  const all=doc.getElementsByTagName('*');
  for(const el of all){
    const n=el.localName;
    counts[n]=(counts[n]||0)+1;
  }
  // choose the name with highest count > 1 that isn't the root
  let best=null,bestN=0;
  for(const n in counts){if(counts[n]>bestN){bestN=counts[n];best=n;}}
  return best;
}

function doConvert(){
  const inp=$('#input').value.trim();
  if(!inp){$('#output').value='';$('#status').innerHTML=`<span style="color:var(--gz-text-muted)">${t('empty')}</span>`;return;}
  const parser=new DOMParser();
  const doc=parser.parseFromString(inp,'application/xml');
  if(doc.getElementsByTagName('parsererror').length){
    const pe=doc.getElementsByTagName('parsererror')[0];
    $('#status').innerHTML=`<span style="color:var(--gz-accent)">${t('invalid')} ${pe.textContent.split('\n')[0]}</span>`;return;
  }
  let rowName=$('#rowName').value.trim();
  if(!rowName)rowName=pickRecordName(doc);
  let records=[];
  if(rowName){
    const nodes=doc.getElementsByTagName(rowName);
    for(const n of nodes){records.push(flattenNode(n,'',{}));}
  }
  if(records.length===0){
    // fallback: treat root children as records
    const root=doc.documentElement;
    if(root){records.push(flattenNode(root,'',{}));}
  }
  // collect headers preserving first-seen order
  const headers=[];
  const seen={};
  records.forEach(r=>{for(const k in r){if(!seen[k]){seen[k]=1;headers.push(k);}}});
  const delim=$('#delim').value||',';
  let csv='';
  if($('#headerChk').checked)csv+=headers.map(h=>csvField(h,delim)).join(delim)+'\n';
  records.forEach(r=>{csv+=headers.map(h=>csvField(r[h]||'',delim)).join(delim)+'\n';});
  $('#output').value=csv.trimEnd();
  $('#status').innerHTML=`<span style="color:var(--gz-success)">${t('done').replace('{n}',records.length)}</span>`;
}

function download(){
  const out=$('#output').value;if(!out)return;
  const blob=new Blob([out],{type:'text/csv'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='converted.csv';a.click();
  URL.revokeObjectURL(url);
}

</catalog>`;
  $('#rowName').value='product';

}
