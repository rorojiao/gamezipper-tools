function render(query) {
  const q = (query || '').trim().toLowerCase().replace('+','');
  const lang = GZI18n.getLang();
  const matches = q ? CODES.filter(c =>
    c[1].toLowerCase().includes(q) ||
    c[2].includes(query.trim()) ||
    c[0].toLowerCase() === q ||
    c[3].replace('+','').includes(q)
  ) : CODES;
  if (!matches.length) { $('#results').innerHTML = `<div class="empty">${t('noResults')}</div>`; return; }
  $('#results').innerHTML = `<table class="phone-table"><thead><tr>
    <th>${t('flag')}</th><th>${t('country')}</th><th>${t('iso')}</th><th>${t('dial')}</th>
  </tr></thead><tbody>` + matches.map(c =>
    `<tr>
      <td><span class="flag">${flag(c[0])}</span></td>
      <td>${lang==='zh'?c[2]:c[1]}</td>
      <td class="iso">${c[0]}</td>
      <td><span class="dial" onclick="cp(this,'${c[3]}')">${c[3]}</span></td>
    </tr>`).join('') + '</tbody></table>';
}

function cp(el, txt) {
  copyText(txt);
  showToast(t('copied'));
  const orig = el.textContent;
  el.dataset.orig = el.dataset.orig || orig;
  el.textContent = '✓';
  setTimeout(() => { el.textContent = el.dataset.orig; }, 700);
}
