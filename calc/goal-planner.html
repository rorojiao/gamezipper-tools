<style>
.gp-goal{background:var(--glass);border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:14px}
.gp-goal.done{border-color:var(--success,#00d672);background:rgba(0,214,114,.05)}
.gp-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:10px}
@media(max-width:600px){.gp-row{grid-template-columns:1fr}}
.gp-field label{display:block;font-size:.76rem;color:var(--text2);font-weight:600;margin-bottom:5px;text-transform:uppercase;letter-spacing:.04em}
.gp-field input,.gp-field select,.gp-field textarea{width:100%;padding:9px 11px;border-radius:8px;border:1px solid var(--border);background:var(--glass2);color:var(--text);font-size:.92rem;font-family:inherit}
.gp-field textarea{resize:vertical;min-height:54px}
.gp-smart{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin:12px 0}
@media(max-width:700px){.gp-smart{grid-template-columns:1fr 1fr}}
.gp-smart .box{padding:10px;border-radius:10px;background:var(--glass2);border:1px solid var(--border);font-size:.8rem}
.gp-smart .box b{color:var(--accent);font-size:.82rem}
.gp-smart .box span{display:block;color:var(--text2);font-size:.78rem;margin-top:3px;line-height:1.4}
.gp-progress{margin:12px 0}
.gp-progress .bar{height:10px;background:var(--glass2);border-radius:6px;overflow:hidden}
.gp-progress .bar>i{display:block;height:100%;background:linear-gradient(90deg,var(--accent),#7eead0);transition:width .3s}
.gp-progress .meta{display:flex;justify-content:space-between;font-size:.78rem;color:var(--text2);margin-top:5px}
.gp-ms{display:flex;flex-direction:column;gap:7px;margin-top:8px}
.gp-ms-item{display:flex;align-items:center;gap:10px;padding:9px 12px;background:var(--glass2);border:1px solid var(--border);border-radius:10px;font-size:.86rem}
.gp-ms-item input[type=checkbox]{margin:0;width:18px;height:18px;cursor:pointer}
.gp-ms-item.done{opacity:.55;text-decoration:line-through}
.gp-ms-item .date{margin-left:auto;font-size:.74rem;color:var(--text2);white-space:nowrap}
.gp-add-ms{display:flex;gap:8px;margin-top:8px}
.gp-add-ms input{flex:1;padding:8px 10px;border-radius:8px;border:1px solid var(--border);background:var(--glass2);color:var(--text);font-size:.85rem;font-family:inherit}
.gp-add-ms button{padding:8px 14px;font-size:.82rem}
.gp-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.gp-empty{text-align:center;padding:30px 20px;color:var(--text2);background:var(--glass);border:1px dashed var(--border);border-radius:14px}
</style>

<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is a SMART goal?", "acceptedAnswer": {"@type": "Answer", "text": "A SMART goal is Specific, Measurable, Achievable, Relevant and Time-bound. This framework turns vague wishes like 'get fit' into concrete commitments like 'run a 5K in under 30 minutes by September 30'."}}, {"@type": "Question", "name": "How does the goal tracker work?", "acceptedAnswer": {"@type": "Answer", "text": "Create a goal, fill in the five SMART fields, set a target date and break it into milestones. Tick off milestones as you go and watch the progress bar fill. Everything is saved to your browser automatically."}}, {"@type": "Question", "name": "Can I track multiple goals at once?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. Add as many goals as you like — fitness, career, learning, finance or New Year resolutions. Each goal has its own milestones, progress bar and target date."}}, {"@type": "Question", "name": "Is my goal data private?", "acceptedAnswer": {"@type": "Answer", "text": "Completely. All goals and milestones are stored in your browser's localStorage. Nothing is uploaded to any server and there is no account or signup."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div id="goals"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'SMART Goal Tracker & Planner',
    toolDesc: 'Set Specific, Measurable, Achievable, Relevant and Time-bound goals. Break them into milestones, track progress visually and stay motivated. Auto-saved locally — no signup.',
    addGoal: '+ Add New Goal',
    goalName: 'Goal name',
    goalNamePh: 'e.g. Run a 5K under 30 min',
    category: 'Category',
    targetDate: 'Target date',
    catFit: 'Fitness', catCareer: 'Career', catLearn: 'Learning', catFinance: 'Finance', catLife: 'Lifestyle', catOther: 'Other',
    smartTitle: 'SMART breakdown',
    sSpecific: 'Specific — what exactly?',
    sMeasurable: 'Measurable — how to track?',
    sAchievable: 'Achievable — realistic?',
    sRelevant: 'Relevant — why it matters',
    sTime: 'Time-bound — deadline',
    milestones: 'Milestones',
    addMs: 'Add',
    msPh: 'Add a milestone…',
    msDatePh: 'date',
    progress: 'progress',
    daysLeft: 'days left',
    daysAgo: 'days overdue',
    done: 'done',
    dueToday: 'due today',
    delete: 'Delete',
    noGoals: 'No goals yet. Click “Add New Goal” to get started on your first SMART goal.',
    step1: 'Click “Add New Goal” and give it a name and target date',
    step2: 'Fill in the five SMART fields to make your goal concrete',
    step3: 'Break the goal into milestones and tick them off as you progress',
    step4: 'Everything auto-saves to your browser — come back any time',
  },
  zh: {
    toolTitle: 'SMART 目标追踪与规划器',
    toolDesc: '设定具体（Specific）、可衡量（Measurable）、可达成（Achievable）、相关（Relevant）、有时限（Time-bound）的目标。拆解为里程碑，可视化跟踪进度。本地自动保存 — 无需注册。',
    addGoal: '+ 添加新目标',
    goalName: '目标名称',
    goalNamePh: '如：30 分钟内跑完 5 公里',
    category: '分类',
    targetDate: '目标日期',
    catFit: '健身', catCareer: '职业', catLearn: '学习', catFinance: '财务', catLife: '生活方式', catOther: '其他',
    smartTitle: 'SMART 分解',
    sSpecific: '具体 — 到底做什么？',
    sMeasurable: '可衡量 — 如何追踪？',
    sAchievable: '可达成 — 现实吗？',
    sRelevant: '相关 — 为什么重要',
    sTime: '有时限 — 截止日期',
    milestones: '里程碑',
    addMs: '添加',
    msPh: '添加里程碑…',
    msDatePh: '日期',
    progress: '进度',
    daysLeft: '天后到期',
    daysAgo: '天已逾期',
    done: '已完成',
    dueToday: '今天到期',
    delete: '删除',
    noGoals: '还没有目标。点击「添加新目标」开始你的第一个 SMART 目标。',
    step1: '点击「添加新目标」，输入名称和目标日期',
    step2: '填写 5 个 SMART 字段让目标更具体',
    step3: '将目标拆解为里程碑，完成后逐项勾选',
    step4: '所有内容自动保存到浏览器 — 随时回来查看',
  }
});

const { $, t } = GZ;
const LS_KEY = 'gz-goal-planner-v1';
let goals = [];

function load(){ try{ const s = JSON.parse(localStorage.getItem(LS_KEY)); if(Array.isArray(s)) goals = s; }catch(e){} }
function save(){ try{ localStorage.setItem(LS_KEY, JSON.stringify(goals)); }catch(e){} }

function newGoal(){
  return { id: Date.now()+''+Math.random().toString(36).slice(2,6), name:'', cat:'fit', date:'', smart:{s:'',m:'',a:'',r:'',t:''}, ms:[] };
}

function pct(g){
  if(!g.ms.length) return 0;
  return Math.round(g.ms.filter(m=>m.done).length / g.ms.length * 100);
}

function render(){
  const wrap = $('#goals');
  if(!goals.length){ wrap.innerHTML = `<div class="gp-empty">${t('noGoals')}</div>`; return; }
  wrap.innerHTML = goals.map((g,idx)=>{
    const p = pct(g);
    const isDone = p === 100;
    let daysInfo = '';
    if(g.date){
      const target = new Date(g.date); const now = new Date(); now.setHours(0,0,0,0);
      const diff = Math.round((target - now)/86400000);
      if(diff > 0) daysInfo = `${diff} ${t('daysLeft')}`;
      else if(diff === 0) daysInfo = t('dueToday');
      else daysInfo = `${-diff} ${t('daysAgo')}`;
    }
    return `<div class="gp-goal ${isDone?'done':''}">
      <div class="gp-row">
        <div class="gp-field"><label>${t('goalName')}</label><input type="text" value="${escapeHtml(g.name)}" placeholder="${t('goalNamePh')}" oninput="upd(${idx},'name',this.value)"></div>
        <div class="gp-field">
          <label>${t('category')}</label>
          <select onchange="upd(${idx},'cat',this.value)">
            ${[['fit','catFit'],['career','catCareer'],['learn','catLearn'],['finance','catFinance'],['life','catLife'],['other','catOther']].map(([k,kk])=>`<option value="${k}" ${g.cat===k?'selected':''}>${t(kk)}</option>`).join('')}
          </select>
        </div>
      </div>
      <div class="gp-field"><label>${t('targetDate')}</label><input type="date" value="${g.date||''}" oninput="upd(${idx},'date',this.value)" style="max-width:220px"></div>
      <div class="gp-smart">
        <div class="box"><b>S</b><span><input type="text" value="${escapeHtml(g.smart.s)}" placeholder="${t('sSpecific')}" oninput="updSmart(${idx},'s',this.value)" style="width:100%;border:none;background:transparent;color:var(--text);font-size:.82rem;padding:2px 0"></span></div>
        <div class="box"><b>M</b><span><input type="text" value="${escapeHtml(g.smart.m)}" placeholder="${t('sMeasurable')}" oninput="updSmart(${idx},'m',this.value)" style="width:100%;border:none;background:transparent;color:var(--text);font-size:.82rem;padding:2px 0"></span></div>
        <div class="box"><b>A</b><span><input type="text" value="${escapeHtml(g.smart.a)}" placeholder="${t('sAchievable')}" oninput="updSmart(${idx},'a',this.value)" style="width:100%;border:none;background:transparent;color:var(--text);font-size:.82rem;padding:2px 0"></span></div>
        <div class="box"><b>R</b><span><input type="text" value="${escapeHtml(g.smart.r)}" placeholder="${t('sRelevant')}" oninput="updSmart(${idx},'r',this.value)" style="width:100%;border:none;background:transparent;color:var(--text);font-size:.82rem;padding:2px 0"></span></div>
        <div class="box"><b>T</b><span><input type="text" value="${escapeHtml(g.smart.t)}" placeholder="${t('sTime')}" oninput="updSmart(${idx},'t',this.value)" style="width:100%;border:none;background:transparent;color:var(--text);font-size:.82rem;padding:2px 0"></span></div>
      </div>
      <div class="gp-progress">
        <div class="bar"><i style="width:${p}%"></i></div>
        <div class="meta"><span>${p}% ${t('progress')}${isDone?' · 🎉 '+t('done'):''}</span><span>${daysInfo}</span></div>
      </div>
      <div style="font-size:.8rem;color:var(--text2);font-weight:600;margin-top:6px">${t('milestones')}</div>
      <div class="gp-ms">
        ${g.ms.map((m,i)=>`<label class="gp-ms-item ${m.done?'done':''}"><input type="checkbox" ${m.done?'checked':''} onchange="toggleMs(${idx},${i},this.checked)"><span>${escapeHtml(m.name)}</span>${m.date?`<span class="date">${m.date}</span>`:''}</label>`).join('')}
      </div>
      <div class="gp-add-ms">
        <input type="text" placeholder="${t('msPh')}" id="msn-${idx}">
        <input type="date" id="msd-${idx}" style="max-width:150px">
        <button class="gz-btn" onclick="addMs(${idx})">${t('addMs')}</button>
      </div>
      <div class="gp-actions"><button class="gz-btn gz-btn-secondary" onclick="delGoal(${idx})">${t('delete')}</button></div>
    </div>`;
  }).join('');
}

function escapeHtml(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

window.upd = function(i,k,v){ goals[i][k]=v; save(); if(k==='name'||k==='date') render(); };
window.updSmart = function(i,k,v){ goals[i].smart[k]=v; save(); };
window.toggleMs = function(i,mi,v){ goals[i].ms[mi].done=v; save(); render(); };
window.addMs = function(i){
  const n = document.getElementById('msn-'+i).value.trim();
  const d = document.getElementById('msd-'+i).value;
  if(!n) return;
  goals[i].ms.push({ name:n, date:d, done:false });
  save(); render();
};
window.delGoal = function(i){ goals.splice(i,1); save(); render(); };

function addGoal(){ goals.unshift(newGoal()); save(); render(); }

load();
render();

$('#toolbar').innerHTML = `<button class="gz-btn" onclick="addGoal()">${t('addGoal')}</button>`;

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'⏳', href:'/calc/countdown-calculator.html', name:'Countdown Calculator'},
    {icon:'📅', href:'/calc/exam-countdown.html', name:'Exam Countdown'},
    {icon:'💍', href:'/calc/wedding-countdown.html', name:'Wedding Countdown'},
    {icon:'✅', href:'/text/todo-list-maker.html', name:'To-Do List'},
  ]
});
</script>
<script src="/tools-result-rec.js?v=20260707v520" defer></script>
</body>
</html>
