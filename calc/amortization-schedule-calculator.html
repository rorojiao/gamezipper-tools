<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"What is an amortization schedule?","acceptedAnswer":{"@type":"Answer","text":"An amortization schedule is a table showing each loan payment broken down into principal and interest portions, along with the remaining balance after each payment. Early payments are mostly interest, while later payments are mostly principal."}},{"@type":"Question","name":"How is the monthly payment calculated?","acceptedAnswer":{"@type":"Answer","text":"The monthly payment uses the standard amortization formula: M = P × r(1+r)^n / ((1+r)^n - 1), where P is the principal, r is the monthly interest rate (annual rate ÷ 12), and n is the total number of payments."}},{"@type":"Question","name":"Can I use this for mortgages and car loans?","acceptedAnswer":{"@type":"Answer","text":"Yes. This calculator works for any fixed-rate installment loan — mortgages, car loans, personal loans, and student loans. Just enter the loan amount, annual interest rate, and loan term in years."}},{"@type":"Question","name":"Does this include property taxes and insurance?","acceptedAnswer":{"@type":"Answer","text":"No. This calculator shows only the principal and interest (P&I) portion. For a full mortgage payment including taxes and insurance (PITI), add those costs separately to the monthly payment shown here."}}]}</script>

<script>
GZI18n.register({
  en: {
    toolTitle: 'Amortization Schedule Calculator',
    toolDesc: 'Generate a complete month-by-month amortization schedule for any loan. See principal, interest, and remaining balance for every payment.',
    lblAmount: 'Loan Amount ($)',
    lblRate: 'Annual Interest Rate (%)',
    lblYears: 'Loan Term (Years)',
    monthlyPayment: 'Monthly Payment',
    totalPaid: 'Total Paid',
    totalInterest: 'Total Interest',
    payoffDate: 'Payoff Date',
    month: '#',
    payment: 'Payment',
    principalCol: 'Principal',
    interestCol: 'Interest',
    balance: 'Balance',
    step1: 'Enter your loan amount (principal)',
    step2: 'Set the annual interest rate and loan term in years',
    step3: 'View the summary cards for monthly payment and totals',
    step4: 'Scroll the table to see every payment broken down',
  },
  zh: {
    toolTitle: '贷款摊销表计算器',
    toolDesc: '为任意贷款生成完整的逐月摊销表。查看每期还款的本金、利息和剩余余额。',
    lblAmount: '贷款金额 ($)',
    lblRate: '年利率 (%)',
    lblYears: '贷款期限（年）',
    monthlyPayment: '月供',
    totalPaid: '总还款',
    totalInterest: '总利息',
    payoffDate: '还清日期',
    month: '#',
    payment: '还款',
    principalCol: '本金',
    interestCol: '利息',
    balance: '余额',
    step1: '输入贷款金额（本金）',
    step2: '设置年利率和贷款期限（年）',
    step3: '查看摘要卡片中的月供和总额',
    step4: '滚动表格查看每期还款明细',
  }
});

const { $, t } = GZ;

function fmt(n) {
  if (isNaN(n)) return '—';
  return '$' + n.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function calc() {
  const principal = parseFloat($('#amount').value) || 0;
  const annualRate = parseFloat($('#rate').value) || 0;
  const years = parseFloat($('#years').value) || 0;

  if (principal <= 0 || years <= 0) {
    $('#summary').innerHTML = '';
    $('#tableWrap').innerHTML = '';
    return;
  }

  const monthlyRate = annualRate / 100 / 12;
  const numPayments = Math.round(years * 12);
  let monthlyPayment;

  if (monthlyRate === 0) {
    monthlyPayment = principal / numPayments;
  } else {
    monthlyPayment = principal * monthlyRate * Math.pow(1 + monthlyRate, numPayments) / (Math.pow(1 + monthlyRate, numPayments) - 1);
  }

  // Build schedule
  let balance = principal;
  let totalInterest = 0;
  const rows = [];
  const today = new Date();

  for (let i = 1; i <= numPayments; i++) {
    const interestPayment = balance * monthlyRate;
    let principalPayment = monthlyPayment - interestPayment;
    if (i === numPayments) principalPayment = balance; // adjust last payment
    balance -= principalPayment;
    totalInterest += interestPayment;
    const payDate = new Date(today.getFullYear(), today.getMonth() + i, 1);
    rows.push({
      num: i,
      date: payDate.toLocaleDateString('en', { year: 'numeric', month: 'short' }),
      payment: i === numPayments ? monthlyPayment + (principal - (monthlyPayment - interestPayment)) : monthlyPayment,
      principal: principalPayment,
      interest: interestPayment,
      balance: Math.max(0, balance),
    });
  }

  const totalPaid = principal + totalInterest;
  const payoffDate = new Date(today.getFullYear(), today.getMonth() + numPayments, 1);

  // Summary
  $('#summary').innerHTML =
    '<div class="card"><div class="label">' + t('monthlyPayment') + '</div><div class="value">' + fmt(monthlyPayment) + '</div></div>' +
    '<div class="card"><div class="label">' + t('totalPaid') + '</div><div class="value">' + fmt(totalPaid) + '</div></div>' +
    '<div class="card"><div class="label">' + t('totalInterest') + '</div><div class="value">' + fmt(totalInterest) + '</div></div>' +
    '<div class="card"><div class="label">' + t('payoffDate') + '</div><div class="value">' + payoffDate.toLocaleDateString('en', { year: 'numeric', month: 'short' }) + '</div></div>';

  // Table
  let html = '<table class="am-table"><thead><tr>' +
    '<th>' + t('month') + '</th>' +
    '<th>Date</th>' +
    '<th>' + t('payment') + '</th>' +
    '<th>' + t('principalCol') + '</th>' +
    '<th>' + t('interestCol') + '</th>' +
    '<th>' + t('balance') + '</th>' +
    '</tr></thead><tbody>';
  for (const r of rows) {
    html += '<tr><td>' + r.num + '</td><td style="text-align:right">' + r.date + '</td><td>' + fmt(r.payment) + '</td><td>' + fmt(r.principal) + '</td><td>' + fmt(r.interest) + '</td><td>' + fmt(r.balance) + '</td></tr>';
  }
  html += '</tbody></table>';
  $('#tableWrap').innerHTML = html;
}

['amount','rate','years'].forEach(id => {
  $('#' + id).addEventListener('input', calc);
});

calc();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🏦', href:'/calc/mortgage-calculator.html', name:'Mortgage Calc'},
    {icon:'💰', href:'/calc/loan-calculator.html', name:'Loan Calc'},
    {icon:'📈', href:'/calc/compound-interest-calculator.html', name:'Compound Interest'},
    {icon:'⚡', href:'/calc/early-mortgage-payoff.html', name:'Early Payoff'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
