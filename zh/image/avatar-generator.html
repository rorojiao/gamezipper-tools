<script>
const PALETTES = [
['#6c5ce7','#a855f7'],['#ec4899','#f43f5e'],['#10b981','#059669'],['#f59e0b','#ef4444'],
['#3b82f6','#06b6d4'],['#8b5cf6','#6366f1'],['#ef4444','#ec4899'],['#14b8a6','#0ea5e9'],
['#f97316','#eab308'],['#84cc16','#22c55e'],['#a855f7','#ec4899'],['#1e40af','#0891b2'],
['#000000','#444444'],['#ffffff','#cccccc'],
];

let cfg = {
name: 'Jane Doe',
size: 256,
shape: 'circle', // circle|rounded|square|hex
style: 'solid', // solid|gradient
color: '#6c5ce7',
grad1: '#6c5ce7',
grad2: '#a855f7',
txtColor: '#ffffff',
fontSize: 0.45,
fontFam: 'sans-serif',
rotation: 0,
borderWidth: 0,
borderColor: '#ffffff',
};

GZI18n.register({
en:{
toolTitle:'Avatar Generator',
toolDesc:'Create beautiful profile avatars from initials. Customize color, shape, font, size and bulk-generate a batch for teams or placeholders.',
lblSettings:'Settings',lblName:'Name',lblSize:'Size',lblShapeBg:'Shape',
lblCirc:'Circle',lblRd:'Rounded',lblSq:'Square',lblHex:'Hex',
lblStyle:'Style',lblSolid:'Solid',lblGrad:'Gradient',
lblBgcolor:'Color',lblGrad1:'From',lblGrad2:'To',
lblTxtcolor:'Text Color',lblFontsize:'Font size',lblFontfam:'Font',
lblRotation:'Rotation',lblBorder:'Border',lblBordercolor:'Border clr',
lblBulk:'Bulk Generate',lblGenbulk:'Generate Batch',lblPreview:'Preview',
okBulk:'Generated {n} avatars',
step1:'Enter a name to generate the initials avatar',
step2:'Pick a color palette, gradient, shape, font and size',
step3:'Use Bulk Generate to create multiple avatars at once',
step4:'Click Download to save the canvas as PNG, JPG or SVG',
},
zh:{
toolTitle:'头像生成器',
toolDesc:'从姓名首字母创建精美的个人头像。可自定义颜色、形状、字体、尺寸,支持团队批量生成。',
lblSettings:'设置',lblName:'姓名',lblSize:'尺寸',lblShapeBg:'形状',
lblCirc:'圆形',lblRd:'圆角',lblSq:'方形',lblHex:'六边形',
lblStyle:'风格',lblSolid:'纯色',lblGrad:'渐变',
lblBgcolor:'颜色',lblGrad1:'从',lblGrad2:'到',
lblTxtcolor:'文字色',lblFontsize:'字体大小',lblFontfam:'字体',
lblRotation:'旋转',lblBorder:'边框',lblBordercolor:'边框色',
lblBulk:'批量生成',lblGenbulk:'生成批次',lblPreview:'预览',
okBulk:'已生成 {n} 个头像',
step1:'输入姓名生成首字母头像',
step2:'选择配色、渐变、形状、字体和尺寸',
step3:'使用「批量生成」一次创建多个头像',
step4:'点击「下载」将画布保存为 PNG、JPG 或 SVG',
}
});

const { $, t, copyText } = GZ;
let bulkResults = [];

function escapeHtml(s){if(s==null)return'';return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

function getInitials(name) {
  if (!name) return '?';
  name = name.trim();
  const parts = name.split(/\s+/).filter(Boolean);
  if (parts.length === 0) return '?';
  if (parts.length === 1) return parts[0].substring(0, 2).toUpperCase();
  return (parts[0][0] + parts[parts.length-1][0]).toUpperCase();
}

function luminance(hex) {
  hex = hex.replace('#','');
  if (hex.length === 3) hex = hex.split('').map(c=>c+c).join('');
  const r = parseInt(hex.substr(0,2),16) / 255;
  const g = parseInt(hex.substr(2,2),16) / 255;
  const b = parseInt(hex.substr(4,2),16) / 255;
  return 0.299*r + 0.587*g + 0.114*b;
}

function autoTextColor(bgHex) {
  // Use white or black text based on bg luminance
  return luminance(bgHex) > 0.6 ? '#000000' : '#ffffff';
}

function drawAvatar(canvas, name, c) {
  const size = c.size;
  canvas.width = size;
  canvas.height = size;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, size, size);

  // Background
  let bg;
  if (c.style === 'gradient') {
    bg = ctx.createLinearGradient(0, 0, size, size);
    bg.addColorStop(0, c.grad1);
    bg.addColorStop(1, c.grad2);
  } else {
    bg = c.color;
  }

  // Shape
  ctx.fillStyle = bg;
  if (c.shape === 'circle') {
    ctx.beginPath();
    ctx.arc(size/2, size/2, size/2, 0, Math.PI*2);
    ctx.fill();
  } else if (c.shape === 'rounded') {
    const r = size * 0.22;
    ctx.beginPath();
    ctx.moveTo(r, 0);
    ctx.arcTo(size, 0, size, r, r);
    ctx.arcTo(size, size, size-r, size, r);
    ctx.arcTo(0, size, 0, size-r, r);
    ctx.arcTo(0, 0, r, 0, r);
    ctx.closePath();
    ctx.fill();
  } else if (c.shape === 'square') {
    ctx.fillRect(0, 0, size, size);
  } else if (c.shape === 'hex') {
    const s2 = size / 2;
    ctx.beginPath();
    for (let i = 0; i < 6; i++) {
      const ang = (Math.PI/3) * i;
      const x = s2 + s2 * Math.cos(ang);
      const y = s2 + s2 * Math.sin(ang);
      if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.closePath();
    ctx.fill();
  }

  // Border (after bg, before text)
  if (c.borderWidth > 0) {
    ctx.strokeStyle = c.borderColor;
    ctx.lineWidth = c.borderWidth;
    if (c.shape === 'circle') {
      ctx.beginPath();
      ctx.arc(size/2, size/2, size/2 - c.borderWidth/2, 0, Math.PI*2);
      ctx.stroke();
    } else if (c.shape === 'rounded') {
      const r = size * 0.22;
      const inset = c.borderWidth/2;
      ctx.beginPath();
      ctx.moveTo(r, inset);
      ctx.arcTo(size-inset, inset, size-inset, r, r);
      ctx.arcTo(size-inset, size-inset, size-r-inset, size-inset, r);
      ctx.arcTo(inset, size-inset, inset, size-r-inset, r);
      ctx.arcTo(inset, inset, r, inset, r);
      ctx.closePath();
      ctx.stroke();
    } else if (c.shape === 'square') {
      ctx.strokeRect(c.borderWidth/2, c.borderWidth/2, size - c.borderWidth, size - c.borderWidth);
    } else if (c.shape === 'hex') {
      const s2 = size / 2;
      const inset = c.borderWidth/2;
      const r = s2 - inset;
      ctx.beginPath();
      for (let i = 0; i < 6; i++) {
        const ang = (Math.PI/3) * i;
        const x = s2 + r * Math.cos(ang);
        const y = s2 + r * Math.sin(ang);
        if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
      }
      ctx.closePath();
      ctx.stroke();
    }
  }

  // Text
  const text = getInitials(name);
  ctx.fillStyle = c.txtColor;
  const fontPx = size * c.fontSize;
  const fontFamily = c.fontFam === 'system-ui' ? 'system-ui,-apple-system,BlinkMacSystemFont,sans-serif' : c.fontFam;
  ctx.font = `700 ${fontPx}px ${fontFamily}`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  // Apply rotation
  ctx.translate(size/2, size/2);
  ctx.rotate(c.rotation * Math.PI / 180);
  ctx.fillText(text, 0, fontPx * 0.05);
  ctx.setTransform(1, 0, 0, 1, 0, 0);
}

function render() {
  const canvas = $('#avatarCanvas');
  const size = parseInt($('#size').value) || 256;
  cfg.size = size;
  drawAvatar(canvas, cfg.name, cfg);
  // Previews
  ['prev24','prev36','prev48','prev64'].forEach(id => {
    const el = $('#'+id);
    if (cfg.style === 'gradient') el.style.background = `linear-gradient(135deg, ${cfg.grad1}, ${cfg.grad2})`;
    else el.style.background = cfg.color;
    el.style.color = cfg.txtColor;
    el.style.fontFamily = cfg.fontFam === 'system-ui' ? 'system-ui,-apple-system,sans-serif' : cfg.fontFam;
  });
  $('#contrastHint').textContent = '';
  // Apply font size etc
  $('#fsVal').textContent = parseFloat($('#fontSize').value).toFixed(2);
  $('#rotVal').textContent = $('#rotation').value + '°';
  $('#bwVal').textContent = $('#borderWidth').value + 'px';
}

function setShape(s) {
  cfg.shape = s;
  ['circle','rounded','square','hex'].forEach(x => $('#shape-'+x).classList.toggle('active', x === s));
  render();
}
function setStyle(s) {
  cfg.style = s;
  $('#style-solid').classList.toggle('active', s === 'solid');
  $('#style-gradient').classList.toggle('active', s === 'gradient');
  $('#solidRow').style.display = s === 'solid' ? '' : 'none';
  $('#gradRow').style.display = s === 'gradient' ? '' : 'none';
  render();
}

function buildSwatches() {
  const el = $('#swatches');
  el.innerHTML = PALETTES.map(p => {
    const isPair = Array.isArray(p);
    const col = isPair ? `linear-gradient(135deg, ${p[0]}, ${p[1]})` : p;
    return `<div class="swatch" style="background:${col}" data-color="${isPair ? p[0] : p}" onclick="setColor('${isPair ? p[0] : p}')"></div>`;
  }).join('');
  el.firstChild.classList.add('active');
}
function setColor(hex) {
  cfg.color = hex;
  cfg.style = 'solid';
  setStyle('solid');
  $('#txtColor').value = autoTextColor(hex);
  cfg.txtColor = $('#txtColor').value;
  $$('#swatches .swatch').forEach(el => el.classList.toggle('active', el.dataset.color === hex));
  render();
}

function generateBulk() {
  const lines = $('#bulk').value.split('\n').map(s => s.trim()).filter(Boolean);
  if (!lines.length) return;
  bulkResults = lines;
  const html = lines.map((name, i) => {
    const c = document.createElement('canvas');
    c.width = 64; c.height = 64;
    // Vary color by index
    const paletteIdx = i % PALETTES.length;
    const isPair = Array.isArray(PALETTES[paletteIdx]);
    const localCfg = {...cfg, color: isPair ? PALETTES[paletteIdx][0] : PALETTES[paletteIdx], grad1: isPair ? PALETTES[paletteIdx][0] : cfg.grad1, grad2: isPair ? PALETTES[paletteIdx][1] : cfg.grad2, size: 64};
    drawAvatar(c, name, localCfg);
    return `<div class="bulk-item">${c.outerHTML}<div>${escapeHtml(name)}</div></div>`;
  }).join('');
  $('#bulkList').innerHTML = html;
  const s = $('#status');
  s.textContent = t('okBulk').replace('{n}', lines.length);
  s.className = 'ok';
  setTimeout(() => s.className = '', 3000);
}

function downloadActive(format) {
  const canvas = $('#avatarCanvas');
  let mime = 'image/png';
  let ext = 'png';
  if (format === 'jpg') { mime = 'image/jpeg'; ext = 'jpg'; }
  if (format === 'svg') {
    // Build SVG from current canvas
    const dataUrl = canvas.toDataURL('image/png');
    const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${cfg.size}" height="${cfg.size}"><image href="${dataUrl}" width="${cfg.size}" height="${cfg.size}"/></svg>`;
    const blob = new Blob([svg], {type: 'image/svg+xml'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = (cfg.name.replace(/\s+/g,'-') || 'avatar') + '.svg';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
    return;
  }
  canvas.toBlob(blob => {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = (cfg.name.replace(/\s+/g,'-') || 'avatar') + '.' + ext;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }, mime, 0.95);
}

function downloadZip() {
  // Generate a single ZIP-like HTML page with all bulk avatars as data URLs and a download-all
  // For simplicity, download each as PNG individually
  if (!bulkResults.length) {
    bulkResults = $('#bulk').value.split('\n').map(s=>s.trim()).filter(Boolean);
  }
  if (!bulkResults.length) return;
  bulkResults.forEach((name, i) => {
    setTimeout(() => {
      const c = document.createElement('canvas');
      c.width = cfg.size; c.height = cfg.size;
      const paletteIdx = i % PALETTES.length;
      const isPair = Array.isArray(PALETTES[paletteIdx]);
      const localCfg = {...cfg, color: isPair ? PALETTES[paletteIdx][0] : PALETTES[paletteIdx], grad1: isPair ? PALETTES[paletteIdx][0] : cfg.grad1, grad2: isPair ? PALETTES[paletteIdx][1] : cfg.grad2, size: cfg.size};
      drawAvatar(c, name, localCfg);
      c.toBlob(blob => {
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = (name.replace(/\s+/g,'-') || ('avatar-'+i)) + '.png';
        document.body.appendChild(a); a.click(); document.body.removeChild(a);
        URL.revokeObjectURL(url);
      }, 'image/png', 0.95);
    }, i * 200);
  });
}
