const { $, t, copyText } = GZ;

/* ---------- Expression engine (shared) ---------- */
const MFNS = { sin:Math.sin, cos:Math.cos, tan:Math.tan, asin:Math.asin, acos:Math.acos, atan:Math.atan,
  sinh:Math.sinh, cosh:Math.cosh, tanh:Math.tanh, exp:Math.exp, ln:Math.log, log:Math.log,
  log2:Math.log2, log10:(x)=>Math.log(x)/Math.LN10, sqrt:Math.sqrt, cbrt:Math.cbrt, abs:Math.abs,
  sign:Math.sign, sec:x=>1/Math.cos(x), csc:x=>1/Math.sin(x), cot:x=>1/Math.tan(x) };
const MCONST = { pi:Math.PI, e:Math.E, tau:Math.PI*2 };
function tokenize(s){ s=s.replace(/\s+/g,'');const toks=[];let i=0;
  while(i<s.length){const ch=s[i];
    if((ch>='0'&&ch<='9')||ch==='.'){let j=i+1;while(j<s.length&&/[0-9.]/.test(s[j]))j++;if(j<s.length&&(s[j]=='e'||s[j]=='E')&&j+1<s.length&&/[0-9+\-]/.test(s[j+1])){let k=j+1;if(s[k]=='+'||s[k]=='-')k++;if(k<s.length&&/[0-9]/.test(s[k])){while(k<s.length&&/[0-9]/.test(s[k]))k++;j=k;}}toks.push({t:'num',v:parseFloat(s.slice(i,j))});i=j;continue;}
    if(/[a-zA-Z_]/.test(ch)){let j=i+1;while(j<s.length&&/[a-zA-Z0-9_]/.test(s[j]))j++;const nm=s.slice(i,j).toLowerCase();if(MFNS[nm])toks.push({t:'fn',v:nm});else if(nm==='x')toks.push({t:'var'});else if(MCONST[nm]!==undefined)toks.push({t:'num',v:MCONST[nm]});else throw new Error('Unknown name: '+nm);i=j;continue;}
    if(ch=='π'){toks.push({t:'num',v:Math.PI});i++;continue;}
    if('+-*/^()'.indexOf(ch)>=0){toks.push({t:ch});i++;continue;}
    if(ch=='×'||ch=='·'){toks.push({t:'*'});i++;continue;}if(ch=='÷'){toks.push({t:'/'});i++;continue;}
    if(ch=='−'||ch=='–'){toks.push({t:'-'});i++;continue;}
    throw new Error('Unexpected character: '+ch); }
  const out=[];for(let k=0;k<toks.length;k++){const a=toks[k],b=toks[k+1];out.push(a);if(!b)continue;const aE=(a.t==='num'||a.t==='var'||a.t===')'),bS=(b.t==='num'||b.t==='var'||b.t==='fn'||b.t==='(');if(aE&&bS&&!(a.t==='num'&&b.t==='num'))out.push({t:'*'});}return out;
}
function parseExpr(s){const toks=tokenize(s);let p=0;const peek=()=>toks[p],next=()=>toks[p++];

  function T(){let n=U();while(peek()&&(peek().t==='*'||peek().t==='/')){const c=next().t;n={op:'bop',c,l:n,r:U()};}return n;}
  function U(){if(peek()&&peek().t==='-'){next();return{op:'neg',a:U()};}if(peek()&&peek().t==='+'){next();return U();}return P();}
  function P(){const b=A();if(peek()&&peek().t==='^'){next();return{op:'bop',c:'^',l:b,r:U()};}return b;}
  function A(){const tk=peek();if(!tk)throw new Error('Unexpected end');if(tk.t==='num'){next();return{op:'num',v:tk.v};}if(tk.t==='var'){next();return{op:'var'};}if(tk.t==='('){next();const e=E();if(!peek()||peek().t!==')')throw new Error('Missing )');next();return e;}if(tk.t==='fn'){next();if(!peek()||peek().t!=='(')throw new Error('Function needs (');next();const a=E();if(!peek()||peek().t!==')')throw new Error('Missing )');next();return{op:'call',fn:tk.v,a};}throw new Error('Unexpected token');}
  const ast=E();if(p<toks.length)throw new Error('Unexpected trailing input');return ast;
}
function evalNode(n,x){switch(n.op){case 'num':return n.v;case 'var':return x;case 'neg':return -evalNode(n.a,x);case 'call':{const v=evalNode(n.a,x);const f=MFNS[n.fn];return f?f(v):NaN;}case 'bop':{const l=evalNode(n.l,x),r=evalNode(n.r,x);switch(n.c){case '+':return l+r;case '-':return l-r;case '*':return l*r;case '/':return l/r;case '^':return Math.pow(l,r);}}}}
const num=v=>({op:'num',v}), VAR=()=>({op:'var'}), neg=a=>({op:'neg',a}), call=(fn,a)=>({op:'call',fn,a});
const bop=(c,l,r)=>({op:'bop',c,l,r}), add=(l,r)=>bop('+',l,r), sub=(l,r)=>bop('-',l,r), mul=(l,r)=>bop('*',l,r), div=(l,r)=>bop('/',l,r), pw=(l,r)=>bop('^',l,r);
const isC=(n,v)=>n&&n.op==='num'&&Math.abs(n.v-v)<1e-12;
const rnd=v=>Math.round(v*1e12)/1e12;
function simplify(n){if(n.op==='num'||n.op==='var')return n;if(n.op==='neg'){const a=simplify(n.a);if(a.op==='num')return num(-a.v);if(a.op==='neg')return a.a;return neg(a);}if(n.op==='call')return call(n.fn,simplify(n.a));if(n.op==='bop'){let l=simplify(n.l),r=simplify(n.r);const ln=l.op==='num',rn=r.op==='num';if(ln&&rn){try{const v=evalNode(bop(n.c,l,r),0);if(isFinite(v))return num(rnd(v));}catch(e){}}switch(n.c){case '+':if(isC(l,0))return r;if(isC(r,0))return l;break;case '-':if(isC(r,0))return l;if(isC(l,0))return simplify(neg(n.r));break;case '*':if(isC(l,0)||isC(r,0))return num(0);if(isC(l,1))return r;if(isC(r,1))return l;if(isC(l,-1))return simplify(neg(n.r));if(isC(r,-1))return simplify(neg(n.l));break;case '/':if(isC(l,0))return num(0);if(isC(r,1))return l;break;case '^':if(isC(r,0))return num(1);if(isC(r,1))return l;if(isC(l,0))return num(0);if(isC(l,1))return num(1);break;}return bop(n.c,l,r);}return n;}
const PREC={'+':1,'-':1,'*':2,'/':2,'^':3};
function render(n,minPrec=0){let s,prec;if(n.op==='num'){const v=n.v;if(Math.abs(v-Math.E)<1e-9){s='e';prec=10;}else{s=Number.isInteger(v)?String(v):String(rnd(v));prec=10;}}else if(n.op==='var'){s='x';prec=10;}else if(n.op==='call'){s=n.fn+'('+render(n.a,0)+')';prec=10;}else if(n.op==='neg'){s='-'+render(n.a,3);prec=3;}else{prec=PREC[n.c];if(n.c==='^'){s=render(n.l,4)+'^'+render(n.r,3);}else if(n.c==='*'&&n.l.op==='num'&&(n.r.op==='var'||n.r.op==='call'||n.r.op==='neg'||(n.r.op==='bop'&&n.r.c==='^'))){s=render(n.l,prec)+render(n.r,prec+1);}else{s=render(n.l,prec)+n.c+render(n.r,prec+(n.c==='-'||n.c==='/'?1:0));}}return prec<minPrec?'('+s+')':s;}

/* ---------- Symbolic integration (antiderivative) ---------- */
function integrate(n){
  switch(n.op){
    case 'num': return mul(n, VAR());                      // ∫ c dx = c·x
    case 'var': return div(pw(VAR(),num(2)),num(2));       // ∫ x dx = x²/2
    case 'neg': return neg(integrate(n.a));
    case 'call': switch(n.fn){
      case 'sin': return neg(call('cos',n.a));             // ∫ sin u du  (u=x)
      case 'cos': return call('sin',n.a);
      case 'exp': return call('exp',n.a);
      case 'sinh': return call('cosh',n.a);
      case 'cosh': return call('sinh',n.a);
      case 'sec': return call('ln', call('tan', n.a));     // rough; only u=x handled
      default: return null;
    }
    case 'bop':
      if(n.c==='+') { const a=integrate(n.l),b=integrate(n.r); if(!a||!b)return null; return add(a,b); }
      if(n.c==='-') { const a=integrate(n.l),b=integrate(n.r); if(!a||!b)return null; return sub(a,b); }
      if(n.c==='*') {
        if(n.l.op==='num'){ const b=integrate(n.r); if(!b)return null; return mul(n.l,b); }
        if(n.r.op==='num'){ const b=integrate(n.l); if(!b)return null; return mul(n.r,b); }
        return null;
      }
      if(n.c==='^' && n.l.op==='var' && n.r.op==='num'){
        const c=n.r.v; if(c===-1) return call('ln', pw(VAR(),num(2)).op?VAR():VAR()); // ∫ 1/x = ln|x| (u=x)
        if(c===-1) return call('ln', VAR());
        return div(pw(VAR(),num(c+1)), num(c+1));          // power rule
      }
      // 1/x  (var in denominator): bop '/' with num(1) / var
      if(n.c==='/' && n.l.op==='num' && n.r.op==='var') {
        if(n.l.v===1) return call('ln', VAR());
        return mul(num(n.l.v), call('ln', VAR()));
      }
      // constant * (power of x in denominator form) e.g. 3/x^2 -> handled via x^...
      return null;
  }
  return null;
}

/* ---------- Numerical integration: composite Simpson's 1/3 ---------- */
function simpson(ast, a, b, n=2000){
  if(n%2)n++; // even
  const h=(b-a)/n; let s=evalNode(ast,a)+evalNode(ast,b);
  for(let i=1;i<n;i++){ const x=a+i*h; s+=(i%2?4:2)*evalNode(ast,x); }
  return s*h/3;
}

/* ---------- UI ---------- */
function compute(){
  $('#status').innerHTML=''; $('#result').innerHTML=''; $('#steps').innerHTML='';
  const raw=$('#expr').value.trim();
  if(!raw) return;
  const alo=parseFloat($('#alo').value), ahi=parseFloat($('#ahi').value);
  const hasBounds=isFinite(alo)&&isFinite(ahi);
  let ast;
  try { ast=parseExpr(raw); } catch(e){
    $('#result').innerHTML=`<div class="err-msg">⚠️ ${t('invalidExpr')}<br><code>${escapeHtml(e.message)}</code></div>`; return;
  }
  const ss=simplify(ast);
  const anti=integrate(ss);
  let stepsHtml='';
  if(anti){
    const aSimp=simplify(anti);
    const aStr=render(aSimp,0);
    $('#result').innerHTML+=`
      <div class="result-box">
        <div class="label">${t('antideriv')} ∫ f(x) dx</div>
        <div class="expr">= ${escapeHtml(aStr)} + C</div>
        <button class="gz-btn gz-btn-secondary" style="margin-top:8px" onclick="copyText('${aStr.replace(/'/g,"\\'")}')">📋 ${GZI18n.getLang()==='zh'?'复制':'Copy'}</button>
      </div>`;
    stepsHtml=`<div class="steps"><div class="stitle">${t('steps')}</div><ol>
      <li>Integrand: &nbsp; ${escapeHtml(render(ss,0))}</li>
      <li>Apply linearity and the power rule ∫ xⁿ dx = xⁿ⁺¹/(n+1)</li>
      <li>Antiderivative: &nbsp; ${escapeHtml(aStr)} + C</li></ol></div>`;
  } else if(hasBounds){
    stepsHtml=`<div class="note">${t('numericOnly')}</div>`;
  }
  if(hasBounds){
    if(alo===ahi){ $('#result').innerHTML+=`<div class="result-box"><div class="label">${t('definiteAt')}</div><div class="num-val">0</div></div>`; }
    else {
      let val;
      try { val=simpson(ss, alo, ahi, 2000); } catch(e){ val=NaN; }
      $('#result').innerHTML+=`
        <div class="result-box">
          <div class="label">${t('definiteAt')} ∫ from ${fmt(alo)} to ${fmt(ahi)}</div>
          <div class="num-val">${isFinite(val)?fmt(val):'—'}</div>
          ${anti?`<div style="font-size:.85em;opacity:.75;margin-top:4px">= [ ${escapeHtml(render(simplify(anti),0))} ]<sub>${fmt(alo)}</sub><sup>${fmt(ahi)}</sup></div>`:''}
        </div>`;
      if(!anti) stepsHtml=`<div class="steps"><div class="stitle">${t('steps')}</div><ol><li>Integrand: ${escapeHtml(render(ss,0))}</li><li>Symbolic antiderivative not available — using composite Simpson\u2019s rule (n=2000)</li><li>Definite integral ≈ ${fmt(val)}</li></ol></div>`;
    }
    drawPlot(ast, alo, ahi);
  } else {
    clearPlot();
  }
  $('#steps').innerHTML=stepsHtml;
}
function escapeHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function fmt(v){if(!isFinite(v))return '—';if(Math.abs(v)>=1e6||(Math.abs(v)<1e-4&&v!==0))return v.toExponential(4);return (Math.round(v*1e10)/1e10).toString();}

const iplot=$('#iplot'); const ictx=iplot.getContext('2d');
function clearPlot(){ ictx.clearRect(0,0,iplot.width,iplot.height); }
function drawPlot(ast, a, b){
  const dpr=window.devicePixelRatio||1;
  const cssW=iplot.clientWidth||600, cssH=iplot.clientHeight||240;
  if(iplot.width!==cssW*dpr||iplot.height!==cssH*dpr){iplot.width=cssW*dpr;iplot.height=cssH*dpr;}
  ictx.setTransform(dpr,0,0,dpr,0,0); const W=cssW,H=cssH; ictx.clearRect(0,0,W,H);
  // sample to find y range
  const N=240; let ys=[]; let ymin=Infinity,ymax=-Infinity;
  for(let i=0;i<=N;i++){ const x=a+(i/N)*(b-a); let y; try{y=evalNode(ast,x);}catch(e){y=NaN;} if(isFinite(y)){ys.push(y); if(y<ymin)ymin=y; if(y>ymax)ymax=y;} }

  if(Math.abs(ymax-ymin)<1e-9){ymax=ymin+1;}
  // include 0 in range
  ymin=Math.min(ymin,0); ymax=Math.max(ymax,0);
  const pad=8;
  const px=i=>pad+(i/N)*(W-2*pad);
  const py=y=>pad+(1-(y-ymin)/(ymax-ymin))*(H-2*pad);
  // x axis
  ictx.strokeStyle='rgba(255,255,255,0.3)'; ictx.lineWidth=1; ictx.beginPath();
  const y0=py(0); ictx.moveTo(pad,y0); ictx.lineTo(W-pad,y0); ictx.stroke();
  // filled area
  ictx.fillStyle='rgba(78,205,196,0.25)'; ictx.beginPath(); ictx.moveTo(px(0),y0);
  for(let i=0;i<=N;i++){ ictx.lineTo(px(i), py(ys[i]!==undefined?ys[i]:0)); }
  // ys may have gaps; keep simple
  ictx.lineTo(px(N),y0); ictx.closePath(); ictx.fill();
  // curve
  ictx.strokeStyle='#4ecdc4'; ictx.lineWidth=2; ictx.beginPath();
  let pen=false;
  for(let i=0;i<=N;i++){ const x=a+(i/N)*(b-a); let y; try{y=evalNode(ast,x);}catch(e){y=NaN;} if(!isFinite(y)){pen=false;continue;} const yy=py(y); if(!pen){ictx.moveTo(px(i),yy);pen=true;}else ictx.lineTo(px(i),yy); }
  ictx.stroke();
  // labels
  ictx.fillStyle='rgba(255,255,255,0.6)'; ictx.font='11px monospace';
  ictx.fillText(fmt(a), pad, H-4); ictx.fillText(fmt(b), W-pad-30, H-4);
}
