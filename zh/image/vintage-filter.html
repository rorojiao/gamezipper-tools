<script>
GZI18n.register({
  en: {
    toolTitle: 'Vintage Photo Filter',
    toolDesc: 'Add vintage, retro and old-film effects to your photos. Sepia, faded colors, grain, vignette and light leaks — free and private.',
    dropText: 'Drop a photo here or click to upload',
    warmth: 'Warmth',
    fade: 'Fade',
    grain: 'Grain',
    vig: 'Vignette',
    download: '⬇ Download PNG',
    original: 'Original',
    result: 'Vintage',
    step1: 'Upload a photo (JPG, PNG, WebP)',
    step2: 'Pick a preset or adjust the sliders manually',
    step3: 'Preview the vintage effect in real-time',
    step4: 'Download the result as PNG',
    presets: { sepia:'Sepia', bw:'B&W', faded:'Faded', film70s:'70s Film', retro:'Retro Cool', polaroid:'Polaroid' },
  },
  zh: {
    toolTitle: '复古照片滤镜',
    toolDesc: '为照片添加复古、怀旧和老胶片效果。棕褐色、褪色、颗粒、暗角和漏光 — 免费且隐私。',
    dropText: '拖放照片到此处或点击上传',
    warmth: '暖色',
    fade: '褪色',
    grain: '颗粒',
    vig: '暗角',
    download: '⬇ 下载 PNG',
    original: '原图',
    result: '复古',
    step1: '上传照片（JPG、PNG、WebP）',
    step2: '选择预设或手动调节滑块',
    step3: '实时预览复古效果',
    step4: '下载结果为 PNG',
    presets: { sepia:'棕褐', bw:'黑白', faded:'褪色', film70s:'70年代', retro:'冷复古', polaroid:'拍立得' },
  }
});

const { $, t } = GZ;
let imgData = null, origCanvas, resCanvas, origCtx, resCtx, currentPreset = 'sepia';

$('#drop-text').textContent = t('dropText');
$('#lbl-warmth').textContent = t('warmth');
$('#lbl-fade').textContent = t('fade');
$('#lbl-grain').textContent = t('grain');
$('#lbl-vig').textContent = t('vig');
$('#btn-download').textContent = t('download');
$('#lbl-orig').textContent = t('original');
$('#lbl-res').textContent = t('result');

// Build preset buttons
const presetList = ['sepia','bw','faded','film70s','retro','polaroid'];
const presetBar = $('#presets');
presetList.forEach(p => {
  const b = document.createElement('button');
  b.dataset.preset = p;
  b.textContent = t('presets')[p];
  if (p === currentPreset) b.classList.add('active');
  b.addEventListener('click', () => {
    currentPreset = p;
    applyPreset(p);
    document.querySelectorAll('.gz-presets button').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    applyEffect();
  });
  presetBar.appendChild(b);
});

const drop = $('#drop'), fileInput = $('#fileInput');
drop.addEventListener('click', () => fileInput.click());
drop.addEventListener('dragover', e => { e.preventDefault(); drop.classList.add('dragover'); });
drop.addEventListener('dragleave', () => drop.classList.remove('dragover'));
drop.addEventListener('drop', e => { e.preventDefault(); drop.classList.remove('dragover'); if (e.dataTransfer.files.length) loadImage(e.dataTransfer.files[0]); });
fileInput.addEventListener('change', e => { if (e.target.files.length) loadImage(e.target.files[0]); });

function loadImage(file) {
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      const maxW = 800; let w = img.width, h = img.height;
      if (w > maxW) { h = Math.round(h * maxW / w); w = maxW; }
      origCanvas = $('#original'); resCanvas = $('#result');
      origCanvas.width = w; origCanvas.height = h;
      resCanvas.width = w; resCanvas.height = h;
      origCtx = origCanvas.getContext('2d'); resCtx = resCanvas.getContext('2d');
      origCtx.drawImage(img, 0, 0, w, h);
      imgData = origCtx.getImageData(0, 0, w, h);
      drop.style.display = 'none';
      $('#presets').style.display = 'flex';
      $('#controls').style.display = 'flex';
      $('#preview').style.display = 'grid';
      applyEffect();
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function applyPreset(p) {
  const sets = { sepia:{warmth:55,fade:25,grain:15,vig:35}, bw:{warmth:0,fade:10,grain:25,vig:40},
    faded:{warmth:30,fade:60,grain:10,vig:20}, film70s:{warmth:70,fade:35,grain:30,vig:25},
    retro:{warmth:20,fade:40,grain:20,vig:30}, polaroid:{warmth:45,fade:50,grain:15,vig:45} };
  const s = sets[p] || sets.sepia;
  $('#warmth').value = s.warmth; $('#fade').value = s.fade; $('#grain').value = s.grain; $('#vig').value = s.vig;
}

function applyEffect() {
  if (!imgData) return;
  const w = imgData.width, h = imgData.height;
  const warmth = +$('#warmth').value, fade = +$('#fade').value, grain = +$('#grain').value, vig = +$('#vig').value;
  const isBW = currentPreset === 'bw';
  const out = resCtx.createImageData(w, h);
  const cx = w / 2, cy = h / 2, maxD = Math.sqrt(cx*cx + cy*cy);
  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      const i = (y * w + x) * 4;
      let r = imgData.data[i], g = imgData.data[i+1], b = imgData.data[i+2];
      // Warmth: shift toward red/yellow
      r += warmth * 0.8; g += warmth * 0.4; b -= warmth * 0.6;
      // Sepia tint for sepia preset
      if (currentPreset === 'sepia') {
        const gray = 0.299*r + 0.587*g + 0.114*b;
        r = gray * 1.07; g = gray * 0.74; b = gray * 0.43;
      }
      // B&W
      if (isBW) {
        const gray = 0.299*r + 0.587*g + 0.114*b;
        r = g = b = gray;
      }
      // Fade: lift blacks toward white
      const fadeAmt = fade / 100 * 80;
      r = r + (255 - r) * (fadeAmt / 255) * 0.5;
      g = g + (255 - g) * (fadeAmt / 255) * 0.5;
      b = b + (255 - b) * (fadeAmt / 255) * 0.5;
      // Grain
      if (grain > 0) {
        const n = (Math.random() - 0.5) * grain * 1.2;
        r += n; g += n; b += n;
      }
      // Vignette
      if (vig > 0) {
        const d = Math.sqrt((x-cx)*(x-cx) + (y-cy)*(y-cy)) / maxD;
        const vFactor = 1 - Math.max(0, (d - 0.5)) * 2 * (vig / 100);
        r *= vFactor; g *= vFactor; b *= vFactor;
      }
      out.data[i] = Math.max(0, Math.min(255, r));
      out.data[i+1] = Math.max(0, Math.min(255, g));
      out.data[i+2] = Math.max(0, Math.min(255, b));
      out.data[i+3] = 255;
    }
  }
  resCtx.putImageData(out, 0, 0);
}

['warmth','fade','grain','vig'].forEach(id => $('#' + id).addEventListener('input', applyEffect));

$('#btn-download').addEventListener('click', () => {
  if (!resCanvas) return;
  const a = document.createElement('a');
  a.href = resCanvas.toDataURL('image/png');
  a.download = 'vintage.png'; a.click();
});

GZ.renderToolPage({
  category: 'image',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🎨', href:'/image/filters.html', name:'Image Filters'},
    {icon:'✏️', href:'/image/photo-to-sketch.html', name:'Photo to Sketch'},
    {icon:'🖼️', href:'/image/duotone-generator.html', name:'Duotone'},
    {icon:'✨', href:'/image/pixelate.html', name:'Pixelate'},
  ]
});
</script>

</body>
