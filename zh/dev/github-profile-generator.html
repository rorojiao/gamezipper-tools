const { $, copyText, t } = GZ;
let skills = [];
let repos = [];
let toggles = { stats:true, streak:false, languages:false, trophy:false, visits:true, typing:true };

function buildConfig(){
  $('#config').innerHTML = `
  <div class="section-block"><h3>${t('basic')}</h3>
    <div class="field"><label>${t('username')}</label><input id="f-username" placeholder="octocat" oninput="generate()"></div>
    <div class="field"><label>${t('name')}</label><input id="f-name" placeholder="The Octocat" oninput="generate()"></div>
    <div class="field"><label>${t('title')}</label><input id="f-headline" placeholder="Full-Stack Developer" oninput="generate()"></div>
    <div class="field"><label>${t('subtitle')}</label><input id="f-subtitle" placeholder="Building cool things on the web" oninput="generate()"></div>
    <div class="field"><label>${t('bio')}</label><textarea id="f-bio" rows="2" placeholder="Passionate developer..." oninput="generate()"></textarea></div>
    <div class="field"><label>${t('workingOn')}</label><input id="f-working" placeholder="an awesome project" oninput="generate()"></div>
    <div class="field"><label>${t('learning')}</label><input id="f-learning" placeholder="Rust, ML" oninput="generate()"></div>
    <div class="field"><label>${t('askAbout')}</label><input id="f-ask" placeholder="React, Node.js" oninput="generate()"></div>
    <div class="field"><label>${t('funFact')}</label><input id="f-fun" placeholder="I commit on weekends" oninput="generate()"></div>
  </div>
  <div class="section-block"><h3>${t('skills')}</h3>
    <div class="field"><input id="f-skill-input" placeholder="${t('addSkill')}" onkeydown="if(event.key==='Enter'){event.preventDefault();addSkill(this.value);this.value='';}"></div>
    <div class="chips" id="skill-chips"></div>
  </div>
  <div class="section-block"><h3>${t('social')}</h3>
    <div class="field"><label>${t('website')}</label><input id="f-website" placeholder="https://example.com" oninput="generate()"></div>
    <div class="field"><label>${t('twitter')}</label><input id="f-twitter" placeholder="username" oninput="generate()"></div>
    <div class="field"><label>${t('linkedin')}</label><input id="f-linkedin" placeholder="username" oninput="generate()"></div>
    <div class="field"><label>${t('youtube')}</label><input id="f-youtube" placeholder="channel handle" oninput="generate()"></div>
    <div class="field"><label>${t('email')}</label><input id="f-email" placeholder="you@example.com" oninput="generate()"></div>
    <div class="field"><label>${t('instagram')}</label><input id="f-instagram" placeholder="username" oninput="generate()"></div>
  </div>
  <div class="section-block"><h3>${t('stats')}</h3>
    ${Object.keys(toggles).map(k=>`<label class="toggle"><input type="checkbox" id="tg-${k}" ${toggles[k]?'checked':''} onchange="toggles['${k}']=this.checked;generate()"> ${t('show'+k.charAt(0).toUpperCase()+k.slice(1))}</label>`).join('')}
  </div>
  <div class="section-block"><h3>${t('featured')}</h3>
    <div class="field"><input id="f-repo-input" placeholder="${t('repoName')}" onkeydown="if(event.key==='Enter'){event.preventDefault();addRepo(this.value);this.value='';}"></div>
    <div class="chips" id="repo-chips"></div>
  </div>`;
  renderChips();
}

function renderChips(){
  $('#skill-chips').innerHTML = skills.map((s,i)=>`<span class="chip active" onclick="skills.splice(${i},1);renderChips();generate()">${s} ✕</span>`).join('');
  $('#repo-chips').innerHTML = repos.map((r,i)=>`<span class="chip active" onclick="repos.splice(${i},1);renderChips();generate()">${r} ✕</span>`).join('');
}

function addSkill(v){ v=v.trim(); if(v&&!skills.includes(v)){skills.push(v);renderChips();generate();} }
function addRepo(v){ v=v.trim(); if(v&&!repos.includes(v)){repos.push(v);renderChips();generate();} }

function val(id){ const el=$('#'+id); return el?el.value.trim():''; }

function generate(){
  const user = val('f-username');
  const name = val('f-name');
  const headline = val('f-headline');
  const subtitle = val('f-subtitle');
  const bio = val('f-bio');
  const lines = [];

  // Typing SVG header
  if(toggles.typing && (headline||user)){
    const txt = encodeURIComponent(headline||('Hi, I am '+(name||user)));
    lines.push(`<div align="center">`);
    lines.push(`<img src="https://readme-typing-svg.herokuapp.com?font=Fira+Code&weight=600&size=22&pause=1000&color=58A6FF&center=true&vCenter=true&random=false&width=600&height=50&lines=${txt}" alt="Typing SVG" />`);
    lines.push(`</div>`);
    lines.push('');
  } else if(name||headline){
    lines.push(`<h1 align="center">${name||headline}</h1>`);
    if(subtitle) lines.push(`<h3 align="center">${subtitle}</h3>`);
    lines.push('');
  }

  if(bio){
    lines.push(`<p align="center">${bio}</p>`);
    lines.push('');
  }

  // Social badges
  const socials=[];
  const website=val('f-website'), twitter=val('f-twitter'), linkedin=val('f-linkedin'), youtube=val('f-youtube'), email=val('f-email'), instagram=val('f-instagram');
  if(website) socials.push(`[![Website](https://img.shields.io/badge/Website-${encodeURIComponent(website.replace(/^https?:\/\//,''))}-blue?logo=googlechrome&logoColor=white)](${website})`);
  if(twitter) socials.push(`[![Twitter](https://img.shields.io/badge/Twitter-${twitter}-1DA1F2?logo=twitter&logoColor=white)](https://twitter.com/${twitter})`);
  if(linkedin) socials.push(`[![LinkedIn](https://img.shields.io/badge/LinkedIn-${linkedin}-0A66C2?logo=linkedin&logoColor=white)](https://linkedin.com/in/${linkedin})`);
  if(youtube) socials.push(`[![YouTube](https://img.shields.io/badge/YouTube-${youtube}-FF0000?logo=youtube&logoColor=white)](https://youtube.com/@${youtube})`);
  if(instagram) socials.push(`[![Instagram](https://img.shields.io/badge/Instagram-${instagram}-E4405F?logo=instagram&logoColor=white)](https://instagram.com/${instagram})`);
  if(email) socials.push(`[![Email](https://img.shields.io/badge/Email-${encodeURIComponent(email)}-D14836?logo=gmail&logoColor=white)](mailto:${email})`);
  if(socials.length){
    lines.push(`<p align="center">${socials.join(' ')}</p>`);
    lines.push('');
  }

  // Stats row
  const statCards=[];
  if(user){
    if(toggles.stats) statCards.push(`<img src="https://github-readme-stats.vercel.app/api?username=${user}&show_icons=true&theme=default" alt="stats" />`);
    if(toggles.streak) statCards.push(`<img src="https://github-readme-streak-stats.herokuapp.com/?user=${user}" alt="streak" />`);
    if(toggles.languages) statCards.push(`<img src="https://github-readme-stats.vercel.app/api/top-langs/?username=${user}&layout=compact" alt="languages" />`);
    if(toggles.trophy) statCards.push(`<img src="https://github-profile-trophy.vercel.app/?username=${user}" alt="trophy" />`);
  }
  if(toggles.visits) statCards.push(`<img src="https://komarev.com/ghpvc/?username=${user||'guest'}&style=flat-square&color=blue" alt="visits" />`);
  if(statCards.length){
    lines.push(`<p align="center">${statCards.join('<br>')}</p>`);
    lines.push('');
  }

  // About bullets
  const bullets=[];
  const working=val('f-working'), learning=val('f-learning'), ask=val('f-ask'), fun=val('f-fun');
  if(working) bullets.push(`- 🔭 I'm currently working on **${working}**`);
  if(learning) bullets.push(`- 🌱 I'm currently learning **${learning}**`);
  if(ask) bullets.push(`- 💬 Ask me about **${ask}**`);
  if(fun) bullets.push(`- ⚡ Fun fact: **${fun}**`);
  if(bullets.length){ lines.push(bullets.join('\n')); lines.push(''); }

  // Skills
  if(skills.length){
    lines.push(`## 🛠️ ${t('skills')}`);
    lines.push(skills.map(s=>`![${s}](https://img.shields.io/badge/-${encodeURIComponent(s)}-05122A?style=flat&logo=${encodeURIComponent(s.toLowerCase())})`).join(' '));
    lines.push('');
  }

  // Featured repos
  if(repos.length && user){
    lines.push(`## 🚀 ${t('featured')}`);
    lines.push(repos.map(r=>`- [${user}/${r}](https://github.com/${user}/${r})`).join('\n'));
    lines.push('');
  }

  lines.push('---');
  lines.push(`<p align="center"><em>Generated with <a href="https://tools.gamezipper.com/dev/github-profile-generator.html">GameZipper GitHub Profile Generator</a></em></p>`);

  $('#output').textContent = lines.join('\n');
}

function doCopy(){
  const txt=$('#output').textContent;
  if(!txt) return;
  copyText(txt);
  $('#status').innerHTML=`<span style="color:var(--gz-success)">${t('copied')}</span>`;
}

function doDownload(){
  const txt=$('#output').textContent;
  if(!txt) return;
  const blob=new Blob([txt],{type:'text/markdown'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='README.md';
  a.click();
}

function loadExample(){
  $('#f-username').value='octocat';
  $('#f-name').value='The Octocat';
  $('#f-headline').value='Full-Stack Developer & Open Source Enthusiast';
  $('#f-subtitle').value='Building delightful experiences on the web';
  $('#f-bio').value='Passionate about open source, clean code, and developer tooling. Coffee-driven.';
  $('#f-working').value='GameZipper Tools';
  $('#f-learning').value='Rust and WASM';
  $('#f-ask').value='JavaScript, React, Node.js';
  $('#f-fun').value='I push to main on Fridays';
  $('#f-website').value='https://example.com';
  $('#f-twitter').value='octocat';
  $('#f-linkedin').value='octocat';
  $('#f-email').value='hi@example.com';
  skills=['JavaScript','React','Node.js','TypeScript','Python','Docker'];
  repos=['hello-world','octokit'];
  renderChips();
  generate();
}

function doClear(){
  skills=[]; repos=[];
  buildConfig();
  $('#output').textContent='';
  $('#status').innerHTML='';
}

buildConfig();
generate();

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="generate()">${t('generate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('loadExample')}</button>
  <button class="gz-btn" onclick="doCopy()">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doDownload()">${t('download')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

GZ.renderToolPage({
  category: 'dev',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],

    {icon:'📄', href:'/dev/readme-generator.html', name:'README Generator'},
    {icon:'⚙️', href:'/dev/github-actions-generator.html', name:'GitHub Actions'},
    {icon:'🌿', href:'/dev/gitignore-generator.html', name:'Gitignore'},
    {icon:'📝', href:'/text/github-readme.html', name:'GitHub README'},
  ]
});
</script>
