<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="drop-zone" id="drop-zone">📷 Drop or click to upload an image</div>
    <div id="editor" style="display:none;margin-top:16px">
      <div class="scale-options" id="scale-opts"></div>
      <div id="result-info"></div>
      <div class="gz-split" style="margin-top:12px">
        <div><label id="lbl-orig"></label><canvas id="orig-preview"></canvas></div>
        <div><label id="lbl-result"></label><canvas id="result-canvas"></canvas></div>
      </div>
    </div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Photo Enlarger & Upscaler',
    toolDesc: 'Enlarge images up to 4x with high-quality interpolation. Upscale photos while preserving sharpness — all in your browser.',
    uploadHint: '📷 Drop or click to upload an image',
    scale: 'Scale Factor',
    original: 'Original',
    enlarged: 'Enlarged',
    enlarge: 'Enlarge',
    downloadPNG: 'Download PNG',
    downloadJPG: 'Download JPG',
    newImg: 'New Image',
    step1: 'Upload an image by dragging or clicking',
    step2: 'Choose a scale factor (1.5x, 2x, 3x, or 4x)',
    step3: 'Click Enlarge to process the image',
    step4: 'Download the upscaled image as PNG or JPG',
  },
  zh: {
    toolTitle: '图片无损放大工具',
    toolDesc: '使用高质量插值将图片放大至 4 倍。在保持清晰度的同时提升分辨率 — 完全浏览器本地处理。',
    uploadHint: '📷 拖拽或点击上传图片',
    scale: '缩放倍数',
    original: '原图',
    enlarged: '放大后',
    enlarge: '放大',
    downloadPNG: '下载 PNG',
    downloadJPG: '下载 JPG',
    newImg: '新图片',
    step1: '拖拽或点击上传图片',
    step2: '选择缩放倍数（1.5x、2x、3x 或 4x）',
    step3: '点击放大处理图片',
    step4: '下载放大后的图片为 PNG 或 JPG',
  }
});

const { $, copyText, t } = GZ;
let origImg = null;
let scaleFactor = 2;

const scales = [1.5, 2, 3, 4];
const scaleOpts = $('#scale-opts');

function renderScaleOpts() {
  scaleOpts.innerHTML = scales.map(s =>
    `<button class="scale-btn ${s === scaleFactor ? 'active' : ''}" onclick="setScale(${s})">${s}x</button>`
  ).join('');
}

function setScale(s) {
  scaleFactor = s;
  renderScaleOpts();
}

renderScaleOpts();

const dropZone = $('#drop-zone');
dropZone.textContent = t('uploadHint');
dropZone.addEventListener('click', () => {
  const inp = document.createElement('input');
  inp.type = 'file';
  inp.accept = 'image/*';
  inp.onchange = () => { if (inp.files[0]) loadFile(inp.files[0]); };
  inp.click();
});
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.style.borderColor = 'var(--accent)'; });
dropZone.addEventListener('dragleave', () => { dropZone.style.borderColor = ''; });
dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.style.borderColor = ''; if (e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]); });

function loadFile(file) {
  const reader = new FileReader();
  reader.onload = () => {
    origImg = new Image();
    origImg.onload = () => {
      $('#drop-zone').style.display = 'none';
      $('#editor').style.display = 'block';
      drawOriginal();
    };
    origImg.src = reader.result;
  };
  reader.readAsDataURL(file);
}

function drawOriginal() {
  const c = $('#orig-preview');
  const maxPreview = 400;
  const ratio = origImg.width / origImg.height;
  c.width = Math.min(origImg.width, maxPreview);
  c.height = c.width / ratio;
  const cx = c.getContext('2d');
  cx.drawImage(origImg, 0, 0, c.width, c.height);
  $('#lbl-orig').textContent = `${t('original')}: ${origImg.width}×${origImg.height}`;
}

function doEnlarge() {
  if (!origImg) return;
  const newW = Math.min(Math.round(origImg.width * scaleFactor), 8192);
  const newH = Math.min(Math.round(origImg.height * scaleFactor), 8192);
  const c = $('#result-canvas');
  c.width = newW;
  c.height = newH;
  const cx = c.getContext('2d');
  cx.imageSmoothingEnabled = true;
  cx.imageSmoothingQuality = 'high';
  cx.drawImage(origImg, 0, 0, newW, newH);
  // Display at preview size
  const maxPreview = 400;
  const ratio = newW / newH;
  c.style.width = Math.min(newW, maxPreview) + 'px';
  c.style.height = (Math.min(newW, maxPreview) / ratio) + 'px';
  $('#lbl-result').textContent = `${t('enlarged')}: ${newW}×${newH} (${scaleFactor}x)`;
  $('#result-info').textContent = `${origImg.width}×${origImg.height} → ${newW}×${newH}`;
}

function downloadPNG() {
  const c = $('#result-canvas');
  if (!c.width) return;
  const a = document.createElement('a');
  a.href = c.toDataURL('image/png');
  a.download = `enlarged_${scaleFactor}x.png`;
  a.click();
}

function downloadJPG() {
  const c = $('#result-canvas');
  if (!c.width) return;
  const a = document.createElement('a');
  a.href = c.toDataURL('image/jpeg', 0.95);
  a.download = `enlarged_${scaleFactor}x.jpg`;
  a.click();
}

function newImage() {
  origImg = null;
  $('#drop-zone').style.display = '';
  $('#editor').style.display = 'none';
  const rc = $('#result-canvas');
  rc.width = 0; rc.height = 0;
  $('#result-info').textContent = '';
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="doEnlarge()">${t('enlarge')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="downloadPNG()">${t('downloadPNG')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="downloadJPG()">${t('downloadJPG')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="newImage()">${t('newImg')}</button>
`;

GZ.renderToolPage({
  category: 'image',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📐', href:'/image/resizer.html', name:'Image Resizer'},
    {icon:'📏', href:'/image/resize-percentage.html', name:'Resize by %'},
    {icon:'📦', href:'/image/compressor.html', name:'Image Compressor'},
    {icon:'✂️', href:'/image/cropper.html', name:'Image Cropper'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
