<script>
GZI18n.register({
  en: {
    toolTitle: 'Pregnancy Weight Gain Calculator',

    lb: 'lb', kg: 'kg',
    firstTri: '1st Trimester Gain',
    step1: 'Enter your pre-pregnancy weight and height',
    step2: 'Enter your current week of pregnancy and weight',
    step3: 'Select singleton or twins',
    step4: 'View your recommended weight gain range and status',
  },
  zh: {
    toolTitle: '孕期体重增长计算器',
    toolDesc: '基于美国医学研究院 (IOM) 指南计算推荐的孕期体重增长。输入孕前 BMI、当前孕周和体重，查看目标范围和每周增长速度。',
    pregnancyType: '怀孕类型',
    singleton: '单胎',
    twins: '双胎',
    preWeight: '孕前体重',
    preWeightPh: '如 60',
    curWeight: '当前体重',
    curWeightPh: '如 65',
    height: '身高',
    heightPh: '如 165',
    week: '当前孕周 (1-42)',
    weekPh: '如 20',
    unit: '单位制',
    metric: '公制 (kg/cm)',
    imperial: '英制 (lb/in)',
    calculate: '计算',
    bmiCategory: 'BMI 类别',
    bmi: '孕前 BMI',
    totalRange: '推荐总增长',
    targetNow: '当前孕周目标增长',
    weeklyRate: '每周增长 (孕中晚期)',
    actualGain: '已增重',
    status: '状态',
    underweight: '偏瘦',
    normal: '正常',
    overweight: '超重',
    obese: '肥胖',
    onTrack: '✓ 达标 — 在推荐范围内',
    belowRange: '⚠ 低于推荐范围',
    aboveRange: '⚠ 高于推荐范围',
    enterValid: '请输入所有字段的有效值。',
    lb: '磅', kg: 'kg',
    firstTri: '孕早期增长',
    step1: '输入孕前体重和身高',
    step2: '输入当前孕周和体重',
    step3: '选择单胎或双胎',
    step4: '查看推荐体重增长范围和状态',
  }
});

const { $, t } = GZ;

// IOM guidelines: [totalMin, totalMax, weeklyMin, weeklyMax] in kg
// Singleton
const SINGLE = {
  underweight: [12.5, 18.0, 0.51, 0.58],
  normal:      [11.5, 16.0, 0.35, 0.50],
  overweight:  [7.0,  11.5, 0.23, 0.33],
  obese:       [5.0,  9.0,  0.17, 0.27],
};
// Twins
const TWINS = {
  underweight: [null, null, null, null], // not established
  normal:      [16.8, 24.5, 0.50, 0.67],
  overweight:  [14.1, 22.7, 0.41, 0.58],
  obese:       [11.3, 18.9, 0.31, 0.50],
};

const kgToLb = k => k * 2.20462;
const lbToKg = l => l * 0.453592;

$('#app').innerHTML = `
  <div class="gz-field">
    <label>${t('pregnancyType')}</label>
    <div class="gz-radio-group">
      <label><input type="radio" name="ptype" value="singleton" checked> ${t('singleton')}</label>
      <label><input type="radio" name="ptype" value="twins"> ${t('twins')}</label>
    </div>
  </div>
  <div class="gz-field">
    <label>${t('unit')}</label>
    <select id="unit" onchange="toggleUnits()">
      <option value="metric">${t('metric')}</option>
      <option value="imperial">${t('imperial')}</option>
    </select>
  </div>
  <div style="display:flex;gap:12px;flex-wrap:wrap">
    <div class="gz-field" style="flex:1;min-width:120px">
      <label id="prew-lbl">${t('preWeight')} (kg)</label>
      <input type="number" id="preWeight" placeholder="${t('preWeightPh')}" value="60">
    </div>
    <div class="gz-field" style="flex:1;min-width:120px">
      <label id="curw-lbl">${t('curWeight')} (kg)</label>
      <input type="number" id="curWeight" placeholder="${t('curWeightPh')}" value="66">
    </div>
    <div class="gz-field" style="flex:1;min-width:120px">
      <label id="h-lbl">${t('height')} (cm)</label>
      <input type="number" id="height" placeholder="${t('heightPh')}" value="165">
    </div>
  </div>
  <div class="gz-field">
    <label>${t('week')}</label>
    <input type="number" id="week" placeholder="${t('weekPh')}" value="20" min="1" max="42">
  </div>
  <button class="gz-btn" onclick="calc()" style="width:100%;max-width:400px;font-size:1.05em;padding:12px">${t('calculate')}</button>
  <div id="result"></div>
`;

function toggleUnits() {
  const u = $('#unit').value;
  const u2 = u === 'metric' ? '(kg)' : '(lb)';
  const h2 = u === 'metric' ? '(cm)' : '(in)';
  $('#prew-lbl').textContent = t('preWeight') + ' ' + u2;
  $('#curw-lbl').textContent = t('curWeight') + ' ' + u2;
  $('#h-lbl').textContent = t('height') + ' ' + h2;
}

function bmiCat(bmi) {
  if (bmi < 18.5) return 'underweight';
  if (bmi < 25.0) return 'normal';
  if (bmi < 30.0) return 'overweight';
  return 'obese';
}

function calc() {
  const ptype = document.querySelector('input[name=ptype]:checked').value;
  const unit = $('#unit').value;
  let preW = +$('#preWeight').value;
  let curW = +$('#curWeight').value;
  let height = +$('#height').value;
  let week = +$('#week').value;

  if (!preW || !curW || !height || !week || preW < 1 || curW < 1 || height < 1 || week < 1 || week > 42) {
    $('#result').innerHTML = `<div class="warn">${t('enterValid')}</div>`;
    return;
  }

  // Convert to metric
  let preKg = unit === 'imperial' ? lbToKg(preW) : preW;
  let curKg = unit === 'imperial' ? lbToKg(curW) : curW;
  let hM = (unit === 'imperial' ? height * 0.0254 : height / 100);

  const bmi = preKg / (hM * hM);
  const cat = bmiCat(bmi);
  const guide = ptype === 'twins' ? TWINS : SINGLE;
  const g = guide[cat];

  const unitLabel = unit === 'metric' ? t('kg') : t('lb');
  const fmt = k => unit === 'imperial' ? kgToLb(k).toFixed(1) : k.toFixed(1);

  if (g[0] === null) {
    $('#result').innerHTML = `<div class="warn">${t('underweight')} + ${t('twins')}: guidelines not established. Please consult your healthcare provider.</div>`;
    return;
  }

  // First trimester: ~0.5-2 kg total (use 1.6kg for underweight, 1.5 normal, 1.0 overweight, 0.5 obese)
  const firstTriGain = { underweight: 2.3, normal: 1.6, overweight: 1.0, obese: 0.5 }[cat];

  // Target by current week
  let targetMin, targetMax;
  if (week <= 13) {
    targetMin = (firstTriGain / 13) * week;
    targetMax = (firstTriGain / 13) * week;
  } else {
    targetMin = firstTriGain + g[2] * (week - 13);
    targetMax = firstTriGain + g[3] * (week - 13);
  }

  const actualGain = curKg - preKg;
  const pctInRange = Math.max(0, Math.min(100, (actualGain / g[1]) * 100));
  let statusText, statusClass;
  if (actualGain >= targetMin * 0.8 && actualGain <= targetMax * 1.2) {
    statusText = t('onTrack'); statusClass = 'ok';
  } else if (actualGain < targetMin * 0.8) {
    statusText = t('belowRange'); statusClass = 'warn';
  } else {
    statusText = t('aboveRange'); statusClass = 'warn';
  }

  $('#result').innerHTML = `
    <div class="result-card">
      <div class="result-big">${fmt(g[0])}–${fmt(g[1])} <span style="font-size:1rem;color:var(--text2)">${unitLabel}</span></div>
      <div style="color:var(--text2);font-size:.85em">${t('totalRange')}</div>
      <div class="result-grid">
        <div class="result-item"><div class="val">${bmi.toFixed(1)}</div><div class="lbl">${t('bmi')}</div></div>
        <div class="result-item"><div class="val" style="font-size:1rem">${t(cat)}</div><div class="lbl">${t('bmiCategory')}</div></div>
        <div class="result-item"><div class="val">${fmt(targetMin)}–${fmt(targetMax)}</div><div class="lbl">${t('targetNow')}</div></div>
        <div class="result-item"><div class="val">${fmt(actualGain)}</div><div class="lbl">${t('actualGain')}</div></div>
        <div class="result-item"><div class="val">${fmt(g[2])}–${fmt(g[3])}</div><div class="lbl">${t('weeklyRate')}/${unitLabel}</div></div>
      </div>
      <div style="margin-top:16px">
        <div style="font-size:.85em;color:var(--text2);margin-bottom:4px">${t('actualGain')} vs ${t('totalRange')}</div>
        <div class="progress-track">
          <div class="progress-fill" style="width:${pctInRange}%;background:linear-gradient(90deg,#4ecdc4,#27ae60)">${fmt(actualGain)} ${unitLabel}</div>
        </div>
      </div>
      <div class="${statusClass}">${statusText}</div>
    </div>
  `;
}

$('#toolbar').innerHTML = ``;

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🤰', href:'/calc/due-date-calculator.html', name:'Due Date Calculator'},
    {icon:'⚖️', href:'/calc/bmi-calculator.html', name:'BMI Calculator'},
    {icon:'🔥', href:'/calc/tdee-calculator.html', name:'TDEE Calculator'},
    {icon:'📊', href:'/calc/percentage-calculator.html', name:'Percentage Calculator'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
