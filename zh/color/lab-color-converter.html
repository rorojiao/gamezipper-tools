});

const { $, copyText, t } = GZ;
$('#lblPick').textContent=t('pick');

// --- Color math ---
function hexToRgb(hex){hex=hex.replace('#','');if(hex.length===3)hex=hex.split('').map(c=>c+c).join('');const n=parseInt(hex,16);return{r:(n>>16)&255,g:(n>>8)&255,b:n&255};}
function rgbToHex(r,g,b){return'#'+[r,g,b].map(x=>Math.max(0,Math.min(255,Math.round(x))).toString(16).padStart(2,'0')).join('').toUpperCase();}
function rgbToHsl(r,g,b){r/=255;g/=255;b/=255;const max=Math.max(r,g,b),min=Math.min(r,g,b);let h,s,l=(max+min)/2;
  if(max===min){h=s=0;}else{const d=max-min;s=l>0.5?d/(2-max-min):d/(max+min);
  switch(max){case r:h=(g-b)/d+(g<b?6:0);break;case g:h=(b-r)/d+2;break;default:h=(r-g)/d+4;}h/=6;}return{h:Math.round(h*360),s:Math.round(s*100),l:Math.round(l*100)};}
function rgbToHsv(r,g,b){r/=255;g/=255;b/=255;const max=Math.max(r,g,b),min=Math.min(r,g,b),d=max-min;let h=0;const s=max===0?0:d/max;const v=max;
  if(d!==0){switch(max){case r:h=(g-b)/d+(g<b?6:0);break;case g:h=(b-r)/d+2;break;default:h=(r-g)/d+4;}h/=6;}return{h:Math.round(h*360),s:Math.round(s*100),v:Math.round(v*100)};}
function rgbToCmyk(r,g,b){r/=255;g/=255;b/=255;const k=1-Math.max(r,g,b);if(k===1)return{c:0,m:0,y:0,k:100};return{c:Math.round((1-r-k)/(1-k)*100),m:Math.round((1-g-k)/(1-k)*100),y:Math.round((1-b-k)/(1-k)*100),k:Math.round(k*100)};}
function srgbToLinear(c){c/=255;return c<=0.04045?c/12.92:Math.pow((c+0.055)/1.055,2.4);}
function rgbToXyz(r,g,b){const R=srgbToLinear(r),G=srgbToLinear(g),B=srgbToLinear(b);
  return{x:(R*0.4124564+G*0.3575761+B*0.1804375)*100,y:(R*0.2126729+G*0.7151522+B*0.0721750)*100,z:(R*0.0193339+G*0.1191920+B*0.9503041)*100};}
function xyzToLab(x,y,z){x/=95.047;y/=100;z/=108.883;const f=c=>c>0.008856?Math.cbrt(c):(7.787*c+16/116);const fx=f(x),fy=f(y),fz=f(z);return{l:116*fy-16,a:500*(fx-fy),b:200*(fy-fz)};}
function labToLch(l,a,b){const c=Math.sqrt(a*a+b*b);let h=Math.atan2(b,a)*180/Math.PI;if(h<0)h+=360;return{l,c,h:Math.round(h)};}

const cards=[
  ['HEX','hex'], ['RGB','rgb'], ['HSL','hsl'], ['HSV','hsv'],
  ['CMYK','cmyk'], ['XYZ','xyz'], ['CIELAB','lab'], ['LCH','lch']
];
$('#grid').innerHTML=cards.map(([name,id])=>`
  <div class="lc-card">
    <div class="head"><span class="name">${name}</span><button class="copy-btn" data-id="${id}">📋 Copy</button></div>
    <div class="lc-val" id="v-${id}"></div>
  </div>`).join('');

document.querySelectorAll('.copy-btn').forEach(btn=>btn.onclick=()=>copyText($('#v-'+btn.dataset.id).textContent));

function fmtObj(o,keys,unit){return keys.map(k=>`<span class="num">${o[k]}</span>${unit||''}`).join(', ');}

function update(){
  let h=$('#hex').value.trim();if(!/^#?[0-9a-f]{6}$/i.test(h))return;
  const{r,g,b}=hexToRgb(h);const hsl=rgbToHsl(r,g,b);const hsv=rgbToHsv(r,g,b);
  const cmyk=rgbToCmyk(r,g,b);const xyz=rgbToXyz(r,g,b);const lab=xyzToLab(xyz.x,xyz.y,xyz.z);const lch=labToLch(lab.l,lab.a,lab.b);
  $('#swatch').style.background=h;
  $('#v-hex').innerHTML=`<span class="num">${h.toUpperCase()}</span>`;
  $('#v-rgb').innerHTML=`rgb(<span class="num">${r}</span>, <span class="num">${g}</span>, <span class="num">${b}</span>)`;
  $('#v-hsl').innerHTML=`hsl(<span class="num">${hsl.h}</span>, <span class="num">${hsl.s}%</span>, <span class="num">${hsl.l}%</span>)`;
  $('#v-hsv').innerHTML=`<span class="num">${hsv.h}</span>°, <span class="num">${hsv.s}%</span>, <span class="num">${hsv.v}%</span>`;
  $('#v-cmyk').innerHTML=`<span class="num">${cmyk.c}%</span>, <span class="num">${cmyk.m}%</span>, <span class="num">${cmyk.y}%</span>, <span class="num">${cmyk.k}%</span>`;
  $('#v-xyz').innerHTML=`<span class="num">${xyz.x.toFixed(2)}</span>, <span class="num">${xyz.y.toFixed(2)}</span>, <span class="num">${xyz.z.toFixed(2)}</span>`;
  $('#v-lab').innerHTML=`<span class="num">${lab.l.toFixed(1)}</span>, <span class="num">${lab.a.toFixed(1)}</span>, <span class="num">${lab.b.toFixed(1)}</span>`;
  $('#v-lch').innerHTML=`<span class="num">${lch.l.toFixed(1)}</span>, <span class="num">${lch.c.toFixed(1)}</span>, <span class="num">${lch.h}°</span>`;
  $('#explain').innerHTML=`<b>${t('pick')}:</b> ${h.toUpperCase()} → LAB (<code>${lab.l.toFixed(1)}, ${lab.a.toFixed(1)}, ${lab.b.toFixed(1)}</code>).<br>${GZI18n.getLang()==='zh'?'转换路径：sRGB → XYZ (D65 参考白) → CIELAB → LCH。所有计算在浏览器本地完成。':'Path: sRGB → XYZ (D65 reference white) → CIELAB → LCH. All calculations run locally in your browser.'}`;
}

$('#picker').oninput=e=>{$('#hex').value=e.target.value.toUpperCase();update();};
$('#hex').oninput=e=>{const v=e.target.value.trim();if(/^#?[0-9a-f]{6}$/i.test(v)){$('#picker').value=v.startsWith('#')?v:'#'+v;update();}};

$('#toolbar').innerHTML=`<button class="gz-btn gz-btn-secondary" id="btnRand">${t('example')}</button>`;
$('#btnRand').onclick=()=>{const c='#'+Math.floor(Math.random()*16777215).toString(16).padStart(6,'0').toUpperCase();$('#hex').value=c;$('#picker').value=c;update();};

update();
