<script>
GZI18n.register({
  en: {
    toolTitle: 'Carbon Footprint Calculator',
    toolDesc: 'Estimate your annual CO\u2082 emissions from transport, energy and food. See your impact and get reduction tips. Free and private.',
    secTransport: '\ud83d\ude97 Transport',
    secEnergy: '\u26a1 Home Energy',
    secFood: '\ud83c\udf5e Food & Diet',
    carKm: 'Car travel (km/year)',
    flights: 'Flights per year (hours total)',
    transitKm: 'Public transit (km/year)',
    electricity: 'Electricity (kWh/year)',
    gas: 'Natural gas (m\u00b3/year)',
    diet: 'Diet type',
    totalEmissions: 'tons CO\u2082 / year',
    transportEmissions: 'Transport',
    energyEmissions: 'Energy',
    foodEmissions: 'Food',
    vsAverage: 'vs global avg (4.7t)',
    treesNeeded: 'Trees to offset',
    reductionTips: '\ud83c\udf31 Tips to reduce',
    tip1: 'Switch to public transit or carpool',
    tip2: 'Use LED bulbs and energy-efficient appliances',
    tip3: 'Eat plant-based meals 2-3 times per week',
    tip4: 'Reduce air travel or offset emissions',
    step1: 'Enter your annual car, flight and transit usage',
    step2: 'Add your home electricity and gas consumption',
    step3: 'Select your diet type',
    step4: 'Review your carbon footprint and tips',
  },
  zh: {
    toolTitle: '碳排放计算器',
    toolDesc: '估算你每年来自交通、能源和饮食的二氧化碳排放量。查看影响并获得减排建议。免费、私密。',
    secTransport: '\ud83d\ude97 交通',
    secEnergy: '\u26a1 家庭能源',
    secFood: '\ud83c\udf5e 饮食',
    carKm: '汽车出行（公里/年）',
    flights: '每年飞行（总小时数）',
    transitKm: '公共交通（公里/年）',
    electricity: '用电量（度/年）',
    gas: '天然气（立方米/年）',
    diet: '饮食类型',
    totalEmissions: '吨 CO\u2082 / 年',
    transportEmissions: '交通',
    energyEmissions: '能源',
    foodEmissions: '饮食',
    vsAverage: '对比全球均值(4.7吨)',
    treesNeeded: '需要植树',
    reductionTips: '\ud83c\udf31 减排建议',
    tip1: '改乘公共交通或拼车',
    tip2: '使用 LED 灯和节能电器',
    tip3: '每周吃 2-3 顿植物餐',
    tip4: '减少飞行或购买碳抵消',
    step1: '输入年度汽车、飞行和公共交通使用量',
    step2: '添加家庭用电和天然气消耗',
    step3: '选择你的饮食类型',
    step4: '查看碳排放结果和建议',
  }
});

const { $, t } = GZ;

const DIET_EMISSIONS = { 'meat-heavy': 3.3, 'average': 2.5, 'low-meat': 1.8, 'vegetarian': 1.7, 'vegan': 1.5 };
const DIET_LABELS_EN = { 'meat-heavy':'Heavy meat-eater','average':'Average','low-meat':'Low meat','vegetarian':'Vegetarian','vegan':'Vegan' };

function calculate() {
  const carKm = parseFloat($('#car-km').value) || 0;
  const flights = parseFloat($('#flights').value) || 0;
  const transitKm = parseFloat($('#transit-km').value) || 0;
  const electricity = parseFloat($('#electricity').value) || 0;
  const gas = parseFloat($('#gas').value) || 0;
  const diet = $('#diet').value;

  const transport = (carKm * 0.000192) + (flights * 0.09) + (transitKm * 0.000065);
  const energy = (electricity * 0.000381) + (gas * 0.0021);
  const food = DIET_EMISSIONS[diet] || 2.5;
  const total = transport + energy + food;

  $('#result').style.display = 'block';
  $('#result-total').textContent = total.toFixed(1);
  $('#result-vs-avg').textContent = total > 4.7 ? '+' + (total - 4.7).toFixed(1) + 't' : (total - 4.7).toFixed(1) + 't';
  $('#result-trees').textContent = Math.ceil(total / 0.021);

  const cats = [
    { name: t('transportEmissions'), val: transport, color: '#4ecdc4' },
    { name: t('energyEmissions'), val: energy, color: '#f7b731' },
    { name: t('foodEmissions'), val: food, color: '#51cf66' },
  ];
  const maxVal = Math.max(...cats.map(c => c.val), 0.1);
  $('#cat-bar').innerHTML = cats.map(c =>
    `<div style="width:${(c.val/maxVal*100)}%;background:${c.color}">${c.val.toFixed(1)}</div>`
  ).join('');
  $('#legend').innerHTML = cats.map(c =>
    `<span><i style="background:${c.color}"></i>${c.name}</span>`
  ).join('');

  $('#tips').innerHTML = `<h3>${t('reductionTips')}</h3><ul><li>${t('tip1')}</li><li>${t('tip2')}</li><li>${t('tip3')}</li><li>${t('tip4')}</li></ul>`;
}

document.querySelectorAll('input[type=number]').forEach(el => el.addEventListener('input', calculate));
$('#diet').addEventListener('change', calculate);
calculate();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'\ud83d\udcb0', href:'/calc/monthly-budget-calculator.html', name:'Budget'},
    {icon:'\ud83c\udf10', href:'/calc/unit-converter.html', name:'Unit Converter'},
    {icon:'\u26fd', href:'/calc/fuel-cost-calculator.html', name:'Fuel Cost'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
