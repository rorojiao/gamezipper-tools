const { $, copyText, t } = GZ;
let _big = null; // BigInt helper

function ipv6ToBigInt(s) {
  s = s.trim().toLowerCase();
  if (!/^[0-9a-f:]+$/.test(s)) throw new Error('bad');
  // Handle IPv4-mapped (::ffff:1.2.3.4)
  const v4 = s.match(/:((?:\d{1,3}\.){3}\d{1,3})$/);
  if (v4) {
    const parts = v4[1].split('.').map(Number);
    if (parts.some(p => p > 255)) throw new Error('bad');
    const hex = parts.map(p => p.toString(16).padStart(2, '0')).join('');
    s = s.slice(0, s.length - v4[1].length) + hex.slice(0,4) + ':' + hex.slice(4);
  }
  // Expand :: shorthand
  let blocks;
  if (s.includes('::')) {
    const parts = s.split('::');
    if (parts.length !== 2) throw new Error('bad');
    const head = parts[0] ? parts[0].split(':') : [];
    const tail = parts[1] ? parts[1].split(':') : [];
    const missing = 8 - head.length - tail.length;
    if (missing < 0) throw new Error('bad');
    blocks = head.concat(new Array(missing).fill('0'), tail);
  } else {
    blocks = s.split(':');
  }
  if (blocks.length !== 8) throw new Error('bad');
  let out = 0n;
  for (const b of blocks) {
    if (!/^[0-9a-f]{1,4}$/.test(b)) throw new Error('bad');
    out = (out << 16n) | BigInt(parseInt(b, 16));
  }
  return out;
}

function bigIntToIpv6(big, compressed=true) {
  const blocks = [];
  let v = big;
  for (let i = 0; i < 8; i++) {
    blocks.unshift(Number(v & 0xFFFFn).toString(16));
    v >>= 16n;
  }
  const expanded = blocks.map(b => b.padStart(4, '0')).join(':');
  if (!compressed) return expanded;
  // Compress: find longest run of all-zero blocks, replace with ::
  const zeroRuns = [];
  let runStart = -1, runLen = 0;
  for (let i = 0; i < blocks.length; i++) {
    if (Number(blocks[i]) === 0) {
      if (runStart === -1) runStart = i;
      runLen++;
    } else {
      if (runLen >= 2) zeroRuns.push([runStart, runLen]);
      runStart = -1; runLen = 0;
    }
  }
  if (runLen >= 2) zeroRuns.push([runStart, runLen]);
  if (zeroRuns.length === 0) {
    return blocks.map(b => b.replace(/^0+(?=\d)/, '')).join(':');
  }
  // Pick longest run (first one wins ties)
  zeroRuns.sort((a,b) => b[1] - a[1]);
  const [start, len] = zeroRuns[0];
  const head = blocks.slice(0, start).map(b => b.replace(/^0+(?=\d)/, ''));
  const tail = blocks.slice(start + len).map(b => b.replace(/^0+(?=\d)/, ''));
  return (head.join(':') || '') + '::' + (tail.join(':') || '');
}

function formatBig(n) {
  // Format BigInt with thousand separators
  const s = n.toString();
  return s.replace(/\B(?=(\d{3})+(?!\d))/g, ',');
}

function powerOfTwo(exp) {
  // 2^exp as decimal string with comma separators, also scientific
  if (exp === 0) return { full: '1', sci: '1' };
  let big = 1n;
  for (let i = 0; i < exp; i++) big <<= 1n;
  const str = big.toString();
  const formatted = str.replace(/\B(?=(\d{3})+(?!\d))/g, ',');
  // Scientific notation
  let sci;
  if (exp < 6) sci = big.toString();
  else {
    const mantissaStr = str[0] + '.' + str.slice(1, 4);
    sci = `${mantissaStr.replace(/\.?0+$/, '')} × 10^${str.length - 1}`;
  }
  return { full: formatted, sci };
}

function detectType(big) {
  // ::/0
  if (big === 0n) return { en: 'Unspecified (::/128)', zh: '未指定地址 (::/128)', color: 'muted' };
  // ::1
  if (big === 1n) return { en: 'Loopback (::1)', zh: '环回地址 (::1)', color: 'info' };
  // ::ffff:0:0/96 — IPv4-mapped
  if ((big >> 80n) === 0n && (big & 0xFFFF0000000000000000n) === 0xFFFF0000000000000000n) return { en: 'IPv4-mapped (::ffff:0:0/96)', zh: 'IPv4 映射 (::ffff:0:0/96)' };
  // 64:ff9b::/96 — NAT64
  if ((big >> 32n) === 0x64FF9Bn) return { en: 'NAT64 (64:ff9b::/96)', zh: 'NAT64 (64:ff9b::/96)' };
  // 100::/64 — discard prefix
  if (big >> 120n === 0x100n && big << 8n >> 8n === 0n) return { en: 'Discard (100::/64)', zh: '丢弃前缀 (100::/64)' };
  // 2001:db8::/32 — documentation
  if (big >> 96n === 0x20010DB8n) return { en: 'Documentation (2001:db8::/32)', zh: '文档用途 (2001:db8::/32)' };
  // 2000::/3 — global unicast
  if (big >> 125n === 0b001n) return { en: 'Global Unicast (2000::/3)', zh: '全球单播 (2000::/3)', color: 'success' };
  // fc00::/7 — unique local
  if (big >> 121n === 0b1111110n) return { en: 'Unique Local (fc00::/7)', zh: '唯一本地 (fc00::/7)', color: 'info' };
  // fe80::/10 — link-local
  if (big >> 118n === 0b1111111010n) return { en: 'Link-Local (fe80::/10)', zh: '链路本地 (fe80::/10)', color: 'warn' };
  // ff00::/8 — multicast
  if (big >> 120n === 0xFFn) return { en: 'Multicast (ff00::/8)', zh: '组播 (ff00::/8)', color: 'warn' };
  return { en: 'Reserved / Other', zh: '保留 / 其他' };
}

function reverseDnsZone(networkBig, prefix) {
  // For prefixes that are nibble-aligned (multiple of 4), build ip6.arpa zone
  if (prefix % 4 !== 0) return null;
  const nibbles = prefix / 4;
  // Get the network nibbles
  let nibbleArr = [];
  let v = networkBig;
  for (let i = 0; i < 32; i++) {
    nibbleArr.unshift(Number(v & 0xFn));
    v >>= 4n;
  }
  // Take first `nibbles` nibbles, reverse
  const zoneNibbles = nibbleArr.slice(0, nibbles).reverse().map(n => n.toString(16));
  return zoneNibbles.join('.') + '.ip6.arpa';
}

function renderResult(ipStr, prefix) {
  let ipBig;
  try { ipBig = ipv6ToBigInt(ipStr); }
  catch (e) { $('#err').textContent = t('invalidIp'); $('#result').innerHTML = ''; return false; }
  if (prefix < 0 || prefix > 128 || !Number.isInteger(prefix)) {
    $('#err').textContent = t('invalidPrefix');
    $('#result').innerHTML = '';
    return false;
  }
  $('#err').textContent = '';

  const mask = prefix === 0 ? 0n : ((1n << BigInt(prefix)) - 1n) << BigInt(128 - prefix);
  const networkBig = ipBig & mask;
  const hostBits = 128 - prefix;
  const totalBig = 1n << BigInt(hostBits);
  const lastBig = prefix === 0 ? ((1n << 128n) - 1n) : (networkBig | (totalBig - 1n));

  const typeInfo = detectType(networkBig);
  const totalFmt = powerOfTwo(hostBits);
  const zone = reverseDnsZone(networkBig, prefix);

  // Subnet split into /64 LANs (only when prefix < 64)
  let splitHtml = '';
  if (prefix < 64) {
    const splitBits = 64 - prefix;
    const splitCount = 1 << splitBits;
    const showCount = Math.min(splitCount, 256);
    const lanSize = 1n << 64n;
    const items = [];
    for (let i = 0; i < showCount; i++) {
      const lan = networkBig + BigInt(i) * lanSize;
      items.push(`<div class="split-item">${bigIntToIpv6(lan)}/64</div>`);
    }
    const more = splitCount > showCount
      ? `<p style="grid-column:1/-1;text-align:center;color:var(--text2);font-size:.85rem;padding-top:6px">… ${formatBig(BigInt(splitCount - showCount))} more /64 subnets (showing first ${showCount})</p>`
      : '';
    splitHtml = `
      <div class="result-item" style="grid-column:1/-1">
        <div class="lbl">${t('subnetSplit')} · <span style="color:var(--accent);font-weight:700">${formatBig(BigInt(splitCount))}</span> × /64</div>
        <div class="split-grid" style="margin-top:8px">${items.join('')}${more}</div>
      </div>`;
  }

  const copyHtml = (text) => ` <span class="copy-link" data-copy="${text.replace(/"/g, '&quot;')}">${t('copy')}</span>`;

  $('#result').innerHTML = `
    <div class="result-grid">
      <div class="result-item hl">
        <div class="lbl">${t('network')}${copyHtml(bigIntToIpv6(networkBig) + '/' + prefix)}</div>
        <div class="val">${bigIntToIpv6(networkBig)}/${prefix}</div>
        <div class="sub">${bigIntToIpv6(networkBig, false)}</div>
      </div>
      <div class="result-item host-count">
        <div class="lbl">${t('total')}</div>
        <div class="val">${totalFmt.sci}</div>
        <div class="sub">2^${hostBits}${hostBits <= 20 ? ' = ' + totalFmt.full : ''}</div>
      </div>
      <div class="result-item">
        <div class="lbl">${t('rangeStart')}</div>
        <div class="val">${bigIntToIpv6(networkBig)}</div>
      </div>
      <div class="result-item">
        <div class="lbl">${t('rangeEnd')}</div>
        <div class="val">${bigIntToIpv6(lastBig)}</div>
      </div>
      <div class="result-item">
        <div class="lbl">${t('compressed')}</div>
        <div class="val">${bigIntToIpv6(networkBig)}</div>
      </div>
      <div class="result-item">
        <div class="lbl">${t('expanded')}</div>
        <div class="val" style="font-size:.85rem">${bigIntToIpv6(networkBig, false)}</div>
      </div>
      ${zone ? `<div class="result-item"><div class="lbl">${t('reverseDns')}</div><div class="val" style="font-size:.95rem">${zone}</div></div>` : ''}
      ${splitHtml}
    </div>
    <div class="type-info">
      <b>${t('type')}:</b> <span class="type-badge">${typeInfo[GZI18n.getLang()] || typeInfo.en}</span>
      <div style="margin-top:8px;font-size:.82rem;line-height:1.7;color:var(--text2)">
        ${GZI18n.getLang() === 'zh'
          ? `IPv6 地址共 <b>${prefix}</b> 位网络前缀和 <b>${hostBits}</b> 位主机部分。${prefix <= 64 ? `此范围内可容纳 <b>${totalFmt.sci}</b> 个地址。` : `IPv6 子网通常使用 /64，这是一个主机位较多的子网。`}`
          : `The IPv6 address has a <b>${prefix}</b>-bit network prefix and <b>${hostBits}</b>-bit host portion. ${prefix <= 64 ? `This range contains <b>${totalFmt.sci}</b> addresses.` : `IPv6 LANs typically use /64 — this is a host-heavy subnet.`}`}
      </div>
    </div>
  `;
  // Bind copy links
  $('#result').querySelectorAll('.copy-link').forEach(el => {
    el.onclick = () => { copyText(el.dataset.copy); el.textContent = t('copied'); setTimeout(()=>el.textContent=t('copy'),1200); };
  });
  return true;
}

function calculate() {
  const ip = $('#ip').value.trim();
  const pfx = parseInt($('#prefix').value, 10);
  if (!ip) { $('#err').textContent = t('invalidIp'); return; }
  renderResult(ip, pfx);
}

$('#calc-btn').onclick = calculate;
$('#clear-btn').onclick = () => { $('#ip').value=''; $('#prefix').value=''; $('#err').textContent=''; $('#result').innerHTML=''; };
$('#ip').addEventListener('keydown', e => { if (e.key === 'Enter') calculate(); });
$('#prefix').addEventListener('keydown', e => { if (e.key === 'Enter') calculate(); });
$('#prefix-preset').onchange = e => { if (e.target.value) { $('#prefix').value = e.target.value; calculate(); } };
$('#ip').addEventListener('input', () => { if ($('#ip').value.length > 4) calculate(); });
$('#prefix').addEventListener('input', () => calculate());

  { ip: '2001:db8:abcd:1234::', prefix: 64, label: 'LAN /64' },
  { ip: 'fd12:3456:789a::', prefix: 56, label: 'ULA /56' },
  { ip: 'fe80::1', prefix: 64, label: 'Link-local' },
  { ip: 'ff02::1', prefix: 128, label: 'Multicast host' },
];
$('#examples').innerHTML = examples.map((ex, i) =>
  `<button data-ex="${i}">${ex.label}</button>`).join('');
$('#examples').querySelectorAll('button').forEach(b => {
  b.onclick = () => {
    const ex = examples[+b.dataset.ex];
    $('#ip').value = ex.ip; $('#prefix').value = ex.prefix;
    calculate();
  };
});

});
