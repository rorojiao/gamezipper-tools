// Wide style uses fullwidth chars
const WIDE_BASE = 0xFF01;
function toWide(str){
  let out='';
  for(const ch of str){
    const c = ch.charCodeAt(0);
    if(c>=33 && c<=126){ out += String.fromCharCode(c - 33 + 0xFF01); }
    else if(ch===' '){ out += '\u3000'; }
    else { out += ch; }
  }
  return out;
}

function convert(str, style){
  if(style.key==='Wɪᴅᴇ') return toWide(str);
  if(!style.map) return str;
  let out='';
  for(const ch of str){
    out += style.map[ch] || ch;
  }
  return out;
}

function render(){
  const input = $('#input').value || t('sampleText');
  let html = '';
  for(const s of STYLES){
    const result = convert(input, s);
    html += `<div class="fancy-row"><span class="label">${s.key}</span><span class="out">${escapeHtml(result)}</span><button class="gz-btn gz-btn-tool copy-btn" data-text="${escapeAttr(result)}">${t('clear').replace('Clear','Copy').replace('清空','复制')}</button></div>`;
  }
  $('#output').innerHTML = html;
  $('#output').querySelectorAll('.copy-btn').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      copyText(btn.dataset.text);
      const orig = btn.textContent;
      btn.textContent = t('copied');
      setTimeout(()=>{btn.textContent = orig;}, 1200);
    });
  });
}

function escapeHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function escapeAttr(s){return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

$('#input').addEventListener('input', render);

$('#btn-clear').addEventListener('click', ()=>{$('#input').value='';render();$('#input').focus();});
