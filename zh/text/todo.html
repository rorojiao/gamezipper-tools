<style>
.todo-wrap{max-width:780px;margin:0 auto}
.todo-input-row{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.todo-input-row input,.todo-input-row select{padding:10px 12px;border-radius:8px;border:1px solid var(--border);background:var(--glass2);color:var(--text);font-size:.95rem}
.todo-input-row input[type=text]{flex:2;min-width:200px}
.todo-input-row input[type=date]{flex:1;min-width:140px}
.todo-input-row select{flex:1;min-width:120px}
.todo-input-row button{padding:10px 18px}
.todo-filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;align-items:center}
.todo-filters button{padding:6px 12px;border-radius:18px;border:1px solid var(--border);background:var(--glass2);color:var(--text);cursor:pointer;font-size:.85rem}
.todo-filters button.active{background:var(--gz-accent);color:#fff;border-color:var(--gz-accent)}
.todo-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:8px;margin-bottom:14px}
.todo-stat{background:var(--glass2);border:1px solid var(--border);border-radius:8px;padding:8px 12px;text-align:center}
.todo-stat .num{font-size:1.4em;font-weight:700;color:var(--gz-accent)}
.todo-stat .label{font-size:.75em;color:var(--text2);margin-top:2px}
.todo-list{display:flex;flex-direction:column;gap:6px;min-height:80px}
.todo-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--glass2);border:1px solid var(--border);border-radius:8px;transition:opacity .2s}
.todo-item.done{opacity:.55}
.todo-item.done .task-text{text-decoration:line-through}
.todo-item.overdue{border-color:var(--gz-accent)}
.todo-item .check{width:22px;height:22px;cursor:pointer;flex-shrink:0}
.todo-item .task-text{flex:1;font-size:.95rem;word-break:break-word}
.todo-item .meta{font-size:.72em;color:var(--text2);display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:2px}
.todo-item .badge{padding:2px 8px;border-radius:10px;font-size:.7em;font-weight:600}
.badge-cat{background:rgba(100,150,255,.15);color:#6496ff}
.badge-prio-high{background:rgba(255,80,80,.18);color:#ff6b6b}
.badge-prio-med{background:rgba(255,180,40,.18);color:#ffb428}
.badge-prio-low{background:rgba(80,200,120,.18);color:#50c878}
.todo-item .actions{display:flex;gap:4px}
.todo-item .actions button{background:transparent;border:none;cursor:pointer;color:var(--text2);padding:4px 8px;border-radius:4px;font-size:.85rem}
.todo-item .actions button:hover{color:var(--gz-accent);background:var(--glass)}
.todo-empty{text-align:center;padding:30px 20px;color:var(--text2);font-size:.9rem}
</style>
<script type="application/ld+json">{"@context":"https://schema.org","@type":"WebApplication","name":"To-Do List","description":"Free online to-do list and task manager. Add, organize, prioritize and track tasks with deadlines, categories and local storage.","url": "https://tools.gamezipper.com/zh/text/todo.html","applicationCategory":"Utility","operatingSystem":"Web Browser","offers":{"@type":"Offer","price":"0"}}</script>
<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "Is the to-do list saved automatically?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. All your tasks are saved to your browser's local storage instantly as you add, complete or delete them. Your list persists between page reloads on the same device and browser."}}, {"@type": "Question", "name": "Can I organize tasks with categories and priorities?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. Each task can be assigned a category (work, personal, shopping, etc.) and a priority level (low, medium, high). You can also filter and sort by these fields."}}, {"@type": "Question", "name": "Are my tasks sent to any server?", "acceptedAnswer": {"@type": "Answer", "text": "No. The to-do list runs entirely in your browser using local storage. Tasks are never uploaded, shared or transmitted to any server."}}, {"@type": "Question", "name": "Can I set deadlines for tasks?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. Each task can have an optional due date. Overdue tasks are highlighted in red so you can spot what needs immediate attention."}}]}</script>

<link rel="alternate" hreflang="zh" href="https://tools.gamezipper.com/zh/text/todo.html">
<link rel="alternate" hreflang="x-default" href="https://tools.gamezipper.com/text/todo.html">
<script>localStorage.setItem('gz-lang','zh');</script>
</head>
<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="todo-wrap">
      <div class="todo-input-row">
        <input type="text" id="taskInput" placeholder="">
        <input type="date" id="taskDate">
        <select id="taskCat">
          <option value="personal">📌</option>
          <option value="work">💼</option>
          <option value="shopping">🛒</option>
          <option value="study">📚</option>
          <option value="health">💪</option>
          <option value="other">📂</option>
        </select>
        <select id="taskPrio">
          <option value="med">⚡</option>
          <option value="high">🔥</option>
          <option value="low">💧</option>
        </select>
        <button class="gz-btn" id="addBtn"></button>
      </div>
      <div class="todo-filters" id="filters">
        <button class="active" data-filter="all"></button>
        <button data-filter="active"></button>
        <button data-filter="done"></button>
        <button data-filter="overdue"></button>
        <span style="flex:1"></span>
        <button id="clearDone" style="background:transparent;border:1px solid var(--border)"></button>
        <button id="clearAll" style="background:transparent;border:1px solid var(--border);color:var(--gz-accent)"></button>
      </div>
      <div class="todo-stats" id="stats"></div>
      <div class="todo-list" id="todoList"></div>
    </div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'To-Do List',
    toolDesc: 'Manage your daily tasks with deadlines, categories and priorities — auto-saved to your browser.',
    placeholder: 'What needs to be done?',
    add: 'Add Task',
    all: 'All', active: 'Active', done: 'Done', overdue: 'Overdue',
    clearDone: 'Clear completed', clearAll: 'Clear all',
    total: 'Total', pending: 'Pending', doneN: 'Done', overdueN: 'Overdue',
    empty: '🎉 No tasks here. Add one above!',
    delete: 'Delete', edit: 'Edit', save: 'Save', cancel: 'Cancel',
    prioHigh: 'High', prioMed: 'Med', prioLow: 'Low',
    catPersonal: 'Personal', catWork: 'Work', catShopping: 'Shopping', catStudy: 'Study', catHealth: 'Health', catOther: 'Other',
    noDate: 'No due date', overdueLabel: 'Overdue', todayLabel: 'Today',
    step1: 'Type a task in the input field and press Enter or click Add Task',
    step2: 'Optionally pick a due date, category and priority level',
    step3: 'Click the circle on the left to mark a task as complete',
    step4: 'Use filters to view All, Active, Done, or Overdue tasks',
  },
  zh: {
    toolTitle: '待办事项清单',
    toolDesc: '管理每日任务，支持截止日期、分类和优先级 — 自动保存到浏览器本地。',
    placeholder: '需要做什么？',
    add: '添加任务',
    all: '全部', active: '进行中', done: '已完成', overdue: '已逾期',
    clearDone: '清除已完成', clearAll: '清空全部',
    total: '总计', pending: '待办', doneN: '已完成', overdueN: '已逾期',
    empty: '🎉 这里没有任务。在上方添加一个吧！',
    delete: '删除', edit: '编辑', save: '保存', cancel: '取消',
    prioHigh: '高', prioMed: '中', prioLow: '低',
    catPersonal: '个人', catWork: '工作', catShopping: '购物', catStudy: '学习', catHealth: '健康', catOther: '其他',
    noDate: '无截止日期', overdueLabel: '已逾期', todayLabel: '今天',
    step1: '在输入框中输入任务，按回车或点击「添加任务」',
    step2: '可选择截止日期、分类和优先级',
    step3: '点击任务左侧的圆圈标记为完成',
    step4: '使用筛选器查看「全部/进行中/已完成/已逾期」任务',
  }
});

const { $, copyText, t } = GZ;
const STORAGE_KEY = 'gz-todo-v1';

let tasks = [];
let currentFilter = 'all';
let editId = null;

function load() {
  try { tasks = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); } catch(e) { tasks = []; }
}
function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks)); }

function catLabel(c) { return t('cat' + c.charAt(0).toUpperCase() + c.slice(1)) || c; }
function prioLabel(p) { return t('prio' + p.charAt(0).toUpperCase() + p.slice(1)) || p; }

function isOverdue(task) {
  if (task.done || !task.date) return false;
  const today = new Date(); today.setHours(0,0,0,0);
  const d = new Date(task.date); d.setHours(0,0,0,0);
  return d < today;
}

function fmtDate(s) {
  if (!s) return t('noDate');
  const today = new Date(); today.setHours(0,0,0,0);
  const d = new Date(s); d.setHours(0,0,0,0);
  if (d.getTime() === today.getTime()) return t('todayLabel');
  const overdue = d < today;
  const diff = Math.round((d - today) / 86400000);
  const txt = d.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
  if (overdue) return t('overdueLabel') + ' · ' + txt + ' (' + Math.abs(diff) + 'd)';
  return txt + ' (' + diff + 'd)';
}

function addTask() {
  const txt = $('#taskInput').value.trim();
  if (!txt) return;
  if (editId) {
    const t0 = tasks.find(x => x.id === editId);
    if (t0) { t0.text = txt; t0.date = $('#taskDate').value; t0.cat = $('#taskCat').value; t0.prio = $('#taskPrio').value; }
    editId = null;
    $('#addBtn').textContent = t('add');
  } else {
    tasks.push({
      id: Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
      text: txt,
      date: $('#taskDate').value,
      cat: $('#taskCat').value,
      prio: $('#taskPrio').value,
      done: false,
      created: Date.now()
    });
  }
  $('#taskInput').value = '';
  $('#taskDate').value = '';
  save(); render();
}

function startEdit(id) {
  const t0 = tasks.find(x => x.id === id);
  if (!t0) return;
  $('#taskInput').value = t0.text;
  $('#taskDate').value = t0.date || '';
  $('#taskCat').value = t0.cat;
  $('#taskPrio').value = t0.prio;
  editId = id;
  $('#addBtn').textContent = t('save');
  $('#taskInput').focus();
}

function toggle(id) {
  const t0 = tasks.find(x => x.id === id);
  if (t0) { t0.done = !t0.done; save(); render(); }
}

function del(id) {
  tasks = tasks.filter(x => x.id !== id);
  if (editId === id) { editId = null; $('#addBtn').textContent = t('add'); }
  save(); render();
}

function clearDone() {
  if (!confirm('Clear all completed tasks?')) return;
  tasks = tasks.filter(x => !x.done);
  save(); render();
}
function clearAll() {
  if (!confirm('Delete ALL tasks? This cannot be undone.')) return;
  tasks = [];
  save(); render();
}

function renderStats() {
  const total = tasks.length;
  const doneN = tasks.filter(x => x.done).length;
  const pending = total - doneN;
  const overdueN = tasks.filter(isOverdue).length;
  $('#stats').innerHTML = [
    { num: total, label: t('total') },
    { num: pending, label: t('pending') },
    { num: doneN, label: t('doneN') },
    { num: overdueN, label: t('overdueN') },
  ].map(s => `<div class="todo-stat"><div class="num">${s.num}</div><div class="label">${s.label}</div></div>`).join('');
}

function renderList() {
  let list = tasks.slice();
  if (currentFilter === 'active') list = list.filter(x => !x.done);
  else if (currentFilter === 'done') list = list.filter(x => x.done);
  else if (currentFilter === 'overdue') list = list.filter(isOverdue);
  // sort: not-done first, then overdue, then by date asc, then priority
  list.sort((a, b) => {
    if (a.done !== b.done) return a.done ? 1 : -1;
    const ao = isOverdue(a), bo = isOverdue(b);
    if (ao !== bo) return ao ? -1 : 1;
    if (a.date && b.date) { if (a.date !== b.date) return a.date.localeCompare(b.date); }
    if (a.date && !b.date) return -1;
    if (!a.date && b.date) return 1;
    const pOrder = { high: 0, med: 1, low: 2 };
    return (pOrder[a.prio] || 1) - (pOrder[b.prio] || 1);
  });
  if (list.length === 0) {
    $('#todoList').innerHTML = `<div class="todo-empty">${t('empty')}</div>`;
    return;
  }
  $('#todoList').innerHTML = list.map(t0 => {
    const od = isOverdue(t0);
    return `<div class="todo-item ${t0.done ? 'done' : ''} ${od ? 'overdue' : ''}">
      <input type="checkbox" class="check" ${t0.done ? 'checked' : ''} onchange="toggle('${t0.id}')">
      <div style="flex:1">
        <div class="task-text">${escapeHtml(t0.text)}</div>
        <div class="meta">
          <span class="badge badge-cat">${catLabel(t0.cat)}</span>
          <span class="badge badge-prio-${t0.prio}">${prioLabel(t0.prio)}</span>
          <span>📅 ${fmtDate(t0.date)}</span>
        </div>
      </div>
      <div class="actions">
        <button onclick="startEdit('${t0.id}')" title="Edit">✏️</button>
        <button onclick="del('${t0.id}')" title="Delete">🗑️</button>
      </div>
    </div>`;
  }).join('');
}

function escapeHtml(s) { return s.replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c])); }

function render() { renderStats(); renderList(); }

$('#addBtn').addEventListener('click', addTask);
$('#taskInput').addEventListener('keydown', e => { if (e.key === 'Enter') addTask(); });
$('#filters').addEventListener('click', e => {
  if (e.target.dataset.filter) {
    currentFilter = e.target.dataset.filter;
    document.querySelectorAll('#filters button[data-filter]').forEach(b => b.classList.toggle('active', b === e.target));
    renderList();
  }
});
$('#clearDone').addEventListener('click', clearDone);
$('#clearAll').addEventListener('click', clearAll);

// Initialize labels
$('#taskInput').placeholder = t('placeholder');
$('#addBtn').textContent = t('add');
document.querySelectorAll('#filters button[data-filter]').forEach(b => { b.textContent = t(b.dataset.filter); });
$('#clearDone').textContent = '🧹 ' + t('clearDone');
$('#clearAll').textContent = '🗑️ ' + t('clearAll');
document.querySelectorAll('#taskCat option').forEach(o => { o.textContent = catLabel(o.value); });
document.querySelectorAll('#taskPrio option').forEach(o => { o.textContent = prioLabel(o.value); });

load(); render();

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📝', href:'/text/notepad.html', name:'Online Notepad'},
    {icon:'🌱', href:'/fun/habit-tracker.html', name:'Habit Tracker'},
    {icon:'🍅', href:'/calc/pomodoro.html', name:'Pomodoro Timer'},
    {icon:'✅', href:'/text/text-statistics.html', name:'Text Statistics'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
