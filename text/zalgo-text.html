    input: '输入或粘贴您的文字',
    clickToCopy: '点击输出框复制',
    mini: '轻微', normal: '正常', mega: '强烈', maxi: '极限',
    step1: '输入或粘贴要故障化的文字',
    step2: '调节上/中/下滑块或选择预设',
    step3: '故障 Zalgo 文字立即出现在右侧',
    step4: '点击「复制」并粘贴到聊天、梗图或社交媒体',

const { $, copyText, t } = GZ;

// Combining diacritical mark ranges
const diacriticsTop = [
  0x030d,0x030e,0x0304,0x0305,0x033f,0x0311,0x0306,0x0310,0x0352,0x0357,0x0351,0x0307,0x0308,0x030a,0x0342,0x0343,0x0344,0x034a,0x034b,0x034c,0x0303,0x0302,0x030c,0x0350,0x0300,0x0301,0x030b,0x030f,0x0312,0x0313,0x0314,0x033d,0x0309,0x0363,0x0364,0x0365,0x0366,0x0367,0x0368,0x0369,0x036a,0x036b,0x036c,0x036d,0x036e,0x036f,0x033e,0x035b,0x0346,0x031a
];
const diacriticsMid = [
  0x0315,0x031b,0x0340,0x0341,0x0358,0x0321,0x0322,0x0327,0x0328,0x0334,0x0335,0x0336,0x034f,0x035c,0x035d,0x035e,0x035f,0x0360,0x0362,0x0338,0x0337,0x0361,0x0489
];
const diacriticsBottom = [
  0x0316,0x0317,0x0318,0x0319,0x031c,0x031d,0x031e,0x031f,0x0320,0x0323,0x0324,0x0325,0x0326,0x0329,0x032a,0x032b,0x032c,0x032d,0x032e,0x032f,0x0330,0x0331,0x0332,0x0333,0x0339,0x033a,0x033b,0x033c,0x0345,0x0347,0x0348,0x0349,0x034d,0x034e,0x0353,0x0354,0x0355,0x0356,0x0359,0x035a,0x032b
];

function rand(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function generateZalgo(text, up, mid, down) {
  let result = '';
  for (const ch of text) {
    if (ch === ' ') { result += ' '; continue; }
    if (ch === '\n') { result += '\n'; continue; }
    result += ch;
    for (let i = 0; i < up; i++) result += String.fromCodePoint(rand(diacriticsTop));
    for (let i = 0; i < mid; i++) result += String.fromCodePoint(rand(diacriticsMid));
    for (let i = 0; i < down; i++) result += String.fromCodePoint(rand(diacriticsBottom));
  }
  return result;
}

function run() {
  const text = $('#input').value;
  const up = +$('#up').value;
  const mid = +$('#mid').value;
  const down = +$('#down').value;
  $('#up-val').textContent = up;
  $('#mid-val').textContent = mid;
  $('#down-val').textContent = down;
  if (!text) { $('#output').textContent = ''; return; }
  $('#output').textContent = generateZalgo(text, up, mid, down);
}

$('#lbl-up').textContent = t('lblUp');
$('#lbl-mid').textContent = t('lblMid');
$('#lbl-down').textContent = t('lblDown');
$('#lbl-in').textContent = t('lblIn');
$('#lbl-out').textContent = t('lblOut');
$('#input').placeholder = t('input');

$('#input').addEventListener('input', run);
$('#up').addEventListener('input', run);
$('#mid').addEventListener('input', run);
$('#down').addEventListener('input', run);
$('#output').addEventListener('click', () => copyText($('#output').textContent));

$('#presets').innerHTML = `

  <button onclick="setPreset(3,0,3)">${t('normal')}</button>
  <button onclick="setPreset(6,2,6)">${t('mega')}</button>
  <button onclick="setPreset(12,4,12)">${t('maxi')}</button>`;

window.setPreset = function(u, m, d) {
  $('#up').value = u; $('#mid').value = m; $('#down').value = d; run();
};

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

function loadExample() {
  $('#input').value = 'The quick brown fox';
  run();
}
function doClear() { $('#input').value = ''; $('#output').textContent = ''; }
