<style>
.cs-tabs{display:flex;gap:6px;flex-wrap:wrap;margin:1rem 0}
.cs-tab{padding:8px 14px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;font-size:.85rem;font-weight:600;transition:all .15s}
.cs-tab.active{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border-color:transparent}
.cs-pane{display:none;padding:1rem 0}
.cs-pane.active{display:block}
.cs-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;margin-top:1rem}
.cs-card{background:linear-gradient(135deg,var(--glass),var(--glass2));border:1px solid var(--border);border-radius:12px;padding:14px;text-align:center;cursor:pointer;transition:all .2s}
.cs-card:hover{border-color:var(--accent);transform:translateY(-2px)}
.cs-card.active{border-color:var(--accent);background:rgba(78,205,196,.1)}
.cs-demo{width:90px;height:60px;background:var(--glass2);border:1px solid var(--border);border-radius:8px;display:flex;align-items:center;justify-content:center;margin:0 auto 8px;font-size:.75rem;color:var(--text2);font-weight:600}
.cs-name{font-family:monospace;font-size:.78rem;color:var(--text)}
.cs-preview{height:240px;background:linear-gradient(135deg,#1a1a2e,#0f3460);border-radius:16px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:1.2rem;font-weight:600;margin:1.2rem 0;border:1px solid var(--border);position:relative;overflow:hidden}
.cs-output{background:var(--glass2);border:1px solid var(--border);border-radius:10px;padding:14px;font-family:monospace;font-size:.9rem;line-height:1.6;white-space:pre-wrap;color:var(--accent);margin-top:1rem;position:relative;overflow-x:auto}
.cs-output .label{color:var(--text2);font-size:.7rem;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;font-weight:700}
.cs-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:.8rem}
.cs-hotspot{width:60px;height:60px;background:repeating-conic-gradient(#fff 0 25%,#999 0 50%);background-size:8px 8px;border-radius:8px;margin:8px auto 0;position:relative;border:2px solid var(--border)}
.cs-hotspot-marker{position:absolute;width:6px;height:6px;background:#ef4444;border-radius:50%;transform:translate(-50%,-50%)}
.cs-upload{border:2px dashed var(--border);border-radius:12px;padding:24px;text-align:center;cursor:pointer;transition:all .2s;background:var(--glass2)}
.cs-upload:hover{border-color:var(--accent);background:var(--glass)}
.cs-upload input{display:none}
.cs-form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:1rem}
@media(max-width:600px){.cs-form-row{grid-template-columns:1fr}}
.cs-form-row label{font-size:.7rem;text-transform:uppercase;letter-spacing:.5px;color:var(--text2);font-weight:700;display:block;margin-bottom:4px}
.cs-form-row input,.cs-form-row select{width:100%;padding:8px 10px;background:var(--glass);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:monospace;font-size:.9rem}
.cs-form-row input:focus,.cs-form-row select:focus{outline:none;border-color:var(--accent)}
</style>

<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What CSS cursor values are available?", "acceptedAnswer": {"@type": "Answer", "text": "CSS supports 35+ cursor keywords: auto, default, pointer, crosshair, move, text, wait, help, not-allowed, progress, grab, grabbing, zoom-in, zoom-out, col-resize, row-resize, n-resize, e-resize, s-resize, w-resize, ne-resize, nw-resize, se-resize, sw-resize, ew-resize, ns-resize, nesw-resize, nwse-resize, context-menu, cell, vertical-text, alias, copy, no-drop, all-scroll. The browser falls back to a generic arrow if a custom value is unsupported."}}, {"@type": "Question", "name": "Can I use a custom image as a cursor?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. Switch to the Custom Image tab, upload a .cur, .png or .svg file (max 32×32 px is recommended for crispness on high-DPI displays), and the tool will output the proper cursor: url('...') x y, auto syntax with a fallback. You can also set the hotspot offset to align the click point with a specific pixel."}}, {"@type": "Question", "name": "Why is my custom cursor not showing on every browser?", "acceptedAnswer": {"@type": "Answer", "text": "Safari only honors .cur files and may ignore .png/.svg cursors. Firefox supports .cur, .png and animated .gif, but ignores .svg cursors. Chrome supports .cur, .png, .svg and even .jpg. The generated CSS always includes a fallback (auto) so the page stays usable if a browser refuses the image."}}, {"@type": "Question", "name": "Does the cursor size matter?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. The OS will resample cursor images larger than 32×32 and they often look blurry. Use 32×32 (or 24×24) PNG with a transparent background, or use .svg which the browser rasterizes at runtime. For best sharpness on Retina/4K displays, ship a 64×64 version and let the browser downscale."}}]}</script>

<script>
GZI18n.register({
  en: {
    toolTitle: 'CSS Cursor Generator',
    toolDesc: 'Visually pick the perfect CSS cursor style. Browse 35+ built-in cursor types, upload a custom image, set the hotspot, and copy production-ready CSS — runs entirely in your browser.',
    preset: 'Built-in Cursors',
    custom: 'Custom Image',
    copy: 'Copy CSS',
    reset: 'Reset',
    upload: 'Drop .cur / .png / .svg here or click to upload',
    uploadHint: 'Best at 32×32 or 64×64 px',
    fallback: 'Fallback cursor',
    hotspotX: 'Hotspot X (px)',
    hotspotY: 'Hotspot Y (px)',
    previewSize: 'Output preview size',
    hover: 'Hover me to preview the cursor',
    lblCopy: 'Copy CSS to clipboard',
    lblReset: 'Reset to default cursor',
    step1: 'Pick a built-in cursor or upload your own image',
    step2: 'For custom cursors, set the click hotspot (X / Y in pixels)',
    step3: 'Hover the preview box to see the live cursor in action',
    step4: 'Click Copy CSS and paste into your stylesheet',
  },
  zh: {
    toolTitle: 'CSS 光标生成器',
    toolDesc: '可视化挑选完美的 CSS 光标样式。浏览 35+ 内置光标类型，上传自定义图片，设置点击热点，复制可用 CSS — 完全浏览器本地运行。',
    preset: '内置光标',
    custom: '自定义图片',
    copy: '复制 CSS',
    reset: '重置',
    upload: '拖入 .cur / .png / .svg 文件或点击上传',
    uploadHint: '建议 32×32 或 64×64 像素',
    fallback: '备用光标',
    hotspotX: '点击热点 X (像素)',
    hotspotY: '点击热点 Y (像素)',
    previewSize: '预览尺寸',
    hover: '将鼠标悬停在此处预览光标',
    lblCopy: '复制 CSS 到剪贴板',
    lblReset: '恢复默认光标',
    step1: '选择内置光标或上传自定义图片',
    step2: '自定义光标可设置点击热点（X / Y 像素）',
    step3: '将鼠标悬停在预览框上查看实时光标',
    step4: '点击「复制 CSS」并粘贴到你的样式表',
  }
});

const { $, t, copyText, showToast } = GZ;
const CURSORS = [
  'auto','default','pointer','crosshair','move','text','wait','help','not-allowed','context-menu',
  'progress','cell','vertical-text','alias','copy','no-drop','grab','grabbing','zoom-in','zoom-out',
  'all-scroll','col-resize','row-resize','n-resize','e-resize','s-resize','w-resize',
  'ne-resize','nw-resize','se-resize','sw-resize','ew-resize','ns-resize','nesw-resize','nwse-resize'
];
let activeCursor = 'pointer';
let customDataUrl = null;

const grid = $('#grid');
const preview = $('#preview');
const output = $('#output');

CURSORS.forEach(c => {
  const card = document.createElement('div');
  card.className = 'cs-card';
  card.dataset.cursor = c;
  card.innerHTML = `<div class="cs-demo" style="cursor:${c}">${c}</div><div class="cs-name">${c}</div>`;
  card.addEventListener('click', () => {
    document.querySelectorAll('.cs-card').forEach(x => x.classList.remove('active'));
    card.classList.add('active');
    activeCursor = c;
    render();
  });
  grid.appendChild(card);
});

document.querySelector('.cs-card[data-cursor="pointer"]').classList.add('active');

$('#lblUpload').textContent = t('upload') + ' — ' + t('uploadHint');
$('#lblHotX').textContent = t('hotspotX');
$('#lblHotY').textContent = t('hotspotY');
$('#lblFallback').textContent = t('fallback');
$('#lblSize').textContent = t('previewSize');
$('#lblHover').textContent = t('hover');
$('#copyBtn').textContent = '📋 ' + t('copy');
$('#resetBtn').textContent = '🔄 ' + t('reset');

document.querySelectorAll('.cs-tab').forEach(b => b.addEventListener('click', () => {
  document.querySelectorAll('.cs-tab').forEach(x => x.classList.remove('active'));
  b.classList.add('active');
  document.querySelectorAll('.cs-pane').forEach(x => x.classList.remove('active'));
  document.getElementById('pane-' + b.dataset.pane).classList.add('active');
  render();
}));
document.querySelectorAll('.cs-tab').forEach(b => b.textContent = t(b.dataset.pane));

['hotX','hotY','fallback','previewSize'].forEach(id => {
  document.getElementById(id).addEventListener('input', render);
  document.getElementById(id).addEventListener('change', render);
});

$('#fileInput').addEventListener('change', e => {
  const f = e.target.files[0];
  if (!f) return;
  const reader = new FileReader();
  reader.onload = ev => { customDataUrl = ev.target.result; render(); };
  reader.readAsDataURL(f);
});

function render() {
  const isCustom = document.querySelector('.cs-tab.active').dataset.pane === 'custom';
  let css = '';
  if (isCustom && customDataUrl) {
    const hx = $('#hotX').value || 0, hy = $('#hotY').value || 0, fb = $('#fallback').value;
    css = `cursor: url('${customDataUrl}') ${hx} ${hy}, ${fb};`;
    preview.style.cursor = `url('${customDataUrl}') ${hx} ${hy}, ${fb}`;
  } else if (isCustom) {
    css = '/* ' + t('upload') + ' */';
    preview.style.cursor = 'auto';
  } else {
    css = `cursor: ${activeCursor};`;
    preview.style.cursor = activeCursor;
  }
  output.innerHTML = '<div class="label">' + (isCustom ? 'Custom Cursor' : 'Cursor') + '</div>' + css;
}

$('#copyBtn').addEventListener('click', () => {
  const text = output.textContent.replace(/^[^\n]+\n/, '');
  copyText(text);
});
$('#resetBtn').addEventListener('click', () => {
  document.querySelector('.cs-card[data-cursor="pointer"]').click();
  $('#hotX').value = 0; $('#hotY').value = 0; $('#fallback').value = 'auto';
  customDataUrl = null;
  document.querySelector('.cs-tab[data-pane="preset"]').click();
  render();
});

render();
GZ.renderToolPage({
  category: 'css',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🔘', href:'/css-tools/button.html', name:'Button Generator'},
    {icon:'↕️', href:'/css-tools/scrollbar.html', name:'Scrollbar Generator'},
    {icon:'🔲', href:'/css-tools/box-model.html', name:'Box Model'},
    {icon:'🎨', href:'/css-tools/css-variables.html', name:'CSS Variables'},
  ]
});
</script>
