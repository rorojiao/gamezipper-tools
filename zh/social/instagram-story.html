.story-username{color:#fff;font-size:13px;font-weight:600;text-shadow:0 1px 3px rgba(0,0,0,.5)}
.story-time{color:rgba(255,255,255,.8);font-size:11px;margin-left:auto}
.story-progress{position:absolute;top:4px;left:4px;right:4px;height:2px;background:rgba(255,255,255,.3);border-radius:1px;z-index:3}
.story-progress-bar{height:100%;background:#fff;border-radius:1px;width:65%}
.story-content{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;padding:60px 20px 80px;z-index:1}
.story-text{color:#fff;font-size:28px;font-weight:700;text-align:center;text-shadow:0 2px 8px rgba(0,0,0,.5);line-height:1.3;word-wrap:break-word}
.story-footer{position:absolute;bottom:0;left:0;right:0;padding:14px;z-index:2;background:linear-gradient(to top,rgba(0,0,0,.5),transparent);display:flex;align-items:center;justify-content:space-between}
.story-footer-icons{display:flex;gap:16px;color:#fff;font-size:20px}
.story-emoji{font-size:48px;position:absolute;z-index:2}
.controls label{display:block;margin:10px 0 4px;font-weight:600;font-size:.9em}
.controls input,.controls select,.controls textarea{width:100%;padding:8px;border-radius:8px;border:1px solid var(--border);background:var(--glass);color:var(--text);font-size:.9em}
.controls textarea{min-height:60px}
.color-grid{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px}
.color-swatch{width:32px;height:32px;border-radius:8px;cursor:pointer;border:2px solid transparent;transition:transform .15s}
.color-swatch:hover{transform:scale(1.15)}
.color-swatch.active{border-color:var(--gz-accent)}
</style>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div style="display:grid;grid-template-columns:1fr 400px;gap:20px;align-items:start" class="gz-split-responsive">
      <div class="controls">
        <label id="lbl-username"></label>
        <input id="username" value="gamezipper" placeholder="Username">
        <label id="lbl-bg"></label>
        <div class="color-grid" id="bgGrid"></div>
        <label id="lbl-text"></label>
        <textarea id="storyText" placeholder="Type your story text...">Hello World! ✨</textarea>
        <label id="lbl-emoji"></label>
        <div class="color-grid" id="emojiGrid"></div>
        <label id="lbl-timeago"></label>
        <input id="timeAgo" value="2h" placeholder="e.g. 2h, 5m, 1d">
      </div>
      <div>
        <div class="story-frame" id="storyFrame">
          <div style="position:absolute;inset:0" id="storyBg"></div>
          <div class="story-progress"><div class="story-progress-bar"></div></div>
          <div class="story-header">
            <div class="story-avatar" id="sAvatar">G</div>
            <div class="story-username" id="sUsername">gamezipper</div>
            <div class="story-time" id="sTime">2h</div>
          </div>
          <div class="story-content">
            <div class="story-text" id="sText">Hello World! ✨</div>
          </div>
          <div class="story-footer">
            <div style="color:#fff;font-size:13px;opacity:.7">⌨️ Send message</div>
            <div class="story-footer-icons">
              <span>♡</span>
              <span>✈</span>
              <span>⋯</span>
            </div>
          </div>
        </div>
        <div style="text-align:center;margin-top:12px">
          <button class="gz-btn" id="btnDownload"></button>
        </div>
      </div>
    </div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Instagram Story Generator',
    toolDesc: 'Create realistic Instagram Story mockups — customize background, text, emojis and download as PNG.',
    lblUsername: 'Username',
    lblBg: 'Background',
    lblText: 'Story Text',
    lblEmoji: 'Sticker / Emoji',
    lblTimeago: 'Time Ago',
    download: '⬇ Download PNG',
    step1: 'Set the username and time stamp',
    step2: 'Choose a background color or gradient',
    step3: 'Type your story text and add emojis',
    step4: 'Download the story mockup as PNG',
  },
  zh: {
    toolTitle: 'Instagram Story 生成器',
    toolDesc: '创建逼真的 Instagram Story 截图 — 自定义背景、文字、表情和用户名，下载为 PNG。',
    lblUsername: '用户名',
    lblBg: '背景',
    lblText: '故事文字',
    lblEmoji: '贴纸 / 表情',
    lblTimeago: '时间标记',
    download: '⬇ 下载 PNG',
    step1: '设置用户名和时间标记',
    step2: '选择背景颜色或渐变',
    step3: '输入故事文字并添加表情',
    step4: '下载故事截图为 PNG',
  }
});

const { $, copyText, t } = GZ;

const gradients = [
  'linear-gradient(135deg,#667eea,#764ba2)',
  'linear-gradient(135deg,#f093fb,#f5576c)',
  'linear-gradient(135deg,#4facfe,#00f2fe)',
  'linear-gradient(135deg,#43e97b,#38f9d7)',
  'linear-gradient(135deg,#fa709a,#fee140)',
  'linear-gradient(135deg,#a18cd1,#fbc2eb)',
  'linear-gradient(135deg,#fccb90,#d57eeb)',
  'linear-gradient(135deg,#e0c3fc,#8ec5fc)',
  'linear-gradient(135deg,#f5576c,#ff9a9e)',
  'linear-gradient(135deg,#0c0c0c,#434343)',
  'linear-gradient(135deg,#ff9a9e,#fecfef)',
  'linear-gradient(135deg,#a1c4fd,#c2e9fb)',
];
let currentBg = gradients[0];

const emojis = ['🔥','❤️','⭐','🎉','✨','🌟','💯','👀','🚀','💪','🎊','😍','🥳','👑','💎','🌈'];
let currentEmoji = '';

function renderBgGrid() {
  const grid = $('#bgGrid');
  grid.innerHTML = gradients.map((g, i) => 
    `<div class="color-swatch${i===0?' active':''}" style="background:${g}" data-bg="${g}"></div>`
  ).join('');
  grid.querySelectorAll('.color-swatch').forEach(s => {
    s.addEventListener('click', () => {
      grid.querySelectorAll('.color-swatch').forEach(x => x.classList.remove('active'));
      s.classList.add('active');
      currentBg = s.dataset.bg;
      updatePreview();
    });
  });
}

function renderEmojiGrid() {
  const grid = $('#emojiGrid');
  grid.innerHTML = emojis.map(e => 
    `<div class="color-swatch" style="background:transparent;font-size:24px;display:flex;align-items:center;justify-content:center" data-emoji="${e}">${e}</div>`
  ).join('');
  grid.querySelectorAll('.color-swatch').forEach(s => {
    s.addEventListener('click', () => {
      currentEmoji = currentEmoji === s.dataset.emoji ? '' : s.dataset.emoji;
      grid.querySelectorAll('.color-swatch').forEach(x => x.classList.remove('active'));
      if (currentEmoji) s.classList.add('active');
      updatePreview();
    });
  });
}

function updatePreview() {
  const name = $('#username').value || 'username';
  $('#sUsername').textContent = name;
  $('#sAvatar').textContent = name.charAt(0).toUpperCase();
  $('#sTime').textContent = $('#timeAgo').value || 'now';
  $('#sText').textContent = $('#storyText').value || '';
  $('#storyBg').style.background = currentBg;
  
  // Remove old emoji
  const old = document.querySelector('.story-emoji');
  if (old) old.remove();
  if (currentEmoji) {
    const em = document.createElement('div');
    em.className = 'story-emoji';
    em.textContent = currentEmoji;
    em.style.cssText = 'bottom:80px;right:20px;font-size:48px;position:absolute;z-index:2';
    $('#storyFrame').appendChild(em);
  }
}

$('#username').addEventListener('input', updatePreview);
$('#storyText').addEventListener('input', updatePreview);
$('#timeAgo').addEventListener('input', updatePreview);

$('#btnDownload').textContent = t('download');
$('#btnDownload').addEventListener('click', () => {
  const frame = $('#storyFrame');
  const canvas = document.createElement('canvas');
  const scale = 2;
  const w = 360, h = 640;
  canvas.width = w * scale;
  canvas.height = h * scale;
  const ctx = canvas.getContext('2d');
  ctx.scale(scale, scale);
  
  // Background gradient
  const grad = ctx.createLinearGradient(0, 0, w, h);
  const bgStr = currentBg;
  const colorMatch = bgStr.match(/#[0-9a-fA-F]{6}/g);
  if (colorMatch && colorMatch.length >= 2) {
    grad.addColorStop(0, colorMatch[0]);
    grad.addColorStop(1, colorMatch[1]);
  } else {
    grad.addColorStop(0, '#667eea');
    grad.addColorStop(1, '#764ba2');
  }
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, w, h);
  
  // Header gradient overlay
  const hGrad = ctx.createLinearGradient(0, 0, 0, 60);
  hGrad.addColorStop(0, 'rgba(0,0,0,0.5)');
  hGrad.addColorStop(1, 'transparent');
  ctx.fillStyle = hGrad;
  ctx.fillRect(0, 0, w, 60);
  
  // Progress bar
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  ctx.fillRect(10, 6, w-20, 2);
  ctx.fillStyle = '#fff';
  ctx.fillRect(10, 6, (w-20)*0.65, 2);
  
  // Username
  ctx.fillStyle = '#fff';
  ctx.font = '600 13px system-ui';
  ctx.fillText(name = $('#username').value || 'username', 52, 38);
  ctx.font = '11px system-ui';
  ctx.fillStyle = 'rgba(255,255,255,0.8)';
  ctx.textAlign = 'right';
  ctx.fillText($('#timeAgo').value || 'now', w-14, 38);
  ctx.textAlign = 'left';
  
  // Text
  ctx.fillStyle = '#fff';
  ctx.font = '700 28px system-ui';
  ctx.textAlign = 'center';
  const text = $('#storyText').value || '';
  const lines = [];
  const words = text.split(' ');
  let line = '';
  words.forEach(word => {
    const test = line ? line + ' ' + word : word;
    if (ctx.measureText(test).width > w - 60 && line) {
      lines.push(line);
      line = word;
    } else line = test;
  });
  if (line) lines.push(line);
  const startY = h/2 - (lines.length * 36)/2;
  lines.forEach((l, i) => ctx.fillText(l, w/2, startY + i*36));
  
  // Footer
  ctx.textAlign = 'left';
  ctx.font = '13px system-ui';
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  ctx.fillText('⌨ Send message', 14, h - 18);
  
  const a = document.createElement('a');
  a.download = 'instagram-story.png';
  a.href = canvas.toDataURL('image/png');
  a.click();
});

$('#toolbar').innerHTML = `
  <button class="gz-btn gz-btn-secondary" onclick="$('#username').value='gamezipper';$('#storyText').value='Hello World! ✨';$('#timeAgo').value='2h';updatePreview()">${t('example')||'Example'}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#storyText').value='';updatePreview()">${t('clear')}</button>`;

renderBgGrid();
renderEmojiGrid();
updatePreview();

GZ.renderToolPage({
  category: 'social',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📷', href:'/social/instagram-post.html', name:'Instagram Post'},
    {icon:'💬', href:'/social/whatsapp-chat.html', name:'WhatsApp Chat'},
    {icon:'🐦', href:'/social/tweet-generator.html', name:'Tweet Generator'},
    {icon:'💬', href:'/social/imessage-chat.html', name:'iMessage Chat'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
