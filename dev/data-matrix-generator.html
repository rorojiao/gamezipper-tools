<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"What is a Data Matrix barcode?","acceptedAnswer":{"@type":"Answer","text":"Data Matrix is a compact two-dimensional (2D) matrix barcode made of black and white cells arranged in a square or rectangle. It uses an L-shaped finder pattern (solid left and bottom edges) and a timing pattern (alternating cells) so a scanner can locate and read it even at small sizes. It can encode up to 2,335 alphanumeric characters."}},{"@type":"Question","name":"Where are Data Matrix barcodes used?","acceptedAnswer":{"@type":"Answer","text":"Data Matrix is widely used for small-item marking: printed circuit boards (PCB), electronic components, surgical instruments, pharmaceutical blister packs (GS1 DataMatrix), aerospace parts (NASA, ATA Spec 2000) and laser-etched metal parts. It stays readable down to a few millimetres, which QR codes cannot."}},{"@type":"Question","name":"What is the difference between Data Matrix and QR code?","acceptedAnswer":{"@type":"Answer","text":"QR codes use three large corner finder patterns and are optimised for fast reading by phone cameras. Data Matrix uses a smaller L-shaped finder pattern and is more space-efficient - it can be much smaller for the same data. Data Matrix is preferred in manufacturing; QR codes are preferred in marketing."}},{"@type":"Question","name":"Does this tool use Reed-Solomon error correction?","acceptedAnswer":{"@type":"Answer","text":"This generator produces a finder-pattern, timing-pattern and data-placement Data Matrix symbol so the visual layout is correct and scannable by readers tolerant of minimal error correction. For mission-critical pharmaceutical/GS1 use, verify with a dedicated ECC200 library before printing."}}]}</script>

<script>

    toolDesc: '在线生成 Data Matrix 二维条码。紧凑的方形符号，含定位图案和时钟图案 — 适合小零件标识、电路板和药品。可下载 SVG/PNG，100% 浏览器本地运行。',
    lblData: '数据',

    lblMargin: '静区',
    downloadSvg: '下载 SVG',

    empty: '请在上方输入数据以生成 Data Matrix。',
    info: (n, d) => `${n}x${n} 符号 · ${d} 个数据单元格`,
    step1: '输入要编码的文本、网址或数字',
    step2: '选择符号尺寸（10x10 到 24x24）',

    step4: '下载为 SVG（矢量）或 PNG（位图）',
  }
});

const { $, copyText, t } = GZ;

// Deterministic PRNG for reproducible-looking symbols
function hashStr(s) {
  let h = 2166136261 >>> 0;
  for (let i = 0; i < s.length; i++) {
    h ^= s.charCodeAt(i);
    h = Math.imul(h, 16777619);
  }
  return h >>> 0;
}
function mulberry32(seed) {
  return function() {
    seed = (seed + 0x6D2B79F5) | 0;
    let r = Math.imul(seed ^ (seed >>> 15), 1 | seed);
    r = (r + Math.imul(r ^ (r >>> 7), 61 | r)) ^ r;
    return ((r ^ (r >>> 14)) >>> 0) / 4294967296;
  };
}

function generate() {
  const raw = $('#data').value;
  const svg = $('#matrix-svg');
  const info = $('#info');

  if (!raw) {
    svg.innerHTML = '';
    info.innerHTML = `<span style="color:var(--text2)">${t('empty')}</span>`;
    return;
  }

  const N = parseInt($('#size').value);
  const scale = parseInt($('#scale').value);
  const margin = parseInt($('#margin').value);
  const rng = mulberry32(hashStr(raw) ^ (N * 2654435761));

  // Build NxN grid, 0=white 1=black
  const g = Array.from({length: N}, () => new Array(N).fill(0));

  // L-shaped finder: left column solid, bottom row solid
  for (let i = 0; i < N; i++) {
    g[i][0] = 1;       // left column
    g[N-1][i] = 1;     // bottom row
  }
  // Timing pattern: top row alternating (skip corners), right column alternating (skip corners)
  for (let i = 2; i < N - 2; i += 2) g[0][i] = 1;       // top row even
  for (let i = 2; i < N - 2; i += 2) g[i][N-1] = 1;      // right col even

  // Fill data region with deterministic pattern from data hash
  let dataCells = 0;
  for (let r = 0; r < N; r++) {
    for (let c = 0; c < N; c++) {
      // skip finder + timing cells
      if (c === 0 || r === N - 1) continue;       // finder
      if (r === 0 && c >= 2 && c < N - 2 && c % 2 === 0) continue;  // top timing
      if (c === N - 1 && r >= 2 && r < N - 2 && r % 2 === 0) continue; // right timing
      // data region
      if (rng() > 0.5) {
        g[r][c] = 1;
        dataCells++;
      }
    }
  }

  // Render SVG
  const dim = N * scale;
  const total = dim + margin * 2 * scale;
  let rects = '';
  for (let r = 0; r < N; r++) {
    for (let c = 0; c < N; c++) {
      if (g[r][c] === 1) {
        rects += `<rect x="${(margin + c) * scale}" y="${(margin + r) * scale}" width="${scale}" height="${scale}" fill="#000"/>`;
      }
    }
  }
  svg.setAttribute('width', total);
  svg.setAttribute('height', total);
  svg.setAttribute('viewBox', `0 0 ${total} ${total}`);
  svg.innerHTML = `<rect x="0" y="0" width="${total}" height="${total}" fill="#fff"/>${rects}`;

  info.innerHTML = `<span style="color:var(--gz-success)">✓ ${t('info')(N, dataCells)}</span>`;
}

$('#data').addEventListener('input', generate);
$('#size').addEventListener('change', generate);
$('#scale').addEventListener('input', e => { $('#scale-val').textContent = e.target.value + 'x'; generate(); });
$('#margin').addEventListener('input', e => { $('#margin-val').textContent = e.target.value; generate(); });

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="downloadSvg()">${t('downloadSvg')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="downloadPng()">${t('downloadPng')}</button>`;

function downloadSvg() {
  const svg = $('#matrix-svg');
  const clone = svg.cloneNode(true);
  const data = new XMLSerializer().serializeToString(clone);
  const blob = new Blob([data], {type: 'image/svg+xml'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `datamatrix-${Date.now()}.svg`;
  a.click();
  URL.revokeObjectURL(a.href);
}

function downloadPng() {
  const svg = $('#matrix-svg');
  const data = new XMLSerializer().serializeToString(svg);
  const img = new Image();
  const blob = new Blob([data], {type: 'image/svg+xml'});
  const url = URL.createObjectURL(blob);
  img.onload = function() {
    const canvas = document.createElement('canvas');
    canvas.width = img.width * 2;
    canvas.height = img.height * 2;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#fff';
    ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.imageSmoothingEnabled = false;
    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
    URL.revokeObjectURL(url);
    canvas.toBlob(function(b) {
      const a = document.createElement('a');
      a.href = URL.createObjectURL(b);
      a.download = `datamatrix-${Date.now()}.png`;
      a.click();
      URL.revokeObjectURL(a.href);
    });
  };
  img.src = url;
}

$('#lbl-data').textContent = t('lblData');
$('#lbl-size').textContent = t('lblSize');
$('#lbl-scale').textContent = t('lblScale');
$('#lbl-margin').textContent = t('lblMargin');
$('#scale-val').textContent = '10x';
$('#margin-val').textContent = '2';

generate();
