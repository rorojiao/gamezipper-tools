<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "How does the Image to ASCII converter work?", "acceptedAnswer": {"@type": "Answer", "text": "The tool resizes the image to a fixed character width, then for each cell it samples the average pixel brightness and maps it to a character from the chosen charset (dense, simple, blocks or binary). The result is a faithful black-and-white text rendering you can copy or download."}}, {"@type": "Question", "name": "Is my image uploaded to a server?", "acceptedAnswer": {"@type": "Answer", "text": "No. The image is processed entirely in your browser using the Canvas API. Nothing is uploaded — open DevTools network tab to verify, no requests are made for image data."}}, {"@type": "Question", "name": "What image formats are supported?", "acceptedAnswer": {"@type": "Answer", "text": "Any format your browser can decode: PNG, JPG, WebP, GIF, BMP, AVIF and SVG. Just drag-and-drop or click to upload."}}, {"@type": "Question", "name": "How do I get the best result?", "acceptedAnswer": {"@type": "Answer", "text": "For portraits or high-contrast art, use a width of 80-120 and the dense character set. For logos and line art, the simple or block sets work better. Increasing the contrast slider helps noisy photos."}}]}</script>

        <select id="theme">
          <option value="dark">Dark (green on black)</option>

<script>
const CHARSETS={
  dense: ' .:-=+*#%@',
  simple: ' .-=#',
  block: ' ░▒▓█',
  binary: ' 10',
  ascii70: '$@B%8&WM#*oahkbdpqwmZO0QLCJUYXzcvunxrjft/\\|()1{}[]?-_+~<>i!lI;:,"^`\'. '
};

GZI18n.register({
  en:{toolTitle:'Image to ASCII Art Converter',toolDesc:'Convert any image to ASCII art in your browser — no upload, no signup. Adjust width, contrast, brightness and character set.',
    step1:'Click the drop zone above (or drag an image file) to upload',step2:'Adjust width, contrast, brightness and charset on the controls',step3:'The ASCII art regenerates automatically in real time',step4:'Click Copy or Download TXT to save the result',
    dropText:'Click or drop an image here',lblW:'Width',lblC:'Contrast',lblB:'Brightness',lblSet:'Charset',lblInv:'Invert',lblTheme:'Theme',
    copy:'Copy',download:'Download TXT',example:'Try sample'},
  zh:{toolTitle:'图片转 ASCII 艺术字',toolDesc:'在浏览器中将图片转换为 ASCII 艺术字 — 无需上传，无需注册。可调整宽度、对比度、亮度和字符集。',
    step1:'点击上方区域或拖拽图片到此处上传',step2:'调整宽度、对比度、亮度和字符集',step3:'ASCII 艺术字会自动实时重新生成',step4:'点击「复制」或「下载 TXT」保存结果',
    dropText:'点击或将图片拖拽到此处',lblW:'宽度',lblC:'对比度',lblB:'亮度',lblSet:'字符集',lblInv:'反色',lblTheme:'主题',
    copy:'复制',download:'下载 TXT',example:'示例图'}
});
const {$,t}=GZ;

let imgData=null;
let imgEl=null;

function processImage(file){
  if(!file||!file.type.startsWith('image/'))return;
  const reader=new FileReader();
  reader.onload=e=>{
    const img=new Image();
    img.onload=()=>{
      imgEl=img;render();
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}

function render(){
  if(!imgEl)return;
  const W=+$('#width').value;
  const C=+$('#contrast').value/100;
  const B=+$('#brightness').value/100;
  const cs=CHARSETS[$('#charset').value];
  const inv=+$('#invert').value===1;
  const theme=$('#theme').value;
  const aspectFix=0.5; // character is taller than wide
  const w=W;
  const h=Math.max(1,Math.round((imgEl.height/imgEl.width)*w*aspectFix));
  const c=document.createElement('canvas');
  c.width=w;c.height=h;
  const ctx=c.getContext('2d');
  ctx.drawImage(imgEl,0,0,w,h);
  let data;
  try{data=ctx.getImageData(0,0,w,h).data;}
  catch(err){$('#out').textContent='Could not read image data (CORS or tainted canvas).';return;}
  let out='';
  for(let y=0;y<h;y++){
    for(let x=0;x<w;x++){
      const i=(y*w+x)*4;
      const r=data[i],g=data[i+1],b=data[i+2];
      // Luminance
      let lum=(0.299*r+0.587*g+0.114*b)/255;
      // Contrast
      lum=(lum-0.5)*C+0.5;
      // Brightness
      lum=lum*B;
      if(inv)lum=1-lum;
      lum=Math.max(0,Math.min(1,lum));
      const idx=Math.min(cs.length-1,Math.floor(lum*cs.length));
      out+=cs[idx];
    }
    out+='\n';
  }
  const el=$('#out');
  el.textContent=out;
  el.className='ascii-out'+(theme==='light'?' light':theme==='mid'?' mid':'');
  $('#w-v').textContent=W;
  $('#c-v').textContent=Math.round(C*100)+'%';
  $('#b-v').textContent=Math.round(B*100)+'%';
}

$('#drop-text').textContent=t('dropText');
$('#lbl-w').textContent=t('lblW');
$('#lbl-c').textContent=t('lblC');
$('#lbl-b').textContent=t('lblB');
$('#lbl-set').textContent=t('lblSet');
$('#lbl-inv').textContent=t('lblInv');
$('#lbl-theme').textContent=t('lblTheme');

['width','contrast','brightness','charset','invert','theme'].forEach(id=>{
  $('#'+id).addEventListener('input',()=>{if(imgEl)render();});
});

$('#drop').addEventListener('click',()=>$('#file').click());
$('#file').addEventListener('change',e=>{if(e.target.files[0])processImage(e.target.files[0]);});
$('#drop').addEventListener('dragover',e=>{e.preventDefault();$('#drop').classList.add('dragover');});
$('#drop').addEventListener('dragleave',()=>$('#drop').classList.remove('dragover'));
$('#drop').addEventListener('drop',e=>{
  e.preventDefault();$('#drop').classList.remove('dragover');
  if(e.dataTransfer.files[0])processImage(e.dataTransfer.files[0]);
});

function loadSample(){
  // Built-in sample: simple gradient
  const c=document.createElement('canvas');
  c.width=300;c.height=200;
  const ctx=c.getContext('2d');
  const g=ctx.createLinearGradient(0,0,300,200);
  g.addColorStop(0,'#1a1a2e');g.addColorStop(0.5,'#e94560');g.addColorStop(1,'#ffd93d');
  ctx.fillStyle=g;ctx.fillRect(0,0,300,200);
  ctx.fillStyle='#fff';ctx.font='bold 60px sans-serif';ctx.textAlign='center';
  ctx.fillText('ASCII',150,90);ctx.fillText('ART',150,160);
  const img=new Image();
  img.onload=()=>{imgEl=img;render();};
  img.src=c.toDataURL();
}

$('#toolbar').innerHTML=`<button class="gz-btn gz-btn-secondary" onclick="loadSample()">${t('example')}</button><button class="gz-btn" onclick="GZ.copyText($('#out').textContent)">${t('copy')}</button><button class="gz-btn" onclick="const a=document.createElement('a');a.download='ascii-art.txt';a.href=URL.createObjectURL(new Blob([$('#out').textContent],{type:'text/plain'}));a.click()">${t('download')}</button>`;

GZ.renderToolPage({category:'text',titleKey:'toolTitle',descKey:'toolDesc',howToSteps:['step1','step2','step3','step4'],related:[
  {icon:'🎨',href:'/text/ascii-art.html',name:'ASCII Art Generator'},
  {icon:'🖼️',href:'/image/placeholder.html',name:'Placeholder Image'},
  {icon:'📦',href:'/image/compressor.html',name:'Image Compressor'},
  {icon:'🎨',href:'/text/flip-text.html',name:'Flip Text'},
]});
</script>
