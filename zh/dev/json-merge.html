<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"What is JSON Merge?","acceptedAnswer":{"@type":"Answer","text":"JSON Merge combines two or more JSON objects into one. Deep merge recursively merges nested objects, while shallow merge only merges top-level keys."}},{"@type":"Question","name":"What is JSON Patch (RFC 6902)?","acceptedAnswer":{"@type":"Answer","text":"JSON Patch is a standard format for describing changes to a JSON document using operations like add, remove, replace, move, copy and test."}},{"@type":"Question","name":"What is JSON Merge Patch (RFC 7396)?","acceptedAnswer":{"@type":"Answer","text":"JSON Merge Patch is a simpler format that describes the changes by providing a partial JSON with null values indicating deletions and other values indicating additions or replacements."}},{"@type":"Question","name":"Is my data safe?","acceptedAnswer":{"@type":"Answer","text":"Yes. All processing happens entirely in your browser. No data is ever sent to any server."}}]}</script>

  },
  zh: {
    toolTitle: 'JSON 合并与补丁工具',
    toolDesc: '合并、组合和修补 JSON 对象 — 深度合并、浅合并、JSON Patch (RFC 6902) 和 JSON Merge Patch (RFC 7396)。',
    inputA: 'JSON A（基础）',
    inputB: 'JSON B（覆盖 / 补丁）',
    output: '合并结果',
    deepMerge: '深度合并',
    shallowMerge: '浅合并',
    mergePatch: 'Merge Patch (RFC 7396)',
    applyPatch: '应用 JSON Patch',
    step1: '将基础 JSON 粘贴到左侧文本框（JSON A）',
    step2: '将覆盖或补丁 JSON 粘贴到右侧文本框（JSON B）',
    step3: '选择合并模式：深度合并、浅合并、Merge Patch 或 JSON Patch',

const { $, copyText, t } = GZ;
function syntaxHighlight(json) {
  return json.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/(\"(\\u[\da-fA-F]{4}|\\[^u]|[^\\\"])*\"(\s*:)?|\b(true|false|null)\b|-?\d+(\.\d+)?([eE][+-]?\d+)?)/g, m => {
      let c = 'json-number';
      if (/^"/.test(m)) c = /:$/.test(m) ? 'json-key' : 'json-string';
      else if (/true|false/.test(m)) c = 'json-bool';
      else if (/null/.test(m)) c = 'json-null';
      return `<span class="${c}">${m}</span>`;
    });
}
function setResult(obj) {
  const s = JSON.stringify(obj, null, 2);
  $('#result').innerHTML = syntaxHighlight(s);
  $('#status').innerHTML = `<span style="color:var(--gz-success)">✓ ${t('output')}</span>`;
}
function showErr(e) {
  $('#status').innerHTML = `<span style="color:var(--gz-accent)">✗ ${e.message}</span>`;
  $('#result').textContent = '';
}
function deepMerge(a, b) {
  if (typeof a !== 'object' || a === null || typeof b !== 'object' || b === null) return b;
  if (Array.isArray(b)) return b;
  const r = Object.assign({}, a);
  for (const k of Object.keys(b)) {
    if (typeof b[k] === 'object' && b[k] !== null && !Array.isArray(b[k]) && typeof a[k] === 'object' && a[k] !== null && !Array.isArray(a[k])) {
      r[k] = deepMerge(a[k], b[k]);
    } else {
      r[k] = b[k];
    }
  }
  return r;
}
function applyMergePatch(target, patch) {
  if (typeof patch !== 'object' || patch === null || Array.isArray(patch)) return patch;
  if (typeof target !== 'object' || target === null || Array.isArray(target)) target = {};
  const r = Object.assign({}, target);
  for (const k of Object.keys(patch)) {
    if (patch[k] === null) { delete r[k]; }
    else { r[k] = applyMergePatch(r[k], patch[k]); }
  }
  return r;
}
function applyJsonPatch(target, patches) {
  if (!Array.isArray(patches)) throw new Error('JSON Patch must be an array of operations');
  let r = JSON.parse(JSON.stringify(target));
  for (const op of patches) {
    if (!op.op) throw new Error('Missing "op" field');
    const path = (op.path || '').split('/').filter(Boolean);
    if (op.op === 'add') {
      let obj = r; for (let i = 0; i < path.length - 1; i++) obj = obj[path[i]];
      const key = path[path.length - 1];
      if (Array.isArray(obj)) { obj.splice(+key, 0, op.value); } else { obj[key] = op.value; }
    } else if (op.op === 'remove') {
      let obj = r; for (let i = 0; i < path.length - 1; i++) obj = obj[path[i]];
      const key = path[path.length - 1];
      if (Array.isArray(obj)) { obj.splice(+key, 1); } else { delete obj[key]; }
    } else if (op.op === 'replace') {
      let obj = r; for (let i = 0; i < path.length - 1; i++) obj = obj[path[i]];
      obj[path[path.length - 1]] = op.value;
    } else if (op.op === 'move') {
      const val = op.from.split('/').filter(Boolean).reduce((o, k) => o[k], r);
      applyJsonPatch(r, [{ op: 'remove', path: op.from }]);
      applyJsonPatch(r, [{ op: 'add', path: op.path, value: val }]);
    } else if (op.op === 'copy') {
      const val = op.from.split('/').filter(Boolean).reduce((o, k) => o[k], r);
      applyJsonPatch(r, [{ op: 'add', path: op.path, value: JSON.parse(JSON.stringify(val)) }]);
    } else if (op.op === 'test') {
      const val = path.reduce((o, k) => o[k], r);
      if (JSON.stringify(val) !== JSON.stringify(op.value)) throw new Error(`Test failed at ${op.path}`);
    } else { throw new Error(`Unknown op: ${op.op}`); }
  }
  return r;
}
let mode = 'deep';
function doMerge() {
  try {
    const a = JSON.parse($('#inputA').value.trim());
    const b = JSON.parse($('#inputB').value.trim());
    let r;
    if (mode === 'deep') r = deepMerge(a, b);
    else if (mode === 'shallow') r = Object.assign({}, a, b);
    else if (mode === 'mergepatch') r = applyMergePatch(a, b);
    else if (mode === 'jsonpatch') r = applyJsonPatch(a, b);
    setResult(r);
  } catch(e) { showErr(e); }
}
function loadExample() {
  if (mode === 'jsonpatch') {
    $('#inputA').value = JSON.stringify({"name":"Alice","age":30,"skills":["JS"]}, null, 2);
    $('#inputB').value = JSON.stringify([{"op":"replace","path":"/age","value":31},{"op":"add","path":"/city","value":"NYC"},{"op":"add","path":"/skills/-","value":"Python"}], null, 2);
  } else {
    $('#inputA').value = JSON.stringify({"name":"Alice","age":30,"address":{"city":"LA","zip":"90001"},"skills":["JS"]}, null, 2);
    $('#inputB').value = JSON.stringify({"age":31,"address":{"city":"NYC","country":"US"},"skills":["JS","Python"]}, null, 2);
  }
  doMerge();
}
$('#toolbar').innerHTML = `
  <select class="gz-select" onchange="mode=this.value">
    <option value="deep">${t('deepMerge')}</option>
    <option value="shallow">${t('shallowMerge')}</option>
    <option value="mergepatch">${t('mergePatch')}</option>
    <option value="jsonpatch">${t('applyPatch')}</option>
  </select>
  <button class="gz-btn" onclick="doMerge()">${t('deepMerge').split(' ')[0]}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('deepMerge') ? 'Example' : 'Example'}</button>
  <button class="gz-btn" onclick="copyText($('#result').textContent)">${t('copy') || 'Copy'}</button>`;
