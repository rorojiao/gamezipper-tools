<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"What is the Pearson correlation coefficient?","acceptedAnswer":{"@type":"Answer","text":"The Pearson correlation coefficient (r) measures the strength and direction of a linear relationship between two variables. It ranges from -1 (perfect negative) through 0 (no linear relationship) to +1 (perfect positive)."}},{"@type":"Question","name":"What is the correlation coefficient formula?","acceptedAnswer":{"@type":"Answer","text":"r = [ n×Σ(xy) − Σx×Σy ] / √( [n×Σx² − (Σx)²] × [n×Σy² − (Σy)²] ). Sum x, y, xy, x² and y², plug them into the formula with n (number of pairs) and simplify."}},{"@type":"Question","name":"How do I interpret the value of r?","acceptedAnswer":{"@type":"Answer","text":"Use the absolute value: 0 to 0.19 very weak, 0.20 to 0.39 weak, 0.40 to 0.59 moderate, 0.60 to 0.79 strong, 0.80 to 1.00 very strong. The sign shows direction: positive means both rise together, negative means one rises as the other falls."}},{"@type":"Question","name":"Does correlation mean causation?","acceptedAnswer":{"@type":"Answer","text":"No. Correlation only shows that two variables move together linearly. It does not prove that one causes the other. There may be hidden confounding variables, or the relationship may be coincidental. Always combine r with domain knowledge and study design."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="cc-pair">
      <div class="cc-field">
        <label id="lbl-x"></label>
        <textarea id="x" spellcheck="false">1, 2, 3, 4, 5</textarea>
      </div>
      <div class="cc-field">
        <label id="lbl-y"></label>
        <textarea id="y" spellcheck="false">2, 4, 5, 4, 5</textarea>
      </div>
    </div>
    <button class="gz-btn gz-btn-primary" id="calcBtn" style="width:100%;padding:14px;font-size:1.05rem;margin-bottom:1rem">⚡ Calculate</button>
    <div class="cc-result" id="result">
      <div class="cc-big" id="resultBig">—</div>
      <div id="resultMeta" style="color:var(--text2);font-size:.9rem"></div>
    </div>

    <div class="cc-formula" id="formula"></div>
  </div>

  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en:{
    toolTitle:'Correlation Coefficient Calculator',
    toolDesc:'Calculate the Pearson correlation coefficient (r) between two variables. Enter paired X and Y lists to get r, r², the strength and direction of the relationship, and a step-by-step breakdown.',
    lblX:'X values (one per line or comma)',
    lblY:'Y values (one per line or comma)',
    calculate:'⚡ Calculate',copy:'Copy',clear:'Clear',example:'Example',
    cellR2:'r² (coefficient of determination)',
    cellN:'Pairs (n)',
    cellMeanX:'Mean X',cellMeanY:'Mean Y',
    cellSlope:'Implied slope',
    resultLabel:'Pearson correlation (r)',
    strengthVWeak:'very weak',strengthWeak:'weak',strengthMod:'moderate',strengthStrong:'strong',strengthVStrong:'very strong',
    directionPos:'positive (both rise together)',directionNeg:'negative (one rises, other falls)',directionNone:'no linear relationship',
    placeholderX:'X: 1, 2, 3, ...',placeholderY:'Y: 2, 4, 5, ...',
    formulaHead:'r = [ n·Σ(xy) − Σx·Σy ] / √( [n·Σx² − (Σx)²]·[n·Σy² − (Σy)²] )',
    needPairs:'Enter the same number of X and Y values (at least 2 pairs).',
    step:'Step',
    stepSums:'Compute the sums',
    stepNum:'Numerator: n·Σ(xy) − Σx·Σy',
    stepDen:'Denominator: √(…)',
    stepDivide:'Divide numerator by denominator',
    step1:'Enter your X values (one set of measurements)',
    step2:'Enter the matching Y values in the same order',
    step3:'Press Calculate to get the correlation r',
    step4:'Read the strength, direction and formula breakdown',
  },
  zh:{
    toolTitle:'相关系数计算器（皮尔逊 r）',
    toolDesc:'计算两个变量之间的皮尔逊相关系数（r）。输入成对的 X 和 Y 数据，得到 r、r²、相关强度和方向，并提供逐步分解。',
    lblX:'X 值（每行一个或用逗号）',
    lblY:'Y 值（每行一个或用逗号）',
    calculate:'⚡ 计算',copy:'复制',clear:'清空',example:'示例',
    cellR2:'r²（决定系数）',
    cellN:'数据对 (n)',
    cellMeanX:'X 平均值',cellMeanY:'Y 平均值',
    cellSlope:'隐含斜率',
    resultLabel:'皮尔逊相关系数 (r)',
    strengthVWeak:'极弱',strengthWeak:'弱',strengthMod:'中等',strengthStrong:'强',strengthVStrong:'极强',
    directionPos:'正相关（同增同减）',directionNeg:'负相关（一增一减）',directionNone:'无线性关系',
    placeholderX:'X：1, 2, 3, ...',placeholderY:'Y：2, 4, 5, ...',
    formulaHead:'r = [ n·Σ(xy) − Σx·Σy ] / √( [n·Σx² − (Σx)²]·[n·Σy² − (Σy)²] )',
    needPairs:'X 和 Y 的数量需相同（至少 2 对）。',
    step:'步骤',
    stepSums:'计算各求和项',
    stepNum:'分子：n·Σ(xy) − Σx·Σy',
    stepDen:'分母：√(…)',
    stepDivide:'分子除以分母',
    step1:'输入 X 值（一组测量数据）',
    step2:'按相同顺序输入对应的 Y 值',
    step3:'点击「计算」得到相关系数 r',
    step4:'查看强度、方向和公式分解',
  }
});

const { $, copyText, t } = GZ;

function fmt(n){ if(!isFinite(n)) return String(n); const r=Math.round(n*1e6)/1e6; return r.toLocaleString('en-US',{maximumFractionDigits:6}); }
function parseList(s){ return s.split(/[\s,;]+/).map(x=>parseFloat(x)).filter(n=>!isNaN(n)); }

function strength(abs){
  if(abs<0.2) return t('strengthVWeak');
  if(abs<0.4) return t('strengthWeak');
  if(abs<0.6) return t('strengthMod');
  if(abs<0.8) return t('strengthStrong');
  return t('strengthVStrong');
}

function calc(){
  const x=parseList($('#x').value), y=parseList($('#y').value);
  const n=Math.min(x.length,y.length);
  if(n<2||x.length!==y.length){ $('#resultBig').textContent='—'; $('#resultMeta').textContent=t('needPairs'); $('#grid').innerHTML=''; $('#formula').textContent=t('formulaHead'); return; }
  let Sx=0,Sy=0,Sxy=0,Sx2=0,Sy2=0;
  for(let i=0;i<n;i++){ Sx+=x[i]; Sy+=y[i]; Sxy+=x[i]*y[i]; Sx2+=x[i]*x[i]; Sy2+=y[i]*y[i]; }
  const num=n*Sxy-Sx*Sy;
  const den=Math.sqrt((n*Sx2-Sx*Sx)*(n*Sy2-Sy*Sy));
  const r=den===0?NaN:num/den;
  const r2=r*r;
  const meanX=Sx/n, meanY=Sy/n;
  // slope of best-fit line (for display)
  const slopeVar=n*Sx2-Sx*Sx;
  const slope=slopeVar===0?NaN:(n*Sxy-Sx*Sy)/slopeVar;
  if(!isFinite(r)){ $('#resultBig').textContent='—'; $('#resultMeta').textContent=t('needPairs'); return; }
  $('#resultBig').textContent=fmt(r);
  const abs=Math.abs(r);
  let dir = abs<0.0001 ? t('directionNone') : (r>0?t('directionPos'):t('directionNeg'));
  $('#resultMeta').textContent=strength(abs)+' · '+dir;
  $('#grid').innerHTML=
    `<div class="cc-cell"><div class="lbl">${t('cellR2')}</div><div class="val">${fmt(r2)}</div></div>`+
    `<div class="cc-cell"><div class="lbl">${t('cellN')}</div><div class="val">${n}</div></div>`+
    `<div class="cc-cell"><div class="lbl">${t('cellMeanX')}</div><div class="val">${fmt(meanX)}</div></div>`+
    `<div class="cc-cell"><div class="lbl">${t('cellMeanY')}</div><div class="val">${fmt(meanY)}</div></div>`+
    `<div class="cc-cell"><div class="lbl">${t('cellSlope')}</div><div class="val">${fmt(slope)}</div></div>`;
  $('#formula').innerHTML=
    `<div>${t('formulaHead')}</div>`+
    `<div style="margin-top:8px">${t('step')} 1 — ${t('stepSums')}: Σx=${fmt(Sx)}, Σy=${fmt(Sy)}, Σxy=${fmt(Sxy)}, Σx²=${fmt(Sx2)}, Σy²=${fmt(Sy2)}, n=${n}</div>`+
    `<div>${t('step')} 2 — ${t('stepNum')}: ${n}·${fmt(Sxy)} − ${fmt(Sx)}·${fmt(Sy)} = <b>${fmt(num)}</b></div>`+
    `<div>${t('step')} 3 — ${t('stepDen')}: √( (${n}·${fmt(Sx2)} − ${fmt(Sx*Sx)}) × (${n}·${fmt(Sy2)} − ${fmt(Sy*Sy)}) ) = <b>${fmt(den)}</b></div>`+
    `<div>${t('step')} 4 — ${t('stepDivide')}: ${fmt(num)} / ${fmt(den)} = <b>${fmt(r)}</b></div>`;
}

$('#calcBtn').addEventListener('click',calc);
$('#x').addEventListener('input',calc);
$('#y').addEventListener('input',calc);

function loadExample(){ $('#x').value='1, 2, 3, 4, 5'; $('#y').value='2, 4, 5, 4, 5'; calc(); }

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="calc()">${t('calculate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="copyText($('#resultBig').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#x').value='';$('#y').value='';calc()">${t('clear')}</button>`;

$('#lbl-x').textContent=t('lblX');
$('#lbl-y').textContent=t('lblY');

GZ.renderToolPage({
  category:'calc',
  titleKey:'toolTitle',
  descKey:'toolDesc',
  howToSteps:['step1','step2','step3','step4'],
  related:[
    {icon:'📈',href:'/calc/linear-regression.html',name:'Linear Regression'},
    {icon:'📊',href:'/calc/statistics-calculator.html',name:'Statistics Calculator'},
    {icon:'📐',href:'/calc/standard-deviation-calculator.html',name:'Standard Deviation'},
    {icon:'🔢',href:'/calc/z-score-calculator.html',name:'Z-Score Calculator'},
  ]
});
calc();
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
