<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"What is a service worker?","acceptedAnswer":{"@type":"Answer","text":"A service worker is a script that the browser runs in the background, separate from a web page. It can intercept network requests, cache resources, and let your site work offline or load faster — the foundation of Progressive Web Apps (PWAs)."}},{"@type":"Question","name":"Which caching strategy should I choose?","acceptedAnswer":{"@type":"Answer","text":"Cache-first is best for static assets (images, fonts, CSS/JS bundles) that rarely change. Network-first is best for HTML pages and API calls where fresh content matters but you want an offline fallback. Stale-while-revalidate serves cached content immediately while refreshing in the background — a great default for most assets."}},{"@type":"Question","name":"How do I register the generated service worker?","acceptedAnswer":{"@type":"Answer","text":"Copy the generated registration snippet into your main page JavaScript. It checks for service worker support and then registers sw.js from the root of your site, so it can control the whole scope. The generated code includes a ready-to-paste registration block."}},{"@type":"Question","name":"Is my configuration sent to a server?","acceptedAnswer":{"@type":"Answer","text":"No. The service worker code is generated entirely in your browser from the options you pick. Nothing is uploaded."}}]}</script>

    lbCacheName: '缓存名称（带版本号）', lbPrecache: '预缓存 URL（每行一个）',
    lbSkipWait: '立即激活新 SW（skipWaiting）',
    lbClientsClaim: '接管已打开的标签页（clients.claim）',
    lbCleanup: '激活时删除旧缓存',
    lbNavFallback: '离线导航回退到 /index.html',
    lbStrategies: '按请求类型设置运行时缓存策略',
    stImages: '图片', stStatic: 'CSS/JS/字体', stNav: 'HTML 导航', stApi: 'API 调用',
    btnGen: '生成 Service Worker', btnCopy: '复制', btnDownload: '下载 sw.js',
    note: '提示：将 sw.js 放在站点根目录，以便控制整个作用域。发布新的预缓存资源时，递增缓存名称的版本号以失效旧缓存。',
    step1: '设置带版本后缀的缓存名称（如 my-app-v1）',
    step2: '列出安装时预缓存的 URL（每行一个）',
    step3: '为图片、静态资源、导航和 API 调用选择缓存策略',
    step4: '点击「生成」，复制代码或「下载 sw.js」',

const { $, copyText, t } = GZ;

function generate(){
  const cacheName = ($('#sw-cache-name').value || 'my-app-v1').trim();
  const precache = $('#sw-precache').value.split('\n').map(s => s.trim()).filter(Boolean);
  const skipWait = $('#sw-skip-wait').checked;
  const clientsClaim = $('#sw-clients-claim').checked;
  const cleanup = $('#sw-cleanup').checked;
  const navFallback = $('#sw-navigate-fallback').checked;
  const stImages = $('#sw-st-images').value;
  const stStatic = $('#sw-st-static').value;
  const stNav = $('#sw-st-nav').value;
  const stApi = $('#sw-st-api').value;

  const precacheArray = precache.map(u => `'${u.replace(/'/g,"\\'")}'`).join(',\n    ');

  const code = `/**
 * Service Worker generated by tools.gamezipper.com
 * Cache name: ${cacheName}
 * Generated: ${new Date().toISOString().slice(0,10)}
 */
const CACHE_NAME = '${cacheName}';

const PRECACHE_URLS = [
    ${precacheArray || "/* add precache URLs here */"}
];

/* ------------------------------------------------------------------ */
/* Lifecycle: install + activate                                       */
/* ------------------------------------------------------------------ */

self.addEventListener('install', (event) => {
    event.waitUntil(
        caches.open(CACHE_NAME)
            .then((cache) => cache.addAll(PRECACHE_URLS))
            ${skipWait ? '.then(() => self.skipWaiting())' : ''}
            .catch((err) => console.warn('[SW] precache failed:', err))
    );
});

self.addEventListener('activate', (event) => {
    event.waitUntil((async () => {
        ${cleanup ? `// Delete old caches
        const keys = await caches.keys();
        await Promise.all(
            keys.filter((k) => k !== CACHE_NAME).map((k) => caches.delete(k))
        );` : '// cache cleanup disabled'}
        ${clientsClaim ? 'await self.clients.claim();' : '// clients.claim disabled'}
    })());
});

/* ------------------------------------------------------------------ */
/* Runtime caching strategies                                          */
/* ------------------------------------------------------------------ */

${stratFn('cacheFirst', 'Cache-first')}
${stratFn('networkFirst', 'Network-first')}
${stratFn('staleWhileRevalidate', 'Stale-while-revalidate')}
${stratFn('cacheOnly', 'Cache-only')}
${stratFn('networkOnly', 'Network-only')}

/* ------------------------------------------------------------------ */
/* Fetch handler                                                       */
/* ------------------------------------------------------------------ */

self.addEventListener('fetch', (event) => {
    const req = event.request;

    // Only handle GET
    if (req.method !== 'GET') return;

    const url = new URL(req.url);

    // Skip cross-origin requests unless explicitly desired
    if (url.origin !== self.location.origin) return;

    // 1. HTML navigations
    if (req.mode === 'navigate') {
        ${navFallback ? `event.respondWith((async () => {
            try {
                return await ${stratCall(stNav)}(req);
            } catch (err) {
                const cache = await caches.open(CACHE_NAME);
                return (await cache.match('/index.html')) || Response.error();
            }
        })());
        return;` : `event.respondWith(${stratCall(stNav)}(req));
        return;`}
    }

    // 2. Images
    if (req.destination === 'image') {
        event.respondWith(${stratCall(stImages)}(req));
        return;
    }

    // 3. Static assets: styles, scripts, fonts
    if (['style', 'script', 'font', 'manifest'].includes(req.destination)) {
        event.respondWith(${stratCall(stStatic)}(req));
        return;
    }

    // 4. API calls (XHR/fetch)
    if (req.mode === 'cors' || url.pathname.startsWith('/api/')) {
        event.respondWith(${stratCall(stApi)}(req));
        return;
    }

    // 5. Default: try network, fall back to cache
    event.respondWith(${stratCall(stNav)}(req));
});

/* ------------------------------------------------------------------ */
/* Registration snippet (paste in your main page JS)                   */
/* ------------------------------------------------------------------ */
/*
if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
            .then((reg) => console.log('[SW] registered', reg.scope))
            .catch((err) => console.warn('[SW] registration failed:', err));
    });
}
*/
`;

  $('#sw-out').innerHTML = highlightJS(code);
}

function stratFn(name, label){
  const map = {
    cacheFirst: `async function cacheFirst(req) {
    const cached = await caches.match(req);
    return cached || fetch(req);
}`,
    networkFirst: `async function networkFirst(req) {
    try {
        const res = await fetch(req);
        const cache = await caches.open(CACHE_NAME);
        cache.put(req, res.clone());
        return res;
    } catch (err) {
        const cached = await caches.match(req);
        if (cached) return cached;
        throw err;
    }
}`,
    staleWhileRevalidate: `async function staleWhileRevalidate(req) {
    const cache = await caches.open(CACHE_NAME);
    const cached = await cache.match(req);
    const fetchPromise = fetch(req).then((res) => {
        if (res && res.status === 200) cache.put(req, res.clone());
        return res;
    }).catch(() => cached);
    return cached || fetchPromise;
}`,
    cacheOnly: `async function cacheOnly(req) {
    return (await caches.match(req)) || Response.error();
}`,
    networkOnly: `async function networkOnly(req) {
    return fetch(req);
}`,
  };
  return map[name] || '';
}

function stratCall(name){
  return name.replace(/-([a-z])/g, (_, c) => c.toUpperCase());
}

function highlightJS(code){
  // Single-pass tokenizer so inserted span tags are never re-matched.
  const escaped = code.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const tokenRe = /(\/\*[\s\S]*?\*\/|\/\/[^\n]*)|('(?:\\.|[^'\\])*'|"(?:\\.|[^"\\])*"|`(?:\\.|[^`\\])*`)|\b(const|let|var|function|async|await|return|if|else|try|catch|new|of|in|import|export|from|default|throw|typeof|instanceof|class|extends|while|for|do|switch|case|break|continue)\b|\b(self|caches|event|fetch|Response|URL|URLSearchParams|Request|console|navigator|window|document|Promise|JSON|Object|Array|Math|Date|caches)\b/g;
  return escaped.replace(tokenRe, (m, com, str, kw, fn) => {
    if(com) return '<span class="kw-com">'+com+'</span>';
    if(str) return '<span class="kw-str">'+str+'</span>';
    if(kw)  return '<span class="kw-kw">'+kw+'</span>';
    if(fn)  return '<span class="kw-fn">'+fn+'</span>';
    return m;
  });
}

function downloadSW(){
  const code = $('#sw-out').textContent;
  const blob = new Blob([code], { type: 'application/javascript' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'sw.js'; a.click();
  setTimeout(() => URL.revokeObjectURL(url), 2000);
}

function setLangAttrs(){
  document.querySelectorAll('[id-lang]').forEach(el => {
    const key = el.getAttribute('id-lang');
    const txt = t(key);
    if(!txt) return;
    if(el.tagName === 'LABEL') el.textContent = txt;
    else if(el.tagName === 'SPAN') el.textContent = txt;
    else if(el.tagName === 'BUTTON') el.textContent = txt;
  });
}
setLangAttrs();
generate();
