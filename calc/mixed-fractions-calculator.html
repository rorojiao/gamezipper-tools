<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"What is a mixed number?","acceptedAnswer":{"@type":"Answer","text":"A mixed number combines a whole number and a proper fraction, for example 3 1/2 (three and a half). The whole number 3 plus the fraction 1/2 equals 7/2 as an improper fraction."}},{"@type":"Question","name":"How do you add mixed fractions?","acceptedAnswer":{"@type":"Answer","text":"Convert each mixed number to an improper fraction, find a common denominator, add the numerators, simplify the result, then convert back to a mixed number if needed. This calculator does every step for you and shows the work."}},{"@type":"Question","name":"Can I multiply and divide mixed numbers too?","acceptedAnswer":{"@type":"Answer","text":"Yes. Use the operator dropdown to switch between +, -, × and ÷. For multiplication convert to improper fractions then multiply numerators and denominators. For division multiply by the reciprocal of the second fraction."}},{"@type":"Question","name":"How does the calculator simplify the answer?","acceptedAnswer":{"@type":"Answer","text":"It divides the numerator and denominator by their greatest common divisor (GCD) to reduce the fraction to lowest terms, then expresses the result as both a simplified improper fraction and a mixed number."}}]}</script>

<script>
GZI18n.register({
  en:{
    toolTitle:'Mixed Fractions Calculator',
    toolDesc:'Add, subtract, multiply and divide mixed numbers like 3 1/2 + 2 3/4. Get a simplified result as both an improper fraction and a mixed number, with step-by-step work.',
    calculate:'⚡ Calculate',copy:'Copy',clear:'Clear',
    asMixed:'as mixed number',
    asImproper:'as improper fraction',
    asDecimal:'as decimal',
    step1T:'Step 1 — Convert to improper fractions',
    step2T:'Step 2 — Find common denominator',
    step3T:'Step 3 — Compute',
    step4T:'Step 4 — Simplify',
    invalidDen:'Denominators must be positive integers.',
    invalidNum:'Enter valid integers in the fields.',
    divZero:'Cannot divide by zero.',
    step1:'Enter the whole, numerator and denominator of each mixed number',
    step2:'Pick the operation: +, −, × or ÷',
    step3:'Press Calculate to see the simplified answer',
    step4:'Read the step-by-step conversion and simplification',
  },
  zh:{
    toolTitle:'带分数计算器',
    toolDesc:'对带分数进行加减乘除，例如 3 1/2 + 2 3/4。结果同时以假分数和带分数显示，并附逐步运算过程。',
    calculate:'⚡ 计算',copy:'复制',clear:'清空',
    asMixed:'带分数',
    asImproper:'假分数',
    asDecimal:'小数',
    step1T:'步骤 1 — 转为假分数',
    step2T:'步骤 2 — 通分',
    step3T:'步骤 3 — 计算',
    step4T:'步骤 4 — 化简',
    invalidDen:'分母必须是正整数。',
    invalidNum:'请输入有效整数。',
    divZero:'除数不能为零。',
    step1:'分别输入两个带分数的整数部分、分子和分母',
    step2:'选择运算符：+、−、× 或 ÷',
    step3:'点击「计算」查看化简后的结果',
    step4:'查看逐步的转换与化简过程',
  }
});

const { $, copyText, t } = GZ;

function gcd(a,b){a=Math.abs(a);b=Math.abs(b);while(b){[a,b]=[b,a%b];}return a||1;}
function parseMixed(w,n,d){
  w=w||0;n=n||0;d=d||1;
  if(d<=0) return null;
  const sign=(w<0||n<0)?-1:1;
  return {num:sign*(Math.abs(w)*d+Math.abs(n)),den:d};
}
function simplify(f){const g=gcd(f.num,f.den);return {num:f.num/g,den:f.den/g};}
function toMixed(f){
  if(f.den===0) return '—';
  const sign=f.num<0?'-':'';
  let n=Math.abs(f.num),d=f.den;
  const w=Math.floor(n/d);n=n%d;
  if(w===0&&n===0) return '0';
  if(w===0) return `${sign}${n}/${d}`;
  if(n===0) return `${sign}${w}`;
  return `${sign}${w} ${n}/${d}`;
}
function fmtF(f){return `${f.num}/${f.den}`;}

function calc(){
  const elB=$('#resultBig'),elM=$('#resultMeta'),steps=$('#steps');
  const aW=parseInt($('#aW').value),aN=parseInt($('#aN').value),aD=parseInt($('#aD').value);
  const bW=parseInt($('#bW').value),bN=parseInt($('#bN').value),bD=parseInt($('#bD').value);
  const op=$('#opSel').value;
  if(isNaN(aW)&&isNaN(aN)||isNaN(bW)&&isNaN(bN)){elB.textContent='—';elM.textContent=t('invalidNum');steps.textContent='';return;}
  const A=parseMixed(isNaN(aW)?0:aW,isNaN(aN)?0:aN,isNaN(aD)?1:aD);
  const B=parseMixed(isNaN(bW)?0:bW,isNaN(bN)?0:bN,isNaN(bD)?1:bD);
  if(!A||!B){elB.textContent='—';elM.textContent=t('invalidDen');steps.textContent='';return;}
  let res,work=[];
  work.push(`<div><b>${t('step1T')}</b></div>`);
  work.push(`<div style="margin:4px 0 10px">${toMixed(A)} = ${fmtF(A)} ;  ${toMixed(B)} = ${fmtF(B)}</div>`);

  if(op==='+'||op==='-'){
    const lcm=Math.abs(A.den*B.den)/gcd(A.den,B.den);
    const aAdj={num:A.num*(lcm/A.den),den:lcm};
    const bAdj={num:B.num*(lcm/B.den),den:lcm};
    work.push(`<div><b>${t('step2T')}</b>: LCM(${A.den}, ${B.den}) = ${lcm}</div>`);
    work.push(`<div style="margin:4px 0 10px">${fmtF(A)} = ${fmtF(aAdj)} ;  ${fmtF(B)} = ${fmtF(bAdj)}</div>`);
    let rn=op==='+'?aAdj.num+bAdj.num:aAdj.num-bAdj.num;
    res={num:rn,den:lcm};
    work.push(`<div><b>${t('step3T')}</b>: ${fmtF(aAdj)} ${op} ${fmtF(bAdj)} = ${fmtF(res)}</div>`);
  } else if(op==='*'){
    res={num:A.num*B.num,den:A.den*B.den};
    work.push(`<div><b>${t('step3T')}</b>: ${fmtF(A)} × ${fmtF(B)} = ${fmtF(res)}</div>`);
  } else {
    if(B.num===0){elB.textContent='—';elM.textContent=t('divZero');steps.textContent='';return;}
    res={num:A.num*B.den,den:A.den*B.num};
    if(res.den<0){res.num=-res.num;res.den=-res.den;}
    work.push(`<div><b>${t('step3T')}</b>: ${fmtF(A)} ÷ ${fmtF(B)} = ${fmtF(A)} × ${fmtF({num:B.den,den:B.num})} = ${fmtF(res)}</div>`);
  }
  const g=gcd(res.num,res.den);
  const simp={num:res.num/g,den:res.den/g};
  if(JSON.stringify(simp)!==JSON.stringify(res)){
    work.push(`<div style="margin-top:6px"><b>${t('step4T')}</b>: GCD(${Math.abs(res.num)}, ${res.den}) = ${g}</div>`);
    work.push(`<div>${fmtF(res)} = ${fmtF(simp)}</div>`);
  }
  elB.textContent=toMixed(simp);
  const dec=(simp.num/simp.den).toLocaleString('en-US',{maximumFractionDigits:10});
  elM.textContent=`${t('asImproper')}: ${fmtF(simp)}  ·  ${t('asDecimal')}: ${dec}`;
  steps.innerHTML=work.join('');
}

$('#calcBtn').addEventListener('click',calc);
['aW','aN','aD','bW','bN','bD'].forEach(id=>{$('#'+id).addEventListener('input',calc);});
$('#opSel').addEventListener('change',calc);

$('#toolbar').innerHTML=`
  <button class="gz-btn" onclick="calc()">${t('calculate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="copyText($('#resultBig').textContent+' ('+$('#resultMeta').textContent+')')">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="['aW','aN','aD','bW','bN','bD'].forEach(id=>document.getElementById(id).value='');calc()">${t('clear')}</button>`;

GZ.renderToolPage({
  category:'calc',
  titleKey:'toolTitle',
  descKey:'toolDesc',
  howToSteps:['step1','step2','step3','step4'],
  related:[
    {icon:'➗',href:'/calc/fraction-simplifier.html',name:'Fraction Simplifier'},
    {icon:'🔟',href:'/calc/decimal-to-fraction.html',name:'Decimal to Fraction'},
    {icon:'🧮',href:'/calc/fraction-calculator.html',name:'Fraction Calculator'},
    {icon:'🔢',href:'/calc/gcd-lcm-calculator.html',name:'GCD & LCM Calculator'},
  ]
});
calc();
</script>
