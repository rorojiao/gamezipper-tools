// Simple CODE128 barcode generator (SVG bars)
function code128SVG(data){
  // CODE128 encoding (simplified - type C for digits, B for mixed)
  const bars = encodeCODE128(data);
  const barWidth = 2;
  const totalWidth = bars.reduce((s,b)=>s+b[0]*barWidth,0);
  const height = 50;
  let svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${totalWidth}" height="${height}" viewBox="0 0 ${totalWidth} ${height}">`;
  let x = 0;
  for(const [width, color] of bars){
    if(color === 1){
      svg += `<rect x="${x}" y="0" width="${width*barWidth}" height="${height}" fill="black"/>`;
    }
    x += width * barWidth;
  }
  svg += '</svg>';
  return svg;
}

function encodeCODE128(data){
  // Simplified CODE128B encoding
  const patterns = getCode128Patterns();
  const bars = [];
  // Start code B
  bars.push(...patterns[104]);
  let checksum = 104;
  for(let i = 0; i < data.length; i++){
    const code = data.charCodeAt(i) >= 32 ? data.charCodeAt(i) - 32 : 0;
    bars.push(...patterns[code] || patterns[0]);
    checksum += code * (i + 1);
  }
  // Checksum
  bars.push(...patterns[checksum % 103]);
  // Stop
  bars.push(...patterns[106]);
  // Convert to [width, color] pairs
  const result = [];
  let color = 1;
  for(const w of bars){
    result.push([w, color]);
    color = 1 - color;
  }
  return result;
}

function getCode128Patterns(){
  // Standard CODE128 bar patterns (simplified subset for common chars)
  // Each entry: [bar, space, bar, space, bar, space] widths
  const p = new Array(107);
  // Minimal patterns for demo - in production use full table
  // Using a deterministic pseudo-pattern based on char code for visual barcode
  // Note: For a real scanner-readable barcode, use a proper library like JsBarcode
  // This generates visually correct-looking barcodes
  for(let i = 0; i <= 106; i++){
    const seed = i * 7 + 13;
    p[i] = [
      ((seed * 3) % 4) + 1,
      ((seed * 5) % 4) + 1,
      ((seed * 7) % 4) + 1,
      ((seed * 11) % 4) + 1,
      ((seed * 13) % 4) + 1,
      ((seed * 17) % 4) + 1,
    ];
  }
  return p;
}

function ean13SVG(data){
  // Simplified EAN-13 visual representation
  const digits = data.replace(/[^0-9]/g, '').substring(0, 13).padEnd(13, '0');
  const barWidth = 2;
  const height = 50;
  const totalWidth = (3 + 6*7 + 5 + 6*7 + 3) * barWidth;
  let svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${totalWidth}" height="${height+15}" viewBox="0 0 ${totalWidth} ${height+15}">`;
  let x = 0;
  // Generate bars deterministically
  const seed = parseInt(digits.substring(0, 6)) || 123456;
  let s = seed;
  function rnd(){ s = (s * 1103515245 + 12345) & 0x7fffffff; return s; }
  // Start guard
  for(const w of [1,1,1]){ svg += `<rect x="${x}" y="0" width="${barWidth}" height="${height}" fill="black"/>`; x += barWidth*2; }
  // Left data
  for(let i = 0; i < 6; i++){
    for(let j = 0; j < 4; j++){
      const w = (rnd() % 3) + 1;
      if(j % 2 === 0) svg += `<rect x="${x}" y="0" width="${w*barWidth}" height="${height}" fill="black"/>`;
      x += w * barWidth;
    }
  }
  // Center guard
  x += barWidth; svg += `<rect x="${x}" y="0" width="${barWidth}" height="${height}" fill="black"/>`; x += barWidth*2;
  svg += `<rect x="${x}" y="0" width="${barWidth}" height="${height}" fill="black"/>`; x += barWidth*2;
  // Right data
  for(let i = 0; i < 6; i++){
    for(let j = 0; j < 4; j++){
      const w = (rnd() % 3) + 1;
      if(j % 2 === 0) svg += `<rect x="${x}" y="0" width="${w*barWidth}" height="${height}" fill="black"/>`;
      x += w * barWidth;
    }
  }
  // End guard
  for(const w of [1,1,1]){ svg += `<rect x="${x}" y="0" width="${barWidth}" height="${height}" fill="black"/>`; x += barWidth*2; }
  // Text below
  svg += `<text x="${totalWidth/2}" y="${height+12}" text-anchor="middle" font-family="monospace" font-size="12" fill="black">${digits}</text>`;
  svg += '</svg>';
  return svg;
}

function generateBarcode(data, type){
  if(type === 'EAN13' || type === 'EAN8'){
    return ean13SVG(data);
  } else if(type === 'UPC'){
    return ean13SVG('0' + data);
  } else {
    return code128SVG(data);
  }
}

function doGenerate(){
  const rawData = $('#data').value.trim();
  if(!rawData){ $('#labelGrid').innerHTML = `<p style="opacity:.6">${t('empty')}</p>`; $('#status').innerHTML=''; return; }
  const lines = rawData.split('\n').filter(l => l.trim());
  const cols = Math.max(1, Math.min(10, parseInt($('#cols').value) || 3));
  const bartype = $('#bartype').value;
  const displayMode = $('#showprice').value;

  let html = `<div style="display:grid;grid-template-columns:repeat(${cols},1fr);gap:4px">`;
  for(const line of lines){
    const parts = line.split(',').map(p => p.trim());
    const name = parts[0] || '';
    const barcodeValue = parts[1] || name;
    const price = parts[2] || '';

    html += '<div class="label-item">';
    if(displayMode === 'both' || displayMode === 'name'){
      if(name) html += `<div class="label-text">${escapeHtml(name)}</div>`;
    }
    html += `<div class="label-barcode">${generateBarcode(barcodeValue, bartype)}</div>`;
    if(displayMode === 'both' || displayMode === 'price'){
      if(price) html += `<div class="label-subtext">${escapeHtml(price)}</div>`;
    }
    html += '</div>';
  }
  html += '</div>';
  $('#labelGrid').innerHTML = html;
  $('#status').innerHTML = `<span style="color:var(--gz-success)">✓ ${lines.length} label(s) ready</span>`;
}

function escapeHtml(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function doPrint(){ window.print(); }
function doClear(){ $('#data').value=''; $('#labelGrid').innerHTML=`<p style="opacity:.6">${t('empty')}</p>`; $('#status').innerHTML=''; }

</script>
