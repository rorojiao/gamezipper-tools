  { id: 'comedy', label: { en: '😂 Comedy', zh: '😂 喜剧' } },

let currentGenre = 'all';
let favorites = [];

try {
  favorites = JSON.parse(localStorage.getItem('gz-writing-prompts-favs') || '[]');
} catch (e) { favorites = []; }

function saveFavorites() {
  try { localStorage.setItem('gz-writing-prompts-favs', JSON.stringify(favorites)); } catch (e) {}
}

function randomFrom(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

function generate() {
  let pool;
  if (currentGenre === 'all') {
    pool = Object.values(PROMPTS).flat();
    $('#genre-badge').textContent = '🎲 All';
  } else {
    pool = PROMPTS[currentGenre];
    const g = GENRES.find(x => x.id === currentGenre);
    $('#genre-badge').textContent = g.label.en;
  }
  const prompt = randomFrom(pool);
  $('#prompt').textContent = prompt;
}

function renderGenres() {
  const lang = GZI18n.getLang();
  $('#genre-tabs').innerHTML = GENRES.map(g => {
    const label = g.label[lang] || g.label.en;
    return `<button data-genre="${g.id}" class="${g.id === currentGenre ? 'active' : ''}">${label}</button>`;
  }).join('');
  document.querySelectorAll('#genre-tabs button').forEach(btn => {
    btn.onclick = () => {
      document.querySelectorAll('#genre-tabs button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentGenre = btn.dataset.genre;
      generate();
    };
  });
}

function renderFavorites() {
  if (!favorites.length) {
    $('#favorites').innerHTML = `<p style="color:var(--text2);font-size:.9em;font-style:italic">${t('emptySaved')}</p>`;
    return;
  }
  $('#favorites').innerHTML = favorites.map((f, i) => `
    <div class="fav-item">
      <span class="fav-text">${f.replace(/</g, '&lt;')}</span>
      <button data-action="copy" data-idx="${i}" title="${t('copy')}">📋</button>
      <button data-action="del" data-idx="${i}" title="Delete">✕</button>
    </div>`).join('');
}

$('#favorites').addEventListener('click', e => {
  const btn = e.target.closest('button');
  if (!btn) return;
  const idx = +btn.dataset.idx;
  if (btn.dataset.action === 'copy') copyText(favorites[idx]);
  else if (btn.dataset.action === 'del') {
    favorites.splice(idx, 1);
    saveFavorites();
    renderFavorites();
  }
});

$('#toolbar').innerHTML = `

  <button class="gz-btn gz-btn-secondary" id="btn-copy">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" id="btn-save">${t('save')}</button>

$('#btn-copy').onclick = () => copyText($('#prompt').textContent);
$('#btn-save').onclick = () => {
  const p = $('#prompt').textContent;
  if (p && !favorites.includes(p)) {
    favorites.unshift(p);
    if (favorites.length > 50) favorites = favorites.slice(0, 50);
    saveFavorites();
    renderFavorites();
    GZ.showToast('⭐ Saved');
  }
};
$('#btn-clear').onclick = () => {

    saveFavorites();
    renderFavorites();
  }
};
