<script>
GZI18n.register({
  en: {
    toolTitle: 'Car Affordability Calculator',
    toolDesc: 'Find out how much car you can afford based on income, down payment, APR and loan term — with the 20/4/10 rule.',
    lblIncome: 'Gross Annual Income ($)',
    lblDown: 'Down Payment ($)',
    lblApr: 'Loan APR (Interest Rate %)',
    lblTerm: 'Loan Term (months)',
    lblPct: 'Max % of Income for Car Costs',
    btnCalc: 'Calculate Affordable Car Price',
    resultLabel: 'Maximum Affordable Car Price',
    monthly: 'Estimated Monthly Payment',
    loanAmt: 'Loan Amount (Financed)',
    interest: 'Total Interest Paid',
    downPct: 'Effective Down Payment %',
    rule: '💡 <b>20/4/10 rule:</b> put ≥20% down, finance ≤4 years, keep total car costs (payment + insurance + gas + maintenance) under 10% of gross income. This keeps you from going "upside down" on the loan.',
    step1: 'Enter your gross annual income and the down payment you can make',
    step2: 'Input the APR (interest rate) you qualify for and the loan term in months',
    step3: 'Choose the max percentage of income you are willing to spend on car costs',
    step4: 'Click Calculate to see the maximum affordable car price and monthly payment',
  },
  zh: {
    toolTitle: '购车预算计算器',
    toolDesc: '根据收入、首付、年利率和贷款期限，计算你能买得起多少钱的车 — 含 20/4/10 经验法则。',
    lblIncome: '税前年收入（美元）',
    lblDown: '首付金额（美元）',
    lblApr: '贷款年利率（%）',
    lblTerm: '贷款期限（月）',
    lblPct: '养车支出占收入上限',
    btnCalc: '计算可负担车价',
    resultLabel: '可负担的最高车价',
    monthly: '预估月供',
    loanAmt: '贷款金额',
    interest: '总利息支出',
    downPct: '实际首付比例',
    rule: '💡 <b>20/4/10 法则：</b>首付 ≥20%、贷款 ≤4 年、养车总成本（月供+保险+油费+保养）不超过收入的 10%。这样能避免车辆价值"资不抵债"。',
    step1: '输入税前年收入和你能拿出的首付',
    step2: '填写你能拿到的年利率（APR）和贷款期限（月）',
    step3: '选择你愿意把收入的多大比例用于养车',
    step4: '点击「计算可负担车价」查看最高车价和月供',
  }
});

const { $, t } = GZ;

function pmt(principal, annualRatePct, months) {
  if (months <= 0) return principal;
  const r = annualRatePct / 100 / 12;
  if (r === 0) return principal / months;
  return principal * r * Math.pow(1 + r, months) / (Math.pow(1 + r, months) - 1);
}

function calculate() {
  const income = Math.max(0, parseFloat($('#income').value) || 0);
  const down = Math.max(0, parseFloat($('#down').value) || 0);
  const apr = Math.max(0, parseFloat($('#apr').value) || 0);
  const term = parseInt($('#term').value, 10);
  const pct = parseInt($('#pct').value, 10);

  const monthlyGross = income / 12;
  // pct of gross income allowed for car costs; assume 60% of that budget goes to the loan payment
  const totalBudget = monthlyGross * pct / 100;
  const paymentBudget = totalBudget * 0.6;

  // Solve for max loan: payment = pmt(loan, apr, term) => loan = pv(apr, term, payment)
  const r = apr / 100 / 12;
  let maxLoan;
  if (r === 0) maxLoan = paymentBudget * term;
  else maxLoan = paymentBudget * (Math.pow(1 + r, term) - 1) / (r * Math.pow(1 + r, term));

  const maxPrice = maxLoan + down;
  const totalPaid = paymentBudget * term;
  const totalInterest = totalPaid - maxLoan;
  const effDownPct = maxPrice > 0 ? (down / maxPrice * 100) : 0;

  const currency = '$';
  $('#result').style.display = '';
  $('#result-maxprice').textContent = currency + maxPrice.toLocaleString(undefined, {maximumFractionDigits: 0});
  $('#result-label').textContent = t('resultLabel');
  $('#result-monthly').textContent = currency + paymentBudget.toFixed(0);
  $('#result-monthly-label').textContent = t('monthly');
  $('#result-loan').textContent = currency + maxLoan.toLocaleString(undefined, {maximumFractionDigits: 0});
  $('#result-loan-label').textContent = t('loanAmt');
  $('#result-interest').textContent = currency + totalInterest.toLocaleString(undefined, {maximumFractionDigits: 0});
  $('#result-interest-label').textContent = t('interest');
  $('#result-downpct').textContent = effDownPct.toFixed(1) + '%';
  $('#result-downpct-label').textContent = t('downPct');
  $('#rule').innerHTML = t('rule');
}

$('#btn-calc').textContent = t('btnCalc');
calculate();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],

    {icon:'⛽', href:'/calc/fuel-cost-calculator.html', name:'Fuel Cost'},
    {icon:'💰', href:'/calc/tip-calculator.html', name:'Tip Calc'},
  ]
});
</script>
