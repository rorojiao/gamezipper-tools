    dropOrClick: '拖拽图片或点击选择',

    cornerRadius: '圆角 (px)',

    presetPolaroid: '📷 拍立得',
    presetNone: '无边框',
    presetThin: '细黑框',
    presetThick: '粗白框',
    presetRounded: '圆角卡片',
    presetShadow: '柔和阴影',
    presetDashed: '虚线强调',
    on: '开', off: '关',
    step1: '上传或拖拽一张图片开始',
    step2: '选择预设或自定义边框、圆角和阴影',
    step3: '在右侧查看效果预览',
    step4: '点击「下载 PNG」保存成框图片',

const { $, t, showToast } = GZ;

let img = null;
const state = { width: 8, color: '#ffffff', radius: 12, shadow: true, pad: 30, bg: '#1a1a2a' };

function loadImage(src){
  const im = new Image();
  im.onload = function(){
    img = im;
    const wrap = $('#orig-wrap');
    wrap.innerHTML = '';
    im.style.maxWidth='100%'; im.style.maxHeight='460px';
    wrap.appendChild(im);
    draw();
  };
  im.src = src;
}

function draw(){
  if(!img) return;
  const c = $('#preview');
  const ctx = c.getContext('2d');
  const borderW = state.width;
  const pad = state.pad;
  const r = state.radius;
  const w = img.naturalWidth, h = img.naturalHeight;
  const outW = w + (borderW + pad) * 2;
  const outH = h + (borderW + pad) * 2;
  // Cap canvas size for memory
  const maxDim = 1800;
  let scale = 1;
  if(outW > maxDim || outH > maxDim){
    scale = Math.min(maxDim / outW, maxDim / outH);
  }
  c.width = Math.round(outW * scale);
  c.height = Math.round(outH * scale);
  ctx.scale(scale, scale);
  // Background
  ctx.fillStyle = state.bg;
  ctx.fillRect(0, 0, outW, outH);
  // Shadow
  if(state.shadow){
    ctx.shadowColor = 'rgba(0,0,0,0.4)';
    ctx.shadowBlur = 24;
    ctx.shadowOffsetX = 0;
    ctx.shadowOffsetY = 8;
  }
  // Outer rounded path
  const ox = borderW + pad, oy = borderW + pad;
  roundRect(ctx, ox, oy, w, h, r);
  ctx.fillStyle = state.color;
  ctx.fill();
  // Reset shadow before drawing image
  ctx.shadowColor = 'transparent';
  ctx.shadowBlur = 0;
  ctx.shadowOffsetX = 0;
  ctx.shadowOffsetY = 0;
  // Clip to inner rect for the image (with slight inset)
  ctx.save();
  roundRect(ctx, ox + borderW, oy + borderW, w - borderW*2, h - borderW*2, Math.max(0, r - borderW));
  ctx.clip();
  ctx.drawImage(img, ox + borderW, oy + borderW, w - borderW*2, h - borderW*2);
  ctx.restore();
}

function roundRect(ctx, x, y, w, h, r){
  r = Math.min(r, w/2, h/2);
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.arcTo(x+w, y, x+w, y+h, r);
  ctx.arcTo(x+w, y+h, x, y+h, r);
  ctx.arcTo(x, y+h, x, y, r);
  ctx.arcTo(x, y, x+w, y, r);
  ctx.closePath();
}

function download(){
  if(!img) return;
  const c = $('#preview');
  c.toBlob(function(blob){
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'bordered-image.png';
    a.click();
    setTimeout(()=>URL.revokeObjectURL(a.href), 1000);
  }, 'image/png');
}

function applyPreset(name){
  if(name==='none'){ state.width=0; state.color='#ffffff'; state.radius=0; state.shadow=false; state.pad=10; state.bg='#1a1a2a'; }
  else if(name==='thin'){ state.width=3; state.color='#000000'; state.radius=0; state.shadow=false; state.pad=10; state.bg='#ffffff'; }
  else if(name==='thick'){ state.width=20; state.color='#ffffff'; state.radius=0; state.shadow=true; state.pad=15; state.bg='#2a2a3a'; }
  else if(name==='rounded'){ state.width=6; state.color='#ffffff'; state.radius=24; state.shadow=true; state.pad=15; state.bg='#3a3a4a'; }
  else if(name==='shadow'){ state.width=4; state.color='#ffffff'; state.radius=8; state.shadow=true; state.pad=40; state.bg='#f0f0f0'; }
  else if(name==='polaroid'){ state.width=8; state.color='#fafafa'; state.radius=0; state.shadow=true; state.pad=40; state.bg='#fafafa'; }
  else if(name==='dashed'){ state.width=6; state.color='#4ecdc4'; state.radius=12; state.shadow=false; state.pad=20; state.bg='#1a1a2a'; }
  syncControls();
  draw();
}

function syncControls(){
  $('#ctrl-w').value = state.width;
  $('#ctrl-c').value = state.color;
  $('#ctrl-r').value = state.radius;
  $('#ctrl-s').value = state.shadow?t('on'):t('off');
  $('#ctrl-p').value = state.pad;
  $('#ctrl-bg').value = state.bg;
}

$('#drop').addEventListener('click', function(){ $('#file').click(); });
$('#drop').addEventListener('dragover', function(e){ e.preventDefault(); this.style.borderColor='var(--accent)'; });
$('#drop').addEventListener('dragleave', function(){ this.style.borderColor=''; });
$('#drop').addEventListener('drop', function(e){
  e.preventDefault(); this.style.borderColor='';
  const f = e.dataTransfer.files[0];
  if(f && f.type.startsWith('image/')){ loadImage(URL.createObjectURL(f)); }
});
$('#file').addEventListener('change', function(e){
  const f = e.target.files[0];
  if(f) loadImage(URL.createObjectURL(f));
});

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="download()">⬇ ${t('download')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#file').click()">📁 ${t('chooseImage')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="applyPreset('none')">↺ ${t('reset')}</button>`;

$('#drop-text').textContent = t('dropOrClick');

$('#presets').innerHTML = `
  <span class="be-preset" onclick="applyPreset('polaroid')">${t('presetPolaroid')}</span>
  <span class="be-preset" onclick="applyPreset('thin')">${t('presetThin')}</span>
  <span class="be-preset" onclick="applyPreset('thick')">${t('presetThick')}</span>
  <span class="be-preset" onclick="applyPreset('rounded')">${t('presetRounded')}</span>
  <span class="be-preset" onclick="applyPreset('shadow')">${t('presetShadow')}</span>
  <span class="be-preset" onclick="applyPreset('dashed')">${t('presetDashed')}</span>
  <span class="be-preset" onclick="applyPreset('none')">${t('presetNone')}</span>`;

$('#ctrls').innerHTML = `
  <label>${t('borderWidth')}<input type="range" id="ctrl-w" min="0" max="40" value="8" oninput="state.width=+this.value;draw()"></label>
  <label>${t('borderColor')}<input type="color" id="ctrl-c" value="#ffffff" oninput="state.color=this.value;draw()"></label>
  <label>${t('cornerRadius')}<input type="range" id="ctrl-r" min="0" max="200" value="12" oninput="state.radius=+this.value;draw()"></label>
  <label>${t('shadow')}<button id="ctrl-s" class="gz-btn gz-btn-secondary" style="padding:4px 8px;font-size:0.85em" onclick="state.shadow=!state.shadow;syncControls();draw()">${t('on')}</button></label>
  <label>${t('padding')}<input type="range" id="ctrl-p" min="0" max="100" value="30" oninput="state.pad=+this.value;draw()"></label>
  <label>${t('bgColor')}<input type="color" id="ctrl-bg" value="#1a1a2a" oninput="state.bg=this.value;draw()"></label>`;

$('#lbl-orig').textContent = t('original');

</script>
