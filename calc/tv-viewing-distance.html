<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>

  </div>
  <div class="gz-tool-area">

      <div>

        <input type="number" id="size" value="55" min="10" max="150" step="1">
      </div>
      <div>
        <label id="lbl-resolution"></label>
        <select id="resolution">
          <option value="4k">4K UHD (3840×2160)</option>
          <option value="1080p">1080p Full HD (1920×1080)</option>

        <label id="lbl-unit"></label>

          <option value="ft">Feet</option>

      </div>
      <button class="gz-btn" onclick="calculate()" id="btn-calc"></button>
    </div>

<script>
GZI18n.register({
  en: {
    toolTitle: 'TV Viewing Distance Calculator',
    toolDesc: 'Find the optimal sitting distance for your TV based on screen size and resolution. Supports 4K, 1080p and 8K with SMPTE and THX standards.',
    lblSize: 'TV Screen Size (inches)',
    lblResolution: 'Resolution',
    lblUnit: 'Distance Unit',
    btnCalc: 'Calculate Viewing Distance',
    resultLabel: 'Optimal Viewing Distance',
    minDist: 'Minimum Distance',
    maxDist: 'Maximum Distance',
    fieldOfView: 'Field of View',
    screenHeight: 'Screen Height',
    step1: 'Enter your TV screen size in inches (diagonal)',
    step2: 'Select the resolution: 4K, 1080p or 8K',
    step3: 'Choose feet or meters for the output',
    step4: 'Click Calculate to see optimal, min and max viewing distances',
  },
  zh: {
    toolTitle: '电视观看距离计算器',
    toolDesc: '根据屏幕尺寸和分辨率计算最佳观看距离。支持 4K、1080p 和 8K，采用 SMPTE 和 THX 标准。',
    lblSize: '电视屏幕尺寸（英寸）',
    lblResolution: '分辨率',
    lblUnit: '距离单位',
    btnCalc: '计算观看距离',
    resultLabel: '最佳观看距离',
    minDist: '最近距离',
    maxDist: '最远距离',
    fieldOfView: '视野角度',
    screenHeight: '屏幕高度',
    step1: '输入电视屏幕尺寸（英寸，对角线）',
    step2: '选择分辨率：4K、1080p 或 8K',
    step3: '选择输出单位（英尺或米）',
    step4: '点击计算查看最佳、最近和最远观看距离',
  }
});

const { $, copyText, t } = GZ;
const lang = GZI18n.getLang();

function calculate() {
  const size = parseFloat($('#size').value) || 0;
  const res = $('#resolution').value;
  const unit = $('#unit').value;
  const toMeters = unit === 'm';

  // Multipliers (in screen-diagonal multiples, converted to feet)
  // 1 inch diagonal = 1/12 feet
  let minMult, optMult, maxMult, fov;
  if (res === '8k') { minMult = 0.8; optMult = 1.0; maxMult = 1.2; fov = 60; }
  else if (res === '4k') { minMult = 1.0; optMult = 1.2; maxMult = 1.5; fov = 40; }
  else { minMult = 1.5; optMult = 2.0; maxMult = 2.5; fov = 30; }

  // Diagonal in feet
  const diagFeet = size / 12;
  const minDistFt = diagFeet * minMult;
  const optDistFt = diagFeet * optMult;
  const maxDistFt = diagFeet * maxMult;

  // Screen height (16:9 aspect ratio)
  // height = diagonal * 9 / sqrt(337)
  const heightInches = size * 9 / Math.sqrt(337);

  const fmt = (ft) => toMeters ? (ft * 0.3048).toFixed(2) + ' m' : ft.toFixed(1) + ' ft';

  $('#result').style.display = '';
  $('#result-optimal').textContent = fmt(optDistFt);
  $('#result-label').textContent = t('resultLabel');
  $('#result-min').textContent = fmt(minDistFt);
  $('#result-min-label').textContent = t('minDist');
  $('#result-max').textContent = fmt(maxDistFt);
  $('#result-max-label').textContent = t('maxDist');
  $('#result-fov').textContent = '≈' + fov + '°';
  $('#result-fov-label').textContent = t('fieldOfView');
  $('#result-height').textContent = heightInches.toFixed(1) + '"';
  $('#result-height-label').textContent = t('screenHeight');
}

$('#btn-calc').textContent = t('btnCalc');
calculate();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📐', href:'/calc/aspect-ratio.html', name:'Aspect Ratio'},
    {icon:'📏', href:'/convert/length-converter.html', name:'Length Converter'},
    {icon:'🖥️', href:'/calc/dpi-calculator.html', name:'DPI Calculator'},
    {icon:'📺', href:'/calc/tv-size-calculator.html', name:'TV Size Calculator'},
  ]
});
</script>
