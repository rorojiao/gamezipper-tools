<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="ctrl">
      <div><label>Overlay Opacity</label><input type="range" min="20" max="90" value="60" id="overlay" onchange="render()"></div>
      <div><label>Modal Bg</label><input type="color" id="modBg" value="#1e1e3f" onchange="render()"></div>
      <div><label>Modal Text</label><input type="color" id="modTxt" value="#ffffff" onchange="render()"></div>
      <div><label>Accent</label><input type="color" id="accent" value="#4ecdc4" onchange="render()"></div>
      <div><label>Radius</label><input type="range" min="0" max="24" value="12" id="radius" onchange="render()"></div>
      <div><label>Width</label>
        <select id="width" onchange="render()">
          <option value="320px">Small</option><option value="420px" selected>Medium</option><option value="560px">Large</option>
        </select></div>
      <div><label>Animation</label>
        <select id="anim" onchange="render()">
          <option value="fade">Fade</option><option value="scale" selected>Scale</option><option value="slide">Slide Down</option><option value="bounce">Bounce</option>
        </select></div>
    </div>
    <div style="margin-bottom:8px;font-size:.85rem;color:var(--text2)">Title:</div>
    <input type="text" id="mTitle" value="Confirm Action" oninput="render()" style="width:100%;max-width:400px;padding:8px;margin-bottom:8px;background:var(--glass);border:1px solid var(--border);border-radius:8px;color:var(--text)">
    <div style="margin-bottom:8px;font-size:.85rem;color:var(--text2)">Body text:</div>
    <textarea id="mBody" oninput="render()" style="width:100%;max-width:600px;padding:8px;margin-bottom:16px;background:var(--glass);border:1px solid var(--border);border-radius:8px;color:var(--text);min-height:80px">Are you sure you want to proceed? This action cannot be undone.</textarea>
    <div class="preview-box" id="preview"></div>
    <div style="display:flex;gap:8px;margin-bottom:8px">
      <button class="gz-btn" onclick="GZ.copyText(genCode())">📋 Copy Code</button>
      <button class="gz-btn gz-btn-secondary" onclick="resetForm()">🔄 Reset</button>
    </div>
    <div class="code-box"><pre id="codeOut"></pre></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>

</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'CSS Modal Generator',
    toolDesc: 'Design CSS modal dialogs with live preview. Customize overlay, animation and close button — copy production-ready code.',
    step1: 'Edit the modal title and body text',
    step2: 'Customize overlay opacity, colors, width and animation',
    step3: 'Preview the modal in real-time',
    step4: 'Copy the generated HTML and CSS code',
  },
  zh: {
    toolTitle: 'CSS 弹窗/模态框生成器',
    toolDesc: '可视化设计 CSS 模态弹窗 — 自定义遮罩、动画和关闭按钮，复制生产可用代码。',
    step1: '编辑弹窗标题和正文',
    step2: '自定义遮罩透明度、颜色、宽度和动画',
    step3: '实时预览弹窗效果',
    step4: '复制生成的 HTML 和 CSS 代码',
  }
});

const { $, copyText, t } = GZ;

const animKeyframes = {
  fade: '@keyframes modalIn { from { opacity: 0 } to { opacity: 1 } }',
  scale: '@keyframes modalIn { from { opacity:0; transform: scale(0.85) } to { opacity:1; transform: scale(1) } }',
  slide: '@keyframes modalIn { from { opacity:0; transform: translateY(-40px) } to { opacity:1; transform: translateY(0) } }',
  bounce: '@keyframes modalIn { 0%{opacity:0;transform:scale(0.5)} 60%{opacity:1;transform:scale(1.05)} 100%{transform:scale(1)} }',
};

function render() {
  const overlay = (+$('#overlay').value / 100).toFixed(2);
  const modBg = $('#modBg').value;
  const modTxt = $('#modTxt').value;
  const accent = $('#accent').value;
  const rad = $('#radius').value + 'px';
  const width = $('#width').value;
  const anim = $('#anim').value;
  const title = $('#mTitle').value || 'Title';
  const body = $('#mBody').value || 'Body';

  $('#preview').innerHTML = `
    <div class="modal-overlay" style="background:rgba(0,0,0,${overlay})">
      <div class="modal-box" style="background:${modBg};color:${modTxt};border-radius:${rad};max-width:${width};animation:modalIn .3s ease">
        <button class="modal-close" style="color:${modTxt}66">&times;</button>
        <div class="modal-title" style="color:${modTxt}">${title}</div>
        <div class="modal-body" style="color:${modTxt}99">${body}</div>
        <div class="modal-actions">
          <button class="modal-btn" style="background:${accent};color:#fff;border-radius:8px">Confirm</button>
          <button class="modal-btn" style="background:transparent;color:${modTxt};border:1px solid ${modTxt}55;border-radius:8px">Cancel</button>
        </div>
      </div>
    </div>`;

  $('#codeOut').textContent = genCode();
}

function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function genCode() {
  const overlay = (+$('#overlay').value / 100).toFixed(2);
  const modBg = $('#modBg').value;
  const modTxt = $('#modTxt').value;
  const accent = $('#accent').value;
  const rad = $('#radius').value + 'px';
  const width = $('#width').value;
  const anim = $('#anim').value;
  const title = $('#mTitle').value || 'Title';
  const body = $('#mBody').value || 'Body';

  return `<!-- HTML -->
<button onclick="document.getElementById('my-modal').showModal()" style="padding:10px 20px;background:${accent};color:#fff;border:none;border-radius:8px;cursor:pointer">Open Modal</button>

<dialog id="my-modal" class="modal">
  <div class="modal-content">
    <button class="modal-close" onclick="document.getElementById('my-modal').close()">&times;</button>
    <h2 class="modal-title">${esc(title)}</h2>
    <p class="modal-body">${esc(body)}</p>
    <div class="modal-actions">
      <button class="modal-btn modal-btn-primary">Confirm</button>
      <button class="modal-btn modal-btn-secondary">Cancel</button>
    </div>
  </div>
</dialog>

/* CSS */
${animKeyframes[anim]}
.modal {
  border: none;
  padding: 0;
  background: transparent;
  max-width: ${width};
  width: 90%;
}
.modal::backdrop {
  background: rgba(0, 0, 0, ${overlay});
}
.modal-content {
  background: ${modBg};
  color: ${modTxt};
  border-radius: ${rad};
  padding: 32px;
  position: relative;
  animation: modalIn 0.3s ease;
}
.modal-close {
  position: absolute;
  top: 12px; right: 14px;
  background: none; border: none;
  color: ${modTxt};
  opacity: 0.5;
  font-size: 22px; cursor: pointer; line-height: 1;
}
.modal-close:hover { opacity: 1; }
.modal-title { font-size: 1.3rem; font-weight: 700; margin: 0 0 12px; }
.modal-body { line-height: 1.6; opacity: 0.85; margin: 0; }
.modal-actions { display: flex; gap: 8px; margin-top: 20px; }
.modal-btn { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; }
.modal-btn-primary { background: ${accent}; color: #fff; }
.modal-btn-secondary { background: transparent; color: ${modTxt}; border: 1px solid ${modTxt}55; }`;
}

function resetForm() {
  $('#mTitle').value = 'Confirm Action';
  $('#mBody').value = 'Are you sure you want to proceed? This action cannot be undone.';
  render();
}

render();

GZ.renderToolPage({
  category: 'css',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🗂️', href:'/css-tools/tabs.html', name:'Tabs'},
    {icon:'🎚️', href:'/css-tools/accordion.html', name:'Accordion'},
    {icon:'🔘', href:'/css-tools/button.html', name:'Button'},
    {icon:'🔲', href:'/css-tools/shadow.html', name:'Box Shadow'},
  ]
});
</script>
