<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is a mesh gradient?", "acceptedAnswer": {"@type": "Answer", "text": "A mesh gradient is a smooth blend of multiple colors positioned at different points across a surface. Unlike a linear gradient that goes in one direction, a mesh gradient spreads colors radially from multiple points, creating organic, flowing backgrounds popular in modern UI design."}}, {"@type": "Question", "name": "How do I create a mesh gradient in CSS?", "acceptedAnswer": {"@type": "Answer", "text": "CSS does not natively support mesh gradients yet, but you can simulate them using multiple radial-gradient layers combined with background-blend-mode or by stacking semi-transparent radial gradients. This generator produces ready-to-paste CSS code that works in all modern browsers."}}, {"@type": "Question", "name": "Can I download the mesh gradient as an image?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. This tool renders the mesh gradient to a canvas and lets you download it as a high-resolution PNG file, suitable for use as a wallpaper, social media background, or design asset."}}, {"@type": "Question", "name": "Is this mesh gradient generator free?", "acceptedAnswer": {"@type": "Answer", "text": "Yes, this mesh gradient generator is 100% free, requires no signup, and runs entirely in your browser. No data is uploaded to any server."}}]}</script>

<script>
GZI18n.register({
  en: {
    toolTitle: 'Mesh Gradient Generator',
    toolDesc: 'Create stunning multi-color mesh gradients for backgrounds and UI design. Export as CSS or PNG.',
    addStop: '+ Add color',
    downloadPNG: 'Download PNG',
    randomize: 'Randomize',
    cssLabel: 'CSS code',
    copy: 'Copy CSS',
    step1: 'Choose a preset or randomize to start',
    step2: 'Adjust each color stop and its position',
    step3: 'Add or remove color stops as needed',
    step4: 'Copy the CSS code or download as PNG',
  },
  zh: {
    toolTitle: 'Mesh 渐变生成器',
    toolDesc: '创建精美的多色 Mesh 渐变，用于背景和 UI 设计。可导出 CSS 或 PNG。',
    addStop: '+ 添加颜色',
    downloadPNG: '下载 PNG',
    randomize: '随机生成',
    cssLabel: 'CSS 代码',
    copy: '复制 CSS',
    step1: '选择预设或点击随机生成开始',
    step2: '调整每个颜色色标及其位置',
    step3: '根据需要添加或删除色标',
    step4: '复制 CSS 代码或下载为 PNG',
  }
});

const { $, copyText, t } = GZ;

let stops = [
  {color:'#667eea', x:20, y:20},
  {color:'#764ba2', x:80, y:30},
  {color:'#f093fb', x:30, y:80},
  {color:'#4facfe', x:70, y:70},
];

const presets = [
  ['#667eea','#764ba2','#f093fb','#4facfe'],
  ['#fa709a','#fee140','#a8edea','#fed6e3'],
  ['#30cfd0','#330867','#5b247a','#1b1b2f'],
  ['#ff9a9e','#fecfef','#a18cd1','#fbc2eb'],
  ['#0ba360','#3cba92','#30dd60,#2a9d8f'],
  ['#ee9ca7','#ffdde1','#ff758c','#a8edea'],
  ['#21d4fd','#2152ff','#b721ff','#21d4fd'],
  ['#f6d365','#fda085','#fbc2eb','#a6c1ee'],
];

function hexToRgba(hex, a) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

function render() {
  // CSS gradient
  const layers = stops.map(s =>
    `radial-gradient(at ${s.x}% ${s.y}%, ${hexToRgba(s.color, 1)} 0px, transparent 50%)`
  );
  const bg = `${layers.join(', ')}, ${stops[0].color}`;
  $('#mesh-preview').style.background = bg;
  $('#css-output').textContent = `background: ${bg};`;

  // Stops UI
  $('#stops').innerHTML = stops.map((s,i) => `
    <div class="mesh-stop">
      <input type="color" value="${s.color}" onchange="updateStop(${i},'color',this.value)">
      <input type="range" min="0" max="100" value="${s.x}" oninput="updateStop(${i},'x',+this.value)" title="X">
      <input type="range" min="0" max="100" value="${s.y}" oninput="updateStop(${i},'y',+this.value)" title="Y">
      ${stops.length > 2 ? `<span class="remove" onclick="removeStop(${i})">✕</span>` : ''}
    </div>
  `).join('');
}

window.updateStop = function(i, key, val) { stops[i][key] = val; render(); };
window.removeStop = function(i) { stops.splice(i,1); render(); };
window.addStop = function() {
  const colors = ['#ff6b6b','#4ecdc4','#ffe66d','#95e1d3','#c7ceea','#f8b500'];
  stops.push({color: colors[Math.floor(Math.random()*colors.length)], x: Math.floor(Math.random()*100), y: Math.floor(Math.random()*100)});
  render();
};
window.randomize = function() {
  stops = stops.map(() => ({
    color: '#' + Math.floor(Math.random()*16777215).toString(16).padStart(6,'0'),
    x: Math.floor(Math.random()*100),
    y: Math.floor(Math.random()*100),
  }));
  render();
};
window.applyPreset = function(idx) {
  const p = presets[idx];
  stops = p.map((c,i) => ({color:c, x:[20,80,30,70][i]||50, y:[20,30,80,70][i]||50}));
  render();
};
window.downloadPNG = function() {
  const canvas = document.createElement('canvas');
  canvas.width = 1200; canvas.height = 800;
  const ctx = canvas.getContext('2d');
  const baseColor = stops[0].color;
  ctx.fillStyle = baseColor;
  ctx.fillRect(0,0,1200,800);
  stops.forEach(s => {
    const cx = s.x/100*1200, cy = s.y/100*800;
    const grad = ctx.createRadialGradient(cx,cy,0,cx,cy,600);
    grad.addColorStop(0, hexToRgba(s.color, 1));
    grad.addColorStop(1, hexToRgba(s.color, 0));
    ctx.fillStyle = grad;
    ctx.fillRect(0,0,1200,800);
  });
  const link = document.createElement('a');
  link.download = 'mesh-gradient.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
};

$('#presets').innerHTML = presets.map((p,i) => {
  const bg = `radial-gradient(at 20% 20%, ${p[0]}, transparent 50%), radial-gradient(at 80% 30%, ${p[1]}, transparent 50%), radial-gradient(at 30% 80%, ${p[2]}, transparent 50%), ${p[0]}`;
  return `<div class="gz-preset" style="background:${bg}" onclick="applyPreset(${i})" title="Preset ${i+1}"></div>`;
}).join('');

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="addStop()">${t('addStop')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="randomize()">${t('randomize')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="downloadPNG()">${t('downloadPNG')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="copyText($('#css-output').textContent)">${t('copy')}</button>
`;

render();

GZ.renderToolPage({
  category: 'css',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🌈', href:'/css/aurora-gradient.html', name:'Aurora Gradient'},
    {icon:'🎨', href:'/css/gradient-text.html', name:'Gradient Text'},
    {icon:'✨', href:'/css/glassmorphism.html', name:'Glassmorphism'},
    {icon:'🎨', href:'/color/palette.html', name:'Palette Generator'},
  ]
});
</script>
