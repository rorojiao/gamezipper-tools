<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"What SQL input formats are supported?","acceptedAnswer":{"@type":"Answer","text":"The tool supports two modes: (1) Tab or pipe-separated query results as you'd copy from a SQL client (with a header row and a separator line), and (2) CREATE TABLE statements where column names and types are extracted."}},{"@type":"Question","name":"How does the query result mode work?","acceptedAnswer":{"@type":"Answer","text":"Paste the output you copied from your SQL client — the first line is treated as the header, any separator line (--- or +---+) is removed, and each data row becomes a Markdown table row. Both tab-separated and pipe-separated output work."}},{"@type":"Question","name":"Can I convert a CREATE TABLE statement?","acceptedAnswer":{"@type":"Answer","text":"Yes. Switch to CREATE TABLE mode and paste your DDL. The tool extracts every column name and type, producing a Markdown table with Column and Type columns."}},{"@type":"Question","name":"Is my SQL data sent anywhere?","acceptedAnswer":{"@type":"Answer","text":"No. All conversion happens entirely in your browser. Your SQL data never leaves your device."}}]}</script>

<script>
GZI18n.register({
  en: {
    toolTitle: 'SQL to Markdown Table Converter',
    toolDesc: 'Convert SQL SELECT query results or CREATE TABLE statements to clean Markdown tables. Supports tab and pipe-separated output from any SQL client.',
    lblIn: 'Input SQL / Query Result',
    lblOut: 'Markdown Table',
    convert: 'Convert',
    modeResult: 'Query Result',
    modeCreate: 'CREATE TABLE',
    colName: 'Column',
    colType: 'Type',
    rowsConverted: 'rows converted',
    step1: 'Paste your SQL query result or CREATE TABLE statement',
    step2: 'Pick the right mode (Query Result or CREATE TABLE)',
    step3: 'Click Convert and copy the Markdown table',
  },
  zh: {
    toolTitle: 'SQL 转 Markdown 表格转换器',
    toolDesc: '将 SQL SELECT 查询结果或 CREATE TABLE 语句转换为干净的 Markdown 表格。支持 SQL 客户端的制表符和竖线分隔输出。',
    lblIn: '输入 SQL / 查询结果',
    lblOut: 'Markdown 表格',
    convert: '转换',
    modeResult: '查询结果',
    modeCreate: 'CREATE TABLE',
    colName: '列名',
    colType: '类型',
    rowsConverted: '行已转换',
    step1: '粘贴 SQL 查询结果或 CREATE TABLE 语句',
    step2: '选择正确的模式（查询结果或 CREATE TABLE）',
    step3: '点击转换并复制 Markdown 表格',
  }
});

const { $, copyText, t } = GZ;
let mode = 'result';

function escapeMd(s) {
  return String(s).replace(/\|/g, '\\|').replace(/\n/g, ' ').trim();
}

function convertResult(text) {
  const lines = text.split('\n').map(l => l.replace(/\r$/, '')).filter(l => l.trim());
  if (lines.length === 0) return '';
  // Detect delimiter: pipe if lines look like |...|, else tab
  const hasPipes = lines.some(l => l.includes('|'));
  const rows = lines.map(line => {
    if (hasPipes) {
      // Trim leading/trailing pipes, split by |, unescape
      let inner = line.trim();
      inner = inner.replace(/^\+[-+]+\+\s*$/, ''); // remove +---+ separator
      if (/^\|/.test(inner)) inner = inner.replace(/^\|/, '').replace(/\|$/, '');
      return inner.split('|').map(c => c.trim());
    }
    return line.split('\t').map(c => c.trim());
  }).filter(r => r.length > 0 && !(r.length === 1 && /^[-+]+$/.test(r[0])));

  // Remove separator rows (all dashes)
  const filtered = rows.filter(r => !(r.length > 0 && r.every(c => /^[-=:*\s]*$/.test(c) && c.length > 0)));
  if (filtered.length === 0) return '';
  const header = filtered[0];
  const body = filtered.slice(1);
  const colCount = header.length;
  let md = '';
  md += '| ' + header.map(escapeMd).join(' | ') + ' |\n';
  md += '| ' + header.map(() => '---').join(' | ') + ' |\n';
  body.forEach(row => {
    // Pad row to colCount
    while (row.length < colCount) row.push('');
    md += '| ' + row.slice(0, colCount).map(escapeMd).join(' | ') + ' |\n';
  });
  return { md, count: body.length };
}

function convertCreateTable(text) {
  const cols = [];
  // Match: column_name TYPE[(...)] ...
  const lines = text.split('\n');
  let inTable = false;
  for (let line of lines) {
    line = line.trim().replace(/,$/, '');
    // CREATE TABLE
    if (/CREATE\s+(TEMPORARY\s+|TEMP\s+)?TABLE/i.test(line)) { inTable = true; continue; }
    if (/^\)/.test(line) || /;/.test(line)) { inTable = false; continue; }
    if (!inTable) continue;
    // Skip constraint lines
    if (/^(PRIMARY\s+KEY|FOREIGN\s+KEY|CONSTRAINT|UNIQUE|CHECK|KEY|INDEX)/i.test(line)) continue;
    // Extract column name and type
    const m = line.match(/^(`[^`]+`|\[[^\]]+\]|"[^"]+"|\w+)\s+([A-Za-z][\w()]*(?:\s+\w+)*)/);
    if (m) {
      let name = m[1].replace(/[`"\[\]]/g, '');
      let type = m[2].trim();
      cols.push([name, type]);
    }
  }
  if (cols.length === 0) return '';
  let md = '';
  md += '| ' + t('colName') + ' | ' + t('colType') + ' |\n';
  md += '| --- | --- |\n';
  cols.forEach(([name, type]) => {
    md += '| ' + escapeMd(name) + ' | ' + escapeMd(type) + ' |\n';
  });
  return { md, count: cols.length };
}

function doConvert() {
  const inp = $('#input').value.trim();
  if (!inp) return;
  const result = mode === 'result' ? convertResult(inp) : convertCreateTable(inp);
  if (!result) {
    $('#output').value = '';
    $('#status').innerHTML = `<span style="color:var(--gz-accent)">⚠ ${mode === 'result' ? 'No rows detected. Make sure your input has a header line followed by data.' : 'No columns found in CREATE TABLE.'}</span>`;
    return;
  }
  $('#output').value = result.md.trimEnd();
  $('#status').innerHTML = `<span style="color:var(--gz-success)">✓ ${result.count} ${t('rowsConverted')}</span>`;
}

function setMode(m) {
  mode = m;
  document.querySelectorAll('.gz-mode-btn').forEach(b => b.classList.toggle('active', b.dataset.mode === m));
  doConvert();
}

function loadExample() {
  if (mode === 'result') {
    $('#input').value = `id\tname\temail\ttotal
1\tAlice\talice@example.com\t250.00
2\tBob\tbob@example.com\t89.50
3\tCarol\tcarol@example.com\t1240.00`;
  } else {
    $('#input').value = `CREATE TABLE users (
    id          SERIAL PRIMARY KEY,
    username    VARCHAR(50) NOT NULL UNIQUE,
    email       VARCHAR(255) NOT NULL,
    created_at  TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
    is_active   BOOLEAN DEFAULT true
);`;
  }
  doConvert();
}

function doClear() { $('#input').value=''; $('#output').value=''; $('#status').innerHTML=''; }

$('#input').addEventListener('input', doConvert);

$('#toolbar').innerHTML = `
  <button class="gz-btn gz-mode-btn active" data-mode="result" onclick="setMode('result')">${t('modeResult')}</button>
  <button class="gz-btn gz-mode-btn gz-btn-secondary" data-mode="create" onclick="setMode('create')">${t('modeCreate')}</button>
  <button class="gz-btn" onclick="doConvert()">${t('convert')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn" onclick="copyText($('#output').value)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

});
</script>
