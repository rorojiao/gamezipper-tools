<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>

  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div style="text-align:center">
      <div class="canvas-wrap"><canvas id="canvas" width="800" height="600"></canvas></div>
    </div>
    <div class="controls" id="controls">
      <label class="full"><span data-i18n="uploadLabel">Upload Image</span>
        <input type="file" id="fileInput" accept="image/*">
      </label>
      <label class="full"><span data-i18n="topText">Top Caption</span>
        <textarea id="topText" placeholder="Enter top caption..."></textarea>
      </label>
      <label class="full"><span data-i18n="bottomText">Bottom Caption</span>
        <textarea id="bottomText" placeholder="Enter bottom caption..."></textarea>
      </label>
      <label><span data-i18n="fontSize">Font Size</span>
        <input type="range" id="fontSize" min="12" max="120" value="48">
        <span id="fontSizeVal">48px</span>
      </label>
      <label><span data-i18n="fontFamily">Font</span>
        <select id="fontFamily">
          <option value="Impact">Impact</option>
          <option value="Arial Black">Arial Black</option>
          <option value="Arial">Arial</option>
          <option value="Georgia">Georgia</option>
          <option value="Verdana">Verdana</option>
          <option value="Courier New">Courier New</option>
          <option value="Times New Roman">Times New Roman</option>
          <option value="Comic Sans MS">Comic Sans MS</option>
        </select>
      </label>
      <label><span data-i18n="textColor">Text Color</span>
        <input type="color" id="textColor" value="#ffffff">
      </label>
      <label><span data-i18n="strokeColor">Outline Color</span>
        <input type="color" id="strokeColor" value="#000000">
      </label>
      <label><span data-i18n="strokeWidth">Outline Width</span>
        <input type="range" id="strokeWidth" min="0" max="10" value="3">
        <span id="strokeWidthVal">3px</span>
      </label>
      <label><span data-i18n="shadowBlur">Shadow Blur</span>
        <input type="range" id="shadowBlur" min="0" max="20" value="0">
        <span id="shadowBlurVal">0px</span>
      </label>
      <label><span data-i18n="textAlign">Text Align</span>
        <select id="textAlign">
          <option value="center">Center</option>
          <option value="left">Left</option>
          <option value="right">Right</option>
        </select>
      </label>
      <label><span data-i18n="topOffset">Top Offset</span>
        <input type="range" id="topOffset" min="0" max="50" value="8">
        <span id="topOffsetVal">8%</span>
      </label>
    </div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>

<script>
GZI18n.register({
  en: {
    toolTitle: 'Image Caption Generator',
    toolDesc: 'Add captions, watermarks and text overlays to any image. Customize font, color, outline, shadow and position — download as PNG.',
    uploadLabel: 'Upload Image',
    topText: 'Top Caption',
    bottomText: 'Bottom Caption',
    fontSize: 'Font Size',
    fontFamily: 'Font',
    textColor: 'Text Color',
    strokeColor: 'Outline Color',
    strokeWidth: 'Outline Width',
    shadowBlur: 'Shadow Blur',
    textAlign: 'Text Align',
    topOffset: 'Top Offset',
    download: 'Download PNG',
    reset: 'Reset',
    step1: 'Upload or drag an image into the tool',
    step2: 'Type your top and/or bottom caption text',
    step3: 'Adjust font size, color, outline and alignment',
    step4: 'Click Download PNG to save the result',
  },
  zh: {
    toolTitle: '图片文字添加器',
    toolDesc: '为图片添加标题、水印和文字叠加。自定义字体、颜色、描边、阴影和位置 — 下载为 PNG。',
    uploadLabel: '上传图片',
    topText: '顶部标题',
    bottomText: '底部标题',
    fontSize: '字体大小',
    fontFamily: '字体',
    textColor: '文字颜色',
    strokeColor: '描边颜色',
    strokeWidth: '描边宽度',
    shadowBlur: '阴影模糊',
    textAlign: '文字对齐',
    topOffset: '顶部偏移',
    download: '下载 PNG',
    reset: '重置',
    step1: '上传或拖拽图片到工具中',
    step2: '输入顶部和/或底部标题文字',
    step3: '调整字体大小、颜色、描边和对齐方式',
    step4: '点击「下载 PNG」保存结果',
  }
});

const { $, t } = GZ;
const canvas = $('#canvas');
const ctx = canvas.getContext('2d');
let img = null;

function loadDefaultImage() {
  const c = canvas;
  const g = c.getContext('2d');
  const grad = g.createLinearGradient(0, 0, c.width, c.height);
  grad.addColorStop(0, '#2d2d44');
  grad.addColorStop(1, '#1a1a2e');
  g.fillStyle = grad;
  g.fillRect(0, 0, c.width, c.height);
  g.fillStyle = '#555';
  g.font = '24px Arial';
  g.textAlign = 'center';
  g.fillText('Upload an image to get started', c.width / 2, c.height / 2);
}

function render() {
  if (!img) return;
  const c = canvas;
  c.width = img.naturalWidth;
  c.height = img.naturalHeight;
  ctx.drawImage(img, 0, 0);

  const top = $('#topText').value;
  const bottom = $('#bottomText').value;
  const fs = +$('#fontSize').value;
  const ff = $('#fontFamily').value;
  const tc = $('#textColor').value;
  const sc = $('#strokeColor').value;
  const sw = +$('#strokeWidth').value;
  const sb = +$('#shadowBlur').value;
  const ta = $('#textAlign').value;
  const to = +$('#topOffset').value;

  const font = `bold ${fs}px "${ff}"`;
  ctx.font = font;
  ctx.textAlign = ta;
  ctx.fillStyle = tc;
  ctx.strokeStyle = sc;
  ctx.lineWidth = sw;
  ctx.lineJoin = 'round';
  ctx.shadowColor = 'rgba(0,0,0,0.7)';
  ctx.shadowBlur = sb;
  ctx.shadowOffsetX = 2;
  ctx.shadowOffsetY = 2;

  const maxW = c.width * 0.9;
  let x = c.width / 2;
  if (ta === 'left') x = c.width * 0.05;
  if (ta === 'right') x = c.width * 0.95;

  if (top) {
    const lines = wrapText(ctx, top, maxW);
    const lh = fs * 1.2;
    const startY = c.height * (to / 100) + fs;
    lines.forEach((line, i) => {
      const y = startY + i * lh;
      if (sw > 0) ctx.strokeText(line, x, y);
      ctx.fillText(line, x, y);
    });
  }

  if (bottom) {
    const lines = wrapText(ctx, bottom, maxW);
    const lh = fs * 1.2;
    let startY = c.height - 20 - (lines.length - 1) * lh;
    lines.forEach((line, i) => {
      const y = startY + i * lh;
      if (sw > 0) ctx.strokeText(line, x, y);
      ctx.fillText(line, x, y);
    });
  }

  ctx.shadowBlur = 0;
  ctx.shadowOffsetX = 0;
  ctx.shadowOffsetY = 0;
}

function wrapText(c, text, maxW) {
  const words = text.split(' ');
  const lines = [];
  let line = '';
  for (const w of words) {
    const test = line ? line + ' ' + w : w;
    if (c.measureText(test).width > maxW && line) {
      lines.push(line);
      line = w;
    } else {
      line = test;
    }
  }
  if (line) lines.push(line);
  return lines.length ? lines : [''];
}

$('#fileInput').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    img = new Image();
    img.onload = render;
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
});

['fontSize', 'strokeWidth', 'shadowBlur', 'topOffset'].forEach(id => {
  const el = $('#' + id);
  el.addEventListener('input', () => {
    const val = el.value;
    const suffix = id === 'topOffset' ? '%' : 'px';
    $('#' + id + 'Val').textContent = val + suffix;
    render();
  });
});

['topText', 'bottomText', 'fontFamily', 'textColor', 'strokeColor', 'textAlign'].forEach(id => {
  $('#' + id).addEventListener('input', render);
});

loadDefaultImage();

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="$('canvas').toBlob(b=>{const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='captioned-image.png';a.click()})">${t('download')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#fileInput').click()">${t('uploadLabel')}</button>`;

GZ.renderToolPage({
  category: 'image',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'😂', href:'/image/meme-generator.html', name:'Meme Generator'},
    {icon:'💦', href:'/image/watermark.html', name:'Watermark'},
    {icon:'🖼️', href:'/image/placeholder.html', name:'Placeholder'},
    {icon:'🖼️', href:'/image/border.html', name:'Border & Frame'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
