  block:   { name: 'Block (3-row chunky)', data: F_BLOCK, rows: 3 },
  banner:  { name: 'Banner (filled #)',   data: F_SHADOW, rows: 3 },
  standard:{ name: 'Standard (5-row)',    data: F_STANDARD, rows: 5 },
  slim:    { name: 'Slim (narrow)',       data: F_SLIM, rows: 3 },
  mini:    { name: 'Mini (tiny)',         data: F_MINI, rows: 3 },
};

let letterGap = 1;
let align = 'left';

function render() {
  const text = ($('#inp-text').value || '').toUpperCase();
  if (!text.trim()) { $('#output').textContent = ''; $('#status').textContent=''; return; }
  const fontKey = $('#sel-font').value;
  const font = FONTS[fontKey].data;
  const rows = FONTS[fontKey].rows;
  const gap = ' '.repeat(letterGap);
  // Build each row
  const outRows = new Array(rows).fill('');
  for (const ch of text) {
    const glyph = font[ch];
    if (!glyph) continue; // skip unsupported chars
    for (let r = 0; r < rows; r++) {
      outRows[r] += (glyph[r] || '') + gap;
    }
  }
  // Trim trailing gap on each row
  for (let r = 0; r < rows; r++) outRows[r] = outRows[r].slice(0, Math.max(0, outRows[r].length - gap.length));
  // Alignment padding
  const maxLen = Math.max(...outRows.map(r => r.length));
  if (align === 'center') {
    for (let r = 0; r < rows; r++) {
      const pad = Math.floor((maxLen - outRows[r].length) / 2);
      outRows[r] = ' '.repeat(pad) + outRows[r];
    }
  } else if (align === 'right') {
    for (let r = 0; r < rows; r++) {
      const pad = maxLen - outRows[r].length;
      outRows[r] = ' '.repeat(pad) + outRows[r];
    }
  }
  const result = outRows.join('\n');
  $('#output').textContent = result;
  $('#status').innerHTML = `<div style="font-size:.82em;color:var(--text2);margin-top:8px">📏 ${maxLen} chars wide × ${rows} rows tall · ${result.split('\n').length} lines</div>`;
}

$('#num-gap').addEventListener('input', e => { letterGap = Math.max(0, Math.min(5, +e.target.value || 0)); render(); });

render();
