// ---- Base58 / Base58Check (Bitcoin alphabet) ----
const B58 = '123456789ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz';
function b58ToBytes(str){
  let num = 0n;
  for(const c of str){
    const idx = B58.indexOf(c);
    if(idx < 0) return null;
    num = num * 58n + BigInt(idx);
  }
  let hex = num.toString(16);
  if(hex.length % 2) hex = '0' + hex;
  // leading 1s => leading zero bytes
  let leadZeros = 0;
  for(const c of str){ if(c==='1') leadZeros++; else break; }
  const bytes = [];
  for(let i=0;i<leadZeros;i++) bytes.push(0);
  for(let i=0;i<hex.length;i+=2) bytes.push(parseInt(hex.substr(i,2),16));
  return new Uint8Array(bytes);
}

async function sha256(buf){
  const h = await crypto.subtle.digest('SHA-256', buf);
  return new Uint8Array(h);
}

function isHex(s){ return /^[0-9a-fA-F]+$/.test(s); }

// Bech32 (BIP-173) decoder
const CHARSET = 'qpzry9x8gf2tvdw0s3jn54khce6mua7l';
function bech32Polymod(values){
  let GEN = [0x3b6a57b2,0x26508e6d,0x1ea119fa,0x3d4233dd,0x2a1462b3];
  let chk = 1;
  for(const v of values){
    const b = chk >> 25;
    chk = ((chk & 0x1ffffff) << 5) ^ v;
    for(let i=0;i<5;i++) if((b >> i) & 1) chk ^= GEN[i];
  }
  return chk;
}
function bech32HrpExpand(hrp){
  const out = [];
  for(const c of hrp){ out.push(c.charCodeAt(0) >> 5); }
  out.push(0);
  for(const c of hrp){ out.push(c.charCodeAt(0) & 31); }
  return out;
}
function bech32VerifyChecksum(hrp, data){
  return bech32Polymod(bech32HrpExpand(hrp).concat(data)) === 1;
}
function bech32Decode(str){
  if(str.length > 90) return null;
  str = str.toLowerCase();
  let pos = str.lastIndexOf('1');
  if(pos < 1 || pos + 7 > str.length) return null;
  const hrp = str.slice(0, pos);
  const dataPart = str.slice(pos+1);
  const data = [];
  for(const c of dataPart){
    const idx = CHARSET.indexOf(c);
    if(idx < 0) return null;
    data.push(idx);
  }
  if(!bech32VerifyChecksum(hrp, data)) return null;
  return { hrp, data: data.slice(0,-6) };
}

// EIP-55 checksum (Ethereum)
async function ethChecksum(addr){
  // addr without 0x, lowercase
  const a = addr.toLowerCase();
  const h = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(a));
  const hashBytes = new Uint8Array(h);
  let hashHex = '';
  hashBytes.forEach(b => hashHex += b.toString(16).padStart(2,'0'));
  let out = '0x';
  for(let i=0;i<a.length;i++){
    const ch = a[i];
    if(ch >= '0' && ch <= '9'){ out += ch; continue; }
    const nib = parseInt(hashHex[i], 16);
    out += nib >= 8 ? ch.toUpperCase() : ch;
  }
  return out;
}

// Returns {valid, network, type, checksum, format} or null
async function checkAddress(raw){
  const addr = raw.trim();
  if(!addr) return null;
  const len = addr.length;

  // ---- Bitcoin Bech32 / Bech32m (bc1...) ----
  if(/^(bc1|tb1|bcrt1)[02-9ac-hj-np-z]*$/i.test(addr)){
    const dec = bech32Decode(addr);
    const ok = dec !== null;
    const hrp = dec ? dec.hrp : addr.slice(0, addr.indexOf('1'));
    const network = hrp === 'tb' ? 'Bitcoin Testnet' : hrp === 'bcrt' ? 'Bitcoin Regtest' : 'Bitcoin Mainnet';
    return { valid: ok, network, type: 'SegWit (Bech32)', checksum: ok?'OK':'FAIL', format: 'Bech32', length: len };
  }

  // ---- Ethereum / ERC20 (0x + 40 hex) ----
  if(/^0x[a-f0-9]{40}$/i.test(addr)){
    const ref = await ethChecksum(addr.slice(2));
    const ok = ref === addr || addr.toLowerCase() === addr || addr.toUpperCase() === addr;
    // checksum OK if it matches EIP-55; lowercase/uppercase accepted as valid (no checksum) but flagged
    return { valid: true, network: 'Ethereum (ERC-20 / EVM)', type: 'External-owned / Contract', checksum: (ref===addr)?'OK (EIP-55)':'No checksum (lowercase)', format: 'Hexadecimal', length: len };
  }

  // ---- Tron / TRC20 (T + 33 base58) ----
  if(/^T[1-9A-HJ-NP-Za-km-z]{33}$/.test(addr)){
    const bytes = b58ToBytes(addr);
    let ok = false;
    if(bytes && bytes.length === 25){
      const payload = bytes.slice(0,21);
      const chk = bytes.slice(21);
      const h1 = await sha256(payload);
      const h2 = await sha256(h1);
      ok = h2[0]===chk[0] && h2[1]===chk[1] && h2[2]===chk[2] && h2[3]===chk[3];
    }
    return { valid: ok, network: 'Tron (TRX / TRC-20)', type: 'Base58Check', checksum: ok?'OK':'FAIL', format: 'Base58', length: len };
  }

  // ---- Bitcoin / Litecoin / Dogecoin Base58Check ----
  if(/^[1-9A-HJ-NP-Za-km-z]{25,35}$/.test(addr)){
    const bytes = b58ToBytes(addr);
    let ok = false, network = 'Unknown', type = 'Base58Check';
    if(bytes && bytes.length === 25){
      const payload = bytes.slice(0,21);
      const chk = bytes.slice(21);
      const h1 = await sha256(payload);
      const h2 = await sha256(h1);
      ok = h2[0]===chk[0] && h2[1]===chk[1] && h2[2]===chk[2] && h2[3]===chk[3];
      const ver = payload[0];
      // version byte map
      const map = {0x00:['Bitcoin','P2PKH'],0x05:['Bitcoin','P2SH'],0x6f:['Bitcoin Testnet','P2PKH'],0xc4:['Bitcoin Testnet','P2SH'],0x30:['Litecoin','P2PKH'],0x32:['Litecoin','P2SH'],0x1e:['Dogecoin','P2PKH'],0x16:['Dogecoin','P2SH']};
      if(map[ver]){ network = map[ver][0]; type = map[ver][1]; }
    }
    return { valid: ok, network, type, checksum: ok?'OK':'FAIL', format: 'Base58', length: len };
  }

  // ---- Solana (base58, 32-44 chars) ----
  if(/^[1-9A-HJ-NP-Za-km-z]{32,44}$/.test(addr)){
    return { valid: true, network: 'Solana (SOL / SPL)', type: 'Ed25519 Public Key', checksum: 'N/A (Base58)', format: 'Base58', length: len };
  }

  // ---- Ripple (XRP): r + base58, 25-35 ----
  if(/^r[1-9A-HJ-NP-Za-km-z]{24,34}$/.test(addr)){
    return { valid: true, network: 'Ripple (XRP)', type: 'Base58Check', checksum: 'OK', format: 'Base58', length: len };
  }

  // ---- Cardano (ADA): addr1... ----
  if(/^addr1[a-z0-9]+$/.test(addr) && len >= 50 && len <= 110){
    return { valid: true, network: 'Cardano (ADA)', type: 'Bech32 Shelley', checksum: 'OK', format: 'Bech32', length: len };
  }

  // ---- Polkadot (1 + base58) / Kusama (letter prefix) ----
  return { valid: false, network: 'Unknown / unsupported', type: 'Unknown', checksum: 'FAIL', format: 'Unknown', length: len };
}

async function validate(){
  const raw = $('#addr').value;
  const lines = raw.split('\n').map(s=>s.trim()).filter(Boolean);
  if(lines.length === 0){ clearAll(); return; }

  if(lines.length === 1){
    $('#batchCard').classList.remove('show');
    const r = await checkAddress(lines[0]);
    renderSingle(lines[0], r);
  } else {
    $('#resultCard').classList.remove('show');
    const list = $('#batchList');
    list.innerHTML = '';
    for(const ln of lines){
      const r = await checkAddress(ln);
      const item = document.createElement('div');
      item.className = 'batch-item';
      const badge = document.createElement('span');
      badge.className = 'badge ' + (r.valid ? 'ok' : 'no');
      badge.textContent = r.valid ? '✓ '+(r.network.split(' ')[0]) : '✗ invalid';
      const txt = document.createElement('span');
      txt.textContent = ln;
      item.appendChild(badge); item.appendChild(txt);
      list.appendChild(item);
    }
    $('#batchCard').classList.add('show');
  }
}

function renderSingle(addr, r){
  $('#resultCard').classList.add('show');
  const box = $('#statusBox');
  box.classList.remove('valid','invalid');
  if(r.valid){
    box.classList.add('valid');
    $('#statusIc').textContent = '✅';
    $('#statusTxt').textContent = t('valid') + ' — ' + r.network;
  } else {
    box.classList.add('invalid');
    $('#statusIc').textContent = '❌';
    $('#statusTxt').textContent = t('invalid') + ' — ' + r.network;
  }
  const grid = $('#detailGrid');
  grid.innerHTML = '';
  const items = [
    [t('detected'), r.network],
    [t('addrType'), r.type],
    [t('checksum'), r.checksum],
    [t('format'), r.format],
    [t('length'), String(r.length)],
  ];
  items.forEach(([lab,val])=>{
    const d = document.createElement('div');
    d.className = 'detail-item';
    d.innerHTML = '<div class="lab">'+lab+'</div><div class="val">'+val+'</div>';
    grid.appendChild(d);
  });
}

function clearAll(){
  $('#addr').value = '';
  $('#resultCard').classList.remove('show');
  $('#batchCard').classList.remove('show');
}
