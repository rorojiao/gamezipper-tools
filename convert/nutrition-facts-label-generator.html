    totalSugars: '总糖',

    protein: '蛋白质',
    vitD: '维生素 D',

    iron: '铁',

    step1: '填写产品名称、份量和每容器份数',

    step3: '添加维生素和矿物质（维生素 D、钙、铁、钾）',
    step4: '可选填配料表，然后点击「下载 PNG」',
    dv: '每日参考值百分比*',
    notSig: '非显著来源',
    footnote: '* 每日参考值百分比基于 2,000 卡路里饮食。根据你的热量需求，每日参考值可能更高或更低。',
  }

const { $, copyText, t } = GZ;

const DV = {
  totalFat: 78, saturatedFat: 20, cholesterol: 300, sodium: 2300,
  totalCarb: 275, dietaryFiber: 28, addedSugars: 50, protein: 50,
  vitD: 20, calcium: 1300, iron: 18, potassium: 4700
};

const UNITS = { totalFat:'g', saturatedFat:'g', transFat:'g', cholesterol:'mg', sodium:'mg',
  totalCarb:'g', dietaryFiber:'g', totalSugars:'g', addedSugars:'g', protein:'g',
  vitD:'mcg', calcium:'mg', iron:'mg', potassium:'mg' };

const FIELDS = ['calories','totalFat','saturatedFat','transFat','cholesterol','sodium','totalCarb','dietaryFiber','totalSugars','addedSugars','protein','vitD','calcium','iron','potassium'];

let data = {};

function dvPct(field, val){
  if(!DV[field] || !val) return '';
  return Math.round(val/DV[field]*100)+'%';
}

function fmt(field, val){
  if(val==='' || val==null || isNaN(val)) return '';
  const u = UNITS[field]||'';
  return u ? `${val}${u}` : val;
}

function renderForm(){
  $('#form').innerHTML = `
    <div class="row"><label>${t('productName')}</label><input type="text" id="f-productName" value="${esc(data.productName)}" colspan="2"></div>
    <div class="row"><label>${t('servingSize')}</label><input type="text" id="f-servingSize" value="${esc(data.servingSize)}"></div>
    <div class="row"><label>${t('servingsPer')}</label><input type="number" step="0.1" id="f-servings" value="${esc(data.servings)}"></div>
    <hr style="border-color:rgba(255,255,255,.1)">
    ${FIELDS.map(f=>`
      <div class="row">
        <label>${t(f)}</label>
        <input type="number" step="0.01" min="0" id="f-${f}" value="${data[f]??''}" placeholder="0">
        <span style="opacity:.6;font-size:.8rem">${UNITS[f]||''}</span>
      </div>`).join('')}
    <div class="row" style="grid-template-columns:140px 1fr"><label>${t('ingredients')}</label><textarea id="f-ingredients" rows="3" style="background:var(--gz-bg,#0a0a1a);border:1px solid rgba(255,255,255,.12);color:inherit;border-radius:6px;padding:6px 8px;font-size:.85rem">${esc(data.ingredients)}</textarea></div>
  `;
  ['productName','servingSize','servings','ingredients',...FIELDS].forEach(f=>{
    const id = f==='servings'?'f-servings':`f-${f}`;
    const el = $('#'+id);
    if(el){
      el.addEventListener('input', e=>{
        const key = f==='servings'?'servings':f;
        data[key] = f==='productName'||f==='servingSize'||f==='ingredients'||f==='servings' ? e.target.value : (e.target.value===''?'':parseFloat(e.target.value));
        renderLabel();
      });
    }
  });
}

function esc(s){return String(s??'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');}

function renderLabel(){
  const cals = data.calories||0;
  const nutRows = [
    ['totalFat', fmt('totalFat',data.totalFat), dvPct('totalFat',data.totalFat), true],
    ['saturatedFat', fmt('saturatedFat',data.saturatedFat), dvPct('saturatedFat',data.saturatedFat), false, '   '],
    ['transFat', fmt('transFat',data.transFat), '', false, '   '],
    ['cholesterol', fmt('cholesterol',data.cholesterol), dvPct('cholesterol',data.cholesterol), true],
    ['sodium', fmt('sodium',data.sodium), dvPct('sodium',data.sodium), true],
    ['totalCarb', fmt('totalCarb',data.totalCarb), dvPct('totalCarb',data.totalCarb), true],
    ['dietaryFiber', fmt('dietaryFiber',data.dietaryFiber), dvPct('dietaryFiber',data.dietaryFiber), false, '   '],
    ['totalSugars', fmt('totalSugars',data.totalSugars), '', false, '   '],
    ['addedSugars', fmt('addedSugars',data.addedSugars), dvPct('addedSugars',data.addedSugars), false, '      '],
    ['protein', fmt('protein',data.protein), '', true],
  ];

  const microRows = [
    ['vitD','mcg'],['calcium','mg'],['iron','mg'],['potassium','mg']
  ];

  $('#label').innerHTML = `
    <h1>${esc(data.productName||'Nutrition Facts')}</h1>
    <div style="font-size:.8rem;font-weight:400;margin-bottom:2px">${data.servings?`${data.servings} servings per container`:'8 servings per container'}</div>
    <div style="font-size:1rem;font-weight:700">Serving size</div>
    <div style="font-size:1rem;font-weight:700;border-bottom:8px solid #000;padding-bottom:4px;margin-bottom:6px">${esc(data.servingSize||'1 cup (228g)')}</div>
    <div class="calories-row">
      <span>Calories</span>
      <span class="amt">${cals}</span>
    </div>
    <div class="dv-header">${t('dv')}</div>
    <table>
      ${nutRows.map(r=>`
        <tr class="${r[3]?'bar':''}">
          <td style="${r[4]?'padding-left:16px':''}">${r[4]||''}${t(r[0])}</td>
          <td style="text-align:right;font-weight:${r[3]?900:700}">${r[1]}</td>
          ${r[2]!==undefined?`<td style="text-align:right;padding-left:8px">${r[2]||''}</td>`:'<td></td>'}
        </tr>`).join('')}
    </table>
    <div style="border-bottom:8px solid #000;margin:6px 0"></div>
    <table>
      ${microRows.map(m=>{
        const v=data[m[0]];
        return v!==''&&v!=null&&!isNaN(v)?`<tr><td>${t(m[0])}</td><td style="text-align:right">${v} ${m[1]}</td><td style="text-align:right;padding-left:8px">${dvPct(m[0],v)}</td></tr>`:'';
      }).join('')}
    </table>
    ${data.ingredients?`<div class="ing"><strong>${t('ingredients')}:</strong> ${esc(data.ingredients)}</div>`:''}
    <div class="footnote">${t('footnote')}</div>`;
}

function downloadPNG(){
  const node = $('#label');
  // Use foreignObject SVG → canvas approach (no external libs)
  const w = node.offsetWidth, h = node.offsetHeight;
  const clone = node.cloneNode(true);
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${w*2}" height="${h*2}">
    <foreignObject width="100%" height="100%" style="transform:scale(2);transform-origin:top left">
      <div xmlns="http://www.w3.org/1999/xhtml" style="width:${w}px">${new XMLSerializer().serializeToString(clone).replace(/<div class="nf-label"[^>]*>/, s=>s.replace('id="label"','')).replace(/id="/g,'data-id="')}</div>
    </foreignObject></svg>`;
  const img = new Image();
  img.onload = ()=>{
    const c = document.createElement('canvas');
    c.width = w*2; c.height = h*2;
    const ctx = c.getContext('2d');
    ctx.fillStyle='#fff'; ctx.fillRect(0,0,c.width,c.height);
    ctx.drawImage(img,0,0);
    const a = document.createElement('a');
    a.download = (data.productName||'nutrition-label').replace(/[^a-z0-9]/gi,'-').toLowerCase()+'.png';
    a.href = c.toDataURL('image/png');
    a.click();
  };
  img.src = 'data:image/svg+xml;charset=utf-8,'+encodeURIComponent(svg);
}

function loadExample(){
  data = {
    productName:'Granola Bar', servingSize:'1 bar (40g)', servings:'12',
    calories:180, totalFat:7, saturatedFat:1.5, transFat:0,
    cholesterol:0, sodium:120, totalCarb:24, dietaryFiber:4,
    totalSugars:8, addedSugars:6, protein:4,
    vitD:1, calcium:40, iron:1.5, potassium:120,
    ingredients:'Oats, honey, almonds, dried cranberries, brown sugar, canola oil, salt.'
  };
  renderForm();
  renderLabel();
}

function clearAll(){
  data = {productName:'',servingSize:'',servings:''};
  FIELDS.forEach(f=>data[f]='');
  data.ingredients='';
  renderForm();
  renderLabel();
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="downloadPNG()">📷 ${t('download')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('loadExample')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="clearAll()">${t('clear')}</button>`;

clearAll();
loadExample();

</script>
