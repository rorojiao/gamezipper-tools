const { $, copyText, t } = GZ;

function escapeHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

const VOID_TAGS = new Set(['area','base','br','col','embed','hr','img','input','link','meta','param','source','track','wbr']);

// Tokenize a single Pug line: returns {tag, id, classes[], attrs{}, text, special?}
// special: 'doctype' produces <!DOCTYPE html>
function parseLine(raw){
  let s = raw;
  // Handle doctype directive
  if(/^doctype\b/i.test(s)){
    const rest = s.replace(/^doctype\s+/i, '').trim().toLowerCase();
    // Map common doctype shortcuts
    const map = {html:'<!DOCTYPE html>', xml:'<?xml version="1.0" encoding="utf-8" ?>', transitional:'<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.01 Transitional//EN" "http://www.w3.org/TR/html4/loose.dtd">', strict:'<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.01//EN" "http://www.w3.org/TR/html4/strict.dtd">', frameset:'<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.01 Frameset//EN" "http://www.w3.org/TR/html4/frameset.dtd">', xhtml:'<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">', xhtmltransitional:'<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">', xhtmlmobile:'<!DOCTYPE html PUBLIC "-//WAPFORUM//DTD XHTML Mobile 1.2//EN" "http://www.openmobilealliance.org/tech/DTD/xhtml-mobile12.dtd">'};
    return { tag: '__doctype__', special: map[rest] || '<!DOCTYPE html>', id: null, classes: [], attrs: {}, text: '' };
  }
  // Detect tag (or implied div)
  let tag = 'div';
  const tagM = s.match(/^([a-zA-Z][a-zA-Z0-9-]*)/);
  if(tagM){
    tag = tagM[1].toLowerCase();
    s = s.slice(tagM[0].length);
  }
  // Parse .class and #id sequence
  let id = null;
  const classes = [];
  const selRe = /^([.#])([a-zA-Z0-9_-]+)/;
  let m;
  while((m = selRe.exec(s))){
    if(m[1] === '.') classes.push(m[2]);
    else if(m[1] === '#' && !id) id = m[2];
    s = s.slice(m[0].length);
  }
  // Parse attribute list in parens: (a="b" c='d' e)
  const attrs = {};
  if(s[0] === '('){
    const end = s.indexOf(')');
    if(end !== -1){
      const attrStr = s.slice(1, end);
      s = s.slice(end+1);
      // Match key="val" key='val' key=val key
      const attrRe = /([a-zA-Z_:][-a-zA-Z0-9_:.]*)(?:\s*=\s*("[^"]*"|'[^']*'|[^\s)]+))?/g;
      let am;
      while((am = attrRe.exec(attrStr))){
        let v = am[2];
        if(v == null) attrs[am[1]] = true;
        else {
          v = v.trim();
          if((v[0] === '"' && v[v.length-1] === '"') || (v[0] === "'" && v[v.length-1] === "'")){
            v = v.slice(1,-1);
          }
          attrs[am[1]] = v;
        }
      }
    }
  }
  // Text content (everything after a space, or piped)
  let text = '';
  s = s.replace(/^\s*\|?\s*/, (x) => { text = x.includes('|') ? '' : ''; return ''; });
  // Actually: text = rest of line stripped
  // Re-grab: the slice above consumed leading space + optional pipe
  // We need the remainder:
  // Simpler: text = trimmed remainder of original after selectors/attrs
  text = s.trim();
  return { tag, id, classes, attrs, text };
}

function buildOpenTag(node, selfClose){
  let html = '<' + node.tag;
  if(node.id) html += ` id="${node.id}"`;
  if(node.classes.length) html += ` class="${node.classes.join(' ')}"`;
  for(const [k,v] of Object.entries(node.attrs)){
    if(v === true) html += ` ${k}`;
    else html += ` ${k}="${String(v).replace(/"/g,'&quot;')}"`;
  }
  if(selfClose && VOID_TAGS.has(node.tag)) html += ' />';
  else html += '>';
  return html;
}

function buildCloseTag(node){
  if(VOID_TAGS.has(node.tag)) return '';
  return `</${node.tag}>`;
}

function parsePug(src){
  // Build indentation tree
  const lines = src.split('\n').map(l => {
    // strip tabs to spaces (Pug allows tabs); count indentation in spaces (tab=2)
    const expanded = l.replace(/\t/g, '  ');
    const indent = expanded.length - expanded.trimStart().length;
    return { indent, text: expanded.trim() };
  }).filter(l => l.text.length > 0 && !l.text.startsWith('//')); // skip blank & pug comments

  // Build nodes with parent stack
  const root = { tag: '__root__', children: [] };
  const stack = [{ indent: -1, node: root }];
  for(const l of lines){
    // Handle inline pipes | text and plain text lines (start with .class or #id are tag-like)
    const node = parseLine(l.text);
    node.children = [];
    // pop until parent indent < current
    while(stack.length && stack[stack.length-1].indent >= l.indent) stack.pop();
    const parent = stack[stack.length-1].node;
    parent.children.push(node);
    stack.push({ indent: l.indent, node });
  }
  return root;
}

function renderNode(node, indent, minify, selfClose){
  if(node.tag === '__doctype__'){
    return minify ? node.special : node.special + '\n';
  }
  const pad = minify ? '' : '  '.repeat(indent);
  const open = buildOpenTag(node, selfClose);
  const close = buildCloseTag(node);
  const voidEl = VOID_TAGS.has(node.tag);

  if(node.children.length === 0){
    if(voidEl){
      return minify ? open : pad + open;
    }
    // leaf with optional text
    if(node.text){
      return minify ? `${open}${escapeHtml(node.text)}${close}` : `${pad}${open}${escapeHtml(node.text)}${close}`;
    }
    return minify ? `${open}${close}` : `${pad}${open}${close}`;
  }

  // Has children
  const childParts = node.children.map(c => renderNode(c, indent+1, minify, selfClose));
  if(minify){
    return `${open}${node.text ? escapeHtml(node.text) : ''}${childParts.join('')}${close}`;
  }
  const nl = '\n';
  const body = [pad + open];
  if(node.text) body[body.length-1] += escapeHtml(node.text);
  for(const cp of childParts) body.push(cp);
  body.push(pad + close);
  return body.join(nl);
}

function convert(){
  const src = $('#input').value;
  if(!src.trim()){ $('#output').textContent = ''; $('#status').textContent = ''; return; }
  try {
    const minify = $('#opt-minify').checked;
    const selfClose = $('#opt-void').checked;
    const root = parsePug(src);
    const parts = root.children.map(c => renderNode(c, 0, minify, selfClose));
    const out = parts.join(minify ? '' : '\n') + (minify ? '' : '\n');
    $('#output').textContent = out;
    $('#status').innerHTML = `<span style="color:var(--gz-success)">${t('status')}</span>`;
  } catch(e){
    $('#output').innerHTML = `<span style="color:var(--gz-accent)">${escapeHtml(e.message)}</span>`;
    $('#status').textContent = '';
  }
}
