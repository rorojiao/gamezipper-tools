<script>
GZI18n.register({
  en: {
    toolTitle: 'Contact Page Generator',
    toolDesc: 'Generate a complete, responsive contact page with form, map, social links and contact info. Download as HTML.',
    siteName: 'Site / Brand Name',
    tagline: 'Tagline',
    email: 'Email Address',
    phone: 'Phone Number',
    address: 'Address',
    formAction: 'Form Action URL',
    showMap: 'Show Map',
    showSocial: 'Show Social Links',
    darkMode: 'Dark Theme',
    generate: 'Generate',
    copy: 'Copy HTML',
    download: 'Download HTML',
    step1: 'Fill in your brand name, email and phone',
    step2: 'Toggle optional sections like map and social links',
    step3: 'Click Generate to create the contact page',
    step4: 'Copy or download the production-ready HTML',
  },
  zh: {
    toolTitle: '联系页面生成器',
    toolDesc: '生成完整的响应式联系页面，含表单、地图、社交链接和联系信息。下载为 HTML。',
    siteName: '网站 / 品牌名称',
    tagline: '标语',
    email: '邮箱地址',
    phone: '电话号码',
    address: '地址',
    formAction: '表单提交 URL',
    showMap: '显示地图',
    showSocial: '显示社交链接',
    darkMode: '深色主题',
    generate: '生成',
    copy: '复制 HTML',
    download: '下载 HTML',
    step1: '填写品牌名称、邮箱和电话',
    step2: '切换可选的地图和社交链接',
    step3: '点击生成创建联系页面',
    step4: '复制或下载可直接使用的 HTML',
  }
});

const { $, copyText, t } = GZ;

$('#form').innerHTML = `
  <label>${t('siteName')}<input id="siteName" value="My Website" /></label>
  <label>${t('tagline')}<input id="tagline" value="Get in touch with us" /></label>
  <label>${t('email')}<input id="email" value="hello@example.com" /></label>
  <label>${t('phone')}<input id="phone" value="+1 (555) 123-4567" /></label>
  <label style="grid-column:1/-1">${t('address')}<input id="address" value="123 Main St, New York, NY 10001" /></label>
  <label>${t('formAction')}<input id="formAction" value="https://formspree.io/f/your-id" /></label>
  <div class="chk-row" style="grid-column:1/-1">
    <label><input type="checkbox" id="showMap" checked /> ${t('showMap')}</label>
    <label><input type="checkbox" id="showSocial" checked /> ${t('showSocial')}</label>
    <label><input type="checkbox" id="darkMode" /> ${t('darkMode')}</label>
  </div>`;

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="generate()">${t('generate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doDownload()">${t('download')}</button>`;

function generate() {
  const name = $('#siteName').value || 'My Website';
  const tagline = $('#tagline').value || 'Get in touch';
  const email = $('#email').value || '';
  const phone = $('#phone').value || '';
  const address = $('#address').value || '';
  const action = $('#formAction').value || '#';
  const showMap = $('#showMap').checked;
  const showSocial = $('#showSocial').checked;
  const dark = $('#darkMode').checked;
  const bg = dark ? '#0f0f23' : '#ffffff';
  const fg = dark ? '#e8e8e8' : '#333333';
  const cardBg = dark ? '#1a1a3e' : '#f9f9f9';
  const accent = '#4ecdc4';
  const border = dark ? '#2a2a4a' : '#e0e0e0';

  let html = `<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Contact Us - ${esc(name)}</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,-apple-system,sans-serif;background:${bg};color:${fg};line-height:1.6}
.container{max-width:900px;margin:0 auto;padding:40px 20px}
h1{font-size:2em;margin-bottom:8px;color:${accent}}
.subtitle{opacity:.7;margin-bottom:30px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:30px}
@media(max-width:700px){.grid{grid-template-columns:1fr}}
.card{background:${cardBg};border:1px solid ${border};border-radius:12px;padding:24px}
label{display:block;margin-bottom:12px;font-size:.9em}
label span{display:block;margin-bottom:4px;font-weight:600}
input,textarea{width:100%;padding:10px;border:1px solid ${border};border-radius:8px;background:${dark?'#12122a':'#fff'};color:${fg};font-size:1em}
textarea{min-height:120px;resize:vertical}
button{background:${accent};color:#000;border:none;padding:12px 32px;border-radius:8px;font-size:1em;font-weight:700;cursor:pointer;margin-top:8px}
button:hover{opacity:.85}
.info-item{margin-bottom:16px}
.info-item strong{display:block;margin-bottom:4px}
a{color:${accent};text-decoration:none}
.social-links{display:flex;gap:12px;margin-top:16px}
.social-links a{padding:8px 16px;border:1px solid ${border};border-radius:8px;font-size:.85em}
</style>
</head>
<body>
<div class="container">
  <h1>Contact Us</h1>
  <p class="subtitle">${esc(tagline)}</p>
  <div class="grid">
    <div class="card">
      <form action="${esc(action)}" method="POST">
        <label><span>Name</span><input type="text" name="name" required></label>
        <label><span>Email</span><input type="email" name="email" required></label>
        <label><span>Subject</span><input type="text" name="subject"></label>
        <label><span>Message</span><textarea name="message" required></textarea></label>
        <button type="submit">Send Message</button>
      </form>
    </div>
    <div>
      <div class="card">
        <div class="info-item"><strong>Email</strong><a href="mailto:${esc(email)}">${esc(email)}</a></div>
        ${phone?`<div class="info-item"><strong>Phone</strong><a href="tel:${esc(phone)}">${esc(phone)}</a></div>`:''}
        ${address?`<div class="info-item"><strong>Address</strong>${esc(address)}</div>`:''}
        ${showSocial?`<div class="social-links"><a href="#">Twitter</a><a href="#">Facebook</a><a href="#">LinkedIn</a><a href="#">Instagram</a></div>`:''}
      </div>
      ${showMap?`<div class="card" style="margin-top:20px;padding:0;overflow:hidden;border-radius:12px"><iframe src="https://maps.google.com/maps?q=${encodeURIComponent(address)}&output=embed" width="100%" height="250" style="border:0" allowfullscreen loading="lazy"></iframe></div>`:''}
    </div>
  </div>
  <p style="text-align:center;margin-top:40px;opacity:.5;font-size:.85em">&copy; ${new Date().getFullYear()} ${esc(name)}. All rights reserved.</p>
</div>
</body>
</html>`;

  $('#output').textContent = html;
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function doDownload() {
  const html = $('#output').textContent;
  if (!html) return;
  const blob = new Blob([html], { type: 'text/html' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'contact.html';
  a.click();
}

generate();

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📧', href:'/text/email-template.html', name:'Email Template'},
    {icon:'✉️', href:'/text/email-signature.html', name:'Email Signature'},
    {icon:'🔒', href:'/text/privacy-policy-generator.html', name:'Privacy Policy'},
    {icon:'📋', href:'/text/terms-of-service-generator.html', name:'Terms of Service'},
  ]
});
</script>

</body>
