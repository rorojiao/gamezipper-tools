const { $, copyText, t } = GZ;
let masked = false;

const SCHEME_DB = {
  'mongodb': 'MongoDB', 'mongodb+srv': 'MongoDB Atlas (SRV)',
  'postgres': 'PostgreSQL', 'postgresql': 'PostgreSQL',
  'mysql': 'MySQL', 'mariadb': 'MariaDB',
  'redis': 'Redis', 'rediss': 'Redis (TLS)',
  'mssql': 'SQL Server', 'sqlserver': 'SQL Server (ADO)',
  'clickhouse': 'ClickHouse', 'cassandra': 'Cassandra',
  'amqp': 'AMQP', 'amqps': 'AMQP (TLS)',
  'jdbc': 'JDBC'
};
const DEFAULT_PORTS = {
  'mongodb': 27017, 'mongodb+srv': null,
  'postgres': 5432, 'postgresql': 5432,
  'mysql': 3306, 'mariadb': 3306,
  'redis': 6379, 'rediss': 6379,
  'mssql': 1433, 'sqlserver': 1433,
  'clickhouse': 8123, 'cassandra': 9042,
  'amqp': 5672, 'amqps': 5671
};

function escapeHtml(s){
  return String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function decode(s){ try { return decodeURIComponent(s); } catch(_) { return s; } }

function parseJdbc(uri){
  // jdbc:postgresql://host:port/db?params  OR  jdbc:oracle:thin:@host:port:sid
  const m = uri.match(/^jdbc:([^:]+):(.*)$/);
  if(!m) return null;
  const driver = m[1];
  const rest = m[2];
  // strip optional "thin:@" etc.
  const cleaned = rest.replace(/^thin:@?/, '').replace(/^@/, '');
  // If it now looks like //host:port/db, parse with synthetic scheme
  if(cleaned.startsWith('//')){
    try{
      const u = new URL('postgresql:' + cleaned);
      return {
        detected: 'JDBC (' + driver + ')',
        jdbcDriver: driver,
        scheme: 'jdbc:' + driver,
        user: decode(u.username), pass: decode(u.password),
        hosts: [{ host: u.hostname, port: u.port || DEFAULT_PORTS[driver] || '' }],
        db: decode(u.pathname).replace(/^\//, ''),
        params: Object.fromEntries(u.searchParams)
      };
    }catch(_){}
  }
  // oracle thin:@host:port:sid style
  const om = cleaned.match(/^([^:/?#]+):(\d+)(?::([^/?#]*))?/);
  if(om){
    return {
      detected: 'JDBC (' + driver + ')',
      jdbcDriver: driver,
      scheme: 'jdbc:' + driver,
      user: '', pass: '',
      hosts: [{ host: om[1], port: om[2] }],
      db: om[3] || '',
      params: {}
    };
  }
  return { detected: 'JDBC (' + driver + ')', jdbcDriver: driver, scheme: 'jdbc:' + driver, user:'', pass:'', hosts:[], db:'', params:{} };
}

function parseConn(uri){
  uri = uri.trim();
  if(!uri) return null;
  if(uri.startsWith('jdbc:')) return parseJdbc(uri);
  let u;
  try { u = new URL(uri); }
  catch(_) { return { error: true }; }

  const scheme = u.protocol.replace(/:$/, '');
  const detected = SCHEME_DB[scheme] || scheme.toUpperCase();
  const defaultPort = DEFAULT_PORTS[scheme];

  // Multi-host: mongodb://h1:1,h2:2,h3:3/db?...  — URL only keeps h1; reconstruct from raw
  let hosts = [];
  const authIdx = uri.indexOf('://');
  if(authIdx >= 0){
    const afterScheme = uri.slice(authIdx + 3);
    const slash = afterScheme.indexOf('/');
    const q = afterScheme.indexOf('?');
    let end = afterScheme.length;
    if(slash >= 0) end = Math.min(end, slash);
    if(q >= 0) end = Math.min(end, q);
    const hostPart = afterScheme.slice(0, end);
    // hostPart may contain user:pass@ before hosts
    const at = hostPart.lastIndexOf('@');
    const hostList = at >= 0 ? hostPart.slice(at + 1) : hostPart;
    hosts = hostList.split(',').map(h => {
      const [host, port] = h.split(':');
      return { host: decode(host), port: port ? decode(port) : (defaultPort || '') };
    });
  }
  if(hosts.length === 0) hosts = [{ host: u.hostname, port: u.port || defaultPort || '' }];

  const params = {};
  u.searchParams.forEach((v,k) => params[k] = v);

  return {
    detected,
    scheme,
    user: decode(u.username),
    pass: decode(u.password),
    hosts,
    db: decode(u.pathname).replace(/^\//, ''),
    params
  };
}

function doParse(){
  const raw = $('#input').value;
  if(!raw.trim()){
    $('#output').innerHTML = '<span style="color:var(--text3)">' + t('empty') + '</span>';
    $('#status').innerHTML = '';
    return;
  }
  const r = parseConn(raw);
  if(!r){ $('#output').innerHTML = '<span style="color:var(--text3)">' + t('empty') + '</span>'; $('#status').innerHTML=''; return; }
  if(r.error){
    $('#output').innerHTML = '<span style="color:var(--gz-accent)">' + t('invalid') + '</span>';
    $('#status').innerHTML = '<span style="color:var(--gz-accent)">✗ ' + t('invalid') + '</span>';
    return;
  }
  const showPass = masked ? t('masked') : (r.pass === '' ? t('none') : escapeHtml(r.pass));
  let hostRows = '';
  if(r.hosts.length === 1){
    hostRows = '<span class="k">' + t('host') + '</span><span class="v">' + escapeHtml(r.hosts[0].host || t('none')) + '</span>' +
               '<span class="k">' + t('port') + '</span><span class="v">' + escapeHtml(r.hosts[0].port || t('none')) + '</span>';
  } else {
    hostRows = '<span class="k">' + t('hosts') + '</span><span class="v">' +
      r.hosts.map(h => escapeHtml(h.host) + (h.port ? ':' + escapeHtml(h.port) : '')).join('<br>') + '</span>';
  }
  let paramRows = '';
  if(Object.keys(r.params).length){
    paramRows = '<span class="k">' + t('params') + '</span><span class="v">' +
      Object.entries(r.params).map(([k,v]) => escapeHtml(k) + ' = ' + escapeHtml(v)).join('<br>') + '</span>';
  }
  let jdbcRow = r.jdbcDriver ? '<span class="k">' + t('jdbcDriver') + '</span><span class="v">' + escapeHtml(r.jdbcDriver) + '</span>' : '';

  $('#output').innerHTML =
    '<div style="margin-bottom:8px"><span class="tag ok">' + t('detected') + ': ' + escapeHtml(r.detected) + '</span>' +
      (r.scheme === 'redis' || r.scheme === 'rediss' || r.scheme === 'amqps' || r.params['ssl'] === 'true' ? '<span class="tag info">TLS</span>' : '') +
      (r.user ? '<span class="tag info">auth</span>' : '') + '</div>' +
    '<div class="grid">' +
      '<span class="k">' + t('scheme') + '</span><span class="v">' + escapeHtml(r.scheme) + '</span>' +
    jdbcRow +
    '<span class="k">' + t('user') + '</span><span class="v">' + (r.user ? escapeHtml(r.user) : t('none')) + '</span>' +
    '<span class="k">' + t('pass') + '</span><span class="v">' + showPass + '</span>' +
    hostRows +
    '<span class="k">' + t('db') + '</span><span class="v">' + (r.db ? escapeHtml(r.db) : t('none')) + '</span>' +
    paramRows +
    '</div>';
  $('#status').innerHTML = '<span style="color:var(--gz-success)">✓ ' + escapeHtml(r.detected) + ' · ' + r.hosts.length + ' host(s)</span>';
}

function loadExample(){
  $('#input').value = 'mongodb+srv://demo_user:S3cr3t%40pass@cluster0.abcd1.mongodb.net/production?retryWrites=true&w=majority&appName=myapp';
