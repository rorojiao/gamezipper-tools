const { $, copyText, t } = GZ;

function pascal(s) {
  return s.replace(/[^A-Za-z0-9]+/g, ' ').trim().split(/\s+/).map(w => w.charAt(0).toUpperCase() + w.slice(1)).join('') || 'Item';
}

function singularize(w) {
  if (/(.)s$/i.test(w) && !/(ss|us|is|os)$/i.test(w)) return w.replace(/s$/i, '');
  if (/ies$/i.test(w)) return w.replace(/ies$/i, 'y');
  return w;
}

function csType(value, hint) {
  if (value === null) return 'object';
  if (Array.isArray(value)) {
    const inner = value.length ? csType(value[0], hint) : 'object';
    return `List<${inner}>`;
  }
  switch (typeof value) {
    case 'string':  return /^[+-]?\d{4}-\d{2}-\d{2}T/.test(value) ? 'DateTime' : 'string';
    case 'number':  return Number.isInteger(value) ? 'long' : 'double';
    case 'boolean': return 'bool';
    case 'object':  return pascal(hint || 'Item');
    default:        return 'object';
  }
}

function nullable(tp) {
  if (/^(string|object|List<.+>)$/.test(tp)) return tp + '?';
  if (/^(long|double|bool|int|float|decimal|DateTime)$/.test(tp)) return tp + '?';
  return tp + '?';
}

function buildClasses(obj, rootName, useRecord, pascalAttr, depth) {
  const classes = [];
  function walk(o, name) {
    const props = [];
    for (const [key, val] of Object.entries(o)) {
      let type = csType(val, key);
      if (Array.isArray(val) && val.length && typeof val[0] === 'object' && val[0] !== null) {
        type = `List<${pascal(singularize(key))}>`;
      }
      const propName = pascal(key);
      let attr = '';
      if (pascalAttr && propName !== key) attr = `        [JsonPropertyName("${key}")]\n`;
      const init = useRecord ? '{ get; init; }' : '{ get; set; }';
      props.push(`${attr}        public ${nullable(type)} ${propName} ${init}`);
    }
    const decl = useRecord ? `public record ${name}` : `public class ${name}`;
    classes.push(`${decl}\n{\n${props.join('\n')}\n}`);
    // recurse nested
    for (const [key, val] of Object.entries(o)) {
      if (val && typeof val === 'object' && !Array.isArray(val)) {
        walk(val, pascal(key));
      } else if (Array.isArray(val)) {
        const item = val.find(v => v && typeof v === 'object');
        if (item) walk(item, pascal(singularize(key)));
      }
    }
  }
  walk(obj, rootName);
  return classes.join('\n\n');
}

function convert() {
  const inp = $('#input').value.trim();
  if (!inp) { $('#output').textContent = ''; $('#status').innerHTML = ''; return; }
  let obj;
  try { obj = JSON.parse(inp); }
  catch(e) { $('#status').innerHTML = `<span style="color:var(--gz-accent)">✗ ${t('jsonInvalid')||'Invalid JSON'}: ${e.message}</span>`; $('#output').textContent = ''; return; }

  const isArr = Array.isArray(obj);
  const sample = isArr ? (obj[0] || {}) : obj;
  if (typeof sample !== 'object' || sample === null) {
    $('#output').textContent = isArr ? `// Array of ${csType(obj[0])}` : `// ${csType(obj)}`;
    $('#status').innerHTML = `<span style="color:var(--gz-success)">✓ Generated</span>`;
    return;
  }
  const rootName = pascal(($('#root-name').value.trim() || 'Root').replace(/[^A-Za-z0-9]/g, '')) || 'Root';
  const useRecord = $('#opt-record').checked;
  const pascalAttr = $('#opt-pascal').checked;
  let code = 'using System;\nusing System.Collections.Generic;\nusing System.Text.Json.Serialization;\n\n';
  if (isArr) {
    code += buildClasses(sample, rootName, useRecord, pascalAttr) + '\n';
    code += `\n// Usage: List<${rootName}> data = JsonSerializer.Deserialize<List<${rootName}>>(json);\n`;
  } else {
    code += buildClasses(obj, rootName, useRecord, pascalAttr) + '\n';
    code += `\n// Usage: ${rootName} data = JsonSerializer.Deserialize<${rootName}>(json);\n`;
  }
  $('#output').textContent = code;
  $('#status').innerHTML = `<span style="color:var(--gz-success)">✓ ${rootName} generated (${code.length} bytes)</span>`;
}

  $('#input').value = JSON.stringify({

    orders: [{ orderId: 5001, total: 49.99, shipped: false }]
  }, null, 2);
  $('#root-name').value = 'User';
  convert();
}
