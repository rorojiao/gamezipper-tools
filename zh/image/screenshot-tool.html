<script>
GZI18n.register({
  en: {
    toolTitle: 'Online Screenshot Tool',
    toolDesc: 'Capture your screen, a window or a browser tab and download as PNG. Optional delay timer. 100% in your browser — no upload, no signup, no install.',
    capture: 'Capture Screen',
    delay: 'Delay',
    ready: 'Click "Capture Screen" and choose what to share',
    selecting: 'Waiting for you to pick a screen, window or tab…',
    counting: 'Capturing in',
    capturing: 'Capturing…',
    cancelled: 'Capture cancelled or failed. Try again.',
    unsupported: 'Your browser does not support screen capture (getDisplayMedia).',
    download: 'Download PNG',
    delete: 'Delete',
    retake: 'Retake',
    empty: 'Your screenshots will appear here. Click "Capture Screen" to start.',
    screenshotName: 'Screenshot',
    note: 'Screen capture uses the browser getDisplayMedia API. A native picker asks you to choose Entire Screen, Application Window or Browser Tab — nothing is uploaded. HTTPS is required. Audio is not captured.',
    step1: 'Optionally set a delay (0, 3, 5 or 10 seconds)',
    step2: 'Click "Capture Screen" and pick a screen, window or tab',
    step3: 'The captured frame appears as a PNG preview',
    step4: 'Download the PNG, retake or delete the screenshot',
  },
  zh: {
    toolTitle: '在线截图工具',
    toolDesc: '截取屏幕、窗口或浏览器标签页并下载为 PNG。可选延时。100% 浏览器本地运行 — 无需上传、无需注册、无需安装。',
    capture: '截取屏幕',
    delay: '延时',
    ready: '点击「截取屏幕」并选择要分享的内容',
    selecting: '等待你选择屏幕、窗口或标签页…',
    counting: '将在',
    capturing: '正在截取…',
    cancelled: '截取已取消或失败，请重试。',
    unsupported: '您的浏览器不支持屏幕捕获（getDisplayMedia）。',
    download: '下载 PNG',
    delete: '删除',
    retake: '重新截取',
    empty: '截图将显示在这里。点击「截取屏幕」开始。',
    screenshotName: '截图',
    note: '屏幕捕获使用浏览器 getDisplayMedia API。系统会弹出原生选择器，让你选择整个屏幕、应用窗口或浏览器标签页 — 不会上传任何数据。需要 HTTPS 环境，不录制音频。',
    step1: '可选：设置延时（0、3、5 或 10 秒）',
    step2: '点击「截取屏幕」并选择屏幕、窗口或标签页',
    step3: '截取的画面会以 PNG 预览显示',
    step4: '下载 PNG、重新截取或删除截图',
  }
});

const { $, t, showToast } = GZ;
let shots = [];
let counter = 0;

const statusEl = $('#status');
const shotsEl = $('#shots');

$('#lbl-delay').textContent = t('delay') + ':';
$('#lbl-capture').textContent = t('capture');
$('#note').textContent = t('note');
statusEl.textContent = t('ready');
renderEmpty();

async function capture() {
  if (!navigator.mediaDevices || !navigator.mediaDevices.getDisplayMedia) {
    showToast(t('unsupported'), 'error');
    return;
  }

  let stream;
  try {
    statusEl.textContent = t('selecting');
    stream = await navigator.mediaDevices.getDisplayMedia({
      video: { frameRate: { ideal: 1 } },
      audio: false
    });
  } catch (e) {
    statusEl.textContent = t('cancelled');
    statusEl.classList.remove('counting');
    return;
  }

  // Delay countdown
  const delay = parseInt($('#delay').value, 10) || 0;
  if (delay > 0) {
    statusEl.classList.add('counting');
    for (let i = delay; i > 0; i--) {
      statusEl.textContent = `${t('counting')} ${i}s…`;
      await sleep(1000);
    }
    statusEl.classList.remove('counting');
  }

  statusEl.textContent = t('capturing');

  const video = document.createElement('video');
  video.srcObject = stream;
  video.muted = true;
  await video.play();
  // Wait one frame to ensure rendered
  await sleep(150);

  const canvas = document.createElement('canvas');
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  const ctx = canvas.getContext('2d');
  ctx.drawImage(video, 0, 0);

  // Stop tracks immediately (single-frame capture)
  stream.getTracks().forEach(tr => tr.stop());
  video.srcObject = null;

  canvas.toBlob(blob => {
    if (!blob) { statusEl.textContent = t('cancelled'); return; }
    counter++;
    const url = URL.createObjectURL(blob);
    const name = `${t('screenshotName')} ${counter}.png`;
    shots.unshift({ id: counter, name, url, blob, w: canvas.width, h: canvas.height, ts: new Date() });
    renderShots();
    statusEl.textContent = t('ready');
  }, 'image/png');
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

function renderEmpty() {
  if (!shots.length) {
    shotsEl.innerHTML = `<div class="ss-empty"><span class="icon">📸</span>${t('empty')}</div>`;
  }
}

function renderShots() {
  if (!shots.length) { renderEmpty(); return; }
  shotsEl.innerHTML = shots.map(s => `
    <div class="ss-shot">
      <div class="meta">
        <span class="name">🖼️ ${escapeHtml(s.name)}</span>
        <span>${s.w}×${s.h}px · ${(s.blob.size / 1024).toFixed(1)} KB · ${fmtTime(s.ts)}</span>
      </div>
      <img src="${s.url}" alt="${escapeAttr(s.name)}" onclick="window.open('${s.url}')">
      <div class="actions">
        <a class="gz-btn" href="${s.url}" download="${escapeAttr(s.name)}">${t('download')}</a>
        <button class="gz-btn gz-btn-secondary" onclick="capture()">${t('retake')}</button>
        <button class="gz-btn gz-btn-secondary" onclick="deleteShot(${s.id})">${t('delete')}</button>
      </div>
    </div>`).join('');
}

function deleteShot(id) {
  const s = shots.find(x => x.id === id);
  if (s) URL.revokeObjectURL(s.url);
  shots = shots.filter(x => x.id !== id);
  renderShots();
}

function fmtTime(d) {
  return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

function escapeHtml(s) { return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escapeAttr(s) { return escapeHtml(s).replace(/"/g,'&quot;'); }

$('#captureBtn').addEventListener('click', capture);
window.capture = capture;
window.deleteShot = deleteShot;

GZ.renderToolPage({
  category: 'image',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'✂️', href:'/image/cropper.html', name:'Image Cropper'},
    {icon:'📐', href:'/image/resizer.html', name:'Image Resizer'},
    {icon:'🔄', href:'/image/image-rotator.html', name:'Image Rotator'},
    {icon:'💾', href:'/image/image-to-base64.html', name:'Image → Base64'},
  ]
});
</script>
