<script type="application/ld+json">{"@context":"https://schema.org","@type":"WebApplication","name":"Sale & Discount Calculator","description":"Calculate sale prices, discounts, and savings instantly. Support for percentage off, buy-one-get-one, and stackable discounts.","url": "https://tools.gamezipper.com/zh/calc/discount-calculator.html","applicationCategory":"Utility","operatingSystem":"Web Browser","offers":{"@type":"Offer","price":"0"}}</script>
<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"How do I calculate a discount?","acceptedAnswer":{"@type":"Answer","text":"Enter the original price and discount percentage. The calculator instantly shows the sale price and how much you save."}},{"@type":"Question","name":"Can I stack multiple discounts?","acceptedAnswer":{"@type":"Answer","text":"Yes. Use the second discount field to apply an additional percentage off. The tool calculates the final price after both discounts."}},{"@type":"Question","name":"How does BOGO work?","acceptedAnswer":{"@type":"Answer","text":"Buy One Get One (BOGO) means you buy one item and get another at a discount. Enter the price and BOGO percentage to see the effective price per item."}},{"@type":"Question","name":"Does this include tax?","acceptedAnswer":{"@type":"Answer","text":"You can optionally enter a tax rate. The calculator will show both the pre-tax and after-tax prices."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="disc-grid">
      <div class="disc-input">
        <label id="lbl-price"></label>
        <input type="number" id="price" value="100" min="0" step="0.01">
      </div>
      <div class="disc-input">
        <label id="lbl-disc1"></label>
        <input type="number" id="disc1" value="20" min="0" max="100" step="0.5">
      </div>
      <div class="disc-input">
        <label id="lbl-disc2"></label>
        <input type="number" id="disc2" value="0" min="0" max="100" step="0.5">
      </div>
      <div class="disc-input">
        <label id="lbl-tax"></label>
        <input type="number" id="taxRate" value="0" min="0" max="100" step="0.1">
      </div>
    </div>
    <div class="disc-result" id="result"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en:{
    toolTitle:'Sale & Discount Calculator',
    toolDesc:'Calculate sale prices, stackable discounts, savings and tax. Instant results for shopping and pricing decisions.',
    originalPrice:'Original Price ($)',discount1:'Discount 1 (%)',discount2:'Additional Discount (%) (optional)',taxRate:'Tax Rate (%) (optional)',
    salePrice:'Sale Price',youSave:'You Save',original:'Original',afterDisc1:'After 1st Discount',afterDisc2:'After 2nd Discount',subtotal:'Subtotal',tax:'Tax',total:'Total with Tax',
    step1:'Enter the original price of the item',
    step2:'Enter the discount percentage (e.g., 20 for 20% off)',
    step3:'Optionally add a second discount and tax rate',
    step4:'See the final price and savings instantly',
  },
  zh:{
    toolTitle:'折扣计算器',
    toolDesc:'计算折后价、叠加折扣、节省金额和税费。即时结果，助您做出购物决策。',
    originalPrice:'原价 ($)',discount1:'折扣 1 (%)',discount2:'额外折扣 (%)（可选）',taxRate:'税率 (%)（可选）',
    salePrice:'折后价',youSave:'节省金额',original:'原价',afterDisc1:'第一次折扣后',afterDisc2:'第二次折扣后',subtotal:'小计',tax:'税费',total:'含税总价',
    step1:'输入商品原价',
    step2:'输入折扣百分比（如输入 20 表示 8 折）',
    step3:'可选：添加第二重折扣和税率',
    step4:'即时查看最终价格和节省金额',
  }
});
const {$,t}=GZ;

function calc(){
  const price=parseFloat($('#price').value)||0;
  const d1=parseFloat($('#disc1').value)||0;
  const d2=parseFloat($('#disc2').value)||0;
  const tax=parseFloat($('#taxRate').value)||0;

  const after1=price*(1-d1/100);
  const after2=after1*(1-d2/100);
  const savings=price-after2;
  const taxAmt=after2*(tax/100);
  const total=after2+taxAmt;

  const fmt=n=>'$'+n.toFixed(2);
  const pct=n=>`(${n.toFixed(1)}%)`;

  $('#result').innerHTML=`
    <div style="text-align:center;margin-bottom:16px">
      <div style="color:var(--gz-text-muted);font-size:.85em">${t('salePrice')}</div>
      <div class="big">${fmt(after2)}</div>
      <span class="savings-badge">${t('youSave')} ${fmt(savings)} ${(savings/price*100).toFixed(1)}%</span>
    </div>
    <div class="row"><span class="label">${t('original')}</span><span class="value">${fmt(price)}</span></div>
    ${d1?`<div class="row"><span class="label">${t('afterDisc1')}</span><span class="value">${fmt(after1)}</span></div>`:''}
    ${d2?`<div class="row"><span class="label">${t('afterDisc2')}</span><span class="value">${fmt(after2)}</span></div>`:''}
    <div class="row"><span class="label">${t('youSave')}</span><span class="value" style="color:#00d672">${fmt(savings)}</span></div>
    ${tax?`<div class="row"><span class="label">${t('subtotal')}</span><span class="value">${fmt(after2)}</span></div>
    <div class="row"><span class="label">${t('tax')} ${pct(tax)}</span><span class="value">${fmt(taxAmt)}</span></div>
    <div class="row"><span class="label" style="font-weight:600">${t('total')}</span><span class="value" style="font-weight:600;font-size:1.1em">${fmt(total)}</span></div>`:''}`;
}

function loadExample(){
  $('#price').value=199.99;$('#disc1').value=25;$('#disc2').value=10;$('#taxRate').value=8.25;
  calc();
}

$('#lbl-price').textContent=t('originalPrice');
$('#lbl-disc1').textContent=t('discount1');
$('#lbl-disc2').textContent=t('discount2');
$('#lbl-tax').textContent=t('taxRate');

['price','disc1','disc2','taxRate'].forEach(id=>$('#'+id).addEventListener('input',calc));

$('#toolbar').innerHTML=`<button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button><button class="gz-btn gz-btn-secondary" onclick="$('#price').value='';$('#disc1').value='';$('#disc2').value='';$('#taxRate').value='';$('#result').innerHTML=''">${t('clear')}</button>`;

calc();

GZ.renderToolPage({category:'calc',titleKey:'toolTitle',descKey:'toolDesc',howToSteps:['step1','step2','step3','step4'],related:[
  {icon:'🔢',href:'/calc/percentage-calculator.html',name:'Percentage Calculator'},
  {icon:'💰',href:'/calc/tip-calculator.html',name:'Tip Calculator'},
  {icon:'🏦',href:'/calc/loan-calculator.html',name:'Loan Calculator'},
]});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
