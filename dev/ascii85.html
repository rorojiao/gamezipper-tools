const { $, copyText, t } = GZ;

// ASCII85 alphabets
const ADOBE = '!\"#$%&\'()*+,-./0123456789:;<=>?@ABCDEFGHIJKLMNOPQRSTUVWXYZ[\\]^_`abcdefghijklmnopqrstu';
const BTOA  = '!\"#$%&\'()*+,-./0123456789:;<=>?@ABCDEFGHIJKLMNOPQRSTUVWXYZ[\\]^_`abcdefghijklmnopqrstu';
const Z85   = '0123456789abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ.-:+=^!/*?&<>()[]{}@%$#';
const RFC1924 = '0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz!#$%&()*+-;<=>?@^_`{|}~';

function getAlpha(v) {
  return v === 'z85' ? Z85 : v === 'rfc1924' ? RFC1924 : ADOBE; // adobe & btoa use same alphabet
}

function encode85(text, variant) {
  const alpha = getAlpha(variant);
  const bytes = new TextEncoder().encode(text);
  let result = '';
  let isBtoa = variant === 'btoa';

  for (let i = 0; i < bytes.length; i += 4) {
    let chunk = 0;
    let n = 0;
    for (let j = 0; j < 4; j++) {
      if (i + j < bytes.length) {
        chunk = chunk * 256 + bytes[i + j];
        n++;
      } else {
        chunk *= 256;
      }
    }
    // Special case: all zeros → 'z' (Adobe/btoa only)
    if (n === 4 && chunk === 0 && variant !== 'z85' && variant !== 'rfc1924') {
      result += 'z';
      continue;
    }
    const chars = [];
    for (let j = 4; j >= 0; j--) {
      chars[j] = alpha[chunk % 85];
      chunk = Math.floor(chunk / 85);
    }
    result += chars.slice(0, n + 1).join('');
  }

  if (variant === 'adobe') return '<~' + result + '~>';
  return result;
}

function decode85(str, variant) {
  const alpha = getAlpha(variant);
  // Strip Adobe framing
  if (variant === 'adobe') {
    str = str.replace(/^<~/, '').replace(/~>$/, '');
  }
  // Build reverse map
  const map = {};
  for (let i = 0; i < alpha.length; i++) map[alpha[i]] = i;

  // Handle 'z' shorthand (Adobe/btoa)
  let expanded = '';
  for (const c of str) {
    if (c === 'z' && variant !== 'z85' && variant !== 'rfc1924') {
      expanded += '!!!!!';
    } else {
      expanded += c;
    }
  }

  const bytes = [];
  for (let i = 0; i < expanded.length; i += 5) {
    let chunk = 0;
    let group = expanded.substring(i, i + 5);
    let padCount = 0;
    if (group.length < 5) {
      padCount = 5 - group.length;
      group = group + alpha[84].repeat(padCount);
    }
    for (const c of group) {
      if (!(c in map)) throw new Error(t('invalidInput') + ' (char: ' + c + ')');
      chunk = chunk * 85 + map[c];
    }
    if (chunk > 0xFFFFFFFF) throw new Error(t('invalidInput'));
    const b = [(chunk >> 24) & 0xff, (chunk >> 16) & 0xff, (chunk >> 8) & 0xff, chunk & 0xff];
    for (let k = 0; k < 4 - padCount; k++) bytes.push(b[k]);
  }
  return new TextDecoder().decode(new Uint8Array(bytes));
}

function doEncode() {
  const inp = $('#input').value;
  if (!inp) return;
  try {
    const v = $('#variant').value;
    $('#output').textContent = encode85(inp, v);
    $('#status').innerHTML = `<span style="color:var(--gz-success)">✓ ${inp.length} bytes → ${$('#output').textContent.length} chars</span>`;
  } catch (e) {
    $('#status').innerHTML = `<span style="color:var(--gz-accent)">${t('error')}: ${e.message}</span>`;
  }
}

function doDecode() {
  const inp = $('#input').value.trim();
  if (!inp) return;
  try {
    const v = $('#variant').value;
    const decoded = decode85(inp, v);
    $('#output').textContent = decoded;
    $('#status').innerHTML = `<span style="color:var(--gz-success)">✓ ${inp.length} chars → ${new TextEncoder().encode(decoded).length} bytes</span>`;
  } catch (e) {
    $('#status').innerHTML = `<span style="color:var(--gz-accent)">${t('error')}: ${e.message}</span>`;
    $('#output').textContent = '';
  }
}

function loadExample() {
  $('#input').value = 'Hello, World!';
  doEncode();
}

function doClear() { $('#input').value = ''; $('#output').textContent = ''; $('#status').innerHTML = ''; }

$('#variant').addEventListener('change', doEncode);

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="doEncode()">${t('encode')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doDecode()">${t('decode')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;
