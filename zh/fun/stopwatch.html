.sw-display .ms{font-size:2rem;opacity:.7}
.sw-controls{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin:14px 0}
.sw-btn{padding:14px 26px;border:none;border-radius:12px;cursor:pointer;font-size:1rem;font-weight:700;transition:all .15s;font-family:inherit}
.sw-btn:active{transform:scale(0.97)}
.sw-btn.start{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;min-width:130px}
.sw-btn.lap{background:var(--glass);border:1px solid var(--border);color:var(--text);min-width:130px}
.sw-btn.reset{background:transparent;border:1px solid var(--border);color:var(--text2);min-width:100px}
.sw-btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,0.2)}
.sw-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:18px}
.sw-stat{background:var(--glass2);border:1px solid var(--border);border-radius:10px;padding:12px;text-align:center}
.sw-stat .l{font-size:.72rem;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.sw-stat .v{font-size:1.3rem;font-weight:800;color:var(--accent);font-family:monospace}

.sw-lap{display:grid;grid-template-columns:50px 1fr 1fr 1fr;gap:8px;padding:8px 10px;border-radius:8px;margin-bottom:4px;font-size:.9rem;align-items:center;background:var(--glass);border:1px solid var(--border)}
.sw-lap.fastest{border-color:#00d672;background:rgba(0,214,114,0.06)}
.sw-lap.slowest{border-color:#e94560;background:rgba(233,69,96,0.06)}
.sw-lap .num{color:var(--text2);font-weight:700}

.sw-lap .total{font-family:monospace;color:var(--text2);font-size:.85rem}
.sw-lap .badge{font-size:.7rem;font-weight:700;padding:2px 6px;border-radius:4px;background:transparent}
.sw-lap.fastest .badge{background:#00d672;color:#000}
.sw-lap.slowest .badge{background:#e94560;color:#fff}
.sw-empty{padding:20px;text-align:center;color:var(--text2);font-size:.88rem}

.sw-kbd{background:var(--glass2);border:1px solid var(--border);border-radius:6px;padding:1px 6px;font-family:monospace;font-size:.85em;display:inline-block;margin:0 2px}

<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "How do I use the online stopwatch?", "acceptedAnswer": {"@type": "Answer", "text": "Press the big Start button (or hit Space on your keyboard) to begin timing. Press Lap while the stopwatch is running to record a split time. Press Stop to pause, then Start again to resume from the same elapsed time. Press Reset to clear everything."}}, {"@type": "Question", "name": "What are lap times vs split times?", "acceptedAnswer": {"@type": "Answer", "text": "Lap time is the duration of a single segment (e.g. one mile of a multi-mile run). Split time (also called cumulative time) is the total elapsed from the very start. The fastest lap and slowest lap are highlighted automatically so you can pace yourself."}}, {"@type": "Question", "name": "How accurate is the stopwatch?", "acceptedAnswer": {"@type": "Answer", "text": "The stopwatch uses the browser's high-resolution performance API and is accurate to a few milliseconds. That is more than enough for sports, study sessions, cooking, and most timing needs. For laboratory-grade timing, you would need a dedicated hardware device."}}, {"@type": "Question", "name": "Can I copy or share my results?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. After recording laps, click the Copy button to copy a table of lap, split, and total times to your clipboard, formatted for easy pasting into spreadsheets, chat apps, or notes."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="sw-stage">
      <div class="sw-display" id="display">00:00:00<span class="ms">.00</span></div>
      <div class="sw-controls">
        <button class="sw-btn start" id="startBtn">▶ Start</button>
        <button class="sw-btn lap" id="lapBtn" disabled>🏁 Lap</button>
        <button class="sw-btn reset" id="resetBtn">↺ Reset</button>
      </div>
      <div class="sw-info">
        Shortcuts: <span class="sw-kbd">Space</span> start/stop · <span class="sw-kbd">L</span> lap · <span class="sw-kbd">R</span> reset
      </div>
    </div>
    <div class="sw-stats">
      <div class="sw-stat"><div class="l">Current Lap</div><div class="v" id="curLap">00:00.00</div></div>
      <div class="sw-stat"><div class="l">Total Laps</div><div class="v" id="totalLaps">0</div></div>
      <div class="sw-stat"><div class="l">Best Lap</div><div class="v" id="bestLap">—</div></div>
      <div class="sw-stat"><div class="l">Worst Lap</div><div class="v" id="worstLap">—</div></div>
      <div class="sw-stat"><div class="l">Average Lap</div><div class="v" id="avgLap">—</div></div>
    </div>
    <div class="sw-laps">
      <h3>📋 Laps <span class="hint">fastest in green, slowest in red</span></h3>
      <div id="lapsList"></div>
    </div>
    <div class="gz-toolbar" id="toolbar"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Online Stopwatch',
    toolDesc: 'A precise online stopwatch with lap times, splits, and stats. Track running, sports, study sessions, work tasks — anywhere you need to time something.',
    step1: 'Press Start (or hit Space) to begin timing',
    step2: 'Press Lap (or hit L) to record a split while the stopwatch is running',
    step3: 'Press Start again to pause/resume — the elapsed time is preserved',
    step4: 'Press Reset to clear all laps, or use Copy to export results to clipboard',
  },
  zh: {
    toolTitle: '在线秒表',
    toolDesc: '精确的在线秒表，支持分段计时、分段时间和统计。适用于跑步、运动、学习、工作任务等任何需要计时的场景。',
    step1: '点击「开始」按钮（或按空格键）开始计时',
    step2: '秒表运行时点击「分段」（或按 L 键）记录分段时间',
    step3: '再次点击「开始」可暂停/继续 — 已用时间会保留',
    step4: '点击「重置」清空所有分段，或使用「复制」将结果导出到剪贴板',
  }
});

const { $, copyText, t } = GZ;
let running = false, startTime = 0, elapsed = 0, lapStart = 0, laps = [], rafId = null;

function fmtTime(ms) {
  const totalCs = Math.floor(ms / 10);
  const cs = totalCs % 100;
  const totalS = Math.floor(totalCs / 100);
  const s = totalS % 60;
  const totalM = Math.floor(totalS / 60);
  const m = totalM % 60;
  const h = Math.floor(totalM / 60);
  const pad = (n, w) => String(n).padStart(w, '0');
  if (h > 0) return `${pad(h,2)}:${pad(m,2)}:${pad(s,2)}.${pad(cs,2)}`;
  return `${pad(m,2)}:${pad(s,2)}.${pad(cs,2)}`;
}

function fmtSplit(ms) {
  return fmtTime(ms);
}

function update() {
  const now = performance.now();
  const total = elapsed + (now - startTime);
  $('#display').innerHTML = fmtTime(total).replace(/(\.\d+)$/, '<span class="ms">$1</span>');
  $('#curLap').textContent = fmtTime(total - lapStart);
  if (running) rafId = requestAnimationFrame(update);
}

function start() {
  if (running) {
    // pause
    running = false;
    elapsed += performance.now() - startTime;
    cancelAnimationFrame(rafId);
    $('#startBtn').textContent = '▶ Resume';
    $('#startBtn').classList.remove('running');
  } else {
    running = true;
    startTime = performance.now();
    $('#startBtn').textContent = '⏸ Stop';
    $('#startBtn').classList.add('running');
    $('#lapBtn').disabled = false;
    update();
  }
}

function lap() {
  if (!running) return;
  const now = performance.now();
  const total = elapsed + (now - startTime);
  const split = total - lapStart;
  laps.push({ split, total });
  lapStart = total;
  renderLaps();
}

function reset() {
  running = false;
  elapsed = 0;
  lapStart = 0;
  laps = [];
  cancelAnimationFrame(rafId);
  $('#display').innerHTML = '00:00:00<span class="ms">.00</span>';
  $('#curLap').textContent = '00:00.00';
  $('#startBtn').textContent = '▶ Start';
  $('#startBtn').classList.remove('running');
  $('#lapBtn').disabled = true;
  renderLaps();
}

function renderLaps() {
  $('#totalLaps').textContent = laps.length;
  if (laps.length === 0) {
    $('#lapsList').innerHTML = '<div class="sw-empty">No laps yet — press Start then Lap to record splits</div>';
    $('#bestLap').textContent = '—';
    $('#worstLap').textContent = '—';
    $('#avgLap').textContent = '—';
    return;
  }
  const splits = laps.map(l => l.split);
  const best = Math.min(...splits);
  const worst = Math.max(...splits);
  const avg = splits.reduce((a, b) => a + b, 0) / splits.length;
  $('#bestLap').textContent = fmtTime(best);
  $('#worstLap').textContent = fmtTime(worst);
  $('#avgLap').textContent = fmtTime(avg);

  // Find first occurrence of best and worst
  const bestIdx = splits.indexOf(best);
  const worstIdx = splits.lastIndexOf(worst);
  // Render in reverse (newest first)
  $('#lapsList').innerHTML = laps.slice().reverse().map((l, i) => {
    const realIdx = laps.length - 1 - i;
    let cls = '';
    let badge = '';
    if (laps.length > 1 && realIdx === bestIdx) { cls = 'fastest'; badge = '⚡ FASTEST'; }
    else if (laps.length > 1 && realIdx === worstIdx) { cls = 'slowest'; badge = '🐌 SLOWEST'; }
    return `<div class="sw-lap ${cls}">
      <div class="num">#${realIdx + 1}</div>
      <div class="split">${fmtTime(l.split)}</div>
      <div class="total">total ${fmtTime(l.total)}</div>
      <div class="badge">${badge}</div>
    </div>`;
  }).join('');
}

$('#startBtn').addEventListener('click', start);
$('#lapBtn').addEventListener('click', lap);
$('#resetBtn').addEventListener('click', reset);

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (e.code === 'Space') { e.preventDefault(); start(); }
  else if (e.key === 'l' || e.key === 'L') lap();
  else if (e.key === 'r' || e.key === 'R') reset();
});

$('#toolbar').innerHTML = `
  <button class="gz-btn gz-btn-secondary" id="copyBtn" disabled>📋 Copy Laps</button>`;

$('#copyBtn').addEventListener('click', () => {
  if (laps.length === 0) return;
  const text = 'Lap\tSplit\tTotal\n' + laps.map((l, i) => `${i+1}\t${fmtTime(l.split)}\t${fmtTime(l.total)}`).join('\n');
  copyText(text);
});

const origRender = renderLaps;
function renderLaps2() {
  origRender();
  $('#copyBtn').disabled = laps.length === 0;
}
window.renderLaps = renderLaps2;

renderLaps();

GZ.renderToolPage({
  category: 'fun',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'⏰', href:'/calc/timer-stopwatch.html', name:'Timer & Stopwatch'},
    {icon:'🍅', href:'/calc/pomodoro.html', name:'Pomodoro Timer'},
    {icon:'⌨️', href:'/fun/keyboard-tester.html', name:'Keyboard Tester'},
    {icon:'⚡', href:'/fun/reaction-time.html', name:'Reaction Time'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
