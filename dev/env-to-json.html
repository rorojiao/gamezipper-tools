let autoType = true;
const { $, copyText, t } = GZ;

function unquote(val) {
  val = val.trim();
  // Remove inline comment (only if not inside quotes)
  if ((val.startsWith('"') && val.endsWith('"')) || (val.startsWith("'") && val.endsWith("'"))) {
    return val.slice(1, -1).replace(/\\n/g, '\n').replace(/\\t/g, '\t').replace(/\\'/g, "'").replace(/\\"/g, '"');
  }
  // Strip inline comment: KEY=value # comment
  const commentIdx = val.indexOf(' #');
  if (commentIdx > 0) val = val.substring(0, commentIdx).trim();
  return val.replace(/\\n/g, '\n').replace(/\\t/g, '\t');
}

function autoDetect(v) {
  if (!autoType) return v;
  if (v === 'true' || v === 'True' || v === 'TRUE') return true;
  if (v === 'false' || v === 'False' || v === 'FALSE') return false;
  if (v === 'null' || v === 'NULL') return null;
  if (v === '') return '';
  if (/^-?\d+$/.test(v)) { const n = parseInt(v, 10); if (Math.abs(n) < 1e15) return n; }
  if (/^-?\d+\.\d+([eE][+-]?\d+)?$/.test(v)) { const n = parseFloat(v); if (isFinite(n)) return n; }
  return v;
}

function parseEnv(text) {
  const result = {};
  const lines = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n').split('\n');
  let currentKey = null;
  let multilineBuffer = '';

  for (let line of lines) {
    // Skip empty lines
    if (line.trim() === '') { currentKey = null; continue; }
    // Skip comments
    if (/^\s*#/.test(line) || /^\s*\/\//.test(line)) continue;

    // Handle multiline continuation (value ends with \)
    if (currentKey && line.startsWith(' ') && multilineBuffer) {
      multilineBuffer += '\n' + line.replace(/\\\s*$/, '');
      if (!line.endsWith('\\')) {
        result[currentKey] = autoDetect(unquote(multilineBuffer.trim()));
        currentKey = null;
        multilineBuffer = '';
      }
      continue;
    }

    // Parse KEY=value
    const eqIdx = line.indexOf('=');
    if (eqIdx === -1) continue;

    let key = line.substring(0, eqIdx).trim();
    // Remove optional 'export ' prefix
    key = key.replace(/^export\s+/, '');
    // Validate key
    if (!/^[A-Za-z_][A-Za-z0-9_]*$/.test(key)) continue;

    let val = line.substring(eqIdx + 1);

    // Check for multiline (ends with backslash)
    if (val.trimEnd().endsWith('\\') && !(val.trim().startsWith('"') || val.trim().startsWith("'"))) {
      currentKey = key;
      multilineBuffer = val.trimEnd().slice(0, -1);
      continue;
    }

    result[key] = autoDetect(unquote(val));
    currentKey = null;
    multilineBuffer = '';
  }

  return result;
}

function syntaxHighlight(json) {
  return json.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/("(\\u[\da-fA-F]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(\.\d+)?([eE][+-]?\d+)?)/g, m => {
      let c = 'json-number';
      if (/^"/.test(m)) c = /:$/.test(m) ? 'json-key' : 'json-string';
      else if (/true|false/.test(m)) c = 'json-bool';
      else if (/null/.test(m)) c = 'json-null';
      return `<span class="${c}">${m}</span>`;
    });
}

function doConvert() {
  const inp = $('#input').value.trim();
  if (!inp) { $('#status').innerHTML = `<span style="color:var(--gz-accent)">${t('errEmpty')}</span>`; return; }
  try {
    const obj = parseEnv(inp);
    const count = Object.keys(obj).length;
    if (count === 0) { $('#status').innerHTML = `<span style="color:var(--gz-accent)">No valid KEY=value pairs found</span>`; return; }
    const result = JSON.stringify(obj, null, 2);
    $('#output').innerHTML = syntaxHighlight(result);
    $('#output').dataset.raw = result;
    $('#status').innerHTML = `<span style="color:var(--gz-success)">${t('converted')} — ${count} ${t('keys')}</span>`;
  } catch(e) {
    $('#status').innerHTML = `<span style="color:var(--gz-accent)">✗ ${e.message}</span>`;
  }
}

function downloadResult() {
  const raw = $('#output').dataset.raw || '';
  if (!raw) return;
  const blob = new Blob([raw], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'config.json';
  a.click();
  URL.revokeObjectURL(a.href);
}

function loadExample() {
  $('#input').value = `# Database configuration
DB_HOST=localhost
DB_PORT=5432
DB_NAME=myapp_dev
DB_SSL=false

# API Keys (example only)
API_KEY="sk-test-12345"
SECRET_KEY='my-secret-here'

# Feature flags
DEBUG=true
CACHE_TTL=3600

export NODE_ENV=development
LOG_LEVEL=info  # verbose logging`;
  doConvert();
}

function doClear() { $('#input').value = ''; $('#output').innerHTML = ''; $('#output').dataset.raw = ''; $('#status').innerHTML = ''; }

$('#input').addEventListener('input', doConvert);

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="doConvert()">${t('convert')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')||'Example'}</button>
  <label style="display:inline-flex;align-items:center;gap:4px;font-size:.85em;cursor:pointer">
    <input type="checkbox" ${autoType?'checked':''} onchange="autoType=this.checked;doConvert()"> ${t('autoType')}
  </label>
  <button class="gz-btn" onclick="copyText($('#output').dataset.raw||'')">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="downloadResult()">${t('download')||'⬇ Download'}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;
