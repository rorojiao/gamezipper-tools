<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What are HTTP headers?", "acceptedAnswer": {"@type": "Answer", "text": "HTTP headers are key-value pairs sent between a client and server in HTTP requests and responses. They convey information about the connection, content type, caching, security policies, and more."}}, {"@type": "Question", "name": "Why should I check HTTP headers?", "acceptedAnswer": {"@type": "Answer", "text": "Checking HTTP headers helps you verify security configurations (CSP, HSTS, X-Frame-Options), debug caching issues, confirm content types, and troubleshoot server configuration problems."}}, {"@type": "Question", "name": "How does this tool work?", "acceptedAnswer": {"@type": "Answer", "text": "This tool sends a request to the specified URL through a CORS proxy and displays all response headers in a readable table format with categorized badges for security, caching, and content headers."}}, {"@type": "Question", "name": "Is my query data stored?", "acceptedAnswer": {"@type": "Answer", "text": "No. Queries are made directly from your browser. No URL or header data is stored on any server."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="hdr-input-row">
      <input type="text" id="url" placeholder="https://example.com" spellcheck="false">
      <button class="gz-btn" onclick="doCheck()" id="btn-check"></button>
    </div>
    <div id="output"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'HTTP Headers Checker',
    toolDesc: 'Check HTTP response headers for any URL — security, caching, content-type, server and more.',
    btnCheck: 'Check Headers',
    headerName: 'Header',
    headerValue: 'Value',
    category: 'Category',
    security: 'Security',
    caching: 'Caching',
    content: 'Content',
    general: 'General',
    status: 'Status',
    totalTime: 'Response Time',
    headerCount: 'Headers',
    fetchError: 'Failed to fetch headers. The site may block CORS requests. Try a different URL.',
    loading: 'Fetching headers...',
    noHeaders: 'No headers returned.',
    step1: 'Enter a full URL (e.g. https://example.com)',
    step2: 'Click Check Headers to send a request',
    step3: 'Review the response status code and timing',
    step4: 'Inspect each header with security, caching, or content badges',
  },
  zh: {
    toolTitle: 'HTTP 响应头检查器',
    toolDesc: '检查任意 URL 的 HTTP 响应头 — 安全头、缓存、内容类型、服务器信息等。',
    btnCheck: '检查响应头',
    headerName: '响应头',
    headerValue: '值',
    category: '分类',
    security: '安全',
    caching: '缓存',
    content: '内容',
    general: '通用',
    status: '状态码',
    totalTime: '响应时间',
    headerCount: '响应头数',
    fetchError: '获取响应头失败，目标站点可能阻止了跨域请求。请尝试其他 URL。',
    loading: '正在获取响应头...',
    noHeaders: '未返回任何响应头。',
    step1: '输入完整 URL（如 https://example.com）',
    step2: '点击「检查响应头」发送请求',
    step3: '查看响应状态码和耗时',
    step4: '检查每个响应头及其安全、缓存或内容分类标签',
  }
});

const { $, copyText, t } = GZ;

const SECURITY_HEADERS = ['strict-transport-security','content-security-policy','x-content-type-options','x-frame-options','x-xss-protection','referrer-policy','permissions-policy','cross-origin-opener-policy','cross-origin-resource-policy','cross-origin-embedder-policy'];
const CACHE_HEADERS = ['cache-control','etag','last-modified','expires','age','vary','pragma'];
const CONTENT_HEADERS = ['content-type','content-length','content-encoding','content-language','content-disposition','x-powered-by','server','set-cookie'];

function categorize(name) {
  const n = name.toLowerCase();
  if (SECURITY_HEADERS.includes(n)) return { cat: 'security', cls: 'security' };
  if (CACHE_HEADERS.includes(n)) return { cat: 'caching', cls: 'cache' };
  if (CONTENT_HEADERS.includes(n)) return { cat: 'content', cls: 'content' };
  return { cat: 'general', cls: '' };
}

async function doCheck() {
  let url = $('#url').value.trim();
  if (!url) return;
  if (!/^https?:\/\//i.test(url)) url = 'https://' + url;
  const output = $('#output');
  output.innerHTML = `<div style="text-align:center;padding:24px;color:var(--text2)">${t('loading')}</div>`;

  const start = performance.now();
  try {
    const res = await fetch(url, { method: 'HEAD', mode: 'cors', redirect: 'follow' });
    const elapsed = Math.round(performance.now() - start);
    const headers = [...res.headers.entries()];

    let html = `<div class="hdr-meta">
      <div class="hdr-meta-item"><div class="val hdr-status ok">${res.status} ${res.statusText}</div><div class="lbl">${t('status')}</div></div>
      <div class="hdr-meta-item"><div class="val">${elapsed}ms</div><div class="lbl">${t('totalTime')}</div></div>
      <div class="hdr-meta-item"><div class="val">${headers.length}</div><div class="lbl">${t('headerCount')}</div></div>
    </div>`;

    html += '<table class="hdr-table"><thead><tr><th>' + t('headerName') + '</th><th>' + t('headerValue') + '</th><th>' + t('category') + '</th></tr></thead><tbody>';
    for (const [name, value] of headers) {
      const { cat, cls } = categorize(name);
      const badge = cls ? `<span class="hdr-badge ${cls}">${t(cat)}</span>` : '';
      html += `<tr><td><strong>${name}</strong></td><td>${value}</td><td>${badge}</td></tr>`;
    }
    html += '</tbody></table>';
    output.innerHTML = html;
  } catch (e) {
    output.innerHTML = `<div style="color:var(--gz-accent);padding:16px;background:var(--glass2);border-radius:12px;margin-top:16px">${t('fetchError')}<br><small>${e.message}</small></div>`;
  }
}

$('#url').addEventListener('keydown', e => { if (e.key === 'Enter') doCheck(); });

GZ.renderToolPage({
  category: 'dev',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🌐', href:'/dev/dns-lookup.html', name:'DNS Lookup'},
    {icon:'📋', href:'/dev/json.html', name:'JSON Formatter'},
    {icon:'🎫', href:'/dev/jwt.html', name:'JWT Decoder'},
    {icon:'🌐', href:'/dev/url-encode.html', name:'URL Encoder'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
