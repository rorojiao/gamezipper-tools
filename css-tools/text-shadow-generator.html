<script>
GZI18n.register({
  en: {
    toolTitle: 'Text Shadow Generator',
    toolDesc: 'Create CSS text-shadow effects visually — neon glow, 3D extrude, retro outline and layered shadows. Copy production-ready CSS instantly.',
    hOffset: 'Horizontal Offset (px)',
    vOffset: 'Vertical Offset (px)',
    blur: 'Blur Radius (px)',
    color: 'Shadow Color',
    layers: 'Shadow Layers',
    previewText: 'Preview Text',
    step1: 'Pick a preset or adjust sliders manually',
    step2: 'Add layers for multi-shadow effects',
    step3: 'Customize the shadow color',
    step4: 'Click Copy CSS and paste into your project',
  },
  zh: {
    toolTitle: '文字阴影生成器',
    toolDesc: '可视化创建 CSS text-shadow 效果 — 霓虹光、3D 凸出、复古描边和多层阴影。即时复制生产可用的 CSS 代码。',
    hOffset: '水平偏移 (px)',
    vOffset: '垂直偏移 (px)',
    blur: '模糊半径 (px)',
    color: '阴影颜色',
    layers: '阴影层数',
    previewText: '预览文字',
    step1: '选择预设或手动调整滑块',
    step2: '添加多层以实现多重阴影效果',
    step3: '自定义阴影颜色',
    step4: '点击「复制 CSS」并粘贴到你的项目中',
  }
});

const { $, copyText, t } = GZ;
let layers = [{ x: 2, y: 2, blur: 4, color: '#000000' }];

const PRESETS = {
  neon: [{x:0,y:0,blur:10,color:'#ff00de'},{x:0,y:0,blur:20,color:'#ff00de'},{x:0,y:0,blur:40,color:'#ff00de'}],
  extrude3d: Array.from({length:6},(_,i)=>({x:i+1,y:i+1,blur:0,color:'#888888'})),
  hard: [{x:4,y:4,blur:0,color:'#000000'}],
  double: [{x:2,y:2,blur:0,color:'#ff0000'},{x:-2,y:-2,blur:0,color:'#00ffff'}],
  retro: [{x:3,y:3,blur:0,color:'#fff'},{x:6,y:6,blur:0,color:'#000'}],
  embossed: [{x:-1,y:-1,blur:0,color:'#fff'},{x:1,y:1,blur:0,color:'#333'}],
  glow: [{x:0,y:0,blur:5,color:'#00ffff'},{x:0,y:0,blur:10,color:'#00ffff'},{x:0,y:0,blur:20,color:'#00ffff'}],
  fire: [{x:0,y:0,blur:4,color:'#ff0000'},{x:0,y:-2,blur:6,color:'#ff8800'},{x:0,y:-4,blur:10,color:'#ffff00'}],
  long: Array.from({length:12},(_,i)=>({x:i+1,y:i+1,blur:0,color:'#444'})),
};

function buildCSS() {
  return '.text-shadow {\n  text-shadow: ' + layers.map(l => `${l.x}px ${l.y}px ${l.blur}px ${l.color}`).join(', ') + ';\n}';
}

function render() {
  const pv = $('#preview');
  pv.style.textShadow = layers.map(l => `${l.x}px ${l.y}px ${l.blur}px ${l.color}`).join(', ');
  $('#output').textContent = buildCSS();
}

function buildControls() {
  let html = '';
  layers.forEach((l, i) => {
    html += `<div style="border:1px solid var(--border);border-radius:8px;padding:8px;margin-bottom:8px">`;
    html += `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><strong>${t('layers')} ${i+1}</strong>`;
    if (layers.length > 1) html += `<button class="preset-btn" onclick="layers.splice(${i},1);buildControls();render()">✕</button>`;
    html += `</div>`;
    html += `<div><label>${t('hOffset')} <span id="x-${i}">${l.x}</span></label><input type="range" min="-30" max="30" value="${l.x}" oninput="layers[${i}].x=+this.value;$('#x-${i}').textContent=this.value;render()"></div>`;
    html += `<div><label>${t('vOffset')} <span id="y-${i}">${l.y}</span></label><input type="range" min="-30" max="30" value="${l.y}" oninput="layers[${i}].y=+this.value;$('#y-${i}').textContent=this.value;render()"></div>`;
    html += `<div><label>${t('blur')} <span id="b-${i}">${l.blur}</span></label><input type="range" min="0" max="40" value="${l.blur}" oninput="layers[${i}].blur=+this.value;$('#b-${i}').textContent=this.value;render()"></div>`;
    html += `<div><label>${t('color')}</label><input type="color" value="${l.color}" oninput="layers[${i}].color=this.value;render()"></div>`;
    html += `</div>`;
  });
  html += `<button class="gz-btn gz-btn-secondary" onclick="layers.push({x:2,y:2,blur:4,color:'#000000'});buildControls();render()">+ ${t('layers')||'Add Layer'}</button>`;
  $('#controls').innerHTML = html;
}

function applyPreset(name) {
  layers = JSON.parse(JSON.stringify(PRESETS[name]));
  buildControls();
  render();
}

$('#presets').innerHTML = Object.keys(PRESETS).map(k => `<button class="preset-btn" onclick="applyPreset('${k}')">${k}</button>`).join('');

$('#lbl-out').textContent = t('preview') || 'Preview';
$('#lbl-css').textContent = t('cssOutput') || 'CSS Output';

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="copyText(buildCSS())">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="layers=[{x:2,y:2,blur:4,color:'#000000'}];buildControls();render()">${t('reset')||'Reset'}</button>`;

buildControls();
render();

GZ.renderToolPage({
  category: 'css',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🪟', href:'/css-tools/glassmorphism-generator.html', name:'Glassmorphism'},
    {icon:'✨', href:'/css-tools/neumorphism-generator.html', name:'Neumorphism'},
    {icon:'🔲', href:'/css-tools/box-shadow.html', name:'Box Shadow'},
    {icon:'3️⃣', href:'/text/3d-text.html', name:'3D Text'},
  ]
});
</script>

</body>
