<script>

    toolDesc: '无限清爽的老爹笑话、谐音梗和冷笑话。按类别浏览、复制、分享。免费、老少咸宜、无需注册。',
    next: '😂 再来一个',

    copied: '已复制！',
    emptyHint: '点击「再来一个」获取新的老爹笑话！',
    catAll: '全部',
    catPuns: '谐音梗',
    catFood: '食物',
    catAnimals: '动物',
    catScience: '科学',
    catHoliday: '节日',
    step1: '选择一个类别，或保持「全部」',
    step2: '点击「再来一个」获取新笑话',
    step3: '点击「复制」即可随处分享',
    step4: '一直点，一直笑（或冷）',
  }
});

const { $, copyText, t } = GZ;

const JOKES = {
  puns: [
    ['I only know 25 letters of the alphabet.'],['I don\'t trust stairs.'],['I was wondering why the frisbee kept getting bigger.'],['I used to play piano by ear.'],['I\'m reading a book on anti-gravity.'],['I told my wife she was drawing her eyebrows too high.'],['I would tell you a construction joke.'],['I couldn\'t figure out how the seat belt worked.'],['I gave all my dead batteries away today.'],['What do you call a fake noodle?','An impasta.'],['Why don\'t skeletons fight each other?','They don\'t have the guts.'],['I\'m afraid for the calendar.','Its days are numbered.'],['I used to hate facial hair.'],['I\'m on a seafood diet.'],['I tell dad jokes but I have no kids.'],['What do you call cheese that isn\'t yours?','Nacho cheese.'],['Why did the scarecrow win an award?','Because he was outstanding in his field.']],
  food: [
    ['What do you call a pile of cats?','A meow-ntain.'],['What do you call a sleeping dinosaur?','A dino-snore.'],['Why did the coffee file a police report?','It got mugged.'],['What do you call a bear with no teeth?','A gummy bear.'],['I\'d tell you a pizza joke.'],['What did the grape do when he got stepped on?','He let out a little wine.'],['Why did the banana go to the hospital?','He was peeling bad.'],['What do you call cheese that isn\'t yours?','Nacho cheese.'],['Why don\'t eggs tell jokes?','They\'d crack each other up.'],['What do you call a fake noodle?','An impasta.']],
  animals: [
    ['What do you call a fish wearing a bowtie?','Sofishticated.'],['Why do cows wear bells?','Because their horns don\'t work.'],['What do you call a lazy kangaroo?','A pouch potato.'],['What do you call an alligator in a vest?','An investigator.'],['Why did the dog go to space?','He wanted to be an astro-nut.'],['What do you call a pig that does karate?','A pork chop.'],['Why don\'t oysters share?','Because they\'re shellfish.'],['What do you call a duck that gets all A\'s?','A wise quacker.'],['Why are fish so smart?','Because they live in schools.'],['What do you call a bear with no teeth?','A gummy bear.']],
  science: [
    ['Why don\'t scientists trust atoms?','Because they make up everything.'],['I told a chemistry joke.'],['There was no reaction.'],['What is a physicist\'s favorite food?','Fission chips.'],['Why did the math book look sad?','Because it had too many problems.'],['What do you do with a sick chemist?','If you can\'t helium, and you can\'t curium, then you barium.'],['I would tell you a joke about UDP.'],['But you might not get it.'],['What is brown and sticky?','A stick.'],['Parallel lines have so much in common.'],['It\'s a shame they\'ll never meet.']],
  holiday: [
    ['What do you call an old snowman?','Water.'],['Why does Santa go down the chimney?','Because it soots him.'],['What do you get when you cross a snowman and a vampire?','Frostbite.'],['What falls but never breaks, and what breaks but never falls?','Night and day.'],['Why did the turkey join a band?','Because he had the drumsticks.'],['What do ghosts serve for dessert?','I scream.'],['Why don\'t vampires have many friends?','Because they are a pain in the neck.'],['What do you get a monster for his birthday?','Things that go bump in the night.'],['What kind of music do mummies listen to?','Wrap music.'],['Why was the Easter egg so humble?','Because it knew it wasn\'t all it was cracked up to be.']],
  classic: [
    ['I\'m tired.'],['Followed by "I\'m tired" — wait, no.'],['I tried to catch fog yesterday.'],['Mist.'],['What time did the man go to the dentist?','Tooth hurt-y.'],['I have a fear of speed bumps.'],['But I\'m slowly getting over it.'],['What do you call someone with no body and no nose?','Nobody knows.'],['Did you hear about the Italian chef who died?','He pasta way.'],['I bought shoes from a drug dealer.'],['I don\'t know what he laced them with.'],['But I was tripping all day.']],
};

const CATS = ['all','puns','food','animals','science','holiday'];
let currentCat = 'all';
let lastJoke = null;
let history = [];

function flat(){
  if(currentCat === 'all'){
    return Object.values(JOKES).flat();
  }
  return JOKES[currentCat] || JOKES.puns;
}

function nextJoke(){
  const pool = flat().filter(j => !history.includes(j.join('|')));
  if(!pool.length){ history = []; }
  const pick = (pool.length ? pool : flat())[Math.floor(Math.random() * (pool.length || flat().length))];
  lastJoke = pick;
  history.push(pick.join('|'));
  if(history.length > 30) history.shift();
  render();
}

function render(){
  if(!lastJoke){
    $('#joke').innerHTML = `<span class="dj-empty">${t('emptyHint')}</span>`;
    return;
  }
  if(lastJoke.length === 1){
    $('#joke').innerHTML = `<div>${lastJoke[0]}</div>`;
  } else {
    $('#joke').innerHTML = `<div>${lastJoke[0]}</div><div class="dj-punchline">${lastJoke.slice(1).join(' ')}</div>`;
  }
}

function copyJoke(){
  if(!lastJoke) return;
  copyText(lastJoke.join('\n'));
  const btn = $('#copyBtn');
  const original = btn.textContent;
  btn.textContent = t('copied');
  setTimeout(() => btn.textContent = original, 1100);
}

function setCat(c){
  currentCat = c;
  history = [];
  document.querySelectorAll('.dj-cat button').forEach(b => b.classList.toggle('active', b.dataset.cat === c));
  nextJoke();
}

$('#cat').innerHTML = CATS.map((c,i) => `<button data-cat="${c}" onclick="setCat('${c}')" class="${i===0?'active':''}">${t('cat'+c.charAt(0).toUpperCase()+c.slice(1))}</button>`).join('');

$('#toolbar').innerHTML = `
  <button id="nextBtn" class="gz-btn" onclick="nextJoke()">${t('next')}</button>
  <button id="copyBtn" class="gz-btn gz-btn-secondary" onclick="copyJoke()">${t('copy')}</button>`;

nextJoke();

  ]
});
</script>
