  },
  zh: {
    toolTitle: 'JSON 转图表转换器',
    toolDesc: '将 JSON 数组可视化为柱状图、折线图、面积图、饼图和环形图。自动检测标签和数值字段，多种配色主题，支持 PNG/SVG 导出。100% 浏览器本地运行，无需上传。',
    step1: '将 JSON 对象数组粘贴到数据区',

  }

const { $, t } = GZ;

const THEMES = {
  vibrant: ['#4ecdc4','#ff6b6b','#ffe66d','#a8e6cf','#ff8b94','#c7ceea','#ffa726','#ab47bc'],
  ocean:   ['#0288d1','#039be5','#03a9f4','#29b6f6','#4fc3f7','#81d4fa','#4dd0e1','#26c6da'],
  sunset:  ['#ff7043','#ff5722','#ec407a','#ab47bc','#7e57c2','#5c6bc0','#ffa726','#ff8a65'],
  pastel:  ['#b39ddb','#90caf9','#a5d6a7','#fff59d','#ffcc80','#ef9a9a','#80cbc4','#f48fb1'],
  mono:    ['#4ecdc4','#3cb5ad','#2a9d92','#1f8278','#6dd5cd','#85ddd5','#9de4dd','#b5ebe6'],
};

// Flatten object to dot-notation leaves
function flatten(obj, prefix, out) {
  for (const k in obj) {
    const v = obj[k];
    const key = prefix ? prefix + '.' + k : k;
    if (v !== null && typeof v === 'object' && !Array.isArray(v)) flatten(v, key, out);
    else out[key] = v;
  }
}

function parseAndDetect() {
  const raw = $('#input').value.trim();
  if (!raw) { $('#status').textContent=''; return null; }
  let data;
  try { data = JSON.parse(raw); }
  catch(e) { $('#status').innerHTML = `<span style="color:var(--gz-accent)">⚠ Invalid JSON: ${e.message}</span>`; return null; }
  if (!Array.isArray(data)) {
    // unwrap common wrappers
    if (data && typeof data === 'object') {
      const arrKey = Object.keys(data).find(k => Array.isArray(data[k]));
      if (arrKey) { data = data[arrKey]; }
      else { $('#status').innerHTML = '<span style="color:var(--gz-accent)">⚠ Expected a JSON array of objects.</span>'; return null; }
    } else { $('#status').innerHTML = '<span style="color:var(--gz-accent)">⚠ Expected a JSON array.</span>'; return null; }
  }
  if (data.length === 0) { $('#status').innerHTML = '<span style="color:var(--gz-accent)">⚠ Array is empty.</span>'; return null; }
  const flat = data.map(item => { const o = {}; flatten(item, '', o); return o; });
  // Detect fields
  const fields = Object.keys(flat[0]);
  const labelCandidates = fields.filter(f => typeof flat[0][f] === 'string');
  const numCandidates = fields.filter(f => typeof flat[0][f] === 'number');
  const labelField = labelCandidates[0] || fields[0];
  // Populate dropdowns
  $('#sel-label').innerHTML = fields.map(f => `<option value="${f}" ${f===labelField?'selected':''}>${f}</option>`).join('');
  $('#sel-value').innerHTML = numCandidates.map((f,i) => `<option value="${f}" ${i===0?'selected':''}>${f}</option>`).join('');
  $('#status').innerHTML = `<span style="color:var(--gz-success)">✓ ${flat.length} records · ${numCandidates.length} numeric field(s) detected</span>`;
  return flat;
}

let lastData = null;

function renderChart() {
  const flat = lastData = parseAndDetect();
  if (!flat) { $('#preview').innerHTML = '<span style="color:#999">No data</span>'; return; }
  const chartType = $('#sel-chart').value;
  const labelField = $('#sel-label').value;
  const valueFields = Array.from($('#sel-value').selectedOptions).map(o => o.value).filter(Boolean);
  if (valueFields.length === 0) { $('#preview').innerHTML = '<span style="color:#e94560">Select at least one value field</span>'; return; }
  const theme = THEMES[$('#sel-theme').value] || THEMES.vibrant;
  const labels = flat.map(r => String(r[labelField] ?? ''));
  const series = valueFields.map((vf, i) => ({ name: vf, color: theme[i % theme.length], values: flat.map(r => Number(r[vf]) || 0) }));

  let svg;
  if (chartType === 'pie' || chartType === 'donut') {
    // Use first value field only, sum-based
    const s = series[0];
    const total = s.values.reduce((a,b)=>a+b,0) || 1;
    const cx=150, cy=150, R=120, r = chartType==='donut'?70:0;
    let angle = -Math.PI/2;
    const slices = s.values.map((v,i) => {
      const frac = v/total;
      const a2 = angle + frac*Math.PI*2;
      const x1=cx+R*Math.cos(angle), y1=cy+R*Math.sin(angle);
      const x2=cx+R*Math.cos(a2), y2=cy+R*Math.sin(a2);
      const x3=cx+r*Math.cos(a2), y3=cy+r*Math.sin(a2);
      const x4=cx+r*Math.cos(angle), y4=cy+r*Math.sin(angle);
      const large = frac>0.5?1:0;
      let path;
      if (r>0) path = `M${x1},${y1} A${R},${R} 0 ${large} 1 ${x2},${y2} L${x3},${y3} A${r},${r} 0 ${large} 0 ${x4},${y4} Z`;
      else path = `M${cx},${cy} L${x1},${y1} A${R},${R} 0 ${large} 1 ${x2},${y2} Z`;
      angle = a2;
      return `<path d="${path}" fill="${theme[i%theme.length]}" stroke="#fff" stroke-width="1.5"/>`;
    }).join('');
    const legends = labels.map((l,i)=>`<g transform="translate(300,${20+i*22})"><rect width="14" height="14" fill="${theme[i%theme.length]}"/><text x="20" y="11" font-size="12" fill="#333">${l} (${s.values[i]})</text></g>`).join('');
    svg = `<svg viewBox="0 0 540 320" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">${slices}${legends}</svg>`;
  } else {
    // bar/line/area
    const W=560, H=320, padL=50, padR=20, padT=20, padB=50;
    const innerW = W-padL-padR, innerH = H-padT-padB;
    const allVals = series.flatMap(s=>s.values);
    const maxV = Math.max(...allVals, 0);
    const minV = Math.min(...allVals, 0);
    const range = (maxV-minV) || 1;
    const n = labels.length;
    const groupW = innerW / Math.max(1,n);
    const isHoriz = chartType === 'hbar';
    let body = '';
    // Grid + Y axis
    const ticks = 5;
    for (let i=0;i<=ticks;i++) {
      const v = minV + (range*i/ticks);
      const y = padT + innerH - (innerH*i/ticks);
      body += `<line x1="${padL}" y1="${y}" x2="${W-padR}" y2="${y}" stroke="#eee"/>`;
      body += `<text x="${padL-6}" y="${y+4}" text-anchor="end" font-size="10" fill="#888">${v.toFixed(v%1?1:0)}</text>`;
    }
    // X labels
    labels.forEach((l,i)=>{
      const x = padL + groupW*(i+0.5);
      body += `<text x="${x}" y="${H-padB+16}" text-anchor="middle" font-size="10" fill="#666" transform="rotate(${l.length>4?-25:0} ${x},${H-padB+16})">${l.length>12?l.slice(0,11)+'…':l}</text>`;
    });
    if (chartType === 'bar' || chartType === 'hbar' || chartType==='area') {
      const bw = (groupW*0.7) / series.length;
      series.forEach((s,si)=>{
        s.values.forEach((v,i)=>{
          const valNorm = (v-minV)/range;
          const x = padL + groupW*i + groupW*0.15 + bw*si;
          const h = innerH*valNorm;
          const y = padT + innerH - h;
          if (chartType==='area') {
            // build polygon across all
          } else {
            body += `<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${bw.toFixed(1)}" height="${h.toFixed(1)}" fill="${s.color}"/>`;
          }
        });
      });
      if (chartType==='area') {
        series.forEach(s=>{
          let pts='';
          s.values.forEach((v,i)=>{
            const x = padL + groupW*(i+0.5);
            const y = padT + innerH - innerH*((v-minV)/range);
            pts += `${x},${y} `;
          });
          const firstX = padL+groupW*0.5, lastX = padL+groupW*(s.values.length-0.5);
          body += `<polygon points="${firstX},${padT+innerH} ${pts}${lastX},${padT+innerH}" fill="${s.color}" fill-opacity="0.3" stroke="${s.color}" stroke-width="2"/>`;
        });
      }
    } else if (chartType === 'line') {
      series.forEach(s=>{
        let pts='';
        s.values.forEach((v,i)=>{
          const x = padL + groupW*(i+0.5);
          const y = padT + innerH - innerH*((v-minV)/range);
          pts += `${x},${y} `;
          body += `<circle cx="${x}" cy="${y}" r="3" fill="${s.color}"/>`;
        });
        body += `<polyline points="${pts}" fill="none" stroke="${s.color}" stroke-width="2"/>`;
      });
    }
    // Legend
    series.forEach((s,i)=>{
      const lx = padL + i*120, ly = padT-6;
      body += `<rect x="${lx}" y="${ly}" width="12" height="12" fill="${s.color}"/><text x="${lx+16}" y="${ly+10}" font-size="11" fill="#333">${s.name}</text>`;
    });
    svg = `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">${body}</svg>`;
  }
  $('#preview').innerHTML = svg;
}

$('#btn-render').addEventListener('click', renderChart);
$('#sel-chart').addEventListener('change', renderChart);
$('#sel-theme').addEventListener('change', renderChart);
$('#sel-label').addEventListener('change', renderChart);
$('#sel-value').addEventListener('change', renderChart);

$('#btn-png').addEventListener('click', () => {
  const svg = $('#preview').querySelector('svg');
  if (!svg) return;
  const xml = new XMLSerializer().serializeToString(svg);
  const img = new Image();
  img.onload = () => {
    const c = document.createElement('canvas');
    c.width = 1120; c.height = 640;
    const ctx = c.getContext('2d');
    ctx.fillStyle='#fff'; ctx.fillRect(0,0,c.width,c.height);
    ctx.drawImage(img, 0, 0, c.width, c.height);
    const a = document.createElement('a');
    a.download = 'chart.png'; a.href = c.toDataURL('image/png'); a.click();
  };
  img.src = 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(xml)));
});

$('#btn-svg').addEventListener('click', () => {
  const svg = $('#preview').querySelector('svg');
  if (!svg) return;
  const xml = '<?xml version="1.0" encoding="UTF-8"?>\n' + new XMLSerializer().serializeToString(svg);
  const blob = new Blob([xml], { type: 'image/svg+xml' });
  const a = document.createElement('a');
  a.download = 'chart.svg'; a.href = URL.createObjectURL(blob); a.click();
});

$('#input').value = JSON.stringify([
  {product:'Laptop',sales:1240,returns:32},
  {product:'Phone',sales:2150,returns:78},
  {product:'Tablet',sales:890,returns:21},
  {product:'Watch',sales:1560,returns:45},
  {product:'Earbuds',sales:1890,returns:62}
], null, 2);
parseAndDetect();
renderChart();

  ]
});
</script>
