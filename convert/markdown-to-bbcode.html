function escapeBB(s) {
  // Escape any stray BBCode-looking patterns is not standard; we leave text alone.
  return s;
}

function mdToBBCode(md) {
  if (!md.trim()) return '';
  const lines = md.split(/\r?\n/);
  let out = [];
  let inCode = false;
  let inUl = false;
  let inOl = false;
  let codeBuf = [];

  function closeLists() {
    if (inUl) { out.push('[/list]'); inUl = false; }
    if (inOl) { out.push('[/list]'); inOl = false; }
  }

  for (let i = 0; i < lines.length; i++) {
    let line = lines[i];

    // Fenced code blocks ```
    if (/^```/.test(line.trim())) {
      if (!inCode) {
        closeLists();
        inCode = true;
        codeBuf = [];
      } else {
        // close code
        out.push('[code]' + codeBuf.join('\n') + '[/code]');
        inCode = false;
        codeBuf = [];
      }
      continue;
    }
    if (inCode) { codeBuf.push(line); continue; }

    // Horizontal rule
    if (/^\s*([-*_])(\s*\1){2,}\s*$/.test(line)) {
      closeLists();
      out.push('[hr]');
      continue;
    }

    // ATX headings
    const h = line.match(/^(#{1,6})\s+(.*)$/);
    if (h) {
      closeLists();
      const level = h[1].length;
      const sizes = ['', 'huge', 'large', 'big', 'b', 'b', 'b'];
      const txt = inline(h[2]);
      if (level <= 3) out.push('[' + sizes[level] + ']' + txt + '[/' + sizes[level] + ']');
      else out.push('[b]' + txt + '[/b]');
      continue;
    }

    // Setext headings H1/H2
    if (i + 1 < lines.length && /^(=+|-+)\s*$/.test(lines[i+1].trim()) && line.trim()) {
      closeLists();
      const isH1 = /=/.test(lines[i+1]);
      const tag = isH1 ? 'huge' : 'large';
      out.push('[' + tag + ']' + inline(line.trim()) + '[/' + tag + ']');
      i++;
      continue;
    }

    // Blockquote
    if (/^\s*>\s?/.test(line)) {
      closeLists();
      const content = line.replace(/^\s*>\s?/, '');
      out.push('[quote]' + inline(content) + '[/quote]');
      continue;
    }

    // Unordered list item
    const ul = line.match(/^\s*[-*+]\s+(.*)$/);
    if (ul) {
      if (inOl) { out.push('[/list]'); inOl = false; }
      if (!inUl) { out.push('[list]'); inUl = true; }
      out.push('[*]' + inline(ul[1]));
      continue;
    }

    // Ordered list item
    const ol = line.match(/^\s*\d+\.\s+(.*)$/);
    if (ol) {
      if (inUl) { out.push('[/list]'); inUl = false; }
      if (!inOl) { out.push('[list=1]'); inOl = true; }
      out.push('[*]' + inline(ol[1]));
      continue;
    }

    // Empty line
    if (!line.trim()) {
      closeLists();
      out.push('');
      continue;
    }

    // Regular paragraph
    closeLists();
    out.push(inline(line));
  }

  // Flush code block if unclosed
  if (inCode && codeBuf.length) out.push('[code]' + codeBuf.join('\n') + '[/code]');
  closeLists();

  return out.join('\n');
}

function inline(s) {
  // Inline code `code`
  s = s.replace(/`([^`]+)`/g, '[code]$1[/code]');
  // Images ![alt](url)
  s = s.replace(/!\[([^\]]*)\]\(([^)\s]+)(?:\s+"[^"]*")?\)/g, '[img]$2[/img]');
  // Links [text](url)
  s = s.replace(/\[([^\]]+)\]\(([^)\s]+)(?:\s+"[^"]*")?\)/g, '[url=$2]$1[/url]');
  // Bold **text** or __text__
  s = s.replace(/\*\*([^*]+)\*\*/g, '[b]$1[/b]');
  s = s.replace(/__([^_]+)__/g, '[b]$1[/b]');
  // Italic *text* or _text_
  s = s.replace(/(^|[^*])\*([^*\s][^*]*?)\*(?!\*)/g, '$1[i]$2[/i]');
  s = s.replace(/(^|[^_])_([^_\s][^_]*?)_(?!_)/g, '$1[i]$2[/i]');
  // Strikethrough ~~text~~
  s = s.replace(/~~([^~]+)~~/g, '[s]$1[/s]');
  return s;
}
