<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"What is an ITF-14 barcode?","acceptedAnswer":{"@type":"Answer","text":"ITF-14 (Interleaved 2 of 5, 14 digits) is the barcode used on the outer cartons, cases and shipping containers of retail products. It encodes a 14-digit Global Trade Item Number (GTIN-14): an indicator digit, a GS1 company prefix, an item reference and a check digit."}},{"@type":"Question","name":"What are the bearer bars around an ITF-14?","acceptedAnswer":{"@type":"Answer","text":"ITF-14 requires a solid or rectangle bearer bar around the barcode to prevent partial-read errors when a scanner beam enters the symbol from the top or bottom. This tool draws the standard rectangular bearer frame automatically."}},{"@type":"Question","name":"How is the ITF-14 check digit calculated?","acceptedAnswer":{"@type":"Answer","text":"The check digit uses the GS1 mod-10 algorithm. Starting from the right, multiply alternate digits by 3 and 1, sum them, and subtract from the next multiple of 10. The tool computes it automatically when you enter 13 digits."}},{"@type":"Question","name":"Can an ITF-14 encode letters or symbols?","acceptedAnswer":{"@type":"Answer","text":"No. ITF-14 (Interleaved 2 of 5) only encodes digits 0-9 and always an even number of them - exactly 14 for ITF-14. The first digit is the packaging indicator and the last is the check digit."}}]}</script>

<script>
GZI18n.register({
  en: {
    toolTitle: 'ITF-14 Barcode Generator',
    toolDesc: 'Generate ITF-14 (Interleaved 2 of 5) barcodes for shipping containers and GS1 logistics labels. Automatic check digit, bearer bars, SVG/PNG download — 100% browser-only.',
    lblData: 'Data (13-14 digits)',

    lblHeight: 'Height',

    lblShowText: 'Show text',
    checksum: 'Check digit (14th): ',
    enterValid: 'Please enter 13 or 14 digits (0-9)',
    downloadSvg: 'Download SVG',
    downloadPng: 'Download PNG',
    step1: 'Enter 13 or 14 numeric digits (GS1 GTIN-14 format)',
    step2: 'The 14th check digit is calculated automatically',
    step3: 'Toggle bearer bars, adjust scale and height',
    step4: 'Download as SVG (vector) or PNG (raster)',
  },
  zh: {
    toolTitle: 'ITF-14 条形码生成器',
    toolDesc: '生成 ITF-14（交插二五码）条形码，用于运输外箱和 GS1 物流标签。自动计算校验位，支持防护边框，可下载 SVG/PNG — 100% 浏览器本地运行。',
    lblData: '数据（13-14 位数字）',
    lblScale: '缩放',
    lblHeight: '高度',
    lblBearer: '防护边框',
    lblShowText: '显示文字',
    checksum: '校验位（第 14 位）：',
    enterValid: '请输入 13 或 14 位数字（0-9）',
    downloadSvg: '下载 SVG',
    downloadPng: '下载 PNG',
    step1: '输入 13 或 14 位数字（GS1 GTIN-14 格式）',
    step2: '第 14 位校验码将自动计算',
    step3: '切换防护边框，调整缩放和高度',
    step4: '下载为 SVG（矢量）或 PNG（位图）',
  }
});

const { $, copyText, t } = GZ;

// Interleaved 2 of 5 element widths per digit: 5 bars (2 wide), narrow=1 wide=2
// Standard ITF patterns: each digit -> 5 chars of 'n'/'w'
const ITF_PATTERNS = {
  '0':'nnwwn','1':'wnnnw','2':'nwnnw','3':'wwnnn','4':'nnwnw',
  '5':'wnwnn','6':'nwwnn','7':'nnnww','8':'wnnwn','9':'nwnwn'
};
// Start: nnnn (narrow bar, narrow space, narrow bar, narrow space)
// End: wn  (wide bar, narrow space -> but commonly "wnn")

function itf14Checksum(thirteen) {
  // GS1 mod-10: positions from right of full 14, but compute on 13 with 3/1 alternation
  let sum = 0;
  for (let i = 0; i < 13; i++) {
    const d = parseInt(thirteen[i]);
    // position from right of the 13 = 13-i; even-from-right => x3
    const fromRight = 13 - i;
    sum += d * (fromRight % 2 === 1 ? 3 : 1);
  }
  return (10 - (sum % 10)) % 10;
}

function generate() {
  const raw = $('#data').value.replace(/\D/g, '');
  const svg = $('#barcode-svg');
  const info = $('#info');

  if (raw.length < 13 || raw.length > 14 || !/^\d+$/.test(raw)) {
    svg.innerHTML = '';
    info.innerHTML = `<span style="color:var(--gz-accent)">${t('enterValid')}</span>`;
    return;
  }

  let digits = raw;
  let checkDigit;
  if (raw.length === 13) {
    checkDigit = itf14Checksum(raw);
    digits = raw + checkDigit;
    info.innerHTML = `<span style="color:var(--gz-success)">✓ ${t('checksum')}<strong>${checkDigit}</strong> — ${digits}</span>`;
  } else {
    const calc = itf14Checksum(raw.substring(0, 13));
    checkDigit = parseInt(raw[13]);
    if (calc === checkDigit) {
      info.innerHTML = `<span style="color:var(--gz-success)">✓ ${t('checksum')}<strong>${checkDigit}</strong> — ${digits} (valid)</span>`;
    } else {
      info.innerHTML = `<span style="color:var(--gz-accent)">⚠ Checksum mismatch: expected ${calc}, got ${checkDigit}. <a href="#" onclick="$('#data').value='${raw.substring(0,13)}';generate();return false" style="color:var(--accent)">Fix</a></span>`;
    }
  }

  // Build interleaved bit pattern
  // Start guard: bar space bar space (all narrow)
  let bits = '1010';
  // pairs: odd digit -> bars, even digit -> spaces (interleaved)
  for (let i = 0; i < 14; i += 2) {
    const barPat = ITF_PATTERNS[digits[i]];
    const spacePat = ITF_PATTERNS[digits[i+1]];
    for (let k = 0; k < 5; k++) {
      bits += (barPat[k] === 'w' ? '11' : '1');   // bar
      bits += (spacePat[k] === 'w' ? '00' : '0'); // space
    }
  }
  // End guard: wide bar, narrow space, narrow bar
  bits += '1101';

  const scale = parseInt($('#scale').value);
  const barH = parseInt($('#height').value);
  const unitW = scale;
  const quietZone = 10 * scale;
  const bearerOn = $('#bearer').checked;
  const bearer = bearerOn ? 3 * scale : 0;
  const bearerGap = bearerOn ? 2 * scale : 0;
  const symW = bits.length * unitW;
  const totalW = symW + quietZone * 2;
  const totalH = barH + bearer * 2 + bearerGap * 2;
  const textH = $('#showtext').checked ? 20 : 0;
  const fullH = totalH + textH;
  const textY = totalH + 16;
  const offsetY = bearer + bearerGap;

  let rects = '';
  for (let i = 0; i < bits.length; i++) {
    if (bits[i] === '1') {
      rects += `<rect x="${quietZone + i * unitW}" y="${offsetY}" width="${unitW}" height="${barH}" fill="#000"/>`;
    }
  }
  let bearerEl = '';
  if (bearerOn) {
    bearerEl = `<rect x="${quietZone}" y="0" width="${symW}" height="${bearer}" fill="#000"/>`;
    bearerEl += `<rect x="${quietZone}" y="${barH + bearerGap + bearer}" width="${symW}" height="${bearer}" fill="#000"/>`;
  }
  let textEl = '';
  if ($('#showtext').checked) {
    textEl = `<text x="${totalW/2}" y="${textY}" font-family="monospace" font-size="14" fill="#000" text-anchor="middle" letter-spacing="2">${digits}</text>`;
  }

  svg.setAttribute('width', totalW);
  svg.setAttribute('height', fullH);
  svg.setAttribute('viewBox', `0 0 ${totalW} ${fullH}`);
  svg.innerHTML = `<rect x="0" y="0" width="${totalW}" height="${fullH}" fill="#fff"/>${bearerEl}${rects}${textEl}`;
}

$('#data').addEventListener('input', generate);
$('#scale').addEventListener('input', e => { $('#scale-val').textContent = e.target.value + 'x'; generate(); });
$('#height').addEventListener('input', e => { $('#height-val').textContent = e.target.value + 'px'; generate(); });
$('#bearer').addEventListener('change', generate);
$('#showtext').addEventListener('change', generate);

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="downloadSvg()">${t('downloadSvg')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="downloadPng()">${t('downloadPng')}</button>`;

function downloadSvg() {
  const svg = $('#barcode-svg');
  const clone = svg.cloneNode(true);
  const data = new XMLSerializer().serializeToString(clone);
  const blob = new Blob([data], {type: 'image/svg+xml'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `itf14-${$('#data').value.replace(/\D/g,'')}.svg`;
  a.click();
  URL.revokeObjectURL(a.href);
}

function downloadPng() {
  const svg = $('#barcode-svg');
  const data = new XMLSerializer().serializeToString(svg);
  const img = new Image();
  const blob = new Blob([data], {type: 'image/svg+xml'});
  const url = URL.createObjectURL(blob);
  img.onload = function() {
    const canvas = document.createElement('canvas');
    canvas.width = img.width * 2;
    canvas.height = img.height * 2;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#fff';
    ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
    URL.revokeObjectURL(url);
    canvas.toBlob(function(b) {
      const a = document.createElement('a');
      a.href = URL.createObjectURL(b);
      a.download = `itf14-${$('#data').value.replace(/\D/g,'')}.png`;
      a.click();
      URL.revokeObjectURL(a.href);
    });
  };
  img.src = url;
}

$('#lbl-data').textContent = t('lblData');
$('#lbl-scale').textContent = t('lblScale');
$('#lbl-height').textContent = t('lblHeight');
$('#lbl-bearer').textContent = t('lblBearer');
$('#lbl-showtext').textContent = t('lblShowText');
$('#scale-val').textContent = '2x';
$('#height-val').textContent = '100px';

generate();

    {icon:'#️⃣', href:'/dev/hash.html', name:'Hash Generator'},
    {icon:'🆔', href:'/dev/uuid.html', name:'UUID Generator'},
  ]
});
</script>
