<script>
GZI18n.register({
  en: {
    toolTitle: 'Glassmorphism CSS Generator',
    toolDesc: 'Create frosted-glass UI effects visually. Adjust blur, opacity, border and background — copy production-ready CSS instantly.',

  },
  zh: {
    toolTitle: '玻璃拟态 CSS 生成器',
    toolDesc: '可视化创建毛玻璃 UI 效果。调整模糊、透明度、边框和背景 — 即时复制生产可用的 CSS 代码。',
    blur: '模糊度 (px)',
    opacity: '背景透明度 (%)',
    borderOpacity: '边框透明度 (%)',
    borderWidth: '边框宽度 (px)',
    radius: '圆角 (px)',
    bgColor: '背景颜色',
    borderColor: '边框颜色',
    shadow: '阴影',
    step1: '调整左侧的模糊度、透明度和颜色滑块',
    step2: '实时查看预览效果更新',
    step3: '点击「复制 CSS」复制生成的代码',
    step4: '粘贴到你的项目中 — 支持所有现代浏览器',
  }
});

const { $, copyText, t } = GZ;
const state = { blur: 10, opacity: 20, borderWidth: 1, borderOpacity: 30, radius: 16, bg: '#ffffff', border: '#ffffff', shadow: 8 };

function hexToRgba(hex, alpha) {
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  return `rgba(${r}, ${g}, ${b}, ${alpha})`;
}

function buildCSS() {
  const bg = hexToRgba(state.bg, state.opacity / 100);
  const bd = hexToRgba(state.border, state.borderOpacity / 100);
  const shadow = state.shadow > 0 ? `0 8px ${state.shadow * 2}px rgba(0,0,0,${(state.shadow/40).toFixed(2)})` : 'none';
  return `.glass {\n  background: ${bg};\n  backdrop-filter: blur(${state.blur}px);\n  -webkit-backdrop-filter: blur(${state.blur}px);\n  border: ${state.borderWidth}px solid ${bd};\n  border-radius: ${state.radius}px;\n  box-shadow: ${shadow};\n}`;
}

function render() {
  const bg = hexToRgba(state.bg, state.opacity / 100);
  const bd = hexToRgba(state.border, state.borderOpacity / 100);
  const shadow = state.shadow > 0 ? `0 8px ${state.shadow * 2}px rgba(0,0,0,${(state.shadow/40).toFixed(2)})` : 'none';
  const pv = $('#preview');
  pv.style.background = bg;
  pv.style.backdropFilter = `blur(${state.blur}px)`;
  pv.style.webkitBackdropFilter = `blur(${state.blur}px)`;
  pv.style.border = `${state.borderWidth}px solid ${bd}`;
  pv.style.borderRadius = state.radius + 'px';
  pv.style.boxShadow = shadow;
  $('#output').textContent = buildCSS();
}

function buildControls() {
  const items = [
    {key:'blur', min:0, max:30, step:1},
    {key:'opacity', min:0, max:100, step:5},
    {key:'borderWidth', min:0, max:5, step:1},
    {key:'borderOpacity', min:0, max:100, step:5},
    {key:'radius', min:0, max:40, step:1},
    {key:'shadow', min:0, max:30, step:1},
  ];
  let html = '';
  items.forEach(it => {
    html += `<div><label>${t(it.key)} <span id="val-${it.key}">${state[it.key]}</span></label>`;
    html += `<input type="range" min="${it.min}" max="${it.max}" step="${it.step}" value="${state[it.key]}" oninput="state.${it.key}=+this.value;$('#val-${it.key}').textContent=this.value;render()"></div>`;
  });
  html += `<div><label>${t('bgColor')}</label><input type="color" value="${state.bg}" oninput="state.bg=this.value;render()"></div>`;
  html += `<div><label>${t('borderColor')}</label><input type="color" value="${state.border}" oninput="state.border=this.value;render()"></div>`;
  $('#controls').innerHTML = html;
}

$('#lbl-out').textContent = t('preview') || 'Preview';
$('#lbl-css').textContent = t('cssOutput') || 'CSS Output';

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="copyText(buildCSS())">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="Object.assign(state,{blur:10,opacity:20,borderWidth:1,borderOpacity:30,radius:16,bg:'#ffffff',border:'#ffffff',shadow:8});buildControls();render()">${t('reset')||'Reset'}</button>`;

buildControls();
render();

  ]
});
</script>
