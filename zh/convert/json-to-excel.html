    step2:'点击「转换」生成表格并预览',

const {$,t}=GZ;
let lastWS=null, lastName='data';

function flatten(obj,prefix,res){
  for(const k in obj){
    const v=obj[k];
    const key=prefix?prefix+'.'+k:k;
    if(v&&typeof v==='object'&&!Array.isArray(v)&&!(v instanceof Date))flatten(v,key,res);
    else res[key]=Array.isArray(v)?JSON.stringify(v):v;
  }
  return res;
}

function normalize(data){
  // array of objects
  if(Array.isArray(data)){
    if(data.length&&typeof data[0]==='object'&&!Array.isArray(data[0])){
      return data.map(o=>$('#flattenChk').checked?flatten(o,'',{}):o);
    }
    return data;
  }
  // object with array values -> columns
  if(data&&typeof data==='object'){
    const keys=Object.keys(data);
    if(keys.length&&keys.every(k=>Array.isArray(data[k]))){
      const len=Math.max(...keys.map(k=>data[k].length));
      const rows=[];
      for(let i=0;i<len;i++){const r={};keys.forEach(k=>{r[k]=data[k][i];});rows.push(r);}
      return rows;
    }
    return [data]; // single object
  }
  return [];
}

function doConvert(){
  const inp=$('#input').value.trim();
  if(!inp){$('#status').innerHTML=`<span style="color:var(--gz-text-muted)">${t('empty')}</span>`;$('#preview').style.display='none';return;}
  let data;
  try{data=JSON.parse(inp);}catch(e){$('#status').innerHTML=`<span style="color:var(--gz-accent)">${t('invalid')}: ${e.message}</span>`;$('#preview').style.display='none';return;}
  const rows=normalize(data);
  const ws=XLSX.utils.json_to_sheet(rows,{skipHeader:!$('#headerChk').checked});
  lastWS=ws;
  // preview as HTML
  const html=XLSX.utils.sheet_to_html(ws,{editable:false});
  $('#preview').innerHTML=html.replace(/<table/,'<table class="gz-preview"');
  $('#preview').style.display='block';
  const n=rows.length;
  $('#status').innerHTML=`<span style="color:var(--gz-success)">${t('valid')} · ${n} ${t('rows')}</span>`;
}

function download(format){
  if(!lastWS){doConvert();if(!lastWS)return;}
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,lastWS,'Sheet1');
  if(format==='xlsx')XLSX.writeFile(wb,lastName+'.xlsx',{bookType:'xlsx'});
  else XLSX.writeFile(wb,lastName+'.csv',{bookType:'csv'});
}

function loadExample(){
  $('#input').value=JSON.stringify([
    {id:1,name:'Alice',role:'Admin',active:true,profile:{team:'Engineering',level:5,tags:['node','sql']}},
    {id:2,name:'Bob',role:'Editor',active:false,profile:{team:'Content',level:3,tags:['writing']}},
    {id:3,name:'Cleo',role:'Viewer',active:true,profile:{team:'Marketing',level:2,tags:['seo','ads']}},
  ],null,2);
  doConvert();
}

$('#lbl-in').textContent=t('lblIn');
$('#opt-flatten').textContent=t('flatten');
$('#opt-header').textContent=t('header');
$('#flattenChk').addEventListener('change',doConvert);
$('#headerChk').addEventListener('change',doConvert);

$('#toolbar').innerHTML=`
  <button class="gz-btn" onclick="doConvert()">${t('convert')}</button>
  <button class="gz-btn" onclick="download('xlsx')">📊 ${t('xlsx')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="download('csv')">📄 ${t('csv')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#input').value=\'\';doClear()">${t('clear')}</button>`;
function doClear(){$('#preview').style.display='none';$('#status').innerHTML='';lastWS=null;}

]});
