const categories = Object.keys(KAOMOJI);
let activeCat = 'all';

function renderCats() {
  const tabs = $('#catTabs');
  let html = `<button class="${activeCat==='all'?'active':''}" onclick="filterCat('all')">${t('catAll')}</button>`;
  categories.forEach(c => {
    html += `<button class="${activeCat===c?'active':''}" onclick="filterCat('${c}')">${t(KAOMOJI[c].label)}</button>`;
  });
  tabs.innerHTML = html;
}

function filterCat(cat) {
  activeCat = cat;
  renderCats();
  renderGrid();
}

function renderGrid() {
  const grid = $('#grid');
  const search = $('#searchBox').value.toLowerCase();
  let html = '';
  const cats = activeCat === 'all' ? categories : [activeCat];
  cats.forEach(c => {
    KAOMOJI[c].items.forEach(k => {
      if (search && !k.toLowerCase().includes(search)) return;
      html += `<div class="kaomoji-card" onclick="copyKaomoji('${k.replace(/'/g,"\\'")}')"><div class="face">${k}</div></div>`;
    });
  });
  grid.innerHTML = html || '<p style="opacity:.5;text-align:center;padding:40px">No kaomoji found</p>';
}

function copyKaomoji(text) {
  navigator.clipboard.writeText(text).then(() => {
    const el = $('#copied');
    el.textContent = text + ' ' + t('copied');
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 1500);
  });
}

$('#searchBox').placeholder = t('search');
$('#searchBox').addEventListener('input', renderGrid);
renderCats();
