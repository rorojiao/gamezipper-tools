<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"What is squared text?","acceptedAnswer":{"@type":"Answer","text":"Squared text replaces each letter with a Unicode symbol inside a square — 🅰 for A, 🅱 for B, and so on. It uses the enclosed alphanumeric Unicode block (U+1F170–U+1F189) and renders on most modern devices."}},{"@type":"Question","name":"What is the difference between squared, circled and flag letters?","acceptedAnswer":{"@type":"Answer","text":"Squared letters place each letter in a filled square (🅰🅱🅲). Circled letters wrap each letter in a circle (ⒶⒷⒸ). Regional indicators (🇦🇧🇨) are the special codes that combine into country flag emojis when two appear together."}},{"@type":"Question","name":"Why do some pairs of flag letters turn into a flag?","acceptedAnswer":{"@type":"Answer","text":"Regional indicator letters are designed so that any two-letter country code (like US, GB, JP) automatically renders as that country's flag emoji on supported platforms. Single letters show as the letter on a coloured box."}},{"@type":"Question","name":"Does squared text work everywhere?","acceptedAnswer":{"@type":"Answer","text":"Squared and circled letters work on most modern phones and browsers, including Facebook, Twitter, Instagram, Discord and TikTok. Very old systems may show a missing-glyph box instead of the symbol. Flag emojis are not supported on Windows desktop."}}]}</script>

<script>
GZI18n.register({
  en: {
    toolTitle: 'Squared Text Generator',
    toolDesc: 'Convert letters into 🅰🅱🅲 squared symbols, ⒶⒷⒸ circled letters and 🇦🇧🇨 regional flag indicators. Copy & paste decorative letter styles — works on social media.',
    lblIn: 'Type or paste your text (A-Z)',
    lblOut: 'Letter styles (click Copy)',
    clear: 'Clear',
    copy: 'Copy',
    copied: '✓ Copied!',
    sampleText: 'HELLO',
    squaredLabel: 'Squared 🅰',
    circledLabel: 'Circled Ⓐ',
    circledFillLabel: 'Filled circle ⓐ',
    regionalLabel: 'Flag indicators 🇦',
    step1: 'Type or paste letters (A-Z) in the input box',
    step2: 'Browse the letter styles in the output panel',
    step3: 'Click Copy next to the style you want',
    step4: 'Paste into Instagram, TikTok, Discord or any chat app',
  },
  zh: {
    toolTitle: '方框字母文字生成器',
    toolDesc: '将字母转换为 🅰🅱🅲 方框符号、ⒶⒷⒸ 圆圈字母和 🇦🇧🇨 区域旗标。一键复制粘贴到 Instagram、TikTok、Discord 等。',
    lblIn: '输入或粘贴字母（A-Z）',
    lblOut: '字母样式（点击复制）',
    clear: '清空',
    copy: '复制',
    copied: '✓ 已复制！',
    sampleText: 'HELLO',
    squaredLabel: '方框 🅰',
    circledLabel: '圆圈 Ⓐ',
    circledFillLabel: '实心圆 ⓐ',
    regionalLabel: '旗标 🇦',
    step1: '在输入框中输入或粘贴字母（A-Z）',
    step2: '在输出区浏览各种字母样式',
    step3: '点击所需样式旁的「复制」按钮',
    step4: '粘贴到 Instagram、TikTok、Discord 等社交平台',
  }
});

const { $, copyText, t } = GZ;

// Build conversion maps
const SQUARED = {};      // U+1F170 A=🅰 ... U+1F189 Z=🅩 (but only A-Z maps cleanly)
const CIRCLED = {};      // U+24B6 Ⓐ ...
const CIRCLED_FILL = {}; // U+24D0 ⓐ ...
const REGIONAL = {};     // U+1F1E6 🇦 ...

for(let i = 0; i < 26; i++){
  const upper = String.fromCharCode(65 + i);   // A-Z
  SQUARED[upper] = String.fromCodePoint(0x1F170 + i);     // 🅰-🅩
  CIRCLED[upper] = String.fromCodePoint(0x24B6 + i);      // Ⓐ-⒵
  CIRCLED_FILL[upper] = String.fromCodePoint(0x24D0 + i); // ⓐ-ⓩ
  REGIONAL[upper] = String.fromCodePoint(0x1F1E6 + i);    // 🇦-🇿
}

function convert(str, map){
  return str.split('').map(ch=>{
    const up = ch.toUpperCase();
    if(map[up]) return map[up];
    return ch;
  }).join('');
}

function render(){
  const input = $('#input').value || t('sampleText');
  const styles = [
    {label: t('squaredLabel'),     result: convert(input, SQUARED)},
    {label: t('circledLabel'),     result: convert(input, CIRCLED)},
    {label: t('circledFillLabel'), result: convert(input, CIRCLED_FILL)},
    {label: t('regionalLabel'),    result: convert(input, REGIONAL)},
  ];
  let html='';
  for(const s of styles){
    html += `<div class="result-row"><span class="label">${escapeHtml(s.label)}</span><span class="out">${escapeHtml(s.result)}</span><button class="gz-btn gz-btn-tool copy-btn" data-text="${escapeAttr(s.result)}">${t('copy')}</button></div>`;
  }
  $('#output').innerHTML = html;
  $('#output').querySelectorAll('.copy-btn').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      copyText(btn.dataset.text);
      const orig = btn.textContent;
      btn.textContent = t('copied');
      setTimeout(()=>{btn.textContent = orig;}, 1200);
    });
  });
}

function escapeHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function escapeAttr(s){return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

$('#input').addEventListener('input', render);

$('#toolbar').innerHTML = `<button class="gz-btn" id="btn-clear">${t('clear')}</button>`;
$('#btn-clear').addEventListener('click', ()=>{$('#input').value='';render();$('#input').focus();});

render();

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',

    {icon:'✨', href:'/text/fancy-text-generator.html', name:'Fancy Text'},
    {icon:'🅰', href:'/text/fraktur-text-generator.html', name:'Fraktur Text'},
    {icon:'𝔸', href:'/dev/double-struck-text.html', name:'Double Struck'},
  ]
});
</script>
