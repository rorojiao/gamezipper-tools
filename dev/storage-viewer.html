    del: '删除',
    edit: '编辑',
    copy: '复制',
    confirmClear: '确定清空所有条目？此操作不可撤销。',
    editTitle: '编辑条目',
    save: '保存',
    cancel: '取消',
    key: '键',
    val: '值',
    bytes: '字节',
    items: '项',
    step1: '选择 Tab 查看 LocalStorage、SessionStorage 或 Cookie',
    step2: '使用搜索框按键或值过滤条目',
    step3: '编辑或删除单个条目，或添加新条目',

const { $, t, copyText, showToast } = GZ;
let current = 'ls';
let editing = null;

function getStore(type) {
  if (type === 'ls') return window.localStorage;
  if (type === 'ss') return window.sessionStorage;
  return null;
}

function getCookies() {
  return document.cookie.split(';').map(c => {
    const [k, ...v] = c.trim().split('=');
    return { key: k || '', value: decodeURIComponent(v.join('=') || '') };
  }).filter(c => c.key);
}

function setCookie(key, value) {
  document.cookie = `${encodeURIComponent(key)}=${encodeURIComponent(value)}; path=/; max-age=2592000`;
}

function deleteCookie(key) {
  document.cookie = `${encodeURIComponent(key)}=; path=/; max-age=0`;
}

function readAll(type) {
  if (type === 'ck') return getCookies();
  const store = getStore(type);
  const out = [];
  for (let i = 0; i < store.length; i++) {
    const k = store.key(i);
    out.push({ key: k, value: store.getItem(k) });
  }
  return out;
}

function setItem(type, key, value) {
  if (type === 'ck') return setCookie(key, value);
  return getStore(type).setItem(key, value);
}

function deleteItem(type, key) {
  if (type === 'ck') return deleteCookie(key);
  return getStore(type).removeItem(key);
}

function clearAll(type) {
  if (type === 'ck') {
    getCookies().forEach(c => deleteCookie(c.key));
    return;
  }
  getStore(type).clear();
}

function estimateBytes() {
  let total = '';
  for (let i = 0; i < localStorage.length; i++) {
    const k = localStorage.key(i), v = localStorage.getItem(k);
    total += k + v;
  }
  for (let i = 0; i < sessionStorage.length; i++) {
    const k = sessionStorage.key(i), v = sessionStorage.getItem(k);
    total += k + v;
  }
  total += document.cookie;
  return new Blob([total]).size;
}

function render() {
  const data = readAll(current);
  const q = $('#search').value.toLowerCase();
  const filtered = data.filter(d => d.key.toLowerCase().includes(q) || (d.value||'').toLowerCase().includes(q));
  const wrap = $('#table-wrap');
  if (!data.length) {
    wrap.innerHTML = `<div class="sv-empty">${t('empty')}</div>`;
  } else if (!filtered.length) {
    wrap.innerHTML = `<div class="sv-empty">${t('noRes')}</div>`;
  } else {
    wrap.innerHTML = `<table class="sv-table">
      <thead><tr><th>${t('key')}</th><th>${t('val')}</th><th>${t('bytes')}</th><th></th></tr></thead>
      <tbody>${filtered.map((d,i) => {
        const sz = new Blob([d.value||'']).size;
        return `<tr>
          <td class="k">${escapeHtml(d.key)}</td>
          <td class="v">${escapeHtml((d.value||'').slice(0,200))}${(d.value||'').length>200?'…':''}</td>
          <td style="color:var(--text2);font-size:.78rem">${sz}</td>
          <td class="sv-actions">
            <button onclick="editRow('${escapeAttr(d.key)}')">${t('edit')}</button>
            <button onclick="copyVal(${i})">${t('copy')}</button>
            <button class="danger" onclick="delRow('${escapeAttr(d.key)}')">${t('del')}</button>
          </td>
        </tr>`;
      }).join('')}</tbody>
    </table>`;
  }
  $('#size').innerHTML = `<b>${data.length}</b> ${t('items')} · ~<b>${estimateBytes()}</b> ${t('bytes')}`;
}

function escapeHtml(s) { return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]); }
function escapeAttr(s) { return String(s).replace(/['"\\&=;]/g, c => '\\' + c); }

function switchTab(tab) {
  current = tab;
  document.querySelectorAll('.sv-tab').forEach(b => b.classList.toggle('active', b.dataset.tab===tab));
  $('#note').style.display = tab === 'ck' ? 'block' : 'none';
  if (tab === 'ck') {
    $('#add-area').innerHTML = `<div class="sv-add">
      <input type="text" id="new-key" placeholder="${t('addKey')}">
      <textarea id="new-val" placeholder="${t('addVal')}"></textarea>
      <button class="gz-btn" onclick="addNew()">${t('add')}</button>
    </div>`;
  } else {
    $('#add-area').innerHTML = `<div class="sv-add">
      <input type="text" id="new-key" placeholder="${t('addKey')}">
      <textarea id="new-val" placeholder="${t('addVal')}"></textarea>
      <button class="gz-btn" onclick="addNew()">${t('add')}</button>
    </div>`;
  }
  render();
}

function addNew() {
  const k = $('#new-key').value.trim();
  const v = $('#new-val').value;
  if (!k) { showToast('⚠ ' + t('addKey')); return; }
  try {
    setItem(current, k, v);
    $('#new-key').value = ''; $('#new-val').value = '';
    render();
    showToast('✓');
  } catch (e) { showToast('⚠ ' + e.message); }
}

function editRow(key) {
  const data = readAll(current);
  const item = data.find(d => d.key === key);
  if (!item) return;
  editing = key;
  $('#edit-key').value = key;
  $('#edit-val').value = item.value;
  $('#edit-modal').classList.add('show');
}

function saveEdit() {
  const newK = $('#edit-key').value.trim();
  const newV = $('#edit-val').value;
  if (!newK) { showToast('⚠ ' + t('addKey')); return; }
  try {
    if (current === 'ck') {
      deleteCookie(editing);
      setCookie(newK, newV);
    } else {
      const store = getStore(current);
      if (editing !== newK) store.removeItem(editing);
      store.setItem(newK, newV);
    }
    editing = null;
    $('#edit-modal').classList.remove('show');
    render();
    showToast('✓');
  } catch (e) { showToast('⚠ ' + e.message); }
}

function delRow(key) {
  if (current === 'ck') deleteCookie(key);
  else getStore(current).removeItem(key);
  render();
  showToast('✓');
}

function copyVal(i) {
  const data = readAll(current);
  copyText(data[i].value);
}

function exportJson() {
  const data = readAll(current);
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `${current}_export.json`;
  a.click();
  URL.revokeObjectURL(url);
}

$('#search').addEventListener('input', render);

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="exportJson()">${t('export')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="if(confirm(t('confirmClear'))){clearAll(current);render()}">${t('clearAll')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="render()">${t('refresh')}</button>`;

$('#edit-title').textContent = t('editTitle');
$('#lbl-key').textContent = t('key');
$('#lbl-val').textContent = t('val');
$('#edit-save').textContent = t('save');
$('#edit-cancel').textContent = t('cancel');
$('#edit-save').onclick = saveEdit;
$('#edit-cancel').onclick = () => $('#edit-modal').classList.remove('show');
$('#search').placeholder = t('searchPH');
$('#note').textContent = t('noteSame') + ' ' + t('noteCK');

// Build tabs
const tabsData = [
  { id: 'ls', key: 'tabLS' },
  { id: 'ss', key: 'tabSS' },
  { id: 'ck', key: 'tabCK' },
];
$('#tabs').innerHTML = tabsData.map(td => {
  const cnt = td.id === 'ck' ? getCookies().length : readAll(td.id).length;
  return `<button class="sv-tab ${td.id==='ls'?'active':''}" data-tab="${td.id}" onclick="switchTab('${td.id}')">${t(td.key)}<span class="count">${cnt}</span></button>`;
}).join('');

switchTab('ls');

  category: 'dev',

  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [

    {icon:'🌐', href:'/dev/browser-info.html', name:'Browser Info'},
    {icon:'🔐', href:'/dev/base64.html', name:'Base64'},
    {icon:'📋', href:'/dev/json.html', name:'JSON Formatter'},
  ]
});
</script>
