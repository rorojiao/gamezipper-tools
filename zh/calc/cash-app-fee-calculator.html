<script>
GZI18n.register({
  en: {
    toolTitle: 'Cash App Fee Calculator',
    toolDesc: 'Calculate Cash App fees for personal, instant, business and Bitcoin transfers — instantly see what you pay, the fee, and what the recipient gets.',
    lblAmount: 'Transfer amount (USD)',

    business: 'Cash App Business / Commercial accounts pay 2.75% per transaction.',
    bitcoin: 'Cash App charges a 2.0% fee to withdraw Bitcoin.',
    step1: 'Enter the transfer amount in USD',
    step2: 'Pick the transfer type and who pays the fee',
    step3: 'Read the effective fee, sender cost and net amount',
    step4: 'Copy the breakdown for your records',
  },
  zh: {
    toolTitle: 'Cash App 手续费计算器',
    toolDesc: '计算 Cash App 个人、即时、商业和比特币转账手续费 — 即时查看你支付多少、手续费和收款人收到多少。',
    lblAmount: '转账金额（美元）',
    lblType: '转账类型',
    lblPayer: '谁支付手续费？',
    personalStandard: '个人 — 标准转账（免费，1-3 天）',
    personalInstant: '个人 — 即时到账到借记卡',
    business: '商业 / Commercial（2.75%）',
    bitcoin: '比特币提现（2.0%）',
    sender: '付款方支付手续费',
    recipient: '收款方支付手续费',
    split: '平均分担手续费',
    headline: '实际手续费',
    senderPays: '付款方支付',
    recipientGets: '收款方收到',
    youSend: '你需要发送',
    fee: 'Cash App 手续费',
    rate: '费率',
    net: '实际转账',
    formula: '公式',
    standard: 'Cash App 个人标准转账免费（0%），需要 1-3 个工作日。',
    instant: '借记卡即时到账手续费为 1.5%，最低 $0.25。',
    business: 'Cash App 商业 / Commercial 账户每笔交易 2.75%。',
    bitcoin: 'Cash App 提取比特币收取 2.0% 手续费。',
    step1: '输入转账金额（美元）',
    step2: '选择转账类型和手续费支付方',
    step3: '查看实际手续费、付款方支出和净金额',
    step4: '复制明细以备记录',
  }
});

const { $, t, formatNum } = GZ;

const RATES = {
  'personal-standard': { rate: 0,   min: 0,    cap: 0,  noteKey: 'standard' },
  'personal-instant':  { rate: 0.015, min: 0.25, cap: 0, noteKey: 'instant' },
  'business':          { rate: 0.0275, min: 0,   cap: 0, noteKey: 'business' },
  'bitcoin':           { rate: 0.02, min: 0,    cap: 0, noteKey: 'bitcoin' },
};

function calcFee(amount, type) {
  const r = RATES[type];
  if (!r) return { fee: 0, base: 0, min: 0 };
  let fee = amount * r.rate;
  if (r.min) fee = Math.max(fee, r.min);
  return { fee, base: r.rate * 100, min: r.min };
}

function render() {
  const amount = parseFloat($('#amount').value) || 0;
  const type = $('#type').value;
  const payer = $('#payer').value;
  const r = RATES[type];

  let senderPays, recipientGets, feeShown;
  if (type === 'personal-standard') {
    senderPays = amount;
    recipientGets = amount;
    feeShown = 0;
  } else if (payer === 'sender') {
    senderPays = amount + calcFee(amount, type).fee;
    recipientGets = amount;
    feeShown = calcFee(amount, type).fee;
  } else if (payer === 'recipient') {
    senderPays = amount;
    feeShown = calcFee(amount, type).fee;
    recipientGets = amount - feeShown;
  } else {
    // split
    const f = calcFee(amount, type).fee;
    feeShown = f;
    senderPays = amount + f / 2;
    recipientGets = amount - f / 2;
  }

  $('#result').innerHTML = `<div class="big">${t('headline')}: $${feeShown.toFixed(2)}</div><div class="note">${t(r.noteKey)}</div>`;
  $('#summary').innerHTML = `
    <div class="summary-cell"><div class="lbl">${t('youSend')}</div><div class="val">$${senderPays.toFixed(2)}</div></div>
    <div class="summary-cell"><div class="lbl">${t('fee')}</div><div class="val">$${feeShown.toFixed(2)}</div></div>
    <div class="summary-cell"><div class="lbl">${t('recipientGets')}</div><div class="val">$${recipientGets.toFixed(2)}</div></div>
    <div class="summary-cell"><div class="lbl">${t('rate')}</div><div class="val">${(r.rate * 100).toFixed(2)}%${r.min ? ' (min $' + r.min.toFixed(2) + ')' : ''}</div></div>
  `;
  const feeFormula = r.min ? `fee = max(amount × ${(r.rate*100).toFixed(2)}%, $${r.min.toFixed(2)})` : `fee = amount × ${(r.rate*100).toFixed(2)}%`;
  $('#formula').innerHTML = `<strong>${t('formula')}:</strong> ${feeFormula}`;
  $('#note').textContent = t(r.noteKey);
}

$('#amount').addEventListener('input', render);
$('#type').addEventListener('change', render);
$('#payer').addEventListener('change', render);

render();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',

});
</script>
