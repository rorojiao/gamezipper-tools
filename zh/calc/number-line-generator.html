<script>

    regenerate: '🔄 生成',

    lblStart: '起始值',
    lblEnd: '结束值',
    lblStep: '步长',
    lblLabel: '标签频率',
    lblThick: '线条粗细',
    lblColor: '线条颜色',
    lblArrows: '端点箭头',
    lblZero: '加粗零点',
    lblSubticks: '次刻度',
    lblMarkers: '自定义标记',
    optAll: '每个刻度',
    optMajor: '仅主要刻度',
    optNone: '不显示标签',
    step1: '设置数轴的起始值、结束值和步长',
    step2: '选择标签显示频率和刻度选项',
    step3: '按需切换箭头、加粗零点或自定义标记',
    step4: '点击「下载 PNG」或「打印」使用你的数轴',
  }
});

const { $, t } = GZ;
const canvas = $('#canvas');
const ctx = canvas.getContext('2d');

function draw() {
  const start = parseFloat($('#start').value);
  const end = parseFloat($('#end').value);
  let step = parseFloat($('#step').value);
  if (!isFinite(start) || !isFinite(end) || start >= end || !isFinite(step) || step <= 0) return;

  const color = $('#color').value;
  const thickness = parseInt($('#thickness').value);
  const arrows = $('#arrows').checked;
  const boldZero = $('#zero-bold').checked;
  const subTicks = $('#sub-ticks').checked;
  const showMarkers = $('#show-markers').checked;
  const labelMode = $('#label-mode').value;

  // Reset canvas
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  const padX = 60;
  const lineY = canvas.height / 2 + 5;
  const usableW = canvas.width - padX * 2;
  const range = end - start;

  ctx.strokeStyle = color;
  ctx.fillStyle = color;
  ctx.lineWidth = thickness;
  ctx.lineCap = 'round';

  // Main line
  ctx.beginPath();
  ctx.moveTo(padX, lineY);
  ctx.lineTo(canvas.width - padX, lineY);
  ctx.stroke();

  // Arrows
  if (arrows) {
    const ah = 14;
    ctx.beginPath();
    ctx.moveTo(padX, lineY);
    ctx.lineTo(padX + ah, lineY - ah * 0.6);
    ctx.lineTo(padX + ah, lineY + ah * 0.6);
    ctx.closePath();
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(canvas.width - padX, lineY);
    ctx.lineTo(canvas.width - padX - ah, lineY - ah * 0.6);
    ctx.lineTo(canvas.width - padX - ah, lineY + ah * 0.6);
    ctx.closePath();
    ctx.fill();
  }

  // Determine label format
  function fmt(v) {
    if (Math.abs(v) < 1e-9) return '0';
    const decimals = Math.max(0, (step.toString().split('.')[1] || '').length);
    return v.toFixed(decimals);
  }

  // Draw ticks
  const tickH = 14;
  const subH = 7;
  let isMajor = true;
  let count = 0;

  for (let v = start; v <= end + 1e-9; v += step) {
    const x = padX + ((v - start) / range) * usableW;
    isMajor = (labelMode === 'all') || (count % 1 === 0 && labelMode === 'major') || (labelMode === 'major' && count % Math.max(1, Math.round(1)) === 0);

    // Major tick (always at integer multiples of step)
    const h = tickH;
    ctx.lineWidth = thickness;
    ctx.beginPath();
    ctx.moveTo(x, lineY - h);
    ctx.lineTo(x, lineY + h);
    ctx.stroke();

    // Sub-ticks: show 4 subdivision marks between major ticks
    if (subTicks && v + step <= end + 1e-9) {
      ctx.lineWidth = Math.max(1, thickness - 1);
      for (let s = 1; s < 5; s++) {
        const sx = x + (s / 5) * (step / range) * usableW;
        ctx.beginPath();
        ctx.moveTo(sx, lineY - subH);
        ctx.lineTo(sx, lineY + subH);
        ctx.stroke();
      }
      ctx.lineWidth = thickness;
    }

    // Labels
    if (labelMode !== 'none') {
      const labelText = fmt(v);
      ctx.font = `${boldZero && Math.abs(v) < 1e-9 ? 'bold ' : ''}14px Arial, sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'top';
      ctx.fillText(labelText, x, lineY + tickH + 6);
    }

    count++;
  }

  // Custom markers (dots above the line)
  if (showMarkers) {
    const raw = ($('#marker-input').value || '').split(',');
    raw.forEach(r => {
      const v = parseFloat(r.trim());
      if (!isFinite(v) || v < start - 1e-9 || v > end + 1e-9) return;
      const x = padX + ((v - start) / range) * usableW;
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.arc(x, lineY, 7, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#ffffff';
      ctx.beginPath();
      ctx.arc(x, lineY, 3, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = color;
      ctx.font = 'bold 13px Arial, sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'bottom';
      ctx.fillText(fmt(v), x, lineY - tickH - 6);
    });
  }
}

function download() {
  draw();
  const link = document.createElement('a');
  link.download = 'number-line.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
}

function printCanvas() {
  draw();
  const win = window.open('', '_blank');
  win.document.write(`<html><head><title>Number Line</title><link rel="alternate" hreflang="en" href="https://tools.gamezipper.com/calc/number-line-generator.html">
<link rel="alternate" hreflang="zh" href="https://tools.gamezipper.com/zh/calc/number-line-generator.html">
<link rel="alternate" hreflang="x-default" href="https://tools.gamezipper.com/calc/number-line-generator.html">
<script>localStorage.setItem('gz-lang','zh');</script>
</head><body style="margin:0;padding:20px;text-align:center"><img src="${canvas.toDataURL('image/png')}" style="max-width:100%"/><script>window.onload=()=>window.print()<\/script></body></html>`);
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" id="btn-gen">${t('regenerate')}</button>
  <button class="gz-btn gz-btn-secondary" id="btn-download">${t('download')}</button>
  <button class="gz-btn gz-btn-secondary" id="btn-print">${t('print')}</button>`;

$('#lbl-start').textContent = t('lblStart');
$('#lbl-end').textContent = t('lblEnd');
$('#lbl-step').textContent = t('lblStep');
$('#lbl-label').textContent = t('lblLabel');
$('#lbl-thick').textContent = t('lblThick');
$('#lbl-color').textContent = t('lblColor');
$('#lbl-arrows').textContent = t('lblArrows');
$('#lbl-zero').textContent = t('lblZero');
$('#lbl-subticks').textContent = t('lblSubticks');
$('#lbl-markers').textContent = t('lblMarkers');
$('#opt-all').textContent = t('optAll');
$('#opt-major').textContent = t('optMajor');
$('#opt-none').textContent = t('optNone');

['start','end','step','thickness','color','label-mode','arrows','zero-bold','sub-ticks','show-markers','marker-input'].forEach(id => {
  $('#' + id).addEventListener('input', () => {
    $('#marker-input').style.display = $('#show-markers').checked ? 'block' : 'none';
    if ($('#marker-input').style.display === 'block') {
      $('#marker-input').style.cssText = 'display:block;width:100%;margin-top:8px;background:var(--glass2);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:8px 12px;font-size:.9em';
      $('#marker-input').placeholder = '3,5,-2 (comma-separated values)';
    }
    draw();
  });
});

$('#btn-gen').onclick = draw;
$('#btn-download').onclick = download;
$('#btn-print').onclick = printCanvas;

draw();

GZ.renderToolPage({

    {href:'/calc/equation-solver.html',icon:'📐',name:'Equation Solver'},
    {href:'/calc/fraction-calculator.html',icon:'½',name:'Fraction Calculator'},
  ]
});
</script>
