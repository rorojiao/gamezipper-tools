<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "How do I convert US shoe size to EU?", "acceptedAnswer": {"@type": "Answer", "text": "For men's shoes, add 31 to the US size to get EU (e.g. US 9 ≈ EU 42). For women's, add 30 (e.g. US 8 ≈ EU 38). The exact formula varies slightly by brand, so use the chart in the tool to find a comfortable range."}}, {"@type": "Question", "name": "What if I know my foot length in cm?", "acceptedAnswer": {"@type": "Answer", "text": "Measure your foot in the evening (feet swell during the day) and convert cm directly to EU, US or JP using the table. For example, a 25.5 cm foot is approximately US 8 (men), EU 41, UK 7, JP 25.5."}}, {"@type": "Question", "name": "Do men's and women's shoe sizes differ?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. In US sizing, women's sizes are typically 1.5 to 2 sizes larger than men's for the same foot length. EU sizing is unisex, but the conversion formulas differ."}}, {"@type": "Question", "name": "How accurate are online shoe size converters?", "acceptedAnswer": {"@type": "Answer", "text": "They are highly accurate for most international brands. However, athletic shoes (Nike, Adidas), dress shoes, and boots may differ by 0.5 size or have different lasts. Always try before buying when possible."}}, {"@type": "Question", "name": "How do I measure my foot at home?", "acceptedAnswer": {"@type": "Answer", "text": "Stand on a piece of paper with your heel against a wall, mark the tip of your longest toe, then measure the distance in cm. Measure both feet and use the larger measurement, ideally at the end of the day."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>

  </div>
  <div class="gz-tool-area">

    <div class="conv-row">
      <div>
        <label id="lbl-foot"></label>
        <input type="number" id="foot-cm" step="0.1" min="8" max="35" value="25.5">
      </div>
      <div class="scale-arrow">⇄</div>
      <div>
        <label id="lbl-region"></label>
        <select id="region">
          <option value="us-m">US (Men)</option>
          <option value="us-w" selected>US (Women)</option>
          <option value="uk">UK</option>
          <option value="eu">EU</option>
          <option value="jp">JP (cm)</option>
        </select>
      </div>
    </div>
    <div class="conv-row">
      <div>
        <label id="lbl-size"></label>
        <input type="number" id="size-input" step="0.5" value="8">
      </div>
      <div class="scale-arrow">→</div>
      <div>
        <label id="lbl-info"></label>
        <input type="text" id="info" readonly>
      </div>
    </div>
    <h3 id="all-title" style="margin-top:22px"></h3>
    <div class="results-grid" id="all-results"></div>
    <h3 id="chart-title" style="margin-top:22px"></h3>

      <table class="chart-table" id="chart-table"></table>
    </div>
  </div>

</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Shoe Size Converter',
    toolDesc: 'Convert shoe sizes between US, UK, EU, JP and foot length in cm or inches. Includes men, women and kids charts.',
    male: 'Men', female: 'Women', kid: 'Kids',
    lblFoot: 'Foot length (cm)',
    lblRegion: 'Region / system',
    lblSize: 'Size in selected system',
    lblInfo: 'Your foot',
    allTitle: 'Equivalent sizes in all systems',
    chartTitle: 'Size chart',
    men: 'Men', women: 'Women', kids: 'Kids',
    step1: 'Pick men, women or kids tab',
    step2: 'Enter foot length in cm (or pick a size)',
    step3: 'Choose region/system to convert from',
    step4: 'See the equivalent size in all 5 systems',
  },
  zh: {
    toolTitle: '鞋码转换器',
    toolDesc: '在美码、英码、欧码、日码和脚长厘米数之间转换。包含男款、女款和儿童尺码表。',
    male: '男', female: '女', kid: '童',
    lblFoot: '脚长 (厘米)',
    lblRegion: '地区/系统',
    lblSize: '所选系统的尺码',
    lblInfo: '脚长',
    allTitle: '所有系统的等效尺码',
    chartTitle: '尺码对照表',
    men: '男款', women: '女款', kids: '童款',
    step1: '选择男款、女款或童款',
    step2: '输入脚长厘米数（或选择一个尺码）',
    step3: '选择要转换的地区/系统',
    step4: '查看所有 5 个系统的等效尺码',
  }
});

const { $, t } = GZ;

// Conversion tables (foot length in cm at the middle of the size)
// Each entry: {us_m, us_w, uk, eu, jp, kid_us, kid_eu, kid_uk}
const TABLE = [];
// Generate from cm 8.5 to 32 in 0.5 increments using standard formulas
// US Men: size = (cm / 2.54 * 3) - 22 ≈ 3*cm/2.54 - 22
// US Women: us_m - 1 (roughly)
// UK: us_m - 0.5
// EU: us_m + 31
// JP: cm
// Kids US: (cm / 2.54 * 3) - 26.5
// Kids EU: (cm / 2.54 * 3) - 11.5
function buildRow(cm) {
  const usM = +(3 * cm / 2.54 - 22).toFixed(1);
  const usW = +(usM - 1).toFixed(1);
  const uk = +(usM - 0.5).toFixed(1);
  const eu = Math.round(usM + 31);
  const kidUS = +(3 * cm / 2.54 - 26.5).toFixed(1);
  const kidEU = Math.round(kidUS + 11.5);
  const kidUK = +(kidUS - 0.5).toFixed(1);
  return { cm, usM, usW, uk, eu, jp: cm, kidUS, kidEU, kidUK };
}
for (let cm = 8.5; cm <= 32; cm += 0.5) TABLE.push(buildRow(cm));

let currentGender = 'female';

function setGender(g) {
  currentGender = g;
  document.querySelectorAll('.gender-tabs button').forEach(b => b.classList.toggle('active', b.dataset.g === g));
  update();
  renderChart();
}

function cmToSize(cm, system) {
  if (TABLE.length === 0) return 0;
  // Find closest table row
  let best = TABLE[0], bestDiff = Math.abs(cm - TABLE[0].cm);
  for (const r of TABLE) {
    const d = Math.abs(cm - r.cm);
    if (d < bestDiff) { best = r; bestDiff = d; }
  }
  let size = 0;
  if (system === 'us-m') size = best.usM;
  else if (system === 'us-w') size = best.usW;
  else if (system === 'uk') size = best.uk;
  else if (system === 'eu') size = best.eu;
  else if (system === 'jp') size = best.jp;
  return size;
}

function sizeToCm(size, system) {
  if (TABLE.length === 0) return 0;
  // Find table row whose size in the system is closest to the input
  let best = TABLE[0], bestDiff = Infinity;
  for (const r of TABLE) {
    let s = 0;
    if (system === 'us-m') s = r.usM;
    else if (system === 'us-w') s = r.usW;
    else if (system === 'uk') s = r.uk;
    else if (system === 'eu') s = r.eu;
    else if (system === 'jp') s = r.jp;
    const d = Math.abs(s - size);
    if (d < bestDiff) { best = r; bestDiff = d; }
  }
  return best.cm;
}

function update() {
  const region = $('#region').value;
  const cm = parseFloat($('#foot-cm').value) || 0;
  const sizeInput = parseFloat($('#size-input').value) || 0;
  // Always show the cm value as foot length
  $('#info').value = cm + ' cm (' + (cm / 2.54).toFixed(2) + ' in)';
  // Compute sizes in all 5 systems based on cm
  const closest = TABLE.reduce((a, b) => Math.abs(b.cm - cm) < Math.abs(a.cm - cm) ? b : a, TABLE[0]);
  const all = $('#all-results');
  const cards = [
    { l: 'US (Men)', v: closest.usM },
    { l: 'US (Women)', v: closest.usW },
    { l: 'UK', v: closest.uk },
    { l: 'EU', v: closest.eu },
    { l: 'JP', v: closest.jp + ' cm' },
  ];
  all.innerHTML = cards.map(c => `<div class="res-card"><div class="lab">${c.l}</div><div class="val">${c.v}</div></div>`).join('');
}

function renderChart() {
  const tbl = $('#chart-table');
  const head = currentGender === 'kid' ?
    `<tr><th>${t('chartTitle')}</th><th>US (Kids)</th><th>EU</th><th>UK</th><th>JP (cm)</th></tr>` :
    `<tr><th>${t('chartTitle')}</th><th>US ${currentGender === 'male' ? '(M)' : '(W)'}</th><th>UK</th><th>EU</th><th>JP (cm)</th></tr>`;
  let body = '';
  const start = currentGender === 'kid' ? 8.5 : 20;
  const end = currentGender === 'kid' ? 22 : 32;
  for (const r of TABLE) {
    if (r.cm < start || r.cm > end) continue;
    let usCell, euCell, ukCell;
    if (currentGender === 'kid') {
      usCell = r.kidUS; euCell = r.kidEU; ukCell = r.kidUK;
    } else if (currentGender === 'male') {
      usCell = r.usM; euCell = r.eu; ukCell = r.uk;
    } else {
      usCell = r.usW; euCell = r.eu; ukCell = r.uk;
    }
    body += `<tr><td>${r.cm} cm</td><td>${usCell}</td><td>${ukCell}</td><td>${euCell}</td><td>${r.jp}</td></tr>`;
  }
  tbl.innerHTML = head + body;
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="$('#foot-cm').value=25.5;update()">📏 25.5cm</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#foot-cm').value=27;update()">📏 27cm (M 9)</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#foot-cm').value=22.5;update()">📏 22.5cm (W 6)</button>`;

const tabs = document.createElement('div');
tabs.innerHTML = `
  <div class="gender-tabs">
    <button data-g="female" class="active">👩 ${t('female')}</button>
    <button data-g="male">👨 ${t('male')}</button>
    <button data-g="kid">🧒 ${t('kid')}</button>
  </div>`;
tabs.querySelectorAll('button').forEach(b => b.onclick = () => setGender(b.dataset.g));
$('#gender-tabs').replaceWith(tabs.firstElementChild);

$('#lbl-foot').textContent = t('lblFoot');
$('#lbl-region').textContent = t('lblRegion');
$('#lbl-size').textContent = t('lblSize');
$('#lbl-info').textContent = t('lblInfo');
$('#all-title').textContent = t('allTitle');
$('#chart-title').textContent = t('chartTitle');

$('#foot-cm').addEventListener('input', update);
$('#size-input').addEventListener('input', () => {
  // When user types a size, compute cm and update
  const size = parseFloat($('#size-input').value) || 0;
  const region = $('#region').value;
  const cm = sizeToCm(size, region);
  $('#foot-cm').value = cm.toFixed(1);
  update();
});
$('#region').addEventListener('change', () => {
  // When user changes region, convert the size field to that region's size
  const cm = parseFloat($('#foot-cm').value) || 0;
  const region = $('#region').value;
  const size = cmToSize(cm, region);
  $('#size-input').value = Number(size.toFixed(1));
  update();
});

GZ.renderToolPage({
  category: 'convert',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📏', href:'/convert/unit.html', name:'Unit Converter'},
    {icon:'👕', href:'/convert/clothing-size.html', name:'Clothing Size'},
    {icon:'💍', href:'/convert/ring-size.html', name:'Ring Size'},
    {icon:'🌡️', href:'/convert/cooking-converter.html', name:'Cooking Converter'},
  ]
});

update();
renderChart();
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
