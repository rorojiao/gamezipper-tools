    theme: '主题 / 词语',
    placeholder: '自然、爱情、海洋、月光…',
    type: '诗歌类型',
    haiku: '俳句',

    acrostic: '藏头诗',

    copy: '复制诗歌',

    step1: '输入一个主题、词语或短语',
    step2: '选择诗歌类型（俳句、打油诗等）',
    step3: '点击"生成诗歌"',
    step4: '复制诗歌或重新生成',
  }
});

const { $, copyText, t } = GZ;

const pick = arr => arr[Math.floor(Math.random() * arr.length)];

const themes = {
  nature: {
    nouns: ['river','mountain','forest','breeze','petal','stream','valley','meadow','cloud','rainbow','leaf','flower','bird','sunset','dawn','ocean','wave','tree','stone','snow'],
    verbs: ['whispers','dances','blooms','flows','rises','falls','sings','glows','drifts','sways','paints','breathes','shimmers','echoes','sparkles'],
    adjs: ['golden','silent','ancient','gentle','wild','soft','bright','deep','vast','tender','crystal','endless','peaceful','vivid','fragrant'],
  },
  love: {
    nouns: ['heart','kiss','dream','embrace','soul','flame','star','rose','song','promise','whisper','touch','moon','light','ocean','memory','tear','smile','hope','forever'],
    verbs: ['beats','yearns','burns','glows','aches','trembles','lingers','shines','embraces','whispers','sings','blooms','soars','melts','entwines'],
    adjs: ['tender','eternal','passionate','gentle','fierce','sweet','warm','silent','golden','deep','endless','radiant','beloved','cherished','devoted'],
  },
  ocean: {
    nouns: ['wave','tide','shore','depth','current','coral','shell','sail','horizon','storm','beach','sea','salt','mist','wind','harbor','lighthouse','island','pearl','trident'],
    verbs: ['crashes','rolls','sighs','roars','rises','ebbs','flows','crashes','shimmers','calls','weeps','thunders','whispers','drifts','plunges'],
    adjs: ['endless','deep','azure','turquoise','wild','calm','ancient','vast','mysterious','silver','dark','crystal','silent','stormy','boundless'],
  },
  moon: {
    nouns: ['moon','night','star','shadow','light','sky','beam','phase','crater','orbit','silence','dream','wolf','owl','dew','frost','mist','silver','pale','glow'],
    verbs: ['glows','wanes','waxes','shines','rises','casts','illuminates','watches','guides','whispers','wakes','shimmers','gleams','hovers','blankets'],
    adjs: ['silver','pale','quiet','luminous','ethereal','cold','mysterious','bright','soft','crystalline','midnight','celestial','ghostly','holy','serene'],
  },
  time: {
    nouns: ['clock','hour','moment','memory','past','future','season','year','century','yesterday','tomorrow','eternity','tick','dawn','twilight','age','era','echo','history','lifetime'],
    verbs: ['passes','fades','lingers','races','crawls','freezes','melts','slips','marches','pauses','flees','waits','breathes','transforms','vanishes'],
    adjs: ['fleeting','eternal','ancient','brief','endless','slow','rapid','distant','timeless','precious','golden','faded','distant','wistful','patient'],
  },
  fire: {
    nouns: ['flame','spark','ember','ash','smoke','blaze','inferno','torch','candle','hearth','phoenix','sun','forge','warmth','glow','heat','light','kindle','bonfire','scorch'],
    verbs: ['burns','flickers','dances','roars','consumes','ignites','blazes','simmers','glows','rages','warms','melts','rises','sparks','devours'],
    adjs: ['fierce','warm','bright','wild','golden','crimson','blazing','intense','gentle','molten','radiant','scorching','fiery','glowing','red-hot'],
  },
};

// Fallback word banks
const defaultNouns = ['light','shadow','dream','whisper','song','echo','silence','breath','dust','star','rain','stone','wind','flame','wave'];
const defaultVerbs = ['dances','whispers','fades','rises','falls','sings','glows','drifts','shimmers','echoes','breathes','blooms','weeps','soars','lingers'];
const defaultAdjs = ['gentle','ancient','soft','bright','deep','wild','golden','silent','vast','tender','crystal','endless','vivid','fragrant','sacred'];

function getThemeBank(theme) {
  const lower = (theme || '').toLowerCase();
  for (const [key, bank] of Object.entries(themes)) {
    if (lower.includes(key)) return bank;
  }
  // Return mixed bank
  return { nouns: defaultNouns, verbs: defaultVerbs, adjs: defaultAdjs };
}

function generateHaiku(bank) {
  const n = pick(bank.nouns);
  const v = pick(bank.verbs);
  const a = pick(bank.adjs);
  const n2 = pick(bank.nouns.filter(x => x !== n));
  const a2 = pick(bank.adjs.filter(x => x !== a));
  const patterns = [
    [`${a} ${n} ${v}`, `${v} through the ${n2}`, `${a2} light of dawn`],
    [`old ${a} ${n}`, `a ${n2} ${v} softly`, `${v} in the ${a2} dark`],
    [`${n} ${v} now`, `the ${a} ${n2} awaits`, `silent as the ${a2} wind`],
    [`soft ${a} ${v}`, `${n} meets the ${a2} ${n2}`, `${v} into silence`],
    [`${a2} as the ${n}`, `${v} beyond the ${n2}`, `one ${a} moment stays`],
  ];
  return pick(patterns);
}

function generateLimerick(bank) {
  const n1 = pick(bank.nouns);
  const a1 = pick(bank.adjs);
  const v1 = pick(bank.verbs);
  const n2 = pick(bank.nouns.filter(x => x !== n1));
  const n3 = pick(bank.nouns.filter(x => x !== n1 && x !== n2));
  const patterns = [
    [`A ${a1} old ${n1} from the sea,`, `Once ${v1.replace(/s$/,'ed')} a ${n2} wild and free,`, `It ${v1} with delight,`, `From morning till night,`, `And ${pick(bank.verbs)} with the ${n3} in glee.`],
    [`There once was a ${n1} so ${a1},`, `Who ${v1.replace(/s$/,'ed')} a ${n2} under the moon,`, `The ${n3} it did ${pick(bank.verbs)},`, `Through ${a1} afternoons,`, `And ${pick(bank.verbs)} a most ${pick(bank.adjs)} tune.`],
  ];
  return pick(patterns);
}

function generateFreeVerse(bank, theme) {
  const lines = [];
  const used = new Set();
  for (let i = 0; i < 8 + Math.floor(Math.random() * 6); i++) {
    const n = pick(bank.nouns.filter(x => !used.has(x)));
    used.add(n);
    const v = pick(bank.verbs);
    const a = pick(bank.adjs);
    const patterns = [
      `The ${a} ${n} ${v}`,
      `${v}, the ${n} ${pick(bank.adjs)} and untamed`,
      `I watch the ${n} ${v}`,
      `${a} ${n}, you ${v} through my ${pick(bank.nouns)}`,
      `and still the ${n} ${v}`,
      `${pick(bank.adjs)} as a ${n}`,
      `where ${n2 => pick(bank.nouns)}s ${v} in the ${a} ${pick(bank.nouns)}`,
      `the ${n} knows no ${a} ${pick(bank.nouns)}`,
      `between the ${a} ${pick(bank.nouns)} and the ${n}`,
      `listen: the ${n} ${v} still`,
    ];
    lines.push(pick(patterns));
  }
  return lines;
}

function generateAcrostic(bank, word) {
  const lines = [];
  for (const ch of word.toUpperCase()) {
    if (ch === ' ') { lines.push(''); continue; }
    const startsWith = (w) => w.toUpperCase().startsWith(ch);
    const matchingNouns = bank.nouns.filter(startsWith);
    const matchingAdjs = bank.adjs.filter(startsWith);
    const matchingVerbs = bank.verbs.filter(v => v.toUpperCase().startsWith(ch));
    
    const noun = matchingNouns.length > 0 ? pick(matchingNouns) : pick(bank.nouns);
    const adj = matchingAdjs.length > 0 ? pick(matchingAdjs) : pick(bank.adjs);
    
    const patterns = [
      `${adj} ${noun} ${pick(bank.verbs)}`,
      `${adj} as the ${pick(bank.nouns)}, it ${pick(bank.verbs)}`,
      `${adj} ${pick(bank.nouns)} ${pick(bank.verbs)} through ${pick(bank.adjs)} ${pick(bank.nouns)}`,
      `${adj} and ${pick(bank.adjs)}, the ${noun} ${pick(bank.verbs)}`,
    ];
    lines.push(pick(patterns));
  }
  return lines;
}

function generateCouplet(bank) {
  const n1 = pick(bank.nouns);
  const a1 = pick(bank.adjs);
  const v1 = pick(bank.verbs);
  const n2 = pick(bank.nouns.filter(x => x !== n1));
  const a2 = pick(bank.adjs.filter(x => x !== a1));
  return [
    `The ${a1} ${n1} ${v1} through ${a2} ${pick(bank.nouns)},`,
    `While ${a1.toLowerCase()} ${n2}s ${pick(bank.verbs)} beneath the moon.`,
  ];
}

function generate() {
  const theme = document.getElementById('themeInput').value.trim() || 'nature';
  const type = document.getElementById('typeSelect').value;
  const bank = getThemeBank(theme);
  let lines, title;

  switch (type) {
    case 'haiku':
      lines = generateHaiku(bank);
      title = 'Haiku';
      break;
    case 'limerick':
      lines = generateLimerick(bank);
      title = 'Limerick';
      break;
    case 'freeverse':
      lines = generateFreeVerse(bank, theme);
      title = 'Free Verse';
      break;
    case 'acrostic':
      lines = generateAcrostic(bank, theme);
      title = `Acrostic: ${theme.toUpperCase()}`;
      break;
    case 'couplet':
      lines = generateCouplet(bank);
      title = 'Rhyming Couplet';
      break;
    default:
      lines = generateHaiku(bank);
      title = 'Haiku';
  }

  const output = $('#output');
  output.innerHTML = `<div class="title">${title}</div>` +
    lines.map(l => `<div class="line">${l || '&nbsp;'}</div>`).join('<br>');
  output.dataset.text = [title, '', ...lines].join('\n');
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="generate()">${t('generate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="copyText($('#output').dataset.text||'')">${t('copy')}</button>`;

$('#controls').innerHTML = `
  <label>${t('theme')}: <input type="text" id="themeInput" placeholder="${t('placeholder')}" style="width:200px"></label>
  <label>${t('type')}: <select id="typeSelect">
    <option value="haiku">${t('haiku')}</option>
    <option value="limerick">${t('limerick')}</option>
    <option value="freeverse">${t('freeVerse')}</option>
    <option value="acrostic">${t('acrostic')}</option>
    <option value="couplet">${t('couplet')}</option>
  </select></label>`;

generate();

</script>
