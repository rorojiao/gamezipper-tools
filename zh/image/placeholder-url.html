<script type="application/ld+json">{"@context":"https://schema.org","@type":"WebApplication","name":"Placeholder Image URL Generator","description":"Generate placeholder image URLs for mockups and prototypes. Build links for placehold.co, dummyimage.com, picsum.photos and more — custom size, colors and text, instant preview, free.","url": "https://tools.gamezipper.com/zh/image/placeholder-url.html","applicationCategory":"Utility","operatingSystem":"Web Browser","offers":{"@type":"Offer","price":"0"}}</script>
<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is a placeholder image URL?", "acceptedAnswer": {"@type": "Answer", "text": "A placeholder image URL points to an image served by a placeholder service (like placehold.co or picsum.photos). You embed it in your HTML while building a site so layouts look realistic before you have final artwork — the service renders the image on the fly."}}, {"@type": "Question", "name": "Which placeholder image services are supported?", "acceptedAnswer": {"@type": "Answer", "text": "This generator builds URLs for four popular services: placehold.co (custom size, colors and text), dummyimage.com (similar with format options), picsum.photos (random real photos by Lorem Picsum) and via.placeholder.com. Each has slightly different URL syntax, which the builder handles for you."}}, {"@type": "Question", "name": "Can I add custom text and colors to a placeholder?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. With placehold.co and dummyimage.com you can set a background color, text color and custom label (like your dimensions or a project name). picsum.photos serves random stock photos instead and does not support custom text."}}, {"@type": "Question", "name": "Do I need to upload anything?", "acceptedAnswer": {"@type": "Answer", "text": "No. This tool only builds a URL string in your browser. The actual image is fetched from the placeholder service when a visitor loads your page — nothing is uploaded from your side."}}]}</script>

<div class="gz-container">
  <div class="gz-tool-header"><h1 id="title"></h1><p class="desc" id="desc"></p></div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <p style="color:var(--text2);font-size:.85rem;margin-bottom:6px" id="svcLabel"></p>
    <div class="svc-grid" id="services"></div>
    <div class="controls" id="controls"></div>
    <div class="preview-area"><img id="preview" alt="placeholder preview"><div id="warnText" style="color:#ffd93d;font-size:.78rem;text-align:center"></div></div>

</div>
<script>
GZI18n.register({
  en:{toolTitle:'Placeholder Image URL Generator',toolDesc:'Build placeholder image URLs for placehold.co, dummyimage.com, picsum.photos and more. Custom size, colors and text — copy URL, Markdown or HTML instantly.',
    svcPlacehold:'placehold.co',svcDummy:'dummyimage.com',svcPicsum:'picsum.photos',svcPlaceholder:'placeholder.com',
    width:'Width',height:'Height',bgColor:'Background',textColor:'Text color',customText:'Custom text',
    noTextSupport:'This service does not support custom text — it serves a random photo.',
    url:'URL',markdown:'Markdown',html:'HTML',
    step1:'Pick a placeholder service',step2:'Set width and height (in pixels)',step3:'Choose background and text colors, plus optional custom text',step4:'Copy the URL, Markdown or HTML snippet into your project'},
  zh:{toolTitle:'占位图 URL 生成器',toolDesc:'为 placehold.co、dummyimage.com、picsum.photos 等服务生成占位图 URL。自定义尺寸、颜色和文字 — 一键复制 URL、Markdown 或 HTML。',
    svcPlacehold:'placehold.co',svcDummy:'dummyimage.com',svcPicsum:'picsum.photos',svcPlaceholder:'placeholder.com',
    width:'宽度',height:'高度',bgColor:'背景色',textColor:'文字色',customText:'自定义文字',
    noTextSupport:'该服务不支持自定义文字 — 它提供随机图片。',
    url:'URL',markdown:'Markdown',html:'HTML',
    step1:'选择占位图服务',step2:'设置宽度和高度（像素）',step3:'选择背景色和文字色，可添加自定义文字',step4:'复制 URL、Markdown 或 HTML 到你的项目'}
});
const {$,copyText,t}=GZ;
let svc='placehold',W=600,H=400,bg='cccccc',fg='333333',text='Hello',tab='url';

function hexNoHash(c){return c.replace('#','');}

function buildURL(){
  const w=W,h=H,bgN=hexNoHash(bg),fgN=hexNoHash(fg);
  const enc=s=>encodeURIComponent(s);
  let url='';
  if(svc==='placehold'){
    url=`https://placehold.co/${w}x${h}/${bgN}/${fgN}`+(text?`/${enc(text).replace(/%20/g,' ')}`:'');
  } else if(svc==='dummy'){
    url=`https://dummyimage.com/${w}x${h}/${bgN}/${fgN}`+(text?`&text=${enc(text)}`:'');
  } else if(svc==='picsum'){
    url=`https://picsum.photos/${w}/${h}`;
  } else { // placeholder.com
    url=`https://via.placeholder.com/${w}x${h}/${bgN}/${fgN}`+(text?`?text=${enc(text)}`:'');
  }
  return url;
}

function update(){
  const url=buildURL();
  $('#url').textContent=url;
  $('#preview').src=url;
  $('#preview').onerror=function(){this.style.opacity=.4;};
  $('#preview').onload=function(){this.style.opacity=1;};
  // text-supported warning
  const warn=$('#warnText');
  if(svc==='picsum'){warn.textContent='⚠ '+t('noTextSupport');}
  else{warn.textContent='';}
  // code block
  if(tab==='url'){$('#code').textContent=url;}
  else if(tab==='markdown'){$('#code').textContent=`![${text||'placeholder'}](${url})`;}
  else{$('#code').textContent=`<img src="${url}" alt="${text||'placeholder'}" width="${W}" height="${H}">`;}
}

function renderServices(){
  $('#services').innerHTML=[
    ['placehold','svcPlacehold'],['dummy','svcDummy'],['picsum','svcPicsum'],['placeholder','svcPlaceholder']
  ].map(s=>`<button class="${s[0]===svc?'active':''}" onclick="svc='${s[0]}';renderServices();update()">${t(s[1])}</button>`).join('');
}

function renderTabs(){
  $('#tabs').innerHTML=[['url','url'],['markdown','markdown'],['html','html']].map(s=>`<button class="${s[0]===tab?'active':''}" onclick="tab='${s[0]}';renderTabs();update()">${t(s[1])}</button>`).join('');
}

$('#svcLabel').textContent=t('svcPlacehold').split(' ')[0]+':';
$('#controls').innerHTML=`
  <label>${t('width')}: <input type="number" id="w" min="8" max="4000" value="${W}" style="width:80px" oninput="W=Math.max(8,Math.min(4000,+this.value||8));update()"></label>
  <label>${t('height')}: <input type="number" id="h" min="8" max="4000" value="${H}" style="width:80px" oninput="H=Math.max(8,Math.min(4000,+this.value||8));update()"></label>
  <label>${t('bgColor')}: <input type="color" value="#${bg}" oninput="bg=hexNoHash(this.value);update()"></label>
  <label>${t('textColor')}: <input type="color" value="#${fg}" oninput="fg=hexNoHash(this.value);update()"></label>
  <label>${t('customText')}: <input type="text" id="ct" value="${text}" style="width:140px" oninput="text=this.value;update()"></label>`;
$('#toolbar').innerHTML=`<button class="gz-btn gz-btn-secondary" onclick="W=600;H=400;bg='cccccc';fg='333333';text='Hello';svc='placehold';\$('#w').value=600;\$('#h').value=400;\$('#ct').value='Hello';document.querySelectorAll('.controls input[type=color]')[0].value='#cccccc';document.querySelectorAll('.controls input[type=color]')[1].value='#333333';renderServices();update()">${t('example')}</button><button class="gz-btn" onclick="copyText($('#url').textContent)">${t('copy')} URL</button><button class="gz-btn gz-btn-secondary" onclick="copyText($('#code').textContent)">${t('copy')} ${t('markdown')}</button>`;
renderServices();renderTabs();update();
GZ.renderToolPage({category:'image',titleKey:'toolTitle',descKey:'toolDesc',howToSteps:['step1','step2','step3','step4'],related:[
  {icon:'🖼️',href:'/image/placeholder-image-generator.html',name:'Placeholder Image'},
  {icon:'📦',href:'/image/compressor.html',name:'Compressor'},
  {icon:'📐',href:'/image/resizer.html',name:'Resizer'},
]});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
