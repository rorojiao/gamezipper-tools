<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is claymorphism?", "acceptedAnswer": {"@type": "Answer", "text": "Claymorphism is a UI design style that mimics soft, 3D clay or plastic elements. It uses large border-radius, layered box-shadows (outer drop shadow + inner light shadow on top + inner dark shadow on bottom) and pastel colors to create a tactile, squishy look."}}, {"@type": "Question", "name": "How is claymorphism different from neumorphism?", "acceptedAnswer": {"@type": "Answer", "text": "Neumorphism blends elements into the background with subtle light/dark shadows. Claymorphism makes elements pop out with bold rounded shapes, vibrant pastel colors and more pronounced 3D shadows — giving a softer, more playful look."}}, {"@type": "Question", "name": "Does claymorphism work in all browsers?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. Claymorphism uses standard CSS properties (background, border-radius, box-shadow) that are supported in all browsers including older ones. No backdrop-filter or modern features required."}}, {"@type": "Question", "name": "Can I customize the colors?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. Use the color pickers to change the background color, and the light/dark shadow colors to match your design. Pastel and light colors work best for the clay effect."}}]}</script>

<script>
GZI18n.register({
  en: {
    toolTitle: 'Claymorphism CSS Generator',
    toolDesc: 'Design soft clay-style UI elements visually. Adjust radius, layered shadows and colors — copy production-ready CSS instantly.',
    radius: 'Border Radius (px)',
    outShadow: 'Outer Shadow Size',
    inLight: 'Inner Light Shadow',
    inDark: 'Inner Dark Shadow',
    bgColor: 'Background Color',
    textColor: 'Text Color',
    lightShadow: 'Light Shadow Color',
    darkShadow: 'Dark Shadow Color',
    step1: 'Adjust radius and shadow sliders on the left',
    step2: 'Watch the live preview update in real time',
    step3: 'Customize colors with the color pickers',
    step4: 'Click Copy CSS and paste into your project',
  },
  zh: {
    toolTitle: '粘土拟态 CSS 生成器',
    toolDesc: '可视化设计柔和粘土风格的 UI 元素。调整圆角、多层阴影和颜色 — 即时复制生产可用的 CSS 代码。',
    radius: '圆角 (px)',
    outShadow: '外阴影大小',
    inLight: '内亮阴影',
    inDark: '内暗阴影',
    bgColor: '背景颜色',
    textColor: '文字颜色',
    lightShadow: '亮部阴影色',
    darkShadow: '暗部阴影色',
    step1: '调整左侧的圆角和阴影滑块',
    step2: '实时查看预览效果更新',
    step3: '使用颜色选择器自定义颜色',
    step4: '点击「复制 CSS」并粘贴到你的项目中',
  }
});

const { $, copyText, t } = GZ;
const state = { radius: 30, outShadow: 12, inLight: 8, inDark: 8, bg: '#e8e8f0', text: '#5a5a8a', light: '#ffffff', dark: '#c3c3d9' };

function buildCSS() {
  return `.clay {\n  background-color: ${state.bg};\n  color: ${state.text};\n  border-radius: ${state.radius}px;\n  box-shadow:\n    ${state.outShadow}px ${state.outShadow}px ${state.outShadow*2}px rgba(0, 0, 0, 0.15),\n    inset ${state.inLight}px ${state.inLight}px ${state.inLight*2}px ${state.light},\n    inset -${state.inDark}px -${state.inDark}px ${state.inDark*2}px ${state.dark};\n}`;
}

function hexToRgba(hex, a) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

function render() {
  const pv = $('#preview');
  pv.style.backgroundColor = state.bg;
  pv.style.color = state.text;
  pv.style.borderRadius = state.radius + 'px';
  pv.style.boxShadow = `${state.outShadow}px ${state.outShadow}px ${state.outShadow*2}px rgba(0,0,0,0.15), inset ${state.inLight}px ${state.inLight}px ${state.inLight*2}px ${state.light}, inset -${state.inDark}px -${state.inDark}px ${state.inDark*2}px ${state.dark}`;
  $('#output').textContent = buildCSS();
}

function buildControls() {
  const items = [
    {key:'radius', min:0, max:60, step:1},
    {key:'outShadow', min:0, max:30, step:1},
    {key:'inLight', min:0, max:20, step:1},
    {key:'inDark', min:0, max:20, step:1},
  ];
  let html = '';
  items.forEach(it => {
    html += `<div><label>${t(it.key)} <span id="val-${it.key}">${state[it.key]}</span></label>`;
    html += `<input type="range" min="${it.min}" max="${it.max}" step="${it.step}" value="${state[it.key]}" oninput="state.${it.key}=+this.value;$('#val-${it.key}').textContent=this.value;render()"></div>`;
  });
  html += `<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">`;
  html += `<div><label>${t('bgColor')}</label><input type="color" value="${state.bg}" oninput="state.bg=this.value;render()"></div>`;
  html += `<div><label>${t('textColor')}</label><input type="color" value="${state.text}" oninput="state.text=this.value;render()"></div>`;
  html += `<div><label>${t('lightShadow')}</label><input type="color" value="${state.light}" oninput="state.light=this.value;render()"></div>`;
  html += `<div><label>${t('darkShadow')}</label><input type="color" value="${state.dark}" oninput="state.dark=this.value;render()"></div>`;
  html += `</div>`;
  $('#controls').innerHTML = html;
}

$('#lbl-out').textContent = t('preview') || 'Preview';
$('#lbl-css').textContent = t('cssOutput') || 'CSS Output';

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="copyText(buildCSS())">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="Object.assign(state,{radius:30,outShadow:12,inLight:8,inDark:8,bg:'#e8e8f0',text:'#5a5a8a',light:'#ffffff',dark:'#c3c3d9'});buildControls();render()">${t('reset')||'Reset'}</button>`;

buildControls();
render();

GZ.renderToolPage({
  category: 'css',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'✨', href:'/css-tools/neumorphism-generator.html', name:'Neumorphism'},
    {icon:'🪟', href:'/css-tools/glassmorphism-generator.html', name:'Glassmorphism'},
    {icon:'🔲', href:'/css-tools/box-shadow.html', name:'Box Shadow'},
    {icon:'🌈', href:'/css-tools/gradient.html', name:'Gradient'},
  ]
});
</script>
