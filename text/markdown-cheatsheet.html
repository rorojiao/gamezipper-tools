// Simple markdown renderer
function escapeHtml(s) {
return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function renderMarkdown(md) {
let html = md;

// Code blocks (fenced)
html = html.replace(/```(\w*)\n([\s\S]*?)```/g, (m, lang, code) => {
return `<pre><code class="language-${lang}">${escapeHtml(code)}</code></pre>`;
});

// Headings
html = html.replace(/^###### (.*$)/gim, '<h6>$1</h6>');
html = html.replace(/^##### (.*$)/gim, '<h5>$1</h5>');
html = html.replace(/^#### (.*$)/gim, '<h4>$1</h4>');
html = html.replace(/^### (.*$)/gim, '<h3>$1</h3>');
html = html.replace(/^## (.*$)/gim, '<h2>$1</h2>');
html = html.replace(/^# (.*$)/gim, '<h1>$1</h1>');

// Horizontal rule
html = html.replace(/^---$/gim, '<hr>');

// Bold and italic
html = html.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
html = html.replace(/~~(.+?)~~/g, '<del>$1</del>');
html = html.replace(/`(.+?)`/g, '<code>$1</code>');

// Blockquotes
html = html.replace(/^&gt; (.+)$/gim, '<blockquote>$1</blockquote>');
html = html.replace(/<\/blockquote>\n<blockquote>/g, '<br>');

// Task lists
html = html.replace(/^- \[ \] (.+)$/gim, '<li>☐ $1</li>');
html = html.replace(/^- \[x\] (.+)$/gim, '<li>☑ $1</li>');

// Unordered lists
html = html.replace(/^[\*\-\+] (.+)$/gim, '<li>$1</li>');

// Ordered lists
html = html.replace(/^\d+\. (.+)$/gim, '<li>$1</li>');

// Wrap consecutive <li> in <ul>
html = html.replace(/(<li>.*?<\/li>\n?)+/g, m => `<ul>${m}</ul>`);

// Links
html = html.replace(/\[([^\]]+)\]\(([^)]+)(?:\s+"([^"]+)")?\)/g, '<a href="$2" title="$3">$1</a>');

// Images
html = html.replace(/!\[([^\]]*)\]\(([^)]+)(?:\s+"([^"]+)")?\)/g, '<img src="$2" alt="$1" title="$3">');

// Tables
html = html.replace(/(\|.+\|\n\|[\s\-:|]+\|\n(?:\|.+\|\n?)+)/g, m => {
const rows = m.trim().split('\n');
const headers = rows[0].split('|').slice(1, -1).map(h => h.trim());
const body = rows.slice(2).map(r => r.split('|').slice(1, -1).map(c => c.trim()));
return `<table>
<thead><tr>${headers.map(h => `<th>${h}</th>`).join('')}</tr></thead>
<tbody>${body.map(r => `<tr>${r.map(c => `<td>${c}</td>`).join('')}</tr>`).join('')}</tbody>
</table>`;
});

// Paragraphs
html = html.split('\n\n').map(p => {
if (p.match(/^<(h\d|ul|ol|li|pre|blockquote|hr|table|img)/)) return p;
if (p.trim() === '') return '';
return `<p>${p.replace(/\n/g, '<br>')}</p>`;
}).join('\n');

return html;
}
