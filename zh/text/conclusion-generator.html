<div class="gz-container">

<script>
GZI18n.register({
  en: {
    toolTitle: 'Conclusion Generator',
    toolDesc: 'Generate a strong conclusion paragraph for any essay or article in seconds. Restate your thesis, summarize key points, and end with impact. Free, browser-based, no signup.',
    lblThesis: 'Your thesis statement',
    lblPoints: 'Main points (one per line)',
    lblFinal: 'Closing thought, call to action, or implication (optional)',
    phThesis: 'Paste your thesis here...',
    phPoints: 'First key point\nSecond key point\nThird key point',
    phFinal: 'e.g. readers should reconsider their habits, more research is needed, this matters for everyone',
    emptyHint: 'Fill in your thesis and main points, then click Generate Conclusion.',
    tip: 'Tip: A strong conclusion never introduces new evidence. Restate your thesis in fresh words, synthesize (don\'t just list) your points, and end with a thought that lingers.',
    statWords: 'Words', statSents: 'Sentences', statRead: 'Read time',
    btnGenerate: 'Generate Conclusion', btnCopy: 'Copy', btnExample: 'Example', btnClear: 'Clear',
    step1: 'Paste your thesis statement',
    step2: 'List your main points, one per line',
    step3: 'Add an optional closing thought or call to action',
    step4: 'Click Generate Conclusion, review and refine, then copy',
  },
  zh: {
    toolTitle: '论文结论生成器',
    toolDesc: '几秒内为任意论文或文章生成强有力的结论段落。重申论点、综合要点、以影响力结尾。免费、浏览器本地运行、无需注册。',
    lblThesis: '你的论点陈述',
    lblPoints: '主要论点（每行一个）',
    lblFinal: '结尾思考、行动号召或延伸意义（可选）',
    phThesis: '在此粘贴你的论点...',
    phPoints: '第一个关键论点\n第二个关键论点\n第三个关键论点',
    phFinal: '如：读者应重新审视自己的习惯、需要更多研究、这与每个人息息相关',
    emptyHint: '填写论点和主要论点，然后点击「生成结论」。',
    tip: '提示：强有力的结论绝不引入新证据。用新的措辞重申论点，综合（而非罗列）你的论点，并以耐人寻味的思考结尾。',
    statWords: '字数', statSents: '句子数', statRead: '阅读时间',
    btnGenerate: '生成结论', btnCopy: '复制', btnExample: '示例', btnClear: '清空',
    step1: '粘贴你的论点陈述',
    step2: '列出主要论点，每行一个',
    step3: '可选添加结尾思考或行动号召',
    step4: '点击「生成结论」，审阅润色后复制',
  }
});

const { $, copyText, t } = GZ;

const OPENERS = ['Ultimately,', 'In the end,', 'Taken together,', 'All things considered,', 'When viewed as a whole,', 'In conclusion,'];
const RESTATE = [
  (th) => `the central claim that ${lower(th)} remains as compelling as ever.`,
  (th) => `the argument outlined above continues to hold true.`,
  (th) => `the evidence leaves little doubt about ${lower(th)}.`,
  (th) => `this essay has shown that ${lower(th)}.`,
];
const SYNTH = [
  (pts) => `What emerges from ${pts} is not a list of separate findings, but a single, interconnected picture.`,
  (pts) => `Considered together, ${pts} reinforce one another in ways that strengthen the overall argument.`,
  (pts) => `Each of these points — ${pts} — builds on the last to paint a fuller picture than any single one could.`,
  (pts) => `Far from standing alone, ${pts} combine to make a case that is difficult to dismiss.`,
];
const CLOSERS_DEFAULT = [
  'If we are serious about addressing this issue, the time to act is now.',
  'What happens next depends on choices we have not yet made.',
  'The conversation, in other words, is far from over.',
  'Whether we embrace it or resist it, this issue will shape the years to come.',
  'In the end, what is at stake is nothing less than how we choose to live together.',
];

function lower(s){
  if(!s) return s;
  s = s.trim().replace(/[.!?]+$/,'');
  if(/^[A-Z]/.test(s) && !/^[A-Z]{2,}/.test(s)) return s.charAt(0).toLowerCase()+s.slice(1);
  return s;
}
function cap(s){ if(!s) return s; s=s.trim(); return s.charAt(0).toUpperCase()+s.slice(1); }
function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }

function listPoints(raw){
  const arr = raw.split(/\n+/).map(s=>s.trim().replace(/^[-*•]\s*/,'').replace(/\.$/,'')).filter(Boolean).map(lower);
  if(arr.length===0) return '';
  if(arr.length===1) return arr[0];
  if(arr.length===2) return arr[0]+' and '+arr[1];
  return arr.slice(0,-1).join(', ')+', and '+arr[arr.length-1];
}

function generate(){
  const thesis = $('#thesis').value.trim();
  if(!thesis){ $('#output').innerHTML = `<em style="color:var(--text2)">${t('emptyHint')}</em>`; $('#stats').innerHTML=''; return; }
  const pointsRaw = $('#points').value.trim();
  const final = $('#final').value.trim();
  const opener = pick(OPENERS);
  const restate = pick(RESTATE)(thesis);
  let middle = '';
  if(pointsRaw){
    const pts = listPoints(pointsRaw);
    middle = ' '+pick(SYNTH)(pts);
  }
  const closer = final ? cap(final.replace(/[.!?]+$/,''))+'.' : pick(CLOSERS_DEFAULT);
  const paragraph = `${opener} ${restate}${middle} ${closer}`;
  $('#output').innerHTML = `<p>${escapeHtml(paragraph)}</p>`;
  renderStats(paragraph);
  $('#tip').textContent = t('tip');
}

function renderStats(text){
  const words = (text.match(/\S+/g)||[]).length;
  const sents = (text.match(/[.!?]+/g)||[]).length || 1;
  const read = Math.max(1, Math.round(words/200));
  $('#stats').innerHTML = `
    <div class="cc-stat"><div class="num">${words}</div><div class="lbl">${t('statWords')}</div></div>
    <div class="cc-stat"><div class="num">${sents}</div><div class="lbl">${t('statSents')}</div></div>
    <div class="cc-stat"><div class="num">~${read} min</div><div class="lbl">${t('statRead')}</div></div>`;
}

function escapeHtml(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function loadExample(){
  $('#thesis').value = 'social media should be more strictly regulated to protect teenagers';
  $('#points').value = 'unregulated platforms expose teens to cyberbullying\nmisinformation spreads faster than it can be corrected\nheavy use is linked to rising rates of anxiety and depression';
  $('#final').value = 'parents, educators and policymakers share responsibility for change';
  generate();
}

function doClear(){ $('#thesis').value=''; $('#points').value=''; $('#final').value=''; $('#output').innerHTML=''; $('#stats').innerHTML=''; }

$('#lbl-thesis').textContent = t('lblThesis');
$('#lbl-points').textContent = t('lblPoints');
$('#lbl-final').textContent = t('lblFinal');
$('#thesis').placeholder = t('phThesis');
$('#points').placeholder = t('phPoints');
$('#final').placeholder = t('phFinal');
$('#output').innerHTML = `<em style="color:var(--text2)">${t('emptyHint')}</em>`;
$('#tip').textContent = t('tip');

$('#toolbar').innerHTML = `
  <button class="gz-btn" id="btn-gen">${t('btnGenerate')}</button>
  <button class="gz-btn gz-btn-secondary" id="btn-cp">${t('btnCopy')}</button>
  <button class="gz-btn gz-btn-secondary" id="btn-ex">${t('btnExample')}</button>
  <button class="gz-btn gz-btn-secondary" id="btn-cl">${t('btnClear')}</button>`;
$('#btn-gen').addEventListener('click', generate);
$('#btn-cp').addEventListener('click', () => { const p = $('#output').querySelector('p'); if(p) copyText(p.textContent); });
$('#btn-ex').addEventListener('click', loadExample);
$('#btn-cl').addEventListener('click', doClear);

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🎓', href:'/text/thesis-statement-generator.html', name:'Thesis Generator'},
    {icon:'🎣', href:'/text/essay-hook-generator.html', name:'Essay Hook'},
    {icon:'📋', href:'/text/outline-generator.html', name:'Essay Outline'},
    {icon:'🔄', href:'/text/paraphraser.html', name:'Paraphraser'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
