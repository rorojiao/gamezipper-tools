<script>
GZI18n.register({
  en: {
    toolTitle: 'Android Assetlinks.json Generator',
    toolDesc: 'Generate an assetlinks.json file for verified Android App Links. Configure package name, multiple SHA-256 fingerprints and relation — copy or download instantly. Free, browser-only.',
    lblPkg: 'Package Name',
    lblFp: 'SHA-256 Certificate Fingerprints',
    lblRel: 'Relation (permission)',
    addFp: '+ Add Fingerprint',
    remove: '✕',
    outLabel: 'Generated assetlinks.json',
    copy: 'Copy JSON',
    download: 'Download File',
    generate: 'Generate',
    note: '💡 Serve at https://yourdomain.com/.well-known/assetlinks.json with Content-Type: application/json over HTTPS. For Play App Signing, add both the upload key and the app signing key SHA-256 fingerprints.',
    s1: 'Enter your app package name (e.g. com.example.app)',
    s2: 'Add one or more SHA-256 certificate fingerprints',
    s3: 'Choose the relation — handle_all_urls for App Links, or handle_login / get_login_creds for credential sharing',
    s4: 'Copy the JSON and serve from /.well-known/assetlinks.json',
    rAasa: 'AASA Generator', rManifest: 'PWA Manifest', rHtaccess: '.htaccess', rNginx: 'Nginx Config', rUrl: 'URL Parser', rSsl: 'SSL Checker'
  },
  zh: {
    toolTitle: 'Android Assetlinks.json 生成器',
    toolDesc: '生成已验证的 Android App Links 所需的 assetlinks.json 文件。配置包名、多个 SHA-256 证书指纹和 relation — 一键复制或下载。免费，浏览器本地运行。',
    lblPkg: '包名（Package Name）',
    lblFp: 'SHA-256 证书指纹',
    lblRel: 'Relation（权限）',
    addFp: '+ 添加指纹',
    remove: '✕',
    outLabel: '生成的 assetlinks.json',
    copy: '复制 JSON',
    download: '下载文件',
    generate: '生成',
    note: '💡 部署到 https://yourdomain.com/.well-known/assetlinks.json，Content-Type: application/json，必须 HTTPS。使用 Play App Signing 时需同时添加上传密钥和应用签名密钥的 SHA-256 指纹。',
    s1: '输入 App 包名（如 com.example.app）',
    s2: '添加一个或多个 SHA-256 证书指纹',
    s3: '选择 relation — handle_all_urls 用于 App Links，handle_login / get_login_creds 用于凭据共享',
    s4: '复制 JSON，部署到 /.well-known/assetlinks.json',
    rAasa: 'AASA 生成器', rManifest: 'PWA Manifest', rHtaccess: '.htaccess', rNginx: 'Nginx 配置', rUrl: 'URL 解析器', rSsl: 'SSL 检查'
  }
});

const { $, copyText, t } = GZ;
let fps = ['10:F2:0A:BC:1D:E2:5F:34:67:89:0A:BC:DE:F1:23:45:67:89:0A:BC:DE:F1:23:45:67:89:0A:BC:DE:F1:23:45'];

function esc(s){return (s||'').replace(/"/g,'&quot;');}

function renderFps(){
  $('#fps').innerHTML = fps.map((f,i)=>`
    <div class="fp-row">
      <input type="text" data-i="${i}" value="${esc(f)}" placeholder="10:F2:0A:BC:1D:E2:5F:34:67:89:0A:BC:DE:F1:23:45:67:89:0A:BC:DE:F1:23:45:67:89:0A:BC:DE:F1:23:45">
      <button class="rm" onclick="removeFp(${i})" title="${t('remove')}">✕</button>
    </div>`).join('') + `<button class="gz-btn gz-btn-secondary" style="font-size:.78rem;padding:3px 10px;margin-top:4px" onclick="addFp()">${t('addFp')}</button>`;
  bindFpInputs();
}
function bindFpInputs(){
  document.querySelectorAll('#fps input').forEach(el=>{
    el.oninput=()=>{fps[+el.dataset.i]=el.value;generate();};
  });
}
function addFp(){fps.push('');renderFps();generate();}
function removeFp(i){fps.splice(i,1);if(fps.length===0)fps.push('');renderFps();generate();}

function generate(){
  const pkg=($('#pkg').value||'com.example.app').trim();
  const rel=($('#relation').value||'delegate_permission/common.handle_all_urls').trim();
  const cleanedFps=fps.map(f=>f.trim().toUpperCase()).filter(Boolean);
  const entry={
    relation:[rel],
    target:{
      namespace:'android_app',
      package_name:pkg,
      sha256_cert_header_fingerprints:cleanedFps.length?cleanedFps:['PLACEHOLDER_SHA256_FINGERPRINT']
    }
  };
  $('#output').textContent=JSON.stringify([entry],null,2);
}

function downloadFile(){
  const blob=new Blob([$('#output').textContent],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='assetlinks.json';
  document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(url);
}

$('#pkg').oninput=generate;
$('#relation').oninput=generate;
$('#outLabel').textContent=t('outLabel');
$('#note').textContent=t('note');
$('#lblPkg').textContent=t('lblPkg');
$('#lblFp').textContent=t('lblFp');
$('#lblRel').textContent=t('lblRel');

$('#toolbar').innerHTML=`
  <button class="gz-btn" onclick="generate()">${t('generate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="downloadFile()">${t('download')}</button>`;

renderFps();
generate();

GZ.renderToolPage({
  category:'dev',
  titleKey:'toolTitle',
  descKey:'toolDesc',
  howToSteps:['s1','s2','s3','s4'],
  related:[
    {icon:'🍎',href:'/dev/apple-app-site-association.html',nameKey:'rAasa'},
    {icon:'📱',href:'/dev/webmanifest.html',nameKey:'rManifest'},
    {icon:'🛠️',href:'/dev/htaccess.html',nameKey:'rHtaccess'},
    {icon:'📄',href:'/dev/nginx-config.html',nameKey:'rNginx'},
    {icon:'🔗',href:'/dev/url-parser.html',nameKey:'rUrl'},
    {icon:'🔒',href:'/dev/ssl-checker.html',nameKey:'rSsl'}
  ]
});
</script>
