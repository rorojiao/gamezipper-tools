    r1: '第一轮', r2: '第二轮', r3: '第三轮', qf: '四分之一决赛', sf: '半决赛', f: '决赛', champion: '冠军',
    round: '第',

    print: '打印 / 另存为 PDF',
    reset: '重置',
    example: '加载 8 人示例',
    infoText: '点击选手名称可以输入或编辑。点击胜者将其晋级到下一轮（败者会被划掉）。点击打印按钮可将对阵表保存为 PDF。',
    step1: '选择对阵表规模（2-64 名）和种子排序方式',
    step2: '输入参赛者姓名，每行一个',

const { $, t, showToast, copyText } = GZ;
let state = { size: 8, names: [], matches: [] };

function powerOfTwo(n) { return n & (n - 1) === 0; }
function nextPow2(n) { return Math.pow(2, Math.ceil(Math.log2(Math.max(2, n)))); }

function standardSeeding(size) {
  // Standard tournament seeding: 1 vs N, 2 vs N-1, etc., with 1 vs 16, 8 vs 9
  function build(players) {
    if (players.length < 2) return players;
    if (players.length === 2) return players;
    const mid = players.length / 2;
    const top = build(players.slice(0, mid));
    const bot = build(players.slice(mid));
    const out = [];
    for (let i = 0; i < top.length; i++) {
      out.push(top[i]);
      out.push(bot[top.length - 1 - i]);
    }
    return out;
  }
  return build(Array.from({length: size}, (_, i) => i + 1));
}

function getSeedOrder(size) {
  const mode = $('#seed').value;
  if (mode === 'random') {
    const arr = Array.from({length: size}, (_, i) => i + 1);
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }
  if (mode === 'input') return Array.from({length: size}, (_, i) => i + 1);
  return standardSeeding(size);
}

function roundLabel(round, total) {
  if (round === total) return t('champion');
  if (total === 2) return t('f');
  if (total === 4) return round === 1 ? t('sf') : t('f');
  if (total === 8) {
    if (round === 1) return t('qf');
    if (round === 2) return t('sf');
    return t('f');
  }
  if (total === 16) {
    if (round === 1) return t('r1');
    if (round === 2) return t('qf');
    if (round === 3) return t('sf');
    return t('f');
  }
  if (total === 32) {
    if (round === 1) return t('r1');
    if (round === 2) return t('r2');
    if (round === 3) return t('qf');
    if (round === 4) return t('sf');
    return t('f');
  }
  if (total === 64) {
    if (round === 1) return t('r1');
    if (round === 2) return t('r2');
    if (round === 3) return t('r3');
    if (round === 4) return t('qf');
    if (round === 5) return t('sf');
    return t('f');
  }
  return `${t('round')} ${round}`;
}

function rebuild() {
  const size = parseInt($('#size').value);
  const namesRaw = $('#names').value.split('\n').map(s => s.trim()).filter(Boolean);
  // Pad up to size with empty
  const names = namesRaw.slice(0, size);
  while (names.length < size) names.push('');

  // Reorder by seed if not "input" order
  const seed = getSeedOrder(size);
  const seededNames = new Array(size);
  for (let i = 0; i < size; i++) {
    seededNames[seed[i] - 1] = names[i];
  }

  state = { size, names: seededNames, matches: [] };

  // Build matches
  // Round 1 has size/2 matches
  // For each subsequent round, half
  const totalRounds = Math.log2(size);
  for (let r = 0; r < totalRounds; r++) {
    const matchesInRound = size / Math.pow(2, r + 1);
    const round = [];
    for (let m = 0; m < matchesInRound; m++) {
      let s1 = '', s2 = '';
      if (r === 0) {
        s1 = seededNames[m * 2] || '';
        s2 = seededNames[m * 2 + 1] || '';
      }
      round.push({ s1, s2, winner: null });
    }
    state.matches.push(round);
  }

  render();
}

function render() {
  const bracket = $('#bracket');
  const totalRounds = state.matches.length;
  const totalMatches = state.size - 1;
  const byes = state.size - state.names.filter(Boolean).length;
  $('#stats').innerHTML = `
    <div class="item"><strong>${totalMatches}</strong>${t('matches')}</div>
    <div class="item"><strong>${totalRounds}</strong>${t('rounds')}</div>
    <div class="item"><strong>${byes}</strong>${t('byes')}</div>
    <div class="item"><strong>${state.names.filter(Boolean).length}</strong>/${state.size} players</div>
  `;
  let html = '';
  state.matches.forEach((round, ri) => {
    const lbl = roundLabel(ri + 1, totalRounds);
    html += `<div class="tb-round"><h4>${lbl}</h4>`;
    round.forEach((m, mi) => {
      // For r>0, get winners from previous round
      let s1 = m.s1, s2 = m.s2;
      if (ri > 0) {
        const prev = state.matches[ri - 1];
        s1 = prev[mi * 2].winner || '';
        s2 = prev[mi * 2 + 1].winner || '';
      }
      const w = m.winner;
      const c1 = w === 1 ? 'winner' : (w === 2 ? 'loser' : (s1 ? '' : 'empty'));
      const c2 = w === 2 ? 'winner' : (w === 1 ? 'loser' : (s2 ? '' : 'empty'));
      const slot1 = ri === 0
        ? `<input type="text" value="${escapeHtml(s1)}" placeholder="Player ${mi*2+1}" onchange="updateSlot(${ri},${mi},1,this.value)">`
        : escapeHtml(s1) || '—';
      const slot2 = ri === 0
        ? `<input type="text" value="${escapeHtml(s2)}" placeholder="Player ${mi*2+2}" onchange="updateSlot(${ri},${mi},2,this.value)">`
        : escapeHtml(s2) || '—';
      html += `<div class="tb-match">
        <div class="slot ${c1}" onclick="pickWinner(${ri},${mi},1)">${slot1}</div>
        <div class="slot ${c2}" onclick="pickWinner(${ri},${mi},2)">${slot2}</div>
      </div>`;
    });
    html += `</div>`;
  });
  bracket.innerHTML = html;
  $('#info').textContent = t('infoText');
}

function escapeHtml(s) {
  return String(s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function updateSlot(ri, mi, si, val) {
  state.matches[ri][mi]['s' + si] = val;
  // Reset winners after round 0
  state.matches[ri][mi].winner = null;
  for (let r = ri + 1; r < state.matches.length; r++) {
    state.matches[r].forEach(m => m.winner = null);
  }
  render();
}

function pickWinner(ri, mi, si) {
  const m = state.matches[ri][mi];
  if (ri === 0 && (!m.s1 || !m.s2)) {
    if (si === 1 && !m.s1) return;
    if (si === 2 && !m.s2) return;
  }
  m.winner = si;
  // Reset downstream
  for (let r = ri + 1; r < state.matches.length; r++) {
    state.matches[r].forEach(mm => mm.winner = null);
  }
  render();
}

function reset() {
  $('#names').value = '';
  state.matches.forEach(round => round.forEach(m => m.winner = null));
  render();
}

function loadExample() {
  $('#names').value = ['Alice', 'Bob', 'Charlie', 'Diana', 'Eve', 'Frank', 'Grace', 'Henry'].join('\n');
  $('#size').value = '8';
  rebuild();
}

$('#names').addEventListener('input', rebuild);

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="window.print()">${t('print')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="reset()">${t('reset')}</button>`;

rebuild();

    {icon:'🪙', href:'/fun/coin-flipper.html', name:'Coin Flipper'},
  ]
});
</script>
