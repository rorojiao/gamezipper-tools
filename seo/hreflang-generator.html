<script>
GZI18n.register({
  en: {
    toolTitle: 'Hreflang Tag Generator',
    toolDesc: 'Generate hreflang link tags for multilingual and multi-regional websites with x-default support and full HTML head injection.',
    infoHtml: '<b>💡 What this does:</b> Generate <code>&lt;link rel="alternate" hreflang="..."&gt;</code> tags to tell Google which version of a page to show in which language/region. The tags must be placed in the <code>&lt;head&gt;</code> of every page in the language group, and each page must reference all sibling pages.',
    hdrVariants: 'Language / Region Variants',
    presets: 'Quick add:',
    addRow: 'Add language variant',
    copy: 'Copy',
    copyAll: 'Copy all',
    clear: 'Clear',
    example: 'Load example',
    langCode: 'Lang code (e.g. en, es, fr, de, zh)',
    regionCode: 'Optional region (US, GB, MX…)',
    pageUrl: 'Page URL (absolute, https://…)',
    includeXDefault: 'Include x-default',
    outputEmpty: 'Add at least one language variant above to generate tags.',
    step1: 'Add all language/region variants of your page (one row per version)',
    step2: 'Optionally add an x-default for the language-selector fallback',
    step3: 'Switch between HTML &lt;head&gt;, standalone &lt;link&gt;, HTTP header or sitemap',
    step4: 'Copy and paste the result into your site\'s &lt;head&gt; or sitemap',
  },
  zh: {
    toolTitle: 'Hreflang 标签生成器',
    toolDesc: '为多语言和多区域网站生成 hreflang 链接标签，支持 x-default 和完整 HTML head 注入。',
    infoHtml: '<b>💡 功能说明：</b> 生成 <code>&lt;link rel="alternate" hreflang="..."&gt;</code> 标签，告诉 Google 在哪个语言/区域显示哪个页面版本。标签必须放在同一语言组每个页面的 <code>&lt;head&gt;</code> 中，并且每个页面必须引用所有同级页面。',
    hdrVariants: '语言 / 区域变体',
    presets: '快速添加：',
    addRow: '添加语言变体',
    copy: '复制',
    copyAll: '复制全部',
    clear: '清空',
    example: '加载示例',
    langCode: '语言代码（如 en, es, fr, de, zh）',
    regionCode: '可选区域（US, GB, MX…）',
    pageUrl: '页面 URL（绝对地址，https://…）',
    includeXDefault: '包含 x-default',
    outputEmpty: '请添加至少一个语言变体以生成标签。',
    step1: '添加页面的所有语言/区域变体（每个版本一行）',
    step2: '（可选）为语言选择器回退页面添加 x-default',
    step3: '在 HTML &lt;head&gt;、独立 &lt;link&gt;、HTTP 头或 sitemap 之间切换',
    step4: '复制并粘贴到您网站的 &lt;head&gt; 或 sitemap 中',
  }
});

const { $, copyText, t } = GZ;
let mode = 'head';
let rows = [];

const PRESETS = {
  en: [
    {lang:'en', region:'US', url:'https://example.com/page'},
    {lang:'en', region:'GB', url:'https://example.com/en-gb/page'},
    {lang:'es', region:'', url:'https://example.com/es/page'},
    {lang:'fr', region:'', url:'https://example.com/fr/page'},
  ],
  zh: [
    {lang:'zh', region:'CN', url:'https://example.com/zh-cn/page'},
    {lang:'zh', region:'TW', url:'https://example.com/zh-tw/page'},
    {lang:'en', region:'US', url:'https://example.com/en/page'},
    {lang:'ja', region:'JP', url:'https://example.com/ja/page'},
  ],
};

function escapeHtml(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function addRow(pre) {
  pre = pre || {lang:'', region:'', url:''};
  rows.push({...pre});
  render();
}

function delRow(i) { rows.splice(i, 1); render(); }

function render() {
  const html = rows.map((r, i) => `
    <div class="hf-row">
      <input type="text" placeholder="${t('langCode')}" value="${escapeHtml(r.lang)}" oninput="rows[${i}].lang=this.value;update()">
      <input type="text" placeholder="${t('pageUrl')}" value="${escapeHtml(r.url)}" oninput="rows[${i}].url=this.value;update()">
      <input type="text" placeholder="${t('regionCode')}" value="${escapeHtml(r.region)}" style="max-width:90px" oninput="rows[${i}].region=this.value;update()">
      <button class="x" onclick="delRow(${i})" title="Remove">×</button>
    </div>`).join('');
  $('#rows').innerHTML = html || `<div style="opacity:.6;font-size:.85em;padding:8px 0">${t('outputEmpty')}</div>`;
  update();
}

function update() {
  const output = $('#output');
  const meta = $('#meta');
  if (!rows.length) {
    output.innerHTML = `<span class="comment">${t('outputEmpty')}</span>`;
    meta.innerHTML = '';
    return;
  }
  const valid = rows.filter(r => r.lang.trim() && r.url.trim());
  if (!valid.length) {
    output.innerHTML = `<span class="comment">${t('outputEmpty')}</span>`;
    meta.innerHTML = '';
    return;
  }
  const tags = valid.map(r => {
    const code = r.region.trim() ? `${r.lang.trim()}-${r.region.trim()}` : r.lang.trim();
    return {code, url:r.url.trim()};
  });

  let result = '';
  if (mode === 'head') {
    result = '<!-- Hreflang tags — paste in <head> of every page in this language group -->\n';
    tags.forEach(t => {
      result += `<span class="tag">&lt;link</span> <span class="attr">rel=</span><span class="url">"alternate"</span> <span class="attr">hreflang=</span><span class="url">"${escapeHtml(t.code)}"</span> <span class="attr">href=</span><span class="url">"${escapeHtml(t.url)}"</span><span class="tag">&gt;</span>\n`;
    });
  } else if (mode === 'link') {
    result = '<!-- Hreflang link tags -->\n';
    tags.forEach(t => {
      result += `<span class="tag">&lt;link</span> <span class="attr">rel=</span><span class="url">"alternate"</span> <span class="attr">hreflang=</span><span class="url">"${escapeHtml(t.code)}"</span> <span class="attr">href=</span><span class="url">"${escapeHtml(t.url)}"</span><span class="tag">&gt;</span>\n`;
    });
  } else if (mode === 'http') {
    result = 'Link: ' + tags.map(t => `<${escapeHtml(t.url)}>; rel="alternate"; hreflang="${escapeHtml(t.code)}"`).join(',\n      ');
  } else if (mode === 'sitemap') {
    result = '<?xml version="1.0" encoding="UTF-8"?>\n<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9"\n        xmlns:xhtml="http://www.w3.org/1999/xhtml">\n';
    tags.forEach(t => {
      result += `  <url>\n    <loc>${escapeHtml(t.url)}</loc>\n`;
      tags.forEach(o => {
        result += `    <xhtml:link rel="alternate" hreflang="${escapeHtml(o.code)}" href="${escapeHtml(o.url)}"/>\n`;
      });
      result += `  </url>\n`;
    });
    result += '</urlset>';
  }
  output.innerHTML = result;
  meta.innerHTML = `<span>${valid.length} variant${valid.length>1?'s':''}</span><span>Mode: ${mode}</span>`;
}

function buildPresets() {
  const lang = GZI18n.getLang();
  const ps = PRESETS[lang] || PRESETS.en;
  const html = ['en-US','en-GB','es-ES','es-MX','fr-FR','de-DE','zh-CN','zh-TW','ja-JP','pt-BR'].map(c => `<button class="gz-btn gz-btn-secondary hf-preset" onclick="addRow({lang:'${c.split('-')[0]}', region:'${c.split('-')[1]||''}', url:'https://example.com/${c}/page'})">${c}</button>`).join('');
  $('#presets').innerHTML = `<span style="opacity:.7;margin-right:6px">${t('presets')}</span>${html}`;
}

function setMode(m) {
  mode = m;
  document.querySelectorAll('#tabs button').forEach(b => b.classList.toggle('active', b.dataset.mode === m));
  update();
}

$('#tabs').addEventListener('click', e => {
  if (e.target.tagName === 'BUTTON' && e.target.dataset.mode) setMode(e.target.dataset.mode);
});

$('#infoBox').innerHTML = t('infoHtml');
$('#hdr-variants').textContent = t('hdrVariants');
$('#addTxt').textContent = t('addRow');

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copyAll')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="rows=[];render()">${t('clear')}</button>`;

function loadExample() {
  const lang = GZI18n.getLang();
  rows = (PRESETS[lang] || PRESETS.en).map(p => ({...p}));
  render();
}

buildPresets();
addRow();
rows = [];render();

GZ.renderToolPage({
  category: 'seo',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🌐', href:'/seo/sitemap-generator.html', name:'Sitemap Generator'},
    {icon:'🏷️', href:'/seo/meta-tag-generator.html', name:'Meta Tag Generator'},
    {icon:'🤖', href:'/seo/robots-txt-generator.html', name:'robots.txt Generator'},
    {icon:'🔍', href:'/seo/serp-preview.html', name:'SERP Preview'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
