const { $, copyText, t } = GZ;

function doCompile(minify) {
  const scss = $('#scss-input').value.trim();
  if (!scss) return;
  try {
    // Simple SCSS-to-CSS compiler (handles variables, nesting, basic features)
    let css = compileSCSS(scss);
    if (minify) {
      css = css.replace(/\/\*[\s\S]*?\*\//g, '')
               .replace(/\s*([{}:;,>~+])\s*/g, '$1')
               .replace(/;\}/g, '}')
               .replace(/\s+/g, ' ')
               .trim();
    }
    $('#css-output').textContent = css;
    $('#status').innerHTML = `<span style="color:var(--accent)">${t('compileOk')}</span>`;
  } catch(e) {
    $('#css-output').textContent = '';
    $('#status').innerHTML = `<span style="color:#e94560">${t('compileErr')}: ${e.message}</span>`;
  }
}

function compileSCSS(source) {
  // Extract variables
  const vars = {};
  let remaining = source;

  // Remove single-line comments
  remaining = remaining.replace(/\/\/.*$/gm, '');
  // Remove multi-line comments
  remaining = remaining.replace(/\/\*[\s\S]*?\*\//g, '');

  // Extract $variable declarations at root level
  remaining = remaining.replace(/^(\s*\$[\w-]+)\s*:\s*(.+?)\s*;?\s*$/gm, (m, name, val) => {
    vars[name.trim()] = val.trim().replace(/;$/, '');
    return '';
  });

  // Replace variable references
  function replaceVars(str) {
    let result = str;
    for (const [k, v] of Object.entries(vars)) {
      const re = new RegExp('\\' + k + '\\b', 'g');
      result = result.replace(re, v);
    }
    return result;
  }

  remaining = replaceVars(remaining);

  // Process nesting
  function processNesting(css, parent) {
    let output = '';
    let i = 0;
    const len = css.length;

    while (i < len) {
      // Skip whitespace
      while (i < len && /\s/.test(css[i])) i++;
      if (i >= len) break;

      // Read selector
      let selector = '';
      let braceDepth = 0;
      const selStart = i;

      while (i < len && css[i] !== '{') {
        if (css[i] === '/' && css[i+1] === '*') {
          while (i < len && !(css[i-1] === '*' && css[i] === '/')) i++;
        }
        selector += css[i];
        i++;
      }

      selector = selector.trim();
      if (!selector || i >= len) break;

      // Skip opening brace
      i++;

      // Read block content
      let depth = 1;
      let block = '';
      while (i < len && depth > 0) {
        if (css[i] === '{') depth++;
        else if (css[i] === '}') { depth--; if (depth === 0) break; }
        block += css[i];
        i++;
      }
      i++; // skip closing brace

      // Separate properties from nested rules
      const lines = block.split('\n');
      let props = [];
      let nestedBlocks = '';
      let nestedDepth = 0;

      for (const line of lines) {
        const trimmed = line.trim();
        if (!trimmed) continue;

        // Check if line starts a nested block
        if (trimmed.includes('{') && !trimmed.startsWith('//')) {
          if (nestedDepth === 0) {
            nestedBlocks += trimmed + '\n';
          } else {
            nestedBlocks += trimmed + '\n';
          }
          nestedDepth += (trimmed.match(/{/g) || []).length;
          nestedDepth -= (trimmed.match(/}/g) || []).length;
        } else if (nestedDepth > 0) {
          nestedBlocks += trimmed + '\n';
          nestedDepth -= (trimmed.match(/}/g) || []).length;
        } else if (trimmed.includes(':') && !trimmed.includes('{')) {
          // It's a property
          const prop = trimmed.endsWith(';') ? trimmed : trimmed + ';';
          props.push(prop);
        } else {
          nestedBlocks += trimmed + '\n';
        }
      }

      // Resolve full selector
      let fullSelector;
      if (selector.startsWith('&')) {
        fullSelector = selector.replace(/&/g, parent);
      } else if (parent) {
        fullSelector = parent + ' ' + selector;
      } else {
        fullSelector = selector;
      }

      // Output properties
      if (props.length > 0) {
        output += fullSelector + ' {\n  ' + props.join('\n  ') + '\n}\n';
      }

      // Process nested blocks
      if (nestedBlocks.trim()) {
        output += processNesting(nestedBlocks, fullSelector);
      }
    }

    return output;
  }

  return processNesting(remaining, '');
}
