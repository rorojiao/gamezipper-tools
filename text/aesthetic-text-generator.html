const { $, copyText, t } = GZ;

// Full-width (Halfwidth and Fullwidth Forms U+FF01–U+FF5E)
function toFullWidth(s) {
  let out = '';
  for (const ch of s) {
    const code = ch.codePointAt(0);
    if (code >= 0x21 && code <= 0x7E) out += String.fromCodePoint(code + 0xFEE0);
    else if (code === 0x20) out += '\u3000'; // full-width space
    else out += ch;
  }
  return out;
}

// Fancy script (Mathematical Script U+1D49C)
function toScript(s) {
  let out = '';
  for (const ch of s) {
    const code = ch.codePointAt(0);
    if (code >= 0x41 && code <= 0x5A) {
      // B, E, F, H, I, L, M, R are missing/holey in the block; use Letterlike fallback
      const exc = { 0x42: 0x212C, 0x45: 0x2130, 0x46: 0x2131, 0x48: 0x210B, 0x49: 0x2110, 0x4C: 0x2112, 0x4D: 0x2133, 0x52: 0x211B };
      out += exc[code] ? String.fromCodePoint(exc[code]) : String.fromCodePoint(code - 0x41 + 0x1D49C);
    } else if (code >= 0x61 && code <= 0x7A) {
      out += String.fromCodePoint(code - 0x61 + 0x1D4B6);
    } else {
      out += ch;
    }
  }
  return out;
}

// Bubble / circled (Enclosed Alphanumerics U+24B6/U+24D0)
function toBubble(s) {
  let out = '';
  for (const ch of s) {
    const code = ch.codePointAt(0);
    if (code >= 0x41 && code <= 0x5A) out += String.fromCodePoint(code - 0x41 + 0x24B6);
    else if (code >= 0x61 && code <= 0x7A) out += String.fromCodePoint(code - 0x61 + 0x24D0);
    else if (code === 0x30) out += '\u24EA';
    else if (code >= 0x31 && code <= 0x39) out += String.fromCodePoint(code - 0x31 + 0x2460);
    else out += ch;
  }
  return out;
}

// Vaporwave = full-width + tilde separators
function toVaporwave(s) {
  return toFullWidth(s);
}

const FNS = { fullWidth: toFullWidth, fancyScript: toScript, bubble: toBubble, vaporwave: toVaporwave };
let currentStyle = 'fullWidth';

function processText() {
  const text = $('#input').value;
  if (!text) { $('#output').textContent = ''; return; }
  $('#output').textContent = FNS[currentStyle](text);
}

$('#input').addEventListener('input', processText);

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="setStyle('fullWidth',this)">${t('fullWidth')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="setStyle('fancyScript',this)">${t('fancyScript')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="setStyle('bubble',this)">${t('bubble')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="setStyle('vaporwave',this)">${t('vaporwave')}</button>
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#input').value='';$('#output').textContent=''">${t('clear')}</button>`;

function setStyle(key, btn) {
  currentStyle = key;
  processText();
  btn.parentElement.querySelectorAll('.gz-btn').forEach(b => {
    b.classList.remove('gz-btn-active');
    b.classList.add('gz-btn-secondary');
  });
  btn.classList.add('gz-btn-active');
  btn.classList.remove('gz-btn-secondary');
}
