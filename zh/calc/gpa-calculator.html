<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "How is GPA calculated?", "acceptedAnswer": {"@type": "Answer", "text": "GPA is the weighted average of grade points. For each course, multiply the grade points (A=4, B=3, C=2, D=1, F=0) by the course's credit hours. Sum these products and divide by the total credit hours. The result is your GPA on a 4.0 scale."}}, {"@type": "Question", "name": "What is the difference between GPA and CGPA?", "acceptedAnswer": {"@type": "Answer", "text": "GPA (Grade Point Average) is usually calculated for a single semester or term. CGPA (Cumulative Grade Point Average) is the weighted average across all semesters completed, providing an overall academic standing."}}, {"@type": "Question", "name": "What is a good GPA?", "acceptedAnswer": {"@type": "Answer", "text": "A 3.0 GPA is roughly a B average and considered good. A 3.5+ GPA is very good and meets requirements for most honors programs. A 4.0 is the highest possible on the standard scale and represents straight A's. Top universities typically admit students with 3.7+ GPAs."}}, {"@type": "Question", "name": "What GPA scales are supported?", "acceptedAnswer": {"@type": "Answer", "text": "This calculator supports 4.0 (US standard), 4.3 (some Canadian universities with A+), 5.0 (weighted/Honors/AP), 10.0 (Indian/CBSE/ICSE system) and percentage (out of 100). You can switch between them at any time."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <label style="font-size:.85em;color:var(--text2);font-weight:600" id="lbl-scale"></label>
    <div class="gpa-scale" id="scale">
      <button data-scale="4.0" class="active">4.0</button>
      <button data-scale="4.3">4.3</button>
      <button data-scale="5.0">5.0</button>
      <button data-scale="10.0">10.0</button>
      <button data-scale="100">%</button>
    </div>
    <table class="gpa-table">
      <thead><tr>
        <th id="th-name"></th>
        <th id="th-grade" style="width:140px"></th>
        <th id="th-credit" style="width:110px"></th>
        <th style="width:50px"></th>
      </tr></thead>
      <tbody id="courses"></tbody>
    </table>
    <div class="gpa-add">
      <button class="gz-btn gz-btn-secondary" onclick="addRow()">+ <span id="lbl-add"></span></button>
    </div>
    <div class="gpa-results" id="results"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'GPA Calculator',
    toolDesc: 'Calculate your GPA and CGPA instantly on 4.0, 4.3, 5.0, 10.0 or percentage scale. Add courses with letter grades and credits — fully in your browser.',
    lblScale: 'Grading Scale',
    thName: 'Course Name',
    thGrade: 'Grade',
    thCredit: 'Credits',
    lblAdd: 'Add Course',
    gradeA: 'A+ (4.0)', gradeAminus: 'A  (4.0)', gradeBplus: 'B+ (3.3)', gradeB: 'B  (3.0)', gradeBminus: 'B- (2.7)',
    gradeCplus: 'C+ (2.3)', gradeC: 'C  (2.0)', gradeCminus: 'C- (1.7)', gradeDplus: 'D+ (1.3)', gradeD: 'D  (1.0)', gradeF: 'F  (0.0)',
    step1: 'Select your grading scale (4.0, 4.3, 5.0, 10.0, or percentage)',
    step2: 'Add each course with its name, letter grade and credit hours',
    step3: 'Watch your GPA update instantly as you type',
    step4: 'Add a second semester and combine them for CGPA calculation',
  },
  zh: {
    toolTitle: 'GPA 计算器',
    toolDesc: '即时计算你的 GPA 和 CGPA,支持 4.0、4.3、5.0、10.0 和百分制。添加课程、字母等级和学分 — 完全浏览器本地运行。',
    lblScale: '评分制',
    thName: '课程名称',
    thGrade: '成绩',
    thCredit: '学分',
    lblAdd: '添加课程',
    gradeA: 'A+ (4.0)', gradeAminus: 'A  (4.0)', gradeBplus: 'B+ (3.3)', gradeB: 'B  (3.0)', gradeBminus: 'B- (2.7)',
    gradeCplus: 'C+ (2.3)', gradeC: 'C  (2.0)', gradeCminus: 'C- (1.7)', gradeDplus: 'D+ (1.3)', gradeD: 'D  (1.0)', gradeF: 'F  (0.0)',
    step1: '选择评分制 (4.0、4.3、5.0、10.0 或百分制)',
    step2: '添加每门课程的名称、字母成绩和学分',
    step3: '输入时 GPA 即时更新',
    step4: '添加第二学期并合并计算 CGPA',
  }
});

const { $, t } = GZ;
let currentScale = '4.0';

const gradePoints = {
  '4.0': {'A+':4.0,'A':4.0,'A-':3.7,'B+':3.3,'B':3.0,'B-':2.7,'C+':2.3,'C':2.0,'C-':1.7,'D+':1.3,'D':1.0,'F':0.0},
  '4.3': {'A+':4.3,'A':4.0,'A-':3.7,'B+':3.3,'B':3.0,'B-':2.7,'C+':2.3,'C':2.0,'C-':1.7,'D+':1.3,'D':1.0,'F':0.0},
  '5.0': {'A+':5.0,'A':5.0,'A-':4.7,'B+':4.3,'B':4.0,'B-':3.7,'C+':3.3,'C':3.0,'C-':2.7,'D+':2.3,'D':2.0,'F':0.0},
  '10.0':{'O':10,'A+':9,'A':8.5,'B+':8,'B':7,'C':6,'D':5,'F':0},
  '100': {}
};

function gradeOptions() {
  const scale = currentScale;
  if (scale === '100') {
    return ['100','95','90','85','80','75','70','65','60','55','50','45','40','35','30','0'];
  }
  return Object.keys(gradePoints[scale]);
}

function addRow() {
  const tbody = $('#courses');
  const tr = document.createElement('tr');
  const opts = gradeOptions();
  tr.innerHTML = `
    <td data-label="${t('thName')}"><input type="text" class="gpa-row-name" placeholder="Course"></td>
    <td data-label="${t('thGrade')}"><select>${opts.map(g => `<option value="${g}">${g}</option>`).join('')}</select></td>
    <td data-label="${t('thCredit')}"><input type="number" min="0" max="20" step="0.5" value="3"></td>
    <td><button class="rm" title="Remove">×</button></td>`;
  tr.querySelector('.rm').onclick = () => { tr.remove(); calc(); };
  tr.querySelectorAll('input,select').forEach(el => el.addEventListener('input', calc));
  tbody.appendChild(tr);
}

function getScaleValue(grade) {
  if (currentScale === '100') return parseFloat(grade);
  return gradePoints[currentScale][grade] || 0;
}

function calc() {
  const rows = $$('#courses tr');
  let totalCredits = 0, totalPoints = 0;
  rows.forEach(tr => {
    const credits = parseFloat(tr.querySelectorAll('input')[1].value) || 0;
    const grade = tr.querySelector('select').value;
    const pts = getScaleValue(grade);
    totalCredits += credits;
    totalPoints += pts * credits;
  });
  const gpa = totalCredits > 0 ? totalPoints / totalCredits : 0;
  const display = currentScale === '100' ? gpa.toFixed(2) + '%' : gpa.toFixed(2);
  const letter = currentScale === '100' ? (gpa >= 90 ? 'A' : gpa >= 80 ? 'B' : gpa >= 70 ? 'C' : gpa >= 60 ? 'D' : 'F') : (gpa >= 3.7 ? 'A' : gpa >= 3.0 ? 'B' : gpa >= 2.0 ? 'C' : gpa >= 1.0 ? 'D' : 'F');
  $('#results').innerHTML = `
    <div class="gpa-card primary"><div class="value">${display}</div><div class="label">GPA (${currentScale})</div></div>
    <div class="gpa-card"><div class="value">${letter}</div><div class="label">Letter Grade</div></div>
    <div class="gpa-card"><div class="value">${rows.length}</div><div class="label">Courses</div></div>
    <div class="gpa-card"><div class="value">${totalCredits}</div><div class="label">Total Credits</div></div>`;
}

function changeScale(scale, btn) {
  currentScale = scale;
  document.querySelectorAll('#scale button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  // Update existing rows
  $$('#courses tr').forEach(tr => {
    const sel = tr.querySelector('select');
    const current = sel.value;
    const opts = gradeOptions();
    sel.innerHTML = opts.map(g => `<option value="${g}">${g}</option>`).join('');
    if (opts.includes(current)) sel.value = current;
  });
  calc();
}

function $$ (s, p) { return [...(p || document).querySelectorAll(s)]; }

document.querySelectorAll('#scale button').forEach(btn => {
  btn.addEventListener('click', () => changeScale(btn.dataset.scale, btn));
});

$('#toolbar').innerHTML = `
  <button class="gz-btn gz-btn-secondary" onclick="addRow()">+ ${t('lblAdd')}</button>
  <button class="gz-btn" onclick="const tbl=$('#courses');tbl.innerHTML='';addRow();addRow();addRow();calc()">↺ Reset</button>
  <button class="gz-btn gz-btn-secondary" onclick="const t=$('#courses');const csv=Array.from(t.querySelectorAll('tr')).map(r=>{const i=r.querySelectorAll('input');const s=r.querySelector('select');return [i[0].value||'Course',s.value,i[1].value].join(',')}).join('\\n');GZ.copyText('Course,Grade,Credits\\n'+csv)}">${t('export')||'Export CSV'}</button>`;

for (let i = 0; i < 4; i++) addRow();
calc();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🎓', href:'/calc/grade-calculator.html', name:'Grade Calculator'},
    {icon:'💯', href:'/calc/percentage-calculator.html', name:'Percentage'},
    {icon:'📊', href:'/calc/statistics-calculator.html', name:'Statistics'},
    {icon:'⏰', href:'/fun/stopwatch.html', name:'Stopwatch'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
