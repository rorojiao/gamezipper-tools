<script>
GZI18n.register({en:{toolTitle:'Cholesterol Ratio Calculator',toolDesc:'Calculate total cholesterol/HDL, LDL/HDL, triglyceride/HDL and non-HDL cholesterol from your lipid panel. Supports mg/dL and mmol/L.',unit:'Lab unit',total:'Total cholesterol',hdl:'HDL cholesterol',ldl:'LDL cholesterol',tg:'Triglycerides',totalHdl:'Total / HDL ratio',ldlHdl:'LDL / HDL ratio',tgHdl:'Triglyceride / HDL ratio',nonHdl:'Non-HDL cholesterol',desirable:'Desirable',moderate:'Review',high:'High',reference:'General reference',nonHdlTarget:'A commonly used general non-HDL target is below 130 mg/dL (3.37 mmol/L), but personal targets can be lower depending on cardiovascular risk.',disclaimer:'Educational calculation only — not a diagnosis or medical advice. Ratios do not replace LDL, non-HDL, ApoB or a clinician’s full cardiovascular risk assessment. Discuss laboratory results with a qualified healthcare professional.',faqTitle:'Cholesterol Ratio FAQ',q1:'Is a lower total/HDL ratio better?',a1:'Generally, a lower ratio is considered more favorable because HDL makes up a larger share of total cholesterol. Individual risk still depends on many other factors.',q2:'Why does the triglyceride/HDL ratio change with units?',a2:'Triglycerides and cholesterol use different mmol/L conversion factors. This calculator converts both to mg/dL before computing TG/HDL so the reference remains consistent.',q3:'Should I focus on ratios or LDL?',a3:'Ratios provide context, but clinical guidelines often emphasize absolute LDL, non-HDL, ApoB and total cardiovascular risk. Ask your clinician which target matters for you.',step1:'Choose the unit shown on your lipid panel.',step2:'Enter total cholesterol, HDL, LDL and triglycerides.',step3:'Review the four calculated lipid measures.',step4:'Discuss results and personal targets with your healthcare professional.'},zh:{toolTitle:'胆固醇比值计算器',toolDesc:'根据血脂报告计算总胆固醇/HDL、LDL/HDL、甘油三酯/HDL 和非 HDL 胆固醇。支持 mg/dL 和 mmol/L。',unit:'化验单位',total:'总胆固醇',hdl:'HDL 胆固醇',ldl:'LDL 胆固醇',tg:'甘油三酯',totalHdl:'总胆固醇 / HDL',ldlHdl:'LDL / HDL',tgHdl:'甘油三酯 / HDL',nonHdl:'非 HDL 胆固醇',desirable:'理想',moderate:'需关注',high:'偏高',reference:'一般参考',nonHdlTarget:'常用的一般非 HDL 目标为低于 130 mg/dL（3.37 mmol/L），但心血管风险较高者的个人目标可能更低。',disclaimer:'仅供教育计算，不构成诊断或医疗建议。比值不能替代 LDL、非 HDL、ApoB 或医生进行的完整心血管风险评估。请与合格的医疗专业人士讨论化验结果。',faqTitle:'胆固醇比值常见问题',q1:'总胆固醇/HDL 比值越低越好吗？',a1:'通常较低的比值更有利，因为 HDL 在总胆固醇中的占比更高，但个人风险仍取决于许多其他因素。',q2:'为什么甘油三酯/HDL 比值会受单位影响？',a2:'甘油三酯和胆固醇的 mmol/L 换算系数不同。本工具先将二者转换为 mg/dL 再计算，以保持参考一致。',q3:'应该关注比值还是 LDL？',a3:'比值可提供背景，但临床指南通常更强调 LDL、非 HDL、ApoB 绝对值和总体心血管风险。请咨询医生你的重点目标。',step1:'选择血脂化验单上显示的单位。',step2:'输入总胆固醇、HDL、LDL 和甘油三酯。',step3:'查看四项计算出的血脂指标。',step4:'与医疗专业人士讨论结果和个人目标。'}});
const{$,t}=GZ;
$('#app').innerHTML=`<div class="cr-form"><div class="cr-field"><label>${t('unit')}</label><select id="unit"><option value="mg">mg/dL</option><option value="mmol">mmol/L</option></select></div><div class="cr-field"><label>${t('total')}</label><input id="tc" type="number" min="0" step="0.1" value="190"></div><div class="cr-field"><label>${t('hdl')}</label><input id="hdl" type="number" min="0" step="0.1" value="55"></div><div class="cr-field"><label>${t('ldl')}</label><input id="ldl" type="number" min="0" step="0.1" value="110"></div><div class="cr-field"><label>${t('tg')}</label><input id="tg" type="number" min="0" step="0.1" value="125"></div></div><div class="cr-results"><div class="cr-card"><span>${t('totalHdl')}</span><b id="r1">--</b><em id="s1"></em></div><div class="cr-card"><span>${t('ldlHdl')}</span><b id="r2">--</b><em id="s2"></em></div><div class="cr-card"><span>${t('tgHdl')}</span><b id="r3">--</b><em id="s3"></em></div><div class="cr-card"><span>${t('nonHdl')}</span><b id="r4">--</b><em id="s4"></em></div></div><div class="cr-note"><b>${t('reference')}:</b> ${t('nonHdlTarget')}<br><br>${t('disclaimer')}</div><div class="cr-faq"><h3>${t('faqTitle')}</h3>${[1,2,3].map(n=>`<details><summary>${t('q'+n)}</summary><p>${t('a'+n)}</p></details>`).join('')}</div>`;
function status(v,good,mid){return v<good?['desirable','cr-good']:v<mid?['moderate','cr-mid']:['high','cr-high']}
function setStatus(id,a){const e=$(id);e.textContent=t(a[0]);e.className=a[1]}
function calc(){let tc=+$('#tc').value||0,hdl=+$('#hdl').value||0,ldl=+$('#ldl').value||0,tg=+$('#tg').value||0;const mmol=$('#unit').value==='mmol';const tcMg=mmol?tc*38.67:tc,hdlMg=mmol?hdl*38.67:hdl,ldlMg=mmol?ldl*38.67:ldl,tgMg=mmol?tg*88.57:tg;if(hdlMg<=0)return;const a=tcMg/hdlMg,b=ldlMg/hdlMg,c=tgMg/hdlMg,non=tcMg-hdlMg;$('#r1').textContent=a.toFixed(2);$('#r2').textContent=b.toFixed(2);$('#r3').textContent=c.toFixed(2);$('#r4').textContent=(mmol?non/38.67:non).toFixed(1)+' '+(mmol?'mmol/L':'mg/dL');setStatus('#s1',status(a,3.5,5));setStatus('#s2',status(b,2.5,3.5));setStatus('#s3',status(c,2,4));setStatus('#s4',status(non,130,160))}
function changeUnit(){const to=$('#unit').value,from=$('#unit').dataset.prev||'mg';if(to===from){calc();return}if(to==='mmol'){['tc','hdl','ldl'].forEach(id=>$('#'+id).value=(+$('#'+id).value/38.67).toFixed(2));$('#tg').value=(+$('#tg').value/88.57).toFixed(2)}else{['tc','hdl','ldl'].forEach(id=>$('#'+id).value=Math.round(+$('#'+id).value*38.67));$('#tg').value=Math.round(+$('#tg').value*88.57)}$('#unit').dataset.prev=to;calc()}$('#unit').dataset.prev='mg';$('#unit').addEventListener('change',changeUnit);document.querySelectorAll('input').forEach(e=>e.addEventListener('input',calc));calc();
GZ.renderToolPage({category:'calc',titleKey:'toolTitle',descKey:'toolDesc',howToSteps:['step1','step2','step3','step4'],related:[{icon:'🩺',href:'/calc/blood-pressure-calculator.html',name:'Blood Pressure Calculator'},{icon:'⚖️',href:'/calc/bmi-calculator.html',name:'BMI Calculator'},{icon:'❤️',href:'/calc/heart-rate-max-calculator.html',name:'Heart Rate Max Calculator'},{icon:'💪',href:'/calc/body-fat.html',name:'Body Fat Calculator'}]});
</script><script src="/tools-result-rec.js?v=20260707v520" defer></script></body></html>
