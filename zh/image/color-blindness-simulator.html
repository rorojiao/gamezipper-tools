<div class="gz-container">

<script>
GZI18n.register({
  en: {
    toolTitle: 'Color Blindness Simulator',
    toolDesc: 'See how images and colors appear to people with color vision deficiency. Simulate protanopia, deuteranopia, tritanopia and achromatopsia — all in your browser.',
    dzText: '📷 Click or drag an image here to simulate (stays on your device)',
    paletteLabel: 'Or test these common colors:',
    step1: 'Upload an image or use the test color palette below',
    step2: 'Choose a color blindness type from the mode buttons',
    step3: 'See the simulated result instantly in the canvas',
    step4: 'Switch between modes to compare different deficiencies',
    modeNormal: 'Normal Vision',
    modeProtan: 'Protanopia (no red)',
    modeDeutan: 'Deuteranopia (no green)',
    modeTritan: 'Tritanopia (no blue)',
    modeAchroma: 'Achromatopsia (grayscale)',
    upload: 'Upload Image',
    download: 'Download Result',
  },
  zh: {
    toolTitle: '色盲模拟器',
    toolDesc: '查看图像和颜色在色觉障碍人士眼中的样子。模拟红色盲、绿色盲、蓝色盲和全色盲 — 全部在浏览器中完成。',
    dzText: '📷 点击或拖拽图片到此处进行模拟（图片不会上传）',
    paletteLabel: '或测试这些常见颜色：',
    step1: '上传图片或使用下方的测试调色板',
    step2: '从模式按钮中选择色盲类型',
    step3: '即时在画布中查看模拟结果',
    step4: '切换不同模式比较各种色觉缺陷',
    modeNormal: '正常视觉',
    modeProtan: '红色盲（无红色）',
    modeDeutan: '绿色盲（无绿色）',
    modeTritan: '蓝色盲（无蓝色）',
    modeAchroma: '全色盲（灰度）',
    upload: '上传图片',
    download: '下载结果',
  }
});

const { $, copyText, t } = GZ;
let currentMode = 'normal';
let originalImageData = null;

// Color blindness transformation matrices (Brettel/Viénot-derived approximations)
const MATRICES = {
  normal:    [[1,0,0],[0,1,0],[0,0,1]],
  protan:    [[0.567,0.433,0],[0.558,0.442,0],[0,0.242,0.758]],
  deutan:    [[0.625,0.375,0],[0.7,0.3,0],[0,0.3,0.7]],
  tritan:    [[0.95,0.05,0],[0,0.433,0.567],[0,0.475,0.525]],
  achroma:   [[0.299,0.587,0.114],[0.299,0.587,0.114],[0.299,0.587,0.114]],
};

function applyMatrix(data, mat) {
  for (let i = 0; i < data.length; i += 4) {
    const r = data[i], g = data[i+1], b = data[i+2];
    data[i]   = Math.min(255, Math.max(0, r*mat[0][0] + g*mat[0][1] + b*mat[0][2]));
    data[i+1] = Math.min(255, Math.max(0, r*mat[1][0] + g*mat[1][1] + b*mat[1][2]));
    data[i+2] = Math.min(255, Math.max(0, r*mat[2][0] + g*mat[2][1] + b*mat[2][2]));
  }
}

function render() {
  if (!originalImageData) return;
  const canvas = $('#canvas');
  const ctx = canvas.getContext('2d');
  const newData = new Uint8ClampedArray(originalImageData.data);
  if (currentMode !== 'normal') applyMatrix(newData, MATRICES[currentMode]);
  const imgData = new ImageData(newData, originalImageData.width, originalImageData.height);
  ctx.putImageData(imgData, 0, 0);
}

function loadImage(src) {
  const img = new Image();
  img.crossOrigin = 'anonymous';
  img.onload = () => {
    const canvas = $('#canvas');
    const maxW = 600;
    const scale = Math.min(1, maxW / img.width);
    canvas.width = img.width * scale;
    canvas.height = img.height * scale;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
    originalImageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    $('#canvas-wrap').style.display = 'flex';
    $('#dropzone').style.display = 'none';
    render();
  };
  img.src = src;
}

function setMode(mode) {
  currentMode = mode;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.toggle('active', b.dataset.mode === mode));
  render();
  renderPalette();
}

const TEST_COLORS = ['#E03131','#2F9E44','#1971C2','#F08C00','#9C36B5','#1098AD','#C2255C','#74B816'];
function renderPalette() {
  const mat = MATRICES[currentMode];
  const wrap = $('#palette');
  wrap.innerHTML = TEST_COLORS.map(hex => {
    const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
    const nr = Math.round(r*mat[0][0]+g*mat[0][1]+b*mat[0][2]);
    const ng = Math.round(r*mat[1][0]+g*mat[1][1]+b*mat[1][2]);
    const nb = Math.round(r*mat[2][0]+g*mat[2][1]+b*mat[2][2]);
    const simHex = '#' + [nr,ng,nb].map(v=>Math.max(0,Math.min(255,v)).toString(16).padStart(2,'0')).join('').toUpperCase();
    return `<div class="color-cell" style="background:${simHex}">${hex}<br>→ ${simHex}</div>`;
  }).join('');
}

// Event handlers
$('#dz-text').textContent = t('dzText');
$('#palette-label').textContent = t('paletteLabel');
$('#dropzone').addEventListener('click', () => $('#file-input').click());
$('#dropzone').addEventListener('dragover', e => { e.preventDefault(); $('#dropzone').style.borderColor='var(--accent)'; });
$('#dropzone').addEventListener('dragleave', () => { $('#dropzone').style.borderColor='var(--border)'; });
$('#dropzone').addEventListener('drop', e => {
  e.preventDefault();
  const f = e.dataTransfer.files[0];
  if (f) { const r = new FileReader(); r.onload = ev => loadImage(ev.target.result); r.readAsDataURL(f); }
});
$('#file-input').addEventListener('change', e => {
  const f = e.target.files[0];
  if (f) { const r = new FileReader(); r.onload = ev => loadImage(ev.target.result); r.readAsDataURL(f); }
});

$('#modes').innerHTML = `
  <div class="mode-btn active" data-mode="normal" onclick="setMode('normal')">${t('modeNormal')}</div>
  <div class="mode-btn" data-mode="protan" onclick="setMode('protan')">${t('modeProtan')}</div>
  <div class="mode-btn" data-mode="deutan" onclick="setMode('deutan')">${t('modeDeutan')}</div>
  <div class="mode-btn" data-mode="tritan" onclick="setMode('tritan')">${t('modeTritan')}</div>
  <div class="mode-btn" data-mode="achroma" onclick="setMode('achroma')">${t('modeAchroma')}</div>`;

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="$('#file-input').click()">${t('upload')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="downloadResult()" id="dl-btn">${t('download')}</button>`;

function downloadResult() {
  if (!originalImageData) return;
  const canvas = $('#canvas');
  const a = document.createElement('a');
  a.download = 'color-blind-' + currentMode + '.png';
  a.href = canvas.toDataURL('image/png');
  a.click();
}
window.setMode = setMode;
window.downloadResult = downloadResult;

renderPalette();

GZ.renderToolPage({
  category: 'image',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🎨', href:'/color/picker.html', name:'Color Picker'},
    {icon:'🌈', href:'/css-tools/gradient.html', name:'Gradient Generator'},
    {icon:'🔤', href:'/color/hex-to-rgba.html', name:'Hex to RGB'},
    {icon:'🖼️', href:'/image/image-to-base64.html', name:'Image to Base64'},
  ]
});
</script>

</body>
