    summary: 'Event Title', start: 'Start', end: 'End',

  zh: {

    toolDesc: '在浏览器中创建可下载的 .ics 日历事件文件。设置标题、时间、地点、描述、提醒和重复 — 然后导出文件，直接导入 Google 日历、Apple 日历或 Outlook。无需上传、无需注册。',
    summary: '事件标题', start: '开始时间', end: '结束时间',
    location: '地点', tz: '时区', rrule: '重复',
    alarm: '提醒', allday: '全天事件', desc: '描述',
    generate: '生成',
    download: '下载 .ics',
    example: '加载示例',
    clear: '清除',
    copy: '复制',
    valid: '✓ 已生成 .ics（%1 字节）',
    empty: '⚠ 请填写事件标题和开始时间',
    step1: '填写事件标题和开始/结束时间',
    step2: '可选：设置地点、时区、重复和提醒',
    step3: '点击「生成」构建并预览 .ics 文本',
    step4: '点击「下载 .ics」并导入到日历应用',
  }
});

const { $, copyText, t } = GZ;

document.querySelectorAll('[data-summary]').forEach(e => e.textContent = t('summary'));
document.querySelectorAll('[data-start]').forEach(e => e.textContent = t('start'));
document.querySelectorAll('[data-end]').forEach(e => e.textContent = t('end'));
document.querySelectorAll('[data-location]').forEach(e => e.textContent = t('location'));
document.querySelectorAll('[data-tz]').forEach(e => e.textContent = t('tz'));
document.querySelectorAll('[data-rrule]').forEach(e => e.textContent = t('rrule'));
document.querySelectorAll('[data-alarm]').forEach(e => e.textContent = t('alarm'));
document.querySelectorAll('[data-allday]').forEach(e => e.textContent = t('allday'));
document.querySelectorAll('[data-desc]').forEach(e => e.textContent = t('desc'));

function pad(n) { return String(n).padStart(2, '0'); }

// Convert a datetime-local string into iCalendar UTC timestamp (YYYYMMDDTHHMMSSZ)
function toICSDate(value, allDay, tz) {
  if (!value) return '';
  const d = new Date(value);
  if (isNaN(d.getTime())) return '';
  if (allDay) {
    // Format as date only in local timezone of the picker (which is what user picked)
    const y = d.getFullYear(), m = d.getMonth() + 1, day = d.getDate();
    return '' + y + pad(m) + pad(day);
  }
  const utc = new Date(d.getTime()); // input is local; convert to UTC
  return '' + utc.getUTCFullYear() + pad(utc.getUTCMonth() + 1) + pad(utc.getUTCDate()) +
         'T' + pad(utc.getUTCHours()) + pad(utc.getUTCMinutes()) + pad(utc.getUTCSeconds()) + 'Z';
}

function fold(line) {
  if (line.length <= 75) return line;
  const out = [line.slice(0, 75)];
  let rest = line.slice(75);
  while (rest.length) { out.push(' ' + rest.slice(0, 74)); rest = rest.slice(74); }
  return out.join('\r\n');
}

function escapeICS(s) {
  return String(s).replace(/\\/g,'\\\\').replace(/;/g,'\\;').replace(/,/g,'\\,').replace(/\n/g,'\\n');
}

function buildICS() {
  const summary = $('#f-summary').value.trim();
  const start = $('#f-start').value;
  const end = $('#f-end').value;
  const allDay = $('#f-allday').checked;
  const tz = $('#f-tz').value;
  if (!summary || !start) return null;

  const startICS = toICSDate(start, allDay, tz);
  const endICS = end ? toICSDate(end, allDay, tz) : startICS;

  const dateType = allDay ? 'DATE' : 'DATE-TIME';
  const lines = [];
  lines.push('BEGIN:VCALENDAR');
  lines.push('VERSION:2.0');
  lines.push('PRODID:-//GameZipper Tools//ICS Generator//EN');
  lines.push('CALSCALE:GREGORIAN');
  lines.push('METHOD:PUBLISH');
  lines.push('BEGIN:VEVENT');
  const uid = 'gz-' + Date.now() + '-' + Math.random().toString(36).slice(2, 10) + '@tools.gamezipper.com';
  lines.push('UID:' + uid);
  lines.push('DTSTAMP:' + toICSDate(new Date().toISOString(), false, ''));
  if (tz && !allDay) {
    lines.push(fold('DTSTART;TZID=' + tz + ':' + toICSDateLocal(start)));
    if (end) lines.push(fold('DTEND;TZID=' + tz + ':' + toICSDateLocal(end)));
    else lines.push(fold('DTEND;TZID=' + tz + ':' + toICSDateLocal(start)));
  } else {
    lines.push('DTSTART;' + (allDay ? 'VALUE=DATE:' : 'VALUE=' + dateType + ':') + startICS);
    lines.push('DTEND;' + (allDay ? 'VALUE=DATE:' : 'VALUE=' + dateType + ':') + (endICS || startICS));
  }
  lines.push(fold('SUMMARY:' + escapeICS(summary)));
  if ($('#f-location').value.trim()) lines.push(fold('LOCATION:' + escapeICS($('#f-location').value.trim())));
  if ($('#f-desc').value.trim()) lines.push(fold('DESCRIPTION:' + escapeICS($('#f-desc').value.trim())));
  const rr = $('#f-rrule').value;
  if (rr) lines.push('RRULE:' + rr);
  const alarm = parseInt($('#f-alarm').value, 10);
  if (alarm > 0) {
    lines.push('BEGIN:VALARM');
    lines.push('ACTION:DISPLAY');
    lines.push('DESCRIPTION:' + escapeICS(summary));
    lines.push('TRIGGER:-PT' + alarm + 'M');
    lines.push('END:VALARM');
  }
  lines.push('END:VEVENT');
  lines.push('END:VCALENDAR');
  return lines.join('\r\n');
}

// Format a datetime-local value as a wall-clock time for TZID usage (no Z suffix)
function toICSDateLocal(value) {
  const d = new Date(value);
  if (isNaN(d.getTime())) return '';
  return '' + d.getFullYear() + pad(d.getMonth() + 1) + pad(d.getDate()) +
         'T' + pad(d.getHours()) + pad(d.getMinutes()) + pad(d.getSeconds());
}

let lastICS = '';

function doGenerate() {
  const ics = buildICS();
  if (!ics) {
    $('#status').innerHTML = '<span style="color:var(--gz-accent)">' + t('empty') + '</span>';
    $('#output').textContent = '';
    lastICS = '';
    return;
  }
  lastICS = ics;
  $('#output').textContent = ics;
  $('#status').innerHTML = '<span style="color:var(--gz-success)">' + t('valid').replace('%1', ics.length) + '</span>';
}

function downloadFile(filename, content, mime) {
  const blob = new Blob([content], { type: mime });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 100);
}

function doDownload() {
  if (!lastICS) doGenerate();
  if (!lastICS) return;
  const name = ($('#f-summary').value.trim() || 'event').replace(/[^a-z0-9_-]+/gi, '_');
  downloadFile(name + '.ics', lastICS, 'text/calendar;charset=utf-8');
}

function loadExample() {
  const now = new Date();
  const tomorrow = new Date(now.getTime() + 24 * 3600 * 1000);
  // 10:00 - 11:00 tomorrow
  const startD = new Date(tomorrow.getFullYear(), tomorrow.getMonth(), tomorrow.getDate(), 10, 0);
  const endD = new Date(startD.getTime() + 60 * 60 * 1000);
  const fmt = d => '' + d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate()) + 'T' + pad(d.getHours()) + ':' + pad(d.getMinutes());
  $('#f-summary').value = 'Project Kickoff Meeting';
  $('#f-start').value = fmt(startD);
  $('#f-end').value = fmt(endD);
  $('#f-location').value = 'Conference Room B / https://meet.example.com/abc';
  $('#f-tz').value = '';
  $('#f-rrule').value = 'FREQ=WEEKLY';
  $('#f-alarm').value = '15';
  $('#f-allday').checked = false;
  $('#f-desc').value = 'Weekly sync to align on roadmap, blockers and next steps.\nDial-in: +1 555 123 4567  PIN: 12345#';
  doGenerate();
}

function doClear() {
  ['f-summary','f-start','f-end','f-location','f-desc'].forEach(id => $('#' + id).value = '');
  $('#f-tz').value = ''; $('#f-rrule').value = ''; $('#f-alarm').value = '0';
  $('#f-allday').checked = false;
  $('#output').textContent = ''; $('#status').textContent = ''; lastICS = '';
}

document.querySelectorAll('input[id^="f-"], textarea[id^="f-"], select[id^="f-"]').forEach(el => el.addEventListener('input', doGenerate));

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="doGenerate()">${t('generate')}</button>
  <button class="gz-btn" onclick="doDownload()">⬇ ${t('download')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn" onclick="copyText(lastICS)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

GZ.renderToolPage({
  category: 'convert',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📅', href:'/convert/world-clock.html', name:'World Clock'},
    {icon:'📅', href:'/calc/calendar-generator.html', name:'Calendar Generator'},
    
    {icon:'📅', href:'/calc/days-until.html', name:'Days Until'},
  ]
});
</script>
