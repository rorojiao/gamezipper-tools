<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="ctrl" id="controls"></div>
    <div class="fb-card" id="fb-preview"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Facebook Post Generator',
    toolDesc: 'Create realistic Facebook post mockups for presentations and design — customize name, content, reactions and download as PNG.',
    displayName: 'Profile Name',
    avatar: 'Avatar Initial',
    content: 'Post Content',
    time: 'Time',
    likes: 'Likes',
    loves: 'Loves',
    hahas: 'Hahas',
    comments: 'Comments',
    shares: 'Shares',
    verified: 'Verified ✓',
    download: 'Download PNG',
    clear: 'Clear',
    step1: 'Enter the profile name and avatar letter',
    step2: 'Type the post content',
    step3: 'Customize reactions, comments and shares',
    step4: 'Download the Facebook post as a PNG image',
  },
  zh: {
    toolTitle: 'Facebook 帖子生成器',
    toolDesc: '创建逼真的 Facebook 帖子截图 — 自定义用户名、内容、互动数据，下载为 PNG 图片。',
    displayName: '用户名',
    avatar: '头像字母',
    content: '帖子内容',
    time: '时间',
    likes: '赞',
    loves: '爱心',
    hahas: '哈哈',
    comments: '评论',
    shares: '分享',
    verified: '认证 ✓',
    download: '下载 PNG',
    clear: '清除',
    step1: '输入用户名和头像字母',
    step2: '输入帖子内容',
    step3: '自定义点赞、评论和分享数据',
    step4: '下载 Facebook 帖子为 PNG 图片',
  }
});

const { $, copyText, t } = GZ;

let cfg = {
  name: 'GameZipper',
  avatar: 'G',
  content: 'Just launched our new free online toolbox! 🎉 955+ tools for developers, designers and creators — all free, no signup required.\n\nCheck it out and let us know what you think! 👇\n#WebTools #FreeTools',
  time: '2h',
  verified: true,
  likes: 1280,
  loves: 340,
  hahas: 56,
  comments: 142,
  shares: 88
};

function formatNum(n) {
  if (n >= 1000000) return (n/1000000).toFixed(1)+'M';
  if (n >= 1000) return (n/1000).toFixed(1)+'K';
  return n.toString();
}

function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function buildControls() {
  const c = $('#controls');
  c.innerHTML = `
    <label>${t('displayName')}<input type="text" id="cName" value="${escHtml(cfg.name)}"></label>
    <label>${t('avatar')}<input type="text" id="cAvatar" value="${escHtml(cfg.avatar)}" style="width:60px;text-align:center" maxlength="2"></label>
    <label>${t('verified')}<input type="checkbox" id="cVerified" ${cfg.verified?'checked':''}></label>
    <label>${t('content')}<textarea id="cContent" rows="4" style="min-width:280px">${escHtml(cfg.content)}</textarea></label>
    <label>${t('time')}<input type="text" id="cTime" value="${escHtml(cfg.time)}"></label>
    <label>${t('likes')}<input type="number" id="cLikes" value="${cfg.likes}" min="0"></label>
    <label>${t('loves')}<input type="number" id="cLoves" value="${cfg.loves}" min="0"></label>
    <label>${t('hahas')}<input type="number" id="cHahas" value="${cfg.hahas}" min="0"></label>
    <label>${t('comments')}<input type="number" id="cComments" value="${cfg.comments}" min="0"></label>
    <label>${t('shares')}<input type="number" id="cShares" value="${cfg.shares}" min="0"></label>
  `;
  const map = {cName:'name',cContent:'content',cAvatar:'avatar',cTime:'time'};
  Object.keys(map).forEach(id=>$('#'+id).oninput=e=>{cfg[map[id]]=e.target.value;render()});
  $('#cVerified').onchange=e=>{cfg.verified=e.target.checked;render()};
  const nums={cLikes:'likes',cLoves:'loves',cHahas:'hahas',cComments:'comments',cShares:'shares'};
  Object.keys(nums).forEach(id=>$('#'+id).oninput=e=>{cfg[nums[id]]=+e.target.value||0;render()});
}

function render() {
  const totalReactions = cfg.likes+cfg.loves+cfg.hahas;
  const reactIcons = [];
  if (cfg.likes) reactIcons.push('<span style="background:#1877f2">👍</span>');
  if (cfg.loves) reactIcons.push('<span style="background:#f33e58">❤️</span>');
  if (cfg.hahas) reactIcons.push('<span style="background:#f7b125">😆</span>');
  $('#fb-preview').innerHTML = `
    <div class="fb-head">
      <div class="fb-avatar">${escHtml(cfg.avatar||'?')}</div>
      <div>
        <div class="fb-name">${escHtml(cfg.name)}${cfg.verified?'<svg class="verified" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l2.4 1.8 3 .2.2 3L19.4 9 21 12l-1.6 3 .8 3-3 .2L14.4 19.8 12 22l-2.4-1.8-3-.2-.2-3L4.6 15 3 12l1.6-3-.8-3 3-.2L9.6 3.8z"/><path d="M10.5 13.6l-2-2-1.4 1.4 3.4 3.4 6-6-1.4-1.4z" fill="#fff"/></svg>':''}</div>
        <div class="fb-meta">${escHtml(cfg.time)} · 🌐</div>
      </div>
    </div>
    <div class="fb-body">${escHtml(cfg.content)}</div>
    <div class="fb-divider"></div>
    <div class="fb-stats">
      <span class="fb-reactions">${reactIcons.length?'<span class="fb-react-icons">'+reactIcons.join('')+'</span>':''}${formatNum(totalReactions)}</span>
      <span>${formatNum(cfg.comments)} ${t('comments')} · ${formatNum(cfg.shares)} ${t('shares')}</span>
    </div>
    <div class="fb-divider"></div>
    <div class="fb-actions">
      <span>👍 ${t('likes')}</span>
      <span>💬 ${t('comments')}</span>
      <span>↗️ ${t('shares')}</span>
    </div>
  `;
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" id="dlBtn">${t('download')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="cfg.content='';cfg.likes=0;cfg.loves=0;cfg.hahas=0;cfg.comments=0;cfg.shares=0;buildControls();render()">${t('clear')}</button>
`;

$('#dlBtn').onclick = async () => {
  try {
    if (typeof html2canvas !== 'undefined') {
      const canvas = await html2canvas($('#fb-preview'), { backgroundColor: null, scale: 2 });
      const a = document.createElement('a');
      a.href = canvas.toDataURL('image/png');
      a.download = 'facebook-post.png';
      a.click();
    }
  } catch(e) { console.error(e); }
};

const h2c = document.createElement('script');
h2c.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
document.head.appendChild(h2c);

buildControls();
render();

GZ.renderToolPage({
  category: 'social',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🐦', href:'/social/tweet-generator.html', name:'Tweet Generator'},
    {icon:'💬', href:'/social/whatsapp-chat.html', name:'WhatsApp Chat'},
    {icon:'📷', href:'/social/instagram-post.html', name:'Instagram Post'},
    {icon:'🎬', href:'/social/youtube-comment.html', name:'YouTube Comment'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
