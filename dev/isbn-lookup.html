const { $, copyText, t } = GZ;
const isbnInput = $('#isbn');
isbnInput.placeholder = t('placeholder');
$('#lookup-btn').textContent = t('lookup');

// ----- ISBN validation & conversion -----
function normalize(s) { return (s || '').replace(/[^0-9Xx]/g, ''); }

function isbn10Check(isbn) {
  if (!/^\d{9}[\dXx]$/.test(isbn)) return false;
  let sum = 0;
  for (let i = 0; i < 9; i++) sum += (10 - i) * parseInt(isbn[i]);
  const last = isbn[9].toUpperCase();
  sum += last === 'X' ? 10 : parseInt(last);
  return sum % 11 === 0;
}

function isbn13Check(isbn) {
  if (!/^\d{13}$/.test(isbn)) return false;
  let sum = 0;
  for (let i = 0; i < 12; i++) sum += parseInt(isbn[i]) * (i % 2 ? 3 : 1);
  const check = (10 - (sum % 10)) % 10;
  return check === parseInt(isbn[12]);
}

function isbn10to13(isbn10) {
  const core = '978' + isbn10.slice(0, 9);
  let sum = 0;
  for (let i = 0; i < 12; i++) sum += parseInt(core[i]) * (i % 2 ? 3 : 1);
  return core + ((10 - (sum % 10)) % 10);
}

function isbn13to10(isbn13) {
  if (!isbn13.startsWith('978')) return null;
  const core = isbn13.slice(3, 12);
  let sum = 0;
  for (let i = 0; i < 9; i++) sum += (10 - i) * parseInt(core[i]);
  const rem = sum % 11;
  const check = rem === 0 ? '0' : rem === 1 ? 'X' : (11 - rem).toString();
  return core + check;
}

function validateLive() {
  const raw = isbnInput.value.trim();
  const n = normalize(raw);
  const s = $('#status');
  isbnInput.classList.remove('invalid');
  if (!n) { s.innerHTML = ''; return null; }
  if (n.length === 10) {
    if (isbn10Check(n)) {
      s.innerHTML = `<div class="validity ok">${t('validIsbn10')}</div><div class="validity">${t('convert10to13')} <code>${isbn10to13(n)}</code></div>`;
      return { type: '10', value: n, canonical: isbn10to13(n) };
    }
  } else if (n.length === 13) {
    if (isbn13Check(n)) {
      const conv = isbn13to10(n);
      s.innerHTML = `<div class="validity ok">${t('validIsbn13')}</div>` + (conv ? `<div class="validity">${t('convert13to10')} <code>${conv}</code></div>` : '');
      return { type: '13', value: n, canonical: n };
    }
  } else if (n.length > 13) {
    isbnInput.classList.add('invalid');
    s.innerHTML = `<div class="validity bad">${t('invalidIsbn')}</div>`;
    return null;
  } else {
    // still typing
    s.innerHTML = '';
    return null;
  }
  isbnInput.classList.add('invalid');
  s.innerHTML = `<div class="validity bad">${t('invalidIsbn')}</div>`;
  return null;
}

async function doLookup() {
  const info = validateLive();
  const out = $('#book-result');
  if (!info) { out.innerHTML = ''; return; }
  out.innerHTML = `<div class="loading">${t('searching')}</div>`;

  const isbn13 = info.canonical;
  const isbn10 = info.type === '10' ? info.value : isbn13to10(isbn13);

  // Try Google Books first
  try {
    const q = info.type === '10' ? `isbn:${info.value}` : `isbn:${isbn13}`;
    const r = await fetch('https://www.googleapis.com/books/v1/volumes?q=' + encodeURIComponent(q));
    if (r.ok) {
      const data = await r.json();
      if (data.totalItems > 0 && data.items) {
        renderBook(data.items[0].volumeInfo || {});
        return;
      }
    }
  } catch (e) { /* fall through */ }

  // Fallback: Open Library
  try {
    const r2 = await fetch('https://openlibrary.org/api/books?bibkeys=ISBN:' + isbn13 + '&format=json&jscmd=data');
    if (r2.ok) {
      const d2 = await r2.json();
      const key = 'ISBN:' + isbn13;
      if (d2[key]) { renderOpenLib(d2[key]); return; }
    }
  } catch (e) { /* fall through */ }

  out.innerHTML = `<div class="error">${t('notFound')}</div>`;
}

function escapeHtml(s) { return (s || '').toString().replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function renderBook(v) {
  const cover = v.imageLinks ? (v.imageLinks.thumbnail || v.imageLinks.smallThumbnail || v.imageLinks.small || v.imageLinks.medium) : null;
  const coverUrl = cover ? cover.replace(/^http:/, 'https:') : null;
  const authors = (v.authors || []).join(', ');
  const cats = (v.categories || []).join(', ');
  const desc = v.description ? (v.description.length > 600 ? v.description.slice(0, 600) + '…' : v.description) : '';
  const html = `
    <div class="book-card">
      ${coverUrl ? `<img src="${coverUrl}" alt="${escapeHtml(v.title)}" loading="lazy">` : '<div style="width:140px;height:200px;display:flex;align-items:center;justify-content:center;background:#222;border-radius:6px;color:#666;font-size:.8em;text-align:center;padding:8px">No cover</div>'}
      <dl class="book-meta">
        <dt>${t('by')}</dt><dd>${escapeHtml(authors) || '—'}</dd>
        ${v.title ? `<dt>Title</dt><dd><strong>${escapeHtml(v.title)}</strong>${v.subtitle ? ' — ' + escapeHtml(v.subtitle) : ''}</dd>` : ''}
        ${v.publisher ? `<dt>${t('pub')}</dt><dd>${escapeHtml(v.publisher)}</dd>` : ''}
        ${v.publishedDate ? `<dt>${t('pubDate')}</dt><dd>${escapeHtml(v.publishedDate)}</dd>` : ''}
        ${v.pageCount ? `<dt>${t('pages')}</dt><dd>${v.pageCount}</dd>` : ''}
        ${v.language ? `<dt>${t('lang')}</dt><dd>${escapeHtml(v.language)}</dd>` : ''}
        ${cats ? `<dt>${t('categories')}</dt><dd>${escapeHtml(cats)}</dd>` : ''}
        ${desc ? `<dt>${t('desc')}</dt><dd>${escapeHtml(desc)}</dd>` : ''}
        ${v.previewLink || v.infoLink ? `<dt></dt><dd>${v.previewLink ? `<a href="${escapeHtml(v.previewLink)}" target="_blank" rel="noopener">${t('preview')} →</a>` : ''}${v.infoLink ? ` · <a href="${escapeHtml(v.infoLink)}" target="_blank" rel="noopener">${t('infoLink')} →</a>` : ''}</dd>` : ''}
      </dl>
    </div>`;
  $('#book-result').innerHTML = html;
}

function renderOpenLib(b) {
  const cover = b.cover ? (b.cover.large || b.cover.medium || b.cover.small) : null;
  const authors = (b.authors || []).map(a => a.name).join(', ');
  const html = `
    <div class="book-card">
      ${cover ? `<img src="${cover}" alt="${escapeHtml(b.title)}" loading="lazy">` : ''}
      <dl class="book-meta">
        <dt>${t('by')}</dt><dd>${escapeHtml(authors) || '—'}</dd>
        ${b.title ? `<dt>Title</dt><dd><strong>${escapeHtml(b.title)}</strong>${b.subtitle ? ' — ' + escapeHtml(b.subtitle) : ''}</dd>` : ''}
        ${b.publishers && b.publishers.length ? `<dt>${t('pub')}</dt><dd>${escapeHtml(b.publishers.map(p=>p.name).join(', '))}</dd>` : ''}
        ${b.publish_date ? `<dt>${t('pubDate')}</dt><dd>${escapeHtml(b.publish_date)}</dd>` : ''}
        ${b.number_of_pages ? `<dt>${t('pages')}</dt><dd>${b.number_of_pages}</dd>` : ''}
        ${(b.subjects||[]).length ? `<dt>${t('categories')}</dt><dd>${escapeHtml(b.subjects.slice(0,5).map(s=>s.name).join(', '))}</dd>` : ''}
        ${b.url ? `<dt></dt><dd><a href="${escapeHtml(b.url)}" target="_blank" rel="noopener">${t('infoLink')} →</a></dd>` : ''}
      </dl>
    </div>`;
  $('#book-result').innerHTML = html;
}

function loadExample() {
  isbnInput.value = '9780307474278';
  doLookup();
}

function doClear() { isbnInput.value = ''; $('#status').innerHTML = ''; $('#book-result').innerHTML = ''; isbnInput.classList.remove('invalid'); }

isbnInput.addEventListener('input', validateLive);
isbnInput.addEventListener('keydown', e => { if (e.key === 'Enter') doLookup(); });
$('#lookup-btn').addEventListener('click', doLookup);

$('#toolbar').innerHTML = `
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;
