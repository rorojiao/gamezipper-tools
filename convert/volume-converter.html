<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">

    <div class="gz-converter-grid" id="converter"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Volume Converter',
    toolDesc: 'Convert between liters, milliliters, gallons, cups, fluid ounces, tablespoons, cubic meters and more — instantly and free.',
    swap: 'Swap',
    clear: 'Clear',
    copy: 'Copy',
    step1: 'Enter a value in the input field',
    step2: 'Select the source unit',
    step3: 'Select the target unit',
    step4: 'The result updates instantly as you type',
  },
  zh: {
    toolTitle: '体积 & 容量单位转换器',
    toolDesc: '在升、毫升、加仑、杯、液体盎司、汤匙、立方米等单位之间即时免费转换。',
    swap: '交换',
    clear: '清除',
    copy: '复制',
    step1: '在输入框中输入数值',
    step2: '选择源单位',
    step3: '选择目标单位',
    step4: '输入时结果即时更新',
  }
});

const { $, copyText, t } = GZ;

// All factors relative to liters
const UNITS = [
  { id: 'ml', label: 'Milliliter (mL)', zh: '毫升 (mL)', factor: 0.001 },
  { id: 'l', label: 'Liter (L)', zh: '升 (L)', factor: 1 },
  { id: 'm3', label: 'Cubic Meter (m³)', zh: '立方米 (m³)', factor: 1000 },
  { id: 'cm3', label: 'Cubic Centimeter (cm³)', zh: '立方厘米 (cm³)', factor: 0.001 },
  { id: 'us_cup', label: 'US Cup', zh: '美制杯', factor: 0.236588 },
  { id: 'us_floz', label: 'US Fluid Ounce (fl oz)', zh: '美制液体盎司 (fl oz)', factor: 0.0295735 },
  { id: 'us_tbsp', label: 'US Tablespoon (tbsp)', zh: '美制汤匙 (tbsp)', factor: 0.0147868 },
  { id: 'us_tsp', label: 'US Teaspoon (tsp)', zh: '美制茶匙 (tsp)', factor: 0.00492892 },
  { id: 'us_gal', label: 'US Gallon (gal)', zh: '美制加仑 (gal)', factor: 3.78541 },
  { id: 'us_qt', label: 'US Quart (qt)', zh: '美制夸脱 (qt)', factor: 0.946353 },
  { id: 'us_pt', label: 'US Pint (pt)', zh: '美制品脱 (pt)', factor: 0.473176 },
  { id: 'uk_gal', label: 'UK Gallon (imp gal)', zh: '英制加仑 (imp gal)', factor: 4.54609 },
  { id: 'uk_floz', label: 'UK Fluid Ounce (imp fl oz)', zh: '英制液体盎司 (imp fl oz)', factor: 0.0284131 },
];

const lang = GZI18n.getLang();
const opts = UNITS.map(u => `<option value="${u.id}">${lang === 'zh' ? u.zh : u.label}</option>`).join('');

$('#converter').innerHTML = `
  <div class="gz-converter-row">
    <input type="number" id="inputVal" placeholder="0" step="any" oninput="convert()">
    <select id="fromUnit" onchange="convert()">${opts}</select>
  </div>
  <div class="gz-converter-row" style="justify-content:center">
    <button class="gz-btn gz-btn-secondary" onclick="swapUnits()">⇅ ${t('swap')}</button>
  </div>
  <div class="gz-converter-row">
    <input type="text" id="outputVal" readonly>
    <select id="toUnit" onchange="convert()">${opts}</select>
  </div>
  <div id="formulaDisplay" style="margin-top:8px;font-size:.85em;opacity:.7"></div>
`;

$('#fromUnit').value = 'l';
$('#toUnit').value = 'us_gal';

function convert() {
  const val = parseFloat($('#inputVal').value);
  if (isNaN(val)) { $('#outputVal').value = ''; $('#formulaDisplay').textContent = ''; return; }
  const from = UNITS.find(u => u.id === $('#fromUnit').value);
  const to = UNITS.find(u => u.id === $('#toUnit').value);
  const liters = val * from.factor;
  const result = liters / to.factor;
  $('#outputVal').value = parseFloat(result.toPrecision(12));
  const ratio = from.factor / to.factor;
  $('#formulaDisplay').textContent = `1 ${from.id} = ${parseFloat(ratio.toPrecision(10))} ${to.id}`;
}

function swapUnits() {
  const f = $('#fromUnit').value, t = $('#toUnit').value;
  $('#fromUnit').value = t; $('#toUnit').value = f; convert();
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="copyText($('#outputVal').value)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#inputVal').value='';$('#outputVal').value='';$('#formulaDisplay').textContent=''">${t('clear')}</button>
`;

convert();

GZ.renderToolPage({
  category: 'convert',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📏', href:'/convert/unit.html', name:'Unit Converter'},
    {icon:'🧑‍🍳', href:'/convert/cooking-converter.html', name:'Cooking Converter'},
    {icon:'📏', href:'/convert/length-converter.html', name:'Length Converter'},
    {icon:'⚖️', href:'/convert/weight-converter.html', name:'Weight Converter'},
  ]
});
</script>
