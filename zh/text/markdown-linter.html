const { $, t } = GZ;

function lint() {
  const text = $('#input').value;
  if (!text.trim()) {
    $('#output').innerHTML = `<div class="ml-empty">${t('noInput')}</div>`;
    $('#status').innerHTML = '';
    return;
  }
  const lines = text.split('\n');
  const issues = [];
  let inFence = false, fenceMarker = '';
  let prevHeadingLevel = 0, h1Count = 0, firstHeadingSeen = false;
  const headingTexts = {};
  let listContext = null; // {marker, startLine}
  let consecutiveBlanks = 0;

  for (let i = 0; i < lines.length; i++) {
    const raw = lines[i];
    const line = raw.replace(/\s+$/,'');
    const ln = i + 1;
    const trimmed = raw.trim();
    const isBlank = trimmed === '';

    // fence detection
    const fenceMatch = trimmed.match(/^(`{3,}|~{3,})(.*)$/);
    if (fenceMatch) {
      const marker = fenceMatch[1][0];
      if (!inFence) {
        inFence = true; fenceMarker = marker;
        // blank line before fence (skip if it is the first line)
        if (i > 0 && lines[i-1].trim() !== '') issues.push({ln, sev:'warn', key:'m_fence_blank', code:fenceMatch[1]});
        // language tag (``` only, ~~~ doesn't require but warn)
        if (marker === '`' && !fenceMatch[2].trim()) issues.push({ln, sev:'info', key:'m_fence_nolang'});
      } else if (marker === fenceMarker) {
        inFence = false; fenceMarker = '';
      }
      continue;
    }
    if (inFence) continue; // don't lint inside code blocks

    // trailing whitespace
    if (/[ \t]+$/.test(raw)) issues.push({ln, sev:'warn', key:'m_trailing_ws'});

    // tab character
    if (/\t/.test(raw)) issues.push({ln, sev:'info', key:'m_tab_character'});

    // long line
    if (line.length > 120) issues.push({ln, sev:'warn', key:'m_long_line', n: line.length});

    // consecutive blank lines
    if (isBlank) {
      consecutiveBlanks++;
      if (consecutiveBlanks > 1) issues.push({ln, sev:'info', key:'m_blank_lines'});
    } else {
      consecutiveBlanks = 0;
    }

    // headings
    const headingMatch = trimmed.match(/^(#{1,6})\s+(.*?)\s*#*\s*$/);
    if (headingMatch) {
      const level = headingMatch[1].length;
      const htext = headingMatch[2];
      if (!firstHeadingSeen) {
        firstHeadingSeen = true;
        if (level !== 1) issues.push({ln, sev:'warn', key:'m_first_h1'});
      }
      if (level === 1) h1Count++;
      if (prevHeadingLevel > 0 && level > prevHeadingLevel + 1) {
        issues.push({ln, sev:'err', key:'m_heading_skip', prev: prevHeadingLevel, curr: level});
      }
      // blank line before heading
      if (i > 0 && lines[i-1].trim() !== '') issues.push({ln, sev:'warn', key:'m_heading_blank_before'});
      // blank line after heading
      if (i < lines.length - 1 && lines[i+1].trim() !== '') issues.push({ln, sev:'warn', key:'m_heading_blank_after'});
      prevHeadingLevel = level;
      // duplicate heading text
      const key = htext.toLowerCase();
      headingTexts[key] = (headingTexts[key] || 0) + 1;
      if (headingTexts[key] === 2) issues.push({ln, sev:'info', key:'m_dup_heading', txt: htext});
    }

    // list items
    const listMatch = trimmed.match(/^([-*+])\s+/) || trimmed.match(/^(\d+\.)\s+/);
    if (listMatch) {
      const marker = listMatch[1];
      if (i > 0 && lines[i-1].trim() !== '' && !(/^([-*+]|\d+\.)\s+/.test(lines[i-1].trim()))) {
        issues.push({ln, sev:'warn', key:'m_list_blank_before'});
      }
      if (listContext && !listContext.ended) {
        if (/^[-*+]$/.test(marker) && listContext.marker && /^[-*+]$/.test(listContext.marker) && marker !== listContext.marker) {
          issues.push({ln, sev:'warn', key:'m_list_marker', a: listContext.marker, b: marker});
        }
        listContext.marker = marker;
      } else {
        listContext = { marker, ended: false };
      }
    } else if (!isBlank && trimmed) {
      if (listContext) listContext.ended = true;
    }

    // tables
    if (/\|.*\|/.test(trimmed) && i > 0 && lines[i-1].trim() !== '' && !/\|.*\|/.test(lines[i-1].trim())) {
      issues.push({ln, sev:'warn', key:'m_table_blank'});
    }

    // bare url
    if (/(?<![<(])(https?:\/\/[^\s)]+)(?![>;)])/i.test(trimmed) && !/^\[/.test(trimmed)) {
      issues.push({ln, sev:'info', key:'m_bare_url'});
    }
  }

  // unclosed fence
  if (inFence) issues.push({ln: lines.length, sev:'err', key:'m_fence_unclosed'});
  // multiple H1
  if (h1Count > 1) issues.push({ln: 0, sev:'warn', key:'m_h1_multi', n: h1Count});

  // sort by line then severity
  const order = {err:0, warn:1, info:2};
  issues.sort((a,b) => (a.ln - b.ln) || (order[a.sev] - order[b.sev]));

  const eCount = issues.filter(x=>x.sev==='err').length;
  const wCount = issues.filter(x=>x.sev==='warn').length;
  const iCount = issues.filter(x=>x.sev==='info').length;

  const summary = `<div class="ml-summary">
    <span class="ml-chip err"><span class="n">${eCount}</span> ${t('errors')}</span>
    <span class="ml-chip warn"><span class="n">${wCount}</span> ${t('warnings')}</span>
    <span class="ml-chip info"><span class="n">${iCount}</span> ${t('infos')}</span>
  </div>`;

  let body;
  if (issues.length === 0) {
    body = `<div class="ml-empty" style="color:#4ade80;font-size:1rem">✓ ${t('clean')}</div>`;
  } else {
    body = issues.map(it => {
      let msg = t('m_'+it.key);
      msg = msg.replace('{n}', it.n||'').replace('{prev}', it.prev||'').replace('{curr}', it.curr||'').replace('{t}', it.txt||'').replace('{a}', it.a||'').replace('{b}', it.b||'');
      const codeTag = it.code ? ` <span class="code">${escapeHtml(it.code)}</span>` : '';
      return `<div class="ml-issue"><span class="ln">${it.ln? t('line')+' '+it.ln : '—'}</span><span class="sev ${it.sev}">${t(it.sev)}</span><span class="msg">${escapeHtml(msg)}${codeTag}</span></div>`;
    }).join('');
  }
  $('#output').innerHTML = summary + body;
  $('#status').innerHTML = `<span style="color:var(--text2)">${t('summary')(eCount,wCount,iCount)}</span>`;
}

function escapeHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
