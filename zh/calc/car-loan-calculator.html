<script type="application/ld+json">{"@context":"https://schema.org","@type":"WebApplication","name":"Car Loan Calculator","description":"Calculate monthly car loan payments, total interest, total cost and amortization schedule. Supports new, used, refinance and lease buyout scenarios.","url": "https://tools.gamezipper.com/zh/calc/car-loan-calculator.html","applicationCategory":"Utility","operatingSystem":"Web Browser","offers":{"@type":"Offer","price":"0"}}</script>
<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "How is a car loan payment calculated?", "acceptedAnswer": {"@type": "Answer", "text": "Monthly payment = P × [r(1+r)^n] / [(1+r)^n − 1], where P is the principal (after down payment and trade-in), r is the monthly interest rate (APR / 12), and n is the number of months. The formula amortizes the loan equally over the term."}}, {"@type": "Question", "name": "What is a good interest rate for a car loan?", "acceptedAnswer": {"@type": "Answer", "text": "As of 2026, average new-car loan rates are 6-8% APR for prime borrowers and 9-14% for used cars. Credit unions typically offer 0.5-1% lower rates than dealerships. Your actual rate depends heavily on credit score, loan term, and whether the loan is for new or used."}}, {"@type": "Question", "name": "Should I choose a short or long loan term?", "acceptedAnswer": {"@type": "Answer", "text": "Shorter terms (36-48 months) have higher monthly payments but much lower total interest and faster equity build-up. Longer terms (72-84 months) have lower monthly payments but you pay significantly more interest and risk being upside-down on the loan. Aim for a term no longer than 60 months for the best financial outcome."}}, {"@type": "Question", "name": "Is my financial data stored?", "acceptedAnswer": {"@type": "Answer", "text": "No. All calculations happen in your browser. No data is ever sent to any server."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="cl-scenario" id="scenarios">
      <button data-s="new" class="active" onclick="setScenario('new')">🚗 New Car</button>
      <button data-s="used" onclick="setScenario('used')">🚙 Used Car</button>
      <button data-s="refi" onclick="setScenario('refi')">🔄 Refinance</button>
      <button data-s="lease" onclick="setScenario('lease')">📋 Lease Buyout</button>
    </div>
    <div class="cl-form">
      <label><span data-i18n="lblPrice"></span><input type="number" id="price" min="0" step="100" value="35000"></label>
      <label><span data-i18n="lblDown"></span><input type="number" id="down" min="0" step="100" value="5000"></label>
      <label><span data-i18n="lblTrade"></span><input type="number" id="trade" min="0" step="100" value="0"></label>
      <label><span data-i18n="lblTax"></span><input type="number" id="tax" min="0" step="0.1" value="7.0"></label>
      <label><span data-i18n="lblFees"></span><input type="number" id="fees" min="0" step="50" value="500"></label>
      <label><span data-i18n="lblAPR"></span><input type="number" id="apr" min="0" step="0.1" value="6.5"></label>
      <label><span data-i18n="lblTerm"></span>
        <select id="term">
          <option value="24">24 months (2 yr)</option>
          <option value="36" selected>36 months (3 yr)</option>
          <option value="48">48 months (4 yr)</option>
          <option value="60">60 months (5 yr)</option>
          <option value="72">72 months (6 yr)</option>
          <option value="84">84 months (7 yr)</option>
        </select>
      </label>
    </div>
    <div class="cl-tiles" id="tiles"></div>
    <div class="cl-chart" id="chart"></div>
    <div class="cl-table-wrap" id="tableWrap"></div>
    <div class="cl-tip">💡 <span id="tip"></span></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Car Loan Calculator',
    toolDesc: 'Calculate monthly car loan payments, total interest and amortization schedule. Includes sales tax, fees, down payment and trade-in. Supports new, used, refinance and lease buyout.',
    lblPrice: 'Vehicle Price ($)',
    lblDown: 'Down Payment ($)',
    lblTrade: 'Trade-in Value ($)',
    lblTax: 'Sales Tax (%)',
    lblFees: 'Title & Doc Fees ($)',
    lblAPR: 'Annual Interest Rate / APR (%)',
    lblTerm: 'Loan Term',
    tileMonthly: 'Monthly Payment',
    tileLoan: 'Loan Amount',
    tileInterest: 'Total Interest',
    tileCost: 'Total Cost',
    tilePayoff: 'Payoff Date',
    tileRate: 'Effective APR',
    tipNew: 'Tip: A 5-year (60-month) loan is usually the sweet spot — shorter terms save interest but increase monthly cost, while 72-84 month loans put you at risk of being upside-down on the loan.',
    tipUsed: 'Tip: Used cars typically carry 1-3% higher APR than new cars, and 36-48 month terms are recommended to match the shorter useful life of a used vehicle.',
    tipRefi: 'Tip: Refinancing makes sense when you can drop your APR by at least 1%, lower your monthly payment by $50+, or shorten the term. Watch for fees — they can erase the savings.',
    tipLease: 'Tip: A lease buyout is usually worth it when the residual value is below current market price, the buyout money factor is below 0.00125 (≈3% APR), or you have high excess wear charges.',
    step1: 'Pick a scenario — new, used, refinance or lease buyout (sets sensible defaults)',
    step2: 'Adjust the vehicle price, down payment, APR and term',
    step3: 'Watch the monthly payment, total interest and amortization schedule update',
    step4: 'Compare different terms to find the right balance of payment and total cost',
  },
  zh: {
    toolTitle: '车贷计算器',
    toolDesc: '计算每月车贷还款、总利息和摊销表。含销售税、费用、首付和以旧换新。支持新车、二手、贷款重组和租赁买断。',
    lblPrice: '车辆价格 ($)',
    lblDown: '首付 ($)',
    lblTrade: '以旧换新抵扣 ($)',
    lblTax: '销售税 (%)',
    lblFees: '上牌 & 文件费 ($)',
    lblAPR: '年利率 / APR (%)',
    lblTerm: '贷款期限',
    tileMonthly: '月供',
    tileLoan: '贷款金额',
    tileInterest: '总利息',
    tileCost: '总成本',
    tilePayoff: '还清日期',
    tileRate: '实际年化利率',
    tipNew: '提示：5 年（60 个月）贷款通常是最佳平衡点 — 更短期限节省利息但月供更高，72-84 个月贷款则有被倒挂的风险。',
    tipUsed: '提示：二手车通常比新车 APR 高 1-3%，建议 36-48 个月期限以匹配较短的使用寿命。',
    tipRefi: '提示：当 APR 降低至少 1%、月供降低 50 美元以上或缩短期限时，重新融资才有意义。注意手续费可能抵消节省。',
    tipLease: '提示：当残值低于当前市场价格、买断资金系数低于 0.00125（约 3% APR），或您有高额过度磨损费用时，租赁买断通常值得做。',
    step1: '选择场景 — 新车、二手、贷款重组或租赁买断（设置合理默认值）',
    step2: '调整车辆价格、首付、APR 和期限',
    step3: '查看月供、总利息和摊销表的实时更新',
    step4: '对比不同期限，找到月供与总成本的最佳平衡',
  }
});

const { $, $$, t } = GZ;

// Populate data-i18n labels
$$('[data-i18n]').forEach(el => { el.textContent = t(el.dataset.i18n); });

const SCENARIO_DEFAULTS = {
  new:   {price:35000, down:5000,  trade:0,    tax:7.0, fees:500, apr:6.5, term:60},
  used:  {price:22000, down:3000,  trade:0,    tax:6.0, fees:300, apr:8.5, term:48},
  refi:  {price:28000, down:0,     trade:0,    tax:0,   fees:0,   apr:4.5, term:60},
  lease: {price:24000, down:0,     trade:0,    tax:0,   fees:0,   apr:3.0, term:36},
};

let currentScenario = 'new';

function setScenario(s) {
  currentScenario = s;
  document.querySelectorAll('#scenarios button').forEach(b => b.classList.toggle('active', b.dataset.s === s));
  const d = SCENARIO_DEFAULTS[s];
  $('#price').value = d.price;
  $('#down').value = d.down;
  $('#trade').value = d.trade;
  $('#tax').value = d.tax;
  $('#fees').value = d.fees;
  $('#apr').value = d.apr;
  $('#term').value = d.term;
  calc();
}

function calc() {
  const price = +$('#price').value || 0;
  const down = +$('#down').value || 0;
  const trade = +$('#trade').value || 0;
  const taxPct = +$('#tax').value || 0;
  const fees = +$('#fees').value || 0;
  const apr = +$('#apr').value || 0;
  const months = +$('#term').value || 36;

  const taxable = Math.max(0, price - trade);
  const taxAmount = taxable * taxPct / 100;
  const principal = Math.max(0, price - down - trade + taxAmount + fees);
  const monthlyRate = apr / 100 / 12;

  let monthly = 0;
  if (principal > 0 && months > 0) {
    if (monthlyRate === 0) {
      monthly = principal / months;
    } else {
      const f = Math.pow(1 + monthlyRate, months);
      monthly = principal * (monthlyRate * f) / (f - 1);
    }
  }
  const totalPaid = monthly * months;
  const totalInterest = Math.max(0, totalPaid - principal);

  // Payoff date
  const payoff = new Date();
  payoff.setMonth(payoff.getMonth() + months);

  $('#tiles').innerHTML = `
    <div class="cl-tile"><div class="num">$${monthly.toFixed(2)}</div><div class="lbl">${t('tileMonthly')}</div></div>
    <div class="cl-tile"><div class="num">$${principal.toFixed(0).replace(/\B(?=(\d{3})+(?!\d))/g, ',')}</div><div class="lbl">${t('tileLoan')}</div></div>
    <div class="cl-tile"><div class="num">$${totalInterest.toFixed(0).replace(/\B(?=(\d{3})+(?!\d))/g, ',')}</div><div class="lbl">${t('tileInterest')}</div></div>
    <div class="cl-tile"><div class="num">$${(totalPaid + down + trade).toFixed(0).replace(/\B(?=(\d{3})+(?!\d))/g, ',')}</div><div class="lbl">${t('tileCost')}</div></div>
    <div class="cl-tile"><div class="num">${payoff.toLocaleDateString('en-US', {year:'numeric', month:'short'})}</div><div class="lbl">${t('tilePayoff')}</div></div>
  `;

  // Build amortization and chart
  let balance = principal;
  const rows = [];
  const chartData = [];
  for (let i = 1; i <= months; i++) {
    const interest = balance * monthlyRate;
    const principalPay = monthly - interest;
    balance = Math.max(0, balance - principalPay);
    rows.push({n:i, payment:monthly, principal:principalPay, interest, balance});
    chartData.push({month:i, balance, principal:principalPay, interest});
  }

  // Simple SVG chart: stacked bar of remaining balance over time, OR balance curve
  let svg = '<svg viewBox="0 0 600 180" preserveAspectRatio="none" width="100%" height="100%">';
  const maxBal = principal;
  const yearGroups = Math.ceil(months / 12);
  const barWidth = 580 / months;
  for (let i = 0; i < months; i++) {
    const x = 10 + i * barWidth;
    const balH = (chartData[i].balance / maxBal) * 150;
    const intH = (chartData[i].interest / monthly) * 150;
    const prinH = (chartData[i].principal / monthly) * 150;
    // principal portion (bottom)
    svg += `<rect x="${x}" y="${170 - prinH}" width="${barWidth - 0.5}" height="${prinH}" fill="var(--success)"/>`;
    // interest portion (top)
    svg += `<rect x="${x}" y="${170 - prinH - intH}" width="${barWidth - 0.5}" height="${intH}" fill="var(--accent)"/>`;
  }
  // year markers
  for (let y = 1; y <= yearGroups; y++) {
    const x = 10 + (y * 12) * barWidth;
    if (x < 590) svg += `<line x1="${x}" y1="0" x2="${x}" y2="170" stroke="rgba(255,255,255,.1)"/><text x="${x+2}" y="14" font-size="9" fill="var(--text2)">Y${y}</text>`;
  }
  svg += '</svg>';
  $('#chart').innerHTML = svg + `<div style="display:flex;gap:14px;font-size:.78em;margin-top:6px;justify-content:center"><span><span style="display:inline-block;width:10px;height:10px;background:var(--success);border-radius:2px;vertical-align:middle"></span> Principal</span><span><span style="display:inline-block;width:10px;height:10px;background:var(--accent);border-radius:2px;vertical-align:middle"></span> Interest</span></div>`;

  // Table - first 12 + last 12 + yearly summaries
  const fmt = v => '$' + v.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
  let tableHtml = '<table class="cl-table"><thead><tr><th>Month</th><th>Payment</th><th>Principal</th><th>Interest</th><th>Balance</th></tr></thead><tbody>';
  // Year summary rows
  for (let y = 1; y <= yearGroups; y++) {
    const start = (y-1) * 12 + 1;
    const end = Math.min(y * 12, months);
    let yearPrincipal = 0, yearInterest = 0, yearPayment = 0;
    for (let i = start-1; i < end; i++) {
      yearPrincipal += chartData[i].principal;
      yearInterest += chartData[i].interest;
      yearPayment += monthly;
    }
    const endBal = chartData[end-1].balance;
    tableHtml += `<tr style="background:var(--glass)"><td>Year ${y} (${start}-${end})</td><td>${fmt(yearPayment)}</td><td>${fmt(yearPrincipal)}</td><td>${fmt(yearInterest)}</td><td>${fmt(endBal)}</td></tr>`;
  }
  tableHtml += '</tbody></table>';
  $('#tableWrap').innerHTML = tableHtml;

  // Tip per scenario
  const tipKey = 'tip' + currentScenario.charAt(0).toUpperCase() + currentScenario.slice(1);
  $('#tip').textContent = t(tipKey);
}

$('#toolbar').innerHTML = '';
['price','down','trade','tax','fees','apr','term'].forEach(id => {
  $('#' + id).addEventListener('input', calc);
  $('#' + id).addEventListener('change', calc);
});

calc();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🏦', href:'/calc/loan-calculator.html', name:'Loan Calculator'},
    {icon:'📋', href:'/calc/loan-amortization.html', name:'Amortization Schedule'},
    {icon:'⚖️', href:'/calc/loan-comparison.html', name:'Loan Comparison'},
    {icon:'🏘️', href:'/calc/rent-vs-buy.html', name:'Rent vs Buy'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
