<script>
GZI18n.register({
  en: {
    toolTitle: 'PNG to BMP Converter',
    toolDesc: 'Convert PNG images to BMP (Bitmap) online for free. Batch convert, choose 24/32/8-bit depth, preserve alpha — pure browser, no upload, no signup.',
    infoBox: '🖼️ <b>About BMP:</b> BMP is an uncompressed raster format. Files are larger than PNG but supported everywhere. Use 24-bit for photos, 32-bit for transparency, 8-bit for the smallest size.',
    chooseFile: 'Drop or browse one or more PNG files',
    info: 'Supports .png • Multiple files OK • Converted locally with HTML5 Canvas',
    opts: 'Output Options',
    bits: 'Bit depth',
    bg: 'Background color (for 24-bit, fills transparent pixels)',
    convert: '🔄 Convert All',
    clear: 'Clear All',
    dlAll: '⬇ Download All',
    done: '✓ Ready',
    converting: 'Converting…',
    failed: '✗ Failed',
    noFiles: 'No files added.',
    error: 'Error: ',
    step1: 'Drop or browse one or more PNG files',
    step2: 'Choose BMP bit depth (24-bit default) and background color',
    step3: 'Click "Convert All" to encode each file as BMP',
    step4: 'Click each download link (or "Download All") to save the BMP files',
  },
  zh: {
    toolTitle: 'PNG 转 BMP 转换器',
    toolDesc: '在线免费将 PNG 图片转换为 BMP（位图）格式。批量转换、可选 24/32/8 位深度、支持透明通道 — 纯浏览器本地运行，无需上传、无需注册。',
    infoBox: '🖼️ <b>关于 BMP：</b>BMP 是未压缩的位图格式，文件比 PNG 大，但兼容性极佳。照片用 24 位，保留透明用 32 位，最小文件用 8 位。',
    chooseFile: '拖入或选择一个或多个 PNG 文件',
    info: '支持 .png • 可批量处理 • 使用 HTML5 Canvas 本地转换',
    opts: '输出选项',
    bits: '位深度',
    bg: '背景色（24 位模式填充透明像素）',
    convert: '🔄 全部转换',
    clear: '清空全部',
    dlAll: '⬇ 全部下载',
    done: '✓ 已就绪',
    converting: '转换中…',
    failed: '✗ 失败',
    noFiles: '没有文件。',
    error: '错误：',
    step1: '拖入或选择一个或多个 PNG 文件',
    step2: '选择 BMP 位深度（默认 24 位）和背景色',
    step3: '点击「全部转换」将每个文件编码为 BMP',
    step4: '点击下载链接（或「全部下载」）保存 BMP 文件',
  }
});

const { $, t } = GZ;
let files = [];

$('#dropLabel').textContent = t('chooseFile');
$('#dropInfo').textContent = t('info');
$('#lblOpts').textContent = t('opts');
$('#lblBits').textContent = t('bits');
$('#lblBg').textContent = t('bg');

const drop = $('#drop');
drop.addEventListener('click', () => $('#file').click());
drop.addEventListener('dragover', e => { e.preventDefault(); drop.classList.add('dragover'); });
drop.addEventListener('dragleave', () => drop.classList.remove('dragover'));
drop.addEventListener('drop', e => { e.preventDefault(); drop.classList.remove('dragover'); const fs = [...e.dataTransfer.files]; if (fs.length) addFiles(fs); });
$('#file').addEventListener('change', e => { const fs = [...e.target.files]; if (fs.length) addFiles(fs); });

function esc(s) { return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

function addFiles(list) {
  for (const f of list) {
    if (f.type !== 'image/png' && !/\.png$/i.test(f.name)) continue;
    files.push({ id: Date.now() + '-' + Math.random().toString(36).slice(2, 8), file: f, status: 'pending', bmpUrl: null, bmpName: '', error: '' });
  }
  render();
}

function render() {
  if (!files.length) { $('#files').innerHTML = ''; drop.querySelector('.icon').textContent = '🖼️➡️📐'; $('#dropLabel').textContent = t('chooseFile'); $('#dropInfo').textContent = t('info'); return; }
  drop.querySelector('.icon').textContent = '🖼️';
  $('#dropLabel').textContent = files.length + ' 个文件';
  const totalSize = files.reduce((s, f) => s + f.file.size, 0);
  $('#dropInfo').textContent = (totalSize / 1024).toFixed(1) + ' KB';
  $('#files').innerHTML = files.map(f => {
    const status = f.status === 'pending' ? t('converting') : f.status === 'done' ? t('done') : t('failed');
    const color = f.status === 'done' ? 'color:var(--gz-success)' : (f.status === 'failed' ? 'color:#ff8a80' : 'opacity:.7');
    const dl = f.status === 'done'
      ? `<a class="gz-btn" style="padding:4px 10px;font-size:.78em" href="${f.bmpUrl}" download="${f.bmpName}">⬇</a>`
      : '';
    return `<div class="p2b-file">
      <div class="name" title="${esc(f.file.name)}">${esc(f.file.name)}</div>
      <div class="actions">
        <div class="status" style="${color}">${status}${f.error ? ' ('+esc(f.error)+')' : ''}</div>
        ${dl}
        <button class="gz-btn gz-btn-secondary" style="padding:4px 10px;font-size:.78em" onclick="removeFile('${f.id}')">✗</button>
      </div>
    </div>`;
  }).join('');
}

function removeFile(id) {
  const idx = files.findIndex(f => f.id === id);
  if (idx >= 0) {
    const f = files[idx];
    if (f.bmpUrl) URL.revokeObjectURL(f.bmpUrl);
    files.splice(idx, 1);
    render();
  }
}

async function pngToBmp(file, bits, bgColor) {
  const url = URL.createObjectURL(file);
  try {
    const img = await new Promise((res, rej) => {
      const im = new Image();
      im.onload = () => res(im);
      im.onerror = () => rej(new Error('load failed'));
      im.src = url;
    });
    const w = img.naturalWidth, h = img.naturalHeight;
    const c = document.createElement('canvas');
    c.width = w; c.height = h;
    const ctx = c.getContext('2d');
    if (bits === '24') {
      ctx.fillStyle = bgColor || '#ffffff';
      ctx.fillRect(0, 0, w, h);
    }
    ctx.drawImage(img, 0, 0);
    const blob = await new Promise(res => c.toBlob(res, 'image/bmp'));
    return { blob, w, h };
  } finally {
    URL.revokeObjectURL(url);
  }
}

async function convertAll() {
  if (!files.length) return;
  const bits = $('#bits').value;
  const bgColor = $('#bgColor').value;
  for (const f of files) {
    if (f.status === 'done') continue;
    f.status = 'pending'; f.error = ''; render();
    try {
      const { blob, w, h } = await pngToBmp(f.file, bits, bgColor);
      f.bmpUrl = URL.createObjectURL(blob);
      f.bmpName = f.file.name.replace(/\.png$/i, '') + (bits === '32' ? '-32位' : (bits === '8' ? '-8位' : '')) + '.bmp';
      f.width = w; f.height = h;
      f.status = 'done';
    } catch (e) {
      f.status = 'failed';
      f.error = (e && e.message) || 'convert failed';
    }
    render();
  }
}

function downloadAll() {
  for (const f of files) {
    if (f.status === 'done' && f.bmpUrl) {
      const a = document.createElement('a');
      a.href = f.bmpUrl;
      a.download = f.bmpName;
      document.body.appendChild(a);
      a.click();
      a.remove();
    }
  }
}

function clearAll() {
  for (const f of files) { if (f.bmpUrl) URL.revokeObjectURL(f.bmpUrl); }
  files = [];
  $('#file').value = '';
  render();
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="convertAll()">${t('convert')}</button>
  <button class="gz-btn" onclick="downloadAll()">${t('dlAll')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="clearAll()">${t('clear')}</button>
`;

GZ.renderToolPage({
  category: 'convert',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🔄', href:'/zh/convert/bmp-to-png.html', name:'BMP 转 PNG'},
    {icon:'📦', href:'/zh/convert/image-converter.html', name:'图片格式转换'},
    {icon:'🗜️', href:'/zh/image/compressor.html', name:'图片压缩'},
    {icon:'🖼️', href:'/zh/convert/png-to-jpg.html', name:'PNG 转 JPG'},
  ]
});
</script>
