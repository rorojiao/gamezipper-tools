const catKeys = ['smileys','people','animals','food','travel','activities','objects','symbols','flags'];
const catI18nKeys = {smileys:'catSmileys',people:'catPeople',animals:'catAnimals',food:'catFood',travel:'catTravel',activities:'catActivities',objects:'catObjects',symbols:'catSymbols',flags:'catFlags'};
let recentEmojis = JSON.parse(localStorage.getItem('gz-emoji-recent') || '[]');
let activeTab = 'smileys';

function showToast(msg) {
  let toast = document.querySelector('.gz-toast');
  if (!toast) { toast = document.createElement('div'); toast.className = 'gz-toast'; document.body.appendChild(toast); }
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toast._timer);
  toast._timer = setTimeout(() => toast.classList.remove('show'), 1200);
}

function copyEmoji(emoji) {
  copyText(emoji);
  showToast(t('copied'));
  recentEmojis = [emoji, ...recentEmojis.filter(e => e !== emoji)].slice(0, 16);
  localStorage.setItem('gz-emoji-recent', JSON.stringify(recentEmojis));
  renderRecent();
}

function renderRecent() {
  const section = $('#recent-section');
  const grid = $('#recent-grid');
  if (!recentEmojis.length) { section.style.display = 'none'; return; }
  section.style.display = '';
  $('#recent-label').textContent = t('recentEmojis');
  grid.innerHTML = recentEmojis.map(e => `<div class="gz-emoji-item" data-name="${e}" onclick="copyEmoji('${e}')">${e}</div>`).join('');
}

function renderTabs() {
  const tabs = $('#cat-tabs');
  tabs.innerHTML = catKeys.map(k => `<button class="gz-cat-tab${k===activeTab?' active':''}" onclick="switchTab('${k}')">${t(catI18nKeys[k])}</button>`).join('');
}

function switchTab(tab) {
  activeTab = tab;
  renderTabs();
  renderEmojis();
}

function renderEmojis(query) {
  const container = $('#emoji-container');
  const q = (query || '').toLowerCase().trim();
  let html = '';

  if (q) {
    let matches = [];
    catKeys.forEach(cat => {
      emojiData[cat].forEach(e => {
        if (e.name.toLowerCase().includes(q) || e.keywords.toLowerCase().includes(q)) matches.push(e);
      });
    });
    if (!matches.length) {
      container.innerHTML = `<div class="gz-no-results">${t('noResults')}</div>`;
      return;
    }
    html += '<div class="gz-emoji-grid">' + matches.map(e => `<div class="gz-emoji-item" data-name="${e.name}" onclick="copyEmoji('${e.emoji}')">${e.emoji}</div>`).join('') + '</div>';
  } else {
    const cat = activeTab;
    const emojis = emojiData[cat] || [];
    html += `<div class="gz-emoji-category"><div class="gz-emoji-grid">${emojis.map(e => `<div class="gz-emoji-item" data-name="${e.name}" onclick="copyEmoji('${e.emoji}')">${e.emoji}</div>`).join('')}</div></div>`;
  }
  container.innerHTML = html;
}

$('#emoji-search').placeholder = t('searchPlaceholder');
$('#emoji-search').addEventListener('input', function() { renderEmojis(this.value); });

renderRecent();
renderTabs();
renderEmojis();
