<script>
GZI18n.register({
  en: {
    toolTitle: 'Strikethrough Text Generator',
    toolDesc: 'Convert your text into s̶t̶r̶i̶k̶e̶t̶h̶r̶o̶u̶g̶h̶, double strike and slash-through styles. Great for memes, sarcasm, edited posts and chat. Copy & paste anywhere.',
    input: 'Type or paste your text',
    clickToCopy: 'Click to copy',
    step1: 'Type or paste the text you want to strike through',
    step2: 'Browse the generated styles below',
    step3: 'Click on any style to copy it to your clipboard',
    step4: 'Paste the strikethrough text on social media or anywhere',
    styles: [
      {name:'Strikethrough',id:'strike'},
      {name:'Double Strikethrough',id:'doubleStrike'},
      {name:'Slash-Through',id:'slash'},
      {name:'Underline + Strikethrough',id:'underlineStrike'},
    ],
  },
  zh: {
    toolTitle: '删除线文字生成器',
    toolDesc: '将文字转换为 s̶t̶r̶i̶k̶e̶t̶h̶r̶o̶u̶g̶h̶ 删除线、双删除线和斜划线样式。适合梗图、反讽、编辑帖子和聊天。复制粘贴到任何地方。',
    input: '输入或粘贴您的文字',
    clickToCopy: '点击复制',
    step1: '输入或粘贴要添加删除线的文字',
    step2: '浏览下方生成的样式',
    step3: '点击任意样式复制到剪贴板',
    step4: '将删除线文字粘贴到社交媒体或任何地方',
    styles: [
      {name:'删除线',id:'strike'},
      {name:'双删除线',id:'doubleStrike'},
      {name:'斜划线',id:'slash'},
      {name:'下划线 + 删除线',id:'underlineStrike'},
    ],
  }
});

const { $, copyText, t } = GZ;

$('#input').placeholder = t('input');

function toStrikethrough(text) {
  // U+0336 COMBINING LONG STROKE OVERLAY
  return [...text].map(ch => ch + '\u0336').join('');
}

function toDoubleStrikethrough(text) {
  // U+0336 + U+0337 (COMBINING SHORT SOLIDUS OVERLAY) for a double effect
  return [...text].map(ch => ch + '\u0336\u0337').join('');
}

function toSlash(text) {
  // U+0338 COMBINING LONG SOLIDUS OVERLAY (diagonal slash)
  return [...text].map(ch => ch + '\u0338').join('');
}

function toUnderlineStrike(text) {
  // U+0332 (combining low line) + U+0336 (strike)
  return [...text].map(ch => ch + '\u0332\u0336').join('');
}

const converters = {
  strike: toStrikethrough,
  doubleStrike: toDoubleStrikethrough,
  slash: toSlash,
  underlineStrike: toUnderlineStrike,
};

function render() {
  const text = $('#input').value;
  const results = $('#results');
  const styles = t('styles');
  if (!text) {
    results.innerHTML = `<div style="color:var(--text2);text-align:center;padding:40px 0;opacity:.6">${t('input')}</div>`;
    return;
  }
  results.innerHTML = styles.map(s => {
    const converted = converters[s.id] ? converters[s.id](text) : text;
    return `<div class="result-box" onclick="copyText(this.querySelector('.style-text').textContent)">
      <div class="style-name">${s.name}</div>
      <div class="style-text">${converted.replace(/</g,'&lt;')}</div>
      <div class="copy-hint">${t('clickToCopy')} ⎘</div>
    </div>`;
  }).join('');
}

$('#input').addEventListener('input', render);

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'〰️', href:'/text/underline-text.html', name:'Underline Text'},
    {icon:'🎨', href:'/text/ascii-art.html', name:'ASCII Art'},
    {icon:'🌀', href:'/text/zalgo-text.html', name:'Zalgo Text'},
    {icon:'✨', href:'/text/bubble-text.html', name:'Bubble Text'},
  ]
});
render();
</script>
