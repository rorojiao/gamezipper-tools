<style>
.tip-form{display:grid;gap:16px;max-width:500px}
.tip-form label{display:flex;flex-direction:column;gap:4px;font-size:.85em;color:var(--text2)}
.tip-form input{padding:10px 12px;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:1em}
.tip-presets{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px}
.tip-presets button{padding:6px 14px;border-radius:8px;border:1px solid var(--border);background:var(--glass);color:var(--text);cursor:pointer;font-size:.9em;transition:all .2s}
.tip-presets button.active,.tip-presets button:hover{background:var(--accent);color:#000;border-color:var(--accent)}
.tip-results{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-top:20px}
.tip-card{background:var(--glass);border:1px solid var(--border);border-radius:12px;padding:16px;text-align:center}
.tip-card .value{font-size:1.6rem;font-weight:800;color:var(--accent)}
.tip-card .label{font-size:.8em;color:var(--text2);margin-top:4px}
.tip-card.highlight{background:var(--accent);border-color:var(--accent)}
.tip-card.highlight .value,.tip-card.highlight .label{color:#000}
</style>

<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"How much should I tip at a restaurant?","acceptedAnswer":{"@type":"Answer","text":"In the US, 15-20% is standard for good service. 18% is a common baseline. For exceptional service, 20-25% is appreciated."}},{"@type":"Question","name":"How do I split the bill with tip?","acceptedAnswer":{"@type":"Answer","text":"Enter the bill amount, select your tip percentage, then enter the number of people. The calculator shows the total per person including tip."}},{"@type":"Question","name":"Does this work for different currencies?","acceptedAnswer":{"@type":"Answer","text":"Yes. Enter the bill in any currency — the calculator works with pure numbers. The tip and total are calculated in the same currency."}}]}</script>
<link rel="alternate" hreflang="en" href="https://tools.gamezipper.com/calc/tip-calculator.html">
<link rel="alternate" hreflang="zh" href="https://tools.gamezipper.com/zh/calc/tip-calculator.html">
<link rel="alternate" hreflang="x-default" href="https://tools.gamezipper.com/calc/tip-calculator.html">
</head>
<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="tip-form">
      <label><span id="lbl-bill"></span><input type="number" id="bill" placeholder="0.00" step="0.01" min="0" oninput="calcTip()"></label>
      <div>
        <span id="lbl-tip" style="font-size:.85em;color:var(--text2)"></span>
        <div class="tip-presets" id="presets"></div>
        <input type="number" id="tipPct" placeholder="18" min="0" max="100" value="18" oninput="calcTip()" style="margin-top:8px;width:100px;padding:8px;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:.95em">
        <span style="font-size:.9em;color:var(--text2);margin-left:4px">%</span>
      </div>
      <label><span id="lbl-people"></span><input type="number" id="people" value="1" min="1" max="100" oninput="calcTip()"></label>
    </div>
    <div id="result"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Tip Calculator',
    toolDesc: 'Calculate tip amount, split the bill, and see total per person instantly.',
    bill: 'Bill Amount ($)',
    tipPct: 'Tip Percentage',
    people: 'Number of People',
    tipAmount: 'Tip Amount',
    totalBill: 'Total Bill',
    perPerson: 'Per Person',
    clear: 'Clear',
    step1: 'Enter your bill amount',
    step2: 'Select a tip preset or enter a custom percentage',
    step3: 'Set the number of people to split the bill',
    step4: 'See the tip, total, and amount per person instantly',
  },
  zh: {
    toolTitle: '小费计算器',
    toolDesc: '即时计算小费金额、分账和每人应付总额。',
    bill: '账单金额',
    tipPct: '小费比例',
    people: '分账人数',
    tipAmount: '小费金额',
    totalBill: '账单总额',
    perPerson: '每人应付',
    clear: '清除',
    step1: '输入账单金额',
    step2: '选择小费预设比例或输入自定义百分比',
    step3: '设置分账人数',
    step4: '即时查看小费、总额和每人应付金额',
  }
});

const { $, t } = GZ;

$('#lbl-bill').textContent = t('bill');
$('#lbl-tip').textContent = t('tipPct');
$('#lbl-people').textContent = t('people');

const presets = [10, 15, 18, 20, 25];
const presetsEl = $('#presets');
presetsEl.innerHTML = presets.map(p =>
  `<button onclick="setPreset(${p},this)">${p}%</button>`
).join('');

function setPreset(val, btn) {
  $('#tipPct').value = val;
  document.querySelectorAll('.tip-presets button').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  calcTip();
}

function calcTip() {
  const bill = parseFloat($('#bill').value) || 0;
  const pct = parseFloat($('#tipPct').value) || 0;
  const people = Math.max(1, parseInt($('#people').value) || 1);

  const tip = bill * pct / 100;
  const total = bill + tip;
  const perPerson = total / people;

  if (bill <= 0) { $('#result').innerHTML = ''; return; }

  $('#result').innerHTML = `<div class="tip-results">
    <div class="tip-card"><div class="value">$${tip.toFixed(2)}</div><div class="label">${t('tipAmount')}</div></div>
    <div class="tip-card"><div class="value">$${total.toFixed(2)}</div><div class="label">${t('totalBill')}</div></div>
    <div class="tip-card highlight"><div class="value">$${perPerson.toFixed(2)}</div><div class="label">${t('perPerson')}</div></div>
  </div>`;

  // Update active state
  document.querySelectorAll('.tip-presets button').forEach(b => {
    b.classList.toggle('active', parseInt(b.textContent) === pct);
  });
}

$('#toolbar').innerHTML = `<button class="gz-btn gz-btn-secondary" onclick="$('#bill').value='';$('#tipPct').value='18';$('#people').value='1';$('#result').innerHTML=''">${t('clear')}</button>`;

// Set default active
setPreset(18, presetsEl.children[2]);

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🔢', href:'/calc/percentage-calculator.html', name:'Percentage Calc'},
    {icon:'🎂', href:'/calc/age-calculator.html', name:'Age Calculator'},
    {icon:'🏦', href:'/calc/loan-calculator.html', name:'Loan Calculator'},
    {icon:'⛽', href:'/calc/fuel-cost-calculator.html', name:'Fuel Cost'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
