// Minimal TOML parser
function parseToml(text) {
  const result = {};
  const lines = text.split('\n');
  let currentPath = [];
  let currentObj = result;
  let multilineKey = null;
  let multilineVal = '';
  let multilineType = null;

  function getObj(path) {
    let obj = result;
    for (const p of path) {
      if (obj[p] === undefined) obj[p] = {};
      obj = obj[p];
    }
    return obj;
  }

  function setKey(obj, key, val) {
    const parts = key.split('.');
    let o = obj;
    for (let i = 0; i < parts.length - 1; i++) {
      if (o[parts[i]] === undefined) o[parts[i]] = {};
      o = o[parts[i]];
    }
    o[parts[parts.length - 1]] = val;
  }

  function parseValue(v) {
    v = v.trim();
    if (v === 'true') return true;
    if (v === 'false') return false;
    if (v.match(/^-?\d+$/)) return parseInt(v, 10);
    if (v.match(/^-?\d+\.\d+$/)) return parseFloat(v);
    if ((v.startsWith('"') && v.endsWith('"')) || (v.startsWith("'") && v.endsWith("'"))) {
      return v.slice(1, -1).replace(/\\n/g, '\n').replace(/\\t/g, '\t').replace(/\\\\/g, '\\');
    }
    if (v.startsWith('[')) {
      try { return JSON.parse(v.replace(/'/g, '"')); } catch(e) { return v; }
    }
    if (v.startsWith('{')) {
      try { return JSON.parse(v.replace(/(\w+)\s*=/g, '"$1":').replace(/'/g, '"')); } catch(e) { return v; }
    }
    return v;
  }

  for (let raw of lines) {
    const line = raw.trim();

    if (multilineKey !== null) {
      if (line.includes(multilineType === 'basic' ? '"""' : "'''")) {
        multilineVal += line.substring(0, line.indexOf(multilineType === 'basic' ? '"""' : "'''"));
        setKey(currentObj, multilineKey, multilineVal);
        multilineKey = null; multilineVal = ''; multilineType = null;
      } else {
        multilineVal += line + '\n';
      }
      continue;
    }

    if (!line || line.startsWith('#')) continue;

    // Table header
    const tableMatch = line.match(/^\[([^\]]+)\]$/);
    if (tableMatch) {
      currentPath = tableMatch[1].split('.').map(s => s.trim());
      currentObj = getObj(currentPath);
      continue;
    }

    // Array of tables
    const arrTableMatch = line.match(/^\[\[([^\]]+)\]\]$/);
    if (arrTableMatch) {
      const parts = arrTableMatch[1].split('.').map(s => s.trim());
      let obj = result;
      for (let i = 0; i < parts.length - 1; i++) {
        if (obj[parts[i]] === undefined) obj[parts[i]] = {};
        obj = obj[parts[i]];
      }
      const last = parts[parts.length - 1];
      if (!obj[last]) obj[last] = [];
      const newItem = {};
      obj[last].push(newItem);
      currentObj = newItem;
      currentPath = parts;
      continue;
    }

    // Multiline string
    if (line.includes('"""')) {
      const eqIdx = line.indexOf('=');
      if (eqIdx > -1) {
        const key = line.substring(0, eqIdx).trim();
        const rest = line.substring(eqIdx + 1).trim();
        if (rest === '"""' || rest === "'''") {
          multilineKey = key;
          multilineType = rest.startsWith('"') ? 'basic' : 'literal';
          multilineVal = '';
          continue;
        }
      }
    }

    // Key = value
    const kvMatch = line.match(/^([A-Za-z0-9_.-]+)\s*=\s*(.+)$/);
    if (kvMatch) {
      const key = kvMatch[1].trim();
      const val = parseValue(kvMatch[2].trim());
      setKey(currentObj, key, val);
    }
  }
  return result;
}

function toYaml(obj, indent) {
  indent = indent || 0;
  const pad = '  '.repeat(indent);
  const lines = [];
  if (Array.isArray(obj)) {
    if (obj.length === 0) return '[]';
    for (const item of obj) {
      if (typeof item === 'object' && item !== null) {
        const sub = toYaml(item, indent + 1).trimStart();
        lines.push(pad + '- ' + sub.substring(pad.length + 2));
      } else {
        lines.push(pad + '- ' + yamlVal(item));
      }
    }
  } else if (typeof obj === 'object' && obj !== null) {
    const keys = Object.keys(obj);
    if (keys.length === 0) return '{}';
    for (const key of keys) {
      const val = obj[key];
      const safeKey = /^[a-zA-Z0-9_-]+$/.test(key) ? key : '"' + key.replace(/"/g, '\\"') + '"';
      if (typeof val === 'object' && val !== null) {
        lines.push(pad + safeKey + ':');
        lines.push(toYaml(val, indent + 1));
      } else {
        lines.push(pad + safeKey + ': ' + yamlVal(val));
      }
    }
  } else {
    return pad + yamlVal(obj);
  }
  return lines.join('\n');
}

function yamlVal(v) {
  if (v === null || v === undefined) return 'null';
  if (typeof v === 'boolean') return v ? 'true' : 'false';
  if (typeof v === 'number') return String(v);
  if (typeof v === 'string') {
    if (v.includes('\n')) return '|\n' + v.split('\n').map(l => '  '.repeat(1) + l).join('\n');
    if (v === '' || /[:#{}[\],&*?|>!%@`]/.test(v) || v.match(/^\d/) || v.match(/^\s|\s$/)) {
      return '"' + v.replace(/\\/g, '\\\\').replace(/"/g, '\\"').replace(/\n/g, '\\n') + '"';
    }
    return v;
  }
  return String(v);
}

function doConvert() {
  const inp = $('#input').value.trim();
  if (!inp) return;
  try {
    const obj = parseToml(inp);
    const yaml = toYaml(obj);
    $('#output').value = yaml;
    $('#status').innerHTML = `<span style="color:var(--gz-success)">${t('converted')}</span>`;
  } catch(e) {
    $('#status').innerHTML = `<span style="color:var(--gz-accent)">${t('error')}: ${e.message}</span>`;
    $('#output').value = '';
  }
}
