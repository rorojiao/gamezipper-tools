<script>
GZI18n.register({
  en: {
    toolTitle: 'Online Whiteboard & Drawing Tool',
    toolDesc: 'Free online whiteboard — sketch, draw, erase, add text and shapes. Download as PNG, works on mobile.',
    pen: '✏️ Pen',
    eraser: '🧹 Eraser',
    line: '📏 Line',
    rect: '⬜ Rect',
    circle: '⭕ Circle',
    text: '🔤 Text',
    clear: '🗑️ Clear',
    undo: '↩️ Undo',
    download: '💾 PNG',
    size: 'Size',
    step1: 'Pick a tool: Pen, Eraser, Line, Rectangle, Circle or Text',
    step2: 'Choose a color and brush size',
    step3: 'Draw on the canvas with mouse or touch',
    step4: 'Click Download to save as PNG image',
  },
  zh: {
    toolTitle: '在线白板 & 绘图工具',
    toolDesc: '免费在线白板 — 涂鸦、画线、擦除、添加文字和形状。下载为 PNG，支持手机。',
    pen: '✏️ 画笔',
    eraser: '🧹 橡皮擦',
    line: '📏 直线',
    rect: '⬜ 矩形',
    circle: '⭕ 圆形',
    text: '🔤 文字',
    clear: '🗑️ 清空',
    undo: '↩️ 撤销',
    download: '💾 PNG',
    size: '粗细',
    step1: '选择工具：画笔、橡皮擦、直线、矩形、圆形或文字',
    step2: '选择颜色和画笔粗细',
    step3: '用鼠标或触屏在画布上绘制',
    step4: '点击下载保存为 PNG 图片',
  }
});

const { $, t } = GZ;
const canvas = $('#wb-canvas');
const ctx = canvas.getContext('2d');
let tool = 'pen', color = '#222222', size = 3, drawing = false;
let history = [], startX, startY;
ctx.fillStyle = '#fff';
ctx.fillRect(0, 0, canvas.width, canvas.height);
saveState();

const colors = ['#222222','#e94560','#00d672','#61afef','#d19a66','#c678dd','#56b6c2','#e5c07b','#ff6b6b','#98c379'];
let colorHTML = '<div class="wb-colors">';
colors.forEach((c,i) => { colorHTML += `<span style="background:${c}" data-c="${c}" class="${i===0?'active':''}"></span>`; });
colorHTML += `<input type="color" value="#222222" id="wb-custom-color" style="width:26px;height:26px;border:none;cursor:pointer;padding:0">`;
colorHTML += '</div>';

$('#toolbar').innerHTML = `
  <button class="gz-btn active" data-tool="pen">${t('pen')}</button>
  <button class="gz-btn" data-tool="eraser">${t('eraser')}</button>
  <button class="gz-btn" data-tool="line">${t('line')}</button>
  <button class="gz-btn" data-tool="rect">${t('rect')}</button>
  <button class="gz-btn" data-tool="circle">${t('circle')}</button>
  <button class="gz-btn" data-tool="text">${t('text')}</button>
  ${colorHTML}
  <label style="display:flex;align-items:center;gap:4px;font-size:.85em">${t('size')} <input type="range" min="1" max="30" value="3" class="wb-size" id="wb-size"></label>
  <button class="gz-btn gz-btn-secondary" id="wb-undo">${t('undo')}</button>
  <button class="gz-btn gz-btn-secondary" id="wb-clear">${t('clear')}</button>
  <button class="gz-btn" id="wb-download">${t('download')}</button>
`;

document.querySelectorAll('[data-tool]').forEach(b => {
  b.onclick = () => {
    document.querySelectorAll('[data-tool]').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    tool = b.dataset.tool;
    canvas.style.cursor = tool === 'eraser' ? 'cell' : (tool === 'text' ? 'text' : 'crosshair');
  };
});

document.querySelectorAll('.wb-colors span').forEach(s => {
  s.onclick = () => {
    document.querySelectorAll('.wb-colors span').forEach(x => x.classList.remove('active'));
    s.classList.add('active');
    color = s.dataset.c;
  };
});

$('#wb-custom-color').oninput = e => {
  color = e.target.value;
  document.querySelectorAll('.wb-colors span').forEach(x => x.classList.remove('active'));
};

$('#wb-size').oninput = e => { size = +e.target.value; };

function saveState() { history.push(canvas.toDataURL()); if (history.length > 40) history.shift(); }
function restoreLast() {
  if (history.length < 2) return;
  history.pop();
  const img = new Image();
  img.onload = () => { ctx.clearRect(0, 0, canvas.width, canvas.height); ctx.drawImage(img, 0, 0); };
  img.src = history[history.length - 1];
}

$('#wb-undo').onclick = restoreLast;
$('#wb-clear').onclick = () => { ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, canvas.width, canvas.height); saveState(); };
$('#wb-download').onclick = () => {
  const a = document.createElement('a'); a.href = canvas.toDataURL('image/png'); a.download = 'whiteboard.png'; a.click();
};

let snapshot;
function getPos(e) {
  const r = canvas.getBoundingClientRect();
  const sx = canvas.width / r.width, sy = canvas.height / r.height;
  const cx = (e.touches ? e.touches[0].clientX : e.clientX);
  const cy = (e.touches ? e.touches[0].clientY : e.clientY);
  return { x: (cx - r.left) * sx, y: (cy - r.top) * sy };
}

canvas.addEventListener('pointerdown', e => {
  drawing = true;
  const p = getPos(e);
  startX = p.x; startY = p.y;
  if (tool === 'text') {
    drawing = false;
    const txt = prompt(tool === 'text' ? (GZI18n.getLang()==='zh'?'输入文字:':'Enter text:') : '');
    if (txt) { ctx.fillStyle = color; ctx.font = `${Math.max(14, size * 4)}px sans-serif`; ctx.fillText(txt, p.x, p.y); saveState(); }
    return;
  }
  if (tool === 'pen' || tool === 'eraser') {
    ctx.beginPath(); ctx.moveTo(p.x, p.y);
  } else {
    snapshot = ctx.getImageData(0, 0, canvas.width, canvas.height);
  }
});

canvas.addEventListener('pointermove', e => {
  if (!drawing) return;
  const p = getPos(e);
  if (tool === 'pen') {
    ctx.strokeStyle = color; ctx.lineWidth = size; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
    ctx.lineTo(p.x, p.y); ctx.stroke();
  } else if (tool === 'eraser') {
    ctx.strokeStyle = '#fff'; ctx.lineWidth = size * 3; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
    ctx.lineTo(p.x, p.y); ctx.stroke();
  } else if (snapshot) {
    ctx.putImageData(snapshot, 0, 0);
    ctx.strokeStyle = color; ctx.lineWidth = size; ctx.lineCap = 'round';
    if (tool === 'line') { ctx.beginPath(); ctx.moveTo(startX, startY); ctx.lineTo(p.x, p.y); ctx.stroke(); }
    else if (tool === 'rect') { ctx.strokeRect(startX, startY, p.x - startX, p.y - startY); }
    else if (tool === 'circle') {
      const rx = Math.abs(p.x - startX) / 2, ry = Math.abs(p.y - startY) / 2;
      ctx.beginPath(); ctx.ellipse(startX + (p.x - startX)/2, startY + (p.y - startY)/2, rx, ry, 0, 0, Math.PI * 2); ctx.stroke();
    }
  }
});

canvas.addEventListener('pointerup', () => { if (drawing) { drawing = false; saveState(); } });
canvas.addEventListener('pointerleave', () => { if (drawing) { drawing = false; saveState(); } });

GZ.renderToolPage({
  category: 'fun',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🎨', href:'/image/pixel-art-editor.html', name:'Pixel Art'},
    {icon:'🖼️', href:'/image/code-to-image.html', name:'Code to Image'},
    {icon:'🎨', href:'/image/chart-maker.html', name:'Chart Maker'},
  ]
});
</script>
