<script>
GZI18n.register({
  en: {
    toolTitle: 'Browser Info Tool',
    toolDesc: 'Check your browser details, user agent, supported APIs and features instantly. All info is read locally.',
    basicInfo: 'Basic Info',
    displayInfo: 'Display Info',
    networkInfo: 'Network Info',
    featureSupport: 'Feature Support',
    copied: 'Copied!',
    step1: 'Open this page — your browser info is detected automatically',
    step2: 'Review browser name, version, engine, and OS details',
    step3: 'Check which APIs and features are supported',
    step4: 'Copy your User Agent string if needed for debugging',
  },
  zh: {
    toolTitle: '浏览器信息工具',
    toolDesc: '即时查看浏览器详情、User Agent、支持的 API 和功能。所有信息在本地读取。',
    basicInfo: '基本信息',
    displayInfo: '显示信息',
    networkInfo: '网络信息',
    featureSupport: '功能支持',
    copied: '已复制！',
    step1: '打开此页面 — 浏览器信息自动检测',
    step2: '查看浏览器名称、版本、引擎和操作系统',
    step3: '检查哪些 API 和功能受支持',
    step4: '如需调试可复制 User Agent 字符串',
  }
});

const { $, copyText, t } = GZ;

function detectBrowser() {
  const ua = navigator.userAgent;
  let name = 'Unknown', version = '';
  if (ua.includes('Firefox/')) { name = 'Firefox'; version = ua.match(/Firefox\/([\d.]+)/)?.[1]; }
  else if (ua.includes('Edg/')) { name = 'Edge'; version = ua.match(/Edg\/([\d.]+)/)?.[1]; }
  else if (ua.includes('OPR/') || ua.includes('Opera/')) { name = 'Opera'; version = ua.match(/(?:OPR|Opera)\/([\d.]+)/)?.[1]; }
  else if (ua.includes('Chrome/')) { name = 'Chrome'; version = ua.match(/Chrome\/([\d.]+)/)?.[1]; }
  else if (ua.includes('Safari/') && !ua.includes('Chrome')) { name = 'Safari'; version = ua.match(/Version\/([\d.]+)/)?.[1]; }
  return { name, version };
}

function detectOS() {
  const ua = navigator.userAgent;
  if (ua.includes('Windows NT 10')) return 'Windows 10/11';
  if (ua.includes('Windows')) return 'Windows';
  if (ua.includes('Mac OS X')) return 'macOS ' + (ua.match(/Mac OS X ([\d_]+)/)?.[1]?.replace(/_/g,'.') || '');
  if (ua.includes('Android')) return 'Android ' + (ua.match(/Android ([\d.]+)/)?.[1] || '');
  if (ua.includes('iPhone') || ua.includes('iPad')) return 'iOS ' + (ua.match(/OS ([\d_]+)/)?.[1]?.replace(/_/g,'.') || '');
  if (ua.includes('Linux')) return 'Linux';
  return 'Unknown';
}

function detectEngine() {
  const ua = navigator.userAgent;
  if (ua.includes('AppleWebKit/')) return 'WebKit/Blink';
  if (ua.includes('Gecko/')) return 'Gecko';
  if (ua.includes('Trident/')) return 'Trident';
  return 'Unknown';
}

function row(label, value) {
  return `<tr><td>${label}</td><td>${value}</td></tr>`;
}

function render() {
  const br = detectBrowser();
  const os = detectOS();
  const engine = detectEngine();
  const ua = navigator.userAgent;
  const dpr = window.devicePixelRatio || 1;
  const conn = navigator.connection || navigator.mozConnection || navigator.webkitConnection;

  let html = '';

  // Basic Info
  html += `<div class="info-section"><h3>${t('basicInfo')}</h3><table class="info-table">`;
  html += row('Browser', `${br.name} ${br.version}`);
  html += row('Engine', engine);
  html += row('OS', os);
  html += row('Language', navigator.language);
  html += row('Languages', navigator.languages?.join(', ') || navigator.language);
  html += row('Platform', navigator.platform || 'N/A');
  html += row('User Agent', `${ua}<span class="copy-ua" onclick="copyText(navigator.userAgent);this.textContent='${t('copied')}'">📋</span>`);
  html += row('Cookies', navigator.cookieEnabled ? '✅ Enabled' : '❌ Disabled');
  html += row('Do Not Track', navigator.doNotTrack === '1' ? '✅ Enabled' : '❌ Disabled');
  html += row('Online', navigator.onLine ? '✅ Online' : '❌ Offline');
  html += row('PDF Viewer', navigator.pdfViewerEnabled !== undefined ? (navigator.pdfViewerEnabled ? '✅' : '❌') : 'Unknown');
  html += `</table></div>`;

  // Display Info
  html += `<div class="info-section"><h3>${t('displayInfo')}</h3><table class="info-table">`;
  html += row('Screen', `${screen.width} × ${screen.height}`);
  html += row('Available', `${screen.availWidth} × ${screen.availHeight}`);
  html += row('Viewport', `${window.innerWidth} × ${window.innerHeight}`);
  html += row('Device Pixel Ratio', dpr);
  html += row('Color Depth', `${screen.colorDepth}-bit`);
  html += row('Pixel Depth', `${screen.pixelDepth}-bit`);
  html += row('Orientation', screen.orientation?.type || 'N/A');
  html += row('Touch Points', navigator.maxTouchPoints || 0);
  html += `</table></div>`;

  // Network Info
  if (conn) {
    html += `<div class="info-section"><h3>${t('networkInfo')}</h3><table class="info-table">`;
    html += row('Effective Type', conn.effectiveType || 'N/A');
    html += row('Downlink', conn.downlink ? `${conn.downlink} Mbps` : 'N/A');
    html += row('RTT', conn.rtt ? `${conn.rtt} ms` : 'N/A');
    html += row('Save Data', conn.saveData ? '✅ Yes' : '❌ No');
    html += `</table></div>`;
  }

  // Feature Support
  const features = [
    ['Service Worker', 'serviceWorker' in navigator],
    ['Web Workers', typeof Worker !== 'undefined'],
    ['WebSocket', typeof WebSocket !== 'undefined'],
    ['WebGL', !!document.createElement('canvas').getContext('webgl')],
    ['WebGL2', !!document.createElement('canvas').getContext('webgl2')],
    ['WebRTC', !!(window.RTCPeerConnection || window.mozRTCPeerConnection)],
    ['Web Audio', typeof AudioContext !== 'undefined' || typeof webkitAudioContext !== 'undefined'],
    ['IndexedDB', typeof indexedDB !== 'undefined'],
    ['LocalStorage', typeof localStorage !== 'undefined'],
    ['SessionStorage', typeof sessionStorage !== 'undefined'],
    ['Geolocation', 'geolocation' in navigator],
    ['Notifications', 'Notification' in window],
    ['Clipboard API', navigator.clipboard !== undefined],
    ['Web Speech', 'speechSynthesis' in window],
    ['Gamepad API', 'getGamepads' in navigator],
    ['WebAssembly', typeof WebAssembly !== 'undefined'],
    ['SharedArrayBuffer', typeof SharedArrayBuffer !== 'undefined'],
    ['Fetch API', typeof fetch !== 'undefined'],
    ['Crypto', typeof crypto !== 'undefined'],
    ['Bluetooth', 'bluetooth' in navigator],
    ['USB', 'usb' in navigator],
    ['Camera', !!(navigator.mediaDevices?.getUserMedia)],
  ];

  html += `<div class="info-section"><h3>${t('featureSupport')}</h3><div class="feature-grid">`;
  for (const [name, supported] of features) {
    html += `<div class="feature-tag"><span class="dot ${supported ? 'yes' : 'no'}"></span>${name}</div>`;
  }
  html += `</div></div>`;

  $('#content').innerHTML = html;
}

$('#toolbar').innerHTML = `<button class="gz-btn" onclick="render()">${t('example') || 'Refresh'}</button>`;

render();

GZ.renderToolPage({
  category: 'dev',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [

    {icon:'🔍', href:'/dev/http-headers-checker.html', name:'HTTP Headers'},
    {icon:'📊', href:'/dev/json.html', name:'JSON Formatter'},
    {icon:'🔐', href:'/dev/base64.html', name:'Base64'},
  ]
});
</script>
