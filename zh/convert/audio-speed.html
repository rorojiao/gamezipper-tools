<script>
GZI18n.register({
  en: {
    toolTitle: 'Audio Speed Changer',
    toolDesc: 'Speed up or slow down audio files online. Change playback rate from 0.25x to 4x — preview and download instantly. 100% browser-based.',
    dropText: 'Drop audio file here or click to browse',
    speedLabel: 'Playback Speed',
    download: 'Download Modified Audio',
    reset: 'Load New File',
    step1: 'Upload an audio file (MP3, WAV, OGG, WebM)',
    step2: 'Adjust the speed slider (0.25x to 4x)',
    step3: 'Click Play to preview the changed speed',
    step4: 'Click Download to save the modified audio as WAV',
    processing: 'Processing…',
    done: '✓ Download ready!',
    noFile: 'Please upload an audio file first',
  },
  zh: {
    toolTitle: '音频变速器',
    toolDesc: '在线调整音频文件播放速度，支持 0.25x 到 4x 变速，即时预览和下载。完全浏览器本地处理。',
    dropText: '拖拽音频文件到此处或点击选择',
    speedLabel: '播放速度',
    download: '下载变速后的音频',
    reset: '加载新文件',
    step1: '上传音频文件（MP3、WAV、OGG、WebM）',
    step2: '调整速度滑块（0.25x 到 4x）',
    step3: '点击播放按钮预览变速效果',
    step4: '点击下载按钮保存变速后的音频（WAV 格式）',
    processing: '处理中…',
    done: '✓ 下载已准备！',
    noFile: '请先上传音频文件',
  }
});

const { $, copyText, t } = GZ;
let audioCtx, audioBuffer, sourceNode, isPlaying = false, startTime = 0, pauseOffset = 0, currentSpeed = 1;

const speedPresets = [0.5, 0.75, 1, 1.25, 1.5, 1.75, 2, 3];

$('#drop-text').textContent = t('dropText');
$('#speed-label').textContent = t('speedLabel');
$('#download-btn').textContent = t('download');
$('#reset-btn').textContent = t('reset');

const presetsEl = $('#presets');
speedPresets.forEach(s => {
  const btn = document.createElement('button');
  btn.textContent = s + 'x';
  btn.dataset.speed = s;
  if (s === 1) btn.classList.add('active');
  btn.onclick = () => {
    currentSpeed = s;
    $('#speed-slider').value = s;
    $('#speed-display').textContent = s.toFixed(2) + 'x';
    presetsEl.querySelectorAll('button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  };
  presetsEl.appendChild(btn);
});

$('#speed-slider').oninput = function() {
  currentSpeed = parseFloat(this.value);
  $('#speed-display').textContent = currentSpeed.toFixed(2) + 'x';
  presetsEl.querySelectorAll('button').forEach(b => b.classList.toggle('active', parseFloat(b.dataset.speed) === currentSpeed));
};

const drop = $('#audio-drop');
drop.onclick = () => $('#file-input').click();
drop.ondragover = e => { e.preventDefault(); drop.classList.add('dragover'); };
drop.ondragleave = () => drop.classList.remove('dragover');
drop.ondrop = e => { e.preventDefault(); drop.classList.remove('dragover'); if (e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]); };
$('#file-input').onchange = function() { if (this.files[0]) loadFile(this.files[0]); };

function loadFile(file) {
  if (!file.type.startsWith('audio/')) return;
  const reader = new FileReader();
  reader.onload = async (e) => {
    audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
    audioBuffer = await audioCtx.decodeAudioData(e.target.result);
    drawWaveform();
    drop.style.display = 'none';
    $('#editor').style.display = 'block';
    updateTimeDisplay();
  };
  reader.readAsArrayBuffer(file);
}

function drawWaveform() {
  const canvas = $('#waveform-canvas');
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const w = canvas.clientWidth, h = canvas.clientHeight;
  canvas.width = w * dpr; canvas.height = h * dpr;
  ctx.scale(dpr, dpr);
  ctx.clearRect(0, 0, w, h);
  const data = audioBuffer.getChannelData(0);
  const step = Math.ceil(data.length / w);
  const mid = h / 2;
  ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--gz-accent').trim() || '#e94560';
  for (let i = 0; i < w; i++) {
    let min = 1, max = -1;
    for (let j = 0; j < step; j++) {
      const val = data[(i * step) + j] || 0;
      if (val < min) min = val;
      if (val > max) max = val;
    }
    const barH = Math.max(1, (max - min) * mid);
    ctx.fillRect(i, mid - barH / 2, 1, barH);
  }
}

function formatTime(s) {
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  return m + ':' + String(sec).padStart(2, '0');
}

function updateTimeDisplay() {
  if (!audioBuffer) return;
  const dur = audioBuffer.duration / currentSpeed;
  const elapsed = isPlaying ? ((audioCtx.currentTime - startTime) * currentSpeed) : 0;
  $('#time-display').textContent = formatTime(Math.min(elapsed, dur)) + ' / ' + formatTime(dur);
}

$('#play-btn').onclick = () => {
  if (!audioBuffer) return;
  if (isPlaying) { stopPlayback(); return; }
  sourceNode = audioCtx.createBufferSource();
  sourceNode.buffer = audioBuffer;
  sourceNode.playbackRate.value = currentSpeed;
  sourceNode.connect(audioCtx.destination);
  sourceNode.start(0, pauseOffset);
  startTime = audioCtx.currentTime;
  isPlaying = true;
  $('#play-btn').textContent = '⏸';
  sourceNode.onended = () => { if (isPlaying) { stopPlayback(); pauseOffset = 0; } };
  requestAnimationFrame(tick);
};

function tick() { if (isPlaying) { updateTimeDisplay(); requestAnimationFrame(tick); } }

function stopPlayback() {
  if (sourceNode) { try { sourceNode.stop(); } catch(e){} sourceNode = null; }
  isPlaying = false;
  pauseOffset = Math.min((audioCtx.currentTime - startTime) * currentSpeed, audioBuffer.duration);
  $('#play-btn').textContent = '▶';
  updateTimeDisplay();
}

$('#stop-btn').onclick = () => { stopPlayback(); pauseOffset = 0; updateTimeDisplay(); };

$('#download-btn').onclick = () => {
  if (!audioBuffer) { $('#status').textContent = t('noFile'); return; }
  $('#status').textContent = t('processing');
  const offCtx = new OfflineAudioContext(audioBuffer.numberOfChannels, Math.ceil(audioBuffer.length / currentSpeed), audioBuffer.sampleRate);
  const src = offCtx.createBufferSource();
  src.buffer = audioBuffer;
  src.playbackRate.value = currentSpeed;
  src.connect(offCtx.destination);
  src.start();
  offCtx.startRendering().then(rendered => {
    const wav = audioBufferToWav(rendered);
    const blob = new Blob([wav], { type: 'audio/wav' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'audio_' + currentSpeed + 'x.wav';
    a.click();
    URL.revokeObjectURL(a.href);
    $('#status').textContent = t('done');
  });
};

$('#reset-btn').onclick = () => {
  stopPlayback();
  pauseOffset = 0;
  audioBuffer = null;
  currentSpeed = 1;
  $('#speed-slider').value = 1;
  $('#speed-display').textContent = '1.00x';
  presetsEl.querySelectorAll('button').forEach(b => b.classList.toggle('active', b.dataset.speed === '1'));
  $('#editor').style.display = 'none';
  drop.style.display = '';
  $('#status').textContent = '';
  $('#file-input').value = '';
};

function audioBufferToWav(buf) {
  const numCh = buf.numberOfChannels, sr = buf.sampleRate, len = buf.length;
  const bps = 16, byteRate = sr * numCh * bps / 8, blockAlign = numCh * bps / 8;
  const dataSize = len * numCh * bps / 8;
  const buffer = new ArrayBuffer(44 + dataSize);
  const v = new DataView(buffer);
  function ws(o, s) { for (let i = 0; i < s.length; i++) v.setUint8(o + i, s.charCodeAt(i)); }
  ws(0, 'RIFF'); v.setUint32(4, 36 + dataSize, true); ws(8, 'WAVE');
  ws(12, 'fmt '); v.setUint32(16, 16, true); v.setUint16(20, 1, true);
  v.setUint16(22, numCh, true); v.setUint32(24, sr, true);
  v.setUint32(28, byteRate, true); v.setUint16(32, blockAlign, true); v.setUint16(34, bps, true);
  ws(36, 'data'); v.setUint32(40, dataSize, true);
  let off = 44;
  for (let i = 0; i < len; i++) {
    for (let ch = 0; ch < numCh; ch++) {
      const s = Math.max(-1, Math.min(1, buf.getChannelData(ch)[i]));
      v.setInt16(off, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
      off += 2;
    }
  }
  return buffer;
}

  ]
});
</script>
