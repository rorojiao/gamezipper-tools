.frac-result .frac-display .num{display:block;padding:0 14px;border-bottom:3px solid #00d672;line-height:1.1}
.frac-result .frac-display .den{display:block;padding:0 14px;line-height:1.1;padding-top:4px}
.frac-result .mixed{margin-right:10px;color:#00d672}

<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "How do I add fractions?", "acceptedAnswer": {"@type": "Answer", "text": "To add fractions with the same denominator, add the numerators. For different denominators, find a common denominator (LCM), convert, then add. This calculator handles both cases automatically and shows all steps."}}, {"@type": "Question", "name": "How do I simplify a fraction?", "acceptedAnswer": {"@type": "Answer", "text": "Divide both numerator and denominator by their greatest common divisor (GCD). For example, 8/12 → GCD is 4 → 8÷4 / 12÷4 = 2/3. The calculator simplifies every result automatically."}}, {"@type": "Question", "name": "What is a mixed number?", "acceptedAnswer": {"@type": "Answer", "text": "A mixed number combines a whole number with a proper fraction, like 2 3/4. Improper fractions (numerator ≥ denominator) like 11/4 can be converted to mixed numbers (2 3/4) for readability."}}, {"@type": "Question", "name": "How do I divide fractions?", "acceptedAnswer": {"@type": "Answer", "text": "To divide by a fraction, multiply by its reciprocal (flip numerator and denominator). For example, 1/2 ÷ 3/4 = 1/2 × 4/3 = 4/6 = 2/3."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="frac-mode-toggle">
      <label><input type="checkbox" id="mixed"> <span id="lbl-mixed"></span></label>
      <label><input type="checkbox" id="showDec"> <span id="lbl-dec"></span></label>
      <label><input type="checkbox" id="showSteps" checked> <span id="lbl-steps"></span></label>
    </div>
    <div class="frac-tabs" id="ops">
      <button class="frac-tab active" data-op="+">+</button>
      <button class="frac-tab" data-op="−">−</button>
      <button class="frac-tab" data-op="×">×</button>
      <button class="frac-tab" data-op="÷">÷</button>
    </div>
    <div class="frac-input-row">
      <div class="frac-frac">
        <input type="number" id="a-num" value="1" oninput="calc()">
        <div class="bar"></div>
        <input type="number" id="a-den" value="2" oninput="calc()" min="1">
      </div>
      <div class="frac-op" id="op">+</div>
      <div class="frac-frac">
        <input type="number" id="b-num" value="1" oninput="calc()">
        <div class="bar"></div>
        <input type="number" id="b-den" value="3" oninput="calc()" min="1">
      </div>
    </div>
    <div class="frac-result" id="result">
      <div class="label" id="r-lbl">Result</div>
      <div class="frac-display" id="r-frac">—</div>
      <div class="decimal" id="r-dec"></div>
    </div>
    <div class="frac-steps" id="steps"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Fraction Calculator',
    toolDesc: 'Add, subtract, multiply, divide and simplify fractions. Supports mixed numbers, decimals and step-by-step solutions.',
    mixed: 'Show as mixed numbers',
    showDec: 'Show decimal result',
    showSteps: 'Show step-by-step solution',
    numerator: 'Numerator',
    denominator: 'Denominator',
    result: 'Result',
    step1: 'Enter two fractions (numerator and denominator) — denominators cannot be zero',
    step2: 'Pick +, −, × or ÷',
    step3: 'See the simplified result with decimal conversion',
    step4: 'Enable step-by-step to see how the answer was computed',
  },
  zh: {
    toolTitle: '分数计算器',
    toolDesc: '加减乘除、化简分数，支持带分数、小数转换和分步解题过程。',
    mixed: '显示为带分数',
    showDec: '显示小数结果',
    showSteps: '显示分步解题',
    numerator: '分子',
    denominator: '分母',
    result: '结果',
    step1: '输入两个分数（分子和分母）— 分母不能为零',
    step2: '选择 +、−、× 或 ÷',
    step3: '查看化简结果和小数转换',
    step4: '启用分步解题查看计算过程',
  }
});

const { $, t } = GZ;
let op = '+';

$('#lbl-mixed').textContent = t('mixed');
$('#lbl-dec').textContent = t('showDec');
$('#lbl-steps').textContent = t('showSteps');

function gcd(a, b) { return b === 0 ? Math.abs(a) : gcd(b, a % b); }
function lcm(a, b) { return Math.abs(a * b) / gcd(a, b); }
function toMixed(num, den) {
  if (den === 0) return { whole: 0, num: 0, den: 1 };
  const sign = (num < 0) !== (den < 0) ? -1 : 1;
  num = Math.abs(num); den = Math.abs(den);
  const whole = Math.floor(num / den);
  let n = num - whole * den;
  const d = den;
  const g = gcd(n, d);
  n = n / g; const dn = d / g;
  return { sign, whole, num: n, den: dn };
}

function calcFraction(a, b) {
  if (a.den === 0 || b.den === 0) return null;
  let num, den;
  let steps = [];
  if (op === '+') {
    const l = lcm(a.den, b.den);
    const an = a.num * (l / a.den);
    const bn = b.num * (l / b.den);
    num = an + bn; den = l;
    steps.push(`Common denominator: ${l}`);
    steps.push(`Convert: ${a.num}/${a.den} = ${an}/${l}, ${b.num}/${b.den} = ${bn}/${l}`);
    steps.push(`Add numerators: ${an} + ${bn} = ${num}`);
  } else if (op === '−') {
    const l = lcm(a.den, b.den);
    const an = a.num * (l / a.den);
    const bn = b.num * (l / b.den);
    num = an - bn; den = l;
    steps.push(`Common denominator: ${l}`);
    steps.push(`Convert: ${a.num}/${a.den} = ${an}/${l}, ${b.num}/${b.den} = ${bn}/${l}`);
    steps.push(`Subtract numerators: ${an} − ${bn} = ${num}`);
  } else if (op === '×') {
    num = a.num * b.num;
    den = a.den * b.den;
    steps.push(`Multiply numerators: ${a.num} × ${b.num} = ${num}`);
    steps.push(`Multiply denominators: ${a.den} × ${b.den} = ${den}`);
  } else {
    // division: a / b = a * (b.den / b.num)
    if (b.num === 0) return null;
    num = a.num * b.den;
    den = a.den * b.num;
    steps.push(`Reciprocal of ${b.num}/${b.den} is ${b.den}/${b.num}`);
    steps.push(`Multiply: ${a.num}/${a.den} × ${b.den}/${b.num} = ${num}/${den}`);
  }
  const g = gcd(Math.abs(num), Math.abs(den));
  const numS = num / g;
  const denS = den / g;
  if (g > 1) steps.push(`Simplify by GCD ${g}: ${num}/${den} → ${numS}/${denS}`);
  return { num: numS, den: denS, steps };
}

function calc() {
  const a = { num: parseInt($('#a-num').value) || 0, den: parseInt($('#a-den').value) || 1 };
  const b = { num: parseInt($('#b-num').value) || 0, den: parseInt($('#b-den').value) || 1 };
  if (a.den === 0 || b.den === 0) {
    $('#r-frac').innerHTML = '—';
    $('#r-dec').textContent = '';
    $('#steps').innerHTML = '';
    return;
  }
  const result = calcFraction(a, b);
  if (!result) { $('#r-frac').innerHTML = '—'; return; }
  let display = '';
  if ($('#mixed').checked && Math.abs(result.num) >= Math.abs(result.den)) {
    const m = toMixed(result.num, result.den);
    const signStr = m.sign < 0 ? '-' : '';
    if (m.whole > 0 && m.num > 0) {
      display = `<span class="mixed">${signStr}${m.whole}</span><span><span class="num">${m.num}</span><span class="bar"></span><span class="den">${m.den}</span></span>`;
    } else {
      display = `<span class="num">${result.num}</span><span class="bar"></span><span class="den">${result.den}</span>`;
    }
  } else {
    display = `<span class="num">${result.num}</span><span class="bar"></span><span class="den">${result.den}</span>`;
  }
  $('#r-frac').innerHTML = display;
  if ($('#showDec').checked) {
    const dec = result.num / result.den;
    $('#r-dec').textContent = `= ${parseFloat(dec.toFixed(6))}`;
  } else {
    $('#r-dec').textContent = '';
  }
  if ($('#showSteps').checked) {
    $('#steps').innerHTML = '<h3>Step-by-step</h3>' + result.steps.map(s => `<div>• ${s}</div>`).join('');
  } else {
    $('#steps').innerHTML = '';
  }
}

function setOp(o) {
  op = o;
  document.querySelectorAll('.frac-tab').forEach(b => b.classList.remove('active'));
  document.querySelector(`.frac-tab[data-op="${o}"]`).classList.add('active');
  $('#op').textContent = o;
  calc();
}
document.querySelectorAll('.frac-tab').forEach(b => b.addEventListener('click', () => setOp(b.dataset.op)));
$('#mixed').addEventListener('change', calc);
$('#showDec').addEventListener('change', calc);
$('#showSteps').addEventListener('change', calc);

calc();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🔢', href:'/calc/percentage-calculator.html', name:'Percentage Calc'},
    {icon:'🧮', href:'/calc/scientific-calculator.html', name:'Scientific Calc'},
    {icon:'📊', href:'/calc/statistics-calculator.html', name:'Statistics'},
    {icon:'🔢', href:'/calc/binary-calculator.html', name:'Binary Calc'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
