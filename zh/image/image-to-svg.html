<script>

  zh: {

    colors: '🎨 颜色数', simplify: '✨ 简化', size: '📏 最大尺寸（px）', smooth: '〰️ 平滑',
    download: '⬇️ 下载 SVG', copy: '📋 复制 SVG', sample: '🖼️ 加载示例', reset: '🔄 重置',

const { $, copyText, t } = GZ;
$('#lblColors').textContent = t('colors') + ': 6';
$('#lblSimplify').textContent = t('simplify') + ': 2';
$('#lblSize').textContent = t('size');
$('#lblSmooth').textContent = t('smooth');

let sourceImg = null;
let lastSvg = '';

function quantizeColors(pixels, k) {
  // Simple median-cut-ish by k-means with a few iterations
  const samples = [];
  const step = 4 * 4;
  for (let i = 0; i < pixels.length; i += step) {
    const a = pixels[i+3];
    if (a < 50) continue;
    samples.push([pixels[i], pixels[i+1], pixels[i+2]]);
    if (samples.length > 4000) break;
  }
  if (samples.length === 0) return [[0,0,0]];
  let centers = [];
  for (let i = 0; i < k; i++) centers.push(samples[Math.floor(i * samples.length / k)].slice());
  for (let iter = 0; iter < 6; iter++) {
    const sums = centers.map(() => [0,0,0]);
    const counts = new Array(centers.length).fill(0);
    for (const s of samples) {
      let bi = 0, bd = Infinity;
      for (let c = 0; c < centers.length; c++) {
        const dr = s[0]-centers[c][0], dg = s[1]-centers[c][1], db = s[2]-centers[c][2];
        const d = dr*dr+dg*dg+db*db;
        if (d < bd) { bd = d; bi = c; }
      }
      sums[bi][0] += s[0]; sums[bi][1] += s[1]; sums[bi][2] += s[2];
      counts[bi]++;
    }
    for (let c = 0; c < centers.length; c++) {
      if (counts[c] > 0) centers[c] = [sums[c][0]/counts[c], sums[c][1]/counts[c], sums[c][2]/counts[c]];
    }
  }
  return centers.map(c => c.map(Math.round));
}

function dist2(a, b) { const dr = a[0]-b[0], dg = a[1]-b[1], db = a[2]-b[2]; return dr*dr+dg*dg+db*db; }

function buildSvg(img) {
  const maxSize = +$('#optSize').value || 200;
  const colors = +$('#optColors').value || 6;
  const simplify = +$('#optSimplify').value || 0;
  const smooth = +$('#optSmooth').value || 0;

  const ratio = img.width / img.height;
  const w = ratio >= 1 ? maxSize : Math.round(maxSize * ratio);
  const h = ratio >= 1 ? Math.round(maxSize / ratio) : maxSize;

  const c = document.createElement('canvas');
  c.width = w; c.height = h;
  const ctx = c.getContext('2d');
  ctx.drawImage(img, 0, 0, w, h);
  const imgData = ctx.getImageData(0, 0, w, h);
  const pixels = imgData.data;

  const palette = quantizeColors(pixels, colors);

  // Build a label map
  const labels = new Int8Array(w * h);
  for (let i = 0, p = 0; i < pixels.length; i += 4, p++) {
    const a = pixels[i+3];
    if (a < 80) { labels[p] = -1; continue; }
    let bi = 0, bd = Infinity;
    for (let c2 = 0; c2 < palette.length; c2++) {
      const d = dist2([pixels[i], pixels[i+1], pixels[i+2]], palette[c2]);
      if (d < bd) { bd = d; bi = c2; }
    }
    labels[p] = bi;
  }

  // Run marching squares per color to extract contours
  const paths = [];
  for (let ci = 0; ci < palette.length; ci++) {
    const segs = [];
    for (let y = 0; y < h - 1; y++) {
      for (let x = 0; x < w - 1; x++) {
        const i = y*w + x;
        const tl = labels[i] === ci ? 1 : 0;
        const tr = labels[i+1] === ci ? 1 : 0;
        const br = labels[i+w+1] === ci ? 1 : 0;
        const bl = labels[i+w] === ci ? 1 : 0;
        const code = (tl<<3) | (tr<<2) | (br<<1) | bl;
        if (code === 0 || code === 15) continue;
        const x0 = x, x1 = x+1, y0 = y, y1 = y+1;
        // 4 edge midpoints
        const T = [x+0.5, y0], R = [x1, y+0.5], B = [x+0.5, y1], L = [x0, y+0.5];
        if (code === 1 || code === 14) segs.push([L, B]);
        else if (code === 2 || code === 13) segs.push([B, R]);
        else if (code === 3 || code === 12) segs.push([L, R]);
        else if (code === 4 || code === 11) segs.push([T, R]);
        else if (code === 5) segs.push([L, T], [B, R]);
        else if (code === 6 || code === 9) segs.push([T, B]);
        else if (code === 7 || code === 8) segs.push([L, T]);
        else if (code === 10) segs.push([T, R], [L, B]);
      }
    }
    if (!segs.length) continue;
    // Chain segments into polylines
    const chains = chainSegments(segs);
    const [r, g, b] = palette[ci];
    const color = `rgb(${r},${g},${b})`;
    const pathData = chains.map(chain => {
      let pts = chain.map(p => `${p[0].toFixed(1)},${p[1].toFixed(1)}`);
      if (simplify > 0) pts = simplifyPts(pts, simplify);
      return 'M' + pts.join(' L') + ' Z';
    }).join(' ');
    paths.push(`<path d="${pathData}" fill="${color}" fill-rule="evenodd"/>`);
  }

  const totalBytes = paths.join('').length;
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${w} ${h}" width="${w}" height="${h}">${paths.join('')}</svg>`;
  return { svg, w, h, pathCount: paths.length, bytes: totalBytes };
}

function chainSegments(segs) {
  const remain = segs.map(s => [s[0].slice(), s[1].slice()]);
  const chains = [];
  while (remain.length) {
    const chain = [remain.shift()[0].slice(), remain.shift()[1].slice()];
    // take one segment
    let extended = true;
    while (extended && remain.length) {
      extended = false;
      for (let i = 0; i < remain.length; i++) {
        const s = remain[i];
        const last = chain[chain.length-1];
        if (eqP(last, s[0])) { chain.push(s[1].slice()); remain.splice(i,1); extended = true; break; }
        if (eqP(last, s[1])) { chain.push(s[0].slice()); remain.splice(i,1); extended = true; break; }
      }
    }
    // join head-to-tail by reverse
    if (remain.length) {
      const first = chain[0];
      for (let i = 0; i < remain.length; i++) {
        const s = remain[i];
        if (eqP(first, s[0])) { chain.unshift(s[1].slice()); remain.splice(i,1); break; }
        if (eqP(first, s[1])) { chain.unshift(s[0].slice()); remain.splice(i,1); break; }
      }
    }
    chains.push(chain);
  }
  return chains;
}
function eqP(a, b) { return Math.abs(a[0]-b[0]) < 1e-3 && Math.abs(a[1]-b[1]) < 1e-3; }

function simplifyPts(pts, tol) {
  if (pts.length < 3) return pts;
  const out = [pts[0]];
  for (let i = 1; i < pts.length - 1; i++) {
    const prev = out[out.length-1].split(',').map(Number);
    const cur = pts[i].split(',').map(Number);
    const next = pts[i+1].split(',').map(Number);
    const dx = next[0] - prev[0], dy = next[1] - prev[1];
    const len = Math.hypot(dx, dy);
    if (len < 1e-6) continue;
    const cross = Math.abs((cur[0]-prev[0])*dy/len - (cur[1]-prev[1])*dx/len);
    if (cross * len > tol) out.push(pts[i]);
  }
  out.push(pts[pts.length-1]);
  return out;
}

async function convert() {
  if (!sourceImg) return;
  $('#outPlaceholder').textContent = '⏳ Processing…';
  await new Promise(r => setTimeout(r, 30));
  try {
    const r = buildSvg(sourceImg);
    lastSvg = r.svg;
    $('#outPanel').innerHTML = r.svg;
    $('#stats').innerHTML = `
      <span>📐 ${r.w}×${r.h}</span>
      <span>🧩 ${r.pathCount} paths</span>
      <span>💾 ${(r.bytes/1024).toFixed(1)} KB</span>
    `;
  } catch (e) {
    $('#outPanel').innerHTML = `<div style="color:#e94560">Error: ${e.message}</div>`;
  }
}

function loadImage(src) {
  const img = new Image();
  img.crossOrigin = 'anonymous';
  img.onload = () => {
    sourceImg = img;
    $('#dropZone').innerHTML = '';
    $('#dropZone').classList.remove('empty');
    const pre = document.createElement('img');
    pre.src = src;
    pre.style.maxWidth = '100%';
    pre.style.maxHeight = '420px';
    $('#dropZone').appendChild(pre);
    convert();
  };
  img.src = src;
}

function handleFile(file) {
  if (!file) return;
  const r = new FileReader();
  r.onload = ev => loadImage(ev.target.result);
  r.readAsDataURL(file);
}

$('#fileInput').addEventListener('change', e => handleFile(e.target.files[0]));

const dropZone = $('#dropZone');
['dragover','dragenter'].forEach(ev => dropZone.addEventListener(ev, e => { e.preventDefault(); dropZone.style.background = 'var(--accent-fade)'; }));
['dragleave','drop'].forEach(ev => dropZone.addEventListener(ev, e => { e.preventDefault(); dropZone.style.background = ''; }));
dropZone.addEventListener('drop', e => { e.preventDefault(); const f = e.dataTransfer.files[0]; if (f) { $('#fileInput').files = e.dataTransfer.files; $('#fileInput').dispatchEvent(new Event('change')); } });
dropZone.addEventListener('click', e => { if (e.target.tagName !== 'INPUT') $('#fileInput').click(); });

['optColors','optSimplify','optSize','optSmooth'].forEach(id => $('#'+id).addEventListener('input', () => {
  $('#lblColors').textContent = t('colors') + ': ' + $('#optColors').value;
  $('#lblSimplify').textContent = t('simplify') + ': ' + $('#optSimplify').value;
  if (sourceImg) convert();
}));

$('#toolbar').innerHTML = `
  <button class="gz-btn" id="btnDl">${t('download')}</button>
  <button class="gz-btn gz-btn-secondary" id="btnCopy">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" id="btnSample">${t('sample')}</button>
  <button class="gz-btn gz-btn-secondary" id="btnReset">${t('reset')}</button>`;

$('#btnDl').onclick = () => {
  if (!lastSvg) return;
  const blob = new Blob([lastSvg], { type: 'image/svg+xml' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob); a.download = 'vectorized.svg'; a.click();
  URL.revokeObjectURL(a.href);
};
$('#btnCopy').onclick = () => lastSvg && copyText(lastSvg);
$('#btnReset').onclick = () => {
  sourceImg = null; lastSvg = '';
  $('#dropZone').classList.add('empty');
  $('#dropZone').innerHTML = '<input type="file" id="fileInput" accept="image/*">';
  const fi = document.getElementById('fileInput');
  fi.addEventListener('change', e => handleFile(e.target.files[0]));
  $('#outPanel').innerHTML = '<div style="color:#999;font-size:.9em" id="outPlaceholder">SVG preview will appear here</div>';
  $('#stats').innerHTML = '';
};

// Built-in sample image
$('#btnSample').onclick = () => {
  const c = document.createElement('canvas');
  c.width = c.height = 200;
  const cx = c.getContext('2d');
  // gradient + simple shapes
  const grd = cx.createLinearGradient(0,0,200,200);
  grd.addColorStop(0,'#ff6b6b'); grd.addColorStop(0.5,'#ffd93d'); grd.addColorStop(1,'#6bcb77');
  cx.fillStyle = grd; cx.fillRect(0,0,200,200);
  cx.fillStyle = '#4d96ff';
  cx.beginPath(); cx.arc(60,80,30,0,Math.PI*2); cx.fill();
  cx.fillStyle = '#ff6b6b';
  cx.beginPath(); cx.moveTo(150,40); cx.lineTo(180,80); cx.lineTo(120,80); cx.closePath(); cx.fill();
  cx.fillStyle = '#6bcb77';
  cx.fillRect(40,130,120,40);
  cx.fillStyle = '#9b59b6';
  cx.font = 'bold 24px sans-serif'; cx.textAlign = 'center';
  cx.fillText('SVG', 100, 50);
  loadImage(c.toDataURL());
};
