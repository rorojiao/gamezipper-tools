<script>
GZI18n.register({
  en: {
    toolTitle: 'PDF Annotator',
    toolDesc: 'Add text notes, draw, and highlight on PDF pages for free. Download the annotated PDF — all in your browser.',
    dropHere: 'Drop a PDF here or click to upload',
    draw: '✏️ Draw',
    text: '📝 Text',
    highlight: '🖍️ Highlight',
    eraser: '🧹 Eraser',
    color: 'Color',
    size: 'Size',
    download: '💾 Download PDF',
    uploadNew: '📂 Upload New',
    step1: 'Upload or drag-and-drop a PDF file',
    step2: 'Choose a tool: Draw, Text, or Highlight',
    step3: 'Click and drag on the PDF to annotate',
    step4: 'Click Download to save the annotated PDF',
  },
  zh: {
    toolTitle: 'PDF 批注工具',
    toolDesc: '在 PDF 页面上添加文本、绘图和高亮标注，免费下载批注后的 PDF — 完全浏览器本地处理。',
    dropHere: '拖放 PDF 文件到此处或点击上传',
    draw: '✏️ 画笔',
    text: '📝 文字',
    highlight: '🖍️ 荧光笔',
    eraser: '🧹 橡皮擦',
    color: '颜色',
    size: '粗细',
    download: '💾 下载 PDF',
    uploadNew: '📂 上传新文件',
    step1: '上传或拖拽 PDF 文件',
    step2: '选择工具：画笔、文字或荧光笔',
    step3: '在 PDF 上点击拖动进行批注',
    step4: '点击下载保存批注后的 PDF',
  }
});

const { $, copyText, t } = GZ;
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

$('#dropText').textContent = t('dropHere');

let pdfDoc = null;
let pdfBytes = null;
let currentPage = 1;
let totalPages = 0;
let scale = 1.5;
let tool = 'draw';
let drawColor = '#ff0000';
let drawSize = 3;
let isDrawing = false;
let annotations = {}; // page -> [{points, color, size, tool}]

// File handling
const dropZone = $('#dropZone');
const fileInput = $('#fileInput');

dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.style.borderColor = 'var(--accent)'; });
dropZone.addEventListener('dragleave', () => { dropZone.style.borderColor = ''; });
dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.style.borderColor = ''; if (e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]); });
fileInput.addEventListener('change', () => { if (fileInput.files[0]) loadFile(fileInput.files[0]); });

async function loadFile(file) {
  pdfBytes = new Uint8Array(await file.arrayBuffer());
  pdfDoc = await pdfjsLib.getDocument({data: pdfBytes.slice()}).promise;
  totalPages = pdfDoc.numPages;
  currentPage = 1;
  annotations = {};
  for (let i = 1; i <= totalPages; i++) annotations[i] = [];
  $('#dropZone').style.display = 'none';
  $('#editorArea').style.display = 'block';
  renderPage();
}

const canvas = $('#pdfCanvas');
const ctx = canvas.getContext('2d');
let currentPath = null;

async function renderPage() {
  const page = await pdfDoc.getPage(currentPage);
  const viewport = page.getViewport({scale});
  canvas.width = viewport.width;
  canvas.height = viewport.height;
  await page.render({canvasContext: ctx, viewport}).promise;
  // Draw existing annotations
  for (const ann of (annotations[currentPage] || [])) {
    drawAnnotation(ann);
  }
  $('#pageInfo').textContent = `${currentPage} / ${totalPages}`;
}

function drawAnnotation(ann) {
  if (ann.points.length < 2) return;
  ctx.beginPath();
  ctx.strokeStyle = ann.tool === 'highlight' ? ann.color + '80' : ann.color;
  ctx.lineWidth = ann.tool === 'highlight' ? ann.size * 4 : ann.size;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  if (ann.tool === 'highlight') ctx.globalCompositeOperation = 'multiply';
  ctx.moveTo(ann.points[0].x, ann.points[0].y);
  for (let i = 1; i < ann.points.length; i++) ctx.lineTo(ann.points[i].x, ann.points[i].y);
  ctx.stroke();
  ctx.globalCompositeOperation = 'source-over';
}

function getPos(e) {
  const rect = canvas.getBoundingClientRect();
  const touch = e.touches ? e.touches[0] : e;
  return { x: touch.clientX - rect.left, y: touch.clientY - rect.top };
}

canvas.addEventListener('mousedown', startDraw);
canvas.addEventListener('mousemove', moveDraw);
canvas.addEventListener('mouseup', endDraw);
canvas.addEventListener('touchstart', e => { e.preventDefault(); startDraw(e); });
canvas.addEventListener('touchmove', e => { e.preventDefault(); moveDraw(e); });
canvas.addEventListener('touchend', e => { e.preventDefault(); endDraw(e); });

function startDraw(e) {
  isDrawing = true;
  const pos = getPos(e);
  currentPath = { points: [pos], color: drawColor, size: drawSize, tool: tool };
  ctx.beginPath();
  ctx.strokeStyle = tool === 'highlight' ? drawColor + '80' : drawColor;
  ctx.lineWidth = tool === 'highlight' ? drawSize * 4 : drawSize;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  if (tool === 'highlight') ctx.globalCompositeOperation = 'multiply';
  ctx.moveTo(pos.x, pos.y);
}

function moveDraw(e) {
  if (!isDrawing) return;
  const pos = getPos(e);
  currentPath.points.push(pos);
  ctx.lineTo(pos.x, pos.y);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(pos.x, pos.y);
}

function endDraw() {
  if (!isDrawing) return;
  isDrawing = false;
  ctx.globalCompositeOperation = 'source-over';
  if (currentPath && currentPath.points.length > 1) {
    annotations[currentPage].push(currentPath);
  }
  currentPath = null;
}

// Toolbar
$('#toolbar').innerHTML = `
  <button class="active" id="btn-draw" onclick="setTool('draw')">${t('draw')}</button>
  <button id="btn-highlight" onclick="setTool('highlight')">${t('highlight')}</button>
  <button id="btn-eraser" onclick="setTool('eraser')">${t('eraser')}</button>
  <label>${t('color')}</label><input type="color" id="pickColor" value="#ff0000" onchange="drawColor=this.value">
  <label>${t('size')}</label><input type="range" id="pickSize" min="1" max="20" value="3" onchange="drawSize=+this.value">
  <button class="gz-btn" onclick="downloadPDF()">${t('download')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="location.reload()">${t('uploadNew')}</button>
`;

function setTool(t_) {
  tool = t_;
  document.querySelectorAll('#toolbar button').forEach(b => b.classList.remove('active'));
  const btn = document.getElementById('btn-' + t_);
  if (btn) btn.classList.add('active');
  canvas.style.cursor = t_ === 'eraser' ? 'grab' : 'crosshair';
}

$('#prevPage').addEventListener('click', () => { if (currentPage > 1) { currentPage--; renderPage(); } });
$('#nextPage').addEventListener('click', () => { if (currentPage < totalPages) { currentPage++; renderPage(); } });

async function downloadPDF() {
  // For simplicity, we'll render annotations onto a flat PDF using canvas
  // Re-render each page with annotations and create a new PDF
  const { PDFDocument } = PDFLib;
  const newPdf = await PDFDocument.create();
  const srcPdf = await PDFDocument.load(pdfBytes);

  for (let i = 1; i <= totalPages; i++) {
    const [page] = await newPdf.copyPages(srcPdf, [i - 1]);
    newPdf.addPage(page);
  }

  // We'll use a simpler approach - just embed the annotations as images
  // Actually, let's just render each page with annotations to canvas and embed
  const finalPdf = await PDFDocument.create();
  for (let i = 1; i <= totalPages; i++) {
    const page = await pdfDoc.getPage(i);
    const viewport = page.getViewport({scale: 2});
    const tmpCanvas = document.createElement('canvas');
    tmpCanvas.width = viewport.width;
    tmpCanvas.height = viewport.height;
    const tmpCtx = tmpCanvas.getContext('2d');
    await page.render({canvasContext: tmpCtx, viewport}).promise;
    // Draw annotations
    for (const ann of (annotations[i] || [])) {
      if (ann.points.length < 2) continue;
      const sx = viewport.width / canvas.width * scale / 1.5 * 2 / scale;
      const ratio = viewport.width / (page.getViewport({scale: 1.5}).width);
      tmpCtx.beginPath();
      tmpCtx.strokeStyle = ann.tool === 'highlight' ? ann.color + '80' : ann.color;
      tmpCtx.lineWidth = (ann.tool === 'highlight' ? ann.size * 4 : ann.size) * ratio;
      tmpCtx.lineCap = 'round';
      tmpCtx.lineJoin = 'round';
      if (ann.tool === 'highlight') tmpCtx.globalCompositeOperation = 'multiply';
      tmpCtx.moveTo(ann.points[0].x * ratio, ann.points[0].y * ratio);
      for (let j = 1; j < ann.points.length; j++) tmpCtx.lineTo(ann.points[j].x * ratio, ann.points[j].y * ratio);
      tmpCtx.stroke();
      tmpCtx.globalCompositeOperation = 'source-over';
    }
    const imgData = tmpCanvas.toDataURL('image/png');
    const imgBytes = Uint8Array.from(atob(imgData.split(',')[1]), c => c.charCodeAt(0));
    const img = await finalPdf.embedPng(imgBytes);
    const origPage = srcPdf.getPage(i - 1);
    const {width, height} = origPage.getSize();
    const p = finalPdf.addPage([width, height]);
    p.drawImage(img, {x: 0, y: 0, width, height});
  }

  const pdfData = await finalPdf.save();
  const blob = new Blob([pdfData], {type: 'application/pdf'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'annotated.pdf'; a.click();
  URL.revokeObjectURL(url);
}

GZ.renderToolPage({
  category: 'convert',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],

    {icon:'🖼️', href:'/convert/pdf-to-image.html', name:'PDF to Image'},
  ]
});
</script>
