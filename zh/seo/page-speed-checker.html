<script>
GZI18n.register({
  en: {
    toolTitle: 'Page Speed Checker',
    toolDesc: 'Measure page weight, request count, DOM size, resource breakdown and Core Web Vitals grades. Free, browser-based, no signup.',

    size: 'Size',
    bar: 'Share',
    tips: 'Optimization Tips',
    good: 'Good',
    needsWork: 'Needs Work',
    poor: 'Poor',

    step2: 'Click Check Speed to fetch the HTML and scan resource tags',
    step3: 'Review total weight, request count, DOM size and CWV grade',
    step4: 'Read the optimization tips and resource breakdown to find improvements',
  },
  zh: {
    toolTitle: '页面速度检查器',
    toolDesc: '测量页面体积、请求数、DOM 节点数、资源分类和 Core Web Vitals 评级。免费，浏览器本地运行，无需注册。',
    check: '检测速度',
    enterUrl: 'https://example.com',
    loading: '正在抓取页面并分析资源...',
    fetchErr: '无法抓取该页面。跨域 (CORS) 限制可能阻止了请求，请尝试其他 URL。',
    totalWeight: '总体积',
    requests: '请求数',
    estLoad: '预估加载时间',
    domNodes: 'DOM 节点',
    grade: 'CWV 评级',
    resBreakdown: '资源分类',
    type: '类型',
    count: '数量',
    size: '大小',
    bar: '占比',
    tips: '优化建议',
    good: '优秀',
    needsWork: '待改进',
    poor: '较差',
    step1: '输入要检测的页面完整 URL（https://...）',
    step2: '点击「检测速度」抓取 HTML 并扫描资源标签',
    step3: '查看总体积、请求数、DOM 大小和 CWV 评级',
    step4: '阅读优化建议和资源分类以寻找改进点',
  }
});

const { $, t } = GZ;

$('#check-btn').textContent = t('check');
$('#url-input').placeholder = t('enterUrl');

function fmtBytes(b){
  if(b < 1024) return b + ' B';
  if(b < 1024*1024) return (b/1024).toFixed(1) + ' KB';
  return (b/1024/1024).toFixed(2) + ' MB';
}

function fmtTime(ms){
  if(ms < 1000) return Math.round(ms) + ' ms';
  return (ms/1000).toFixed(2) + ' s';
}

function gradeFor(weightBytes, reqCount){
  const kb = weightBytes / 1024;
  if(kb < 500 && reqCount < 30) return {label: t('good'), cls: 'grade-good'};
  if(kb < 2000 && reqCount < 80) return {label: t('needsWork'), cls: 'grade-needs'};
  return {label: t('poor'), cls: 'grade-poor'};
}

function absoluteUrl(href, base){
  try { return new URL(href, base).href; } catch(e){ return null; }
}

async function checkPage(){
  const url = $('#url-input').value.trim();
  if(!url) return;
  $('#status').style.display = '';
  $('#status').innerHTML = `<span class="spinner"></span>${t('loading')}`;
  $('#metrics').innerHTML = '';
  $('#resbreakdown').innerHTML = '';
  $('#tips').innerHTML = '';

  try {
    const proxyUrl = 'https://api.allorigins.win/raw?url=' + encodeURIComponent(url);
    const resp = await fetch(proxyUrl, {redirect:'follow'});
    if(!resp.ok) throw new Error('HTTP '+resp.status);
    const html = await resp.text();
    const doc = new DOMParser().parseFromString(html, 'text/html');

    const base = url;
    const resTypes = {html:0, css:0, js:0, image:0, font:0, video:0, other:0};
    const resSize = {html:0, css:0, js:0, image:0, font:0, video:0, other:0};
    let reqCount = 1;

    doc.querySelectorAll('link[rel="stylesheet"]').forEach(el => {
      const u = absoluteUrl(el.getAttribute('href'), base);
      if(u){ resTypes.css++; resSize.css += estimateSize(el.getAttribute('href')||'', 'css'); reqCount++; }
    });
    doc.querySelectorAll('script[src]').forEach(el => {
      const u = absoluteUrl(el.getAttribute('src'), base);
      if(u){ resTypes.js++; resSize.js += estimateSize(el.getAttribute('src')||'', 'js'); reqCount++; }
    });
    doc.querySelectorAll('img[src]').forEach(el => {
      const u = absoluteUrl(el.getAttribute('src'), base);
      if(u){ resTypes.image++; resSize.image += estimateSize(el.getAttribute('src')||'', 'image'); reqCount++; }
    });
    doc.querySelectorAll('source[src],video[src],audio[src],embed[src],iframe[src]').forEach(el => {
      resTypes.other++; reqCount++;
    });
    doc.querySelectorAll('link[rel="preload"],link[rel="font"],style').forEach(el => {
      const href = el.getAttribute('href');
      if(href && /(\.woff2?|\.ttf|\.otf|\.eot)(\?|$)/i.test(href)){
        resTypes.font++; reqCount++;
      }
    });
    doc.querySelectorAll('source[srcset],img[srcset]').forEach(el => {
      const srcset = el.getAttribute('srcset') || '';
      const first = srcset.split(',')[0].trim().split(' ')[0];
      if(first){ resTypes.image++; reqCount++; }
    });

    resSize.html = new Blob([html]).size;
    resTypes.html = 1;
    const totalWeight = Object.values(resSize).reduce((a,b)=>a+b,0);
    const domNodes = doc.getElementsByTagName('*').length;
    const loadMs = estimateLoadTime(totalWeight, reqCount);
    const grade = gradeFor(totalWeight, reqCount);

    $('#status').style.display = 'none';
    $('#metrics').innerHTML = `
      <div class="metric-grid">
        <div class="metric"><div class="v">${fmtBytes(totalWeight)}</div><div class="k">${t('totalWeight')}</div></div>
        <div class="metric"><div class="v">${reqCount}</div><div class="k">${t('requests')}</div></div>
        <div class="metric"><div class="v">${fmtTime(loadMs)}</div><div class="k">${t('estLoad')}</div></div>
        <div class="metric"><div class="v">${domNodes}</div><div class="k">${t('domNodes')}</div></div>
        <div class="metric"><div class="v"><span class="grade ${grade.cls}">${grade.label}</span></div><div class="k">${t('grade')}</div></div>
      </div>`;

    const rows = [
      {type:'HTML', count: resTypes.html, size: resSize.html},
      {type:'CSS', count: resTypes.css, size: resSize.css},
      {type:'JavaScript', count: resTypes.js, size: resSize.js},
      {type:'Images', count: resTypes.image, size: resSize.image},
      {type:'Fonts', count: resTypes.font, size: resSize.font},
      {type:'Other', count: resTypes.other, size: resSize.other},
    ].filter(r => r.count > 0);

    $('#resbreakdown').innerHTML = `
      <h3 style="margin-top:18px">${t('resBreakdown')}</h3>
      <table class="res-table">
        <thead><tr><th>${t('type')}</th><th>${t('count')}</th><th>${t('size')}</th><th>${t('bar')}</th></tr></thead>
        <tbody>
          ${rows.map(r => {
            const pct = totalWeight > 0 ? Math.round(r.size/totalWeight*100) : 0;
            return `<tr><td>${r.type}</td><td>${r.count}</td><td>${fmtBytes(r.size)}</td>
              <td class="bar-cell"><div class="bar-fill" style="width:${pct}%"></div></td></tr>`;
          }).join('')}
        </tbody>
      </table>`;

    const tips = generateTips(resTypes, resSize, domNodes, totalWeight);
    if(tips.length){
      $('#tips').innerHTML = `<h3 style="margin-top:18px">${t('tips')}</h3>` +
        tips.map(tp => `<div class="tip">💡 ${tp}</div>`).join('');
    }

  } catch(e){
    $('#status').innerHTML = `<span style="color:var(--gz-accent)">${t('fetchErr')} (${e.message})</span>`;
  }
}

function estimateSize(src, kind){
  if(/\?/.test(src)) return 0;
  if(kind === 'css') return 15*1024;
  if(kind === 'js') return 40*1024;
  if(kind === 'image') return 80*1024;
  return 0;
}

function estimateLoadTime(bytes, requests){
  const mbps = 5;
  const transferMs = (bytes * 8) / (mbps * 1024 * 1024) * 1000;
  const latencyMs = requests * 60;
  return Math.round(transferMs + latencyMs);
}

function generateTips(types, sizes, dom, total){
  const tips = [];
  const kb = total/1024;
  if(sizes.js > 300*1024) tips.push('Large JavaScript payload — consider code-splitting, tree-shaking and minifying scripts.');
  if(sizes.css > 100*1024) tips.push('CSS is heavy — remove unused styles and minify stylesheets.');
  if(sizes.image > 500*1024) tips.push('Image weight is high — use modern formats (WebP/AVIF), compress and lazy-load images.');
  if(types.js > 15) tips.push('Many script requests — bundle or use HTTP/2 multiplexing to reduce round-trips.');
  if(dom > 1500) tips.push('DOM is very large ('+dom+' nodes) — simplify page structure to improve rendering.');
  if(kb > 2000) tips.push('Total page weight exceeds 2 MB — aim for under 1 MB on mobile for fast load.');
  if(!tips.length) tips.push('Page looks lean — keep monitoring Core Web Vitals with Google PageSpeed Insights.');
  return tips;
}

</script>
