const { $, copyText, t } = GZ;
let currentTab = 'code';

const SVG_ATTR_MAP = {
  'accept-charset':'acceptCharset','accesskey':'accessKey','alignment-baseline':'alignmentBaseline',
  'baseline-shift':'baselineShift','clip-path':'clipPath','clip-rule':'clipRule',
  'color-interpolation':'colorInterpolation','color-interpolation-filters':'colorInterpolationFilters',
  'dominant-baseline':'dominantBaseline','fill-opacity':'fillOpacity','fill-rule':'fillRule',
  'flood-color':'floodColor','flood-opacity':'floodOpacity','font-family':'fontFamily',
  'font-size':'fontSize','font-size-adjust':'fontSizeAdjust','font-stretch':'fontStretch',
  'font-style':'fontStyle','font-variant':'fontVariant','font-weight':'fontWeight',
  'glyph-name':'glyphName','glyph-orientation-horizontal':'glyphOrientationHorizontal',
  'glyph-orientation-vertical':'glyphOrientationVertical','horiz-adv-x':'horizAdvX',
  'horiz-origin-x':'horizOriginX','image-rendering':'imageRendering','letter-spacing':'letterSpacing',
  'lighting-color':'lightingColor','marker-end':'markerEnd','marker-mid':'markerMid',
  'marker-start':'markerStart','overline-position':'overlinePosition','overline-thickness':'overlineThickness',
  'paint-order':'paintOrder','panose-1':'panose1','pointer-events':'pointerEvents',
  'shape-rendering':'shapeRendering','stop-color':'stopColor','stop-opacity':'stopOpacity',
  'strikethrough-position':'strikethroughPosition','strikethrough-thickness':'strikethroughThickness',
  'stroke-dasharray':'strokeDasharray','stroke-dashoffset':'strokeDashoffset',
  'stroke-linecap':'strokeLinecap','stroke-linejoin':'strokeLinejoin',
  'stroke-miterlimit':'strokeMiterlimit','stroke-opacity':'strokeOpacity',
  'stroke-width':'strokeWidth','text-anchor':'textAnchor','text-decoration':'textDecoration',
  'text-rendering':'textRendering','transform-origin':'transformOrigin',
  'underline-position':'underlinePosition','underline-thickness':'underlineThickness',
  'unicode-bidi':'unicodeBidi','unicode-range':'unicodeRange','units-per-em':'unitsPerEm',
  'v-alphabetic':'vAlphabetic','v-hanging':'vHanging','v-ideographic':'vIdeographic',
  'v-mathematical':'vMathematical','vert-adv-y':'vertAdvY','vert-origin-x':'vertOriginX',
  'vert-origin-y':'vertOriginY','word-spacing':'wordSpacing','writing-mode':'writingMode',
  'x-height':'xHeight','xlink:actuate':'xlinkActuate','xlink:arcrole':'xlinkArcrole',
  'xlink:href':'xlinkHref','xlink:role':'xlinkRole','xlink:show':'xlinkShow',
  'xlink:title':'xlinkTitle','xlink:type':'xlinkType','xml:base':'xmlBase',
  'xml:lang':'xmlLang','xml:space':'xmlSpace','xmlns:xlink':'xmlnsXlink',
  'tabindex':'tabIndex','class':'className','for':'htmlFor',
};

function svgToJsx(svg) {
  return svg.replace(/(<\/?)(\w[\w-]*)/g, (m, bracket, tag) => {
    if (tag.includes('-')) return bracket + tag; // keep custom elements
    return m;
  }).replace(/\b([\w-]+)=/g, (m, attr) => {
    const lower = attr.toLowerCase();
    if (SVG_ATTR_MAP[lower]) return SVG_ATTR_MAP[lower] + '=';
    if (attr.includes('-') && !attr.startsWith('data-') && !attr.startsWith('aria-')) {
      return attr.replace(/-([a-z])/g, (_, c) => c.toUpperCase()) + '=';
    }
    return m;
  }).replace(/\bclass=/g, 'className=')
  .replace(/\s*xmlns="[^"]*"/g, '')
  .replace(/<!--[\s\S]*?-->/g, '');
}

function convert() {
  const inp = $('#input').value.trim();
  if (!inp) { $('#output').textContent = ''; $('#preview').innerHTML = ''; $('#status').innerHTML = ''; return; }

  // Update preview
  try {
    const parser = new DOMParser();
    const doc = parser.parseFromString(inp, 'image/svg+xml');
    const svgEl = doc.querySelector('svg');
    if (svgEl) {
      svgEl.removeAttribute('xmlns');
      $('#preview').innerHTML = inp;
    } else {
      $('#preview').innerHTML = '<span style="color:var(--gz-accent)">No valid SVG found</span>';
    }
  } catch(e) {
    $('#preview').innerHTML = '<span style="color:var(--gz-accent)">Invalid SVG</span>';
  }

  const name = $('#comp-name').value.trim() || 'SvgIcon';
  const isTs = $('#opt-ts').checked;
  const isMemo = $('#opt-memo').checked;
  const isDefault = $('#opt-default').checked;

  let jsx = svgToJsx(inp);

  // Add {...props} spread to svg tag
  jsx = jsx.replace(/<svg([^>]*)>/, (m, attrs) => {
    return `<svg${attrs} {...props}>`;
  });

  // Indent JSX content
  const lines = jsx.split('\n');
  const indented = lines.map((line, i) => i === 0 || i === lines.length - 1 ? line : '    ' + line.trim()).join('\n');

  let code = '';
  const propsType = isTs ? ': React.SVGProps<SVGSVGElement>' : '';

  if (isTs) {
    code += `import React from 'react';\n\n`;
  }
  code += `const ${name} = (${isDefault ? `{ width = 24, height = 24, ...props }` : `props`}${propsType}) => (\n`;
  code += `  ${indented}\n`;
  code += `);\n`;

  if (isMemo) {
    code = code.replace(`const ${name} =`, `const ${name} = React.memo(`);
    code += `);\n`;
  }

  code += `\nexport default ${name};\n`;

  $('#output').textContent = code;
  $('#status').innerHTML = `<span style="color:var(--gz-success)">✓ Component generated (${code.length} bytes)</span>`;
}

function switchTab(tab) {
  currentTab = tab;
  $('#tab-code').classList.toggle('active', tab === 'code');
  $('#tab-preview').classList.toggle('active', tab === 'preview');
  $('#code-wrap').style.display = tab === 'code' ? '' : 'none';
  $('#preview-wrap').style.display = tab === 'preview' ? '' : 'none';
}

function loadExample() {
  $('#input').value = `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <circle cx="12" cy="12" r="10"></circle>
  <polygon points="10 8 16 12 10 16 10 8"></polygon>
</svg>`;
  $('#comp-name').value = 'PlayIcon';
  convert();
}

function doClear() { $('#input').value = ''; $('#output').textContent = ''; $('#preview').innerHTML = ''; $('#status').innerHTML = ''; }

$('#input').addEventListener('input', convert);
$('#comp-name').addEventListener('input', convert);
$('#opt-ts').addEventListener('change', convert);
$('#opt-memo').addEventListener('change', convert);
$('#opt-default').addEventListener('change', convert);

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

  <label><input type="checkbox" id="opt-ts"> ${t('typescript')}</label>
  <label><input type="checkbox" id="opt-memo"> ${t('memo')}</label>
  <label><input type="checkbox" id="opt-default"> ${t('defaultProps')}</label>`;
