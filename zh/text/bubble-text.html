<script>
GZI18n.register({
  en: {
    toolTitle: 'Bubble Text Generator ⓞ',
    toolDesc: 'Convert text into circled bubble letters ⓐⓑⓒ, negative circles 🅐🅑🅒 and balloon fonts. Perfect for usernames, bios and decorative captions — copy & paste anywhere.',
    step1: 'Type or paste your text in the input box',
    step2: 'Pick from the bubble styles generated automatically',
    step3: 'Click Copy next to the style you like',
    step4: 'Paste into Instagram, TikTok, Discord, WhatsApp and more',
  },
  zh: {
    toolTitle: '气泡文字生成器 ⓞ',
    toolDesc: '将文字转换为圆形气泡字母 ⓐⓑⓒ、反色圆圈 🅐🅑🅒 和气球字体。适合用户名、简介和装饰文案 — 复制粘贴到任何平台。',
    step1: '在输入框中输入或粘贴文字',
    step2: '从自动生成的气泡风格中选择',
    step3: '点击复制按钮复制喜欢的风格',
    step4: '粘贴到 Instagram、TikTok、Discord、WhatsApp 等平台',
  }
});

const { $, $$, t } = GZ;

// Enclosed alphanumerics — circled lowercase 0x24D0, circled uppercase 0x24B6
// Negative circled uppercase 0x1F150 (regional indicator fallback for safety)
const circledLower = c => { const cc=c.charCodeAt(0); return (cc>=97&&cc<=122)?String.fromCodePoint(0x24D0+cc-97):c; };
const circledUpper = c => { const cc=c.charCodeAt(0); return (cc>=65&&cc<=90)?String.fromCodePoint(0x24B6+cc-65):c; };
const circledNum = c => { const cc=c.charCodeAt(0); return (cc>=49&&cc<=57)?String.fromCodePoint(0x2460+cc-49):(c==='0'?'⓪':c); };

// Negative circled (filled) — uppercase uses 0x24B6 offset into negative range via combining, simpler: use regional indicator
// We'll use the "negative squared" sensibly: filled circle letters via Unicode 0x24EB+ (lower) and 0x1F150 region
const negCircledUpper = c => { const cc=c.charCodeAt(0); return (cc>=65&&cc<=90)?String.fromCodePoint(0x1F150+cc-65):c; };
const negCircledLower = c => { const cc=c.charCodeAt(0); return (cc>=97&&cc<=122)?String.fromCodePoint(0x24EB+cc-97):c; };

// Parenthesized 0x249C+
const parenLower = c => { const cc=c.charCodeAt(0); return (cc>=97&&cc<=122)?String.fromCodePoint(0x249C+cc-97):c; };

// Squared
const squaredUpper = c => { const cc=c.charCodeAt(0); return (cc>=65&&cc<=90)?String.fromCodePoint(0x1F130+cc-65):c; };

const STYLES = [
  { name: 'Circled ⓐⓑⓒ', fn: s => [...s].map(c => circledLower(circledUpper(c))).join('') },
  { name: 'Circled + Numbers ①②', fn: s => [...s].map(c => circledNum(circledLower(circledUpper(c)))).join('') },
  { name: 'Negative Circle 🅐🅑', fn: s => [...s].map(c => negCircledLower(negCircledUpper(c))).join('') },
  { name: 'Parenthesized ⒜⒝', fn: s => [...s].map(c => parenLower(c)).join('') },
  { name: 'Squared 🄰🄱', fn: s => [...s].map(c => squaredUpper(c.toUpperCase())).join('') },
  { name: 'Bubble Dot ⓐ̇', fn: s => [...s].map(c => /[a-zA-Z]/.test(c) ? circledLower(c) + '\u0307' : c).join('') },
  { name: 'Bubble Bold', fn: s => [...s].map(c => circledLower(circledUpper(c))).join('') + ' 🫧' },
  { name: 'Balloon', fn: s => `🎈 ${[...s].map(c => circledLower(circledUpper(c))).join('')} 🎈` },
  { name: 'Bubble Wrap', fn: s => [...s].map(c => c === ' ' ? ' ◦ ' : circledLower(circledUpper(c))).join('') },
  { name: 'Double Ring', fn: s => [...s].map(c => /[a-zA-Z]/.test(c) ? circledLower(c) + '\u20E3' : c).join('') },
];

function render() {
  const text = $('#input').value;
  $('#grid').innerHTML = STYLES.map((s,i) =>
    `<div class="bb-row"><div class="name">${s.name}</div><div class="out" data-i="${i}"></div><button class="cp" data-i="${i}">${t('copy')}</button></div>`
  ).join('');
  STYLES.forEach((s,i) => {
    try { const el = $$('.bb-row .out[data-i="'+i+'"]')[0]; el.textContent = s.fn(text); } catch(e) {}
  });
  $$('.bb-row .cp').forEach(btn => btn.addEventListener('click', () => {
    const out = $$('.bb-row .out[data-i="'+btn.dataset.i+'"]')[0].textContent;
    GZ.copyText(out);
  }));
}

$('#input').addEventListener('input', render);

$('#toolbar').innerHTML = `
  <button class="gz-btn gz-btn-secondary" onclick="$('#input').value='Bubble';render()">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#input').value='';render()">${t('clear')}</button>`;

$('#input').value = 'Bubble';
render();

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'Ⓒ', href:'/text/circled-text.html', name:'Circled Text'},
    {icon:'✨', href:'/text/fancy-text.html', name:'Fancy Text'},
    {icon:'〰️', href:'/text/wavy-text.html', name:'Wavy Text'},
    {icon:'🔥', href:'/text/fire-text.html', name:'Fire Text'},
  ]
});
</script>
