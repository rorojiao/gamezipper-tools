<body>

      <div class="expense-grid"><label id="lbl-utilities"></label><input type="number" id="exp-utilities" value="200" min="0" step="10"></div>
      <div class="expense-grid"><label id="lbl-transport"></label><input type="number" id="exp-transport" value="300" min="0" step="25"></div>
      <div class="expense-grid"><label id="lbl-insurance"></label><input type="number" id="exp-insurance" value="200" min="0" step="25"></div>
      <div class="section-title" id="sec-wants"></div>
      <div class="expense-grid"><label id="lbl-dining"></label><input type="number" id="exp-dining" value="300" min="0" step="25"></div>
      <div class="expense-grid"><label id="lbl-entertain"></label><input type="number" id="exp-entertain" value="150" min="0" step="25"></div>
      <div class="expense-grid"><label id="lbl-shopping"></label><input type="number" id="exp-shopping" value="200" min="0" step="25"></div>
      <div class="expense-grid"><label id="lbl-subscriptions"></label><input type="number" id="exp-subs" value="80" min="0" step="10"></div>
    </div>

      <div class="big pos" id="result-balance"></div>
      <div class="label" id="result-balance-label"></div>

        <div class="rule-item rule-needs"><div class="val" id="rule-needs-val"></div><div class="lbl" id="rule-needs-lbl"></div><div class="bar"><div class="fill" id="fill-needs" style="width:0"></div></div></div>
        <div class="rule-item rule-wants"><div class="val" id="rule-wants-val"></div><div class="lbl" id="rule-wants-lbl"></div><div class="bar"><div class="fill" id="fill-wants" style="width:0"></div></div></div>
        <div class="rule-item rule-save"><div class="val" id="rule-save-val"></div><div class="lbl" id="rule-save-lbl"></div><div class="bar"><div class="fill" id="fill-save" style="width:0"></div></div></div>

<script>
GZI18n.register({
  en: {
    toolTitle: 'Monthly Budget Calculator',
    toolDesc: 'Track income vs expenses and see your 50/30/20 budget split. Free, private, browser-based — no signup.',
    secIncome: '💰 Income',
    secNeeds: '🏠 Needs (Essential)',
    secWants: '🎉 Wants (Discretionary)',
    salary: 'Salary / Wages',
    otherIncome: 'Other Income',
    rent: 'Rent / Mortgage',
    groceries: 'Groceries',
    utilities: 'Utilities (gas, electric, water)',
    transport: 'Transportation',
    insurance: 'Insurance',
    dining: 'Dining Out',
    entertainment: 'Entertainment',
    shopping: 'Shopping',
    subscriptions: 'Subscriptions',
    calculate: 'Calculate',
    balance: 'Monthly Balance',
    needsRule: 'Needs',
    wantsRule: 'Wants',
    savingsRule: 'Savings',
    surplus: 'You\u2019re saving money! 🎉',
    deficit: 'You\u2019re spending more than you earn ⚠️',
    step1: 'Enter your monthly income sources',
    step2: 'Fill in your essential expenses (needs)',
    step3: 'Add your discretionary spending (wants)',
    step4: 'Review your balance and 50/30/20 breakdown',
  },
  zh: {
    toolTitle: '月度预算计算器',
    toolDesc: '追踪收入与支出，查看 50/30/20 预算分配。免费、私密、浏览器本地运行。',
    secIncome: '💰 收入',
    secNeeds: '🏠 必需支出',
    secWants: '🎉 弹性支出',
    salary: '工资 / 薪水',
    otherIncome: '其他收入',
    rent: '房租 / 房贷',
    groceries: '食品杂货',
    utilities: '水电煤气',
    transport: '交通',
    insurance: '保险',
    dining: '外出就餐',
    entertainment: '娱乐',
    shopping: '购物',
    subscriptions: '订阅服务',
    calculate: '计算',
    balance: '月度结余',
    needsRule: '必需',
    wantsRule: '弹性',
    savingsRule: '储蓄',
    surplus: '你有结余！🎉',
    deficit: '支出超过收入 ⚠️',
    step1: '输入月收入来源',
    step2: '填写必需支出',
    step3: '添加弹性支出',
    step4: '查看结余和 50/30/20 分配',
  }
});

const { $, t } = GZ;

function calculate() {
  const income = (parseFloat($('#inc-salary').value) || 0) + (parseFloat($('#inc-other').value) || 0);
  const needs = ['rent','groceries','utilities','transport','insurance'].reduce((s, k) => s + (parseFloat($('#exp-'+k).value) || 0), 0);
  const wants = ['dining','entertain','shopping','subs'].reduce((s, k) => s + (parseFloat($('#exp-'+k).value) || 0), 0);
  const totalExp = needs + wants;
  const balance = income - totalExp;
  const savingsRate = income > 0 ? (balance / income * 100) : 0;
  const needsPct = income > 0 ? (needs / income * 100) : 0;
  const wantsPct = income > 0 ? (wants / income * 100) : 0;

  $('#result').style.display = 'block';
  const fmt = n => '$' + Math.abs(n).toLocaleString('en-US', { maximumFractionDigits: 0 });
  const balEl = $('#result-balance');
  balEl.textContent = (balance >= 0 ? '+' : '−') + fmt(balance);
  balEl.className = 'big ' + (balance >= 0 ? 'pos' : 'neg');
  $('#result-balance-label').textContent = balance >= 0 ? t('surplus') : t('deficit');

  $('#rule-needs-val').textContent = fmt(needs) + ' (' + needsPct.toFixed(0) + '%)';
  $('#rule-wants-val').textContent = fmt(wants) + ' (' + wantsPct.toFixed(0) + '%)';
  $('#rule-save-val').textContent = fmt(balance) + ' (' + Math.max(0,savingsRate).toFixed(0) + '%)';
  $('#fill-needs').style.width = Math.min(100, needsPct / 0.5) + '%';
  $('#fill-wants').style.width = Math.min(100, wantsPct / 0.3) + '%';
  $('#fill-save').style.width = Math.min(100, savingsRate / 0.2) + '%';
}

document.querySelectorAll('input[type=number]').forEach(el => el.addEventListener('input', calculate));
calculate();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'💵', href:'/calc/net-salary-calculator.html', name:'Net Salary'},
    {icon:'🏠', href:'/calc/mortgage-calculator.html', name:'Mortgage'},
    {icon:' retiring', href:'/calc/retirement-calculator.html', name:'Retirement'},
    {icon:'💳', href:'/calc/debt-payoff-calculator.html', name:'Debt Payoff'},
  ]
});
</script>
