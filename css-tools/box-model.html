<style>
.box-model-wrapper{display:flex;gap:24px;margin-bottom:24px;align-items:flex-start;flex-wrap:wrap;justify-content:center}
.box-model-diagram{flex:0 0 auto}
.box-model-diagram .layer{display:flex;align-items:center;justify-content:center;border-style:dashed;transition:all .2s}
.box-margin{background:rgba(255,235,59,.12);border-color:#fdd835;border-width:2px;padding:20px}
.box-border{background:rgba(255,152,0,.12);border-color:#ff9800;border-width:4px;padding:12px;border-style:solid}
.box-padding{background:rgba(76,175,80,.12);border-color:#4caf50;border-width:2px;padding:20px}
.box-content{background:rgba(33,150,243,.12);border-color:#2196f3;border-width:2px;border-style:solid;min-width:80px;min-height:60px;text-align:center;display:flex;align-items:center;justify-content:center;font-size:.85em;font-weight:600}
.box-legend{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:20px;padding:12px;background:var(--gz-bg,#1a1a2e);border-radius:8px}
.box-legend span{display:flex;align-items:center;gap:6px;font-size:.85em}
.box-legend span::before{content:'';width:14px;height:14px;border-radius:3px;display:inline-block}
.legend-margin::before{background:rgba(255,235,59,.4);border:2px dashed #fdd835}
.legend-border::before{background:rgba(255,152,0,.4);border:2px solid #ff9800}
.legend-padding::before{background:rgba(76,175,80,.4);border:2px dashed #4caf50}
.legend-content::before{background:rgba(33,150,243,.4);border:2px solid #2196f3}
.controls-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px 20px;margin-bottom:20px}
.ctrl{display:flex;flex-direction:column;gap:4px}
.ctrl label{font-size:.8em;display:flex;justify-content:space-between}
.ctrl label span{color:var(--gz-accent);font-family:monospace;font-weight:600}
.ctrl input[type="range"]{width:100%;accent-color:var(--gz-accent)}
.box-info{background:var(--gz-bg,#1a1a2e);border:1px solid var(--gz-border,#333);border-radius:8px;padding:16px;font-size:.85em;line-height:2;margin-bottom:16px}
.box-info .label{opacity:.7}
.box-info .value{color:var(--gz-accent);font-family:monospace;font-weight:600}
@media(max-width:700px){.controls-grid{grid-template-columns:1fr}.box-model-wrapper{flex-direction:column;align-items:center}}
</style>

<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"What is the CSS box model?","acceptedAnswer":{"@type":"Answer","text":"The CSS box model is a rectangular box that wraps around every HTML element. It consists of four areas: content (the actual text/image), padding (space between content and border), border (the edge around padding), and margin (space outside the border)."}},{"@type":"Question","name":"What is the difference between content-box and border-box?","acceptedAnswer":{"@type":"Answer","text":"In content-box (default), width/height only sets the content area size, padding and border are added on top. In border-box (box-sizing: border-box), width/height includes content, padding and border, making sizing more intuitive."}},{"@type":"Question","name":"How do I calculate the total element width?","acceptedAnswer":{"@type":"Answer","text":"Total width = content width + left padding + right padding + left border + right border + left margin + right margin. This tool calculates all these values for you automatically."}},{"@type":"Question","name":"Why should I use border-box?","acceptedAnswer":{"@type":"Answer","text":"Using box-sizing: border-box makes element sizing much more predictable — when you set width: 300px, the element stays 300px total regardless of padding or border. This is why many developers use the universal border-box reset."}}]}</script>

  </div>

</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'CSS Box Model Visualizer',
    toolDesc: 'Visualize the CSS box model interactively — adjust margin, border, padding and content dimensions with live preview.',
    margin: 'Margin',
    border: 'Border',
    padding: 'Padding',
    content: 'Content',
    top: 'Top',
    right: 'Right',
    bottom: 'Bottom',
    left: 'Left',
    boxSizing: 'Box Sizing',
    contentBox: 'content-box',
    borderBox: 'border-box',
    copy: 'Copy',
    reset: 'Reset',
    copied: 'Copied!',
    totalWidth: 'Total Width',
    totalHeight: 'Total Height',
    actualContent: 'Actual Content',
    contentBoxNote: 'Content area only',
    borderBoxNote: 'Includes padding + border',
    step1: 'Adjust margin, border, padding and content size with sliders',
    step2: 'Switch between content-box and border-box to see the difference',
    step3: 'View the calculated total dimensions in the info panel',
    step4: 'Copy the generated CSS code for your project',
  },
  zh: {
    toolTitle: 'CSS 盒模型可视化工具',
    toolDesc: '交互式可视化 CSS 盒模型 — 实时调整 margin、border、padding 和 content 尺寸。',
    margin: '外边距',
    border: '边框',
    padding: '内边距',
    content: '内容',
    top: '上',
    right: '右',
    bottom: '下',
    left: '左',
    boxSizing: '盒模型模式',
    contentBox: 'content-box',
    borderBox: 'border-box',
    copy: '复制',
    reset: '重置',
    copied: '已复制！',
    totalWidth: '总宽度',
    totalHeight: '总高度',
    actualContent: '实际内容',
    contentBoxNote: '仅内容区域',
    borderBoxNote: '包含 padding + border',
    step1: '拖动滑块调整 margin、border、padding 和内容尺寸',
    step2: '切换 content-box 和 border-box 查看差异',
    step3: '在信息面板查看计算后的总尺寸',
    step4: '复制生成的 CSS 代码到项目中',
  }
});

const { $, copyText, t } = GZ;

const state = {
  marginTop: 20, marginRight: 20, marginBottom: 20, marginLeft: 20,
  borderTop: 3, borderRight: 3, borderBottom: 3, borderLeft: 3,
  paddingTop: 15, paddingRight: 15, paddingBottom: 15, paddingLeft: 15,
  contentWidth: 150, contentHeight: 100,
  boxSizing: 'content-box',
};

const cssBoxModel = GZI18n.getLang() === 'zh' ? 'zh' : 'en';
const marginT = t('margin'), borderT = t('border'), paddingT = t('padding'), contentT = t('content');
// Update legend labels for i18n (static HTML has English defaults)
$$('.box-legend span').forEach(s => {
  const key = s.getAttribute('data-i18n');
  if (key) s.textContent = t(key);
});

const sliderConfig = [
  { group: 'margin', props: ['marginTop','marginRight','marginBottom','marginLeft'], min:0, max:60, step:1 },
  { group: 'border', props: ['borderTop','borderRight','borderBottom','borderLeft'], min:0, max:20, step:1 },
  { group: 'padding', props: ['paddingTop','paddingRight','paddingBottom','paddingLeft'], min:0, max:60, step:1 },
  { group: 'content', props: ['contentWidth','contentHeight'], min:40, max:300, step:5 },
];
const propLabels = {
  marginTop: t('margin')+' '+t('top'), marginRight: t('margin')+' '+t('right'),
  marginBottom: t('margin')+' '+t('bottom'), marginLeft: t('margin')+' '+t('left'),
  borderTop: t('border')+' '+t('top'), borderRight: t('border')+' '+t('right'),
  borderBottom: t('border')+' '+t('bottom'), borderLeft: t('border')+' '+t('left'),
  paddingTop: t('padding')+' '+t('top'), paddingRight: t('padding')+' '+t('right'),
  paddingBottom: t('padding')+' '+t('bottom'), paddingLeft: t('padding')+' '+t('left'),
  contentWidth: t('content')+' W', contentHeight: t('content')+' H',
};

function buildControls() {
  let html = '';
  sliderConfig.forEach(group => {
    group.props.forEach(prop => {
      html += `<div class="ctrl">
        <label>${propLabels[prop]} <span id="val-${prop}">${state[prop]}px</span></label>
        <input type="range" min="${group.min}" max="${group.max}" step="${group.step}" value="${state[prop]}" data-prop="${prop}">
      </div>`;
    });
  });
  html += `<div class="ctrl">
    <label>${t('boxSizing')}</label>
    <select id="ctrlBoxSizing">
      <option value="content-box">${t('contentBox')}</option>
      <option value="border-box">${t('borderBox')}</option>
    </select>
  </div>`;
  $('#controls').innerHTML = html;
  $('#controls').querySelectorAll('input[type="range"]').forEach(s => {
    s.addEventListener('input', () => {
      state[s.dataset.prop] = parseInt(s.value);
      $(`#val-${s.dataset.prop}`).textContent = s.value + 'px';
      update();
    });
  });
  $('#ctrlBoxSizing').addEventListener('change', e => {
    state.boxSizing = e.target.value;
    update();
  });
}

function updateDiagram() {
  const s = state;
  const mT = s.marginTop, mR = s.marginRight, mB = s.marginBottom, mL = s.marginLeft;
  const bT = s.borderTop, bR = s.borderRight, bB = s.borderBottom, bL = s.borderLeft;
  const pT = s.paddingTop, pR = s.paddingRight, pB = s.paddingBottom, pL = s.paddingLeft;
  const cW = s.contentWidth, cH = s.contentHeight;

  $('#diagram').innerHTML = `
    <div class="layer box-margin" style="padding:${mT}px ${mR}px ${mB}px ${mL}px">
      <div class="layer box-border" style="padding:${bT}px ${bR}px ${bB}px ${bL}px">
        <div class="layer box-padding" style="padding:${pT}px ${pR}px ${pB}px ${pL}px">
          <div class="layer box-content" style="width:${cW}px;height:${cH}px">${cW} × ${cH}</div>
        </div>
      </div>
    </div>`;
}

function updateInfo() {
  const s = state;
  let contentW = s.contentWidth, contentH = s.contentHeight;
  let borderW = s.borderLeft + s.borderRight;
  let borderH = s.borderTop + s.borderBottom;
  let paddingW = s.paddingLeft + s.paddingRight;
  let paddingH = s.paddingTop + s.paddingBottom;
  let marginW = s.marginLeft + s.marginRight;
  let marginH = s.marginTop + s.marginBottom;

  let totalW, totalH, actualCW, actualCH, note;

  if (s.boxSizing === 'content-box') {
    totalW = contentW + paddingW + borderW + marginW;
    totalH = contentH + paddingH + borderH + marginH;
    actualCW = contentW;
    actualCH = contentH;
    note = t('contentBoxNote');
  } else {
    // border-box: contentW includes padding+border
    actualCW = contentW - paddingW - borderW;
    actualCH = contentH - paddingH - borderH;
    totalW = contentW + marginW;
    totalH = contentH + marginH;
    note = t('borderBoxNote');
  }

  $('#boxInfo').innerHTML = `
    <div><span class="label">${t('totalWidth')}: </span><span class="value">${totalW}px</span>
    = ${s.contentWidth}(content) + ${paddingW}(padding) + ${borderW}(border) + ${marginW}(margin)</div>
    <div><span class="label">${t('totalHeight')}: </span><span class="value">${totalH}px</span>
    = ${s.contentHeight}(content) + ${paddingH}(padding) + ${borderH}(border) + ${marginH}(margin)</div>
    <div><span class="label">${t('actualContent')}: </span><span class="value">${Math.max(0, actualCW)} × ${Math.max(0, actualCH)}px</span> (${note})</div>`;

  // Generate CSS
  let css = `.element {\n  box-sizing: ${s.boxSizing};\n`;
  if (s.boxSizing === 'content-box') {
    css += `  width: ${s.contentWidth}px;\n  height: ${s.contentHeight}px;\n`;
  } else {
    css += `  width: ${s.contentWidth}px;\n  height: ${s.contentHeight}px;\n`;
  }
  css += `  margin: ${s.marginTop}px ${s.marginRight}px ${s.marginBottom}px ${s.marginLeft}px;\n`;
  css += `  border: ${s.borderTop}px solid;\n`;
  css += `  padding: ${s.paddingTop}px ${s.paddingRight}px ${s.paddingBottom}px ${s.paddingLeft}px;\n`;
  css += `}`;
  $('#codeBlock').innerHTML = `<button class="gz-btn copy-btn" onclick="doCopy()">${t('copy')}</button>${css}`;
}

function update() {
  updateDiagram();
  updateInfo();
}

window.doCopy = () => {
  const code = $('#codeBlock').textContent.replace(t('copy'), '').trim();
  copyText(code);
  const btn = $('#codeBlock .copy-btn');
  btn.textContent = t('copied');
  setTimeout(() => btn.textContent = t('copy'), 1500);
};

window.doReset = () => {
  Object.assign(state, {
    marginTop:20,marginRight:20,marginBottom:20,marginLeft:20,
    borderTop:3,borderRight:3,borderBottom:3,borderLeft:3,
    paddingTop:15,paddingRight:15,paddingBottom:15,paddingLeft:15,
    contentWidth:150,contentHeight:100,boxSizing:'content-box'
  });
  sliderConfig.forEach(g => g.props.forEach(p => {
    const el = $(`input[data-prop="${p}"]`);
    if (el) el.value = state[p];
    const lbl = $(`#val-${p}`);
    if (lbl) lbl.textContent = state[p] + 'px';
  }));
  const bs = $('#ctrlBoxSizing');
  if (bs) bs.value = state.boxSizing;
  update();
};

$('#toolbar').innerHTML = `<button class="gz-btn gz-btn-secondary" onclick="doReset()">${t('reset')}</button>`;

buildControls();
update();

GZ.renderToolPage({
  category: 'css',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📐', href:'/css-tools/flexbox.html', name:'Flexbox'},
    {icon:'🔲', href:'/css-tools/grid.html', name:'CSS Grid'},
    {icon:'📏', href:'/dev/rem-px.html', name:'REM ↔ PX'},
    {icon:'🔘', href:'/css-tools/border-radius.html', name:'Border Radius'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
