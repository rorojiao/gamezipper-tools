  zh: {

    toolDesc: '粘贴名单、号码或条目，公平抽取随机中奖者。加密级洗牌、唯一/可重复模式、动画效果 — 免费且私密。',
    entries: '参与名单（每行一个）',
    numWinners: '中奖人数',
    unique: '唯一中奖（不重复）',
    animate: '滚动动画',
    result: '结果',
    draw: '🎲 抽取中奖者',

    winnersTitle: '🎉 中奖名单',
    place: '名次',
    empty: '在左侧粘贴参与名单，然后点击抽取！',
    step1: '每行粘贴一个条目 — 姓名、票号或 ID',
    step2: '设置中奖人数，选择唯一或可重复模式',

});

const { $, copyText, t } = GZ;

function getEntries() {
  return $('#entries').value.split('\n').map(s => s.trim()).filter(Boolean);
}

function secureRandom(max) {
  if (window.crypto && crypto.getRandomValues) {
    const arr = new Uint32Array(1);
    crypto.getRandomValues(arr);
    return arr[0] % max;
  }
  return Math.floor(Math.random() * max);
}

function fisherYates(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = secureRandom(i + 1);
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function updateCount() {
  const n = getEntries().length;
  $('#entry-count').textContent = `${n} ${n === 1 ? 'entry' : 'entries'}`;
}

let drawing = false;
function draw() {
  if (drawing) return;
  const entries = getEntries();
  if (!entries.length) { $('#winners-box').style.display = 'none'; $('#anim-box').textContent = t('empty'); return; }
  const n = Math.max(1, Math.min(100, parseInt($('#numWinners').value)||1));
  const unique = $('#unique').checked;
  const animate = $('#animate').checked;
  if (unique && n > entries.length) { alert('Cannot pick ' + n + ' unique winners from only ' + entries.length + ' entries.'); return; }

  drawing = true;
  $('#pick-btn').disabled = true;
  $('#pick-btn').textContent = t('drawing');

  if (animate) {
    let ticks = 0;
    const maxTicks = 22;
    const tick = () => {
      const rand = entries[secureRandom(entries.length)];
      $('#anim-box').textContent = rand.length > 30 ? rand.slice(0,30)+'…' : rand;
      ticks++;
      if (ticks < maxTicks) {
        setTimeout(tick, 50 + ticks*8);
      } else {
        finishDraw(entries, n, unique);
      }
    };
    tick();
  } else {
    finishDraw(entries, n, unique);
  }
}

function finishDraw(entries, n, unique) {
  const pool = [...entries];
  const winners = [];
  for (let i = 0; i < n; i++) {
    if (unique) {
      fisherYates(pool);
      const w = pool.shift();
      winners.push(w);
    } else {
      winners.push(pool[secureRandom(pool.length)]);
    }
  }
  $('#anim-box').textContent = winners[0] || '—';
  const medals = ['🥇','🥈','🥉'];
  let html = '';
  winners.forEach((w, i) => {
    const placeIcon = i < 3 ? medals[i] : `<span style="font-weight:700">${i+1}</span>`;
    html += `<div class="rd-winner"><div class="place">${i+1}</div><div><div style="font-weight:700">${escapeHtml(w)}</div><div style="font-size:.8rem;color:var(--text2)">${placeIcon}</div></div></div>`;
  });
  $('#winners-list').innerHTML = html;
  $('#winners-title').textContent = t('winnersTitle');
  $('#winners-box').style.display = 'block';
  $('#pick-btn').disabled = false;
  $('#pick-btn').textContent = t('draw');
  drawing = false;
}

function escapeHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function loadExample() {
  $('#entries').value = 'Alice Johnson\nBob Smith\nCharlie Davis\nDiana Prince\nEthan Hunt\nFiona Green\nGeorge Lucas\nHannah Baker\nIvan Petrov\nJulia Roberts\nKevin Hart\nLuna Lovegood';
  updateCount();
  draw();
}

// wire labels
$('#lbl-entries').textContent = t('entries');
$('#lbl-num').textContent = t('numWinners');
$('#lbl-unique').textContent = t('unique');
$('#lbl-animate').textContent = t('animate');
$('#lbl-result').textContent = t('result');
$('#pick-btn').textContent = t('draw');
$('#anim-box').textContent = t('empty');
$('#entries').addEventListener('input', updateCount);

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="loadExample()">${GZ.t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#entries').value='';updateCount();$('#winners-box').style.display='none';$('#anim-box').textContent=t('empty')">${GZ.t('clear')}</button>`;
