<script>
GZI18n.register({
  en: {
    toolTitle: 'WiFi QR Code Generator',
    toolDesc: 'Create a QR code for your WiFi network so guests can scan and connect instantly — no password typing. Supports WPA, WEP and open networks. Download as PNG or SVG.',
    hint: '💡 Enter your WiFi name (SSID) and password. Your guests scan the QR code with their phone camera to join instantly — no password typing needed.',
    ssid: 'Network name (SSID)',
    enc: 'Security',
    pwd: 'Password',
    hidden: 'Hidden network',
    size: 'Size',
    fg: 'Foreground',
    bg: 'Background',
    downloadPNG: 'Download PNG',
    downloadSVG: 'Download SVG',
    enterData: 'Enter your WiFi network name to generate a QR code',
    step1: 'Type your WiFi network name (SSID)',
    step2: 'Choose security type (WPA recommended) and enter the password',
    step3: 'Customize size and colors if desired',
    step4: 'Download the QR code as PNG or SVG and print or share it',
  },
  zh: {
    toolTitle: 'WiFi 二维码生成器',
    toolDesc: '为你的 WiFi 网络生成二维码，客人扫码即可一键连接 — 无需输入密码。支持 WPA、WEP 和开放网络。下载 PNG 或 SVG。',
    hint: '💡 输入你的 WiFi 名称（SSID）和密码。客人用手机摄像头扫描二维码即可一键连接 — 无需手动输入密码。',
    ssid: '网络名称（SSID）',
    enc: '加密方式',
    pwd: '密码',
    hidden: '隐藏网络',
    size: '尺寸',
    fg: '前景色',
    bg: '背景色',
    downloadPNG: '下载 PNG',
    downloadSVG: '下载 SVG',
    enterData: '输入 WiFi 网络名称以生成二维码',
    step1: '输入 WiFi 网络名称（SSID）',
    step2: '选择加密方式（推荐 WPA）并输入密码',
    step3: '可自定义尺寸和颜色',
    step4: '下载 PNG 或 SVG 二维码，打印或分享',
  }
});
const { $, t } = GZ;
let qrCanvas = null;

function escapeWifi(s) {
  return s.replace(/([\\;,:"])/g, '\\$1');
}

function buildWifiString() {
  const ssid = $('#ssid').value.trim();
  const enc = $('#enc').value;
  const pwd = $('#pwd').value;
  const hidden = $('#hidden').checked ? 'true' : 'false';
  if (!ssid) return '';
  if (enc === 'nopass') {
    return `WIFI:T:nopass;S:${escapeWifi(ssid)};H:${hidden};;`;
  }
  return `WIFI:T:${enc};S:${escapeWifi(ssid)};P:${escapeWifi(pwd)};H:${hidden};;`;
}

function togglePwd() {
  const enc = $('#enc').value;
  $('#pwd-row').style.display = enc === 'nopass' ? 'none' : 'flex';
}

function generate() {
  const data = buildWifiString();
  if (!data) {
    $('#preview').innerHTML = `<div class="empty">${t('enterData')}</div>`;
    $('#downloads').style.display = 'none';
    return;
  }
  try {
    const size = parseInt($('#size').value);
    const fg = $('#fg-color').value;
    const bg = $('#bg-color').value;
    const qr = qrcode(0, 'M');
    qr.addData(data);
    qr.make();
    const count = qr.getModuleCount();
    const cellSize = Math.floor(size / count);
    const actualSize = cellSize * count;
    const canvas = document.createElement('canvas');
    canvas.width = actualSize; canvas.height = actualSize;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = bg; ctx.fillRect(0, 0, actualSize, actualSize);
    ctx.fillStyle = fg;
    for (let r = 0; r < count; r++) {
      for (let c = 0; c < count; c++) {
        if (qr.isDark(r, c)) ctx.fillRect(c * cellSize, r * cellSize, cellSize, cellSize);
      }
    }
    $('#preview').innerHTML = '';
    $('#preview').appendChild(canvas);
    qrCanvas = canvas;
    $('#downloads').style.display = 'flex';
  } catch(e) {
    $('#preview').innerHTML = `<div class="empty">${e.message}</div>`;
    $('#downloads').style.display = 'none';
  }
}

function downloadPNG() {
  if (!qrCanvas) return;
  const a = document.createElement('a');
  a.download = 'wifi-qr.png';
  a.href = qrCanvas.toDataURL('image/png');
  a.click();
}

function downloadSVG() {
  const data = buildWifiString();
  if (!data) return;
  const size = parseInt($('#size').value);
  const fg = $('#fg-color').value;
  const bg = $('#bg-color').value;
  const qr = qrcode(0, 'M');
  qr.addData(data);
  qr.make();
  const count = qr.getModuleCount();
  const cellSize = size / count;
  let rects = '';
  for (let r = 0; r < count; r++) {
    for (let c = 0; c < count; c++) {
      if (qr.isDark(r, c)) rects += `<rect x="${(c*cellSize).toFixed(2)}" y="${(r*cellSize).toFixed(2)}" width="${cellSize.toFixed(2)}" height="${cellSize.toFixed(2)}"/>`;
    }
  }
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" viewBox="0 0 ${size} ${size}"><rect width="${size}" height="${size}" fill="${bg}"/><g fill="${fg}">${rects}</g></svg>`;
  const blob = new Blob([svg], { type: 'image/svg+xml' });
  const a = document.createElement('a');
  a.download = 'wifi-qr.svg';
  a.href = URL.createObjectURL(blob);
  a.click();
  URL.revokeObjectURL(a.href);
}

$('#fg-color').addEventListener('input', generate);
$('#bg-color').addEventListener('input', generate);
$('#size').addEventListener('change', generate);

$('#ssid').value = 'MyHomeWiFi';
$('#pwd').value = 'SuperSecret123';
$('#lbl-ssid').textContent = t('ssid');
$('#lbl-enc').textContent = t('enc');
$('#lbl-pwd').textContent = t('pwd');
$('#lbl-hidden').textContent = t('hidden');
$('#lbl-size').textContent = t('size');
$('#lbl-fg').textContent = t('fg');
$('#lbl-bg').textContent = t('bg');
$('#hint').textContent = t('hint');
$('#empty-msg').textContent = t('enterData');
$('#btn-png').textContent = t('downloadPNG');
$('#btn-svg').textContent = t('downloadSVG');
$('#toolbar').innerHTML = `<button class="gz-btn gz-btn-secondary" onclick="resetForm()">${t('clear')}</button>`;

function resetForm() {
  $('#ssid').value = '';
  $('#pwd').value = '';
  $('#enc').value = 'WPA';
  $('#hidden').checked = false;
  togglePwd();
  generate();
}

GZ.renderToolPage({
  category: 'dev',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],

    {icon:'📷', href:'/dev/qr-code-reader.html', name:'QR Code Reader'},
    {icon:'🔑', href:'/text/random-password-generator.html', name:'Password Generator'},
    {icon:'📱', href:'/dev/meid-converter.html', name:'MEID Converter'},
  ]
});

generate();
</script>
