function hexToRgb(hex) {
  hex = hex.replace('#','');
  if (hex.length === 3) hex = hex.split('').map(c => c+c).join('');
  return { r: parseInt(hex.substr(0,2),16), g: parseInt(hex.substr(2,2),16), b: parseInt(hex.substr(4,2),16) };
}
function rgbToHsl(r,g,b) {
  r/=255;g/=255;b/=255;
  const max=Math.max(r,g,b),min=Math.min(r,g,b);
  let h=0,s=0,l=(max+min)/2;
  if (max!==min) {
    const d=max-min;
    s=l>0.5?d/(2-max-min):d/(max+min);
    switch(max){case r:h=(g-b)/d+(g<b?6:0);break;case g:h=(b-r)/d+2;break;case b:h=(r-g)/d+4;break;}
    h/=6;
  }
  return { h: h*360, s: s*100, l: l*100 };
}
function rgbToCmyk(r,g,b) {
  r/=255;g/=255;b/=255;
  const k=1-Math.max(r,g,b);
  if (k===1) return {c:0,m:0,y:0,k:100};
  return { c: (1-r-k)/(1-k)*100, m: (1-g-k)/(1-k)*100, y: (1-b-k)/(1-k)*100, k: k*100 };
}
function getHueCategory(h,s,l) {
  if (l < 5) return 'black';
  if (l > 95) return 'white';
  if (s < 8) return 'gray';
  const hue = ((h % 360) + 360) % 360;
  if (hue < 15 || hue >= 345) return 'red';
  if (hue < 40) return 'orange';
  if (hue < 65) return 'yellow';
  if (hue < 165) return 'green';
  if (hue < 200) return 'cyan';
  if (hue < 260) return 'blue';
  if (hue < 320) return 'purple';
  return 'pink';
}
function getLuminance(hex) {
  const {r,g,b} = hexToRgb(hex);
  const a = [r,g,b].map(v => { v/=255; return v<=0.03928 ? v/12.92 : Math.pow((v+0.055)/1.055, 2.4); });
  return 0.2126*a[0] + 0.7152*a[1] + 0.0722*a[2];
}
function contrastRatio(hex1, hex2) {
  const l1 = getLuminance(hex1), l2 = getLuminance(hex2);
  return (Math.max(l1,l2)+0.05)/(Math.min(l1,l2)+0.05);
}

// Pre-compute HSL and category for each

  c.hsl = rgbToHsl(rgb.r, rgb.g, rgb.b);
  c.cmyk = rgbToCmyk(rgb.r, rgb.g, rgb.b);
  c.category = getHueCategory(c.hsl.h, c.hsl.s, c.hsl.l);
});

const { $, copyText, t } = GZ;
let activeHue = 'all';
let sortBy = 'name';

function pickTextColor(bg) {
  const lum = getLuminance(bg);
  return lum > 0.5 ? '#000' : '#fff';
}

function renderGrid() {
  const q = $('#search').value.trim().toLowerCase();
  let list = COLORS.filter(c => {
    if (activeHue !== 'all' && c.category !== activeHue) return false;
    if (!q) return true;
    return c.name.includes(q) || c.hex.toLowerCase().includes(q);
  });
  if (sortBy === 'name') list.sort((a,b) => a.name.localeCompare(b.name));
  else if (sortBy === 'hue') list.sort((a,b) => a.hsl.h - b.hsl.h);
  else if (sortBy === 'light') list.sort((a,b) => b.hsl.l - a.hsl.l);
  else if (sortBy === 'sat') list.sort((a,b) => b.hsl.s - a.hsl.s);

  $('#count').textContent = `Showing ${list.length} of ${COLORS.length} colors${activeHue!=='all' ? ` (${activeHue} family)` : ''}${q ? ` matching "${q}"` : ''}`;

  const grid = $('#grid');
  grid.innerHTML = list.map(c => {
    const txt = pickTextColor(c.hex);
    return `<div class="cn-card" data-name="${c.name}">
      <div class="cn-swatch" style="background:${c.hex};color:${txt}">${c.hex.toUpperCase()}</div>
      <div class="cn-info">
        <div class="cn-name">${c.name}</div>
        <div class="cn-hex">RGB(${c.rgb.r}, ${c.rgb.g}, ${c.rgb.b})</div>
      </div>
    </div>`;
  }).join('');

  // Wire click handlers
  grid.querySelectorAll('.cn-card').forEach(card => {
    card.addEventListener('click', () => showDetail(card.dataset.name));
  });
}

function showDetail(name) {
  const c = COLORS.find(x => x.name === name);
  if (!c) return;
  const textC = pickTextColor(c.hex);
  const whiteContrast = contrastRatio(c.hex, '#ffffff').toFixed(2);
  const blackContrast = contrastRatio(c.hex, '#000000').toFixed(2);
  const detail = $('#detail');
  detail.classList.add('show');
  detail.innerHTML = `
    <div style="display:grid;grid-template-columns:auto 1fr;gap:14px;align-items:start">
      <div style="width:120px;height:120px;border-radius:12px;background:${c.hex};color:${textC};display:flex;align-items:center;justify-content:center;font-weight:700;text-align:center;padding:6px">${c.hex.toUpperCase()}</div>
      <div style="flex:1">
        <h3>${c.name}</h3>
        <div class="cn-row"><span style="min-width:80px;font-size:.85em;opacity:.7">HEX</span><code data-copy="${c.hex}">${c.hex.toUpperCase()}</code></div>
        <div class="cn-row"><span style="min-width:80px;font-size:.85em;opacity:.7">RGB</span><code data-copy="rgb(${c.rgb.r}, ${c.rgb.g}, ${c.rgb.b})">rgb(${c.rgb.r}, ${c.rgb.g}, ${c.rgb.b})</code></div>
        <div class="cn-row"><span style="min-width:80px;font-size:.85em;opacity:.7">HSL</span><code data-copy="hsl(${Math.round(c.hsl.h)}, ${Math.round(c.hsl.s)}%, ${Math.round(c.hsl.l)}%)">hsl(${Math.round(c.hsl.h)}, ${Math.round(c.hsl.s)}%, ${Math.round(c.hsl.l)}%)</code></div>
        <div class="cn-row"><span style="min-width:80px;font-size:.85em;opacity:.7">CMYK</span><code data-copy="cmyk(${Math.round(c.cmyk.c)}, ${Math.round(c.cmyk.m)}, ${Math.round(c.cmyk.y)}, ${Math.round(c.cmyk.k)})">cmyk(${Math.round(c.cmyk.c)}, ${Math.round(c.cmyk.m)}, ${Math.round(c.cmyk.y)}, ${Math.round(c.cmyk.k)})</code></div>
        <div class="cn-row"><span style="min-width:80px;font-size:.85em;opacity:.7">CSS</span><code data-copy="${c.name}">color: ${c.name};</code></div>
        <div class="cn-contrast">
          <b>Contrast ratios:</b> vs white = <b>${whiteContrast}:1</b> ${whiteContrast >= 4.5 ? '✓ AA' : (whiteContrast >= 3 ? '⚠ AA Large' : '✗ Fail')} ·
          vs black = <b>${blackContrast}:1</b> ${blackContrast >= 4.5 ? '✓ AA' : (blackContrast >= 3 ? '⚠ AA Large' : '✗ Fail')}
        </div>
      </div>
    </div>`;
  detail.querySelectorAll('code[data-copy]').forEach(code => {
    code.style.cursor = 'pointer';
    code.title = 'Click to copy';
    code.addEventListener('click', () => copyText(code.dataset.copy));
  });
  detail.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  $('#status').textContent = `✓ Showing ${c.name} — click any value to copy`;
}

  $('#detail').classList.remove('show');
  renderGrid();
});
document.querySelectorAll('.cn-chip').forEach(chip => {

    activeHue = chip.dataset.hue;

});
