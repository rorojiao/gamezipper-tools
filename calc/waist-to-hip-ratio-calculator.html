.whr-field input:focus{outline:none;border-color:var(--accent)}

.gender-row label{color:var(--text2);font-size:.9em}
.gender-row select{background:rgba(0,0,0,.3);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text);font-size:.95em}
.result-card{background:var(--glass2);border:1px solid var(--border);border-radius:12px;padding:18px;margin-top:14px;text-align:center}
.result-card .big-num{font-size:3rem;font-weight:900;color:var(--accent);font-family:monospace}
.result-card .category{font-size:1.2rem;font-weight:700;margin-top:8px;padding:8px 16px;border-radius:20px;display:inline-block}

.cat-mod{background:rgba(255,217,61,.15);color:#ffd93d;border:1px solid #ffd93d}
.cat-high{background:rgba(233,69,96,.15);color:#e94560;border:1px solid #e94560}

.scale div{flex:1;display:flex;align-items:center;justify-content:center;font-size:.7em;color:#fff;font-weight:600}

<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"What is a healthy waist-to-hip ratio?","acceptedAnswer":{"@type":"Answer","text":"For men, a WHR below 0.90 is considered low risk. For women, a WHR below 0.80 is low risk. A ratio of 0.90-0.99 (men) or 0.80-0.84 (women) indicates moderate risk, and above those thresholds indicates high risk of cardiovascular disease."}},{"@type":"Question","name":"How do I measure my waist and hip correctly?","acceptedAnswer":{"@type":"Answer","text":"Measure your waist at the narrowest point (usually just above the belly button) with a relaxed stomach. Measure your hips at the widest point (around the buttocks). Use a measuring tape and keep it level and snug but not compressing the skin."}},{"@type":"Question","name":"What does waist-to-hip ratio tell me?","acceptedAnswer":{"@type":"Answer","text":"WHR indicates body fat distribution. A higher ratio means more abdominal (visceral) fat, which is linked to higher risk of heart disease, type 2 diabetes, and hypertension. It is considered a better health indicator than BMI alone."}},{"@type":"Question","name":"Is waist-to-hip ratio better than BMI?","acceptedAnswer":{"@type":"Answer","text":"WHR and BMI measure different things. BMI measures overall body mass relative to height, while WHR measures fat distribution. WHR is often a better predictor of cardiovascular risk because it specifically identifies dangerous abdominal fat."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="gender-row">
      <label id="lblGender">Gender:</label>
      <select id="gender"><option value="male">♂ Male</option><option value="female">♀ Female</option></select>
    </div>
    <div class="whr-grid">
      <div class="whr-field">
        <label id="lblWaist">Waist circumference</label>
        <div class="row"><input type="number" id="waist" value="85" step="any" min="0">
          <select id="waistUnit"><option value="cm" selected>cm</option><option value="in">in</option><option value="m">m</option></select>
        </div>
      </div>
      <div class="whr-field">
        <label id="lblHip">Hip circumference</label>
        <div class="row"><input type="number" id="hip" value="100" step="any" min="0">
          <select id="hipUnit"><option value="cm" selected>cm</option><option value="in">in</option><option value="m">m</option></select>
        </div>
      </div>
    </div>
    <div class="result-card">
      <div class="big-num" id="whrValue">0.85</div>
      <div id="whrCategory"></div>
      <div class="desc" id="whrDesc"></div>
      <div class="scale">
        <div class="scale-low" id="scaleLow">Low</div>
        <div class="scale-mod" id="scaleMod">Moderate</div>
        <div class="scale-high" id="scaleHigh">High</div>
      </div>
      <div class="scale-marker"><div class="dot" id="scaleDot"></div></div>
    </div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en:{toolTitle:'Waist-to-Hip Ratio Calculator',toolDesc:'Calculate your waist-to-hip ratio (WHR) to assess body fat distribution and cardiovascular health risk. Based on WHO guidelines with instant interpretation.',
    step1:'Select your biological sex (thresholds differ for men and women)',step2:'Enter your waist circumference at the narrowest point',step3:'Enter your hip circumference at the widest point',step4:'View your WHR value and health risk category',
    lblGender:'Gender:',lblWaist:'Waist circumference',lblHip:'Hip circumference',
    catLow:'Low Risk',catMod:'Moderate Risk',catHigh:'High Risk',
    descLowMale:'Your body fat distribution is healthy. Abdominal fat is within the low-risk range.',
    descModMale:'You have moderate abdominal fat. Consider lifestyle changes to reduce cardiovascular risk.',
    descHighMale:'You have high abdominal fat. This increases risk of heart disease and type 2 diabetes.',
    descLowFemale:'Your body fat distribution is healthy. Abdominal fat is within the low-risk range.',
    descModFemale:'You have moderate abdominal fat. Consider lifestyle changes to reduce cardiovascular risk.',
    descHighFemale:'You have high abdominal fat. This increases risk of heart disease and type 2 diabetes.'},
  zh:{toolTitle:'腰臀比计算器',toolDesc:'计算腰臀比 (WHR) 以评估体脂分布和心血管健康风险。基于世界卫生组织标准，即时解读结果。',
    step1:'选择性别（男女标准不同）',step2:'在最窄处测量腰围',step3:'在最宽处测量臀围',step4:'查看 WHR 值和健康风险等级',
    lblGender:'性别：',lblWaist:'腰围',lblHip:'臀围',
    catLow:'低风险',catMod:'中等风险',catHigh:'高风险',
    descLowMale:'您的体脂分布健康，腹部脂肪在低风险范围内。',
    descModMale:'您有中度腹部脂肪，建议改善生活方式以降低心血管风险。',
    descHighMale:'您有较高的腹部脂肪，这会增加心脏病和 2 型糖尿病的风险。',
    descLowFemale:'您的体脂分布健康，腹部脂肪在低风险范围内。',
    descModFemale:'您有中度腹部脂肪，建议改善生活方式以降低心血管风险。',
    descHighFemale:'您有较高的腹部脂肪，这会增加心脏病和 2 型糖尿病的风险。'}
});
const{$,t}=GZ;
const round=(v,d=2)=>{if(!isFinite(v))return'—';const p=Math.pow(10,d);return(Math.round(v*p)/p).toString();};
const UNITS={cm:1,in:2.54,m:100};
function compute(){
  const gender=$('#gender').value;
  const waist=(parseFloat($('#waist').value)||0)*UNITS[$('#waistUnit').value];
  const hip=(parseFloat($('#hip').value)||0)*UNITS[$('#hipUnit').value];
  if(hip<=0)return;
  const whr=waist/hip;
  $('#whrValue').textContent=round(whr,3);
  let cat,desc,catClass,lowMax,modMax;
  if(gender==='male'){
    lowMax=0.90;modMax=0.99;
  }else{
    lowMax=0.80;modMax=0.84;
  }
  if(whr<lowMax){cat=t('catLow');desc=gender==='male'?t('descLowMale'):t('descLowFemale');catClass='cat-low';}
  else if(whr<=modMax){cat=t('catMod');desc=gender==='male'?t('descModMale'):t('descModFemale');catClass='cat-mod';}
  else{cat=t('catHigh');desc=gender==='male'?t('descHighMale'):t('descHighFemale');catClass='cat-high';}
  $('#whrCategory').innerHTML=`<span class="category ${catClass}">${cat}</span>`;
  $('#whrDesc').textContent=desc;
  // Scale: 0.5 to 1.2 range
  const pct=Math.min(100,Math.max(0,((whr-0.5)/(1.2-0.5))*100));
  $('#scaleDot').style.left=pct+'%';
  // Update scale labels with thresholds
  const lowPct=((lowMax-0.5)/0.7)*100;
  const modPct=((modMax-0.5)/0.7)*100;
  $('#scaleLow').style.flex=`${lowPct}`;
  $('#scaleMod').style.flex=`${modPct-lowPct}`;
  $('#scaleHigh').style.flex=`${100-modPct}`;
}
['waist','hip'].forEach(id=>$('#'+id).addEventListener('input',compute));
['waistUnit','hipUnit','gender'].forEach(id=>$('#'+id).addEventListener('change',compute));
$('#toolbar').innerHTML=`<button class="gz-btn" onclick="compute()">${t('calculate')}</button><button class="gz-btn gz-btn-secondary" onclick="GZ.copyText('WHR: '+$('#whrValue').textContent+' - '+$('#whrCategory').innerText)">${t('copy')}</button>`;
compute();
GZ.renderToolPage({
  category:'calc',titleKey:'toolTitle',descKey:'toolDesc',
  howToSteps:['step1','step2','step3','step4'],
  related:[
    {icon:'⚖️',href:'/calc/bmi-calculator.html',name:'BMI Calculator'},
    {icon:'🔥',href:'/calc/bmr-calculator.html',name:'BMR Calculator'},
    {icon:'🏃',href:'/calc/calorie-calculator.html',name:'Calorie Calculator'},
    {icon:'💪',href:'/calc/body-fat.html',name:'Body Fat Calculator'}
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
