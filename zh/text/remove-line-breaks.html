<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">

    <div class="gz-split">
      <div><label id="lbl-in"></label><textarea id="input" spellcheck="false" placeholder="Line one\nLine two\nLine three"></textarea></div>
      <div><label id="lbl-out"></label><div class="gz-output" id="output"></div></div>

</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Remove Line Breaks',
    toolDesc: 'Remove line breaks and carriage returns from text. Join multi-line text into a single line with your choice of separator — free and private.',
    process: 'Process',
    joinWith: 'Join with',
    jSpace: 'Space',
    jComma: 'Comma',
    jCommaSpace: 'Comma + Space',
    jSemicolon: 'Semicolon',
    jNone: 'Nothing',
    jCustom: 'Custom',
    optPara: 'Preserve paragraph breaks',
    optTrim: 'Trim each line before joining',
    optRemoveEmpty: 'Remove empty lines',
    step1: 'Paste your multi-line text into the input area',
    step2: 'Choose how to join the lines',
    step3: 'Click Process to remove line breaks',
    step4: 'Copy the single-line result',
    done: '✓ Removed {n} line break(s)',
  },
  zh: {
    toolTitle: '去除换行符',
    toolDesc: '去除文本中的换行符和回车符。将多行文本合并为单行，可选分隔符 — 免费且私密。',
    process: '处理',
    joinWith: '连接方式',
    jSpace: '空格',
    jComma: '逗号',
    jCommaSpace: '逗号+空格',
    jSemicolon: '分号',
    jNone: '无',
    jCustom: '自定义',
    optPara: '保留段落分隔',
    optTrim: '合并前修剪每行',
    optRemoveEmpty: '删除空行',
    step1: '在输入区粘贴多行文本',
    step2: '选择行连接方式',
    step3: '点击「处理」去除换行符',
    step4: '复制单行结果',
    done: '✓ 删除了 {n} 个换行符',
  }
});

const { $, copyText, t } = GZ;
let joinMode = 'space';

function getSeparator() {
  switch(joinMode) {
    case 'space': return ' ';
    case 'comma': return ',';
    case 'comma-space': return ', ';
    case 'semicolon': return ';';
    case 'none': return '';
    case 'custom': return $('#custom-sep').value;
    default: return ' ';
  }
}

function process() {
  let text = $('#input').value;
  if (!text) return;
  const originalBreaks = (text.match(/[\r\n]+/g) || []).length;

  // Normalize line endings
  text = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n');

  if ($('#opt-remove-empty').checked) {
    text = text.split('\n').filter(l => l.trim() !== '').join('\n');
  }

  if ($('#opt-trim').checked) {
    text = text.split('\n').map(l => l.trim()).join('\n');
  }

  const sep = getSeparator();

  if ($('#opt-para').checked) {
    // Preserve paragraph breaks (double newlines), join single breaks
    const paras = text.split(/\n\s*\n/);
    text = paras.map(p => p.split('\n').filter(l => l.trim() !== '').join(sep)).join('\n\n');
  } else {
    text = text.split('\n').join(sep);
  }

  $('#output').textContent = text;
  $('#status').innerHTML = `<span style="color:var(--gz-success)">${t('done').replace('{n}', originalBreaks)}</span>`;
}

function loadExample() {
  $('#input').value = 'The quick brown fox\njumps over\nthe lazy dog.\n\nThis is a new paragraph\nwith multiple lines.';
  process();
}

function doClear() { $('#input').value = ''; $('#output').textContent = ''; $('#status').innerHTML = ''; }

$('#input').addEventListener('input', process);

const optHtml = `
  <div style="margin-bottom:8px;display:flex;gap:12px;flex-wrap:wrap;align-items:center">
    <label style="font-size:.85em;display:flex;align-items:center;gap:4px">${t('joinWith')}:
      <select class="gz-select" onchange="joinMode=this.value;process()">
        <option value="space">${t('jSpace')}</option>
        <option value="comma">${t('jComma')}</option>
        <option value="comma-space">${t('jCommaSpace')}</option>
        <option value="semicolon">${t('jSemicolon')}</option>
        <option value="none">${t('jNone')}</option>
        <option value="custom">${t('jCustom')}</option>
      </select>
    </label>
    <input type="text" id="custom-sep" class="gz-input" style="width:60px" placeholder="-" oninput="if(joinMode==='custom')process()">
    <label style="font-size:.85em;cursor:pointer"><input type="checkbox" id="opt-para" onchange="process()"> ${t('optPara')}</label>
    <label style="font-size:.85em;cursor:pointer"><input type="checkbox" id="opt-trim" checked onchange="process()"> ${t('optTrim')}</label>
    <label style="font-size:.85em;cursor:pointer"><input type="checkbox" id="opt-remove-empty" checked onchange="process()"> ${t('optRemoveEmpty')}</label>
  </div>`;

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="process()">${t('process')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

const optDiv = document.createElement('div');
optDiv.innerHTML = optHtml;
$('#toolbar').after(optDiv);

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🧹', href:'/text/remove-empty-lines.html', name:'Remove Empty Lines'},
    {icon:'⬜', href:'/text/remove-spaces.html', name:'Remove Spaces'},
    {icon:'➕', href:'/text/add-prefix-suffix.html', name:'Add Prefix/Suffix'},
    {icon:'↕️', href:'/text/sort-lines.html', name:'Sort Lines'},
  ]
});
</script>
