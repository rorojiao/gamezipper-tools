const {$,$$,t}=GZ;
const CATS={sem:'Semantic',text:'Text',form:'Forms',media:'Media',table:'Tables',list:'Lists',aria:'ARIA',meta:'Meta',svg:'SVG'};

function renderTabs(){
  const cats=[{v:'all',k:'all'},...Object.entries(CATS).map(([v,k])=>({v,k}))];
  $('#catTabs').innerHTML=cats.map(c=>`<span class="cat-tab${c.v==='all'?' active':''}" data-cat="${c.v}">${t(c.k)||c.k}</span>`).join('');
  $('#cat').innerHTML=cats.map(c=>`<option value="${c.v}">${t(c.k)||c.k}</option>`).join('');
  $('#catTabs').addEventListener('click',e=>{
    if(!e.target.classList.contains('cat-tab'))return;
    $$('#catTabs .cat-tab').forEach(t=>t.classList.remove('active'));
    e.target.classList.add('active');
    $('#cat').value=e.target.dataset.cat;
    render();
  });
  $('#cat').addEventListener('change',e=>{
    $$('#catTabs .cat-tab').forEach(t=>t.classList.toggle('active',t.dataset.cat===e.target.value));
    render();
  });
}

function filterTags(){
  const q=$('#search').value.toLowerCase().trim();
  const cat=$('#cat').value;
  return TAGS.filter(t=>{
    if(cat!=='all'&&t.cat!==cat)return false;
    if(!q)return true;
    return t.n.toLowerCase().includes(q) || t.d.toLowerCase().includes(q) || t.attrs.join(' ').toLowerCase().includes(q) || (CATS[t.cat]||'').toLowerCase().includes(q);
  });
}

function render(){
  const list=filterTags();
  $('#grid').innerHTML=list.map(t=>`
    <div class="tag-card" data-tag="${t.n}">
      <h3><span class="name">&lt;${t.n}&gt;</span> <span class="badge">${CATS[t.cat]||t.cat}</span></h3>
      <p>${t.d}</p>
      <div class="attrs">${t.attrs.length?t.attrs.slice(0,3).map(a=>'<code>'+a+'</code>').join(' ')+(t.attrs.length>3?' <span style="opacity:.6">+'+(t.attrs.length-3)+'</span>':''):''}</div>
    </div>`).join('') || '<div style="color:var(--text2)">No matches.</div>';
  $$('.tag-card').forEach(card=>card.addEventListener('click',()=>showDetail(card.dataset.tag)));
}

function showDetail(name){
  const tag=TAGS.find(t=>t.n===name);
  if(!tag)return;
  const d=$('#detail');
  d.classList.add('open');
  d.innerHTML=`
    <h2>&lt;${tag.n}&gt;</h2>
    <p>${tag.d}</p>
    <h4 style="margin:14px 0 6px">${t('exampleLabel')}</h4>
    <pre id="codeBlock">${escapeHtml(tag.ex)}</pre>
    <div style="display:flex;gap:8px;margin-top:8px">
      <button class="gz-btn" onclick="GZ.copyText(document.getElementById('codeBlock').textContent)">${t('copyCode')}</button>
      <button class="gz-btn gz-btn-secondary" onclick="$('#detail').classList.remove('open')">${t('closeDetail')}</button>
    </div>
    ${tag.attrs.length?`<h4 style="margin:14px 0 6px">Attributes</h4><dl class="attr-list">${tag.attrs.map(a=>`<dt>${a}</dt><dd>${attrDesc(a)}</dd>`).join('')}</dl>`:''}
    <h4 style="margin:14px 0 6px">Live preview</h4>
    <iframe sandbox srcdoc="${escapeAttr(tag.ex)}"></iframe>
  `;
  d.scrollIntoView({behavior:'smooth',block:'nearest'});
}

function escapeHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function escapeAttr(s){return s.replace(/"/g,'&quot;').replace(/&/g,'&amp;');}
function attrDesc(a){
  const map={href:'URL or fragment',target:'_self|_blank|_parent|_top|framename',rel:'Relationship (noopener, nofollow…)',
  src:'Resource URL',alt:'Alternative text (accessibility)',type:'MIME type',name:'Field name',value:'Field value',
  placeholder:'Hint text',required:'Required field',disabled:'Disable element',id:'Unique identifier',
  class:'CSS classes',style:'Inline CSS',title:'Advisory text',lang:'Language code',dir:'ltr|rtl|auto',
  width:'Width (px or %)',height:'Height (px or %)',loading:'eager|lazy',srcset:'Responsive image source set',
  sizes:'Sizes for responsive images',defer:'Defer script execution',async:'Async script',action:'Form submit URL',
  method:'get|post',enctype:'Form encoding type',autocomplete:'on|off',maxlength:'Max characters',
  pattern:'Regex for validation',min:'Min value/date',max:'Max value/date',step:'Increment step',rows:'Visible rows',
  cols:'Visible columns',wrap:'soft|hard',cite:'Source URL',datetime:'Machine-readable date',
  open:'Open by default',controls:'Show playback controls',autoplay:'Auto-play',loop:'Loop media',muted:'Muted',
  poster:'Video poster image',preload:'none|metadata|auto',sandbox:'Sandbox flags',srcdoc:'Inline HTML content',
  for:'Associated control id',form:'Associated form id',scope:'row|col|rowgroup|colgroup',colspan:'Span columns',
  rowspan:'Span rows',headers:'Related th ids',selected:'Selected by default',multiple:'Allow multiple',
  reversed:'Reverse order',start:'Start number',span:'Span count',kind:'subtitles|captions|descriptions|chapters|metadata',
  srclang:'Language code',label:'Visible label',default:'Default track',download:'Download as filename',
  integrity:'Subresource integrity hash',crossorigin:'anonymous|use-credentials',nonce:'CSP nonce',as:'Resource type',
  media:'Media query or media type',viewBox:'SVG viewBox',xmlns:'XML namespace',coords:'Shape coordinates',
  shape:'rect|circle|poly|default',hreflang:'Language of linked resource',rev:'Reverse relationship',
  abbr:'Abbreviation of header content'};
  return map[a]||'Element-specific attribute';
}
