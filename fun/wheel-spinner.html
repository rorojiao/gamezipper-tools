<script>
GZI18n.register({
  en: {
    toolTitle: 'Wheel Spinner — Random Name Picker',
    toolDesc: 'Enter a list of names or options, spin the wheel and let it pick a winner fairly. Great for raffles, classroom picks, giveaways and decisions. Free, no signup.',
    entries: 'Options (one per line)',
    spin: '🎯 SPIN',
    sort: 'Sort A→Z',
    shuffle: 'Shuffle',
    winner: 'Winner',
    spinAgain: 'Spin Again',
    empty: 'Add at least 2 options to spin.',
    step1: 'Type your options in the box, one per line',
    step2: 'Click SPIN to start the wheel animation',
    step3: 'The pointer lands on the winning option',
    step4: 'Click Spin Again to run another round',
  },
  zh: {
    toolTitle: '幸运转盘 / 随机点名器',
    toolDesc: '输入名单或选项，转动转盘即可公平抽取一个结果。适合抽奖、课堂点名、活动赠品和纠结决策。免费，无需注册。',
    entries: '选项（每行一个）',
    spin: '🎯 转动',
    sort: 'A→Z 排序',
    shuffle: '随机打乱',
    winner: '中选结果',
    spinAgain: '再来一次',
    empty: '至少输入 2 个选项才能转动。',
    step1: '在文本框中输入选项，每行一个',
    step2: '点击「转动」开始转盘动画',
    step3: '指针指向的扇形即为中选结果',
    step4: '点击「再来一次」可继续抽取',
  }
});
const { $, t } = GZ;
$('#lbl-entries').textContent = t('entries');
$('#spin-btn').textContent = t('spin');
$('#sort-btn').textContent = t('sort');
$('#shuffle-btn').textContent = t('shuffle');
const canvas = $('#wheel'), ctx = canvas.getContext('2d');
const COLORS = ['#ff6b6b','#4ecdc4','#ffe66d','#a8e6cf','#ff8b94','#c7ceea','#ffaac4','#95e1d3','#f8b500','#845ec2'];
let rotation = 0, spinning = false;
function getEntries() { return $('#entries').value.split('\n').map(s=>s.trim()).filter(Boolean); }
function draw() {
  const entries = getEntries();
  const n = Math.max(1, entries.length);
  const cx = canvas.width/2, cy = canvas.height/2, r = canvas.width/2 - 4;
  ctx.clearRect(0,0,canvas.width,canvas.height);
  if (n === 0) { ctx.fillStyle = '#444'; ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.fill(); return; }
  const arc = (Math.PI*2)/n;
  ctx.save(); ctx.translate(cx,cy); ctx.rotate(rotation);
  for (let i = 0; i < n; i++) {
    ctx.fillStyle = COLORS[i % COLORS.length];
    ctx.beginPath(); ctx.moveTo(0,0);
    ctx.arc(0,0,r, i*arc - Math.PI/2, (i+1)*arc - Math.PI/2);
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,.2)'; ctx.lineWidth = 1; ctx.stroke();
    // label
    ctx.save();
    ctx.rotate(i*arc + arc/2 - Math.PI/2);
    ctx.fillStyle = '#000'; ctx.font = 'bold ' + Math.max(11, Math.min(20, r/n*1.6)) + 'px sans-serif';
    ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
    const label = entries[i].length > 14 ? entries[i].slice(0,13)+'…' : entries[i];
    ctx.fillText(label, r - 12, 0);
    ctx.restore();
  }
  ctx.restore();
  // hub
  ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(cx,cy,28,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#333'; ctx.font = 'bold 14px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('🎯', cx, cy+1);
}
function spin() {
  if (spinning) return;
  const entries = getEntries();
  if (entries.length < 2) { alert(t('empty')); return; }
  spinning = true; $('#spin-btn').disabled = true; $('#result-card').style.display = 'none';
  const n = entries.length;
  const arc = (Math.PI*2)/n;
  const winnerIdx = Math.floor(Math.random() * n);
  // Want pointer (top, angle = -π/2 in normal coords / 0 in our rotated frame) to land mid of winner slice.
  // slice i mid angle (in our rotated frame, before rotation): i*arc + arc/2 - π/2.
  // final rotation R must satisfy (R + i*arc + arc/2 - π/2) ≡ -π/2 (mod 2π) so slice mid points up.
  // → R ≡ -i*arc - arc/2 (mod 2π)
  const targetBase = -winnerIdx*arc - arc/2;
  const spins = 6; // full rotations
  const target = targetBase + Math.PI*2*spins;
  const start = rotation % (Math.PI*2);
  const duration = 4500;
  const t0 = performance.now();
  function easeOut(t) { return 1 - Math.pow(1-t, 4); }
  function frame(now) {
    const p = Math.min(1, (now - t0)/duration);
    rotation = start + (target - start) * easeOut(p);
    draw();
    if (p < 1) requestAnimationFrame(frame);
    else {
      rotation = target; // lock to clean value
      spinning = false; $('#spin-btn').disabled = false;
      showWinner(entries[winnerIdx]);
    }
  }
  requestAnimationFrame(frame);
}
function showWinner(name) {
  $('#winner-name').textContent = name;
  $('#winner-label').textContent = t('winner');
  $('#result-card').style.display = 'block';
  // tick sound
  try {
    const ac = new (window.AudioContext||window.webkitAudioContext)();
    const o = ac.createOscillator(), g = ac.createGain();
    o.frequency.value = 880; o.type = 'sine'; g.gain.value = 0.1;
    o.connect(g); g.connect(ac.destination); o.start(); o.stop(ac.currentTime + 0.25);
  } catch(e){}
}
$('#spin-btn').addEventListener('click', spin);
$('#entries').addEventListener('input', draw);
$('#sort-btn').addEventListener('click', () => {
  $('#entries').value = getEntries().sort((a,b)=>a.localeCompare(b)).join('\n'); draw();
});
$('#shuffle-btn').addEventListener('click', () => {
  const a = getEntries();
  for (let i = a.length-1; i > 0; i--) { const j = Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  $('#entries').value = a.join('\n'); draw();
});
GZ.renderToolPage({
  category: 'fun',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🎲', href:'/fun/random-name-picker.html', name:'Random Picker'},
    {icon:'🪙', href:'/fun/coin-flip.html', name:'Coin Flip'},
    {icon:'🎯', href:'/fun/decision-wheel.html', name:'Decision Wheel'},
    {icon:'🎰', href:'/fun/random-number.html', name:'Random Number'},
  ]
});
draw();
</script>
