const { $, copyText, t } = GZ;
let outDelim = ',';

function flatten(obj, prefix) {
  prefix = prefix || '';
  const result = {};
  for (const [k, v] of Object.entries(obj)) {
    const key = prefix ? prefix + '.' + k : k;
    if (v && typeof v === 'object' && !Array.isArray(v)) {
      Object.assign(result, flatten(v, key));
    } else if (Array.isArray(v)) {
      result[key] = JSON.stringify(v);
    } else {
      result[key] = v;
    }
  }
  return result;
}

function escapeCSV(val, delim) {
  const s = String(val == null ? '' : val);
  if (s.includes(delim) || s.includes('"') || s.includes('\n')) {
    return '"' + s.replace(/"/g, '""') + '"';
  }
  return s;
}

// Simple YAML parser (handles common cases)
function parseYAML(text) {
  const lines = text.split('\n');
  let i = 0;

  function parseValue(val) {
    val = val.trim();
    if (val === 'null' || val === '~') return null;
    if (val === 'true') return true;
    if (val === 'false') return false;
    if (val === '' || val === '|' || val === '>') return '';
    if (/^-?\d+$/.test(val)) return parseInt(val, 10);
    if (/^-?\d+\.\d+$/.test(val)) return parseFloat(val);
    if ((val.startsWith('"') && val.endsWith('"')) || (val.startsWith("'") && val.endsWith("'"))) {
      return val.slice(1, -1);
    }
    if (val.startsWith('[') && val.endsWith(']')) {
      try { return JSON.parse(val); } catch(e) { return val; }
    }
    return val;
  }

  function getIndent(line) {
    const m = line.match(/^(\s*)/);
    return m ? m[1].length : 0;
  }

  function parseBlock(startIndent) {
    const obj = {};
    let lastKey = null;
    while (i < lines.length) {
      const line = lines[i];
      if (line.trim() === '' || line.trim().startsWith('#')) { i++; continue; }
      const ind = getIndent(line);
      if (ind < startIndent) break;
      const content = line.trim();
      if (content.startsWith('- ')) {
        // Array item
        if (!Array.isArray(obj)) return obj;
        continue;
      }
      const colonIdx = content.indexOf(':');
      if (colonIdx === -1) { i++; continue; }
      const key = content.substring(0, colonIdx).trim();
      const valStr = content.substring(colonIdx + 1).trim();
      if (valStr === '' || valStr === '|' || valStr === '>') {
        i++;
        // Check next line for nested object or array
        if (i < lines.length) {
          const nextInd = getIndent(lines[i]);
          if (nextInd > ind) {
            if (lines[i].trim().startsWith('- ')) {
              // Array
              const arr = [];
              while (i < lines.length && getIndent(lines[i]) >= nextInd) {
                const itemLine = lines[i].trim();
                if (itemLine.startsWith('- ')) {
                  const itemVal = itemLine.substring(2);
                  if (itemVal.includes(':')) {
                    i++;
                    const nested = parseBlock(getIndent(lines[i - 1]) + 2);
                    arr.push(nested);
                  } else {
                    arr.push(parseValue(itemVal));
                    i++;
                  }
                } else { break; }
              }
              obj[key] = arr;
              continue;
            } else {
              obj[key] = parseBlock(nextInd);
              continue;
            }
          }
        }
        obj[key] = '';
      } else {
        obj[key] = parseValue(valStr);
        i++;
      }
    }
    return obj;
  }

  i = 0;
  // Check if root is array
  while (i < lines.length && (lines[i].trim() === '' || lines[i].trim().startsWith('#'))) i++;
  if (i < lines.length && lines[i].trim().startsWith('- ')) {
    // Root is array
    const arr = [];
    const rootInd = getIndent(lines[i]);
    while (i < lines.length) {
      const line = lines[i];
      if (line.trim() === '' || line.trim().startsWith('#')) { i++; continue; }
      const ind = getIndent(line);
      if (ind < rootInd) break;
      if (line.trim().startsWith('- ')) {
        const itemVal = line.trim().substring(2);
        if (itemVal.includes(':')) {
          // Object item
          i++;
          const obj = parseBlock(ind + 2);
          // Merge the first key from the item line
          const colonIdx = itemVal.indexOf(':');
          const firstKey = itemVal.substring(0, colonIdx).trim();
          const firstVal = parseValue(itemVal.substring(colonIdx + 1).trim());
          if (Object.keys(obj).length > 0) {
            obj[firstKey] = firstVal;
            // Reorder keys
            const ordered = {};
            ordered[firstKey] = firstVal;
            Object.assign(ordered, obj);
            arr.push(ordered);
          } else {
            const o = {};
            o[firstKey] = firstVal;
            arr.push(o);
          }
        } else {
          arr.push(parseValue(itemVal));
          i++;
        }
      } else { break; }
    }
    return arr;
  }

  return parseBlock(0);
}

function convert() {
  const inp = $('#input').value.trim();
  if (!inp) { $('#output').value = ''; return; }
  try {
    const data = parseYAML(inp);
    let items = Array.isArray(data) ? data : [data];
    // Flatten all items
    const flat = items.map(item => flatten(item));
    // Collect all keys
    const keys = new Set();
    flat.forEach(obj => Object.keys(obj).forEach(k => keys.add(k)));
    const headers = [...keys];
    // Build CSV
    let csv = headers.map(h => escapeCSV(h, outDelim)).join(outDelim) + '\n';
    for (const row of flat) {
      csv += headers.map(h => escapeCSV(row[h], outDelim)).join(outDelim) + '\n';
    }
    $('#output').value = csv.trimEnd();
    $('#status').innerHTML = `<span style="color:var(--gz-success)">✓ ${items.length} rows converted with ${headers.length} columns</span>`;
  } catch (e) {
    $('#output').value = '';
    $('#status').innerHTML = `<span style="color:var(--gz-accent)">Error: ${e.message}</span>`;
  }
}

  convert();
}
