<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"What is CSS transform?","acceptedAnswer":{"@type":"Answer","text":"CSS transform lets you rotate, scale, translate (move), and skew HTML elements in 2D or 3D space without affecting the document flow."}},{"@type":"Question","name":"Can I combine multiple transforms?","acceptedAnswer":{"@type":"Answer","text":"Yes! This generator lets you combine rotate, scale, translate, and skew into a single transform property, applied in order."}},{"@type":"Question","name":"What is transform-origin?","acceptedAnswer":{"@type":"Answer","text":"Transform-origin sets the point around which transforms are applied. Default is center (50% 50%), but you can change it to top-left, bottom-right, or any custom position."}},{"@type":"Question","name":"Do CSS transforms affect layout?","acceptedAnswer":{"@type":"Answer","text":"No. CSS transforms are visual-only — they do not affect the element's position in the document flow or other elements around it."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="ctrl-grid">
      <div class="ctrl-group">
        <label>Rotate</label>
        <input type="range" id="t-rotate" min="-360" max="360" value="0">
        <span class="val-display" id="v-rotate">0deg</span>
      </div>
      <div class="ctrl-group">
        <label>Scale X</label>
        <input type="range" id="t-scaleX" min="20" max="300" value="100">
        <span class="val-display" id="v-scaleX">1</span>
      </div>
      <div class="ctrl-group">
        <label>Scale Y</label>
        <input type="range" id="t-scaleY" min="20" max="300" value="100">
        <span class="val-display" id="v-scaleY">1</span>
      </div>
      <div class="ctrl-group">
        <label>Translate X</label>
        <input type="range" id="t-translateX" min="-200" max="200" value="0">
        <span class="val-display" id="v-translateX">0px</span>
      </div>
      <div class="ctrl-group">
        <label>Translate Y</label>
        <input type="range" id="t-translateY" min="-200" max="200" value="0">
        <span class="val-display" id="v-translateY">0px</span>
      </div>
      <div class="ctrl-group">
        <label>Skew X</label>
        <input type="range" id="t-skewX" min="-90" max="90" value="0">
        <span class="val-display" id="v-skewX">0deg</span>
      </div>
      <div class="ctrl-group">
        <label>Skew Y</label>
        <input type="range" id="t-skewY" min="-90" max="90" value="0">
        <span class="val-display" id="v-skewY">0deg</span>
      </div>
      <div class="ctrl-group">
        <label id="lbl-origin"></label>
        <select id="t-origin" class="gz-select">
          <option value="50% 50%">center</option>
          <option value="0% 0%">top left</option>
          <option value="100% 0%">top right</option>
          <option value="0% 100%">bottom left</option>
          <option value="100% 100%">bottom right</option>
          <option value="50% 0%">top center</option>
          <option value="50% 100%">bottom center</option>
        </select>
      </div>
    </div>
    <div class="preview-box">
      <div class="preview-el" id="preview-el">Preview</div>
    </div>
    <div id="code-output"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'CSS Transform Generator',
    toolDesc: 'Generate CSS transform properties visually — rotate, scale, translate, skew with live preview.',
    origin: 'Transform Origin',
    step1: 'Adjust rotate, scale, translate and skew sliders',
    step2: 'Watch the live preview update in real-time',
    step3: 'Choose a transform origin point if needed',
    step4: 'Click Copy CSS to use in your project',
  },
  zh: {
    toolTitle: 'CSS Transform 生成器',
    toolDesc: '可视化生成 CSS transform 属性 — 旋转、缩放、平移、倾斜，实时预览效果。',
    origin: '变换原点',
    step1: '调整旋转、缩放、平移和倾斜滑块',
    step2: '实时预览变换效果',
    step3: '按需选择变换原点',
    step4: '点击「复制 CSS」应用到项目中',
  }
});

const { $, copyText, t } = GZ;

function update() {
  const rotate = $('#t-rotate').value;
  const scaleX = ($('#t-scaleX').value / 100).toFixed(2);
  const scaleY = ($('#t-scaleY').value / 100).toFixed(2);
  const tx = $('#t-translateX').value;
  const ty = $('#t-translateY').value;
  const skewX = $('#t-skewX').value;
  const skewY = $('#t-skewY').value;
  const origin = $('#t-origin').value;

  $('#v-rotate').textContent = rotate + 'deg';
  $('#v-scaleX').textContent = scaleX;
  $('#v-scaleY').textContent = scaleY;
  $('#v-translateX').textContent = tx + 'px';
  $('#v-translateY').textContent = ty + 'px';
  $('#v-skewX').textContent = skewX + 'deg';
  $('#v-skewY').textContent = skewY + 'deg';

  const transform = `rotate(${rotate}deg) scale(${scaleX}, ${scaleY}) translate(${tx}px, ${ty}px) skew(${skewX}deg, ${skewY}deg)`;

  const el = $('#preview-el');
  el.style.transform = transform;
  el.style.transformOrigin = origin;

  let css = `.element {\n  transform: ${transform};\n  transform-origin: ${origin};\n}`;
  $('#code-output').textContent = css;
}

['t-rotate','t-scaleX','t-scaleY','t-translateX','t-translateY','t-skewX','t-skewY','t-origin'].forEach(id => {
  $(('#'+id)).addEventListener('input', update);
});

$('#lbl-origin').textContent = t('origin');

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="copyText($('#code-output').textContent)">${t('copy')} CSS</button>
  <button class="gz-btn gz-btn-secondary" onclick="resetAll()">${t('clear')}</button>`;

function resetAll() {
  $('#t-rotate').value = 0;
  $('#t-scaleX').value = 100;
  $('#t-scaleY').value = 100;
  $('#t-translateX').value = 0;
  $('#t-translateY').value = 0;
  $('#t-skewX').value = 0;
  $('#t-skewY').value = 0;
  $('#t-origin').value = '50% 50%';
  update();
}

update();

GZ.renderToolPage({
  category: 'css',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🔘', href:'/css-tools/border-radius.html', name:'Border Radius'},
    {icon:'🔲', href:'/css-tools/shadow.html', name:'Box Shadow'},
    {icon:'🎬', href:'/css-tools/animation.html', name:'CSS Animation'},
    {icon:'🌈', href:'/css-tools/gradient.html', name:'CSS Gradient'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
