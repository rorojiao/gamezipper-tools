<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="gz-field">
      <label id="lbl-word"></label>
      <input type="text" id="word" value="QUIXOTIC" maxlength="15" oninput="calc()">

    <div>
      <label id="lbl-word-mult" style="font-size:.9rem;color:var(--text2);display:block;margin-bottom:6px"></label>
      <div class="gz-multipliers" id="word-mults">
        <button class="gz-mult-btn active" data-mult="1" onclick="setWordMult(1,this)">×1</button>
        <button class="gz-mult-btn" data-mult="2" onclick="setWordMult(2,this)">×2 (DL/DW)</button>
        <button class="gz-mult-btn" data-mult="3" onclick="setWordMult(3,this)">×3 (TL/TW)</button>
        <button class="gz-mult-btn" data-mult="4" onclick="setWordMult(4,this)">×4 (DW+DW)</button>
        <button class="gz-mult-btn" data-mult="6" onclick="setWordMult(6,this)">×6 (TW+DW)</button>
        <button class="gz-mult-btn" data-mult="9" onclick="setWordMult(9,this)">×9 (TW+TW)</button>
      </div>
    </div>
    <div class="gz-result" id="result"></div>
    <div id="letter-values"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Scrabble Word Score Calculator',
    toolDesc: 'Calculate the Scrabble point value of any word instantly. Apply double/triple letter and word multipliers, mark blank tiles, and see a letter-by-letter breakdown. Free, browser-only.',
    word: 'Enter your Scrabble word',
    wordMult: 'Word Multiplier (bonus squares covered)',
    score: 'Total Score',
    baseScore: 'Base (before multipliers)',
    letterMult: 'Letter multipliers (click tiles to cycle ×1 → ×2 → ×3 → blank)',
    points: 'points',
    step1: 'Type your Scrabble word (A-Z, up to 15 letters)',
    step2: 'Click letter tiles to set per-letter multipliers or mark blanks',
    step3: 'Pick the word multiplier for double/triple word bonus squares',
    step4: 'Read the total score and per-letter breakdown instantly',
  },
  zh: {
    toolTitle: 'Scrabble 单词得分计算器',
    toolDesc: '即时计算任意单词的 Scrabble 得分。应用双倍/三倍字母和单词倍率，标记空白牌，查看逐字母明细。免费、浏览器本地运行。',
    word: '输入你的 Scrabble 单词',
    wordMult: '单词倍率（覆盖的奖励格）',
    score: '总分',
    baseScore: '基础分（倍率前）',
    letterMult: '字母倍率（点击字母循环 ×1 → ×2 → ×3 → 空白）',
    points: '分',
    step1: '输入 Scrabble 单词（A-Z，最多 15 字母）',
    step2: '点击字母牌设置每字母倍率或标记空白牌',
    step3: '选择双倍/三倍单词奖励格的单词倍率',
    step4: '即时查看总分和逐字母明细',
  }
});

const { $, t } = GZ;

$('#lbl-word').textContent = t('word');
$('#lbl-word-mult').textContent = t('wordMult');

const VALUES = {A:1,B:3,C:3,D:2,E:1,F:4,G:2,H:4,I:1,J:8,K:5,L:1,M:3,N:1,O:1,P:3,Q:10,R:1,S:1,T:1,U:1,V:4,W:4,X:8,Y:4,Z:10};
let letterMults = {}; // per letter index: 1, 2, 3, or 0 (blank)
let wordMult = 1;

function calc() {
  const word = $('#word').value.toUpperCase().replace(/[^A-Z]/g, '');
  if (!word) {
    $('#result').innerHTML = '';
    $('#letter-multipliers').innerHTML = '';
    $('#letter-values').innerHTML = '';
    return;
  }
  // Initialize letter mults for new letters
  word.split('').forEach((_, i) => { if (!(i in letterMults)) letterMults[i] = 1; });
  // Trim extras
  Object.keys(letterMults).forEach(k => { if (parseInt(k) >= word.length) delete letterMults[k]; });

  renderLetterMults(word);
  let base = 0, total = 0;
  word.split('').forEach((ch, i) => {
    const mult = letterMults[i] || 1;
    const val = mult === 0 ? 0 : (VALUES[ch] || 0) * mult;
    base += VALUES[ch] || 0;
    total += val;
  });
  total = total * wordMult;

  $('#result').innerHTML = `
    <div class="score">${total} ${t('points')}</div>
    <div style="font-size:.85rem;color:var(--text2);margin-top:6px">${t('baseScore')}: ${base}${wordMult>1?' × '+wordMult:''}</div>`;

  // Letter value reference table
  $('#letter-values').innerHTML = '<table class="gz-table"><tr><td><b>A</b> 1</td><td><b>B</b> 3</td><td><b>C</b> 3</td><td><b>D</b> 2</td><td><b>E</b> 1</td></tr><tr><td><b>F</b> 4</td><td><b>G</b> 2</td><td><b>H</b> 4</td><td><b>I</b> 1</td><td><b>J</b> 8</td></tr><tr><td><b>K</b> 5</td><td><b>L</b> 1</td><td><b>M</b> 3</td><td><b>N</b> 1</td><td><b>O</b> 1</td></tr><tr><td><b>P</b> 3</td><td><b>Q</b> 10</td><td><b>R</b> 1</td><td><b>S</b> 1</td><td><b>T</b> 1</td></tr><tr><td><b>U</b> 1</td><td><b>V</b> 4</td><td><b>W</b> 4</td><td><b>X</b> 8</td><td><b>Y</b> 4</td></tr><tr><td><b>Z</b> 10</td><td colspan="4"><b>Blank</b> 0</td></tr></table>';
}

function renderLetterMults(word) {
  let html = '<label style="font-size:.9rem;color:var(--text2);display:block;margin-bottom:6px">' + t('letterMult') + '</label><div class="letter-row">';
  word.split('').forEach((ch, i) => {
    const mult = letterMults[i] || 1;
    const isBlank = mult === 0;
    const val = isBlank ? 0 : VALUES[ch];
    const cls = isBlank ? 'letter-tile blank' : 'letter-tile';
    const multLabel = isBlank ? 'BLANK' : (mult > 1 ? '×' + mult : '');
    html += `<div class="${cls}" onclick="cycleLetterMult(${i})" style="cursor:pointer"><div class="l">${isBlank?'＿':ch}</div><div class="v">${val}${multLabel?' '+multLabel:''}</div></div>`;
  });
  html += '</div>';
  $('#letter-multipliers').innerHTML = html;
}

function cycleLetterMult(i) {
  const cur = letterMults[i] || 1;
  letterMults[i] = cur === 1 ? 2 : cur === 2 ? 3 : cur === 3 ? 0 : 1;
  calc();
}

function setWordMult(m, btn) {
  wordMult = m;
  document.querySelectorAll('#word-mults .gz-mult-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  calc();
}

$('#toolbar').innerHTML = `<button class="gz-btn gz-btn-secondary" onclick="letterMults={};wordMult=1;calc()">Reset</button>`;

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🔤', href:'/text/word-unscrambler.html', name:'Word Unscrambler'},
    {icon:'🟩', href:'/text/wordle-helper.html', name:'Wordle Helper'},
    {icon:'📝', href:'/text/word-counter.html', name:'Word Counter'},
    {icon:'🔤', href:'/text/letter-counter.html', name:'Letter Counter'},
  ]
});

calc();
</script>
<script src="/tools-result-rec.js?v=20260707v520" defer></script>
</body>
