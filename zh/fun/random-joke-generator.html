const CATEGORIES = ['all', 'dad', 'pun', 'knock', 'one', 'programming', 'classic'];
const CAT_LABEL = { all: 'All Jokes', dad: 'Dad Jokes', pun: 'Puns', knock: 'Knock-Knock', one: 'One-Liners', programming: 'Programming', classic: 'Classic' };

let currentCat = 'all';
let lastJoke = null;

function rand(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function filterByCat(cat) {
  currentCat = cat;
  document.querySelectorAll('.cat-filters button').forEach(b => b.classList.toggle('active', b.dataset.cat === cat));
  generate();
}

function renderJoke(j) {
  if (j.knock) {
    return `<div class="knock"><span class="who">${j.knock.who}</span><br><span class="who">${j.knock.who2}</span><br><span class="who">${j.knock.punch}</span><br><span class="who">${j.knock.punch2}</span><br><span class="punch">${j.knock.punch3}</span></div>`;
  }
  return `${j.setup}${j.punch ? `<span class="joke-punch">${j.punch}</span>` : ''}`;
}

function generate() {
  const pool = currentCat === 'all' ? JOKES : JOKES.filter(j => j.cat === currentCat);
  if (!pool.length) return;
  let next;
  do {
    next = rand(pool);
  } while (pool.length > 1 && next === lastJoke);
  lastJoke = next;
  $('#jokeText').innerHTML = renderJoke(next);
  $('#jokeCard').querySelector('.joke-emoji').textContent = CAT_EMOJI[next.cat] || '😂';
  addToHistory(next);
}

function addToHistory(j) {
  const hist = $('#history');
  const item = document.createElement('div');
  item.className = 'history-item';
  const txt = j.knock ? `${j.knock.who} ${j.knock.who2} ${j.knock.punch} ${j.knock.punch2} ${j.knock.punch3}` : `${j.setup} ${j.punch}`;
  item.innerHTML = `<div class="h-cat">${CAT_LABEL[j.cat]}</div><div>${txt}</div>`;
  hist.insertBefore(item, hist.firstChild);
  while (hist.children.length > 6) hist.removeChild(hist.lastChild);
}

function copyJoke() {
  const j = lastJoke;
  if (!j) return;
  const txt = j.knock ? `${j.knock.who}\n${j.knock.who2}\n${j.knock.punch}\n${j.knock.punch2}\n${j.knock.punch3}` : `${j.setup}${j.punch ? '\n— ' + j.punch : ''}`;
  copyText(txt);
}

function getJokeText() {
  const j = lastJoke;
  if (!j) return '';
  return j.knock ? `${j.knock.who} ${j.knock.who2} ${j.knock.punch} ${j.knock.punch2} ${j.knock.punch3}` : `${j.setup} ${j.punch}`;
}

$('#catFilters').innerHTML = CATEGORIES.map(c => `<button class="gz-btn gz-btn-secondary ${c === 'all' ? 'active' : ''}" data-cat="${c}" onclick="filterByCat('${c}')">${CAT_LABEL[c]}</button>`).join('');
