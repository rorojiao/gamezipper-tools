<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is a p-value?", "acceptedAnswer": {"@type": "Answer", "text": "A p-value is the probability of obtaining test results at least as extreme as the observed results, assuming the null hypothesis is correct. A small p-value (typically ≤ 0.05) indicates strong evidence against the null hypothesis."}}, {"@type": "Question", "name": "How do I calculate a p-value from a Z score?", "acceptedAnswer": {"@type": "Answer", "text": "For a two-tailed test, the p-value equals 2 × (1 - Φ(|Z|)) where Φ is the standard normal CDF. For a one-tailed test, it is 1 - Φ(Z) for right-tailed or Φ(Z) for left-tailed. Enter your Z score and select the tail type."}}, {"@type": "Question", "name": "What p-value threshold should I use?", "acceptedAnswer": {"@type": "Answer", "text": "The most common significance level (alpha) is 0.05. If p ≤ 0.05, the result is considered statistically significant. Other common thresholds are 0.01 (highly significant) and 0.10."}}, {"@type": "Question", "name": "Is this p-value calculator free and private?", "acceptedAnswer": {"@type": "Answer", "text": "Yes, this tool is completely free and runs entirely in your browser. No data is sent to any server — your calculations are 100% private."}}]}</script>

<script>
GZI18n.register({
  en: {
    toolTitle: 'P-Value Calculator',
    toolDesc: 'Calculate p-values from Z scores for one-tailed and two-tailed hypothesis tests. Free, instant, and private.',
    zLabel: 'Z Score',

    alphaLabel: 'Significance Level (α)',
    calcBtn: 'Calculate P-Value',

    notSignificant: '✗ Not Statistically Significant',
    interpretation: 'Interpretation',
    interpText: (p, a) => `Since p = ${p.toFixed(4)} ${p <= a ? '≤' : '>'} α = ${a}, you ${p <= a ? 'reject' : 'fail to reject'} the null hypothesis.`,
    step1: 'Enter your Z score from your statistical test',
    step2: 'Select the test type (one-tailed or two-tailed)',
    step3: 'Choose your significance level (α)',
    step4: 'Click Calculate to get the p-value and interpretation',
  },
  zh: {
    toolTitle: 'P 值计算器',
    toolDesc: '从 Z 分数计算单尾和双尾假设检验的 p 值。免费、即时、隐私。',
    zLabel: 'Z 分数',
    tailLabel: '检验类型',
    alphaLabel: '显著性水平 (α)',
    calcBtn: '计算 P 值',
    pValue: 'P 值',
    significant: '✓ 统计显著',
    notSignificant: '✗ 不显著',
    interpretation: '解释',
    interpText: (p, a) => `因为 p = ${p.toFixed(4)} ${p <= a ? '≤' : '>'} α = ${a}，你${p <= a ? '拒绝' : '未能拒绝'}原假设。`,
    step1: '输入统计检验的 Z 分数',
    step2: '选择检验类型（单尾或双尾）',
    step3: '选择显著性水平 (α)',
    step4: '点击计算获取 p 值和解释',
  }
});

const { $, t } = GZ;

// Standard normal CDF using error function approximation
function normalCDF(z) {
  // Abramowitz and Stegun approximation
  const sign = z < 0 ? -1 : 1;
  z = Math.abs(z) / Math.sqrt(2);
  const t = 1 / (1 + 0.3275911 * z);
  const y = 1 - ((((1.061405429 * t - 1.453152027) * t) + 1.421413741) * t - 0.284496736) * t * (0.254829592 * t) * Math.exp(-z * z);
  return 0.5 * (1 + sign * y);
}

function calculatePValue() {
  const z = parseFloat($('#zScore').value);
  if (isNaN(z)) { $('#result').innerHTML = ''; return; }
  const tail = $('#tailType').value;
  const alpha = parseFloat($('#alphaLevel').value);
  let p;
  if (tail === 'two') p = 2 * (1 - normalCDF(Math.abs(z)));
  else if (tail === 'left') p = normalCDF(z);
  else p = 1 - normalCDF(z);
  p = Math.max(0, Math.min(1, p));
  const isSig = p <= alpha;
  const sigClass = isSig ? 'significant' : 'not-significant';
  const sigText = isSig ? t('significant') : t('notSignificant');
  $('#result').innerHTML = `
    <div class="result-box">
      <div class="label">${t('pValue')}</div>
      <div class="pval">${p < 0.0001 ? '< 0.0001' : p.toFixed(4)}</div>
      <div class="${sigClass}" style="font-size:1.1em;font-weight:600">${sigText}</div>
      <div style="margin-top:12px;font-size:0.9em;opacity:0.8">
        <strong>${t('interpretation')}:</strong> ${t('interpText')(p, alpha)}
      </div>
    </div>`;
}

$('#calcBtn').textContent = t('calcBtn');
$('#calcBtn').addEventListener('click', calculatePValue);
$('#zScore').addEventListener('input', calculatePValue);
$('#tailType').addEventListener('change', calculatePValue);
$('#alphaLevel').addEventListener('change', calculatePValue);

$('#lbl-z').textContent = t('zLabel');
$('#lbl-tail').textContent = t('tailLabel');
$('#lbl-alpha').textContent = t('alphaLabel');

  ]
});
