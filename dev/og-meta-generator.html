<script>
GZI18n.register({
  en: {
    toolTitle: 'Open Graph Meta Tag Generator',
    toolDesc: 'Generate Open Graph (OG) meta tags for Facebook, LinkedIn and social sharing. Live preview, copy and paste.',
    pageTitle: 'Page Title',
    type: 'Type',
    url: 'URL',
    desc: 'Description',
    image: 'Image URL',
    siteName: 'Site Name',
    locale: 'Locale',
    preview: 'Live Social Preview',
    output: 'Generated OG Tags (copy into <head>)',
    step1: 'Fill in your page title, description, URL and image',
    step2: 'Watch the live Facebook-style preview update as you type',
    step3: 'Copy the generated <meta> tags into your <head>',
    step4: 'Validate with Facebook Sharing Debugger after deploy',
  },
  zh: {
    toolTitle: 'Open Graph 元标签生成器',
    toolDesc: '为 Facebook、LinkedIn 和社交分享生成 Open Graph (OG) 元标签。实时预览、复制粘贴。',
    pageTitle: '页面标题',
    type: '类型',
    url: '网址',
    desc: '描述',
    image: '图片网址',
    siteName: '站点名称',
    locale: '语言',
    preview: '实时社交预览',
    output: '生成的 OG 标签（粘贴到 <head>）',
    step1: '填写页面标题、描述、网址和图片',
    step2: '实时 Facebook 风格预览会随输入自动更新',
    step3: '将生成的 <meta> 标签复制到 <head>',
    step4: '部署后用 Facebook 分享调试器验证',
  }
});

const { t, $, copyText } = GZ;

function esc(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function updatePreview() {
  const title = $('#og-title').value || 'Page Title';
  const desc = $('#og-desc').value || 'Description preview...';
  const url = $('#og-url').value || '';
  const image = $('#og-image').value || '';
  try {
    const host = url ? new URL(url).hostname.replace(/^www\./,'') : 'example.com';
    $('#pv-domain').textContent = host;
  } catch(e) { $('#pv-domain').textContent = 'example.com'; }
  $('#pv-title').textContent = title;
  $('#pv-desc').textContent = desc;
  const img = $('#pv-image');
  if (image) { img.src = image; img.style.display = 'block'; }
  else { img.style.display = 'none'; }
}

function build() {
  const title = $('#og-title').value.trim();
  const type = $('#og-type').value;
  const url = $('#og-url').value.trim();
  const desc = $('#og-desc').value.trim();
  const image = $('#og-image').value.trim();
  const site = $('#og-site').value.trim();
  const locale = $('#og-locale').value;
  if (!title || !url) { $('#ogoutput').value = ''; return; }
  const lines = [];
  lines.push(`<meta property="og:title" content="${esc(title)}">`);
  lines.push(`<meta property="og:type" content="${esc(type)}">`);
  lines.push(`<meta property="og:url" content="${esc(url)}">`);
  if (desc) lines.push(`<meta property="og:description" content="${esc(desc)}">`);
  if (image) lines.push(`<meta property="og:image" content="${esc(image)}">`);
  if (site) lines.push(`<meta property="og:site_name" content="${esc(site)}">`);
  if (locale) lines.push(`<meta property="og:locale" content="${esc(locale)}">`);
  $('#ogoutput').value = lines.join('\n');
}

['#og-title','#og-type','#og-url','#og-desc','#og-image','#og-site','#og-locale'].forEach(s => {
  const el = $(s);
  if (!el) return;
  const ev = el.tagName === 'SELECT' ? 'change' : 'input';
  el.addEventListener(ev, () => { updatePreview(); build(); });
});

$('#lbl-title').textContent = t('pageTitle');
$('#lbl-type').textContent = t('type');
$('#lbl-url').textContent = t('url');
$('#lbl-desc').textContent = t('desc');
$('#lbl-image').textContent = t('image');
$('#lbl-site').textContent = t('siteName');
$('#lbl-locale').textContent = t('locale');
$('#lbl-preview').textContent = t('preview');
$('#lbl-out').textContent = t('output');

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="copyText($('#ogoutput').value)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#og-title').value='';$('#og-desc').value='';$('#og-url').value='';$('#og-image').value='';$('#og-site').value='';updatePreview();build();">${t('clear')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#og-title').value='The Ultimate Guide to SEO in 2026';$('#og-type').value='article';$('#og-url').value='https://example.com/blog/seo-guide-2026';$('#og-desc').value='Learn the latest SEO strategies that actually work in 2026 — from Core Web Vitals to AI-driven content optimization.';$('#og-image').value='https://placehold.co/1200x630/4ecdc4/ffffff?text=SEO+Guide+2026';$('#og-site').value='My Blog';updatePreview();build();">${t('example')}</button>`;

GZ.renderToolPage({
  category: 'dev',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [

    {icon:'🤖', href:'/dev/robots-meta-generator.html', name: 'Robots Meta Generator'},

    {icon:'📄', href:'/seo/open-graph-preview.html', name: 'OG Preview'},
  ]
});
</script>
