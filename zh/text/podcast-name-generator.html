<div class="gz-container">
  <div class="gz-tool-header">

      <div>

          <option value="all">All Formats</option>

<script>
GZI18n.register({
  en: {
    toolTitle: 'Podcast Name Generator',
    toolDesc: 'Generate 25+ creative, memorable podcast name ideas for any topic. Choose a format (interview, narrative, educational) and tone — perfect for new shows on Apple Podcasts, Spotify and YouTube.',
    lblTopic: 'Topic or niche (optional)',
    phTopic: 'e.g. startup, parenting, crypto, design',
    lblFormat: 'Format',
    lblTone: 'Tone',
    btnGen: 'Generate Names',
    btnExample: 'Load Example',
    tip: 'Tip: the best podcast names are 2-5 words, easy to spell and tell listeners what the show is about. Always check Apple Podcasts + Spotify before launching.',
    step1: 'Enter an optional topic keyword (e.g. startup, parenting)',
    step2: 'Pick a format and tone',
    step3: 'Click Generate for 25+ podcast name ideas',
    step4: 'Click a card to copy the name you like',
  },
  zh: {
    toolTitle: '播客名称生成器',
    toolDesc: '为任何主题生成 25+ 创意、易记的播客名称。选择形式（访谈、叙事、教育）和语气 — 适合在 Apple Podcasts、Spotify 和 YouTube 上线的新节目。',
    lblTopic: '主题或领域（可选）',
    phTopic: '例如：创业、育儿、加密货币、设计',
    lblFormat: '形式',
    lblTone: '语气',
    btnGen: '生成名称',
    btnExample: '加载示例',
    tip: '提示：好播客名通常 2-5 字、易拼写、让听众一眼看出节目主题。上线前请检查 Apple Podcasts 和 Spotify。',
    step1: '输入可选主题关键词（例如：创业、育儿）',
    step2: '选择形式和语气',
    step3: '点击「生成」获得 25+ 名称创意',
    step4: '点击卡片复制你喜欢的名称',
  }
});

const { $, copyText, t, showToast } = GZ;

// Topic-aware word banks
const TOPIC_DEFAULTS = ['Startup','Tech','Mind','Life','Future','Code','Money','Health','Story','Design','Music','Film','Food','Travel','Game','Code','AI','Science','Art'];

const FORMATS = {
  interview: [
    '{Topic} Unplugged',
    'Inside {Topic}',
    'The {Topic} Interview',
    '{Topic} Talks',
    'Voices of {Topic}',
    'Beyond {Topic}',
    'Real {Topic} Stories',
    'Off the Record: {Topic}',
  ],
  narrative: [
    'The {Topic} Chronicles',
    '{Topic} Tales',
    'Untold {Topic}',
    'The {Topic} Files',
    '{Topic}: The Series',
    'Echoes of {Topic}',
    'True {Topic}',
  ],
  educational: [
    '{Topic} 101',
    'The {Topic} Guide',
    'Learning {Topic}',
    '{Topic} Mastery',
    '{Topic} Decoded',
    '{Topic} School',
    'The {Topic} Lab',
  ],
  conversational: [
    '{Topic} & Coffee',
    '{Topic} Over Drinks',
    'Two {Topic} Nerds',
    'The {Topic} Couch',
    '{Topic} Banter',
    '{Topic} Hour',
    'Late Night {Topic}',
  ],
  news: [
    'The {Topic} Daily',
    '{Topic} This Week',
    '{Topic} Brief',
    'Today in {Topic}',
    '{Topic} Now',
    'The {Topic} Minute',
    '{Topic} Pulse',
  ],
};

const TONE_FLAVORS = {
  friendly: ['Friends of {Topic}','The {Topic} Club','Hello {Topic}','Hangin\u2019 with {Topic}','{Topic} Hangout','Chill {Topic}','The {Topic} Lounge'],
  bold: ['{Topic} Unleashed','Raw {Topic}','The {Topic} Truth','No Filter {Topic}','{Topic} Reloaded','{Topic} Hardcore','{Topic} Strike'],
  curious: ['The {Topic} Question','Why {Topic}?','Curious About {Topic}','{Topic} Mysteries','{Topic} Whispers','The {Topic} Puzzle','What If {Topic}?'],
  expert: ['The {Topic} Edge','{Topic} Insider','{Topic} Pro','Mastering {Topic}','The {Topic} Briefing','{Topic} Authority','Inside {Topic}'],
  fun: ['{Topic} Gone Wild','{Topic} Fails','Funny {Topic}','{Topic} LOL','Crazy {Topic}','{Topic} Gone Wrong','{Topic} Bloopers'],
};

const GENERIC_TEMPLATES = [
  'The {Topic} Show',
  '{Topic} Time',
  'Talk {Topic}',
  '{Topic} Lab',
  '{Topic} Diaries',
  'This Is {Topic}',
  '{Topic} Confidential',
  'The {Topic} Project',
  '{Topic} Sessions',
  'Meet {Topic}',
  '{Topic} Radio',
  '{Topic} Drift',
];

function pick(a){return a[Math.floor(Math.random()*a.length)];}
function cap(s){return s.charAt(0).toUpperCase()+s.slice(1);}
function shuffle(a){return a.slice().sort(()=>Math.random()-0.5);}

function run(){
  let kw = $('#topic').value.trim();
  const topic = kw ? cap(kw) : pick(TOPIC_DEFAULTS);
  const formatKey = $('#format').value;
  const toneKey = $('#tone').value;
  const results = [];
  const formats = formatKey === 'all' ? Object.keys(FORMATS) : [formatKey];

  formats.forEach(fk => {
    const arr = shuffle(FORMATS[fk]);
    arr.slice(0, 3).forEach(tpl => results.push({name: tpl.replace(/\{Topic\}/g, topic), meta: fk, icon: iconForFormat(fk)}));
  });
  // tone flavor (3)
  const toneArr = shuffle(TONE_FLAVORS[toneKey]);
  toneArr.slice(0, 3).forEach(tpl => results.push({name: tpl.replace(/\{Topic\}/g, topic), meta: toneKey, icon: iconForTone(toneKey)}));
  // generic (5)
  shuffle(GENERIC_TEMPLATES).slice(0, 5).forEach(tpl => results.push({name: tpl.replace(/\{Topic\}/g, topic), meta: 'show', icon: '🎙️'}));
  // short ones
  const SHORT = [`${topic}cast`,`The ${topic} Cast`,`${topic} Talks`,`${topic} Lab`,`${topic} Hour`,`${topic} Bytes`];
  shuffle(SHORT).slice(0, 3).forEach(n => results.push({name: n, meta: 'short', icon: '⚡'}));

  // Dedupe
  const seen = new Set(); const out = [];
  for (const r of results){
    const k = r.name.toLowerCase();
    if (seen.has(k)) continue;
    seen.add(k); out.push(r);
  }
  // shuffle
  for (let i=out.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[out[i],out[j]]=[out[j],out[i]];}
  window._list = out;
  $('#results').innerHTML = out.map((r,i)=>`
    <div class="pn-card" onclick="copyAt(${i})">
      <span class="icon">${r.icon}</span>
      <div class="body">
        <div class="title">${esc(r.name)}</div>
        <div class="meta">${r.meta}</div>
      </div>
      <button class="copy" id="bcopy${i}" onclick="event.stopPropagation();copyAt(${i})">${GZ.t('copy')}</button>
    </div>`).join('');
  $('#count').textContent = GZI18n.getLang()==='zh' ? `已生成 ${out.length} 个名称` : `${out.length} names generated`;
}
function copyAt(i){copyText(window._list[i].name);}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function iconForFormat(f){return {interview:'🎤',narrative:'📖',educational:'🎓',conversational:'☕',news:'📰'}[f]||'🎙️';}
function iconForTone(f){return {friendly:'😊',bold:'🔥',curious:'🤔',expert:'🎯',fun:'🎉'}[f]||'✨';}

$('#btn-gen').textContent=t('btnGen');$('#btn-gen').addEventListener('click',run);
$('#btn-example').textContent=t('btnExample');
$('#btn-example').addEventListener('click',()=>{$('#topic').value='startup';$('#format').value='all';$('#tone').value='friendly';run();});
$('#topic').placeholder=t('phTopic');
$('#lbl-topic').textContent=t('lblTopic');
$('#lbl-format').textContent=t('lblFormat');
$('#lbl-tone').textContent=t('lblTone');
$('#tip').textContent=t('tip');
$('#topic').addEventListener('keydown',e=>{if(e.key==='Enter')run();});

GZ.renderToolPage({
  category:'text',
  titleKey:'toolTitle',
  descKey:'toolDesc',
  howToSteps:['step1','step2','step3','step4'],
  related:[
    {icon:'📺',href:'/text/youtube-title-checker.html',name:'YouTube Title'},
    {icon:'💼',href:'/text/business-name-generator.html',name:'Business Name'},
    {icon:'📱',href:'/text/app-name-generator.html',name:'App Name'},
    {icon:'🎯',href:'/text/blog-title-generator.html',name:'Blog Title'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
