let sortCol = 'port';
let sortDir = 1;
let filtered = [...PORTS];

function getCategory(port) {
  if (port <= 1023) return 'well';
  if (port <= 49151) return 'reg';
  return 'dyn';
}

function catLabel(cat) {
  return cat === 'well' ? t('wellKnown') : cat === 'reg' ? t('registered') : t('dynamic');
}

GZI18n.register({
  en: { wellKnown: 'Well-Known', registered: 'Registered', dynamic: 'Dynamic', results: 'results' },
  zh: { wellKnown: '知名', registered: '注册', dynamic: '动态', results: '条结果' }
});

function protoBadge(proto) {
  const cls = proto === 'both' ? 'badge-both' : proto === 'tcp' ? 'badge-tcp' : 'badge-udp';
  return `<span class="port-badge ${cls}">${proto.toUpperCase()}</span>`;
}

function render() {
  const body = $('#portBody');
  if (!filtered.length) {
    body.innerHTML = `<tr><td colspan="4" class="no-results">${t('noResults') || 'No matching ports found.'}</td></tr>`;
    $('#port-count').textContent = '0 ' + t('results');
    return;
  }
  body.innerHTML = filtered.map(p => {
    const cat = getCategory(p[0]);
    return `<tr>
      <td><span class="port-num">${p[0]}</span><span class="port-cat cat-${cat}">${catLabel(cat)}</span></td>
      <td>${protoBadge(p[1])}</td>
      <td style="font-weight:600">${p[2]}</td>
      <td style="color:var(--text2)">${p[3]}</td>
    </tr>`;
  }).join('');
  $('#port-count').textContent = `${filtered.length} ${t('results')}`;
}

function doSearch() {
  const q = $('#search').value.trim().toLowerCase();
  if (!q) { filtered = [...PORTS]; render(); return; }
  filtered = PORTS.filter(p =>
    String(p[0]).includes(q) ||
    p[1].toLowerCase().includes(q) ||
    p[2].toLowerCase().includes(q) ||
    p[3].toLowerCase().includes(q)
  );
  sortFiltered();
  render();
}

function sortFiltered() {
  const idx = sortCol === 'port' ? 0 : sortCol === 'proto' ? 1 : sortCol === 'service' ? 2 : 3;
  filtered.sort((a, b) => {
    let va = a[idx], vb = b[idx];
    if (typeof va === 'number') return (va - vb) * sortDir;
    return String(va).toLowerCase().localeCompare(String(vb).toLowerCase()) * sortDir;
  });
}

function sortBy(col) {
  if (sortCol === col) sortDir = -sortDir;
  else { sortCol = col; sortDir = 1; }
  sortFiltered();
  render();
}

function clearSearch() {
  $('#search').value = '';
  filtered = [...PORTS];
  sortFiltered();
  render();
}

// Fix data issues
PORTS.forEach((p, i) => {
  if (typeof p[1] !== 'string' || p[1].includes(',')) {
    p[1] = p[1].toString().replace(/['"]|,/g, '').trim();
  }
});

$('#search').addEventListener('input', doSearch);
$('#th-port').addEventListener('click', () => sortBy('port'));
$('#th-proto').addEventListener('click', () => sortBy('proto'));
$('#th-service').addEventListener('click', () => sortBy('service'));
$('#th-desc').addEventListener('click', () => sortBy('desc'));

sortFiltered();
