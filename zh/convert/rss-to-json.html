const { $, copyText, t } = GZ;
let pretty = true;

function getText(el) {
  if (!el) return '';
  return (el.textContent || '').trim();
}

function parseRSS2(doc) {
  const channel = doc.querySelector('channel');
  if (!channel) return null;
  const items = [...channel.querySelectorAll('item')].map(item => {
    const entry = {};
    const title = getText(item.querySelector('title'));
    const link = getText(item.querySelector('link'));
    const desc = getText(item.querySelector('description'));
    const pubDate = getText(item.querySelector('pubDate'));
    const guid = getText(item.querySelector('guid'));
    const author = getText(item.querySelector('author')) || getText(item.querySelector('dc\\:creator'));
    const cat = [...item.querySelectorAll('category')].map(c => getText(c));
    if (title) entry.title = title;
    if (link) entry.link = link;
    if (desc) entry.description = desc;
    if (pubDate) entry.pubDate = pubDate;
    if (guid) entry.guid = guid;
    if (author) entry.author = author;
    if (cat.length) entry.categories = cat;
    return entry;
  });
  const feed = {};
  const fTitle = getText(channel.querySelector('title'));
  const fLink = getText(channel.querySelector('link'));
  const fDesc = getText(channel.querySelector('description'));
  const fLang = getText(channel.querySelector('language'));
  const fDate = getText(channel.querySelector('lastBuildDate')) || getText(channel.querySelector('pubDate'));
  if (fTitle) feed.title = fTitle;
  if (fLink) feed.link = fLink;
  if (fDesc) feed.description = fDesc;
  if (fLang) feed.language = fLang;
  if (fDate) feed.updated = fDate;
  feed.items = items;
  return feed;
}

function parseAtom(doc) {
  const root = doc.documentElement;
  const feed = {};
  const fTitle = getText(root.querySelector('title'));
  const fSub = getText(root.querySelector('subtitle'));
  const fUpdated = getText(root.querySelector('updated'));
  if (fTitle) feed.title = fTitle;
  if (fSub) feed.subtitle = fSub;
  if (fUpdated) feed.updated = fUpdated;
  const link = root.querySelector('link:not([rel="self"])');
  if (link) feed.link = link.getAttribute('href') || '';
  const items = [...root.querySelectorAll('entry')].map(entry => {
    const obj = {};
    const eTitle = getText(entry.querySelector('title'));
    const eUpdated = getText(entry.querySelector('updated'));
    const ePub = getText(entry.querySelector('published'));
    const eSum = getText(entry.querySelector('summary'));
    const eContent = getText(entry.querySelector('content'));
    const eId = getText(entry.querySelector('id'));
    const eLink = entry.querySelector('link');
    const eAuthor = getText(entry.querySelector('author name'));
    if (eTitle) obj.title = eTitle;
    if (eLink) obj.link = eLink.getAttribute('href') || '';
    if (eUpdated) obj.updated = eUpdated;
    if (ePub) obj.published = ePub;
    if (eSum) obj.summary = eSum;
    if (eContent) obj.content = eContent;
    if (eId) obj.id = eId;
    if (eAuthor) obj.author = eAuthor;
    return obj;
  });
  feed.items = items;
  return feed;
}

function doConvert() {
  const inp = $('#input').value.trim();
  if (!inp) { $('#status').textContent = ''; return; }
  try {
    const parser = new DOMParser();
    const doc = parser.parseFromString(inp, 'text/xml');
    const parseErr = doc.querySelector('parsererror');
    if (parseErr) throw new Error('Invalid XML: ' + parseErr.textContent.split('\n')[0]);
    const root = doc.documentElement;
    let feed = null;
    if (root.tagName.toLowerCase() === 'rss' || doc.querySelector('channel')) {
      feed = parseRSS2(doc);
    } else if (root.tagName.toLowerCase() === 'feed' || root.tagName.toLowerCase() === 'atom') {
      feed = parseAtom(doc);
    } else if (root.tagName.toLowerCase() === 'rdf') {
      feed = parseRSS2(doc);
    }
    if (!feed) throw new Error('Unrecognized feed format. Expected RSS or Atom XML.');
    const json = JSON.stringify(feed, null, pretty ? 2 : 0);
    $('#output').textContent = json;
    $('#status').innerHTML = `<span class="ok">${t('valid')}</span> <span style="opacity:.7">(${feed.items ? feed.items.length : 0} ${t('itemCount')})</span>`;
  } catch(e) {
    $('#status').innerHTML = `<span class="err">${t('invalid')}: ${e.message}</span>`;
    $('#output').textContent = '';
  }
}

async function doFetch() {
  const url = $('#url-input').value.trim();
  if (!url) return;
  $('#status').innerHTML = `<span style="opacity:.7">Fetching…</span>`;
  try {
    const res = await fetch(url);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const text = await res.text();
    $('#input').value = text;
    $('#status').innerHTML = `<span class="ok">✓ Fetched ${(text.length/1024).toFixed(1)} KB</span>`;
    doConvert();
  } catch(e) {
    $('#status').innerHTML = `<span class="err">${t('corsError')} (${e.message})</span>`;
  }
}

function loadExample() {
  $('#input').value = `<?xml version="1.0" encoding="UTF-8"?>
<rss version="2.0">

    <link>https://example.com</link>
    <description>An example RSS feed</description>
    <language>en</language>
    <lastBuildDate>Sat, 11 Jul 2026 12:00:00 GMT</lastBuildDate>
    <item>
      <title>First Article</title>
      <link>https://example.com/post-1</link>
      <description>This is the first article description.</description>
      <pubDate>Fri, 10 Jul 2026 10:00:00 GMT</pubDate>
      <category>Technology</category>
      <guid>https://example.com/post-1</guid>
    </item>
    <item>
      <title>Second Article</title>
      <link>https://example.com/post-2</link>
      <description>This is the second article description.</description>
      <pubDate>Thu, 09 Jul 2026 08:00:00 GMT</pubDate>
      <category>News</category>
      <guid>https://example.com/post-2</guid>
    </item>
  </channel>
</rss>`;
  doConvert();
}

loadExample();
