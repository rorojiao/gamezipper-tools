const { $, copyText, t } = GZ;
let mode = 'table';
let lastHtml = '';

const esc = s => String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');

function jsonToHtml(data) {
  if (mode === 'table' && Array.isArray(data) && data.length && typeof data[0] === 'object' && !Array.isArray(data[0])) {
    return tableMode(data);
  }
  if (mode === 'table' && typeof data === 'object' && data !== null && !Array.isArray(data)) {
    return tableMode([data]);
  }
  if (mode === 'list') return listMode(data);
  if (mode === 'cards') return cardsMode(data);
  return rawMode(data);
}

function tableMode(arr) {
  const keys = [...new Set(arr.flatMap(o => typeof o === 'object' && o ? Object.keys(o) : []))];
  const head = keys.map(k => `<th>${esc(k)}</th>`).join('');
  const rows = arr.map(o =>
    `<tr>${keys.map(k => {
      const v = o[k];
      const txt = (typeof v === 'object' && v !== null) ? esc(JSON.stringify(v)) : esc(v === null ? 'null' : v);
      return `<td>${txt}</td>`;
    }).join('')}</tr>`
  ).join('');
  return `<table>\n<thead><tr>${head}</tr></thead>\n<tbody>\n${rows}\n</tbody>\n</table>`;
}

function listMode(data) {
  if (Array.isArray(data)) {
    return `<ul>${data.map(v => `<li>${typeof v === 'object' && v !== null ? listMode(v) : esc(v)}</li>`).join('')}</ul>`;
  }
  if (typeof data === 'object' && data !== null) {
    return `<dl>${Object.entries(data).map(([k, v]) =>
      `<dt>${esc(k)}</dt><dd>${typeof v === 'object' && v !== null ? listMode(v) : esc(v)}</dd>`
    ).join('')}</dl>`;
  }
  return esc(data);
}

function cardsMode(data) {
  if (Array.isArray(data)) {
    return data.map((v, i) => `<div class="card"><h3>[${i}]</h3>${cardsMode(v)}</div>`).join('');
  }
  if (typeof data === 'object' && data !== null) {
    return Object.entries(data).map(([k, v]) => {
      if (typeof v === 'object' && v !== null) {
        return `<div class="card"><h3>${esc(k)}</h3>${cardsMode(v)}</div>`;
      }
      return `<div><strong>${esc(k)}:</strong> ${esc(v)}</div>`;
    }).join('');
  }
  return esc(data);
}

function rawMode(data) {
  return `<pre>${esc(JSON.stringify(data, null, 2))}</pre>`;
}

function convert() {
  const inp = $('#input').value.trim();
  if (!inp) { $('#output').textContent = ''; $('#preview').innerHTML = ''; $('#status').textContent = ''; return; }
  try {
    const data = JSON.parse(inp);
    lastHtml = jsonToHtml(data);
    $('#output').textContent = lastHtml;
    $('#preview').innerHTML = lastHtml;
    $('#status').innerHTML = `<span style="color:var(--gz-success)">${t('valid')}</span>`;
  } catch (e) {
    $('#status').innerHTML = `<span style="color:var(--gz-accent)">${t('invalid')}: ${e.message}</span>`;
    $('#output').textContent = '';
    $('#preview').innerHTML = '';
  }
}

function downloadHtml() {
  if (!lastHtml) return;
  const full = `<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>JSON Data</title>
<style>
body{font-family:system-ui,sans-serif;max-width:900px;margin:40px auto;padding:0 20px;color:#222}

tr:nth-child(even){background:#fafafa}
dl{display:grid;grid-template-columns:max-content 1fr;gap:4px 12px}
dt{font-weight:600}dd{margin:0;color:#555}
.card{background:#f8f8f8;border:1px solid #ddd;border-radius:8px;padding:12px;margin:8px 0}
.card h3{margin:0 0 8px;font-size:15px}
ul{margin:4px 0;padding-left:20px}
pre{background:#f5f5f5;padding:12px;border-radius:8px;overflow:auto}
</style>
<link rel="alternate" hreflang="en" href="https://tools.gamezipper.com/dev/json-to-html.html">

<script>localStorage.setItem('gz-lang','zh');<\/script>
</head>
<body>
${lastHtml}
</body>
</html>`;
  const blob = new Blob([full], { type: 'text/html' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'json-data.html';
  a.click();
  URL.revokeObjectURL(a.href);
}

function loadExample() {
  $('#input').value = JSON.stringify([

    { id: 4, name: '4K Monitor', price: 399.00, inStock: true, category: 'Displays' }
  ], null, 2);
  convert();
}

function setMode(m) {
  mode = m;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.toggle('active', b.dataset.mode === m));
  convert();
}

$('#modes').innerHTML = ['table', 'list', 'cards', 'raw'].map(m =>

).join('');

$('#input').addEventListener('input', convert);
