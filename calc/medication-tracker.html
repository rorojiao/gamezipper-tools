.gz-med-form input,.gz-med-form select{padding:8px 10px;border:1px solid var(--gz-border,#333);border-radius:8px;background:var(--gz-surface,#1e1e2e);color:var(--gz-text,#eee);font-size:.95em}
.gz-med-card{background:var(--gz-surface,#1e1e2e);border:1px solid var(--gz-border,#333);border-radius:12px;padding:14px;margin:10px 0}

.gz-med-card-head .dose{color:var(--gz-accent,#4ecdc4);font-size:.9em;font-weight:600}
.gz-med-card .meta{font-size:.8em;color:var(--gz-text2,#aaa);margin-top:4px}
.gz-med-actions{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.gz-med-actions button{padding:6px 12px;border:1px solid var(--gz-border,#333);border-radius:6px;background:transparent;color:var(--gz-text,#eee);cursor:pointer;font-size:.85em}
.gz-med-actions button.taken{background:rgba(102,187,106,.15);border-color:rgba(102,187,106,.4);color:#66bb6a}
.gz-med-actions button.missed{background:rgba(233,69,96,.12);border-color:rgba(233,69,96,.4);color:#e94560}
.gz-med-log{margin-top:20px}
.gz-med-log table{width:100%;border-collapse:collapse;font-size:.85em}
.gz-med-log th,.gz-med-log td{padding:8px;text-align:left;border-bottom:1px solid var(--gz-border,#333)}
.gz-med-log th{color:var(--gz-text2,#aaa);font-weight:600}
.gz-med-empty{text-align:center;color:var(--gz-text2,#aaa);padding:30px;font-size:.9em}
@media(max-width:640px){.gz-med-form{grid-template-columns:1fr 1fr}}

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="gz-med-form" id="add-form"></div>
    <div class="gz-btn-row" style="display:flex;gap:8px;margin:8px 0 16px">
      <button class="gz-btn" onclick="addMedication()" id="btn-add"></button>
      <button class="gz-btn gz-btn-secondary" onclick="exportCSV()" id="btn-export"></button>
      <button class="gz-btn gz-btn-secondary" onclick="clearAll()" id="btn-clear"></button>
    </div>
    <div id="med-list"></div>
    <div class="gz-med-log" id="log-section" style="display:none">
      <h3 id="log-title" style="font-size:1em"></h3>
      <table id="log-table"></table>
    </div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Medication Tracker & Pill Reminder',
    toolDesc: 'Track your medications, dosages and schedules. Log each dose, export history for your doctor — all private in your browser.',
    medName: 'Medication name',
    dosage: 'Dosage (e.g. 500mg)',
    frequency: 'Frequency',
    times: 'Times (comma-separated, e.g. 08:00, 20:00)',
    notes: 'Notes (optional)',
    freqDaily: 'Daily',
    freqTwice: 'Twice daily',
    freqThrice: '3× daily',
    freqWeekly: 'Weekly',
    freqAsNeeded: 'As needed',
    addMed: '+ Add medication',
    exportCsv: '📥 Export CSV',
    clearAll: '🗑️ Clear all',
    noMeds: 'No medications yet. Add your first prescription above.',
    taken: '✓ Taken now',
    missed: '✗ Missed',
    remove: 'Remove',
    logTitle: 'Dose History',
    when: 'When',
    med: 'Medication',
    action: 'Action',
    confirmClear: 'Remove all medications and dose history?',
    step1: 'Enter your medication name, dosage and how often you take it.',
    step2: 'Click Add Medication — it appears in your list below.',
    step3: 'Mark each dose as Taken or Missed as you go through your day.',
    step4: 'Export your complete history as CSV to share with your doctor.',
  },
  zh: {
    toolTitle: '用药记录 / 服药提醒',
    toolDesc: '记录你的药物、剂量和服药时间。逐次标记服药情况，导出历史记录给医生 — 全部在浏览器本地，完全私密。',
    medName: '药物名称',
    dosage: '剂量（如 500mg）',
    frequency: '频率',
    times: '服药时间（逗号分隔，如 08:00, 20:00）',
    notes: '备注（可选）',
    freqDaily: '每日一次',
    freqTwice: '每日两次',
    freqThrice: '每日三次',
    freqWeekly: '每周一次',
    freqAsNeeded: '按需',
    addMed: '+ 添加药物',
    exportCsv: '📥 导出 CSV',
    clearAll: '🗑️ 清空全部',
    noMeds: '还没有药物记录。在上方添加你的第一个处方。',
    taken: '✓ 已服用',
    missed: '✗ 漏服',
    remove: '删除',
    logTitle: '服药记录',
    when: '时间',
    med: '药物',
    action: '操作',
    confirmClear: '确定删除所有药物和服药记录吗？',
    step1: '输入药物名称、剂量和服药频率。',
    step2: '点击「添加药物」— 药物会出现在下方列表中。',
    step3: '随时间推移逐次标记为「已服用」或「漏服」。',
    step4: '导出完整记录为 CSV，方便给医生查看。',
  }
});

const { $, t } = GZ;
const STORAGE_KEY = 'gz-med-tracker';

function load() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{"meds":[],"log":[]}'); }
  catch(e) { return {meds:[], log:[]}; }
}
function save(data) { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }

$('#add-form').innerHTML = `
  <label>${t('medName')}<input type="text" id="f-name" placeholder="e.g. Amoxicillin"></label>
  <label>${t('dosage')}<input type="text" id="f-dosage" placeholder="500mg"></label>
  <label>${t('frequency')}<select id="f-freq">
    <option value="daily">${t('freqDaily')}</option>
    <option value="twice">${t('freqTwice')}</option>
    <option value="thrice">${t('freqThrice')}</option>
    <option value="weekly">${t('freqWeekly')}</option>
    <option value="prn">${t('freqAsNeeded')}</option>
  </select></label>
  <label>${t('times')}<input type="text" id="f-times" placeholder="08:00, 20:00"></label>
  <label style="grid-column:1/-1">${t('notes')}<input type="text" id="f-notes"></label>
`;
$('#btn-add').textContent = t('addMed');
$('#btn-export').textContent = t('exportCsv');
$('#btn-clear').textContent = t('clearAll');

function addMedication() {
  const name = $('#f-name').value.trim();
  if (!name) return;
  const data = load();
  data.meds.push({
    id: Date.now(),
    name,
    dosage: $('#f-dosage').value.trim(),
    freq: $('#f-freq').value,
    times: $('#f-times').value.trim(),
    notes: $('#f-notes').value.trim(),
  });
  save(data);
  $('#f-name').value = $('#f-dosage').value = $('#f-times').value = $('#f-notes').value = '';
  render();
}

function logDose(id, name, action) {
  const data = load();
  data.log.push({time: new Date().toISOString(), medId: id, name, action});
  save(data);
  render();
}

function removeMed(id) {
  const data = load();
  data.meds = data.meds.filter(m => m.id !== id);
  save(data);
  render();
}

function clearAll() {
  if (confirm(t('confirmClear'))) {
    localStorage.removeItem(STORAGE_KEY);
    render();
  }
}

function fmtFreq(code) {
  return ({daily:t('freqDaily'),twice:t('freqTwice'),thrice:t('freqThrice'),weekly:t('freqWeekly'),prn:t('freqAsNeeded')})[code] || code;
}

function render() {
  const data = load();
  const list = $('#med-list');
  if (!data.meds.length) {
    list.innerHTML = `<div class="gz-med-empty">${t('noMeds')}</div>`;
  } else {
    list.innerHTML = data.meds.map(m => `
      <div class="gz-med-card">
        <div class="gz-med-card-head">
          <div><h3>${m.name}</h3><span class="dose">${m.dosage || ''}</span></div>
          <button onclick="removeMed(${m.id})" style="background:none;border:none;color:#ff8080;cursor:pointer;font-size:1.1em">✕</button>
        </div>
        <div class="meta">${fmtFreq(m.freq)}${m.times ? ' · ' + m.times : ''}${m.notes ? ' · ' + m.notes : ''}</div>
        <div class="gz-med-actions">
          <button class="taken" onclick="logDose(${m.id},'${m.name.replace(/'/g,"\\'")}','taken')">${t('taken')}</button>
          <button class="missed" onclick="logDose(${m.id},'${m.name.replace(/'/g,"\\'")}','missed')">${t('missed')}</button>
        </div>
      </div>
    `).join('');
  }
  const logSec = $('#log-section');
  if (data.log.length) {
    logSec.style.display = 'block';
    $('#log-title').textContent = t('logTitle') + ` (${data.log.length})`;
    const recent = data.log.slice().reverse().slice(0, 50);
    $('#log-table').innerHTML = `<thead><tr><th>${t('when')}</th><th>${t('med')}</th><th>${t('action')}</th></tr></thead><tbody>` +
      recent.map(l => {
        const d = new Date(l.time);
        const actionIcon = l.action === 'taken' ? '✅ '+t('taken') : '⏭️ '+t('missed');
        return `<tr><td>${d.toLocaleString()}</td><td>${l.name}</td><td>${actionIcon}</td></tr>`;
      }).join('') + '</tbody>';
  } else {
    logSec.style.display = 'none';
  }
}

function exportCSV() {
  const data = load();
  const rows = [['Time','Medication','Dosage','Frequency','Action'], ...data.log.map(l => [l.time, l.name, '', '', l.action])];
  const csv = rows.map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob([csv], {type:'text/csv'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'medication-history.csv';
  a.click();
}

$('#toolbar').innerHTML = '';
render();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🩺', href:'/calc/blood-pressure-calculator.html', name:'Blood Pressure'},
    {icon:'🏃', href:'/calc/bmi-calculator.html', name:'BMI Calculator'},
    {icon:'💧', href:'/calc/water-intake-calculator.html', name:'Water Intake'},
    {icon:'😴', href:'/calc/sleep-calculator.html', name:'Sleep Calculator'},
  ]
});
</script>
<script src="/tools-result-rec.js?v=20260707v520" defer></script>
</body>
</html>
