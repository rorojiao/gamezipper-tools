<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is eBay's final value fee?", "acceptedAnswer": {"@type": "Answer", "text": "The final value fee is eBay's commission on a completed sale, calculated as a percentage of the total sale amount (item price + shipping). For most non-Store sellers it is around 13.25% in the US, capped at $0.30 minimum. Some categories like vehicles, real estate, and select others have different rates."}}, {"@type": "Question", "name": "Do eBay Store subscribers get lower fees?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. Starter, Basic, Premium, Anchor and Enterprise Store subscribers receive reduced final value fees (often around 10-12%) and additional free monthly listings. The discount depends on the Store tier and category."}}, {"@type": "Question", "name": "What is the eBay managed payments fee?", "acceptedAnswer": {"@type": "Answer", "text": "Since eBay moved to managed payments, the payment processing cost is typically bundled into the final value fee. For international sales there may be an additional cross-border fee of around 1.65% of the sale amount."}}, {"@type": "Question", "name": "Is there a final value fee cap?", "acceptedAnswer": {"@type": "Answer", "text": "In the US, the final value fee on most categories is capped at $250 per item for non-motors categories (the cap may differ by marketplace and category). The calculator does not enforce the cap — check eBay's published fee schedule."}}, {"@type": "Question", "name": "Is my data private?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. All calculations run entirely in your browser. Nothing is uploaded or stored."}}]}</script>

<script>
GZI18n.register({
  en: {
    toolTitle: 'eBay Fee Calculator',
    toolDesc: 'Estimate eBay final value fees, managed payments fees, optional Store discounts and net profit per sale. Enter price, cost and Store tier — instant breakdown.',
    price: 'Sale Price ($)',
    cost: 'Item Cost ($)',
    shipping: 'Shipping Charged ($)',
    store: 'eBay Store Tier',
    intl: 'Sale Type',
    promo: 'Promoted Listing Fee ($)',
    salePrice: 'Sale Price',
    itemCost: 'Item Cost',
    fvf: 'Final Value Fee',
    intlFee: 'Cross-Border Fee',
    promoFee: 'Promoted Listing Fee',
    totalFees: 'Total Fees',
    profit: 'Net Profit',
    margin: 'Profit Margin',
    calculate: 'Recalculate',
    copy: 'Copy Breakdown',
    step1: 'Enter the sale price and your item cost',
    step2: 'Set shipping charged to buyer and Store tier',
    step3: 'Choose domestic or international sale',
    step4: 'Optionally add Promoted Listings fee',
    disclaimer: 'Approximate US 2025-2026 fee schedule. eBay fees vary by marketplace, category, Store tier and promos. Always confirm on ebay.com/sellercenter before pricing decisions.',
  },
  zh: {
    toolTitle: 'eBay 费用计算器',
    toolDesc: '估算 eBay 成交费、支付处理费、可选店铺折扣和单件净利润。输入售价、成本和店铺等级即可获得即时明细。',
    price: '售价 ($)',
    cost: '进货成本 ($)',
    shipping: '向买家收取的运费 ($)',
    store: 'eBay 店铺等级',
    intl: '销售类型',
    promo: 'Promoted 推广费 ($)',
    salePrice: '售价',
    itemCost: '进货成本',
    fvf: '成交费',
    intlFee: '跨境手续费',
    promoFee: '推广费用',
    totalFees: '费用合计',
    profit: '净利润',
    margin: '利润率',
    calculate: '重新计算',
    copy: '复制明细',
    step1: '输入售价和进货成本',
    step2: '设置运费和店铺等级',
    step3: '选择国内或国际销售',
    step4: '可选添加 Promoted 推广费',
    disclaimer: '使用美国 2025-2026 年近似费率。eBay 费用因站点、类目、店铺等级和推广而异。定价前请在 ebay.com/sellercenter 核实。',
  }
});

const { $, copyText, t } = GZ;

// Final value fee % based on Store tier (US approx 2025-2026)
const FVF = { none: 0.1325, starter: 0.1200, basic: 0.1150, premium: 0.1050, anchor: 0.0900 };

function money(n) { return '$' + (isFinite(n) ? n.toFixed(2) : '0.00'); }
function pct(n) { return (isFinite(n) ? n.toFixed(1) : '0.0') + '%'; }

function calculate() {
  const price = parseFloat($('#price').value) || 0;
  const cost = parseFloat($('#cost').value) || 0;
  const shipping = parseFloat($('#shipping').value) || 0;
  const store = $('#store').value;
  const intl = $('#intl').value;
  const promo = parseFloat($('#promo').value) || 0;

  const total = price + shipping;
  const rate = FVF[store] ?? 0.1325;
  let fvf = total * rate;
  if (fvf < 0.30) fvf = 0.30; // minimum
  // US FVF cap (most categories) - apply $250 cap
  if (fvf > 250) fvf = 250;
  const intlFee = intl === 'yes' ? total * 0.0165 : 0;
  const totalFees = fvf + intlFee + promo;
  const profit = total - cost - totalFees - shipping * 0; // shipping is passed through
  // Profit on the item only (shipping handled separately by seller)
  const itemProfit = price - cost - fvf - intlFee - promo;
  const margin = price > 0 ? (itemProfit / price * 100) : 0;

  const fmt = (lbl, val, cls='') => `<div class="result-line ${cls}"><span class="lbl">${lbl}</span><span class="val">${val}</span></div>`;
  const profitCls = itemProfit >= 0 ? 'total' : 'total negative';
  $('#result').innerHTML =
    fmt(t('salePrice'), money(price)) +
    fmt(t('itemCost'), '−' + money(cost)) +
    fmt(t('fvf'), '−' + money(fvf) + ' (' + pct(rate*100) + ')') +
    (intlFee > 0 ? fmt(t('intlFee'), '−' + money(intlFee)) : '') +
    (promo > 0 ? fmt(t('promoFee'), '−' + money(promo)) : '') +
    fmt(t('totalFees'), '−' + money(totalFees + cost)) +
    fmt(t('profit'), money(itemProfit), profitCls) +
    fmt(t('margin'), pct(margin));
}

function copyBreakdown() { copyText($('#result').innerText); }

['#price','#cost','#shipping','#store','#intl','#promo'].forEach(s => $(s).addEventListener('input', calculate));
$('#store').addEventListener('change', calculate);
$('#intl').addEventListener('change', calculate);

$('#lbl-price').textContent = t('price');
$('#lbl-cost').textContent = t('cost');
$('#lbl-shipping').textContent = t('shipping');
$('#lbl-store').textContent = t('store');
$('#lbl-intl').textContent = t('intl');
$('#lbl-promo').textContent = t('promo');
$('#disclaimer').textContent = t('disclaimer');

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="calculate()">🧮 ${t('calculate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="copyBreakdown()">📑 ${t('copy')}</button>`;

calculate();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📦', href:'/calc/amazon-fee-calculator.html', name:'Amazon Fee'},
    {icon:'💳', href:'/calc/paypal-fee-calculator.html', name:'PayPal Fee'},
    {icon:'💎', href:'/calc/stripe-fee-calculator.html', name:'Stripe Fee'},
    {icon:'🧶', href:'/calc/etsy-fee-calculator.html', name:'Etsy Fee'},
  ]
});
</script>
