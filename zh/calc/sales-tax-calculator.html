<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "How do I calculate sales tax?", "acceptedAnswer": {"@type": "Answer", "text": "Sales tax is calculated by multiplying the item price by the tax rate. For example, a $100 item with 8% sales tax: $100 × 0.08 = $8 tax, so the total is $108."}}, {"@type": "Question", "name": "What is the difference between adding and removing sales tax?", "acceptedAnswer": {"@type": "Answer", "text": "Adding tax means you have the pre-tax price and want to find the total with tax. Removing (deducting) tax means you have the total price that already includes tax and want to find the original pre-tax amount and the tax portion."}}, {"@type": "Question", "name": "Which US states have no sales tax?", "acceptedAnswer": {"@type": "Answer", "text": "Five US states have no state-level sales tax: Delaware, Montana, New Hampshire, Oregon, and Alaska (though some Alaska cities charge local sales tax)."}}, {"@type": "Question", "name": "How do I remove sales tax from a total price?", "acceptedAnswer": {"@type": "Answer", "text": "Pre-tax price = Total / (1 + Tax Rate). For example, if the total is $108 with 8% tax: $108 / 1.08 = $100 pre-tax, and $8 is the tax amount."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="mode-tabs" id="mode-tabs"></div>
    <div class="calc-grid" id="input-grid"></div>
    <div class="result-grid" id="result-grid"></div>
    <div class="formula-box" id="formula-box"></div>
    <div id="quick-rates"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Sales Tax Calculator',
    toolDesc: 'Calculate sales tax instantly — add or remove tax from any price. Includes quick US state rate presets. Free, private, browser-based.',
    mode1: 'Add Tax',
    mode2: 'Remove Tax (Reverse)',
    amount: 'Amount ($)',
    taxRate: 'Tax Rate (%)',
    taxAmount: 'Tax Amount',
    totalPrice: 'Total with Tax',
    preTaxPrice: 'Price Before Tax',
    calculate: 'Calculate',
    clear: 'Clear',
    formulaTitle: 'Formulas',
    f1: 'Adding tax: Total = Price × (1 + Rate/100)',
    f2: 'Removing tax: Pre-tax = Total ÷ (1 + Rate/100)',
    f3: 'Tax Amount = Total − Pre-tax Price',
    quickRates: 'Quick US State Rates',
    step1: 'Choose whether to add tax or remove tax from a total',
    step2: 'Enter the amount and the sales tax rate (%)',
    step3: 'See tax amount and final/pre-tax price instantly',
    step4: 'Click a state preset for common US sales tax rates',
  },
  zh: {
    toolTitle: '消费税计算器',
    toolDesc: '即时计算消费税 — 从任意金额中加税或去税。内置美国各州税率快捷预设。免费、私密、浏览器本地运行。',
    mode1: '加税',
    mode2: '去税（反向）',
    amount: '金额 ($)',
    taxRate: '税率 (%)',
    taxAmount: '税额',
    totalPrice: '含税总价',
    preTaxPrice: '税前价格',
    calculate: '计算',
    clear: '清除',
    formulaTitle: '公式',
    f1: '加税：总价 = 金额 × (1 + 税率/100)',
    f2: '去税：税前 = 总价 ÷ (1 + 税率/100)',
    f3: '税额 = 总价 − 税前价格',
    quickRates: '美国各州税率快捷预设',
    step1: '选择要加税还是从总价中去税',
    step2: '输入金额和消费税率 (%)',
    step3: '即时查看税额和含税/税前价格',
    step4: '点击州名预设可快速填充常见美国消费税率',
  }
});

const { $, copyText, t } = GZ;
let mode = 'add';

// US state sales tax rates (approximate combined state + avg local)
const STATE_RATES = [
  {st:'AL',r:9.24},{st:'AK',r:1.82},{st:'AZ',r:8.40},{st:'AR',r:9.47},
  {st:'CA',r:8.82},{st:'CO',r:7.78},{st:'CT',r:6.35},{st:'DE',r:0},
  {st:'FL',r:7.02},{st:'GA',r:7.40},{st:'HI',r:4.44},{st:'ID',r:6.03},
  {st:'IL',r:8.81},{st:'IN',r:7.00},{st:'IA',r:6.94},{st:'KS',r:8.68},
  {st:'KY',r:6.00},{st:'LA',r:9.55},{st:'ME',r:5.50},{st:'MD',r:6.00},
  {st:'MA',r:6.25},{st:'MI',r:6.00},{st:'MN',r:7.49},{st:'MS',r:7.07},
  {st:'MO',r:8.29},{st:'MT',r:0},{st:'NE',r:6.96},{st:'NV',r:8.23},
  {st:'NH',r:0},{st:'NJ',r:6.60},{st:'NM',r:7.84},{st:'NY',r:8.52},
  {st:'NC',r:6.98},{st:'ND',r:6.96},{st:'OH',r:7.23},{st:'OK',r:8.95},
  {st:'OR',r:0},{st:'PA',r:6.34},{st:'RI',r:7.00},{st:'SC',r:7.46},
  {st:'SD',r:6.40},{st:'TN',r:9.55},{st:'TX',r:8.20},{st:'UT',r:7.19},
  {st:'VT',r:6.36},{st:'VA',r:5.75},{st:'WA',r:9.29},{st:'WV',r:6.52},
  {st:'WI',r:5.43},{st:'WY',r:5.36},
];

function fmt(n) { return '$' + n.toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2}); }

function renderInputs() {
  const grid = $('#input-grid');
  const amountLabel = mode === 'add' ? t('amount') : t('totalPrice');
  grid.innerHTML = `
    <div class="field">
      <label>${amountLabel}</label>
      <input type="number" id="amount" placeholder="0.00" step="0.01" value="100">
    </div>
    <div class="field">
      <label>${t('taxRate')}</label>
      <input type="number" id="rate" placeholder="8" step="0.01" value="8">
    </div>`;
}

function calculate() {
  const amt = parseFloat($('#amount').value) || 0;
  const rate = parseFloat($('#rate').value) || 0;
  let tax, total, preTax;
  if (mode === 'add') {
    preTax = amt;
    tax = amt * rate / 100;
    total = amt + tax;
  } else {
    total = amt;
    preTax = amt / (1 + rate / 100);
    tax = amt - preTax;
  }
  const outLabel = mode === 'add' ? t('totalPrice') : t('preTaxPrice');
  const outVal = mode === 'add' ? total : preTax;
  $('#result-grid').innerHTML = `
    <div class="result-card"><div class="label">${outLabel}</div><div class="value">${fmt(outVal)}</div></div>
    <div class="result-card"><div class="label">${t('taxAmount')}</div><div class="value">${fmt(tax)}</div></div>`;
  $('#formula-box').innerHTML = `<strong>${t('formulaTitle')}:</strong><br><code>${t('f1')}</code><br><code>${t('f2')}</code><br><code>${t('f3')}</code>`;
}

function setMode(m) {
  mode = m;
  $$('.mode-tab').forEach(el => el.classList.toggle('active', el.dataset.mode === m));
  renderInputs();
  calculate();
}

function renderQuickRates() {
  const html = STATE_RATES.map(s =>
    `<span class="state-chip" data-rate="${s.r}" data-st="${s.st}">${s.st} ${s.r}%</span>`
  ).join('');
  $('#quick-rates').innerHTML = `<div style="margin-top:20px"><h3 style="font-size:1.05rem;margin-bottom:4px">${t('quickRates')}</h3><div class="state-grid">${html}</div></div>`;
  $$('.state-chip').forEach(el => {
    el.addEventListener('click', () => {
      const r = el.dataset.rate;
      $('#rate').value = r;
      calculate();
    });
  });
}

// Delegate clicks for mode tabs
$('#mode-tabs').addEventListener('click', e => {
  if (e.target.classList.contains('mode-tab')) setMode(e.target.dataset.mode);
});

// Delegate input
document.addEventListener('input', e => {
  if (e.target.id === 'amount' || e.target.id === 'rate') calculate();
});

$('#mode-tabs').innerHTML = `
  <span class="mode-tab active" data-mode="add">${t('mode1')}</span>
  <span class="mode-tab" data-mode="remove">${t('mode2')}</span>`;

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="calculate()">${t('calculate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="document.getElementById('amount').value='';document.getElementById('rate').value='';calculate()">${t('clear')}</button>`;

renderInputs();
renderQuickRates();
calculate();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🏷️', href:'/calc/percent-off-calculator.html', name:'Percent Off'},
    {icon:'💰', href:'/calc/tip-calculator.html', name:'Tip'},
    {icon:'🏦', href:'/calc/loan-calculator.html', name:'Loan'},
    {icon:'📈', href:'/calc/markup-calculator.html', name:'Markup'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
