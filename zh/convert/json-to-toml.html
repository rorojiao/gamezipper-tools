const { $, copyText, t } = GZ;
let indentSize = 2;

function escapeTomlString(s) {
  if (s === null || s === undefined) return '""';
  s = String(s);
  if (/^".*"$/.test(s) || /true|false|null/.test(s) || /^-?\d+(\.\d+)?([eE][+-]?\d+)?$/.test(s)) {
    return JSON.stringify(s);
  }
  if (/[\\\n\r\t"']/.test(s) || /[<>={}\[\],]/.test(s) || s === '') {
    return JSON.stringify(s);
  }
  return s;
}

function needsQuoting(key) {
  return !/^[A-Za-z0-9_\-]+$/.test(key);
}

function tomlEscapeKey(k) {
  return needsQuoting(k) ? JSON.stringify(k) : k;
}

function toToml(value, indent = 0, keyPrefix = '') {
  const pad = ' '.repeat(indent);
  if (value === null || value === undefined) return `${pad}${tomlEscapeKey(keyPrefix)} = ""`;
  if (typeof value === 'string') {
    return `${pad}${tomlEscapeKey(keyPrefix)} = ${escapeTomlString(value)}`;
  }
  if (typeof value === 'number') {
    if (!isFinite(value)) return `${pad}${tomlEscapeKey(keyPrefix)} = 0`;
    return `${pad}${tomlEscapeKey(keyPrefix)} = ${value}`;
  }
  if (typeof value === 'boolean') {
    return `${pad}${tomlEscapeKey(keyPrefix)} = ${value}`;
  }
  if (Array.isArray(value)) {
    if (value.length === 0) return `${pad}${tomlEscapeKey(keyPrefix)} = []`;
    if (value.every(v => v && typeof v === 'object' && !Array.isArray(v))) {
      return value.map(item => emitTable(item, indent, keyPrefix)).join('\n');
    }
    const items = value.map(v => {
      if (v && typeof v === 'object' && !Array.isArray(v)) {
        return '{\n' + emitTable(v, indent + 1, '') + '\n' + ' '.repeat(indent + 1) + '}';
      }
      if (typeof v === 'string') return escapeTomlString(v);
      if (v === null) return '""';
      return JSON.stringify(v);
    }).join(', ');
    return `${pad}${tomlEscapeKey(keyPrefix)} = [${items}]`;
  }
  if (typeof value === 'object') {
    return emitTable(value, indent, keyPrefix);
  }
  return '';
}

function emitTable(obj, indent, keyPrefix) {
  const pad = ' '.repeat(indent);
  let out = '';
  if (keyPrefix) {
    out += `${pad}[${keyPrefix}]\n`;
  }
  const keys = Object.keys(obj);
  for (const k of keys) {
    const v = obj[k];
    const childPrefix = keyPrefix ? `${keyPrefix}.${k}` : k;
    if (v && typeof v === 'object' && !Array.isArray(v) && Object.keys(v).length > 0) {
      const nested = toToml(v, indent, childPrefix);
      if (out) out += '\n';
      out += nested + '\n';
    } else if (Array.isArray(v) && v.length > 0 && v.every(x => x && typeof x === 'object' && !Array.isArray(x))) {
      const arrOut = toToml(v, indent, childPrefix);
      if (out) out += '\n';
      out += arrOut + '\n';
    } else {
      out += toToml(v, indent, childPrefix) + '\n';
    }
  }
  return out.replace(/\n+$/, '');
}

function syntaxHighlightToml(toml) {
  return toml
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/^(\s*)(\[.*?\])/gm, '$1<span class="toml-key">$2</span>')
    .replace(/^(\s*)([A-Za-z_][A-Za-z0-9_\-]*)(\s*=)/gm, '$1<span class="toml-key">$2</span>$3')
    .replace(/(=\s*)("[^"]*")/g, '$1<span class="toml-string">$2</span>')
    .replace(/(=\s*)(true|false)/g, '$1<span class="toml-bool">$2</span>')
    .replace(/(=\s*)(-?\d+\.?\d*([eE][+-]?\d+)?)/g, '$1<span class="toml-number">$2</span>')
    .replace(/(#[^#].*)$/gm, '<span class="toml-comment">$1</span>');
}

function doConvert() {
  const inp = $('#input').value.trim();
  const out = $('#output');
  const st = $('#status');
  if (!inp) { out.textContent = ''; st.innerHTML = ''; return; }
  try {
    const obj = JSON.parse(inp);
    let toml = toToml(obj, 0, '');
    if (!toml) toml = '# empty object\n';
    out.innerHTML = syntaxHighlightToml(toml);
    st.innerHTML = `<span style="color:var(--gz-success)">${t('valid')}</span> · ${toml.split('\n').length} lines`;
  } catch (e) {
    out.innerHTML = '';
    st.innerHTML = `<span style="color:var(--gz-accent)">${t('invalid')}: ${e.message}</span>`;
  }
}

function doClear() { $('#input').value = ''; $('#output').textContent = ''; $('#status').innerHTML = ''; }

function loadExample() {
  $('#input').value = JSON.stringify({
    name: "my-app",
    version: "1.2.0",
    description: "A sample application",
    author: { name: "Jane Doe", email: "jane@example.com" },
    dependencies: ["express", "lodash", "axios"],
    scripts: { start: "node index.js", test: "jest", build: "webpack" },
    settings: {
      debug: true,
      port: 3000,
      database: { host: "localhost", port: 5432, ssl: false }
    }
  }, null, 2);
  doConvert();
}

$('#input').addEventListener('input', doConvert);

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="doConvert()">${t('convert')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <select class="gz-select" onchange="indentSize=+this.value;doConvert()">
    <option value="2">2 ${t('indent')}</option>
    <option value="4">4 ${t('indent')}</option>
  </select>
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

document.getElementById('lbl-out').textContent = t('outputLabel');
