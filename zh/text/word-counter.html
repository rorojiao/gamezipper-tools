const { $, copyText, t } = GZ;

function countStats(text) {
  if (!text) return { words: 0, chars: 0, charsNoSpace: 0, sentences: 0, paragraphs: 0, readMin: 0, speakMin: 0 };
  const chars = text.length;
  const charsNoSpace = text.replace(/\s/g, '').length;
  const words = text.trim() ? text.trim().split(/\s+/).length : 0;
  const sentences = text.trim() ? (text.match(/[.!?。！？]+/g) || []).length || (text.trim() ? 1 : 0) : 0;
  const paragraphs = text.trim() ? text.split(/\n\s*\n/).filter(p => p.trim()).length || 1 : 0;
  const readMin = words / 200;
  const speakMin = words / 130;
  return { words, chars, charsNoSpace, sentences, paragraphs, readMin, speakMin };
}

function formatTime(minutes) {
  if (minutes < 1/60) return t('less1min');
  if (minutes < 1) return Math.round(minutes * 60) + ' ' + t('seconds');
  return minutes.toFixed(1) + ' ' + t('minutes');
}

function updateStats() {
  const text = $('#input').value;
  const s = countStats(text);
  $('#stats').innerHTML = [
    { num: s.words, label: t('words') },
    { num: s.chars, label: t('characters') },
    { num: s.charsNoSpace, label: t('charNoSpace') },
    { num: s.sentences, label: t('sentences') },
    { num: s.paragraphs, label: t('paragraphs') },
    { num: formatTime(s.readMin), label: t('readingTime') },
  ].map(st => `<div class="stat-card"><div class="num">${st.num}</div><div class="label">${st.label}</div></div>`).join('');
}

$('#input').addEventListener('input', updateStats);

$('#toolbar').innerHTML = `
  <button class="gz-btn gz-btn-secondary" onclick="$('#input').value='';updateStats()">${t('clear')}</button>
  <button class="gz-btn" onclick="copyText($('#input').value)">${t('copy')}</button>`;

$('#input').placeholder = t('placeholder');
updateStats();
