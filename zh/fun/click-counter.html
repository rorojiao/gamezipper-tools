.counter-card{background:var(--gz-card,#1a1a2e);border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:16px;text-align:center;position:relative}
.counter-card .name{font-size:.85rem;opacity:.8;margin-bottom:8px;text-transform:uppercase;letter-spacing:.05em}
.counter-card .count{font-size:3.5rem;font-weight:800;color:var(--gz-accent,#4ecdc4);line-height:1;font-variant-numeric:tabular-nums;cursor:pointer;user-select:none;padding:8px 0}
.counter-card .count:active{transform:scale(.95)}
.counter-card .ctrls{display:flex;gap:6px;justify-content:center;margin-top:8px;flex-wrap:wrap}
.counter-card .ctrls button{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);color:inherit;border-radius:8px;padding:6px 12px;cursor:pointer;font-size:.85rem}
.counter-card .ctrls button:hover{background:rgba(255,255,255,.16)}
.counter-card .ctrls .add{background:linear-gradient(135deg,var(--gz-accent,#4ecdc4),var(--gz-accent2,#44a08d));color:#0a0a1a;font-weight:700;border:none}
.counter-card .ctrls .sub{background:rgba(255,107,107,.15);border-color:rgba(255,107,107,.3);color:#ff6b6b}
.counter-card .del{position:absolute;top:8px;right:8px;background:none;border:none;color:rgba(255,255,255,.3);cursor:pointer;font-size:1.2rem}
.counter-card .del:hover{color:#ff6b6b}
.counter-card input.name-input{background:transparent;border:1px solid transparent;border-radius:4px;padding:4px;width:100%;text-align:center;font-size:.85rem;text-transform:uppercase;letter-spacing:.05em}
.counter-card input.name-input:focus{border-color:var(--gz-accent,#4ecdc4);outline:none;background:rgba(0,0,0,.2)}
.global-stats{display:flex;gap:16px;justify-content:center;margin:12px 0;flex-wrap:wrap}
.global-stats .gs{background:var(--gz-card,#1a1a2e);border-radius:10px;padding:10px 20px;text-align:center;min-width:120px}
.global-stats .gs .v{font-size:1.6rem;font-weight:800;color:var(--gz-accent,#4ecdc4)}
.global-stats .gs .l{font-size:.75rem;opacity:.7;text-transform:uppercase}
.options{display:flex;gap:12px;align-items:center;justify-content:center;flex-wrap:wrap;margin:12px 0;font-size:.85rem}
.options label{display:flex;align-items:center;gap:6px;cursor:pointer}
.options input[type=number]{width:60px;padding:4px;background:var(--gz-bg,#0a0a1a);border:1px solid rgba(255,255,255,.12);color:inherit;border-radius:6px;text-align:center}

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="options" id="options"></div>
    <div class="global-stats" id="gstats"></div>
    <div class="counter-grid" id="grid"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Click Counter & Tally Counter',
    toolDesc: 'Free online manual counter. Tap or click to count people, inventory, reps, laps, stock and more. Multiple counters, keyboard shortcuts, step size, sound and auto-save.',
    addCounter: '+ Add Counter',
    resetAll: 'Reset All',
    totalCount: 'Total Counted',
    counters: 'Counters',
    step: 'Step',
    sound: 'Sound',
    step1: 'Click "Add Counter" to create a counter (or start with the defaults)',
    step2: 'Tap the big number, press + or −, or use keyboard keys 1–9',
    step3: 'Rename each counter (people, items, reps, etc.)',
    step4: 'Your counts auto-save to your browser — close and reopen freely',
    counterName: 'Counter',
  },
  zh: {
    toolTitle: '点击计数器 / 手动计数器',
    toolDesc: '免费在线手动计数器。点击或敲击来统计人数、库存、次数、圈数、库存等。支持多个计数器、键盘快捷键、步长、声音和自动保存。',
    addCounter: '+ 添加计数器',
    resetAll: '全部重置',
    totalCount: '总计',
    counters: '个计数器',
    step: '步长',
    sound: '声音',
    step1: '点击「添加计数器」创建计数器（或使用默认）',
    step2: '点击大数字、按 +/− 按钮，或使用键盘 1–9 键',
    step3: '为每个计数器命名（人数、物品、次数等）',
    step4: '计数自动保存到浏览器 — 可随时关闭和重新打开',
    counterName: '计数器',
  }
});

const { $, t } = GZ;
let counters = [];
let step = 1;
let soundOn = false;
let audioCtx = null;

function load(){
  try{
    const s = JSON.parse(localStorage.getItem('gz-click-counter')||'null');
    if(s && Array.isArray(s.counters)){ counters = s.counters; step = s.step||1; soundOn = !!s.soundOn; }
  }catch(e){}
  if(!counters.length){
    counters = [{name:'',count:0},{name:'',count:0},{name:'',count:0}];
  }
}

function save(){
  try{ localStorage.setItem('gz-click-counter', JSON.stringify({counters,step,soundOn})); }catch(e){}
}

function beep(){
  if(!soundOn) return;
  try{
    audioCtx = audioCtx || new (window.AudioContext||window.webkitAudioContext)();
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    o.frequency.value = 880; o.type='sine';
    g.gain.setValueAtTime(0.15, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime+0.08);
    o.start(); o.stop(audioCtx.currentTime+0.08);
  }catch(e){}
}

function inc(i,delta){
  counters[i].count = Math.max(0, counters[i].count + delta);
  beep();
  save();
  render();
}

function reset(i){
  counters[i].count = 0;
  save();
  render();
}

function del(i){
  counters.splice(i,1);
  save();
  render();
}

function rename(i,val){
  counters[i].name = val;
  save();
}

function addCounter(){
  counters.push({name:'',count:0});
  save();
  render();
}

function resetAll(){
  counters.forEach(c=>c.count=0);
  save();
  render();
}

function render(){
  const total = counters.reduce((a,c)=>a+c.count,0);
  $('#gstats').innerHTML = `
    <div class="gs"><div class="v">${total.toLocaleString()}</div><div class="l">${t('totalCount')}</div></div>
    <div class="gs"><div class="v">${counters.length}</div><div class="l">${t('counters')}</div></div>`;
  $('#grid').innerHTML = counters.map((c,i)=>`
    <div class="counter-card">
      <button class="del" data-del="${i}">×</button>
      <input class="name-input" type="text" value="${escapeAttr(c.name)}" placeholder="${t('counterName')} ${i+1}" data-rename="${i}" maxlength="20">
      <div class="count" data-inc="${i}" title="Click to +${step}">${c.count.toLocaleString()}</div>
      <div class="ctrls">
        <button class="sub" data-sub="${i}">−${step}</button>
        <button class="add" data-add="${i}">+${step}</button>
        <button data-reset="${i}">↺</button>
      </div>
    </div>`).join('');

  $('#grid').querySelectorAll('[data-inc]').forEach(el=>{
    el.addEventListener('click',()=>inc(+el.dataset.inc, step));
  });
  $('#grid').querySelectorAll('[data-add]').forEach(el=>{
    el.addEventListener('click',()=>inc(+el.dataset.add, step));
  });
  $('#grid').querySelectorAll('[data-sub]').forEach(el=>{
    el.addEventListener('click',()=>inc(+el.dataset.sub, -step));
  });
  $('#grid').querySelectorAll('[data-reset]').forEach(el=>{
    el.addEventListener('click',()=>reset(+el.dataset.reset));
  });
  $('#grid').querySelectorAll('[data-del]').forEach(el=>{
    el.addEventListener('click',()=>del(+el.dataset.del));
  });
  $('#grid').querySelectorAll('[data-rename]').forEach(el=>{
    el.addEventListener('input',e=>rename(+e.target.dataset.rename, e.target.value));
  });
}

function escapeAttr(s){return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');}

$('#options').innerHTML = `
  <label>${t('step')}: <input type="number" id="step-input" min="1" max="100" value="${step}"></label>
  <label><input type="checkbox" id="sound-input" ${soundOn?'checked':''}> ${t('sound')}</label>`;

$('#step-input').addEventListener('change',e=>{ step=Math.max(1,parseInt(e.target.value)||1); save(); render(); });
$('#sound-input').addEventListener('change',e=>{ soundOn=e.target.checked; save(); });

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="addCounter()">${t('addCounter')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="resetAll()">${t('resetAll')}</button>`;

document.addEventListener('keydown', e=>{
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA') return;
  const n = parseInt(e.key);
  if(n>=1 && n<=9 && counters[n-1]){
    inc(n-1, step);
    e.preventDefault();
  }
  if(e.key===' '){
    if(counters[0]) inc(0, step);
    e.preventDefault();
  }
});

load();
render();

GZ.renderToolPage({
  category: 'fun',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'⏱️', href:'/calc/timer-stopwatch.html', name:'Timer & Stopwatch'},
    {icon:'🎲', href:'/fun/dice-roller.html', name:'Dice Roller'},
    {icon:'👥', href:'/fun/name-picker.html', name:'Name Picker'},
    {icon:'🎯', href:'/fun/decision-wheel.html', name:'Decision Wheel'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
