<script type="application/ld+json">{"@context":"https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is PPI vs DPI?", "acceptedAnswer": {"@type": "Answer", "text": "PPI (Pixels Per Inch) measures digital display sharpness — the number of pixels packed into one inch of a screen. DPI (Dots Per Inch) originally referred to printed dots but is often used interchangeably with PPI today. A 1080p 24″ monitor has about 92 PPI, while a 4K 27″ display has around 163 PPI."}}, {"@type": "Question", "name": "How do I calculate PPI?", "acceptedAnswer": {"@type": "Answer", "text": "PPI = √(horizontalPixels² + verticalPixels²) / diagonalInches. For a 1920×1080 monitor with a 24″ diagonal: √(1920² + 1080²) / 24 = √(3,686,400 + 1,166,400) / 24 = √4,852,800 / 24 ≈ 92 PPI."}}, {"@type": "Question", "name": "Why does PPI matter?", "acceptedAnswer": {"@type": "Answer", "text": "PPI determines how sharp text and images look. Higher PPI means individual pixels become invisible at normal viewing distance. Apple calls displays above ~220 PPI 'Retina' because the pixels can no longer be seen. For design work, photo editing and reading comfort, 100+ PPI is recommended."}}, {"@type": "Question", "name": "What is a good PPI for a phone?", "acceptedAnswer": {"@type": "Answer", "text": "Most modern phones have 400-500+ PPI. The iPhone 15 Pro Max has 460 PPI, the Samsung Galaxy S24 Ultra has 501 PPI. Anything above 300 PPI is generally considered sharp at typical phone-holding distances."}}]}</script>

<script>
GZI18n.register({
  en: {
    toolTitle: 'DPI / PPI Calculator',
    toolDesc: 'Instantly calculate pixels per inch (PPI), dot pitch, physical dimensions and sharpness from any resolution and diagonal. Includes presets for monitors, laptops and phones.',
    lblW: 'Width (px)', lblH: 'Height (px)', lblD: 'Diagonal (inches)', lblU: 'Unit',
    lblPpi: 'PPI / DPI', lblDotpitch: 'Dot Pitch', lblPhysw: 'Physical Width',
    lblPhysh: 'Physical Height', lblAspect: 'Aspect Ratio', lblTotalpx: 'Total Pixels', lblQuality: 'Sharpness',
    dpDesc: 'Distance between pixels', pwDesc: 'Screen width',
    phDesc: 'Screen height', arDesc: 'Width : Height', tpDesc: 'Megapixels',
    qDesc: 'Visual quality at 30cm',
    thR: 'Resolution', thD: 'Diagonal', thPpi: 'PPI', thT: 'Type',
    qualityLow: 'Low', qualityMed: 'Good', qualityHigh: 'Sharp', qualityRetina: 'Retina',
    step1: 'Enter the resolution (width × height in pixels)',
    step2: 'Enter the diagonal size in inches or centimeters',
    step3: 'Read PPI, dot pitch, physical size and sharpness instantly',
    step4: 'Use presets for common monitors, laptops and phones',
  },
  zh: {
    toolTitle: 'DPI / PPI 计算器',
    toolDesc: '从分辨率和对角线尺寸即时计算每英寸像素数（PPI）、点距、物理尺寸和清晰度。含显示器、笔记本和手机预设。',
    lblW: '宽度（像素）', lblH: '高度（像素）', lblD: '对角线（英寸）', lblU: '单位',
    lblPpi: 'PPI / DPI', lblDotpitch: '点距', lblPhysw: '物理宽度',
    lblPhysh: '物理高度', lblAspect: '宽高比', lblTotalpx: '总像素', lblQuality: '清晰度',
    dpDesc: '像素间距离', pwDesc: '屏幕宽度',
    phDesc: '屏幕高度', arDesc: '宽 : 高', tpDesc: '百万像素',
    qDesc: '30cm 视觉清晰度',
    thR: '分辨率', thD: '对角线', thPpi: 'PPI', thT: '类型',
    qualityLow: '较低', qualityMed: '良好', qualityHigh: '清晰', qualityRetina: '视网膜',
    step1: '输入分辨率（宽 × 高 像素）',
    step2: '输入对角线尺寸（英寸或厘米）',
    step3: '即时查看 PPI、点距、物理尺寸和清晰度',
    step4: '使用显示器、笔记本和手机的常用预设',
  }
});

const { $, t } = GZ;
const $w = $('#w'), $h = $('#h'), $d = $('#d'), $u = $('#u');

function gcd(a, b) { return b === 0 ? a : gcd(b, a % b); }

function qualityLabel(ppi) {
  if (ppi >= 220) return { l: t('qualityRetina'), n: 4 };
  if (ppi >= 150) return { l: t('qualityHigh'), n: 3 };
  if (ppi >= 100) return { l: t('qualityMed'), n: 2 };
  return { l: t('qualityLow'), n: 1 };
}

function compute() {
  let w = +$w.value || 0, h = +$h.value || 0, d = +$d.value || 0;
  let unit = $u.value;
  if (unit === 'cm') d = d / 2.54;
  if (w <= 0 || h <= 0 || d <= 0) {
    $('#ppiVal').textContent = '—';
    $('#ppiSub').textContent = '';
    $('#dotPitch').textContent = '—';
    $('#physW').textContent = '—';
    $('#physH').textContent = '—';
    $('#aspect').textContent = '—';
    $('#totalPx').textContent = '—';
    $('#quality').textContent = '—';
    return;
  }
  const diag = Math.sqrt(w * w + h * h);
  const ppi = diag / d;
  const dotPitchMm = 25.4 / ppi;
  const physW = w / ppi;
  const physH = h / ppi;
  const g = gcd(w, h);
  const aw = w / g, ah = h / g;
  const mp = (w * h) / 1000000;
  const q = qualityLabel(ppi);

  $('#ppiVal').textContent = ppi.toFixed(1);
  $('#ppiSub').textContent = `${w} × ${h} on ${$d.value} ${unit === 'cm' ? 'cm' : '″'}`;
  $('#dotPitch').textContent = dotPitchMm.toFixed(3) + ' mm';
  $('#physW').textContent = (unit === 'cm' ? (physW * 2.54).toFixed(2) : physW.toFixed(2)) + ' ' + (unit === 'cm' ? 'cm' : 'in');
  $('#physH').textContent = (unit === 'cm' ? (physH * 2.54).toFixed(2) : physH.toFixed(2)) + ' ' + (unit === 'cm' ? 'cm' : 'in');
  $('#aspect').textContent = `${aw} : ${ah}`;
  $('#totalPx').textContent = mp.toFixed(2) + ' MP';
  $('#quality').textContent = q.l;
  $('#tbody').innerHTML = `
    <tr><td>${w} × ${h}</td><td>${$d.value} ${unit === 'cm' ? 'cm' : '″'}</td><td>${ppi.toFixed(1)}</td><td>${q.l}</td></tr>
  `;
}

$w.addEventListener('input', compute);
$h.addEventListener('input', compute);
$d.addEventListener('input', compute);
$u.addEventListener('change', compute);

document.querySelectorAll('#presets button').forEach(btn => {
  btn.addEventListener('click', () => {
    const [d, w, h] = btn.dataset.p.split('-');
    $d.value = d;
    $w.value = w;
    $h.value = h;
    $u.value = 'in';
    compute();
  });
});

$('#toolbar').innerHTML = `<button class="gz-btn gz-btn-secondary" onclick="$('#w').value=1920;$('#h').value=1080;$('#d').value=24;$('#u').value='in';compute()">${t('clear')}</button>`;

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1', 'step2', 'step3', 'step4'],
  related: [
    {icon: '📺', href: '/calc/tv-size-calculator.html', name: 'TV Size Calculator'},
    {icon: '📐', href: '/calc/aspect-ratio.html', name: 'Aspect Ratio Calculator'},
    {icon: '🖥️', href: '/dev/screen-resolution.html', name: 'Screen Resolution Tester'},
    {icon: '🔍', href: '/dev/browser-info.html', name: 'Browser Info Tool'},
  ]
});
compute();
</script>
