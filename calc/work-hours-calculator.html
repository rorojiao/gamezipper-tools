<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "How do I calculate my work hours?", "acceptedAnswer": {"@type": "Answer", "text": "Enter your clock-in and clock-out times plus the length of your unpaid break. The calculator subtracts the break and shows total hours worked, in both HH:MM and decimal format ready for payroll."}}, {"@type": "Question", "name": "Does it handle overnight shifts?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. If the end time is earlier than the start time, the calculator assumes you worked past midnight and adds 24 hours so a 10 PM to 6 AM shift correctly returns 8 hours."}}, {"@type": "Question", "name": "What is decimal hours and why does payroll use it?", "acceptedAnswer": {"@type": "Answer", "text": "Decimal hours convert minutes into a fraction of an hour, so 7h 45m becomes 7.75 hours. Payroll systems multiply decimal hours by your hourly rate, which is why both formats are shown."}}, {"@type": "Question", "name": "Can I total up hours across multiple days?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. Switch to Multiple Days mode, add a row per day, and the calculator sums the total hours and decimal hours across every row you fill in."}}]}</script>

<body>
<div class="gz-container">

<script>
GZI18n.register({
  en: {
    toolTitle: 'Work Hours Calculator',
    toolDesc: 'Enter your start and end time plus a break to get hours worked in HH:MM, decimal hours and minutes. Handles overnight shifts and multiple days.',
    lblMode: 'Mode',
    lblStart: 'Start time',
    lblEnd: 'End time',
    lblBreak: 'Break (min)',
    lblTotal: 'Total time worked',
    lblDec: 'Decimal hours',
    lblMin: 'Total minutes',
    hint: 'Decimal hours = minutes ÷ 60. Use it when multiplying by your hourly rate for payroll.',
    btnExample: 'Load Example',
    btnClear: 'Clear',
    dayLabel: 'Day',
    delTitle: 'Remove',
    step1: 'Choose Single shift or Multiple days mode',
    step2: 'Enter the start time, end time and unpaid break in minutes',
    step3: 'Read the total hours in HH:MM, decimal and minute formats',
    step4: 'Multiply decimal hours by your hourly rate to get paid amount',
  },
  zh: {
    toolTitle: '工时计算器',
    toolDesc: '输入上下班时间和休息时长，即时得到工作时长（时:分、小数小时和分钟）。支持跨夜班次和多天累计。',
    lblMode: '模式',
    lblStart: '上班时间',
    lblEnd: '下班时间',
    lblBreak: '休息（分钟）',
    lblTotal: '总工作时长',
    lblDec: '小数小时',
    lblMin: '总分钟',
    hint: '小数小时 = 分钟 ÷ 60。计算工资时用它乘以你的时薪即可。',
    btnExample: '加载示例',
    btnClear: '清空',
    dayLabel: '第',
    delTitle: '删除',
    step1: '选择单次班次或多天累计模式',
    step2: '输入上班、下班时间和无薪休息分钟数',
    step3: '查看时:分、小数小时和分钟三种格式的总工时',
    step4: '用小数小时乘以时薪即可得到应付工资',
  }
});

const { $, t } = GZ;

function calcShift(inT, outT, brk) {
  if (!inT || !outT) return 0;
  const [ih, im] = inT.split(':').map(Number);
  const [oh, om] = outT.split(':').map(Number);
  let mins = (oh * 60 + om) - (ih * 60 + im);
  if (mins < 0) mins += 24 * 60;
  mins -= brk || 0;
  return Math.max(0, mins);
}

function fmtHMM(mins) {
  const h = Math.floor(mins / 60);
  const m = Math.round(mins % 60);
  return `${h}h ${String(m).padStart(2,'0')}m`;
}

function calc() {
  let totalMin = 0;
  if ($('#mode').value === 'single') {
    totalMin = calcShift($('#start').value, $('#end').value, parseFloat($('#break').value) || 0);
  } else {
    document.querySelectorAll('#multi .item').forEach(item => {
      const inT = item.querySelector('.i1').value;
      const outT = item.querySelector('.i2').value;
      const brk = parseFloat(item.querySelector('.i3').value) || 0;
      totalMin += calcShift(inT, outT, brk);
    });
  }
  $('#total').textContent = fmtHMM(totalMin);
  $('#decimal').textContent = (totalMin / 60).toFixed(2);
  $('#minutes').textContent = totalMin;
}

let rowIdx = 0;
function addRow(v) {
  v = v || ['', '', '30'];
  const id = ++rowIdx;
  const div = document.createElement('div');
  div.className = 'item';
  div.innerHTML = `<input class="i1" type="time" value="${v[0]}"><input class="i2" type="time" value="${v[1]}"><input class="i3" type="number" min="0" step="5" value="${v[2]}"><button class="del" title="${t('delTitle')}">×</button>`;
  div.querySelectorAll('input').forEach(i => i.addEventListener('input', calc));
  div.querySelector('.del').addEventListener('click', () => { div.remove(); calc(); });
  $('#multi').appendChild(div);
  calc();
}

function setMode() {
  const m = $('#mode').value;
  $('#singleBlock').style.display = m === 'single' ? '' : 'none';
  $('#multiBlock').style.display = m === 'multi' ? '' : 'none';
  if (m === 'multi' && $('#multi').children.length === 0) {
    addRow(['09:00','17:30','30']); addRow(['09:00','17:00','30']);
  }
  calc();
}

function loadExample() {
  $('#mode').value = 'single';
  $('#start').value = '08:30'; $('#end').value = '17:15'; $('#break').value = 45;
  setMode();
}

function doClear() {
  if ($('#mode').value === 'single') {
    $('#start').value = ''; $('#end').value = ''; $('#break').value = '0';
  } else {
    $('#multi').innerHTML = ''; addRow();
  }
  calc();
}

['#mode','#start','#end','#break'].forEach(s => $(s).addEventListener('input', setMode));

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="loadExample()">${t('btnExample')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('btnClear')}</button>`;
$('#hint').textContent = t('hint');

setMode();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'⏰',href:'/calc/time-calculator.html',name:'Time Calculator'},
    {icon:'📋',href:'/calc/time-card-calculator.html',name:'Time Card'},
    {icon:'⏱️',href:'/calc/overtime-calculator.html',name:'Overtime'},
    {icon:'💼',href:'/calc/salary-calculator.html',name:'Salary Calc'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
