<script>
GZI18n.register({
  en: {
    toolTitle: 'Email Permutation Finder',
    toolDesc: 'Generate every common business email format from a first name, last name and company domain. 30+ patterns like first.last@, flast@, firstl@ — copy all in one click. 100% in your browser.',
    lblFirst: 'First name',
    lblLast: 'Last name',
    lblDomain: 'Company domain',
    lblMiddle: 'Middle name or initial',
    lblOut: 'Possible email addresses',
    generate: 'Generate Emails',
    copyAll: 'Copy All',
    empty: 'Enter a name and domain to begin.',
    step1: 'Enter the person\'s first and last name',
    step2: 'Add the company domain (e.g. acme.com)',
    step3: 'Click "Generate Emails" to list all common formats',
    step4: 'Use "Copy All" to grab every address, or copy one at a time',
    legal: 'Note: this tool only guesses likely addresses. Sending unsolicited bulk email may violate CAN-SPAM / GDPR. Always get consent first.',
    results: 'addresses',
  },
  zh: {
    toolTitle: '企业邮箱地址猜测器',
    toolDesc: '根据名字、姓氏和企业域名，生成所有常见的企业邮箱格式。first.last@、flast@、firstl@ 等 30+ 种组合 — 一键全部复制。完全在浏览器中运行。',
    lblFirst: '名字',
    lblLast: '姓氏',
    lblDomain: '公司域名',
    lblMiddle: '中间名或首字母',
    lblOut: '可能的邮箱地址',
    generate: '生成邮箱',
    copyAll: '全部复制',
    empty: '请输入姓名和域名开始。',
    step1: '输入对方的名字和姓氏',
    step2: '填写公司域名（例如 acme.com）',
    step3: '点击「生成邮箱」列出所有常见格式',
    step4: '使用「全部复制」获取全部地址，或逐个复制',
    legal: '注意：本工具仅猜测可能的地址。群发未经请求的邮件可能违反 CAN-SPAM / GDPR，请务必先获得同意。',
    results: '个地址',
  }
});

const { $, copyText, t, showToast } = GZ;

function escapeHtml(s){return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

function clean(s){return (s||'').toLowerCase().trim().replace(/[^a-z0-9.-]/g,'');}
function cleanDomain(s){return (s||'').toLowerCase().trim().replace(/^@/,'').replace(/[^a-z0-9.-]/g,'');}

function generate(){
  const first = clean($('#first').value);
  const last = clean($('#last').value);
  const middle = clean($('#middle').value);
  const domain = cleanDomain($('#domain').value);
  const out = $('#output');
  const countEl = $('#count');
  if ((!first && !last) || !domain){ out.innerHTML = `<p style="color:var(--text2)">${escapeHtml(t('empty'))}</p>`; countEl.textContent=''; return; }

  const f = first, l = last, m = middle, fi = f[0]||'', li = l[0]||'', mi = m[0]||'';
  // Common corporate email patterns
  const patterns = [
    [`${f}.${l}`, 'first.last'],
    [`${f}${l}`, 'firstlast'],
    [`${f}_${l}`, 'first_last'],
    [`${f}-${l}`, 'first-last'],
    [`${f}`, 'first'],
    [`${l}`, 'last'],
    [`${fi}${l}`, 'flast'],
    [`${f}${li}`, 'firstl'],
    [`${fi}.${l}`, 'f.last'],
    [`${f}.${li}`, 'f.l'],
    [`${fi}${li}`, 'fl'],
    [`${fi}_${l}`, 'f_last'],
    [`${l}.${f}`, 'last.first'],
    [`${l}${f}`, 'lastfirst'],
    [`${l}${fi}`, 'lastf'],
    [`${l}.${fi}`, 'last.f'],
    [`${l}_${f}`, 'last_first'],
    [`${l}-${f}`, 'last-first'],
    [`${f}.${l}.${m}`, 'first.last.m'],
    [`${f}${mi}${l}`, 'fmlast'],
    [`${f}.${li}.${mi}`, 'f.l.m'],
    [`${f}${l}${mi}`, 'firstlastm'],
    [`hello.${l}`, 'hello.last'],
    [`contact.${l}`, 'contact.last'],
    [`${f}.admin`, 'first.admin'],
    [`admin.${l}`, 'admin.last'],
    [`hr.${l}`, 'hr.last'],
    [`info.${l}`, 'info.last'],
    [`sales.${l}`, 'sales.last'],
    [`support.${l}`, 'support.last'],
    [`marketing.${l}`, 'marketing.last'],
    [`${f}@${f}`, 'first@first'],
  ];

  // dedupe, only keep non-empty local parts
  const seen = new Set();
  const emails = [];
  for (const [local, name] of patterns){
    if (!local) continue;
    const addr = `${local}@${domain}`;
    if (seen.has(addr)) continue;
    seen.add(addr);
    emails.push({addr, name});
  }

  countEl.textContent = `${emails.length} ${t('results')}`;
  out.innerHTML = emails.map(e=>`<div class="email-row"><span class="em">${escapeHtml(e.addr)}</span><span class="pattern">${escapeHtml(e.name)}</span><button class="gz-btn gz-btn-secondary" data-em="${escapeHtml(e.addr)}">${t('copy')}</button></div>`).join('');
  out.querySelectorAll('[data-em]').forEach(btn=>{
    btn.addEventListener('click', ()=>{ copyText(btn.getAttribute('data-em')); showToast(t('copied')); });
  });

  // store for copy-all
  out.dataset.all = emails.map(e=>e.addr).join('\n');
  // add copy-all button at top
  const ca = document.createElement('div');
  ca.style.cssText='margin-bottom:10px';
  ca.innerHTML = `<button class="gz-btn" id="copy-all">${t('copyAll')} (${emails.length})</button>`;
  out.insertBefore(ca, out.firstChild);
  $('#copy-all').addEventListener('click', ()=>{ copyText(out.dataset.all); showToast(t('copied')); });
}

$('#gen-btn').addEventListener('click', generate);
['first','last','domain'].forEach(id=>$('#'+id).addEventListener('keydown', e=>{ if(e.key==='Enter') generate(); }));

$('#lbl-out').textContent = t('lblOut');

GZ.renderToolPage({
  category: 'dev',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'✉️', href:'/text/email-validator.html', name:'Email Validator'},
    {icon:'✉️', href:'/text/email-extractor.html', name:'Email Extractor'},
    {icon:'✉️', href:'/text/email-signature.html', name:'Email Signature'},
    {icon:'🤖', href:'/dev/mock-data-generator.html', name:'Mock Data Generator'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
