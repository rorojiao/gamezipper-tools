    cursorColor: '光标颜色',
    loop: '循环动画',
    fontFamily: '字体',
    step1: '输入要动画的文本',
    step2: '调整速度、字号和颜色',
    step3: '开启或关闭循环',
    step4: '复制 CSS 和 HTML 到你的项目',

const { $, copyText, t } = GZ;
var SC = '<' + '/script>';

function generate() {
  var text = $('#opt-text').value || 'Hello World';
  var duration = parseInt($('#opt-duration').value) || 4;
  var fontSize = parseInt($('#opt-fontsize').value) || 32;
  var textColor = $('#opt-textcolor').value || '#4ecdc4';
  var cursorColor = $('#opt-cursorcolor').value || '#4ecdc4';
  var fontFamily = $('#opt-font').value || "'Courier New', monospace";
  var loop = $('#opt-loop').checked;
  var charCount = text.length;
  var halfDur = duration / 2;

  // Update preview
  var animName = loop ? 'gz-tw' : 'gz-tw-once';
  var blinkName = 'gz-blink';
  var previewEl = $('#preview-box');
  var loopVal = loop ? 'infinite' : '1';
  var loopFill = loop ? 'forwards' : 'forwards';
  
  // Remove old style, add new
  var oldStyle = document.getElementById('gz-preview-style');
  if (oldStyle) oldStyle.remove();
  var styleEl = document.createElement('style');
  styleEl.id = 'gz-preview-style';
  styleEl.textContent = [
    '@keyframes gz-tw { 0% { width: 0 } 50%, 100% { width: ' + (charCount * 0.6) + 'em } }',
    '@keyframes gz-tw-once { 0% { width: 0 } 100% { width: ' + (charCount * 0.6) + 'em } }',
    '@keyframes gz-blink { 50% { border-color: transparent } }',
    '.gz-tw-preview { font-family: ' + fontFamily + '; font-size: ' + fontSize + 'px; color: ' + textColor + '; border-right: 3px solid ' + cursorColor + '; white-space: nowrap; overflow: hidden; animation: gz-tw ' + duration + 's steps(' + charCount + ') ' + loopVal + ', gz-blink 0.7s step-end infinite; display: inline-block; max-width: 100%; }'
  ].join('\n');
  document.head.appendChild(styleEl);
  previewEl.innerHTML = '<span class="gz-tw-preview">' + text + '</span>';

  // Generate code
  var code = [
    '<!-- HTML -->',
    '<div class="typewriter">' + text + '</div>',
    '',
    '/* CSS */',
    '.typewriter {',
    '  font-family: ' + fontFamily + ';',
    '  font-size: ' + fontSize + 'px;',
    '  color: ' + textColor + ';',
    '  border-right: 3px solid ' + cursorColor + ';',
    '  white-space: nowrap;',
    '  overflow: hidden;',
    '  display: inline-block;',
    '  animation: typing ' + duration + 's steps(' + charCount + ', end) ' + loopVal + ',',
    '             blink 0.7s step-end infinite;',
    '}',
    '',
    '@keyframes typing {',
    '  from { width: 0 }',
    '  to { width: ' + (charCount * 0.6) + 'em }',
    '}',
    '',
    '@keyframes blink {',
    '  50% { border-color: transparent }',
    '}'
  ].join('\n');

  $('#output').textContent = code;
}

].join('\n');

</script>
