<script>
GZI18n.register({
  en: {
    toolTitle: 'CSS Glassmorphism Generator',
    toolDesc: 'Create beautiful frosted glass effects visually — adjust blur, opacity, border and colors to generate ready-to-use CSS.',
    blur: 'Blur',
    opacity: 'Background Opacity',
    border: 'Border Opacity',
    radius: 'Border Radius',
    shadow: 'Box Shadow',
    padding: 'Padding',
    bgColor: 'Background',
    copy: 'Copy CSS',
    reset: 'Reset',
    step1: 'Adjust sliders to control blur, opacity and border radius',
    step2: 'Pick a background color for the glass effect',
    step3: 'Preview changes in real-time on the card above',
    step4: 'Click Copy CSS to get the code for your project',
  },
  zh: {
    toolTitle: 'CSS 玻璃拟态生成器',
    toolDesc: '可视化创建精美的毛玻璃效果 — 调整模糊、透明度、边框和颜色，生成可直接使用的 CSS 代码。',
    blur: '模糊度',
    opacity: '背景透明度',
    border: '边框透明度',
    radius: '圆角半径',
    shadow: '阴影',
    padding: '内边距',
    bgColor: '背景色',
    copy: '复制 CSS',
    reset: '重置',
    step1: '调整滑块控制模糊度、透明度和圆角',
    step2: '选择毛玻璃效果的背景颜色',
    step3: '实时预览上方卡片的变化效果',
    step4: '点击「复制 CSS」获取项目代码',
  }
});

const { $, copyText, t } = GZ;

const defaults = {blur:16, opacity:15, border:25, radius:16, shadow:15, padding:32, bgR:255, bgG:255, bgB:255};
let vals = {...defaults};

const sliders = [
  {key:'blur', min:0, max:40, step:1, label:t('blur'), unit:'px'},
  {key:'opacity', min:0, max:50, step:1, label:t('opacity'), unit:'%'},
  {key:'border', min:0, max:80, step:1, label:t('border'), unit:'%'},
  {key:'radius', min:0, max:40, step:1, label:t('radius'), unit:'px'},
  {key:'shadow', min:0, max:50, step:1, label:t('shadow'), unit:''},
  {key:'padding', min:0, max:64, step:1, label:t('padding'), unit:'px'},
];

const controlsEl = $('#controls');
controlsEl.innerHTML = sliders.map(s => `
  <label>${s.label}: <strong id="val-${s.key}">${vals[s.key]}${s.unit}</strong>
    <input type="range" min="${s.min}" max="${s.max}" step="${s.step}" value="${vals[s.key]}" id="sl-${s.key}" oninput="updateVal('${s.key}',this.value)">
  </label>
`).join('') + `
  <label>${t('bgColor')}
    <div class="ctrl-row">
      <input type="color" id="bg-color" value="#ffffff" onchange="updateBgColor(this.value)">
      <span id="bg-hex">#ffffff</span>
    </div>
  </label>`;

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return {r,g,b};
}

function updateBgColor(hex) {
  const rgb = hexToRgb(hex);
  vals.bgR = rgb.r; vals.bgG = rgb.g; vals.bgB = rgb.b;
  $('#bg-hex').textContent = hex;
  render();
}

function updateVal(key, val) {
  vals[key] = parseInt(val);
  const s = sliders.find(x => x.key === key);
  $(`#val-${key}`).textContent = val + (s ? s.unit : '');
  render();
}

function render() {
  const card = $('#glass-card');
  const bg = `rgba(${vals.bgR},${vals.bgG},${vals.bgB},${vals.opacity/100})`;
  const brd = `rgba(${vals.bgR},${vals.bgG},${vals.bgB},${vals.border/100})`;
  const shadow = `0 8px ${vals.shadow * 2}px rgba(0,0,0,0.${vals.shadow > 9 ? vals.shadow : '0'+vals.shadow})`;

  card.style.backdropFilter = `blur(${vals.blur}px)`;
  card.style.webkitBackdropFilter = `blur(${vals.blur}px)`;
  card.style.background = bg;
  card.style.border = `1px solid ${brd}`;
  card.style.borderRadius = vals.radius + 'px';
  card.style.boxShadow = shadow;
  card.style.padding = vals.padding + 'px';

  const css = `.glass-card {
  backdrop-filter: blur(${vals.blur}px);
  -webkit-backdrop-filter: blur(${vals.blur}px);
  background: ${bg};
  border: 1px solid ${brd};
  border-radius: ${vals.radius}px;
  box-shadow: ${shadow};
  padding: ${vals.padding}px;
}`;

  $('#code-output').textContent = css;
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="copyText($('#code-output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="vals={...defaults};sliders.forEach(s=>{$('#sl-'+s.key).value=defaults[s.key];$('#val-'+s.key).textContent=defaults[s.key]+s.unit});$('#bg-color').value='#ffffff';$('#bg-hex').textContent='#ffffff';render()">${t('reset')}</button>`;

render();

GZ.renderToolPage({
  category: 'css',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🌈', href:'/css-tools/gradient.html', name:'CSS Gradient'},
    {icon:'🔲', href:'/css-tools/shadow.html', name:'Box Shadow'},
    {icon:'🔘', href:'/css-tools/border-radius.html', name:'Border Radius'},
    {icon:'🫧', href:'/css-tools/svg-blob.html', name:'SVG Blob'},
  ]
});
</script>
