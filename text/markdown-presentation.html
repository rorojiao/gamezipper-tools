const { $, copyText, t } = GZ;
let currentSlide = 0;
let slides = [];
let theme = 'light';

const EXAMPLE = `# Welcome to Markdown Slides ✨

// ── minimal markdown → HTML ──
function mdToHtml(md) {
  // Extract fenced code blocks first to protect them
  const codeBlocks = [];
  md = md.replace(/```(\w*)\n([\s\S]*?)```/g, (m, lang, code) => {
    codeBlocks.push(`<pre style="background:rgba(0,0,0,.08);padding:12px;border-radius:6px;overflow:auto;font-size:.85em"><code>${escapeHtml(code.trimEnd())}</code></pre>`);
    return `\u0000CODE${codeBlocks.length - 1}\u0000`;
  });

  // Tables: simple pipe-table support
  md = md.replace(/(^\|.+\|\n\|[\s\-:|]+\|\n(?:\|.+\|\n?)+)/gm, (m) => {
    const lines = m.trim().split('\n');
    const header = lines[0].split('|').slice(1, -1).map(c => c.trim());
    const rows = lines.slice(2).map(r => r.split('|').slice(1, -1).map(c => c.trim()));
    let html = '<table><thead><tr>' + header.map(h => `<th>${inlineMd(h)}</th>`).join('') + '</tr></thead><tbody>';
    for (const r of rows) html += '<tr>' + r.map(c => `<td>${inlineMd(c)}</td>`).join('') + '</tr>';
    html += '</tbody></table>';
    return html + '\n';
  });

  const lines = md.split('\n');
  let html = '';
  let inList = null; // 'ul' or 'ol'
  let inBlockquote = false;

  for (const raw of lines) {
    const line = raw;
    if (/^\s*$/.test(line)) { if (inList) { html += `</${inList}>`; inList = null; } if (inBlockquote) { html += '</blockquote>'; inBlockquote = false; } continue; }
    if (/^###\s+/.test(line)) { if (inList) { html += `</${inList}>`; inList = null; } html += `<h3>${inlineMd(line.replace(/^###\s+/, ''))}</h3>`; continue; }
    if (/^##\s+/.test(line)) { if (inList) { html += `</${inList}>`; inList = null; } html += `<h2>${inlineMd(line.replace(/^##\s+/, ''))}</h2>`; continue; }
    if (/^#\s+/.test(line)) { if (inList) { html += `</${inList}>`; inList = null; } html += `<h1>${inlineMd(line.replace(/^#\s+/, ''))}</h1>`; continue; }
    if (/^---\s*$/.test(line)) { if (inList) { html += `</${inList}>`; inList = null; } continue; }
    if (/^>\s+/.test(line)) { if (inList) { html += `</${inList}>`; inList = null; } if (!inBlockquote) { html += '<blockquote>'; inBlockquote = true; } html += `${inlineMd(line.replace(/^>\s+/, ''))} `; continue; }
    else if (inBlockquote) { html += '</blockquote>'; inBlockquote = false; }
    const olMatch = line.match(/^\s*\d+\.\s+(.*)/);
    const ulMatch = line.match(/^\s*[-*]\s+(.*)/);
    if (olMatch) { if (inList !== 'ol') { if (inList) html += `</${inList}>`; html += '<ol>'; inList = 'ol'; } html += `<li>${inlineMd(olMatch[1])}</li>`; continue; }
    if (ulMatch) { if (inList !== 'ul') { if (inList) html += `</${inList}>`; html += '<ul>'; inList = 'ul'; } html += `<li>${inlineMd(ulMatch[1])}</li>`; continue; }
    if (inList) { html += `</${inList}>`; inList = null; }
    if (/^\u0000CODE\d+\u0000$/.test(line.trim())) { html += line.trim() + '\n'; continue; }
    html += `<p>${inlineMd(line)}</p>`;
  }
  if (inList) html += `</${inList}>`;
  if (inBlockquote) html += '</blockquote>';

  // restore code blocks
  html = html.replace(/\u0000CODE(\d+)\u0000/g, (m, i) => codeBlocks[+i]);
  return html;
}

function inlineMd(s) {
  return s
    .replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img alt="$1" src="$2">')
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>')
    .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
    .replace(/\*([^*]+)\*/g, '<em>$1</em>')
    .replace(/`([^`]+)`/g, '<code>$1</code>');
}

function escapeHtml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function parseSlides() {
  const md = $('#mdInput').value;
  slides = md.split(/\n---\s*\n/).map(s => s.trim()).filter(Boolean);
  if (slides.length === 0) slides = [''];
  if (currentSlide >= slides.length) currentSlide = slides.length - 1;
}

function renderSlide() {
  if (!slides.length) return;
  const html = mdToHtml(slides[currentSlide]);
  $('#slideInner').innerHTML = html;
  $('#counter').textContent = `${currentSlide + 1} / ${slides.length}`;
}

function render() {
  parseSlides();
  renderSlide();
}

function go(n) {
  currentSlide = Math.max(0, Math.min(slides.length - 1, n));
  renderSlide();
}

function setTheme(name) {
  theme = name;
  const stage = $('#stage');
  stage.className = 'slide-stage' + (name === 'light' ? '' : ' ' + name);
  document.querySelectorAll('.theme-chip').forEach(c => c.classList.toggle('active', c.dataset.theme === name));
}

function present() {
  const stage = $('#stage');
  const inner = $('#slideInner');
  const overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;inset:0;background:#000;z-index:99999;display:flex;align-items:center;justify-content:center;flex-direction:column;padding:40px;box-sizing:border-box';
  const slideClone = document.createElement('div');
  slideClone.className = 'slide-inner';
  slideClone.style.cssText = 'width:100%;max-width:1100px;aspect-ratio:16/9;background:' + (theme === 'dark' ? '#1a1a2e' : theme === 'sepia' ? '#f4ecd8' : theme === 'galaxy' ? 'linear-gradient(135deg,#0f0c29,#302b63,#24243e)' : '#fff') + ';color:' + (theme === 'light' || theme === 'sepia' ? '#222' : '#eee') + ';padding:5%;box-sizing:border-box;display:flex;flex-direction:column;justify-content:center;font-family:sans-serif;line-height:1.5;border-radius:8px;overflow:hidden';
  slideClone.innerHTML = inner.innerHTML;
  const hint = document.createElement('div');
  hint.style.cssText = 'position:fixed;bottom:16px;left:50%;transform:translateX(-50%);color:#888;font-size:.8em';
  hint.textContent = '← → navigate · Esc to exit';
  const close = () => { document.removeEventListener('keydown', onKey); overlay.remove(); };
  const onKey = (e) => {
    if (e.key === 'Escape') close();
    else if (e.key === 'ArrowRight' || e.key === ' ' || e.key === 'PageDown') { go(currentSlide + 1); slideClone.innerHTML = $('#slideInner').innerHTML; }
    else if (e.key === 'ArrowLeft' || e.key === 'PageUp') { go(currentSlide - 1); slideClone.innerHTML = $('#slideInner').innerHTML; }
  };
  overlay.appendChild(slideClone);
  overlay.appendChild(hint);
  document.body.appendChild(overlay);
  document.addEventListener('keydown', onKey);
  overlay.addEventListener('click', (e) => { if (e.target === overlay) close(); });
}

function copyHtml() {
  const allHtml = slides.map((s, i) => `<section class="slide" data-slide="${i + 1}">${mdToHtml(s)}</section>`).join('\n');
  copyText(allHtml);
}

function downloadHtml() {
  const allHtml = slides.map((s, i) => `<section class="slide" data-slide="${i + 1}">${mdToHtml(s)}</section>`).join('\n');
  const standalone = `<!DOCTYPE html>
<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Markdown Presentation</title>
<style>
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:${theme === 'dark' ? '#1a1a2e' : theme === 'sepia' ? '#f4ecd8' : theme === 'galaxy' ? '#24243e' : '#fff'};color:${theme === 'light' || theme === 'sepia' ? '#222' : '#eee'}}
.slide{min-height:100vh;display:flex;flex-direction:column;justify-content:center;padding:8vh 10vw;page-break-after:always;line-height:1.5}
.slide h1{font-size:3em;margin:0 0 .3em}.slide h2{font-size:2em;margin:0 0 .4em}.slide h3{font-size:1.4em}
.slide ul,.slide ol{padding-left:1.5em}.slide li{margin:.3em 0;font-size:1.3em}
.slide p{font-size:1.3em}.slide code{background:rgba(128,128,128,.2);padding:.1em .3em;border-radius:3px}
.slide pre{background:rgba(128,128,128,.15);padding:16px;border-radius:8px;overflow:auto;font-size:1em}
.slide blockquote{border-left:4px solid currentColor;margin:.5em 0;padding:.3em 1em;opacity:.8;font-style:italic;font-size:1.3em}
.slide table{border-collapse:collapse;font-size:1.1em}.slide th,.slide td{border:1px solid rgba(128,128,128,.5);padding:6px 12px}
.slide a{color:#3498db}.slide img{max-width:100%;max-height:50vh}
@media print{.slide{min-height:auto}}
</style></head><body>
${allHtml}
</body></html>`;
  const blob = new Blob([standalone], { type: 'text/html;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'presentation.html';
  a.click();
  URL.revokeObjectURL(url);
}

$('#mdInput').addEventListener('input', render);
$('#prevBtn').addEventListener('click', () => go(currentSlide - 1));
$('#nextBtn').addEventListener('click', () => go(currentSlide + 1));
document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'TEXTAREA' || e.target.tagName === 'INPUT') return;
  if (e.key === 'ArrowRight') go(currentSlide + 1);
  else if (e.key === 'ArrowLeft') go(currentSlide - 1);
});

// Theme row
$('#themeRow').innerHTML = ['light','dark','sepia','galaxy'].map(name => {
  const key = 'theme' + name.charAt(0).toUpperCase() + name.slice(1);
  return `<div class="theme-chip${name === 'light' ? ' active' : ''}" data-theme="${name}">${t(key)}</div>`;
}).join('');
document.querySelectorAll('.theme-chip').forEach(c => c.addEventListener('click', () => setTheme(c.dataset.theme)));

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="present()">${t('present')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="copyHtml()">${t('copyHtml')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="downloadHtml()">${t('download')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="() => { document.getElementById('mdInput').value = EXAMPLE; render(); }">${t('example')}</button>`;

// Fix example button (onclick can't see EXAMPLE directly in this scope — use global)
window.loadExample = function() { $('#mdInput').value = EXAMPLE; render(); };
$('#toolbar').children[3].onclick = window.loadExample;

$('#mdInput').value = EXAMPLE;
GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📝', href:'/text/markdown-editor.html', name:'Markdown Editor'},
    {icon:'📄', href:'/dev/markdown-to-html.html', name:'Markdown → HTML'},
    {icon:'🎨', href:'/text/markdown-cheatsheet.html', name:'Markdown Cheatsheet'},
    {icon:'📊', href:'/text/markdown-table-generator.html', name:'MD Table Generator'},
  ]
});
render();
</script>
