<script>
GZI18n.register({
  en: {
    toolTitle: 'Character Frequency Counter',
    toolDesc: 'Count the frequency of every character, letter, bigram and trigram in any text. Visualize top letters, character classes, and entropy. Useful for cryptanalysis, linguistics and text analysis.',
    statTotal: 'Total chars', statLetters: 'Letters', statDigits: 'Digits', statSpaces: 'Spaces',
    statVowels: 'Vowels', statCons: 'Consonants', statPunct: 'Punctuation', statUnique: 'Unique chars',
    statEntropy: 'Entropy (bits)', statChinese: 'Chinese', statEmoji: 'Emoji',
    classBreakdown: 'Breakdown by character class',
    tip: 'Tip: Bigrams and trigrams are powerful for language detection and cryptoanalysis. English top trigrams include "the", "and", "tha", "ent" — spotting these in ciphertext is a classic first step for substitution ciphers.',
    step1: 'Paste or type any text in the input area',
    step2: 'Watch the stats update in real time as you type',
    step3: 'Switch between Characters / Letters / Bigrams / Trigrams tabs',
    step4: 'Use the character class breakdown for deeper analysis',
  },
  zh: {
    toolTitle: '字符频率统计器',
    toolDesc: '统计文本中每个字符、字母、二元组和三元组的出现频率。可视化高频字符、字符类别（元音、辅音、数字、标点）和信息熵。适用于密码学、语言学和文本分析。',
    statTotal: '总字符数', statLetters: '字母', statDigits: '数字', statSpaces: '空格',
    statVowels: '元音', statCons: '辅音', statPunct: '标点', statUnique: '不同字符',
    statEntropy: '信息熵 (比特)', statChinese: '中文字符', statEmoji: 'Emoji',
    classBreakdown: '按字符类别细分',
    tip: '提示：二元组和三元组是语言检测和密码分析的利器。英文中最常见的三元组是 "the"、"and"、"tha"、"ent" — 在密文中发现这些模式是破解替换密码的经典第一步。',
    step1: '在输入框粘贴或输入任意文本',
    step2: '统计会随输入实时更新',
    step3: '在「字符 / 仅字母 / 二元组 / 三元组」之间切换',
    step4: '通过字符类别细分深入分析',
  }
});

const { $, t } = GZ;
let mode = 'chars';
const EXAMPLE = `The quick brown fox jumps over the lazy dog. Pack my box with five dozen liquor jugs. How vexingly quick daft zebras jump! 1234567890. Sphinx of black quartz, judge my vow.`;

function setMode(m){
  mode = m;
  document.querySelectorAll('.cf-tabs button').forEach(b => b.classList.toggle('active', b.dataset.mode === m));
  render();
}

function analyze(text){
  const out = {
    total: text.length,
    letters: 0, digits: 0, spaces: 0, punct: 0, vowels: 0, consonants: 0,
    chinese: 0, emoji: 0, unique: 0, entropy: 0,
    charMap: new Map(), letterMap: new Map(), bigramMap: new Map(), trigramMap: new Map()
  };
  const VOWELS = 'aeiouAEIOU';
  for (const ch of text) {
    out.charMap.set(ch, (out.charMap.get(ch) || 0) + 1);
    if (/[a-zA-Z]/.test(ch)) {
      out.letters++;
      out.letterMap.set(ch.toLowerCase(), (out.letterMap.get(ch.toLowerCase()) || 0) + 1);
      if (VOWELS.includes(ch)) out.vowels++;
      else out.consonants++;
    } else if (/\d/.test(ch)) out.digits++;
    else if (/\s/.test(ch)) out.spaces++;
    else if (/[\u4e00-\u9fff]/.test(ch)) out.chinese++;
    else if (/[\u{1F300}-\u{1FAFF}\u{2600}-\u{27BF}]/u.test(ch)) out.emoji++;
    else if (/[.,!?;:'"()\[\]{}]/.test(ch)) out.punct++;
  }
  out.unique = out.charMap.size;
  // entropy
  let H = 0;
  for (const [, c] of out.charMap) {
    const p = c / out.total;
    if (p > 0) H -= p * Math.log2(p);
  }
  out.entropy = isFinite(H) ? H : 0;
  // bigrams
  for (let i = 0; i < text.length - 1; i++) {
    const bg = text.substring(i, i + 2);
    if (/\s/.test(bg[0]) || /\s/.test(bg[1])) continue;
    out.bigramMap.set(bg.toLowerCase(), (out.bigramMap.get(bg.toLowerCase()) || 0) + 1);
  }
  for (let i = 0; i < text.length - 2; i++) {
    const tg = text.substring(i, i + 3);
    if (/\s/.test(tg[0]) || /\s/.test(tg[1]) || /\s/.test(tg[2])) continue;
    out.trigramMap.set(tg.toLowerCase(), (out.trigramMap.get(tg.toLowerCase()) || 0) + 1);
  }
  return out;
}

function sortedTop(map, n = 20){
  return [...map.entries()].sort((a, b) => b[1] - a[1]).slice(0, n);
}

function render(){
  const text = $('#input').value;
  const a = analyze(text);
  $('#status').textContent = a.total ? `${a.total} chars analyzed` : '';

  // Stats grid
  const stats = [
    { num: a.total, lbl: t('statTotal') },
    { num: a.letters, lbl: t('statLetters') },
    { num: a.digits, lbl: t('statDigits') },
    { num: a.spaces, lbl: t('statSpaces') },
    { num: a.vowels, lbl: t('statVowels') },
    { num: a.consonants, lbl: t('statCons') },
    { num: a.punct, lbl: t('statPunct') },
    { num: a.chinese, lbl: t('statChinese') },
    { num: a.emoji, lbl: t('statEmoji') },
    { num: a.unique, lbl: t('statUnique') },
    { num: a.entropy.toFixed(2), lbl: t('statEntropy') }
  ];
  $('#stats').innerHTML = stats.map(s => `<div class="cf-stat"><div class="num">${s.num}</div><div class="lbl">${s.lbl}</div></div>`).join('');

  // Main section
  let map, top;
  if (mode === 'chars') { map = a.charMap; top = sortedTop(map, 25); }
  else if (mode === 'letters') { map = a.letterMap; top = sortedTop(map, 26); }
  else if (mode === 'bigrams') { map = a.bigramMap; top = sortedTop(map, 20); }
  else { map = a.trigramMap; top = sortedTop(map, 20); }

  if (top.length === 0) {
    $('#main-section').innerHTML = `<h3>${mode === 'letters' ? 'Letters' : mode === 'chars' ? 'Characters' : mode === 'bigrams' ? 'Bigrams' : 'Trigrams'}</h3><p style="color:var(--text2);text-align:center;padding:20px">No data yet — type or paste some text above.</p>`;
  } else {
    const max = top[0][1];
    const titleMap = {chars: 'Top characters', letters: 'Letter frequency (a-z)', bigrams: 'Top 2-letter combos', trigrams: 'Top 3-letter combos'};
    $('#main-section').innerHTML = `<h3>${titleMap[mode]}</h3>` +
      top.map(([ch, ct]) => {
        const display = ch === ' ' ? '␣' : (ch === '\n' ? '↵' : (ch === '\t' ? '⇥' : ch));
        const pct = (ct / a.total * 100).toFixed(1);
        return `<div class="cf-bar-row">
          <div class="ch">${display}</div>
          <div class="bar"><div class="fill" style="width:${(ct/max*100).toFixed(1)}%"></div></div>
          <div class="count">${ct} <span style="opacity:.6">(${pct}%)</span></div>
        </div>`;
      }).join('');
  }

  // Character class section
  const classBars = [
    { name: t('statLetters'), val: a.letters, color: '#4ecdc4' },
    { name: t('statDigits'), val: a.digits, color: '#ffd93d' },
    { name: t('statSpaces'), val: a.spaces, color: '#a78bfa' },
    { name: t('statPunct'), val: a.punct, color: '#f472b6' },
    { name: t('statChinese'), val: a.chinese, color: '#10b981' },
    { name: t('statEmoji'), val: a.emoji, color: '#ef4444' }
  ].filter(x => x.val > 0);
  if (classBars.length === 0) {
    $('#class-section').innerHTML = '';
  } else {
    const maxC = Math.max(...classBars.map(c => c.val));
    $('#class-section').innerHTML = `<h3>${t('classBreakdown')}</h3>` +
      classBars.map(c => `<div class="cf-bar-row">
        <div class="ch" style="background:${c.color};color:#000">${c.name.substring(0,3)}</div>
        <div class="bar"><div class="fill" style="width:${(c.val/maxC*100).toFixed(1)}%;background:${c.color}"></div></div>
        <div class="count">${c.val}</div>
      </div>`).join('');
  }
}

$('#input').addEventListener('input', render);
$('#btn-example').addEventListener('click', () => { $('#input').value = EXAMPLE; render(); });
$('#btn-clear').addEventListener('click', () => { $('#input').value = ''; render(); });

$('#btn-example').textContent = t('example');
$('#btn-clear').textContent = t('clear');
$('#tip').textContent = t('tip');

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📈', href:'/text/word-frequency.html', name:'Word Frequency'},
    {icon:'📊', href:'/text/text-statistics.html', name:'Text Statistics'},
    {icon:'🔠', href:'/text/acronym-generator.html', name:'Acronym Generator'},
    {icon:'🔤', href:'/text/character-encoding-converter.html', name:'Character Encoding'},
  ]
});

// Auto-load example
$('#input').value = EXAMPLE;
render();
</script>
