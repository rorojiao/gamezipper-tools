<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is the difference between markup and margin?", "acceptedAnswer": {"@type": "Answer", "text": "Markup is profit as a percentage of COST: (Price - Cost) / Cost. Margin is profit as a percentage of PRICE: (Price - Cost) / Price. A 50% markup equals about a 33% margin."}}, {"@type": "Question", "name": "How do I calculate a 20% markup?", "acceptedAnswer": {"@type": "Answer", "text": "Multiply the cost by 1.20. For example, if an item costs $100, a 20% markup gives a selling price of $120."}}, {"@type": "Question", "name": "What is a good markup percentage?", "acceptedAnswer": {"@type": "Answer", "text": "It depends on the industry. Grocery stores use 1-15%, restaurants 60-300%, clothing 100-350%, and software/SaaS can exceed 80% margin. Research your industry average."}}, {"@type": "Question", "name": "Can I find the cost if I only know the price and markup?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. Use the Reverse mode: enter the selling price and the markup percentage, and the calculator solves for the original cost."}}]}</script>

<script>
GZI18n.register({
  en: {
    toolTitle: 'Markup Calculator',
    toolDesc: 'Calculate markup percentage, profit margin, gross profit and selling price. Includes a reverse markup solver. Free, browser-based, no signup.',
    modeForward: 'Cost → Price',
    modeReverse: 'Price → Cost',
    cost: 'Cost',
    sellingPrice: 'Selling Price',
    markupPercent: 'Markup (%)',
    calculate: 'Calculate',
    clear: 'Clear',
    markupResult: 'Markup',
    marginResult: 'Profit Margin',
    grossProfit: 'Gross Profit',
    step1: 'Choose a mode: forward (cost→price) or reverse (price→cost)',
    step2: 'Enter your cost (or price in reverse mode)',
    step3: 'Enter the markup percentage you want to apply',
    step4: 'See the calculated price, margin and gross profit',
  },
  zh: {
    toolTitle: '加价率 / 利润率计算器',
    toolDesc: '计算加价率、利润率、毛利润和售价。内置反向求解模式。免费、浏览器本地运行、无需注册。',
    modeForward: '成本 → 售价',
    modeReverse: '售价 → 成本',
    cost: '成本',
    sellingPrice: '售价',
    markupPercent: '加价率 (%)',
    calculate: '计算',
    clear: '清除',
    markupResult: '加价率',
    marginResult: '利润率',
    grossProfit: '毛利润',
    step1: '选择模式：正向（成本→售价）或反向（售价→成本）',
    step2: '输入成本（反向模式输入售价）',
    step3: '输入要应用的加价率',
    step4: '查看计算出的售价、利润率和毛利润',
  }
});

const { $, t } = GZ;
let mode = 'forward';

function buildTabs() {
  $('#mode-tabs').innerHTML = `
    <div class="mu-tab ${mode==='forward'?'active':''}" onclick="setMode('forward')">${t('modeForward')}</div>
    <div class="mu-tab ${mode==='reverse'?'active':''}" onclick="setMode('reverse')">${t('modeReverse')}</div>`;
}

function setMode(m) {
  mode = m;
  buildTabs();
  buildInputs();
  calc();
}

function buildInputs() {
  if (mode === 'forward') {
    $('#inputs').innerHTML = `
      <div class="mu-row"><span class="mu-label">${t('cost')}</span>
        <input type="number" id="cost" class="gz-input" value="100" step="any" oninput="calc()"></div>
      <div class="mu-row"><span class="mu-label">${t('markupPercent')}</span>
        <input type="number" id="markup" class="gz-input" value="50" step="any" oninput="calc()"></div>`;
  } else {
    $('#inputs').innerHTML = `
      <div class="mu-row"><span class="mu-label">${t('sellingPrice')}</span>
        <input type="number" id="price" class="gz-input" value="150" step="any" oninput="calc()"></div>
      <div class="mu-row"><span class="mu-label">${t('markupPercent')}</span>
        <input type="number" id="markup" class="gz-input" value="50" step="any" oninput="calc()"></div>`;
  }
}

function calc() {
  const markupPct = (parseFloat($('#markup')?.value) || 0) / 100;

  if (mode === 'forward') {
    const cost = parseFloat($('#cost')?.value) || 0;
    const price = cost * (1 + markupPct);
    const profit = price - cost;
    const margin = price > 0 ? profit / price : 0;
    renderResult(cost, price, profit, markupPct, margin);
  } else {
    const price = parseFloat($('#price')?.value) || 0;
    // price = cost * (1 + markup) → cost = price / (1 + markup)
    const cost = markupPct > -1 ? price / (1 + markupPct) : 0;
    const profit = price - cost;
    const margin = price > 0 ? profit / price : 0;
    renderResult(cost, price, profit, markupPct, margin);
  }
}

function renderResult(cost, price, profit, markupPct, margin) {
  $('#result').innerHTML = `
    <div class="mu-card"><div>${t('sellingPrice')}</div><div class="mu-big">${formatMoney(price)}</div></div>
    <div class="mu-card"><div>${t('cost')}</div><div class="mu-big">${formatMoney(cost)}</div></div>
    <div class="mu-card"><div>${t('grossProfit')}</div><div class="mu-big">${formatMoney(profit)}</div>
      <div class="mu-sub">${t('markupResult')}: ${(markupPct*100).toFixed(2)}% &nbsp;|&nbsp; ${t('marginResult')}: ${(margin*100).toFixed(2)}%</div>
    </div>`;
}

function formatMoney(v) {
  const sign = v < 0 ? '-' : '';
  return sign + '$' + Math.abs(v).toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2});
}

function doClear() {
  ['#cost','#price','#markup'].forEach(s => { const el = $(s); if (el) el.value = ''; });
  $('#result').innerHTML = '';
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="calc()">${t('calculate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

buildTabs();
buildInputs();
calc();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📊', href:'/calc/profit-margin.html', name:'Profit Margin'},
    {icon:'🏷️', href:'/calc/discount-calculator.html', name:'Discount'},
    {icon:'💵', href:'/calc/sales-tax-calculator.html', name:'Sales Tax'},
    {icon:'💰', href:'/calc/break-even-calculator.html', name:'Break-Even'},
  ]
});
</script>
