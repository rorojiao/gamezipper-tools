    validJson: '✓ JSON 有效',
    invalidJson: '✗ JSON 无效：',
    step1: '将 JSON 粘贴到左侧输入框',
    step2: '为根结构体输入名称（默认 Root）',

    step4: '点击「转换」，然后将 Swift 代码复制到 Xcode',

const { $, copyText, t } = GZ;
const SWIFT_KEYWORDS = new Set(['associatedtype','class','deinit','enum','extension','fileprivate','func','import','init','inout','internal','let','open','operator','private','protocol','public','static','struct','subscript','typealias','var','break','case','continue','default','defer','do','else','fallthrough','for','guard','if','in','repeat','return','switch','where','while','as','Any','catch','false','is','nil','super','self','Self','throw','throws','rethrows','true','try','Type','Protocol','Array','Bool','Data','Date','Double','Int','String','URL','UUID']);

function escapeId(s) {
  if (SWIFT_KEYWORDS.has(s)) return '`' + s + '`';
  if (!/^[a-zA-Z_][a-zA-Z0-9_]*$/.test(s)) return '`' + s + '`';
  return s;
}

// Convert snake_case / kebab-case / dotted keys to camelCase
function toCamelCase(s) {
  if (/^[a-z][a-zA-Z0-9]*$/.test(s)) return s; // already camelCase
  const parts = s.split(/[^a-zA-Z0-9]+/).filter(Boolean);
  if (parts.length === 0) return 'key';
  const first = parts[0].replace(/^[A-Z]/, c => c.toLowerCase());
  const rest = parts.slice(1).map(p => p.charAt(0).toUpperCase() + p.slice(1));
  return first + rest.join('');
}

function upperFirst(s) { return s.charAt(0).toUpperCase() + s.slice(1); }

// Infer Swift type from a JS value
function inferType(value, allOptional) {
  if (value === null || value === undefined) return allOptional ? 'Any?' : 'String';
  switch (typeof value) {
    case 'string': return 'String';
    case 'boolean': return 'Bool';
    case 'number':
      return Number.isInteger(value) ? 'Int' : 'Double';
  }
  if (Array.isArray(value)) {
    if (value.length === 0) return '[Any]';
    // sample types of items
    const types = new Set(value.map(v => inferType(v, false)));
    if (types.size === 1) return '[' + [...types][0] + ']';
    // mixed primitives -> use first non-null
    const nonNull = value.find(v => v !== null && v !== undefined);
    if (nonNull !== undefined) {
      if (typeof nonNull === 'object' && !Array.isArray(nonNull)) return '[' + (nonNull.__structName || 'Any') + ']';
      return '[' + inferType(nonNull, false) + ']';
    }
    return '[Any]';
  }
  if (typeof value === 'object') return value.__structName || 'Any';
  return 'Any';
}

function markOptional(typeStr, allOptional) {
  if (allOptional) return typeStr.endsWith('?') ? typeStr : typeStr + '?';
  return typeStr;
}

function generateStructs(name, obj, structs, allOptional, useCodingKeys) {
  const structName = upperFirst(escapeId(name).replace(/`/g,''));
  obj.__structName = structName;
  const fields = [];
  const codingPairs = [];
  const keys = Array.isArray(obj) ? [] : Object.keys(obj).filter(k => k !== '__structName');

  for (const key of keys) {
    const rawVal = obj[key];
    let typeStr;
    let nestedName = null;

    if (rawVal !== null && typeof rawVal === 'object' && !Array.isArray(rawVal)) {
      nestedName = upperFirst(toCamelCase(key));
      generateStructs(nestedName, rawVal, structs, allOptional, useCodingKeys);
      typeStr = nestedName;
    } else if (Array.isArray(rawVal) && rawVal.length > 0) {
      // array of nested objects -> need a nested struct
      const nested = rawVal.find(v => v !== null && typeof v === 'object' && !Array.isArray(v));
      if (nested) {
        nestedName = upperFirst(toCamelCase(key));
        // strip trailing 's' for singular name? Keep simple: use the field name capitalized.
        generateStructs(nestedName, nested, structs, allOptional, useCodingKeys);
        typeStr = '[' + nestedName + ']';
      } else {
        typeStr = inferType(rawVal, allOptional);
      }
    } else {
      typeStr = inferType(rawVal, allOptional);
    }

    const camel = toCamelCase(key);
    const needsCodingKey = useCodingKeys && camel !== key;
    fields.push(`    let ${escapeId(camel)}: ${markOptional(typeStr, allOptional)}`);
    if (needsCodingKey) codingPairs.push(`        case ${escapeId(camel)} = "${key}"`);
  }

  let code = `struct ${structName}: Codable {\n`;
  code += fields.join('\n') + '\n';
  if (useCodingKeys && codingPairs.length > 0) {
    code += `\n    enum CodingKeys: String, CodingKey {\n`;
    // also add non-snake keys as plain cases
    const plainCases = keys.filter(k => toCamelCase(k) === k).map(k => `        case ${escapeId(toCamelCase(k))}`);
    code += plainCases.concat(codingPairs).join('\n') + '\n    }\n';
  }
  code += `}\n`;
  structs.push(code);
}

function convert() {
  const inp = $('#input').value.trim();
  if (!inp) { $('#output').textContent = ''; $('#status').innerHTML = ''; return; }
  let data;
  try { data = JSON.parse(inp); }
  catch (e) {
    $('#output').innerHTML = `<span style="color:var(--gz-accent)">${t('invalidJson')}${escapeHtml(e.message)}</span>`;
    $('#status').innerHTML = `<span style="color:var(--gz-accent)">${t('invalidJson')}${escapeHtml(e.message)}</span>`;
    return;
  }

  const allOptional = $('#allOptional').checked;
  const useCodingKeys = $('#codingKeys').checked;
  const rootName = ($('#structName').value.trim() || 'Root');

  const structs = [];
  if (Array.isArray(data)) {
    // wrap array as top-level
    if (data.length > 0 && typeof data[0] === 'object' && data[0] !== null && !Array.isArray(data[0])) {
      generateStructs(rootName, data[0], structs, allOptional, useCodingKeys);
    } else {
      const typeStr = inferType(data[0] || '', allOptional);
      structs.push(`// Root type: [${typeStr}]`);
    }
  } else if (typeof data === 'object' && data !== null) {
    generateStructs(rootName, data, structs, allOptional, useCodingKeys);
  } else {
    $('#output').innerHTML = `<span style="color:var(--gz-accent)">JSON root must be an object or array.</span>`;
    return;
  }

  const plainCode = `// Generated by tools.gamezipper.com\nimport Foundation\n\n` + structs.join('\n');
  highlightAndShow(plainCode);
  $('#output').dataset.plain = plainCode;
  $('#status').innerHTML = `<span style="color:var(--gz-success)">${t('validJson')}</span>`;
}

function escapeHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function highlightAndShow(code) {
  let h = escapeHtml(code);
  h = h
    .replace(/\/\/[^\n]*/g, m => `<span class="cm">${m}</span>`)
    .replace(/\b(struct|enum|class|protocol|extension|import|let|var|case|func|init|return|guard|if|else|where|throws|rethrows|try|throw|public|private|internal|fileprivate|open|static|final|self|Self|super|nil|true|false|as|is)\b/g, '<span class="kw">$1</span>')
    .replace(/\b(Codable|CodingKey|CodingKeys|Codable|String|Int|Int\d+|Double|Float|Bool|Any|Array|Dictionary|Set|Data|Date|URL|UUID|Foundation)\b/g, '<span class="tp">$1</span>')
    .replace(/&quot;[^&]*?&quot;/g, m => `<span class="st">${m}</span>`)
    .replace(/\b\d+(\.\d+)?\b/g, m => `<span class="nm">${m}</span>`);
  $('#output').innerHTML = h;
}

function loadExample() {
  $('#input').value = JSON.stringify({
    "user_id": 1001,
    "userName": "swift_lover",

    "reputation": 4.92,

      "postal_code": "95014",
      "country": "USA"
    },
    "posts": [
      { "post_id": 7, "title": "Hello Swift", "likes": 42 }
    ]
  }, null, 2);
  $('#structName').value = 'User';
  convert();
}

function doClear() { $('#input').value=''; $('#output').textContent=''; $('#status').innerHTML=''; }

$('#input').addEventListener('input', convert);
$('#structName').addEventListener('input', convert);
$('#codingKeys').addEventListener('change', convert);
$('#allOptional').addEventListener('change', convert);

$('#toolbar').innerHTML = `

  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn" onclick="copyText($('#output').dataset.plain || $('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

});

</script>
