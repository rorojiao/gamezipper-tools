<script>
GZI18n.register({
  en: {
    toolTitle: 'Phone Number Formatter & Validator',
    toolDesc: 'Format, validate and convert phone numbers to international (E.164), national, and dial formats. Supports all countries. Bulk mode available.',
    enterPhone: 'Enter phone number…',
    bulkPlaceholder: 'Paste phone numbers, one per line…',
    format: 'Format',
    copy: 'Copy',
    clear: 'Clear',
    valid: '✓ Valid phone number',
    invalid: '✗ Invalid phone number',
    e164: 'E.164 (International)',
    national: 'National Format',
    dial: 'Dial Format',
    telUri: 'tel: URI',
    digitsOnly: 'Digits Only',
    step1: 'Select the country code for the phone number',
    step2: 'Enter or paste a phone number',
    step3: 'See all format variations instantly',
    step4: 'Copy any format with one click',
  },
  zh: {
    toolTitle: '电话号码格式化与验证',
    toolDesc: '格式化、验证和转换电话号码为国际格式（E.164）、国内格式和拨号格式。支持所有国家，可批量处理。',
    enterPhone: '输入电话号码…',
    bulkPlaceholder: '粘贴电话号码，每行一个…',
    format: '格式化',
    copy: '复制',
    clear: '清空',
    valid: '✓ 有效的电话号码',
    invalid: '✗ 无效的电话号码',
    e164: 'E.164（国际格式）',
    national: '国内格式',
    dial: '拨号格式',
    telUri: 'tel: URI',
    digitsOnly: '纯数字',
    step1: '选择电话号码的国家代码',
    step2: '输入或粘贴电话号码',
    step3: '即时查看所有格式变体',
    step4: '一键复制任意格式',
  }
});

const { $, copyText, t } = GZ;

const COUNTRIES = [
  {code:'+1',cc:'US',name:'United States',len:10},{code:'+1',cc:'CA',name:'Canada',len:10},
  {code:'+44',cc:'GB',name:'United Kingdom',len:10},{code:'+86',cc:'CN',name:'中国',len:11},
  {code:'+81',cc:'JP',name:'日本',len:10},{code:'+82',cc:'KR',name:'韩国',len:10},
  {code:'+91',cc:'IN',name:'India',len:10},{code:'+49',cc:'DE',name:'Deutschland',len:10},
  {code:'+33',cc:'FR',name:'France',len:9},{code:'+39',cc:'IT',name:'Italia',len:10},
  {code:'+34',cc:'ES',name:'España',len:9},{code:'+61',cc:'AU',name:'Australia',len:9},
  {code:'+55',cc:'BR',name:'Brasil',len:11},{code:'+52',cc:'MX',name:'México',len:10},
  {code:'+7',cc:'RU',name:'Россия',len:10},{code:'+852',cc:'HK',name:'香港',len:8},
  {code:'+886',cc:'TW',name:'台灣',len:9},{code:'+65',cc:'SG',name:'Singapore',len:8},
  {code:'+60',cc:'MY',name:'Malaysia',len:9},{code:'+66',cc:'TH',name:'ไทย',len:9},
  {code:'+62',cc:'ID',name:'Indonesia',len:10},{code:'+63',cc:'PH',name:'Philippines',len:10},
  {code:'+90',cc:'TR',name:'Türkiye',len:10},{code:'+27',cc:'ZA',name:'South Africa',len:9},
  {code:'+971',cc:'AE',name:'UAE',len:9},{code:'+966',cc:'SA',name:'Saudi Arabia',len:9},
  {code:'+351',cc:'PT',name:'Portugal',len:9},{code:'+31',cc:'NL',name:'Netherlands',len:9},
  {code:'+46',cc:'SE',name:'Sverige',len:9},{code:'+47',cc:'NO',name:'Norge',len:8},
];

function populateCountry(select) {
  select.innerHTML = COUNTRIES.map((c,i) =>
    `<option value="${i}">${c.code} (${c.cc}) ${c.name}</option>`
  ).join('');
}
populateCountry($('#countryCode'));
populateCountry($('#bulkCountryCode'));

function getDigits(str) { return str.replace(/\D/g, ''); }

function formatSingle() {
  const raw = $('#phoneInput').value.trim();
  if (!raw) { $('#results').innerHTML = ''; $('#validBadge').innerHTML = ''; return; }
  const ci = parseInt($('#countryCode').value);
  const country = COUNTRIES[ci];
  let digits = getDigits(raw);
  // Strip leading country code if present
  const ccDigits = getDigits(country.code);
  if (digits.startsWith(ccDigits) && digits.length > country.len) {
    digits = digits.slice(ccDigits.length);
  }
  const isValid = digits.length === country.len;
  $('#validBadge').innerHTML = `<span class="valid-badge ${isValid?'valid':'invalid'}">${isValid?t('valid'):t('invalid')}</span>`;

  const e164 = country.code + digits;
  let national = digits;
  // Format national
  if (country.cc === 'US' || country.cc === 'CA') national = `(${digits.slice(0,3)}) ${digits.slice(3,6)}-${digits.slice(6)}`;
  else if (country.cc === 'CN') national = `${digits.slice(0,3)} ${digits.slice(3,7)} ${digits.slice(7)}`;
  else if (country.cc === 'GB') national = `${digits.slice(0,4)} ${digits.slice(4,7)} ${digits.slice(7)}`;
  else if (country.cc === 'JP') national = `${digits.slice(0,3)}-${digits.slice(3,6)}-${digits.slice(6)}`;
  else if (country.cc === 'DE') national = `${digits.slice(0,4)} ${digits.slice(4,7)} ${digits.slice(7)}`;

  const results = [
    {label: t('e164'), value: e164},
    {label: t('national'), value: national},
    {label: t('dial'), value: `${country.code} ${national}`},
    {label: t('telUri'), value: `tel:${e164}`},
    {label: t('digitsOnly'), value: digits},
  ];

  $('#results').innerHTML = results.map(r =>
    `<div class="result-card"><div><div class="label">${r.label}</div><div class="value">${r.value}</div></div><button onclick="copyText('${r.value.replace(/'/g,"\\'")}')">${t('copy')}</button></div>`
  ).join('');
}

$('#phoneInput').addEventListener('input', formatSingle);
$('#countryCode').addEventListener('change', formatSingle);

function formatBulk() {
  const ci = parseInt($('#bulkCountryCode').value);
  const country = COUNTRIES[ci];
  const lines = $('#bulkInput').value.trim().split('\n').filter(l => l.trim());
  if (!lines.length) { $('#bulkOutput').textContent = ''; return; }
  const ccDigits = getDigits(country.code);
  const out = lines.map(line => {
    let digits = getDigits(line.trim());
    if (digits.startsWith(ccDigits) && digits.length > country.len) digits = digits.slice(ccDigits.length);
    const valid = digits.length === country.len;
    return `${valid?'✓':'✗'} ${country.code} ${digits}`;
  });
  $('#bulkOutput').textContent = out.join('\n');
}

$('#bulkInput').addEventListener('input', formatBulk);
$('#bulkCountryCode').addEventListener('change', formatBulk);

window.switchTab = function(tab, btn) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  $('#single-panel').style.display = tab === 'single' ? '' : 'none';
  $('#bulk-panel').style.display = tab === 'bulk' ? '' : 'none';
};

$('#phoneInput').placeholder = t('enterPhone');
$('#bulkInput').placeholder = t('bulkPlaceholder');

$('#toolbar').innerHTML = `
  <button class="gz-btn gz-btn-secondary" onclick="$('#phoneInput').value='';formatSingle()">${t('clear')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="copyText($('#results').innerText)">${t('copy')}</button>`;

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📧', href:'/dev/email-validator.html', name:'Email Validator'},
    {icon:'📧', href:'/text/email-extractor.html', name:'Email Extractor'},
    {icon:'🔢', href:'/text/letter-counter.html', name:'Letter Counter'},
    {icon:'🔗', href:'/dev/url-parser.html', name:'URL Parser'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
