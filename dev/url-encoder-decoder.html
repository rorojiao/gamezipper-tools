<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"What is URL encoding?","acceptedAnswer":{"@type":"Answer","text":"URL encoding (percent-encoding) converts characters that are not allowed in a URL into a % followed by two hexadecimal digits. For example, a space becomes %20 and the Chinese character 你 becomes %E4%BD%A0 in UTF-8."}},{"@type":"Question","name":"What is the difference between encodeURI and encodeURIComponent?","acceptedAnswer":{"@type":"Answer","text":"encodeURI keeps reserved URL characters like :, /, ?, #, & intact so the overall URL structure is preserved. encodeURIComponent encodes everything including those reserved characters, which is what you want for individual query parameter values."}},{"@type":"Question","name":"Can this tool decode already-encoded URLs?","acceptedAnswer":{"@type":"Answer","text":"Yes. Switch to Decode mode and paste the encoded URL. The tool decodes percent-encoded sequences back to readable text, handling multi-byte UTF-8 characters correctly."}},{"@type":"Question","name":"Is my URL sent to a server?","acceptedAnswer":{"@type":"Answer","text":"No. All encoding and decoding happens entirely in your browser using the built-in JavaScript functions. Your data never leaves your device."}}]}</script>

<script>
GZI18n.register({
  en: {
    toolTitle: 'URL Encoder / Decoder',
    toolDesc: 'Percent-encode URLs for query strings and params, or decode percent-encoded URLs back to readable text. Supports UTF-8 — live, instant, browser-only.',
    lblIn: 'Input',
    lblOut: 'Output',
    mode: 'Mode',
    modeEncode: 'Encode (encodeURIComponent)',
    modeEncodeURI: 'Encode (encodeURI)',
    modeDecode: 'Decode (decodeURIComponent)',
    step1: 'Paste your URL or text into the input area',
    step2: 'Choose encode or decode mode',
    step3: 'The result updates live as you type',
    step4: 'Click Copy to use the encoded or decoded URL',
  },
  zh: {
    toolTitle: 'URL 编码 / 解码工具',
    toolDesc: '将 URL 的查询字符串和参数进行百分号编码，或将已编码的 URL 解码回可读文本。支持 UTF-8 — 实时、即时、浏览器本地运行。',
    lblIn: '输入',
    lblOut: '输出',
    mode: '模式',
    modeEncode: '编码（encodeURIComponent）',
    modeEncodeURI: '编码（encodeURI）',
    modeDecode: '解码（decodeURIComponent）',
    step1: '在输入区粘贴 URL 或文本',
    step2: '选择编码或解码模式',
    step3: '输入时结果实时更新',
    step4: '点击「复制」使用编码或解码后的 URL',
  }
});

const { $, copyText, t } = GZ;

function convert() {
  const text = $('#input').value;
  if (!text) { $('#output').innerHTML = ''; $('#status').innerHTML = ''; return; }
  const mode = $('#opt-mode').value;
  let result;
  try {
    if (mode === 'encode') {
      result = encodeURIComponent(text);
    } else if (mode === 'encodeURI') {
      result = encodeURI(text);
    } else {
      result = decodeURIComponent(text);
    }
    $('#output').textContent = result;
    $('#status').innerHTML = `<span style="color:var(--gz-success)">✓ ${result.length} chars</span>`;
  } catch (e) {
    $('#output').innerHTML = '';
    $('#status').innerHTML = `<span style="color:var(--gz-danger)">✗ ${e.message}</span>`;
  }
}

function loadExample() {
  const mode = $('#opt-mode').value;
  $('#input').value = mode === 'decode'
    ? 'https%3A%2F%2Fexample.com%2Fsearch%3Fq%3Dhello%20world%26lang%3Dzh'
    : 'https://example.com/search?q=hello world&lang=zh';
  convert();
}

function doClear() { $('#input').value = ''; $('#output').innerHTML = ''; $('#status').innerHTML = ''; }

$('#input').addEventListener('input', convert);

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

$('#opts').innerHTML = `
  <label>${t('mode')}: <select id="opt-mode">
    <option value="encode">${t('modeEncode')}</option>
    <option value="encodeURI">${t('modeEncodeURI')}</option>
    <option value="decode">${t('modeDecode')}</option>
  </select></label>`;

$('#opt-mode').addEventListener('change', convert);

$('#lbl-in').textContent = t('lblIn');
$('#lbl-out').textContent = t('lblOut');

GZ.renderToolPage({
  category: 'dev',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🔗', href:'/dev/url-encode.html', name:'URL Encode'},
    {icon:'🔒', href:'/dev/html-escape.html', name:'HTML Escape'},
    {icon:'🌐', href:'/dev/base64.html', name:'Base64'},
    {icon:'📋', href:'/dev/json.html', name:'JSON Formatter'},
  ]
});
</script>
