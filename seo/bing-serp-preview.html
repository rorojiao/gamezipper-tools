<script>
GZI18n.register({
  en: {
    toolTitle: 'Bing SERP Preview Tool',
    toolDesc: 'Preview how your page title, URL and meta description appear in Bing search results. Check length, optimize CTR, copy meta tags. Free, browser-based.',
    lblTitle: 'Page Title',
    lblUrl: 'Page URL',
    lblDesc: 'Meta Description',
    previewHeading: 'Bing SERP Preview',
    metaHeading: 'Generated Meta Tags',
    copy: 'Copy',
    clear: 'Clear',
    example: 'Example',
    copied: '✓ Copied',
    titleIdeal: '✓ Good length for Bing (≤60)',
    titleWarn: '⚠ Long — Bing may truncate at ~60 chars',
    titleShort: '⚠ Too short — add keywords for CTR',
    descIdeal: '✓ Good length (≤160 chars)',
    descWarn: '⚠ Long — Bing may truncate at ~160 chars',
    descShort: '⚠ Short — Bing shows ~160 chars, add detail',
    step1: 'Enter your page title (aim for 50-60 characters)',
    step2: 'Enter the page URL and a meta description (≤160 chars)',
    step3: 'See the live Bing search result preview',
    step4: 'Copy the generated <title>, meta description and canonical tags',
  },
  zh: {
    toolTitle: 'Bing 搜索结果预览工具',
    toolDesc: '预览页面标题、URL 和 meta description 在 Bing 搜索结果中的显示效果。检查长度、优化点击率、复制 meta 标签。免费、浏览器本地运行。',
    lblTitle: '页面标题',
    lblUrl: '页面 URL',
    lblDesc: 'Meta Description',
    previewHeading: 'Bing SERP 预览',
    metaHeading: '生成的 Meta 标签',
    copy: '复制',
    clear: '清除',
    example: '示例',
    copied: '✓ 已复制',
    titleIdeal: '✓ Bing 友好长度（≤60）',
    titleWarn: '⚠ 偏长 — Bing 约 60 字符处截断',
    titleShort: '⚠ 偏短 — 增加关键词提升点击',
    descIdeal: '✓ 长度合适（≤160 字符）',
    descWarn: '⚠ 偏长 — Bing 约 160 字符处截断',
    descShort: '⚠ 偏短 — Bing 显示约 160 字符，请补充细节',
    step1: '输入页面标题（建议 50-60 字符）',
    step2: '输入 URL 和 meta description（≤160 字符）',
    step3: '实时查看 Bing 搜索结果预览',
    step4: '复制生成的 title、meta description 和 canonical 标签',
  }
});

const { $, t } = GZ;

function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escAttr(s) { return esc(s).replace(/"/g,'&quot;'); }

function truncate(s, n) { return s.length > n ? s.slice(0, n - 1) + '…' : s; }

function setCounter(el, len, ideal, warnLen, msgIdeal, msgWarn, msgShort) {
  el.className = 'counter ' + (len > warnLen ? 'warn' : len < 10 ? 'bad' : 'good');
  el.textContent = `${len} chars — ${len > warnLen ? msgWarn : len < 10 ? msgShort : msgIdeal}`;
}

function renderPreview() {
  const title = $('#titleInput').value.trim();
  const url = $('#urlInput').value.trim();
  const desc = $('#descInput').value.trim();

  setCounter($('#titleCount'), title.length, 60, 60, t('titleIdeal'), t('titleWarn'), t('titleShort'));
  $('#urlCount').textContent = `${url.length} chars`;
  $('#urlCount').className = 'counter';
  setCounter($('#descCount'), desc.length, 160, 160, t('descIdeal'), t('descWarn'), t('descShort'));

  // URL display — show domain + breadcrumb
  let urlHtml = '';
  try {
    const u = new URL(url || 'https://example.com/');
    const host = u.hostname.replace(/^www\./,'');
    const firstLetter = (host[0] || 'e').toUpperCase();
    const pathParts = u.pathname.split('/').filter(Boolean);
    urlHtml = `<span class="favicon">${firstLetter}</span><span><strong style="color:#1a0dab">${esc(host)}</strong>`;
    if (pathParts.length) {
      urlHtml += ` <span class="sep">›</span> ${pathParts.map(esc).join(' <span class="sep">›</span> ')}`;
    }
    urlHtml += '</span>';
  } catch (e) {
    urlHtml = `<span class="favicon">E</span><span>${esc(url || 'example.com')}</span>`;
  }

  const titleText = title || 'Your Page Title Will Appear Here';
  const descText = desc || 'Your meta description will appear here. Bing shows about 155-160 characters — keep it concise and include your target keyword.';

  $('#preview').innerHTML = `
    <div class="url">${urlHtml}</div>
    <a class="title">${esc(truncate(titleText, 60))}</a>
    <div class="desc">${esc(truncate(descText, 160))}</div>
  `;

  // Meta tag output
  $('#metaOut').textContent =
    `<title>${titleText}</title>\n` +
    `<meta name="description" content="${descText.replace(/"/g,'&quot;')}">\n` +
    `<link rel="canonical" href="${url || 'https://example.com/'}">\n` +
    `<meta name="bingbot" content="index, follow">`;
}

['titleInput','urlInput','descInput'].forEach(id => $('#' + id).addEventListener('input', renderPreview));

function loadExample() {
  $('#titleInput').value = 'Free Online Toolbox — 1,600+ No-Signup Tools';
  $('#urlInput').value = 'https://tools.gamezipper.com/dev/json.html';
  $('#descInput').value = 'Free online JSON formatter, validator and viewer. Paste your JSON, get clean formatted output with syntax highlighting. 100% browser-based, no signup.';
  renderPreview();
}

function copyMeta() {
  GZ.copyText($('#metaOut').textContent);
  GZ.showToast(t('copied'));
}

function clearAll() {
  $('#titleInput').value = '';
  $('#urlInput').value = '';
  $('#descInput').value = '';
  renderPreview();
}

$('#toolbar').innerHTML = `<button class="gz-btn" onclick="copyMeta()">${t('copy')}</button><button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button><button class="gz-btn gz-btn-secondary" onclick="clearAll()">${t('clear')}</button>`;
$('#lbl-title').textContent = t('lblTitle');
$('#lbl-url').textContent = t('lblUrl');
$('#lbl-desc').textContent = t('lblDesc');
$('#previewHeading').textContent = t('previewHeading');
$('#metaHeading').textContent = t('metaHeading');
renderPreview();

GZ.renderToolPage({
  category: 'seo',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],

    {icon:'📏', href:'/seo/title-meta-length-checker.html', name:'Title Length Checker'},
  ]
});
</script>
