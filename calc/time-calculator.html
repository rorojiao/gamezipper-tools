<style>
.tabs{display:flex;gap:6px;margin-bottom:1rem;flex-wrap:wrap}
.tab{background:var(--glass);border:1px solid var(--border);border-radius:10px;padding:8px 14px;cursor:pointer;font-size:.85em;transition:.2s}
.tab.active{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#000;font-weight:700;border-color:transparent}
.panel{background:var(--glass);border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:14px}
.row{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:10px}
.field{display:flex;flex-direction:column;gap:4px}
.field label{font-size:.8em;opacity:.85}
.field input,.field select{background:rgba(0,0,0,.3);border:1px solid var(--border);border-radius:8px;padding:8px 10px;color:var(--text);font-size:.9rem;font-family:inherit}
.result{background:rgba(0,0,0,.3);border:1px solid var(--border);border-radius:12px;padding:16px;margin-top:14px;font-family:monospace}
.result-line{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:.9em}
.result-line:last-child{border-bottom:none}
.result-line b{color:var(--accent)}
.op-btns{display:flex;gap:6px;margin:8px 0}
.op-btn{flex:1;background:var(--glass2);border:1px solid var(--border);border-radius:8px;padding:8px;cursor:pointer;font-size:.85em}
.op-btn.active{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#000;font-weight:700;border-color:transparent}
.conv-table{width:100%;border-collapse:collapse;margin-top:10px;font-size:.85em}
.conv-table th,.conv-table td{padding:8px 10px;border-bottom:1px solid var(--border);text-align:left}
.conv-table th{background:var(--glass2);font-weight:700}
.conv-table td:last-child{text-align:right;font-family:monospace;color:var(--accent)}
</style>
<script type="application/ld+json">{"@context":"https://schema.org","@type":"WebApplication","name":"Time Calculator","description":"Add or subtract hours, minutes and seconds. Convert time units. Compute duration between two times. Free online time calculator.","url":"https://tools.gamezipper.com/calc/time-calculator.html","applicationCategory":"Utility","operatingSystem":"Web Browser","offers":{"@type":"Offer","price":"0"}}</script>
<script type="application/ld+json">{"@context":"https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "How do I add hours to a time?", "acceptedAnswer": {"@type": "Answer", "text": "Open the Add/Subtract tab, enter a starting time (e.g. 09:30), enter the hours, minutes and seconds you want to add, then click Calculate. The result will show the new time and the day it lands on."}}, {"@type": "Question", "name": "Can I compute the duration between two times?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. Open the Duration tab, enter a start and end time (with optional date), then click Calculate. The tool shows the elapsed time in hours, minutes, seconds and also in larger units like days, weeks, months and years."}}, {"@type": "Question", "name": "How accurate is the time conversion?", "acceptedAnswer": {"@type": "Answer", "text": "All conversions use exact second-level math. 1 hour equals 3600 seconds, 1 day equals 86400 seconds, 1 week equals 604800 seconds, and so on. Leap years and 30/31-day months are handled by standard date math."}}, {"@type": "Question", "name": "Does it work in 24-hour and 12-hour format?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. Time inputs are in 24-hour HH:MM format, but the result can be displayed in either 12-hour (AM/PM) or 24-hour format using the format toggle above the inputs."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="tabs">
      <button class="tab active" data-tab="add">± <span data-tab-label="add"></span></button>
      <button class="tab" data-tab="dur">⏱ <span data-tab-label="dur"></span></button>
      <button class="tab" data-tab="conv">🔁 <span data-tab-label="conv"></span></button>
    </div>

    <!-- ADD / SUBTRACT PANEL -->
    <div class="panel" id="panel-add">
      <div class="row">
        <div class="field"><label data-i18n="startTime"></label><input type="time" id="startTime" value="09:00"></div>
        <div class="field"><label data-i18n="format12h"></label><select id="format12h"><option value="24">24h</option><option value="12">12h AM/PM</option></select></div>
      </div>
      <div class="op-btns">
        <button class="op-btn active" data-op="+">+ <span data-i18n="add"></span></button>
        <button class="op-btn" data-op="-">− <span data-i18n="subtract"></span></button>
      </div>
      <div class="row">
        <div class="field"><label data-i18n="hours"></label><input type="number" id="addH" min="0" value="2"></div>
        <div class="field"><label data-i18n="minutes"></label><input type="number" id="addM" min="0" max="59" value="30"></div>
        <div class="field"><label data-i18n="seconds"></label><input type="number" id="addS" min="0" max="59" value="0"></div>
        <div class="field"><label data-i18n="days"></label><input type="number" id="addD" min="0" value="0"></div>
      </div>
      <div class="result" id="res-add"></div>
    </div>

    <!-- DURATION PANEL -->
    <div class="panel" id="panel-dur" style="display:none">
      <div class="row">
        <div class="field"><label data-i18n="fromTime"></label><input type="time" id="durStart" value="09:00"></div>
        <div class="field"><label data-i18n="toTime"></label><input type="time" id="durEnd" value="17:30"></div>
      </div>
      <div class="result" id="res-dur"></div>
    </div>

    <!-- CONVERT PANEL -->
    <div class="panel" id="panel-conv" style="display:none">
      <div class="row">
        <div class="field"><label data-i18n="value"></label><input type="number" id="convVal" value="1" step="any"></div>
        <div class="field"><label data-i18n="fromUnit"></label>
          <select id="convFrom">
            <option value="1" selected>Seconds (s)</option>
            <option value="60">Minutes (min)</option>
            <option value="3600">Hours (h)</option>
            <option value="86400">Days (d)</option>
            <option value="604800">Weeks (w)</option>
            <option value="2592000">Months (30d)</option>
            <option value="31536000">Years (365d)</option>
            <option value="0.001">Milliseconds (ms)</option>
            <option value="1e-6">Microseconds (μs)</option>
            <option value="1e-9">Nanoseconds (ns)</option>
          </select>
        </div>
      </div>
      <div class="result" id="res-conv"></div>
    </div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Time Calculator',
    toolDesc: 'Add or subtract hours, minutes and seconds. Compute duration between two times. Convert time units — seconds, minutes, hours, days, weeks and more.',
    add: 'Add / Subtract',
    dur: 'Duration',
    conv: 'Convert',
    startTime: 'Start time',
    format12h: 'Output format',
    addBtn: 'Add',
    subtract: 'Subtract',
    hours: 'Hours',
    minutes: 'Minutes',
    seconds: 'Seconds',
    days: 'Days',
    fromTime: 'Start time',
    toTime: 'End time',
    value: 'Value',
    fromUnit: 'From',
    step1: 'Pick a tab: Add/Subtract, Duration or Convert',
    step2: 'Enter your inputs (time, hours, minutes, etc.)',
    step3: 'Click Calculate or results update live as you type',
    step4: 'Copy the result or use it to plan meetings, shifts and tasks',
    newTime: 'New time',
    dayOffset: 'Day offset',
    sameDay: 'Same day',
    nextDay: 'Next day',
    daysLater: 'days later',
    daysBefore: 'days before',
    duration: 'Duration',
    inHours: 'In hours',
    inDays: 'In days',
    totalSeconds: 'Total seconds',
    equivalent: 'Equivalent',
  },
  zh: {
    toolTitle: '时间计算器',
    toolDesc: '加减时、分、秒。计算两个时间的间隔。在秒、分、时、天、周等单位之间转换。',
    add: '加减',
    dur: '时长',
    conv: '单位转换',
    startTime: '起始时间',
    format12h: '输出格式',
    addBtn: '加',
    subtract: '减',
    hours: '小时',
    minutes: '分钟',
    seconds: '秒',
    days: '天',
    fromTime: '起始时间',
    toTime: '结束时间',
    value: '数值',
    fromUnit: '来源单位',
    step1: '选择标签页：加减 / 时长 / 转换',
    step2: '输入你的参数（时间、时分秒等）',
    step3: '点击「计算」或结果随输入实时更新',
    step4: '复制结果，可用于安排会议、班次和任务',
    newTime: '新时间',
    dayOffset: '天数偏移',
    sameDay: '同一天',
    nextDay: '次日',
    daysLater: '天后',
    daysBefore: '天前',
    duration: '时长',
    inHours: '小时',
    inDays: '天',
    totalSeconds: '总秒数',
    equivalent: '换算',
  }
});

document.querySelectorAll('[data-i18n]').forEach(el => el.textContent = GZ.t(el.dataset.i18n));
const tLabels = { add: 'add', dur: 'dur', conv: 'conv' };
Object.entries(tLabels).forEach(([k, v]) => {
  const el = document.querySelector(`[data-tab-label="${k}"]`);
  if (el) el.textContent = GZ.t(v);
});

const { $, t } = GZ;

let op = '+';

// Tab switching
document.querySelectorAll('.tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const tab = btn.dataset.tab;
    document.querySelectorAll('.panel').forEach(p => p.style.display = 'none');
    document.getElementById('panel-' + tab).style.display = 'block';
    calc();
  });
});
document.querySelectorAll('.op-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.op-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    op = btn.dataset.op;
    calc();
  });
});

['#startTime','#format12h','#addH','#addM','#addS','#addD','#durStart','#durEnd','#convVal','#convFrom'].forEach(s => $(s).addEventListener('input', calc));

function fmtTime(date, fmt) {
  if (fmt === '12') {
    let h = date.getHours(), m = date.getMinutes(), s = date.getSeconds();
    const ap = h >= 12 ? 'PM' : 'AM';
    h = h % 12 || 12;
    return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')} ${ap}`;
  }
  return `${String(date.getHours()).padStart(2,'0')}:${String(date.getMinutes()).padStart(2,'0')}:${String(date.getSeconds()).padStart(2,'0')}`;
}

function calcAdd() {
  const [hh, mm] = $('#startTime').value.split(':').map(Number);
  const d = new Date(); d.setHours(hh||0, mm||0, 0, 0);
  const sign = op === '+' ? 1 : -1;
  const delta = sign * (((+$('#addD').value||0) * 86400) + ((+$('#addH').value||0) * 3600) + ((+$('#addM').value||0) * 60) + (+$('#addS').value||0));
  const orig = new Date(d);
  d.setSeconds(d.getSeconds() + delta);
  const fmt = $('#format12h').value;
  const dayDiff = Math.round((d - orig) / 86400000);
  let offsetLabel = t('sameDay');
  if (d.getDate() !== orig.getDate() || d.getMonth() !== orig.getMonth() || d.getFullYear() !== orig.getFullYear()) {
    offsetLabel = dayDiff > 0 ? `${Math.abs(dayDiff)} ${t('daysLater')}` : `${Math.abs(dayDiff)} ${t('daysBefore')}`;
  }
  $('#res-add').innerHTML = `
    <div class="result-line"><span>${t('newTime')}</span><b>${fmtTime(d, fmt)}</b></div>
    <div class="result-line"><span>${t('dayOffset')}</span><b>${offsetLabel}</b></div>
    <div class="result-line"><span>ISO 8601</span><b>${d.toISOString().slice(0,19)}Z</b></div>
  `;
}

function calcDur() {
  const today = new Date(); today.setHours(0,0,0,0);
  const [s1, s2] = [$('#durStart').value, $('#durEnd').value];
  const [h1, m1] = s1.split(':').map(Number);
  const [h2, m2] = s2.split(':').map(Number);
  const a = new Date(today); a.setHours(h1||0, m1||0, 0, 0);
  const b = new Date(today); b.setHours(h2||0, m2||0, 0, 0);
  let diff = (b - a) / 1000;
  if (diff < 0) diff += 86400;
  const sign = diff === 86400 ? '' : (b < a ? ' (−1 day)' : '');
  const hrs = Math.floor(diff / 3600);
  const mins = Math.floor((diff % 3600) / 60);
  const secs = Math.floor(diff % 60);
  const totalSec = Math.round(diff);
  const days = (diff / 86400).toFixed(4);
  const weeks = (diff / 604800).toFixed(6);
  $('#res-dur').innerHTML = `
    <div class="result-line"><span>${t('duration')}</span><b>${hrs}h ${mins}m ${secs}s</b></div>
    <div class="result-line"><span>${t('inHours')}</span><b>${(diff/3600).toFixed(4)} h</b></div>
    <div class="result-line"><span>${t('inDays')}</span><b>${days} d</b></div>
    <div class="result-line"><span>${t('totalSeconds')}</span><b>${totalSec.toLocaleString()}</b></div>
    <div class="result-line"><span>${t('equivalent')}</span><b>${weeks} weeks</b></div>
  `;
}

function calcConv() {
  const v = +$('#convVal').value;
  const factor = +$('#convFrom').value;
  const sec = v * factor;
  const units = [
    {n: 'Nanoseconds', f: 1e-9},
    {n: 'Microseconds', f: 1e-6},
    {n: 'Milliseconds', f: 1e-3},
    {n: 'Seconds', f: 1},
    {n: 'Minutes', f: 60},
    {n: 'Hours', f: 3600},
    {n: 'Days', f: 86400},
    {n: 'Weeks', f: 604800},
    {n: 'Months (30d)', f: 2592000},
    {n: 'Years (365d)', f: 31536000},
  ];
  const rows = units.map(u => {
    const x = sec / u.f;
    return `<tr><td>${u.n}</td><td>${x.toLocaleString(undefined, {maximumFractionDigits: 6})}</td></tr>`;
  }).join('');
  $('#res-conv').innerHTML = `<table class="conv-table"><thead><tr><th>${t('equivalent')}</th><th>${t('value')}</th></tr></thead><tbody>${rows}</tbody></table>`;
}

function calc() {
  const active = document.querySelector('.tab.active').dataset.tab;
  if (active === 'add') calcAdd();
  else if (active === 'dur') calcDur();
  else calcConv();
}

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'⏰', href:'/calc/hours-calculator.html', name:'Hours Calculator'},
    {icon:'📅', href:'/calc/date-calculator.html', name:'Date Calculator'},
    {icon:'🌍', href:'/convert/timezone.html', name:'Time Zone Converter'},
    {icon:'⏱️', href:'/calc/timer-stopwatch.html', name:'Timer / Stopwatch'},
  ]
});
calc();
</script>
<script>new Image().src="https://site-analytics.gamezipper.com/hit?s=tools.gamezipper.com&p="+encodeURIComponent(location.pathname);</script>
<script src="/tools-result-rec.js" defer></script>
</body>
