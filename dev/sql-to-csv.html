// ---- SQL value tokenizer (reused logic, single-quote aware) ----
function parseValueTuple(s) {
  const out = [];
  let i = 0, cur = '', inStr = false, depth = 0, strQuote = '';
  while (i < s.length) {
    const c = s[i];
    if (inStr) {
      if (c === '\\' && i + 1 < s.length) { cur += c + s[i + 1]; i += 2; continue; }
      if (c === strQuote) {
        if (s[i + 1] === strQuote) { cur += strQuote; i += 2; continue; }
        inStr = false; strQuote = ''; i++; continue;
      }
      cur += c; i++; continue;
    }
    if (c === "'" || c === '"') { inStr = true; strQuote = c; i++; continue; }
    if (c === '(') { depth++; cur += c; i++; continue; }
    if (c === ')') { depth--; cur += c; i++; continue; }
    if (c === ',' && depth === 0) { out.push(coerce(cur)); cur = ''; i++; continue; }
    cur += c; i++;
  }
  if (cur.trim() !== '') out.push(coerce(cur));
  return out;
}

function coerce(raw) {
  const v = raw.trim();
  if (v === '') return { isNull: false, value: '' };
  if (/^null$/i.test(v)) return { isNull: true, value: null };
  if (/^-?\d+$/.test(v)) return { isNull: false, value: v, numeric: true };
  if (/^-?\d*\.\d+([eE][+-]?\d+)?$/.test(v) || /^-?\d+[eE][+-]?\d+$/.test(v)) return { isNull: false, value: v, numeric: true };
  return { isNull: false, value: v };
}

function extractTuples(s) {
  const out = [];
  let i = 0, depth = 0, start = -1, inStr = false, q = '';
  while (i < s.length) {
    const c = s[i];
    if (inStr) {
      if (c === '\\') { i += 2; continue; }
      if (c === q) { if (s[i+1] === q) { i += 2; continue; } inStr = false; }
      i++; continue;
    }
    if (c === "'" || c === '"') { inStr = true; q = c; i++; continue; }
    if (c === '(') { if (depth === 0) start = i + 1; depth++; i++; continue; }
    if (c === ')') { depth--; if (depth === 0 && start >= 0) { out.push(s.slice(start, i)); start = -1; } i++; continue; }
    i++;
  }
  return out.map(parseValueTuple);
}

function splitStatements(sql) {
  const out = [];
  let i = 0, cur = '', inStr = false, q = '';
  while (i < sql.length) {
    const c = sql[i];
    if (inStr) {
      cur += c;
      if (c === '\\' && i + 1 < sql.length) { cur += sql[i+1]; i += 2; continue; }
      if (c === q) { if (sql[i+1] === q) { cur += sql[i+1]; i += 2; continue; } inStr = false; }
      i++; continue;
    }
    if (c === "'" || c === '"') { inStr = true; q = c; cur += c; i++; continue; }
    if (c === '-' && sql[i+1] === '-') { while (i < sql.length && sql[i] !== '\n') i++; continue; }
    if (c === '/' && sql[i+1] === '*') { i += 2; while (i < sql.length && !(sql[i] === '*' && sql[i+1] === '/')) i++; i += 2; continue; }
    if (c === ';') { const tt = cur.trim(); if (tt) out.push(tt); cur = ''; i++; continue; }
    cur += c; i++;
  }
  const tt = cur.trim(); if (tt) out.push(tt);
  return out;
}

function parseInsert(stmt) {
  const m = stmt.match(/insert\s+into\s+["'`]?([\w\.]+)["'`]?\s*\(([^)]*)\)\s*values\s*([\s\S]+)$/i);
  if (m) {
    const cols = m[2].split(',').map(c => c.trim().replace(/^["'`]|["'`]$/g, ''));
    const tuples = extractTuples(m[3]);
    return { cols, tuples };
  }
  const m2 = stmt.match(/insert\s+into\s+["'`]?([\w\.]+)["'`]?\s*values\s*([\s\S]+)$/i);
  if (m2) {
    const tuples = extractTuples(m2[2]);
    return { cols: null, tuples };
  }
  return null;
}

function parseBareRows(sql) {
  const firstParen = sql.indexOf('(');
  if (firstParen === -1) return { cols: null, tuples: extractTuples(sql) };
  const head = sql.slice(0, firstParen).trim();
  let cols = null;
  const lines = head.split(/\r?\n/).map(s => s.trim()).filter(Boolean);
  const lastLine = lines[lines.length - 1] || '';
  if (lines.length && /^[\w,"'`\s]+$/.test(lastLine) && lastLine.includes(',')) {
    cols = lastLine.split(',').map(c => c.trim().replace(/^["'`]|["'`]$/g, ''));
  }
  return { cols, tuples: extractTuples(sql.slice(firstParen)) };
}

function csvEscape(val, delim) {
  const s = String(val);
  if (s.includes(delim) || s.includes('"') || s.includes('\n') || s.includes('\r')) {
    return '"' + s.replace(/"/g, '""') + '"';
  }
  return s;
}

function run() {
  const raw = $('#input').value;
  const status = $('#status');
  if (!raw.trim()) { $('#output').value = ''; status.textContent = ''; status.className = 'sj-status'; return; }
  try {
    const nullMode = $('#nullMode').value;
    const delim = $('#delim').value;
    const headerRow = $('#headerRow').checked;
    const allCols = []; // ordered unique
    const colSet = new Set();
    const rows = []; // each row is a map col->coerced value

    function registerCols(cols) {
      if (!cols) return;
      for (const c of cols) {
        if (!colSet.has(c)) { colSet.add(c); allCols.push(c); }
      }
    }

    let stmts;
    const hasInsert = /insert\s+into/i.test(raw);
    if (hasInsert) {
      stmts = splitStatements(raw);
      let any = false;
      for (const st of stmts) {
        const pr = parseInsert(st);
        if (!pr) continue;
        any = true;
        if (pr.cols) registerCols(pr.cols);
        for (const tup of pr.tuples) {
          const row = {};
          if (pr.cols) {
            for (let k = 0; k < pr.cols.length; k++) row[pr.cols[k]] = tup[k];
          } else {
            const genCols = [];
            for (let k = 0; k < tup.length; k++) { const cn = 'col' + (k + 1); genCols.push(cn); row[cn] = tup[k]; }
            registerCols(genCols);
          }
          rows.push(row);
        }
      }
      if (!any) {
        const bare = parseBareRows(raw);
        registerCols(bare.cols);
        for (const tup of bare.tuples) {
          const row = {};
          if (bare.cols) { for (let k = 0; k < bare.cols.length; k++) row[bare.cols[k]] = tup[k]; }
          else { const genCols = []; for (let k = 0; k < tup.length; k++) { const cn = 'col' + (k + 1); genCols.push(cn); row[cn] = tup[k]; } registerCols(genCols); }
          rows.push(row);
        }
      }
    } else {
      const bare = parseBareRows(raw);
      registerCols(bare.cols);
      for (const tup of bare.tuples) {
        const row = {};
        if (bare.cols) { for (let k = 0; k < bare.cols.length; k++) row[bare.cols[k]] = tup[k]; }
        else { const genCols = []; for (let k = 0; k < tup.length; k++) { const cn = 'col' + (k + 1); genCols.push(cn); row[cn] = tup[k]; } registerCols(genCols); }
        rows.push(row);
      }
    }

    if (!rows.length) throw new Error(t('errEmpty'));

    // If no column names at all, synthesize col1..colN from max width
    if (!allCols.length) {
      let maxW = 0;
      for (const r of rows) maxW = Math.max(maxW, Object.keys(r).length);
      for (let k = 0; k < maxW; k++) allCols.push('col' + (k + 1));
    }

    const lines = [];
    if (headerRow) {
      lines.push(allCols.map(c => csvEscape(c, delim)).join(delim));
    }
    for (const r of rows) {
      const cells = allCols.map(c => {
        const cv = r[c];
        if (!cv || cv.isNull) return nullMode === 'literal' ? 'NULL' : '';
        return cv.value;
      });
      lines.push(cells.map(v => csvEscape(v, delim)).join(delim));
    }
    $('#output').value = lines.join('\n');
    status.textContent = t('ok').replace('N', rows.length).replace('M', allCols.length);
    status.className = 'sj-status ok';
  } catch (e) {
    $('#output').value = '';
    status.textContent = t('err') + e.message;
    status.className = 'sj-status err';
  }
}

function loadExample() {
  $('#input').value =
`INSERT INTO users (id, name, email, score, active, created_at)
VALUES (1, 'Alice', 'alice@example.com', 4.8, true, NULL),
       (2, 'Bob', 'bob, Jr.', 3.5, false, NULL),
       (3, 'Carol "Caz"', 'carol@example.com', 5.0, true, NULL);`;
  run();
}
function doClear() { $('#input').value = ''; $('#output').value = ''; $('#status').textContent = ''; }
function doDownload() {
  const text = $('#output').value; if (!text) return;
  const blob = new Blob([text], { type: 'text/csv' });
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = 'data.csv'; a.click(); URL.revokeObjectURL(a.href);
}

$('#input').addEventListener('input', run);
