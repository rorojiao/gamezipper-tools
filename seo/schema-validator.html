<script>
GZI18n.register({
  en: {
    toolTitle: 'JSON-LD Schema Validator',
    toolDesc: 'Validate JSON-LD structured data for SEO. Check Schema.org types, required properties and Google Rich Results compliance.',
    btnValidate: 'Validate',

    faq1q: 'What does this validator check?',
    faq1a: 'It checks JSON syntax, validates @context and @type, verifies required properties for common Schema.org types, and warns about missing recommended fields.',
    faq2q: 'Is my data sent to a server?',
    faq2a: 'No. All validation happens entirely in your browser.',
    faq3q: 'Which Schema.org types are supported?',
    faq3a: 'Article, Product, FAQPage, HowTo, LocalBusiness, Event, Person, Organization, Recipe, Review, VideoObject, BreadcrumbList and more.',

    warnings: 'Warnings',

    type: 'Type',
  },
  zh: {
    toolTitle: 'JSON-LD 结构化数据验证器',
    toolDesc: '验证 JSON-LD 结构化数据的 SEO 合规性。检查 Schema.org 类型、必填属性和 Google 富媒体搜索结果合规性。',
    btnValidate: '验证',
    btnClear: '清空',
    lblIn: '粘贴 JSON-LD',
    step1: '在输入区粘贴你的 JSON-LD 结构化数据',
    step2: '点击「验证」检查你的 schema',
    step3: '查看错误、警告和通过的检查项',
    step4: '修复问题后重新验证',
    faq1q: '验证器检查什么？',
    faq1a: '检查 JSON 语法、验证 @context 和 @type、检查常见 Schema.org 类型的必填属性，并警告缺失的推荐字段。',
    faq2q: '数据会发送到服务器吗？',
    faq2a: '不会。所有验证完全在浏览器中完成。',
    faq3q: '支持哪些 Schema.org 类型？',
    faq3a: 'Article、Product、FAQPage、HowTo、LocalBusiness、Event、Person、Organization、Recipe、Review、VideoObject、BreadcrumbList 等。',
    errors: '错误',
    warnings: '警告',
    passed: '通过',
    type: '类型',
  }
});

const { $, copyText, t } = GZ;

const SCHEMA_RULES = {
  Article: { required: ['headline','author','datePublished','image'], recommended: ['dateModified','publisher','description','mainEntityOfPage'] },
  Product: { required: ['name'], recommended: ['image','description','brand','offers','sku','review','aggregateRating'] },
  FAQPage: { required: ['mainEntity'], recommended: [] },
  HowTo: { required: ['name','step'], recommended: ['description','image','totalTime','estimatedCost'] },
  LocalBusiness: { required: ['name','address'], recommended: ['telephone','openingHours','geo','image','url','priceRange'] },
  Event: { required: ['name','startDate','location'], recommended: ['endDate','description','image','organizer','offers'] },
  Person: { required: ['name'], recommended: ['url','image','jobTitle','worksFor','email','telephone'] },
  Organization: { required: ['name'], recommended: ['url','logo','contactPoint','address','telephone','sameAs'] },
  Recipe: { required: ['name','recipeIngredient','recipeInstructions'], recommended: ['image','description','prepTime','cookTime','totalTime','recipeYield','recipeCategory'] },
  Review: { required: ['reviewRating','author','itemReviewed'], recommended: ['reviewBody','datePublished'] },
  VideoObject: { required: ['name','description','thumbnailUrl','uploadDate'], recommended: ['duration','contentUrl','embedUrl'] },
  BreadcrumbList: { required: ['itemListElement'], recommended: [] },
  WebPage: { required: [], recommended: ['name','description','image','url','datePublished','dateModified','author'] },
  WebSite: { required: [], recommended: ['name','url','potentialAction'] },
  SoftwareApplication: { required: ['name'], recommended: ['operatingSystem','applicationCategory','offers','aggregateRating'] },
  Course: { required: ['name','description','provider'], recommended: ['image','url'] },
  JobPosting: { required: ['title','description','datePosted','hiringOrganization','jobLocation'], recommended: ['employmentType','salary','qualifications'] },
};

function validate() {
  const input = $('#json-input').value.trim();
  if (!input) return;

  const results = { errors: [], warnings: [], passed: [] };
  let data;

  // Check JSON syntax
  try {
    data = JSON.parse(input);
    results.passed.push({ msg: 'Valid JSON syntax' });
  } catch(e) {
    results.errors.push({ msg: 'Invalid JSON: ' + e.message });
    renderResults(results);
    return;
  }

  // Check @context
  if (!data['@context']) {
    results.errors.push({ msg: 'Missing @context. Should be "https://schema.org"' });
  } else if (data['@context'] !== 'https://schema.org' && data['@context'] !== 'http://schema.org') {
    results.warnings.push({ msg: `@context is "${data['@context']}". Recommended: "https://schema.org"` });
  } else {
    results.passed.push({ msg: '@context is correct' });
  }

  // Check @type
  if (!data['@type']) {
    results.errors.push({ msg: 'Missing @type. Specify a Schema.org type (e.g. Article, Product, FAQPage).' });
  } else {
    const type = Array.isArray(data['@type']) ? data['@type'][0] : data['@type'];
    results.passed.push({ msg: `@type: ${type}` });

    // Validate type-specific properties
    const rules = SCHEMA_RULES[type];
    if (rules) {
      rules.required.forEach(prop => {
        if (!data[prop]) {
          results.errors.push({ msg: `Missing required property: "${prop}" for type ${type}` });
        } else {
          results.passed.push({ msg: `Has required property: "${prop}"` });
        }
      });
      rules.recommended.forEach(prop => {
        if (!data[prop]) {
          results.warnings.push({ msg: `Missing recommended property: "${prop}" for type ${type}` });
        } else {
          results.passed.push({ msg: `Has recommended property: "${prop}"` });
        }
      });
    } else {
      results.warnings.push({ msg: `No specific validation rules for type "${type}". Basic checks only.` });
    }

    // Check for nested objects missing @type
    checkNestedTypes(data, results);
  }

  renderResults(results);
}

function checkNestedTypes(obj, results) {
  if (typeof obj !== 'object' || !obj) return;
  for (const [key, val] of Object.entries(obj)) {
    if (key.startsWith('@')) continue;
    if (Array.isArray(val)) {
      val.forEach((item, i) => {
        if (typeof item === 'object' && item !== null) {
          if (!item['@type'] && Object.keys(item).length > 1) {
            results.warnings.push({ msg: `Nested object "${key}[${i}]" may be missing @type` });
          }
          checkNestedTypes(item, results);
        }
      });
    } else if (typeof val === 'object' && val !== null) {
      if (!val['@type'] && Object.keys(val).length > 1) {
        results.warnings.push({ msg: `Nested object "${key}" may be missing @type` });
      }
      checkNestedTypes(val, results);
    }
  }
}

function renderResults(results) {
  const summary = $('#summary');
  summary.style.display = 'flex';
  summary.innerHTML = `
    <div class="summary-item"><span class="val-err">${results.errors.length}</span> ${t('errors')}</div>
    <div class="summary-item"><span class="val-warn">${results.warnings.length}</span> ${t('warnings')}</div>
    <div class="summary-item"><span class="val-ok">${results.passed.length}</span> ${t('passed')}</div>
  `;

  let html = '';
  results.errors.forEach(r => {
    html += `<div class="val-item"><span class="val-badge badge-err">✗</span>${r.msg}</div>`;
  });
  results.warnings.forEach(r => {
    html += `<div class="val-item"><span class="val-badge badge-warn">⚠</span>${r.msg}</div>`;
  });
  results.passed.forEach(r => {
    html += `<div class="val-item"><span class="val-badge badge-ok">✓</span>${r.msg}</div>`;
  });

  $('#results').innerHTML = html;
}

GZ.renderToolPage({
  toolbar: [
    { label: t('btnValidate'), action: validate },
    { label: t('btnClear'), action: () => { $('#json-input').value=''; $('#results').innerHTML=''; $('#summary').style.display='none'; } },
  ],
  howto: [t('step1'), t('step2'), t('step3'), t('step4')],
  faq: [
    { q: t('faq1q'), a: t('faq1a') },
    { q: t('faq2q'), a: t('faq2a') },
    { q: t('faq3q'), a: t('faq3a') },
  ],
  related: ['schema-generator', 'serp-preview', 'rich-snippet-preview', 'faq-schema-generator', 'meta-tag-generator']
});
</script>
