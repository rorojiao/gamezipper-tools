<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "How do you play Guess the Number?", "acceptedAnswer": {"@type": "Answer", "text": "The computer secretly picks a number within a range (for example 1 to 100). You type a guess and press Guess. The game tells you whether the secret number is higher or lower than your guess, and you keep guessing until you find it in as few tries as possible."}}, {"@type": "Question", "name": "What is the best strategy to win quickly?", "acceptedAnswer": {"@type": "Answer", "text": "Use binary search: always guess the middle of the remaining possible range. For a 1 to 100 game this guarantees finding the number in at most 7 guesses."}}, {"@type": "Question", "name": "Is this game random and fair?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. The secret number is generated using the browser's cryptographic random source when available, giving a uniform random pick within your chosen range. The game runs entirely in your browser and nothing is sent to a server."}}, {"@type": "Question", "name": "Can I change the difficulty?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. Pick Easy (1 to 50), Medium (1 to 100), Hard (1 to 500) or Expert (1 to 1000). A wider range means more possible numbers and a harder guessing challenge."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="gn-stage">
      <div class="gn-display" id="display">?</div>
      <div class="gn-hint" id="hint"></div>
      <div class="gn-input-row">
        <input type="number" id="guessInput" placeholder="0" />
        <button class="gz-btn" id="btnGuess" onclick="doGuess()">🎯</button>
      </div>
      <div class="gn-range">
        <label><span id="lblRange"></span>
          <select id="rangeSel" onchange="newGame()">
            <option value="50">1 – 50</option>
            <option value="100" selected>1 – 100</option>
            <option value="500">1 – 500</option>
            <option value="1000">1 – 1000</option>
          </select>
        </label>
      </div>
      <div class="gn-stats">
        <div class="gn-stat"><div class="v" id="tries">0</div><div class="l" id="lblTries"></div></div>
        <div class="gn-stat"><div class="v" id="best">—</div><div class="l" id="lblBest"></div></div>
      </div>
      <div class="gn-history" id="history"></div>
    </div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>

<script>
GZI18n.register({
  en: {
    toolTitle: 'Guess the Number Game',
    toolDesc: 'The classic number guessing game. The computer picks a secret number — use higher/lower hints to find it in as few tries as possible.',
    btnGuess: '🎯 Guess',
    btnNew: '↻ New Game',
    lblRange: 'Range',
    lblTries: 'Tries',
    lblBest: 'Best',
    hintStart: 'Guess a number!',
    hintHigher: '▲ Higher!',
    hintLower: '▼ Lower!',
    hintWin: (n, t) => `🎉 You got it! The number was ${n} in ${t} ${t===1?'try':'tries'}.`,
    placeholder: 'your guess',
    step1: 'Pick a number range from the dropdown (Easy to Expert)',
    step2: 'Type your guess and press Enter or the Guess button',
    step3: 'Read the hint — Higher or Lower — and narrow it down',
    step4: 'Try to beat your best score with fewer guesses',
  },
  zh: {
    toolTitle: '猜数字游戏',
    toolDesc: '经典猜数字游戏。电脑随机选定一个数字，根据「偏大」「偏小」的提示，用最少的次数猜中它。',
    btnGuess: '🎯 猜',
    btnNew: '↻ 新游戏',
    lblRange: '范围',
    lblTries: '次数',
    lblBest: '最佳',
    hintStart: '输入一个数字开始猜测！',
    hintHigher: '▲ 再大一点！',
    hintLower: '▼ 再小一点！',
    hintWin: (n, t) => `🎉 猜对了！数字是 ${n}，你用了 ${t} 次。`,
    placeholder: '你的猜测',
    step1: '从下拉框选择数字范围（简单到专家）',
    step2: '输入你的猜测，按回车或点击「猜」按钮',
    step3: '查看提示 — 偏大还是偏小 — 逐步缩小范围',
    step4: '尝试用更少的猜测次数刷新最佳成绩',
  }
});

const { $, t } = GZ;
let secret = 0, max = 100, tries = 0, won = false, history = [];
let best = {};

function rnd(n){ const a=new Uint32Array(1); (crypto.subtle?crypto.getRandomValues(a):a[0]=Math.random()*4294967296); return (a[0]%n)+1; }

function newGame(){
  max = +$('#rangeSel').value;
  secret = rnd(max);
  tries = 0; won = false; history = [];
  $('#display').textContent = '?';
  $('#display').style.color = 'var(--accent)';
  const h = $('#hint'); h.textContent = t('hintStart'); h.className = 'gn-hint';
  $('#guessInput').value = ''; $('#guessInput').disabled = false; $('#guessInput').focus();
  $('#tries').textContent = '0';
  const b = best[max]; $('#best').textContent = b ? b : '—';
  $('#history').innerHTML = '';
}

function doGuess(){
  if(won){ newGame(); return; }
  const v = parseInt($('#guessInput').value, 10);
  if(isNaN(v) || v < 1 || v > max){ $('#guessInput').focus(); return; }
  tries++;
  $('#tries').textContent = tries;
  const h = $('#hint');
  let cls, label;
  if(v === secret){
    won = true; label = t('hintWin', secret, tries); cls = 'win';
    $('#display').textContent = secret;
    if(!best[max] || tries < best[max]){ best[max] = tries; $('#best').textContent = tries; }
    $('#guessInput').disabled = true;
    history.push({v, t:'w'});
  } else if(v < secret){
    label = t('hintHigher'); cls = 'higher'; history.push({v, t:'h'});
  } else {
    label = t('hintLower'); cls = 'lower'; history.push({v, t:'l'});
  }
  h.textContent = label; h.className = 'gn-hint ' + cls;
  $('#guessInput').value = ''; if(!won) $('#guessInput').focus();
  renderHistory();
}

function renderHistory(){
  $('#history').innerHTML = history.slice(-20).map(x =>
    `<span class="gn-pip ${x.t}">${x.t==='w'?'🎉':x.t==='h'?'▲':'▼'} ${x.v}</span>`).join('');
}

$('#guessInput').addEventListener('keydown', e => { if(e.key === 'Enter') doGuess(); });

$('#toolbar').innerHTML = `
  <button class="gz-btn gz-btn-secondary" onclick="newGame()">${t('btnNew')}</button>`;

GZ.renderToolPage({
  category: 'fun',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🪙', href:'/fun/coin-flip.html', name:'Coin Flip'},
    {icon:'🧠', href:'/fun/mastermind.html', name:'Mastermind'},
    {icon:'🎲', href:'/fun/dice-roller.html', name:'Dice Roller'},
    {icon:'🔢', href:'/calc/random-number-generator.html', name:'Random Number'},
  ]
});
newGame();
</script>
