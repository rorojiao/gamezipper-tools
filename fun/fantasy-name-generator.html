<script>
GZI18n.register({
  en: {
    toolTitle: 'Fantasy Name Generator',
    toolDesc: 'Create names for elves, dwarves, dragons, wizards, orcs, halflings and more — perfect for D&D, RPGs, novels and games. Get 20 unique fantasy names every click. Free, private, no signup.',
    rElf: '🧝 Elf', rDwarf: '🪓 Dwarf', rDragon: '🐉 Dragon', rWizard: '🧙 Wizard',
    rOrc: '👹 Orc', rHalfling: '🍃 Halfling', rHuman: '⚔️ Human', rGoblin: '👺 Goblin',
    rDemon: '😈 Demon', rVampire: '🦇 Vampire',
    lblEpithet: 'Add epithet (e.g. "the Brave")',
    btnGen: 'Generate 20 names',
    btnCopy: 'Copy All',
    copied: 'Copied!',
    step1: 'Pick a fantasy race — Elf, Dwarf, Dragon, Wizard and more',
    step2: 'Toggle the epithet option on or off',
    step3: 'Click Generate to get 20 unique fantasy names',
    step4: 'Click the copy icon on any name to grab it',
  },
  zh: {
    toolTitle: '奇幻名字生成器',
    toolDesc: '为精灵、矮人、龙、巫师、兽人、半身人等生成名字 — 适合 D&D、RPG、小说和游戏。每次点击获得 20 个独特的奇幻名字。免费、私密、无需注册。',
    rElf: '🧝 精灵', rDwarf: '🪓 矮人', rDragon: '🐉 龙', rWizard: '🧙 巫师',
    rOrc: '👹 兽人', rHalfling: '🍃 半身人', rHuman: '⚔️ 人类', rGoblin: '👺 哥布林',
    rDemon: '😈 恶魔', rVampire: '🦇 吸血鬼',
    lblEpithet: '添加称号（如「勇者」）',
    btnGen: '生成 20 个名字',
    btnCopy: '全部复制',
    copied: '已复制！',
    step1: '选择奇幻种族 — 精灵、矮人、龙、巫师等',
    step2: '开启或关闭称号选项',
    step3: '点击「生成」获得 20 个独特的奇幻名字',
    step4: '点击任意名字旁的复制按钮即可获取',
  }
});

const { $, t, showToast } = GZ;
const pick = a => a[Math.floor(Math.random() * a.length)];
const cap = s => s.charAt(0).toUpperCase() + s.slice(1);

// Phonetic syllable banks per race
const RACES = {
  elf:     { pre:['Ae','Cae','Fae','Lue','Ely','Syl','Thra','Ara','Ily','Nae','Fae','Quil','Ty','Vel','Zeph','Lori','Aer','Cala','Eow','Gael'], mid:['lan','riel','win','driel','thiel','sia','nae','riel','las','ndil'], suf:['eth','wen','iel','aeth','ys','anis','andil','eth','wyn','las','ariel'] },
  dwarf:   { pre:['Thor','Bif','Bom','Dwal','Gim','Glo','Balu','Dur','Far','Nora','Thrain','Bof','Gro','Khar','Darg','Bru','Khaz','Throg','Grum','Nor'], mid:['in','ur','an','oi','ag','und','or','ek'], suf:['in','ur','an','ek','grim','bek','dor','dak','mund','son','gar','dumn'] },
  dragon:  { pre:['Vor','Drak','Ign','Pyx','Zyr','Bal','Mor','Ser','Vyx','Chrom','Tiam','Fafn','Saph','Rhae','Nyx','Verm','Aer','Nox','Pyro','Glae'], mid:['ax','ix','ox','aex','yrix','oth','agoth'], suf:['ath','ix','oth','ax','orix','astrasz','gos','adon','arymos','ithrax','agon'] },
  wizard:  { pre:['Al','Mer','Gan','El','Mor','Zar','Bel','Kael','Thaum','Pell','Hex','Cael','Vael','Oth','Quen','Syl','Mor','Tze','Yav','Xan'], mid:['de','le','re','tha','vo','ran','dor','azar'], suf:['dor','mer','wen','staf','rias','azar','endor','orix','mundus','theus','wen','dor'] },
  orc:     { pre:['Gor','Mog','Ugl','Lur','Bru','Grom','Naz','Urz','Karg','Shag','Drak','Mau','Thok','Zug','Grom','Orog','Skar','Uruk','Vrak','Zar'], mid:['gu','ka','ra','to','sha','nu','go'], suf:['nak','gar','tuk','nakh','gor','dush','mok','rug','zhar','grish','lub'] },
  halfling:{ pre:['Ros','Mer','Pip','Sam','Bil','Fol','Tom','Dais','Lob','Ted','Bel','Hal','Nob','Prim','Dro','Tol','Pen','Mar','Wil','Tim'], mid:['o','a','e','i','y'], suf:['co','ty','per','do','bard','took','foot','thorn','good','wise','burr','bold'] },
  human:   { pre:['Al','Ed','Ro','Gar','Wil','Tho','Hen','Bar','Ric','Al','Gav','Dun','Mer','Tob','Col','Ste','Reg','Cyn','Edw','Ead'], mid:['ber','red','lin','mund','gar','ward','ric','stan'], suf:['bert','red','mund','ward','stan','ric','win','olf','ric','gar','ed','mond','ias'] },
  goblin:  { pre:['Snik','Grik','Mik','Zik','Blik','Krik','Snar','Splug','Yik','Glip','Murg','Snot','Skab','Gnash','Rik','Tik','Blit','Krak','Wheeze','Yap'], mid:['it','ot','ak','ug','iz','ek'], suf:['zit','rot','nak','grub','snik','snag','teeth','grab','crumb','toe','lick','snik'] },
  demon:   { pre:['Bal','Az','Bel','Mal','Mor','Vex','Zar','Xar','Kael','Thol','Nyx','Vael','Carn','Drek','Gorg','Hex','Meph','Vor','Zeph','Nox'], mid:['ze','ph','go','ra','tho','xe','zeb'], suf:['zor','moth','zebub','phegor','garoth','gor','xus','thoth','zebul','gorth','rax'] },
  vampire: { pre:['Vlad','Carmil','Drac','Lest','Al','Ser','Luc','Mir','Nos','Vlad','Cass','El','Rav','Sang','Vesp','Nyx','Mor','Val','Crav','Sel'], mid:['a','i','e','il','an','er','yn'], suf:['mir','la','fer','tatu','ius','ros','vent','na','rak','wulf','mere','tine','aith'] },
};

const EPITHETS = ['the Brave','the Wise','the Fair','the Cruel','the Bold','the Pale','the Raven','the Stormborn','the Wanderer','the Just','the Dread','the Golden','the Shadow','the Silent','the eternal','the Cursed','the Merciful','the Broken','the relentless','the forgotten','the Bloodied','the Patient','the Wanderer','the Hawk','the lone'];

let race = 'elf';

const RACE_LIST = [
  {id:'elf',key:'rElf'},{id:'dwarf',key:'rDwarf'},{id:'dragon',key:'rDragon'},{id:'wizard',key:'rWizard'},
  {id:'orc',key:'rOrc'},{id:'halfling',key:'rHalfling'},{id:'human',key:'rHuman'},{id:'goblin',key:'rGoblin'},
  {id:'demon',key:'rDemon'},{id:'vampire',key:'rVampire'},
];
$('#race-tabs').innerHTML = RACE_LIST.map(r => `<button data-id="${r.id}" class="${r.id===race?'active':''}">${t(r.key)}</button>`).join('');
document.querySelectorAll('#race-tabs button').forEach(b => {
  b.addEventListener('click', () => {
    document.querySelectorAll('#race-tabs button').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    race = b.dataset.id;
    generate();
  });
});

function makeName() {
  const b = RACES[race];
  const useMid = Math.random() < 0.55 && b.mid.length;
  let name = pick(b.pre) + (useMid ? pick(b.mid) : '') + pick(b.suf);
  name = cap(name.toLowerCase());
  if ($('#epithet').checked && Math.random() < 0.6) {
    name += ' ' + pick(EPITHETS);
  }
  return name;
}

function generate() {
  const seen = new Set();
  const names = [];
  let safety = 0;
  while (names.length < 20 && safety < 300) {
    const n = makeName();
    if (!seen.has(n)) { seen.add(n); names.push(n); }
    safety++;
  }
  $('#grid').innerHTML = names.map(n => `
    <div class="fn-card">
      <span class="name">${n.replace(/</g,'&lt;')}</span>
      <button data-name="${n.replace(/"/g,'&quot;')}" title="copy">📋</button>
    </div>`).join('');
  document.querySelectorAll('#grid .fn-card button').forEach(b => {
    b.addEventListener('click', async () => {
      try { await navigator.clipboard.writeText(b.dataset.name.replace(/&quot;/g,'"')); showToast(t('copied')); }
      catch (e) { showToast(t('copied')); }
    });
  });
}

function copyAll() {
  const names = [...document.querySelectorAll('#grid .fn-card .name')].map(e => e.textContent);
  if (!names.length) return;
  navigator.clipboard.writeText(names.join('\n')).then(() => showToast(t('copied'))).catch(() => showToast(t('copied')));
}

$('#lbl-epithet').textContent = t('lblEpithet');
$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="generate()">${t('btnGen')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="copyAll()">📋 ${t('btnCopy')}</button>`;
$('#epithet').addEventListener('change', generate);

generate();

GZ.renderToolPage({
  category: 'fun',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'😎', href:'/fun/cool-nickname-generator.html', name:'Cool Nickname Generator'},
    {icon:'🎮', href:'/fun/gamertag-generator.html', name:'Gamertag Generator'},
    {icon:'🎸', href:'/fun/band-name-generator.html', name:'Band Name Generator'},
    
  ]
});
</script>
