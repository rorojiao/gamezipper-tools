<script>
GZI18n.register({
  en: {
    toolTitle: 'Round Corners Image',
    toolDesc: 'Round the corners of any image online. Adjustable radius, one-click circle, transparent PNG or filled background. Free and browser-based.',
    selectBtn: 'Select Image',
    dropzone: 'Drop an image here or click to upload',
    radius: 'Corner Radius',
    circle: 'Circle',
    bg: 'Background',
    transparent: 'Transparent corners (PNG)',
    downloadPng: 'Download PNG',
    downloadJpg: 'Download JPG',
    reset: 'Reset',
    newImage: 'New Image',
    step1: 'Upload or drag and drop an image',
    step2: 'Drag the Corner Radius slider (or click Circle)',
    step3: 'Choose transparent corners or a background color',
    step4: 'Download as PNG (transparent) or JPG (filled)',
  },
  zh: {
    toolTitle: '图片圆角工具',
    toolDesc: '在线为图片添加圆角。可调整圆角半径、一键转圆形，支持透明 PNG 或填充背景。免费，浏览器本地处理。',
    selectBtn: '选择图片',
    dropzone: '拖拽图片到此处或点击上传',
    radius: '圆角半径',
    circle: '圆形',
    bg: '背景色',
    transparent: '透明圆角（PNG）',
    downloadPng: '下载 PNG',
    downloadJpg: '下载 JPG',
    reset: '重置',
    newImage: '换张图片',
    step1: '上传或拖拽图片到页面',
    step2: '拖动圆角半径滑块（或点击「圆形」）',
    step3: '选择透明圆角或填充背景色',
    step4: '下载为 PNG（透明）或 JPG（填充）',
  }
});

const { $, t } = GZ;
let origImg = null;
let dims = { w: 0, h: 0 };
const canvas = $('#canvas');
const ctx = canvas.getContext('2d');

function loadImage(file){
  const r=new FileReader();
  r.onload=e=>{origImg=new Image();origImg.onload=()=>{
    const maxSide=1600;let s=1;
    if(Math.max(origImg.width,origImg.height)>maxSide)s=maxSide/Math.max(origImg.width,origImg.height);
    dims.w=Math.round(origImg.width*s);dims.h=Math.round(origImg.height*s);
    const maxR=Math.round(Math.min(dims.w,dims.h)/2);
    $('#radius').max=maxR;
    $('#radius').value=Math.min(60,maxR);$('#radius-val').textContent=$('#radius').value;
    $('#controls').style.display='block';$('#dropzone').style.display='none';render();
  };origImg.src=e.target.result;};
  r.readAsDataURL(file);
}

function roundedPath(c,x,y,w,h,r){
  r=Math.max(0,Math.min(r,Math.min(w,h)/2));
  c.beginPath();
  c.moveTo(x+r,y);
  c.arcTo(x+w,y,x+w,y+h,r);
  c.arcTo(x+w,y+h,x,y+h,r);
  c.arcTo(x,y+h,x,y,r);
  c.arcTo(x,y,x+w,y,r);
  c.closePath();
}

function render(){
  if(!origImg)return;
  const w=dims.w,h=dims.h,radius=+$('#radius').value;
  canvas.width=w;canvas.height=h;
  ctx.clearRect(0,0,w,h);
  if(!$('#transparent').checked){ctx.fillStyle=$('#bg-color').value;ctx.fillRect(0,0,w,h);}
  ctx.save();
  roundedPath(ctx,0,0,w,h,radius);
  ctx.clip();
  ctx.drawImage(origImg,0,0,w,h);
  ctx.restore();
}

function download(type){
  if(!origImg)return;
  const a=document.createElement('a');
  a.href=canvas.toDataURL(type==='jpg'?'image/jpeg':'image/png',0.92);
  a.download='rounded-corners.'+(type==='jpg'?'jpg':'png');a.click();
}

$('#radius').addEventListener('input',()=>{$('#radius-val').textContent=$('#radius').value;render();});
$('#circle-btn').onclick=()=>{$('#radius').value=$('#radius').max;$('#radius-val').textContent=$('#radius').value;render();};
$('#bg-color').addEventListener('input',render);
$('#transparent').onchange=()=>{$('#bg-color').disabled=$('#transparent').checked;render();};
$('#bg-color').disabled=true;

$('#select-btn').textContent=t('selectBtn');$('#dropzone-text').textContent=t('dropzone');
$('#lbl-radius').textContent=t('radius');$('#circle-btn').textContent=t('circle');
$('#lbl-bg').textContent=t('bg');$('#lbl-transparent').textContent=t('transparent');

$('#dropzone').onclick=()=>$('#file-input').click();
$('#file-input').onchange=e=>{if(e.target.files[0])loadImage(e.target.files[0]);};
['dragover'].forEach(ev=>$('#dropzone').addEventListener(ev,e=>{e.preventDefault();$('#dropzone').classList.add('dragover');}));
['dragleave','drop'].forEach(ev=>$('#dropzone').addEventListener(ev,e=>{e.preventDefault();$('#dropzone').classList.remove('dragover');}));
$('#dropzone').addEventListener('drop',e=>{if(e.dataTransfer.files[0])loadImage(e.dataTransfer.files[0]);});

$('#toolbar').innerHTML=`
  <button class="gz-btn" onclick="download('png')">${t('downloadPng')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="download('jpg')">${t('downloadJpg')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="document.getElementById('radius').value=60;document.getElementById('radius-val').textContent=60;render();">${t('reset')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="document.getElementById('dropzone').style.display='block';document.getElementById('controls').style.display='none';">${t('newImage')}</button>`;

GZ.renderToolPage({
  category: 'image',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'⭕', href:'/image/circle-cropper.html', name:'Circle Cropper'},
    {icon:'🔠', href:'/image/add-text-to-image.html', name:'Add Text to Image'},
    {icon:'🖼️', href:'/image/add-border.html', name:'Add Border'},
    {icon:'🔄', href:'/image/image-rotator.html', name:'Image Rotator'},
  ]
});
</script>
