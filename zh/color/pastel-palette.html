<script>
GZI18n.register({
  en: {
    toolTitle: 'Pastel Color Palette Generator',
    toolDesc: 'Generate soft, dreamy pastel color palettes — pick a base hue, harmony and mood, then copy HEX, RGB, HSL or ready-to-use CSS variables.',
    lblHue: 'Base hue',
    lblLight: 'Lightness',
    lblHarmony: 'Harmony',

    optTriad: 'Triadic',
    optSpread: 'Wide spread',
    moodDefault: '🎨 Custom',
    moodCute: '🍼 Baby',
    moodSpring: '🌸 Spring',
    moodCalm: '🌿 Calm',
    moodVintage: '📷 Vintage',
    moodCandy: '🍬 Candy',
    moodSage: '🍃 Sage',
    btnRegen: '🎲 New palette',
    btnCss: 'Copy CSS vars',
    btnCopyAll: 'Copy all HEX',
    copied: '✓ Copied!',
    step1: 'Drag the Base hue and Lightness sliders to set the mood',
    step2: 'Choose a harmony — analogous and triadic give the most pleasing pastels',
    step3: 'Click any swatch to copy its HEX code',
    step4: 'Use Copy CSS vars to grab ready-to-paste CSS custom properties',
  },
  zh: {
    toolTitle: '马卡龙配色生成器',
    toolDesc: '生成柔和梦幻的马卡龙色系配色方案 — 选择基础色相、配色规则和氛围，一键复制 HEX、RGB、HSL 或可直接粘贴的 CSS 变量。',
    lblHue: '基础色相',
    lblLight: '明度',
    lblHarmony: '配色规则',
    optMono: '单色',
    optAnalog: '类似色',
    optComplement: '互补色',
    optTriad: '三色',
    optSpread: '宽分布',
    moodDefault: '🎨 自定义',
    moodCute: '🍼 婴儿粉',
    moodSpring: '🌸 春日',
    moodCalm: '🌿 宁静',
    moodVintage: '📷 复古',
    moodCandy: '🍬 糖果',
    moodSage: '🍃 鼠尾草',
    btnRegen: '🎲 重新生成',
    btnCss: '复制 CSS 变量',
    btnCopyAll: '复制全部 HEX',
    copied: '✓ 已复制！',
    step1: '拖动「基础色相」和「明度」滑块设定氛围',
    step2: '选择配色规则 — 类似色和三色搭配最和谐',
    step3: '点击任一色块即可复制其 HEX 代码',
    step4: '点击「复制 CSS 变量」获取可直接粘贴的 CSS 变量',
  }
});

const { $, copyText, t, showToast } = GZ;
const MOODS = {
  default: null,
  cute:     { hue: 330, light: 88, sat: 55 },
  spring:   { hue: 130, light: 82, sat: 50 },
  calm:     { hue: 200, light: 85, sat: 35 },
  vintage:  { hue: 30,  light: 78, sat: 38 },
  candy:    { hue: 290, light: 86, sat: 58 },
  sage:     { hue: 95,  light: 80, sat: 28 },
};
let mood = 'default';
let current = [];

function hslToHex(h, s, l) {
  s /= 100; l /= 100;
  const k = n => (n + h / 30) % 12;
  const a = s * Math.min(l, 1 - l);
  const f = n => l - a * Math.max(-1, Math.min(k(n) - 3, Math.min(9 - k(n), 1)));
  const toHex = x => Math.round(255 * x).toString(16).padStart(2, '0');
  return '#' + toHex(f(0)) + toHex(f(8)) + toHex(f(4));
}
function hslToRgb(h, s, l) {
  s /= 100; l /= 100;
  const k = n => (n + h / 30) % 12;
  const a = s * Math.min(l, 1 - l);
  const f = n => l - a * Math.max(-1, Math.min(k(n) - 3, Math.min(9 - k(n), 1)));
  return [Math.round(255 * f(0)), Math.round(255 * f(8)), Math.round(255 * f(4))];
}
function clamp(n, lo, hi) { return Math.max(lo, Math.min(hi, n)); }

function generate() {
  const baseHue = +$('#hue').value;
  const baseLight = +$('#light').value;
  const sat = MOODS[mood] ? MOODS[mood].sat : (42 + (baseLight > 88 ? -8 : 8));
  const harm = $('#harmony').value;
  let hues = [];
  switch (harm) {
    case 'mono':       hues = [baseHue, baseHue, baseHue, baseHue, baseHue]; break;
    case 'analog':     hues = [baseHue - 30, baseHue - 15, baseHue, baseHue + 15, baseHue + 30]; break;
    case 'complement': hues = [baseHue - 18, baseHue, baseHue + 18, baseHue + 180, baseHue + 200]; break;
    case 'triad':      hues = [baseHue, baseHue + 120, baseHue + 240, baseHue + 15, baseHue + 135]; break;
    case 'spread':     hues = [baseHue, baseHue + 72, baseHue + 144, baseHue + 216, baseHue + 288]; break;
  }
  const lights = harm === 'mono' ? [baseLight - 12, baseLight - 6, baseLight, baseLight + 4, baseLight + 8]
                                 : [baseLight - 4, baseLight, baseLight + 3, baseLight - 7, baseLight + 6];
  current = hues.map((h, i) => {
    const hh = ((h % 360) + 360) % 360;
    const ll = clamp(lights[i], 62, 96);
    const ss = clamp(sat + (i % 2 === 0 ? 4 : -4), 18, 62);
    const hex = hslToHex(hh, ss, ll);
    const [r, g, b] = hslToRgb(hh, ss, ll);
    return { hex, r, g, b, h: hh, s: ss, l: ll };
  });
  render();
}

function render() {
  $('#palette').innerHTML = current.map(c => `
    <div class="pst-swatch" data-hex="${c.hex}" title="Click to copy ${c.hex}">
      <div class="pst-color" style="background:${c.hex}"><span>${c.hex.toUpperCase()}</span></div>
      <div class="pst-info">
        <b>RGB</b> ${c.r}, ${c.g}, ${c.b}<br>
        <b>HSL</b> ${c.h}, ${c.s}%, ${c.l}%
      </div>
    </div>`).join('');
  $('#css-out').textContent = ':root {\n' + current.map((c, i) => `  --pastel-${i + 1}: ${c.hex};`).join('\n') + '\n}';
}

// Mood buttons
$('#moods').innerHTML = Object.keys(MOODS).map(k => `<button class="pst-mood${k === 'default' ? ' active' : ''}" data-mood="${k}">${t('mood' + k.charAt(0).toUpperCase() + k.slice(1))}</button>`).join('');
$('#moods').addEventListener('click', e => {
  const btn = e.target.closest('.pst-mood'); if (!btn) return;
  document.querySelectorAll('.pst-mood').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  mood = btn.dataset.mood;
  if (MOODS[mood]) {
    $('#hue').value = MOODS[mood].hue;
    $('#light').value = MOODS[mood].light;
  }
  generate();
});

// Swatch click to copy
$('#palette').addEventListener('click', e => {
  const sw = e.target.closest('.pst-swatch'); if (!sw) return;
  copyText(sw.dataset.hex);
  showToast(t('copied') + ' ' + sw.dataset.hex.toUpperCase());
});

['hue', 'light', 'harmony'].forEach(id => $('#' + id).addEventListener('input', generate));

$('#btn-regen').onclick = () => {
  $('#hue').value = Math.floor(Math.random() * 360);
  $('#light').value = 70 + Math.floor(Math.random() * 22);
  generate();
};
$('#btn-css').onclick = () => { copyText($('#css-out').textContent); showToast(t('copied')); };
$('#btn-copy-all').onclick = () => { copyText(current.map(c => c.hex).join(', ')); showToast(t('copied')); };

generate();

GZ.renderToolPage({
  category: 'color',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1', 'step2', 'step3', 'step4'],
  related: [
    {icon:'🎨', href:'/color/palette.html', name:'Palette Generator'},
    {icon:'🌈', href:'/color/harmony.html', name:'Color Harmony'},
    {icon:'🎲', href:'/color/random-color-palette.html', name:'Random Palette'},
    {icon:'🎚️', href:'/color/shades.html', name:'Shades Generator'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
