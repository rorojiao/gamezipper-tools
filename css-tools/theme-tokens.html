<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What are design tokens?", "acceptedAnswer": {"@type": "Answer", "text": "Design tokens are named values that store design decisions — colors, spacing, font sizes, shadows — as variables. They make design systems consistent, themeable, and easy to maintain across an entire product."}}, {"@type": "Question", "name": "How do I use CSS variables in my code?", "acceptedAnswer": {"@type": "Answer", "text": "Reference any token in your CSS with var(--color-primary) or in SCSS with $color-primary. Tokens are defined in :root and can be overridden in [data-theme='dark'] or specific scopes."}}, {"@type": "Question", "name": "Can I export tokens to JSON for use in JS or design tools?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. Switch to the JSON output tab to get a clean object with all tokens, perfect for Style Dictionary, Figma plugins, Tailwind config, or any JS-based design system."}}, {"@type": "Question", "name": "Are dark mode tokens supported?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. Add a second [data-theme='dark'] block to override the same variable names with dark mode values. Toggle the theme by setting data-theme on the html or body element."}}]}</script>

<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">

</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'CSS Theme Tokens',
    toolDesc: 'Build a design system with CSS custom properties. Define colors, spacing, typography, shadows and more — export to :root CSS, JSON or SCSS.',
    tabs: ['Colors','Spacing','Typography','Shadows','Radii','Custom'],
    copy: 'Copy',
    addToken: '+ Add token',
    name: 'Name', value: 'Value', type: 'Type', remove: '×',
    cssOutput: 'CSS Output', jsonOutput: 'JSON Output', scssOutput: 'SCSS Output',
    cssCode: 'CSS code', jsonCode: 'JSON', scssCode: 'SCSS code',
    reset: 'Reset',
    step1: 'Choose a token category tab above',
    step2: 'Edit existing tokens or add new ones',
    step3: 'Switch between CSS, JSON and SCSS outputs',
    step4: 'Copy the output and paste into your design system',
  },
  zh: {
    toolTitle: 'CSS 主题变量',
    toolDesc: '使用 CSS 自定义属性构建设计系统。定义颜色、间距、排版、阴影等 — 导出为 :root CSS、JSON 或 SCSS。',
    tabs: ['颜色','间距','排版','阴影','圆角','自定义'],
    copy: '复制',
    addToken: '+ 添加变量',
    name: '名称', value: '值', type: '类型', remove: '×',
    cssOutput: 'CSS 输出', jsonOutput: 'JSON 输出', scssOutput: 'SCSS 输出',
    cssCode: 'CSS 代码', jsonCode: 'JSON', scssCode: 'SCSS 代码',
    reset: '重置',
    step1: '选择上方的变量分类标签',
    step2: '编辑现有变量或新增变量',
    step3: '在 CSS、JSON 和 SCSS 输出之间切换',
    step4: '复制输出并粘贴到你的设计系统中',
  }
});

const { $, t, copyText } = GZ;
let currentTab = 0;
let currentFmt = 0;

const tokens = {
  colors: [
    {name:'primary', value:'#4ecdc4'},
    {name:'secondary', value:'#ff6b9d'},
    {name:'accent', value:'#ffd93d'},
    {name:'success', value:'#00d672'},
    {name:'warning', value:'#ffa500'},
    {name:'danger', value:'#e94560'},
    {name:'text', value:'#1a1a2a'},
    {name:'text-muted', value:'#666'},
    {name:'bg', value:'#ffffff'},
    {name:'bg-subtle', value:'#f5f5f7'},
    {name:'border', value:'#e0e0e0'},
  ],
  spacing: [
    {name:'xs', value:'4px'},
    {name:'sm', value:'8px'},
    {name:'md', value:'16px'},
    {name:'lg', value:'24px'},
    {name:'xl', value:'32px'},
    {name:'2xl', value:'48px'},
    {name:'3xl', value:'64px'},
  ],
  typography: [
    {name:'font-sans', value:'-apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif'},
    {name:'font-mono', value:'Menlo, Consolas, monospace'},
    {name:'text-xs', value:'12px'},
    {name:'text-sm', value:'14px'},
    {name:'text-base', value:'16px'},
    {name:'text-lg', value:'18px'},
    {name:'text-xl', value:'24px'},
    {name:'text-2xl', value:'32px'},
    {name:'text-3xl', value:'48px'},
    {name:'leading-tight', value:'1.25'},
    {name:'leading-normal', value:'1.5'},
  ],
  shadows: [
    {name:'shadow-sm', value:'0 1px 2px rgba(0,0,0,0.05)'},
    {name:'shadow-md', value:'0 4px 6px rgba(0,0,0,0.1)'},
    {name:'shadow-lg', value:'0 10px 25px rgba(0,0,0,0.15)'},
    {name:'shadow-xl', value:'0 20px 40px rgba(0,0,0,0.2)'},
  ],
  radii: [
    {name:'rounded-sm', value:'4px'},
    {name:'rounded-md', value:'8px'},
    {name:'rounded-lg', value:'12px'},
    {name:'rounded-xl', value:'16px'},
    {name:'rounded-2xl', value:'24px'},
    {name:'rounded-full', value:'9999px'},
  ],
  custom: [],
};

const tabKeys = ['colors','spacing','typography','shadows','radii','custom'];
const tabLabels = t('tabs');

function renderTabs(){
  $('#tabs').innerHTML = tabLabels.map((l,i)=>`<div class="tt-tab ${i===currentTab?'active':''}" onclick="selectTab(${i})">${l}</div>`).join('');
}

function selectTab(i){
  currentTab = i;
  renderTabs();
  renderSection();
  renderOutput();
}

function renderSection(){
  const cat = tabKeys[currentTab];
  const list = tokens[cat];
  const html = `<div class="tt-section"><h3>${tabLabels[currentTab]}</h3>${
    list.map((tk,idx) => `<div class="tt-row">
      <span class="name">--${cat}-</span>
      <input type="text" value="${tk.name}" onchange="updateToken('${cat}',${idx},'name',this.value)">
      <input type="text" value="${tk.value}" onchange="updateToken('${cat}',${idx},'value',this.value)">
      <button onclick="removeToken('${cat}',${idx})">${t('remove')}</button>
    </div>`).join('')
  }<span class="tt-add" onclick="addToken('${cat}')">${t('addToken')}</span></div>`;
  $('#section').innerHTML = html;
}

window.updateToken = function(cat, idx, key, val){
  tokens[cat][idx][key] = val;
  renderOutput();
};
window.removeToken = function(cat, idx){
  tokens[cat].splice(idx, 1);
  renderSection();
  renderOutput();
};
window.addToken = function(cat){
  tokens[cat].push({name:cat+'-new', value:'#000'});
  renderSection();
  renderOutput();
};

function setFmt(i){
  currentFmt = i;
  document.querySelectorAll('.tt-fmt').forEach((b,j)=>b.classList.toggle('active', j===i));
  renderOutput();
}

function renderOutput(){
  let out = '';
  const f = currentFmt;
  if(f === 0){
    // CSS
    out = ':root {\n';
    tabKeys.forEach(cat => {
      if(!tokens[cat].length) return;
      out += `  /* ${tabLabels[tabKeys.indexOf(cat)]} */\n`;
      tokens[cat].forEach(tk => {
        const v = tk.value.includes(' ') ? `"${tk.value}"` : tk.value;
        out += `  --${cat}-${tk.name}: ${v};\n`;
      });
      out += '\n';
    });
    out += '}\n';
  } else if(f === 1){
    const obj = {};
    tabKeys.forEach(cat => {
      if(!tokens[cat].length) return;
      obj[cat] = {};
      tokens[cat].forEach(tk => { obj[cat][tk.name] = tk.value; });
    });
    out = JSON.stringify(obj, null, 2);
  } else {
    out = '// Design tokens (SCSS variables)\n';
    tabKeys.forEach(cat => {
      if(!tokens[cat].length) return;
      out += `\n// ${tabLabels[tabKeys.indexOf(cat)]}\n`;
      tokens[cat].forEach(tk => {
        out += `$${cat}-${tk.name}: ${tk.value};\n`;
      });
    });
  }
  $('#output').textContent = out;
}

renderTabs();
renderSection();
$('#toolbar').innerHTML = `
  <button class="gz-btn gz-btn-secondary tt-fmt active" onclick="setFmt(0)">CSS</button>
  <button class="gz-btn gz-btn-secondary tt-fmt" onclick="setFmt(1)">JSON</button>
  <button class="gz-btn gz-btn-secondary tt-fmt" onclick="setFmt(2)">SCSS</button>
  <button class="gz-btn" onclick="copyText($('#output').textContent)">📋 ${t('copy')}</button>`;
renderOutput();

GZ.renderToolPage({
  category: 'css',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🎨', href:'/css-tools/css-variables.html', name:'CSS Variables'},
    {icon:'🌈', href:'/css-tools/gradient-text.html', name:'Gradient Text'},
    {icon:'🎬', href:'/css-tools/animation.html', name:'Animation'},
    {icon:'🪟', href:'/css-tools/backdrop-filter.html', name:'Backdrop Filter'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
