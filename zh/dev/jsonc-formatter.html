let indent = 2;
const { $, copyText, t } = GZ;

// Strip JSONC comments and trailing commas to produce valid JSON
function stripCommentsAndTrailingCommas(text) {
  let result = '';
  let i = 0;
  let inString = false;
  let stringChar = '';
  let commentCount = 0;

  while (i < text.length) {
    const ch = text[i];
    const next = text[i + 1];

    if (inString) {
      result += ch;
      if (ch === '\\') { result += text[i+1] || ''; i += 2; continue; }
      if (ch === stringChar) inString = false;
      i++;
      continue;
    }

    // Block comment
    if (ch === '/' && next === '*') {
      commentCount++;
      i += 2;
      while (i < text.length && !(text[i] === '*' && text[i+1] === '/')) i++;
      i += 2;
      continue;
    }
    // Line comment
    if (ch === '/' && next === '/') {
      commentCount++;
      while (i < text.length && text[i] !== '\n') i++;
      continue;
    }
    // String start
    if (ch === '"' || ch === "'") {
      inString = true;
      stringChar = ch;
      result += ch;
      i++;
      continue;
    }
    result += ch;
    i++;
  }

  // Remove trailing commas before } or ]
  result = result.replace(/,(\s*[\}\]])/g, '$1');
  return { json: result, commentCount };
}

// Extract comments with positions for re-insertion
function extractComments(text) {
  const comments = [];
  let i = 0, inString = false, stringChar = '';

  while (i < text.length) {
    const ch = text[i], next = text[i+1];
    if (inString) {
      if (ch === '\\') { i += 2; continue; }
      if (ch === stringChar) inString = false;
      i++; continue;
    }
    if (ch === '/' && next === '*') {
      const start = i;
      i += 2;
      while (i < text.length && !(text[i] === '*' && text[i+1] === '/')) i++;
      comments.push({ type: 'block', text: text.substring(start, i+2), pos: start });
      i += 2; continue;
    }
    if (ch === '/' && next === '/') {
      const start = i;
      while (i < text.length && text[i] !== '\n') i++;
      comments.push({ type: 'line', text: text.substring(start, i), pos: start });
      continue;
    }
    if (ch === '"' || ch === "'") { inString = true; stringChar = ch; }
    i++;
  }
  return comments;
}

function doFormat() {
  const inp = $('#input').value.trim();
  if (!inp) return;
  const strip = $('#stripChk')?.checked;

  if (strip) {
    try {
      const { json, commentCount } = stripCommentsAndTrailingCommas(inp);
      const obj = JSON.parse(json);
      const formatted = JSON.stringify(obj, null, indent);
      $('#output').innerHTML = syntaxHighlight(formatted);
      $('#status').innerHTML = `<span style="color:var(--gz-success)">${t('validJsonc')} (${commentCount} ${t('stripped')})</span>`;
    } catch (e) {
      showError(e);
    }
  } else {
    // Keep comments: format JSON parts, preserve comments on their own lines
    try {
      const { json } = stripCommentsAndTrailingCommas(inp);
      const obj = JSON.parse(json); // validate
      const comments = extractComments(inp);
      // Rebuild: format JSON then re-insert comments
      // Simple approach: format the stripped version, then append original comments at the end
      let formatted = JSON.stringify(obj, null, indent);
      if (comments.length) {
        formatted += '\n\n' + comments.map(c => c.text).join('\n');
      }
      $('#output').innerHTML = syntaxHighlightWithComments(formatted);
      $('#status').innerHTML = `<span style="color:var(--gz-success)">${t('validJsonc')} (${comments.length} comments)</span>`;
    } catch (e) {
      showError(e);
    }
  }
}

function doMinify() {
  const inp = $('#input').value.trim();
  if (!inp) return;
  try {
    const { json, commentCount } = stripCommentsAndTrailingCommas(inp);
    const obj = JSON.parse(json);
    $('#output').textContent = JSON.stringify(obj);
    $('#status').innerHTML = `<span style="color:var(--gz-success)">${t('validJsonc')} (${commentCount} ${t('stripped')})</span>`;
  } catch (e) { showError(e); }
}

function doToJson() {
  if (!$('#stripChk')?.checked) { $('#stripChk').checked = true; }
  doFormat();
}

function syntaxHighlight(json) {
  return json.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/("(\\u[\da-fA-F]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(\.\d+)?([eE][+-]?\d+)?)/g, m => {
      let c = 'jc-number';
      if (/^"/.test(m)) c = /:$/.test(m) ? 'jc-key' : 'jc-string';
      else if (/true|false/.test(m)) c = 'jc-bool';
      else if (/null/.test(m)) c = 'jc-null';
      return `<span class="${c}">${m}</span>`;
    });
}

function syntaxHighlightWithComments(text) {
  let html = escHtml(text);
  // Highlight comments
  html = html.replace(/(\/\/[^\n]*)/g, '<span class="jc-comment">$1</span>');
  html = html.replace(/(\/\*[\s\S]*?\*\/)/g, '<span class="jc-comment">$1</span>');
  // Highlight JSON tokens (avoiding inside comment spans — simple approximation)
  return html;
}

function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function showError(e) {
  const msg = e.message;
  const posMatch = msg.match(/position (\d+)/);
  let info = `<span style="color:var(--gz-accent)">${t('invalidJsonc')}: ${msg}</span>`;
  if (posMatch) {
    const pos = parseInt(posMatch[1]);
    const before = $('#input').value.substring(0, pos);
    const line = before.split('\n').length;
    const col = pos - before.lastIndexOf('\n');
    info += ` <span style="opacity:.7">(Line ${line}, Col ${col})</span>`;
  }
  $('#status').innerHTML = info;
  $('#output').innerHTML = `<span style="color:var(--gz-accent)">${escHtml(msg)}</span>`;
}

  doFormat();
}
