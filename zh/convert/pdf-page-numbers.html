  en: {

  },
  zh: {

    toolDesc: '为任意 PDF 文档添加页码。可选择位置、字体大小、颜色、编号格式和起始页 — 完全在浏览器中使用 pdf-lib 完成，无需上传。',
    dzText: '拖拽 PDF 到此处或点击上传',
    pos: '位置', fmt: '格式', size: '字体大小', color: '文字颜色',
    margin: '边距（像素）', startPage: '从第几页开始编号', firstNum: '首个显示的页码',
    add: '添加页码', change: '更换', download: '下载 PDF',
    statusWorking: '正在添加页码…',
    statusDone: '✓ 页码已添加',
    statusErr: '✗ 错误：',
    step1: '拖拽或点击上方区域上传 PDF',
    step2: '选择位置、格式、字体大小、颜色和起始页',
    step3: '点击「添加页码」— pdf-lib 会在浏览器中为每页打上页码',
    step4: '下载带页码的 PDF',
  }
});

const { $, t } = GZ;
let currentBytes = null, currentFileName = '', outputUrl = null, totalPages = 0;
const { PDFDocument, StandardFonts, rgb } = PDFLib;

$('#color').addEventListener('input', e => $('#colorText').value = e.target.value);
$('#colorText').addEventListener('input', e => { if (/^#?[0-9a-fA-F]{6}$/.test(e.target.value)) { const v = e.target.value.startsWith('#') ? e.target.value : '#' + e.target.value; $('#color').value = v; } });

async function loadPdfFromFile(file) {
  currentFileName = file.name.replace(/\.pdf$/i, '');
  const buf = await file.arrayBuffer();
  let pdf;
  try { pdf = await PDFDocument.load(buf, { ignoreEncryption: true }); }
  catch (e) { $('#status').textContent = t('statusErr') + e.message; $('#status').className = 'pn-status err'; return; }
  currentBytes = buf;
  totalPages = pdf.getPageCount();
  $('#fileName').textContent = file.name;
  $('#fileMeta').textContent = `${(file.size / 1024).toFixed(1)} KB · ${totalPages} pages`;
  $('#fileInfo').style.display = 'flex';
  $('#dropzone').style.display = 'none';
  $('#controls').style.display = 'block';
  $('#status').textContent = '';
  $('#status').className = 'pn-status';
}

function hexToRgb(hex) {
  const m = /^#?([0-9a-fA-F]{6})$/.exec(hex);
  if (!m) return rgb(0.2, 0.2, 0.2);
  const n = parseInt(m[1], 16);
  return rgb(((n >> 16) & 255) / 255, ((n >> 8) & 255) / 255, (n & 255) / 255);
}

function toRoman(num, upper) {
  if (num < 1) return String(num);
  const map = [['M',1000],['CM',900],['D',500],['CD',400],['C',100],['XC',90],['L',50],['XL',40],['X',10],['IX',9],['V',5],['IV',4],['I',1]];
  let s = '';
  for (const [r, v] of map) { while (num >= v) { s += r; num -= v; } }
  return upper ? s : s.toLowerCase();
}

async function addNumbers() {
  if (!currentBytes) return;
  $('#progress').style.display = 'block';
  $('#progressBar').style.width = '0%';
  $('#status').textContent = t('statusWorking');
  $('#status').className = 'pn-status';
  try {
    const pdf = await PDFDocument.load(currentBytes, { ignoreEncryption: true });
    const font = await pdf.embedFont(StandardFonts.Helvetica);
    const pages = pdf.getPages();
    const total = pages.length;
    const pos = $('#pos').value;
    const fmt = $('#fmt').value;
    const size = parseInt($('#size').value, 10) || 12;
    const color = hexToRgb($('#colorText').value || '#333333');
    const margin = parseInt($('#margin').value, 10) || 30;
    const startPage = Math.max(1, Math.min(total, parseInt($('#startPage').value, 10) || 1));
    const firstNum = parseInt($('#firstNum').value, 10);
    const marginPt = margin * 0.75;
    let counter = firstNum;
    for (let i = 0; i < total; i++) {
      if (i < startPage - 1) continue;
      const page = pages[i];
      const { width, height } = page.getSize();
      let text;
      if (fmt === 'roman-lower') text = toRoman(counter, false);
      else if (fmt === 'roman-upper') text = toRoman(counter, true);
      else text = fmt.replace('{n}', counter).replace('{total}', total);
      const tw = font.widthOfTextAtSize(text, size);
      let x, y;
      const isBottom = pos.startsWith('bottom');
      y = isBottom ? marginPt : height - marginPt - size;
      if (pos.endsWith('center')) x = (width - tw) / 2;
      else if (pos.endsWith('right')) x = width - marginPt - tw;
      else x = marginPt;
      page.drawText(text, { x, y, size, font, color });
      counter++;
      if (i % 5 === 0) $('#progressBar').style.width = ((i + 1) / total * 100) + '%';
    }
    const out = await pdf.save();
    const blob = new Blob([out], { type: 'application/pdf' });
    if (outputUrl) URL.revokeObjectURL(outputUrl);
    outputUrl = URL.createObjectURL(blob);
    $('#progressBar').style.width = '100%';
    $('#status').innerHTML = `${t('statusDone')} · <a class="gz-btn" href="${outputUrl}" download="${currentFileName}-numbered.pdf" style="margin-left:6px">${t('download')}</a> (${(blob.size/1024).toFixed(1)} KB)`;
    $('#status').className = 'pn-status ok';
    setTimeout(() => { $('#progress').style.display = 'none'; }, 600);
  } catch (e) {
    $('#status').textContent = t('statusErr') + e.message;
    $('#status').className = 'pn-status err';
    $('#progress').style.display = 'none';
  }
}

const dz = $('#dropzone');
const fi = $('#fileInput');
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag'); });
dz.addEventListener('dragleave', e => { dz.classList.remove('drag'); });
dz.addEventListener('drop', e => { e.preventDefault(); dz.classList.remove('drag'); if (e.dataTransfer.files[0]) loadPdfFromFile(e.dataTransfer.files[0]); });
fi.addEventListener('change', e => { if (e.target.files[0]) loadPdfFromFile(e.target.files[0]); });
$('#changeFile').addEventListener('click', () => {
  $('#dropzone').style.display = 'block';
  $('#fileInfo').style.display = 'none';
  $('#controls').style.display = 'none';
  fi.value = '';
  currentBytes = null;
});

$('#toolbar').innerHTML = `<button class="gz-btn" onclick="addNumbers()">${t('add')}</button>`;

GZ.renderToolPage({
  category: 'convert',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [

    {icon:'✂️', href:'/convert/pdf-page-splitter.html', name:'PDF Splitter'},
    {icon:'🔄', href:'/convert/pdf-rotate.html', name:'PDF Rotate'},
    {icon:'💧', href:'/convert/pdf-watermark.html', name:'PDF Watermark'},
  ]
});
</script>
