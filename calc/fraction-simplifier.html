<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "How do I simplify a fraction?", "acceptedAnswer": {"@type": "Answer", "text": "To simplify a fraction, divide both the numerator and denominator by their greatest common divisor (GCD). For example, 8/12 simplifies to 2/3 because the GCD of 8 and 12 is 4."}}, {"@type": "Question", "name": "What is an improper fraction?", "acceptedAnswer": {"@type": "Answer", "text": "An improper fraction has a numerator larger than or equal to its denominator, such as 7/4. It can be converted to a mixed number like 1 3/4."}}, {"@type": "Question", "name": "How is the GCD calculated?", "acceptedAnswer": {"@type": "Answer", "text": "The greatest common divisor is found using the Euclidean algorithm, which repeatedly divides the larger number by the smaller until the remainder is zero. The last non-zero remainder is the GCD."}}, {"@type": "Question", "name": "Can this tool handle negative fractions?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. Enter a negative numerator or denominator and the calculator will simplify it correctly, keeping the negative sign in the numerator of the result."}}]}</script>

<script>
GZI18n.register({

  zh: {

    toolDesc: '即时将任意分数化为最简形式。查看最大公约数（GCD）、小数、百分比、带分数转换和化简步骤 — 免费，浏览器本地运行。',
    input: '输入分数',
    num: '分子',
    den: '分母',
    simplify: '化简',
    clear: '清除',
    example: '示例',
    simplified: '最简分数',
    gcd: '最大公约数',
    decimal: '小数',
    percent: '百分比',
    mixed: '带分数',
    reciprocal: '倒数',
    errZero: '分母不能为零。',
    errInput: '请为分子和分母输入有效整数。',
    steps: '化简步骤',
    alreadySimple: '已是最简形式。',
    errNoInput: '请先输入两个数字。',
    step1: '输入分子（上）和分母（下）整数',
    step2: '点击「化简」将分数化为最简形式',
    step3: '查看最大公约数、小数、百分比和带分数转换',
    step4: '查看「化简步骤」了解计算过程',
  }
});

const { $, t } = GZ;

function gcd(a, b) {
  a = Math.abs(a); b = Math.abs(b);
  while (b) { [a, b] = [b, a % b]; }
  return a || 1;
}

function simplify() {
  const numRaw = $('#num').value.trim();
  const denRaw = $('#den').value.trim();
  const errEl = $('#err');
  errEl.textContent = '';
  $('#result').innerHTML = '';
  if (numRaw === '' || denRaw === '') { errEl.textContent = t('errNoInput'); return; }
  let n = parseInt(numRaw, 10);
  let d = parseInt(denRaw, 10);
  if (!Number.isFinite(n) || !Number.isFinite(d)) { errEl.textContent = t('errInput'); return; }
  if (d === 0) { errEl.textContent = t('errZero'); return; }

  const g = gcd(n, d);
  let sn = n / g, sd = d / g;
  // Keep sign on numerator
  if (sd < 0) { sn = -sn; sd = -sd; }
  const decimal = n / d;
  const percent = (decimal * 100);
  // Mixed number
  let mixed;
  const absN = Math.abs(sn), absD = sd;
  const whole = Math.floor(absN / absD);
  const rem = absN % absD;
  if (whole === 0 && rem !== 0) mixed = `${sn}/${sd}`;
  else if (rem === 0) mixed = `${sn < 0 ? '-' : ''}${whole}`;
  else mixed = `${sn < 0 ? '-' : ''}${whole} ${rem}/${absD}`;

  const reciprocal = (sn === 0) ? '—' : `${sd}/${sn}`;
  const simpleStr = `${sn}/${sd}`;

  // Steps
  let stepsHtml = '';
  if (g === 1 && Math.abs(sn) < absD) {
    stepsHtml = `<div class="result-item" style="grid-column:1/-1">${t('alreadySimple')}</div>`;
  } else {
    stepsHtml = `
      <div class="result-item" style="grid-column:1/-1;text-align:left">
        <div style="font-size:.95rem;line-height:1.8">
          ${n}/${d} ÷ <b>${g}</b>/${g} = <b style="color:var(--accent)">${sn}/${sd}</b><br>
          <span style="opacity:.8">${t('gcd')} = gcd(${Math.abs(n)}, ${Math.abs(d)}) = ${g}</span>
        </div>
      </div>`;
  }

  $('#result').innerHTML = `
    <div class="result-card">
      <div class="big">${simpleStr}</div>
      <div class="label">${t('simplified')}</div>
      <div class="result-grid">
        <div class="result-item"><div class="val">${g}</div><div class="lbl">${t('gcd')}</div></div>
        <div class="result-item"><div class="val">${(+decimal.toFixed(8)).toString()}</div><div class="lbl">${t('decimal')}</div></div>
        <div class="result-item"><div class="val">${(+percent.toFixed(4)).toString()}%</div><div class="lbl">${t('percent')}</div></div>
        <div class="result-item"><div class="val">${mixed}</div><div class="lbl">${t('mixed')}</div></div>
        <div class="result-item"><div class="val">${reciprocal}</div><div class="lbl">${t('reciprocal')}</div></div>
      </div>
      <div style="margin-top:18px;font-size:1rem;font-weight:700;color:var(--text2);text-align:left">${t('steps')}</div>
      <div class="result-grid" style="margin-top:6px">${stepsHtml}</div>
    </div>`;
}

function clearAll() {
  $('#num').value = ''; $('#den').value = '';
  $('#err').textContent = ''; $('#result').innerHTML = '';
}

function loadExample() {
  $('#num').value = '8'; $('#den').value = '12'; simplify();
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="simplify()">${t('simplify')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="clearAll()">${t('clear')}</button>`;

$('#num').addEventListener('input', () => { if ($('#num').value && $('#den').value) simplify(); });
$('#den').addEventListener('input', () => { if ($('#num').value && $('#den').value) simplify(); });

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],

});
</script>
