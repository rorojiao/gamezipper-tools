<script>
GZI18n.register({
  en: {
    toolTitle: 'Oil Painting Effect',
    toolDesc: 'Turn photos into oil painting art. Adjust brush size and detail for a classic painted look — free and private.',
    dropText: 'Drop a photo here or click to upload',

    levels: 'Detail Levels',
    apply: 'Apply Effect',
    download: '⬇ Download PNG',
    original: 'Original',
    result: 'Oil Painting',
    processing: 'Processing…',
    step1: 'Upload a photo (JPG, PNG, WebP)',
    step2: 'Set brush size and detail levels',
    step3: 'Click Apply Effect to render the painting',
    step4: 'Download the result as PNG',
  },
  zh: {
    toolTitle: '油画效果',
    toolDesc: '将照片转换为油画艺术。调整画笔大小和细节程度，获得经典绘画风格 — 免费且隐私。',
    dropText: '拖放照片到此处或点击上传',
    brush: '画笔大小',
    levels: '细节等级',
    apply: '应用效果',
    download: '⬇ 下载 PNG',
    original: '原图',
    result: '油画',
    processing: '处理中…',
    step1: '上传照片（JPG、PNG、WebP）',
    step2: '设置画笔大小和细节等级',
    step3: '点击「应用效果」渲染油画',
    step4: '下载结果为 PNG',
  }
});

const { $, t } = GZ;
let imgData = null, origCanvas, resCanvas, origCtx, resCtx;

$('#drop-text').textContent = t('dropText');
$('#lbl-brush').textContent = t('brush');
$('#lbl-levels').textContent = t('levels');
$('#btn-apply').textContent = t('apply');
$('#btn-download').textContent = t('download');
$('#lbl-orig').textContent = t('original');
$('#lbl-res').textContent = t('result');

const drop = $('#drop'), fileInput = $('#fileInput');
drop.addEventListener('click', () => fileInput.click());
drop.addEventListener('dragover', e => { e.preventDefault(); drop.classList.add('dragover'); });
drop.addEventListener('dragleave', () => drop.classList.remove('dragover'));
drop.addEventListener('drop', e => { e.preventDefault(); drop.classList.remove('dragover'); if (e.dataTransfer.files.length) loadImage(e.dataTransfer.files[0]); });
fileInput.addEventListener('change', e => { if (e.target.files.length) loadImage(e.target.files[0]); });

function loadImage(file) {
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      const maxW = 600; let w = img.width, h = img.height;
      if (w > maxW) { h = Math.round(h * maxW / w); w = maxW; }
      origCanvas = $('#original'); resCanvas = $('#result');
      origCanvas.width = w; origCanvas.height = h;
      resCanvas.width = w; resCanvas.height = h;
      origCtx = origCanvas.getContext('2d'); resCtx = resCanvas.getContext('2d');
      origCtx.drawImage(img, 0, 0, w, h);
      imgData = origCtx.getImageData(0, 0, w, h);
      drop.style.display = 'none';
      $('#controls').style.display = 'flex';
      $('#preview').style.display = 'grid';
      applyOil();
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

// Kuwahara-inspired oil painting filter using intensity histogram per channel
function applyOil() {
  if (!imgData) return;
  $('#status').textContent = t('processing');
  $('#btn-apply').disabled = true;
  // Defer so UI updates
  setTimeout(() => {
    const w = imgData.width, h = imgData.height;
    const radius = parseInt($('#brush').value);
    const levels = parseInt($('#levels').value);
    const src = imgData.data;
    const out = resCtx.createImageData(w, h);
    const dst = out.data;

    for (let y = 0; y < h; y++) {
      for (let x = 0; x < w; x++) {
        const rCount = new Int32Array(levels + 1);
        const gCount = new Int32Array(levels + 1);
        const bCount = new Int32Array(levels + 1);
        const iCount = new Int32Array(levels + 1);
        const intensity = new Int32Array(levels + 1);
        for (let dy = -radius; dy <= radius; dy++) {
          for (let dx = -radius; dx <= radius; dx++) {
            const nx = x + dx, ny = y + dy;
            if (nx < 0 || nx >= w || ny < 0 || ny >= h) continue;
            const i = (ny * w + nx) * 4;
            const rr = src[i], gg = src[i+1], bb = src[i+2];
            const cur = Math.round((rr + gg + bb) / 3 * levels / 255);
            const bin = Math.max(0, Math.min(levels, cur));
            rCount[bin] += rr; gCount[bin] += gg; bCount[bin] += bb;
            iCount[bin]++;
            intensity[bin] = bin;
          }
        }
        // Find the most frequent intensity bin
        let max = 0, maxIdx = 0;
        for (let b = 0; b <= levels; b++) {
          if (iCount[b] > max) { max = iCount[b]; maxIdx = b; }
        }
        const oi = (y * w + x) * 4;
        const cnt = Math.max(1, iCount[maxIdx]);
        dst[oi] = rCount[maxIdx] / cnt;
        dst[oi+1] = gCount[maxIdx] / cnt;
        dst[oi+2] = bCount[maxIdx] / cnt;
        dst[oi+3] = 255;
      }
    }
    resCtx.putImageData(out, 0, 0);
    $('#status').textContent = '';
    $('#btn-apply').disabled = false;
  }, 30);
}

$('#btn-apply').addEventListener('click', applyOil);
$('#btn-download').addEventListener('click', () => {
  if (!resCanvas) return;
  const a = document.createElement('a');
  a.href = resCanvas.toDataURL('image/png');
  a.download = 'oil-painting.png'; a.click();
});

});
</script>
