<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "How many pavers do I need for a 12x12 patio?", "acceptedAnswer": {"@type": "Answer", "text": "A 12x12 foot patio is 144 sq ft. If you use 12x12 inch pavers (1 sq ft each) you need about 144 pavers, plus 5-10% extra for cuts and breaks — about 158 pavers total."}}, {"@type": "Question", "name": "How much base material do I need under pavers?", "acceptedAnswer": {"@type": "Answer", "text": "For foot traffic, use 4 inches of crushed gravel base plus 1 inch of bedding sand. For driveways, use 6-8 inches of gravel. One cubic yard of gravel covers about 80 sq ft at 4 inches deep."}}, {"@type": "Question", "name": "What size pavers are most common?", "acceptedAnswer": {"@type": "Answer", "text": "Common concrete paver sizes are 4x8 in (brick), 6x6 in, 6x9 in, 12x12 in, and 16x16 in. Larger pavers cover more area faster but cost more per piece."}}, {"@type": "Question", "name": "How much sand do I need between pavers?", "acceptedAnswer": {"@type": "Answer", "text": "Joint sand fills gaps between pavers. Use polymeric sand for stability. A 50 lb bag of polymeric sand typically covers 75-100 sq ft of standard 4x8 inch pavers with 1/8 inch joints."}}]}</script>

<script>
GZI18n.register({
  en: {
    toolTitle: 'Paver Calculator',
    toolDesc: 'Calculate how many pavers you need for any patio, walkway or driveway. Get paver count, gravel base, bedding sand and total cost — free and instant.',
    areaTitle: 'Project Area',
    paverTitle: 'Paver Size & Cost',
    baseTitle: 'Base Material',
    units: 'Units',
    area: 'Total Area (length × width)',
    paverW: 'Paver Width (inches)',
    paverL: 'Paver Length (inches)',
    waste: 'Extra Waste (%)',
    price: 'Price per Paver ($)',
    baseDepth: 'Gravel Base Depth (inches)',
    sandDepth: 'Bedding Sand Depth (inches)',
    paversNeeded: 'Pavers Needed',
    gravelNeeded: 'Gravel Base',
    sandNeeded: 'Bedding Sand',
    totalCost: 'Estimated Cost',
    note: 'Tip: Paver dimensions are in inches regardless of project units. 4-8 inches of gravel base is recommended for driveways, 4 inches for patios. Add 5-10% extra pavers for cuts and breaks.',
    step1: 'Enter the total project area in square feet or meters',
    step2: 'Set paver width and length in inches',
    step3: 'Adjust waste allowance (5-10%) and price per paver',
    step4: 'Get paver count, gravel base, bedding sand and total cost',
  },
  zh: {
    toolTitle: '铺路砖计算器',
    toolDesc: '计算露台、人行道或车道需要多少块铺路砖。即时获取铺路砖数量、砾石基层、垫层砂和总费用 — 免费即时。',
    areaTitle: '施工面积',
    paverTitle: '铺路砖尺寸与价格',
    baseTitle: '基础材料',
    units: '单位',
    area: '总面积（长 × 宽）',
    paverW: '砖宽（英寸）',
    paverL: '砖长（英寸）',
    waste: '额外损耗（%）',
    price: '每块价格（$）',
    baseDepth: '砾石基层深度（英寸）',
    sandDepth: '垫砂层深度（英寸）',
    paversNeeded: '所需铺路砖',
    gravelNeeded: '所需砾石',
    sandNeeded: '所需垫砂',
    totalCost: '预估费用',
    note: '提示：铺路砖尺寸单位始终为英寸，与面积单位无关。车道建议 4-8 英寸砾石基层，露台 4 英寸即可。请多备 5-10% 的砖用于切割和破损。',
    step1: '输入总面积（平方英尺或平方米）',
    step2: '设置铺路砖的宽和长（英寸）',
    step3: '调整损耗率（5-10%）和每块价格',
    step4: '获取砖块数、砾石基层、垫层砂和总费用',
  }
});

const { $, t } = GZ;

$('#area-title').textContent = t('areaTitle');
$('#paver-title').textContent = t('paverTitle');
$('#base-title').textContent = t('baseTitle');
$('#lbl-units').textContent = t('units');
$('#lbl-area').textContent = t('area');
$('#lbl-pw').textContent = t('paverW');
$('#lbl-pl').textContent = t('paverL');
$('#lbl-waste').textContent = t('waste');
$('#lbl-price').textContent = t('price');
$('#lbl-baseDepth').textContent = t('baseDepth');
$('#lbl-sandDepth').textContent = t('sandDepth');

['units','area','paverW','paverL','waste','price','baseDepth','sandDepth'].forEach(id => {
  $('#' + id).addEventListener('input', calculate);
});

function calculate() {
  const units = $('#units').value;
  const area = parseFloat($('#area').value) || 0;
  const paverW = parseFloat($('#paverW').value) || 0;
  const paverL = parseFloat($('#paverL').value) || 0;
  const waste = parseFloat($('#waste').value) || 0;
  const price = parseFloat($('#price').value) || 0;
  const baseDepth = parseFloat($('#baseDepth').value) || 0;
  const sandDepth = parseFloat($('#sandDepth').value) || 0;

  const areaUnit = units === 'ft' ? 'ft²' : 'm²';

  // Convert project area to sq ft for material calc (paver dims are inches)
  let areaSqFt = area;
  if (units === 'm') areaSqFt = area * 10.7639;

  // Paver area in sq inches / 144 = sq ft per paver
  const paverAreaSqFt = (paverW * paverL) / 144;
  const paversNoWaste = paverAreaSqFt > 0 ? areaSqFt / paverAreaSqFt : 0;
  const paversNeeded = Math.ceil(paversNoWaste * (1 + waste / 100));

  // Gravel and sand in cubic yards (depth in inches -> feet, area in sq ft)
  const gravelCuFt = areaSqFt * (baseDepth / 12);
  const gravelCuYd = gravelCuFt / 27;
  const sandCuFt = areaSqFt * (sandDepth / 12);
  const sandCuYd = sandCuFt / 27;

  const cost = paversNeeded * price;

  $('#resultBox').innerHTML = `
    <div class="result-item"><div class="label">${t('paversNeeded')}</div><div class="val" style="font-size:2.2em">${paversNeeded}</div></div>
    <div class="result-item"><div class="label">${t('gravelNeeded')}</div><div class="val">${gravelCuYd.toFixed(2)} yd³</div></div>
    <div class="result-item"><div class="label">${t('sandNeeded')}</div><div class="val">${sandCuYd.toFixed(2)} yd³</div></div>
    <div class="result-item"><div class="label">${t('totalCost')}</div><div class="val">$${cost.toFixed(2)}</div></div>`;
  $('#note').textContent = t('note');
}

calculate();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🟫', href:'/calc/tile-calculator.html', name:'Tile Calculator'},
    {icon:'🏠', href:'/calc/roofing-calculator.html', name:'Roofing'},
    {icon:'🧱', href:'/calc/concrete.html', name:'Concrete'},
    {icon:'🪟', href:'/calc/wallpaper-calculator.html', name:'Wallpaper'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
