<script>

    toolDesc: '提取并验证网页 Meta 标签 — title、description、canonical、robots、Open Graph 和 Twitter Card。获取 SEO 评分和优化建议。免费，浏览器本地运行。',
    checkUrl: '检查 URL',
    checkHtml: '检查 HTML',
    switchUrl: '按 URL 检查',
    switchHtml: '粘贴 HTML',
    htmlLabel: '粘贴页面 HTML（查看源代码 → 复制）：',
    modeNote: '⚠ 由于浏览器 CORS 限制，部分网站无法通过 URL 抓取。如遇此情况，请切换到"粘贴 HTML"模式。',
    score: 'SEO 评分',
    tagsFound: '个标签',
    noTags: '未找到 Meta 标签。请检查 URL 或 HTML。',
    missing: '缺失',
    good: '良好',
    warning: '警告',
    tooLong: '过长',
    tooShort: '过短',
    notFound: '未找到',
    step1: '输入 URL 或切换到粘贴 HTML 模式',
    step2: '点击检查以提取所有 Meta 标签',
    step3: '查看 SEO 评分和每个标签的状态',
    step4: '修复警告以提升搜索排名',
  }
});

const { $, t } = GZ;
let mode = 'url';

function switchMode(m) {
  mode = m;
  $('#urlMode').style.display = m==='url'?'flex':'none';
  $('#htmlMode').style.display = m==='html'?'block':'none';
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="switchMode('url')">${t('switchUrl')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="switchMode('html')">${t('switchHtml')}</button>
`;

$('#checkUrlBtn').textContent = t('checkUrl');
$('#checkHtmlBtn').textContent = t('checkHtml');
$('#modeNote').textContent = t('modeNote');
$('#htmlLabel').textContent = t('htmlLabel');
$('#checkUrlBtn').onclick = checkUrl;
$('#checkHtmlBtn').onclick = () => analyzeHtml($('#htmlInput').value);

async function checkUrl() {
  let url = $('#urlInput').value.trim();
  if (!url) return;
  if (!/^https?:\/\//.test(url)) url = 'https://' + url;
  $('#results').innerHTML = '<p style="opacity:.6">Fetching...</p>';
  try {
    const proxyUrl = 'https://corsproxy.io/?url=' + encodeURIComponent(url);
    const resp = await fetch(proxyUrl);
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const html = await resp.text();
    analyzeHtml(html, url);
  } catch(e) {
    $('#results').innerHTML = `<div class="tag-result bad"><div class="tag-name">Error</div><div class="tag-content">${e.message}</div><div class="tag-tip">⚠ ${t('modeNote')}</div></div>`;
  }
}

function analyzeHtml(html, baseUrl) {
  const parser = new DOMParser();
  const doc = parser.parseFromString(html, 'text/html');
  const head = doc.head;
  const tags = [];

  function getMeta(name, attr) {
    attr = attr || 'name';
    const el = head.querySelector(`meta[${attr}="${name}"]`);
    return el ? el.getAttribute('content') : null;
  }

  // Title
  const title = doc.querySelector('title')?.textContent?.trim() || '';
  tags.push(checkTag('Title', title, title.length, 50, 60));

  // Description
  const desc = getMeta('description') || '';
  tags.push(checkTag('Meta Description', desc, desc.length, 120, 160));

  // Canonical
  const canonical = doc.querySelector('link[rel="canonical"]')?.getAttribute('href') || '';
  tags.push(checkTag('Canonical URL', canonical, canonical.length, 1, 2048, true));

  // Robots
  const robots = getMeta('robots') || '';
  tags.push(checkTag('Meta Robots', robots, robots.length, 0, 0, false, 'Optional but recommended for index control'));

  // Viewport
  const viewport = getMeta('viewport') || '';
  tags.push(checkTag('Viewport', viewport, viewport.length, 1, 100, true));

  // Charset
  const charset = doc.querySelector('meta[charset]')?.getAttribute('charset') || '';
  tags.push(checkTag('Charset', charset, charset.length, 1, 20, true));

  // Open Graph
  ['og:title','og:description','og:image','og:url','og:type','og:site_name'].forEach(og => {
    const val = getMeta(og, 'property') || '';
    tags.push(checkTag(og, val, val.length, og==='og:image'||og==='og:url'?1:0, 300, og==='og:title'||og==='og:description'||og==='og:image'||og==='og:url'));
  });

  // Twitter Card
  ['twitter:card','twitter:title','twitter:description','twitter:image'].forEach(tw => {
    const val = getMeta(tw) || '';
    tags.push(checkTag(tw, val, val.length, tw==='twitter:image'?1:0, 300, true));
  });

  // hreflang
  const hreflangs = doc.querySelectorAll('link[rel="alternate"][hreflang]');
  tags.push({
    name: 'hreflang tags',
    status: hreflangs.length > 0 ? 'good' : 'warn',
    statusText: hreflangs.length > 0 ? `${hreflangs.length} found` : t('missing'),
    content: hreflangs.length > 0 ? Array.from(hreflangs).slice(0,3).map(h=>h.getAttribute('hreflang')+' → '+h.getAttribute('href')).join('\n') : '',
    tip: hreflangs.length === 0 ? 'Add hreflang for multi-language SEO' : ''
  });

  // Score
  const goodCount = tags.filter(x=>x.status==='good').length;
  const score = Math.round((goodCount / tags.length) * 100);
  const scoreColor = score>=80?'#00d672':score>=50?'#f0a020':'#e94560';

  $('#results').innerHTML = `
    <div class="score-box" style="background:${scoreColor}22;border:2px solid ${scoreColor}">
      <div class="score-num" style="color:${scoreColor}">${score}</div>
      <div>${t('score')} · ${goodCount}/${tags.length} ${t('tagsFound')}</div>
    </div>
    ${tags.map(tag => renderTag(tag)).join('')}
  `;
}

function checkTag(name, content, len, minLen, maxLen, required, optionalTip) {
  required = required || false;
  let status, statusText, tip = '';
  if (!content) {
    if (required) { status='bad'; statusText=GZ.t('missing'); }
    else { status='warn'; statusText=GZ.t('notFound'); tip = optionalTip||''; }
  } else if (minLen > 0 && len < minLen) {
    status='warn'; statusText=GZ.t('tooShort'); tip = `Length: ${len}, recommended min: ${minLen}`;
  } else if (maxLen > 0 && len > maxLen) {
    status='warn'; statusText=GZ.t('tooLong'); tip = `Length: ${len}, recommended max: ${maxLen}`;
  } else {
    status='good'; statusText=GZ.t('good'); tip = `Length: ${len}`;
  }
  return { name, content, status, statusText, tip };
}

function renderTag(tag) {
  if (!tag.content && tag.status==='warn' && !tag.tip) {
    return `<div class="tag-result warn"><div class="tag-row"><span class="tag-name">${tag.name}</span><span class="tag-status warn">${tag.statusText}</span></div>${tag.tip?`<div class="tag-tip">${tag.tip}</div>`:''}</div>`;
  }
  return `<div class="tag-result ${tag.status}">
    <div class="tag-row"><span class="tag-name">${tag.name}</span><span class="tag-status ${tag.status}">${tag.statusText}</span></div>
    ${tag.content?`<div class="tag-content">${escapeHtml(tag.content)}</div>`:''}
    ${tag.tip?`<div class="tag-tip">${tag.tip}</div>`:''}
  </div>`;
}

function escapeHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
