<script>
GZI18n.register({
  en: {
    toolTitle: 'Cat Age Calculator',
    toolDesc: 'Convert cat years to human years accurately. Enter your cat\'s age to see the human-equivalent age and life stage.',
    calculate: 'Calculate',
    clear: 'Clear',
    ageLabel: 'Cat Age (years)',
    indoor: 'Indoor cat',
    outdoor: 'Outdoor cat',
    humanYears: 'Human Years',
    lifeStage: 'Life Stage',
    kitten: 'Kitten — rapid growth',
    junior: 'Junior — young & active',
    prime: 'Prime — full adult',
    mature: 'Mature — middle age',
    senior: 'Senior — slowing down',
    geriatric: 'Geriatric — golden years',
    equivalentAge: 'Human-Equivalent Age',
    catAge: 'Cat Age',
    chartTitle: 'Cat Age → Human Years Chart',
    step1: 'Enter your cat\'s age in years (decimals like 0.5 for kittens)',
    step2: 'Choose indoor or outdoor lifestyle',
    step3: 'See the human-equivalent age update live',
    step4: 'Check the chart below for age milestones',
  },
  zh: {
    toolTitle: '猫咪年龄计算器',
    toolDesc: '准确将猫咪年龄换算为人类年龄。输入猫咪年龄即可查看人类等效年龄和生命阶段。',
    calculate: '计算',
    clear: '清除',
    ageLabel: '猫咪年龄（岁）',
    indoor: '室内猫',
    outdoor: '室外猫',
    humanYears: '人类岁数',
    lifeStage: '生命阶段',
    kitten: '幼猫期 — 快速成长',
    junior: '少年期 — 年轻好动',
    prime: '壮年期 — 完全成年',
    mature: '成熟期 — 中年',
    senior: '老年期 — 开始放缓',
    geriatric: '高龄期 — 黄金岁月',
    equivalentAge: '人类等效年龄',
    catAge: '猫咪年龄',
    chartTitle: '猫咪年龄 → 人类岁数对照表',
    step1: '输入猫咪的年龄（幼猫可用 0.5 等小数）',
    step2: '选择室内或室外生活方式',
    step3: '即时查看人类等效年龄',
    step4: '查看下方对照表中的年龄里程碑',
  }
});

const { $, copyText, t } = GZ;

// Cat-to-human: year 1 ≈ 15, year 2 ≈ +9 (24), then +4 per year
function catToHuman(age) {
  if (age <= 0) return 0;
  let human;
  if (age <= 1) {
    human = age * 15;
  } else if (age <= 2) {
    human = 15 + (age - 1) * 9;
  } else {
    human = 24 + (age - 2) * 4;
  }
  return Math.round(human * 10) / 10;
}

function getStage(age) {
  if (age < 1) return t('kitten');
  if (age < 3) return t('junior');
  if (age < 6) return t('prime');
  if (age < 11) return t('mature');
  if (age < 15) return t('senior');
  return t('geriatric');
}

function autoCalc() {
  $('#opt-indoor').textContent = t('indoor');
  $('#opt-outdoor').textContent = t('outdoor');
  const age = parseFloat($('#catAge')?.value);
  if (!age || age <= 0) { $('#result').style.display = 'none'; $('#catInfo').innerHTML = ''; return; }
  const human = catToHuman(age);
  $('#humanAge').textContent = human;
  $('#lifeStage').textContent = getStage(age);
  $('#result').style.display = 'block';
  const mythAge = Math.round(age * 7 * 10) / 10;
  $('#catInfo').innerHTML = `
    <div class="gz-cat-info-item"><strong>${t('catAge')}</strong>${age} ${age >= 2 ? 'yrs' : 'yr'}</div>
    <div class="gz-cat-info-item"><strong>${t('equivalentAge')}</strong>~${human}</div>
    <div class="gz-cat-info-item"><strong>7× myth</strong>~${mythAge}</div>
  `;
  renderChart(age);
}

function renderChart(highlightAge) {
  $('#chartTitle').textContent = t('chartTitle');
  let rows = `<tr><th>${t('catAge')}</th><th>🐈 ${t('humanYears')}</th></tr>`;
  for (let a = 1; a <= 21; a++) {
    const hl = Math.round(highlightAge) === a ? ' class="highlight"' : '';
    rows += `<tr${hl}><td>${a}</td><td>${catToHuman(a)}</td></tr>`;
  }
  $('#chartTable').innerHTML = rows;
}

function doClear() {
  $('#catAge').value = '';
  $('#result').style.display = 'none';
  $('#catInfo').innerHTML = '';
  renderChart(0);
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="autoCalc()">${t('calculate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

renderChart(0);

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🐕', href:'/calc/dog-age-calculator.html', name:'Dog Age'},
    {icon:'🎂', href:'/calc/age-calculator.html', name:'Age Calculator'},
    {icon:'⚖️', href:'/calc/bmi-calculator.html', name:'BMI'},
    {icon:'📅', href:'/calc/date-calculator.html', name:'Date Calculator'},
  ]
});
</script>
