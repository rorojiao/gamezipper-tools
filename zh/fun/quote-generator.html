    step1: '点击「生成」或按空格键获取随机名言',
    step2: '使用卡片上方的分类按钮筛选名言类别',
    step3: '复制名言到剪贴板或分享到 Twitter/X',
    step4: '下载名言为精美图片卡片',
    generate: '生成',
  }

const { $, copyText, t } = GZ;

const QUOTES = [
  // Inspirational
  { text: 'The only way to do great work is to love what you do.', author: 'Steve Jobs', cat: 'inspirational' },
  { text: 'Believe you can and you\'re halfway there.', author: 'Theodore Roosevelt', cat: 'inspirational' },
  { text: 'In the middle of every difficulty lies opportunity.', author: 'Albert Einstein', cat: 'inspirational' },
  { text: 'It does not matter how slowly you go as long as you do not stop.', author: 'Confucius', cat: 'inspirational' },
  { text: 'The future belongs to those who believe in the beauty of their dreams.', author: 'Eleanor Roosevelt', cat: 'inspirational' },
  { text: 'What you get by achieving your goals is not as important as what you become by achieving your goals.', author: 'Zig Ziglar', cat: 'inspirational' },
  { text: 'The best time to plant a tree was 20 years ago. The second best time is now.', author: 'Chinese Proverb', cat: 'inspirational' },
  { text: 'You miss 100% of the shots you don\'t take.', author: 'Wayne Gretzky', cat: 'inspirational' },
  { text: 'Everything you\'ve ever wanted is on the other side of fear.', author: 'George Addair', cat: 'inspirational' },
  { text: 'Act as if what you do makes a difference. It does.', author: 'William James', cat: 'inspirational' },
  // Motivational
  { text: 'Success is not final, failure is not fatal: it is the courage to continue that counts.', author: 'Winston Churchill', cat: 'motivational' },
  { text: 'The secret of getting ahead is getting started.', author: 'Mark Twain', cat: 'motivational' },
  { text: 'Don\'t watch the clock; do what it does. Keep going.', author: 'Sam Levenson', cat: 'motivational' },
  { text: 'Hardships often prepare ordinary people for an extraordinary destiny.', author: 'C.S. Lewis', cat: 'motivational' },
  { text: 'The only impossible journey is the one you never begin.', author: 'Tony Robbins', cat: 'motivational' },
  { text: 'Whether you think you can or you think you can\'t, you\'re right.', author: 'Henry Ford', cat: 'motivational' },
  { text: 'It always seems impossible until it\'s done.', author: 'Nelson Mandela', cat: 'motivational' },
  { text: 'Do what you can, with what you have, where you are.', author: 'Theodore Roosevelt', cat: 'motivational' },
  // Life
  { text: 'Life is what happens when you\'re busy making other plans.', author: 'John Lennon', cat: 'life' },
  { text: 'The purpose of our lives is to be happy.', author: 'Dalai Lama', cat: 'life' },
  { text: 'Get busy living or get busy dying.', author: 'Stephen King', cat: 'life' },
  { text: 'You only live once, but if you do it right, once is enough.', author: 'Mae West', cat: 'life' },
  { text: 'Life is really simple, but we insist on making it complicated.', author: 'Confucius', cat: 'life' },
  { text: 'In three words I can sum up everything I\'ve learned about life: it goes on.', author: 'Robert Frost', cat: 'life' },
  // Science
  { text: 'Somewhere, something incredible is waiting to be known.', author: 'Carl Sagan', cat: 'science' },
  { text: 'The important thing is not to stop questioning. Curiosity has its own reason for existence.', author: 'Albert Einstein', cat: 'science' },
  { text: 'We are just an advanced breed of monkeys on a minor planet of a very average star.', author: 'Stephen Hawking', cat: 'science' },
  { text: 'Science is not only a disciple of reason but, also, one of romance and passion.', author: 'Stephen Hawking', cat: 'science' },
  { text: 'The good thing about science is that it\'s true whether or not you believe in it.', author: 'Neil deGrasse Tyson', cat: 'science' },
  // Programming
  { text: 'First, solve the problem. Then, write the code.', author: 'John Johnson', cat: 'programming' },
  { text: 'Talk is cheap. Show me the code.', author: 'Linus Torvalds', cat: 'programming' },
  { text: 'Any fool can write code that a computer can understand. Good programmers write code that humans can understand.', author: 'Martin Fowler', cat: 'programming' },
  { text: 'Code is like humor. When you have to explain it, it\'s bad.', author: 'Cory House', cat: 'programming' },
  { text: 'The best error message is the one that never shows up.', author: 'Thomas Fuchs', cat: 'programming' },
  { text: 'Simplicity is the soul of efficiency.', author: 'Austin Freeman', cat: 'programming' },
  { text: 'Fix the cause, not the symptom.', author: 'Steve Maguire', cat: 'programming' },
  { text: 'Optimism is an occupational hazard of programming: feedback is the treatment.', author: 'Kent Beck', cat: 'programming' },
  // Funny
  { text: 'A day without laughter is a day wasted.', author: 'Charlie Chaplin', cat: 'funny' },
  { text: 'I\'m not superstitious, but I am a little stitious.', author: 'Michael Scott', cat: 'funny' },
  { text: 'I have not failed. I\'ve just found 10,000 ways that won\'t work.', author: 'Thomas Edison', cat: 'funny' },
  { text: 'The only thing I know is that I know nothing.', author: 'Socrates', cat: 'funny' },
  { text: 'I think, therefore I am. I think.', author: 'Descartes (sort of)', cat: 'funny' },
  // Wisdom
  { text: 'Knowing yourself is the beginning of all wisdom.', author: 'Aristotle', cat: 'wisdom' },
  { text: 'The only true wisdom is in knowing you know nothing.', author: 'Socrates', cat: 'wisdom' },
  { text: 'Turn your wounds into wisdom.', author: 'Oprah Winfrey', cat: 'wisdom' },
  { text: 'The fool doth think he is wise, but the wise man knows himself to be a fool.', author: 'William Shakespeare', cat: 'wisdom' },
  { text: 'By three methods we may learn wisdom: by reflection, which is noblest; by imitation, which is easiest; and by experience, which is the bitterest.', author: 'Confucius', cat: 'wisdom' },
  // Creativity
  { text: 'Creativity is intelligence having fun.', author: 'Albert Einstein', cat: 'creativity' },
  { text: 'The chief enemy of creativity is good sense.', author: 'Pablo Picasso', cat: 'creativity' },
  { text: 'You can\'t use up creativity. The more you use, the more you have.', author: 'Maya Angelou', cat: 'creativity' },
  { text: 'Creativity takes courage.', author: 'Henri Matisse', cat: 'creativity' },
  { text: 'Have no fear of perfection — you\'ll never reach it.', author: 'Salvador Dalí', cat: 'creativity' },
  // Love
  { text: 'The best thing to hold onto in life is each other.', author: 'Audrey Hepburn', cat: 'love' },
  { text: 'Where there is love there is life.', author: 'Mahatma Gandhi', cat: 'love' },
  { text: 'Being deeply loved by someone gives you strength, while loving someone deeply gives you courage.', author: 'Lao Tzu', cat: 'love' },
];

const CATEGORIES = ['all', 'inspirational', 'motivational', 'life', 'science', 'programming', 'funny', 'wisdom', 'creativity', 'love'];
let currentCat = 'all';
let history = [];

// Render category filters
$('#catFilters').innerHTML = CATEGORIES.map(c => {
  const label = c === 'all' ? '🌟 All' : c.charAt(0).toUpperCase() + c.slice(1);
  const cls = c === 'all' ? ' active' : '';
  return `<button class="gz-btn gz-btn-secondary${cls}" onclick="setCat('${c}',this)">${label}</button>`;
}).join('');

function setCat(cat, btn) {
  currentCat = cat;
  document.querySelectorAll('.cat-filters button').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  generateQuote();
}

function generateQuote() {
  const pool = currentCat === 'all' ? QUOTES : QUOTES.filter(q => q.cat === currentCat);
  if (!pool.length) return;
  const quote = pool[Math.floor(Math.random() * pool.length)];
  $('#quoteText').textContent = `"${quote.text}"`;
  $('#quoteAuthor').textContent = `— ${quote.author}`;
  $('#quoteCat').textContent = quote.cat;

  // Update tweet link
  const tweetText = encodeURIComponent(`"${quote.text}" — ${quote.author}`);
  $('#tweetLink').href = `https://twitter.com/intent/tweet?text=${tweetText}`;

  // Add to history
  history.unshift(quote);
  if (history.length > 10) history.pop();
  renderHistory();
}

function renderHistory() {
  if (history.length < 2) { $('#history').innerHTML = ''; return; }
  const items = history.slice(1);
  $('#history').innerHTML = '<h3 style="font-size:.95em;margin-bottom:10px">📜 Recent Quotes</h3>' +
    items.map(q => `<div class="history-item">"${q.text}"<div class="h-author">— ${q.author}</div></div>`).join('');
}

function copyQuote() {
  const text = $('#quoteText').textContent + ' ' + $('#quoteAuthor').textContent;
  copyText(text);
}

function downloadQuoteImage() {
  const canvas = document.createElement('canvas');
  canvas.width = 1200; canvas.height = 630;
  const ctx = canvas.getContext('2d');

  // Background gradient
  const grad = ctx.createLinearGradient(0, 0, 1200, 630);
  grad.addColorStop(0, '#1a1a2e'); grad.addColorStop(1, '#16213e');
  ctx.fillStyle = grad; ctx.fillRect(0, 0, 1200, 630);

  // Quote mark
  ctx.fillStyle = 'rgba(79,70,229,0.2)';
  ctx.font = '200px Georgia'; ctx.fillText('"', 60, 220);

  // Quote text - word wrap
  ctx.fillStyle = '#e0e0e0';
  ctx.font = '32px Georgia';
  const text = $('#quoteText').textContent;
  const maxWidth = 1040;
  const words = text.split(' ');
  let lines = [], line = '';
  words.forEach(w => {
    const test = line + (line ? ' ' : '') + w;
    if (ctx.measureText(test).width > maxWidth && line) { lines.push(line); line = w; }
    else line = test;
  });
  if (line) lines.push(line);

  let y = 200;
  lines.forEach(l => { ctx.fillText(l, 80, y); y += 48; });

  // Author
  ctx.fillStyle = '#00d672';
  ctx.font = 'bold 24px sans-serif';
  ctx.fillText($('#quoteAuthor').textContent, 80, y + 30);

  // Branding
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  ctx.font = '16px sans-serif';
  ctx.fillText('tools.gamezipper.com', 960, 600);

  const a = document.createElement('a');
  a.download = 'quote.png';
  a.href = canvas.toDataURL('image/png');
  a.click();
}

// Keyboard shortcut
document.addEventListener('keydown', e => {
  if (e.code === 'Space' && e.target.tagName !== 'TEXTAREA' && e.target.tagName !== 'INPUT') {
    e.preventDefault();
    generateQuote();
  }
});

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="generateQuote()">🎲 ${t('generate')}</button>`;

// Initial quote
generateQuote();

GZ.renderToolPage({
  category: 'fun',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'⚡', href:'/fun/reaction-time.html', name:'Reaction Time'},
    {icon:'⌨️', href:'/fun/typing-test.html', name:'Typing Test'},
    {icon:'🎲', href:'/convert/randomizer.html', name:'Randomizer'},
    {icon:'😊', href:'/text/emoji-picker.html', name:'Emoji Picker'},
  ]
});
</script>
