<script>
GZI18n.register({
  en: {
    toolTitle: 'Pet Age Calculator',
    toolDesc: 'Instantly convert your pet\'s age to human years. Supports dogs (with size variants), cats, rabbits, hamsters, birds, horses, guinea pigs, turtles and fish — all in your browser.',
    humanYears: 'human years old',
    lifeSpan: 'Typical lifespan',

    stageJunior: 'Junior',

    stageMature: 'Mature',
    stageSenior: 'Senior',
    stageGeriatric: 'Geriatric',
  },
  zh: {
    toolTitle: '宠物年龄计算器',
    toolDesc: '即时将宠物年龄转换为人类年龄。支持狗（多种体型）、猫、兔子、仓鼠、鸟类、马、豚鼠、乌龟和鱼 — 浏览器本地运行。',
    humanYears: '相当于人类',
    lifeSpan: '典型寿命',
    years: '岁',
    year: '岁',
    step1: '从下拉菜单选择宠物类型',
    step2: '如果是狗狗，请选择体型（小型/中型/大型/巨型）',
    step3: '输入宠物年龄（岁）即可看到对应人类年龄',
    step4: '对比生命阶段和剩余寿命估算',
    stageJunior: '幼年',
    stageAdult: '成年',
    stageMature: '壮年',
    stageSenior: '老年',
    stageGeriatric: '高龄',
  }
});

// Pet lifespan and human-age conversion tables
const PETS = {
  dog: {
    lifespan: { small: 16, medium: 14, large: 12, giant: 10 },
    // (years_pet, years_human) for size 'small' — others use offsets
    baseTable: [
      [0.083, 1], [0.25, 3], [0.5, 6], [0.75, 9],
      [1, 15], [1.5, 18], [2, 24], [3, 28], [4, 32], [5, 36],
      [6, 40], [7, 44], [8, 48], [9, 52], [10, 56], [11, 60],
      [12, 64], [13, 68], [14, 72], [15, 76], [16, 80], [17, 84]
    ],
    sizeAdjust: { small: 0, medium: 2, large: 4, giant: 6 }
  },
  cat: {
    lifespan: { indoor: 16, outdoor: 12 },
    table: [
      [0.083, 1], [0.25, 3], [0.5, 5], [0.75, 8],
      [1, 15], [1.5, 18], [2, 24], [3, 28], [4, 32], [5, 36],
      [6, 40], [7, 44], [8, 48], [9, 52], [10, 56], [11, 60],
      [12, 64], [13, 68], [14, 72], [15, 76], [16, 80], [17, 84], [18, 88], [19, 92], [20, 96]
    ]
  },
  rabbit: {
    lifespan: 12,
    table: [[0.25, 4], [0.5, 8], [1, 18], [2, 27], [3, 33], [4, 39], [5, 45], [6, 51], [7, 57], [8, 63], [9, 69], [10, 75], [11, 81], [12, 87]]
  },
  hamster: {
    lifespan: 3,
    table: [[0.25, 8], [0.5, 16], [0.75, 24], [1, 32], [1.5, 48], [2, 64], [2.5, 80], [3, 96]]
  },
  guinea: {
    lifespan: 7,
    table: [[0.25, 5], [0.5, 10], [1, 20], [2, 30], [3, 40], [4, 50], [5, 60], [6, 70], [7, 80]]
  },
  bird: {
    lifespan: 30,
    // Birds: faster early, slower later
    table: [[0.5, 6], [1, 12], [2, 21], [3, 30], [4, 39], [5, 45], [7, 55], [10, 65], [15, 75], [20, 85], [25, 92], [30, 100]]
  },
  horse: {
    lifespan: 30,
    table: [[1, 6.5], [2, 13], [3, 18], [4, 22], [5, 25], [6, 28], [7, 32], [8, 36], [10, 44], [12, 52], [15, 60], [20, 70], [25, 80], [30, 90]]
  },
  turtle: {
    lifespan: 50,
    table: [[1, 5], [2, 8], [5, 18], [10, 28], [15, 38], [20, 48], [25, 58], [30, 68], [40, 80], [50, 90], [60, 100]]
  },
  fish: {
    lifespan: 5,
    table: [[0.25, 3], [0.5, 6], [1, 12], [1.5, 18], [2, 24], [3, 36], [4, 48], [5, 60], [7, 75], [10, 90]]
  }
};

function convertAge(petType, size, ageYears) {
  const pet = PETS[petType];
  if (!pet) return 0;
  let table = pet.table || pet.baseTable;
  let result = 0;
  if (petType === 'dog' && pet.baseTable) {
    // Apply size adjustment
    const adj = pet.sizeAdjust[size] || 0;
    if (ageYears <= 0) return 0;
    // Linear interpolation
    const t = pet.baseTable;
    for (let i = 0; i < t.length - 1; i++) {
      if (ageYears >= t[i][0] && ageYears <= t[i+1][0]) {
        const ratio = (ageYears - t[i][0]) / (t[i+1][0] - t[i][0]);
        result = t[i][1] + ratio * (t[i+1][1] - t[i][1]);
        if (ageYears >= 2) result += adj;
        return Math.round(result);
      }
    }
    if (ageYears > t[t.length-1][0]) {
      result = t[t.length-1][1] + (ageYears - t[t.length-1][0]) * 4;
      if (ageYears >= 2) result += adj;
      return Math.round(result);
    }
  }
  if (!table) return 0;
  for (let i = 0; i < table.length - 1; i++) {
    if (ageYears >= table[i][0] && ageYears <= table[i+1][0]) {
      const ratio = (ageYears - table[i][0]) / (table[i+1][0] - table[i][0]);
      result = table[i][1] + ratio * (table[i+1][1] - table[i][1]);
      return Math.round(result);
    }
  }
  if (ageYears > table[table.length-1][0]) {
    result = table[table.length-1][1] + (ageYears - table[table.length-1][0]) * 3;
    return Math.round(result);
  }
  return 0;
}

function getStage(humanAge) {
  if (humanAge < 18) return 'stageJunior';
  if (humanAge < 40) return 'stageAdult';
  if (humanAge < 60) return 'stageMature';
  if (humanAge < 80) return 'stageSenior';
  return 'stageGeriatric';
}

function getLifespan(petType, size) {
  const pet = PETS[petType];
  if (!pet) return 15;
  if (typeof pet.lifespan === 'object') {
    return pet.lifespan[size] || pet.lifespan[Object.keys(pet.lifespan)[0]] || 15;
  }
  return pet.lifespan;
}

const { $, $$, t } = GZ;
let currentSize = 'small';
let currentPet = 'dog';

function update() {
  currentPet = $('#pet').value;
  const age = parseFloat($('#age').value) || 0;
  $('#sizeField').style.display = currentPet === 'dog' ? 'flex' : 'none';

  const humanAge = convertAge(currentPet, currentSize, age);
  $('#humanAge').textContent = humanAge;
  const stageKey = getStage(humanAge);
  const petName = $('#pet').selectedOptions[0].text.replace(/^.\s/, '');
  $('#resultLbl').textContent = t('humanYears') + ' • ' + t(stageKey) + ' ' + t('stageAdult').toLowerCase().replace('adult', '').trim();
  $('#resultLbl').textContent = `${humanAge} ${t('humanYears')} — ${t(stageKey)}`;

  const lifespan = getLifespan(currentPet, currentSize);
  const remaining = Math.max(0, Math.round((lifespan - age) * 10) / 10);
  const remainingHuman = Math.max(0, convertAge(currentPet, currentSize, lifespan) - humanAge);
  $('#lifeSpan').innerHTML = `${t('lifeSpan')}: <b>${lifespan} ${t('years')}</b> · ${t('years')} ~${remaining} ${t('years')} (≈${remainingHuman} human ${t('years')})`;
  $('#resultDetail').textContent = `Your ${petName.toLowerCase()} is ${age} ${t('year') === 'year' ? (age === 1 ? 'year' : 'years') : t('year')} old and is at the ${t(stageKey).toLowerCase()} life stage.`;

  // Build life stage timeline
  const stages = [0.25, 1, 3, 7, 12, lifespan];
  const uniqueStages = [...new Set(stages)].filter(s => s <= lifespan + 2).slice(0, 6);
  $('#stages').innerHTML = uniqueStages.map(s => {
    const h = convertAge(currentPet, currentSize, s);
    const isNow = Math.abs(s - age) < 0.5;
    return `<div class="pa-stage${isNow ? ' now' : ''}">
      <div class="age">${s}${t('year') === 'year' ? (s === 1 ? 'y' : 'y') : '岁'}</div>
      <div class="name">${h} human</div>
    </div>`;
  }).join('');
}

$('#pet').addEventListener('change', update);
$('#age').addEventListener('input', update);
$$('#sizeBtns button').forEach(b => b.addEventListener('click', () => {
  $$('#sizeBtns button').forEach(x => x.classList.remove('active'));
  b.classList.add('active');
  currentSize = b.dataset.s;
  update();
}));

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="GZ.copyText($('#humanAge').textContent)">Copy Result</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#age').value=5;update()">5 years</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#age').value=10;update()">10 years</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#age').value=15;update()">15 years</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#pet').value='cat';$('#sizeField').style.display='none';update()">Try Cat</button>`;

$('#age').value = 3;
update();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🎂', href:'/calc/age-calculator.html', name:'Age Calculator'},
    {icon:'🆎', href:'/calc/age-difference.html', name:'Age Difference'},
    {icon:'⚖️', href:'/calc/bmi-calculator.html', name:'BMI Calculator'},
    {icon:'🐕', href:'/calc/dog-age.html', name:'Dog Age'},
  ]
});
</script>
