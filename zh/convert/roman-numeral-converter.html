// Convert number to Roman numeral (supports up to 3,999,999 with vinculum)
function numToRoman(num) {
  if (num < 1 || num > 3999999 || !Number.isInteger(num)) return null;
  // Use combining overline U+0305 for vinculum notation
  const map = [
    [1000000, 'M\u0305'],
    [900000, 'C\u0305M\u0305'],
    [500000, 'D\u0305'],
    [400000, 'C\u0305D\u0305'],
    [100000, 'C\u0305'],
    [90000, 'X\u0305C\u0305'],
    [50000, 'L\u0305'],
    [40000, 'X\u0305L\u0305'],
    [10000, 'X\u0305'],
    [9000, 'I\u0305X\u0305'],
    [5000, 'V\u0305'],
    [4000, 'I\u0305V\u0305'],
    [1000, 'M'],
    [900, 'CM'],
    [500, 'D'],
    [400, 'CD'],
    [100, 'C'],
    [90, 'XC'],
    [50, 'L'],
    [40, 'XL'],
    [10, 'X'],
    [9, 'IX'],
    [5, 'V'],
    [4, 'IV'],
    [1, 'I'],
  ];
  let result = '';
  let n = num;
  for (const [val, sym] of map) {
    while (n >= val) { result += sym; n -= val; }
  }
  return result;
}

// Convert Roman numeral to number
function romanToNum(roman) {
  // Normalize: strip combining overlines, replace with uppercase vinculum symbols
  // We'll parse character by character
  const overline = '\u0305';
  // Build lookup
  const vals = {
    'M\u0305': 1000000, 'D\u0305': 500000, 'C\u0305': 100000, 'L\u0305': 50000,
    'X\u0305': 10000, 'V\u0305': 5000, 'I\u0305': 1000,
    'M': 1000, 'D': 500, 'C': 100, 'L': 50, 'X': 10, 'V': 5, 'I': 1
  };

  // Tokenize: group letter + optional overline
  const tokens = [];
  const upper = roman.toUpperCase();
  for (let i = 0; i < upper.length; i++) {
    const ch = upper[i];
    if (ch === overline) continue; // skip standalone overline
    if (!'IVXLCDM'.includes(ch)) return null;
    // check if next char is combining overline
    if (i + 1 < upper.length && upper[i + 1] === overline) {
      tokens.push(ch + overline);
      i++; // skip the overline
    } else {
      tokens.push(ch);
    }
  }

  let total = 0;
  for (let i = 0; i < tokens.length; i++) {
    const cur = vals[tokens[i]];
    if (!cur) return null;
    if (i + 1 < tokens.length) {
      const next = vals[tokens[i + 1]];
      if (!next) return null;
      if (cur < next) { total -= cur; }
      else { total += cur; }
    } else {
      total += cur;
    }
  }
  // Verify by reconverting
  if (total < 1 || total > 3999999) return null;
  return total;
}

$('#numInput').addEventListener('input', function() {
  const val = this.value.trim();
  if (!val) { $('#romanInput').value = ''; $('#numStatus').textContent = ''; return; }
  const num = parseInt(val.replace(/[^0-9]/g, ''), 10);
  if (isNaN(num) || num < 1 || num > 3999999) {
    $('#numStatus').textContent = t('invalidNum');
    $('#numStatus').className = 'rn-status err';
    return;
  }
  const roman = numToRoman(num);
  $('#romanInput').value = roman;
  $('#numStatus').textContent = num.toLocaleString() + ' = ' + roman;
  $('#numStatus').className = 'rn-status ok';
});

$('#romanInput').addEventListener('input', function() {
  const val = this.value.trim();

  if (num === null) {
    $('#romanStatus').textContent = t('invalidRoman');

    return;
  }
  $('#numInput').value = num;
  $('#romanStatus').textContent = val.toUpperCase() + ' = ' + num.toLocaleString();
  $('#romanStatus').className = 'rn-status ok';
});
