<script>
GZI18n.register({
  en: {
    toolTitle: 'GitHub Actions Workflow Generator',
    toolDesc: 'Generate GitHub Actions workflow YAML (.github/workflows/*.yml) for Node.js, Python, Docker and GitHub Pages deploy. Pick triggers, OS, runtime versions and steps — copy or download. Free, browser-only.',
    stName: 'Workflow', stTrig: 'Triggers', stJob: 'Job',
    lblName: 'name', lblTemplate: 'Template', lblBranch: 'Branch', lblOs: 'Runs-on (OS)', lblNode: 'Node version', lblPy: 'Python version',
    trigPush: 'push', trigPR: 'pull_request', trigManual: 'workflow_dispatch (manual)', trigCron: 'schedule (cron)',
    stepCheckout: 'actions/checkout', stepSetupNode: 'setup-node', stepSetupPy: 'setup-python', stepCache: 'cache dependencies', stepInstall: 'install deps', stepLint: 'lint', stepTest: 'test', stepBuild: 'build', stepUploadArtifact: 'upload artifact', stepDockerBuild: 'docker build', stepDockerPush: 'docker push', stepDeployPages: 'deploy pages',
    outLabel: 'Generated workflow YAML',
    copy: 'Copy YAML', download: 'Download .yml',
    note: '💡 Save as .github/workflows/ci.yml in your repo root. GitHub will pick it up automatically. Public repos get unlimited free minutes; private repos get 2,000 min/month on the free plan.',
    s1: 'Choose a template (Node.js, Python, Docker, Pages deploy)',
    s2: 'Tick the triggers — push, PR, manual, cron',
    s3: 'Set OS, runtime versions and pick steps',
    s4: 'Copy the YAML and save to .github/workflows/<name>.yml',
    rGitignore: '.gitignore Generator', rDocker: 'Dockerfile', rDockerCompose: 'docker-compose', rEnv: '.env Generator', rK8s: 'Kubernetes YAML', rSemver: 'SemVer Checker'
  },
  zh: {
    toolTitle: 'GitHub Actions 工作流生成器',
    toolDesc: '生成 GitHub Actions 工作流 YAML（.github/workflows/*.yml），支持 Node.js、Python、Docker 和 GitHub Pages 部署。选择触发器、操作系统、运行时版本和步骤 — 一键复制或下载。免费，浏览器本地运行。',
    stName: '工作流', stTrig: '触发器', stJob: '任务',
    lblName: '名称 name', lblTemplate: '模板', lblBranch: '分支', lblOs: '运行环境 Runs-on', lblNode: 'Node 版本', lblPy: 'Python 版本',
    trigPush: 'push', trigPR: 'pull_request', trigManual: 'workflow_dispatch（手动）', trigCron: 'schedule（cron）',
    stepCheckout: 'actions/checkout', stepSetupNode: 'setup-node', stepSetupPy: 'setup-python', stepCache: '缓存依赖', stepInstall: '安装依赖', stepLint: '代码检查 lint', stepTest: '测试 test', stepBuild: '构建 build', stepUploadArtifact: '上传产物', stepDockerBuild: 'docker build', stepDockerPush: 'docker push', stepDeployPages: '部署 Pages',
    outLabel: '生成的工作流 YAML',
    copy: '复制 YAML', download: '下载 .yml',
    note: '💡 保存为 .github/workflows/ci.yml 放在仓库根目录。GitHub 会自动识别。公开仓库免费无限分钟；私有仓库免费计划每月 2,000 分钟。',
    s1: '选择模板（Node.js、Python、Docker、Pages 部署）',
    s2: '勾选触发器 — push、PR、手动、cron',
    s3: '设置操作系统、运行时版本并选择步骤',
    s4: '复制 YAML，保存到 .github/workflows/<名称>.yml',
    rGitignore: '.gitignore 生成器', rDocker: 'Dockerfile', rDockerCompose: 'docker-compose', rEnv: '.env 生成器', rK8s: 'Kubernetes YAML', rSemver: 'SemVer 检查器'
  }
});

const { $, copyText, t } = GZ;

const TRIGS=['push','pr','manual','cron'];
const STEPS_NODE=['checkout','setupNode','cache','install','lint','test','build','uploadArtifact'];
const STEPS_PY=['checkout','setupPy','cache','install','lint','test','uploadArtifact'];
const STEPS_DOCKER=['checkout','dockerBuild','dockerPush'];
const STEPS_PAGES=['checkout','setupNode','install','build','uploadArtifact','deployPages'];
const ALL_STEPS=['checkout','setupNode','setupPy','cache','install','lint','test','build','uploadArtifact','dockerBuild','dockerPush','deployPages'];

const stepLabelMap={checkout:'stepCheckout',setupNode:'stepSetupNode',setupPy:'stepSetupPy',cache:'stepCache',install:'stepInstall',lint:'stepLint',test:'stepTest',build:'stepBuild',uploadArtifact:'stepUploadArtifact',dockerBuild:'stepDockerBuild',dockerPush:'stepDockerPush',deployPages:'stepDeployPages'};

let selected={trigs:{push:true,pr:true,manual:false,cron:false},steps:{}};
// default = node steps
STEPS_NODE.forEach(s=>selected.steps[s]=true);

function renderBoxes(){
  $('#trigBox').innerHTML=TRIGS.map(tg=>`<label><input type="checkbox" data-trig="${tg}" ${selected.trigs[tg]?'checked':''}> ${t('trig'+tg.charAt(0).toUpperCase()+tg.slice(1))}</label>`).join('');
  $('#stepBox').innerHTML=ALL_STEPS.map(s=>`<label><input type="checkbox" data-step="${s}" ${selected.steps[s]?'checked':''}> ${t(stepLabelMap[s])}</label>`).join('');
  document.querySelectorAll('[data-trig]').forEach(el=>el.onchange=()=>{selected.trigs[el.dataset.trig]=el.checked;generate();});
  document.querySelectorAll('[data-step]').forEach(el=>el.onchange=()=>{selected.steps[el.dataset.step]=el.checked;generate();});
}

function applyTemplate(){
  const tpl=$('#template').value;
  Object.keys(selected.steps).forEach(k=>selected.steps[k]=false);
  const arr=tpl==='node'?STEPS_NODE:tpl==='python'?STEPS_PY:tpl==='docker'?STEPS_DOCKER:tpl==='deploy-pages'?STEPS_PAGES:[];
  arr.forEach(s=>selected.steps[s]=true);
  if(tpl==='python')$('#pyVer').focus();
  renderBoxes();
  generate();
}

function generate(){
  const name=($('#wfName').value||'CI').trim();
  const branch=($('#branch').value||'main').trim();
  const os=$('#os').value;
  const nodeVer=$('#nodeVer').value||'20';
  const pyVer=$('#pyVer').value||'3.12';
  const lines=[];
  lines.push('name: '+JSON.stringify(name));
  lines.push('');
  lines.push('on:');
  const trigLines=[];
  if(selected.trigs.push)trigLines.push('  push:\n    branches: ['+branch+']');
  if(selected.trigs.pr)trigLines.push('  pull_request:\n    branches: ['+branch+']');
  if(selected.trigs.manual)trigLines.push('  workflow_dispatch:');
  if(selected.trigs.cron)trigLines.push('  schedule:\n    - cron: \'0 0 * * *\'');
  lines.push(trigLines.join('\n'));
  lines.push('');
  lines.push('jobs:');
  lines.push('  build:');
  lines.push('    runs-on: '+os);
  lines.push('    steps:');
  const stepLines=[];
  if(selected.steps.checkout)stepLines.push('      - uses: actions/checkout@v4');
  if(selected.steps.setupNode)stepLines.push('      - uses: actions/setup-node@v4\n        with:\n          node-version: '+JSON.stringify(nodeVer));
  if(selected.steps.setupPy)stepLines.push('      - uses: actions/setup-python@v5\n        with:\n          python-version: '+JSON.stringify(pyVer));
  if(selected.steps.cache&&selected.steps.setupNode)stepLines.push('      - uses: actions/setup-node@v4\n        with:\n          node-version: '+JSON.stringify(nodeVer)+'\n          cache: \'npm\'');
  if(selected.steps.cache&&selected.steps.setupPy&&!selected.steps.setupNode)stepLines.push('      - uses: actions/cache@v4\n        with:\n          path: ~/.cache/pip\n          key: ${{ runner.os }}-pip');
  if(selected.steps.install&&selected.steps.setupNode)stepLines.push('      - run: npm ci');
  if(selected.steps.install&&selected.steps.setupPy&&!selected.steps.setupNode)stepLines.push('      - run: pip install -r requirements.txt');
  if(selected.steps.lint&&selected.steps.setupNode)stepLines.push('      - run: npm run lint');
  if(selected.steps.lint&&selected.steps.setupPy&&!selected.steps.setupNode)stepLines.push('      - run: ruff check .');
  if(selected.steps.test&&selected.steps.setupNode)stepLines.push('      - run: npm test');
  if(selected.steps.test&&selected.steps.setupPy&&!selected.steps.setupNode)stepLines.push('      - run: pytest');
  if(selected.steps.build&&selected.steps.setupNode)stepLines.push('      - run: npm run build');
  if(selected.steps.dockerBuild)stepLines.push('      - uses: docker/build-push-action@v5');
  if(selected.steps.dockerPush)stepLines.push('      - uses: docker/login-action@v3\n        with:\n          username: ${{ secrets.DOCKER_USER }}\n          password: ${{ secrets.DOCKER_PASS }}\n      - uses: docker/build-push-action@v5\n        with:\n          push: true\n          tags: user/app:latest');
  if(selected.steps.uploadArtifact)stepLines.push('      - uses: actions/upload-pages-artifact@v3');
  if(selected.steps.deployPages)stepLines.push('      - uses: actions/deploy-pages@v4');
  // de-dup
  const seen=new Set();
  lines.push(stepLines.filter(l=>{const k=l.split('\n')[0];if(seen.has(k))return false;seen.add(k);return true;}).join('\n'));
  $('#output').textContent=lines.join('\n');
}

function downloadYml(){
  const blob=new Blob([$('#output').textContent],{type:'text/yaml'});
  const url=URL.createObjectURL(blob);
  const fn=(($('#wfName').value||'ci').toLowerCase().replace(/\s+/g,'-'));
  const a=document.createElement('a');a.href=url;a.download=fn+'.yml';
  document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(url);
}

/* labels */
$('#stName').textContent=t('stName');
$('#stTrig').textContent=t('stTrig');
$('#stJob').textContent=t('stJob');
$('#lblName').textContent=t('lblName');
$('#lblTemplate').textContent=t('lblTemplate');
$('#lblBranch').textContent=t('lblBranch');
$('#lblOs').textContent=t('lblOs');
$('#lblNode').textContent=t('lblNode');
$('#lblPy').textContent=t('lblPy');
$('#outLabel').textContent=t('outLabel');
$('#note').textContent=t('note');

['wfName','branch','os','nodeVer','pyVer'].forEach(id=>{$('#'+id).oninput=generate;$('#'+id).onchange=generate;});

$('#toolbar').innerHTML=`
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="downloadYml()">${t('download')}</button>`;

renderBoxes();
generate();

GZ.renderToolPage({
  category:'dev',
  titleKey:'toolTitle',
  descKey:'toolDesc',
  howToSteps:['s1','s2','s3','s4'],
  related:[
    {icon:'🚫',href:'/dev/gitignore-generator.html',nameKey:'rGitignore'},
    {icon:'🐳',href:'/dev/dockerfile-generator.html',nameKey:'rDocker'},
    {icon:'📦',href:'/dev/docker-compose.html',nameKey:'rDockerCompose'},
    {icon:'🔐',href:'/dev/env-generator.html',nameKey:'rEnv'},
    {icon:'☸️',href:'/dev/kubernetes-yaml.html',nameKey:'rK8s'},
    {icon:'🏷️',href:'/dev/semver.html',nameKey:'rSemver'}
  ]
});
</script>
