<script>
GZI18n.register({
  en: {
    toolTitle: 'Instagram Caption Generator',
    toolDesc: 'Generate catchy Instagram captions with emojis and trending hashtags. Pick a topic, mood and tone — copy ready-to-post captions in seconds.',
    lblTopic: 'Post topic or keywords', lblMood: 'Mood', lblTone: 'Caption style', lblHashtags: 'Hashtags', lblCount: 'How many captions',
    step1: 'Describe your post — a topic or a few keywords (e.g. "morning coffee")',
    step2: 'Pick a mood and a caption style (storytelling, question, list, CTA)',
    step3: 'Click Generate to get ready-to-post captions with emojis',
    step4: 'Click any caption to copy it, then paste straight into Instagram',
  },
  zh: {
    toolTitle: 'Instagram 文案生成器',
    toolDesc: '生成带 Emoji 和热门话题标签的 Instagram 文案。选择主题、情绪和风格，几秒内复制即可发布的文案。',
    lblTopic: '帖子主题或关键词', lblMood: '情绪', lblTone: '文案风格', lblHashtags: '话题标签', lblCount: '生成数量',
    step1: '描述你的帖子 — 输入主题或几个关键词（如"晨间咖啡"）',
    step2: '选择情绪和文案风格（故事、提问、清单、号召）',
    step3: '点击「生成」获取带 Emoji 的可直接发布的文案',
    step4: '点击任一文案即可复制，然后直接粘贴到 Instagram',
  }
});

const { $, copyText, t } = GZ;
let currentMood = 'happy';

document.querySelectorAll('.ic-pill').forEach(p => {
  p.addEventListener('click', () => {
    document.querySelectorAll('.ic-pill').forEach(x => x.classList.remove('active'));
    p.classList.add('active');
    currentMood = p.dataset.mood;
  });
});

const MOOD_EMOJI = {happy:['😊','🥰','🌞','🎉','🙌'],inspire:['✨','🌟','💫','🔥','🚀'],funny:['😂','🤪','😜','🙃','🤣'],chill:['🌿','☕','🌊','🌅','🍃'],bold:['🔥','💥','💪','👑','⚡'],love:['💕','💖','🌹','💞','💘']};

const HOOKS = {
  happy: ['Good vibes only','Smiling because why not','Today is a good day','Living my best life','Little moments, big joy'],
  inspire: ['Reminder: you\'ve got this','Dream big, work hard','Your only limit is you','Progress over perfection','One day or day one — you decide'],
  funny: ['I followed my heart and it led to the fridge','Currently accepting compliments','I’m on energy-saving mode','Plot twist: I have no idea what I’m doing','Me, myself, and WiFi'],
  chill: ['Slow mornings hit different','Taking it one cup at a time','Nothing to do, nowhere to be','Sunsets and soft thoughts','Just breathing'],
  bold: ['They said I couldn’t, so I did','Main character energy','Built different','Make them stop and stare','No apologies, just results'],
  love: ['You are my favorite hello','Heart eyes only','Found my person','Love is in the air','Forever and always'],
};

const BRIDGES = {
  short: [],
  story: ['Here’s the thing —','Honestly,','Truth is,','What I learned today:','Behind this photo:'],
  question: ['Question for you:','Ever feel like','Can we talk about how','Real talk —','Hot take:'],
  list: ['3 things about today:','Quick reminder:','Save this for later:','Things I’m loving right now:','Note to self:'],
  cta: ['Double tap if you agree','Save this post','Tag someone who needs this','Follow for more','Drop a comment below'],
};

const LIST_ITEMS = ['showed up anyway','kept it simple','let go of what I can’t control','found joy in the small stuff','made it to the end','learned something new'];

const HASHTAGS = ['#instagood','#photooftheday','#love','#instadaily','#picoftheday','#follow','#happy','#life','#instagram','#beautiful','#smile','#instamood','#vibes','#goodvibes','#mood','#reels','#explore','#trending'];

function pick(a){return a[Math.floor(Math.random()*a.length)];}
function pickN(arr,n){const c=[...arr];const out=[];while(out.length<n&&c.length){out.push(c.splice(Math.floor(Math.random()*c.length),1)[0]);}return out;}

function buildCaption(topic, tone, mood, withTags){
  const e1 = pick(MOOD_EMOJI[mood]);
  const e2 = pick(MOOD_EMOJI[mood]);
  const hook = pick(HOOKS[mood]);
  const tStr = topic ? topic.trim() : '';
  let body = '';
  if (tone === 'short'){
    body = `${e1} ${hook}${tStr? ' — '+tStr:''} ${e2}`;
  } else if (tone === 'list'){
    const items = pickN(LIST_ITEMS,3);
    body = `${e1} ${hook}\n\n• I ${items[0]}\n• I ${items[1]}\n• I ${items[2]}\n${e2}`;
  } else if (tone === 'question'){
    body = `${e1} ${pick(BRIDGES.question)} ${hook.toLowerCase()}? ${tStr? '\n\n'+tStr:''}\n\nDrop your thoughts below 👇`;
  } else if (tone === 'cta'){
    body = `${e1} ${hook}.${tStr? ' '+tStr+'.':''}\n\n${pick(BRIDGES.cta)} ${e2}`;
  } else { // story
    body = `${e1} ${pick(BRIDGES.story)} ${hook.toLowerCase()}.${tStr? ' '+tStr+'.':''} ${e2}`;
  }
  if (withTags === 'yes'){
    const tags = pickN(HASHTAGS, 8);
    body += '\n.\n.\n.\n' + tags.join(' ');
  }
  return body;
}

function generate(){
  const topic = $('#topic').value.trim();
  const tone = $('#tone').value;
  const withTags = $('#hashtags').value;
  const count = parseInt($('#count').value);
  const results = $('#results');
  results.innerHTML = '';
  const used = new Set();
  let attempts = 0;
  while (results.children.length < count && attempts < count*5){
    attempts++;
    const cap = buildCaption(topic, tone, currentMood, withTags);
    if (!used.has(cap)){
      used.add(cap);
      const card = document.createElement('div');
      card.className = 'ic-card';
      card.innerHTML = `<div class="ic-text"></div><div class="ic-actions"><button class="gz-btn gz-btn-secondary">📋 Copy</button><span class="ic-char"></span></div>`;
      card.querySelector('.ic-text').textContent = cap;
      card.querySelector('.ic-char').textContent = `${cap.length} chars`;
      card.querySelector('button').onclick = (e)=>{e.stopPropagation();copyText(cap);};
      card.addEventListener('click', ()=>copyText(cap));
      results.appendChild(card);
    }
  }
  if (results.children.length === 0){
    results.innerHTML = '<div style="opacity:.6;padding:20px;text-align:center">—</div>';
  }
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="generate()">✨ ${t('generate')||'Generate'}</button>
  <button class="gz-btn gz-btn-secondary" onclick="generate()">🔄 Regenerate</button>
  <button class="gz-btn gz-btn-secondary" onclick="document.getElementById('results').innerHTML=''">🗑️ Clear</button>`;

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'#️⃣', href:'/text/hashtag-generator.html', name:'Hashtag Generator'},
    {icon:'✨', href:'/text/bio-generator.html', name:'Bio Generator'},
    {icon:'📷', href:'/social/instagram-post.html', name:'Instagram Post'},
    {icon:'📸', href:'/convert/instagram.html', name:'IG Fonts'},
  ]
});
generate();
</script>
