let currentTheme = 'matrix';
let currentSnippet = 0;
let audioCtx = null;
let autoTimer = null;
let charPos = 0;

function highlight(text, themeId) {
  const keywords = ['function','const','class','return','import','export','async','await','const','let','var','if','else','for','while','true','false','null','undefined','new','this','root','http','https','ssh','localhost','OK','true','false','granted','OK','success','complete','connecting','connecting','connecting'];
  let result = '';
  let i = 0;
  while (i < text.length) {
    const ch = text[i];
    if (ch === '>' || ch === '$' || ch === '#') {
      let j = i;
      while (j < text.length && /[a-zA-Z0-9_/.-]/.test(text[j])) j++;
      if (j > i) {
        result += '<span class="kw" style="color:'+THEMES.find(t=>t.id===themeId).kw+'">'+text.slice(i,j)+'</span>';
        i = j;
        continue;
      }
    }
    if (/[a-zA-Z_]/.test(ch)) {
      let j = i;
      while (j < text.length && /[a-zA-Z0-9_]/.test(text[j])) j++;
      const word = text.slice(i, j);
      if (keywords.includes(word)) {
        result += '<span class="kw" style="color:'+THEMES.find(t=>t.id===themeId).kw+'">'+word+'</span>';
      } else {
        result += word;
      }
      i = j;
    } else {
      // Handle numbers/hex
      if (/[0-9]/.test(ch) || (ch === '0' && i+1 < text.length && text[i+1] === 'x')) {
        let j = i;
        while (j < text.length && /[0-9a-fA-Fx.]/.test(text[j])) j++;
        result += '<span style="color:#a78bfa">'+text.slice(i,j)+'</span>';
        i = j;
      } else {
        result += ch;
        i++;
      }
    }
  }
  return result;
}

function playKeySound() {
  if (!$('#soundChk').checked) return;
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.frequency.value = 800 + Math.random() * 400;
    osc.type = 'square';
    gain.gain.setValueAtTime(0.04, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05);
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime + 0.05);
  } catch (e) {}
}

function appendChar(ch) {
  const screen = $('#screen');
  if (!$('#cursorChk').checked) {
    screen.textContent += ch;
  } else {
    // Add char, then blinking cursor
    if (screen.querySelector('.ht-cursor')) screen.querySelector('.ht-cursor').remove();
    screen.innerHTML += ch === '\n' ? '\n' : ch;
    const c = document.createElement('span');
    c.className = 'ht-cursor';
    screen.appendChild(c);
  }
  screen.scrollTop = screen.scrollHeight;
}

function typeNextChar() {
  if (!$('#autoChk').checked) {
    clearInterval(autoTimer);
    autoTimer = null;
    return;
  }
  const snippet = SNIPPETS[currentTheme][currentSnippet % SNIPPETS[currentTheme].length];
  if (charPos >= snippet.length) {
    appendChar('\n\n');
    charPos = 0;
    currentSnippet++;
    return;
  }
  appendChar(snippet[charPos]);
  charPos++;
}

function setupAutoType() {
  if (autoTimer) clearInterval(autoTimer);
  if (!$('#autoChk').checked) return;
  const speed = +$('#speed').value || 30;
  autoTimer = setInterval(typeNextChar, speed);
}

function handleKey(e) {
  // Allow tab/shift/ctrl etc
  e.preventDefault();
  if ($('#autoChk').checked) return;
  const snippet = SNIPPETS[currentTheme][currentSnippet % SNIPPETS[currentTheme].length];
  if (charPos >= snippet.length) {
    appendChar('\n\n');
    charPos = 0;
    currentSnippet++;
    return;
  }
  const ch = snippet[charPos];
  appendChar(ch);
  charPos++;
  playKeySound();
  // Check speed
  const speed = +$('#speed').value || 30;
  if (speed > 50) {
    // Slow mode: type a few more chars
    for (let i = 0; i < 2; i++) {
      if (charPos < snippet.length) {
        appendChar(snippet[charPos]);
        charPos++;
      }
    }
  }
}

function clearScreen() {
  $('#screen').textContent = '';
  charPos = 0;
  currentSnippet = 0;
}

function setTheme(id) {
  currentTheme = id;
  const screen = $('#screen');
  screen.className = 'ht-screen ' + id;
  document.querySelectorAll('.ht-theme-card').forEach(c => {
    c.classList.toggle('active', c.dataset.theme === id);
  });
  // Re-render existing content
  const existing = screen.textContent;
  screen.innerHTML = highlight(existing, id);
}

function buildThemeGrid() {
  const grid = $('#themeGrid');
  grid.innerHTML = THEMES.map(th => `
    <div class="ht-theme-card ${th.id === currentTheme ? 'active' : ''}" data-theme="${th.id}" onclick="setTheme('${th.id}')">
      <div class="preview" style="background:${th.bg};color:${th.fg}">${th.preview}</div>
      <div class="name">${th.name}</div>
    </div>
  `).join('');
}

function fullscreen() {
  const el = $('#screen');
  if (el.requestFullscreen) el.requestFullscreen();
  else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
}
