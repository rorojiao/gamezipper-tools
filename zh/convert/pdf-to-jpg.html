<script>
GZI18n.register({
  en: {
    toolTitle: 'PDF to JPG Converter',
    toolDesc: 'Convert PDF pages to high-quality JPG images — drag, drop and download instantly, all in your browser.',
    dropHere: 'Drop your PDF here or click to upload',
    quality: 'Quality',
    scale: 'Scale',
    convertAll: 'Convert All Pages',
    downloadAll: 'Download All JPGs',
    downloadPage: 'Download JPG',
    page: 'Page',
    of: 'of',
    processing: 'Processing...',
    step1: 'Upload a PDF file by dragging it or clicking the drop zone',
    step2: 'Choose JPG quality and resolution scale',
    step3: 'Click "Convert All Pages" to render each page as a JPG image',
    step4: 'Download individual JPGs or all images at once',
  },
  zh: {
    toolTitle: 'PDF 转 JPG 转换器',
    toolDesc: '将 PDF 页面转换为高质量 JPG 图片 — 拖拽上传，即时下载，完全浏览器本地处理。',
    dropHere: '将 PDF 拖拽到此处或点击上传',
    quality: '质量',
    scale: '缩放',
    convertAll: '转换所有页面',
    downloadAll: '下载所有 JPG',
    downloadPage: '下载 JPG',
    page: '第',
    of: '页，共',
    processing: '处理中...',
    step1: '拖拽或点击上传 PDF 文件',
    step2: '选择 JPG 质量和分辨率缩放',
    step3: '点击「转换所有页面」将每页渲染为 JPG 图片',
    step4: '单独下载每页或一键下载所有 JPG',
  }
});

const { $, copyText, t } = GZ;
let pdfDoc = null;
let pages = [];

const toolbar = $('#toolbar');
toolbar.innerHTML = `
  <label>${t('quality')}: <input id="qual" type="range" min="0.5" max="1" step="0.05" value="0.85" class="gz-select" style="width:90px"> <span id="qualVal">85%</span></label>
  <label>${t('scale')}: <select id="scaleSel" class="gz-select"><option value="1">1x</option><option value="1.5">1.5x</option><option value="2" selected>2x</option><option value="3">3x</option></select></label>
  <button class="gz-btn" onclick="convertAll()" id="convertBtn" disabled>${t('convertAll')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="downloadAll()" id="dlAllBtn" disabled>${t('downloadAll')}</button>
`;

$('#qual').addEventListener('input', function(){ $('#qualVal').textContent = Math.round(this.value*100) + '%'; });

const dz = $('#dropZone');
const fi = $('#fileInput');
dz.addEventListener('click', () => fi.click());
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('dragover'); });
dz.addEventListener('dragleave', () => dz.classList.remove('dragover'));
dz.addEventListener('drop', e => { e.preventDefault(); dz.classList.remove('dragover'); if(e.dataTransfer.files[0]) loadPDF(e.dataTransfer.files[0]); });
fi.addEventListener('change', () => { if(fi.files[0]) loadPDF(fi.files[0]); });
$('#dropText').textContent = t('dropHere');

const pdfJsScript = document.createElement('script');
pdfJsScript.src = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
document.head.appendChild(pdfJsScript);
pdfJsScript.onload = () => { pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js'; };

function loadPDF(file) {
  if (!file.name.toLowerCase().endsWith('.pdf')) { alert('Please upload a PDF file.'); return; }
  const reader = new FileReader();
  reader.onload = function(e) {
    const typedArray = new Uint8Array(e.target.result);
    pdfjsLib.getDocument(typedArray).promise.then(doc => {
      pdfDoc = doc;
      pages = [];
      $('#pagesContainer').innerHTML = '';
      $('#status').textContent = `PDF loaded: ${doc.numPages} page(s). Click "${t('convertAll')}" to render.`;
      $('#convertBtn').disabled = false;
      $('#dlAllBtn').disabled = true;
    }).catch(err => {
      $('#status').textContent = 'Error loading PDF: ' + err.message;
    });
  };
  reader.readAsArrayBuffer(file);
}

async function convertAll() {
  if (!pdfDoc) return;
  const qual = parseFloat($('#qual').value);
  const scale = parseFloat($('#scaleSel').value);
  pages = [];
  $('#pagesContainer').innerHTML = '';
  $('#status').textContent = t('processing');

  for (let i = 1; i <= pdfDoc.numPages; i++) {
    const page = await pdfDoc.getPage(i);
    const viewport = page.getViewport({ scale: scale * 2 });
    const canvas = document.createElement('canvas');
    canvas.width = viewport.width;
    canvas.height = viewport.height;
    const ctx = canvas.getContext('2d');
    await page.render({ canvasContext: ctx, viewport: viewport }).promise;

    const dataUrl = canvas.toDataURL('image/jpeg', qual);
    pages.push({ dataUrl, num: i, width: viewport.width, height: viewport.height });

    const card = document.createElement('div');
    card.className = 'page-card';
    const preview = document.createElement('canvas');
    preview.width = 200;
    preview.height = Math.round(200 * viewport.height / viewport.width);
    const pCtx = preview.getContext('2d');
    pCtx.drawImage(canvas, 0, 0, preview.width, preview.height);
    card.appendChild(preview);
    card.innerHTML += `<div class="page-info">${t('page')} ${i} ${t('of')} ${pdfDoc.numPages} — ${Math.round(viewport.width)}×${Math.round(viewport.height)}</div>`;
    card.innerHTML += `<button class="gz-btn" onclick="downloadPage(${i-1})">${t('downloadPage')}</button>`;
    $('#pagesContainer').appendChild(card);
    $('#status').textContent = `${t('processing')} ${i}/${pdfDoc.numPages}`;
  }

  const grid = document.createElement('div');
  grid.className = 'pages-grid';
  while ($('#pagesContainer').firstChild) grid.appendChild($('#pagesContainer').firstChild);
  $('#pagesContainer').appendChild(grid);

  $('#status').textContent = `✓ ${pages.length} page(s) converted to JPG.`;
  $('#dlAllBtn').disabled = false;
}

function downloadPage(idx) {
  const p = pages[idx];
  const a = document.createElement('a');
  a.href = p.dataUrl;
  a.download = `page-${p.num}.jpg`;
  a.click();
}

function downloadAll() {
  pages.forEach((p, i) => setTimeout(() => downloadPage(i), i * 300));
}

GZ.renderToolPage({
  category: 'convert',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🖼️', href:'/convert/pdf-to-image.html', name:'PDF to Image'},
    {icon:'📄', href:'/convert/image-to-pdf.html', name:'Image to PDF'},
    {icon:'📄', href:'/convert/pdf-merger.html', name:'PDF Merger'},
    {icon:'🖼️', href:'/image/jpeg-compressor.html', name:'JPEG Compressor'},
  ]
});
</script>
