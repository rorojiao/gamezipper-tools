<style>
.rv-form{background:var(--glass);border:1px solid var(--border);border-radius:12px;padding:18px;max-width:640px}
.rv-row{display:grid;grid-template-columns:1.6fr 1fr .7fr auto;gap:8px;align-items:end;margin-bottom:8px}
.rv-row label{display:flex;flex-direction:column;gap:4px;font-size:.8em;color:var(--text2)}
.rv-row select,.rv-row input{padding:8px 10px;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:.95em}
.rv-add{padding:8px 14px;border-radius:8px;background:var(--accent);color:#000;border:none;font-weight:700;cursor:pointer;font-size:.9em}
.rv-layers{margin-top:10px;display:grid;gap:6px}
.rv-layer{display:grid;grid-template-columns:1fr auto auto auto;gap:8px;align-items:center;padding:8px 10px;background:var(--glass2);border:1px solid var(--border);border-radius:8px;font-size:.9em}
.rv-layer button{background:none;border:none;color:var(--accent);cursor:pointer;font-size:1.1em;padding:0 6px}
.rv-empty{padding:14px;text-align:center;color:var(--text2);font-size:.85em;border:1px dashed var(--border);border-radius:8px}
.rv-result{margin-top:18px;display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px}
.rv-card{background:var(--glass2);border:1px solid var(--border);border-radius:12px;padding:18px;text-align:center}
.rv-card.main{background:var(--accent);border-color:var(--accent);grid-column:1 / -1}
.rv-card.main .value{color:#000;font-size:2.2rem}
.rv-card .value{font-size:1.5rem;font-weight:800;color:var(--accent);font-family:monospace}
.rv-card .label{font-size:.8em;color:var(--text2);margin-top:4px}
.rv-card.main .label{color:rgba(0,0,0,.7);font-weight:700}
.rv-climate{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px;max-width:640px}
.rv-climate label{display:flex;flex-direction:column;gap:4px;font-size:.85em;color:var(--text2)}
.rv-climate input{padding:10px 12px;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:1em}
.rv-info{background:var(--glass2);border:1px solid var(--border);border-radius:10px;padding:14px;margin-top:18px;font-size:.85em;line-height:1.6}
.rv-info h3{margin:0 0 8px;font-size:1em}
.rv-info table{width:100%;border-collapse:collapse;margin-top:8px}
.rv-info th,.rv-info td{padding:6px 8px;border-bottom:1px solid var(--border);text-align:center;font-family:monospace;font-size:.88em}
.rv-info th{color:var(--accent);font-weight:700}
.rv-info td.left{text-align:left}
</style>
<script type="application/ld+json">{"@context":"https://schema.org","@type":"WebApplication","name":"R-Value Calculator","description":"Free R-value calculator for insulation. Add layers (fiberglass, foam, cellulose) by thickness and material to get total R-value, U-value and heat loss per ft². Metric and imperial.","url":"https://tools.gamezipper.com/calc/r-value-calculator.html","applicationCategory":"Utility","operatingSystem":"Web Browser","offers":{"@type":"Offer","price":"0"}}</script>
<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is R-value?", "acceptedAnswer": {"@type": "Answer", "text": "R-value measures thermal resistance — how well an insulating material blocks heat flow. A higher R-value means better insulation. Total R-value of an assembly equals the sum of the R-values of each layer, so adding more insulation increases the R-value linearly."}}, {"@type": "Question", "name": "What is the difference between R-value and U-value?", "acceptedAnswer": {"@type": "Answer", "text": "R-value measures thermal resistance (higher is better for insulation), while U-value (or U-factor) measures thermal transmittance (lower is better). They are reciprocals: U = 1/R. Windows are usually rated by U-value; insulation is rated by R-value."}}, {"@type": "Question", "name": "What R-value do I need for my attic?", "acceptedAnswer": {"@type": "Answer", "text": "The U.S. Department of Energy recommends R-49 to R-60 for attics in most cold climates, R-30 to R-49 in mixed climates, and R-30 in warm climates. Walls typically need R-13 to R-21 and floors R-25 to R-30. Local building codes specify minimums for your zone."}}, {"@type": "Question", "name": "How is R-value calculated from thickness?", "acceptedAnswer": {"@type": "Answer", "text": "R-value equals thickness divided by thermal conductivity (k): R = thickness / k. Each material has a known R-value per inch. This calculator multiplies the per-inch rating by the layer thickness and sums all layers to find the assembly's total R-value."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="rv-form">
      <div class="rv-row">
        <label><span id="lbl-mat"></span>
          <select id="mat"></select>
        </label>
        <label><span id="lbl-thick"></span><input type="number" id="thick" placeholder="6" step="any" min="0"></label>
        <label><span id="lbl-unit-l"></span>
          <select id="unit">
            <option value="in">in</option>
            <option value="cm">cm</option>
          </select>
        </label>
        <button class="rv-add" id="add-btn" onclick="addLayer()">＋</button>
      </div>
      <div class="rv-layers" id="layers"></div>
    </div>
    <div class="rv-climate">
      <label><span id="lbl-indoor"></span><input type="number" id="indoor" placeholder="70" step="any"></label>
      <label><span id="lbl-outdoor"></span><input type="number" id="outdoor" placeholder="30" step="any"></label>
    </div>
    <div class="rv-result" id="result" style="display:none">
      <div class="rv-card main">
        <div class="value" id="rv-total">—</div>
        <div class="label" id="lbl-out-r">Total R-value</div>
      </div>
      <div class="rv-card">
        <div class="value" id="rv-u">—</div>
        <div class="label" id="lbl-out-u">U-value</div>
      </div>
      <div class="rv-card">
        <div class="value" id="rv-rsi">—</div>
        <div class="label" id="lbl-out-rsi">RSI (metric)</div>
      </div>
      <div class="rv-card">
        <div class="value" id="rv-loss">—</div>
        <div class="label" id="lbl-out-loss">Heat loss / ft²·hr</div>
      </div>
    </div>
    <div class="rv-info">
      <h3 id="lbl-ref">Common insulation R-value per inch</h3>
      <table>
        <thead><tr><th id="th-mat">Material</th><th id="th-rin">R / inch</th><th id="th-rsi">RSI / cm</th></tr></thead>
        <tbody id="ref-body"></tbody>
      </table>
    </div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'R-Value Calculator (Insulation)',
    toolDesc: 'Add insulation layers by material and thickness to compute total R-value, U-value, RSI and heat loss per square foot. Imperial and metric. Free, browser-based.',
    lblMat: 'Material',
    lblThick: 'Thickness',
    lblUnitL: 'Unit',
    lblIndoor: 'Indoor temperature (°F)',
    lblOutdoor: 'Outdoor temperature (°F)',
    lblOutR: 'Total R-value',
    lblOutU: 'U-value',
    lblOutRsi: 'RSI (metric)',
    lblOutLoss: 'Heat loss / ft²·hr',
    lblRef: 'Common insulation R-value per inch',
    thMat: 'Material', thRin: 'R / inch', thRsi: 'RSI / cm',
    empty: 'No layers added. Choose a material above and click ＋.',
    btnExample: 'Load example wall',
    btnClear: 'Clear all',
    step1: 'Pick a material from the dropdown and enter the layer thickness',
    step2: 'Click ＋ to add the layer; repeat for each material in the assembly',
    step3: 'Enter indoor and outdoor temperatures to see heat loss per ft²',
    step4: 'Compare the total R-value against your local code minimum',
  },
  zh: {
    toolTitle: 'R 值计算器（保温层）',
    toolDesc: '按材料和厚度添加保温层，计算总 R 值、U 值、RSI 和每平方英尺的热损失。支持英制和公制。免费，浏览器本地运行。',
    lblMat: '材料',
    lblThick: '厚度',
    lblUnitL: '单位',
    lblIndoor: '室内温度 (°F)',
    lblOutdoor: '室外温度 (°F)',
    lblOutR: '总 R 值',
    lblOutU: 'U 值',
    lblOutRsi: 'RSI（公制）',
    lblOutLoss: '热损失 / ft²·小时',
    lblRef: '常见保温材料每英寸 R 值',
    thMat: '材料', thRin: 'R/英寸', thRsi: 'RSI/厘米',
    empty: '尚未添加层。请在上方选择材料并点击 ＋。',
    btnExample: '加载示例墙体',
    btnClear: '全部清空',
    step1: '从下拉框选择材料并输入层厚',
    step2: '点击 ＋ 添加该层；为每个材料重复操作',
    step3: '输入室内外温度，查看每平方英尺的热损失',
    step4: '将总 R 值与本地建筑规范最低值对比',
  }
});

const { $, t } = GZ;

// R-value per inch (ft²·°F·hr/BTU)
const MATS = [
  { id:'fiberglass-batt', name:'Fiberglass batt',           nameZh:'玻璃纤维棉', r:3.2 },
  { id:'fiberglass-blow', name:'Fiberglass blown (loose)',  nameZh:'松散玻纤',   r:2.5 },
  { id:'rockwool',        name:'Rock / mineral wool',       nameZh:'岩棉/矿棉',  r:3.3 },
  { id:'cellulose',       name:'Cellulose blown',           nameZh:'纤维素',     r:3.5 },
  { id:'spray-foam-oc',   name:'Spray foam (open-cell)',    nameZh:'开孔喷涂泡沫', r:3.7 },
  { id:'spray-foam-cc',   name:'Spray foam (closed-cell)',  nameZh:'闭孔喷涂泡沫', r:6.5 },
  { id:'eps',             name:'EPS rigid foam',            nameZh:'EPS 硬质泡沫', r:4.0 },
  { id:'xps',             name:'XPS rigid foam',            nameZh:'XPS 硬质泡沫', r:5.0 },
  { id:'polyiso',         name:'Polyiso rigid foam',        nameZh:'聚异氰尿酸酯', r:6.0 },
  { id:'wood-soft',       name:'Softwood (lumber)',         nameZh:'软木',       r:1.25 },
  { id:'plywood',         name:'Plywood',                   nameZh:'胶合板',     r:1.25 },
  { id:'osb',             name:'OSB',                       nameZh:'定向刨花板', r:1.1 },
  { id:'concrete',        name:'Concrete',                  nameZh:'混凝土',     r:0.08 },
  { id:'brick',           name:'Brick',                     nameZh:'砖',         r:0.2 },
  { id:'air-gap',         name:'Air space (still)',         nameZh:'静止空气层', r:1.0 },
  { id:'gypsum',          name:'Gypsum board',              nameZh:'石膏板',     r:0.9 },
];

let layers = [];

function buildMatSelect() {
  const en = GZI18n.getLang() === 'en';
  $('#mat').innerHTML = MATS.map(m => `<option value="${m.id}">${en?m.name:m.nameZh} — R-${m.r}/in</option>`).join('');
}
buildMatSelect();

function buildRefTable() {
  const en = GZI18n.getLang() === 'en';
  $('#ref-body').innerHTML = MATS.slice(0,12).map(m => {
    const rsi = (m.r * 0.0693).toFixed(2);
    return `<tr><td class="left">${en?m.name:m.nameZh}</td><td>${m.r}</td><td>${rsi}</td></tr>`;
  }).join('');
}
buildRefTable();

function renderLayers() {
  const en = GZI18n.getLang() === 'en';
  const c = $('#layers');
  if (!layers.length) { c.innerHTML = `<div class="rv-empty">${t('empty')}</div>`; return; }
  c.innerHTML = layers.map((L,i) => {
    const m = MATS.find(x=>x.id===L.mat);
    const r = m.r * L.inches;
    const name = en ? m.name : m.nameZh;
    return `<div class="rv-layer"><span>${name} — ${L.inches}" (R-${r.toFixed(1)})</span><span>${r.toFixed(1)}</span><span>${L.inches}"</span><button title="remove" onclick="rmLayer(${i})">✕</button></div>`;
  }).join('');
}
renderLayers();

function addLayer() {
  const matId = $('#mat').value;
  const unit = $('#unit').value;
  const th = parseFloat($('#thick').value);
  if (isNaN(th) || th <= 0) return;
  const inches = unit === 'cm' ? th * 0.393701 : th;
  layers.push({ mat: matId, inches: inches });
  $('#thick').value = '';
  renderLayers();
  calc();
}
window.addLayer = addLayer;
function rmLayer(i) { layers.splice(i,1); renderLayers(); calc(); }
window.rmLayer = rmLayer;

function calc() {
  if (!layers.length) { $('#result').style.display='none'; return; }
  let R = 0;
  layers.forEach(L => { const m = MATS.find(x=>x.id===L.mat); R += m.r * L.inches; });
  const U = 1 / R;
  const RSI = R * 0.176110; // hr·ft²·°F/BTU → m²·K/W
  const Tin = parseFloat($('#indoor').value);
  const Tout = parseFloat($('#outdoor').value);
  let lossStr = '—';
  if (!isNaN(Tin) && !isNaN(Tout)) {
    const loss = U * Math.abs(Tin - Tout); // BTU/hr per ft²
    lossStr = loss.toFixed(2)+' BTU';
  }
  $('#rv-total').textContent = 'R-'+R.toFixed(1);
  $('#rv-u').textContent = U.toFixed(4);
  $('#rv-rsi').textContent = RSI.toFixed(2);
  $('#rv-loss').textContent = lossStr;
  $('#result').style.display = 'grid';
}

['mat','unit','thick'].forEach(id => { $('#'+id).addEventListener('change', calc); });
['indoor','outdoor'].forEach(id => { $('#'+id).addEventListener('input', calc); });

function loadExample() {
  layers = [
    { mat:'gypsum',        inches:0.5 },
    { mat:'air-gap',       inches:3.5 },
    { mat:'fiberglass-batt',inches:3.5 },
    { mat:'osb',           inches:0.5 },
    { mat:'polyiso',       inches:1 },
  ];
  $('#indoor').value = 70; $('#outdoor').value = 30;
  renderLayers(); calc();
}
function doClear() {
  layers = []; renderLayers();
  $('#indoor').value=''; $('#outdoor').value='';
  $('#result').style.display='none';
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="loadExample()">${t('btnExample')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('btnClear')}</button>`;

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'❄️',href:'/calc/btu-calculator.html',name:'BTU Calculator'},
    {icon:'⚡',href:'/calc/electricity-cost.html',name:'Electricity Cost'},
    {icon:'🔥',href:'/calc/heat-index-calculator.html',name:'Heat Index'},
    {icon:'🪨',href:'/calc/concrete.html',name:'Concrete'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
