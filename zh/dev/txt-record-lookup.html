const { $, copyText, t } = GZ;
let lastRecords = [];

async function dohLookup(name, type='TXT') {
  const url = `https://dns.google/resolve?name=${encodeURIComponent(name)}&type=${type}`;
  const res = await fetch(url, { headers: { 'accept': 'application/dns-json' } });
  if (!res.ok) throw new Error('DoH HTTP ' + res.status);
  return res.json();
}

function detectType(value) {
  const v = value.toLowerCase();
  if (/^v=spf1\b/.test(v)) return 'spf';
  if (/^v=dmarc1\b/.test(v)) return 'dmarc';
  if (/v=dkim1|k=rsa/.test(v)) return 'dkim';
  if (/google-site-verification/.test(v)) return 'google';
  if (/MS=/.test(v)) return 'ms';
  if (/facebook-domain-verification|apple-domain-verification|atlassian-domain-verification|docusign|adobe-idp-site-verification|onmicrosoft|zoho-verification|amazonses|stripe-verification|naver-site-verification|brave-ledger-verification|notion-domain-verification/.test(v)) return 'verification';
  return 'other';
}

function typeLabel(t2) {
  return ({ spf: t('detectedSpf'), dmarc: t('detectedDmarc'), dkim: t('detectedDkim'),
            google: t('detectedGoogle'), ms: t('detectedMs'), verification: t('detectedDw'),
            other: t('detectedOther') })[t2] || t('detectedOther');
}

function renderResult(domain, data) {
  const records = (data.Answer || []).filter(a => a.type === 16).map(a => {
    let val = a.data;
    // DoH TXT records are quoted JSON strings, possibly multiple concatenated
    if (val.startsWith('"')) val = val.replace(/^"|"$/g, '').replace(/"\s+"/g, '');
    return { value: val, ttl: a.TTL, type: detectType(val) };
  });
  lastRecords = records;
  if (records.length === 0) {
    $('#result').innerHTML = `
      <div class="empty">
        <div style="font-size:2.5rem;opacity:.5">📭</div>
        <h3 style="margin:8px 0">${t('notFound')}</h3>
        <p style="color:var(--text2);max-width:500px;margin:0 auto">${t('notFoundHint').replace('{domain}', domain)}</p>
      </div>`;
    return;
  }
  const counts = { spf:0, dmarc:0, dkim:0, google:0, ms:0, verification:0, other:0 };
  records.forEach(r => counts[r.type]++);
  $('#result').innerHTML = `
    <div class="stat-row">
      <div class="stat-card"><div class="num">${records.length}</div><div class="lbl">${t('statsRecords')}</div></div>
      <div class="stat-card"><div class="num">${counts.spf}</div><div class="lbl">${t('statsSpf')}</div></div>
      <div class="stat-card"><div class="num">${counts.dmarc}</div><div class="lbl">${t('statsDmarc')}</div></div>
      <div class="stat-card"><div class="num">${counts.dkim}</div><div class="lbl">${t('statsDkim')}</div></div>
      <div class="stat-card"><div class="num">${counts.google + counts.ms + counts.verification}</div><div class="lbl">${t('statsVerify')}</div></div>
    </div>
    <div class="filter-row">
      <select id="filter-type">
        <option value="">${t('filterAll')}</option>
        ${Object.entries(counts).filter(([_,n])=>n>0).map(([k,n])=>`<option value="${k}">${typeLabel(k)} (${n})</option>`).join('')}
      </select>
      <input id="filter-text" placeholder="${t('filterPlaceholder')}">
    </div>
    <table class="txt-table" id="txt-table">
      <thead><tr><th style="width:200px">${t('tableHeaderType')}</th><th>${t('tableHeaderValue')}</th><th style="width:90px">${t('tableHeaderTtl')}</th></tr></thead>
      <tbody></tbody>
    </table>
    <div class="note">
      <b>${records.length}</b> TXT records for <code>${domain}</code> via Google Public DNS. SPF, DKIM and DMARC records are commonly published as TXT. The original SPF record type (99) was deprecated in <a href="https://datatracker.ietf.org/doc/html/rfc7208" target="_blank" rel="noopener" style="color:var(--accent)">RFC 7208</a>.
    </div>
  `;
  $('#filter-type').onchange = renderRows;
  $('#filter-text').oninput = renderRows;
  renderRows();
}

function renderRows() {
  const ftype = $('#filter-type').value;
  const ftext = $('#filter-text').value.toLowerCase();
  const tbody = $('#txt-table').querySelector('tbody');
  const filtered = lastRecords.filter(r => {
    if (ftype && r.type !== ftype) return false;
    if (ftext && !r.value.toLowerCase().includes(ftext)) return false;
    return true;
  });
  if (filtered.length === 0) {
    tbody.innerHTML = `<tr><td colspan="3" style="text-align:center;color:var(--text2);padding:20px">No matching records.</td></tr>`;
    return;
  }
  tbody.innerHTML = filtered.map((r, i) => `
    <tr>
      <td><span class="txt-badge ${r.type}">${typeLabel(r.type)}</span></td>
      <td>${escapeHtml(r.value)} <a class="copy-link" data-i="${i}" style="cursor:pointer;color:var(--accent);font-size:.78rem;margin-left:6px;font-family:sans-serif">${GZI18n.getLang()==='zh'?'复制':'copy'}</a></td>
      <td>${r.ttl}s</td>
    </tr>
  `).join('');
  tbody.querySelectorAll('.copy-link').forEach(a => {
    a.onclick = () => {
      // Find the actual record value (use dataset index filtered mapping)
      const idx = +a.dataset.i;
      const val = filtered[idx].value;
      copyText(val);
      a.textContent = GZI18n.getLang()==='zh' ? '已复制！' : 'copied!';
      setTimeout(()=> a.textContent = GZI18n.getLang()==='zh' ? '复制' : 'copy', 1200);
    };
  });
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

async function lookup() {
  let domain = $('#domain').value.trim().toLowerCase();
  if (!domain) return;
  domain = domain.replace(/^https?:\/\//, '').replace(/^www\./, '').replace(/\/.*$/, '');
  $('#domain').value = domain;
  $('#result').innerHTML = `<div class="loading">${t('loading')}</div>`;
  try {
    const data = await dohLookup(domain, 'TXT');
    renderResult(domain, data);
  } catch (e) {
    $('#result').innerHTML = `<div class="empty"><p>⚠️ ${e.message}</p><p style="color:var(--text2);font-size:.85rem">DNS-over-HTTPS may be blocked on your network.</p></div>`;
  }
}

$('#lookup-btn').textContent = t('lookup');
$('#lookup-btn').onclick = lookup;
$('#domain').addEventListener('keydown', e => { if (e.key === 'Enter') lookup(); });

const examples = ['google.com', 'github.com', 'microsoft.com', 'wikipedia.org', '_dmarc.paypal.com', 'cloudflare.com'];
$('#examples').innerHTML = examples.map(d => `<button data-d="${d}">${d}</button>`).join('');
$('#examples').querySelectorAll('button').forEach(b => {
  b.onclick = () => { $('#domain').value = b.dataset.d; lookup(); };
});

$('#empty-msg').textContent = t('emptyMsg');

GZ.renderToolPage({

  descKey: 'toolDesc',

    {icon:'📧', href:'/dev/dmarc-lookup.html', name:'DMARC Lookup'},
    {icon:'🌐', href:'/dev/whois-lookup.html', name:'WHOIS Lookup'},
    {icon:'📋', href:'/dev/dns-txt-generator.html', name:'TXT Record Generator'},
  ]
});
</script>
