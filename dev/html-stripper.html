GZI18n.register({
  en:{toolTitle:'HTML Stripper',toolDesc:'Remove HTML tags and convert messy markup to clean plain text. Preserve line breaks, keep link URLs and collapse whitespace — all in your browser.',preserve:'Preserve block line breaks',links:'Keep link URLs',collapse:'Collapse extra whitespace',strip:'Strip HTML',example:'Example',copy:'Copy Text',clear:'Clear',inputChars:'Input chars',outputChars:'Output chars',words:'Words',removed:'Removed',step1:'Paste HTML markup into the left input box',step2:'Choose whether to preserve line breaks and link URLs',step3:'Click Strip HTML to convert markup into clean text',step4:'Copy the plain text result for documents, emails or CMS fields'},
  zh:{toolTitle:'HTML 标签清理器',toolDesc:'移除 HTML 标签，将杂乱标记转换为干净纯文本。可保留块级换行、保留链接 URL 并压缩空白 — 全部在浏览器本地完成。',preserve:'保留块级换行',links:'保留链接 URL',collapse:'压缩多余空白',strip:'清理 HTML',example:'示例',copy:'复制文本',clear:'清空',inputChars:'输入字符',outputChars:'输出字符',words:'单词数',removed:'已移除',step1:'将 HTML 标记粘贴到左侧输入框',step2:'选择是否保留换行和链接地址',step3:'点击“清理 HTML”转换为干净文本',step4:'复制纯文本结果用于文档、邮件或 CMS 字段'}
});
const {$,copyText,t}=GZ;
const ex='<article>\n  <h1>Best Free Tools</h1>\n  <p>Use <strong>GameZipper</strong> for fast utilities &amp; converters.</p>\n  <p>Visit <a href="https://tools.gamezipper.com/">our toolbox</a> today.</p>\n  <style>.hidden{display:none}</style>\n</article>';
function strip(){let html=$('#input').value;if($('#preserve').checked){html=html.replace(/<(br|hr)\s*\/?\s*>/gi,'\n').replace(/<\/(p|div|li|h[1-6]|tr|section|article|header|footer|blockquote)>/gi,'$&\n');}const doc=new DOMParser().parseFromString(html,'text/html');doc.querySelectorAll('script,style,noscript,template,svg').forEach(n=>n.remove());if($('#links').checked){doc.querySelectorAll('a[href]').forEach(a=>{const txt=(a.textContent||'').trim();const href=a.getAttribute('href');a.replaceWith(doc.createTextNode(txt&&href?`${txt} (${href})`:txt||href||''));});}let out=doc.body.textContent||'';if($('#collapse').checked){out=out.replace(/[\t \f\r]+/g,' ').replace(/ *\n */g,'\n').replace(/\n{3,}/g,'\n\n').trim();}$('#output').value=out;renderStats(html,out);}
function renderStats(inp,out){const words=(out.match(/\S+/g)||[]).length;const removed=Math.max(0,inp.length-out.length);$('#stats').innerHTML=`<div class="hs-stat"><strong>${inp.length}</strong>${t('inputChars')}</div><div class="hs-stat"><strong>${out.length}</strong>${t('outputChars')}</div><div class="hs-stat"><strong>${words}</strong>${t('words')}</div><div class="hs-stat"><strong>${removed}</strong>${t('removed')}</div>`;}
function loadExample(){ $('#input').value=ex; strip(); }function clearAll(){ $('#input').value=''; $('#output').value=''; renderStats('', ''); }
$('#toolbar').innerHTML=`<button class="gz-btn" onclick="strip()">${t('strip')}</button><button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button><button class="gz-btn" onclick="copyText($('#output').value)">${t('copy')}</button><button class="gz-btn gz-btn-secondary" onclick="clearAll()">${t('clear')}</button>`;
['input','preserve','links','collapse'].forEach(id=>$('#'+id).addEventListener('input',strip));['preserve','links','collapse'].forEach(id=>$('#'+id).addEventListener('change',strip));
GZ.renderToolPage({category:'dev',titleKey:'toolTitle',descKey:'toolDesc',howToSteps:['step1','step2','step3','step4'],related:[{icon:'🔓',href:'/text/html-unescape.html',name:'HTML Unescape'},{icon:'🔐',href:'/dev/html-escape.html',name:'HTML Escape'},{icon:'👁️',href:'/dev/html-viewer.html',name:'HTML Viewer'},{icon:'📄',href:'/dev/html-formatter.html',name:'HTML Formatter'}]});
