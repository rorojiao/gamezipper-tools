function xesc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&apos;')}
function hesc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function mdInlineHtml(s){return hesc(s).replace(/`([^`]+)`/g,'<code>$1</code>').replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>').replace(/__([^_]+)__/g,'<strong>$1</strong>').replace(/\*([^*]+)\*/g,'<em>$1</em>').replace(/_([^_]+)_/g,'<em>$1</em>').replace(/~~([^~]+)~~/g,'<del>$1</del>').replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2">$1</a>')}
function markdownToHtml(md){const lines=md.replace(/\r/g,'').split('\n');let out='',inCode=false,code=[],list=null;function closeList(){if(list){out+='</'+list+'>';list=null}}for(let i=0;i<lines.length;i++){const l=lines[i];if(/^```/.test(l)){closeList();if(inCode){out+='<pre><code>'+hesc(code.join('\n'))+'</code></pre>';code=[]}inCode=!inCode;continue}if(inCode){code.push(l);continue}if(l.includes('|')&&i+1<lines.length&&/^\s*\|?\s*:?-{3,}/.test(lines[i+1])){closeList();const rows=[l,...lines.slice(i+2).filter((r,j)=>{if(!r.includes('|'))return false;return true})];let consumed=0;for(let j=i+2;j<lines.length&&lines[j].includes('|');j++)consumed++;const cells=r=>r.replace(/^\s*\||\|\s*$/g,'').split('|').map(c=>c.trim());out+='<table><thead><tr>'+cells(l).map(c=>'<th>'+mdInlineHtml(c)+'</th>').join('')+'</tr></thead><tbody>';for(let j=i+2;j<i+2+consumed;j++)out+='<tr>'+cells(lines[j]).map(c=>'<td>'+mdInlineHtml(c)+'</td>').join('')+'</tr>';out+='</tbody></table>';i+=1+consumed;continue}let m;if((m=l.match(/^(#{1,6})\s+(.*)$/))){closeList();out+='<h'+m[1].length+'>'+mdInlineHtml(m[2])+'</h'+m[1].length+'>';continue}if((m=l.match(/^\s*[-*+]\s+(.*)$/))){if(list!=='ul'){closeList();list='ul';out+='<ul>'}out+='<li>'+mdInlineHtml(m[1])+'</li>';continue}if((m=l.match(/^\s*\d+\.\s+(.*)$/))){if(list!=='ol'){closeList();list='ol';out+='<ol>'}out+='<li>'+mdInlineHtml(m[1])+'</li>';continue}closeList();if(/^>\s?/.test(l)){out+='<blockquote>'+mdInlineHtml(l.replace(/^>\s?/,''))+'</blockquote>'}else if(/^\s*(---+|\*\*\*+)\s*$/.test(l)){out+='<hr>'}else if(l.trim()){out+='<p>'+mdInlineHtml(l)+'</p>'}}closeList();if(inCode)out+='<pre><code>'+hesc(code.join('\n'))+'</code></pre>';return out}
function run(text,opt={}){let pr='';if(opt.bold)pr+='<w:b/>';if(opt.italic)pr+='<w:i/>';if(opt.code)pr+='<w:rFonts w:ascii="Courier New" w:hAnsi="Courier New"/><w:shd w:fill="EEEEEE"/>';if(opt.underline)pr+='<w:u w:val="single"/><w:color w:val="0563C1"/>';return '<w:r>'+(pr?'<w:rPr>'+pr+'</w:rPr>':'')+'<w:t xml:space="preserve">'+xesc(text)+'</w:t></w:r>'}
function inlineRuns(s){const re=/(`[^`]+`|\*\*[^*]+\*\*|__[^_]+__|\*[^*\n]+\*|_[^_\n]+_|\[[^\]]+\]\([^)]+\))/g;let out='',last=0,m;while((m=re.exec(s))){out+=run(s.slice(last,m.index));const q=m[0];if(q[0]==='`')out+=run(q.slice(1,-1),{code:true});else if(q.startsWith('**')||q.startsWith('__'))out+=run(q.slice(2,-2),{bold:true});else if(q[0]==='*'||q[0]==='_')out+=run(q.slice(1,-1),{italic:true});else{const z=q.match(/^\[([^\]]+)\]\(([^)]+)\)$/);out+=run(z[1]+' ('+z[2]+')',{underline:true})}last=re.lastIndex}return out+run(s.slice(last))}
function para(text,style='',extra=''){return '<w:p><w:pPr>'+(style?'<w:pStyle w:val="'+style+'"/>':'')+extra+'</w:pPr>'+inlineRuns(text)+'</w:p>'}
function markdownToWordXml(md){const lines=md.replace(/\r/g,'').split('\n');let body='',inCode=false,code=[];const cells=r=>r.replace(/^\s*\||\|\s*$/g,'').split('|').map(c=>c.trim());for(let i=0;i<lines.length;i++){const l=lines[i];if(/^```/.test(l)){if(inCode){body+=para(code.join('\n'),'Code');code=[]}inCode=!inCode;continue}if(inCode){code.push(l);continue}if(l.includes('|')&&i+1<lines.length&&/^\s*\|?\s*:?-{3,}/.test(lines[i+1])){let rows=[cells(l)],j=i+2;while(j<lines.length&&lines[j].includes('|')){rows.push(cells(lines[j]));j++}body+='<w:tbl><w:tblPr><w:tblBorders><w:top w:val="single" w:sz="4"/><w:left w:val="single" w:sz="4"/><w:bottom w:val="single" w:sz="4"/><w:right w:val="single" w:sz="4"/><w:insideH w:val="single" w:sz="4"/><w:insideV w:val="single" w:sz="4"/></w:tblBorders></w:tblPr>'+rows.map((r,ri)=>'<w:tr>'+r.map(c=>'<w:tc><w:tcPr>'+(ri===0?'<w:shd w:fill="D9EAF7"/>':'')+'</w:tcPr>'+para(c)+'</w:tc>').join('')+'</w:tr>').join('')+'</w:tbl>';i=j-1;continue}let m;if((m=l.match(/^(#{1,6})\s+(.*)$/))){body+=para(m[2],'Heading'+Math.min(m[1].length,3));continue}if((m=l.match(/^\s*[-*+]\s+(.*)$/))){body+=para('• '+m[1]);continue}if((m=l.match(/^\s*(\d+)\.\s+(.*)$/))){body+=para(m[1]+'. '+m[2]);continue}if(/^>\s?/.test(l)){body+=para(l.replace(/^>\s?/,''),'Quote');continue}if(/^\s*(---+|\*\*\*+)\s*$/.test(l)){body+='<w:p><w:pPr><w:pBdr><w:bottom w:val="single" w:sz="8" w:color="999999"/></w:pBdr></w:pPr></w:p>';continue}if(l.trim())body+=para(l);else body+='<w:p/>'}if(inCode)body+=para(code.join('\n'),'Code');return body}
async function makeDocx(md){if(typeof JSZip==='undefined')throw new Error('JSZip unavailable');const zip=new JSZip(),body=markdownToWordXml(md),now=new Date().toISOString();zip.file('[Content_Types].xml','<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types"><Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/><Default Extension="xml" ContentType="application/xml"/><Override PartName="/word/document.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.document.main+xml"/><Override PartName="/word/styles.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.styles+xml"/><Override PartName="/docProps/core.xml" ContentType="application/vnd.openxmlformats-package.core-properties+xml"/><Override PartName="/docProps/app.xml" ContentType="application/vnd.openxmlformats-officedocument.extended-properties+xml"/></Types>');zip.folder('_rels').file('.rels','<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="word/document.xml"/><Relationship Id="rId2" Type="http://schemas.openxmlformats.org/package/2006/relationships/metadata/core-properties" Target="docProps/core.xml"/><Relationship Id="rId3" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/extended-properties" Target="docProps/app.xml"/></Relationships>');zip.folder('word').file('document.xml','<?xml version="1.0" encoding="UTF-8" standalone="yes"?><w:document xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main"><w:body>'+body+'<w:sectPr><w:pgSz w:w="11906" w:h="16838"/><w:pgMar w:top="1134" w:right="1134" w:bottom="1134" w:left="1134"/></w:sectPr></w:body></w:document>').file('styles.xml','<?xml version="1.0" encoding="UTF-8" standalone="yes"?><w:styles xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main"><w:style w:type="paragraph" w:default="1" w:styleId="Normal"><w:name w:val="Normal"/><w:rPr><w:sz w:val="22"/></w:rPr></w:style><w:style w:type="paragraph" w:styleId="Heading1"><w:name w:val="heading 1"/><w:basedOn w:val="Normal"/><w:rPr><w:b/><w:sz w:val="36"/><w:color w:val="1F4E79"/></w:rPr></w:style><w:style w:type="paragraph" w:styleId="Heading2"><w:name w:val="heading 2"/><w:basedOn w:val="Normal"/><w:rPr><w:b/><w:sz w:val="30"/><w:color w:val="2F75B5"/></w:rPr></w:style><w:style w:type="paragraph" w:styleId="Heading3"><w:name w:val="heading 3"/><w:basedOn w:val="Normal"/><w:rPr><w:b/><w:sz w:val="26"/></w:rPr></w:style><w:style w:type="paragraph" w:styleId="Code"><w:name w:val="Code"/><w:basedOn w:val="Normal"/><w:pPr><w:shd w:fill="F2F2F2"/><w:spacing w:before="120" w:after="120"/></w:pPr><w:rPr><w:rFonts w:ascii="Courier New" w:hAnsi="Courier New"/><w:sz w:val="19"/></w:rPr></w:style><w:style w:type="paragraph" w:styleId="Quote"><w:name w:val="Quote"/><w:basedOn w:val="Normal"/><w:pPr><w:ind w:left="720"/><w:pBdr><w:left w:val="single" w:sz="18" w:color="999999"/></w:pBdr></w:pPr><w:rPr><w:i/><w:color w:val="666666"/></w:rPr></w:style></w:styles>');zip.folder('word').folder('_rels').file('document.xml.rels','<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/styles" Target="styles.xml"/></Relationships>');zip.folder('docProps').file('core.xml','<?xml version="1.0" encoding="UTF-8" standalone="yes"?><cp:coreProperties xmlns:cp="http://schemas.openxmlformats.org/package/2006/metadata/core-properties" xmlns:dc="http://purl.org/dc/elements/1.1/" xmlns:dcterms="http://purl.org/dc/terms/"><dc:title>Markdown Document</dc:title><dc:creator>GameZipper Tools</dc:c
