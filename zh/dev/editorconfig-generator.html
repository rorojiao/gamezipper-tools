<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is an .editorconfig file?", "acceptedAnswer": {"@type": "Answer", "text": "An .editorconfig file defines coding styles like indentation, line endings, and charset for a project. Many code editors read it automatically to maintain consistent formatting."}}, {"@type": "Question", "name": "Where should I place the .editorconfig file?", "acceptedAnswer": {"@type": "Answer", "text": "Place it in the root directory of your project. EditorConfig files are searched from the file location upward to the root, so the nearest one applies."}}, {"@type": "Question", "name": "Which editors support EditorConfig?", "acceptedAnswer": {"@type": "Answer", "text": "Most modern editors support it natively (VS Code with extension, JetBrains IDEs, Sublime Text, Vim, Emacs) or via plugins."}}, {"@type": "Question", "name": "What is root = true in EditorConfig?", "acceptedAnswer": {"@type": "Answer", "text": "Setting root = true tells editors to stop searching for .editorconfig files in parent directories. It should be in the topmost .editorconfig of your project."}}]}</script>

<body>
<div class="gz-container">

    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="preset-row">
      <label class="gz-label" id="lbl-preset" style="font-size:.85rem;margin-right:8px"></label>
      <select id="preset" class="gz-select" style="max-width:300px;display:inline-block">
        <option value="custom" id="opt-custom"></option>
        <option value="general" id="opt-general"></option>
        <option value="node" id="opt-node"></option>
        <option value="python" id="opt-python"></option>
        <option value="web" id="opt-web"></option>
        <option value="go" id="opt-go"></option>
      </select>
    </div>
    <div class="config-grid">
      <div class="config-item">
        <label id="lbl-indent"></label>
        <select id="indent_style">
          <option value="space">space</option>
          <option value="tab">tab</option>
        </select>
      </div>
      <div class="config-item">
        <label id="lbl-size"></label>
        <input type="number" id="indent_size" value="2" min="1" max="8">
      </div>
      <div class="config-item">
        <label id="lbl-tabwidth"></label>
        <input type="number" id="tab_width" value="2" min="1" max="8">
      </div>
      <div class="config-item">
        <label id="lbl-eol"></label>
        <select id="end_of_line">
          <option value="lf">lf</option>
          <option value="crlf">crlf</option>
          <option value="cr">cr</option>
        </select>
      </div>
      <div class="config-item">
        <label id="lbl-charset"></label>
        <select id="charset">
          <option value="utf-8">utf-8</option>
          <option value="utf-8-bom">utf-8-bom</option>
          <option value="latin1">latin1</option>
          <option value="utf-16be">utf-16be</option>
          <option value="utf-16le">utf-16le</option>
        </select>
      </div>
      <div class="config-item">
        <label id="lbl-trailing"></label>
        <select id="insert_final_newline">
          <option value="true">true</option>
          <option value="false">false</option>
        </select>
      </div>
      <div class="config-item">
        <label id="lbl-trim"></label>
        <select id="trim_trailing_whitespace">
          <option value="true">true</option>
          <option value="false">false</option>
        </select>
      </div>
      <div class="config-item">
        <label id="lbl-maxlen"></label>
        <input type="number" id="max_line_length" value="" min="0" placeholder="off">
      </div>
    </div>
    <label class="gz-label" id="lbl-output"></label>
    <div class="gz-output" id="output"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'EditorConfig Generator',
    toolDesc: 'Generate .editorconfig files for consistent coding styles across editors and IDEs. Pick a preset or customize.',
    preset: 'Preset:',
    optCustom: 'Custom',
    optGeneral: 'General (2-space)',
    optNode: 'Node.js Project',
    optPython: 'Python (4-space)',
    optWeb: 'Web Frontend',
    optGo: 'Go (tabs)',
    indentStyle: 'Indent Style',
    indentSize: 'Indent Size',
    tabWidth: 'Tab Width',
    eol: 'End of Line',
    charset: 'Charset',
    trailing: 'Final Newline',
    trim: 'Trim Trailing Whitespace',
    maxlen: 'Max Line Length (off=empty)',
    output: 'Generated .editorconfig',
    step1: 'Select a preset or choose Custom to configure manually',
    step2: 'Adjust indentation, charset, line endings as needed',
    step3: 'Preview the generated .editorconfig content',
    step4: 'Click Copy and paste into your project root as .editorconfig',
  },
  zh: {
    toolTitle: 'EditorConfig 生成器',
    toolDesc: '生成 .editorconfig 文件，统一团队编辑器和 IDE 的代码风格。可选预设或自定义配置。',
    preset: '预设：',
    optCustom: '自定义',
    optGeneral: '通用（2 空格）',
    optNode: 'Node.js 项目',
    optPython: 'Python（4 空格）',
    optWeb: 'Web 前端',
    optGo: 'Go（Tab 缩进）',
    indentStyle: '缩进风格',
    indentSize: '缩进大小',
    tabWidth: 'Tab 宽度',
    eol: '行尾符',
    charset: '字符集',
    trailing: '文件末尾换行',
    trim: '去除行尾空格',
    maxlen: '最大行宽（留空=关闭）',
    output: '生成的 .editorconfig',
    step1: '选择预设或选「自定义」手动配置',
    step2: '根据需要调整缩进、字符集、行尾',
    step3: '预览生成的 .editorconfig 内容',
    step4: '点击复制，粘贴到项目根目录另存为 .editorconfig',
  }
});

const { $, copyText, t } = GZ;

const presets = {
  custom: {},
  general: { indent_style:'space', indent_size:'2', tab_width:'2', end_of_line:'lf', charset:'utf-8', insert_final_newline:'true', trim_trailing_whitespace:'true', max_line_length:'' },
  node: { indent_style:'space', indent_size:'2', tab_width:'2', end_of_line:'lf', charset:'utf-8', insert_final_newline:'true', trim_trailing_whitespace:'true', max_line_length:'' },
  python: { indent_style:'space', indent_size:'4', tab_width:'4', end_of_line:'lf', charset:'utf-8', insert_final_newline:'true', trim_trailing_whitespace:'true', max_line_length:'88' },
  web: { indent_style:'space', indent_size:'2', tab_width:'2', end_of_line:'lf', charset:'utf-8', insert_final_newline:'true', trim_trailing_whitespace:'true', max_line_length:'' },
  go: { indent_style:'tab', indent_size:'4', tab_width:'4', end_of_line:'lf', charset:'utf-8', insert_final_newline:'true', trim_trailing_whitespace:'true', max_line_length:'' },
};

function applyPreset() {
  const p = presets[$('#preset').value] || {};
  if (p.indent_style) $('#indent_style').value = p.indent_style;
  if (p.indent_size) $('#indent_size').value = p.indent_size;
  if (p.tab_width) $('#tab_width').value = p.tab_width;
  if (p.end_of_line) $('#end_of_line').value = p.end_of_line;
  if (p.charset) $('#charset').value = p.charset;
  if (p.insert_final_newline) $('#insert_final_newline').value = p.insert_final_newline;
  if (p.trim_trailing_whitespace) $('#trim_trailing_whitespace').value = p.trim_trailing_whitespace;
  $('#max_line_length').value = p.max_line_length || '';
  generate();
}

function generate() {
  const maxLen = $('#max_line_length').value.trim();
  const lines = [
    '# EditorConfig: https://editorconfig.org',
    'root = true',
    '',
    '[*]',
    `indent_style = ${$('#indent_style').value}`,
    `indent_size = ${$('#indent_size').value}`,
    `tab_width = ${$('#tab_width').value}`,
    `end_of_line = ${$('#end_of_line').value}`,
    `charset = ${$('#charset').value}`,
    `insert_final_newline = ${$('#insert_final_newline').value}`,
    `trim_trailing_whitespace = ${$('#trim_trailing_whitespace').value}`,
  ];
  if (maxLen) lines.push(`max_line_length = ${maxLen}`);
  const result = lines.join('\n') + '\n';
  $('#output').textContent = result;
}

['preset','indent_style','indent_size','tab_width','end_of_line','charset','insert_final_newline','trim_trailing_whitespace','max_line_length']
  .forEach(id => $('#'+id).addEventListener('input', () => { if (id !== 'preset') generate(); else applyPreset(); }));

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="applyPreset()">${t('reset')||'Reset'}</button>`;

GZ.renderToolPage({
  category: 'dev',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📝', href:'/dev/gitignore-generator.html', name:'.gitignore Gen'},
    {icon:'📄', href:'/dev/readme-generator.html', name:'README Gen'},
    {icon:'🐳', href:'/dev/dockerfile-generator.html', name:'Dockerfile Gen'},
    {icon:'⚙️', href:'/dev/nginx-config.html', name:'Nginx Config'},
  ]
});

applyPreset();
</script>
<script src="/tools-result-rec.js?v=20260707v520" defer></script>
</body>
