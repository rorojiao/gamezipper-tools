let target = 'requests';

/* ---- shared curl parser ---- */
function tokenizeCurl(input){
  const raw = input.replace(/^\s*curl\s+/i,'').replace(/\\\n/g,' ').replace(/\\\r\n/g,' ').trim();
  const tokens=[]; let cur=''; let q=null;
  for(let i=0;i<raw.length;i++){
    const c=raw[i];
    if(q){ if(c===q){q=null;continue;} cur+=c; }
    else if(c==='"'||c==="'"){q=c;}
    else if(c===' '||c==='\t'||c==='\n'||c==='\r'){ if(cur){tokens.push(cur);cur='';} }
    else {cur+=c;}
  }
  if(cur)tokens.push(cur);
  return tokens;
}
function parseCurl(input){
  const r={url:'',method:null,headers:{},data:null,cookies:null,user:null,insecure:false,location:false,compressed:false};
  const toks=tokenizeCurl(input);
  for(let i=0;i<toks.length;i++){
    const a=toks[i];
    const next=()=>toks[++i];
    if(a==='-X'||a==='--request'){r.method=next();continue;}
    if(a==='-H'||a==='--header'){const h=next();const idx=h.indexOf(':');if(idx>-1){r.headers[h.slice(0,idx).trim().toLowerCase()]=h.slice(idx+1).trim();}continue;}
    if(a==='-d'||a==='--data'||a==='--data-raw'||a==='--data-binary'||a==='--data-ascii'){r.data=next();continue;}
    if(a==='--data-urlencode'){r.data=(r.data?r.data+'&':'')+next();continue;}
    if(a==='-b'||a==='--cookie'){r.cookies=next();continue;}
    if(a==='-u'||a==='--user'){r.user=next();continue;}
    if(a==='-A'||a==='--user-agent'){r.headers['user-agent']=next();continue;}
    if(a==='-e'||a==='--referer'){r.headers['referer']=next();continue;}
    if(a==='-L'||a==='--location'){r.location=true;continue;}
    if(a==='-k'||a==='--insecure'){r.insecure=true;continue;}
    if(a==='--compressed'){r.compressed=true;continue;}
    if(a==='-I'||a==='--head'){r.method='HEAD';continue;}
    if(a==='--url'){r.url=next();continue;}
    if(a.startsWith('-')){ continue; }
    if(!r.url && (a.startsWith('http://')||a.startsWith('https://')||a.startsWith('www.')||a.startsWith('$'))){r.url=a.replace(/^\$/,'');continue;}
    if(!r.url && /^[a-z0-9.-]+\.[a-z]{2,}/i.test(a)){r.url='https://'+a;continue;}
    if(!r.url){r.url=a;}
  }
  return r;
}
function isJson(str){str=str&&str.trim();if(!str)return false;return (str[0]==='{'&&str[str.length-1]==='}')||(str[0]==='['&&str[str.length-1]===']');}

/* python literal helpers */
function pyRepr(s){return "'"+String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'")+"'";}
function pyDict(obj,ind){
  const pad='    '.repeat(ind);
  const inner='    '.repeat(ind+1);
  const keys=Object.keys(obj);
  if(!keys.length)return '{}';
  return '{\n'+keys.map(k=>inner+pyRepr(k)+': '+pyVal(obj[k])).join(',\n')+'\n'+pad+'}';
}
function pyVal(v){
  if(v===null||v===undefined)return 'None';
  if(typeof v==='boolean')return v?'True':'False';
  if(typeof v==='number')return String(v);
  if(typeof v==='object')return pyDict(v,1);
  return pyRepr(v);
}
function pyJsonLiteral(jsonStr){
  try{return JSON.stringify(JSON.parse(jsonStr));}catch(e){return null;}
}

function genRequests(c){
  const headers={...c.headers};
  if(c.cookies&&!headers['cookie'])headers['cookie']=c.cookies;
  const method=(c.method||(c.data!==null?'POST':'GET')).toLowerCase();
  let url=c.url||'https://api.example.com/endpoint';
  let bodyArg='';
  let isJsonBody=false;
  if(c.data!==null){
    const jl=pyJsonLiteral(c.data);
    if(jl){isJsonBody=true;bodyArg='json='+jl;delete headers['content-type'];}
    else {bodyArg='data='+pyRepr(c.data);}
  }
  const L=[];
  L.push('import requests');
  L.push('');
  L.push('url = '+pyRepr(url));
  if(Object.keys(headers).length)L.push('headers = '+pyDict(headers,0));
  if(c.user){const [u,p]=c.user.split(':');L.push('auth = ('+pyRepr(u||'')+', '+pyRepr(p||'')+')');}
  L.push('');
  const args=[];
  if(Object.keys(headers).length)args.push('headers=headers');
  if(c.user)args.push('auth=auth');
  if(bodyArg)args.push(bodyArg);
  if(c.location)args.push('allow_redirects=True');
  else if(c.method)args.push('allow_redirects=True');
  L.push('response = requests.'+method+'(url'+(args.length?', '+args.join(', '):'')+')');
  L.push('');
  L.push('print(response.status_code)');
  L.push('print(response.json())');
  return L.join('\n');
}

function genHttpx(c,async){
  const headers={...c.headers};
  if(c.cookies&&!headers['cookie'])headers['cookie']=c.cookies;
  const method=(c.method||(c.data!==null?'POST':'GET')).toLowerCase();
  let url=c.url||'https://api.example.com/endpoint';
  let bodyArg='';
  if(c.data!==null){
    const jl=pyJsonLiteral(c.data);
    if(jl){bodyArg='json='+jl;delete headers['content-type'];}
    else {bodyArg='data='+pyRepr(c.data);}
  }
  const L=[];
  if(async){L.push('import httpx');L.push('import asyncio');L.push('');}
  else {L.push('import httpx');L.push('');}
  if(async){
    L.push('async def main():');
    L.push('    async with httpx.AsyncClient('+(c.insecure?'verify=False':'')+(c.insecure?',':'')+') as client:');
  }else{
    L.push('with httpx.Client('+(c.insecure?'verify=False':'')+(c.insecure?',':'')+') as client:');
  }
  const ind=async?'        ':'    ';
  if(Object.keys(headers).length)L.push(ind+'headers = '+pyDict(headers,async?2:1));
  const args=[];
  if(Object.keys(headers).length)args.push('headers=headers');
  if(c.user){const [u,p]=c.user.split(':');args.push('auth=('+pyRepr(u||'')+', '+pyRepr(p||'')+')');}
  if(bodyArg)args.push(bodyArg);
  const prefix = async ? 'response = await ' : 'response = ';
  L.push(ind + prefix + 'client.' + method + '(' + pyRepr(url) + (args.length ? ', ' + args.join(', ') : '') + ')');
  L.push(ind+'print(response.status_code)');
  L.push(ind+'print(response.json())');
  if(async){L.push('');L.push('asyncio.run(main())');}
  return L.join('\n');
}

function convert(){
  const inp=$('#input').value.trim();
  if(!inp){$('#output').textContent='';$('#status').innerHTML='';return;}
  let c;try{c=parseCurl(inp);}catch(e){$('#output').textContent='';$('#status').innerHTML='<span style="color:var(--gz-accent)">⚠ '+e.message+'</span>';return;}
  let code='';
  if(target==='requests')code=genRequests(c);
  else if(target==='httpx')code=genHttpx(c,false);
  else code=genHttpx(c,true);
  $('#output').textContent=code;
  const parts=[];
  if(c.method)parts.push(c.method);
  if(c.user)parts.push('🔐 Basic Auth');
  if(c.data!==null)parts.push('📦 body');
  if(Object.keys(c.headers).length)parts.push(Object.keys(c.headers).length+' header(s)');
  $('#status').innerHTML='<span style="color:var(--gz-success)">✓ '+t('lblOut')+(parts.length?' — '+parts.join(' · '):'')+'</span>';
}

  convert();
}
