<script>
GZI18n.register({
  en: {
    toolTitle: 'Superhero Name Generator',
    toolDesc: 'Create epic hero and villain names — Captain, Doctor, The, Lord, Lady, Master and more. Pick a vibe (Hero, Villain, Cosmic) and get 20 unique names every click. Free, private, no signup.',
    sHero: '🦸 Hero', sVillain: '😈 Villain', sCosmic: '🌌 Cosmic', sRandom: '🎲 Random',
    btnGen: 'Generate 20 names',
    btnCopy: 'Copy All',
    copied: 'Copied!',
    step1: 'Pick a vibe — Hero, Villain, Cosmic or Random',
    step2: 'Click Generate to spin up 20 unique superhero names',
    step3: 'Tap the copy icon on any name to grab it',
    step4: 'Click Copy All to grab the full list at once',
  },
  zh: {
    toolTitle: '超级英雄名字生成器',
    toolDesc: '生成史诗般的英雄与反派名字 — Captain、Doctor、The、Lord、Lady、Master 等。选择风格（英雄、反派、宇宙），每次点击获得 20 个独特的名字。免费、私密、无需注册。',
    sHero: '🦸 英雄', sVillain: '😈 反派', sCosmic: '🌌 宇宙', sRandom: '🎲 随机',
    btnGen: '生成 20 个名字',
    btnCopy: '全部复制',
    copied: '已复制！',
    step1: '选择风格 — 英雄、反派、宇宙或随机',
    step2: '点击「生成」获得 20 个独特的超级英雄名字',
    step3: '点击任意名字旁的复制按钮即可获取',
    step4: '点击「全部复制」一次性获取整个列表',
  }
});

const { $, t, showToast } = GZ;
const pick = a => a[Math.floor(Math.random() * a.length)];

const TITLES = ['Captain','Doctor','The','Lord','Lady','Master','Agent','General','Major','Chief','King','Queen','Prince','Duke','Baron','Mister','Miss','Commander'];
const POWER = ['Thunder','Storm','Blaze','Shadow','Frost','Iron','Steel','Stone','Night','Dawn','Fire','Ice','Wind','Venom','Spectre','Phantom','Saber','Crimson','Onyx','Solar','Lunar','Nova','Vortex','Tempest','Raven','Wolf','Falcon','Hawk','Cobra','Viper','Specter','Wraith','Eclipse','Pulse','Quantum','Neon','Havoc','Rogue','Valor','Apex'];
const VILLAIN = ['Doom','Menace','Tyrant','Reaper','Wraith','Dread','Malice','Havoc','Scourge','Bane','Void','Plague','Ruin','Carnage','Onslaught','Terror','Wrath','Grim','Hex','Vex'];
const COSMIC = ['Nova','Quasar','Pulsar','Galaxy','Cosmo','Nebula','Astro','Orbit','Comet','Stellar','Astral','Zenith','Solar','Lunar','Celestial','Void','Infinity','Eternity','Cosmos','Aurora'];

function makeName(style) {
  const r = Math.random();
  let core;
  if (style === 'hero' || (style === 'random' && r < 0.4)) core = pick(POWER);
  else if (style === 'villain' || (style === 'random' && r < 0.6)) core = pick(VILLAIN);
  else if (style === 'cosmic' || style === 'random') core = pick(COSMIC);

  const pat = Math.random();
  if (pat < 0.35) return pick(TITLES) + ' ' + core;
  if (pat < 0.55) return core + '-Man';
  if (pat < 0.70) return core + '-Woman';
  if (pat < 0.82) return 'The ' + (style === 'villain' ? pick(VILLAIN) : core);
  if (pat < 0.92) return core + 'strike';
  return 'Mega' + core;
}

let style = 'hero';
const STYLES = [
  {id:'hero',key:'sHero'},{id:'villain',key:'sVillain'},{id:'cosmic',key:'sCosmic'},{id:'random',key:'sRandom'},
];
$('#style-tabs').innerHTML = STYLES.map(s => `<button data-id="${s.id}" class="${s.id===style?'active':''}">${t(s.key)}</button>`).join('');
document.querySelectorAll('#style-tabs button').forEach(b => {
  b.addEventListener('click', () => {
    document.querySelectorAll('#style-tabs button').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    style = b.dataset.id;
    generate();
  });
});

function generate() {
  const seen = new Set();
  const names = [];
  let safety = 0;
  while (names.length < 20 && safety < 400) {
    const n = makeName(style).trim();
    if (!seen.has(n)) { seen.add(n); names.push(n); }
    safety++;
  }
  $('#grid').innerHTML = names.map(n => `
    <div class="sn-card">
      <span class="name">${n.replace(/</g,'&lt;')}<span class="power">${style === 'villain' ? '😈' : style === 'cosmic' ? '🌌' : '🦸'}</span></span>
      <button data-name="${n.replace(/"/g,'&quot;')}" title="copy">📋</button>
    </div>`).join('');
  document.querySelectorAll('#grid .sn-card button').forEach(b => {
    b.addEventListener('click', async () => {
      try { await navigator.clipboard.writeText(b.dataset.name.replace(/&quot;/g,'"')); showToast(t('copied')); }
      catch (e) { showToast(t('copied')); }
    });
  });
}

function copyAll() {
  const names = [...document.querySelectorAll('#grid .sn-card .name')].map(e => e.firstChild.textContent.trim());
  if (!names.length) return;
  navigator.clipboard.writeText(names.join('\n')).then(() => showToast(t('copied'))).catch(() => showToast(t('copied')));
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="generate()">🦸 ${t('btnGen')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="copyAll()">📋 ${t('btnCopy')}</button>`;

generate();

GZ.renderToolPage({
  category: 'fun',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],

    {icon:'🐉', href:'/fun/fantasy-name-generator.html', name:'Fantasy Name Generator'},
  ]
});
</script>
