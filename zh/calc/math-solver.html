<script>
GZI18n.register({
  en: {
    toolTitle: 'Math Equation Solver',
    toolDesc: 'Solve math equations instantly — arithmetic, algebra, trig, logarithms and more with step-by-step solutions.',
    placeholder: 'Type a math expression, e.g. 2^10 + sqrt(144) * 3',
    result: 'Result',
    steps: 'Steps',

    error: 'Error: Invalid expression',
    step1: 'Type your math expression in the input field',
    step2: 'Use operators: + - * / ^ and functions like sqrt, sin, cos, log',
    step3: 'Press Enter or click Calculate to get the answer',
    step4: 'View step-by-step breakdown of the calculation',
  },
  zh: {
    toolTitle: '数学方程求解器',
    toolDesc: '即时求解数学方程 — 算术、代数、三角、对数等，附带详细步骤说明。',
    placeholder: '输入数学表达式，例如 2^10 + sqrt(144) * 3',
    result: '结果',
    steps: '计算步骤',
    history: '历史记录',
    error: '错误：表达式无效',
    step1: '在输入框中输入数学表达式',
    step2: '使用运算符 + - * / ^ 和函数如 sqrt、sin、cos、log',
    step3: '按 Enter 或点击计算获取答案',
    step4: '查看计算的详细步骤分解',
  }
});

const { $, copyText, t } = GZ;
const history = [];

$('#input').placeholder = t('placeholder');
$('#historyTitle').textContent = t('history');

const quickButtons = [
  {label:'π',val:'pi'},{label:'e',val:'e'},
  {label:'^',val:'^'},{label:'√',val:'sqrt('},
  {label:'sin',val:'sin('},{label:'cos',val:'cos('},{label:'tan',val:'tan('},
  {label:'log',val:'log('},{label:'ln',val:'ln('},
  {label:'(',val:'('},{label:')',val:')'},
  {label:'!',val:'!'},{label:'%',val:'%'},
  {label:'abs',val:'abs('},{label:'round',val:'round('},
];

$('#quickBtns').innerHTML = quickButtons.map(b =>
  `<button onclick="document.getElementById('input').value+='${b.val}';document.getElementById('input').focus()">${b.label}</button>`
).join('');

function factorial(n) {
  if (n < 0) return NaN;
  if (n === 0 || n === 1) return 1;
  if (n > 170) return Infinity;
  let r = 1;
  for (let i = 2; i <= n; i++) r *= i;
  return r;
}

function safeEval(expr) {
  // Preprocess the expression
  let processed = expr
    .replace(/π/g, 'pi')
    .replace(/×/g, '*')
    .replace(/÷/g, '/')
    .replace(/−/g, '-')
    .replace(/\^/g, '**')
    .replace(/sqrt\(/g, 'Math.sqrt(')
    .replace(/cbrt\(/g, 'Math.cbrt(')
    .replace(/abs\(/g, 'Math.abs(')
    .replace(/round\(/g, 'Math.round(')
    .replace(/ceil\(/g, 'Math.ceil(')
    .replace(/floor\(/g, 'Math.floor(')
    .replace(/sin\(/g, 'Math.sin(')
    .replace(/cos\(/g, 'Math.cos(')
    .replace(/tan\(/g, 'Math.tan(')
    .replace(/asin\(/g, 'Math.asin(')
    .replace(/acos\(/g, 'Math.acos(')
    .replace(/atan\(/g, 'Math.atan(')
    .replace(/log\(/g, 'Math.log10(')
    .replace(/ln\(/g, 'Math.log(')
    .replace(/log2\(/g, 'Math.log2(')
    .replace(/exp\(/g, 'Math.exp(')
    .replace(/\bpi\b/g, 'Math.PI')
    .replace(/\be\b/g, 'Math.E')
    // Handle factorial: number! or )!
    .replace(/(\d+)!/g, 'factorial($1)')
    .replace(/\)!/g, ')'); // factorial of parens - simplified

  // Validate - only allow safe characters
  if (/[^0-9+\-*/.()%\s\w]/.test(processed.replace(/Math\.\w+/g, '').replace(/factorial/g, '').replace(/\*\*/g, ''))) {
    throw new Error('Invalid characters in expression');
  }

  const fn = new Function('factorial', `"use strict"; return (${processed})`);
  return fn(factorial);
}

function generateSteps(expr, result) {
  const steps = [];
  steps.push(`${t('steps')}:`);
  steps.push(`${t('result')}: ${expr} = ${result}`);

  // Try to break down
  if (expr.includes('+')) {
    const parts = expr.split('+').map(s => s.trim());
    let running = 0;
    parts.forEach((p, i) => {
      try {
        const v = safeEval(p);
        running += v;
        steps.push(`  ${i === 0 ? '' : '+ '}${p} = ${typeof v === 'number' ? (Number.isInteger(v) ? v : v.toFixed(6).replace(/\.?0+$/, '')) : v}`);
      } catch(e) {}
    });
  } else if (expr.includes('**')) {
    const parts = expr.split('**');
    if (parts.length === 2) {
      steps.push(`  ${parts[0].trim()} raised to the power of ${parts[1].trim()} = ${result}`);
    }
  }

  if (steps.length <= 2) {
    steps.push(`  Computed: ${expr} → ${result}`);
  }

  return steps;
}

function calculate() {
  const expr = $('#input').value.trim();
  if (!expr) return;

  try {
    const result = safeEval(expr);
    if (typeof result !== 'number' || isNaN(result)) {
      throw new Error('Not a number');
    }
    const formatted = Number.isInteger(result) ? result.toString() : result.toPrecision(12).replace(/\.?0+$/, '');
    $('#answer').textContent = formatted;
    const stepsArr = generateSteps(expr, formatted);
    $('#steps').innerHTML = stepsArr.map(s => `<div class="step">${s}</div>`).join('');
    $('#resultBox').style.display = 'block';

    // Add to history
    history.unshift({ expr, result: formatted });
    if (history.length > 20) history.pop();
    renderHistory();
  } catch(e) {
    $('#answer').textContent = t('error');
    $('#steps').innerHTML = `<div class="step">${e.message}</div>`;
    $('#resultBox').style.display = 'block';
  }
}

function renderHistory() {
  $('#history').innerHTML = history.map(h =>
    `<div class="history-item" onclick="document.getElementById('input').value='${h.expr.replace(/'/g, "\\'")}';calculate()">
      <span class="expr">${h.expr}</span> = <span class="ans">${h.result}</span>
    </div>`
  ).join('');
}

$('#input').addEventListener('keydown', e => { if (e.key === 'Enter') calculate(); });
$('#input').addEventListener('input', () => {
  // Auto-calculate on input with debounce
  clearTimeout($('#input')._debounce);
  $('#input')._debounce = setTimeout(calculate, 500);
});

GZ.renderToolPage({

  ]
});
</script>
