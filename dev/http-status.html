<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is an HTTP status code?", "acceptedAnswer": {"@type": "Answer", "text": "An HTTP status code is a three-digit number a server returns with every HTTP response. It tells the client whether the request succeeded, failed, or needs further action. Codes are grouped into five classes: 1xx informational, 2xx success, 3xx redirection, 4xx client errors and 5xx server errors."}}, {"@type": "Question", "name": "What is the difference between 301 and 302 redirects?", "acceptedAnswer": {"@type": "Answer", "text": "A 301 Moved Permanently tells browsers and search engines the resource has moved for good — link equity is passed to the new URL. A 302 Found is a temporary redirect that keeps the original URL indexed. For permanent URL changes and SEO, use 301."}}, {"@type": "Question", "name": "Which HTTP status codes affect SEO?", "acceptedAnswer": {"@type": "Answer", "text": "200 (OK) keeps pages indexed. 301 transfers ranking to a new URL. 404 removes pages from the index but too many can waste crawl budget. 410 Gone speeds up removal versus 404. 500 and 503 errors can cause de-indexing if they persist, and 503 is the correct way to temporarily take a site down for maintenance."}}, {"@type": "Question", "name": "Is this HTTP status reference free to use?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. The full list runs entirely in your browser with no signup, no ads in the lookup, and instant search. You can even use it offline once loaded."}}]}</script>

<script>
GZI18n.register({
  en: {
    toolTitle: 'HTTP Status Codes — Reference & Lookup',
    toolDesc: 'Search every HTTP status code (1xx–5xx) with clear meanings, real-world use cases, common fixes and SEO impact. Fast, free, works offline in your browser.',
    all: 'All',
    f1: '1xx Info',
    f2: '2xx Success',
    f3: '3xx Redirect',
    f4: '4xx Client',
    f5: '5xx Server',

    countResults: n => n + (n === 1 ? ' status code' : ' status codes'),

    step2: 'Filter by class using the chips: 1xx, 2xx, 3xx, 4xx or 5xx',
    step3: 'Click any card to copy the code to your clipboard',
    step4: 'Use the SEO notes to pick the right redirect or error code',
  },
  zh: {
    toolTitle: 'HTTP 状态码速查表与查询',
    toolDesc: '搜索每一个 HTTP 状态码（1xx–5xx），含清晰释义、实际用途、常见修复方法和 SEO 影响。快速、免费，浏览器本地离线可用。',
    all: '全部',
    f1: '1xx 信息',
    f2: '2xx 成功',
    f3: '3xx 重定向',
    f4: '4xx 客户端',
    f5: '5xx 服务端',
    noResults: '没有匹配的状态码。',
    countResults: n => n + ' 个状态码',
    step1: '在搜索框输入状态码（如 404）或关键词（如 redirect）',
    step2: '用分类标签筛选：1xx、2xx、3xx、4xx 或 5xx',
    step3: '点击任意卡片可将状态码复制到剪贴板',
    step4: '参考 SEO 说明选择正确的重定向或错误码',
  }
});
const { $, copyText, showToast, t } = GZ;

const ZH = {
100:'继续','101':'切换协议','102':'处理中（WebDAV）','103':'早期提示',
200:'成功','201':'已创建','202':'已接受','203':'非权威信息','204':'无内容','205':'重置内容','206':'部分内容','207':'多状态（WebDAV）','208':'已报告（WebDAV）','226':'IM 已使用',
300:'多重选择','301':'永久重定向','302':'临时重定向','303':'参见其他','304':'未修改','305':'使用代理','307':'临时重定向','308':'永久重定向',
400:'错误请求','401':'未授权','402':'需要付款','403':'禁止访问','404':'未找到','405':'方法不允许','406':'不可接受','407':'需要代理认证','408':'请求超时','409':'冲突','410':'已删除','411':'需要长度','412':'先决条件失败','413':'请求实体过大','414':'URI 过长','415':'不支持的媒体类型','416':'范围无法满足','417':'期望失败','418':'我是一个茶壶','421':'请求错误路由','422':'实体无法处理（WebDAV）','423':'已锁定（WebDAV）','424':'依赖项失败（WebDAV）','425':'时间过早','426':'需要升级协议','428':'需要先决条件','429':'请求过多','431':'请求头字段过大','451':'因法律原因不可用',
500:'服务器内部错误','501':'未实现','502':'错误网关','503':'服务不可用','504':'网关超时','505':'HTTP 版本不支持','506':'变体协商失败','507':'存储空间不足（WebDAV）','508':'检测到循环（WebDAV）','510':'未扩展','511':'需要网络认证'
};

const CODES = [
[100,'Continue','1','Initial part of a request received; client should send the rest. Rarely seen in browsers.'],
[101,'Switching Protocols','1','Server agrees to switch protocols (e.g. upgrade to WebSocket).'],
[102,'Processing','1','WebDAV: server received the request but no response is available yet.'],
[103,'Early Hints','1','Allows the server to hint resources (preconnect/preload) before the final response.'],
[200,'OK','2','Standard success. The request succeeded and the response body contains the result.'],
[201,'Created','2','A new resource was created in response to a POST/PUT. Common after creating records.'],
[202,'Accepted','2','The request was accepted for processing but not finished yet (async jobs).'],
[203,'Non-Authoritative Information','2','Returned info comes from a third party, not the origin server.'],
[204,'No Content','2','Success with no body to return. Common for DELETE or successful PUT with nothing to show.'],
[205,'Reset Content','2','Success; the client should reset the document view (e.g. clear a form).'],
[206,'Partial Content','2','Range request succeeded — used for streaming/resumable downloads.'],
[207,'Multi-Status','2','WebDAV: conveys status for multiple independent operations in XML.'],
[208,'Already Reported','2','WebDAV: avoids repeating enumeration of bindings in a collection.'],
[226,'IM Used','2','Instance manipulation (delta encoding) was applied to the response.'],
[300,'Multiple Choices','3','The resource has multiple representations; choose one.'],
[301,'Moved Permanently','3','Permanent redirect. Passes SEO ranking to the new URL. Use for permanent URL changes.'],
[302,'Found','3','Temporary redirect. Original URL stays indexed. Avoid for permanent moves.'],
[303,'See Other','3','Redirect to another URI using GET — common after a POST/PRG pattern.'],
[304,'Not Modified','3','Cached version is still valid. Saves bandwidth when conditions (ETag/If-Modified-Since) match.'],
[305,'Use Proxy','3','Deprecated. Was used to require a proxy.'],
[307,'Temporary Redirect','3','Like 302 but preserves the original HTTP method (POST stays POST).'],
[308,'Permanent Redirect','3','Like 301 but preserves the original HTTP method. Good for permanent POST endpoints.'],
[400,'Bad Request','4','The server cannot understand the request due to malformed syntax. Check JSON, params, headers.'],
[401,'Unauthorized','4','Authentication is required or failed. Send a valid Authorization header or log in.'],
[402,'Payment Required','4','Reserved for future use; sometimes used by paywalls/APIs to demand payment.'],
[403,'Forbidden','4','Authenticated but not allowed. Check permissions, file rights or IP allow-lists.'],
[404,'Not Found','4','Resource does not exist. Remove internal links or restore/redirect the page.'],
[405,'Method Not Allowed','4','The URL exists but the HTTP method (GET/POST/…) is not supported.'],
[406,'Not Acceptable','4','The requested Accept header cannot be satisfied by any representation.'],
[407,'Proxy Authentication Required','4','Authenticate with a proxy before continuing.'],
[408,'Request Timeout','4','The client did not send a request in time. Often a slow client or network drop.'],
[409,'Conflict','4','The request conflicts with the current state — e.g. duplicate resource or version mismatch.'],
[410,'Gone','4','Resource was permanently removed. Speeds up de-indexing versus 404.'],
[411,'Length Required','4','A Content-Length header is required.'],
[412,'Precondition Failed','4','A precondition header (If-Match, If-Unmodified-Since) evaluated to false.'],
[413,'Payload Too Large','4','Request body exceeds the server limit. Raise the limit or shrink the upload.'],
[414,'URI Too Long','4','The URL is too long. Move long data into the body instead of the query string.'],
[415,'Unsupported Media Type','4','The Content-Type is not supported. Check you are sending application/json etc.'],
[416,'Range Not Satisfiable','4','The requested byte range cannot be served.'],
[417,'Expectation Failed','4','The Expect header could not be met.'],
[418,"I'm a Teapot",'4','RFC 2324 joke code. Cannot brew coffee with a teapot.'],
[421,'Misdirected Request','4','The request was sent to a server that cannot produce a response (HTTP/2 connection reuse).'],
[422,'Unprocessable Entity','4','WebDAV/API: well-formed but semantically invalid — e.g. validation errors.'],
[423,'Locked','4','WebDAV: the resource is locked.'],
[424,'Failed Dependency','4','WebDAV: a dependent request failed.'],
[425,'Too Early','4','Sent within a 0-RTT retry window; rejected to prevent replay.'],
[426,'Upgrade Required','4','The client must switch to a different protocol (e.g. TLS).'],
[428,'Precondition Required','4','The server requires a precondition header to avoid the lost-update problem.'],
[429,'Too Many Requests','4','Rate limited. Back off, add throttling, or check API quotas.'],
[431,'Request Header Fields Too Large','4','Headers are too big — often too many cookies. Clear or trim them.'],
[451,'Unavailable For Legal Reasons','4','Blocked for legal/censorship reasons (e.g. GDPR, government order).'],
[500,'Internal Server Error','5','Generic server failure. Check logs, exceptions and server health.'],
[501,'Not Implemented','5','The server does not support the method or feature.'],
[502,'Bad Gateway','5','An upstream proxy/gateway returned an invalid response. Check the backend.'],
[503,'Service Unavailable','5','Overloaded or in maintenance. The correct code for planned downtime. Retry later.'],
[504,'Gateway Timeout','5','The upstream did not respond in time. Investigate slow dependencies.'],
[505,'HTTP Version Not Supported','5','The server does not support the HTTP protocol version used.'],
[506,'Variant Also Negotiates','5','Transparent content negotiation configuration error.'],
[507,'Insufficient Storage','5','WebDAV: the server has no space to complete the request.'],
[508,'Loop Detected','5','WebDAV: an infinite loop was detected while processing.'],
[510,'Not Extended','5','Further extensions to the request are required.'],
[511,'Network Authentication Required','5','A captive portal requires login (common on public Wi-Fi).'],
];

let filter='all';
function render(){
  const q=$('#search').value.trim().toLowerCase();
  const grid=$('#grid');
  const list=CODES.filter(c=>{
    const cls=c[2];
    if(filter!=='all' && filter!==cls)return false;
    if(!q)return true;
    const zh=ZH[c[0]]||'';
    return String(c[0]).includes(q)||c[1].toLowerCase().includes(q)||c[3].toLowerCase().includes(q)||zh.toLowerCase().includes(q);
  });
  $('#count').textContent=t('countResults')(list.length);
  if(!list.length){grid.innerHTML=`<div class="hs-empty">${t('noResults')}</div>`;return;}
  const zh=t('all')==='全部';
  grid.innerHTML=list.map(c=>{
    const name=zh?(ZH[c[0]]||c[1]):c[1];
    return `<div class="hs-card" onclick="copyText('${c[0]}');showToast('✓ ${c[0]} copied')" title="Click to copy">
      <div class="code"><span class="hs-dot hs-${c[2]}"></span>${c[0]}</div>
      <div class="name">${name}</div>
      <div class="desc">${zh?c[3].replace(/(permanent|temporary|rate limit|maintenance|cached|SEO|redirect)/gi,m=>m):c[3]}</div>
    </div>`;
  }).join('');
}

$('#filters').innerHTML=[
  ['all','all'],['1','f1'],['2','f2'],['3','f3'],['4','f4'],['5','f5']
].map(([v,k])=>`<div class="hs-chip${v==='all'?' active':''}" data-f="${v}" onclick="setFilter('${v}')">${t(k)}</div>`).join('');
function setFilter(f){filter=f;document.querySelectorAll('.hs-chip').forEach(b=>b.classList.toggle('active',b.dataset.f===f));render();}
window.setFilter=setFilter;
$('#search').addEventListener('input',render);
render();

GZ.renderToolPage({
  category: 'dev',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📋', href:'/dev/http-status-codes.html', name:'HTTP Methods'},
    {icon:'🔒', href:'/dev/http-headers-checker.html', name:'HTTP Headers'},
    {icon:'🛡️', href:'/dev/security-headers.html', name:'Security Headers'},
    {icon:'🌐', href:'/dev/api-tester.html', name:'API Tester'},
  ]
});
</script>

</body>
