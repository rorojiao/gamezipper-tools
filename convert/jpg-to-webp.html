<script>
GZI18n.register({
  en: {
    toolTitle: 'JPG to WebP Converter',
    toolDesc: 'Convert JPG and JPEG images to WebP format. Batch convert, adjustable quality, reduce file size by up to 40%. Free, private, browser-based.',
    dropText: 'Drop JPG/JPEG files here or click to browse',
    quality: 'Quality:',
    convert: 'Convert All',
    clear: 'Clear',
    step1: 'Drag and drop or click to select JPG/JPEG files',
    step2: 'Adjust the quality slider (80% is a good default)',
    step3: 'Files convert automatically to WebP',
    step4: 'Download individual files or check savings',
  },
  zh: {
    toolTitle: 'JPG 转 WebP 转换器',
    toolDesc: '将 JPG/JPEG 图片转换为 WebP 格式。批量转换、可调质量、文件体积减小高达 40%。免费、私密、浏览器本地运行。',
    dropText: '拖放 JPG/JPEG 文件到此处或点击选择',
    quality: '质量：',
    convert: '全部转换',
    clear: '清空',
    step1: '拖放或点击选择 JPG/JPEG 文件',
    step2: '调节质量滑块（80% 是推荐的默认值）',
    step3: '文件自动转换为 WebP',
    step4: '下载单个文件或查看节省比例',
  }
});

const { $, copyText, t } = GZ;
let files = [];

const dropZone = $('#dropZone');
const fileInput = $('#fileInput');

dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('dragover');
  handleFiles(e.dataTransfer.files);
});
fileInput.addEventListener('change', e => handleFiles(e.target.files));

function handleFiles(fileList) {
  for (const f of fileList) {
    if (f.type === 'image/jpeg' || f.name.match(/\.(jpe?g)$/i)) {
      files.push(f);
    }
  }
  convertAll();
}

$('#quality').addEventListener('input', e => {
  $('#qval').textContent = e.target.value + '%';
  if (files.length) convertAll();
});

function convertAll() {
  const q = parseInt($('#quality').value) / 100;
  $('#resultList').innerHTML = '';
  files.forEach((file, idx) => {
    convertOne(file, q, idx);
  });
}

function convertOne(file, quality, idx) {
  const reader = new FileReader();
  reader.onload = (e) => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      canvas.width = img.naturalWidth;
      canvas.height = img.naturalHeight;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0);
      canvas.toBlob((blob) => {
        if (!blob) return;
        const url = URL.createObjectURL(blob);
        const origKB = (file.size / 1024);
        const newKB = (blob.size / 1024);
        const saved = ((1 - blob.size / file.size) * 100).toFixed(1);
        const name = file.name.replace(/\.(jpe?g)$/i, '') + '.webp';

        const item = document.createElement('div');
        item.className = 'gz-result-item';
        item.innerHTML = `
          <img src="${url}" alt="${name}">
          <div class="gz-result-name">${name}</div>
          <div class="gz-result-size">${newKB < 1024 ? newKB.toFixed(0) + ' KB' : (newKB/1024).toFixed(2) + ' MB'}</div>
          <div class="gz-result-saved">↓ ${saved}% smaller (was ${origKB < 1024 ? origKB.toFixed(0) + ' KB' : (origKB/1024).toFixed(2) + ' MB'})</div>
          <a href="${url}" download="${name}" class="gz-btn" style="display:inline-block;margin-top:8px;padding:6px 16px;font-size:.85rem">⬇ Download</a>
        `;
        $('#resultList').appendChild(item);
      }, 'image/webp', quality);
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function clearAll() {
  files = [];
  $('#resultList').innerHTML = '';
  fileInput.value = '';
}

$('#dropText').textContent = t('dropText');
$('#lblQuality').textContent = t('quality');
$('#toolbar').innerHTML = `<button class="gz-btn" onclick="convertAll()">${t('convert')}</button><button class="gz-btn gz-btn-secondary" onclick="clearAll()">${t('clear')}</button>`;

GZ.renderToolPage({
  category: 'convert',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🖼️', href:'/convert/webp-converter.html', name:'WebP ↔ PNG/JPG'},
    {icon:'🔄', href:'/image/jpg-to-png.html', name:'JPG to PNG'},
    {icon:'🎯', href:'/image/jpg-compressor.html', name:'Compress JPG'},
    {icon:'🖼️', href:'/convert/png-to-jpg.html', name:'PNG to JPG'},
  ]
});
</script>
