    catProfessional: '专业',
    catFunny: '搞笑',
    catFlirty: '撩人',
    step1: '选择风格（甜蜜、专业、搞笑、撩人）',
    step2: '点击「再来一个」获取新赞美',
    step3: '点击复制并分享给他人',
    step4: '工作场合用「专业」风格，「撩人」仅限私人关系',

const { $, copyText, t } = GZ;

const COMPLIMENTS = {
  sweet: [
    'You light up every room you walk into.',
    'Your smile could power a small city.',
    'The world is genuinely better because you\'re in it.',
    'You have a kind heart and it shows in everything you do.',
    'You make hard things look effortless.',
    'Your positivity is contagious in the best way.',
    'You\'re the kind of person people remember fondly.',
    'You have a gift for making others feel seen.',
    'Your laugh is my favorite sound.',
    'You\'re stronger than you think and kinder than you know.',
    'You bring out the best in the people around you.',
    'Your presence is a present.',
    'You have a beautiful soul.',
    'The way your eyes light up when you talk about what you love is magic.',
    'You\'re proof that good people still exist.',
  ],
  professional: [
    'Your attention to detail is unmatched on this team.',
    'I always learn something new when I work with you.',
    'You handle pressure with impressive grace.',

    'Your standards raise the bar for all of us.',
    'You give credit freely and take blame graciously.',
    'Your judgment on tough calls is spot-on.',
    'You make new team members feel welcome from day one.',
  ],
  funny: [
    'If you were a vegetable, you\'d be a cute-cumber.',

    'You must be tired — you\'ve been running through my mind all day.',
    'I was going to wait to text you, but patience is overrated.',

    'You\'re the reason I check my phone.',
    'If looks could kill, you\'d be a slow, charming poison.',
    'You\'re the plot twist I didn\'t know my week needed.',
    'Are you WiFi? Because I\'m feeling a real connection.',
    'Every time you walk in, my heart skips a software update.',
    'You\'re my favorite hello and hardest goodbye.',
    'I\'d cancel plans just to text you.',
    'You\'re dangerously easy to fall for.',
    'If cute were a crime, you\'d be doing life.',
  ],
};

const CATS = ['sweet','professional','funny','flirty'];
let currentCat = 'sweet';
let lastComp = null;
let history = [];

function nextComp(){
  const pool = (COMPLIMENTS[currentCat] || COMPLIMENTS.sweet).filter(c => !history.includes(c));
  if(!pool.length){ history = []; }
  const arr = pool.length ? pool : COMPLIMENTS[currentCat];
  lastComp = arr[Math.floor(Math.random()*arr.length)];
  history.push(lastComp);
  if(history.length > 20) history.shift();
  render();
}

function render(){
  if(!lastComp){
    $('#comp').innerHTML = `<span class="cg-empty">${t('emptyHint')}</span>`;
    return;
  }
  $('#comp').textContent = '"' + lastComp + '"';
}

function copyComp(){
  if(!lastComp) return;
  copyText(lastComp);
  const btn = $('#copyBtn');
  const original = btn.textContent;
  btn.textContent = t('copied');
  setTimeout(() => btn.textContent = original, 1100);
}

function setCat(c){
  currentCat = c;
  history = [];
  document.querySelectorAll('.cg-cat button').forEach(b => b.classList.toggle('active', b.dataset.cat === c));
  nextComp();
}

$('#cat').innerHTML = CATS.map((c,i) => `<button data-cat="${c}" onclick="setCat('${c}')" class="${i===0?'active':''}">${t('cat'+c.charAt(0).toUpperCase()+c.slice(1))}</button>`).join('');

$('#toolbar').innerHTML = `
  <button id="nextBtn" class="gz-btn" onclick="nextComp()">${t('next')}</button>
  <button id="copyBtn" class="gz-btn gz-btn-secondary" onclick="copyComp()">${t('copy')}</button>`;

nextComp();

});
</script>
