      "I was busy teaching my houseplant how to photosynthesize faster.",
      "My horoscope said to avoid responsibilities today.",
    ]
  }
};

let currentCat = 'workLate';

function renderCats() {
  $('#cats').innerHTML = Object.entries(excuses).map(([id, c]) =>
    `<button class="cat-btn ${id===currentCat?'active':''}" onclick="currentCat='${id}';renderCats();generate()">
      <span class="emoji">${c.emoji}</span>
      <span>${c.en}</span>
    </button>`
  ).join('');
}

function generate() {
  const cat = excuses[currentCat];
  const excuse = cat.items[Math.floor(Math.random() * cat.items.length)];
  $('#card').innerHTML = `
    <div>
      <div class="text">"${excuse}"</div>
      <div class="cat-tag">${cat.emoji} ${cat.en}</div>
    </div>`;
}

$('#actions').innerHTML = `
  <button class="gz-btn" onclick="generate()">🔄 ${t('generate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="copyText($('#card').querySelector('.text').textContent)">${t('copy')}</button>`;

renderCats();
generate();
