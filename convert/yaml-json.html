let mode = 'yaml2json';
const { $, copyText, t } = GZ;

function jsonHighlight(json) {
  return json.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/("(\\u[\da-fA-F]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(\.\d+)?([eE][+-]?\d+)?)/g, m => {
      let c = 'json-number';
      if (/^"/.test(m)) c = /:$/.test(m) ? 'json-key' : 'json-string';
      else if (/true|false/.test(m)) c = 'json-bool';
      else if (/null/.test(m)) c = 'json-null';
      return `<span class="${c}">${m}</span>`;
    });
}

// Simple YAML parser (handles common cases)
function parseYAML(text) {
  const lines = text.split('\n');
  let i = 0;
  function getIndent(line) { const m = line.match(/^(\s*)/); return m ? m[1].length : 0; }
  function stripComment(s) { return s.replace(/#.*$/, ''); }
  function parseValue(val) {
    val = val.trim();
    if (val === 'null' || val === '~') return null;
    if (val === 'true') return true;
    if (val === 'false') return false;
    if (val === '') return '';
    if (/^-?\d+(\.\d+)?$/.test(val)) return parseFloat(val);
    if (/^["']/.test(val) && /["']$/.test(val)) return val.slice(1, -1);
    if (val.startsWith('|') || val.startsWith('>')) return val; // simplified
    if (val.startsWith('[')) {
      try { return JSON.parse(val.replace(/'/g, '"')); } catch(e) { return val; }
    }
    if (val.startsWith('{')) {
      try { return JSON.parse(val.replace(/'/g, '"')); } catch(e) { return val; }
    }
    return val;
  }
  function parseBlock(currentIndent) {
    let result = null;
    let isArr = false;
    let isObj = false;
    while (i < lines.length) {
      let line = lines[i];
      let trimmed = line.trim();
      if (!trimmed || trimmed.startsWith('#')) { i++; continue; }
      let ind = getIndent(line);
      if (ind < currentIndent) break;
      if (ind > currentIndent) {
        // nested block, parse recursively
        const nested = parseBlock(ind);
        if (result !== null && Array.isArray(result)) {
          result[result.length - 1] = (Array.isArray(result[result.length-1]) && result[result.length-1].length===0) ? nested : result[result.length-1];
        }
        continue;
      }
      trimmed = stripComment(trimmed);
      // array item
      if (trimmed.startsWith('- ')) {
        if (!isArr) { result = []; isArr = true; }
        const itemVal = trimmed.substring(2).trim();
        if (itemVal.includes(':')) {
          i++;
          const obj = parseBlock(ind + 2);
          result.push(obj);
        } else {
          result.push(parseValue(itemVal));
          i++;
        }
        continue;
      }
      if (trimmed === '-') {
        if (!isArr) { result = []; isArr = true; }
        i++;
        const nested = parseBlock(ind + 2);
        result.push(nested);
        continue;
      }
      // key: value
      const colonIdx = trimmed.indexOf(':');
      if (colonIdx > 0) {
        if (!isObj) { result = isArr ? {} : {}; isObj = true; }
        const key = trimmed.substring(0, colonIdx).trim();
        const val = trimmed.substring(colonIdx + 1).trim();
        if (val === '' || val === '|' || val === '>') {
          i++;
          const nested = parseBlock(ind + 2);
          result[key] = nested || '';
        } else {
          result[key] = parseValue(val);
          i++;
        }
        continue;
      }
      i++;
    }
    return result;
  }
  const result = parseBlock(0);
  return result;
}

function toJSON(yamlText) {
  const obj = parseYAML(yamlText);
  return JSON.stringify(obj, null, 2);
}

function toYAML(obj, indent = 0) {
  const pad = '  '.repeat(indent);
  if (obj === null) return 'null';
  if (obj === undefined) return '';
  if (typeof obj === 'string') {
    if (/[:#\[\]{}|>]/.test(obj) || obj === '' || obj === 'true' || obj === 'false' || obj === 'null' || /^-?\d+(\.\d+)?$/.test(obj))
      return `"${obj.replace(/"/g, '\\"')}"`;
    return obj;
  }
  if (typeof obj === 'number' || typeof obj === 'boolean') return String(obj);
  if (Array.isArray(obj)) {
    if (obj.length === 0) return '[]';
    return obj.map(item => {
      const val = toYAML(item, indent + 1);
      if (typeof item === 'object' && item !== null) {
        const inner = toYAML(item, indent + 1);
        const innerLines = inner.split('\n');
        return pad + '- ' + innerLines[0] + (innerLines.length > 1 ? '\n' + innerLines.slice(1).join('\n') : '');
      }
      return pad + '- ' + val;
    }).join('\n');
  }
  if (typeof obj === 'object') {
    const keys = Object.keys(obj);
    if (keys.length === 0) return '{}';
    return keys.map(key => {
      const val = obj[key];
      const keyStr = /^[a-zA-Z0-9_-]+$/.test(key) ? key : `"${key}"`;
      if (typeof val === 'object' && val !== null) {
        const inner = toYAML(val, indent + 1);
        if (Array.isArray(val) && val.length === 0) return pad + keyStr + ': []';
        if (!Array.isArray(val) && Object.keys(val).length === 0) return pad + keyStr + ': {}';
        return pad + keyStr + ':\n' + inner;
      }
      return pad + keyStr + ': ' + toYAML(val, indent + 1);
    }).join('\n');
  }
  return String(obj);
}

function renderDirBtns() {
  $('#dir-btns').innerHTML = `
    <button class="${mode==='yaml2json'?'active':''}" onclick="setMode('yaml2json')">${t('dirYaml2Json')}</button>
    <button class="${mode==='json2yaml'?'active':''}" onclick="setMode('json2yaml')">${t('dirJson2Yaml')}</button>`;
  $('#lbl-in').textContent = mode==='yaml2json' ? t('lblYaml') : t('lblJson');
}

function setMode(m) {
  mode = m;
  renderDirBtns();
  doConvert();
}

function doConvert() {
  const inp = $('#input').value.trim();
  if (!inp) { $('#output').textContent = ''; $('#status').innerHTML = ''; return; }
  try {
    if (mode === 'yaml2json') {
      const obj = parseYAML(inp);
      const json = JSON.stringify(obj, null, 2);
      $('#output').innerHTML = jsonHighlight(json);
    } else {
      const obj = JSON.parse(inp);
      const yaml = toYAML(obj);
      const escaped = yaml.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      $('#output').innerHTML = escaped
        .replace(/^(\s*)([\w"'][\w "-]*):/gm, '$1<span class="yaml-key">$2</span>:')
        .replace(/: (true|false)/g, ': <span class="yaml-bool">$1</span>')
                        .replace(/: (null)/g, ': <span class="yaml-null">$1</span>')
                        .replace(/: (-?\d+\.?\d*)/g, ': <span class="yaml-number">$1</span>');
    }
    $('#status').innerHTML = `<span style="color:var(--gz-success)">${t('valid')}</span>`;
  } catch(e) {
    $('#status').innerHTML = `<span style="color:var(--gz-accent)">${t('invalid')}: ${e.message}</span>`;
    $('#output').innerHTML = `<span style="color:var(--gz-accent)">${e.message}</span>`;
  }
}

      "database": {"host": "localhost", "port": 5432, "name": "tools_db", "ssl": true},
      "debug": false,
      "max_upload_size": 10485760
    }, null, 2);
  }
  doConvert();
}

function doClear() { $('#input').value=''; $('#output').textContent=''; $('#status').innerHTML=''; }

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="doConvert()">${t('format')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

$('#input').addEventListener('input', doConvert);
renderDirBtns();
