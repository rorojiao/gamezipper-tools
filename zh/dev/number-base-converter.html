  },
  zh: {

    toolDesc: '在十进制、二进制、八进制、十六进制及任意进制（2-36）之间即时转换，附位数信息。',
    inputNum: '数值',
    fromBase: '源进制',
    bitInfo: '位数信息',
    step1: '在输入框中输入或粘贴数字',
    step2: '选择源进制（二进制、八进制、十进制、十六进制或自定义）',
    step3: '即时查看所有常见进制的转换结果',
    step4: '点击任意结果即可复制到剪贴板',
    invalidInput: '数字与所选进制不匹配',
  }
});

const { $, copyText, t } = GZ;

const DIGITS = '0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ';

function parseAnyBase(str, base) {
  str = str.trim().toUpperCase();
  if (!str) return null;
  const neg = str[0] === '-';
  if (neg) str = str.slice(1);
  const parts = str.split('.');
  const intPart = parts[0] || '0';
  const fracPart = parts[1] || '';

  // Validate
  for (const c of intPart + fracPart) {
    if (c !== '.') {
      const idx = DIGITS.indexOf(c);
      if (idx < 0 || idx >= base) return null;
    }
  }

  let result = 0;
  for (const c of intPart) {
    result = result * base + DIGITS.indexOf(c);
  }
  let frac = 0;
  let mult = 1;
  for (const c of fracPart) {
    mult /= base;
    frac += DIGITS.indexOf(c) * mult;
  }
  result += frac;
  return neg ? -result : result;
}

function toBase(num, base) {
  if (num === 0) return '0';
  const neg = num < 0;
  num = Math.abs(num);
  const intPart = Math.floor(num);
  const fracPart = num - intPart;

  let intStr = '';
  let n = intPart;
  if (n === 0) intStr = '0';
  while (n > 0) {
    intStr = DIGITS[n % base] + intStr;
    n = Math.floor(n / base);
  }

  let fracStr = '';
  let f = fracPart;
  let count = 0;
  while (f > 0 && count < 12) {
    f *= base;
    const digit = Math.floor(f);
    fracStr += DIGITS[digit];
    f -= digit;
    count++;
  }

  let result = intStr + (fracStr ? '.' + fracStr : '');
  return neg ? '-' + result : result;
}

function getFromBase() {
  const sel = $('#fromBase').value;
  if (sel === 'custom') return Math.max(2, Math.min(36, parseInt($('#customBase').value) || 10));
  return parseInt(sel);
}

function convert() {
  const input = $('#inputValue').value.trim();
  const base = getFromBase();
  $('#error').textContent = '';

  if (!input) { $('#results').innerHTML = ''; $('#bitInfo').textContent = ''; return; }

  const decimal = parseAnyBase(input, base);
  if (decimal === null || isNaN(decimal)) {
    $('#error').textContent = t('invalidInput');
    $('#results').innerHTML = '';
    $('#bitInfo').textContent = '';
    return;
  }

  const bases = [
    {base: 2, label: 'Binary'},
    {base: 8, label: 'Octal'},
    {base: 10, label: 'Decimal'},
    {base: 16, label: 'Hexadecimal'},
  ];

  const customBase = $('#customBase').value;
  if (customBase && getFromBase() !== parseInt(customBase)) {
    // don't duplicate
  }

  $('#results').innerHTML = bases.map(b => {
    const val = toBase(decimal, b.base);
    return `<div class="base-result">
      <span class="b-label">${b.label} (${b.base})</span>
      <span class="b-val">${val}</span>
      <button class="gz-btn gz-btn-secondary" onclick="copyText('${val}')">${t('copy')}</button>
    </div>`;
  }).join('');

  // Bit info
  const absDec = Math.abs(Math.floor(decimal));
  const bitCount = absDec === 0 ? 1 : Math.floor(Math.log2(absDec)) + 1;
  const byteCount = Math.ceil(bitCount / 8);
  $('#bitInfo').textContent = `${bitCount} bits, ${byteCount} byte${byteCount > 1 ? 's' : ''}`;
}

function loadExample() {
  $('#inputValue').value = 'FF';
  $('#fromBase').value = '16';
  $('#customBaseWrap').style.display = 'none';
  convert();
}

function doClear() {
  $('#inputValue').value = '';
  $('#error').textContent = '';
  $('#results').innerHTML = '';
  $('#bitInfo').textContent = '';
}

$('#fromBase').addEventListener('change', () => {
  $('#customBaseWrap').style.display = $('#fromBase').value === 'custom' ? 'block' : 'none';
  convert();
});
$('#customBase').addEventListener('input', convert);
$('#inputValue').addEventListener('input', convert);

$('#lbl-input').textContent = t('inputNum');
$('#lbl-frombase').textContent = t('fromBase');
$('#lbl-bitcount').textContent = t('bitInfo') + ':';

$('#toolbar').innerHTML = `
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

convert();
