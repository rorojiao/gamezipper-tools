<script>

const { $, t } = GZ;
const CANVAS_SIZE = 400;
const GRID = 16; // 16x16 pixel grid
const PX = CANVAS_SIZE / GRID;
// Trait pools
const BGS = ['#FF6B6B','#4ECDC4','#FFE66D','#A8E6CF','#FF8B94','#C7CEEA','#FFAAA5','#B5EAD7','#F38181','#AA96DA','#FCBAD3','#FFFFD2'];
const SKINS = ['#FADCBC','#E0AC69','#C68642','#8D5524','#FFDBAC','#D08B5B','#A0724B','#705030'];
const EYES = ['normal','happy','angry','cool','wink','stars','hearts','cyborg'];
const MOUTHS = ['smile','frown','neutral','open','tongue','fangs','pipe'];
const HATS = ['none','cap','crown','beanie','halo','horns','headphones','mohawk'];
const ACCESSORIES = ['none','earring','shades','monocle','mustache','mask'];
const RARITY_TIERS = [
  {name:'Common',color:'#999',threshold:0,weight:50},
  {name:'Uncommon',color:'#4CAF50',threshold:30,weight:25},
  {name:'Rare',color:'#2196F3',threshold:55,weight:15},
  {name:'Epic',color:'#9C27B0',threshold:75,weight:7},
  {name:'Legendary',color:'#FF9800',threshold:90,weight:3},
];
let state = { bgStyle:'gradient', current:null, collection:[] };
function pick(arr){return arr[Math.floor(Math.random()*arr.length)];}
function weightedRarity(){
  const roll = Math.random()*100;
  let cumulative = 0;
  for(const tier of RARITY_TIERS){cumulative += tier.weight; if(roll < cumulative)return tier;}
  return RARITY_TIERS[0];
}
function generateTraits(){
  const rarity = weightedRarity();
  // Higher rarity = more unique traits
  const useHat = rarity.threshold >= 0;
  const useAccessory = rarity.threshold >= 30;
  return {
    bg: pick(BGS),
    bg2: pick(BGS),
    skin: pick(SKINS),
    eyes: pick(EYES),
    mouth: pick(MOUTHS),
    hat: useHat ? pick(HATS) : 'none',
    accessory: useAccessory ? pick(ACCESSORIES) : 'none',
    rarity,
    id: 'NFT #'+Math.floor(Math.random()*9999).toString().padStart(4,'0'),
  };
}
function drawAvatar(ctx, traits){
  const S = CANVAS_SIZE, G = GRID, P = PX;
  // Background
  if(state.bgStyle==='solid'){
    ctx.fillStyle = traits.bg;
    ctx.fillRect(0,0,S,S);
  } else if(state.bgStyle==='gradient'){
    const grad = ctx.createLinearGradient(0,0,S,S);
    grad.addColorStop(0, traits.bg);
    grad.addColorStop(1, traits.bg2);
    ctx.fillStyle = grad;
    ctx.fillRect(0,0,S,S);
  } else if(state.bgStyle==='pattern'){
    ctx.fillStyle = traits.bg;
    ctx.fillRect(0,0,S,S);
    ctx.fillStyle = traits.bg2;
    for(let y=0;y<G;y+=2)for(let x=(y%4===0?0:2);x<G;x+=4){
      ctx.fillRect(x*P,y*P,P*2,P*2);
    }
  } else { // space
    ctx.fillStyle = '#0a0a2e';
    ctx.fillRect(0,0,S,S);
    ctx.fillStyle = '#fff';
    for(let i=0;i<40;i++){
      const sx = Math.random()*S, sy = Math.random()*S, sr = Math.random()*3+1;
      ctx.globalAlpha = Math.random()*0.8+0.2;
      ctx.fillRect(sx,sy,sr,sr);
    }
    ctx.globalAlpha = 1;
  }
  // Body/Head (circle)
  const cx = S/2, cy = S/2, r = S*0.3;
  ctx.fillStyle = traits.skin;
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI*2);
  ctx.fill();
  // Eyes
  const eyeY = cy - r*0.15;
  const eyeOffset = r*0.35;
  drawEyes(ctx, cx-eyeOffset, eyeY, cx+eyeOffset, eyeY, traits.eyes, r);
  // Mouth
  drawMouth(ctx, cx, cy + r*0.35, traits.mouth, r);
  // Accessory
  if(traits.accessory !== 'none'){
    drawAccessory(ctx, cx, cy, r, traits.accessory);
  }
  // Hat
  if(traits.hat !== 'none'){
    drawHat(ctx, cx, cy - r, r, traits.hat);
  }
}
function drawEyes(ctx, lx, ly, rx, ry, style, r){
  const eyeS = r * 0.18;
  ctx.fillStyle = '#fff';
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 3;
  switch(style){
    case 'normal':
      ctx.fillStyle = '#333';
      ctx.fillRect(lx-eyeS/2, ly-eyeS/2, eyeS, eyeS);
      ctx.fillRect(rx-eyeS/2, ry-eyeS/2, eyeS, eyeS);
      break;
    case 'happy':
      ctx.beginPath();ctx.arc(lx,ly+eyeS/2,eyeS/2,Math.PI,0);ctx.stroke();
      ctx.beginPath();ctx.arc(rx,ry+eyeS/2,eyeS/2,Math.PI,0);ctx.stroke();
      break;
    case 'angry':
      ctx.fillStyle='#333';
      ctx.beginPath();ctx.moveTo(lx-eyeS,ly-eyeS/2);ctx.lineTo(lx+eyeS,ly);ctx.lineTo(lx+eyeS,ly+eyeS/2);ctx.closePath();ctx.fill();
      ctx.beginPath();ctx.moveTo(rx+eyeS,ry-eyeS/2);ctx.lineTo(rx-eyeS,ry);ctx.lineTo(rx-eyeS,ry+eyeS/2);ctx.closePath();ctx.fill();
      break;
    case 'cool':
      ctx.fillStyle='#222';
      ctx.fillRect(lx-eyeS*1.2, ly-eyeS/3, eyeS*2.4, eyeS);
      ctx.fillRect(rx-eyeS*1.2, ry-eyeS/3, eyeS*2.4, eyeS);
      ctx.fillRect(lx+eyeS*0.5, ly, eyeS*1.5, eyeS/3);
      break;
    case 'wink':
      ctx.fillStyle='#333';ctx.fillRect(lx-eyeS/2,ly-eyeS/2,eyeS,eyeS);
      ctx.beginPath();ctx.arc(rx,ry+eyeS/2,eyeS/2,Math.PI,0);ctx.stroke();
      break;
    case 'stars':
      drawStar(ctx,lx,ly,eyeS,'#FFD700');
      drawStar(ctx,rx,ry,eyeS,'#FFD700');
      break;
    case 'hearts':
      drawHeart(ctx,lx,ly,eyeS,'#FF1493');
      drawHeart(ctx,rx,ry,eyeS,'#FF1493');
      break;
    case 'cyborg':
      ctx.fillStyle='#00CED1';
      ctx.fillRect(lx-eyeS,ly-eyeS/2,eyeS*2,eyeS);
      ctx.fillRect(rx-eyeS,ry-eyeS/2,eyeS*2,eyeS);
      ctx.fillStyle='#FF0';
      ctx.fillRect(lx-eyeS/3,ly-eyeS/4,eyeS/2,eyeS/2);
      ctx.fillRect(rx-eyeS/3,ry-eyeS/4,eyeS/2,eyeS/2);
      break;
  }
}
function drawStar(ctx,x,y,size,color){
  ctx.fillStyle=color;
  ctx.beginPath();
  for(let i=0;i<5;i++){
    const angle = (i*2*Math.PI/5)-Math.PI/2;
    const px = x+Math.cos(angle)*size;
    const py = y+Math.sin(angle)*size;
    const angle2 = angle+Math.PI/5;
    const px2 = x+Math.cos(angle2)*size*0.4;
    const py2 = y+Math.sin(angle2)*size*0.4;
    if(i===0)ctx.moveTo(px,py);else ctx.lineTo(px,py);
    ctx.lineTo(px2,py2);
  }
  ctx.closePath();ctx.fill();
}
function drawHeart(ctx,x,y,size,color){
  ctx.fillStyle=color;
  ctx.beginPath();
  ctx.arc(x-size/3,y-size/4,size/3,0,Math.PI*2);
  ctx.arc(x+size/3,y-size/4,size/3,0,Math.PI*2);
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(x-size*0.6,y);
  ctx.lineTo(x+size*0.6,y);
  ctx.lineTo(x,y+size*0.7);
  ctx.closePath();
  ctx.fill();
}
function drawMouth(ctx, x, y, style, r){
  const mw = r*0.5;
  ctx.strokeStyle='#333';ctx.lineWidth=4;ctx.lineCap='round';
  switch(style){
    case 'smile':ctx.beginPath();ctx.arc(x,y,mw/2,0.2,Math.PI-0.2);ctx.stroke();break;
    case 'frown':ctx.beginPath();ctx.arc(x,y+mw*0.7,mw/2,Math.PI+0.2,-0.2);ctx.stroke();break;
    case 'neutral':ctx.beginPath();ctx.moveTo(x-mw/2,y);ctx.lineTo(x+mw/2,y);ctx.stroke();break;
    case 'open':ctx.fillStyle='#333';ctx.beginPath();ctx.ellipse(x,y,mw/2,mw/3,0,0,Math.PI*2);ctx.fill();break;
    case 'tongue':ctx.beginPath();ctx.arc(x,y,mw/2,0.2,Math.PI-0.2);ctx.stroke();ctx.fillStyle='#FF69B4';ctx.fillRect(x-6,y,12,14);break;
    case 'fangs':ctx.beginPath();ctx.arc(x,y,mw/2,0.2,Math.PI-0.2);ctx.stroke();ctx.fillStyle='#fff';ctx.fillRect(x-8,y-2,5,10);ctx.fillRect(x+3,y-2,5,10);break;
    case 'pipe':ctx.beginPath();ctx.arc(x,y,mw/2,0.2,Math.PI-0.2);ctx.stroke();ctx.strokeStyle='#8B4513';ctx.lineWidth=6;ctx.beginPath();ctx.moveTo(x+mw/2,y);ctx.lineTo(x+mw,y+mw*0.3);ctx.stroke();ctx.fillStyle='#333';ctx.beginPath();ctx.arc(x+mw,y+mw*0.3,8,0,Math.PI*2);ctx.fill();break;
  }
}
function drawAccessory(ctx, cx, cy, r, type){
  switch(type){
    case 'earring':ctx.fillStyle='#FFD700';ctx.beginPath();ctx.arc(cx+r*0.8,cy+r*0.3,6,0,Math.PI*2);ctx.fill();break;
    case 'shades':ctx.fillStyle='#222';ctx.fillRect(cx-r*0.7,cy-r*0.1,r*0.5,r*0.25);ctx.fillRect(cx+r*0.2,cy-r*0.1,r*0.5,r*0.25);ctx.fillRect(cx-r*0.2,cy,r*0.4,4);break;
    case 'monocle':ctx.strokeStyle='#FFD700';ctx.lineWidth=3;ctx.beginPath();ctx.arc(cx+r*0.35,cy-r*0.15,r*0.22,0,Math.PI*2);ctx.stroke();ctx.beginPath();ctx.moveTo(cx+r*0.35,cy+r*0.07);ctx.lineTo(cx+r*0.6,cy+r*0.4);ctx.stroke();break;
    case 'mustache':ctx.fillStyle='#333';ctx.beginPath();ctx.ellipse(cx-r*0.2,cy+r*0.15,r*0.15,r*0.08,0,0,Math.PI*2);ctx.ellipse(cx+r*0.2,cy+r*0.15,r*0.15,r*0.08,0,0,Math.PI*2);ctx.fill();break;
    case 'mask':ctx.fillStyle='#2196F3';ctx.globalAlpha=0.7;ctx.fillRect(cx-r*0.6,cy+r*0.2,r*1.2,r*0.4);ctx.globalAlpha=1;break;
  }
}
function drawHat(ctx, cx, topY, r, type){
  switch(type){
    case 'cap':ctx.fillStyle='#FF4444';ctx.beginPath();ctx.ellipse(cx,topY,r*0.9,r*0.3,0,Math.PI,0);ctx.fill();ctx.fillRect(cx-r*0.9,topY-2,r*1.8,4);ctx.fillRect(cx,topY,r*0.9,4);break;
    case 'crown':ctx.fillStyle='#FFD700';ctx.beginPath();ctx.moveTo(cx-r*0.6,topY);ctx.lineTo(cx-r*0.4,topY-r*0.5);ctx.lineTo(cx-r*0.2,topY-r*0.2);ctx.lineTo(cx,topY-r*0.6);ctx.lineTo(cx+r*0.2,topY-r*0.2);ctx.lineTo(cx+r*0.4,topY-r*0.5);ctx.lineTo(cx+r*0.6,topY);ctx.closePath();ctx.fill();break;
    case 'beanie':ctx.fillStyle='#9370DB';ctx.beginPath();ctx.ellipse(cx,topY+r*0.1,r*0.85,r*0.4,0,Math.PI,0);ctx.fill();ctx.fillRect(cx-r*0.85,topY+r*0.05,r*1.7,8);ctx.fillStyle='#FF69B4';ctx.beginPath();ctx.arc(cx,topY-r*0.3,r*0.15,0,Math.PI*2);ctx.fill();break;
    case 'halo':ctx.strokeStyle='#FFD700';ctx.lineWidth=5;ctx.beginPath();ctx.ellipse(cx,topY-r*0.2,r*0.6,r*0.15,0,0,Math.PI*2);ctx.stroke();break;
    case 'horns':ctx.fillStyle='#8B0000';ctx.beginPath();ctx.moveTo(cx-r*0.5,topY);ctx.lineTo(cx-r*0.7,topY-r*0.5);ctx.lineTo(cx-r*0.3,topY);ctx.closePath();ctx.fill();ctx.beginPath();ctx.moveTo(cx+r*0.5,topY);ctx.lineTo(cx+r*0.7,topY-r*0.5);ctx.lineTo(cx+r*0.3,topY);ctx.closePath();ctx.fill();break;
    case 'headphones':ctx.strokeStyle='#333';ctx.lineWidth=6;ctx.beginPath();ctx.arc(cx,topY+r*0.3,r*0.85,Math.PI*1.1,Math.PI*1.9);ctx.stroke();ctx.fillStyle='#333';ctx.fillRect(cx-r*0.9,topY+r*0.1,12,r*0.35);ctx.fillRect(cx+r*0.8,topY+r*0.1,12,r*0.35);break;
    case 'mohawk':ctx.fillStyle='#FF1493';ctx.beginPath();ctx.moveTo(cx-r*0.15,topY);ctx.lineTo(cx,topY-r*0.7);ctx.lineTo(cx+r*0.15,topY);ctx.closePath();ctx.fill();ctx.beginPath();ctx.moveTo(cx-r*0.35,topY);ctx.lineTo(cx-r*0.2,topY-r*0.5);ctx.lineTo(cx-0.05,topY);ctx.closePath();ctx.fill();ctx.beginPath();ctx.moveTo(cx+0.05*r,topY);ctx.lineTo(cx+r*0.2,topY-r*0.5);ctx.lineTo(cx+r*0.35,topY);ctx.closePath();ctx.fill();break;
  }
}
function createNFT(){
  const traits = generateTraits();
  const canvas = document.createElement('canvas');
  canvas.width = CANVAS_SIZE;
  canvas.height = CANVAS_SIZE;
  const ctx = canvas.getContext('2d');
  drawAvatar(ctx, traits);
  return { canvas, traits };
}
function renderSingle(){
  state.current = createNFT();
  state.collection = [state.current];
  renderCollection();
}
function renderCollection(){
  if(state.collection.length===0){renderSingle();return;}
  let html = '<div class="nft-collection">';
  state.collection.forEach((nft, i)=>{
    const dataUrl = nft.canvas.toDataURL('image/png');
    const tr = nft.traits;
    html += '<div class="nft-card">';
    html += `<img src="${dataUrl}" alt="${tr.id}">`;
    html += `<div style="font-weight:700;font-size:.8em;margin-top:4px">${tr.id}</div>`;
    html += `<div class="rarity" style="background:${tr.rarity.color};color:#fff">${tr.rarity.name}</div>`;
    html += '<div class="nft-traits">';
    if(tr.hat!=='none')html+=`<span class="nft-trait">🎩${tr.hat}</span>`;
    if(tr.accessory!=='none')html+=`<span class="nft-trait">👓${tr.accessory}</span>`;
    html+=`<span class="nft-trait">👁️${tr.eyes}</span>`;
    html+=`<span class="nft-trait">👄${tr.mouth}</span>`;
    html += '</div>';
    html += `<button class="gz-btn gz-btn-secondary" style="font-size:.7em;padding:4px 10px;margin-top:6px" onclick="downloadOne(${i})">📥 PNG</button>`;
    html += '</div>';
  });
  html += '</div>';
  $('#preview').innerHTML = html;
  $('#status').innerHTML = `<span style="color:var(--gz-success)">✓ Generated ${state.collection.length} NFT${state.collection.length>1?'s':''}</span>`;
}
function downloadOne(i){
  const nft = state.collection[i];
  const link = document.createElement('a');
  link.download = nft.traits.id.replace(/[#\s]/g,'_')+'.png';
  link.href = nft.canvas.toDataURL('image/png');
  link.click();
}
function downloadAll(){
  state.collection.forEach((nft, i)=>{
    setTimeout(()=>{
      const link = document.createElement('a');
      link.download = nft.traits.id.replace(/[#\s]/g,'_')+'.png';
      link.href = nft.canvas.toDataURL('image/png');
      link.click();
    }, i*300);
  });
}
function generateCollection(){
  state.collection = [];
  for(let i=0;i<8;i++)state.collection.push(createNFT());
  renderCollection();
}
$('#controls').innerHTML = `
  <label>${t('bgStyle')}: <select onchange="state.bgStyle=this.value;renderCollection()">
    <option value="gradient">${t('gradient')}</option>
    <option value="solid">${t('solid')}</option>
    <option value="pattern">${t('pattern')}</option>
    <option value="space">${t('space')}</option>
  </select></label>
  <button class="gz-btn" onclick="renderSingle()">${t('generate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="generateCollection()">${t('generateCollection')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="downloadAll()">${t('downloadAll')}</button>
`;
