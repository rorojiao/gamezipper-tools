<script>
GZI18n.register({
  en: {
    toolTitle: 'Notion to Markdown Converter',
    toolDesc: 'Clean up Notion exports and pasted pages into tidy GitHub-flavored Markdown — callouts, toggles, mentions, equations and tables all normalized.',
    collapseToggles: 'collapsible toggles',
    flattenHeadings: 'flatten nested page headings',

    done: n => `✓ Converted ${n} characters`,
    step1: 'Select all in your Notion page and copy, or export as Markdown & CSV',
    step2: 'Paste the content into the left input area',
    step3: 'Toggle the cleanup options for toggles, headings and mentions',
    step4: 'Copy the clean Markdown into GitHub, a blog, Obsidian or any docs tool',
  },
  zh: {
    toolTitle: 'Notion 转 Markdown 转换器',
    toolDesc: '将 Notion 导出和复制的页面整理为整洁的 GitHub 风格 Markdown — callout、折叠块、提及、公式和表格全部规范化。',
    collapseToggles: '折叠块可折叠',
    flattenHeadings: '展平嵌套页面标题',
    stripMentionUrls: '去除 Notion 提及链接',
    done: n => `✓ 转换 ${n} 个字符`,
    step1: '在 Notion 页面全选并复制，或导出为 Markdown & CSV',
    step2: '将内容粘贴到左侧输入区',
    step3: '切换折叠块、标题和提及的清理选项',
    step4: '将整理后的 Markdown 复制到 GitHub、博客、Obsidian 或任意文档工具',
  }
});

const { $, copyText, t } = GZ;

// Notion mention URLs we should strip to keep just the readable label.
const NOTION_URL = /(?<![\!\[])\[([^\]]+)\]\((?:https?:\/\/)?(?:www\.)?notion\.so\/[^)\s]+\)/g;
const NOTION_PERSON = /\[(@[^\]]+)\]\((?:https?:\/\/)?(?:www\.)?notion\.so\/[^)\s]+\)/g;

function stripColorMarkers(md){
  // Notion sometimes injects HTML color/background spans; strip them.
  return md.replace(/<span[^>]*style=["'][^"']*["'][^>]*>([\s\S]*?)<\/span>/gi, '$1');
}

function fixMentions(md){
  if (!$('#optStrip').checked) return md;
  md = md.replace(NOTION_PERSON, '$1');
  md = md.replace(NOTION_URL, '$1');
  // bare Notion mention like [@User] → @User
  md = md.replace(/\[(@[^\]]+)\]/g, '$1');
  return md;
}

function fixCallouts(lines){
  // Notion callout blocks in copy often start with an emoji followed by text.
  // Heuristic: a line that is just emoji + short note, turn into blockquote.
  return lines.map(line => {
    const cm = line.match(/^>\s*(\p{Extended_Pictographic}|\u2192|[-*])\s+(.*)$/u);
    if (cm) return '> ' + cm[2];
    return line;
  });
}

function fixToggles(lines){
  const collapse = $('#optCollapse').checked;
  const out = [];
  let inToggle = false, summary = '';
  for (let i = 0; i < lines.length; i++){
    const line = lines[i];
    // Notion toggle headings often look like  "▸ Summary" or "Summary ▾" or "▼ Summary"
    const tm = line.match(/^\s*[▸▼▷▶►]\s*(.*)$/);
    if (tm){
      if (inToggle && collapse) out.push('</details>');
      summary = tm[1].replace(/[▾▽]\s*$/,'').trim();
      if (collapse){
        out.push(`<details>`);
        out.push(`<summary>${summary}</summary>`);
        out.push('');
        inToggle = true;
      } else {
        out.push(`### ${summary}`);
      }
      continue;
    }
    out.push(line);
  }
  if (inToggle && collapse) out.push('</details>');
  return out;
}

function flattenHeadings(md){
  if (!$('#optFlatten').checked) return md;
  // Notion nested page exports produce paths like "# Root / Child / Grandchild Title"
  // and very deep "#" chains. Normalize to a sensible 1-3 heading depth.
  return md.replace(/^#{6,}\s+/gm, '###### ')
           .replace(/^#\s+([^#\n]+?)\s*\/\s*([^#\n]+?)\s*\/\s*([^#\n]+)\s*$/gm, '### $3');
}

function fixTable(md){
  // Notion copy-paste of a table comes as tab-separated rows. Convert a run of
  // tab-separated lines into a GitHub-flavored Markdown table.
  const lines = md.split('\n');
  const out = [];
  let i = 0;
  while (i < lines.length){
    const line = lines[i];
    if (line.includes('\t') && line.trim()){
      // gather consecutive tab-rows
      const block = [];
      while (i < lines.length && lines[i].includes('\t') && lines[i].trim() !== ''){
        block.push(lines[i]);
        i++;
      }
      if (block.length >= 1){
        const rows = block.map(r => r.split('\t').map(c => c.trim()));
        const cols = Math.max(...rows.map(r => r.length));
        rows.forEach(r => { while (r.length < cols) r.push(''); });
        const header = `| ${rows[0].join(' | ')} |`;
        const sep = `| ${rows[0].map(()=>'---').join(' | ')} |`;
        out.push(header, sep);
        for (let r = 1; r < rows.length; r++) out.push(`| ${rows[r].join(' | ')} |`);
        out.push('');
        continue;
      }
    }
    out.push(line);
    i++;
  }
  return out.join('\n');
}

function fixChecklists(md){
  // Notion to-do: "☐ item" / "☑ item" → standard markdown task list
  md = md.replace(/^\s*[☐○]\s+/gm, '- [ ] ');
  md = md.replace(/^\s*[☑✓✔]\s+/gm, '- [x] ');
  return md;
}

function convert(){
  let md = $('#input').value;
  if (!md.trim()){ $('#output').textContent=''; $('#status').innerHTML=''; return; }
  md = stripColorMarkers(md);
  md = fixMentions(md);
  md = fixChecklists(md);
  md = fixToggles(md.split('\n')).join('\n');
  md = fixCallouts(md.split('\n')).join('\n');
  md = fixTable(md);
  md = flattenHeadings(md);
  // tidy excess blank lines
  md = md.replace(/\n{3,}/g, '\n\n').replace(/^\s+/, '');
  $('#output').textContent = md;
  $('#status').innerHTML = `<span style="color:var(--gz-success)">${t('done')(md.length)}</span>`;
}

function loadExample(){
  $('#input').value = `# Docs / Engineering / Release Notes

> 💡 This page tracks every release. Update it as you ship.

▸ v1.0 Launch
Details about the initial release go here.

▸ v1.1 Improvements
Patch notes and bug fixes.

- [x] Ship Notion converter
- [ ] Write blog post

[GameZipper](https://www.notion.so/GameZipper-1a2b3c4d5e6f)
[@Alice](https://www.notion.so/Alice-9z8y7x6w)

Name\tAge\tRole
Alice\t30\tEngineer
Bob\t25\tDesigner`;
  convert();
}

function doClear(){ $('#input').value=''; $('#output').textContent=''; $('#status').innerHTML=''; }

$('#input').addEventListener('input', convert);

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="convert()">${t('convert')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

</script>
