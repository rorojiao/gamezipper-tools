<style>
.pv-tabs{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.pv-tab{background:var(--glass2);border:1px solid var(--border);color:var(--text);padding:8px 14px;border-radius:18px;cursor:pointer;font-size:.85em;font-weight:600;transition:.2s}
.pv-tab.active{background:var(--accent);color:#000;border-color:var(--accent)}
.pv-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px;margin:14px 0}
.pv-field{display:flex;flex-direction:column;gap:4px}
.pv-field label{font-size:.8em;color:var(--text2)}
.pv-field input,.pv-field select{padding:10px;border:1px solid var(--border);border-radius:8px;background:var(--glass2);color:var(--text);font-size:1em;font-variant-numeric:tabular-nums}
.pv-outcome{margin:18px 0;padding:20px;background:var(--glass);border:1px solid var(--accent);border-radius:14px;text-align:center}
.pv-outcome .label{font-size:.8em;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
.pv-outcome .amount{font-size:2.4em;font-weight:800;color:var(--accent);font-variant-numeric:tabular-nums}
.pv-row{display:flex;justify-content:space-between;padding:10px 14px;background:var(--glass2);border:1px solid var(--border);border-radius:8px;margin-bottom:6px;align-items:center}
.pv-row .k{font-size:.85em;color:var(--text2);font-family:monospace}
.pv-row .v{font-weight:700;font-family:monospace;color:var(--text);text-align:right}
.pv-section h3{font-size:.9em;margin:14px 0 6px;color:var(--text2);text-transform:uppercase;letter-spacing:.05em}
.pv-steps{font-family:monospace;font-size:.88em;line-height:1.7;padding:14px;background:var(--glass);border:1px solid var(--border);border-radius:10px;white-space:pre-wrap;word-break:break-word}
</style>
<script type="application/ld+json">{"@context":"https://schema.org","@type":"WebApplication","name":"Present Value Calculator","description":"Free online Present Value (PV) calculator. Discount a future cash amount back to today using any interest rate and number of periods. Includes annuity PV and step-by-step solution.","url": "https://tools.gamezipper.com/zh/calc/present-value-calculator.html","applicationCategory":"Utility","operatingSystem":"Web Browser","offers":{"@type":"Offer","price":"0"}}</script>
<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"What is the present value (PV) formula?","acceptedAnswer":{"@type":"Answer","text":"The present value of a single future sum is PV = FV / (1 + r)^n, where FV is the future value, r is the periodic interest rate (as a decimal), and n is the number of periods. For an ordinary annuity the formula is PV = PMT × [1 − (1 + r)^−n] / r."}},{"@type":"Question","name":"How do I choose the discount rate?","acceptedAnswer":{"@type":"Answer","text":"The discount rate usually reflects your opportunity cost of capital — what you could earn on a comparable-risk investment. Common choices: the risk-free rate (Treasury yield), your weighted average cost of capital (WACC), or a required return like 8-10% for equity investments."}},{"@type":"Question","name":"What's the difference between PV of a lump sum and PV of an annuity?","acceptedAnswer":{"@type":"Answer","text":"A lump sum is a single payment received in the future; you discount it once with PV = FV/(1+r)^n. An annuity is a series of equal payments; each payment is discounted separately and summed, which simplifies to PV = PMT × [1 − (1 + r)^−n] / r."}},{"@type":"Question","name":"Does the period have to be years?","acceptedAnswer":{"@type":"Answer","text":"No. The period just has to match the rate. If you use a monthly rate, use months for n. If you use an annual rate, use years for n. Use the dropdown to convert an annual rate to monthly or daily automatically."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="pv-tabs">
      <button class="pv-tab active" data-mode="lump" id="tabLump"></button>
      <button class="pv-tab" data-mode="annuity" id="tabAnnuity"></button>
    </div>

    <div class="pv-grid">
      <div class="pv-field"><label id="lblFuture"></label><input type="number" id="fv" value="10000" step="any"></div>
      <div class="pv-field" id="pmtWrap" style="display:none"><label id="lblPmt"></label><input type="number" id="pmt" value="500" step="any"></div>
      <div class="pv-field"><label id="lblRate"></label><input type="number" id="rate" value="8" step="any"></div>
      <div class="pv-field"><label id="lblPer"></label><input type="number" id="periods" value="5" step="any"></div>
      <div class="pv-field"><label id="lblFreq"></label>
        <select id="freq">
          <option value="1">1 / year</option>
          <option value="12">12 / year (monthly)</option>
          <option value="52">52 / year (weekly)</option>
          <option value="365">365 / year (daily)</option>
        </select>
      </div>
    </div>

    <div class="pv-outcome">
      <div class="label" id="pvLabel"></div>
      <div class="amount" id="pvAmount">$0.00</div>
    </div>

    <div class="pv-section">
      <h3 id="breakdownTitle"></h3>
      <div id="breakdown"></div>
    </div>
    <div class="pv-section">
      <h3 id="stepsTitle"></h3>
      <pre class="pv-steps" id="steps"></pre>
    </div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Present Value Calculator (PV)',
    toolDesc: 'Discount a future cash amount (or annuity) back to today using any rate and number of periods. Step-by-step solution and full formula breakdown.',
    tabLump: 'Lump sum',
    tabAnnuity: 'Annuity (recurring)',
    lblFuture: 'Future value (FV)',
    lblPmt: 'Payment per period (PMT)',
    lblRate: 'Annual rate (%)',
    lblPer: 'Number of periods (n)',
    lblFreq: 'Compounding frequency',
    pvLabelLump: 'Present Value (PV)',
    pvLabelAnnuity: 'PV of the annuity',
    breakdownTitle: 'Breakdown',
    stepsTitle: 'Step-by-step solution',
    step1: 'Choose lump sum or annuity mode',
    step2: 'Enter the future value (or payment) and the annual rate',
    step3: 'Set the number of periods and the compounding frequency',
    step4: 'Read the PV and the step-by-step derivation',
    periodRate: 'Period rate (r)',
    factor: 'Discount factor (1+r)^n',
    interestForgone: 'Interest portion',
    principal: 'Principal portion',
  },
  zh: {
    toolTitle: '现值计算器 (PV)',
    toolDesc: '将未来金额（或年金）按任意利率和期数折算为今天的价值，附完整公式与详细步骤。',
    tabLump: '一次性金额',
    tabAnnuity: '年金（定期支付）',
    lblFuture: '终值 (FV)',
    lblPmt: '每期支付额 (PMT)',
    lblRate: '年利率 (%)',
    lblPer: '期数 (n)',
    lblFreq: '复利频率',
    pvLabelLump: '现值 (PV)',
    pvLabelAnnuity: '年金现值',
    breakdownTitle: '明细',
    stepsTitle: '详细步骤',
    step1: '选择一次性金额或年金模式',
    step2: '输入终值（或每期支付额）和年利率',
    step3: '设置期数和复利频率',
    step4: '查看现值和完整推导',
    periodRate: '每期利率 (r)',
    factor: '折现因子 (1+r)^n',
    interestForgone: '利息部分',
    principal: '本金部分',
  }
});

const { $, t } = GZ;
let mode='lump';

function fmtMoney(n){
  if(!isFinite(n)) return '—';
  return n.toLocaleString('en-US',{style:'currency',currency:'USD',minimumFractionDigits:2,maximumFractionDigits:2});
}
function fmtNum(n){ if(!isFinite(n)) return '—'; if(Math.abs(n-Math.round(n))<1e-9) return Math.round(n).toString(); return (+n.toFixed(6)).toString(); }

function compute(){
  const fv=parseFloat($('#fv').value)||0;
  const pmt=parseFloat($('#pmt').value)||0;
  const annualRate=(parseFloat($('#rate').value)||0)/100;
  const n=parseFloat($('#periods').value)||0;
  const freq=parseInt($('#freq').value)||1;
  const r=annualRate/freq;
  const totalN=n*freq; // total compounding periods
  let pv, steps, breakdown, label;
  if(mode==='lump'){
    pv = fv/Math.pow(1+r, totalN);
    label = t('pvLabelLump');
    const factor=Math.pow(1+r, totalN);
    breakdown = `
      <div class="pv-row"><span class="k">${t('periodRate')} = ${fmtNum(annualRate)} / ${freq}</span><span class="v">${fmtNum(r*100)}% = ${fmtNum(r)}</span></div>
      <div class="pv-row"><span class="k">n = ${fmtNum(n)} × ${freq}</span><span class="v">${fmtNum(totalN)} periods</span></div>
      <div class="pv-row"><span class="k">${t('factor')}</span><span class="v">${fmtNum(factor)}</span></div>
      <div class="pv-row"><span class="k">${t('interestForgone')} (FV − PV)</span><span class="v">${fmtMoney(fv-pv)}</span></div>`;
    steps =
`Formula:  PV = FV / (1 + r)^n

Where:
  FV = ${fmtMoney(fv)}
  annual rate = ${fmtNum(annualRate*100)}%  →  period rate r = ${fmtNum(annualRate)} / ${freq} = ${fmtNum(r)}
  n = ${fmtNum(n)} × ${freq} = ${fmtNum(totalN)} periods

Compute:
  (1 + r)^n = (1 + ${fmtNum(r)})^${fmtNum(totalN)} = ${fmtNum(factor)}
  PV = ${fmtMoney(fv)} / ${fmtNum(factor)} = ${fmtMoney(pv)}

So ${fmtMoney(fv)} in ${fmtNum(totalN)} periods at ${fmtNum(annualRate*100)}% is worth ${fmtMoney(pv)} today.`;
  } else {
    // PV of ordinary annuity
    if(Math.abs(r)<1e-12){
      pv = pmt*totalN;
    } else {
      pv = pmt*(1 - Math.pow(1+r, -totalN))/r;
    }
    label = t('pvLabelAnnuity');
    const factor = Math.abs(r)<1e-12 ? totalN : (1 - Math.pow(1+r, -totalN))/r;
    breakdown = `
      <div class="pv-row"><span class="k">${t('periodRate')} = ${fmtNum(annualRate)} / ${freq}</span><span class="v">${fmtNum(r*100)}% = ${fmtNum(r)}</span></div>
      <div class="pv-row"><span class="k">n = ${fmtNum(n)} × ${freq}</span><span class="v">${fmtNum(totalN)} payments</span></div>
      <div class="pv-row"><span class="k">PMT</span><span class="v">${fmtMoney(pmt)}</span></div>
      <div class="pv-row"><span class="k">Annuity factor [1−(1+r)−n]/r</span><span class="v">${fmtNum(factor)}</span></div>
      <div class="pv-row"><span class="k">Total nominal payments (PMT × n)</span><span class="v">${fmtMoney(pmt*totalN)}</span></div>
      <div class="pv-row"><span class="k">${t('interestForgone')}</span><span class="v">${fmtMoney(pmt*totalN - pv)}</span></div>`;
    steps =
`Formula (ordinary annuity):  PV = PMT × [1 − (1 + r)^−n] / r

Where:
  PMT = ${fmtMoney(pmt)}
  annual rate = ${fmtNum(annualRate*100)}%  →  period rate r = ${fmtNum(annualRate)} / ${freq} = ${fmtNum(r)}
  n = ${fmtNum(n)} × ${freq} = ${fmtNum(totalN)} periods

Compute:
  (1 + r)^−n = ${fmtNum(Math.pow(1+r,-totalN))}
  annuity factor = [1 − ${fmtNum(Math.pow(1+r,-totalN))}] / ${fmtNum(r)} = ${fmtNum(factor)}
  PV = ${fmtMoney(pmt)} × ${fmtNum(factor)} = ${fmtMoney(pv)}

So ${fmtNum(totalN)} payments of ${fmtMoney(pmt)} are worth ${fmtMoney(pv)} today.`;
  }
  $('#pvLabel').textContent = label;
  $('#pvAmount').textContent = fmtMoney(pv);
  $('#breakdown').innerHTML = breakdown;
  $('#steps').textContent = steps;
}

function setMode(m){
  mode=m;
  document.querySelectorAll('.pv-tab').forEach(b=>b.classList.toggle('active', b.dataset.mode===m));
  $('#pmtWrap').style.display = m==='annuity'?'flex':'none';
  $('#fv').parentElement.style.display = m==='annuity'?'none':'flex';
  compute();
}

document.querySelectorAll('.pv-tab').forEach(b=>b.addEventListener('click',()=>setMode(b.dataset.mode)));
['fv','pmt','rate','periods','freq'].forEach(id=>$('#'+id).addEventListener('input',compute));

$('#tabLump').textContent=t('tabLump');
$('#tabAnnuity').textContent=t('tabAnnuity');
$('#lblFuture').textContent=t('lblFuture');
$('#lblPmt').textContent=t('lblPmt');
$('#lblRate').textContent=t('lblRate');
$('#lblPer').textContent=t('lblPer');
$('#lblFreq').textContent=t('lblFreq');
$('#breakdownTitle').textContent=t('breakdownTitle');
$('#stepsTitle').textContent=t('stepsTitle');

compute();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📈', href:'/calc/future-value-calculator.html', name:'Future Value Calculator'},
    {icon:'💵', href:'/calc/compound-interest-calculator.html', name:'Compound Interest'},
    {icon:'🏦', href:'/calc/mortgage-calculator.html', name:'Mortgage Calculator'},
    {icon:'💰', href:'/calc/roi-calculator.html', name:'ROI Calculator'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
