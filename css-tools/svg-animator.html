<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="shape-btns" id="shape-btns"></div>
    <div class="color-row">
      <label id="lbl-fill"></label><input type="color" id="fill-color" value="#4ecdc4">
      <label id="lbl-stroke"></label><input type="color" id="stroke-color" value="#2c3e50">
      <label id="lbl-strokew"></label><input type="number" id="stroke-width" value="2" min="0" max="20" style="width:60px">
    </div>
    <div class="svg-controls">
      <div><label id="lbl-anim"></label><select id="anim-type"></select></div>
      <div><label id="lbl-dur"></label><input type="number" id="anim-duration" value="1" min="0.1" max="30" step="0.1"></div>
      <div><label id="lbl-ease"></label><select id="anim-easing">
        <option value="ease">ease</option><option value="linear">linear</option><option value="ease-in">ease-in</option><option value="ease-out">ease-out</option><option value="ease-in-out">ease-in-out</option>
      </select></div>
      <div><label id="lbl-iter"></label><select id="anim-iter">
        <option value="infinite">∞</option><option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="5">5</option><option value="10">10</option>
      </select></div>
    </div>
    <div id="preview-area"></div>
    <div id="code-output"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'SVG Animation Generator',
    toolDesc: 'Create animated SVGs with CSS animations — choose shapes, animation types, colors and timing. Preview live, copy SVG code.',
    fill: 'Fill', stroke: 'Stroke', strokeW: 'Width',
    animType: 'Animation', duration: 'Duration (s)', easing: 'Easing', iterations: 'Repeat',
    spin: 'Spin', bounce: 'Bounce', pulse: 'Pulse', fade: 'Fade In/Out',
    swing: 'Swing', wobble: 'Wobble', flip: 'Flip', shake: 'Shake',
    circle: 'Circle', square: 'Square', triangle: 'Triangle', star: 'Star', heart: 'Heart', hexagon: 'Hexagon',
    sec: 's',
    step1: 'Choose a shape from the shape buttons',
    step2: 'Select an animation type (spin, bounce, pulse, etc.)',
    step3: 'Customize colors, duration, easing and repeat count',
    step4: 'Preview the animation and click Copy SVG Code to use it',
  },
  zh: {
    toolTitle: 'SVG 动画生成器',
    toolDesc: '使用 CSS 动画创建动态 SVG — 选择形状、动画类型、颜色和时长。实时预览，一键复制 SVG 代码。',
    fill: '填充', stroke: '描边', strokeW: '宽度',
    animType: '动画类型', duration: '时长（秒）', easing: '缓动', iterations: '重复',
    spin: '旋转', bounce: '弹跳', pulse: '脉冲', fade: '淡入淡出',
    swing: '摇摆', wobble: '晃动', flip: '翻转', shake: '抖动',
    circle: '圆形', square: '方形', triangle: '三角形', star: '星形', heart: '心形', hexagon: '六边形',
    sec: '秒',
    step1: '从形状按钮中选择一个形状',
    step2: '选择动画类型（旋转、弹跳、脉冲等）',
    step3: '自定义颜色、时长、缓动和重复次数',
    step4: '预览动画并点击「复制 SVG 代码」使用',
  }
});

const { $, copyText, t } = GZ;
const shapes = ['circle','square','triangle','star','heart','hexagon'];
const anims = ['spin','bounce','pulse','fade','swing','wobble','flip','shake'];
let currentShape = 'circle';

function getShapeSVG(shape, fill, stroke, sw) {
  const s = {fill, stroke, 'stroke-width': sw};
  const sa = Object.entries(s).map(([k,v])=>`${k}="${v}"`).join(' ');
  switch(shape) {
    case 'circle': return `<circle cx="60" cy="60" r="50" ${sa}/>`;
    case 'square': return `<rect x="10" y="10" width="100" height="100" rx="8" ${sa}/>`;
    case 'triangle': return `<polygon points="60,10 110,110 10,110" ${sa}/>`;
    case 'star': return `<polygon points="60,5 73,40 110,40 80,62 90,100 60,78 30,100 40,62 10,40 47,40" ${sa}/>`;
    case 'heart': return `<path d="M60,100 C20,70 0,40 20,20 C40,0 60,20 60,40 C60,20 80,0 100,20 C120,40 100,70 60,100Z" ${sa}/>`;
    case 'hexagon': return `<polygon points="60,5 110,30 110,80 60,105 10,80 10,30" ${sa}/>`;
  }
}

function getAnimCSS(type, dur, ease) {
  const d = dur + 's';
  switch(type) {
    case 'spin': return `@keyframes gz-svg-anim{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}.gz-anim{animation:gz-svg-anim ${d} ${ease} infinite}`;
    case 'bounce': return `@keyframes gz-svg-anim{0%,100%{transform:translateY(0)}50%{transform:translateY(-25px)}}.gz-anim{animation:gz-svg-anim ${d} ${ease} infinite}`;
    case 'pulse': return `@keyframes gz-svg-anim{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}.gz-anim{animation:gz-svg-anim ${d} ${ease} infinite}`;
    case 'fade': return `@keyframes gz-svg-anim{0%,100%{opacity:1}50%{opacity:0.1}}.gz-anim{animation:gz-svg-anim ${d} ${ease} infinite}`;
    case 'swing': return `@keyframes gz-svg-anim{0%,100%{transform:rotate(0deg)}25%{transform:rotate(15deg)}75%{transform:rotate(-15deg)}}.gz-anim{animation:gz-svg-anim ${d} ${ease} infinite}`;
    case 'wobble': return `@keyframes gz-svg-anim{0%,100%{transform:translateX(0)}25%{transform:translateX(-10px)}75%{transform:translateX(10px)}}.gz-anim{animation:gz-svg-anim ${d} ${ease} infinite}`;
    case 'flip': return `@keyframes gz-svg-anim{0%,100%{transform:perspective(200px) rotateY(0)}50%{transform:perspective(200px) rotateY(180deg)}}.gz-anim{animation:gz-svg-anim ${d} ${ease} infinite}`;
    case 'shake': return `@keyframes gz-svg-anim{0%,100%{transform:translateX(0)}10%,30%,50%,70%,90%{transform:translateX(-6px)}20%,40%,60%,80%{transform:translateX(6px)}}.gz-anim{animation:gz-svg-anim ${d} ${ease} infinite}`;
  }
}

function generateSVG() {
  const fill = $('#fill-color').value;
  const stroke = $('#stroke-color').value;
  const sw = $('#stroke-width').value;
  const animType = $('#anim-type').value;
  const dur = $('#anim-duration').value;
  const ease = $('#anim-easing').value;
  const iter = $('#anim-iter').value;

  const animCSS = getAnimCSS(animType, dur, ease).replace('infinite', iter === 'infinite' ? 'infinite' : iter);
  const shapeSVG = getShapeSVG(currentShape, fill, stroke, sw);

  const svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="200" height="200" class="gz-anim">
<style>${animCSS}</style>
${shapeSVG}
</svg>`;
  $('#preview-area').innerHTML = svg;

  const cleanSVG = svg.replace(' class="gz-anim"', '').replace('.gz-anim{', 'svg{');
  $('#code-output').textContent = cleanSVG;
}

// Build shape buttons
const shapeBtns = $('#shape-btns');
shapes.forEach(s => {
  const btn = document.createElement('button');
  btn.textContent = t(s);
  btn.onclick = () => {
    currentShape = s;
    shapeBtns.querySelectorAll('button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    generateSVG();
  };
  if (s === 'circle') btn.classList.add('active');
  shapeBtns.appendChild(btn);
});

// Build animation type select
const animSel = $('#anim-type');
anims.forEach(a => {
  const opt = document.createElement('option');
  opt.value = a; opt.textContent = t(a);
  animSel.appendChild(opt);
});

// Labels
$('#lbl-fill').textContent = t('fill');
$('#lbl-stroke').textContent = t('stroke');
$('#lbl-strokew').textContent = t('strokeW');
$('#lbl-anim').textContent = t('animType');
$('#lbl-dur').textContent = t('duration');
$('#lbl-ease').textContent = t('easing');
$('#lbl-iter').textContent = t('iterations');

// Event listeners
['fill-color','stroke-color','stroke-width','anim-type','anim-duration','anim-easing','anim-iter'].forEach(id => {
  $('#'+id).addEventListener('input', generateSVG);
});

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="copyText($('#code-output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="generateSVG()">${t('generate')}</button>`;

generateSVG();

GZ.renderToolPage({
  category: 'css',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'✨', href:'/css-tools/animation.html', name:'CSS Animation'},
    {icon:'🎯', href:'/css-tools/transform.html', name:'CSS Transform'},
    {icon:'🎨', href:'/css-tools/gradient.html', name:'CSS Gradient'},
    {icon:'🖌️', href:'/dev/svg-editor.html', name:'SVG Editor'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
