let state = { started: false, current: 0, answers: new Array(QUESTIONS.length).fill(null) };

function startQuiz() {
  state.started = true;
  state.current = 0;
  state.answers = new Array(QUESTIONS.length).fill(null);
  renderQuestion();
}

function selectAnswer(idx) {
  state.answers[state.current] = idx;
  renderQuestion();
}

function goNext() { if (state.current < QUESTIONS.length-1) { state.current++; renderQuestion(); } }
function goPrev() { if (state.current > 0) { state.current--; renderQuestion(); } }

function renderQuestion() {
  const area = $('#quiz-area');
  const q = QUESTIONS[state.current];
  const progress = ((state.current+1)/QUESTIONS.length)*100;
  const cat = t('categories');
  area.innerHTML = `
    <div class="quiz-progress">
      <span>${t('qOf')} ${state.current+1} ${t('of')} ${QUESTIONS.length}</span>
      <div class="progress-bar"><div class="progress-fill" style="width:${progress}%"></div></div>
      <span>${Math.round(progress)}%</span>
    </div>
    <div class="q-card">
      <div class="q-number">${t('qOf')} ${state.current+1}</div>
      <div class="q-text">${q.pattern ? '' : ''}${q.q}</div>
      <div class="q-options">
        ${q.opts.map((o,i) => `<button class="q-opt ${state.answers[state.current]===i?'selected':''}" onclick="selectAnswer(${i})">${o}</button>`).join('')}
      </div>
    </div>
    <div class="quiz-nav">
      <button class="gz-btn gz-btn-secondary" onclick="goPrev()" ${state.current===0?'disabled style="opacity:.4"':''}>${t('prev')}</button>

    </div>
  `;
}

function showResult() {
  const correct = state.answers.reduce((s, ans, i) => s + (ans === QUESTIONS[i].a ? 1 : 0), 0);
  const pct = correct / QUESTIONS.length;
  // Map to IQ: mean 100, sd 15. top score ~135, bottom ~75
  const iq = Math.round(75 + pct * 60);
  const cat = t('categories');
  let key, label, color;
  if (iq >= 130) { key='130+'; }
  else if (iq >= 120) { key='120-129'; }
  else if (iq >= 110) { key='110-119'; }
  else if (iq >= 90) { key='90-109'; }
  else if (iq >= 80) { key='80-89'; }
  else { key='below'; }
  label = cat[key].label; color = cat[key].color;
  const markerPos = Math.max(0, Math.min(100, ((iq-70)/(140-70))*100));
