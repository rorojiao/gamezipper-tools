.gj-input{flex:1;padding:11px 14px;border-radius:10px;border:1px solid var(--border,#333);background:var(--surface,#1e1e2e);color:var(--text,#eee);font-size:.95rem;font-family:inherit;box-sizing:border-box}
.gj-input:focus{outline:none;border-color:var(--accent,#4ecdc4)}
.gj-actions{display:flex;gap:10px;align-items:center;margin-top:14px;flex-wrap:wrap}

.gj-hentry .d{font-weight:700;color:var(--accent,#4ecdc4);font-size:.82rem;margin-bottom:5px;display:flex;justify-content:space-between;align-items:center}

.gj-hentry li{margin-bottom:3px;line-height:1.45}

.gj-export{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.gj-ebtn{padding:7px 14px;border-radius:8px;border:1px solid var(--border,#333);background:rgba(255,255,255,.05);color:var(--text,#eee);cursor:pointer;font-size:.8rem}
.gj-empty{text-align:center;color:var(--text2,#aaa);padding:20px;font-size:.9rem}

<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"What is a gratitude journal?","acceptedAnswer":{"@type":"Answer","text":"A gratitude journal is a daily practice of writing down a few things you are thankful for. Studies link regular gratitude practice to improved mood, better sleep, stronger relationships and reduced stress."}},{"@type":"Question","name":"How many things should I write each day?","acceptedAnswer":{"@type":"Answer","text":"Three is a popular, manageable number used by programs like Three Good Things. You can write more if you want, but keeping it small makes the habit easier to sustain."}},{"@type":"Question","name":"Is my gratitude journal private?","acceptedAnswer":{"@type":"Answer","text":"Yes, completely private. All entries are stored locally in your browser. Nothing is uploaded to any server, and no account is required. Clearing your browser data removes your entries."}},{"@type":"Question","name":"What if I miss a day?","acceptedAnswer":{"@type":"Answer","text":"Missing a day is normal. Your streak resets but you can start again immediately. The goal is consistency over perfection — even a one-word entry counts."}},{"@type":"Question","name":"Can I export or back up my entries?","acceptedAnswer":{"@type":"Answer","text":"Yes. Use the Export buttons to download your full journal as JSON or a plain-text file for backup, or copy it into another notes app."}}]}</script>

<script>
GZI18n.register({
  en: {
    toolTitle: 'Gratitude Journal',
    toolDesc: 'Write 3 things you are grateful for each day. Build a streak, browse history and get inspired by daily prompts. Private — all entries stay in your browser.',
    today: "Today's gratitude",
    statsTitle: 'Your progress',
    historyTitle: 'Past entries',
    save: 'Save today',
    saved: '✓ Saved — thank you',
    needOne: 'Please write at least one thing',
    total: 'Entries',
    streak: 'Day streak',
    longest: 'Longest streak',
    thisMonth: 'This month',
    jsonBtn: 'Export JSON',
    txtBtn: 'Export text',
    clearBtn: 'Clear all data',
    months: ['January','February','March','April','May','June','July','August','September','October','November','December'],
    prompts: [
      'What is one small thing that made you smile today? 🌱',
      'Name a person you are thankful for and why. 💛',
      'What is something your body did well today? 🚶',
      'Recall a moment of beauty you noticed. 🌅',
      'What skill or strength did you use today? 💪',
      'Name a comfort you often take for granted. ☕',
      'What is something you are looking forward to? ✨',
      'Recall a kindness someone showed you. 🤝',
      'What is a challenge that helped you grow? 🌿',
      'Name a taste, smell or sound you enjoyed today. 🎶',
      'What is something you learned recently? 📚',
      'Who makes you feel safe and why? 🏡',
      'Tap for another prompt →',
    ],
    step1: 'Read the daily prompt for inspiration, or tap it for a new one',
    step2: 'Write three things you are grateful for in the boxes',
    step3: 'Press Save — your entry is stored locally and your streak grows',
    step4: 'Browse your history, watch the calendar fill in and export a backup anytime',
  },
  zh: {
    toolTitle: '感恩日记',
    toolDesc: '每天写下 3 件值得感恩的事。坚持打卡，浏览历史，从每日提示中获取灵感。完全私密 — 所有记录只保存在浏览器中。',
    today: '今日感恩',
    statsTitle: '你的进度',
    historyTitle: '过往记录',
    save: '保存今天',
    saved: '✓ 已保存 — 谢谢',
    needOne: '请至少写一件事情',
    total: '记录数',
    streak: '连续天数',
    longest: '最长连续',
    thisMonth: '本月',
    jsonBtn: '导出 JSON',
    txtBtn: '导出文本',
    clearBtn: '清空全部数据',
    months: ['1 月','2 月','3 月','4 月','5 月','6 月','7 月','8 月','9 月','10 月','11 月','12 月'],
    prompts: [
      '今天有什么小事让你微笑？🌱',
      '想一个让你感激的人，为什么？💛',
      '今天你的身体完成了什么了不起的事？🚶',
      '回想一个你注意到的美好瞬间。🌅',
      '今天你运用了什么技能或优点？💪',
      '想想一个你常忽略的舒适小事。☕',
      '有什么事让你期待？✨',
      '回想别人对你的一次善意。🤝',
      '什么挑战让你有所成长？🌿',
      '今天享受过什么味道、气味或声音？🎶',
      '最近学到了什么新东西？📚',
      '谁让你感到安心，为什么？🏡',
      '点击换一条提示 →',
    ],
    step1: '阅读每日提示获取灵感，或点击换一条',
    step2: '在三个框中写下值得感恩的事',
    step3: '点击「保存」— 记录会本地保存，连续打卡天数会增加',
    step4: '浏览历史记录，看着日历被填满，随时导出备份',
  }
});

const { $, t } = GZ;

let ENTRIES = {};
try { const s = localStorage.getItem('gz-gratitude'); if (s) ENTRIES = JSON.parse(s); } catch(e) {}

let promptIdx = 0;

const today = new Date();
let viewYear = today.getFullYear();
let viewMonth = today.getMonth();

const pad = n => String(n).padStart(2, '0');
const dateKey = d => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;

function loadToday() {
  const k = dateKey(today);
  const e = ENTRIES[k];
  if (e) { $('#g1').value = e.items[0] || ''; $('#g2').value = e.items[1] || ''; $('#g3').value = e.items[2] || ''; }
}

function renderPrompt() {
  const p = t('prompts');
  $('#prompt').innerHTML = p[promptIdx] + (p.length > 1 ? `<small>${p[p.length-1]}</small>` : '');
}

function save() {
  const items = [$('#g1').value.trim(), $('#g2').value.trim(), $('#g3').value.trim()].filter(Boolean);
  if (!items.length) { $('#msg').textContent = '⚠ ' + t('needOne'); return; }
  const k = dateKey(today);
  ENTRIES[k] = { items, ts: Date.now() };
  try { localStorage.setItem('gz-gratitude', JSON.stringify(ENTRIES)); } catch(e) {}
  $('#msg').textContent = t('saved');
  setTimeout(() => $('#msg').textContent = '', 2000);
  renderAll();
}

function computeStreak() {
  let streak = 0;
  const d = new Date(today);
  while (true) {
    const k = dateKey(d);
    if (ENTRIES[k]) { streak++; d.setDate(d.getDate() - 1); }
    else break;
  }
  return streak;
}

function computeLongest() {
  const keys = Object.keys(ENTRIES).sort();
  if (!keys.length) return 0;
  let longest = 1, cur = 1;
  for (let i = 1; i < keys.length; i++) {
    const prev = new Date(keys[i-1]);
    const curr = new Date(keys[i]);
    const diff = Math.round((curr - prev) / 86400000);
    if (diff === 1) { cur++; longest = Math.max(longest, cur); }
    else cur = 1;
  }
  return longest;
}

function renderStats() {
  const total = Object.keys(ENTRIES).length;
  const monthCount = Object.keys(ENTRIES).filter(k => {
    const [y, m] = k.split('-').map(Number);
    return y === today.getFullYear() && m === today.getMonth() + 1;
  }).length;
  $('#stats').innerHTML = `
    <div class="gj-stat"><div class="v">${total}</div><div class="l">${t('total')}</div></div>
    <div class="gj-stat"><div class="v">${computeStreak()}</div><div class="l">${t('streak')}</div></div>
    <div class="gj-stat"><div class="v">${computeLongest()}</div><div class="l">${t('longest')}</div></div>
    <div class="gj-stat"><div class="v">${monthCount}</div><div class="l">${t('thisMonth')}</div></div>`;
}

function renderCal() {
  const first = new Date(viewYear, viewMonth, 1);
  const last = new Date(viewYear, viewMonth + 1, 0);
  const startDow = first.getDay();
  const days = last.getDate();
  $('#monthLabel').textContent = t('months')[viewMonth] + ' ' + viewYear;
  let html = '';
  for (let i = 0; i < startDow; i++) html += '<div class="gj-day empty"></div>';
  for (let d = 1; d <= days; d++) {
    const k = `${viewYear}-${pad(viewMonth+1)}-${pad(d)}`;
    const has = !!ENTRIES[k];
    html += `<div class="gj-day${has ? ' has' : ''}" title="${has ? '✓' : ''}"><span class="num">${d}</span>${has ? '🙏' : ''}</div>`;
  }
  $('#cal').innerHTML = html;
}

function renderHistory() {
  const keys = Object.keys(ENTRIES).sort().reverse();
  if (!keys.length) {
    $('#history').innerHTML = `<div class="gj-empty">No entries yet — start today! 🌟</div>`;
    return;
  }
  $('#history').innerHTML = keys.slice(0, 60).map(k => {
    const e = ENTRIES[k];
    const date = new Date(k);
    const ds = date.toLocaleDateString();
    const items = e.items.map(i => `<li>${escapeHtml(i)}</li>`).join('');
    return `<div class="gj-hentry"><div class="d"><span>${ds}</span><button class="del" data-k="${k}">×</button></div><ul>${items}</ul></div>`;
  }).join('');
  document.querySelectorAll('#history .del').forEach(b => {
    b.addEventListener('click', () => { delete ENTRIES[b.dataset.k]; localStorage.setItem('gz-gratitude', JSON.stringify(ENTRIES)); renderAll(); });
  });
}

function escapeHtml(s){ return String(s||'').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

function exportJson() {
  download(new Blob([JSON.stringify(ENTRIES, null, 2)], { type: 'application/json' }), 'gratitude-journal.json');
}
function exportTxt() {
  const lines = Object.keys(ENTRIES).sort().map(k => {
    const e = ENTRIES[k];
    return `${k}\n${e.items.map((i,idx) => `  ${idx+1}. ${i}`).join('\n')}`;
  });
  download(new Blob([lines.join('\n\n')], { type: 'text/plain' }), 'gratitude-journal.txt');
}
function download(blob, name) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = name; document.body.appendChild(a); a.click();
  setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 200);
}
function clearAll() {
  if (!confirm('Clear all gratitude entries?')) return;
  ENTRIES = {};
  localStorage.removeItem('gz-gratitude');
  $('#g1').value = ''; $('#g2').value = ''; $('#g3').value = '';
  renderAll();
}

function renderAll() { renderStats(); renderCal(); renderHistory(); }

// Labels
$('#todayTitle').textContent = t('today');
$('#statsTitle').textContent = t('statsTitle');
$('#historyTitle').textContent = t('historyTitle');
$('#btnSave').textContent = t('save');
$('#btnJson').textContent = t('jsonBtn');
$('#btnTxt').textContent = t('txtBtn');
$('#btnClear').textContent = t('clearBtn');

$('#btnSave').addEventListener('click', save);
$('#prompt').addEventListener('click', () => {
  const p = t('prompts');
  promptIdx = (promptIdx + 1) % Math.max(1, p.length - 1);
  renderPrompt();
});
$('#prevMonth').addEventListener('click', () => { viewMonth--; if (viewMonth < 0) { viewMonth = 11; viewYear--; } renderCal(); });
$('#nextMonth').addEventListener('click', () => { viewMonth++; if (viewMonth > 11) { viewMonth = 0; viewYear++; } renderCal(); });
$('#btnJson').addEventListener('click', exportJson);
$('#btnTxt').addEventListener('click', exportTxt);
$('#btnClear').addEventListener('click', clearAll);

// Enter to save on last field
$('#g3').addEventListener('keydown', e => { if (e.key === 'Enter') save(); });

loadToday();
renderPrompt();
renderAll();

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'😊', href:'/calc/mood-tracker.html', name:'Mood Tracker'},
    {icon:'✅', href:'/fun/habit-tracker.html', name:'Habit Tracker'},
    {icon:'😌', href:'/fun/box-breathing.html', name:'Box Breathing'},
    {icon:'📝', href:'/text/notepad.html', name:'Notepad'},
    
  ]
});
</script>
