<script>
GZI18n.register({
  en: {
    toolTitle: 'Microdata Generator (Schema.org)',
    toolDesc: 'Generate Schema.org HTML microdata markup for Product, Article, Event, Organization, LocalBusiness, FAQ and Breadcrumb — copy itemscope/itemprop HTML instantly.',

    step2: 'Fill in the fields with your content',

    step4: 'Copy the markup and paste it into your page',
  },
  zh: {
    toolTitle: 'Microdata 生成器（Schema.org）',
    toolDesc: '为 Product、Article、Event、Organization、LocalBusiness、FAQ 和 Breadcrumb 生成 Schema.org HTML 微数据标记 — 即时复制 itemscope/itemprop HTML。',
    generate: '生成',
    copy: '复制',
    clear: '清除',
    output: '生成的 HTML 微数据',
    step1: '选择 Schema.org 类型（Product、Article、Event…）',
    step2: '填写字段内容',
    step3: '点击「生成」构建微数据 HTML',
    step4: '复制标记并粘贴到你的网页中',
  }
});

const { $, copyText, t, esc } = { ...GZ, esc: s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') };

const SCHEMAS = {
  Product: [
    {k:'name',label:'Product Name',ph:'Blue Widget Pro'},
    {k:'image',label:'Image URL',ph:'https://example.com/product.jpg'},
    {k:'description',label:'Description',ph:'A high-quality blue widget',ta:1},
    {k:'sku',label:'SKU',ph:'WIDGET-001'},
    {k:'brand',label:'Brand',ph:'AcmeCorp'},
    {k:'price',label:'Price',ph:'29.99'},
    {k:'currency',label:'Currency',ph:'USD'},
    {k:'availability',label:'Availability',ph:'InStock',def:'InStock'},
    {k:'rating',label:'Rating (1-5)',ph:'4.5'},
    {k:'reviewCount',label:'Review Count',ph:'127'},
  ],
  Article: [
    {k:'headline',label:'Headline',ph:'How to Build a Widget'},
    {k:'image',label:'Image URL',ph:'https://example.com/article.jpg'},
    {k:'datePublished',label:'Date Published',ph:'2026-01-15',def:new Date().toISOString().slice(0,10)},
    {k:'dateModified',label:'Date Modified',ph:'2026-01-16'},
    {k:'author',label:'Author',ph:'Jane Doe'},
    {k:'publisher',label:'Publisher',ph:'Example News'},
    {k:'description',label:'Description',ph:'A complete guide',ta:1},
  ],
  Event: [
    {k:'name',label:'Event Name',ph:'Summer Music Festival'},
    {k:'image',label:'Image URL',ph:'https://example.com/event.jpg'},
    {k:'startDate',label:'Start Date',ph:'2026-07-20T19:00'},
    {k:'endDate',label:'End Date',ph:'2026-07-20T23:00'},
    {k:'location',label:'Venue',ph:'Central Park'},
    {k:'address',label:'Address',ph:'New York, NY'},
    {k:'price',label:'Price',ph:'50'},
    {k:'currency',label:'Currency',ph:'USD'},
    {k:'description',label:'Description',ph:'Annual summer music festival',ta:1},
  ],
  Organization: [
    {k:'name',label:'Organization Name',ph:'AcmeCorp'},
    {k:'url',label:'Website',ph:'https://example.com'},
    {k:'logo',label:'Logo URL',ph:'https://example.com/logo.png'},
    {k:'email',label:'Email',ph:'info@example.com'},
    {k:'phone',label:'Phone',ph:'+1-555-0100'},
    {k:'address',label:'Address',ph:'123 Main St, New York, NY'},
  ],
  LocalBusiness: [
    {k:'name',label:'Business Name',ph:'Joe\'s Pizza'},
    {k:'image',label:'Image URL',ph:'https://example.com/store.jpg'},
    {k:'address',label:'Address',ph:'456 Oak Ave, Brooklyn, NY'},
    {k:'phone',label:'Phone',ph:'+1-555-0200'},
    {k:'openingHours',label:'Opening Hours',ph:'Mo-Su 11:00-22:00'},
    {k:'priceRange',label:'Price Range',ph:'$$'},
    {k:'rating',label:'Rating (1-5)',ph:'4.8'},
  ],
  FAQPage: [
    {k:'q1',label:'Question 1',ph:'What are your hours?'},
    {k:'a1',label:'Answer 1',ph:'We are open 9am to 9pm daily.',ta:1},
    {k:'q2',label:'Question 2',ph:'Do you offer delivery?'},
    {k:'a2',label:'Answer 2',ph:'Yes, free delivery within 5 miles.',ta:1},
    {k:'q3',label:'Question 3',ph:'How can I pay?'},
    {k:'a3',label:'Answer 3',ph:'We accept cash, card and all major wallets.',ta:1},
  ],
  BreadcrumbList: [
    {k:'item1name',label:'Crumb 1 Name',ph:'Home'},
    {k:'item1url',label:'Crumb 1 URL',ph:'https://example.com/'},
    {k:'item2name',label:'Crumb 2 Name',ph:'Category'},
    {k:'item2url',label:'Crumb 2 URL',ph:'https://example.com/category'},
    {k:'item3name',label:'Crumb 3 (current page)',ph:'Product Page'},
    {k:'item3url',label:'Crumb 3 URL',ph:'https://example.com/category/product'},
  ],
};

let currentType = 'Product';

function renderTypeSelector() {
  $('#type-selector').innerHTML = Object.keys(SCHEMAS).map(type =>
    `<button class="${type===currentType?'active':''}" onclick="selectType('${type}')">${type}</button>`
  ).join('');
}

function selectType(type) {
  currentType = type;
  renderTypeSelector();
  renderForm();
  generate();
}

function renderForm() {
  const fields = SCHEMAS[currentType];
  $('#form-area').innerHTML = fields.map(f => {
    const val = f.def ? `value="${esc(f.def)}"` : '';
    const ph = f.ph ? `placeholder="${esc(f.ph)}"` : '';
    const tag = f.ta ? `<textarea id="f_${f.k}" ${ph} oninput="generate()"></textarea>`
                     : `<input type="text" id="f_${f.k}" ${ph} ${val} oninput="generate()">`;
    return `<div class="field-row"><label>${f.label}</label>${tag}</div>`;
  }).join('');
}

function fv(k) { const el = document.getElementById('f_'+k); return el ? el.value.trim() : ''; }

function generate() {
  let html = '';
  const v = fv;
  if (currentType === 'Product') {
    html = `<div itemscope itemtype="https://schema.org/Product">
  <meta itemprop="sku" content="${esc(v('sku'))}">
  <span itemprop="name">${esc(v('name'))}</span>
  ${v('image')?`<img itemprop="image" src="${esc(v('image'))}" alt="${esc(v('name'))}">`:''}
  ${v('description')?`<p itemprop="description">${esc(v('description'))}</p>`:''}
  ${v('brand')?`<span itemprop="brand" itemscope itemtype="https://schema.org/Brand"><meta itemprop="name" content="${esc(v('brand'))}"></span>`:''}
  <div itemprop="offers" itemscope itemtype="https://schema.org/Offer">
    <meta itemprop="price" content="${esc(v('price'))}">
    <meta itemprop="priceCurrency" content="${esc(v('currency'))}">
    <link itemprop="availability" href="https://schema.org/${esc(v('availability')||'InStock')}">
  </div>
  ${v('rating')?`<div itemprop="aggregateRating" itemscope itemtype="https://schema.org/AggregateRating">
    <meta itemprop="ratingValue" content="${esc(v('rating'))}">
    <meta itemprop="reviewCount" content="${esc(v('reviewCount'))}">
  </div>`:''}
</div>`;
  } else if (currentType === 'Article') {
    html = `<article itemscope itemtype="https://schema.org/Article">
  <h1 itemprop="headline">${esc(v('headline'))}</h1>
  ${v('image')?`<img itemprop="image" src="${esc(v('image'))}" alt="${esc(v('headline'))}">`:''}
  ${v('description')?`<p itemprop="description">${esc(v('description'))}</p>`:''}
  <meta itemprop="datePublished" content="${esc(v('datePublished'))}">
  ${v('dateModified')?`<meta itemprop="dateModified" content="${esc(v('dateModified'))}">`:''}
  <span itemprop="author" itemscope itemtype="https://schema.org/Person"><meta itemprop="name" content="${esc(v('author'))}"></span>
  <span itemprop="publisher" itemscope itemtype="https://schema.org/Organization"><meta itemprop="name" content="${esc(v('publisher'))}"></span>
</article>`;
  } else if (currentType === 'Event') {
    html = `<div itemscope itemtype="https://schema.org/Event">
  <h1 itemprop="name">${esc(v('name'))}</h1>
  ${v('image')?`<img itemprop="image" src="${esc(v('image'))}" alt="${esc(v('name'))}">`:''}
  ${v('description')?`<p itemprop="description">${esc(v('description'))}</p>`:''}
  <meta itemprop="startDate" content="${esc(v('startDate'))}">
  ${v('endDate')?`<meta itemprop="endDate" content="${esc(v('endDate'))}">`:''}
  <span itemprop="location" itemscope itemtype="https://schema.org/Place">
    <span itemprop="name">${esc(v('location'))}</span>
    ${v('address')?`<span itemprop="address" itemscope itemtype="https://schema.org/PostalAddress"><span itemprop="streetAddress">${esc(v('address'))}</span></span>`:''}
  </span>
  ${v('price')?`<div itemprop="offers" itemscope itemtype="https://schema.org/Offer"><meta itemprop="price" content="${esc(v('price'))}"><meta itemprop="priceCurrency" content="${esc(v('currency'))}"></div>`:''}
</div>`;
  } else if (currentType === 'Organization') {
    html = `<div itemscope itemtype="https://schema.org/Organization">
  <span itemprop="name">${esc(v('name'))}</span>
  ${v('url')?`<a itemprop="url" href="${esc(v('url'))}">${esc(v('url'))}</a>`:''}
  ${v('logo')?`<img itemprop="logo" src="${esc(v('logo'))}" alt="${esc(v('name'))} logo">`:''}
  ${v('email')?`<a itemprop="email" href="mailto:${esc(v('email'))}">${esc(v('email'))}</a>`:''}
  ${v('phone')?`<a itemprop="telephone" href="tel:${esc(v('phone'))}">${esc(v('phone'))}</a>`:''}
  ${v('address')?`<span itemprop="address">${esc(v('address'))}</span>`:''}
</div>`;
  } else if (currentType === 'LocalBusiness') {
    html = `<div itemscope itemtype="https://schema.org/LocalBusiness">
  <span itemprop="name">${esc(v('name'))}</span>
  ${v('image')?`<img itemprop="image" src="${esc(v('image'))}" alt="${esc(v('name'))}">`:''}
  <span itemprop="address">${esc(v('address'))}</span>
  ${v('phone')?`<a itemprop="telephone" href="tel:${esc(v('phone'))}">${esc(v('phone'))}</a>`:''}
  ${v('openingHours')?`<time itemprop="openingHours" datetime="${esc(v('openingHours'))}">${esc(v('openingHours'))}</time>`:''}
  ${v('priceRange')?`<span itemprop="priceRange">${esc(v('priceRange'))}</span>`:''}
  ${v('rating')?`<div itemprop="aggregateRating" itemscope itemtype="https://schema.org/AggregateRating"><meta itemprop="ratingValue" content="${esc(v('rating'))}"></div>`:''}
</div>`;
  } else if (currentType === 'FAQPage') {
    html = `<div itemscope itemtype="https://schema.org/FAQPage">`;
    for (let i = 1; i <= 3; i++) {
      const q = v('q'+i), a = v('a'+i);
      if (q || a) html += `
  <div itemprop="mainEntity" itemscope itemtype="https://schema.org/Question">
    <h3 itemprop="name">${esc(q)}</h3>
    <div itemprop="acceptedAnswer" itemscope itemtype="https://schema.org/Answer">
      <div itemprop="text">${esc(a)}</div>
    </div>
  </div>`;
    }
    html += `\n</div>`;
  } else if (currentType === 'BreadcrumbList') {
    html = `<nav aria-label="Breadcrumb">
  <ol itemscope itemtype="https://schema.org/BreadcrumbList">`;
    for (let i = 1; i <= 3; i++) {
      const nm = v('item'+i+'name'), url = v('item'+i+'url');
      if (nm || url) html += `
    <li itemprop="itemListElement" itemscope itemtype="https://schema.org/ListItem">
      <meta itemprop="position" content="${i}">
      <a itemprop="item" href="${esc(url)}"><span itemprop="name">${esc(nm)}</span></a>
    </li>`;
    }
    html += `\n  </ol>\n</nav>`;
  }
  $('#output').textContent = html.trim();
}

function doClear() {
  document.querySelectorAll('#form-area input, #form-area textarea').forEach(el => el.value = '');
  generate();
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="generate()">${t('generate')}</button>
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

document.querySelector('#lbl-out').textContent = t('output');
renderTypeSelector();
renderForm();
generate();

GZ.renderToolPage({
  category: 'dev',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📋', href:'/dev/jsonld-generator.html', name:'JSON-LD Gen'},
    {icon:'✅', href:'/dev/structured-data-tester.html', name:'Schema Tester'},
    {icon:'🔍', href:'/seo/schema-generator.html', name:'Schema Generator'},
    {icon:'🌐', href:'/dev/html-boilerplate.html', name:'HTML Boilerplate'},
  ]
});
</script>
