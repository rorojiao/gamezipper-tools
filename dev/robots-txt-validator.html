    inputLabel: 'Robots.txt 内容',
    outputLabel: '验证结果',
    validate: '验证',
    testUrlLabel: '测试 URL 访问',
    step1: '在输入区粘贴 robots.txt 内容',
    step2: '点击「验证」检查语法错误和警告',
    step3: '查看摘要和详细结果',
    step4: '测试特定 URL 是否被允许或阻止',
  }
});

const { $, copyText, t } = GZ;

let parsedRules = [];

function parseRobotsTxt(text) {
  const lines = text.split('\n');
  const errors = [];
  const warnings = [];
  const groups = [];
  let currentGroup = null;
  let sitemaps = [];
  let lineNum = 0;

  for (const rawLine of lines) {
    lineNum++;
    const line = rawLine.trim();
    if (!line || line.startsWith('#')) continue;

    const colonIdx = line.indexOf(':');
    if (colonIdx === -1) {
      errors.push({ line: lineNum, msg: `Missing colon: "${line}"`, type: 'err' });
      continue;
    }

    const directive = line.substring(0, colonIdx).trim().toLowerCase();
    const value = line.substring(colonIdx + 1).trim();

    switch(directive) {
      case 'user-agent':
        currentGroup = { agent: value, rules: [] };
        groups.push(currentGroup);
        break;
      case 'allow':
      case 'disallow':
        if (!currentGroup) {
          errors.push({ line: lineNum, msg: `${directive} without preceding User-agent`, type: 'err' });
          currentGroup = { agent: '*', rules: [] };
          groups.push(currentGroup);
        }
        if (value && !value.startsWith('/')) {
          warnings.push({ line: lineNum, msg: `Path should start with /: "${value}"`, type: 'warn' });
        }
        currentGroup.rules.push({ type: directive, path: value, line: lineNum });
        break;
      case 'sitemap':
        if (value && !value.startsWith('http')) {
          warnings.push({ line: lineNum, msg: `Sitemap URL should be absolute: "${value}"`, type: 'warn' });
        }
        sitemaps.push({ url: value, line: lineNum });
        break;
      case 'crawl-delay':
        if (!currentGroup) {
          errors.push({ line: lineNum, msg: `Crawl-delay without User-agent`, type: 'err' });
        } else if (isNaN(parseInt(value))) {
          errors.push({ line: lineNum, msg: `Invalid Crawl-delay value: "${value}"`, type: 'err' });
        }
        break;
      default:
        warnings.push({ line: lineNum, msg: `Unknown directive: "${directive}"`, type: 'warn' });
    }
  }

  // Check for missing wildcard group
  const hasWildcard = groups.some(g => g.agent === '*');
  if (!hasWildcard && groups.length > 0) {
    warnings.push({ line: 0, msg: 'No User-agent: * group found. Some crawlers may ignore your rules.', type: 'warn' });
  }

  return { groups, sitemaps, errors, warnings };
}

function isAllowed(path, agent, groups) {
  // Find matching groups
  const matching = groups.filter(g => g.agent === '*' || g.agent.toLowerCase() === agent.toLowerCase());
  if (matching.length === 0) return true; // No rules = allowed

  let bestMatch = null;
  let bestLen = -1;
  let bestType = 'allow';

  for (const group of matching) {
    for (const rule of group.rules) {
      if (!rule.path) continue;
      const rulePath = rule.path.replace(/\*/g, '.*').replace(/\$$/g, '$');
      try {
        const regex = new RegExp('^' + rulePath);
        if (regex.test(path)) {
          if (rule.path.length > bestLen) {
            bestLen = rule.path.length;
            bestType = rule.type;
            bestMatch = rule;
          }
        }
      } catch(e) {}
    }
  }

  return bestMatch ? bestType === 'allow' : true;
}

function doValidate() {
  const text = $('#input').value;
  if (!text.trim()) return;

  const result = parseRobotsTxt(text);
  parsedRules = result;

  const totalRules = result.groups.reduce((s, g) => s + g.rules.length, 0);

  $('#summary').innerHTML = `
    <div class="summary-item"><div class="num">${result.groups.length}</div><div class="lbl">User-agents</div></div>
    <div class="summary-item"><div class="num">${totalRules}</div><div class="lbl">Rules</div></div>
    <div class="summary-item"><div class="num">${result.sitemaps.length}</div><div class="lbl">Sitemaps</div></div>
    <div class="summary-item"><div class="num" style="color:${result.errors.length?'var(--gz-accent)':'var(--gz-success)'}">${result.errors.length}</div><div class="lbl">Errors</div></div>
    <div class="summary-item"><div class="num" style="color:${result.warnings.length?'#f0ad4e':'var(--gz-success)'}">${result.warnings.length}</div><div class="lbl">Warnings</div></div>
  `;

  let html = '';
  if (result.errors.length === 0 && result.warnings.length === 0) {
    html = '<div class="result-card"><h4>✓ No issues found</h4><p>Your robots.txt appears to be valid.</p></div>';
  }

  for (const err of result.errors) {
    html += `<div class="result-card err"><h4>✗ Error (Line ${err.line})</h4><p>${err.msg}</p></div>`;
  }
  for (const warn of result.warnings) {
    html += `<div class="result-card warn"><h4>⚠ Warning${warn.line ? ' (Line '+warn.line+')' : ''}</h4><p>${warn.msg}</p></div>`;
  }

  $('#results').innerHTML = html;
}

function doTest() {
  const path = $('#testUrl').value.trim();
  if (!path || parsedRules.groups.length === 0) return;
  const agent = $('#testAgent').value;
  const allowed = isAllowed(path, agent, parsedRules.groups);
  const el = $('#testResult');
  el.style.display = 'block';
  el.className = allowed ? 'allowed' : 'blocked';
  el.innerHTML = allowed
    ? `✓ <strong>${path}</strong> is <strong>ALLOWED</strong> for ${agent}`
    : `✗ <strong>${path}</strong> is <strong>BLOCKED</strong> for ${agent}`;
}

function loadExample() {
  $('#input').value = `# Robots.txt for example.com
User-agent: *
Allow: /
Disallow: /admin/
Disallow: /private/
Disallow: /tmp/
Disallow: /*.json$

User-agent: Googlebot
Allow: /
Disallow: /private/
Crawl-delay: 1

User-agent: Bingbot
Allow: /
Disallow: /admin/
Disallow: /private/

Sitemap: https://example.com/sitemap.xml
Sitemap: https://example.com/news-sitemap.xml`;
  doValidate();
}

function doClear() {
  $('#input').value = '';
  $('#summary').innerHTML = '';
  $('#results').innerHTML = '';
  $('#testResult').style.display = 'none';
}

$('#testBtn').addEventListener('click', doTest);
$('#testUrl').addEventListener('keydown', e => { if (e.key === 'Enter') doTest(); });
$('#testLabel').textContent = t('testUrlLabel');

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="doValidate()">${t('validate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

$('#input').addEventListener('input', doValidate);
