<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "How many bytes are in a kilobyte (KB)?", "acceptedAnswer": {"@type": "Answer", "text": "It depends on the convention. In the decimal (SI) system, 1 KB = 1,000 bytes. In the binary system, 1 KiB (kibibyte) = 1,024 bytes. Storage manufacturers usually use the decimal system, while Windows and RAM use the binary system."}}, {"@type": "Question", "name": "What is the difference between MB and MiB?", "acceptedAnswer": {"@type": "Answer", "text": "1 MB (megabyte, decimal) = 1,000,000 bytes (10^6). 1 MiB (mebibyte, binary) = 1,048,576 bytes (2^20). The binary prefixes (KiB, MiB, GiB) were standardized by the IEC to remove the ambiguity of KB meaning either 1,000 or 1,024."}}, {"@type": "Question", "name": "How many bits are in a byte?", "acceptedAnswer": {"@type": "Answer", "text": "There are 8 bits in 1 byte. A bit is the smallest unit of digital data and can hold a value of either 0 or 1. Network speeds are often measured in bits per second (bps, Mbps, Gbps), while file sizes are measured in bytes."}}, {"@type": "Question", "name": "How do I convert MB to GB?", "acceptedAnswer": {"@type": "Answer", "text": "In the decimal system: 1 GB = 1,000 MB, so divide MB by 1,000. In the binary system: 1 GiB = 1,024 MiB, so divide MiB by 1,024. For example, 5,000 MB ÷ 1,000 = 5 GB, or 5,000 MiB ÷ 1,024 ≈ 4.88 GiB."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="gz-mode" id="modePicker"></div>

  </div>

</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Data Storage & Size Converter',
    toolDesc: 'Convert between bits, bytes, KB, MB, GB, TB, PB and binary units (KiB, MiB, GiB) — instantly and free.',
    swap: 'Swap',
    clear: 'Clear',
    copy: 'Copy',
    decimal: 'Decimal (1 KB = 1000 B)',
    binary: 'Binary (1 KiB = 1024 B)',
    both: 'Show both',
    step1: 'Choose decimal (SI) or binary (IEC) mode',
    step2: 'Enter a value in the input field',
    step3: 'Select the source and target unit',
    step4: 'The result updates instantly as you type',
  },
  zh: {
    toolTitle: '数据存储 / 数据大小转换器',
    toolDesc: '在 bit、Byte、KB、MB、GB、TB、PB 以及二进制单位（KiB、MiB、GiB）之间即时免费转换。',
    swap: '交换',
    clear: '清除',
    copy: '复制',
    decimal: '十进制 (1 KB = 1000 B)',
    binary: '二进制 (1 KiB = 1024 B)',
    both: '显示两者',
    step1: '选择十进制（SI）或二进制（IEC）模式',
    step2: '在输入框中输入数值',
    step3: '选择源单位和目标单位',
    step4: '输入时结果即时更新',
  }
});

const { $, copyText, t } = GZ;

// Base unit: bytes
const UNITS = [
  // bits family (factor = bytes per unit)
  { id: 'bit',  label: 'Bit (b)',     zh: '比特 (b)',     bytes: 1/8 },
  { id: 'kbit', label: 'Kilobit (kb)',zh: '千比特 (kb)',  bytes: 1000/8 },
  { id: 'Mbit', label: 'Megabit (Mb)',zh: '兆比特 (Mb)',  bytes: 1e6/8 },
  { id: 'Gbit', label: 'Gigabit (Gb)',zh: '吉比特 (Gb)',  bytes: 1e9/8 },
  // decimal (SI) bytes family
  { id: 'B',  label: 'Byte (B)',      zh: '字节 (B)',     bytes: 1 },
  { id: 'KB', label: 'Kilobyte (KB)', zh: '千字节 (KB)',  bytes: 1e3 },
  { id: 'MB', label: 'Megabyte (MB)', zh: '兆字节 (MB)',  bytes: 1e6 },
  { id: 'GB', label: 'Gigabyte (GB)', zh: '吉字节 (GB)',  bytes: 1e9 },
  { id: 'TB', label: 'Terabyte (TB)', zh: '太字节 (TB)',  bytes: 1e12 },
  { id: 'PB', label: 'Petabyte (PB)', zh: '拍字节 (PB)',  bytes: 1e15 },
  // binary (IEC) bytes family
  { id: 'KiB', label: 'Kibibyte (KiB)', zh: 'kibibyte (KiB)', bytes: Math.pow(2,10) },
  { id: 'MiB', label: 'Mebibyte (MiB)', zh: 'mebibyte (MiB)', bytes: Math.pow(2,20) },
  { id: 'GiB', label: 'Gibibyte (GiB)', zh: 'gibibyte (GiB)', bytes: Math.pow(2,30) },
  { id: 'TiB', label: 'Tebibyte (TiB)', zh: 'tebibyte (TiB)', bytes: Math.pow(2,40) },
  { id: 'PiB', label: 'Pebibyte (PiB)', zh: 'pebibyte (PiB)', bytes: Math.pow(2,50) },
];

const lang = GZI18n.getLang();

function buildOpts() {
  return UNITS.map(u => `<option value="${u.id}">${lang === 'zh' ? u.zh : u.label}</option>`).join('');
}

$('#converter').innerHTML = `
  <div class="gz-converter-row">
    <input type="number" id="inputVal" placeholder="0" step="any" oninput="convert()">
    <select id="fromUnit" onchange="convert()">${buildOpts()}</select>
  </div>
  <div class="gz-converter-row" style="justify-content:center">
    <button class="gz-btn gz-btn-secondary" onclick="swapUnits()">⇅ ${t('swap')}</button>
  </div>
  <div class="gz-converter-row">
    <input type="text" id="outputVal" readonly>
    <select id="toUnit" onchange="convert()">${buildOpts()}</select>
  </div>
  <div id="formulaDisplay" style="margin-top:8px;font-size:.85em;opacity:.7"></div>
`;

$('#modePicker').innerHTML = `
  <label><input type="radio" name="mode" value="decimal" checked onchange="convert()"> ${t('decimal')}</label>
  <label><input type="radio" name="mode" value="binary" onchange="convert()"> ${t('binary')}</label>
`;

$('#fromUnit').value = 'MB';
$('#toUnit').value = 'GB';

function convert() {
  const val = parseFloat($('#inputVal').value);
  if (isNaN(val)) { $('#outputVal').value = ''; $('#formulaDisplay').textContent = ''; return; }
  const from = UNITS.find(u => u.id === $('#fromUnit').value);
  const to = UNITS.find(u => u.id === $('#toUnit').value);
  const bytesVal = val * from.bytes;
  const result = bytesVal / to.bytes;
  $('#outputVal').value = result < 1 ? result.toPrecision(6) : parseFloat(result.toPrecision(12));
  const ratio = from.bytes / to.bytes;
  $('#formulaDisplay').textContent = `1 ${from.id} = ${parseFloat(ratio.toPrecision(8))} ${to.id}`;
}

function swapUnits() {
  const f = $('#fromUnit').value, tv = $('#toUnit').value;
  $('#fromUnit').value = tv; $('#toUnit').value = f; convert();
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="copyText($('#outputVal').value)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#inputVal').value='';$('#outputVal').value='';$('#formulaDisplay').textContent=''">${t('clear')}</button>
`;

convert();

GZ.renderToolPage({
  category: 'convert',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📏', href:'/convert/all-unit-converter.html', name:'Unit Converter'},
    {icon:'⏱️', href:'/convert/time-converter.html', name:'Time Converter'},
    {icon:'⚡', href:'/convert/speed-converter.html', name:'Speed Converter'},
    {icon:'🌐', href:'/calc/bandwidth-calculator.html', name:'Bandwidth Calculator'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
