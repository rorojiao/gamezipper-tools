<script>
GZI18n.register({
  en: {
    toolTitle: "Ohm's Law Calculator",
    toolDesc: "Solve Ohm's Law for voltage (V), current (I), resistance (R) or power (P). Enter any two known values and instantly get the rest with formulas. Built for electronics, circuit design and Arduino projects.",
    lblV: 'Voltage (V)',
    lblI: 'Current (A)',
    lblR: 'Resistance (Ω)',
    lblP: 'Power (W)',
    clear: 'Clear',
    formulas: 'Formulas: V = I × R · I = V ÷ R · R = V ÷ I · P = V × I = I² × R = V² ÷ R',
    errTwo: 'Enter any two known values (leave the other two blank).',
    step1: 'Enter any two of the four values (V, I, R, P)',
    step2: 'Leave the unknowns blank',
    step3: 'The calculator instantly solves for the rest',
    step4: 'Clear and reuse for a new circuit',
  },
  zh: {
    toolTitle: '欧姆定律计算器',
    toolDesc: '求解电压 (V)、电流 (I)、电阻 (R) 或功率 (P)。输入任意两个已知值，即时算出其余值并显示公式。适用于电子、电路设计和 Arduino 项目。',
    lblV: '电压 (V)',
    lblI: '电流 (A)',
    lblR: '电阻 (Ω)',
    lblP: '功率 (W)',
    clear: '清空',
    formulas: '公式：V = I × R · I = V ÷ R · R = V ÷ I · P = V × I = I² × R = V² ÷ R',
    errTwo: '请输入任意两个已知值（其余两项留空）。',
    step1: '输入四个值中的任意两个（V、I、R、P）',
    step2: '未知项留空',
    step3: '计算器即时算出其余值',
    step4: '清空后可重新计算新电路',
  }
});

const { $, t } = GZ;

$('#lbl-v').innerHTML = t('lblV');
$('#lbl-i').innerHTML = t('lblI');
$('#lbl-r').innerHTML = t('lblR');
$('#lbl-p').innerHTML = t('lblP');
$('#formulas').textContent = t('formulas');

function num(id) { const v = $('#'+id).value; return v === '' ? null : parseFloat(v); }
function fmt(n) {
  if (!isFinite(n)) return '—';
  const abs = Math.abs(n);
  if (abs !== 0 && (abs < 0.001 || abs >= 1e7)) return n.toExponential(3);
  return n.toLocaleString(undefined, {maximumFractionDigits:5});
}

function calc() {
  let V = num('V'), I = num('I'), R = num('R'), P = num('P');
  const filled = [V, I, R, P].filter(x => x !== null).length;

  if (filled < 2) {
    $('#results').style.display = 'none';
    $('#out-v').textContent = $('#out-i').textContent = $('#out-r').textContent = $('#out-p').textContent = '';
    return;
  }

  // Solve based on pairs available. Prioritize V & I & R trio.
  if (V === null && I !== null && R !== null) V = I * R;
  else if (I === null && V !== null && R !== null) I = V / R;
  else if (R === null && V !== null && I !== null) R = V / I;
  // Now try to derive power
  if (V !== null && I !== null && P === null) P = V * I;
  if (V !== null && R !== null && P === null && R !== 0) P = (V * V) / R;
  if (I !== null && R !== null && P === null) P = I * I * R;
  // Backfill missing V/I/R from power if possible
  if (P !== null && V !== null && I === null && V !== 0) I = P / V;
  if (P !== null && I !== null && V === null && I !== 0) V = P / I;
  if (P !== null && I !== null && R === null && I !== 0) R = P / (I * I);
  if (P !== null && V !== null && R === null && V !== 0) R = (V * V) / P;

  $('#out-v').textContent = V !== null && isFinite(V) ? fmt(V) + ' V' : '—';
  $('#out-i').textContent = I !== null && isFinite(I) ? fmt(I) + ' A' : '—';
  $('#out-r').textContent = R !== null && isFinite(R) ? fmt(R) + ' Ω' : '—';
  $('#out-p').textContent = P !== null && isFinite(P) ? fmt(P) + ' W' : '—';
  $('#results').style.display = 'block';
}

['V','I','R','P'].forEach(id => $('#'+id).addEventListener('input', calc));

$('#toolbar').innerHTML = `
  <button class="gz-btn gz-btn-secondary" onclick="['V','I','R','P'].forEach(id=>document.getElementById(id).value='');calc()">${t('clear')}</button>`;

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'💡', href:'/calc/led-resistor-calculator.html', name:'LED Resistor'},
    {icon:'🔋', href:'/calc/voltage-divider-calculator.html', name:'Voltage Divider'},
    {icon:'⚡', href:'/calc/wattage-calculator.html', name:'Wattage'},
    {icon:'⚡', href:'/calc/electricity-cost.html', name:'Electricity Cost'},
  ]
});
</script>
