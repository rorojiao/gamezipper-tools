    const variant = parsed.variant;
    if (!variant) base.push(css);
    else if (BREAKPOINTS[variant]) {
      if (!responsive[variant]) responsive[variant] = [];
      responsive[variant].push(css);
    } else if (['hover','focus','active','disabled','visited','first','last','odd','even'].includes(variant)) {
      const key = ':'+variant;
      if (!state[key]) state[key] = [];
      state[key].push(css);
    } else if (variant.includes('-')) {
      const [bp, st] = variant.split('-');
      if (BREAKPOINTS[bp]) {
        const key = bp+':'+st;
        if (!both[key]) both[key] = [];
        both[key].push(css);
      } else { unmatched++; unmatchedList.push(cls); }
    } else { unmatched++; unmatchedList.push(cls); }
  });

  let out = '<span class="sel">.element</span> {\n';
  base.forEach(rule => {
    Object.entries(rule).forEach(([k,v]) => out += `  <span class="prop">${k}</span>: <span class="val">${escapeHtml(v)}</span>;\n`);
  });
  out += '}\n';

  Object.entries(responsive).forEach(([bp, rules]) => {
    out += `\n<span class="sel">@media</span> (min-width: <span class="val">${BREAKPOINTS[bp]}</span>) {\n  <span class="sel">.element</span> {\n`;
    rules.forEach(rule => {
      Object.entries(rule).forEach(([k,v]) => out += `    <span class="prop">${k}</span>: <span class="val">${escapeHtml(v)}</span>;\n`);
    });
    out += '  }\n}\n';
  });

  Object.entries(state).forEach(([pseudo, rules]) => {
    out += `\n<span class="sel">.element${escapeHtml(pseudo)}</span> {\n`;
    rules.forEach(rule => {
      Object.entries(rule).forEach(([k,v]) => out += `  <span class="prop">${k}</span>: <span class="val">${escapeHtml(v)}</span>;\n`);
    });
    out += '}\n';
  });

  Object.entries(both).forEach(([key, rules]) => {
    const [bp, st] = key.split(':');
    out += `\n<span class="sel">@media</span> (min-width: <span class="val">${BREAKPOINTS[bp]}</span>) {\n  <span class="sel">.element:${st}</span> {\n`;
    rules.forEach(rule => {
      Object.entries(rule).forEach(([k,v]) => out += `    <span class="prop">${k}</span>: <span class="val">${escapeHtml(v)}</span>;\n`);
    });
    out += '  }\n}\n';
  });

  if (unmatchedList.length) {
    out += `\n<span class="prop">/* Unmatched classes (no conversion available):</span>\n`;
    unmatchedList.forEach(c => out += `<span class="prop">   ${escapeHtml(c)}</span>\n`);
    out += `<span class="prop"> */</span>`;
  }

  $('#output').innerHTML = out;
  $('#stats').innerHTML = `<div class="tw-stat"><div class="n">${classes.length}</div><div class="l">Total</div></div><div class="tw-stat"><div class="n" style="color:var(--success)">${matched}</div><div class="l">Converted</div></div><div class="tw-stat"><div class="n" style="color:var(--gz-accent)">${unmatched}</div><div class="l">Unmatched</div></div>`;

  // Apply to preview
  let previewStyle = '';
  base.forEach(rule => Object.entries(rule).forEach(([k,v]) => previewStyle += `${k}:${v};`));
  $('#previewEl').setAttribute('style', previewStyle);
  $('#previewBox').style.display = 'block';
}
