  zh: {

    toolDesc: '在线生成 Codabar（NW-7、USD-4）条形码。可编码 0-9 数字和 - $ : / . 符号，支持 A B C D 起止字符。常用于图书馆、血库和快递信封。可下载 SVG/PNG — 100% 浏览器本地运行。',
    lblData: '数据',
    lblStart: '起始字符',
    lblStop: '终止字符',
    lblScale: '缩放',
    lblHeight: '高度',
    lblShowText: '显示文字',
    downloadSvg: '下载 SVG',
    downloadPng: '下载 PNG',
    empty: '请在上方输入数据以生成条形码。',
    encoded: (d, s, e) => `已编码 "${d}"，起止字符 ${s}...${e}`,
    notInSet: '部分字符不在 Codabar 字符集中，已被忽略。',
    step1: '输入数字 0-9 和符号 - $ : / .（不能含字母）',
    step2: '选择起始和终止字符（A B C D — 通常用 A 和 A）',
    step3: '根据需要调整缩放和高度',
    step4: '下载为 SVG（矢量）或 PNG（位图）',
  }
});

const { $, copyText, t } = GZ;

// Codabar: 7 modules per character (4 bars, 3 spaces). Pattern encoded as '0'/'1'.
// Standard character set: 0-9, -, $, :, /, ., plus A B C D as start/stop.
const CODABAR = {
  '0':'0000011','1':'0000110','2':'0001001','3':'1100000','4':'0010010',
  '5':'1000010','6':'0100000','7':'0100100','8':'0101000','9':'0011000',
  '-':'0001100','$':'0011010',':':'0110100','/':'0101001','.':'0010110',
  'A':'0011010','B':'0011010','C':'0001001','D':'0010010'
};
// Note: The pattern above is the legacy simplified form. Below is the canonical
// Codabar (NW-7) 7-module pattern table per ANSI/AIM BC3-1995; values are
// bar-space alternation widths.
const CANONICAL = {
  '0':'1010100','1':'1010110','2':'1010001','3':'1100010','4':'1000101',
  '5':'1010010','6':'1011000','7':'1011100','8':'1001110','9':'1101010',
  '-':'1001011','$':'1010011',':':'1101011','/':'1101101','.':'1011011',
  'A':'1110101','B':'1011101','C':'1110111','D':'1011110'
};

function generate() {
  const raw = ($('#data').value || '').toUpperCase();
  const svg = $('#barcode-svg');
  const info = $('#info');

  if (!raw) {
    svg.innerHTML = '';
    info.innerHTML = `<span style="color:var(--text2)">${t('empty')}</span>`;
    return;
  }

  // Filter to valid chars (no start/stop in middle)
  let clean = '';
  let hadInvalid = false;
  for (const ch of raw) {
    if (ch in CANONICAL && !'ABCD'.includes(ch)) clean += ch;
    else hadInvalid = true;
  }

  if (!clean) {
    svg.innerHTML = '';
    info.innerHTML = `<span style="color:var(--gz-accent)">${t('notInSet')}</span>`;
    return;
  }

  const start = $('#start').value;
  const stop = $('#stop').value;
  const seq = start + clean + stop;

  // Build bits: each character is 7 modules, inter-character gap is 1 narrow space.
  let bits = '';
  for (let i = 0; i < seq.length; i++) {
    bits += CANONICAL[seq[i]];
    if (i < seq.length - 1) bits += '0'; // inter-character gap
  }

  const scale = parseInt($('#scale').value);
  const barH = parseInt($('#height').value);
  const unitW = scale;
  const quietZone = 10 * scale;
  const totalW = bits.length * unitW + quietZone * 2;
  const textH = $('#showtext').checked ? 20 : 0;
  const totalH = barH + textH;
  const textY = barH + 16;

  let rects = '';
  for (let i = 0; i < bits.length; i++) {
    if (bits[i] === '1') {
      rects += `<rect x="${quietZone + i * unitW}" y="0" width="${unitW}" height="${barH}" fill="#000"/>`;
    }
  }
  let textEl = '';
  if ($('#showtext').checked) {
    textEl = `<text x="${totalW/2}" y="${textY}" font-family="monospace" font-size="14" fill="#000" text-anchor="middle" letter-spacing="2">${start}${clean}${stop}</text>`;
  }

  svg.setAttribute('width', totalW);
  svg.setAttribute('height', totalH);
  svg.setAttribute('viewBox', `0 0 ${totalW} ${totalH}`);
  svg.innerHTML = `<rect x="0" y="0" width="${totalW}" height="${totalH}" fill="#fff"/>${rects}${textEl}`;

  let infoHtml = `<span style="color:var(--gz-success)">✓ ${t('encoded')(clean, start, stop)}</span>`;
  if (hadInvalid) infoHtml += ` <span style="color:var(--gz-accent)">⚠ ${t('notInSet')}</span>`;
  info.innerHTML = infoHtml;
}

$('#data').addEventListener('input', generate);
$('#start').addEventListener('change', generate);
$('#stop').addEventListener('change', generate);
$('#scale').addEventListener('input', e => { $('#scale-val').textContent = e.target.value + 'x'; generate(); });
$('#height').addEventListener('input', e => { $('#height-val').textContent = e.target.value + 'px'; generate(); });
$('#showtext').addEventListener('change', generate);

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="downloadSvg()">${t('downloadSvg')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="downloadPng()">${t('downloadPng')}</button>`;

function downloadSvg() {
  const svg = $('#barcode-svg');
  const clone = svg.cloneNode(true);
  const data = new XMLSerializer().serializeToString(clone);
  const blob = new Blob([data], {type: 'image/svg+xml'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `codabar-${Date.now()}.svg`;
  a.click();
  URL.revokeObjectURL(a.href);
}

function downloadPng() {
  const svg = $('#barcode-svg');
  const data = new XMLSerializer().serializeToString(svg);
  const img = new Image();
  const blob = new Blob([data], {type: 'image/svg+xml'});
  const url = URL.createObjectURL(blob);
  img.onload = function() {
    const canvas = document.createElement('canvas');
    canvas.width = img.width * 2;
    canvas.height = img.height * 2;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#fff';
    ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
    URL.revokeObjectURL(url);
    canvas.toBlob(function(b) {
      const a = document.createElement('a');
      a.href = URL.createObjectURL(b);
      a.download = `codabar-${Date.now()}.png`;
      a.click();
      URL.revokeObjectURL(a.href);
    });
  };
  img.src = url;
}

$('#lbl-data').textContent = t('lblData');
$('#lbl-start').textContent = t('lblStart');
$('#lbl-stop').textContent = t('lblStop');
$('#lbl-scale').textContent = t('lblScale');
$('#lbl-height').textContent = t('lblHeight');
$('#lbl-showtext').textContent = t('lblShowText');
$('#scale-val').textContent = '2x';
$('#height-val').textContent = '100px';

generate();

});
</script>
