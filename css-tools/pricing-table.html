.pt-tier .desc{font-size:.85em;text-align:center;color:#666;margin-bottom:18px;min-height:36px}
.pt-features{list-style:none;padding:0;margin:0 0 22px;font-size:.9em}
.pt-features li{padding:6px 0;display:flex;align-items:center;gap:6px}
.pt-features li.no{opacity:.4;text-decoration:line-through}
.pt-features li::before{content:"✓";color:var(--accent-color,#5566ff);font-weight:700;flex-shrink:0}
.pt-features li.no::before{content:"✕";color:#ccc}
.pt-cta{display:block;width:100%;padding:12px;text-align:center;background:var(--accent-color,#5566ff);color:#fff;text-decoration:none;border-radius:10px;font-weight:700;border:none;cursor:pointer;font-size:1rem;transition:.2s}
.pt-cta:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(85,102,255,.4)}
.pt-badge{position:absolute;top:-12px;left:50%;transform:translateX(-50%);background:var(--accent-color,#5566ff);color:#fff;padding:4px 14px;border-radius:20px;font-size:.7rem;font-weight:700;letter-spacing:.5px;text-transform:uppercase}
.pt-out{background:#0d1117;color:#c9d1d9;padding:16px;border-radius:10px;font-family:monospace;font-size:.78em;line-height:1.55;overflow-x:auto;max-height:280px;overflow-y:auto;white-space:pre;margin-top:14px}
textarea.pt-features-in{width:100%;min-height:80px;font-family:monospace;font-size:.85em;padding:8px;border:1px solid var(--border);border-radius:8px;background:var(--glass2);color:var(--text);resize:vertical;box-sizing:border-box}

<script>
GZI18n.register({
  en: {
    toolTitle: 'CSS Pricing Table Generator',
    toolDesc: 'Design beautiful pricing tables for SaaS sites with live preview. Customize tiers, features, prices, badges, colors and CTA buttons — get production-ready code.',
    lblAccent: 'Accent color', lblBg: 'Card background', lblRadius: 'Border radius',
    lblTier1: 'Tier 1 name', lblTier2: 'Tier 2 name', lblTier3: 'Tier 3 name', lblBadge: 'Popular badge',
    lblFeatures1: 'Tier 1 features (one per line)',
    lblFeatures2: 'Tier 2 features (one per line)',
    lblFeatures3: 'Tier 3 features (one per line)',
    lblCode: 'Generated HTML + CSS',
    btnCopy: 'Copy Code',
    pMonth: '/month', pFree: 'Free', pEach: 'Custom',
    cta1: 'Get Started', cta2: 'Start Free Trial', cta3: 'Contact Sales',
    desc1: 'Perfect for individuals', desc2: 'Best for growing teams', desc3: 'For large organizations',
    step1: 'Pick your accent color and card style',
    step2: 'Edit tier names, prices and features in the panel',
    step3: 'Watch the preview update in real time',
    step4: 'Copy the HTML+CSS and drop it into your site',
  },
  zh: {
    toolTitle: 'CSS 价格表格生成器',
    toolDesc: '为 SaaS 站点设计精美的价格表，实时预览。自定义套餐、特性、价格、徽章、颜色和按钮 — 生成生产可用的代码。',
    lblAccent: '主题色', lblBg: '卡片背景', lblRadius: '圆角',
    lblTier1: '套餐 1 名称', lblTier2: '套餐 2 名称', lblTier3: '套餐 3 名称', lblBadge: '热门徽章',
    lblFeatures1: '套餐 1 特性（每行一个）',
    lblFeatures2: '套餐 2 特性（每行一个）',
    lblFeatures3: '套餐 3 特性（每行一个）',
    lblCode: '生成的 HTML + CSS',
    btnCopy: '复制代码',
    pMonth: '/月', pFree: '免费', pEach: '定制',
    cta1: '开始使用', cta2: '免费试用', cta3: '联系销售',
    desc1: '适合个人用户', desc2: '适合成长中的团队', desc3: '适合大型企业',
    step1: '选择主题色和卡片样式',
    step2: '在面板中编辑套餐名称、价格和特性',
    step3: '实时查看预览效果',
    step4: '复制 HTML+CSS 并嵌入你的网站',
  }
});

const { $, copyText, t } = GZ;

const TIERS = [
  {price:'$9',nameId:'t1n',featsId:'f1',descId:'desc1',ctaId:'cta1',priceId:'pMonth'},
  {price:'$29',nameId:'t2n',featsId:'f2',descId:'desc2',ctaId:'cta2',priceId:'pMonth',popular:true},
  {price:'$99',nameId:'t3n',featsId:'f3',descId:'desc3',ctaId:'cta3',priceId:'pMonth'},
];

function render() {
  const accent = $('#accent').value;
  const bg = $('#bg').value;
  const radius = +$('#radius').value;
  const badge = $('#badge').value;
  document.documentElement.style.setProperty('--accent-color', accent);
  $('#tiers').style.setProperty('--accent-color', accent);
  const tiersHtml = TIERS.map((tier,i) => {
    const name = $('#'+tier.nameId).value;
    const featsRaw = $('#'+tier.featsId).value;
    const feats = featsRaw.split('\n').filter(l=>l.trim());
    const desc = t(tier.descId);
    const cta = t(tier.ctaId);
    return `<div class="pt-tier${tier.popular?' popular':''}">
      ${tier.popular && badge ? `<div class="pt-badge">${badge}</div>` : ''}
      <h3>${name}</h3>
      <div class="desc">${desc}</div>
      <div class="price">${tier.price}<small>${t('pMonth')}</small></div>
      <ul class="pt-features">${feats.map(f=>`<li>${f}</li>`).join('')}</ul>
      <button class="pt-cta">${cta}</button>
    </div>`;
  }).join('');
  $('#tiers').innerHTML = tiersHtml;
  $('#tiers').querySelectorAll('.pt-tier').forEach(el => {
    el.style.background = bg;
    el.style.borderRadius = radius + 'px';
  });
  generateCode();
}

function generateCode() {
  const accent = $('#accent').value;
  const bg = $('#bg').value;
  const radius = +$('#radius').value;
  const badge = $('#badge').value;
  let html = '<div class="pricing-tiers">\n';
  TIERS.forEach((tier,i) => {
    const name = $('#'+tier.nameId).value;
    const featsRaw = $('#'+tier.featsId).value;
    const feats = featsRaw.split('\n').filter(l=>l.trim());
    const desc = t(tier.descId);
    const cta = t(tier.ctaId);
    html += `  <div class="pricing-tier${tier.popular?' popular':''}">\n`;
    if (tier.popular && badge) html += `    <div class="pricing-badge">${badge}</div>\n`;
    html += `    <h3>${name}</h3>\n    <p class="pricing-desc">${desc}</p>\n`;
    html += `    <div class="pricing-price">${tier.price}<small>${t('pMonth')}</small></div>\n`;
    html += `    <ul class="pricing-features">\n`;
    feats.forEach(f => { html += `      <li>${f}</li>\n`; });
    html += `    </ul>\n    <button class="pricing-cta">${cta}</button>\n  </div>\n`;
  });
  html += '</div>';
  const css = `/* === Pricing Table CSS === */
:root { --accent: ${accent}; --card-bg: ${bg}; --card-radius: ${radius}px; }
.pricing-tiers { display: flex; gap: 18px; flex-wrap: wrap; justify-content: center; }
.pricing-tier {
  background: var(--card-bg);
  color: #222;
  border-radius: var(--card-radius);
  padding: 32px 26px;
  min-width: 240px; max-width: 280px;
  position: relative;
  box-shadow: 0 12px 40px rgba(0,0,0,0.15);
  transition: transform 0.3s;
}
.pricing-tier:hover { transform: translateY(-4px); }
.pricing-tier.popular { transform: scale(1.05); border: 2px solid var(--accent); z-index: 2; }
.pricing-badge {
  position: absolute; top: -12px; left: 50%; transform: translateX(-50%);
  background: var(--accent); color: #fff; padding: 4px 14px; border-radius: 20px;
  font-size: 0.7rem; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase;
}
.pricing-tier h3 { margin: 0 0 4px; font-size: 1.3rem; text-align: center; }
.pricing-desc { text-align: center; color: #666; font-size: 0.85em; min-height: 36px; }
.pricing-price { font-size: 2.6rem; font-weight: 900; text-align: center; margin: 14px 0 6px; }
.pricing-price small { font-size: 0.9rem; font-weight: 500; opacity: 0.7; }
.pricing-features { list-style: none; padding: 0; margin: 0 0 22px; font-size: 0.9em; }
.pricing-features li { padding: 6px 0; }
.pricing-features li::before { content: "✓ "; color: var(--accent); font-weight: 700; }
.pricing-cta {
  display: block; width: 100%; padding: 12px; text-align: center;
  background: var(--accent); color: #fff; text-decoration: none;
  border-radius: 10px; font-weight: 700; border: none; cursor: pointer;
  font-size: 1rem; transition: 0.2s;
}
.pricing-cta:hover { transform: translateY(-2px); box-shadow: 0 6px 20px ${accent}55; }`;
  $('#output').textContent = css + '\n\n/* === HTML === */\n' + html;
}

['accent','bg','radius','t1n','t2n','t3n','badge','f1','f2','f3'].forEach(id => {
  $('#'+id).addEventListener('input', render);
});

$('#btn-copy').textContent = t('btnCopy');
$('#btn-copy').addEventListener('click', () => copyText($('#output').textContent));

render();

GZ.renderToolPage({
  category: 'css',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],

    {icon:'🔲', href:'/css-tools/box-shadow.html', name:'Box Shadow'},
    {icon:'🌈', href:'/css-tools/gradient.html', name:'CSS Gradient'},
  ]
});
</script>
