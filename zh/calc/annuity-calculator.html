<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is the difference between an ordinary annuity and an annuity due?", "acceptedAnswer": {"@type": "Answer", "text": "An ordinary annuity pays at the end of each period, while an annuity due pays at the beginning. Because each payment in an annuity due earns interest for one extra period, an annuity due is always worth more than an ordinary annuity with the same terms."}}, {"@type": "Question", "name": "What is the future value of an annuity formula?", "acceptedAnswer": {"@type": "Answer", "text": "FV = PMT × [((1 + i)^n - 1) / i], where PMT is the periodic payment, i is the interest rate per period, and n is the number of periods. For an annuity due multiply the result by (1 + i)."}}, {"@type": "Question", "name": "How is the present value of an annuity calculated?", "acceptedAnswer": {"@type": "Answer", "text": "PV = PMT × [(1 - (1 + i)^-n) / i]. It discounts each future payment back to today. The further out a payment, the less it is worth in present-day dollars."}}, {"@type": "Question", "name": "How do I convert an annual rate to a periodic rate?", "acceptedAnswer": {"@type": "Answer", "text": "Divide the nominal annual rate by the number of periods per year (12 for monthly, 4 for quarterly). For example, 6% annual / 12 = 0.5% per month. Likewise multiply years by the periods per year to get the total number of periods n."}}]}</script>

<body>
<div class="gz-container">

      <div class="gz-an-field"><label id="lbl-rate"></label><input type="number" id="rate" min="0" step="any" value="6"></div>
      <div class="gz-an-field"><label id="lbl-years"></label><input type="number" id="years" min="0" step="any" value="20"></div>
      <div class="gz-an-field"><label id="lbl-freq"></label><select id="freq"><option value="1">Annually</option><option value="4">Quarterly</option><option value="12" selected>Monthly</option></select></div>
      <div class="gz-an-field"><label id="lbl-type"></label><select id="type"><option value="ordinary" selected>Ordinary (end of period)</option><option value="due">Annuity due (start of period)</option></select></div>

<script>
GZI18n.register({
  en: {
    toolTitle: 'Annuity Calculator',
    toolDesc: 'Calculate the future value, present value, or periodic payout of an annuity. Supports ordinary annuity and annuity due, monthly/quarterly/annual compounding, and custom interest rate and term. Free, private, runs entirely in your browser.',
    modeFuture: 'Future Value',
    modePresent: 'Present Value',
    modePayout: 'Payout',
    lblPmt: 'Payment or principal (per period / total)',
    lblRate: 'Annual interest rate (%)',
    lblYears: 'Term (years)',
    lblFreq: 'Payment frequency',
    lblType: 'Annuity type',
    calc: 'Calculate',
    clear: 'Clear',
    nPrimary: 'Future value',
    nPrimaryPv: 'Present value',
    nPrimaryPay: 'Periodic payout',
    nSecondary: 'Present value',
    nSecondaryFv: 'Total future value',
    nContrib: 'Total contributions',
    nInterest: 'Total interest earned',
    nPeriods: 'Number of periods',
    nPerrate: 'Rate per period',
    formulas: 'Future Value: FV = PMT × [((1 + i)ⁿ − 1) / i] · Present Value: PV = PMT × [(1 − (1 + i)⁻ⁿ) / i] · Payout: PMT = PV × [i / (1 − (1 + i)⁻ⁿ)] — multiply by (1 + i) for annuity due, where i = rate per period and n = total periods.',
    step1: 'Pick a mode: Future Value, Present Value, or Payout',
    step2: 'Enter the payment (or principal in payout mode) and annual interest rate',
    step3: 'Choose term, frequency, and ordinary vs. annuity due',
    step4: 'Read the headline result plus contributions, interest, and period details',
  },
  zh: {
    toolTitle: '年金计算器',
    toolDesc: '计算年金的终值、现值或每期支付额。支持普通年金和期初年金，月付/季付/年付复利，自定义利率和期限。免费、私密，全部在浏览器本地运行。',
    modeFuture: '终值',
    modePresent: '现值',
    modePayout: '每期支付',
    lblPmt: '付款额或本金（每期 / 总额）',
    lblRate: '年利率（%）',
    lblYears: '期限（年）',
    lblFreq: '支付频率',
    lblType: '年金类型',
    calc: '计算',
    clear: '清空',
    nPrimary: '终值',
    nPrimaryPv: '现值',
    nPrimaryPay: '每期支付额',
    nSecondary: '现值',
    nSecondaryFv: '终值合计',
    nContrib: '累计投入',
    nInterest: '累计利息',
    nPeriods: '期数',
    nPerrate: '每期利率',
    formulas: '终值：FV = PMT × [((1 + i)ⁿ − 1) / i] · 现值：PV = PMT × [(1 − (1 + i)⁻ⁿ) / i] · 每期支付：PMT = PV × [i / (1 − (1 + i)⁻ⁿ)] — 期初年金再乘以 (1 + i)，其中 i = 每期利率，n = 总期数。',
    step1: '选择模式：终值、现值或每期支付',
    step2: '输入付款额（支付模式下为本金）和年利率',
    step3: '选择期限、频率以及普通/期初年金',
    step4: '查看主要结果，以及投入、利息和期数详情',
  }
});

const { $, t } = GZ;

let mode = 'future'; // future | present | payout

function fmt(n, prefix) {
  if (!isFinite(n)) return '—';
  const s = n.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  return (prefix || '') + s;
}

function setMode(m) {
  mode = m;
  $('#modes').querySelectorAll('button').forEach(b => b.classList.toggle('active', b.dataset.m === m));
  $('#lbl-pmt').textContent = m === 'payout' ? t('lblPmt') : t('lblPmt');
  // Update placeholder meaning via aria not needed; recalc
  calc();
}

function calc() {
  const pmt = parseFloat($('#pmt').value);
  const annualRate = parseFloat($('#rate').value);
  const years = parseFloat($('#years').value);
  const freq = parseInt($('#freq').value);
  const isDue = $('#type').value === 'due';

  if (!isFinite(pmt) || pmt < 0 || !isFinite(annualRate) || annualRate < 0 || !isFinite(years) || years < 0) {
    $('#results').style.display = 'none';
    return;
  }

  const i = annualRate / 100 / freq; // rate per period
  const n = years * freq;             // total periods
  const dueFactor = isDue ? (1 + i) : 1;

  let primary, secondary, contrib, interest;

  if (mode === 'future') {
    // FV of annuity
    const factor = i === 0 ? n : (Math.pow(1 + i, n) - 1) / i;
    primary = pmt * factor * dueFactor;
    contrib = pmt * n;
    interest = primary - contrib;
    secondary = i === 0 ? primary : pmt * ((1 - Math.pow(1 + i, -n)) / i) * dueFactor; // PV
    $('#n-primary').textContent = t('nPrimary');
    $('#n-secondary').textContent = t('nSecondary');
  } else if (mode === 'present') {
    // PV of annuity
    const factor = i === 0 ? n : (1 - Math.pow(1 + i, -n)) / i;
    primary = pmt * factor * dueFactor;
    contrib = pmt * n;
    // For PV mode, interest doesn't really apply; show future equivalent
    secondary = i === 0 ? contrib : pmt * ((Math.pow(1 + i, n) - 1) / i) * dueFactor;
    interest = secondary - contrib;
    $('#n-primary').textContent = t('nPrimaryPv');
    $('#n-secondary').textContent = t('nSecondaryFv');
  } else {
    // payout: pmt is principal, solve periodic payout
    const principal = pmt;
    const payout = i === 0 ? principal / n : principal * (i / (1 - Math.pow(1 + i, -n))) / dueFactor;
    primary = payout;
    contrib = principal;
    interest = payout * n - principal;
    secondary = payout * n;
    $('#n-primary').textContent = t('nPrimaryPay');
    $('#n-secondary').textContent = t('nSecondaryFv');
  }

  $('#out-primary').textContent = fmt(primary, '$');
  $('#out-secondary').textContent = fmt(secondary, '$');
  $('#out-contrib').textContent = fmt(contrib, '$');
  $('#out-interest').textContent = fmt(interest, '$');
  $('#out-periods').textContent = n + ' (' + years + 'y × ' + freq + '/y)';
  $('#out-perrate').textContent = fmt(i * 100) + '%';
  $('#n-contrib').textContent = t('nContrib');
  $('#n-interest').textContent = t('nInterest');
  $('#n-periods').textContent = t('nPeriods');
  $('#n-perrate').textContent = t('nPerrate');

  $('#results').style.display = 'block';
}

['pmt','rate','years','freq','type'].forEach(id => $('#' + id).addEventListener('input', calc));
$('#freq').addEventListener('change', calc);
$('#type').addEventListener('change', calc);

$('#lbl-rate').textContent = t('lblRate');
$('#lbl-years').textContent = t('lblYears');
$('#lbl-freq').textContent = t('lblFreq');
$('#lbl-type').textContent = t('lblType');
$('#lbl-pmt').textContent = t('lblPmt');
$('#formulas').textContent = t('formulas');

$('#modes').innerHTML = `
  <button class="gz-btn active" data-m="future" onclick="setMode('future')">${t('modeFuture')}</button>
  <button class="gz-btn gz-btn-secondary" data-m="present" onclick="setMode('present')">${t('modePresent')}</button>
  <button class="gz-btn gz-btn-secondary" data-m="payout" onclick="setMode('payout')">${t('modePayout')}</button>`;

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="calc()">${t('calc')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="['pmt','rate','years'].forEach(id=>document.getElementById(id).value='0');calc()">${t('clear')}</button>`;

calc();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📈', href:'/calc/compound-interest-calculator.html', name:'Compound Interest'},
    {icon:'🏦', href:'/calc/mortgage-calculator.html', name:'Mortgage'},
    {icon:'🎯', href:'/calc/savings-goal-calculator.html', name:'Savings Goal'},
    {icon:'💎', href:'/calc/retirement-calculator.html', name:'Retirement'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
