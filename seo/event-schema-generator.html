<body>
<div class="gz-container">
  <div class="gz-tool-header"><h1 id="title"></h1><p class="desc" id="desc"></p></div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="gz-split">
      <div><div class="form-grid" id="form"></div></div>
      <div>
        <label style="display:block;font-size:.78em;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px">JSON-LD</label>
        <div class="gz-output" id="output"></div>
      </div>
    </div>
    <div id="status"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Event Schema Generator',
    toolDesc: 'Build valid Event JSON-LD with start/end dates, location, organizer, ticket offers and status for Google event rich results.',
    generate: 'Generate', example: 'Example', copy: 'Copy', clear: 'Clear',
    lblName: 'Event name', lblType: 'Event type', lblDesc: 'Description', lblImg: 'Image URL',
    lblStart: 'Start date/time', lblEnd: 'End date/time', lblStatus: 'Event status', lblMode: 'Attendance mode',
    lblVenue: 'Venue name', lblStreet: 'Street address', lblCity: 'City', lblRegion: 'Region / State', lblZip: 'Postal code', lblCountry: 'Country (ISO 2)',
    lblOrg: 'Organizer name', lblPrice: 'Ticket price', lblCurrency: 'Currency (ISO)', lblAvail: 'Ticket availability', lblUrl: 'Ticket URL',
    step1: 'Enter the event name, type and a short description.',
    step2: 'Set the start and end date/time.',
    step3: 'Add the venue location and organizer.',
    step4: 'Optionally add ticket price and copy the JSON-LD.',
  },
  zh: {
    toolTitle: '活动 Schema 生成器',
    toolDesc: '生成符合规范的 Event JSON-LD，包含起止时间、地点、主办方、票务和状态，助力 Google 活动富结果。',
    generate: '生成', example: '示例', copy: '复制', clear: '清空',
    lblName: '活动名称', lblType: '活动类型', lblDesc: '描述', lblImg: '图片 URL',
    lblStart: '开始日期 / 时间', lblEnd: '结束日期 / 时间', lblStatus: '活动状态', lblMode: '参与方式',
    lblVenue: '场地名称', lblStreet: '街道地址', lblCity: '城市', lblRegion: '省 / 州', lblZip: '邮政编码', lblCountry: '国家代码 (ISO 2)',
    lblOrg: '主办方名称', lblPrice: '票价', lblCurrency: '货币代码 (ISO)', lblAvail: '票务状态', lblUrl: '购票链接',
    step1: '填写活动名称、类型和简短描述。',
    step2: '设置起止日期和时间。',
    step3: '添加场地位置和主办方。',
    step4: '可选：添加票价并复制 JSON-LD。',
  }
});
const { $, copyText, t } = GZ;
const E_TYPES = ['Event','BusinessEvent','ChildrensEvent','ComedyEvent','CourseInstance','DanceEvent','EducationEvent','ExhibitionEvent','Festival','FoodEvent','LiteraryEvent','MusicEvent','SocialEvent','SportsEvent','TheaterEvent','VisualArtsEvent'];
const STATUS = {'EventScheduled':'Scheduled','EventCancelled':'Cancelled','EventMovedOnline':'Moved Online','EventPostponed':'Postponed','EventRescheduled':'Rescheduled'};
const MODE = {'OfflineEventAttendanceMode':'Offline (in person)','OnlineEventAttendanceMode':'Online','MixedEventAttendanceMode':'Hybrid'};
const AVAIL = {'InStock':'Available','SoldOut':'Sold Out','PreOrder':'Pre-order'};

function field(id, labelKey, type='text', ph='', full=false, extra='') {
  return `<div class="fg ${full?'full':''}"><label>${t(labelKey)}</label><input id="f-${id}" type="${type}" placeholder="${ph}" ${extra}></div>`;
}
function selField(id, labelKey, opts) {
  return `<div class="fg"><label>${t(labelKey)}</label><select id="f-${id}">${Object.entries(opts).map(([k,v])=>`<option value="${k}">${v}</option>`).join('')}</select></div>`;
}

function buildForm() {
  $('#form').innerHTML =
    field('name','lblName','text','Summer Jazz Festival 2026', true) +
    `<div class="fg"><label>${t('lblType')}</label><select id="f-type">${E_TYPES.map(x=>`<option value="${x}">${x}</option>`).join('')}</select></div>` +
    selField('status','lblStatus', STATUS) +
    field('desc','lblDesc','text','An open-air evening of live jazz in the city park.', true) +
    field('img','lblImg','text','https://example.com/jazz.jpg') +
    selField('mode','lblMode', MODE) +
    field('start','lblStart','datetime-local') +
    field('end','lblEnd','datetime-local') +
    field('venue','lblVenue','text','City Park Amphitheater') +
    field('street','lblStreet','text','500 Park Avenue') +
    field('city','lblCity','text','Austin') +
    field('region','lblRegion','text','TX') +
    field('zip','lblZip','text','78701') +
    `<div class="fg"><label>${t('lblCountry')}</label><input id="f-country" type="text" placeholder="US" maxlength="2"></div>` +
    field('org','lblOrg','text','Austin Live Music') +
    field('price','lblPrice','number','25.00', false,'step="0.01"') +
    field('currency','lblCurrency','text','USD') +
    selField('avail','lblAvail', AVAIL) +
    field('url','lblUrl','text','https://example.com/tickets');
}

function hl(json) {
  return json.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/("(\\u[\da-fA-F]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false)\b|-?\d+(\.\d+)?([eE][+-]?\d+)?)/g, m => {
      let c='gz-num'; if(/^"/.test(m)) c=/:$/.test(m)?'gz-key':'gz-str'; else if(/true|false/.test(m)) c='gz-bool';
      return `<span class="${c}">${m}</span>`;
    });
}

function iso(dt) { if(!dt) return ''; return new Date(dt).toISOString(); }

function gen() {
  const v = id => (document.getElementById('f-'+id)||{}).value || '';
  const data = { "@context":"https://schema.org", "@type": v('type') || 'Event', "name": v('name') };
  if (v('desc')) data.description = v('desc');
  if (v('img')) data.image = v('img');
  if (v('start')) data.startDate = iso(v('start'));
  if (v('end')) data.endDate = iso(v('end'));
  data.eventStatus = `https://schema.org/${v('status') || 'EventScheduled'}`;
  data.eventAttendanceMode = `https://schema.org/${v('mode') || 'OfflineEventAttendanceMode'}`;
  const hasLoc = v('venue')||v('street')||v('city')||v('region')||v('zip');
  if (hasLoc) {
    const place = { "@type":"Place", name: v('venue') || v('name') };
    const hasAddr = v('street')||v('city')||v('region')||v('zip')||v('country');
    if (hasAddr) {
      const a = { "@type":"PostalAddress" };
      if (v('street')) a.streetAddress = v('street');
      if (v('city')) a.addressLocality = v('city');
      if (v('region')) a.addressRegion = v('region');
      if (v('zip')) a.postalCode = v('zip');
      if (v('country')) a.addressCountry = v('country');
      place.address = a;
    }
    data.location = place;
  }
  if (v('org')) data.organizer = { "@type":"Organization", name: v('org') };
  if (v('price')) {
    const offer = { "@type":"Offer", price: parseFloat(v('price')) };
    if (v('currency')) offer.priceCurrency = v('currency');
    offer.availability = `https://schema.org/${v('avail') || 'InStock'}`;
    if (v('url')) offer.url = v('url');
    data.offers = offer;
  }
  $('#output').innerHTML = hl(JSON.stringify(data, null, 2));
  $('#status').innerHTML = `<span style="color:var(--gz-success);font-size:.85em">✓ ${data['@type']} · ${Object.keys(data).length} fields</span>`;
}

function example() {
  const set = (id,val) => { const e=document.getElementById('f-'+id); if(e) e.value=val; };
  set('name','Summer Jazz Festival 2026');
  document.getElementById('f-type').value = 'MusicEvent';
  set('desc','An open-air evening of live jazz featuring local and international artists.');
  set('img','https://example.com/jazz2026.jpg');
  set('start','2026-07-18T18:00');
  set('end','2026-07-18T23:00');
  set('venue','City Park Amphitheater');
  set('street','500 Park Avenue');
  set('city','Austin');
  set('region','TX');
  set('zip','78701');
  set('country','US');
  set('org','Austin Live Music');
  set('price','25.00');
  set('currency','USD');
  set('url','https://example.com/tickets/jazz2026');
  document.getElementById('f-status').value = 'EventScheduled';
  document.getElementById('f-mode').value = 'OfflineEventAttendanceMode';
  document.getElementById('f-avail').value = 'InStock';
  gen();
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="gen()">${t('generate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="example()">${t('example')}</button>
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="document.querySelectorAll('#form input').forEach(i=>i.value='');gen()">${t('clear')}</button>`;
$('#form').addEventListener('input', gen);

buildForm();
GZ.renderToolPage({
  category: 'seo',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🛍️', href:'/seo/product-schema-generator.html', name:'Product Schema Generator'},
    {icon:'⭐', href:'/seo/review-schema-generator.html', name:'Review Schema Generator'},
    {icon:'📋', href:'/seo/howto-schema-generator.html', name:'HowTo Schema Generator'},
    {icon:'🏪', href:'/seo/local-business-schema-generator.html', name:'Local Business Schema'},
  ]
});
example();
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
