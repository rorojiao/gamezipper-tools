<script>
GZI18n.register({
  en: {
    toolTitle: 'Random User Generator',
    toolDesc: 'Generate unlimited random fake user profiles — names, emails, phone numbers, addresses, usernames, passwords and avatars. Perfect for QA testing, mockups and development.',
    generate: 'Generate',
    count: 'Count',
    format: 'Format',
    copyAll: 'Copy All (JSON)',
    copyCSV: 'Copy CSV',
    clear: 'Clear',
    step1: 'Select the data fields you need using the chips',
    step2: 'Pick how many users to generate (1–100)',
    step3: 'Click Generate to create random user profiles',
    step4: 'Copy as JSON or CSV for your project or test suite',
  },
  zh: {
    toolTitle: '随机用户数据生成器',
    toolDesc: '生成无限量的随机虚构用户资料 — 姓名、邮箱、电话、地址、用户名、密码和头像。适合 QA 测试、原型设计和开发使用。',
    generate: '生成',
    count: '数量',
    format: '格式',
    copyAll: '复制全部 (JSON)',
    copyCSV: '复制 CSV',
    clear: '清空',
    step1: '使用标签选择需要的数据字段',
    step2: '选择要生成的用户数量（1–100）',
    step3: '点击「生成」创建随机用户资料',
    step4: '复制为 JSON 或 CSV，用于你的项目或测试套件',
  }
});

const { $, copyText, t } = GZ;

// Data pools
const firstNamesM = ['James','John','Robert','Michael','William','David','Richard','Joseph','Thomas','Charles','Christopher','Daniel','Matthew','Anthony','Mark','Donald','Steven','Paul','Andrew','Joshua','Kenneth','Kevin','Brian','George','Edward','Ronald','Timothy','Jason','Jeffrey','Ryan','Jacob','Gary','Nicholas','Eric','Jonathan','Stephen','Larry','Justin','Scott','Brandon','Benjamin','Samuel','Gregory','Frank','Alexander','Raymond','Patrick','Jack','Dennis','Jerry','Tyler','Aaron','Jose','Henry','Nathan','Douglas','Peter','Adam','Zachary'];
const firstNamesF = ['Mary','Patricia','Jennifer','Linda','Elizabeth','Barbara','Susan','Jessica','Sarah','Karen','Lisa','Nancy','Betty','Margaret','Sandra','Ashley','Kimberly','Emily','Donna','Michelle','Carol','Amanda','Dorothy','Melissa','Deborah','Stephanie','Rebecca','Sharon','Laura','Cynthia','Amy','Kathleen','Angela','Shirley','Brenda','Emma','Anna','Pamela','Nicole','Samantha','Katherine','Christine','Helen','Debra','Rachel','Carolyn','Janet','Catherine','Maria','Heather','Diane','Ruth','Julie','Olivia','Joyce','Virginia','Victoria','Kelly','Lauren'];
const lastNames = ['Smith','Johnson','Williams','Brown','Jones','Garcia','Miller','Davis','Rodriguez','Martinez','Hernandez','Lopez','Gonzalez','Wilson','Anderson','Thomas','Taylor','Moore','Jackson','Martin','Lee','Perez','Thompson','White','Harris','Sanchez','Clark','Ramirez','Lewis','Robinson','Walker','Young','Allen','King','Wright','Scott','Torres','Nguyen','Hill','Flores','Green','Adams','Nelson','Baker','Hall','Rivera','Campbell','Mitchell','Carter','Roberts'];
const streets = ['Main St','Oak Ave','Maple Dr','Cedar Ln','Park Blvd','Elm St','Washington Ave','Lake Dr','Hill Rd','Sunset Blvd','Pine St','Church St','High St','Spring St','Forest Dr','Meadow Ln','River Rd','Center St','Mill St','Walnut St','Franklin St','Union St','Jefferson St','Madison Ave','Monroe St','Adams St','Lincoln Way'];
const cities = ['Springfield','Franklin','Clinton','Madison','Georgetown','Salem','Fairview','Greenville','Riverside','Centerville','Oakwood','Fairfield','Lakeside','Kingston','Ashland','Manchester','Bristol','Oxford','Arlington','Burlington','Richmond','Dover','Brentwood','Manchester','Clayton','Hudson'];
const states = ['CA','TX','FL','NY','PA','IL','OH','GA','NC','MI','NJ','VA','WA','AZ','MA','TN','IN','MO','MD','WI','CO','MN','OR','NV','SC','OK','CT','UT','IA','AR'];
const domains = ['example.com','testmail.com','mailinator.com','dummy.org','fake.net','sample.io','temp.dev','placeholder.co'];
const avatarColors = ['#e94560','#00d672','#61afef','#d19a66','#c678dd','#56b6c2','#e5c07b','#ff6b6b','#4ecdc4','#45b7d1','#f9ca24','#6c5ce7','#a29bfe','#fd79a8','#fdcb6e','#6ab04c','#eb4d4b','#f0932b'];

const allFields = ['name','gender','email','username','password','phone','street','city','state','zip','avatar','dob','age','company','job'];

let selectedFields = new Set(['name','gender','email','username','phone']);
let userCount = 5;

function rand(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function randInt(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

function generateUser() {
  const gender = Math.random() > 0.5 ? 'M' : 'F';
  const first = gender === 'M' ? rand(firstNamesM) : rand(firstNamesF);
  const last = rand(lastNames);
  const full = first + ' ' + last;
  const user = {};
  const fields = Array.from(selectedFields);

  for (const f of fields) {
    switch(f) {
      case 'name': user.name = full; break;
      case 'gender': user.gender = gender === 'M' ? 'Male' : 'Female'; break;
      case 'email': user.email = (first.toLowerCase() + '.' + last.toLowerCase() + randInt(1,99) + '@' + rand(domains)).replace(/[^a-z0-9.@-]/g,''); break;
      case 'username': user.username = first.toLowerCase()[0] + last.toLowerCase() + randInt(10,999); break;
      case 'password': user.password = Array.from({length: 12}, () => 'ABCDEFGHJKMNPQRSTUVWXYZabcdefghijkmnpqrstuvwxyz23456789!@#$'[randInt(0,64)]).join(''); break;
      case 'phone': user.phone = '+1 (' + randInt(200,999) + ') ' + randInt(200,999) + '-' + String(randInt(0,9999)).padStart(4,'0'); break;
      case 'street': user.street = randInt(100,9999) + ' ' + rand(streets); break;
      case 'city': user.city = rand(cities); break;
      case 'state': user.state = rand(states); break;
      case 'zip': user.zip = String(randInt(10000,99999)); break;
      case 'avatar': user.avatar = rand(avatarColors); break;
      case 'dob': { const y = randInt(1955,2006); const m = String(randInt(1,12)).padStart(2,'0'); const d = String(randInt(1,28)).padStart(2,'0'); user.dob = `${y}-${m}-${d}`; break; }
      case 'age': user.age = randInt(18,70); break;
      case 'company': user.company = rand(lastNames) + ' ' + rand(['Inc','LLC','Corp','Group','Co','Solutions','Tech','Industries','Partners']); break;
      case 'job': user.job = rand(['Software Engineer','Product Manager','Designer','Analyst','Developer','Consultant','Director','Coordinator','Specialist','Architect','Lead','Manager','Intern']); break;
    }
  }
  return user;
}

function generateAll() {
  const users = [];
  for (let i = 0; i < userCount; i++) users.push(generateUser());
  return users;
}

function renderCards(users) {
  const out = $('#output');
  if (!users.length) { out.innerHTML = ''; return; }
  const grid = `<div class="user-grid">${users.map(u => {
    const av = u.avatar || rand(avatarColors);
    const initials = (u.name || '?').split(' ').map(s=>s[0]).join('').slice(0,2).toUpperCase();
    const fields = Object.entries(u).filter(([k]) => k !== 'avatar').map(([k,v]) => `<p><b style="color:var(--text2)">${k}:</b> ${String(v).length > 50 ? String(v).slice(0,50)+'…' : v}</p>`).join('');
    return `<div class="user-card"><div class="user-avatar" style="background:${av}">${initials}</div><div class="user-info"><h4>${u.name || 'User'}</h4>${fields}</div></div>`;
  }).join('')}</div>`;
  out.innerHTML = grid;
}

function doGenerate() { renderCards(generateAll()); }

function doCopyJSON() {
  const users = generateAll();
  copyText(JSON.stringify(users, null, 2));
}

function doCopyCSV() {
  const users = generateAll();
  if (!users.length) return;
  const headers = Object.keys(users[0]);
  const rows = users.map(u => headers.map(h => `"${String(u[h] || '').replace(/"/g,'""')}"`).join(','));
  copyText(headers.join(',') + '\n' + rows.join('\n'));
}

function doClear() { $('#output').innerHTML = ''; }

function buildFieldChips() {
  $('#fields').innerHTML = allFields.map(f =>
    `<span class="chip${selectedFields.has(f) ? ' active' : ''}" onclick="toggleField('${f}',this)">${f}</span>`
  ).join('');
}

function toggleField(f, el) {
  if (selectedFields.has(f)) selectedFields.delete(f);
  else selectedFields.add(f);
  el.classList.toggle('active');
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="doGenerate()">${t('generate')}</button>
  <select class="gz-select" onchange="userCount=+this.value">
    ${[1,3,5,10,20,50,100].map(n => `<option value="${n}" ${n===5?'selected':''}>${n} ${t('count')}</option>`).join('')}
  </select>
  <button class="gz-btn gz-btn-secondary" onclick="doCopyJSON()">${t('copyAll')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doCopyCSV()">${t('copyCSV')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

buildFieldChips();
doGenerate();

GZ.renderToolPage({
  category: 'dev',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📧', href:'/text/random-email-generator.html', name:'Random Email Gen'},
    {icon:'👤', href:'/text/random-name-generator.html', name:'Random Name Gen'},
    {icon:'🤖', href:'/dev/mock-data-generator.html', name:'Mock Data Gen'},
    {icon:'🔑', href:'/dev/password-generator.html', name:'Password Gen'},
  ]
});
</script>

</body>
