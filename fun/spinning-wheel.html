<script>
GZI18n.register({
  en: {
    toolTitle: 'Spinning Wheel — Random Name Picker',
    toolDesc: 'Paste a list of names, options or prizes and spin the wheel to pick a random winner. Great for classrooms, raffles, giveaways and quick decisions.',
    spin: 'SPIN',
    lblEntries: 'Entries (one per line)',
    lblSound: 'Tick sound while spinning',
    lblRm: 'Auto-remove winner after each spin',
    btnShuffle: 'Shuffle',
    btnSort: 'Sort A–Z',
    winLabel: 'Winner',
    winRemove: 'Remove winner',
    winAgain: 'Spin again',
    needEntries: 'Add at least one entry to spin.',
    step1: 'Type or paste your entries into the box — one name, option or prize per line',
    step2: 'Toggle the tick sound and auto-remove-winner mode as you like',
    step3: 'Click SPIN (or tap the wheel) to spin and land on a random winner',
    step4: 'Remove the winner and spin again for the next pick',
  },
  zh: {
    toolTitle: '随机转盘 — 抽名 / 抽奖工具',
    toolDesc: '粘贴名单、选项或奖品，转动转盘随机抽取。适合课堂点名、抽奖、活动赠品和快速决策。',
    spin: '转',
    lblEntries: '选项（每行一个）',
    lblSound: '转动时播放滴答音效',
    lblRm: '每次抽中后自动移除',
    btnShuffle: '打乱',
    btnSort: '按字母排序',
    winLabel: '中签',
    winRemove: '移除中签者',
    winAgain: '再转一次',
    needEntries: '至少添加一个选项才能转动。',
    step1: '在输入框中输入或粘贴选项 — 每行一个名字、选项或奖品',
    step2: '按需开启滴答音效和自动移除中签者',
    step3: '点击「转」（或直接点击转盘）旋转并随机抽出中签者',
    step4: '移除中签者后再次转动抽取下一位',
  }
});

const { $, t } = GZ;
const COLORS = ['#ef5350','#42a5f5','#66bb6a','#ffa726','#ab47bc','#26c6da','#ffca28','#ec407a','#7e57c2','#26a69a','#8d6e63','#5c6bc0'];
const canvas = $('#wheel');
const ctx = canvas.getContext('2d');
const CX = canvas.width/2, CY = canvas.height/2, R = canvas.width/2 - 6;
let angle = 0, spinning = false, entries = [];

function getEntries(){
  return $('#entries').value.split('\n').map(s=>s.trim()).filter(s=>s.length>0);
}

function draw(){
  entries = getEntries();
  ctx.clearRect(0,0,canvas.width,canvas.height);
  const n = entries.length;
  if(n === 0){ return; }
  const arc = (Math.PI*2)/n;
  ctx.save();
  ctx.translate(CX,CY);
  ctx.rotate(angle);
  for(let i=0;i<n;i++){
    const a0 = i*arc - Math.PI/2;
    const a1 = a0 + arc;
    ctx.beginPath();
    ctx.moveTo(0,0);
    ctx.arc(0,0,R,a0,a1);
    ctx.closePath();
    ctx.fillStyle = COLORS[i % COLORS.length];
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,.25)';
    ctx.lineWidth = 2;
    ctx.stroke();
    // text
    ctx.save();
    ctx.rotate(a0 + arc/2);
    ctx.textAlign = 'right';
    ctx.fillStyle = '#fff';
    const fontSize = Math.max(11, Math.min(20, Math.floor(R/9)));
    ctx.font = '700 '+fontSize+'px system-ui,sans-serif';
    let label = entries[i];
    const maxLen = Math.max(6, Math.floor(22 - n*0.15));
    if(label.length > maxLen) label = label.slice(0,maxLen-1)+'…';
    ctx.fillText(label, R-12, fontSize/3);
    ctx.restore();
  }
  ctx.restore();
  // hub
  ctx.beginPath();
  ctx.arc(CX,CY,18,0,Math.PI*2);
  ctx.fillStyle = '#fff';
  ctx.fill();
  ctx.strokeStyle = 'var(--accent)';
  ctx.lineWidth = 3;
  ctx.stroke();
}

// tick sound via WebAudio
let audioCtx = null;
function tick(){
  if(!$('#sound').checked) return;
  try{
    if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.frequency.value = 880;
    o.type = 'square';
    g.gain.value = 0.05;
    o.connect(g); g.connect(audioCtx.destination);
    o.start();
    g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.05);
    o.stop(audioCtx.currentTime + 0.06);
  }catch(e){}
}
function winDing(){
  if(!$('#sound').checked) return;
  try{
    if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
    [523,659,784,1047].forEach((f,i)=>{
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.frequency.value = f; o.type='triangle';
      g.gain.value = 0.0001;
      o.connect(g); g.connect(audioCtx.destination);
      const st = audioCtx.currentTime + i*0.09;
      o.start(st);
      g.gain.setValueAtTime(0.0001, st);
      g.gain.exponentialRampToValueAtTime(0.12, st+0.02);
      g.gain.exponentialRampToValueAtTime(0.0001, st+0.25);
      o.stop(st+0.27);
    });
  }catch(e){}
}

let lastTickIndex = -1;
function spin(){
  if(spinning) return;
  entries = getEntries();
  if(entries.length === 0){ GZ.showToast(t('needEntries')); return; }
  if(entries.length === 1){ showWinner(entries[0]); return; }
  spinning = true;
  $('#spin-btn').disabled = true;
  $('#winner-box').style.display = 'none';
  audioCtx && audioCtx.resume && audioCtx.resume();

  const spins = 5 + Math.random()*3; // full revolutions
  const target = angle + Math.PI*2*spins + Math.random()*Math.PI*2;
  const duration = 4200 + Math.random()*1200;
  const start = performance.now();
  const startAngle = angle;

  function frame(now){
    const p = Math.min(1, (now-start)/duration);
    const eased = 1 - Math.pow(1-p, 3); // easeOutCubic
    angle = startAngle + (target - startAngle) * eased;
    // tick on segment change
    const n = entries.length;
    const arc = Math.PI*2/n;
    const idx = Math.floor((( (-angle) % (Math.PI*2) + Math.PI*2) % (Math.PI*2)) / arc);
    if(idx !== lastTickIndex && p < 0.999){ tick(); lastTickIndex = idx; }
    draw();
    if(p < 1){ requestAnimationFrame(frame); }
    else { finishSpin(); }
  }
  requestAnimationFrame(frame);
}

function finishSpin(){
  spinning = false;
  $('#spin-btn').disabled = false;
  const n = entries.length;
  const arc = Math.PI*2/n;
  // pointer at top (angle -PI/2 world). segment under pointer:
  const norm = ((-angle - Math.PI/2) % (Math.PI*2) + Math.PI*2) % (Math.PI*2);
  // index where the top pointer lands
  let idx = Math.floor(((Math.PI*2 - norm) % (Math.PI*2)) / arc) % n;
  idx = (idx + n) % n;
  showWinner(entries[idx]);
}

function showWinner(name){
  $('#winner-box').style.display = '';
  $('#win-label').textContent = t('winLabel');
  $('#win-name').textContent = name;
  $('#win-remove').textContent = t('winRemove');
  $('#win-again').textContent = t('winAgain');
  lastWinner = name;
  winDing();
  if($('#rm-mode').checked){
    setTimeout(()=>{ if($('#winner-box').style.display !== 'none') removeWinner(); }, 1800);
  }
}

let lastWinner = '';
function removeWinner(){
  if(!lastWinner) return;
  const lines = $('#entries').value.split('\n');
  const at = lines.indexOf(lastWinner);
  if(at >= 0) lines.splice(at,1);
  $('#entries').value = lines.join('\n');
  lastWinner = '';
  $('#winner-box').style.display = 'none';
  draw();
}

function shuffleEntries(){
  const arr = getEntries();
  for(let i=arr.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]]; }
  $('#entries').value = arr.join('\n');
  draw();
}
function sortEntries(){
  const arr = getEntries().sort((a,b)=>a.localeCompare(b,undefined,{sensitivity:'base'}));
  $('#entries').value = arr.join('\n');
  draw();
}

// wire up labels
$('#spin-btn').textContent = t('spin');
$('#btn-shuffle').textContent = t('btnShuffle');
$('#btn-sort').textContent = t('btnSort');
$('#entries').addEventListener('input', draw);
canvas.addEventListener('click', ()=>{ if(!spinning) spin(); });

draw();

GZ.renderToolPage({
  category: 'fun',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🎲', href:'/fun/', name:'Fun Tools'},
    {icon:'🎯', href:'/text/list-randomizer.html', name:'List Randomizer'},
    
    {icon:'🏆', href:'/text/list-randomizer.html', name:'Raffle Picker'},
  ]
});
</script>
