    lblInput: '输入方程或表达式：',
    solve: '求解',
    clear: '清除',
    modeEval: '表达式求值',
    modeLinear: '线性方程 (ax+b=c)',
    modeQuadratic: '二次方程 (ax²+bx+c=0)',

    modeFraction: '分数运算',

    exEval3: 'sin(45°) + cos(45°)',

const { $, copyText, t } = GZ;
let currentMode = 'eval';

const modes = ['eval','linear','quadratic','percent','fraction'];
$('#modes').innerHTML = modes.map(m => `<button class="mode-btn${m==='eval'?' active':''}" data-mode="${m}" onclick="setMode('${m}',this)">${t('mode'+m.charAt(0).toUpperCase()+m.slice(1))}</button>`).join('');

function setMode(mode, btn) {
  currentMode = mode;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderExamples();
  toggleCoeffInputs();
  $('#result').innerHTML = '';
}

function toggleCoeffInputs() {
  const show = currentMode === 'quadratic';
  $('#a-group').style.display = show ? 'inline-flex' : 'none';
  $('#b-group').style.display = show ? 'inline-flex' : 'none';
  $('#c-group').style.display = show ? 'inline-flex' : 'none';
}
toggleCoeffInputs();

function renderExamples() {
  const modeExamples = {
    eval: ['exEval1','exEval2','exEval3'],
    linear: ['exLin1','exLin2','exLin3'],
    quadratic: ['exQuad1','exQuad2','exQuad3'],
    percent: ['exPct1','exPct2','exPct3'],
    fraction: ['exFrac1','exFrac2','exFrac3']
  };
  const exs = modeExamples[currentMode] || [];
  $('#examples').innerHTML = exs.map(e => `<button class="example-btn" onclick="$('#input').value='${t(e)}'">${t(e)}</button>`).join('');
}
renderExamples();

function stepHtml(num, text) {
  return `<div class="step"><span class="step-num">Step ${num}:</span>${text}</div>`;
}

function solve() {
  const input = $('#input').value.trim();
  if (!input) return;
  let html = '';
  try {
    if (currentMode === 'eval') {
      html = solveEval(input);
    } else if (currentMode === 'linear') {
      html = solveLinear(input);
    } else if (currentMode === 'quadratic') {
      html = solveQuadratic(input);
    } else if (currentMode === 'percent') {
      html = solvePercent(input);
    } else if (currentMode === 'fraction') {
      html = solveFraction(input);
    }
  } catch (e) {
    html = `<div style="color:var(--gz-accent)">Error: ${e.message}</div>`;
  }
  $('#result').innerHTML = html;
}

function safeEval(expr) {
  let e = expr.replace(/×/g,'*').replace(/÷/g,'/').replace(/−/g,'-');
  e = e.replace(/√(\d+)/g, 'Math.sqrt($1)');
  e = e.replace(/(\d+)²/g, 'Math.pow($1,2)');
  e = e.replace(/(\d+)³/g, 'Math.pow($1,3)');
  e = e.replace(/π/g, 'Math.PI');
  e = e.replace(/sin\(([^)]+)\)/g, (_, a) => 'Math.sin(' + (a.includes('°') ? 'Math.PI/180*' + a.replace('°','') : a) + ')');
  e = e.replace(/cos\(([^)]+)\)/g, (_, a) => 'Math.cos(' + (a.includes('°') ? 'Math.PI/180*' + a.replace('°','') : a) + ')');
  e = e.replace(/tan\(([^)]+)\)/g, (_, a) => 'Math.tan(' + (a.includes('°') ? 'Math.PI/180*' + a.replace('°','') : a) + ')');
  if (!/^[0-9+\-*/().%\s^Math.sqrtpowPIsincostaglelogEe]+$/.test(e.replace(/Math\.\w+/g,''))) {
    throw new Error('Invalid expression');
  }
  const result = Function('"use strict"; return (' + e + ')')();
  return result;
}

function solveEval(input) {
  const result = safeEval(input);
  return stepHtml(1, `Evaluate: <strong>${input}</strong>`)
    + stepHtml(2, `Result: <strong style="color:var(--gz-accent)">${Number.isInteger(result) ? result : parseFloat(result.toFixed(8))}</strong>`);
}

function solveLinear(input) {
  let eq = input.replace(/\s/g,'').replace(/×/g,'*').replace(/÷/g,'/');
  const sides = eq.split('=');
  if (sides.length !== 2) throw new Error('Please use = sign, e.g. 2x+5=15');
  let lhs = sides[0], rhs = sides[1];
  let steps = [];
  steps.push(`Equation: <strong>${lhs} = ${rhs}</strong>`);
  // Parse ax + b = c form
  let leftStr = lhs, rightStr = rhs;
  // Move all to left: ax + b - c = 0
  // Parse coefficients
  function parseLinear(expr) {
    expr = expr.replace(/--/g,'+').replace(/\+-/g,'-');
    let xCoeff = 0, constant = 0;
    let tokens = expr.match(/[+-]?[^+-]+/g) || [];
    for (let token of tokens) {
      token = token.trim();
      if (token.includes('x')) {
        let coeff = token.replace('x','');
        if (coeff === '' || coeff === '+') coeff = '1';
        if (coeff === '-') coeff = '-1';
        xCoeff += parseFloat(coeff);
      } else {
        constant += parseFloat(token);
      }
    }
    return { xCoeff, constant };
  }
  const left = parseLinear(leftStr);
  const right = parseLinear(rightStr);
  const a = left.xCoeff - right.xCoeff;
  const b = left.constant - right.constant;
  const c = -parseFloat(rightStr.includes('x') ? 0 : rightStr) || 0;
  steps.push(`Rearrange: <strong>${a}x + ${b} = ${-c}</strong>`);
  const rhsVal = -c - b;
  steps.push(`Move constant: <strong>${a}x = ${rhsVal}</strong>`);
  if (a === 0) throw new Error('No solution or infinite solutions (coefficient of x is 0)');
  const x = rhsVal / a;
  steps.push(`Divide by ${a}: <strong>x = ${parseFloat(x.toFixed(8))}</strong>`);
  steps.push(`✅ <strong style="color:var(--gz-accent)">x = ${parseFloat(x.toFixed(8))}</strong>`);
  let html = '';
  steps.forEach((s, i) => html += stepHtml(i + 1, s));
  return html;
}

function solveQuadratic(input) {
  let a = parseFloat($('#inp-a').value);
  let b = parseFloat($('#inp-b').value);
  let c = parseFloat($('#inp-c').value);
  if (isNaN(a)) a = 1;
  if (isNaN(b)) b = 0;
  if (isNaN(c)) c = 0;
  // Try parse from input
  let eq = input.replace(/\s/g,'');
  if (eq && !$('#inp-a').value) {
    // Parse ax²+bx+c=0
    const m = eq.match(/^(-?\d*)x[²2]\s*([+-]\s*\d*)x\s*([+-]\s*\d+)\s*=\s*0$/);
    if (m) {
      a = m[1]===''||m[1]==='+'?1:m[1]==='-'?-1:parseFloat(m[1]);
      b = parseFloat(m[2].replace(/\s/g,''));
      c = parseFloat(m[3].replace(/\s/g,''));
    }
  }
  let html = stepHtml(1, `Quadratic equation: <strong>${a}x² + ${b}x + ${c} = 0</strong>`);
  const disc = b * b - 4 * a * c;
  html += stepHtml(2, `Discriminant: Δ = b² - 4ac = ${b}² - 4(${a})(${c}) = <strong>${disc}</strong>`);
  if (disc > 0) {
    const x1 = (-b + Math.sqrt(disc)) / (2 * a);
    const x2 = (-b - Math.sqrt(disc)) / (2 * a);
    html += stepHtml(3, `Δ > 0 → Two real roots`);
    html += stepHtml(4, `x = (-b ± √Δ) / 2a`);
    html += stepHtml(5, `x₁ = ${parseFloat(x1.toFixed(8))}, x₂ = ${parseFloat(x2.toFixed(8))}`);
    html += stepHtml(6, `✅ <strong style="color:var(--gz-accent)">x₁ = ${parseFloat(x1.toFixed(8))}, x₂ = ${parseFloat(x2.toFixed(8))}</strong>`);
  } else if (disc === 0) {
    const x = -b / (2 * a);
    html += stepHtml(3, `Δ = 0 → One repeated root`);
    html += stepHtml(4, `x = -b / 2a = ${parseFloat(x.toFixed(8))}`);
    html += stepHtml(5, `✅ <strong style="color:var(--gz-accent)">x = ${parseFloat(x.toFixed(8))}</strong>`);
  } else {
    const real = -b / (2 * a);
    const imag = Math.sqrt(-disc) / (2 * a);
    html += stepHtml(3, `Δ < 0 → Two complex roots`);
    html += stepHtml(4, `x = (-b ± i√|Δ|) / 2a`);
    html += stepHtml(5, `✅ <strong style="color:var(--gz-accent)">x₁ = ${parseFloat(real.toFixed(8))} + ${parseFloat(imag.toFixed(8))}i, x₂ = ${parseFloat(real.toFixed(8))} - ${parseFloat(imag.toFixed(8))}i</strong>`);
  }
  return html;
}

function solvePercent(input) {
  let html = stepHtml(1, `Input: <strong>${input}</strong>`);
  const m1 = input.match(/(\d+\.?\d*)\s*%\s*of\s*(\d+\.?\d*)/i);
  if (m1) {
    const pct = parseFloat(m1[1]), val = parseFloat(m1[2]);
    const result = val * pct / 100;
    html += stepHtml(2, `${pct}% = ${pct}/100 = ${pct/100}`);
    html += stepHtml(3, `${pct}/100 × ${val} = <strong style="color:var(--gz-accent)">${result}</strong>`);
    return html;
  }
  const m2 = input.match(/(\d+\.?\d*)\s*is\s*what\s*%?\s*(?:of|percent\s*of)\s*(\d+\.?\d*)/i);
  if (m2) {
    const part = parseFloat(m2[1]), whole = parseFloat(m2[2]);
    const pct = (part / whole) * 100;
    html += stepHtml(2, `Percentage = (part/whole) × 100`);
    html += stepHtml(3, `(${part}/${whole}) × 100 = <strong style="color:var(--gz-accent)">${parseFloat(pct.toFixed(4))}%</strong>`);
    return html;
  }
  const m3 = input.match(/(\d+\.?\d*)\s*([+-])\s*(\d+\.?\d*)\s*%/);
  if (m3) {
    const val = parseFloat(m3[1]), op = m3[2], pct = parseFloat(m3[3]);
    const change = val * pct / 100;
    const result = op === '+' ? val + change : val - change;
    html += stepHtml(2, `${pct}% of ${val} = ${change}`);
    html += stepHtml(3, `${val} ${op} ${change} = <strong style="color:var(--gz-accent)">${result}</strong>`);
    return html;
  }
  html += stepHtml(2, `Could not parse. Try: "25% of 200", "15 is what % of 60", or "200 + 15%"`);
  return html;
}

function gcd(a, b) { return b === 0 ? a : gcd(b, a % b); }

function parseFraction(s) {
  s = s.trim();
  const m = s.match(/^(-?\d+)\/(\d+)$/);
  if (m) return { num: parseInt(m[1]), den: parseInt(m[2]) };
  const n = parseFloat(s);
  if (!isNaN(n)) {
    const decimals = (s.split('.')[1] || '').length;
    const den = Math.pow(10, decimals);
    return { num: Math.round(n * den), den };
  }
  throw new Error('Invalid fraction: ' + s);
}

function simplify(num, den) {
  if (den < 0) { num = -num; den = -den; }
  const g = gcd(Math.abs(num), Math.abs(den));
  return { num: num / g, den: den / g };
}

function solveFraction(input) {
  let expr = input.replace(/\s/g,'').replace(/×/g,'*').replace(/÷/g,'/');
  let html = stepHtml(1, `Expression: <strong>${input}</strong>`);
  let op, parts;
  if (expr.includes('+')) { op = '+'; parts = expr.split('+'); }
  else if (expr.includes('-') && expr.lastIndexOf('-') > 0) { op = '-'; const idx = expr.lastIndexOf('-'); parts = [expr.slice(0,idx), expr.slice(idx+1)]; }
  else if (expr.includes('*')) { op = '*'; parts = expr.split('*'); }
  else if (expr.includes('/')) { op = '/'; const idx = expr.indexOf('/'); const slashCount = (expr.match(/\//g)||[]).length; if (slashCount === 1) { parts = expr.split('/'); } else if (slashCount === 2) { const firstSlash = expr.indexOf('/'); const opIdx = expr.indexOf('+',firstSlash) || expr.indexOf('-',firstSlash) || expr.indexOf('*',firstSlash); parts = [expr.slice(0, opIdx), expr.slice(opIdx+1)]; } }
  if (!parts || parts.length !== 2) throw new Error('Use format like 1/2 + 1/3 or 3/4 * 2/5');
  const a = parseFraction(parts[0]);
  const b = parseFraction(parts[1]);
  html += stepHtml(2, `First fraction: ${a.num}/${a.den}, Second fraction: ${b.num}/${b.den}`);
  let resultNum, resultDen;
  if (op === '+') {
    resultNum = a.num * b.den + b.num * a.den;
    resultDen = a.den * b.den;
    html += stepHtml(3, `(${a.num}×${b.den} + ${b.num}×${a.den}) / (${a.den}×${b.den}) = ${resultNum}/${resultDen}`);
  } else if (op === '-') {
    resultNum = a.num * b.den - b.num * a.den;
    resultDen = a.den * b.den;
    html += stepHtml(3, `(${a.num}×${b.den} - ${b.num}×${a.den}) / (${a.den}×${b.den}) = ${resultNum}/${resultDen}`);
  } else if (op === '*') {
    resultNum = a.num * b.num;
    resultDen = a.den * b.den;
    html += stepHtml(3, `(${a.num}×${b.num}) / (${a.den}×${b.den}) = ${resultNum}/${resultDen}`);
  } else {
    resultNum = a.num * b.den;
    resultDen = a.den * b.num;
    html += stepHtml(3, `(${a.num}×${b.den}) / (${a.den}×${b.num}) = ${resultNum}/${resultDen}`);
  }
  const simplified = simplify(resultNum, resultDen);
  html += stepHtml(4, `Simplify: GCD(${Math.abs(resultNum)}, ${Math.abs(resultDen)}) = ${gcd(Math.abs(resultNum), Math.abs(resultDen))}`);
  html += stepHtml(5, `✅ <strong style="color:var(--gz-accent)">${simplified.num}/${simplified.den}${simplified.den===1?' (= '+simplified.num+')':''}</strong>`);
  return html;
}

$('#lbl-in').textContent = t('lblInput');

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="solve()">${t('solve')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#input').value='';$('#result').innerHTML=''">${t('clear')}</button>`;

$('#input').addEventListener('keydown', e => { if (e.key === 'Enter') solve(); });

  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],

  ]
});
</script>
