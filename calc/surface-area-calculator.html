.sa-formula{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:10px 14px;margin:8px 0;font-family:'JetBrains Mono','Menlo',monospace;font-size:.88em;line-height:1.7}
.sa-formula b{color:var(--accent)}
.sa-svg-box{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:14px;display:flex;justify-content:center;align-items:center;min-height:150px;margin:10px 0}
.sa-svg-box svg{max-width:200px;max-height:180px;width:100%;height:auto}

.sa-input label{display:flex;flex-direction:column;gap:4px;font-size:.85em;font-weight:500}
.sa-input input{padding:7px 10px;background:var(--bg2);color:var(--text);border:1px solid var(--border);border-radius:6px;font-size:.95em;font-family:inherit}

.sa-result{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;padding:14px 18px;border-radius:10px;margin:12px 0;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.sa-result-text{font-size:1.05em;font-weight:600;opacity:.95}

.sa-lateral{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:10px 14px;margin:8px 0;font-size:.9em;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px}
.sa-lateral .lbl{color:var(--text2)}
.sa-lateral .val{font-family:monospace;font-weight:700;color:var(--accent)}

</style>

<body>
<div class="gz-container">

            <div class="sa-result-text" id="result-text">Total Surface Area</div>

          </div>

        </div>
        <div class="sa-lateral" id="lateral" style="display:none">
          <span class="lbl" id="lateral-lbl"></span>

<script>
GZI18n.register({
  en: {
    toolTitle: 'Surface Area Calculator',
    toolDesc: 'Calculate the total and lateral surface area of 10+ 3D shapes — cube, box, sphere, cylinder, cone, hemisphere, capsule, pyramid, frustum, torus. Visual diagram, formula and unit conversions for each.',
    totalLabel: 'Total Surface Area',
    lateralLabel: 'Lateral (side) area',
    step1: 'Pick a 3D shape from the left sidebar',
    step2: 'Enter the required measurements (use the same unit for all)',
    step3: 'Read the total and lateral surface area with the formula',
    step4: 'Use Copy to copy the result',
  },
  zh: {
    toolTitle: '表面积计算器',
    toolDesc: '计算 10+ 种三维图形的总表面积和侧面积 — 立方体、长方体、球体、圆柱、圆锥、半球、胶囊体、棱锥、圆台、圆环。每种形状均显示视觉图示、公式和单位换算。',
    totalLabel: '总表面积',
    lateralLabel: '侧面积',
    step1: '从左侧边栏选择三维形状',
    step2: '输入所需尺寸（所有输入使用相同单位）',
    step3: '即时查看总表面积和侧面积，并对照公式',
    step4: '点击「复制」复制结果',
  }
});

const { $, copyText, t } = GZ;
const STROKE = 'stroke="currentColor" stroke-width="2" fill="rgba(78,205,196,0.18)"';

// Each shape: name, formula (HTML), inputs, calc returns {total, lateral} in squared input units. lateral=null when N/A.
const SHAPES = {
  cube: {
    name: 'Cube',
    formula: 'SA = 6 × side²',
    svg: `<svg viewBox="0 0 100 100"><polygon points="25,30 65,30 75,20 35,20" ${STROKE}/><polygon points="25,30 25,75 65,75 65,30" ${STROKE}/><polygon points="65,30 75,20 75,65 65,75" ${STROKE}/><text x="40" y="55" font-size="11" fill="currentColor">s</text></svg>`,
    inputs: [{id:'s', label:'Side (s)', val:6}],
    calc: v => { const a = 6 * v.s**2; return { total: a, lateral: 4 * v.s**2 }; }
  },
  box: {
    name: 'Rectangular Prism',
    formula: 'SA = 2(lw + lh + wh)',
    svg: `<svg viewBox="0 0 100 100"><polygon points="20,35 65,35 75,25 30,25" ${STROKE}/><polygon points="20,35 20,80 65,80 65,35" ${STROKE}/><polygon points="65,35 75,25 75,70 65,80" ${STROKE}/><text x="38" y="60" font-size="9" fill="currentColor">l·w·h</text></svg>`,
    inputs: [{id:'l', label:'Length (l)', val:8},{id:'w', label:'Width (w)', val:5},{id:'h', label:'Height (h)', val:4}],
    calc: v => ({ total: 2*(v.l*v.w + v.l*v.h + v.w*v.h), lateral: 2*(v.l*v.h + v.w*v.h) })
  },
  sphere: {
    name: 'Sphere',
    formula: 'SA = 4 × π × r²',
    svg: `<svg viewBox="0 0 100 100"><circle cx="50" cy="55" r="28" ${STROKE}/><ellipse cx="50" cy="55" rx="28" ry="10" stroke="currentColor" stroke-width="1" fill="none" opacity=".5"/><line x1="50" y1="55" x2="78" y2="55" stroke="currentColor" stroke-width="1.5"/><text x="60" y="50" font-size="11" fill="currentColor">r</text></svg>`,
    inputs: [{id:'r', label:'Radius (r)', val:5}],
    calc: v => ({ total: 4 * Math.PI * v.r**2, lateral: null })
  },
  cylinder: {
    name: 'Cylinder',
    formula: 'SA = 2πr² + 2πrh<br><span style="opacity:.7">(2 bases + lateral)</span>',
    svg: `<svg viewBox="0 0 100 100"><ellipse cx="50" cy="25" rx="22" ry="8" ${STROKE}/><path d="M28,25 L28,75 M72,25 L72,75" ${STROKE}/><path d="M28,75 A22,8 0 0 0 72,75" stroke="currentColor" stroke-width="2" fill="rgba(78,205,196,0.18)"/><text x="56" y="22" font-size="9" fill="currentColor">r</text><text x="75" y="55" font-size="10" fill="currentColor">h</text></svg>`,
    inputs: [{id:'r', label:'Radius (r)', val:4},{id:'h', label:'Height (h)', val:10}],
    calc: v => ({ total: 2*Math.PI*v.r*(v.r + v.h), lateral: 2*Math.PI*v.r*v.h })
  },
  cone: {
    name: 'Cone',
    formula: 'SA = πr² + πr·s<br><span style="opacity:.7">(base + lateral, s = slant height)</span>',
    svg: `<svg viewBox="0 0 100 100"><path d="M50,20 L75,75 L25,75 Z" ${STROKE}/><ellipse cx="50" cy="75" rx="25" ry="7" ${STROKE}/><text x="55" y="73" font-size="9" fill="currentColor">r</text><line x1="50" y1="20" x2="75" y2="75" stroke="currentColor" stroke-width="1" stroke-dasharray="3,2"/><text x="60" y="48" font-size="9" fill="currentColor">s</text></svg>`,
    inputs: [{id:'r', label:'Radius (r)', val:4},{id:'h', label:'Height (h)', val:9}],
    calc: v => { const s = Math.sqrt(v.r**2 + v.h**2); return { total: Math.PI*v.r*(v.r + s), lateral: Math.PI*v.r*s }; }
  },
  hemisphere: {
    name: 'Hemisphere',
    formula: 'SA = 3πr²<br><span style="opacity:.7">(curved 2πr² + base πr²)</span>',
    svg: `<svg viewBox="0 0 100 100"><path d="M22,60 A28,28 0 0 1 78,60 Z" ${STROKE}/><line x1="22" y1="60" x2="78" y2="60" stroke="currentColor" stroke-width="2"/><line x1="50" y1="60" x2="50" y2="32" stroke="currentColor" stroke-width="1"/><text x="52" y="48" font-size="9" fill="currentColor">r</text></svg>`,
    inputs: [{id:'r', label:'Radius (r)', val:6}],
    calc: v => ({ total: 3 * Math.PI * v.r**2, lateral: 2 * Math.PI * v.r**2 })
  },
  capsule: {
    name: 'Capsule',
    formula: 'SA = 2πr(2r + h)<br><span style="opacity:.7">(h = cylinder part)</span>',
    svg: `<svg viewBox="0 0 100 100"><rect x="28" y="35" width="44" height="30" ${STROKE}/><path d="M28,35 A15,15 0 0 0 28,65" ${STROKE}/><path d="M72,35 A15,15 0 0 0 72,65" ${STROKE}/><text x="50" y="54" font-size="9" fill="currentColor">h</text></svg>`,
    inputs: [{id:'r', label:'Radius (r)', val:4},{id:'h', label:'Cylinder height (h)', val:12}],
    calc: v => ({ total: 2*Math.PI*v.r*(2*v.r + v.h), lateral: 2*Math.PI*v.r*v.h })
  },
  sqPyramid: {
    name: 'Square Pyramid',
    formula: 'SA = a² + 2a·s<br><span style="opacity:.7">(base + 4 triangular faces, s = slant height)</span>',
    svg: `<svg viewBox="0 0 100 100"><path d="M50,18 L78,72 L22,72 Z" ${STROKE}/><polygon points="22,72 78,72 70,80 30,80" ${STROKE}/><text x="48" y="78" font-size="9" fill="currentColor">a</text></svg>`,
    inputs: [{id:'a', label:'Base side (a)', val:6},{id:'s', label:'Slant height (s)', val:8}],
    calc: v => ({ total: v.a**2 + 2*v.a*v.s, lateral: 2*v.a*v.s })
  },
  frustum: {
    name: 'Frustum of Cone',
    formula: 'SA = π(R² + r² + (R + r)s)<br><span style="opacity:.7">(s = slant height)</span>',
    svg: `<svg viewBox="0 0 100 100"><path d="M35,25 L25,75 L75,75 L65,25 Z" ${STROKE}/><ellipse cx="50" cy="25" rx="15" ry="4" ${STROKE}/><ellipse cx="50" cy="75" rx="25" ry="7" ${STROKE}/><text x="40" y="22" font-size="8" fill="currentColor">r</text><text x="60" y="74" font-size="9" fill="currentColor">R</text></svg>`,
    inputs: [{id:'R', label:'Bottom radius (R)', val:6},{id:'r', label:'Top radius (r)', val:3},{id:'s', label:'Slant height (s)', val:8}],
    calc: v => ({ total: Math.PI*(v.R**2 + v.r**2 + (v.R + v.r)*v.s), lateral: Math.PI*(v.R + v.r)*v.s })
  },
  torus: {
    name: 'Torus',
    formula: 'SA = 4π² · R · r',
    svg: `<svg viewBox="0 0 100 100"><ellipse cx="50" cy="55" rx="34" ry="14" ${STROKE}/><ellipse cx="50" cy="55" rx="14" ry="6" stroke="currentColor" stroke-width="2" fill="var(--bg)"/><text x="40" y="50" font-size="8" fill="currentColor">R</text><text x="68" y="46" font-size="8" fill="currentColor">r</text></svg>`,
    inputs: [{id:'R', label:'Major radius (R)', val:6},{id:'r', label:'Minor radius (r)', val:2}],
    calc: v => ({ total: 4 * Math.PI**2 * v.R * v.r, lateral: null })
  },
};

let activeShape = 'cube';
const shapeKeys = Object.keys(SHAPES);

$('#shapes').innerHTML = shapeKeys.map(k => {
  const s = SHAPES[k];
  return `<div class="sa-shape${k === activeShape ? ' active' : ''}" data-shape="${k}" onclick="selectShape('${k}')">${s.svg.replace('<svg ','<svg width="22" height="22" ')}<span>${s.name}</span></div>`;
}).join('');

function selectShape(k) {
  activeShape = k;
  document.querySelectorAll('.sa-shape').forEach(el => el.classList.toggle('active', el.dataset.shape === k));
  render();
}

function getInputs() {
  const vals = {};
  SHAPES[activeShape].inputs.forEach(inp => {
    vals[inp.id] = parseFloat(document.getElementById('inp-' + inp.id).value) || 0;
  });
  return vals;
}

function render() {
  const s = SHAPES[activeShape];
  $('#shape-name').textContent = s.name;
  $('#svg-box').innerHTML = s.svg.replace('<svg ', '<svg width="180" height="160" ');
  $('#formula').innerHTML = `<b>Formula:</b>  ${s.formula}`;
  $('#inputs').innerHTML = s.inputs.map(inp => `
    <div class="sa-input"><label for="inp-${inp.id}">${inp.label}</label>
    <input type="number" id="inp-${inp.id}" value="${inp.val}" step="any" oninput="render()"></div>`).join('');

  const vals = getInputs();
  const invalid = s.inputs.some(inp => !(vals[inp.id] > 0));
  const latBox = $('#lateral');
  if (invalid) {
    $('#result-value').textContent = '0';
    $('#status').textContent = '';
    $('#lateral-val').textContent = '';
    latBox.style.display = 'none';
    return;
  }
  const res = s.calc(vals);
  $('#result-value').textContent = formatNum(res.total);
  const u = (document.getElementById('unit-select') || {}).value || 'cm';
  $('#status').textContent = `square ${u}`;
  if (res.lateral != null) {
    latBox.style.display = 'flex';
    $('#lateral-lbl').textContent = t('lateralLabel');
    $('#lateral-val').textContent = formatNum(res.lateral) + ' ' + u + '²';
  } else {
    latBox.style.display = 'none';
  }
}

function formatNum(n) {
  if (!isFinite(n)) return '0';
  if (n === 0) return '0';
  const abs = Math.abs(n);
  if (abs >= 1e9) return n.toExponential(4);
  if (abs >= 1) return n.toLocaleString('en-US', { maximumFractionDigits: 4 });
  if (abs >= 0.0001) return n.toPrecision(4);
  return n.toExponential(3);
}

function doCopy() {
  copyText($('#result-value').textContent + ' ' + $('#status').textContent);
}

$('#toolbar').innerHTML = `
  <label style="font-size:.85em;color:var(--text2);display:flex;align-items:center;gap:6px">📏 Unit:
    <select id="unit-select" class="gz-select" onchange="render()">
      <option value="cm">cm</option><option value="m">m</option><option value="mm">mm</option>
      <option value="in">in</option><option value="ft">ft</option><option value="yd">yd</option>
    </select>
  </label>
  <button class="gz-btn gz-btn-secondary" onclick="doCopy()">📋 ${GZI18n.getLang() === 'zh' ? '复制' : 'Copy'}</button>`;

render();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🧊', href:'/calc/volume-calculator.html', name:'Volume Calculator'},
    {icon:'📐', href:'/calc/area-calculator.html', name:'Area Calculator'},
    {icon:'🧱', href:'/calc/concrete.html', name:'Concrete Calculator'},
    {icon:'🎨', href:'/image/social-media-resizer.html', name:'Image Resizer'},
  ]
});
</script>
