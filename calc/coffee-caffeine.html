<style>
.cf-input{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:14px}
.cf-input>div{display:flex;flex-direction:column;gap:4px}
.cf-input label{font-size:.85rem;font-weight:600;color:var(--text2)}
.cf-input input,.cf-input select{padding:9px 12px;border:1px solid var(--border);border-radius:10px;background:var(--glass);color:var(--text);font-size:.95em}
.cf-input input:focus,.cf-input select:focus{outline:none;border-color:var(--accent)}
.cf-summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-top:1rem}
.cf-card{background:var(--glass);border:1px solid var(--border);border-radius:14px;padding:14px}
.cf-card .lbl{font-size:.7rem;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;font-weight:600}
.cf-card .val{font-size:1.4rem;font-weight:700;color:var(--accent)}
.cf-card .sub{font-size:.8rem;color:var(--text2);margin-top:2px}
.cf-bar{height:14px;background:var(--glass2);border-radius:8px;overflow:hidden;margin-top:1rem;border:1px solid var(--border)}
.cf-bar-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .4s ease}
.cf-row{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--glass);border:1px solid var(--border);border-radius:10px;margin-top:8px}
.cf-row label{flex:0 0 140px;font-size:.9rem;font-weight:500}
.cf-row input[type=number]{width:60px;padding:6px 8px;border:1px solid var(--border);border-radius:8px;background:var(--glass2);color:var(--text);text-align:center}
.cf-row select{flex:1;padding:6px 10px;border:1px solid var(--border);border-radius:8px;background:var(--glass2);color:var(--text);font-size:.9em}
.cf-row .mg{color:var(--text2);font-size:.8rem;min-width:80px;text-align:right}
.cf-add{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;background:var(--glass);border:1px solid var(--border);border-radius:10px;color:var(--text);cursor:pointer;font-size:.9em;margin-top:10px}
.cf-add:hover{border-color:var(--accent);color:var(--accent)}
.cf-tip{padding:14px;background:rgba(78,205,196,0.08);border:1px solid rgba(78,205,196,0.3);border-radius:12px;margin-top:1rem;font-size:.9rem;line-height:1.6}
.cf-warn{background:rgba(245,158,11,0.08);border-color:rgba(245,158,11,0.3)}
.cf-danger{background:rgba(239,68,68,0.08);border-color:rgba(239,68,68,0.3)}
</style>

<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "How much caffeine is safe per day?", "acceptedAnswer": {"@type": "Answer", "text": "The FDA recommends up to 400 mg of caffeine per day for healthy adults — about 4 cups of brewed coffee. Pregnant women should limit intake to 200 mg, and teens should stay under 100 mg/day. Individual tolerance varies based on body weight, age, medications, and sensitivity."}}, {"@type": "Question", "name": "How is the safe caffeine limit calculated?", "acceptedAnswer": {"@type": "Answer", "text": "We use the standard 6 mg/kg of body weight guideline recommended by the European Food Safety Authority, then clamp it within the 100-400 mg range based on age (kids, teens, adults, pregnant) and lifestyle factors. The result is your personalized daily ceiling."}}, {"@type": "Question", "name": "Does decaf coffee contain caffeine?", "acceptedAnswer": {"@type": "Answer", "text": "Yes, but very little. An 8 oz (240 ml) decaf coffee typically contains 2-15 mg of caffeine compared to 80-120 mg in regular coffee. We default decaf to 5 mg per cup, but you can edit the value if needed."}}, {"@type": "Question", "name": "How long does caffeine stay in your system?", "acceptedAnswer": {"@type": "Answer", "text": "Caffeine has a half-life of about 5-6 hours in healthy adults, meaning half the caffeine is still active 6 hours after consumption. It can take 10+ hours to fully clear. This is why afternoon coffee can disrupt sleep even if you feel tired."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="cf-input">
      <div>
        <label id="lbl-weight"></label>
        <input type="number" id="weight" value="70" min="20" max="250">
      </div>
      <div>
        <label id="lbl-age"></label>
        <select id="ageGroup">
          <option value="adult">Adult (18+)</option>
          <option value="pregnant">Pregnant</option>
          <option value="teen">Teen (13-17)</option>
          <option value="child">Child (under 12)</option>
        </select>
      </div>
      <div>
        <label id="lbl-unit"></label>
        <select id="unit">
          <option value="kg">kg</option>
          <option value="lb">lb</option>
        </select>
      </div>
    </div>
    <h3 id="h3-drinks" style="margin-top:1rem;font-size:1rem"></h3>
    <div id="drinks"></div>
    <button class="cf-add" onclick="addDrink()">+ <span id="add-text"></span></button>
    <div class="cf-summary" id="summary"></div>
    <div class="cf-bar"><div class="cf-bar-fill" id="bar"></div></div>
    <div id="tip"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Caffeine Calculator',
    toolDesc: 'Track your daily caffeine intake from coffee, tea, energy drinks, and soda. Get a personalized safe-limit recommendation based on body weight and age.',
    weight: 'Body weight',
    age: 'Age group',
    unit: 'Units',
    drinks: 'Drinks consumed today',
    addDrink: 'Add custom drink',
    totalCaffeine: 'Total caffeine',
    safeLimit: 'Safe daily limit',
    remaining: 'Remaining',
    percent: '% of limit',
    safe: '✓ Within safe range',
    caution: '⚠ Approaching safe limit',
    over: '✗ Over the safe limit',
    step1: 'Enter your body weight and age group',
    step2: 'Add the drinks you have had today and the amounts',
    step3: 'See total caffeine, your safe ceiling, and how much room you have left',
    step4: 'Use the tip section for personalized recommendations',
  },
  zh: {
    toolTitle: '咖啡因摄入计算器',
    toolDesc: '统计你今日从咖啡、茶、能量饮料和汽水中摄入的咖啡因总量。根据体重和年龄获得个性化安全摄入建议。',
    weight: '体重',
    age: '年龄段',
    unit: '单位',
    drinks: '今日饮用的饮料',
    addDrink: '添加自定义饮料',
    totalCaffeine: '总咖啡因',
    safeLimit: '每日安全上限',
    remaining: '剩余可摄入',
    percent: '占上限百分比',
    safe: '✓ 在安全范围内',
    caution: '⚠ 接近安全上限',
    over: '✗ 已超过安全上限',
    step1: '输入体重和年龄段',
    step2: '添加今日已饮用的饮料及份量',
    step3: '查看总咖啡因、安全上限和剩余可摄入量',
    step4: '根据建议调整今天的饮用量',
  }
});

const { t } = GZ;

const DRINKS = [
  {name:'Brewed coffee (8oz/240ml)', mg:95, zh:'现煮咖啡 (240ml)'},
  {name:'Espresso (1 shot)', mg:64, zh:'浓缩咖啡 (1 份)'},
  {name:'Latte / Cappuccino (12oz)', mg:75, zh:'拿铁/卡布奇诺 (350ml)'},
  {name:'Cold brew (12oz)', mg:200, zh:'冷萃咖啡 (350ml)'},
  {name:'Decaf coffee (8oz)', mg:5, zh:'低因咖啡 (240ml)'},
  {name:'Black tea (8oz)', mg:47, zh:'红茶 (240ml)'},
  {name:'Green tea (8oz)', mg:28, zh:'绿茶 (240ml)'},
  {name:'Oolong tea (8oz)', mg:38, zh:'乌龙茶 (240ml)'},
  {name:'Matcha (1 cup)', mg:70, zh:'抹茶 (1 杯)'},
  {name:'Yerba mate (8oz)', mg:85, zh:'马黛茶 (240ml)'},
  {name:'Energy drink (Red Bull 8.4oz)', mg:80, zh:'能量饮料 (红牛 250ml)'},
  {name:'Energy drink (Monster 16oz)', mg:160, zh:'能量饮料 (魔爪 470ml)'},
  {name:'Pre-workout supplement', mg:200, zh:'训练前补剂'},
  {name:'Cola (12oz)', mg:34, zh:'可乐 (350ml)'},
  {name:'Diet Cola (12oz)', mg:46, zh:'健怡可乐 (350ml)'},
  {name:'Chocolate (dark, 1oz)', mg:12, zh:'黑巧克力 (28g)'},
  {name:'Hot cocoa (8oz)', mg:5, zh:'热可可 (240ml)'},
  {name:'Custom drink (mg per serving)', mg:0, zh:'自定义饮料 (每份 mg)'},
];

let rows = [];
function drinkOptions() {
  const lang = GZI18n.getLang();
  return DRINKS.map((d,i) => {
    const lbl = lang==='zh' ? d.zh : d.name;
    return `<option value="${i}">${lbl}</option>`;
  }).join('');
}

function renderDrinks() {
  const html = rows.map((r, idx) => {
    const m = r.count * r.mg;
    return `<div class="cf-row">
      <select onchange="upd(${idx},'idx',this.value)">${drinkOptions().replace(`value="${r.idx}"`, `value="${r.idx}" selected`)}</select>
      <input type="number" min="0" max="20" step="0.5" value="${r.count}" onchange="upd(${idx},'count',this.value)">
      <span class="mg">${m.toFixed(0)} mg</span>
      <button class="cf-add" onclick="del(${idx})" style="margin:0;padding:6px 10px">✕</button>
    </div>`;
  }).join('');
  document.getElementById('drinks').innerHTML = html || `<p style="color:var(--text2);font-size:.9rem;margin-top:8px">${GZI18n.getLang()==='zh'?'点击下方添加你今天喝过的饮料':'Click below to add drinks you had today'}</p>`;
  calc();
}

function upd(i, k, v) {
  if (k==='idx') { rows[i].idx = +v; rows[i].mg = DRINKS[rows[i].idx].mg; }
  else if (k==='count') { rows[i].count = +v; }
  renderDrinks();
}

function addDrink() { rows.push({idx:0, count:1, mg:DRINKS[0].mg}); renderDrinks(); }
function del(i) { rows.splice(i,1); renderDrinks(); }

function safeLimitMg() {
  const age = document.getElementById('ageGroup').value;
  let w = +document.getElementById('weight').value;
  if (document.getElementById('unit').value === 'lb') w = w * 0.4536;
  let limit = w * 6;
  if (age === 'pregnant') limit = 200;
  else if (age === 'teen') limit = Math.min(limit, 100);
  else if (age === 'child') limit = Math.min(limit, 50);
  return Math.max(50, Math.min(limit, 600));
}

function calc() {
  const total = rows.reduce((s,r) => s + r.count * r.mg, 0);
  const limit = safeLimitMg();
  const remaining = Math.max(0, limit - total);
  const pct = Math.min(100, (total/limit)*100);
  document.getElementById('summary').innerHTML = `
    <div class="cf-card"><div class="lbl">${t('totalCaffeine')}</div><div class="val">${total.toFixed(0)} mg</div><div class="sub">${rows.length} drinks</div></div>
    <div class="cf-card"><div class="lbl">${t('safeLimit')}</div><div class="val">${limit.toFixed(0)} mg</div><div class="sub">${(limit/95).toFixed(1)} cups</div></div>
    <div class="cf-card"><div class="lbl">${t('remaining')}</div><div class="val" style="color:${remaining>0?'var(--accent)':'#ef4444'}">${remaining.toFixed(0)} mg</div><div class="sub">${t('percent')} ${pct.toFixed(0)}%</div></div>
  `;
  document.getElementById('bar').style.width = pct + '%';
  const tip = document.getElementById('tip');
  if (total <= limit * 0.8) {
    tip.className = 'cf-tip';
    tip.innerHTML = t('safe') + ' — ' + (GZI18n.getLang()==='zh' ? '保持当前摄入量即可，注意不要在睡前 6 小时内摄入咖啡因。' : 'Keep your current intake. Avoid caffeine within 6 hours of bedtime.');
  } else if (total <= limit) {
    tip.className = 'cf-tip cf-warn';
    tip.innerHTML = t('caution') + ' — ' + (GZI18n.getLang()==='zh' ? '今日咖啡因已接近上限，建议改喝无咖啡因饮品。' : 'You\'re close to your limit. Consider switching to decaf or herbal tea for the rest of the day.');
  } else {
    tip.className = 'cf-tip cf-danger';
    tip.innerHTML = t('over') + ' — ' + (GZI18n.getLang()==='zh' ? '已超过安全上限。常见症状包括心悸、焦虑、失眠。多喝水帮助代谢。' : 'You\'ve exceeded the safe limit. Common symptoms: jitters, anxiety, insomnia. Drink water to help metabolize.');
  }
}

['weight','ageGroup','unit'].forEach(id => document.getElementById(id).addEventListener('change', calc));
document.getElementById('weight').addEventListener('input', calc);

// Default: 1 coffee, 1 tea
rows.push({idx:0, count:1, mg:95});
rows.push({idx:5, count:1, mg:47});
renderDrinks();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'☕', href:'/calc/coffee-caffeine.html', name:'Caffeine Calculator'},
    {icon:'🍎', href:'/calc/calorie-calculator.html', name:'Calorie Calculator'},
    {icon:'💧', href:'/calc/water-intake.html', name:'Water Intake'},
    {icon:'😴', href:'/calc/sleep-calculator.html', name:'Sleep Calculator'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
