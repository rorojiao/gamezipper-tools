<!DOCTYPE html>
<html lang="en">
<head>
<title>Mortgage Calculator - Free Home Loan Calculator | GameZipper Tools</title>

<meta property="og:title" content="Mortgage Calculator - Free Home Loan Calculator">
<meta property="og:description" content="Calculate monthly mortgage payments, total interest, and view amortization schedule.">
<meta property="og:url" content="https://tools.gamezipper.com/calc/mortgage-calculator/">
<meta property="og:image" content="https://tools.gamezipper.com/shared/og-image.png">
<meta property="og:type" content="website">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="/shared/style.css">
<script src="/shared/i18n.js"></script>
<script src="/shared/common.js"></script>
<script type="application/ld+json">
{"@context":"https://schema.org","@type":"WebApplication","name":"Mortgage Calculator","description":"Free home loan calculator with amortization schedule and charts.","url":"https://tools.gamezipper.com/calc/mortgage-calculator/","applicationCategory":"FinanceApplication","operatingSystem":"Web Browser","offers":{"@type":"Offer","price":"0"}}
</script>
<style>
input[type="number"],select{background:rgba(0,0,0,0.3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 14px;color:var(--text);font-size:0.95rem;width:100%;touch-action:manipulation}
input[type="number"]:focus,select:focus{outline:none;border-color:var(--accent)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.form-group{margin-bottom:12px}
.form-group label{color:var(--text2);font-size:0.8rem;font-weight:600;display:block;margin-bottom:4px}
.mode-toggle{display:flex;gap:8px;margin-bottom:1rem}
.mode-toggle button{flex:1;padding:10px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--glass2);color:var(--text2);cursor:pointer;font-size:0.85rem;transition:all 0.15s;touch-action:manipulation}
.mode-toggle button.active{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border-color:transparent}
.result-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin:1.5rem 0}
.result-box{background:var(--glass2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:16px;text-align:center}
.result-box .val{font-size:1.4rem;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.result-box .lbl{color:var(--text2);font-size:0.75rem;margin-top:4px;text-transform:uppercase;letter-spacing:0.5px}
canvas{width:100%;max-width:300px;display:block;margin:0 auto}
.chart-wrap{text-align:center;margin:1.5rem 0}
.chart-wrap .legend{display:flex;justify-content:center;gap:20px;margin-top:10px;font-size:0.85rem;color:var(--text2)}
.chart-wrap .legend span::before{content:'';display:inline-block;width:12px;height:12px;border-radius:3px;margin-right:6px;vertical-align:middle}
.chart-wrap .legend .l-p::before{background:var(--accent)}
.chart-wrap .legend .l-i::before{background:var(--accent2)}
.amort-table{width:100%;border-collapse:collapse;margin-top:1rem;font-size:0.8rem}
.amort-table th{color:var(--text2);text-align:left;padding:8px;border-bottom:1px solid var(--border2);font-weight:600}
.amort-table td{padding:6px 8px;border-bottom:1px solid var(--border);color:var(--text)}
@media(max-width:500px){.form-row{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="gz-container">
<div class="gz-tool-header">
<h1>🏠 Mortgage Calculator</h1>
<p class="desc">Calculate monthly payments and view amortization schedule</p>
</div>
<div class="gz-tool-area">
<div class="mode-toggle">
<button id="modeEqual" class="active" onclick="setMode('equal')">Equal Installment</button>
<button id="modePrincipal" onclick="setMode('principal')">Equal Principal</button>
</div>
<div class="form-row">
<div class="form-group"><label>Home Price ($)</label><input type="number" id="price" value="300000" min="0" oninput="calc()"></div>
<div class="form-group"><label>Down Payment ($)</label><input type="number" id="down" value="60000" min="0" oninput="calc()"></div>
</div>
<div class="form-row">
<div class="form-group"><label>Interest Rate (%/year)</label><input type="number" id="rate" value="6.5" min="0" step="0.1" oninput="calc()"></div>
<div class="form-group"><label>Loan Term</label><select id="term" onchange="calc()">
<option value="15">15 years</option><option value="20">20 years</option><option value="25">25 years</option><option value="30" selected>30 years</option>
</select></div>
</div>
<button class="gz-btn" onclick="calc()" style="width:100%;justify-content:center;margin-top:8px">Calculate</button>
</div>
<div class="result-grid">
<div class="result-box"><div class="val" id="monthly">$0</div><div class="lbl">Monthly Payment</div></div>
<div class="result-box"><div class="val" id="totalInterest">$0</div><div class="lbl">Total Interest</div></div>
<div class="result-box"><div class="val" id="totalPayment">$0</div><div class="lbl">Total Payment</div></div>
<div class="result-box"><div class="val" id="loanAmt">$0</div><div class="lbl">Loan Amount</div></div>
</div>
<div class="chart-wrap">
<canvas id="chart" width="300" height="300"></canvas>
<div class="legend"><span class="l-p">Principal</span><span class="l-i">Interest</span></div>
</div>
<div class="gz-tool-area" id="amortWrap">
<h3 style="font-size:1rem;margin-bottom:0.5rem">Amortization Schedule (First 12 Months)</h3>
<table class="amort-table">
<thead><tr><th>Month</th><th>Payment</th><th>Principal</th><th>Interest</th><th>Balance</th></tr></thead>
<tbody id="amortBody"></tbody>
</table>
</div>
</div>
<script>
GZ.renderHeader('calc');GZ.renderFooter();
new Image().src="https://site-analytics.cap.1ktower.com/hit?s=tools.gamezipper.com&p="+encodeURIComponent(location.pathname);
let mode='equal';
function setMode(m){mode=m;document.getElementById('modeEqual').className=m==='equal'?'active':'';document.getElementById('modePrincipal').className=m==='principal'?'active':'';calc()}
function fmt(n){return '$'+n.toLocaleString('en',{maximumFractionDigits:0})}
function calc(){const price=parseFloat(document.getElementById('price').value)||0;const down=parseFloat(document.getElementById('down').value)||0;const annualRate=parseFloat(document.getElementById('rate').value)||0;const years=parseInt(document.getElementById('term').value)||30;const loan=Math.max(0,price-down);const n=years*12;const r=annualRate/100/12;document.getElementById('loanAmt').textContent=fmt(loan);if(loan<=0||r<=0||n<=0)return;let totalPrincipal=loan,totalInterest=0;const schedule=[];let balance=loan;if(mode==='equal'){const mp=loan*r*Math.pow(1+r,n)/(Math.pow(1+r,n)-1);document.getElementById('monthly').textContent=fmt(mp);for(let i=1;i<=Math.min(n,12);i++){const interest=balance*r;const principal=mp-interest;balance-=principal;schedule.push({month:i,payment:mp,principal,interest,balance:Math.max(0,balance)})}totalPayment=mp*n;totalInterest=totalPayment-loan;document.getElementById('totalInterest').textContent=fmt(totalInterest);document.getElementById('totalPayment').textContent=fmt(totalPayment)}else{const pp=loan/n;let firstPay=pp+loan*r;document.getElementById('monthly').textContent=fmt(firstPay)+' ~ '+fmt(pp+(loan-pp*(n-1))*r);for(let i=1;i<=Math.min(n,12);i++){const interest=balance*r;const payment=pp+interest;balance-=pp;schedule.push({month:i,payment,principal:pp,interest,balance:Math.max(0,balance)})}totalInterest=0;let b=loan;for(let i=0;i<n;i++){totalInterest+=b*r;b-=pp}document.getElementById('totalInterest').textContent=fmt(totalInterest);document.getElementById('totalPayment').textContent=fmt(loan+totalInterest)}const tbody=document.getElementById('amortBody');tbody.innerHTML=schedule.map(s=>`<tr><td>${s.month}</td><td>${s.payment.toFixed(2)}</td><td>${s.principal.toFixed(2)}</td><td>${s.interest.toFixed(2)}</td><td>${s.balance.toFixed(2)}</td></tr>`).join('');drawPie(loan,totalInterest)}
function drawPie(principal,interest){const c=document.getElementById('chart');const ctx=c.getContext('2d');const dpr=window.devicePixelRatio||1;c.width=300*dpr;c.height=300*dpr;ctx.scale(dpr,dpr);const total=principal+interest;const pA=principal/total*2*Math.PI;const cx=150,cy=150,r=120;ctx.clearRect(0,0,300,300);ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,r,-Math.PI/2,-Math.PI/2+pA);ctx.closePath();ctx.fillStyle='#6c5ce7';ctx.fill();ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,r,-Math.PI/2+pA,-Math.PI/2+2*Math.PI);ctx.closePath();ctx.fillStyle='#a855f7';ctx.fill();ctx.fillStyle='#fff';ctx.font='bold 14px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';const pPct=(principal/total*100).toFixed(1)+'%';const iPct=(interest/total*100).toFixed(1)+'%';ctx.fillText(pPct,cx+Math.cos(-Math.PI/2+pA/2)*60,cy+Math.sin(-Math.PI/2+pA/2)*60);ctx.fillText(iPct,cx+Math.cos(-Math.PI/2+pA+pA/2)*60,cy+Math.sin(-Math.PI/2+pA+pA/2)*60)}
calc();
</script>
</body>
</html>
