<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is the least common multiple (LCM)?", "acceptedAnswer": {"@type": "Answer", "text": "The least common multiple (LCM) is the smallest positive integer that is a multiple of two or more numbers. For example, LCM(4, 6) = 12 because 12 is the smallest number divisible by both 4 and 6. It is widely used in adding fractions and scheduling problems."}}, {"@type": "Question", "name": "How is LCM calculated?", "acceptedAnswer": {"@type": "Answer", "text": "There are two common methods: (1) prime factorization — break each number into primes, take the highest power of each prime, and multiply; (2) the formula LCM(a,b) = (a × b) / GCD(a,b). This calculator shows the prime factorization steps so you can follow the reasoning."}}, {"@type": "Question", "name": "What is LCM used for in real life?", "acceptedAnswer": {"@type": "Answer", "text": "LCM is used whenever you need to align repeating cycles: finding when two events next coincide (e.g. buses arriving every 4 and 6 minutes), adding fractions with different denominators, scheduling shifts, and solving gear-ratio problems in engineering."}}, {"@type": "Question", "name": "Can I find the LCM of more than two numbers?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. The LCM of three or more numbers is found by applying LCM pairwise: LCM(a,b,c) = LCM(LCM(a,b), c). Just enter your numbers and the calculator handles the chain automatically."}}]}</script>

<script>
GZI18n.register({
  en: {
    toolTitle: 'LCM Calculator',
    toolDesc: 'Find the least common multiple (LCM) of two or more numbers instantly. Step-by-step prime factorization shown.',
    resultLabel: 'LCM (Least Common Multiple)',
    alsoLCD: 'Also called: LCD (Least Common Denominator) when adding fractions',
    stepsTitle: 'Step-by-step (prime factorization)',
    step1: 'Enter two positive integers in the boxes above',
    step2: 'See the LCM instantly in the result card',
    step3: 'Read the prime factorization steps below to understand how',
    step4: 'Use the related GCD Calculator to find the greatest common divisor',
    invalid: 'Please enter two positive integers',
  },
  zh: {
    toolTitle: '最小公倍数计算器 (LCM)',
    toolDesc: '即时计算两个或多个数的最小公倍数（LCM），并显示分解质因数的每一步。',
    resultLabel: 'LCM（最小公倍数）',
    alsoLCD: '通分时也称为：LCD（最小公分母）',
    stepsTitle: '计算步骤（分解质因数）',
    step1: '在上方输入框中输入两个正整数',
    step2: '即时在结果卡中查看 LCM',
    step3: '阅读下方的质因数分解步骤理解计算过程',
    step4: '使用相关 GCD 计算器求最大公约数',
    invalid: '请输入两个正整数',
  }
});
const { $, t } = GZ;

function gcd(a, b) {
  a = Math.abs(a); b = Math.abs(b);
  while (b) { [a, b] = [b, a % b]; }
  return a;
}

function lcm(a, b) {
  if (a === 0 || b === 0) return 0;
  return Math.abs(a * b) / gcd(a, b);
}

function primeFactors(n) {
  const factors = {};
  let d = 2;
  while (n > 1) {
    while (n % d === 0) {
      factors[d] = (factors[d] || 0) + 1;
      n = n / d;
    }
    d++;
    if (d * d > n) {
      if (n > 1) factors[n] = (factors[n] || 0) + 1;
      break;
    }
  }
  return factors;
}

function calc() {
  const a = parseInt($('#a').value, 10);
  const b = parseInt($('#b').value, 10);
  const res = $('#result');
  if (isNaN(a) || isNaN(b) || a < 1 || b < 1) {
    res.innerHTML = `<div class="label">${t('resultLabel')}</div><div class="value" style="color:var(--text3)">—</div>`;
    $('#steps').innerHTML = '';
    return;
  }
  const l = lcm(a, b);
  res.innerHTML = `<div class="label">${t('resultLabel')}</div><div class="value">${l.toLocaleString()}</div><div class="sub">LCM(${a}, ${b}) = ${l.toLocaleString()}</div><div class="sub" style="margin-top:4px;font-size:.8rem;opacity:.7">${t('alsoLCD')}</div>`;

  const fa = primeFactors(a);
  const fb = primeFactors(b);
  const allPrimes = Array.from(new Set([...Object.keys(fa), ...Object.keys(fb)].map(Number))).sort((x, y) => x - y);
  let html = '';
  const fmtFactors = (f) => Object.entries(f).map(([p, e]) => e > 1 ? `${p}<sup>${e}</sup>` : `${p}`).join(' × ');
  html += `<div class="step-line">${a} = <span class="hl">${fmtFactors(fa) || a}</span></div>`;
  html += `<div class="step-line">${b} = <span class="hl">${fmtFactors(fb) || b}</span></div>`;
  html += `<div class="step-line" style="margin-top:8px;color:var(--text2)">Take highest power of each prime:</div>`;
  let lcmExpr = [];
  allPrimes.forEach(p => {
    const e = Math.max(fa[p] || 0, fb[p] || 0);
    lcmExpr.push(e > 1 ? `${p}<sup>${e}</sup>` : `${p}`);
  });
  html += `<div class="step-line">LCM = <span class="hl">${lcmExpr.join(' × ') || l}</span></div>`;
  html += `<div class="step-line" style="margin-top:8px;border-top:1px solid var(--border);padding-top:8px">∴ LCM = <span class="hl">${l.toLocaleString()}</span></div>`;
  $('#steps').innerHTML = html;
}

$('#a').addEventListener('input', calc);
$('#b').addEventListener('input', calc);
$('#toolbar').innerHTML = `<button class="gz-btn gz-btn-secondary" onclick="$('#a').value='12';$('#b').value='18';calc()">${t('example')}</button>`;
$('#steps-title').textContent = t('stepsTitle');

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],

    {icon:'🔢', href:'/calc/prime-number-checker.html', name:'Prime Checker'},
    {icon:'➗', href:'/calc/fraction-calculator.html', name:'Fraction Calc'},
    {icon:'📊', href:'/calc/percent-difference-calculator.html', name:'Percent Diff'},
  ]
});

calc();
</script>
