<script>
GZI18n.register({
  en: {
    toolTitle: 'Mobile Friendly Test',
    toolDesc: 'Preview any website on phone, tablet and desktop widths. See how your layout responds at iPhone, Android and tablet sizes, and check key mobile-friendliness signals. Free, browser-only.',
    btnTest: 'Test',
    panelTitle: 'Responsive signals',
    barSize: 'Viewport',
    barRotate: '↻',
    note: 'Heuristic checks run on the loaded page. Some sites block iframe embedding (X-Frame-Options / CSP) — in that case open the URL directly in a new tab and use this tool to size your own browser.',
    chkViewport: 'Viewport meta tag',
    chkFontSize: 'Body font ≥ 16px',
    chkTapTargets: 'Tap targets ≥ 48px',
    chkOverflow: 'No horizontal overflow',
    chkImages: 'Images use max-width',
    chkDensity: 'Touch density OK',
    pass: 'Pass', fail: 'Fail', na: 'N/A', pending: 'Pending',
    step1: 'Enter the URL of the page you want to test',
    step2: 'Pick a device preset or use the slider',
    step3: 'Click Test to load the page in the device frame',
    step4: 'Read the responsive signals on the right — fix any failures',
    errBlank: 'Please enter a URL',
    blocked: 'Site blocked iframe embedding — open directly to test',
  },
  zh: {
    toolTitle: '移动端友好测试',
    toolDesc: '在手机、平板和桌面宽度下预览任意网站。查看布局在 iPhone、Android 和平板尺寸下的响应效果，并检查关键的移动端友好信号。免费、浏览器本地运行。',
    btnTest: '测试',
    panelTitle: '响应式信号',
    barSize: '视口',
    barRotate: '↻',
    note: '检查在已加载的页面上进行。部分网站会通过 X-Frame-Options / CSP 禁止 iframe 嵌入 — 此时请直接在新标签页打开网址，并用本工具调整浏览器尺寸。',
    chkViewport: 'Viewport meta 标签',
    chkFontSize: '正文字体 ≥ 16px',
    chkTapTargets: '点击目标 ≥ 48px',
    chkOverflow: '无水平溢出',
    chkImages: '图片使用 max-width',
    chkDensity: '触摸密度正常',
    pass: '通过', fail: '不通过', na: '不适用', pending: '等待',
    step1: '输入要测试的页面 URL',
    step2: '选择设备预设或使用滑块',
    step3: '点击「测试」在设备框架中加载页面',
    step4: '查看右侧响应式信号，修复不通过项',
    errBlank: '请输入 URL',
    blocked: '网站禁止 iframe 嵌入 — 请直接打开测试',
  }
});

const { $, t } = GZ;

const DEVICES = [
  { id: 'iphone-se', label: 'iPhone SE', w: 375, h: 667 },
  { id: 'iphone-14', label: 'iPhone 14', w: 390, h: 844 },
  { id: 'pixel-7', label: 'Pixel 7', w: 412, h: 915 },
  { id: 'ipad', label: 'iPad', w: 768, h: 1024 },
  { id: 'desktop', label: 'Desktop', w: 1280, h: 800 },
];

let curDev = DEVICES[1];

function renderDevices() {
  const wrap = $('#devices');
  wrap.innerHTML = '';
  DEVICES.forEach(d => {
    const b = document.createElement('button');
    b.className = 'mf-device' + (d.id === curDev.id ? ' active' : '');
    b.textContent = `${d.label} (${d.w}×${d.h})`;
    b.addEventListener('click', () => { curDev = d; applyDevice(); renderDevices(); });
    wrap.appendChild(b);
  });
}

function applyDevice() {
  const wrap = $('#iframe-wrap');
  wrap.style.width = curDev.w + 'px';
  wrap.style.height = curDev.h + 'px';
  $('#bar-size').textContent = t('barSize') + ': ' + curDev.w + '×' + curDev.h;
}

function normalizeUrl(u) {
  u = u.trim();
  if (!u) return '';
  if (!/^https?:\/\//i.test(u)) u = 'https://' + u;
  return u;
}

function runChecks() {
  const iframe = $('#preview');
  const checks = $('#checks');
  // Reset
  checks.innerHTML = ['chkViewport','chkFontSize','chkTapTargets','chkOverflow','chkImages','chkDensity']
    .map(k => `<div class="mf-check"><span class="warn">…</span><span>${t(k)}</span></div>`).join('');

  // Cross-origin: we can't read iframe contents. Try-catch.
  setTimeout(() => {
    let doc;
    try {
      doc = iframe.contentDocument || iframe.contentWindow.document;
    } catch(e) {
      checks.innerHTML = `<div class="mf-check"><span class="bad">✕</span><span>${t('blocked')}</span></div>`;
      return;
    }
    if (!doc) {
      checks.innerHTML = `<div class="mf-check"><span class="bad">✕</span><span>${t('blocked')}</span></div>`;
      return;
    }
    const results = [];
    // viewport meta
    const vp = doc.querySelector('meta[name="viewport"]');
    results.push({ key: 'chkViewport', ok: !!vp && /width=device-width/.test(vp.content || '') });
    // body font size
    let fontOk = false;
    try {
      const fs = parseInt(getComputedStyle(doc.body || doc.documentElement).fontSize);
      fontOk = fs >= 16;
    } catch(e) {}
    results.push({ key: 'chkFontSize', ok: fontOk });
    // tap targets
    let tapOk = false, tapCounted = false;
    try {
      const btns = doc.querySelectorAll('a, button, input[type=submit], [role=button]');
      let small = 0, total = 0;
      btns.forEach(b => {
        if (total > 30) return; total++;
        const r = b.getBoundingClientRect();
        if (r.width > 0 && (r.width < 40 || r.height < 40)) small++;
      });
      if (total > 0) { tapOk = small / total < 0.3; tapCounted = true; }
    } catch(e) {}
    results.push({ key: 'chkTapTargets', ok: tapCounted ? tapOk : null });
    // horizontal overflow
    let overflowOk = true;
    try {
      const sw = doc.documentElement.scrollWidth, cw = doc.documentElement.clientWidth;
      overflowOk = sw <= cw + 2;
    } catch(e) {}
    results.push({ key: 'chkOverflow', ok: overflowOk });
    // images max-width
    let imgOk = false, imgCounted = false;
    try {
      const imgs = doc.querySelectorAll('img');
      let total = 0, responsive = 0;
      imgs.forEach(img => {
        if (total > 20) return; total++;
        const s = getComputedStyle(img);
        if (s.maxWidth !== 'none' || s.width === '100%' || /%/.test(img.getAttribute('width') || '')) responsive++;
      });
      if (total > 0) { imgOk = responsive / total >= 0.5; imgCounted = true; }
    } catch(e) {}
    results.push({ key: 'chkImages', ok: imgCounted ? imgOk : null });
    // density
    results.push({ key: 'chkDensity', ok: null });

    checks.innerHTML = results.map(r => {
      const cls = r.ok === null ? 'warn' : (r.ok ? 'ok' : 'bad');
      const sym = r.ok === null ? '?' : (r.ok ? '✓' : '✕');
      const label = r.ok === null ? t('na') : (r.ok ? t('pass') : t('fail'));
      return `<div class="mf-check"><span class="${cls}">${sym} ${label}</span><span>${t(r.key)}</span></div>`;
    }).join('');
  }, 1500);
}

function doTest() {
  const url = normalizeUrl($('#url').value);
  if (!url) { alert(t('errBlank')); return; }
  $('#url').value = url;
  const iframe = $('#preview');
  iframe.onload = runChecks;
  iframe.onerror = () => { $('#checks').innerHTML = `<div class="mf-check"><span class="bad">✕</span><span>${t('blocked')}</span></div>`; };
  iframe.src = url;
  applyDevice();
}

function syncLabels() {
  $('#btn-test').textContent = t('btnTest');
  $('#panel-title').textContent = t('panelTitle');
  $('#note').textContent = t('note');
}

$('#btn-test').addEventListener('click', doTest);
$('#url').addEventListener('keydown', e => { if (e.key === 'Enter') doTest(); });
$('#bar-rotate').addEventListener('click', () => {
  const tmp = curDev.w; curDev.w = curDev.h; curDev.h = tmp;
  applyDevice();
});

syncLabels();
renderDevices();
applyDevice();

GZ.renderToolPage({
  category: 'seo',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📱', href:'/dev/screen-resolution.html', name:'Screen Resolution'},
    {icon:'🌐', href:'/dev/viewport-emulator.html', name:'Viewport Emulator'},
    {icon:'📄', href:'/seo/meta-tag-generator.html', name:'Meta Tag Generator'},
    {icon:'⚡', href:'/dev/web-vitals.html', name:'Web Vitals'},
  ]
});
</script>
