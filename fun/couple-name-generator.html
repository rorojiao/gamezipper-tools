const { $, t } = GZ;
function cap(s) { return s ? s[0].toUpperCase() + s.slice(1).toLowerCase() : ''; }
function clean(s) { return s.trim().replace(/[^a-zA-Z\u4e00-\u9fff]/g, ''); }
function isChinese(s) { return /[\u4e00-\u9fff]/.test(s); }

function blendFirstHalf(a, b) {
  a = cap(a); b = cap(b);
  const halfA = Math.ceil(a.length / 2);
  return a.slice(0, halfA) + b.slice(halfA);
}

function blendLastHalf(a, b) {
  a = cap(a); b = cap(b);
  const halfB = Math.ceil(b.length / 2);
  return a + b.slice(halfB);
}

function blendInitials(a, b) {
  return cap(a).charAt(0) + '+' + cap(b).charAt(0);
}

function blendPortmanteau(a, b) {
  a = cap(a); b = cap(b);
  // Find a vowel in the middle of a to split
  const m = a.slice(1).search(/[aeiou]/i);
  const splitAt = m >= 0 ? m + 1 : Math.ceil(a.length / 2);
  return a.slice(0, splitAt) + b.slice(splitAt);
}

function blendRhyme(a, b) {
  a = cap(a); b = cap(b);
  // Keep first half of a, full b
  const halfA = Math.ceil(a.length / 2);
  return a.slice(0, halfA) + b.slice(1);
}

function blendAnagram(a, b) {
  a = cap(a); b = cap(b);
  const all = (a + b).split('').filter(c => /[a-z]/i.test(c));
  // Sort with some shuffle
  for (let i = all.length - 1; i > 0; i--) {
    const j = Math.floor(secureRandom(i + 1));
    [all[i], all[j]] = [all[j], all[i]];
  }
  return cap(all.join(''));
}

function blendSeparator(a, b, sep) {
  return cap(a) + ' ' + (sep || '&') + ' ' + cap(b);
}

function secureRandom(max) {
  const arr = new Uint32Array(1);
  crypto.getRandomValues(arr);
  return arr[0] % max;
}

function flash(msg) {
  const el = $('#flash');
  el.textContent = msg || 'Copied!';
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 1200);
}

function doGenerate() {
  const a = clean($('#name1').value);
  const b = clean($('#name2').value);
  if (!a || !b) { $('#results').innerHTML = ''; return; }

  const cards = [
    { name: blendFirstHalf(a, b),  label: t('style1'), explain: t('explain1') },
    { name: blendLastHalf(a, b),   label: t('style2'), explain: t('explain2') },
    { name: blendInitials(a, b),   label: t('style3'), explain: t('explain3') },
    { name: blendPortmanteau(a,b), label: t('style4'), explain: t('explain4') },
    { name: blendRhyme(a, b),      label: t('style5'), explain: t('explain5') },
    { name: blendAnagram(a, b),    label: t('style6'), explain: t('explain6') },
    { name: blendSeparator(a,b,'&'), label: t('style7'), explain: t('explain7') },
  ];

  $('#results').innerHTML = cards.map(c =>
    `<div class="result-card" onclick="navigator.clipboard.writeText(this.dataset.n).then(()=>flash('${c.name} copied!'))" data-n="${c.name}">
       <div class="label">${c.label}</div>
       <div class="name">${c.name}</div>
       <div class="explain">${c.explain}</div>
     </div>`
  ).join('');
}

function doExample() {
  $('#name1').value = 'Brad';
  $('#name2').value = 'Angelina';
  doGenerate();
}

function doClear() {
  $('#name1').value = '';
  $('#name2').value = '';
  $('#results').innerHTML = '';
}

['#name1','#name2'].forEach(sel => {
  $(sel).addEventListener('input', doGenerate);
});

$('#toolbar').innerHTML = `

  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;
