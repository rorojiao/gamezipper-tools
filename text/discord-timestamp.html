    step1: '选择日期和时间，或使用快速选择（现在、+1 小时、明天、下周一、下周）',
    step2: '从下拉框选择你的时区 — 工具转换为 Unix 秒并生成全部 6 种样式',
    step3: '点击任意代码卡将 <t:UNIX:STYLE> 标签复制到剪贴板',

const { $, t } = GZ;

const STYLES = [
  { code:'t', en:'Short Time', zh:'短时间', sample: '16:20' },
  { code:'T', en:'Long Time', zh:'长时间', sample: '16:20:30' },
  { code:'d', en:'Short Date', zh:'短日期', sample: '20/04/2024' },
  { code:'D', en:'Long Date', zh:'长日期', sample: '20 April 2024' },
  { code:'f', en:'Short Date+Time', zh:'短日期+时间', sample: '20 April 2024 16:20' },
  { code:'F', en:'Long Date+Time', zh:'长日期+时间', sample: 'Saturday, 20 April 2024 16:20' },
  { code:'R', en:'Relative', zh:'相对时间', sample: 'in 2 hours' },
];

function getTzList() {
  if (typeof Intl.supportedValuesOf === 'function') {
    return Intl.supportedValuesOf('timeZone');
  }
  return ['UTC','America/New_York','America/Los_Angeles','Europe/London','Europe/Paris','Asia/Tokyo','Asia/Shanghai','Asia/Hong_Kong','Australia/Sydney'];
}

function localTz() {
  return Intl.DateTimeFormat().resolvedOptions().timeZone || 'UTC';
}

function nowLocal() {
  const d = new Date();
  return {
    y: d.getFullYear(), m: d.getMonth()+1, d: d.getDate(),
    h: d.getHours(), mi: d.getMinutes(), s: d.getSeconds()
  };
}

function tzOffsetMin(tz, refDate) {
  // Returns offset in minutes from UTC for given tz at given instant
  try {
    const dtf = new Intl.DateTimeFormat('en-US', { timeZone: tz, timeZoneName: 'longOffset' });
    const parts = dtf.formatToParts(refDate);
    const tzPart = parts.find(p => p.type === 'timeZoneName');
    let txt = tzPart ? tzPart.value : 'GMT+00:00';
    let m = txt.match(/GMT([+-])(\d{1,2})(?::?(\d{2}))?/);
    if (m) {
      const sign = m[1] === '-' ? -1 : 1;
      const h = parseInt(m[2]);
      const mi = parseInt(m[3] || '0');
      return sign * (h * 60 + mi);
    }
    return 0;
  } catch (e) { return 0; }
}

function dateInTzToUtc(y, mo, d, h, mi, s, tz) {
  // Build a Date as if the local fields were UTC, then subtract tz offset
  const naiveUtc = Date.UTC(y, mo-1, d, h, mi, s);
  const off = tzOffsetMin(tz, new Date(naiveUtc));
  return Math.floor((naiveUtc - off * 60000) / 1000);
}

function getUnix() {
  const y = +$('#date').value.split('-')[0];
  const mo = +$('#date').value.split('-')[1];
  const d = +$('#date').value.split('-')[2];
  const h = +$('#hour').value || 0;
  const mi = +$('#min').value || 0;
  const s = +$('#sec').value || 0;
  const tz = $('#tz').value;
  return dateInTzToUtc(y, mo, d, h, mi, s, tz);
}

function fmtSample(unix, style, lang) {
  const d = new Date(unix * 1000);
  const opt = lang === 'zh' ? { hour12: false } : { hour12: false };
  try {
    if (style === 't') return d.toLocaleTimeString(lang === 'zh' ? 'zh-CN' : 'en-GB', { hour: '2-digit', minute: '2-digit', hour12: false });
    if (style === 'T') return d.toLocaleTimeString(lang === 'zh' ? 'zh-CN' : 'en-GB', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false });
    if (style === 'd') return d.toLocaleDateString(lang === 'zh' ? 'zh-CN' : 'en-GB', { day: '2-digit', month: '2-digit', year: 'numeric' });
    if (style === 'D') return d.toLocaleDateString(lang === 'zh' ? 'zh-CN' : 'en-GB', { day: 'numeric', month: 'long', year: 'numeric' });
    if (style === 'f') return d.toLocaleString(lang === 'zh' ? 'zh-CN' : 'en-GB', { day: 'numeric', month: 'long', year: 'numeric', hour: '2-digit', minute: '2-digit', hour12: false });
    if (style === 'F') return d.toLocaleString(lang === 'zh' ? 'zh-CN' : 'en-GB', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric', hour: '2-digit', minute: '2-digit', hour12: false });
    if (style === 'R') {
      const diff = (unix - Date.now()/1000) | 0;
      const abs = Math.abs(diff);
      const units = [[60, 'second', '秒'], [3600, 'minute', '分钟'], [86400, 'hour', '小时'], [604800, 'day', '天'], [2592000, 'week', '周'], [31536000, 'month', '个月'], [Infinity, 'year', '年']];
      let chosen = units[0];
      for (const u of units) if (abs >= u[0]) chosen = u;
      const n = Math.floor(abs / chosen[0]);
      if (lang === 'zh') return (diff < 0 ? '' : '') + n + ' ' + chosen[2] + (diff < 0 ? '前' : '后');
      return (diff < 0 ? '' : 'in ') + n + ' ' + chosen[1] + (diff < 0 ? ' ago' : '');
    }
  } catch (e) { return '?'; }
  return '';
}

function render() {
  const unix = getUnix();
  const lang = document.documentElement.lang === 'zh' ? 'zh' : 'en';
  $('#list').innerHTML = STYLES.map(s => {
    const code = '<t:' + unix + ':' + s.code + '>';
    const sample = fmtSample(unix, s.code, lang);
    const name = lang === 'zh' ? s.zh : s.en;
    return `<div class="dt-item" data-code="${code.replace(/"/g,'&quot;')}">
      <div class="name">${name}</div>
      <div>
        <div class="code">${code}</div>
        <div class="preview">Renders as: <b>${sample}</b></div>
      </div>
      <button class="copy" data-copy="${code.replace(/"/g,'&quot;')}">📋</button>
    </div>`;
  }).join('');

  $('#list').querySelectorAll('.dt-item').forEach(el => el.addEventListener('click', e => {
    if (e.target.classList.contains('copy')) return;
    const code = el.dataset.code;
    GZ.copyText(code);
    GZ.showToast('✓ ' + code);
  }));
  $('#list').querySelectorAll('.copy').forEach(el => el.addEventListener('click', e => {
    e.stopPropagation();
    GZ.copyText(el.dataset.copy);
    GZ.showToast('✓ Copied');
  }));

  // Preview
  const previewParts = STYLES.slice(0,4).map(s => {
    const sample = fmtSample(unix, s.code, lang);
    return `<b>${s.code.toUpperCase()}:</b> ${sample}`;
  });
  $('#preview').innerHTML = 'Event: ' + fmtSample(unix, 'F', lang) + '<br><br>— in your local timezone —<br><br>' + previewParts.join('<br>') + '<br><br><span style="opacity:.6">Paste any &lt;t:...&gt; tag into Discord to render the same time in each viewer\'s local timezone.</span>';
}

function initTzSelect() {
  const tzs = getTzList();
  const local = localTz();
  $('#tz').innerHTML = tzs.map(z => `<option value="${z}" ${z === local ? 'selected' : ''}>${z}</option>`).join('');
}

function applyQuick(when) {
  const now = new Date();
  if (when === 'now') {
    // keep current
  } else if (when === '+1h') now.setHours(now.getHours() + 1);
  else if (when === '+1d') now.setDate(now.getDate() + 1);
  else if (when === 'next-mon') {
    const day = now.getDay();
    const diff = (8 - day) % 7 || 7;
    now.setDate(now.getDate() + diff);
    now.setHours(20, 0, 0, 0);
  } else if (when === 'next-week') now.setDate(now.getDate() + 7);
  else if (when === 'newyear') {
    const ny = new Date(now.getFullYear() + 1, 0, 1, 0, 0, 0);
    $('#date').value = ny.toISOString().split('T')[0];
    $('#hour').value = '0'; $('#min').value = '0'; $('#sec').value = '0';
    render(); return;
  }
  const dStr = now.toISOString().split('T')[0];
  $('#date').value = dStr;
  if (when === 'now' || when === '+1h' || when === '+1d' || when === 'next-mon' || when === 'next-week') {
    if (when !== 'next-mon') { $('#hour').value = String(now.getHours()).padStart(2,'0'); $('#min').value = String(now.getMinutes()).padStart(2,'0'); $('#sec').value = '00'; }
  }
  render();
}

function init() {
  initTzSelect();
  const now = nowLocal();
  const d = new Date();
  $('#date').value = d.toISOString().split('T')[0];
  $('#hour').value = String(now.h).padStart(2,'0');
  $('#min').value = String(now.mi).padStart(2,'0');
  $('#sec').value = String(now.s).padStart(2,'0');

  // Quick buttons
  const lang = document.documentElement.lang === 'zh' ? 'zh' : 'en';
  const quickLabel = t('quickLabel');
  $('#quick').innerHTML = '<span style="font-size:.75rem;color:var(--text2);margin-right:6px">' + quickLabel + '</span>' +
    ['now','+1h','+1d','next-mon','next-week','newyear'].map(id => {
      const labels = { now:lang==='zh'?'现在':'Now', '+1h':lang==='zh'?'+1 小时':'+1 hour', '+1d':lang==='zh'?'明天':'Tomorrow', 'next-mon':lang==='zh'?'下周一':'Next Monday', 'next-week':lang==='zh'?'下周':'Next week', 'newyear':lang==='zh'?'新年':'New Year' };
      return `<div class="dt-quick-btn" data-q="${id}">${labels[id]}</div>`;
    }).join('');
  $('#quick').querySelectorAll('.dt-quick-btn').forEach(el => el.addEventListener('click', e => applyQuick(e.currentTarget.dataset.q)));

  // Preset offsets
  $('#presets').innerHTML = '<span style="font-size:.75rem;color:var(--text2);margin-right:6px">' + t('presetLabel') + '</span>' +
    [[-12,'-12h'],[-6,'-6h'],[0,'0'],[6,'+6h'],[12,'+12h'],[24,'+1d']].map(([h, l]) => `<div class="dt-preset" data-h="${h}">${l}</div>`).join('');
  $('#presets').querySelectorAll('.dt-preset').forEach(el => el.addEventListener('click', e => {
    const h = +e.currentTarget.dataset.h;
    const base = new Date($('#date').value + 'T' + String($('#hour').value).padStart(2,'0') + ':' + String($('#min').value).padStart(2,'0') + ':' + String($('#sec').value).padStart(2,'0'));
    base.setHours(base.getHours() + h);
    $('#date').value = base.toISOString().split('T')[0];
    $('#hour').value = String(base.getHours()).padStart(2,'0');
    $('#min').value = String(base.getMinutes()).padStart(2,'0');
    render();
  }));

  ['date','hour','min','sec'].forEach(id => $('#' + id).addEventListener('input', render));
  $('#tz').addEventListener('change', render);

  $('#info').innerHTML = t('info');
  render();
}

init();
