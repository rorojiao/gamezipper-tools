<script>
GZI18n.register({
  en: {
    toolTitle: 'Chimp Test',
    toolDesc: 'Click the numbered tiles in order from 1 upward. After each click the number disappears — so you must remember where the next ones are. Are you smarter than a chimp?',
    start: 'Click to start', nextNum: 'Click the numbers in order',
    level: 'Level', numbers: 'Numbers', lives: 'Lives', best: 'Best', restart: 'Restart',
    wrong: '✗ Wrong number!', gameOver: 'Game Over', correct: '✓ Perfect!',
    tip: 'Click 1→2→3... Numbers hide after click. 3 lives. Memorize positions!',
    step1: 'Click the stage to start. Numbers 1 to N appear scattered',
    step2: 'Click them in ascending order: 1, 2, 3...',
    step3: 'After clicking a number it becomes blank — remember the rest',
    step4: 'Each level adds a number. Three wrong clicks end the game',
  },
  zh: {
    toolTitle: '黑猩猩记忆测试',
    toolDesc: '按从 1 开始的顺序点击数字方块。每次点击后该数字消失 — 你必须记住剩下的数字在哪里。你比黑猩猩更聪明吗？',
    start: '点击开始', nextNum: '按顺序点击数字',
    level: '关卡', numbers: '数字', lives: '生命', best: '最佳', restart: '重新开始',
    wrong: '✗ 数字错误！', gameOver: '游戏结束', correct: '✓ 完美！',
    tip: '按 1→2→3... 点击。点击后数字隐藏。3 条命。记住位置！',
    step1: '点击区域开始。1 到 N 的数字随机分布',
    step2: '按升序点击：1、2、3...',
    step3: '点击后数字消失 — 记住剩余数字的位置',
    step4: '每关增加一个数字。点错 3 次游戏结束',
  }
});

const { $, t } = GZ;
let level = 4; // starts at 4 numbers (humanbenchmark style)
let lives = 3;
let best = 0;
let nextExpected = 1;
let phase = 'idle'; // idle | showing | playing | done
let positions = []; // [{num, slotIdx, clicked}]

function buildRound() {
  const numTiles = level;
  const totalSlots = 20; // 4x5 grid
  const slots = [];
  while (slots.length < numTiles) {
    const idx = Math.floor(Math.random() * totalSlots);
    if (!slots.includes(idx)) slots.push(idx);
  }
  positions = [];
  for (let i = 0; i < numTiles; i++) {
    positions.push({ num: i + 1, slotIdx: slots[i], clicked: false });
  }
  nextExpected = 1;
  renderGrid();
}

function renderGrid() {
  const totalSlots = 20;
  const stage = $('#stage');
  stage.innerHTML = `
    <span class="lvl-badge">${t('level')} ${level - 3} — ${level} ${t('numbers')}</span>
    <div class="status" id="chimpStatus">${t('nextNum')}</div>
    <div class="tile-grid" id="chimpGrid"></div>`;
  const grid = $('#chimpGrid');
  for (let i = 0; i < totalSlots; i++) {
    const tile = document.createElement('div');
    const pos = positions.find(p => p.slotIdx === i);
    if (pos) {
      tile.className = 'num-tile';
      tile.textContent = pos.num;
      tile.onclick = () => onTileClick(pos, tile);
    } else {
      tile.className = 'num-tile blank';
    }
    grid.appendChild(tile);
  }
}

function onTileClick(pos, tile) {
  if (phase !== 'playing') return;
  if (pos.clicked) return;

  if (pos.num === nextExpected) {
    pos.clicked = true;
    tile.classList.add('hidden');
    tile.textContent = '';
    nextExpected++;
    // check round complete
    if (nextExpected > level) {
      phase = 'done';
      level++;
      if (level - 1 > best) best = level - 1;
      renderStats();
      setTimeout(buildRound, 800);
    }
  } else {
    // wrong — reveal all
    tile.classList.add('wrong');
    positions.forEach(p => {
      const el = $('#chimpGrid').children[p.slotIdx];
      if (el) { el.classList.remove('hidden'); el.textContent = p.num; }
    });
    lives--;
    renderStats();
    if (lives <= 0) {
      gameOver();
    } else {
      $('#chimpStatus').textContent = t('wrong');
      phase = 'done';
      setTimeout(buildRound, 1800);
    }
  }
}

function gameOver() {
  phase = 'idle';
  const stage = $('#stage');
  stage.innerHTML = `
    <div style="font-size:2em;font-weight:900;color:#e94560">${t('gameOver')}</div>
    <div style="font-size:1.4em;margin:12px 0">${t('numbers')}: <b style="color:var(--gz-accent)">${level - 1}</b></div>
    <button class="gz-btn" onclick="restart()" style="font-size:1.2em;padding:12px 28px">🔄 ${t('restart')}</button>`;
}

function restart() {
  level = 4; lives = 3;
  renderStats();
  phase = 'playing';
  buildRound();
}

function renderStats() {
  $('#stats').innerHTML = `
    <div class="stat"><div class="num">${level - 3}</div><div class="lbl">${t('level')}</div></div>
    <div class="stat"><div class="num">${level}</div><div class="lbl">${t('numbers')}</div></div>
    <div class="stat"><div class="num" style="color:#e94560">${'❤'.repeat(Math.max(0,lives))}${'🖤'.repeat(3-Math.max(0,lives))}</div><div class="lbl">${t('lives')}</div></div>
    <div class="stat"><div class="num">${best}</div><div class="lbl">${t('best')}</div></div>`;
}

function init() {
  phase = 'idle';
  $('#stage').className = 'stage';
  $('#stage').innerHTML = `<div style="font-size:1.6em;font-weight:700;color:var(--text2)">${t('start')}</div>`;
  $('#stats').innerHTML = '';
}

$('#stage').addEventListener('click', (e) => {
  if (phase === 'idle' && !e.target.classList.contains('num-tile')) restart();
});
$('#toolbar').innerHTML = `<button class="gz-btn" onclick="init()">🔄 ${t('restart')}</button>`;

GZ.renderToolPage({
  category: 'fun',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🔢', href:'/fun/number-memory-test.html', name:'Number Memory Test'},
    {icon:'🧠', href:'/fun/visual-memory-test.html', name:'Visual Memory Test'},
    {icon:'⚡', href:'/fun/reaction-time.html', name:'Reaction Time Test'},
    {icon:'🎯', href:'/fun/aim-trainer.html', name:'Aim Trainer'},
  ]
});
init();
</script>
<script src="/tools-result-rec.js" defer></script>
