<script>
GZI18n.register({
  en: {
    toolTitle: 'Image Flipper',
    toolDesc: 'Flip or mirror images online. Flip horizontally, vertically, or both at once. Live preview and PNG/JPG export — free and browser-based.',
    selectBtn: 'Select Image',
    dropzone: 'Drop an image here or click to upload',
    flipH: 'Flip Horizontal (Mirror)',
    flipV: 'Flip Vertical',
    flipBoth: 'Flip Both',
    downloadPng: 'Download PNG',
    downloadJpg: 'Download JPG',
    reset: 'Reset',
    newImage: 'New Image',
    compare: 'Show original side-by-side',
    step1: 'Upload or drag and drop an image',
    step2: 'Click Flip Horizontal, Vertical, or Both',
    step3: 'Toggle Compare to see the original next to the result',
    step4: 'Download the flipped image as PNG or JPG',
  },
  zh: {
    toolTitle: '图片翻转工具',
    toolDesc: '在线翻转或镜像图片。支持水平翻转、垂直翻转或两者同时翻转。实时预览，导出 PNG/JPG — 免费浏览器本地处理。',
    selectBtn: '选择图片',
    dropzone: '拖拽图片到此处或点击上传',
    flipH: '水平翻转（镜像）',
    flipV: '垂直翻转',
    flipBoth: '全部翻转',
    downloadPng: '下载 PNG',
    downloadJpg: '下载 JPG',
    reset: '重置',
    newImage: '换张图片',
    compare: '对比显示原图',
    step1: '上传或拖拽图片到页面',
    step2: '点击水平翻转、垂直翻转或全部翻转',
    step3: '勾选对比以并排查看原图',
    step4: '下载翻转后的图片为 PNG 或 JPG',
  }
});

const { $, t } = GZ;
let origImg = null;
let flipH = false, flipV = false;
const canvas = $('#canvas');
const ctx = canvas.getContext('2d');

function loadImage(file) {
  const reader = new FileReader();
  reader.onload = e => {
    origImg = new Image();
    origImg.onload = () => {
      flipH = false; flipV = false;
      $('#show-original').checked = false;
      $('#controls').style.display = 'block';
      $('#dropzone').style.display = 'none';
      render();
    };
    origImg.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function render() {
  if (!origImg) return;
  const maxW = 1200;
  let w = origImg.width, h = origImg.height;
  if (w > maxW) { h = Math.round(h * maxW / w); w = maxW; }

  const showOrig = $('#show-original').checked;
  const cw = showOrig ? w * 2 + 16 : w;
  canvas.width = cw;
  canvas.height = h;
  ctx.clearRect(0, 0, cw, h);

  if (showOrig) {
    ctx.save();
    ctx.translate(w, 0);
    ctx.scale(1, 1);
    ctx.globalAlpha = 0.45;
    ctx.drawImage(origImg, 0, 0, w, h);
    ctx.globalAlpha = 1;
    ctx.restore();
    ctx.strokeStyle = 'rgba(255,255,255,0.4)';
    ctx.beginPath(); ctx.moveTo(w + 8, 0); ctx.lineTo(w + 8, h); ctx.stroke();
  }

  // Draw flipped
  ctx.save();
  ctx.translate(showOrig ? w + 16 : 0, 0);
  ctx.scale(flipH ? -1 : 1, flipV ? -1 : 1);
  if (flipH && flipV) ctx.translate(-w, -h);
  else if (flipH) ctx.translate(-w, 0);
  else if (flipV) ctx.translate(0, -h);
  ctx.drawImage(origImg, 0, 0, w, h);
  ctx.restore();
}

function download(type) {
  if (!origImg) return;
  // re-render without compare for clean export
  const wasShown = $('#show-original').checked;
  if (wasShown) $('#show-original').checked = false;
  render();
  const a = document.createElement('a');
  a.href = canvas.toDataURL(type === 'jpg' ? 'image/jpeg' : 'image/png', 0.92);
  a.download = 'flipped-image.' + (type === 'jpg' ? 'jpg' : 'png');
  a.click();
  if (wasShown) { $('#show-original').checked = true; render(); }
}

$('#select-btn').textContent = t('selectBtn');
$('#dropzone-text').textContent = t('dropzone');
$('#lbl-compare').textContent = t('compare');
$('#flip-h').textContent = t('flipH');
$('#flip-v').textContent = t('flipV');
$('#flip-both').textContent = t('flipBoth');

$('#dropzone').onclick = () => $('#file-input').click();
$('#file-input').onchange = e => { if (e.target.files[0]) loadImage(e.target.files[0]); };
['dragover'].forEach(ev => $('#dropzone').addEventListener(ev, e => { e.preventDefault(); $('#dropzone').classList.add('dragover'); }));
['dragleave','drop'].forEach(ev => $('#dropzone').addEventListener(ev, e => { e.preventDefault(); $('#dropzone').classList.remove('dragover'); }));
$('#dropzone').addEventListener('drop', e => { if (e.dataTransfer.files[0]) loadImage(e.dataTransfer.files[0]); });

$('#flip-h').onclick = () => { flipH = !flipH; render(); };
$('#flip-v').onclick = () => { flipV = !flipV; render(); };
$('#flip-both').onclick = () => { flipH = !flipH; flipV = !flipV; render(); };
$('#show-original').onchange = render;

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="download('png')">${t('downloadPng')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="download('jpg')">${t('downloadJpg')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="flipH=false;flipV=false;render()">${t('reset')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="document.getElementById('dropzone').style.display='block';document.getElementById('controls').style.display='none';">${t('newImage')}</button>`;

GZ.renderToolPage({
  category: 'image',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🔄', href:'/image/image-rotator.html', name:'Image Rotator'},
    {icon:'🎨', href:'/image/image-filter.html', name:'Image Filter'},
    {icon:'✂️', href:'/image/cropper.html', name:'Image Cropper'},
    {icon:'📐', href:'/image/resizer.html', name:'Image Resizer'},
  ]
});
</script>
