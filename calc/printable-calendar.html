<script>
GZI18n.register({
  en: {
    toolTitle: 'Printable Calendar Generator',
    toolDesc: 'Create free printable monthly and yearly calendars. Customize starting weekday, colors, and US holidays. Download as PDF or print — no signup.',

    step2: 'Select the month/year and starting weekday',
    step3: 'Toggle US federal holidays and pick a color',
    step4: 'Click Print or Download PDF — done!',
  },
  zh: {
    toolTitle: '可打印日历生成器',
    toolDesc: '免费创建可打印的月度和年度日历。自定义起始星期、颜色和美国假日。下载为 PDF 或直接打印 — 无需注册。',
    layout: '布局',
    monthly: '单月',
    yearly: '全年',
    month: '月份',
    startDay: '起始日',
    sunday: '星期日',
    monday: '星期一',
    accentColor: '强调色',
    showHolidays: '显示美国假日',
    print: '🖨️ 打印',
    downloadPdf: '📥 下载 PDF',
    step1: '选择单月或全年布局',
    step2: '选择月份/年份和起始星期',
    step3: '开关美国联邦假日并选择颜色',
    step4: '点击打印或下载 PDF — 完成！',
  }
});
const { $, t } = GZ;
const MONTHS_EN = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const MONTHS_ZH = ['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];
const DOW_EN_S = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const DOW_EN_M = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
const DOW_ZH_S = ['日','一','二','三','四','五','六'];
const DOW_ZH_M = ['一','二','三','四','五','六','日'];
// US Federal Holidays (fixed and floating)
const US_HOLIDAYS = {
  fixed: {'1-1':'New Year','1-15':'MLK Day_approx','2-14':"Valentine's",'3-17':"St. Patrick's",'7-4':'Independence Day','10-31':'Halloween','11-11':'Veterans Day','12-25':'Christmas','12-24':'Christmas Eve'},
  floating: {} // computed dynamically
};
function computeFloatingHolidays(year){
  const h = {};
  // MLK Day: 3rd Monday of January
  h[year+'-1-'+nthWeekday(year,0,3)] = 'MLK Day';
  // Presidents Day: 3rd Monday of February
  h[year+'-2-'+nthWeekday(year,0,3)] = 'Presidents Day';
  // Memorial Day: last Monday of May
  h[year+'-5-'+lastWeekday(year,4,0)] = 'Memorial Day';
  // Labor Day: 1st Monday of September
  h[year+'-9-'+nthWeekday(year,0,1)] = 'Labor Day';
  // Columbus Day: 2nd Monday of October
  h[year+'-10-'+nthWeekday(year,0,2)] = 'Columbus Day';
  // Thanksgiving: 4th Thursday of November
  h[year+'-11-'+nthWeekday(year,3,4)] = 'Thanksgiving';
  return h;
}
function nthWeekday(year,month,weekday,n){
  let count=0;
  for(let d=1;d<=31;d++){const dt=new Date(year,month,d);if(dt.getMonth()!==month)break;if(dt.getDay()===weekday){count++;if(count===n)return d;}}
  return -1;
}
function lastWeekday(year,month,weekday){
  for(let d=31;d>=1;d--){const dt=new Date(year,month,d);if(dt.getMonth()!==month)continue;if(dt.getDay()===weekday)return d;}
  return -1;
}
let state = { layout:'monthly', monthVal:'', startDay:0, color:'#4a9eff', showHolidays:true };
function init(){
  const now = new Date();
  state.monthVal = now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0');
}
function getHolidays(year){
  if(!US_HOLIDAYS._cache)US_HOLIDAYS._cache={};
  if(!US_HOLIDAYS._cache[year])US_HOLIDAYS._cache[year]=computeFloatingHolidays(year);
  const h={};
  for(const[k,v]of Object.entries(US_HOLIDAYS.fixed)){const[y,m,d]=k.split('-');h[year+'-'+(+m)+'-'+(+d)]=v;}
  Object.assign(h,US_HOLIDAYS._cache[year]);
  return h;
}
function buildMonthTable(year,month){
  const lang = GZI18n.getLang();
  const months = lang==='zh'?MONTHS_ZH:MONTHS_EN;
  const dows = state.startDay===0 ? (lang==='zh'?DOW_ZH_S:DOW_EN_S) : (lang==='zh'?DOW_ZH_M:DOW_EN_M);
  const holidays = state.showHolidays ? getHolidays(year) : {};
  const today = new Date();
  const isThisMonth = today.getFullYear()===year && today.getMonth()===month;
  let html = '<div class="cal-month"><div class="cal-title" style="color:'+state.color+'">'+months[month]+' '+year+'</div><table class="cal-table"><thead><tr>';
  dows.forEach(d=>html+='<th>'+d+'</th>');
  html+='</tr></thead><tbody>';
  const first = new Date(year,month,1);
  let startOffset = (first.getDay() - state.startDay + 7) % 7;
  const daysInMonth = new Date(year,month+1,0).getDate();
  let dayCounter = 1;
  for(let week=0;week<6;week++){
    if(dayCounter>daysInMonth && week>0)break;
    html+='<tr>';
    for(let dow=0;dow<7;dow++){
      if((week===0 && dow<startOffset) || dayCounter>daysInMonth){
        html+='<td></td>';
      } else {
        const holKey = year+'-'+(month+1)+'-'+dayCounter;
        const hol = holidays[holKey];
        const isToday = isThisMonth && today.getDate()===dayCounter;
        let cls = '';
        if(isToday)cls='today';
        else if(hol)cls='holiday';
        html+='<td class="'+cls+'"'+(isToday?' style="background:'+state.color+'"':'')+'>'+dayCounter+(hol?'<div style="font-size:.55em;opacity:.7">'+(lang==='zh'?hol:hol)+'</div>':'')+'</td>';
        dayCounter++;
      }
    }
    html+='</tr>';
  }
  html+='</tbody></table></div>';
  return html;
}
function render(){
  const [yearStr,monthStr] = state.monthVal.split('-');
  const year = +yearStr, month = +monthStr - 1;
  let html = '';
  if(state.layout==='monthly'){
    html = buildMonthTable(year,month);
  } else {
    html = '<div class="cal-year-grid">';
    for(let m=0;m<12;m++) html += buildMonthTable(year,m);
    html += '</div>';
  }
  $('#preview').innerHTML = html;
}
function doPrint(){ window.print(); }
function downloadPdf(){
  const lang = GZI18n.getLang();
  render();
  const oldTitle = document.title;
  document.title = 'calendar-'+state.monthVal;
  setTimeout(()=>{
    window.print();
    document.title = oldTitle;
  },100);
  $('#status').innerHTML = '<span style="color:var(--gz-success)">'+(lang==='zh'?'✓ 在打印对话框中选择"另存为 PDF"':'✓ Select "Save as PDF" in the print dialog')+'</span>';
}
$('#controls').innerHTML = `
  <label>${t('layout')}: <select id="ctrl-layout" onchange="state.layout=this.value;render()">
    <option value="monthly">${t('monthly')}</option>
    <option value="yearly">${t('yearly')}</option>
  </select></label>
  <label>${t('month')}: <input type="month" id="ctrl-month" value="${state.monthVal}" onchange="state.monthVal=this.value;render()"></label>
  <label>${t('startDay')}: <select id="ctrl-start" onchange="state.startDay=+this.value;render()">
    <option value="0">${t('sunday')}</option>
    <option value="1">${t('monday')}</option>
  </select></label>
  <label>${t('showHolidays')}: <input type="checkbox" id="ctrl-hol" checked onchange="state.showHolidays=this.checked;render()"></label>
  <label>${t('accentColor')}: <input type="color" id="ctrl-color" value="${state.color}" onchange="state.color=this.value;render()"></label>
  <button class="gz-btn" onclick="doPrint()">${t('print')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="downloadPdf()">${t('downloadPdf')}</button>
`;
init();
render();
GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📅', href:'/calc/date-calculator.html', name:'Date Calc'},
    {icon:'🌙', href:'/calc/moon-phase.html', name:'Moon Phase'},
    {icon:'⏰', href:'/calc/timer-stopwatch.html', name:'Timer'},
    {icon:'🌅', href:'/calc/sunrise-sunset.html', name:'Sunrise'},
  ]
});
</script>
