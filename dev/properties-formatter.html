// Parse .properties into array of {type, key, value, comment, raw}
function parseProperties(src){
  const result = [];
  const lines = src.split('\n');
  let i = 0;
  while (i < lines.length){
    let line = lines[i];
    // logical line continuation: trailing \
    while (/\\\s*$/.test(line) && i + 1 < lines.length){
      line = line.replace(/\\\s*$/, '') + lines[++i].replace(/^\s+/, '');
    }
    const trimmed = line.trim();
    if (trimmed === ''){ result.push({type:'blank'}); i++; continue; }
    if (/^[#!]/.test(trimmed)){ result.push({type:'comment', text:trimmed}); i++; continue; }
    // key=value or key:value or key value
    // key ends at first unescaped =, :, or whitespace
    let key = '', sep = '', value = '';
    let j = 0;
    // read key until first separator
    while (j < line.length){
      const ch = line[j];
      if (ch === '\\'){ j += 2; continue; }
      if (ch === '=' || ch === ':' || /\s/.test(ch)) break;
      j++;
    }
    key = line.substring(0, j).trim();
    // separator
    while (j < line.length && (line[j] === '=' || line[j] === ':' || /\s/.test(line[j]))) j++;
    value = line.substring(j);
    if (!key){ result.push({type:'invalid', raw:line}); }
    else result.push({type:'prop', key:key, value:value});
    i++;
  }
  return result;
}

function formatProperties(src, opts){
  const parsed = parseProperties(src);
  const errors = [];
  const seen = new Map();
  let keyCount = 0, commentCount = 0;

  // first pass: collect props for alignment
  const propsOnly = parsed.filter(p => p.type === 'prop');
  let maxKey = 0;
  if (opts.alignValues){
    for (const p of propsOnly){
      const decoded = decodeKey(p.key);
      maxKey = Math.max(maxKey, decoded.length);
    }
  }

  let out = [];
  for (const p of parsed){
    if (p.type === 'blank'){ out.push(''); continue; }
    if (p.type === 'comment'){ out.push(p.text); commentCount++; continue; }
    if (p.type === 'invalid'){ errors.push(p.raw); continue; }
    // prop
    keyCount++;
    const dk = decodeKey(p.key);
    const dv = decodeValue(p.value);
    if (seen.has(dk)) errors.push(`Duplicate key: ${dk}`);
    else seen.set(dk, true);
    let line;
    if (opts.alignValues){
      line = dk + ' '.repeat(Math.max(1, maxKey - dk.length + 1)) + '= ' + dv;
    } else {
      line = dk + ' = ' + dv;
    }
    out.push(line);
  }
  if (opts.sortKeys){
    // group contiguous prop runs and sort within
    const sorted = [];
    let run = [];
    for (const line of out){
      if (line && !/^[#!]/.test(line) && line.includes('=') && !/^\s*$/.test(line)){
        run.push(line);
      } else {
        if (run.length){ run.sort((a,b)=>{const ka=a.split('=')[0].trim(),kb=b.split('=')[0].trim();return ka.localeCompare(kb);}); sorted.push(...run); run=[]; }
        sorted.push(line);
      }
    }
    if (run.length){ run.sort((a,b)=>{const ka=a.split('=')[0].trim(),kb=b.split('=')[0].trim();return ka.localeCompare(kb);}); sorted.push(...run); }
    out = sorted;
  }
  return {
    text: out.join('\n').replace(/\n{3,}/g,'\n\n').replace(/^\n+/,'').replace(/\s+$/,'\n'),
    errors: errors,
    keyCount: keyCount,
    commentCount: commentCount,
  };
}

function decodeKey(k){
  return k.replace(/\\([=: \t#])/g, '$1');
}
function decodeValue(v){
  return v.trim();
}

function minifyProperties(src){
  const parsed = parseProperties(src);
  const out = [];
  for (const p of parsed){
    if (p.type === 'blank') continue;
    if (p.type === 'comment'){ out.push(p.text); continue; }
    if (p.type === 'invalid') continue;
    out.push(decodeKey(p.key) + '=' + decodeValue(p.value));
  }
  return out.join('\n');
}

function highlight(text){
  return text.split('\n').map(line => {
    const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    if (line.trim() === '') return '';
    if (/^[#!]/.test(line)) return `<span class="prop-com">${esc(line)}</span>`;
    const idx = line.indexOf('=');
    if (idx === -1) return esc(line);
    const key = line.substring(0, idx);
    const val = line.substring(idx + 1);
    return `<span class="prop-key">${esc(key)}</span><span class="prop-sep">=</span><span class="prop-val">${esc(val.replace(/^ /,''))}</span>`;
  }).join('\n');
}

let lastIndent = '2';
function doFormat(){
  const inp = $('#input').value;
  if (!inp.trim()){ $('#status').innerHTML = ''; $('#output').innerHTML=''; return; }
  const opts = {
    alignValues: $('#alv').checked,
    sortKeys: $('#srt').checked,
  };
  const r = formatProperties(inp, opts);
  $('#output').innerHTML = highlight(r.text);
  window._propsOut = r.text;
  if (r.errors.length){
    $('#status').innerHTML = `<span style="color:var(--gz-accent)">${t('invalidProps')} · ${r.keyCount} ${t('keys')}, ${r.commentCount} ${t('comments')} · ${r.errors.length} issues: ${r.errors.slice(0,3).join('; ')}</span>`;
  } else {
    $('#status').innerHTML = `<span style="color:var(--gz-success)">${t('validProps')} · ${r.keyCount} ${t('keys')}, ${r.commentCount} ${t('comments')}</span>`;
  }
}

function doMinify(){
  const inp = $('#input').value;
  if (!inp.trim()){ $('#status').innerHTML = ''; $('#output').innerHTML=''; return; }
  const out = minifyProperties(inp);
  window._propsOut = out;
  $('#output').innerHTML = highlight(out);
  $('#status').innerHTML = `<span style="color:var(--gz-success)">${t('validProps')} · ${out.split('\n').filter(l=>l&&!/^[#!]/.test(l)).length} ${t('keys')} · ${out.length} chars</span>`;
}
