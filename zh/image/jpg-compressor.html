<script>
GZI18n.register({

  zh: {

    toolDesc: '将 JPG、JPEG、PNG、WebP 图片压缩到指定的 KB 或 MB 大小。工具通过二分搜索自动调节 JPEG 质量，下载符合目标的最清晰图片。完全浏览器本地运行。',
    dropText: '拖入图片或点击选择文件',
    orDrag: '或拖放上传',
    target: '目标大小：',
    compress: '压缩',
    download: '下载压缩后图片',
    reset: '换一张',
    original: '原始大小',
    compressed: '压缩后',
    quality: '使用质量',
    saved: '节省',
    target2: '目标',
    actual: '实际',
    statusLoading: '正在读取图片…',
    statusSearching: '正在搜索最佳质量参数…',
    statusDone: '完成！图片已压缩到目标大小。',
    statusBest: '无法达到目标 — 已使用最低质量。',
    statusSmaller: '原图已小于目标 — 无需压缩。',
    presets: '快速预设：',
    preset50: '50 KB',
    preset100: '100 KB',
    preset200: '200 KB',
    preset500: '500 KB',
    preset1mb: '1 MB',
    preset2mb: '2 MB',
    noteDefault: '提示：使用你能接受的最小目标大小，可获得更清晰的视觉效果。',
    step1: '拖入或上传 JPG、PNG、WebP 图片',
    step2: '输入目标大小（KB 或 MB），或选择快速预设',
    step3: '点击压缩 — 工具通过二分搜索寻找最佳质量',
    step4: '下载压缩后的图片，或重新选择一张',
  }
});

const { $, t, copyText, showToast } = GZ;
const dropzone = $('#dropzone');
const fileIn = $('#fileIn');
const targetSizeIn = $('#targetSize');
const targetUnit = $('#targetUnit');
const compressBtn = $('#compressBtn');
const presetsEl = $('#presets');
const progWrap = $('#progWrap');
const progBar = $('#progBar');
const status = $('#status');
const statsEl = $('#stats');
const preview = $('#preview');
const actions = $('#actions');
const dlBtn = $('#dlBtn');
const resetBtn = $('#resetBtn');
const noteEl = $('#note');
const dropText = $('#dropText');
const lblTarget = $('#lblTarget');
const lblGo = $('#lblGo');
const lblDl = $('#lblDl');
const lblReset = $('#lblReset');

lblTarget.textContent = t('target');
lblGo.textContent = t('compress');
lblDl.textContent = t('download');
lblReset.textContent = t('reset');
dropText.textContent = t('dropText');
noteEl.textContent = t('noteDefault');

const PRESET_SIZES = [
  {label:'preset50', kb:50}, {label:'preset100', kb:100}, {label:'preset200', kb:200},
  {label:'preset500', kb:500}, {label:'preset1mb', kb:1024}, {label:'preset2mb', kb:2048}
];
presetsEl.innerHTML = '<span style="color:var(--text2);font-size:.8rem;margin-right:6px">' + t('presets') + '</span>' +
  PRESET_SIZES.map(p => `<button class="jc-preset" data-kb="${p.kb}">${t(p.label)}</button>`).join('');
presetsEl.querySelectorAll('.jc-preset').forEach(b => b.addEventListener('click', () => {
  presetsEl.querySelectorAll('.jc-preset').forEach(x => x.classList.remove('active'));
  b.classList.add('active');
  targetSizeIn.value = b.dataset.kb;
  targetUnit.value = '1024';
}));

let sourceFile = null;
let sourceBlob = null;
let sourceUrl = null;
let outputBlob = null;
let outputUrl = null;
let outputQuality = null;
let outputImg = null;

['dragenter','dragover'].forEach(ev => dropzone.addEventListener(ev, e => { e.preventDefault(); dropzone.classList.add('dragover'); }));
['dragleave','drop'].forEach(ev => dropzone.addEventListener(ev, e => { e.preventDefault(); dropzone.classList.remove('dragover'); }));
dropzone.addEventListener('drop', e => { if (e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]); });
fileIn.addEventListener('change', e => { if (e.target.files[0]) loadFile(e.target.files[0]); });
compressBtn.addEventListener('click', compress);
dlBtn.addEventListener('click', download);
resetBtn.addEventListener('click', reset);

function loadFile(file) {
  sourceFile = file;
  sourceBlob = file;
  if (sourceUrl) URL.revokeObjectURL(sourceUrl);
  sourceUrl = URL.createObjectURL(file);
  status.textContent = file.name + ' — ' + formatBytes(file.size);
  statsEl.innerHTML = `
    <div class="jc-stat"><div class="lbl">${t('original')}</div><div class="val big">${formatBytes(file.size)}</div></div>
    <div class="jc-stat warn"><div class="lbl">${t('target2')}</div><div class="val">${formatBytes(getTarget())}</div></div>
    <div class="jc-stat"><div class="lbl">${t('compressed')}</div><div class="val" id="compressedStat">—</div></div>
    <div class="jc-stat"><div class="lbl">${t('saved')}</div><div class="val" id="savedStat">—</div></div>
  `;
  preview.innerHTML = `<img src="${sourceUrl}" alt="original">`;
  compressBtn.disabled = false;
  actions.style.display = 'none';
  outputBlob = null;
}

function getTarget() {
  return (parseFloat(targetSizeIn.value) || 0) * parseFloat(targetUnit.value);
}

function formatBytes(b) {
  if (b == null) return '—';
  if (b < 1024) return b + ' B';
  if (b < 1048576) return (b / 1024).toFixed(1) + ' KB';
  return (b / 1048576).toFixed(2) + ' MB';
}

function loadImage(blob) {
  return new Promise((resolve, reject) => {
    const url = URL.createObjectURL(blob);
    const img = new Image();
    img.onload = () => { resolve({img, url}); };
    img.onerror = () => { URL.revokeObjectURL(url); reject(new Error('Image load failed')); };
    img.src = url;
  });
}

function encodeJpg(img, quality) {
  return new Promise((resolve, reject) => {
    const canvas = document.createElement('canvas');
    canvas.width = img.naturalWidth;
    canvas.height = img.naturalHeight;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.drawImage(img, 0, 0);
    canvas.toBlob(blob => {
      if (!blob) reject(new Error('Encoding failed'));
      else resolve(blob);
    }, 'image/jpeg', quality);
  });
}

async function compress() {
  if (!sourceBlob) return;
  const target = getTarget();
  if (!target || target < 1) { showToast('Enter a valid target size'); return; }

  compressBtn.disabled = true;
  progWrap.style.display = 'block';
  progBar.style.width = '0%';
  status.textContent = t('statusLoading');
  statsEl.innerHTML = '';
  preview.innerHTML = '';
  actions.style.display = 'none';
  outputBlob = null;

  if (sourceBlob.size <= target) {
    status.textContent = t('statusSmaller');
    progWrap.style.display = 'none';
    statsEl.innerHTML = `
      <div class="jc-stat"><div class="lbl">${t('original')}</div><div class="val big">${formatBytes(sourceBlob.size)}</div></div>
      <div class="jc-stat warn"><div class="lbl">${t('target2')}</div><div class="val">${formatBytes(target)}</div></div>
      <div class="jc-stat success"><div class="lbl">${t('compressed')}</div><div class="val big">${formatBytes(sourceBlob.size)}</div></div>
      <div class="jc-stat"><div class="lbl">${t('saved')}</div><div class="val">0 B</div></div>
    `;
    preview.innerHTML = `<img src="${sourceUrl}" alt="original">`;
    outputBlob = sourceBlob;
    outputUrl = sourceUrl;
    outputQuality = 1;
    actions.style.display = 'flex';
    compressBtn.disabled = false;
    return;
  }

  try {
    const { img, url } = await loadImage(sourceBlob);
    URL.revokeObjectURL(url);
    status.textContent = t('statusSearching');

    // Binary search for the highest quality that keeps size <= target
    let lo = 1, hi = 100, bestBlob = null, bestQuality = 1;
    let attempts = 0;
    const maxAttempts = 8;
    while (lo <= hi && attempts < maxAttempts) {
      const mid = Math.floor((lo + hi) / 2);
      const blob = await encodeJpg(img, mid / 100);
      attempts++;
      progBar.style.width = Math.min(95, (attempts / maxAttempts) * 100) + '%';
      if (blob.size <= target) {
        bestBlob = blob;
        bestQuality = mid;
        lo = mid + 1;
      } else {
        hi = mid - 1;
      }
    }
    if (!bestBlob) {
      // could not reach target — fall back to lowest quality
      bestBlob = await encodeJpg(img, 0.01);
      bestQuality = 1;
      status.textContent = t('statusBest');
    } else {
      status.textContent = t('statusDone');
    }
    outputBlob = bestBlob;
    outputQuality = bestQuality;
    if (outputUrl) URL.revokeObjectURL(outputUrl);
    outputUrl = URL.createObjectURL(bestBlob);

    const saved = sourceBlob.size - bestBlob.size;
    const savedPct = sourceBlob.size > 0 ? ((saved / sourceBlob.size) * 100).toFixed(1) : '0';
    statsEl.innerHTML = `
      <div class="jc-stat"><div class="lbl">${t('original')}</div><div class="val big">${formatBytes(sourceBlob.size)}</div></div>
      <div class="jc-stat warn"><div class="lbl">${t('target2')}</div><div class="val">${formatBytes(target)}</div></div>
      <div class="jc-stat success"><div class="lbl">${t('compressed')}</div><div class="val big">${formatBytes(bestBlob.size)}</div></div>
      <div class="jc-stat success"><div class="lbl">${t('saved')}</div><div class="val">${formatBytes(saved)} (${savedPct}%)</div></div>
    `;
    preview.innerHTML = `<div><div style="text-align:center;color:var(--text2);font-size:.8rem;margin-bottom:4px">${t('original')}</div><img src="${sourceUrl}" alt="original"></div><div><div style="text-align:center;color:var(--text2);font-size:.8rem;margin-bottom:4px">${t('compressed')} (Q${bestQuality})</div><img src="${outputUrl}" alt="compressed"></div>`;
    actions.style.display = 'flex';
    progBar.style.width = '100%';
    setTimeout(() => { progWrap.style.display = 'none'; }, 500);
  } catch (e) {
    status.textContent = 'Error: ' + e.message;
  } finally {
    compressBtn.disabled = false;
  }
}

function download() {
  if (!outputBlob) return;
  const ext = 'jpg';
  const base = (sourceFile?.name || 'image').replace(/\.[^.]+$/, '');
  const a = document.createElement('a');
  a.href = outputUrl;
  a.download = base + '-compressed.' + ext;
  document.body.appendChild(a);
  a.click();
  a.remove();
}

function reset() {
  if (sourceUrl) URL.revokeObjectURL(sourceUrl);
  if (outputUrl) URL.revokeObjectURL(outputUrl);
  sourceFile = null; sourceBlob = null; outputBlob = null; outputUrl = null;
  fileIn.value = '';
  status.textContent = '';
  statsEl.innerHTML = '';
  preview.innerHTML = '';
  actions.style.display = 'none';
  compressBtn.disabled = true;
}

  category: 'image',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [

    {icon:'🖼️', href:'/image/resizer.html', name:'Image Resizer'},
  ]
});
</script>
