<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="items-edit" id="itemsEdit"></div>
    <button class="gz-btn gz-btn-secondary" onclick="addItem()" style="margin-bottom:16px">+ Add Item</button>
    <div class="ctrl">
      <div><label>Header Bg</label><input type="color" id="hdrBg" value="#1e1e3f" onchange="render()"></div>
      <div><label>Header Text</label><input type="color" id="hdrTxt" value="#ffffff" onchange="render()"></div>
      <div><label>Body Bg</label><input type="color" id="bdyBg" value="#2a2a4a" onchange="render()"></div>
      <div><label>Body Text</label><input type="color" id="bdyTxt" value="#cccccc" onchange="render()"></div>
      <div><label>Border Radius</label><input type="range" min="0" max="16" value="8" id="radius" onchange="render()"></div>
      <div><label>Animation Speed</label>
        <select id="speed" onchange="render()">
          <option value="0.2">Fast</option><option value="0.35" selected>Medium</option><option value="0.5">Slow</option>
        </select></div>
      <div><label>Border</label>
        <select id="borderStyle" onchange="render()">
          <option value="none">None</option><option value="1px solid #444">Solid</option><option value="1px dashed #444">Dashed</option>
        </select></div>
    </div>
    <div class="preview-box" id="preview"></div>
    <div style="display:flex;gap:8px;margin-bottom:8px">
      <button class="gz-btn" onclick="GZ.copyText(genCode())">📋 Copy Code</button>
      <button class="gz-btn gz-btn-secondary" onclick="resetItems()">🔄 Reset</button>
    </div>
    <div class="code-box"><pre id="codeOut"></pre></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'CSS Accordion Generator',
    toolDesc: 'Design CSS accordion and FAQ components with live preview. Customize colors, animation and border — copy production-ready code.',
    step1: 'Add accordion items with title and content',
    step2: 'Customize colors, radius and animation speed',
    step3: 'Preview the accordion in real-time',
    step4: 'Copy the generated HTML and CSS code',
  },
  zh: {
    toolTitle: 'CSS 手风琴/FAQ 生成器',
    toolDesc: '可视化设计 CSS 手风琴和 FAQ 组件 — 自定义颜色、动画和边框，复制生产可用代码。',
    step1: '添加手风琴项，填写标题和内容',
    step2: '自定义颜色、圆角和动画速度',
    step3: '实时预览手风琴效果',
    step4: '复制生成的 HTML 和 CSS 代码',
  }
});

const { $, copyText, t } = GZ;

let items = [
  {title: 'What is this tool?', content: 'A CSS accordion generator that helps you create beautiful FAQ and collapsible content sections.'},
  {title: 'Do I need JavaScript?', content: 'No. The generated accordion uses HTML details/summary elements which work without JavaScript.'},
  {title: 'Can I customize the colors?', content: 'Yes. You can change header background, text color, body background and body text color.'},
];

function buildItems() {
  const el = $('#itemsEdit');
  el.innerHTML = items.map((it, i) => `
    <div class="item-row">
      <input type="text" value="${it.title.replace(/"/g,'&quot;')}" oninput="items[${i}].title=this.value;render()" placeholder="Title">
      <input type="text" value="${it.content.replace(/"/g,'&quot;')}" oninput="items[${i}].content=this.value;render()" placeholder="Content">
      <button onclick="items.splice(${i},1);buildItems();render()">✕</button>
    </div>`).join('');
}

function addItem() {
  items.push({title: 'New Question', content: 'Answer goes here.'});
  buildItems(); render();
}

function resetItems() {
  items = [{title:'Question 1',content:'Answer 1'},{title:'Question 2',content:'Answer 2'}];
  buildItems(); render();
}

function render() {
  const hdrBg = $('#hdrBg').value;
  const hdrTxt = $('#hdrTxt').value;
  const bdyBg = $('#bdyBg').value;
  const bdyTxt = $('#bdyTxt').value;
  const rad = $('#radius').value + 'px';
  const spd = $('#speed').value;
  const bdr = $('#borderStyle').value;

  // Preview
  $('#preview').innerHTML = items.map((it, i) => `
    <div class="accordion-item" style="border:${bdr};border-radius:${rad};margin-bottom:2px;overflow:hidden">
      <details>
        <summary class="accordion-header" style="background:${hdrBg};color:${hdrTxt};list-style:none;border-radius:${rad}">
          <span>${it.title}</span><span class="arrow">▼</span>
        </summary>
        <div class="accordion-body" style="background:${bdyBg};color:${bdyTxt};transition:max-height ${spd}s ease">${it.content}</div>
      </details>
    </div>`).join('');

  // Animate open
  $('#preview').querySelectorAll('details').forEach(d => {
    d.addEventListener('toggle', () => {
      const body = d.querySelector('.accordion-body');
      if (d.open) { body.style.maxHeight = body.scrollHeight + 'px'; body.classList.add('open'); }
      else { body.style.maxHeight = '0'; body.classList.remove('open'); }
    });
  });

  // Code
  $('#codeOut').textContent = genCode();
}

function genCode() {
  const hdrBg = $('#hdrBg').value;
  const hdrTxt = $('#hdrTxt').value;
  const bdyBg = $('#bdyBg').value;
  const bdyTxt = $('#bdyTxt').value;
  const rad = $('#radius').value + 'px';
  const spd = $('#speed').value;
  const bdr = $('#borderStyle').value;

  return `/* CSS */
.accordion-item {
  border: ${bdr};
  border-radius: ${rad};
  margin-bottom: 2px;
  overflow: hidden;
}
.accordion-header {
  background: ${hdrBg};
  color: ${hdrTxt};
  padding: 14px 18px;
  cursor: pointer;
  font-weight: 600;
  display: flex;
  justify-content: space-between;
  align-items: center;
  list-style: none;
  border-radius: ${rad};
}
.accordion-header::-webkit-details-marker { display: none; }
.accordion-header .arrow { transition: transform ${spd}s; font-size: .8rem; }
details[open] .arrow { transform: rotate(180deg); }
.accordion-body {
  background: ${bdyBg};
  color: ${bdyTxt};
  padding: 12px 18px 16px;
  line-height: 1.6;
}

<!-- HTML -->
${items.map(it => `<div class="accordion-item">
  <details>
    <summary class="accordion-header">
      <span>${it.title}</span><span class="arrow">▼</span>
    </summary>
    <div class="accordion-body">${it.content}</div>
  </details>
</div>`).join('\n')}`;
}

buildItems();
render();

GZ.renderToolPage({
  category: 'css',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🔘', href:'/css-tools/border-radius.html', name:'Border Radius'},
    {icon:'🔲', href:'/css-tools/shadow.html', name:'Box Shadow'},
    {icon:'🖱️', href:'/css-tools/hover.html', name:'Hover Effects'},
    {icon:'☑️', href:'/css-tools/checkbox.html', name:'Checkbox'},
  ]
});
</script>
<script src="/tools-result-rec.js?v=20260707v520" defer></script>
</body>
