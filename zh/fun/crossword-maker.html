const { $, t } = GZ;

let cwState = null; // {grid: Map, cells: [...], words: [...], showAnswers: bool}

function parseWordList(text) {
  const entries = [];
  for (const raw of text.split('\n')) {
    const line = raw.trim();
    if (!line) continue;
    // Try splitting on |, :, or - (first occurrence)
    const m = line.match(/^([A-Za-z0-9]+)\s*[|:\-—]\s*(.+)$/);
    if (m) {
      const word = m[1].toUpperCase();
      const clue = m[2].trim();
      if (word.length >= 2 && clue) entries.push({ word, clue });
    }
  }
  // Sort by length descending for better packing
  return entries.sort((a, b) => b.word.length - a.word.length);
}

function buildCrossword(entries) {
  if (!entries.length) return null;
  const placed = [];
  const grid = new Map(); // key "r,c" -> {letter, num, words: []}

  function setCell(r, c, letter) {
    const k = r + ',' + c;
    if (!grid.has(k)) grid.set(k, { letter, num: null, words: [] });
    else grid.get(k).letter = letter;
  }
  function getCell(r, c) { return grid.get(r + ',' + c); }
  function canPlace(r, c, word, dir) {
    const dr = dir === 'V' ? 1 : 0;
    const dc = dir === 'H' ? 1 : 0;
    // Check cells in front and behind are empty
    const beforeR = r - dr, beforeC = c - dc;
    const afterR = r + dr * word.length, afterC = c + dc * word.length;
    if (getCell(beforeR, beforeC)) return false;
    if (getCell(afterR, afterC)) return false;
    for (let i = 0; i < word.length; i++) {
      const rr = r + dr * i, cc = c + dc * i;
      const existing = getCell(rr, cc);
      if (existing) {
        if (existing.letter !== word[i]) return false;
        // Check perpendicular neighbors — must be a crossing point, not parallel run
        const pr = dir === 'H' ? rr - 1 : rr;
        const pc = dir === 'V' ? cc - 1 : cc;
        const pr2 = dir === 'H' ? rr + 1 : rr;
        const pc2 = dir === 'V' ? cc + 1 : cc;
        // ok, this is the intersection
      } else {
        // Empty cell — check perpendicular neighbors are empty (would extend a word)
        if (dir === 'H') {
          if (getCell(rr - 1, cc) || getCell(rr + 1, cc)) return false;
        } else {
          if (getCell(rr, cc - 1) || getCell(rr, cc + 1)) return false;
        }
      }
    }
    return true;
  }
  function place(r, c, word, dir, entry) {
    const dr = dir === 'V' ? 1 : 0;
    const dc = dir === 'H' ? 1 : 0;
    for (let i = 0; i < word.length; i++) {
      setCell(r + dr * i, c + dc * i, word[i]);
    }
    placed.push({ entry, r, c, dir, word });
  }

  // Place first word horizontally at (0,0)
  place(0, 0, entries[0].word, 'H', entries[0]);

  // Try to place remaining words
  let queue = entries.slice(1);
  let progress = true;
  let remaining = [...queue];
  while (remaining.length && progress) {
    progress = false;
    const stillLeft = [];
    for (const entry of remaining) {
      let placedNow = false;
      // Try every letter in this word
      const wordLetters = entry.word.split('');
      // For each already-placed cell, try to intersect on a matching letter
      const candidates = [];
      for (const [k, cell] of grid.entries()) {
        const [r, c] = k.split(',').map(Number);
        for (let i = 0; i < wordLetters.length; i++) {
          if (wordLetters[i] === cell.letter) {
            // Try placing word so that letter i sits at (r,c)
            const dir = 'V'; // try vertical first (perpendicular to most horizontal first word)
            const dr = 1, dc = 0;
            const startR = r - dr * i;
            const startC = c - dc * i;
            candidates.push({ startR, startC, dir, i });
            // And horizontal
            candidates.push({ startR: r, startC: c - i, dir: 'H', i });
          }
        }
      }
      // Score candidates by number of intersections
      candidates.sort((a, b) => scorePlacement(b, entry.word) - scorePlacement(a, entry.word));
      for (const cand of candidates) {
        if (canPlace(cand.startR, cand.startC, entry.word, cand.dir)) {
          place(cand.startR, cand.startC, entry.word, cand.dir, entry);
          placedNow = true;
          progress = true;
          break;
        }
      }
      if (!placedNow) stillLeft.push(entry);
    }
    remaining = stillLeft;
  }

  // Normalize coordinates (shift to 0,0 origin)
  let minR = Infinity, minC = Infinity, maxR = -Infinity, maxC = -Infinity;
  for (const k of grid.keys()) {
    const [r, c] = k.split(',').map(Number);
    if (r < minR) minR = r;
    if (r > maxR) maxR = r;
    if (c < minC) minC = c;
    if (c > maxC) maxC = c;
  }
  const shiftR = -minR, shiftC = -minC;
  const newGrid = new Map();
  for (const [k, v] of grid.entries()) {
    const [r, c] = k.split(',').map(Number);
    newGrid.set((r + shiftR) + ',' + (c + shiftC), v);
  }
  // Remap placed words
  for (const p of placed) {
    p.r += shiftR; p.c += shiftC;
  }
  // Assign numbers in reading order
  const numbered = [...newGrid.keys()].sort((a, b) => {
    const [ra, ca] = a.split(',').map(Number);
    const [rb, cb] = b.split(',').map(Number);
    return ra - rb || ca - cb;
  });
  let num = 1;
  // A cell gets a number if it starts an across word (left empty or grid edge) AND has a letter to its right
  // OR starts a down word (above empty or grid edge) AND has a letter below
  const wordNums = [];
  for (const k of numbered) {
    const [r, c] = k.split(',').map(Number);
    const left = newGrid.get((r) + ',' + (c - 1));
    const right = newGrid.get((r) + ',' + (c + 1));
    const up = newGrid.get((r - 1) + ',' + (c));
    const down = newGrid.get((r + 1) + ',' + (c));
    const startsAcross = !left && right;
    const startsDown = !up && down;
    if (startsAcross || startsDown) {
      newGrid.get(k).num = num;
      // Find word(s) starting here
      const acrossWord = placed.find(p => p.dir === 'H' && p.r === r && p.c === c);
      const downWord = placed.find(p => p.dir === 'V' && p.r === r && p.c === c);
      if (acrossWord) acrossWord.num = num;
      if (downWord) downWord.num = num;
      num++;
    }
  }
  return { grid: newGrid, words: placed, rows: maxR - minR + 1, cols: maxC - minC + 1, skipped: remaining };
}

function scorePlacement(cand, word) {
  // Count intersections for this candidate
  const dr = cand.dir === 'V' ? 1 : 0;
  const dc = cand.dir === 'H' ? 1 : 0;
  let score = 0;
  for (let i = 0; i < word.length; i++) {
    const r = cand.startR + dr * i;
    const c = cand.startC + dc * i;
    const cell = cwState?.grid?.get(r + ',' + c);
    if (cell) score += 1;
  }
  return score;
}

function renderCrossword(state, showAnswers) {
  if (!state) { $('#cwContainer').innerHTML = ''; return; }
  const { grid, words, rows, cols } = state;
  let html = '<div><div class="cw-grid" style="grid-template-columns:repeat(' + cols + ',28px)">';
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const cell = grid.get(r + ',' + c);
      if (!cell) {
        html += '<div class="cw-cell empty"></div>';
      } else {
        html += '<div class="cw-cell">' + (cell.num ? '<span class="num">' + cell.num + '</span>' : '') + '<span class="letter">' + (showAnswers ? cell.letter : '') + '</span></div>';
      }
    }
  }
  html += '</div></div>';

  const across = words.filter(w => w.dir === 'H').sort((a, b) => a.num - b.num);
  const down = words.filter(w => w.dir === 'V').sort((a, b) => a.num - b.num);
  html += '<div class="clues"><h3>' + t('across') + '</h3><ol>';
  // need to start numbering correctly
  let acrossStart = true;
  for (const w of across) {
    if (acrossStart || w.num !== across[across.indexOf(w) - 1].num) {
      html += '<li value="' + w.num + '">' + w.entry.clue + '</li>';
    }
  }
  html += '</ol><h3>' + t('down') + '</h3><ol>';
  for (const w of down) {
    html += '<li value="' + w.num + '">' + w.entry.clue + '</li>';
  }
  html += '</ol></div>';

  $('#cwContainer').innerHTML = html;
}

function doGenerate() {
  const entries = parseWordList($('#wordList').value);
  if (!entries.length) {
    $('#status').innerHTML = '<span style="color:var(--gz-error)">Please enter at least one WORD | clue.</span>';
    $('#cwContainer').innerHTML = '';
    cwState = null;
    return;
  }
  cwState = buildCrossword(entries);
  cwState.showAnswers = false;
  renderCrossword(cwState, false);
  const placed = cwState.words.length;
  const skipped = cwState.skipped.map(s => s.word).join(', ');
  let msg = t('placed').replace('%1', placed).replace('%2', entries.length);
  if (skipped) msg += ' — ' + t('skipped').replace('%1', skipped);
  $('#status').innerHTML = '<span style="color:var(--gz-success)">' + msg + '</span>';
  updateAnswerToggle();
}

function updateAnswerToggle() {
  const btn = $('#toggleBtn');
  if (!cwState) { btn.style.display = 'none'; return; }
  btn.style.display = '';
  btn.textContent = cwState.showAnswers ? t('hideAnswers') : t('showAnswers');
}

function toggleAnswers() {
  if (!cwState) return;
  cwState.showAnswers = !cwState.showAnswers;
  renderCrossword(cwState, cwState.showAnswers);
  updateAnswerToggle();
}

function doPrint() { window.print(); }

function loadExample() {
  $('#wordList').value = `EIFFEL | Paris landmark made of iron
PYRAMID | Triangular tomb in Giza

MUSEUM | Louvre is the world's most visited one
PALACE | Buckingham is the British one`;
  doGenerate();
}

function doClear() { $('#wordList').value = ''; $('#cwContainer').innerHTML = ''; $('#status').textContent = ''; cwState = null; }

$('#lbl-title').textContent = t('lblTitle');
$('#lbl-words').textContent = t('lblWords');

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="doGenerate()">${t('generate')}</button>
  <button class="gz-btn gz-btn-secondary" id="toggleBtn" onclick="toggleAnswers()">${t('showAnswers')}</button>

  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

// Generate on load with default list
doGenerate();
