<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "How do I calculate sample size?", "acceptedAnswer": {"@type": "Answer", "text": "Use Cochran's formula: n₀ = (Z² × p × (1-p)) / E², where Z is the z-score for your confidence level, p is the estimated proportion (usually 0.5), and E is the margin of error. For finite populations, apply the correction factor."}}, {"@type": "Question", "name": "What confidence level should I use?", "acceptedAnswer": {"@type": "Answer", "text": "95% confidence level is the most common choice. This means if you repeated your survey 100 times, 95 of those surveys would capture the true population value. Use 99% for critical research or 90% for preliminary studies."}}, {"@type": "Question", "name": "What is margin of error?", "acceptedAnswer": {"@type": "Answer", "text": "The margin of error is the range within which the true population value is expected to fall. A 5% margin of error means your result is accurate to within ±5 percentage points."}}, {"@type": "Question", "name": "When should I enter the population size?", "acceptedAnswer": {"@type": "Answer", "text": "Enter the population size when your target group is small (under 100,000). For very large or unknown populations, leave it at 0 and the calculator will use the infinite population formula."}}]}</script>

<body>
<div class="gz-container">

<script>
GZI18n.register({
  en: {
    toolTitle: 'Sample Size Calculator',
    toolDesc: 'Calculate the ideal sample size for your survey or research study using Cochran\'s formula with confidence level and margin of error.',
    lblConfidence: 'Confidence Level',
    lblMargin: 'Margin of Error (%)',
    hintMargin: 'The range within which the true value falls (e.g., ±5%)',
    lblProportion: 'Expected Proportion (%)',
    hintProportion: 'Use 50% if unknown (gives maximum sample size)',
    lblPopulation: 'Population Size',
    hintPopulation: 'Enter 0 for infinite/unknown population',
    calculate: 'Calculate',
    resLabel: 'Required Sample Size',
    resDesc: 'respondents needed for your survey',
    detailZScore: 'Z-Score',
    detailMarginPct: 'Margin of Error',
    detailProportion: 'Proportion (p)',
    detailPopSize: 'Population',
    detailInfinite: 'Infinite / Unknown',
    detailCorrection: 'Correction Factor',
    detailNoCorrection: 'Not applied (infinite population)',
    formulaTitle: 'Calculation Formula (Cochran\'s)',
    errMargin: 'Margin of error must be between 0.1% and 50%.',
    errProportion: 'Proportion must be between 0% and 100%.',
    step1: 'Select your desired confidence level (90%, 95%, or 99%)',
    step2: 'Enter the margin of error you can accept',
    step3: 'Set the expected proportion (use 50% if unsure)',
    step4: 'Optionally enter population size, then click Calculate',
  },
  zh: {
    toolTitle: '样本量计算器',
    toolDesc: '使用 Cochran 公式，根据置信水平和误差范围计算调查或研究所需的理想样本量。',
    lblConfidence: '置信水平',
    lblMargin: '误差范围 (%)',
    hintMargin: '真实值所在的范围（如 ±5%）',
    lblProportion: '预期比例 (%)',
    hintProportion: '不确定时使用 50%（得到最大样本量）',
    lblPopulation: '总体规模',
    hintPopulation: '总体无限或未知时输入 0',
    calculate: '计算',
    resLabel: '所需样本量',
    resDesc: '名受访者（调查所需的样本量）',
    detailZScore: 'Z 分数',
    detailMarginPct: '误差范围',
    detailProportion: '比例 (p)',
    detailPopSize: '总体规模',
    detailInfinite: '无限 / 未知',
    detailCorrection: '校正因子',
    detailNoCorrection: '未应用（无限总体）',
    formulaTitle: '计算公式（Cochran 公式）',
    errMargin: '误差范围必须在 0.1% 到 50% 之间。',
    errProportion: '比例必须在 0% 到 100% 之间。',
    step1: '选择所需的置信水平（90%、95% 或 99%）',
    step2: '输入可接受的误差范围',
    step3: '设置预期比例（不确定时使用 50%）',
    step4: '可选择输入总体规模，然后点击计算',
  }
});

const { $, copyText, t } = GZ;

const Z_SCORES = { 0.90: 1.645, 0.95: 1.96, 0.99: 2.576 };

function calculate() {
  const conf = parseFloat($('#confidence').value);
  const E = parseFloat($('#margin').value);
  const pPct = parseFloat($('#proportion').value);
  const N = parseInt($('#population').value) || 0;

  if (isNaN(E) || E <= 0 || E > 50) { showError(t('errMargin')); return; }
  if (isNaN(pPct) || pPct < 0 || pPct > 100) { showError(t('errProportion')); return; }
  hideError();

  const p = pPct / 100;
  const e = E / 100;
  const Z = Z_SCORES[conf];

  // Cochran's formula: n0 = Z² * p * (1-p) / E²
  const n0 = (Z * Z * p * (1 - p)) / (e * e);
  let n;

  if (N > 0 && n0 > N * 0.05) {
    // Finite population correction
    n = n0 / (1 + (n0 - 1) / N);
  } else {
    n = n0;
  }
  n = Math.ceil(n);

  $('#res-value').textContent = n.toLocaleString();
  $('#res-desc').textContent = t('resDesc');
  $('#results').style.display = 'block';

  // Details
  const popDisplay = N > 0 ? N.toLocaleString() : t('detailInfinite');
  const correctionDisplay = N > 0 ? t('detailCorrection') : t('detailNoCorrection');
  $('#details').innerHTML = `
    <div class="ss-detail"><div class="lbl">${t('detailZScore')}</div><div class="val">${Z}</div></div>
    <div class="ss-detail"><div class="lbl">${t('detailMarginPct')}</div><div class="val">±${E}%</div></div>
    <div class="ss-detail"><div class="lbl">${t('detailProportion')}</div><div class="val">${pPct}%</div></div>
    <div class="ss-detail"><div class="lbl">${t('detailPopSize')}</div><div class="val">${popDisplay}</div></div>
    <div class="ss-detail" style="grid-column:1/-1"><div class="lbl">${correctionDisplay}</div><div class="val">${N > 0 ? 'n₀/(1+(n₀-1)/N)' : '—'}</div></div>`;

  // Formula
  let html = `<div class="step-title">${t('formulaTitle')}</div>`;
  html += `<div class="step-line">n₀ = Z² × p × (1−p) / E²</div>`;
  html += `<div class="step-line">n₀ = ${Z}² × ${p} × ${(1-p).toFixed(4)} / ${e}²</div>`;
  html += `<div class="step-line">n₀ = ${(Z*Z).toFixed(4)} × ${(p*(1-p)).toFixed(4)} / ${(e*e).toFixed(6)}</div>`;
  html += `<div class="step-line">n₀ = <span class="step-highlight">${Math.ceil(n0).toLocaleString()}</span></div>`;
  if (N > 0 && n0 > N * 0.05) {
    html += `<div class="step-line" style="margin-top:8px">Finite population correction:</div>`;
    html += `<div class="step-line">n = n₀ / (1 + (n₀ − 1) / N)</div>`;
    html += `<div class="step-line">n = ${Math.ceil(n0)} / (1 + (${Math.ceil(n0)} − 1) / ${N})</div>`;
    html += `<div class="step-line">n = <span class="step-highlight">${n.toLocaleString()}</span></div>`;
  }
  $('#formula').innerHTML = html;
  $('#formula').style.display = 'block';
}

function showError(msg) { $('#error').textContent = msg; $('#error').style.display = 'block'; $('#results').style.display='none'; $('#formula').style.display='none'; }
function hideError() { $('#error').style.display = 'none'; }

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="calculate()">${t('calculate')}</button>`;

$('#lbl-confidence').textContent = t('lblConfidence');
$('#lbl-margin').textContent = t('lblMargin');
$('#hint-margin').textContent = t('hintMargin');
$('#lbl-proportion').textContent = t('lblProportion');
$('#hint-proportion').textContent = t('hintProportion');
$('#lbl-population').textContent = t('lblPopulation');
$('#hint-population').textContent = t('hintPopulation');
$('#res-label').textContent = t('resLabel');

calculate();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📊', href:'/calc/statistics-calculator.html', name:'Statistics'},
    {icon:'🧮', href:'/calc/percentage-calculator.html', name:'Percentage'},
    {icon:'📈', href:'/calc/profit-margin.html', name:'Profit Margin'},
    {icon:'🔢', href:'/calc/sample-size-calculator.html', name:'Sample Size'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
