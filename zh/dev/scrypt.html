<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is scrypt?", "acceptedAnswer": {"@type": "Answer", "text": "Scrypt is a password-based key derivation function (KDF) designed by Colin Percival in 2009. It deliberately requires a large amount of memory, making it expensive for attackers to perform large-scale custom hardware attacks (ASICs, GPUs). Scrypt is used by Litecoin, Dogecoin and many password managers."}}, {"@type": "Question", "name": "What parameters should I use for scrypt?", "acceptedAnswer": {"@type": "Answer", "text": "Common defaults are N=16384 (2^14), r=8, p=1. For interactive logins, N=32768 (2^15) is recommended. Litecoin uses N=1024, r=1, p=1. Higher N values significantly increase memory usage and computation time. N must be a power of 2."}}, {"@type": "Question", "name": "Is my password sent to a server?", "acceptedAnswer": {"@type": "Answer", "text": "No. All scrypt key derivation runs entirely in your browser using the scrypt-js library. Your password never leaves your device."}}, {"@type": "Question", "name": "What is the difference between scrypt and Argon2?", "acceptedAnswer": {"@type": "Answer", "text": "Scrypt was the original memory-hard KDF (2009). Argon2 (2015) is its successor and the PHC winner, offering side-channel resistance (Argon2i) and more tunable parallelism. For new projects in 2025+, Argon2id is generally recommended over scrypt, but scrypt remains widely used and supported."}}]}</script>

    invalid: '✗ 参数无效。',
    step1: '输入或粘贴要哈希的密码',
    step2: '调整 N（必须为 2 的幂）、r 和 p 参数',
    step3: '点击「生成密钥」派生 scrypt 密钥（十六进制）',

const { $, copyText, t } = GZ;

$('#lbl-in').textContent = t('input');
$('#lbl-out').textContent = t('output');
$('#lbl-pw').textContent = t('pwLabel');
$('#lbl-n').textContent = t('nLabel');
$('#lbl-r').textContent = t('rLabel');

$('#lbl-verify-params').textContent = t('verifyParams');
$('#lbl-verify-hash').textContent = t('verifyHash');
$('#btn-verify').textContent = t('verifyBtn');
$('#password').placeholder = 'mySecretPass123';

function randomBytes(n) {
  const a = new Uint8Array(n);
  crypto.getRandomValues(a);
  return a;
}

function toHex(bytes) {
  return Array.from(bytes).map(b => b.toString(16).padStart(2,'0')).join('');
}
function fromHex(hex) {
  const out = new Uint8Array(hex.length/2);
  for (let i = 0; i < hex.length; i += 2) out[i/2] = parseInt(hex.substr(i,2),16);
  return out;
}
function strToBytes(s) {
  return new Uint8Array(Array.from(s).map(c => c.charCodeAt(0)));
}
function bytesToUTF8(s) {
  // scrypt-js expects ASCII strings; use UTF-8 encoding for proper multibyte support
  return new TextEncoder().encode(s);
}

let lastSaltHex = '';

async function scryptAsync(password, salt, N, r, p, dkLen) {
  return new Promise((resolve, reject) => {
    try {
      const result = scrypt(password, salt, N, r, p, dkLen);
      resolve(result);
    } catch(e) { reject(e); }
  });
}

async function doGenerate() {
  const pw = $('#password').value;
  if (!pw) { $('#status').innerHTML = `<span style="color:var(--gz-accent)">${t('enterPw')}</span>`; return; }
  $('#status').innerHTML = `<span style="opacity:.7">${t('generating')}</span>`;
  $('#hash-output').textContent = '';
  try {
    const N = +$('#n-value').value;
    const r = +$('#r-value').value;
    const p = +$('#p-value').value;
    const dkLen = +$('#key-len').value;
    if (typeof scrypt !== 'function') throw new Error('scrypt-js library not loaded');
    const salt = randomBytes(16);
    lastSaltHex = toHex(salt);
    const key = await scryptAsync(bytesToUTF8(pw), salt, N, r, p, dkLen);
    const hex = toHex(key);
    $('#hash-output').textContent = hex;
    $('#status').innerHTML = `<span style="color:var(--gz-success)">✓ N=${N} r=${r} p=${p} len=${dkLen}B</span><br><span style="opacity:.7;font-size:.8em">Salt (hex): <code>${lastSaltHex}</code></span>`;
  } catch(e) {
    $('#status').innerHTML = `<span style="color:var(--gz-accent)">✗ ${e.message}</span>`;
  }
}

async function doVerify() {
  const pw = $('#verify-password').value;
  const paramsStr = $('#verify-params').value.trim();
  const expectedHex = $('#verify-hash').value.trim();
  if (!pw || !paramsStr || !expectedHex) { $('#verify-result').innerHTML = ''; return; }
  try {
    const m = paramsStr.match(/N\s*=\s*(\d+)\s*,\s*r\s*=\s*(\d+)\s*,\s*p\s*=\s*(\d+)/i);
    if (!m) { $('#verify-result').innerHTML = `<div class="no-match">${t('invalid')}</div>`; return; }
    const N = +m[1], r = +m[2], p = +m[3];
    const expectedBytes = fromHex(expectedHex);
    if (typeof scrypt !== 'function') throw new Error('scrypt-js not loaded');
    const salt = lastSaltHex ? fromHex(lastSaltHex) : randomBytes(16);
    const key = await scryptAsync(bytesToUTF8(pw), salt, N, r, p, expectedBytes.length);
    const match = toHex(key) === expectedHex;
    $('#verify-result').innerHTML = `<div class="${match?'match':'no-match'}">${match?t('match'):t('noMatch')}</div>`;
  } catch(e) {
    $('#verify-result').innerHTML = `<div class="no-match">${t('invalid')} (${e.message})</div>`;
  }
}

$('#btn-generate').onclick = doGenerate;
$('#btn-verify').onclick = doVerify;
