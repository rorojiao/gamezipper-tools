<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"What is border-radius in CSS?","acceptedAnswer":{"@type":"Answer","text":"border-radius rounds the corners of an element. You can set one value for all corners, four values for each corner, or eight values (horizontal/vertical) to create elliptical corners."}},{"@type":"Question","name":"How do I make an elliptical corner?","acceptedAnswer":{"@type":"Answer","text":"Use the slash syntax: border-radius: 50px / 25px;. The value before the slash is the horizontal radius, after is the vertical radius. Per-corner syntax is border-top-left-radius: 50px 25px;."}},{"@type":"Question","name":"How do I make a perfect circle?","acceptedAnswer":{"@type":"Answer","text":"Set border-radius: 50% on a square element. If width and height are equal, 50% produces a perfect circle. Otherwise it makes an ellipse."}},{"@type":"Question","name":"What units can I use for border-radius?","acceptedAnswer":{"@type":"Answer","text":"border-radius accepts px, em, rem, %, pt, vh, vw and most CSS length units. Percentages are relative to the element dimensions — 50% makes a circle when the element is square."}}]}</script>

<script>
GZI18n.register({
  en: {
    toolTitle: 'CSS Border Radius Generator',
    toolDesc: 'Visually design border-radius — perfect circles, pills, asymmetric and elliptical corners, plus organic blob shapes. Adjust all 8 radii and copy the CSS in one click.',
    units: 'Units', corners: 'Corners (horizontal / vertical)', presets: 'Presets',
    horizontal: 'Horizontal', vertical: 'Vertical',
    linkLabel: 'Link H/V', resetAll: 'Reset',
    step1: 'Drag the H (horizontal) and V (vertical) sliders for each corner.',
    step2: 'Switch units between px, % and rem using the unit buttons.',
    step3: 'Pick a preset — Circle, Pill, Blob, Card, Leaf — for quick looks.',
    step4: 'Click Copy to grab the ready-to-paste CSS border-radius property.',
  },
  zh: {
    toolTitle: 'CSS 圆角生成器',
    toolDesc: '可视化设计 border-radius — 完美圆形、胶囊、非对称和椭圆角，以及有机斑点形状。调整全部 8 个圆角，一键复制 CSS 代码。',
    units: '单位', corners: '圆角（水平 / 垂直）', presets: '预设',
    horizontal: '水平', vertical: '垂直',
    linkLabel: '锁定 H/V', resetAll: '重置',
    step1: '为每个圆角拖动 H（水平）和 V（垂直）滑块。',
    step2: '使用单位按钮切换 px、% 和 rem。',
    step3: '选择预设 — 圆形、胶囊、斑点、卡片、叶子 — 快速套用风格。',
    step4: '点击「复制」即可获取可直接粘贴的 CSS border-radius 属性。',
  }
});

const { $, copyText, t } = GZ;

// Corner keys order: tl, tr, br, bl
const CORNERS = ['tl','tr','br','bl'];
const CORNER_LABELS = {
  tl: { en: 'Top-Left', zh: '左上' },
  tr: { en: 'Top-Right', zh: '右上' },
  br: { en: 'Bottom-Right', zh: '右下' },
  bl: { en: 'Bottom-Left', zh: '左下' },
};
let unit = 'px';
let maxVal = 100; // px
const state = {
  tl: { h: 16, v: 16, link: true },
  tr: { h: 16, v: 16, link: true },
  br: { h: 16, v: 16, link: true },
  bl: { h: 16, v: 16, link: true },
};
const lang = GZI18n.getLang();

const PRESETS = {
  square: { label: { en:'Square', zh:'方形' }, vals: { tl:{h:0,v:0,link:true}, tr:{h:0,v:0,link:true}, br:{h:0,v:0,link:true}, bl:{h:0,v:0,link:true} } },
  rounded: { label: { en:'Rounded', zh:'圆角' }, vals: { tl:{h:12,v:12,link:true}, tr:{h:12,v:12,link:true}, br:{h:12,v:12,link:true}, bl:{h:12,v:12,link:true} } },
  circle: { label: { en:'Circle', zh:'圆形' }, vals: { tl:{h:50,v:50,link:true}, tr:{h:50,v:50,link:true}, br:{h:50,v:50,link:true}, bl:{h:50,v:50,link:true} } },
  pill: { label: { en:'Pill', zh:'胶囊' }, vals: { tl:{h:50,v:50,link:true}, tr:{h:50,v:50,link:true}, br:{h:50,v:50,link:true}, bl:{h:50,v:50,link:true} } },
  blob: { label: { en:'Blob', zh:'斑点' }, vals: { tl:{h:62,v:38,link:false}, tr:{h:38,v:55,link:false}, br:{h:65,v:42,link:false}, bl:{h:42,v:60,link:false} } },
  leaf: { label: { en:'Leaf', zh:'叶子' }, vals: { tl:{h:100,v:100,link:true}, tr:{h:0,v:0,link:true}, br:{h:0,v:0,link:true}, bl:{h:0,v:0,link:true} } },
  card: { label: { en:'Card', zh:'卡片' }, vals: { tl:{h:0,v:0,link:true}, tr:{h:0,v:0,link:true}, br:{h:16,v:16,link:true}, bl:{h:16,v:16,link:true} } },
  ticket: { label: { en:'Ticket', zh:'票据' }, vals: { tl:{h:0,v:0,link:true}, tr:{h:50,v:50,link:true}, br:{h:50,v:50,link:true}, bl:{h:0,v:0,link:true} } },
  wave: { label: { en:'Wave', zh:'波浪' }, vals: { tl:{h:40,v:80,link:false}, tr:{h:40,v:80,link:false}, br:{h:80,v:40,link:false}, bl:{h:80,v:40,link:false} } },
};

function getMax() { return unit === '%' ? 100 : unit === 'rem' ? 10 : 100; }

function buildCSS() {
  const allLink = CORNERS.every(c => state[c].link && state[c].h === state[c].v);
  const allSame = allLink && CORNERS.every(c => state[c].h === state.tl.h);
  if (allSame) {
    return `border-radius: ${state.tl.h}${unit};`;
  }
  // check if all corners same ratio but elliptical
  const allSameH = CORNERS.every(c => state[c].h === state.tl.h);
  const allSameV = CORNERS.every(c => state[c].v === state.tl.v);
  if (allSameH && allSameV) {
    return `border-radius: ${state.tl.h}${unit} / ${state.tl.v}${unit};`;
  }
  // full 8-value
  const hs = CORNERS.map(c => state[c].h + unit).join(' ');
  const vs = CORNERS.map(c => state[c].v + unit).join(' ');
  return `border-radius: ${hs} / ${vs};`;
}

function buildCSSPreview() {
  // converts to css string usable directly
  const allLink = CORNERS.every(c => state[c].link && state[c].h === state[c].v);
  const allSame = allLink && CORNERS.every(c => state[c].h === state.tl.h);
  if (allSame) return `${state.tl.h}${unit}`;
  const allSameH = CORNERS.every(c => state[c].h === state.tl.h);
  const allSameV = CORNERS.every(c => state[c].v === state.tl.v);
  if (allSameH && allSameV) return `${state.tl.h}${unit} / ${state.tl.v}${unit}`;
  const hs = CORNERS.map(c => state[c].h + unit).join(' ');
  const vs = CORNERS.map(c => state[c].v + unit).join(' ');
  return `${hs} / ${vs}`;
}

function render() {
  $('#shape').style.borderRadius = buildCSSPreview();
  $('#code').textContent = 'border-radius: ' + buildCSSPreview() + ';';
  renderCorners();
}

function renderCorners() {
  const max = getMax();
  $('#corners').innerHTML = CORNERS.map(c => `
    <div class="br-corner">
      <div class="br-corner-title">${CORNER_LABELS[c][lang]}</div>
      <label>${t('horizontal')} <span class="v">${state[c].h}${unit}</span></label>
      <input type="range" min="0" max="${max}" step="${unit==='%'?1:1}" value="${state[c].h}" oninput="setH('${c}',this.value)">
      <label>${t('vertical')} <span class="v">${state[c].v}${unit}</span></label>
      <input type="range" min="0" max="${max}" step="${unit==='%'?1:1}" value="${state[c].v}" oninput="setV('${c}',this.value)" ${state[c].link?'disabled':''}>
      <label style="margin-top:4px"><input type="checkbox" ${state[c].link?'checked':''} onchange="toggleLink('${c}',this.checked)"> ${t('linkLabel')}</label>
    </div>`).join('');
}

function setH(c, val) {
  state[c].h = parseFloat(val);
  if (state[c].link) state[c].v = state[c].h;
  render();
}
function setV(c, val) {
  state[c].v = parseFloat(val);
  render();
}
function toggleLink(c, on) {
  state[c].link = on;
  if (on) state[c].v = state[c].h;
  render();
}

function setUnit(u) {
  unit = u;
  document.querySelectorAll('.br-units button').forEach(b => b.classList.toggle('active', b.dataset.unit === u));
  // clamp
  const max = getMax();
  CORNERS.forEach(c => { state[c].h = Math.min(state[c].h, max); state[c].v = Math.min(state[c].v, max); });
  render();
}

function applyPreset(name) {
  const p = PRESETS[name];
  CORNERS.forEach(c => { state[c] = JSON.parse(JSON.stringify(p.vals[c] || {h:0,v:0,link:true})); });
  render();
}

// preset SVGs
function presetSVG(br) {
  return `<svg viewBox="0 0 30 30"><rect x="2" y="2" width="26" height="26" fill="#4ecdc4" style="border-radius:${br}"/>`;
}

$('#presets').innerHTML = Object.keys(PRESETS).map(name => {
  const p = PRESETS[name];
  let br;
  if (name === 'square') br = '0';
  else if (name === 'circle' || name === 'pill') br = '50%';
  else if (name === 'rounded' || name === 'card') br = '4px';
  else if (name === 'leaf') br = '15px 0 0 0';
  else if (name === 'ticket') br = '0 15px 15px 0';
  else if (name === 'blob') br = '60% 40% 50% 50% / 40% 60% 40% 60%';
  else if (name === 'wave') br = '40% 80% / 80% 40%';
  else br = '4px';
  return `<button onclick="applyPreset('${name}')">${presetSVG(br)}<span>${p.label[lang]}</span></button>`;
}).join('');

$('#unitsTitle').textContent = t('units');
$('#cornersTitle').textContent = t('corners');
$('#presetsTitle').textContent = t('presets');

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="copyText($('#code').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="applyPreset('rounded')">${t('resetAll')}</button>`;

render();

GZ.renderToolPage({
  category: 'dev',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🗺️', href:'/dev/css-clip-path-generator.html', name:'Clip Path'},
    {icon:'🌫️', href:'/dev/css-filter-generator.html', name:'CSS Filter'},
    {icon:'📐', href:'/dev/css-units.html', name:'CSS Units'},
    {icon:'✨', href:'/dev/css-minifier.html', name:'CSS Minifier'},
  ]
});
</script>
