<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "How is a salary hike percentage calculated?", "acceptedAnswer": {"@type": "Answer", "text": "Hike % = (New Salary − Old Salary) ÷ Old Salary × 100. For example, going from $50,000 to $55,000 is a 10% raise."}}, {"@type": "Question", "name": "Is a 10% annual raise good?", "acceptedAnswer": {"@type": "Answer", "text": "A 10% raise is well above the global average (3–5%). Promotions, job changes and high-demand skills typically command larger hikes."}}, {"@type": "Question", "name": "Does this calculator include bonuses or tax?", "acceptedAnswer": {"@type": "Answer", "text": "No. This shows gross base-salary change only. Bonuses, stock options, and tax effects are not included."}}, {"@type": "Question", "name": "How do I compute my new monthly take-home?", "acceptedAnswer": {"@type": "Answer", "text": "Divide the new annual salary by 12 for the gross monthly figure. Net take-home depends on your tax bracket and deductions — use the Income Tax Calculator for that."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-mode" id="mode"></div>
    <div class="gz-input-group">
      <div><label id="lbl-old"></label><input type="number" id="old" value="50000" min="0" step="1000"></div>
      <div><label id="lbl-new"></label><input type="number" id="new" value="60000" min="0" step="1000"></div>
      <div><label id="lbl-hike"></label><input type="number" id="hike" value="0" min="0" step="0.1"></div>
      <div><label id="lbl-currency"></label><select id="currency">
        <option value="$">$ USD</option>
        <option value="₹">₹ INR</option>
        <option value="€">€ EUR</option>
        <option value="£">£ GBP</option>
        <option value="¥">¥ CNY/JPY</option>
      </select></div>
    </div>
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="gz-result-box" id="results" style="display:none">
      <div class="gz-result-grid">
        <div class="gz-result-item"><div class="value" id="res-hike"></div><div class="label" id="res-hike-label"></div></div>
        <div class="gz-result-item"><div class="value" id="res-increase"></div><div class="label" id="res-increase-label"></div></div>
        <div class="gz-result-item"><div class="value" id="res-newannual"></div><div class="label" id="res-newannual-label"></div></div>
        <div class="gz-result-item"><div class="value" id="res-newmonthly"></div><div class="label" id="res-newmonthly-label"></div></div>
      </div>
    </div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Salary Hike Percentage Calculator',
    toolDesc: 'Calculate your salary hike percentage and new pay. Enter your current and new salary to find the raise percentage, or enter your current salary and a hike % to compute the new salary and monthly breakdown.',
    modePct: 'New Salary → Hike %',
    modeNew: 'Hike % → New Salary',
    old: 'Current / Old Salary (annual)',
    new: 'New Salary (annual)',
    hike: 'Hike Percentage (%)',
    currency: 'Currency',
    calculate: 'Calculate',
    clear: 'Clear',
    resHike: 'Hike %',
    resIncrease: 'Annual Increase',
    resNewAnnual: 'New Annual Salary',
    resNewMonthly: 'New Monthly Salary',
    step1: 'Pick a mode: solve for hike % or for new salary',
    step2: 'Enter your current salary',
    step3: 'Enter the new salary (or the hike percentage)',
    step4: 'Click Calculate to see the raise and monthly breakdown',
  },
  zh: {
    toolTitle: '调薪涨幅计算器',
    toolDesc: '计算薪资涨幅百分比和新薪资。输入当前薪资和新薪资得出涨幅，或输入当前薪资和涨幅百分比算出新薪资和月度明细。',
    modePct: '新薪资 → 涨幅 %',
    modeNew: '涨幅 % → 新薪资',
    old: '当前 / 原薪资（年薪）',
    new: '新薪资（年薪）',
    hike: '涨幅百分比（%）',
    currency: '货币',
    calculate: '计算',
    clear: '清空',
    resHike: '涨幅',
    resIncrease: '年薪增长',
    resNewAnnual: '新年薪',
    resNewMonthly: '新月薪',
    step1: '选择模式：求涨幅或求新薪资',
    step2: '输入当前薪资',
    step3: '输入新薪资（或涨幅百分比）',
    step4: '点击计算查看涨幅和月度明细',
  }
});

const { $, t } = GZ;

$('#lbl-old').textContent = t('old');
$('#lbl-new').textContent = t('new');
$('#lbl-hike').textContent = t('hike');
$('#lbl-currency').textContent = t('currency');
$('#res-hike-label').textContent = t('resHike');
$('#res-increase-label').textContent = t('resIncrease');
$('#res-newannual-label').textContent = t('resNewAnnual');
$('#res-newmonthly-label').textContent = t('resNewMonthly');

let mode = 'pct'; // 'pct' = new→%, 'new' = %→new

function fmt(n) { return n.toLocaleString(undefined, {minimumFractionDigits:0, maximumFractionDigits:0}); }
function fmtPct(n) { return n.toLocaleString(undefined, {minimumFractionDigits:1, maximumFractionDigits:2}) + '%'; }

function buildMode() {
  $('#mode').innerHTML = `
    <button class="${mode==='pct'?'active':''}" onclick="setMode('pct')">${t('modePct')}</button>
    <button class="${mode==='new'?'active':''}" onclick="setMode('new')">${t('modeNew')}</button>`;
}
function setMode(m) {
  mode = m;
  buildMode();
  $('#hike').value = mode === 'new' ? '10' : '0';
  $('#new').value = mode === 'pct' ? ($('#old').value ? String(Math.round(parseFloat($('#old').value) * 1.1)) : '55000') : '0';
  $('#hike').parentElement.style.opacity = mode === 'new' ? '1' : '0.5';
  $('#new').parentElement.style.opacity = mode === 'pct' ? '1' : '0.5';
  calc();
}

function calc() {
  const cur = $('#currency').value;
  const oldSal = Math.max(0, parseFloat($('#old').value) || 0);
  let hikePct, newSal;

  if (mode === 'pct') {
    newSal = Math.max(0, parseFloat($('#new').value) || 0);
    hikePct = oldSal > 0 ? ((newSal - oldSal) / oldSal) * 100 : 0;
  } else {
    hikePct = parseFloat($('#hike').value) || 0;
    newSal = oldSal * (1 + hikePct / 100);
  }

  const increase = newSal - oldSal;
  const newMonthly = newSal / 12;
  const posClass = increase >= 0 ? 'pos' : 'neg';
  const sign = increase >= 0 ? '+' : '';

  $('#res-hike').textContent = sign + fmtPct(hikePct);
  $('#res-hike').className = 'value ' + posClass;
  $('#res-increase').textContent = sign + cur + fmt(increase);
  $('#res-increase').className = 'value ' + posClass;
  $('#res-newannual').textContent = cur + fmt(newSal);
  $('#res-newmonthly').textContent = cur + fmt(newMonthly);
  $('#results').style.display = 'block';
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="calc()">${t('calculate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="document.getElementById('results').style.display='none'">${t('clear')}</button>`;

buildMode();
setMode('pct');

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'💵', href:'/calc/paycheck-calculator.html', name:'Paycheck'},
    {icon:'🏛️', href:'/calc/income-tax-calculator.html', name:'Income Tax'},
    {icon:'📈', href:'/calc/compound-interest.html', name:'Compound Interest'},
    {icon:'💸', href:'/calc/roi-calculator.html', name:'ROI Calculator'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
