<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"What is a canonical tag?","acceptedAnswer":{"@type":"Answer","text":"A canonical tag (rel=canonical) is an HTML link element that tells search engines which URL is the master version of a page, preventing duplicate content issues when the same content is reachable from multiple URLs."}},{"@type":"Question","name":"What is hreflang used for?","acceptedAnswer":{"@type":"Answer","text":"The hreflang attribute tells search engines which language and region a page targets, so the correct localized version is shown to users in Google search results across different countries."}},{"@type":"Question","name":"Where do I place canonical and hreflang tags?","acceptedAnswer":{"@type":"Answer","text":"Both go inside the <head> section of your HTML document. The hreflang annotations must reference all localized versions including a self-reference and an x-default fallback."}},{"@type":"Question","name":"Is my data sent to a server?","acceptedAnswer":{"@type":"Answer","text":"No. All tag generation runs entirely in your browser. Nothing you type is uploaded or stored anywhere."}}]}</script>

    </div>

<script>
GZI18n.register({en:{toolTitle:'Canonical Tag Generator',toolDesc:'Create rel=canonical link tags plus hreflang alternate annotations for international SEO. Paste-ready HTML output.',step1:'Enter the master (canonical) URL for the page.',step2:'Optionally list language/region pairs to add hreflang alternates.',step3:'Toggle x-default and self-reference, then copy the generated tags into your <head>.',lblCanonical:'Canonical URL',lblHreflang:'Hreflang alternates (one per line: LANG URL)',hreflangHint:'Format: language-region URL — e.g. "en-GB https://..." — one pair per line.',lblXdefault:'Add x-default',lblSelfref:'Add self-referencing hreflang'},zh:{toolTitle:'Canonical 标签生成器',toolDesc:'生成 rel=canonical 链接标签，并可附加 hreflang 多语言/地区备用声明，输出可直接粘贴的 HTML。',step1:'输入页面的规范（canonical）URL。',step2:'可选：填写语言/地区对，自动生成 hreflang 备用标签。',step3:'勾选是否添加 x-default 与自引用标签，然后将结果粘贴到 head 中。',lblCanonical:'Canonical 规范 URL',lblHreflang:'Hreflang 备用声明（每行一个：语言 URL）',hreflangHint:'格式：语言-地区 URL，例如 "en-GB https://..."，每行一对。',lblXdefault:'添加 x-default',lblSelfref:'添加自引用 hreflang'}});
const {$,copyText,t}=GZ;
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function gen(){
  const canonical=$('#canonicalUrl').value.trim();
  const lines=$('#hreflangList').value.split('\n').map(l=>l.trim()).filter(Boolean);
  const out=[];
  if(canonical){
    out.push(`<link rel="canonical" href="${esc(canonical)}">`);
  }
  const pairs=[];
  lines.forEach(l=>{
    const m=l.match(/^([^\s]+)\s+(https?:\/\/\S+)$/);
    if(m){pairs.push({lang:m[1].trim(),url:m[2].trim()});}
  });
  if($('#selfRef').checked && canonical){
    const self=pairs.find(p=>p.url===canonical);
    if(!self){pairs.unshift({lang:'x',url:canonical});}
  }
  if(pairs.length){
    pairs.forEach(p=>{
      const lang = p.lang==='x' ? guessLang(canonical) : p.lang;
      out.push(`<link rel="alternate" hreflang="${esc(lang)}" href="${esc(p.url)}">`);
    });
  }
  if($('#xdefault').checked && canonical){
    out.push(`<link rel="alternate" hreflang="x-default" href="${esc(canonical)}">`);
  }
  $('#output').value=out.length?out.join('\n'):'';
}
function guessLang(url){
  const m=url.match(/\/([a-z]{2})(?:-[A-Za-z]{2})?(?:\/|$|\?)/);
  return m?m[1]:'en';
}
function example(){
  $('#canonicalUrl').value='https://example.com/article';
  $('#hreflangList').value='en https://example.com/article\nen-GB https://example.com/uk/article\nzh https://example.com/zh/article\nfr https://example.com/fr/article';
  gen();
}
['canonicalUrl','hreflangList','xdefault','selfRef'].forEach(id=>$('#'+id).addEventListener('input',gen));
$('#toolbar').innerHTML=`<button class="gz-btn" onclick="gen()">${t('generate')||'Generate'}</button><button class="gz-btn gz-btn-secondary" onclick="example()">${t('example')}</button><button class="gz-btn" onclick="copyText($('#output').value)">${t('copy')}</button><button class="gz-btn gz-btn-secondary" onclick="['canonicalUrl','hreflangList'].forEach(id=>document.getElementById(id).value='');gen()">${t('clear')}</button>`;
$('#lbl-canonical').textContent=t('lblCanonical');
$('#lbl-hreflang').textContent=t('lblHreflang');
$('#hreflang-hint').textContent=t('hreflangHint');
$('#lbl-xdefault').textContent=t('lblXdefault');
$('#lbl-selfref').textContent=t('lblSelfref');
GZ.renderToolPage({category:'seo',titleKey:'toolTitle',descKey:'toolDesc',howToSteps:['step1','step2','step3'],related:[{icon:'🌍',href:'/seo/hreflang-generator.html',name:'Hreflang Generator'},{icon:'🏷️',href:'/seo/meta-tag-generator.html',name:'Meta Tag Generator'},{icon:'🗺️',href:'/seo/sitemap-generator.html',name:'Sitemap Generator'},{icon:'✅',href:'/seo/schema-validator.html',name:'Schema Validator'}]});
gen();
</script>
