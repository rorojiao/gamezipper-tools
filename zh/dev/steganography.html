    lblOut: '提取的消息',
    encOk: (n) => `✓ 已在图片中隐藏 ${n} 个字符。点击「下载编码后的 PNG」保存。`,
    encErr: '图片太小，无法容纳该消息。请使用更大的图片或更短的文字。',
    decEmpty: '此图片中未找到隐藏消息。',
    decOk: (n) => `✓ 已提取 ${n} 个字符。`,
    errImg: '请先加载一张 PNG 图片。',
    step1: '切换到「编码」选项卡，拖入一张 PNG 图片',
    step2: '在文本框中输入要隐藏的秘密消息',
    step3: '点击「将文字隐藏到图片」，然后下载编码后的 PNG',

const { $, t } = GZ;

let encImg = null, decImg = null, encDataUrl = null;
const MAGIC = 'GZSTG1'; // 6-byte signature

function switchTab(name) {
  document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(x => x.classList.remove('active'));
  $('#tab-' + name).classList.add('active');
  $('#panel-' + name).classList.add('active');
}

function setupDrop(zoneId, inputId, handler) {
  const dz = $('#' + zoneId);
  dz.addEventListener('click', () => $('#' + inputId).click());
  dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('dragover'); });
  dz.addEventListener('dragleave', () => dz.classList.remove('dragover'));
  dz.addEventListener('drop', e => {
    e.preventDefault(); dz.classList.remove('dragover');
    const f = e.dataTransfer.files[0]; if (f) handler(f);
  });
  $('#' + inputId).addEventListener('change', e => { const f = e.target.files[0]; if (f) handler(f); });
}

function loadImg(f, cb) {
  const url = URL.createObjectURL(f);
  const img = new Image();
  img.onload = () => { cb(img, url); };
  img.src = url;
}

setupDrop('dropEnc', 'fileEnc', f => {
  if (f.size > 20 * 1024 * 1024) { alert('Image too large (>20MB).'); return; }
  loadImg(f, (img) => {
    encImg = img;
    $('#prevEnc').innerHTML = `<img src="${img.src}" alt="">`;
    $('#encStatus').innerHTML = `<div class="stat">${img.width}×${img.height} pixels · max capacity ≈ <b>${Math.floor((img.width*img.height*3 - (MAGIC.length+4)*8)/8)}</b> chars</div>`;
  });
});

setupDrop('dropDec', 'fileDec', f => {
  if (f.size > 20 * 1024 * 1024) { alert('Image too large (>20MB).'); return; }
  loadImg(f, (img) => {
    decImg = img;
    $('#prevDec').innerHTML = `<img src="${img.src}" alt="">`;
    $('#decStatus').innerHTML = '';
  });
});

function encode() {
  if (!encImg) { $('#encStatus').innerHTML = `<div class="stat" style="color:var(--accent)">${t('errImg')}</div>`; return; }
  const msg = $('#msg').value;
  const cv = $('#canvasEnc');
  cv.width = encImg.width; cv.height = encImg.height;
  const ctx = cv.getContext('2d');
  ctx.drawImage(encImg, 0, 0);
  const imgData = ctx.getImageData(0, 0, cv.width, cv.height);
  const data = imgData.data;

  // Payload = MAGIC + 4-byte length (big-endian) + UTF-8 message bytes
  const enc = new TextEncoder();
  const msgBytes = enc.encode(msg);
  const payload = new Uint8Array(MAGIC.length + 4 + msgBytes.length);
  for (let i = 0; i < MAGIC.length; i++) payload[i] = MAGIC.charCodeAt(i);
  const len = msgBytes.length;
  payload[MAGIC.length] = (len >>> 24) & 0xFF;
  payload[MAGIC.length + 1] = (len >>> 16) & 0xFF;
  payload[MAGIC.length + 2] = (len >>> 8) & 0xFF;
  payload[MAGIC.length + 3] = len & 0xFF;
  payload.set(msgBytes, MAGIC.length + 4);

  const bitsNeeded = payload.length * 8;
  // Only RGB channels (skip alpha) → 3 bits per pixel
  const bitsAvailable = Math.floor(data.length / 4) * 3;
  if (bitsNeeded > bitsAvailable) {
    $('#encStatus').innerHTML = `<div class="stat" style="color:var(--accent)">${t('encErr')}</div>`;
    return;
  }

  let bitIdx = 0;
  for (let p = 0; p < data.length && bitIdx < bitsNeeded; p += 4) {
    for (let c = 0; c < 3 && bitIdx < bitsNeeded; c++) {
      const byteIdx = bitIdx >> 3;
      const bitInByte = 7 - (bitIdx & 7);
      const bit = (payload[byteIdx] >> bitInByte) & 1;
      data[p + c] = (data[p + c] & 0xFE) | bit;
      bitIdx++;
    }
  }
  ctx.putImageData(imgData, 0, 0);
  encDataUrl = cv.toDataURL('image/png');
  $('#btnDl').style.display = '';
  $('#encStatus').innerHTML = `<div class="stat" style="color:var(--success)">${t('encOk')(msg.length)}</div>`;
}

function downloadEncoded() {
  if (!encDataUrl) return;
  const a = document.createElement('a');
  a.href = encDataUrl;
  a.download = 'steganography-encoded.png';
  a.click();
}

function clearEncode() {
  encImg = null; encDataUrl = null;
  $('#msg').value = ''; $('#prevEnc').innerHTML = ''; $('#encStatus').innerHTML = '';
  $('#btnDl').style.display = 'none';
}

function decode() {
  if (!decImg) { $('#decStatus').innerHTML = `<div class="stat" style="color:var(--accent)">${t('errImg')}</div>`; return; }
  const cv = $('#canvasDec');
  cv.width = decImg.width; cv.height = decImg.height;
  const ctx = cv.getContext('2d');
  ctx.drawImage(decImg, 0, 0);
  const data = ctx.getImageData(0, 0, cv.width, cv.height).data;

  // Read enough bits for MAGIC + length first
  const needHeader = (MAGIC.length + 4) * 8;
  const headerBytes = new Uint8Array(MAGIC.length + 4);
  let bitIdx = 0;
  let p = 0, c = 0;
  for (let i = 0; i < headerBytes.length; i++) {
    let byte = 0;
    for (let b = 7; b >= 0; b--) {
      // advance to next channel
      while (true) {
        if (p >= data.length) { $('#decoded').value = ''; $('#decStatus').innerHTML = `<div class="stat" style="color:var(--accent)">${t('decEmpty')}</div>`; return; }
        const bit = data[p + c] & 1;
        byte |= bit << b;
        c++; bitIdx++;
        if (c >= 3) { c = 0; p += 4; }
        break;
      }
    }
    headerBytes[i] = byte;
  }
  let magic = '';
  for (let i = 0; i < MAGIC.length; i++) magic += String.fromCharCode(headerBytes[i]);
  if (magic !== MAGIC) {
    $('#decoded').value = ''; $('#decStatus').innerHTML = `<div class="stat" style="color:var(--accent)">${t('decEmpty')}</div>`; return;
  }
  const msgLen = (headerBytes[MAGIC.length] << 24) | (headerBytes[MAGIC.length+1] << 16) | (headerBytes[MAGIC.length+2] << 8) | headerBytes[MAGIC.length+3];
  if (msgLen < 0 || msgLen > 5_000_000) { $('#decoded').value = ''; $('#decStatus').innerHTML = `<div class="stat" style="color:var(--accent)">${t('decEmpty')}</div>`; return; }

  const msgBytes = new Uint8Array(msgLen);
  for (let i = 0; i < msgLen; i++) {
    let byte = 0;
    for (let b = 7; b >= 0; b--) {
      while (true) {
        if (p >= data.length) { $('#decoded').value = ''; $('#decStatus').innerHTML = `<div class="stat" style="color:var(--accent)">${t('decEmpty')}</div>`; return; }
        const bit = data[p + c] & 1;
        byte |= bit << b;
        c++; bitIdx++;
        if (c >= 3) { c = 0; p += 4; }
        break;
      }
    }
    msgBytes[i] = byte;
  }
  const text = new TextDecoder().decode(msgBytes);
  $('#decoded').value = text;
  $('#btnCopy').style.display = '';
  $('#decStatus').innerHTML = `<div class="stat" style="color:var(--success)">${t('decOk')(text.length)}</div>`;
}

$('#tab-encode').textContent = t('tabEncode');
