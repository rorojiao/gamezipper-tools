<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is the difference between a stuck pixel and a dead pixel?", "acceptedAnswer": {"@type": "Answer", "text": "A stuck pixel stays lit in one color (often red, green or blue) because a sub-pixel is frozen on. A dead pixel is permanently black and receives no power. This fixer can often recover stuck pixels; dead pixels are usually permanent and need hardware repair."}}, {"@type": "Question", "name": "How does a stuck pixel fixer work?", "acceptedAnswer": {"@type": "Answer", "text": "It rapidly cycles bright, high-contrast colors (and optionally random noise) across the affected area. The fast switching exercises the liquid crystals and transistor that control each sub-pixel, which can jolt a frozen-on pixel back to normal behavior."}}, {"@type": "Question", "name": "How long should I run the pixel fixer?", "acceptedAnswer": {"@type": "Answer", "text": "Run it fullscreen for 10–30 minutes at a time, focused on the stuck pixel. Some pixels recover in seconds, others need several sessions over a few days. If there is no change after an hour total, the pixel is likely permanently stuck and may not be fixable."}}, {"@type": "Question", "name": "Is it safe to run the flashing colors?", "acceptedAnswer": {"@type": "Answer", "text": "Yes for your hardware, but the rapid flashing can trigger discomfort or seizures in people with photosensitive epilepsy. If you feel dizzy, nauseous or get a headache, stop immediately and do not use the tool."}}]}</script>

<body>
<div class="gz-container">

  <div class="gz-tool-area">

    <div class="pf-stage" id="stage">

        </select>
      </label>
      <label><span id="lbl-speed"></span>
        <input type="range" id="speed" min="1" max="60" value="20">
        <span id="speed-val" style="font-family:monospace;min-width:34px"></span>
      </label>

</div>
<button class="pf-exit" id="exit-fs" onclick="document.exitFullscreen()">✕ <span id="exit-lbl">Exit</span></button>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Stuck Pixel Fixer — Fix Stuck LCD Pixels',
    toolDesc: 'Rapidly flash RGB colors, white flashes or random noise across your whole screen to unstick frozen LCD sub-pixels. Adjustable speed and pattern, fullscreen, 100% in your browser.',
    btnStart: '▶ Start Fullscreen',
    btnStop: '■ Stop',
    hint: 'Click to start · Esc to exit',
    lblMode: 'Mode:',
    lblSpeed: 'Speed (fps):',
    warning: '<b>⚠ Photosensitivity warning:</b> This tool rapidly flashes bright colors and may trigger discomfort or seizures in people with photosensitive epilepsy. Stop immediately if you feel dizzy, nauseous or unwell. Do not use if you have a history of seizures.',
    step1: 'Position the stuck pixel near the center of the screen.',
    step2: 'Choose a mode (RGB Cycle is the most effective default).',
    step3: 'Click Start Fullscreen and let it run for 10–30 minutes.',
    step4: 'Press Esc or click ✕ to stop. Repeat over a few days if needed.',
    modes: {rgb:'RGB Cycle',white:'White Flash',noise:'Random Noise',blocks:'Color Blocks'},
  },
  zh: {
    toolTitle: '亮点修复工具 — 修复 LCD 卡住的子像素',
    toolDesc: '在全屏下快速闪烁 RGB 颜色、白光或随机噪点，以激活卡住的 LCD 子像素。可调节速度和图案，支持全屏，100% 浏览器本地运行。',
    btnStart: '▶ 开始全屏',
    btnStop: '■ 停止',
    hint: '点击开始 · Esc 退出',
    lblMode: '模式：',
    lblSpeed: '速度 (fps)：',
    warning: '<b>⚠ 光敏性警告：</b>本工具会快速闪烁明亮颜色，可能引发光敏性癫痫患者的不适或发作。如感到头晕、恶心或不适，请立即停止。有癫痫病史者请勿使用。',
    step1: '将亮点尽量对准屏幕中央区域。',
    step2: '选择模式（默认 RGB 循环最有效）。',
    step3: '点击「开始全屏」并运行 10–30 分钟。',
    step4: '按 Esc 或点 ✕ 停止。如需要可连续数天重复。',
    modes: {rgb:'RGB 循环',white:'白光闪烁',noise:'随机噪点',blocks:'色块'},
  }
});

const { $, t } = GZ;

let running = false, rafId = null, lastFlash = 0, elapsed = 0, startTs = 0;
let mode = 'rgb', speed = 20;
const FLASH_COLORS = ['#ff0000','#00ff00','#0000ff','#ffffff','#00ffff','#ff00ff','#ffff00'];

function sizeCanvas(){
  const cv = $('#cv');
  const r = cv.getBoundingClientRect();
  const dpr = Math.min(window.devicePixelRatio||1, 2);
  cv.width = Math.max(1, Math.round(r.width * dpr));
  cv.height = Math.max(1, Math.round(r.height * dpr));
  return {w:cv.width, h:cv.height, dpr};
}

function drawNoise(ctx, w, h){
  // downsample for performance, then scale up
  const bw = 64, bh = Math.max(1, Math.round(64 * h / w));
  for(let y=0; y<bh; y++){
    for(let x=0; x<bw; x++){
      ctx.fillStyle = '#' + Math.floor(Math.random()*16777215).toString(16).padStart(6,'0');
      ctx.fillRect(Math.floor(x*w/bw), Math.floor(y*h/bh), Math.ceil(w/bw)+1, Math.ceil(h/bh)+1);
    }
  }
}

function drawBlocks(ctx, w, h){
  const cols = 8, rows = 6;
  const bw = w/cols, bh = h/rows;
  for(let y=0; y<rows; y++){
    for(let x=0; x<cols; x++){
      ctx.fillStyle = FLASH_COLORS[Math.floor(Math.random()*FLASH_COLORS.length)];
      ctx.fillRect(Math.floor(x*bw), Math.floor(y*bh), Math.ceil(bw)+1, Math.ceil(bh)+1);
    }
  }
}

let colorIdx = 0;
function step(ts){
  if(!running){ return; }
  const interval = 1000 / speed;
  if(ts - lastFlash >= interval){
    const cv = $('#cv');
    const ctx = cv.getContext('2d');
    const {w,h} = sizeCanvas();
    if(mode === 'rgb' || mode === 'white'){
      if(mode === 'white'){
        ctx.fillStyle = (colorIdx % 2 === 0) ? '#ffffff' : '#000000';
      } else {
        ctx.fillStyle = FLASH_COLORS[colorIdx % FLASH_COLORS.length];
      }
      colorIdx++;
      ctx.fillRect(0,0,w,h);
    } else if(mode === 'noise'){
      drawNoise(ctx, w, h);
    } else if(mode === 'blocks'){
      drawBlocks(ctx, w, h);
    }
    lastFlash = ts;
    // update timer
    elapsed = (ts - startTs) / 1000;
    const mm = Math.floor(elapsed/60), ss = Math.floor(elapsed%60);
    $('#timer').textContent = `${String(mm).padStart(2,'0')}:${String(ss).padStart(2,'0')}`;
  }
  rafId = requestAnimationFrame(step);
}

function start(){
  running = true;
  $('#stage').classList.add('running');
  $('#timer').style.display = '';
  const cv = $('#cv'); sizeCanvas();
  const ctx = cv.getContext('2d');
  ctx.fillStyle = '#000'; ctx.fillRect(0,0,cv.width,cv.height);
  lastFlash = 0; startTs = performance.now(); elapsed = 0; colorIdx = 0;
  cancelAnimationFrame(rafId);
  rafId = requestAnimationFrame(step);
}

function stop(){
  running = false;
  cancelAnimationFrame(rafId);
  $('#stage').classList.remove('running');
  $('#timer').style.display = 'none';
}

function goFullscreenStart(){
  const el = $('#stage');
  const req = el.requestFullscreen || el.webkitRequestFullscreen || el.msRequestFullscreen;
  const doStart = ()=>{ start(); };
  if(req){
    try{
      const p = req.call(el);
      if(p && p.then){ p.then(doStart).catch(doStart); } else { setTimeout(doStart, 100); }
    }catch(e){ doStart(); }
  } else {
    doStart();
  }
}

$('#stage').addEventListener('click', ()=>{
  if(running){ stop(); } else { goFullscreenStart(); }
});
$('#hint').textContent = t('hint');
$('#warning').innerHTML = t('warning');
$('#exit-lbl').textContent = t('btnExit');
$('#lbl-mode').textContent = t('lblMode');
$('#lbl-speed').textContent = t('lblSpeed');
$('#speed-val').textContent = speed;

// localize mode options
const modeLabels = t('modes');
document.querySelectorAll('#mode option').forEach(o=>{ o.textContent = modeLabels[o.value] || o.textContent; });

$('#mode').onchange = e=>{ mode = e.target.value; };
$('#speed').oninput = e=>{ speed = +e.target.value; $('#speed-val').textContent = speed; };

document.addEventListener('fullscreenchange', ()=>{
  $('#exit-fs').style.display = document.fullscreenElement ? 'flex' : 'none';
  if(!document.fullscreenElement && running){ stop(); }
});

window.addEventListener('resize', ()=>{ if(running){ sizeCanvas(); } });

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="goFullscreenStart()">${t('btnStart')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="stop()">${t('btnStop')}</button>`;

GZ.renderToolPage({
  category: 'fun',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🖥️', href:'/dev/monitor-test.html', name:'Monitor Test'},
    {icon:'⬜', href:'/fun/white-screen.html', name:'White Screen'},
    {icon:'⬛', href:'/fun/black-screen.html', name:'Black Screen'},
    {icon:'🎨', href:'/fun/color-screen.html', name:'Color Screen'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
