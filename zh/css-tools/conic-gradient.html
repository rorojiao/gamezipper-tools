<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is a conic gradient in CSS?", "acceptedAnswer": {"@type": "Answer", "text": "A conic gradient transitions colors around a center point rather than across a line. Colors radiate outward like pie slices or a color wheel. Use the CSS conic-gradient() function to create it."}}, {"@type": "Question", "name": "How is a conic gradient different from a linear or radial gradient?", "acceptedAnswer": {"@type": "Answer", "text": "Linear gradients transition along a straight line, radial gradients radiate outward from a center point in concentric circles, and conic gradients sweep colors around a center point like a pie chart or clock face."}}, {"@type": "Question", "name": "Can I create pie charts with conic gradients?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. Conic gradients are the easiest way to create CSS-only pie charts. By setting hard color stops at specific percentages (e.g. red 0% 40%, blue 40% 70%, green 70% 100%), you get crisp pie slices."}}, {"@type": "Question", "name": "Is conic-gradient supported in all browsers?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. The conic-gradient() function is supported in all modern browsers including Chrome, Firefox, Safari and Edge with 97%+ global support. No prefixes needed."}}]}</script>

<script>
GZI18n.register({
  en: {
    toolTitle: 'CSS Conic Gradient Generator',
    toolDesc: 'Create beautiful CSS conic gradients with multiple color stops, angles and center positions. Pie chart and color wheel modes — copy production-ready CSS instantly.',
    preset: 'Preset', addStop: 'Add Stop', removeStop: 'Remove', copyCode: 'Copy CSS',
    angle: 'Start Angle', centerX: 'Center X', centerY: 'Center Y', shape: 'Shape',
    circle: 'Circle', square: 'Square', pieMode: 'Pie Chart Mode (hard stops)',
    pRainbow: 'Rainbow', pSunset: 'Sunset', pWheel: 'Color Wheel', pPie: 'Pie Chart', pNeon: 'Neon', pGalaxy: 'Galaxy', pFire: 'Fire', pOcean: 'Ocean',
    step1: 'Choose a preset or start with the default conic gradient',
    step2: 'Add color stops and adjust their positions around the center',
    step3: 'Set the start angle and center position, toggle pie chart mode',
    step4: 'Copy the generated CSS code for your project',
  },
  zh: {
    toolTitle: 'CSS 圆锥渐变生成器',
    toolDesc: '创建精美的 CSS 圆锥渐变，支持多色标、角度和中心位置。饼图和色环模式 — 一键复制 CSS 代码。',
    preset: '预设', addStop: '添加色标', removeStop: '删除', copyCode: '复制 CSS',
    angle: '起始角度', centerX: '中心 X', centerY: '中心 Y', shape: '形状',
    circle: '圆形', square: '方形', pieMode: '饼图模式（硬色标）',
    pRainbow: '彩虹', pSunset: '日落', pWheel: '色环', pPie: '饼图', pNeon: '霓虹', pGalaxy: '星系', pFire: '火焰', pOcean: '海洋',
    step1: '选择预设或从默认圆锥渐变开始',
    step2: '添加色标并调整圆周位置',
    step3: '设置起始角度和中心位置，切换饼图模式',
    step4: '复制生成的 CSS 代码',
  }
});

const { $, copyText, t } = GZ;

const presets = {
  rainbow: [{c:'#ff0000',p:0},{c:'#ff8000',p:14},{c:'#ffff00',p:28},{c:'#00ff00',p:42},{c:'#00ffff',p:57},{c:'#0080ff',p:71},{c:'#8000ff',p:85},{c:'#ff0000',p:100}],
  sunset:  [{c:'#ff6b6b',p:0},{c:'#feca57',p:25},{c:'#ff9ff3',p:50},{c:'#ee5a6f',p:75},{c:'#ff6b6b',p:100}],
  wheel:   [{c:'#ff0000',p:0},{c:'#ffff00',p:17},{c:'#00ff00',p:33},{c:'#00ffff',p:50},{c:'#0000ff',p:67},{c:'#ff00ff',p:83},{c:'#ff0000',p:100}],
  pie:     [{c:'#4ecdc4',p:0},{c:'#4ecdc4',p:35},{c:'#ff6b6b',p:35},{c:'#ff6b6b',p:65},{c:'#ffd93d',p:65},{c:'#ffd93d',p:100}],
  neon:    [{c:'#00ff87',p:0},{c:'#60efff',p:25},{c:'#0061ff',p:50},{c:'#a855f7',p:75},{c:'#00ff87',p:100}],
  galaxy:  [{c:'#8e2de2',p:0},{c:'#4a00e0',p:25},{c:'#e94057',p:50},{c:'#f27121',p:75},{c:'#8e2de2',p:100}],
  fire:    [{c:'#ff0000',p:0},{c:'#ff6b00',p:25},{c:'#ffd700',p:50},{c:'#ff4500',p:75},{c:'#ff0000',p:100}],
  ocean:   [{c:'#0061ff',p:0},{c:'#60efff',p:25},{c:'#0093e9',p:50},{c:'#80d0c7',p:75},{c:'#0061ff',p:100}],
};

let stops = JSON.parse(JSON.stringify(presets.rainbow));
let startAngle = 0, cxPct = 50, cyPct = 50, isPie = false, shape = '50%';

function update() {
  // Build conic gradient string
  const stopStr = stops.map(s => `${s.c} ${s.p}%`).join(', ');
  const bg = `conic-gradient(from ${startAngle}deg at ${cxPct}% ${cyPct}%, ${stopStr})`;
  const shape_el = $('#conicShape');
  shape_el.style.background = bg;
  shape_el.style.borderRadius = shape;

  // Generate CSS code
  const css = `.conic-gradient {\n  background: conic-gradient(from ${startAngle}deg at ${cxPct}% ${cyPct}%,\n${stops.map(s => `    ${s.c} ${s.p}%`).join(',\n')});\n  width: 240px;\n  height: 240px;\n  border-radius: ${shape === '50%' ? '50%' : '16px'};\n}`;
  $('#codeBox').textContent = css;
}

function renderStops() {
  $('#stopsContainer').innerHTML = stops.map((s, i) => `
    <div class="stop-row">
      <input type="color" value="${s.c}" oninput="stops[${i}].c=this.value;update()">
      <input type="range" min="0" max="100" value="${s.p}" oninput="stops[${i}].p=+this.value;document.getElementById('pv${i}').textContent=this.value+'%';update()">
      <span class="pos-label" id="pv${i}">${s.p}%</span>
      ${stops.length > 2 ? `<button class="gz-btn gz-btn-secondary" style="padding:4px 8px;font-size:.75em" onclick="rmStop(${i})">${t('removeStop')}</button>` : ''}
    </div>`).join('');
}

window.rmStop = function(i) { if (stops.length > 2) { stops.splice(i, 1); renderStops(); update(); } };
window.addStopFn = function() {
  if (stops.length >= 12) return;
  const colors = ['#4ecdc4','#ffd93d','#ff6b6b','#a855f7','#60efff','#00ff87'];
  stops.push({ c: colors[stops.length % colors.length], p: Math.round(100 / (stops.length + 1) * stops.length) });
  renderStops(); update();
};
window.applyPreset = function(name) {
  if (!presets[name]) return;
  stops = JSON.parse(JSON.stringify(presets[name]));
  isPie = name === 'pie';
  document.getElementById('pieCheck').checked = isPie;
  renderStops(); update();
};
window.togglePie = function() {
  isPie = document.getElementById('pieCheck').checked;
  if (isPie) {
    // Convert to hard stops
    for (let i = 0; i < stops.length - 1; i++) {
      if (stops[i].p < stops[i+1].p) {
        stops.splice(i+1, 0, { c: stops[i].c, p: stops[i+1].p });
        i++;
      }
    }
  }
  renderStops(); update();
};
window.setShape = function(s) {
  shape = s === 'circle' ? '50%' : '16px';
  update();
};

$('#globalControls').innerHTML = `
  <label>${t('angle')}: <span id="angleVal">${startAngle}°</span>
    <input type="range" min="0" max="360" value="${startAngle}" oninput="startAngle=+this.value;document.getElementById('angleVal').textContent=this.value+'°';update()"></label>
  <label>${t('centerX')}: <span id="cxVal">${cxPct}%</span>
    <input type="range" min="0" max="100" value="${cxPct}" oninput="cxPct=+this.value;document.getElementById('cxVal').textContent=this.value+'%';update()"></label>
  <label>${t('centerY')}: <span id="cyVal">${cyPct}%</span>
    <input type="range" min="0" max="100" value="${cyPct}" oninput="cyPct=+this.value;document.getElementById('cyVal').textContent=this.value+'%';update()"></label>
  <label>${t('shape')}
    <select onchange="setShape(this.value)"><option value="circle">${t('circle')}</option><option value="square">${t('square')}</option></select></label>
  <label><input type="checkbox" id="pieCheck" ${isPie?'checked':''} onchange="togglePie()" style="width:auto"> ${t('pieMode')}</label>`;

$('#toolbar').innerHTML = `
  <select class="gz-select" onchange="applyPreset(this.value)">
    <option value="">${t('preset')}…</option>
    <option value="rainbow">${t('pRainbow')}</option>
    <option value="sunset">${t('pSunset')}</option>
    <option value="wheel">${t('pWheel')}</option>
    <option value="pie">${t('pPie')}</option>
    <option value="neon">${t('pNeon')}</option>
    <option value="galaxy">${t('pGalaxy')}</option>
    <option value="fire">${t('pFire')}</option>
    <option value="ocean">${t('pOcean')}</option>
  </select>
  <button class="gz-btn gz-btn-secondary" onclick="addStopFn()">${t('addStop')}</button>
  <button class="gz-btn" onclick="copyText($('#codeBox').textContent)">${t('copyCode')}</button>`;

renderStops();
update();

GZ.renderToolPage({
  category: 'css',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🌈', href:'/css-tools/gradient.html', name:'CSS Gradient'},
    {icon:'🌈', href:'/css-tools/mesh-gradient.html', name:'Mesh Gradient'},
    {icon:'🌈', href:'/css-tools/text-gradient.html', name:'Text Gradient'},
    {icon:'🌈', href:'/css-tools/gradient-border.html', name:'Gradient Border'},
  ]
});
</script>
<script src="/tools-result-rec.js?v=20260707v520" defer></script>
</body>
