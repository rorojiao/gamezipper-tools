<script type="application/ld+json">{"@context":"https://schema.org","@type":"WebApplication","name":"Antilog Calculator","description":"Free antilog calculator. Find the inverse logarithm for base 10, natural log (e) or base 2. Enter a log value and get the antilog instantly with the formula.","url": "https://tools.gamezipper.com/zh/calc/antilog-calculator.html","applicationCategory":"Utility","operatingSystem":"Web Browser","offers":{"@type":"Offer","price":"0"}}</script>
<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"What is an antilog?","acceptedAnswer":{"@type":"Answer","text":"An antilog (antilogarithm) is the inverse of a logarithm. If log base b of x equals y, then the antilog of y base b is x. In other words antilog_b(y) = b^y. For base 10, antilog(y) = 10^y."}},{"@type":"Question","name":"How do I calculate the antilog of a number?","acceptedAnswer":{"@type":"Answer","text":"Raise the base to the power of your log value. For common log (base 10): antilog(2) = 10^2 = 100. For natural log: antilog of ln is e^x, so the antilog of 2 with base e is e^2 = 7.389. For base 2: 2^x."}},{"@type":"Question","name":"What is the difference between antilog and exponent?","acceptedAnswer":{"@type":"Answer","text":"They are the same operation. Antilog is just the older name for raising the base to a power. Antilog base 10 of x equals 10^x, and the inverse of natural log (ln) is the exponential function e^x."}},{"@type":"Question","name":"How do I find the antilog on a calculator?","acceptedAnswer":{"@type":"Answer","text":"Use the 10^x key for common log antilogs (base 10), the e^x key for natural log antilogs, or the general y^x / power key with your base. This tool does all three automatically and shows the steps."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="al-row">
      <div class="al-field" style="margin:0">
        <label id="lbl-val"></label>
        <input type="number" id="logval" step="any" value="2">
      </div>
      <div class="al-field" style="margin:0">
        <label id="lbl-base"></label>
        <select id="base">
          <option value="10">10 (common)</option>
          <option value="e">e (natural / ln)</option>
          <option value="2">2 (binary)</option>
        </select>
      </div>
    </div>
    <button class="gz-btn gz-btn-primary" id="calcBtn" style="width:100%;padding:14px;font-size:1.05rem;margin:1rem 0">⚡ Calculate</button>
    <div class="al-result" id="result">
      <div class="al-big" id="resultBig">—</div>
      <div id="resultMeta" style="color:var(--text2);font-size:.9rem"></div>
    </div>
    <div class="al-grid" id="grid"></div>
    <div class="al-formula" id="formula"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en:{
    toolTitle:'Antilog Calculator',
    toolDesc:'Find the inverse of any logarithm. Enter the log value and pick base 10 (common log), e (natural log / ln) or 2 — get the antilog instantly with the formula and steps.',
    lblVal:'Log value (the number you took the log of)',
    lblBase:'Log base',
    calculate:'⚡ Calculate',copy:'Copy',clear:'Clear',
    resultLabel:'Antilog result',
    cellBase10:'Antilog base 10',
    cellBaseE:'Antilog base e',
    cellBase2:'Antilog base 2',
    cellSci:'Scientific',
    formulaHead:'antilog_base(value) = base ^ value',
    step:'Step',
    stepRaise:'Raise base to the value',
    enterVal:'Enter a log value and pick a base, then press Calculate.',
    step1:'Enter the log value (the result of a logarithm)',
    step2:'Pick the log base: 10 for common log, e for natural log (ln), or 2',
    step3:'Press Calculate to get the antilog',
    step4:'Check the cross-base values and the formula breakdown',
  },
  zh:{
    toolTitle:'反对数计算器',
    toolDesc:'求任意对数的逆运算。输入对数值并选择底数 10（常用对数）、e（自然对数 ln）或 2 — 即时得到反对数，并显示公式与步骤。',
    lblVal:'对数值（取对数后得到的结果）',
    lblBase:'对数底数',
    calculate:'⚡ 计算',copy:'复制',clear:'清空',
    resultLabel:'反对数结果',
    cellBase10:'以 10 为底',
    cellBaseE:'以 e 为底',
    cellBase2:'以 2 为底',
    cellSci:'科学计数',
    formulaHead:'反对数_底数(值) = 底数 ^ 值',
    step:'步骤',
    stepRaise:'将底数作为幂底，值作为指数',
    enterVal:'输入对数值并选择底数后点击计算。',
    step1:'输入对数值（取对数后的结果）',
    step2:'选择底数：10 为常用对数，e 为自然对数（ln），或 2',
    step3:'点击「计算」得到反对数',
    step4:'查看不同底数的结果和公式分解',
  }
});

const { $, copyText, t } = GZ;

function fmtFull(n){ if(!isFinite(n)) return String(n); if(Number.isInteger(n)&&Math.abs(n)<1e21) return n.toLocaleString('fullwide',{useGrouping:false}); return String(n); }
function fmtSci(n){ if(!isFinite(n)) return String(n); return n.toExponential(6); }
function fmt(n){ if(!isFinite(n)) return String(n); const r=Math.round(n*1e10)/1e10; return r.toLocaleString('en-US',{maximumFractionDigits:10}); }

function calc(){
  const v=parseFloat($('#logval').value);
  if(isNaN(v)){ $('#resultBig').textContent='—'; $('#resultMeta').textContent=t('enterVal'); $('#grid').innerHTML=''; $('#formula').textContent=t('formulaHead'); return; }
  const baseSel=$('#base').value;
  const base=baseSel==='e'?Math.E:(baseSel==='2'?2:10);
  const result=Math.pow(base,v);
  $('#resultBig').textContent=fmtFull(result);
  $('#resultMeta').textContent=t('resultLabel');
  const r10=Math.pow(10,v), rE=Math.pow(Math.E,v), r2=Math.pow(2,v);
  $('#grid').innerHTML=
    `<div class="al-cell"><div class="lbl">${t('cellBase10')}</div><div class="val">${fmtFull(r10)}</div></div>`+
    `<div class="al-cell"><div class="lbl">${t('cellBaseE')}</div><div class="val">${fmtFull(rE)}</div></div>`+
    `<div class="al-cell"><div class="lbl">${t('cellBase2')}</div><div class="val">${fmtFull(r2)}</div></div>`;
  const baseLabel=baseSel==='e'?'e':baseSel;
  $('#formula').innerHTML=
    `<div>${t('formulaHead')}</div>`+
    `<div style="margin-top:8px">${t('step')} 1 — ${t('stepRaise')}: ${baseLabel} ^ ${fmt(v)}</div>`+
    `<div>${t('step')} 2 — = <b>${fmtFull(result)}</b></div>`+
    (Math.abs(result)>=1e6||Math.abs(result)<1e-3&&result!==0?`<div style="opacity:.8">${t('cellSci')}: ${fmtSci(result)}</div>`:'');
}

$('#calcBtn').addEventListener('click',calc);
$('#logval').addEventListener('input',calc);
$('#logval').addEventListener('keydown',e=>{if(e.key==='Enter')calc();});
$('#base').addEventListener('change',calc);

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="calc()">${t('calculate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="copyText($('#resultBig').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#logval').value='';calc()">${t('clear')}</button>`;

$('#lbl-val').textContent=t('lblVal');
$('#lbl-base').textContent=t('lblBase');

GZ.renderToolPage({
  category:'calc',
  titleKey:'toolTitle',
  descKey:'toolDesc',
  howToSteps:['step1','step2','step3','step4'],
  related:[
    {icon:'log',href:'/calc/logarithm-calculator.html',name:'Logarithm Calculator'},
    {icon:'^',href:'/calc/exponent-calculator.html',name:'Exponent Calculator'},
    {icon:'ⁿ√',href:'/calc/cube-root-calculator.html',name:'Root Calculator'},
    {icon:'🧮',href:'/calc/scientific-calculator.html',name:'Scientific Calculator'},
  ]
});
calc();
</script>
<script src="/tools-result-rec.js?v=20260707v520" defer></script>
</body>
</html>
