<script type="application/ld+json">{"@context":"https://schema.org","@type":"WebApplication","name":"Macro Calculator","description":"Calculate your daily macros (protein, carbs, fat, calories, fiber) based on TDEE and your fitness goal: cut, maintain or bulk. Free online macro calculator with metric and imperial units.","url": "https://tools.gamezipper.com/zh/calc/macro-calculator.html","applicationCategory":"Utility","operatingSystem":"Web Browser","offers":{"@type":"Offer","price":"0"}}</script>
<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What are macros?", "acceptedAnswer": {"@type": "Answer", "text": "Macros, short for macronutrients, are the three main nutrient groups your body needs in large amounts: protein (4 cal/g), carbohydrates (4 cal/g) and fat (9 cal/g). Tracking macros is a flexible approach to dieting that focuses on the proportion of each nutrient rather than just calories."}}, {"@type": "Question", "name": "How are macro targets calculated?", "acceptedAnswer": {"@type": "Answer", "text": "First we calculate your TDEE (Total Daily Energy Expenditure) using the Mifflin-St Jeor BMR formula multiplied by an activity factor. Then we adjust calories for your goal: -20% for cutting, 0% for maintenance, +15% for bulking. Macros are split based on your chosen ratio: high-protein, balanced, low-carb or ketogenic."}}, {"@type": "Question", "name": "What is the best macro split for weight loss?", "acceptedAnswer": {"@type": "Answer", "text": "For most people, a high-protein (40% protein, 30% carbs, 30% fat) approach is most effective for fat loss because protein is satiating and preserves muscle. Low-carb and keto can work too but are harder to maintain. The right split depends on your activity level and personal preference."}}, {"@type": "Question", "name": "Should I track fiber?", "acceptedAnswer": {"@type": "Answer", "text": "Fiber is part of total carbohydrates. The recommended intake is 25-38g per day for adults. We automatically calculate a fiber target of 14g per 1000 kcal consumed, which aligns with most dietary guidelines."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area mc-wrap">
    <div class="mc-card">
      <div class="mc-row">
        <div class="mc-field">
          <label id="lbl-sex">Sex</label>
          <select id="sex">
            <option value="male">♂ Male</option>
            <option value="female">♀ Female</option>
          </select>
        </div>
        <div class="mc-field" id="ageField">
          <label id="lbl-age">Age</label>
          <input type="number" id="age" min="14" max="100" value="30">
        </div>
        <div class="mc-field" id="hCmField">
          <label id="lbl-hcm">Height (cm)</label>
          <input type="number" id="hCm" min="100" max="250" value="175">
        </div>
        <div class="mc-field" id="hFtField" style="display:none">
          <label id="lbl-hft">Height (ft)</label>
          <input type="number" id="hFt" min="3" max="8" value="5">
        </div>
        <div class="mc-field" id="hInField" style="display:none">
          <label id="lbl-hin">Height (in)</label>
          <input type="number" id="hIn" min="0" max="11" value="9">
        </div>
        <div class="mc-field" id="wKgField">
          <label id="lbl-wkg">Weight (kg)</label>
          <input type="number" id="wKg" min="30" max="300" step="0.1" value="75">
        </div>
        <div class="mc-field" id="wLbField" style="display:none">
          <label id="lbl-wlb">Weight (lb)</label>
          <input type="number" id="wLb" min="60" max="660" step="0.1" value="165">
        </div>
        <div class="mc-field">
          <label id="lbl-unit">Units</label>
          <select id="unit" onchange="toggleUnits()">
            <option value="metric">Metric</option>
            <option value="imperial">Imperial</option>
          </select>
        </div>
        <div class="mc-field">
          <label id="lbl-activity">Activity</label>
          <select id="activity">
            <option value="1.2">Sedentary</option>
            <option value="1.375">Light (1-3x/wk)</option>
            <option value="1.55" selected>Moderate (3-5x/wk)</option>
            <option value="1.725">Active (6-7x/wk)</option>
            <option value="1.9">Very Active (2x/day)</option>
          </select>
        </div>
        <div class="mc-field">
          <label id="lbl-goal">Goal</label>
          <select id="goal">
            <option value="cut">Cut (-20%)</option>
            <option value="maintain" selected>Maintain</option>
            <option value="bulk">Bulk (+15%)</option>
          </select>
        </div>
      </div>
      <div style="margin-top:12px">
        <label id="lbl-ratio" style="font-size:.78em;color:var(--gz-text2);font-weight:600;text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:6px">Macro Split</label>
        <div class="mc-ratio" id="ratioButtons">
          <button data-p="40" data-c="30" data-f="30">High Protein 40/30/30</button>
          <button data-p="30" data-c="40" data-f="30" class="active">Balanced 30/40/30</button>
          <button data-p="30" data-c="20" data-f="50">Low Carb 30/20/50</button>
          <button data-p="25" data-c="5" data-f="70">Keto 25/5/70</button>
          <button data-p="35" data-c="35" data-f="30">Zone 35/35/30</button>
        </div>
      </div>
    </div>
    <div class="mc-main">
      <div class="lbl" id="goalLbl">Daily Calories</div>
      <div class="big" id="kcal">—</div>
      <div class="mc-bar" id="bar"></div>
      <div class="mc-legend" id="legend"></div>
    </div>
    <div class="mc-grid" id="results"></div>
    <div class="mc-card">
      <div class="mc-info" id="info"></div>
    </div>
    <div class="gz-toolbar" id="toolbar"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Macro Calculator',
    toolDesc: 'Calculate your daily protein, carbs, fat, fiber and calories based on TDEE, your goal and a customizable macro split. 5 preset splits: high-protein, balanced, low-carb, keto, zone.',
    sex: 'Sex', male: '♂ Male', female: '♀ Female',
    age: 'Age', hcm: 'Height (cm)', hft: 'Height (ft)', hin: 'Height (in)',
    wkg: 'Weight (kg)', wlb: 'Weight (lb)',
    units: 'Units', metric: 'Metric', imperial: 'Imperial',
    activity: 'Activity Level',
    goal: 'Goal', ratio: 'Macro Split',
    dailyCal: 'Daily Calories',
    bmr: 'BMR (Mifflin-St Jeor)',
    tdee: 'TDEE',
    protein: 'Protein',
    carbs: 'Carbs',
    fat: 'Fat',
    fiber: 'Fiber',
    pct: '% of calories',
    step1: 'Enter your sex, age, height, weight and activity level',
    step2: 'Choose a goal: cut, maintain or bulk',
    step3: 'Pick a macro split: high-protein, balanced, low-carb, keto or zone',
    step4: 'Read your daily calorie, protein, carb, fat and fiber targets',
  },
  zh: {
    toolTitle: '宏量营养素计算器',
    toolDesc: '根据 TDEE、健身目标和宏量营养素比例，计算每日蛋白质、碳水、脂肪、纤维和热量。5 种预设：高蛋白、均衡、低碳、生酮、Zone。',
    sex: '性别', male: '♂ 男', female: '♀ 女',
    age: '年龄', hcm: '身高（厘米）', hft: '身高（英尺）', hin: '身高（英寸）',
    wkg: '体重（公斤）', wlb: '体重（磅）',
    units: '单位', metric: '公制', imperial: '英制',
    activity: '活动水平',
    goal: '目标', ratio: '宏量比例',
    dailyCal: '每日热量',
    bmr: '基础代谢率（BMR）',
    tdee: '每日总消耗（TDEE）',
    protein: '蛋白质',
    carbs: '碳水',
    fat: '脂肪',
    fiber: '纤维',
    pct: '热量占比',
    step1: '输入性别、年龄、身高、体重和活动水平',
    step2: '选择目标：减脂、保持或增肌',
    step3: '选择宏量比例：高蛋白、均衡、低碳、生酮或 Zone',
    step4: '查看每日热量、蛋白质、碳水、脂肪和纤维目标',
  }
});

const { $, t } = GZ;
let isMetric = true;
let ratio = { p: 30, c: 40, f: 30 };

function toggleUnits() {
  isMetric = $('#unit').value === 'metric';
  $('#hCmField').style.display = isMetric ? '' : 'none';
  $('#hFtField').style.display = isMetric ? 'none' : '';
  $('#hInField').style.display = isMetric ? 'none' : '';
  $('#wKgField').style.display = isMetric ? '' : 'none';
  $('#wLbField').style.display = isMetric ? 'none' : '';
  calc();
}

function getHeightCm() {
  if (isMetric) return parseFloat($('#hCm').value);
  const ft = parseFloat($('#hFt').value) || 0;
  const inc = parseFloat($('#hIn').value) || 0;
  return (ft * 12 + inc) * 2.54;
}
function getWeightKg() {
  if (isMetric) return parseFloat($('#wKg').value);
  return (parseFloat($('#wLb').value) || 0) / 2.20462;
}

function calc() {
  const sex = $('#sex').value;
  const age = parseFloat($('#age').value);
  const h = getHeightCm();
  const w = getWeightKg();
  const a = parseFloat($('#activity').value);
  const goal = $('#goal').value;
  if (!age || !h || !w) return;

  // Mifflin-St Jeor BMR
  const bmr = sex === 'male'
    ? 10 * w + 6.25 * h - 5 * age + 5
    : 10 * w + 6.25 * h - 5 * age - 161;
  const tdee = bmr * a;
  const adj = goal === 'cut' ? 0.8 : goal === 'bulk' ? 1.15 : 1.0;
  const kcal = Math.round(tdee * adj);

  // Macros in grams
  const pG = Math.round((kcal * ratio.p / 100) / 4);
  const cG = Math.round((kcal * ratio.c / 100) / 4);
  const fG = Math.round((kcal * ratio.f / 100) / 9);
  const fiberG = Math.round(kcal / 1000 * 14);

  $('#kcal').textContent = kcal + ' kcal';
  $('#bar').innerHTML = `
    <div style="width:${ratio.p}%;background:#e94560">${ratio.p}%</div>
    <div style="width:${ratio.c}%;background:#4ecdc4">${ratio.c}%</div>
    <div style="width:${ratio.f}%;background:#ffd93d;color:#1a1a2e">${ratio.f}%</div>
  `;
  $('#legend').innerHTML = `
    <div class="item"><div class="dot" style="background:#e94560"></div>${t('protein')} ${ratio.p}%</div>
    <div class="item"><div class="dot" style="background:#4ecdc4"></div>${t('carbs')} ${ratio.c}%</div>
    <div class="item"><div class="dot" style="background:#ffd93d"></div>${t('fat')} ${ratio.f}%</div>
  `;
  $('#results').innerHTML = `
    <div class="mc-box"><div class="name">${t('protein')}</div><div class="val">${pG}<span class="unit">grams/day</span></div></div>
    <div class="mc-box"><div class="name">${t('carbs')}</div><div class="val">${cG}<span class="unit">grams/day</span></div></div>
    <div class="mc-box"><div class="name">${t('fat')}</div><div class="val">${fG}<span class="unit">grams/day</span></div></div>
    <div class="mc-box"><div class="name">${t('fiber')}</div><div class="val">${fiberG}<span class="unit">grams/day</span></div></div>
    <div class="mc-box"><div class="name">${t('bmr')}</div><div class="val">${Math.round(bmr)}<span class="unit">kcal</span></div></div>
    <div class="mc-box"><div class="name">${t('tdee')}</div><div class="val">${Math.round(tdee)}<span class="unit">kcal</span></div></div>
  `;
  $('#info').innerHTML = `
    <strong>${t('bmr')}:</strong> ${Math.round(bmr)} kcal &nbsp;•&nbsp;
    <strong>${t('tdee')}:</strong> ${Math.round(tdee)} kcal &nbsp;•&nbsp;
    <strong>${t('dailyCal')}:</strong> ${kcal} kcal
  `;
}

// Wire ratio buttons
document.querySelectorAll('#ratioButtons button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('#ratioButtons button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    ratio = { p: +btn.dataset.p, c: +btn.dataset.c, f: +btn.dataset.f };
    calc();
  });
});

['sex', 'age', 'hCm', 'hFt', 'hIn', 'wKg', 'wLb', 'activity', 'goal'].forEach(id => {
  const el = $('#' + id);
  if (el) el.addEventListener('input', calc);
  if (el && el.tagName === 'SELECT') el.addEventListener('change', calc);
});

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="calc()">${t('calculate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="toggleUnits()">${t('units')}</button>`;

calc();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🍳', href:'/calc/tdee-calculator.html', name:'TDEE'},
    {icon:'⚖️', href:'/calc/bmi-calculator.html', name:'BMI'},
    {icon:'🔥', href:'/calc/body-fat.html', name:'Body Fat'},
    {icon:'💪', href:'/calc/one-rep-max.html', name:'1RM'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
