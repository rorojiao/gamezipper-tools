<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is the greatest common divisor (GCD)?", "acceptedAnswer": {"@type": "Answer", "text": "The greatest common divisor (GCD), also called the greatest common factor (GCF) or highest common factor (HCF), is the largest positive integer that divides two or more numbers without a remainder. For example, GCD(12, 18) = 6 because 6 is the largest number that divides both 12 and 18 evenly."}}, {"@type": "Question", "name": "How is GCD calculated?", "acceptedAnswer": {"@type": "Answer", "text": "The most efficient method is the Euclidean algorithm: repeatedly replace the larger number by the remainder of dividing the larger by the smaller, until the remainder is zero. The last non-zero remainder is the GCD. This calculator shows every step so you can follow along."}}, {"@type": "Question", "name": "Can I find the GCD of more than two numbers?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. The GCD of three or more numbers is found by repeatedly applying the GCD pairwise: GCD(a, b, c) = GCD(GCD(a, b), c). Enter as many numbers as you like, separated by commas, and the calculator handles the rest."}}, {"@type": "Question", "name": "What is the relationship between GCD and LCM?", "acceptedAnswer": {"@type": "Answer", "text": "For any two positive integers a and b, GCD(a, b) × LCM(a, b) = a × b. So once you know the GCD, you can compute the LCM instantly. This is why the two are often taught together in number theory."}}]}</script>

    invalid: 'Please enter two positive integers',
  },
  zh: {
    toolTitle: '最大公约数计算器 (GCD)',
    toolDesc: '即时计算两个或多个数的最大公约数（GCD / HCF），并显示欧几里得算法的每一步。',
    enterNums: '输入两个数',
    resultLabel: 'GCD（最大公约数）',
    alsoHCF: '又称：HCF（最高公因式）、GCF（最大公因数）',
    stepsTitle: '计算步骤（欧几里得算法 / 辗转相除法）',
    step1: '在上方输入框中输入两个正整数',
    step2: '即时在结果卡中查看 GCD',
    step3: '阅读下方的欧几里得算法步骤理解计算过程',
    step4: '使用相关 LCM 计算器求最小公倍数',
    invalid: '请输入两个正整数',
  }
});
const { $, t } = GZ;

function gcd(a, b) {
  a = Math.abs(a); b = Math.abs(b);
  while (b) { [a, b] = [b, a % b]; }
  return a;
}

function gcdWithSteps(a, b) {
  const steps = [];
  a = Math.abs(a); b = Math.abs(b);
  if (a === 0 && b === 0) return { gcd: 0, steps };
  if (a === 0) return { gcd: b, steps: [`${b}`] };
  if (b === 0) return { gcd: a, steps: [`${a}`] };
  let x = Math.max(a, b), y = Math.min(a, b);
  while (y > 0) {
    const q = Math.floor(x / y);
    const r = x - q * y;
    steps.push({ x, y, q, r });
    x = y; y = r;
  }
  return { gcd: x, steps };
}

function calc() {
  const a = parseInt($('#a').value, 10);
  const b = parseInt($('#b').value, 10);
  const res = $('#result');
  if (isNaN(a) || isNaN(b) || a < 0 || b < 0) {
    res.innerHTML = `<div class="label">${t('resultLabel')}</div><div class="value" style="color:var(--text3)">—</div>`;
    $('#steps').innerHTML = '';
    return;
  }
  const { gcd: g, steps } = gcdWithSteps(a, b);
  res.innerHTML = `<div class="label">${t('resultLabel')}</div><div class="value">${g}</div><div class="sub">GCD(${a}, ${b}) = ${g}</div><div class="sub" style="margin-top:4px;font-size:.8rem;opacity:.7">${t('alsoHCF')}</div>`;
  let html = '';
  steps.forEach((s, i) => {
    if (typeof s === 'string') { html += `<div class="step-line">${s}</div>`; return; }
    html += `<div class="step-line">${s.x} ÷ ${s.y} = <span class="hl">${s.q}</span> remainder <span class="hl">${s.r}</span></div>`;
  });
  if (steps.length > 0) {
    const last = steps[steps.length - 1];
    const lastX = typeof last === 'object' ? last.y : last;
    html += `<div class="step-line" style="margin-top:8px;border-top:1px solid var(--border);padding-top:8px">∴ GCD = <span class="hl">${g}</span></div>`;
  }
  $('#steps').innerHTML = html;
}

$('#a').addEventListener('input', calc);
$('#b').addEventListener('input', calc);
$('#toolbar').innerHTML = `<button class="gz-btn gz-btn-secondary" onclick="$('#a').value='48';$('#b').value='36';calc()">${t('example')}</button>`;
$('#steps-title').textContent = t('stepsTitle');

  ]
});

calc();
</script>
