<script type="application/ld+json">{"@context":"https://schema.org","@type":"WebApplication","name":"Break Even Calculator","description":"Calculate break-even point, contribution margin, margin of safety and target profit. Free, browser-only.","url":"https://tools.gamezipper.com/calc/break-even-calculator.html","applicationCategory":"Utility","operatingSystem":"Web Browser","offers":{"@type":"Offer","price":"0"}}</script>
<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is a break-even point?", "acceptedAnswer": {"@type": "Answer", "text": "The break-even point is the number of units you must sell (or revenue you must generate) for total revenue to equal total costs — resulting in zero profit and zero loss. Below it, you lose money; above it, you make a profit. It's calculated as Fixed Costs ÷ (Price per unit − Variable cost per unit). The denominator is called the contribution margin per unit."}}, {"@type": "Question", "name": "What is contribution margin?", "acceptedAnswer": {"@type": "Answer", "text": "Contribution margin per unit = Selling price − Variable cost per unit. It measures how much each unit sold contributes to covering fixed costs. The contribution margin ratio (CM%) = Contribution margin ÷ Selling price, and represents what fraction of each sales dollar is available for fixed costs and profit."}}, {"@type": "Question", "name": "What is margin of safety?", "acceptedAnswer": {"@type": "Answer", "text": "Margin of safety = (Expected or actual sales − Break-even sales) ÷ Expected or actual sales, expressed as a percentage. It tells you how much sales can drop before you start losing money. A margin of safety of 20% means sales can fall 20% before hitting break-even."}}, {"@type": "Question", "name": "Can I calculate target profit too?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. Switch the calculator to 'Target Profit' mode and enter the profit you want to make. The tool will compute how many units you need to sell (and the revenue required) to hit that profit after covering all costs."}}]}</script>

<script>
GZI18n.register({
  en: {
    toolTitle: 'Break Even Calculator',
    toolDesc: 'Find the break-even point for your product or business. Enter fixed costs, variable cost, and selling price to get break-even units, revenue, contribution margin, and margin of safety.',
    lblFixed: 'Fixed Costs (per period)',
    lblVariable: 'Variable Cost (per unit)',
    lblPrice: 'Selling Price (per unit)',
    lblExtras: 'Target Profit (or Expected Units)',
    tileUnits: 'Break-even Units',
    tileRevenue: 'Break-even Revenue',
    tileCM: 'Contribution Margin',
    tileCMR: 'CM Ratio',
    tileMOS: 'Margin of Safety',
    tileTarget: 'Units to Hit Target',
    tileRevenueTarget: 'Revenue to Hit Target',
    tip: 'A higher contribution margin (price − variable cost) means you reach break-even faster. Aim for at least a 30-40% CM ratio for a healthy business.',
    step1: 'Choose a mode: Break-Even, Target Profit, or Margin of Safety',
    step2: 'Enter your fixed costs (rent, salaries, insurance), variable cost per unit (materials, shipping), and selling price per unit',
    step3: 'Optionally enter a target profit (or expected units for margin of safety)',
    step4: 'Read the results: break-even units, revenue, contribution margin, and an amortization table showing the path to profit',
  },
  zh: {
    toolTitle: '盈亏平衡计算器',
    toolDesc: '计算产品或业务的盈亏平衡点。输入固定成本、单位变动成本和售价，即时获得盈亏平衡销量、收入、贡献毛利和安全边际。',
    lblFixed: '固定成本（每周期）',
    lblVariable: '单位变动成本',
    lblPrice: '单位售价',
    lblExtras: '目标利润（或预期销量）',
    tileUnits: '盈亏平衡销量',
    tileRevenue: '盈亏平衡收入',
    tileCM: '单位贡献毛利',
    tileCMR: '贡献毛利率',
    tileMOS: '安全边际',
    tileTarget: '达成目标销量',
    tileRevenueTarget: '达成目标收入',
    tip: '贡献毛利（售价 − 单位变动成本）越高，达到盈亏平衡越快。建议贡献毛利率保持在 30-40% 以上。',
    step1: '选择模式：盈亏平衡、目标利润或安全边际',
    step2: '输入固定成本（房租、工资、保险）、单位变动成本（材料、运输）和单位售价',
    step3: '可选输入目标利润（或安全边际的预期销量）',
    step4: '查看结果：盈亏平衡销量、收入、贡献毛利，以及分步利润表',
  }
});

const { $ } = GZ;
let currentMode = 'break';

function setMode(m) {
  currentMode = m;
  document.querySelectorAll('.be-mode button').forEach(b => b.classList.toggle('active', b.dataset.m === m));
  $('#wrap-extras').style.display = (m === 'break') ? 'none' : '';
  const lblExtras = $('#lbl-extras');
  if (m === 'target') lblExtras.textContent = GZI18n.getLang()==='zh' ? '目标利润金额' : 'Target Profit ($)';
  else if (m === 'safety') lblExtras.textContent = GZI18n.getLang()==='zh' ? '预期月销量（单位）' : 'Expected Units (per period)';
  compute();
}

function compute() {
  const fixed = parseFloat($('#fixed').value) || 0;
  const vc = parseFloat($('#variable').value) || 0;
  const price = parseFloat($('#price').value) || 0;
  const extras = parseFloat($('#extras').value) || 0;

  const cm = price - vc;
  const cmr = price > 0 ? cm / price : 0;
  const beUnits = cm > 0 ? fixed / cm : Infinity;
  const beRev = cmr > 0 ? fixed / cmr : Infinity;

  let tiles = [];
  tiles.push({primary: true, val: isFinite(beUnits) ? beUnits.toFixed(1) : '∞', lbl: GZI18n.t('tileUnits')});
  tiles.push({primary: false, val: isFinite(beRev) ? '$' + beRev.toFixed(0) : '∞', lbl: GZI18n.t('tileRevenue')});
  tiles.push({primary: false, val: '$' + cm.toFixed(2) + ' <span class="small">/unit</span>', lbl: GZI18n.t('tileCM')});
  tiles.push({primary: false, val: (cmr*100).toFixed(1) + '%', lbl: GZI18n.t('tileCMR')});

  let tableHtml = '';
  if (currentMode === 'target') {
    const targetUnits = cm > 0 ? (fixed + extras) / cm : Infinity;
    const targetRev = cmr > 0 ? (fixed + extras) / cmr : Infinity;
    tiles.push({primary: true, val: isFinite(targetUnits) ? targetUnits.toFixed(1) : '∞', lbl: GZI18n.t('tileTarget')});
    tiles.push({primary: false, val: isFinite(targetRev) ? '$' + targetRev.toFixed(0) : '∞', lbl: GZI18n.t('tileRevenueTarget')});
  } else if (currentMode === 'safety') {
    const expectedRev = extras * price;
    const mos = expectedRev > 0 ? ((expectedRev - beRev) / expectedRev) * 100 : NaN;
    tiles.push({primary: true, val: isFinite(mos) ? mos.toFixed(1) + '%' : '—', lbl: GZI18n.t('tileMOS')});
  }

  const html = tiles.map(x => `<div class="be-tile ${x.primary?'primary':''}"><div class="num">${x.val}</div><div class="lbl">${x.lbl}</div></div>`).join('');
  $('#tiles').innerHTML = html;

  // Build amortization table
  const step = Math.max(1, Math.ceil((isFinite(beUnits) ? beUnits : 100) / 12));
  let rows = [];
  for (let u = 0; u <= (isFinite(beUnits) ? Math.ceil(beUnits*1.5) : 200); u += step) {
    const rev = u * price;
    const varCost = u * vc;
    const totCost = fixed + varCost;
    const profit = rev - totCost;
    rows.push({u, rev, varCost, totCost, profit});
    if (rows.length > 24) break;
  }
  // Find break-even row
  let beRow = rows.findIndex(r => r.profit >= 0);

  tableHtml = '<table class="be-table"><thead><tr><th>Units</th><th>Revenue</th><th>Variable</th><th>Fixed</th><th>Total Cost</th><th>Profit</th></tr></thead><tbody>';
  rows.forEach((r, i) => {
    const cls = (i === beRow) ? ' class="be-break"' : '';
    tableHtml += `<tr${cls}><td>${r.u}</td><td>$${r.rev.toFixed(0)}</td><td>$${r.varCost.toFixed(0)}</td><td>$${fixed.toFixed(0)}</td><td>$${r.totCost.toFixed(0)}</td><td style="color:${r.profit>=0?'#00d672':'#ff6b6b'}">$${r.profit.toFixed(0)}</td></tr>`;
  });
  tableHtml += '</tbody></table>';
  $('#tableWrap').innerHTML = tableHtml;

  // Chart
  drawChart(rows, fixed);

  $('#tip').textContent = GZI18n.t('tip');
}

function drawChart(rows, fixed) {
  const c = $('#chart');
  c.innerHTML = '';
  const w = c.clientWidth - 20, h = 220;
  const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  svg.setAttribute('width', w); svg.setAttribute('height', h); svg.setAttribute('viewBox', `0 0 ${w} ${h}`);
  const maxU = rows.length ? rows[rows.length-1].u : 100;
  const maxV = rows.length ? Math.max(rows[rows.length-1].rev, rows[rows.length-1].totCost, 1) : 100;
  const x = u => 30 + (u / maxU) * (w - 50);
  const y = v => h - 20 - (v / maxV) * (h - 40);

  // axes
  const axis = (x1,y1,x2,y2) => {
    const l = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    l.setAttribute('x1',x1); l.setAttribute('y1',y1); l.setAttribute('x2',x2); l.setAttribute('y2',y2);
    l.setAttribute('stroke','#888'); l.setAttribute('stroke-width','1'); svg.appendChild(l);
  };
  axis(30, h-20, w-10, h-20);
  axis(30, 20, 30, h-20);

  // Revenue line
  const revPath = rows.map((r,i) => `${i?'L':'M'}${x(r.u)},${y(r.rev)}`).join(' ');
  const costPath = rows.map((r,i) => `${i?'L':'M'}${x(r.u)},${y(r.totCost)}`).join(' ');

  const mkPath = (d, color, fill) => {
    const p = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    p.setAttribute('d', d); p.setAttribute('stroke', color); p.setAttribute('stroke-width','2.5'); p.setAttribute('fill','none');
    svg.appendChild(p);
  };
  mkPath(revPath, '#00d672');
  mkPath(costPath, '#ff6b6b');

  // Find intersection
  for (let i = 1; i < rows.length; i++) {
    if (rows[i].profit >= 0 && rows[i-1].profit < 0) {
      const beU = rows[i-1].u + (0 - rows[i-1].profit) / (rows[i].profit - rows[i-1].profit) * (rows[i].u - rows[i-1].u);
      const beV = beU * parseFloat($('#price').value);
      const c1 = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      c1.setAttribute('cx', x(beU)); c1.setAttribute('cy', y(beV)); c1.setAttribute('r', '5');
      c1.setAttribute('fill', '#ffd93d'); svg.appendChild(c1);
      const t1 = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      t1.setAttribute('x', x(beU)+8); t1.setAttribute('y', y(beV)-8);
      t1.setAttribute('fill', '#ffd93d'); t1.setAttribute('font-size','11'); t1.setAttribute('font-weight','700');
      t1.textContent = 'BE'; svg.appendChild(t1);
      break;
    }
  }

  // Legend
  const legend = (txt, color, ypos) => {
    const tx = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    tx.setAttribute('x', 40); tx.setAttribute('y', ypos);
    tx.setAttribute('fill', color); tx.setAttribute('font-size','11'); tx.setAttribute('font-weight','700');
    tx.textContent = txt; svg.appendChild(tx);
  };
  legend('─ Revenue', '#00d672', 30);
  legend('─ Total Cost', '#ff6b6b', 48);

  // X label
  const xLabel = document.createElementNS('http://www.w3.org/2000/svg', 'text');
  xLabel.setAttribute('x', w/2 - 20); xLabel.setAttribute('y', h-4);
  xLabel.setAttribute('fill', '#888'); xLabel.setAttribute('font-size','10');
  xLabel.textContent = 'Units sold'; svg.appendChild(xLabel);

  c.appendChild(svg);
}

['#fixed','#variable','#price','#extras'].forEach(sel => $(sel).addEventListener('input', compute));

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'💰', href:'/calc/profit-margin.html', name:'Profit Margin'},
    {icon:'📈', href:'/calc/roi.html', name:'ROI Calculator'},
    {icon:'💵', href:'/calc/sales-tax-calculator.html', name:'Sales Tax'},
    {icon:'💸', href:'/calc/discount-calculator.html', name:'Discount Calculator'},
  ]
});
compute();
</script>
<script src="/tools-result-rec.js" defer></script>
