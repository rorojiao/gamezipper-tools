<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is an essay outline?", "acceptedAnswer": {"@type": "Answer", "text": "An essay outline is a structured plan that lists your introduction, body paragraphs and conclusion before you start writing. It shows the main idea (thesis), the supporting points for each paragraph, and the evidence you will use — so the actual writing becomes much faster and more organized."}}, {"@type": "Question", "name": "Which essay types does this generator support?", "acceptedAnswer": {"@type": "Answer", "text": "It supports four common structures: the classic 5-paragraph essay, an argumentative outline (claim + 3 reasons + counterargument), a compare & contrast outline (block or point-by-point), and a narrative outline (setup, conflict, climax, resolution). Pick the one your assignment asks for."}}, {"@type": "Question", "name": "Will this write the essay for me?", "acceptedAnswer": {"@type": "Answer", "text": "No. This tool produces a skeleton outline with placeholder prompts for each section. You fill in your specific evidence, quotes and analysis. It is a planning aid, not an essay-writing service — using it keeps your work original and academic-integrity safe."}}, {"@type": "Question", "name": "How do I use the outline in Word or Google Docs?", "acceptedAnswer": {"@type": "Answer", "text": "Click Copy, then paste the outline into a new Word or Google Docs document. The outline uses plain text with indentation, so it pastes cleanly. You can then expand each bullet into full paragraphs, or keep it as a side reference while you draft."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="form-grid">
      <div class="full">
        <label id="lbl-topic"></label>
        <input type="text" id="topic" placeholder="e.g. Should social media be regulated?">
      </div>

        <label id="lbl-type"></label>
        <select id="type">
          <option value="five">5-Paragraph Essay</option>
          <option value="argumentative">Argumentative</option>
          <option value="compare">Compare & Contrast</option>

        </select>
      </div>
      <div>
        <label id="lbl-paragraphs"></label>
        <select id="paragraphs">
          <option value="3">3 body paragraphs</option>
          <option value="4">4 body paragraphs</option>
          <option value="5">5 body paragraphs</option>
        </select>
      </div>
      <div class="full">
        <label id="lbl-thesis"></label>
        <textarea id="thesis" rows="2" placeholder="Your main argument / thesis statement (optional — leave blank to get a prompt)"></textarea>
      </div>
    </div>

  </div>

</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Essay Outline Generator',
    toolDesc: 'Build a structured essay outline from your topic and thesis. Supports 5-paragraph, argumentative, compare-contrast and narrative essays. Free, private, in-browser.',
    lblTopic: 'Essay Topic',
    lblType: 'Essay Type',
    lblParagraphs: 'Body Paragraphs',
    lblThesis: 'Thesis Statement (optional)',
    lblOutput: 'Your Essay Outline',
    step1: 'Enter your essay topic',
    step2: 'Choose the essay type and number of body paragraphs',
    step3: 'Optionally add your thesis statement',
    step4: 'Copy the outline into Word or Google Docs and start writing',
  },
  zh: {
    toolTitle: '论文大纲生成器',
    toolDesc: '根据你的题目和论点生成结构化论文大纲。支持五段式、议论文、对比分析和叙事文。免费、私密、浏览器本地运行。',
    lblTopic: '论文题目',
    lblType: '论文类型',
    lblParagraphs: '正文体段数',
    lblThesis: '论点 / 中心句（可选）',
    lblOutput: '你的论文大纲',
    step1: '输入你的论文题目',
    step2: '选择论文类型和正文体段数量',
    step3: '可选填写你的论点 / 中心句',
    step4: '将大纲复制到 Word 或 Google Docs 开始写作',
  }
});

const { $, copyText, t } = GZ;

const HOOKS = ['A surprising statistic', 'A relevant quote', 'A rhetorical question', 'A brief anecdote', 'A historical fact', 'A vivid description'];
const TRANSITIONS = ['Furthermore', 'In addition', 'Moreover', 'On the other hand', 'However', 'Similarly', 'As a result', 'Consequently', 'By contrast'];

function pick(arr, i){ return arr[i % arr.length]; }

function esc(s){ return (s || '').replace(/</g,'&lt;').replace(/\n/g,'<br>'); }

function buildOutline(){
  const topic = $('#topic').value.trim() || 'your topic';
  const type = $('#type').value;
  const n = parseInt($('#paragraphs').value);
  let thesis = $('#thesis').value.trim();
  if (!thesis) {
    const tmap = {
      five: `Write a clear thesis statement that states your position on: ${topic}.`,
      argumentative: `Write a strong claim about ${topic} that you will defend with evidence.`,
      compare: `Write a thesis that states the main similarity or difference you will argue about ${topic}.`,
      narrative: `Write a one-sentence theme or lesson the reader should take away from your story about ${topic}.`,
    };
    thesis = tmap[type];
  }

  let out = '';
  const T = '<span class="section-tag">';
  const TC = '</span>';

  if (type === 'five') {
    out += `${T}I. INTRODUCTION${TC}\n`;
    out += `   • Hook: ${pick(HOOKS, 0)} about ${topic}\n`;
    out += `   • Background: briefly introduce ${topic}\n`;
    out += `   • ${T}Thesis:${TC} ${esc(thesis)}\n\n`;
    for (let i = 1; i <= n; i++) {
      out += `${T}II. BODY PARAGRAPH ${i}${TC} — Point ${i}\n`;
      out += `   • Topic sentence: state your point #${i}\n`;
      out += `   • Evidence: [insert quote, stat, or example]\n`;
      out += `   • Analysis: explain how the evidence supports your thesis\n`;
      out += `   • Transition: ${pick(TRANSITIONS, i)}...\n\n`;
    }
    out += `${T}III. CONCLUSION${TC}\n`;
    out += `   • Restate thesis (in different words)\n`;
    out += `   • Summarize your ${n} main points\n`;
    out += `   • Final thought: call to action, prediction, or broader implication\n`;
  } else if (type === 'argumentative') {
    out += `${T}I. INTRODUCTION${TC}\n`;
    out += `   • Hook: ${pick(HOOKS, 1)} on ${topic}\n`;
    out += `   • Background: why ${topic} matters now\n`;
    out += `   • ${T}Claim:${TC} ${esc(thesis)}\n\n`;
    out += `${T}II. REASON 1${TC} (strongest)\n`;
    out += `   • Claim: state reason #1\n   • Evidence: [data / source]\n   • Warrant: connect evidence to claim\n\n`;
    out += `${T}III. REASON 2${TC}\n`;
    out += `   • Claim: state reason #2\n   • Evidence: [data / source]\n   • Warrant: connect evidence to claim\n\n`;
    out += `${T}IV. COUNTERARGUMENT & REBUTTAL${TC}\n`;
    out += `   • Opposing view: "Some argue that..."\n   • Rebuttal: why the opposing view is weaker or incomplete\n\n`;
    if (n >= 4) {
      out += `${T}V. REASON 3${TC}\n`;
      out += `   • Claim: state reason #3\n   • Evidence: [data / source]\n   • Warrant: connect evidence to claim\n\n`;
    }
    out += `${T}VI. CONCLUSION${TC}\n`;
    out += `   • Restate claim\n   • Synthesize reasons\n   • Call to action or implication\n`;
  } else if (type === 'compare') {
    out += `${T}I. INTRODUCTION${TC}\n`;
    out += `   • Introduce the two subjects being compared\n`;
    out += `   • ${T}Thesis:${TC} ${esc(thesis)}\n\n`;
    out += `${T}II. POINT-BY-POINT COMPARISON${TC}\n`;
    const points = ['Point of comparison #1', 'Point of comparison #2', 'Point of comparison #3'];
    for (let i = 0; i < n; i++) {
      out += `   ${String.fromCharCode(65 + i)}. ${points[i] || 'Point of comparison #' + (i + 1)}\n`;
      out += `      • Subject A: [how it compares]\n`;
      out += `      • Subject B: [how it compares]\n`;
      out += `      • Insight: what this similarity/difference reveals\n\n`;
    }
    out += `${T}III. CONCLUSION${TC}\n`;
    out += `   • Restate thesis\n   • Summarize key similarities and differences\n   • Final insight: so what?\n`;
  } else if (type === 'narrative') {
    out += `${T}I. SETUP (Introduction)${TC}\n`;
    out += `   • Setting: when and where\n   • Characters: who is involved\n   • ${T}Theme:${TC} ${esc(thesis)}\n\n`;
    out += `${T}II. INCITING INCIDENT${TC}\n`;
    out += `   • The event that starts the story\n   • How the main character reacts\n\n`;
    out += `${T}III. RISING ACTION${TC}\n`;
    out += `   • Conflict develops\n   • Stakes rise\n   • Sensory details: sights, sounds, feelings\n\n`;
    out += `${T}IV. CLIMAX${TC}\n`;
    out += `   • The turning point / peak tension\n   • The decisive moment\n\n`;
    out += `${T}V. RESOLUTION (Conclusion)${TC}\n`;
    out += `   • What happened after\n   • Reflection: what the narrator learned\n   • Connection back to the theme\n`;
  }

  $('#output').innerHTML = out;
}

['topic','type','paragraphs','thesis'].forEach(id => {
  $('#' + id).addEventListener('input', buildOutline);
  $('#' + id).addEventListener('change', buildOutline);
});

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#topic').value='';$('#thesis').value='';buildOutline()">${t('clear')}</button>`;

buildOutline();

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'✍️', href:'/text/email-writer.html', name:'AI Email Writer'},
    {icon:'📄', href:'/text/cover-letter-generator.html', name:'Cover Letter'},
    {icon:'📚', href:'/text/bibliography-generator.html', name:'Bibliography'},
    {icon:'📝', href:'/text/word-counter.html', name:'Word Counter'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
