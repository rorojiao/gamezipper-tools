<script>
GZI18n.register({
  en: {
    toolTitle: 'Domain Name Generator',
    toolDesc: 'Generate creative domain name ideas from your keywords. Get instant suggestions across multiple TLDs.',
    generate: 'Generate Domains',
    clear: 'Clear',
    keyword: 'Keywords (space separated)',
    keywordPlaceholder: 'e.g. cool app startup',
    style: 'Name Style',
    styleRandom: 'Random Mix',
    stylePrefix: 'Prefix Style',
    styleSuffix: 'Suffix Style',
    styleBlend: 'Word Blend',
    styleShort: 'Short & Catchy',
    extensions: 'Extensions',
    extAll: 'All Popular',
    extComOnly: '.com Only',
    extTech: 'Tech (.io, .dev, .app)',
    copy: 'Copy',
    results: 'domain ideas generated',
    step1: 'Enter 1-3 keywords related to your project or business',
    step2: 'Choose a naming style and preferred extensions',
    step3: 'Click Generate to see creative domain name ideas',
    step4: 'Copy your favorites and check availability at a registrar',
  },
  zh: {
    toolTitle: '域名生成器',
    toolDesc: '根据关键词生成创意域名建议，支持多种后缀和命名风格。',
    generate: '生成域名',
    clear: '清除',
    keyword: '关键词（空格分隔）',
    keywordPlaceholder: '例如：创意 应用 工具',
    style: '命名风格',
    styleRandom: '随机组合',
    stylePrefix: '前缀风格',
    styleSuffix: '后缀风格',
    styleBlend: '词汇融合',
    styleShort: '简短易记',
    extensions: '域名后缀',
    extAll: '所有热门',
    extComOnly: '仅 .com',
    extTech: '技术类 (.io, .dev, .app)',
    copy: '复制',
    results: '个域名建议已生成',
    step1: '输入 1-3 个与项目或业务相关的关键词',
    step2: '选择命名风格和偏好后缀',
    step3: '点击生成查看创意域名建议',
    step4: '复制您喜欢的域名并在注册商处检查可用性',
  }
});

const { $, copyText, t } = GZ;

const prefixes = ['get','my','go','the','try','use','on','hey','we','hi','be','do','so','up','pro','app','hub','lab','zen','fit','top','fly','run','neo','ace','one','all','vox','max','new','eco','fox','mix','vip','wow','tap','wow','ray','sky','ink','ify'];
const suffixes = ['ify','hub','ly','io','lab','box','app','dev','net','pro','zen','tap','go','up','one','base','flow','kit','fly','way','spot','zone','land','stack','wave','sync','link','nest','room','cloud','work','mind','edge','path','forge','spark','shift','space','craft','scope'];
const allTLDs = ['.com','.io','.dev','.app','.co','.net','.org','.ai','.tech','.xyz','.me','.cc'];
const techTLDs = ['.io','.dev','.app','.ai','.tech'];

function generateDomains() {
  const raw = $('#inp-keywords').value.trim().toLowerCase();
  if (!raw) return;
  const words = raw.split(/\s+/).filter(w => w.length > 0);
  const style = $('#inp-style').value;
  const extChoice = $('#inp-ext').value;
  let tlds = allTLDs;
  if (extChoice === 'com') tlds = ['.com'];
  else if (extChoice === 'tech') tlds = techTLDs;

  const domains = new Set();
  const shuffled_pre = [...prefixes].sort(() => Math.random() - 0.5);
  const shuffled_suf = [...suffixes].sort(() => Math.random() - 0.5);
  const shuffled_tlds = [...tlds].sort(() => Math.random() - 0.5);

  for (const word of words) {
    const clean = word.replace(/[^a-z0-9]/g, '');
    if (!clean) continue;

    // Prefix style
    if (style === 'prefix' || style === 'random') {
      for (const p of shuffled_pre.slice(0, 4)) {
        for (const tld of shuffled_tlds.slice(0, 3)) {
          domains.add(p + clean + tld);
        }
      }
    }

    // Suffix style
    if (style === 'suffix' || style === 'random') {
      for (const s of shuffled_suf.slice(0, 4)) {
        for (const tld of shuffled_tlds.slice(0, 3)) {
          domains.add(clean + s + tld);
        }
      }
    }

    // Word blend
    if ((style === 'blend' || style === 'random') && words.length >= 2) {
      for (const w2 of words) {
        const c2 = w2.replace(/[^a-z0-9]/g, '');
        if (c2 && c2 !== clean) {
          for (const tld of shuffled_tlds.slice(0, 2)) {
            domains.add(clean + c2 + tld);
            domains.add(clean + '-' + c2 + tld);
          }
        }
      }
    }

    // Short & catchy
    if (style === 'short' || style === 'random') {
      // Truncate + add short prefix/suffix
      const short = clean.slice(0, Math.min(5, clean.length));
      for (const s of ['r','x','z','go','up','hq','io']) {
        for (const tld of shuffled_tlds.slice(0, 2)) {
          domains.add(short + s + tld);
        }
      }
    }

    // Direct with TLDs
    for (const tld of tlds.slice(0, 4)) {
      domains.add(clean + tld);
    }
  }

  const results = [...domains].slice(0, 48);
  renderDomains(results);
}

function renderDomains(domains) {
  $('#output').innerHTML = `<div style="grid-column:1/-1;font-size:.85rem;color:var(--text3)">${domains.length} ${t('results')}</div>` +
    domains.map(d => `<div class="gz-domain-card">
      <div>
        <div class="gz-domain-name">${d.replace(/(\.[a-z]+)$/, '<span class="gz-domain-ext">$1</span>')}</div>
      </div>
      <div class="gz-domain-actions">
        <button class="gz-btn gz-btn-secondary" style="padding:4px 10px;font-size:.75rem" onclick="copyText('${d}');this.textContent='✓'">${t('copy')}</button>
      </div>
    </div>`).join('');
}

$('#form').innerHTML = `
  <div>
    <label>${t('keyword')}</label>
    <input type="text" id="inp-keywords" placeholder="${t('keywordPlaceholder')}">
  </div>
  <div class="gz-row">
    <div>
      <label>${t('style')}</label>
      <select id="inp-style">
        <option value="random">${t('styleRandom')}</option>
        <option value="prefix">${t('stylePrefix')}</option>
        <option value="suffix">${t('styleSuffix')}</option>
        <option value="blend">${t('styleBlend')}</option>
        <option value="short">${t('styleShort')}</option>
      </select>
    </div>
    <div>
      <label>${t('extensions')}</label>
      <select id="inp-ext">
        <option value="all">${t('extAll')}</option>
        <option value="com">${t('extComOnly')}</option>
        <option value="tech">${t('extTech')}</option>
      </select>
    </div>
  </div>
`;

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="generateDomains()">${t('generate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#output').innerHTML=''">${t('clear')}</button>
`;

// Auto-generate on Enter
$('#inp-keywords').addEventListener('keydown', e => { if (e.key === 'Enter') generateDomains(); });

    {icon:'🔍', href:'/network/dns-lookup.html', name:'DNS Lookup'},
  ]
});
</script>
