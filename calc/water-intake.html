<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "How much water should I drink per day?", "acceptedAnswer": {"@type": "Answer", "text": "A common baseline is 30-35 ml of water per kilogram of body weight (about 0.5 oz per pound). For a 70 kg (154 lb) adult that is roughly 2.1-2.5 liters (71-85 oz) per day. Add 350-700 ml (12-24 oz) for every 30 minutes of intense exercise, and more in hot or dry climates."}}, {"@type": "Question", "name": "Does the 8x8 rule work?", "acceptedAnswer": {"@type": "Answer", "text": "The 8x8 rule (eight 8-oz glasses per day = 1.9 L) is an easy-to-remember rule of thumb that works for many sedentary adults. But individual needs vary with body size, activity, climate and health. This calculator gives a personalized estimate instead of a one-size-fits-all number."}}, {"@type": "Question", "name": "How does exercise affect water needs?", "acceptedAnswer": {"@type": "Answer", "text": "Intense exercise causes significant water and electrolyte loss through sweat. The American Council on Exercise recommends adding 12-16 oz (350-475 ml) of water for every 30 minutes of vigorous activity, on top of your baseline intake."}}, {"@type": "Question", "name": "Do I need more water during pregnancy or while breastfeeding?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. Pregnancy increases total body water by about 1.4-1.8 L, and lactation requires roughly 700 ml/day of additional fluid to support milk production. We add 300 ml for pregnancy and 700 ml for breastfeeding on top of the baseline."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area wi-wrap">
    <div class="wi-card">
      <div class="wi-row">
        <div class="wi-field" id="wKgField">
          <label id="lbl-wkg">Weight (kg)</label>
          <input type="number" id="wKg" min="20" max="300" step="0.1" value="70">
        </div>
        <div class="wi-field" id="wLbField" style="display:none">
          <label id="lbl-wlb">Weight (lb)</label>
          <input type="number" id="wLb" min="44" max="660" step="0.1" value="154">
        </div>
        <div class="wi-field">
          <label id="lbl-unit">Units</label>
          <select id="unit" onchange="toggleUnits()">
            <option value="metric">Metric (L, ml)</option>
            <option value="imperial">Imperial (oz, cups)</option>
          </select>
        </div>
        <div class="wi-field">
          <label id="lbl-exercise">Exercise (min/day)</label>
          <input type="number" id="exercise" min="0" max="300" value="30">
        </div>
        <div class="wi-field">
          <label id="lbl-climate">Climate</label>
          <select id="climate">
            <option value="1">Cool / Mild</option>
            <option value="1.1" selected>Temperate</option>
            <option value="1.2">Hot / Humid</option>
            <option value="1.3">Very Hot / Arid</option>
          </select>
        </div>
        <div class="wi-field">
          <label id="lbl-condition">Condition</label>
          <select id="condition">
            <option value="none">None</option>
            <option value="pregnant">Pregnant</option>
            <option value="breastfeeding">Breastfeeding</option>
            <option value="sick">Fever / Sick</option>
          </select>
        </div>
      </div>
    </div>
    <div class="wi-main">
      <div class="big" id="resultBig">—</div>
      <div class="lbl" id="resultLbl">per day</div>
      <div class="equiv" id="equiv"></div>
    </div>
    <div class="wi-card">
      <div style="font-size:.85em;color:var(--gz-text2);margin-bottom:6px">Bottles to drink (500 ml / 16.9 oz each):</div>
      <div class="wi-bottles" id="bottles"></div>
    </div>
    <div class="wi-card">
      <div class="wi-info" id="info"></div>
    </div>
    <div class="gz-toolbar" id="toolbar"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Water Intake Calculator',
    toolDesc: 'Find out how much water you should drink per day based on your weight, exercise, climate and condition. Personalized recommendations in liters, cups, and ounces.',
    wkg: 'Weight (kg)', wlb: 'Weight (lb)', units: 'Units',
    metric: 'Metric (L, ml)', imperial: 'Imperial (oz, cups)',
    exercise: 'Exercise (min/day)',
    climate: 'Climate',
    cool: 'Cool / Mild', temperate: 'Temperate', hot: 'Hot / Humid', veryHot: 'Very Hot / Arid',
    condition: 'Condition',
    none: 'None', pregnant: 'Pregnant', breastfeeding: 'Breastfeeding', sick: 'Fever / Sick',
    perDay: 'per day',
    baseline: 'Baseline (weight-based)',
    exerciseAdd: 'Exercise bonus',
    climateAdd: 'Climate adjustment',
    conditionAdd: 'Condition bonus',
    bottles: 'Bottles (500 ml)',
    step1: 'Enter your weight and choose metric or imperial units',
    step2: 'Set daily exercise minutes and climate',
    step3: 'Pick a condition (pregnant, breastfeeding, sick or none)',
    step4: 'See your daily target in liters, cups, ounces, and bottles',
  },
  zh: {
    toolTitle: '每日饮水量计算器',
    toolDesc: '根据体重、运动量、气候和身体状况，计算你每天应该喝多少水。以升、杯和盎司为单位给出个性化建议。',
    wkg: '体重（公斤）', wlb: '体重（磅）', units: '单位',
    metric: '公制（升、毫升）', imperial: '英制（盎司、杯）',
    exercise: '运动（分钟/天）',
    climate: '气候',
    cool: '凉爽', temperate: '温和', hot: '炎热潮湿', veryHot: '酷热干燥',
    condition: '身体状况',
    none: '无', pregnant: '怀孕', breastfeeding: '哺乳期', sick: '发烧/生病',
    perDay: '每天',
    baseline: '基础（基于体重）',
    exerciseAdd: '运动补充',
    climateAdd: '气候调整',
    conditionAdd: '状况补充',
    bottles: '瓶数（500 毫升）',
    step1: '输入体重并选择公制或英制单位',
    step2: '设置每日运动时长和气候',
    step3: '选择身体状况（怀孕、哺乳、生病或无）',
    step4: '查看每日饮水目标：升、杯、盎司、瓶数',
  }
});

const { $, t } = GZ;
let isMetric = true;

function toggleUnits() {
  isMetric = $('#unit').value === 'metric';
  $('#wKgField').style.display = isMetric ? '' : 'none';
  $('#wLbField').style.display = isMetric ? 'none' : '';
  calc();
}

function getWeightKg() {
  if (isMetric) return parseFloat($('#wKg').value);
  return (parseFloat($('#wLb').value) || 0) / 2.20462;
}

function calc() {
  const w = getWeightKg();
  if (!w || w < 20) return;

  // Base: 35 ml per kg of body weight
  const base = w * 35;

  // Exercise: +12 ml per minute of exercise
  const exMin = parseFloat($('#exercise').value) || 0;
  const exAdd = exMin * 12;

  // Climate
  const clim = parseFloat($('#climate').value) || 1;
  const climateAdd = (base * (clim - 1));

  // Condition
  const cond = $('#condition').value;
  let condAdd = 0;
  if (cond === 'pregnant') condAdd = 300;
  else if (cond === 'breastfeeding') condAdd = 700;
  else if (cond === 'sick') condAdd = 500;

  const totalMl = base + exAdd + climateAdd + condAdd;
  const totalL = totalMl / 1000;
  const totalOz = totalMl / 29.5735;
  const cups = totalOz / 8;
  const bottles = Math.ceil(totalMl / 500);

  if (isMetric) {
    $('#resultBig').textContent = totalL.toFixed(1) + ' L';
  } else {
    $('#resultBig').textContent = Math.round(totalOz) + ' oz';
  }

  $('#equiv').innerHTML = isMetric ? `
    <div class="item"><strong>${Math.round(totalMl)}</strong>ml</div>
    <div class="item"><strong>${Math.round(cups)}</strong>cups (8 oz)</div>
    <div class="item"><strong>${Math.round(totalOz)}</strong>oz</div>
    <div class="item"><strong>${bottles}</strong>bottles</div>
  ` : `
    <div class="item"><strong>${Math.round(totalOz)}</strong>oz</div>
    <div class="item"><strong>${Math.round(cups)}</strong>cups (8 oz)</div>
    <div class="item"><strong>${Math.round(totalMl)}</strong>ml</div>
    <div class="item"><strong>${totalL.toFixed(1)}</strong>L</div>
  `;

  $('#bottles').innerHTML = Array.from({length: bottles}, (_, i) =>
    `<div class="wi-bottle">${i + 1}</div>`
  ).join('');

  $('#info').innerHTML = `
    <strong>${t('baseline')}:</strong> ${Math.round(base)} ml &nbsp;•&nbsp;
    <strong>${t('exerciseAdd')}:</strong> +${Math.round(exAdd)} ml (${exMin} min) &nbsp;•&nbsp;
    <strong>${t('climateAdd')}:</strong> +${Math.round(climateAdd)} ml (×${clim}) &nbsp;•&nbsp;
    <strong>${t('conditionAdd')}:</strong> ${condAdd > 0 ? '+' + Math.round(condAdd) + ' ml' : 'none'}
  `;
}

['wKg', 'wLb', 'exercise', 'climate', 'condition'].forEach(id => {
  const el = $('#' + id);
  if (el) el.addEventListener('input', calc);
  if (el && el.tagName === 'SELECT') el.addEventListener('change', calc);
});

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="calc()">${t('calculate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="toggleUnits()">${t('units')}</button>`;

calc();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'⚖️', href:'/calc/bmi-calculator.html', name:'BMI'},
    {icon:'🍳', href:'/calc/tdee-calculator.html', name:'TDEE'},
    {icon:'⚖️', href:'/calc/ideal-weight.html', name:'Ideal Weight'},
    {icon:'💪', href:'/calc/one-rep-max.html', name:'1RM'},
  ]
});
</script>
<script>new Image().src="https://site-analytics.gamezipper.com/hit?s=tools.gamezipper.com&p="+encodeURIComponent(location.pathname);</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
