const { $, copyText, t } = GZ;

function coerceValue(raw, doCoerce, emptyNull) {
  const v = (raw || '').trim();
  if (v === '') return emptyNull ? null : '';
  if (!doCoerce) return v;
  if (/^-?\d+$/.test(v)) { const n = Number(v); return Number.isSafeInteger(n) ? n : v; }
  if (/^-?\d*\.\d+([eE][+-]?\d+)?$/.test(v) || /^-?\d+[eE][+-]?\d+$/.test(v)) {
    const n = Number(v); return isNaN(n) ? v : n;
  }
  if (/^(true|false)$/i.test(v)) return /^true$/i.test(v);
  return v;
}

function parseTable(tableEl, headerMode, pretty, emptyNull, coerce) {
  // Build a 2D grid honouring rowspan/colspan
  const grid = []; // grid[r][c] = text
  let maxCols = 0;
  const rows = tableEl.querySelectorAll(':scope > tr, :scope > thead > tr, :scope > tbody > tr, :scope > tfoot > tr');
  const rowList = Array.from(rows);
  // track occupied cells for rowspan/colspan
  const occupied = {}; // "r,c" -> true

  rowList.forEach((tr, r) => {
    if (!grid[r]) grid[r] = [];
    const cells = Array.from(tr.children).filter(c => c.tagName === 'TD' || c.tagName === 'TH');
    let c = 0;
    for (const cell of cells) {
      while (occupied[r + ',' + c]) c++;
      const text = cell.textContent.replace(/\s+/g, ' ').trim();
      const colspan = parseInt(cell.getAttribute('colspan') || '1', 10);
      const rowspan = parseInt(cell.getAttribute('rowspan') || '1', 10);
      for (let dr = 0; dr < rowspan; dr++) {
        for (let dc = 0; dc < colspan; dc++) {
          const rr = r + dr, cc = c + dc;
          occupied[rr + ',' + cc] = true;
          if (!grid[rr]) grid[rr] = [];
          grid[rr][cc] = (dr === 0 && dc === 0) ? text : text; // repeat value across span
        }
      }
      c += colspan;
      if (c > maxCols) maxCols = c;
    }
  });

  // Normalize grid: fill holes with empty string
  for (let r = 0; r < grid.length; r++) {
    if (!grid[r]) grid[r] = [];
    for (let c = 0; c < maxCols; c++) {
      if (grid[r][c] === undefined) grid[r][c] = '';
    }
  }

  if (!grid.length) return { rows: [], cols: 0 };

  // Determine header
  let header = [];
  let dataStart = 0;
  if (headerMode === 'none') {
    header = []; for (let c = 0; c < maxCols; c++) header.push('col' + (c + 1));
  } else if (headerMode === 'first') {
    header = grid[0].slice(0, maxCols);
    dataStart = 1;
  } else {
    // auto: thead first if present
    const thead = tableEl.querySelector(':scope > thead');
    if (thead && thead.querySelector('tr')) {
      // find index of first thead row
      const theadRowIdx = rowList.findIndex(tr => thead.contains(tr));
      if (theadRowIdx >= 0) {
        header = grid[theadRowIdx].slice(0, maxCols);
        dataStart = theadRowIdx + 1;
      } else {
        header = grid[0].slice(0, maxCols); dataStart = 1;
      }
    } else {
      header = grid[0].slice(0, maxCols); dataStart = 1;
    }
  }

  // De-duplicate empty header names
  header = header.map((h, i) => h && h.trim() ? h.trim() : 'col' + (i + 1));

  const out = [];
  for (let r = dataStart; r < grid.length; r++) {
    const row = grid[r];
    if (!row) continue;
    // skip fully empty rows
    if (row.every(c => c === '' || c === undefined)) continue;
    const obj = {};
    for (let c = 0; c < maxCols; c++) {
      obj[header[c] || ('col' + (c + 1))] = coerceValue(row[c], coerce, emptyNull);
    }
    out.push(obj);
  }
  return { rows: out, cols: maxCols };
}

function run() {
  const raw = $('#input').value;
  const status = $('#status');
  if (!raw.trim()) { $('#output').value = ''; status.textContent = ''; status.className = 'sj-status'; return; }
  try {
    const doc = new DOMParser().parseFromString('<!DOCTYPE html><html><body>' + raw + '</body></html>', 'text/html');
    const tables = doc.querySelectorAll('table');
    if (!tables.length) throw new Error(t('errNoTable'));
    const headerMode = $('#headerMode').value;
    const pretty = $('#pretty').checked;
    const emptyNull = $('#emptyNull').checked;
    const coerce = $('#coerce').checked;

    let result;
    if (tables.length === 1) {
      const { rows, cols } = parseTable(tables[0], headerMode, pretty, emptyNull, coerce);
      result = pretty ? JSON.stringify(rows, null, 2) : JSON.stringify(rows);
      status.textContent = t('ok').replace('N', rows.length).replace('M', cols);
    } else {
      const all = [];
      let totalRows = 0, totalCols = 0;
      tables.forEach(tb => {
        const { rows, cols } = parseTable(tb, headerMode, pretty, emptyNull, coerce);
        all.push(rows); totalRows += rows.length; totalCols = Math.max(totalCols, cols);
      });
      result = pretty ? JSON.stringify(all, null, 2) : JSON.stringify(all);
      status.textContent = t('ok').replace('N', totalRows).replace('M', totalCols) + ' (' + tables.length + ' tables)';
    }
    $('#output').value = result;
    status.className = 'sj-status ok';
  } catch (e) {
    $('#output').value = '';
    status.textContent = t('err') + e.message;
    status.className = 'sj-status err';
  }
}

</table>`;
  run();
}
function doClear() { $('#input').value = ''; $('#output').value = ''; $('#status').textContent = ''; }
function doDownload() {
  const text = $('#output').value; if (!text) return;
  const blob = new Blob([text], { type: 'application/json' });
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = 'table.json'; a.click(); URL.revokeObjectURL(a.href);
}
