<body>
<div class="gz-container">
  <div class="gz-tool-header"><h1 id="title"></h1><p class="desc" id="desc"></p></div>
  <div class="gz-tool-area">
    <div class="gz-dropzone" id="dropzone" onclick="document.getElementById('fileIn').click()">
      <span class="icon">🖼️</span>
      <p id="dropText"></p>
      <input type="file" id="fileIn" accept="image/jpeg,image/jpg,.jpg,.jpeg" multiple hidden>
    </div>
    <div class="opt-row">
      <label><input type="checkbox" id="transparency" onchange="convertAll()"> <span id="trLabel"></span></label>
      <span id="thrLabel"></span>
      <input type="range" id="threshold" min="200" max="255" value="245" style="width:140px;accent-color:var(--accent)" oninput="convertAll()">
      <span class="val" id="thrVal" style="font-weight:700;min-width:36px">245</span>
    </div>
    <div class="results" id="results"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en:{toolTitle:'JPG to PNG Converter',toolDesc:'Convert JPEG/JPG images to PNG instantly. Batch convert, optional transparency, 100% in your browser.',
    s1:'Drop JPG/JPEG images or click to upload (multiple allowed)',s2:'Optionally enable transparency and set the white threshold',s3:'Preview each converted PNG',s4:'Click Download on any image to save the PNG',
    dropHint:'Drop JPG/JPEG images here or click to upload',
    transparency:'Make white background transparent',threshold:'Threshold:',
    download:'⬇️ Download PNG',rPng:'PNG Compressor',rRev:'PNG to JPG',rConverter:'Image Converter',rResizer:'Image Resizer'},
  zh:{toolTitle:'JPG 转 PNG 转换器',toolDesc:'即时将 JPEG/JPG 图片转换为 PNG。支持批量转换、可选透明背景，100% 浏览器本地处理。',
    s1:'拖放 JPG/JPEG 图片或点击上传（支持多选）',s2:'可选启用透明背景并设置白色阈值',s3:'预览每张转换后的 PNG',s4:'点击图片上的「下载」保存 PNG',
    dropHint:'拖放 JPG/JPEG 图片到此处或点击上传',
    transparency:'将白色背景变透明',threshold:'阈值：',
    download:'⬇️ 下载 PNG',rPng:'PNG 压缩器',rRev:'PNG 转 JPG',rConverter:'图片转换器',rResizer:'图片缩放'}
});

const {t}=GZI18n;
let files=[];

document.getElementById('dropText').textContent=t('dropHint');
document.getElementById('trLabel').textContent=t('transparency');
document.getElementById('thrLabel').textContent=t('threshold');

const dz=document.getElementById('dropzone'),fi=document.getElementById('fileIn');
dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('drag-over')});
dz.addEventListener('dragleave',()=>dz.classList.remove('drag-over'));
dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('drag-over');files=[...e.dataTransfer.files];convertAll()});
fi.addEventListener('change',e=>{if(e.target.files.length){files=[...e.target.files];convertAll()}});

function convertAll(){
  const tr=document.getElementById('transparency').checked;
  const thr=+document.getElementById('threshold').value;
  document.getElementById('thrVal').textContent=thr;
  document.getElementById('threshold').disabled=!tr;
  const out=document.getElementById('results');out.innerHTML='';
  if(!files.length)return;
  files.forEach((f,idx)=>{
    const img=new Image();
    img.onload=()=>{
      const c=document.createElement('canvas');c.width=img.width;c.height=img.height;
      const ctx=c.getContext('2d');
      if(tr)ctx.clearRect(0,0,c.width,c.height);
      ctx.drawImage(img,0,0);
      if(tr){
        const data=ctx.getImageData(0,0,c.width,c.height);const d=data.data;
        for(let i=0;i<d.length;i+=4){
          if(d[i]>=thr&&d[i+1]>=thr&&d[i+2]>=thr){d[i+3]=0;}
        }
        ctx.putImageData(data,0,0);
      }
      c.toBlob(b=>{
        const url=URL.createObjectURL(b);
        const card=document.createElement('div');
        card.className='result-card';
        card.innerHTML=`<img src="${url}" style="background:repeating-conic-gradient(#444 0 25%,#666 0 50%) 0/16px 16px"><div class="info">${f.name}</div><div class="info">${c.width}×${c.height} • ${fmt(b.size)}</div><button class="gz-btn" onclick="dl(${idx})">${t('download')}</button>`;
        out.appendChild(card);
      },'image/png');
    };
    img.src=URL.createObjectURL(f);
  });
}

function dl(idx){
  const tr=document.getElementById('transparency').checked;
  const thr=+document.getElementById('threshold').value;
  const img=new Image();
  img.onload=()=>{
    const c=document.createElement('canvas');c.width=img.width;c.height=img.height;
    const ctx=c.getContext('2d');
    if(tr)ctx.clearRect(0,0,c.width,c.height);
    ctx.drawImage(img,0,0);
    if(tr){
      const data=ctx.getImageData(0,0,c.width,c.height);const d=data.data;
      for(let i=0;i<d.length;i+=4){if(d[i]>=thr&&d[i+1]>=thr&&d[i+2]>=thr){d[i+3]=0;}}
      ctx.putImageData(data,0,0);
    }
    c.toBlob(b=>{
      const a=document.createElement('a');a.href=URL.createObjectURL(b);
      a.download=files[idx].name.replace(/\.[^.]+$/,'')+'.png';a.click();
    },'image/png');
  };
  img.src=URL.createObjectURL(files[idx]);
}

function fmt(b){return b>1048576?(b/1048576).toFixed(1)+' MB':(b/1024).toFixed(1)+' KB'}

GZ.renderToolPage({category:'image',titleKey:'toolTitle',descKey:'toolDesc',
  howToSteps:['s1','s2','s3','s4'],
  related:[
    {href:'/image/png-compressor.html',icon:'🖼️',nameKey:'rPng'},
    
    {href:'/image/converter.html',icon:'🔄',nameKey:'rConverter'},
    {href:'/image/resizer.html',icon:'📐',nameKey:'rResizer'}
  ]
});
</script>
