<script>
GZI18n.register({
  en: {
    toolTitle: 'Tab to Space Converter',
    toolDesc: 'Convert tabs to spaces or spaces to tabs in your code. Column-aware leading indentation, custom tab width, trailing-whitespace trim and line-ending normalization. Free, browser-only.',

  zh: {

    toolDesc: '在代码中将 Tab 转为空格或将空格转为 Tab。列感知的前导缩进、自定义 Tab 宽度、修剪行尾空白和统一换行符。免费，浏览器本地运行。',
    modeTabs: 'Tab → 空格',
    modeSpaces: '空格 → Tab',
    width: 'Tab 宽度',
    fullDoc: '转换整行（不仅是缩进）',
    trimTrail: '修剪行尾空白',
    normalizeLF: '统一换行符为 LF',
    step1: '将代码或文本粘贴到输入区',
    step2: '选择转换模式并设置 Tab 宽度',
    step3: '可选修剪行尾空白或统一换行符',
    step4: '一键复制转换后的结果',
  }
});

const { $, copyText, t } = GZ;
let mode = 'tabs2spaces';
let tabWidth = 4;
let fullDoc = false;
let trimTrail = false;
let normLF = false;

// Expand leading tabs to spaces using column-aware logic (respects tab stops)
function expandLeadingTabs(line, width) {
  let out = '', col = 0, i = 0;
  // Leading whitespace region
  while (i < line.length) {
    const c = line[i];
    if (c === '\t') {
      const spaces = width - (col % width);
      out += ' '.repeat(spaces);
      col += spaces;
      i++;
    } else if (c === ' ') {
      out += ' ';
      col++;
      i++;
    } else {
      break;
    }
  }
  // Remainder
  if (fullDoc) {
    // Also expand any tabs in the rest with column awareness
    let rest = line.slice(i);
    let rOut = '', rCol = col;
    for (let j = 0; j < rest.length; j++) {
      const c = rest[j];
      if (c === '\t') {
        const spaces = width - (rCol % width);
        rOut += ' '.repeat(spaces);
        rCol += spaces;
      } else {
        rOut += c;
        rCol++;
      }
    }
    out += rOut;
  } else {
    out += line.slice(i);
  }
  return out;
}

// Collapse leading spaces into tabs (groups of tabWidth)
function collapseLeadingSpaces(line, width) {
  const m = line.match(/^([ \t]*)/);
  if (!m) return line;
  const lead = m[1];
  // Count leading spaces (tabs count as their own group boundary)
  let spaces = 0, tabs = '';
  for (const c of lead) {
    if (c === ' ') spaces++;
    else if (c === '\t') { tabs += '\t'; } // keep existing tabs
  }
  const newTabs = '\t'.repeat(Math.floor(spaces / width));
  const remSpaces = ' '.repeat(spaces % width);
  const rest = line.slice(lead.length);
  let result = tabs + newTabs + remSpaces + rest;
  if (fullDoc) {
    // Collapse mid-line space runs too (only exact multiples)
    result = result.replace(new RegExp('(?<=\\S) {' + width + '}', 'g'), '\t');
  }
  return result;
}

function process() {
  let inp = $('#input').value;
  if (!inp) { $('#output').textContent = ''; $('#status').textContent = ''; return; }
  if (normLF) inp = inp.replace(/\r\n/g, '\n').replace(/\r/g, '\n');
  const lines = inp.split('\n');
  const out = lines.map(line => {
    let res = mode === 'tabs2spaces' ? expandLeadingTabs(line, tabWidth) : collapseLeadingSpaces(line, tabWidth);
    if (trimTrail) res = res.replace(/[ \t]+$/,'');
    return res;
  });
  const result = out.join('\n');
  $('#output').textContent = result;
  const tabCount = (inp.match(/\t/g) || []).length;
  const spaceCount = (result.match(/ /g) || []).length;
  $('#status').innerHTML = `<div class="tts-stats"><span>📊 ${lines.length} lines</span><span>⇥ ${tabCount} tabs in</span><span>␣ ${spaceCount} spaces out</span><span>📏 width ${tabWidth}</span></div>`;
}

$('#input').addEventListener('input', process);

$('#toolbar').innerHTML = `
  <select class="gz-select" id="sel-mode">
    <option value="tabs2spaces">${t('modeTabs')}</option>
    <option value="spaces2tabs">${t('modeSpaces')}</option>
  </select>
  <label style="display:inline-flex;align-items:center;gap:6px;font-size:.85em">${t('width')}: <input type="number" id="num-width" value="4" min="1" max="16" style="width:54px;padding:4px 6px;border-radius:6px;border:1px solid var(--border);background:var(--glass);color:var(--text)"></label>
  <label class="gz-check"><input type="checkbox" id="cb-full"> ${t('fullDoc')}</label>
  <label class="gz-check"><input type="checkbox" id="cb-trim"> ${t('trimTrail')}</label>
  <label class="gz-check"><input type="checkbox" id="cb-lf"> ${t('normalizeLF')}</label>
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#input').value='';process()">${t('clear')}</button>`;

$('#sel-mode').addEventListener('change', e => { mode = e.target.value; process(); });
$('#num-width').addEventListener('input', e => { tabWidth = Math.max(1, Math.min(16, +e.target.value || 4)); process(); });
$('#cb-full').addEventListener('change', e => { fullDoc = e.target.checked; process(); });
$('#cb-trim').addEventListener('change', e => { trimTrail = e.target.checked; process(); });
$('#cb-lf').addEventListener('change', e => { normLF = e.target.checked; process(); });

$('#input').value = 'function hello(name) {\n\tconst greeting = "Hello, " + name;\n\tconsole.log(greeting);\n\treturn greeting;\n}\n\nconst arr = [\n\t"apple",\n\t"banana",\n\t"cherry"\n];';
process();

});
