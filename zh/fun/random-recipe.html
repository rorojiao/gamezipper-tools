const CATEGORIES = ['all', 'breakfast', 'lunch', 'dinner', 'dessert', 'vegetarian', 'quick', 'comfort'];
const CAT_LABEL = { all: 'All Recipes', breakfast: '🍳 Breakfast', lunch: '🥗 Lunch', dinner: '🍝 Dinner', dessert: '🍰 Dessert', vegetarian: '🥦 Vegetarian', quick: '⚡ Quick', comfort: '🏠 Comfort' };

let currentCat = 'all';
let lastRecipe = null;

function rand(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function filterByCat(cat) {
  currentCat = cat;
  document.querySelectorAll('.cat-filters button').forEach(b => b.classList.toggle('active', b.dataset.cat === cat));
  generate();
}

function generate() {
  const pool = currentCat === 'all' ? RECIPES : RECIPES.filter(r => r.cat === currentCat);
  if (!pool.length) return;
  let next;
  do {
    next = rand(pool);
  } while (pool.length > 1 && next === lastRecipe);
  lastRecipe = next;
  $('#recipeEmoji').textContent = next.emoji;
  $('#recipeName').textContent = next.name;
  $('#recipeMeta').innerHTML = `
    <span class="recipe-tag">⏱ ${next.time}</span>
    <span class="recipe-tag">🍽 ${next.serves}</span>
    ${next.tags.map(t => `<span class="recipe-tag">${t}</span>`).join('')}
    <span class="recipe-tag">${CAT_LABEL[next.cat]}</span>
  `;
  $('#recipeDesc').textContent = next.desc;
  $('#recipeIngs').innerHTML = next.ings.map(i => `<li>${i}</li>`).join('');
  $('#recipeSteps').innerHTML = next.steps.map(s => `<li>${s}</li>`).join('');
  addToHistory(next);
}

function addToHistory(r) {
  const hist = $('#history');
  const item = document.createElement('div');
  item.className = 'history-item';
  item.innerHTML = `<div class="h-cat">${CAT_LABEL[r.cat]}</div><div><span class="h-emoji">${r.emoji}</span>${r.name} <span style="color:var(--text2);font-size:.85em">— ${r.time}</span></div>`;
  item.onclick = () => {
    lastRecipe = r;
    $('#recipeEmoji').textContent = r.emoji;
    $('#recipeName').textContent = r.name;
    $('#recipeMeta').innerHTML = `
      <span class="recipe-tag">⏱ ${r.time}</span>
      <span class="recipe-tag">🍽 ${r.serves}</span>
      ${r.tags.map(t => `<span class="recipe-tag">${t}</span>`).join('')}
      <span class="recipe-tag">${CAT_LABEL[r.cat]}</span>
    `;
    $('#recipeDesc').textContent = r.desc;
    $('#recipeIngs').innerHTML = r.ings.map(i => `<li>${i}</li>`).join('');
    $('#recipeSteps').innerHTML = r.steps.map(s => `<li>${s}</li>`).join('');
    window.scrollTo({ top: 0, behavior: 'smooth' });
  };
  hist.insertBefore(item, hist.firstChild);
  while (hist.children.length > 6) hist.removeChild(hist.lastChild);
}

function copyRecipe() {
  const r = lastRecipe;
  if (!r) return;
  const text = `${r.emoji} ${r.name}\n${r.time} · Serves ${r.serves}\n\n${r.desc}\n\nINGREDIENTS:\n${r.ings.map(i => '• ' + i).join('\n')}\n\nSTEPS:\n${r.steps.map((s, i) => (i+1) + '. ' + s).join('\n')}`;
  copyText(text);
}

$('#catFilters').innerHTML = CATEGORIES.map(c => `<button class="gz-btn gz-btn-secondary ${c === 'all' ? 'active' : ''}" data-cat="${c}" onclick="filterByCat('${c}')">${CAT_LABEL[c]}</button>`).join('');

$('#toolbar').innerHTML = `<button class="gz-btn" onclick="generate()">🍳 ${t('generate')}</button>`;

GZ.renderToolPage({
  category: 'fun',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🦁', href:'/fun/random-animal-generator.html', name:'Random Animal'},
    {icon:'😂', href:'/fun/random-joke-generator.html', name:'Random Joke'},
    {icon:'💡', href:'/fun/random-fact-generator.html', name:'Random Fact'},
    {icon:'😄', href:'/fun/random-emoji.html', name:'Random Emoji'},
  ]
});

document.addEventListener('keydown', e => { if (e.code === 'Space' && e.target.tagName !== 'INPUT' && e.target.tagName !== 'TEXTAREA') { e.preventDefault(); generate(); } });

generate();
</script>
