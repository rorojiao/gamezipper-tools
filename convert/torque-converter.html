</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Torque Converter',
    toolDesc: 'Convert between Newton-meter, foot-pound, inch-pound, kilogram-meter, dyne-centimeter, kNm and more — instantly and free.',
    swap: 'Swap',
    clear: 'Clear',
    copy: 'Copy',
    step1: 'Enter a value in the input field',
    step2: 'Select the source torque unit',
    step3: 'Select the target torque unit',
    step4: 'The result updates instantly as you type',
  },
  zh: {
    toolTitle: '扭矩单位转换器',
    toolDesc: '在牛顿·米、英尺·磅、英寸·磅、千克·米、达因·厘米、千牛·米等扭矩单位之间即时免费转换。',
    swap: '交换',
    clear: '清除',
    copy: '复制',
    step1: '在输入框中输入数值',
    step2: '选择源扭矩单位',
    step3: '选择目标扭矩单位',
    step4: '输入时结果即时更新',
  }
});

const { $, copyText, t } = GZ;

// Base unit: Newton-meter (Nm)
const G = 9.80665; // standard gravity m/s^2
const UNITS = [
  { id: 'Nm',    label: 'Newton-meter (Nm)',       zh: '牛顿·米 (Nm)',     factor: 1 },
  { id: 'kNm',   label: 'Kilonewton-meter (kNm)',  zh: '千牛·米 (kNm)',    factor: 1000 },
  { id: 'dyn_cm',label: 'Dyne-centimeter (dyn·cm)',zh: '达因·厘米 (dyn·cm)', factor: 1e-7 },
  { id: 'kgm',   label: 'Kilogram-meter (kgf·m)',  zh: '千克力·米 (kgf·m)', factor: G },
  { id: 'gf_cm', label: 'Gram-force-centimeter (gf·cm)', zh: '克力·厘米 (gf·cm)', factor: G / 1000 },
  { id: 'ft_lb', label: 'Foot-pound (ft·lb)',      zh: '英尺·磅 (ft·lb)',  factor: 1.3558179488 },
  { id: 'in_lb', label: 'Inch-pound (in·lb)',      zh: '英寸·磅 (in·lb)',  factor: 1.3558179488 / 12 },
  { id: 'in_oz', label: 'Inch-ounce (in·oz)',      zh: '英寸·盎司 (in·oz)', factor: 1.3558179488 / 192 },
  { id: 'ft_pdl',label: 'Foot-poundal (ft·pdl)',   zh: '英尺·磅达 (ft·pdl)', factor: 0.04214011 },
];

const lang = GZI18n.getLang();
const opts = UNITS.map(u => `<option value="${u.id}">${lang === 'zh' ? u.zh : u.label}</option>`).join('');

$('#converter').innerHTML = `
  <div class="gz-converter-row">
    <input type="number" id="inputVal" placeholder="0" step="any" oninput="convert()">
    <select id="fromUnit" onchange="convert()">${opts}</select>
  </div>
  <div class="gz-converter-row" style="justify-content:center">
    <button class="gz-btn gz-btn-secondary" onclick="swapUnits()">⇅ ${t('swap')}</button>
  </div>
  <div class="gz-converter-row">
    <input type="text" id="outputVal" readonly>
    <select id="toUnit" onchange="convert()">${opts}</select>
  </div>
  <div id="formulaDisplay" style="margin-top:8px;font-size:.85em;opacity:.7"></div>
`;

$('#fromUnit').value = 'Nm';
$('#toUnit').value = 'ft_lb';

function convert() {
  const val = parseFloat($('#inputVal').value);
  if (isNaN(val)) { $('#outputVal').value = ''; $('#formulaDisplay').textContent = ''; return; }
  const from = UNITS.find(u => u.id === $('#fromUnit').value);
  const to = UNITS.find(u => u.id === $('#toUnit').value);
  const nm = val * from.factor;
  const result = nm / to.factor;
  $('#outputVal').value = Math.abs(result) < 1 ? result.toPrecision(8) : parseFloat(result.toPrecision(12));
  const ratio = from.factor / to.factor;
  $('#formulaDisplay').textContent = `1 ${from.id} = ${parseFloat(ratio.toPrecision(8))} ${to.id}`;
}

function swapUnits() {
  const f = $('#fromUnit').value, tv = $('#toUnit').value;
  $('#fromUnit').value = tv; $('#toUnit').value = f; convert();
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="copyText($('#outputVal').value)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#inputVal').value='';$('#outputVal').value='';$('#formulaDisplay').textContent=''">${t('clear')}</button>
`;

convert();

GZ.renderToolPage({
  category: 'convert',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🔧', href:'/convert/pressure-converter.html', name:'Pressure Converter'},
    {icon:'⚡', href:'/convert/power-converter.html', name:'Power Converter'},
    {icon:'💪', href:'/convert/force-converter.html', name:'Force Converter'},
    {icon:'📏', href:'/convert/all-unit-converter.html', name:'Unit Converter'},
  ]
});
</script>
