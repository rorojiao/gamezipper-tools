<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "Is this raffle picker random and fair?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. The picker uses a cryptographically strong random source (crypto.getRandomValues) when available, falling back to Math.random. Each entry has an equal probability of being selected, and the full draw runs entirely in your browser — no server, no bias, no tampering."}}, {"@type": "Question", "name": "Can I draw multiple winners at once?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. Set the number of winners to any value. By default each entry can only win once (unique winners). Turn off Unique winners if the same entry is allowed to win more than once, for example when each ticket is an independent chance."}}, {"@type": "Question", "name": "How do I run a YouTube or Instagram giveaway?", "acceptedAnswer": {"@type": "Answer", "text": "Paste one entry per line — usernames, emails, comment IDs or ticket numbers. Optionally remove duplicates so repeat comments only count once, set the number of winners and alternate (runner-up) winners, then click Draw. Copy or export the results to announce the winners."}}, {"@type": "Question", "name": "Are my entries stored or sent anywhere?", "acceptedAnswer": {"@type": "Answer", "text": "No. The entire draw happens locally in your browser. Your list of names or emails never leaves your device, which makes this safe for private customer lists and email addresses."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="rf-grid">
      <div>
        <div class="gz-toolbar" id="toolbar"></div>
        <textarea id="input" spellcheck="false" placeholder=""></textarea>
        <div class="rf-stat" id="entryCount"></div>
      </div>
      <div class="rf-side">
        <div class="rf-field">
          <label id="lblWinners"></label>
          <input type="number" id="winners" value="1" min="1" max="1000">
        </div>
        <div class="rf-field">
          <label id="lblAlt"></label>
          <input type="number" id="alternates" value="0" min="0" max="1000">
        </div>

          <label><input type="checkbox" id="unique" checked><span id="lblUnique"></span></label>
          <label><input type="checkbox" id="dedupe" checked><span id="lblDedupe"></span></label>
          <label><input type="checkbox" id="trim"><span id="lblTrim"></span></label>

        <div class="rf-winners empty" id="winBox"></div>

</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Raffle & Giveaway Winner Picker',
    toolDesc: 'Pick fair, random winners for your raffle or giveaway. Paste names, emails or entries — draw one or many winners, remove duplicates and export results. 100% private, runs in your browser. Perfect for YouTube, Instagram and Twitter giveaways.',
    ph: 'One entry per line — names, emails, usernames or ticket numbers…',
    winners: 'Number of winners',
    alt: 'Alternate (runner-up) winners',
    unique: 'Unique winners (no repeats)',
    dedupe: 'Remove duplicate entries first',
    trim: 'Ignore empty lines & trim spaces',
    draw: '🎉 Draw Winner(s)',
    redraw: '🔄 Draw Again',
    entries: '{n} entries',
    afterDedupe: '({n} after removing duplicates)',
    empty: 'Your winners will appear here. Paste your list and press Draw!',
    winner: '🏆 WINNER',
    winnersLbl: '🏆 WINNERS',
    alts: 'Alternates',
    tooFew: 'Not enough entries for that many unique winners. Increase entries or lower the count.',
    step1: 'Paste one entry per line (names, emails, usernames or IDs)',
    step2: 'Set how many winners and alternate winners you need',
    step3: 'Tick Remove duplicates if repeated entries should only count once',
    step4: 'Click Draw — copy or export the winners to announce them',
  },
  zh: {
    toolTitle: '抽奖 / 抽奖活动获奖者抽取器',
    toolDesc: '为你的抽奖或抽奖活动公平、随机地抽取获奖者。粘贴姓名、邮箱或参与名单 — 可抽取一名或多 名获奖者、去除重复并导出结果。100% 私密，浏览器本地运行。适合 YouTube、Instagram 和 Twitter 抽奖。',
    ph: '每行一条 — 姓名、邮箱、用户名或票号…',
    winners: '获奖人数',
    alt: '候补（替补）获奖人数',
    unique: '获奖者不重复',
    dedupe: '先去除重复条目',
    trim: '忽略空行并去除首尾空格',
    draw: '🎉 抽取获奖者',
    redraw: '🔄 再抽一次',
    entries: '{n} 条参与记录',
    afterDedupe: '（去重后 {n} 条）',
    empty: '获奖者将显示在这里。粘贴名单后点击「抽取」！',
    winner: '🏆 获奖者',
    winnersLbl: '🏆 获奖者',
    alts: '候补',
    tooFew: '参与人数不足以抽取这么多不重复的获奖者。请增加条目或减少人数。',
    step1: '每行粘贴一条（姓名、邮箱、用户名或编号）',
    step2: '设置需要的获奖人数和候补人数',
    step3: '勾选「去除重复条目」让重复记录只算一次',
    step4: '点击「抽取」— 复制或导出获奖者进行公布',
  }
});

const { $, copyText, t } = GZ;

function getEntries() {
  let raw = $('#input').value.split('\n');
  if ($('#trim').checked) raw = raw.map(s => s.trim());
  else raw = raw.map(s => s.replace(/\r$/, ''));
  let list = raw.filter(s => s.length > 0);
  if ($('#dedupe').checked) {
    const seen = new Set(), out = [];
    for (const s of list) { if (!seen.has(s)) { seen.add(s); out.push(s); } }
    list = out;
  }
  return list;
}

function updateCount() {
  const total = $('#input').value.split('\n').filter(s => s.trim().length).length;
  const list = getEntries();
  const dedupeNote = ($('#dedupe').checked && list.length !== total) ? ' ' + t('afterDedupe').replace('{n}', list.length) : '';
  $('#entryCount').textContent = t('entries').replace('{n}', list.length) + dedupeNote;
}

function secureShuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    let r;
    if (window.crypto && crypto.getRandomValues) {
      const buf = new Uint32Array(1);
      crypto.getRandomValues(buf);
      r = buf[0] / 4294967296;
    } else { r = Math.random(); }
    const j = Math.floor(r * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function draw() {
  const list = getEntries();
  const nWin = parseInt($('#winners').value) || 1;
  const nAlt = parseInt($('#alternates').value) || 0;
  const unique = $('#unique').checked;
  const box = $('#winBox');

  if (list.length === 0) {
    box.className = 'rf-winners empty';
    box.textContent = t('empty');
    return;
  }
  if (unique && (nWin + nAlt) > list.length) {
    box.className = 'rf-winners empty';
    box.style.color = 'var(--gz-accent)';
    box.textContent = t('tooFew');
    return;
  }

  let picked, alts = [];
  if (unique) {
    const sh = secureShuffle(list);
    picked = sh.slice(0, nWin);
    alts = sh.slice(nWin, nWin + nAlt);
  } else {
    const pick = (k) => Array.from({length: k}, () => list[Math.floor((crypto.getRandomValues ? (crypto.getRandomValues(new Uint32Array(1))[0]/4294967296) : Math.random()) * list.length)]);
    picked = pick(nWin);
    alts = pick(nAlt);
  }

  let html = `<div class="rf-big rf-anim">${escapeHtml(picked[0])}</div>`;
  if (picked.length > 1) {
    html += `<div style="font-weight:700;color:var(--text2);margin-top:4px">${t('winnersLbl')}</div>`;
    html += `<div class="rf-list">${picked.map((p,i)=>`<span class="pill ${i===0?'first':''}">${escapeHtml(p)}</span>`).join('')}</div>`;
  } else {
    html += `<div style="font-weight:700;color:var(--text2);font-size:.85em;text-transform:uppercase;letter-spacing:1px">${t('winner')}</div>`;
  }
  if (alts.length) {
    html += `<div style="margin-top:14px;font-size:.78rem;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;font-weight:700">${t('alts')}</div>`;
    html += `<div class="rf-list">${alts.map(p=>`<span class="pill">${escapeHtml(p)}</span>`).join('')}</div>`;
  }
  const copyData = [...picked, ...alts].join('\n');
  const attr = JSON.stringify(JSON.stringify(copyData)).slice(1,-1).replace(/"/g,'&quot;');
  html += `<div style="margin-top:16px;display:flex;gap:8px;justify-content:center;flex-wrap:wrap">
    <button class="gz-btn gz-btn-secondary" onclick="copyText(${attr})">${t('copy')}</button>
    <button class="gz-btn gz-btn-secondary" onclick="draw()">${t('redraw')}</button>
  </div>`;
  box.className = 'rf-winners';
  box.style.color = '';
  box.innerHTML = html;
}

function escapeHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// Labels
$('#lblWinners').textContent = t('winners');
$('#lblAlt').textContent = t('alt');
$('#lblUnique').textContent = t('unique');
$('#lblDedupe').textContent = t('dedupe');
$('#lblTrim').textContent = t('trim');
$('#input').placeholder = t('ph');
$('#drawBtn').textContent = t('draw');
$('#winBox').textContent = t('empty');

$('#drawBtn').addEventListener('click', draw);
['input','winners','alternates','unique','dedupe','trim'].forEach(id => $('#'+id).addEventListener('input', updateCount));

$('#toolbar').innerHTML = `
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

function loadExample() {
  $('#input').value = '@alice\n@bob\n@charlie\n@diana\n@eve\n@frank\n@grace\n@heidi\n@ivan\n@judy\n@alice\n@bob';
  updateCount();
}
function doClear() { $('#input').value=''; $('#winBox').className='rf-winners empty'; $('#winBox').textContent=t('empty'); updateCount(); }

updateCount();

GZ.renderToolPage({
  category: 'fun',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🎡', href:'/fun/wheel-of-names.html', name:'Wheel of Names'},
    {icon:'🎲', href:'/fun/dice-roller.html', name:'Dice Roller'},
    {icon:'🔢', href:'/calc/random-number-generator.html', name:'Random Number'},
    {icon:'🔀', href:'/text/list-randomizer.html', name:'List Randomizer'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
