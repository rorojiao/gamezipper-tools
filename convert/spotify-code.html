<script>

  zh: {

    toolDesc: '从任意文本或 URI 创建 Spotify 风格的可扫描条码。自定义条数、高度、颜色和 Logo。下载为 SVG 或 PNG — 免费，浏览器本地运行。',
    inputText: '文本或 Spotify URI',
    barColor: '条码颜色',
    bgColor: '背景色',
    barCount: '条数',
    maxHeight: '最大条高',
    downloadSvg: '📥 SVG',
    downloadPng: '📥 PNG',
    randomize: '🎲 随机',
    step1: '输入任意文本或粘贴 Spotify URI',
    step2: '调整条数、高度和颜色',
    step3: '实时预览 Spotify 风格条码',
    step4: '下载为 SVG（矢量）或 PNG 图片',
    placeholder: 'spotify:track:4cOdK2wGLETKBW3PvgPWqT',
  }
});
const { $, t } = GZ;
let state = { text:'spotify:track:4cOdK2wGLETKBW3PvgPWqT', barColor:'#1DB954', bgColor:'#000000', barCount:23, maxHeight:100 };
// Simple deterministic hash to generate bar heights from text
function textToBars(text, count, maxH){
  if(!text)text='spotify';
  const bars = [];
  // Use a simple hash-based PRNG seeded from text
  let seed = 0;
  for(let i=0;i<text.length;i++) seed = ((seed<<5)-seed + text.charCodeAt(i))|0;
  seed = Math.abs(seed) || 12345;
  for(let i=0;i<count;i++){
    // LCG PRNG
    seed = (seed * 1103515245 + 12345) & 0x7fffffff;
    // Map to 30%-100% of max height with some pattern
    const base = 0.3 + (seed % 1000) / 1000 * 0.7;
    bars.push(Math.round(maxH * base));
  }
  return bars;
}
function generateSVG(){
  const bars = textToBars(state.text, state.barCount, state.maxHeight);
  const barW = 5;
  const gap = 5;
  const totalW = state.barCount * (barW + gap);
  const logoSize = state.maxHeight + 20;
  const padding = 20;
  const W = totalW + logoSize + padding*3;
  const H = state.maxHeight + padding*2;
  let svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">`;
  svg += `<rect width="${W}" height="${H}" rx="12" fill="${state.bgColor}"/>`;
  // Spotify-style circle logo
  const cx = padding + logoSize/2;
  const cy = H/2;
  svg += `<circle cx="${cx}" cy="${cy}" r="${logoSize/2.5}" fill="${state.barColor}"/>`;
  svg += `<path d="M ${cx-8} ${cy-3} a 8 8 0 0 1 16 0 M ${cx-6} ${cy} a 6 6 0 0 1 12 0 M ${cx-4} ${cy+3} a 4 4 0 0 1 8 0" stroke="${state.bgColor}" stroke-width="2" fill="none" stroke-linecap="round"/>`;
  // Bars
  let x = padding + logoSize + padding;
  bars.forEach(h=>{
    const y = (H - h) / 2;
    svg += `<rect x="${x}" y="${y}" width="${barW}" height="${h}" rx="2.5" fill="${state.barColor}"/>`;
    x += barW + gap;
  });
  svg += `</svg>`;
  return svg;
}
function render(){
  const svg = generateSVG();
  $('#preview').innerHTML = `
    <div class="sc-logo" style="color:${state.barColor}">● Spotify</div>
    <div class="sc-svg-container" style="background:${state.bgColor}">
      ${svg}
    </div>
    <div class="sc-info">${state.text || '—'}</div>
  `;
}
function downloadSVG(){
  const svg = generateSVG();
  const blob = new Blob([svg],{type:'image/svg+xml'});
  const link = document.createElement('a');
  link.download = 'spotify-code.svg';
  link.href = URL.createObjectURL(blob);
  link.click();
  URL.revokeObjectURL(link.href);
}
function downloadPNG(){
  const svg = generateSVG();
  const img = new Image();
  const blob = new Blob([svg],{type:'image/svg+xml'});
  const url = URL.createObjectURL(blob);
  img.onload = ()=>{
    const canvas = document.createElement('canvas');
    const scale = 2;
    canvas.width = img.width * scale;
    canvas.height = img.height * scale;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
    canvas.toBlob(b=>{
      const link = document.createElement('a');
      link.download = 'spotify-code.png';
      link.href = URL.createObjectURL(b);
      link.click();
      URL.revokeObjectURL(link.href);
    });
    URL.revokeObjectURL(url);
  };
  img.src = url;
}
function randomize(){
  const colors = ['#1DB954','#FFFFFF','#FF6B6B','#4ECDC4','#FFE66D','#A8E6CF','#FF8B94','#C7CEEA','#FFAAA5','#B5EAD7'];
  state.barColor = colors[Math.floor(Math.random()*colors.length)];
  state.barCount = 15 + Math.floor(Math.random()*15);
  syncControls();
  render();
}
function syncControls(){
  $('#ctrl-text').value = state.text;
  $('#ctrl-bar').value = state.barColor;
  $('#ctrl-bg').value = state.bgColor;
  $('#ctrl-count').value = state.barCount;
  $('#ctrl-height').value = state.maxHeight;
  $('#lbl-count').textContent = state.barCount;
  $('#lbl-height').textContent = state.maxHeight+'px';
}
$('#controls').innerHTML = `
  <label>${t('inputText')}: <input type="text" id="ctrl-text" value="${state.text}" placeholder="${t('placeholder')}" oninput="state.text=this.value;render()" style="width:250px"></label>
  <label>${t('barColor')}: <input type="color" id="ctrl-bar" value="${state.barColor}" onchange="state.barColor=this.value;render()"></label>
  <label>${t('bgColor')}: <input type="color" id="ctrl-bg" value="${state.bgColor}" onchange="state.bgColor=this.value;render()"></label>
  <label>${t('barCount')}: <input type="range" id="ctrl-count" min="10" max="35" value="${state.barCount}" oninput="state.barCount=+this.value;$('#lbl-count').textContent=this.value;render()"> <span id="lbl-count">${state.barCount}</span></label>
  <label>${t('maxHeight')}: <input type="range" id="ctrl-height" min="60" max="160" value="${state.maxHeight}" oninput="state.maxHeight=+this.value;$('#lbl-height').textContent=this.value+'px';render()"> <span id="lbl-height">${state.maxHeight}px</span></label>
  <button class="gz-btn gz-btn-secondary" onclick="randomize()">${t('randomize')}</button>
  <button class="gz-btn" onclick="downloadSVG()">${t('downloadSvg')}</button>
  <button class="gz-btn" onclick="downloadPNG()">${t('downloadPng')}</button>
`;
render();
