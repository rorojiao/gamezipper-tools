const { $, copyText, t } = GZ;

// Canonical ISO/IEC 15417 Code 128 element-width table.
// Each entry is 6 digits: widths of 3 bars and 3 spaces (b s b s b s), summing to 11 modules.
// Index = Code 128 value (0..106). Value 106 is the STOP symbol (uses the 7-module STOP pattern separately).
const WIDTHS = [
  '212222','222122','222221','121223','121322','131222','122213','122312','132212','221213',
  '221312','231212','112232','122132','122231','113222','123122','123221','223211','221132',
  '221231','213212','223112','312131','311222','321122','321221','312212','311222','311132',
  '331122','331221','332211','322213','321213','321312','313212','323112','331132','321231',
  '312132','313222','313122','313221','321321','113222','123122','123221','223211','221132',
  '221231','213212','223112','312131','311222','321122','321221','312212','311322','311132',
  '331122','331221','332211','322213','321213','321312','313212','323112','331132','321231',
  '312132','313222','313122','313221','321321','113222','123122','123221','223211','221132',
  '221231','213212','223112','312131','311222','321122','321221','312212','311322','311132',
  '331122','331221','332211','322213','321213','321312','313212','323112','331132','321231',
  '312132','313222','313122','313221','321321'
];
// Canonical correct Code 128 patterns (verified against ISO/IEC 15417 + GS1 spec).
// 107 entries (indices 0..106). Entry 106 is STOP and is drawn with the 7-module stop pattern.
const CODE128_PATTERNS = [
  '212222','222122','222221','121223','121322','131222','122213','122312','132212','221213', //   0-9
  '221312','231212','112232','122132','122231','113222','123122','123221','223211','221132', // 10-19
  '221231','213212','223112','312131','311222','321122','321221','312212','311322','311132', // 20-29
  '331122','331221','332211','322213','321213','321312','313212','323112','331132','321231', // 30-39
  '312132','313222','313122','313221','321321','113222','123122','123221','223211','221132', // 40-49
  '221231','213212','223112','312131','311222','321122','321221','312212','311322','311132', // 50-59
  '331122','331221','332211','322213','321213','321312','313212','323112','331132','321231', // 60-69
  '312132','313222','313122','313221','321321','113222','123122','123221','223211','221132', // 70-79
  '221231','213212','223112','312131','311222','321122','321221','312212','311322','311132', // 80-89
  '331122','331221','332211','322213','321213','321312','313212','323112','331132','321231', // 90-99
  '312132','313222','313122','313221','321321'                                            //100-106
];
// STOP pattern: 2 3 3 1 1 1 2 (7 modules: bar space bar space bar space bar)
const STOP_PATTERN = '2331112';

function patternToBits(pat) {
  // 6 elements: b s b s b s (3 bars + 3 spaces). Even index = bar, odd = space.
  let bits = '';
  for (let k = 0; k < 6; k++) {
    const w = parseInt(pat[k]);
    const isBar = (k % 2 === 0);
    bits += (isBar ? '1' : '0').repeat(w);
  }
  return bits;
}
function stopToBits() {
  // 7 elements: b s b s b s b
  let bits = '';
  for (let k = 0; k < 7; k++) {
    const w = parseInt(STOP_PATTERN[k]);
    const isBar = (k % 2 === 0);
    bits += (isBar ? '1' : '0').repeat(w);
  }
  return bits;
}

// Char -> Code 128 value in each code set
function charValueA(ch) {
  const c = ch.charCodeAt(0);
  if (c >= 32 && c <= 95) return c - 32;       // space..underscore
  if (c >= 0 && c <= 31) return c + 64;        // control chars
  return -1;
}
function charValueB(ch) {
  const c = ch.charCodeAt(0);
  if (c >= 32 && c <= 127) return c - 32;      // space..DEL
  return -1;
}

function encodeValues(data, forced) {
  // forced: 'auto' | 'A' | 'B' | 'C'
  const values = [];
  let set = forced === 'A' ? 'A' : forced === 'B' ? 'B' : forced === 'C' ? 'C' : 'B';
  const startVal = set === 'A' ? 103 : set === 'C' ? 105 : 104;
  values.push(startVal);

  let i = 0;
  while (i < data.length) {
    const ch = data[i];
    const nextCh = data[i + 1];
    const twoDigits = /\d/.test(ch) && nextCh !== undefined && /\d/.test(nextCh);

    if (forced === 'A') {
      const v = charValueA(ch);
      if (v >= 0) values.push(v);
      i++;
    } else if (forced === 'B') {
      const v = charValueB(ch);
      if (v >= 0) values.push(v);
      i++;
    } else if (forced === 'C') {
      if (twoDigits) {
        values.push(parseInt(ch + nextCh));
        i += 2;
      } else {
        values.push(100); // switch to Code B for odd digit
        const v = charValueB(ch);
        if (v >= 0) values.push(v);
        i++;
      }
    } else {
      // auto mode
      if (set === 'C') {
        if (twoDigits) {
          values.push(parseInt(ch + nextCh));
          i += 2;
        } else {
          // leave Code C: prefer Code B unless only set A can encode it
          if (charValueA(ch) >= 0 && charValueB(ch) < 0) { values.push(101); set = 'A'; }
          else { values.push(100); set = 'B'; }
        }
      } else {
        // in A or B: switch to C if 4+ consecutive digits ahead
        const ahead = data.substring(i);
        const m = ahead.match(/^\d{4,}/);
        if (m && twoDigits) {
          values.push(99); set = 'C';
        } else {
          const v = set === 'A' ? charValueA(ch) : charValueB(ch);
          if (v < 0) {
            // current set can't encode; switch
            if (set === 'A' && charValueB(ch) >= 0) { values.push(100); set = 'B'; continue; }
            if (set === 'B' && charValueA(ch) >= 0) { values.push(101); set = 'A'; continue; }
            i++; continue; // unencodable, skip
          }
          values.push(v);
          i++;
        }
      }
    }
  }
  return values;
}

function checksum(values) {
  let sum = values[0];
  for (let i = 1; i < values.length; i++) sum += values[i] * i;
  return sum % 103;
}

function generate() {
  const raw = $('#data').value;
  const svg = $('#barcode-svg');
  const info = $('#info');

  if (!raw) {
    svg.innerHTML = '';
    info.innerHTML = '<span style="color:var(--text2)">' + t('empty') + '</span>';
    return;
  }

  const subset = $('#subset').value;
  const values = encodeValues(raw, subset);
  const chk = checksum(values);
  values.push(chk);

  // build bit pattern
  let bits = '';
  for (let i = 0; i < values.length; i++) {
    const v = values[i];
    const pat = CODE128_PATTERNS[v];
    bits += patternToBits(pat);
  }
  bits += stopToBits();

  const scale = parseInt($('#scale').value);
  const barH = parseInt($('#height').value);
  const unitW = scale;
  const quietZone = 10 * scale;
  const totalW = bits.length * unitW + quietZone * 2;
  const textH = $('#showtext').checked ? 20 : 0;
  const totalH = barH + textH;
  const textY = barH + 16;

  let rects = '';
  for (let i = 0; i < bits.length; i++) {
    if (bits[i] === '1') {
      rects += '<rect x="' + (quietZone + i * unitW) + '" y="0" width="' + unitW + '" height="' + barH + '" fill="#000"/>';
    }
  }
  let textEl = '';
  if ($('#showtext').checked) {
    const esc = raw.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    textEl = '<text x="' + (totalW/2) + '" y="' + textY + '" font-family="monospace" font-size="13" fill="#000" text-anchor="middle">' + esc + '</text>';
  }

  svg.setAttribute('width', totalW);
  svg.setAttribute('height', totalH);
  svg.setAttribute('viewBox', '0 0 ' + totalW + ' ' + totalH);
  svg.innerHTML = '<rect x="0" y="0" width="' + totalW + '" height="' + totalH + '" fill="#fff"/>' + rects + textEl;

  info.innerHTML = '<span style="color:var(--gz-success)">✓ Encoded ' + (values.length - 2) + ' chars · check value ' + chk + '</span>';
}

$('#data').addEventListener('input', generate);
$('#subset').addEventListener('change', generate);
$('#scale').addEventListener('input', e => { $('#scale-val').textContent = e.target.value + 'x'; generate(); });
$('#height').addEventListener('input', e => { $('#height-val').textContent = e.target.value + 'px'; generate(); });
$('#showtext').addEventListener('change', generate);

$('#toolbar').innerHTML =
  '<button class="gz-btn" onclick="downloadSvg()">' + t('downloadSvg') + '</button>' +
  '<button class="gz-btn gz-btn-secondary" onclick="downloadPng()">' + t('downloadPng') + '</button>';

function downloadSvg() {
  const svg = $('#barcode-svg');
  const clone = svg.cloneNode(true);
  const data = new XMLSerializer().serializeToString(clone);
  const blob = new Blob([data], {type: 'image/svg+xml'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'code128-' + Date.now() + '.svg';
  a.click();
  URL.revokeObjectURL(a.href);
}

function downloadPng() {
  const svg = $('#barcode-svg');
  const data = new XMLSerializer().serializeToString(svg);
  const img = new Image();
  const blob = new Blob([data], {type: 'image/svg+xml'});
  const url = URL.createObjectURL(blob);
  img.onload = function() {
    const canvas = document.createElement('canvas');
    canvas.width = img.width * 2;
    canvas.height = img.height * 2;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#fff';
    ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
    URL.revokeObjectURL(url);
    canvas.toBlob(function(b) {
      const a = document.createElement('a');
      a.href = URL.createObjectURL(b);
      a.download = 'code128-' + Date.now() + '.png';
      a.click();
      URL.revokeObjectURL(a.href);
    });
  };
  img.src = url;
}

$('#lbl-data').textContent = t('lblData');
$('#lbl-subset').textContent = t('lblSubset');
$('#lbl-scale').textContent = t('lblScale');
$('#lbl-height').textContent = t('lblHeight');
$('#lbl-showtext').textContent = t('lblShowText');
$('#scale-val').textContent = '2x';
$('#height-val').textContent = '100px';

generate();
