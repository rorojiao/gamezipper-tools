<script>
GZI18n.register({
  en: {
    toolTitle: 'Docker Compose Generator',
    toolDesc: 'Visually build docker-compose.yml files. Add services, ports, volumes, environment variables and generate clean YAML.',

    serviceName: 'Service Name',

    depends: 'Depends On (comma-sep)',
    restart: 'Restart Policy',
    output: 'Generated docker-compose.yml',
    webStack: 'Web Stack',
    step1: 'Click "Add Service" to create containers',
    step2: 'Fill in image, ports, volumes and environment for each service',
    step3: 'Optionally load the Web Stack preset (nginx + app + db)',
    step4: 'Copy or download the generated docker-compose.yml',
  },
  zh: {
    toolTitle: 'Docker Compose 生成器',
    toolDesc: '可视化构建 docker-compose.yml 文件。添加服务、端口、卷、环境变量，生成干净的 YAML。',
    addService: '+ 添加服务',
    serviceName: '服务名称',
    image: '镜像',
    ports: '端口（主机:容器）',
    volumes: '卷（主机:容器）',
    environment: '环境变量（KEY=value）',
    depends: '依赖（逗号分隔）',
    restart: '重启策略',
    output: '生成的 docker-compose.yml',
    webStack: 'Web 技术栈',
    step1: '点击「添加服务」创建容器',
    step2: '为每个服务填写镜像、端口、卷和环境变量',
    step3: '可选：加载 Web 技术栈预设（nginx + app + db）',
    step4: '复制或下载生成的 docker-compose.yml',
  }
});

const { $, copyText, t } = GZ;
let svcCount = 0;

function addService(data = {}) {
  svcCount++;
  const id = svcCount;
  const div = document.createElement('div');
  div.className = 'service-card';
  div.dataset.sid = id;
  div.innerHTML = `
    <h3>🐳 <span class="svc-name">${data.name || ('service' + id)}</span><button class="remove-svc">×</button></h3>
    <div class="form-grid">
      <div><label>${t('serviceName')}</label><input class="s-name" value="${data.name || ('service' + id)}"></div>
      <div><label>${t('image')}</label><input class="s-image" value="${data.image || 'nginx:latest'}"></div>
      <div><label>${t('ports')}</label><input class="s-ports" value="${data.ports || ''}" placeholder="8080:80"></div>
      <div><label>${t('restart')}</label>
        <select class="s-restart">
          <option value="">(none)</option>
          <option value="always">always</option>
          <option value="unless-stopped">unless-stopped</option>
          <option value="on-failure">on-failure</option>
          <option value="no">no</option>
        </select>
      </div>
      <div><label>${t('depends')}</label><input class="s-depends" value="${data.depends || ''}" placeholder="db,cache"></div>
      <div style="grid-column:1/-1"><label>${t('volumes')}</label><input class="s-volumes" value="${data.volumes || ''}" placeholder="./data:/data"></div>
      <div style="grid-column:1/-1"><label>${t('environment')}</label><textarea class="s-env" placeholder="NODE_ENV=production&#10;DEBUG=true">${data.env || ''}</textarea></div>
    </div>`;
  div.querySelector('.remove-svc').onclick = () => { div.remove(); generate(); };
  div.querySelector('.s-name').oninput = (e) => { div.querySelector('.svc-name').textContent = e.target.value || 'service'; generate(); };
  div.querySelectorAll('input,select,textarea').forEach(el => el.addEventListener('input', generate));
  if (data.restart) div.querySelector('.s-restart').value = data.restart;
  $('#services').appendChild(div);
  generate();
}

function escapeYaml(s) {
  return String(s).replace(/\\/g,'\\\\').replace(/"/g,'\\"');
}

function generate() {
  const cards = document.querySelectorAll('.service-card');
  let yaml = '# Generated by GameZipper Tools\n';
  const hasVolDef = false;
  yaml += '\nservices:\n';
  cards.forEach(card => {
    const name = card.querySelector('.s-name').value.trim() || 'service';
    const image = card.querySelector('.s-image').value.trim();
    const ports = card.querySelector('.s-ports').value.trim();
    const volumes = card.querySelector('.s-volumes').value.trim();
    const env = card.querySelector('.s-env').value.trim();
    const restart = card.querySelector('.s-restart').value;
    const depends = card.querySelector('.s-depends').value.trim();

    yaml += `  ${name}:\n`;
    if (image) yaml += `    image: ${image}\n`;
    if (ports) {
      const plist = ports.split(',').map(p => `"${p.trim()}"`).join(', ');
      yaml += `    ports:\n      - ${plist}\n`;
    }
    if (volumes) {
      yaml += `    volumes:\n`;
      volumes.split(',').forEach(v => { if(v.trim()) yaml += `      - "${v.trim()}"\n`; });
    }
    if (env) {
      yaml += `    environment:\n`;
      env.split('\n').forEach(e => { if(e.trim()) yaml += `      ${e.trim()}\n`; });
    }
    if (depends) {
      yaml += `    depends_on:\n`;
      depends.split(',').forEach(d => { if(d.trim()) yaml += `      - ${d.trim()}\n`; });
    }
    if (restart) yaml += `    restart: ${restart}\n`;
  });
  $('#output').textContent = yaml;
}

function loadWebStack() {
  $('#services').innerHTML = '';
  svcCount = 0;
  addService({ name:'web', image:'nginx:alpine', ports:'80:80', volumes:'./html:/usr/share/nginx/html', restart:'always' });
  addService({ name:'app', image:'node:20-alpine', ports:'3000:3000', env:'NODE_ENV=production\nPORT=3000', depends:'db', restart:'always' });
  addService({ name:'db', image:'postgres:16', ports:'5432:5432', env:'POSTGRES_PASSWORD=secret\nPOSTGRES_DB=myapp', volumes:'./pgdata:/var/lib/postgresql/data', restart:'always' });
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="addService()">${t('addService')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadWebStack()">${t('webStack')}</button>
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="downloadCompose()">${t('download')||'Download'}</button>`;

window.downloadCompose = function() {
  const blob = new Blob([$('#output').textContent], { type: 'text/yaml' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'docker-compose.yml';
  a.click();
};

});

addService({ name:'web', image:'nginx:alpine', ports:'80:80' });
</script>
