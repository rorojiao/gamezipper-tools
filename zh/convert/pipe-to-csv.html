<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"How do I convert pipe-separated data to CSV?","acceptedAnswer":{"@type":"Answer","text":"Paste your pipe-delimited data into the input area and click Convert. The tool splits each line on the pipe character and joins fields with commas, quoting any field that contains commas, quotes or newlines per RFC 4180."}},{"@type":"Question","name":"What is pipe-separated data?","acceptedAnswer":{"@type":"Answer","text":"Pipe-separated values use the vertical bar character (|) as a field delimiter instead of commas. This format is common in legacy systems, log files and data exports where field values may contain commas."}},{"@type":"Question","name":"Can I use a custom delimiter instead of pipe?","acceptedAnswer":{"@type":"Answer","text":"Yes. The delimiter input field lets you change the source separator to any character — semicolon, tab, tilde, caret or any custom string."}},{"@type":"Question","name":"Is my data uploaded anywhere?","acceptedAnswer":{"@type":"Answer","text":"No. All conversion happens entirely in your browser using JavaScript. Your data never leaves your device."}}]}</script>

<script>
GZI18n.register({
  en: {
    toolTitle: 'Pipe-Separated to CSV Converter',
    toolDesc: 'Convert pipe-delimited (|) data to standard CSV instantly. Custom delimiter support, RFC 4180 quoting — 100% browser-based, no upload, no signup.',
    delimiter: 'Delimiter',
    convert: 'Convert',
    done: '✓ Converted',
    step1: 'Paste your pipe-separated data in the input area',
    step2: 'Change the delimiter if needed (default is |)',
    step3: 'Click Convert to generate CSV output',
    step4: 'Copy or download the CSV result',
  },
  zh: {
    toolTitle: '管道符分隔转 CSV 转换器',
    toolDesc: '即时将管道符 (|) 分隔数据转换为标准 CSV。支持自定义分隔符，符合 RFC 4180 引号规范 — 100% 浏览器本地运行，无需上传。',
    delimiter: '分隔符',
    convert: '转换',
    done: '✓ 转换成功',
    step1: '在输入区粘贴管道符分隔数据',
    step2: '如需更改分隔符（默认为 |）',
    step3: '点击「转换」生成 CSV 输出',
    step4: '复制或下载 CSV 结果',
  }
});

let delimiter = '|';
const { $, copyText, t } = GZ;

function parseDelimitedLine(line, delim) {
  if (!delim || delim.length === 0) delim = '|';
  const fields = [];
  let cur = '';
  let inQuotes = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (inQuotes) {
      if (ch === '"' && line[i + 1] === '"') { cur += '"'; i++; }
      else if (ch === '"') { inQuotes = false; }
      else { cur += ch; }
    } else {
      if (ch === '"') { inQuotes = true; }
      else if (line.substr(i, delim.length) === delim) { fields.push(cur); cur = ''; i += delim.length - 1; }
      else { cur += ch; }
    }
  }
  fields.push(cur);
  return fields;
}

function csvField(val) {
  if (/[",\n\r]/.test(val)) {
    return '"' + val.replace(/"/g, '""') + '"';
  }
  return val;
}

function doConvert() {
  const inp = $('#input').value;
  if (!inp.trim()) { $('#output').value = ''; $('#status').innerHTML = ''; return; }
  const lines = inp.split(/\r?\n/).filter(l => l.length > 0);
  const csvLines = lines.map(line => {
    const fields = parseDelimitedLine(line, delimiter);
    return fields.map(csvField).join(',');
  });
  $('#output').value = csvLines.join('\n') + '\n';
  $('#status').innerHTML = `<span style="color:var(--gz-success)">${t('done')} — ${lines.length} ${lines.length === 1 ? 'row' : 'rows'}</span>`;
}

function loadExample() {
  $('#input').value = 'Name|Age|City|Notes\nAlice|30|New York|Likes coffee\nBob|25|London, UK|"Enjoys ""coding"""\nCarol|28|Tokyo|No issues';
  doConvert();
}

function doClear() { $('#input').value = ''; $('#output').value = ''; $('#status').innerHTML = ''; }

$('#input').addEventListener('input', doConvert);

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="doConvert()">${t('convert')}</button>
  <label style="font-size:.85em;display:inline-flex;align-items:center;gap:4px">${t('delimiter')}: <input type="text" value="|" style="width:40px;text-align:center" onchange="delimiter=this.value||'|';doConvert()"></label>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn" onclick="copyText($('#output').value)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

});
