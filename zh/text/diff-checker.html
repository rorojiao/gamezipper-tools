<script>
GZI18n.register({
  en: {
    toolTitle: 'Text Diff Checker',
    toolDesc: 'Compare two texts side by side and see every difference highlighted — added lines, removed lines, and changes. Free, instant, browser-based.',
    compare: '🔍 Compare',
    clear: '🗑️ Clear',
    swap: '🔄 Swap',
    lblOriginal: '📄 Original Text',
    lblModified: '📝 Modified Text',
    added: 'Added',
    removed: 'Removed',
    unchanged: 'Unchanged',
    totalLines: 'Total Lines',
    noDiff: '✅ Both texts are identical!',
    step1: 'Paste the original text in the left panel',
    step2: 'Paste the modified text in the right panel',
    step3: 'Click "Compare" to see differences',
    step4: 'Green = added, Red = removed, Gray = unchanged',
  },
  zh: {
    toolTitle: '文本差异对比工具',
    toolDesc: '并排对比两段文本，高亮显示每一处差异 — 新增行、删除行和修改。免费即时，浏览器本地运行。',
    compare: '🔍 对比',
    clear: '🗑️ 清空',
    swap: '🔄 交换',
    lblOriginal: '📄 原始文本',
    lblModified: '📝 修改后文本',
    added: '新增',
    removed: '删除',
    unchanged: '未变',
    totalLines: '总行数',
    noDiff: '✅ 两段文本完全相同！',
    step1: '在左侧面板粘贴原始文本',
    step2: '在右侧面板粘贴修改后的文本',
    step3: '点击「对比」查看差异',
    step4: '绿色 = 新增，红色 = 删除，灰色 = 未变',
  }
});

const { $, copyText, t } = GZ;

$('#toolbar').innerHTML = `<button class="gz-btn" id="btn-compare">${t('compare')}</button><button class="gz-btn secondary" id="btn-swap">${t('swap')}</button><button class="gz-btn secondary" id="btn-clear">${t('clear')}</button>`;
$('#lbl-original').textContent = t('lblOriginal');
$('#lbl-modified').textContent = t('lblModified');

// Simple LCS-based diff
function diff(a, b) {
  const m = a.length, n = b.length;
  // Build LCS table
  const dp = Array.from({length: m + 1}, () => new Array(n + 1).fill(0));
  for (let i = 1; i <= m; i++) {
    for (let j = 1; j <= n; j++) {
      if (a[i-1] === b[j-1]) dp[i][j] = dp[i-1][j-1] + 1;
      else dp[i][j] = Math.max(dp[i-1][j], dp[i][j-1]);
    }
  }
  // Backtrack to find diff
  const result = [];
  let i = m, j = n;
  while (i > 0 || j > 0) {
    if (i > 0 && j > 0 && a[i-1] === b[j-1]) {
      result.unshift({type: 'ctx', text: a[i-1]});
      i--; j--;
    } else if (j > 0 && (i === 0 || dp[i][j-1] >= dp[i-1][j])) {
      result.unshift({type: 'add', text: b[j-1]});
      j--;
    } else {
      result.unshift({type: 'rem', text: a[i-1]});
      i--;
    }
  }
  return result;
}

function compare() {
  const a = $('#text-a').value.split('\n');
  const b = $('#text-b').value.split('\n');
  const result = diff(a, b);

  let added = 0, removed = 0, ctx = 0;
  result.forEach(r => { if (r.type==='add') added++; else if (r.type==='rem') removed++; else ctx++; });

  $('#stats').style.display = 'flex';
  $('#stats').innerHTML = `
    <div class="stat added"><span class="num">+${added}</span>${t('added')}</div>
    <div class="stat removed"><span class="num">-${removed}</span>${t('removed')}</div>
    <div class="stat"><span class="num">${ctx}</span>${t('unchanged')}</div>
    <div class="stat"><span class="num">${result.length}</span>${t('totalLines')}</div>
  `;

  if (added === 0 && removed === 0) {
    $('#output').style.display = 'block';
    $('#output').innerHTML = `<div style="text-align:center;padding:20px;color:var(--accent)">${t('noDiff')}</div>`;
    return;
  }

  let lineNum = 0;
  const html = result.map(r => {
    lineNum++;
    const cls = r.type === 'add' ? 'line-add' : (r.type === 'rem' ? 'line-rem' : 'line-ctx');
    const prefix = r.type === 'add' ? '+' : (r.type === 'rem' ? '−' : ' ');
    const escaped = r.text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    return `<div class="line ${cls}"><span class="line-num">${lineNum}</span>${prefix} ${escaped}</div>`;
  }).join('');

  $('#output').style.display = 'block';
  $('#output').innerHTML = html;
}

$('#btn-compare').onclick = compare;
$('#btn-swap').onclick = () => {
  const tmp = $('#text-a').value;
  $('#text-a').value = $('#text-b').value;
  $('#text-b').value = tmp;
};
$('#btn-clear').onclick = () => {
  $('#text-a').value = '';
  $('#text-b').value = '';
  $('#output').style.display = 'none';
  $('#stats').style.display = 'none';
};

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {href:'/text/proofreading-tool.html',icon:'✏️',name:'Proofreading Tool'},
    {href:'/text/word-counter.html',icon:'📝',name:'Word Counter'},
    {href:'/dev/json-diff.html',icon:'{}',name:'JSON Diff'},
    
  ]
});
</script>
