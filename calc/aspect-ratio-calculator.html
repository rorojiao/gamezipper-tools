<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is aspect ratio?", "acceptedAnswer": {"@type": "Answer", "text": "Aspect ratio is the proportional relationship between an image's width and height, written as two numbers separated by a colon (for example 16:9). It tells you how wide something is relative to how tall it is — independent of actual size."}}, {"@type": "Question", "name": "How do I calculate the missing dimension?", "acceptedAnswer": {"@type": "Answer", "text": "Enter the known width and the ratio, then click Calculate. The tool fills in the height (or vice-versa). It also shows what the image looks like at common resolutions while keeping that exact ratio."}}, {"@type": "Question", "name": "Can I lock one side and resize the other?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. Type any width OR height, pick a ratio from the presets, and the other dimension updates instantly. Use this to keep an image perfectly proportioned when resizing for Instagram, YouTube, banners or print."}}, {"@type": "Question", "name": "Is my data sent anywhere?", "acceptedAnswer": {"@type": "Answer", "text": "No. All math runs in your browser. Nothing is uploaded, nothing is stored."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">

  </div>
  <div class="gz-tool-area">
    <div class="ar-grid">
      <div>
        <label id="lbl-w"></label>
        <input type="number" id="w" value="1920" min="1">
      </div>
      <div>

        <input type="number" id="h" value="1080" min="1">
      </div>
      <div>
        <label id="lbl-rw"></label>
        <input type="number" id="rw" value="16" min="1">
      </div>
      <div>
        <label id="lbl-rh"></label>
        <input type="number" id="rh" value="9" min="1">
      </div>
    </div>
    <div class="ar-presets" id="presets"></div>
    <div class="ar-result">
      <div class="ar-card"><div class="v" id="ratio-dec">1.778</div><div class="l" id="lbl-dec"></div></div>
      <div class="ar-card"><div class="v" id="ratio-pct">177.8%</div><div class="l" id="lbl-pct"></div></div>
      <div class="ar-card"><div class="v" id="ratio-gcd">16:9</div><div class="l" id="lbl-gcd"></div></div>
    </div>

        <div class="lbl" id="box-lbl">1920 × 1080</div>
      </div>
    </div>

    <div class="ar-sizes" id="sizes"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Aspect Ratio Calculator',
    toolDesc: 'Solve for missing width or height, resize by any aspect ratio (16:9, 4:3, 21:9, 1:1, 9:16). With preset list and live preview — runs in your browser.',
    width: 'Width (px)',
    height: 'Height (px)',
    rw: 'Ratio width',
    rh: 'Ratio height',
    presets: 'Common presets',
    dec: 'Ratio (decimal)',
    pct: 'Width as % of height',
    gcd: 'Simplified ratio',
    sizesLabel: 'Common sizes for this ratio',
    step1: 'Enter width OR height plus a ratio (e.g. 16:9)',
    step2: 'Click a preset or type your own ratio',
    step3: 'The other dimension updates instantly',
    step4: 'Use the live preview to see the proportions',
  },
  zh: {
    toolTitle: '宽高比计算器',
    toolDesc: '根据宽高比求解缺失的宽或高，支持 16:9、4:3、21:9、1:1、9:16 等常见预设，带实时预览。',
    width: '宽度 (px)',
    height: '高度 (px)',
    rw: '比例宽',
    rh: '比例高',
    presets: '常见预设',
    dec: '宽高比（小数）',
    pct: '宽度占高度百分比',
    gcd: '最简比例',
    sizesLabel: '该比例的常见尺寸',
    step1: '输入宽或高以及比例（如 16:9）',
    step2: '点击预设或输入自定义比例',
    step3: '另一维度自动计算',
    step4: '实时预览显示比例效果',
  }
});

const { $, t } = GZ;
const PRESETS = [
  { name: '1:1', w: 1, h: 1 },
  { name: '4:3', w: 4, h: 3 },
  { name: '3:2', w: 3, h: 2 },
  { name: '16:9', w: 16, h: 9 },
  { name: '16:10', w: 16, h: 10 },
  { name: '21:9', w: 21, h: 9 },
  { name: '9:16', w: 9, h: 16 },
  { name: '2:3', w: 2, h: 3 },
  { name: '3:4', w: 3, h: 4 },
  { name: '5:4', w: 5, h: 4 },
  { name: '5:3', w: 5, h: 3 },
  { name: '18:9', w: 18, h: 9 },
];

function gcd(a, b) {
  a = Math.round(Math.abs(a)); b = Math.round(Math.abs(b));
  while (b) { [a, b] = [b, a % b]; }
  return a || 1;
}

function calc() {
  let w = parseFloat($('#w').value);
  let h = parseFloat($('#h').value);
  const rw = parseFloat($('#rw').value) || 1;
  const rh = parseFloat($('#rh').value) || 1;

  // Auto-fill the blank of (w,h) if exactly one is 0 or NaN
  // Strategy: if both entered, just compute the ratio. If only one entered, fill the other.
  // Simple rule: if both > 0 → compute ratio from inputs; if only one > 0 → fill the other.
  if (w > 0 && !(h > 0)) {
    h = w * rh / rw;
    $('#h').value = Math.round(h);
  } else if (h > 0 && !(w > 0)) {
    w = h * rw / rh;
    $('#w').value = Math.round(w);
  }
  if (!(w > 0) || !(h > 0)) return;
  const dec = w / h;
  const gcdVal = gcd(rw, rh);
  const simpleW = rw / gcdVal;
  const simpleH = rh / gcdVal;
  $('#ratio-dec').textContent = dec.toFixed(3);
  $('#ratio-pct').textContent = (dec * 100).toFixed(1) + '%';
  $('#ratio-gcd').textContent = `${simpleW}:${simpleH}`;
  $('#box-lbl').textContent = `${Math.round(w)} × ${Math.round(h)}`;

  // Preview: max 480px width
  const maxW = 480;
  const ratio = w / h;
  let pw, ph;
  if (ratio >= 1) { pw = maxW; ph = maxW / ratio; }
  else { ph = maxW; pw = maxW * ratio; }
  pw = Math.max(20, Math.round(pw)); ph = Math.max(20, Math.round(ph));
  const box = $('#box');
  box.style.width = pw + 'px';
  box.style.height = ph + 'px';

  // Common sizes
  const baseSizes = [240, 360, 480, 640, 720, 1080, 1280, 1440, 1920, 2560, 3840];
  $('#sizes').innerHTML = baseSizes.map(s => {
    if (ratio >= 1) {
      return `<div class="ar-size"><b>${s}</b> × ${Math.round(s / ratio)}</div>`;
    } else {
      return `<div class="ar-size"><b>${Math.round(s * ratio)}</b> × ${s}</div>`;
    }
  }).join('');
}

// Render presets
$('#presets').innerHTML = PRESETS.map(p => `<span class="ar-preset" data-w="${p.w}" data-h="${p.h}">${p.name}</span>`).join('');
document.querySelectorAll('.ar-preset').forEach(el => {
  el.addEventListener('click', () => {
    $('#rw').value = el.dataset.w;
    $('#rh').value = el.dataset.h;
    calc();
  });
});

// Bind inputs
['w','h','rw','rh'].forEach(id => {
  $('#' + id).addEventListener('input', calc);
});

// Init labels
$('#lbl-w').textContent = t('width');
$('#lbl-h').textContent = t('height');
$('#lbl-rw').textContent = t('rw');
$('#lbl-rh').textContent = t('rh');
$('#lbl-dec').textContent = t('dec');
$('#lbl-pct').textContent = t('pct');
$('#lbl-gcd').textContent = t('gcd');
$('#sizes-label').textContent = t('sizesLabel');

calc();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📐', href:'/calc/aspect-ratio.html', name:'Aspect Ratio'},
    {icon:'🖥️', href:'/calc/tv-size-calculator.html', name:'TV Size'},
    {icon:'📱', href:'/calc/dpi-calculator.html', name:'DPI Calculator'},
    {icon:'🖼️', href:'/image/resizer.html', name:'Image Resizer'},
  ]
});
</script>
<script src="/tools-result-rec.js?v=20260707v520" defer></script>
</body>
