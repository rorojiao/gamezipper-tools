<script>
GZI18n.register({
  en: {
    toolTitle: 'CSS Filter Generator',
    toolDesc: 'Generate CSS filter effects visually with sliders — brightness, contrast, blur, grayscale, sepia, saturate, hue-rotate and invert.',
    brightness: 'Brightness',
    contrast: 'Contrast',
    blur: 'Blur',
    grayscale: 'Grayscale',
    sepia: 'Sepia',
    saturate: 'Saturate',
    hueRotate: 'Hue Rotate',
    invert: 'Invert',
    copy: 'Copy',
    reset: 'Reset',
    copied: 'Copied!',
    presetNone: 'None',
    presetVintage: 'Vintage',
    presetDramatic: 'Dramatic',
    presetCool: 'Cool Tone',
    presetWarm: 'Warm Tone',
    presetBw: 'B & W',
    presetDreamy: 'Dreamy',
    step1: 'Adjust the sliders to modify each CSS filter property',
    step2: 'Click a preset to apply a curated filter combination',
    step3: 'See the live preview update in real-time',
    step4: 'Copy the generated CSS code to your project',
  },
  zh: {
    toolTitle: 'CSS 滤镜生成器',
    toolDesc: '可视化生成 CSS 滤镜效果 — 亮度、对比度、模糊、灰度、褐色、饱和度、色相旋转和反转。',
    brightness: '亮度',
    contrast: '对比度',
    blur: '模糊',
    grayscale: '灰度',
    sepia: '褐色',
    saturate: '饱和度',
    hueRotate: '色相旋转',
    invert: '反转',
    copy: '复制',
    reset: '重置',
    copied: '已复制！',
    presetNone: '无',
    presetVintage: '复古',
    presetDramatic: '戏剧',
    presetCool: '冷色调',
    presetWarm: '暖色调',
    presetBw: '黑白',
    presetDreamy: '梦幻',
    step1: '拖动滑块调整各个 CSS 滤镜属性',
    step2: '点击预设按钮应用精选滤镜组合',
    step3: '实时预览滤镜效果',
    step4: '复制生成的 CSS 代码到你的项目中',
  }
});

const { $, copyText, t } = GZ;

const filters = [
  { key: 'brightness', min: 0, max: 3, step: 0.05, def: 1, unit: '', css: v => `brightness(${v})` },
  { key: 'contrast', min: 0, max: 3, step: 0.05, def: 1, unit: '', css: v => `contrast(${v})` },
  { key: 'blur', min: 0, max: 20, step: 0.5, def: 0, unit: 'px', css: v => `blur(${v}px)` },
  { key: 'grayscale', min: 0, max: 1, step: 0.05, def: 0, unit: '', css: v => `grayscale(${v})` },
  { key: 'sepia', min: 0, max: 1, step: 0.05, def: 0, unit: '', css: v => `sepia(${v})` },
  { key: 'saturate', min: 0, max: 3, step: 0.05, def: 1, unit: '', css: v => `saturate(${v})` },
  { key: 'hueRotate', min: 0, max: 360, step: 5, def: 0, unit: 'deg', css: v => `hue-rotate(${v}deg)` },
  { key: 'invert', min: 0, max: 1, step: 0.05, def: 0, unit: '', css: v => `invert(${v})` },
];

const vals = {};
filters.forEach(f => vals[f.key] = f.def);

function buildControls() {
  const c = $('#controls');
  c.innerHTML = filters.map(f => `
    <div class="filter-control">
      <label>${t(f.key)} <span id="val-${f.key}">${f.def}${f.unit}</span></label>
      <input type="range" id="slider-${f.key}" min="${f.min}" max="${f.max}" step="${f.step}" value="${f.def}" data-key="${f.key}">
    </div>`).join('');
  c.querySelectorAll('input[type="range"]').forEach(s => {
    s.addEventListener('input', () => {
      const f = filters.find(x => x.key === s.dataset.key);
      vals[f.key] = parseFloat(s.value);
      $(`#val-${f.key}`).textContent = s.value + f.unit;
      update();
    });
  });
}

function buildPresets() {
  const presets = [
    { name: 'presetNone', values: {} },
    { name: 'presetVintage', values: { sepia: 0.6, saturate: 1.4, contrast: 1.1, brightness: 0.95 } },
    { name: 'presetDramatic', values: { contrast: 1.6, saturate: 1.5, brightness: 0.9 } },
    { name: 'presetCool', values: { hueRotate: 200, saturate: 0.9, brightness: 1.05 } },
    { name: 'presetWarm', values: { sepia: 0.3, saturate: 1.3, hueRotate: 15, brightness: 1.05 } },
    { name: 'presetBw', values: { grayscale: 1, contrast: 1.2 } },
    { name: 'presetDreamy', values: { blur: 1.5, brightness: 1.1, saturate: 1.3 } },
  ];
  $('#presets').innerHTML = presets.map((p, i) =>
    `<button class="gz-btn gz-btn-secondary" data-preset="${i}">${t(p.name)}</button>`
  ).join('');
  $('#presets').querySelectorAll('button').forEach(btn => {
    btn.addEventListener('click', () => {
      const p = presets[+btn.dataset.preset];
      filters.forEach(f => {
        vals[f.key] = p.values[f.key] !== undefined ? p.values[f.key] : f.def;
        $(`#slider-${f.key}`).value = vals[f.key];
        $(`#val-${f.key}`).textContent = vals[f.key] + f.unit;
      });
      update();
    });
  });
}

function getFilterString() {
  const parts = filters
    .filter(f => vals[f.key] !== f.def)
    .map(f => f.css(vals[f.key]));
  return parts.length ? parts.join(' ') : 'none';
}

function update() {
  const filterStr = getFilterString();
  $('#preview').style.filter = filterStr;
  const code = filterStr === 'none'
    ? 'filter: none;'
    : `filter: ${filterStr};`;
  $('#codeBlock').innerHTML = `<button class="gz-btn copy-btn" onclick="doCopy()">${t('copy')}</button>filter: ${filterStr};`;
}

window.doCopy = () => {
  copyText('filter: ' + getFilterString() + ';');
  const btn = $('#codeBlock .copy-btn');
  btn.textContent = t('copied');
  setTimeout(() => btn.textContent = t('copy'), 1500);
};

window.doReset = () => {
  filters.forEach(f => {
    vals[f.key] = f.def;
    $(`#slider-${f.key}`).value = f.def;
    $(`#val-${f.key}`).textContent = f.def + f.unit;
  });
  update();
};

$('#toolbar').innerHTML = `
  <button class="gz-btn gz-btn-secondary" onclick="doReset()">${t('reset')}</button>`;

buildControls();
buildPresets();
update();

GZ.renderToolPage({
  category: 'css',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🌈', href:'/css-tools/gradient.html', name:'CSS Gradient'},
    {icon:'🎨', href:'/image/filters.html', name:'Image Filters'},
    {icon:'✏️', href:'/css-tools/text-shadow.html', name:'Text Shadow'},
    {icon:'🪟', href:'/css-tools/glassmorphism.html', name:'Glassmorphism'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
