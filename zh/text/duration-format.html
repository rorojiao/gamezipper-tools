<script>

    styleIso: 'ISO 8601（PT1H5M30S）',
    styleBreakdown: '明细分解',
    copyValue: '复制',
    days: '天', day: '天', hours: '小时', hour: '小时',
    minutes: '分钟', minute: '分钟', seconds: '秒', second: '秒',
    ms: '毫秒', msShort: '毫秒',
    invalid: '请输入有效的数字或 HH:MM:SS 时间',
    note: '提示：可粘贴 01:23:45 等时间戳或纯数字，工具会自动识别格式。所有操作均在浏览器本地完成。',
    step1: '输入秒数、毫秒数，或 01:05:30 格式的时间戳',
    step2: '选择输入模式（自动、秒 或 毫秒）',
    step3: '查看五种输出风格 — 紧凑、时钟、文字、ISO 8601 和明细',

});

const { $, copyText, t } = GZ;

function parseInput() {
  const raw = $('#input').value.trim();
  if (!raw) return null;
  const mode = $('#mode').value;
  // Try HH:MM:SS or MM:SS pattern first
  const tsMatch = raw.match(/^(\d+):([0-5]?\d)(?::([0-5]?\d))?(?:\.(\d{1,3}))?$/);
  if (tsMatch && mode === 'auto') {
    const h = parseInt(tsMatch[1]) || 0;
    const m = parseInt(tsMatch[2]) || 0;
    const s = parseInt(tsMatch[3]) || 0;
    const ms = tsMatch[4] ? parseInt(tsMatch[4].padEnd(3, '0')) : 0;
    return (((h * 60) + m) * 60 + s) * 1000 + ms;
  }
  const num = Number(raw.replace(/[, ]/g, ''));
  if (!isFinite(num) || num < 0) return null;
  if (mode === 'ms') return num;
  return num * 1000; // seconds -> ms
}

function pluralize(n, word) {
  if (n === 1) return n + ' ' + t(word.slice(0, -1) === '' ? word : (word.endsWith('s') ? word.slice(0, -1) : word));
  return n + ' ' + t(word);
}

function formatCompact(parts) {
  const { d, h, m, s, ms } = parts;
  const bits = [];
  if (d) bits.push(d + 'd');
  if (h) bits.push(h + 'h');
  if (m) bits.push(m + 'm');
  if (s) bits.push(s + 's');
  if (ms && !d && !h) bits.push(ms + 'ms');
  return bits.length ? bits.join(' ') : '0s';
}

function formatClock(parts) {
  const { d, h, m, s, ms } = parts;
  let hh = h;
  if (d) hh += d * 24;
  const pad = n => String(n).padStart(2, '0');
  let out = `${pad(hh)}:${pad(m)}:${pad(s)}`;
  if (ms && !d) out += '.' + String(ms).padStart(3, '0');
  return out;
}

function formatWords(parts) {
  const { d, h, m, s, ms } = parts;
  const bits = [];
  if (d) bits.push(d + ' ' + (d === 1 ? t('day') : t('days')));
  if (h) bits.push(h + ' ' + (h === 1 ? t('hour') : t('hours')));
  if (m) bits.push(m + ' ' + (m === 1 ? t('minute') : t('minutes')));
  if (s) bits.push(s + ' ' + (s === 1 ? t('second') : t('seconds')));
  if (ms && !d && !h && !m) bits.push(ms + ' ' + t('ms'));
  return bits.length ? bits.join(' ') : '0 ' + t('seconds');
}

function formatIso(parts) {
  const { d, h, m, s, ms } = parts;
  let out = 'PT';
  if (d) out += d + 'D';
  // ISO 8601 period goes PnYnMnDTnHnMnS — but for durations < 1 day, PT is fine
  if (d) out = 'P' + d + 'D' + (h || m || s ? 'T' : '');
  if (h) out += h + 'H';
  if (m) out += m + 'M';
  if (s || ms) {
    const frac = ms ? '.' + String(ms).padStart(3, '0').replace(/0+$/, '') : '';
    out += s + frac + 'S';
  }
  return out === 'PT' ? 'PT0S' : out;
}

function breakDown(totalMs) {
  let ms = Math.floor(totalMs % 1000);
  let totalSec = Math.floor(totalMs / 1000);
  const s = totalSec % 60;
  totalSec = Math.floor(totalSec / 60);
  const m = totalSec % 60;
  const totalH = Math.floor(totalSec / 60);
  const h = totalH % 24;
  const d = Math.floor(totalH / 24);
  return { d, h, m, s, ms };
}

function render() {
  const totalMs = parseInput();
  const out = $('#output');
  if (totalMs === null) {
    const raw = $('#input').value.trim();
    out.innerHTML = raw ? `<div style="color:var(--gz-accent)">${t('invalid')}</div>` : '<div style="color:var(--text2);opacity:.6">—</div>';
    return;
  }
  const parts = breakDown(totalMs);
  const compact = formatCompact(parts);
  const clock = formatClock(parts);
  const words = formatWords(parts);
  const iso = formatIso(parts);
  const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const row = (label, value) => `
    <div class="df-result-row">
      <span class="label">${label}</span>
      <span class="value">${esc(value)}</span>
      <button class="df-copy-btn" onclick="copyText('${esc(value).replace(/'/g,"\\'")}')">${t('copyValue')}</button>
    </div>`;
  out.innerHTML = `
    ${row(t('styleCompact'), compact)}
    ${row(t('styleClock'), clock)}
    ${row(t('styleWords'), words)}
    ${row(t('styleIso'), iso)}
    <div class="df-result-row" style="border-top:1px solid var(--border);margin-top:6px;padding-top:12px;font-weight:600">
      <span class="label">${t('styleBreakdown')}</span>
      <span class="value">${parts.d}d · ${parts.h}h · ${parts.m}m · ${parts.s}s · ${parts.ms}${t('msShort')}</span>
    </div>`;
}

function loadExample() {
  $('#input').value = '3930';
  $('#mode').value = 'auto';
  render();
}

function doClear() { $('#input').value = ''; render(); }

$('#input').addEventListener('input', render);
$('#mode').addEventListener('change', render);
$('#note').textContent = t('note');
$('#lbl-input').textContent = t('lblInput');
$('#lbl-mode').textContent = t('lblMode');

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

});

render();
</script>
