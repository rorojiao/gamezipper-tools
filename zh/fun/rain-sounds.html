.sleep-timer select{padding:4px 8px;border:1px solid var(--border);border-radius:6px;background:var(--bg);color:var(--text)}

<div class="gz-container">

<script>
GZI18n.register({
  en: {
    toolTitle: 'Rain Sound Generator 🌧️',
    toolDesc: 'Generate calming rain sounds for sleep, focus and relaxation. Adjust intensity, add thunder and wind, set a sleep timer — all synthesized in your browser.',
    play: 'Play Rain',
    stop: 'Stop Rain',
    lblIntensity: 'Rain Intensity',
    lblVolume: 'Volume',
    thunder: 'Thunder',
    wind: 'Wind',
    on: 'On',
    off: 'Off',
    sleepLabel: 'Sleep Timer',
    step1: 'Click Play Rain to start the rain sound',
    step2: 'Adjust the intensity slider to control how heavy the rain is',
    step3: 'Toggle Thunder or Wind for a richer soundscape',
    step4: 'Set a sleep timer to automatically stop the sound',
  },
  zh: {
    toolTitle: '雨声生成器 🌧️',
    toolDesc: '生成舒缓的雨声，助眠、专注和放松。调节雨量大小，添加雷声和风声，设置睡眠定时器 — 全部在浏览器中合成。',
    play: '播放雨声',
    stop: '停止雨声',
    lblIntensity: '雨量大小',
    lblVolume: '音量',
    thunder: '雷声',
    wind: '风声',
    on: '开',
    off: '关',
    sleepLabel: '睡眠定时器',
    step1: '点击「播放雨声」开始播放',
    step2: '拖动雨量大小滑块控制雨的强度',
    step3: '切换雷声或风声获得更丰富的声景',
    step4: '设置睡眠定时器自动停止播放',
  }
});

const { $, t } = GZ;

let audioCtx = null;
let rainSource = null;
let rainGain = null;
let thunderEnabled = false;
let windEnabled = false;
let isPlaying = false;
let sleepTimeout = null;
let thunderInterval = null;
let lightningTimeout = null;

function createRainNoise() {
  // Create white noise buffer
  const bufferSize = audioCtx.sampleRate * 2;
  const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) {
    data[i] = Math.random() * 2 - 1;
  }

  rainSource = audioCtx.createBufferSource();
  rainSource.buffer = buffer;
  rainSource.loop = true;

  // Filter to make it sound like rain (high-pass for the hiss, low-pass to soften)
  const hpFilter = audioCtx.createBiquadFilter();
  hpFilter.type = 'highpass';
  hpFilter.frequency.value = 800;

  const lpFilter = audioCtx.createBiquadFilter();
  lpFilter.type = 'lowpass';
  lpFilter.frequency.value = 5000;

  rainGain = audioCtx.createGain();
  rainGain.gain.value = ($('#volume').value / 100) * ($('#intensity').value / 100) * 0.5;

  rainSource.connect(hpFilter);
  hpFilter.connect(lpFilter);
  lpFilter.connect(rainGain);
  rainGain.connect(audioCtx.destination);
  rainSource.start(0);
}

function playThunder() {
  if (!audioCtx || !thunderEnabled) return;
  // Flash lightning
  const flash = $('#lightning');
  flash.style.opacity = '0.6';
  setTimeout(() => flash.style.opacity = '0', 100);
  setTimeout(() => { flash.style.opacity = '0.3'; }, 200);
  setTimeout(() => flash.style.opacity = '0', 300);

  // Thunder rumble
  const bufferSize = audioCtx.sampleRate * 3;
  const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) {
    const t = i / bufferSize;
    data[i] = (Math.random() * 2 - 1) * Math.pow(1 - t, 2) * 0.6;
  }
  const src = audioCtx.createBufferSource();
  src.buffer = buffer;
  const filter = audioCtx.createBiquadFilter();
  filter.type = 'lowpass';
  filter.frequency.value = 200;
  const gain = audioCtx.createGain();
  gain.gain.value = 0.3;
  src.connect(filter);
  filter.connect(gain);
  gain.connect(audioCtx.destination);
  src.start();
}

function togglePlay() {
  if (isPlaying) {
    stopAll();
  } else {
    startPlay();
  }
}

function startPlay() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  createRainNoise();
  isPlaying = true;
  $('#play-btn').classList.add('playing');
  $('#play-btn').innerHTML = '⏸ <span>' + t('stop') + '</span>';
  startRainAnimation();
  if (thunderEnabled) startThunderLoop();
}

function stopAll() {
  if (rainSource) { try { rainSource.stop(); } catch(e){} rainSource = null; }
  isPlaying = false;
  $('#play-btn').classList.remove('playing');
  $('#play-btn').innerHTML = '▶ <span>' + t('play') + '</span>';
  stopRainAnimation();
  if (thunderInterval) { clearInterval(thunderInterval); thunderInterval = null; }
}

function toggleThunder() {
  thunderEnabled = !thunderEnabled;
  const btn = $('#btn-thunder');
  if (thunderEnabled) {
    btn.classList.add('active');
    btn.innerHTML = '⚡ <span>' + t('thunder') + ' ' + t('on') + '</span>';
    if (isPlaying) startThunderLoop();
  } else {
    btn.classList.remove('active');
    btn.innerHTML = '⚡ <span>' + t('thunder') + ' ' + t('off') + '</span>';
    if (thunderInterval) { clearInterval(thunderInterval); thunderInterval = null; }
  }
}

function toggleWind() {
  windEnabled = !windEnabled;
  const btn = $('#btn-wind');
  if (windEnabled) {
    btn.classList.add('active');
    btn.innerHTML = '🌬️ <span>' + t('wind') + ' ' + t('on') + '</span>';
  } else {
    btn.classList.remove('active');
    btn.innerHTML = '🌬️ <span>' + t('wind') + ' ' + t('off') + '</span>';
  }
}

function startThunderLoop() {
  if (thunderInterval) clearInterval(thunderInterval);
  thunderInterval = setInterval(() => {
    if (Math.random() < 0.4) playThunder();
  }, 8000 + Math.random() * 15000);
  // First thunder after 3-8 seconds
  setTimeout(() => { if (thunderEnabled && isPlaying) playThunder(); }, 3000 + Math.random() * 5000);
}

function startRainAnimation() {
  const layer = $('#rain-layer');
  layer.innerHTML = '';
  const count = Math.floor(($('#intensity').value / 100) * 80) + 20;
  for (let i = 0; i < count; i++) {
    const drop = document.createElement('div');
    drop.className = 'raindrop';
    drop.style.left = Math.random() * 100 + '%';
    drop.style.animationDuration = (0.3 + Math.random() * 0.4) + 's';
    drop.style.animationDelay = Math.random() * 1 + 's';
    drop.style.opacity = 0.3 + Math.random() * 0.4;
    layer.appendChild(drop);
  }
}

function stopRainAnimation() {
  $('#rain-layer').innerHTML = '';
}

$('#intensity').addEventListener('input', function() {
  $('#intensity-val').textContent = this.value + '%';
  if (rainGain) rainGain.gain.value = ($('#volume').value / 100) * (this.value / 100) * 0.5;
  if (isPlaying) startRainAnimation();
});

$('#volume').addEventListener('input', function() {
  $('#volume-val').textContent = this.value + '%';
  if (rainGain) rainGain.gain.value = (this.value / 100) * ($('#intensity').value / 100) * 0.5;
});

function setSleepTimer() {
  if (sleepTimeout) { clearTimeout(sleepTimeout); sleepTimeout = null; }
  const mins = parseInt($('#sleep-timer').value);
  if (mins > 0 && isPlaying) {
    sleepTimeout = setTimeout(() => { stopAll(); $('#sleep-timer').value = '0'; }, mins * 60 * 1000);
  }
}

// Initialize labels
$('#play-text').textContent = t('play');
$('#lbl-intensity').textContent = t('lblIntensity');
$('#lbl-volume').textContent = t('lblVolume');
$('#btn-thunder').innerHTML = '⚡ <span>' + t('thunder') + ' ' + t('off') + '</span>';
$('#btn-wind').innerHTML = '🌬️ <span>' + t('wind') + ' ' + t('off') + '</span>';
$('#sleep-label').textContent = t('sleepLabel');

GZ.renderToolPage({
  category: 'fun',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'☁️', href:'/fun/white-noise.html', name:'White Noise'},
    {icon:'🧘', href:'/fun/box-breathing.html', name:'Box Breathing'},
    {icon:'🌊', href:'/fun/binaural-beats.html', name:'Binaural Beats'},
    {icon:'😴', href:'/calc/sleep-calculator.html', name:'Sleep Calculator'},
  ]
});
</script>
