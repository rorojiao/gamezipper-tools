const { $, copyText, t } = GZ;

function doMinify() {
  const inp = $('#input').value.trim();
  if (!inp) return;
  try {
    const parser = new DOMParser();
    const doc = parser.parseFromString(inp, 'text/xml');
    const errNode = doc.querySelector('parsererror');
    if (errNode) throw new Error(errNode.textContent.split('\n')[0]);
    const ser = new XMLSerializer();
    let minified = ser.serializeToString(doc);
    // Remove whitespace between tags
    minified = minified.replace(/>\s+</g, '><').trim();
    $('#output').textContent = minified;
    const orig = inp.length, now = minified.length;
    const pct = orig > 0 ? Math.round((1 - now/orig) * 100) : 0;
    $('#status').innerHTML = `<span style="color:var(--gz-success)">${t('success')} (${orig} → ${now} bytes, ${pct}% smaller)</span>`;
  } catch(e) {
    $('#status').innerHTML = `<span style="color:var(--gz-accent)">${t('errorMin')}${e.message}</span>`;
    $('#output').textContent = '';
  }
}

function doBeautify() {
  const inp = $('#input').value.trim();
  if (!inp) return;
  try {
    const parser = new DOMParser();
    const doc = parser.parseFromString(inp, 'text/xml');
    const errNode = doc.querySelector('parsererror');
    if (errNode) throw new Error(errNode.textContent.split('\n')[0]);
    const indent = 2;
    let result = '';
    const pad = d => ' '.repeat(d * indent);
    function walk(node, depth) {
      for (const child of node.childNodes) {
        if (child.nodeType === 1) {
          const attrs = child.attributes ? ' ' + Array.from(child.attributes).map(a => `${a.name}="${a.value}"`).join(' ') : '';
          const hasElementChild = Array.from(child.childNodes).some(c => c.nodeType === 1);
          const textContent = child.textContent.trim();
          if (hasElementChild) {
            result += `${pad(depth)}<${child.nodeName.toLowerCase()}${attrs}>\n`;
            walk(child, depth + 1);
            result += `${pad(depth)}</${child.nodeName.toLowerCase()}>\n`;
          } else if (textContent) {
            result += `${pad(depth)}<${child.nodeName.toLowerCase()}${attrs}>${textContent}</${child.nodeName.toLowerCase()}>\n`;
          } else {
            result += `${pad(depth)}<${child.nodeName.toLowerCase()}${attrs} />\n`;
          }
        } else if (child.nodeType === 7) {
          result += `${pad(depth)}<?${child.target} ${child.data}?>\n`;
        }
      }
    }
    // Handle XML declaration
    if (inp.startsWith('<?xml')) {
      const decl = inp.substring(0, inp.indexOf('?>') + 2);
      result += decl + '\n';
    }
    walk(doc, 0);
    $('#output').textContent = result.trim();
    $('#status').innerHTML = `<span style="color:var(--gz-success)">${t('success')}</span>`;
  } catch(e) {
    $('#status').innerHTML = `<span style="color:var(--gz-accent)">${t('errorBeau')}${e.message}</span>`;
    $('#output').textContent = '';
  }
}

function loadExample() {
  $('#input').value = '<?xml version="1.0" encoding="UTF-8"?>\n<catalog>\n  <book id="1">\n    <title>XML for Beginners</title>\n    <author>Jane Doe</author>\n    <price currency="USD">29.99</price>\n    <tags>\n      <tag>programming</tag>\n      <tag>xml</tag>\n    </tags>\n  </book>\n  <book id="2">\n    <title>Advanced Web Tech</title>\n    <author>John Smith</author>\n    <price currency="USD">49.99</price>\n  </book>\n</catalog>';
  doBeautify();
}

function doClear() { $('#input').value=''; $('#output').textContent=''; $('#status').innerHTML=''; }

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="doMinify()">${t('minify')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doBeautify()">${t('beautify')}</button>
