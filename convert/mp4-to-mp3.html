const { $, t } = GZ;
let audioBuffer = null;
let fileName = 'audio';
let videoDuration = 0;

$('#drop-text').textContent = t('dropText');
$('#lbl-start').textContent = t('lblStart');
$('#lbl-end').textContent = t('lblEnd');
$('#trim-hint').textContent = t('trimHint');

const dz = $('#drop'), fi = $('#file');
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag'); });
dz.addEventListener('dragleave', () => dz.classList.remove('drag'));
dz.addEventListener('drop', e => { e.preventDefault(); dz.classList.remove('drag'); if (e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]); });
fi.addEventListener('change', e => { if (e.target.files[0]) loadFile(e.target.files[0]); });

function loadFile(file) {
  fileName = file.name.replace(/\.[^.]+$/, '');
  const url = URL.createObjectURL(file);
  // Decode using Web Audio API
  const ac = new (window.AudioContext || window.webkitAudioContext)();
  fetch(url).then(r => r.arrayBuffer()).then(buf => ac.decodeAudioData(buf)).then(buffer => {
    audioBuffer = buffer;
    videoDuration = buffer.duration;
    $('#controls').style.display = 'flex';
    $('#trim-row').style.display = 'flex';
    $('#end').value = 0;
    $('#end').placeholder = videoDuration.toFixed(1);
    $('#stats').innerHTML = `
      <span>${t('loaded')}: ${file.name}</span>
      <span>${t('duration')}: ${videoDuration.toFixed(1)}s</span>
      <span>${t('channels')}: ${buffer.numberOfChannels}</span>
      <span>${(file.size / 1048576).toFixed(1)} MB</span>`;
    // Show original audio preview
    $('#player').src = url;
    $('#player').style.display = 'block';
    // Build controls
    $('#controls').innerHTML = `
      <label>${t('bitrate')}
        <select id="br">
          <option value="128">128 kbps</option>
          <option value="192" selected>192 kbps</option>
          <option value="320">320 kbps</option>
        </select>
      </label>
      <button class="gz-btn" onclick="doConvert()">${t('convert')}</button>`;
  }).catch(err => {
    $('#status').innerHTML = `<span style="color:var(--accent)">${t('noAudio')}</span>`;
  });
}

async function doConvert() {
  if (!audioBuffer) { $('#status').textContent = t('noFile'); return; }
  if (typeof lamejs === 'undefined') { $('#status').textContent = t('noEncoder'); return; }

  const bitrate = parseInt($('#br').value);
  let startSec = parseFloat($('#start').value) || 0;
  let endSec = parseFloat($('#end').value) || videoDuration;
  startSec = Math.max(0, Math.min(startSec, videoDuration));
  endSec = Math.max(startSec, Math.min(endSec, videoDuration));

  const sampleRate = audioBuffer.sampleRate;
  const startSample = Math.floor(startSec * sampleRate);
  const endSample = Math.floor(endSec * sampleRate);
  const numSamples = endSample - startSample;

  // Get channel data (trim)
  let ch0, ch1;
  ch0 = audioBuffer.getChannelData(0).slice(startSample, endSample);
  if (audioBuffer.numberOfChannels > 1) {
    ch1 = audioBuffer.getChannelData(1).slice(startSample, endSample);
  } else {
    ch1 = ch0;
  }

  const mp3enc = new lamejs.Mp3Encoder(2, sampleRate, bitrate);
  const blockSize = 1152;
  const data = [];
  let total = numSamples;
  let processed = 0;

  $('#progress').style.display = 'block';
  $('#status').textContent = t('converting');

  for (let i = 0; i < numSamples; i += blockSize) {
    const l = ch0.subarray(i, i + blockSize);
    const r = ch1.subarray(i, i + blockSize);
    const mp3buf = mp3enc.encodeBuffer(l, r);
    if (mp3buf.length > 0) data.push(mp3buf);
    processed += blockSize;
    if ((i / blockSize) % 100 === 0) {
      $('#progress').value = processed / total;
    }
    // Yield to UI
    if ((i / blockSize) % 500 === 0) await new Promise(r => setTimeout(r, 0));
  }
  const end = mp3enc.flush();
  if (end.length > 0) data.push(end);

  const blob = new Blob(data, { type: 'audio/mp3' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  const trimSuffix = (startSec > 0 || endSec < videoDuration) ? `_${startSec.toFixed(0)}-${endSec.toFixed(0)}s` : '';
  a.download = `${fileName}${trimSuffix}.mp3`;
  a.click();
  URL.revokeObjectURL(a.href);

  $('#progress').style.display = 'none';
  $('#status').innerHTML = `<span style="color:var(--gz-success)">${t('done')} (${(blob.size / 1048576).toFixed(2)} MB)</span>`;
}

function doClear() {
  audioBuffer = null;
  $('#controls').style.display = 'none';
  $('#trim-row').style.display = 'none';
  $('#player').style.display = 'none';
  $('#player').src = '';
  $('#stats').innerHTML = '';
  $('#status').innerHTML = '';
  $('#progress').style.display = 'none';
  $('#file').value = '';
  dz.style.display = 'block';
}

$('#toolbar').innerHTML = `<button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

    { icon: '🎬', href: '/convert/mov-to-mp4.html', name: 'MOV to MP4' },
  ]
});
</script>
