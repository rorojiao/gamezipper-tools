<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is IRR (Internal Rate of Return)?", "acceptedAnswer": {"@type": "Answer", "text": "IRR is the annualized rate of return at which the net present value (NPV) of all cash flows from an investment equals zero. It represents the break-even discount rate — if your IRR exceeds your cost of capital or required return, the investment is considered worthwhile."}}, {"@type": "Question", "name": "How is IRR calculated?", "acceptedAnswer": {"@type": "Answer", "text": "IRR is found by solving for the discount rate that makes NPV zero: NPV = C0 + C1/(1+r) + C2/(1+r)^2 + ... + Cn/(1+r)^n = 0. This calculator uses the bisection numerical method to solve this equation to high precision."}}, {"@type": "Question", "name": "What is a good IRR?", "acceptedAnswer": {"@type": "Answer", "text": "A good IRR depends on your benchmark. For most investments, an IRR above 10% is considered solid, above 15% is good, and above 20% is excellent. Real estate investors often target 12-15%, while venture capital seeks 25%+. Always compare IRR to your cost of capital and alternative investment opportunities."}}, {"@type": "Question", "name": "Can IRR be negative?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. If your total cash flows are less than your initial investment, the IRR will be negative, indicating a loss. This calculator handles negative IRR values and will display them with a warning note so you can assess whether the investment is viable."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div style="margin-bottom:12px">
      <label id="lbl-init"></label>
      <input type="number" id="initial" value="-10000" step="any">
    </div>
    <div id="flows"></div>
    <div id="result"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'IRR Calculator',
    toolDesc: 'Calculate the Internal Rate of Return for any investment. Enter your initial outflow and projected cash flows to get the annualized return rate.',
    initial: 'Initial Investment (Year 0, negative = outflow)',
    flows: 'Cash Flows (Year 1, 2, 3...)',
    year: 'Year',
    irrResult: 'IRR (Internal Rate of Return)',
    npv: 'NPV at IRR',
    addYear: '+ Add Year',
    calculate: 'Calculate',
    step1: 'Enter your initial investment as a negative number (cash outflow)',
    step2: 'Add expected cash flows for each subsequent year',
    step3: 'Click Calculate to find the IRR',
    step4: 'Compare the IRR to your required return or cost of capital',
    negWarn: '⚠ Negative IRR — total inflows are less than the initial investment.',
    noRoot: 'Cannot compute IRR — ensure there is at least one positive and one negative cash flow.',
  },
  zh: {
    toolTitle: '内部收益率（IRR）计算器',
    toolDesc: '计算任意投资的内部收益率。输入初始现金流出和各期预期现金流，获得年化收益率。',
    initial: '初始投资（第 0 年，负数表示流出）',
    flows: '现金流（第 1、2、3... 年）',
    year: '第',
    irrResult: 'IRR（内部收益率）',
    npv: 'IRR 处的净现值',
    addYear: '+ 添加年份',
    calculate: '计算',
    step1: '输入初始投资金额（负数表示现金流出）',
    step2: '添加各年的预期现金流',
    step3: '点击计算获得 IRR',
    step4: '将 IRR 与要求的回报率或资本成本进行比较',
    negWarn: '⚠ 负 IRR — 总流入小于初始投资。',
    noRoot: '无法计算 IRR — 请确保现金流中至少有一个正值和一个负值。',
  }
});
const { $, copyText, t } = GZ;

let cashFlows = [3000, 4000, 4000, 3000];

function renderFlows(){
  let html=`<div style="margin-top:14px"><label>${t('flows')}</label></div>`;
  cashFlows.forEach((v,i)=>{
    html += `<div class="flow-row"><span class="yr">${t('year')} ${i+1}</span><input type="number" class="wide" value="${v}" step="any" data-idx="${i}" oninput="cashFlows[${i}]=+this.value"></div>`;
  });
  html += `<button class="gz-btn gz-btn-secondary" style="margin-top:4px" onclick="addFlow()">${t('addYear')}</button>`;
  $('#flows').innerHTML=html;
}
function addFlow(){ cashFlows.push(0); renderFlows(); }

function npv(rate, flows){
  return flows.reduce((sum,cf,idx)=> sum + cf/Math.pow(1+rate, idx), 0);
}

function calcIRR(){
  const init = +$('#initial').value || 0;
  const flows = [init, ...cashFlows];
  let lo=-0.9999, hi=10;
  let npvLo = npv(lo, flows), npvHi = npv(hi, flows);
  if(npvLo * npvHi > 0){
    return null;
  }
  for(let i=0;i<200;i++){
    const mid=(lo+hi)/2;
    const v=npv(mid,flows);
    if(Math.abs(v)<1e-7) return mid;
    if(v*npvLo>0){ lo=mid; npvLo=v; } else { hi=mid; }
  }
  return (lo+hi)/2;
}

function calculate(){
  const irr=calcIRR();
  if(irr===null){
    $('#result').innerHTML=`<span style="color:var(--gz-accent)">${t('noRoot')}</span>`;
    return;
  }
  const pct=(irr*100).toFixed(2)+'%';
  const init=+$('#initial').value||0;
  const flows=[init,...cashFlows];
  const checkNPV=npv(irr,flows);
  const neg = irr<0;
  $('#result').innerHTML=`
    <div class="label">${t('irrResult')}</div>
    <div class="big" style="${neg?'color:var(--gz-accent,#e94560)':''}">${pct}<span style="font-size:.5em"> / year</span></div>
    ${neg?`<div style="margin-top:8px;font-size:.85em;color:var(--gz-accent)">${t('negWarn')}</div>`:''}
    <div style="margin-top:8px;font-size:.82em;color:var(--text2)">${t('npv')}: ${checkNPV.toFixed(4)}</div>`;
}

$('#lbl-init').textContent = t('initial');
renderFlows();

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="calculate()">${t('calculate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="copyText(($('#result .big')||{textContent:''}).textContent.trim())">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="resetExample()">${t('example')}</button>`;

function resetExample(){
  $('#initial').value=-10000;
  cashFlows=[3000,4000,4000,3000];
  renderFlows();
  calculate();
}

calculate();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'💰', href:'/calc/npv-calculator.html', name:'NPV Calculator'},
    {icon:'📈', href:'/calc/roi-calculator.html', name:'ROI Calculator'},
    {icon:'🏦', href:'/calc/investment-calculator.html', name:'Investment Calc'},
    {icon:'📊', href:'/calc/cagr-calculator.html', name:'CAGR Calculator'},
  ]
});
</script>
<script src="/tools-result-rec.js?v=20260707v520" defer></script>
</body>
</html>
