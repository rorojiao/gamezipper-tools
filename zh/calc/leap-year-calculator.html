<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is a leap year?", "acceptedAnswer": {"@type": "Answer", "text": "A leap year has 366 days instead of 365, with an extra day added to February (February 29). Leap years keep our calendar aligned with Earth's orbit around the Sun, which takes about 365.2425 days."}}, {"@type": "Question", "name": "What are the leap year rules?", "acceptedAnswer": {"@type": "Answer", "text": "A year is a leap year if it is divisible by 4. However, years divisible by 100 are NOT leap years unless they are also divisible by 400. So 2000 was a leap year, but 1900 was not."}}, {"@type": "Question", "name": "When is the next leap year?", "acceptedAnswer": {"@type": "Answer", "text": "Leap years occur every 4 years. The next leap year after 2024 is 2028, then 2032, 2036, 2040 and so on. Centuries like 2100, 2200 and 2300 are skipped unless divisible by 400."}}]}</script>

<script>
GZI18n.register({
  en: {
    toolTitle: 'Leap Year Calculator',
    toolDesc: 'Check if any year is a leap year, find the next and previous leap years, and list all leap years in a date range.',
    isLeap: 'IS a leap year',
    notLeap: 'is NOT a leap year',
    hasFeb29: 'February has 29 days',
    noFeb29: 'February has 28 days',
    nextLeap: 'Next leap year',
    prevLeap: 'Previous leap year',
    rangeTitle: 'Leap years in a range',
    from: 'From year',
    to: 'To year',
    show: 'Show',
    step1: 'Type any year (1-9999) in the box above',
    step2: 'See instantly if it is a leap year',
    step3: 'Click Next / Previous to jump between leap years',
    step4: 'Enter a range to list every leap year in that period',
  },
  zh: {
    toolTitle: '闰年计算器',
    toolDesc: '检测任意年份是否为闰年，查找下一个和上一个闰年，并列出指定范围内的所有闰年。',
    isLeap: '是闰年',
    notLeap: '不是闰年',
    hasFeb29: '二月有 29 天',
    noFeb29: '二月有 28 天',
    nextLeap: '下一个闰年',
    prevLeap: '上一个闰年',
    rangeTitle: '范围内的闰年',
    from: '起始年',
    to: '结束年',
    show: '查看',
    step1: '在上方输入任意年份（1-9999）',
    step2: '即时查看是否为闰年',
    step3: '点击「下一个/上一个」在闰年之间跳转',
    step4: '输入范围列出该时间段内所有闰年',
  }
});

const { $, t } = GZ;

function isLeap(y) {
  return (y % 4 === 0 && y % 100 !== 0) || (y % 400 === 0);
}

function nextLeap(y) {
  let n = y + 1;
  while (n <= 9999 && !isLeap(n)) n++;
  return n <= 9999 ? n : null;
}

function prevLeap(y) {
  let p = y - 1;
  while (p >= 1 && !isLeap(p)) p--;
  return p >= 1 ? p : null;
}

function check() {
  const y = parseInt($('#year-input').value, 10);
  const ans = $('#answer');
  if (!y || y < 1 || y > 9999) {
    ans.className = 'answer';
    ans.innerHTML = '<div class="big">—</div>';
    return;
  }
  const leap = isLeap(y);
  ans.className = 'answer ' + (leap ? 'yes' : 'no');
  ans.innerHTML = `<div class="big">${y} ${leap ? t('isLeap') : t('notLeap')}</div>
    <div style="margin-top:6px;color:var(--text2);font-size:0.85rem">${leap ? t('hasFeb29') : t('noFeb29')} · ${leap ? '366 days' : '365 days'}</div>`;
  const n = nextLeap(y);
  const p = prevLeap(y);
  const nav = $('#nav');
  nav.innerHTML = '';
  if (p) {
    const b = document.createElement('div');
    b.className = 'nav-btn';
    b.textContent = '← ' + t('prevLeap') + ': ' + p;
    b.onclick = () => { $('#year-input').value = p; check(); };
    nav.appendChild(b);
  }
  if (n) {
    const b = document.createElement('div');
    b.className = 'nav-btn';
    b.textContent = t('nextLeap') + ': ' + n + ' →';
    b.onclick = () => { $('#year-input').value = n; check(); };
    nav.appendChild(b);
  }
}

function showRange() {
  const from = parseInt($('#range-from').value, 10);
  const to = parseInt($('#range-to').value, 10);
  const grid = $('#range-grid');
  if (!from || !to || from > to) { grid.innerHTML = ''; return; }
  const lo = Math.max(1, from);
  const hi = Math.min(9999, to);
  const limit = 400; // safety
  const count = Math.min(hi - lo + 1, limit);
  grid.innerHTML = '';
  for (let y = lo; y <= lo + count - 1; y++) {
    const leap = isLeap(y);
    const cell = document.createElement('div');
    cell.className = 'range-cell ' + (leap ? 'leap' : 'non');
    cell.textContent = y;
    cell.title = leap ? t('isLeap') : t('notLeap');
    cell.style.cursor = 'pointer';
    cell.onclick = () => { $('#year-input').value = y; check(); window.scrollTo({top:0,behavior:'smooth'}); };
    grid.appendChild(cell);
  }
  const leapCount = Array.from(grid.children).filter(c => c.classList.contains('leap')).length;
  $('#status').innerHTML = `<span style="color:var(--text3);font-size:0.8rem">${leapCount} ${t('isLeap').toLowerCase()} / ${count} ${'years'}</span>`;
}

$('#year-input').addEventListener('input', check);
$('#range-btn').textContent = t('show');
$('#range-btn').onclick = showRange;
$('#range-from').addEventListener('input', showRange);
$('#range-to').addEventListener('input', showRange);
$('#range-title').textContent = t('rangeTitle');

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🎂', href:'/calc/age-calculator.html', name:'Age Calculator'},
    {icon:'📅', href:'/calc/date-calculator.html', name:'Date Calculator'},
    {icon:'📅', href:'/calc/day-of-week.html', name:'Day of Week'},
    {icon:'🔢', href:'/calc/prime-number-checker.html', name:'Prime Checker'},
  ]
});

check();
showRange();
</script>
