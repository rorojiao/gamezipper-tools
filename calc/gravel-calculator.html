<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "How much does a cubic yard of gravel weigh?", "acceptedAnswer": {"@type": "Answer", "text": "A cubic yard of typical gravel weighs about 2,800 lb (1.4 US tons / 1.27 metric tonnes). Pea gravel is lighter at roughly 2,600 lb/yd³, while crushed stone can reach 3,000 lb/yd³. Density varies with moisture and rock type."}}, {"@type": "Question", "name": "How deep should a gravel driveway be?", "acceptedAnswer": {"@type": "Answer", "text": "A residential gravel driveway is usually 4 to 6 inches (100-150 mm) of compacted gravel over a sub-base. A pathway or patio base typically uses 2 to 4 inches (50-100 mm). Use the depth field to match your project."}}, {"@type": "Question", "name": "How do I calculate how much gravel I need?", "acceptedAnswer": {"@type": "Answer", "text": "Volume = length × width × depth. Convert to cubic yards by dividing cubic feet by 27, or cubic meters by dividing by 1,000 if dimensions are in meters. Multiply the volume by the gravel density to get weight."}}, {"@type": "Question", "name": "Should I order extra gravel?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. Order 5-10% extra to allow for compaction, settling, uneven ground, and future top-ups. Gravel packs down by roughly 15-20%, so a 4-inch loose layer may settle to about 3 inches."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">

  <div class="gz-tool-area">
    <div class="gz-gr-grid">
      <div class="gz-gr-field"><label id="lbl-length"></label><input type="number" id="length" min="0" step="any" value="20"></div>
      <div class="gz-gr-field"><label id="lbl-width"></label><input type="number" id="width" min="0" step="any" value="10"></div>
      <div class="gz-gr-field"><label id="lbl-depth"></label><input type="number" id="depth" min="0" step="any" value="4"></div>
      <div class="gz-gr-field"><label id="lbl-unit"></label><select id="unit"><option value="ft" selected>Feet / inches</option><option value="m">Meters / cm</option></select></div>
      <div class="gz-gr-field"><label id="lbl-type"></label><select id="type"><option value="1.4">Pea gravel (2,600 lb/yd³)</option><option value="1.5" selected>Standard gravel (2,800 lb/yd³)</option><option value="1.6">Crushed stone (3,000 lb/yd³)</option></select></div>
      <div class="gz-gr-field"><label id="lbl-bag"></label><select id="bag"><option value="0.5">0.5 ft³ bags (50 lb)</option><option value="1">1 ft³ bags</option><option value="0.75">0.75 ft³ bags</option></select></div>

      <div class="row"><span class="name" id="n-tons"></span><span class="val" id="out-tons"></span></div>
      <div class="row"><span class="name" id="n-kg"></span><span class="val" id="out-kg"></span></div>
      <div class="row"><span class="name" id="n-bags"></span><span class="val" id="out-bags"></span></div>
      <div class="row"><span class="name" id="n-rec"></span><span class="val" id="out-rec"></span></div>

</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Gravel Calculator',
    toolDesc: 'Calculate how much gravel, pea gravel, or crushed stone you need for a driveway, path, patio, or landscaping project. Get cubic yards, cubic feet, cubic meters, US tons, metric tonnes, and the number of bags, with a 10% extra recommendation. Free, browser-based.',
    lblLength: 'Length',
    lblWidth: 'Width',
    lblDepth: 'Depth',
    lblUnit: 'Units',
    lblType: 'Gravel type (density)',
    lblBag: 'Bag size',
    calc: 'Calculate',
    clear: 'Clear',
    nYards: 'Cubic yards needed',
    nCubicft: 'Cubic feet',
    nCubicm: 'Cubic meters',
    nTons: 'Weight (US tons / metric t)',
    nKg: 'Weight (kg)',
    nBags: 'Bags needed',
    nRec: 'Recommended (+10% extra)',
    note: 'Volume = length × width × depth. Density is 2,600-3,000 lb/yd³ (1.3-1.5 t/m³) depending on gravel type and moisture. Always order 5-10% extra for compaction, settling, and uneven ground — gravel packs down ~15-20%. A typical residential driveway uses 4-6 inches of compacted gravel.',
    step1: 'Enter the length, width, and depth of your project area',
    step2: 'Choose feet/inches or meters/cm units',
    step3: 'Pick the gravel type (density) and your bag size',
    step4: 'Read cubic yards, tons, bags, and the +10% recommendation',
  },
  zh: {
    toolTitle: '碎石用量计算器',
    toolDesc: '计算车道、小径、露台或景观工程所需的碎石、豆砾石或碎石的用量。输出立方码、立方英尺、立方米、美吨、公吨及所需袋数，并给出 +10% 余量建议。免费、浏览器本地运行。',
    lblLength: '长度',
    lblWidth: '宽度',
    lblDepth: '深度（厚度）',
    lblUnit: '单位',
    lblType: '碎石类型（密度）',
    lblBag: '每袋容量',
    calc: '计算',
    clear: '清空',
    nYards: '所需立方码',
    nCubicft: '立方英尺',
    nCubicm: '立方米',
    nTons: '重量（美吨 / 公吨）',
    nKg: '重量（公斤）',
    nBags: '所需袋数',
    nRec: '建议用量（+10% 余量）',
    note: '体积 = 长 × 宽 × 深。密度约 2,600-3,000 磅/码³（1.3-1.5 吨/米³），随碎石类型和含水量变化。建议多订 5-10% 以应对压实、沉降和不平整地面 — 碎石压实率约 15-20%。住宅车道通常使用 4-6 英寸厚的压实碎石。',
    step1: '输入工程区域的长、宽、深',
    step2: '选择英尺/英寸或米/厘米单位',
    step3: '选择碎石类型（密度）和每袋容量',
    step4: '查看立方码、吨数、袋数及 +10% 建议',
  }
});

const { $, t } = GZ;

function fmt(n) {
  if (!isFinite(n)) return '—';
  const abs = Math.abs(n);
  if (abs !== 0 && abs < 0.01) return n.toFixed(4);
  return n.toLocaleString(undefined, { maximumFractionDigits: 2 });
}

function calc() {
  let L = parseFloat($('#length').value);
  let W = parseFloat($('#width').value);
  let D = parseFloat($('#depth').value);
  const unit = $('#unit').value;
  const densityTonPerM3 = parseFloat($('#type').value); // metric tonnes per cubic meter
  const bagFt3 = parseFloat($('#bag').value);

  if (!isFinite(L) || !isFinite(W) || !isFinite(D) || L < 0 || W < 0 || D < 0) {
    $('#results').style.display = 'none';
    return;
  }

  let cubicFt, cubicM;
  if (unit === 'ft') {
    // depth in inches → convert to feet
    cubicFt = L * W * (D / 12);
    cubicM = cubicFt * 0.0283168;
  } else {
    // length/width in meters, depth in cm → meters
    cubicM = L * W * (D / 100);
    cubicFt = cubicM / 0.0283168;
  }

  const cubicYards = cubicFt / 27;
  const metricTonnes = cubicM * densityTonPerM3;
  const usTons = metricTonnes * 1.10231;
  const kg = metricTonnes * 1000;
  const bags = bagFt3 > 0 ? Math.ceil(cubicFt / bagFt3) : 0;

  const recYards = cubicYards * 1.10;

  $('#out-yards').textContent = fmt(cubicYards) + ' yd³';
  $('#out-cubicft').textContent = fmt(cubicFt) + ' ft³';
  $('#out-cubicm').textContent = fmt(cubicM) + ' m³';
  $('#out-tons').textContent = fmt(usTons) + ' t / ' + fmt(metricTonnes) + ' t';
  $('#out-kg').textContent = fmt(kg) + ' kg';
  $('#out-bags').textContent = fmt(bags) + ' bags';
  $('#out-rec').textContent = fmt(recYards) + ' yd³ (+10%)';
  $('#n-yards').textContent = t('nYards');
  $('#n-cubicft').textContent = t('nCubicft');
  $('#n-cubicm').textContent = t('nCubicm');
  $('#n-tons').textContent = t('nTons');
  $('#n-kg').textContent = t('nKg');
  $('#n-bags').textContent = t('nBags');
  $('#n-rec').textContent = t('nRec');

  $('#results').style.display = 'block';
}

['length','width','depth','unit','type','bag'].forEach(id => $('#' + id).addEventListener('input', calc));
$('#unit').addEventListener('change', calc);
$('#type').addEventListener('change', calc);
$('#bag').addEventListener('change', calc);

['lbl-length','lbl-width','lbl-depth','lbl-unit','lbl-type','lbl-bag'].forEach((id, i) => {
  $('#' + id).textContent = t(['lblLength','lblWidth','lblDepth','lblUnit','lblType','lblBag'][i]);
});
$('#note').textContent = t('note');

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="calc()">${t('calc')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="['length','width','depth'].forEach(id=>document.getElementById(id).value='0');calc()">${t('clear')}</button>`;

calc();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🧱', href:'/calc/concrete.html', name:'Concrete'},
    {icon:'🌿', href:'/calc/mulch-calculator.html', name:'Mulch'},
    {icon:'🪨', href:'/calc/tile-calculator.html', name:'Tile'},
    {icon:'📐', href:'/calc/square-footage.html', name:'Square Footage'},
  ]
});
</script>

</body>
