<script>
GZI18n.register({
  en: {
    toolTitle: 'Virtual Piano — Play Piano Online',
    toolDesc: 'Play a full 2-octave virtual piano with your mouse or computer keyboard. Switch instruments, record your melody and replay it. Real Web Audio synthesis — no install, no signup.',
    step1: 'Click any key with your mouse, or press the letter shown on each key',
    step2: 'Use the Instrument dropdown to switch between piano, organ, synth and bell',
    step3: 'Tick Sustain to let notes ring out, or hold a key for legato',
    step4: 'Click Record, play your melody, then Stop and Play to hear it back',
    hint: '⌨️ Keyboard map: white keys = A S D F G H J K L ; and black keys = W E T Y U O P. Click the piano first if no sound — browsers need a user gesture to start audio.',
    nowPlaying: 'Now playing',
    recorded: 'recorded notes',
  },
  zh: {
    toolTitle: '在线钢琴 — 浏览器虚拟钢琴',
    toolDesc: '用鼠标或电脑键盘弹奏完整的两个八度虚拟钢琴。切换乐器音色、录制旋律并回放。真实 Web Audio 合成 — 无需安装，无需注册。',
    step1: '用鼠标点击任意琴键，或按下琴键上显示的字母',
    step2: '通过「乐器」下拉框切换钢琴、风琴、合成器和铃声',
    step3: '勾选「延音」让音符持续共鸣，或长按琴键实现连奏',
    step4: '点击「录制」，弹奏旋律，再点停止和播放来回放',
    hint: '⌨️ 键盘映射：白键 = A S D F G H J K L ;  黑键 = W E T Y U O P。如果没有声音，请先点击钢琴 — 浏览器需要用户交互才能启动音频。',
    nowPlaying: '正在播放',
    recorded: '已录制的音符',
  }
});

const { $, t } = GZ;
let actx = null, vol = 0.6, sustainMode = false;
let inst = 'piano';
let recording = [], isRecording = false, recStart = 0;

const INST_CONFIG = {
  piano:  { type:'triangle', attack:0.005, decay:0.25, sustain:0.2, release:0.6, gain:0.5, harmonics:[{mul:2,gain:0.18},{mul:3,gain:0.07}] },
  organ:  { type:'sine',     attack:0.02,  decay:0.05, sustain:0.95,release:0.2, gain:0.32, harmonics:[{mul:2,gain:0.5},{mul:3,gain:0.35},{mul:4,gain:0.2}] },
  synth:  { type:'sawtooth', attack:0.01,  decay:0.1,  sustain:0.7, release:0.25,gain:0.22, harmonics:[] },
  bell:   { type:'sine',     attack:0.001, decay:0.8,  sustain:0.0, release:1.5, gain:0.4,  harmonics:[{mul:2.76,gain:0.3},{mul:5.4,gain:0.12}] },
  pluck:  { type:'square',   attack:0.001, decay:0.18, sustain:0.0, release:0.15,gain:0.25, harmonics:[] },
};

// Build 2 octaves starting at C4
const NOTES = [];
const WHITE = ['C','D','E','F','G','A','B'];
const BLACK_AFTER = {0:'C#',1:'D#',3:'F#',4:'G#',5:'A#'};
for (let oct=4; oct<=5; oct++) {
  WHITE.forEach((n,i) => NOTES.push({n:n+oct, freq: noteFreq(n,oct), key: whiteKey(i, oct===4), black:false, idx:i, oct}));
  // black keys for this octave (insert conceptually)
}
function noteFreq(name, oct) {
  const semis = {C:0,'C#':1,D:2,'D#':3,E:4,F:5,'F#':6,G:7,'G#':8,A:9,'A#':10,B:11};
  const midi = (oct+1)*12 + semis[name];
  return 440 * Math.pow(2, (midi-69)/12);
}
function whiteKey(i, firstOct) {
  const row1 = ['a','s','d','f','g','h','j'];
  const row2 = ['k','l',';','\'','z','x','c'];
  return firstOct ? row1[i] : row2[i];
}
function blackKey(oct, whiteIdx) {
  const map4 = ['w','e',null,'t','y','u',null];
  const map5 = ['o','p',null,']','\\',null,null];
  const m = oct===4 ? map4 : map5;
  return m[whiteIdx] || null;
}

function buildPiano() {
  const piano = $('#piano');
  piano.innerHTML = '';
  const whites = NOTES.filter(n => !n.black);
  whites.forEach((note, wi) => {
    const div = document.createElement('div');
    div.className = 'white-key';
    div.dataset.freq = note.freq; div.dataset.note = note.n; div.dataset.key = note.key || '';
    div.innerHTML = `<div class="note-name">${note.n}</div><div class="key-name">${(note.key||'').toUpperCase()}</div>`;
    addKeyEvents(div, note);
    piano.appendChild(div);
  });
  // Position black keys absolutely over whites
  let whiteCount = whites.length;
  NOTES.forEach((note, ni) => {
    if (note.black) return;
  });
  // Add black keys
  for (let oct=4; oct<=5; oct++) {
    WHITE.forEach((w,i) => {
      if (BLACK_AFTER[i]) {
        const bn = BLACK_AFTER[i]+oct;
        const freq = noteFreq(BLACK_AFTER[i], oct);
        const k = blackKey(oct, i);
        const idxInWhites = whites.findIndex(x => x.n === w+oct);
        if (idxInWhites < 0) return;
        const div = document.createElement('div');
        div.className = 'black-key';
        div.dataset.freq = freq; div.dataset.note = bn; div.dataset.key = k || '';
        // position: between idxInWhites and idxInWhites+1
        const leftPct = ((idxInWhites + 1) / whiteCount) * 100 - 3;
        div.style.left = leftPct + '%';
        div.innerHTML = `<div class="key-name">${(k||'').toUpperCase()}</div>`;
        addKeyEvents(div, {n:bn, freq, key:k});
        piano.appendChild(div);
      }
    });
  }
}

const activeOsc = new Map();
function ensureCtx(){ if(!actx){ actx=new (window.AudioContext||window.webkitAudioContext)(); } if(actx.state==='suspended') actx.resume(); }

function playNote(freq, noteName) {
  ensureCtx();
  if (activeOsc.has(freq)) return; // already playing
  const cfg = INST_CONFIG[inst];
  const now = actx.currentTime;
  const master = actx.createGain();
  master.gain.value = vol * cfg.gain;
  master.connect(actx.destination);
  const oscs = [];
  const main = actx.createOscillator(); main.type = cfg.type; main.frequency.value = freq;
  const mainGain = actx.createGain();
  oscs.push({o:main, g:mainGain, level:1});
  main.connect(mainGain); mainGain.connect(master);
  cfg.harmonics.forEach(h => {
    const o = actx.createOscillator(); o.type = cfg.type; o.frequency.value = freq*h.mul;
    const g = actx.createGain();
    o.connect(g); g.connect(master);
    oscs.push({o:o, g:g, level:h.gain});
  });
  // ADSR attack+decay
  oscs.forEach(({o,g,level}) => {
    g.gain.setValueAtTime(0, now);
    g.gain.linearRampToValueAtTime(level, now + cfg.attack);
    g.gain.exponentialRampToValueAtTime(Math.max(0.0001, level*cfg.sustain), now + cfg.attack + cfg.decay);
    o.start(now);
  });
  activeOsc.set(freq, {oscs, master, cfg});
  if (isRecording) recording.push({t: performance.now()-recStart, freq, note: noteName, on:true});
  setStatus(noteName);
}

function releaseNote(freq) {
  const node = activeOsc.get(freq);
  if (!node) return;
  const {oscs, master, cfg} = node;
  const now = actx.currentTime;
  const rel = sustainMode ? cfg.release*2 : cfg.release;
  oscs.forEach(({o,g}) => {
    try {
      g.gain.cancelScheduledValues(now);
      g.gain.setValueAtTime(g.gain.value, now);
      g.gain.exponentialRampToValueAtTime(0.0001, now + rel);
      o.stop(now + rel + 0.05);
    } catch(e){}
  });
  activeOsc.delete(freq);
}

function addKeyEvents(el, note) {
  const press = (e) => {
    e.preventDefault();
    if (el.classList.contains('active')) return;
    el.classList.add('active');
    playNote(note.freq, note.n);
  };
  const release = (e) => {
    if (!el.classList.contains('active')) return;
    el.classList.remove('active');
    releaseNote(note.freq);
  };
  el.addEventListener('mousedown', press);
  el.addEventListener('touchstart', press, {passive:false});
  el.addEventListener('mouseup', release);
  el.addEventListener('mouseleave', release);
  el.addEventListener('touchend', release);
}

// Keyboard input
const heldKeys = new Set();
document.addEventListener('keydown', (e) => {
  if (e.repeat) return;
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT' || e.target.tagName === 'TEXTAREA') return;
  const k = e.key.toLowerCase();
  if (heldKeys.has(k)) return;
  const el = document.querySelector(`.white-key[data-key="${k}"], .black-key[data-key="${k}"]`);
  if (el) { heldKeys.add(k); el.dispatchEvent(new MouseEvent('mousedown',{bubbles:true})); }
});
document.addEventListener('keyup', (e) => {
  const k = e.key.toLowerCase();
  if (!heldKeys.has(k)) return;
  heldKeys.delete(k);
  const el = document.querySelector(`.white-key[data-key="${k}"], .black-key[data-key="${k}"]`);
  if (el) el.dispatchEvent(new MouseEvent('mouseup',{bubbles:true}));
});

function changeInst() { inst = $('#instrument').value; }
function setStatus(note) { $('#status').innerHTML = `${t('nowPlaying')}: <strong>${note}</strong>`; }

function toggleRecord() {
  if (!isRecording) {
    recording = []; isRecording = true; recStart = performance.now();
    const b = $('#rec-btn'); b.classList.add('playing'); b.innerHTML = '⏹ <span>'+t('record')+'</span>';
    $('#play-btn').disabled = true;
  } else {
    isRecording = false;
    const b = $('#rec-btn'); b.classList.remove('playing'); b.innerHTML = '⏺ <span>'+t('record')+'</span>';
    $('#play-btn').disabled = recording.length === 0;
    $('#status').innerHTML = `${recording.filter(r=>r.on).length} ${t('recorded')}`;
  }
}
function clearRecording() { recording = []; isRecording = false; $('#play-btn').disabled = true; const b=$('#rec-btn'); b.classList.remove('playing'); b.innerHTML='⏺ <span>'+t('record')+'</span>'; }
function playRecording() {
  if (!recording.length) return;
  ensureCtx();
  recording.forEach(ev => {
    setTimeout(() => {
      if (ev.on) playNote(ev.freq, ev.note);
      else releaseNote(ev.freq);
    }, ev.t);
  });
}

buildPiano();
$('#hint').textContent = t('hint');

GZ.renderToolPage({
  category: 'fun',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🎚️', href:'/fun/tone-generator.html', name:'Tone Generator'},
    {icon:'🎵', href:'/text/lyric-formatter.html', name:'Lyric Formatter'},
    {icon:'🎚️', href:'/dev/speaker-test.html', name:'Speaker Test'},
    {icon:'🎲', href:'/fun/', name:'More Fun Tools'},
  ]
});
</script>
