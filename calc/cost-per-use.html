<script>
GZI18n.register({
  en: {
    toolTitle: 'Cost Per Use Calculator',
    toolDesc: 'Reveal the true value of any product by dividing its price by expected uses. Compare items side by side and shop smarter.',
    item: 'Item', price: 'Price', uses: 'Uses', usesPerYr: 'Uses / year', years: 'Lifespan (yr)', maint: 'Extra cost', currency: 'Currency',
    itemN: 'Item', addRow: '‚ûï Add Item', reset: 'Reset', example: 'Load Example',
    result: 'Cost per use', bestDeal: 'üèÜ Best value',
    hint: 'Tip: switch the mode to estimate uses from "uses per year √ó lifespan". Include repairs, ink, batteries or subscriptions in Extra cost.',
    modeUses: 'Total uses', modeYears: 'Per year √ó lifespan',
    step1: 'Enter the purchase price of the product',
    step2: 'Choose how to estimate uses ‚Äî a total number, or uses per year √ó lifespan',
    step3: 'Add any extra costs (maintenance, accessories, subscriptions)',
    step4: 'Compare cost per use across items ‚Äî the lowest wins',
  },
  zh: {
    toolTitle: 'ÂçïÊ¨°‰ΩøÁî®ÊàêÊú¨ËÆ°ÁÆóÂô®',
    toolDesc: 'ÈÄöËøá‰ª∑ÊÝºÈô§‰ª•È¢ÑÊúü‰ΩøÁî®Ê¨°Êï∞ÔºåÊè≠Á§∫‰∫ßÂìÅÁöÑÁúüÂÆû‰ª∑ÂÄº„ÄÇÂπ∂ÊéíÊØîËæÉÂ§ö‰∏™ÂïÜÂìÅÔºåÂÅöÂá∫Êõ¥ÊòéÊô∫ÁöÑÊ∂àË¥πÂÜ≥Á≠ñ„ÄÇ',
    item: 'ÂïÜÂìÅ', price: '‰ª∑ÊÝº', uses: '‰ΩøÁî®Ê¨°Êï∞', usesPerYr: 'ÊØèÂπ¥Ê¨°Êï∞', years: 'ÂØøÂëΩÔºàÂπ¥Ôºâ', maint: 'ÈôÑÂäÝÊàêÊú¨', currency: 'Ë¥ßÂ∏Å',
    itemN: 'ÂïÜÂìÅ', addRow: '‚ûï Ê∑ªÂäÝÂïÜÂìÅ', reset: 'ÈáçÁΩÆ', example: 'ÂäÝËΩΩÁ§∫‰æã',
    result: 'ÂçïÊ¨°ÊàêÊú¨', bestDeal: 'üèÜ ÊúÄÂàíÁÆó',
    hint: 'ÊèêÁ§∫ÔºöÂèØÂàáÊç¢‰∏∫„ÄåÊØèÂπ¥Ê¨°Êï∞ √ó ÂØøÂëΩ„ÄçÊù•‰º∞ÁÆóÊÄª‰ΩøÁî®Ê¨°Êï∞„ÄÇÁª¥‰øÆ„ÄÅÂ¢®Ê∞¥„ÄÅÁîµÊ±ÝÊàñËÆ¢ÈòÖË¥πËØ∑ËÆ°ÂÖ•ÈôÑÂäÝÊàêÊú¨„ÄÇ',
    modeUses: 'ÊÄªÊ¨°Êï∞', modeYears: 'ÊØèÂπ¥Ê¨°Êï∞ √ó ÂØøÂëΩ',
    step1: 'ËæìÂÖ•ÂïÜÂìÅÁöÑË¥≠‰π∞‰ª∑ÊÝº',
    step2: 'ÈÄâÊã©‰º∞ÁÆóÊñπÂºè ‚Äî Áõ¥Êé•Â°´ÊÄªÊ¨°Êï∞ÔºåÊàñÊØèÂπ¥Ê¨°Êï∞ √ó ÂØøÂëΩ',
    step3: 'Ê∑ªÂäÝÈôÑÂäÝÊàêÊú¨ÔºàÁª¥‰øÆ„ÄÅÈÖç‰ª∂„ÄÅËÆ¢ÈòÖÁ≠âÔºâ',
    step4: 'ÊØîËæÉÂêÑÂïÜÂìÅÁöÑÂçïÊ¨°ÊàêÊú¨ÔºåÊúÄ‰ΩéËÄÖÊúÄÂàíÁÆó',
  }
});
const { $, copyText, t } = GZ;
let mode = 'uses';
let rows = [];
const CURRENCIES = ['USD $','EUR ‚Ç¨','GBP ¬£','CNY ¬•','JPY ¬•','INR ‚Çπ','AUD $','CAD $'];

function newRow(data={}) {
  rows.push(Object.assign({name:'', price:'', uses:'', upy:'', years:'', maint:'', cur:'USD $'}, data));
  render();
}

function render() {
  const box = $('#rows');
  box.innerHTML = '';
  rows.forEach((r, i) => {
    const div = document.createElement('div');
    div.className = 'cpu-row';
    div.innerHTML = `
      <h3>${t('itemN')} #${i+1}
        <button class="rm" title="remove" onclick="delRow(${i})">‚úï</button>
      </h3>
      <div class="cpu-fields">
        <div><label>${t('item')}</label><input type="text" value="${esc(r.name)}" oninput="rows[${i}].name=this.value;calc()"></div>
        <div><label>${t('currency')}</label><select onchange="rows[${i}].cur=this.value;calc()">${CURRENCIES.map(c=>`<option ${c===r.cur?'selected':''}>${c}</option>`).join('')}</select></div>
        <div><label>${t('price')}</label><input type="number" min="0" step="any" value="${r.price}" oninput="rows[${i}].price=this.value;calc()"></div>
        ${mode==='uses' ? `<div><label>${t('uses')}</label><input type="number" min="0" step="any" value="${r.uses}" oninput="rows[${i}].uses=this.value;calc()"></div>`
          : `<div><label>${t('usesPerYr')}</label><input type="number" min="0" step="any" value="${r.upy}" oninput="rows[${i}].upy=this.value;calc()"></div>
             <div><label>${t('years')}</label><input type="number" min="0" step="any" value="${r.years}" oninput="rows[${i}].years=this.value;calc()"></div>`}
        <div><label>${t('maint')}</label><input type="number" min="0" step="any" value="${r.maint}" oninput="rows[${i}].maint=this.value;calc()"></div>
      </div>
      <div class="cpu-result" id="res-${i}"></div>`;
    box.appendChild(div);
  });
  calc();
}

function esc(s){return String(s).replace(/"/g,'&quot;').replace(/</g,'&lt;');}

function calc() {
  const vals = rows.map(r => {
    const total = (parseFloat(r.price)||0) + (parseFloat(r.maint)||0);
    let uses = mode==='uses' ? (parseFloat(r.uses)||0) : (parseFloat(r.upy)||0) * (parseFloat(r.years)||0);
    const cpu = uses > 0 ? total/uses : Infinity;
    return { total, uses, cpu, cur: r.cur };
  });
  const min = Math.min(...vals.map(v=>v.cpu));
  rows.forEach((r,i) => {
    const el = $(`#res-${i}`);
    if (!el) return;
    const v = vals[i];
    const cur = r.cur;
    if (v.uses <= 0 || v.total <= 0) {
      el.innerHTML = `<span style="color:var(--text2)">‚Äî</span>`;
      return;
    }
    const cpuStr = v.cpu < Infinity ? curFmt(cur, v.cpu) : '‚àû';
    el.innerHTML = `<span>${t('result')}: <b>${cpuStr}</b></span><span>${curFmt(cur,v.total)} √∑ ${fmt(v.uses)}</span>`;
    el.parentElement.classList.toggle('best', v.cpu === min && min < Infinity);
  });
}

function curFmt(cur, n){
  const sym = cur.split(' ')[1] || '';
  return sym + (n>=100? n.toLocaleString(undefined,{maximumFractionDigits:2}) : n.toFixed(2));
}
function fmt(n){return n>=1000? n.toLocaleString() : (Math.round(n*100)/100);}

function delRow(i){ rows.splice(i,1); if(!rows.length) newRow(); render(); }

function setMode(m){
  mode = m;
  document.querySelectorAll('#toolbar .gz-btn').forEach(b=>b.classList.remove('active'));
  calc();
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="newRow()">${t('addRow')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="resetAll()">${t('reset')}</button>
  <select class="gz-select" onchange="mode=this.value;render()">
    <option value="uses">${t('modeUses')}</option>
    <option value="years">${t('modeYears')}</option>
  </select>`;
$('#hint').textContent = t('hint');

function loadExample(){
  rows = [];
  newRow({name:'Cheap Sneakers', price:'35', uses:'60', maint:'0', cur:'USD $'});
  newRow({name:'Quality Sneakers', price:'120', uses:'400', maint:'10', cur:'USD $'});
}
function resetAll(){ rows=[]; newRow({}); }

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'üíπ', href:'/calc/roi-calculator.html', name:'ROI Calculator'},
    {icon:'üè∑Ô∏è', href:'/calc/discount-calculator.html', name:'Discount Calculator'},
    {icon:'üí∞', href:'/calc/unit-price.html', name:'Unit Price'},
    {icon:'üîÅ', href:'/calc/subscription-cost-calculator.html', name:'Subscription Cost'},
  ]
});

newRow({name:'', price:'', uses:'', maint:'', cur:'USD $'});
</script>
