<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is stamp duty?", "acceptedAnswer": {"@type": "Answer", "text": "Stamp duty (SDLT in England and Northern Ireland, LBTT in Scotland, LTT in Wales) is a tax paid when you buy property or land above a certain threshold. The amount depends on the property price, location, whether you are a first-time buyer, and whether it is an additional property."}}, {"@type": "Question", "name": "How is stamp duty calculated?", "acceptedAnswer": {"@type": "Answer", "text": "Stamp duty is calculated on a tiered (marginal) basis, similar to income tax. You pay the rate for each portion of the property price that falls within each band, not a single rate on the whole amount. This calculator applies the correct bands for your selected region and situation."}}, {"@type": "Question", "name": "Do first-time buyers pay stamp duty?", "acceptedAnswer": {"@type": "Answer", "text": "In England and Northern Ireland, first-time buyers pay no SDLT on properties up to £425,000 (2024-2025 thresholds) and a reduced rate up to £625,000. Above £625,000, standard rates apply. Scotland and Wales have their own first-time buyer reliefs for their respective taxes."}}, {"@type": "Question", "name": "Is this stamp duty calculator accurate?", "acceptedAnswer": {"@type": "Answer", "text": "The calculator uses the published rate tables for each region. Rates and thresholds change over time, so always confirm the result against official government guidance before making financial decisions. The tool is for guidance only."}}]}</script>

<script>

    details: 'Property Details', result: 'Your Stamp Duty',

    details: '房产详情', result: '您的印花税',
    region: '地区', price: '房产价格 (£ / € / A$)', first: '首次购房者', second: '附加 / 第二套房产',
    state: '澳大利亚州 / 领地',
    heroLbl: '预估印花税', heroSub: '基于您所在的地区和情况',
    effRateLbl: '实际税率', totalCostLbl: '总价 (房价 + 印花税)', monthlyLbl: '分摊到 25 年贷款',
    copy: '📋 复制结果', reset: '🔄 重置',
    step1: '选择您所在的地区（英国各国、爱尔兰或澳大利亚）',
    step2: '输入房产的完整购买价格',
    step3: '如适用，勾选首次购房者或第二套房产',
    step4: '查看预估印花税和税率档位明细',
  }
});

const { $, copyText, t } = GZ;
const isZh = GZI18n.getLang() === 'zh';

$('#lblDetails').textContent=t('details');$('#lblResult').textContent=t('result');$('#lblRegion').textContent=t('region');
$('#lblPrice').textContent=t('price');$('#lblFirst').textContent=t('first');$('#lblSecond').textContent=t('second');
$('#lblState').textContent=t('state');$('#heroLbl').textContent=t('heroLbl');$('#heroSub').textContent=t('heroSub');
$('#lRate').textContent=t('effRateLbl');$('#lAfter').textContent=t('totalCostLbl');$('#lMonthly').textContent=t('monthlyLbl');

// Marginal band calculator: bands = [[threshold, rate], ...]
function marginalTax(price, bands){
  let duty=0,prev=0,rows=[];
  for(const [limit,rate] of bands){
    if(price>limit){duty+=(limit-prev)*rate;rows.push([prev,limit,rate]);prev=limit;}
    else{duty+=(price-prev)*rate;rows.push([prev,price,rate]);break;}
  }
  if(price>prev)duty+=(price-prev)*0; // bands fully above price contribute nothing
  return{duty,rows};
}

// Rate tables (2024-2025 style)
function getBands(region,first,second,state){
  const surcharge=second?0.04:0;
  if(region==='england'){
    let base;
    if(first){base=[[300000,0],[500000,0.05],[Infinity,0.10]];}
    else{base=[[125000,0],[250000,0.02],[925000,0.05],[1500000,0.10],[Infinity,0.12]];}
    if(first&&second){base=[[0,0],[250000,0.02],[925000,0.05],[1500000,0.10],[Infinity,0.12]];}
    return{bands:base.map(([l,r])=>[l,r+surcharge]),currency:'£'};
  }
  if(region==='scotland'){
    let base=[[145000,0],[250000,0.02],[325000,0.05],[750000,0.10],[Infinity,0.12]];
    if(first)base=[[175000,0],[Infinity,0]];
    return{bands:base.map(([l,r])=>[l,r+surcharge]),currency:'£'};
  }
  if(region==='wales'){
    let base=[[180000,0],[250000,0.035],[400000,0.05],[750000,0.075],[1500000,0.10],[Infinity,0.12]];
    if(first)base=[[225000,0],[Infinity,0]];
    return{bands:base.map(([l,r])=>[l,r+surcharge]),currency:'£'};
  }
  if(region==='ireland'){
    const base=[[1000000,0.01],[Infinity,0.02]];
    if(first){const ft=[[Infinity,0]];return{bands:ft,currency:'€'};}
    return{bands:base,currency:'€'};
  }
  // Australia (simplified first-home concessions vary by state; use general residential scale)
  const auScales={
    nsw:[[17000,0.0125],[36000,0.015],[97000,0.0175],[364000,0.035],[1209000,0.045],[Infinity,0.055]],
    vic:[[25000,0.014],[130000,0.0235],[960000,0.06],[2000000,0.055],[Infinity,0.055]],
    qld:[[5000,0.015],[75000,0.0175],[540000,0.0375],[1000000,0.045],[Infinity,0.0575]],
    wa:[[120000,0.019],[150000,0.0285],[360000,0.038],[725000,0.0475],[Infinity,0.0515]],
    sa:[[12000,0.01],[30000,0.02],[50000,0.03],[100000,0.035],[200000,0.04],[250000,0.0425],[300000,0.0475],[500000,0.055],[Infinity,0.055]],
    tas:[[3000,0.0175],[25000,0.02],[75000,0.0275],[200000,0.035],[375000,0.04],[725000,0.0425],[Infinity,0.045]],
    act:[[260000,0.004],[300000,0.022],[500000,0.034],[750000,0.0432],[1000000,0.04575],[1455000,0.055],[Infinity,0.0575]],
    nt:[]
  };
  const bands=auScales[state]||auScales.nsw;
  if(state==='nt'){// NT: formula-based: 0.061427% of dutiable value, capped
    return{bands:[[Infinity,0.04895]],currency:'A$'};
  }
  return{bands:bands.map(([l,r])=>[l,r+surcharge]),currency:'A$'};
}

function fmtMoney(n,sym){return sym+(Math.round(n)||0).toLocaleString();}
function bandLabel(from,to,currency){if(to===Infinity)return`${fmtMoney(from,currency)}+`;return`${fmtMoney(from,currency)} – ${fmtMoney(to,currency)}`;}

function calc(){
  const region=$('#region').value,price=+$('#price').value||0;
  const first=$('#firstTime').checked,second=$('#secondHome').checked,state=$('#state').value;
  $('#auBox').style.display=region==='australia'?'block':'none';
  const{bands,currency}=getBands(region,first,second,state);
  if(price<=0){$('#dutyVal').textContent=currency+'0';['effRate','totalCost','monthly'].forEach(id=>$('#'+id).textContent='—');$('#breakdown').innerHTML='';return;}
  const{duty,rows}=marginalTax(price,bands);
  $('#dutyVal').textContent=fmtMoney(duty,currency);
  const effRate=price>0?(duty/price*100):0;
  $('#effRate').textContent=effRate.toFixed(2)+'%';
  $('#totalCost').textContent=fmtMoney(price+duty,currency);
  $('#monthly').textContent=price>0?fmtMoney(duty/300,currency):'—';
  let bd=`<table><tr><th>Band</th><th>Rate</th><th>Tax</th></tr>`;
  rows.forEach(([f,to,r])=>{const taxable=to-f;const segTax=Math.max(0,taxable*r);bd+=`<tr><td>${bandLabel(f,to,currency)}</td><td>${(r*100).toFixed(1)}%</td><td>${fmtMoney(segTax,currency)}</td></tr>`;});
  if(rows.length===0)bd+=`<tr><td colspan="3" style="opacity:.6;text-align:center">${isZh?'免税':'No duty payable'}</td></tr>`;
  bd+=`</table>`;
  $('#breakdown').innerHTML=bd;
  $('#note').innerHTML=isZh
    ?`⚠️ 仅供参考。税率和免征额会随政策调整，请以政府官网最新公告为准。印花税按累进方式计算（每档部分单独计税）。`
    :`⚠️ For guidance only. Rates and thresholds change with policy — verify against official government sources before deciding. Duty is calculated on a marginal (tiered) basis.`;
}

['region','price','firstTime','secondHome','state'].forEach(id=>$('#'+id).addEventListener('input',calc));
$('#region').addEventListener('change',calc);
$('#state').addEventListener('change',calc);

$('#toolbar').innerHTML=`
  <button class="gz-btn gz-btn-secondary" id="btnCopy">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" id="btnReset">${t('reset')}</button>`;
$('#btnCopy').onclick=()=>copyText(`${t('toolTitle')}\n${$('#region').options[$('#region').selectedIndex].text}\nStamp Duty: ${$('#dutyVal').textContent}\nEffective Rate: ${$('#effRate').textContent}\nTotal Cost: ${$('#totalCost').textContent}`);
$('#btnReset').onclick=()=>{$('#price').value=0;$('#firstTime').checked=false;$('#secondHome').checked=false;calc();};

calc();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🏦', href:'/calc/mortgage-calculator.html', name:'Mortgage Calculator'},
    {icon:'💸', href:'/calc/early-mortgage-payoff.html', name:'Early Mortgage Payoff'},
    {icon:'🏷️', href:'/calc/discount-calculator.html', name:'Discount Calculator'},
    {icon:'💼', href:'/calc/salary-calculator.html', name:'Salary Calculator'},
  ]
});
</script>
