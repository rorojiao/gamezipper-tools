const { $, copyText, t } = GZ;
let variant = 'adobe';

// Adobe Ascii85 encoding
function adobeEncode(bytes) {
  let result = '';
  for (let i = 0; i < bytes.length; i += 4) {
    let chunk = 0;
    let len = Math.min(4, bytes.length - i);
    for (let j = 0; j < 4; j++) chunk = chunk * 256 + (j < len ? bytes[i + j] : 0);
    if (len === 4 && chunk === 0) { result += 'z'; continue; }
    let chars = [];
    for (let j = 4; j >= 0; j--) { chars[j] = String.fromCharCode(33 + (chunk % 85)); chunk = Math.floor(chunk / 85); }
    result += chars.slice(0, len + 1).join('');
  }
  return '<~' + result + '~>';
}

function adobeDecode(str) {
  str = str.replace(/^<~|~>$/g, '').replace(/\s/g, '');
  let bytes = [];
  let i = 0;
  while (i < str.length) {
    if (str[i] === 'z') { bytes.push(0, 0, 0, 0); i++; continue; }
    let chunk = 0, len = Math.min(5, str.length - i);
    let padded = str.slice(i, i + 5).padEnd(5, 'u');
    for (let j = 0; j < 5; j++) chunk = chunk * 85 + (padded.charCodeAt(j) - 33);
    for (let j = 3; j >= 0; j--) { bytes.push((chunk >> (j * 8)) & 0xFF); }
    i += len;
    if (len < 5) bytes.length -= (4 - len + 1);
  }
  return bytes;
}

// Z85 encoding
const Z85_CHARS = '0123456789abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ.-:+=^!/*?&<>()[]{}@%$#';
function z85Encode(bytes) {
  if (bytes.length % 4 !== 0) throw new Error('Z85 input length must be a multiple of 4 bytes');
  let result = '';
  for (let i = 0; i < bytes.length; i += 4) {
    let chunk = 0;
    for (let j = 0; j < 4; j++) chunk = chunk * 256 + bytes[i + j];
    let chars = [];
    for (let j = 4; j >= 0; j--) { chars[j] = Z85_CHARS[chunk % 85]; chunk = Math.floor(chunk / 85); }
    result += chars.join('');
  }
  return result;
}

function z85Decode(str) {
  if (str.length % 5 !== 0) throw new Error('Z85 input length must be a multiple of 5 characters');
  let bytes = [];
  for (let i = 0; i < str.length; i += 5) {
    let chunk = 0;
    for (let j = 0; j < 5; j++) {
      const idx = Z85_CHARS.indexOf(str[i + j]);
      if (idx === -1) throw new Error(`Invalid Z85 character: ${str[i+j]}`);
      chunk = chunk * 85 + idx;
    }
    for (let j = 3; j >= 0; j--) bytes.push((chunk >> (j * 8)) & 0xFF);
  }
  return bytes;
}

// RFC 1924 encoding
const RFC_CHARS = '0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz!#$%&()*+-;<=>?@^_`{|}~';
function rfcEncode(bytes) {
  let result = '';
  for (let i = 0; i < bytes.length; i += 4) {
    let chunk = 0, len = Math.min(4, bytes.length - i);
    for (let j = 0; j < 4; j++) chunk = chunk * 256 + (j < len ? bytes[i + j] : 0);
    let chars = [];
    for (let j = 4; j >= 0; j--) { chars[j] = RFC_CHARS[chunk % 85]; chunk = Math.floor(chunk / 85); }
    result += chars.slice(0, len + 1).join('');
  }
  return result;
}

function rfcDecode(str) {
  let bytes = [];
  let i = 0;
  while (i < str.length) {
    let chunk = 0, len = Math.min(5, str.length - i);
    let padded = str.slice(i, i + 5);
    while (padded.length < 5) padded += RFC_CHARS[0];
    for (let j = 0; j < 5; j++) {
      const idx = RFC_CHARS.indexOf(padded[j]);
      if (idx === -1) throw new Error(`Invalid RFC 1924 character: ${padded[j]}`);
      chunk = chunk * 85 + idx;
    }
    for (let j = 3; j >= 0; j--) bytes.push((chunk >> (j * 8)) & 0xFF);
    i += len;
    if (len < 5) bytes.length -= (4 - len + 1);
  }
  return bytes;
}

// btoa standard
function btoaEncode(bytes) {
  let result = '';
  for (let i = 0; i < bytes.length; i += 4) {
    let chunk = 0, len = Math.min(4, bytes.length - i);
    for (let j = 0; j < 4; j++) chunk = chunk * 256 + (j < len ? bytes[i + j] : 0);
    if (len === 4 && chunk === 0) { result += 'z'; continue; }
    let chars = [];
    for (let j = 4; j >= 0; j--) { chars[j] = String.fromCharCode(33 + (chunk % 85)); chunk = Math.floor(chunk / 85); }
    result += chars.slice(0, len + 1).join('');
  }
  return result;
}

function btoaDecode(str) {
  str = str.replace(/\s/g, '');
  let bytes = [];
  let i = 0;
  while (i < str.length) {
    if (str[i] === 'z') { bytes.push(0, 0, 0, 0); i++; continue; }
    let chunk = 0, len = Math.min(5, str.length - i);
    let padded = str.slice(i, i + 5).padEnd(5, 'u');
    for (let j = 0; j < 5; j++) chunk = chunk * 85 + (padded.charCodeAt(j) - 33);
    for (let j = 3; j >= 0; j--) bytes.push((chunk >> (j * 8)) & 0xFF);
    i += len;
    if (len < 5) bytes.length -= (4 - len + 1);
  }
  return bytes;
}

function textToBytes(text) {
  return new TextEncoder().encode(text);
}

function bytesToText(bytes) {
  return new TextDecoder().decode(new Uint8Array(bytes));
}

function doEncode() {
  const input = $('#input').value;
  if (!input.trim()) return;
  try {
    const bytes = textToBytes(input);
    let result;
    switch (variant) {
      case 'adobe': result = adobeEncode(bytes); break;
      case 'z85': result = z85Encode(bytes); break;
      case 'rfc1924': result = rfcEncode(bytes); break;
      case 'btoa': result = btoaEncode(bytes); break;
    }
    $('#output').textContent = result;
  } catch (e) {
    $('#output').innerHTML = `<span style="color:var(--gz-accent)">Error: ${e.message}</span>`;
  }
}

function doDecode() {
  const input = $('#input').value;
  if (!input.trim()) return;
  try {
    let bytes;
    switch (variant) {
      case 'adobe': bytes = adobeDecode(input); break;
      case 'z85': bytes = z85Decode(input); break;
      case 'rfc1924': bytes = rfcDecode(input); break;
      case 'btoa': bytes = btoaDecode(input); break;
    }
    $('#output').textContent = bytesToText(bytes);
  } catch (e) {
    $('#output').innerHTML = `<span style="color:var(--gz-accent)">Error: ${e.message}</span>`;
  }
}
