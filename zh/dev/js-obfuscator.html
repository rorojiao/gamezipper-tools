// Reserved words and globals that should not be renamed
const RESERVED = new Set(['true','false','null','undefined','this','self','window','globalThis','document','navigator','location','history','console','Math','JSON','Array','Object','String','Number','Boolean','Date','RegExp','Error','Promise','Set','Map','WeakMap','WeakSet','Symbol','Function','arguments','require','module','exports','process','return','if','else','for','while','do','switch','case','break','continue','var','let','const','function','class','new','delete','typeof','instanceof','in','of','try','catch','finally','throw','async','await','yield','import','export','default','from','as','void']);

const JS_RESERVED = new Set(['break','case','catch','class','const','continue','debugger','default','delete','do','else','export','extends','false','finally','for','function','if','import','in','instanceof','new','null','return','super','switch','this','throw','true','try','typeof','var','void','while','with','yield','let','static','async','await','enum','implements','interface','package','private','protected','public']);

function generateObfName() {
  const alphabet = 'abcdefghijklmnopqrstuvwxyz';
  const first = alphabet[Math.floor(Math.random()*alphabet.length)];
  let n = Math.floor(Math.random() * 9999) + 1;
  return '_0x' + first + n.toString(36);
}

function buildRenameMap(code) {
  const idents = new Set();
  const re = /(?<![A-Za-z0-9_$])([A-Za-z_$][A-Za-z0-9_$]*)/g;
  let m;
  while ((m = re.exec(code))) {
    const id = m[1];
    if (JS_RESERVED.has(id)) continue;
    if (id.startsWith('__') || id.endsWith('__')) continue;
    if (id.length < 2) continue;
    idents.add(id);
  }
  const sorted = [...idents];
  const map = new Map();
  for (const id of sorted) {
    map.set(id, generateObfName());
  }
  return map;
}

function renameIdentifiers(code, map) {
  // Sort keys by length desc to avoid prefix overlap
  const keys = [...map.keys()].sort((a,b) => b.length - a.length);
  for (const id of keys) {
    const newName = map.get(id);
    const re = new RegExp('(?<![A-Za-z0-9_$])' + id.replace(/[$]/g, '\\$') + '(?![A-Za-z0-9_$])', 'g');
    code = code.replace(re, newName);
  }
  return code;
}

function encodeString(s) {
  // String.fromCharCode encoding
  const codes = [];
  for (let i = 0; i < s.length; i++) {
    codes.push(s.charCodeAt(i));
  }
  return "String.fromCharCode(" + codes.join(",") + ")";
}

function encodeStrings(code) {
  // Encode string literals (single, double, backtick)
  // Be careful: don't encode inside regex
  let result = '';
  let i = 0;
  const n = code.length;
  while (i < n) {
    const c = code[i];
    // Detect string start
    if (c === '"' || c === "'" || c === '`') {
      const quote = c;
      let j = i + 1;
      let str = '';
      let escaped = false;
      while (j < n) {
        const cj = code[j];
        if (escaped) { str += '\\' + cj; escaped = false; j++; continue; }
        if (cj === '\\') { escaped = true; j++; continue; }
        if (cj === quote) { break; }
        str += cj;
        j++;
      }
      if (j >= n) { result += code.substring(i); break; }
      // Decode escape sequences for re-encoding
      let decoded;
      try { decoded = JSON.parse('"' + str.replace(/"/g, '\\"') + '"'); } catch(e) { decoded = str.replace(/\\(.)/g, '$1'); }
      if (decoded.length === 0) { result += code.substring(i, j+1); }
      else { result += encodeString(decoded); }
      i = j + 1;
    } else if (c === '/' && i + 1 < n && code[i+1] === '/') {
      // line comment
      let j = i;
      while (j < n && code[j] !== '\n') j++;
      i = j;
    } else if (c === '/' && i + 1 < n && code[i+1] === '*') {
      // block comment
      let j = i + 2;
      while (j < n - 1 && !(code[j] === '*' && code[j+1] === '/')) j++;
      i = j + 2;
    } else {
      result += c;
      i++;
    }
  }
  return result;
}

function minifyCode(code) {
  // Strip comments
  code = code.replace(/\/\*[\s\S]*?\*\//g, '');
  code = code.replace(/(^|[^:])\/\/.*$/gm, '$1');
  // Collapse whitespace
  code = code.replace(/\s+/g, ' ');
  // Remove spaces around operators
  code = code.replace(/\s*([{};:,()=<>+\-*\/&|!?,])\s*/g, '$1');
  // Trim
  return code.trim();
}

function beautifyCode(code) {
  // Very simple beautifier
  let out = '';
  let indent = 0;
  const tab = '  ';
  let inStr = null;
  let inComment = false;
  let inLineComment = false;
  i_loop:
  for (let i = 0; i < code.length; i++) {
    const c = code[i];
    const next = code[i+1];
    if (inLineComment) {
      out += c;
      if (c === '\n') { inLineComment = false; }
      continue;
    }
    if (inComment) {
      out += c;
      if (c === '*' && next === '/') { out += next; i++; inComment = false; }
      continue;
    }
    if (inStr) {
      out += c;
      if (c === '\\') { if (next != null) { out += next; i++; } }
      else if (c === inStr) { inStr = null; }
      continue;
    }
    if (c === '/' && next === '/') { inLineComment = true; out += c; continue; }
    if (c === '/' && next === '*') { inComment = true; out += c; continue; }
    if (c === '"' || c === "'" || c === '`') { inStr = c; out += c; continue; }
    if (c === '{') { out += ' {\n' + tab.repeat(++indent); continue; }
    if (c === '}') { out += '\n' + tab.repeat(--indent) + '}'; continue; }
    if (c === ';') { out += ';\n' + tab.repeat(indent); continue; }
    out += c;
  }
  return out.replace(/\n\s*\n/g, '\n').trim();
}

function injectDeadCode(code) {
  // Insert harmless dead code paths
  const snippets = [
    'if (false) { console.log("x"); }',
    'var _q9 = (function(){return arguments;})(1,2,3);',
    'try { null.x; } catch(_e) {}',
    'void(0);',
  ];
  // Insert one snippet at top
  return snippets[Math.floor(Math.random()*snippets.length)] + '\n' + code;
}

function wrapIIFE(code) {
  return '(function(){\n' + code + '\n})();';
}

function hexEscape(code) {
  return code.split('').map(c => {
    const code2 = c.charCodeAt(0);
    if (code2 < 32 || code2 > 126) return '\\x' + code2.toString(16).padStart(2,'0');
    if (c === '\\') return '\\\\';
    return c;
  }).join('');
}

function doObfuscate() {
  let code = $('#input').value;
  if (!code.trim()) { $('#output').value = ''; renderStats(0,0); return; }
  if ($('#opt-minify').checked) code = minifyCode(code);
  if ($('#opt-deadcode').checked) code = injectDeadCode(code);
  if ($('#opt-rename').checked) {
    const map = buildRenameMap(code);
    code = renameIdentifiers(code, map);
  }
  if ($('#opt-strings').checked) code = encodeStrings(code);
  if ($('#opt-hex').checked) code = hexEscape(code);
  if ($('#opt-wrap').checked) code = wrapIIFE(code);
  $('#output').value = code;
  renderStats($('#input').value.length, code.length);
}

function doBeautify() {
  const code = $('#input').value;
  if (!code.trim()) return;
  $('#output').value = beautifyCode(code);
  renderStats($('#input').value.length, $('#output').value.length);
}

function doMinify() {
  const code = $('#input').value;
  if (!code.trim()) return;
  $('#output').value = minifyCode(code);
  renderStats($('#input').value.length, $('#output').value.length);
}

function renderStats(a, b) {
  const ratio = a > 0 ? (b / a * 100) : 0;
  const saved = a > 0 ? Math.max(0, 100 - ratio) : 0;
  $('#stats').innerHTML = `

    <div class="stat"><div class="val">${b.toLocaleString()}</div><div class="lbl">${t('outputSize')} (B)</div></div>
    <div class="stat"><div class="val">${ratio.toFixed(1)}%</div><div class="lbl">${t('ratio')}</div></div>
    <div class="stat"><div class="val">${saved.toFixed(1)}%</div><div class="lbl">${t('saved')}</div></div>
  `;
}

console.log(greetUser("Alice", 25));
