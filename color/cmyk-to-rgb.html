<script>
GZI18n.register({
  en:{toolTitle:'CMYK ↔ RGB Converter',toolDesc:'Convert colors between CMYK (Cyan, Magenta, Yellow, Key) for print and RGB for screens instantly.',
    s1:'Enter a CMYK value (e.g. cmyk(53%, 60%, 0%, 9%))',s2:'Or enter an RGB value (e.g. rgb(108, 92, 231))',
    s3:'Use the C/M/Y/K sliders to pick a print color visually',s4:'Click Copy to copy either CMYK or RGB value',
    rHexCmyk:'HEX ↔ CMYK',rRgb:'HEX ↔ RGB',rHsl:'HEX ↔ HSL',rPicker:'Color Picker'},
  zh:{toolTitle:'CMYK ↔ RGB 转换器',toolDesc:'即时转换 CMYK（青、品红、黄、黑/印刷色）与 RGB（屏幕色）颜色格式。',
    s1:'输入 CMYK 值（如 cmyk(53%, 60%, 0%, 9%)）',s2:'或输入 RGB 值（如 rgb(108, 92, 231)）',
    s3:'使用 C/M/Y/K 滑块可视化选择印刷颜色',s4:'点击复制按钮复制 CMYK 或 RGB 值',
    rHexCmyk:'HEX ↔ CMYK',rRgb:'HEX ↔ RGB',rHsl:'HEX ↔ HSL',rPicker:'取色器'}
});

const { $, t } = GZ;
const cmykIn=$('#cmykInput'),rgbIn=$('#rgbInput');
const cS=$('#cSlider'),mS=$('#mSlider'),yS=$('#ySlider'),kS=$('#kSlider');

function rgb2cmyk(r,g,b){
  r/=255;g/=255;b/=255;
  const k=1-Math.max(r,g,b);
  if(k===1)return[0,0,0,100];
  const c=(1-r-k)/(1-k);
  const m=(1-g-k)/(1-k);
  const y=(1-b-k)/(1-k);
  return[Math.round(c*100),Math.round(m*100),Math.round(y*100),Math.round(k*100)];
}
function cmyk2rgb(c,m,y,k){
  c/=100;m/=100;y/=100;k/=100;
  const r=255*(1-c)*(1-k);
  const g=255*(1-m)*(1-k);
  const b=255*(1-y)*(1-k);
  return[Math.round(r),Math.round(g),Math.round(b)];
}

function updatePreview(r,g,b){
  $('#preview').style.background=`rgb(${r},${g},${b})`;
  const[c,m,y,k]=rgb2cmyk(r,g,b);
  cS.value=c;mS.value=m;yS.value=y;kS.value=k;
  $('#cVal').textContent=c;$('#mVal').textContent=m;$('#yVal').textContent=y;$('#kVal').textContent=k;
}

cmykIn.addEventListener('input',()=>{
  const m=cmykIn.value.match(/(\d{1,3})%?\s*,\s*(\d{1,3})%?\s*,\s*(\d{1,3})%?\s*,\s*(\d{1,3})%?/);
  if(m){
    const[c,mu,y,k]=[+m[1],+m[2],+m[3],+m[4]];
    if(c<=100&&mu<=100&&y<=100&&k<=100){
      const[r,g,b]=cmyk2rgb(c,mu,y,k);
      rgbIn.value=`rgb(${r}, ${g}, ${b})`;
      updatePreview(r,g,b);
    }
  }
});

rgbIn.addEventListener('input',()=>{
  const m=rgbIn.value.match(/(\d{1,3})\s*,\s*(\d{1,3})\s*,\s*(\d{1,3})/);
  if(m){
    const[r,g,b]=[+m[1],+m[2],+m[3]];
    if(r<=255&&g<=255&&b<=255){
      const[c,mu,y,k]=rgb2cmyk(r,g,b);
      cmykIn.value=`cmyk(${c}%, ${mu}%, ${y}%, ${k}%)`;
      updatePreview(r,g,b);
    }
  }
});

function fromSliders(){
  const c=+cS.value,m=+mS.value,y=+yS.value,k=+kS.value;
  const[r,g,b]=cmyk2rgb(c,m,y,k);
  cmykIn.value=`cmyk(${c}%, ${m}%, ${y}%, ${k}%)`;
  rgbIn.value=`rgb(${r}, ${g}, ${b})`;
  updatePreview(r,g,b);
}

// Init
cmykIn.dispatchEvent(new Event('input'));

GZ.renderToolPage({category:'color',titleKey:'toolTitle',descKey:'toolDesc',
  howToSteps:['s1','s2','s3','s4'],
  related:[
    {href:'/color/hex-to-cmyk.html',icon:'🎨',nameKey:'rHexCmyk'},
    {href:'/color/hex-rgb.html',icon:'🔁',nameKey:'rRgb'},
    {href:'/color/hex-to-hsl.html',icon:'🌈',nameKey:'rHsl'},
    {href:'/color/picker.html',icon:'🎯',nameKey:'rPicker'}
  ]
});
</script>
