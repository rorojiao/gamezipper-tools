  <div class="gz-howto"><h2></h2><ol></ol></div>

<script>
GZI18n.register({
  en: {
    toolTitle: 'CSS Timeline Generator',
    toolDesc: 'Generate beautiful vertical timeline components with live preview. Customize steps, dates, colors and styles.',
    steps: 'Steps',
    accent: 'Accent',
    generate: 'Generate',
    copyHTML: 'Copy HTML',
    copyCSS: 'Copy CSS',
    step1: 'Set the number of timeline steps (2-8)',
    step2: 'Customize title, description and date for each step',
    step3: 'Choose your accent color',
    step4: 'Click Generate to preview, then copy HTML or CSS',
  },
  zh: {
    toolTitle: 'CSS 时间线生成器',
    toolDesc: '可视化生成精美的 CSS 垂直时间线组件，支持自定义步骤、日期和颜色。',
    steps: '步骤数',
    accent: '强调色',
    generate: '生成',
    copyHTML: '复制 HTML',
    copyCSS: '复制 CSS',
    step1: '设置时间线步骤数量（2-8）',
    step2: '自定义每步的标题、描述和日期',
    step3: '选择强调色',
    step4: '点击生成预览，然后复制 HTML 或 CSS',
  }
});

const { $, copyText, t } = GZ;
let accent = '#4ecdc4', stepCount = 4;
const defaultSteps = [
  { title: 'Project Kickoff', desc: 'Define goals, assemble team and create project roadmap.', date: 'Jan 2026' },
  { title: 'Design Phase', desc: 'Create wireframes, mockups and get stakeholder approval.', date: 'Feb 2026' },
  { title: 'Development', desc: 'Build features, write tests and deploy to staging.', date: 'Mar 2026' },
  { title: 'Launch', desc: 'Deploy to production, monitor metrics and gather feedback.', date: 'Apr 2026' },
  { title: 'Optimize', desc: 'Analyze performance, fix bugs and improve UX.', date: 'May 2026' },
  { title: 'Scale', desc: 'Expand features, grow user base and plan next version.', date: 'Jun 2026' },
  { title: 'Review', desc: 'Conduct retrospective and document lessons learned.', date: 'Jul 2026' },
  { title: 'Iterate', desc: 'Plan next sprint based on user feedback and analytics.', date: 'Aug 2026' },
];

function buildToolbar() {
  $('#toolbar').innerHTML = `
    <label>${t('steps')} <input type="number" id="inp-steps" min="2" max="8" value="${stepCount}" style="width:60px"></label>
    <label>${t('accent')} <input type="color" id="inp-accent" value="${accent}"></label>
    <button class="gz-btn" onclick="generate()">${t('generate')}</button>
    <button class="gz-btn gz-btn-secondary" onclick="copyHTML()">${t('copyHTML')}</button>
    <button class="gz-btn gz-btn-secondary" onclick="copyCSS()">${t('copyCSS')}</button>`;
  $('#inp-steps').addEventListener('input', e => { stepCount = Math.min(8, Math.max(2, +e.target.value)); generate(); });
  $('#inp-accent').addEventListener('input', e => { accent = e.target.value; generate(); });
}

function generate() {
  const preview = $('#preview');
  let html = '<div class="timeline">';
  for (let i = 0; i < stepCount; i++) {
    const s = defaultSteps[i];
    html += `<div class="tl-item">
      <div class="tl-dot" style="background:${accent}"></div>
      <div class="tl-content">
        <span class="tl-date" style="color:${accent}">${s.date}</span>
        <h4>${s.title}</h4>
        <p>${s.desc}</p>
      </div>
    </div>`;
  }
  html += '</div>';
  preview.innerHTML = html;
}

function copyHTML() {
  let html = '<div class="timeline">\n';
  for (let i = 0; i < stepCount; i++) {
    const s = defaultSteps[i];
    html += `  <div class="tl-item">
    <div class="tl-dot"></div>
    <div class="tl-content">
      <span class="tl-date">${s.date}</span>
      <h4>${s.title}</h4>
      <p>${s.desc}</p>
    </div>
  </div>\n`;
  }
  html += '</div>';
  copyText(html);
}

function copyCSS() {
  const css = `.timeline { position: relative; padding: 20px 0; }
.timeline::before { content: ''; position: absolute; left: 20px; top: 0; bottom: 0; width: 3px; background: #333; border-radius: 2px; }
.tl-item { position: relative; padding: 0 0 32px 56px; }
.tl-item:last-child { padding-bottom: 0; }
.tl-dot { position: absolute; left: 12px; top: 4px; width: 20px; height: 20px; border-radius: 50%; background: ${accent}; border: 3px solid #0d0d0d; z-index: 1; }
.tl-content { background: #1a1a2e; border: 1px solid #333; border-radius: 10px; padding: 16px 20px; }
.tl-content h4 { margin: 0 0 6px; font-size: 0.95em; }
.tl-content p { margin: 0; font-size: 0.82em; line-height: 1.5; color: #aaa; }
.tl-date { font-size: 0.75em; color: ${accent}; margin-bottom: 6px; display: block; }`;
  copyText(css);
}

buildToolbar();
generate();

GZ.renderToolPage({
  category: 'css',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🃏', href:'/css-tools/card.html', name:'Card Generator'},
    {icon:'📋', href:'/css-tools/accordion.html', name:'Accordion Generator'},
    {icon:'💬', href:'/css-tools/tooltip.html', name:'Tooltip Generator'},
    {icon:'🎬', href:'/css-tools/animation.html', name:'Animation Generator'},
  ]
});
</script>

</body>
