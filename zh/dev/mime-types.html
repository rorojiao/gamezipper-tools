  application: { en: 'Application', zh: '应用' },
  text: { en: 'Text', zh: '文本' },
  image: { en: 'Image', zh: '图片' },
  audio: { en: 'Audio', zh: '音频' },
  video: { en: 'Video', zh: '视频' },
  font: { en: 'Font', zh: '字体' },
  model: { en: 'Model', zh: '模型' },
  multipart: { en: 'Multipart', zh: '分段' },
  message: { en: 'Message', zh: '消息' },
  chemical: { en: 'Chemical', zh: '化学' },
};
const lang = GZI18n.getLang();
$('#cats').innerHTML = cats.map((c, i) =>
  `<button class="cat-btn${i === 0 ? ' active' : ''}" data-cat="${c}">${catLabels[c] ? catLabels[c][lang] : c} <span style="opacity:.6">${c === 'all' ? MIME.length : catSet[c]}</span></button>`
).join('');

let currentCat = 'all';

document.querySelectorAll('.cat-btn').forEach(b => b.addEventListener('click', () => {
  document.querySelectorAll('.cat-btn').forEach(x => x.classList.remove('active'));
  b.classList.add('active');
  currentCat = b.dataset.cat;
  render();
}));

function render() {
  const q = $('#search').value.toLowerCase().trim();
  const tbody = $('#tbody');
  const rows = MIME.filter(row => {
    if (currentCat !== 'all' && !row[0].startsWith(currentCat + '/')) return false;
    if (!q) return true;
    return row[0].toLowerCase().includes(q) ||
           row[2].toLowerCase().includes(q) ||
           row[1].toLowerCase().includes(q) ||
           (Array.isArray(row[3]) ? row[3] : []).some(e => e.toLowerCase().includes(q));
  });
  tbody.innerHTML = rows.map(r => {
    const extsArr = Array.isArray(r[3]) ? r[3] : [];
    const exts = extsArr.length ? extsArr.map(e => '.' + e).join(', ') : '—';
    return `<tr><td class="mime">${r[0]}</td><td class="ext">${exts}</td><td>${r[2]}</td><td><span class="copy-link" onclick="copyMime('${r[0]}',this)">${t('copy')}</span></td></tr>`;
  }).join('');
  $('#count').textContent = `${t('showing')} ${rows.length} ${t('of')} ${MIME.length} ${t('types')}`;
}

function copyMime(m, el) {
  navigator.clipboard.writeText(m);
  const old = el.textContent;
  el.textContent = t('copied');
  setTimeout(() => { el.textContent = old; }, 1200);
}

$('#search').addEventListener('input', render);
render();
