<script>
GZI18n.register({
  en: {

    placeholder: '在此粘贴或输入文本...',
    lblStop: '排除停用词',
    lblCase: '不区分大小写',
    lblMax: '最大词数：',
    lblMin: '最小字号：',
    lblMax2: '最大字号：',
    lblPalette: '配色：',
    lblColor1: '颜色 1：',

    copyHtml: '复制 HTML',
    totalWords: '总词数',

    noResults: '请在上方输入或粘贴文本以生成标签云。',

const { $, copyText, t } = GZ;

const STOP = new Set(['a','an','the','and','or','but','if','then','is','are','was','were','be','been','being','have','has','had','do','does','did','will','would','should','could','may','might','must','can','i','you','he','she','it','we','they','me','him','her','us','them','my','your','his','its','our','their','this','that','these','those','of','in','on','at','to','for','with','by','from','as','into','about','up','out','over','under','not','no','so','very','just','than','too','also','only','s','t','d','ll','m','o','re','ve','y','am']);

function hexToRgb(h){
  const m = h.replace('#','').match(/.{2}/g);
  return m ? m.map(x=>parseInt(x,16)) : [0,0,0];
}
function rgbToHex(r,g,b){
  return '#'+[r,g,b].map(x=>Math.round(x).toString(16).padStart(2,'0')).join('');
}
function lerpColor(c1,c2,t){
  const a=hexToRgb(c1), b=hexToRgb(c2);
  return rgbToHex(a[0]+(b[0]-a[0])*t, a[1]+(b[1]-a[1])*t, a[2]+(b[2]-a[2])*t);
}
function hsv(h,s,v){
  const c=v*s, x=c*(1-Math.abs((h/60)%2-1)), m=v-c;
  let r,g,b;
  if(h<60){r=c;g=x;b=0;} else if(h<120){r=x;g=c;b=0;} else if(h<180){r=0;g=c;b=x;}
  else if(h<240){r=0;g=x;b=c;} else if(h<300){r=x;g=0;b=c;} else {r=c;g=0;b=x;}
  return rgbToHex((r+m)*255,(g+m)*255,(b+m)*255);
}

function generate(){
  const raw = $('#input').value;
  const cloud = $('#cloud');
  if(!raw.trim()){
    cloud.innerHTML = `<div style="opacity:.6;text-align:center">${t('noResults')}</div>`;
    $('#stats').innerHTML='';
    return;
  }
  let s = raw.replace(/[^\w\s一-鿿'-]/g,' ');
  if ($('#optCase').checked) s = s.toLowerCase();
  let tokens = s.split(/\s+/).filter(Boolean);
  const total = tokens.length;
  if ($('#optStop').checked) tokens = tokens.filter(w=>!STOP.has(w.toLowerCase()));
  const counts = new Map();
  tokens.forEach(w=>counts.set(w,(counts.get(w)||0)+1));
  const sorted = [...counts.entries()].sort((a,b)=>b[1]-a[1]);
  const maxWords = Math.max(10,Math.min(200,parseInt($('#maxWords').value)||60));
  const minFont = Math.max(8,parseInt($('#minFont').value)||12);
  const maxFont = Math.max(minFont+4,parseInt($('#maxFont').value)||48);
  const palette = $('#palette').value;
  const c1 = $('#color1').value, c2 = $('#color2').value;
  const top = sorted.slice(0,maxWords);
  const maxC = top[0]?top[0][1]:1, minC = top[top.length-1]?top[top.length-1][1]:1;
  const isDark = $('#optDark').checked;
  cloud.className = 'tc-cloud'+(isDark?' dark':'');
  const tags = top.map(([word,count],i)=>{
    const t = maxC===minC ? 0.5 : (count-minC)/(maxC-minC);
    const fontSize = (minFont + t*(maxFont-minFont)).toFixed(1);
    let color;
    if (palette==='mono') color = c1;
    else if (palette==='gradient') color = lerpColor(c1,c2,t);
    else color = hsv(i/top.length*360, 0.7, 0.9);
    const opacity = (0.6 + t*0.4).toFixed(2);
    return `<span class="tc-tag" style="font-size:${fontSize}px;color:${color};opacity:${opacity}" title="${word}: ${count}">${escapeHtml(word)}</span>`;
  });
  cloud.innerHTML = tags.join(' ');
  $('#stats').innerHTML = `
    <div class="tc-stat"><div class="num">${total}</div><div class="label">${t('totalWords')}</div></div>
    <div class="tc-stat"><div class="num">${counts.size}</div><div class="label">${t('uniqueWords')}</div></div>
    <div class="tc-stat"><div class="num">${top.length}</div><div class="label">${t('shownWords')}</div></div>`;
}

function escapeHtml(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

function downloadPng(){
  const cloud = $('#cloud');
  const w = cloud.offsetWidth, h = cloud.offsetHeight;
  const data = `<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}"><foreignObject width="100%" height="100%"><div xmlns="http://www.w3.org/1999/xhtml" style="width:${w}px;height:${h}px">${cloud.innerHTML}</div></foreignObject></svg>`;
  const blob = new Blob([data],{type:'image/svg+xml'});
  const url = URL.createObjectURL(blob);
  const img = new Image();
  img.onload = ()=>{
    const canvas = document.createElement('canvas');
    canvas.width = w*2; canvas.height = h*2;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = $('#optDark').checked ? '#1a1a2e' : getComputedStyle(cloud).backgroundColor;
    ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.scale(2,2);
    ctx.drawImage(img,0,0);
    canvas.toBlob(b=>{
      const a=document.createElement('a'); a.href=URL.createObjectURL(b); a.download='tag-cloud.png'; a.click();
      URL.revokeObjectURL(a.href);
    });
    URL.revokeObjectURL(url);
  };
  img.src = url;
}

function copyHtml(){
  const html = `<div style="display:flex;flex-wrap:wrap;gap:6px;align-items:center;justify-content:center">${$('#cloud').innerHTML}</div>`;
  copyText(html);
}

function loadExample(){
  $('#input').value = "Innovation creativity design technology future artificial intelligence machine learning data science cloud computing mobile web development user experience interface design productivity automation digital transformation startup growth marketing strategy leadership teamwork collaboration communication agile scrum kanban open source community knowledge learning education research discovery invention prototype testing quality performance optimization security privacy encryption blockchain cryptocurrency fintech ecommerce sustainability renewable energy climate electric vehicles space exploration biotechnology health wellness fitness nutrition meditation mindfulness";
  generate();
}

function clearAll(){
  $('#input').value=''; generate();
}

['#input','#maxWords','#minFont','#maxFont','#color1','#color2','#palette','#optStop','#optCase','#optDark'].forEach(sel=>{
  $(sel).addEventListener('input',generate);
  if(sel!=='#input'&&sel!=='#color1'&&sel!=='#color2') $(sel).addEventListener('change',generate);
});

['Stop','Case','Max','Min','Max2','Palette','Color1','Color2','Dark'].forEach(k=>{
  $('#lbl'+k).textContent = t('lbl'+k);
});
$('#input').placeholder = t('placeholder');

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn" onclick="downloadPng()">${t('download')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="copyHtml()">${t('copyHtml')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="clearAll()">${t('clear')}</button>`;

generate();

});
</script>
