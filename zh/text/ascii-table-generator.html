  },
  zh: {
    toolTitle: 'ASCII 表格生成器',
    toolDesc: '从数据生成干净的 ASCII 文本表格 — 支持 Markdown、MySQL、圆角等 6 种风格。',
    lblIn: '输入数据（CSV 或 TSV）：',
    lblOut: '生成的表格：',
    generate: '生成',
    example: '示例',
    copy: '复制',
    clear: '清除',
    styleMarkdown: 'Markdown',
    styleMysql: 'MySQL',
    styleSimple: '简约',
    styleDotted: '点线',
    styleRounded: '圆角',
    styleDouble: '双线',
    step1: '以逗号或制表符分隔的形式输入数据',
    step2: '选择表格风格（Markdown、MySQL、简约、点线、圆角或双线）',
    step3: '点击「生成」创建 ASCII 表格',
    step4: '复制结果并粘贴到 README、代码或邮件中',
  }
});

const { $, copyText, t } = GZ;
let currentStyle = 'markdown';

const styles = ['markdown','mysql','simple','dotted','rounded','double'];
$('#styles').innerHTML = styles.map(s => `<button class="style-btn${s==='markdown'?' active':''}" onclick="setStyle('${s}',this)">${t('style'+s.charAt(0).toUpperCase()+s.slice(1))}</button>`).join('');

function setStyle(s, btn) {
  currentStyle = s;
  document.querySelectorAll('.style-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  generate();
}

function parseCSV(text) {
  const lines = text.trim().split('\n').map(l => l.trim()).filter(l => l);
  return lines.map(line => {
    if (line.includes('\t')) return line.split('\t');
    // Simple CSV parser
    const cells = [];
    let current = '', inQuote = false;
    for (const ch of line) {
      if (ch === '"') { inQuote = !inQuote; }
      else if (ch === ',' && !inQuote) { cells.push(current.trim()); current = ''; }
      else { current += ch; }
    }
    cells.push(current.trim());
    return cells;
  });
}

function generate() {
  const input = $('#input').value.trim();
  if (!input) { $('#output').textContent = ''; return; }
  const rows = parseCSV(input);
  if (rows.length === 0) return;
  const cols = Math.max(...rows.map(r => r.length));
  // Normalize
  rows.forEach(r => { while (r.length < cols) r.push(''); });
  // Column widths
  const widths = [];
  for (let c = 0; c < cols; c++) {
    widths[c] = Math.max(...rows.map(r => getStringWidth(r[c])));
  }
  let result = '';
  const pad = (s, w) => {
    const sw = getStringWidth(s);
    return s + ' '.repeat(Math.max(0, w - sw));
  };
  function getStringWidth(s) { return [...s].reduce((sum, ch) => sum + (ch.charCodeAt(0) > 127 ? 2 : 1), 0); }

  const hdr = rows[0];
  const body = rows.slice(1);

  switch (currentStyle) {
    case 'markdown': {
      result += '| ' + hdr.map((h, i) => pad(h, widths[i])).join(' | ') + ' |\n';
      result += '| ' + widths.map(w => '-'.repeat(w)).join(' | ') + ' |\n';
      body.forEach(row => {
        result += '| ' + row.map((c, i) => pad(c, widths[i])).join(' | ') + ' |\n';
      });
      break;
    }
    case 'mysql': {
      const sep = '+' + widths.map(w => '-'.repeat(w + 2)).join('+') + '+\n';
      result += sep;
      result += '| ' + hdr.map((h, i) => pad(h, widths[i])).join(' | ') + ' |\n';
      result += sep;
      body.forEach(row => {
        result += '| ' + row.map((c, i) => pad(c, widths[i])).join(' | ') + ' |\n';
      });
      result += sep;
      break;
    }
    case 'simple': {
      body.forEach((row, ri) => {
        result += hdr.map((h, i) => pad(h, widths[i]) + ': ' + pad(row[i], widths[i])).join('  ') + '\n';
      });
      break;
    }
    case 'dotted': {
      const sep = ':' + widths.map(w => '.'.repeat(w + 2)).join(':') + ':\n';
      result += sep;
      result += '| ' + hdr.map((h, i) => pad(h, widths[i])).join(' | ') + ' |\n';
      result += sep;
      body.forEach(row => {
        result += '| ' + row.map((c, i) => pad(c, widths[i])).join(' | ') + ' |\n';
      });
      result += sep;
      break;
    }
    case 'rounded': {
      const tl='╭',tr='╮',bl='╰',br='╯',h='─',v='│',lt='├',rt='┤',tt='┬',bt='┴',x='┼';
      const sep = lt + widths.map(w => h.repeat(w + 2)).join(tt) + rt + '\n';
      const top = tl + widths.map(w => h.repeat(w + 2)).join(tt) + tr + '\n';
      const bot = bl + widths.map(w => h.repeat(w + 2)).join(bt) + br + '\n';
      result += top;
      result += v + ' ' + hdr.map((h2, i) => pad(h2, widths[i])).join(' ' + v + ' ') + ' ' + v + '\n';
      result += sep;
      body.forEach(row => {
        result += v + ' ' + row.map((c, i) => pad(c, widths[i])).join(' ' + v + ' ') + ' ' + v + '\n';
      });
      result += bot;
      break;
    }
    case 'double': {
      const tl='╔',tr='╗',bl='╚',br='╝',h2='═',v='║',lt='╠',rt='╣',tt='╦',bt='╩',x='╬';
      const sep = lt + widths.map(w => h2.repeat(w + 2)).join(tt) + rt + '\n';
      const top = tl + widths.map(w => h2.repeat(w + 2)).join(tt) + tr + '\n';
      const bot = bl + widths.map(w => h2.repeat(w + 2)).join(bt) + br + '\n';
      result += top;
      result += v + ' ' + hdr.map((h3, i) => pad(h3, widths[i])).join(' ' + v + ' ') + ' ' + v + '\n';
      result += sep;
      body.forEach(row => {
        result += v + ' ' + row.map((c, i) => pad(c, widths[i])).join(' ' + v + ' ') + ' ' + v + '\n';
      });
      result += bot;
      break;
    }
  }
  $('#output').textContent = result.trimEnd();
}

function loadExample() {
  $('#input').value = 'Name,Age,City,Score\nAlice,30,New York,95\nBob,25,London,87\nCarol,35,Tokyo,92\nDavid,28,Paris,88';
  generate();
}

function doClear() { $('#input').value = ''; $('#output').textContent = ''; }

$('#input').addEventListener('input', generate);

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="generate()">${t('generate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

});
</script>
