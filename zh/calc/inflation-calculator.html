<script>
GZI18n.register({
  en: {
    toolTitle: 'Inflation Calculator',
    toolDesc: 'Adjust any US dollar amount for inflation between any two years (1913-2026) using official CPI data. See purchasing power changes and cumulative inflation.',
    lblAmount: 'Amount ($)',
    lblFrom: 'From Year',
    lblTo: 'To Year',
    lblCustom: 'Custom Annual Rate (%)',
    calc: 'Calculate',
    reset: 'Reset',
    equivalent: 'Equivalent Value',
    totalInflation: 'Total Inflation',
    avgRate: 'Average Annual Rate',
    years: 'Years',
    purchPower: 'Purchasing Power Lost',
    fromLbl: 'Then',
    toLbl: 'Now',
    worth: 'worth the same as',
    worthToday: 'worth today',
    worthIn: 'would buy in',
    worthThen: 'could have bought in',
    breakdown: 'Year-by-Year Breakdown',
    customLbl: 'Custom rate applied',
    step1: 'Enter the dollar amount you want to adjust',
    step2: 'Select the start year and end year',
    step3: 'Optionally enter a custom annual rate to override CPI data',
    step4: 'See the equivalent value and total inflation',
  },
  zh: {
    toolTitle: '通货膨胀计算器',
    toolDesc: '使用官方 CPI 数据在任意两年之间调整美元金额 (1913-2026)。查看购买力变化和累计通胀。',
    lblAmount: '金额 (美元)',
    lblFrom: '起始年份',
    lblTo: '目标年份',
    lblCustom: '自定义年通胀率 (%)',
    calc: '计算',
    reset: '重置',
    equivalent: '等值金额',
    totalInflation: '累计通胀',
    avgRate: '平均年化率',
    years: '年',
    purchPower: '购买力损失',
    fromLbl: '当时',
    toLbl: '现在',
    worth: '相当于',
    worthToday: '今天值',
    worthIn: '在…年能购买',
    worthThen: '在…年能购买',
    breakdown: '逐年明细',
    customLbl: '已使用自定义汇率',
    step1: '输入要调整的美元金额',
    step2: '选择起始和目标年份',
    step3: '可选择输入自定义年通胀率覆盖 CPI 数据',
    step4: '查看等值金额和累计通胀',
  }
});

const { $, t } = GZ;
const fmt = n => '$' + n.toLocaleString('en-US', {maximumFractionDigits: n < 1 ? 2 : 0});

// US CPI Annual Average (1913-2026, official BLS data approximation)
const CPI = {
  1913: 9.9, 1920: 20.0, 1930: 16.7, 1940: 14.0, 1950: 24.1, 1960: 29.6, 1970: 38.8,
  1971: 40.5, 1972: 41.8, 1973: 44.4, 1974: 49.3, 1975: 53.8, 1976: 56.9, 1977: 60.6,
  1978: 65.2, 1979: 72.6, 1980: 82.4, 1981: 90.9, 1982: 96.5, 1983: 101.3, 1984: 105.3,
  1985: 109.3, 1986: 113.6, 1987: 118.0, 1988: 122.4, 1989: 126.9, 1990: 130.7,
  1991: 136.2, 1992: 140.3, 1993: 144.5, 1994: 148.2, 1995: 152.4, 1996: 156.9,
  1997: 160.5, 1998: 163.0, 1999: 166.6, 2000: 172.2, 2001: 177.1, 2002: 179.9,
  2003: 184.0, 2004: 188.9, 2005: 195.3, 2006: 201.6, 2007: 207.3, 2008: 215.3,
  2009: 214.5, 2010: 218.1, 2011: 224.9, 2012: 229.6, 2013: 233.0, 2014: 236.7,
  2015: 237.0, 2016: 240.0, 2017: 245.1, 2018: 251.1, 2019: 255.7, 2020: 258.8,
  2021: 270.9, 2022: 292.7, 2023: 304.7, 2024: 314.0, 2025: 322.0, 2026: 330.0
};

const years = Object.keys(CPI).map(Number).sort((a,b) => a - b);

// Populate select
const fromSel = $('#fromYear');
const toSel = $('#toYear');
years.forEach(y => {
  fromSel.innerHTML += `<option value="${y}"${y === 2000 ? ' selected' : ''}>${y}</option>`;
  toSel.innerHTML += `<option value="${y}"${y === 2026 ? ' selected' : ''}>${y}</option>`;
});

function getCpiForYear(y) {
  // Interpolate if needed
  if (CPI[y] !== undefined) return CPI[y];
  const sorted = years;
  const lo = [...sorted].reverse().find(v => v <= y);
  const hi = sorted.find(v => v >= y);
  if (lo === hi) return CPI[lo];
  const ratio = (y - lo) / (hi - lo);
  return CPI[lo] + (CPI[hi] - CPI[lo]) * ratio;
}

function calc() {
  const amount = +$('#amount').value || 0;
  const fromYear = +$('#fromYear').value;
  const toYear = +$('#toYear').value;
  const customRate = +$('#customRate').value;
  const useCustom = !isNaN(customRate) && customRate > 0;
  const yearsSpan = Math.abs(toYear - fromYear);

  let cpiFrom = getCpiForYear(fromYear);
  let cpiTo = getCpiForYear(toYear);
  let ratio, totalInflation, avgRate, equivalent, customApplied = false;

  if (useCustom) {
    const r = customRate / 100;
    avgRate = customRate;
    totalInflation = (Math.pow(1 + r, yearsSpan) - 1) * 100;
    if (fromYear <= toYear) {
      equivalent = amount * Math.pow(1 + r, yearsSpan);
    } else {
      equivalent = amount / Math.pow(1 + r, yearsSpan);
    }
    customApplied = true;
  } else {
    if (fromYear <= toYear) {
      ratio = cpiTo / cpiFrom;
      equivalent = amount * ratio;
    } else {
      ratio = cpiFrom / cpiTo;
      equivalent = amount / ratio;
    }
    totalInflation = (ratio - 1) * 100;
    avgRate = yearsSpan > 0 ? (Math.pow(ratio, 1/yearsSpan) - 1) * 100 : 0;
  }
  const purchPower = amount - equivalent;
  const isForward = toYear > fromYear;

  // Year-by-year breakdown
  let breakdown = [];
  const step = isForward ? 1 : -1;
  for (let y = fromYear; (isForward ? y <= toYear : y >= toYear); y += step) {
    const cp = getCpiForYear(y);
    const r = cp / cpiFrom;
    breakdown.push({ year: y, value: amount * r, ratio: r });
    if (breakdown.length > 30) break; // cap
  }
  if (!isForward) breakdown.reverse();

  // Chart
  const chartW = 720, chartH = 220, padX = 50, padY = 30;
  const maxV = Math.max(...breakdown.map(d => d.value), 1);
  const minV = Math.min(...breakdown.map(d => d.value), 0);
  const range = maxV - minV || 1;
  const points = breakdown.map((d, i) => {
    const x = padX + (i / (breakdown.length - 1 || 1)) * (chartW - padX * 2);
    const y = chartH - padY - ((d.value - minV) / range) * (chartH - padY * 2);
    return [x, y];
  });
  const pathStr = points.map((p, i) => (i === 0 ? 'M' : 'L') + p[0].toFixed(1) + ',' + p[1].toFixed(1)).join(' ');

  $('#result').innerHTML = `
    <div class="compare-grid">
      <div class="compare-box from">
        <div class="label">${t('fromLbl')}</div>
        <div class="amount">${fmt(amount)}</div>
        <div class="year">${fromYear}</div>
      </div>
      <div class="compare-box to">
        <div class="label">${t('toLbl')}</div>
        <div class="amount">${fmt(equivalent)}</div>
        <div class="year">${toYear}</div>
      </div>
    </div>
    <div class="gz-result-grid">
      <div class="gz-result-card primary"><div class="label">${t('equivalent')}</div><div class="value">${fmt(equivalent)}</div></div>
      <div class="gz-result-card"><div class="label">${t('totalInflation')}</div><div class="value">${totalInflation.toFixed(1)}%</div></div>
      <div class="gz-result-card"><div class="label">${t('avgRate')}</div><div class="value">${avgRate.toFixed(2)}%</div></div>
      <div class="gz-result-card"><div class="label">${t('years')}</div><div class="value">${yearsSpan}</div></div>
    </div>
    ${customApplied ? `<div style="margin-top:14px;padding:10px;background:rgba(255,213,79,.1);border-left:3px solid #ffd54f;border-radius:6px;font-size:.85em">⚠️ ${t('customLbl')}: ${customRate}%/year</div>` : ''}
    <div class="chart-box">
      <h3 style="margin:0 0 10px;font-size:1em">📈 Value Over Time</h3>
      <svg class="chart-svg" viewBox="0 0 ${chartW} ${chartH}" preserveAspectRatio="none">
        <path d="${pathStr}" fill="none" stroke="var(--gz-accent)" stroke-width="2.5"/>
        ${points.map(([x, y]) => `<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="2.5" fill="var(--gz-accent)"/>`).join('')}
        <text x="10" y="20" font-size="11" fill="var(--gz-text2)">${fmt(maxV)}</text>
        <text x="10" y="${chartH - 10}" font-size="11" fill="var(--gz-text2)">${fmt(minV)}</text>
        <text x="${padX}" y="${chartH - 5}" font-size="10" fill="var(--gz-text2)">${fromYear}</text>
        <text x="${chartW - 50}" y="${chartH - 5}" font-size="10" fill="var(--gz-text2)">${toYear}</text>
      </svg>
    </div>
    <div class="tbl-box">
      <h3 style="margin:0 0 8px;font-size:.95em">📅 ${t('breakdown')}</h3>
      <table>
        <thead><tr><th>Year</th><th>Cumulative Inflation</th><th>Equivalent Value</th></tr></thead>
        <tbody>${breakdown.map(d => `
          <tr><td>${d.year}</td><td class="${d.ratio > 1 ? 'positive' : 'negative'}">${((d.ratio - 1) * 100).toFixed(1)}%</td><td>${fmt(d.value)}</td></tr>
        `).join('')}</tbody>
      </table>
    </div>
  `;
}

function reset() {
  $('#amount').value = 100000;
  $('#fromYear').value = 2000;
  $('#toYear').value = 2026;
  $('#customRate').value = '';
  calc();
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="calc()">${t('calc')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="reset()">${t('reset')}</button>`;

calc();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'💰', href:'/calc/salary-calculator.html', name:'Salary Calculator'},
    {icon:'📈', href:'/calc/compound-interest.html', name:'Compound Interest'},
    {icon:'🏠', href:'/calc/rent-vs-buy.html', name:'Rent vs Buy'},
    {icon:'💸', href:'/calc/tax-calculator.html', name:'Tax Calculator'},
  ]
});
</script>
