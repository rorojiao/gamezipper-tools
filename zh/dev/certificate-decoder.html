const { $, t } = GZ;

// Render an X.509 distinguished name as readable text
function dnToText(attrs){
  if (!attrs || !attrs.length) return '—';
  const order = ['CN','O','OU','C','ST','L'];
  const map = { CN:'CN', O:'O', OU:'OU', C:'C', ST:'ST', L:'L', emailAddress:'E' };
  return attrs.map(a => `${map[a.name]||a.name}=${a.value}`).join(', ');
}

function decode(){
  const inp = $('#input').value.trim();
  $('#output').innerHTML = '';
  if (!inp){ $('#status').innerHTML = `<span style="color:var(--gz-accent)">${t('errEmpty')}</span>`; return; }
  if (typeof forge === 'undefined'){ $('#status').innerHTML = `<span style="color:var(--gz-accent)">${t('errLib')}</span>`; return; }
  let cert;
  try {
    cert = forge.pki.certificateFromPem(inp);
  } catch(e){
    $('#status').innerHTML = `<span style="color:var(--gz-accent)">${t('errFormat')}</span>`;
    return;
  }

  const now = new Date();
  const nb = cert.validity.notBefore;
  const na = cert.validity.notAfter;
  let statusCls, statusTxt;
  if (now < nb){ statusCls='warn'; statusTxt=t('statusNotYet'); }
  else if (now > na){ statusCls='bad'; statusTxt=t('statusExpired'); }
  else { statusCls='ok'; const days=Math.ceil((na-now)/86400000); statusTxt=`${t('statusValid')} · ${days} ${t('statusDays')}`; }

  // Public key info
  let pubType = t('unknown'), pubSize = '—';
  try {
    if (cert.publicKey && cert.publicKey.n !== undefined){ // RSA
      pubType = t('rsa');
      pubSize = cert.publicKey.n.bitLength() + ' bit';
    } else if (cert.publicKey && cert.publicKey.ec){ // EC
      pubType = t('ec');
      pubSize = cert.publicKey.ec.bitLength ? (cert.publicKey.ec.bitLength()+' bit') : '—';
    }
  } catch(e){}

  // SANs
  let sans = '—';
  try {
    const ext = cert.getExtension('subjectAltName');
    if (ext && ext.value && ext.value.altNames && ext.value.altNames.length){
      sans = ext.value.altNames.map(a => a.value).join(', ');
    }
  } catch(e){}

  const sigAlg = cert.siginfo ? (cert.siginfo.algorithmOid || '') : '';
  let sigAlgName = cert.signatureOid ? forge.pki.oids[cert.signatureOid] : '';
  if (!sigAlgName && cert.signatureAlgorithm) sigAlgName = cert.signatureAlgorithm;

  function row(k,v,cls){ return `<div class="cert-field"><div class="k">${t(k)}</div><div class="v${cls?' '+cls:''}">${v||'—'}</div></div>`; }

  const html =
    row('fieldStatus', `${statusTxt} <span class="badge ${statusCls}">${statusCls==='ok'?'✓':statusCls==='bad'?'✗':'!'}</span>`) +
    row('fieldSubject', dnToText(cert.subject.attributes)) +
    row('fieldIssuer', dnToText(cert.issuer.attributes)) +
    row('fieldNotBefore', nb ? nb.toISOString().replace('T',' ').slice(0,19)+' UTC' : '—') +
    row('fieldNotAfter', na ? na.toISOString().replace('T',' ').slice(0,19)+' UTC' : '—', statusCls==='ok'?'':statusCls) +
    row('fieldSerial', cert.serialNumber || '—') +
    row('fieldSigAlg', sigAlgName || sigAlg || '—') +
    row('fieldPubKey', pubType) +
    row('fieldPubKeySize', pubSize) +
    row('fieldSans', sans) +
    row('fieldVersion', cert.version != null ? ('v'+(cert.version+1)) : '—');

  $('#output').innerHTML = html;
  $('#status').innerHTML = `<span style="color:var(--gz-success)">✓ ${cert.subject.attributes.find(a=>a.name==='CN')?.value || 'Certificate'} — decoded</span>`;
}
