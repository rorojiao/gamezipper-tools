<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "How do I read a 3-digit capacitor code?", "acceptedAnswer": {"@type": "Answer", "text": "The first two digits are the value in picofarads and the third digit is the multiplier (power of 10). For example, 104 = 10 x 10^4 pF = 100,000 pF = 100 nF = 0.1 µF."}}, {"@type": "Question", "name": "What does the letter after the code mean?", "acceptedAnswer": {"@type": "Answer", "text": "The letter is the tolerance code. Common codes: F = ±1%, G = ±2%, J = ±5%, K = ±10%, M = ±20%, Z = +80/-20%. The tool shows the tolerance automatically when you enter a code with a letter suffix."}}, {"@type": "Question", "name": "How do I convert between pF, nF and µF?", "acceptedAnswer": {"@type": "Answer", "text": "1000 pF = 1 nF and 1000 nF = 1 µF. The calculator shows the value in all three units simultaneously so you never have to convert by hand."}}, {"@type": "Question", "name": "Are capacitor values stored anywhere?", "acceptedAnswer": {"@type": "Answer", "text": "No. Every calculation runs in your browser. No values are sent to any server."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="tabs">
      <div class="tab active" id="tab-code" onclick="switchTab('code')"></div>
      <div class="tab" id="tab-value" onclick="switchTab('value')"></div>
    </div>

    <div class="gz-form" id="panel-code">
      <div>
        <label id="lbl-code"></label>
        <input type="text" id="code" value="104" maxlength="4" oninput="calculate()" placeholder="104, 472J, 2A473K" style="text-transform:uppercase">
      </div>
      <button class="gz-btn" onclick="calculate()" id="btn-decode"></button>
    </div>

    <div class="gz-form" id="panel-value" style="display:none">
      <div>
        <label id="lbl-value"></label>
        <input type="number" id="value" value="100" min="0" step="any" oninput="calculate()">
      </div>
      <div>
        <label id="lbl-vunit"></label>
        <select id="vunit" onchange="calculate()">
          <option value="pF">picofarads (pF)</option>
          <option value="nF" selected>nanofarads (nF)</option>
          <option value="µF">microfarads (µF)</option>
        </select>
      </div>
      <button class="gz-btn" onclick="calculate()" id="btn-encode"></button>
    </div>

    <div class="result-card" id="result" style="display:none">
      <div class="big" id="result-main"></div>
      <div class="label" id="result-label"></div>
      <div class="result-grid">
        <div class="result-item"><div class="val" id="r-pf"></div><div class="lbl">pF</div></div>
        <div class="result-item"><div class="val" id="r-nf"></div><div class="lbl">nF</div></div>
        <div class="result-item"><div class="val" id="r-uf"></div><div class="lbl">µF</div></div>
      </div>
      <div id="cap-vis-wrap" style="text-align:center"></div>
      <div class="tol-table" id="tol-info"></div>
    </div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Capacitor Code Calculator',
    toolDesc: 'Decode 3-digit ceramic capacitor codes to farads or look up the code from any capacitance value. Includes tolerance letter codes and instant pF, nF, µF conversion.',
    tabCode: 'Code → Value',
    tabValue: 'Value → Code',
    lblCode: 'Capacitor Code (e.g. 104, 472J)',
    lblValue: 'Capacitance Value',
    lblVunit: 'Unit',
    btnDecode: 'Decode Capacitor',
    btnEncode: 'Find Code',
    resultLabel: 'Decoded Value',
    step1: 'Choose a mode — decode a code into a value or look up a code from a value',
    step2: 'For decode, type the 3-digit code and any tolerance letter',
    step3: 'For encode, enter the capacitance and pick pF, nF or µF',
    step4: 'Read the result in pF, nF and µF with tolerance if applicable',
  },
  zh: {
    toolTitle: '电容代码计算器',
    toolDesc: '解码三位数陶瓷电容代码为法拉值，或从任意电容量反查代码。内置公差字母代码和 pF/nF/µF 即时转换。',
    tabCode: '代码 → 电容值',
    tabValue: '电容值 → 代码',
    lblCode: '电容代码（如 104、472J）',
    lblValue: '电容量',
    lblVunit: '单位',
    btnDecode: '解码电容',
    btnEncode: '查找代码',
    resultLabel: '解码结果',
    step1: '选择模式 — 从代码解码为电容值，或从电容值反查代码',
    step2: '解码模式：输入三位数代码和可选的公差字母',
    step3: '编码模式：输入电容量并选择 pF、nF 或 µF',
    step4: '查看 pF、nF 和 µF 三种单位的结果（如有公差一并显示）',
  }
});

const { $, t } = GZ;

const TOL = {
  B:'±0.10 pF', C:'±0.25 pF', D:'±0.5 pF', F:'±1%', G:'±2%', H:'±3%', J:'±5%', K:'±10%', M:'±20%', P:'+100/-0%', Z:'+80/-20%'
};

let mode='code';

function switchTab(m){
  mode=m;
  $('#tab-code').classList.toggle('active', m==='code');
  $('#tab-value').classList.toggle('active', m==='value');
  $('#panel-code').style.display = m==='code'?'grid':'none';
  $('#panel-value').style.display = m==='value'?'grid':'none';
  calculate();
}

function fmtC(pf){
  if(pf>=1e6) return (pf/1e6).toPrecision(4)+' µF';
  if(pf>=1e3) return (pf/1e3).toPrecision(4)+' nF';
  return pf.toPrecision(4)+' pF';
}

function calcFromCode(){
  const raw = $('#code').value.trim().toUpperCase();
  const m = raw.match(/^(\d{2,3})([A-Z]?)$/);
  if(!m){ showErr('Invalid code. Use 2-3 digits plus optional letter (e.g. 104, 472J)'); return; }
  const digits = m[1];
  const letter = m[2];
  let pf;
  if(digits.length===3){
    const base = parseInt(digits.slice(0,2));
    const mult = parseInt(digits[2]);
    pf = base * Math.pow(10, mult);
  } else {
    pf = parseInt(digits);
  }
  showResult(pf, raw, letter);
}

function calcFromValue(){
  const v = parseFloat($('#value').value)||0;
  const u = $('#vunit').value;
  let pf = u==='pF'?v : u==='nF'?v*1000 : v*1e6;
  // encode to 3-digit code
  let code;
  if(pf<10){ code = String(Math.round(pf*10)).padStart(2,'0').slice(0,2); }
  else {
    const base = Math.round(pf / Math.pow(10, Math.floor(Math.log10(pf))-1));
    const baseStr = String(base).slice(0,2);
    const mult = Math.floor(Math.log10(pf)) - 1;
    code = baseStr + mult;
  }
  showResult(pf, code, '');
}

function showErr(msg){
  $('#result').style.display='';
  $('#result-main').textContent='—';
  $('#result-label').textContent=msg;
  $('#r-pf').textContent='—';$('#r-nf').textContent='—';$('#r-uf').textContent='—';
  $('#cap-vis-wrap').innerHTML='';$('#tol-info').textContent='';
}

function showResult(pf, code, letter){
  if(pf<=0||!isFinite(pf)){ showErr('Value out of range'); return; }
  $('#result').style.display='';
  $('#result-main').textContent = fmtC(pf);
  $('#result-label').textContent = t('resultLabel')+' · code '+code+(letter||'');
  $('#r-pf').textContent = pf<1?pf.toPrecision(3):Math.round(pf).toLocaleString();
  $('#r-nf').textContent = (pf/1000).toPrecision(4).replace(/\.?0+$/,'');
  $('#r-uf').textContent = (pf/1e6).toPrecision(4).replace(/\.?0+$/,'');
  $('#cap-vis-wrap').innerHTML = `<div class="cap-vis">${code}${letter||''}</div>`;
  $('#tol-info').innerHTML = letter
    ? `Tolerance <b style="color:var(--accent)">${letter}</b> = ${TOL[letter]||'unknown'}`
    : 'No tolerance letter — common codes: J=±5%, K=±10%, M=±20%, Z=+80/-20%';
}

function calculate(){ if(mode==='code') calcFromCode(); else calcFromValue(); }

$('#tab-code').textContent=t('tabCode');
$('#tab-value').textContent=t('tabValue');
document.getElementById('btn-decode').textContent=t('btnDecode');
document.getElementById('btn-encode').textContent=t('btnEncode');
calculate();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🔌', href:'/calc/resistor.html', name:'Resistor Color Code'},
    {icon:'⚡', href:'/calc/led-resistor-calculator.html', name:'LED Resistor'},
    {icon:'⚡', href:'/calc/wattage-calculator.html', name:'Wattage Calc'},
    {icon:'⚡', href:'/calc/voltage-divider-calculator.html', name:'Voltage Divider'},
  ]
});
</script>
<script src="/tools-result-rec.js?v=20260707v520" defer></script>
</body>
