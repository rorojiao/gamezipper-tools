const { $, copyText, t } = GZ;

// ---- SQL value tokenizer/parser ----
function parseValueTuple(s) {
  // s is the inside of (...) — parse comma-separated values respecting quotes
  const out = [];
  let i = 0, cur = '', inStr = false, depth = 0, strQuote = '';
  while (i < s.length) {
    const c = s[i];
    if (inStr) {
      if (c === '\\\\' && i + 1 < s.length) { cur += c + s[i + 1]; i += 2; continue; }
      if (c === strQuote) {
        if (s[i + 1] === strQuote) { cur += strQuote; i += 2; continue; } // doubled quote escape
        inStr = false; strQuote = ''; i++; continue;
      }
      cur += c; i++; continue;
    }
    if (c === "'" || c === '"') { inStr = true; strQuote = c; i++; continue; }
    if (c === '(' ) { depth++; cur += c; i++; continue; }
    if (c === ')') { depth--; cur += c; i++; continue; }
    if (c === ',' && depth === 0) { out.push(coerce(cur)); cur = ''; i++; continue; }
    cur += c; i++;
  }
  if (cur.trim() !== '') out.push(coerce(cur));
  return out;
}

function coerce(raw) {
  const v = raw.trim();
  if (v === '') return '';
  // quoted string already unwrapped by tokenizer
  if (/^null$/i.test(v)) return null;
  if (/^true$/i.test(v)) return true;
  if (/^false$/i.test(v)) return false;
  if (/^-?\d+$/.test(v)) { const n = Number(v); return Number.isSafeInteger(n) ? n : v; }
  if (/^-?\d*\.\d+([eE][+-]?\d+)?$/.test(v) || /^-?\d+[eE][+-]?\d+$/.test(v)) return Number(v);
  return v;
}

// Extract column list and value tuples from a single INSERT statement
function parseInsert(stmt) {
  const m = stmt.match(/insert\s+into\s+["'`]?([\w\.]+)["'`]?\s*\(([^)]*)\)\s*values\s*([\s\S]+)$/i);
  if (m) {
    const table = m[1];
    const cols = m[2].split(',').map(c => c.trim().replace(/^["'`]|["'`]$/g, ''));
    const tuples = extractTuples(m[3]);
    return { table, cols, tuples };
  }
  // INSERT without column list: INSERT INTO t VALUES (...)
  const m2 = stmt.match(/insert\s+into\s+["'`]?([\w\.]+)["'`]?\s*values\s*([\s\S]+)$/i);
  if (m2) {
    const table = m2[1];
    const tuples = extractTuples(m2[2]);
    return { table, cols: null, tuples };
  }
  // bare rows: "id,name\n(1,'a'),(2,'b')" or "(1,'a'),(2,'b')"
  return null;
}

function extractTuples(s) {
  const out = [];
  let i = 0, depth = 0, start = -1, inStr = false, q = '';
  while (i < s.length) {
    const c = s[i];
    if (inStr) {
      if (c === '\\\\') { i += 2; continue; }
      if (c === q) { if (s[i+1] === q) { i += 2; continue; } inStr = false; }
      i++; continue;
    }
    if (c === "'" || c === '"') { inStr = true; q = c; i++; continue; }
    if (c === '(') { if (depth === 0) start = i + 1; depth++; i++; continue; }
    if (c === ')') { depth--; if (depth === 0 && start >= 0) { out.push(s.slice(start, i)); start = -1; } i++; continue; }
    if (c === ';' && depth === 0) { /* statement sep, ignore */ }
    i++;
  }
  return out.map(parseValueTuple);
}

function splitStatements(sql) {
  const out = [];
  let i = 0, cur = '', inStr = false, q = '';
  while (i < sql.length) {
    const c = sql[i];
    if (inStr) {
      cur += c;
      if (c === '\\\\' && i + 1 < sql.length) { cur += sql[i+1]; i += 2; continue; }
      if (c === q) { if (sql[i+1] === q) { cur += sql[i+1]; i += 2; continue; } inStr = false; }
      i++; continue;
    }
    if (c === "'" || c === '"') { inStr = true; q = c; cur += c; i++; continue; }
    if (c === '-' && sql[i+1] === '-') { while (i < sql.length && sql[i] !== '\n') i++; continue; }
    if (c === '/' && sql[i+1] === '*') { i += 2; while (i < sql.length && !(sql[i] === '*' && sql[i+1] === '/')) i++; i += 2; continue; }
    if (c === ';') { const t = cur.trim(); if (t) out.push(t); cur = ''; i++; continue; }
    cur += c; i++;
  }
  const t = cur.trim(); if (t) out.push(t);
  return out;
}

function parseBareRows(sql) {
  // first line(s) before first '(' may be the column header
  const firstParen = sql.indexOf('(');
  if (firstParen === -1) return { cols: null, tuples: extractTuples(sql) };
  const head = sql.slice(0, firstParen).trim();
  let cols = null;
  const lines = head.split(/\r?\n/).map(s => s.trim()).filter(Boolean);
  const lastLine = lines[lines.length - 1] || '';
  if (lines.length && /^[\w,"'`\s]+$/.test(lastLine) && lastLine.includes(',')) {
    cols = lastLine.split(',').map(c => c.trim().replace(/^["'`]|["'`]$/g, ''));
  }
  return { cols, tuples: extractTuples(sql.slice(firstParen)) };
}

function run() {
  const raw = $('#input').value;
  const status = $('#status');
  if (!raw.trim()) { $('#output').value = ''; status.textContent = ''; status.className = 'sj-status'; return; }
  try {
    const mode = $('#mode').value;
    const pretty = $('#pretty').checked;
    const groupByTable = $('#onePerTable').checked;
    const rows = []; // {table, obj}
    const grouped = {}; // table -> []

    function addRow(table, obj) {
      if (groupByTable) {
        (grouped[table] = grouped[table] || []).push(obj);
      } else {
        rows.push(table ? Object.assign({ __table: table }, obj) : obj);
      }
    }

    let hasInsert = /insert\s+into/i.test(raw);
    if (mode === 'insert') hasInsert = true;
    if (mode === 'rows') hasInsert = false;

    if (hasInsert) {
      const stmts = splitStatements(raw);
      let any = false;
      for (const st of stmts) {
        const pr = parseInsert(st);
        if (!pr) continue;
        any = true;
        for (const tup of pr.tuples) {
          const obj = {};
          if (pr.cols) {
            for (let k = 0; k < pr.cols.length; k++) obj[pr.cols[k]] = tup[k];
          } else {
            for (let k = 0; k < tup.length; k++) obj['col' + (k + 1)] = tup[k];
          }
          addRow(pr.table, obj);
        }
      }
      if (!any) throw new Error(t('errEmpty'));
    } else {
      const { cols, tuples } = parseBareRows(raw);
      if (!tuples.length) throw new Error(t('errEmpty'));
      for (const tup of tuples) {
        const obj = {};
        if (cols) { for (let k = 0; k < cols.length; k++) obj[cols[k]] = tup[k]; }
        else { for (let k = 0; k < tup.length; k++) obj['col' + (k + 1)] = tup[k]; }
        addRow(null, obj);
      }
    }

    let result;
    const total = groupByTable
      ? Object.values(grouped).reduce((a, b) => a + b.length, 0)
      : rows.length;
    if (groupByTable) {
      result = pretty ? JSON.stringify(grouped, null, 2) : JSON.stringify(grouped);
    } else {
      result = pretty ? JSON.stringify(rows, null, 2) : JSON.stringify(rows);
    }
    $('#output').value = result;
    status.textContent = t('ok').replace('N', total);
    status.className = 'sj-status ok';
  } catch (e) {
    $('#output').value = '';
    status.textContent = t('err') + e.message;
    status.className = 'sj-status err';
  }
}

  $('#input').value =
`INSERT INTO users (id, name, email, score, active, created_at)
VALUES (1, 'Alice', 'alice@example.com', 4.8, true, NULL),
       (2, 'Bob', 'bob''s mail', 3.5, false, NULL),
       (3, 'Carol', 'carol@example.com', 5.0, true, NULL);`;
  run();
}
function doClear() { $('#input').value = ''; $('#output').value = ''; $('#status').textContent = ''; }
function doDownload() {
  const text = $('#output').value; if (!text) return;
  const blob = new Blob([text], { type: 'application/json' });
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = 'data.json'; a.click(); URL.revokeObjectURL(a.href);
}

$('#input').addEventListener('input', run);

$('#pretty').addEventListener('change', run);
$('#onePerTable').addEventListener('change', run);
