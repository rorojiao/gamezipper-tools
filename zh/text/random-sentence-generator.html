<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-form">

        <label id="lbl-count"></label>
        <input type="number" id="count" value="5" min="1" max="50">

      <div class="gz-form-group">
        <label id="lbl-style"></label>
        <select id="style">
          <option value="statement" id="opt-statement"></option>
          <option value="question" id="opt-question"></option>

</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Random Sentence Generator',
    toolDesc: 'Generate random English sentences for writing prompts, vocabulary practice and ESL learning. Pick a style and copy with one click.',
    lblCount: 'Number of Sentences',
    lblStyle: 'Sentence Style',
    optStatement: 'Statement',
    optQuestion: 'Question',
    optExclamation: 'Exclamation',
    optCommand: 'Command',
    optDescriptive: 'Descriptive',
    optCreative: 'Creative Fiction',
    generate: 'Generate',
    copy: 'Copy All',
    copied: 'Copied!',
    statsSentences: 'sentences generated',
    step1: 'Choose how many sentences you want (1–50)',
    step2: 'Pick a style — statement, question, command and more',
    step3: 'Click Generate to create a fresh batch',
    step4: 'Click any sentence to copy it, or use Copy All',
  },
  zh: {
    toolTitle: '随机句子生成器',
    toolDesc: '为写作灵感、词汇练习和 ESL 学习生成随机英文句子。选择风格并一键复制。',
    lblCount: '句子数量',
    lblStyle: '句子风格',
    optStatement: '陈述句',
    optQuestion: '疑问句',
    optExclamation: '感叹句',
    optCommand: '命令句',
    optDescriptive: '描述句',
    optCreative: '创意虚构',
    generate: '生成',
    copy: '复制全部',
    copied: '已复制！',
    statsSentences: '个句子',
    step1: '选择要生成的句子数量（1–50）',
    step2: '选择风格 — 陈述、疑问、命令等',
    step3: '点击生成创建新一批句子',
    step4: '点击任意句子复制它，或使用复制全部',
  }
});

const { $, t, copyText } = GZ;

$('#lbl-count').textContent = t('lblCount');
$('#lbl-style').textContent = t('lblStyle');
$('#opt-statement').textContent = t('optStatement');
$('#opt-question').textContent = t('optQuestion');
$('#opt-exclamation').textContent = t('optExclamation');
$('#opt-command').textContent = t('optCommand');
$('#opt-descriptive').textContent = t('optDescriptive');
$('#opt-creative').textContent = t('optCreative');
$('#genBtn').textContent = t('generate');
$('#copyBtn').textContent = t('copy');

// Word banks
const SUBJ = ["the traveler","a curious child","the old captain","a wandering artist","the silver fox","a tired baker","the village teacher","a brave knight","the young inventor","a quiet librarian","the storm chaser","a friendly ghost","the lighthouse keeper","a tired musician","the garden gnome","a lost astronaut","the retired pilot","a hungry wolf","the crystal merchant","a sleepy cat","the mountain guide","a clever detective","the river ferryman","a curious tourist","the town baker","a wandering monk","the harbor seal","a busy bee","the night owl","a lonely sailor"];
const VERB_PRES = ["discovers","watches","builds","paints","climbs","follows","collects","remembers","chases","hides","decorates","guides","measures","follows","questions","polishes","examines","gathers","invents","observes","protects","unlocks","whispers","trains","captures","delivers","rescues","ignores","imagines","searches"];
const OBJ = ["an ancient map","a glowing crystal","a wooden bridge","a silver coin","a hidden door","a fragile vase","a mysterious book","a tiny seed","a forgotten letter","a broken compass","a colorful kite","a rusty key","a velvet curtain","a polished mirror","a heavy anchor","a handmade quilt","a ceramic pot","a brass telescope","a leather journal","a paper crane","a tin whistle","a marble statue","a copper kettle","a woven basket","a glass jar","a silk scarf","a stone tablet","a wax candle","a wooden spoon","a golden ring"];
const PLACE = ["in the misty forest","under the old oak tree","across the rushing river","inside the abandoned castle","near the quiet harbor","on the highest mountain","beneath the twinkling stars","above the green valley","beside the crackling fireplace","beyond the rolling hills","inside the cozy cottage","along the winding path","behind the rusty gate","within the secret garden","beneath the crystal lake","among the wildflowers","on the dusty road","through the misty meadow","along the sandy shore","beneath the willow tree"];
const TIME = ["at sunrise","just before midnight","on a rainy afternoon","in the early spring","during the harvest festival","as the snow began to fall","at the stroke of noon","under the full moon","before the rooster crowed","as the tide came in"];
const ADJ = ["curious","ancient","gentle","fearless","curious","mysterious","loyal","witty","brave","patient","silent","clever","humble","radiant","bold","careful","wise","playful","calm","eager"];
const FEAT = ["with a knowing smile","without a moment of hesitation","in a soft whisper","with surprising speed","in complete silence","with graceful ease","as if in a dream","with quiet determination","like a true professional","without looking back"];

const pick = arr => arr[Math.floor(Math.random() * arr.length)];

function capitalize(s) { return s.charAt(0).toUpperCase() + s.slice(1); }

function makeStatement() {
  return `${capitalize(pick(SUBJ))} ${pick(VERB_PRES)} ${pick(OBJ)} ${pick(PLACE)} ${pick(TIME)}.`;
}
function makeQuestion() {
  const q = ["Did","Why did","How did","When did","Will","Could","Has","Where did","Is","Does"];
  const v = ["find","see","lose","forget","hide","discover","open","follow","take","remember"];
  return `${pick(q)} ${pick(SUBJ)} ${pick(v)} ${pick(OBJ)} ${pick(PLACE)}?`;
}
function makeExclamation() {
  return `${capitalize(pick(SUBJ))} ${pick(VERB_PRES)} ${pick(OBJ)} ${pick(PLACE)} ${pick(TIME)}!`;
}
function makeCommand() {
  const imp = ["Follow","Find","Open","Discover","Build","Protect","Hide","Listen to","Watch","Examine","Polish","Rescue","Deliver","Train","Question","Gather"];
  return `${pick(imp)} ${pick(OBJ)} ${pick(PLACE)} ${pick(TIME)}!`;
}
function makeDescriptive() {
  return `The ${pick(ADJ)} ${pick(OBJ)}, ${pick(PLACE)}, belonged to ${pick(SUBJ)} ${pick(TIME)}.`;
}
function makeCreative() {
  return `${capitalize(pick(SUBJ))} ${pick(VERB_PRES)} ${pick(OBJ)}, ${pick(FEAT)}, ${pick(PLACE)} ${pick(TIME)}.`;
}

const GENERATORS = { statement: makeStatement, question: makeQuestion, exclamation: makeExclamation, command: makeCommand, descriptive: makeDescriptive, creative: makeCreative };

function generate() {
  const count = Math.max(1, Math.min(50, parseInt($('#count').value) || 1));
  const style = $('#style').value;
  const gen = GENERATORS[style] || makeStatement;
  const seen = new Set();
  const sentences = [];
  let safety = 0;
  while (sentences.length < count && safety < count * 12) {
    const s = gen();
    if (!seen.has(s)) { seen.add(s); sentences.push(s); }
    safety++;
  }
  // Allow repeats if we couldn't fill unique slots
  while (sentences.length < count) sentences.push(gen());

  $('#sentenceList').innerHTML = sentences.map((s, i) =>
    `<div class="gz-sentence" data-s="${s.replace(/"/g, '&quot;')}" title="Click to copy">
      <span class="num">${i + 1}.</span>
      <span class="text">${s}</span>
      <span class="copy-icon">📋</span>
    </div>`).join('');

  $('#stats').textContent = `${sentences.length} ${t('statsSentences')}`;

  document.querySelectorAll('.gz-sentence').forEach(el => {
    el.addEventListener('click', () => copyText(el.dataset.s));
  });
}

$('#genBtn').addEventListener('click', generate);
$('#copyBtn').addEventListener('click', () => {
  const txt = Array.from(document.querySelectorAll('.gz-sentence')).map(el => el.dataset.s).join('\n');
  if (txt) { copyText(txt); $('#copyBtn').textContent = t('copied'); setTimeout(() => $('#copyBtn').textContent = t('copy'), 1500); }
});
['count','style'].forEach(id => $('#' + id).addEventListener('change', generate));

generate();

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🔤', href:'/text/random-word-generator.html', name:'Random Word'},
    {icon:'📖', href:'/text/lorem-ipsum-generator.html', name:'Lorem Ipsum'},
    {icon:'❓', href:'/text/random-question-generator.html', name:'Random Question'},
    {icon:'⏱️', href:'/text/reading-time.html', name:'Reading Time'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
