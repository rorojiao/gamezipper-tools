<script type="application/ld+json">{"@context":"https://schema.org","@type":"WebApplication","name":"Dew Point Calculator","description":"Free dew point calculator using the Magnus formula. Enter temperature and relative humidity to get dew point, frost point, absolute humidity and comfort level. °F or °C.","url":"https://tools.gamezipper.com/calc/dew-point-calculator.html","applicationCategory":"Utility","operatingSystem":"Web Browser","offers":{"@type":"Offer","price":"0"}}</script>
<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is the dew point?", "acceptedAnswer": {"@type": "Answer", "text": "The dew point is the temperature at which air becomes saturated and water vapor begins to condense into dew, fog or clouds. A higher dew point means more moisture in the air. Unlike relative humidity, the dew point directly measures absolute moisture content."}}, {"@type": "Question", "name": "What formula does this calculator use?", "acceptedAnswer": {"@type": "Answer", "text": "This tool uses the August-Roche-Magnus formula: γ = ln(RH/100) + (a·T)/(b+T), Td = (b·γ)/(a−γ), with constants a = 17.625 and b = 243.04°C, accurate to within ±0.4°C across the normal temperature range."}}, {"@type": "Question", "name": "What dew point is comfortable?", "acceptedAnswer": {"@type": "Answer", "text": "Dew points below 55°F (13°C) feel dry and comfortable. Between 55–60°F (13–16°C) the air starts to feel humid. Above 65°F (18°C) most people find it oppressive and muggy, and above 70°F (21°C) it is dangerously humid."}}, {"@type": "Question", "name": "How is dew point different from relative humidity?", "acceptedAnswer": {"@type": "Answer", "text": "Relative humidity tells you how close the air is to saturation as a percentage, which changes with temperature. Dew point is an absolute measure of moisture that stays the same regardless of temperature, so it is a more reliable indicator of how humid the air actually feels."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="dp-form">
      <label><span id="lbl-unit"></span>
        <select id="unit">
          <option value="C">°Celsius</option>
          <option value="F">°Fahrenheit</option>
        </select>
      </label>
      <div class="dp-row">
        <label><span id="lbl-temp"></span><input type="number" id="temp" placeholder="24" step="any"></label>
        <label><span id="lbl-hum"></span><input type="number" id="hum" placeholder="55" step="any" min="0" max="100"></label>
      </div>
    </div>

      <div class="dp-card main">
        <div class="value" id="dp-value">—</div>

      </div>
      <div class="dp-card">

        <div class="label" id="lbl-out-abs">Absolute humidity</div>
      </div>
      <div class="dp-card">
        <div class="value" id="dp-frost">—</div>
        <div class="label" id="lbl-out-frost">Frost point</div>
      </div>
      <div class="dp-card">

        <div class="label" id="lbl-out-comfort">Comfort level</div>
      </div>
    </div>
    <div class="dp-info">
      <h3 id="lbl-ref">Dew point comfort reference</h3>
      <table>
        <thead><tr><th id="th-dp">Dew point</th><th id="th-feel">How it feels</th><th id="th-note">Note</th></tr></thead>
        <tbody id="ref-body"></tbody>
      </table>
    </div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Dew Point Calculator',
    toolDesc: 'Calculate dew point, frost point, absolute humidity and comfort level from temperature and humidity using the Magnus formula. Free, browser-based.',
    lblUnit: 'Units',
    lblTemp: 'Air Temperature',
    lblHum: 'Relative Humidity (%)',
    lblOutDp: 'Dew point',
    lblOutAbs: 'Absolute humidity',
    lblOutFrost: 'Frost point',
    lblOutComfort: 'Comfort level',
    lblRef: 'Dew point comfort reference',
    thDp: 'Dew point', thFeel: 'How it feels', thNote: 'Note',
    btnExample: 'Example: 24°C, 55% humidity',
    btnClear: 'Clear',
    step1: 'Choose units (°C or °F) and enter the air temperature',
    step2: 'Enter the relative humidity in percent (0–100)',
    step3: 'Read the dew point, frost point and absolute humidity instantly',
    step4: 'Use the comfort reference to judge how the air will feel',
  },
  zh: {
    toolTitle: '露点计算器（湿度与体感）',
    toolDesc: '使用 Magnus 公式根据温度和相对湿度计算露点、霜点、绝对湿度和舒适度。免费，浏览器本地运行。',
    lblUnit: '单位',
    lblTemp: '空气温度',
    lblHum: '相对湿度 (%)',
    lblOutDp: '露点',
    lblOutAbs: '绝对湿度',
    lblOutFrost: '霜点',
    lblOutComfort: '舒适度',
    lblRef: '露点舒适度参考',
    thDp: '露点', thFeel: '体感', thNote: '说明',
    btnExample: '示例：24°C，55% 湿度',
    btnClear: '清空',
    step1: '选择单位（°C 或 °F），输入空气温度',
    step2: '输入相对湿度（0–100%）',
    step3: '即时读取露点、霜点和绝对湿度',
    step4: '参考舒适度表判断空气感受',
  }
});

const { $, t } = GZ;

const COMFORT = [
  { c: 26, feel: 'Severely high', feelZh: '极度闷热', note: 'Dangerous, heat illness risk', noteZh: '危险，易中暑' },
  { c: 24, feel: 'Oppressive',    feelZh: '极度闷湿', note: 'Very uncomfortable', noteZh: '非常不适' },
  { c: 21, feel: 'Very humid',    feelZh: '非常潮湿', note: 'Uncomfortable, sticky', noteZh: '不适，黏腻' },
  { c: 18, feel: 'Humid',         feelZh: '潮湿',     note: 'Becoming uncomfortable', noteZh: '渐感不适' },
  { c: 16, feel: 'OK for most',   feelZh: '可接受',   note: 'Slightly humid', noteZh: '略潮湿' },
  { c: 13, feel: 'Comfortable',   feelZh: '舒适',     note: 'Pleasant', noteZh: '舒适宜人' },
  { c: 10, feel: 'A bit dry',     feelZh: '略干',     note: 'Slightly dry', noteZh: '略干燥' },
  { c: -50, feel: 'Dry',          feelZh: '干燥',     note: 'May need moisture', noteZh: '可能需要加湿' },
];

function buildRefTable() {
  const en = GZI18n.getLang() === 'en';
  $('#ref-body').innerHTML = COMFORT.map(c => {
    const f = c.c*9/5+32;
    return `<tr><td>${c.c}°C / ${f.toFixed(0)}°F+</td><td>${en?c.feel:c.feelZh}</td><td>${en?c.note:c.noteZh}</td></tr>`;
  }).join('');
}
buildRefTable();

function calc() {
  const unit = $('#unit').value;
  const T = parseFloat($('#temp').value);
  const RH = parseFloat($('#hum').value);
  if (isNaN(T) || isNaN(RH)) { $('#result').style.display='none'; return; }

  const warn = $('#warn');
  let T_C = unit === 'C' ? T : (T - 32) * 5/9;
  const en = GZI18n.getLang() === 'en';

  if (RH <= 0 || RH > 100) {
    warn.className = 'dp-warn show';
    warn.style.background = 'rgba(255,170,0,.1)';
    warn.style.border = '1px solid rgba(255,170,0,.3)';
    warn.style.color = '#fa0';
    warn.textContent = en ? 'Relative humidity must be between 0 and 100%.' : '相对湿度需在 0–100% 之间。';
    $('#result').style.display='none';
    return;
  }
  warn.className = 'dp-warn';

  // Magnus formula (Alduchov & Eskridge constants)
  const a = 17.625, b = 243.04;
  const gamma = Math.log(RH/100) + (a*T_C)/(b+T_C);
  const Td_C = (b*gamma)/(a-gamma);

  // Frost point
  const Tf_C = (b * (Math.log(RH/100) + (22.2*T_C)/(271.15+T_C))) / (22.2 - (Math.log(RH/100) + (22.2*T_C)/(271.15+T_C)));
  const frostC = isNaN(Tf_C) || !isFinite(Tf_C) ? '—' : Tf_C.toFixed(1);

  // Absolute humidity g/m³
  const absG = (6.112 * Math.exp((17.67*T_C)/(T_C+243.5)) * RH * 2.1674) / (273.15+T_C);

  // Comfort
  let comfort = 'Dry', comfortZh = '干燥', bg = '#3a3';
  for (const c of COMFORT) {
    if (Td_C >= c.c) { comfort = c.feel; comfortZh = c.feelZh; break; }
  }
  if (Td_C >= 21) bg = '#d32f2f';
  else if (Td_C >= 18) bg = '#fa0';
  else if (Td_C < 10) bg = '#1aa3ff';

  const dpShow = unit === 'C' ? Td_C.toFixed(1)+'°C' : (Td_C*9/5+32).toFixed(1)+'°F';
  const frostShow = frostC === '—' ? '—' : (unit === 'C' ? frostC+'°C' : (parseFloat(frostC)*9/5+32).toFixed(1)+'°F');

  $('#dp-value').textContent = dpShow;
  $('#dp-abs').textContent = absG.toFixed(1)+' g/m³';
  $('#dp-frost').textContent = frostShow;
  $('#dp-comfort').textContent = en ? comfort : comfortZh;
  $('#dp-comfort').style.color = bg;
  $('#result').style.display = 'grid';
}

['unit','temp','hum'].forEach(id => {
  const el = $('#'+id);
  el.addEventListener('input', calc);
  el.addEventListener('change', calc);
});

function loadExample() {
  $('#unit').value = 'C'; $('#temp').value = 24; $('#hum').value = 55;
  calc();
}
function doClear() { $('#temp').value=''; $('#hum').value=''; $('#result').style.display='none'; $('#warn').className='dp-warn'; }

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="loadExample()">${t('btnExample')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('btnClear')}</button>`;

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🌡️',href:'/calc/heat-index-calculator.html',name:'Heat Index'},
    {icon:'🧊',href:'/calc/wind-chill.html',name:'Wind Chill'},
    {icon:'❄️',href:'/calc/btu-calculator.html',name:'BTU Calculator'},
    {icon:'☕',href:'/calc/coffee-to-water.html',name:'Coffee Ratio'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
