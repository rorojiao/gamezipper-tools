<script>
GZI18n.register({
  en: {

    nameMq: 'Medium Quality (320×180)',
    nameDefault: 'Default (120×90)',

    name2: 'Thumbnail #2',

    step3: 'Browse the available thumbnails and click Download on the size you want',
    step4: 'Right-click saved image → "Save image as…" or use the Open in new tab option',
  },
  zh: {
    toolTitle: 'YouTube 缩略图下载器',
    toolDesc: '一键抓取 YouTube 视频所有分辨率的缩略图（HD、SD、HQ、MQ）。粘贴链接即可下载。',
    btnLoad: '加载缩略图',
    errInvalid: '请粘贴有效的 YouTube 链接（例如 https://www.youtube.com/watch?v=abc123XYZ）',
    lblId: '视频 ID',
    lblChannel: '频道',
    lblBest: '最佳分辨率',
    nameMax: '最高分辨率 (1280×720)',
    nameSd: '标清 (640×480)',
    nameHq: '高质量 (480×360)',
    nameMq: '中等质量 (320×180)',
    nameDefault: '默认 (120×90)',
    name1: '缩略图 #1',
    name2: '缩略图 #2',
    name3: '缩略图 #3',
    step1: '从浏览器或分享按钮复制 YouTube 视频链接',
    step2: '将链接粘贴到上方输入框，点击「加载缩略图」',
    step3: '查看所有可用缩略图，点击你所需尺寸的「下载」按钮',
    step4: '右键保存图片，或点击「新窗口打开」查看',
  }
});

const { $, t } = GZ;
const TYPES = [
  { key: 'maxresdefault', label: 'nameMax', dim: '1280×720' },
  { key: 'sddefault',     label: 'nameSd',  dim: '640×480' },
  { key: 'hqdefault',     label: 'nameHq',  dim: '480×360' },
  { key: 'mqdefault',     label: 'nameMq',  dim: '320×180' },
  { key: 'default',       label: 'nameDefault', dim: '120×90' },
];
const STORY_TYPES = [
  { key: '1', label: 'name1', dim: '1280×720' },
  { key: '2', label: 'name2', dim: '1280×720' },
  { key: '3', label: 'name3', dim: '1280×720' },
];

function extractVideoId(url) {
  if (!url) return null;
  url = url.trim();
  const patterns = [
    /(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/|youtube\.com\/shorts\/|youtube\.com\/v\/|m\.youtube\.com\/watch\?v=)([A-Za-z0-9_-]{11})/,
    /^([A-Za-z0-9_-]{11})$/,
  ];
  for (const p of patterns) {
    const m = url.match(p);
    if (m) return m[1];
  }
  try {
    const u = new URL(url);
    const v = u.searchParams.get('v');
    if (v && /^[A-Za-z0-9_-]{11}$/.test(v)) return v;
  } catch (e) {}
  return null;
}

function loadThumbnails() {
  $('#error').textContent = '';
  $('#grid').innerHTML = '';
  $('#info').style.display = 'none';
  const url = $('#url').value;
  const id = extractVideoId(url);
  if (!id) {
    $('#error').textContent = t('errInvalid');
    return;
  }
  $('#info').style.display = '';
  $('#videoId').textContent = id;

  const all = [
    ...TYPES.map(x => ({...x, base: 'https://i.ytimg.com/vi/' + id + '/'})),
    ...STORY_TYPES.map(x => ({...x, base: 'https://i.ytimg.com/vi/' + id + '/'})),
  ];

  let loaded = 0;
  let bestIdx = -1;
  all.forEach((entry, idx) => {
    const src = entry.base + entry.key + '.jpg';
    const img = new Image();
    img.onload = function() {
      if (this.naturalWidth > 120 || this.naturalHeight > 90) {
        if (bestIdx === -1) bestIdx = idx;
        const card = document.createElement('div');
        card.className = 'yt-card';
        card.innerHTML = `
          <div class="preview"><img src="${src}" alt="thumbnail" loading="lazy"></div>
          <div class="meta"><span class="name">${t(entry.label)}</span><span class="size">${entry.dim}</span></div>
          <div class="actions">
            <a href="${src}" target="_blank" rel="noopener">Open</a>
            <a href="${src}" download="youtube-${id}-${entry.key}.jpg">Download</a>
          </div>`;
        $('#grid').appendChild(card);
      }
      loaded++;
      if (loaded === all.length) {
        if ($('#grid').children.length === 0) {
          $('#error').textContent = t('errInvalid');
        } else {
          const best = all[bestIdx];
          $('#bestRes').textContent = t(best.label) + ' (' + best.dim + ')';
        }
      }
    };
    img.onerror = function() {
      loaded++;
      if (loaded === all.length && $('#grid').children.length === 0) {
        $('#error').textContent = t('errInvalid');
      }
    };
    img.src = src;
  });
}

$('#btn-load').textContent = t('btnLoad');
$('#lbl-id').textContent = t('lblId');
$('#lbl-channel').textContent = t('lblChannel');
$('#lbl-best').textContent = t('lblBest');
$('#url').addEventListener('keydown', e => { if (e.key === 'Enter') loadThumbnails(); });
$('#url').addEventListener('paste', () => setTimeout(loadThumbnails, 50));

  ]
});
</script>
