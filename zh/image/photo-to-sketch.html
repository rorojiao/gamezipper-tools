<script>
GZI18n.register({
  en: {
    toolTitle: 'Photo to Sketch Converter',
    toolDesc: 'Turn photos into pencil sketch drawings. Adjust edge detail, brightness and contrast — free and private.',
    dropText: 'Drop an image here or click to upload',
    detail: 'Edge Detail',
    bright: 'Brightness',
    contrast: 'Contrast',
    download: '⬇ Download PNG',
    original: 'Original',
    sketch: 'Sketch',
    step1: 'Drop or upload a photo (JPG, PNG, WebP)',
    step2: 'Adjust edge detail, brightness and contrast',
    step3: 'Preview the sketch result in real-time',
    step4: 'Download the sketch as PNG',
  },
  zh: {
    toolTitle: '照片转铅笔素描',
    toolDesc: '将照片转换为铅笔素描画。调整边缘细节、亮度和对比度 — 免费且隐私。',
    dropText: '拖放图片到此处或点击上传',
    detail: '边缘细节',
    bright: '亮度',
    contrast: '对比度',
    download: '⬇ 下载 PNG',
    original: '原图',
    sketch: '素描',
    step1: '拖放或上传照片（JPG、PNG、WebP）',
    step2: '调整边缘细节、亮度和对比度',
    step3: '实时预览素描效果',
    step4: '下载素描图为 PNG',
  }
});

const { $, t } = GZ;

$('#drop-text').textContent = t('dropText');
$('#lbl-detail').textContent = t('detail');
$('#lbl-bright').textContent = t('bright');
$('#lbl-contrast').textContent = t('contrast');
$('#btn-download').textContent = t('download');
$('#lbl-orig').textContent = t('original');
$('#lbl-sketch').textContent = t('sketch');

let imgData = null;
let origCanvas, sketchCanvas, origCtx, sketchCtx;

const drop = $('#drop');
const fileInput = $('#fileInput');

drop.addEventListener('click', () => fileInput.click());
drop.addEventListener('dragover', e => { e.preventDefault(); drop.classList.add('dragover'); });
drop.addEventListener('dragleave', () => drop.classList.remove('dragover'));
drop.addEventListener('drop', e => {
  e.preventDefault(); drop.classList.remove('dragover');
  if (e.dataTransfer.files.length) loadImage(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', e => {
  if (e.target.files.length) loadImage(e.target.files[0]);
});

function loadImage(file) {
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      const maxW = 800;
      let w = img.width, h = img.height;
      if (w > maxW) { h = Math.round(h * maxW / w); w = maxW; }

      origCanvas = $('#original');
      sketchCanvas = $('#sketch');
      origCanvas.width = w; origCanvas.height = h;
      sketchCanvas.width = w; sketchCanvas.height = h;
      origCtx = origCanvas.getContext('2d');
      sketchCtx = sketchCanvas.getContext('2d');

      origCtx.drawImage(img, 0, 0, w, h);
      imgData = origCtx.getImageData(0, 0, w, h);

      drop.style.display = 'none';
      $('#controls').style.display = 'flex';
      $('#preview').style.display = 'grid';

      applySketch();
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function applySketch() {
  if (!imgData) return;
  const w = imgData.width, h = imgData.height;
  const detail = parseInt($('#detail').value);
  const brightness = parseInt($('#bright').value);
  const contrastVal = parseInt($('#contrast').value);

  // Get grayscale
  const gray = new Float32Array(w * h);
  for (let i = 0; i < w * h; i++) {
    gray[i] = 0.299 * imgData.data[i*4] + 0.587 * imgData.data[i*4+1] + 0.114 * imgData.data[i*4+2];
  }

  // Invert
  const inverted = new Float32Array(w * h);
  for (let i = 0; i < w * h; i++) inverted[i] = 255 - gray[i];

  // Simple blur for inverted
  const r = Math.max(1, Math.round(6 - detail * 0.5));
  const blurred = new Float32Array(w * h);
  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      let sum = 0, count = 0;
      for (let dy = -r; dy <= r; dy++) {
        for (let dx = -r; dx <= r; dx++) {
          const nx = x + dx, ny = y + dy;
          if (nx >= 0 && nx < w && ny >= 0 && ny < h) {
            sum += inverted[ny * w + nx];
            count++;
          }
        }
      }
      blurred[y * w + x] = sum / count;
    }
  }

  // Color dodge blend
  const result = sketchCtx.createImageData(w, h);
  const bAdj = (brightness - 50) * 2.55;
  const cFactor = (contrastVal / 50);

  for (let i = 0; i < w * h; i++) {
    let a = gray[i];
    let b = blurred[i];
    let val;
    if (b >= 255) {
      val = 255;
    } else {
      val = Math.min(255, (a * 256) / (256 - b));
    }
    // Apply brightness and contrast
    val = ((val - 128) * cFactor) + 128 + bAdj;
    val = Math.max(0, Math.min(255, val));
    // Invert for white sketch on dark lines
    val = 255 - (255 - val);

    result.data[i*4] = val;
    result.data[i*4+1] = val;
    result.data[i*4+2] = val;
    result.data[i*4+3] = 255;
  }
  sketchCtx.putImageData(result, 0, 0);
}

$('#detail').addEventListener('input', applySketch);
$('#bright').addEventListener('input', applySketch);
$('#contrast').addEventListener('input', applySketch);

$('#btn-download').addEventListener('click', () => {
  if (!sketchCanvas) return;
  const a = document.createElement('a');
  a.href = sketchCanvas.toDataURL('image/png');
  a.download = 'sketch.png'; a.click();
});

  ]
});
</script>
