<style>
.paint-form{display:grid;gap:14px;max-width:560px}
.paint-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.paint-form label{display:flex;flex-direction:column;gap:4px;font-size:.85em;color:var(--text2);font-weight:600}
.paint-form input,.paint-form select{padding:10px 12px;border:1px solid var(--border);border-radius:8px;background:var(--bg);color:var(--text);font-size:1em;box-sizing:border-box}
.paint-form input:focus{outline:none;border-color:var(--accent)}
.paint-results{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-top:20px}
.paint-card{background:var(--glass);border:1px solid var(--border);border-radius:12px;padding:16px;text-align:center}
.paint-card .value{font-size:1.7rem;font-weight:800;color:var(--accent)}
.paint-card .label{font-size:.8em;color:var(--text2);margin-top:4px}
.paint-card.primary{background:var(--accent);border-color:var(--accent)}
.paint-card.primary .value,.paint-card.primary .label{color:#000}
.paint-unit{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.paint-unit button{padding:8px 16px;border-radius:8px;border:1px solid var(--border);background:var(--glass);color:var(--text);cursor:pointer;font-size:.9em;transition:all .2s}
.paint-unit button.active{background:var(--accent);color:#000;border-color:var(--accent);font-weight:700}
.paint-section{background:var(--glass);border:1px solid var(--border);border-radius:10px;padding:14px;margin-top:10px}
.paint-section h3{margin:0 0 8px;font-size:1em}
@media(max-width:600px){.paint-row{grid-template-columns:1fr}}
</style>

<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "How do I calculate how much paint I need?", "acceptedAnswer": {"@type": "Answer", "text": "Measure the length and height of each wall, multiply to get the wall area, then subtract the area of doors and windows. Multiply the total by the number of coats (usually 2). One gallon of paint covers about 350-400 square feet, or about 10 m²/L."}}, {"@type": "Question", "name": "How much paint do I need per square foot?", "acceptedAnswer": {"@type": "Answer", "text": "Standard interior paint covers about 350-400 square feet per gallon (about 9-10 m² per liter). For textured or porous surfaces like unpainted drywall, plan for 250-300 sq ft per gallon. Two coats are recommended for most colors and finishes."}}, {"@type": "Question", "name": "Should I include the ceiling?", "acceptedAnswer": {"@type": "Answer", "text": "Only if you plan to paint it. Ceilings typically use a flat white paint and have their own coverage rate. Add the ceiling area (length × width of the room) as a separate section if needed."}}, {"@type": "Question", "name": "How accurate is this paint calculator?", "acceptedAnswer": {"@type": "Answer", "text": "The calculator uses industry-standard coverage rates (350-400 sq ft/gallon). Actual paint needed depends on surface texture, paint quality, color, and number of coats. Always buy 10% extra to account for touch-ups and spills."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <label style="font-size:.85em;color:var(--text2);font-weight:600" id="lbl-unit"></label>
    <div class="paint-unit" id="unit">
      <button data-unit="imperial" class="active">Imperial (ft, gal)</button>
      <button data-unit="metric">Metric (m, L)</button>
    </div>
    <div class="paint-section">
      <h3 id="lbl-walls"></h3>
      <div id="walls"></div>
      <button class="gz-btn gz-btn-secondary" style="margin-top:10px" onclick="addWall()">+ <span id="lbl-addwall"></span></button>
    </div>
    <div class="paint-row" style="margin-top:12px;max-width:560px">
      <label><span id="lbl-doors"></span><input type="number" id="doors" value="1" min="0" step="1" oninput="calc()"></label>
      <label><span id="lbl-windows"></span><input type="number" id="windows" value="2" min="0" step="1" oninput="calc()"></label>
    </div>
    <div class="paint-row" style="max-width:560px">
      <label><span id="lbl-coats"></span><input type="number" id="coats" value="2" min="1" max="5" step="1" oninput="calc()"></label>
      <label><span id="lbl-cost"></span><input type="number" id="costPerUnit" value="35" min="0" step="0.5" oninput="calc()"></label>
    </div>
    <div class="paint-results" id="results"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Paint Calculator',
    toolDesc: 'Estimate how much paint you need for any room. Enter wall dimensions, openings and coats — get gallons/liters and total cost instantly.',
    lblUnit: 'Units',
    lblWalls: 'Walls',
    lblAddWall: 'Add Wall',
    lblDoors: 'Number of Doors (21 ft² / 2 m² each)',
    lblWindows: 'Number of Windows (15 ft² / 1.4 m² each)',
    lblCoats: 'Number of Coats',
    lblCost: 'Price per ' + 'Gallon/Liter ($)',
    width: 'Width (ft/m)',
    height: 'Height (ft/m)',
    totalArea: 'Total Area',
    paintNeeded: 'Paint Needed',
    estimatedCost: 'Estimated Cost',
    coverage: 'Coverage (350 ft²/gal, 10 m²/L)',
    step1: 'Select your preferred unit system (Imperial or Metric)',
    step2: 'Add each wall and enter its width and height',
    step3: 'Enter the number of doors, windows, and coats',
    step4: 'Optionally enter paint cost to see the total price estimate',
  },
  zh: {
    toolTitle: '油漆用量计算器',
    toolDesc: '估算房间的油漆用量。输入墙体尺寸、门窗数量和涂刷遍数,即时获得加仑/升数和总费用。',
    lblUnit: '单位',
    lblWalls: '墙面',
    lblAddWall: '添加墙面',
    lblDoors: '门数量(每扇 2 m²)',
    lblWindows: '窗数量(每扇 1.4 m²)',
    lblCoats: '涂刷遍数',
    lblCost: '单价(元/L)',
    width: '宽度 (米/英尺)',
    height: '高度 (米/英尺)',
    totalArea: '总面积',
    paintNeeded: '需要油漆',
    estimatedCost: '预估费用',
    coverage: '覆盖率 (10 m²/L, 350 ft²/gal)',
    step1: '选择单位制(英制或公制)',
    step2: '添加每面墙并输入宽度和高度',
    step3: '输入门窗数量和涂刷遍数',
    step4: '可输入单价查看总费用估算',
  }
});

const { $, t } = GZ;
let unit = 'imperial';

const doorArea = { imperial: 21, metric: 2 };
const windowArea = { imperial: 15, metric: 1.4 };
const coverage = { imperial: 350, metric: 10 };

function addWall() {
  const walls = $('#walls');
  const div = document.createElement('div');
  div.className = 'paint-row';
  div.style.marginTop = '8px';
  div.innerHTML = `
    <label><span>${t('width')}</span><input type="number" class="pw" min="0" step="0.1" value="12" oninput="calc()"></label>
    <label><span>${t('height')}</span><input type="number" class="ph" min="0" step="0.1" value="8" oninput="calc()"></label>`;
  walls.appendChild(div);
}

function $$ (s, p) { return [...(p || document).querySelectorAll(s)]; }

function calc() {
  let wallArea = 0;
  $$('#walls .paint-row').forEach(r => {
    const w = parseFloat(r.querySelector('.pw').value) || 0;
    const h = parseFloat(r.querySelector('.ph').value) || 0;
    wallArea += w * h;
  });
  const doors = parseInt($('#doors').value) || 0;
  const windows = parseInt($('#windows').value) || 0;
  const coats = parseInt($('#coats').value) || 1;
  const openings = doors * doorArea[unit] + windows * windowArea[unit];
  const paintableArea = Math.max(0, wallArea - openings);
  const totalArea = paintableArea * coats;
  const amount = totalArea / coverage[unit];
  const cost = amount * (parseFloat($('#costPerUnit').value) || 0);
  const u1 = unit === 'imperial' ? 'ft²' : 'm²';
  const u2 = unit === 'imperial' ? 'gal' : 'L';

  $('#results').innerHTML = `
    <div class="paint-card primary"><div class="value">${amount.toFixed(2)} ${u2}</div><div class="label">${t('paintNeeded')}</div></div>
    <div class="paint-card"><div class="value">${totalArea.toFixed(0)} ${u1}</div><div class="label">${t('totalArea')} (${coats}×)</div></div>
    <div class="paint-card"><div class="value">${paintableArea.toFixed(0)} ${u1}</div><div class="label">Paintable Wall</div></div>
    <div class="paint-card"><div class="value">$${cost.toFixed(2)}</div><div class="label">${t('estimatedCost')}</div></div>`;
}

function changeUnit(u, btn) {
  unit = u;
  document.querySelectorAll('#unit button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  calc();
}

document.querySelectorAll('#unit button').forEach(btn => {
  btn.addEventListener('click', () => changeUnit(btn.dataset.unit, btn));
});

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="addWall()">+ ${t('lblAddWall')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#walls').innerHTML='';addWall();addWall();addWall();addWall();calc()">↺ Reset</button>`;

for (let i = 0; i < 4; i++) addWall();
calc();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🧱', href:'/calc/concrete.html', name:'Concrete Calculator'},
    {icon:'🟫', href:'/calc/tile-calculator.html', name:'Tile Calculator'},
    {icon:'📐', href:'/calc/square-footage.html', name:'Square Footage'},
    {icon:'🏠', href:'/calc/area-calculator.html', name:'Area Calculator'},
  ]
});
</script>
<script>new Image().src="https://site-analytics.gamezipper.com/hit?s=tools.gamezipper.com&p="+encodeURIComponent(location.pathname);</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
