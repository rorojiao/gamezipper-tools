<script>
GZI18n.register({
  en: {

  },
  zh: {

    toolDesc: '可视化生成 Apache .htaccess 配置文件 — HTTPS、www、gzip 压缩、缓存、错误页面、防盗链等，支持实时预览和自定义编辑。',
    step1: '勾选需要启用的模块（HTTPS 重定向、gzip、缓存、错误页面等）',
    step2: '调整模块选项（你的域名、错误页面路径、缓存时长）',
    step3: '在左侧查看生成结果，右侧可自定义编辑',
    step4: '点击「复制」并上传到网站根目录，重命名为 .htaccess',
  }
});

const { $, copyText, t } = GZ;

const state = {
  domain: 'example.com',
  wwwMode: 'to-www',  // 'to-www' | 'to-non-www'
  slashMode: 'add',   // 'add' | 'remove'
  errorPages: '404:/404.html\n500:/500.html\n403:/403.html',
  cacheMax: 2592000,  // 30 days default
  staticMax: 31536000, // 1 year for static
  hotlinkAllowed: '',
  spaFile: 'index.html',
  modules: { 'default': true }
};

const TEMPLATES = {
  default: `# Default Apache configuration
<IfModule mod_rewrite.c>
  RewriteEngine On
</IfModule>

DirectoryIndex index.html index.php

<IfModule mod_headers.c>
  Header set X-Content-Type-Options "nosniff"
  Header set X-Frame-Options "SAMEORIGIN"
  Header set Referrer-Policy "strict-origin-when-cross-origin"
</IfModule>`,

  https: `# Force HTTPS — 301 redirect all HTTP to HTTPS
<IfModule mod_rewrite.c>
  RewriteEngine On
  RewriteCond %{HTTPS} off
  RewriteRule ^(.*)$ https://%{HTTP_HOST}%{REQUEST_URI} [L,R=301]
</IfModule>`,

  www: `# Force ${state.wwwMode === 'to-www' ? 'www' : 'non-www'} version
<IfModule mod_rewrite.c>
  RewriteEngine On
  ${state.wwwMode === 'to-www'
    ? `RewriteCond %{HTTP_HOST} ^${state.domain.replace(/\./g, '\\.')}$ [NC]
  RewriteRule ^(.*)$ https://www.${state.domain}/$1 [L,R=301]`
    : `RewriteCond %{HTTP_HOST} ^www\\.${state.domain.replace(/\./g, '\\.')}$ [NC]
  RewriteRule ^(.*)$ https://${state.domain}/$1 [L,R=301]`}
</IfModule>`,

  ssl: `# Force SSL on sensitive paths
<IfModule mod_ssl.c>
  SSLRequireSSL
</IfModule>`,

  'www-slash': `# ${state.slashMode === 'add' ? 'Add' : 'Remove'} trailing slash
<IfModule mod_rewrite.c>
  RewriteEngine On
  ${state.slashMode === 'add'
    ? `RewriteCond %{REQUEST_URI} /+[^\.]+$
  RewriteRule ^(.+)$ %{REQUEST_URI}/ [L,R=301]`
    : `RewriteCond %{REQUEST_URI} !/$
  RewriteCond %{REQUEST_URI} !\\.[a-zA-Z0-9]+$
  RewriteRule ^(.*)$ $1 [L,R=301]`}
</IfModule>`,

  gzip: `# Enable GZIP compression
<IfModule mod_deflate.c>
  AddOutputFilterByType DEFLATE text/html text/plain text/xml text/css text/javascript
  AddOutputFilterByType DEFLATE application/javascript application/json application/xml
  AddOutputFilterByType DEFLATE image/svg+xml application/rss+xml application/atom+xml
  AddOutputFilterByType DEFLATE font/ttf font/eot font/otf font/woff font/woff2

  <IfModule mod_setenvif.c>
    BrowserMatch ^Mozilla/4 gzip-only-text/html
    BrowserMatch ^Mozilla/4\\.0[678] no-gzip
    BrowserMatch \\bMSIE !no-gzip !gzip-only-text/html
  </IfModule>

  Header append Vary User-Agent env=!dont-vary
</IfModule>`,

  cache: `# Browser caching
<IfModule mod_expires.c>
  ExpiresActive On
  # Default: ${state.cacheMax} seconds
  ExpiresDefault A${state.cacheMax}
  # Images
  ExpiresByType image/jpeg "access plus 1 year"
  ExpiresByType image/png "access plus 1 year"
  ExpiresByType image/gif "access plus 1 year"
  ExpiresByType image/webp "access plus 1 year"
  ExpiresByType image/svg+xml "access plus 1 year"
  ExpiresByType image/x-icon "access plus 1 year"
  # CSS, JavaScript
  ExpiresByType text/css "access plus 1 month"
  ExpiresByType application/javascript "access plus 1 month"
  ExpiresByType text/javascript "access plus 1 month"
  # Fonts
  ExpiresByType font/woff2 "access plus 1 year"
  ExpiresByType font/woff "access plus 1 year"
  ExpiresByType font/ttf "access plus 1 year"
</IfModule>

<IfModule mod_headers.c>
  <FilesMatch "\\.(jpg|jpeg|png|gif|webp|svg|ico|woff2|woff|ttf)$">
    Header set Cache-Control "public, max-age=${state.staticMax}, immutable"
  </FilesMatch>
</IfModule>`,

  errors: `# Custom error pages
${state.errorPages.split('\n').filter(Boolean).map(line => {
  const [code, path] = line.split(':').map(s => s.trim());
  return `ErrorDocument ${code} ${path}`;
}).join('\n')}`,

  hotlink: `# Hotlink protection — stop other sites from using your images
<IfModule mod_rewrite.c>
  RewriteEngine On
  RewriteCond %{HTTP_REFERER} !^$
  RewriteCond %{HTTP_REFERER} !^https?://(www\\.)?${state.domain.replace(/\./g, '\\.')}/.*$ [NC]${state.hotlinkAllowed ? '\n  ' + state.hotlinkAllowed.split(',').map(d => `RewriteCond %{HTTP_REFERER} !^https?://(www\\.)?${d.trim().replace(/^https?:\/\//, '').replace(/\./g, '\\.')}/.*$ [NC]`).join('\n  ') : ''}
  RewriteRule \\.(jpg|jpeg|png|gif|webp|svg)$ - [F]
</IfModule>`,

  dir: `# Disable directory listing
Options -Indexes

# Optionally serve a default file for empty dirs
# DirectoryIndex disabled`,

  files: `# Block access to sensitive files
<FilesMatch "^(\\.htaccess|\\.htpasswd|\\.env|\\.git|wp-config\\.php|composer\\.json|composer\\.lock|package-lock\\.json|README\\.md)$">
  Order Allow,Deny
  Deny from all
</FilesMatch>

# Block backup and version files
<FilesMatch "\\.(bak|sql|log|conf|ini|yml|yaml|json|dist|md)$">
  <IfModule mod_authz_core.c>
    Require all denied
  </IfModule>
  Order Allow,Deny
  Deny from all
</FilesMatch>`,

  spa: `# Single Page Application (SPA) fallback
# All non-file requests route to ${state.spaFile}
<IfModule mod_rewrite.c>
  RewriteEngine On
  RewriteBase /
  RewriteRule ^${state.spaFile}$ - [L]
  RewriteCond %{REQUEST_FILENAME} !-f
  RewriteCond %{REQUEST_FILENAME} !-d
  RewriteRule . /${state.spaFile} [L]
</IfModule>`
};

function getParamsForModule(key) {
  const params = [];
  if (key === 'www') {
    params.push({ type: 'text', label: 'Domain:', id: 'p-domain', val: state.domain });
    params.push({ type: 'select', label: 'Mode:', id: 'p-www-mode', val: state.wwwMode, options: [{v:'to-www',t:'Force www version'},{v:'to-non-www',t:'Force non-www'}] });
  } else if (key === 'www-slash') {
    params.push({ type: 'select', label: 'Action:', id: 'p-slash-mode', val: state.slashMode, options: [{v:'add',t:'Add trailing slash'},{v:'remove',t:'Remove trailing slash'}] });
  } else if (key === 'errors') {
    params.push({ type: 'textarea', label: 'Mappings (code:path per line):', id: 'p-errors', val: state.errorPages });
  } else if (key === 'cache') {
    params.push({ type: 'number', label: 'Default (sec):', id: 'p-cache-max', val: state.cacheMax });
    params.push({ type: 'number', label: 'Static assets (sec):', id: 'p-static-max', val: state.staticMax });
  } else if (key === 'hotlink') {
    params.push({ type: 'text', label: 'Domain:', id: 'p-hotlink-domain', val: state.domain });
    params.push({ type: 'text', label: 'Allowed domains (comma separated):', id: 'p-hotlink-allowed', val: state.hotlinkAllowed, placeholder: 'google.com, bing.com' });
  } else if (key === 'spa') {
    params.push({ type: 'text', label: 'Entry file:', id: 'p-spa-file', val: state.spaFile });
  }
  return params;
}

function showParams() {
  const checked = Array.from(document.querySelectorAll('.ht-module input:checked')).map(c => c.dataset.key);
  const paramsBody = $('#params-body');
  const paramsBox = $('#params');
  if (checked.length === 0) { paramsBox.classList.remove('show'); paramsBody.innerHTML = ''; return; }

  let html = '';
  for (const key of checked) {
    const p = getParamsForModule(key);
    if (p.length === 0) continue;
    html += `<div style="margin-bottom:10px;padding:8px 0;border-top:1px dashed var(--border)">`;
    html += `<div style="font-size:.85em;font-weight:600;margin-bottom:6px;text-transform:capitalize">${key.replace(/-/g,' ')}</div>`;
    for (const f of p) {
      html += `<div class="row">`;
      html += `<label for="${f.id}">${f.label}</label>`;
      if (f.type === 'select') {
        html += `<select id="${f.id}" data-key="${key}">`;
        for (const o of f.options) html += `<option value="${o.v}"${o.v===f.val?' selected':''}>${o.t}</option>`;
        html += `</select>`;
      } else if (f.type === 'textarea') {
        html += `<textarea id="${f.id}" data-key="${key}" rows="3" style="flex:1;padding:6px 8px;background:var(--bg2);color:var(--text);border:1px solid var(--border);border-radius:5px;font-family:inherit;font-size:.85em;resize:vertical;min-height:60px">${f.val}</textarea>`;
      } else {
        html += `<input type="${f.type}" id="${f.id}" data-key="${key}" value="${f.val||''}" placeholder="${f.placeholder||''}">`;
      }
      html += `</div>`;
    }
    html += `</div>`;
  }
  paramsBody.innerHTML = html;
  if (html) paramsBox.classList.add('show');
  // Wire change events
  paramsBody.querySelectorAll('input,select,textarea').forEach(el => {
    el.addEventListener('input', () => {
      const id = el.id;
      const v = el.value;
      if (id === 'p-domain') state.domain = v || 'example.com';
      else if (id === 'p-www-mode') state.wwwMode = v;
      else if (id === 'p-slash-mode') state.slashMode = v;
      else if (id === 'p-errors') state.errorPages = v;
      else if (id === 'p-cache-max') state.cacheMax = parseInt(v) || 0;
      else if (id === 'p-static-max') state.staticMax = parseInt(v) || 0;
      else if (id === 'p-hotlink-domain') state.domain = v || 'example.com';
      else if (id === 'p-hotlink-allowed') state.hotlinkAllowed = v;
      else if (id === 'p-spa-file') state.spaFile = v || 'index.html';
      generate();
    });
  });
}

function generate() {
  const checked = Array.from(document.querySelectorAll('.ht-module input:checked')).map(c => c.dataset.key);
  const parts = [];
  // Header comment
  parts.push(`# .htaccess configuration — generated by GameZipper Tools`);
  parts.push(`# Generated: ${new Date().toISOString().split('T')[0]}`);
  parts.push(`# Modules: ${checked.length}`);
  parts.push(``);

  for (const key of checked) {
    let tpl = TEMPLATES[key];
    if (tpl) {
      // Replace placeholders dynamically
      tpl = tpl.replace(/\$\{state\.domain\}/g, state.domain);
      tpl = tpl.replace(/\$\{state\.wwwMode\}/g, state.wwwMode);
      tpl = tpl.replace(/\$\{state\.slashMode\}/g, state.slashMode);
      tpl = tpl.replace(/\$\{state\.errorPages\}/g, state.errorPages);
      tpl = tpl.replace(/\$\{state\.cacheMax\}/g, state.cacheMax);
      tpl = tpl.replace(/\$\{state\.staticMax\}/g, state.staticMax);
      tpl = tpl.replace(/\$\{state\.hotlinkAllowed\}/g, state.hotlinkAllowed);
      tpl = tpl.replace(/\$\{state\.spaFile\}/g, state.spaFile);
      parts.push(`# ── ${key.toUpperCase()} ─────────────────────────────────────`);
      parts.push(tpl);
      parts.push(``);
    }
  }
  const out = parts.join('\n');
  $('#output').value = out;
  // If custom box is empty, sync it
  if (!$('#custom').value.trim()) {
    $('#custom').value = out;
  }
  $('#status').innerHTML = `<span class="ok">✓ Generated ${out.split('\n').length} lines, ${out.length} chars</span>`;
  $('#status').className = 'ht-status ok';
}

function doClear() {
  $('#custom').value = '';
  $('#output').value = '';
  $('#status').textContent = '';
}

function loadExample() {
  // Enable a useful default set
  ['default','https','www','gzip','cache','errors','dir','files'].forEach(k => {
    const cb = document.getElementById('m-' + k);
    if (cb) cb.checked = true;
  });
  state.domain = 'example.com';
  state.errorPages = '404:/404.html\n500:/500.html\n403:/403.html';
  state.hotlinkAllowed = '';
  showParams();
  generate();
  $('#custom').value = $('#output').value;
}

// Wire checkbox changes
document.querySelectorAll('.ht-module input').forEach(cb => {
  cb.addEventListener('change', () => { showParams(); generate(); });
});

// Wire custom edit -> update output live
$('#custom').addEventListener('input', () => {
  $('#output').value = $('#custom').value;
  const lines = $('#custom').value.split('\n').length;
  $('#status').innerHTML = `<span class="ok">✓ Custom edit — ${lines} lines</span>`;
  $('#status').className = 'ht-status ok';
});

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn" onclick="copyText($('#output').value)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="generate()">↻ Regenerate</button>`;
