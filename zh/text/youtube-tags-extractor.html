const {$, copyText, t} = GZ;

const STOP_WORDS = new Set(['a','an','the','and','or','but','of','in','on','at','to','for','with','by','is','it','this','that','as','be','was','are']);

const NICHE_MODIFIERS = {
  general: ['how to','tutorial','guide','tips','best','top','new','review','2026','2025'],
  tutorial: ['how to','step by step','for beginners','tutorial','guide','explained','easy','learn','basics','complete guide','from scratch','in 2026','beginner to advanced'],
  review: ['review','comparison','vs','honest review','worth it','pros and cons','best of','top 5','top 10','buying guide','should you buy','tested','unboxing','first impressions'],
  gaming: ['gameplay','walkthrough','playthrough','guide','tips','tricks','speedrun','no commentary','reaction','highlights','best moments','funny moments','glitches','cheats','build','strategy','tier list'],
  tech: ['tutorial','code','programming','developer','explained','in 2026','beginner','advanced','tips','best practices','vs','comparison','review','setup','tools','workflow','productivity'],
  cooking: ['recipe','easy recipe','homemade','how to cook','best','quick','healthy','delicious','in 30 minutes','meal prep','for beginners','traditional','authentic','tasty','cooking tips'],
  fitness: ['workout','routine','training','how to','beginner','advanced','home workout','gym','tips','form check','mobility','hypertrophy','strength','cardio','fat loss','muscle building'],
  travel: ['travel vlog','travel guide','things to do','where to eat','best hotels','budget travel','backpacking','solo travel','couple travel','family travel','2026','top 10','hidden gems','itinerary'],
  beauty: ['makeup tutorial','grwm','get ready with me','review','swatches','routine','beginner friendly','drugstore','high end','comparison','best of','tips','easy','natural','everyday','party look'],
  finance: ['investing','how to invest','stocks','crypto','real estate','passive income','budget','saving money','side hustle','financial freedom','tax tips','beginner','explained','2026','strategy','portfolio'],
  music: ['cover','tutorial','how to play','chords','lesson','karaoke','reaction','remix','medley','live','acoustic','electric','beginner','easy','in 2026','best songs','top 10'],
  education: ['explained','history','science','facts','educational','for students','lesson','study tips','in 2026','beginner','advanced','quiz','interesting facts','you should know'],
  lifestyle: ['morning routine','day in my life','minimalist','self care','productivity','organize with me','grwm','weekly vlog','healthy habits','wellness','mindset','goals','2026','tips']
};

const QUESTION_PREFIXES = ['how to','what is','why','when to','where to','which','best way to','how do you'];

const YEAR_TAGS = ['2026','2025','2024','latest','new','trending','updated','this year'];

function tokenize(s) { return s.toLowerCase().replace(/[^a-z0-9\s\-]/g,' ').split(/\s+/).filter(Boolean); }

function uniqKeepOrder(arr) {
  const seen = new Set(); const out = [];
  for (const x of arr) {
    const k = x.toLowerCase().trim();
    if (!k || k.length < 2) continue;
    if (k.length > 30) continue;
    if (seen.has(k)) continue;
    seen.add(k); out.push(x);
  }
  return out;
}

function titleCase(s) { return s.split(/\s+/).map(w=>w.length<=3?w:(w[0].toUpperCase()+w.slice(1))).join(' '); }

function generateTags() {
  const topic = $('#topic').value.trim();
  if (!topic) { $('#tags').innerHTML = '<em style="opacity:.6">'+t('topic')+'</em>'; return; }
  const niche = $('#niche').value;
  const extra = $('#extra').value;
  const words = tokenize(topic);
  const focusWords = words.filter(w=>!STOP_WORDS.has(w));
  const extraWords = tokenize(extra);
  const allFocus = [...new Set([...focusWords, ...extraWords])];
  const tags = [];

  // Direct topic variations
  tags.push(topic.toLowerCase());
  tags.push(topic);
  tags.push(titleCase(topic));
  for (const w of focusWords) { tags.push(w); tags.push(w+'s'); }

  // Niche modifiers
  const mods = NICHE_MODIFIERS[niche] || NICHE_MODIFIERS.general;
  for (const m of mods) {
    tags.push(m+' '+topic.toLowerCase());
    tags.push(topic.toLowerCase()+' '+m);
  }
  for (const m of mods) {
    for (const w of focusWords) tags.push(m+' '+w);
  }
  for (const m of mods) {
    for (const w of allFocus) tags.push(w+' '+m);
  }

  // Question variations
  for (const q of QUESTION_PREFIXES) {
    for (const w of focusWords.slice(0,3)) {
      tags.push(q+' '+w);
    }
    tags.push(q+' '+topic.toLowerCase());
  }

  // Year combinations
  for (const y of YEAR_TAGS) {
    tags.push(topic+' '+y);
    tags.push(y+' '+topic);
    for (const w of focusWords.slice(0,2)) tags.push(w+' '+y);
  }

  // Long-tail combos
  for (let i=0;i<focusWords.length-1;i++) {
    for (let j=i+1;j<Math.min(i+3,focusWords.length);j++) {
      tags.push(focusWords[i]+' '+focusWords[j]);
      tags.push(focusWords[j]+' '+focusWords[i]);
    }
  }

  // Extra words combos
  for (const e of extraWords) {
    for (const w of focusWords) tags.push(e+' '+w);
    tags.push(e+' '+topic.toLowerCase());
  }

  return uniqKeepOrder(tags);
}

let currentTags = [];
let selected = new Set();

function renderTags() {
  const html = currentTags.map((t,i) =>
    `<span class="yt-tag${selected.has(i)?' selected':''}" data-i="${i}">${t}</span>`
  ).join('');
  $('#tags').innerHTML = html || '<em style="opacity:.6">—</em>';
  $('#charCount').textContent = `${[...selected].reduce((s,i)=>s+currentTags[i].length+2,0)} / 500 chars`;
  document.querySelectorAll('.yt-tag').forEach(el => {
    el.onclick = () => {
      const i = +el.dataset.i;
      if (selected.has(i)) selected.delete(i); else selected.add(i);
      renderTags();
    };
  });
}

function renderStats() {
  const total = currentTags.length;
  const sel = selected.size;
  const avgLen = sel > 0 ? Math.round([...selected].reduce((s,i)=>s+currentTags[i].length,0)/sel) : 0;
  const charTotal = [...selected].reduce((s,i)=>s+currentTags[i].length+2,0);
  $('#stats').innerHTML = `
    <div class="yt-stat"><div class="num">${total}</div><div class="lbl">Total</div></div>
    <div class="yt-stat"><div class="num">${sel}</div><div class="lbl">Selected</div></div>
    <div class="yt-stat"><div class="num">${avgLen}</div><div class="lbl">Avg length</div></div>
    <div class="yt-stat"><div class="num" style="color:${charTotal>500?'#e94560':'var(--accent)'}">${charTotal}</div><div class="lbl">/ 500 chars</div></div>
  `;
}

function doGenerate() {
  currentTags = generateTags();
  selected = new Set(currentTags.slice(0, Math.min(20, currentTags.length)).map((_,i)=>i));
  renderTags(); renderStats();
}

$('#topic').addEventListener('input', () => { if ($('#topic').value.trim()) doGenerate(); });
$('#niche').addEventListener('change', doGenerate);
$('#extra').addEventListener('input', () => { if ($('#topic').value.trim()) doGenerate(); });

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="doGenerate()">🔄 ${t('generate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="selected=new Set(currentTags.map((_,i)=>i));renderTags();renderStats()">${t('addAll')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="selected=new Set();renderTags();renderStats()">${t('clearTags')}</button>
`;

$('#actions').innerHTML = `
  <button class="gz-btn" onclick="copyText([...selected].sort((a,b)=>a-b).map(i=>currentTags[i]).join(', '))">${t('copyComma')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="copyText([...selected].sort((a,b)=>a-b).map(i=>currentTags[i]).join('\\n'))">${t('copyLines')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="exportTxt()">${t('exportSelected')}</button>
`;

function exportTxt() {
  const txt = [...selected].sort((a,b)=>a-b).map(i=>currentTags[i]).join('\n');
  const blob = new Blob([txt], {type:'text/plain'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'youtube-tags.txt';
  a.click();
  URL.revokeObjectURL(a.href);
}

  ]
});
</script>
