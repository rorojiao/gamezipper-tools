<body>
<div class="gz-container">
  <div class="gz-tool-header">

<script>
GZI18n.register({
  en: {
    toolTitle: 'Random Letter Generator',
    toolDesc: 'Pick random letters from A to Z with case filters, exclusions and unique mode. Cryptographically random — perfect for games, ESL practice and classroom activities.',
    generate: '🎲 Generate',
    copy: '📋 Copy',
    clear: '🗑️ Clear',
    lblCase: 'Case',
    lblCount: 'How many',
    lblExclude: 'Exclude letters',
    lblUnique: 'Unique (no duplicates)',
    lblHistory: 'History',
    step1: 'Choose case: uppercase, lowercase or mixed',
    step2: 'Set how many letters you want (1-100)',
    step3: 'Optionally exclude letters or enable unique mode',
    step4: 'Click Generate, then Copy to grab your letters',
  },
  zh: {
    toolTitle: '随机字母生成器',
    toolDesc: '从 A 到 Z 中随机挑选字母，支持大小写、排除字母和不重复模式。密码学随机 — 适用于游戏、ESL 练习和课堂活动。',
    generate: '🎲 生成',
    copy: '📋 复制',
    clear: '🗑️ 清空',
    lblCase: '大小写',
    lblCount: '生成数量',
    lblExclude: '排除字母',
    lblUnique: '不重复',
    lblHistory: '历史记录',
    step1: '选择大小写：大写、小写或混合',
    step2: '设置生成数量（1-100）',
    step3: '可选：排除指定字母或启用不重复模式',
    step4: '点击「生成」，然后「复制」获取字母',
  }
});

const { $, copyText, t } = GZ;
let caseMode = 'upper';
let history = [];

function getAlphabet() {
  const exclRaw = $('#exclude').value.toUpperCase().replace(/[^A-Z]/g, '');
  const excl = new Set(exclRaw.split(''));
  let letters = [];
  for (let i = 65; i <= 90; i++) {
    if (!excl.has(String.fromCharCode(i))) letters.push(String.fromCharCode(i));
  }
  return letters;
}

function secureRandom(max) {
  const arr = new Uint32Array(1);
  crypto.getRandomValues(arr);
  return arr[0] % max;
}

function pickLetter(letters) {
  return letters[secureRandom(letters.length)];
}

function applyCase(letter) {
  if (caseMode === 'upper') return letter.toUpperCase();
  if (caseMode === 'lower') return letter.toLowerCase();
  return secureRandom(2) ? letter.toUpperCase() : letter.toLowerCase();
}

function generate() {
  const letters = getAlphabet();
  if (!letters.length) {
    $('#display').textContent = '✗';
    $('#results').innerHTML = '';
    return;
  }
  const n = Math.max(1, Math.min(100, parseInt($('#count').value) || 1));
  const unique = $('#unique').checked;
  let result = [];

  if (unique) {
    const pool = [...letters];
    const max = Math.min(n, pool.length);
    for (let i = 0; i < max; i++) {
      const idx = secureRandom(pool.length);
      result.push(applyCase(pool[idx]));
      pool.splice(idx, 1);
    }
  } else {
    for (let i = 0; i < n; i++) {
      result.push(applyCase(pickLetter(letters)));
    }
  }

  if (result.length === 1) {
    $('#display').textContent = result[0];
    $('#results').innerHTML = '';
  } else {
    $('#display').textContent = result[0];
    $('#results').innerHTML = result.map(l => `<span>${l}</span>`).join('');
  }

  // Update history
  history.unshift(result.join(' '));
  history = history.slice(0, 10);
  $('#history').textContent = history.join('   ·   ');
}

function clearAll() {
  $('#display').textContent = '?';
  $('#results').innerHTML = '';
  history = [];
  $('#history').textContent = '';
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" id="btn-gen">${t('generate')}</button>
  <button class="gz-btn gz-btn-secondary" id="btn-copy">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" id="btn-clear">${t('clear')}</button>`;

$('#lbl-case').textContent = t('lblCase');
$('#lbl-count').textContent = t('lblCount');
$('#lbl-exclude').textContent = t('lblExclude');
$('#lbl-unique').textContent = t('lblUnique');
$('#lbl-history').textContent = t('lblHistory');

document.querySelectorAll('#case-btns button').forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll('#case-btns button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    caseMode = btn.dataset.case;
  };
});

$('#btn-gen').onclick = generate;
$('#btn-copy').onclick = () => {
  let text = $('#display').textContent;
  const extras = [...document.querySelectorAll('#results span')].map(s => s.textContent).join(' ');
  if (extras) text = extras;
  copyText(text);
};
$('#btn-clear').onclick = clearAll;

// Allow Enter in count field to generate
$('#count').addEventListener('keydown', e => { if (e.key === 'Enter') generate(); });

generate();

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {href:'/text/random-word-generator.html',icon:'🎲',name:'Random Word'},
    {href:'/calc/random-number-generator.html',icon:'🔢',name:'Random Number'},
    {href:'/text/letter-counter.html',icon:'🔤',name:'Letter Counter'},
    {href:'/fun/name-picker.html',icon:'🎯',name:'Name Picker'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
