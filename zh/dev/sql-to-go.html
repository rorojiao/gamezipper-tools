const { $, copyText, t } = GZ;

// SQL type -> Go type (non-nullable)
function sqlTypeToGo(sqlType){
  const s = String(sqlType).toUpperCase().replace(/\s*\(.*\)/,'').trim();
  if (/^(TINYINT)$/.test(s)) return 'int16';
  if (/^(SMALLINT|MEDIUMINT)$/.test(s)) return 'int16';
  if (/^(INT|INTEGER)$/.test(s)) return 'int32';
  if (/^(BIGINT|SERIAL|BIGSERIAL)$/.test(s)) return 'int64';
  if (/^(SMALLSERIAL)$/.test(s)) return 'int16';
  if (/^(BIT)$/.test(s)) return 'bool';
  if (/^(BOOL|BOOLEAN)$/.test(s)) return 'bool';
  if (/^(DECIMAL|NUMERIC|MONEY|FLOAT|DOUBLE|REAL|DOUBLE\s+PRECISION)$/.test(s)) return 'float64';
  if (/^(BLOB|BYTEA|BINARY|VARBINARY|IMAGE)$/.test(s)) return '[]byte';
  if (/^(DATE|DATETIME|TIMESTAMP|TIME|INTERVAL|TIMESTAMPTZ|TIMETZ)$/.test(s)) return 'time.Time';
  // CHAR, VARCHAR, TEXT, JSON, JSONB, UUID, ENUM, etc.
  return 'string';
}

// SQL type -> Go nullable wrapper (for nullable columns)
function nullableGo(goType){
  switch(goType){
    case 'int16': return 'sql.NullInt16';
    case 'int32': return 'sql.NullInt32';
    case 'int64': return 'sql.NullInt64';
    case 'float64': return 'sql.NullFloat64';
    case 'bool': return 'sql.NullBool';
    case 'string': return 'sql.NullString';
    case 'time.Time': return 'sql.NullTime';
    default: return '*' + goType; // pointer fallback
  }
}

function pascalCase(s){
  return String(s).replace(/[^a-zA-Z0-9]+/g, ' ').trim()
    .split(/\s+/).map(w => w.charAt(0).toUpperCase() + w.slice(1)).join('')
    .replace(/^([0-9])/, '_$1') || 'Field';
}

// Parse CREATE TABLE
function parseCreateTable(sql){
  const m = sql.match(/CREATE\s+TABLE\s+(?:IF\s+NOT\s+EXISTS\s+)?(?:"[^"]+"|`[^`]+`|\[[^\]]+\]|[.\w]+)\s*\(([\s\S]*?)\)\s*;/i);
  if(!m) return null;
  const body = m[1];
  const parts = [];
  let depth = 0, cur = '';
  for(const ch of body){
    if(ch === '(') depth++;
    else if(ch === ')') depth--;
    if(ch === ',' && depth === 0){ parts.push(cur); cur = ''; }
    else cur += ch;
  }
  if(cur.trim()) parts.push(cur);
  const columns = [];
  for(const raw of parts){
    const def = raw.trim();
    if(!def) continue;
    if(/^(PRIMARY|FOREIGN|UNIQUE|CHECK|CONSTRAINT|KEY|INDEX)\b/i.test(def)) continue;
    const tokens = def.match(/^("(?:[^"]|"")+|`[^`]+`|\[[^\]]+\]|[.\w]+)\s+([A-Za-z]+)/);
    if(!tokens) continue;
    let colName = tokens[1].replace(/^"(.*)"$/, '$1').replace(/""/g,'"').replace(/^`(.*)`$/, '$1').replace(/^\[(.*)\]$/, '$1');
    const colType = tokens[2].replace(/\s*\([^)]*\)/, '').trim();
    const nullable = !/NOT\s+NULL/i.test(def);
    const isPrimaryKey = /\bPRIMARY\s+KEY\b/i.test(def);
    columns.push({ name: colName, type: colType, nullable, isPrimaryKey, raw: def });
  }
  const nameMatch = sql.match(/CREATE\s+TABLE\s+(?:IF\s+NOT\s+EXISTS\s+)?(?:"([^"]+)"|`([^`]+)`|\[([^\]]+)\]|([.\w]+))/i);
  const tableName = (nameMatch && (nameMatch[1]||nameMatch[2]||nameMatch[3]||nameMatch[4])) || 'row';
  return { columns, tableName };
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

const GO_KEYWORDS = new Set(['package','import','type','struct','func','var','const','return','range','map','chan','interface','nil','for','if','else','switch','case','default','break','continue','defer','go','select']);
const GO_TYPES = new Set(['int','int8','int16','int32','int64','uint','uint8','uint16','uint32','uint64','byte','rune','float32','float64','bool','string','error','time.Time','sql.NullString','sql.NullInt16','sql.NullInt32','sql.NullInt64','sql.NullFloat64','sql.NullBool','sql.NullTime']);

function highlight(code){
  // Single-pass tokenizer — avoids the string-replace chain re-matching
  // attribute values inside the spans we inject.
  const tokenRe = /(`[^`]*`|"(?:\\.|[^"\\])*")|(\/\/[^\n]*)|\b(package|import|type|struct|func|var|const|return|range|nil|for|if|else|switch|case|default|break|continue|defer)\b|\b(int|int8|int16|int32|int64|uint|uint8|uint16|uint32|uint64|byte|rune|float32|float64|bool|string|error|time\.Time|sql\.NullString|sql\.NullInt16|sql\.NullInt32|sql\.NullInt64|sql\.NullFloat64|sql\.NullBool|sql\.NullTime)\b|\b(true|false)\b|\b(-?\d+(?:\.\d+)?)\b/g;
  let out = '', last = 0, m;
  while((m = tokenRe.exec(code)) !== null){
    out += esc(code.slice(last, m.index));
    const [full, str, com, kw, typ, boolVal, num] = m;
    if(str) out += '<span class="go-str">' + esc(str) + '</span>';
    else if(com) out += '<span class="go-com">' + esc(com) + '</span>';
    else if(kw) out += '<span class="go-kw">' + kw + '</span>';
    else if(typ) out += '<span class="go-type">' + typ + '</span>';
    else if(boolVal) out += '<span class="go-bool">' + boolVal + '</span>';
    else if(num) out += '<span class="go-num">' + num + '</span>';
    last = m.index + full.length;
  }
  out += esc(code.slice(last));
  return out;
}

function buildTags(col, style){
  if(style === 'none') return '';
  if(style === 'sqlx') return ' `db:"' + col.name + '"`';
  if(style === 'gorm'){
    const parts = ['column:' + col.name];
    parts.push('type:' + col.type.toLowerCase());
    if(!col.nullable) parts.push('not null');
    if(col.isPrimaryKey) parts.push('primaryKey');
    return ' `gorm:"' + parts.join(';') + '"`';
  }
  return '';
}

function convert(){
  const raw = $('#input').value;
  if(!raw.trim()){ $('#output').textContent=''; $('#status').innerHTML=''; return; }

  const info = parseCreateTable(raw);
  if(!info){
    $('#status').innerHTML = `<span style="color:var(--gz-accent)">${t('noSql')}</span>`;
    $('#output').innerHTML = `<span style="color:var(--gz-accent)">${t('noSql')}</span>`;
    return;
  }

  const structName = pascalCase(info.tableName.split('.').pop());
  const pkgName = ($('#pkgName').value.trim() || 'models').replace(/[^a-zA-Z0-9_]/g,'') || 'models';
  const tagStyle = $('#tagSel').value;
  const useNull = $('#optNull').checked;

  let out = 'package ' + pkgName + '\n\n';
  if(info.columns.some(c => c.type.match(/DATE|DATETIME|TIMESTAMP|TIME/i))){
    out += 'import (\n\t"database/sql"\n\t"time"\n)\n\n';
  } else if(useNull){
    out += 'import "database/sql"\n\n';
  }

  out += '// ' + structName + ' mirrors the ' + info.tableName + ' table.\n';
  out += 'type ' + structName + ' struct {\n';
  for(const col of info.columns){
    const baseType = sqlTypeToGo(col.type);
    let goType;
    if(useNull && col.nullable && !col.isPrimaryKey){
      goType = nullableGo(baseType);
    } else {
      goType = baseType;
    }
    const tags = buildTags(col, tagStyle);
    out += '\t' + pascalCase(col.name) + ' ' + goType + tags + '\n';
  }
  out += '}\n';

  // TableName helper for GORM convenience
  if(tagStyle === 'gorm'){
    out += '\n// TableName tells GORM the underlying table name.\n';
    out += 'func (' + structName + ') TableName() string {\n\treturn "' + info.tableName + '"\n}\n';
  }

  $('#output').innerHTML = highlight(out);
  $('#status').innerHTML = `<span style="color:var(--gz-success)">${t('ok')(info.columns.length)}</span>`;
}

  avatar_url VARCHAR(500),
  created_at TIMESTAMPTZ NOT NULL DEFAULT NOW(),

  convert();
}
