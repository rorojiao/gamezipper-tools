const { $, copyText, t } = GZ;
let opts = { strict: true, interfaces: true, readonly: false, exportTypes: true };

// Simple JS-to-TS heuristic converter
function convertJSToTS(code) {
  const stats = { functions: 0, vars: 0, interfaces: 0, types: 0 };
  let ts = code;
  const interfaces = new Map();

  // 1. Add types to variable declarations with literal values
  ts = ts.replace(/\b(const|let|var)\s+([a-zA-Z_$][\w$]*)\s*=\s*(['"`])([^'"`]*)\3/g, (m, kw, name, q, val) => {
    stats.vars++;
    return `${kw} ${name}: string = ${q}${val}${q}`;
  });
  ts = ts.replace(/\b(const|let|var)\s+([a-zA-Z_$][\w$]*)\s*=\s*(true|false)\b/g, (m, kw, name, val) => {
    stats.vars++;
    return `${kw} ${name}: boolean = ${val}`;
  });
  ts = ts.replace(/\b(const|let|var)\s+([a-zA-Z_$][\w$]*)\s*=\s*(-?\d+\.?\d*)\b/g, (m, kw, name, val) => {
    stats.vars++;
    const type = val.includes('.') ? 'number' : 'number';
    return `${kw} ${name}: ${type} = ${val}`;
  });

  // 2. Array literals → typed arrays
  ts = ts.replace(/\b(const|let|var)\s+([a-zA-Z_$][\w$]*)\s*=\s*\[\]/g, (m, kw, name) => {
    stats.vars++;
    return `${kw} ${name}: any[] = []`;
  });
  ts = ts.replace(/\b(const|let|var)\s+([a-zA-Z_$][\w$]*)\s*=\s*\[([^\]]+)\]/g, (m, kw, name, contents) => {
    stats.vars++;
    const items = contents.split(',').map(s => s.trim());
    let elemType = 'any';
    if (items.every(i => /^['"`].*['"\`]$/.test(i))) elemType = 'string';
    else if (items.every(i => /^(true|false)$/.test(i))) elemType = 'boolean';
    else if (items.every(i => /^-?\d+\.?\d*$/.test(i))) elemType = 'number';
    return `${kw} ${name}: ${elemType}[] = [${contents}]`;
  });

  // 3. Object literals → infer interface
  if (opts.interfaces) {
    ts = ts.replace(/\b(const|let|var)\s+([a-zA-Z_$][\w$]*)\s*=\s*\{([^}]+)\}/g, (m, kw, name, body) => {
      stats.vars++;
      stats.interfaces++;
      const ifaceName = name.charAt(0).toUpperCase() + name.slice(1);
      const fields = body.split(',').map(f => f.trim()).filter(Boolean);
      const ifaceFields = fields.map(f => {
        const fm = f.match(/^([a-zA-Z_$][\w$]*)\s*:\s*(.+)$/);
        if (!fm) return null;
        const [, fname, fval] = fm;
        let ftype = inferType(fval.trim());
        const ro = opts.readonly ? 'readonly ' : '';
        return `  ${ro}${fname}: ${ftype};`;
      }).filter(Boolean).join('\n');
      interfaces.set(ifaceName, `interface ${ifaceName} {\n${ifaceFields}\n}`);
      const prefix = opts.exportTypes ? 'export ' : '';
      return `${kw} ${name}: ${ifaceName} = {${body}}`;
    });
  }

  // 4. Function parameters and return types
  ts = ts.replace(/\bfunction\s+([a-zA-Z_$][\w$]*)\s*\(([^)]*)\)/g, (m, name, params) => {
    stats.functions++;
    const typedParams = params.split(',').map(p => {
      p = p.trim();
      if (!p) return '';
      // param with default value
      const dm = p.match(/^([a-zA-Z_$][\w$]*)\s*=\s*(.+)$/);
      if (dm) {
        const [, pn, dv] = dm;
        return `${pn}: ${inferType(dv.trim())} = ${dv.trim()}`;
      }
      // plain param
      const pm = p.match(/^(\.{3})?([a-zA-Z_$][\w$]*)$/);
      if (pm) {
        const [, rest, pn] = pm;
        return rest ? `...${pn}: any[]` : `${pn}: any`;
      }
      // param with destructuring
      if (p.startsWith('{') || p.startsWith('[')) return `${p}: any`;
      return p;
    }).filter(Boolean).join(', ');
    return `function ${name}(${typedParams})`;
  });

  // 5. Arrow functions
  ts = ts.replace(/\b(const|let)\s+([a-zA-Z_$][\w$]*)\s*=\s*\(([^)]*)\)\s*=>/g, (m, kw, name, params) => {
    stats.functions++;
    const typedParams = params.split(',').map(p => {
      p = p.trim();
      if (!p) return '';
      const dm = p.match(/^([a-zA-Z_$][\w$]*)\s*=\s*(.+)$/);
      if (dm) {
        const [, pn, dv] = dm;
        return `${pn}: ${inferType(dv.trim())} = ${dv.trim()}`;
      }
      const pm = p.match(/^(\.{3})?([a-zA-Z_$][\w$]*)$/);
      if (pm) {
        const [, rest, pn] = pm;
        return rest ? `...${pn}: any[]` : `${pn}: any`;
      }
      if (p.startsWith('{') || p.startsWith('[')) return `${p}: any`;
      return p;
    }).filter(Boolean).join(', ');
    return `${kw} ${name} = (${typedParams}) =>`;
  });

  // 6. Class properties
  ts = ts.replace(/\bclass\s+([a-zA-Z_$][\w$]*)/g, (m, name) => {
    stats.functions++;
    return `class ${name}`;
  });

  // Prepend interfaces
  if (interfaces.size > 0) {
    const ifaceStr = [...interfaces.values()].join('\n\n') + '\n\n';
    ts = ifaceStr + ts;
  }

  // Add strict mode banner
  if (opts.strict) {
    ts = '// Generated with strict mode enabled\n' + ts;
  }

  stats.types = stats.interfaces;
  return { code: ts, stats };
}

function inferType(val) {
  val = val.trim();
  if (/^['"`].*['"\`]$/.test(val)) return 'string';
  if (val === 'true' || val === 'false') return 'boolean';
  if (/^-?\d+\.?\d*$/.test(val)) return 'number';
  if (/^\[/.test(val)) {
    const inner = val.slice(1, -1).split(',').map(s => s.trim()).filter(Boolean);
    if (inner.every(i => /^['"`].*['"\`]$/.test(i))) return 'string[]';
    if (inner.every(i => /^(true|false)$/.test(i))) return 'boolean[]';
    if (inner.every(i => /^-?\d+\.?\d*$/.test(i))) return 'number[]';
    return 'any[]';
  }
  if (/^\{/.test(val)) return 'Record<string, any>';
  if (/^new\s+Date/.test(val)) return 'Date';
  if (/^null$/.test(val)) return 'null';
  return 'any';
}

function doConvert() {
  const inp = $('#input').value.trim();
  if (!inp) { $('#output').textContent = ''; $('#status').innerHTML = ''; return; }
  try {
    const { code, stats } = convertJSToTS(inp);
    $('#output').textContent = code;
    const badges = [
      stats.functions ? `<span class="stat-badge">⚙️ ${stats.functions} functions</span>` : '',
      stats.vars ? `<span class="stat-badge">📦 ${stats.vars} typed vars</span>` : '',
      stats.interfaces ? `<span class="stat-badge">🏛️ ${stats.interfaces} interfaces</span>` : '',
    ].join('');
    $('#status').innerHTML = `<span style="color:var(--gz-success)">✓ Converted</span> ${badges}`;
  } catch(e) {
    $('#output').textContent = '';
    $('#status').innerHTML = `<span style="color:var(--gz-accent)">Error: ${e.message}</span>`;
  }
}

`;
