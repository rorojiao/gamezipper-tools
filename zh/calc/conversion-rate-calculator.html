<script>
GZI18n.register({
  en: {
    toolTitle: 'Conversion Rate Calculator',
    toolDesc: 'Calculate conversion rate from visitors and conversions, CTR from impressions and clicks, and cost per conversion. Benchmark your marketing performance — free and browser-only.',
    calculate: 'Calculate', reset: 'Reset',
    lblVisitors: 'Total Visitors / Sessions', lblConversions: 'Conversions (goals completed)',
    lblSpend: 'Ad Spend (optional — for cost/conversion)', lblCtrImpr: 'Ad Impressions (optional — for CTR)',
    lblClicks: 'Clicks (optional — for CTR)', lblCurrency: 'Currency Symbol',
    conversionRate: 'Conversion Rate', ctr: 'Click-Through Rate (CTR)',
    costPerConversion: 'Cost Per Conversion (CPA)', revenueNeeded: 'Revenue Needed (at target CR)',
    benchNote: '💡 Industry averages: e-commerce 1.5-3%, SaaS 3-7%, lead gen 5-15%. Anything above 5% is above average.',
    ctrNote: '💡 Average display ad CTR is 0.35%, search ads 3-5%, email links 2-5%.',
    step1: 'Enter your total visitors and number of conversions',
    step2: 'Optionally enter ad spend to calculate cost per conversion',
    step3: 'Optionally enter impressions and clicks for CTR',
    step4: 'See conversion rate, CTR and cost per conversion instantly',
  },
  zh: {
    toolTitle: '转化率计算器',
    toolDesc: '根据访客数和转化数计算转化率，根据展示和点击计算点击率（CTR），并计算每次转化成本。免费且浏览器本地运行的营销基准工具。',
    calculate: '计算', reset: '重置',
    lblVisitors: '总访客数 / 会话数', lblConversions: '转化数（完成目标的次数）',
    lblSpend: '广告花费（可选 — 用于计算转化成本）', lblCtrImpr: '广告展示量（可选 — 用于 CTR）',
    lblClicks: '点击量（可选 — 用于 CTR）', lblCurrency: '货币符号',
    conversionRate: '转化率', ctr: '点击率（CTR）',
    costPerConversion: '每次转化成本（CPA）', revenueNeeded: '目标转化率下所需收入',
    benchNote: '💡 行业平均：电商 1.5-3%、SaaS 3-7%、获客 5-15%。高于 5% 即为优秀。',
    ctrNote: '💡 展示广告平均 CTR 约 0.35%，搜索广告 3-5%，邮件链接 2-5%。',
    step1: '输入总访客数和转化数',
    step2: '可选输入广告花费以计算每次转化成本',
    step3: '可选输入展示量和点击量以计算 CTR',
    step4: '即时查看转化率、CTR 和每次转化成本',
  }
});

const { $, t } = GZ;

function num(id){ return parseFloat($(id).value) || 0; }

function calculate(){
  const visitors = num('visitors');
  const conversions = num('conversions');
  const spend = num('spend');
  const impressions = num('impressions');
  const clicks = num('clicks');
  const cur = $('#currency').value;

  const cr = visitors > 0 ? (conversions / visitors) * 100 : 0;
  const cpa = conversions > 0 ? spend / conversions : 0;
  const ctr = impressions > 0 ? (clicks / impressions) * 100 : 0;
  const fmt = n => cur + (Math.round(n * 100) / 100).toFixed(2);

  let ctrSection = '';
  if(impressions > 0){
    ctrSection = `
      <div class="cr-result-row"><span>${t('ctr')} (${clicks}/${impressions})</span><span class="val">${ctr.toFixed(2)}%</span></div>
      <div class="cr-bench">${t('ctrNote')}</div>`;
  }

  let cpaSection = '';
  if(spend > 0){
    cpaSection = `<div class="cr-result-row"><span>${t('costPerConversion')} (${fmt(spend)} / ${conversions})</span><span class="val">${fmt(cpa)}</span></div>`;
  }

  $('#output').innerHTML = `
    <div class="cr-results">
      <h3>${t('conversionRate')}</h3>
      <div class="cr-big">
        <div class="num">${cr.toFixed(2)}%</div>
        <div class="lbl">${t('conversionRate')} (${conversions} / ${visitors})</div>
      </div>
      ${cpaSection}
      ${ctrSection}
      <div class="cr-bench">${t('benchNote')}</div>
    </div>`;
}

function reset(){
  $('#visitors').value = '20000';
  $('#conversions').value = '500';
  $('#spend').value = '0';
  $('#impressions').value = '0';
  $('#clicks').value = '0';
  $('#currency').value = '$';
  calculate();
}

['visitors','conversions','spend','impressions','clicks','currency'].forEach(id => {
  $('#'+id).addEventListener('input', calculate);
  $('#'+id).addEventListener('change', calculate);
});

$('#toolbar').innerHTML = `<button class="gz-btn" onclick="calculate()">${t('calculate')}</button><button class="gz-btn gz-btn-secondary" onclick="reset()">${t('reset')}</button>`;

calculate();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📊', href:'/calc/ab-test-calculator.html', name:'A/B Test Calculator'},
    {icon:'📺', href:'/calc/youtube-cpm-calculator.html', name:'YouTube CPM Calculator'},
    {icon:'💵', href:'/calc/roi-calculator.html', name:'ROI Calculator'},
    {icon:'🧪', href:'/seo/serp-preview.html', name:'SERP Preview'},
  ]
});
</script>
