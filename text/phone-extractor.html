<script>
GZI18n.register({
  en: {
    toolTitle: 'Phone Number Extractor',
    toolDesc: 'Extract phone numbers from any text — documents, emails, web pages and more. Detects US and international formats, removes duplicates and sorts results. Free and browser-only.',
    extract: 'Extract',
    copy: 'Copy',
    download: 'Download TXT',
    clear: 'Clear',

    lblIn: 'Paste text below',
    lblMode: 'Detection',
    lblDedupe: 'Remove duplicates',
    lblSort: 'Sort results',
    lblHl: 'Highlight in text',
    statLine: '✓ Found %1 phone number(s)',
    noResults: 'No phone numbers found. Try Loose mode.',
    step1: 'Paste or type text that contains phone numbers',
    step2: 'Choose detection mode and options',
    step3: 'Click Extract to pull every phone number',
    step4: 'Copy results, download as TXT or view highlighted source',
  },
  zh: {
    toolTitle: '电话号码提取器',
    toolDesc: '从任意文本中提取电话号码 — 文档、邮件、网页等。检测美国和国际格式，去重并排序。免费纯浏览器运行。',
    extract: '提取',
    copy: '复制',
    download: '下载 TXT',
    clear: '清除',
    example: '示例',
    lblIn: '在下方粘贴文本',
    lblMode: '检测模式',
    lblDedupe: '去除重复',
    lblSort: '排序结果',
    lblHl: '在原文中高亮',
    statLine: '✓ 找到 %1 个电话号码',
    noResults: '未找到电话号码，请尝试「宽松」模式。',
    step1: '粘贴或输入包含电话号码的文本',
    step2: '选择检测模式和选项',
    step3: '点击「提取」提取所有电话号码',
    step4: '复制结果、下载为 TXT 或查看原文高亮',
  }
});

const { $, copyText, t } = GZ;
let lastNumbers = [];

const PATTERNS = {
  // US/NANP: (555) 123-4567, 555-123-4567, 555.123.4567, +1 555 123 4567
  us: /(\+?1[\s.-]?)?\(?\d{3}\)?[\s.-]?\d{3}[\s.-]?\d{4}/g,
  // International with explicit +
  intl: /\+\d{1,3}[\s.-]?\(?\d{1,4}\)?[\s.-]?\d{1,4}[\s.-]?\d{1,9}/g,
  // Loose: any run of 7-15 digits possibly separated by separators
  loose: /(?:\+?\d[\d\s().-]{5,}\d)/g
};

function normalize(num){ return num.replace(/[^\d+]/g,''); }

function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function doExtract(){
  const text = $('#input').value;
  if(!text){ $('#output').textContent=''; $('#stats').textContent=''; lastNumbers=[]; return; }
  const mode = $('#mode').value;
  let re;
  if(mode==='auto'){
    // combine intl + us
    re = new RegExp(PATTERNS.intl.source + '|' + PATTERNS.us.source, 'g');
  } else {
    re = PATTERNS[mode];
  }
  const matches = text.match(re) || [];
  // Filter loose noise: require at least 7 digits
  let nums = matches.map(m=>m.trim()).filter(m => normalize(m).replace('+','').length >= 7);
  // normalize for dedupe
  let pairs = nums.map(n => ({ raw:n, norm:normalize(n) }));
  if($('#dedupe').checked){
    const seen = new Set();
    pairs = pairs.filter(p => { const k=p.norm.toLowerCase(); if(seen.has(k)) return false; seen.add(k); return true; });
  }
  if($('#sort').checked){
    pairs.sort((a,b)=> a.norm.localeCompare(b.norm));
  }
  lastNumbers = pairs.map(p=>p.raw);

  if(!lastNumbers.length){
    $('#output').innerHTML = '<span style="color:var(--text2)">'+t('noResults')+'</span>';
    $('#stats').textContent='';
    return;
  }

  if($('#highlight').checked){
    // rebuild highlighted text using found raw strings
    const normSet = new Set(pairs.map(p=>p.norm));
    // re-scan text and wrap matches whose normalized form is in the set
    let hl='', li=0;
    const gre = new RegExp(re.source, 'g');
    let m;
    while((m = gre.exec(text)) !== null){
      hl += esc(text.substring(li, m.index));
      const norm = normalize(m[0]);
      if(normSet.has(norm)){
        hl += '<span class="hl">'+esc(m[0])+'</span>';
      } else {
        hl += esc(m[0]);
      }
      li = m.index + m[0].length;
    }
    hl += esc(text.substring(li));
    $('#output').innerHTML = hl;
  } else {
    $('#output').textContent = lastNumbers.join('\n');
  }
  $('#stats').innerHTML = '<span style="color:var(--gz-success)">'+t('statLine').replace('%1',lastNumbers.length)+'</span>';
}

function loadExample(){
  $('#input').value = 'Contact us:\nSales: (555) 123-4567\nSupport: 800-987-6543\nInternational: +44 20 7946 0958\nFax: +1-415-555-0199\nOffice line 212.555.1234 ext 22\nEmail: hello@example.com (not a phone)';
  doExtract();
}

function doDownload(){
  if(!lastNumbers.length){ doExtract(); if(!lastNumbers.length) return; }
  const blob = new Blob([lastNumbers.join('\n')], {type:'text/plain;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href=url; a.download='phone-numbers.txt';
  document.body.appendChild(a); a.click();
  setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(url);},100);
}

function doClear(){ $('#input').value=''; $('#output').textContent=''; $('#stats').textContent=''; lastNumbers=[]; }

$('#lbl-in').textContent = t('lblIn');
$('#lbl-mode').textContent = t('lblMode');
$('#lbl-dedupe').textContent = t('lblDedupe');
$('#lbl-sort').textContent = t('lblSort');
$('#lbl-hl').textContent = t('lblHl');
['mode','dedupe','sort','highlight'].forEach(id=>$('#'+id).addEventListener('change', doExtract));
$('#input').addEventListener('input', doExtract);

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="doExtract()">${t('extract')}</button>
  <button class="gz-btn" onclick="doDownload()">⬇ ${t('download')}</button>
  <button class="gz-btn" onclick="copyText(lastNumbers.join('\\n'))">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [

    {icon:'🔗', href:'/dev/url-extractor.html', name:'URL Extractor'},
    {icon:'📞', href:'/text/phone-formatter.html', name:'Phone Formatter'},
    {icon:'🧹', href:'/text/remove-duplicates.html', name:'Remove Duplicates'},
  ]
});
</script>
