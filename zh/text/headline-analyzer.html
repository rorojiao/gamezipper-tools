    pvDesc: '元描述预览 — 撰写 150 字内的吸引描述以配合标题。',
    step1: '在输入框中输入或粘贴标题',
    step2: '查看右侧的分数、等级和分项分析',

    step4: '应用建议以提高点击率',
  }
});

const { $, t } = GZ;

const POWER = new Set([
  'free','new','proven','guaranteed','instantly','easy','best','ultimate','essential','complete',
  'definitive','exclusive','secret','powerful','amazing','incredible','effortless','simple',
  'quick','fast','rapid','top','greatest','must','need','never','always',
  'everyone','anybody','nothing','everything','revealed','unlock','discover','master',
  'launch','boost','skyrocket','explode','transform','change','improve','increase','maximize',
  'minimize','win','victory','success','profitable','rich','wealthy','moneymaking',
  'limited','rare','uncommon','extraordinary','remarkable','shocking','surprising',
  'truth','lies','mistakes','reasons','ways','tips','tricks','hacks','strategies','methods',
  'how to','why','what','when','where','who','which','today','now','2026','2025'
]);

const EMOTIONS = {
  joy: ['happy','joy','love','awesome','amazing','wonderful','brilliant','fantastic','great','excellent','thrilled','excited','delight'],
  fear: ['afraid','fear','danger','risky','warning','beware','avoid','mistake','wrong','crisis','urgent','emergency','panic','threat'],
  anger: ['hate','angry','furious','outrage','disgust','annoying','terrible','awful','horrible','worst','rage','livid'],
  sad: ['sad','cry','loss','grief','sorrow','heartbreak','pain','hurt','miss','lonely','depressed'],
  surprise: ['shocking','surprising','unbelievable','wow','incredible','mind-blowing','unbelievable','jaw-dropping','stunning','astonishing'],
  curiosity: ['secret','hidden','revealed','mystery','discover','unknown','behind','truth','little-known','rare','what','why','how'],
};

const COMMON = new Set([
  'a','an','the','and','or','but','if','then','of','in','on','at','to','for','with','by','is','are','was','were','be','been','being','have','has','had','do','does','did','will','would','should','could','can','may','might','must','shall','that','this','these','those','it','its','they','them','their','there','here','what','when','where','why','how','who','which','i','you','he','she','we','my','your','our','their'
]);

function hasNumber(s) { return /\d/.test(s); }

function escapeHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function analyze() {
  const raw = $('#headline').value.trim();
  const h = raw.toLowerCase();
  if (!raw) {
    $('#score').textContent = '0';
    $('#grade').textContent = '—';
    $('#grade').className = 'ha-grade';
    $('#meter-arc').setAttribute('stroke-dashoffset', 389.5);
    $('#meter-arc').setAttribute('stroke', 'var(--accent)');
    $('#sugs').innerHTML = '';
    $('#word-cloud').innerHTML = '';
    $('#v-char').textContent = '0'; $('#v-char').className = 'val';
    $('#v-word').textContent = '0'; $('#v-word').className = 'val';
    $('#v-power').textContent = '0'; $('#v-word').className = 'val';
    $('#v-emo').textContent = '0'; $('#v-emo').className = 'val';
    $('#v-num').textContent = '0'; $('#v-num').className = 'val';
    $('#v-uncommon').textContent = '0'; $('#v-uncommon').className = 'val';
    return;
  }
  const chars = raw.length;
  const words = h.match(/[a-zA-Z\u4e00-\u9fa5]+/g) || [];
  const wordCount = words.length;
  const tokens = h.split(/\s+/);
  const tokenSet = new Set(tokens);
  
  // Power words count
  let powerCount = 0;
  POWER.forEach(p => { if (tokenSet.has(p) || h.includes(' '+p+' ')) powerCount++; });
  
  // Emotional words
  let emoCount = 0;
  const emoTypes = new Set();
  for (const [cat, wordsArr] of Object.entries(EMOTIONS)) {
    wordsArr.forEach(w => { 
      const re = new RegExp('\\b'+w+'\\b', 'i');
      if (re.test(h)) { emoCount++; emoTypes.add(cat); }
    });
  }
  
  // Numbers
  const hasNum = hasNumber(raw);
  
  // Uncommon words (not in common stop words)
  const uncommonCount = words.filter(w => !COMMON.has(w) && w.length > 3).length;
  
  // Score each factor (0-100)
  const charScore = chars >= 30 && chars <= 60 ? 100 : chars >= 20 && chars <= 70 ? 75 : chars < 20 ? 50 : chars <= 80 ? 50 : 25;
  const wordScore = wordCount >= 6 && wordCount <= 12 ? 100 : wordCount >= 4 && wordCount <= 15 ? 75 : 50;
  const powerScore = Math.min(100, powerCount * 25);
  const emoScore = Math.min(100, emoCount * 15);
  const numScore = hasNum ? 100 : 0;
  const uncommonScore = wordCount > 0 ? Math.min(100, (uncommonCount / wordCount) * 200) : 0;
  
  // Weighted overall
  const overall = Math.round(
    charScore * 0.22 +
    wordScore * 0.18 +
    powerScore * 0.20 +
    emoScore * 0.15 +
    numScore * 0.10 +
    uncommonScore * 0.15
  );
  
  // Grade
  let grade = 'D', gradeKey = 'gradeD';
  if (overall >= 90) { grade = 'S'; gradeKey = 'gradeS'; }
  else if (overall >= 80) { grade = 'A'; gradeKey = 'gradeA'; }
  else if (overall >= 65) { grade = 'B'; gradeKey = 'gradeB'; }
  else if (overall >= 50) { grade = 'C'; gradeKey = 'gradeC'; }
  
  // Render
  $('#score').textContent = overall;
  $('#grade').textContent = t(gradeKey);
  $('#grade').className = 'ha-grade ' + grade.toLowerCase();
  const offset = 389.5 - (389.5 * overall / 100);
  $('#meter-arc').setAttribute('stroke-dashoffset', offset);
  const meterColor = overall >= 80 ? '#10b981' : overall >= 65 ? '#06b6d4' : overall >= 50 ? '#3b82f6' : overall >= 35 ? '#f59e0b' : '#ef4444';
  $('#meter-arc').setAttribute('stroke', meterColor);
  
  const vChar = `${chars}`;
  const vWord = `${wordCount}`;
  const vPower = `${powerCount}`;
  const vEmo = `${emoCount}`;
  const vNum = hasNum ? '✓' : '—';
  const vUnc = `${uncommonCount}`;
  
  $('#v-char').textContent = vChar;
  $('#v-char').className = 'val ' + (charScore >= 80 ? 'good' : charScore >= 50 ? 'warn' : 'bad');
  $('#v-word').textContent = vWord;
  $('#v-word').className = 'val ' + (wordScore >= 80 ? 'good' : wordScore >= 50 ? 'warn' : 'bad');
  $('#v-power').textContent = vPower;
  $('#v-power').className = 'val ' + (powerScore >= 60 ? 'good' : powerScore >= 30 ? 'warn' : 'bad');
  $('#v-emo').textContent = vEmo;
  $('#v-emo').className = 'val ' + (emoScore >= 60 ? 'good' : emoScore >= 30 ? 'warn' : 'bad');
  $('#v-num').textContent = vNum;
  $('#v-num').className = 'val ' + (numScore >= 80 ? 'good' : 'warn');
  $('#v-uncommon').textContent = vUnc;
  $('#v-uncommon').className = 'val ' + (uncommonScore >= 60 ? 'good' : uncommonScore >= 30 ? 'warn' : 'bad');
  
  $('#bar-char').style.width = charScore + '%';
  $('#bar-word').style.width = wordScore + '%';
  $('#bar-power').style.width = powerScore + '%';
  $('#bar-emo').style.width = emoScore + '%';
  $('#bar-num').style.width = numScore + '%';
  $('#bar-uncommon').style.width = uncommonScore + '%';
  
  // SERP preview
  $('#pv-title').textContent = raw || 'Your headline appears here';
  
  // Word cloud with classification
  const wordClass = new Set();
  POWER.forEach(p => wordClass.add(p));
  Object.values(EMOTIONS).flat().forEach(w => wordClass.add(w));
  const cloudHtml = words.slice(0, 25).map(w => {
    if (POWER.has(w)) return `<span class="ha-word power">${w}</span>`;
    if (Object.values(EMOTIONS).flat().some(e => e === w)) return `<span class="ha-word emo">${w}</span>`;
    if (COMMON.has(w)) return `<span class="ha-word common">${w}</span>`;
    return `<span class="ha-word">${w}</span>`;
  }).join('');
  $('#word-cloud').innerHTML = cloudHtml || '<span style="opacity:.5;font-size:.85em">—</span>';
  
  // Suggestions
  const sugs = [];
  if (chars < 30) sugs.push({l:'warn', m: 'Add more words. Headlines under 30 characters often lack detail and get less engagement.'});
  else if (chars > 60) sugs.push({l:'warn', m: 'Title will be truncated on Google (limit: ~60 characters). Consider a shorter version.'});
  if (wordCount < 4) sugs.push({l:'warn', m: 'Too few words. Aim for 6-12 words to balance SEO and readability.'});
  else if (wordCount > 14) sugs.push({l:'warn', m: 'Headline is too long. Try to keep it under 14 words for best impact.'});
  if (powerCount === 0) sugs.push({l:'warn', m: 'No power words detected. Try adding words like "Ultimate", "Proven", "Free", "Essential", or "Instantly".'});
  if (emoCount === 0) sugs.push({l:'warn', m: 'Add an emotional hook — words that trigger curiosity, surprise, or urgency work best.'});
  if (!hasNum) sugs.push({l:'warn', m: 'Numbers increase CTR. Try "7 Ways" or "2026 Guide".'});
  if (sugs.length === 0) sugs.push({l:'good', m: '✓ Strong headline! Good length, power words, and emotional pull.'});
  
  $('#sugs').innerHTML = sugs.map(s => `<div class="ha-sug ${s.l}">${s.m}</div>`).join('');
}

$('#headline').addEventListener('input', analyze);

function loadExample() { $('#headline').value = '7 Proven Ways to Boost Your Productivity in 2026'; analyze(); }
function doClear() { $('#headline').value = ''; analyze(); }

$('#btn-example').addEventListener('click', loadExample);
