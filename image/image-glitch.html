<script>
GZI18n.register({
  en: {
    toolTitle: 'Image Glitch Effect Generator',
    toolDesc: 'Apply cyberpunk-style glitch effects to any image. RGB shift, scanlines, pixelation and noise — all in your browser.',
    upload: '📷 Drop image here or click to upload',
    rgbOffset: 'RGB Channel Offset',
    scanlines: 'Scanline Intensity',
    pixelate: 'Pixelation',
    noise: 'Noise Intensity',
    chromatic: 'Chromatic aberration',
    blocks: 'Glitch blocks',
    download: 'Download Glitched Image',
    randomize: '🎲 Randomize',
    step1: 'Upload an image by dragging or clicking',
    step2: 'Adjust the glitch effect sliders',
    step3: 'Toggle chromatic aberration and glitch blocks',
    step4: 'Click Download to save the glitched image',
  },
  zh: {
    toolTitle: '图片故障效果生成器',
    toolDesc: '为图片添加赛博朋克风故障效果。RGB 偏移、扫描线、像素化和噪点，全部在浏览器本地处理。',
    upload: '📷 拖拽图片到此处或点击上传',
    rgbOffset: 'RGB 通道偏移',
    scanlines: '扫描线强度',
    pixelate: '像素化',
    noise: '噪点强度',
    chromatic: '色差效果',
    blocks: '故障块',
    download: '下载故障效果图片',
    randomize: '🎲 随机化',
    step1: '拖拽或点击上传图片',
    step2: '调节故障效果参数滑块',
    step3: '开关色差效果和故障块',
    step4: '点击下载保存故障效果图片',
  }
});

const { $, copyText, t } = GZ;
let img = null;
const canvas = $('#canvas');
const gCanvas = $('#glitchCanvas');
const ctx = canvas.getContext('2d');
const gCtx = gCanvas.getContext('2d');

$('#lbl-rgb').textContent = t('rgbOffset');
$('#lbl-scan').textContent = t('scanlines');
$('#lbl-pixel').textContent = t('pixelate');
$('#lbl-noise').textContent = t('noise');
$('#lbl-chromatic').textContent = t('chromatic');
$('#lbl-blocks').textContent = t('blocks');
$('#dropLabel').textContent = t('upload');

const dropZone = $('#dropZone');
const fileInput = $('#fileInput');
dropZone.onclick = () => fileInput.click();
dropZone.ondragover = e => { e.preventDefault(); dropZone.style.borderColor = 'var(--gz-accent)'; };
dropZone.ondragleave = () => { dropZone.style.borderColor = ''; };
dropZone.ondrop = e => { e.preventDefault(); dropZone.style.borderColor = ''; if(e.dataTransfer.files[0]) loadImage(e.dataTransfer.files[0]); };
fileInput.onchange = e => { if(e.target.files[0]) loadImage(e.target.files[0]); };

function loadImage(file) {
  const reader = new FileReader();
  reader.onload = e => {
    img = new Image();
    img.onload = () => {
      const maxW = 800;
      let w = img.width, h = img.height;
      if (w > maxW) { h = Math.round(h * maxW / w); w = maxW; }
      canvas.width = w; canvas.height = h;
      gCanvas.width = w; gCanvas.height = h;
      ctx.drawImage(img, 0, 0, w, h);
      dropZone.classList.add('has-image');
      dropZone.innerHTML = `<img src="${e.target.result}" alt="uploaded">`;
      applyGlitch();
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function applyGlitch() {
  if (!img) return;
  const w = canvas.width, h = canvas.height;
  const rgb = +$('#rgbOffset').value;
  const scan = +$('#scanlines').value;
  const pix = +$('#pixelate').value;
  const noiseVal = +$('#noise').value;
  const chromatic = $('#chromatic').checked;
  const doBlocks = $('#blocks').checked;

  // Draw original
  gCtx.drawImage(img, 0, 0, w, h);

  // Pixelation
  if (pix > 1) {
    const tempCanvas = document.createElement('canvas');
    const tw = Math.max(1, Math.floor(w / pix));
    const th = Math.max(1, Math.floor(h / pix));
    tempCanvas.width = tw; tempCanvas.height = th;
    const tCtx = tempCanvas.getContext('2d');
    tCtx.drawImage(gCanvas, 0, 0, tw, th);
    gCtx.imageSmoothingEnabled = false;
    gCtx.drawImage(tempCanvas, 0, 0, tw, th, 0, 0, w, h);
    gCtx.imageSmoothingEnabled = true;
  }

  // RGB offset / Chromatic aberration
  if (chromatic && rgb > 0) {
    const imageData = gCtx.getImageData(0, 0, w, h);
    const data = imageData.data;
    const orig = new Uint8ClampedArray(data);
    for (let y = 0; y < h; y++) {
      for (let x = 0; x < w; x++) {
        const i = (y * w + x) * 4;
        // Red channel shifted left
        const rx = Math.min(w - 1, x + rgb);
        const ri = (y * w + rx) * 4;
        data[i] = orig[ri]; // R
        // Blue channel shifted right
        const bx = Math.max(0, x - rgb);
        const bi = (y * w + bx) * 4;
        data[i + 2] = orig[bi + 2]; // B
      }
    }
    gCtx.putImageData(imageData, 0, 0);
  }

  // Glitch blocks
  if (doBlocks) {
    const numBlocks = Math.floor(Math.random() * 8) + 3;
    for (let b = 0; b < numBlocks; b++) {
      const bx = Math.random() * w;
      const by = Math.random() * h;
      const bw = Math.random() * 80 + 20;
      const bh = Math.random() * 10 + 2;
      const shift = (Math.random() - 0.5) * rgb * 3;
      try {
        const blockData = gCtx.getImageData(Math.floor(bx), Math.floor(by), Math.min(Math.floor(bw), w), Math.min(Math.floor(bh), h));
        gCtx.putImageData(blockData, Math.floor(bx + shift), Math.floor(by));
      } catch(e) {}
    }
  }

  // Scanlines
  if (scan > 0) {
    gCtx.fillStyle = `rgba(0,0,0,${scan / 100})`;
    for (let y = 0; y < h; y += 2) {
      gCtx.fillRect(0, y, w, 1);
    }
  }

  // Noise
  if (noiseVal > 0) {
    const imageData = gCtx.getImageData(0, 0, w, h);
    const data = imageData.data;
    for (let i = 0; i < data.length; i += 4) {
      if (Math.random() < noiseVal / 200) {
        const n = Math.random() * 255;
        data[i] = n;
        data[i + 1] = n;
        data[i + 2] = n;
      }
    }
    gCtx.putImageData(imageData, 0, 0);
  }
}

['rgbOffset','scanlines','pixelate','noise','chromatic','blocks'].forEach(id => {
  const el = document.getElementById(id);
  if (el) el.addEventListener('input', applyGlitch);
  if (el) el.addEventListener('change', applyGlitch);
});

function download() {
  if (!img) return;
  const a = document.createElement('a');
  a.href = gCanvas.toDataURL('image/png');
  a.download = 'glitched-image.png';
  a.click();
}

function randomize() {
  $('#rgbOffset').value = Math.floor(Math.random() * 40) + 5;
  $('#scanlines').value = Math.floor(Math.random() * 20);
  $('#pixelate').value = Math.floor(Math.random() * 8) + 1;
  $('#noise').value = Math.floor(Math.random() * 60);
  applyGlitch();
}

$('#btnRow').innerHTML = `
  <button class="gz-btn" onclick="download()">${t('download')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="randomize()">${t('randomize')}</button>`;

GZ.renderToolPage({
  category: 'image',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🎨', href:'/image/filters.html', name:'Image Filters'},
    {icon:'🖼️', href:'/image/pixelate.html', name:'Pixelate Image'},
    {icon:'📐', href:'/image/cropper.html', name:'Image Cropper'},
    {icon:'✨', href:'/css-tools/glitch.html', name:'CSS Glitch'},
  ]
});
</script>
