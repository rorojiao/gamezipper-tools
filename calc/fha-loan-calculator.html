<script type="application/ld+json">{"@context":"https://schema.org","@type":"WebApplication","name":"FHA Loan Calculator","description":"Free FHA loan calculator. Estimate your FHA mortgage payment including upfront MIP (1.75%) and annual MIP. Supports 3.5% down, 15 and 30-year terms. Instant, private, no signup.","url":"https://tools.gamezipper.com/calc/fha-loan-calculator.html","applicationCategory":"Utility","operatingSystem":"Web Browser","offers":{"@type":"Offer","price":"0"}}</script>
<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"What is the minimum down payment for an FHA loan?","acceptedAnswer":{"@type":"Answer","text":"FHA loans require a minimum down payment of 3.5% of the purchase price as long as your credit score is 580 or higher. If your score is between 500 and 579, you need at least 10% down. The calculator applies the standard 3.5% minimum by default but you can enter any down payment."}},{"@type":"Question","name":"What is FHA MIP (Mortgage Insurance Premium)?","acceptedAnswer":{"@type":"Answer","text":"FHA loans require two mortgage insurance premiums: an upfront MIP of 1.75% of the loan amount (typically rolled into the loan) and an annual MIP paid monthly. For 30-year loans with less than 5% down, the annual MIP is 0.55% of the loan balance and lasts the life of the loan."}},{"@type":"Question","name":"How is my FHA monthly payment calculated?","acceptedAnswer":{"@type":"Answer","text":"Your monthly payment = principal + interest + annual MIP (monthly) + property taxes + home insurance. This is your full PITI plus MIP. The calculator shows each component so you can see exactly where your money goes."}},{"@type":"Question","name":"Can I cancel FHA MIP?","acceptedAnswer":{"@type":"Answer","text":"For FHA loans with less than 10% down payment (most borrowers), the annual MIP lasts for the entire life of the loan. If you put 10% or more down, MIP cancels after 11 years. To remove MIP sooner, most homeowners refinance into a conventional loan."}}]}</script>

<body>
<div class="gz-container">

  <div class="gz-tool-area">

</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'FHA Loan Calculator',
    toolDesc: 'Estimate your FHA mortgage payment with upfront MIP (1.75%), annual MIP, taxes and insurance. Supports 3.5% down — instant and private.',
    homePrice: 'Home price',
    downPayment: 'Down payment',
    rate: 'Interest rate (%)',
    term: 'Loan term',
    upfrontMIP: 'Upfront MIP (%)',
    annualMIP: 'Annual MIP (%)',
    propertyTax: 'Property tax rate (% / year)',
    insurance: 'Home insurance rate (% / year)',
    step1: 'Enter the home price and your down payment (min 3.5% for FHA)',
    step2: 'Set the FHA interest rate and loan term',
    step3: 'Adjust MIP, taxes and insurance if needed',
    step4: 'Read your monthly payment broken down by component',
    monthly: 'Total monthly payment',
    baseLoan: 'Base loan amount',
    upfront: 'Upfront MIP added',
    totalLoan: 'Total loan amount',
    principal: 'Principal & interest',
    mipMonthly: 'Annual MIP / mo',
    tax: 'Property tax / mo',
    ins: 'Home insurance / mo',
    cashClose: 'Cash to close (down + upfront MIP)',
    downPct: 'Down payment %',
    yrs30: '30 years',
    yrs15: '15 years',
    yrs20: '20 years',
  },
  zh: {
    toolTitle: 'FHA 贷款计算器',
    toolDesc: '估算 FHA 房贷月供，含 1.75% 前期 MIP、年度 MIP、税费和保险。支持 3.5% 首付 — 即时私密。',
    homePrice: '房价',
    downPayment: '首付金额',
    rate: '利率 (%)',
    term: '贷款期限',
    upfrontMIP: '前期 MIP (%)',
    annualMIP: '年度 MIP (%)',
    propertyTax: '房产税率 (% / 年)',
    insurance: '房屋保险费率 (% / 年)',
    step1: '输入房价和首付（FHA 最低 3.5%）',
    step2: '设置 FHA 利率和贷款期限',
    step3: '按需调整 MIP、税费和保险',
    step4: '查看按组成部分划分的月供',
    monthly: '月供总额',
    baseLoan: '基础贷款额',
    upfront: '已加前期 MIP',
    totalLoan: '贷款总额',
    principal: '本金 + 利息',
    mipMonthly: '年度 MIP / 月',
    tax: '月房产税',
    ins: '月房屋保险',
    cashClose: '成交现金（首付 + 前期 MIP）',
    downPct: '首付比例',
    yrs30: '30 年',
    yrs15: '15 年',
    yrs20: '20 年',
  }
});

const { $, t } = GZ;
const money = n => '$' + Math.round(n).toLocaleString();

$('#inputs').innerHTML = `
  <div class="field"><label>${t('homePrice')}</label><input type="number" id="price" value="350000" min="0" step="5000"></div>
  <div class="field"><label>${t('downPayment')}</label><input type="number" id="down" value="12250" min="0" step="500"><div class="hint" id="downhint"></div></div>
  <div class="field"><label>${t('rate')}</label><input type="number" id="rate" value="6.5" min="0" step="0.05"></div>
  <div class="field"><label>${t('term')}</label><select id="term"><option value="30">${t('yrs30')}</option><option value="15">${t('yrs15')}</option><option value="20">${t('yrs20')}</option></select></div>
  <div class="field"><label>${t('upfrontMIP')}</label><input type="number" id="ufmip" value="1.75" min="0" step="0.05"></div>
  <div class="field"><label>${t('annualMIP')}</label><input type="number" id="amip" value="0.55" min="0" step="0.01"></div>
  <div class="field"><label>${t('propertyTax')}</label><input type="number" id="tax" value="1.1" min="0" step="0.05"></div>
  <div class="field"><label>${t('insurance')}</label><input type="number" id="ins" value="0.35" min="0" step="0.05"></div>
`;
document.querySelectorAll('#inputs input,#inputs select').forEach(i => i.addEventListener('input', recalc));

function pmt(P, annualRate, months) {
  if (annualRate === 0) return P / months;
  const r = annualRate / 12;
  return P * r * Math.pow(1 + r, months) / (Math.pow(1 + r, months) - 1);
}

function recalc() {
  const price = +$('#price').value || 0;
  let down = +$('#down').value || 0;
  if (down < price * 0.035) down = price * 0.035;
  const rate = (+$('#rate').value || 0) / 100;
  const term = +$('#term').value || 30;
  const uf = (+$('#ufmip').value || 0) / 100;
  const am = (+$('#amip').value || 0) / 100;
  const taxR = (+$('#tax').value || 0) / 100;
  const insR = (+$('#ins').value || 0) / 100;
  const months = term * 12;
  const downPct = price > 0 ? down / price * 100 : 0;

  const baseLoan = Math.max(0, price - down);
  const upfrontAmt = baseLoan * uf;
  const totalLoan = baseLoan + upfrontAmt;
  const pi = pmt(totalLoan, rate, months);
  const mipMo = totalLoan * am / 12;
  const taxMo = price * taxR / 12;
  const insMo = price * insR / 12;
  const monthly = pi + mipMo + taxMo + insMo;
  const cashClose = down + upfrontAmt;

  $('#downhint').textContent = downPct.toFixed(2) + '% ' + t('downPct');
  if (+$('#down').value < price * 0.035 && price > 0) $('#down').value = Math.round(down);

  $('#results').innerHTML = `
    <div class="result-big">${money(monthly)}</div>
    <div style="margin:6px 0 12px;font-size:.85em;opacity:.8">${t('monthly')}</div>
    <div class="result-row"><span>${t('principal')}</span><span class="v">${money(pi)}</span></div>
    <div class="result-row"><span>${t('mipMonthly')}</span><span class="v">${money(mipMo)}</span></div>
    <div class="result-row"><span>${t('tax')}</span><span class="v">${money(taxMo)}</span></div>
    <div class="result-row"><span>${t('ins')}</span><span class="v">${money(insMo)}</span></div>
    <div class="result-row total"><span>${t('monthly')}</span><span class="v">${money(monthly)}</span></div>
    <div style="margin-top:14px"></div>
    <div class="result-row"><span>${t('baseLoan')}</span><span class="v">${money(baseLoan)}</span></div>
    <div class="result-row"><span>${t('upfront')}</span><span class="v">${money(upfrontAmt)}</span></div>
    <div class="result-row"><span>${t('totalLoan')}</span><span class="v">${money(totalLoan)}</span></div>
    <div class="result-row"><span>${t('cashClose')}</span><span class="v">${money(cashClose)}</span></div>
  `;
}
recalc();

$('#toolbar').innerHTML = `<button class="gz-btn gz-btn-secondary" onclick="document.querySelectorAll('#inputs input').forEach(i=>i.value='');recalc()">Clear</button>`;

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🏠', href:'/calc/home-affordability-calculator.html', name:'Home Affordability'},
    {icon:'🏦', href:'/calc/mortgage-calculator.html', name:'Mortgage'},
    {icon:'💸', href:'/calc/early-mortgage-payoff.html', name:'Early Payoff'},
    {icon:'🔑', href:'/calc/heloc-calculator.html', name:'HELOC'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
