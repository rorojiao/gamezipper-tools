<script>
GZI18n.register({
  en:{toolTitle:'Audiobook Speed Calculator',toolDesc:'Calculate how long an audiobook, podcast, lecture or course takes at any playback speed. See time saved and a daily listening plan.',hours:'Hours',minutes:'Minutes',seconds:'Seconds',speed:'Playback speed',daily:'Daily listening (min)',calculate:'Calculate',example:'Example',timeAtSpeed:'Time at speed',timeSaved:'Time saved',percentSaved:'Saved',daysToFinish:'Days to finish',speedCol:'Speed',durationCol:'Listening time',savedCol:'Time saved',dailyCol:'Days @ daily goal',step1:'Enter the original audiobook or podcast length in hours, minutes and seconds',step2:'Choose your playback speed such as 1.25x, 1.5x, 2x or a custom value',step3:'Optionally enter how many minutes you listen per day',step4:'Review total listening time, time saved and comparison table'},
  zh:{toolTitle:'有声书倍速计算器',toolDesc:'计算有声书、播客、课程或讲座在任意播放倍速下需要多久。查看节省时间和每日收听计划。',hours:'小时',minutes:'分钟',seconds:'秒',speed:'播放倍速',daily:'每日收听（分钟）',calculate:'计算',example:'示例',timeAtSpeed:'倍速后时长',timeSaved:'节省时间',percentSaved:'节省比例',daysToFinish:'完成天数',speedCol:'倍速',durationCol:'收听时长',savedCol:'节省时间',dailyCol:'按每日目标天数',step1:'输入有声书或播客原始长度（小时、分钟、秒）',step2:'选择 1.25x、1.5x、2x 或自定义播放倍速',step3:'可选输入每天收听多少分钟',step4:'查看总收听时长、节省时间和对比表'}
});
const {$,t}=GZ;
$('#form').innerHTML=`<div><label>${t('hours')}</label><input type="number" id="h" min="0" value="10"></div><div><label>${t('minutes')}</label><input type="number" id="m" min="0" max="59" value="30"></div><div><label>${t('seconds')}</label><input type="number" id="s" min="0" max="59" value="0"></div><div><label>${t('speed')}</label><input type="number" id="speed" min="0.25" max="5" step="0.05" value="1.5"></div><div><label>${t('daily')}</label><input type="number" id="daily" min="1" value="45"></div>`;
function fmt(sec){sec=Math.max(0,Math.round(sec));const h=Math.floor(sec/3600),m=Math.floor(sec%3600/60),s=sec%60;const parts=[];if(h)parts.push(h+'h');if(m||h)parts.push(m+'m');parts.push(s+'s');return parts.join(' ');}
function total(){return Math.max(0,+$('#h').value||0)*3600+Math.max(0,+$('#m').value||0)*60+Math.max(0,+$('#s').value||0);}
function calc(){const base=total(),sp=Math.max(.25,+$('#speed').value||1),daily=Math.max(1,+$('#daily').value||30),listened=base/sp,saved=base-listened,pct=base?Math.round(saved/base*100):0,days=Math.ceil(listened/60/daily);$('#summary').innerHTML=`<div class="ab-card"><strong>${fmt(listened)}</strong>${t('timeAtSpeed')}</div><div class="ab-card"><strong>${fmt(saved)}</strong>${t('timeSaved')}</div><div class="ab-card"><strong>${pct}%</strong>${t('percentSaved')}</div><div class="ab-card"><strong>${days}</strong>${t('daysToFinish')}</div>`;const speeds=[1,1.1,1.25,1.5,1.75,2,2.5,3,sp].filter((v,i,a)=>a.indexOf(v)===i).sort((a,b)=>a-b);$('#table').innerHTML=`<thead><tr><th>${t('speedCol')}</th><th>${t('durationCol')}</th><th>${t('savedCol')}</th><th>${t('dailyCol')}</th></tr></thead><tbody>`+speeds.map(v=>{const dur=base/v;return `<tr class="${Math.abs(v-sp)<.001?'ab-current':''}"><td>${v.toFixed(v%1?2:0)}x</td><td>${fmt(dur)}</td><td>${fmt(base-dur)}</td><td>${Math.ceil(dur/60/daily)}</td></tr>`}).join('')+'</tbody>';}
function ex(){ $('#h').value=14; $('#m').value=22; $('#s').value=0; $('#speed').value=1.75; $('#daily').value=60; calc(); }
$('#toolbar').innerHTML=`<button class="gz-btn" onclick="calc()">${t('calculate')}</button><button class="gz-btn gz-btn-secondary" onclick="ex()">${t('example')}</button>`;
['h','m','s','speed','daily'].forEach(id=>$('#'+id).addEventListener('input',calc));
GZ.renderToolPage({category:'calc',titleKey:'toolTitle',descKey:'toolDesc',howToSteps:['step1','step2','step3','step4'],related:[{icon:'⏱️',href:'/text/reading-time-calculator.html',name:'Reading Time Calculator'},{icon:'⚡',href:'/text/speed-reader.html',name:'Speed Reader'},{icon:'🎤',href:'/text/voice-typing.html',name:'Voice Typing'},{icon:'🍅',href:'/text/pomodoro-timer.html',name:'Pomodoro Timer'}]});
calc();
</script>
