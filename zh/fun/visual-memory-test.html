<style>
.stage{width:100%;min-height:380px;display:flex;align-items:center;justify-content:center;flex-direction:column;border-radius:16px;background:var(--glass2);border:1px solid var(--border);padding:24px;text-align:center}

.tile{width:56px;height:56px;border-radius:8px;background:var(--glass);border:1px solid var(--border);cursor:pointer;transition:background .1s,transform .1s}
.tile.lit{background:var(--accent,#4ecdc4);box-shadow:0 0 12px var(--accent,#4ecdc4);transform:scale(1.05)}
.tile.correct{background:#00d672;box-shadow:0 0 10px #00d672}

.tile.clickable:hover{background:var(--glass2)}

<div class="gz-container">
  <div class="gz-tool-header"><h1 id="title"></h1><p class="desc" id="desc"></p></div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="stage" id="stage"></div>
    <div class="stats" id="stats"></div>

<script>
GZI18n.register({
  en:{toolTitle:'Visual Memory Test',toolDesc:'Tiles light up on a grid.',start:'Click to start',memorize:'Memorize the pattern',yourTurn:'Click the lit tiles',level:'Level',tiles:'Tiles',lives:'Lives',best:'Best',restart:'Restart',correct:'✓ Correct!',wrong:'✗ Wrong tile!',gameOver:'Game Over',tip:'Memorize then click.',step1:'Click to start',step2:'Watch the lit tiles',step3:'Click them back',step4:'3 wrong = game over'},
  zh:{toolTitle:'视觉记忆测试',toolDesc:'网格上的方块会亮起 — 记住亮起的位置，然后点击它们重现图案。每关增加更多方块。平均水平为第 7 关。3 条命。',start:'点击开始',memorize:'记住图案',yourTurn:'点击亮过的方块',level:'关卡',tiles:'方块',lives:'生命',best:'最佳',restart:'重新开始',correct:'✓ 正确！',wrong:'✗ 错误！',gameOver:'游戏结束',tip:'记住亮起的方块，然后点击它们。3 条命。网格随关卡增大。',step1:'点击区域开始。仔细观察网格',step2:'方块逐一亮起 — 记住哪些亮了',step3:'出现提示时，点击所有亮过的方块',step4:'每过一关增加方块。答错 3 次游戏结束'}
});
const { $, t } = GZ;
let level=1,lives=3,best=0,gridSize=3,litCells=[],clickedCells=new Set(),phase='idle',gridEl=null;
function getGridSize(l){if(l<=4)return 3;if(l<=9)return 4;if(l<=16)return 5;return 6;}
function getNumTiles(l){const n=3+l;const cap=Math.floor(getGridSize(l)*getGridSize(l)*0.6);return Math.min(n,cap);}
function buildGrid(){gridSize=getGridSize(level);const total=gridSize*gridSize;const numTiles=getNumTiles(level);litCells=[];while(litCells.length<numTiles){const idx=Math.floor(Math.random()*total);if(!litCells.includes(idx))litCells.push(idx);}clickedCells=new Set();renderGrid(true);}
function renderGrid(interactive){const st=$('#stage');const tw=gridSize<=3?60:gridSize<=4?52:gridSize<=5?44:38;st.innerHTML=`<span class="lvl-badge">${t('level')} ${level}</span><div class="status" id="gridStatus">${interactive?t('yourTurn'):t('memorize')}</div><div class="grid" id="vGrid" style="grid-template-columns:repeat(${gridSize},${tw}px)"></div>`;gridEl=$('#vGrid');for(let i=0;i<gridSize*gridSize;i++){const tile=document.createElement('div');tile.className='tile'+(interactive?' clickable':' disabled');tile.dataset.idx=i;if(interactive)tile.onclick=()=>onTileClick(i,tile);gridEl.appendChild(tile);}}
function showPattern(){phase='showing';buildGrid();litCells.forEach((idx,i)=>{setTimeout(()=>{const tile=gridEl.children[idx];tile.classList.add('lit');setTimeout(()=>tile.classList.remove('lit'),500);},i*700);});const totalTime=litCells.length*700+600;setTimeout(()=>{if(phase==='showing')startInput();},totalTime);}
function startInput(){phase='input';renderGrid(true);}
function onTileClick(idx,tile){if(phase!=='input')return;if(clickedCells.has(idx))return;clickedCells.add(idx);if(litCells.includes(idx)){tile.classList.add('correct');const found=[...clickedCells].filter(c=>litCells.includes(c));if(found.length===litCells.length){phase='done';level++;if(level-1>best)best=level-1;$('#gridStatus').textContent=t('correct');renderStats();setTimeout(showPattern,1200);}}else{tile.classList.add('wrong');litCells.forEach(li=>{if(gridEl.children[li])gridEl.children[li].classList.add('correct');});lives--;renderStats();if(lives<=0){gameOver();}else{$('#gridStatus').textContent=t('wrong');phase='done';setTimeout(showPattern,1500);}}}
function gameOver(){phase='idle';const st=$('#stage');st.innerHTML=`<div style="font-size:2em;font-weight:900;color:#e94560">${t('gameOver')}</div><div style="font-size:1.4em;margin:12px 0">${t('level')}: <b style="color:var(--gz-accent)">${level-1}</b></div><button class="gz-btn" onclick="restart()" style="font-size:1.2em;padding:12px 28px">🔄 ${t('restart')}</button>`;}
function restart(){level=1;lives=3;renderStats();showPattern();}
function renderStats(){$('#stats').innerHTML=`<div class="stat"><div class="num">${level}</div><div class="lbl">${t('level')}</div></div><div class="stat"><div class="num">${litCells.length}</div><div class="lbl">${t('tiles')}</div></div><div class="stat"><div class="num" style="color:#e94560">${'❤'.repeat(Math.max(0,lives))}${'🖤'.repeat(3-Math.max(0,lives))}</div><div class="lbl">${t('lives')}</div></div><div class="stat"><div class="num">${best}</div><div class="lbl">${t('best')}</div></div>`;}
function init(){phase='idle';$('#stage').className='stage';$('#stage').innerHTML=`<div style="font-size:1.6em;font-weight:700;color:var(--text2)">${t('start')}</div>`;$('#stats').innerHTML='';}
$('#stage').addEventListener('click',(e)=>{if(phase==='idle'&&!e.target.classList.contains('tile'))restart();});
$('#toolbar').innerHTML=`<button class="gz-btn" onclick="init()">🔄 ${t('restart')}</button>`;
GZ.renderToolPage({category:'fun',titleKey:'toolTitle',descKey:'toolDesc',howToSteps:['step1','step2','step3','step4'],related:[{icon:'🔢',href:'/zh/fun/number-memory-test.html',name:'数字记忆测试'},{icon:'⚡',href:'/zh/fun/reaction-time.html',name:'反应速度测试'},{icon:'🐵',href:'/zh/fun/chimp-test.html',name:'黑猩猩记忆测试'},{icon:'📖',href:'/zh/fun/verbal-memory-test.html',name:'词汇记忆测试'}]});
init();
</script>
<script src="/tools-result-rec.js" defer></script>
