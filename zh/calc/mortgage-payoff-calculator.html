<div class="gz-container">

<script>
GZI18n.register({
  en: {
    toolTitle: 'Mortgage Payoff Calculator',
    toolDesc: 'See how extra payments, biweekly payments or lump sums save interest and years on your mortgage. Compare strategies side by side. Free, browser-only.',
    balance: 'Current Balance ($)',
    rate: 'Interest Rate (%)',
    years: 'Remaining Years',
    extraMonthly: 'Extra Monthly ($)',
    lumpSum: 'One-time Lump Sum ($)',
    calculate: 'Calculate',
    stratExtra: 'Extra Monthly',
    stratBiweekly: 'Biweekly',
    stratLump: 'Lump Sum',
    originalTerm: 'Original Term',
    newTerm: 'New Payoff',
    yearsSaved: 'Years Saved',
    originalInterest: 'Original Interest',
    newInterest: 'New Interest',
    interestSaved: 'Interest Saved',
    monthlyPayment: 'Monthly Payment',
    totalCost: 'Total Cost',
    original: 'Original Loan',
    withStrategy: 'With Strategy',
    savings: 'Your Savings',
    step1: 'Enter your mortgage balance, rate and remaining years',
    step2: 'Choose a payoff strategy (extra, biweekly or lump sum)',
    step3: 'Enter the extra amount you can afford',
    step4: 'See how much interest and years you save',
    yearsUnit: 'yrs',
  },
  zh: {
    toolTitle: '房贷提前还款计算器',
    toolDesc: '查看额外还款、双周还款或一次性还款能节省多少利息和时间。并排对比不同策略。免费，浏览器本地运行。',
    balance: '当前余额（$）',
    rate: '利率（%）',
    years: '剩余年限',
    extraMonthly: '每月额外还款（$）',
    lumpSum: '一次性还款（$）',
    calculate: '计算',
    stratExtra: '额外月供',
    stratBiweekly: '双周还款',
    stratLump: '一次性还款',
    originalTerm: '原期限',
    newTerm: '新还清时间',
    yearsSaved: '节省年限',
    originalInterest: '原利息',
    newInterest: '新利息',
    interestSaved: '节省利息',
    monthlyPayment: '月供',
    totalCost: '总支出',
    original: '原贷款',
    withStrategy: '采用策略后',
    savings: '你的节省',
    step1: '输入房贷余额、利率和剩余年限',
    step2: '选择还款策略（额外、双周或一次性）',
    step3: '输入你能负担的额外金额',
    step4: '查看节省了多少利息和年限',
    yearsUnit: '年',
  }
});

const { $, t } = GZ;
let strategy = 'extra';

$('#lblBalance').textContent = t('balance');
$('#lblRate').textContent = t('rate');
$('#lblYears').textContent = t('years');
$('#lblExtra').textContent = t('extraMonthly');
$('#lblLump').textContent = t('lumpSum');
$('#stratExtra').textContent = t('stratExtra');
$('#stratBiweekly').textContent = t('stratBiweekly');
$('#stratLump').textContent = t('stratLump');

document.querySelectorAll('.strategy-tab').forEach(tab => {
  tab.onclick = () => {
    document.querySelectorAll('.strategy-tab').forEach(t2=>t2.classList.remove('active'));
    tab.classList.add('active');
    strategy = tab.dataset.strat;
    calculate();
  };
});

$('#toolbar').innerHTML = `<button class="gz-btn" onclick="calculate()">${t('calculate')}</button>`;

['balance','rate','years','extra','lump'].forEach(id => {
  document.getElementById(id).addEventListener('input', calculate);
});

function calcMortgage(principal, annualRate, months, extraMonthly, lumpSum) {
  extraMonthly = extraMonthly || 0;
  lumpSum = lumpSum || 0;
  const r = annualRate / 100 / 12;
  let balance = principal - lumpSum;
  if (balance < 0) balance = 0;

  // Standard monthly payment
  let monthlyPayment;
  if (r === 0) {
    monthlyPayment = balance / months;
  } else {
    monthlyPayment = balance * (r * Math.pow(1+r, months)) / (Math.pow(1+r, months) - 1);
  }

  let totalInterest = 0;
  let month = 0;
  const maxMonths = months * 3; // safety

  while (balance > 0.01 && month < maxMonths) {
    month++;
    const interest = balance * r;
    let principalPay = monthlyPayment - interest + extraMonthly;
    if (principalPay > balance) principalPay = balance;
    balance -= principalPay;
    totalInterest += interest;
  }

  return {
    monthlyPayment: monthlyPayment,
    totalInterest: totalInterest,
    totalMonths: month,
    totalCost: principal + totalInterest
  };
}

function calculate() {
  const balance = +$('#balance').value || 0;
  const rate = +$('#rate').value || 0;
  const years = +$('#years').value || 1;
  const extra = +$('#extra').value || 0;
  const lump = +$('#lump').value || 0;
  const months = years * 12;

  // Original
  const original = calcMortgage(balance, rate, months, 0, 0);

  // With strategy
  let stratExtra = 0, stratLump = 0;
  if (strategy === 'extra') {
    stratExtra = extra;
    stratLump = lump;
  } else if (strategy === 'biweekly') {
    // Biweekly: 26 half-payments = 13 monthly. Extra = 1 monthly payment / 12 per month
    stratExtra = original.monthlyPayment / 12;
    stratLump = lump;
  } else if (strategy === 'lump') {
    stratLump = lump;
    stratExtra = extra;
  }

  const withStrat = calcMortgage(balance, rate, months, stratExtra, stratLump);

  const interestSaved = original.totalInterest - withStrat.totalInterest;
  const monthsSaved = original.totalMonths - withStrat.totalMonths;
  const yearsSaved = monthsSaved / 12;

  const fmt = n => '$' + Math.round(n).toLocaleString();
  const fmtYear = m => {
    const y = Math.floor(m/12);
    const mo = m % 12;
    return y + 'y ' + mo + 'm';
  };

  $('#results').innerHTML = `
    <div class="results-grid">
      <div class="result-card"><div class="result-value save">${fmtYear(withStrat.totalMonths)}</div><div class="result-label">${t('newTerm')}</div></div>
      <div class="result-card"><div class="result-value save">${yearsSaved>0?'-'+(yearsSaved.toFixed(1)):'0'} ${t('yearsUnit')}</div><div class="result-label">${t('yearsSaved')}</div></div>
      <div class="result-card"><div class="result-value save">${fmt(interestSaved)}</div><div class="result-label">${t('interestSaved')}</div></div>
      <div class="result-card"><div class="result-value">${fmt(withStrat.monthlyPayment + stratExtra)}</div><div class="result-label">${t('monthlyPayment')}</div></div>
    </div>
    <table class="compare-table">
      <thead><tr><th></th><th class="num">${t('original')}</th><th class="num">${t('withStrategy')}</th></tr></thead>
      <tbody>
        <tr><td>${t('monthlyPayment')}</td><td class="num">${fmt(original.monthlyPayment)}</td><td class="num highlight">${fmt(withStrat.monthlyPayment + stratExtra)}</td></tr>
        <tr><td>${t('originalTerm')}</td><td class="num">${fmtYear(original.totalMonths)}</td><td class="num highlight">${fmtYear(withStrat.totalMonths)}</td></tr>
        <tr><td>${t('totalCost')}</td><td class="num">${fmt(original.totalCost)}</td><td class="num highlight">${fmt(withStrat.totalCost)}</td></tr>
        <tr><td>${t('originalInterest')}</td><td class="num">${fmt(original.totalInterest)}</td><td class="num highlight">${fmt(withStrat.totalInterest)}</td></tr>
        <tr style="border-top:2px solid var(--gz-accent)"><td><strong>${t('savings')}</strong></td><td></td><td class="num highlight"><strong style="color:#00d672">${fmt(interestSaved)}</strong></td></tr>
      </tbody>
    </table>
    <div style="font-size:.8em;opacity:.7;margin-top:12px">
      ${strategy==='extra'?'💡 '+t('stratExtra')+': +'+fmt(stratExtra)+'/mo':strategy==='biweekly'?'💡 '+t('stratBiweekly')+': '+t('monthlyPayment')+'/12 ≈ '+fmt(stratExtra)+'/mo extra':strategy==='lump'&&stratLump>0?'💡 '+t('stratLump')+': '+fmt(stratLump)+' one-time':''}
    </div>
  `;
}

calculate();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🏠', href:'/calc/mortgage-calculator.html', name:'Mortgage Calc'},
    {icon:'💳', href:'/calc/credit-card-payoff-calculator.html', name:'Card Payoff'},
    {icon:'❄️', href:'/calc/early-mortgage-payoff.html', name:'Early Payoff'},
    {icon:'💰', href:'/calc/loan-calculator.html', name:'Loan Calc'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
