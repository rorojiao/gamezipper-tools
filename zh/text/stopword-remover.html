<script>
GZI18n.register({
  en: {
    toolTitle: 'Stopword Remover',
    toolDesc: 'Remove common stop words (the, is, 的, 了 …) from English or Chinese text. Great for SEO keyword extraction, NLP and search indexing — free and private.',
    placeholder: 'Paste or type your text here...',
    optEn: 'Remove English stop words',
    optZh: 'Remove Chinese stop words',
    optCase: 'Case-insensitive',
    optNum: 'Also remove numbers',
    optPunct: 'Remove punctuation',
    lblCustom: 'Custom stop words (comma-separated, optional):',
    lblOut: 'Result',
    example: 'Load Example',
    clear: 'Clear',
    copy: 'Copy Result',
    origWords: 'Original words',
    kept: 'Words kept',
    removed2: 'Removed',
    removedWords: 'Removed words',
    noResults: 'Type or paste some text above to remove stop words.',
  },
  zh: {
    toolTitle: '停用词移除工具',
    toolDesc: '移除英文或中文文本中的常见停用词（the、is、的、了……），适用于 SEO 关键词提取、自然语言处理和搜索索引。免费、私密、浏览器本地运行。',
    placeholder: '在此粘贴或输入文本...',
    optEn: '移除英文停用词',
    optZh: '移除中文停用词',
    optCase: '不区分大小写',
    optNum: '同时移除数字',
    optPunct: '移除标点',
    lblCustom: '自定义停用词（逗号分隔，可选）：',
    lblOut: '结果',
    example: '加载示例',
    clear: '清空',
    copy: '复制结果',
    origWords: '原始词数',
    kept: '保留词数',
    removed2: '已移除',
    removedWords: '被移除的词',
    noResults: '请在上方输入或粘贴文本以移除停用词。',
  }
});

const { $, copyText, t } = GZ;

const STOP_EN = new Set(['a','an','the','and','or','but','if','then','else','when','at','by','for','with','about','against','between','into','through','during','before','after','above','below','to','from','up','down','in','on','off','over','under','again','further','once','is','am','are','was','were','be','been','being','have','has','had','do','does','did','will','would','should','could','can','may','might','must','shall','i','you','he','she','it','we','they','me','him','her','us','them','my','your','his','its','our','their','this','that','these','those','what','which','who','whom','whose','where','why','how','all','each','every','both','few','more','most','other','some','such','no','nor','not','only','own','same','so','than','too','very','just','also','as','of','s','t','d','ll','m','re','ve','y']);
const STOP_ZH = new Set(['的','了','是','在','我','你','他','她','它','们','这','那','就','也','都','还','和','与','及','或','但','而','因','所','以','用','到','给','让','把','被','从','对','向','为','于','上','下','里','外','中','不','没','没有','很','非常','已经','正在','将','会','能','可以','可能','着','过','吧','呢','啊','哦','嗯','嘛','哈','一','个','只','些','把','这','那','这样','那样','什么','怎么','为什么','哪里','谁','哪个','多少','可以','应该','需要','希望','觉得','认为','知道','看到','听到','感觉','然后','所以','因为','如果','虽然','但是','然而','不过','除了','除非','即使','尽管']);

let customSet = new Set();

function buildCustom() {
  customSet = new Set();
  const raw = $('#customWords').value.trim();
  if (!raw) return;
  raw.split(/[,，;；\n\r]+/).forEach(w => {
    const x = w.trim().toLowerCase();
    if (x) customSet.add(x);
  });
}

function process() {
  const raw = $('#input').value;
  if (!raw.trim()) {
    $('#output').value = '';
    $('#stats').innerHTML = '';
    $('#removed').innerHTML = `<div style="opacity:.6;text-align:center">${t('noResults')}</div>`;
    return;
  }
  buildCustom();
  const rmEn = $('#optEn').checked;
  const rmZh = $('#optZh').checked;
  const ci = $('#optCase').checked;
  const rmNum = $('#optNum').checked;
  const rmPunct = $('#optPunct').checked;
  let result = raw;
  if (rmPunct) {
    // keep CJK and word chars and whitespace
    result = result.replace(/[^\w\s一-鿿]/g, ' ');
  }
  if (rmNum) {
    result = result.replace(/\b\d+\b/g, ' ');
  }
  // Split into tokens but remember separators for CJK
  const tokens = result.split(/(\s+)/);
  const removed = [];
  let out = [];
  let origCount = 0, keptCount = 0;
  tokens.forEach(tok => {
    if (/^\s*$/.test(tok)) { out.push(tok); return; }
    // Could be multiple CJK chars in a row with no spaces
    const hasCJK = /[一-鿿]/.test(tok);
    if (hasCJK && rmZh) {
      const chars = [...tok];
      chars.forEach(ch => {
        origCount++;
        const lower = ci ? ch.toLowerCase() : ch;
        if (STOP_ZH.has(ch) || customSet.has(lower)) {
          removed.push(ch);
        } else {
          out.push(ch);
          keptCount++;
        }
      });
    } else {
      // Latin/number token
      tok.split(/\s+/).forEach(piece => {
        if (!piece) return;
        origCount++;
        const lower = ci ? piece.toLowerCase() : piece;
        const isStop = (rmEn && STOP_EN.has(lower)) || customSet.has(lower);
        if (isStop) {
          removed.push(piece);
        } else {
          out.push(piece);
          keptCount++;
        }
      });
    }
  });
  const resultStr = out.join(' ').replace(/\s+/g, ' ').trim();
  $('#output').value = resultStr;
  const rmCount = origCount - keptCount;
  $('#stats').innerHTML = `
    <div class="sw-stat"><div class="num">${origCount}</div><div class="label">${t('origWords')}</div></div>
    <div class="sw-stat"><div class="num">${keptCount}</div><div class="label">${t('kept')}</div></div>
    <div class="sw-stat"><div class="num">${rmCount}</div><div class="label">${t('removed2')}</div></div>`;
  const uniqRemoved = [...new Set(removed)];
  if (uniqRemoved.length) {
    $('#removed').innerHTML = `<div style="margin-bottom:6px;font-weight:600">${t('removedWords')} (${removed.length})</div>${uniqRemoved.map(w => `<span class="chip">${escapeHtml(w)}</span>`).join('')}`;
  } else {
    $('#removed').innerHTML = `<div style="opacity:.6">${t('noResults')}</div>`;
  }
}

function escapeHtml(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

function loadExample(){
  $('#input').value = "The quick brown fox jumps over the lazy dog. This is a simple sentence that contains some common stop words. Machine learning is the future of technology. We are building tools that help developers work faster.";
  process();
}

function clearAll(){
  $('#input').value=''; $('#output').value=''; $('#customWords').value='';
  $('#stats').innerHTML=''; $('#removed').innerHTML='';
}

['#input','#customWords','#optEn','#optZh','#optCase','#optNum','#optPunct'].forEach(sel=>{
  $(sel).addEventListener('input',process);
  if(sel!=='#input'&&sel!=='#customWords') $(sel).addEventListener('change',process);
});

$('#lblEn').textContent = t('optEn');
$('#lblZh').textContent = t('optZh');
$('#lblCase').textContent = t('optCase');
$('#lblNum').textContent = t('optNum');
$('#lblPunct').textContent = t('optPunct');
$('#lblCustom').textContent = t('lblCustom');
$('#lblOut').textContent = t('lblOut');
$('#input').placeholder = t('placeholder');

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn" onclick="copyText($('#output').value)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="clearAll()">${t('clear')}</button>`;

process();

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📈', href:'/text/word-frequency.html', name:'Word Frequency'},
    {icon:'📝', href:'/text/word-counter.html', name:'Word Counter'},
    {icon:'📚', href:'/text/readability-checker.html', name:'Readability'},
    {icon:'🧹', href:'/text/remove-duplicates.html', name:'Remove Duplicates'},
  ]
});
</script>

</body>
