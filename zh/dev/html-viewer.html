<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is an online HTML viewer?", "acceptedAnswer": {"@type": "Answer", "text": "An HTML viewer lets you paste or type HTML markup and instantly see how it renders in a browser — without creating a file, setting up a server or writing a full web page. It is perfect for testing snippets, debugging layouts, previewing HTML emails and learning HTML."}}, {"@type": "Question", "name": "Is the HTML viewer safe?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. The HTML is rendered inside a sandboxed iframe on your own device. Scripts run only inside the sandbox — they cannot access the parent page, your cookies, your filesystem or any server. Your HTML never leaves your browser."}}, {"@type": "Question", "name": "Can I test JavaScript in the HTML viewer?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. <script> tags execute inside the sandboxed iframe. You can test interactive snippets, animations and small widgets. Network requests via fetch follow the browser's normal CORS rules. To disable scripts entirely, untick the Allow scripts option."}}, {"@type": "Question", "name": "How is this different from the HTML/CSS/JS Code Editor?", "acceptedAnswer": {"@type": "Answer", "text": "The Code Editor gives you three separate panels for HTML, CSS and JS. The HTML Viewer is simpler — it renders a single HTML document (which can include inline <style> and <script>), and focuses on fast snippet testing and email preview."}}, {"@type": "Question", "name": "Can I preview HTML emails?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. Paste your table-based email HTML and see how it renders. The viewer is great for checking whether an email template looks right before you send it. Use the responsive width buttons to simulate mobile and desktop clients."}}]}</script>

const examples = [
  { name: 'Card', code: `<div style="font-family:-apple-system,sans-serif;max-width:320px;margin:40px auto;background:#fff;border-radius:16px;box-shadow:0 8px 30px rgba(0,0,0,.12);overflow:hidden">\n  <div style="height:140px;background:linear-gradient(135deg,#667eea,#764ba2)"></div>\n  <div style="padding:20px">\n    <h2 style="margin:0 0 8px;color:#222">GameZipper Card</h2>\n    <p style="margin:0;color:#666;line-height:1.5">A simple card layout you can render and customize right in your browser.</p>\n    <button style="margin-top:14px;background:#667eea;color:#fff;border:none;border-radius:8px;padding:8px 16px;cursor:pointer">Learn more →</button>\n  </div>\n</div>` },
  { name: 'Email', code: `<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="alternate" hreflang="en" href="https://tools.gamezipper.com/dev/html-viewer.html">
<link rel="alternate" hreflang="zh" href="https://tools.gamezipper.com/zh/dev/html-viewer.html">

<script>localStorage.setItem('gz-lang','zh');<\/script>
</head><body style="margin:0;padding:0;background:#f4f4f5;font-family:Arial,sans-serif">\n  <table width="100%" cellpadding="0" cellspacing="0" style="background:#f4f4f5;padding:20px">\n    <tr><td align="center">\n      <table width="600" cellpadding="0" cellspacing="0" style="background:#fff;border-radius:8px;overflow:hidden">\n        <tr><td style="background:#0f172a;color:#fff;padding:20px 30px;font-size:20px;font-weight:bold">🛠️ GameZipper</td></tr>\n        <tr><td style="padding:30px;color:#333;line-height:1.6">\n          <h2 style="margin-top:0">Welcome aboard!</h2>\n          <p>Thanks for joining. Here's a sample email template you can preview and tweak.</p>\n          <a href="#" style="display:inline-block;background:#3b82f6;color:#fff;text-decoration:none;padding:10px 20px;border-radius:6px;margin-top:10px">Get Started</a>\n        </td></tr>\n        <tr><td style="background:#f8fafc;color:#888;font-size:12px;padding:20px 30px;text-align:center">© 2026 GameZipper. All rights reserved.</td></tr>\n      </table>\n    </td></tr>\n  </table>\n</body></html>` },
  { name: 'Form', code: `<form style="font-family:-apple-system,sans-serif;max-width:400px;margin:40px auto;background:#fff;padding:24px;border-radius:12px;box-shadow:0 4px 20px rgba(0,0,0,.08)">\n  <h2 style="margin-top:0;color:#222">Sign in</h2>\n  <label style="display:block;margin:12px 0 4px;color:#444;font-size:14px">Email</label>\n  <input type="email" placeholder="you@example.com" style="width:100%;padding:10px;border:1px solid #ddd;border-radius:8px;font-size:14px;box-sizing:border-box">\n  <label style="display:block;margin:12px 0 4px;color:#444;font-size:14px">Password</label>\n  <input type="password" placeholder="••••••••" style="width:100%;padding:10px;border:1px solid #ddd;border-radius:8px;font-size:14px;box-sizing:border-box">\n  <button type="button" style="width:100%;margin-top:16px;background:#10b981;color:#fff;border:none;padding:12px;border-radius:8px;font-size:15px;cursor:pointer">Sign in</button>\n</form>` },
  { name: 'Table', code: `<table style="border-collapse:collapse;width:90%;margin:40px auto;font-family:-apple-system,sans-serif;font-size:14px">\n  <thead><tr style="background:#1e293b;color:#fff">\n    <th style="padding:12px;text-align:left">Tool</th>\n    <th style="padding:12px;text-align:left">Category</th>\n    <th style="padding:12px;text-align:right">Price</th>\n  </tr></thead>\n  <tbody>\n    <tr style="background:#fff"><td style="padding:10px 12px">JSON Formatter</td><td style="padding:10px 12px">Dev</td><td style="padding:10px 12px;text-align:right">$0</td></tr>\n    <tr style="background:#f8fafc"><td style="padding:10px 12px">Color Picker</td><td style="padding:10px 12px">Color</td><td style="padding:10px 12px;text-align:right">$0</td></tr>\n    <tr style="background:#fff"><td style="padding:10px 12px">Image Compressor</td><td style="padding:10px 12px">Image</td><td style="padding:10px 12px;text-align:right">$0</td></tr>\n  </tbody>\n</table>` },
];

$('#examples').innerHTML = examples.map((e, i) => `<button onclick="loadExample(${i})">📦 ${e.name}</button>`).join('');
function loadExample(i) { $('#html').value = examples[i].code; render(); }

let renderTimer = null;

function render() {
  const html = $('#html').value;
  const iframe = $('#preview');
  const wrap = $('#iframeWrap');
  // toggle sandbox based on scripts setting
  const allowScripts = $('#allowScripts').checked;
  iframe.sandbox = allowScripts ? 'allow-scripts allow-forms allow-modals allow-popups' : 'allow-forms';
  // dark preview
  wrap.style.background = $('#darkPreview').checked ? '#1a1a1a' : '#fff';
  // write content via srcdoc to keep it isolated
  iframe.srcdoc = html;
}

function setWidth(w) {
  const wrap = $('#iframeWrap');
  if (w === 0) {
    wrap.style.maxWidth = 'none';
    wrap.style.width = '100%';
    wrap.style.margin = '0';
  } else {
    wrap.style.maxWidth = w + 'px';
    wrap.style.width = '100%';
    wrap.style.margin = '0 auto';
  }
}

document.querySelectorAll('[data-w]').forEach(b => b.addEventListener('click', () => setWidth(+b.dataset.w)));

function openInNewTab() {
  const w = window.open('', '_blank');
  w.document.open();
  w.document.write($('#html').value || '<p style="font-family:sans-serif;color:#888;text-align:center;margin-top:40px">(empty)</p>');
  w.document.close();
}

$('#html').addEventListener('input', () => {
  if (!$('#autoRender').checked) return;
  clearTimeout(renderTimer);
  renderTimer = setTimeout(render, 300);
});
['allowScripts','autoRender','darkPreview'].forEach(id => $('#' + id).addEventListener('change', render));

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="render()">▶ ${t('render')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="copyText($('#html').value)">📋 ${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample(0)">📥 ${t('loadExample')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#html').value='';render()">🗑 ${t('clear')}</button>`;

$('#html').value = examples[0].code;
render();

GZ.renderToolPage({
  category: 'dev',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'💻', href:'/dev/code-editor.html', name:'HTML/CSS/JS Editor'},
    {icon:'📄', href:'/dev/html-minifier.html', name:'HTML Minifier'},
