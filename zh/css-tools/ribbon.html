<style>
.controls{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:16px}
.control-group{display:flex;flex-direction:column;gap:4px}
.control-group label{font-size:.75rem;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;font-weight:600}
.control-group input[type=text],.control-group input[type=number],.control-group select,.control-group input[type=color]{background:rgba(0,0,0,.3);border:1px solid var(--border);border-radius:8px;padding:8px 10px;color:var(--text);font-size:.85rem;font-family:inherit}
.control-group input[type=color]{height:40px;cursor:pointer;padding:2px}
.tabs{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.tab-btn{background:var(--glass2);border:1px solid var(--border);color:var(--text2);padding:6px 14px;border-radius:8px;cursor:pointer;font-size:.85rem;font-weight:600;transition:all .15s}
.tab-btn.active{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border-color:transparent}
.preview-wrap{background:repeating-conic-gradient(#1a1a2e 0% 25%,#20203a 0% 50%) 50%/24px 24px;border-radius:12px;padding:40px 20px;min-height:300px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;margin-bottom:16px}
.preview-box{width:280px;height:180px;background:linear-gradient(135deg,#4ecdc4,#2a9d8f);border-radius:12px;position:relative;box-shadow:0 8px 24px rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:1.1rem}
.code-block{background:rgba(0,0,0,.4);border:1px solid var(--border);border-radius:8px;padding:14px;margin-top:10px;font-family:'SF Mono',Consolas,monospace;font-size:.78rem;line-height:1.5;white-space:pre-wrap;word-break:break-all;color:#a5d6ff;max-height:400px;overflow-y:auto}
.ribbon-corner{position:absolute;top:14px;left:-32px;background:#e94560;color:#fff;padding:6px 40px;font-size:.78rem;font-weight:700;letter-spacing:.5px;transform:rotate(-45deg);box-shadow:0 2px 8px rgba(0,0,0,.3);text-transform:uppercase}
.ribbon-side{position:absolute;left:0;top:50%;transform:translateY(-50%);background:#e94560;color:#fff;padding:14px 12px 14px 16px;font-size:.7rem;font-weight:700;letter-spacing:.5px;clip-path:polygon(0 0,100% 0,calc(100% - 14px) 50%,100% 100%,0 100%);text-transform:uppercase;min-width:60px;text-align:center}
.ribbon-side-r{left:auto;right:0;clip-path:polygon(0 0,100% 0,100% 100%,0 100%,14px 50%);padding:14px 16px 14px 12px}
.ribbon-top{position:absolute;top:0;left:50%;transform:translateX(-50%);background:#e94560;color:#fff;padding:8px 32px;font-size:.75rem;font-weight:700;letter-spacing:.5px;clip-path:polygon(8px 0,calc(100% - 8px) 0,100% 100%,0 100%);text-transform:uppercase}
.ribbon-bottom{position:absolute;bottom:0;left:50%;transform:translateX(-50%);background:#e94560;color:#fff;padding:8px 32px;font-size:.75rem;font-weight:700;letter-spacing:.5px;clip-path:polygon(0 0,100% 0,calc(100% - 8px) 100%,8px 100%);text-transform:uppercase}
.ribbon-circle{position:absolute;top:14px;right:14px;width:60px;height:60px;background:radial-gradient(circle,#e94560 60%,transparent 60%);color:#fff;display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:800;transform:rotate(15deg);text-align:center;line-height:1.1}
.ribbon-circle::before{content:'';position:absolute;inset:0;background:radial-gradient(circle,transparent 56%,#e94560 56%);border-radius:50%;z-index:-1}
.ribbon-circle span{transform:rotate(-15deg);display:block;padding:0 6px}
.ribbon-flag{position:absolute;bottom:14px;right:0;background:#e94560;color:#fff;padding:6px 12px;font-size:.75rem;font-weight:700;letter-spacing:.5px;text-transform:uppercase;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.ribbon-flag::after{content:'';position:absolute;right:0;bottom:-8px;border:8px solid transparent;border-right-color:#7a1f2c;border-bottom-color:#7a1f2c}
.ribbon-fork{position:absolute;top:14px;left:14px;background:#e94560;color:#fff;padding:6px 18px 6px 12px;font-size:.75rem;font-weight:700;letter-spacing:.5px;text-transform:uppercase;clip-path:polygon(0 0,100% 0,calc(100% - 12px) 50%,100% 100%,0 100%)}
.ribbon-wrap{display:inline-block;position:relative;background:#e94560;color:#fff;padding:14px 26px;font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.ribbon-wrap::before,.ribbon-wrap::after{content:'';position:absolute;top:100%;border:14px solid transparent;border-top-color:#a02a3d}
.ribbon-wrap::before{left:0;border-left-color:#a02a3d}
.ribbon-wrap::after{right:0;border-right-color:#a02a3d}
</style>

<script type="application/ld+json">{"@context":"https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is a CSS ribbon?", "acceptedAnswer": {"@type": "Answer", "text": "A CSS ribbon is a decorative banner element commonly used on cards, badges, pricing tables and product labels. It's typically created with clip-path, pseudo-elements or absolute positioning to produce corner flags, side banners or wrap-around ribbons."}}, {"@type": "Question", "name": "Can I use the generated CSS in commercial projects?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. The CSS ribbon code generated by this tool is free to use in personal, commercial and client projects. There are no licensing restrictions."}}, {"@type": "Question", "name": "Do CSS ribbons work in all modern browsers?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. CSS ribbons using clip-path, transforms and pseudo-elements are supported in all modern browsers including Chrome, Firefox, Safari, Edge and their mobile versions. Internet Explorer does not support clip-path."}}, {"@type": "Question", "name": "How do I make a ribbon responsive?", "acceptedAnswer": {"@type": "Answer", "text": "Use relative units like em or rem for ribbon size, padding and font size. The ribbon will scale naturally with the container, and you can adjust its position with media queries for smaller screens."}}]}</script>

<script>
GZI18n.register({
en:{
toolTitle:'CSS Ribbon Generator',
toolDesc:'Design corner ribbons, side banners, badges and wrap-around ribbons with live preview and copy-ready CSS.',
lblText:'Ribbon Text', lblColor:'Ribbon Color', lblBgColor:'Background', lblSize:'Size',
tabCorner:'Corner', tabSide:'Side', tabTop:'Top', tabBottom:'Bottom', tabCircle:'Circle', tabFlag:'Flag', tabFork:'Fork', tabWrap:'Wrap',
copyHtml:'Copy HTML', copyCss:'Copy CSS',
step1:'Choose a ribbon style from the tabs above',
step2:'Customize the text, color and size with the controls',
step3:'Preview updates live in the card area',
step4:'Click Copy HTML or Copy CSS to grab the code',
},
zh:{
toolTitle:'CSS 缎带/标签生成器',
toolDesc:'设计角落丝带、侧边横幅、徽章和环绕丝带，实时预览并复制可用的 CSS 代码。',
lblText:'丝带文字', lblColor:'丝带颜色', lblBgColor:'背景', lblSize:'尺寸',
tabCorner:'角落', tabSide:'侧面', tabTop:'顶部', tabBottom:'底部', tabCircle:'圆形', tabFlag:'旗帜', tabFork:'分叉', tabWrap:'环绕',
copyHtml:'复制 HTML', copyCss:'复制 CSS',
step1:'从上方选项卡选择丝带样式',
step2:'使用控件自定义文字、颜色和大小',
step3:'预览在卡片区域实时更新',
step4:'点击「复制 HTML」或「复制 CSS」获取代码',
}
});

const { $, copyText, t } = GZ;
let currentStyle = 'corner';

const styles = [
{id:'corner', icon:'📐'}, {id:'side', icon:'➡️'}, {id:'top', icon:'⬆️'},
{id:'bottom', icon:'⬇️'}, {id:'circle', icon:'🔴'}, {id:'flag', icon:'🚩'},
{id:'fork', icon:'🍴'}, {id:'wrap', icon:'🎀'}
];

const cssTemplates = {
corner: (color, size) => `.ribbon{position:absolute;top:${14*size}px;left:-${32*size}px;background:${color};color:#fff;padding:${6*size}px ${40*size}px;font-size:${.78*size}rem;font-weight:700;letter-spacing:.5px;transform:rotate(-45deg);box-shadow:0 2px 8px rgba(0,0,0,.3);text-transform:uppercase}`,
side: (color, size) => `.ribbon{position:absolute;left:0;top:50%;transform:translateY(-50%);background:${color};color:#fff;padding:${14*size}px ${12*size}px ${14*size}px ${16*size}px;font-size:${.7*size}rem;font-weight:700;letter-spacing:.5px;clip-path:polygon(0 0,100% 0,calc(100% - 14px) 50%,100% 100%,0 100%);text-transform:uppercase;min-width:${60*size}px;text-align:center}`,
top: (color, size) => `.ribbon{position:absolute;top:0;left:50%;transform:translateX(-50%);background:${color};color:#fff;padding:${8*size}px ${32*size}px;font-size:${.75*size}rem;font-weight:700;letter-spacing:.5px;clip-path:polygon(${8*size}px 0,calc(100% - ${8*size}px) 0,100% 100%,0 100%);text-transform:uppercase}`,
bottom: (color, size) => `.ribbon{position:absolute;bottom:0;left:50%;transform:translateX(-50%);background:${color};color:#fff;padding:${8*size}px ${32*size}px;font-size:${.75*size}rem;font-weight:700;letter-spacing:.5px;clip-path:polygon(0 0,100% 0,calc(100% - ${8*size}px) 100%,${8*size}px 100%);text-transform:uppercase}`,
circle: (color, size) => `.ribbon{position:absolute;top:${14*size}px;right:${14*size}px;width:${60*size}px;height:${60*size}px;background:radial-gradient(circle,${color} 60%,transparent 60%);color:#fff;display:flex;align-items:center;justify-content:center;font-size:${.7*size}rem;font-weight:800;transform:rotate(15deg);text-align:center;line-height:1.1}`,
flag: (color, size) => `.ribbon{position:absolute;bottom:${14*size}px;right:0;background:${color};color:#fff;padding:${6*size}px ${12*size}px;font-size:${.75*size}rem;font-weight:700;letter-spacing:.5px;text-transform:uppercase;box-shadow:0 2px 8px rgba(0,0,0,.3)}`,
fork: (color, size) => `.ribbon{position:absolute;top:${14*size}px;left:${14*size}px;background:${color};color:#fff;padding:${6*size}px ${18*size}px ${6*size}px ${12*size}px;font-size:${.75*size}rem;font-weight:700;letter-spacing:.5px;text-transform:uppercase;clip-path:polygon(0 0,100% 0,calc(100% - ${12*size}px) 50%,100% 100%,0 100%)}`,
wrap: (color, size) => `.ribbon{display:inline-block;position:relative;background:${color};color:#fff;padding:${14*size}px ${26*size}px;font-size:${.85*size}rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px}\n.ribbon::before,.ribbon::after{content:'';position:absolute;top:100%;border:${14*size}px solid transparent;border-top-color:${color === '#e94560' ? '#a02a3d' : shadeColor(color, -30)}}\n.ribbon::before{left:0;border-left-color:${color === '#e94560' ? '#a02a3d' : shadeColor(color, -30)}}\n.ribbon::after{right:0;border-right-color:${color === '#e94560' ? '#a02a3d' : shadeColor(color, -30)}}`
};

function shadeColor(hex, percent) {
const num = parseInt(hex.replace('#',''), 16);
const amt = Math.round(2.55 * percent);
const R = (num >> 16) + amt;
const G = (num >> 8 & 0x00FF) + amt;
const B = (num & 0x0000FF) + amt;
return '#' + (0x1000000 + (R<255?R<1?0:R:255)*0x10000 + (G<255?G<1?0:G:255)*0x100 + (B<255?B<1?0:B:255)).toString(16).slice(1);
}

function getHtml(style, text, size) {
const base = `<div class="ribbon">${text}</div>`;
return `<div class="card" style="position:relative;width:280px;height:180px;background:linear-gradient(135deg,#4ecdc4,#2a9d8f);border-radius:12px;box-shadow:0 8px 24px rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:1.1rem">\n  Card Content\n  ${base}\n</div>`;
}

function update() {
const text = $('#ribbonText').value || 'NEW';
const color = $('#ribbonColor').value;
const size = parseFloat($('#ribbonSize').value);
const box = $('#previewBox');
// Remove old ribbon
const old = box.querySelector('.ribbon-corner, .ribbon-side, .ribbon-side-r, .ribbon-top, .ribbon-bottom, .ribbon-circle, .ribbon-flag, .ribbon-fork, .ribbon-wrap');
if (old) old.remove();
let el;
if (currentStyle === 'wrap') {
el = document.createElement('div');
el.className = 'ribbon-wrap';
el.textContent = text;
el.style.fontSize = (0.85 * size) + 'rem';
el.style.padding = (14*size) + 'px ' + (26*size) + 'px';
el.style.background = color;
box.innerHTML = '';
box.appendChild(el);
} else {
el = document.createElement('div');
el.className = 'ribbon-' + currentStyle;
el.textContent = text;
el.style.background = color;
el.style.fontSize = (0.78 * size) + 'rem';
if (currentStyle === 'corner') {
el.style.top = (14*size) + 'px';
el.style.left = (-32*size) + 'px';
el.style.padding = (6*size) + 'px ' + (40*size) + 'px';
} else if (currentStyle === 'side') {
el.style.padding = (14*size) + 'px ' + (12*size) + 'px ' + (14*size) + 'px ' + (16*size) + 'px';
} else if (currentStyle === 'top' || currentStyle === 'bottom') {
el.style.padding = (8*size) + 'px ' + (32*size) + 'px';
} else if (currentStyle === 'circle') {
el.style.width = (60*size) + 'px';
el.style.height = (60*size) + 'px';
el.style.top = (14*size) + 'px';
el.style.right = (14*size) + 'px';
} else if (currentStyle === 'flag') {
el.style.bottom = (14*size) + 'px';
el.style.padding = (6*size) + 'px ' + (12*size) + 'px';
} else if (currentStyle === 'fork') {
el.style.top = (14*size) + 'px';
el.style.left = (14*size) + 'px';
el.style.padding = (6*size) + 'px ' + (18*size) + 'px ' + (6*size) + 'px ' + (12*size) + 'px';
}
box.appendChild(el);
}
const css = cssTemplates[currentStyle](color, size);
const html = getHtml(currentStyle, text, size);
$('#codeOut').textContent = '/* CSS */\n' + css + '\n\n/* HTML */\n' + html;
}

function buildTabs() {
const container = $('#tabs');
container.innerHTML = styles.map(s => `<button class="tab-btn ${s.id === currentStyle ? 'active' : ''}" data-style="${s.id}">${s.icon} ${t('tab' + s.id[0].toUpperCase() + s.id.slice(1))}</button>`).join('');
container.querySelectorAll('.tab-btn').forEach(btn => {
btn.addEventListener('click', () => {
currentStyle = btn.dataset.style;
container.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
btn.classList.add('active');
update();
});
});
}

$('#toolbar').innerHTML = `
<button class="gz-btn" onclick="copyText($('#codeOut').textContent)">${t('copyCss')}</button>
<button class="gz-btn gz-btn-secondary" id="copyHtmlBtn">${t('copyHtml')}</button>`;
document.getElementById('copyHtmlBtn').addEventListener('click', () => {
const text = $('#ribbonText').value || 'NEW';
const html = getHtml(currentStyle, text, parseFloat($('#ribbonSize').value));
copyText(html);
});

['ribbonText','ribbonColor','ribbonSize'].forEach(id => {
$('#' + id).addEventListener('input', update);
});
$('#ribbonBg').addEventListener('input', e => {
$('#previewBox').style.background = `linear-gradient(135deg, ${e.target.value}, ${shadeColor(e.target.value, -20)})`;
});

buildTabs();
update();
$('#lblText').textContent = t('lblText');
$('#lblColor').textContent = t('lblColor');
$('#lblBgColor').textContent = t('lblBgColor');
$('#lblSize').textContent = t('lblSize');

GZ.renderToolPage({
category: 'css',
titleKey: 'toolTitle',
descKey: 'toolDesc',
howToSteps: ['step1','step2','step3','step4'],
related: [
{icon:'✏️', href:'/css-tools/text-shadow.html', name:'Text Shadow'},
{icon:'✂️', href:'/css-tools/clip-path.html', name:'Clip-Path'},
{icon:'🔺', href:'/css-tools/triangle.html', name:'Triangle'},
{icon:'🔲', href:'/css-tools/box-model.html', name:'Box Model'},
]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
