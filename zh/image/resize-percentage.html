const { $, t } = GZ;
let images = []; // {file, originalUrl, originalSize, resultUrl, resultSize, newW, newH}

function fmtSize(b){
  if (b < 1024) return b + ' B';
  if (b < 1024*1024) return (b/1024).toFixed(1) + ' KB';
  return (b/1024/1024).toFixed(2) + ' MB';
}

function processFile(file){
  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        images.push({
          file, originalUrl: e.target.result, originalSize: file.size,
          width: img.naturalWidth, height: img.naturalHeight,
          name: file.name
        });
        resolve();
      };
      img.onerror = () => resolve();
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

async function loadFiles(files){
  for (const f of files) await processFile(f);
  if (images.length > 0) {
    $('#controls').style.display = '';
    $('#presets').style.display = '';
    $('#preview').style.display = '';
    $('#actions').style.display = '';
    render();
  }
}

function getTargetSize(origW, origH){
  const mode = $('#mode').value;
  const v1 = +$('#v1').value;
  const v2 = +$('#v2').value;
  if (mode === 'pct') {
    return { w: Math.round(origW * v1 / 100), h: Math.round(origH * v1 / 100) };
  } else if (mode === 'w') {
    return { w: v1, h: Math.round(origH * v1 / origW) };
  } else if (mode === 'h') {
    return { w: Math.round(origW * v2 / origH), h: v2 };
  } else {
    return { w: v1, h: v2 };
  }
}

function render(){
  if (images.length === 0) return;
  const img = images[0];
  $('#img-orig').src = img.originalUrl;
  $('#info-orig').textContent = `${img.width} × ${img.height}px · ${fmtSize(img.originalSize)} · ${img.name}`;

  // Show batch
  if (images.length > 1) {
    $('#batch').innerHTML = images.map((im, i) => `<div class="item"><img src="${im.originalUrl}"><div class="name">${im.name}</div></div>`).join('');
  } else {
    $('#batch').innerHTML = '';
  }

  renderResult();
}

function renderResult(){
  if (images.length === 0) return;
  const img = images[0];
  const { w, h } = getTargetSize(img.width, img.height);
  if (w < 1 || h < 1) {
    $('#img-result').removeAttribute('src');
    $('#info-result').textContent = 'Invalid dimensions';
    return;
  }
  const canvas = document.createElement('canvas');
  canvas.width = w;
  canvas.height = h;
  const ctx = canvas.getContext('2d');
  ctx.imageSmoothingEnabled = true;
  ctx.imageSmoothingQuality = 'high';
  const orig = new Image();
  orig.onload = () => {
    ctx.drawImage(orig, 0, 0, w, h);
    const format = $('#format').value;
    const q = +$('#quality').value / 100;
    const url = canvas.toDataURL(format, format === 'image/png' ? undefined : q);
    canvas.toBlob(blob => {
      img.resultUrl = url;
      img.resultSize = blob.size;
      img.resultFormat = format;
      img.resultW = w;
      img.resultH = h;
      $('#img-result').src = url;
      const savings = ((1 - blob.size / img.originalSize) * 100).toFixed(0);
      const sizeStr = blob.size < img.originalSize ? `${fmtSize(blob.size)} (-${savings}%)` : `${fmtSize(blob.size)} (+${Math.abs(savings)}%)`;
      $('#info-result').textContent = `${w} × ${h}px · ${sizeStr}`;
    }, format, q);
  };
  orig.src = img.originalUrl;
}

document.getElementById('file').addEventListener('change', e => loadFiles(e.target.files));
const drop = document.getElementById('drop');
drop.addEventListener('dragover', e => { e.preventDefault(); drop.classList.add('dragover'); });
drop.addEventListener('dragleave', () => drop.classList.remove('dragover'));
drop.addEventListener('drop', e => {
  e.preventDefault();
  drop.classList.remove('dragover');
  loadFiles(e.dataTransfer.files);
});

['mode','v1','v2','format','quality'].forEach(id => {
  document.getElementById(id).addEventListener('input', () => {
    const mode = $('#mode').value;
    $('#v2-wrap').style.display = mode === 'exact' ? '' : 'none';
    // Update label
    if (mode === 'pct') { $('#lbl-value1').textContent = 'Percentage (%)'; }
    else if (mode === 'w') { $('#lbl-value1').textContent = 'Width (px)'; }
    else if (mode === 'h') { $('#lbl-value2').textContent = 'Height (px)'; $('#lbl-value1').textContent = 'Height (px)'; }
    else { $('#lbl-value1').textContent = 'Width (px)'; $('#lbl-value2').textContent = 'Height (px)'; }
    if (mode !== 'exact') $('#v1-wrap') && ($('#v1-wrap').style.display = '');
    if (mode === 'pct') {
      $('#presets').style.display = '';
    } else {
      $('#presets').style.display = 'none';
    }
    renderResult();
  });
});

document.querySelectorAll('.ir-preset').forEach(p => {
  p.addEventListener('click', () => {
    document.querySelectorAll('.ir-preset').forEach(x => x.classList.remove('active'));
    p.classList.add('active');
    $('#mode').value = 'pct';
    $('#v1').value = p.dataset.p;
    renderResult();
  });
});

document.getElementById('btn-download').addEventListener('click', () => {
  const img = images[0];
  if (!img.resultUrl) return;
  const a = document.createElement('a');
  a.href = img.resultUrl;
  const ext = img.resultFormat === 'image/png' ? '.png' : img.resultFormat === 'image/webp' ? '.webp' : '.jpg';
  a.download = img.name.replace(/\.[^.]+$/, '') + '_resized' + ext;
  a.click();
});

document.getElementById('btn-download-all').addEventListener('click', async () => {
  if (images.length === 0) return;
  // Re-render all to make sure each has a result URL
  for (const img of images) {
    const { w, h } = getTargetSize(img.width, img.height);
    const canvas = document.createElement('canvas');
    canvas.width = w; canvas.height = h;
    const ctx = canvas.getContext('2d');
    ctx.imageSmoothingQuality = 'high';
    const orig = new Image();
    await new Promise(r => { orig.onload = r; orig.src = img.originalUrl; });
    ctx.drawImage(orig, 0, 0, w, h);
    const format = $('#format').value;
    const q = +$('#quality').value / 100;
    await new Promise(r => {
      canvas.toBlob(blob => {
        img.resultUrl = URL.createObjectURL(blob);
        img.resultBlob = blob;
        img.resultFormat = format;
        r();
      }, format, q);
    });
  }
  if (images.length === 1) {
    document.getElementById('btn-download').click();
    return;
  }
  // Build simple ZIP
  const files = images.map(img => ({
    name: img.name.replace(/\.[^.]+$/, '') + '_resized' + (img.resultFormat === 'image/png' ? '.png' : img.resultFormat === 'image/webp' ? '.webp' : '.jpg'),
    blob: img.resultBlob
  }));
  // Use a minimal ZIP writer
  const zip = await buildZip(files);
  const url = URL.createObjectURL(zip);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'resized_images.zip';
  a.click();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
});

document.getElementById('btn-reset').addEventListener('click', () => {
  images.forEach(img => { if (img.resultUrl && img.resultUrl.startsWith('blob:')) URL.revokeObjectURL(img.resultUrl); });
  images = [];
  $('#controls').style.display = 'none';
  $('#presets').style.display = 'none';
  $('#preview').style.display = 'none';
  $('#actions').style.display = 'none';
  $('#batch').innerHTML = '';
  $('#img-orig').removeAttribute('src');
  $('#img-result').removeAttribute('src');
  $('#info-orig').textContent = '';
  $('#info-result').textContent = '';
  $('#file').value = '';
});

// Minimal ZIP writer (store-only, no compression)
async function buildZip(files){
  const enc = new TextEncoder();
  const local = [];
  const central = [];
  let offset = 0;
  for (const f of files) {
    const nameBytes = enc.encode(f.name);
    const data = new Uint8Array(await f.blob.arrayBuffer());
    const crc = crc32(data);
    // Local file header
    const lh = new Uint8Array(30 + nameBytes.length);
    const dv = new DataView(lh.buffer);
    dv.setUint32(0, 0x04034b50, true);
    dv.setUint16(4, 20, true);  // version
    dv.setUint16(6, 0, true);   // flags
    dv.setUint16(8, 0, true);   // method (0 = store)
    dv.setUint16(10, 0, true);  // mod time
    dv.setUint16(12, 0, true);  // mod date
    dv.setUint32(14, crc, true);
    dv.setUint32(18, data.length, true);
    dv.setUint32(22, data.length, true);
    dv.setUint16(26, nameBytes.length, true);
    dv.setUint16(28, 0, true);  // extra length
    lh.set(nameBytes, 30);
    local.push(lh, data);
    // Central directory header
    const ch = new Uint8Array(46 + nameBytes.length);
    const cv = new DataView(ch.buffer);
    cv.setUint32(0, 0x02014b50, true);
    cv.setUint16(4, 20, true);
    cv.setUint16(6, 20, true);
    cv.setUint16(8, 0, true);
    cv.setUint16(10, 0, true);
    cv.setUint16(12, 0, true);
    cv.setUint16(14, 0, true);
    cv.setUint32(16, crc, true);
    cv.setUint32(20, data.length, true);
    cv.setUint32(24, data.length, true);
    cv.setUint16(28, nameBytes.length, true);
    cv.setUint16(30, 0, true);
    cv.setUint16(32, 0, true);
    cv.setUint16(34, 0, true);
    cv.setUint16(36, 0, true);
    cv.setUint32(38, 0, true);
    cv.setUint32(42, offset, true);
    ch.set(nameBytes, 46);
    central.push(ch);
    offset += lh.length + data.length;
  }
  // End of central directory
  const cdSize = central.reduce((s, c) => s + c.length, 0);
  const eocd = new Uint8Array(22);
  const ev = new DataView(eocd.buffer);
  ev.setUint32(0, 0x06054b50, true);
  ev.setUint16(4, 0, true);
  ev.setUint16(6, 0, true);
  ev.setUint16(8, files.length, true);
  ev.setUint16(10, files.length, true);
  ev.setUint32(12, cdSize, true);
  ev.setUint32(16, offset, true);
  ev.setUint16(20, 0, true);
  return new Blob([...local, ...central, eocd], { type: 'application/zip' });
}

// CRC32 for ZIP
const CRC_TABLE = new Uint32Array(256);
for (let i = 0; i < 256; i++) {
  let c = i;
  for (let k = 0; k < 8; k++) c = c & 1 ? 0xedb88320 ^ (c >>> 1) : c >>> 1;
  CRC_TABLE[i] = c;
}
function crc32(bytes){
  let c = 0xffffffff;
  for (let i = 0; i < bytes.length; i++) c = CRC_TABLE[(c ^ bytes[i]) & 0xff] ^ (c >>> 8);
  return (c ^ 0xffffffff) >>> 0;
}
