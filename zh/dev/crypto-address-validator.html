function base58Decode(str) {
  let num = BigInt(0);
  for (const ch of str) {
    const idx = B58_ALPHABET.indexOf(ch);
    if (idx === -1) return null;
    num = num * 58n + BigInt(idx);
  }
  const hex = num.toString(16).padStart(Math.ceil(str.length * 733 / 1000) * 2, '0');
  // Count leading '1's = leading zero bytes
  let leadingZeros = 0;
  for (const ch of str) {
    if (ch === '1') leadingZeros++;
    else break;
  }
  const fullHex = '00'.repeat(leadingZeros) + hex;
  const bytes = new Uint8Array(fullHex.match(/../g).map(h => parseInt(h, 16)));
  return bytes;
}

// Main validation
async function validateAddress(addr) {
  const a = addr.trim();
  if (!a) return null;

  // Ethereum (0x + 40 hex)
  if (/^0x[a-fA-F0-9]{40}$/.test(a)) {
    const lower = a.toLowerCase();
    const upper = a.toUpperCase();
    const hasChecksum = a !== lower && a !== upper;
    return {
      valid: true,
      coin: 'Ethereum',
      symbol: 'ETH',
      network: 'Mainnet',
      type: hasChecksum ? 'EIP-55 Checksummed' : 'Plain hex (no checksum)',
      address: a,
      note: 'Compatible with all EVM chains (BSC, Polygon, Arbitrum, etc.)'
    };
  }

  // Bitcoin Bech32 (bc1...)
  if (/^bc1[a-z0-9]{39,59}$/i.test(a)) {
    const decoded = bech32Decode(a.toLowerCase());
    if (!decoded) return { valid: false, input: a, reason: 'Invalid Bech32 encoding' };
    const witver = decoded.data[0];
    return {
      valid: true,
      coin: 'Bitcoin',
      symbol: 'BTC',
      network: 'Mainnet',
      type: witver === 0 ? 'SegWit (P2WPKH/P2WSH)' : witver === 1 ? 'Taproot (P2TR)' : `Witness v${witver}`,
      address: a,
      note: decoded.spec === 'bech32' ? 'Bech32' : 'Bech32m'
    };
  }

  // Bitcoin Base58 (1... = P2PKH, 3... = P2SH)
  if (/^[13][a-km-zA-HJ-NP-Z1-9]{25,34}$/.test(a)) {
    return {
      valid: true,
      coin: 'Bitcoin',
      symbol: 'BTC',
      network: 'Mainnet',
      type: a[0] === '1' ? 'Legacy (P2PKH)' : 'Nested SegWit (P2SH)',
      address: a,
      note: 'Base58Check encoding'
    };
  }

  // Litecoin Bech32 (ltc1...)
  if (/^ltc1[a-z0-9]{39,59}$/i.test(a)) {
    return {
      valid: true,
      coin: 'Litecoin',
      symbol: 'LTC',
      network: 'Mainnet',
      type: 'SegWit (Bech32)',
      address: a
    };
  }

  // Litecoin Base58 (L... = P2PKH, M... = P2SH)
  if (/^[LM][a-km-zA-HJ-NP-Z1-9]{25,34}$/.test(a)) {
    return {
      valid: true,
      coin: 'Litecoin',
      symbol: 'LTC',
      network: 'Mainnet',
      type: a[0] === 'L' ? 'Legacy (P2PKH)' : 'P2SH',
      address: a
    };
  }

  // Dogecoin (D... = P2PKH)
  if (/^D[a-km-zA-HJ-NP-Z1-9]{25,34}$/.test(a)) {
    return {
      valid: true,
      coin: 'Dogecoin',
      symbol: 'DOGE',
      network: 'Mainnet',
      type: 'Legacy (P2PKH)',
      address: a
    };
  }

  // Solana (base58, 32-44 chars)
  if (/^[1-9A-HJ-NP-Za-km-z]{32,44}$/.test(a) && a.length >= 32 && a.length <= 44) {
    // Check it's not a Bitcoin address already caught
    if (!a.match(/^[13DLM]/) || a.length < 25) {
      return {
        valid: true,
        coin: 'Solana',
        symbol: 'SOL',
        network: 'Mainnet',
        type: 'Ed25519 Public Key',
        address: a,
        note: 'Base58 encoded'
      };
    }
  }

  // Tron (T + base58, 34 chars)
  if (/^T[a-zA-Z0-9]{33}$/.test(a)) {
    return {
      valid: true,
      coin: 'Tron',
      symbol: 'TRX',
      network: 'Mainnet',
      type: 'Base58Check',
      address: a
    };
  }

  // Cardano (addr1...)
  if (/^addr1[a-z0-9]{50,120}$/.test(a)) {
    return {
      valid: true,
      coin: 'Cardano',
      symbol: 'ADA',
      network: 'Mainnet',
      type: 'Bech32 (Shelley)',
      address: a
    };
  }

  // Ripple (r...)
  if (/^r[a-km-zA-HJ-NP-Z1-9]{24,34}$/.test(a)) {
    return {
      valid: true,
      coin: 'Ripple',
      symbol: 'XRP',
      network: 'Mainnet',
      type: 'Base58Check',
      address: a
    };
  }

  // Polkadot (1..., 47-48 chars)
  if (/^1[a-km-zA-HJ-NP-Z1-9]{46,47}$/.test(a)) {
    return {
      valid: true,
      coin: 'Polkadot',
      symbol: 'DOT',
      network: 'Mainnet (Polkadot)',
      type: 'SS58 Address',
      address: a
    };
  }

  // Cosmos (cosmos...)
  if (/^cosmos[a-km-zA-HJ-NP-Z1-9]{38,45}$/.test(a)) {
    return {
      valid: true,
      coin: 'Cosmos',
      symbol: 'ATOM',
      network: 'Cosmos Hub',
      type: 'Bech32',
      address: a
    };
  }

  // Bitcoin Testnet Bech32
  if (/^tb1[a-z0-9]{39,59}$/i.test(a)) {
    return {
      valid: true,
      coin: 'Bitcoin',
      symbol: 'BTC',
      network: 'Testnet',

  return {

async function doValidate() {
  const inp = $('#input').value.trim();
  if (!inp) { $('#output').innerHTML = ''; return; }
  const lines = inp.split('\n').map(l => l.trim()).filter(l => l);
  const results = await Promise.all(lines.map(l => validateAddress(l)));
  const html = results.map(r => {
    if (!r) return '';
    if (!r.valid) {
      return `<div class="addr-result addr-invalid">
        <div><strong>✗ Unrecognized</strong></div>
        <div style="margin-top:6px"><code style="font-size:.85em;color:var(--text2)">${escapeHtml(r.input)}</code></div>
        <div style="color:var(--text2);font-size:.8em;margin-top:4px">${r.reason}</div>
      </div>`;
    }
    let details = '';
    if (r.type) details += `<div class="detail-row"><span class="label">Type:</span><span class="value">${r.type}</span></div>`;
    if (r.network) details += `<div class="detail-row"><span class="label">Network:</span><span class="value">${r.network}</span></div>`;
    if (r.note) details += `<div class="detail-row"><span class="label">Note:</span><span class="value">${r.note}</span></div>`;
    return `<div class="addr-result addr-valid">
      <div><strong>✓ Valid</strong> <span class="coin-badge" style="background:${coinColor(r.symbol)};color:#000">${r.symbol}</span> ${r.coin}</div>
      <div style="margin-top:6px"><code style="font-size:.8em;word-break:break-all">${escapeHtml(r.address)}</code></div>
      ${details}
    </div>`;
  }).join('');
  $('#output').innerHTML = html || '<span style="color:var(--text2)">No addresses found</span>';
}

  return colors[sym] || 'var(--accent)';
}
