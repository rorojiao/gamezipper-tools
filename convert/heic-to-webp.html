<script>
GZI18n.register({
  en:{toolTitle:'HEIC to WebP Converter',toolDesc:'Convert iPhone HEIC/HEIF photos to WebP format online. Batch convert with quality control and transparency support. Free, no upload, no signup.',
    s1:'Select or drag HEIC/HEIF images',s2:'Adjust the WebP quality slider',
    s3:'Click Convert All to WebP',s4:'Download each converted WebP file',
    dropHint:'Drop HEIC/HEIF images here or click to upload',qLabel:'Quality:',
    files:'files',original:'Original:',converted:'Converted:',
    reset:'↩️ Reset',download:'⬇ Download WebP',
    rHeicJpg:'HEIC to JPG',rHeicPng:'HEIC to PNG',rJpgWebp:'JPG to WebP',rImgConv:'Image Converter'},
  zh:{toolTitle:'HEIC 转 WebP 转换器',toolDesc:'将 iPhone HEIC/HEIF 照片在线转换为 WebP 格式。批量转换、可调质量、保留透明通道。免费，无需上传、无需注册。',
    s1:'选择或拖放 HEIC/HEIF 图片',s2:'调整 WebP 质量滑块',
    s3:'点击「全部转换为 WebP」',s4:'下载每张转换后的 WebP 文件',
    dropHint:'拖放 HEIC/HEIF 图片到此处或点击上传',qLabel:'质量：',
    files:'个文件',original:'原始：',converted:'转换后：',
    reset:'↩️ 重置',download:'⬇ 下载 WebP',
    rHeicJpg:'HEIC 转 JPG',rHeicPng:'HEIC 转 PNG',rJpgWebp:'JPG 转 WebP',rImgConv:'图片格式转换'}
});
const {t}=GZI18n;
let files=[];let convertedBlobs={};
document.getElementById('dropText').textContent=t('dropHint');
document.getElementById('qLabel').textContent=t('qLabel');
const dz=document.getElementById('dropzone'),fi=document.getElementById('fileIn');
dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('drag-over')});
dz.addEventListener('dragleave',()=>dz.classList.remove('drag-over'));
dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('drag-over');handleFiles(e.dataTransfer.files)});
fi.addEventListener('change',e=>{handleFiles(e.target.files)});
const qSlider=document.getElementById('qSlider'),qVal=document.getElementById('qVal');
qSlider.addEventListener('input',()=>{qVal.textContent=qSlider.value+'%'});
function handleFiles(fl){files=Array.from(fl).filter(f=>/\.heic$/i.test(f.name)||/\.heif$/i.test(f.name)||f.type==='image/heic'||f.type==='image/heif');if(!files.length)return;document.getElementById('controls').style.display='block';dz.style.display='none';renderList();updateSummary()}
function fmt(b){return b>1048576?(b/1048576).toFixed(1)+' MB':(b/1024).toFixed(1)+' KB'}
function renderList(){const r=document.getElementById('results');r.innerHTML='';files.forEach((f,i)=>{const card=document.createElement('div');card.className='result-card';card.innerHTML=`<div style="width:120px;height:120px;display:flex;align-items:center;justify-content:center;font-size:2rem">📱</div><div class="meta"><div class="name">${f.name}</div><div class="size">${t('original')} ${fmt(f.size)} · HEIC</div></div><div id="result-info-${i}"></div>`;r.appendChild(card)})}
function updateSummary(){document.getElementById('summary').innerHTML=`<span class="num">${files.length}</span> ${t('files')}`}
async function convertAll(){
  const q=+qSlider.value/100;
  for(let i=0;i<files.length;i++){
    const f=files[i];
    try{
      const blob=await heic2any({blob:f,toType:'image/png'});
      const pngBlob=Array.isArray(blob)?blob[0]:blob;
      const bmp=await createImageBitmap(pngBlob);
      const c=document.createElement('canvas');c.width=bmp.width;c.height=bmp.height;
      const ctx=c.getContext('2d');ctx.drawImage(bmp,0,0);
      c.toBlob(b=>{
        const el=document.getElementById('result-info-'+i);
        if(el){
          const save=f.size-b.size;const pct2=((save/f.size)*100);
          const saveTxt=save>0?`↓${pct2.toFixed(0)}%`:'↑'+Math.abs(pct2).toFixed(0)+'%';
          el.innerHTML=`<div class="size">${t('converted')} <span class="num">${fmt(b.size)}</span> <span class="save" style="color:${save>0?'var(--gz-success)':'var(--gz-accent)'}">${saveTxt}</span></div><button class="gz-btn" style="margin-top:.3rem;font-size:.8rem;padding:.3rem .8rem" onclick="downloadBlob(${i})">${t('download')}</button>`;
          const imgEl=el.closest('.result-card').querySelector('div');imgEl.outerHTML=`<img src="${URL.createObjectURL(b)}">`;
        }
        convertedBlobs[i]=b;
      },'image/webp',q);
    }catch(err){
      const el=document.getElementById('result-info-'+i);
      if(el)el.innerHTML=`<span style="color:var(--gz-accent)">⚠ ${err.message||'Cannot decode this HEIC file'}</span>`;
    }
  }
}
function downloadBlob(i){const b=convertedBlobs[i];if(!b)return;const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=files[i].name.replace(/\.[^.]+$/,'')+'.webp';a.click()}
function resetTool(){files=[];convertedBlobs={};document.getElementById('controls').style.display='none';dz.style.display='block';fi.value=''}
GZ.renderToolPage({category:'convert',titleKey:'toolTitle',descKey:'toolDesc',
  howToSteps:['s1','s2','s3','s4'],
  related:[
    {href:'/convert/heic-to-jpg.html',icon:'📱',nameKey:'rHeicJpg'},
    {href:'/convert/heic-to-png.html',icon:'📱',nameKey:'rHeicPng'},
    {href:'/convert/jpg-to-webp.html',icon:'🌐',nameKey:'rJpgWebp'},
    {href:'/image/converter.html',icon:'🔄',nameKey:'rImgConv'}
  ]
});
</script>

</body>
