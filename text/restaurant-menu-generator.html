<style>
.layout{display:grid;grid-template-columns:380px 1fr;gap:18px;align-items:start}

.field{display:flex;flex-direction:column;gap:4px;margin-bottom:10px}
.field label{font-size:.78em;font-weight:600;color:var(--text2)}
.field input,.field select,.field textarea{background:var(--glass);border:1px solid var(--border);border-radius:8px;padding:8px 10px;color:var(--text);font-size:.9em;font-family:inherit;resize:vertical}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--accent)}

.item-row{display:grid;grid-template-columns:1fr 80px auto;gap:6px;margin-bottom:6px;align-items:start}
.item-row input{background:var(--glass);border:1px solid var(--border);border-radius:6px;padding:6px 8px;color:var(--text);font-size:.85em}
.item-row textarea{background:var(--glass);border:1px solid var(--border);border-radius:6px;padding:6px 8px;color:var(--text2);font-size:.78em;min-height:34px;grid-column:1/-1}
.mini-btn{padding:4px 8px;border-radius:6px;border:1px solid var(--border);background:var(--glass);color:var(--text);font-size:.75em;cursor:pointer}
.mini-btn:hover{background:var(--accent);color:#000}
.live{background:var(--glass);border:1px solid var(--border);border-radius:14px;padding:32px;min-height:520px;position:sticky;top:14px}
.live .menu-name{font-family:Georgia,serif;font-size:2rem;font-weight:700;text-align:center;border-bottom:2px solid currentColor;padding-bottom:8px;margin-bottom:6px}
.live .menu-tag{text-align:center;font-style:italic;color:var(--text2);margin-bottom:18px;font-size:.9em}
.live .menu-cat-name{font-family:Georgia,serif;font-size:1.15rem;font-weight:700;margin:18px 0 8px;border-bottom:1px dashed var(--border);padding-bottom:4px}
.live .menu-item{display:flex;justify-content:space-between;gap:12px;margin-bottom:6px;align-items:baseline}
.live .menu-item .nm{font-weight:600}
.live .menu-item .pr{font-family:Georgia,serif;font-weight:700;white-space:nowrap}
.live .menu-item .ds{font-size:.82em;color:var(--text2);font-style:italic;margin-bottom:6px;width:100%}
.live .menu-footer{text-align:center;margin-top:24px;font-size:.78em;color:var(--text3);border-top:1px solid var(--border);padding-top:10px}
.live .menu-qr{margin:14px auto 0;text-align:center}
</style>

<body>
<div class="gz-container">
<div class="gz-tool-header"><h1 id="title"></h1><p class="desc" id="desc"></p></div>
<div class="gz-tool-area">
<div class="gz-toolbar" id="toolbar"></div>
<div class="layout">
<div>
<div class="field"><label id="lbl-rname"></label><input type="text" id="f-name" value="Bella Trattoria" oninput="render()"></div>
<div class="field"><label id="lbl-tag"></label><input type="text" id="f-tag" value="Authentic Italian · Est. 1998" oninput="render()"></div>
<div class="field"><label id="lbl-currency"></label><select id="f-currency" class="gz-select" onchange="render()">
<option value="$">$ USD</option><option value="€">€ EUR</option><option value="£">£ GBP</option><option value="¥">¥ JPY/CNY</option><option value="₹">₹ INR</option><option value="₩">₩ KRW</option><option value="R$">R$ BRL</option><option value="₦">₦ NGN</option>
</select></div>

<div class="field"><label id="lbl-footer"></label><input type="text" id="f-footer" value="Thank you for dining with us!" oninput="render()"></div>
<hr style="border:none;border-top:1px solid var(--border);margin:14px 0">

<button class="gz-btn gz-btn-secondary" id="add-cat" onclick="addCategory()">➕ <span id="lbl-addcat"></span></button>

<script>
GZI18n.register({
en:{
toolTitle:'Restaurant Menu Generator',
toolDesc:'Build a clean printable restaurant menu with categories, dishes, descriptions and prices. Add a QR code, download a standalone HTML menu, or print to PDF. Free and private.',
lblRname:'Restaurant name',
lblTag:'Tagline / subtitle',
lblCurrency:'Currency symbol',
lblMenuurl:'Menu URL (optional — for QR code)',
hintUrl:'Paste your online menu URL. A scannable QR code appears on the printed menu.',
lblFooter:'Footer text',
lblAddcat:'Add category',
lblCat:'Category name',
addItem:'+ Add dish',
delCat:'Remove category',
step1:'Enter your restaurant name, tagline and currency.',
step2:'Add categories like Appetizers, Mains and Desserts.',
step3:'Under each category, add dishes with a name, price and optional description.',
step4:'Click Download to save a standalone HTML menu, or Print to export as PDF.',
},
zh:{
toolTitle:'餐厅菜单生成器',
toolDesc:'制作干净的、可打印的餐厅菜单，包含分类、菜品、描述和价格。支持添加二维码、下载独立 HTML 菜单或打印为 PDF。免费且私密。',
lblRname:'餐厅名称',
lblTag:'标语 / 副标题',
lblCurrency:'货币符号',
lblMenuurl:'菜单 URL（可选 — 用于二维码）',
hintUrl:'粘贴你的在线菜单网址。打印的菜单上将显示可扫描的二维码。',
lblFooter:'页脚文字',
lblAddcat:'添加分类',
lblCat:'分类名称',
addItem:'+ 添加菜品',
delCat:'删除分类',
step1:'输入餐厅名称、标语和货币。',
step2:'添加分类，如开胃菜、主菜和甜点。',
step3:'在每个分类下添加菜品，含名称、价格和可选描述。',
step4:'点击「下载」保存独立 HTML 菜单，或「打印」导出为 PDF。',
}
});

const { $, t } = GZ;

let data = {
name:'Bella Trattoria',
tag:'Authentic Italian · Est. 1998',
footer:'Thank you for dining with us!',
categories:[
{name:'Antipasti', items:[
{n:'Bruschetta', p:'8', d:'Toasted ciabatta, tomato, basil, garlic'},
{n:'Caprese Salad', p:'11', d:'Fresh mozzarella, tomato, basil, olive oil'},
]},
{name:'Pasta', items:[
{n:'Spaghetti Carbonara', p:'16', d:'Guanciale, egg, pecorino, black pepper'},
{n:'Tagliatelle al Ragù', p:'17', d:'Slow-cooked beef ragù, fresh tagliatelle'},
]},
{name:'Dolci', items:[
{n:'Tiramisu', p:'9', d:'Mascarpone, espresso, cocoa, savoiardi'},
]},
]};

function esc(s){return (s==null?'':String(s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function renderForm(){
  // re-render only the categories block
  const cats = $('#categories');
  cats.innerHTML = data.categories.map((c,ci)=>{
    return '<div class="cat-block" data-ci="'+ci+'">'+
      '<div class="cat-head"><input type="text" value="'+esc(c.name)+'" placeholder="'+t('lblCat')+'" oninput="updateCatName('+ci+',this.value)">'+
      '<button class="mini-btn" onclick="removeCategory('+ci+')">✕</button></div>'+
      c.items.map((it,ii)=>'<div class="item-row">'+
        '<input type="text" value="'+esc(it.n)+'" placeholder="Dish name" oninput="updateItem('+ci+','+ii+',\'n\',this.value)">'+
        '<input type="text" value="'+esc(it.p)+'" placeholder="0.00" oninput="updateItem('+ci+','+ii+',\'p\',this.value)">'+
        '<button class="mini-btn" onclick="removeItem('+ci+','+ii+')">✕</button>'+
        '<textarea placeholder="Short description (optional)" oninput="updateItem('+ci+','+ii+',\'d\',this.value)">'+esc(it.d)+'</textarea>'+
      '</div>').join('')+
      '<button class="mini-btn" onclick="addItem('+ci+')">'+t('addItem')+'</button>'+
    '</div>';
  }).join('');
}

function renderPreview(){
  const cur = $('#f-currency').value;
  const name = $('#f-name').value || 'Your Restaurant';
  const tag = $('#f-tag').value;
  const footer = $('#f-footer').value;
  const url = ($('#f-url').value||'').trim();
  const cats = data.categories;

  let html = '<div class="menu-name">'+esc(name)+'</div>';
  if(tag) html += '<div class="menu-tag">'+esc(tag)+'</div>';
  cats.forEach(c=>{
    if(!c.items.length && !c.name) return;
    html += '<div class="menu-cat-name">'+esc(c.name||'Category')+'</div>';
    c.items.forEach(it=>{
      html += '<div class="menu-item"><span class="nm">'+esc(it.n||'Dish')+'</span><span class="pr">'+(it.p?cur+esc(it.p):'')+'</span></div>';
      if(it.d) html += '<div class="menu-item"><span class="ds">'+esc(it.d)+'</span></div>';
    });
  });
  if(url){
    // Live preview shows a local placeholder only — the tool itself never sends any data
    // anywhere. The downloadable HTML file (which the user owns and hosts) is where the
    // real scannable QR code is embedded via a public QR image service, at the user's choice.
    html += '<div class="menu-qr">'+
      '<div style="width:140px;height:140px;margin:0 auto;background:#fff;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;color:#666;text-align:center;padding:8px;font-family:system-ui,sans-serif">▤<br>QR code<br>(included<br>in download)</div>'+
      '<div style="font-size:.75em;color:var(--text3);margin-top:6px">Scan for our online menu</div></div>';
  }
  if(footer) html += '<div class="menu-footer">'+esc(footer)+'</div>';
  $('#preview').innerHTML = html;
}

function render(){
  data.name = $('#f-name').value;
  data.tag = $('#f-tag').value;
  data.footer = $('#f-footer').value;
  renderPreview();
}

function updateCatName(i,v){ data.categories[i].name = v; renderPreview(); }
function updateItem(ci,ii,f,v){ data.categories[ci].items[ii][f] = v; renderPreview(); }
function addItem(ci){ data.categories[ci].items.push({n:'',p:'',d:''}); renderForm(); renderPreview(); }
function removeItem(ci,ii){ data.categories[ci].items.splice(ii,1); renderForm(); renderPreview(); }
function addCategory(){ data.categories.push({name:'New Category', items:[{n:'',p:'',d:''}]}); renderForm(); renderPreview(); }
function removeCategory(ci){ data.categories.splice(ci,1); renderForm(); renderPreview(); }

// ---- Minimal QR encoder removed — the live preview uses a local placeholder and the
//      downloadable menu (user-owned artifact) embeds a public QR image service. ----

function downloadMenu(){
  const cur = $('#f-currency').value;
  const name = $('#f-name').value || 'Menu';
  const tag = $('#f-tag').value;
  const footer = $('#f-footer').value;
  const url = ($('#f-url').value||'').trim();
  const cats = data.categories;

  let body = '<h1>'+esc(name)+'</h1>';
  if(tag) body += '<p class="tag">'+esc(tag)+'</p>';
  cats.forEach(c=>{
    if(!c.items.length && !c.name) return;
    body += '<h2>'+esc(c.name||'Category')+'</h2>';
    c.items.forEach(it=>{
      body += '<div class="item"><span class="nm">'+esc(it.n||'Dish')+'</span>'+
        '<span class="dots"></span>'+
        '<span class="pr">'+(it.p?cur+esc(it.p):'')+'</span></div>';
      if(it.d) body += '<div class="desc">'+esc(it.d)+'</div>';
    });
  });
  if(url) body += '<div style="text-align:center;margin-top:30px"><img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data='+encodeURIComponent(url)+'" width="160" height="160" alt="Menu QR"><div style="font-size:.8em;color:#888;margin-top:6px">Scan for our online menu</div></div>';
  if(footer) body += '<div class="footer">'+esc(footer)+'</div>';

  const css = 'body{font-family:Georgia,serif;max-width:680px;margin:30px auto;padding:20px;color:#222;line-height:1.5}'+
    'h1{text-align:center;font-size:2.4rem;margin-bottom:0;border-bottom:2px solid #222;padding-bottom:8px}'+
    '.tag{text-align:center;font-style:italic;color:#555;margin:6px 0 24px}'+
    'h2{font-size:1.3rem;margin:26px 0 10px;border-bottom:1px dashed #999;padding-bottom:4px}'+
    '.item{display:flex;align-items:baseline;margin:6px 0}'+
    '.item .nm{font-weight:600}'+
    '.item .dots{flex:1;border-bottom:1px dotted #bbb;margin:0 8px;transform:translateY(-4px)}'+
    '.item .pr{font-weight:700;white-space:nowrap}'+
    '.desc{font-size:.85em;color:#666;font-style:italic;margin:0 0 8px}'+
    '.footer{text-align:center;margin-top:30px;font-size:.85em;color:#888;border-top:1px solid #ccc;padding-top:12px}'+
    '@media print{body{margin:0}}';

  const html = '<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>'+esc(name)+' — Menu</title><style>'+css+'</style></head><body>'+body+'</body></html>';
  const blob = new Blob([html], {type:'text/html'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = (name.replace(/[^a-z0-9]+/gi,'-').toLowerCase()||'menu')+'-menu.html';
  a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href), 1000);
}

function printMenu(){ window.print(); }

$('#lbl-rname').textContent = t('lblRname');
$('#lbl-tag').textContent = t('lblTag');
$('#lbl-currency').textContent = t('lblCurrency');
$('#lbl-menuurl').textContent = t('lblMenuurl');
$('#hint-url').textContent = t('hintUrl');
$('#lbl-footer').textContent = t('lblFooter');
$('#lbl-addcat').textContent = t('lblAddcat');

$('#toolbar').innerHTML =
  '<button class="gz-btn" onclick="downloadMenu()">⬇️ '+t('download')+'</button>'+
  '<button class="gz-btn gz-btn-secondary" onclick="printMenu()">🖨️ Print</button>';

renderForm();
renderPreview();

GZ.renderToolPage({
  category:'text',
  titleKey:'toolTitle',
  descKey:'toolDesc',
  howToSteps:['step1','step2','step3','step4'],
  related:[
    {icon:'🍝', href:'/text/invoice-generator.html', name:'Invoice Generator'},
    {icon:'🧾', href:'/text/receipt-generator.html', name:'Receipt Maker'},
    {icon:'🖼️', href:'/image/poster-maker.html', name:'Poster Maker'},
    {icon:'📷', href:'/convert/qrcode.html', name:'QR Code Generator'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
