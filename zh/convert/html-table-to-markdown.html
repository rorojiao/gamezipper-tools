    step2: '点击「转换」生成 Markdown 表格',
    step3: '自动从 <th> 或第一行检测表头',
    step4: '复制 Markdown 输出到剪贴板',
  }

const { $, copyText, t } = GZ;

function escapeMd(s) {
  return s.replace(/\|/g, '\\|').replace(/\n/g, ' ').trim();
}

function convert() {
  const html = $('#input').value.trim();
  if (!html) return;
  const doc = new DOMParser().parseFromString(html, 'text/html');
  const tables = doc.querySelectorAll('table');
  if (!tables.length) { $('#output').textContent = t('noTable'); return; }

  let md = '';
  tables.forEach((table, idx) => {
    if (idx > 0) md += '\n\n';
    const rows = table.querySelectorAll('tr');
    if (!rows.length) return;

    const maxCols = Math.max(...Array.from(rows).map(r => r.querySelectorAll('td,th').length));
    let headerDone = false;

    rows.forEach((row, ri) => {
      const cells = row.querySelectorAll('td, th');
      const isHeaderRow = Array.from(cells).every(c => c.tagName === 'TH');
      const parts = [];
      for (let i = 0; i < maxCols; i++) {
        const cell = cells[i];
        parts.push(cell ? escapeMd(cell.textContent) : '');
      }
      md += '| ' + parts.join(' | ') + ' |\n';

      if (!headerDone && (isHeaderRow || ri === 0)) {
        md += '| ' + parts.map(() => '---').join(' | ') + ' |\n';
        headerDone = true;
      }
    });
  });

  $('#output').textContent = md;
}

function loadExample() {
  $('#input').value = `<table>
  <thead>
    <tr>
      <th>Tool</th>
      <th>Type</th>

</table>`;
  convert();
}
