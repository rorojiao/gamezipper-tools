<script>
GZI18n.register({
  en: {
    toolTitle: 'Delete PDF Pages',
    toolDesc: 'Delete pages from any PDF online for free. Click the pages you want to remove, preview them visually, and download a clean new PDF — 100% in your browser, no upload.',

  },

    dropHere: '将 PDF 拖到这里或点击上传',
    dropHint: 'PDF 始终保留在浏览器中',
    pickFile: '选择 PDF 文件',
    loadingPages: '正在加载页面…',
    pages: '页',
    selected: '待删除',
    remaining: '保留',
    selectAll: '全选',
    selectNone: '清除',
    selectEven: '偶数页',
    selectOdd: '奇数页',
    selectRange: '按范围',
    pageLabel: '第',
    download: '下载新 PDF',
    reset: '加载其他文件',
    emptyErr: '不能删除所有页面 — 至少要保留一页。',
    downloaded: '✓ 下载成功！已删除页：',
    rangePrompt: '输入要删除的页码（如 1, 3, 5-8）：',
    step1: '拖入或选择一个 PDF 文件',
    step2: '点击要删除的每一页 — 出现红色 ✕ 标记',
    step3: '可使用「全选、偶数页、奇数页、按范围」批量标记',
    step4: '点击「下载新 PDF」保存清理后的文件',
  }
});

const { PDFDocument } = PDFLib;
const { $, t } = GZ;
let pdfBytes = null, pdfDoc = null, marked = new Set(), totalPages = 0;

function updateStatus() {
  const remaining = totalPages - marked.size;
  $('#status').innerHTML = `<span class="tag-counter"><b>${totalPages}</b> ${t('pages')}</span> ` +
    `<span class="tag-counter" style="color:var(--gz-accent,#ff6b6b)"><b>${marked.size}</b> ${t('selected')}</span> ` +
    `<span class="tag-counter"><b>${remaining}</b> ${t('remaining')}</span>`;
  const dl = $('#toolbar').querySelector('[data-act="download"]');
  if (dl) dl.disabled = remaining === 0;
}

function renderToolbar() {
  $('#toolbar').style.display = 'flex';
  $('#toolbar').innerHTML = `
    <button class="gz-btn gz-btn-secondary" data-act="all">✓ ${t('selectAll')}</button>
    <button class="gz-btn gz-btn-secondary" data-act="none">${t('selectNone')}</button>
    <button class="gz-btn gz-btn-secondary" data-act="even">${t('selectEven')}</button>
    <button class="gz-btn gz-btn-secondary" data-act="odd">${t('selectOdd')}</button>
    <button class="gz-btn gz-btn-secondary" data-act="range">📊 ${t('selectRange')}</button>
    <button class="gz-btn" data-act="download">⬇️ ${t('download')}</button>
    <button class="gz-btn gz-btn-secondary" data-act="reset">↻ ${t('reset')}</button>
  `;
  $('#toolbar').querySelectorAll('button').forEach(b => {
    b.onclick = () => handleAction(b.dataset.act);
  });
}

function handleAction(act) {
  if (act === 'all') { for (let i=1;i<=totalPages;i++) marked.add(i); renderMarks(); updateStatus(); }
  else if (act === 'none') { marked.clear(); renderMarks(); updateStatus(); }
  else if (act === 'even') { for (let i=2;i<=totalPages;i+=2) marked.add(i); renderMarks(); updateStatus(); }
  else if (act === 'odd') { for (let i=1;i<=totalPages;i+=2) marked.add(i); renderMarks(); updateStatus(); }
  else if (act === 'range') {
    const inp = prompt(t('rangePrompt'), '1, 3, 5-8');
    if (!inp) return;
    inp.split(',').forEach(part => {
      part = part.trim();
      const m = part.match(/^(\d+)\s*[-–]\s*(\d+)$/);
      if (m) { const a=+m[1], b=+m[2]; for (let i=Math.min(a,b);i<=Math.max(a,b);i++) if (i>=1&&i<=totalPages) marked.add(i); }
      else { const n = +part; if (n>=1 && n<=totalPages && Number.isFinite(n)) marked.add(n); }
    });
    renderMarks(); updateStatus();
  }
  else if (act === 'download') downloadPdf();
  else if (act === 'reset') { pdfBytes=null; pdfDoc=null; marked.clear(); totalPages=0; $('#page-grid').innerHTML=''; $('#toolbar').style.display='none'; $('#status').textContent=''; $('#drop-text').textContent = t('dropHere'); $('#file-input').value=''; }
}

function renderMarks() {
  $('#page-grid').querySelectorAll('.page-card').forEach((c, i) => {
    const pg = i + 1;
    c.classList.toggle('marked', marked.has(pg));
  });
}

async function renderPages() {
  if (!pdfDoc) return;
  $('#status').textContent = t('loadingPages');
  $('#page-grid').innerHTML = '';
  totalPages = pdfDoc.getPageCount();
  const copies = await Promise.all(pdfDoc.getPages().map(async (page, i) => {
    const viewport = page.getSize();
    const w = viewport.width, h = viewport.height;
    const cw = 100, ch = Math.round(cw * h / w);
    // Render placeholder canvas (we can't rasterize with pdf-lib alone; use simple labeled card)
    const card = document.createElement('div');
    card.className = 'page-card';
    card.innerHTML = `
      <div style="width:${cw}px;height:${ch}px;background:var(--glass2);border-radius:4px;display:flex;align-items:center;justify-content:center;color:var(--text2);font-size:.75rem;overflow:hidden">
        <span style="font-size:1.6rem;opacity:.4">📄</span>
      </div>
      <div class="pg-num">${t('pageLabel')} ${i+1}</div>
      <div class="x-mark">✕</div>
    `;
    card.onclick = () => {
      const pg = i + 1;
      if (marked.has(pg)) marked.delete(pg); else marked.add(pg);
      renderMarks(); updateStatus();
    };
    return card;
  }));
  $('#page-grid').append(...copies);
  updateStatus();
}

async function loadFile(file) {
  if (!file || file.type !== 'application/pdf') { $('#status').textContent = '⚠️ Please select a PDF file.'; return; }
  pdfBytes = new Uint8Array(await file.arrayBuffer());
  try {
    pdfDoc = await PDFDocument.load(pdfBytes);
  } catch (e) {
    $('#status').textContent = '⚠️ Could not read PDF: ' + e.message;
    return;
  }
  $('#drop-text').innerHTML = `<b>${file.name}</b> (${(file.size/1024).toFixed(0)} KB)`;
  renderToolbar();
  await renderPages();
}

async function downloadPdf() {
  if (marked.size === 0) return;
  if (marked.size >= totalPages) { alert(t('emptyErr')); return; }
  const keep = [];
  for (let i = 1; i <= totalPages; i++) if (!marked.has(i)) keep.push(i);
  const newPdf = await PDFDocument.create();
  const pages = await newPdf.copyPages(pdfDoc, keep.map(n => n - 1));
  pages.forEach(p => newPdf.addPage(p));
  const out = await newPdf.save();
  const blob = new Blob([out], { type: 'application/pdf' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'pdf-pages-deleted.pdf';
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 5000);
  $('#status').innerHTML = `<span style="color:var(--gz-success,#00d672)">${t('downloaded')} ${marked.size}. ${t('remaining')}: ${keep.length}.</span>`;
}

$('#drop-area').onclick = () => $('#file-input').click();
$('#file-input').onchange = e => { if (e.target.files[0]) loadFile(e.target.files[0]); };
$('#drop-area').ondragover = e => { e.preventDefault(); $('#drop-area').classList.add('drag'); };
$('#drop-area').ondragleave = () => $('#drop-area').classList.remove('drag');
$('#drop-area').ondrop = e => {
  e.preventDefault();
  $('#drop-area').classList.remove('drag');
  if (e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]);
};

$('#drop-text').textContent = t('dropHere');

GZ.renderToolPage({
  category: 'convert',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'✂️', href:'/convert/pdf-page-splitter.html', name:'PDF Split'},
    {icon:'🔄', href:'/convert/pdf-rotate.html', name:'PDF Rotate'},
    {icon:'💧', href:'/convert/pdf-watermark.html', name:'PDF Watermark'},
    {icon:'🗜️', href:'/convert/pdf-compressor.html', name:'PDF Compressor'},
  ]
});
</script>
