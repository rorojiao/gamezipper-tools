<script>

  en: {
    toolTitle: 'Remove Accents & Diacritics',

    step3: 'Try a language sample above to see it in action',
    step4: 'Click Copy to copy the ASCII result to your clipboard',
  },
  zh: {
    toolTitle: '去除重音符号 & 变音符号',
    toolDesc: '从任意文本中删除重音和变音符号 — 即时将 é→e、ü→u、ñ→n、å→a 转换。完美适用于 URL slug、ASCII 数据和搜索匹配。',
    smFr: '法语',
    smEs: '西班牙语',
    smDe: '德语',
    smVi: '越南语',
    smMix: '混合',
    removed: '已删除变音符',
    chars: '字符数',
    words: '词数',
    note: '使用 Unicode NFD 规范化并剥离组合变音符号 (U+0300–U+036F)。非拉丁文字（中文、阿拉伯文、西里尔文）保持不变。',
    step1: '将带重音的文本粘贴到输入区',
    step2: '右侧即时显示去除重音后的干净文本',
    step3: '点击上方的语言示例查看效果',
    step4: '点击「复制」将 ASCII 结果复制到剪贴板',
  }
});

const {$, copyText, t} = GZ;

function stripAccents(str) {
  return str.normalize('NFD').replace(/[\u0300-\u036f]/g, '');
}

function process() {
  const text = $('#input').value;
  if (!text) { $('#output').value = ''; $('#stats').innerHTML = ''; return; }
  const decomposed = text.normalize('NFD');
  const removed = (decomposed.match(/[\u0300-\u036f]/g) || []).length;
  const result = decomposed.replace(/[\u0300-\u036f]/g, '');
  $('#output').value = result;
  const words = result.trim() ? result.trim().split(/\s+/).length : 0;
  $('#stats').innerHTML = `<span><b>${removed}</b> ${t('removed')}</span><span><b>${result.length}</b> ${t('chars')}</span><span><b>${words}</b> ${t('words')}</span>`;
}

const samples = {
  fr: "Bonjour, comment allez-vous? J'habite à Paris près de la Seine. Les enfants mangent des croissants et boivent du café au lait.",
  es: "¿Cómo estás? Mi nombre es García y vivo en España. El niño pequeño juega con un pingüino en el patio.",
  de: "Grüß Gott! Übermorgen fahren wir nach München. Die Schüler üben für die Prüfung, die natürlich sehr wichtig ist.",
  vi: "Xin chào! Tôi tên là Nguyễn Thị Hồng. Hôm nay thời tiết rất đẹp, tôi muốn đi ăn phở và uống cà phê.",
  mix: "Naïve café façade résumé — José Müller visited São Paulo and met François Dvořák.",
};

$('#samples').innerHTML = `
  <span style="font-size:.8em;opacity:.7;align-self:center">${t('example')}:</span>
  ${['fr','es','de','vi','mix'].map(k => `<button class="gz-btn gz-btn-secondary" data-sm="${k}">${t('sm'+k.charAt(0).toUpperCase()+k.slice(1))}</button>`).join('')}`;
document.querySelectorAll('[data-sm]').forEach(b => {
  b.addEventListener('click', () => { $('#input').value = samples[b.dataset.sm]; process(); });
});

$('#input').addEventListener('input', process);

$('#toolbar').innerHTML = `
  <button class="gz-btn gz-btn-secondary" onclick="$('#input').value='';process()">${t('clear')}</button>
  <button class="gz-btn" onclick="copyText($('#output').value)">${t('copy')}</button>`;

$('#note').textContent = t('note');

GZ.renderToolPage({

});
</script>
