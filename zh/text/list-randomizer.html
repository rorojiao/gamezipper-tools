<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "Is the randomization truly random?", "acceptedAnswer": {"@type": "Answer", "text": "The tool uses the Fisher-Yates shuffle algorithm with JavaScript's Math.random(), which provides a high-quality random permutation suitable for giveaways and selections."}}, {"@type": "Question", "name": "Can I pick a specific number of random items?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. Use the Random Pick feature and enter how many items you want to select. The tool will randomly choose that many items from your list without duplicates."}}, {"@type": "Question", "name": "How do I randomize a list of names?", "acceptedAnswer": {"@type": "Answer", "text": "Enter one name per line in the input area and click Shuffle. The list will be randomly reordered. You can also use Random Pick to select specific number of winners."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="gz-split">
      <div><label id="lbl-in"></label><textarea id="input" rows="14" spellcheck="false" placeholder="Enter one item per line..."></textarea></div>
      <div><label id="lbl-out"></label><div class="gz-output" id="output"></div></div>
    </div>
    <div id="status" style="margin-top:8px;font-size:.85em"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'List Randomizer & Shuffle',
    toolDesc: 'Shuffle lists randomly, pick random items, or sort lines in random order. Perfect for giveaways, team assignments and random selections.',
    shuffle: 'Shuffle', reverseShuffle: 'Reverse', randomPick: 'Random Pick',
    pickN: 'items', removeDupes: 'Remove duplicates', numbered: 'Number results',
    itemCount: 'items', pickedItems: 'picked',
    step1: 'Enter your items, one per line',
    step2: 'Click Shuffle to randomize the list order',
    step3: 'Use Random Pick to select specific number of items',
    step4: 'Toggle options like remove duplicates or number results',
  },
  zh: {
    toolTitle: '列表随机排序工具',
    toolDesc: '随机打乱列表顺序、随机抽取项目。适合抽奖、分组和随机选择场景。',
    shuffle: '随机排序', reverseShuffle: '反转', randomPick: '随机抽取',
    pickN: '项', removeDupes: '去除重复', numbered: '编号结果',
    itemCount: '项', pickedItems: '已抽取',
    step1: '每行输入一个项目',
    step2: '点击「随机排序」打乱列表顺序',
    step3: '使用「随机抽取」选择指定数量的项目',
    step4: '切换选项如去除重复或编号结果',
  }
});

const { $, copyText, t } = GZ;

function getLines() {
  let lines = $('#input').value.split('\n');
  if ($('#dupeChk')?.checked) {
    lines = [...new Set(lines)];
  }
  return lines.filter(l => l.trim() !== '' || !$('#dupeChk')?.checked);
}

function fisherYates(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function formatLines(lines) {
  if ($('#numChk')?.checked) {
    return lines.map((l, i) => `${i + 1}. ${l}`).join('\n');
  }
  return lines.join('\n');
}

function doShuffle() {
  const lines = getLines().filter(l => l.trim());
  if (!lines.length) return;
  const shuffled = fisherYates(lines);
  $('#output').textContent = formatLines(shuffled);
  $('#status').innerHTML = `<span style="color:var(--gz-success)">${shuffled.length} ${t('itemCount')}</span>`;
}

function doReverse() {
  const lines = getLines().filter(l => l.trim());
  if (!lines.length) return;
  const reversed = [...lines].reverse();
  $('#output').textContent = formatLines(reversed);
  $('#status').innerHTML = `<span style="color:var(--gz-success)">${reversed.length} ${t('itemCount')}</span>`;
}

function doPick() {
  const lines = getLines().filter(l => l.trim());
  if (!lines.length) return;
  const n = parseInt($('#pickCount').value) || 1;
  const shuffled = fisherYates(lines);
  const picked = shuffled.slice(0, Math.min(n, shuffled.length));
  $('#output').textContent = formatLines(picked);
  $('#status').innerHTML = `<span style="color:var(--gz-success)">${picked.length}/${lines.length} ${t('pickedItems')}</span>`;
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="doShuffle()">🎲 ${t('shuffle')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doReverse()">🔁 ${t('reverseShuffle')}</button>
  <div class="gz-pick-row" style="display:inline-flex">
    <button class="gz-btn gz-btn-secondary" onclick="doPick()">🎯 ${t('randomPick')}</button>
    <input type="number" id="pickCount" value="1" min="1" max="999">
    <span style="font-size:.85em">${t('pickN')}</span>
  </div>
  <label style="display:flex;align-items:center;gap:4px;font-size:.85em"><input type="checkbox" id="dupeChk"> ${t('removeDupes')}</label>
  <label style="display:flex;align-items:center;gap:4px;font-size:.85em"><input type="checkbox" id="numChk"> ${t('numbered')}</label>
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#input').value='';$('#output').textContent='';$('#status').innerHTML=''">${t('clear')}</button>`;

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'↕️', href:'/text/sort-lines.html', name:'Sort Lines'},
    {icon:'🔁', href:'/text/reverse-lines.html', name:'Reverse Lines'},
    {icon:'🧹', href:'/text/remove-duplicates.html', name:'Remove Duplicates'},
    {icon:'📊', href:'/text/diff.html', name:'Text Diff'},
  ]
});
</script>
