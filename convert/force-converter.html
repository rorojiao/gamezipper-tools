<script>
GZI18n.register({
  en: {
    toolTitle: 'Force Converter',
    toolDesc: 'Convert force units instantly — newton, kilonewton, dyne, kilogram-force, pound-force, poundal, ounce-force and ton-force.',
    step1: 'Enter the force value you want to convert',
    step2: 'Select the source unit from the dropdown',
    step3: 'All other units update live in the grid below',
    step4: 'Click any value card to copy it to clipboard',
  },
  zh: {
    toolTitle: '力单位换算器',
    toolDesc: '即时换算力单位 — 牛顿、千牛、达因、千克力、磅力、磅达、盎司力和吨力。',
    step1: '输入要换算的力值',
    step2: '从下拉菜单选择原始单位',
    step3: '下方网格实时显示所有其他单位的结果',
    step4: '点击任意数值卡片即可复制到剪贴板',
  }
});
const { $, copyText, t } = GZ;
// All factors relative to 1 newton
const UNITS = [
  {id:'N',  name:'Newton (N)',           zh:'牛顿 (N)',         f:1},
  {id:'kN', name:'Kilonewton (kN)',      zh:'千牛 (kN)',        f:1e3},
  {id:'MN', name:'Meganewton (MN)',      zh:'兆牛 (MN)',        f:1e6},
  {id:'mN', name:'Millinewton (mN)',     zh:'毫牛 (mN)',        f:1e-3},
  {id:'dyn',name:'Dyne (dyn)',           zh:'达因 (dyn)',        f:1e-5},
  {id:'kgf',name:'Kilogram-force (kgf)', zh:'千克力 (kgf)',     f:9.80665},
  {id:'gf', name:'Gram-force (gf)',      zh:'克力 (gf)',        f:0.00980665},
  {id:'lbf',name:'Pound-force (lbf)',    zh:'磅力 (lbf)',       f:4.4482216152605},
  {id:'ozf',name:'Ounce-force (ozf)',    zh:'盎司力 (ozf)',     f:0.27801385095378125},
  {id:'pdl',name:'Poundal (pdl)',        zh:'磅达 (pdl)',        f:0.138254954376},
  {id:'tf', name:'Ton-force (metric)',   zh:'吨力 (吨力)',       f:9806.65},
  {id:'tonUS',name:'Ton-force (US)',     zh:'美吨力',            f:8896.443230521},
];
function fmt(v){
  if(v===0) return '0';
  const a=Math.abs(v);
  if(a!==0&&(a<1e-6||a>=1e9)) return v.toExponential(6);
  if(a>=1) return +(v.toPrecision(8)).toLocaleString('en-US',{maximumFractionDigits:6});
  return v.toPrecision(6);
}
function convert(){
  const val=parseFloat($('#inp-val').value)||0;
  const unit=$('#inp-unit').value;
  const factor=UNITS.find(u=>u.id===unit).f;
  const n=val*factor;
  const lang=GZI18n.getLang();
  $('#grid').innerHTML=UNITS.map(u=>{
    const result=n/u.f;
    const label=lang==='zh'?u.zh:u.name;
    return `<div class="conv-card" onclick="copyText('${fmt(result)}')"><label>${label}</label><div class="val">${fmt(result)}</div></div>`;
  }).join('');
}
$('#inp-val').addEventListener('input',convert);
$('#inp-unit').addEventListener('change',convert);
$('#inp-unit').innerHTML=UNITS.map(u=>`<option value="${u.id}">${u.name}</option>`).join('');
$('#inp-unit').value='N';
$('#toolbar').innerHTML=`<button class="gz-btn" onclick="copyText($('#grid .conv-card:first-child .val').textContent)">${t('copy')}</button>`;
convert();
GZ.renderToolPage({
  category:'convert',
  titleKey:'toolTitle',
  descKey:'toolDesc',
  howToSteps:['step1','step2','step3','step4'],
  related:[
    {icon:'⚡',href:'/convert/energy-converter.html',name:'Energy Converter'},
    {icon:'⚡',href:'/convert/power-converter.html',name:'Power Converter'},
    {icon:'📐',href:'/convert/area-converter.html',name:'Area Converter'},
    {icon:'🌡️',href:'/convert/temperature.html',name:'Temperature Converter'},
  ]
});
</script>
