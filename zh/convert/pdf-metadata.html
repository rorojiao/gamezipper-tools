<div class="gz-container">

</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'PDF Metadata Viewer & Editor',
    toolDesc: 'View, edit and update PDF document properties — title, author, subject, keywords and dates. Modify and download the updated PDF in your browser.',
    dropText: 'Drag and drop a PDF file here',
    orText: 'or click to browse',
    readOnlyHdr: 'READ-ONLY INFO',
    editableHdr: 'EDITABLE METADATA',
    lblTitle: 'Title',
    lblAuthor: 'Author',
    lblSubject: 'Subject',
    lblKeywords: 'Keywords',
    lblCreator: 'Creator',
    lblProducer: 'Producer',
    lblCreated: 'Creation Date',
    lblModified: 'Modification Date',
    lblPages: 'Pages',
    lblVersion: 'PDF Version',
    lblFileSize: 'File Size',
    lblFileName: 'File Name',
    save: '💾 Save & Download PDF',
    reset: 'Reset',
    clear: 'Clear',
    chooseAnother: 'Choose Another PDF',
    keywordsHint: 'Separate multiple keywords with commas',
    dateHint: 'YYYY-MM-DD HH:MM',
    saved: '✓ Saved! Updated PDF downloaded.',
    invalidPdf: 'Please choose a valid PDF file.',
    encrypted: 'This PDF is encrypted. Please remove the password first.',
    step1: 'Drag and drop a PDF, or click to browse',
    step2: 'Edit any of the metadata fields — title, author, subject, keywords and more',
    step3: 'Click Save & Download to get the updated PDF with your changes',
  },
  zh: {
    toolTitle: 'PDF 元数据查看与编辑器',
    toolDesc: '查看、编辑和更新 PDF 文档属性 — 标题、作者、主题、关键词和日期。在浏览器中修改并下载更新后的 PDF。',
    dropText: '拖放 PDF 文件到此处',
    orText: '或点击选择文件',
    readOnlyHdr: '只读信息',
    editableHdr: '可编辑元数据',
    lblTitle: '标题',
    lblAuthor: '作者',
    lblSubject: '主题',
    lblKeywords: '关键词',
    lblCreator: '创建者',
    lblProducer: '生成器',
    lblCreated: '创建日期',
    lblModified: '修改日期',
    lblPages: '页数',
    lblVersion: 'PDF 版本',
    lblFileSize: '文件大小',
    lblFileName: '文件名',
    save: '💾 保存并下载 PDF',
    reset: '重置',
    clear: '清空',
    chooseAnother: '选择其他 PDF',
    keywordsHint: '多个关键词请用逗号分隔',
    dateHint: 'YYYY-MM-DD HH:MM',
    saved: '✓ 已保存！更新后的 PDF 已下载。',
    invalidPdf: '请选择有效的 PDF 文件。',
    encrypted: '此 PDF 已加密，请先移除密码。',
    step1: '拖放一个 PDF 文件，或点击浏览',
    step2: '编辑任意元数据字段 — 标题、作者、主题、关键词等',
    step3: '点击「保存并下载」获取更新后的 PDF',
  }
});

const { $, t } = GZ;
let currentPdf = null;
let currentFileName = 'document.pdf';
let originalSize = 0;
let originalValues = {};

const editableFields = [
  { key: 'Title',    labelKey: 'lblTitle',    type: 'text' },
  { key: 'Author',   labelKey: 'lblAuthor',   type: 'text' },
  { key: 'Subject',  labelKey: 'lblSubject',  type: 'text' },
  { key: 'Keywords', labelKey: 'lblKeywords', type: 'text', hintKey: 'keywordsHint' },
  { key: 'Creator',  labelKey: 'lblCreator',  type: 'text' },
  { key: 'Producer', labelKey: 'lblProducer', type: 'text' },
  { key: 'creationDate',  labelKey: 'lblCreated',  type: 'datetime' },
  { key: 'modificationDate', labelKey: 'lblModified', type: 'datetime' },
];

function fmtBytes(b) {
  if (b === 0) return '0 B';
  const u = ['B','KB','MB','GB'];
  const i = Math.floor(Math.log(b) / Math.log(1024));
  return (b / Math.pow(1024, i)).toFixed(i === 0 ? 0 : 1) + ' ' + u[i];
}

function dateToInput(d) {
  if (!d) return '';
  const pad = n => String(n).padStart(2, '0');
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

function inputToDate(s) {
  if (!s) return null;
  const d = new Date(s);
  return isNaN(d.getTime()) ? null : d;
}

async function loadPdf(file) {
  if (!file || !(file.type === 'application/pdf' || file.name.toLowerCase().endsWith('.pdf'))) {
    alert(t('invalidPdf')); return;
  }
  if (typeof PDFLib === 'undefined') {
    alert('PDF library failed to load. Please check your internet connection and refresh.');
    return;
  }
  const { PDFDocument } = PDFLib;
  try {
    originalSize = file.size;
    currentFileName = file.name;
    const bytes = await file.arrayBuffer();
    currentPdf = await PDFDocument.load(bytes, { ignoreEncryption: false });
  } catch (e) {
    if (/encrypt|password/i.test(e.message)) { alert(t('encrypted')); }
    else { alert(t('invalidPdf') + '\n' + e.message); }
    return;
  }
  renderForm();
}

function renderForm() {
  if (!currentPdf) return;
  const title = currentPdf.getTitle() || '';
  const author = currentPdf.getAuthor() || '';
  const subject = currentPdf.getSubject() || '';
  const keywords = currentPdf.getKeywords() || '';
  const creator = currentPdf.getCreator() || '';
  const producer = currentPdf.getProducer() || '';
  const creationDate = currentPdf.getCreationDate();
  const modDate = currentPdf.getModificationDate();

  originalValues = { Title: title, Author: author, Subject: subject, Keywords: keywords,
                     Creator: creator, Producer: producer,
                     creationDate, modificationDate: modDate };

  // Read-only info
  $('#fileInfo').style.display = 'block';
  $('#fileInfo').textContent = `📄 ${currentFileName} · ${fmtBytes(originalSize)}`;
  $('#readOnlyGrid').innerHTML = [
    { lbl: t('lblPages'), val: currentPdf.getPageCount() },
    { lbl: t('lblVersion'), val: currentPdf.getViewerPreferences() ? 'PDF' : 'PDF' }, // pdf-lib doesn't expose major version reliably
    { lbl: t('lblFileSize'), val: fmtBytes(originalSize) },
    { lbl: t('lblFileName'), val: currentFileName },
  ].map(it => `<div class="ro-item"><div class="lbl">${it.lbl}</div><div class="val">${escapeHtml(it.val)}</div></div>`).join('');

  // Editable form
  const grid = $('#metaGrid');
  grid.innerHTML = editableFields.map(f => {
    let val = '';
    if (f.key === 'creationDate' || f.key === 'modificationDate') {
      val = dateToInput(originalValues[f.key]);
      return `<div class="meta-row"><label for="f-${f.key}">${t(f.labelKey)}</label>
        <input id="f-${f.key}" type="datetime-local" value="${val}"></div>`;
    }
    val = originalValues[f.key] || '';
    const hint = f.hintKey ? ` <span style="font-size:.78em;color:var(--gz-text-muted,#888)">(${t(f.hintKey)})</span>` : '';
    return `<div class="meta-row"><label for="f-${f.key}">${t(f.labelKey)}${hint}</label>
      <input id="f-${f.key}" type="text" value="${escapeAttr(val)}" placeholder="${escapeAttr(t(f.labelKey))}"></div>`;
  }).join('');

  $('#toolbar').innerHTML = `
    <button class="gz-btn" onclick="savePdf()">${t('save')}</button>
    <button class="gz-btn gz-btn-secondary" onclick="resetForm()">${t('reset')}</button>
    <button class="gz-btn gz-btn-secondary" onclick="clearAll()">${t('chooseAnother')}</button>`;

  $('#dropZone').style.display = 'none';
  $('#metaArea').style.display = 'block';
}

function resetForm() {
  if (!currentPdf) return;
  editableFields.forEach(f => {
    const el = $('#f-' + f.key);
    if (!el) return;
    el.value = (f.key === 'creationDate' || f.key === 'modificationDate')
      ? dateToInput(originalValues[f.key])
      : (originalValues[f.key] || '');
  });
}

async function savePdf() {
  if (!currentPdf) return;
  if (typeof PDFLib === 'undefined') { alert('PDF library failed to load.'); return; }
  try {
    currentPdf.setTitle(($('#f-Title').value || '').trim());
    currentPdf.setAuthor(($('#f-Author').value || '').trim());
    currentPdf.setSubject(($('#f-Subject').value || '').trim());
    currentPdf.setKeywords(($('#f-Keywords').value || '').split(',').map(s => s.trim()).filter(Boolean));
    currentPdf.setCreator(($('#f-Creator').value || '').trim());
    currentPdf.setProducer(($('#f-Producer').value || '').trim());
    const cd = inputToDate($('#f-creationDate').value);
    const md = inputToDate($('#f-modificationDate').value);
    if (cd) currentPdf.setCreationDate(cd);
    if (md) currentPdf.setModificationDate(md);
    const out = await currentPdf.save();
    const blob = new Blob([out], { type: 'application/pdf' });
    triggerDownload(blob, currentFileName.replace(/\.pdf$/i, '') + '-metadata.pdf');
    GZ.showToast(t('saved'));
  } catch (e) {
    alert('Error: ' + e.message);
  }
}

function clearAll() {
  currentPdf = null;
  $('#metaArea').style.display = 'none';
  $('#fileInfo').style.display = 'none';
  $('#dropZone').style.display = 'block';
  $('#fileInput').value = '';
}

function triggerDownload(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 200);
}

function escapeHtml(s) { return String(s).replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
function escapeAttr(s) { return escapeHtml(s).replace(/"/g, '&quot;'); }

// Wire up events
$('#dropText').textContent = t('dropText');
$('#orText').textContent = t('orText');
$('#readOnlyHdr').textContent = t('readOnlyHdr');
$('#editableHdr').textContent = t('editableHdr');
$('#dropZone').onclick = () => $('#fileInput').click();
$('#fileInput').onchange = (e) => { if (e.target.files[0]) loadPdf(e.target.files[0]); };
const dz = $('#dropZone');
['dragenter','dragover'].forEach(ev => dz.addEventListener(ev, e => { e.preventDefault(); dz.classList.add('dragover'); }));
['dragleave','drop'].forEach(ev => dz.addEventListener(ev, e => { e.preventDefault(); dz.classList.remove('dragover'); }));
dz.addEventListener('drop', e => { if (e.dataTransfer.files[0]) loadPdf(e.dataTransfer.files[0]); });

GZ.renderToolPage({
  category: 'convert',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3'],
  related: [
    {icon:'📄', href:'/convert/pdf-merger.html', name:'PDF Merger'},
    {icon:'🔄', href:'/convert/pdf-rotate.html', name:'PDF Rotate'},
    {icon:'💧', href:'/convert/pdf-watermark.html', name:'PDF Watermark'},
    {icon:'✂️', href:'/convert/pdf-page-splitter.html', name:'PDF Splitter'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
