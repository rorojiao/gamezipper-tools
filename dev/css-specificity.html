<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is CSS specificity?", "acceptedAnswer": {"@type": "Answer", "text": "CSS specificity is the algorithm browsers use to determine which CSS rule wins when multiple rules target the same element. It's a 3-part value (a, b, c) where a is the number of IDs, b is the number of classes/attributes/pseudo-classes, and c is the number of elements/pseudo-elements."}}, {"@type": "Question", "name": "How is the specificity score calculated?", "acceptedAnswer": {"@type": "Answer", "text": "The score has three parts: (a) count of #id selectors, (b) count of .class, [attr], and :pseudo-class selectors, (c) count of element and ::pseudo-element selectors. They are compared in order: a first, then b, then c."}}, {"@type": "Question", "name": "What is the highest CSS specificity?", "acceptedAnswer": {"@type": "Answer", "text": "The theoretical maximum is (0, 0, 0) for an empty rule. The practical maximum grows with selector complexity. Inline styles and !important rules override specificity entirely."}}, {"@type": "Question", "name": "Does !important affect specificity?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. !important flags always beat non-important rules regardless of specificity. Among !important rules, the higher specificity wins. Use !important sparingly."}}]}</script>

const { $, copyText, t } = GZ;

function calcSpecificity(selector) {
  // Strip leading/trailing whitespace
  selector = selector.trim();
  if (!selector) return null;
  let a = 0, b = 0, c = 0;
  // Count IDs (#id) — but exclude # inside attribute values
  // First, temporarily replace attribute selectors to avoid counting # inside them
  const attrParts = [];
  const attrPlaceholder = '\u0000ATTR_\u0000';
  selector = selector.replace(/\[([^\]]*)\]/g, (m) => { attrParts.push(m); return attrPlaceholder + (attrParts.length - 1) + '\u0001'; });
  // Count IDs
  const idMatches = selector.match(/#[\w-]+/g) || [];
  a = idMatches.length;
  // Remove IDs from selector for further processing
  selector = selector.replace(/#[\w-]+/g, '');
  // Count classes, pseudo-classes, attributes
  const classMatches = selector.match(/\.[\w-]+/g) || [];
  // Pseudo-classes (not pseudo-elements which start with ::)
  const pseudoClassMatches = selector.match(/:(?!:)[a-zA-Z-]+(\([^)]*\))?/g) || [];
  b = classMatches.length + pseudoClassMatches.length + attrParts.length;
  // Remove classes and pseudo-classes
  selector = selector.replace(/\.[\w-]+/g, '');
  selector = selector.replace(/:(?!:)[a-zA-Z-]+(\([^)]*\))?/g, '');
  // Restore attribute selectors (already counted in b)
  // Count pseudo-elements (::before, ::after, ::placeholder etc.)
  const pseudoElemMatches = selector.match(/::[a-zA-Z-]+/g) || [];
  c = pseudoElemMatches.length;
  // Count element selectors and the universal * (which is 0)
  // Remove pseudo-elements, attribute placeholders, combinators, * and grouping
  selector = selector.replace(/::[a-zA-Z-]+/g, '');
  // Remove * (universal selector) — counts as 0
  // We need to count remaining element names (word chars not in pseudo)
  // Strip combinators and grouping
  const cleaned = selector.replace(/[>+~\s,]+/g, ' ');
  // Count element words (a-zA-Z followed by optional word chars)
  const elemWords = cleaned.match(/\b[a-zA-Z][\w-]*\b/g) || [];
  c += elemWords.length;
  return { a, b, c, score: a * 10000 + b * 100 + c };
}

function renderSelectors() {
  const lines = $('#input').value.split('\n').map(l => l.trim()).filter(Boolean);
  const out = $('#selectors');
  if (lines.length === 0) { out.innerHTML = ''; $('#winnerNote').style.display = 'none'; return; }
  const results = lines.map(l => ({ sel: l, ...calcSpecificity(l) }));
  const maxScore = Math.max(...results.map(r => r.score));
  out.innerHTML = results.map(r => {
    const isWinner = r.score === maxScore && results.length > 1;
    return `<div class="sel-card ${isWinner ? 'winner' : ''}">
      <div>
        <div class="sel">${r.sel.replace(/</g, '&lt;')}</div>
        <div class="meta">${t('labelTotal')}: ${r.a},${r.b},${r.c} · ${r.score}</div>
      </div>
      <div class="weights">
        <div class="weight"><div class="num">${r.a}</div><div class="lbl">${t('labelA')}</div></div>
        <div class="weight"><div class="num">${r.b}</div><div class="lbl">${t('labelB')}</div></div>
        <div class="weight"><div class="num">${r.c}</div><div class="lbl">${t('labelC')}</div></div>
      </div>
    </div>`;
  }).join('');
  if (results.length > 1) {
    const w = results.find(r => r.score === maxScore);
    $('#winnerNote').innerHTML = `<strong>${t('winner')}</strong> <code>${w.sel.replace(/</g, '&lt;')}</code> — (${w.a},${w.b},${w.c})`;
    $('#winnerNote').style.display = '';
  } else {
    $('#winnerNote').style.display = 'none';
  }
}

function loadExample() {
  $('#input').value = `#header .nav a:hover\n.btn.btn-primary[data-active]\nul > li:nth-child(2)\ndiv.content p:first-child\nbody.home .post a\n*`;
  renderSelectors();
}
