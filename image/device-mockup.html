<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>

    <div class="ctrl">
      <div><label>Device</label>
        <select id="device" onchange="render()">
          <option value="iphone">iPhone</option>
          <option value="android">Android</option>
          <option value="ipad">iPad</option>
          <option value="macbook">MacBook</option>
          <option value="monitor">Desktop Monitor</option>
          <option value="flat">Flat Frame</option>
        </select></div>
      <div><label>Frame Color</label><input type="color" id="frameColor" value="#1a1a2e" onchange="render()"></div>
      <div><label>Background</label><input type="color" id="bgColor" value="#0f0f23" onchange="render()"></div>
      <div><label>Padding</label><input type="range" id="padding" min="20" max="100" value="60" onchange="render()"></div>
    </div>
    <div class="drop-zone" id="dropZone">
      <p id="dropLabel">📎 Drop your screenshot here or click to upload</p>
      <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="loadFile(this)">

      <button class="gz-btn" id="downloadBtn" onclick="downloadPNG()">⬇ Download PNG</button>

    </div>

<script>
GZI18n.register({
  en: {
    toolTitle: 'Device Mockup Generator',
    toolDesc: 'Wrap screenshots in realistic device frames — iPhone, iPad, MacBook, Android and desktop. Download as PNG.',
    step1: 'Upload or drag and drop your screenshot',
    step2: 'Pick a device frame style and colors',
    step3: 'Adjust padding and frame color',
    step4: 'Download the mockup as a high-quality PNG',
    dropLabel: '📎 Drop your screenshot here or click to upload',
  },
  zh: {
    toolTitle: '设备模型生成器',
    toolDesc: '将截图放入逼真的设备边框 — iPhone、iPad、MacBook、Android 和桌面显示器。下载为 PNG。',
    step1: '上传或拖拽你的截图',
    step2: '选择设备边框样式和颜色',
    step3: '调整内边距和边框颜色',
    step4: '下载为高质量的 PNG 图片',
    dropLabel: '📎 拖拽截图到此处或点击上传',
  }
});

const { $, copyText, t } = GZ;
let img = null;
const canvas = $('#canvas');
const ctx = canvas.getContext('2d');

const devices = {
  iphone: { w: 375, h: 812, notch: true, bezel: 12, radius: 40 },
  android: { w: 360, h: 780, notch: false, bezel: 8, radius: 24 },
  ipad: { w: 768, h: 1024, notch: false, bezel: 16, radius: 16 },
  macbook: { w: 1280, h: 800, notch: false, bezel: 4, radius: 4, bar: 24 },
  monitor: { w: 1280, h: 720, notch: false, bezel: 8, radius: 4, stand: true },
  flat: { w: 800, h: 600, notch: false, bezel: 4, radius: 8 },
};

function loadFile(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    img = new Image();
    img.onload = () => { $('#dropZone').style.display='none'; $('#canvasWrap').style.display='flex'; $('#btnRow').style.display='flex'; render(); };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

const dz = $('#dropZone');
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('dragover'); });
dz.addEventListener('dragleave', () => dz.classList.remove('dragover'));
dz.addEventListener('drop', e => { e.preventDefault(); dz.classList.remove('dragover'); if(e.dataTransfer.files[0]){loadFile({files:[e.dataTransfer.files[0]]});} });
dz.addEventListener('click', () => $('#fileInput').click());

function render() {
  if (!img) return;
  const dev = devices[$('#device').value];
  const pad = +$('#padding').value;
  const fc = $('#frameColor').value;
  const bg = $('#bgColor').value;
  const scale = Math.min(img.width / dev.w, img.height / dev.h, 1);
  const sw = Math.round(dev.w * scale);
  const sh = Math.round(dev.h * scale);
  const cw = sw + dev.bezel * 2 + pad * 2;
  const ch = sh + dev.bezel * 2 + pad * 2 + (dev.bar||0) + (dev.stand?40:0);
  canvas.width = cw * 2; canvas.height = ch * 2;
  canvas.style.width = cw + 'px'; canvas.style.height = ch + 'px';
  ctx.scale(2, 2);
  // Background
  ctx.fillStyle = bg; ctx.fillRect(0, 0, cw, ch);
  // Frame
  const fx = pad, fy = pad, fw = sw + dev.bezel * 2, fh = sh + dev.bezel * 2;
  ctx.beginPath();
  ctx.roundRect(fx, fy, fw, fh, dev.radius);
  ctx.fillStyle = fc; ctx.fill();
  // Screen
  ctx.save();
  ctx.beginPath();
  ctx.roundRect(fx + dev.bezel, fy + dev.bezel, sw, sh, Math.max(dev.radius - dev.bezel, 0));
  ctx.clip();
  ctx.drawImage(img, fx + dev.bezel, fy + dev.bezel, sw, sh);
  ctx.restore();
  // Notch (iPhone)
  if (dev.notch) {
    const nw = sw * 0.35, nh = dev.bezel + 8;
    ctx.fillStyle = fc;
    ctx.beginPath();
    ctx.roundRect(fx + dev.bezel + (sw - nw) / 2, fy, nw, nh, [0, 0, 12, 12]);
    ctx.fill();
  }
  // MacBook bar
  if (dev.bar) {
    ctx.fillStyle = fc;
    ctx.fillRect(fx, fy + fh, fw, dev.bar);
  }
  // Monitor stand
  if (dev.stand) {
    const standW = fw * 0.3, standH = 30;
    ctx.fillStyle = fc;
    ctx.beginPath();
    ctx.roundRect(fx + (fw - standW) / 2, fy + fh + (dev.bar||0), standW, standH, 4);
    ctx.fill();
  }
}

function downloadPNG() {
  const a = document.createElement('a');
  a.href = canvas.toDataURL('image/png');
  a.download = 'device-mockup.png'; a.click();
}

function resetTool() {
  img = null;
  $('#dropZone').style.display = '';
  $('#canvasWrap').style.display = 'none';
  $('#fileInput').value = '';
}

GZ.renderToolPage({
  category: 'image',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🖼️', href:'/image/social-media-resizer.html', name:'Social Resizer'},
    {icon:'📱', href:'/image/app-icon-generator.html', name:'App Icons'},
    {icon:'🎨', href:'/image/wallpaper-generator.html', name:'Wallpaper'},
    {icon:'✂️', href:'/image/cropper.html', name:'Image Cropper'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
