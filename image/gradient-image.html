<script>
GZI18n.register({
  en: {
    toolTitle: 'Gradient Image Generator',
    toolDesc: 'Create beautiful gradient images — linear, radial or conic. Customize colors, angles and size, then download as PNG or SVG.',
    gradientType: 'Gradient Type',
    linear: 'Linear',
    radial: 'Radial',
    conic: 'Conic',
    angle: 'Angle (°)',
    width: 'Width (px)',
    height: 'Height (px)',
    colorStops: 'Color Stops',
    position: 'Position %',
    addStop: '+ Add Stop',
    removeStop: '✕',
    downloadPNG: 'Download PNG',
    downloadSVG: 'Download SVG',
    preset: 'Preset',
    presetSunset: 'Sunset',
    presetOcean: 'Ocean',
    presetForest: 'Forest',
    presetNeon: 'Neon',
    presetCandy: 'Candy',
    presetMinimal: 'Minimal',
    step1: 'Choose gradient type: linear, radial, or conic',
    step2: 'Add color stops and adjust their positions',
    step3: 'Set the angle (for linear/conic) and image dimensions',
    step4: 'Download as PNG or SVG for your project',
  },
  zh: {
    toolTitle: '渐变图片生成器',
    toolDesc: '创建精美的渐变图片 — 线性、径向或锥形渐变。自定义颜色、角度和尺寸，下载为 PNG 或 SVG。',
    gradientType: '渐变类型',
    linear: '线性',
    radial: '径向',
    conic: '锥形',
    angle: '角度 (°)',
    width: '宽度 (px)',
    height: '高度 (px)',
    colorStops: '颜色停止点',
    position: '位置 %',
    addStop: '+ 添加',
    removeStop: '✕',
    downloadPNG: '下载 PNG',
    downloadSVG: '下载 SVG',
    preset: '预设',
    presetSunset: '日落',
    presetOcean: '海洋',
    presetForest: '森林',
    presetNeon: '霓虹',
    presetCandy: '糖果',
    presetMinimal: '极简',
    step1: '选择渐变类型：线性、径向或锥形',
    step2: '添加颜色停止点并调整位置',
    step3: '设置角度（线性/锥形）和图片尺寸',
    step4: '下载为 PNG 或 SVG 用于你的项目',
  }
});

const { $, copyText, t } = GZ;
const canvas = $('#preview-canvas');
const ctx = canvas.getContext('2d');

let stops = [
  { color: '#ff6b6b', pos: 0 },
  { color: '#feca57', pos: 50 },
  { color: '#48dbfb', pos: 100 }
];
let gradType = 'linear';
let angle = 135;
let imgW = 1920;
let imgH = 1080;

const presets = {
  sunset: ['#ff512f','#f09819','#dd2476'],
  ocean: ['#2193b0','#6dd5ed','#00b4db'],
  forest: ['#134e5e','#71b280','#56ab2f'],
  neon: ['#f857a6','#ff5858','#00f260'],
  candy: ['#a18cd1','#fbc2eb','#f6d5f7'],
  minimal: ['#e0e0e0','#ffffff','#f5f5f5'],
};

function renderControls() {
  const presetOpts = Object.keys(presets).map(k => `<option value="${k}">${t('preset' + k.charAt(0).toUpperCase() + k.slice(1))}</option>`).join('');
  $('#controls').innerHTML = `
    <div class="gz-control"><label>${t('gradientType')}</label><select id="sel-type" onchange="gradType=this.value;render()">
      <option value="linear" ${gradType==='linear'?'selected':''}>${t('linear')}</option>
      <option value="radial" ${gradType==='radial'?'selected':''}>${t('radial')}</option>
      <option value="conic" ${gradType==='conic'?'selected':''}>${t('conic')}</option>
    </select></div>
    <div class="gz-control"><label>${t('angle')}</label><input type="range" id="inp-angle" min="0" max="360" value="${angle}" oninput="angle=+this.value;render()"><span id="lbl-angle">${angle}°</span></div>
    <div class="gz-control"><label>${t('width')}</label><input type="number" id="inp-w" value="${imgW}" min="1" max="8192" onchange="imgW=+this.value;render()"></div>
    <div class="gz-control"><label>${t('height')}</label><input type="number" id="inp-h" value="${imgH}" min="1" max="8192" onchange="imgH=+this.value;render()"></div>
    <div class="gz-control"><label>${t('preset')}</label><select id="sel-preset" onchange="applyPreset(this.value)"><option value="">—</option>${presetOpts}</select></div>
  `;
}

function renderStops() {
  const el = $('#color-stops');
  el.innerHTML = stops.map((s, i) => `
    <div class="color-stop">
      <input type="color" value="${s.color}" onchange="stops[${i}].color=this.value;render()">
      <input type="range" min="0" max="100" value="${s.pos}" onchange="stops[${i}].pos=+this.value;render()" title="${t('position')}">
      ${stops.length > 2 ? `<button onclick="stops.splice(${i},1);renderStops();render()" style="background:none;border:none;color:var(--gz-accent);cursor:pointer;font-size:1.1em">${t('removeStop')}</button>` : ''}
    </div>
  `).join('') + `<button class="gz-btn gz-btn-secondary" onclick="stops.push({color:'#ffffff',pos:100});renderStops();render()">${t('addStop')}</button>`;
}

function applyPreset(name) {
  if (!presets[name]) return;
  const colors = presets[name];
  stops = colors.map((c, i) => ({ color: c, pos: Math.round(i / (colors.length - 1) * 100) }));
  renderStops();
  render();
}

function getCSSGradient() {
  const sorted = [...stops].sort((a, b) => a.pos - b.pos);
  const colorStr = sorted.map(s => `${s.color} ${s.pos}%`).join(', ');
  if (gradType === 'linear') return `linear-gradient(${angle}deg, ${colorStr})`;
  if (gradType === 'radial') return `radial-gradient(circle, ${colorStr})`;
  return `conic-gradient(from ${angle}deg, ${colorStr})`;
}

function render() {
  const lbl = $('#lbl-angle');
  if (lbl) lbl.textContent = angle + '°';
  canvas.style.background = getCSSGradient();
  canvas.style.aspectRatio = imgW + '/' + imgH;
}

function downloadPNG() {
  const c = document.createElement('canvas');
  c.width = imgW; c.height = imgH;
  const cx = c.getContext('2d');
  let grad;
  const sorted = [...stops].sort((a, b) => a.pos - b.pos);
  if (gradType === 'linear') {
    const rad = (angle - 90) * Math.PI / 180;
    const cx2 = imgW / 2, cy2 = imgH / 2;
    const len = Math.sqrt(imgW * imgW + imgH * imgH) / 2;
    grad = cx.createLinearGradient(cx2 - Math.cos(rad) * len, cy2 - Math.sin(rad) * len, cx2 + Math.cos(rad) * len, cy2 + Math.sin(rad) * len);
  } else if (gradType === 'radial') {
    const r = Math.max(imgW, imgH) / 2;
    grad = cx.createRadialGradient(imgW / 2, imgH / 2, 0, imgW / 2, imgH / 2, r);
  } else {
    // Conic — approximate with linear stops (Canvas doesn't support conic natively)
    const steps = 360;
    for (let i = 0; i < steps; i++) {
      const pct = ((i + angle) % 360) / 360 * 100;
      const c1 = getStopColor(pct);
      const c2 = getStopColor(pct + 100 / 360);
      cx.beginPath();
      cx.moveTo(imgW / 2, imgH / 2);
      cx.arc(imgW / 2, imgH / 2, Math.max(imgW, imgH), (i / steps) * Math.PI * 2, ((i + 1.5) / steps) * Math.PI * 2);
      cx.closePath();
      cx.fillStyle = c1;
      cx.fill();
    }
    const a = document.createElement('a');
    a.href = c.toDataURL('image/png');
    a.download = 'gradient.png';
    a.click();
    return;
  }
  if (grad) {
    sorted.forEach(s => grad.addColorStop(s.pos / 100, s.color));
    cx.fillStyle = grad;
    cx.fillRect(0, 0, imgW, imgH);
  }
  const a = document.createElement('a');
  a.href = c.toDataURL('image/png');
  a.download = 'gradient.png';
  a.click();
}

function getStopColor(pct) {
  const sorted = [...stops].sort((a, b) => a.pos - b.pos);
  if (pct <= sorted[0].pos) return sorted[0].color;
  if (pct >= sorted[sorted.length - 1].pos) return sorted[sorted.length - 1].color;
  for (let i = 0; i < sorted.length - 1; i++) {
    if (pct >= sorted[i].pos && pct <= sorted[i + 1].pos) {
      const t2 = (pct - sorted[i].pos) / (sorted[i + 1].pos - sorted[i].pos);
      return lerpColor(sorted[i].color, sorted[i + 1].color, t2);
    }
  }
  return sorted[0].color;
}

function lerpColor(a, b, t) {
  const ra = parseInt(a.slice(1, 3), 16), ga = parseInt(a.slice(3, 5), 16), ba = parseInt(a.slice(5, 7), 16);
  const rb = parseInt(b.slice(1, 3), 16), gb = parseInt(b.slice(3, 5), 16), bb = parseInt(b.slice(5, 7), 16);
  const r = Math.round(ra + (rb - ra) * t), g = Math.round(ga + (gb - ga) * t), bv = Math.round(ba + (bb - ba) * t);
  return `rgb(${r},${g},${bv})`;
}

function downloadSVG() {
  const sorted = [...stops].sort((a, b) => a.pos - b.pos);
  const colorStr = sorted.map(s => `${s.color} ${s.pos}%`).join(', ');
  let gradDef = '';
  if (gradType === 'linear') {
    const rad = (angle - 90) * Math.PI / 180;
    const x1 = 50 - Math.cos(rad) * 50, y1 = 50 - Math.sin(rad) * 50;
    const x2 = 50 + Math.cos(rad) * 50, y2 = 50 + Math.sin(rad) * 50;
    gradDef = `<linearGradient id="g" x1="${x1}%" y1="${y1}%" x2="${x2}%" y2="${y2}%">`;
    sorted.forEach(s => gradDef += `<stop offset="${s.pos}%" stop-color="${s.color}"/>`);
    gradDef += `</linearGradient>`;
  } else if (gradType === 'radial') {
    gradDef = `<radialGradient id="g" cx="50%" cy="50%" r="50%">`;
    sorted.forEach(s => gradDef += `<stop offset="${s.pos}%" stop-color="${s.color}"/>`);
    gradDef += `</radialGradient>`;
  } else {
    // Conic not natively supported in SVG, approximate with linear
    const rad = (angle - 90) * Math.PI / 180;
    const x1 = 50 - Math.cos(rad) * 50, y1 = 50 - Math.sin(rad) * 50;
    const x2 = 50 + Math.cos(rad) * 50, y2 = 50 + Math.sin(rad) * 50;
    gradDef = `<linearGradient id="g" x1="${x1}%" y1="${y1}%" x2="${x2}%" y2="${y2}%">`;
    sorted.forEach(s => gradDef += `<stop offset="${s.pos}%" stop-color="${s.color}"/>`);
    gradDef += `</linearGradient>`;
  }
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${imgW}" height="${imgH}"><defs>${gradDef}</defs><rect width="100%" height="100%" fill="url(#g)"/></svg>`;
  const blob = new Blob([svg], { type: 'image/svg+xml' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'gradient.svg';
  a.click();
  URL.revokeObjectURL(a.href);
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="downloadPNG()">${t('downloadPNG')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="downloadSVG()">${t('downloadSVG')}</button>
`;

renderControls();
renderStops();
render();

GZ.renderToolPage({
  category: 'image',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🌈', href:'/css-tools/gradient.html', name:'CSS Gradient'},
    {icon:'🖼️', href:'/image/wallpaper-generator.html', name:'Wallpaper Generator'},
    {icon:'🎨', href:'/color/palette.html', name:'Palette Generator'},
    {icon:'🖼️', href:'/image/placeholder.html', name:'Placeholder Image'},
  ]
});
</script>
