<script>
GZI18n.register({
  en: {
    toolTitle: 'PBKDF2 Hash Generator',
    toolDesc: 'Derive cryptographic keys from passwords using PBKDF2-HMAC. Supports SHA-1/256/384/512 with custom salt, iterations and key length. Uses native Web Crypto API — 100% browser-based.',

  },
  zh: {

    toolDesc: '使用 PBKDF2-HMAC 从密码派生加密密钥。支持 SHA-1/256/384/512，可自定义盐值、迭代次数和密钥长度。使用原生 Web Crypto API — 100% 浏览器本地运行。',
    generate: '生成',
    generateSalt: '随机盐值',
    lblPassword: '密码 / 口令',
    lblSalt: '盐值（十六进制或文本）',
    lblAlgo: '哈希算法',
    lblIter: '迭代次数',
    lblKlen: '密钥长度（字节）',
    result: '派生密钥（十六进制）',
    step1: '输入你的密码或口令',
    step2: '输入盐值或点击"随机盐值"自动生成',
    step3: '选择哈希算法、迭代次数和密钥长度',
    step4: '点击"生成"派生密钥 — 全部在浏览器中完成',
    copyKey: '复制密钥',
  }
});

const { $, copyText, t } = GZ;

function hex(buf) { return [...new Uint8Array(buf)].map(b => b.toString(16).padStart(2,'0')).join(''); }

function parseSalt(str) {
  str = str.trim();
  // hex
  if (/^[0-9a-fA-F]+$/.test(str) && str.length % 2 === 0) {
    const arr = [];
    for (let i = 0; i < str.length; i += 2) arr.push(parseInt(str.substr(i,2),16));
    return new Uint8Array(arr);
  }
  return new TextEncoder().encode(str);
}

async function generate() {
  const pw = $('#password').value;
  const saltStr = $('#salt').value;
  if (!pw) { $('#result').innerHTML = '<span style="opacity:.6">⚠ ' + (GZ.lang === 'zh' ? '请输入密码' : 'Please enter a password') + '</span>'; return; }
  const algo = $('#algo').value;
  const iter = Math.max(1, parseInt($('#iterations').value) || 100000);
  const klen = Math.max(1, parseInt($('#keylen').value) || 32);
  const salt = saltStr ? parseSalt(saltStr) : new Uint8Array(16);
  if (!saltStr) { crypto.getRandomValues(salt); $('#salt').value = hex(salt.buffer); }
  try {
    const keyMaterial = await crypto.subtle.importKey('raw', new TextEncoder().encode(pw), 'PBKDF2', false, ['deriveBits']);
    const derived = await crypto.subtle.deriveBits({name:'PBKDF2', salt, iterations: iter, hash: algo}, keyMaterial, klen * 8);
    const hexKey = hex(derived);
    $('#result').innerHTML = `
      <div style="font-size:.8em;opacity:.7;margin-bottom:6px">${t('result')}</div>
      <code id="hexKey">${hexKey}</code>
      <div style="margin-top:8px;display:flex;gap:8px;flex-wrap:wrap">
        <button class="gz-btn" onclick="copyText(document.getElementById('hexKey').textContent)">${t('copyKey')}</button>
        <span style="font-size:.78em;opacity:.6;align-self:center">${algo} · ${iter.toLocaleString()} iters · ${klen} bytes</span>
      </div>`;
  } catch(e) {
    $('#result').innerHTML = '<span style="color:var(--gz-accent)">✗ ' + e.message + '</span>';
  }
}

function randomSalt() {
  const arr = new Uint8Array(16);
  crypto.getRandomValues(arr);
  $('#salt').value = hex(arr.buffer);
}

function loadExample() {
  $('#password').value = 'MySecretPass123!';
  randomSalt();
  generate();
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="generate()">${t('generate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="randomSalt()">${t('generateSalt')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>`;

['#password','#salt','#algo','#iterations','#keylen'].forEach(s => $(s).addEventListener('input', generate));

});
</script>
