<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="opts">
      <div class="opt"><label id="lbl-trip"></label><select id="trip"></select></div>
      <div class="opt"><label id="lbl-weather"></label><select id="weather"></select></div>
      <div class="opt"><label id="lbl-days"></label><input id="days" type="number" min="1" max="60" value="7"></div>
      <div class="opt"><label id="lbl-gender"></label><select id="gender"></select></div>
    </div>
    <div class="toggle-row" id="extras"></div>
    <div class="progress-bar-track"><div class="progress-bar-fill" id="prog" style="width:0%"></div></div>
    <div id="list"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Packing List Generator',
    toolDesc: 'Build a custom packing list for any trip in seconds. Pick destination type, weather, trip length and activities — get a categorized, printable checklist with auto-scaled clothing counts.',
    tripType: 'Trip type',
    weather: 'Weather',
    days: 'Trip length (days)',
    gender: 'Clothing style',
    generate: 'Generate List',
    print: 'Print / PDF',
    copy: 'Copy',
    clear: 'Clear checks',
    beach:'Beach', city:'City', business:'Business', hiking:'Hiking', skiing:'Skiing', camping:'Camping', festival:'Festival', cruise:'Cruise',
    hot:'Hot', warm:'Warm', mild:'Mild', cold:'Cold', freezing:'Freezing', mixed:'Mixed',
    men:'Men', women:'Women', neutral:'Neutral',
    ex_flight:'International flight', ex_swim:'Swimming', ex_workout:'Workout', ex_formal:'Formal event', ex_kids:'With kids', ex_laptop:'Work / laptop', ex_camera:'Camera gear',
    step1: 'Choose your trip type, weather and number of days',
    step2: 'Toggle any extra activities (swimming, formal, work, etc.)',
    step3: 'Click Generate to build a categorized packing list',
    step4: 'Check items off, print to PDF or copy the list',
  },
  zh: {
    toolTitle: '行李打包清单生成器',
    toolDesc: '几秒内为任意旅行定制打包清单。选择目的地类型、天气、天数和活动 — 获取分类清晰的可打印清单，衣物数量按天数自动计算。',
    tripType: '旅行类型',
    weather: '天气',
    days: '天数',
    gender: '服装风格',
    generate: '生成清单',
    print: '打印 / PDF',
    copy: '复制',
    clear: '清除勾选',
    beach:'海滩', city:'城市', business:'商务', hiking:'徒步', skiing:'滑雪', camping:'露营', festival:'音乐节', cruise:'邮轮',
    hot:'炎热', warm:'温暖', mild:'温和', cold:'寒冷', freezing:'极寒', mixed:'多变',
    men:'男装', women:'女装', neutral:'中性',
    ex_flight:'国际航班', ex_swim:'游泳', ex_workout:'健身', ex_formal:'正式场合', ex_kids:'带小孩', ex_laptop:'办公/笔记本', ex_camera:'摄影器材',
    step1: '选择旅行类型、天气和天数',
    step2: '勾选额外活动（游泳、正式、办公等）',
    step3: '点击「生成清单」生成分类打包清单',
    step4: '逐项勾选、打印为 PDF 或复制清单',
  }
});

const { $, copyText, t } = GZ;

function fillSelect(id, opts) {
  $(id).innerHTML = opts.map(([v,l])=>`<option value="${v}">${l}</option>`).join('');
}
fillSelect('#trip', [['beach',t('beach')],['city',t('city')],['business',t('business')],['hiking',t('hiking')],['skiing',t('skiing')],['camping',t('camping')],['festival',t('festival')],['cruise',t('cruise')]]);
fillSelect('#weather', [['hot',t('hot')],['warm',t('warm')],['mild',t('mild')],['cold',t('cold')],['freezing',t('freezing')],['mixed',t('mixed')]]);
fillSelect('#gender', [['neutral',t('neutral')],['men',t('men')],['women',t('women')]]);

const extras = [
  {key:'ex_flight', icon:'✈️'}, {key:'ex_swim', icon:'🏊'}, {key:'ex_workout', icon:'🏋️'},
  {key:'ex_formal', icon:'👔'}, {key:'ex_kids', icon:'👶'}, {key:'ex_laptop', icon:'💻'}, {key:'ex_camera', icon:'📷'},
];
let activeExtras = new Set();
$('#extras').innerHTML = extras.map(e =>
  `<span class="toggle" data-k="${e.key}" onclick="toggleExtra(this)">${e.icon} ${t(e.key)}</span>`
).join('');
function toggleExtra(el) {
  const k = el.dataset.k;
  if (activeExtras.has(k)) { activeExtras.delete(k); el.classList.remove('on'); }
  else { activeExtras.add(k); el.classList.add('on'); }
}

let checked = new Set();
function loadChecked() {
  try { const s = localStorage.getItem('gz-packing-checked'); if (s) checked = new Set(JSON.parse(s)); } catch(e){}
}
function saveChecked() {
  try { localStorage.setItem('gz-packing-checked', JSON.stringify([...checked])); } catch(e){}
}

function buildList() {
  const trip = $('#trip').value;
  const weather = $('#weather').value;
  const days = Math.max(1, Math.min(60, parseInt($('#days').value)||7));
  const gender = $('#gender').value;
  const cats = {};

  // Clothing (scaled by days)
  const undies = days + 2;
  const socks = days + 2;
  const tops = Math.ceil(days/2) + 1;
  const pants = Math.max(2, Math.ceil(days/3));
  cats['👕 ' + (gender==='women'?'Tops & blouses':'Tops')] = [];
  const cloth = cats['👕 ' + (gender==='women'?'Tops & blouses':'Tops')];
  cloth.push(`${undies} underwear`, `${socks} pairs socks`);
  if (gender==='women') cloth.push(`${tops} blouses / tops`, `${pants} pants / skirts`, '1 bra per day (max 7)', '1 set sleepwear');
  else cloth.push(`${tops} t-shirts / shirts`, `${pants} pants / shorts`, '1 set sleepwear');

  if (weather==='hot'||weather==='warm') cloth.push('1-2 swimwear', '1 sun hat', '1 light cover-up');
  if (weather==='cold'||weather==='freezing'||weather==='mixed') { cloth.push('1 warm jacket', '1 sweater / fleece', '1 scarf', '1 pair gloves'); }
  if (weather==='freezing') { cloth.push('1 thermal base layer', '1 winter hat / beanie', '1 pair thermal socks'); }
  if (trip==='business') { cloth.push('1-2 suits / outfits', '1 dress shoes', '1 belt'); }
  if (trip==='skiing') { cloth.push('1 ski jacket', '1 ski pants', '1 thermal layers set', '1 balaclava'); }
  if (trip==='hiking'||trip==='camping') { cloth.push('1 hiking boots', '1 rain jacket', '1 quick-dry pants'); }
  if (trip==='beach'||trip==='cruise') cloth.push('1-2 swimwear', '1 flip-flops', '1 beach cover-up');

  // Footwear
  cats['👟 Footwear'] = ['1 comfortable walking shoes'];
  if (trip==='business') cats['👟 Footwear'].push('1 dress shoes');
  if (weather==='hot'||weather==='warm'||trip==='beach') cats['👟 Footwear'].push('1 sandals / flip-flops');
  if (trip==='hiking') cats['👟 Footwear'].push('1 hiking boots');
  if (weather==='cold'||weather==='freezing') cats['👟 Footwear'].push('1 waterproof boots');

  // Toiletries
  cats['🧴 Toiletries'] = ['Toothbrush & toothpaste','Deodorant','Shampoo & conditioner','Body wash / soap','Hairbrush / comb','Skincare / moisturizer','Razor & shaving cream','Sunscreen (SPF 30+)','Lip balm','Medications / first aid kit'];
  if (gender==='women') cats['🧴 Toiletries'].push('Makeup & remover','Hair ties / clips');
  if (gender==='men') cats['🧴 Toiletries'].push('Shaving gear');

  // Electronics
  cats['🔋 Electronics'] = ['Phone & charger','Power bank','Headphones / earbuds'];
  if (activeExtras.has('ex_laptop')) cats['🔋 Electronics'].push('Laptop & charger','Mouse','Universal travel adapter');
  if (activeExtras.has('ex_camera')) cats['🔋 Electronics'].push('Camera & lenses','Memory cards','Extra batteries','Tripod');
  if (trip==='business') cats['🔋 Electronics'].push('Laptop & charger','Presentation clicker');

  // Documents
  cats['📄 Documents'] = ['ID / passport','Tickets / boarding pass','Hotel & transport confirmations','Credit / debit cards','Cash (local currency)','Travel insurance documents','Emergency contacts list'];
  if (activeExtras.has('ex_flight')) { cats['📄 Documents'].push('Visa (if required)','Vaccination certificate','International driver license'); }
  if (trip==='business') cats['📄 Documents'].push('Business cards','Meeting agenda','Presentation copies');

  // Extras by activity
  cats['🎒 Extras'] = [];
  if (activeExtras.has('ex_swim')) cats['🎒 Extras'].push('Goggles','Beach towel');
  if (activeExtras.has('ex_workout')) cats['🎒 Extras'].push('Workout clothes','Running shoes','Resistance band');
  if (activeExtras.has('ex_formal')) cats['🎒 Extras'].push('Formal outfit','Dress shoes','Accessories');
  if (activeExtras.has('ex_kids')) cats['🎒 Extras'].push('Diapers & wipes','Kids snacks','Favorite toy / blanket','Kids medication');
  if (trip==='camping') cats['🎒 Extras'].push('Tent','Sleeping bag','Headlamp','Multi-tool','Water bottle','Insect repellent');
  if (trip==='hiking') cats['🎒 Extras'].push('Daypack','Water bottle / hydration','Trail map','Trekking poles','Insect repellent');
  if (trip==='skiing') cats['🎒 Extras'].push('Ski goggles','Helmet','Ski gloves','Hand warmers');
  if (trip==='festival') cats['🎒 Extras'].push('Portable charger','Earplugs','Reusable water bottle','Small backpack','Wet wipes');
  if (weather==='hot'||weather==='warm'||weather==='mixed') cats['🎒 Extras'].push('Sunglasses','Reusable water bottle','Hat');
  if (cats['🎒 Extras'].length===0) delete cats['🎒 Extras'];

  // Render
  const list = $('#list');
  list.innerHTML = '';
  for (const [catName, items] of Object.entries(cats)) {
    const block = document.createElement('div');
    block.className = 'cat-block';
    let html = `<h4>${catName}</h4>`;
    for (const item of items) {
      const id = 'pi-' + catName + '-' + item;
      const isChecked = checked.has(id);
      html += `<div class="pi ${isChecked?'done':''}"><input type="checkbox" id="${CSS.escape(id)}" ${isChecked?'checked':''} onchange="toggleCheck('${id.replace(/'/g,"\\'")}', this)"><label for="${CSS.escape(id)}">${item}</label></div>`;
    }
    block.innerHTML = html;
    list.appendChild(block);
  }
  updateProgress();
  saveChecked();
}

function toggleCheck(id, el) {
  if (el.checked) checked.add(id); else checked.delete(id);
  el.parentElement.classList.toggle('done', el.checked);
  updateProgress();
  saveChecked();
}

function updateProgress() {
  const boxes = document.querySelectorAll('#list input[type=checkbox]');
  const total = boxes.length;
  const done = [...boxes].filter(b=>b.checked).length;
  const pct = total ? (done/total*100) : 0;
  $('#prog').style.width = pct + '%';
}

function clearChecks() {
  checked.clear();
  document.querySelectorAll('#list input[type=checkbox]').forEach(b => { b.checked=false; b.parentElement.classList.remove('done'); });
  updateProgress(); saveChecked();
}

function copyList() {
  const lines = [];
  document.querySelectorAll('#list .cat-block').forEach(b => {
    lines.push(b.querySelector('h4').textContent);
    b.querySelectorAll('.pi').forEach(pi => {
      const cb = pi.querySelector('input'); const lbl = pi.querySelector('label').textContent;
      lines.push('  ' + (cb.checked?'[x] ':'[ ] ') + lbl);
    });
  });
  copyText(lines.join('\n'));
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="buildList()">${t('generate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="window.print()">${t('print')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="copyList()">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="clearChecks()">${t('clear')}</button>`;

$('#lbl-trip').textContent = t('tripType');
$('#lbl-weather').textContent = t('weather');
$('#lbl-days').textContent = t('days');
$('#lbl-gender').textContent = t('gender');

loadChecked();
buildList();

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'✅', href:'/text/checklist.html', name:'Checklist Maker'},
    {icon:'📝', href:'/text/todo.html', name:'Todo List'},
    {icon:'📅', href:'/text/weekly-planner.html', name:'Weekly Planner'},
    {icon:'✈️', href:'/convert/meeting-planner.html', name:'Meeting Planner'},
  ]
});
</script>
<script src="/tools-result-rec.js?v=20260707v520" defer></script>
</body>
</html>
