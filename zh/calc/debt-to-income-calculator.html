<style>
.dti-form{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px;max-width:780px;margin-bottom:14px}
.dti-group{background:var(--glass2);border:1px solid var(--border);border-radius:12px;padding:14px}
.dti-group h4{margin:0 0 10px;font-size:.9em;color:var(--accent);display:flex;align-items:center;gap:6px}

.dti-bar{height:14px;border-radius:7px;background:var(--bg2);overflow:hidden;margin:14px 0 4px;position:relative}
.dti-fill{height:100%;border-radius:7px;transition:width .3s}
.dti-scale{display:flex;justify-content:space-between;font-size:.68em;color:var(--text2);margin-bottom:12px}
</style>

<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is a good debt-to-income ratio?", "acceptedAnswer": {"@type": "Answer", "text": "A back-end DTI of 36% or lower is generally considered healthy. For mortgages, most lenders prefer a back-end DTI under 43%, though some conventional and FHA loans allow up to 50% with strong credit. A front-end (housing) ratio under 28% is ideal."}}, {"@type": "Question", "name": "What is the difference between front-end and back-end DTI?", "acceptedAnswer": {"@type": "Answer", "text": "Front-end DTI (housing ratio) only counts your housing costs — mortgage principal, interest, taxes and insurance (PITI) plus HOA — divided by gross monthly income. Back-end DTI includes housing plus all other debt payments such as car loans, student loans, minimum credit-card payments and child support."}}, {"@type": "Question", "name": "Is debt-to-income calculated using gross or net income?", "acceptedAnswer": {"@type": "Answer", "text": "Lenders calculate DTI using your gross (pre-tax) monthly income, not your take-home pay. That is the figure most mortgage and loan qualification standards are based on, which is why this calculator asks for gross income."}}, {"@type": "Question", "name": "Can I lower my DTI to qualify for a mortgage?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. Pay down or pay off credit cards, avoid new loans before applying, increase your income, or refinance existing debt at lower payments. Even a small reduction can move you below a lender's threshold and improve your rate."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">

  </div>
  <div class="gz-tool-area">
    <div class="dti-form">
      <div class="dti-group">
        <h4 id="g-income"></h4>
        <div class="dti-field"><label id="lbl-gross"></label>
          <div class="dti-cur"><span>$</span><input type="number" id="gross" value="6000" min="0" step="100"></div>
        </div>
      </div>
      <div class="dti-group">
        <h4 id="g-housing"></h4>
        <div class="dti-field"><label id="lbl-piti"></label>
          <div class="dti-cur"><span>$</span><input type="number" id="piti" value="1600" min="0" step="50"></div>
        </div>
        <div class="dti-field"><label id="lbl-hoa"></label>
          <div class="dti-cur"><span>$</span><input type="number" id="hoa" value="0" min="0" step="25"></div>
        </div>
      </div>
      <div class="dti-group">
        <h4 id="g-debts"></h4>
        <div class="dti-field"><label id="lbl-car"></label>
          <div class="dti-cur"><span>$</span><input type="number" id="car" value="350" min="0" step="25"></div>
        </div>
        <div class="dti-field"><label id="lbl-cc"></label>
          <div class="dti-cur"><span>$</span><input type="number" id="cc" value="80" min="0" step="10"></div>
        </div>
        <div class="dti-field"><label id="lbl-student"></label>
          <div class="dti-cur"><span>$</span><input type="number" id="student" value="250" min="0" step="25"></div>
        </div>
        <div class="dti-field"><label id="lbl-other"></label>
          <div class="dti-cur"><span>$</span><input type="number" id="other" value="0" min="0" step="25"></div>
        </div>

    <div class="dti-result">
      <div class="dti-main">
        <div class="dti-big"><div class="num" id="frontPct">—</div><div class="lbl" id="frontLbl"></div></div>
        <div class="dti-big"><div class="num" id="backPct">—</div><div class="lbl" id="backLbl"></div></div>
      </div>
      <div class="dti-scale"><span id="sc-ideal"></span><span>36%</span><span>43%</span><span id="sc-high"></span></div>
      <div class="dti-bar"><div class="dti-fill" id="bar" style="width:0%"></div></div>
      <div class="dti-row"><span id="r-monthly-debt"></span><span class="v" id="v-monthly-debt"></span></div>
      <div class="dti-row"><span id="r-after-debt"></span><span class="v" id="v-after-debt"></span></div>
      <div class="dti-verdict" id="verdict"></div>
    </div>
  </div>

</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Debt-to-Income (DTI) Ratio Calculator',
    toolDesc: 'Find your front-end and back-end debt-to-income ratio in seconds. Enter your gross monthly income and debt payments to see whether you qualify for a mortgage or loan. Free and private — runs entirely in your browser.',
    gIncome: '💰 Monthly gross income',
    gHousing: '🏠 Housing costs',
    gDebts: '💳 Monthly debts',
    lblGross: 'Gross monthly income (before tax)',
    lblPiti: 'Mortgage P&I + tax + insurance',
    lblHoa: 'HOA / condo fees (monthly)',
    lblCar: 'Car loan / lease payment',
    lblCc: 'Min. credit-card payments',
    lblStudent: 'Student loan payment',
    lblOther: 'Other debt (child support, etc.)',
    frontLbl: 'Front-end (housing) DTI',
    backLbl: 'Back-end (total) DTI',
    scIdeal: 'Ideal ≤28% / 36%',
    scHigh: 'High 50%+',
    rMonthlyDebt: 'Total monthly debt payments',
    rAfterDebt: 'Income left after debts',
    step1: 'Enter your gross (pre-tax) monthly income at the top.',
    step2: 'Add your housing costs — mortgage payment, property tax, insurance and HOA.',
    step3: 'List your other monthly debt payments: car, student loans, credit-card minimums and more.',
    step4: 'Read your front-end and back-end DTI and the verdict to see where you stand for lenders.',
  },
  zh: {
    toolTitle: '债务收入比 (DTI) 计算器',
    toolDesc: '几秒算出你的前段（住房）和后段（总）债务收入比。输入税前月收入和各项债务月供，判断能否获批房贷或贷款。免费且私密 — 完全在浏览器本地运行。',
    gIncome: '💰 月税前总收入',
    gHousing: '🏠 住房支出',
    gDebts: '💳 月度债务',
    lblGross: '税前月总收入',
    lblPiti: '房贷本息 + 房产税 + 保险',
    lblHoa: '物业 / 业委会月费',
    lblCar: '车贷 / 租赁月供',
    lblCc: '信用卡最低还款',
    lblStudent: '助学贷款月供',
    lblOther: '其他债务（抚养费等）',
    frontLbl: '前段（住房）DTI',
    backLbl: '后段（总）DTI',
    scIdeal: '理想 ≤28% / 36%',
    scHigh: '偏高 50%+',
    rMonthlyDebt: '月度债务总支出',
    rAfterDebt: '还债后剩余收入',
    step1: '在顶部输入你的税前（毛）月收入。',
    step2: '添加住房支出 — 房贷、房产税、保险和物业费。',
    step3: '列出其他月度债务：车贷、助学贷款、信用卡最低还款等。',
    step4: '查看前段和后段 DTI 及评估结论，了解你在贷款机构眼中的资质。',
  }
});

const { $, t } = GZ;
const money = n => '$' + n.toLocaleString('en-US', {maximumFractionDigits:0});
const pct = n => n.toFixed(1) + '%';

function calc() {
  const gross = +$('#gross').value || 0;
  const piti = +$('#piti').value || 0;
  const hoa = +$('#hoa').value || 0;
  const housing = piti + hoa;
  const debts = (+$('#car').value||0) + (+$('#cc').value||0) + (+$('#student').value||0) + (+$('#other').value||0);
  const totalDebt = housing + debts;
  if (gross <= 0) {
    $('#frontPct').textContent = '—'; $('#backPct').textContent = '—';
    $('#verdict').textContent = ''; $('#bar').style.width = '0%';
    $('#v-monthly-debt').textContent = '—'; $('#v-after-debt').textContent = '—';
    return;
  }
  const front = (housing / gross) * 100;
  const back = (totalDebt / gross) * 100;
  $('#frontPct').textContent = pct(front);
  $('#backPct').textContent = pct(back);
  $('#v-monthly-debt').textContent = money(totalDebt);
  $('#v-after-debt').textContent = money(gross - totalDebt);
  // Bar: scale to 60% max
  $('#bar').style.width = Math.min(back, 60) / 60 * 100 + '%';
  let color, msg, bg;
  if (back <= 36) { color='#00d672'; bg='rgba(0,214,114,.12)';
    msg = (getLang()==='zh' ? '✓ 优秀：后段 DTI ' : '✓ Excellent: back-end DTI ') + pct(back) + (getLang()==='zh' ? ' — 贷款机构会非常欢迎。' : ' — lenders will love it.');
  } else if (back <= 43) { color='#61afef'; bg='rgba(97,175,239,.12)';
    msg = (getLang()==='zh' ? '✓ 良好：后段 DTI ' : '✓ Good: back-end DTI ') + pct(back) + (getLang()==='zh' ? ' — 多数房贷可获批。' : ' — most mortgages are within reach.');
  } else if (back <= 50) { color='#d19a66'; bg='rgba(209,154,102,.14)';
    msg = (getLang()==='zh' ? '⚠ 偏高：后段 DTI ' : '⚠ Tight: back-end DTI ') + pct(back) + (getLang()==='zh' ? ' — 部分贷款可批，建议先降负债。' : ' — some loans may qualify; pay down debt first.');
  } else { color='#e94560'; bg='rgba(233,69,96,.14)';
    msg = (getLang()==='zh' ? '✗ 过高：后段 DTI ' : '✗ High: back-end DTI ') + pct(back) + (getLang()==='zh' ? ' — 多数贷款会被拒，需大幅降低负债。' : ' — most lenders will decline; reduce debt significantly.');
  }
  $('#bar').style.background = 'linear-gradient(90deg,'+color+','+color+')';
  const vd = $('#verdict'); vd.textContent = msg; vd.style.background = bg; vd.style.color = color;
}

function getLang(){ return GZI18n.getLang(); }

['gross','piti','hoa','car','cc','student','other'].forEach(id => $('#'+id).addEventListener('input', calc));
calc();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🏦', href:'/calc/mortgage-calculator.html', name:'Mortgage Calculator'},
    {icon:'🏠', href:'/calc/home-affordability-calculator.html', name:'Home Affordability'},
    {icon:'📉', href:'/calc/debt-payoff-calculator.html', name:'Debt Payoff'},
    {icon:'💳', href:'/calc/credit-card-payoff-calculator.html', name:'Credit Card Payoff'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
