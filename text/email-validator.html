const { $, t } = GZ;

const COMMON_DOMAINS = {
  'gmail.com':'gmail.com','yahoo.com':'yahoo.com','hotmail.com':'hotmail.com','outlook.com':'outlook.com',
  'aol.com':'aol.com','icloud.com':'icloud.com','protonmail.com':'protonmail.com','mail.com':'mail.com',
  'zoho.com':'zoho.com','yandex.com':'yandex.com','qq.com':'qq.com','163.com':'163.com','126.com':'126.com',
  'sina.com':'sina.com','foxmail.com':'foxmail.com','yeah.net':'yeah.net'
};

const DISPOSABLE_DOMAINS = ['mailinator.com','guerrillamail.com','tempmail.com','throwaway.email','yopmail.com','sharklasers.com','guerrillamailblock.com','grr.la','dispostable.com','mailnesia.com'];
const ROLE_PREFIXES = ['admin','info','support','noreply','no-reply','postmaster','webmaster','abuse','root','help','sales','marketing','hr','billing'];

function levenshtein(a, b) {
  const m = a.length, n = b.length;
  const d = Array.from({length:m+1}, (_,i) => [i]);
  for (let j = 1; j <= n; j++) d[0][j] = j;
  for (let i = 1; i <= m; i++)
    for (let j = 1; j <= n; j++)
      d[i][j] = Math.min(d[i-1][j]+1, d[i][j-1]+1, d[i-1][j-1]+(a[i-1]!==b[j-1]?1:0));
  return d[m][n];
}

function validateEmail(email) {
  email = email.trim().toLowerCase();
  const results = { email, checks: [], isValid: false, typo: null };

  // Syntax check
  const re = /^[a-zA-Z0-9.!#$%&'*+/=?^_`{|}~-]+@[a-zA-Z0-9](?:[a-zA-Z0-9-]{0,61}[a-zA-Z0-9])?(?:\.[a-zA-Z0-9](?:[a-zA-Z0-9-]{0,61}[a-zA-Z0-9])?)*$/;
  const syntaxOk = re.test(email);
  results.checks.push({ name: t('checkSyntax'), status: syntaxOk ? 'pass' : 'fail', detail: syntaxOk ? t('passed') : t('failed') });

  if (!syntaxOk) { results.isValid = false; return results; }

  // Domain check
  const domain = email.split('@')[1];
  const domainOk = domain && domain.includes('.') && domain.length >= 3;
  results.checks.push({ name: t('checkDomain'), status: domainOk ? 'pass' : 'fail', detail: domain || t('na') });

  // Typo check
  let typoStatus = 'pass', typoDetail = t('passed');
  if (domain) {
    let minDist = Infinity, closest = '';
    for (const [d] of Object.entries(COMMON_DOMAINS)) {
      const dist = levenshtein(domain, d);
      if (dist < minDist && dist > 0 && dist <= 2) { minDist = dist; closest = d; }
    }
    if (closest && !COMMON_DOMAINS[domain]) {
      typoStatus = 'warn'; typoDetail = `${domain} → ${closest}?`;
      results.typo = email.replace(domain, closest);
    }
  }
  results.checks.push({ name: t('checkTypo'), status: typoStatus, detail: typoDetail });

  // Disposable check
  const isDisp = DISPOSABLE_DOMAINS.some(d => domain && domain.endsWith(d));
  results.checks.push({ name: t('checkDisposable'), status: isDisp ? 'warn' : 'pass', detail: isDisp ? t('warning') : t('passed') });

  // Role-based check
  const local = email.split('@')[0];
  const isRole = ROLE_PREFIXES.some(r => local === r);
  results.checks.push({ name: t('checkRole'), status: isRole ? 'warn' : 'pass', detail: isRole ? t('warning') : t('passed') });

  results.isValid = syntaxOk && domainOk;
  return results;
}

function renderResult(r) {
  const statusIcon = r.isValid ? '✅' : '❌';
  const statusClass = r.isValid ? 'valid' : 'invalid';
  let html = `<div class="result-card ${statusClass}">
    <div style="font-size:1.1rem;font-weight:700;margin-bottom:8px">${statusIcon} ${r.isValid ? t('validEmail') : t('invalidEmail')}: ${r.email}</div>`;
  r.checks.forEach(c => {
    const icon = c.status === 'pass' ? '✅' : c.status === 'warn' ? '⚠️' : '❌';
    html += `<div class="check-item"><span class="icon">${icon}</span><span class="label">${c.name}</span><span class="value">${c.detail}</span></div>`;
  });
  if (r.typo) {
    html += `<div style="margin-top:8px;padding:8px;background:var(--glass2);border-radius:8px;font-size:.85rem">💡 ${t('checkTypo')}: <strong>${r.typo}</strong></div>`;
  }
  html += '</div>';
  return html;
}

function validateSingle() {
  const email = $('#emailInput').value.trim();
  if (!email) return;
  const r = validateEmail(email);
  $('#singleResult').innerHTML = renderResult(r);
}

function validateBatch() {
  const raw = $('#batchInput').value.trim();
  if (!raw) return;
  const emails = raw.split(/[\n,;]+/).map(e => e.trim()).filter(Boolean);
  let valid = 0, invalid = 0, warns = 0;
  let html = '';
  emails.forEach(email => {
    const r = validateEmail(email);
    if (r.isValid) valid++; else invalid++;
    if (r.checks.some(c => c.status === 'warn')) warns++;
    const icon = r.isValid ? '✅' : '❌';
    html += `<div class="row"><span>${icon}</span><span style="flex:1;font-family:monospace">${r.email}</span>${r.typo ? `<span style="font-size:.8rem;opacity:.7">→ ${r.typo}</span>` : ''}</div>`;
  });
  $('#batchStats').innerHTML = `<div class="stats">
    <div class="stat"><div class="num">${emails.length}</div><div class="lbl">${t('total')}</div></div>
    <div class="stat"><div class="num" style="color:var(--gz-success)">${valid}</div><div class="lbl">${t('valid')}</div></div>
    <div class="stat"><div class="num" style="color:var(--gz-accent)">${invalid}</div><div class="lbl">${t('invalid')}</div></div>
    <div class="stat"><div class="num" style="color:#f59e0b">${warns}</div><div class="lbl">${t('warnings')}</div></div>
  </div>`;
  $('#batchResults').innerHTML = html;
}

$('#emailInput').addEventListener('keydown', e => { if (e.key === 'Enter') validateSingle(); });

// Tab switching
let currentTab = 'single';
function switchTab(tab) {
  currentTab = tab;
  $('#singleMode').style.display = tab === 'single' ? '' : 'none';
  $('#batchMode').style.display = tab === 'batch' ? '' : 'none';
  $$('#tabBar button').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
}

$('#tabBar').innerHTML = `<button data-tab="single" class="active" onclick="switchTab('single')">${t('single')}</button><button data-tab="batch" onclick="switchTab('batch')">${t('batch')}</button>`;

$('#validateBtn').textContent = t('validate');
$('#batchMode .gz-btn').textContent = t('validateBatch');

  <button class="gz-btn gz-btn-secondary" onclick="$('#emailInput').value='';$('#singleResult').innerHTML='';$('#batchInput').value='';$('#batchResults').innerHTML='';$('#batchStats').innerHTML=''">${t('clear')}</button>`;
