<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"What is HowTo schema markup?","acceptedAnswer":{"@type":"Answer","text":"HowTo schema is structured data (JSON-LD) that describes a step-by-step process so Google can display a rich how-to result with images, total time and individual steps."}},{"@type":"Question","name":"When should I use HowTo schema?","acceptedAnswer":{"@type":"Answer","text":"Use it on pages that walk users through a task with clear ordered steps, such as recipes, DIY projects and tutorials. Avoid it for purely informational articles."}},{"@type":"Question","name":"How many steps can a HowTo have?","acceptedAnswer":{"@type":"Answer","text":"There is no hard limit, but Google recommends at least 2 and no more than about 30 steps for clear rich results. Each step needs a name and/or text."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header"><h1 id="title"></h1><p class="desc" id="desc"></p></div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="gz-split">
      <div>
        <div class="form-grid">
          <div class="fg full"><label id="lbl-name"></label><input id="f-name" type="text" placeholder="How to brew pour-over coffee"></div>
          <div class="fg"><label id="lbl-desc"></label><input id="f-desc" type="text" placeholder="A clean, balanced cup using a V60 dripper."></div>
          <div class="fg"><label id="lbl-time"></label><input id="f-time" type="text" placeholder="PT10M"></div>
          <div class="fg"><label id="lbl-img"></label><input id="f-img" type="text" placeholder="https://example.com/howto.jpg"></div>
          <div class="fg"><label id="lbl-supplies"></label><textarea id="f-supplies" rows="3" placeholder="Coffee beans&#10;Filter paper&#10;Hot water"></textarea></div>
          <div class="fg"><label id="lbl-tools"></label><textarea id="f-tools" rows="3" placeholder="Pour-over dripper&#10;Kettle&#10;Scale"></textarea></div>
        </div>
        <div style="margin-top:14px">
          <div style="font-size:.78em;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px" id="lbl-steps"></div>
          <div id="steps"></div>
          <button class="gz-btn gz-btn-secondary add-btn" id="add-step"></button>
        </div>
      </div>
      <div>
        <label style="display:block;font-size:.78em;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px">JSON-LD</label>
        <div class="gz-output" id="output"></div>
      </div>
    </div>
    <div id="status"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'HowTo Schema Generator',
    toolDesc: 'Turn step-by-step instructions into valid HowTo JSON-LD with total time, supplies and tools for Google rich results.',
    generate: 'Generate', example: 'Example', copy: 'Copy', clear: 'Clear',
    lblName: 'How-to title', lblDesc: 'Short description', lblTime: 'Total time (ISO 8601)',
    lblImg: 'Image URL', lblSupplies: 'Supplies (one per line)', lblTools: 'Tools (one per line)',
    lblSteps: 'Steps', addStep: '+ Add step', stepName: 'Step name', stepText: 'Step instructions',
    remove: '✕', stepN: 'Step',
    step1: 'Enter a clear how-to title and short description.',
    step2: 'Add each step with a name and instructions.',
    step3: 'Optionally list supplies, tools and total time.',
    step4: 'Copy the JSON-LD into your page <head>.',
  },
  zh: {
    toolTitle: 'HowTo 教程 Schema 生成器',
    toolDesc: '将分步说明转换为符合规范的 HowTo JSON-LD，包含总时长、耗材和工具，助力 Google 富结果。',
    generate: '生成', example: '示例', copy: '复制', clear: '清空',
    lblName: '教程标题', lblDesc: '简短描述', lblTime: '总时长 (ISO 8601)',
    lblImg: '图片 URL', lblSupplies: '耗材（每行一个）', lblTools: '工具（每行一个）',
    lblSteps: '步骤', addStep: '+ 添加步骤', stepName: '步骤名称', stepText: '步骤说明',
    remove: '✕', stepN: '步骤',
    step1: '填写清晰的教程标题和简短描述。',
    step2: '逐步添加每个步骤的名称和说明。',
    step3: '可选：列出耗材、工具和总时长。',
    step4: '将 JSON-LD 复制到页面 <head> 中。',
  }
});
const { $, copyText, t } = GZ;

$('#lbl-name').textContent = t('lblName');
$('#lbl-desc').textContent = t('lblDesc');
$('#lbl-time').textContent = t('lblTime');
$('#lbl-img').textContent = t('lblImg');
$('#lbl-supplies').textContent = t('lblSupplies');
$('#lbl-tools').textContent = t('lblTools');
$('#lbl-steps').textContent = t('lblSteps');
$('#add-step').textContent = t('addStep');

function addStep(name='', text='', img='') {
  const wrap = document.createElement('div');
  wrap.className = 'step';
  wrap.innerHTML = `<div class="step-head"><span class="step-no"></span><button type="button" class="step-rm">${t('remove')}</button></div>` +
    `<input class="s-name" placeholder="${t('stepName')}" value="${name.replace(/"/g,'&quot;')}" style="width:100%;padding:7px 10px;border:1px solid var(--border);border-radius:7px;background:var(--glass2);color:var(--text);margin-bottom:5px">` +
    `<textarea class="s-text" rows="2" placeholder="${t('stepText')}" style="width:100%;padding:7px 10px;border:1px solid var(--border);border-radius:7px;background:var(--glass2);color:var(--text);margin-bottom:5px">${text}</textarea>` +
    `<input class="s-img" type="text" placeholder="${t('lblImg')}" value="${img.replace(/"/g,'&quot;')}" style="width:100%;padding:7px 10px;border:1px solid var(--border);border-radius:7px;background:var(--glass2);color:var(--text)">`;
  wrap.querySelector('.step-rm').onclick = () => { wrap.remove(); renumber(); gen(); };
  $('#steps').appendChild(wrap);
  renumber();
  gen();
}
function renumber() { $('#steps').querySelectorAll('.step').forEach((s,i) => s.querySelector('.step-no').textContent = `${t('stepN')} ${i+1}`); }

function hl(json) {
  return json.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/("(\\u[\da-fA-F]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false)\b|-?\d+(\.\d+)?([eE][+-]?\d+)?)/g, m => {
      let c='gz-num'; if(/^"/.test(m)) c=/:$/.test(m)?'gz-key':'gz-str'; else if(/true|false/.test(m)) c='gz-bool';
      return `<span class="${c}">${m}</span>`;
    });
}

function gen() {
  const v = id => (document.getElementById(id)||{}).value || '';
  const data = { "@context":"https://schema.org", "@type":"HowTo", "name": v('f-name') };
  if (v('f-desc')) data.description = v('f-desc');
  if (v('f-img')) data.image = v('f-img');
  if (v('f-time')) data.totalTime = v('f-time');
  const supplies = v('f-supplies').split('\n').map(x=>x.trim()).filter(Boolean);
  if (supplies.length) data.supply = supplies.map(s => ({ "@type":"HowToSupply", name:s }));
  const tools = v('f-tools').split('\n').map(x=>x.trim()).filter(Boolean);
  if (tools.length) data.tool = tools.map(s => ({ "@type":"HowToTool", name:s }));
  const steps = [...$('#steps').querySelectorAll('.step')].map((s,i) => {
    const step = { "@type":"HowToStep", position: i+1, name: s.querySelector('.s-name').value };
    const text = s.querySelector('.s-text').value;
    if (text) step.text = text;
    const img = s.querySelector('.s-img').value;
    if (img) step.image = img;
    return step;
  }).filter(s => s.name || s.text);
  if (steps.length) data.step = steps;
  $('#output').innerHTML = hl(JSON.stringify(data, null, 2));
  $('#status').innerHTML = `<span style="color:var(--gz-success);font-size:.85em">✓ ${steps.length} ${t('lblSteps')}</span>`;
}

function example() {
  $('#f-name').value = 'How to brew pour-over coffee';
  $('#f-desc').value = 'A clean, balanced cup of coffee using a V60 dripper.';
  $('#f-time').value = 'PT10M';
  $('#f-img').value = 'https://example.com/pourover.jpg';
  $('#f-supplies').value = '22g fresh coffee beans\n350ml hot water (94°C)\nPaper filter';
  $('#f-tools').value = 'V60 dripper\nGooseneck kettle\nDigital scale';
  $('#steps').innerHTML = '';
  addStep('Grind the beans', 'Grind 22g of coffee to a medium-fine consistency, like table salt.');
  addStep('Rinse the filter', 'Place the filter in the dripper and pour hot water through it to remove papery taste and preheat.');
  addStep('Add coffee and bloom', 'Add the grounds, level the bed, then pour 50g of water and wait 30 seconds to bloom.');
  addStep('Pour in stages', 'Slowly pour the remaining water in concentric circles over 90 seconds.');
  addStep('Serve', 'Remove the dripper, swirl the carafe, and pour into your mug.');
  gen();
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="gen()">${t('generate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="example()">${t('example')}</button>
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#steps').innerHTML='';document.querySelectorAll('#f-name,#f-desc,#f-time,#f-img,#f-supplies,#f-tools').forEach(i=>i.value='');gen()">${t('clear')}</button>`;
$('#add-step').onclick = () => addStep();
document.querySelectorAll('#f-name,#f-desc,#f-time,#f-img,#f-supplies,#f-tools').forEach(el => el.addEventListener('input', gen));
$('#steps').addEventListener('input', gen);

GZ.renderToolPage({
  category: 'seo',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'❓', href:'/seo/faq-schema-generator.html', name:'FAQ Schema Generator'},
    {icon:'🛍️', href:'/seo/product-schema-generator.html', name:'Product Schema Generator'},
    {icon:'⭐', href:'/seo/review-schema-generator.html', name:'Review Schema Generator'},
    {icon:'📅', href:'/seo/event-schema-generator.html', name:'Event Schema Generator'},
  ]
});
example();
</script>
<script src="/tools-result-rec.js?v=20260707v520" defer></script>
</body>
