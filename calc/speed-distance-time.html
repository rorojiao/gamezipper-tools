<script>
GZI18n.register({
  en: {
    toolTitle: 'Speed Distance Time Calculator',
    toolDesc: 'Solve for speed, distance or time. Enter any two values, pick the units, and get the third with a step-by-step formula and instant unit conversions.',
    lblDistance: 'Distance', lblSpeed: 'Speed', lblTime: 'Time',
    lblUnit: 'Unit',
    solve: 'Solving for', formula: 'Formula',
    examples: 'Try an example',
    ex1: '🚗 100 km in 1h 30min', ex2: '🏃 5 km at 12 km/h', ex3: '✈️ 5000 km at 900 km/h', ex4: '🚴 25 km in 45 min',
    tip: 'Tip: The "magic triangle" has speed on top, distance and time on the bottom — cover the one you want to solve, and the remaining two show you whether to multiply or divide.',
    step1: 'Click Speed, Distance or Time to choose which variable to solve for',
    step2: 'Enter the other two values and pick units (km, mi, m, h, min, s, mph, m/s...)',
    step3: 'The result appears instantly with the formula used and unit conversions',
    step4: 'Click any example below to load a real-world scenario',
  },
  zh: {
    toolTitle: '速度距离时间计算器',
    toolDesc: '求解速度、距离或时间。输入任意两个值并选择单位，第三个值会自动算出，并显示分步公式和单位换算。',
    lblDistance: '距离', lblSpeed: '速度', lblTime: '时间',
    lblUnit: '单位',
    solve: '求解', formula: '公式',
    examples: '试一试示例',
    ex1: '🚗 1 小时 30 分钟跑 100 公里', ex2: '🏃 12 公里/时跑 5 公里', ex3: '✈️ 900 公里/时飞 5000 公里', ex4: '🚴 45 分钟骑 25 公里',
    tip: '提示：经典"魔法三角"中，速度在顶部，距离和时间在底部 — 盖住想要求解的量，剩下的两个就告诉你是乘还是除。',
    step1: '点击「速度」「距离」或「时间」选择要计算的量',
    step2: '输入另两个值和单位（km、mi、m、h、min、s、mph、m/s 等）',
    step3: '结果即时显示，含所用公式和单位换算',
    step4: '点击下方任意示例加载真实场景',
  }
});

const { $, t } = GZ;
let mode = 'speed';

// Conversion factors to SI (meters, seconds, m/s)
const DIST = {
  km: 1000, m: 1, cm: 0.01, mi: 1609.344, ft: 0.3048, nmi: 1852, yd: 0.9144
};
const TIME = {
  s: 1, min: 60, h: 3600, day: 86400
};
const SPEED = {
  'm/s': 1,
  'km/h': 1/3.6,
  'mph': 0.44704,
  'ft/s': 0.3048,
  'knot': 0.514444
};
const DIST_LABELS = {km:'km', m:'m', cm:'cm', mi:'mi', ft:'ft', nmi:'nm', yd:'yd'};
const TIME_LABELS = {s:'sec', min:'min', h:'hr', day:'day'};
const SPEED_LABELS = {'m/s':'m/s', 'km/h':'km/h', 'mph':'mph', 'ft/s':'ft/s', 'knot':'knots'};

function setMode(m){
  mode = m;
  document.querySelectorAll('.sdt-tabs button').forEach(b => b.classList.toggle('active', b.dataset.mode === m));
  buildForm();
  calc();
}

function buildForm(){
  const f = $('#form');
  if (mode === 'speed') {
    f.innerHTML = `
      <div>
        <label>${t('lblDistance')}</label>
        <input type="number" id="in-d" value="100" min="0" step="any">
      </div>
      <div>
        <label>${t('lblUnit')}</label>
        <select id="in-du">${Object.keys(DIST).map(u => `<option value="${u}">${DIST_LABELS[u]}</option>`).join('')}</select>
      </div>
      <div>
        <label>${t('lblTime')}</label>
        <input type="number" id="in-t" value="2" min="0" step="any">
      </div>
      <div>
        <label>${t('lblUnit')}</label>
        <select id="in-tu">${Object.keys(TIME).map(u => `<option value="${u}" ${u==='h'?'selected':''}>${TIME_LABELS[u]}</option>`).join('')}</select>
      </div>
    `;
  } else if (mode === 'distance') {
    f.innerHTML = `
      <div>
        <label>${t('lblSpeed')}</label>
        <input type="number" id="in-s" value="60" min="0" step="any">
      </div>
      <div>
        <label>${t('lblUnit')}</label>
        <select id="in-su">${Object.keys(SPEED).map(u => `<option value="${u}" ${u==='km/h'?'selected':''}>${SPEED_LABELS[u]}</option>`).join('')}</select>
      </div>
      <div>
        <label>${t('lblTime')}</label>
        <input type="number" id="in-t" value="2" min="0" step="any">
      </div>
      <div>
        <label>${t('lblUnit')}</label>
        <select id="in-tu">${Object.keys(TIME).map(u => `<option value="${u}" ${u==='h'?'selected':''}>${TIME_LABELS[u]}</option>`).join('')}</select>
      </div>
    `;
  } else {
    f.innerHTML = `
      <div>
        <label>${t('lblDistance')}</label>
        <input type="number" id="in-d" value="100" min="0" step="any">
      </div>
      <div>
        <label>${t('lblUnit')}</label>
        <select id="in-du">${Object.keys(DIST).map(u => `<option value="${u}">${DIST_LABELS[u]}</option>`).join('')}</select>
      </div>
      <div>
        <label>${t('lblSpeed')}</label>
        <input type="number" id="in-s" value="60" min="0" step="any">
      </div>
      <div>
        <label>${t('lblUnit')}</label>
        <select id="in-su">${Object.keys(SPEED).map(u => `<option value="${u}" ${u==='km/h'?'selected':''}>${SPEED_LABELS[u]}</option>`).join('')}</select>
      </div>
    `;
  }
  f.querySelectorAll('input, select').forEach(el => el.addEventListener('input', calc));
}

function calc(){
  let result, unit, formula;
  try {
    if (mode === 'speed') {
      const d = +$('#in-d').value;
      const du = $('#in-du').value;
      const tm = +$('#in-t').value;
      const tu = $('#in-tu').value;
      if (!d || !tm) throw 0;
      const meters = d * DIST[du];
      const seconds = tm * TIME[tu];
      const ms = meters / seconds;
      // pick default unit by distance scale
      const defaultUnit = du === 'mi' || du === 'nmi' ? 'mph' : (du === 'm' || du === 'cm' || du === 'ft' || du === 'yd') ? 'm/s' : 'km/h';
      result = ms / SPEED[defaultUnit];
      unit = SPEED_LABELS[defaultUnit];
      formula = `Speed = ${d} ${DIST_LABELS[du]} ÷ ${tm} ${TIME_LABELS[tu]}`;
      showResult(result, unit, formula, 'speed');
    } else if (mode === 'distance') {
      const s = +$('#in-s').value;
      const su = $('#in-su').value;
      const tm = +$('#in-t').value;
      const tu = $('#in-tu').value;
      if (!s || !tm) throw 0;
      const ms = s * SPEED[su];
      const seconds = tm * TIME[tu];
      const meters = ms * seconds;
      const defaultUnit = su === 'mph' || su === 'knot' ? 'mi' : (su === 'm/s' || su === 'ft/s') ? 'm' : 'km';
      result = meters / DIST[defaultUnit];
      unit = DIST_LABELS[defaultUnit];
      formula = `Distance = ${s} ${SPEED_LABELS[su]} × ${tm} ${TIME_LABELS[tu]}`;
      showResult(result, unit, formula, 'distance');
    } else {
      const d = +$('#in-d').value;
      const du = $('#in-du').value;
      const s = +$('#in-s').value;
      const su = $('#in-su').value;
      if (!d || !s) throw 0;
      const meters = d * DIST[du];
      const ms = s * SPEED[su];
      const seconds = meters / ms;
      // pick time unit by duration
      let defaultUnit = 's';
      if (seconds >= 3600) defaultUnit = 'h';
      else if (seconds >= 60) defaultUnit = 'min';
      result = seconds / TIME[defaultUnit];
      unit = TIME_LABELS[defaultUnit];
      formula = `Time = ${d} ${DIST_LABELS[du]} ÷ ${s} ${SPEED_LABELS[su]}`;
      showResult(result, unit, formula, 'time');
    }
  } catch(e) {
    $('#result').style.display = 'none';
    $('#conversions').innerHTML = '';
    $('#viz').innerHTML = '';
  }
}

function showResult(value, unit, formula, kind){
  $('#result').style.display = 'block';
  $('#res-val').textContent = formatNum(value);
  $('#res-unit').textContent = unit;
  $('#res-formula').textContent = formula;

  // Conversions
  let conv = [];
  if (kind === 'speed') {
    const ms = value * (unit === 'm/s' ? 1 : unit === 'km/h' ? 1/3.6 : unit === 'mph' ? 0.44704 : unit === 'ft/s' ? 0.3048 : 0.514444);
    conv = [
      { v: ms, u: 'm/s' },
      { v: ms * 3.6, u: 'km/h' },
      { v: ms / 0.44704, u: 'mph' },
      { v: ms * 3.6 / 1.852, u: 'knots' }
    ];
  } else if (kind === 'distance') {
    const meters = value * (unit === 'm' ? 1 : unit === 'km' ? 1000 : unit === 'mi' ? 1609.344 : unit === 'ft' ? 0.3048 : unit === 'nm' ? 1852 : 0.9144);
    conv = [
      { v: meters, u: 'm' },
      { v: meters / 1000, u: 'km' },
      { v: meters / 1609.344, u: 'mi' },
      { v: meters / 0.3048, u: 'ft' }
    ];
  } else {
    const seconds = value * (unit === 'sec' ? 1 : unit === 'min' ? 60 : unit === 'hr' ? 3600 : 86400);
    const fmtTime = (s) => {
      if (s < 60) return `${s.toFixed(1)} sec`;
      if (s < 3600) {
        const m = Math.floor(s/60), rs = Math.round(s%60);
        return rs ? `${m} min ${rs} sec` : `${m} min`;
      }
      const h = Math.floor(s/3600), rm = Math.round((s%3600)/60);
      return rm ? `${h} hr ${rm} min` : `${h} hr`;
    };
    conv = [
      { v: seconds, u: 'sec' },
      { v: seconds/60, u: 'min' },
      { v: seconds/3600, u: 'hr' },
      { v: fmtTime(seconds), u: 'formatted' }
    ];
  }
  $('#conversions').innerHTML = `<div class="sdt-conversions">${conv.map(c => `<div class="sdt-conv"><div class="v">${typeof c.v === 'number' ? formatNum(c.v) : c.v}</div><div class="u">${c.u}</div></div>`).join('')}</div>`;

  // Visualization: a bar showing relative magnitudes
  drawViz(kind, value, unit);
}

function formatNum(n){
  if (n >= 1000) return n.toLocaleString(undefined, {maximumFractionDigits: 0});
  if (n >= 100) return n.toFixed(1);
  if (n >= 10) return n.toFixed(2);
  if (n >= 1) return n.toFixed(3);
  return n.toFixed(4);
}

function drawViz(kind, value, unit){
  // Triangle visualization
  let html = `<div style="text-align:center;font-size:.85em;color:var(--text2);margin-bottom:8px">Speed × Time = Distance</div>`;
  html += `<div style="display:grid;grid-template-columns:1fr;gap:6px;max-width:340px;margin:0 auto">`;
  const sH = Math.min(100, kind === 'speed' ? Math.log10(value+1)*30 : 30);
  const dH = Math.min(100, kind === 'distance' ? Math.log10(value+1)*30 : 30);
  const tH = Math.min(100, kind === 'time' ? Math.log10(value+1)*30 : 30);
  const colorOf = (k) => k === mode ? 'var(--accent)' : 'var(--text2)';
  html += `<div style="background:var(--glass2);border-radius:8px;padding:8px;border:2px solid ${colorOf('speed')}"><b>Speed:</b> ${mode === 'speed' ? `${formatNum(value)} ${unit}` : '?'} ${mode !== 'speed' ? '<span style="opacity:.5">(given: needed for solve)</span>' : ''}</div>`;
  html += `<div style="background:var(--glass2);border-radius:8px;padding:8px;border:2px solid ${colorOf('distance')}"><b>Distance:</b> ${mode === 'distance' ? `${formatNum(value)} ${unit}` : '?'}</div>`;
  html += `<div style="background:var(--glass2);border-radius:8px;padding:8px;border:2px solid ${colorOf('time')}"><b>Time:</b> ${mode === 'time' ? `${formatNum(value)} ${unit}` : '?'}</div>`;
  html += `</div>`;
  $('#viz').innerHTML = html;
}

function loadExample(ex){
  if (ex === 1) {
    setMode('time');
    $('#in-d').value = 100; $('#in-du').value = 'km';
    $('#in-s').value = 67; $('#in-su').value = 'km/h';
  } else if (ex === 2) {
    setMode('time');
    $('#in-d').value = 5; $('#in-du').value = 'km';
    $('#in-s').value = 12; $('#in-su').value = 'km/h';
  } else if (ex === 3) {
    setMode('time');
    $('#in-d').value = 5000; $('#in-du').value = 'km';
    $('#in-s').value = 900; $('#in-su').value = 'km/h';
  } else if (ex === 4) {
    setMode('speed');
    $('#in-d').value = 25; $('#in-du').value = 'km';
    $('#in-t').value = 45; $('#in-tu').value = 'min';
  }
  calc();
}

function initExamples(){
  $('#lbl-examples').textContent = t('examples');
  const list = [
    { k: 1, q: t('ex1'), a: '' },
    { k: 2, q: t('ex2'), a: '' },
    { k: 3, q: t('ex3'), a: '' },
    { k: 4, q: t('ex4'), a: '' }
  ];
  $('#examples').innerHTML = list.map(e => `<div class="sdt-example" onclick="loadExample(${e.k})"><div class="q">${e.q}</div></div>`).join('');
}

$('#tip').textContent = t('tip');

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'⛽', href:'/calc/fuel-cost-calculator.html', name:'Fuel Cost'},
    {icon:'🏃', href:'/calc/calorie-calculator.html', name:'Calorie'},
    {icon:'💪', href:'/calc/bmi-calculator.html', name:'BMI'},
    {icon:'🧮', href:'/calc/scientific-calculator.html', name:'Scientific Calc'},
  ]
});

buildForm();
calc();
initExamples();
</script>
