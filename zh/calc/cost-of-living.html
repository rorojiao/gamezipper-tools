// Fix typo
CITIES['Helsinki, Finland'].util = 90;

function populateCities() {
  const sorted = Object.keys(CITIES).sort();
  const fromSel = $('#fromCity'), toSel = $('#toCity');
  sorted.forEach(c => {
    fromSel.add(new Option(c, c));
    toSel.add(new Option(c, c));
  });
  fromSel.value = 'New York, USA';
  toSel.value = 'London, UK';
}

function fmt(n) {
  return n.toLocaleString('en-US', {maximumFractionDigits: 0});
}

function calculate() {
  const salary = parseFloat($('#salary').value) || 0;
  const from = $('#fromCity').value;
  const to = $('#toCity').value;
  const cur = $('#currency').value;
  const sym = {USD:'$',EUR:'€',GBP:'£',CNY:'¥',JPY:'¥',CAD:'$',AUD:'$'}[cur] || '$';

  if (from === to) {
    $('#result').innerHTML = `<div class="col-diff diff-same">${t('sameCity')}</div>`;
    return;
  }

  const fIdx = CITIES[from], tIdx = CITIES[to];
  // Weighted overall: rent 40%, food 25%, transport 15%, utilities 20%
  const fOverall = fIdx.rent*0.4 + fIdx.food*0.25 + fIdx.transport*0.15 + fIdx.util*0.2;
  const tOverall = tIdx.rent*0.4 + tIdx.food*0.25 + tIdx.transport*0.15 + tIdx.util*0.2;
  const ratio = tOverall / fOverall;

  const rentCost = Math.round(salary * 0.33 * (tIdx.rent / fIdx.rent));
  const foodCost = Math.round(salary * 0.20 * (tIdx.food / fIdx.food));
  const transportCost = Math.round(salary * 0.10 * (tIdx.transport / fIdx.transport));
  const utilCost = Math.round(salary * 0.07 * (tIdx.util / fIdx.util));
  const total = Math.round(salary * ratio);
  const diffPct = ((ratio - 1) * 100);

  let diffClass, diffText;
  if (Math.abs(diffPct) < 2) { diffClass = 'diff-same'; diffText = `≈ ${Math.abs(diffPct).toFixed(1)}%`; }
  else if (diffPct > 0) { diffClass = 'diff-up'; diffText = `+${diffPct.toFixed(1)}${t('diffHigher')}`; }
  else { diffClass = 'diff-down'; diffText = `${diffPct.toFixed(1)}${t('diffLower')}`; }

  $('#result').innerHTML = `
    <div class="col-result">
      <h3>${to} <span style="opacity:.5">vs</span> ${from}</h3>
      <div class="col-row"><span class="label">${t('rent')}</span><span class="val">${sym}${fmt(rentCost)}</span></div>
      <div class="col-row"><span class="label">${t('food')}</span><span class="val">${sym}${fmt(foodCost)}</span></div>
      <div class="col-row"><span class="label">${t('transport')}</span><span class="val">${sym}${fmt(transportCost)}</span></div>
      <div class="col-row"><span class="label">${t('utilities')}</span><span class="val">${sym}${fmt(utilCost)}</span></div>
      <div class="col-total"><span>${t('totalNeeded')}</span><span class="val">${sym}${fmt(total)}</span></div>
      <div class="col-diff ${diffClass}">${diffText}</div>
    </div>`;
}

populateCities();
