<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"What is a Unix epoch timestamp?","acceptedAnswer":{"@type":"Answer","text":"A Unix epoch timestamp is the number of seconds that have elapsed since January 1, 1970 00:00:00 UTC (the Unix epoch). It is commonly used in programming and databases."}},{"@type":"Question","name":"What is the difference between seconds, milliseconds and microseconds?","acceptedAnswer":{"@type":"Answer","text":"Standard Unix timestamps are in seconds (10 digits). JavaScript uses milliseconds (13 digits). Some systems like Java use microseconds (16 digits). The converter auto-detects or lets you specify the unit."}},{"@type":"Question","name":"Can I convert multiple timestamps at once?","acceptedAnswer":{"@type":"Answer","text":"Yes! Paste multiple timestamps, one per line, and convert them all at once. The output shows each timestamp with its corresponding human-readable date."}}]}</script>

<script>
GZI18n.register({
  en: {
    toolTitle: 'Epoch Timestamp Batch Converter',
    toolDesc: 'Batch convert Unix epoch timestamps to human-readable dates and vice versa. Supports seconds, milliseconds, microseconds — convert many at once.',
    nowSeconds: 'Seconds',
    nowMillis: 'Milliseconds',
    unitLabel: 'Unit',
    seconds: 'Seconds (s)',
    milliseconds: 'Milliseconds (ms)',
    microseconds: 'Microseconds (μs)',
    autoDetect: 'Auto-detect',
    convertEpoch: 'Epoch → Date',
    convertDate: 'Date → Epoch',
    copyAll: 'Copy All',
    clear: 'Clear',
    placeholder: 'Paste epoch timestamps here, one per line...\nExamples:\n1700000000\n1700000000000\n1700000000000000',
    placeholderDate: 'Paste ISO dates here, one per line...\nExamples:\n2024-01-15 12:00:00\n2024-06-01T08:30:00Z\nJan 15, 2024',
    colInput: 'Input',
    colDate: 'Date & Time (UTC)',
    colLocal: 'Date & Time (Local)',
    colRelative: 'Relative',
    colEpoch: 'Epoch',
    invalidLine: 'Invalid format',
    step1: 'Select unit type (seconds, ms, μs) or auto-detect',
    step2: 'Paste timestamps or dates, one per line',
    step3: 'Click Convert to see all results at once',
    step4: 'Copy individual results or all at once',
  },
  zh: {
    toolTitle: 'Epoch 时间戳批量转换器',
    toolDesc: '批量将 Unix 时间戳转换为可读日期，或反向转换。支持秒、毫秒、微秒 — 一次转换多个。',
    nowSeconds: '秒',
    nowMillis: '毫秒',
    unitLabel: '单位',
    seconds: '秒 (s)',
    milliseconds: '毫秒 (ms)',
    microseconds: '微秒 (μs)',
    autoDetect: '自动检测',
    convertEpoch: '时间戳 → 日期',
    convertDate: '日期 → 时间戳',
    copyAll: '复制全部',
    clear: '清除',
    placeholder: '在此粘贴时间戳，每行一个...\n示例:\n1700000000\n1700000000000\n1700000000000000',
    placeholderDate: '在此粘贴 ISO 日期，每行一个...\n示例:\n2024-01-15 12:00:00\n2024-06-01T08:30:00Z\nJan 15, 2024',
    colInput: '输入',
    colDate: '日期时间 (UTC)',
    colLocal: '日期时间 (本地)',
    colRelative: '相对时间',
    colEpoch: '时间戳',
    invalidLine: '无效格式',
    step1: '选择单位类型（秒、毫秒、微秒）或自动检测',
    step2: '粘贴时间戳或日期，每行一个',
    step3: '点击转换查看所有结果',
    step4: '复制单个结果或全部结果',
  }
});

const { $, copyText, t } = GZ;

function updateNow() {
  const now = Date.now();
  $('#nowBar').innerHTML = `<span>🕐</span> <span>${t('nowSeconds')}:</span> <strong>${Math.floor(now/1000)}</strong> <span>${t('nowMillis')}:</span> <strong>${now}</strong>`;
}
updateNow();
setInterval(updateNow, 1000);

let mode = 'epoch';

$('#controls').innerHTML = `
  <label>${t('unitLabel')}:</label>
  <select id="unitSel">
    <option value="auto">${t('autoDetect')}</option>
    <option value="s">${t('seconds')}</option>
    <option value="ms">${t('milliseconds')}</option>
    <option value="us">${t('microseconds')}</option>
  </select>
  <button class="gz-btn" id="btnEpoch">${t('convertEpoch')}</button>
  <button class="gz-btn gz-btn-secondary" id="btnDate">${t('convertDate')}</button>
  <button class="gz-btn gz-btn-secondary" id="btnCopy">${t('copyAll')}</button>
  <button class="gz-btn gz-btn-secondary" id="btnClear">${t('clear')}</button>`;

$('#inputArea').placeholder = t('placeholder');

$('#btnEpoch').onclick = () => { mode='epoch'; $('#inputArea').placeholder=t('placeholder'); doConvert(); };
$('#btnDate').onclick = () => { mode='date'; $('#inputArea').placeholder=t('placeholderDate'); doConvert(); };
$('#btnCopy').onclick = () => { copyText($('#results').textContent); };
$('#btnClear').onclick = () => { $('#inputArea').value=''; $('#results').innerHTML=''; };

function relativeTime(d) {
  const diff = Date.now() - d.getTime();
  const abs = Math.abs(diff);
  const future = diff < 0;
  const s = abs/1000, m=s/60, h=m/24===undefined?s/3600:m/60;
  let str;
  if (abs < 60000) str = Math.floor(s) + 's';
  else if (abs < 3600000) str = Math.floor(s/60) + 'm';
  else if (abs < 86400000) str = Math.floor(s/3600) + 'h';
  else str = Math.floor(s/86400) + 'd';
  return future ? 'in ' + str : str + ' ago';
}

function doConvert() {
  const lines = $('#inputArea').value.trim().split('\n').filter(l => l.trim());
  if (!lines.length) return;
  const unit = $('#unitSel').value;

  let html = `<table class="result-table"><thead><tr>`;
  if (mode === 'epoch') {
    html += `<th>${t('colInput')}</th><th>${t('colDate')}</th><th>${t('colLocal')}</th><th>${t('colRelative')}</th></tr></thead><tbody>`;
    lines.forEach(line => {
      const raw = line.trim();
      let ts = parseFloat(raw);
      if (isNaN(ts)) { html += `<tr><td>${raw}</td><td colspan="3" style="color:var(--text2)">${t('invalidLine')}</td></tr>`; return; }
      let ms;
      if (unit === 'auto') {
        if (Math.abs(ts) > 1e16) ms = ts / 1000;
        else if (Math.abs(ts) > 1e13) ms = ts;
        else ms = ts * 1000;
      } else if (unit === 's') ms = ts * 1000;
      else if (unit === 'ms') ms = ts;
      else ms = ts / 1000;

      const d = new Date(ms);
      if (isNaN(d.getTime())) { html += `<tr><td>${raw}</td><td colspan="3" style="color:var(--text2)">${t('invalidLine')}</td></tr>`; return; }
      html += `<tr><td>${raw}</td><td>${d.toISOString()}</td><td>${d.toLocaleString()}</td><td>${relativeTime(d)}</td></tr>`;
    });
  } else {
    html += `<th>${t('colInput')}</th><th>${t('colEpoch')} (s)</th><th>${t('colEpoch')} (ms)</th></tr></thead><tbody>`;
    lines.forEach(line => {
      const raw = line.trim();
      const d = new Date(raw);
      if (isNaN(d.getTime())) { html += `<tr><td>${raw}</td><td colspan="2" style="color:var(--text2)">${t('invalidLine')}</td></tr>`; return; }
      const s = Math.floor(d.getTime() / 1000);
      const ms = d.getTime();
      html += `<tr><td>${raw}</td><td>${s}</td><td>${ms}</td></tr>`;
    });
  }
  html += '</tbody></table>';
  $('#results').innerHTML = html;
}

$('#inputArea').addEventListener('input', () => doConvert());

GZ.renderToolPage({
  category: 'convert',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🕐', href:'/convert/epoch-converter.html', name:'Epoch Converter'},
    {icon:'📅', href:'/calc/date-calculator.html', name:'Date Calculator'},
    {icon:'⏱️', href:'/calc/timezone-converter.html', name:'Timezone Converter'},
    {icon:'📊', href:'/dev/json-formatter.html', name:'JSON Formatter'},
  ]
});
</script>
