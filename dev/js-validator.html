const { $, t } = GZ;

const issues = [];
let errorCount = 0, warnCount = 0, infoCount = 0;

function addIssue(type, msg, line, col) {
  issues.push({ type, msg, line, col });
  if (type === 'error') errorCount++;
  else if (type === 'warn') warnCount++;
  else infoCount++;
}

function checkSyntax(code) {
  // Use Function constructor to parse without executing
  try {
    // Try parsing as a function body
    new Function(code);
  } catch (e) {
    const msg = e.message;
    // extract line/col — V8 format: "...: line X" or "... (line X)" or stack
    let line = null, col = null;
    const lineMatch = msg.match(/line (\d+)/) || (e.stack && e.stack.match(/<anonymous>:(\d+):(\d+)/));
    if (lineMatch) {
      line = parseInt(lineMatch[1]);
      if (lineMatch[2]) col = parseInt(lineMatch[2]);
      // Function() adds 1 offset for the function wrapper? Actually anonymous:line includes wrapper.
      // V8 reports the line inside the function body starting at line 1 of the body? Let's offset.
    }
    // The Function constructor prepends "function anonymous(){" so line numbers may be offset.
    // Try a more reliable parse: use eval in a try with line tracking via split.
    addIssue('error', msg, line, col);
  }
}

function checkBrackets(code) {
  const pairs = { '(': ')', '[': ']', '{': '}' };
  const stack = [];
  const lines = code.split('\n');
  let inString = false, stringChar = '', inLineComment = false, inBlockComment = false, inTemplate = false;
  for (let li = 0; li < lines.length; li++) {
    const line = lines[li];
    inLineComment = false;
    for (let ci = 0; ci < line.length; ci++) {
      const c = line[ci], n = line[ci+1];
      if (inLineComment) continue;
      if (inBlockComment) { if (c === '*' && n === '/') { inBlockComment = false; ci++; } continue; }
      if (inString) { if (c === '\\') { ci++; continue; } if (c === stringChar) inString = false; continue; }
      if (inTemplate) { if (c === '\\') { ci++; continue; } if (c === '`') inTemplate = false; continue; }
      if (c === '/' && n === '/') { inLineComment = true; break; }
      if (c === '/' && n === '*') { inBlockComment = true; ci++; continue; }
      if (c === '"' || c === "'") { inString = true; stringChar = c; continue; }
      if (c === '`') { inTemplate = true; continue; }
      if (c === '(' || c === '[' || c === '{') stack.push({ char: c, line: li+1, col: ci+1 });
      else if (c === ')' || c === ']' || c === '}') {
        const top = stack.pop();
        if (!top) { addIssue('error', `Unmatched closing bracket '${c}'`, li+1, ci+1); }
        else if (pairs[top.char] !== c) {
          addIssue('error', `Mismatched bracket: '${top.char}' opened at line ${top.line} but closed with '${c}'`, li+1, ci+1);
        }
      }
    }
  }
  for (const item of stack) {
    addIssue('error', `Unclosed bracket '${item.char}' (expected '${pairs[item.char]}')`, item.line, item.col);
  }
}

function lint(code) {
  const lines = code.split('\n');
  lines.forEach((line, i) => {
    const trimmed = line.trim();
    if (!trimmed || trimmed.startsWith('//') || trimmed.startsWith('/*')) return;
    // eval usage
    if (/\beval\s*\(/.test(line)) addIssue('warn', 'Avoid using eval() — security and performance risk', i+1);
    // assignment in condition
    const condMatch = line.match(/if\s*\([^=]*[^=!<>]=[^=]/);
    if (condMatch) addIssue('warn', 'Possible assignment (=) inside if condition — did you mean == or ===?', i+1);
    // loose equality ==
    if (/[^=!]==[^=]/.test(line) || /[^=!<>!]==[^=]/.test(line)) {
      // simpler: find == not part of ===
      if (/[^=]==[^=]/.test(line)) addIssue('info', 'Using loose equality (==) — consider strict equality (===)', i+1);
    }
    // var usage
    if (/^\s*var\s+/.test(line)) addIssue('info', 'Using var — consider let or const for block scoping', i+1);
    // debugger statement
    if (/^\s*debugger\s*;?\s*$/.test(line)) addIssue('warn', 'Debugger statement found — remove before production', i+1);
    // document.write
    if (/document\.write\s*\(/.test(line)) addIssue('warn', 'document.write() is discouraged — use DOM APIs instead', i+1);
    // console.log left in code (info only)
    if (/console\.log\s*\(/.test(line)) addIssue('info', 'console.log() found — remove before production', i+1);
  });
}

function validate() {
  const code = $('#js-in').value;
  issues.length = 0;
  errorCount = warnCount = infoCount = 0;
  if (!code.trim()) {
    $('#summary').innerHTML = '';
    $('#statsRow').innerHTML = '';
    $('#issues').innerHTML = '';
    return;
  }
  checkSyntax(code);
  // only run bracket/lint checks if no fatal syntax error (to avoid double noise)
  if (errorCount === 0) {
    checkBrackets(code);
    lint(code);
  }
  render(code);
}

function render(code) {
  const lines = code.split('\n').length;
  const chars = code.length;
  // summary
  if (errorCount === 0) {
    $('#summary').innerHTML = `<div class="v-summary ok">${t('valid')}${warnCount ? ` · ${warnCount} ${t('warnings').toLowerCase()}` : ''}</div>`;
  } else {
    $('#summary').innerHTML = `<div class="v-summary bad">${t('invalid')}</div>`;
  }
  // stats
  $('#statsRow').innerHTML = `
    <span>${errorCount} ${t('errors')}</span>
    <span>${warnCount} ${t('warnings')}</span>
    <span>${infoCount} ${t('info')}</span>
    <span>${lines} ${t('lines')}</span>
    <span>${chars} ${t('chars')}</span>
  `;
  // issues list
  if (issues.length === 0) {
    $('#issues').innerHTML = '';
  } else {
    $('#issues').innerHTML = issues.map(is => `
      <li class="v-issue ${is.type}">
        <span class="lbl">${is.type}</span>${escapeHtml(is.msg)}
        ${is.line ? `<div class="loc">Line ${is.line}${is.col ? `, Col ${is.col}` : ''}</div>` : ''}
      </li>`).join('');
  }
}

function escapeHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function loadSample() {
  $('#js-in').value = `// Example with a few issues to find
function greet(name) {
  if (name = "World") {  // assignment instead of comparison
    console.log("Hello, " + name);
  }
  var message = `+"`Hello ${name}`"+`;
  return message
}

const data = eval("({a: 1})");  // avoid eval
debugger;
`;
  validate();
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="validate()">${t('validate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadSample()">${t('sample')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#js-in').value=\\'\\';validate()">${t('clear')}</button>
`;

</script>
