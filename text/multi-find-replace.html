<script>

  },
  zh: {

    toolDesc: '一次性批量查找并替换多个文本模式。列出查找→替换规则对，可选纯文本或正则、区分大小写和整词匹配。100% 浏览器本地运行。',
    replace: '替换',
    example: '示例',
    copy: '复制',
    clear: '清空',
    mode: '模式',
    separator: '分隔符',
    caseSensitive: '区分大小写',
    wholeWord: '整词匹配',
    highlight: '高亮改动',
    rulesLabel: '查找/替换规则（每行一条）',
    ok: (n, r) => `✓ 已应用 ${n} 条规则 — 共替换 ${r} 处`,
    noRules: '请至少添加一条查找/替换规则（每行一条）。',
    badRegex: (n, msg) => `⚠ 第 ${n} 条：正则无效 — ${msg}（已跳过）`,
    step1: '在规则框中列出查找/替换对 — 每行一条',
    step2: '选择分隔符（逗号、Tab、竖线、= 或 =>）和模式（文本或正则）',
    step3: '在输入框中粘贴要处理的文本',
    step4: '从输出区复制高亮后的结果',

const { $, copyText, t } = GZ;

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function parseRules(raw, sep){
  const rules = [];
  raw.split('\n').forEach(line => {
    if (!line.trim() || line.trim().startsWith('#')) return;
    const idx = line.indexOf(sep);
    if (idx < 0){
      // no separator -> treat whole line as find, empty replacement
      rules.push({ find: line, replace: '' });
    } else {
      rules.push({ find: line.slice(0, idx), replace: line.slice(idx + sep.length) });
    }
  });
  return rules.filter(r => r.find !== '');
}

function buildRegex(find, opts){
  let pattern;
  try {
    const flags = opts.caseSensitive ? 'g' : 'gi';
    if (opts.mode === 'regex'){
      pattern = new RegExp(find, flags);
    } else {
      let body = find.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      if (opts.wholeWord){
        body = '\\b' + body + '\\b';
      }
      pattern = new RegExp(body, flags);
    }
    return { ok: true, pattern };
  } catch (e){
    return { ok: false, error: e.message };
  }
}

function convert(){
  const text = $('#input').value;
  const rulesRaw = $('#rulesArea').value;
  if (!rulesRaw.trim()){
    $('#output').innerHTML = `<span class="err">${t('noRules')}</span>`;
    $('#status').innerHTML = '';
    return;
  }
  const sepStr = $('#sepSel').value;
  const sep = sepStr === '\\t' ? '\t' : sepStr;
  const rules = parseRules(rulesRaw, sep);
  if (!rules.length){
    $('#output').innerHTML = `<span class="err">${t('noRules')}</span>`;
    $('#status').innerHTML = '';
    return;
  }
  const opts = {
    mode: $('#modeSel').value,
    caseSensitive: $('#optCase').checked,
    wholeWord: $('#optWord').checked,
    highlight: $('#optHighlight').checked,
  };

  // Build a combined list of compiled patterns, recording the replacement for each.
  const compiled = [];
  const errors = [];
  rules.forEach((r, i) => {
    const built = buildRegex(r.find, opts);
    if (!built.ok){ errors.push(t('badRegex')(i + 1, built.error)); return; }
    compiled.push({ pattern: built.pattern, replace: r.replace });
  });

  // Apply each rule sequentially. Count total replacements and track spans to highlight.
  // We collect highlight spans by doing a single pass with a marked token approach.
  let working = text;
  let totalReplacements = 0;

  // We will tag replaced segments with a sentinel to highlight later, only when highlight is on.
  const OPEN = '\u0001', CLOSE = '\u0002';

  compiled.forEach(({ pattern, replace }) => {
    // reset lastIndex because /g regex carries state
    pattern.lastIndex = 0;
    if (opts.highlight){
      working = working.replace(pattern, function(){
        totalReplacements++;
        const rep = replace.replace(/\$(&|\d+|{[^}]+})/g, (m, g) => {
          if (g === '&') return arguments[0];
          if (/^\d+$/.test(g)) return arguments[+g] || '';
          return arguments[0];
        });
        return OPEN + rep + CLOSE;
      });
    } else {
      working = working.replace(pattern, function(){
        totalReplacements++;
        const rep = replace.replace(/\$(&|\d+|{[^}]+})/g, (m, g) => {
          if (g === '&') return arguments[0];
          if (/^\d+$/.test(g)) return arguments[+g] || '';
          return arguments[0];
        });
        return rep;
      });
    }
  });

  // Render
  let html;
  if (opts.highlight){
    // Escape then convert sentinels to <mark>
    let escaped = esc(working);
    escaped = escaped.replace(/\u0001/g, '<mark>').replace(/\u0002/g, '</mark>');
    html = escaped;
  } else {
    html = esc(working);
  }
  $('#output').innerHTML = html || '&nbsp;';
  $('#status').innerHTML = `<span class="stat"><b>${t('ok')(compiled.length, totalReplacements)}</b></span>` +
    (errors.length ? '<br>' + errors.map(e => `<span class="err">${e}</span>`).join('<br>') : '');
}

function loadExample(){
  $('#rulesArea').value = 'colour,color\ncentre,center\norganisation,organization\nfaq,FAQ';
  $('#input').value = 'The colour of the centre sign matches our organisation branding.\nSee the faq page for more colour options.';
  convert();
}

$('#input').addEventListener('input', convert);
$('#rulesArea').addEventListener('input', convert);

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="convert()">${t('replace')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#input').value='';$('#rulesArea').value='';convert()">${t('clear')}</button>`;

$('#lbl-mode').textContent = t('mode');

});
</script>
