<script>
GZI18n.register({
  en: {
    toolTitle: 'Image Format Converter',
    toolDesc: 'Convert images between JPG, PNG, WebP, GIF and BMP. Batch convert, set quality and resize — 100% in your browser, no upload.',
    dropText: 'Drop images here or click to upload (multiple allowed)',
    format: 'Convert to',
    quality: 'Quality',
    resize: 'Max width (px)',
    convert: 'Convert All',
    clear: 'Clear',
    step1: 'Drop or upload one or more images',
    step2: 'Choose the target format (JPG, PNG, WebP, GIF, BMP)',
    step3: 'Optionally adjust quality and max width',
    step4: 'Click Convert All and download each result',
    converted: 'Converted',
    downloadHint: 'Click ⬇ to download',
  },
  zh: {
    toolTitle: '图片格式转换器',
    toolDesc: '在 JPG、PNG、WebP、GIF 和 BMP 之间转换图片。支持批量转换、质量调节和缩放 — 100% 浏览器本地，无需上传。',
    dropText: '拖放图片到此处或点击上传（支持多选）',
    format: '转换为',
    quality: '质量',
    resize: '最大宽度（px）',
    convert: '全部转换',
    clear: '清空',
    step1: '拖放或上传一张或多张图片',
    step2: '选择目标格式（JPG、PNG、WebP、GIF、BMP）',
    step3: '可选：调节质量和最大宽度',
    step4: '点击「全部转换」并下载每个结果',
    converted: '已转换',
    downloadHint: '点击 ⬇ 下载',
  }
});

const { $, t, showToast } = GZ;

$('#drop-text').textContent = t('dropText');
$('#lbl-format').textContent = t('format');
$('#lbl-quality').textContent = t('quality');
$('#lbl-resize').textContent = t('resize');
$('#btn-convert').textContent = t('convert');
$('#btn-clear').textContent = t('clear');

let files = [];

const drop = $('#drop'), fileInput = $('#fileInput');
drop.addEventListener('click', () => fileInput.click());
drop.addEventListener('dragover', e => { e.preventDefault(); drop.classList.add('dragover'); });
drop.addEventListener('dragleave', () => drop.classList.remove('dragover'));
drop.addEventListener('drop', e => {
  e.preventDefault(); drop.classList.remove('dragover');
  addFiles(e.dataTransfer.files);
});
fileInput.addEventListener('change', e => addFiles(e.target.files));

function addFiles(list) {
  for (const f of list) {
    if (f.type.startsWith('image/')) files.push(f);
  }
  renderList();
  if (files.length) {
    $('#controls').style.display = 'flex';
    drop.style.padding = '20px';
  }
}

function renderList() {
  const list = $('#fileList');
  list.innerHTML = '';
  files.forEach((f, i) => {
    const row = document.createElement('div');
    row.className = 'gz-file-row';
    row.id = 'row-' + i;
    row.innerHTML = `
      <img class="thumb" id="thumb-${i}">
      <div class="info"><b>${f.name}</b><small id="meta-${i}">${(f.size/1024).toFixed(1)} KB · ${f.type || '?'}</small></div>
      <span id="res-${i}" class="dl"></span>`;
    list.appendChild(row);
    const reader = new FileReader();
    reader.onload = e => { const ti = $('#thumb-' + i); if (ti) ti.src = e.target.result; };
    reader.readAsDataURL(f);
  });
}

$('#quality').addEventListener('input', e => $('#qval').textContent = e.target.value);

async function convertOne(f, i) {
  const fmt = $('#format').value;
  const q = parseInt($('#quality').value) / 100;
  const maxW = parseInt($('#maxw').value) || 0;
  const ext = fmt.split('/')[1].replace('jpeg', 'jpg');
  const res = $('#res-' + i);
  res.className = 'dl';
  res.textContent = '⏳';
  try {
    const img = await loadImageEl(URL.createObjectURL(f));
    let w = img.naturalWidth, h = img.naturalHeight;
    if (maxW && w > maxW) { h = Math.round(h * maxW / w); w = maxW; }
    const canvas = document.createElement('canvas');
    canvas.width = w; canvas.height = h;
    const ctx = canvas.getContext('2d');
    // White background for formats without alpha
    if (fmt === 'image/jpeg' || fmt === 'image/bmp') {
      ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, w, h);
    }
    ctx.drawImage(img, 0, 0, w, h);
    const mime = fmt === 'image/bmp' ? 'image/png' : fmt; // canvas can't encode bmp, fallback
    const url = canvas.toDataURL(mime, q);
    const blob = dataURLtoBlob(url);
    const dlUrl = URL.createObjectURL(blob);
    const newName = f.name.replace(/\.[^.]+$/, '') + '.' + ext;
    const meta = $('#meta-' + i);
    if (meta) meta.innerHTML = `<span class="done">✓ ${t('converted')} → ${ext.toUpperCase()} · ${(blob.size/1024).toFixed(1)} KB</span>`;
    res.innerHTML = `<a href="${dlUrl}" download="${newName}" class="dl" title="Download">⬇</a>`;
  } catch (e) {
    res.className = 'dl err';
    res.textContent = '✗';
    const meta = $('#meta-' + i);
    if (meta) meta.innerHTML = `<span class="err">${e.message}</span>`;
  }
}

function loadImageEl(src) {
  return new Promise((res, rej) => {
    const img = new Image();
    img.onload = () => res(img);
    img.onerror = () => rej(new Error('Failed to load image'));
    img.src = src;
  });
}

function dataURLtoBlob(dataURL) {
  const arr = dataURL.split(','), mime = arr[0].match(/:(.*?);/)[1];
  const bstr = atob(arr[1]), u8 = new Uint8Array(bstr.length);
  for (let i = 0; i < bstr.length; i++) u8[i] = bstr.charCodeAt(i);
  return new Blob([u8], { type: mime });
}

$('#btn-convert').addEventListener('click', async () => {
  if (!files.length) { showToast('—'); return; }
  $('#btn-convert').disabled = true;
  for (let i = 0; i < files.length; i++) {
    await convertOne(files[i], i);
  }
  $('#btn-convert').disabled = false;
  showToast(t('converted') + ' ✓');
});

$('#btn-clear').addEventListener('click', () => {
  files = [];
  $('#fileList').innerHTML = '';
  $('#controls').style.display = 'none';
  drop.style.padding = '40px';
  fileInput.value = '';
});

GZ.renderToolPage({
  category: 'image',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [

    {icon:'📐', href:'/image/image-resizer.html', name:'Image Resizer'},
    {icon:'🖼️', href:'/image/jpeg-compressor.html', name:'JPEG Compressor'},
    {icon:'🔄', href:'/convert/heic-to-jpg.html', name:'HEIC to JPG'},
  ]
});
</script>
