<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div style="margin:12px 0">

    <div class="form-row">
      <div><label id="lbl-role" style="font-weight:600;display:block;margin-bottom:6px"></label><input type="text" id="roleInput" placeholder="Senior Product Manager"></div>
      <div><label id="lbl-industry" style="font-weight:600;display:block;margin-bottom:6px"></label><input type="text" id="industryInput" placeholder="SaaS / Fintech"></div>
    </div>
    <div class="form-row">
      <div><label id="lbl-achievement" style="font-weight:600;display:block;margin-bottom:6px"></label><input type="text" id="achievementInput" placeholder="shipped 3 products with 2M+ users"></div>
      <div><label id="lbl-years" style="font-weight:600;display:block;margin-bottom:6px"></label><input type="text" id="yearsInput" placeholder="8"></div>
    </div>
    <div class="gz-split">
      <div><label id="lbl-in"></label><textarea id="input" rows="8"></textarea><div class="char-count" id="charCount"></div></div>
      <div><label id="lbl-out"></label><div id="preview"></div></div>
    </div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'LinkedIn Bio / About Generator',
    toolDesc: 'Create a professional, recruiter-ready LinkedIn About summary. Pick a career stage, add your details and copy.',
    lblStyle: 'Choose a Career Stage',
    lblRole: 'Your Role',
    lblIndustry: 'Industry',
    lblAchievement: 'Key Achievement (optional)',
    lblYears: 'Years of Experience',
    styleSeeker: '🎯 Job Seeker',
    styleFounder: '🚀 Founder',
    styleStudent: '🎓 Student / New Grad',
    styleChanger: '🔄 Career Changer',
    styleFreelancer: '💼 Freelancer',
    styleExecutive: '👔 Executive',
    charCount: 'chars',
    step1: 'Pick a career stage template that fits you',
    step2: 'Fill in your role, industry and a key achievement',
    step3: 'Edit the summary to add your personal metrics',
    step4: 'Copy and paste into your LinkedIn About section',
  },
  zh: {
    toolTitle: 'LinkedIn 简介 / About 生成器',
    toolDesc: '创建专业、适合招聘者阅读的 LinkedIn About 摘要。选择职业阶段，填写你的信息，一键复制。',
    lblStyle: '选择职业阶段',
    lblRole: '你的职位',
    lblIndustry: '行业',
    lblAchievement: '关键成就（可选）',
    lblYears: '工作年限',
    styleSeeker: '🎯 求职者',
    styleFounder: '🚀 创始人',
    styleStudent: '🎓 学生 / 应届生',
    styleChanger: '🔄 转行者',
    styleFreelancer: '💼 自由职业者',
    styleExecutive: '👔 高管',
    charCount: '字符',
    step1: '选择适合你的职业阶段模板',
    step2: '填写职位、行业和关键成就',
    step3: '编辑摘要，加入你的个人数据',
    step4: '复制并粘贴到 LinkedIn About 板块',
  }
});

const { $, copyText, t } = GZ;

const templates = {
  seeker: [
    'I am a {role} with {years}+ years of experience in {industry}, focused on {achievement}.\n\nMost recently I led initiatives that delivered measurable impact, and I am now looking for my next role where I can drive {industry} outcomes at scale.\n\nOpen to: full-time {role} roles · remote or hybrid\n📩 Let\'s connect — DM me anytime.',
    '{role} | {years}+ yrs in {industry}\n\nI help teams {achievement}. My approach blends data-driven decisions with user-centric design, and I have shipped work used by real customers.\n\nActively interviewing for {role} positions. If your team is hiring, I would love to talk.',
  ],
  founder: [
    'Founder & {role} building in {industry}.\n\nOver the last {years} years I have {achievement} — turning an idea into a product with real users and revenue.\n\nI write about {industry}, founder life and what I am learning along the way. Always happy to talk to other founders, investors and operators.\n\n📩 DM open · 🌐 link in featured section',
    'Building [Company] — {industry} for the next decade.\n\nI am a {role} who has spent {years}+ years in {industry}. We recently {achievement}, and we are just getting started.\n\nLooking to connect with: investors, early hires and anyone curious about {industry}.',
  ],
  student: [
    '{role} (in training) · Class of [Year] · {industry}\n\nI am a [Major] student passionate about {industry}. Through coursework, hackathons and internships I have already {achievement}.\n\nLooking for: 2026 internships and new-grad {role} roles. Excited to learn, contribute and grow with a team that ships.\n\n📩 Open to introductions and coffee chats.',
    'Soon-to-be {role} graduate focused on {industry}.\n\nI enjoy turning ideas into shipped work — most recently I {achievement}. I am currently leveling up in [skill] and [skill], and looking for my first full-time role in {industry}.',
  ],
  changer: [
    '{role} | now in {industry}\n\nAfter {years} years in [previous field], I made the leap into {industry} — and I have never looked back. My previous career taught me [transferable skill], which now helps me {achievement}.\n\nIf you are also pivoting, or hiring career changers, I would love to connect.',
    'Career changer → {role} in {industry}.\n\nI bring a non-traditional background ([previous role]) plus fresh {industry} skills. In the last year I have {achievement}, and I am looking for a team that values diverse experience.',
  ],
  freelancer: [
    'Freelance {role} helping {industry} teams ship.\n\nOver {years}+ years I have {achievement} for clients ranging from early-stage startups to established brands. I take projects from brief to launch — strategy, execution and iteration.\n\nCurrently booking: [service] projects · remote worldwide\n📩 DM for availability and rates',
    '{role} for hire · {industry} specialist\n\nI help founders and teams {achievement}. {years}+ years freelance, 50+ projects shipped, zero ghosting.\n\nAvailable for: retainers, sprints and advisory\n🌐 portfolio below',
  ],
  executive: [
    '{role}, {industry} executive.\n\n{years}+ years leading teams that {achievement}. I have built and scaled organizations through hyper-growth, acquisitions and market shifts.\n\nI am most useful early — when strategy, hiring and culture all need to move at once.\n\n📩 Board, advisory and operating roles considered.',
    'Executive {role} | {industry}\n\nI lead with a simple principle: hire great people, remove blockers, ship outcomes. Track record: {achievement}.\n\nAlways happy to mentor, advise or connect. DMs open.',
  ],
};

const styles = [
  {key:'seeker', icon:'styleSeeker'},
  {key:'founder', icon:'styleFounder'},
  {key:'student', icon:'styleStudent'},
  {key:'changer', icon:'styleChanger'},
  {key:'freelancer', icon:'styleFreelancer'},
  {key:'executive', icon:'styleExecutive'},
];

let currentStyle = 'seeker';

function buildTemplates() {
  const container = $('#templates');
  container.innerHTML = '';
  styles.forEach(s => {
    const btn = document.createElement('div');
    btn.className = 'bio-tpl' + (s.key === currentStyle ? ' active' : '');
    btn.textContent = t(s.icon);
    btn.onclick = () => { currentStyle = s.key; loadTemplate(); buildTemplates(); };
    container.appendChild(btn);
  });
}

function loadTemplate() {
  const list = templates[currentStyle] || templates.seeker;
  const tpl = list[Math.floor(Math.random() * list.length)];
  const role = $('#roleInput').value || 'Product Manager';
  const industry = $('#industryInput').value || 'SaaS';
  const achievement = $('#achievementInput').value || 'shipped products used by thousands';
  const years = $('#yearsInput').value || '5';
  $('#input').value = tpl
    .replace(/\{role\}/g, role)
    .replace(/\{industry\}/g, industry)
    .replace(/\{achievement\}/g, achievement)
    .replace(/\{years\}/g, years);
  updatePreview();
}

function updatePreview() {
  const text = $('#input').value;
  $('#preview').textContent = text;
  $('#charCount').textContent = text.length + ' / 2600 ' + t('charCount');
  $('#charCount').classList.toggle('over', text.length > 2600);
}

['input','roleInput','industryInput','achievementInput','yearsInput'].forEach(id => {
  $('#' + id).addEventListener('input', id === 'input' ? updatePreview : loadTemplate);
});

buildTemplates();
loadTemplate();

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="loadTemplate()">🔄 Generate New</button>
  <button class="gz-btn" onclick="copyText($('#input').value)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#input').value='';updatePreview()">${t('clear')}</button>`;

GZ.renderToolPage({
  category: 'social',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🐦', href:'/social/twitter-bio.html', name:'Twitter Bio'},
    {icon:'📸', href:'/social/instagram-bio.html', name:'Instagram Bio'},
    {icon:'💼', href:'/text/linkedin-headline-generator.html', name:'LinkedIn Headline'},
    {icon:'📄', href:'/text/cover-letter-generator.html', name:'Cover Letter'},
  ]
});
</script>
<script src="/tools-result-rec.js?v=20260707v520" defer></script>
</body>
